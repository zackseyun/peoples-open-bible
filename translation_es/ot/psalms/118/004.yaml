translation:
  language: es
  text: 'Que digan ahora los que temen a Yahvé: «Su amor leal[a] permanece para siempre».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su fidelidad de pacto permanece para siempre». El hebreo חֶסֶד incluye el sentido de amor leal y fidelidad de pacto.
    reason: lexical_alternative
lexical_decisions:
- source_word: יֹאמְרוּ
  english_pob_choice: Let ... say
  chosen_spanish: Que digan
  alternatives_spanish:
  - Que ahora digan
  - Digan
  lexicon: HALOT
  rationale: El imperfecto/jusivo plural aquí funciona como exhortación o invitación litúrgica; en español, «Que digan» conserva bien ese tono de convocatoria sin sonar artificial.
- source_word: נָא
  english_pob_choice: now
  chosen_spanish: ahora
  alternatives_spanish:
  - por favor
  - sí
  lexicon: HALOT
  rationale: En este refrán, נָא aporta urgencia o instancia. «Ahora» reproduce de modo natural la fuerza exhortativa en español.
- source_word: יִרְאֵי יְהוָה
  english_pob_choice: those who fear Yahweh
  chosen_spanish: los que temen a Yahvé
  alternatives_spanish:
  - los reverentes de Yahvé
  - los que reverencian a Yahvé
  lexicon: HALOT
  rationale: La construcción designa a personas caracterizadas por temer/reverenciar a Yahvé. «Los que temen a Yahvé» es fiel y natural en español bíblico contemporáneo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino con la forma de uso del proyecto en español, «Yahvé», en lugar de sustituirlo por un título.
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: —
  alternatives_spanish:
  - pues
  - porque
  lexicon: HALOT
  rationale: Aquí כִּי introduce el contenido que debe ser dicho; en español resulta más fiel dejarlo implícito dentro de la cita, sin añadir una conjunción que altere el flujo del mandato.
- source_word: לְעוֹלָם
  english_pob_choice: endures forever
  chosen_spanish: permanece para siempre
  alternatives_spanish:
  - dura para siempre
  - es para siempre
  lexicon: HALOT
  rationale: Aunque literalmente significa «para siempre», en esta frase modifica la idea verbal implícita del amor leal de Dios. «Permanece para siempre» comunica bien la duración continua en español.
- source_word: חַסְדּוֹ
  english_pob_choice: his steadfast love
  chosen_spanish: su amor leal
  alternatives_spanish:
  - su misericordia
  - su amor fiel
  - su bondad leal
  lexicon: HALOT
  rationale: חֶסֶד incluye amor fiel, lealtad de pacto y misericordia. «Amor leal» preserva esa amplitud sin reducirlo solo a «misericordia» ni solo a «fidelidad».
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  rationale: El texto hebreo usa explícitamente el Tetragrama. En la tradición del proyecto en español, se conserva el nombre divino como «Yahvé» para no ocultar el nombre personal de Dios bajo un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor de חֶסֶד
  english_pob_reading: his steadfast love
  chosen_spanish_reading: su amor leal
  alternative_spanish_readings:
  - su misericordia
  - su fidelidad de pacto
  rationale: No se reduce חֶסֶד a «misericordia» ni solo a «fidelidad»; «amor leal» intenta preservar el amor perseverante y de pacto que el audit trail inglés también quiere mantener.
  doctrine_reference: HALOT / audit trail lexical decision for חֶסֶד
translation_notes:
  revision_awareness: La revisión inglesa reciente eliminó el «For» inicial dentro de la cita para tomar כִּי como contenido de lo que se debe decir. La presente redacción sigue esa decisión y evita introducir una conjunción innecesaria en español.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente con el estándar del proyecto en español para el nombre divino.
  - Se evita «SEÑOR» como sustituto del Tetragrama.
  - «Amor leal» mantiene la tensión semántica de חֶסֶד sin estrecharlo a una sola noción.
  - La oración es breve y litúrgica, acorde al paralelismo del salmo.
