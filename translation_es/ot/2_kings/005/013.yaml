translation:
  language: es
  text: 'Entonces sus siervos se acercaron, le hablaron y le dijeron[a]: «Padre mío, si el profeta te hubiera dicho alguna cosa grande, ¿no la habrías hecho? ¿Cuánto más, entonces, cuando te dice: “Lávate y queda limpio”?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «y sé purificado». El hebreo puede denotar quedar limpio o purificado.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֲבָדָיו
  english_pob_choice: his servants
  chosen_spanish: sus esclavos
  alternatives_spanish:
  - sus siervos
  - sus servidores
  lexicon: HALOT
  rationale: El hebreo עבד puede significar ‘siervo’ o ‘esclavo’ según el contexto. Aquí el POB inglés eligió ‘servants’ por la función narrativa, pero en español ‘esclavos’ mantiene mejor la fuerza léxica básica de עבד sin suavizarla; el contexto de subordinación hace viable esta opción.
- source_word: וַיִּגְּשׁוּ
  english_pob_choice: came near
  chosen_spanish: se acercaron
  alternatives_spanish:
  - se aproximaron
  - se llegaron
  lexicon: HALOT
  rationale: נגשׁ denota acercarse físicamente o socialmente. ‘Se acercaron’ es natural en español y conserva ese movimiento hacia Naamán.
- source_word: וַיְדַבְּרוּ אֵלָיו
  english_pob_choice: spoke to him
  chosen_spanish: le hablaron
  alternatives_spanish:
  - le hablaron a él
  - le dijeron algo
  lexicon: HALOT
  rationale: דבר אל indica hablar a alguien. ‘Le hablaron’ es idiomático en español y mantiene la relación directa con el destinatario.
- source_word: אָבִי
  english_pob_choice: My father
  chosen_spanish: Padre mío
  alternatives_spanish:
  - Padre
  - Señor mío
  lexicon: HALOT
  rationale: Aquí אָבִי es un tratamiento respetuoso de subordinados a superior, no paternidad literal. ‘Padre mío’ conserva el tono reverente y el vínculo metafórico mejor que ‘Señor mío’.
- source_word: דָּבָר גָּדוֹל
  english_pob_choice: some great thing
  chosen_spanish: alguna cosa grande
  alternatives_spanish:
  - una gran cosa
  - algo grande
  lexicon: HALOT
  rationale: La expresión es idiomática y contrasta con el mandato simple de lavarse. ‘Alguna cosa grande’ reproduce bien esa comparación sin sobreexplicar la dificultad.
- source_word: דִּבֶּר אֵלֶיךָ
  english_pob_choice: had spoken to you
  chosen_spanish: te hubiera dicho
  alternatives_spanish:
  - te habría hablado
  - te hubiese hablado
  lexicon: HALOT
  rationale: En el condicional retórico del hebreo, el español pide un pluscuamperfecto de subjuntivo para expresar adecuadamente la hipótesis contrafactual.
- source_word: הֲלוֹא תַעֲשֶׂה
  english_pob_choice: would you not do it?
  chosen_spanish: ¿no la habrías hecho?
  alternatives_spanish:
  - ¿no lo habrías hecho?
  - ¿no la harías?
  lexicon: HALOT
  rationale: La pregunta retórica espera respuesta afirmativa. En español, el femenino ‘la’ concuerda con ‘alguna cosa grande’ y mantiene la referencia implícita al acto/mandato.
- source_word: וְאַף כִּי
  english_pob_choice: How much more, then,
  chosen_spanish: ¡Cuánto más, entonces!
  alternatives_spanish:
  - ¡cuánto más!
  - ¡mucho más, entonces!
  lexicon: HALOT
  rationale: El modismo expresa argumento de mayor a menor. ‘¡Cuánto más, entonces!’ transmite con claridad la fuerza inferencial del hebreo.
- source_word: אָמַר אֵלֶיךָ
  english_pob_choice: when he says to you
  chosen_spanish: cuando te dice
  alternatives_spanish:
  - cuando te dijo
  - si te dice
  lexicon: HALOT
  rationale: Se mantiene el carácter vivo de la cita en estilo directo e interrogativo. El presente español funciona bien como marco retórico, como en la traducción inglesa.
- source_word: רְחַץ
  english_pob_choice: Wash
  chosen_spanish: Lávate
  alternatives_spanish:
  - Lávese
  - Lava
  lexicon: HALOT
  rationale: El imperativo reflexivo es natural en español para este mandato dirigido a una segunda persona singular.
- source_word: וּטְהָר
  english_pob_choice: and be clean
  chosen_spanish: y sé limpio
  alternatives_spanish:
  - y queda limpio
  - y sé purificado
  lexicon: HALOT
  rationale: טהר puede implicar quedar limpio o purificado. ‘Sé limpio’ conserva la concisión del hebreo y la resonancia física y ritual sin imponer una lectura exclusivamente ceremonial.
theological_decisions:
- issue: Rango semántico de טהר en la sanidad de Naamán
  english_pob_reading: and be clean
  chosen_spanish_reading: y sé limpio
  alternative_spanish_readings:
  - y sé purificado
  - y queda limpio
  rationale: El relato alude a sanidad y a limpieza/pureza, pero el hebreo no obliga a un tecnicismo ritual exclusivo. ‘Sé limpio’ conserva la ambigüedad útil entre limpieza física y purificación.
  doctrine_reference: Translation philosophy §3, §6
translation_notes:
  revision_awareness: 'Coincide con el último pass revisado: no se registraron cambios en el texto base inglés ni en la evaluación cruzada de alta concordancia. La versión española sigue la misma decisión principal sobre טהר, pero la formula con un imperativo más natural en español.'
  spanish_consistency_notes:
  - Se conservó el tono respetuoso de אָבִי con «Padre mío».
  - 'Se mantuvo el contraste argumental del versículo: una cosa grande frente al mandato simple de lavarse.'
  - Se usó «esclavos» para reflejar la fuerza léxica de עבד, aunque el inglés POB optó por 'servants' por fluidez narrativa.
  - La nota textual/lexical sobre טהר se ancla en el mandato final para preservar la alternativa «purificado» sin borrar la lectura principal.
