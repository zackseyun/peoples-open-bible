  chosen_reading: for a later day
  alternative_readings:
  - for the latter day
  - for the last day
  rationale: The Hebrew can denote a future/later time without necessarily invoking a technical end-times reference. To preserve the immediate prophetic context and avoid importing later theological specificity, the main text uses 'for a later day,' while preserving more literal alternatives in a footnote.
  doctrine_reference: Preserve theological tension rather than resolve it.
