revisions:
- from: Y los puso Dios en la expanse de los cielos para dar luz sobre la tierra[a].
  to: Y Dios los puso en la expansión de los cielos para dar luz sobre la tierra[a].
  rationale: Se reordena a «Y Dios los puso» por naturalidad normal del español narrativo, aunque el orden original también sería posible. Se sustituye «expanse» por «expansión», que es español claro y mantiene mejor la intención de equivalencia óptima detrás de רָקִיעַ sin caer necesariamente en el tradicional «firmamento» en el texto principal. Se ajusta la nota para reflejar la alternativa documentada en la auditoría inglesa.
