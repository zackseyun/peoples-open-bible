  source_alignment_summary: 'El borrador español sigue de cerca el sentido fuente y el rastro de auditoría inglés: conserva la doble categoría גֵּר/תּוֹשָׁב, mantiene ''tu hermano'', expresa el empobrecimiento y la auto-venta, y refleja la dificultad de לְעֵקֶר מִשְׁפַּחַת גֵּר con nota. Sin embargo, ''la mano ... prospera'' suena demasiado calcado y menos fiel al valor idiomático económico de תַשִּׂיג יַד, que apunta a medios/recursos suficientes más que a la ''mano'' misma. Además, ''retoño'' aplicado a una persona/familia resulta algo extraño en español bíblico-jurídico, aunque la nota ya reconoce la dificultad.'
