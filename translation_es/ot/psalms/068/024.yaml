translation:
  language: es
  text: para que tu pie los aplaste en sangre[a], y la lengua de tus perros reciba su parte de los enemigos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «para que tu pie aplaste en sangre». El hebreo final de este verso es difícil y elíptico; también puede entenderse más fluidamente como una referencia a que los perros reciben su porción de los enemigos derrotados.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְמַעַן
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - de modo que
  - a fin de que
  lexicon: HALOT
  rationale: La partícula introduce propósito o resultado; «para que» es la forma natural y fiel en español para conservar ese valor final sin endurecer la sintaxis.
- source_word: תִּמְחַץ
  english_pob_choice: may crush
  chosen_spanish: los aplaste
  alternatives_spanish:
  - los aplaste con fuerza
  - los destruya
  lexicon: HALOT
  rationale: El verbo מחץ expresa golpear/aplastar con violencia. En español, «aplastar» conserva la imagen concreta y el objeto implícito («los») recupera la transitividad que exige el hebreo y que el audit trail inglés ya aclaraba.
- source_word: רַגְלְךָ
  english_pob_choice: your foot
  chosen_spanish: tu pie
  alternatives_spanish:
  - tu pie
  - tu planta
  lexicon: HALOT
  rationale: El hebreo es singular con sufijo de 2ms. «Pie» mantiene la singularidad y es más natural en español que forzar «pies».
- source_word: בְּדָם
  english_pob_choice: in blood
  chosen_spanish: en sangre
  alternatives_spanish:
  - en sangre
  - con sangre
  lexicon: HALOT
  rationale: La preposición ב se conserva de manera relativamente literal. En español, «en sangre» transmite la imagen vívida del pisar/cruzar en medio de la sangre sin suavizarla.
- source_word: לְשׁוֹן כְּלָבֶיךָ
  english_pob_choice: the tongue of your dogs
  chosen_spanish: la lengua de tus perros
  alternatives_spanish:
  - la lengua de tus perros
  - las lenguas de tus perros
  lexicon: HALOT
  rationale: Se mantiene el singular hebreo «lengua» como singular colectivo, tal como en la decisión inglesa, para preservar la fuerza imagética y la forma del texto.
- source_word: מֵאֹיְבִים
  english_pob_choice: from the enemies
  chosen_spanish: de entre los enemigos
  alternatives_spanish:
  - de los enemigos
  - desde los enemigos
  lexicon: HALOT
  rationale: מִן aquí indica procedencia/origen de la porción. «De entre los enemigos» comunica mejor que la porción sale del ámbito de los enemigos derrotados, sin añadir explicaciones ajenas al hebreo.
- source_word: מִנֵּהוּ
  english_pob_choice: its portion / from him
  chosen_spanish: su parte
  alternatives_spanish:
  - de él
  - de eso
  - allí
  lexicon: HALOT
  rationale: El final hebreo es difícil y el inglés POB refleja la tensión entre una lectura literal («from him») y una más fluida ligada a la idea de porción. En español, «su parte» mantiene el sentido de reparto sin introducir un sujeto innecesario ni forzar una solución que el hebreo no desarrolla claramente.
theological_decisions:
- issue: Imaginería violenta e imprecatoria
  english_pob_reading: Retain the concrete imagery of the foot in blood and dogs consuming from enemies
  chosen_spanish_reading: Mantener la imagen concreta del pie que aplasta en sangre y de los perros que reciben su parte de entre los enemigos
  alternative_spanish_readings:
  - Suavizar el verso como una victoria general
  - Reescribirlo en lenguaje simbólico menos gráfico
  rationale: El texto hebreo es crudo y bélico. La traducción preserva esa concreción porque no hay base textual para amortiguarla; hacerlo debilitaría el testimonio del verso y borraría parte de su tensión poética.
  doctrine_reference: Primacía del texto original; no paraphrase beyond what the source text warrants.
translation_notes:
  revision_awareness: 'El texto inglés del POB fue revisado para resolver la transitividad de «crush» añadiendo el objeto implícito «them» y luego eliminó el redundante «from him» del final. La versión española sigue esa línea: explicita el objeto «los» en el primer hemistiquio y evita reproducir un equivalente redundante de «from him», optando por una solución fluida para la cláusula final.'
  spanish_consistency_notes:
  - Se mantiene «pie» en singular, como en el hebreo.
  - Se conserva la imaginería de sangre y perros sin suavizarla.
  - «Su parte» refleja el carácter elíptico del final hebreo sin añadir una glosa innecesaria en el texto principal.
  - La nota a ofrece la alternativa más fluida, análoga a la nota inglesa, para transparentar la dificultad textual.
