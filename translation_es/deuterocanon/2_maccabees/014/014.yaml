translation:
  language: es
  text: Pero los que estaban en Judea y habían expulsado a Judas se iban uniendo en tropel a Nicanor[a], pensando que las desgracias y calamidades de los judíos llegarían a ser su propia prosperidad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «se unían a Nicanor con las naciones»; el griego usa ἔθνη («naciones», a menudo «gentiles») con una construcción comprimida que admite más de una lectura.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ ... πεφυγαδευκότες
  english_pob_choice: those who had driven ... out
  chosen_spanish: los que habían expulsado a Judas
  alternatives_spanish:
  - los que habían puesto a Judas en fuga
  - los que habían desterrado a Judas
  lexicon: LSJ
  rationale: El perfecto participio de φυγαδεύω expresa la acción de obligar a huir o expulsar. «Expulsado» conserva la fuerza causativa sin sonar forzado en español.
- source_word: ἐπὶ τῆς Ἰουδαίας
  english_pob_choice: out of Judea
  chosen_spanish: de Judea
  alternatives_spanish:
  - desde Judea
  - de la tierra de Judea
  lexicon: LSJ
  rationale: La frase señala el lugar del cual Judas fue echado. En español, «de Judea» funciona naturalmente con «expulsar» y mantiene la relación locativa.
- source_word: ἔθνη
  english_pob_choice: from among the nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - los gentiles
  - entre las naciones
  lexicon: LSJ
  rationale: En este contexto, ἔθνη conserva el matiz de «naciones» con posible resonancia de «gentiles». La construcción española se vuelve más natural con «las naciones», dejando la ambigüedad abierta.
- source_word: συνέμιγνυν
  english_pob_choice: kept flocking in
  chosen_spanish: se mezclaban
  alternatives_spanish:
  - se unían
  - se asociaban
  - iban juntándose
  lexicon: LSJ
  rationale: El verbo significa literalmente «mezclarse» o «unirse». Se traduce de manera directa para preservar la idea de alineación o alianza con Nicanor, aunque el complemento adverbial intensifica la imagen de movimiento colectivo.
- source_word: ἀγεληδὸν
  english_pob_choice: in droves
  chosen_spanish: en tropel
  alternatives_spanish:
  - en manadas
  - en grupos
  - en masa
  lexicon: LSJ
  rationale: El adverbio tiene un sentido vívido de movimiento en rebaños o grupos compactos. «En tropel» conserva el tono despectivo y el impulso colectivo en un español natural.
- source_word: τῷ Νικάνορι
  english_pob_choice: to Nicanor
  chosen_spanish: con Nicanor
  alternatives_spanish:
  - a Nicanor
  - junto a Nicanor
  lexicon: LSJ
  rationale: El dativo con συνέμιγνυν puede reflejar compañía o alineación. «Con Nicanor» transmite la unión de bando sin forzar una direccionalidad que el español requeriría explicar más.
- source_word: ἀτυχίας
  english_pob_choice: misfortunes
  chosen_spanish: desgracias
  alternatives_spanish:
  - desdichas
  - infortunios
  - desventuras
  lexicon: LSJ
  rationale: ἀτυχία denota mala suerte o desgracia. «Desgracias» es claro y se empareja bien con el segundo sustantivo, manteniendo la acumulación retórica.
- source_word: συμφοράς
  english_pob_choice: disasters
  chosen_spanish: calamidades
  alternatives_spanish:
  - desastres
  - ruinas
  - aflicciones
  lexicon: LSJ
  rationale: συμφορά suele referirse a un infortunio grave o calamidad. «Calamidades» conserva fuerza sin sonar excesivamente moderno o sensacionalista.
- source_word: ἰδίας εὐημερίας
  english_pob_choice: their own prosperity
  chosen_spanish: su propia prosperidad
  alternatives_spanish:
  - su propio bienestar
  - su propio éxito
  lexicon: LSJ
  rationale: εὐημερία significa prosperidad o buen estado. «Su propia prosperidad» conserva el contraste y la intención egoísta del pasaje.
- source_word: δοκοῦντες ἔσεσθαι
  english_pob_choice: thinking that ... would become
  chosen_spanish: pensando que ... llegarían a ser
  alternatives_spanish:
  - suponiendo que ... serían
  - imaginando que ... se convertirían en
  lexicon: LSJ
  rationale: La combinación de participio y futuro infinitivo expresa expectativa o suposición acerca de un resultado futuro. «Llegarían a ser» conserva bien esa proyección sin perder naturalidad.
theological_decisions:
- issue: ἔθνη en un contexto judío-histórico
  english_pob_reading: from among the nations
  chosen_spanish_reading: las naciones
  alternative_spanish_readings:
  - los gentiles
  - entre las naciones
  rationale: El contexto admite el matiz de «gentiles», pero aquí el énfasis principal recae en la alianza oportunista con Nicanor. «Las naciones» mantiene la amplitud del término griego sin imponer una interpretación más estrecha.
  doctrine_reference: Primacía del texto original y preservación de ambigüedad léxica cuando el contexto no obliga a una sola opción.
translation_notes:
  revision_awareness: La redacción sigue de cerca la revisión inglesa más reciente, que ajustó el sujeto implícito a «los de Judea que habían expulsado a Judas». Se preserva también la imagen colectiva de ἔθνη συνέμιγνυν mediante una construcción española que mantiene tanto la alianza con Nicanor como la ambigüedad de ἔθνη.
  spanish_consistency_notes:
  - Se usa «Judas» para Ἰούδαν y «Nicanor» para τῷ Νικάνορι, sin formas tradicionales alternativas.
  - Se eligió «expulsaron» para φυγαδεύω por su fuerza causativa, evitando suavizar el verbo a «huir».
  - «Desgracias» y «calamidades» conservan el paralelismo de ἀτυχίας y συμφοράς sin fusionarlos en un solo término.
  - La nota textual/lexical conserva la ambigüedad de ἔθνη, siguiendo el tratamiento abierto del POB en inglés.
