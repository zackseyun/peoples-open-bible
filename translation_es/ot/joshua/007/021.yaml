  to: Y vi entre el botín un manto hermoso[a] de Sinar, doscientos siclos de plata y una barra[b] de oro que pesaba cincuenta siclos. Los codicié y los tomé; y he aquí, están escondidos en la tierra, dentro de mi tienda[c], y la plata debajo de ella[d].
