translation:
  language: es
  text: 'Así el rey de Asiria conducirá a los cautivos de Egipto y a los desterrados de Cush, jóvenes y ancianos, desnudos y descalzos, con las nalgas descubiertas[a]: la desnudez de Egipto[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con las nalgas al descubierto». El hebreo es deliberadamente gráfico y enfatiza la humillación pública del exilio.
    reason: lexical_alternative
  - marker: b
    text: O «la vergüenza de Egipto». El hebreo dice literalmente «la desnudez de Egipto», preservando la imagen de exposición pública y deshonra.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִנְהַג
  english_pob_choice: will lead away
  chosen_spanish: se llevará
  alternatives_spanish:
  - los conducirá
  - los llevará
  lexicon: HALOT
  rationale: En este contexto de deportación, נהג expresa mover a la fuerza a personas derrotadas. «Se llevará» comunica bien la acción de trasladar cautivos sin sonar forzado en español, y conserva la idea de compulsión implícita en el contexto.
- source_word: שְׁבִי
  english_pob_choice: captives
  chosen_spanish: cautivos
  alternatives_spanish:
  - prisioneros
  - cautiverio
  lexicon: HALOT
  rationale: El sustantivo designa a los tomados como presa de guerra. «Cautivos» mantiene el valor personal y concuerda con el paralelo de «desterrados».
- source_word: גָּלוּת
  english_pob_choice: exiles
  chosen_spanish: desterrados
  alternatives_spanish:
  - exiliados
  - los del destierro
  lexicon: HALOT
  rationale: Aquí el término se refiere a personas llevadas al exilio. «Desterrados» preserva la idea de expulsión/deportación y funciona naturalmente junto a «cautivos».
- source_word: כּוּשׁ
  english_pob_choice: Cush
  chosen_spanish: Cush
  alternatives_spanish:
  - Etiopía
  lexicon: HALOT
  rationale: Se conserva la transliteración tradicional del nombre geográfico para no sustituirlo por una etiqueta moderna potencialmente equívoca.
- source_word: נְעָרִים וּזְקֵנִים
  english_pob_choice: young and old
  chosen_spanish: jóvenes y ancianos
  alternatives_spanish:
  - los jóvenes y los viejos
  - jóvenes y viejos
  lexicon: HALOT
  rationale: La pareja idiomática abarca toda la población por edad. «Jóvenes y ancianos» es natural en español y mantiene el contraste totalizante.
- source_word: עָרוֹם וְיָחֵף
  english_pob_choice: naked and barefoot
  chosen_spanish: desnudos y descalzos
  alternatives_spanish:
  - desnudos y sin sandalias
  - despojados y descalzos
  lexicon: HALOT
  rationale: El hebreo describe una humillación pública mediante desnudez y falta de calzado. «Desnudos y descalzos» es la equivalencia más transparente y idiomática.
- source_word: חֲשׂוּפַי שֵׁת
  english_pob_choice: with buttocks uncovered
  chosen_spanish: con las nalgas descubiertas
  alternatives_spanish:
  - con el trasero descubierto
  - con los glúteos descubiertos
  lexicon: HALOT
  rationale: שֵׁת alude a la parte trasera del cuerpo; el giro es deliberadamente gráfico. «Nalgas» expresa bien la exposición vergonzosa en español contemporáneo sin suavizar el impacto.
- source_word: עֶרְוַת מִצְרָיִם
  english_pob_choice: the nakedness of Egypt
  chosen_spanish: la desnudez de Egipto
  alternatives_spanish:
  - la vergüenza de Egipto
  - la desnudez pública de Egipto
  lexicon: HALOT
  rationale: Se conserva el sustantivo «desnudez» para mantener el vínculo lexical con la imagen anterior y la resonancia de exposición/humillación. «Vergüenza» sería interpretativo; aquí se preserva la metáfora corporal del hebreo.
- source_word: כֵּן
  english_pob_choice: so
  chosen_spanish: Así
  alternatives_spanish:
  - De esta manera
  - Por eso
  lexicon: HALOT
  rationale: Introduce el cumplimiento del acto simbólico. «Así» mantiene la conexión inferencial con lo que sigue y es fluido al inicio de la cláusula.
translation_notes:
  revision_awareness: El texto inglés auditado se mantiene sin cambios de revisión relevantes; se sigue la lectura estable del pasaje y sus notas léxicas principales, especialmente la imagen humillante de la deportación y la preservación de «Cush».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se usa «Cush» por transliteración consistente con el aparato inglés.
  - «Desnudos y descalzos» conserva la sencillez del paralelismo hebreo sin añadir explicaciones al cuerpo del verso.
  - La nota sobre «nalgas descubiertas» recoge la alternativa gráfica preservada en el inglés audit trail.
