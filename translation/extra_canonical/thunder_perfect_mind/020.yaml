translation:
  text: Why[a], you who hate me, do you love me, and hate those who love me? You who
    deny me, confess me[b], and you who confess me, deny me[e][d][c]. You who say—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The opening “Concerning those who hate me” construes ⲉⲧⲃⲉ as topical; ⲡⲁⲣⲁⲛ
      is likely a carryover from the previous line and is not translated here due
      to uncertainty.
    reason: alignment_note
  - marker: b
    text: “Confess” translates ϩⲟⲙⲟⲗⲟⲅⲉⲓ (Gk. ὁμολογέω); “acknowledge” or “profess”
      are possible alternatives.
    reason: lexical_alternative
  - marker: c
    text: “Deny” renders ⲁⲣⲛⲁ; “disown” or “renounce” could also fit depending on
      register.
    reason: lexical_alternative
  - marker: d
    text: 'Or ''Concerning those who hate me[a]: you know me, and you hate those who
      know me.''.'
    reason: previous_rendering
  - marker: e
    text: Or 'Those who deny me confess me, and those who confess me deny me. Those
      who say—'.
    reason: previous_rendering
lexical_decisions:
- source_word: ⲉⲧⲃⲉ
  chosen: concerning
  alternatives:
  - because of
  - about
  lexicon: Crum 695b; Layton §226
  rationale: 'In this discourse-initial position, ⲉⲧⲃⲉ commonly marks topic or cause.
    Here it introduces a topic: “concerning those who hate me.”'
- source_word: ⲙⲟⲥⲧⲉ
  chosen: hate
  alternatives:
  - detest
  - abhor
  lexicon: Crum 195a
  rationale: Basic verb for hatred; stronger options like “abhor” were considered
    but would overcolor the tone.
- source_word: ⲧⲉⲧⲛ̄ⲙⲉ
  chosen: you know
  alternatives:
  - you recognize
  - you perceive
  lexicon: Crum 205b (ⲙⲉ)
  rationale: ⲙⲉ is the common verb “to know.” The 2pl subject ⲧⲉⲧⲛ̄- is preserved
    as second-person plural “you.”
- source_word: ⲛⲉⲧⲙⲉ
  chosen: those who know
  alternatives:
  - the ones who know
  - knowers
  lexicon: Layton §188
  rationale: ⲛⲉⲧ- relative with participle renders naturally as “those who …” to maintain
    formulaic cadence.
- source_word: ⲁⲣⲛⲁ
  chosen: deny
  alternatives:
  - disown
  - renounce
  lexicon: Crum 19b
  rationale: Standard rendering; “disown/renounce” are possible but slightly shift
    the rhetorical register.
- source_word: ϩⲟⲙⲟⲗⲟⲅⲉⲓ
  chosen: confess
  alternatives:
  - acknowledge
  - profess
  lexicon: Loan from Gk. ὁμολογέω; Crum 710a
  rationale: “Confess” is the established gloss for ὁμολογέω in Coptic contexts; “acknowledge”
    is a softer alternative.
- source_word: ⲛⲉⲧϫⲉ
  chosen: those who say
  alternatives:
  - those who speak
  - who say
  lexicon: Crum 596b (ϫⲉ)
  rationale: Relative + verb of saying; left as a fragment to reflect the truncated
    line.
- source_word: ⲁⲩⲱ
  chosen: and
  alternatives:
  - and also
  - even
  lexicon: Crum 15b
  rationale: Simple connective; preserves the additive cadence of the source.
parallelism_check: 'The block exhibits deliberate chiastic reversal: “Those who deny
  me confess me / and those who confess me deny me.” The paired verbs swap positions
  across the cola, creating an AB / BA mirroring that intensifies the paradox. The
  preceding colon-line (“you know me, and you hate those who know me”) sets up a pattern
  of self-reference and relational inversion, sustaining the discourse’s antithetical
  rhythm.'
voice_check: The speaker’s first-person voice remains explicit via repeated “me” as
  object, with direct second-person plural address (“you know… you hate…”). No smoothing
  of the paradoxical pairs was introduced; the accusatory tone and apophatic tension
  are preserved. The fragmentary close (“Those who say—”) is retained to keep the
  oracular immediacy and strangeness.
alignment_risk_note: Alignment confidence is only medium and the consult English for
  block 15 (“I am the silence…”) does not match the Coptic here. I translated the
  visible Coptic lines directly, without forcing them into the consult phrasing. The
  initial element ⲡⲁⲣⲁⲛ is uncertain (likely tail from the previous line), and I construed
  ⲉⲧⲃⲉ ⲟⲩ ⲛⲉⲧⲙⲟⲥⲧⲉ ⲙ̄[ⲙⲟⲉⲓ] as a topical “Concerning those who hate me.” The final
  ⲛⲉⲧϫⲉ is clearly truncated; the translation leaves it as a fragment rather than
  guessing the completion.
