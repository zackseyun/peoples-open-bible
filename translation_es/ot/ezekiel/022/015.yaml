review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja correctamente la estructura hebrea de juicio y exilio: dos verbos paralelos de dispersión entre las naciones/por las tierras, seguidos por la remoción de la impureza. Sin embargo, la nota al pie no preserva la alternativa léxica documentada en el POB inglés para la cláusula final y en cambio comenta innecesariamente una expresión ya usada en el texto. Además, «purgaré tu impureza de ti» es comprensible pero poco natural en español bíblico fluido; conviene una formulación más idiomática que siga expresando remoción desde la destinataria.'
  spanish_quality_summary: El español es generalmente claro y digno. «Te dispersaré… te esparciré» funciona bien para el paralelismo. «Por las tierras» es aceptable. La principal debilidad de estilo está en «purgaré tu impureza de ti», que suena calcado; «quitaré de ti tu impureza» o «purgaré de ti tu impureza» leen mejor. También la nota actual es redundante y no aporta una verdadera alternativa útil al lector.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Naciones», «impureza» y el registro general son adecuados. La elección de «purgaré» concuerda con la decisión inglesa, pero debe ajustarse sintácticamente en español y acompañarse de la nota léxica pertinente sobre posibles alternativas («quitar», «poner fin»/«defilement»).
  issues:
  - severity: medium
    issue: La nota al pie está mal orientada
    rationale: El POB inglés anota la cláusula final («purge your uncleanness from you») con alternativas léxicas; la nota española actual repite «por las tierras», que ya está en el texto y no añade una alternativa sustancial.
  - severity: medium
    issue: La cláusula final suena calcada en español
    rationale: «Purgaré tu impureza de ti» reproduce la sintaxis fuente/inglesa de forma poco natural. En español bíblico claro, «purgaré de ti tu impureza» o «quitaré de ti tu impureza» preserva mejor el sentido.
  - severity: low
    issue: La nota actual usa una fórmula de alternativa impropia
    rationale: Decir «O “por las tierras”» cuando eso mismo aparece en el texto no cumple la función de nota de alternativa léxica.
  revised_spanish_text: Te dispersaré entre las naciones y te esparciré por las tierras, y purgaré de ti tu impureza[a].
  revised_footnotes:
  - marker: a
    text: O «quitaré de ti tu impureza» o «pondré fin a tu contaminación en ti».
    reason: lexical_alternative
  revision_rationale: Se conserva la traducción base y el paralelismo hebreo, pero se corrige la sintaxis final para un español más natural y se sustituye la nota por una que refleje las alternativas léxicas documentadas para וַהֲתִמֹּתִי טֻמְאָתֵךְ מִמֵּךְ.
