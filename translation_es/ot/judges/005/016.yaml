  revision_rationale: Se cambió 'Entre las divisiones de Rubén' por 'Porque en las divisiones de Rubén' para alinearlo con la revisión auditada de la POB inglesa y evitar un matiz meramente espacial. Se sustituyó 'investigaciones del corazón' por 'reflexiones del corazón' para conservar la idea de deliberación interior en un español más natural y poético. La nota se reescribió para reflejar la alternativa completa de la cláusula final y preservar la ambigüedad léxica de פְּלַגּוֹת.
