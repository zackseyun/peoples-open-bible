review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: condicional poético, contraste cielo/Seol, y afirmación de la presencia divina en ambos extremos. También preserva correctamente la transliteración de שְׁאוֹל como «Seol». Sin embargo, añade una nota innecesaria sobre «cielo» en un lugar donde la auditoría inglesa no pidió nota, y la sintaxis española puede ajustarse para sonar más natural sin perder la fuerza poética.'
  spanish_quality_summary: El español es claro y digno, pero «ascendiera» suena algo más literario-condicional que el paralelo más natural «subiera», y «he aquí, allí estás tú» resulta algo pesado en español contemporáneo eclesial. «Mira, allí estás tú» sería demasiado coloquial; conviene conservar una formulación solemne pero más fluida. También es preferible evitar una nota al pie no motivada por una ambigüedad real en español.
  glossary_alignment: 'Buena alineación con la terminología del proyecto: «Seol» está bien conservado y explicado; no hay conflicto con Yahvé/Mesías/etc. La decisión de mantener «allí estás tú» preserva el énfasis personal. La única corrección de alineación es retirar la nota de «cielo», ya que la decisión principal ya es «cielo» y la alternativa «los cielos» no necesita nota aquí.'
  issues:
  - severity: medium
    issue: Nota al pie [a] sobre «cielo» innecesaria y no sustentada por la auditoría inglesa
    rationale: El inglés no conserva una nota para «heaven»; la pluralidad morfológica hebrea no genera una ambigüedad que exija nota en español en este contexto poético.
  - severity: low
    issue: «Ascendiera» es aceptable pero menos natural que «subiera» en esta línea
    rationale: Ambas son fieles, pero «subiera al cielo» suena más idiomático en español bíblico moderno, sin perder la imaginería vertical.
  - severity: low
    issue: «He aquí, allí estás tú» suena algo rígido
    rationale: Puede mantenerse la fuerza de הִנֶּךָּ con una formulación más natural como «allí, mira, estás tú» o, mejor, «mira, allí estás tú»; sin embargo, para conservar dignidad y cercanía a la auditoría, «he aquí, allí estás tú» puede simplificarse a «allí estás tú» solo si no se pierde demasiado énfasis. Una opción intermedia más elegante es «allí estás tú» con la nota enfocada en Seol. No obstante, dado que el inglés sí preserva el matiz enfático, conviene mantener un equivalente solemne breve.
  revised_spanish_text: Si yo subiera al cielo, allí estás tú; y si tendiera mi lecho en el Seol[a], he aquí, allí estás tú.
  revised_footnotes:
