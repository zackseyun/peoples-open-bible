translation:
  language: es
  text: Y tu esclava no comió en la mesa de Amán[a], y no honré el banquete del rey, ni bebí el vino de las libaciones[b];
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tu servidora». El griego usa δούλη, femenino de «esclavo», con un matiz más fuerte de subordinación.
    reason: lexical_alternative
  - marker: b
    text: Es decir, vino asociado con libaciones u ofrendas líquidas, no simplemente vino ordinario.
    reason: cultural_note
lexical_decisions:
- source_word: ἡ δούλη σου
  english_pob_choice: your slave
  chosen_spanish: tu esclava
  alternatives_spanish:
  - tu servidora
  - tu sierva
  lexicon: LSJ
  rationale: δούλη es el femenino de δοῦλος y conserva la idea de subordinación fuerte. En español, «esclava» mantiene esa fuerza mejor que «sierva» o «servidora», en coherencia con la decisión POB de preservar el matiz de vínculo sometido cuando es relevante.
- source_word: ἔφαγεν
  english_pob_choice: did not eat
  chosen_spanish: no comió
  alternatives_spanish:
  - no participó de la comida
  - no probó
  lexicon: LSJ
  rationale: El aoristo negado se rinde de forma directa y natural con «no comió», sin añadir matices que el griego no exige.
- source_word: τράπεζαν Ἁμάν
  english_pob_choice: at Haman’s table
  chosen_spanish: en la mesa de Amán
  alternatives_spanish:
  - de la mesa de Amán
  - en el banquete de Amán
  lexicon: LSJ
  rationale: τράπεζα es literalmente «mesa»; en español, «comió en la mesa de» comunica la imagen de participación en una comida concreta sin perder el sentido concreto del texto.
- source_word: ἐδόξασα
  english_pob_choice: did not honor
  chosen_spanish: no honré
  alternatives_spanish:
  - no glorifiqué
  - no celebré
  lexicon: LSJ
  rationale: δοξάζω puede significar «honrar» o «glorificar». Aquí el objeto es «el banquete del rey», por lo que «honré» expresa adecuadamente la valoración/celebración sin introducir un lenguaje excesivamente teológico.
- source_word: συμπόσιον βασιλέως
  english_pob_choice: the king’s banquet
  chosen_spanish: el banquete del rey
  alternatives_spanish:
  - la fiesta del rey
  - el festín del rey
  lexicon: LSJ
  rationale: «Banquete» reproduce bien el registro formal de συμπόσιον y es una equivalencia natural en español.
- source_word: οἶνον σπονδῶν
  english_pob_choice: the wine of libations
  chosen_spanish: el vino de las libaciones
  alternatives_spanish:
  - vino de ofrendas líquidas
  - vino de libación
  lexicon: LSJ
  rationale: σπονδαί se refiere a libaciones/ofrendas líquidas. «El vino de las libaciones» conserva el valor cultual del sintagma y evita reducirlo a vino común.
theological_decisions:
- issue: Fuerza de la auto-designación servil de Esther
  english_pob_reading: your slave
  chosen_spanish_reading: tu esclava
  alternative_spanish_readings:
  - tu servidora
  - tu sierva
  rationale: La auto-referencia de Esther expresa humillación reverente ante Dios. «Esclava» preserva la intensidad semántica de δούλη y evita suavizarla indebidamente con una forma más débil.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for δοῦλος; Translation philosophy §1'
- issue: Sentido cultual de οἶνον σπονδῶν
  english_pob_reading: the wine of libations
  chosen_spanish_reading: el vino de las libaciones
  alternative_spanish_readings:
  - vino de libación
  - vino de ofrendas líquidas
  rationale: La frase conserva la posible referencia a vino vinculado con una práctica cultual. La traducción mantiene esa tensión sin explicarla en el cuerpo del versículo.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el historial de revisión: la oscilación entre «esclava» y «sirvienta/servidora» en el auditrail inglés. Se optó por «esclava» para reflejar con mayor precisión la fuerza de δούλη, tal como lo restituye la corrección regresiva y según la política léxica del proyecto. También se conservó la distinción cultual de οἶνον σπονδῶν como «vino de las libaciones».'
  spanish_consistency_notes:
  - Se mantuvo la primera persona singular en la segunda cláusula («no honré», «no bebí»), acorde con el griego.
  - Se preservó la coordinación negativa con «y... y... ni...», equivalente natural del griego καὶ... καὶ... οὐδὲ...
  - Se usó «Amán» y «rey» en forma sobria y pública, sin añadir aclaraciones interpretativas en el texto principal.
  - Se eligió «libaciones» como término técnico español ampliamente inteligible en contexto bíblico y cultual.
