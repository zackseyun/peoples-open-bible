translation:
  language: es
  text: Estos son los registros[a] del tabernáculo, el tabernáculo del testimonio[b], según fueron registrados por mandato de Moisés, mediante el servicio de los levitas, bajo la dirección[c] de Itamar hijo de Aarón el sacerdote.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'inventario' o 'cuentas' del tabernáculo; el término hebreo se refiere a un recuento oficial.
    reason: lexical_alternative
  - marker: b
    text: El 'testimonio' probablemente alude al testimonio del pacto, especialmente a las tablas colocadas en el arca.
    reason: cultural_note
  - marker: c
    text: Literalmente, 'por la mano de Itamar', un modismo de agencia o supervisión.
    reason: lexical_alternative
lexical_decisions:
- source_word: פְקוּדֵי
  english_pob_choice: records
  chosen_spanish: registros
  alternatives_spanish:
  - inventario
  - cuentas
  - recuento
  lexicon: HALOT
  rationale: El sustantivo nominal de פקד aquí señala un cómputo o rendición administrativa de materiales. 'Registros' comunica un asiento oficial sin sonar tan técnico o arcaico como 'recuento' ni tan restringido como 'inventario'.
- source_word: הַמִּשְׁכָּן
  english_pob_choice: the tabernacle
  chosen_spanish: el tabernáculo
  alternatives_spanish:
  - la morada
  - la tienda sagrada
  lexicon: HALOT
  rationale: En este contexto cultual de Éxodo, מִשְׁכָּן nombra la estructura sagrada. 'Tabernáculo' es el equivalente establecido y fiel en español.
- source_word: מִשְׁכַּן הָעֵדֻת
  english_pob_choice: the tabernacle of the testimony
  chosen_spanish: el tabernáculo del testimonio
  alternatives_spanish:
  - el tabernáculo del pacto
  - la morada del testimonio
  lexicon: HALOT
  rationale: Se conserva 'testimonio' para no forzar en el texto principal una interpretación explícita como 'pacto'. La repetición appositiva identifica el tabernáculo asociado con el testimonio depositado allí.
- source_word: פֻּקַּד
  english_pob_choice: were recorded
  chosen_spanish: fueron registrados
  alternatives_spanish:
  - fueron contados
  - fueron inventariados
  - fue registrado
  lexicon: HALOT
  rationale: El pasivo de פקד mantiene el campo semántico del conteo/registro oficial. 'Fueron registrados' suena natural en español y conserva la idea administrativa del original.
- source_word: עַל פִּי מֹשֶׁה
  english_pob_choice: at the command of Moses
  chosen_spanish: conforme al mandato de Moisés
  alternatives_spanish:
  - según la boca de Moisés
  - por la orden de Moisés
  lexicon: HALOT
  rationale: La expresión idiomática עַל־פִּי comunica autoridad normativa. 'Conforme al mandato de Moisés' preserva ese valor de autorización sin calco forzado.
- source_word: עֲבֹדַת הַלְוִיִּם
  english_pob_choice: the service of the Levites
  chosen_spanish: por el servicio de los levitas
  alternatives_spanish:
  - por el trabajo de los levitas
  - mediante el servicio de los levitas
  lexicon: HALOT
  rationale: עֲבֹדָה en contexto tabernacular apunta a una labor asignada dentro del culto. 'Servicio' conserva el matiz funcional y evita introducir lenguaje eclesiástico posterior.
- source_word: בְּיַד אִיתָמָר
  english_pob_choice: under the direction of Ithamar
  chosen_spanish: bajo la dirección de Itamar
  alternatives_spanish:
  - por mano de Itamar
  - bajo la mano de Itamar
  - por la supervisión de Itamar
  lexicon: HALOT
  rationale: La expresión literal 'por la mano de' funciona idiomáticamente como agencia o supervisión. 'Bajo la dirección de' expresa con claridad el sentido administrativo y rector.
- source_word: הַכֹּהֵן
  english_pob_choice: the priest
  chosen_spanish: el sacerdote
  alternatives_spanish:
  - el sacerdote
  - el ministro sacerdotal
  lexicon: HALOT
  rationale: Para Aaron, el título כהן se traduce de forma directa y comprensible como 'sacerdote'. Se evita una sustitución más interpretativa.
translation_notes:
  revision_awareness: El texto inglés auditado fue revisado para insertar 'by' antes de 'the service of the Levites', reflejando mejor el valor instrumental de la frase hebrea. En español, ese matiz se expresa con 'por el servicio de los levitas', manteniendo la relación instrumental sin calcar la sintaxis inglesa.
  spanish_consistency_notes:
  - Se mantiene 'tabernáculo' para מִשְׁכָּן, conforme al uso bíblico estándar y a la tradición del proyecto.
  - Se conserva 'Yahvé' en otros pasajes del proyecto, pero este versículo no contiene el nombre divino.
  - '''Testimonio'' se deja sin expandir a ''pacto'' en el cuerpo del versículo para preservar la tensión lexical documentada.'
  - '''Sacerdote'' se usa para הַכֹּהֵן como título identificador de Aarón, sin añadir mayúsculas rituales no requeridas.'
