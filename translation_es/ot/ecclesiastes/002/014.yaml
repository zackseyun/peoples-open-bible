translation:
  language: es
  text: El sabio tiene los ojos en su cabeza, pero el necio anda en tinieblas. Pero yo también comprendí que un solo destino[a] les acontece a todos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''un solo acontecimiento les acontece a todos''. El hebreo מִקְרֶה puede referirse a lo que le sucede a alguien; según el contexto, puede traducirse como ''acontecimiento'', ''destino'' o ''suerte''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֶחָכָם
  english_pob_choice: The wise man
  chosen_spanish: el sabio
  alternatives_spanish:
  - el hombre sabio
  - la persona sabia
  - el sabio (hombre)
  lexicon: HALOT
  rationale: חָכָם designa a una persona sabia; el hebreo es masculino singular. En español, 'el sabio' conserva el contraste directo con 'el necio' sin añadir una expansión innecesaria.
- source_word: עֵינָיו בְּרֹאשׁוֹ
  english_pob_choice: has his eyes in his head
  chosen_spanish: tiene los ojos en la cabeza
  alternatives_spanish:
  - tiene los ojos en su cabeza
  - ve con claridad
  - tiene ojos en la cabeza
  lexicon: HALOT
  rationale: Se mantiene la imagen corporal concreta del hebreo. 'Tiene los ojos en la cabeza' reproduce el modismo con naturalidad suficiente en español y conserva la fuerza visual del contraste.
- source_word: וְהַכְּסִיל
  english_pob_choice: but the fool
  chosen_spanish: pero el necio
  alternatives_spanish:
  - y el necio
  - mas el necio
  - pero el insensato
  lexicon: HALOT
  rationale: כְּסִיל se traduce mejor como 'necio' en este paralelismo sapiencial. 'Pero' expresa con naturalidad la contraposición implícita en la coordinación hebrea.
- source_word: בַּחֹשֶׁךְ הוֹלֵךְ
  english_pob_choice: walks in darkness
  chosen_spanish: anda en tinieblas
  alternatives_spanish:
  - camina en tinieblas
  - anda en oscuridad
  - camina en la oscuridad
  lexicon: HALOT
  rationale: הוֹלֵךְ permite 'anda/camina'; 'anda en tinieblas' es idiomático en español bíblico y conserva la metáfora sin especificar más de lo que el hebreo dice. 'Tinieblas' preserva el registro bíblico y la ambigüedad de la oscuridad del texto.
- source_word: וְיָדַעְתִּי גַם אָ֔נִי
  english_pob_choice: Yet I also knew
  chosen_spanish: Y yo también comprendí
  alternatives_spanish:
  - Y yo también supe
  - Pero yo también comprendí
  - También yo comprendí
  lexicon: HALOT
  rationale: יָדַעְתִּי aquí expresa una conclusión reconocida; 'comprendí' comunica mejor el valor cognitivo y reflexivo que 'supe' en español. Se conserva גַם/אָ֔נִי con 'yo también'.
- source_word: שֶׁמִּקְרֶה אֶחָד
  english_pob_choice: that one fate
  chosen_spanish: que un solo destino
  alternatives_spanish:
  - que un mismo destino
  - que un solo acontecimiento
  - que una misma suerte
  lexicon: HALOT
  rationale: מִקְרֶה en Eclesiastés puede referirse a lo que acontece a una persona; 'destino' comunica bien ese alcance en español sin cerrar la polisemia a un mero 'acontecimiento'. 'Un solo' conserva אֶחָד.
- source_word: יִקְרֶה אֶת כֻּלָּם
  english_pob_choice: happens to them all
  chosen_spanish: les acontece a todos
  alternatives_spanish:
  - les sucede a todos
  - les ocurre a todos
  - les acontece a todos ellos
  lexicon: HALOT
  rationale: קרה se vierte con 'acontecer' para mantener un tono bíblico sobrio y preciso. 'A todos' conserva el alcance universal de כֻּלָּם.
theological_decisions:
- issue: 'מִקְרֶה en Qohelet: ''destino'' frente a ''acontecimiento'''
  english_pob_reading: one fate happens to them all
  chosen_spanish_reading: un solo destino les acontece a todos
  alternative_spanish_readings:
  - un solo acontecimiento les acontece a todos
  - una misma suerte les sucede a todos
  rationale: El contexto sapiencial de Eclesiastés 2:14 apunta a una realidad compartida y niveladora; 'destino' recoge bien esa fuerza en español. Aun así, la formulación mantiene suficiente abertura para no borrar la polisemia de מִקְרֶה, que también puede ser 'acontecimiento'.
  doctrine_reference: Eclesiastés 2:14; sabiduría hebrea sobre la común condición humana
- issue: Tinieblas como imagen de carencia de discernimiento
  english_pob_reading: walks in darkness
  chosen_spanish_reading: anda en tinieblas
  alternative_spanish_readings:
  - anda en oscuridad
  - camina en tinieblas
  - camina en la oscuridad
  rationale: No se especifica si las tinieblas son morales, intelectuales o circunstanciales. 'Tinieblas' preserva la ambigüedad del hebreo y el contraste sapiencial sin interpretarlo en exceso.
  doctrine_reference: Eclesiastés 2:14; paralelismo sapiencial
translation_notes:
  revision_awareness: Se siguió el texto hebreo WLC directamente y se cotejó con el audit trail inglés. La versión inglesa no requirió revisiones sustantivas; la redacción española conserva la misma relación semántica, incluyendo el modismo corporal y la ambigüedad de מִקְרֶה.
  spanish_consistency_notes:
  - Se usa 'sabio' / 'necio' de manera consistente para el paralelismo sapiencial.
  - Se mantiene 'tinieblas' en lugar de 'oscuridad' por registro bíblico y por fidelidad a la imagen del hebreo.
  - '''Destino'' se eligió como equivalente principal de מִקְרֶה por el peso contextual, pero la nota preserva la alternativa ''acontecimiento''.'
  - Se evitó 'SEÑOR' o equivalentes de sustitución, pues el versículo no contiene el Tetragrámaton.
