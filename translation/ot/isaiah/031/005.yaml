id: ISA.31.5
reference: Isaiah 31:5
source:
  edition: WLC
  text: כְּ/צִפֳּרִ֣ים עָפ֔וֹת כֵּ֗ן יָגֵ֛ן יְהוָ֥ה צְבָא֖וֹת עַל יְרֽוּשָׁלִָ֑ם גָּנ֥וֹן וְ/הִצִּ֖יל פָּסֹ֥חַ וְ/הִמְלִֽיט־׃
translation:
  text: Like birds hovering[a], so Yahweh of Armies will shield Jerusalem—shielding and delivering, passing over and rescuing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'sparing' or 'protecting'; the Hebrew verb also echoes the Passover language of Exodus.
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּ/צִפֳּרִים
  chosen: Like birds
  alternatives:
  - Like birds in flight
  - As birds
  lexicon: HALOT
  rationale: צִפֳּרִים is the common plural for birds. The prefixed כ marks comparison, so 'Like birds' is the most natural English opening.
- source_word: עָפוֹת
  chosen: hovering
  alternatives:
  - flying
  - fluttering
  lexicon: HALOT
  rationale: From עוּף, literally 'flying.' In this simile, 'hovering' better captures the protective image of birds over a nest or young, fitting the context of divine protection without straying far from the literal sense.
- source_word: יָגֵן
  chosen: will shield
  alternatives:
  - will protect
  - will defend
  lexicon: HALOT
  rationale: From גנן, 'to cover/protect/defend.' 'Shield' preserves the concrete protective force and pairs well with the repeated infinitive/participle-like form גָּנוֹן.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: צְבָאוֹת
  chosen: of Armies
  alternatives:
  - of hosts
  lexicon: HALOT
  rationale: צְבָאוֹת literally denotes armies/hosts. 'Of Armies' is more transparent modern English than the traditional 'of hosts' while preserving the martial and heavenly connotations.
- source_word: עַל יְרוּשָׁלִָם
  lemma: עַל
  chosen: Jerusalem
  alternatives:
  - over Jerusalem
  lexicon: HALOT
  rationale: The preposition עַל can mean 'over/upon' as well as indicate relation toward an object. In English, 'shield Jerusalem' is idiomatic and already implies protective action over the city; the simile and following participles preserve the spatial sense.
- source_word: גָּנוֹן
  chosen: shielding
  alternatives:
  - protecting
  - defending
  lexicon: HALOT
  rationale: This cognate form from גנן intensifies or reiterates the main verb. Rendering it as 'shielding' preserves the repetition and rhetorical emphasis rather than collapsing it into a single English verb.
- source_word: וְ/הִצִּיל
  chosen: and delivering
  alternatives:
  - and he will deliver
  - and saving
  lexicon: HALOT
  rationale: From נצל, 'to deliver/rescue.' The Hebrew strings together verbal forms in a compact sequence; using the English participial style ('shielding and delivering') reflects the rhythm and connection to גָּנוֹן.
- source_word: פָּסֹחַ
  chosen: passing over
  alternatives:
  - sparing
  - protecting
  lexicon: HALOT
  rationale: From פסח. The most transparent rendering is 'passing over,' which preserves the likely Passover echo. Because the term can also carry the sense of sparing/protecting in context, that alternative is preserved in a footnote.
- source_word: וְ/הִמְלִיט
  chosen: and rescuing
  alternatives:
  - and causing to escape
  - and delivering safely
  lexicon: HALOT
  rationale: From מלט, 'to let escape, rescue, deliver.' 'Rescuing' is concise, natural English and distinct enough from the earlier נצל ('delivering') to preserve the Hebrew's verbal variety.
