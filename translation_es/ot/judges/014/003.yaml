base_translation:
  language: en
  yaml_path: translation/ot/judges/014/003.yaml
  text: But his father and his mother said to him[a], “Is there not a woman among the daughters of your brothers or among all my people, that you are going to take a wife from the uncircumcised Philistines?” But Samson said to his father, “Get her for me[b], for she is right in my eyes.”
  footnotes:
  - marker: a
    text: Or, “she is pleasing in my eyes” or “she seems right to me.” The Hebrew idiom can express personal approval or attractiveness; the main text preserves the wording that echoes a recurring theme in Judges.
    reason: lexical_alternative
  - marker: b
    text: “The daughters of your brothers” likely refers broadly to women from Samson’s kin group or people, not only to the literal daughters of his immediate brothers.
    reason: cultural_note
