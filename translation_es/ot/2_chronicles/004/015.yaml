translation:
  language: es
  text: el Mar[a], uno, y los doce bueyes debajo de él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "la pileta llamada el Mar, uno, y los doce bueyes debajo de ella".'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַיָּם
  english_pob_choice: the Sea
  chosen_spanish: el Mar
  alternatives_spanish:
  - la fuente
  - la pileta
  - el estanque
  lexicon: HALOT
  rationale: En este contexto de ajuar del templo, יָם no se refiere al mar común sino al gran recipiente de metal conocido como el "Mar". En español, "Mar" con mayúscula conserva ese nombre propio tradicional y la transparencia del objeto técnico.
- source_word: אֶחָד
  english_pob_choice: one
  chosen_spanish: uno
  alternatives_spanish:
  - único
  - un solo
  lexicon: HALOT
  rationale: El numeral modifica directamente al sustantivo y en inventarios cultuales conviene conservar el valor contable simple. En español, "uno"/"el" se integra naturalmente con el sustantivo en este tipo de enumeración.
- source_word: הַבָּקָר
  english_pob_choice: oxen
  chosen_spanish: bueyes
  alternatives_spanish:
  - toros
  - ganado
  lexicon: HALOT
  rationale: בָּקָר es un colectivo de bovinos, pero aquí designa las figuras que sostenían el Mar. "Bueyes" es una equivalencia idiomática clara en español bíblico para estos soportes animales, sin perder la imagen.
- source_word: שְׁנֵים עָשָׂר
  english_pob_choice: twelve
  chosen_spanish: doce
  alternatives_spanish:
  - doce en total
  lexicon: HALOT
  rationale: El compuesto numeral se vierte de manera directa y sin expansión, como corresponde a una lista de objetos.
- source_word: תַּחְתָּיו
  english_pob_choice: under it
  chosen_spanish: debajo de él
  alternatives_spanish:
  - bajo él
  - por debajo de él
  lexicon: HALOT
  rationale: El sufijo pronominal masculino singular remite al Mar. "Debajo de él" es natural en español y mantiene la relación espacial precisa.
- source_word: אֶת ... וְאֶת
  english_pob_choice: '[not separately translated; marks the direct objects]'
  chosen_spanish: '[no se traduce explícitamente; marca los complementos directos]'
  alternatives_spanish:
  - —
  lexicon: Hebrew grammar
  rationale: Como marcador de objeto directo, אֶת no tiene equivalente léxico independiente en español; se refleja en el orden sintáctico.
translation_notes:
  revision_awareness: 'Coincide con la lectura estable del texto hebreo y con el criterio auditado en inglés: mantener el nombre técnico del gran recipiente como "Mar" y conservar la enumeración simple de los soportes bovinos.'
  spanish_consistency_notes:
  - Se preserva "Mar" como nombre técnico del objeto cultual, no como mar geográfico.
  - '"Bueyes" mantiene la imagen de los soportes animales sin introducir una interpretación más específica que el hebreo no exige.'
  - El pronombre en "debajo de él" concuerda con "el Mar" en español y refleja el sufijo masculino singular del hebreo.
