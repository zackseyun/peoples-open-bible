translation:
  language: es
  text: Y Mattatías[a], Sammú, Ananías, Azarías, Urías, Ezequías y Baalsamos estaban a su derecha.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Los nombres griegos de esta lista difieren del paralelo hebreo aproximado en Nehemías 8:4, donde la lista de hombres a la derecha de Esdras no es idéntica. Como 1 Esdras se traduce a partir del testimonio griego, aquí se conservan las formas griegas.
    reason: alternative_reading
lexical_decisions:
- source_word: ἔστησεν
  english_pob_choice: stood
  chosen_spanish: se pusieron
  alternatives_spanish:
  - estuvieron
  - se colocaron
  - fueron puestos
  lexicon: LSJ
  rationale: El griego es formalmente transitivo ('puso / hizo estar'), pero en el contexto narrativo la lista de nombres y la frase posicional final favorecen en español una expresión natural de colocarse o ponerse en posición. 'Se pusieron' conserva la idea de ocupación de lugar sin forzar una pasiva mecánica.
- source_word: αὐτῷ
  english_pob_choice: his
  chosen_spanish: su
  alternatives_spanish:
  - a él
  - para él
  lexicon: LSJ
  rationale: 'El dativo se expresa de modo posesivo en español porque la relación espacial es clara: estaban a la derecha de la persona mencionada, es decir, de Ezra.'
- source_word: ἐκ δεξιῶν
  english_pob_choice: at his right hand
  chosen_spanish: a su derecha
  alternatives_spanish:
  - a la derecha de él
  - a su mano derecha
  lexicon: LSJ
  rationale: La locución griega indica posición lateral concreta. 'A su derecha' preserva el sentido espacial y es idiomático en español bíblico contemporáneo.
- source_word: Ματταθίας, Σαμμοῦ, Ἀνανίας, Ἀζαρίας, Οὐρείας, Ἐζεκίας, Βαάλσαμος
  english_pob_choice: Mattathias, Sammou, Ananias, Azarias, Ourias, Ezekias, and Baalsamos
  chosen_spanish: Mattatías, Sammú, Ananías, Azarías, Urías, Ezequías y Baalsamos
  alternatives_spanish:
  - Matatías, Samú, Ananías, Azarías, Urías, Ezequías y Baalsamos
  - Mattathias, Sammou, Ananias, Azarias, Ourias, Ezekias y Baalsamos
  lexicon: transliteración de nombres propios
  rationale: Se conservan las formas griegas del texto de 1 Esdras, como en el audit trail inglés, en vez de normalizar según el paralelo hebreo aproximado de Nehemías 8:4. Las adaptaciones mínimas siguen la ortografía española habitual para nombres bíblicos cuando no alteran la forma de base.
translation_notes:
  revision_awareness: El texto griego base coincide con la edición Swete 1909 y el control cruzado indica alto acuerdo; no se reportan revisiones aplicadas. Se mantiene la prioridad del testimonio griego frente al paralelo hebreo aproximado.
  spanish_consistency_notes:
  - Se usa 'Y' inicial como equivalente narrativo del καὶ griego, siguiendo español bíblico natural.
  - Se evita sustituir los nombres por formas del paralelo hebreo para no borrar la distinción documental entre 1 Esdras y Nehemías.
  - La frase final conserva una orientación espacial concreta ('a su derecha') sin añadir matices interpretativos.
