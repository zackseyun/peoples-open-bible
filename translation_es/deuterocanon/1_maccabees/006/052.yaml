translation:
  language: es
  text: Ellos también hicieron máquinas de asedio[a] contra sus máquinas de asedio, y combatieron durante muchos días.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «máquinas» o «máquinas de guerra». El término griego se refiere a dispositivos mecánicos usados en combate, especialmente en un contexto de asedio.
    reason: lexical_alternative
lexical_decisions:
- source_word: μηχανὰς
  english_pob_choice: engines
  chosen_spanish: máquinas
  alternatives_spanish:
  - máquinas de guerra
  - máquinas de asedio
  lexicon: LSJ
  rationale: En este contexto militar, μηχανή designa dispositivos bélicos usados en asedios. «Máquinas» conserva la amplitud del término griego y corresponde al sentido general que el POB inglés mantuvo con «engines»; «máquinas de guerra» o «máquinas de asedio» explicitan más, pero interpretan un poco más el contexto.
- source_word: πρὸς
  english_pob_choice: against
  chosen_spanish: contra
  alternatives_spanish:
  - frente a
  - para combatir a
  lexicon: LSJ
  rationale: Con acusativo y en un contexto hostil, πρὸς expresa oposición. «Contra» es la equivalencia española directa y natural en lenguaje militar.
- source_word: ἐπολέμησαν
  english_pob_choice: they fought
  chosen_spanish: combatieron
  alternatives_spanish:
  - lucharon
  - hicieron guerra
  lexicon: LSJ
  rationale: El verbo indica acción bélica y narración de combate. «Combatieron» es natural en español moderno, conserva el valor de acción militar y evita la expansión de «hicieron guerra».
- source_word: ἡμέρας πολλάς
  english_pob_choice: for many days
  chosen_spanish: durante muchos días
  alternatives_spanish:
  - por muchos días
  - muchos días
  lexicon: LSJ
  rationale: La acusativa de duración se expresa bien en español con «durante muchos días». Mantiene el valor temporal continuo del griego sin sonar forzado.
- source_word: καὶ αὐτοὶ
  english_pob_choice: they also
  chosen_spanish: Y también ellos
  alternatives_spanish:
  - También ellos
  - Ellos también
  lexicon: LSJ
  rationale: La frase marca reciprocidad o respuesta de la otra parte. «Y también ellos» conserva el matiz aditivo inicial de καὶ y la referencia enfática de αὐτοὶ sin volverlo demasiado pesado.
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés están en alto acuerdo y no muestran revisiones sustantivas; se mantiene la lectura narrativa simple sin añadir matices no sustentados.
  spanish_consistency_notes:
  - Se conserva «máquinas» para μηχανὰς, en paralelo funcional con el inglés «engines», evitando el calco técnico innecesario pero manteniendo el sentido bélico.
  - «Contra» traduce de forma estable la oposición militar de πρὸς en este contexto.
  - «Combatieron durante muchos días» refleja duración continua, en lugar de un perfecto puntual o una perífrasis interpretativa.
