theological_decisions:
- issue: Rendering the divine warrior imagery without over-systematizing theophanic language
  chosen_reading: 'Retain the concrete poetic imagery: ''He rode on a cherub and flew; he was seen on the wings of the wind.'''
  alternative_readings:
  - He rode on a cherub and flew; he was seen on the wings of the wind.
  rationale: The verse is highly poetic and depicts the LORD in theophanic imagery. The translation preserves the imagery rather than flattening it into abstraction. 'He was seen' keeps the manifestation language without forcing a more interpretive theological explanation.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
