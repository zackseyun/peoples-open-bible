translation:
  language: es
  text: Por eso se llamó al pozo Beer-lahai-roi. He aquí[a], está entre Cades y Bered.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Beer-lahai-roi probablemente significa «Pozo del Viviente que me ve», aunque el matiz exacto del nombre se discute.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל כֵּן
  english_pob_choice: Therefore
  chosen_spanish: Por eso
  alternatives_spanish:
  - Por tanto
  - Así que
  lexicon: HALOT
  rationale: La expresión introduce una conclusión causal. «Por eso» conserva la relación inferencial de manera natural en español moderno y mantiene el valor conclusivo del hebreo.
- source_word: קָרָא
  english_pob_choice: was called
  chosen_spanish: se llamó
  alternatives_spanish:
  - fue llamado
  - lo llamó
  lexicon: HALOT
  rationale: El hebreo usa una forma activa, pero en esta fórmula de nombramiento el foco está en el acto de nombrar. El pasivo/reflexivo impersonal español expresa bien esa función sin añadir un sujeto no explicitado.
- source_word: לַבְּאֵר
  english_pob_choice: the well
  chosen_spanish: a ese pozo
  alternatives_spanish:
  - al pozo
  - el pozo
  lexicon: HALOT
  rationale: En la construcción de nombramiento, el sintagma preposicional señala el objeto nombrado. En español, «a ese pozo» reproduce mejor el valor direccional/de referencia de la fórmula que un simple objeto directo.
- source_word: בְּאֵר לַחַי רֹאִי
  english_pob_choice: Beer-lahai-roi
  chosen_spanish: Beer-lahai-roi
  alternatives_spanish:
  - Pozo del Viviente que me ve
  - Pozo del Dios viviente que me ve
  lexicon: HALOT
  rationale: Se mantiene la transliteración del nombre propio en el texto principal, como en el audit trail en inglés. La posible transparencia semántica del nombre se reserva para nota, porque su matiz exacto es debatido.
- source_word: הִנֵּה
  english_pob_choice: Behold
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira, pues
  - Atiende
  lexicon: HALOT
  rationale: La partícula deíctica llama la atención del lector. «Mira» conserva esa función discursiva en español contemporáneo, evitando un arcaísmo innecesario.
- source_word: בֵין ... וּבֵין
  english_pob_choice: between ... and ...
  chosen_spanish: entre ... y ...
  alternatives_spanish:
  - entre ... y también entre ...
  lexicon: HALOT
  rationale: Es la correlación espacial normal en español, equivalente a la construcción hebrea repetida sin sobrecargar la frase.
- source_word: קָדֵשׁ
  english_pob_choice: Kadesh
  chosen_spanish: Cades
  alternatives_spanish:
  - Kadesh
  lexicon: HALOT
  rationale: Se adopta la forma castellana tradicional del topónimo, ampliamente reconocible y más natural en español bíblico que la transliteración inglesa.
- source_word: בָּרֶד
  english_pob_choice: Bered
  chosen_spanish: Bered
  alternatives_spanish:
  - Béred
  lexicon: HALOT
  rationale: Se conserva el topónimo transliterado. La acentuación puede variar en español, pero la forma breve sin tilde sigue la convención más sobria para nombres bíblicos poco asentados.
theological_decisions:
- issue: Sentido del nombre Beer-lahai-roi
  english_pob_reading: Beer-lahai-roi likely means 'Well of the Living One who sees me,' though the name's exact nuance is debated.
  chosen_spanish_reading: Beer-lahai-roi conserva en el texto su forma transliterada; su posible sentido se reconoce como «Pozo del Viviente que me ve», pero sin imponer una glosa cerrada.
  alternative_spanish_readings:
  - Pozo del Viviente que me ve
  - Pozo del que vive y me ve
  rationale: 'El nombre presenta una tensión lexical real: la referencia al «viviente» y al que «me ve» es significativa, pero el matiz exacto se discute. La traducción principal preserva el nombre propio y evita resolver artificialmente la ambigüedad.'
  doctrine_reference: Ninguna doctrina especial; decisión de transparencia lexical y de manejo de nombres propios bíblicos.
translation_notes:
  revision_awareness: La versión inglesa revisó «Look» a «Behold» para reflejar mejor הִנֵּה con un registro formal. En español, el equivalente de función deíctica se expresó como «Mira», porque mantiene la atención discursiva sin sonar arcaico; se conserva el nombre propio Beer-lahai-roi en la línea principal, como en el audit trail inglés.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como terminología de proyecto, pero este versículo no la requiere explícitamente.
  - Se eligió un español bíblico claro y moderno, evitando el calco rígido.
  - 'Los topónimos se adaptan según el uso español: Cades, Bered, pero se conserva Beer-lahai-roi por ser nombre compuesto significativo.'
  - La nota al pie usa un solo marcador y está anclada únicamente en el nombre propio, donde existe la alternativa semántica documentada.
