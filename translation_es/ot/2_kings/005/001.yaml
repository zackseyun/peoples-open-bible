base_translation:
  language: en
  yaml_path: translation/ot/2_kings/005/001.yaml
  text: Now Naaman[a], commander of the army of the king of Aram, was a great man before his master and highly esteemed, because through him Yahweh had given victory to Aram. The man was a mighty warrior[c][b], but he was leprous.
  footnotes:
  - marker: a
    text: Or 'deliverance' or 'salvation' for 'victory'; the Hebrew term can carry a broader sense, but here it refers to military success.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'leprous.' The term refers to a serious skin affliction in the ancient context and may not correspond exactly to modern clinical leprosy.
    reason: cultural_note
  - marker: c
    text: Traditionally 'Syria'; Hebrew 'Aram.'
    reason: alternative_reading
