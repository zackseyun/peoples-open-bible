  to: Y toda la tierra lloraba a gran voz, y todo el pueblo iba pasando. El rey también pasó el valle de Cedrón[b], y todo el pueblo iba pasando por el camino hacia el desierto[a].
  rationale: Se corrige la ubicación y el contenido de la nota [a] para que coincidan con la evidencia y el expediente del POB inglés, y se mejora 'con fuerte voz' a 'a gran voz' para un español más natural sin perder la imagen hebrea. El resto del texto se mantiene por ser fiel y claro.
