translation:
  language: es
  text: Pero ahora está muerto. ¿Por qué habría de ayunar más? ¿Puedo traerlo de vuelta de nuevo? Yo voy a él[a], pero él no volverá a mí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «iré a él». El participio hebreo puede expresar un futuro cierto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: But now
  chosen_spanish: Pero ahora
  alternatives_spanish:
  - Y ahora
  - Ahora
  lexicon: HALOT
  rationale: El giro discursivo introduce contraste con la situación previa; "Pero ahora" conserva ese contraste de forma natural en español.
- source_word: מֵת
  english_pob_choice: he is dead
  chosen_spanish: está muerto
  alternatives_spanish:
  - ha muerto
  lexicon: HALOT
  rationale: El hebreo expresa un estado resultante; "está muerto" comunica bien ese estado en español sin perder la fuerza predicativa.
- source_word: לָמָּה זֶּה
  english_pob_choice: Why should I
  chosen_spanish: ¿Por qué habría de
  alternatives_spanish:
  - ¿Por qué?
  - ¿Por qué voy a
  lexicon: HALOT
  rationale: La pregunta retórica pide una traducción idiomática. "¿Por qué habría de...?" expresa la misma fuerza de innecesariedad o improcedencia que el hebreo en contexto.
- source_word: צָם
  english_pob_choice: fast
  chosen_spanish: ayunar
  alternatives_spanish:
  - seguir ayunando
  lexicon: HALOT
  rationale: El verbo español común para la práctica es "ayunar". El contexto ya deja claro que se trata del ayuno de David.
- source_word: עוֹד
  english_pob_choice: any longer
  chosen_spanish: más
  alternatives_spanish:
  - todavía
  - seguido
  lexicon: HALOT
  rationale: Aquí marca la continuación del ayuno después de la muerte del niño; "más" en la pregunta funciona de modo natural en español.
- source_word: הַאוּכַל
  english_pob_choice: Can I
  chosen_spanish: ¿Puedo
  alternatives_spanish:
  - ¿Sería capaz de
  - ¿Me es posible
  lexicon: HALOT
  rationale: Expresa capacidad/posibilidad en forma breve y natural, manteniendo el tono retórico.
- source_word: לַהֲשִׁיבוֹ
  english_pob_choice: bring him back
  chosen_spanish: hacerlo volver
  alternatives_spanish:
  - traerlo de vuelta
  - restaurarlo
  lexicon: HALOT
  rationale: 'El hifil de שוב es causativo: "hacerlo volver" reproduce bien esa causalidad sin cargar de más el sentido. "Restaurarlo" podría sonar más interpretativo en este contexto.'
- source_word: עוֹד
  english_pob_choice: again
  chosen_spanish: de nuevo
  alternatives_spanish:
  - otra vez
  - nuevamente
  lexicon: HALOT
  rationale: Aquí modifica la idea de volver a la vida o al estado previo; "de nuevo" es claro y directo en español.
- source_word: אֲנִי הֹלֵךְ אֵלָיו
  english_pob_choice: I am going to him
  chosen_spanish: Yo voy hacia él
  alternatives_spanish:
  - Yo iré a él
  - Yo voy a él
  lexicon: HALOT
  rationale: El participio puede expresar un futuro cierto o inminente. "Voy hacia él" conserva la idea de movimiento dirigido sin forzar una formulación doctrinal sobre el estado intermedio.
- source_word: וְהוּא לֹא יָשׁוּב אֵלַי
  english_pob_choice: but he will not return to me
  chosen_spanish: pero él no volverá a mí
  alternatives_spanish:
  - y él no regresará a mí
  - pero no volverá hacia mí
  lexicon: HALOT
  rationale: Se conserva el verbo clave "volver" para mantener el paralelismo con "hacerlo volver". El futuro expresa la negación de retorno del niño.
theological_decisions:
- issue: Si la frase implica una reunión consciente con el niño en el más allá
  english_pob_reading: Render the statement straightforwardly as 'I am going to him' without specifying the nature of that going beyond death.
  chosen_spanish_reading: Traducir la frase de manera directa como un ir hacia él, sin especificar la naturaleza de ese ir más allá de la muerte.
  alternative_spanish_readings:
  - Sugerir explícitamente una reunión en el cielo
  - Entenderla solo como que David también morirá
  rationale: El hebreo afirma solo que David irá hacia el niño y que el niño no volverá a David. La traducción debe conservar esa tensión sin resolverla doctrinalmente.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el consenso general del audit trail es alto, con observación menor únicamente sobre matices. Se mantiene el sentido del original hebreo y la decisión inglesa de no especificar más de lo que el texto dice.
  spanish_consistency_notes:
  - Se usa "Dios"/"Yahvé" según el proyecto, pero este versículo no contiene esos términos.
  - Se mantiene "volver" para conservar la red de repetición entre hacer volver y volver.
  - Se evita una formulación doctrinalmente cerrada sobre el destino del niño, siguiendo el audit trail inglés.
