translation:
  language: es
  text: Otra vez midió mil, y era un río que no podía cruzar, porque las aguas habían crecido[a]—aguas para nadar[b], un río que no podía cruzarse.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'las aguas habían subido' o 'las aguas se habían hinchado'.
    reason: lexical_alternative
  - marker: b
    text: Hebreo 'aguas de nadar', es decir, agua lo bastante profunda para nadar.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּמָד
  english_pob_choice: Again he measured
  chosen_spanish: Otra vez midió
  alternatives_spanish:
  - Entonces midió
  - Y midió
  lexicon: HALOT
  rationale: La forma narrativa continua un nuevo tramo de medición; 'Otra vez' comunica de modo natural la repetición del acto, como el inglés POB 'Again he measured'.
- source_word: אֶלֶף
  english_pob_choice: a thousand
  chosen_spanish: mil
  alternatives_spanish:
  - un mil
  - mil unidades
  lexicon: HALOT
  rationale: El hebreo presenta una medida redonda y directa; 'mil' es la forma natural en español para conservar la simplicidad del numerativo.
- source_word: נַחַל
  english_pob_choice: river
  chosen_spanish: río
  alternatives_spanish:
  - arroyo
  - corriente
  - torrente
  lexicon: HALOT
  rationale: Aunque נַחַל puede designar un wadi o torrente, el contexto visionario muestra agua profunda para nadar; 'río' expresa mejor esa realidad en español.
- source_word: אֲשֶׁר לֹא אוּכַל לַעֲבֹר
  english_pob_choice: that I could not cross
  chosen_spanish: que no podía cruzar
  alternatives_spanish:
  - que no podía pasar
  - que no me era posible atravesar
  lexicon: HALOT
  rationale: אוכל expresa capacidad, y לעבור indica cruzar o atravesar. 'No podía cruzar' es conciso y fiel al sentido.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la causa de que el río ya no pudiera cruzarse; 'porque' es la equivalencia natural y clara en español.
- source_word: גָאוּ הַמַּיִם
  english_pob_choice: the waters had risen
  chosen_spanish: las aguas habían crecido
  alternatives_spanish:
  - las aguas habían subido
  - las aguas se habían hinchado
  lexicon: HALOT
  rationale: El verbo puede implicar elevarse o hincharse; 'habían crecido' conserva la idea de aumento progresivo de manera idiomática y sobria.
- source_word: מֵי שָׂחוּ
  english_pob_choice: waters to swim in
  chosen_spanish: aguas para nadar en ellas
  alternatives_spanish:
  - aguas de nadar
  - aguas para nadar
  lexicon: HALOT
  rationale: La construcción hebrea expresa agua tan profunda que permite nadar. 'Para nadar en ellas' conserva la función y evita una fórmula demasiado literal o extraña.
- source_word: נַחַל אֲשֶׁר לֹא יֵעָבֵר
  english_pob_choice: a river that could not be crossed
  chosen_spanish: un río que no podía cruzarse
  alternatives_spanish:
  - un río que no podía ser atravesado
  - un río imposible de cruzar
  lexicon: HALOT
  rationale: 'El nifal tiene sentido pasivo: no podía ser cruzado. En español, la pasiva refleja (''cruzarse'') suena natural y mantiene la fuerza del pasivo.'
translation_notes:
  revision_awareness: Se siguió el paquete fuente hebreo de WLC con el audit trail en inglés POB; no se detectaron revisiones aplicadas en el pasaje base, y la versión inglesa revisada coincide con el análisis léxico principal.
  spanish_consistency_notes:
  - Se mantuvo 'río' para נַחַל por el contexto visionario de aguas profundas, en línea con la decisión inglesa.
  - Se usó 'aguas' en plural, como en el hebreo הַמַּיִם, para conservar el matiz colectivo.
  - Se prefirió una pasiva refleja final ('no podía cruzarse') para reproducir el valor pasivo del nifal sin sonar forzado en español.
  - La puntuación con guion largo separa la ampliación explicativa, como en el texto inglés POB.
