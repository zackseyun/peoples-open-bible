review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido básico del griego: estancia nocturna allí, ayuno total, y duelo por las ofensas del pueblo. Sin embargo, dos elecciones no preservan del todo la evidencia fuente ni el audit trail inglés: ''acampando'' sobreespecifica αὐλισθείς como si implicara campamento, y ''iniquidades'' debilita la decisión auditada de mantener el matiz de ἀνομία como conducta contraria a la ley.'
  spanish_quality_summary: El español es claro y digno, pero 'haciendo duelo' suena algo menos natural que 'lamentándose' o 'de duelo'; aun así es aceptable. La mejora principal es usar 'alojándose' o 'pasando allí la noche' para sonar natural sin añadir imagen de campamento, y reemplazar 'iniquidades' por una formulación que conserve mejor la fuerza legal-covenantal.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. La cuestión clave es ἀνομία: conviene reflejar ''actos sin ley'' o ''transgresiones'' mejor que ''iniquidades'', porque el audit trail documenta expresamente la fuerza de violación de la ley. Para αὐλισθείς, ''alojándose allí'' es mejor alineación con la nota léxica que ''acampando allí''.'
  issues:
  - severity: medium
    issue: '''Acampando allí'' sobreinterpreta αὐλισθείς.'
    rationale: El participio indica permanecer o pasar la noche en un lugar; puede incluir acampar, pero no lo exige. El inglés auditado eligió 'lodging there' precisamente para no sobreespecificar un campamento.
  - severity: medium
    issue: '''Iniquidades'' no conserva tan bien la fuerza de ἀνομίαι como violaciones de la ley.'
    rationale: El audit trail inglés justificó 'lawless deeds' para evitar aplanar el término. En español, 'iniquidades' suena solemne, pero no expresa de forma transparente el componente de contrariedad a la ley/orden de Dios.
  - severity: low
    issue: La nota [b] ancla 'iniquidades', pero si se corrige el término debe ajustarse la redacción de la nota.
    rationale: La nota comparativa con Esdras 10 sigue siendo válida, pero debe concordar exactamente con el nuevo giro léxico en el texto.
  revised_spanish_text: Y alojándose allí[a], no probó pan ni bebió agua[b], haciendo duelo por los grandes actos sin ley de la multitud.
  revised_footnotes:
  - marker: a
    text: O 'acampando allí', 'pernoctando allí' o 'pasando allí la noche'. El participio griego señala que permaneció allí durante la noche.
    reason: lexical_alternative
  - marker: b
    text: El paralelo hebreo en Esdras 10 describe el acto con más especificidad como tomar mujeres extranjeras; aquí el griego lo resume de manera más general como 'actos sin ley'.
    reason: alternative_reading
  revision_rationale: Se corrige αὐλισθείς a 'alojándose allí' para evitar la sobreespecificación de un campamento, manteniendo la idea central de pasar allí la noche. Se cambia 'iniquidades' por 'actos sin ley' para preservar mejor la decisión léxica y teológica documentada para ἀνομία. Se conservan la sintaxis general, el ayuno literal ('pan' y 'agua') y el tono penitencial del pasaje.
