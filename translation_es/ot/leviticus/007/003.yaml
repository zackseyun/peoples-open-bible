translation:
  language: es
  text: 'Y de este presentará toda su grosura: la cola grasa y la grosura que cubre las entrañas[a][b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ofrecerá». El verbo hebreo puede significar presentar u ofrecer una porción sacrificial.'
    reason: lexical_alternative
  - marker: b
    text: Es decir, la cola grasa de la oveja, una porción sacrificial específica.
    reason: cultural_note
lexical_decisions:
- source_word: וְאֵת כָּל חֶלְבּוֹ / all its fat
  english_pob_choice: all its fat
  chosen_spanish: toda su grosura
  alternatives_spanish:
  - todo su sebo
  - toda su grasa
  lexicon: HALOT
  rationale: En este contexto sacrificial, חֵלֶב designa la porción grasa destinada para Yahvé. ‘Grosura’ conserva la fuerza de una porción grasa consagrada y evita reducir el término a grasa culinaria común; ‘sebo’ o ‘grasa’ también son posibles, pero ‘grosura’ suena más natural en registro bíblico sin perder precisión.
- source_word: יַקְרִיב
  english_pob_choice: shall present
  chosen_spanish: ofrecerá
  alternatives_spanish:
  - presentará
  - hará llegar
  lexicon: HALOT
  rationale: El verbo hifil de קרב en lenguaje sacrificial admite ‘presentar’ u ‘ofrecer’. En español, ‘ofrecerá’ comunica bien el acto ritual sin sonar forzado; mantiene la acción cultual sin volverla meramente logística.
- source_word: מִמֶּנּוּ
  english_pob_choice: from it
  chosen_spanish: de él
  alternatives_spanish:
  - de ella
  - de ello
  lexicon: HALOT
  rationale: El sufijo se refiere al animal sacrificial. En español, ‘de él’ puede referirse al animal sin introducir una expresión pesada; ‘de ello’ es más neutro pero menos natural en este contexto, y ‘de ella’ depende del género implícito del sustantivo animal, no siempre explícito.
- source_word: הָאַלְיָה
  english_pob_choice: the fat tail
  chosen_spanish: la cola gorda
  alternatives_spanish:
  - la cola grasa
  - la cola ancha y gorda
  lexicon: HALOT
  rationale: אַלְיָה nombra la cola grasa característica de ciertas ovejas, un corte sacrificial específico. ‘Cola gorda’ conserva la concreción anatómica y la referencia cultural; ‘cola grasa’ suena más técnico, pero menos idiomático en español. Evito ‘solo cola’ porque perdería el rasgo distintivo de la pieza.
- source_word: הַמְכַסֶּה אֶת־הַקֶּרֶב
  english_pob_choice: the fat that covers the entrails
  chosen_spanish: la grosura que cubre las entrañas
  alternatives_spanish:
  - la grosura que cubre los intestinos
  - la grasa que cubre las entrañas
  lexicon: HALOT
  rationale: קֶרֶב se refiere a las vísceras o entrañas. ‘Entrañas’ es una equivalencia bíblica y natural en español para el interior visceral; mantiene la imagen sacrificial mejor que una expresión anatómica más moderna. ‘Grosura’ conserva la relación con חֵלֶב en el mismo versículo.
- source_word: כָּל
  english_pob_choice: all
  chosen_spanish: toda
  alternatives_spanish:
  - todo el
  - la totalidad de
  lexicon: HALOT
  rationale: כָּל enfatiza la totalidad de la porción grasa. ‘Toda’ concuerda con ‘grosura’ y transmite la idea de totalidad de forma fluida en español.
translation_notes:
  revision_awareness: 'El texto español sigue de cerca el hebreo y el audit trail inglés: mantiene la secuencia de porciones sacrificiales, conserva el sentido cultual de יַקְרִיב como ‘ofrecerá’, y explicita la referencia cultural de הָאַלְיָה como la cola grasa de la oveja. No se incorporaron cambios textuales respecto del paquete fuente.'
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ como forma estándar del proyecto cuando aparezca el nombre divino; aquí no aparece en el versículo.
  - Se evitó ‘SEÑOR’ como sustituto porque el texto fuente no lo requiere en este caso.
  - ‘Entrañas’ se eligió por claridad bíblica y porque mantiene la imagen corporal concreta del hebreo.
  - ‘Grosura’ conserva el registro cultual y la cohesión léxica entre חֶלְבּוֹ y הַחֵלֶב.
