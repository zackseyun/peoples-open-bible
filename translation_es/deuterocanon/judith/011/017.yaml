translation:
  language: es
  text: porque tu sierva es temerosa de Dios[a], y sirve al Dios del cielo noche y día. Y ahora permaneceré contigo, mi señor, y tu sierva saldrá de noche al valle[b], y oraré a Dios, y él me dirá cuándo han cometido su pecado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «esclava» para δούλη; el término puede denotar a una esclava femenina, pero aquí funciona como autodesignación deferente.
    reason: lexical_alternative
  - marker: b
    text: O «barranco», «garganta» o «desfiladero» para φάραγξ.
    reason: lexical_alternative
lexical_decisions:
- source_word: δούλη
  english_pob_choice: servant
  chosen_spanish: sierva
  alternatives_spanish:
  - esclava
  lexicon: BDAG
  rationale: 'En este contexto la palabra funciona como autodenominación deferente de una mujer en habla cortesana: «tu sierva». «Sierva» conserva la relación de dependencia y cortesía sin imponer de inmediato el matiz jurídico-social de «esclava», aunque esa posibilidad queda documentada.'
- source_word: θεοσεβής
  english_pob_choice: God-fearing
  chosen_spanish: temerosa de Dios
  alternatives_spanish:
  - piadosa
  - devota
  lexicon: LSJ
  rationale: La idea central es reverencia explícita hacia Dios. «Temerosa de Dios» preserva el elemento θεο- y mantiene el sentido reconocible en español bíblico, con más precisión que «piadosa» o «devota».
- source_word: θεραπεύουσα
  english_pob_choice: serves
  chosen_spanish: sirve
  alternatives_spanish:
  - adora
  - atiende
  lexicon: LSJ
  rationale: El participio puede abarcar servir, atender o rendir servicio religioso. Aquí, con «al Dios del cielo», «sirve» comunica devoción continua sin estrechar indebidamente a un acto litúrgico específico.
- source_word: νυκτὸς καὶ ἡμέρας
  english_pob_choice: night and day
  chosen_spanish: noche y día
  alternatives_spanish:
  - de noche y de día
  - continuamente
  lexicon: LSJ
  rationale: Es una merisma temporal estándar. «Noche y día» es natural en español y conserva la totalidad del tiempo expresada por el griego.
- source_word: τὸν θεὸν τοῦ οὐρανοῦ
  english_pob_choice: the God of heaven
  chosen_spanish: el Dios del cielo
  alternatives_spanish:
  - el Dios celestial
  lexicon: LSJ
  rationale: Se conserva la construcción genitiva casi de forma directa. «El Dios del cielo» mantiene el título bíblico y evita diluir la referencia en una paráfrasis más abstracta.
- source_word: μενῶ παρὰ σοί
  english_pob_choice: I will remain with you
  chosen_spanish: permaneceré contigo
  alternatives_spanish:
  - me quedaré contigo
  - permaneceré a tu lado
  lexicon: LSJ
  rationale: El futuro de μένω con παρά + dativo indica permanecer en la compañía o presencia de alguien. «Permaneceré contigo» es idiomático y fiel al valor relacional del giro.
- source_word: κύριε μου
  english_pob_choice: my lord
  chosen_spanish: mi señor
  alternatives_spanish:
  - mi amo
  - señor mío
  lexicon: LSJ
  rationale: Aquí es un tratamiento social de respeto dirigido a Holofernes, no un título divino. «Mi señor» conserva el registro elevado; «mi amo» sería más duro y «señor mío» más arcaizante.
- source_word: ἐξελεύσεται
  english_pob_choice: will go out
  chosen_spanish: saldrá
  alternatives_spanish:
  - irá fuera
  - partirá
  lexicon: LSJ
  rationale: El futuro medio expresa un movimiento de salida. «Saldrá» es la forma más natural en español para ese desplazamiento.
- source_word: κατὰ νύκτα
  english_pob_choice: by night
  chosen_spanish: de noche
  alternatives_spanish:
  - por la noche
  - en la noche
  lexicon: LSJ
  rationale: La frase preposicional adverbial se vierte de manera natural con «de noche». Mantiene el matiz temporal sin forzar una calca.
- source_word: φάραγγα
  english_pob_choice: valley
  chosen_spanish: valle
  alternatives_spanish:
  - ravina
  - garganta
  - garganta/ravina
  lexicon: LSJ
  rationale: El término puede abarcar valle, barranco, garganta o desfiladero. «Valle» es amplio y legible; el contexto inmediato no exige precisar más la topografía.
- source_word: προσεύξομαι πρὸς τὸν θεόν
  english_pob_choice: I will pray to God
  chosen_spanish: oraré a Dios
  alternatives_spanish:
  - rezaré a Dios
  - oraré ante Dios
  lexicon: BDAG
  rationale: La construcción expresa oración dirigida a Dios. «Oraré a Dios» mantiene la dirección personal y un registro bíblico claro en español.
- source_word: ἐρεῖ μοι
  english_pob_choice: he will tell me
  chosen_spanish: me dirá
  alternatives_spanish:
  - me hablará
  - me informará
  lexicon: LSJ
  rationale: El futuro de λέγω aquí supone comunicar algo a la persona que habla. «Me dirá» es la equivalencia más natural y directa.
- source_word: πότε
  english_pob_choice: when
  chosen_spanish: cuándo
  alternatives_spanish:
  - a qué hora
  - en qué momento
  lexicon: LSJ
  rationale: El adverbio interrogativo introduce la información temporal revelada por Dios. «Cuándo» conserva esa función sin sobrecargarla.
- source_word: ἐποίησαν τὸ ἁμάρτημα αὐτῶν
  english_pob_choice: they have committed their sin
  chosen_spanish: han cometido su pecado
  alternatives_spanish:
  - cometieron su pecado
  - han hecho su pecado
  lexicon: LSJ
  rationale: La combinación ποιέω + ἁμάρτημα es una expresión semitizada para «cometer pecado». «Han cometido su pecado» conserva el valor de acto consumado y evita una traducción literal poco natural.
theological_decisions:
- issue: Rendering of δούλη in Judith’s self-reference
  english_pob_reading: servant
  chosen_spanish_reading: sierva
  alternative_spanish_readings:
  - esclava
  rationale: Aunque δούλη puede significar «esclava», aquí la función inmediata es la autodenominación deferente de una mujer en corte. «Sierva» preserva la humildad y la relación jerárquica sin imponer un matiz de propiedad que no es el foco del pasaje.
  doctrine_reference: 'DOCTRINE.md Contested terms: δοῦλος / δούλη | siervo/a / esclavo/a (context-dependent)'
translation_notes:
  revision_awareness: 'Coincide con el último pase auditado: no se documentaron revisiones posteriores y el control cruzado informó alta concordancia. La redacción española sigue la decisión inglesa principal, preservando las alternativas semánticas relevantes en notas.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como convención general del proyecto cuando aparezca el tetragrámaton; aquí el texto griego dice «Dios», por lo que no se introduce el nombre divino.
  - Se mantiene «Dios del cielo» para conservar el título bíblico sin explicitar una paráfrasis interpretativa.
  - «Sierva» y «temerosa de Dios» respetan el registro de cortesía y la devoción explícita del griego.
  - Las notas a y b reflejan alternativas reales del léxico griego sin añadir variantes no atestiguadas.
