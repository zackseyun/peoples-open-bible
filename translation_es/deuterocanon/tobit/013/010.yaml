translation:
  language: es
  text: Da gracias al Señor como es debido, y bendice al Rey de los siglos, para que de nuevo su tienda sea edificada para ti con alegría[a]; y para que alegre a los cautivos[b] dentro de ti y ame a los afligidos dentro de ti por todas las generaciones de la era.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El destinatario parece ser Jerusalén o Sion personificada: «para ti» y «dentro de ti» se refieren a la restauración de la ciudad y de su pueblo en ella.'
    reason: cultural_note
  - marker: b
    text: O «los exiliados»; el griego literalmente se refiere a los llevados cautivos, probablemente con el sentido de desterrados en este contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξομολόγου
  english_pob_choice: Give thanks
  chosen_spanish: Da gracias
  alternatives_spanish:
  - Confiesa
  - Alaba abiertamente
  lexicon: BDAG
  rationale: En este contexto himnódico y de oración, el imperativo medio expresa acción de gracias y alabanza, no confesión de pecados. «Da gracias» es la equivalencia natural en español.
- source_word: ἀγαθῶς
  english_pob_choice: rightly
  chosen_spanish: rectamente
  alternatives_spanish:
  - bien
  - de manera apropiada
  lexicon: LSJ
  rationale: El adverbio modifica el acto de dar gracias. «Rectamente» conserva la idea de hacerlo de modo debido o apropiado sin añadir una carga moral extra.
- source_word: κύριος
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Dueño
  - Maestro
  lexicon: BDAG
  rationale: Se mantiene el tratamiento reverencial estándar para κύριος en contexto judío-griego.
- source_word: βασιλέα τῶν αἰώνων
  english_pob_choice: King of the ages
  chosen_spanish: Rey de los siglos
  alternatives_spanish:
  - Rey eterno
  - Rey por los siglos
  lexicon: LSJ
  rationale: Se preserva la estructura genitiva y su peso litúrgico-teológico. «De los siglos» refleja más de cerca el griego que una paráfrasis como «eterno».
- source_word: σκηνή
  english_pob_choice: tent
  chosen_spanish: tienda
  alternatives_spanish:
  - tabernáculo
  - morada
  lexicon: LSJ
  rationale: «Tienda» conserva la imagen concreta del griego sin forzar una asociación técnica posterior con el tabernáculo.
- source_word: οἰκοδομηθῇ
  english_pob_choice: may ... be built
  chosen_spanish: sea edificada
  alternatives_spanish:
  - sea reconstruida
  - sea levantada
  lexicon: BDAG
  rationale: El verbo significa ser construida/edificada. Dado que πάλιν ya indica repetición, «sea edificada de nuevo» podría sonar redundante; la forma elegida mantiene la fuerza pasiva con naturalidad.
- source_word: σοι
  english_pob_choice: for you
  chosen_spanish: para ti
  alternatives_spanish:
  - en ti
  - a ti
  lexicon: BDAG
  rationale: El dativo expresa beneficio; «para ti» comunica que la restauración es en favor de la ciudad/persona personificada.
- source_word: μετὰ χαρᾶς
  english_pob_choice: with joy
  chosen_spanish: con alegría
  alternatives_spanish:
  - gozosamente
  - llena de gozo
  lexicon: BDAG
  rationale: Es una equivalencia directa y digna para la frase preposicional.
- source_word: εὐφρᾶναι
  english_pob_choice: he may gladden
  chosen_spanish: haga regocijarse
  alternatives_spanish:
  - alegre
  - cause gozo a
  lexicon: BDAG
  rationale: 'Se conserva el valor causativo del verbo: no solo sentir gozo, sino provocar gozo en quienes están dentro de la ciudad.'
- source_word: ἐν σοὶ
  english_pob_choice: within you
  chosen_spanish: en ti
  alternatives_spanish:
  - dentro de ti
  - entre ti
  lexicon: BDAG
  rationale: En el contexto de Jerusalén/Zion personificada, «en ti» mantiene la localización interna de forma natural en español.
- source_word: τοὺς αἰχμαλώτους
  english_pob_choice: the captives
  chosen_spanish: a los cautivos
  alternatives_spanish:
  - a los exiliados
  - a los prisioneros
  lexicon: BDAG
  rationale: «Cautivos» sigue más de cerca el sentido literal de quienes han sido llevados cautivos, sin excluir la resonancia de exilio que el contexto sugiere.
- source_word: ἀγαπήσαι
  english_pob_choice: love
  chosen_spanish: ame
  alternatives_spanish:
  - quiera
  - muestre amor a
  lexicon: BDAG
  rationale: Se conserva el verbo directo de amor para no suavizarlo hacia una mera benevolencia o compasión.
- source_word: τοὺς ταλαιπώρους
  english_pob_choice: the afflicted
  chosen_spanish: a los afligidos
  alternatives_spanish:
  - a los desdichados
  - a los sufrientes
  lexicon: LSJ
  rationale: «Afligidos» es digno y claro para quienes están en aflicción o miseria, evitando matices pejorativos.
- source_word: εἰς πάσας τὰς γενεὰς τοῦ αἰῶνος
  english_pob_choice: for all the generations of the age
  chosen_spanish: por todas las generaciones del siglo
  alternatives_spanish:
  - por todas las generaciones del tiempo
  - por todas las generaciones para siempre
  lexicon: LSJ
  rationale: Se conserva la expresión doble y solemne del griego. «Siglo» reproduce el término αἰών sin colapsarlo de entrada en una paráfrasis interpretativa como «para siempre».
theological_decisions:
- issue: Identidad del destinatario en segunda persona y del lugar dentro del cual se alegran los cautivos y los afligidos
  english_pob_reading: The verse addresses Jerusalem/Zion personified, praying for God's dwelling to be restored there and for captives and afflicted people to rejoice within her.
  chosen_spanish_reading: El versículo se dirige a Jerusalén/Sion personificada; la restauración de la tienda de Dios y el gozo de los cautivos y afligidos suceden en ella.
  alternative_spanish_readings:
  - Podría entenderse de Israel/el pueblo en sentido más general.
  - Podría traducirse de modo que «en ti» se lea menos como espacio urbano y más como comunidad.
  rationale: La imagen de la tienda de Dios edificada «para ti» y de los cautivos y afligidos que se alegran «en ti» apunta de manera más natural a la ciudad personificada, sin excluir la dimensión corporativa del pueblo.
  doctrine_reference: Jerusalén/Sion personificada en la poesía bíblica; restauración escatológica del pueblo de Dios.
- issue: Alcance de «Rey de los siglos»
  english_pob_reading: A divine title emphasizing God's rule across all ages.
  chosen_spanish_reading: Un título divino que enfatiza el dominio de Dios sobre todos los siglos.
  alternative_spanish_readings:
  - Rey eterno
  - Rey por los siglos
  rationale: Se preserva la forma nominal del título para no perder su resonancia litúrgica y teológica.
  doctrine_reference: Soberanía eterna de Dios.
translation_notes:
  revision_awareness: La revisión inglesa reciente ajustó «Give thanks well» a «Give thanks ... rightly» y reordenó «within you» para que modifique más naturalmente a «the captives» y «the afflicted». La redacción española refleja esa decisión con «Da gracias ... rectamente» y con «a los cautivos/a los afligidos en ti» sin duplicar innecesariamente la localización.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» no aplica aquí porque el texto griego trae κύριος; por ello se usó «Señor» conforme al uso reverencial del pasaje.
  - Se preservó la tensión entre «cautivos» y la posible idea de «exiliados» en una nota, en lugar de resolverla por paráfrasis.
  - «Rey de los siglos» conserva la forma más cercana al griego y la coherencia terminológica con el audit trail inglés.
  - La puntuación y el orden de cláusulas siguen de cerca el paralelismo del griego, con una sintaxis española fluida y publicable.
