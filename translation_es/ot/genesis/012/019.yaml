revisions:
- from: '¿Por qué dijiste: “Ella es mi hermana”, y yo la tomé para mí como esposa? Y ahora, aquí está tu esposa[a]. Tómala y vete.”'
  to: '¿Por qué dijiste: “Ella es mi hermana”, y yo la tomé por esposa[a]? Y ahora, aquí está tu esposa[b]. Tómala y vete.”'
  rationale: Se revisa la cláusula matrimonial para usar un español más natural y fiel al sentido, dejando la formulación más literal en nota. También se añade una nota para preservar la alternativa documentada para הִנֵּה. No se requiere adjudicación compleja.
