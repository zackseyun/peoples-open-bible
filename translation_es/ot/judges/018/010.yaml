translation:
  language: es
  text: Cuando lleguen[a], llegarán a un pueblo seguro, y la tierra es amplia[b]; porque Dios la ha entregado en sus manos, un lugar donde no falta nada de todo lo que hay en la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «al llegar». El hebreo combina una forma temporal con un verbo de llegada para expresar el momento de acercarse al lugar.'
    reason: lexical_alternative
  - marker: b
    text: Lit. «amplia de manos», un hebraísmo que expresa amplitud o espacio.
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּבֹאֲכֶם תָּבֹאוּ
  english_pob_choice: When you go, you will come
  chosen_spanish: Cuando vayan, llegarán
  alternatives_spanish:
  - Al llegar, llegarán
  - Cuando ustedes vayan, llegarán
  lexicon: HALOT
  rationale: La construcción hebrea une una forma de infinitivo con sufijo y un verbo finito para expresar la idea temporal de llegada. En español, «Cuando vayan, llegarán» conserva la secuencia sin sonar forzada y respeta el contexto de desplazamiento hacia el lugar.
- source_word: עַם בֹּטֵחַ
  english_pob_choice: a secure people
  chosen_spanish: un pueblo seguro
  alternatives_spanish:
  - un pueblo que vive confiado
  - un pueblo que habita con seguridad
  - un pueblo desprevenido
  lexicon: HALOT
  rationale: בֹּטֵחַ señala seguridad o confianza. «Pueblo seguro» expresa el estado de tranquilidad sin añadir la carga interpretativa de «desprevenido», que sería más específica de lo que exige el hebreo.
- source_word: וְהָאָרֶץ רַחֲבַת יָדַיִם
  english_pob_choice: and the land is broad
  chosen_spanish: y la tierra es ancha
  alternatives_spanish:
  - y la tierra es espaciosa
  - y la tierra es amplia
  - y la tierra es ancha de manos
  lexicon: HALOT
  rationale: El hebreo usa una imagen idiomática de amplitud («ancha de manos»). Siguiendo el precedente inglés de no sobreinterpretar la imagen, «la tierra es ancha» preserva la idea central en un español natural, sin introducir una explicación que el texto no desarrolla.
- source_word: כִּי נְתָנָהּ אֱלֹהִים בְּיֶדְכֶם
  english_pob_choice: for God has given it into your hand
  chosen_spanish: porque Dios la ha entregado en su mano
  alternatives_spanish:
  - porque Dios la ha entregado en sus manos
  - pues Dios la ha puesto en su poder
  - porque Dios la ha dado en su mano
  lexicon: HALOT
  rationale: El hebreo usa la idiomática «en la mano» para indicar posesión o dominio. En español, «ha entregado en su mano» transmite ese valor sin perder la imagen. Mantengo el singular «su mano» como equivalente idiomático de la expresión colectiva hebrea, conforme al tratamiento del inglés POB.
- source_word: מָקוֹם
  english_pob_choice: a place
  chosen_spanish: un lugar
  alternatives_spanish:
  - un sitio
  - un lugar determinado
  - una localidad
  lexicon: HALOT
  rationale: «Lugar» es la forma más directa y natural para מָקוֹם en este contexto explicativo.
- source_word: אֲשֶׁר אֵין שָׁם מַחְסוֹר
  english_pob_choice: where there is no lack
  chosen_spanish: donde no falta nada
  alternatives_spanish:
  - donde no hay escasez
  - donde no hay carencia
  - donde nada falta
  lexicon: HALOT
  rationale: מַחְסוֹר expresa falta, necesidad o carencia. «Donde no falta nada» es fluido y reproduce el sentido de abundancia sin volverse más abstracto que el hebreo.
- source_word: כָּל דָּבָר אֲשֶׁר בָּאָרֶץ
  english_pob_choice: of anything that is on the earth
  chosen_spanish: de todo lo que hay en la tierra
  alternatives_spanish:
  - de cualquier cosa que hay en la tierra
  - de todo lo que está en la tierra
  - de todo lo que hay en el país
  lexicon: HALOT
  rationale: Aquí הָאָרֶץ puede referirse al territorio en cuestión, pero el seguimiento textual del inglés POB opta por «the earth». «La tierra» conserva esa amplitud en español y mantiene la formulación inclusiva de «todo lo que hay» sin estrechar indebidamente el alcance.
theological_decisions:
- issue: Uso de אֱלֹהִים en discurso no explícitamente covenantal
  english_pob_reading: God
  chosen_spanish_reading: Dios
  alternative_spanish_readings:
  - dioses
  - un dios
  rationale: El verbo singular y el contexto del discurso sostienen una referencia singular a la deidad. «Dios» es la traducción natural y evita introducir una ambigüedad plural que el pasaje no presenta.
  doctrine_reference: 'DOCTRINE.md: Primacía del sentido original; no importar lecturas ajenas al contexto'
- issue: Imagen idiomática de la tierra como «broad of hands»
  english_pob_reading: the land is broad
  chosen_spanish_reading: la tierra es ancha
  alternative_spanish_readings:
  - la tierra es espaciosa
  - la tierra es amplia
  - la tierra es ancha de manos
  rationale: El hebreo conserva una imagen corporal idiomática, pero el audit trail inglés ya decidió no explicar demasiado la metáfora. En español, «ancha» mantiene la imagen sin desnaturalizar el verso ni añadir una paráfrasis doctrinal o cultural innecesaria.
  doctrine_reference: 'DOCTRINE.md: No sobreinterpretar imágenes cuando el texto no las desarrolla'
translation_notes:
  revision_awareness: 'La redacción sigue el pase revisado del texto inglés: se evitó añadir una explicación excesiva de la imagen de «ancha de manos» y se mantuvo el sentido global con una formulación más directa. También se respetó la decisión del audit trail de no estrechar el último miembro del versículo a un simple «en la tierra» cuando el seguimiento inglés ya había optado por una formulación más amplia.'
  spanish_consistency_notes:
  - Se conserva «Dios» para אֱלֹהִים en singular, en línea con el uso del POB en este contexto.
  - Se mantiene «la mano» como equivalente idiomático de בְּיָד con valor de posesión o dominio.
  - «La tierra» funciona aquí como equivalencia de amplitud para el hebreo הארץ, sin introducir una restricción territorial innecesaria.
  - El registro es sobrio y bíblico, pero no arcaizante; evita fórmulas tradicionales que oscurezcan el hebreo subyacente.
