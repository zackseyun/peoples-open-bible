translation:
  language: es
  text: ¿Piensan reprender palabras[a], y las palabras de un hombre desesperado son para el viento?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Piensan corregir palabras, y tratar como viento las palabras de un hombre desesperado?». La sintaxis hebrea permite entender la segunda cláusula ya sea como una afirmación («las palabras ... son para el viento») o como parte del objeto de la reprensión («tratar ... como viento»).'
    reason: alternative_reading
lexical_decisions:
- source_word: הַ/לְ/הוֹכַח
  english_pob_choice: to reprove
  chosen_spanish: reprender
  alternatives_spanish:
  - corregir
  - reprochar
  lexicon: HALOT
  rationale: El infinitivo constructo expresa la acción adversativa de examinar y censurar lo dicho; «reprender» conserva mejor ese matiz polémico que «corregir», que en español puede sonar más suave.
- source_word: מִלִּים
  english_pob_choice: words
  chosen_spanish: palabras
  alternatives_spanish:
  - palabras meramente
  - habla
  lexicon: HALOT
  rationale: «Palabras» reproduce de manera directa el sustantivo plural y mantiene la brevedad y la tensión de la queja de Job sin añadir una glosa interpretativa.
- source_word: תַּחְשֹׁבוּ
  english_pob_choice: do you think
  chosen_spanish: piensan
  alternatives_spanish:
  - ¿pretenden?
  - ¿creen?
  lexicon: HALOT
  rationale: El verbo חשב puede significar pensar, planear o considerar. En esta pregunta retórica, «piensan» es idiomático en español y conserva el desafío del hebreo.
- source_word: וּ֝/לְ/ר֗וּחַ
  english_pob_choice: for the wind
  chosen_spanish: para el viento
  alternatives_spanish:
  - como viento
  - al viento
  lexicon: HALOT
  rationale: רוּחַ aquí funciona en sentido literal/metafórico de viento como imagen de algo vano o pasajero. «Para el viento» mantiene la relación marcada por la preposición y la imagen del original.
- source_word: אִמְרֵי
  english_pob_choice: the words
  chosen_spanish: las palabras
  alternatives_spanish:
  - los dichos
  - las declaraciones
  lexicon: HALOT
  rationale: El constructo plural de אמר se refleja bien con «las palabras», que además enlaza con el primer miembro y conserva el paralelismo sin forzar un registro más elevado.
- source_word: נֹאָשׁ
  english_pob_choice: a despairing man
  chosen_spanish: de un hombre desesperado
  alternatives_spanish:
  - de un hombre en desesperación
  - de alguien desesperado
  lexicon: HALOT
  rationale: El participio nifal señala a una persona sin esperanza. «Hombre desesperado» es natural en español y preserva el valor personal y singular del hebreo.
translation_notes:
  revision_awareness: Basado en el paquete fuente WLC y en el audit trail inglés; se conservó la ambigüedad sintáctica señalada por la POB inglesa y no se introdujeron glosas doctrinales.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé»/«Mesías» sin aplicar aquí porque el versículo no contiene esos lemas.
  - Se eligió un registro formal y bíblico, evitando calcos como «reprender palabras» sin el sustantivo plural explícito en español.
  - La nota de pie conserva la alternativa sintáctica del inglés POB y la adapta al español sin resolver indebidamente la ambigüedad.
