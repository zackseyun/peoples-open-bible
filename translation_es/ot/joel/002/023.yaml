  to: Y ustedes, hijos de Sion, regocíjense y alégrense en Yahvé, su Dios, porque él les ha dado la lluvia temprana[a] para vindicación[b]; y hace descender para ustedes la lluvia, la lluvia temprana y la lluvia tardía, como antes[c].
