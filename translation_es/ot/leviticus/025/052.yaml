  text: וְ/אִם מְעַ֞ט נִשְׁאַ֧ר בַּ/שָּׁנִ֛ים עַד שְׁנַ֥ת הַ/יֹּבֵ֖ל וְ/חִשַּׁב ל֑/וֹ כְּ/פִ֣י שָׁנָ֔י/ו יָשִׁ֖יב אֶת גְּאֻלָּתֽ/וֹ־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/leviticus/025/052.yaml
  text: But if few years remain until the Year of Jubilee[a], then he shall calculate with him; according to his years he shall repay the amount for his redemption.
  footnotes:
  - marker: a
    text: Or, 'he shall pay back his redemption price.' The Hebrew expression refers to the amount required for his redemption, not redemption in an abstract sense.
    reason: lexical_alternative
