  yaml_path: translation/ot/1_kings/017/013.yaml
  text: And Elijah said to her[a], “Do not fear. Go, do as you have said. But first make me a small cake from there and bring it out to me[b], and afterward make some for yourself and for your son.”
  footnotes:
