  text: So[a], after being sent off, they went down to Antioch, and after gathering the multitude[c][b], they delivered the letter.
  footnotes:
  - marker: a
    text: Or 'after being dismissed' or 'after being released.' The Greek participle can denote being formally sent away or dismissed.
    reason: lexical_alternative
  - marker: b
    text: '''Went down'' reflects the Greek verb''s directional sense, likely from Jerusalem''s higher elevation to Antioch.'
    reason: cultural_note
  - marker: c
    text: Or 'the assembly' or 'the congregation.' The phrase refers to the gathered group in Antioch.
    reason: lexical_alternative
