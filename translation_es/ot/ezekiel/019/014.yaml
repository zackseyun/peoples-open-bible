translation:
  language: es
  text: Y salió fuego de una rama de sus vástagos[a]; consumió su fruto, y no hubo en ella una rama fuerte, un cetro para gobernar[b]. Esta es una lamentación, y ha llegado a ser una lamentación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de una vara entre sus ramas». El hebreo מַטֶּה puede significar «rama», «vara» o «bastón»; el texto principal sigue la imaginería de la vid, mientras que el «cetro» posterior conserva el sentido real.
    reason: lexical_alternative
  - marker: b
    text: O «no había en ella una vara fuerte, un cetro para gobernar». El hebreo mezcla deliberadamente la imaginería de la vid con la imaginería real.
    reason: alternative_reading
lexical_decisions:
- source_word: וַתֵּצֵא אֵשׁ
  english_pob_choice: And fire went out
  chosen_spanish: Y salió fuego
  alternatives_spanish:
  - Y salió un fuego
  - Y fuego salió
  lexicon: HALOT
  rationale: El hebreo presenta una acción vívida con wayyiqtol; «salió» conserva el movimiento concreto sin forzar un calco. «Fuego» sin artículo mantiene la indefinición del original y funciona bien en español.
- source_word: מִמַּטֵּה
  english_pob_choice: from a branch
  chosen_spanish: de una rama
  alternatives_spanish:
  - de un cetro
  - de un bastón
  - de una vara
  lexicon: HALOT
  rationale: En el contexto de la alegoría de la vid, מַטֶּה puede leerse con imaginería vegetal. «Rama» mantiene esa línea, aunque deja viva la tensión con el sentido real/autoridad que reaparece más adelante en «cetro».
- source_word: בַדֶּיהָ
  english_pob_choice: its limbs
  chosen_spanish: de sus ramas
  alternatives_spanish:
  - de sus miembros
  - de sus boughs
  lexicon: HALOT
  rationale: «Ramas» comunica de forma natural la imagen arbórea del hebreo. «Miembros» sería más literal respecto a la metáfora inglesa, pero en español sonaría menos transparente dentro del cuadro vegetal.
- source_word: פִּרְיָהּ אָכָלָה
  english_pob_choice: it consumed its fruit
  chosen_spanish: consumió su fruto
  alternatives_spanish:
  - devoró su fruto
  - consumió su cosecha
  lexicon: HALOT
  rationale: «Consumió» es el verbo adecuado para el fuego y respeta la fuerza destructiva del hebreo. «Su fruto» preserva la imagen de la vid sin personalizarla excesivamente.
- source_word: וְלֹא הָיָה בָהּ
  english_pob_choice: and there was not in it
  chosen_spanish: y no hubo en ella
  alternatives_spanish:
  - y no había en ella
  - y no tenía
  lexicon: HALOT
  rationale: La estructura existencial hebrea queda bien reflejada con «no hubo en ella», que suena natural y conserva la idea de ausencia interna. Se evita una reformulación más interpretativa.
- source_word: מַטֵּה עֹז
  english_pob_choice: a strong branch
  chosen_spanish: una rama fuerte
  alternatives_spanish:
  - una vara fuerte
  - un bastón poderoso
  lexicon: HALOT
  rationale: En esta escena, «rama» sigue la metáfora botánica que domina el verso, y «fuerte» traduce עֹז de manera sobria. Se mantiene así la tensión con el valor de autoridad del siguiente hemistiquio.
- source_word: שֵׁבֶט לִמְשׁוֹל
  english_pob_choice: a scepter to rule
  chosen_spanish: un cetro para gobernar
  alternatives_spanish:
  - una vara para gobernar
  - un bastón de dominio
  lexicon: HALOT
  rationale: «Cetro» expresa con claridad la función regia de שֵׁבֶט en este contexto. «Para gobernar» traduce לִמְשׁוֹל de forma directa y digna, sin perder el matiz de autoridad.
- source_word: קִינָה הִיא
  english_pob_choice: This is a lamentation
  chosen_spanish: Esta es una endecha
  alternatives_spanish:
  - Esto es un lamento
  - Es una endecha
  lexicon: HALOT
  rationale: «Endecha» es una opción más precisa y literaria que «lamento» para קִינָה, porque conserva el tono de canto fúnebre o elegía del texto profético. Se mantiene el énfasis formal del hebreo.
- source_word: וַתְּהִי לְקִינָה
  english_pob_choice: and it has become a lamentation
  chosen_spanish: y se ha convertido en una endecha
  alternatives_spanish:
  - y llegó a ser una endecha
  - y se volvió endecha
  lexicon: HALOT
  rationale: El perfecto español «se ha convertido» comunica el resultado alcanzado por la escena y conserva la repetición enfática del hebreo. La repetición de «endecha» reproduce el cierre insistente del verso.
theological_decisions:
- issue: Tensión entre imaginería vegetal y regia
  english_pob_reading: Retain both botanical and regal imagery by rendering מַטֶּה as 'branch' in the vine context and שֵׁבֶט as 'scepter' for rule.
  chosen_spanish_reading: 'Conservar ambas líneas de imagen: «rama» en el primer hemistiquio y «cetro» en el segundo.'
  alternative_spanish_readings:
  - Uniformar ambos términos como «vara» o «bastón» para subrayar la realeza
  - Uniformar ambos términos como «rama» para subrayar la vid
  rationale: El hebreo mezcla deliberadamente la metáfora de la vid con la de la soberanía. La versión española debe dejar visible esa fricción poética, porque no es un accidente, sino parte del efecto del verso.
  doctrine_reference: Translation philosophy §3, §5
translation_notes:
  revision_awareness: No hubo revisiones aplicadas en el pasaje fuente; el estado más reciente indica que el texto quedó sin cambios necesarios y con acuerdo moderado del control cruzado. Se mantuvo la lectura que conserva la tensión entre la imagen vegetal y la regia.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto fuente lo exigiera; aquí no aparece el Tetragrámaton.
  - Se prefirió «cetro» para שֵׁבֶט en el hemistiquio final por su valor de autoridad real, y «rama» para מַטֵּה en el marco de la vid.
  - Se eligió «endecha» para קִינָה por precisión genérica y por conservar el tono poético-fúnebre del verso.
