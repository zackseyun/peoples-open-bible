    changes_summary: Replaced 'shattered' with 'dismayed' for better lexical accuracy of חתו; changed 'They became like' to 'They were like' for closer alignment with the Hebrew; simplified the vegetation sequence to avoid adding an extra 'like' not required by the source; revised the final phrase from 'like scorched grain before it is grown' to 'and scorched before it is grown' to better reflect the Hebrew without supplying 'grain.'
translation:
  language: es
  text: Por tanto, sus habitantes estaban [a] faltos de fuerza; estaban consternados y avergonzados. Eran como la hierba del campo y la vegetación tierna, como la hierba de los tejados y como vegetación [b] quemada antes de crecer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente, 'cortos de mano', un modismo para carecer de poder o fuerza.
    reason: lexical_alternative
  - marker: b
    text: O 'abrasada', 'marchita por el calor' o 'como tizón antes de levantarse la mies'. El hebreo final es muy compacto y agrícola, y alude a vegetación arruinada antes de desarrollarse.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיֹשְׁבֵיהֶן
  english_pob_choice: their inhabitants
  chosen_spanish: sus habitantes
  alternatives_spanish:
  - los que habitaban allí
  - los moradores de ellas
  lexicon: HALOT
  rationale: El sufijo posesivo remite a las ciudades o territorios derrotados en el contexto; 'sus habitantes' conserva la referencia concreta a las personas que vivían allí y suena natural en español.
- source_word: קִצְרֵי יָד
  english_pob_choice: short of strength
  chosen_spanish: faltos de fuerza
  alternatives_spanish:
  - de mano corta
  - sin fuerzas
  - impotentes
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática, literalmente 'cortos de mano'. En español, 'faltos de fuerza' comunica la idea de carencia de capacidad o poder sin volverlo opaco con una literalidad innecesaria.
- source_word: חַתּוּ
  english_pob_choice: were dismayed
  chosen_spanish: desmayados
  alternatives_spanish:
  - consternados
  - quebrantados
  - aterrados
  lexicon: HALOT
  rationale: El verbo expresa abatimiento o quebranto interior. 'Desmayados' conserva ese valor de colapso anímico y sigue de cerca la decisión inglesa revisada frente a 'shattered'.
- source_word: וַיֵּבֹשׁוּ
  english_pob_choice: put to shame
  chosen_spanish: avergonzados
  alternatives_spanish:
  - cubiertos de vergüenza
  - deshonrados
  - puestos en vergüenza
  lexicon: HALOT
  rationale: El verbo puede llevar la idea de vergüenza o deshonra. 'Avergonzados' mantiene el resultado pasivo de la acción; en español es más natural que una perífrasis muy larga.
- source_word: עֵשֶׂב שָׂדֶה
  english_pob_choice: the grass of the field
  chosen_spanish: la hierba del campo
  alternatives_spanish:
  - la hierba del campo
  - el pasto del campo
  - la vegetación del campo
  lexicon: HALOT
  rationale: La construcción de posesión se conserva de forma clara. 'Hierba del campo' es comprensible y suficientemente bíblico sin sonar arcaico.
- source_word: וִירַק דֶּשֶׁא
  english_pob_choice: green growth
  chosen_spanish: la vegetación tierna
  alternatives_spanish:
  - el verdor
  - el brote verde
  - la hierba verde
  lexicon: HALOT
  rationale: La expresión apunta a vegetación fresca o tierna. 'Vegetación tierna' transmite mejor la cualidad de crecimiento joven y delicado que un simple calco como 'verdor'.
- source_word: חֲצִיר גַּגּוֹת
  english_pob_choice: grass on the housetops
  chosen_spanish: la hierba de los tejados
  alternatives_spanish:
  - la hierba de los terrados
  - la hierba de las azoteas
  lexicon: HALOT
  rationale: La imagen de hierba en los tejados conserva la fragilidad y superficialidad del crecimiento. 'Tejados' es natural y ampliamente entendible en español.
- source_word: וּשְׁדֵפָה
  english_pob_choice: scorched
  chosen_spanish: quemados
  alternatives_spanish:
  - abrasados
  - consumidos por el calor
  - chamuscados
  lexicon: HALOT
  rationale: El sustantivo denota quemadura, blight o acción de un viento ardiente. En español, 'quemados' capta el resultado sin sobreinterpretar el mecanismo.
- source_word: לִפְנֵי קָמָה
  english_pob_choice: before it is grown
  chosen_spanish: antes de crecer
  alternatives_spanish:
  - antes de espigar
  - antes de que alce
  - antes de madurar
  lexicon: HALOT
  rationale: La frase final es compacta y agrícola. 'Antes de crecer' refleja con sobriedad la idea temporal de que la planta no llega a desarrollarse.
theological_decisions:
- issue: Imagen agrícola de juicio y fragilidad humana
  english_pob_reading: They were like the grass of the field and green growth, like grass on the housetops, and scorched before it is grown.
  chosen_spanish_reading: Eran como la hierba del campo y la vegetación tierna, como la hierba de los tejados y quemados antes de crecer.
  alternative_spanish_readings:
  - Eran como la hierba del campo y el verdor, como la hierba de los tejados y abrasados antes de crecer.
  - Eran como la hierba del campo y la vegetación fresca, como la hierba de los tejados y consumidos antes de crecer.
  rationale: El versículo presenta una serie de imágenes agrícolas que subrayan lo efímero de la condición humana ante el juicio. La traducción conserva esa cadencia y no añade glosas doctrinales; solo hace explícita la imagen de la quema como resultado final.
  doctrine_reference: Juicio divino sobre la soberbia humana; imagen de fragilidad y caducidad en el discurso profético-histórico.
translation_notes:
  revision_awareness: Tomé en cuenta la revisión inglesa más reciente, que prefirió 'dismayed' para חַתּוּ, mantuvo la comparación con 'were like', y simplificó el final a 'scorched before it is grown' sin introducir 'grain'. La versión española sigue esa línea y evita añadir elementos no explícitos en el hebreo.
  spanish_consistency_notes:
  - Uso 'Yahvé' no aplica aquí porque el versículo no contiene el nombre divino.
  - Se mantiene 'hierba' para עֵשֶׂב / חֲצִיר y 'vegetación tierna' para וִירַק דֶּשֶׁא, preservando dos matices distintos de crecimiento vegetal.
  - Se prefirió 'desmayados' para חַתּוּ, porque en español refleja abatimiento o colapso, y evita sobrecargar el verso con un sentido de destrucción física que no es el foco principal.
