translation:
  language: es
  text: Y Babilonia, la hermosura de los reinos, la gloria de la soberbia[a] de los caldeos, será como la destrucción de Sodoma y Gomorra por parte de Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la gloria de la majestad de los caldeos». El hebreo también puede entenderse de manera más neutral como la magnificencia de Babilonia, no necesariamente en sentido negativo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיְתָה
  english_pob_choice: will be
  chosen_spanish: será
  alternatives_spanish:
  - llegará a ser
  - será como
  lexicon: HALOT
  rationale: El perfecto con waw consecutiva en discurso profético expresa futuro. En español, «será» transmite bien el estado resultante sin añadir proceso innecesario.
- source_word: בָבֶל
  english_pob_choice: Babylon
  chosen_spanish: Babilonia
  alternatives_spanish:
  - Babilonía
  lexicon: HALOT
  rationale: Nombre propio bíblico establecido en español; «Babilonia» es la forma natural y reconocible.
- source_word: צְבִי מַמְלָכוֹת
  english_pob_choice: the beauty of kingdoms
  chosen_spanish: hermosura de reinos
  alternatives_spanish:
  - belleza de reinos
  - gloria de reinos
  lexicon: HALOT
  rationale: «Hermosura» conserva el registro poético y corresponde a צְבִי sin repetir «gloria» inmediatamente, lo que ayuda a distinguirlo de תִּפְאֶרֶת.
- source_word: תִּפְאֶרֶת
  english_pob_choice: the glory/splendor of
  chosen_spanish: gloria de
  alternatives_spanish:
  - esplendor de
  - hermosura de
  lexicon: HALOT
  rationale: «Gloria» es una equivalencia fuerte y natural en español para תִּפְאֶרֶת, y mantiene la paralelismo con «hermosura». La revisión inglesa favoreció «glory» sobre «splendor»; en español «gloria» refleja esa decisión.
- source_word: גְּאוֹן
  english_pob_choice: pride
  chosen_spanish: soberbia
  alternatives_spanish:
  - orgullo
  - majestad
  lexicon: HALOT
  rationale: En contexto de oráculo de juicio, גְּאוֹן lleva una carga negativa. «Soberbia» preserva mejor esa tensión que «majestad» o «gloria», y sigue el sentido denunciatorio indicado por el audit trail.
- source_word: כַּשְׂדִּים
  english_pob_choice: the Chaldeans’
  chosen_spanish: de los caldeos
  alternatives_spanish:
  - de los babilonios
  lexicon: HALOT
  rationale: Se conserva el etnónimo histórico «caldeos», como en la fuente inglesa, sin sustituirlo por una generalización posterior.
- source_word: כְּמַהְפֵּכַת
  english_pob_choice: will be like ... overthrow
  chosen_spanish: como el trastorno
  alternatives_spanish:
  - como el derrocamiento
  - como la destrucción
  lexicon: HALOT
  rationale: El sustantivo admite la idea de volcar/volteo/catástrofe. «Trastorno» funciona en español como imagen de inversión violenta y evita un término más interpretativo que «derrocamiento» en este contexto.
- source_word: אֱלֹהִים
  english_pob_choice: God’s
  chosen_spanish: que hizo Dios
  alternatives_spanish:
  - de Dios
  - hecho por Dios
  lexicon: HALOT
  rationale: El hebreo presenta a Dios como agente del trastorno de Sodoma y Gomorra. En español, una cláusula verbal evita forzar una posesión artificial y aclara la agencia divina.
- source_word: אֶת סְדֹם וְאֶת עֲמֹרָה
  english_pob_choice: of Sodom and Gomorrah
  chosen_spanish: a Sodoma y a Gomorra
  alternatives_spanish:
  - de Sodoma y Gomorra
  - contra Sodoma y Gomorra
  lexicon: HALOT
  rationale: Los marcadores de objeto directo se reflejan con «a» en español para preservar la función sintáctica del hebreo y la referencia a los objetos del trastorno.
theological_decisions:
- issue: Valor de גְּאוֹן en contexto de juicio
  english_pob_reading: negative 'pride' rather than neutral 'majesty'
  chosen_spanish_reading: soberbia, no majestad
  alternative_spanish_readings:
  - majestad
  - orgullo
  rationale: La línea describe la caída de una grandeza humana. «Soberbia» conserva la tensión moral del juicio profético y evita neutralizar el término.
  doctrine_reference: Mantener la tensión léxica profética; no suavizar el juicio divino.
- issue: Nombre divino en אֱלֹהִים
  english_pob_reading: God’s overthrow
  chosen_spanish_reading: que hizo Dios
  alternative_spanish_readings:
  - el trastorno de Dios
  - la destrucción de Dios
  rationale: El texto atribuye la catástrofe a Dios como agente soberano. La formulación española debe explicitar esa agencia sin introducir una idea extra de posesión.
  doctrine_reference: Doctrina de la soberanía divina en el juicio histórico.
translation_notes:
  revision_awareness: El audit trail inglés pasó de «splendor» a «glory» para תִּפְאֶרֶת; por eso se eligió «gloria» en español. También se preservó la tensión de גְּאוֹן como orgullo/soberbia en contexto de juicio, siguiendo la nota léxica y la decisión teológica documentadas. La traducción mantiene la referencia histórica a los caldeos y la catástrofe de Sodoma y Gomorra como ejemplo de destrucción divina.
  spanish_consistency_notes:
  - Se usa «Babilonia» como topónimo estándar en español.
  - Se evita «SEÑOR» para יהוה porque este versículo no contiene el Tetragrámaton; «Dios» traduce אֱלֹהִים según el texto.
  - Se mantiene el registro poético sin arcaísmos innecesarios.
  - La nota al pie marca la ambigüedad de גְּאוֹן, igual que el audit trail inglés.
