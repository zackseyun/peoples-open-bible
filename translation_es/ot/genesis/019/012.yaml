  - marker: c
    text: 'Hebreo: «todo lo que es tuyo en la ciudad»; en contexto, esto probablemente se refiere a todas las personas de la casa o del círculo familiar de Lot que están en la ciudad.'
    reason: lexical_alternative
  revision_rationale: 'Se corrige el error grave «suegro» → «yerno», se añade una nota para preservar la alternativa léxica documentada de חָתָן, y se ajusta la frase sobre «todos los tuyos en la ciudad» para reflejar la decisión contextual del POB inglés de que se trata de personas, no de posesiones impersonales. En consecuencia, el mandato final pasa correctamente a plural: «sácalos». Se mantiene «los hombres» conforme al hebreo y al principio de primacía del original. No se requiere adjudicación adicional porque la corrección es clara y de bajo riesgo doctrinal.'
