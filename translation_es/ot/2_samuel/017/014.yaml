    reason: lexical_alternative
  - marker: b
    text: 'O: «había mandado frustrar». El hebreo צִוָּה suele significar «mandar», pero aquí describe la determinación eficaz de Yahvé respecto al consejo de Ahitofel.'
    reason: lexical_alternative
  - marker: c
    text: «Calamidad» traduce un término hebreo que también puede significar «mal» o «desastre»; aquí se refiere a la ruina o daño que vendría sobre Absalón en juicio.
    reason: lexical_alternative
