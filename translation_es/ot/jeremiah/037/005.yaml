base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/037/005.yaml
  text: Now Pharaoh’s army had come out from Egypt[a], and when the Chaldeans who were besieging Jerusalem heard the report about them[c][b], they withdrew from Jerusalem.
  footnotes:
  - marker: a
    text: Or “the Babylonians” for “the Chaldeans.”
    reason: lexical_alternative
  - marker: b
    text: Literally “heard their report”; that is, they heard the news concerning Pharaoh’s army.
    reason: lexical_alternative
  - marker: c
    text: Literally “went up from upon Jerusalem,” an idiom here meaning they pulled back from the siege.
    reason: lexical_alternative
