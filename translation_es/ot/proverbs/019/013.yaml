translation:
  language: es
  text: El hijo insensato es la ruina de su padre[a], y las contiendas de una esposa son un goteo continuo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «El hijo insensato es calamidad para su padre, y las contiendas de una esposa son una gotera constante»'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַוֺּת
  english_pob_choice: ruin
  chosen_spanish: ruina
  alternatives_spanish:
  - calamidad
  - destrucción
  - desastre
  lexicon: HALOT
  rationale: El hebreo plural intensivo expresa efecto destructivo o ruina. «Ruina» conserva bien la fuerza proverbial y suena natural en español sin perder el matiz de daño causado.
- source_word: לְאָבִיו
  english_pob_choice: to his father
  chosen_spanish: para su padre
  alternatives_spanish:
  - a su padre
  - contra su padre
  lexicon: HALOT
  rationale: La preposición ל aquí marca impacto o relación de perjuicio. «Para su padre» comunica en español que el hijo trae ruina sobre él, con un valor más idiomático que una calca directa.
- source_word: בֵּן כְּסִיל
  english_pob_choice: a foolish son
  chosen_spanish: el hijo insensato
  alternatives_spanish:
  - el hijo necio
  - el hijo tonto
  lexicon: HALOT
  rationale: כְּסִיל en Proverbios describe necedad moral y espiritual, no solo falta de inteligencia. «Insensato» conserva ese peso ético mejor que opciones más coloquiales.
- source_word: דֶּלֶף
  english_pob_choice: dripping
  chosen_spanish: goteo
  alternatives_spanish:
  - goteo de agua
  - gotera
  lexicon: HALOT
  rationale: El sustantivo nombra el goteo de una fuga. «Goteo» reproduce la imagen doméstica con claridad en español y mantiene el efecto irritante del proverbio.
- source_word: טֹרֵד
  english_pob_choice: continual
  chosen_spanish: continuo
  alternatives_spanish:
  - constante
  - incesante
  lexicon: HALOT
  rationale: El participio expresa persistencia. «Continuo» preserva ese valor durativo de forma natural en la construcción «goteo continuo».
- source_word: מִדְיְנֵי
  english_pob_choice: quarrels
  chosen_spanish: las contiendas
  alternatives_spanish:
  - las riñas
  - las disputas
  lexicon: HALOT
  rationale: El plural constructo de מדון apunta a pleitos o controversias insistentes. «Contiendas» conserva mejor el tono sapiencial y la intensidad del hebreo que un término demasiado coloquial.
- source_word: אִשָּׁה
  english_pob_choice: a wife’s
  chosen_spanish: de una esposa
  alternatives_spanish:
  - de una mujer
  - de su esposa
  lexicon: HALOT
  rationale: En el paralelo doméstico del proverbio, el contexto sugiere la relación conyugal. «Esposa» expresa esa referencia sin forzar el texto, y evita una restricción innecesaria si el hebreo funciona de manera más general.
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo consonante y la lectura auditada en inglés de People’s Open Bible. No se introdujeron cambios respecto del razonamiento léxico principal; se mantuvo la imagen proverbial doméstica y la tensión entre «ruina/calamidad» y «goteo/gotera» en nota.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto fuente lo requiera; este versículo no lo contiene.
  - Se prefirió «insensato» para כְּסִיל por su matiz sapiencial moral.
  - Se conservó la imagen concreta de «goteo» para דֶּלֶף y «continuo» para טֹרֵד, evitando paráfrasis.
  - «Esposa» mantiene el marco doméstico del proverbio y es coherente con la decisión inglesa de especificar wife.
