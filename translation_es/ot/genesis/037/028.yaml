    reason: alternative_reading
  revision_rationale: Se ajusta una expresión poco natural ('veinte de plata') a un español claro y fiel, manteniendo la elipsis hebrea en nota. También se restaura la nota importante del expediente inglés sobre la ambigüedad de los sujetos plurales, sin resolverla en el texto. El resto del verso puede conservarse con cambios mínimos.
