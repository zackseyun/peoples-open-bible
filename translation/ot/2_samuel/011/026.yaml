id: 2SA.11.26
reference: 2 Samuel 11:26
source:
  edition: WLC
  text: וַ/תִּשְׁמַע֙ אֵ֣שֶׁת אֽוּרִיָּ֔ה כִּי מֵ֖ת אוּרִיָּ֣ה אִישָׁ֑/הּ וַ/תִּסְפֹּ֖ד עַל בַּעְלָֽ/הּ־־׃
translation:
  text: When Uriah’s wife heard that Uriah her husband was dead[a], she mourned for her husband.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'heard that Uriah her husband had died.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּשְׁמַע
  chosen: heard
  alternatives:
  - learned
  - came to hear
  lexicon: HALOT
  rationale: The verb שׁמע in the qal commonly means 'hear.' In narrative English, 'heard' is natural and sufficiently precise; 'learned' is possible but slightly more interpretive.
- source_word: אֵשֶׁת אוּרִיָּה
  chosen: Uriah’s wife
  alternatives:
  - the wife of Uriah
  lexicon: HALOT
  rationale: The construct phrase is most naturally rendered possessively in English. 'Uriah’s wife' is concise and idiomatic while preserving the relational designation used in Hebrew.
- source_word: כִּי
  chosen: that
  alternatives:
  - when
  - because
  lexicon: HALOT
  rationale: 'Here כִּי introduces the content of what she heard: ''that Uriah ... was dead.'' Rendering it as ''that'' best reflects the clause function.'
- source_word: מֵת
  chosen: was dead
  alternatives:
  - had died
  - died
  lexicon: HALOT
  rationale: The predicate adjective/participle-like form states Uriah's dead state. English idiom after 'heard that' favors 'was dead.' 'Had died' is also possible and is preserved as an alternative.
- source_word: אוּרִיָּה אִישָׁהּ
  chosen: her husband Uriah
  alternatives:
  - Uriah her husband
  lexicon: HALOT
  rationale: The Hebrew apposition explicitly identifies Uriah as 'her husband.' The chosen order is smooth modern English while preserving both the name and the relationship.
- source_word: וַתִּסְפֹּד
  chosen: she mourned
  alternatives:
  - she lamented
  - she wailed
  lexicon: HALOT
  rationale: ספד denotes mourning or lamentation for the dead. 'Mourned' is the clearest modern English rendering in this context; 'lamented' is slightly more formal and narrower.
- source_word: עַל
  chosen: for
  alternatives:
  - over
  lexicon: HALOT
  rationale: With verbs of mourning, עַל can be rendered 'for' or 'over.' 'For' is more idiomatic in contemporary English here.
- source_word: בַּעְלָהּ
  chosen: her husband
  alternatives:
  - her lord
  - her master
  lexicon: HALOT
  rationale: Although בַּעַל can have a broader semantic range ('owner,' 'lord,' 'master'), in marital context it straightforwardly means 'husband.' This avoids importing hierarchical nuance not required by the context.
