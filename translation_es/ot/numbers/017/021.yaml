  - severity: low
    issue: La puntuación con dos puntos antes de ‘doce varas’ es poco natural
    rationale: El hebreo encadena la explicación distributiva y luego el total. Una coma antes de ‘doce varas’ fluye mejor en español sin perder la fuerza enumerativa.
