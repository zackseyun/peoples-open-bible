    text: O, de manera más idiomática, «en tu presencia». El griego dice literalmente «delante de tu rostro».
    reason: lexical_alternative
  revision_rationale: Se conserva la estructura e imaginería del borrador, pero se corrige la última cláusula para expresar con español natural el favor dirigido «a ellos» y para alinearla mejor con la decisión inglesa «you are gracious». También se mueve la nota al sintagma correcto, ya que la alternativa comentada corresponde a «delante de tu rostro».
