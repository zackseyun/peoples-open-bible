translation:
  language: es
  text: Los hijos de Rubén y los hijos de Gad tenían una cantidad muy grande de animales[a], y vieron la tierra de Jazer y la tierra de Galaad, y he aquí[b], el lugar era un lugar para animales.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “los rubenitas y los gaditas”. El hebreo dice literalmente “los hijos de Rubén y los hijos de Gad”.'
    reason: lexical_alternative
  - marker: b
    text: 'O: “era adecuado para animales”. El hebreo repite “lugar” para dar énfasis: “el lugar era un lugar para animales”.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִקְנֶה רַב
  english_pob_choice: a very great amount of livestock
  chosen_spanish: una cantidad muy grande de ganado
  alternatives_spanish:
  - mucho ganado
  - ganado abundante
  - una gran cantidad de ganado
  lexicon: HALOT
  rationale: מִקְנֶה designa ganado/livestock como propiedad móvil; en español, “ganado” es el equivalente natural y amplio. רַב intensifica la abundancia, y “una cantidad muy grande” conserva ese énfasis sin reducir el sentido a una sola especie animal.
- source_word: לִבְנֵי רְאוּבֵן וְלִבְנֵי גָד
  english_pob_choice: the sons of Reuben and the sons of Gad
  chosen_spanish: los hijos de Rubén y los hijos de Gad
  alternatives_spanish:
  - los rubenitas y los gaditas
  - los descendientes de Rubén y los descendientes de Gad
  lexicon: HALOT
  rationale: בְּנֵי significa literalmente “hijos de”, y el hebreo repite la expresión con ambos nombres. Como designación tribal, “rubenitas y gaditas” sería posible, pero aquí se conserva la forma transparente del texto.
- source_word: עָצוּם מְאֹד
  english_pob_choice: very great
  chosen_spanish: muy grande
  alternatives_spanish:
  - extremadamente numeroso
  - enormemente abundante
  - muy abundante
  lexicon: HALOT
  rationale: עָצוּם expresa gran magnitud o intensidad; junto con מְאֹד refuerza la idea de abundancia. “Muy grande” es una equivalencia idiomática clara en español y preserva el énfasis sin precisar indebidamente si el foco es número, tamaño o riqueza.
- source_word: וַיִּרְאוּ
  english_pob_choice: and they saw
  chosen_spanish: y vieron
  alternatives_spanish:
  - y cuando vieron
  - y observaron
  lexicon: HALOT
  rationale: El waw consecutivo avanza la narración con una simple coordinación. Por eso se evita introducir “cuando”, que añade una relación temporal no explícita en el hebreo, y se mantiene la secuencia directa con “y vieron”.
- source_word: אֶרֶץ יַעְזֵר וְאֶרֶץ גִּלְעָד
  english_pob_choice: the land of Jazer and the land of Gilead
  chosen_spanish: la tierra de Jazer y la tierra de Galaad
  alternatives_spanish:
  - el país de Jazer y el país de Galaad
  - la región de Jazer y la región de Galaad
  - el territorio de Jazer y el territorio de Galaad
  lexicon: HALOT
  rationale: אֶרֶץ puede ser “tierra”, “región” o “territorio”. “Tierra” sigue de cerca la estructura repetida del hebreo y funciona bien en español bíblico contemporáneo.
- source_word: וְהִנֵּה
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - mira
  - y he aquí
  - resultó que
  lexicon: HALOT
  rationale: הִנֵּה funciona como marcador discursivo de atención e inmediatez. “He aquí” conserva esa fuerza retórica en español bíblico, sin sobrecargar el sentido con una paráfrasis.
- source_word: הַמָּקוֹם מְקוֹם מִקְנֶה
  english_pob_choice: the place was a place for livestock
  chosen_spanish: el lugar era un lugar para ganado
  alternatives_spanish:
  - el lugar era adecuado para ganado
  - el lugar era un lugar para pastoreo
  - la región era un lugar para ganado
  lexicon: HALOT
  rationale: El hebreo repite מָקוֹם para énfasis. “El lugar era un lugar para ganado” conserva esa repetición de forma visible en español; aunque suena enfático, refleja mejor la construcción original que una versión más interpretativa como “era adecuado para ganado”.
translation_notes:
  revision_awareness: La redacción española sigue la última revisión del audit trail al evitar introducir “cuando” en וַיִּרְאוּ. También conserva la repetición enfática de “lugar” en הַמָּקוֹם מְקוֹם מִקְנֶה, como indica la nota inglesa de revisión y la alternativa léxica documentada.
  spanish_consistency_notes:
  - Se mantiene “Yahvé” como convención general del proyecto, pero este versículo no contiene el Tetragrámaton.
  - Se usa “ganado” para מִקְנֶה en armonía con el campo semántico de livestock/cattle y con español bíblico claro.
  - Se conserva la estructura paralela “la tierra de X y la tierra de Y” para reflejar el hebreo repetitivo.
  - No se añade matiz temporal a la conjunción verbal; la coordinación queda simple como en el texto fuente.
