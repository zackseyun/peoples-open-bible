translation:
  language: es
  text: Pero en cuanto a ti[a], levanta tu vara y extiende tu mano sobre el mar y ábrelo en dos, para que los hijos de Israel pasen por en medio del mar por tierra seca.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los israelitas» o «los hijos de Israel». El hebreo dice literalmente «los hijos de Israel».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאַתָּה
  english_pob_choice: But as for you
  chosen_spanish: Pero en cuanto a ti
  alternatives_spanish:
  - Y tú
  - Pero tú
  lexicon: HALOT
  rationale: 'La expresión introduce un contraste enfático: aunque se habla del avance del pueblo, aquí se destaca a Moisés para una acción específica. «Pero en cuanto a ti» conserva ese matiz contrastivo sin sonar forzado en español.'
- source_word: הָרֵם
  english_pob_choice: lift up
  chosen_spanish: levanta
  alternatives_spanish:
  - alza
  - levanta en alto
  lexicon: HALOT
  rationale: El verbo hifil pide elevar la vara físicamente. «Levanta» es natural, claro y fiel al gesto requerido.
- source_word: מַטְּךָ
  english_pob_choice: your staff
  chosen_spanish: tu vara
  alternatives_spanish:
  - tu bastón
  - tu bastón de mando
  lexicon: HALOT
  rationale: En el contexto de Moisés, מַטֶּה puede renderizarse como vara, bastón o cayado. «Vara» preserva bien el objeto y su carga simbólica sin volverlo demasiado arcaico.
- source_word: וּנְטֵה
  english_pob_choice: and stretch out
  chosen_spanish: y extiende
  alternatives_spanish:
  - y alarga
  - y tiende
  lexicon: HALOT
  rationale: נטה describe extender la mano. «Extiende» comunica de forma directa el gesto sin añadir matices no presentes en el hebreo.
- source_word: יָדְךָ
  english_pob_choice: your hand
  chosen_spanish: tu mano
  alternatives_spanish:
  - tu brazo
  lexicon: HALOT
  rationale: Es una traducción literal y transparente del término corporal, sin necesidad de paráfrasis.
- source_word: עַל הַיָּם
  english_pob_choice: over the sea
  chosen_spanish: sobre el mar
  alternatives_spanish:
  - sobre el mar
  - hacia el mar
  lexicon: HALOT
  rationale: עַל aquí expresa la posición/gesto de extender la mano por encima de las aguas. «Sobre el mar» mantiene la imagen física del texto.
- source_word: וּבְקָעֵהוּ
  english_pob_choice: and split it
  chosen_spanish: y divídelo
  alternatives_spanish:
  - y ábrelo
  - y rájalo
  lexicon: HALOT
  rationale: בקע significa partir o abrir por separación. «Divídelo» es fiel y comprensible; evita una explicación más larga que debilitaría la fuerza imperativa.
- source_word: בְנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Israel
  lexicon: HALOT
  rationale: Se preserva la forma masculina plural del hebreo con «hijos», siguiendo la decisión de mantener la referencia explícita del original. «Israelitas» sería más idiomático, pero menos transparente al texto fuente.
- source_word: בְּת֥וֹךְ הַיָּם
  english_pob_choice: into the midst of the sea
  chosen_spanish: en medio del mar
  alternatives_spanish:
  - en medio del mar
  - a través del mar
  lexicon: HALOT
  rationale: בְּתוֹךְ indica interioridad o centro. «En medio del mar» conserva el valor espacial sin sobrerinterpretar la dirección del movimiento.
- source_word: בַּיַּבָּשָׁה
  english_pob_choice: on dry ground
  chosen_spanish: sobre tierra seca
  alternatives_spanish:
  - sobre tierra seca
  - en seco
  lexicon: HALOT
  rationale: El contraste con el mar es la tierra firme, seca. «Sobre tierra seca» es claro en español y mantiene la imagen del milagro del paso por suelo no mojado.
theological_decisions:
- issue: Lenguaje de género para בְנֵי יִשְׂרָאֵל
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - los hijos de Israel
  rationale: La forma hebrea es explícitamente masculina plural. Se conserva esa transparencia formal en lugar de neutralizarla, manteniendo visible la huella del original y el punto del registro léxico.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: La redacción sigue el último estado auditado del inglés, donde «go through the midst of the sea» reemplazó la formulación más literal «go into the midst of the sea» por naturalidad en el contexto de cruce. En español se refleja con «en medio del mar», que conserva la espacialidad del hebreo y evita introducir una dirección no explicitada.
  spanish_consistency_notes:
  - Se usó «mar» para הַיָּם siguiendo el contexto narrativo de Éxodo 14 y la equivalencia usual en español bíblico; no se añadió nota porque no crea una ambigüedad relevante.
  - Se prefirió «vara» sobre «bastón» por ser el término más común y sobrio para מַטֶּה en este pasaje.
  - 'Se mantuvo el orden imperativo del hebreo con verbos coordinados para conservar la secuencia de acciones: levantar la vara, extender la mano, dividir el mar, y luego el ingreso del pueblo.'
