translation:
  language: es
  text: La pereza produce sueño profundo[b][a], y la persona remisa pasará hambre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «una persona perezosa tendrá hambre». Hebreo נֶפֶשׁ puede significar la persona o el propio ser en este contexto.'
    reason: lexical_alternative
  - marker: b
    text: «Persona remisa» traduce רְמִיָּה aquí en el sentido de negligencia o flojedad; en otros pasajes puede llevar el sentido de «engañosa».
    reason: lexical_alternative
lexical_decisions:
- source_word: עַצְלָה
  english_pob_choice: laziness
  chosen_spanish: pereza
  alternatives_spanish:
  - lazitud
  - holgazanería
  lexicon: HALOT
  rationale: El sustantivo expresa flojedad o pereza moral. «Pereza» es claro en español actual y conserva la fuerza proverbial sin sonar arcaico.
- source_word: תַּפִּיל
  english_pob_choice: brings on
  chosen_spanish: produce
  alternatives_spanish:
  - hace caer
  - causa
  - trae como resultado
  lexicon: HALOT
  rationale: 'El hiphil es causativo: la pereza hace que ocurra el sueño profundo. «Produce» comunica esa causalidad de forma natural en español.'
- source_word: תַּרְדֵּמָה
  english_pob_choice: deep sleep
  chosen_spanish: sueño profundo
  alternatives_spanish:
  - sopor
  - dormir pesado
  - letargo
  lexicon: HALOT
  rationale: El término apunta a un sueño pesado o profundo, no solo a somnolencia. «Sueño profundo» preserva la intensidad y suena idiomático.
- source_word: נֶפֶשׁ
  english_pob_choice: person
  chosen_spanish: persona
  alternatives_spanish:
  - alma
  - vida
  - ser
  lexicon: HALOT
  rationale: Aquí נֶפֶשׁ funciona como el individuo mismo. «Persona» evita una lectura demasiado metafísica de «alma» y sigue la decisión auditada en inglés.
- source_word: רְמִיָּה
  english_pob_choice: slack
  chosen_spanish: remisa
  alternatives_spanish:
  - floja
  - negligente
  - descuidada
  lexicon: HALOT
  rationale: En este contexto el adjetivo señala flojedad o negligencia, no engaño. «Remisa» conserva ese matiz de falta de diligencia sin repetir simplemente «perezosa».
- source_word: תִרְעָב
  english_pob_choice: will go hungry
  chosen_spanish: pasará hambre
  alternatives_spanish:
  - tendrá hambre
  - sufrirá hambre
  - se morirá de hambre
  lexicon: HALOT
  rationale: 'El verbo expresa el resultado de la negligencia: carecer de alimento. «Pasará hambre» es idiomático y no exagera hasta «morirá de hambre».'
translation_notes:
  revision_awareness: Se corrigió el problema de validación asegurando que cada marca de nota aparezca explícitamente en el texto español. También se mantuvo la distinción auditada entre עַצְלָה y רְמִיָּה, evitando fundir ambos términos en un solo adjetivo.
  spanish_consistency_notes:
  - Se prefirió «pereza» para עַצְלָה y «remisa» para רְמִיָּה para conservar la diferencia lexical documentada.
  - 'Se evitó «alma» para נֶפֶשׁ por la misma razón indicada en el registro inglés: aquí designa a la persona misma.'
  - «Sueño profundo» mantiene el valor intensivo de תַּרְדֵּמָה sin introducir una interpretación más fuerte que la del texto.
