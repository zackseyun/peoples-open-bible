review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del hebreo: juramento divino, identificación de Yahvé, juicio comparativo sobre Moab y los hijos de Amón, imaginería de esterilidad/desolación, y destino del remanente. También preserva correctamente ''Yahvé'' y ''remanente''. Sin embargo, hay un desajuste gramatical importante al final: los verbos hebreos יְבָזּוּם / יִנְחָלוּם son plurales y sus sujetos también (''el remanente'' entendido colectivamente puede tolerar singular en español, pero el segundo sujeto ''el resto de mi nación'' exige plural si se mantiene el paralelismo coordinado). En el borrador, ''los saqueará'' y ''los heredará'' suenan con sujeto singular y rompen la concordancia natural del español. Además, ''salinas'' es posible, pero ''pozos de sal'' o ''depósitos de sal'' refleja mejor la imagen de מִכְרֵה מֶלַח / ''salt pits'' sin introducir el matiz más técnico-industrial de explotación salinera.'
  spanish_quality_summary: 'El español es claro, digno y legible. ''Por tanto'', ''vivo yo'', ''Yahvé de los ejércitos'' y ''desolación perpetua'' funcionan bien. La puntuación puede pulirse: conviene usar raya parentética sin espacio o comas/rayas consistentes; y tras ''Gomorra'' resulta más natural una raya para introducir la aposición descriptiva. El principal problema de calidad es la concordancia verbal al final. También ''salinas'' puede sonar menos vívido y menos exacto que la imagen de pozos o depósitos salinos en este contexto profético.'
  glossary_alignment: 'Alineación generalmente buena con la terminología del proyecto: יהוה -> ''Yahvé'' correctamente; שְׁאֵרִית -> ''remanente'' correctamente; גוי -> ''nación'' preservado frente a ''pueblo''. ''Los hijos de Amón'' sigue bien la decisión auditada. La excepción recomendable es ajustar וּמִכְרֵה מֶלַח de ''salinas'' a ''pozos de sal'' para acercarse mejor a la decisión inglesa auditada ''salt pits'' y al valor imagístico del hebreo.'
  issues:
