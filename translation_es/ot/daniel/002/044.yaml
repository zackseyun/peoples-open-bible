translation:
  language: es
  text: Y en los días de aquellos reyes[a], el Dios del cielo establecerá un reino que nunca será destruido, y el reino no será entregado a otro pueblo. Aplastará[b] y pondrá fin a todos estos reinos, y este permanecerá para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Aquellos reyes» remite a los reyes y reinos representados en el sueño de Nabucodonosor; los intérpretes discrepan sobre el referente histórico preciso.
    reason: alternative_reading
  - marker: b
    text: O «quebrará en pedazos»; el verbo arameo puede expresar trituración o desmenuzamiento.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְיוֹמֵיהוֹן
  english_pob_choice: And in the days of
  chosen_spanish: Y en los días de
  alternatives_spanish:
  - Pero en los días de
  - Durante los días de
  lexicon: HALOT
  rationale: 'La expresión temporal con prefijo conjuntivo se vierte de manera natural como una transición narrativa y temporal: «Y en los días de». Conserva la conexión con el contexto inmediato sin introducir un matiz adversativo que el hebreo/aramaico no exige.'
- source_word: דִּי מַלְכַיָּא אִנּוּן
  english_pob_choice: those kings
  chosen_spanish: aquellos reyes
  alternatives_spanish:
  - estos reyes
  - los reyes
  lexicon: HALOT
  rationale: El demostrativo remite a reyes ya mencionados en la secuencia de la visión. «Aquellos reyes» conserva la referencia anafórica sin resolver interpretativamente el alcance histórico preciso.
- source_word: יְקִים
  english_pob_choice: will set up
  chosen_spanish: establecerá
  alternatives_spanish:
  - levantará
  - alzará
  - erigirá
  lexicon: HALOT
  rationale: El verbo expresa fundar o establecer un reino. «Establecerá» mantiene el sentido de instauración del reino y suena natural en español bíblico contemporáneo.
- source_word: אֱלָהּ שְׁמַיָּא
  english_pob_choice: the God of heaven
  chosen_spanish: el Dios del cielo
  alternatives_spanish:
  - Dios del cielo
  - el Dios de los cielos
  lexicon: HALOT
  rationale: Es un título arameo estable. «El Dios del cielo» conserva la forma definida y la referencia titular sin forzar pluralización ni una formulación más litúrgica de lo necesario.
- source_word: מַלְכוּ
  english_pob_choice: a kingdom
  chosen_spanish: un reino
  alternatives_spanish:
  - el reino
  - dominio real
  lexicon: HALOT
  rationale: 'El sustantivo aparece sin artículo y funciona naturalmente como indefinido: Dios establecerá «un reino». Se evita «el reino» para no introducir una definitud que el texto no marca aquí.'
- source_word: דִּי לְעָלְמִין לָא תִתְחַבַּל
  english_pob_choice: that will never be destroyed
  chosen_spanish: que nunca será destruido
  alternatives_spanish:
  - que no será destruido para siempre
  - que jamás será arruinado
  lexicon: HALOT
  rationale: La negación con valor durativo se expresa con «nunca» para captar la permanencia absoluta. «Será destruido» conserva la fuerza de daño total del verbo sin suavizarla.
- source_word: וּמַלְכוּתָהּ
  english_pob_choice: and the kingdom
  chosen_spanish: y el reino
  alternatives_spanish:
  - y su reino
  - y este reino
  lexicon: HALOT
  rationale: El sufijo retoma al reino recién mencionado, pero en español es más natural mantener «el reino» que «su reino», tal como la revisión inglesa reciente prefirió «the kingdom» por cercanía al arameo.
- source_word: לְעַם אָחֳרָן לָא תִשְׁתְּבִק
  english_pob_choice: will not be left to another people
  chosen_spanish: no será entregado a otro pueblo
  alternatives_spanish:
  - no será dejado a otro pueblo
  - no pasará a otro pueblo
  lexicon: HALOT
  rationale: El pasivo/reflexivo indica que el reino no quedará en posesión de otro pueblo. «Entregado» comunica esa transferencia sin perder la idea de no ser abandonado ni traspasado.
- source_word: תַּדִּק
  english_pob_choice: It will crush
  chosen_spanish: Desmenuzará
  alternatives_spanish:
  - Aplastará
  - Quebrantará
  - Triturará
  lexicon: HALOT
  rationale: El verbo arameo tiene la fuerza de aplastar, triturar o hacer polvo. «Desmenuzará» reproduce bien el valor de trituración y evita una imagen demasiado técnica o excesivamente coloquial.
- source_word: וְתָסֵיף
  english_pob_choice: and put an end to
  chosen_spanish: y pondrá fin a
  alternatives_spanish:
  - y acabará con
  - y terminará con
  lexicon: HALOT
  rationale: El causativo expresa llevar algo a su término. «Pondrá fin a» distingue este verbo del anterior («desmenuzará») y mantiene la diferencia semántica que la POB inglesa preserva.
- source_word: כָּל אִלֵּין מַלְכְוָתָא
  english_pob_choice: all these kingdoms
  chosen_spanish: todos estos reinos
  alternatives_spanish:
  - todas estas reinos
  - todos aquellos reinos
  lexicon: HALOT
  rationale: El demostrativo apunta a los reinos de la visión y se traduce de forma directa por «estos». «Reinos» conserva la misma categoría léxica que en el resto del versículo.
- source_word: וְהִיא תְּקוּם לְעָלְמַיָּא
  english_pob_choice: and it will stand forever
  chosen_spanish: y él permanecerá para siempre
  alternatives_spanish:
  - y permanecerá para siempre
  - y se mantendrá para siempre
  - y subsistirá para siempre
  lexicon: HALOT
  rationale: El verbo «levantarse/quedarse en pie» en este contexto expresa permanencia. Se opta por «permanecerá» para un español fluido; el sujeto se referencia como masculino singular al «reino».
theological_decisions:
- issue: Identificación del reino final
  english_pob_reading: The verse states that the God of heaven will set up an everlasting kingdom that triumphs over all others, without naming that kingdom as Christ’s kingdom in the translation itself.
  chosen_spanish_reading: El texto afirma que el Dios del cielo establecerá un reino eterno que vencerá a todos los demás, sin añadir en la traducción una identificación doctrinal explícita.
  alternative_spanish_readings:
  - el reino mesiánico de Cristo
  - el reinado futuro de Dios
  rationale: El arameo no nombra explícitamente a Cristo; la identificación cristológica es una lectura teológica legítima, pero la traducción debe conservar el enunciado textual. Por eso se mantiene el lenguaje de reino eterno y vencedor sin sobreespecificar.
  doctrine_reference: Translation philosophy; lectura cristológica tradicional
- issue: Referente de «aquellos reyes»
  english_pob_reading: Those kings refers back to the kings/kingdoms represented in Nebuchadnezzar’s dream; interpreters differ on the precise historical referent.
  chosen_spanish_reading: «Aquellos reyes» se traduce de forma anafórica sin fijar si se trata de los reyes de los reinos previos, de la fase final del reino dividido, o del conjunto simbólico de la visión.
  alternative_spanish_readings:
  - estos reyes
  - los reyes del sueño
  rationale: La ambigüedad interpretativa está documentada en el texto de trabajo, así que la traducción debe preservarla. «Aquellos» mantiene la referencia hacia atrás sin decidir entre las opciones exegéticas.
  doctrine_reference: Transparencia textual y prudencia exegética
translation_notes:
  revision_awareness: 'La versión inglesa más reciente corrigió «its kingdom» por «the kingdom» para ajustarse mejor al arameo y sonar más natural. La redacción española sigue esa misma línea: evita un posesivo innecesario en la frase correspondiente y conserva la secuencia semántica: establecimiento del reino, su indestructibilidad, su no-transferencia a otro pueblo, la trituración de los reinos previos y su permanencia eterna.'
  spanish_consistency_notes:
  - Se mantiene «Dios del cielo» como título estable, sin sustituirlo por una fórmula devocional distinta.
  - Se usa «reino» de manera consistente para מַלְכוּ / מַלְכוּתָהּ, evitando alternar con «dominio» sin necesidad textual.
  - Se evita «Señor» para el nombre divino, conforme al estándar del proyecto para יהוה; aquí el título es «Dios del cielo».
  - La dupla verbal «desmenuzará / pondrá fin» conserva la distinción del arameo entre trituración y terminación.
  - «Aquellos reyes» preserva la distancia anafórica del demostrativo sin resolver la cuestión histórica discutida.
