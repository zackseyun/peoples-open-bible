  glossary_alignment: No hay conflictos con la terminología base del proyecto. «justos», «sus ojos», «para siempre» y «ensalzados» son compatibles con el sentido fuente. El único ajuste léxico importante es preferir «los sienta» sobre «los asienta» por naturalidad y fidelidad idiomática.
