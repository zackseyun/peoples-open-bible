translation:
  language: es
  text: El ancho del muro que pertenecía a las cámaras laterales por fuera era de cinco codos[a], y lo que quedaba era el lugar de las cámaras laterales pertenecientes a la casa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo es difícil: la última cláusula también podría entenderse como «y lo que había quedado libre era la estructura de las cámaras laterales perteneciente a la casa», o de modo semejante. El versículo describe la distribución alrededor del edificio del templo.'
    reason: alternative_reading
lexical_decisions:
- source_word: רֹחַב
  english_pob_choice: width
  chosen_spanish: ancho
  alternatives_spanish:
  - anchura
  - ancho
  lexicon: HALOT
  rationale: En un contexto arquitectónico, רֹחַב expresa la medida transversal de una estructura. «Ancho» suena natural en español y conserva el sentido espacial sin sobrecargar el texto.
- source_word: הַקִּיר
  english_pob_choice: the wall
  chosen_spanish: el muro
  alternatives_spanish:
  - la pared
  - el muro
  lexicon: HALOT
  rationale: Aunque «pared» también sería posible, «muro» encaja mejor en una descripción arquitectónica formal y mantiene un tono más técnico.
- source_word: אֲשֶׁר לַצֵּלָע
  english_pob_choice: that belonged to the side chambers
  chosen_spanish: que pertenecía a las cámaras laterales
  alternatives_spanish:
  - de las cámaras laterales
  - que pertenecía a la cámara lateral
  lexicon: HALOT
  rationale: צֵלָע en este pasaje del templo no se traduce como «costilla» ni simplemente «lado», sino como cámaras o estructuras laterales. Se usa el plural «cámaras laterales» por el contexto arquitectónico y la referencia colectiva del hebreo.
- source_word: אֶל הַחוּץ
  english_pob_choice: on the outside
  chosen_spanish: del lado exterior
  alternatives_spanish:
  - en el exterior
  - hacia afuera
  lexicon: HALOT
  rationale: La frase marca orientación exterior. «Del lado exterior» conserva la idea direccional de manera idiomática en español.
- source_word: חָמֵשׁ אַמּוֹת
  english_pob_choice: five cubits
  chosen_spanish: cinco codos
  alternatives_spanish:
  - cinco codos
  lexicon: HALOT
  rationale: Se conserva la unidad antigua «codos» para mantener la medida del texto fuente; no se moderniza a metros porque la visión arquitectónica usa esa unidad tradicional.
- source_word: וַאֲשֶׁר מֻנָּח
  english_pob_choice: and what was left
  chosen_spanish: y lo que quedaba
  alternatives_spanish:
  - y lo que había quedado
  - y lo que estaba dejado
  lexicon: HALOT
  rationale: מֻנָּח es difícil; el audit trail inglés opta por un sentido de «lo que quedaba / se había dejado libre». «Lo que quedaba» expresa esa noción sin introducir una interpretación más fuerte que la fuente.
- source_word: בֵּית צְלָעוֹת
  english_pob_choice: the place of the side chambers
  chosen_spanish: el lugar de las cámaras laterales
  alternatives_spanish:
  - la casa de las cámaras laterales
  - la estructura de las cámaras laterales
  lexicon: HALOT
  rationale: בֵּית puede indicar «casa» o «estructura/lugar». En español, «el lugar de las cámaras laterales» mantiene la relación espacial y evita una construcción demasiado técnica o forzada.
- source_word: אֲשֶׁר לַבָּיִת
  english_pob_choice: that belonged to the house
  chosen_spanish: que pertenecían a la casa
  alternatives_spanish:
  - que pertenecían al templo
  - de la casa
  lexicon: HALOT
  rationale: «Casa» preserva el término hebreo בַּיִת; en este contexto se entiende como el edificio del templo. Se evita sustituirlo por «templo» en el texto principal para no perder la correspondencia lexical.
translation_notes:
  revision_awareness: Se siguió la revisión inglesa más reciente, que prefirió una formulación más literal para la cláusula final en lugar de «el espacio abierto entre». Por eso el español evita añadir «entre» y conserva una estructura que refleja mejor וַאֲשֶׁר מֻנָּח ... בֵּית צְלָעוֹת, manteniendo a la vez claridad natural.
  spanish_consistency_notes:
  - Se preservó «casa» para בַּיִת en el texto principal, conforme al patrón de la POB, aunque el contexto identifique el edificio del templo.
  - Se usó «cámaras laterales» para צְלָעוֹת por coherencia con el contexto arquitectónico del capítulo.
  - La medida «codos» se mantiene sin conversión para respetar la imagen original y la práctica de la POB.
