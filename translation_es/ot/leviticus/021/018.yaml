translation:
  language: es
  text: 'Porque ningún hombre que tenga un defecto[a] se acercará[b]: un hombre ciego, o un cojo, o uno con el rostro desfigurado[c], o uno con una extremidad demasiado larga[d].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «imperfección»: el término hebreo se refiere a un defecto físico que descalifica para el acercamiento sacerdotal en este contexto.'
    reason: lexical_alternative
  - marker: b
    text: «Acercarse» aquí se refiere a acercarse para el servicio sacerdotal.
    reason: cultural_note
  - marker: c
    text: El término hebreo traducido «uno con el rostro desfigurado» es raro y puede referirse más específicamente a una nariz dañada o malformada.
    reason: lexical_alternative
  - marker: d
    text: O «uno con una extremidad extendida o deformada»; el término hebreo probablemente denota una parte del cuerpo desproporcionada.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Porque entonces
  lexicon: HALOT
  rationale: Introduce la razón o explicación de la restricción anterior; «Porque» conserva ese valor explicativo de manera natural en español.
- source_word: כָל אִישׁ
  english_pob_choice: no man
  chosen_spanish: ningún hombre
  alternatives_spanish:
  - ninguna persona
  - nadie
  lexicon: HALOT
  rationale: La negación con cuantificador produce en español una formulación natural con «ningún hombre». Se conserva «hombre» porque el contexto sacerdotal inmediato trata de varones en función cultual.
- source_word: אֲשֶׁר בּוֹ מוּם
  english_pob_choice: who has a defect
  chosen_spanish: que tenga defecto
  alternatives_spanish:
  - que tenga una mancha
  - en quien haya defecto
  - que tenga un defecto
  lexicon: HALOT
  rationale: «Defecto» refleja bien מוּם como falta física que descalifica en este contexto. Se evitó «mancha» porque en español puede sonar menos preciso para una discapacidad física concreta.
- source_word: לֹא יִקְרָב
  english_pob_choice: shall come near
  chosen_spanish: se acercará
  alternatives_spanish:
  - no se acercará
  - no podrá acercarse
  - no vendrá cerca
  lexicon: HALOT
  rationale: El verbo קרב en este marco sacerdotal conserva el sentido de acercarse para servicio cultual. «Se acercará» mantiene la forma y el valor ritual sin añadir explicación interpretativa en el texto principal.
- source_word: אִישׁ עִוֵּר
  english_pob_choice: a blind man
  chosen_spanish: un hombre ciego
  alternatives_spanish:
  - un ciego
  - un hombre que es ciego
  lexicon: HALOT
  rationale: «Hombre ciego» es natural y conserva el paralelismo nominal del hebreo. Se evita una expresión más clínica o perifrástica.
- source_word: פִסֵּחַ
  english_pob_choice: a lame man
  chosen_spanish: un cojo
  alternatives_spanish:
  - un hombre cojo
  - un lisiado
  lexicon: HALOT
  rationale: «Cojo» es la equivalencia estándar y menos cargada que «lisiado»; mantiene la referencia a una condición física de marcha o movilidad.
- source_word: חָרֻם
  english_pob_choice: one with a disfigured face
  chosen_spanish: uno con el rostro desfigurado
  alternatives_spanish:
  - uno con la cara desfigurada
  - uno con el rostro mutilado
  - uno con el rostro deformado
  lexicon: HALOT
  rationale: 'La elección sigue la cautela del inglés POB: el término es raro y el sentido más probable es una deformidad facial. «Rostro» suena más digno y bíblicamente natural que «cara».'
- source_word: שָׂרֽוּעַ
  english_pob_choice: one with a limb too long
  chosen_spanish: uno con un miembro demasiado largo
  alternatives_spanish:
  - uno con una extremidad demasiado larga
  - uno con un miembro extendido
  - uno con una extremidad deformada
  lexicon: HALOT
  rationale: «Miembro demasiado largo» conserva la imagen corporal concreta y la ambigüedad controlada del original, tal como lo hace la nota inglesa sobre una desproporción física.
theological_decisions:
- issue: Naturaleza de la exclusión sacerdotal
  english_pob_reading: Render the verse as a cultic qualification for approaching the sanctuary, not as a statement about personal worth or moral status.
  chosen_spanish_reading: Presentar el versículo como una restricción de idoneidad para acercarse al servicio sagrado, no como un juicio sobre el valor personal o la rectitud moral.
  alternative_spanish_readings:
  - Interpretarlo como una exclusión social más amplia
  - Suavizarlo hasta hacerlo parecer una observación meramente simbólica
  rationale: El hebreo se limita a la aptitud física para «acercarse» en el marco sacerdotal. La redacción española conserva ese alcance cultual y evita extender el sentido a una descalificación moral o antropológica que el texto no afirma.
  doctrine_reference: Translation philosophy §1 y §3
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el estado de alta concordancia confirma que no se requieren ajustes respecto del análisis fuente-idioma.
  spanish_consistency_notes:
  - Se mantiene «hombre» por la referencia al contexto sacerdotal masculino, sin volverlo genérico.
  - «Defecto» se usa de forma consistente para מוּם y se aclara en nota la alternativa «blemish».
  - «Acercarse» conserva el valor cultual de קרב, reforzado por nota para evitar una lectura meramente espacial.
  - Los términos físicos difíciles se traducen con cautela y sin sobreprecisar el hebreo raro.
  - Se conserva un registro bíblico moderno y digno, evitando arcaísmos innecesarios.
