translation:
  language: es
  text: Así consumió sus días en vanidad[a] y sus años en terror.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en futilidad»; también puede entenderse como «como un soplo».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְכַל
  english_pob_choice: consumed
  chosen_spanish: consumió
  alternatives_spanish:
  - puso fin a
  - acabó con
  - llevó a su fin
  lexicon: HALOT
  rationale: El verbo כלה puede expresar terminar, consumir o llevar a término. «Consumió» conserva la fuerza verbal y el matiz de desgaste/judicio que el contexto pide, sin suavizarlo a una mera conclusión temporal.
- source_word: בַּהֶבֶל
  english_pob_choice: in futility
  chosen_spanish: en futilidad
  alternatives_spanish:
  - en vanidad
  - en vaciedad
  - como un soplo
  lexicon: HALOT
  rationale: הֶבֶל designa vapor/soplo y por extensión vanidad, vacuidad o inutilidad. «Futilidad» comunica en español contemporáneo la idea de vida insustancial o desperdiciada, preservando el valor metafórico del término.
- source_word: יְמֵיהֶם
  english_pob_choice: their days
  chosen_spanish: sus días
  alternatives_spanish:
  - sus vidas
  - el curso de sus días
  lexicon: HALOT
  rationale: Se conserva «días» para mantener la imagen poética concreta del hebreo y su paralelismo con «años».
- source_word: וּשְׁנוֹתָם
  english_pob_choice: and their years
  chosen_spanish: y sus años
  alternatives_spanish:
  - y sus tiempos
  - y el transcurso de sus años
  lexicon: HALOT
  rationale: La correspondencia poética con «días» exige mantener «años», sin generalizar el paralelismo temporal.
- source_word: בַּבֶּהָלָה
  english_pob_choice: in terror
  chosen_spanish: en terror
  alternatives_spanish:
  - en pánico
  - en espanto
  - en súbita alarma
  lexicon: HALOT
  rationale: בֶּהָלָה expresa terror, alarma o pánico súbito. «Terror» es la opción más directa y sobria para el contexto de juicio, manteniendo la carga emocional del término.
theological_decisions:
- issue: Sujeto implícito del verbo
  english_pob_reading: 'God is the subject: ''he consumed their days in futility'''
  chosen_spanish_reading: 'Dios es el sujeto implícito: «Así consumió sus días...»'
  alternative_spanish_readings:
  - «Así fueron consumidos sus días...»
  - «Así llegaron a su fin sus días...»
  rationale: El contexto inmediato atribuye la acción al obrar divino en juicio. Mantener el sujeto implícito pero recuperable en español respeta la sintaxis hebrea y la agencia teológica del pasaje.
  doctrine_reference: Translation philosophy §§1, 3
translation_notes:
  revision_awareness: La revisión inglesa reciente prefirió «consumed» frente a una paráfrasis más explicativa («brought ... to an end»). La propuesta española sigue esa decisión revisada y conserva el paralelo «en futilidad ... en terror».
  spanish_consistency_notes:
  - Se mantiene el paralelismo nominal «días / años» sin sustituirlo por «vida(s)».
  - «Futilidad» se usa como equivalente contemporáneo de הֶבֶל, evitando el arcaísmo «vanidad» en el texto principal.
  - El sujeto agente queda implícito, conforme al hebreo y al contexto de juicio divino.
