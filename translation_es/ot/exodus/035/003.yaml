review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: una prohibición directa de encender fuego, con alcance distributivo en todas las moradas, y situada temporalmente en el día de sábado. Sin embargo, dos ajustes mejoran la fidelidad y el español natural: el verbo debe ir en imperativo/prohibición de segunda persona plural («No encenderán» suena más predictivo que prescriptivo), y la frase temporal «en el día del sábado» es demasiado calcada frente a un español más natural que aún preserve «día».'
  spanish_quality_summary: El texto es claro y digno, pero «No encenderán» resulta menos natural para un mandato legal que «No enciendan». «En el día del sábado» suena rígido; «el día de sábado» preserva la mención de «día» con mejor fluidez, aunque «en sábado» sería más idiomático pero omitiría «día». «Moradas» es aceptable y de registro bíblico comprensible; la nota léxica puede mantenerse.
  glossary_alignment: No hay términos del glosario mayor en disputa. La elección «encender» para תְבַעֲרוּ concuerda con la decisión inglesa «kindle». «Moradas» es compatible con el valor amplio de מֹשְׁבֹתֵיכֶם. «Sábado» es correcto para הַשַּׁבָּת. No se observan conflictos con Yahvé/Mesías/Espíritu u otros términos de proyecto.
  issues:
  - severity: medium
    issue: Modo verbal español poco adecuado para una prohibición legal
    rationale: El hebreo expresa una prohibición dirigida al pueblo. En español bíblico-natural, «No enciendan» transmite mejor el mandato que «No encenderán», que puede leerse como futuro descriptivo más que imperativo.
  - severity: low
    issue: Calco poco natural en la expresión temporal
    rationale: «En el día del sábado» preserva la forma hebrea pero suena forzado en español. «El día de sábado» mantiene la mención explícita de «día» con mejor legibilidad.
  revised_spanish_text: No enciendan fuego en ninguna de sus moradas[a] el día de sábado.
