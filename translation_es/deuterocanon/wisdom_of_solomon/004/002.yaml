translation:
  language: es
  text: Cuando está presente, la imitan, y la anhelan cuando se ha ido; y a través del siglo[a] marcha en triunfo, llevando una corona de vencedor, después de haber ganado el certamen de los premios incontaminados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para siempre». La frase griega dice literalmente «en el siglo» y puede indicar fama perdurable o duración continua.
    reason: lexical_alternative
lexical_decisions:
- source_word: παροῦσάν
  english_pob_choice: when she is present
  chosen_spanish: cuando está presente
  alternatives_spanish:
  - mientras está presente
  - cuando se halla presente
  lexicon: LSJ
  rationale: παροῦσάν expresa presencia; en español, "cuando está presente" conserva el contraste temporal con la partida sin sonar forzado.
- source_word: μιμοῦνται
  english_pob_choice: they imitate
  chosen_spanish: la imitan
  alternatives_spanish:
  - la emulan
  - siguen su ejemplo
  lexicon: LSJ
  rationale: El verbo significa imitar o emular; "la imitan" es directo y mantiene la fuerza del paralelismo.
- source_word: ποθοῦσιν
  english_pob_choice: they long for
  chosen_spanish: la anhelan
  alternatives_spanish:
  - la desean
  - la añoran
  lexicon: LSJ
  rationale: '"Anhelan" conserva el sentido afectivo fuerte de deseo sin volverlo demasiado romántico o arcaico.'
- source_word: ἀπελθοῦσαν
  english_pob_choice: when she has gone
  chosen_spanish: cuando se ha ido
  alternatives_spanish:
  - después de partir
  - cuando está ausente
  lexicon: LSJ
  rationale: El participio aoristo marca una salida ya cumplida; "cuando se ha ido" mantiene bien el contraste con la presencia.
- source_word: ἐν τῷ αἰῶνι
  english_pob_choice: through the age
  chosen_spanish: por el siglo
  alternatives_spanish:
  - por la era
  - para siempre
  lexicon: LSJ
  rationale: αἰών puede significar un siglo, una era o un tiempo prolongado. "Por el siglo" conserva la imagen de duración histórica y deja abierta la amplitud del término; la alternativa más lisa se reserva en la nota.
- source_word: στεφανηφοροῦσα
  english_pob_choice: wearing a victor’s wreath
  chosen_spanish: llevando una corona de vencedor
  alternatives_spanish:
  - coronada
  - llevando una corona
  lexicon: LSJ
  rationale: El verbo alude a portar una corona o guirnalda de victoria; "corona de vencedor" preserva la imaginería atlética.
- source_word: πομπεύει
  english_pob_choice: she marches in triumph
  chosen_spanish: marcha en triunfo
  alternatives_spanish:
  - va en procesión triunfal
  - desfila triunfalmente
  lexicon: LSJ
  rationale: El verbo sugiere una procesión pública, con matiz de triunfo; "marcha en triunfo" es idiomático y fiel al cuadro.
- source_word: ἀμιάντων
  english_pob_choice: the undefiled
  chosen_spanish: incorruptibles
  alternatives_spanish:
  - incontaminados
  - puros
  lexicon: LSJ
  rationale: Aunque el adjetivo significa literalmente "no manchado" o "sin contaminación", aquí la relación con ἄθλων permite oír el matiz de premios incorruptibles; en español se opta por una forma que preserve ese enlace semántico sin perder la pureza moral.
- source_word: ἄθλων
  english_pob_choice: prizes
  chosen_spanish: los premios
  alternatives_spanish:
  - las recompensas
  - los galardones
  lexicon: LSJ
  rationale: ἆθλον es un premio ganado en competencia; "premios" mantiene la metáfora atlética y se entiende con naturalidad en español.
- source_word: ἀγῶνα
  english_pob_choice: the contest
  chosen_spanish: la competencia
  alternatives_spanish:
  - el certamen
  - la lucha
  lexicon: LSJ
  rationale: ἀγών puede ser un combate, lucha o concurso; "competencia" conserva el campo de contienda premiada sin estrecharlo demasiado.
- source_word: νικήσασα
  english_pob_choice: having won
  chosen_spanish: después de haber ganado
  alternatives_spanish:
  - habiendo vencido
  - tras vencer
  lexicon: LSJ
  rationale: El participio aoristo indica victoria ya completada antes de la procesión triunfal; esta forma española lo expresa con claridad natural.
theological_decisions:
- issue: Referente femenino de los pronombres
  english_pob_reading: The feminine pronouns refer to virtue personified from the immediate context.
  chosen_spanish_reading: Los pronombres femeninos se refieren a la virtud personificada del contexto inmediato.
  alternative_spanish_readings:
  - Se refiere de modo general a una excelencia o carácter noble personificado
  - La referencia es una abstracción femenina sin identidad literaria precisa
  rationale: El pasaje continúa la personificación del contexto; conservar "la" y el femenino respeta la figura literaria en lugar de volverla abstracta.
  doctrine_reference: DOCTRINE.md §Translation philosophy, gender-accurate over gender-neutral
- issue: Valor de ἐν τῷ αἰῶνι
  english_pob_reading: An enduring, age-spanning triumph rather than a narrowly technical statement about metaphysical eternity.
  chosen_spanish_reading: Un triunfo duradero y de alcance temporal amplio, no una precisión técnica sobre la eternidad metafísica.
  alternative_spanish_readings:
  - para siempre
  - en la eternidad
  rationale: La frase resalta honor perdurable y vindicación pública. El texto principal conserva la ambigüedad del término griego sin resolverla por completo, mientras la nota ofrece una alternativa más fluida.
  doctrine_reference: DOCTRINE.md §Translation philosophy, preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: El contexto inglés fue revisado desde una formulación menos natural en la última cláusula a "having won the contest of the undefiled prizes". En español se siguió esa revisión, colocando "los premios incorruptibles" para reflejar el enlace de ἀμιάντων con ἄθλων y evitando invertir el sintagma final.
  spanish_consistency_notes:
  - Se mantuvo el femenino singular por la personificación del pasaje.
  - Se preservó el paralelismo presencia/ausencia con "cuando está presente / cuando se ha ido".
  - La última cláusula conserva el tono atlético de victoria, corona y premios.
  - No se usó "Cristo", "SEÑOR" ni terminología eclesiástica ajena al texto.
  - La nota [a] está anclada exactamente en el texto y no hay notas sin marca.
