    issue: '''Sus vigilantes'' para צפו'
    rationale: Aunque comunica la función básica, en español neutral eclesial 'vigilantes' suele asociarse a personal de seguridad contemporáneo. 'Atalayas' preserva mejor la imagen profética de centinelas/watchmen y suena más apropiado al contexto de Isaías.
  revised_spanish_text: Sus atalayas son ciegos, todos ellos; no saben nada. Todos ellos son perros mudos, incapaces de ladrar, soñadores,[a] echados, amantes de dormitar.
