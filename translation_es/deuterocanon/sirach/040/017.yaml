translation:
  language: es
  text: La bondad nunca será sacudida[b][a], y la justicia permanecerá para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: «la gracia es como un paraíso en bendiciones, y la limosna permanece para siempre». El testimonio hebreo, en cambio, dice «bondad ... y justicia ...».'
    reason: alternative_reading
  - marker: b
    text: Masada conserva aquí una lectura hebrea diferente de la del texto de la Guenizá de El Cairo; el fragmento sobreviviente es demasiado incompleto en este punto para determinar con plena confianza toda la traducción.
    reason: textual_variant
lexical_decisions:
- source_word: וחסד
  english_pob_choice: Kindness
  chosen_spanish: bondad
  alternatives_spanish:
  - misericordia
  - gracia
  - amor leal
  lexicon: HALOT
  rationale: חסד abarca bondad, misericordia y lealtad pactal. En este contexto sapiencial, sin marco explícito de alianza, «bondad» comunica bien la virtud ética en español moderno y conserva la amplitud sin cargarla hacia una fórmula eclesiástica fija.
- source_word: לעולם לא ימוט
  english_pob_choice: will never be shaken
  chosen_spanish: nunca será abatida
  alternatives_spanish:
  - nunca vacilará
  - nunca será sacudida
  - nunca será movida
  lexicon: HALOT
  rationale: ימוט expresa la idea de tambalear, ser sacudido o perder firmeza. «Será abatida» mantiene la imagen de derrumbe/caída de estabilidad de forma natural en español, aunque «será sacudida» sería más literal.
- source_word: וצדקה
  english_pob_choice: righteousness
  chosen_spanish: la justicia
  alternatives_spanish:
  - la rectitud
  - la justicia y rectitud
  - la limosna
  lexicon: HALOT
  rationale: צדקה puede significar justicia o rectitud, y en tradiciones posteriores también puede acercarse a limosna. Aquí el hebreo presente favorece «justicia» como equivalente claro y amplio; el matiz de almsgiving del griego queda preservado en nota sin desplazar el texto base.
- source_word: לעד תכון
  english_pob_choice: will stand forever
  chosen_spanish: permanecerá para siempre
  alternatives_spanish:
  - quedará establecida para siempre
  - estará firme para siempre
  - se mantendrá para siempre
  lexicon: HALOT
  rationale: תכון viene de כון y comunica estar establecido, firme o fijo. «Permanecerá para siempre» ofrece una solución natural en español y retiene la noción de durabilidad estable del paralelismo.
theological_decisions:
- issue: Divergencia hebreo-griego en el segundo cola
  english_pob_reading: 'The English POB follows the Hebrew: ''righteousness will stand forever,'' while preserving the Greek alternative in a footnote (''almsgiving will endure forever'').'
  chosen_spanish_reading: La justicia permanecerá para siempre.
  alternative_spanish_readings:
  - La limosna permanecerá para siempre.
  - La misericordia permanecerá para siempre.
  rationale: Se da primacía al hebreo conservado y de alta confianza en el testimonio de Sirácida. La tradición griega refleja una interpretación/texto divergente notable; por transparencia se conserva en nota, sin resolver la tensión a favor de una armonización.
  doctrine_reference: 'Translation philosophy: original-language primacy with preserved textual tension; transparency over conflation of witnesses'
translation_notes:
  revision_awareness: Se siguió el pasaje hebreo principal con alta confianza, manteniendo en nota la divergencia del griego de Swete y la tradición textual alternativa; no se detectaron revisiones posteriores que alteren la decisión.
  spanish_consistency_notes:
  - Se mantiene «bondad» para חסד como opción sobria y ampliamente comprensible, evitando forzar «gracia» como término técnico.
  - Se usa «justicia» para צדקה, en coherencia con el hebreo y con el registro sapiencial.
  - La nota distingue explícitamente el griego paralelo para conservar la tensión textual documentada.
