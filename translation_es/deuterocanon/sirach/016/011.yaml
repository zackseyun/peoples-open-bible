translation:
  language: es
  text: Aunque uno sea de cerviz dura[a], es asombroso que quede absuelto[b]; porque la misericordia y la ira están con él, y él soporta y perdona, pero sobre los impíos deja descansar su furor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «terco» u «obstinado». El hebreo y el griego usan una metáfora corporal de resistencia dura, no solo una falta genérica de carácter.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «sea absuelto» o «quede libre de culpa». El hebreo יִנָּקֶה y el griego ἀθῳωθήσεται tienen sentido forense: ser declarado libre de culpa o de pena.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַקְשֶׁה עֹרֶף / σκληροτράχηλος
  english_pob_choice: stiff-necked
  chosen_spanish: de cerviz dura
  alternatives_spanish:
  - terco
  - obstinado
  - duro de cerviz
  lexicon: HALOT; LSJ
  rationale: Conservo la metáfora bíblica de la cerviz/núca, que en español puede expresarse de forma natural como ‘de cerviz dura’. ‘Terco’ u ‘obstinado’ comunican el sentido, pero suavizan la imagen original; ‘duro de cerviz’ es más literal pero menos fluido.
- source_word: תֵּמַהּ זֶה / θαυμαστὸν τοῦτο
  english_pob_choice: it is astonishing
  chosen_spanish: es admirable
  alternatives_spanish:
  - es asombroso
  - sería sorprendente
  - es cosa de admirar
  lexicon: HALOT; LSJ
  rationale: ‘Admirable’ mantiene el tono de extrañeza/estupor ante la posibilidad descrita, sin sonar tan forzado como una literalidad rígida. En este contexto, ‘admirable’ funciona como valoración retórica de algo inesperado.
- source_word: יִנָּקֶה / ἀθῳωθήσεται
  english_pob_choice: will be cleared
  chosen_spanish: quede absuelto
  alternatives_spanish:
  - sea absuelto
  - quede libre de culpa
  - no quede impune
  lexicon: HALOT; LSJ
  rationale: 'El sentido es forense: quedar libre de culpa o pena. ‘Absuelto’ expresa bien el valor judicial en español; el subjuntivo encaja con la construcción condicional del verso y no resuelve indebidamente la tensión entre absolución y castigo.'
- source_word: רַחֲמִים
  english_pob_choice: mercy
  chosen_spanish: misericordia
  alternatives_spanish:
  - compasión
  - piedad
  lexicon: HALOT
  rationale: ‘Misericordia’ es el equivalente bíblico más natural en español y conserva el par tradicional con ‘ira’, sin borrar el matiz afectivo de compasión.
- source_word: אַף
  english_pob_choice: anger
  chosen_spanish: ira
  alternatives_spanish:
  - enojo
  - furor
  - cólera
  lexicon: HALOT
  rationale: Aquí אַף funciona como sustantivo de ira/enojo divino. ‘Ira’ es la opción más sobria y bíblica en español; más adelante ‘furor’ permite evitar una repetición excesiva y mantiene la fuerza del paralelismo.
- source_word: וְנוֹשֵׂא
  english_pob_choice: he bears
  chosen_spanish: él soporta
  alternatives_spanish:
  - él sobrelleva
  - él carga con
  - él tolera
  lexicon: HALOT
  rationale: El verbo puede implicar cargar, sobrellevar o soportar. ‘Soporta’ conserva la concisión y el tono moral del paralelo con ‘perdona’.
- source_word: וְסוֹלֵחַ
  english_pob_choice: forgives
  chosen_spanish: perdona
  alternatives_spanish:
  - absuelve
  - condona
  lexicon: HALOT
  rationale: ‘Perdona’ es la traducción española más directa y clara del verbo de perdón; ‘absuelve’ se reserva ya para el lenguaje forense de la línea anterior.
- source_word: יַנִּיחַ רָגְזוֹ
  english_pob_choice: he lets his wrath rest
  chosen_spanish: deja descansar su furor
  alternatives_spanish:
  - hace reposar su ira
  - hace caer su furor
  - deja reposar su ira
  lexicon: HALOT
  rationale: Conservo la imagen de una ira que ‘descansa’ o se asienta sobre los impíos. ‘Furor’ da fuerza al sustantivo final y evita repetir ‘ira’ sin necesidad, mientras mantiene la idea de un enojo que se posa sobre ellos.
theological_decisions:
- issue: Tensión entre misericordia e ira divinas
  english_pob_reading: The verse is rendered to preserve the tension that mercy and anger are both with God, followed by both forgiveness and wrath.
  chosen_spanish_reading: La traducción conserva la tensión entre misericordia e ira, y entre perdón y furor, sin suavizar una de las dos afirmaciones.
  alternative_spanish_readings:
  - Sustituir la ira por una mera incomodidad pasajera
  - Reforzar solo la misericordia y atenuar el juicio
  rationale: El hebreo y el griego ponen ambas realidades en paralelo. Traducirlas con claridad evita resolver artificialmente la tensión teológica y sigue la filosofía de la POB de mantener lo que el texto afirma.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
translation_notes:
  revision_awareness: Se ha seguido el testimonio conjunto del hebreo de Kahana y del griego de Swete, con acuerdo sustancial entre ambos en el sentido forense de ‘quedar libre de culpa/pena’ y en la metáfora de la cerviz dura. No se detectaron revisiones textuales recientes que exigieran ajustar la línea base; se mantuvo la tensión entre misericordia e ira que el audit trail inglés preserva.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ para el nombre divino en este proyecto, pero en este versículo no aparece el tetragrámaton.
  - Se conserva un registro bíblico claro y no arcaizante, evitando calcos excesivamente literales donde el español exige naturalidad.
  - ‘Absuelto’ mantiene el valor judicial de ἀθῳωθήσεται / יִנָּקֶה sin borrar que el contexto también puede implicar quedar libre de castigo.
