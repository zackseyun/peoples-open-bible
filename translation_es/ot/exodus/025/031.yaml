    text: O «obra batida». El hebreo subraya que el candelero debía formarse martillándolo, aparentemente a partir de una sola pieza y no ensamblado de partes separadas.
    reason: lexical_alternative
  - marker: b
    text: O «botones». El hebreo se refiere a proyecciones redondeadas ornamentales dentro del diseño floral del candelero.
    reason: lexical_alternative
  revision_rationale: 'Se propone una reparación pequeña pero útil: ''candelero'' refleja mejor מְנֹרָה/lampstand en español bíblico y evita la asociación moderna de ''candelabro'' con velas; además, ''con ella'' expresa mejor que todas las partes proceden de la misma pieza. El resto del borrador es fiel y puede mantenerse.'
