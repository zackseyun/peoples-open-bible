translation:
  language: es
  text: Y copias de ellos debían colocarse en la cámara del tesoro, para que Simón y sus hijos las tuvieran[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «duplicados» o «transcripciones» para «copias». El griego se refiere a reproducciones documentales.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀντίγραφα
  english_pob_choice: copies
  chosen_spanish: ejemplares
  alternatives_spanish:
  - copias
  - duplicados
  - transcripciones
  lexicon: LSJ
  rationale: ἀντίγραφα designa reproducciones documentales. En español, 'ejemplares' conserva la idea de piezas documentales reprodu­cidas sin sonar técnico en exceso; 'copias' también sería posible, pero 'ejemplares' evita repetir 'copias' en un contexto archivístico y mantiene el matiz de documento reproducido.
- source_word: θέσθαι
  english_pob_choice: were to be placed
  chosen_spanish: debían colocarse
  alternatives_spanish:
  - colocarse
  - ser colocados
  - depositarse
  lexicon: LSJ
  rationale: El infinitivo expresa una disposición o mandato implícito en el contexto. 'Debían colocarse' comunica bien esa fuerza directiva en un español natural y fiel, sin convertirla en una simple descripción.
- source_word: τῷ γαζοφυλακίῳ
  english_pob_choice: treasury
  chosen_spanish: el tesoro
  alternatives_spanish:
  - la tesorería
  - la cámara del tesoro
  - el depósito
  lexicon: LSJ
  rationale: γαζοφυλάκιον puede referirse a un tesoro o cámara del tesoro. 'El tesoro' es breve, idiomático y suficientemente amplio para el contexto de resguardo documental. 'Tesorería' sonaría más institucional y menos acorde al matiz de archivo/depósito.
- source_word: ὅπως
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: LSJ
  rationale: ὅπως introduce finalidad. 'Para que' preserva el valor purposivo de manera clara y natural en español contemporáneo.
- source_word: ἔχῃ
  english_pob_choice: might have them
  chosen_spanish: los tuvieran
  alternatives_spanish:
  - los tengan
  - los poseyeran
  lexicon: LSJ
  rationale: El subjuntivo expresa propósito respecto de Simón y sus hijos. 'Los tuvieran' suena natural en español y mantiene el sentido de posesión/disponibilidad; 'poseyeran' sería más fuerte, pero menos fluido aquí.
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés están en alto acuerdo. La revisión inglesa eliminó un artículo innecesario antes de 'copies'; en español se mantiene la construcción sin artículo con 'ejemplares' para reflejar con naturalidad el plural indefinido del original. No hay variantes textuales relevantes ni tensiones doctrinales en este versículo.
  spanish_consistency_notes:
  - Se usa 'Simón' para Σίμων y 'hijos' para οἱ υἱοὶ αὐτοῦ, manteniendo el referente familiar explícito del griego.
  - '''Tesoro'' se emplea como equivalente funcional de γαζοφυλάκιον en un contexto de depósito documental; no se introduce terminología eclesiástica posterior.'
  - El orden de la cláusula sigue de cerca el griego para conservar la relación de finalidad entre el depósito y la posesión por parte de Simón y sus hijos.
