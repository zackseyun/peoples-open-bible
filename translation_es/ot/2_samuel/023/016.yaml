translation:
  language: es
  text: Entonces los tres hombres valientes se abrieron paso por el campamento de los filisteos y sacaron agua del pozo de Belén que estaba junto a la puerta, y la llevaron y la trajeron a David. Pero él no quiso beberla; más bien[a], la derramó[b] a Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Es decir, la derramó como una ofrenda, con fuerza de libación.
    reason: theological_note
  - marker: b
    text: O "las derramó"; el hebreo usa un sufijo plural, probablemente refiriéndose al agua de manera idiomática como "las aguas".
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּבְקְעוּ
  english_pob_choice: broke through
  chosen_spanish: rompieron
  alternatives_spanish:
  - abrieron brecha
  - irrumpieron
  lexicon: HALOT
  rationale: El verbo expresa atravesar o abrirse paso rompiendo una posición enemiga. En español, 'rompieron' comunica con naturalidad la idea de forzar el paso; 'abrieron brecha' es posible pero más interpretativo, y 'irrumpieron' sugiere más entrada súbita que ruptura.
- source_word: שְׁלֹשֶׁת הַגִּבֹּרִים
  english_pob_choice: the three mighty men
  chosen_spanish: los tres hombres valientes
  alternatives_spanish:
  - los tres guerreros
  - los tres valientes
  lexicon: HALOT
  rationale: גִּבּוֹרִים en los relatos de David funciona como designación de sus combatientes selectos. 'Hombres valientes' conserva la fuerza del término sin perder legibilidad; 'guerreros' sería correcto pero menos cercano al matiz de heroísmo/valor del hebreo y del uso narrativo.
- source_word: בְּמַחֲנֵה פְלִשְׁתִּים
  english_pob_choice: the camp of the Philistines
  chosen_spanish: el campamento de los filisteos
  alternatives_spanish:
  - el campamento filisteo
  lexicon: HALOT
  rationale: La construcción hebrea es posesiva y militar. 'Campamento de los filisteos' sigue bien esa relación y es claro en español; 'filisteo' como adjetivo también es viable, pero la forma nominal preserva mejor la estructura del original.
- source_word: וַיִּשְׁאֲבוּ מַיִם
  english_pob_choice: drew water
  chosen_spanish: sacaron agua
  alternatives_spanish:
  - extrajeron agua
  - cogieron agua
  lexicon: HALOT
  rationale: El verbo se usa para sacar agua de un pozo. 'Sacaron agua' es idiomático y natural en español; 'extrajeron' suena demasiado técnico y 'cogieron' es regional.
- source_word: מִבֹּאר בֵּית לֶחֶם אֲשֶׁר בַּשַּׁעַר
  english_pob_choice: from the well of Bethlehem that was by the gate
  chosen_spanish: del pozo de Belén que estaba junto a la puerta
  alternatives_spanish:
  - del pozo de Belén que estaba en la puerta
  - del pozo de Belén junto a la puerta
  lexicon: HALOT
  rationale: '''Junto a la puerta'' refleja bien בַּשַּׁעַר sin forzar una equivalencia demasiado literal con ''en la puerta''. El genitivo ''del pozo de Belén'' mantiene la referencia topográfica específica.'
- source_word: וַיִּשְׂא֖וּ
  english_pob_choice: carried it
  chosen_spanish: la llevaron
  alternatives_spanish:
  - la cargaron
  - la transportaron
  lexicon: HALOT
  rationale: El verbo indica que tomaron el agua y la llevaron consigo. 'La llevaron' suena natural y suficiente; 'cargaron' enfatiza el peso, y 'transportaron' resulta demasiado formal.
- source_word: וַיָּבִ֣אוּ אֶל דָּוִד
  english_pob_choice: brought it to David
  chosen_spanish: y la trajeron a David
  alternatives_spanish:
  - y se la llevaron a David
  - y la presentaron a David
  lexicon: HALOT
  rationale: '''Trajeron'' expresa bien el movimiento hacia David. Se mantiene la coordinación con el verbo anterior para reproducir la secuencia hebrea sin añadir ''de regreso'', que no está explícito.'
- source_word: וְלֹא אָבָה לִשְׁתּוֹתָם
  english_pob_choice: he was not willing to drink it
  chosen_spanish: Pero él no quiso beberla
  alternatives_spanish:
  - Pero él no estuvo dispuesto a beberla
  - Pero él se negó a beberla
  lexicon: HALOT
  rationale: אָבָה expresa voluntad o consentimiento. 'No quiso' preserva ese matiz de disposición personal mejor que una negativa puramente factual. Aunque el sufijo hebreo es plural, en español se adapta de forma natural al agua como colectivo singular.
- source_word: וַיַּסֵּךְ אֹתָם
  english_pob_choice: he poured it out
  chosen_spanish: la derramó
  alternatives_spanish:
  - la vertió
  - la ofreció como libación
  lexicon: HALOT
  rationale: נסך aquí implica derramar líquido en un acto con sentido ritual. 'Derramó' conserva la acción concreta sin cerrar la interpretación cultual; 'ofreció como libación' explicita más de lo que el hebreo dice en la línea principal.
- source_word: לַֽיהוָה
  english_pob_choice: to the LORD
  chosen_spanish: para Yahvé
  alternatives_spanish:
  - a Yahvé
  - al Señor
  lexicon: HALOT
  rationale: Se sigue la directriz del proyecto para traducir יהוה como 'Yahvé'. 'Para' ayuda a captar el sentido dedicatorio/obsequiario del derramamiento, en continuidad con la lectura cultual del contexto.
theological_decisions:
- issue: Sentido del derramamiento del agua
  english_pob_reading: A literal pouring out to the LORD with sacrificial/libation overtones
  chosen_spanish_reading: Un derramamiento real para Yahvé con resonancias de ofrenda o libación
  alternative_spanish_readings:
  - Un gesto meramente simbólico de rechazo a beberla
  - Una ofrenda formal de libación claramente definida
  rationale: El verbo hebreo נסך tiene asociaciones rituales de derramar una ofrenda. La narración presenta a David negándose a beber el agua y derramándola para Yahvé; en español conviene mantener la acción concreta y no reducirla a puro simbolismo, pero tampoco cerrar el matiz exacto del rito más allá de lo que el texto afirma.
  doctrine_reference: Principio de preservar la tensión teológica y no resolverla en exceso; §3 de la filosofía de traducción del proyecto
- issue: Tratamiento del nombre divino
  english_pob_reading: the LORD / Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - el Señor
  rationale: La política del proyecto requiere transliterar el nombre divino en el texto principal. Esto evita el ocultamiento del tetragrámaton y mantiene coherencia con el texto fuente y con la auditable decisión del POB inglés.
  doctrine_reference: Directriz terminológica del proyecto para יהוה
translation_notes:
  revision_awareness: El borrador sigue de cerca la última revisión inglesa, que no introdujo cambios; por eso conserva la lectura principal de 'broke through', 'drew water', 'was not willing to drink it' y 'poured it out to Yahweh', adaptadas con equivalencias españolas naturales y con la tensión cultual preservada.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para el nombre divino, conforme a la terminología del proyecto.
  - Se usa 'los filisteos' y no una forma más arcaica, por claridad moderna.
  - '''Hombres valientes'' recoge el valor técnico de גִּבֹּרִים sin forzar un tecnicismo eclesiástico.'
  - 'La secuencia verbal sigue el orden narrativo del hebreo: romper, sacar, llevar, traer, no querer beber, derramar.'
