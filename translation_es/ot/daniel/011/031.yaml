revisions:
- from: Y fuerzas[a] procedentes de él se levantarán, y profanarán el santuario fortaleza[b], y quitarán el holocausto regular[c], y pondrán la abominación desoladora[d].
  to: Y fuerzas de él[a] se levantarán, y profanarán el santuario fortaleza[b], y quitarán el holocausto continuo[c], y pondrán la abominación desoladora[d].
  rationale: 'Se hicieron ajustes menores para mejorar la naturalidad y la precisión cultual del español sin apartarse del hebreo ni del rastro de auditoría inglés: se simplificó la expresión de procedencia, se cambió «regular» por «continuo» para reflejar mejor התמיד en español bíblico, y se normalizó la puntuación de la nota b.'
  reviewer_model: gpt-5.4
