  to: No inclines mi corazón a ninguna cosa mala[a], al practicar obras perversas con hombres que obran iniquidad[b]; y no me dejes comer de sus manjares[c].
  rationale: Se corrige la colocación de la nota [b] para que siga el rastro POB inglés, y se mejora la naturalidad y precisión del español con «obras perversas» y «obran iniquidad». La revisión mantiene intactas las decisiones teológicas y léxicas centrales del original hebreo.
