revisions:
- from: 'Cuando David vio que sus siervos[a] se estaban susurrando entre sí, David comprendió que el niño había muerto. Entonces David dijo a sus siervos: «¿Ha muerto el niño?» Y ellos dijeron: «Ha muerto»[b].'
  to: 'Cuando David vio que sus siervos susurraban, David comprendió que el niño estaba muerto. Entonces David dijo a sus siervos: «¿Está muerto el niño?». Y ellos dijeron: «Muerto»[a].'
  rationale: Se corrige la expresión poco idiomática «se estaban susurrando entre sí» a «susurraban» y se ajusta «ha muerto / había muerto» a «está muerto / estaba muerto» para seguir mejor el valor predicativo del hebreo y la decisión auditada. Se conserva la brevedad de la respuesta final con nota, ahora mejor alineada con el original.
