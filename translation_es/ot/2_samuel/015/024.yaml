  language: en
  yaml_path: translation/ot/2_samuel/015/024.yaml
  text: And behold[a], Zadok also came, and all the Levites with him, carrying the ark of the covenant of God. And they set down the ark of God[c][b], and Abiathar went up until all the people had finished passing over from the city.
  footnotes:
