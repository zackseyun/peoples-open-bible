translation:
  language: es
  text: Josué se levantó temprano por la mañana, y partieron de Sitim y llegaron al Jordán, él y todos los hijos de Israel[a], y pasaron la noche allí antes de que cruzaran.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O "todos los israelitas". Hebreo: "todos los hijos de Israel".'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּשְׁכֵּם
  english_pob_choice: rose early
  chosen_spanish: se levantó temprano
  alternatives_spanish:
  - se levantó de madrugada
  - se alzó temprano
  lexicon: HALOT
  rationale: El hebreo expresa levantarse temprano; en español, "se levantó temprano" comunica de manera natural la prioridad temporal sin perder el matiz narrativo del verbo.
- source_word: בַּבֹּקֶר
  english_pob_choice: in the morning
  chosen_spanish: por la mañana
  alternatives_spanish:
  - en la mañana
  - esa mañana
  lexicon: HALOT
  rationale: La frase fija el momento del día. "Por la mañana" suena natural en español y conserva el valor temporal del sustantivo con artículo.
- source_word: וַיִּסְעוּ
  english_pob_choice: they set out
  chosen_spanish: partieron
  alternatives_spanish:
  - se pusieron en marcha
  - salieron
  lexicon: HALOT
  rationale: En contexto narrativo de viaje, נסע implica emprender camino o levantar campamento. "Partieron" es breve, claro y fiel al movimiento del relato.
- source_word: מֵהַשִּׁטִּים
  english_pob_choice: from Shittim
  chosen_spanish: de Sitim
  alternatives_spanish:
  - desde Sitim
  - de las Acacias
  lexicon: HALOT
  rationale: Se conserva el topónimo como nombre propio transliterado. "Sitim" mantiene la referencia geográfica sin imponer una traducción interpretativa del lugar.
- source_word: וַיָּבֹאוּ עַד הַיַּרְדֵּן
  english_pob_choice: came to the Jordan
  chosen_spanish: llegaron al Jordán
  alternatives_spanish:
  - vinieron hasta el Jordán
  - alcanzaron el Jordán
  lexicon: HALOT
  rationale: El hebreo indica haber arribado hasta el Jordán. "Llegaron al Jordán" es idiomático y refleja adecuadamente la meta del desplazamiento.
- source_word: הוּא וְכָל־בְּנֵי יִשְׂרָאֵל
  english_pob_choice: he and all the sons of Israel
  chosen_spanish: él y todos los hijos de Israel
  alternatives_spanish:
  - él y todos los israelitas
  - él y todos los hijos de Israel
  lexicon: HALOT
  rationale: Se mantiene la estructura del hebreo con el pronombre explícito y la expresión masculina plural. "Hijos de Israel" expone con transparencia la forma del original; "israelitas" queda como alternativa más idiomática pero menos cercana a la forma fuente.
- source_word: וַיָּלִנוּ
  english_pob_choice: they spent the night
  chosen_spanish: pasaron la noche
  alternatives_spanish:
  - se alojaron
  - pernoctaron
  lexicon: HALOT
  rationale: לון aquí señala permanecer durante la noche. "Pasaron la noche" es natural en español contemporáneo y preserva el sentido temporal sin añadir matices ajenos.
- source_word: טֶרֶם יַעֲבֹרוּ
  english_pob_choice: before they crossed over
  chosen_spanish: antes de cruzar
  alternatives_spanish:
  - antes de que cruzaran
  - antes de cruzar al otro lado
  lexicon: HALOT
  rationale: טרם marca anterioridad, y en el contexto del Jordán עבר tiene sentido de cruzar. "Antes de cruzar" comunica con concisión la relación temporal y el movimiento a través del río.
theological_decisions:
- issue: Expresión colectiva masculina בְּנֵי יִשְׂרָאֵל
  english_pob_reading: sons of Israel
  chosen_spanish_reading: hijos de Israel
  alternative_spanish_readings:
  - israelitas
  - hijos del Israel
  rationale: No hay un problema doctrinal, pero sí una decisión de transparencia textual. Se conserva la forma masculina plural del hebreo para no borrar la marca del original; se deja "israelitas" como opción idiomática en la lista de alternativas.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: No se aplicaron revisiones posteriores al texto base; el dictamen de control cruzado coincide plenamente con la traducción fuente y no reporta cambios necesarios.
  spanish_consistency_notes:
  - Se mantiene "Jordán" como nombre del río, en concordancia con la práctica bíblica en español.
  - Se conserva la alternancia narrativa en pasado con verbos simples y directos.
  - La nota al pie recoge la alternativa colectiva para בני ישראל sin sustituir la forma más cercana al hebreo en el texto principal.
