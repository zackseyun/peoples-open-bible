translation:
  language: es
  text: Levántate, Yahvé, para tu lugar de reposo[a], tú y el arca de tu fuerza[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para tu reposo». El término hebreo puede denotar el reposo en abstracto o un lugar de reposo; aquí probablemente alude al sitio donde Yahvé establece su presencia estable.
    reason: lexical_alternative
  - marker: b
    text: O «el arca de tu poder» o «el arca que significa tu poder».
    reason: lexical_alternative
lexical_decisions:
- source_word: קוּמָה
  english_pob_choice: Arise
  chosen_spanish: ¡Levántate!
  alternatives_spanish:
  - ¡Surge!
  - ¡Alzate!
  lexicon: HALOT
  rationale: El imperativo pide que Yahvé actúe y tome su lugar; en español, «levántate» conserva el tono solemne y exhortativo de «Arise» sin sonar antinatural.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino del Tetragrámaton como «Yahvé», conforme al criterio del proyecto y en continuidad con la transliteración del nombre propio, no como sustituto titulado.
- source_word: לִמְנוּחָתֶךָ
  english_pob_choice: to your resting place
  chosen_spanish: para tu lugar de reposo
  alternatives_spanish:
  - para tu reposo
  - para tu lugar de descanso
  lexicon: HALOT
  rationale: El hebreo puede referirse al reposo o al lugar donde ese reposo se establece; «lugar de reposo» reproduce bien la posible referencia espacial que el contexto del arca sugiere.
- source_word: אַתָּה
  english_pob_choice: you
  chosen_spanish: tú
  alternatives_spanish:
  - tú mismo
  lexicon: HALOT
  rationale: El pronombre independiente se conserva para marcar el énfasis y la coordinación con la frase siguiente, sin añadir una intensificación innecesaria.
- source_word: וַאֲרוֹן
  english_pob_choice: and the ark
  chosen_spanish: el arca
  alternatives_spanish:
  - el arca del pacto
  lexicon: HALOT
  rationale: En este contexto cultual, «arca» es la equivalencia directa y suficiente; se evita ampliar a «del pacto» porque el texto hebreo no lo dice aquí.
- source_word: עֻזֶּךָ
  english_pob_choice: your strength
  chosen_spanish: de tu poder
  alternatives_spanish:
  - de tu fuerza
  - de tu poderío
  lexicon: HALOT
  rationale: «עֹז» abarca fuerza, vigor y poder. En español, «poder» comunica con naturalidad la idea de potencia activa asociada al arca, sin perder el valor de fuerza divina.
theological_decisions:
- issue: Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - Jehová
  rationale: Se preserva el nombre personal de Dios en vez de reemplazarlo por un título, siguiendo la decisión doctrinal del POB y la transliteración del Tetragrámaton.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sentido de לִמְנוּחָתֶךָ
  english_pob_reading: to your resting place
  chosen_spanish_reading: para tu lugar de reposo
  alternative_spanish_readings:
  - para tu reposo
  - para tu morada de reposo
  rationale: La frase puede aludir al reposo en abstracto o al sitio donde Yahvé fija su presencia. Se mantiene la tensión al traducir con una expresión espacial sin explicitar más de lo que el hebreo permite.
  doctrine_reference: Translation philosophy §3, §5
- issue: Expresión 'el arca de tu poder'
  english_pob_reading: the ark of your strength
  chosen_spanish_reading: el arca de tu poder
  alternative_spanish_readings:
  - el arca de tu fuerza
  - el arca que manifiesta tu poder
  rationale: Se conserva la construcción genitiva compacta para no diluir la relación poética entre el arca y la potencia divina, dejando abierta la asociación teológica que el texto sugiere.
  doctrine_reference: Translation philosophy §3, §5
translation_notes:
  revision_awareness: El contexto de auditoría indica acuerdo alto y ninguna revisión aplicada; se mantiene la lectura estable de la edición más reciente sin cambios.
  spanish_consistency_notes:
  - Se usa «Yahvé» para יְהוָה en todo el registro.
  - Se mantiene el paralelismo y la concisión poética del hebreo.
  - «Arca» se conserva sin expansión interpretativa en el texto principal.
  - Las notas recogen las alternativas lexicales documentadas en el inglés POB y su tensión semántica en español.
