translation:
  language: es
  text: Porque tú[a], Señor, eres bueno y dispuesto a perdonar, abundante en amor leal con todos los que te invocan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Porque tú, Señor, eres bueno y perdonador, y grande en amor leal con todos los que te invocan».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la base o razón de la afirmación precedente. «Porque» comunica con naturalidad la función causal/explicativa de כִּי en este contexto poético.
- source_word: אַתָּה
  english_pob_choice: you
  chosen_spanish: tú
  alternatives_spanish:
  - usted
  - tú mismo
  lexicon: HALOT
  rationale: Se conserva el pronombre explícito para mantener el énfasis de la súplica directa a Dios. «Tú» es la forma natural en español bíblico contemporáneo sin sonar artificial.
- source_word: אֲדֹנָי
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - mi Señor
  - Dueño
  lexicon: HALOT
  rationale: Es un título divino en dirección de oración. «Señor» es el equivalente español estable y reverente; «mi Señor» añadiría posesión no expresada y «Dueño» sería menos idiomático en este registro.
- source_word: טוֹב
  english_pob_choice: good
  chosen_spanish: bueno
  alternatives_spanish:
  - bondadoso
  - benigno
  lexicon: HALOT
  rationale: «Bueno» conserva el sentido básico y amplio de la bondad moral de Dios sin restringirlo a una sola faceta como «bondadoso».
- source_word: סַלָּח
  english_pob_choice: forgiving
  chosen_spanish: perdonador
  alternatives_spanish:
  - que perdona
  - dispuesto a perdonar
  lexicon: HALOT
  rationale: El adjetivo describe la disposición de Dios hacia el perdón. «Perdonador» mantiene esa cualidad con una forma breve y natural en español; «que perdona» lo vuelve más relativo y menos adjetival.
- source_word: רַב חֶסֶד
  english_pob_choice: abounding in steadfast love
  chosen_spanish: abundante en amor leal
  alternatives_spanish:
  - grande en amor leal
  - rico en amor fiel
  - abundante en misericordia
  lexicon: HALOT
  rationale: La construcción expresa abundancia/intensidad de חֶסֶד. «Amor leal» preserva la tensión de cariño y fidelidad pactal; «misericordia» estrecha demasiado el sentido.
- source_word: חֶסֶד
  english_pob_choice: steadfast love
  chosen_spanish: amor leal
  alternatives_spanish:
  - amor fiel
  - misericordia
  - benignidad
  lexicon: HALOT
  rationale: Para el uso teológico de חֶסֶד, «amor leal» comunica tanto afecto como fidelidad de pacto de manera clara y contemporánea en español.
- source_word: לְכָל
  english_pob_choice: to all
  chosen_spanish: para todos
  alternatives_spanish:
  - a todos
  - hacia todos
  lexicon: HALOT
  rationale: «Para todos» funciona naturalmente con el participio siguiente y expresa el alcance de los beneficiarios del amor de Dios.
- source_word: קֹרְאֶיךָ
  english_pob_choice: who call on you
  chosen_spanish: los que te invocan
  alternatives_spanish:
  - los que te llaman
  - los que claman a ti
  lexicon: HALOT
  rationale: El participio designa a quienes invocan a Dios en oración. «Invocan» es la forma bíblica y devocional más precisa en español; «claman a ti» sería más emotivo pero menos exacto.
theological_decisions:
- issue: Título divino אֲדֹנָי en dirección directa
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - mi Señor
  - Dueño
  rationale: No se trata del Tetragrámaton sino del título divino de dirección. Por eso no corresponde usar «Yahvé» ni una convención de máscara nominal; «Señor» reproduce fielmente el valor reverencial del título.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; preserve direct-address divine titles'
- issue: Renderización de חֶסֶד
  english_pob_reading: steadfast love
  chosen_spanish_reading: amor leal
  alternative_spanish_readings:
  - amor fiel
  - misericordia
  - amor constante
  rationale: El verso destaca el carácter de amor duradero y de alianza de Dios hacia quienes lo invocan. «Amor leal» preserva esa tensión entre afecto y fidelidad mejor que «misericordia», que estrecha el campo semántico.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; readable modern Spanish'
- issue: Participio קֹרְאֶיךָ como descripción de los beneficiarios
  english_pob_reading: who call on you
  chosen_spanish_reading: los que te invocan
  alternative_spanish_readings:
  - los que te llaman
  - los que claman a ti
  rationale: La oración describe a los que recurren a Dios en oración. «Invocar» conserva el valor devocional y litúrgico sin depender de una paráfrasis interpretativa.
  doctrine_reference: 'DOCTRINE.md: Preserve lexical force; avoid narrowing participles beyond source evidence'
translation_notes:
  revision_awareness: Se corrigió el error de validación anterior incorporando el marcador [a] en el texto español exactamente donde corresponde. La formulación sigue el mismo significado del audit trail inglés, con decisión léxica explícita para כִּי, סַלָּח, רַב חֶסֶד y קֹרְאֶיךָ.
  spanish_consistency_notes:
  - Se usa «Señor» para אֲדֹנָי como título divino de dirección, no como sustituto del Nombre divino.
  - Se evita «misericordia» como traducción principal de חֶסֶד para no perder la fidelidad de pacto implícita.
  - «Invocan» conserva el matiz oracional de קֹרְאֶיךָ.
  - El marcador [a] aparece una sola vez y está anclado en el texto traducido.
