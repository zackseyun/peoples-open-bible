translation:
  language: es
  text: y por toda la mano poderosa[a] y por todo el gran temor[b] que Moisés hizo[c] delante de los ojos de todo Israel[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «la mano fuerte»; también puede traducirse «la mano poderosa».
    reason: lexical_alternative
  - marker: b
    text: También puede entenderse como «el gran terror» o, por extensión, «las obras temibles» que lo producían.
    reason: lexical_alternative
  - marker: c
    text: El verbo hebreo es amplio («hacer»); aquí resume las acciones de Moisés sin añadir una explicación que el texto no expresa.
    reason: lexical_alternative
  - marker: d
    text: Literalmente, «delante de los ojos de todo Israel», es decir, públicamente y a plena vista de la nación.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּלְכֹל
  english_pob_choice: and for all
  chosen_spanish: y para toda / y para todo
  alternatives_spanish:
  - y para todo
  - y para cada
  lexicon: HALOT
  rationale: El hebreo repite la construcción coordinada con לְ; en español, «y para» conserva la idea resumitiva y la amplitud de כֹל, sin forzar un calco mecánico.
- source_word: הַיָּד הַחֲזָקָה
  english_pob_choice: the mighty hand
  chosen_spanish: la mano fuerte[a]
  alternatives_spanish:
  - la mano poderosa
  - la mano vigorosa
  lexicon: HALOT
  rationale: La imagen corporal de «mano» se conserva por fidelidad léxica, y el adjetivo «fuerte» reproduce bien חֲזָקָה. En español, «mano fuerte» comunica la fuerza/agencia divina o extraordinaria sin reemplazar la metáfora por una paráfrasis.
- source_word: הַמּוֹרָא הַגָּדוֹל
  english_pob_choice: the great awe
  chosen_spanish: el gran temor[b]
  alternatives_spanish:
  - el gran asombro
  - el gran terror
  lexicon: HALOT
  rationale: מּוֹרָא abarca temor reverente, temor y también terror; «gran temor» conserva esa tensión sin fijarla demasiado pronto en una sola connotación. Se evita suavizarlo a «asombro» porque el término hebreo puede incluir un componente más fuerte.
- source_word: אֲשֶׁר עָשָׂה
  english_pob_choice: that Moses did
  chosen_spanish: que Moisés hizo[c]
  alternatives_spanish:
  - que Moisés realizó
  - que Moisés llevó a cabo
  lexicon: HALOT
  rationale: Se mantiene el verbo directo «hizo» por correspondencia estrecha con עָשָׂה y porque el texto finaliza con un resumen de los hechos de Moisés; no se introduce una interpretación más expansiva que el hebreo no exija.
- source_word: לְעֵינֵי
  english_pob_choice: before the eyes of
  chosen_spanish: delante de los ojos de
  alternatives_spanish:
  - a la vista de
  - en presencia de
  lexicon: HALOT
  rationale: «Delante de los ojos de» conserva la imagen concreta del hebreo y su valor público. «A la vista de» sería natural, pero menos cercana a la metáfora corporal original.
- source_word: כָּל יִשְׂרָאֵל
  english_pob_choice: all Israel
  chosen_spanish: todo Israel
  alternatives_spanish:
  - todo el pueblo de Israel
  - la totalidad de Israel
  lexicon: HALOT
  rationale: «Todo Israel» es la forma breve y directa que mejor refleja el colectivo nacional del hebreo sin añadir explicaciones interpretativas.
theological_decisions:
- issue: Valor de הַמּוֹרָא הַגָּדוֹל
  english_pob_reading: the great awe / the great terror / the fearsome deeds
  chosen_spanish_reading: el gran temor
  alternative_spanish_readings:
  - el gran asombro
  - las obras temibles
  rationale: El POB inglés preserva la ambigüedad entre emoción producida y actos que inspiran esa emoción. «Gran temor» mantiene esa tensión en español mejor que una solución excesivamente interpretativa; la nota permite reconocer las alternativas.
  doctrine_reference: Deut 34:12; preservación de la polisemia léxica de מוֹרָא.
- issue: Sentido público de לְעֵינֵי כָּל יִשְׂרָאֵל
  english_pob_reading: before the eyes of all Israel, that is, publicly and in full view of the nation
  chosen_spanish_reading: delante de los ojos de todo Israel
  alternative_spanish_readings:
  - a la vista de todo Israel
  - en presencia de todo Israel
  rationale: La lectura elegida conserva la metáfora visual y, con la nota, su sentido de publicidad nacional. No se reemplaza por una formulación más abstracta dentro del texto principal.
  doctrine_reference: Deut 34:12; nota explicativa sobre el valor idiomático de לְעֵינֵי.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión final del POB inglés, que volvió a una formulación más literal («mighty hand» y «did») después de una propuesta más dinámica. La presente versión sigue esa tendencia hacia mayor literalidad, pero en español conserva una fluidez natural y respeta la imagen concreta del hebreo.
  spanish_consistency_notes:
  - Se usa «Moisés» como transliteración estándar del nombre propio.
  - Se evita «SEÑOR» porque el texto no contiene el tetragrámaton ni un sustituto divino aquí; el pasaje habla de los hechos de Moisés.
  - «Mano» se conserva como metáfora de poder/acción, no se desfigura a una abstracción impersonal.
  - «Temor» mantiene la ambigüedad de מוֹרָא entre reverencia, miedo y carácter temible.
  - La puntuación mantiene una estructura coordinada equivalente al hebreo y al cierre solemne del versículo.
