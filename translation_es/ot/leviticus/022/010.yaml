  text: וְ/כָל זָ֖ר לֹא יֹ֣אכַל קֹ֑דֶשׁ תּוֹשַׁ֥ב כֹּהֵ֛ן וְ/שָׂכִ֖יר לֹא יֹ֥אכַל קֹֽדֶשׁ־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/leviticus/022/010.yaml
  text: No outsider may eat the holy thing[b][a]; a sojourner of a priest or a hired worker may not eat the holy thing.
  footnotes:
  - marker: a
    text: Or 'holy food' or 'sacred portion.' The Hebrew singular 'holy thing' refers here to food from sacred offerings reserved for priestly consumption.
    reason: lexical_alternative
  - marker: b
    text: '''A resident with a priest'' renders a term for a non-family dependent or sojourning resident attached to a priest''s household; alternatively, ''a priest''s sojourner'' or ''a resident alien of a priest.'''
    reason: lexical_alternative
