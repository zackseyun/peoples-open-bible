translation:
  language: es
  text: Después de él estaba Eleazar hijo de Dodo[a], hijo de Ajohí, uno de los tres hombres valientes con David, cuando desafiaron a los filisteos que se habían reunido allí para la batalla[c][b], y los hombres de Israel habían subido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hijo de Dodai, hijo de un ajojita».
    reason: lexical_alternative
  - marker: b
    text: O «cuando provocaron a los filisteos».
    reason: lexical_alternative
  - marker: c
    text: Lit. «y los hombres de Israel subieron»; en contexto esto puede significar que se retiraron.
    reason: lexical_alternative
lexical_decisions:
- source_word: ו/אחר/ו
  english_pob_choice: And after him was
  chosen_spanish: Y después de él estaba
  alternatives_spanish:
  - Y después de él
  - Luego de él estaba
  lexicon: HALOT
  rationale: La frase introduce al siguiente guerrero en secuencia; en español conviene suplir un verbo de existencia/ubicación para una cláusula nominal natural y fiel.
- source_word: אֶלְעָזָר
  english_pob_choice: Eleazar
  chosen_spanish: Eleazar
  lexicon: Transliteración estándar
  rationale: Nombre propio bíblico conservado sin adaptación.
- source_word: בֶּן דדי בֶּן אֲחֹחִי
  english_pob_choice: son of Dodo, son of Ahohi
  chosen_spanish: hijo de Dodo[a], hijo de Ajohí
  alternatives_spanish:
  - hijo de Dodai, hijo de un ajojita
  - hijo de Dodo, hijo de un ajojita
  lexicon: HALOT
  rationale: Se mantiene la lectura consonántica como dos designaciones en aposición. 'Ajohí' conserva el valor transliterado del gentilicio/ancestralidad, en paralelo al tratamiento del inglés POB, sin forzar la forma tradicional 'ajojita' en el texto principal.
- source_word: בִּ/שְׁלֹשָׁה גברים
  english_pob_choice: one of the three mighty men
  chosen_spanish: uno de los tres hombres valientes
  alternatives_spanish:
  - entre los tres valientes
  - uno de los tres guerreros
  lexicon: HALOT
  rationale: גברים en este contexto militar-heroico se rinde mejor como 'hombres valientes' que como simple 'hombres'; 'uno de' expresa pertenencia al grupo selecto, siguiendo la revisión inglesa más precisa.
- source_word: עִם דָּוִד
  english_pob_choice: with David
  chosen_spanish: con David
  lexicon: HALOT
  rationale: Correspondencia directa de acompañamiento/asociación.
- source_word: בְּ/חָֽרְפָם
  english_pob_choice: when they defied
  chosen_spanish: cuando desafiaron
  alternatives_spanish:
  - cuando deshonraron
  - cuando reprocharon
  lexicon: HALOT
  rationale: חרף en contexto bélico puede implicar desafío hostil o provocación al enemigo; 'desafiaron' refleja bien la fuerza militar sin cargar un matiz demasiado interpretativo como 'taunted'.
- source_word: בַּ/פְּלִשְׁתִּים
  english_pob_choice: the Philistines
  chosen_spanish: a los filisteos
  alternatives_spanish:
  - contra los filisteos
  - los filisteos
  lexicon: HALOT
  rationale: El hebreo marca relación con el objeto del desafío; 'a los filisteos' mantiene la referencia natural en español.
- source_word: נֶאֶסְפוּ שָׁם לַ/מִּלְחָמָה
  english_pob_choice: who had gathered there for battle
  chosen_spanish: que se habían reunido allí para la batalla
  alternatives_spanish:
  - que se habían juntado allí para la guerra
  - reunidos allí para combatir
  lexicon: HALOT
  rationale: El nifal de אסף describe una reunión/aglomeración deliberada; 'para la batalla' conserva el sustantivo de propósito en español.
- source_word: וַֽ/יַּעֲלוּ אִישׁ יִשְׂרָאֵל
  english_pob_choice: and the men of Israel had gone up
  chosen_spanish: y los hombres de Israel habían subido
  alternatives_spanish:
  - y los hombres de Israel se habían retirado
  - y los hombres de Israel habían ido arriba
  lexicon: HALOT
  rationale: עלה se traduce literalmente como 'subir'; se preserva esa literalidad en el texto principal, ya que el sentido contextual de retirada queda como alternativa implícita sin imponerse en el cuerpo del verso.
translation_notes:
  revision_awareness: He seguido el pasaje revisado del inglés POB, especialmente la preferencia por 'uno de los tres mighty men' y 'defied' en lugar de una formulación más amplia o coloquial. La versión española conserva esa precisión y mantiene la tensión de עלה con una traducción literal en el texto principal, dejando la posible lectura contextual en nota.
  spanish_consistency_notes:
  - Se usa 'filisteos' para el etnónimo de forma uniforme.
  - Se conserva 'hijo de Dodo' como lectura principal, con alternativa textual en nota.
  - '''Hombres valientes'' mantiene el registro militar-heroico sin recurrir a una frase eclesiástica.'
  - No se introduce 'SEÑOR' ni otros términos ajenos al hebreo de este versículo.
