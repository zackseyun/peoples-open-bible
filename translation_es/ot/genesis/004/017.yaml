base_translation:
  language: en
  yaml_path: translation/ot/genesis/004/017.yaml
  text: Cain knew his wife[a], and she conceived and bore Enoch. He was building a city[d][c][b], and he named the city after his son Enoch.
  footnotes:
  - marker: a
    text: Or more idiomatically, 'he named the city after his son, Enoch.' The Hebrew more literally reads, 'he called the name of the city after the name of his son.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew says 'knew his wife,' a common idiom for sexual relations.
    reason: cultural_note
  - marker: c
    text: 'The Hebrew construction can suggest ongoing action: ''he was building a city,'' rather than simply ''he built a city.'''
    reason: lexical_alternative
  - marker: d
    text: Or 'he called the name of the city after the name of his son'.
    reason: previous_rendering
