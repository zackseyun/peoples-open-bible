translation:
  language: es
  text: y las cortinas del atrio[a], y la cortina para la entrada del atrio, que está alrededor del tabernáculo y del altar, y sus cuerdas[b], para todo su servicio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cortinas del recinto».
    reason: lexical_alternative
  - marker: b
    text: O «sus cordeles».
    reason: lexical_alternative
lexical_decisions:
- source_word: קַלְעֵי
  english_pob_choice: hangings
  chosen_spanish: cortinas
  alternatives_spanish:
  - lienzos
  - pendones
  lexicon: HALOT
  rationale: En el contexto del atrio del tabernáculo, el término designa las piezas textiles del perímetro. En español, «cortinas» comunica bien la idea de paños colgantes sin forzar un tecnicismo ajeno; «lienzos» es posible, pero menos natural aquí.
- source_word: חָצֵר
  english_pob_choice: court
  chosen_spanish: atrio
  alternatives_spanish:
  - patio
  - recinto
  lexicon: HALOT
  rationale: Aunque el inglés POB usa «court», en español bíblico «atrio» es el término más claro y consagrado para el espacio cercado del santuario. «Patio» suena demasiado doméstico y «recinto» pierde la referencia cultual.
- source_word: מָסַךְ
  english_pob_choice: screen
  chosen_spanish: cortina
  alternatives_spanish:
  - pantalla
  - velo
  lexicon: HALOT
  rationale: Aquí se trata de la pieza textil de la entrada. «Cortina» es más natural en español que «pantalla» y más exacta en este entorno que «velo», que podría sugerir otro uso cultual.
- source_word: פֶּתַח
  english_pob_choice: entrance
  chosen_spanish: entrada
  alternatives_spanish:
  - acceso
  - portal
  lexicon: HALOT
  rationale: «Entrada» reproduce con fidelidad la idea de abertura o acceso. «Portal» sería más arquitectónico y «acceso» menos concreto.
- source_word: אֲשֶׁר עַל הַמִּשְׁכָּן וְעַל הַמִּזְבֵּחַ סָבִיב
  english_pob_choice: that is around the tabernacle and the altar
  chosen_spanish: que está alrededor del tabernáculo y del altar
  alternatives_spanish:
  - que está alrededor del tabernáculo y alrededor del altar
  - que rodea el tabernáculo y el altar
  lexicon: HALOT
  rationale: 'La relación espacial es conjunta: el atrio rodea ambos elementos. «Alrededor del tabernáculo y del altar» conserva la fuerza de סָבִיב sin introducir una repetición innecesaria, y evita sugerir una relación vaga de simple proximidad.'
- source_word: מִשְׁכָּן
  english_pob_choice: tabernacle
  chosen_spanish: tabernáculo
  alternatives_spanish:
  - morada
  - tienda del encuentro
  lexicon: HALOT
  rationale: En Números, «tabernáculo» es el equivalente establecido y más transparente para el santuario portátil. «Morada» sería demasiado interpretativa en este versículo.
- source_word: מִזְבֵּחַ
  english_pob_choice: altar
  chosen_spanish: altar
  alternatives_spanish:
  - altar sacrificial
  lexicon: HALOT
  rationale: Es el término estándar y no requiere expansión.
- source_word: מֵיתָרָיו
  english_pob_choice: its ropes
  chosen_spanish: sus cuerdas
  alternatives_spanish:
  - sus cordeles
  - sus sogas
  lexicon: HALOT
  rationale: El paralelo inglés ofrece «ropes» con nota «cords». En español, «cuerdas» es natural y suficientemente concreto para las amarras del atrio; mantiene la posibilidad de entender cordajes, sin sonar demasiado moderno ni demasiado técnico.
- source_word: לְכֹל עֲבֹדָתוֹ
  english_pob_choice: for all its service
  chosen_spanish: para todo su servicio
  alternatives_spanish:
  - para toda su labor
  - para todo su uso
  lexicon: HALOT
  rationale: «Servicio» conserva el matiz cultual y funcional del término mejor que «labor» o «uso». En un contexto del tabernáculo, la noción de servicio asignado es importante.
translation_notes:
  revision_awareness: El inglés POB revisó la frase espacial para reflejar que el atrio está alrededor del tabernáculo y del altar, sin duplicar «alrededor» innecesariamente. La versión española conserva esa misma relación conjunta con una formulación natural en español.
  spanish_consistency_notes:
  - Se mantiene «tabernáculo» para מִשְׁכָּן en armonía con la terminología bíblica estándar del proyecto.
  - Se usa «atrio» para חָצֵר por claridad cultual en español.
  - «Cortina» se reserva aquí para מָסַךְ en la entrada; «cortinas» traduce קַלְעֵי como elementos del perímetro.
  - La formulación «para todo su servicio» conserva el valor funcional/cultual del cierre hebreo.
