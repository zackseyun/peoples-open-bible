  to: Y se levantó y se fue por su vida[a], y llegó a Beerseba, que pertenece a Judá, y dejó allí a su servidor.
  rationale: Se mantiene la omisión de «y vio» en el texto principal, en línea con la revisión auditada, pero se restaura en la nota la evidencia textual relevante junto con la lectura tradicional «y temió». Se cambia «fue para salvar su vida» por «se fue por su vida» para conservar mejor el modismo hebreo sin volver opaco el español, y se sustituye «criado» por «servidor» para un registro más neutral y eclesialmente amplio.
