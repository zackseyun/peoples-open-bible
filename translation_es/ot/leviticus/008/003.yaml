translation:
  language: es
  text: Y convoca a toda la congregación[a] a la entrada de la tienda de reunión.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «convoca a toda la asamblea». El hebreo עֵדָה puede traducirse «congregación», «asamblea» o «comunidad» según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אֵת
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Y, como enlace secuencial
  - Y ... (sin marcar el objeto directo)
  lexicon: HALOT
  rationale: El hebreo une la instrucción anterior con esta orden; en español, el conector natural es «Y». El marcador de objeto directo אֵת no se expresa porque el español no lo requiere y añadirlo haría la frase artificial.
- source_word: כָּל
  english_pob_choice: all
  chosen_spanish: toda
  alternatives_spanish:
  - todo
  - la totalidad de
  lexicon: HALOT
  rationale: Con un sustantivo colectivo femenino como «congregación», «toda» comunica bien la totalidad pedida por כָּל sin sonar pesado.
- source_word: הָ/עֵדָה
  english_pob_choice: the congregation
  chosen_spanish: la congregación
  alternatives_spanish:
  - la asamblea
  - la comunidad
  lexicon: HALOT
  rationale: «Congregación» conserva el sentido corporativo y cultual que la POB inglesa documenta para עֵדָה en este contexto sacerdotal. «Asamblea» también es posible, pero «congregación» mantiene mejor la resonancia litúrgica.
- source_word: הַקְהֵל
  english_pob_choice: assemble
  chosen_spanish: convoca
  alternatives_spanish:
  - reúne
  - haz congregar
  lexicon: HALOT
  rationale: 'El hiphil imperativo de קהל tiene fuerza causativa: hacer que el pueblo se reúna. «Convoca» expresa bien esa orden formal en español y evita la repetición mecánica de «reúne» con «congregación».'
- source_word: אֶל
  english_pob_choice: at
  chosen_spanish: a
  alternatives_spanish:
  - hasta
  - junto a
  lexicon: HALOT
  rationale: Con un lugar de referencia, el español natural es «a la entrada», que conserva el valor direccional/local sin forzar un calco.
- source_word: פֶּתַח
  english_pob_choice: entrance
  chosen_spanish: entrada
  alternatives_spanish:
  - acceso
  - apertura
  - umbral
  lexicon: HALOT
  rationale: «Entrada» es el equivalente más claro y natural en español para פֶּתַח en una indicación espacial.
- source_word: אֹהֶל מוֹעֵד
  english_pob_choice: the tent of meeting
  chosen_spanish: la tienda de reunión
  alternatives_spanish:
  - la tienda del encuentro
  - el tabernáculo de reunión
  lexicon: HALOT
  rationale: La frase hebrea designa el santuario portátil como lugar de reunión designada. «Tienda de reunión» sigue de cerca la forma original y es transparente en español; «tabernáculo» sería más tradicional, pero menos fiel a la imagen lexical de אֹהֶל.
theological_decisions:
- issue: Cómo traducir עֵדָה en un contexto sacerdotal/covenantal
  english_pob_reading: '''congregation'' preserves the corporate and quasi-liturgical sense well in this priestly context.'
  chosen_spanish_reading: «congregación» preserva el sentido corporativo y cultual de Israel reunido ante Yahvé.
  alternative_spanish_readings:
  - asamblea
  - comunidad
  rationale: No hay motivo textual para reducir el término a una mera reunión civil. En este pasaje la idea es el pueblo como cuerpo convocado ante la presencia divina.
  doctrine_reference: Éxodo 19:17; Levítico 4:13; Números 16:3
- issue: Si traducir אֹהֶל מוֹעֵד con un término tradicional o con una versión más literal
  english_pob_reading: '''the tent of meeting'' is the established and accurate rendering of the construct phrase.'
  chosen_spanish_reading: «la tienda de reunión»
  alternative_spanish_readings:
  - el tabernáculo de reunión
  - la tienda del encuentro
  rationale: La estructura hebrea destaca primero la tienda, luego su función como lugar de reunión señalada. «Tienda de reunión» mantiene esa transparencia y evita introducir un término eclesiástico no presente en el hebreo.
  doctrine_reference: Éxodo 27:21; Éxodo 29:42-43
translation_notes:
  revision_awareness: El texto inglés POB y el análisis léxico revisado muestran alta concordancia; no se requieren cambios sustantivos. La principal decisión en español es preservar la fuerza cultual de עֵדָה y la literalidad transparente de אֹהֶל מוֹעֵד sin caer en calcos innecesarios.
  spanish_consistency_notes:
  - Se usó «Yahvé» por norma del proyecto para el nombre divino, pero este versículo no lo contiene explícitamente.
  - Se prefirió «convoca» para reflejar el imperativo causativo hebreo sin duplicar innecesariamente el campo semántico de «congregación».
  - «Tienda de reunión» mantiene la imagen del hebreo mejor que «tabernáculo», aunque ambas opciones son comprensibles en español bíblico.
