translation:
  language: es
  text: 'Y en tu prostitución fuiste lo contrario[a] de las demás mujeres: nadie te buscó[b], pero tú diste pago, y no se te dio pago; así llegaste a ser lo contrario.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «lo opuesto». El hebreo expresa la idea de inversión o reversión, repetida al final del versículo.'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «después de ti no se prostituyó nadie»; en contexto, la idea es que, a diferencia de una prostituta ordinaria, no hubo clientes buscándote.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵפֶךְ / לְהֶפֶךְ
  english_pob_choice: the opposite / the opposite
  chosen_spanish: el reverso / el reverso
  alternatives_spanish:
  - lo opuesto / lo opuesto
  - la inversa / la inversa
  - el contrario / el contrario
  lexicon: HALOT
  rationale: El término hebreo expresa inversión o reversión. «Reverso» conserva la idea de inversión y permite repetir la misma base léxica al inicio y al final del versículo, como hace el hebreo y como busca el POB en inglés.
- source_word: תַזְנוּתַיִךְ
  english_pob_choice: your prostitution
  chosen_spanish: tu prostitución
  alternatives_spanish:
  - tus fornicaciones
  - tu ramería
  - tu prostituirte
  lexicon: HALOT
  rationale: El sustantivo designa la práctica de prostitución y, en Ezequiel, la metáfora de infidelidad sexualizada. «Prostitución» es claro en español moderno y mantiene la fuerza de la imagen sin suavizarla.
- source_word: וְאַחֲרַיִךְ לֹא זוּנָּה
  english_pob_choice: no one solicited you
  chosen_spanish: nadie te solicitó
  alternatives_spanish:
  - nadie fue tras de ti para prostituirse
  - nadie buscó prostituirse contigo
  - nadie te buscó como prostituta
  lexicon: HALOT
  rationale: La forma hebrea, literalmente, significa que «después de ti no se prostituyó nadie», es decir, que no hubo clientes buscándola. «Nadie te solicitó» expresa bien esa idea idiomática y conserva la tensión lexical entre solicitud y prostitución.
- source_word: אֶתְנָן
  english_pob_choice: payment
  chosen_spanish: pago
  alternatives_spanish:
  - retribución
  - pago de prostitución
  - salario
  lexicon: HALOT
  rationale: «Pago» funciona en ambos miembros de la frase y preserva el contraste entre dar y recibir sin introducir una glosa demasiado interpretativa. En este contexto, el término sigue siendo reconocible como pago asociado con la prostitución.
- source_word: וּבְתִתֵּךְ אֶתְנָן
  english_pob_choice: but you gave payment
  chosen_spanish: pero tú diste pago
  alternatives_spanish:
  - y tú diste pago
  - al dar pago
  - pero tú ofreciste pago
  lexicon: HALOT
  rationale: 'La construcción de infinitivo con preposición marca la circunstancia invertida: en vez de recibir, ella da. «Pero» explicita la contraposición contextual y «diste pago» mantiene la brevedad y el paralelismo con la línea siguiente.'
- source_word: וְאֶתְנַן לֹא נִתַּן לָךְ
  english_pob_choice: and no payment was given to you
  chosen_spanish: y no se te dio pago
  alternatives_spanish:
  - y no se te pagó
  - y no te dieron pago
  - y no te fue dado pago
  lexicon: HALOT
  rationale: La pasiva refleja española reproduce con naturalidad la voz pasiva hebrea y conserva el eco de «pago» sin perder claridad. Mantiene además la repetición del mismo sustantivo para reforzar la ironía.
- source_word: וַתְּהִי
  english_pob_choice: so you became
  chosen_spanish: así llegaste a ser
  alternatives_spanish:
  - y te volviste
  - y fuiste
  - y llegaste a ser
  lexicon: HALOT
  rationale: El verbo introduce el estado resultante. «Así llegaste a ser» suena natural en español y marca la conclusión del versículo, preservando el cierre enfático del hebreo.
theological_decisions:
- issue: Mantener la metáfora sexualizada de infidelidad de Jerusalén
  english_pob_reading: Retain the prostitution metaphor directly
  chosen_spanish_reading: Conservar directamente la metáfora de prostitución
  alternative_spanish_readings:
  - suavizarla como «infidelidad»
  - resolverla como «idolatría»
  - usar un eufemismo más general
  rationale: Ezequiel usa deliberadamente una imagen chocante para describir la infidelidad de Jerusalén. La traducción española debe preservar ese golpe retórico y no reemplazarlo por una abstracción menos precisa.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: 'Coincide con el último paso de revisión: no se registraron cambios y la concordancia con el control cruzado fue alta, por lo que se mantiene la solución léxica que conserva la inversión («reverso») y la imagen de prostitución sin suavizarla.'
  spanish_consistency_notes:
  - Se mantiene «prostitución» para תַזְנוּת y «pago» para אֶתְנָן de manera consistente con el POB inglés.
  - Se repite la misma raíz conceptual en el inicio y el cierre del versículo para reflejar el paralelismo de הֵפֶךְ / לְהֶפֶךְ.
  - Se usa español neutro y lectura pública; se evita la terminología eclesiástica tradicional cuando oscurecería el valor léxico del hebreo.
