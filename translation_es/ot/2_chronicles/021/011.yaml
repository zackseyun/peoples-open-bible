translation:
  language: es
  text: Él también hizo lugares altos en la región montañosa[a] de Judá, llevó a los habitantes de Jerusalén a la prostitución[b] y extravió a Judá[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en los montes de Judá»; el hebreo puede referirse tanto a montañas como a la zona montañosa.
    reason: alternative_reading
  - marker: b
    text: O «hizo que los habitantes de Jerusalén se prostituyeran»; el hebreo usa lenguaje de infidelidad de pacto que puede evocar tanto prostitución como apostasía religiosa.
    reason: lexical_alternative
  - marker: c
    text: O «lo apartó de Yahvé»; el hebreo no dice explícitamente «de Yahvé», aunque el contexto sugiere apostasía.
    reason: alternative_reading
lexical_decisions:
- source_word: גַּם הוּא
  english_pob_choice: He also
  chosen_spanish: Él también
  alternatives_spanish:
  - También él
  - Él asimismo
  lexicon: HALOT
  rationale: גַּם con el pronombre independiente añade énfasis y continuidad. En español, «Él también» conserva ese valor aditivo sin sonar forzado.
- source_word: עָשָׂה
  english_pob_choice: made
  chosen_spanish: hizo
  alternatives_spanish:
  - fabricó
  - estableció
  lexicon: HALOT
  rationale: El verbo básico עשה puede traducirse de manera general como «hacer». Aquí rige a «lugares altos», por lo que «hizo» es natural y cercano al hebreo.
- source_word: בָמ֖וֹת
  english_pob_choice: high places
  chosen_spanish: lugares altos
  alternatives_spanish:
  - altos lugares
  - santuarios altos
  lexicon: HALOT
  rationale: «Lugares altos» es la forma española más conocida para בָּמוֹת y mantiene el término técnico de cultos ilícitos o no autorizados.
- source_word: בְּהָרֵי יְהוּדָה
  english_pob_choice: in the hill country of Judah
  chosen_spanish: en la región montañosa de Judá
  alternatives_spanish:
  - en la serranía de Judá
  - en los montes de Judá
  lexicon: HALOT
  rationale: הָרִים puede referirse a montes o a la zona montañosa. «Región montañosa» comunica bien el valor geográfico sin sonar excesivamente literal.
- source_word: וַיֶּזֶן
  english_pob_choice: led ... into prostitution
  chosen_spanish: llevó ... a la prostitución
  alternatives_spanish:
  - indujo ... a la prostitución
  - hizo ... prostituirse
  lexicon: HALOT
  rationale: El causativo de זנה conserva en este contexto la imagen de infidelidad sexual y religiosa. «Llevó ... a la prostitución» refleja esa fuerza verbal sin añadir palabras ajenas al texto.
- source_word: יֹשְׁבֵי יְרוּשָׁלִַם
  english_pob_choice: the inhabitants of Jerusalem
  chosen_spanish: los habitantes de Jerusalén
  alternatives_spanish:
  - los residentes de Jerusalén
  - los que habitaban en Jerusalén
  lexicon: HALOT
  rationale: La expresión participial significa literalmente «los que habitan». «Los habitantes» es fiel y natural en español.
- source_word: וַיַּדַּח
  english_pob_choice: led ... astray
  chosen_spanish: extravió
  alternatives_spanish:
  - desvió
  - hizo errar
  lexicon: HALOT
  rationale: נדח en causativo puede expresar desviar o llevar por mal camino. «Extravió» comunica que hizo apartarse del camino debido, sin introducir explícitamente un objeto que el hebreo no nombra en esta línea.
- source_word: אֶת יְהוּדָה
  english_pob_choice: Judah
  chosen_spanish: a Judá
  alternatives_spanish:
  - a la nación de Judá
  - al pueblo de Judá
  lexicon: HALOT
  rationale: El objeto es colectivo. En español, el acusativo con «a» puede sonar natural cuando el verbo es personal/causativo; aquí preserva el valor de agente que desorienta al colectivo.
theological_decisions:
- issue: Cómo renderizar el lenguaje de prostitución en un contexto de apostasía de pacto
  english_pob_reading: The Hebrew uses covenant-infidelity language that can evoke both sexual immorality and religious apostasy.
  chosen_spanish_reading: mantener «a la prostitución» en el texto principal
  alternative_spanish_readings:
  - «a la inmoralidad sexual»
  - «a la infidelidad de pacto»
  rationale: El hebreo de זנה en este contexto conserva la metáfora de prostitución como imagen de infidelidad; no conviene suavizarla a una expresión más abstracta. El texto principal mantiene esa tensión, y la nota aclara la doble resonancia.
  doctrine_reference: Translation philosophy §1, §3
- issue: Si debe explicitarse la referencia a apartarse de Yahvé en la última cola
  english_pob_reading: 'Keep the object implicit in the main text: ''drove Judah away'''
  chosen_spanish_reading: dejar implícito el objeto de la desviación en la frase «extravió a Judá»
  alternative_spanish_readings:
  - «extravió a Judá de Yahvé»
  - «apartó a Judá de Yahvé»
  rationale: El hebreo no menciona explícitamente «de Yahvé» en este versículo. La traducción mantiene el objeto implícito para no añadir contenido no expresado, aunque el contexto histórico sí apunta a apostasía.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: Se revisó el inglés POB auditado, que pasó de una formulación más interpretativa («sexual immorality», «drove Judah away») a otra más cercana al verbo («prostitution», «led Judah astray»). La versión española sigue la revisión más reciente en la primera cola, pero conserva la falta de explicitación de Yahvé en la última para no sobretraducir el hebreo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como término proyectado para el nombre divino, pero aquí no aparece en el texto principal porque el hebreo no lo expresa explícitamente.
  - «Prostitución» conserva la metáfora de infidelidad y no debe leerse solo como conducta sexual aislada.
  - «Extravió a Judá» refleja el valor causativo de וַיַּדַּח sin convertirlo en expulsión física.
