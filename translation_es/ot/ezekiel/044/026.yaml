translation:
  language: es
  text: Y después de su purificación[a], se contarán siete días por él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su limpieza ritual». El hebreo se refiere a una purificación ritual en el contexto sacerdotal.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אַחֲרֵי
  english_pob_choice: And after
  chosen_spanish: Y después de
  alternatives_spanish:
  - Después de
  lexicon: HALOT
  rationale: אַחֲרֵי expresa sucesión temporal ('después de'); se conserva también la conjunción inicial וְ como 'Y' para mantener la continuidad discursiva de la norma anterior, tal como hace el POB en inglés.
- source_word: טָהֳרָתוֹ
  english_pob_choice: his cleansing
  chosen_spanish: su purificación
  alternatives_spanish:
  - su limpieza ritual
  - su limpieza
  - su purificación ritual
  lexicon: HALOT
  rationale: En contexto sacerdotal, טָהֳרָה remite a la condición/proceso ritual de quedar limpio. 'Purificación' preserva mejor el registro cultual y la ambigüedad entre estado y proceso; 'limpieza' sería más natural pero puede sonar menos técnico en este marco.
- source_word: שִׁבְעַת יָמִים
  english_pob_choice: seven days
  chosen_spanish: siete días
  alternatives_spanish:
  - por siete días
  lexicon: HALOT
  rationale: La construcción numeral con 'días' se traduce de forma directa y natural en español como 'siete días', sin añadir una preposición no presente en el hebreo.
- source_word: יִסְפְּרוּ
  english_pob_choice: they shall count
  chosen_spanish: contarán
  alternatives_spanish:
  - contarán por
  - computarán
  - recontarán
  lexicon: HALOT
  rationale: ספר en qal significa 'contar/number'. En español, 'contarán' conserva el sentido básico y suena más natural que una expresión más marcada como 'contarán off', que no tiene equivalente idiomático limpio aquí.
- source_word: לוֹ
  english_pob_choice: for him
  chosen_spanish: para él
  alternatives_spanish:
  - en favor de él
  - respecto de él
  lexicon: HALOT
  rationale: 'El ל señala aquí referencia/beneficiario: los siete días se cuentan con respecto al sacerdote en cuestión. ''Para él'' es la equivalencia española más natural y fiel en este contexto legal.'
theological_decisions:
- issue: Naturaleza de la purificación/cultic cleansing
  english_pob_reading: Rendered in neutral cultic terms as 'his cleansing' without specifying moral or spiritual cleansing.
  chosen_spanish_reading: Se traduce en términos cultuales neutrales como 'su purificación', sin especificar una purificación moral o espiritual.
  alternative_spanish_readings:
  - su limpieza ritual
  - su purificación ritual
  rationale: El versículo trata de un procedimiento sacerdotal. 'Purificación' preserva el sentido ritual sin importar una lectura teológica más amplia que el hebreo no exige. La nota lexical mantiene abierta la alternativa 'limpieza ritual' para lectores que prefieran una formulación más explícita.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: El inglés POB fue revisado de «count off seven days» a «count seven days» para mayor naturalidad, sin perder el sujeto plural ni el valor legal de la fórmula. La versión española sigue esa revisión y evita añadir matices no presentes en el hebreo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como estándar del proyecto cuando el texto del versículo no nombra explícitamente el Nombre divino.
  - Se conserva el sujeto plural implícito en «contarán», conforme al hebreo יִסְפְּרוּ.
  - Se evita introducir lenguaje moralizante; el contexto es ceremonial/cultual.
  - La nota al pie usa un marcador único y aparece anclada en el sustantivo principal para reflejar la alternativa lexical documentada.
