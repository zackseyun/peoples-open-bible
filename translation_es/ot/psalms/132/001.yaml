translation:
  language: es
  text: Cántico de las ascensiones[a]. Recuerda, Yahvé, para David toda su aflicción[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de las subidas». El hebreo puede traducirse de manera más literal, pero aquí se conserva una fórmula natural para el título de la colección.
    reason: lexical_alternative
  - marker: b
    text: O «sus penurias» o «su humillación». El término hebreo puede abarcar aflicción, dificultad o ser rebajado.
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁיר
  english_pob_choice: Song
  chosen_spanish: Cántico
  alternatives_spanish:
  - canción
  - canto
  lexicon: HALOT
  rationale: En los encabezados de los salmos, שִׁיר designa un canto o pieza poética. ‘Cántico’ suena natural y digno en español bíblico, y conserva el valor de composición para ser cantada sin reducirlo a ‘psalmo’.
- source_word: הַמַּעֲלוֹת
  english_pob_choice: of Ascents
  chosen_spanish: de las subidas
  alternatives_spanish:
  - de las ascensiones
  - de los peldaños
  lexicon: HALOT
  rationale: La colección titulada שִׁיר הַמַּעֲלוֹת se refiere literalmente a ‘ascensos/subidas’. ‘De las subidas’ mantiene la imagen hebrea de forma natural en español, sin forzar una interpretación histórica adicional.
- source_word: זְכוֹר
  english_pob_choice: Remember
  chosen_spanish: Recuerda
  alternatives_spanish:
  - Acuérdate
  - Ten presente
  lexicon: HALOT
  rationale: El imperativo dirigido a Dios se vierte con un mandato directo y natural en español. ‘Recuerda’ conserva la fuerza orante y covenantal del hebreo sin ampliar el sentido a ‘acordarte favorablemente’.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se conserva el nombre divino propio, conforme al criterio del proyecto, en lugar de sustituirlo por un título. ‘Yahvé’ es la forma española establecida para el Tetragrámaton en este proyecto.
- source_word: לְדָוִד
  english_pob_choice: for David
  chosen_spanish: para David
  alternatives_spanish:
  - por David
  - con respecto a David
  lexicon: HALOT
  rationale: La preposición ל admite valor de referencia/beneficio. ‘Para David’ sigue de cerca la decisión inglesa final y expresa de modo natural que la súplica se hace en relación con David, sin cerrar la ambigüedad entre beneficio y referencia.
- source_word: עֻנּוֹתוֹ
  english_pob_choice: his affliction
  chosen_spanish: su sufrimiento
  alternatives_spanish:
  - su aflicción
  - su humillación
  - su angustia
  lexicon: HALOT
  rationale: El sustantivo puede abarcar sufrimiento, dificultad o humillación. ‘Sufrimiento’ es una opción amplia y clara en español, y evita estrechar el término a una sola faceta. Se conserva así la tensión semántica documentada.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: La lectura del POB en inglés preserva el nombre propio divino. En español se mantiene esa decisión con ‘Yahvé’, sin la convención de sustitución litúrgica por ‘SEÑOR’.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Alcance de עֻנּוֹתוֹ
  english_pob_reading: all his affliction
  chosen_spanish_reading: todo su sufrimiento
  alternative_spanish_readings:
  - toda su aflicción
  - toda su humillación
  - todas sus penurias
  rationale: El hebreo admite un campo semántico amplio. La traducción española mantiene esa amplitud con ‘sufrimiento’ y ‘todo’, sin resolver la tensión hacia una sola lectura psicológica, ascética o social.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: La versión inglesa más reciente revisó ‘on David’s behalf’ a ‘for David’ para reflejar con mayor cercanía לְדָוִד y mantuvo ‘affliction’ para עֻנּוֹתוֹ. El español sigue esa lectura revisada con ‘para David’ y conserva una opción amplia para עֻנּוֹתוֹ mediante ‘sufrimiento’.
  spanish_consistency_notes:
  - Se preserva ‘Yahvé’ como forma constante para יְהוָה.
  - Se evita ‘Cristo’ porque no aparece en el texto y no corresponde al hebreo.
  - El encabezado del salmo se traduce con estructura natural en español, manteniendo el sentido de título litúrgico.
  - La palabra ‘todo’ refleja כָּל y no se omite la totalidad del alcance del sufrimiento.
