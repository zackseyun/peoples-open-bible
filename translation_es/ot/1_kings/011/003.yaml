review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: posesión (''tuvo''), ''esposas'', ''princesas'' con alternativa preservada, ''concubinas'' y la idea de que sus esposas apartaron su corazón. Sin embargo, en español bíblico natural ''desviaron su corazón'' suena menos idiomático que ''apartaron su corazón'' o ''desviaron su corazón de Yahvé''; como el hebreo no explicita el complemento, conviene una formulación más natural que conserve la literalidad. También la coma en ''esposas, princesas'' puede inducir lectura appositiva extraña; es mejor mantener la estructura atributiva sin ruptura innecesaria.'
  spanish_quality_summary: El español es claro y mayormente legible, pero puede pulirse para mayor naturalidad y dignidad eclesial. 'Tuvo setecientas esposas, princesas...' funciona, aunque 'desviaron su corazón' resulta algo forzado en registro bíblico; 'apartaron su corazón' suena más natural y fiel al contexto. La nota al pie está bien formulada.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. 'Esposas', 'princesas', 'concubinas' y 'corazón' están bien alineados con las decisiones auditadas. No aparece ninguno de los términos sensibles del glosario general que requiera ajuste.
  issues:
  - severity: medium
    issue: La expresión 'desviaron su corazón' suena poco idiomática en español bíblico natural.
    rationale: Aunque comunica la idea general de נטה, en este contexto 'apartaron su corazón' conserva mejor el sentido de desvío de la lealtad sin sonar calcado ni requerir un complemento no presente en el hebreo.
  - severity: low
    issue: La puntuación en 'esposas[a], princesas, y trescientas concubinas' puede leerse con apposición algo torpe.
    rationale: 'El hebreo presenta ''mujeres/princesas'' como secuencia descriptiva. En español conviene una puntuación más fluida: ''setecientas esposas[a] princesas y trescientas concubinas'' o, más naturalmente, mantener una sola coma antes del segundo grupo coordinado.'
  revised_spanish_text: Tuvo setecientas esposas[a] princesas y trescientas concubinas; y sus esposas apartaron su corazón.
  revised_footnotes:
  - marker: a
    text: O «mujeres de rango» para «princesas».
    reason: lexical_alternative
