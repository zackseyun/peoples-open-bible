  language: es
  text: Y la palabra de Yahvé vino a mí[a], diciendo,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo YHWH, tradicionalmente traducido «el SEÑOR»; alternativamente, «Yahvé».
