translation:
  language: es
  text: Fue una noche de vigilia para Yahvé[a], para sacarlos de la tierra de Egipto; esta misma noche es una vigilia para Yahvé para todos los hijos de Israel a través de sus generaciones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una noche de vigilancia» o «una noche de observancia». El hebreo שִׁמֻּרִים conlleva la idea de vigilancia/guarda y también puede implicar una observancia conmemorativa.
    reason: lexical_alternative
lexical_decisions:
- source_word: לֵיל
  english_pob_choice: night of
  chosen_spanish: noche de
  alternatives_spanish:
  - noche
  lexicon: HALOT
  rationale: El constructo hebreo con el sustantivo siguiente expresa naturalmente «noche de…». En español, «noche de vigilia» conserva esa relación sin añadir más contenido del que el hebreo exige.
- source_word: שִׁמֻּרִים
  english_pob_choice: vigil
  chosen_spanish: vigilia
  alternatives_spanish:
  - vigilia de observancia
  - noche de vigilancia
  - observancia
  lexicon: HALOT
  rationale: '«Vigilia» conserva la doble tensión del término: vigilancia atenta y conmemoración cultual. Evita reducirlo solo a un acto devocional o solo a estar despierto.'
- source_word: לַיהוָה / יהוה
  english_pob_choice: for Yahweh
  chosen_spanish: para Yahvé
  alternatives_spanish:
  - de Yahvé
  - perteneciente a Yahvé
  lexicon: HALOT
  rationale: Se sigue el uso POB de traducir el nombre divino como «Yahvé». La preposición ל aquí expresa relación/dedicación; «para Yahvé» suena natural en español y preserva esa dedicación.
- source_word: לְהוֹצִיאָם
  english_pob_choice: to bring them out
  chosen_spanish: para sacarlos
  alternatives_spanish:
  - para traerlos fuera
  - para hacerlos salir
  lexicon: HALOT
  rationale: El infinitivo de propósito se expresa con naturalidad en español con «para sacarlos». Mantiene el sentido de liberación desde Egipto sin sobrecargar la frase.
- source_word: מֵאֶרֶץ מִצְרַיִם
  english_pob_choice: from the land of Egypt
  chosen_spanish: de la tierra de Egipto
  alternatives_spanish:
  - de la tierra egipcia
  - de Egipto
  lexicon: HALOT
  rationale: Se conserva explícitamente «tierra», como en el hebreo, en vez de comprimirlo a solo «Egipto».
- source_word: הוּא הַלַּיְלָה הַזֶּה
  english_pob_choice: this same night is
  chosen_spanish: esta misma noche es
  alternatives_spanish:
  - es esta misma noche
  - esta noche misma es
  lexicon: HALOT
  rationale: La repetición enfática se reproduce con «esta misma noche», que comunica identificación y continuidad con la primera cláusula.
- source_word: לְכָל בְּנֵי יִשְׂרָאֵל
  english_pob_choice: for all the children of Israel
  chosen_spanish: para todos los hijos de Israel
  alternatives_spanish:
  - para todos los israelitas
  - para todos los hijos de Israel
  lexicon: HALOT
  rationale: «Hijos de Israel» conserva la expresión familiar/covenantal del hebreo. Se mantiene «para» para reflejar la relación de destino y alcance.
- source_word: לְדֹרֹתָם
  english_pob_choice: throughout their generations
  chosen_spanish: por todas sus generaciones
  alternatives_spanish:
  - a lo largo de sus generaciones
  - de generación en generación
  lexicon: HALOT
  rationale: Se opta por una fórmula natural y solemne en español que expresa continuidad intergeneracional sin perder el alcance normativo del hebreo.
theological_decisions:
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - SEÑOR
  rationale: El proyecto español usa «Yahvé» como forma principal del nombre divino, siguiendo el principio de no enmascarar el Tetragrámaton. Se evita «SEÑOR» porque aquí el texto hebreo nombra directamente a Yahvé.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de שִׁמֻּרִים en contexto pascual
  english_pob_reading: vigil
  chosen_spanish_reading: vigilia
  alternative_spanish_readings:
  - vigilancia
  - observancia
  - noche de vigilancia
  rationale: «Vigilia» preserva la tensión entre una noche de observación vigilante y una noche destinada a la conmemoración cultual. No resuelve indebidamente la ambigüedad del término.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: 'La versión española sigue de cerca el texto hebreo y el audit trail inglés: mantiene el paralelismo de dos cláusulas, conserva el nombre divino como Yahvé, y traduce שִׁמֻּרִים de forma consistente con una palabra que preserve tanto vigilancia como observancia. La redacción fue ajustada para sonar natural en español sin perder la estructura y la tensión semántica del original.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» de manera uniforme para יהוה.
  - «Vigilia» se usó en ambas ocurrencias de שִׁמֻּרִים para preservar consistencia léxica.
  - «Hijos de Israel» conserva la fórmula bíblica y evita una generalización etnicista.
  - La puntuación reproduce dos cola principales separadas por punto y coma, acorde con la estructura hebrea.
