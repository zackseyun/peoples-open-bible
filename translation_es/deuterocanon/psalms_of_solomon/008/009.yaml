  revision_rationale: 'Se ajusta el español para mayor naturalidad y fuerza teológica sin apartarse del griego ni del historial auditado en inglés: «actos de iniquidad» mejora sobre el calco «actos sin ley», y «aposentos secretos» expresa mejor la idea de cámaras o recintos ocultos. Se conserva «en provocación» por fidelidad a la revisión inglesa final y al hecho de que el griego no explicita el objeto de la provocación.'
