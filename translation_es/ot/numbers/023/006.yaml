translation:
  language: es
  text: Entonces volvió a él[a], y he aquí, estaba de pie junto a su holocausto[b], él y todos los príncipes de Moab[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El pronombre «él» se refiere a Balac en el contexto inmediato.
    reason: cross_reference
  - marker: b
    text: 'O: «al lado de su holocausto». La preposición hebrea puede expresar varias relaciones espaciales aquí; el sentido es que estaba situado junto al sacrificio, no sobre él.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «oficiales» o «líderes» de Moab.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשָׁב
  english_pob_choice: Then he returned
  chosen_spanish: Entonces volvió
  alternatives_spanish:
  - Y volvió
  - Luego volvió
  lexicon: HALOT
  rationale: El wayyiqtol avanza la narración; «entonces» conserva la secuencia, y «volvió» reproduce el valor verbal sin redundancia innecesaria.
- source_word: אֵלָיו
  english_pob_choice: to him
  chosen_spanish: a él
  alternatives_spanish:
  - a Balac
  - a él mismo
  lexicon: HALOT
  rationale: El pronombre se mantiene explícito como en hebreo. Se deja sin resolver en el texto principal para conservar el vínculo contextual, que en la escena inmediata apunta a Balac.
- source_word: וְהִנֵּה
  english_pob_choice: and behold
  chosen_spanish: y he aquí
  alternatives_spanish:
  - y mira
  - y allí
  lexicon: HALOT
  rationale: «He aquí» preserva el carácter deíctico y enfático del marcador narrativo, con registro digno y bíblico-natural en español.
- source_word: נִצָּב
  english_pob_choice: was standing
  chosen_spanish: estaba
  alternatives_spanish:
  - estaba de pie
  - estaba plantado
  lexicon: HALOT
  rationale: El participio expresa estado o postura continua; «estaba» es una forma natural en español para esa duratividad, y el contexto completa la postura con «junto a».
- source_word: עַל
  english_pob_choice: by
  chosen_spanish: junto a
  alternatives_spanish:
  - junto a su
  - al lado de
  - ante
  lexicon: HALOT
  rationale: El valor espacial aquí no es «sobre», sino de localización respecto al sacrificio/altar. «Junto a» evita una lectura literal que sugeriría estar encima del holocausto y mantiene la relación de proximidad.
- source_word: עֹלָתוֹ
  english_pob_choice: his burnt offering
  chosen_spanish: su holocausto
  alternatives_spanish:
  - su ofrenda quemada
  - su sacrificio íntegro
  lexicon: HALOT
  rationale: «Holocausto» es el término tradicional y técnico para עֹלָה en español bíblico. «Su» conserva el sufijo posesivo.
- source_word: הוּא וְכָל־שָׂרֵי מוֹאָב
  english_pob_choice: he and all the princes of Moab
  chosen_spanish: él y todos los príncipes de Moab
  alternatives_spanish:
  - él y todos los oficiales de Moab
  - él y todos los jefes de Moab
  lexicon: HALOT
  rationale: «Príncipes» reproduce bien el matiz de dignatarios o nobles de שָׂרִים en este contexto político. El pronombre independiente se conserva para reflejar el énfasis del hebreo.
translation_notes:
  revision_awareness: La redacción sigue el movimiento narrativo del hebreo y la decisión revisada del audit trail inglés de usar una relación espacial natural para עַל, evitando una lectura de ubicación literal sobre el sacrificio. También conserva el énfasis del pronombre independiente y la opción técnica «holocausto» para עֹלָה.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa «holocausto» como término sacrificial técnico, coherente con la terminología bíblica tradicional y la equivalencia para עֹלָה.
  - «Príncipes» se conserva por su adecuación al contexto de dignatarios moabitas y por continuidad con el audit trail inglés.
  - La puntuación con comas reproduce el ritmo narrativo sin añadir énfasis interpretativo extra.
