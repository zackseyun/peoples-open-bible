translation:
  language: es
  text: Fortaleceré la casa de Judá, y salvaré la casa de José. Los restauraré[a], porque he tenido compasión de ellos; y serán como si no los hubiera rechazado, porque yo soy Yahvé, su Dios[b], y les responderé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''Los haré volver''. El verbo hebreo puede llevar el sentido de volver o restaurar.'
    reason: lexical_alternative
  - marker: b
    text: '''La casa de José'' se refiere corporativamente a los descendientes de José, a menudo en especial a las tribus del norte.'
    reason: cultural_note
lexical_decisions:
- source_word: וְגִבַּרְתִּי
  english_pob_choice: I will strengthen
  chosen_spanish: Fortaleceré
  alternatives_spanish:
  - Haré fuerte
  - Daré fuerza a
  lexicon: HALOT
  rationale: El piel de גבר expresa hacer fuerte o fortalecer. 'Fortaleceré' conserva la fuerza causativa y suena natural en español sin perder el sentido de vigor/capacitación.
- source_word: בֵּית יְהוּדָה
  english_pob_choice: the house of Judah
  chosen_spanish: la casa de Judá
  alternatives_spanish:
  - Judá
  lexicon: HALOT
  rationale: Se preserva la expresión corporativa 'casa de' para no reducirla solo al nombre tribal. Esto mantiene el matiz colectivo y dinástico del hebreo.
- source_word: בֵּית יוֹסֵף
  english_pob_choice: the house of Joseph
  chosen_spanish: la casa de José
  alternatives_spanish:
  - José
  - Efraín
  lexicon: HALOT
  rationale: El texto hebreo dice literalmente 'casa de José', y esa designación corporativa se conserva. Aunque puede aludir a las tribus del norte, no se sustituye por un equivalente interpretativo en el texto principal.
- source_word: אוֹשִׁיעַ
  english_pob_choice: I will save
  chosen_spanish: salvaré
  alternatives_spanish:
  - libraré
  - rescataré
  lexicon: HALOT
  rationale: ישׁע en hifil se traduce de forma directa como 'salvar'. 'Salvaré' es preciso y teológicamente transparente.
- source_word: וְהוֹשְׁבוֹתִי
  english_pob_choice: I will restore them
  chosen_spanish: Los restauraré
  alternatives_spanish:
  - Los haré volver
  - Los haré habitar de nuevo
  lexicon: HALOT
  rationale: El verbo de שוב en hifil puede implicar volver, hacer regresar o restaurar. En este contexto de restauración nacional, 'restauraré' capta bien el alcance amplio; el matiz espacial de 'hacer volver' queda como alternativa.
- source_word: כִּי רִחַמְתִּי
  english_pob_choice: because I have had compassion on them
  chosen_spanish: porque he tenido compasión de ellos
  alternatives_spanish:
  - porque los he compadecido
  - porque he tenido misericordia de ellos
  lexicon: HALOT
  rationale: רחם expresa compasión/misericordia. 'He tenido compasión' reproduce bien el valor afectivo y causal del perfecto hebreo.
- source_word: וְהָיוּ כַּאֲשֶׁר לֹא זְנַחְתִּי
  english_pob_choice: they will be as though I had not rejected them
  chosen_spanish: serán como si no los hubiera rechazado
  alternatives_spanish:
  - serán como si no los hubiera desechado
  - serán como si no los hubiera abandonado
  lexicon: HALOT
  rationale: זנח significa rechazar, desestimar o desechar. 'Rechazado' coincide con la elección inglesa y evita intensificar el verbo hacia un abandono más amplio de lo que el hebreo exige.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - Jehová
  lexicon: HALOT
  rationale: Se usa la transliteración española habitual en este proyecto para el Tetragrámaton, manteniendo el nombre divino personal en vez de sustituirlo por un título.
- source_word: וְאֶעֱנֵם
  english_pob_choice: and I will answer them
  chosen_spanish: y los responderé
  alternatives_spanish:
  - y les responderé
  - y los contestaré
  lexicon: HALOT
  rationale: ענה en qal significa responder/contestar. Se mantiene la correspondencia formal con el objeto pronominal 'los', y 'responderé' conserva el sentido directo de respuesta divina.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - Jehová
  rationale: El original usa explícitamente el Tetragrámaton. En la línea del POB inglés, se mantiene el nombre propio divino en lugar de reemplazarlo por una fórmula titulada como 'el SEÑOR'.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Referencia corporativa de 'la casa de José'
  english_pob_reading: '''The house of Joseph'' refers corporately to Joseph''s descendants, often especially the northern tribes.'
  chosen_spanish_reading: '''La casa de José'' se mantiene como designación corporativa de los descendientes de José, a menudo en especial de las tribus del norte.'
  alternative_spanish_readings:
  - José
  - Efraín
  rationale: La expresión hebrea es un título colectivo y no solo un nombre propio. Mantenerlo así evita borrar la carga histórica y tribal del pasaje.
  doctrine_reference: Nota cultural y lexical del audit trail de POB
translation_notes:
  revision_awareness: Se siguió el análisis del POB inglés con acuerdo alto y sin cambios sustanciales en la revisión más reciente. La principal decisión de estilo en español fue conservar 'la casa de...' y usar 'Yahvé' para el nombre divino, mientras que 'restauraré' recoge el rango semántico de שוב sin forzar una sola imagen espacial.
  spanish_consistency_notes:
  - Se mantuvo 'casa de' de forma uniforme para בית, en coherencia con el valor corporativo del hebreo.
  - '''Fortaleceré'', ''salvaré'' y ''restauraré'' reflejan verbos causativos distintos sin fusionarlos.'
  - Se evitó sustituir 'Yahvé' por un título reverencial para conservar la transparencia del nombre divino.
  - '''Los responderé'' conserva el paralelismo final con el objeto pronominal explícito del hebreo.'
