translation:
  language: es
  text: Pero cuando el asunto se hizo notorio y se informó al rey de los persas que, en el lugar donde los sacerdotes que habían sido llevados[a] habían escondido el fuego, apareció el agua, de la cual[c] también los que estaban con Nehemías[b] purificaron los sacrificios,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Alternativa: «los sacerdotes deportados» para «los sacerdotes que habían sido llevados». El participio griego indica sacerdotes trasladados fuera de su tierra; «llevados» conserva la pasiva sin precisar más de lo necesario.'
    reason: lexical_alternative
  - marker: b
    text: 'Alternativa: «Nehemías y sus compañeros» para «los que estaban con Nehemías». El giro griego οἱ περὶ τὸν Νεεμίαν designa al grupo asociado con él; la traducción principal mantiene esa idea sin añadir más de lo explícito.'
    reason: lexical_alternative
  - marker: c
    text: «De la cual» se refiere naturalmente al agua que había aparecido, sugiriendo que fue usada para la purificación ritual de los sacrificios.
    reason: cross_reference
lexical_decisions:
- source_word: ὡς δὲ φανερὸν ἐγενήθη
  english_pob_choice: But when the matter became known
  chosen_spanish: Pero cuando el asunto se hizo notorio
  alternatives_spanish:
  - Pero cuando el asunto llegó a ser evidente
  - Pero cuando el asunto se hizo manifiesto
  lexicon: LSJ
  rationale: Se conserva el sentido de que el hecho llegó a ser público y conocido, con un español natural y sobrio.
- source_word: τὸ πρᾶγμα
  english_pob_choice: the matter
  chosen_spanish: el asunto
  alternatives_spanish:
  - la cuestión
  - el hecho
  lexicon: LSJ
  rationale: «Asunto» comunica bien la referencia amplia al hecho o situación reportada, sin volverlo demasiado técnico.
- source_word: διηγήθη
  english_pob_choice: it was reported
  chosen_spanish: se informó
  alternatives_spanish:
  - se refirió
  - se contó
  lexicon: LSJ
  rationale: El pasivo impersonal en español expresa adecuadamente la comunicación formal al rey.
- source_word: τῷ βασιλεῖ τῶν Περσῶν
  english_pob_choice: to the king of the Persians
  chosen_spanish: al rey de los persas
  alternatives_spanish:
  - al rey persa
  lexicon: LSJ
  rationale: Se sigue de cerca la construcción griega y se mantiene la referencia histórica clara.
- source_word: οἱ μεταχθέντες ἱερεῖς
  english_pob_choice: the priests who had been taken away
  chosen_spanish: los sacerdotes que habían sido llevados
  alternatives_spanish:
  - los sacerdotes deportados
  - los sacerdotes que habían sido trasladados
  lexicon: LSJ
  rationale: «Llevados» conserva la pasiva sin precisar más de lo que dice el participio; evita fijar demasiado pronto la imagen de deportación como único matiz.
- source_word: ἔκρυψαν
  english_pob_choice: had hidden
  chosen_spanish: habían escondido
  alternatives_spanish:
  - habían ocultado
  - escondieron
  lexicon: LSJ
  rationale: «Habían escondido» reproduce la anterioridad narrativa con naturalidad en español.
- source_word: τὸ πῦρ ... τὸ ὕδωρ ἐφάνη
  english_pob_choice: water had appeared
  chosen_spanish: apareció el agua
  alternatives_spanish:
  - se manifestó el agua
  - el agua apareció
  lexicon: LSJ
  rationale: Se preserva el contraste entre el fuego escondido y la aparición del agua, manteniendo el orden comprensible en español.
- source_word: ἀφ' οὗ
  english_pob_choice: from which
  chosen_spanish: de la cual
  alternatives_spanish:
  - de donde
  - a partir de la cual
  lexicon: LSJ
  rationale: La referencia inmediata al agua se expresa de manera natural con «de la cual», conservando la relación causal/instrumental implícita.
- source_word: οἱ περὶ τὸν Νεεμίαν
  english_pob_choice: those with Nehemiah
  chosen_spanish: los que estaban con Nehemías
  alternatives_spanish:
  - Nehemías y sus compañeros
  - los acompañantes de Nehemías
  lexicon: LSJ
  rationale: Se traduce el idiomatismo de grupo asociado al líder sin añadir datos no explícitos en el griego.
- source_word: ἥγνισαν
  english_pob_choice: purified
  chosen_spanish: purificaron
  alternatives_spanish:
  - limpiaron ritualmente
  - consagraron
  lexicon: LSJ
  rationale: El verbo tiene sentido ritual; «purificaron» es la forma más directa y fiel en español.
- source_word: τὰς θυσίας
  english_pob_choice: the sacrifices
  chosen_spanish: los sacrificios
  alternatives_spanish:
  - las ofrendas sacrificadas
  - las ofrendas
  lexicon: LSJ
  rationale: En contexto cultual, «sacrificios» mantiene el referente explícito y reconocible.
theological_decisions:
- issue: Sentido ritual de ἥγνισαν τὰς θυσίας
  english_pob_reading: purified the sacrifices
  chosen_spanish_reading: purificaron los sacrificios
  alternative_spanish_readings:
  - consagraron los sacrificios
  - purificaron las ofrendas
  rationale: La escena describe una acción cultual vinculada al agua recién aparecida. «Purificaron» conserva la fuerza ritual sin introducir un término más interpretativo que el griego.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Referencia de ἀφ' οὗ
  english_pob_reading: taken to refer to the water as the means/source used in the purification
  chosen_spanish_reading: de la cual
  alternative_spanish_readings:
  - después de lo cual
  - con la cual
  rationale: La referencia más cercana es el agua; el español permite mantener esa relación sin forzar una aclaración doctrinal.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: La redacción sigue la última revisión del inglés auditado, que prefirió «became known» y «those with Nehemiah», y conserva la sintaxis abierta con coma final para reflejar que el período continúa en el versículo siguiente.
  spanish_consistency_notes:
  - Se usa «Yahvé» por norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se mantiene «sacerdotes» y «sacrificios» como vocabulario cultual directo, sin sustituirlos por términos eclesiásticos posteriores.
  - «Purificaron» conserva la acción ritual sin expandirla a una explicación teológica posterior.
  - Se eligió un español natural de registro bíblico moderno, evitando calcos innecesarios del inglés auditado.
