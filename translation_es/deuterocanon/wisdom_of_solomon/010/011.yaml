review_pass:
  verdict: revise
  source_alignment_summary: 'El griego dice literalmente algo como: ''cuando quienes lo dominaban/prevalecían contra él actuaban en codicia, [la Sabiduría] estuvo junto a él y lo enriqueció''. El borrador español capta bien πλεονεξία, παρέστη y ἐπλούτισεν, pero ''lo oprimían'' desplaza κατισχυόντων hacia opresión más que hacia prevalecer/dominación, y la decisión teológica documentada entra en conflicto con el texto español: el POB inglés explicita ''she'' por claridad contextual, mientras el borrador afirma dejar el sujeto implícito pero en realidad también usa ''ella''.'
  spanish_quality_summary: El español es claro y natural. 'Cuando otros lo oprimían por codicia, ella estuvo a su lado y lo hizo rico' suena bien, pero puede ajustarse mejor al matiz léxico con 'prevalecían contra él' o 'dominaban sobre él'. La puntuación y el tono son apropiados para una Biblia moderna y digna.
  glossary_alignment: No hay términos del glosario maestro en disputa aquí. 'Codicia' para πλεονεξία encaja bien. 'Lo hizo rico' es aceptable y fiel. La referencia a Sabiduría personificada debe mantenerse con el sujeto explícito 'ella' para alinearse con la decisión auditada del POB y la claridad del español.
  issues:
  - severity: medium
    issue: κατισχυόντων se tradujo como 'lo oprimían'
    rationale: El verbo griego se centra en prevalecer contra, dominar o imponerse sobre alguien. 'Oprimir' introduce un matiz sociopolítico o continuativo que no es el mejor equivalente aquí. 'Prevalecían contra él' refleja mejor la alternativa preservada por el POB y el sentido del participio.
  - severity: medium
    issue: Inconsistencia entre la nota teológica y el texto español sobre el sujeto implícito
    rationale: La ficha teológica del borrador dice que el español deja implícita la referencia al sujeto, pero el texto usa explícitamente 'ella'. Además, el POB inglés ya documentó que conviene explicitar el sujeto por claridad contextual. Debe alinearse la revisión con esa decisión.
  revised_spanish_text: Cuando otros prevalecían contra él por codicia[a], ella estuvo a su lado y lo hizo rico.
  revised_footnotes:
  - marker: a
    text: 'O: «Cuando los que actuaban por codicia prevalecían contra él». El participio griego también puede traducirse de manera más formal como «prevalecían contra».'
    reason: lexical_alternative
  revision_rationale: Se reemplaza 'lo oprimían' por 'prevalecían contra él' para reflejar con mayor precisión κατισχυόντων y alinearse con la alternativa léxica preservada en el POB inglés. Se mantiene 'ella' para concordar con la decisión contextual documentada sobre Sabiduría personificada y con la claridad natural del español.
