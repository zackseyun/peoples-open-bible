translation:
  language: es
  text: Dime, tú a quien ama mi alma, dónde apacientas tu rebaño, dónde lo haces descansar al mediodía; pues ¿por qué habría de ser yo como una mujer velada[a] junto a los rebaños de tus compañeros?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como una mujer que anda errante» junto a los rebaños de tus compañeros. La expresión hebrea puede entenderse tanto como una mujer velada como, por interpretación contextual, como una que anda buscando al amado.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַגִּידָה לִּי
  english_pob_choice: Tell me
  chosen_spanish: Di[a]
  alternatives_spanish:
  - Háblame
  - Dime
  lexicon: HALOT
  rationale: El imperativo de נגד pide una súplica directa y natural; en español, «Di» conserva la inmediatez breve del ruego. Se mantiene el objeto indirecto con «me», como en el hebreo y en el inglés POB.
- source_word: שֶׁאָהֲבָה נַפְשִׁי
  english_pob_choice: you whom my soul loves
  chosen_spanish: tú a quien ama mi alma
  alternatives_spanish:
  - tú a quien yo amo
  - tú a quien ama mi vida
  lexicon: HALOT
  rationale: Se conserva la expresión poética de נֶפֶשׁ con «mi alma», en vez de reducirla a «yo amo». Esto mantiene la intensidad afectiva y la formulación del original.
- source_word: אֵיכָה
  english_pob_choice: where
  chosen_spanish: dónde
  alternatives_spanish:
  - cómo
  - en qué lugar
  lexicon: HALOT
  rationale: Aquí la pregunta es locativa en el contexto pastoral; «dónde» reproduce mejor la búsqueda concreta que «cómo».
- source_word: תִרְעֶה
  english_pob_choice: you pasture your flock
  chosen_spanish: apacientas tu rebaño
  alternatives_spanish:
  - pastoreas tu rebaño
  - apacientas
  lexicon: HALOT
  rationale: «Apacentar» conserva el campo semántico pastoral de רעה y suena natural en español bíblico moderno. Se explicita «tu rebaño», siguiendo el sentido implícito del hebreo y del inglés POB.
- source_word: תַּרְבִּ֣יץ
  english_pob_choice: you make it lie down
  chosen_spanish: lo haces descansar
  alternatives_spanish:
  - lo haces recostar
  - lo haces echarse
  lexicon: HALOT
  rationale: El hifil de רבץ expresa causar que repose/quiera decir recostar; «lo haces descansar» comunica bien la acción causativa en español contemporáneo. Se mantiene el singular colectivo «lo» para el rebaño.
- source_word: בַּצָּהֳרָיִם
  english_pob_choice: at noon
  chosen_spanish: al mediodía
  alternatives_spanish:
  - a mediodía
  - al mediodía pleno
  lexicon: HALOT
  rationale: «Al mediodía» es la forma idiomática española para בַּצָּהֳרָיִם y conserva el valor temporal puntual.
- source_word: שַׁלָּמָה
  english_pob_choice: for why should
  chosen_spanish: pues ¿por qué habría de
  alternatives_spanish:
  - ¿por qué habría de
  - pues ¿por qué debería
  lexicon: HALOT
  rationale: La partícula introduce la razón del ruego con matiz explicativo. «Pues ¿por qué habría de» conserva esa fuerza causal y el tono retórico del original.
- source_word: אֶהְיֶה
  english_pob_choice: should I be
  chosen_spanish: ser yo
  alternatives_spanish:
  - estar yo
  - llegar a ser yo
  lexicon: HALOT
  rationale: En una pregunta retórica, el imperfecto apunta a una posible condición. El español «habría de ser yo» transmite esa potencialidad sin sobrecargar el verso.
- source_word: כְּעֹטְיָה
  english_pob_choice: like one who veils herself
  chosen_spanish: como una mujer velada
  alternatives_spanish:
  - como una mujer que se cubre
  - como una mujer que anda velada
  lexicon: HALOT
  rationale: Se conserva la lectura principal tradicional de עטה como cubrir/velar, expresada de manera natural en español. «Mujer velada» evita decidir de forma excesiva entre matices de cobertura, velo o desplazamiento.
- source_word: עַל עֶדְרֵי חֲבֵרֶיךָ
  english_pob_choice: beside the flocks of your companions
  chosen_spanish: junto a los rebaños de tus compañeros
  alternatives_spanish:
  - entre los rebaños de tus compañeros
  - al lado de los rebaños de tus compañeros
  lexicon: HALOT
  rationale: «Junto a» refleja bien el valor espacial de עַל en este contexto. «Compañeros» traduce חֲבֵרִים de forma relacional y natural en español, sin introducir una lectura interpretativa excesiva.
theological_decisions:
- issue: 'Sentido de כְּעֹטְיָה: velo o deambular'
  english_pob_reading: The Hebrew expression can be understood either as a woman veiling herself or, by contextual interpretation, as one roaming about in search of the beloved.
  chosen_spanish_reading: Se traduce «una mujer velada» y se anota la posible lectura de «una mujer que anda errante/buscando».
  alternative_spanish_readings:
  - una mujer que anda errante
  - una mujer que vaga velada
  rationale: La POB inglesa preserva la tensión lexical sin resolverla por completo. En español se deja el texto principal con la lectura de velo/cobertura y se conserva en nota la alternativa contextual de deambular, evitando borrar la ambigüedad documentada.
  doctrine_reference: No aplica; es una decisión lexical-poética, no doctrinal.
translation_notes:
  revision_awareness: 'La revisión auditada más reciente indica que no hubo cambios: el pasaje quedó estable con alta concordancia (0.95) y sin revisiones adicionales aplicadas. Se preserva la única nota alternativa heredada del inglés POB para כְּעֹטְיָה.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como default del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa «alma» para נֶפֶשׁ conforme a la decisión poética del texto fuente.
  - Se conserva la alternancia verbal y la estructura interrogativa para reproducir el tono suplicante del hebreo.
  - La nota [a] se ancla en «velada» para preservar la ambigüedad documentada por la POB inglesa.
