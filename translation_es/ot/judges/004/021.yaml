  text: וַ/תִּקַּ֣ח יָעֵ֣ל אֵֽשֶׁת חֶ֠בֶר אֶת יְתַ֨ד הָ/אֹ֜הֶל וַ/תָּ֧שֶׂם אֶת הַ/מַּקֶּ֣בֶת בְּ/יָדָ֗/הּ וַ/תָּב֤וֹא אֵלָי/ו֙ בַּ/לָּ֔אט וַ/תִּתְקַ֤ע אֶת הַ/יָּתֵד֙ בְּ/רַקָּת֔/וֹ וַ/תִּצְנַ֖ח בָּ/אָ֑רֶץ וְ/הֽוּא נִרְדָּ֥ם וַ/יָּ֖עַף וַ/יָּמֹֽת־־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/judges/004/021.yaml
  text: Then Jael[a], the wife of Heber, took a tent peg and put a hammer in her hand, and she went to him quietly and drove the peg into his temple, and it went down into the ground. Now he was fast asleep and exhausted[b], and he died.
  footnotes:
  - marker: a
    text: Or 'stealthily' for 'quietly.' The Hebrew emphasizes her silent, unobtrusive approach.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'and it sank into the ground,' with the verb most naturally referring to the peg.
    reason: lexical_alternative
