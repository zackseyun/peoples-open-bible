  lexicon: HALOT
  rationale: En un registro genealógico o censal, בְּנֵי puede referirse a miembros de un grupo. En español, «hijos de» reproduce de cerca la forma hebrea y mantiene la transparencia de la lista, del mismo modo que el inglés POB conserva «sons of».
- source_word: יְרֵחוֹ
  english_pob_choice: Jericho
  chosen_spanish: Jericó
  alternatives_spanish:
  - —
  lexicon: HALOT
  rationale: Es un nombre propio de lugar; en español bíblico estándar la forma establecida y naturalmente legible es «Jericó».
- source_word: שְׁלֹשׁ מֵאֹת אַרְבָּעִים וַחֲמִשָּׁה
  english_pob_choice: three hundred forty-five
  chosen_spanish: trescientos cuarenta y cinco
  alternatives_spanish:
  - trescientos y cuarenta y cinco
  lexicon: HALOT
  rationale: El total numérico del hebreo es 345. En español contemporáneo bíblico se expresa sin «y» entre centenas y decenas, conforme al valor aritmético directo del texto.
