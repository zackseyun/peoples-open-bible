translation:
  language: es
  text: Y yo, ¿adónde llevaría mi deshonra?[a] Y tú serías como uno de los necios[b] en Israel. Así que ahora, por favor, habla al rey[c], porque él no me negará para ti.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mi vergüenza» o «mi reproche».
    reason: lexical_alternative
  - marker: b
    text: O «insensatos» o «malvados»; נְבָלִים puede designar a personas moralmente desvergonzadas o deshonrosas, no solo a personas poco inteligentes.
    reason: lexical_alternative
  - marker: c
    text: Es decir, «él no se negará a darme a ti» o «no me retendrá de ti». La declaración de Tamar puede reflejar una apelación genuina o una estrategia para retrasar a Amnón.
    reason: alternative_reading
lexical_decisions:
- source_word: אָ֤נָה
  english_pob_choice: where
  chosen_spanish: ¿adónde
  alternatives_spanish:
  - ¿dónde
  - ¿a dónde
  lexicon: HALOT
  rationale: El hebreo formula una pregunta de destino o dirección; «¿adónde» conserva ese matiz natural en español y acompaña bien el verbo de movimiento implícito en la imagen.
- source_word: אוֹלִיךְ
  english_pob_choice: could I carry
  chosen_spanish: llevaría
  alternatives_spanish:
  - podría llevar
  - cargaría
  - podría cargar
  lexicon: HALOT
  rationale: El verbo causativo hebreo expresa la idea de llevar o hacer llevar la vergüenza. «Llevaría» mantiene la metáfora de cargar con la deshonra sin sonar forzado en español.
- source_word: חֶרְפָּתִי
  english_pob_choice: my disgrace
  chosen_spanish: mi deshonra
  alternatives_spanish:
  - mi vergüenza
  - mi reproche
  - mi oprobio
  lexicon: HALOT
  rationale: La palabra hebrea apunta al deshonor público asociado con la agresión sexual. «Deshonra» comunica bien esa carga social y moral en español contemporáneo.
- source_word: כְּאַחַד הַנְּבָלִים
  english_pob_choice: like one of the fools
  chosen_spanish: como uno de los necios
  alternatives_spanish:
  - como uno de los insensatos
  - como uno de los perversos
  - como uno de los malvados
  lexicon: HALOT
  rationale: En este contexto נבל no describe solo falta de inteligencia, sino vileza moral y desvergüenza. La revisión inglesa optó por «fools» para reflejar el término base; en español, «necios» conserva el eco tradicional y la dureza moral sin convertirlo en mera torpeza intelectual.
- source_word: דַּבֶּר נָא
  english_pob_choice: please speak
  chosen_spanish: por favor, habla
  alternatives_spanish:
  - te ruego que hables
  - por favor, habla tú
  - habla, por favor
  lexicon: HALOT
  rationale: La combinación del imperativo con נָא es una súplica cortés y urgente. «Por favor, habla» preserva esa entonación directa en español actual.
- source_word: יִמְנָעֵנִי מִמֶּךָּ
  english_pob_choice: he will not withhold me from you
  chosen_spanish: él no me negará a ti
  alternatives_spanish:
  - él no me retendrá de ti
  - él no me rehusará a ti
  - él no me impedirá ir a ti
  lexicon: HALOT
  rationale: מנע tiene el sentido de retener, negar o no conceder. Dado el contexto implícito de una petición al rey respecto al matrimonio, «no me negará a ti» conserva la ambigüedad entre no rechazar la solicitud y no rehusar entregarla/otorgarla.
theological_decisions:
- issue: Sentido de la apelación al rey y su ambigüedad narrativa
  english_pob_reading: Render the statement straightforwardly as Tamar's plea that the king would not withhold her from Amnon, without resolving whether this reflects an actually lawful/realistic possibility or a desperate rhetorical attempt to delay the assault.
  chosen_spanish_reading: Traducir la frase de manera directa, sin decidir si Tamar está proponiendo una posibilidad realmente viable o si está tratando desesperadamente de ganar tiempo.
  alternative_spanish_readings:
  - Tamar cree sinceramente que el rey podría permitir el matrimonio
  - Tamar habla estratégicamente para retrasar a Amnón
  rationale: El verso solo registra las palabras de Tamar. La traducción debe conservar la tensión narrativa y no imponer una interpretación que el texto no explicita.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés POB, que sustituyó «vile men» por «fools» para acercarse más a נְבָלִים. La versión española sigue ese ajuste con «necios», pero añade la nota para preservar la carga moral del término hebreo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma por defecto solo cuando corresponda; este versículo no contiene el nombre divino.
  - Se usa un registro bíblico moderno y sobrio, evitando arcaísmos innecesarios.
  - Se preserva la ambigüedad de מנע sin convertirla en una decisión interpretativa cerrada.
  - Se evita traducir נבל como simple falta de inteligencia; se conserva su fuerza ética con «necio» y la nota explicativa.
