translation:
  language: es
  text: 'Entonces Josué dijo al pueblo: «Conságrense, porque mañana Yahvé hará maravillas[a] entre ustedes[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cosas maravillosas»; el hebreo se refiere a actos extraordinarios de Dios que inspiran asombro.
    reason: lexical_alternative
  - marker: b
    text: O «en medio de ustedes».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Luego ... dijo
  lexicon: HALOT
  rationale: La waw consecutiva avanza la narración; «Entonces» comunica secuencia natural en español sin perder el valor discursivo del original.
- source_word: יְהוֹשֻׁעַ
  english_pob_choice: Joshua
  chosen_spanish: Josué
  alternatives_spanish:
  - Joshua
  lexicon: Uso bíblico estándar
  rationale: En español bíblico, el nombre propio se vierte como «Josué», forma tradicional y plenamente inteligible.
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Aquí עָם designa a la comunidad reunida; «el pueblo» conserva el colectivo sin añadir precisión no explicitada en el hebreo.
- source_word: הִתְקַדָּשׁוּ
  english_pob_choice: Consecrate yourselves
  chosen_spanish: Santifíquense
  alternatives_spanish:
  - Conságrense
  - Sepárense para la santidad
  lexicon: HALOT
  rationale: El hitpael imperativo de קדשׁ implica apartarse para Dios en un contexto ritual y de preparación. «Santifíquense» mantiene el campo semántico de santidad; «conságrense» es una alternativa válida, pero «santificar» conserva mejor el eco bíblico sin forzar una explicación perifrástica.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: En español, «porque» expresa con claridad la relación causal del motivo de la orden. Aunque el English POB revisó «because» a «for» por registro, el español se beneficia de una causal directa y natural.
- source_word: מָחָר
  english_pob_choice: tomorrow
  chosen_spanish: mañana
  alternatives_spanish:
  - al día siguiente
  lexicon: HALOT
  rationale: Adverbio temporal directo y exacto.
- source_word: יַעֲשֶׂה
  english_pob_choice: will do
  chosen_spanish: hará
  alternatives_spanish:
  - realizará
  - obrará
  lexicon: HALOT
  rationale: עָשָׂה es amplio; «hará» preserva la generalidad del verbo y funciona bien con el complemento «maravillas». «Obrará» sería más solemne, pero menos directo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: 'Se mantiene el nombre divino como transliteración del Tetragrámaton en español según la convención POB: «Yahvé». Esto preserva el nombre personal del pacto en vez de sustituirlo por un título.'
- source_word: בְּקִרְבְּכֶם
  english_pob_choice: among you
  chosen_spanish: entre ustedes
  alternatives_spanish:
  - en medio de ustedes
  - dentro de ustedes
  lexicon: HALOT
  rationale: La frase señala presencia en el seno del grupo; «entre ustedes» es natural en español y comunica bien la idea relacional/comunitaria. Se evita «dentro de ustedes» por posible ambigüedad individualista.
- source_word: נִפְלָאוֹת
  english_pob_choice: wonders
  chosen_spanish: maravillas
  alternatives_spanish:
  - obras maravillosas
  - milagros
  lexicon: HALOT
  rationale: נִפְלָאוֹת refiere actos extraordinarios que inspiran asombro. «Maravillas» conserva amplitud y registro bíblico sin restringir el término a «milagros».
theological_decisions:
- issue: El nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton. La línea editorial del POB lo rinde como nombre propio divino, y en español «Yahvé» preserva esa decisión sin ocultar el nombre del pacto bajo un sustituto titular.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Alcance de נִפְלָאוֹת
  english_pob_reading: wonders
  chosen_spanish_reading: maravillas
  alternative_spanish_readings:
  - milagros
  - obras maravillosas
  rationale: El hebreo no limita el término a una categoría técnica de 'milagro', sino que expresa actos extraordinarios de Dios que provocan asombro. «Maravillas» mantiene esa amplitud y el peso teológico del asombro ante la acción divina.
  doctrine_reference: No aplica; decisión lexical con implicación teológica menor
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que ajustó כִּי de «because» a «for» por registro, pero en español se optó por «porque» para conservar una causalidad clara y natural. También se respetó la auditoría que mantiene «wonders» como opción amplia y el uso del nombre divino como Yahweh/Yahvé.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente con la política del proyecto para יְהוָה.
  - «Santifíquense» conserva el campo léxico de קדשׁ sin introducir una paráfrasis extensa.
  - «Entre ustedes» refleja la idea comunitaria de בְּקִרְבְּכֶם y evita una lectura más interiorizada.
  - El tono es bíblico contemporáneo, con puntuación y apertura de cita adaptadas al español.
