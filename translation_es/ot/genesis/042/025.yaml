revisions:
- from: Entonces José dio órdenes de llenar sus recipientes con grano[a], de devolver el dinero de cada hombre a su saco, y de darles provisiones para el camino[d][c][b]. Y así se hizo con ellos.
  to: Entonces José dio órdenes de llenar sus recipientes con grano[a], de devolver la plata de cada hombre a su saco[b], y de darles provisiones para el camino. Y así se hizo para ellos[d][c].
  rationale: 'Se revisa para alinearlo con las decisiones léxicas auditadas del POB: se restituye כֶּסֶף como «plata» en el texto principal con «dinero» en nota, se mejora לָהֶם כֵּן como «para ellos», y se corrigen las notas c y d para que reflejen el historial inglés y el sentido hebreo. Se mantienen «recipientes» frente a «saco» y «provisiones para el camino», que sí son fieles y naturales.'
