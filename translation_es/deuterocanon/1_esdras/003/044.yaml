translation:
  language: es
  text: y con la mujer[a] entrega[b] su vida, y no recuerda ni al padre ni a la madre ni a la patria.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Mujer» también puede traducirse «esposa», ya que γυνή puede significar cualquiera de las dos según el contexto.
    reason: lexical_alternative
  - marker: b
    text: «Entrega» también puede entenderse como «deja» o «abandona». El griego dice literalmente que «deja la vida/el alma», usando ψυχή en un sentido amplio que puede significar vida, alma o la persona misma.
    reason: lexical_alternative
lexical_decisions:
- source_word: μετὰ τῆς γυναικός
  english_pob_choice: with the woman
  chosen_spanish: con la mujer
  alternatives_spanish:
  - con la esposa
  - por causa de la mujer
  lexicon: LSJ
  rationale: Con genitivo aquí expresa compañía o asociación. En español, «con la mujer» mantiene la relación directa con el griego y conserva la amplitud semántica de γυνή, sin decidir prematuramente entre «mujer» y «esposa».
- source_word: γυνή
  english_pob_choice: woman
  chosen_spanish: mujer
  alternatives_spanish:
  - esposa
  lexicon: BDAG
  rationale: γυνή puede significar «mujer» o «esposa». El contexto no obliga a especificar «esposa», y «mujer» preserva el alcance general del dicho.
- source_word: ἀφίησι
  english_pob_choice: gives up
  chosen_spanish: entrega
  alternatives_spanish:
  - deja
  - abandona
  - suelta
  lexicon: BDAG
  rationale: 'El verbo tiene un campo amplio: dejar, soltar, abandonar, ceder. Con τὴν ψυχήν, la idea es la de entregar o poner en riesgo la propia vida; «entrega» expresa bien esa fuerza sin volverlo demasiado interpretativo.'
- source_word: τὴν ψυχήν
  english_pob_choice: his life
  chosen_spanish: su vida
  alternatives_spanish:
  - su alma
  - a sí mismo
  lexicon: BDAG
  rationale: ψυχή puede significar vida, alma o yo mismo. Aquí, por el contraste con la devoción extrema, «su vida» es la equivalencia más natural en español y evita importar una antropología ajena al contexto.
- source_word: μέμνηται
  english_pob_choice: remembers
  chosen_spanish: recuerda
  alternatives_spanish:
  - se acuerda de
  - tiene presente
  lexicon: BDAG
  rationale: El verbo significa recordar o tener presente. «Recuerda» es la opción más clara y funciona bien con la triple negación repetida.
- source_word: χώραν
  english_pob_choice: homeland
  chosen_spanish: la patria
  alternatives_spanish:
  - la tierra
  - el país
  lexicon: LSJ
  rationale: χώρα puede ser tierra, región o país. En esta enumeración junto con padre y madre, el sentido es el lugar de origen y pertenencia; «patria» comunica esa carga afectiva de manera natural en español.
translation_notes:
  revision_awareness: No se registran revisiones aplicadas; el presente borrador sigue de cerca el griego de Swete LXX y la auditoría inglesa, conservando las ambigüedades documentadas de γυνή y ψυχή.
  spanish_consistency_notes:
  - Se mantiene «mujer» en lugar de «esposa» para no restringir el alcance del término griego sin evidencia adicional.
  - Se traduce ψυχή como «vida» en coherencia con la decisión inglesa y con el contexto idiomático.
  - «Patria» se usa para χώρα por su naturalidad en español y por su resonancia con el sentido de pertenencia personal del pasaje.
