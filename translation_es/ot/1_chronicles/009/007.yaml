  - los descendientes de Benjamín
  lexicon: HALOT
  rationale: En contexto de registro genealógico, 'hijos de Benjamín' reproduce de cerca el idiomático hebreo sin perder la referencia tribal.
- source_word: סַלּוּא
  english_pob_choice: Sallu
  chosen_spanish: Sallu
  alternatives_spanish:
  - Salú
  lexicon: Transliteración estándar
