translation:
  language: es
  text: Y la tercera[a] la daba a quienes les correspondía, tal como lo había mandado Débora[b], la madre de mi padre, porque quedé huérfano[c] por mi padre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más explícitamente, 'la tercera parte' o 'una tercera porción'; el griego deja implícito el sustantivo por el contexto.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, 'la madre de mi padre'.
    reason: lexical_alternative
  - marker: c
    text: Es decir, efectivamente, 'sin padre'; el griego dice literalmente 'fui dejado huérfano por mi padre', refiriéndose a la pérdida de su padre.
    reason: lexical_alternative
lexical_decisions:
- source_word: τὴν τρίτην
  english_pob_choice: the third
  chosen_spanish: la tercera parte
  alternatives_spanish:
  - la tercera
  - la tercera porción
  lexicon: LSJ
  rationale: El griego usa un sustantivo elíptico con artículo; en español, para evitar una frase oscura, conviene explicitar la idea de porción o parte sin añadir contenido nuevo. 'La tercera parte' conserva la elipsis de manera natural.
- source_word: ἐδίδουν
  english_pob_choice: I would give
  chosen_spanish: la daba
  alternatives_spanish:
  - solía darla
  - la daba habitualmente
  lexicon: LSJ
  rationale: El imperfecto expresa acción habitual en el pasado. En español, el imperfecto simple comunica bien esa costumbre sin sobrecargar la frase.
- source_word: οἷς καθήκει
  english_pob_choice: to those to whom it was due
  chosen_spanish: a quienes les correspondía
  alternatives_spanish:
  - a quienes era debido
  - a quienes les pertenecía
  lexicon: LSJ
  rationale: καθήκει expresa lo que conviene, corresponde o se debe. 'Les correspondía' suena natural y preserva la idea de destinatarios legítimos sin endurecer la frase con un tecnicismo legal.
- source_word: καθὼς ἐνετείλατο
  english_pob_choice: just as ... commanded
  chosen_spanish: tal como lo había mandado
  alternatives_spanish:
  - como había ordenado
  - tal como había instruido
  lexicon: LSJ
  rationale: El verbo transmite encargo o mandato. 'Había mandado' mantiene la fuerza del mandato y el pluscuamperfecto refleja anterioridad respecto de la práctica narrada.
- source_word: Δεββώρα
  english_pob_choice: Deborah
  chosen_spanish: Débora
  alternatives_spanish:
  - Debora
  lexicon: LSJ
  rationale: Se usa la forma española estándar del nombre propio, plenamente reconocible y fiel a la transliteración habitual.
- source_word: ἡ μήτηρ τοῦ πατρός μου
  english_pob_choice: my father's mother
  chosen_spanish: la madre de mi padre
  alternatives_spanish:
  - mi abuela paterna
  - la madre de mi padre
  lexicon: LSJ
  rationale: El griego dice literalmente 'la madre de mi padre'. Aunque 'abuela paterna' sería más fluido, la redacción conserva la explicitud del original, como hace la POB inglesa.
- source_word: ὀρφανὸς κατελείφθην
  english_pob_choice: I was left an orphan
  chosen_spanish: fui dejado huérfano
  alternatives_spanish:
  - quedé huérfano
  - fui huérfano
  lexicon: LSJ
  rationale: La forma pasiva se conserva con 'fui dejado'. 'Huérfano' reproduce el estado resultante; la frase mantiene la cercanía al griego, aunque en español resulte más marcada que un simple 'quedé huérfano'.
- source_word: ὑπὸ τοῦ πατρός μου
  english_pob_choice: by my father
  chosen_spanish: por mi padre
  alternatives_spanish:
  - a causa de mi padre
  - por la muerte de mi padre
  lexicon: LSJ
  rationale: El griego dice literalmente 'por mi padre'. En contexto, esto comunica que su padre fue la causa de quedar huérfano; la traducción conserva la ambigüedad formal, como la POB inglesa, sin explicitar la muerte en el texto principal.
theological_decisions:
- issue: La expresión 'huérfano por mi padre' puede sonar extraña en español y sugiere una tensión entre forma literal y sentido contextual.
  english_pob_reading: because I was left an orphan by my father
  chosen_spanish_reading: porque fui dejado huérfano por mi padre
  alternative_spanish_readings:
  - porque quedé huérfano por la muerte de mi padre
  - porque mi padre murió y quedé huérfano
  rationale: Se mantiene la lectura formalmente cercana al griego y a la POB inglesa, que preserva la relación sintáctica aun cuando el sentido contextual sea 'huérfano de padre'. No se resuelve la tensión con una paráfrasis interpretativa en el texto principal.
  doctrine_reference: Tobit 1:8 / fidelidad textual y ambigüedad contextual
translation_notes:
  revision_awareness: Se revisó la consistencia con la POB inglesa y no se detectaron cambios sustanciales necesarios. La redacción española conserva la elipsis de 'la tercera', la explicitud de parentesco en 'la madre de mi padre' y la tensión literal de 'huérfano por mi padre' para reflejar fielmente el griego.
  spanish_consistency_notes:
  - Se prefirió 'Débora' como forma española estándar del nombre propio.
  - Se evitó 'Señor' o fórmulas teológicas no presentes en este versículo.
  - Se mantuvo la ambigüedad literal de 'por mi padre' para no corregir interpretativamente el giro griego.
  - La nota a aclara la elipsis de 'la tercera', importante para una lectura española natural.
