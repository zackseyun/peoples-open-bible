translation:
  language: es
  text: 'Yahvé de los ejércitos lo ha propuesto[a]: para profanar[b] el orgullo de toda belleza, para humillar[c] a todos los honrados de la tierra.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ha planeado esto contra ella», con el sufijo referido específicamente a Tiro.'
    reason: alternative_reading
  - marker: b
    text: 'También: «para contaminar» o «para deshonrar» el orgullo de toda belleza.'
    reason: lexical_alternative
  - marker: c
    text: 'También: «para abatir» o «para traer abajo» a todos los honrados de la tierra.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: El Tetragrama se mantiene como nombre propio divino en español, siguiendo la política del proyecto de no sustituirlo por un título. 'Yahvé' es la forma de uso más estable y legible en español bíblico.
- source_word: צְבָא֖וֹת
  english_pob_choice: of hosts
  chosen_spanish: de los ejércitos
  alternatives_spanish:
  - de las huestes
  lexicon: HALOT
  rationale: '''Hosts'' se vierte de manera natural como ''ejércitos'' en español; conserva el alcance militar/celestial del título sin sonar arcaico.'
- source_word: יְעָצָהּ
  english_pob_choice: has purposed it
  chosen_spanish: lo ha purpuesto
  alternatives_spanish:
  - lo ha planeado
  - ha resuelto esto
  - lo ha determinado
  lexicon: HALOT
  rationale: Se conserva el sentido de propósito/determinación divina. La forma pronominal 'lo' permite un antecedente general, como en el inglés POB, sin forzar un referente explícito que el hebreo deja implícito.
- source_word: לְחַלֵּל
  english_pob_choice: to defile
  chosen_spanish: para profanar
  alternatives_spanish:
  - para contaminar
  - para deshonrar
  lexicon: HALOT
  rationale: '''Profanar'' es el equivalente más directo y fuerte para חלל en este contexto de rebajar lo exaltado; mantiene mejor el matiz de violar o rebajar lo que era elevado que ''deshonrar''.'
- source_word: גְּא֣וֹן כָּל צְבִ֔י
  english_pob_choice: the pride of all beauty
  chosen_spanish: el orgullo de toda belleza
  alternatives_spanish:
  - la soberbia de toda hermosura
  - la majestad de todo esplendor
  lexicon: HALOT
  rationale: La revisión inglesa prefirió 'beauty' para צבי; en español, 'belleza' es la opción más natural y mantiene el campo semántico de belleza/esplendor. 'Orgullo' conserva גאון, como elevación orgullosa o preeminencia.
- source_word: לְהָקֵל
  english_pob_choice: to humble
  chosen_spanish: para humillar
  alternatives_spanish:
  - para abajar
  - para abatir
  - para traer abajo
  lexicon: HALOT
  rationale: En español, 'humillar' transmite bien la acción de hacer bajar de posición/estatus a los encumbrados, manteniendo el paralelismo con el primer infinitivo.
- source_word: כָּל נִכְבַּדֵּי אָרֶץ
  english_pob_choice: all the honored ones of the earth
  chosen_spanish: a todos los honrados de la tierra
  alternatives_spanish:
  - a todos los nobles de la tierra
  - a todos los dignos de la tierra
  lexicon: HALOT
  rationale: '''Honrados'' reproduce la idea de personas de peso, respetadas o distinguidas. ''De la tierra'' mantiene el alcance amplio de אָרֶץ sin restringirlo a una sola región.'
theological_decisions:
- issue: Referencia del sufijo femenino en יְעָצָהּ
  english_pob_reading: The suffix is rendered generically as 'it,' referring to the announced judgment/oracle against Tyre.
  chosen_spanish_reading: El pronombre se vierte como 'lo', dejando implícito el antecedente del decreto/juicio anunciado.
  alternative_spanish_readings:
  - '''la'' si se entiende que remite a Tiro como ciudad femenina'
  - '''esto'' si se explicita el contenido del decreto'
  rationale: El hebreo permite un referente femenino implícito; el español puede neutralizarlo con 'lo' sin resolver prematuramente la ambigüedad. Así se preserva la tensión documentada por el POB inglés.
  doctrine_reference: Preservar ambigüedad textual cuando el original la permite; no forzar un antecedente único sin necesidad.
translation_notes:
  revision_awareness: La revisión inglesa más reciente cambió 'all glory' por 'all beauty' para reflejar mejor כָּל־צְבִי; por eso la base española usa 'belleza' en lugar de una equivalencia más abstracta como 'gloria'. También se conservó el paralelismo infinitivo-infinito del hebreo con 'para ... para ...'.
  spanish_consistency_notes:
  - Se usa 'Yahvé' conforme al estándar del proyecto para יהוה.
  - Se mantiene 'profanar' como equivalente fuerte de חלל, sin sustituirlo por un término litúrgico más estrecho.
  - '''Tierra'' traduce אָרֶץ con alcance amplio, coherente con el inglés POB.'
  - El tono es bíblico y formal, pero con sintaxis española natural.
