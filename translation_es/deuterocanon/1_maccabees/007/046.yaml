revisions:
- from: Y salieron de todas las aldeas de Judea de alrededor, y los rodearon[a]; y éstos se volvieron contra aquéllos, y todos cayeron a espada[b], y no quedó de ellos ni uno solo.
  to: Y salieron de todas las aldeas de Judea por todos lados, y los flanquearon[a]; y estos se volvieron contra aquellos[b], y todos cayeron a espada, y no quedó de ellos ni uno solo.
  rationale: La revisión corrige la naturalidad de κυκλόθεν con «por todos lados» y alinea ὑπερεφέρων con la decisión principal documentada por POB, usando «los flanquearon» en el texto y dejando «rodearon» como alternativa en nota. También se ajusta la nota sobre los pronombres para anclarla donde corresponde y se moderniza la ortografía de los demostrativos sin alterar el sentido.
