revisions:
- from: Él dio esplendor, belleza y gloria[a] a las fiestas, año tras año; cuando alababan su santo nombre, antes de la mañana resonaba el santuario.
  to: Él dio esplendor, belleza y gloria a las fiestas, año tras año; cuando alababan su santo nombre, antes del amanecer resonaba el atrio[a].
  rationale: Se reubica la nota al pie en la cláusula final, que es donde está la dificultad textual real. Se ajusta «antes de la mañana» a «antes del amanecer» por claridad idiomática en español. Se cambia «santuario» por «atrio» para alinearse con la revisión inglesa auditada más reciente («the court resounded»), manteniendo en la nota la alternativa griega y la incertidumbre del hebreo final.
