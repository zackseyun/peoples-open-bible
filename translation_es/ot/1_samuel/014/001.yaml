translation:
  language: es
  text: 'Ahora bien, un día Jonatán hijo de Saúl dijo al joven que llevaba sus armas[a]: «Ven, pasemos a la guarnición de los filisteos que está al otro lado». Pero no se lo dijo a su padre.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «escudero»; el hebreo describe a un portador de armas o equipo militar.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי הַיּוֹם
  english_pob_choice: Now one day
  chosen_spanish: Ahora bien, un día
  alternatives_spanish:
  - Un día
  - Y aconteció un día
  lexicon: HALOT
  rationale: La fórmula narrativa introducirá un nuevo episodio; «Ahora bien, un día» conserva el valor de transición y temporalidad sin sonar calcado ni arcaizante.
- source_word: הַנַּעַר
  english_pob_choice: the young man
  chosen_spanish: el joven
  alternatives_spanish:
  - el muchacho
  - el siervo
  lexicon: HALOT
  rationale: El contexto exige un varón apto para servicio militar, no un niño. «El joven» comunica bien la edad/condición sin imponer «siervo».
- source_word: נֹשֵׂא כֵלָיו
  english_pob_choice: who carried his armor
  chosen_spanish: que llevaba sus armas
  alternatives_spanish:
  - que llevaba su armadura
  - su escudero
  lexicon: HALOT
  rationale: El hebreo expresa la función de portar equipo bélico. «Llevaba sus armas» mantiene la descripción funcional; «escudero» sería más interpretativo y menos transparente.
- source_word: לְכָה
  english_pob_choice: Come
  chosen_spanish: Ven
  alternatives_spanish:
  - Vamos
  - Anda
  lexicon: HALOT
  rationale: Es una exhortación directa singular masculina. «Ven» reproduce con naturalidad el llamado inicial en español.
- source_word: וְנַעְבְּרָה
  english_pob_choice: let us cross over
  chosen_spanish: pasemos
  alternatives_spanish:
  - crucemos
  - pasemos al otro lado
  lexicon: HALOT
  rationale: El cohortativo invita a una acción conjunta. «Pasemos» es idiomático y conserva el sentido direccional de עבר sin añadir elementos no presentes.
- source_word: מַצַּב פְּלִשְׁתִּים
  english_pob_choice: the Philistine garrison
  chosen_spanish: la guarnición de los filisteos
  alternatives_spanish:
  - el puesto de los filisteos
  - la guarnición filistea
  lexicon: HALOT
  rationale: En contexto militar, מַצָּב designa una fuerza o puesto establecido. «Guarnición» es la equivalencia militar natural en español y conserva el peso del término.
- source_word: אֲשֶׁר מֵעֵבֶר הַלָּז
  english_pob_choice: that is on the other side
  chosen_spanish: que está del otro lado
  alternatives_spanish:
  - que está al otro lado
  - que está del otro lado de aquí
  lexicon: HALOT
  rationale: El hebreo usa un deíctico espacial que en español se expresa con naturalidad como «del otro lado». No se especifica «este paso» porque esa precisión no está en el verso mismo.
- source_word: וּלְאָבִיו לֹא הִגִּיד
  english_pob_choice: But he did not tell his father
  chosen_spanish: Pero no se lo dijo a su padre
  alternatives_spanish:
  - Y no le informó a su padre
  - Pero no avisó a su padre
  lexicon: HALOT
  rationale: הִגִּיד es «decir/tell/informar». «Se lo dijo» mantiene la economía del hebreo y el contraste narrativo marcado por el prefijo conjuntivo.
translation_notes:
  revision_awareness: El borrador sigue el texto hebreo directamente y se alinea con la revisión inglesa que eliminó la adición «of this pass», por lo que no se introduce ninguna referencia a «paso» o «desfiladero» en el español. La lectura mantiene el orden narrativo y la simplicidad del original.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el Tetragrámaton; aquí no aparece, por lo que no se introduce.
  - Se evita «SEÑOR» o formas litúrgicas no requeridas por el verso.
  - «Filisteos» se conserva como etnónimo estándar.
  - La partícula de contraste se vierte con «Pero» para reflejar el cambio narrativo de וּ/לְ־ sin sobretraducir.
