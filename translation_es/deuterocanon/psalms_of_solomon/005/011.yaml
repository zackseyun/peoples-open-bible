review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido general del griego: Dios alimenta a aves y peces, da lluvia a regiones áridas, hace brotar la hierba y así prepara sustento para todo ser viviente. Sin embargo, dos giros no preservan del todo bien la naturalidad ni la fuerza semántica documentada: «para el brotar de la hierba» suena poco idiomático en español, y «forraje» puede resultar demasiado técnico o restringido a ganado, mientras que χορτάσματα aquí apunta a sustento vegetal/provisión alimenticia en sentido amplio dentro de la imagen poética.'
  spanish_quality_summary: 'El texto es claro, pero algo rígido. «Al dar lluvia» funciona, aunque «cuando das lluvia» o «al dar lluvia» ambos serían posibles; no exige cambio. Los problemas principales son de fluidez y registro: «para el brotar de la hierba» conviene ajustarlo a «para que brote la hierba», y «forraje» conviene reemplazarlo por «pasto», que conserva mejor la imagen de vegetación provista en el desierto y suena más bíblico/natural en español eclesial general.'
  glossary_alignment: 'No hay conflictos con la terminología teológica global del proyecto. Las decisiones «aves», «alimentas», «desierto» y «todo ser viviente» están alineadas con el sentido fuente. La excepción recomendada es χορτάσματα: aunque el inglés auditado usa «fodder», en español «forraje» suena técnico; «pasto» preserva mejor la imagen concreta sin alejarse del sentido. No se requieren notas al pie.'
  issues:
  - severity: medium
    issue: «para el brotar de la hierba» es poco idiomático
    rationale: Aunque refleja literalmente la nominalización griega, en español suena trabado. «Para que brote la hierba» comunica la misma idea de finalidad/resultado de manera natural y fiel.
  - severity: medium
    issue: «forraje» suena demasiado técnico y estrecho
    rationale: χορτάσματα denota alimento vegetal/fodder, pero «forraje» en español moderno suele sentirse técnico o agropecuario. «Pasto» mantiene la imagen de provisión vegetal en el desierto y mejora la legibilidad eclesial.
  revised_spanish_text: Tú alimentas a las aves y a los peces, al dar lluvia a los lugares desolados para que brote la hierba, para preparar pasto en el desierto para todo ser viviente.
  revision_rationale: 'Se hizo una reparación menor para mejorar la fidelidad idiomática al español sin apartarse del griego ni de la auditoría inglesa: se cambió «para el brotar de la hierba» por «para que brote la hierba» y «forraje» por «pasto». No hacen falta notas.'
