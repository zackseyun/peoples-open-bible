translation:
  language: es
  text: Entonces Josué los envió, y ellos fueron al lugar de la emboscada[a] y se quedaron entre Betel y Hai, al oeste de Hai. Y Josué pasó aquella noche entre el pueblo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la emboscada». El hebreo puede referirse tanto a la fuerza emboscada como al sitio ocupado; aquí el contexto favorece el lugar que ocuparon.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלָחֵם
  english_pob_choice: sent them
  chosen_spanish: los envió
  alternatives_spanish:
  - los mandó
  - los despachó
  lexicon: HALOT
  rationale: El verbo שׁלח en este contexto narrativo expresa que Josué hizo que ellos fueran; en español, "los envió" reproduce de manera natural y fiel ese valor causativo, sin introducir un matiz más administrativo como "despachó".
- source_word: הַמַּאְרָב
  english_pob_choice: the ambush
  chosen_spanish: el lugar de la emboscada
  alternatives_spanish:
  - la emboscada
  - el puesto de emboscada
  lexicon: HALOT
  rationale: 'El hebreo puede referirse tanto a la fuerza emboscada como al sitio ocupado. Como el contexto describe que ellos van y se colocan allí, en español conviene explicitar la dimensión locativa: "el lugar de la emboscada".'
- source_word: וַיֵּשְׁבוּ
  english_pob_choice: stayed
  chosen_spanish: se quedaron
  alternatives_spanish:
  - se sentaron
  - permanecieron
  - tomaron posición
  lexicon: HALOT
  rationale: ישב puede significar sentarse, habitar o permanecer. En esta escena militar, "se quedaron" conserva la idea de permanecer en posición sin sobreinterpretar con una traducción más técnica como "tomaron posición".
- source_word: בֵּין בֵּית אֵל וּבֵין הָעַי
  english_pob_choice: between Bethel and Ai
  chosen_spanish: entre Betel y Hai
  alternatives_spanish:
  - entre Betel y Hai
  - entre Bet-el y Hai
  lexicon: HALOT
  rationale: Se mantienen los topónimos en forma reconocible para el lector hispano. "Betel" y "Hai" son transliteraciones habituales y claras; no se añade explicación adicional porque el texto solo da una ubicación geográfica.
- source_word: מִיָּם לָעָי
  english_pob_choice: west of Ai
  chosen_spanish: al oeste de Hai
  alternatives_spanish:
  - al occidente de Hai
  - hacia el oeste de Hai
  lexicon: HALOT
  rationale: Aunque יָם literalmente puede significar "mar", en idioma geográfico señala el oeste. "Al oeste de Hai" comunica con naturalidad ese valor direccional en español.
- source_word: וַיָּלֶן
  english_pob_choice: spent the night
  chosen_spanish: pasó la noche
  alternatives_spanish:
  - pernoctó
  - se quedó esa noche
  - durmió
  lexicon: HALOT
  rationale: לון expresa alojarse o pasar la noche. "Pasó la noche" es idiomático y fiel en español, y evita un registro demasiado arcaico como "pernoctó".
- source_word: בַּלַּיְלָה הַהוּא
  english_pob_choice: that night
  chosen_spanish: aquella noche
  alternatives_spanish:
  - esa noche
  - esa misma noche
  lexicon: HALOT
  rationale: La expresión temporal se traduce con naturalidad como "aquella noche", que conserva el valor referencial del hebreo sin añadir énfasis que el texto no exige.
- source_word: בְּתוֹךְ הָעָם
  english_pob_choice: among the people
  chosen_spanish: entre el pueblo
  alternatives_spanish:
  - en medio del pueblo
  - entre la gente
  lexicon: HALOT
  rationale: תוך con ב indica estar en medio de un grupo. "Entre el pueblo" conserva ese sentido colectivo y suena natural en español, manteniendo el contraste entre el movimiento de los enviados y la permanencia de Josué.
translation_notes:
  revision_awareness: Se siguió la revisión del audit trail que cambia la conjunción inglesa a una coordinativa simple ('And'), evitando un matiz adversativo no presente en el hebreo; por eso se traduce con «Y» al inicio de la última cláusula. Se mantuvo también la decisión contextual sobre הַמַּאְרָב como un término con posible doble referencia, resuelta en español con una formulación locativa.
  spanish_consistency_notes:
  - Se conserva la secuencia narrativa simple del hebreo con dos cláusulas coordinadas por «y».
  - Los topónimos se transliteran de forma estable como «Betel» y «Hai».
  - Se evita introducir términos militares más técnicos que el hebreo no obliga a usar.
  - La nota de pie mantiene la alternativa semántica documentada para מַאְרָב sin duplicar la ambigüedad en el cuerpo del texto.
