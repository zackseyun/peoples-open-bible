  source_alignment_summary: 'El borrador conserva correctamente los cuatro elementos del griego: ''escribió'' para ἔγραψεν, plural ''cartas'' para ἐπιστολάς, ''envió'' para ἀπέστειλεν, y el pronombre dativo ''a él'' para αὐτῷ. También preserva bien la nota sobre el plural. Sin embargo, la secuencia española ''las envió a él'' introduce un pronombre de objeto directo (''las'') no expresado en el griego y suena menos natural que una formulación que mantenga el referente implícito de manera idiomática.'
