revisions:
- from: Ahora había un joven de Belén de Judá[a], de la familia de Judá; y él era levita[b], y estaba morando allí.
  to: Y había un joven de Belén de Judá, del clan[a] de Judá; y era un levita, y estaba residiendo allí[b].
  rationale: Se ajusta 'familia' a 'clan' para seguir la decisión léxica auditada y preservar mejor la tensión del texto. Se cambia 'él era levita' por 'era un levita' para naturalidad y exactitud categorial en español. Se sustituye 'morando' por 'residiendo' para representar mejor גָר sin caer en una formulación demasiado técnica. También se reubica la nota [a] al término que realmente comenta.
