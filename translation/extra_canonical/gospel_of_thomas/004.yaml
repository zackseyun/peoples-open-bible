translation:
  text: Jesus said[1], "An old man in his days will not hesitate to ask a small child
    seven days old about the place of life, and he will live. For many who are first
    will become last[3][2], and they will become a single one."
  philosophy: optimal-equivalence
  drafter_model: gemini-3.1-pro-preview
  drafter_label: gemini_3_1_pro_thomas_redraft
  drafted_at: '2026-04-22T10:37:04Z'
  footnotes:
  - marker: '1'
    text: P.Oxy. 654 includes the phrase "and the last first" after "will become last,"
      which the Coptic omits.
    reason: textual_variant
  - marker: '2'
    text: The Coptic text creates a wordplay between ϫⲛⲁⲩ (jnau, "hesitate") and ϫⲛⲉ
      (jne, "ask"), which is lost in English.
    reason: register_note
  - marker: '3'
    text: The aphorism "many who are first will be last" appears in Matthew 19:30,
      Mark 10:31, and Luke 13:30, but Thomas omits the canonical second half ("and
      the last first") and appends its own conclusion ("and they will become a single
      one").
    reason: cross_reference
lexical_decisions:
- source_word: ϫⲛⲁⲩ
  chosen: hesitate
  rationale: Crum 775b defines ϫⲛⲁⲩ as 'hesitate' or 'delay'. The previous draft's
    'be ashamed' confuses this with ϣⲓⲡⲉ. The Greek fragment P.Oxy. 654 confirms this
    with ἀποκνήσει ('hesitate').
  lexicon: Crum 775b
  alternatives:
  - be ashamed
  - delay
  entry: ϫⲛⲁⲩ
- source_word: ϫⲛⲉ
  chosen: to ask
  rationale: The infinitive ⲉ-ϫⲛⲉ (from ϫⲛⲟⲩ, 'to ask'). The Coptic text creates a
    phonetic echo between ϫⲛⲁⲩ ('hesitate') and ϫⲛⲉ ('ask').
  lexicon: Crum 775a
  alternatives:
  - to question
  entry: ϫⲛⲟⲩ
- source_word: ⲟⲩⲁ ⲟⲩⲱⲧ
  chosen: a single one
  rationale: A key Thomasine idiom for spiritual unity, translating the Greek εἰς
    ἓν ('into one') found in P.Oxy. 654.
  lexicon: Crum 471a
  alternatives:
  - one
  - united
  entry: ⲟⲩⲁ
theological_decisions:
- issue: Translation of ⲟⲩⲁ ⲟⲩⲱⲧ
  chosen_reading: a single one
  rationale: Preserves the Thomasine emphasis on unity and integration, avoiding paraphrases
    like 'united' or 'one person' that lose the specific numerical and mystical weight
    of the Coptic phrase.
  alternatives_noted:
  - one
  - united
drafter_notes: The Coptic text diverges significantly from the Greek P.Oxy. 654 by
  omitting "and the last first." This omission shifts the focus entirely to the "first"
  becoming "last" and then becoming "a single one," rather than a simple reversal
  of status. The translation corrects a previous error that rendered ϫⲛⲁⲩ as "be ashamed"
  instead of "hesitate," restoring the accurate meaning and highlighting the Coptic
  wordplay with ϫⲛⲉ ("ask").
