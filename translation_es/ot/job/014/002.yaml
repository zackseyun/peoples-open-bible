translation:
  language: es
  text: Como una flor sale y se marchita[a]; huye como una sombra y no permanece.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "y es cortado". El verbo hebreo puede entenderse como marchitarse o fenecer, o como ser cortado, especialmente en la imagen de la flor.
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּצִיץ
  english_pob_choice: Like a flower
  chosen_spanish: Como una flor
  alternatives_spanish:
  - Como un florecimiento
  - Como una floración
  lexicon: HALOT
  rationale: צִיץ designa una flor o floración. "Flor" es la equivalencia natural y directa en español, y conserva bien la imagen poética de fragilidad y brevedad.
- source_word: יָצָא
  english_pob_choice: he comes forth
  chosen_spanish: sale
  alternatives_spanish:
  - sale afuera
  - sale a la luz
  - sale adelante
  lexicon: HALOT
  rationale: El verbo significa literalmente "salir". En este contexto, la imagen es la de aparecer o salir a escena; "sale" conserva la concreción del hebreo sin volverlo más interpretativo de lo necesario.
- source_word: וַיִּמָּל
  english_pob_choice: and withers
  chosen_spanish: y se marchita
  alternatives_spanish:
  - y se seca
  - y es cortado
  - y se desvanece
  lexicon: HALOT
  rationale: El hebreo admite la idea de marchitarse/fenecer o de ser cortado. Dado el símil de la flor, "se marchita" preserva la imagen natural y, al mismo tiempo, deja visible la tensión lexical que el inglés POB también anotó.
- source_word: וַיִּבְרַח
  english_pob_choice: he flees
  chosen_spanish: huye
  alternatives_spanish:
  - se escapa
  - se aleja rápidamente
  - corre fugazmente
  lexicon: HALOT
  rationale: ברח normalmente significa "huir". Mantener "huye" conserva la fuerza verbal y la sensación de transitoriedad sin suavizarla.
- source_word: כַּצֵּל
  english_pob_choice: like a shadow
  chosen_spanish: como la sombra
  alternatives_spanish:
  - como una sombra
  lexicon: HALOT
  rationale: La comparación con la sombra comunica en español la misma insustancialidad y fugacidad que en hebreo. La forma con artículo definido suena más natural y poética en este contexto.
- source_word: יַעֲמֹד
  english_pob_choice: does not remain
  chosen_spanish: no permanece
  alternatives_spanish:
  - no se queda
  - no se sostiene
  - no permanece en pie
  lexicon: HALOT
  rationale: עמד literalmente es "estar de pie" o "permanecer". Aquí expresa continuidad o duración; "no permanece" transmite ese sentido con claridad y mantiene el paralelo poético con la sombra.
translation_notes:
  revision_awareness: El texto inglés auditado fue revisado de "comes out" a "comes forth" para un registro más formal. La versión española sigue esa intención de registro elevado sin forzar un calco, y conserva la alternativa lexical documentada para וַיִּמָּל en nota.
  spanish_consistency_notes:
  - Se mantiene "como la sombra" y no "como una sombra" para conservar el ritmo poético natural del español.
  - '"Se marchita" reproduce la opción principal del inglés POB y deja abierta la alternativa "es cortado" mediante nota, sin borrar la tensión del hebreo.'
  - No se introduce terminología doctrinal porque el versículo es descriptivo y sapiencial.
