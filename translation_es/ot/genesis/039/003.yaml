- from: Su amo vio que Yahvé estaba con él[a], y que Yahvé hacía prosperar en su mano todo lo que él hacía.
  to: Su amo vio que Yahvé estaba con él, y que Yahvé hacía prosperar en su mano[a] todo lo que hacía.
  rationale: Se mantiene el sentido fuente y la terminología POB, pero se corrige la ubicación de la nota para que explique la frase correcta («en su mano») y se aligera la redacción eliminando el pronombre innecesario «él». No hace falta adjudicación adicional porque el ajuste es menor y no doctrinal.
