revisions:
- from: Así hicieron sus hijos por él, tal como les había mandado.
  to: Así hicieron sus hijos para él, tal como les había mandado.
  rationale: 'Se hace una reparación mínima para mejorar la precisión semántica e idiomática de לוֹ: ‘para él’ comunica mejor la idea de acción realizada en su favor y en cumplimiento de sus instrucciones. Se conserva el resto de la redacción porque es clara, natural y fiel al flujo narrativo del hebreo.'
  reviewer_model: gpt-5.4
