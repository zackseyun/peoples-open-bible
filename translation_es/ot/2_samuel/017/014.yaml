base_translation:
  language: en
  yaml_path: translation/ot/2_samuel/017/014.yaml
  text: Then Absalom and all the men of Israel said[a], “The counsel of Hushai the Archite is better than the counsel of Ahithophel.” For Yahweh had ordained to frustrate the good counsel of Ahithophel[b], so that Yahweh might bring disaster on Absalom.
  footnotes:
  - marker: a
    text: Or 'the LORD had commanded to frustrate.' The Hebrew verb often means 'command,' but here it describes the LORD's effective determination regarding Ahithophel's counsel.
    reason: lexical_alternative
  - marker: b
    text: '''Disaster'' renders a Hebrew term that can also mean ''evil'' or ''calamity''; here it refers to ruin or harm coming upon Absalom in judgment.'
    reason: lexical_alternative
