translation:
  language: es
  text: Y Jonatán salió a su encuentro con cuarenta mil hombres escogidos para la batalla[a], y llegó a Bet-sán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para la formación de combate»; el griego παρατάξιν se refiere más literalmente a estar desplegados en orden de batalla.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξῆλθεν
  english_pob_choice: went out
  chosen_spanish: salió
  alternatives_spanish:
  - partió
  - marchó
  lexicon: LSJ
  rationale: El griego expresa simplemente salida o movimiento hacia afuera. «Salió» conserva la narración directa sin añadir matiz militar que no está en el verbo mismo.
- source_word: εἰς ἀπάντησιν αὐτῷ
  english_pob_choice: to meet him
  chosen_spanish: a su encuentro
  alternatives_spanish:
  - para encontrarse con él
  - para ir al encuentro de él
  lexicon: LSJ
  rationale: La construcción idiomática indica ir al encuentro de alguien. «A su encuentro» es natural en español y mantiene la intención de aproximación relacional.
- source_word: ἐν τεσσεράκοντα χιλιάσιν
  english_pob_choice: with forty thousand
  chosen_spanish: con cuarenta mil
  alternatives_spanish:
  - entre cuarenta mil
  - en cuarenta mil
  lexicon: LSJ
  rationale: 'El valor asociativo/instrumental de ἐν con numeral se vierte de modo natural como compañía: Jonathan iba acompañado por cuarenta mil hombres.'
- source_word: ἀνδρῶν
  english_pob_choice: men
  chosen_spanish: hombres
  alternatives_spanish:
  - soldados
  lexicon: LSJ
  rationale: El griego dice literalmente «hombres». Se conserva ese sustantivo; el contexto bélico queda especificado por la frase siguiente.
- source_word: ἐπιλεγμέναις
  english_pob_choice: chosen
  chosen_spanish: escogidos
  alternatives_spanish:
  - seleccionados
  - elegidos
  lexicon: LSJ
  rationale: El participio implica hombres especialmente seleccionados. «Escogidos» es claro, natural y conserva el tono elevado del conjunto.
- source_word: εἰς παρατάξιν
  english_pob_choice: for battle
  chosen_spanish: para la batalla
  alternatives_spanish:
  - para formar en batalla
  - para la formación de combate
  - en orden de batalla
  lexicon: LSJ
  rationale: παράταξις puede referir la formación desplegada para el combate. «Para la batalla» comunica la finalidad militar con fluidez; la tensión con un sentido más literal se preserva en la nota.
- source_word: ἦλθεν
  english_pob_choice: he came
  chosen_spanish: llegó
  alternatives_spanish:
  - vino
  - arribó
  lexicon: LSJ
  rationale: Con complemento de destino, «llegó» resulta natural en español y refleja el resultado del movimiento sin cambiar el sujeto ni el sentido narrativo.
- source_word: εἰς Βεθσάν
  english_pob_choice: to Beth-shan
  chosen_spanish: a Bet-sán
  alternatives_spanish:
  - a Beth-shan
  - a Bet-Sán
  lexicon: LSJ
  rationale: Se translitera el topónimo al español con forma reconocible y legible. «Bet-sán» respeta la práctica del POB de transliterar nombres propios.
translation_notes:
  revision_awareness: La fuente griega y el audit trail en inglés coinciden sustancialmente; no hubo revisiones aplicadas y el pase más reciente indicó que no se necesitaban cambios.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como término por defecto en el proyecto, pero este versículo no contiene el nombre divino.
  - Se usa «Bet-sán» como transliteración española estándar y no una traducción del topónimo.
  - «Escogidos» y «para la batalla» equilibran naturalidad y fidelidad; la nota preserva la alternativa más literal de παράταξις.
