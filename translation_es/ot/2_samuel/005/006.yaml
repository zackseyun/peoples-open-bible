translation:
  language: es
  text: 'Y el rey y sus hombres fueron a Jerusalén, a los jebuseos, los habitantes de la tierra. Y dijeron[a] a David: «No entrarás aquí, porque aun los ciegos y los cojos te apartarán[b]», diciendo: «David no entrará aquí».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo tiene singular («y dijo»), pero en contexto funciona colectivamente respecto de los jebuseos; el español adopta el plural natural para el sujeto colectivo.
    reason: textual_variant
  - marker: b
    text: 'El hebreo es difícil aquí: la frase no significa con claridad «a menos que quites a los ciegos y a los cojos», sino una burla en la que incluso «los ciegos y los cojos» bastarían para apartarte.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלֶךְ
  english_pob_choice: went
  chosen_spanish: fueron
  alternatives_spanish:
  - fue
  - salió
  - marcharon
  lexicon: HALOT
  rationale: El hebreo narra el avance con un imperfecto consecutivo; en español, el plural «fueron» fluye naturalmente con «el rey y sus hombres» y conserva el movimiento narrativo sin añadir un matiz militar que no está explícito en el verbo.
- source_word: הַמֶּלֶךְ וַאֲנָשָׁיו
  english_pob_choice: the king and his men
  chosen_spanish: el rey y sus hombres
  alternatives_spanish:
  - el rey y sus soldados
  - el rey y su gente
  lexicon: HALOT
  rationale: «Sus hombres» reproduce de cerca el hebreo אֲנָשָׁיו y mantiene la amplitud del grupo sin restringirlo de manera innecesaria a «soldados».
- source_word: יְרוּשָׁלִַם
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  alternatives_spanish:
  - Jerusalem
  lexicon: Nombre propio estándar
  rationale: La forma española establecida es «Jerusalén». Aquí no hace falta transliteración adicional.
- source_word: אֶל הַיְבֻסִי
  english_pob_choice: to the Jebusites
  chosen_spanish: a los jebuseos
  alternatives_spanish:
  - al jebuseo
  - contra los jebuseos
  lexicon: HALOT
  rationale: Aunque la forma hebrea es singular/gentilic, el sentido colectivo en contexto pide el plural étnico en español. «A» conserva el valor básico de dirección de אֶל sin forzar un matiz hostil que luego aporta el relato.
- source_word: יוֹשֵׁב הָאָרֶץ
  english_pob_choice: the inhabitants of the land
  chosen_spanish: los habitantes de la tierra
  alternatives_spanish:
  - el habitante de la tierra
  - los que habitaban la tierra
  lexicon: HALOT
  rationale: La construcción participial singular tiene fuerza colectiva. «Los habitantes de la tierra» preserva ese sentido y suena natural en español.
- source_word: וַיֹּאמֶר
  english_pob_choice: they said
  chosen_spanish: dijeron
  alternatives_spanish:
  - dijo
  lexicon: HALOT
  rationale: El texto consonántico tiene singular, pero el discurso pertenece al conjunto de los jebuseos. Siguiendo el audit trail inglés, el plural español evita la rigidez de un singular colectivo poco idiomático.
- source_word: לֹא תָבֹוא הֵנָּה
  english_pob_choice: You will not come in here
  chosen_spanish: No entrarás aquí
  alternatives_spanish:
  - No vendrás aquí
  - No podrás entrar aquí
  lexicon: HALOT
  rationale: En el contexto de una ciudad fortificada, el sentido es una burla/prohibición de acceso. «Entrarás aquí» expresa mejor el movimiento hacia dentro que un simple «venirás».
- source_word: כִּי אִם
  english_pob_choice: for even / unless
  chosen_spanish: porque aun
  alternatives_spanish:
  - sino que
  - a menos que
  lexicon: HALOT
  rationale: 'La cláusula es textualmente difícil. La lectura adoptada sigue el ajuste del audit trail inglés: no una condición normal de «a menos que», sino la idea de que incluso los ciegos y los cojos bastarían para ahuyentarlo. «Porque aun» comunica ese giro explicativo/tauntivo sin sobreinterpretar.'
- source_word: הַעִוְרִים וְהַפִּסְחִים
  english_pob_choice: the blind and the lame
  chosen_spanish: los ciegos y los cojos
  alternatives_spanish:
  - los ciegos y los lisiados
  - los invidentes y los cojos
  lexicon: HALOT
  rationale: Son sustantivos/adjetivos sustantivados directos. «Ciegos» y «cojos» conserva la crudeza literal de la burla, tal como el POB inglés mantiene «the blind and the lame».
- source_word: לֵאמֹר ... לֹא יָבֹוא דָוִד הֵנָּה
  english_pob_choice: saying, “David will not come in here.”
  chosen_spanish: 'diciendo: «David no entrará aquí».'
  alternatives_spanish:
  - 'diciendo: «David no vendrá aquí»'
  - 'es decir: «David no entrará aquí»'
  lexicon: HALOT
  rationale: La repetición del dicho se conserva como discurso citado. «No entrará aquí» mantiene la formulación del taunt y refleja mejor el valor de acceso/ingreso que un «vendrá» más genérico.
theological_decisions:
- issue: Preservación de la burla con discapacidad sin suavizarla
  english_pob_reading: Retain 'the blind and the lame' as the literal wording of the Jebusites' mockery without softening.
  chosen_spanish_reading: Mantener «los ciegos y los cojos» como burla literal de los jebuseos, sin suavizarla.
  alternative_spanish_readings:
  - los más débiles
  - los impedidos
  rationale: El versículo reporta habla hostil; la transparencia al hebreo exige conservar los términos concretos en la voz del agresor. Cualquier eufemización borraría la dureza del texto y la ironía narrativa.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Valor colectivo del singular hebreo en el discurso
  english_pob_reading: The singular likely functions collectively for the Jebusite inhabitants.
  chosen_spanish_reading: 'Tratar el singular hebreo como colectivo en español, con verbo plural: «dijeron».'
  alternative_spanish_readings:
  - dijo
  - decía
  rationale: La forma plural es la solución más natural en español y sigue la decisión auditada en inglés de reflejar el sujeto colectivo implícito en el contexto.
  doctrine_reference: Hebrew narrative syntax; source audit trail
translation_notes:
  revision_awareness: 'He revisado la cláusula difícil de כִּי אִם / הֱסִירְךָ para seguir la corrección del audit trail inglés: la línea expresa una burla sobre la supuesta seguridad de la ciudad, no una simple condición de exclusión. También mantuve el sujeto colectivo en plural para evitar un calco rígido del singular hebreo.'
  spanish_consistency_notes:
  - Usé «Jehusoeos/jebuseos» en minúscula por tratarse de etnónimo en discurso corriente.
  - Mantuve «ciegos y cojos» literal porque el texto reporta una burla; no lo convertí en metáfora general.
  - Elegí «entrar aquí» para preservar el valor de acceso/ingreso al recinto fortificado.
  - No empleé «SEÑOR» ni otros equivalentes reverenciales porque no aparece el Tetragrámaton en este versículo.
