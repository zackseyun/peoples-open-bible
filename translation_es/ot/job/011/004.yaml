translation:
  language: es
  text: 'Porque dices[a]: «Mi enseñanza es pura, y soy limpio a tus ojos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mi instrucción» o «mi discurso». El sustantivo hebreo puede referirse a lo que uno recibe o presenta como enseñanza.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֹּאמֶר
  english_pob_choice: you say
  chosen_spanish: dices
  alternatives_spanish:
  - dijiste
  lexicon: HALOT
  rationale: El imperfecto narrativo en discurso poético funciona como una acusación actualizada; en español, el presente «dices» refleja mejor esa fuerza que un pasado simple.
- source_word: זַךְ
  english_pob_choice: pure
  chosen_spanish: pura
  alternatives_spanish:
  - limpia
  - inocente
  - clara
  lexicon: HALOT
  rationale: «Pura» conserva el sentido de pureza/limpieza y mantiene una distinción expresiva respecto de «limpio» en la segunda cláusula.
- source_word: לִקְחִי
  english_pob_choice: my teaching
  chosen_spanish: mi enseñanza
  alternatives_spanish:
  - mi instrucción
  - mi discurso
  - mi doctrina
  lexicon: HALOT
  rationale: לקח puede referirse a algo recibido o presentado como enseñanza/instrucción. «Enseñanza» es natural en español y conserva la idea de contenido doctrinal o instructivo sin reducirlo a mera habla.
- source_word: וּבַר
  english_pob_choice: clean
  chosen_spanish: limpio
  alternatives_spanish:
  - puro
  - sin mancha
  - inocente
  lexicon: HALOT
  rationale: «Limpio» mantiene la imagen de pureza moral/ritual y evita repetir exactamente el mismo adjetivo que en la primera cola, respetando la leve variación del hebreo.
- source_word: הָיִיתִי
  english_pob_choice: I am
  chosen_spanish: soy
  alternatives_spanish:
  - he sido
  - era
  lexicon: HALOT
  rationale: Aunque formalmente es perfecto, en esta cita reportada funciona como una afirmación de estado presente; «soy» es la forma más natural en español para esa actualización retórica.
- source_word: בְעֵינֶיךָ
  english_pob_choice: in your eyes
  chosen_spanish: ante tus ojos
  alternatives_spanish:
  - en tus ojos
  - a tus ojos
  - a tu vista
  lexicon: HALOT
  rationale: «Ante tus ojos» reproduce el valor idiomático de evaluación «delante de» alguien, en un español más natural que un calco literal, y conserva la imagen relacional.
theological_decisions:
- issue: Referencia del posesivo de segunda persona en «tus ojos»
  english_pob_reading: Addressed to God
  chosen_spanish_reading: Dirigido a Dios
  alternative_spanish_readings:
  - Dirigido al interlocutor de la disputa
  rationale: En el contexto de la réplica de Zofar, la acusación resume la supuesta दावा de Job ante Dios. Mantener «tus» sin explicitar más respeta el texto y deja visible el referir-teológicamente a Dios.
  doctrine_reference: Lectura contextual del discurso de Zofar en Job 11
translation_notes:
  revision_awareness: 'El texto inglés POB mantiene dos matices léxicos distintos: זך = pure y בר = clean. La versión española conserva esa distinción con «pura» / «limpio» y traslada el valor idiomático de בְעֵינֶיךָ como «ante tus ojos».'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» solo donde aparezca el nombre divino explícito; aquí no aparece.
  - Se evitó «Cristo» por no corresponder al texto.
  - La puntuación con comillas angulares refleja el registro bíblico en español y separa claramente la cita reportada.
