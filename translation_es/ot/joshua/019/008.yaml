translation:
  language: es
  text: y todas las aldeas que estaban alrededor de estas ciudades[a], hasta Baalat-beer, Ramat-negeb. Esta fue la heredad de la tribu de los hijos de Simeón, según sus clanes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O posiblemente: «hasta Baalat-beer, es decir, Ramat-negeb», tomando el segundo nombre como una identificación en aposición del primero.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְכָל
  english_pob_choice: along with all
  chosen_spanish: y todos
  alternatives_spanish:
  - y además todos
  - junto con todos
  lexicon: HALOT
  rationale: El hebreo añade esta frase de manera acumulativa a la lista anterior; en español, «y todos» conserva la suma sin sobrecargar la frase. La idea de adición queda apoyada por el contexto del reparto territorial.
- source_word: הַחֲצֵרִים
  english_pob_choice: the villages
  chosen_spanish: los aldeorrios
  alternatives_spanish:
  - las aldeas
  - los poblados
  - las villas
  lexicon: HALOT
  rationale: En listas territoriales, חֲצֵרִים puede referirse a asentamientos dependientes o poblaciones sin murallas. «Aldeorrios» es una opción tentativa para reflejar ese matiz de poblado rural pequeño, pero en español estándar también podría renderizarse como «aldeas» o «poblados».
- source_word: אֲשֶׁר סְבִיבוֹת הֶעָרִים הָאֵלֶּה
  english_pob_choice: that were around these cities
  chosen_spanish: que estaban alrededor de estas ciudades
  alternatives_spanish:
  - que rodeaban estas ciudades
  - que estaban en torno a estas ciudades
  lexicon: HALOT
  rationale: La cláusula relativa describe ubicación, no acción. «Estaban alrededor de» sigue de cerca el sentido espacial del hebreo y mantiene claro el referente proximal de «estas ciudades».
- source_word: עַד
  english_pob_choice: as far as
  chosen_spanish: hasta
  alternatives_spanish:
  - así como hasta
  - a la altura de
  lexicon: HALOT
  rationale: En una fórmula de extensión o límite geográfico, «hasta» comunica bien el alcance territorial del listado.
- source_word: בַּעֲלַת בְּאֵר
  english_pob_choice: Baalath-beer
  chosen_spanish: Baalat-beer
  alternatives_spanish:
  - Baalat-Beer
  - Baalath-beer
  lexicon: HALOT
  rationale: Se trata de un topónimo compuesto que se translitera. «Baalat-beer» conserva la forma del hebreo con una adaptación mínima al español.
- source_word: רָאמַת נֶגֶב
  english_pob_choice: Ramath-negeb
  chosen_spanish: Ramat-negeb
  alternatives_spanish:
  - Ramat del Négueb
  - Ramat-negueb
  lexicon: HALOT
  rationale: El segundo nombre puede ser un topónimo en aposición o una identificación alternativa del primero. Mantener la transliteración evita decidir prematuramente entre «Ramat del Négueb» y una segunda designación independiente.
- source_word: זֹאת
  english_pob_choice: This was
  chosen_spanish: Esta fue
  alternatives_spanish:
  - Esto fue
  - Ésta fue
  lexicon: HALOT
  rationale: El demostrativo hebreo introduce un resumen retrospectivo del reparto. En español, el verbo copulativo hace natural la formulación «Esta fue».
- source_word: נַחֲלַת
  english_pob_choice: the inheritance
  chosen_spanish: la heredad
  alternatives_spanish:
  - la herencia
  - la posesión
  lexicon: HALOT
  rationale: En Josué, נַחֲלָה designa la porción territorial asignada por herencia. «Heredad» conserva ese valor técnico-covenantal en un registro bíblico natural para español.
- source_word: מַטֵּה
  english_pob_choice: the tribe of
  chosen_spanish: la tribu de
  alternatives_spanish:
  - el clan de
  - la rama de
  lexicon: HALOT
  rationale: En contexto de distribución tribal, מַטֶּה se refiere a una tribu como unidad socio-política; «la tribu de» expresa adecuadamente ese sentido.
- source_word: בְנֵי שִׁמְעוֹן
  english_pob_choice: the sons of Simeon
  chosen_spanish: los hijos de Simeón
  alternatives_spanish:
  - los descendientes de Simeón
  - los simeonitas
  lexicon: HALOT
  rationale: El hebreo usa una formulación genealógica literal. «Los hijos de Simeón» respeta esa estructura y es transparente en español.
- source_word: לְמִשְׁפְּחֹתָם
  english_pob_choice: according to their clans
  chosen_spanish: según sus familias
  alternatives_spanish:
  - por sus familias
  - conforme a sus clanes
  lexicon: HALOT
  rationale: En el reparto tribal, מִשְׁפָּחוֹת se refiere a agrupaciones familiares amplias dentro de la tribu. «Según sus familias» mantiene la equivalencia natural en español; «clanes» también sería posible si se quisiera destacar el valor técnico.
theological_decisions:
- issue: Naturaleza de la lista territorial como heredad asignada
  english_pob_reading: This was the inheritance of the tribe of the sons of Simeon according to their clans.
  chosen_spanish_reading: Esta fue la heredad de la tribu de los hijos de Simeón, según sus familias.
  alternative_spanish_readings:
  - Esta fue la herencia de la tribu de los hijos de Simeón, según sus familias.
  - Este fue el territorio asignado a la tribu de los hijos de Simeón, según sus familias.
  rationale: El versículo cierra una delimitación territorial. «Heredad» conserva el sentido bíblico de porción asignada por Dios mediante reparto, sin reducirlo solo a propiedad privada ni ampliar innecesariamente a «territorio asignado».
  doctrine_reference: Josué 19; distribución de la tierra por sorteo y heredad tribal
translation_notes:
  revision_awareness: El inglés POB mantiene una lectura topográfica simple y conserva la ambigüedad de Baalath-beer / Ramath-negeb mediante una nota alternativa. No hubo revisiones posteriores en el expediente; por eso la versión española sigue el mismo nivel de cautela, preservando la lista geográfica y la conclusión de heredad tribal sin añadir identificación extra.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando aparezca el nombre divino, pero este versículo no lo contiene.
  - «Heredad» se usa de manera consistente para נַחֲלָה en contexto de reparto territorial.
  - Se conserva la transliteración de los topónimos para no resolver una ambigüedad toponímica que el audit trail deja abierta.
