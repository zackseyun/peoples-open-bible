translation:
  language: es
  text: Y aconteció en los días de Joacim, hijo de Josías, rey de Judá, hasta el fin del undécimo año de Sedequías, hijo de Josías, rey de Judá, hasta el exilio[a] de Jerusalén en el quinto mes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «deportación»; es decir, el traslado forzado de la población de Jerusalén cuando la ciudad cayó.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And it came
  chosen_spanish: Y aconteció
  alternatives_spanish:
  - Y fue
  - Y ocurrió
  lexicon: HALOT
  rationale: El hebreo וַיְהִי en fórmulas narrativas introduce o retoma un marco temporal; en español, «aconteció» conserva el valor eventivo y suena natural en un registro bíblico digno, sin caer en un calco pesado.
- source_word: בִּימֵי
  english_pob_choice: in the days of
  chosen_spanish: en los días de
  alternatives_spanish:
  - durante el reinado de
  lexicon: HALOT
  rationale: La expresión idiomática hebrea se mantiene de forma directa. «Durante el reinado de» sería más interpretativo y desplaza la formulación tradicional del marco cronológico.
- source_word: יְהוֹיָקִים
  english_pob_choice: Jehoiakim
  chosen_spanish: Joacim
  alternatives_spanish:
  - Joaquim
  lexicon: Convención onomástica bíblica en español
  rationale: Se usa la forma española bíblica habitual para el nombre propio, inteligible para lectores en español y coherente con el texto bíblico tradicional.
- source_word: בֶּן יֹאשִׁיָּהוּ
  english_pob_choice: son of Josiah
  chosen_spanish: hijo de Josías
  alternatives_spanish:
  - descendiente de Josías
  lexicon: HALOT
  rationale: El hebreo expresa filiación directa; «hijo de» es la correspondencia natural y precisa.
- source_word: מֶלֶךְ יְהוּדָה
  english_pob_choice: king of Judah
  chosen_spanish: rey de Judá
  alternatives_spanish:
  - monarca de Judá
  lexicon: HALOT
  rationale: Título real estándar y directo; «rey de Judá» conserva el paralelismo del hebreo sin añadir matiz innecesario.
- source_word: עַד תֹּם
  english_pob_choice: until the end of
  chosen_spanish: hasta el fin de
  alternatives_spanish:
  - hasta el término de
  - hasta el final de
  lexicon: HALOT
  rationale: תֹּם marca el punto terminal de un período; «hasta el fin de» es natural en español y suficientemente fiel. «Hasta el término de» suena más técnico sin aportar claridad adicional.
- source_word: עַשְׁתֵּי עֶשְׂרֵה שָׁנָה
  english_pob_choice: the eleventh year
  chosen_spanish: el undécimo año
  alternatives_spanish:
  - la undécima año
  lexicon: HALOT
  rationale: 'En datación real, el español idiomático usa el ordinal con «año» en singular: «el undécimo año». Mantiene la estructura cronológica del original.'
- source_word: לְצִדְקִיָּהוּ
  english_pob_choice: of Zedekiah
  chosen_spanish: de Sedequías
  alternatives_spanish:
  - de Zedecías
  lexicon: HALOT
  rationale: Se adopta la forma española común del nombre. El valor del prefijo en la fórmula de cómputo temporal se refleja de modo natural con «de».
- source_word: גְּלוֹת
  english_pob_choice: the exile
  chosen_spanish: el destierro
  alternatives_spanish:
  - la deportación
  - el exilio
  lexicon: HALOT
  rationale: El sustantivo denota la deportación/expulsión del pueblo; «destierro» comunica bien ese evento histórico en español. «Exilio» también es posible, pero «destierro» conserva mejor la idea del desplazamiento forzado.
- source_word: יְרוּשָׁלִַם
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  alternatives_spanish:
  - Yerushalén
  lexicon: Convención geográfica bíblica en español
  rationale: Nombre propio bíblico estándar en español.
- source_word: בַּחֹדֶשׁ הַחֲמִישִׁי
  english_pob_choice: in the fifth month
  chosen_spanish: en el quinto mes
  alternatives_spanish:
  - durante el quinto mes
  lexicon: HALOT
  rationale: La datación del mes se expresa de forma directa y natural en español, conservando el valor temporal del hebreo.
theological_decisions:
- issue: Marco cronológico profético y valor histórico de la fórmula
  english_pob_reading: A temporal frame extending from Jehoiakim to the exile of Jerusalem in the fifth month.
  chosen_spanish_reading: Un marco temporal que va desde Joacim hasta el destierro de Jerusalén en el quinto mes.
  alternative_spanish_readings:
  - Un marco temporal durante el reinado de Joacim hasta la deportación de Jerusalén en el quinto mes.
  - Un período que continúa hasta el exilio de Jerusalén en el quinto mes.
  rationale: 'No hay afirmación doctrinal controvertida en el verso, pero sí una precisión histórica: el texto sitúa la actividad profética dentro de un período definido por reinados y por la caída de Jerusalén. «Destierro» mantiene el evento histórico sin suavizarlo, y evita una paráfrasis excesiva.'
  doctrine_reference: Historicidad bíblica; cronología profética del libro de Jeremías
translation_notes:
  revision_awareness: Tomé en cuenta la revisión inglesa más reciente, que prefirió «came» para וַיְהִי y «end» para תֹּם. En español, «aconteció» y «hasta el fin de» reflejan mejor esa misma decisión revisada que una forma más interpretativa. También mantuve la datación regnal explícita y no introduje glosas que no estén respaldadas por el hebreo o por la nota cultural inglesa.
  spanish_consistency_notes:
  - 'Usé nombres propios bíblicos en formas españolas reconocibles: Joacim, Josías, Sedequías, Judá, Jerusalén.'
  - Mantuve la secuencia temporal repetida con «hasta» para reproducir el alcance del hebreo.
  - Elegí «destierro» como término principal y dejé «exilio» como alternativa anotada para preservar la tensión léxica.
  - No se requirieron decisiones teológicas doctrinales adicionales más allá del valor histórico-cronológico del versículo.
