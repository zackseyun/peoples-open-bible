    reason: lexical_alternative
  revision_rationale: 'Se hacen reparaciones menores para mejorar fidelidad y español natural: se actualiza «éste» a «este»; se cambia «hirió» por «derribó» para reflejar mejor el sentido de bajas en combate; y se ajusta «diez mil» a «diez miles» para conservar el paralelismo formal del hebreo y evitar una elipsis extraña en español. Se mantienen la estructura, las notas y la tensión narrativa de «el rey de la tierra».'
