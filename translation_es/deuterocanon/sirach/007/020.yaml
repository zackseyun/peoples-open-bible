translation:
  language: es
  text: No maltrates a un siervo fiel[a], ni a un jornalero que se entrega por completo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo dice literalmente «trabajador de verdad»; el griego tiene «un siervo de casa que trabaja en verdad». Ambas lecturas convergen en la idea de alguien que trabaja con fidelidad u honestidad.
    reason: lexical_alternative
  - marker: b
    text: La segunda frase hebrea es difícil. El griego paralelo dice literalmente «ni a un jornalero que da su vida», lo que respalda aquí la idea de alguien que se entrega por completo en su trabajo.
    reason: alternative_reading
lexical_decisions:
- source_word: אַל תָּרֵעַ
  english_pob_choice: Do not mistreat
  chosen_spanish: No maltrates
  alternatives_spanish:
  - No hagas mal a
  - No dañes
  - No hagas injusticia a
  lexicon: HALOT
  rationale: 'El hebreo usa רעע en sentido causativo: hacer daño o tratar mal. «Maltrates» comunica con naturalidad ese abuso interpersonal y conserva la fuerza prohibitiva mejor que una versión más literal pero menos idiomática.'
- source_word: עוֹבֵד אֱמֶת
  english_pob_choice: faithful servant
  chosen_spanish: siervo fiel
  alternatives_spanish:
  - trabajador fiel
  - siervo que trabaja en verdad
  - sirviente honesto
  lexicon: HALOT
  rationale: La base hebrea es literalmente «trabajador de verdad», y el paralelo griego οἰκέτην ἐργαζόμενον ἐν ἀληθείᾳ apunta a alguien que trabaja con fidelidad u honestidad. «Siervo fiel» mantiene la idea de servicio/trabajo y preserva el valor ético de אֱמֶת sin sonar rígido en español.
- source_word: וְכֵן
  english_pob_choice: nor
  chosen_spanish: ni
  alternatives_spanish:
  - y tampoco
  - ni tampoco
  - y no
  lexicon: HALOT
  rationale: La conjunción introduce una segunda prohibición paralela. En español, «ni» después de «No maltrates» expresa con claridad la coordinación negativa y conserva el movimiento del hebreo.
- source_word: שׁוֹמֵר
  english_pob_choice: a hired laborer
  chosen_spanish: un jornalero
  alternatives_spanish:
  - un asalariado
  - un obrero contratado
  - un hireling
  lexicon: HALOT
  rationale: Aunque el hebreo aislado puede sugerir «guardador» o «vigilante», el paralelo griego μίσθιον confirma el sentido de trabajador pagado. «Jornalero» es una equivalencia natural en español para un trabajador por salario diario y encaja bien con el contexto laboral.
- source_word: נוֹחֵן נַפְשׁוֹ
  english_pob_choice: who gives himself
  chosen_spanish: que entrega su vida
  alternatives_spanish:
  - que se entrega por completo
  - que da su alma
  - que se esfuerza hasta el límite
  lexicon: HALOT
  rationale: El hebreo es difícil y el griego διδόντα ψυχὴν αὐτοῦ intensifica la imagen de entregar la propia vida/alma. «Entrega su vida» conserva esa fuerza y sigue siendo comprensible en español como imagen de esfuerzo y dedicación, sin reducir demasiado el alcance del texto.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión inglesa más reciente, que prefirió «faithful servant» y «gives himself» por naturalidad. En español se conservó la tensión entre el hebreo más literal («trabajador de verdad») y el griego paralelo, pero se optó por una formulación fluida y fiel al sentido: «siervo fiel» y «entrega su vida».'
  spanish_consistency_notes:
  - Se mantuvo «siervo» en lugar de «servidor» o «trabajador» para conservar la cercanía con la decisión inglesa revisada y con el término griego οἰκέτης.
  - «Jornalero» refleja mejor el matiz de un trabajador remunerado que «siervo» en la segunda cláusula.
  - Se evitó domesticar la imagen de נַפְשׁוֹ con una paráfrasis demasiado suave; «entrega su vida» preserva la intensidad sin sonar forzado.
