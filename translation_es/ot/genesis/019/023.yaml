translation:
  language: es
  text: El sol había salido sobre la región[a][b], y Lot había llegado a Zoar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo «tierra» también es posible aquí para «región».
    reason: lexical_alternative
  - marker: b
    text: O «El sol salió sobre la región, y Lot llegó a Zoar». Los verbos hebreos en perfecto también pueden traducirse con pretérito simple en español.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַשֶּׁמֶשׁ
  english_pob_choice: the sun
  chosen_spanish: el sol
  alternatives_spanish:
  - sol
  lexicon: HALOT
  rationale: El hebreo lleva artículo definido; en español la forma natural y fiel es «el sol». Se conserva el referente astronómico directo sin necesidad de glosa.
- source_word: יָצָא
  english_pob_choice: had risen
  chosen_spanish: había salido
  alternatives_spanish:
  - había salido afuera
  - había surgido
  - salió
  lexicon: HALOT
  rationale: El verbo hebreo literalmente significa «salir», y con «el sol» la imagen idiomática de amanecer se expresa bien en español con «había salido». Mantiene la metáfora del original sin volverla demasiado interpretativa.
- source_word: עַל הָאָרֶץ
  english_pob_choice: over the land
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - sobre la tierra
  - sobre el país
  - sobre la región
  lexicon: HALOT
  rationale: אֶרֶץ puede ser «tierra» o «tierra/país/territorio» según contexto. En una escena narrativa local, «sobre la tierra» preserva la amplitud semántica posible del hebreo; «tierra» también puede sugerir el suelo o el mundo, por eso se anota la alternativa contextual.
- source_word: וְלוֹט
  english_pob_choice: and Lot
  chosen_spanish: y Lot
  alternatives_spanish:
  - y Lot
  lexicon: HALOT
  rationale: Conjunción simple más nombre propio; no requiere adaptación adicional.
- source_word: בָּא
  english_pob_choice: had come
  chosen_spanish: había llegado
  alternatives_spanish:
  - había venido
  - había entrado
  - llegó
  lexicon: HALOT
  rationale: בוא puede significar «venir/llegar/entrar». En español, «había llegado» comunica con naturalidad el movimiento concluido hacia Zoar y mantiene la relación temporal de acciones completas.
- source_word: צֹעֲרָה
  english_pob_choice: to Zoar
  chosen_spanish: a Zoar
  alternatives_spanish:
  - a Zoar
  - hasta Zoar
  lexicon: HALOT
  rationale: El nombre propio con he direccional indica movimiento hacia el lugar. En español, la preposición «a» expresa correctamente esa dirección sin sobrecargar el verso.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el hebreo y el audit trail inglés: se mantiene la secuencia de perfectos con pluscuamperfecto en español para reflejar anterioridad relativa, y se conserva la imagen idiomática del amanecer con «había salido». No se detectaron revisiones textuales necesarias en el material de referencia.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino solo cuando corresponde; este versículo no lo contiene.
  - «Zoar» se mantiene como nombre propio transliterado, sin artículo.
  - Se evita «SEÑOR» o una paráfrasis explicativa porque el verso no presenta un término teológico que lo exija.
