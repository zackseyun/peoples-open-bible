translation:
  language: es
  text: Se vistió de cilicio en lugar de vestidura espléndida[a], y de una cuerda alrededor de su cabeza en lugar de una guirnalda[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Vestidura espléndida» también podría traducirse como «vestidura hermosa» o «atuendo fino».
    reason: lexical_alternative
  - marker: b
    text: O «corona» para «guirnalda».
    reason: lexical_alternative
lexical_decisions:
- source_word: περιέζωσατο
  english_pob_choice: wrapped herself
  chosen_spanish: se ciñó
  alternatives_spanish:
  - se envolvió
  - se puso
  lexicon: BDAG
  rationale: El verbo griego es medio y expresa que la persona se viste o se ajusta algo sobre sí misma. En español, «se ciñó» comunica esa acción reflexiva con naturalidad y mantiene el matiz de vestirse en señal de lamento o duelo.
- source_word: σάκκον
  english_pob_choice: sackcloth
  chosen_spanish: cilicio
  alternatives_spanish:
  - saco de tela burda
  - tela áspera de duelo
  lexicon: BDAG
  rationale: El término denota la prenda de duelo tradicional. «Cilicio» es el equivalente bíblico y eclesial más reconocido en español para esta prenda de aflicción, aunque puede tener asociaciones posteriores; se conserva porque la referencia es precisamente al atuendo penitencial o de luto.
- source_word: ἐνδύματος εὐπρεπείας
  english_pob_choice: splendid clothing
  chosen_spanish: vestidura espléndida
  alternatives_spanish:
  - vestidura hermosa
  - atuendo fino
  - ropa elegante
  lexicon: BDAG
  rationale: La frase contrasta el luto con una prenda vistosa u honorífica. «Vestidura espléndida» reproduce bien el valor adjetival de εὐπρεπείας sin rebajar la dignidad del contraste, y evita una paráfrasis demasiado libre.
- source_word: σχοινίον
  english_pob_choice: cord
  chosen_spanish: una cuerda
  alternatives_spanish:
  - un cordón
  - una soga
  lexicon: BDAG
  rationale: El objeto es una cuerda o cordón simple usado como adorno o sujeción. «Cuerda» conserva la materialidad del término y es suficientemente natural en español; «cordón» podría suavizar demasiado la imagen, y «soga» sería excesiva.
- source_word: στεφάνου
  english_pob_choice: wreath
  chosen_spanish: una corona
  alternatives_spanish:
  - una guirnalda
  - un wreath
  lexicon: BDAG
  rationale: Aunque el inglés optó por «wreath» para evitar un exceso de connotación real, en español «corona» es la forma más natural y comprensible para el ornamento de la cabeza. Aquí el contraste con la cuerda y el contexto de adorno permiten usar «corona» sin forzar un sentido monárquico.
translation_notes:
  revision_awareness: 'La versión inglesa fue ajustada para reflejar de forma más natural el complemento directo del verbo («wrapped herself in sackcloth»). La propuesta española conserva ese flujo natural mediante «se ciñó de cilicio», manteniendo todos los elementos del griego: acción reflexiva, saco/cilicio, contraste de vestidura honorable y el ornamento de la cabeza.'
  spanish_consistency_notes:
  - He mantenido el paralelismo de los dos contrastes («en lugar de ..., y ... en lugar de ...») como en el griego.
  - 'He preferido términos bíblicos reconocibles en español cuando no distorsionan el sentido: «cilicio» y «corona».'
  - No he introducido lenguaje más interpretativo que el requerido por el contraste textual; la frase sigue siendo imagética y directa.
