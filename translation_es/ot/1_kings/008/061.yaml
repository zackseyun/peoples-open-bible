- from: Que, por tanto, el corazón de ustedes sea enteramente de Yahvé, nuestro Dios[a], para andar en sus estatutos y guardar sus mandamientos[b], como en este día.
  to: Que, por tanto, el corazón de ustedes esté enteramente con Yahvé nuestro Dios[a], para andar en sus estatutos y guardar sus mandamientos, como en este día[b].
  rationale: Se revisa la preposición relacional para reflejar fielmente עִם («con») y se ajusta la sintaxis a un español natural con «estar ... con». También se corrige la nota alternativa para que «sin división» modifique apropiadamente al corazón y no produzca una frase confusa. Se mueve la nota [b] al sintagma pertinente «como en este día», donde realmente ancla la explicación del hebraísmo.
