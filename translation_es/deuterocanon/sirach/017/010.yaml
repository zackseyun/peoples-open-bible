- from: Añadió a ellos conocimiento[a], y les legó la ley de la vida.
  to: Les añadió conocimiento, y les legó la ley de la vida[a].
  rationale: Se corrige un calco poco natural del dativo griego («a ellos») por la forma idiomática española «les», y se reubica la nota al sintagma que realmente comenta, «la ley de la vida». No se altera la decisión léxica principal ni la nota alternativa documentada.
