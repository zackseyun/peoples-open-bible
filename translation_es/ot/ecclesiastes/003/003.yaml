translation:
  language: es
  text: un tiempo para matar[a], y un tiempo para sanar; un tiempo para derribar[b], y un tiempo para edificar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una temporada» para cada aparición de «un tiempo».
    reason: lexical_alternative
  - marker: b
    text: O «un tiempo para echar abajo, y un tiempo para construir».
    reason: lexical_alternative
lexical_decisions:
- source_word: עֵת
  english_pob_choice: a time
  chosen_spanish: un tiempo
  alternatives_spanish:
  - una temporada
  - una ocasión
  - un momento
  lexicon: HALOT
  rationale: עֵת designa tiempo, ocasión o momento señalado. «Un tiempo» conserva el paralelismo repetido del poema y suena natural en español; «temporada» o «ocasión» introducen matices menos directos para este contexto.
- source_word: לַהֲרוֹג
  english_pob_choice: to kill
  chosen_spanish: matar
  alternatives_spanish:
  - dar muerte
  - darle muerte
  - asesinar
  lexicon: HALOT
  rationale: הרג significa de manera general «matar» o «dar muerte». «Matar» es la equivalencia más directa y sobria en español. «Asesinar» sería demasiado específico y moralmente cargado; «dar muerte» es posible pero más perifrástico.
- source_word: לִרְפּוֹא
  english_pob_choice: to heal
  chosen_spanish: sanar
  alternatives_spanish:
  - curar
  lexicon: HALOT
  rationale: רפא suele significar «sanar». En español, «sanar» es amplio y natural, y mantiene el contraste con «matar». «Curar» también es posible, pero puede sonar algo más médico o restrictivo.
- source_word: לִפְרֹוץ
  english_pob_choice: to tear down
  chosen_spanish: derribar
  alternatives_spanish:
  - demoler
  - romper
  - destruir
  lexicon: HALOT
  rationale: פרץ puede expresar romper, abrir brecha o derribar. En este paralelismo con «edificar», la idea es demolición o desmantelamiento; «derribar» transmite bien ese contraste en español sin añadir más de lo que el texto exige.
- source_word: לִבְנוֹת
  english_pob_choice: to build up
  chosen_spanish: edificar
  alternatives_spanish:
  - construir
  - edificar
  lexicon: HALOT
  rationale: בנה significa «construir» o «edificar». Aquí «edificar» funciona bien como contraparte poética de «derribar» y es plenamente fiel al sentido. «Construir» sería también correcto, pero menos resonante en el registro bíblico.
theological_decisions:
- issue: Cómo traducir la primera cláusula sin suavizar la dureza del contraste
  english_pob_reading: Retain 'to kill' as a descriptive element in Qoheleth's catalogue of times
  chosen_spanish_reading: Mantener «matar» como elemento descriptivo en el catálogo sapiencial de tiempos de Qohelet
  alternative_spanish_readings:
  - «dar muerte»
  - «asesinar»
  rationale: El verso enumera realidades y momentos dentro de la vida humana; no presenta una aprobación moral de cada acción mencionada. Mantener «matar» conserva la dureza y la tensión del hebreo, en vez de resolverla mediante una suavización interpretativa.
  doctrine_reference: Preservar la tensión teológica del texto en lugar de resolverla.
translation_notes:
  revision_awareness: 'El texto hebreo y la auditoría inglesa muestran un paralelismo poético de cuatro miembros con dos pares antitéticos: matar/sanar y derribar/edificar. La versión española sigue esa estructura sin suavizar la fuerza de הרג ni expandir פרץ más allá de la oposición contextual con בנה. No hubo revisiones posteriores que alteraran la lectura de base.'
  spanish_consistency_notes:
  - Se usa «un tiempo» en cada cola para preservar la cadencia del poema.
  - «Matar» se mantiene por su fuerza lexical directa; no se sustituye por un eufemismo.
  - «Derribar» y «edificar» conservan el contraste demolición/construcción implícito en el hebreo.
  - Las notas mantienen alternativas reales sin introducir paráfrasis excesivas.
