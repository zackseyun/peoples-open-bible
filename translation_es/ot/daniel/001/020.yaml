base_translation:
  language: en
  yaml_path: translation/ot/daniel/001/020.yaml
  text: And in every matter of wisdom and understanding that the king asked of them[b][a], he found them ten times better than all the magicians and enchanters who were in all his kingdom.
  footnotes:
  - marker: a
    text: Literally, 'ten hands above.' The Hebrew idiom expresses marked superiority; compare 'ten times better.'
    reason: lexical_alternative
  - marker: b
    text: Or 'magicians and astrologers.' The second term refers to a class of Babylonian wise men, but its precise English equivalent is uncertain.
    reason: alternative_reading
