  to: Seguí mirando hasta que fueron colocados tronos[a], y el Anciano de Días[b] se sentó. Su vestido era blanco como nieve, y el cabello de su cabeza era como lana pura. Su trono era llamas de fuego; sus ruedas, fuego ardiente.
