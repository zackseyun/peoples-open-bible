  rationale: Se eliminó una nota meramente estilística no necesaria; se mejoró «hacerte calles» a «establecerte calles» para un español más natural sin perder la base hebrea ni la nota léxica; y se afinó la nota de «tratado» para reflejar mejor la alternativa documentada «pacto».
