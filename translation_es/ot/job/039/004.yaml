- from: Sus crías se fortalecen[a]; crecen en el campo abierto; salen y no regresan a ellas.
  to: Sus crías se fortalecen; crecen en el campo abierto[a]; salen y no regresan a ellos.
  rationale: Se corrige el pronombre final a «ellos» para reflejar mejor el referente plural de los progenitores animales sin imponer género femenino ausente en el hebreo. También se reubica la nota al pie al sintagma «en el campo abierto», que es donde pertenece la alternativa léxica de בַּבָּר.
