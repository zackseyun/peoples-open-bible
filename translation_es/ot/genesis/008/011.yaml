base_translation:
  language: en
  yaml_path: translation/ot/genesis/008/011.yaml
  text: And the dove came to him at evening time[a], and behold, a freshly plucked olive leaf was in her mouth[c][b]. So Noah knew that the waters had subsided from upon the earth.
  footnotes:
  - marker: a
    text: Or 'returned to him' for 'came to him'; the Hebrew verb itself means 'came,' though the context implies a return.
    reason: lexical_alternative
  - marker: b
    text: '''Freshly plucked'' renders a Hebrew adjective meaning something torn or plucked off, implying the leaf had been newly taken from a living olive tree.'
    reason: lexical_alternative
  - marker: c
    text: Or 'the waters had abated.'
    reason: lexical_alternative
