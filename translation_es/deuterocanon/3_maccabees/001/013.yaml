translation:
  language: es
  text: Y preguntaba por qué razón nadie entre los presentes le había impedido entrar en cualquier santuario[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cualquier recinto sagrado». El griego τέμενος puede referirse ampliamente a un lugar consagrado, no solo a un edificio del templo.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπυνθάνετο
  english_pob_choice: he inquired
  chosen_spanish: se preguntaba
  alternatives_spanish:
  - inquiría
  - preguntaba
  lexicon: BDAG
  rationale: El imperfecto medio de πυνθάνομαι expresa una acción en curso de indagar o averiguar. En español, «se preguntaba» comunica bien esa búsqueda de información sin sonar demasiado rígido; «inquiría» es más formal, pero menos natural para lectura pública.
- source_word: διὰ τίνα αἰτίαν
  english_pob_choice: for what reason
  chosen_spanish: por qué razón
  alternatives_spanish:
  - con qué motivo
  - por qué
  - por qué causa
  lexicon: LSJ
  rationale: La frase pide la causa o razón. «Por qué razón» mantiene la transparencia causal del griego y conserva un registro digno y claro.
- source_word: εἰσερχόμενον
  english_pob_choice: from entering
  chosen_spanish: de entrar
  alternatives_spanish:
  - al entrar
  - cuando entraba
  lexicon: BDAG
  rationale: En español, después de «impedir» la construcción natural es «impedir de entrar» o «impedir que entrara». Aquí se mantiene la relación semántica del participio con el verbo de impedimento sin añadir más desarrollo interpretativo del necesario.
- source_word: πᾶν τέμενος
  english_pob_choice: any sanctuary
  chosen_spanish: cualquier santuario
  alternatives_spanish:
  - todo santuario
  - cualquier recinto sagrado
  - cada santuario
  lexicon: LSJ
  rationale: τέμενος designa un lugar sagrado o recinto consagrado, no necesariamente un edificio. «Santuario» es suficientemente amplio en español; «cualquier» refleja bien el cambio del inglés revisado y evita entenderlo como plural distributivo rígido.
- source_word: οὐθεὶς ἐκώλυσεν
  english_pob_choice: no one ... had prevented
  chosen_spanish: nadie ... lo había impedido
  alternatives_spanish:
  - nadie ... lo había detenido
  - nadie ... lo había estorbado
  lexicon: BDAG
  rationale: κωλύω significa impedir, detener, estorbar o evitar. «Impedido» preserva el valor de prevención/obstáculo del verbo y funciona bien con el infinitivo español.
- source_word: τῶν παρόντων
  english_pob_choice: among those present
  chosen_spanish: de los presentes
  alternatives_spanish:
  - entre los presentes
  - de entre los presentes
  lexicon: BDAG
  rationale: El genitivo partitivo indica el grupo de los presentes. «De los presentes» es una forma compacta y natural en español; el sentido distributivo ya queda claro por el contexto y el pronombre indefinido 'nadie'.
theological_decisions:
- issue: Extensión de πᾶν τέμενος y el posible alcance de «santuario»
  english_pob_reading: any sanctuary; the Greek can refer broadly to a consecrated place, not only a temple building.
  chosen_spanish_reading: cualquier santuario, con nota de que puede referirse a un recinto sagrado amplio
  alternative_spanish_readings:
  - todo santuario
  - cualquier recinto sagrado
  - cualquier templo
  rationale: No conviene estrechar τέμενος a «templo» ni perder su amplitud cultual. «Santuario» conserva el campo semántico religioso amplio, y la nota preserva la tensión léxica señalada en el audit trail.
  doctrine_reference: Lexical/theological note on sacred space terminology
translation_notes:
  revision_awareness: La traducción sigue la revisión inglesa más reciente, que prefirió «any sanctuary» sobre «every sanctuary» por ser más natural y ajustarse mejor a πᾶν τέμενος en este contexto. El español adopta el mismo alcance con «cualquier santuario».
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico formal, pero con sintaxis española natural.
  - «Santuario» se usa como término amplio para τέμενος, evitando reducirlo a «templo».
  - «Impedido de entrar» conserva la relación verbal del griego y su fuerza de impedimento.
  - El indefinido «nadie» refleja adecuadamente οὐθείς en una pregunta indirecta.
