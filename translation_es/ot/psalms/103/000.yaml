translation:
  language: es
  text: De David. Bendice, alma mía, a Yahvé, y todo lo que hay en mí[a], bendice su santo nombre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «todas mis partes internas» o «todo mi ser interior».'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְדָוִד
  english_pob_choice: Of David.
  chosen_spanish: De David.
  alternatives_spanish:
  - Salmo de David.
  - Para David.
  lexicon: superscription
  rationale: La fórmula hebrea funciona como encabezado de atribución; «De David» conserva brevedad y la relación titular sin añadir un matiz interpretativo no explícito en el hebreo.
- source_word: נַפְשִׁי
  english_pob_choice: my soul
  chosen_spanish: alma mía
  alternatives_spanish:
  - mi alma
  - vida mía
  lexicon: נפש
  rationale: «Alma mía» reproduce el vocativo poético y mantiene el sentido integral de la persona que habla, sin reducirlo a un uso técnico o filosófico.
- source_word: יְהוָה
  english_pob_choice: the LORD
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  lexicon: יהוה
  rationale: Se usa el nombre divino de forma directa, conforme al criterio del proyecto, evitando la sustitución por un título en mayúsculas.
- source_word: וְכָל קְרָבַי
  english_pob_choice: and all that is within me
  chosen_spanish: y todo lo que hay en mí
  alternatives_spanish:
  - y todo mi ser
  - y todo mi interior
  lexicon: קרב
  rationale: La expresión hebrea literalmente apunta a las «partes internas»; en español, «todo lo que hay en mí» preserva la inclusividad poética y evita una imagen corporal demasiado fragmentaria.
- source_word: שֵׁם קָדְשׁוֹ
  english_pob_choice: his holy name
  chosen_spanish: su santo nombre
  alternatives_spanish:
  - su nombre santo
  lexicon: שם + קדש
  rationale: «Su santo nombre» es la combinación más natural en español y conserva el orden adjetival tradicional sin perder la referencia a la santidad del nombre divino.
theological_decisions:
- issue: Uso del nombre divino en la traducción poética
  english_pob_reading: the LORD
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  - el Señor
  rationale: El hebreo contiene el tetragrámaton; el proyecto prioriza su representación explícita. Esto preserva la tensión entre el nombre propio de Dios y su uso reverente en la liturgia.
  doctrine_reference: Éxodo 3:15; Deuteronomio 6:4
- issue: Alcance antropológico de «all that is within me»
  english_pob_reading: all that is within me
  chosen_spanish_reading: todo lo que hay en mí
  alternative_spanish_readings:
  - todo mi interior
  - todo mi ser
  rationale: La frase abarca la totalidad interna de la persona y no solo un aspecto emocional. La opción elegida mantiene amplitud semántica sin imponer una antropología más específica de la que exige el hebreo.
  doctrine_reference: Salmo 103:1; Salmo 139:13-14
translation_notes:
  revision_awareness: La fuente hebrea incluye tanto la superscripción «De David» como el mandato devocional completo; la versión inglesa auditada había quedado truncada tras el encabezado, pero la revisión posterior restituye el contenido entero del versículo. La redacción española refleja esa forma completa y mantiene la nota léxica sobre קְרָבַי en el punto correspondiente.
  spanish_consistency_notes:
  - Se preserva Yahvé como forma principal para יהוה, coherente con el estándar del proyecto.
  - La nota [a] queda anclada en «todo lo que hay en mí» para reflejar la ambigüedad hebrea entre interioridad y partes internas.
  - La puntuación y el ritmo siguen un tono poético, pero sin añadir palabras ausentes del hebreo.
