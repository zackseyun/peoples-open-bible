- from: Acércate a ella como uno que ara y siembra[a], y espera sus buenos frutos. Porque en su labor trabajarás poco, y no tardarás[b] en comer de su fruto.
  to: Acércate a ella como uno que ara y cosecha[a], y espera su abundante cosecha. Porque en su servicio trabajarás solo un poco[b], y antes de mucho comerás de su fruto.
