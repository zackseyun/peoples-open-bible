translation:
  language: es
  text: Y Gorgias y sus hombres salieron de la ciudad para salir al encuentro de ellos en batalla.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐξῆλθεν
  english_pob_choice: came out
  chosen_spanish: salió
  alternatives_spanish:
  - salió afuera
  - fue fuera
  lexicon: BDAG
  rationale: El aoristo de ἐξέρχομαι expresa movimiento hacia afuera desde un lugar. En español, «salió» comunica ese desplazamiento de forma natural y fiel, sin añadir matices innecesarios.
- source_word: ἐκ τῆς πόλεως
  english_pob_choice: from the city
  chosen_spanish: de la ciudad
  alternatives_spanish:
  - desde la ciudad
  - fuera de la ciudad
  lexicon: BDAG
  rationale: πόλις se refiere aquí al lugar urbano concreto desde el cual Gorgias se mueve. «De la ciudad» mantiene la referencia espacial directa y funciona bien en español narrativo.
- source_word: οἱ ἄνδρες αὐτοῦ
  english_pob_choice: his men
  chosen_spanish: sus hombres
  alternatives_spanish:
  - los hombres con él
  - sus soldados
  lexicon: BDAG
  rationale: ἄνδρες aquí designa el grupo masculino que acompaña a Gorgias, con sentido marcial por el contexto. «Sus hombres» reproduce bien la amplitud semántica del original sin forzar un término técnico militar que el griego no explicita.
- source_word: εἰς συνάντησιν αὐτοῖς
  english_pob_choice: to meet them
  chosen_spanish: para encontrarse con ellos
  alternatives_spanish:
  - para un encuentro con ellos
  - para salirles al encuentro
  lexicon: BDAG
  rationale: La construcción εἰς συνάντησιν + dativo expresa ir al encuentro. «Para encontrarse con ellos» conserva la idea de encuentro y deja el carácter hostil al contexto inmediato, como en el inglés auditado.
- source_word: εἰς πόλεμον
  english_pob_choice: in battle
  chosen_spanish: en batalla
  alternatives_spanish:
  - para la batalla
  - a la guerra
  lexicon: BDAG
  rationale: πόλεμος aquí es claramente bélico. «En batalla» sigue de cerca la formulación auditada en inglés y suena natural en español, manteniendo el sentido marcial sin volverlo más explicativo de lo que el texto exige.
