review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador acierta en la estructura general, la cifra de edad y la distinción entre los dos verbos de muerte. Sin embargo, ''las vidas de Ismael'' no refleja bien el hebreo שְׁנֵי חַיֵּי, que en este contexto idiomático significa ''los años de la vida de Ismael'', no ''las vidas''. Además, la nota al pie está mal anclada y duplicativa: el texto principal ya dice ''expiró'', mientras que la nota dice ''O expiró''. También falta en español la nota cultural que el inglés conserva para ''fue reunido con su pueblo''.'
  spanish_quality_summary: El español es generalmente claro, pero 'Estas fueron las vidas de Ismael' suena antinatural y semánticamente equívoco en español bíblico moderno. 'Los años de la vida de Ismael' es mucho más natural y fiel. 'Expiró y murió' funciona, aunque 'dio su último aliento y murió' refleja mejor la diferencia entre גוע y מות; aun así, 'expiró' es aceptable si se mantiene una nota alternativa correcta. 'Fue reunido con su pueblo' es legible y digno.
  glossary_alignment: No hay conflictos con la terminología de proyecto principal. El nombre 'Ismael' es correcto. El modismo funerario debe preservarse, y conviene mantener también en español la nota explicativa sobre 'fue reunido con su pueblo', como en la auditoría inglesa.
  issues:
  - severity: high
    issue: '''las vidas de Ismael'' para שְׁנֵי חַיֵּי'
    rationale: 'El hebreo es un modismo de cómputo de lifespan: ''los años de la vida de Ismael''. ''Las vidas'' sugiere múltiples vidas o un concepto distinto, y no preserva bien el sentido idiomático ni la legibilidad en español.'
  - severity: medium
    issue: Nota [a] mal formulada y mal anclada
    rationale: La nota dice 'O expiró', pero el texto principal ya usa 'expiró'. Si se conserva la nota, debe ofrecer una alternativa real o explicar la distinción léxica. Además, el inglés coloca la nota sobre el primer verbo de muerte; en español debe corresponder claramente al término anotado.
  - severity: medium
    issue: Falta la nota cultural sobre 'fue reunido con su pueblo'
    rationale: La auditoría inglesa preserva una nota importante para el modismo funerario. Dado que el español mantiene el mismo modismo, debe conservar también esa ayuda interpretativa.
  revised_spanish_text: 'Estos fueron los años de la vida de Ismael: ciento treinta y siete años. Y expiró[a] y murió, y fue reunido con su pueblo[b].'
  revised_footnotes:
  - marker: a
    text: O 'dio su último aliento'. El hebreo aquí usa un verbo distinto del siguiente 'murió', por lo que se conservan ambos matices en la traducción.
    reason: lexical_alternative
  - marker: b
    text: «Fue reunido con su pueblo» es un modismo hebreo usado en notices de muerte; puede referirse a la reunión con sus antepasados, al entierro entre los suyos, o a ambas cosas.
    reason: cultural_note
  revision_rationale: Se corrige el modismo de lifespan a un español fiel y natural ('los años de la vida de Ismael'), se repara la nota léxica para que ofrezca una alternativa real al verbo 'expiró', y se añade la nota cultural presente en la auditoría inglesa para el modismo funerario. El resto de la estructura y sentido del borrador se conserva.
