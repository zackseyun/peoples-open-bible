  text: אָֽנֹכִי֙ אֶֽעֶרְבֶ֔/נּוּ מִ/יָּדִ֖/י תְּבַקְשֶׁ֑/נּוּ אִם לֹ֨א הֲבִיאֹתִ֤י/ו אֵלֶ֨י/ךָ֙ וְ/הִצַּגְתִּ֣י/ו לְ/פָנֶ֔י/ךָ וְ/חָטָ֥אתִֽי לְ/ךָ֖ כָּל הַ/יָּמִֽים־־׃
