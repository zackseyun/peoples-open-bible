translation:
  language: es
  text: Así, Moisés y Eleazar el sacerdote tomaron el oro de parte de ellos[a], cada objeto trabajado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «todos los objetos de hechura», es decir, todos los objetos de oro trabajados.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקַּח
  english_pob_choice: took
  chosen_spanish: tomaron
  alternatives_spanish:
  - recibieron
  - tomó
  lexicon: HALOT
  rationale: El verbo narra la acción concreta de tomar/recibir. En español, el plural concuerda naturalmente con el sujeto compuesto «Moisés y Eleazar el sacerdote», y conserva el sentido narrativo simple del hebreo.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  lexicon: HALOT
  rationale: Nombre propio bíblico establecido en español.
- source_word: וְאֶלְעָזָר הַכֹּהֵן
  english_pob_choice: and Eleazar the priest
  chosen_spanish: y Eleazar el sacerdote
  alternatives_spanish:
  - y Eleazar, el sacerdote
  lexicon: HALOT
  rationale: «El sacerdote» traduce de manera directa הַכֹּהֵן. Se evita «sacerdote» como título eclesiástico más cargado, manteniendo la función del oficio en el relato.
- source_word: אֶת הַזָּהָב
  english_pob_choice: the gold
  chosen_spanish: el oro
  lexicon: HALOT
  rationale: El objeto directo específico es el oro ya reunido en el contexto; el artículo definido ayuda a mantener esa especificidad.
- source_word: מֵאִתָּם
  english_pob_choice: from them
  chosen_spanish: de ellos
  alternatives_spanish:
  - de parte de ellos
  lexicon: HALOT
  rationale: La preposición indica origen o procedencia. «De ellos» es idiomático y fiel al valor de procedencia.
- source_word: כֹּל כְּלִי מַעֲשֶׂה
  english_pob_choice: every crafted article
  chosen_spanish: toda pieza trabajada
  alternatives_spanish:
  - todos los artículos de trabajo
  - cada objeto trabajado
  lexicon: HALOT
  rationale: כְּלִי + מַעֲשֶׂה nombra objetos hechos con trabajo manual, no necesariamente recipientes. «Pieza trabajada» preserva la idea de objeto manufacturado y evita restringirlo a «vessels» o a un tecnicismo eclesiástico.
translation_notes:
  revision_awareness: La versión española sigue de cerca la revisión inglesa más reciente, que pasó de una expresión más colectiva a una más singular («every crafted article»). Por eso se optó por «toda pieza trabajada», manteniendo el valor colectivo del conjunto sin añadir elementos no presentes en el hebreo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el tetragrámaton en toda la obra; este versículo no lo contiene.
  - Se evita «vessels»/«vasos» porque כְּלִי aquí es más amplio que un recipiente.
  - «Oro» reproduce el sustantivo definido del hebreo; no se interpreta como metal en abstracto sino como el botín específico mencionado en contexto.
