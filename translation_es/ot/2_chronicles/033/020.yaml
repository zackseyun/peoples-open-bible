translation:
  language: es
  text: Y Manasés durmió con sus padres[a], y lo sepultaron en su casa. Y Amón, su hijo, reinó en su lugar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'en su palacio'; el hebreo dice 'en su casa', que en un contexto real puede referirse al complejo palaciego.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁכַּב
  english_pob_choice: slept
  chosen_spanish: durmió
  alternatives_spanish:
  - se acostó
  - murió
  lexicon: HALOT
  rationale: Sigo el valor idiomático de la fórmula de muerte, manteniendo la imagen de 'dormir' en vez de reducirla a 'murió'. En español, 'durmió con sus padres' conserva esa fórmula tradicional y natural.
- source_word: עִם אֲבֹתָיו
  english_pob_choice: with his fathers
  chosen_spanish: con sus padres
  alternatives_spanish:
  - con sus antepasados
  - con sus padres ancestrales
  lexicon: HALOT
  rationale: '''Padres'' reproduce de cerca el hebreo y funciona bien en español como fórmula dinástica/sepulcral. ''Antepasados'' aclara el sentido, pero pierde la correspondencia formal de la expresión.'
- source_word: וַיִּקְבְּרֻהוּ
  english_pob_choice: they buried him
  chosen_spanish: lo sepultaron
  alternatives_spanish:
  - lo enterraron
  - fue sepultado
  lexicon: HALOT
  rationale: El hebreo es activo plural con sufijo objeto; por eso prefiero una forma activa. 'Sepultar' suena más digno y bíblico en español que 'enterrar', sin perder el valor verbal.
- source_word: בֵּיתוֹ
  english_pob_choice: in his house
  chosen_spanish: en su casa
  alternatives_spanish:
  - en su palacio
  - en el complejo de su casa
  lexicon: HALOT
  rationale: Conservo 'casa' para reflejar el hebreo literal, como hizo la POB inglesa. En contexto real, puede implicar el recinto palaciego, pero el texto base no exige explicitarlo en el cuerpo.
- source_word: וַיִּמְלֹךְ
  english_pob_choice: reigned
  chosen_spanish: reinó
  alternatives_spanish:
  - comenzó a reinar
  - fue rey
  lexicon: HALOT
  rationale: '''Reinó'' es la correspondencia normal y concisa en fórmulas de sucesión reales.'
- source_word: תַּחְתָּיו
  english_pob_choice: in his place
  chosen_spanish: en su lugar
  alternatives_spanish:
  - en vez de él
  - después de él
  lexicon: HALOT
  rationale: '''En su lugar'' transmite bien el reemplazo dinástico y mantiene el uso idiomático del hebreo en contexto de sucesión.'
theological_decisions:
- issue: 'Fórmula de muerte real: ''durmió con sus padres'''
  english_pob_reading: The English POB preserves the idiom 'slept with his fathers' rather than flattening it to 'died'.
  chosen_spanish_reading: '''Durmió con sus padres'' conserva la fórmula idiomática y su carga sepulcral.'
  alternative_spanish_readings:
  - murió y fue sepultado con sus padres
  - descansó con sus padres
  rationale: 'No hay tensión doctrinal aquí, pero sí una decisión teológica-literaria: preservar la fórmula tradicional evita borrar el lenguaje bíblico de muerte reunida con los antepasados.'
  doctrine_reference: N/A
translation_notes:
  revision_awareness: La revisión más reciente del registro inglés indica que no hubo cambios necesarios y el acuerdo con la fuente es alto; por eso la versión española sigue de cerca el hebreo y el audit trail inglés sin introducir ampliaciones interpretativas.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - '''Reinó en su lugar'' conserva la fórmula sucesoria sin añadir cronología implícita.'
  - '''Casa'' se deja en el texto principal y la posible lectura de ''palacio'' queda en nota, como en el inglés auditado.'
