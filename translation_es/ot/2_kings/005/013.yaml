revisions:
- from: 'Entonces sus esclavos se acercaron, le hablaron y le dijeron[a]: «Padre mío, si el profeta te hubiera dicho alguna cosa grande, ¿no la habrías hecho? ¡Cuánto más, entonces, cuando te dice: “Lávate y sé limpio”!»'
  to: 'Entonces sus siervos se acercaron, le hablaron y le dijeron[a]: «Padre mío, si el profeta te hubiera dicho alguna cosa grande, ¿no la habrías hecho? ¿Cuánto más, entonces, cuando te dice: “Lávate y queda limpio”?»'
  rationale: Se reemplaza ‘esclavos’ por ‘siervos’ para ajustarse a la decisión contextual del POB auditado y al tono del pasaje. Se cambia ‘sé limpio’ por ‘queda limpio’ para lograr español natural y conservar el valor resultativo de טהר, manteniendo la alternativa ‘sé purificado’ en nota. Se suaviza la puntuación para que el argumento retórico fluya mejor en español.
