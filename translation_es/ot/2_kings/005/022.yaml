translation:
  language: es
  text: 'Y dijo[a]: «Todo está bien. Mi amo me ha enviado para decir: “Mira, justo ahora han venido a mí dos jóvenes de la región montañosa de Efraín, de entre los hijos de los profetas[b]. Por favor, dales un talento de plata[c] y dos mudas de ropa”».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Paz» / «Está bien». Aquí שָׁלוֹם funciona idiomáticamente como una respuesta tranquilizadora.
    reason: lexical_alternative
  - marker: b
    text: Expresión hebrea tradicional, «hijos de los profetas», para designar a miembros de una comunidad o corporación profética.
    reason: cultural_note
  - marker: c
    text: Un «talento» era una gran unidad de peso para metales preciosos.
    reason: cultural_note
lexical_decisions:
- source_word: שָׁל֗וֹם
  english_pob_choice: All is well
  chosen_spanish: Todo está bien
  alternatives_spanish:
  - Paz
  - Está bien
  lexicon: HALOT
  rationale: En este contexto, שָׁלוֹם funciona como fórmula idiomática de tranquilidad o seguridad, no como saludo formal. «Todo está bien» transmite naturalmente esa función pragmática en español sin perder el matiz de reassurance.
- source_word: אֲדֹנִי
  english_pob_choice: my master
  chosen_spanish: mi señor
  alternatives_spanish:
  - mi señor amo
  - mi amo
  lexicon: HALOT
  rationale: El contexto es de siervo a superior humano. «Mi señor» conserva el valor relacional del hebreo sin elevarlo a un registro eclesiástico ni sonar demasiado moderno o frío.
- source_word: שְׁלָחַנִי
  english_pob_choice: has sent me
  chosen_spanish: me ha enviado
  alternatives_spanish:
  - me envió
  - me mandó
  lexicon: HALOT
  rationale: El perfecto hebreo expresa una acción completada con relevancia inmediata en el discurso; el pretérito perfecto compuesto español lo refleja bien en diálogo directo.
- source_word: הִנֵּה עַתָּה זֶה
  english_pob_choice: Look, just now
  chosen_spanish: Mira, justo ahora
  alternatives_spanish:
  - Mira, ahora mismo
  - He aquí, ahora
  lexicon: HALOT
  rationale: La secuencia es deíctica y enfática. «Mira» preserva la captación de atención; «justo ahora» comunica la inmediatez que aporta עַתָּה זֶה sin recurrir a un calco arcaizante.
- source_word: נְעָרִים
  english_pob_choice: young men
  chosen_spanish: jóvenes
  alternatives_spanish:
  - muchachos
  - sirvientes
  lexicon: HALOT
  rationale: Dado que el contexto los identifica como miembros del grupo profético, «jóvenes» evita imponer la idea de servidumbre y mantiene una referencia amplia y natural en español.
- source_word: מֵהַר אֶפְרַיִם
  english_pob_choice: from the hill country of Ephraim
  chosen_spanish: del monte de Efraín
  alternatives_spanish:
  - de la serranía de Efraín
  - de la región montañosa de Efraín
  lexicon: HALOT
  rationale: Aunque la expresión puede referirse al territorio montañoso de Efraín, en español bíblico «monte de Efraín» es una forma reconocible y más cercana a la estructura del hebreo. Se evita sobrerrepresentar una interpretación geográfica específica no exigida por el verso.
- source_word: מִבְּנֵי הַנְּבִיאִים
  english_pob_choice: from among the sons of the prophets
  chosen_spanish: de entre los hijos de los profetas
  alternatives_spanish:
  - de entre los discípulos de los profetas
  - de la comunidad profética
  lexicon: HALOT
  rationale: Se conserva el giro idiomático casi literalmente porque es una expresión técnica de Reyes. «Hijos de los profetas» mantiene la referencia histórica y permite al lector percibir el término tradicional sin interpretarlo en exceso.
- source_word: תְּנָה נָּא
  english_pob_choice: Please give
  chosen_spanish: Por favor, dales
  alternatives_spanish:
  - Te ruego que les des
  - Dales, por favor
  lexicon: HALOT
  rationale: La combinación de imperativo y נָא comunica una solicitud cortés. En español, la fórmula natural es «por favor», y el dativo pronominal «les» preserva el destinatario plural implícito.
- source_word: כִּכַּר כֶּסֶף
  english_pob_choice: a talent of silver
  chosen_spanish: un talento de plata
  alternatives_spanish:
  - una medida de plata
  - un talento de dinero
  lexicon: HALOT
  rationale: «Talento» conserva la unidad metrológica tradicional del original y de la traducción inglesa auditada. «De plata» refleja el sustantivo כֶּסֶף como metal precioso, no como dinero abstracto.
- source_word: חֲלִפוֹת בְּגָדִים
  english_pob_choice: changes of clothes
  chosen_spanish: dos mudas de ropa
  alternatives_spanish:
  - dos cambios de ropa
  - dos juegos de ropa
  lexicon: HALOT
  rationale: La expresión hebrea apunta a conjuntos de ropa de recambio. «Mudas de ropa» es idiomático en español y comunica bien la idea de prendas para cambiarse sin añadir ni quitar contenido.
theological_decisions:
- issue: Valor idiomático de שָׁלוֹם en diálogo narrativo
  english_pob_reading: '"All is well" rather than a greeting or abstract peace.'
  chosen_spanish_reading: «Todo está bien» como afirmación de seguridad o tranquilidad.
  alternative_spanish_readings:
  - «Paz»
  - «Está bien»
  rationale: No se trata de una proclamación doctrinal sobre paz en abstracto, sino de una respuesta tranquilizadora. La lectura elegida reproduce la función comunicativa que el hebreo cumple en la escena.
  doctrine_reference: No aplica; decisión de pragmática textual.
- issue: Expresión técnica «hijos de los profetas»
  english_pob_reading: A standard expression for members of a prophetic community or guild.
  chosen_spanish_reading: «hijos de los profetas» conservado literalmente con comprensión contextual.
  alternative_spanish_readings:
  - «discípulos de los profetas»
  - «comunidad profética»
  rationale: 'Se mantiene la tensión entre literalidad e inteligibilidad: el lector recibe el término tradicional del relato y, al mismo tiempo, el contexto permite entender que designa un grupo profético organizado.'
  doctrine_reference: No aplica; referencia histórico-social del texto.
- issue: Unidad de peso כִּכָּר
  english_pob_reading: A large unit of weight for precious metal.
  chosen_spanish_reading: «talento» como unidad metrológica.
  alternative_spanish_readings:
  - «gran peso de plata»
  - «una cantidad considerable de plata»
  rationale: Traducirlo como «talento» evita perder precisión histórica y sigue la convención bíblica establecida. No se espiritualiza ni se moderniza el término en exceso.
  doctrine_reference: No aplica; metrología bíblica.
translation_notes:
  revision_awareness: 'Coincide con el audit trail inglés en filosofía de equivalencia óptima y en las decisiones principales: שָׁלוֹם idiomático, מֵהַר אֶפְרַיִם como referencia geográfica, מִבְּנֵי הַנְּבִיאִים como expresión técnica, כִּכָּר como talento, y חֲלִפוֹת בְּגָדִים como muda(s) de ropa. No se introducen cambios textuales sustantivos respecto al sentido auditado.'
  spanish_consistency_notes:
  - Se usa «mi señor» para אֲדֹנִי por coherencia con un contexto humano de deferencia.
  - «Hijos de los profetas» se mantiene como término técnico coherente con otros pasajes de Reyes.
  - «Talento» se usa como unidad de peso y se aclara en nota para evitar ambigüedad moderna.
  - «Mudas de ropa» conserva el plural y la idea de cambio de vestimenta sin añadir detalles.
