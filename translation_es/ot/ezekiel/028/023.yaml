translation:
  language: es
  text: Y enviaré en ella[a] pestilencia y sangre en sus calles; los muertos caerán en medio de ella, por la espada, alrededor de ella. Entonces sabrán que yo soy Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'derramamiento de sangre en sus calles'. El hebreo dice literalmente 'sangre', probablemente en referencia a violencia y muerte en la ciudad.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשִׁלַּחְתִּי
  english_pob_choice: And I will send
  chosen_spanish: Y enviaré
  alternatives_spanish:
  - Y mandaré
  - Y enviaré adelante
  lexicon: HALOT
  rationale: El verbo qal con valor profético futuro se expresa naturalmente en español con futuro simple. 'Enviaré' conserva la idea de hacer llegar o hacer venir un juicio sobre la ciudad sin añadir matices no presentes en el hebreo.
- source_word: דֶּבֶר
  english_pob_choice: pestilence
  chosen_spanish: pestilencia
  alternatives_spanish:
  - plaga
  - enfermedad
  lexicon: HALOT
  rationale: En contextos proféticos de juicio, el término apunta a una calamidad epidémica enviada por Dios. 'Pestilencia' mantiene ese sentido técnico-bíblico mejor que 'enfermedad' y evita debilitar el matiz de juicio.
- source_word: וָדָם
  english_pob_choice: and blood
  chosen_spanish: y sangre
  alternatives_spanish:
  - y derramamiento de sangre
  - y sangre derramada
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'sangre'. En español, 'sangre' reproduce el sustantivo concreto sin interpretar de antemano como 'derramamiento de sangre', aunque el contexto claramente lo implica.
- source_word: בְּחוּצוֹתֶיהָ
  english_pob_choice: into her streets
  chosen_spanish: en sus calles
  alternatives_spanish:
  - en sus plazas
  - en las calles de ella
  lexicon: HALOT
  rationale: חוּצוֹת se refiere a calles o espacios públicos urbanos. 'En sus calles' es el equivalente más natural y fiel al español, conservando el plural y la localización urbana.
- source_word: וְנִפְלַל חָלָל
  english_pob_choice: the slain will fall
  chosen_spanish: caerá un muerto
  alternatives_spanish:
  - caerán los muertos
  - caerá el caído
  lexicon: HALOT
  rationale: La construcción hebrea es inusual, pero el sentido general es la caída de una víctima mortal. 'Un muerto' traduce de forma sobria el singular colectivo implícito sin forzar una interpretación más específica que el hebreo no exige.
- source_word: בְּתוֹכָהּ
  english_pob_choice: in her midst
  chosen_spanish: en medio de ella
  alternatives_spanish:
  - en su interior
  - en su seno
  lexicon: HALOT
  rationale: Es una expresión idiomática para el centro o interior de la ciudad. 'En medio de ella' suena natural en español y conserva el tono profético.
- source_word: בְּחֶרֶב
  english_pob_choice: by the sword
  chosen_spanish: a espada
  alternatives_spanish:
  - por la espada
  - mediante la espada
  lexicon: HALOT
  rationale: La preposición hebrea expresa instrumento o medio de muerte. 'A espada' es una fórmula bíblica clara y estable en español, equivalente a 'by the sword'.
- source_word: עָלֶיהָ מִסָּבִיב
  english_pob_choice: all around her
  chosen_spanish: alrededor de ella
  alternatives_spanish:
  - por todos lados
  - en derredor de ella
  lexicon: HALOT
  rationale: La frase intensifica el cerco hostil. 'Alrededor de ella' mantiene la imagen de ataque circundante sin sobrecargar la línea con una perífrasis más pesada.
- source_word: וְיָדְעוּ
  english_pob_choice: Then they will know
  chosen_spanish: Entonces sabrán
  alternatives_spanish:
  - Y sabrán
  - Así sabrán
  lexicon: HALOT
  rationale: El valor consecutivo/resultativo de la conjunción se expresa bien con 'Entonces'. 'Sabrán' mantiene el verbo de conocimiento como consecuencia del juicio.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - SEÑOR
  lexicon: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
  rationale: Se conserva el nombre divino revelado en el texto hebreo con la forma normativa del proyecto en español, 'Yahvé', en vez de sustituirlo por un título. Esto preserva la identidad del nombre propio del pacto.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: El texto hebreo usa explícitamente el Tetragrámaton. La pauta del proyecto pide verterlo como 'Yahvé' en el texto principal para no ocultar el nombre personal de Dios tras una sustitución tradicional.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sentido de וָדָם en un contexto de juicio
  english_pob_reading: blood
  chosen_spanish_reading: sangre
  alternative_spanish_readings:
  - derramamiento de sangre
  - sangre derramada
  rationale: Se mantiene el valor literal del sustantivo hebreo en el cuerpo del texto, dejando que el contexto de violencia explique la referencia al derramamiento de sangre sin explicitarla prematuramente.
  doctrine_reference: HALOT on דָּם; lexical note in English POB audit trail
translation_notes:
  revision_awareness: La base inglesa revisada simplificó la expresión espacial final a 'all around her' para sonar más natural; la redacción española sigue esa decisión con 'alrededor de ella'. Se mantuvo la distinción entre el sustantivo literal 'blood/sangre' y su posible sentido contextual de derramamiento violento, tal como señala la nota auditada inglesa. No se añadieron interpretaciones doctrinales ajenas al hebreo ni se sustituyó el nombre divino.
  spanish_consistency_notes:
  - Se conserva 'Yahvé' para יְהוָה, en consonancia con la terminología del proyecto.
  - '''Pestilencia'' se usa como término de juicio profético, no como simple sinónimo de enfermedad.'
  - '''A espada'' mantiene la idiomaticidad bíblica y el instrumento de muerte.'
  - La nota sobre 'sangre' preserva la tensión lexical entre literalidad y sentido contextual sin resolverla de manera excesiva.
  - '''En medio de ella'' y ''alrededor de ella'' reproducen el paralelismo espacial del hebreo con español natural.'
