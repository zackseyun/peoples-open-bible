translation:
  language: es
  text: Los habitantes de Sidón y de Arvad eran tus remeros; tus sabios, oh Tiro, estaban dentro de ti; ellos eran tus pilotos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tus marineros». El término hebreo puede referirse más específicamente a quienes dirigen o manejan una nave.
    reason: lexical_alternative
lexical_decisions:
- source_word: יֹשְׁבֵי
  english_pob_choice: the inhabitants of
  chosen_spanish: los habitantes de
  alternatives_spanish:
  - los que habitaban en
  - los residentes de
  lexicon: HALOT
  rationale: El participio en constructo designa a quienes habitan un lugar. En español, «los habitantes de» es natural y conserva la relación con los nombres de lugar.
- source_word: צִידוֹן
  english_pob_choice: Sidon
  chosen_spanish: Sidón
  alternatives_spanish:
  - Sidón
  lexicon: Transliteración estándar
  rationale: Se conserva el nombre propio geográfico en su forma habitual en español.
- source_word: וְאַרְוַד
  english_pob_choice: and Arvad
  chosen_spanish: y de Arvad
  alternatives_spanish:
  - y Arvad
  lexicon: Transliteración estándar
  rationale: Se mantiene el topónimo; la coordinación en español fluye mejor con la repetición de la preposición en la serie de nombres.
- source_word: שָׁטִים
  english_pob_choice: rowers
  chosen_spanish: remeros
  alternatives_spanish:
  - bogadores
  - marineros
  lexicon: HALOT
  rationale: En la metáfora naval, el participio se refiere con precisión a quienes impulsan la nave con remos. «Remeros» es claro y directo en español.
- source_word: חֲכָמַיִךְ
  english_pob_choice: your wise men
  chosen_spanish: tus sabios
  alternatives_spanish:
  - tus hombres sabios
  - tus expertos
  lexicon: HALOT
  rationale: חכם puede expresar sabiduría o pericia técnica. Se conserva «sabios» para mantener el enlace lexical, permitiendo que el contexto marítimo matice su función técnica.
- source_word: צוֹר
  english_pob_choice: Tyre
  chosen_spanish: oh Tiro
  alternatives_spanish:
  - Tiro
  lexicon: Transliteración estándar
  rationale: Se conserva el nombre propio con vocativo explícito «oh» para reflejar la dirección del discurso.
- source_word: בָךְ
  english_pob_choice: within you
  chosen_spanish: dentro de ti
  alternatives_spanish:
  - en ti
  - en medio de ti
  lexicon: HALOT
  rationale: Como la figura es la de una nave, «dentro de ti» comunica mejor la ubicación interna sin alejarse del hebreo.
- source_word: הֵמָּה
  english_pob_choice: they
  chosen_spanish: ellos
  alternatives_spanish:
  - ellos mismos
  lexicon: Pronombre enfático
  rationale: El pronombre independiente se conserva con valor enfático mediante «ellos» en posición explícita.
- source_word: חֹבְלָיִךְ
  english_pob_choice: your pilots
  chosen_spanish: tus pilotos
  alternatives_spanish:
  - tus marinos
  - tus timoneles
  - tus navegantes
  lexicon: HALOT
  rationale: En este contexto el término puede referirse a quienes dirigen o manejan la embarcación; «pilotos» refleja la función de conducción que la POB inglesa destacó en la revisión, y evita confundirlo con el término ya rendido como «remeros».
translation_notes:
  revision_awareness: La versión española incorpora la revisión auditada del inglés POB que añadió el vocativo explícito «oh Tiro» y favoreció una traducción más específica de חֹבְלָיִךְ como función de conducción marítima. También evita duplicar la ambigüedad entre «remeros» y el segundo oficio náutico.
  spanish_consistency_notes:
  - Se mantiene la distinción entre «remeros» para שָׁטִים y «pilotos» para חֹבְלָיִךְ.
  - Se conserva el vocativo con «oh Tiro» para reflejar la dirección del lamento.
  - Se usa «sabios» para preservar la conexión lexical con חכם en lugar de sustituirlo por una paráfrasis más interpretativa.
