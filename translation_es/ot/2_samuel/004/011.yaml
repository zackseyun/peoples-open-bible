translation:
  language: es
  text: ¿Cuánto más[a], cuando hombres malvados han matado a un hombre justo en su propia casa, en su lecho, no he de pedir ahora su sangre de las manos de ustedes y expulsarlos[b] de la tierra?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «hacerlos responsables por su sangre»; el modismo hebreo dice literalmente «pedir su sangre de su mano».'
    reason: lexical_alternative
  - marker: b
    text: «Expulsarlos de la tierra» se refiere a la remoción judicial de los asesinos de la tierra, no solo a una purificación ritual.
    reason: cultural_note
lexical_decisions:
- source_word: אַף כִּי
  english_pob_choice: How much more, when
  chosen_spanish: ¡Cuánto más, cuando
  alternatives_spanish:
  - Pues, cuando
  - Aun más, cuando
  - Si tanto más, cuando
  lexicon: HALOT
  rationale: La expresión introduce un argumento a fortiori, no una simple concesión. «Cuánto más» comunica bien esa lógica en español y conserva el tono de reprensión judicial.
- source_word: אֲנָשִׁים רְשָׁעִים
  english_pob_choice: wicked men
  chosen_spanish: hombres malvados
  alternatives_spanish:
  - hombres perversos
  - hombres impíos
  - hombres malhechores
  lexicon: HALOT
  rationale: «Malvados» mantiene la condena moral directa sin volver la frase demasiado técnica o eclesiástica.
- source_word: הָרְגוּ
  english_pob_choice: have killed
  chosen_spanish: han matado
  alternatives_spanish:
  - han asesinado
  - mataron
  - han muerto
  lexicon: HALOT
  rationale: El verbo hebreo es el común «matar»; «han matado» conserva el hecho consumado con relevancia presente, como en el inglés auditado. «Asesinado» sería más interpretativo que el hebreo por sí solo.
- source_word: אִישׁ צַדִּיק
  english_pob_choice: a righteous man
  chosen_spanish: un hombre justo
  alternatives_spanish:
  - un hombre recto
  - un hombre inocente
  - un justo
  lexicon: HALOT
  rationale: «Justo» reproduce mejor el valor de צַדִּיק que «inocente», sin debilitar la carga moral y judicial del pasaje.
- source_word: בְּבֵיתוֹ
  english_pob_choice: in his own house
  chosen_spanish: en su propia casa
  alternatives_spanish:
  - en su casa
  - en su propia vivienda
  lexicon: HALOT
  rationale: El sufijo posesivo debe hacerse explícito; «propia» comunica la afrenta de la muerte en el espacio privado del víctima.
- source_word: עַל מִשְׁכָּבוֹ
  english_pob_choice: on his bed
  chosen_spanish: sobre su lecho
  alternatives_spanish:
  - en su cama
  - sobre su cama
  - en su lecho
  lexicon: HALOT
  rationale: «Lecho» es un equivalente digno y preciso de מִשְׁכָּב, y en español bíblico evita la posible trivialidad de «cama».
- source_word: הֲלוֹא אֲבַקֵּשׁ אֶת דָּמוֹ מִיֶּדְכֶם
  english_pob_choice: should I not now require his blood from your hand
  chosen_spanish: no habré de pedir ahora su sangre de su mano
  alternatives_spanish:
  - no habré de demandar ahora su sangre de vuestra mano
  - no pediré ahora cuenta de su sangre de su mano
  - no habré de exigir ahora su sangre de vuestra mano
  lexicon: HALOT
  rationale: Conservo el idioma jurídico de «pedir su sangre» para reflejar la responsabilidad por derramamiento de sangre. «De su mano» mantiene el hebraísmo de accountability, aquí en singular colectivo como en el original, sin recurrir a una paráfrasis explicativa en el texto principal.
- source_word: דָּמוֹ
  english_pob_choice: his blood
  chosen_spanish: su sangre
  alternatives_spanish:
  - su sangre derramada
  - su sangre culpable
  - su vida
  lexicon: HALOT
  rationale: «Sangre» preserva el idioma legal del hebreo y la fuerza de la culpa por homicidio. No se explicita «culpa» en el texto principal para no suavizar el hebraísmo.
- source_word: וּבִעַרְתִּי אֶתְכֶם מִן הָאָרֶץ
  english_pob_choice: and purge you from the land
  chosen_spanish: y purgaros de la tierra
  alternatives_spanish:
  - y quitaros de la tierra
  - y eliminaros de la tierra
  - y echaros de la tierra
  lexicon: HALOT
  rationale: «Purgar» reproduce mejor el matiz judicial de ביער en este contexto que «quitar» o «eliminar». Mantiene la idea de remoción sancionada por Dios o por su representante, no una limpieza ritual aislada.
theological_decisions:
- issue: Cómo traducir el idioma de responsabilidad por sangre sin perder su peso jurídico
  english_pob_reading: Retain 'require his blood from your hand' in the main text
  chosen_spanish_reading: Conservar «pedir su sangre de su mano» en el texto principal
  alternative_spanish_readings:
  - pedir cuenta de su sangre
  - exigir su sangre
  - cobrar su sangre
  rationale: El hebreo usa un idioma forense concreto. En español, «pedir su sangre» mantiene el campo de responsabilidad por homicidio y evita estrechar el sentido a venganza personal בלבד.
  doctrine_reference: Responsabilidad por derramamiento de sangre; justicia retributiva en el marco del pacto
translation_notes:
  revision_awareness: 'Coincide con la lectura auditada en inglés: se mantiene el argumento a fortiori, el idioma jurídico de la sangre y la remoción judicial de la tierra sin introducir una paráfrasis más fuerte que el hebreo. No se detectaron cambios relevantes en la última revisión.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» por defecto en el proyecto, pero este versículo no contiene el Tetragrámaton.
  - Se usa «justo» para צַדִּיק siguiendo la decisión auditada de 'righteous man'.
  - Se conserva el colectivo singular «su mano» como reflejo del hebreo idiomático, aunque el destinatario sean dos hombres.
  - «Purgar» se usa en sentido judicial, no ritual, conforme a la nota inglesa.
  - La puntuación inicial exclamativa reproduce el valor enfático de אַף כִּי en el contexto retórico.
