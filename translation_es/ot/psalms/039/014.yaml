  to: Aparta tu mirada de mí[a], para que vuelva a sonreír antes de que me vaya y ya no esté.
  rationale: Se ajusta הָשַׁע a una formulación visual más fiel al original y a la auditoría inglesa («Look away»), y se suaviza «ya no exista» a «ya no esté» para conservar el idiomatismo poético de וְאֵינֶנִּי sin sobreinterpretarlo ontológicamente. Se mantiene «vuelva a sonreír» con su nota porque refleja bien la revisión inglesa y sigue siendo natural en español.
