translation:
  language: es
  text: Y allí he puesto el arca, en la cual está el pacto de Yahvé, que hizo con los hijos[a] de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más tradicionalmente, «los hijos de Israel». El hebreo dice «los hijos de Israel», una designación pactual habitual para el pueblo de Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָ/אָשִׂים
  english_pob_choice: I have placed
  chosen_spanish: he puesto
  alternatives_spanish:
  - puse
  - he colocado
  lexicon: HALOT
  rationale: El hebreo expresa una acción completada con relevancia en el presente del discurso; en español, el pretérito perfecto compuesto («he puesto») conserva bien ese valor y suena natural en una declaración solemne. «Puesto» sigue de cerca el sentido de שׂוּם como poner/colocar.
- source_word: שָׁם
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  - en ese lugar
  lexicon: HALOT
  rationale: El adverbio refiere al lugar ya descrito del templo/santuario. «Allí» es una equivalencia directa, clara y digna en español.
- source_word: הָאָרוֹן
  english_pob_choice: the ark
  chosen_spanish: el arca
  alternatives_spanish:
  - el arca del pacto
  - el cofre
  lexicon: HALOT
  rationale: En este contexto cultual, «arca» es la traducción establecida y precisa de אָרוֹן. El contexto ya identifica de qué arca se trata, por lo que no hace falta ampliar el término en el texto principal.
- source_word: אֲשֶׁר שָׁם
  english_pob_choice: in which is
  chosen_spanish: en la cual está
  alternatives_spanish:
  - donde está
  - en la que está
  lexicon: HALOT
  rationale: La construcción relativa hebrea expresa la localización del pacto respecto del arca. «En la cual está» conserva la relación espacial y el matiz de pertenencia/asociación sin forzar una paráfrasis.
- source_word: בְּרִית יְהוָה
  english_pob_choice: the covenant of Yahweh
  chosen_spanish: el pacto de Yahvé
  alternatives_spanish:
  - el pacto de Yahveh
  - el pacto del Señor
  lexicon: HALOT
  rationale: Se mantiene el nombre divino «Yahvé» según la norma del proyecto. «Pacto» refleja el valor de בְּרִית como vínculo formal de alianza; en español bíblico es plenamente comprensible y no exige la fórmula tradicional «pacto/alianza» aquí.
- source_word: אֲשֶׁר כָּרַת
  english_pob_choice: which he made
  chosen_spanish: que hizo
  alternatives_spanish:
  - que cortó
  - que estableció
  lexicon: HALOT
  rationale: El hebreo usa el modismo «cortar un pacto», pero en español «hizo» comunica el mismo hecho de manera natural y fiel. Se evita «cortó» porque sería literal pero poco idiomático en el texto principal.
- source_word: עִם
  english_pob_choice: with
  chosen_spanish: con
  lexicon: HALOT
  rationale: La preposición expresa la parte con la que se establece el pacto; «con» es la correspondencia directa y transparente en español.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los hijos varones de Israel
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Se conserva la forma hebrea masculina plural en una traducción bíblica sobria y reconocible. «Hijos de Israel» refleja bien el etnónimo corporativo sin neutralizar la expresión del original.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: El proyecto establece «Yahvé» como representación principal del Tetragrámaton. Se evita la sustitución por un título para preservar el nombre personal del Dios del pacto, conforme a la norma doctrinal del recurso.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Expresión de parentesco nacional בְּנֵי יִשְׂרָאֵל
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los niños de Israel
  - el pueblo de Israel
  rationale: Se mantiene la correspondencia formal con el hebreo masculino plural. Aunque «el pueblo de Israel» sería una equivalencia inclusiva posible, el texto no obliga a neutralizar la expresión y conviene preservar la forma covenantal tradicional del original.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §4 (Gender-accurate over gender-neutral)'
- issue: Relación del arca con el pacto
  english_pob_reading: in which is the covenant of Yahweh
  chosen_spanish_reading: en la cual está el pacto de Yahvé
  alternative_spanish_readings:
  - donde está el pacto de Yahvé
  - en la que está el pacto de Yahvé
  rationale: La lectura inglesa entiende que el pacto está asociado al arca y localizado en ella. El español conserva esa relación sin sugerir indebidamente que el pacto sea un objeto material; «en la cual está» es la formulación más natural y fiel.
  doctrine_reference: HALOT / sintaxis del relativo hebreo אֲשֶׁר שָׁם
translation_notes:
  revision_awareness: 'Coincide con la última revisión disponible: no hay cambios necesarios respecto al estado auditado en inglés, y la versión española sigue esa línea sin introducir ampliaciones no sustentadas por el hebreo.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para el nombre divino, conforme al estándar del proyecto.
  - Se preservó la forma masculina plural «los hijos de Israel» por fidelidad lexical al hebreo.
  - «Pacto» se usó de manera uniforme para בְּרִית en este versículo.
  - La puntuación y el orden sintáctico buscan claridad natural en español sin perder la estructura del original.
