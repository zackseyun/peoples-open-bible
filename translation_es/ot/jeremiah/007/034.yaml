    reason: lexical_alternative
  revision_rationale: Se corrige 'en' a 'de' para reflejar fielmente la preposición hebrea de remoción/origen; se ajusta 'será una ruina' a 'llegará a ser una ruina' para preservar el matiz de devenir; y se añade la nota faltante para la alternativa de 'sonido' en las expresiones de gozo, alineando mejor el español con el expediente auditado.
