translation:
  language: es
  text: Como en los días de tu salida de la tierra de Egipto[a], yo le mostraré maravillas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «yo les mostraré maravillas». El sufijo hebreo es singular («le»), pero puede referirse colectivamente a Israel.
    reason: alternative_reading
lexical_decisions:
- source_word: כִּימֵי
  english_pob_choice: As in the days
  chosen_spanish: Como en los días
  alternatives_spanish:
  - Tal como en los días
  - Así como en los días
  lexicon: HALOT
  rationale: El hebreo introduce una comparación temporal. «Como en los días» conserva esa relación sin volver la frase artificial en español.
- source_word: צֵאתְךָ
  english_pob_choice: when you came out
  chosen_spanish: cuando saliste
  alternatives_spanish:
  - cuando saliste al salir
  - en tu salida
  lexicon: HALOT
  rationale: El infinitivo constructo con sufijo expresa el acto de salir. «Cuando saliste» comunica de forma natural el sentido temporal y el trasfondo del éxodo.
- source_word: מֵאֶרֶץ מִצְרַיִם
  english_pob_choice: from the land of Egypt
  chosen_spanish: de la tierra de Egipto
  alternatives_spanish:
  - de Egipto
  - desde la tierra de Egipto
  lexicon: HALOT
  rationale: Se conserva la solemnidad y la formulación completa del hebreo con «de la tierra de Egipto», evitando acortar demasiado la expresión exódica.
- source_word: אַרְאֶנּוּ
  english_pob_choice: I will show him
  chosen_spanish: yo le mostraré
  alternatives_spanish:
  - yo lo mostraré
  - yo les mostraré
  lexicon: HALOT
  rationale: El verbo causativo de ver se rinde naturalmente con «mostrar». El sufijo es singular; por eso se mantiene «le» en el texto principal, preservando la tensión del singular gramatical que puede funcionar colectivamente para Israel.
- source_word: נִפְלָאוֹת
  english_pob_choice: wondrous things
  chosen_spanish: cosas maravillosas
  alternatives_spanish:
  - maravillas
  - hechos maravillosos
  - cosas prodigiosas
  lexicon: HALOT
  rationale: La forma denota actos extraordinarios que provocan asombro. «Cosas maravillosas» es amplio y fiel, sin restringir indebidamente el término a «milagros».
theological_decisions:
- issue: Referente del sufijo singular en אַרְאֶנּוּ
  english_pob_reading: Maintain the grammatical singular 'him' in the main text, understood as referring to Israel/Jacob as a collective singular in context.
  chosen_spanish_reading: Mantener el singular gramatical en «le», entendido de manera colectiva para Israel en el contexto.
  alternative_spanish_readings:
  - «les» para reflejar al pueblo como plural colectivo
  - «lo» para un objeto singular directo
  rationale: El hebreo conserva un sufijo singular, y la traducción debe respetar esa forma sin resolverla prematuramente. En contexto, la referencia puede ser colectiva, pero la redacción principal retiene la tensión textual.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica/gramatical en lugar de resolverla.'
translation_notes:
  revision_awareness: El pasaje coincide con el texto hebreo masorético y el audit trail en inglés no registra revisiones aplicadas; se mantiene la misma decisión de preservar el singular gramatical con lectura colectiva posible.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el hebreo contiene el nombre divino; aquí no aparece.
  - Se mantiene «mostrar» para אַרְאֶנּוּ siguiendo el valor causativo de ראה.
  - «Cosas maravillosas» preserva amplitud semántica sin introducir una interpretación más estrecha.
