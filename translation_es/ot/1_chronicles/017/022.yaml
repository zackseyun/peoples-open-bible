translation:
  language: es
  text: Y diste a tu pueblo Israel para que fuera tu pueblo para siempre[a], y tú, Yahvé, llegaste a ser su Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fuiste su Dios». El hebreo también puede leerse de manera más estática, pero el texto principal conserva la fuerza de establecimiento del pacto en el contexto.
    reason: alternative_reading
lexical_decisions:
- source_word: וַתִּתֵּן
  english_pob_choice: you made
  chosen_spanish: hiciste que
  alternatives_spanish:
  - diste
  - estableciste
  - nombraste
  lexicon: HALOT
  rationale: 'El hebreo נתן puede significar literalmente «dar», pero aquí, con la construcción de doble ל, expresa acción constitutiva: Dios estableció a Israel como su pueblo. «Hiciste que» transmite mejor esa fuerza causativa en español que un «diste» más literal pero ambiguo.'
- source_word: עַמְּךָ יִשְׂרָאֵל
  english_pob_choice: your people Israel
  chosen_spanish: tu pueblo, Israel
  alternatives_spanish:
  - Israel, tu pueblo
  - tu pueblo Israel
  lexicon: HALOT
  rationale: Conservo la aposición y la relación de pertenencia. La coma ayuda a leer «Israel» como identificación explicativa de «tu pueblo» sin perder la naturalidad del español.
- source_word: לְךָ לְעָם
  english_pob_choice: to be your people
  chosen_spanish: fuera tu pueblo
  alternatives_spanish:
  - como tu pueblo
  - para ser tu pueblo
  - en tu pueblo
  lexicon: HALOT
  rationale: La doble preposición expresa estado/resultante y pertenencia de pacto. En español, «fuera tu pueblo» comunica bien la constitución de identidad sin forzar una perífrasis demasiado interpretativa.
- source_word: עַד עוֹלָם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por siempre
  - para la eternidad
  - por la era
  lexicon: HALOT
  rationale: «Para siempre» es la equivalencia más natural y clara en español actual para duración perpetua.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Siguiendo la política del proyecto para el Tetragrámaton, se usa «Yahvé» como transliteración del nombre divino, preservando el nombre personal en vez de sustituirlo por un título.
- source_word: הָיִיתָ לָהֶם לֵאלֹהִים
  english_pob_choice: became their God
  chosen_spanish: llegaste a ser su Dios
  alternatives_spanish:
  - fuiste su Dios
  - eras su Dios
  - llegaste a ser Dios para ellos
  lexicon: HALOT
  rationale: El perfecto de היה aquí marca una relación de pacto establecida por la acción previa de Dios. «Llegaste a ser» conserva esa fuerza relacional e histórica mejor que el más estático «eras/fuiste su Dios».
theological_decisions:
- issue: La fórmula de pacto con היה + ל + אלהים
  english_pob_reading: became their God
  chosen_spanish_reading: llegaste a ser su Dios
  alternative_spanish_readings:
  - eras su Dios
  - fuiste su Dios
  rationale: 'La lectura principal refleja que el versículo narra la constitución histórica de la relación de pacto entre Yahvé e Israel. «Llegaste a ser» evita sonar ontológicamente cambiante y mantiene la tensión teológica del texto: no describe un cambio en Dios, sino el establecimiento de una relación covenantal.'
  doctrine_reference: Preservar la tensión teológica sin resolverla; equivalencia óptima
- issue: Nombre divino en el contexto de cita/teología de pacto
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  rationale: El contexto presenta el nombre propio en una declaración de pacto; por ello se conserva el nombre revelado en vez de ocultarlo tras un título. Esto mantiene la audibilidad del nombre divino en la línea argumental de la oración.
  doctrine_reference: Tetragrámaton como nombre personal de Dios; política editorial POB
translation_notes:
  revision_awareness: 'La redacción sigue el recorrido auditado del POB en inglés: se mantiene la lectura dinámica de נתן como acción constitutiva («hiciste que»), la identidad appositiva «tu pueblo, Israel», la duración perpetua de עַד עוֹלָם como «para siempre», el nombre divino como «Yahvé», y la fórmula de pacto final con una solución verbal que preserve tanto el establecimiento relacional como la alternativa estática documentada en la nota.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה según la terminología del proyecto.
  - Se evita «Cristo» y otras sustituciones no presentes en el verso.
  - «Pueblo» conserva el valor colectivo y de pertenencia del hebreo עַם sin convertirlo en una paráfrasis eclesial.
  - La nota [a] se ancla solo en la cláusula final porque es el único lugar donde la alternativa estática tiene relevancia textual.
