id: HOS.2.25
reference: Hosea 2:25
source:
  edition: WLC
  text: וּ/זְרַעְתִּ֤י/הָ לִּ/י֙ בָּ/אָ֔רֶץ וְ/רִֽחַמְתִּ֖י אֶת לֹ֣א רֻחָ֑מָה וְ/אָמַרְתִּ֤י לְ/לֹֽא עַמִּי֙ עַמִּ/י אַ֔תָּה וְ/ה֖וּא יֹאמַ֥ר אֱלֹהָֽ/י־־־׃פ
translation:
  text: And I will sow her for myself in the land[a], and I will have mercy on No Mercy, and I will say to Not My People, ‘You are my people,’ and he will say[c][b], ‘My God.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew names traditionally transliterated Lo-ruhamah and Lo-ammi; here translated 'No Mercy' and 'Not My People' to preserve the wordplay of judgment reversed into restoration.
    reason: alternative_reading
  - marker: b
    text: Or 'in the earth.' The Hebrew can mean either 'land' or 'earth'; 'land' fits Hosea's covenant-restoration context more specifically.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'and he will say.' The singular masculine likely personifies the restored people as a single respondent.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּזְרַעְתִּיהָ
  chosen: I will sow her
  alternatives:
  - I will plant her
  - I will scatter her
  lexicon: HALOT
  rationale: From זרע in the agricultural sense, here metaphorically reversing judgment into restoration. 'Sow' preserves the wordplay with Jezreel and the covenant-restoration imagery better than the more generic 'plant.' The 3fs suffix is retained as 'her,' referring to the restored people/land imagery.
- source_word: לִּי
  chosen: for myself
  alternatives:
  - for me
  lexicon: HALOT
  rationale: The dative marks benefit or possession. 'For myself' brings out Yahweh's reclaiming action more clearly in idiomatic English.
- source_word: בָּאָרֶץ
  chosen: in the land
  alternatives:
  - in the earth
  lexicon: HALOT
  rationale: אֶרֶץ can mean 'earth' or 'land.' In Hosea's covenantal and territorial context, 'the land' is more natural and contextually specific than the cosmic 'earth.'
- source_word: וְרִחַמְתִּי
  chosen: I will show mercy
  alternatives:
  - I will have compassion
  - I will love tenderly
  lexicon: HALOT
  rationale: From רחם, denoting compassion/mercy. 'Show mercy' is clear modern English and preserves the reversal of Lo-ruhamah's name.
- source_word: לֹא רֻחָמָה
  chosen: No Mercy
  alternatives:
  - Not Shown Mercy
  - Unpitied
  - Lo-ruhamah
  lexicon: HALOT
  rationale: This is the symbolic personal name from Hosea. Translating it preserves the prophetic wordplay for English readers. 'No Mercy' is concise and matches the reversal in the next clause.
- source_word: וְאָמַרְתִּי
  chosen: I will say
  alternatives:
  - I will declare
  lexicon: HALOT
  rationale: Simple speech verb; 'say' is sufficient and closest to the Hebrew.
- source_word: לְלֹא עַמִּי
  chosen: to Not My People
  alternatives:
  - to Lo-ammi
  lexicon: HALOT
  rationale: Another symbolic name. Translating the name preserves the rhetorical reversal and keeps the prophetic naming transparent in English.
- source_word: עַמִּי אַתָּה
  chosen: You are my people
  alternatives:
  - You are my own people
  lexicon: HALOT
  rationale: Direct covenant formula. The Hebrew is singular masculine ('you' singular), but in English the singular/plural distinction is not marked; the covenantal sense is preserved without artificial archaism.
- source_word: וְהוּא יֹאמַר
  chosen: and he will say
  alternatives:
  - and it will say
  - and they will say
  lexicon: HALOT
  rationale: The Hebrew is grammatically singular masculine. Retaining 'he' best reflects the source form and the personified singular addressee, even though the referent is corporately Israel.
- source_word: אֱלֹהָי
  chosen: My God
  alternatives:
  - my God
  lexicon: HALOT
  rationale: Standard covenant confession. Capitalization follows English convention for the God of Israel.
