translation:
  language: es
  text: Queden avergonzados y aterrados para siempre[a]; queden deshonrados y perezcan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «queden avergonzados ... queden humillados»; el hebreo usa dos términos estrechamente relacionados de vergüenza (בוש, חפר) con un matiz ligeramente distinto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יֵבֹשׁוּ
  english_pob_choice: let them be put to shame
  chosen_spanish: queden avergonzados
  alternatives_spanish:
  - que sean avergonzados
  - queden confundidos
  lexicon: HALOT
  rationale: El verbo בוש expresa vergüenza o quedar avergonzado en un marco de juicio. «Queden avergonzados» conserva el valor resultativo y la fuerza imprecatoria del jussivo, sin volverlo una mera descripción futura.
- source_word: וְיִבָּהֲלוּ
  english_pob_choice: and terrified
  chosen_spanish: y aterrados
  alternatives_spanish:
  - y amedrentados
  - y consternados
  - y aterrorizados
  lexicon: HALOT
  rationale: בהל puede abarcar sobresalto, desasosiego o terror. En este contexto hostil, «aterrados» comunica bien la intensidad sin añadir más de lo que exige el hebreo.
- source_word: עֲדֵי עַד
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por siempre
  - eternamente
  - para perpetuidad
  lexicon: HALOT
  rationale: La expresión intensifica la duración. «Para siempre» es la equivalencia natural y clara en español moderno, y mantiene el tono solemne del salmo.
- source_word: וְיַחְפְּרוּ
  english_pob_choice: let them be disgraced
  chosen_spanish: queden deshonrados
  alternatives_spanish:
  - queden humillados
  - queden avergonzados
  lexicon: HALOT
  rationale: חפר puede solaparse con el campo de la vergüenza, pero no es idéntico a בוש. «Deshonrados» preserva un matiz de humillación pública distinto del primer miembro.
- source_word: וְיֹאבֵדוּ
  english_pob_choice: and perish
  chosen_spanish: y perezcan
  alternatives_spanish:
  - y sean destruidos
  - y perezcan del todo
  lexicon: HALOT
  rationale: אבד suele significar perecer o ser destruido. «Perezcan» es conciso, natural en un contexto de imprecación y suficientemente amplio para no especificar el modo de destrucción.
theological_decisions:
- issue: Fuerza imprecatoria de los imperfectos
  english_pob_reading: Render the imperfects as English jussives with 'let them'
  chosen_spanish_reading: 'Reproducir los imperfectos como exhortación/imprecación con subjuntivo: «Queden...», «perezcan».'
  alternative_spanish_readings:
  - Quedarán avergonzados y aterrados para siempre; quedarán deshonrados y perecerán.
  - Que sean avergonzados y aterrados para siempre; que sean deshonrados y perezcan.
  rationale: En este contexto los imperfectos no funcionan simplemente como futuro, sino como petición o deseo de juicio. El subjuntivo imperativo en español conserva mejor esa fuerza que un futuro narrativo.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve the source text''s plain sense'
translation_notes:
  revision_awareness: 'La versión inglesa más reciente añadió «be» antes de «terrified» por fluidez paralela; la redacción española ya refleja esa paralelismo con dos miembros coordinados: «Queden avergonzados y aterrados...; queden deshonrados y perezcan».'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto solo cuando el texto lo requiera; este versículo no nombra explícitamente el tetragrámaton, así que no aplica.
  - Se evitó «SEÑOR» porque no hay aquí un reemplazo del nombre divino, sino una imprecación concluyente.
  - 'Se preservó el contraste entre los dos verbos de vergüenza: «avergonzados» para בוש y «deshonrados» para חפר, siguiendo la distinción observada en la auditoría inglesa.'
