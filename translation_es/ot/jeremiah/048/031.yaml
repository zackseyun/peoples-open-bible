translation:
  language: es
  text: Por tanto, sobre Moab gemiré; por todo Moab clamaré; por los hombres de Quir-Jeres[a], uno gime[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'los hombres de Quir-Jareset'. El nombre del lugar aparece aquí como Quir-Jeres, mientras que en pasajes paralelos se encuentra una forma relacionada más completa.
    reason: alternative_reading
  - marker: b
    text: 'La cláusula final es difícil. También puede entenderse: ''por los hombres de Quir-Jeres gimo'' o ''él gime por los hombres de Quir-Jeres''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲיֵלִיל
  english_pob_choice: I will wail
  chosen_spanish: aullaré
  alternatives_spanish:
  - lamentaré
  - gemiré
  lexicon: HALOT
  rationale: El verbo hebreo expresa lamento intenso y sonoro. En español, 'aullar' conserva bien la fuerza del grito fúnebre y mantiene la intensidad del inglés POB 'wail' sin suavizarla con 'lamentaré'.
- source_word: אֶזְעָק
  english_pob_choice: I will cry out
  chosen_spanish: gritaré
  alternatives_spanish:
  - clamaré
  - gritaré en voz alta
  lexicon: HALOT
  rationale: זעק denota un clamor fuerte, a menudo de angustia. 'Gritaré' reproduce ese carácter audible y distingue este verbo del anterior, evitando fusionar ambos lamentos en una sola idea.
- source_word: כֻּלֹּה
  english_pob_choice: all
  chosen_spanish: todo
  alternatives_spanish:
  - todo
  - entero
  lexicon: HALOT
  rationale: 'La forma con לְמוֹאָב tiene sentido colectivo: ''por todo Moab''. ''Todo'' es la opción más natural en español y conserva el alcance total del lamento.'
- source_word: אֶל
  english_pob_choice: for
  chosen_spanish: por
  alternatives_spanish:
  - para
  - sobre
  - con respecto a
  lexicon: HALOT
  rationale: En este contexto de duelo, la preposición funciona de manera idiomática como marco del lamento dirigido a/por ellos. 'Por' es natural en español y refleja la orientación afectiva del llanto.
- source_word: אַנְשֵׁי קִיר חֶרֶשׂ
  english_pob_choice: the men of Kir-heres
  chosen_spanish: los hombres de Quir-Jeres
  alternatives_spanish:
  - la gente de Quir-Jeres
  - los hombres de Quir-Jareset
  lexicon: HALOT
  rationale: אַנְשֵׁי significa literalmente 'hombres de'. Se conserva el valor masculino por fidelidad léxica. El topónimo se vierte 'Quir-Jeres' siguiendo la transliteración del hebreo en este versículo.
- source_word: יֶהְגֶּה
  english_pob_choice: one moans
  chosen_spanish: uno gime
  alternatives_spanish:
  - él gime
  - se gime
  lexicon: HALOT
  rationale: הגה puede expresar un gemido o murmullo bajo. La sintaxis es difícil y el hebreo es breve; 'uno gime' conserva el carácter impersonal del inglés POB y evita identificar indebidamente al sujeto.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el hebreo masorético y el criterio auditado del POB inglés: dos verbos distintos de duelo (''aullaré'' / ''gritaré''), preposición idiomática en clave de lamento (''por''), y final de cláusula deliberadamente sobrio por la dificultad sintáctica del hebreo. Se mantiene la alternativa textual del topónimo y la ambigüedad de יֶהְגֶּה en nota.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el tetragrámaton aparezca; este versículo no lo contiene.
  - 'Se preserva la distinción entre dos actos de lamento: uno más visceral (''aullaré'') y otro de clamor (''gritaré'').'
  - '''Quir-Jeres'' sigue la transliteración interna adoptada para este pasaje, con nota sobre la forma relacionada en paralelo.'
  - No se neutraliza 'אַנְשֵׁי'; se mantiene 'los hombres de' por fidelidad léxica y consistencia con la política de precisión del proyecto.
