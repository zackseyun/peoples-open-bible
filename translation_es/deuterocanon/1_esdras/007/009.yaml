    reason: cross_reference
  revision_rationale: Se ajusta ἐστολισμένοι a «dispuestos» para reflejar preparación/colocación sin duplicar la noción de orden ya presente en «por divisiones». Se cambia «porteros» por «guardias de las puertas» para representar con mayor precisión θυρωροί en contexto de servicio del templo. El resto del versículo y las notas se conservan por ser fieles al griego y al rastro POB en inglés.
