review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido del hebreo: selección de entre el pueblo, cualificaciones morales, y nombramiento en niveles administrativos. Sin embargo, no sigue del todo el rastro auditado del POB inglés en dos puntos importantes: אַנְשֵׁי חַיִל fue revisado en inglés a ''able men'', por lo que ''hombres capaces'' se aparta de la elección final documentada; y la nota [c] en español repite el texto principal en vez de preservar la alternativa del inglés (''ganancia injusta'' / ''ganancia deshonesta'').'
  spanish_quality_summary: El español es claro y digno, pero tiene algunas asperezas léxicas. 'Hombres aptos' en la nota [a] suena menos natural que 'hombres capaces'; 'centenas' y especialmente 'cincuentas' no son la forma más natural en un texto bíblico eclesial amplio. 'Jefes de miles... de cientos... de cincuenta... de diez' fluye mejor que 'millares... centenas... cincuentas... decenas', aunque el texto actual sigue siendo comprensible. También conviene ajustar la concordancia de la relativa en la serie de cualificaciones para mantener paralelismo y naturalidad.
  glossary_alignment: 'No hay conflicto con términos teológicos principales del proyecto. ''Dios'' para אֱלֹהִים es correcto. El mantenimiento del masculino plural está bien alineado con la decisión doctrinal. La principal desalineación es auditiva/lexical: el inglés POB final eligió ''able men'', y en español conviene algo más cercano como ''hombres capaces'' o ''hombres aptos''; de esas, ''hombres capaces'' es mejor español, pero la nota debe reflejar correctamente las alternativas y la razón. También la nota de בָצַע debe preservar la alternativa real, no duplicar el texto principal.'
  issues:
  - severity: medium
    issue: La nota [c] duplica esencialmente el texto principal.
    rationale: El texto principal usa 'ganancia injusta', y la nota [c] ofrece otra vez 'ganancia injusta' en lugar de una alternativa real. El audit trail inglés preserva como alternativa 'ganancia deshonesta' o similar, por lo que la nota actual falla en su función.
  - severity: low
    issue: La nota [a] usa 'hombres aptos', menos natural como primera alternativa.
    rationale: No es un error de fidelidad, pero 'hombres aptos' suena más técnico y menos idiomático que 'hombres capaces'/'hombres de valor'. La nota debe sonar natural y reflejar bien el campo semántico.
  - severity: medium
    issue: La serie numérica 'millares... centenas... cincuentas... decenas' es poco natural en español bíblico general.
    rationale: Aunque semánticamente entendible, 'cincuentas' resulta especialmente torpe. 'Miles, cientos, cincuenta y diez' o 'grupos de...' suena mejor y sigue siendo fiel al hebreo.
  revised_spanish_text: Pero tú escogerás de entre todo el pueblo hombres capaces[a], temerosos de Dios, hombres de verdad[b], que aborrezcan la ganancia injusta[c]; y los pondrás sobre ellos como jefes de miles, jefes de cientos, jefes de cincuenta y jefes de diez.
  revised_footnotes:
  - marker: a
    text: O ‘hombres aptos’ o ‘hombres de valor’. La expresión hebrea puede denotar fuerza, competencia o valor, según el contexto.
    reason: lexical_alternative
  - marker: b
    text: O ‘hombres confiables’ para ‘hombres de verdad’.
    reason: lexical_alternative
  - marker: c
    text: O ‘que aborrezcan la ganancia deshonesta’; la frase se refiere al rechazo de la ganancia corrupta.
    reason: lexical_alternative
  revision_rationale: 'Se conserva la traducción base por su fidelidad general al hebreo, pero se corrigen tres aspectos: (1) la nota [c] ahora ofrece una alternativa real alineada con el POB inglés; (2) se mejora la naturalidad de la jerarquía numérica en español cambiando ''millares/centenas/cincuentas/decenas'' por ''miles/cientos/cincuenta/diez''; y (3) se mantiene ''hombres capaces'' en el texto por ser el español más natural y fiel al sentido administrativo de אַנְשֵׁי חַיִל, mientras la nota preserva otras posibilidades.'
