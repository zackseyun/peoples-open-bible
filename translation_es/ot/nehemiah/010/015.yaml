review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja correctamente la estructura básica del hebreo: una etiqueta colectiva seguida por una lista de nombres propios. «los jefes del pueblo» comunica bien el sentido idiomático de רָאשֵׁי הָעָם, aunque el rastro POB inglés preserva más de cerca la metáfora con «heads». Los nombres Parosh, Elam y Bani están bien conservados. Sin embargo, hay dos problemas de transliteración frente al hebreo y al rastro auditado: פַּחַת מוֹאָב debe representarse de forma consistente como un nombre compuesto mejor atestiguado como «Pahat-moab», y זַתּוּא no debe reducirse a «Zatu»; la forma auditada y más fiel al hebreo es «Zattu».'
  spanish_quality_summary: El español es claro y legible. «los jefes del pueblo» suena natural en español eclesial general. La nota al pie necesita corregirse porque actualmente repite la opción principal como alternativa («jefes del pueblo») y además la formulación literal «las cabezas del pueblo» conviene presentarla solo como literal, no como texto principal. La puntuación y el formato de la lista son adecuados.
  glossary_alignment: 'No hay términos teológicos sensibles en este versículo. La decisión para רָאשֵׁי puede mantenerse como «jefes» por naturalidad española, con nota que preserve la alternativa más literal «cabezas». Los nombres propios deben alinearse mejor con la transliteración auditada: «Pahat-moab» y «Zattu».'
  issues:
  - severity: medium
    issue: Transliteración de זַתּוּא como «Zatu»
    rationale: La forma hebrea contiene consonante geminada representada en el rastro inglés como «Zattu». Reducirla a «Zatu» se aparta innecesariamente de la forma auditada y de la transliteración más fiel.
  - severity: low
    issue: Nota al pie mal formulada para רָאשֵׁי
    rationale: La nota dice «O “jefes del pueblo” o “líderes del pueblo”», pero «jefes del pueblo» ya es el texto principal. La nota debe ofrecer alternativas reales, idealmente «cabezas del pueblo» y/o «líderes del pueblo».
  - severity: low
    issue: Consistencia del nombre compuesto פַּחַת מוֹאָב
    rationale: 'Aunque «Pahat-moab» es aceptable en español, conviene capitalizar la segunda parte como nombre propio compuesto: «Pahat-Moab», mejorando claridad onomástica sin alterar el sentido.'
  revised_spanish_text: 'los jefes del pueblo: Parosh[a], Pahat-Moab, Elam, Zattu, Bani.'
