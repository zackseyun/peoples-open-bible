review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien la secuencia profética de וְעָמַד como «Entonces se levantará» y transmite adecuadamente מֶלֶךְ גִּבּוֹר como «un rey poderoso». También preserva la idea de ejercer dominio en וּמָשַׁל. Sin embargo, «dominará con gran dominio» suena innecesariamente pesado en español, y la nota al pie está anclada en «poderoso» aunque corresponde al segmento final וְעָשָׂה כִּרְצוֹנוֹ.
  spanish_quality_summary: El texto es comprensible, pero «dominará con gran dominio» resulta poco natural por la repetición cercana de la misma raíz en verbo y sustantivo. Una formulación como «ejercerá un gran dominio» conserva mejor la fuerza cognada del hebreo con español más fluido. Además, la nota debe colocarse sobre la cláusula final, no sobre «poderoso».
  glossary_alignment: No hay conflictos con la terminología proyectual principal. «Rey poderoso» es aceptable para גִּבּוֹר. La mejoría propuesta mantiene el valor de משל / מִמְשָׁל sin caer en paráfrasis. «Hará según su voluntad» es fiel, y puede conservarse con nota alternativa.
  issues:
  - severity: medium
    issue: La nota al pie está anclada en la palabra equivocada.
    rationale: La alternativa documentada en inglés («and do according to his will») corresponde a וְעָשָׂה כִּרְצוֹנוֹ, no a «rey poderoso». El marcador debe aparecer en la cláusula final.
  - severity: medium
    issue: «Dominará con gran dominio» es poco natural en español.
    rationale: Aunque formalmente cercano al hebreo, la combinación repite una misma raíz de modo torpe. «Ejercerá un gran dominio» o «gobernará con gran dominio» conserva el sentido con mejor legibilidad.
  revised_spanish_text: Entonces se levantará un rey poderoso, y ejercerá un gran dominio y hará según su voluntad[a].
  revised_footnotes:
  - marker: a
    text: 'O: «hará conforme a su voluntad».'
    reason: lexical_alternative
  revision_rationale: Se corrige la ubicación de la nota para que corresponda al segmento fuente correcto y se mejora la naturalidad de la construcción sobre משל / מִמְשָׁל sin perder el énfasis del hebreo. Se conserva «hará según su voluntad» como traducción principal por su fidelidad léxica y tono digno.
