revisions:
- from: 'Porque las aguas de Dimón están llenas de sangre[a], porque pondré más[b] sobre Dimón: un león[c] sobre los fugitivos de Moab y sobre el remanente de la tierra.'
  to: 'Porque las aguas de Dimón están llenas de sangre[a], porque pondré más[b] sobre Dimón: un león[c] sobre los fugitivos de Moab y sobre el remanente de la tierra de Moab.'
  rationale: Se hace un ajuste menor para mejorar la claridad contextual de אֲדָמָה en español. ‘La tierra de Moab’ comunica mejor el sentido territorial local del oráculo que ‘la tierra’, que en español puede sonar demasiado general. El resto del borrador es fiel al hebreo y a la auditoría inglesa.
