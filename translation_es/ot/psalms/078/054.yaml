revisions:
- from: Y los llevó hasta su santo límite,[a] esta montaña que su mano derecha adquirió.[b][c][d]
  to: Así los llevó a su santa frontera,[a] esta montaña[b] que su mano derecha adquirió.[c][d]
  rationale: Se ajusta «Y» a «Así» para reflejar mejor la decisión discursiva del POB; se reemplaza «santo límite» por «santa frontera» por mayor naturalidad y mejor ajuste al texto auditado final; y se corrige la nota d para preservar la redacción previa documentada con «territorio» en lugar de duplicar prácticamente el texto principal.
