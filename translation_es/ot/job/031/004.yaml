lexical_decisions:
- source_word: הֲלֹא
  english_pob_choice: Does ... not
  chosen_spanish: ¿No ... ?
  alternatives_spanish:
  - ¿Acaso no ... ?
  - ¿No es que ... ?
  lexicon: HALOT
  rationale: La partícula introduce una pregunta retórica que espera respuesta afirmativa. En español, la inversión interrogativa con «¿No ...?» reproduce con naturalidad esa fuerza retórica sin añadir matices ajenos.
- source_word: הוּא
  english_pob_choice: he
  chosen_spanish: él
  alternatives_spanish:
  - él mismo
  lexicon: HALOT
  rationale: El pronombre independiente añade énfasis. «Él» conserva la referencia y suena natural; «él mismo» reforzaría más de lo que exige el hebreo en este verso.
- source_word: יִרְאֶה
  english_pob_choice: see
  chosen_spanish: ve
  alternatives_spanish:
  - mira
  - observa
  lexicon: HALOT
  rationale: El verbo ראה aquí expresa percepción y escrutinio. «Ve» mantiene la imagen concreta y la carga teológica sin convertirla en una paráfrasis doctrinal.
- source_word: דְרָכַי
  english_pob_choice: my ways
  chosen_spanish: mis caminos
  alternatives_spanish:
  - mi camino
  - mi conducta
  lexicon: HALOT
  rationale: «Caminos» conserva el plural hebreo y la metáfora del modo de vida. «Conducta» sería más explicativo, pero menos fiel a la imagen original.
- source_word: וְכָל
  english_pob_choice: and all
  chosen_spanish: y todos
  alternatives_spanish:
  - e incluso todos
  lexicon: HALOT
  rationale: La conjunción suma la totalidad de los actos o movimientos. «Y todos» preserva la secuencia simple y acumulativa del hebreo.
- source_word: צְעָדַי
  english_pob_choice: my steps
  chosen_spanish: mis pasos
  alternatives_spanish:
  - mis huellas
  - mis andares
  lexicon: HALOT
  rationale: «Pasos» es la equivalencia más natural y conserva la metáfora de cada movimiento individual bajo observación divina.
- source_word: יִסְפּוֹר
  english_pob_choice: count
  chosen_spanish: cuenta
  alternatives_spanish:
  - numera
  - lleva la cuenta de
  lexicon: HALOT
  rationale: El verbo ספר significa contar/numeroar. «Cuenta» es la forma más idiomática en español y mantiene la imagen de cómputo exacto.
theological_decisions:
- issue: Imagen antropomórfica de vigilancia divina
  english_pob_reading: Render the verse as a rhetorical affirmation that God sees and counts Job's ways and steps, without expanding into doctrinal paraphrase about omniscience.
  chosen_spanish_reading: El verso se traduce como una afirmación retórica de que Dios ve y cuenta los caminos y pasos de Job, sin explicitar una formulación doctrinal abstracta sobre la omnisciencia.
  alternative_spanish_readings:
  - ¿No observa mi conducta y lleva cuenta de todas mis acciones?
  - ¿No registra él mis actos y examina mi vida?
  rationale: El hebreo usa imágenes concretas de ver y contar. La traducción conserva esa imaginería y su peso teológico, evitando reemplazarla por una abstracción que borre la tensión literaria del texto.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios; esta versión mantiene el sentido y la estructura retórica del hebreo, ajustando solo la formulación española para leer con naturalidad y con el ancla de nota correctamente insertada.
  spanish_consistency_notes:
  - Se mantiene «Dios» implícito por el contexto inmediato; el pronombre «él» conserva la referencia del hebreo.
  - «Caminos» y «pasos» preservan la metáfora plural y acumulativa del original.
  - La nota alternativa está anclada en el texto para evitar ambigüedad de validación.
