  text: וְ/עָלָ֨ה הַ/גְּב֜וּל גֵּ֣י בֶן הִנֹּ֗ם אֶל כֶּ֤תֶף הַ/יְבוּסִי֙ מִ/נֶּ֔גֶב הִ֖יא יְרֽוּשָׁלִָ֑ם וְ/עָלָ֨ה הַ/גְּב֜וּל אֶל רֹ֣אשׁ הָ/הָ֗ר אֲ֠שֶׁר עַל פְּנֵ֤י גֵֽי הִנֹּם֙ יָ֔מָּ/ה אֲשֶׁ֛ר בִּ/קְצֵ֥ה עֵֽמֶק רְפָאִ֖ים צָפֹֽנָ/ה־־־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/joshua/015/008.yaml
  text: Then the border went up by the Valley of Ben-hinnom to the slope of the Jebusite on the south (that is[a], Jerusalem), and the border went up to the top of the mountain that lies west of the Valley of Hinnom[c][b], at the northern end of the Valley of Rephaim.
  footnotes:
  - marker: a
    text: Hebrew 'the shoulder of the Jebusite'; here 'slope' renders the topographical sense of 'shoulder.'
    reason: lexical_alternative
  - marker: b
    text: Or 'it is Jerusalem.' The Hebrew explicitly identifies 'the Jebusite' with Jerusalem.
    reason: alternative_reading
  - marker: c
    text: Hebrew 'toward the sea,' a standard idiom for 'west.'
    reason: lexical_alternative
