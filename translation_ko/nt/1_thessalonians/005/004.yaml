translation:
  language: ko
  text: 그러나 형제[a] 여러분, 여러분은 어둠 가운데 있지 않으니, 그 날[b]이 도둑처럼 여러분을 덮치지 못할 것입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 포괄적 의미로 「형제자매」.
    reason: lexical_alternative
  - marker: b
    text: 곧 직전 문맥의 「주의 날」.
    reason: cross_reference
lexical_decisions:
- source_word: οὐκ ἐστὲ ἐν σκότει
  english_pob_choice: are not in darkness
  chosen_korean: 어둠 가운데 있지 않으니
  alternatives_korean:
  - 어둠 속에 있지 않으니
  - 어둠 안에 있지 않으니
  lexicon: BDAG
  rationale: 「가운데」가 영적 상태의 처소를 자연스럽게 표현한다.
- source_word: ἵνα ἡ ἡμέρα ὑμᾶς ὡς κλέπτης καταλάβῃ
  english_pob_choice: so that the day would overtake you like a thief
  chosen_korean: 그 날이 도둑처럼 여러분을 덮치지 못할 것입니다
  alternatives_korean:
  - 그 날이 도둑같이 여러분을 갑자기 임하지 못할 것입니다
  - 그 날이 도둑같이 여러분을 사로잡지 못할 것입니다
  lexicon: BDAG
  rationale: καταλαμβάνω의 「갑자기 사로잡음·덮침」을 「덮치다」로 옮긴다. 본 절의 ἵνα는 결과적 의미가 강해 한국어 「~ 못할 것입니다」로 자연스럽게 풀어낸다.
