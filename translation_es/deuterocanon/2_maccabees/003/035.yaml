    text: Or 'making the greatest prayers'; the Greek word can mean 'prayers' or 'vows,' but 'vows' fits the sacrificial setting better.
    reason: lexical_alternative
  - marker: b
    text: Or 'after bidding Onias farewell.' The Greek verb can also mean 'receive' or 'welcome,' but the departure context favors a leave-taking sense.
    reason: lexical_alternative
  - marker: c
    text: The Greek verb is military in flavor, literally suggesting a return march or breaking camp.
    reason: cultural_note
