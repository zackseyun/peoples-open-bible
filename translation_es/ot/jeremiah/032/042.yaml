translation:
  language: es
  text: 'Porque así dice Yahvé: Así como hice venir sobre este pueblo todo este gran desastre[a], así traeré sobre ellos todo el bien[b] que les he hablado.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «calamidad». El hebreo רָעָה aquí designa una catástrofe de juicio, no mal moral en Dios.
    reason: lexical_alternative
  - marker: b
    text: 'O «que les he prometido». Hebreo más literalmente: «que estoy hablando concerning/ acerca de ellos», es decir, lo que Yahvé ha declarado respecto de ellos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el principio del proyecto de reproducir el nombre divino con una forma transparente y no sustitutiva. «Yahvé» preserva el nombre del pacto y evita el ocultamiento convencional del hebreo.
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la fundamentación de la declaración profética. En español, «Porque» expresa bien la relación explicativa sin forzar una traducción demasiado literal.
- source_word: כֹה אָמַר
  english_pob_choice: thus says
  chosen_spanish: así dice
  alternatives_spanish:
  - así ha dicho
  - esto dice
  lexicon: HALOT
  rationale: Es la fórmula profética estándar. «Así dice» es natural en español y conserva la autoridad inmediata del anuncio.
- source_word: כַּאֲשֶׁר ... כֵּן
  english_pob_choice: Just as ... so
  chosen_spanish: Así como ... así
  alternatives_spanish:
  - Como ... así
  - Del mismo modo que ... así
  lexicon: HALOT
  rationale: Mantiene el paralelismo explícito entre el juicio pasado y el bien prometido.
- source_word: הֵבֵאתִי
  english_pob_choice: I brought on
  chosen_spanish: yo traje sobre
  alternatives_spanish:
  - yo hice venir sobre
  - yo traje
  lexicon: HALOT
  rationale: El hiphil con el marco de juicio comunica que Yahvé hizo venir el desastre sobre el pueblo. «Traje sobre» conserva la agencia divina y la direccionalidad del hebreo.
- source_word: אֶל הָעָם הַזֶּה
  english_pob_choice: on this people
  chosen_spanish: sobre este pueblo
  alternatives_spanish:
  - a este pueblo
  - contra este pueblo
  lexicon: HALOT
  rationale: En español, con sustantivos de calamidad, «sobre» transmite mejor el impacto que «a». «Contra» sería más polémico y menos cercano al paralelo del verso.
- source_word: כָּל הָרָעָה הַגְּדוֹלָה הַזֹּאת
  english_pob_choice: all this great disaster
  chosen_spanish: todo este gran desastre
  alternatives_spanish:
  - todo este gran mal
  - toda esta gran calamidad
  lexicon: HALOT
  rationale: Se evita «mal» por su posible carga moral aplicada a Dios. «Desastre» comunica la catástrofe judicial del contexto y preserva la tensión léxica del hebreo.
- source_word: מֵבִיא
  english_pob_choice: I will bring on
  chosen_spanish: traeré
  alternatives_spanish:
  - estoy trayendo
  - voy a traer
  lexicon: HALOT
  rationale: El participio hebreo expresa certeza y cercanía profética. En español, el futuro simple comunica con naturalidad esa promesa segura sin perder el valor prospectivo.
- source_word: עֲלֵיהֶם
  english_pob_choice: on them
  chosen_spanish: sobre ellos
  alternatives_spanish:
  - a ellos
  - contra ellos
  lexicon: HALOT
  rationale: Con el verbo de traer/poner, «sobre ellos» reproduce el valor de impacto o recaída del hebreo y sostiene el paralelismo con la primera cláusula.
- source_word: כָּל הַטּוֹבָה
  english_pob_choice: all the good
  chosen_spanish: todo el bien
  alternatives_spanish:
  - toda la bondad
  - toda la prosperidad
  - toda la bendición
  lexicon: HALOT
  rationale: «Bien» es suficientemente amplio para abarcar los beneficios prometidos sin restringir el sentido a prosperidad material o a una sola categoría teológica.
- source_word: אֲשֶׁר אָנֹכִי דֹּבֵר עֲלֵיהֶם
  english_pob_choice: that I am speaking concerning them
  chosen_spanish: que yo estoy hablando acerca de ellos
  alternatives_spanish:
  - que yo estoy prometiendo a ellos
  - que yo he hablado sobre ellos
  lexicon: HALOT
  rationale: Se conserva la literalidad básica de «hablando» y de la preposición «acerca de», evitando sustituir el verbo por «prometiendo» sin señalarlo. La formulación española sigue el valor explícito del hebreo.
theological_decisions:
- issue: רָעָה aplicado a la acción de Yahvé
  english_pob_reading: disaster
  chosen_spanish_reading: desastre
  alternative_spanish_readings:
  - mal
  - calamidad
  rationale: La oposición del versículo es entre juicio pasado y bien futuro. «Desastre» comunica la catástrofe del juicio sin implicar mal moral en Dios, preservando la tensión teológica del hebreo y del audit trail inglés.
  doctrine_reference: Principio de primacía de la fuente original; evitar resolver una tensión teológica que el texto mantiene
- issue: Valor del participio מֵבִיא en contexto profético
  english_pob_reading: I will bring on
  chosen_spanish_reading: traeré
  alternative_spanish_readings:
  - estoy trayendo
  - traigo
  rationale: El participio expresa certeza profética y puede sonar presente o futuro según el español. El futuro simple da una lectura natural y segura en español, acorde con la revisión inglesa más reciente.
  doctrine_reference: Coherencia aspecto-tiempo en traducción profética
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente al expresar el segundo verbo principal en futuro («traeré») y conserva la equivalencia paralela con el primer miembro. También mantiene la decisión auditada de traducir רָעָה como «desastre» para evitar una implicación de mal moral en Yahvé.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma uniforme para el nombre divino, conforme al estándar del proyecto.
  - «Todo el bien» se conserva amplio y no se reduce a «prosperidad» o «bendición», para no estrechar el alcance del hebreo טוֹבָה.
  - La cláusula final usa «hablando acerca de ellos» para respetar el verbo explícito y la preposición del hebreo, en lugar de sustituirlos por una paráfrasis más interpretativa.
