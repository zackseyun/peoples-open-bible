translation:
  language: es
  text: Porque he oído el murmullo de muchos[a]—¡terror por todas partes!—mientras conspiraban juntos contra mí, tramaban quitarme la vida.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la murmuración de muchos». El sustantivo hebreo puede referirse a murmullo, rumor o habla difamatoria.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: En este contexto introduce la causa o explicación del temor del salmista. «Porque» conserva esa fuerza explicativa de manera natural en español.
- source_word: שָׁמַעְתִּי
  english_pob_choice: I have heard
  chosen_spanish: he oído
  alternatives_spanish:
  - he escuchado
  - oí
  lexicon: HALOT
  rationale: El perfecto expresa una experiencia ya recibida con efecto presente; «he oído» reproduce bien esa vigencia sin sonar forzado.
- source_word: דִּבַּת
  english_pob_choice: the whispering
  chosen_spanish: el murmullo
  alternatives_spanish:
  - la murmuración
  - la difamación
  - el rumor
  lexicon: HALOT
  rationale: El sustantivo puede abarcar susurro, rumor o habla difamatoria. «Murmullo» conserva la idea de habla baja y hostil, y deja abierta la alternativa de una connotación difamatoria, que se explica en la nota.
- source_word: רַבִּים
  english_pob_choice: of many
  chosen_spanish: de muchos
  alternatives_spanish:
  - de mucha gente
  lexicon: HALOT
  rationale: Es una pluralidad simple usada sustantivamente. «De muchos» es conciso y fiel.
- source_word: מָגוֹר מִסָּבִיב
  english_pob_choice: terror on every side
  chosen_spanish: terror por todas partes
  alternatives_spanish:
  - terror alrededor
  - miedo por todas partes
  lexicon: HALOT
  rationale: Se trata de una expresión idiomática compacta para un temor envolvente. «Terror por todas partes» comunica la imagen de manera clara y natural en español.
- source_word: בְּהִוָּסְדָם
  english_pob_choice: as they conspired
  chosen_spanish: Mientras conspiraban
  alternatives_spanish:
  - cuando se reunían en consejo
  - al concertarse
  lexicon: HALOT
  rationale: El trasfondo es de consulta hostil o conspiración. «Mientras conspiraban» transmite la acción coordinada y adversarial sin sobreexplicar.
- source_word: יַחַד
  english_pob_choice: together
  chosen_spanish: juntos
  alternatives_spanish:
  - como uno
  - a una
  lexicon: HALOT
  rationale: Adverbio de coordinación. «Juntos» es el equivalente español más natural.
- source_word: עָלַי
  english_pob_choice: against me
  chosen_spanish: contra mí
  alternatives_spanish:
  - sobre mí
  - acerca de mí
  lexicon: HALOT
  rationale: En este contexto hostil, la preposición tiene fuerza adversativa; «contra mí» la refleja mejor que una lectura meramente referencial.
- source_word: לָקַחַת נַפְשִׁי
  english_pob_choice: to take my life
  chosen_spanish: quitarme la vida
  alternatives_spanish:
  - tomar mi vida
  - llevarse mi vida
  - tomar mi alma
  lexicon: HALOT
  rationale: נֶפֶשׁ aquí se refiere a la vida de la persona, no a un «alma» abstracta. «Quitarme la vida» expresa con naturalidad la amenaza homicida.
- source_word: זָמָמוּ
  english_pob_choice: plotting
  chosen_spanish: tramaban
  alternatives_spanish:
  - maquinaban
  - planeaban
  - maquinaban en secreto
  lexicon: HALOT
  rationale: El verbo indica plan deliberado y hostil. «Tramaban» conserva la idea de maquinación y evita repetir mecánicamente «conspiraban».
theological_decisions:
- issue: Sentido de נֶפֶשׁ en un contexto de amenaza mortal
  english_pob_reading: to take my life
  chosen_spanish_reading: quitarme la vida
  alternative_spanish_readings:
  - tomar mi alma
  - quitarme el alma
  rationale: Aquí נֶפֶשׁ no requiere una traducción espiritualizada; el peligro es la vida misma del salmista. «Quitarme la vida» preserva esa concreción.
  doctrine_reference: 'Antropología bíblica: נֶפֶשׁ como vida/persona en contextos narrativos y poéticos.'
- issue: Carácter de מָגוֹר מִסָּבִיב como fórmula de terror envolvente
  english_pob_reading: terror on every side
  chosen_spanish_reading: terror por todas partes
  alternative_spanish_readings:
  - terror alrededor
  - miedo por todas partes
  rationale: La expresión funciona como fórmula idiomática de amenaza circundante. No conviene atenuarla a una simple sensación interna; debe mantenerse la amplitud del peligro.
  doctrine_reference: Lenguaje poético y fórmula de angustia en los Salmos.
translation_notes:
  revision_awareness: La redacción sigue de cerca el sentido acordado en el audit trail inglés, manteniendo la secuencia causa → rumor/hostilidad → terror circundante → conspiración → intención de matar, sin introducir ampliaciones interpretativas.
  spanish_consistency_notes:
  - Se emplea «Yahvé» solo cuando el texto lo requiere; aquí no aparece el nombre divino.
  - Se mantiene «vida» para נֶפֶשׁ en este contexto, evitando «alma» por ser menos preciso para la amenaza física.
  - Se conserva el paralelismo entre «conspiraban» y «tramaban» para reflejar la doble matización del hebreo sin redundancia mecánica.
  - La puntuación reproduce la pausa enfática del hebreo y del inglés POB con dos segmentos principales unidos por dos puntos y una cláusula participial final.
