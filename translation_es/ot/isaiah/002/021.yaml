review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y la mayor parte del sentido del hebreo: entrar en refugios rocosos, huir ante Yahvé, y el motivo teofánico de su levantarse para infundir terror a la tierra. También preserva bien la distinción entre «rocas» y «peñascos», y entre «esplendor» y «majestad». Sin embargo, «por temor de Yahvé» debilita de forma importante el valor de פַּחַד como «terror/dread» y desplaza מִפְּנֵי («de delante de / ante») hacia una formulación más subjetiva y reverencial que judicial. Conviene reparar ese punto para reflejar mejor la fuente y el audit trail inglés.'
  spanish_quality_summary: El español es claro, natural y digno. «para entrar en las cavernas de las rocas y en las hendiduras de los peñascos» fluye bien. La única debilidad notable es «por temor de Yahvé», que suena más devocional que aterrador en este contexto y reduce la fuerza del paralelismo con «aterrorizar la tierra». Una formulación como «ante el terror de Yahvé» o «huyendo del terror de Yahvé» sería más fiel y igualmente idiomática.
  glossary_alignment: 'Buena alineación general con la terminología del proyecto: יְהוָה → «Yahvé» correctamente; הָאָרֶץ → «la tierra» aceptable; הֲדַר / גְּאוֹנוֹ distinguidos como «esplendor / majestad». La principal desviación léxica es פַּחַד, donde el inglés auditado eligió «terror» y el hebreo favorece claramente esa fuerza; «temor» no conserva suficientemente la intensidad.'
  issues:
  - severity: medium
    issue: «por temor de Yahvé» suaviza demasiado מִפְּנֵי פַּחַד יְהוָה
    rationale: El hebreo expresa huida ante/de la presencia del terror de Yahvé, y el audit trail escogió «from before the terror of Yahweh». «Temor» en español introduce un matiz más reverencial y menos judicial, debilitando la escena de pavor teofánico.
  - severity: low
    issue: La decisión lexical documentada para פַּחַד contradice el texto español final
    rationale: Las notas del borrador reconocen que el inglés eligió «terror», pero el texto principal usa «temor». Eso crea tensión innecesaria entre la justificación léxica y la traducción publicada.
  revised_spanish_text: para entrar en las cavernas de las rocas y en las hendiduras de los peñascos[a], ante el terror de Yahvé y ante el esplendor de su majestad, cuando él se levante[b] para aterrorizar la tierra.
  revised_footnotes:
