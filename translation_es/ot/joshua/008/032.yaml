translation:
  language: es
  text: Y allí, sobre las piedras, escribió una copia[a] de la ley de Moisés, que él había escrito delante de los hijos de Israel[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una repetición de la ley de Moisés» o «un duplicado de la ley de Moisés». El término hebreo puede denotar una copia o una versión repetida.
    reason: lexical_alternative
  - marker: b
    text: O «en presencia de los hijos de Israel».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּכְתָּב
  english_pob_choice: he wrote
  chosen_spanish: escribió
  alternatives_spanish:
  - inscribió
  lexicon: HALOT
  rationale: El verbo hebreo כתב es el verbo ordinario de escribir. En español, «escribió» comunica fielmente la acción sin forzar un matiz técnico que el léxico no exige; «inscribió» sería posible por el soporte pétreo, pero añade una especificidad que el hebreo no marca.
- source_word: שָׁם
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  - en ese lugar
  lexicon: HALOT
  rationale: Como adverbio locativo narrativo, «allí» reproduce bien el valor espacial de שָׁם en español formal y fluido.
- source_word: עַל הָאֲבָנִים
  english_pob_choice: on the stones
  chosen_spanish: sobre las piedras
  alternatives_spanish:
  - en las piedras
  - encima de las piedras
  lexicon: HALOT
  rationale: La preposición עַל indica superficie. «Sobre las piedras» es natural y mantiene la imagen física del texto. «Piedras» es más idiomático en español que una repetición rígida de «las piedras» con valor casi técnico.
- source_word: אֵת מִשְׁנֵה תּוֹרַת מֹשֶׁה
  english_pob_choice: a copy of the law of Moses
  chosen_spanish: una copia de la ley de Moisés
  alternatives_spanish:
  - una repetición de la ley de Moisés
  - un duplicado de la ley de Moisés
  - la copia de la ley de Moisés
  lexicon: HALOT
  rationale: מִשְׁנֵה puede denotar copia, duplicado o repetición. «Una copia» conserva el sentido textual y evita decidir indebidamente si se trata del total de la Torá o de una porción legal concreta. «Ley» refleja bien תּוֹרָה en este contexto covenantal/legal.
- source_word: תּוֹרַת
  english_pob_choice: the law of Moses
  chosen_spanish: la ley de Moisés
  alternatives_spanish:
  - la instrucción de Moisés
  lexicon: HALOT
  rationale: Aunque תּוֹרָה puede significar «instrucción», en la expresión fija «la ley de Moisés» el español es claro, reverente y ajustado al contexto jurídico-covenantal.
- source_word: אֲשֶׁר כָּתַב
  english_pob_choice: which he had written
  chosen_spanish: la cual él había escrito
  alternatives_spanish:
  - que él escribió
  - que había escrito
  lexicon: HALOT
  rationale: El pluscuamperfecto español «había escrito» ayuda a expresar que la escritura de Moisés es anterior a la acción principal, como en el audit trail inglés. El relativo «la cual» conserva la referencia explícita al texto escrito.
- source_word: לִפְנֵי
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - en presencia de
  - ante
  lexicon: HALOT
  rationale: Aquí לִפְנֵי puede indicar visibilidad pública o presencia. «Delante de» conserva la apertura escénica del hebreo y permite la ambigüedad entre «antes de» y «en presencia de» sin resolverla indebidamente.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los hijos varones de Israel
  - los israelitas
  - los hijos de Jacob
  lexicon: HALOT
  rationale: Se mantiene la forma transparente del constructo masculino plural con «los hijos de Israel», que además es perfectamente reconocible en español bíblico y preserva mejor la forma del original que una generalización a «los israelitas».
theological_decisions:
- issue: Alcance de מִשְׁנֵה תּוֹרַת מֹשֶׁה
  english_pob_reading: Rendered as 'a copy of the law of Moses' without specifying whether this means the whole Torah or a selected legal section.
  chosen_spanish_reading: «una copia de la ley de Moisés», sin especificar si se trata de la Torá completa o de una sección legal concreta.
  alternative_spanish_readings:
  - «una repetición de la ley de Moisés»
  - «un duplicado de la ley de Moisés»
  rationale: El hebreo no define por sí mismo el alcance exacto del texto escrito. La traducción española conserva esa tensión documental sin resolverla con una paráfrasis interpretativa.
  doctrine_reference: Preservar la tensión textual y no armonizar más allá de la evidencia.
- issue: Sentido de לִפְנֵי בְּנֵי יִשְׂרָאֵל
  english_pob_reading: Or 'in the presence of the sons of Israel.'
  chosen_spanish_reading: «delante de los hijos de Israel», manteniendo abierta la lectura de visibilidad pública o presencia.
  alternative_spanish_readings:
  - «en presencia de los hijos de Israel»
  - «ante los hijos de Israel»
  rationale: La expresión hebrea admite tanto localización espacial como presencia pública. «Delante de» reproduce bien esa ambivalencia y evita cerrar el sentido a una sola opción.
  doctrine_reference: Mantener la ambigüedad semántica del texto fuente cuando el hebreo lo permite.
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés sin cambios sustanciales: se mantuvo la lectura de «copia» para מִשְׁנֵה, se conservó la ambigüedad de לִפְנֵי con una nota alternativa, y no se introdujeron armonizaciones sobre el alcance del texto escrito. No hay revisiones posteriores relevantes que alteren estas decisiones.'
  spanish_consistency_notes:
  - Se prefirió «hijos de Israel» para mantener transparencia formal y coherencia con la forma masculina plural del hebreo.
  - Se usó «ley» para תּוֹרָה en el marco legal-covenantal del versículo.
  - Se eligió el pluscuamperfecto «había escrito» para reflejar la anterioridad de la escritura atribuida a Moisés.
  - La puntuación y el orden sintáctico buscan una prosa bíblica moderna, clara y publicable sin perder cercanía al hebreo.
