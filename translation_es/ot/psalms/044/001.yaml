  doctrine_reference: Superscripciones de salmos; autoría/atribución literaria
- issue: Valor del término final מַשְׂכִּיל
  english_pob_reading: A Maskil
  chosen_spanish_reading: Un maskil
  alternative_spanish_readings:
  - Un salmo instructivo
  - Una composición contemplativa
  rationale: No hay base suficiente para convertir el término en una explicación interpretativa. La transliteración respeta la incertidumbre lexical y evita borrar la categoría técnica del encabezado.
  doctrine_reference: Géneros y encabezados poéticos del Antiguo Testamento
translation_notes:
  revision_awareness: 'Coincide con el último pase de revisión: no se registraron cambios necesarios y la concordancia general es alta. La redacción española conserva la misma ambigüedad controlada del texto fuente y del auditoría inglesa.'
  spanish_consistency_notes:
  - Se mantiene la forma española «Coré» para un nombre propio bíblico ampliamente asentado.
  - Se conserva «maskil» en transliteración para no falsear el valor técnico del término.
  - «Director de coro» evita la rusticidad de un calco y corresponde al papel funcional señalado por el hebreo.
  - El orden breve de tres miembros reproduce la estructura del encabezado hebreo sin expandirlo.
