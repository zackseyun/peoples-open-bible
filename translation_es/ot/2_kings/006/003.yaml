translation:
  language: es
  text: 'Entonces uno dijo[a]: «Por favor, consiente en ir con tus siervos». Y él dijo: «Iré».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Por favor, consiente en ir con tus siervos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאֶחָד
  english_pob_choice: one
  chosen_spanish: uno
  alternatives_spanish:
  - uno de ellos
  - un hombre
  lexicon: HALOT
  rationale: El hebreo literalmente dice «el uno» y, en contexto, designa a uno del grupo que toma la palabra. «Uno» conserva la concisión del original y suena natural en español.
- source_word: הוֹאֶל נָא
  english_pob_choice: Please be willing
  chosen_spanish: Por favor, consiente
  alternatives_spanish:
  - Por favor, estírate a ir
  - Por favor, acepta ir
  - Por favor, complácete en ir
  lexicon: HALOT
  rationale: הוֹאֶל es una súplica cortés de voluntad o consentimiento; «consiente» expresa bien esa disposición solicitada. «Por favor» recoge נָא sin perder el tono respetuoso.
- source_word: וְלֵךְ
  english_pob_choice: to go
  chosen_spanish: en ir
  alternatives_spanish:
  - y ve
  - para ir
  - a ir
  lexicon: HALOT
  rationale: Como contenido de la petición dependiente de «consiente», el infinitivo español «en ir» comunica de forma natural la idea de movimiento solicitada, manteniendo la relación sintáctica del hebreo.
- source_word: אֶת עֲבָדֶיךָ
  english_pob_choice: with your servants
  chosen_spanish: con tus siervos
  alternatives_spanish:
  - con tus servidores
  - con tus esclavos
  - junto con tus siervos
  lexicon: HALOT
  rationale: Con verbos de movimiento, אֶת marca acompañamiento. Para עֲבָדֶיךָ, «siervos» evita la dureza de «esclavos» y aquí encaja con los acompañantes del profeta, como en la lectura inglesa auditada.
- source_word: אֲנִי אֵלֵךְ
  english_pob_choice: I will go
  chosen_spanish: Iré
  alternatives_spanish:
  - Yo iré
  - Iré yo
  lexicon: HALOT
  rationale: El pronombre explícito hebreo añade énfasis, pero en español la forma verbal basta en este intercambio breve. «Iré» mantiene naturalidad y fidelidad al sentido.
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios; el borrador sigue de cerca la lectura inglesa auditada y la fuente hebrea, con una sola nota para la alternativa principal de הוֹאֶל נָא.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera del versículo porque no aparece en el texto hebreo de este pasaje.
  - Se eligió «siervos» en coherencia con el valor contextual de עֲבָדֶיךָ como acompañantes del profeta, evitando una carga semántica innecesariamente fuerte.
  - La puntuación reproduce el diálogo breve del hebreo con estilo publicable en español.
