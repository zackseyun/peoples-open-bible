  text: וַ/יְהִ֣י כְּ/כַלּ֣וֹת יִשְׂרָאֵ֡ל לַ/הֲרֹג֩ אֶת כָּל יֹשְׁבֵ֨י הָ/עַ֜י בַּ/שָּׂדֶ֗ה בַּ/מִּדְבָּר֙ אֲשֶׁ֣ר רְדָפ֣וּ/ם בּ֔/וֹ וַֽ/יִּפְּל֥וּ כֻלָּ֛/ם לְ/פִי חֶ֖רֶב עַד תֻּמָּ֑/ם וַ/יָּשֻׁ֤בוּ כָל יִשְׂרָאֵל֙ הָ/עַ֔י וַ/יַּכּ֥וּ אֹתָ֖/הּ לְ/פִי חָֽרֶב־־־־־־׃
