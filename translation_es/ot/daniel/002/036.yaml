translation:
  language: es
  text: Este era el sueño[a], y diremos su interpretación delante del rey.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Este es el sueño; ahora diremos su interpretación delante del rey». El arameo admite una puntuación y un matiz aspectual ligeramente distintos sin cambiar el sentido.'
    reason: lexical_alternative
lexical_decisions:
- source_word: דְּנָה
  english_pob_choice: This
  chosen_spanish: Este
  alternatives_spanish:
  - Esto
  - Éste
  lexicon: HALOT
  rationale: El demostrativo arameo retoma el sueño recién descrito. En español, 'Este' funciona de modo natural como anticipación nominal de 'sueño' y mantiene la referencia inmediata sin añadir explicaciones.
- source_word: חֶלְמָא
  english_pob_choice: the dream
  chosen_spanish: el sueño
  alternatives_spanish:
  - sueño
  lexicon: HALOT
  rationale: El sustantivo es definido y específico en el contexto de Daniel 2. 'Sueño' conserva el referente técnico narrativo sin necesidad de perífrasis.
- source_word: וּפִשְׁרֵהּ
  english_pob_choice: and its interpretation
  chosen_spanish: y su interpretación
  alternatives_spanish:
  - y su explicación
  - y su significado
  lexicon: HALOT
  rationale: פִשְׁרָא en Daniel designa la interpretación de un sueño o misterio. 'Interpretación' conserva ese sentido técnico; el sufijo posesivo se vierte naturalmente como 'su'.
- source_word: נֵאמַר
  english_pob_choice: we will tell
  chosen_spanish: vamos a contar
  alternatives_spanish:
  - dirán
  - diremos
  - vamos a decir
  lexicon: HALOT
  rationale: El imperfecto arameo expresa una acción futura/por realizar. 'Vamos a contar' suena más idiomático en español que un futuro literal y preserva la idea de anunciar la interpretación. El plural se mantiene como en el verbo arameo.
- source_word: קֳדָם
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - ante
  - en presencia de
  lexicon: HALOT
  rationale: La preposición indica ubicación o comparecencia ante alguien. 'Delante de' conserva la escena de corte y resulta natural en español.
- source_word: מַלְכָּא
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - el monarca
  lexicon: HALOT
  rationale: El sustantivo definido se refiere al rey ya identificado por el contexto. 'El rey' es la forma más clara y fiel en español.
translation_notes:
  revision_awareness: 'Coincide plenamente con el control de alta concordancia: no se registran revisiones aplicadas y el sentido del texto arameo se mantiene estable respecto del borrador inglés auditado.'
  spanish_consistency_notes:
  - Se mantiene 'interpretación' para פִשְׁרָא, en continuidad con el audit trail inglés.
  - Se conserva el plural verbal de נֵאמַר en español ('vamos a contar'), reflejando el valor del arameo.
  - '''Delante de'' reproduce de forma natural el valor de קֳדָם en contexto de audiencia real.'
  - No se introduce el nombre de Nabucodonosor porque el texto arameo solo dice 'el rey'.
