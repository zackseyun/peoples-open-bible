translation:
  language: es
  text: Después de esto, murió Nahash, rey de los amonitas, y su hijo reinó en su lugar.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיְהִי אַחֲרֵי כֵן
  english_pob_choice: After this
  chosen_spanish: Después de esto
  alternatives_spanish:
  - Más tarde
  - Y sucedió después de esto
  lexicon: HALOT
  rationale: La fórmula narrativa indica transición temporal. «Después de esto» conserva el valor secuencial sin añadir dureza innecesaria ni volver la frase mecánica.
- source_word: וַיָּמָת
  english_pob_choice: died
  chosen_spanish: murió
  alternatives_spanish:
  - falleció
  - pasó a mejor vida
  lexicon: HALOT
  rationale: El verbo hebreo מות expresa simplemente morir. «Murió» es directo y fiel; «falleció» suavizaría más de lo que el texto exige.
- source_word: נָחָשׁ
  english_pob_choice: Nahash
  chosen_spanish: Nahas
  alternatives_spanish:
  - Nahash
  lexicon: transliteración
  rationale: Se mantiene el nombre propio en forma castellana usual. La adaptación «Nahas» evita una grafía innecesariamente ajena al español, sin alterar la identidad del personaje.
- source_word: מֶלֶךְ בְּנֵי עַמּוֹן
  english_pob_choice: king of the Ammonites
  chosen_spanish: rey de los ammonitas
  alternatives_spanish:
  - rey de los hijos de Amón
  - rey del pueblo de Amón
  lexicon: HALOT
  rationale: El hebreo dice literalmente «rey de los hijos de Amón». En español, «ammonitas» es la designación étnica natural y precisa; conserva la referencia sin introducir una perífrasis menos idiomática.
- source_word: וַיִּמְלֹךְ
  english_pob_choice: reigned
  chosen_spanish: reinó
  alternatives_spanish:
  - comenzó a reinar
  - se hizo rey
  lexicon: HALOT
  rationale: El verbo מלך en este contexto expresa asumir el gobierno real. «Reinó» reproduce de forma concisa y exacta la acción de sucesión regia.
- source_word: בְּנוֹ
  english_pob_choice: his son
  chosen_spanish: su hijo
  alternatives_spanish:
  - el hijo de él
  lexicon: HALOT
  rationale: El sufijo pronominal remite a Nahas; «su hijo» es claro y natural en español.
- source_word: תַּחְתָּיו
  english_pob_choice: in his place
  chosen_spanish: en su lugar
  alternatives_spanish:
  - en vez de él
  - después de él
  lexicon: HALOT
  rationale: La expresión marca sucesión y reemplazo en una posición. «En su lugar» comunica ese sentido de forma idiomática en español.
translation_notes:
  revision_awareness: El texto hebreo y la traducción inglesa auditada coinciden de forma alta; no se requieren notas textuales ni variantes. Se mantuvo el orden narrativo básico y la relación de sucesión real sin expansión interpretativa.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» porque el verso no contiene el nombre divino.
  - Se prefirió «murió» y «reinó» por su fidelidad semántica y naturalidad narrativa.
  - Se usó «ammonitas» como etnónimo estándar en español para claridad de lectura.
