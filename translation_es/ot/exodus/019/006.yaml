translation:
  language: es
  text: Y ustedes serán para mí un reino de sacerdotes[a] y una nación santa. Estas son las palabras que hablarás a los hijos de Israel[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un reino sacerdotal»; la frase hebrea puede entenderse como un reino compuesto por sacerdotes o como un reino caracterizado por rasgos sacerdotales. Compárese 1 Pedro 2:9, que usa la expresión relacionada «real sacerdocio».
    reason: lexical_alternative
  - marker: b
    text: «Los hijos de Israel» es la expresión hebrea para el pueblo de Israel en su conjunto, no solo para los varones israelitas.
    reason: cultural_note
lexical_decisions:
- source_word: תִּהְיוּ
  english_pob_choice: you shall be
  chosen_spanish: serán
  alternatives_spanish:
  - serán para mí
  - habrán de ser
  - serán ustedes
  lexicon: HALOT
  rationale: El imperfecto qal de היה en este contexto expresa una declaración pactal de identidad y destino. En español, «serán» conserva el valor solemne y prospectivo sin volverlo una orden ni diluirlo en una simple descripción.
- source_word: לִי
  english_pob_choice: to me
  chosen_spanish: para mí
  alternatives_spanish:
  - a mí
  - mío
  - para mí
  lexicon: HALOT
  rationale: La preposición ל con sufijo de primera persona indica relación y pertenencia dentro del pacto. «Para mí» suena natural en español y mantiene la orientación relacional hacia Yahvé.
- source_word: מַמְלֶכֶת כֹּהֲנִים
  english_pob_choice: a kingdom of priests
  chosen_spanish: un reino de sacerdotes
  alternatives_spanish:
  - un sacerdocio real
  - un reino sacerdotal
  - un reino de sacerdotes
  lexicon: HALOT
  rationale: Se conserva la estructura nominal básica «reino de sacerdotes», que refleja más de cerca el hebreo que una reformulación adjetival. «Sacerdotes» reproduce el sustantivo plural, y se evita «sacerdocio real» porque esa formulación es una recepción interpretativa posterior, no la expresión directa del texto.
- source_word: וְג֣וֹי קָד֑וֹשׁ
  english_pob_choice: a holy nation
  chosen_spanish: una nación santa
  alternatives_spanish:
  - una nación sagrada
  - un pueblo santo
  lexicon: HALOT
  rationale: «Santa» es el equivalente más directo y bíblicamente cargado de קדושׁ. «Nación» mantiene el sustantivo colectivo del hebreo mejor que «pueblo», aunque ambos puedan referirse corporativamente a Israel.
- source_word: אֵלֶּה הַדְּבָרִים
  english_pob_choice: These are the words
  chosen_spanish: Estas son las palabras
  alternatives_spanish:
  - Estas son las cosas
  - Esto es lo que
  lexicon: HALOT
  rationale: בְּרָר / דברים aquí se refiere a palabras dichas en un discurso directo. «Palabras» preserva el enlace inmediato con «hablarás» y evita generalizarlo a «cosas» o «asuntos».
- source_word: תְּדַבֵּר
  english_pob_choice: you shall speak
  chosen_spanish: hablarás
  alternatives_spanish:
  - dirás
  - deberás hablar
  - hablarás tú
  lexicon: HALOT
  rationale: El verbo piel dirigido a Moisés pide una traducción natural en español. «Hablarás» expresa la instrucción formal sin forzar un matiz de obligación más fuerte que el del hebreo.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los hijos varones de Israel
  - los israelitas
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Se conserva la expresión filial y masculina del hebreo en la forma tradicional «los hijos de Israel», que en español es transparente y bíblicamente reconocible.
theological_decisions:
- issue: Cómo rendir מַמְלֶכֶת כֹּהֲנִים sin imponer una reinterpretación posterior
  english_pob_reading: a kingdom of priests
  chosen_spanish_reading: un reino de sacerdotes
  alternative_spanish_readings:
  - un sacerdocio real
  - un reino sacerdotal
  rationale: La redacción española sigue la estructura nominal del hebreo y evita sustituirla por una categoría eclesial posterior. Esto preserva la tensión entre «reino» y «sacerdotes» tal como aparece en la vocación de Israel.
  doctrine_reference: Principio de primacía del texto original; mantener la formulación pactal de Israel sin armonizarla prematuramente con 1 Pedro 2:9.
- issue: Lectura corporativa e inclusiva de בְּנֵי יִשְׂרָאֵל
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - el pueblo de Israel
  - los hijos de Israel
  rationale: 'Se conserva la forma masculina plural del original, pero el referente sigue siendo corporativo: toda la comunidad de Israel. La formulación tradicional en español permite mantener la transparencia textual y, a la vez, no restringe el sentido a varones individuales.'
  doctrine_reference: Política de fidelidad morfológica con aclaración contextual del referente colectivo.
translation_notes:
  revision_awareness: La revisión más reciente indicó acuerdo total y no aplicó cambios; por eso se mantuvo la solución principal del audit trail en castellano, con ajustes mínimos de naturalidad idiomática y preservación de las tensiones léxicas documentadas.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» implícito en el contexto de la cita, aunque no aparece en este versículo; no se introduce máscara reverencial adicional.
  - Se prefirió «nación» sobre «pueblo» para reflejar גוי sin suavizar el paralelismo con «reino».
  - Se conservó el plural masculino «hijos» por transparencia morfológica y porque el POB inglés también preserva esa forma con nota explicativa.
  - 'La puntuación reproduce la división de dos cláusulas del hebreo: vocación de Israel y comisión dada a Moisés.'
