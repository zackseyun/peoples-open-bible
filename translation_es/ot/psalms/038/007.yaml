review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la idea general del hebreo: doble descripción de abatimiento físico/emocional, intensificación, duración continua y andar en lamento. Sin embargo, «agobiado» desplaza la segunda imagen verbal desde ‘inclinarse/bajarse’ hacia una sensación más abstracta de carga, y la nota al pie está anclada incorrectamente a «agobiado[a]» cuando la alternativa léxica documentada corresponde a «en duelo / sombrío» para קֹדֵר.'
  spanish_quality_summary: El español es legible y digno, pero «encorvado y agobiado en gran manera» suena algo desigual porque mezcla una imagen corporal concreta con un estado abstracto. «Muy abatido» o una formulación equivalente mejora la fluidez. Además, la nota debe colocarse sobre la frase final relacionada con קֹדֵר, no sobre el segundo verbo inicial.
  glossary_alignment: No hay términos teológicos de proyecto en juego. La principal cuestión léxica es preservar el paralelismo de נַעֲוֵיתִי + שַׁחֹתִי con dos expresiones de rebajamiento, y mantener para קֹדֵר la nota de alternativa ‘sombrío / en tinieblas’ en el lugar correcto.
  issues:
  - severity: medium
    issue: «Agobiado» para שַׁחֹתִי debilita la imagen paralela de inclinación o rebajamiento.
    rationale: El hebreo presenta dos verbos cercanos de estar torcido/bajado. «Agobiado» comunica carga emocional, pero no preserva tan claramente la postura de estar abatido o inclinado.
  - severity: high
    issue: La nota al pie [a] está anclada al lugar equivocado.
    rationale: La nota explica alternativas para קֹדֵר (‘mourning / in gloom / darkly’), que en español corresponde a «en duelo» o expresión semejante, no a «agobiado».
  - severity: low
    issue: «En gran manera» es comprensible pero menos natural en español actual.
    rationale: Una intensificación como «muy abatido» o «en extremo» suena más natural y conserva la fuerza del hebreo sin rigidez.
  revised_spanish_text: Estoy encorvado y muy abatido; todo el día ando en duelo[a].
  revised_footnotes:
  - marker: a
    text: O «sombrío» o «en tinieblas»; el participio hebreo también puede sugerir oscuridad además de duelo.
    reason: lexical_alternative
