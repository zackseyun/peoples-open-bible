translation:
  language: es
  text: Así nos quedamos en el valle frente a Bet-peor.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y habitamos en el valle frente a Bet-peor» o «Y permanecimos en el valle frente a Bet-peor».'
