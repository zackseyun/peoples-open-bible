translation:
  language: es
  text: El que teme a Yahvé hará esto, y el que se aferra a la ley[a] la alcanzará[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo תּוֹרָה también puede traducirse como 'Torá' o, en un sentido más amplio, 'instrucción'.
    reason: lexical_alternative
  - marker: b
    text: El verbo final es difícil en el hebreo conservado; el paralelo griego dice 'la alcanzará', lo que apoya el sentido de llegar a la Sabiduría.
    reason: textual_variant
lexical_decisions:
- source_word: יְרֵא / φοβούμενος
  english_pob_choice: he who fears
  chosen_spanish: el que teme
  alternatives_spanish:
  - quien teme
  - el que reverencia
  lexicon: HALOT; LXX φοβέομαι
  rationale: Mantiene el valor participial proverbial y el temor reverente implicado por el hebreo y el griego, sin debilitarlo a una mera 'reverencia' no explicitada por el texto.
- source_word: יְהֹוָה / Κύριον
  english_pob_choice: the LORD
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  - Yahvé Dios
  lexicon: HALOT; proyecto POB
  rationale: El proyecto español pide Yahvé para el nombre divino. Aunque el griego dice Κύριον, el trasfondo hebreo y el audit trail sostienen que aquí se refiere al nombre divino.
- source_word: יַעֲשֶׂה זֹאת / ποιήσει αὐτό
  english_pob_choice: will do this
  chosen_spanish: hará esto
  alternatives_spanish:
  - actuará así
  - hará estas cosas
  lexicon: HALOT; LXX
  rationale: La deíxis singular se conserva de forma directa y natural en español; no se explicita más de lo que el texto exige.
- source_word: וְתוֹפֵשׂ / ὁ ἐγκρατὴς
  english_pob_choice: and he who grasps
  chosen_spanish: y el que se aferra
  alternatives_spanish:
  - y el que agarra
  - y el que se adhiere a
  lexicon: HALOT; LXX ἐγκρατής
  rationale: '''Se aferra'' transmite bien la idea de sujetarse con firmeza y también permite un eco de perseverancia/continencia sugerido por ἐγκρατὴς, sin perder la imagen concreta de tomar firmemente.'
- source_word: תּוֹרָה / τοῦ νόμου
  english_pob_choice: the law
  chosen_spanish: la ley
  alternatives_spanish:
  - la instrucción
  - la Torá
  lexicon: HALOT; LXX νόμος
  rationale: En español bíblico 'la ley' es la forma más directa para νόμος y se ajusta al paralelo griego; se conserva como término sencillo y auditable, mientras 'Torá' queda como alternativa lexical.
- source_word: יַדְרִיכֶנָּה / καταλήμψεται αὐτήν
  english_pob_choice: will attain her
  chosen_spanish: alcanzará a ella
  alternatives_spanish:
  - llegará a ella
  - la obtendrá
  lexicon: HALOT; LXX καταλήμψεται
  rationale: Se conserva el referente femenino sin neutralizarlo. 'Alcanzará a ella' sigue el valor de llegar a/alcanzar que permite el griego, y mantiene la tensión literaria de la personificación de la Sabiduría.
theological_decisions:
- issue: Referencia femenina final y personificación de la Sabiduría
  english_pob_reading: The pronoun refers to Wisdom, rendered as 'her.'
  chosen_spanish_reading: 'El pronombre final se conserva con referente femenino implícito: ''a ella''.'
  alternative_spanish_readings:
  - '''la'' en sentido impersonal'
  - '''la alcanzará'' sin pronombre explícito'
  rationale: El contexto amplio de Sirácida 14:20–15:10 personifica la Sabiduría; el griego tiene αὐτήν. Mantener el femenino evita aplanar la figura literaria y conserva la tensión teológica del texto.
  doctrine_reference: Preservar la personificación bíblica y la primacía de las fuentes originales, usando el paralelo griego para esclarecer el hebreo difícil.
translation_notes:
  revision_awareness: Se sigue el pasaje hebreo conservado en Kahana y se usa el paralelo griego de Swete como control para el verbo final difícil; no se introducen lecturas ajenas al audit trail. La redacción española busca claridad moderna sin ocultar la personificación femenina ni el valor covenantal de תּוֹרָה.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para el nombre divino, conforme al estándar del proyecto.
  - '''Ley'' se adopta para νόμος / תּוֹרָה en el cuerpo, con nota sobre ''Torá'' como alternativa lexical.'
  - Se conserva el femenino final 'a ella' para reflejar la Sabiduría personificada y el griego αὐτήν.
  - La formulación evita calco rígido pero permanece pegada a la sintaxis y semántica del original.
