review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el hebreo y la línea del POB en los puntos principales: ''Cada mujer'' capta el distributivo de אִשָּׁה; ''pedirá'' preserva correctamente שׁאל sin introducir la idea de devolver; ''vecina'' y ''la mujer que vive/habita en su casa'' representan adecuadamente las dos fuentes de las que se pedirán los bienes; ''artículos de plata y artículos de oro'' mantiene la amplitud de כְּלֵי; y ''despojaréis a Egipto'' conserva la fuerza de וְנִצַּלְתֶּם אֶת מִצְרָיִם. Sin embargo, falta preservar en notas dos alternativas significativas del rastro inglés: la ambigüedad de וּמִגָּרַת בֵּיתָהּ y las alternativas para ''despojaréis''.'
  spanish_quality_summary: El español es claro y digno, pero requiere pequeños ajustes de naturalidad y precisión. 'Vestidos' es más estrecho que וּשְׂמָלֹת y que el inglés 'clothing'; 'ropa' o 'prendas de vestir' sería más amplio. Además, la nota al pie a dice 'O "pedirá"', repitiendo la lectura principal en vez de ofrecer la alternativa real ('solicitará'). La sintaxis general es buena y plenamente legible.
  glossary_alignment: No hay conflictos con la terminología troncal del proyecto. La decisión 'pedirá' frente a 'pedirá prestado' está bien alineada con el razonamiento léxico. 'Despojaréis a Egipto' también está alineado con la decisión teológica de no suavizar נצל. El ajuste recomendado en 'vestidos' responde a fidelidad léxica, no a glosario troncal.
  issues:
  - severity: medium
    issue: La nota al pie [a] repite la lectura principal en lugar de dar una alternativa real.
    rationale: El POB inglés conserva la alternativa 'shall request'. En español, si la lectura principal es 'pedirá', la nota no debe decir 'O "pedirá"', sino una alternativa como 'solicitará'.
  - severity: medium
    issue: Faltan dos notas significativas presentes en el rastro inglés.
    rationale: El inglés conserva una alternativa para וּמִגָּרַת בֵּיתָהּ ('from the sojourner/resident woman in her house') y otra para וְנִצַּלְתֶּם ('despoil/strip'). Deben preservarse en español porque reflejan decisiones léxicas importantes.
  - severity: low
    issue: '''Vestidos'' estrecha innecesariamente el sentido de וּשְׂמָלֹת.'
    rationale: El hebreo y el inglés POB usan un término amplio para ropa/prendas. 'Vestidos' puede sonar como una clase concreta de prenda; 'ropa' es más natural y abarcador en español neutro.
  revised_spanish_text: Cada mujer pedirá[a] de su vecina y de la mujer que vive en su casa[b] artículos de plata y artículos de oro, y ropa; y los pondréis sobre vuestros hijos y sobre vuestras hijas. Así despojaréis[c] a Egipto.
  revised_footnotes:
