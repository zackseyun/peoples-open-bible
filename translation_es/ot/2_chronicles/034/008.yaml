base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/034/008.yaml
  text: Now in the eighteenth year of his reign[a], when he had cleansed the land and the house, he sent Shaphan son of Azaliah, Maaseiah the governor of the city, and Joah son of Joahaz, the recorder[b], to repair the house of Yahweh his God.
