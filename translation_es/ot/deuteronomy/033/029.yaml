translation:
  language: es
  text: ¡Bienaventurado eres tú, Israel! ¿Quién es como tú, pueblo salvado por Yahvé, el escudo de tu ayuda y la espada de tu majestad? Tus enemigos se te someterán fingidamente[a], y tú pisarás sus alturas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘vendrán humillados ante ti’; el verbo hebreo puede sugerir una sumisión forzada, abyecta o fingida.
    reason: lexical_alternative
  - marker: b
    text: O ‘pisarás sus lugares altos/fortalezas’; algunos entienden ‘sus espaldas’, pero ‘alturas’ es la traducción más directa del sustantivo hebreo.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַשְׁרֶיךָ
  english_pob_choice: Blessed are you
  chosen_spanish: ¡Bendecido eres tú!
  alternatives_spanish:
  - ¡Bienaventurado eres tú!
  - ¡Dichoso eres tú!
  lexicon: HALOT
  rationale: אַשְׁרֵי expresa una exclamación de dicha o estado bendecido. En español, 'bendecido' conserva el tono solemne y covenantal mejor que 'feliz' o 'dichoso'.
- source_word: מִי כָמוֹךָ
  english_pob_choice: Who is like you
  chosen_spanish: ¿Quién como tú?
  alternatives_spanish:
  - ¿Quién es como tú?
  - ¿Quién se compara contigo?
  lexicon: HALOT
  rationale: Es una pregunta retórica de incomparabilidad; la forma breve en español es natural y fiel al hebreo.
- source_word: עַם נוֹשַׁע בַּיהוָה
  english_pob_choice: a people saved by Yahweh
  chosen_spanish: pueblo salvado por Yahvé
  alternatives_spanish:
  - pueblo rescatado por Yahvé
  - pueblo liberado por Yahvé
  lexicon: HALOT
  rationale: נוֹשַׁע es un participio pasivo que describe a Israel como pueblo que ha sido salvado. 'Salvado' mantiene la pasiva y el sentido de rescate sin añadir matices ajenos.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino como transliteración, conforme al criterio del proyecto, en vez de sustituirlo por un título.
- source_word: מָגֵן עֶזְרֶךָ
  english_pob_choice: the shield of your help
  chosen_spanish: el escudo de tu ayuda
  alternatives_spanish:
  - tu escudo de ayuda
  - el escudo que te ayuda
  lexicon: HALOT
  rationale: La cadena constructa se vierte de forma cercana y comprensible; 'de tu ayuda' conserva la relación nominal sin expandirla a una paráfrasis.
- source_word: וַאֲשֶׁר חֶרֶב גַּאֲוָתֶךָ
  english_pob_choice: and the sword of your majesty
  chosen_spanish: y la espada de tu majestad
  alternatives_spanish:
  - y la espada de tu exaltación
  - y la espada de tu gloria
  lexicon: HALOT
  rationale: גַּאֲוָה puede ser orgullo, exaltación o majestad. En este contexto celebrativo, 'majestad' evita la connotación negativa de 'orgullo' y preserva el valor honorífico.
- source_word: וְיִכָּחֲשׁוּ אֹיְבֶיךָ לָךְ
  english_pob_choice: Your enemies will come cringing to you
  chosen_spanish: Tus enemigos se someterán con engaño ante ti
  alternatives_spanish:
  - Tus enemigos se encogerán ante ti
  - Tus enemigos se someterán fingidamente ante ti
  lexicon: HALOT
  rationale: כחשׁ puede sugerir sumisión forzada o fingida. 'Se someterán con engaño' conserva la tensión lexical del verbo; la nota explica que también puede implicar una sumisión simulada o abyecta.
- source_word: עַל בָּמוֹתֵימוֹ תִדְרֹךְ
  english_pob_choice: you will tread on their high places
  chosen_spanish: pisarás sus alturas
  alternatives_spanish:
  - pisarás sus lugares altos
  - pisarás sus cumbres
  lexicon: HALOT
  rationale: בָּמוֹת se traduce de manera más directa como 'alturas' o 'lugares altos'. 'Alturas' mantiene la imagen sin introducir una explicación militar explícita que el hebreo no formula aquí.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton; por coherencia con el proyecto se traslada como 'Yahvé' y no como una sustitución titula r.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH'
- issue: Nuance of גַּאֲוָתֶךָ
  english_pob_reading: your majesty
  chosen_spanish_reading: tu majestad
  alternative_spanish_readings:
  - tu orgullo
  - tu exaltación
  - tu gloria
  rationale: En español 'orgullo' suele sonar moralmente negativo; 'majestad' preserva el sentido de honor/exaltación que encaja con la bendición sin resolver indebidamente la tensión léxica.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; readable modern English'
translation_notes:
  revision_awareness: 'Se revisó el texto inglés auditado y la observación sobre כחשׁ: se mantuvo la tensión entre sumisión forzada y simulada mediante una traducción principal sobria y una nota alternativa. También se conservó la decisión del POB de traducir el nombre divino como Yahvé.'
  spanish_consistency_notes:
  - Se mantuvo un registro reverente y bíblico, sin arcaísmos innecesarios.
  - '''Alturas'' traduce בָּמוֹת con sobriedad; no se añadió ''fortalezas'' para no exceder el hebreo.'
  - Se usó 'Yahvé' de forma consistente para el Tetragrámaton.
  - 'La segunda persona singular se conservó de modo uniforme: ''tu'', ''tú'', ''ti''.'
