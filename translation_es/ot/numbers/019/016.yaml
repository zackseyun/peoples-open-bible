  text: וְ/כֹ֨ל אֲשֶׁר יִגַּ֜ע עַל פְּנֵ֣י הַ/שָּׂדֶ֗ה בַּֽ/חֲלַל חֶ֨רֶב֙ א֣וֹ בְ/מֵ֔ת אֽוֹ בְ/עֶ֥צֶם אָדָ֖ם א֣וֹ בְ/קָ֑בֶר יִטְמָ֖א שִׁבְעַ֥ת יָמִֽים־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/numbers/019/016.yaml
  text: And everyone who touches[a], in the open field, one slain by the sword, or a dead body, or a human bone, or a grave[c][b], shall be unclean seven days.
  footnotes:
  - marker: a
    text: Hebrew literally, 'upon the face of the field,' an idiom meaning out in the open field.
    reason: lexical_alternative
  - marker: b
    text: Or 'a corpse' for 'a dead body.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'a bone of a human/man'; here the sense is generic human remains, not specifically male.
    reason: lexical_alternative
