source:
  edition: SBLGNT
  text: 'ὁ δὲ παρακύψας εἰς νόμον τέλειον τὸν τῆς ἐλευθερίας καὶ παραμείνας, ⸀οὐκ ἀκροατὴς ἐπιλησμονῆς γενόμενος ἀλλὰ ποιητὴς ἔργου, οὗτος μακάριος ἐν τῇ ποιήσει αὐτοῦ ἔσται.'
base_translation:
  language: en
  yaml_path: translation/nt/james/001/025.yaml
  text: 'But the one who has looked intently into the perfect law[a], the law of freedom[c][b], and has continued in it—not becoming a forgetful hearer but a doer of the work—this one will be blessed in his doing.'
translation:
  language: ko
  text: '그러나 자유를 주는 온전한 율법[a]을 자세히 들여다보고 그 안에 머무는 사람, 곧 잊어버리는 듣는 자가 아니라 행하는 자가 된 사람—그는 자기의 행함 가운데서 복을 받을 것입니다.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '헬라어 νόμος τέλειος ὁ τῆς ἐλευθερίας는 「자유를 주는 온전한 율법」이다. 율법을 속박으로 보지 않고, 하나님 백성을 참으로 자유롭게 하는 토라의 본의로 회복시켜 보는 야고보 특유의 관점이다.'
    reason: cultural_note
