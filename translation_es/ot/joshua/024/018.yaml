review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue de cerca el hebreo y el rastro auditado en inglés: mantiene «Yahvé», refleja bien ויגרש con «expulsó», conserva «de delante de nosotros», y expresa correctamente la promesa «serviremos a Yahvé» y la razón «porque él es nuestro Dios». La única desviación significativa está en el singular «al amorreo», donde el inglés POB y el hebreo הָאֱמֹרִי pueden funcionar colectivamente, pero la nota alternativa y el texto inglés principal usan plural «the Amorites». En español, el singular suena más individualizante y menos natural en este contexto étnico-colectivo.'
  spanish_quality_summary: El español es claro, natural y digno. «De delante de nosotros» y «Nosotros también serviremos» son plenamente legibles. Sin embargo, «incluso al amorreo que habitaba en la tierra» suena algo menos idiomático y menos alineado con el sentido colectivo del contexto que «incluso a los amorreos que habitaban en la tierra».
  glossary_alignment: 'Buena alineación con la terminología del proyecto: יְהוָה → «Yahvé»; עבד → «serviremos»; אֱלֹהֵינוּ → «nuestro Dios». No hay conflictos teológicos relevantes. La revisión propuesta solo ajusta la referencia étnica colectiva de «amorreo» a «amorreos».'
  issues:
  - severity: medium
    issue: «incluso al amorreo que habitaba en la tierra» usa singular donde el contexto y la auditoría inglesa favorecen un sentido colectivo/plural.
    rationale: Aunque el hebreo puede usar un gentilicio singular colectivamente, el inglés POB eligió «the Amorites», y en español bíblico contemporáneo «los amorreos que habitaban en la tierra» comunica mejor el grupo étnico mencionado entre «todos los pueblos», evitando una lectura de individuo representativo.
  - severity: low
    issue: La nota al pie repite la misma limitación singular.
    rationale: Si se mantiene nota léxica, debe reflejar la alternativa coordinada sin introducir una forma menos natural que el texto principal revisado.
  revised_spanish_text: Yahvé expulsó de delante de nosotros a todos los pueblos[a], incluso a los amorreos que habitaban en la tierra. Nosotros también serviremos a Yahvé, porque él es nuestro Dios.
  revised_footnotes:
