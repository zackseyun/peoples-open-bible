translation:
  language: es
  text: Y él hizo impuro a Topet, que está en el Valle de Ben-hinom, para que ningún hombre[b] hiciera pasar por el fuego[a] a su hijo o a su hija a Molec[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: ''hacer pasar por el fuego a su hijo o a su hija'', un modismo cultual que se refiere a ofrecer niños en un rito asociado con Molec, probablemente sacrificio infantil.'
    reason: cultural_note
  - marker: b
    text: O 'nadie'. 'Hombre' aquí tiene fuerza genérica; el hebreo usa singular masculino con sentido representativo.
    reason: lexical_alternative
  - marker: c
    text: O posiblemente 'para Molec'; menos probable, algunos entienden las consonantes como 'para el rey'.
    reason: alternative_reading
lexical_decisions:
- source_word: וְטִמֵּא
  english_pob_choice: And he defiled
  chosen_spanish: Y contaminó
  alternatives_spanish:
  - Y profanó
  - Y deshizo la pureza ritual de
  lexicon: HALOT
  rationale: El piel de טמא expresa la idea de hacer impuro/contaminar. ‘Contaminó’ comunica bien la acción de volver inservible un lugar cultual, sin añadir más interpretación que ‘profanó’ o una explicación más larga.
- source_word: הַתֹּפֶת
  english_pob_choice: Topheth
  chosen_spanish: Topet
  alternatives_spanish:
  - Topet[a]
  - el Topet
  lexicon: HALOT
  rationale: Se translitera el topónimo para conservar la forma del lugar. En español, ‘Topet’ mantiene la referencia propia y evita convertirlo en un nombre común o describirlo demasiado.
- source_word: בְּגֵי בני הִנֹּם
  english_pob_choice: in the Valley of Ben-hinnom
  chosen_spanish: en el Valle de Ben-hinom
  alternatives_spanish:
  - en el valle de los hijos de Hinom
  - en el Valle de Ben-hinnom
  lexicon: HALOT
  rationale: ‘גֵי’ es ‘valle’. Se conserva el topónimo tradicional ‘Ben-hinom’ en forma hispana para que sea legible en español y siga siendo un nombre propio reconocible.
- source_word: לְבִלְתִּי
  english_pob_choice: so that no
  chosen_spanish: para que ningún
  alternatives_spanish:
  - a fin de que ningún
  - para que no
  lexicon: HALOT
  rationale: La construcción marca propósito preventivo. ‘Para que ningún’ expresa naturalmente la finalidad negativa en español y mantiene el sentido de prevención del hebreo.
- source_word: לְהַעֲבִיר
  english_pob_choice: could make ... pass through
  chosen_spanish: hiciera pasar
  alternatives_spanish:
  - haga pasar
  - hiciese pasar
  - hiciera atravesar
  lexicon: HALOT
  rationale: El causativo de עבר se conserva con la locución ‘hacer pasar’. Es la forma más fiel y natural en español para el rito aludido.
- source_word: אִישׁ
  english_pob_choice: man
  chosen_spanish: hombre
  alternatives_spanish:
  - nadie
  - persona
  lexicon: HALOT
  rationale: Se mantiene el singular masculino genérico, como en el hebreo, en vez de neutralizarlo. ‘Hombre’ refleja mejor la forma y la fuerza representativa del original.
- source_word: בְּנוֹ וְאֶת־בִּתּוֹ
  english_pob_choice: his son or his daughter
  chosen_spanish: su hijo o a su hija
  alternatives_spanish:
  - su hijo y a su hija
  - su hijo y su hija
  lexicon: HALOT
  rationale: Aunque el hebreo usa ‘y’, el sentido distributivo en la negación final queda mejor en español con ‘o’, para expresar cualquiera de los dos hijos sin perder la referencia a ambos.
- source_word: בָּאֵשׁ
  english_pob_choice: through the fire
  chosen_spanish: por el fuego
  alternatives_spanish:
  - en el fuego
  - a través del fuego
  lexicon: HALOT
  rationale: Se conserva el giro ritual con ‘hacer pasar por el fuego’, que en español transmite el modismo hebreo sin explicarlo de más.
- source_word: לַמֹּלֶךְ
  english_pob_choice: to Molech
  chosen_spanish: para Molec
  alternatives_spanish:
  - a Molec
  - para el rey
  lexicon: HALOT
  rationale: Se sigue la lectura cultual habitual del nombre propio de la deidad. ‘Para’ refleja adecuadamente el destino/relación cultual implícita; la opción ‘para el rey’ queda como posibilidad textual menor, no preferida en el cuerpo principal.
theological_decisions:
- issue: Idiom of child sacrifice expressed with ‘make ... pass through the fire’
  english_pob_reading: Retain the Hebrew idiom in the main text
  chosen_spanish_reading: Conservar ‘hacer pasar por el fuego’ en el texto principal
  alternative_spanish_readings:
  - ‘sacrificar a su hijo o a su hija en el fuego’
  - ‘ofrecer a su hijo o a su hija en el fuego’
  rationale: El hebreo es idiomático y alude con claridad a un rito cultual prohibido, probablemente sacrificio infantil, pero no lo formula de manera totalmente explícita. La redacción principal conserva la transparencia al original y evita sobreinterpretar; la expresión española mantiene el valor ritual de la imagen.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Generic masculine אִישׁ
  english_pob_reading: no man
  chosen_spanish_reading: ningún hombre
  alternative_spanish_readings:
  - nadie
  - ninguna persona
  rationale: El hebreo usa un singular masculino con fuerza genérica. En español, ‘ningún hombre’ conserva esa forma y su valor representativo; ‘nadie’ sería más neutro, pero borra parte de la huella formal del original.
  doctrine_reference: Translation philosophy §4
- issue: Possible textual/theological reading of לַמֹּלֶךְ
  english_pob_reading: to Molech
  chosen_spanish_reading: para Molec
  alternative_spanish_readings:
  - a Molec
  - para el rey
  rationale: En el contexto cultual, la lectura del nombre propio Molech es la más probable y coherente. ‘Para el rey’ queda como alternativa textual posible, pero no desplaza la lectura principal en el texto.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: La revisión inglesa más reciente corrigió ‘could make’ por ‘might make’ para expresar mejor la finalidad negativa del hebreo. La versión española ya usa ‘para que ningún… hiciera pasar’, que reproduce correctamente el matiz de propósito/preventivo; no se adoptó una forma de capacidad. Se mantuvo la terminología cultual y el topónimo como nombre propio transliterado.
  spanish_consistency_notes:
  - Se mantiene ‘Molec’ como transliteración uniforme del nombre divino/cultual en este versículo.
  - Se usa ‘hacer pasar por el fuego’ como fórmula ritual consistente con la tradición de la POB, sin sustituirla por una paráfrasis explicativa en el cuerpo principal.
  - ‘Topet’ y ‘Ben-hinom’ se presentan como topónimos propios, con ortografía española clara y digna.
