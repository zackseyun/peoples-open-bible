  text: וּ/בִ/שְׁנֵים֩ עָשָׂ֨ר חֹ֜דֶשׁ הוּא חֹ֣דֶשׁ אֲדָ֗ר בִּ/שְׁלוֹשָׁ֨ה עָשָׂ֥ר יוֹם֙ בּ֔/וֹ אֲשֶׁ֨ר הִגִּ֧יעַ דְּבַר הַ/מֶּ֛לֶךְ וְ/דָת֖/וֹ לְ/הֵעָשׂ֑וֹת בַּ/יּ֗וֹם אֲשֶׁ֨ר שִׂבְּר֜וּ אֹיְבֵ֤י הַ/יְּהוּדִים֙ לִ/שְׁל֣וֹט בָּ/הֶ֔ם וְ/נַהֲפ֣וֹךְ ה֔וּא אֲשֶׁ֨ר יִשְׁלְט֧וּ הַ/יְּהוּדִ֛ים הֵ֖מָּה בְּ/שֹׂנְאֵי/הֶֽם־־׃
