translation:
  language: es
  text: 'Entonces tomó su discurso[a] y dijo: «¡Ay! ¿Quién puede vivir cuando Dios hace esto?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Su discurso» también puede traducirse «su oráculo» o «su parábola».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשָּׂא
  english_pob_choice: Then he took up
  chosen_spanish: Entonces tomó su [a]
  alternatives_spanish:
  - Entonces alzó
  - Entonces pronunció
  lexicon: HALOT
  rationale: 'La expresión hebrea con נשׂא + מָשָׁל es idiomática: introduce una declaración solemne. En español, «tomó su [a]» conserva el giro sin forzar un calco pesado; «alzó» o «pronunció» son posibles, pero menos ajustados al enlace idiomático con el sustantivo siguiente.'
- source_word: מְשָׁל֖וֹ
  english_pob_choice: his discourse
  chosen_spanish: su [a]
  alternatives_spanish:
  - su discurso
  - su oráculo
  - su parábola
  lexicon: HALOT
  rationale: מָשָׁל puede abarcar proverbio, oráculo, dicho o parábola. Dado que el inglés POB preserva la ambigüedad con nota, en español se mantiene un sustantivo implícito por la economía de la construcción, y la nota aclara que también puede entenderse como «discurso», «oráculo» o «parábola».
- source_word: א֕וֹי
  english_pob_choice: Alas
  chosen_spanish: ¡Ay!
  alternatives_spanish:
  - ¡Ay de mí!
  - ¡Ay
  lexicon: HALOT
  rationale: La interjección expresa lamento o desolación. «¡Ay!» reproduce bien el valor exclamativo y deja abierta la tonalidad de lamentación fuerte sin imponer de antemano un matiz técnico de ay-oráculo.
- source_word: מִ֥י
  english_pob_choice: who can
  chosen_spanish: ¿Quién puede
  alternatives_spanish:
  - ¿Quién podrá
  - ¿Quién
  lexicon: HALOT
  rationale: En esta pregunta retórica, el español requiere normalmente un auxiliar de capacidad para expresar el sentido de posibilidad/supervivencia. «¿Quién puede» comunica con naturalidad la fuerza retórica del hebreo.
- source_word: יִחְיֶ֖ה
  english_pob_choice: live
  chosen_spanish: vivir
  alternatives_spanish:
  - seguir con vida
  - sobrevivir
  lexicon: HALOT
  rationale: El verbo básico es «vivir», pero aquí el contexto de juicio sugiere también la idea de sobrevivir. Se mantiene «vivir» por fidelidad directa, dejando el matiz contextual en la pregunta completa.
- source_word: מִשֻּׂמ֥וֹ אֵֽל
  english_pob_choice: when God does this
  chosen_spanish: cuando Dios hace esto
  alternatives_spanish:
  - cuando Dios establece esto
  - cuando Dios lo dispone
  - cuando Dios lo pone en lugar
  lexicon: HALOT
  rationale: La cláusula final es difícil y comprimida. El POB inglés opta por una solución de sentido general que preserve la agencia divina sin sobreexplicarla. En español, «cuando Dios hace esto» es la opción más natural y fiel al valor global del hebreo; «establece», «dispone» o «pone en lugar» son posibles, pero introducen más especificidad de la que el contexto exige.
theological_decisions:
- issue: Valor de מְשָׁל/וֹ en el contexto de Balaam
  english_pob_reading: '''his discourse'' with alternatives ''oracle'' or ''parable'''
  chosen_spanish_reading: Se mantiene una referencia neutral a su pronunciamiento, con nota sobre las alternativas «discurso», «oráculo» o «parábola»
  alternative_spanish_readings:
  - «su discurso»
  - «su oráculo»
  - «su parábola»
  rationale: No hay necesidad doctrinal de fijar un solo matiz; el hebreo permite varias posibilidades léxicas. La nota conserva esa tensión y evita borrar la amplitud del término.
  doctrine_reference: Hermenéutica léxica del AT; no se decide una doctrina específica.
- issue: 'La última cláusula difícil: מִשֻּׂמוֹ אֵל'
  english_pob_reading: '''when God does this'''
  chosen_spanish_reading: «cuando Dios hace esto»
  alternative_spanish_readings:
  - «cuando Dios establece esto»
  - «cuando Dios lo dispone»
  - «cuando Dios lo pone en lugar»
  rationale: El hebreo es elíptico y admite varias lecturas. Se conserva la agencia divina sin cerrar indebidamente el objeto de la acción. La formulación elegida sigue de cerca la decisión inglesa revisada y mantiene el mismo nivel de cautela interpretativa.
  doctrine_reference: Providencia y soberanía divina en el discurso profético; no implica una afirmación doctrinal adicional más allá del texto.
translation_notes:
  revision_awareness: La versión inglesa auditada revisó la cláusula final de «when God appoints this» a «when God does this» para acercarse más al hebreo. La presente redacción española sigue esa revisión con «cuando Dios hace esto», manteniendo el mismo grado de cautela ante la cláusula difícil. También se preserva la ambigüedad de מְשָׁל/וֹ mediante nota léxica.
  spanish_consistency_notes:
  - Se usa «Dios» para אֵל, de acuerdo con el valor divino del término en el contexto.
  - Se conserva un estilo solemne, breve y poético, adecuado para una fórmula oracular.
  - Se evita «SEÑOR» porque el texto hebreo no contiene יהוה en este versículo.
  - La puntuación reproduce el tono exclamativo y retórico del hebreo.
