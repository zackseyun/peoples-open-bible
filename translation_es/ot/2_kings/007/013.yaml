translation:
  language: es
  text: 'Entonces uno de sus siervos respondió y dijo: «Por favor, que tomen cinco de los caballos que quedan, que han quedado en ella[a]. Miren, son como toda la multitud de Israel que ha quedado en ella; miren, son como toda la multitud de Israel que ha perecido[b]. Enviemos, pues, y veamos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo usa solo el pronombre femenino singular «en ella», sin repetir el sustantivo; probablemente se refiere a la ciudad de Samaria.
    reason: source_note
  - marker: b
    text: 'El versículo contiene una comparación hebrea difícil y repetitiva: «son como toda la multitud de Israel que ha quedado en ella... como toda la multitud de Israel que ha perecido». La traducción conserva esa repetición en lugar de suavizarla.'
    reason: textual_variant
lexical_decisions:
- source_word: וַיַּעַן
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió y dijo
  lexicon: HALOT
  rationale: En español, «respondió» conserva la función narrativa de introducir una réplica. Se añadió «y dijo» para reproducir la fórmula hebrea y el estilo de la tradición POB sin volverla pesada.
- source_word: אֶחָד מֵעֲבָדָיו
  english_pob_choice: one of his servants
  chosen_spanish: uno de sus siervos
  alternatives_spanish:
  - uno de sus servidores
  - uno de sus esclavos
  lexicon: HALOT
  rationale: «Siervos» mantiene el valor cortesano/contextual del grupo de dependientes del rey, sin obligar a un matiz de esclavitud que el contexto inmediato no exige en castellano.
- source_word: וְיִקְחוּ נָא
  english_pob_choice: Please let them take
  chosen_spanish: Por favor, que tomen
  alternatives_spanish:
  - Por favor, déjense tomar
  - Que tomen, por favor
  lexicon: HALOT
  rationale: La forma volitiva con נָא pide suavemente una acción propuesta. «Por favor, que tomen» comunica bien la súplica o sugerencia deliberativa en español.
- source_word: חֲמִשָּׁה מִן הַסּוּסִים
  english_pob_choice: five of the horses
  chosen_spanish: cinco de los caballos
  alternatives_spanish:
  - cinco caballos de entre los caballos
  - cinco de los caballos que quedan
  lexicon: HALOT
  rationale: «Caballos» es el equivalente natural en español; el partitivo «de los» preserva מִן sin forzar una construcción extraña.
- source_word: הַנִּשְׁאָרִים אֲשֶׁר נִשְׁאֲרוּ בָהּ
  english_pob_choice: that remain, which are left in it
  chosen_spanish: que quedan, que están оставados en ella[a]
  alternatives_spanish:
  - que quedan, que están allí
  - que permanecen, que han quedado en ella
  lexicon: HALOT
  rationale: Se preserva la repetición del verbo «quedar»/«estar dejados» para reflejar la insistencia hebrea de שׁאר. Se mantiene el pronombre femenino singular «en ella» porque el hebreo no repite el sustantivo (probablemente Samaria) y el texto auditado del POB también conserva esa referencia implícita.
- source_word: הִנָּם
  english_pob_choice: Behold, they are
  chosen_spanish: Miren, son
  alternatives_spanish:
  - He aquí, son
  - Vean, son
  lexicon: HALOT
  rationale: «הִנָּם» introduce atención enfática. «Miren» reproduce esa deixis en un español natural y acorde con el tono argumentativo del verso.
- source_word: כְּכָל הֲמוֹן יִשְׂרָאֵל
  english_pob_choice: like all the multitude of Israel
  chosen_spanish: como toda la multitud de Israel
  alternatives_spanish:
  - como toda la muchedumbre de Israel
  - como todo el conjunto de Israel
  lexicon: HALOT
  rationale: «Multitud» conserva el campo semántico de הָמוֹן como masa numerosa. «Toda» refleja el alcance colectivo del paralelo.
- source_word: אֲשֶׁר תָּמּוּ
  english_pob_choice: who have perished
  chosen_spanish: que pereció
  alternatives_spanish:
  - que han perecido
  - que se han acabado
  lexicon: HALOT
  rationale: El hebreo presenta un perfecto plural con valor resultativo; en español se puede expresar de modo compacto como «pereció» dentro del paralelismo, aunque también sería posible mantener plural explícito. Se preserva la fuerza de ruina o fin, sin suavizarla.
- source_word: וְנִשְׁלְחָה וְנִרְאֶה
  english_pob_choice: So let us send and see
  chosen_spanish: Envíemos, pues, y veamos
  alternatives_spanish:
  - Mandemos, pues, y veamos
  - Así que enviemos y veamos
  lexicon: HALOT
  rationale: Los cohortativos se vierten con subjuntivo exhortativo de primera persona plural. «Envíemos» mantiene la propuesta colectiva y el movimiento deliberativo del original.
translation_notes:
  revision_awareness: El texto inglés auditado pasó de «Look» a «Behold» para alinear el registro con el hebreo הנה; en español se optó por «Miren» para mantener solemnidad y claridad sin introducir arcaísmo. También se preservó la repetición enfática de quedar/perecer y el pronombre implícito femenino singular del original.
  spanish_consistency_notes:
  - Se mantiene «siervos» como término de corte/contexto real, coherente con el uso POB de עֶבֶד cuando no exige «esclavos».
  - Se preserva la deíxis repetida con «Miren» para cada הִנָּם, evitando suavizar el paralelismo.
  - Se usa «en ella» con nota, para no ocultar la referencia implícita a la ciudad mencionada en el contexto inmediato.
  - Se evita sustituir el segundo miembro del paralelismo por una paráfrasis explicativa; la tensión y repetición del hebreo se dejan visibles.
