translation:
  language: es
  text: Edom se volverá una desolación[a]; todo el que pase por ella quedará espantado y silbará[b] ante todas sus heridas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «un objeto de horror». El término hebreo incluye tanto la ruina como la reacción atónita que provoca.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «siseará». El verbo hebreo designa un sonido agudo de asombro o desprecio; aquí se opta por «silbará» como equivalente moderno más claro.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיְתָה
  english_pob_choice: will become
  chosen_spanish: se volverá
  alternatives_spanish:
  - será
  - llegará a ser
  lexicon: HALOT
  rationale: El perfecto profético hebreo expresa un estado futuro resultante. «Se volverá» comunica bien ese cambio de estado en español sin perder la fuerza predictiva.
- source_word: אֱדוֹם
  english_pob_choice: Edom
  chosen_spanish: Edom
  lexicon: Nombre propio
  rationale: Es el nombre propio de la nación y la tierra; se translitera de forma estable.
- source_word: לְשַׁמָּה
  english_pob_choice: a desolation
  chosen_spanish: una desolación
  alternatives_spanish:
  - un horror
  - un objeto de horror
  - un desierto
  lexicon: HALOT
  rationale: שַׁמָּה denota ruina/desolación. En español, «desolación» preserva la idea de devastación objetiva; el efecto de horror en los observadores queda reflejado por el verbo siguiente.
- source_word: כֹּל עֹבֵר עָלֶיהָ
  english_pob_choice: everyone who passes by her
  chosen_spanish: todo el que pase por ella
  alternatives_spanish:
  - todos los que pasen por ella
  - todo aquel que pase por ella
  lexicon: HALOT
  rationale: La construcción colectiva singular se naturaliza en español como «todo el que». El sufijo femenino se mantiene como «ella», acorde con la referencia a Edom como entidad/femenina en el hebreo.
- source_word: יִשֹּׁם
  english_pob_choice: will be appalled
  chosen_spanish: se quedará horrorizado
  alternatives_spanish:
  - quedará asombrado
  - quedará espantado
  lexicon: HALOT
  rationale: שמם aquí expresa la reacción de quedar sobrecogido ante la ruina. «Se quedará horrorizado» transmite la sorpresa y conmoción observadas en el contexto.
- source_word: וְיִשְׁרֹק
  english_pob_choice: will whistle
  chosen_spanish: silbará
  alternatives_spanish:
  - siseará
  - chiflará
  lexicon: HALOT
  rationale: El verbo hebreo indica emitir un sonido agudo de asombro o burla. «Silbará» es el equivalente moderno más transparente en español; conserva la nota de reacción audible sin imponer una interpretación demasiado específica.
- source_word: עַל כָּל מַכּוֹתֶיהָ
  english_pob_choice: at all her wounds
  chosen_spanish: ante todas sus heridas
  alternatives_spanish:
  - por todas sus heridas
  - sobre todas sus heridas
  - a causa de todas sus heridas
  lexicon: HALOT
  rationale: מַכּוֹת puede ser «golpes», «heridas» o «azotes/aflicciones» según contexto. «Heridas» da una imagen natural y visible de la devastación; «ante» reproduce la dirección reactiva del gesto en español.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y el audit trail en inglés. Se conserva la tensión lexical de לְשַׁמָּה mediante «desolación» con nota alternativa, y de וְיִשְׁרֹק mediante «silbará», manteniendo el valor de reacción audible; la lectura «heridas» para מַכּוֹתֶיהָ sigue la revisión inglesa que prefirió un término más concreto y natural que «golpes/azotes».
  spanish_consistency_notes:
  - Se mantiene «Edom» como nombre propio sin adaptar.
  - Se usa «ella» para el referente femenino implícito del hebreo.
  - «Desolación» se emplea como término principal; la nota conserva la alternativa semántica documentada.
  - «Silbará» se usa de forma consistente con el equivalente moderno del verbo de reacción sonora.
  - El registro es sobrio y bíblico, evitando calcos innecesarios pero sin ampliar el sentido más allá del hebreo.
