translation:
  language: es
  text: Los hijos de extranjeros[a] vienen arrastrándose ante mí; al primer oír[b], me obedecen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los extranjeros». El hebreo conserva el giro literal «hijos de extranjeros», que resalta la imagen poética de pueblos sometidos.'
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «al oír el oído»; es decir, «en cuanto oyen».
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי נֵכָר
  english_pob_choice: The sons of foreigners
  chosen_spanish: Los hijos de extranjeros
  alternatives_spanish:
  - los extranjeros
  - los hijos de una tierra extraña
  - los forasteros
  lexicon: HALOT
  rationale: Conserva el giro hebreo 'hijos de' + sustantivo de extranjería, que en español se entiende sin perder el paralelismo del verso. 'Forasteros' o 'extranjeros' solos suavizan la estructura, pero reducen la huella idiomática del original.
- source_word: יִתְכַּחֲשׁוּ לִי
  english_pob_choice: come cringing to me
  chosen_spanish: vienen encorvados ante mí
  alternatives_spanish:
  - se someten a mí
  - fingen obediencia ante mí
  - se humillan ante mí
  - vienen agachados ante mí
  lexicon: HALOT
  rationale: El hitpael de כחש, en este contexto de victoria y dominio, expresa una sumisión forzada o fingida, no una obediencia voluntaria. 'Vienen encorvados' intenta reflejar la imagen de abatimiento/plegamiento que el inglés POB captó con 'come cringing', sin borrar la tensión de sumisión insincera.
- source_word: לִשְׁמֹעַ אֹזֶן
  english_pob_choice: at the hearing of the ear
  chosen_spanish: al oír el oído
  alternatives_spanish:
  - a la mera noticia
  - en cuanto oyen
  - al escuchar con el oído
  lexicon: HALOT
  rationale: Es un hebraísmo que indica respuesta inmediata al oír. La forma elegida mantiene la estructura formal del original, aunque suene marcada en español; por eso se preserva también en nota una lectura más idiomática.
- source_word: יִשָּׁמְעוּ לִי
  english_pob_choice: they obey me
  chosen_spanish: me obedecen
  alternatives_spanish:
  - me escuchan
  - me hacen caso
  - me oyen
  lexicon: HALOT
  rationale: שׁמע con ל significa aquí obedecer/heed, no solo escuchar. 'Me obedecen' comunica bien la fuerza funcional del verbo sin perder el vínculo con el hebreo.
translation_notes:
  revision_awareness: El texto español sigue de cerca el hebreo y el auditable de la POB inglesa, pero adopta 'vienen encorvados' para reflejar mejor la idea revisada de הִתְכַּחֲשׁוּ como sumisión humillante o fingida, no como obediencia franca. La segunda cláusula mantiene el valor formal de 'oír' + 'obedecer' para conservar el paralelismo y la idiomática hebrea.
  spanish_consistency_notes:
  - Se usa 'extranjeros' para נֵכָר, en línea con el valor de extranjería del término.
  - Se evita 'siervos' o 'súbditos' porque el hebreo habla de 'hijos de extranjeros', no de una categoría servil.
  - Se conserva la tensión semántica entre sumisión y fingimiento en יִתְכַּחֲשׁוּ.
  - '''Obedecen'' refleja el sentido de שׁמע con ל en un contexto de sometimiento político.'
