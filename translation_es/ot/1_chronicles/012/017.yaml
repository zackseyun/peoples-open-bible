revisions:
- from: Y algunos de los hijos de Benjamín y de Judá llegaron[a] hasta el refugio[b], a David.
  to: Y algunos de los hijos de Benjamín y de Judá vinieron a la fortaleza[a], a David.
  rationale: Se ajusta מְצָד a 'fortaleza' para conservar el matiz de enclave defensivo, y se mejora la naturalidad del español con 'vinieron ... a David' sin perder el sentido narrativo ni el valor partitivo. Se elimina la nota verbal innecesaria y se concentra la anotación en la alternativa léxica realmente significativa.
