translation:
  language: es
  text: Cuando nazca un buey, una oveja o una cabra, permanecerá siete días con su madre, y desde el octavo día en adelante será aceptado como ofrenda de alimento[a] a Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "ofrenda hecha por fuego". El término hebreo se refiere a una ofrenda presentada mediante fuego.
    reason: lexical_alternative
lexical_decisions:
- source_word: שׁוֹר
  english_pob_choice: ox
  chosen_spanish: buey
  alternatives_spanish:
  - toro
  - vacuno
  lexicon: HALOT
  rationale: En un contexto legal y sacrificial, שׁוֹר designa ganado bovino como categoría; en español, "buey" comunica bien un bovino de oferta sin sugerir necesariamente un animal de cría intacto como "toro".
- source_word: כֶשֶׂב
  english_pob_choice: sheep
  chosen_spanish: oveja
  alternatives_spanish:
  - cordero
  - carnero
  lexicon: HALOT
  rationale: El hebreo aquí funciona como término de especie más amplio, no necesariamente como "cordero" joven. "Oveja" mantiene la categoría general del animal del rebaño.
- source_word: עֵז
  english_pob_choice: goat
  chosen_spanish: cabra
  alternatives_spanish:
  - chivo
  - cabrito
  lexicon: HALOT
  rationale: Como término de especie en una tríada sacrificial, "cabra" es la opción más neutra en español y no fuerza sexo ni edad.
- source_word: כִּי יִוָּלֵד
  english_pob_choice: when ... is born
  chosen_spanish: cuando nazca
  alternatives_spanish:
  - si nace
  - cuando es nacido
  lexicon: HALOT
  rationale: En cláusulas legales, כִּי introduce el caso de manera natural con "cuando"; el nifal de ילד se expresa con una pasiva natural en español, "nazca".
- source_word: וְהָיָה
  english_pob_choice: it shall remain
  chosen_spanish: permanecerá
  alternatives_spanish:
  - estará
  - quedará
  lexicon: HALOT
  rationale: El giro hebreo indica continuidad durante ese período. "Permanecerá" preserva la idea de estar bajo la madre por siete días sin sonar forzado.
- source_word: שִׁבְעַת יָמִים
  english_pob_choice: seven days
  chosen_spanish: siete días
  lexicon: HALOT
  rationale: Expresión temporal directa y transparente.
- source_word: תַּחַת אִמּוֹ
  english_pob_choice: under its mother
  chosen_spanish: con su madre
  alternatives_spanish:
  - bajo su madre
  - junto a su madre
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente "bajo", en el contexto del nacimiento animal la idea es permanecer bajo el cuidado de la madre. "Con su madre" evita una imagen extraña en español y conserva el sentido práctico.
- source_word: וּמִיּוֹם הַשְּׁמִינִי וָהָלְאָה
  english_pob_choice: and from the eighth day onward
  chosen_spanish: y desde el octavo día en adelante
  alternatives_spanish:
  - y a partir del octavo día
  - y desde el octavo día
  lexicon: HALOT
  rationale: La locución fija marca el inicio de la aceptabilidad. "En adelante" reproduce bien el alcance temporal del hebreo.
- source_word: יֵרָצֶה
  english_pob_choice: it shall be accepted
  chosen_spanish: será aceptado
  alternatives_spanish:
  - será aprobado
  - hallará aceptación
  lexicon: HALOT
  rationale: En el lenguaje cultual, רצה en nifal expresa aceptación/aprobación para uso sacrificial. "Será aceptado" conserva esa fuerza mejor que una paráfrasis más interpretativa.
- source_word: לְקָרְבָּן
  english_pob_choice: as an offering
  chosen_spanish: como ofrenda
  alternatives_spanish:
  - como sacrificio
  - como oblación
  lexicon: HALOT
  rationale: קָרְבָּן es el término general para una ofrenda presentada a Dios. "Ofrenda" es el equivalente español más transparente y amplio.
- source_word: אִשֶּׁה
  english_pob_choice: food offering
  chosen_spanish: ofrenda[a]
  alternatives_spanish:
  - ofrenda hecha por fuego
  - ofrenda encendida
  lexicon: HALOT
  rationale: El hebreo designa una ofrenda relacionada con el fuego sacrificial. En español, para no forzar una calca poco natural, se opta por "ofrenda" y se preserva la alternativa técnica en la nota.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - para Yahvé
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto de traducir el Tetragrámaton como "Yahvé" en el texto principal, manteniendo la dirección cultual de la preposición.
theological_decisions:
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahweh
  rationale: El texto hebreo usa explícitamente el Tetragrámaton. Conforme a la norma del proyecto, se traslada como "Yahvé" en vez de enmascararlo con un título como "SEÑOR".
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Valor sacrificial de אִשֶּׁה
  english_pob_reading: food offering
  chosen_spanish_reading: ofrenda
  alternative_spanish_readings:
  - ofrenda hecha por fuego
  - ofrenda encendida
  rationale: La tradición inglesa del POB conserva la tensión entre la traducción funcional "food offering" y la glosa etimológica "offering by fire". En español, "ofrenda" mantiene el término general sin sobrecargar el verso; la nota preserva la alternativa técnica.
  doctrine_reference: Levítico 22:27 — término sacrificial אִשֶּׁה
- issue: Estatus de aceptabilidad cultual
  english_pob_reading: it shall be accepted
  chosen_spanish_reading: será aceptado
  alternative_spanish_readings:
  - será aceptable
  - hallará aceptación
  rationale: La formulación mantiene la idea cultual de aceptación para el sacrificio, sin convertirla en una mera cualidad abstracta.
  doctrine_reference: Levítico 22:27 — רצה en nifal
- issue: Relación con la madre
  english_pob_reading: under its mother
  chosen_spanish_reading: con su madre
  alternative_spanish_readings:
  - bajo su madre
  - junto a su madre
  rationale: Aunque la imagen hebrea es literalmente espacial, en español la relación de dependencia materna se entiende con más naturalidad como permanencia con la madre; se conserva el sentido sin introducir una imagen extraña.
  doctrine_reference: Levítico 22:27 — תַּחַת אִמּוֹ
translation_notes:
  revision_awareness: La versión inglesa más reciente de POB ajustó אִשֶּׁה desde una paráfrasis de "offering by fire" hacia "food offering" para reflejar mejor el uso cultual sin perder la referencia al sacrificio por fuego. Esta versión española evita ambas soluciones demasiado marcadas en el cuerpo principal y conserva la alternativa técnica en nota, manteniendo la transparencia frente al hebreo.
  spanish_consistency_notes:
  - Se mantiene "Yahvé" para יהוה según el criterio del proyecto.
  - '"Ofrenda" se usa como término general, con nota para la alternativa técnica de אִשֶּׁה.'
  - 'La tríada animal se vierte con nombres comunes y neutros en español: buey, oveja, cabra.'
  - '"Con su madre" busca naturalidad sin abandonar el sentido de permanencia dependiente del hebreo.'
