theological_decisions:
- issue: Rendering of ἀλλόφυλοι in a deuterocanonical historical-military context
  chosen_reading: foreigners
  alternative_readings:
  - Gentiles
  rationale: The term here functions ethnically and politically rather than as a developed theological category. 'Foreigners' best matches the immediate sense while preserving the hostility of the report. The alternative 'Gentiles' is preserved in a footnote because it is a plausible traditional rendering.
  doctrine_reference: 'Translation philosophy: original-language primacy; readable modern English, not archaic or academic.'
