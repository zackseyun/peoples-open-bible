review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia y el sentido básico del hebreo: los cinco gobernantes filisteos vieron y regresaron a Ecrón ese mismo día. Sin embargo, el hebreo solo dice ''vieron'', y el inglés auditado añadió un objeto implícito (''it'') por fluidez. En español, ''vieron aquello'' suena más señalado e interpretativo de lo necesario; ''lo vieron'' preserva mejor la implicatura contextual sin sobrecargar el demostrativo. Además, falta en las notas la alternativa léxica documentada para סַרְנֵי (''señores'').'
  spanish_quality_summary: El español es claro y natural, con buen registro bíblico moderno. 'Los cinco gobernantes de los filisteos' y 'regresaron a Ecrón ese mismo día' funcionan bien. El punto mejorable es 'aquello', que en español suena más distante y enfático que el implícito hebreo requiere. También conviene ajustar la nota [a] para que refleje tanto la omisión posible del objeto como la alternativa tradicional para el título filisteo.
  glossary_alignment: No hay términos del glosario teológico principal implicados aquí. 'Gobernantes' es una buena equivalencia para סַרְנֵי, pero el rastro de auditoría inglés conservó 'lords' como alternativa; en español conviene preservar esa opción como 'señores' en nota. 'Ecrón' es aceptable y natural en español bíblico.
  issues:
  - severity: medium
    issue: '''Aquello'' explicita demasiado el objeto de ''vieron''.'
    rationale: El hebreo רָאוּ no expresa objeto. El inglés añadió 'it' por exigencia idiomática; en español 'lo vieron' o simplemente 'vieron' conserva mejor la naturalidad. 'Aquello' introduce una deixis más marcada de la que exige el texto.
  - severity: low
    issue: La nota [a] no preserva la alternativa léxica documentada para סַרְנֵי.
    rationale: El audit trail inglés conserva 'lords' como alternativa relevante. Ya que el borrador usa una nota en ese punto, conviene incluir también la opción española 'señores' para mantener la trazabilidad léxica.
  revised_spanish_text: Cuando los cinco gobernantes[a] de los filisteos lo vieron, regresaron a Ecrón ese mismo día[b].
  revised_footnotes:
  - marker: a
    text: El título filisteo también suele traducirse «señores».
    reason: lexical_alternative
  - marker: b
    text: 'O: «en aquel día».'
    reason: lexical_alternative
