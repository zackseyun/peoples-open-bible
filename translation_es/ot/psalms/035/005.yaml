    rationale: '''Que sean como paja delante del viento'' es correcto, pero ''ante el viento'' suena un poco más natural y compacto en español bíblico moderno. Es un ajuste estilístico menor, no una corrección sustancial.'
  revised_spanish_text: Que sean como paja ante el viento, con[a] el ángel de Yahvé ahuyentándolos.
