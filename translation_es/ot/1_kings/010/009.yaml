translation:
  language: es
  text: ¡Bendito sea Yahvé, tu Dios[a], que se complació en ti para ponerte sobre el trono de Israel! Porque Yahvé amó a Israel para siempre, te ha hecho rey para administrar justicia y rectitud.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Porque Yahvé ama a Israel para siempre». El hebreo también puede entenderse como una construcción nominal: «a causa del amor de Yahvé por Israel para siempre».'
    reason: alternative_reading
lexical_decisions:
- source_word: יְהִי ... בָּרוּךְ
  english_pob_choice: Blessed be
  chosen_spanish: ¡Bendito sea!
  alternatives_spanish:
  - Sea bendito
  - ¡Bendito sea
  lexicon: HALOT
  rationale: La fórmula jussiva con participio/adjetivo pasivo exige en español una bendición optativa natural. «Bendito sea» conserva el valor de bendición sin sonar mecánico.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - SEÑOR
  lexicon: HALOT
  rationale: Siguiendo el criterio del proyecto, el Tetragrama se vierte como el nombre propio «Yahvé», no como sustitución titular. «Yahvé» es la forma española más extendida y legible.
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - Dios tuyo
  - tu Dios
  lexicon: HALOT
  rationale: La relación posesiva de segunda persona singular se expresa de forma directa y natural como «tu Dios».
- source_word: אֲשֶׁר חָפֵץ בְּךָ
  english_pob_choice: who delighted in you
  chosen_spanish: que se complació en ti
  alternatives_spanish:
  - que se deleitó en ti
  - que tuvo agrado en ti
  lexicon: HALOT
  rationale: חפץ con ב expresa complacencia/favor personal. «Se complació en ti» conserva el matiz de beneplácito sin introducir una paráfrasis excesiva.
- source_word: לְתִתְּךָ עַל כִּסֵּא יִשְׂרָאֵל
  english_pob_choice: to set you on the throne of Israel
  chosen_spanish: para ponerte sobre el trono de Israel
  alternatives_spanish:
  - para colocarte sobre el trono de Israel
  - para sentarte en el trono de Israel
  lexicon: HALOT
  rationale: La construcción con נתן y עַל + trono indica entronización/nombramiento. «Ponerte sobre el trono» conserva la imagen real y suena natural en español.
- source_word: בְּאַהֲבַת יְהוָה אֶת יִשְׂרָאֵל לְעֹלָם
  english_pob_choice: Because Yahweh loved Israel forever
  chosen_spanish: Porque Yahvé amó a Israel para siempre
  alternatives_spanish:
  - Porque Yahvé amaba a Israel para siempre
  - A causa del amor de Yahvé por Israel para siempre
  lexicon: HALOT
  rationale: La construcción causal con ב expresa el motivo de la acción divina. Se adopta «amó» para reflejar mejor la frase nominal hebrea y la revisión auditada del POB inglés, manteniendo el alcance duradero de לְעֹלָם con «para siempre».
- source_word: וַיְשִׂימְךָ לְמֶלֶךְ
  english_pob_choice: he has made you king
  chosen_spanish: te ha puesto por rey
  alternatives_spanish:
  - te hizo rey
  - te nombró rey
  lexicon: HALOT
  rationale: שׂים + ל marca nombramiento/constitución en cargo. «Te ha puesto por rey» preserva la idea de designación real y el aspecto resultativo del verbo.
- source_word: לַעֲשׂוֹת
  english_pob_choice: to administer
  chosen_spanish: para hacer
  alternatives_spanish:
  - para administrar
  - para ejercer
  lexicon: HALOT
  rationale: Aunque el POB inglés opta por «administer» para el contexto judicial, en español la combinación con «justicia y rectitud» funciona mejor con el verbo más literal «hacer», sin perder el sentido de ejercicio gubernamental.
- source_word: מִשְׁפָּט
  english_pob_choice: justice
  chosen_spanish: justicia
  alternatives_spanish:
  - juicio
  - derecho
  lexicon: HALOT
  rationale: En el contexto regio, מִשְׁפָּט apunta al orden justo y al gobierno conforme al derecho. «Justicia» es la equivalencia más clara y estable en español.
- source_word: וּצְדָקָה
  english_pob_choice: righteousness
  chosen_spanish: rectitud
  alternatives_spanish:
  - justicia
  - justeza
  lexicon: HALOT
  rationale: Para evitar repetir «justicia» y conservar la pareja hebrea מִשְׁפָּט/צְדָקָה con matiz propio, «rectitud» expresa el sentido de conducta y gobierno correctos.
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahveh
  rationale: Se mantiene la política del proyecto de transliterar el Nombre divino en lugar de sustituirlo por un título. «Yahvé» es la forma establecida para español en esta serie.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Causal force of בְּאַהֲבַת יְהוָה
  english_pob_reading: Because Yahweh loved Israel forever
  chosen_spanish_reading: Porque Yahvé amó a Israel para siempre
  alternative_spanish_readings:
  - Porque Yahvé ama a Israel para siempre
  - A causa del amor de Yahvé por Israel para siempre
  rationale: La cláusula presenta el amor de Yahvé como razón de la entronización. El perfecto «amó» sigue la revisión auditada del POB inglés y refleja bien la construcción nominal hebrea con valor causal y duradero.
  doctrine_reference: 'DOCTRINE.md: lexical/theological note on בְּאַהֲבַת + temporal permanence'
translation_notes:
  revision_awareness: Ajusté la cláusula causal según la revisión auditada del POB inglés, que corrigió «loves» a «loved» para reflejar mejor la construcción hebrea. En español mantengo esa decisión con «amó», sin perder el sentido duradero de לְעֹלָם mediante «para siempre». También alineé el Nombre divino con la terminología del proyecto y aseguré que la nota textual quede anclada en el texto principal.
  spanish_consistency_notes:
  - «Yahvé» se usa consistentemente para יְהוָה.
  - «Rectitud» evita duplicar «justicia» y respeta la pareja hebrea mīšpāṭ / ṣĕdāqâ.
  - La frase «te ha puesto por rey» conserva el nombramiento divino sin añadir explicaciones no presentes en el verso.
