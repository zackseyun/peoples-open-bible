translation:
  language: es
  text: Pero Ismael, hijo de Netanías, escapó de Johanan con ocho hombres y fue a los amonitas[a][b][c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La conjunción hebrea puede traducirse simplemente «y»; aquí se usa «pero» para reflejar el contraste narrativo con el contexto inmediato.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: literalmente, «de la presencia de Johanan», un modismo que indica huir de su presencia o persecución.'
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: «a los hijos de Amón», es decir, «a los amonitas».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/יִשְׁמָעֵאל
  english_pob_choice: But Ishmael
  chosen_spanish: Pero Ismael
  alternatives_spanish:
  - Y Ismael
  lexicon: HALOT
  rationale: La conjunción ו puede ser simplemente 'y', pero aquí el contexto narrativo pide contraste; 'pero' comunica mejor la oposición con la acción previa, como en el audit trail inglés.
- source_word: בֶּן נְתַנְיָה
  english_pob_choice: son of Nethaniah
  chosen_spanish: hijo de Netanías
  alternatives_spanish:
  - hijo de Natanías
  lexicon: HALOT
  rationale: Construcción patronímica directa y natural en español; 'Netanías' mantiene la transliteración estable del nombre propio.
- source_word: נִמְלַט
  english_pob_choice: escaped
  chosen_spanish: escapó
  alternatives_spanish:
  - se libró
  - se escapó
  lexicon: HALOT
  rationale: El nifal de מלט expresa escape efectivo; 'escapó' es la equivalencia narrativa más natural y fiel.
- source_word: בִּ/שְׁמֹנָה אֲנָשִׁים
  english_pob_choice: with eight men
  chosen_spanish: con ocho hombres
  alternatives_spanish:
  - junto con ocho hombres
  - acompañado de ocho hombres
  lexicon: HALOT
  rationale: La preposición asociativa se expresa de forma idiomática con 'con'; 'hombres' reproduce el valor de אֲנָשִׁים sin sobrecarga interpretativa.
- source_word: מִ/פְּנֵי יֽוֹחָנָן
  english_pob_choice: from Johanan
  chosen_spanish: de la presencia de Johanan
  alternatives_spanish:
  - de ante Johanan
  - de delante de Johanan
  - de Johanan
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'de la presencia de'; en español, mantener esa imagen explica la huida sin perder el sentido idiomático de escape ante persecución.
- source_word: וַ/יֵּ֖לֶךְ
  english_pob_choice: and went
  chosen_spanish: y fue
  alternatives_spanish:
  - y se fue
  - y partió
  lexicon: HALOT
  rationale: El wayyiqtol de secuencia narrativa se traduce de manera simple; 'fue' conserva la progresión sin añadir matices no presentes.
- source_word: אֶל בְּנֵ֥י עַמּֽוֹן
  english_pob_choice: to the Ammonites
  chosen_spanish: a los amonitas
  alternatives_spanish:
  - a los hijos de Amón
  - a la gente de Amón
  lexicon: HALOT
  rationale: בני עמון designa al pueblo de Amón; 'amonitas' es el equivalente étnico natural en español y evita una calca innecesaria.
translation_notes:
  revision_awareness: 'Coincide con el pasaje base y con la revisión más reciente: no se requieren cambios sustantivos; se conserva el contraste narrativo, el modismo hebreo y la designación étnica de los amonitas.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto cuando corresponda, pero este versículo no contiene el tetragrámaton.
  - Se usa 'amonitas' para בני עמון, en línea con la decisión inglesa y con español bíblico contemporáneo claro.
  - Se conserva una sintaxis breve y narrativa, sin añadir información implícita que no esté en el hebreo.
