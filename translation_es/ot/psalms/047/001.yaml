translation:
  language: es
  text: Para el director del coro[a]. De los hijos de Coré[b]. Salmo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Al director del coro». El hebreo con ל puede expresar destino, dedicación o relación funcional en los sobrescritos.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «Para los hijos de Coré» o «Por los hijos de Coré»; la preposición hebrea permite varias relaciones en los encabezados de los salmos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  english_pob_choice: For the choirmaster
  chosen_spanish: Para el director del coro
  alternatives_spanish:
  - Al director del coro
  - Para el maestro de canto
  lexicon: HALOT
  rationale: En los encabezados de los salmos, el término señala dirección musical o dedicación al responsable de la ejecución. 'Director del coro' conserva la función litúrgico-musical con español natural. 'Para' reproduce bien el ל introductorio y deja abierta la lectura de destino/dedicación; 'al' también sería posible, pero 'para' resulta más acorde al encabezado.
- source_word: לִבְנֵי
  english_pob_choice: Of the sons of
  chosen_spanish: De los hijos de
  alternatives_spanish:
  - Para los hijos de
  - Por los hijos de
  lexicon: HALOT
  rationale: La preposición ל en sobrescritos admite asociación, pertenencia, dedicación o autoría. 'De los hijos de' mantiene esa relación abierta sin decidir prematuramente entre autoría y dedicación, igual que la opción inglesa auditada.
- source_word: קֹרַח
  english_pob_choice: Korah
  chosen_spanish: Coré
  alternatives_spanish:
  - Korah
  lexicon: Convención onomástica bíblica en español
  rationale: En español bíblico estándar, el nombre propio se translitera como 'Coré'. Conserva la referencia personal sin introducir una forma menos natural para la lectura eclesial en español.
- source_word: מִזְמוֹר
  english_pob_choice: A psalm
  chosen_spanish: Salmo
  alternatives_spanish:
  - Un salmo
  - Un canto
  lexicon: HALOT
  rationale: El hebreo identifica el género; en un encabezado español, 'Salmo' es la forma más natural y fiel. Se omite el artículo por el estilo breve de los títulos bíblicos, sin perder el valor genérico del término.
translation_notes:
  revision_awareness: El texto hebreo y el contexto auditado en inglés muestran alta concordancia y no requieren revisión sustantiva; se conservan las ambigüedades léxicas del encabezado mediante notas alternativas breves.
  spanish_consistency_notes:
  - Se mantiene 'Coré' como forma española estándar del nombre propio.
  - Se usa 'Salmo' sin expandir a una paráfrasis, porque el hebreo es un simple rótulo de género.
  - La estructura breve del encabezado respeta el carácter de superscripción del versículo.
