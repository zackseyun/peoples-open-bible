translation:
  language: es
  text: Escuchen la palabra de Yahvé, hijos de Israel[a], porque Yahvé tiene un pleito[b] contra los habitantes del país[c], porque no hay verdad, ni fidelidad, ni conocimiento de Dios en el país[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «descendientes de Israel». El hebreo dice literalmente «hijos de Israel».
    reason: lexical_alternative
  - marker: b
    text: O «Yahvé tiene una causa contra», «Yahvé tiene una controversia con» o «Yahvé tiene un litigio contra». El hebreo רִיב tiene fuerza jurídica.
    reason: lexical_alternative
  - marker: c
    text: O «la tierra». El hebreo puede referirse específicamente a la tierra de Israel, más que a toda la tierra en sentido universal.
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁמְעוּ
  english_pob_choice: Hear
  chosen_spanish: Escuchen
  alternatives_spanish:
  - Oigan
  - Escuchen atentamente
  lexicon: HALOT
  rationale: El imperativo plural llama a toda la comunidad. «Escuchen» conserva el tono profético de convocatoria y suena natural en español contemporáneo.
- source_word: דְבַר יְהוָה
  english_pob_choice: the word of Yahweh
  chosen_spanish: la palabra de Yahvé
  alternatives_spanish:
  - el mensaje de Yahvé
  lexicon: HALOT
  rationale: «Palabra» mantiene la fórmula profética estable del hebreo y no diluye el carácter formal del discurso divino.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino como nombre propio, conforme al criterio del proyecto, en lugar de sustituirlo por un título.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: sons of Israel
  chosen_spanish: hijos de Israel
  alternatives_spanish:
  - hijos de Israel
  - pueblo de Israel
  lexicon: HALOT
  rationale: El hebreo usa un plural masculino constructo; en español, «hijos de Israel» reproduce bien la expresión idiomática bíblica y resulta más natural y reconocible que una calca rígida.
- source_word: רִיב
  english_pob_choice: has a case
  chosen_spanish: tiene un pleito
  alternatives_spanish:
  - tiene una causa
  - tiene una controversia
  - tiene un litigio
  lexicon: HALOT
  rationale: El término tiene fuerza jurídico-forense. «Pleito» comunica la idea de disputa o proceso legal de modo claro en español, sin volver el texto excesivamente técnico.
- source_word: עִם יוֹשְׁבֵי הָאָרֶץ
  english_pob_choice: against the inhabitants of the land
  chosen_spanish: con los habitantes de la tierra
  alternatives_spanish:
  - contra los habitantes de la tierra
  - con los que habitan la tierra
  lexicon: HALOT
  rationale: Hebreo usa literalmente «con», y el contexto de litigio permite esa construcción. En español, «con» preserva la correspondencia formal; el contexto judicial está ya dado por «tiene un pleito».
- source_word: הָאָרֶץ / בָּאָרֶץ
  english_pob_choice: the land / in the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra de Israel
  - el país
  lexicon: HALOT
  rationale: Aquí el hebreo puede referirse a la tierra/country de Israel; «tierra» mantiene la amplitud semántica y evita restringir innecesariamente el alcance.
- source_word: אֱמֶת
  english_pob_choice: truth
  chosen_spanish: verdad
  alternatives_spanish:
  - fidelidad
  - veracidad
  lexicon: HALOT
  rationale: «Verdad» es la correspondencia directa y más transparente del término, y funciona bien en la tríada ética del verso.
- source_word: חֶסֶד
  english_pob_choice: faithfulness
  chosen_spanish: fidelidad
  alternatives_spanish:
  - amor leal
  - lealtad pactal
  - misericordia
  lexicon: HALOT
  rationale: Siguiendo la revisión más reciente del POB inglés, se evita expandir el término con un sintagma interpretativo. «Fidelidad» conserva la dimensión relacional y ética sin sobretraducir.
- source_word: דַּעַת אֱלֹהִים
  english_pob_choice: knowledge of God
  chosen_spanish: conocimiento de Dios
  alternatives_spanish:
  - conocimiento de Dios
  - reconocimiento de Dios
  lexicon: HALOT
  rationale: La construcción expresa conocimiento relacional y práctico. «Conocimiento de Dios» es la opción más directa y fiel al hebreo.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: Se mantiene el nombre propio divino en español para reflejar el Tetragrámaton sin ocultarlo detrás de un título, conforme a la línea del POB.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sentido de חֶסֶד en un contexto de acusación profética
  english_pob_reading: faithfulness
  chosen_spanish_reading: fidelidad
  alternative_spanish_readings:
  - amor leal
  - misericordia
  - lealtad
  rationale: En este pasaje el énfasis es la falta de una virtud relacional y pactal. «Fidelidad» preserva la fuerza ética sin añadir una interpretación más amplia que la revisión inglesa reciente decidió no mantener en el texto principal.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
- issue: Alcance de הָאָרֶץ / בָּאָרֶץ
  english_pob_reading: land
  chosen_spanish_reading: la tierra
  alternative_spanish_readings:
  - la tierra de Israel
  - la región
  rationale: En Oseas el marco es el de la tierra del pacto; «la tierra» conserva esa referencia sin universalizarla indebidamente como «la tierra» en sentido cósmico, y sin estrecharla demasiado.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de ‘covenant faithfulness’ a ‘faithfulness’ para חֶסֶד. Esta decisión se reflejó en español con ‘fidelidad’ en lugar de una paráfrasis interpretativa. También se respetó el nombre divino como Yahvé y el matiz forense de רִיב, manteniendo una equivalencia óptima y verificable con el hebreo.
  spanish_consistency_notes:
  - Se usa «Yahvé» para יְהוָה, coherente con el estándar del proyecto.
  - Se evita «SEÑOR» como sustituto del nombre divino.
  - «Hijos de Israel» mantiene la expresión bíblica habitual en español y respeta el plural masculino del hebreo.
  - «Pleito» conserva la carga judicial de רִיב sin exceso de tecnicismo.
  - «Verdad / fidelidad / conocimiento de Dios» reproduce la tríada ética del verso sin expandirla innecesariamente.
  - Se mantiene «la tierra» en ambos casos para conservar la cohesión léxica del hebreo.
