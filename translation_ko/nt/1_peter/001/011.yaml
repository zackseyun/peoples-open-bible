id: 1PE.1.11
reference: 1 Peter 1:11
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ἐραυνῶντες εἰς τίνα ἢ ποῖον καιρὸν ἐδήλου τὸ ἐν αὐτοῖς πνεῦμα Χριστοῦ προμαρτυρόμενον τὰ εἰς Χριστὸν παθήματα καὶ τὰς μετὰ ταῦτα δόξας·
base_translation:
  language: en
  yaml_path: translation/nt/1_peter/001/011.yaml
  text: 'inquiring into what person or what time the Spirit of Messiah in them was indicating, as it testified beforehand to the sufferings for Messiah and the glories after these things.'
translation:
  language: ko
  text: '그들 안에 있던 메시아의 영이 메시아께 임할 고난들과 그 후에 따를 영광들을 미리 증언하시면서, 어떤 사람을 또는 어떤 때를 가리키시는지를 그들이 살펴 알아냈습니다.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐραυνῶντες
  english_pob_choice: inquiring
  chosen_korean: 살펴 알아냈습니다
  alternatives_korean:
  - 조사하여 찾았습니다
  - 탐구하였습니다
  lexicon: BDAG
  rationale: 1:10의 ἐξηραύνησαν과 어근이 같으므로 「살핀다」 어휘를 유지하여 일관성을 보존한다.
- source_word: πνεῦμα Χριστοῦ
  english_pob_choice: the Spirit of Messiah
  chosen_korean: 메시아의 영
  alternatives_korean:
  - 그리스도의 영
  - 메시아의 성령
  lexicon: BDAG
  rationale: 「메시아의 영」으로 옮겨 칭호성을 보존한다. 「영」을 「성령」으로 확장하지 않고 본문 그대로 둔다.
- source_word: τὰ εἰς Χριστὸν παθήματα
  english_pob_choice: the sufferings for Messiah
  chosen_korean: 메시아께 임할 고난들
  alternatives_korean:
  - 메시아를 향한 고난들
  - 메시아가 겪을 수난들
  lexicon: BDAG
  rationale: εἰς + 대격의 방향·운명을 「~께 임할」로 옮긴다. 메시아 자신이 겪을 고난을 가리킨다.
- source_word: τὰς μετὰ ταῦτα δόξας
  english_pob_choice: the glories after these things
  chosen_korean: 그 후에 따를 영광들
  alternatives_korean:
  - 그 후의 영광들
  lexicon: BDAG
  rationale: 복수 δόξας를 그대로 「영광들」로 살리되, 「따를」로 시간적 후속을 자연스럽게 옮긴다.
theological_decisions:
- issue: πνεῦμα Χριστοῦ의 선재 그리스도론 함의
  chosen_reading: '문자 그대로 「메시아의 영」으로 옮기고 해석을 강요하지 않음'
  alternative_readings:
  - 구약 예언자들 안에 활동한 성령으로 동일시
  - 선재하신 메시아의 영의 활동
  rationale: 본문은 메시아의 영이 구약 예언자들 안에서 미리 증언했다고 말한다. 두 해석(성령 동일시 / 선재 그리스도) 모두 가능하므로 본문에 한 해석을 박지 않는다.
  doctrine_reference: 'DOCTRINE.md: 신학적 긴장 보존'
