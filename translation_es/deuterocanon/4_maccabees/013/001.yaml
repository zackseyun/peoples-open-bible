review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del griego: conector inferencial, los siete hermanos menosprecian sufrimientos hasta la muerte, reconocimiento general, y afirmación central de que el razonamiento piadoso domina las pasiones. Sin embargo, dos decisiones debilitan la precisión: «dolores» suena demasiado físico para πόνων en este contexto, y «dueña de» resulta menos natural y conceptualmente menos exacto que una formulación de dominio como «señora de» o mejor «ama de/maestra de», aunque estas también pueden sonar forzadas. La construcción más idiomática y fiel en español es «es dueña de» o «domina», pero dado αὐτόδεσπότος conviene mantener explícita la idea de señorío. '
  spanish_quality_summary: El español es claro y legible, pero admite una mejora menor. «Por tanto» funciona. «Los dolores hasta la muerte» suena algo rígido y estrecho; «los padecimientos hasta la muerte» encaja mejor con el registro y con el alcance de πόνων. Además, «la razón piadosa es dueña de las pasiones» es comprensible, pero no es la mejor formulación para un predicado abstracto en registro bíblico-literario; «es señora de» sería demasiado arcaizante, mientras que «domina las pasiones» gana naturalidad pero pierde algo del matiz léxico. Una solución intermedia fiel y natural es «tiene dominio sobre las pasiones».
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Razón piadosa» está bien justificada para εὐσεβὴς λογισμός, y «pasiones» preserva correctamente πάθη en sentido ético-filosófico. La revisión propuesta mantiene esas decisiones y mejora la precisión de πόνων y αὐτόδεσπότος en español.
  issues:
  - severity: medium
    issue: «dolores» para πόνων
    rationale: Aunque posible, «dolores» en español tiende a evocar dolor físico. En 4 Macabeos el término abarca sufrimientos/tormentos en sentido más amplio. «Padecimientos» preserva mejor el registro y el campo semántico.
  - severity: medium
    issue: «es dueña de las pasiones» para αὐτόδεσπότος ἐστιν τῶν παθῶν
    rationale: La expresión es comprensible, pero suena algo posesiva más que dominativa. El griego apunta a señorío o dominio propio sobre las pasiones. «Tiene dominio sobre las pasiones» comunica mejor esa relación en español natural.
  - severity: low
    issue: Nota a con alternativa «Entonces»
    rationale: «Entonces» no refleja tan bien el valor inferencial de δὲ τοίνυν como «Así pues» o «Por consiguiente». No es grave, pero conviene ajustar la nota a alternativas más precisas.
  revised_spanish_text: Por tanto[a], como los siete hermanos despreciaron los padecimientos[b] hasta la muerte, se reconoce por todas partes que la razón piadosa tiene dominio sobre las pasiones[c].
