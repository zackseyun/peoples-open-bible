translation:
  language: es
  text: Da al sabio[a], y se volverá aún más sabio; instruye al justo[b], y aumentará su saber.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo no expresa aquí el objeto de “dar”; por eso la traducción conserva la brevedad proverbial y no añade “instrucción” en el texto principal.
    reason: lexical_alternative
  - marker: b
    text: El singular masculino funciona aquí como singular representativo, un rasgo habitual de Proverbios.
    reason: cultural_note
lexical_decisions:
- source_word: תֵּן
  english_pob_choice: Give
  chosen_spanish: Da
  alternatives_spanish:
  - Entrega
  - Da instrucción a
  lexicon: HALOT
  rationale: El imperativo de נתן es amplio (“dar”). En español, “Da” conserva la tersura y la elipsis del hebreo sin introducir un objeto no expreso en el texto base. “Da instrucción a” explicitaría demasiado el complemento implícito.
- source_word: לְחָכָם
  english_pob_choice: to a wise man
  chosen_spanish: al sabio
  alternatives_spanish:
  - a un hombre sabio
  - al sabio
  lexicon: HALOT
  rationale: חָכָם designa a una persona sabia. En español, “al sabio” mantiene la concisión proverbial y la forma representativa singular masculina del hebreo, sin perder el matiz personal.
- source_word: וְיֶחְכַּם עוֹד
  english_pob_choice: and he will become wiser still
  chosen_spanish: y se volverá aún más sabio
  alternatives_spanish:
  - y será todavía más sabio
  - y crecerá en sabiduría
  lexicon: HALOT
  rationale: El verbo de חכם puede significar llegar a ser sabio o actuar con sabiduría; con עוֹד, aquí expresa aumento. “Se volverá aún más sabio” reproduce el valor comparativo de modo natural en español.
- source_word: הוֹדַע
  english_pob_choice: teach
  chosen_spanish: instruye
  alternatives_spanish:
  - haz saber a
  - enseña
  lexicon: HALOT
  rationale: El hiphil de ידע significa “hacer saber”. En el contexto sapiencial, “instruye” comunica bien la fuerza pedagógica y evita una formulación demasiado literal o rígida.
- source_word: לְצַדִּיק
  english_pob_choice: a righteous man
  chosen_spanish: al justo
  alternatives_spanish:
  - a un hombre justo
  - al recto
  lexicon: HALOT
  rationale: צַדִּיק se traduce con mayor naturalidad aquí como “justo”, que en español bíblico conserva el peso moral y jurídico del término y paralela bien con “sabio”.
- source_word: וְיוֹסֶף לֶקַח
  english_pob_choice: and he will add learning
  chosen_spanish: y añadirá aprendizaje
  alternatives_spanish:
  - y aumentará su aprendizaje
  - y sumará instrucción
  lexicon: HALOT
  rationale: יסף expresa añadir o aumentar, y לֶקַח en Proverbios se refiere a enseñanza/recepción de instrucción. “Añadirá aprendizaje” mantiene la imagen de incremento y el paralelismo con la primera cola.
translation_notes:
  revision_awareness: Se siguió el texto hebreo consonante/masorético dado y el audit trail inglés; no se introdujeron revisiones textuales ni cambios de lectura.
  spanish_consistency_notes:
  - Se mantuvo el paralelismo de dos miembros con verbos imperativos seguidos de resultados en futuro.
  - Se evitó sustituir el vocabulario sapiencial por formulaciones explicativas más largas.
  - Se conservó el singular representativo en ambos hemistiquios para reflejar el estilo proverbial.
