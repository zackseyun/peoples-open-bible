revisions:
- from: Pero si la mancha permanece en su lugar y no se ha extendido[a], es la cicatriz de la hinchazón, y el sacerdote lo declarará limpio.
  to: Pero si la mancha permanece en su lugar y no se ha extendido[a], es la cicatriz del forúnculo, y el sacerdote lo declarará limpio.
  rationale: Se conserva la redacción general del borrador porque refleja bien el hebreo y la decisión inglesa sobre el modismo «en su lugar». Solo se corrige הַשְּׁחִין de «hinchazón» a «forúnculo» para mantener la precisión léxica del contexto de Levítico 13 y la alineación con el audit trail inglés («boil»), sin introducir paráfrasis innecesaria.
