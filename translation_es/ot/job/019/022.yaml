translation:
  language: es
  text: ¿Por qué me persiguen como Dios[a], y no se sacian de mi carne[b]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «como un dios». El hebreo אֵל también puede significar «dios» o, menos probablemente aquí, «ser poderoso».'
    reason: alternative_reading
  - marker: b
    text: 'Literalmente: «de mi carne». La expresión probablemente sugiere saciarse devorando o cebándose en la carne misma de Job, una imagen vívida de hostilidad implacable.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לָמָּה
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿Para qué
  - ¿Por qué razón
  lexicon: HALOT
  rationale: Interrogativo causal natural en español para la queja de Job; conserva el tono directo del hebreo sin añadir matiz finalista que no exige el texto.
- source_word: תִּרְדְּפֻנִי
  english_pob_choice: do you pursue me
  chosen_spanish: me persiguen
  alternatives_spanish:
  - me acosan
  - me persiguen con hostilidad
  - me siguen
  lexicon: HALOT
  rationale: רָדַף expresa perseguir / hostigar; 'persiguen' mantiene la imagen de hostilidad continua y es natural en español bíblico moderno.
- source_word: כְמוֹ
  english_pob_choice: like
  chosen_spanish: como
  alternatives_spanish:
  - igual que
  - tal como
  lexicon: HALOT
  rationale: Comparativo simple, mejor rendido por 'como' en español.
- source_word: אֵל
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - un dios
  - el Poderoso
  - un ser poderoso
  lexicon: HALOT
  rationale: El contexto de la acusación de Job sugiere una comparación con el juicio o embate divino; en español 'Dios' conserva esa fuerza, aunque la nota deja abierta la alternativa 'un dios' del hebreo.
- source_word: וּמִבְּשָׂרִי
  english_pob_choice: with my flesh
  chosen_spanish: de mi carne
  alternatives_spanish:
  - desde mi carne
  - con mi carne
  - de mi cuerpo
  lexicon: HALOT
  rationale: Se conserva el hebreo literal 'de mi carne' porque מִן con שבע puede expresar satisfacción 'a partir de' o 'por' algo; en español suena más natural que 'con mi carne' y preserva la imaginería corporal intensa.
- source_word: לֹא תִשְׂבָּעוּ
  english_pob_choice: are not satisfied
  chosen_spanish: no se sacian
  alternatives_spanish:
  - no están satisfechos
  - no se hartan
  - no quedan satisfechos
  lexicon: HALOT
  rationale: שׂבע implica saciarse / quedar harto; 'no se sacian' transmite mejor la imagen de insaciable hostilidad que un simple estado de satisfacción.
theological_decisions:
- issue: Sentido de אֵל en la comparación כְמוֹ אֵל
  english_pob_reading: God
  chosen_spanish_reading: Dios
  alternative_spanish_readings:
  - un dios
  - el Poderoso
  rationale: Se mantiene la lectura fuerte de una persecución comparable a la acción divina, como en el POB inglés. En español, 'Dios' comunica mejor el peso del reproche; la nota preserva la posibilidad de un matiz menos preciso en el hebreo.
  doctrine_reference: Teología bíblica del sufrimiento y del lenguaje antropopatético en Job
translation_notes:
  revision_awareness: El contexto auditado en inglés fue revisado y quedó sin cambios sustantivos; la presente propuesta sigue esa lectura de alta concordancia, conservando la tensión semántica de אֵל y la imagen corporal de מִבְּשָׂרִי sin suavizarlas.
  spanish_consistency_notes:
  - Se usa 'Dios' en el texto principal conforme al valor contextual destacado por el POB inglés; la nota conserva la alternativa 'un dios'.
  - '''Carne'' se mantiene literalmente para reflejar la concreción del hebreo y la metáfora de hostilidad predatoria.'
  - El verbo pronominal 'se sacian' refleja el hebreo plural y la idea de saciedad/consumo, no solo de mera satisfacción emocional.
