id: COL.1.2
reference: Colossians 1:2
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: τοῖς ἐν ⸀Κολοσσαῖς ἁγίοις καὶ πιστοῖς ἀδελφοῖς ἐν Χριστῷ· χάρις ὑμῖν καὶ εἰρήνη ἀπὸ θεοῦ πατρὸς ⸀ἡμῶν.
base_translation:
  language: en
  yaml_path: translation/nt/colossians/001/002.yaml
  text: 'To the holy and faithful brothers in Messiah at Colossae: grace to you and peace from God our Father.'
translation:
  language: ko
  text: '골로새에 있는 거룩하고 신실한 형제들[a], 곧 메시아[c] 안에 있는 이들에게 편지합니다. 우리 아버지 하나님께로부터 은혜와 평강이 여러분에게 있기를 빕니다.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 헬라어 ἀδελφοῖς는 문법적 남성 복수이나, 바울의 인사에서 회중 전체(여성을 포함)를 가리키는 경우가 많다. 본문은 원어 형태를 유지하고 문맥적 포괄성은 각주로 보존한다.
    reason: lexical_alternative
  - marker: c
    text: 또는 「그리스도」. Χριστός를 칭호로 옮기는 본 번역의 원칙에 따라 「메시아」로 번역한다.
    reason: alternative_reading
lexical_decisions:
- source_word: τοῖς ἐν Κολοσσαῖς
  english_pob_choice: at Colossae
  chosen_korean: 골로새에 있는
  alternatives_korean:
  - 골로새의
  lexicon: BDAG
  rationale: 처소격 표현을 한국어 관형절로 자연스럽게 옮긴다. 「골로새」는 굳어진 한국어 지명 형태를 유지한다.
- source_word: ἁγίοις
  english_pob_choice: holy
  chosen_korean: 거룩한
  alternatives_korean:
  - 성도
  lexicon: BDAG
  rationale: 영어 POB가 형용사 「holy」로 옮긴 결정을 따라, 명사 「성도」가 아니라 형용사 「거룩한」으로 옮긴다. 「신실한」과 짝지어 형제들을 수식한다.
- source_word: πιστοῖς
  english_pob_choice: faithful
  chosen_korean: 신실한
  alternatives_korean:
  - 믿는
  - 충성된
  lexicon: BDAG
  rationale: πιστός는 「신뢰함」과 「신실함」을 함께 담을 수 있는 어휘이다. 본 인사 문맥에서는 형제들의 성품·태도를 가리키므로 「신실한」이 자연스럽다.
- source_word: ἀδελφοῖς
  english_pob_choice: brothers
  chosen_korean: 형제들
  alternatives_korean:
  - 형제 자매들
  - 동기들
  lexicon: BDAG
  rationale: DOCTRINE.md의 성별-정확성 원칙에 따라 문법적 남성 복수를 「형제들」로 옮기고, 회중 전체에 대한 포괄적 적용은 각주로 보존한다.
- source_word: ἐν Χριστῷ
  english_pob_choice: in Messiah
  chosen_korean: 메시아 안에 있는
  alternatives_korean:
  - 그리스도 안에 있는
  lexicon: BDAG
  rationale: 처소격 ἐν의 「~안에」를 유지하여 바울의 연합 신학을 보존하며, Χριστός는 칭호로 「메시아」로 옮긴다.
- source_word: χάρις ὑμῖν καὶ εἰρήνη
  english_pob_choice: grace to you and peace
  chosen_korean: 은혜와 평강이 여러분에게 있기를 빕니다
  alternatives_korean:
  - 여러분에게 은혜와 평강이
  lexicon: BDAG
  rationale: 한국어 인사 정식의 자연스러운 흐름을 위해 「은혜와 평강이 여러분에게 있기를 빕니다」로 옮긴다. 합쇼체 종결로 인사의 격식과 친밀함을 함께 표현한다.
- source_word: ἀπὸ θεοῦ πατρὸς ἡμῶν
  english_pob_choice: from God our Father
  chosen_korean: 우리 아버지 하나님께로부터
  alternatives_korean:
  - 우리 하나님 아버지로부터
  lexicon: BDAG
  rationale: 동격 구문(하나님 — 곧 우리 아버지)을 자연스러운 한국어 어순으로 옮기며, 인사 정식의 친밀한 음조를 유지한다.
theological_decisions:
- issue: 인사의 ἐν Χριστῷ에서 Χριστός를 칭호로 번역
  chosen_reading: 메시아
  alternative_readings:
  - 그리스도
  rationale: DOCTRINE.md는 칭호로 기능하는 Χριστός를 칭호로 번역하도록 지시한다. 본 인사 정식에서도 칭호성이 살아 있으므로 「메시아」로 옮긴다.
  doctrine_reference: 'DOCTRINE.md: Translate titles; Contested terms table for Χριστός'
- issue: ἀδελφοῖς의 성별 표현
  chosen_reading: 형제들
  alternative_readings:
  - 형제 자매들
  rationale: 헬라어는 문법적 남성 복수이며, DOCTRINE.md는 「성별-정확성」 원칙에 따라 원문 형태를 보존하도록 지시한다. 회중의 실제 포괄성은 각주로 명시한다.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral'
