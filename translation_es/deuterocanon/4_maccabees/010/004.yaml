  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el griego y la auditoría inglesa en los puntos principales: πρὸς ταῦτα como respuesta discursiva, κολαστήριον como instrumento/medio concreto de castigo, σώμα frente a ψυχή, y la imposibilidad de tocar la ψυχή aunque lo deseen. Sin embargo, la cláusula final en español queda gramaticalmente defectuosa y algo opaca: «porque de mi alma..., la tocarán» no refleja con naturalidad ni precisión τῆς γὰρ ψυχῆς μου ... ἅψεσθε. Conviene reformularla para expresar claramente ‘en cuanto a mi alma / pero mi alma... no la tocarán’.'
  spanish_quality_summary: La mayor parte del español es clara y digna, pero la construcción «porque de mi alma[b], ni aun si lo desean, la tocarán» suena antinatural y problemática en español por el uso de «de» y la combinación con el pronombre acusativo «la». También «ni aun si» es menos natural que «ni aun si quieren» o «aunque lo deseen», pero puede mantenerse con una leve mejora. El resto del verso lee bien.
  glossary_alignment: No hay conflicto con la terminología del proyecto. «alma» para ψυχή está bien justificado por el contraste con «cuerpo». «instrumento de castigo» respeta la concreción de κολαστήριον. No hay términos doctrinales o glosario que exijan cambio adicional.
  issues:
  - severity: high
    issue: La frase «porque de mi alma[b], ni aun si lo desean, la tocarán» es gramaticalmente defectuosa en español.
    rationale: El genitivo griego τῆς ... ψυχῆς no se puede calcar con «de mi alma» en esta estructura y luego retomar con «la» sin producir una frase torpe o incorrecta. Esto afecta fidelidad y legibilidad.
  - severity: medium
    issue: «ni aun si lo desean» es comprensible pero menos natural que otras opciones españolas.
    rationale: La concesiva οὐδʼ ἂν θέλητε pide una expresión fluida en español. «aunque lo deseen» o «ni aun si quieren» comunica mejor el sentido sin pérdida.
  revised_spanish_text: En respuesta a esto[a], si tienen algún instrumento de castigo, tráiganlo contra mi cuerpo; porque mi alma[b], aunque lo deseen, no la tocarán.
