translation:
  language: es
  text: 'Pero cuando vio a Jesús[a], gritó, se postró ante él y dijo con voz fuerte: «¿Qué tienes tú conmigo, Jesús, Hijo del Dios Altísimo? Te ruego que no me atormentes».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «¿Qué hay entre mí y ti?»'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδὼν
  english_pob_choice: when he saw
  chosen_spanish: cuando vio
  alternatives_spanish:
  - al verlo
  - después de verlo
  lexicon: BDAG
  rationale: El participio aoristo introduce la circunstancia anterior a los verbos principales. «Cuando vio» conserva la relación temporal de manera natural en español sin perder el valor circunstancial.
- source_word: ἀνακράξας
  english_pob_choice: he cried out
  chosen_spanish: gritó
  alternatives_spanish:
  - clamó
  - exclamó
  lexicon: BDAG
  rationale: El verbo expresa una exclamación fuerte y repentina. «Gritó» comunica bien la intensidad narrativa y armoniza con la mención posterior de la voz fuerte sin duplicar innecesariamente el matiz.
- source_word: προσέπεσεν αὐτῷ
  english_pob_choice: fell down before him
  chosen_spanish: se postró ante él
  alternatives_spanish:
  - cayó delante de él
  - se echó a sus pies
  lexicon: BDAG
  rationale: προσπίπτω suele indicar caer o postrarse ante alguien en gesto de súplica o sometimiento. «Se postró ante él» es un español claro y reverente que preserva el sentido de caída deliberada ante Jesús.
- source_word: φωνῇ μεγάλῃ
  english_pob_choice: with a loud voice
  chosen_spanish: con voz muy fuerte
  alternatives_spanish:
  - en voz alta
  - con gran voz
  lexicon: BDAG
  rationale: La construcción dativa de manera se expresa de modo natural como «con voz muy fuerte». Mantiene la vividez del griego y evita una formulación demasiado literaria o ambigua.
- source_word: Τί ἐμοὶ καὶ σοί
  english_pob_choice: What do you have to do with me
  chosen_spanish: ¿Qué tienes tú conmigo?
  alternatives_spanish:
  - ¿Qué hay entre tú y yo?
  - ¿Qué tienes que ver conmigo?
  lexicon: BDAG
  rationale: El giro semítico expresa separación, protesta o rechazo de intervención. «¿Qué tienes tú conmigo?» es idiomático en español y conserva el tono confrontativo; las alternativas recogen la literalidad subyacente.
- source_word: υἱὲ τοῦ θεοῦ τοῦ ὑψίστου
  english_pob_choice: Son of the Most High God
  chosen_spanish: Hijo del Dios Altísimo
  alternatives_spanish:
  - Hijo del Dios, el Altísimo
  - Hijo del Dios Supremo
  lexicon: BDAG
  rationale: Se preserva el título cristológico con la estructura natural del genitivo en español. «Dios Altísimo» refleja bien «θεοῦ τοῦ ὑψίστου» sin añadir paráfrasis doctrinal.
- source_word: δέομαί σου
  english_pob_choice: I beg you
  chosen_spanish: Te ruego
  alternatives_spanish:
  - Te suplico
  - Te imploro
  lexicon: BDAG
  rationale: El verbo denota una petición apremiante. «Te ruego» es un equivalente digno y urgente en español; «te suplico» y «te imploro» quedan como alternativas posibles según el registro.
- source_word: μή με βασανίσῃς
  english_pob_choice: do not torment me
  chosen_spanish: no me atormentes
  alternatives_spanish:
  - no me tortures
  - no me afligas
  lexicon: BDAG
  rationale: βασανίζω puede indicar atormentar o torturar; en este contexto exorcístico, «atormentes» transmite bien el sufrimiento intenso sin sobreespecificar tortura física.
theological_decisions:
- issue: La confesión demoníaca de la identidad de Jesús
  english_pob_reading: Jesus, Son of the Most High God
  chosen_spanish_reading: Jesús, Hijo del Dios Altísimo
  alternative_spanish_readings:
  - Jesús, Hijo del Dios Supremo
  - Jesús, Hijo del Dios, el Altísimo
  rationale: Se mantiene íntegro el reconocimiento de la identidad de Jesús tal como aparece en el texto, sin suavizarlo ni convertirlo en una fórmula doctrinal posterior. La traducción conserva la tensión narrativa y cristológica del pasaje.
  doctrine_reference: Afirmaciones cristológicas; preservar la tensión textual
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés coinciden estrechamente; no se documentan revisiones posteriores ni cambios de lectura, y el borrador español sigue esa línea sin introducir ajustes textuales independientes.
  spanish_consistency_notes:
  - Se usa «Jesús» para Ἰησοῦς y «Dios» para θεός, conforme al estándar del proyecto.
  - Se opta por «se postró» para προσέπεσεν por su claridad y su fuerza reverente en español.
  - «Altísimo» conserva el título divino sin sustituirlo por una explicación.
  - El pie de nota marca la alternativa más literal del giro semítico sin perder la traducción principal idiomática.
