translation:
  language: es
  text: Pero yo, afligido y con dolor; Oh Dios[a][b], que tu salvación me ponga en alto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede leerse: «tu salvación, oh Dios, me pondrá en alto». El verbo hebreo puede entenderse como afirmación futura, no solo como petición.'
    reason: alternative_reading
  - marker: b
    text: «Poner en alto» traduce un verbo hebreo que significa situar a alguien en un lugar alto y seguro; por eso también puede significar «proteger» o «poner a salvo».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲנִי
  english_pob_choice: But as for me
  chosen_spanish: Pero yo
  alternatives_spanish:
  - Pero en cuanto a mí
  - Mas yo
  lexicon: HALOT
  rationale: La construcción marca contraste enfático con lo anterior. En español, «Pero yo» comunica ese giro de manera natural y fiel, sin perder la fuerza contrastiva.
- source_word: עָנִי
  english_pob_choice: afflicted
  chosen_spanish: afligido
  alternatives_spanish:
  - pobre
  - humilde
  - necesitado
  lexicon: HALOT
  rationale: En los Salmos, el término puede abarcar pobreza, humillación o aflicción. Aquí, junto con el participio siguiente, «afligido» expresa bien el estado de sufrimiento y abatimiento.
- source_word: וְכוֹאֵב
  english_pob_choice: and in pain
  chosen_spanish: y con dolor
  alternatives_spanish:
  - y en dolor
  - y sufriendo
  - y herido
  lexicon: HALOT
  rationale: El participio denota estar en dolor o sufrimiento. «Con dolor» suena natural en español y conserva el valor de estado presente.
- source_word: יְשׁוּעָתְךָ
  english_pob_choice: your salvation
  chosen_spanish: tu salvación
  alternatives_spanish:
  - tu liberación
  - tu ayuda
  lexicon: HALOT
  rationale: ישועה suele significar salvación o liberación. «Tu salvación» preserva la amplitud teológica del término y coincide con la decisión auditada en inglés.
- source_word: אֱלֹהִים
  english_pob_choice: O God
  chosen_spanish: ¡oh Dios!
  alternatives_spanish:
  - Dios
  - ¡Dios mío!
  lexicon: HALOT
  rationale: El hebreo funciona como vocativo directo. En español, «¡oh Dios!» mantiene el tono de súplica y corresponde al apelativo directo sin añadir posesión inexistente.
- source_word: תְּשַׂגְּבֵנִי
  english_pob_choice: let your salvation set me on high
  chosen_spanish: que tu salvación me ponga en alto
  alternatives_spanish:
  - que tu salvación me coloque en un lugar alto y seguro
  - que tu salvación me proteja
  - tu salvación me pondrá en alto
  lexicon: HALOT
  rationale: El verbo de שגב en piel alude a poner a alguien en un lugar alto e inaccesible, de donde se deriva la idea de protección. «Me ponga en alto» conserva la metáfora espacial sin reducirla a una mera explicación.
theological_decisions:
- issue: 'Valor del verbo imperfecto תְּשַׂגְּבֵנִי: petición o futuro'
  english_pob_reading: 'jussive-like petition: ''let your salvation ... set me on high'''
  chosen_spanish_reading: 'petición: «que tu salvación me ponga en alto»'
  alternative_spanish_readings:
  - 'futuro: «tu salvación me pondrá en alto»'
  rationale: En el contexto inmediato de lamento y súplica, el imperfecto se entiende naturalmente como ruego. El subjuntivo español reproduce mejor esa dependencia orante sin convertirla en una simple predicción.
  doctrine_reference: 'Translation philosophy #3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'El texto inglés más reciente mantiene sin cambios la lectura auditada: una súplica con posible matiz futuro alternativo. La colocación del vocativo se ajustó previamente por fluidez en inglés; en español se conserva una estructura natural de oración directa.'
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלֹהִים en vocativo, conforme al estándar del proyecto.
  - Se evita «SEÑOR» porque el texto hebreo no usa el tetragrámaton en este versículo.
  - Se conserva la metáfora espacial de שגב mediante «poner en alto», sin colapsarla de entrada a «proteger».
