translation:
  language: es
  text: Yahvé ha mezclado[a] dentro de ella un espíritu de confusión, y ellos han extraviado[b] a Egipto en toda su obra, como un borracho se tambalea en su vómito.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse como 'ha vertido' o 'ha entremezclado'. El hebreo presenta una imagen de mezcla que comunica una influencia enviada en juicio.
    reason: lexical_alternative
  - marker: b
    text: 'El verbo hebreo está en plural: ''ellos han extraviado''. El sujeto exacto no se explicita con total claridad; puede referirse a las influencias confusoras o a los dirigentes de Egipto bajo esa influencia.'
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: Tetragramatón / nombre divino
  rationale: Se conserva el nombre propio divino, siguiendo la convención POB de transliterar el Tetragrama en lugar de ocultarlo tras un título. En español, 'Yahvé' es la forma más reconocible y reverente para este uso.
- source_word: מָסַךְ
  english_pob_choice: has mixed
  chosen_spanish: ha mezclado
  alternatives_spanish:
  - ha vertido
  - ha entremezclado
  lexicon: HALOT
  rationale: El verbo conserva la imagen concreta de mezclar o entreverar algo dentro de otro elemento. 'Ha mezclado' sigue de cerca la fuerza metafórica del hebreo sin forzar un sentido más interpretativo como 'ha derramado'.
- source_word: בְּקִרְבָּהּ
  english_pob_choice: within her
  chosen_spanish: dentro de ella
  alternatives_spanish:
  - en medio de ella
  - dentro de ella misma
  lexicon: HALOT
  rationale: El sufijo femenino singular se refiere a Egipto como entidad/país. 'Dentro de ella' mantiene ese referente femenino natural en español y evita la neutralización innecesaria.
- source_word: רוּחַ עִוְעִים
  english_pob_choice: a spirit of confusion
  chosen_spanish: un espíritu de confusión
  alternatives_spanish:
  - un espíritu de distorsión
  - un espíritu de perversidad
  - un espíritu de vértigo
  lexicon: HALOT
  rationale: '''Espíritu'' conserva la fuerza de una influencia animante o disposicional. ''Confusión'' comunica bien el efecto resultante de desorientación que el contexto exige, sin borrar la posibilidad de un matiz de torcimiento.'
- source_word: וְהִתְעוּ
  english_pob_choice: and they have led astray
  chosen_spanish: y ellos han extraviado
  alternatives_spanish:
  - y han hecho errar
  - y han desviado
  lexicon: HALOT
  rationale: Se mantiene el plural del verbo hebreo con 'ellos', dejando abierta la ambigüedad del sujeto como en el POB inglés. 'Han extraviado' conserva el valor causativo de hacer perder el rumbo y suena natural en español.
- source_word: אֶת מִצְרַיִם
  english_pob_choice: Egypt
  chosen_spanish: a Egipto
  alternatives_spanish:
  - a Egipto
  lexicon: Nombre propio
  rationale: Se traduce de manera directa el objeto directo personal/nacional con la preposición 'a', según el uso normal del español cuando el verbo rige objeto animado o personificado.
- source_word: בְּכָל מַעֲשֵׂהוּ
  english_pob_choice: in all its work
  chosen_spanish: en toda su obra
  alternatives_spanish:
  - en todo su trabajo
  - en todas sus obras
  - en todo lo que hacía
  lexicon: HALOT
  rationale: מַעֲשֶׂה abarca obra, actividad o actuación. 'Obra' conserva amplitud y dignidad, y el singular colectivo refleja bien el alcance total del hebreo.
- source_word: כְּהִתָּעוֹת
  english_pob_choice: as ... staggers
  chosen_spanish: como se tambalea
  alternatives_spanish:
  - como vacila
  - como anda errante
  lexicon: HALOT
  rationale: El comparativo exige en español una construcción verbal natural. 'Se tambalea' comunica la inestabilidad y pérdida de control del símil del borracho sin sobretraducirlo.
- source_word: שִׁכּוֹר
  english_pob_choice: a drunkard
  chosen_spanish: un borracho
  alternatives_spanish:
  - un ebrio
  - un hombre borracho
  lexicon: HALOT
  rationale: '''Borracho'' reproduce con claridad la figura proverbial y el tono humillante del símil. Es más idiomático que una perífrasis y no suaviza la imagen.'
- source_word: בְּקִיאוֹ
  english_pob_choice: in his vomit
  chosen_spanish: en su vómito
  alternatives_spanish:
  - dentro de su vómito
  lexicon: HALOT
  rationale: Se preserva la crudeza del término para mantener la fuerza del paralelo. 'En su vómito' es la forma más directa y natural en español.
theological_decisions:
- issue: Agencia de Yahvé en el juicio
  english_pob_reading: The LORD actively places a disorienting spirit within Egypt as an act of judgment, without adding a later systematic explanation beyond the Hebrew.
  chosen_spanish_reading: Yahvé ha mezclado dentro de ella un espíritu de confusión.
  alternative_spanish_readings:
  - Yahvé ha permitido que surja confusión dentro de ella
  - Yahvé ha derramado un espíritu de vértigo dentro de ella
  rationale: El hebreo atribuye la acción directamente a Yahvé con un verbo fuerte. La traducción conserva esa agencia sin atenuarla con explicaciones doctrinales que el texto no explicita.
  doctrine_reference: Afirmación de la soberanía divina en el juicio; filosofía de traducción POB
- issue: Sujeto plural de 'they have led astray'
  english_pob_reading: The plural is preserved, leaving the exact subject somewhat compressed and ambiguous.
  chosen_spanish_reading: y ellos han extraviado a Egipto
  alternative_spanish_readings:
  - y ha extraviado a Egipto
  - y Egipto ha sido extraviado
  rationale: El plural hebreo se conserva con 'ellos' para no resolver la ambigüedad del texto. Así se respeta la sintaxis poética y se deja abierta la referencia del sujeto, como en el audit trail inglés.
  doctrine_reference: Fidelidad a la forma del texto; preservación de ambigüedad textual
translation_notes:
  revision_awareness: 'La presente redacción sigue de cerca el texto hebreo masorético y conserva las decisiones auditadas del POB inglés: el nombre divino Yahvé, la imagen concreta de ''mezclado'', el plural del verbo final y el símil gráfico del borracho. No se identificaron revisiones previas aplicables en el expediente.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para el Tetragrama, de acuerdo con el estándar del proyecto.
  - '''Espíritu de confusión'' conserva una opción amplia y entendible en español, sin borrar el matiz de distorsión del hebreo.'
  - El uso de 'ellos' en el segundo hemistiquio preserva la ambigüedad del sujeto plural.
  - Se evita sustituir 'obra' por términos más estrechos como 'trabajo' para mantener la amplitud semántica del hebreo.
