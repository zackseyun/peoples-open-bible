translation:
  language: es
  text: Y he aquí que Dios está con nosotros a la cabeza, y sus sacerdotes con las trompetas para lanzar la señal de guerra contra ustedes. Hijos de Israel[a], no peleen contra Yahvé, el Dios de sus padres, porque no tendrán éxito.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “Hijos de Israel”. El hebreo dice literalmente “hijos de Israel”, una forma masculina plural usada aquí como vocativo directo para los israelitas.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִנֵּה
  english_pob_choice: And behold
  chosen_spanish: Y he aquí
  alternatives_spanish:
  - Miren
  - Vean
  lexicon: HALOT
  rationale: La expresión introduce con fuerza retórica lo que sigue. 'He aquí' conserva el matiz enfático de atención, y con 'Y' mantiene la conexión discursiva natural en español.
- source_word: עִמָּנוּ
  english_pob_choice: with us
  chosen_spanish: con nosotros
  alternatives_spanish:
  - a nuestro lado
  - de nuestra parte
  lexicon: HALOT
  rationale: La preposición indica presencia y apoyo; 'con nosotros' es la forma más directa y natural en español.
- source_word: בָרֹאשׁ
  english_pob_choice: at our head
  chosen_spanish: a la cabeza
  alternatives_spanish:
  - al frente
  - como nuestro líder
  lexicon: HALOT
  rationale: La imagen hebrea de 'cabeza' expresa liderazgo/vanguardia. 'A la cabeza' conserva la metáfora y su sentido de conducción.
- source_word: הָאֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: HALOT
  rationale: Es una referencia definida al Dios de Israel en el contexto; 'Dios' funciona bien en aposición sin recargar la frase.
- source_word: וְכֹהֲנָיו
  english_pob_choice: and his priests
  chosen_spanish: y sus sacerdotes
  alternatives_spanish:
  - y los sacerdotes de él
  lexicon: HALOT
  rationale: El sufijo posesivo remite a Dios. 'Sus sacerdotes' preserva la relación de pertenencia y resulta idiomático.
- source_word: וַחֲצֹצְרֹת הַתְּרוּעָה
  english_pob_choice: with the trumpets for the battle cry
  chosen_spanish: con las trompetas para dar el grito de guerra
  alternatives_spanish:
  - con las trompetas del toque de alarma
  - con las trompetas para el clamor
  lexicon: HALOT
  rationale: חֲצֹצְרוֹת son trompetas rituales o de señal; תְּרוּעָה aquí es un grito/alarma militar. 'Dar el grito de guerra' comunica la función bélica sin perder el valor de señal sonora.
- source_word: לְהָרִיעַ עֲלֵיכֶם
  english_pob_choice: to sound the alarm against you
  chosen_spanish: para dar el grito de guerra contra ustedes
  alternatives_spanish:
  - para levantar un clamor contra ustedes
  - para tocar la señal contra ustedes
  lexicon: HALOT
  rationale: El verbo tiene sentido causativo de lanzar una señal o clamor. En contexto bélico, 'dar el grito de guerra contra ustedes' transmite la hostilidad y la finalidad de la señal.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: Sons of Israel
  chosen_spanish: Hijos de Israel
  alternatives_spanish:
  - Hijos de Israel[a]
  - Pueblo de Israel
  lexicon: HALOT
  rationale: Se mantiene el plural masculino directo del hebreo como forma de address. 'Hijos de Israel' es natural en español bíblico y conserva la precisión gramatical.
- source_word: אַ ל תִּלָּחֲמוּ
  english_pob_choice: do not fight
  chosen_spanish: no peleen
  alternatives_spanish:
  - no combatan
  - no hagan guerra
  lexicon: HALOT
  rationale: La prohibición jussiva queda bien en imperativo negativo. 'Peleen' es idiomático y suficientemente directo para el contexto militar.
- source_word: עִם יְהוָה
  english_pob_choice: against Yahweh
  chosen_spanish: contra Yahvé
  alternatives_spanish:
  - con Yahvé
  lexicon: HALOT
  rationale: Aunque la preposición básica es 'con', con el verbo de combate el sentido es adversativo. Se conserva el nombre divino 'Yahvé' según la terminología del proyecto.
- source_word: אֱלֹהֵי אֲבֹתֵיכֶם
  english_pob_choice: the God of your fathers
  chosen_spanish: el Dios de sus padres
  alternatives_spanish:
  - el Dios de sus antepasados
  - el Dios de sus padres
  lexicon: HALOT
  rationale: Es la fórmula pactual habitual. 'Padres' conserva la resonancia bíblica y la relación de pacto, y el posesivo de tercera persona plural es claro en el discurso directo.
- source_word: כִּי לֹא תַצְלִיחוּ
  english_pob_choice: for you will not succeed
  chosen_spanish: porque no tendrán éxito
  alternatives_spanish:
  - porque no prosperarán
  - porque no lograrán vencer
  lexicon: HALOT
  rationale: צָלַח puede significar prosperar, tener éxito o salir bien. Aquí el aviso militar se expresa bien con 'tener éxito', sin reducirlo solo a victoria bélica.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: the LORD / Yahweh in audit context
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - el SEÑOR
  rationale: El proyecto exige renderizar el Tetragrámaton como 'Yahvé' en el texto principal, preservando el nombre del pacto en lugar de ocultarlo tras una convención tipográfica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Direccionamiento masculino plural בְּנֵי יִשְׂרָאֵל
  english_pob_reading: Sons of Israel
  chosen_spanish_reading: Hijos de Israel
  alternative_spanish_readings:
  - Hijos de Israel[a]
  - Niños de Israel
  - Pueblo de Israel
  rationale: Se conserva el valor gramatical masculino plural y el carácter de apelación directa a los israelitas. 'Hijos de Israel' es fiel y comprensible en español bíblico.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over gender-neutral)
- issue: Función de las trompetas y el grito de guerra
  english_pob_reading: trumpets for sounding the battle cry against you
  chosen_spanish_reading: las trompetas para dar el grito de guerra contra ustedes
  alternative_spanish_readings:
  - las trompetas para el toque de alarma contra ustedes
  - las trompetas para levantar el clamor contra ustedes
  rationale: La frase combina instrumento y propósito militar. 'Grito de guerra' comunica היטב la señal bélica sin borrar que el texto habla de una acción sonora ritual/militar.
  doctrine_reference: No doctrinal issue; lexical/theological clarity in military signal language
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y el audit trail en inglés, manteniendo la estructura de advertencia militar y la metáfora de liderazgo ('a la cabeza'). Se adoptó 'Yahvé' para el nombre divino conforme a la norma del proyecto, y se prefirió una equivalencia óptima para el giro idiomático de 'dar el grito de guerra'.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' de forma consistente para יְהוָה.
  - Se traduce עִם con 'contra' solo por el contexto verbal bélico de לָחַם, no por el valor básico de la preposición.
  - '''Hijos de Israel'' conserva el plural masculino del hebreo y queda bien en un vocativo público.'
  - '''A la cabeza'' reproduce la imagen de liderazgo sin forzar una paráfrasis interpretativa.'
