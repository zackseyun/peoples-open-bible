  to: 'Y Moisés les mandó, diciendo: «Al final de cada período de siete años[a], en el tiempo señalado del año de liberación[b], en la fiesta de las Cabañas[c],»'
  rationale: Se corrigió el anclaje de la nota [a] para que corresponda a la frase temporal que realmente comenta. También se cambió «les ordenó» por «les mandó» para lograr una construcción más natural con «diciendo» en español, sin perder la fuerza directiva de צוה. Además, se ajustó «cada siete años» a «cada período de siete años» para mejorar la fluidez y expresar con más claridad la recurrencia del ciclo legal.
