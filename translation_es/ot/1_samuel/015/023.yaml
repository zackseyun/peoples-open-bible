    issue: La frase «él también te ha rechazado para que no seas rey» altera el sentido de la cláusula final.
    rationale: El hebreo מִמֶּלֶךְ con מָאַס indica rechazo/remoción desde la condición de rey, no propósito («para que no...»). La formulación actual añade una idea final que el original no expresa.
  - severity: medium
    issue: «los terafines» en el texto principal es menos claro que «ídolos domésticos».
    rationale: El English POB eligió expresar el sentido para lectores modernos y dejar el término técnico en nota. En español general eclesial, «terafines» puede oscurecer el referente cultual doméstico.
  - severity: low
    issue: La doble repetición de «Porque» es aceptable pero algo pesada en español.
    rationale: El primer כִּי puede verterse como «Porque» o «Pues». No exige cambio, pero una leve mejora de fluidez es posible sin perder valor causal/explanatorio.
  revised_spanish_text: Porque la rebelión es como el pecado de la adivinación[a], y la obstinación es como la maldad y los ídolos domésticos[b]. Porque has rechazado la palabra de Yahvé, él también te ha rechazado como rey[c].
