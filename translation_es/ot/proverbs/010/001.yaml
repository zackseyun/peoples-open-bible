lexical_decisions:
- source_word: מִשְׁלֵי
  english_pob_choice: The proverbs of
  chosen_spanish: Proverbios de
  alternatives_spanish:
  - Los proverbios de
  - Dichos de
  lexicon: HALOT
  rationale: El hebreo funciona como encabezado de colección; en español, «Proverbios de» conserva bien ese valor titular sin sobrecargar el texto con un artículo innecesario.
- source_word: שְׁלֹמֹה
  english_pob_choice: Solomon
  chosen_spanish: Salomón
  alternatives_spanish:
  - Shlomó
  lexicon: HALOT
  rationale: Nombre propio establecido en español bíblico; no requiere transliteración especial en este contexto.
- source_word: בֵּן
  english_pob_choice: son
  chosen_spanish: hijo
  alternatives_spanish:
  - niño
  - descendiente
  lexicon: HALOT
  rationale: El hebreo es masculino singular explícito. «Hijo» conserva el paralelo y la precisión de género que el texto exige.
- source_word: חָכָם
  english_pob_choice: wise
  chosen_spanish: sabio
  alternatives_spanish:
  - prudente
  - hábil
  lexicon: HALOT
  rationale: En literatura sapiencial, חָכָם apunta a sabiduría moral y práctica; «sabio» es la equivalencia más directa y natural en español.
- source_word: יְשַׂמַּח
  english_pob_choice: makes ... glad
  chosen_spanish: alegra
  alternatives_spanish:
  - hace feliz
  - regocija
  lexicon: HALOT
  rationale: El verbo es causativo; «alegra» transmite de forma breve y natural la idea de causar alegría sin perder la fuerza del hebreo.
- source_word: אָב
  english_pob_choice: a father
  chosen_spanish: el padre
  alternatives_spanish:
  - un padre
  - su padre
  lexicon: HALOT
  rationale: Aunque el hebreo no trae sufijo posesivo, el español proverbial suena más natural con artículo definido en esta estructura generalizante. Conserva la referencia proverbial al padre sin forzar posesión explícita.
- source_word: וּבֵן
  english_pob_choice: but a ... son
  chosen_spanish: pero el hijo
  alternatives_spanish:
  - y el hijo
  - mas el hijo
  lexicon: HALOT
  rationale: El waw es formalmente «y», pero el paralelismo antitético en español se comunica mejor con «pero».
- source_word: כְּסִיל
  english_pob_choice: foolish
  chosen_spanish: necio
  alternatives_spanish:
  - insensato
  - fatuo
  lexicon: HALOT
  rationale: En Proverbios, כְּסִיל describe torpeza moral y sapiencial; «necio» preserva ese matiz mejor que un simple insulto intelectual.
- source_word: תּוּגַת
  english_pob_choice: the grief of
  chosen_spanish: el dolor de
  alternatives_spanish:
  - la tristeza de
  - la aflicción de
  lexicon: HALOT
  rationale: El sustantivo admite el campo semántico de tristeza/dolor/pena. «Dolor de» mantiene la concisión proverbial y una carga afectiva fuerte en español.
- source_word: אִמּוֹ
  english_pob_choice: his mother
  chosen_spanish: su madre
  alternatives_spanish:
  - la madre de él
  - de su madre
  lexicon: HALOT
  rationale: El sufijo posesivo masculino singular se expresa de forma natural en español como «su madre»; el antecedente inmediato garantiza la referencia.
theological_decisions:
- issue: Tono sapiencial y alcance proverbial general
  english_pob_reading: A wise son makes a father glad, but a foolish son is the grief of his mother.
  chosen_spanish_reading: el hijo sabio alegra al padre, pero el hijo necio es el dolor de su madre
  alternative_spanish_readings:
  - un hijo sabio alegra a un padre, pero un hijo necio es el dolor de su madre
  - el hijo sabio alegra a su padre, pero el hijo necio es el dolor de su madre
  rationale: El hebreo presenta formulación gnómica general. Mantener artículos definidos en español conserva el carácter proverbial sin introducir una referencia demasiado particularizada.
  doctrine_reference: 'Sabiduría proverbial: formulación general, no promesa absoluta ni caso singular.'
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios necesarios y el acuerdo interrevisor fue alto (1.0); por eso se mantiene una redacción directa y estable, con una sola nota para la alternativa lexical ya documentada en el POB inglés.
  spanish_consistency_notes:
  - Se conserva el paralelismo antitético del hebreo con «pero».
  - Se mantiene la referencia masculina explícita de בֵּן mediante «hijo».
  - «Sabio/necio» refleja el léxico sapiencial de Proverbios sin neutralizarlo.
  - La nota a cubre la alternativa castellana atestiguada por el POB inglés respecto de תּוּגַת.
  - No se ha introducido terminología eclesiástica ajena al registro sapiencial del texto.
