    rationale: Las instrucciones requieren que el marcador aparezca en la palabra o frase pertinente. Tal como está, induce a pensar que la variante afecta a «nombre» en vez de ἐμόλυνα.
  - severity: medium
    issue: Falta una nota para «siete», presente en el POB inglés como aclaración contextual.
    rationale: El griego dice solo «siete», pero la auditoría inglesa preserva una nota que aclara que se trata de siete esposos. En español conviene mantener esa ayuda, ya que la frase es igualmente elíptica.
  - severity: medium
    issue: «Soy la única hija de mi padre» puede mejorarse a «Soy hija única de mi padre».
    rationale: Ambas son fieles, pero «hija única» es la formulación española más natural y preserva bien μονογενής sin sonar expandida.
  - severity: medium
