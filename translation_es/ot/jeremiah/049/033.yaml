review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja correctamente la estructura y el sentido del hebreo: Hazor pasará a ser habitación de animales del desierto, quedará desolada permanentemente y no será habitada por seres humanos. También preserva la distinción entre יֵשֵׁב (''habitar'') y יָגוּר (''residir/forasterear/sojourn'').'
  spanish_quality_summary: El español es generalmente claro y digno, pero 'hijo de hombre' suena poco natural en español bíblico contemporáneo y no reproduce bien la expresión estable 'son of man'; la forma idiomática y reconocible es 'hijo de Adán' o, si se quiere máxima literalidad formal, 'hijo de ser humano' no funciona bien. Además, 'se hospedará' introduce un matiz de alojamiento temporal moderno/comercial algo estrecho para גוּר. 'Morará como forastero' o 'residirá' serían más fieles, pero conviene conservar la distinción con 'habitará'.
  glossary_alignment: No hay términos del glosario principal en disputa aquí. La transliteración 'Hazor' y 'chacales' están bien. La política del proyecto de conservar el masculino genérico está respetada, pero la realización española debe sonar bíblica e inteligible.
  issues:
  - severity: medium
    issue: '''hijo de hombre'' es una formulación española poco idiomática'
    rationale: Aunque intenta preservar el literalismo de בֶּן אָדָם, en español bíblico la expresión reconocible es 'hijo de Adán' o se requiere nota explicativa. 'Hijo de hombre' suena forzado y menos natural que el equivalente tradicional estable.
  - severity: medium
    issue: '''se hospedará'' estrecha demasiado el sentido de יָגוּר'
    rationale: גוּר denota residir/sojornar como forastero, no específicamente alojarse como huésped. 'Se hospedará' puede sugerir hotel o estancia breve, perdiendo el matiz de residencia forastera.
  revised_spanish_text: Hazor se convertirá en una guarida de chacales[a], una desolación para siempre; no habitará allí ningún hombre[b], y ningún hijo de Adán morará como forastero en ella.
  revised_footnotes:
