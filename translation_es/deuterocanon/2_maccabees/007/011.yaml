translation:
  language: es
  text: 'Y habló valientemente: «Del cielo he recibido estas[a][b], y por sus leyes las tengo en poco, y de él espero recibirlas de nuevo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Es decir, los miembros corporales que le habían quitado; el contexto sugiere una esperanza de restauración corporal por parte de Dios.
    reason: cross_reference
  - marker: b
    text: 'O: «he adquirido estas» / «poseo estas».'
    reason: lexical_alternative
lexical_decisions:
- source_word: γενναίως
  english_pob_choice: courageously
  chosen_spanish: valientemente
  alternatives_spanish:
  - con valentía
  - courageosamente
  - noblemente
  lexicon: LSJ
  rationale: El adverbio describe la manera en que habla bajo tormento. «Valientemente» es natural en español y conserva el énfasis en el valor; mantiene un registro digno sin sonar forzado.
- source_word: Ἐξ οὐρανοῦ
  english_pob_choice: From heaven
  chosen_spanish: Del cielo
  alternatives_spanish:
  - Del cielo arriba
  - De los cielos
  - De Dios
  lexicon: LSJ
  rationale: La fuente griega dice literalmente «del cielo» y no explicita «Dios». Mantener «cielo» preserva la forma del texto y la circunlocución reverente.
- source_word: ταῦτα
  english_pob_choice: these
  chosen_spanish: éstas
  alternatives_spanish:
  - estas cosas
  - estos miembros
  - éstos
  lexicon: LSJ
  rationale: El pronombre es deliberadamente implícito y se refiere por contexto a los miembros corporales mutilados. «Éstas» conserva la brevedad del griego sin añadir una especificación que el texto no da.
- source_word: κέκτημαι
  english_pob_choice: I received
  chosen_spanish: he recibido
  alternatives_spanish:
  - he adquirido
  - poseo
  - recibí
  lexicon: LSJ
  rationale: Aunque el perfecto puede significar «he adquirido» o «poseo», aquí el contexto de procedencia favorece el sentido de recepción desde el cielo. «He recibido» comunica mejor la fuente y el don.
- source_word: διὰ τοὺς αὐτοῦ νόμους
  english_pob_choice: for his laws
  chosen_spanish: por sus leyes
  alternatives_spanish:
  - a causa de sus leyes
  - por causa de sus leyes
  - por amor a sus leyes
  lexicon: LSJ
  rationale: διά con acusativo expresa causa o razón ligada a fidelidad. «Por sus leyes» es una manera breve y fiel de expresar esa relación sin sobreinterpretar.
- source_word: ὑπερορῶ
  english_pob_choice: I disregard
  chosen_spanish: las tengo en poco
  alternatives_spanish:
  - las desprecio
  - las desatiendo
  - no les hago caso
  lexicon: LSJ
  rationale: El verbo expresa tratar algo como de poco valor. «Las tengo en poco» conserva el matiz de considerar estos miembros como secundarios frente a la obediencia a la ley, sin cargarlo con una dureza innecesaria.
- source_word: παρʼ αὐτοῦ
  english_pob_choice: from him
  chosen_spanish: de él
  alternatives_spanish:
  - de parte de él
  - de Dios
  - de su mano
  lexicon: LSJ
  rationale: El antecedente es implícito pero claro en el contexto. «De él» mantiene la concisión del griego y evita introducir un nombre no explicitado.
- source_word: πάλιν ἐλπίζω κομίσεσθαι
  english_pob_choice: I hope to receive them back again
  chosen_spanish: espero recibirlas de nuevo
  alternatives_spanish:
  - espero recobrarlas de nuevo
  - espero recibiarlas otra vez
  - espero recuperarlas
  lexicon: LSJ
  rationale: κομίζομαι aquí implica recibir de vuelta. «Recibirlas de nuevo» conserva la idea de restitución, y el plural femenino concuerda con «éstas» para una españolidad fluida.
theological_decisions:
- issue: Si explicitar la esperanza de resurrección corporal en el texto principal
  english_pob_reading: I hope to receive them back again, with a footnote indicating bodily restoration from God
  chosen_spanish_reading: espero recibirlas de nuevo, dejando la restauración corporal implícita en el texto y explicitándola en nota
  alternative_spanish_readings:
  - espero recibirlas de nuevo en la resurrección
  - espero que Dios me las devuelva
  rationale: El griego expresa la esperanza de recibir de vuelta los miembros, pero no nombra directamente la resurrección. Mantener esa sobriedad conserva la tensión teológica del pasaje y evita insertar una explicación que el texto no formula.
  doctrine_reference: Primacía del texto original; preservar la tensión teológica sin resolverla por paráfrasis.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB en inglés, que prefirió «courageously» sobre «bravely». En español se eligió un equivalente de registro similar, «valientemente», y se conservó la secuencia breve de fuente, desvalorización y esperanza de restitución, sin añadir «resurrección» al cuerpo del versículo.
  spanish_consistency_notes:
  - Se mantiene «cielo» y no «Dios» para respetar la formulación explícita del griego.
  - Se conserva la referencia implícita a los miembros amputados mediante el demostrativo femenino plural, en continuidad con el contexto narrativo.
  - «De él» evita sobreespecificar el antecedente divino en el cuerpo del versículo.
  - La nota a desarrolla la referencia corporal; la nota b recoge la alternativa léxica de ὑπερορῶ sin alterar el texto principal.
