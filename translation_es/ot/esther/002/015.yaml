base_translation:
  language: en
  yaml_path: translation/ot/esther/002/015.yaml
  text: When Esther’s turn came—the daughter of Abihail[a], the uncle of Mordecai, who had taken her as his own daughter—to go in to the king, she asked for nothing except what Hegai, the king’s eunuch, keeper of the women, advised[b]. And Esther was gaining favor in the eyes of all who saw her.
  footnotes:
  - marker: a
    text: Or 'had adopted her as a daughter.' The Hebrew idiom means Mordecai had taken Esther into filial care.
    reason: lexical_alternative
  - marker: b
    text: '''Eunuch'' can in some contexts be rendered more broadly as ''court official,'' but the harem setting here favors the more specific sense.'
    reason: lexical_alternative
