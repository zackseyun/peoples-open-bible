translation:
  language: es
  text: Él hizo la tierra por su poder[a]; estableció el mundo por su sabiduría[b], y por su entendimiento extendió los cielos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “hace la tierra”. El participio hebreo puede expresar una acción presente o habitual, pero aquí se vierte con pasado para mantener el paralelismo natural de la línea.'
    reason: lexical_alternative
  - marker: b
    text: «Mundo» traduce tevel, término que suele referirse al mundo habitado u ordenado.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֹשֵׂה
  english_pob_choice: made
  chosen_spanish: hizo
  alternatives_spanish:
  - hace
  - hacedor de
  lexicon: HALOT
  rationale: El participio hebreo admite fuerza presente o descriptiva, pero en este paralelismo poético con verbos finitos posteriores, el español fluye mejor con un perfecto simple. "Hizo" conserva la acción creadora sin forzar una perífrasis rara en este contexto.
- source_word: אֶרֶץ
  english_pob_choice: earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra
  - el país
  lexicon: HALOT
  rationale: El contexto cósmico contrapone tierra/mundo con cielos, por lo que "la tierra" es más fiel y natural que "el país".
- source_word: בְּכֹחוֹ
  english_pob_choice: by his power
  chosen_spanish: por su poder
  alternatives_spanish:
  - con su poder
  lexicon: HALOT
  rationale: La ב instrumental se expresa de manera idiomática en español con "por" en este tipo de formulaciones causales/instrumentales. "Poder" mantiene la fuerza creativa divina del término.
- source_word: מֵכִין
  english_pob_choice: established
  chosen_spanish: estableció
  alternatives_spanish:
  - preparó
  - afirmó
  lexicon: HALOT
  rationale: כון en piel/hiphil en contexto de creación apunta a fijar o establecer con firmeza. "Estableció" preserva mejor la idea de ordenar y asentar el mundo que "preparó".
- source_word: תֵּבֵל
  english_pob_choice: world
  chosen_spanish: el mundo
  alternatives_spanish:
  - el mundo habitado
  - la tierra habitada
  lexicon: HALOT
  rationale: תבל designa el mundo ordenado e habitado. "El mundo" es la forma más sobria y reconocible en español, sin perder el matiz cósmico.
- source_word: בְּחָכְמָתוֹ
  english_pob_choice: by his wisdom
  chosen_spanish: por su sabiduría
  alternatives_spanish:
  - con su sabiduría
  lexicon: HALOT
  rationale: Se conserva el valor instrumental de la preposición con "por". "Sabiduría" traduce de manera estándar y teológicamente fuerte חכמה.
- source_word: וּבִתְבוּנָתוֹ
  english_pob_choice: and by his understanding
  chosen_spanish: y por su entendimiento
  alternatives_spanish:
  - y por su discernimiento
  - y por su inteligencia
  lexicon: HALOT
  rationale: 'Se mantiene la distinción con el término anterior: תבונה no se aplana a "sabiduría" sino que se vierte como "entendimiento", un equivalente natural y suficientemente diferenciado en español.'
- source_word: נָטָה
  english_pob_choice: stretched out
  chosen_spanish: extendió
  alternatives_spanish:
  - tendió
  - desplegó
  lexicon: HALOT
  rationale: En español, "extendió los cielos" comunica de forma clara la imagen espacial de נטה. "Tendió" sería más literal, pero puede sonar menos natural; "extendió" conserva la imagen sin endurecer el estilo.
- source_word: שָׁמָיִם
  english_pob_choice: the heavens
  chosen_spanish: los cielos
  alternatives_spanish:
  - los cielos
  - el cielo
  lexicon: HALOT
  rationale: El plural hebreo se refleja mejor con "los cielos", que mantiene el registro cósmico y la pluralidad de forma más fiel que "el cielo".
theological_decisions:
- issue: Sujeto divino implícito en la cláusula
  english_pob_reading: Use the pronoun 'He' to continue the referent from context without adding a divine name not present in this clause.
  chosen_spanish_reading: 'Conservar el sujeto implícito como pronombre de tercera persona: "Él".'
  alternative_spanish_readings:
  - Dios hizo la tierra...
  - Yahvé hizo la tierra...
  rationale: El hebreo presenta predicados sin un nombre divino explícito en esta línea; el referente se recupera del contexto. "Él" respeta ese flujo discursivo sin añadir un título o nombre que no aparece en este verso.
  doctrine_reference: Translation philosophy §1, §5
- issue: Valor poético de los sustantivos de conocimiento ('sabiduría' / 'entendimiento')
  english_pob_reading: '''Wisdom'' and ''understanding'' are kept distinct to preserve the Hebrew parallelism.'
  chosen_spanish_reading: Mantener la distinción entre "sabiduría" y "entendimiento".
  alternative_spanish_readings:
  - sabiduría y sabiduría
  - sabiduría e inteligencia
  rationale: El paralelismo hebreo distingue חכמה de תבונה; el español debe reflejar esa diferencia para no perder la progresión poética y conceptual del verso.
  doctrine_reference: Poetic parallelism; semantic distinction in wisdom vocabulary
translation_notes:
  revision_awareness: 'La versión sigue de cerca el audit trail inglés: conserva el sujeto implícito con pronombre, mantiene la distinción entre tevel y šāmayim, y refleja la posibilidad aspectual del participio inicial en una nota alternativa sin imponerla al texto base.'
  spanish_consistency_notes:
  - Se usa "por" para el valor instrumental de ב en las tres cláusulas, evitando alternar con "con" sin necesidad textual.
  - '"La tierra / el mundo / los cielos" preserva la serie cósmica y la simetría poética del hebreo.'
  - '"Sabiduría" y "entendimiento" se mantienen diferenciados para respetar el paralelismo semántico.'
  - No se introduce "SEÑOR" ni "Cristo"; el verso no contiene esos elementos en la fuente hebrea.
