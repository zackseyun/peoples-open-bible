    text: 'O, más idiomáticamente: «porque para siempre perdura su amor leal».'
    reason: lexical_alternative
  - marker: b
    text: «Humillación» también puede entenderse como «estado abatido» o «bajo estado».
    reason: lexical_alternative
  revision_rationale: Se ajustó 'bajo estado' a 'humillación' por mayor naturalidad y fuerza semántica en español, manteniendo una nota con las alternativas preservadas por la auditoría inglesa. También se reordenó el refrán a 'porque su amor leal es para siempre' para conservar el sentido de la fuente y la decisión inglesa 'is forever' en un español claro y digno.
