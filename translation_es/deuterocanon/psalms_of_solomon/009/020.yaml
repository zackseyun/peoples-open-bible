translation:
  language: es
  text: La misericordia de Yahvé está sobre la casa de Israel por siempre y para siempre[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por siempre y aun más», para reflejar con más literalidad la fuerza ampliada de la frase griega.
    reason: lexical_alternative
lexical_decisions:
- source_word: κυρίου
  english_pob_choice: the Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  - del Señor
  lexicon: BDAG / POB default YHWH
  rationale: En este contexto el griego κύριος corresponde al nombre divino del pacto, y el proyecto pide evitar el enmascaramiento con «SEÑOR». «Yahvé» preserva la referencia al nombre de Dios de manera transparente en español.
- source_word: ἐλεημοσύνη
  english_pob_choice: mercy
  chosen_spanish: misericordia
  alternatives_spanish:
  - compasión
  - bondad
  - acto de misericordia
  lexicon: BDAG
  rationale: El sustantivo expresa la disposición favorable y la acción benevolente de Dios hacia Israel. «Misericordia» es la equivalencia más natural y más fiel al peso teológico del término.
- source_word: ἡ ἐπʼ οἶκον Ἰσραήλ
  english_pob_choice: is upon the house of Israel
  chosen_spanish: está sobre la casa de Israel
  alternatives_spanish:
  - recae sobre la casa de Israel
  - permanece sobre la casa de Israel
  - es para la casa de Israel
  lexicon: BDAG
  rationale: 'La preposición con artículo funciona de forma predicativa: la misericordia se extiende o reposa sobre Israel. «Está sobre» conserva la imagen espacial y la referencia colectiva de «casa de Israel».'
- source_word: εἰς τὸν αἰῶνα καὶ ἔτι
  english_pob_choice: forever and ever
  chosen_spanish: por siempre y para siempre
  alternatives_spanish:
  - eternamente y además
  - por siempre y aun más
  - para siempre
  lexicon: BDAG
  rationale: La secuencia intensifica la duración más allá de un simple «para siempre». «Por siempre y para siempre» reproduce esa intensificación de modo idiomático y audible en español.
translation_notes:
  revision_awareness: El inglés POB pasó de una formulación posesiva («The Lord's mercy») a una más formal («The mercy of the Lord») y de una paráfrasis compacta a una expresión completa de «forever and ever». La versión española sigue esa revisión al mantener un sustantivo explícito («misericordia del Yahvé») y una intensificación completa («por siempre y para siempre»).
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme al estándar del proyecto para κύριος cuando remite al nombre divino.
  - «Casa de Israel» conserva la expresión colectiva y covenantal del griego sin reducirla a un grupo meramente doméstico.
  - No se usa «Cristo» ni terminología eclesiástica ajena al texto.
  - La nota al pie preserva una alternativa semántica real sin sobrecargar el texto principal.
