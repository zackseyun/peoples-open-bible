translation:
  language: es
  text: No huya el veloz, ni escape el valiente[a]; hacia el norte[b], junto a la ribera del Éufrates[c], tropezaron y cayeron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “el guerrero”. El hebreo גִּבּוֹר a menudo se refiere a un hombre fuerte o a un combatiente valeroso.
    reason: lexical_alternative
  - marker: b
    text: O “al norte” o “en el norte”. La forma hebrea צָפוֹנָה puede entenderse tanto de manera direccional como locativa.
    reason: lexical_alternative
  - marker: c
    text: Literalmente, “junto a la mano del río Éufrates”, un giro hebreo que significa “junto a” o “a la orilla de” el río.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל / יָנוּס
  english_pob_choice: Let not flee
  chosen_spanish: No huya
  alternatives_spanish:
  - No escape
  - Que no huya
  lexicon: HALOT
  rationale: El hebreo expresa prohibición con valor jussivo. En español, una prohibición impersonal en tercera persona se puede decir naturalmente con 'No huya', que conserva el tono profético y evita volverlo una orden directa en segunda persona.
- source_word: הַקַּל
  english_pob_choice: the swift
  chosen_spanish: el ligero
  alternatives_spanish:
  - el veloz
  - el rápido
  - el ágil
  lexicon: HALOT
  rationale: El término hebreo apunta al que es rápido o liviano; 'ligero' conserva esa idea y funciona bien en un marco militar/poético. 'Veloz' o 'rápido' también serían posibles, pero 'ligero' se ajusta mejor a la carga léxica del original.
- source_word: וְאַל יִמָּלֵט
  english_pob_choice: let not ... escape
  chosen_spanish: ni escape
  alternatives_spanish:
  - ni se libre
  - ni se escape
  lexicon: HALOT
  rationale: El nifal de מלט en este contexto significa 'escapar'. 'Ni escape' reproduce la paralelismo prohibitivo con el primer hemistiquio y mantiene la tersura poética del verso.
- source_word: הַגִּבּוֹר
  english_pob_choice: the mighty man
  chosen_spanish: el valiente
  alternatives_spanish:
  - el poderoso
  - el guerrero
  - el hombre fuerte
  lexicon: HALOT
  rationale: Aunque el sentido literal es 'poderoso/fuerte', en este contexto bélico el valor funcional es el de un combatiente valeroso. 'Valiente' comunica bien esa fuerza militar en español sin perder la referencia a una figura sobresaliente de guerra.
- source_word: צָפֹונָה
  english_pob_choice: in the north / northward
  chosen_spanish: hacia el norte
  alternatives_spanish:
  - al norte
  - en el norte
  lexicon: HALOT
  rationale: La forma puede ser locativa o direccional. Dado el contexto, 'hacia el norte' preserva la ambigüedad direccional que el inglés POB anotó y evita fijar indebidamente solo una lectura locativa.
- source_word: עַל יַד
  english_pob_choice: by the bank of
  chosen_spanish: junto a la ribera de
  alternatives_spanish:
  - al lado de
  - a la orilla de
  - junto al
  - por la ribera de
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'junto a la mano de'. En español, el giro idiomático más natural para un río es 'junto a la ribera de' o 'a la orilla de'; se eligió 'ribera' para mantener el matiz geográfico y la naturalidad.
- source_word: נְהַר פְּרָת
  english_pob_choice: the Euphrates River
  chosen_spanish: río Éufrates
  alternatives_spanish:
  - el Éufrates
  - el río Éufrates
  - el río del Éufrates
  lexicon: HALOT
  rationale: En español, 'río Éufrates' es la forma geográfica más natural y digna. Conserva el nombre propio y hace explícita la referencia fluvial sin sobrecargar la frase.
- source_word: כָּשְׁלוּ
  english_pob_choice: they have stumbled
  chosen_spanish: tropezaron
  alternatives_spanish:
  - han tropezado
  - vacilaron
  - se tambalearon
  lexicon: HALOT
  rationale: El verbo expresa tropiezo/caída en sentido figurado de derrota. En español, 'tropezaron' comunica bien el golpe repentino y permite enlazar de forma fluida con 'cayeron'.
- source_word: וְנָפָלוּ
  english_pob_choice: and fallen
  chosen_spanish: y cayeron
  alternatives_spanish:
  - y han caído
  - y se derrumbaron
  lexicon: HALOT
  rationale: '''Cayeron'' conserva la secuencia poética de derrota con un paralelo claro a ''tropezaron''. ''Se derrumbaron'' sería más interpretativo; ''y cayeron'' es sobrio y fiel al hebreo.'
theological_decisions:
- issue: 'Lectura de צָפֹונָה: locativa o direccional'
  english_pob_reading: Or 'northward' or 'to the north.' The Hebrew form can be understood directionally as well as locationally.
  chosen_spanish_reading: hacia el norte
  alternative_spanish_readings:
  - en el norte
  - al norte
  rationale: No se debe borrar la tensión semántica del hebreo. 'Hacia el norte' conserva la posibilidad direccional y sigue siendo compatible con el marco geográfico del verso.
  doctrine_reference: None; lexical/semantic ambiguity only
- issue: Sentido bélico de גִּבּוֹר
  english_pob_reading: Or 'the warrior' for 'the mighty man.'
  chosen_spanish_reading: el valiente
  alternative_spanish_readings:
  - el guerrero
  - el poderoso
  - el hombre fuerte
  rationale: La opción 'valiente' explicita la cualidad bélica que el contexto requiere en español, sin imponer una categoría doctrinal. Mantiene el contraste entre rapidez y fortaleza dentro de la derrota anunciada.
  doctrine_reference: None; lexical/contextual nuance only
translation_notes:
  revision_awareness: Se siguió el estado revisado más reciente del POB en inglés, que no introdujo cambios adicionales y fue marcado como conforme con alta concordancia. No hay revisiones aplicadas que alteren la base textual de Jeremías 46:6.
  spanish_consistency_notes:
  - Se mantuvo un registro sobrio y profético, con sintaxis breve y paralelismo en dos miembros.
  - Se evitó 'SEÑOR' u otras sustituciones porque el versículo no contiene el tetragrámaton ni una referencia divina directa.
  - Se conservó la imagen de tropiezo/caída como secuencia poética de derrota militar.
  - La puntuación y el orden de los complementos se ajustaron al español natural sin borrar la ambigüedad documentada de צָפוֹנָה.
