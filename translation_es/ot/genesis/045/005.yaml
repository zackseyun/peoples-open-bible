translation:
  language: es
  text: Y ahora[a], no se entristezcan ni se enojen consigo mismos[b], porque ustedes me vendieron aquí, pues para preservar la vida[c] me envió Dios delante de ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘ahora’.
    reason: alternative_reading
  - marker: b
    text: Lit., ‘no arda en sus ojos’, un modismo para enojo o disgusto.
    reason: lexical_alternative
  - marker: c
    text: O ‘para preservación de la vida’.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: And now
  chosen_spanish: Y ahora
  alternatives_spanish:
  - Ahora
  lexicon: HALOT
  rationale: Mantiene el valor discursivo de transición y la conexión lógica con lo anterior. En español, ‘Y ahora’ conserva mejor el enlace que ‘Ahora’ solo.
- source_word: אַל תֵּעָצְבוּ
  english_pob_choice: do not be distressed
  chosen_spanish: no se entristezcan
  alternatives_spanish:
  - no se angustien
  - no se aflijan
  - no se entristezcan
  lexicon: HALOT
  rationale: עצב expresa dolor emocional o tristeza; en español ‘entristecerse’ comunica bien esa carga sin volverlo demasiado técnico. Además, mantiene la alternativa reconocida por el POB inglés entre ‘distressed’ y ‘grieved’.
- source_word: וְאַל יִחַר בְּעֵינֵיכֶם
  english_pob_choice: or angry with yourselves
  chosen_spanish: ni se enojen consigo mismos
  alternatives_spanish:
  - ni les arda en los ojos
  - ni se disgusten consigo mismos
  - ni se enojen
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática, literalmente vinculada a ‘arder en los ojos’, pero aquí apunta a enojo o disgusto. ‘Consigo mismos’ refleja el sentido contextual de auto-reproche que el inglés POB captó con ‘with yourselves’.
- source_word: כִּי מְכַרְתֶּם אֹתִי הֵנָּה
  english_pob_choice: because you sold me here
  chosen_spanish: porque ustedes me vendieron aquí
  alternatives_spanish:
  - porque me vendieron aquí
  - ya que ustedes me vendieron aquí
  lexicon: HALOT
  rationale: 'Se conserva de forma directa la acusación explícita del hebreo: no se suaviza el verbo ‘vender’. ‘Aquí’ reproduce el valor deíctico de הֵנָּה.'
- source_word: לְמִחְיָה
  english_pob_choice: to preserve life
  chosen_spanish: para preservación de la vida
  alternatives_spanish:
  - para preservar la vida
  - para sustento de vida
  - para supervivencia
  lexicon: HALOT
  rationale: El sustantivo מחיה puede referirse al mantenimiento o preservación de la vida. Se mantiene el matiz nominal que el POB inglés preservó con su nota alternativa, evitando reducirlo solo a un verbo.
- source_word: שְׁלָחַנִי אֱלֹהִים
  english_pob_choice: God sent me
  chosen_spanish: me envió Dios
  alternatives_spanish:
  - Dios me envió
  - Dios me ha enviado
  lexicon: HALOT
  rationale: Se mantiene el agente divino explícito con ‘Dios’ y el verbo de envío. El orden español ‘me envió Dios’ suena más natural y sigue siendo plenamente fiel al hebreo.
- source_word: לִפְנֵיכֶם
  english_pob_choice: ahead of you
  chosen_spanish: delante de ustedes
  alternatives_spanish:
  - antes que ustedes
  - por delante de ustedes
  lexicon: HALOT
  rationale: ‘Delante de ustedes’ conserva la prioridad espacial/temporal del hebreo y resulta natural en español. ‘Antes que ustedes’ también es posible, pero el hebreo combina ambos matices y ‘delante de’ los sostiene bien.
theological_decisions:
- issue: Tensión entre la culpa humana y el propósito divino
  english_pob_reading: Retain both the brothers' culpable action ('you sold me') and God's sovereign purpose ('God sent me') in the main text without softening either.
  chosen_spanish_reading: Mantener tanto la acción culpable de los hermanos (‘ustedes me vendieron’) como el propósito soberano de Dios (‘me envió Dios’) sin atenuar ninguno de los dos.
  alternative_spanish_readings:
  - Suavizar la acción de los hermanos con ‘me apartaron’
  - Hacer que la acción de Dios sea solo permisiva
  rationale: El hebreo yuxtapone de manera deliberada la responsabilidad humana y la acción providencial divina. La redacción española conserva esa tensión teológica en lugar de resolverla.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: El borrador sigue de cerca el paquete fuente hebreo y el audit trail inglés. No se detectaron revisiones posteriores que alteren el sentido, y el consenso de revisión fue de alta concordancia sin cambios sustantivos.
  spanish_consistency_notes:
  - Se usa ‘Dios’ para אֱלֹהִים conforme al estándar del proyecto.
  - Se conserva el paralelismo entre la aflicción emocional de los hermanos y la interpretación providencial de José.
  - Se evita una fórmula eclesiástica tradicional que oscurezca el sentido idiomático del hebreo.
  - ‘Ustedes’ se mantiene de forma consistente para el plural de segunda persona, en línea con el español latinoamericano neutral.
