translation:
  language: es
  text: Y aconteció en el año cuadragésimo[a], en el undécimo mes, el primer día del mes, que Moisés habló a los hijos de Israel, conforme a todo lo que Yahvé le había mandado para ellos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en el año cuarenta». El hebreo usa una datación con número cardinal que aquí funciona con sentido ordinal.'
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «le había mandado a ellos» o «le había mandado concerniente a ellos»; el sentido es que Moisés habló lo que Yahvé le había mandado para Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And it happened
  chosen_spanish: Y aconteció
  alternatives_spanish:
  - Y sucedió
  - Y pasó
  lexicon: HALOT
  rationale: La forma narrativa וַיְהִי introduce el marco temporal del relato. En español, 'aconteció' conserva el valor discursivo de apertura narrativa sin sonar demasiado arcaico.
- source_word: בְּאַרְבָּעִים שָׁנָה
  english_pob_choice: in the fortieth year
  chosen_spanish: en el año cuarenta
  alternatives_spanish:
  - en el cuadragésimo año
  - en cuarenta años
  lexicon: HALOT
  rationale: El hebreo usa una construcción de datación con número cardinal. En español bíblico-natural, 'año cuarenta' expresa con claridad la fecha sin forzar un ordinal menos fluido.
- source_word: בְּעַשְׁתֵּי עָשָׂר חֹדֶשׁ
  english_pob_choice: in the eleventh month
  chosen_spanish: en el mes undécimo
  alternatives_spanish:
  - en el mes once
  - en el undécimo mes
  lexicon: HALOT
  rationale: La construcción hebrea funciona como datación ordinal. 'Mes undécimo' es transparente y digno en español, y preserva el sentido calendárico.
- source_word: בְּאֶחָד לַחֹדֶשׁ
  english_pob_choice: on the first day of the month
  chosen_spanish: el día primero del mes
  alternatives_spanish:
  - el primero del mes
  - el día uno del mes
  lexicon: HALOT
  rationale: La fórmula hebrea señala el primer día del mes. 'El día primero del mes' mantiene la precisión sin añadir una explicación innecesaria.
- source_word: דִּבֶּר
  english_pob_choice: spoke
  chosen_spanish: habló
  alternatives_spanish:
  - dijo
  - se dirigió
  lexicon: HALOT
  rationale: '''דִּבֶּר'' aquí es habla formal de comunicación. ''Habló'' conserva la sobriedad del verbo sin interpretar más de la cuenta el acto de habla.'
- source_word: אֶל בְּנֵי יִשְׂרָאֵל
  english_pob_choice: to the sons of Israel
  chosen_spanish: a los hijos de Israel
  alternatives_spanish:
  - 'a los hijos de Israel (o: a los israelitas)'
  - a los israelitas
  lexicon: HALOT
  rationale: Se mantiene la expresión filial del hebreo. 'Hijos de Israel' es más transparente para el texto fuente que la sustitución por 'israelitas', aunque esta sea una alternativa válida de sentido.
- source_word: כְּכֹל אֲשֶׁר
  english_pob_choice: according to all that
  chosen_spanish: conforme a todo lo que
  alternatives_spanish:
  - según todo lo que
  - de acuerdo con todo lo que
  lexicon: HALOT
  rationale: La partícula de conformidad indica correspondencia plena con el contenido siguiente. 'Conforme a todo lo que' comunica bien esa relación sin endurecer el español.
- source_word: צִוָּה
  english_pob_choice: had commanded
  chosen_spanish: había mandado
  alternatives_spanish:
  - había ordenado
  - había dado mandato
  lexicon: HALOT
  rationale: En este contexto, el verbo expresa mandato divino previo. 'Había mandado' respeta la prioridad temporal señalada por el inglés POB y el hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
  rationale: Se conserva el nombre divino explícito según la norma del proyecto, sin sustituirlo por una máscara reverencial. 'Yahvé' es la forma establecida para el texto español principal.
- source_word: אֹתוֹ אֲלֵהֶם
  english_pob_choice: him to them
  chosen_spanish: a ellos
  alternatives_spanish:
  - para ellos
  - respecto de ellos
  lexicon: HALOT
  rationale: 'La construcción hebrea es comprimida: Yahvé mandó a Moisés aquello que debía comunicarles. En español, ''a ellos'' preserva la dirección del mandato sin sobrecargar la frase; la relación implícita con lo mandado queda ya clara por el contexto.'
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  rationale: El texto hebreo contiene el Tetragrama, y el proyecto evita la sustitución por 'SEÑOR'. 'Yahvé' mantiene el nombre de pacto de manera reconocible para lectores hispanos.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Relación de mandato en אֹתוֹ אֲלֵהֶם
  english_pob_reading: had commanded him to them
  chosen_spanish_reading: le había mandado a ellos
  alternative_spanish_readings:
  - le había mandado para ellos
  - le había mandado concerniente a ellos
  rationale: La tensión del hebreo está en que Dios manda a Moisés algo referido a Israel. 'A ellos' conserva la dirección explícita sin convertir el pasaje en una paráfrasis explicativa más fuerte de lo que permite el texto.
  doctrine_reference: Deuteronomy 1:3 source syntax
translation_notes:
  revision_awareness: El texto inglés auditado fue revisado desde 'for them' a 'to them' para acercarse más al hebreo אֲלֵהֶם. En español se evitó una expansión interpretativa y se mantuvo una dirección mínima con 'a ellos', coherente con la sintaxis hebrea y con la revisión final del POB en inglés.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma principal del nombre divino, en coherencia con la terminología del proyecto.
  - Se usa 'hijos de Israel' por transparencia formal; no se reemplaza por 'israelitas' en el texto principal.
  - 'La secuencia temporal conserva el orden del hebreo: año, mes, día, luego la acción verbal.'
  - '''Mandado'' se prefiere a ''ordenado'' por cercanía semántica con el registro bíblico y continuidad con el audit trail en inglés.'
