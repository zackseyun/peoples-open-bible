translation:
  language: es
  text: Hijo mío[a], si recibes mis palabras y atesoras contigo[b] mis mandamientos,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Mi hijo». El hebreo está en masculino singular, la forma habitual de instrucción paterna en Proverbios.
    reason: lexical_alternative
  - marker: b
    text: O «guardas». El verbo hebreo puede implicar guardar algo cuidadosamente para preservarlo.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנִי
  english_pob_choice: My son
  chosen_spanish: Hijo mío
  alternatives_spanish:
  - Hijo
  - Hijo mío, muchacho mío
  lexicon: HALOT
  rationale: Mantiene el vocativo paternal directo del hebreo en la forma típica de instrucción sapiencial. En español, «Hijo mío» suena natural, solemne y fiel al tono didáctico del proverbio.
- source_word: אִם
  english_pob_choice: if
  chosen_spanish: si
  alternatives_spanish:
  - cuando
  lexicon: HALOT
  rationale: Conserva la fuerza condicional explícita del hebreo en la prótasis.
- source_word: תִּקַּח
  english_pob_choice: you receive
  chosen_spanish: aceptas
  alternatives_spanish:
  - recibes
  - tomas
  - recibas
  lexicon: HALOT
  rationale: En contexto sapiencial, el verbo expresa una recepción obediente de las palabras, no una mera acción de tomar. «Aceptas» comunica bien la idea de recibir con disposición y asentimiento, sin alejarse del sentido del hebreo.
- source_word: אֲמָרַי
  english_pob_choice: my words
  chosen_spanish: mis palabras
  alternatives_spanish:
  - mis dichos
  - mis dichos y palabras
  lexicon: HALOT
  rationale: «Palabras» reproduce de manera natural el plural hebreo y mantiene el paralelismo con «mandamientos» sin añadir matices no requeridos.
- source_word: וּמִצְוֺתַי
  english_pob_choice: and my commandments
  chosen_spanish: mis mandamientos
  alternatives_spanish:
  - mis mandatos
  - mis órdenes
  lexicon: HALOT
  rationale: «Mandamientos» conserva la fuerza normativa y moral del término hebreo מִצְוָה. Se omite la conjunción en español porque el hebreo la usa para enlazar el segundo miembro del paralelismo; en español el sentido queda claro sin repetirla mecánicamente.
- source_word: תִּצְפֹּן
  english_pob_choice: store up
  chosen_spanish: guardas
  alternatives_spanish:
  - atesoras
  - atesoras y guardas
  - almacenas
  lexicon: HALOT
  rationale: El hebreo puede significar guardar, ocultar o atesorar para custodia. «Guardas» expresa con naturalidad la idea de conservar cuidadosamente; en el flujo poético español resulta más idiomático que una forma más literal como «atesoras».
- source_word: אִתָּךְ
  english_pob_choice: with you
  chosen_spanish: contigo
  alternatives_spanish:
  - conmigo
  - a tu lado
  lexicon: HALOT
  rationale: Equivale de forma directa a la presencia/posesión cercana expresada por el hebreo. «Contigo» es idiomático en español y conserva la imagen de tenerlo junto a uno, a la mano.
theological_decisions:
- issue: Vocativo filial masculino en la instrucción sapiencial
  english_pob_reading: My son
  chosen_spanish_reading: Hijo mío
  alternative_spanish_readings:
  - Hijo mío/a
  - Hijo mío, hijo mío
  rationale: El hebreo es masculino singular y la instrucción sapiencial adopta esta forma típica. Se conserva el género gramatical del original, como en el registro auditado en inglés, sin neutralizarlo en el texto principal.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
translation_notes:
  revision_awareness: Se siguió el trazado auditado en inglés y no se introdujeron cambios revisionales respecto del consenso del texto fuente; la solución española conserva el paralelismo, la condicionalidad y la imagen de custodia de los mandamientos.
  spanish_consistency_notes:
  - Se prefirió «mandamientos» para mantener la terminología bíblica consistente con el valor normativo de מִצְוֺתַי.
  - «Hijo mío» respeta el vocativo sapiencial masculino del hebreo y la decisión doctrinal auditada.
  - «Guardas contigo» comunica la custodia cercana implicada por אִתָּךְ sin añadir contenido interpretativo.
