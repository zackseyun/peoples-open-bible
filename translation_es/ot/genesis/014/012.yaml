  to: Tomaron a Lot[a], sobrino de Abram, y sus posesiones, y se fueron[b]. Ahora habitaba en Sodoma.
  rationale: 'Se corrige la nota b para que refleje fielmente la alternativa documentada en la auditoría inglesa: un orden alternativo de los complementos, no una lectura donde Lot pasa a ser el sujeto de «se fueron». Además, se suaviza ligeramente la cláusula final quitando «él», lo que mejora la naturalidad en español sin alterar el sentido.'
