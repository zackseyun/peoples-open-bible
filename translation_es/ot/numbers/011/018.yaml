translation:
  language: es
  text: 'Y al pueblo le dirás[a]: «Conságrense para mañana, y comerán carne, porque lloraron a oídos de Yahvé, diciendo: “¿Quién nos dará carne para comer? Porque en Egipto nos iba bien”. Yahvé les dará carne, y comerán».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Santifíquense para mañana». El verbo hebreo puede expresar apartarse para la acción que Yahvé va a realizar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תֹּאמַר
  english_pob_choice: you shall say
  chosen_spanish: le dirás
  alternatives_spanish:
  - dirás
  lexicon: HALOT
  rationale: 'El imperfecto 2ms con fuerza directiva, dirigido a Moisés, se expresa naturalmente en español con futuro exhortativo: ‘le dirás’. Mantiene el mandato sin sonar mecánico.'
- source_word: הִתְקַדְּשׁוּ
  english_pob_choice: Consecrate yourselves
  chosen_spanish: Santifíquense
  alternatives_spanish:
  - Conságrense
  - Santifíquense a sí mismos
  lexicon: HALOT
  rationale: El hitpael de קדשׁ implica apartarse para la acción divina. ‘Santifíquense’ conserva mejor el matiz cultual/religioso que un simple ‘prepárense’.
- source_word: לְמָחָר
  english_pob_choice: for tomorrow
  chosen_spanish: para mañana
  alternatives_spanish:
  - mañana
  - de cara a mañana
  lexicon: HALOT
  rationale: La preposición orienta la preparación hacia el día venidero; ‘para mañana’ resulta natural y fiel.
- source_word: בָּשָׂר
  english_pob_choice: meat
  chosen_spanish: carne
  alternatives_spanish:
  - carne para comer
  - carne
  lexicon: HALOT
  rationale: Aquí el término se refiere a alimento cárnico, no a ‘flesh’ anatómica. En español, ‘carne’ comunica con claridad ese sentido.
- source_word: בְּכִיתֶם
  english_pob_choice: you have wept
  chosen_spanish: lloraron
  alternatives_spanish:
  - han llorado
  - han estado llorando
  lexicon: HALOT
  rationale: El qatal remite a una acción previa que explica la respuesta divina; en español, el pretérito simple funciona de manera natural sin perder la referencia al hecho consumado.
- source_word: בְּאָזְנֵי יְהוָה
  english_pob_choice: in the hearing of Yahweh
  chosen_spanish: en oídos de Yahvé
  alternatives_spanish:
  - a oídos de Yahvé
  - en presencia de Yahvé
  lexicon: HALOT
  rationale: Se conserva la imagen hebrea de audición, no solo la idea abstracta de ‘ante’. ‘En oídos de Yahvé’ sigue de cerca el giro original y es comprensible en español bíblico actual.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se mantiene el nombre divino como transliteración de יהוה, conforme a la convención del proyecto, en lugar de sustituirlo por un título.
- source_word: מִי יַאֲכִלֵנוּ בָּשָׂר
  english_pob_choice: Who will give us meat to eat?
  chosen_spanish: ¿Quién nos dará carne para comer?
  alternatives_spanish:
  - ¿Quién nos hará comer carne?
  - ¿Quién nos proveerá carne para comer?
  lexicon: HALOT
  rationale: El hiphil de אכל conserva una fuerza causativa, pero en español la forma más natural y fiel al resultado es ‘dará carne para comer’. Evita tanto el calco como la pérdida del sentido causativo.
- source_word: כִּי טוֹב לָנוּ בְּמִצְרָיִם
  english_pob_choice: For it was good for us in Egypt
  chosen_spanish: Porque en Egipto nos iba bien
  alternatives_spanish:
  - Porque nos iba bien en Egipto
  - Porque era bueno para nosotros en Egipto
  lexicon: HALOT
  rationale: La cláusula expresa la evaluación nostálgica del pueblo. ‘Nos iba bien’ transmite de modo idiomático la idea de ‘it was good for us’ sin introducir una comparación no explícita.
- source_word: וְנָתַן יְהוָה לָכֶם בָּשָׂר
  english_pob_choice: And Yahweh will give you meat
  chosen_spanish: Yahvé les dará carne
  alternatives_spanish:
  - Yahvé les dará carne, y
  - Y Yahvé les dará carne
  lexicon: HALOT
  rationale: Se conserva la simple coordinación del hebreo con ‘Y’. ‘Les dará carne’ reproduce la promesa sin añadir inferencias discursivas.
- source_word: וַאֲכַלְתֶּם
  english_pob_choice: and you shall eat
  chosen_spanish: y comerán
  alternatives_spanish:
  - y ustedes comerán
  - y comeréis
  lexicon: HALOT
  rationale: Se retiene la repetición enfática del verbo final. En español, el futuro simple comunica la consecuencia prometida con naturalidad.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton directamente. La línea editorial del proyecto pide ‘Yahvé’ como forma principal en español, preservando el nombre propio del pacto en vez de sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Matiz de הִתְקַדְּשׁוּ
  english_pob_reading: Consecrate yourselves / Sanctify yourselves
  chosen_spanish_reading: Santifíquense
  alternative_spanish_readings:
  - Conságrense
  - Prepárense
  rationale: La orden no es mera higiene ritual ni simple preparación logística; apunta a apartarse en vista de la acción de Yahvé. ‘Santifíquense’ conserva ese peso teológico.
  doctrine_reference: HALOT; contexto cultual de קדשׁ en el Pentateuco
- issue: Expresión idiomática בְּאָזְנֵי יְהוָה
  english_pob_reading: in the hearing of Yahweh
  chosen_spanish_reading: en oídos de Yahvé
  alternative_spanish_readings:
  - a oídos de Yahvé
  - ante Yahvé
  rationale: 'Mantener la imagen hebrea ayuda a no borrar la acusación implícita: el pueblo habló de modo audible para Dios. ‘En oídos de Yahvé’ preserva la figuración sin oscurecer el sentido.'
  doctrine_reference: Figura idiomática hebrea de audición divina
- issue: Causativo de יַאֲכִלֵנוּ
  english_pob_reading: Who will give us meat to eat?
  chosen_spanish_reading: ¿Quién nos dará carne para comer?
  alternative_spanish_readings:
  - ¿Quién nos hará comer carne?
  rationale: El causativo hebreo puede expresarse en español por ‘dar’ con complemento final (‘para comer’), que conserva la idea de provisión sin volver el verso extraño o forzado.
  doctrine_reference: HALOT; uso idiomático español del verbo dar con infinitivo final
translation_notes:
  revision_awareness: 'La redacción sigue la lectura final del audio textual en inglés: mantiene la forma simple de la conjunción en la promesa divina (‘Yahvé les dará carne’), evita inferencias no explícitas como ‘por lo tanto’, y refleja la clausula causal con una expresión española natural (‘porque en Egipto nos iba bien’). También integra la convención editorial española del proyecto para el nombre divino, usando ‘Yahvé’ de manera consistente.'
  spanish_consistency_notes:
  - 'Se conserva el paralelismo verbal del hebreo: mandato inicial, resultado prometido, causa de la reprensión, cita del pueblo y cierre con promesa reiterada.'
  - ‘Carne’ se usa de forma estable para בָּשָׂר en todo el versículo, sin alternar con ‘flesh’ o ‘alimento cárnico’.
  - El nombre divino aparece uniformemente como ‘Yahvé’ según la convención del proyecto.
  - La imagen ‘en oídos de Yahvé’ se mantiene por fidelidad al hebreo y por coherencia con el audit trail en inglés.
