translation:
  language: es
  text: Que te conceda la bendición de Abraham[a], a ti y a tu descendencia contigo, para que poseas[b] la tierra donde has residido como forastero, que Dios dio a Abraham.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «tu simiente contigo»; el sustantivo hebreo está en forma singular, pero tiene sentido colectivo.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «heredes la tierra donde has residido como forastero».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיִתֶּן
  english_pob_choice: May he give
  chosen_spanish: Que te conceda
  alternatives_spanish:
  - Y que te conceda
  - Que él te dé
  lexicon: HALOT
  rationale: El hebreo expresa un deseo/bendición en forma jussiva; en español, 'Que te conceda' comunica bien el valor optativo sin sonar forzado. Se evita añadir un sujeto explícito innecesario, aunque el referente es Dios en el contexto de la bendición.
- source_word: בִּרְכַּת אַבְרָהָם
  english_pob_choice: the blessing of Abraham
  chosen_spanish: la bendición de Abraham
  alternatives_spanish:
  - la bendición prometida a Abraham
  - la bendición de Abraham
  lexicon: HALOT
  rationale: Se conserva la relación posesiva/covenantal del constructo hebreo. 'Bendición de Abraham' mantiene la conexión con la promesa patriarcal sin interpretarla de más.
- source_word: זַרְעֲךָ
  english_pob_choice: offspring
  chosen_spanish: tu descendencia
  alternatives_spanish:
  - tu simiente
  - tus descendientes
  lexicon: HALOT
  rationale: '''זרע'' es singular en forma pero colectivo en sentido. ''Descendencia'' comunica esa colectividad en español con naturalidad. Se evita ''simiente'' por ser menos transparente para lectores modernos, aunque sigue siendo una posible equivalencia formal.'
- source_word: אִתָּךְ
  english_pob_choice: with you
  chosen_spanish: contigo
  alternatives_spanish:
  - conmigo
  - junto a ti
  lexicon: HALOT
  rationale: El hebreo enfatiza la compañía de la descendencia junto a Jacob. 'Contigo' reproduce esa idea de manera concisa y natural en español.
- source_word: לְרִשְׁתְּךָ
  english_pob_choice: so that you may possess
  chosen_spanish: para que poseas
  alternatives_spanish:
  - para que heredes
  - para que tomes posesión de
  lexicon: HALOT
  rationale: La forma infinitiva indica propósito o resultado. 'Poseas' mantiene la idea de entrar en posesión de la tierra sin obligar a traducirla como 'heredar', que sería posible pero introduce un matiz más interpretativo.
- source_word: אֶרֶץ מְגֻרֶיךָ
  english_pob_choice: the land of your sojournings
  chosen_spanish: la tierra de tus peregrinaciones
  alternatives_spanish:
  - la tierra de tu peregrinar
  - la tierra donde has habitado como forastero
  lexicon: HALOT
  rationale: '''מגור'' denota la condición de vivir como residente temporal/forastero. ''Peregrinaciones'' conserva el carácter de estancia provisional y encaja con el lenguaje bíblico en español. Aunque ''sojournings'' puede traducirse también como ''peregrinaciones'', el sentido no es una caminata física sino una residencia extranjera; por eso se evita ''wanderings''.'
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  - Dios
  lexicon: HALOT
  rationale: El término se traduce de forma directa como 'Dios'. No hay aquí un problema de ocultamiento del nombre divino ni una cita de קוּרִיאς/κύριος que requiera explicación especial.
theological_decisions:
- issue: Alcance del pacto abrahámico y la promesa de la tierra
  english_pob_reading: Retain explicit wording 'the blessing of Abraham' and land-possession language without paraphrasing into abstract prosperity.
  chosen_spanish_reading: Conservar 'la bendición de Abraham' y el lenguaje de posesión de la tierra sin convertirlo en una promesa abstracta de prosperidad.
  alternative_spanish_readings:
  - la bendición prometida a Abraham
  - la herencia de la tierra
  rationale: El versículo pertenece a la bendición de Isaac sobre Jacob y remite directamente a la promesa hecha a Abraham. La formulación española mantiene esa referencia pactal y la relación entre bendición, descendencia y tierra, sin suavizarla en términos genéricos.
  doctrine_reference: Génesis 12:1–3; 15:18; 17:7–8; filosofía de traducción del POB
- issue: Matiz de 'posesión' frente a 'herencia'
  english_pob_reading: so that you may possess the land of your sojournings
  chosen_spanish_reading: para que poseas la tierra de tus peregrinaciones
  alternative_spanish_readings:
  - para que heredes la tierra de tus peregrinaciones
  - para que tomes posesión de la tierra de tus peregrinaciones
  rationale: '''Poseas'' sigue de cerca el valor del infinitivo hebreo y expresa la entrada efectiva en posesión del territorio. ''Heredes'' es teológicamente plausible por el trasfondo del pacto, pero introduce un matiz no explícito en la forma verbal aquí.'
  doctrine_reference: éxodo/pacto de la tierra; filosofía de equivalencia óptima
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto hebreo y el registro de la POB en inglés. Se incorporó el ajuste editorial observado en la revisión inglesa: se prefirieron comas naturales en español, sin guiones largos ni expansión interpretativa innecesaria.'
  spanish_consistency_notes:
  - Se usa 'Dios' para אֱלֹהִים de manera uniforme.
  - Se mantiene 'bendición de Abraham' para preservar la referencia pactal.
  - Se opta por 'descendencia' como equivalente natural de זרע con sentido colectivo.
  - Se evita 'SEÑOR' porque aquí el hebreo dice אֱלֹהִים, no el nombre divino ni κύριος.
  - '''Peregrinaciones'' se usa como equivalente bíblico natural de מְגֻרֶיךָ, con nota para su sentido de residencia forastera.'
