translation:
  language: es
  text: para destinar a los enlutados de Sion, para darles un tocado[a] en vez de ceniza, aceite de alegría en vez de luto, un manto de alabanza en vez de un espíritu abatido; y serán llamados robles de justicia[b], plantación de Yahvé[c], para manifestar su gloria[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «adorno»; el hebreo פְּאֵר puede denotar adorno o tocado festivo. La imagen concreta probablemente alude a una prenda de cabeza que reemplaza la ceniza del luto.
    reason: lexical_alternative
  - marker: b
    text: O «terebintos de justicia». El término hebreo para el árbol puede referirse con más precisión al terebinto; «robles» se usa aquí como equivalente más familiar en español.
    reason: lexical_alternative
  - marker: c
    text: El hebreo usa aquí el nombre divino propio, no un título. En esta serie el POB español lo vierte como «Yahvé».
    reason: theological_note
  - marker: d
    text: O «para ser glorificado». El verbo hebreo final también puede entenderse como la glorificación de Yahvé por medio de esta plantación.
    reason: alternative_reading
lexical_decisions:
- source_word: לָשׂוּם
  english_pob_choice: to appoint for
  chosen_spanish: para destinar a
  alternatives_spanish:
  - para asignar a
  - para disponer para
  - para designar a
  lexicon: HALOT
  rationale: El infinitivo de propósito expresa aquí preparación/ordenamiento para beneficio de los enlutados; «destinar a» conserva ese valor final sin sonar rígido en español.
- source_word: לַאֲבֵלֵי צִיּוֹן
  english_pob_choice: for the mourners of Zion
  chosen_spanish: a los enlutados de Sion
  alternatives_spanish:
  - a los que lloran en Sion
  - a los dolientes de Sion
  - a los que están en duelo por Sion
  lexicon: HALOT
  rationale: אֲבֵלִים son los que están de duelo; «enlutados» comunica bien la condición de luto y mantiene la referencia a Sion como posesión/ámbito.
- source_word: לָתֵת לָהֶם
  english_pob_choice: to give them
  chosen_spanish: para darles
  alternatives_spanish:
  - para concederles
  - para otorgarles
  lexicon: HALOT
  rationale: «Darles» conserva la sencillez del paralelo hebreo y la relación directa con los dones enumerados.
- source_word: פְּאֵר
  english_pob_choice: a headdress
  chosen_spanish: una corona
  alternatives_spanish:
  - un adorno para la cabeza
  - un tocado
  - una guirnalda
  lexicon: HALOT
  rationale: La imagen concreta es de ornamento de cabeza en contraste con la ceniza. «Corona» es natural y digna en español, aunque el término hebreo puede abarcar adornos o tocado festivo. Se conserva la nota alternativa para no borrar la tensión lexical.
- source_word: תַּחַת אֵפֶר
  english_pob_choice: instead of ashes
  chosen_spanish: en vez de ceniza
  alternatives_spanish:
  - en lugar de ceniza
  lexicon: HALOT
  rationale: «En vez de» refleja claramente la sustitución; «ceniza» mantiene la imagen de duelo practicada sobre la cabeza.
- source_word: שֶׁמֶן שָׂשׂוֹן
  english_pob_choice: oil of gladness
  chosen_spanish: aceite de alegría
  alternatives_spanish:
  - aceite de gozo
  - óleo de alegría
  lexicon: HALOT
  rationale: Se preserva el paralelismo poético y el sustantivo de emoción festiva; «alegría» es claro en español contemporáneo y mantiene el contraste con el luto.
- source_word: תַּחַת אֵבֶל
  english_pob_choice: instead of mourning
  chosen_spanish: en vez de luto
  alternatives_spanish:
  - en lugar de duelo
  - en vez de aflicción
  lexicon: HALOT
  rationale: «Luto» reproduce bien el campo semántico ceremonial/afectivo que contrasta con la alegría.
- source_word: מַעֲטֵה תְהִלָּה
  english_pob_choice: a garment of praise
  chosen_spanish: un manto de alabanza
  alternatives_spanish:
  - una vestidura de alabanza
  - un vestido de alabanza
  lexicon: HALOT
  rationale: מַעֲטֶה es cobertura exterior; «manto» mantiene la metáfora de vestidura con un registro poético natural.
- source_word: תַּחַת רוּחַ כֵּהָה
  english_pob_choice: instead of a faint spirit
  chosen_spanish: en vez de un espíritu abatido
  alternatives_spanish:
  - en vez de un espíritu desmayado
  - en vez de un espíritu decaído
  - en vez de un ánimo abatido
  lexicon: HALOT
  rationale: כֵּהָה indica apagamiento, debilidad o desánimo. «Abatido» conserva el sentido de ánimo/spíritu debilitado sin forzar una psicologización excesiva.
- source_word: וְקֹרָא לָהֶם
  english_pob_choice: and they will be called
  chosen_spanish: y serán llamados
  alternatives_spanish:
  - y se les llamará
  - y uno los llamará
  lexicon: HALOT
  rationale: La forma hebrea permite una lectura impersonal/pasiva; el pasivo español reproduce bien el resultado sin añadir un sujeto explícito.
- source_word: אֵילֵי הַצֶּדֶק
  english_pob_choice: oaks of righteousness
  chosen_spanish: robles de justicia
  alternatives_spanish:
  - encinas de justicia
  - terebintos de justicia
  - robles de rectitud
  lexicon: HALOT
  rationale: La imagen arbórea debe mantenerse. «Robles» es una equivalencia española natural y fuerte; «justicia» conserva el término estándar para צֶדֶק, aunque se reconoce su posible matiz de rectitud/justicia.
- source_word: הַצֶּדֶק
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  lexicon: HALOT
  rationale: Aquí el adjetivo relacional describe a los restaurados como caracterizados por conformidad moral/covenantal. «Justicia» sigue la elección base del POB; «rectitud» queda como alternativa semántica.
- source_word: מַטַּע יְהוָה
  english_pob_choice: the planting of Yahweh
  chosen_spanish: plantío de Yahvé
  alternatives_spanish:
  - plantación de Yahvé
  - lo plantado por Yahvé
  lexicon: HALOT
  rationale: מַטַּע señala algo plantado/plantío. «Plantío» es breve y natural en español; conserva la idea de origen divino y evita diluirla en una paráfrasis.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: 'Se sigue la directriz terminológica del POB en español: el Tetragrámaton se traduce «Yahvé», preservando el nombre divino propio y no sustituyéndolo por un título.'
- source_word: לְהִתְפָּאֵר
  english_pob_choice: that he may display his glory
  chosen_spanish: para manifestar su gloria
  alternatives_spanish:
  - para glorificarse
  - para mostrar su esplendor
  - para ser glorificado
  lexicon: HALOT
  rationale: El hitpael expresa aquí finalidad vinculada a la manifestación del esplendor divino. «Manifestar su gloria» conserva la agencia y suena natural en español bíblico contemporáneo.
theological_decisions:
- issue: Renderización del Tetragrámaton יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: La decisión doctrinal del POB es conservar el nombre propio del pacto. En español, «Yahvé» es la forma establecida por el proyecto para el Tetragrámaton, evitando la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido final de לְהִתְפָּאֵר
  english_pob_reading: that he may display his glory
  chosen_spanish_reading: para manifestar su gloria
  alternative_spanish_readings:
  - para ser glorificado
  - para glorificarse
  rationale: La cláusula final presenta el propósito divino en relación con el pueblo plantado por Yahvé. «Manifestar su gloria» mantiene el matiz activo del verbo y evita reducir la idea a un sustantivo abstracto.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
- issue: Imagen arbórea de אֵילֵי הַצֶּדֶק
  english_pob_reading: oaks of righteousness
  chosen_spanish_reading: robles de justicia
  alternative_spanish_readings:
  - terebintos de justicia
  - encinas de justicia
  rationale: Se conserva el carácter arbóreo del hebreo, porque la metáfora de plantío exige una imagen de árboles fuertes. «Robles» comunica esa fuerza de manera natural para el lector hispano.
  doctrine_reference: DOCTRINE.md Translation philosophy §1
translation_notes:
  revision_awareness: Se tuvo en cuenta el audit trail inglés, incluida la preferencia por preservar la imagen concreta de la prenda de cabeza, la alternativa arbórea de 'terebinths', y la nota sobre el sentido de la cláusula final. La versión española mantiene esas tensiones donde el hebreo las ofrece, adaptándolas a un español natural y publicable.
  spanish_consistency_notes:
  - Se conserva «Yahvé» para יְהוָה de forma consistente con el proyecto.
  - Se mantiene la repetición de «en vez de» para reflejar el patrón de sustitución del hebreo.
  - La serie de imágenes se ordena como cabeza/aceite/vestidura/árboles para respetar el paralelismo poético.
  - «Justicia» se usa como traducción principal de צֶדֶק, con nota alternativa para «rectitud».
