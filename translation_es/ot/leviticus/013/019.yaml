revisions:
- from: y en el lugar del forúnculo hay una hinchazón blanca o una mancha brillante blanco rojiza, y se mostrará[a] al sacerdote.
  to: y en el lugar del forúnculo hay una hinchazón blanca o una mancha brillante blanquecina y rojiza, y se mostrará[a] al sacerdote.
  rationale: Se corrige la descripción cromática para reflejar fielmente la lesión blanca con matiz rojizo en un español natural y gramatical. También se repara la nota al pie para que exprese una alternativa española idiomática que conserve el valor pasivo/reflexivo de וְנִרְאָה sin crear el sentido incorrecto de 'ver al sacerdote'.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:28:53Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura básica del hebreo: ubicación en el sitio del hervor/forúnculo, presencia de una hinchazón blanca o una lesión de otro tipo, y presentación al sacerdote. También preserva adecuadamente la nota sobre וְנִרְאָה como ''ser mostrado/presentado''. Sin embargo, la frase cromática ''mancha brillante blanco rojiza'' no representa bien la relación léxica documentada en el POB inglés (''reddish-white bright spot'') y además resulta gramaticalmente defectuosa en español.'
  spanish_quality_summary: 'El texto es mayormente claro, pero ''forúnculo'' suena algo estrecho o clínicamente específico para un registro bíblico general; aun así, es defendible. El problema principal es la mala concordancia y naturalidad de ''blanco rojiza''. En español eclesial legible, ''una mancha brillante blanquecina y rojiza'' o ''una mancha brillante blanco-rojiza'' funciona mejor. También conviene ajustar la nota al español natural: ''O “y aparecerá ante el sacerdote”'' o ''O “y será visto por el sacerdote”'', no ''se verá al sacerdote''.'
  glossary_alignment: 'No hay conflictos con la terminología doctrinal global. Las decisiones léxicas clave siguen bien el expediente inglés: שְׂאֵת = ''hinchazón'', בַהֶרֶת = ''mancha brillante'', וְנִרְאָה = ''se mostrará''. La única desviación importante es אֲדַמְדָּמֶת, cuya realización española actual no es aceptable; debe expresarse como una cualidad rojiza de la mancha blanca de manera idiomática.'
  issues:
  - severity: high
    issue: La expresión 'mancha brillante blanco rojiza' es gramaticalmente incorrecta y poco inteligible.
    rationale: Hay discordancia de género y una secuencia cromática no idiomática. El hebreo describe una בַהֶרֶת blanca con cualidad rojiza; el POB inglés lo resolvió como 'reddish-white bright spot'. El español debe decir algo como 'mancha brillante blanquecina y rojiza' o 'mancha brillante blanco-rojiza'.
  - severity: medium
    issue: La nota al pie 'y se verá al sacerdote' no es español natural y cambia la relación sintáctica.
    rationale: '''Ver al sacerdote'' significa que alguien mira al sacerdote, no que el caso/lesión sea visto o aparezca ante él. La alternativa documentada debe conservar el sentido pasivo/reflexivo del hebreo: ''aparecerá ante el sacerdote'' o ''será visto por el sacerdote''.'
  - severity: low
    issue: '''Forúnculo'' puede sonar demasiado específico para שְׁחִין en este contexto.'
    rationale: Aunque no es erróneo, 'hervor' o 'llaga inflamatoria' podrían ser más amplios. No obstante, dado que el expediente lo justifica y no introduce error claro, no requiere cambio obligatorio.
  revised_spanish_text: y en el lugar del forúnculo hay una hinchazón blanca o una mancha brillante blanquecina y rojiza, y se mostrará[a] al sacerdote.
  revised_footnotes:
  - marker: a
    text: O 'y aparecerá ante el sacerdote'. El hebreo puede rendirse más literalmente como 'ser visto', pero aquí probablemente se refiere a ser presentado para la inspección sacerdotal.
    reason: lexical_alternative
  revision_rationale: Se corrige la descripción cromática para reflejar fielmente la lesión blanca con matiz rojizo en un español natural y gramatical. También se repara la nota al pie para que exprese una alternativa española idiomática que conserve el valor pasivo/reflexivo de וְנִרְאָה sin crear el sentido incorrecto de 'ver al sacerdote'.
