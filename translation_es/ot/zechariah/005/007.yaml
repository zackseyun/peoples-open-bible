  to: Y he aquí[a], un disco de plomo[b] fue levantado, y esta era una mujer sentada dentro del efa[c].
  rationale: Se conserva casi todo el texto, pero se corrigen los anclajes de las notas para que correspondan al rastro auditado y se añade la nota cultural necesaria sobre «efa». El contenido principal del versículo ya era fiel; la reparación es principalmente de aparato crítico y claridad editorial.
