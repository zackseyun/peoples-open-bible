translation:
  language: es
  text: Y Josué hijo de Nun y Caleb hijo de Jefone, de entre los que habían explorado la tierra[a], rasgaron sus vestiduras[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'entre los que habían explorado la tierra'. La preposición hebrea puede marcar la pertenencia dentro del grupo más amplio de exploradores.
    reason: lexical_alternative
  - marker: b
    text: Rasgar las vestiduras era una señal habitual de dolor, horror o profunda aflicción.
    reason: cultural_note
lexical_decisions:
- source_word: וִ/יהוֹשֻׁעַ
  english_pob_choice: And Joshua
  chosen_spanish: Y Josué
  alternatives_spanish:
  - Ahora Josué
  - Pero Josué
  lexicon: HALOT
  rationale: La conjunción narrativa se vierte con 'Y' en español para mantener la secuencia simple. El nombre propio se adapta a la forma bíblica usual en español, 'Josué'.
- source_word: בִּן נוּן
  english_pob_choice: son of Nun
  chosen_spanish: hijo de Nun
  alternatives_spanish:
  - hijo de Nun
  lexicon: HALOT
  rationale: La relación filial se expresa de manera directa y formal con 'hijo de', que es clara y fiel al constructo hebreo.
- source_word: וְ/כָלֵב
  english_pob_choice: and Caleb
  chosen_spanish: y Caleb
  alternatives_spanish:
  - y Caleb
  lexicon: HALOT
  rationale: La conjunción une a Caleb con Josué como sujeto coordinado; se conserva sin ampliación.
- source_word: בֶּן יְפֻנֶּה
  english_pob_choice: son of Jephunneh
  chosen_spanish: hijo de Jefone
  alternatives_spanish:
  - hijo de Jephunneh
  lexicon: HALOT
  rationale: Se usa la forma española habitual del nombre propio, 'Jefone', manteniendo el mismo valor patronímico del hebreo.
- source_word: מִן הַ/תָּרִים
  english_pob_choice: from those who had spied out
  chosen_spanish: de entre los que habían reconocido
  alternatives_spanish:
  - entre los que habían reconocido
  - de los que habían reconocido
  lexicon: HALOT
  rationale: La preposición מִן tiene aquí matiz partitivo; 'de entre' comunica pertenencia dentro del grupo de exploradores. 'Habían reconocido' expresa la función de תרים en español natural y conserva la acción previa respecto del contexto.
- source_word: אֶת הָ/אָ֑רֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra
  - el país
  lexicon: HALOT
  rationale: En español, 'tierra' es una equivalencia legítima y natural para הָאָרֶץ en este contexto narrativo; mantiene la referencia territorial sin añadir especificidad no presente en el verso.
- source_word: קָרְע֖וּ
  english_pob_choice: tore
  chosen_spanish: rasgaron
  alternatives_spanish:
  - rompieron
  - desgarraron
  lexicon: HALOT
  rationale: '''Rasgar'' conserva con claridad el gesto corporal de duelo o consternación y suena más idiomático en español bíblico contemporáneo que un calco rígido.'
- source_word: בִּגְדֵי/הֶם
  english_pob_choice: their clothes
  chosen_spanish: sus vestidos
  alternatives_spanish:
  - sus ropas
  - sus prendas
  lexicon: HALOT
  rationale: '''Vestidos'' reproduce bien el término para la ropa/vestimenta en un contexto de luto ritual; es más digno y bíblicamente transparente que ''ropa'' en esta fórmula.'
theological_decisions:
- issue: Sentido partitivo de מִן en relación con el grupo de exploradores
  english_pob_reading: from those who had spied out the land
  chosen_spanish_reading: de entre los que habían reconocido la tierra
  alternative_spanish_readings:
  - entre los que habían reconocido la tierra
  - de los que habían reconocido la tierra
  rationale: El hebreo permite leer a Josué y Caleb como parte del grupo más amplio. 'De entre' preserva ese matiz partitivo sin borrar la pertenencia al grupo, en línea con la nota auditada de la POB en inglés.
  doctrine_reference: Ninguna; decisión de sintaxis y pertenencia grupal.
- issue: Gesto de rasgar las vestiduras como signo cultural de aflicción
  english_pob_reading: Tearing one's clothes was a customary sign of grief, horror, or distress.
  chosen_spanish_reading: rasgaron sus vestidos
  alternative_spanish_readings:
  - desgarraron sus vestidos
  - rompieron sus vestidos
  rationale: Se mantiene el gesto concreto sin explicarlo dentro del texto principal; la nota conserva el valor cultural documentado por la POB en inglés, evitando suavizar el signo de duelo o horror.
  doctrine_reference: Ninguna; nota cultural del gesto bíblico.
translation_notes:
  revision_awareness: Se revisó el registro inglés POB con filosofía optimal-equivalence y se siguió su lectura principal sin cambios sustantivos. La única variación relevante es la elección española de 'reconocido' para תרים, que conserva el matiz de exploración sin imponer un tecnicismo ajeno al español bíblico leído en voz alta. No se detectaron revisiones textuales pendientes en el pasaje fuente.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, pero este verso no contiene el tetragrámaton.
  - Se usó 'Josué' y 'Jefone' con formas españolas consagradas por uso bíblico.
  - Se evitó 'SEÑOR' o una paráfrasis interpretativa no requerida por el hebreo.
  - '''Vestidos'' se eligió por dignidad estilística y por su asociación bíblica estable con luto/aflicción.'
