translation:
  language: es
  text: La instrucción de un hombre sabio[b] es fuente de vida[a], para apartarse de las trampas de la muerte.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «La enseñanza de un hombre sabio es manantial de vida, para apartarse de las trampas de la muerte».
    reason: lexical_alternative
  - marker: b
    text: Hebreo «hombre sabio»; el singular masculino se usa de manera representativa en Proverbios.
    reason: cultural_note
lexical_decisions:
- source_word: תּוֹרַת
  english_pob_choice: instruction of
  chosen_spanish: instrucción de
  alternatives_spanish:
  - ley de
  - enseñanza de
  lexicon: HALOT
  rationale: En este proverbio, תּוֹרָה no se limita a código legal; expresa instrucción formativa. «Instrucción» comunica bien el sentido pedagógico sin volverlo más técnico de lo que el hebreo exige.
- source_word: חָכָם
  english_pob_choice: a wise man
  chosen_spanish: un hombre sabio
  alternatives_spanish:
  - el sabio
  - una persona sabia
  lexicon: HALOT
  rationale: El hebreo usa singular masculino representativo. «Un hombre sabio» conserva esa forma y evita neutralizar indebidamente el referente literario del proverbio.
- source_word: מְקוֹר
  english_pob_choice: fountain
  chosen_spanish: fuente
  alternatives_spanish:
  - manantial
  - pozo
  lexicon: HALOT
  rationale: «Fuente» es natural en español y mantiene la imagen de un origen vivificante. «Manantial» también sería posible, pero «fuente de vida» suena más fluido y poético.
- source_word: חַיִּים
  english_pob_choice: life
  chosen_spanish: vida
  alternatives_spanish:
  - vidas
  - lo vivo
  lexicon: HALOT
  rationale: Aunque la forma es plural, funciona idiomáticamente como un singular abstracto. «Vida» preserva ese valor en español.
- source_word: לָסוּר
  english_pob_choice: to turn one away
  chosen_spanish: para apartarlo
  alternatives_spanish:
  - para alejarlo
  - para desviarlo
  lexicon: HALOT
  rationale: El infinitivo con לָ expresa finalidad. «Para apartarlo» reproduce con naturalidad la idea de alejar a alguien del peligro sin sobrecargar la frase.
- source_word: מִמֹּקְשֵׁי
  english_pob_choice: from the snares of
  chosen_spanish: de las trampas de
  alternatives_spanish:
  - de las redes de
  - de los lazos de
  lexicon: HALOT
  rationale: מוֹקֵשׁ designa un lazo o trampa. «Trampas» es claro en español moderno; «lazos» o «redes» serían menos precisos aquí.
- source_word: מָוֶת
  english_pob_choice: death
  chosen_spanish: la muerte
  alternatives_spanish:
  - muerte
  - el morir
  lexicon: HALOT
  rationale: Traducción directa del sustantivo, manteniendo la personificación poética de la muerte como ámbito del que se rescata.
translation_notes:
  revision_awareness: Alineado con la revisión más reciente del POB, que prefirió la construcción final con infinitivo de finalidad («para apartarlo») frente a una paráfrasis participial. Se conserva además la imagen poética de la fuente de vida y las trampas de la muerte.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto fuente lo requiera; este versículo no lo contiene.
  - 'Se conserva la metáfora sapiencial con vocabulario transparente y no eclesiástico: «instrucción», «fuente», «trampas».'
  - El masculino singular representativo de חָכָם se refleja en «un hombre sabio», coherente con la política del POB en Proverbios.
