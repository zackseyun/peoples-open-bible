translation:
  language: es
  text: Yahvé ha dejado al descubierto su santo brazo[a] ante los ojos de todas las naciones[b], y todos los confines de la tierra verán la salvación[c] de nuestro Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ha descubierto» o «ha puesto al descubierto». El hebreo evoca la imagen de exponer el brazo para una acción decisiva.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «a la vista de todas las naciones».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «la liberación» de nuestro Dios.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חָשַׂף
  english_pob_choice: has bared
  chosen_spanish: ha descubierto
  alternatives_spanish:
  - ha dejado al descubierto
  - ha puesto al descubierto
  - ha desnudado
  lexicon: HALOT
  rationale: El verbo hebreo significa 'descubrir', 'dejar al descubierto' o 'desnudar'. En español, 'ha descubierto' comunica el gesto de exponer el brazo para una acción decisiva sin sonar forzado, y conserva la imagen concreta del original. 'Ha desnudado' sería más literal, pero menos natural en español bíblico de lectura pública.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino del Tetragrámaton como 'Yahvé', conforme al criterio del proyecto. Esto evita sustituirlo por un título y mantiene la referencia directa al nombre del pacto.
- source_word: זְרֹעַ קָדְשׁוֹ
  english_pob_choice: his holy arm
  chosen_spanish: su santo brazo
  alternatives_spanish:
  - su brazo santo
  - el brazo de su santidad
  - su brazo sagrado
  lexicon: HALOT
  rationale: La metáfora corporal se preserva con 'brazo', y el adjetivo 'santo' mantiene la cualidad de consagrado/divino. 'Su santo brazo' suena natural en español y retiene el paralelismo de fuerza salvadora del hebreo.
- source_word: לְעֵינֵי
  english_pob_choice: before the eyes of
  chosen_spanish: ante los ojos de
  alternatives_spanish:
  - a la vista de
  - en presencia de
  - en la vista de
  lexicon: HALOT
  rationale: La locución hebrea conserva un valor visual y público. 'Ante los ojos de' reproduce bien ese matiz en español y mantiene la transparencia de la imagen.
- source_word: כָּל הַגּוֹיִם
  english_pob_choice: all the nations
  chosen_spanish: todas las naciones
  alternatives_spanish:
  - todos los pueblos
  - todas las naciones de la tierra
  - los gentiles
  lexicon: HALOT
  rationale: '''Naciones'' es la equivalencia más fiel al alcance universal del hebreo. ''Pueblos'' podría sonar más interpretativo, y ''gentiles'' introduciría una oposición no requerida por el contexto.'
- source_word: וְרָאוּ
  english_pob_choice: will see
  chosen_spanish: verán
  alternatives_spanish:
  - han de ver
  - verán entonces
  - verán y
  lexicon: HALOT
  rationale: Aunque la forma hebrea es qatal, en discurso profético funciona con sentido futuro. 'Verán' refleja bien esa fuerza profética en español sin necesidad de explicitarla de más.
- source_word: כָּל אַפְסֵי אָרֶץ
  english_pob_choice: all the ends of the earth
  chosen_spanish: todos los confines de la tierra
  alternatives_spanish:
  - todos los extremos de la tierra
  - los últimos rincones de la tierra
  - todos los límites de la tierra
  lexicon: HALOT
  rationale: '''Confines de la tierra'' es una fórmula natural y reverente en español para este hebraísmo de extensión universal. Mantiene el sentido de totalidad sin perder dignidad literaria.'
- source_word: יְשׁוּעַת
  english_pob_choice: the salvation
  chosen_spanish: la salvación
  alternatives_spanish:
  - la liberación
  - la victoria
  - el rescate
  lexicon: HALOT
  rationale: '''Salvación'' conserva el peso teológico del término y su resonancia canónica. ''Liberación'' es posible, pero reduce el alcance soteriológico que el contexto sugiere.'
- source_word: אֱלֹהֵינוּ
  english_pob_choice: our God
  chosen_spanish: de nuestro Dios
  alternatives_spanish:
  - de nuestro Dios
  - de Dios nuestro
  - de nuestro Dios
  lexicon: HALOT
  rationale: La construcción posesiva se expresa de manera natural en español con 'de nuestro Dios'. Mantiene la primera persona plural del hebreo y el tono confesional del verso.
theological_decisions:
- issue: Imagen antropomórfica del brazo divino
  english_pob_reading: Retain the metaphor 'his holy arm' as a concrete image of the LORD's saving power.
  chosen_spanish_reading: Mantener 'su santo brazo' como imagen concreta de la acción salvadora de Yahvé.
  alternative_spanish_readings:
  - interpretar como 'su poder santo'
  - reducir la imagen a 'su poder salvador'
  rationale: El hebreo usa lenguaje corporal deliberado. Conservar la metáfora evita desactivar la fuerza poética y teológica del texto. La traducción no oculta la imagen, aunque en español pueda entenderse figuradamente.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve what the source text says without flattening theological weight.'
- issue: Nombre divino del Tetragrámaton
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo nombra explícitamente a Yahvé; en español se preserva ese nombre propio, evitando una sustitución por título. Esto sigue la política terminológica del proyecto y mantiene auditable la referencia al nombre del pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'La versión inglesa auditada mantuvo alta concordancia y no requirió cambios en la revisión más reciente. La redacción española sigue esa lectura estable: nombre divino como Yahvé, metáfora corporal preservada, orden poético del verso conservado y alcance universal expresado con vocabulario natural en español.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יְהוָה conforme al estándar del proyecto.
  - Se usa 'salvación' como equivalente principal de יְשׁוּעַת, sin desplazarlo por 'liberación' en el texto principal.
  - La metáfora 'brazo' se conserva para no suavizar el antropomorfismo del hebreo.
  - '''Naciones'' y ''confines de la tierra'' reflejan el paralelismo universal del verso sin reinterpretación cultural.'
