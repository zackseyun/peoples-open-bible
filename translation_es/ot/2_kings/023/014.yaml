translation:
  language: es
  text: Él quebró los pilares, cortó los Asherim[a] y llenó sus lugares con huesos humanos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'los postes de Asera'. El hebreo אֲשֵׁרִים puede referirse a objetos de culto asociados con Asera; la forma exacta no se especifica solo por el término.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשִׁבַּר
  english_pob_choice: shattered
  chosen_spanish: quebró
  alternatives_spanish:
  - destrozó
  - hizo pedazos
  lexicon: HALOT
  rationale: El verbo expresa ruptura violenta en piezas. En español, 'quebró' comunica destrucción fuerte sin sonar demasiado técnico ni excesivamente libre.
- source_word: הַמַּצֵּבוֹת
  english_pob_choice: the pillars
  chosen_spanish: los pilares
  alternatives_spanish:
  - las piedras erguidas
  - los pilares sagrados
  lexicon: HALOT
  rationale: Se mantiene un sustantivo breve y natural. 'Pilares' conserva el valor cultual general sin imponer una glosa arqueológica más específica de la que el término exige.
- source_word: וַיִּכְרֹת
  english_pob_choice: cut down
  chosen_spanish: derribó
  alternatives_spanish:
  - cortó
  - taló
  lexicon: HALOT
  rationale: En el paralelismo del verso, el acto contra los asherim sugiere un gesto de abatimiento/destrucción. 'Derribó' expresa bien ese acto físico y evita una literalidad que en español sonaría ambigua.
- source_word: הָאֲשֵׁרִים
  english_pob_choice: the Asherim
  chosen_spanish: los asherim
  alternatives_spanish:
  - las Aseras
  - los postes de Asera
  lexicon: HALOT
  rationale: Se conserva el término técnico transliterado para no decidir de antemano si se trata de postes, árboles u objetos de culto. Así se respeta la tensión lexical documentada en el audit trail inglés.
- source_word: וַיְמַלֵּא
  english_pob_choice: filled
  chosen_spanish: llenó
  alternatives_spanish:
  - colmó
  - rellenó
  lexicon: HALOT
  rationale: '''Llenó'' es la equivalencia más directa y natural para el acto de ocupar los lugares con huesos, con el posible matiz de profanación implícito en el contexto.'
- source_word: מְקוֹמָם
  english_pob_choice: their places
  chosen_spanish: sus lugares
  alternatives_spanish:
  - sus sitios
  - el lugar donde estaban
  lexicon: HALOT
  rationale: El sufijo posesivo se refleja con 'sus', manteniendo la referencia a los objetos destruidos sin sobreexpander el texto.
- source_word: עַצְמוֹת אָדָם
  english_pob_choice: human bones
  chosen_spanish: huesos humanos
  alternatives_spanish:
  - huesos de hombre
  - restos humanos
  lexicon: HALOT
  rationale: '''Humano'' refleja el valor genérico de אָדָם y evita restringirlo a varón adulto. ''Huesos humanos'' es la forma idiomática y fiel en español.'
theological_decisions:
- issue: Valor genérico de אָדָם
  english_pob_reading: human in the phrase 'human bones'
  chosen_spanish_reading: humanos en 'huesos humanos'
  alternative_spanish_readings:
  - de hombre en 'huesos de hombre'
  - humanos en 'restos humanos'
  rationale: El hebreo usa אָדָם de modo genérico, no específicamente masculino. 'Humanos' preserva el alcance semántico y la precisión doctrinal del término.
  doctrine_reference: 'DOCTRINE.md: Contested terms table — אָדָם ''man / humankind (context)'''
translation_notes:
  revision_awareness: Se corrigió el anclaje de la nota al incluir [a] en el texto español, conforme a la validación previa. El resto del versículo mantiene el acuerdo alto del control cruzado y no requiere revisiones adicionales.
  spanish_consistency_notes:
  - Se usó 'YHWH' no aplica aquí; no hay nombre divino en el verso.
  - Se preservó la transliteración 'asherim' para mantener abierta la ambigüedad lexical documentada en la fuente.
  - '''Huesos humanos'' traduce אָדָם de forma genérica y natural en español.'
  - La nota al pie se ancla únicamente en 'pilares', siguiendo el patrón del audit trail inglés para la alternativa lexical de los objetos de culto.
