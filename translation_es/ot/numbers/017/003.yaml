base_translation:
  language: en
  yaml_path: translation/ot/numbers/017/003.yaml
  text: As for the censers of these men who sinned at the cost of their lives[a], let them make them into hammered plates as a covering for the altar, because they presented them before Yahweh and they became holy[e][d][c][b]; and they shall be a sign to the sons of Israel.
  footnotes:
  - marker: a
    text: Or 'these sinners' or 'these sinful men.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'in/with their lives'; that is, their sin cost them their lives.
    reason: lexical_alternative
  - marker: c
    text: Or 'beaten plates' or 'hammered plates of metal.'
    reason: lexical_alternative
  - marker: d
    text: Or 'they were consecrated.' The subject is most naturally the censers.
    reason: lexical_alternative
  - marker: e
    text: Or 'for the Israelites.' Literally 'to the sons of Israel.'
    reason: lexical_alternative
