  glossary_alignment: No hay términos teológicos de proyecto en juego. Para נָשִׂיא, 'líder' se alinea mejor con la decisión auditada del POB inglés que 'jefe', aunque 'jefe' no es incorrecto. Para לִבְנֵי רְאוּבֵן, debe preservarse en nota la alternativa 'para los hijos de Rubén', tal como se documentó en el rastro inglés.
