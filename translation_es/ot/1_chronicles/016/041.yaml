translation:
  language: es
  text: Y con ellos estaban Hemán y Jedutún y el resto de los escogidos, que fueron designados por nombre[a] para dar gracias a Yahvé[b], porque su misericordia es para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que fueron especificados por nombre» o «que fueron nombrados individualmente».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «porque para siempre es su misericordia», un refrán litúrgico recurrente.'
    reason: cultural_note
lexical_decisions:
- source_word: וְעִמָּהֶם
  english_pob_choice: And with them were
  chosen_spanish: Y con ellos estaban
  alternatives_spanish:
  - Y con ellos
  - Y estaban con ellos
  lexicon: HALOT
  rationale: La preposición con ellos introduce a los que acompañaban a los mencionados antes. En español, 'estaban' fluye de forma natural y conserva el sentido plural implícito del contexto.
- source_word: הֵימָן
  english_pob_choice: Heman
  chosen_spanish: Hemán
  alternatives_spanish:
  - Heman
  lexicon: Nombre propio bíblico
  rationale: Se adapta la transliteración al uso español habitual con acento prosódico final, manteniendo la identidad del nombre propio.
- source_word: וִידוּתוּן
  english_pob_choice: Jeduthun
  chosen_spanish: Jedutún
  alternatives_spanish:
  - Jedutún
  lexicon: Nombre propio bíblico
  rationale: Se emplea la forma española más transparente y reconocible del nombre propio, con acentuación acorde al español.
- source_word: וּשְׁאָר הַבְּרוּרִים
  english_pob_choice: and the rest who were chosen
  chosen_spanish: y el resto de los escogidos
  alternatives_spanish:
  - y el resto de los elegidos
  - y los demás escogidos
  lexicon: HALOT
  rationale: שְׁאָר expresa 'resto' y הַבְּרוּרִים señala a los seleccionados/escogidos. 'Escogidos' conserva bien el valor pasivo del hebreo sin añadir 'hombres', que no aparece explícitamente.
- source_word: אֲשֶׁר נִקְּבוּ בְּשֵׁמוֹת
  english_pob_choice: who were designated by name
  chosen_spanish: que fueron designados por nombre
  alternatives_spanish:
  - que fueron nombrados por nombre
  - que fueron especificados individualmente por nombre
  - que fueron llamados por su nombre
  lexicon: HALOT
  rationale: El nifal de נקב con 'nombres' indica identificación explícita. 'Designados por nombre' preserva el matiz formal y evita suavizar la expresión a una simple mención.
- source_word: לְהֹדוֹת
  english_pob_choice: to give thanks
  chosen_spanish: para dar gracias
  alternatives_spanish:
  - para alabar
  - para confesar/acknowledge
  lexicon: HALOT
  rationale: En este contexto litúrgico, la raíz expresa dar gracias. 'Para dar gracias' es natural en español y encaja con el refrán final del versículo.
- source_word: לַֽיהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
  rationale: Se sigue el término base del proyecto para el nombre divino en el texto principal, preservando el tetragrámaton con una forma española estándar y reverente.
- source_word: כִּי לְעוֹלָם חַסְדּוֹ
  english_pob_choice: for his steadfast love endures forever
  chosen_spanish: porque para siempre es su misericordia
  alternatives_spanish:
  - porque su misericordia es para siempre
  - porque para siempre permanece su amor leal
  - porque su bondad es para siempre
  lexicon: HALOT
  rationale: La fórmula funciona como refrán litúrgico. 'Misericordia' comunica bien חֶסֶד en un español de iglesia amplio; 'para siempre es' conserva la estructura semítica y la fuerza de permanencia de לְעוֹלָם.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: El hebreo usa directamente el Tetragrámaton. El proyecto pide no enmascararlo con 'SEÑOR'; 'Yahvé' comunica el nombre del pacto con una forma española ampliamente usada y litúrgicamente digna.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Valor de חֶסֶד en el refrán final
  english_pob_reading: his steadfast love endures forever
  chosen_spanish_reading: para siempre es su misericordia
  alternative_spanish_readings:
  - su amor leal es para siempre
  - su amor constante permanece para siempre
  - su misericordia es eterna
  rationale: En este versículo se trata de una fórmula cultual repetida. 'Misericordia' es una opción válida y reconocible en español bíblico; mantiene el carácter de favor perseverante sin reducir el término a simple emoción.
  doctrine_reference: HALOT; uso litúrgico recurrente del refrán
translation_notes:
  revision_awareness: El inglés auditado simplificó 'the rest of those chosen' a 'the rest who were chosen' para mayor naturalidad. La versión española sigue esa línea, pero conserva 'el resto de los escogidos' para reflejar con precisión שְׁאָר + הַבְּרוּרִים. También se mantuvo la decisión doctrinal del proyecto de traducir el Tetragrámaton como 'Yahvé' en el texto principal.
  spanish_consistency_notes:
  - 'Se mantiene la capitalización reverente de los nombres divinos y propios: Hemán, Jedutún, Yahvé.'
  - La estructura 'para dar gracias a Yahvé' conserva el valor cultual del infinitivo hebreo.
  - '''Misericordia'' se usa aquí como equivalente amplio de חֶסֶד, coherente con el refrán bíblico y con español eclesial claro.'
  - Las notas alternativas registran la posibilidad semántica de nombramiento individual sin introducir una paráfrasis excesiva.
