translation:
  text: 'But Memphis said to her husband[a], “I hear that they are selling the young man.”


    2 So she immediately sent a eunuch to the Ishmaelites, asking that I be sold to her.

    3 But the eunuch, not wishing to buy me, withdrew after testing them, and reported to his mistress that they were asking a high price for the boy.

    4 Then she sent another eunuch, saying, “Even if they ask two minas, pay it. Do not spare the gold. Only buy the boy and bring him to me.”

    5 So the eunuch came and gave them eighty pieces of gold and took me; but to the Egyptian woman he said, “I have given a hundred.”

    6 But I, knowing it, kept silent[b][c], so that'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: A mina was an ancient unit of weight and money; the Greek keeps the specific term rather than converting it to a modern amount.
    reason: cultural_note
    anchor_ref: '16:4'
  - marker: c
    text: The Greek says 'eighty golds' and then 'a hundred'; the exact coinage is not specified in the normalized witness, so the translation keeps the wording general.
    reason: lexical_alternative
    anchor_ref: '16:5'
  - marker: b
    text: The sentence continues beyond the extant portion of the chapter text supplied here; the translation therefore ends where the Greek excerpt ends.
    reason: textual_variant
    anchor_ref: '16:6'
lexical_decisions:
- source_word: Μεμφὶς
  chosen: Memphis
  alternatives:
  - Memphitis
  lexicon: LSJ
  rationale: Treated as a personal name by transliteration. The Greek witness presents it as the woman's name, not the city.
- source_word: νεανίας
  chosen: young man
  alternatives:
  - youth
  - lad
  lexicon: LSJ
  rationale: Balances literal sense and readable English; preserves Joseph's youthful status without sounding overly colloquial.
- source_word: εὐνοῦχος
  chosen: eunuch
  alternatives:
  - court official
  lexicon: LSJ
  rationale: The Greek term literally denotes a eunuch and should not be flattened to the vaguer 'official' without contextual necessity.
- source_word: αἰτοῦσά με εἰς διάπρασω/διάπρασιν
  chosen: asking that I be sold to her
  alternatives:
  - requesting me for purchase
  - asking for me to be put up for sale
  lexicon: LSJ
  rationale: The phrase concerns arranging Joseph's sale; this rendering makes the commercial sense explicit while remaining close to the Greek.
- source_word: πειράσας
  chosen: after testing them
  alternatives:
  - after sounding them out
  - after trying them
  lexicon: LSJ
  rationale: Conveys exploratory inquiry into the sellers' terms rather than moral temptation.
- source_word: δεσποίνη
  chosen: mistress
  alternatives:
  - lady
  - female master
  lexicon: LSJ
  rationale: Best reflects household authority and ownership relation in context.
- source_word: πολλὴν τιμήν
  chosen: a high price
  alternatives:
  - much value
  - a great sum
  lexicon: LSJ
  rationale: Idiomatic commercial rendering of τιμή in a purchase context.
- source_word: μνᾶς
  chosen: minas
  alternatives:
  - pounds
  lexicon: LSJ
  rationale: Ancient monetary unit is best retained by transliteration for transparency; modernized equivalents would over-interpret.
- source_word: μὴ φείσασθε χρυσίου
  chosen: Do not spare the gold
  alternatives:
  - Do not hold back gold
  - Do not be stingy with the gold
  lexicon: LSJ
  rationale: Preserves the imperative force and the concrete economic language.
- source_word: χρυσοῦς
  chosen: pieces of gold
  alternatives:
  - gold coins
  - gold pieces
  lexicon: LSJ
  rationale: The exact denomination is not fully specified in the normalized text; 'pieces of gold' preserves the monetary sense without false precision.
- source_word: ἀνελάβετό με
  chosen: took me
  alternatives:
  - received me
  - took me up
  lexicon: LSJ
  rationale: In this slave-sale context, 'took me' is the most natural English equivalent.
- source_word: ἐσιώπησα
  chosen: kept silent
  alternatives:
  - was silent
  - said nothing
  lexicon: LSJ
  rationale: Slightly elevated phrasing suits the testamentary narrative voice and preserves Joseph's deliberate restraint.
