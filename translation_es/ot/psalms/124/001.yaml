translation:
  language: es
  text: Cántico de subidas[a]. De David. Si Yahvé no hubiera estado por nosotros—diga ahora Israel—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más idiomática: «Si Yahvé no hubiera estado de nuestro lado».'
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁיר הַמַּעֲלוֹת
  english_pob_choice: A Song of Ascents
  chosen_spanish: Cántico de ascensos
  alternatives_spanish:
  - Cántico de subidas
  - Cántico de peregrinación
  lexicon: HALOT
  rationale: «Ascensos» conserva el sentido más literal de מַעֲלוֹת y mantiene la fuerza tradicional de la superscripción, sin concretarla innecesariamente como peregrinación.
- source_word: לְדָוִד
  english_pob_choice: Of David
  chosen_spanish: De David
  alternatives_spanish:
  - Por David
  - Para David
  lexicon: HALOT
  rationale: «De David» preserva la ambigüedad del ל en los encabezados de salmos entre autoría, pertenencia o dedicación, tal como hace el POB en inglés.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto para el nombre divino, manteniendo el nombre del pacto en español sin sustituirlo por un título en mayúsculas.
- source_word: לוּלֵי
  english_pob_choice: If ... had not
  chosen_spanish: Si ... no hubiera
  alternatives_spanish:
  - Si no hubiera sido que
  - De no haber
  lexicon: HALOT
  rationale: La construcción condicional contrafactual en español se expresa con naturalidad como «si ... no hubiera», reflejando el valor del hebreo sin añadir interpretación.
- source_word: שֶׁהָיָה לָנוּ
  english_pob_choice: had not been for us
  chosen_spanish: hubiera estado por nosotros
  alternatives_spanish:
  - hubiera estado a nuestro favor
  - hubiera estado de nuestro lado
  lexicon: HALOT
  rationale: «Estar por nosotros» reproduce con cercanía el apoyo implícito del hebreo y evita resolver del todo la imagen idiomática hacia «de nuestro lado», que es más explicativo.
- source_word: יֹאמַר נָא
  english_pob_choice: let ... now say
  chosen_spanish: diga ahora
  alternatives_spanish:
  - diga, pues, ahora
  - que diga ahora
  lexicon: HALOT
  rationale: El yusivo con נָא funciona como exhortación; «diga ahora» conserva el llamado retórico de forma breve y natural en español.
- source_word: יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: Israel
  alternatives_spanish:
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Se mantiene el nombre propio sin explicarlo, porque el hebreo nombra directamente al colectivo pactual.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: La lectura del POB en inglés preserva el nombre divino del texto original; en español, «Yahvé» es la forma del proyecto para mantener esa referencia covenantal sin ocultarla detrás de un sustituto funcional.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido del idiomático שֶׁהָיָה לָנוּ
  english_pob_reading: had not been for us
  chosen_spanish_reading: hubiera estado por nosotros
  alternative_spanish_readings:
  - hubiera estado a nuestro favor
  - hubiera estado de nuestro lado
  rationale: 'Se conserva la tensión entre literalidad e idiomatismo: la frase española refleja apoyo/divina ayuda, pero no lo resuelve por completo en una formulación demasiado interpretativa.'
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3, preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: Se revisó el audit trail inglés y no se detectaron cambios posteriores relevantes; la versión española sigue la decisión estable de mantener la superscripción, el nombre divino y la ambigüedad del apoyo divino sin sobreinterpretarla.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה.
  - Se conserva el tono de superscripción con «Cántico de ascensos» y «De David».
  - La condicional española mantiene el contrafactual sin añadir el complemento explicativo del lado de la interpretación.
  - «Diga ahora Israel» refleja el llamado exhortativo del hebreo con registro bíblico sobrio.
