    rationale: El hebreo לְאֶסְתֵּר הַמַּלְכָּה y el inglés «to Esther the queen» se expresan mejor en español como «a la reina Ester» o «a Ester, la reina». El borrador actual es entendible, pero suena forzado y menos digno.
