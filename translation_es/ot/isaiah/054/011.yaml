review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del hebreo: vocativo femenino a Sion personificada, imagen de tormenta, falta de consuelo, anuncio divino de restauración arquitectónica y materiales preciosos. Sin embargo, hay dos desajustes relevantes con la evidencia y el rastro POB: el inglés POB ancla la nota [a] en ''afflicted one'' como alternativa mineral para ''sapphires'', pero el español mueve [a] a ''afligida'' y omite la nota mineral; además, ''fundaré tus cimientos'' suena poco natural y menos fiel al campo semántico constructivo que ''asentaré/pondré tus cimientos''.'
  spanish_quality_summary: El español es generalmente claro y digno, pero 'Oh afligida' suena algo forzado en registro bíblico moderno; 'Afligida' o 'Oh, afligida' serían mejores. 'Mira' es comprensible para הִנֵּה, aunque en este contexto profético 'he aquí' preserva mejor el tono elevado. 'Fundaré tus cimientos' es la mayor aspereza estilística; en español natural se dice 'asentaré' o 'pondré los cimientos'.
  glossary_alignment: 'No hay conflictos con terminología troncal del proyecto como Yahvé/Mesías. Las decisiones léxicas principales son mayormente adecuadas: ''afligida'', ''sacudida por la tormenta'', ''no consolada'', ''antimonio'', ''tus piedras''. Debe restaurarse la nota léxica sobre ''zafiros''/''lapislázuli'' y conviene ajustar הִנֵּה y ויסדתיך para mejor correspondencia con la filosofía POB.'
  issues:
  - severity: high
    issue: La nota sobre 'zafiros'/'lapislázuli' del POB inglés fue omitida y el marcador [a] fue reasignado a otro contenido.
    rationale: El rastro auditado preserva una alternativa léxica importante para בַּסַּפִּירִים. En español debe mantenerse esa información, y los marcadores/ancoras deben corresponder al texto revisado.
  - severity: medium
    issue: '''Fundaré tus cimientos'' es una colocación poco natural en español.'
    rationale: Aunque יסד significa fundar/asentar, en español con objeto 'cimientos' lo idiomático es 'asentar/poner/echar los cimientos'. Esto mejora fidelidad funcional y legibilidad.
  - severity: low
    issue: '''Mira'' para הִנֵּה rebaja algo el tono profético elevado del original y del POB inglés.'
    rationale: No es incorrecto, pero 'he aquí' encaja mejor con el registro digno solicitado y con la fuerza de anuncio enfático.
  - severity: low
    issue: '''Oh afligida'' podría pulirse.'
    rationale: La interjección inicial no es necesaria; el vocativo simple 'Afligida' suena más limpio y natural en español bíblico moderno.
  revised_spanish_text: Afligida, sacudida por la tormenta y no consolada, he aquí, yo pongo tus piedras en antimonio[b] y asentaré tus cimientos con zafiros[a].
