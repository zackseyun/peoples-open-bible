translation:
  language: es
  text: Pero si es demasiado pobre para tu tasación[a], entonces será presentado ante el sacerdote, y el sacerdote lo tasará[b]; el sacerdote lo tasará según lo que pueda pagar el que hace el voto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''que tu tasación''. La construcción hebrea también puede expresarse de manera más literal así, pero ''demasiado pobre para tu tasación'' comunica mejor el sentido en español natural.'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: ''según lo que alcance la mano del que hace el voto''. Es un modismo hebreo para la capacidad económica o los medios disponibles.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מָךְ
  english_pob_choice: too poor
  chosen_spanish: demasiado pobre
  alternatives_spanish:
  - pobre
  - empobrecido
  lexicon: HALOT
  rationale: En este contexto legal, el término expresa insuficiencia económica para cubrir la valuación fijada. 'Demasiado pobre' conserva la idea comparativa implícita en la construcción hebrea con מִן/מֵ־ y evita reducirlo a una mera condición social.
- source_word: מֵעֶרְכֶּךָ
  english_pob_choice: for your valuation
  chosen_spanish: para tu valuación
  alternatives_spanish:
  - para tu tasación
  - para tu valoración
  - más que tu valuación
  lexicon: HALOT
  rationale: עֵרֶךְ aquí es el valor tasado en la legislación de votos. 'Tu valuación' mantiene el sufijo de segunda persona singular del texto fuente y la referencia técnica al valor asignado; 'para' comunica naturalmente la relación de referencia exigida por el contexto.
- source_word: וְהֶעֱמִידוֹ
  english_pob_choice: he shall be made to stand
  chosen_spanish: será presentado
  alternatives_spanish:
  - será hecho comparecer
  - será puesto de pie
  lexicon: HALOT
  rationale: El Hifil de עמד literalmente significa 'hacer estar de pie'. En español jurídico-litúrgico, 'será presentado' transmite la idea de ser traído ante la autoridad sacerdotal sin forzar una pasiva impersonal demasiado rígida.
- source_word: לִפְנֵי הַכֹּהֵן
  english_pob_choice: before the priest
  chosen_spanish: delante del sacerdote
  alternatives_spanish:
  - en presencia del sacerdote
  - ante el sacerdote
  lexicon: HALOT
  rationale: '''Delante del sacerdote'' reproduce la escena procesal/cultual con español natural. ''Sacerdote'' es preferible aquí a una formulación más eclesiástica, porque el texto trata de la autoridad levítica del santuario.'
- source_word: וְהֶעֱרִיךְ אֹתוֹ
  english_pob_choice: the priest shall assess him
  chosen_spanish: el sacerdote lo evaluará
  alternatives_spanish:
  - el sacerdote lo tasará
  - el sacerdote le fijará un valor
  lexicon: HALOT
  rationale: El verbo ערך en este capítulo establece un valor monetario para una persona votada. 'Evaluará' mantiene la función de determinación de valor; 'tasará' también sería posible, pero 'evaluará' resulta más transparente para lectores generales sin perder el sentido técnico.
- source_word: עַל פִּי
  english_pob_choice: according to
  chosen_spanish: conforme a
  alternatives_spanish:
  - según
  - de acuerdo con
  lexicon: HALOT
  rationale: La locución introduce el criterio normativo. 'Conforme a' refleja bien la dependencia de la cantidad respecto de la medida indicada por el texto.
- source_word: אֲשֶׁר תַּשִּׂיג יַד
  english_pob_choice: what the one making the vow can afford
  chosen_spanish: lo que alcance la mano del que hace el voto
  alternatives_spanish:
  - lo que pueda alcanzar la mano del que hace el voto
  - según los medios del que hace el voto
  - lo que sus medios alcancen
  lexicon: HALOT
  rationale: Se conserva la imagen hebrea de 'la mano que alcanza' como idiomática para capacidad económica, tal como señala el audit trail inglés. Se evita sustituirla por una explicación abstracta en el texto principal para no perder la transparencia de la metáfora.
- source_word: הַנֹּדֵר
  english_pob_choice: the one making the vow
  chosen_spanish: el que hace el voto
  alternatives_spanish:
  - el que vota
  - el votante
  - el que ha hecho el voto
  lexicon: HALOT
  rationale: נדר denota al que formula el voto. 'El que hace el voto' es natural en español y conserva la referencia al acto voluntario sin introducir terminología devocional ajena al contexto legal.
- source_word: יַעֲרִיכֶנּוּ
  english_pob_choice: shall assess him
  chosen_spanish: lo evaluará
  alternatives_spanish:
  - lo tasará
  - lo valorará
  lexicon: HALOT
  rationale: Se mantiene la misma raíz conceptual de ערך en ambos usos del versículo para preservar coherencia interna. 'Evaluará' comunica la fijación de una cantidad conforme a norma, no una apreciación subjetiva.
theological_decisions:
- issue: Valoración sacerdotal de una persona votada cuando es pobre para pagar la suma establecida
  english_pob_reading: The priest shall assess him according to what the one making the vow can afford.
  chosen_spanish_reading: el sacerdote lo evaluará conforme a lo que alcance la mano del que hace el voto
  alternative_spanish_readings:
  - el sacerdote lo tasará según sus medios
  - el sacerdote fijará su valor según lo que pueda pagar
  rationale: El pasaje regula una excepción económica dentro de la legislación de votos. La traducción conserva la mediación sacerdotal y la proporcionalidad según la capacidad real del oferente, sin suavizar el carácter jurídico del procedimiento.
  doctrine_reference: Levítico 27:8; normativa de votos y valuaciones
translation_notes:
  revision_awareness: 'El audit trail inglés mantuvo la lectura funcional del hebreo: la persona está demasiado pobre para la valuación establecida, debe comparecer ante el sacerdote, y la evaluación se ajusta a sus medios. La revisión inglesa reciente simplificó el modismo de ''the hand ... can afford'' a una formulación más natural, pero sin perder el sentido idiomático; el español conserva la metáfora en una nota para transparencia y mantiene en el texto principal una equivalencia natural y publicable.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' en esta unidad sólo cuando el texto fuente lo exija; aquí no aparece el tetragrámaton.
  - Se mantiene 'sacerdote' y no 'cura' ni otro término eclesiástico.
  - Se emplea 'evaluará' de manera consistente para el verbo técnico ערך en ambas ocurrencias del versículo.
  - '''Voto'' traduce נדר en forma estable, evitando ampliar el sentido a ''promesa'' o ''juramento''.'
  - La puntuación y el orden sintáctico buscan una lectura fluida en español sin ocultar la estructura legal del hebreo.
