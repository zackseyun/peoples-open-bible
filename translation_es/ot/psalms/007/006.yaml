translation:
  language: es
  text: Que el enemigo persiga mi vida[a] y la alcance; que pisotee mi vida contra el suelo y haga que mi gloria[b] habite en el polvo. Selah
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mi alma» para נַפְשִׁי; el término hebreo puede denotar la persona, la vida o el alma según el contexto.
    reason: lexical_alternative
  - marker: b
    text: O «mi honor» o «mi dignidad» para «mi gloria» (כְבוֹדִי).
    reason: lexical_alternative
lexical_decisions:
- source_word: יִרַדֹּף
  english_pob_choice: let ... pursue
  chosen_spanish: que ... persiga
  alternatives_spanish:
  - que ... siga
  - que ... acose
  lexicon: HALOT
  rationale: El hebreo tiene fuerza yusiva/imprecativa; «que ... persiga» comunica el valor volitivo en español y conserva el sentido básico de perseguir sin cargar el texto con una paráfrasis más fuerte de lo que exige el verbo.
- source_word: אוֹיֵב
  english_pob_choice: the enemy
  chosen_spanish: el enemigo
  alternatives_spanish:
  - un enemigo
  - el adversario
  lexicon: HALOT
  rationale: El sustantivo es singular y funciona con valor genérico/retórico en el contexto; «el enemigo» refleja mejor la revisión inglesa que prefirió la forma definida y suena natural en español poético.
- source_word: נַפְשִׁי
  english_pob_choice: my life
  chosen_spanish: mi vida
  alternatives_spanish:
  - mi alma
  - mi ser
  lexicon: HALOT
  rationale: En este contexto de persecución y pisoteo, נֶפֶשׁ designa la vida o la persona viva más que una noción abstracta de alma. «Mi vida» mantiene el sentido concreto que el POB inglés documentó.
- source_word: וְיַשֵּׂג
  english_pob_choice: and overtake it
  chosen_spanish: y la alcance
  alternatives_spanish:
  - y la sobrepase
  - y la atrape
  lexicon: HALOT
  rationale: El verbo expresa alcanzar/sobrepasar en la persecución. «La alcance» continúa de forma idiomática la imagen iniciada por «persiga» y evita una redundancia pesada.
- source_word: וְיִרְמֹס
  english_pob_choice: let him trample
  chosen_spanish: que pisotee
  alternatives_spanish:
  - y pisotee
  - que aplaste
  lexicon: HALOT
  rationale: El hebreo presenta otro impulso imprecativo y la imagen de pisar violentamente. «Que pisotee» conserva la aspereza del verbo sin forzar un calco.
- source_word: לָאָרֶץ
  english_pob_choice: to the ground
  chosen_spanish: hasta la tierra
  alternatives_spanish:
  - al suelo
  - contra el suelo
  lexicon: HALOT
  rationale: Aunque literalmente es «a la tierra/land», la imagen con pisotear admite en español una formulación que conserve la dirección y el efecto de abatimiento. «Hasta la tierra» deja ver el movimiento descendente y la humillación.
- source_word: חַיָּי
  english_pob_choice: my life
  chosen_spanish: mi vida
  alternatives_spanish:
  - mi ser vivo
  - mi aliento
  lexicon: HALOT
  rationale: La forma plural funciona idiomáticamente con el sentido de vida. Se mantiene «mi vida» por claridad y porque el contexto sigue describiendo el hostigamiento de la existencia del salmista.
- source_word: וּכְבוֹדִי
  english_pob_choice: my glory
  chosen_spanish: mi gloria
  alternatives_spanish:
  - mi honor
  - mi dignidad
  lexicon: HALOT
  rationale: Se conserva la imagen poética de כָּבוֹד con «gloria», como hizo el POB inglés, para no resolver prematuramente la tensión entre gloria, honor y dignidad.
- source_word: לֶעָפָר
  english_pob_choice: in the dust
  chosen_spanish: en el polvo
  alternatives_spanish:
  - en el polvo de la tierra
  - al polvo
  lexicon: HALOT
  rationale: «Polvo» reproduce el campo imagético de humillación y ruina y resulta más natural en español con «habite en». «Tierra» en la versión inglesa se entiende como equivalente idiomático, no como exigencia literal.
- source_word: יַשְׁכֵּן
  english_pob_choice: make ... dwell
  chosen_spanish: haga que ... habite
  alternatives_spanish:
  - haga morar
  - asiente
  lexicon: HALOT
  rationale: 'El hifil es causativo: hacer habitar/establecer. «Haga que ... habite» preserva el valor causativo y la personificación poética de la gloria como algo colocado en un lugar de deshonra.'
- source_word: סֶלָה
  english_pob_choice: Selah
  chosen_spanish: Selah
  lexicon: HALOT
  rationale: Se mantiene la transliteración tradicional porque la función precisa del término es incierta y traducirlo excedería la evidencia disponible.
theological_decisions:
- issue: Valor antropológico de נַפְשִׁי en un contexto de violencia corporal
  english_pob_reading: my life
  chosen_spanish_reading: mi vida
  alternative_spanish_readings:
  - mi alma
  - mi ser
  rationale: La escena describe persecución, derribo y pisoteo; por eso «vida» comunica mejor la persona en su existencia concreta y evita imponer una dicotomía alma/cuerpo que el hebreo aquí no exige.
  doctrine_reference: Translation philosophy §1, §3
- issue: Sentido poético de כְבוֹדִי
  english_pob_reading: my glory
  chosen_spanish_reading: mi gloria
  alternative_spanish_readings:
  - mi honor
  - mi dignidad
  rationale: «Gloria» conserva la amplitud semántica y la elevación poética del hebreo. No se reduce a una sola acepción, dejando abierta la posible referencia al honor personal o a la dignidad del yo.
  doctrine_reference: Translation philosophy §3, §5
translation_notes:
  revision_awareness: 'La redacción sigue de cerca la versión inglesa revisada: adopta «el enemigo» como singular definido, mantiene la repetición de «mi vida» y conserva «mi gloria» con la ambigüedad poética documentada. También se tuvo en cuenta que la revisión previa cambió la indefinición inglesa por una forma definida, sin alterar la estructura imprecativa del verso.'
  spanish_consistency_notes:
  - Se preservó «Yahvé» como norma del proyecto solo cuando aparezca el tetragrámaton; este versículo no lo contiene.
  - «Selah» se deja sin traducir por consistencia con el POB y por la incertidumbre semántica del término.
  - Se eligió «gloria» y no «honor» en el texto principal para mantener la metáfora abierta, siguiendo el audit trail inglés.
