id: 2KI.14.4
reference: 2 Kings 14:4
source:
  edition: WLC
  text: רַ֥ק הַ/בָּמ֖וֹת לֹא סָ֑רוּ ע֥וֹד הָ/עָ֛ם מְזַבְּחִ֥ים וּֽ/מְקַטְּרִ֖ים בַּ/בָּמֽוֹת־׃
translation:
  text: However[a], the high places were not removed[b]; the people still were sacrificing and burning incense on the high places.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the shrines.' The Hebrew term refers to local cultic worship sites, often on elevated ground.
    reason: lexical_alternative
  - marker: b
    text: Or 'at the high places.'
    reason: lexical_alternative
lexical_decisions:
- source_word: רַק
  chosen: However
  alternatives:
  - Only
  - Nevertheless
  - Except that
  lexicon: HALOT
  rationale: Introduces an exception/qualification to the preceding evaluation of the king. 'However' communicates the adversative force naturally in modern English better than the more wooden 'only.'
- source_word: הַבָּמוֹת
  chosen: the high places
  alternatives:
  - the shrines
  lexicon: HALOT
  rationale: בָּמוֹת refers to elevated cultic sites or local worship places. 'High places' is the standard and sufficiently transparent rendering in this historical context.
- source_word: לֹא סָרוּ
  chosen: were not removed
  alternatives:
  - did not depart
  - were not taken away
  lexicon: HALOT
  rationale: With בָּמוֹת as subject, the idiom means these cult sites were not abolished/removed. Passive English best reflects the Hebrew verbal sense in context.
- source_word: עוֹד
  chosen: still
  alternatives:
  - yet
  - continuing
  lexicon: HALOT
  rationale: Marks ongoing action despite the preceding reform note. 'Still' is concise and idiomatic.
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the populace
  lexicon: HALOT
  rationale: Straightforward rendering of the collective noun referring to the population at large.
- source_word: מְזַבְּחִים
  chosen: were sacrificing
  alternatives:
  - were offering sacrifices
  lexicon: HALOT
  rationale: The participle expresses continuing customary action. 'Were sacrificing' preserves the verbal force without overexpanding.
- source_word: וּמְקַטְּרִים
  chosen: and burning incense
  alternatives:
  - and making offerings by fire
  - and turning sacrifices into smoke
  lexicon: HALOT
  rationale: In cultic contexts קטר commonly refers to burning incense or offerings. Here, paired with sacrificing and followed by 'on the high places,' 'burning incense' is the most idiomatic and contextually likely rendering.
- source_word: בַּבָּמוֹת
  chosen: on the high places
  alternatives:
  - at the high places
  lexicon: HALOT
  rationale: The preposition ב here is locative. 'On the high places' follows established English usage for these cult sites, though 'at' is possible.
