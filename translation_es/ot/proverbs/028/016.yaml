translation:
  language: es
  text: Un gobernante falto de entendimiento abunda en actos de opresión[a], pero el que odia la ganancia injusta prolongará sus días[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo literalmente dice «y grande en opresiones»; por eso también puede entenderse como «y comete mucha extorsión».
    reason: lexical_alternative
  - marker: b
    text: «Ganancia injusta» también puede expresarse como «lucro codicioso» o «ganancia obtenida injustamente».
    reason: lexical_alternative
lexical_decisions:
- source_word: נָגִיד
  english_pob_choice: ruler
  chosen_spanish: gobernante
  alternatives_spanish:
  - líder
  - príncipe
  lexicon: HALOT
  rationale: נָגִיד designa a una persona con autoridad. «Gobernante» es natural en español y suficientemente amplio para este proverbio, sin limitarlo innecesariamente a un contexto monárquico como «príncipe».
- source_word: חֲסַר תְּבוּנוֹת
  english_pob_choice: lacking understanding
  chosen_spanish: falto de entendimiento
  alternatives_spanish:
  - sin discernimiento
  - sin entendimiento
  lexicon: HALOT
  rationale: La expresión combina una carencia con un plural abstracto de discernimiento. «Falto de entendimiento» comunica bien la deficiencia intelectual y moral propia de la sabiduría proverbial, manteniendo una formulación fluida en español.
- source_word: וְרַב מַעֲשַׁקּוֹת
  english_pob_choice: is great in acts of oppression
  chosen_spanish: es grande en actos de opresión
  alternatives_spanish:
  - y es abundante en opresiones
  - y comete mucha extorsión
  lexicon: HALOT
  rationale: La frase hebrea dice literalmente «y grande/mucho en opresiones». En español, «es grande en actos de opresión» conserva la imagen y el plural de conductas opresivas; «actos de opresión» ayuda a que el plural resulte natural. No se estrecha a «extorsión», que sería más limitado.
- source_word: מַעֲשַׁקּוֹת
  english_pob_choice: acts of oppression
  chosen_spanish: actos de opresión
  alternatives_spanish:
  - opresiones
  - extorsiones
  lexicon: HALOT
  rationale: El sustantivo apunta a acciones opresivas o explotadoras. «Actos de opresión» preserva el sentido general y evita reducir indebidamente el término a un solo tipo de abuso.
- source_word: שׂנֵא בֶצַע
  english_pob_choice: one who hates unjust gain
  chosen_spanish: el que odia la ganancia injusta
  alternatives_spanish:
  - el que odia el lucro
  - el que odia la ganancia codiciosa
  lexicon: HALOT
  rationale: 'בֶצַע suele referirse a ganancia obtenida con codicia o por medios injustos. «Ganancia injusta» mantiene la fuerza moral del hebreo mejor que un simple «lucro» o «beneficio» neutral. El participio se traduce con una construcción proverbial en español: «el que odia».'
- source_word: יַאֲרִיךְ יָמִים
  english_pob_choice: will prolong his days
  chosen_spanish: prolongará sus días
  alternatives_spanish:
  - vivirá muchos años
  - alargará sus días
  lexicon: HALOT
  rationale: Es un modismo hebreo para indicar larga vida. «Prolongará sus días» conserva la imagen verbal del original y mantiene la conexión formal con el hebreo.
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del texto base inglés, que eliminó «also» por no estar representado en el hebreo. En español se omite igualmente cualquier equivalente de ese adverbio y se conserva el contraste simple entre la conducta opresiva del gobernante y la recompensa del que aborrece la ganancia injusta.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se eligió «ganancia injusta» para בֶצַע, coherente con el audit trail inglés y con la tendencia del proyecto a preservar la carga moral del término.
  - Se conservó el paralelismo proverbial con dos miembros contrastivos unidos por «pero».
