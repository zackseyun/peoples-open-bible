revisions:
- from: Y sucedió que ella iba montada en el burro y descendía por el lado oculto de la montaña[a], y he aquí, David y sus hombres venían descendiendo hacia ella, y los encontró.
  to: Y mientras ella iba montada en el asno y descendía por el lado oculto de la montaña[a], he aquí, David y sus hombres venían descendiendo hacia ella, y se encontró con ellos.
  rationale: Se ajusta la apertura narrativa a un español más natural y fiel a la función temporal del hebreo; se cambia «burro» por «asno» para un registro más bíblico y neutral; se corrige «los encontró» a «se encontró con ellos» para reflejar mejor פגש; y se reemplaza la nota redundante por una alternativa léxica real para בְּסֵתֶר הָהָר.
  reviewer_model: gpt-5.4
