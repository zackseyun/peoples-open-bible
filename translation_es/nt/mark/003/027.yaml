review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido del griego: contraste inicial, imposibilidad expresada por οὐδεὶς δύναται, entrada en la casa, saqueo de los bienes, condición previa de atar al hombre fuerte y consecuencia final. También preserva adecuadamente la metáfora del «hombre fuerte» sin hacer explícita su interpretación en el texto principal. La única corrección necesaria es en la nota b, porque «para el poder derrotado» altera el sentido del fundamento teológico documentado: no se trata simplemente de un poder derrotado, sino de la metáfora de Jesús sobre someter o vencer a Satanás.'
  spanish_quality_summary: El español es claro, natural y digno. «Pero nadie puede entrar en la casa del hombre fuerte y saquear sus bienes» suena idiomático y fiel. «A menos que primero ate» funciona bien, aunque «amarre» sería menos estándar en registro bíblico general. La puntuación también es correcta. La calidad general es alta; solo conviene ajustar la nota explicativa para mayor precisión y mejor concordancia con el expediente inglés.
  glossary_alignment: No hay conflictos con la terminología del proyecto. «Hombre fuerte» corresponde bien a ἰσχυρός en su uso sustantival y mantiene la imagen metafórica. «Saquear» para διαρπάζω y «bienes» para σκεύη encajan con las decisiones del POB, con una nota léxica útil. No aparecen términos sensibles del glosario principal que requieran intervención.
  issues:
  - severity: medium
    issue: La nota b modifica el referente teológico documentado
    rationale: El expediente inglés explica que el «hombre fuerte» pertenece a la metáfora de Jesús sobre vencer a Satanás. La frase española «para el poder derrotado» debilita y reinterpreta esa explicación, porque reemplaza el referente personal/metafórico por una abstracción distinta.
  revised_spanish_text: Pero nadie puede entrar en la casa del hombre fuerte y saquear sus bienes[a], a menos que primero ate al hombre fuerte[b]; y entonces saqueará su casa.
  revised_footnotes:
  - marker: a
    text: O «sus posesiones»; más literalmente, «sus utensilios/cosas».
    reason: lexical_alternative
  - marker: b
    text: El «hombre fuerte» forma parte de la metáfora de Jesús sobre vencer a Satanás; la traducción conserva la imagen sin explicitar la interpretación en el texto principal.
    reason: cross_reference
  revision_rationale: El texto principal ya es fiel y natural; la revisión corrige únicamente la nota b para alinearla con la decisión teológica documentada en el POB y evitar una paráfrasis interpretativa distinta.
  requires_gpt54_adjudication: false
