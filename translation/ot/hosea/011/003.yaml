theological_decisions:
- issue: Anthropomorphic parental imagery for God
  chosen_reading: 'Retain the parental image without softening it: God taught Ephraim to walk and carried them.'
  alternative_readings:
  - Generalized care imagery without parental specificity
  rationale: The Hebrew presents intimate parental care. The translation preserves this theological tenderness rather than abstracting it into generic providence.
  doctrine_reference: Translation philosophy §1, §3
- issue: Masoretic shift from first-person speaker to third-person suffixes/pronoun-like forms in the middle colon
  chosen_reading: Keep the main line coherent in English while preserving the notable MT wording in a footnote.
  alternative_readings:
  - 'Emend to explicit first person throughout: ''I took them in my arms'''
  - 'Translate woodenly with person shift: ''he took them on his arms'''
  rationale: The verse is divine first-person speech, but the MT contains a difficult third-person form/suffix in the middle colon. Optimal equivalence favors a readable main text while documenting the textual/lexical difficulty for auditability.
  doctrine_reference: Translation philosophy §3, §5
