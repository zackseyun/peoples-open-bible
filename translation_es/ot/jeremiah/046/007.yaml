translation:
  language: es
  text: ¿Quién es este, que sube como el Nilo[a], como ríos cuyas aguas se agitan[b]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo יְאֹר puede significar «río», pero en este contexto egipcio probablemente se refiere específicamente al Nilo.
    reason: lexical_alternative
  - marker: b
    text: 'O: «rugen» / «se alzan con fuerza».'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִי זֶה
  english_pob_choice: Who is this
  chosen_spanish: ¿Quién es este
  alternatives_spanish:
  - ¿Quién es este hombre
  - ¿Quién es este mismo
  lexicon: HALOT
  rationale: La combinación interrogativa + demostrativo en hebreo introduce una figura de manera vívida y retórica. «¿Quién es este» conserva la fuerza natural de la pregunta en español sin añadir precisión inexistente en el texto.
- source_word: כַּיְאֹר
  english_pob_choice: like the Nile
  chosen_spanish: como el Nilo
  alternatives_spanish:
  - como el río
  - como el Nilo de Egipto
  lexicon: HALOT
  rationale: En este contexto egipcio, יְאֹר apunta específicamente al Nilo, no a un río cualquiera. «Como el Nilo» mantiene el allusion y sigue la decisión auditada del inglés POB.
- source_word: יַעֲלֶה
  english_pob_choice: rising
  chosen_spanish: que sube
  alternatives_spanish:
  - que asciende
  - que se eleva
  - subiendo
  lexicon: HALOT
  rationale: עלה expresa subir/ascender. En español, «que sube» reproduce bien el movimiento ascendente y el presente poético sin forzar un giro más técnico.
- source_word: כַּנְּהָרוֹת
  english_pob_choice: like rivers
  chosen_spanish: como ríos
  alternatives_spanish:
  - como los ríos
  - como torrentes
  lexicon: HALOT
  rationale: El plural hebreo debe mantenerse como plural en español. «Ríos» es directo y conserva la imagen amplia de aguas en movimiento.
- source_word: יִתְגָּעֲשׁוּ
  english_pob_choice: surge
  chosen_spanish: se agitan
  alternatives_spanish:
  - rugen
  - se estremecen
  - se encrespan
  lexicon: HALOT
  rationale: El hitpael de געש comunica agitación turbulenta, con énfasis en el movimiento del agua. «Se agitan» preserva esa oscilación visible; alternativas como «rugen» enfatizan más el sonido que el movimiento.
- source_word: מֵימָיו
  english_pob_choice: whose waters
  chosen_spanish: cuyas aguas
  alternatives_spanish:
  - sus aguas
  - de las cuales las aguas
  - cuyas corrientes
  lexicon: HALOT
  rationale: Aunque literalmente es «sus/las aguas de él», en español «cuyas aguas» enlaza con naturalidad el antecedente plural «ríos» y mantiene la relación posesiva del hebreo sin introducir sexo gramatical innecesario.
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el paquete auditado; la versión inglesa final permanece sin cambios y la concordancia del revisor es alta.
  spanish_consistency_notes:
  - Se mantuvo «Nilo» para יְאֹר conforme al contexto egipcio y a la decisión auditada.
  - 'Se conservó el paralelismo poético con dos comparaciones: «como el Nilo» / «como ríos».'
  - «Se agitan» evita un exceso de interpretación sonora y deja abierta la imagen de movimiento turbulento.
