  yaml_path: translation/nt/galatians/004/007.yaml
  text: So you are no longer a slave but a son[a]; and if a son[b], then also an heir through God.
  footnotes:
  - marker: a
    text: 'Or ''child.'' Greek ''son'' preserves the inheritance/adoption logic of the passage, though Paul applies this status to all believers.'
