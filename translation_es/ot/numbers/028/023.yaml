translation:
  language: es
  text: Además del holocausto[a] de la mañana, que es para el holocausto continuo, ofrecerán estas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «además del holocausto continuo de la mañana»; la relación hebrea entre «el holocausto de la mañana» y «el holocausto continuo» puede entenderse de manera algo distinta, aunque la instrucción general es que estos sacrificios se ofrezcan además del holocausto continuo diario.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִלְּבַד
  english_pob_choice: Besides
  chosen_spanish: Además de
  alternatives_spanish:
  - Aparte de
  - Además
  lexicon: HALOT
  rationale: La expresión introduce una adición respecto de la ofrenda ya prescrita. «Además de» transmite con naturalidad la relación de suma sin perder el matiz de exclusión/inclusión del hebreo.
- source_word: עֹלַת
  english_pob_choice: burnt offering
  chosen_spanish: holocausto
  alternatives_spanish:
  - ofrenda quemada
  - ofrenda holocausto
  lexicon: HALOT
  rationale: En español bíblico, «holocausto» es el equivalente cultual establecido para עֹלָה y mantiene el sentido sacrificial técnico mejor que una paráfrasis explicativa.
- source_word: הַבֹּקֶר
  english_pob_choice: the morning
  chosen_spanish: de la mañana
  alternatives_spanish:
  - matutino
  - de la mañana temprano
  lexicon: HALOT
  rationale: El sustantivo con artículo especifica la ofrenda ligada a la mañana. «De la mañana» es natural en español y conserva el valor nominal del hebreo.
- source_word: לְעֹלַת הַתָּמִיד
  english_pob_choice: is for the regular burnt offering
  chosen_spanish: que es para el holocausto continuo
  alternatives_spanish:
  - que pertenece al holocausto continuo
  - para el holocausto perpetuo
  - para la ofrenda continua
  lexicon: HALOT
  rationale: Se conserva la relación expresada por לְ sin forzar una equivalencia puramente identitaria. «Continuo» refleja תָּמִיד; «perpetuo» sería posible, pero «continuo» expresa mejor la reiteración regular.
- source_word: תַּעֲשׂוּ
  english_pob_choice: you shall offer
  chosen_spanish: ofrecerán
  alternatives_spanish:
  - harán
  - presentarán
  - ofreceréis
  lexicon: HALOT
  rationale: Aunque el verbo hebreo es literalmente «hacer», en contexto sacrificial el español requiere «ofrecer». Se opta por tercera persona plural impersonal/normativa, una formulación clara y pública en español.
- source_word: אֶת אֵלֶּה
  english_pob_choice: these
  chosen_spanish: estas cosas
  alternatives_spanish:
  - estas
  - estas ofrendas
  lexicon: HALOT
  rationale: El demostrativo remite a las ofrendas recién enumeradas. «Estas cosas» mantiene la referencia sin añadir especificación interpretativa; «estas ofrendas» sería más explícito pero menos literal.
theological_decisions:
- issue: Valor cultual de עֹלָה y continuidad de la ofrenda diaria
  english_pob_reading: the morning burnt offering ... the regular burnt offering
  chosen_spanish_reading: el holocausto de la mañana ... el holocausto continuo
  alternative_spanish_readings:
  - la ofrenda quemada de la mañana ... la ofrenda continua
  - el holocausto matutino ... el holocausto perpetuo
  rationale: Se conserva la terminología cultual tradicional en español («holocausto») porque el pasaje trata de sacrificios prescritos, y se mantiene la continuidad del rito con «continuo». No se diluye el carácter técnico del texto.
  doctrine_reference: Culto levítico; prescripciones sacrificiales en la Torá
translation_notes:
  revision_awareness: El texto inglés auditado permanece sin cambios en la última revisión, y el acuerdo de revisión fue alto; esta propuesta sigue esa línea sin introducir expansiones no sustentadas.
  spanish_consistency_notes:
  - Se mantiene «holocausto» para עֹלָה por coherencia con el registro cultual de Números.
  - «Continuo» traduce תָּמִיד de forma consistente con la práctica POB, evitando «diario» por su mayor restricción semántica.
  - Se evita «SEÑOR» porque aquí no aparece el tetragrámaton ni un sustituto griego del nombre divino.
