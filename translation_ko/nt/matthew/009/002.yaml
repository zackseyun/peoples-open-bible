  text: '그런데 보십시오, 사람들이 침상에 누운 중풍병자 한 사람을 그분께 데려왔습니다. 예수님이 그들의 믿음을 보시고 그 중풍병자에게 말씀하셨습니다. 「얘야, 안심하여라. 네 죄들이 용서받았다.」'
