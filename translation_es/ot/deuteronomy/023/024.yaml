translation:
  language: es
  text: Guardarás lo que salió de tus labios[a] y lo cumplirás, conforme a lo que votaste a Yahvé tu Dios como ofrenda voluntaria[b], lo que hablaste con tu boca.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'la expresión de tus labios' o 'lo que procede de tus labios'.
    reason: lexical_alternative
  - marker: b
    text: O 'ofrenda de libre voluntad'. El término hebreo se refiere a una ofrenda dada libremente y no por obligación.
    reason: lexical_alternative
lexical_decisions:
- source_word: מוֹצָא שְׂפָתֶיךָ
  english_pob_choice: what has gone out from your lips
  chosen_spanish: lo que haya salido de tus labios
  alternatives_spanish:
  - la salida de tus labios
  - lo que procede de tus labios
  - lo que tus labios han pronunciado
  lexicon: HALOT
  rationale: מוֹצָא expresa algo que sale o procede. En español, 'lo que haya salido de tus labios' conserva la imagen concreta y el sentido de palabra hablada, sin volverlo demasiado abstracto.
- source_word: תִּשְׁמֹר
  english_pob_choice: you shall keep
  chosen_spanish: guardarás
  alternatives_spanish:
  - observarás
  - mantendrás
  - cumplirás
  lexicon: HALOT
  rationale: שׁמר puede ser 'guardar', 'observar' o 'cumplir'. 'Guardarás' conserva la idea de custodiar/fidelidad a lo dicho, y encaja con el paralelismo del versículo.
- source_word: וְעָשִׂיתָ
  english_pob_choice: and do it
  chosen_spanish: y lo cumplirás
  alternatives_spanish:
  - y lo harás
  - y lo realizarás
  - y lo ejecutarás
  lexicon: HALOT
  rationale: Aquí עשה apunta a llevar a cabo el voto. 'Cumplirás' expresa bien la ejecución fiel de lo prometido y evita un calco excesivamente literal en español.
- source_word: כַּאֲשֶׁר נָדַרְתָּ
  english_pob_choice: according to what you vowed
  chosen_spanish: conforme a lo que hayas prometido
  alternatives_spanish:
  - según lo que prometiste
  - tal como prometiste
  - según tu voto
  lexicon: HALOT
  rationale: El hebreo vincula la obligación al contenido del voto. 'Conforme a lo que hayas prometido' transmite esa correspondencia normativa sin perder naturalidad en español.
- source_word: לַיהוָה אֱלֹהֶיךָ
  english_pob_choice: to Yahweh your God
  chosen_spanish: a Yahvé tu Dios
  alternatives_spanish:
  - a Yahvé, tu Dios
  - al Yahvé tu Dios
  - al SEÑOR tu Dios
  lexicon: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
  rationale: Se mantiene 'Yahvé' por la política del proyecto para יהוה, en vez de ocultarlo con 'SEÑOR'. 'Tu Dios' conserva la fórmula de alianza del original.
- source_word: נְדָבָה
  english_pob_choice: as a freewill offering
  chosen_spanish: como ofrenda voluntaria
  alternatives_spanish:
  - como ofrenda libre
  - como ofrenda de libre voluntad
  - como ofrenda espontánea
  lexicon: HALOT
  rationale: נְדָבָה denota una ofrenda dada libremente, no por obligación. 'Ofrenda voluntaria' comunica bien ese valor cultual en español contemporáneo.
- source_word: אֲשֶׁר דִּבַּרְתָּ בְּפִיךָ
  english_pob_choice: which you spoke with your mouth
  chosen_spanish: lo que hablaste con tu boca
  alternatives_spanish:
  - lo que pronunciaste con tu boca
  - lo que dijiste con tu boca
  - lo que salió de tu boca
  lexicon: HALOT
  rationale: La reiteración de la oralidad refuerza que el voto fue verbal. 'Con tu boca' conserva el énfasis concreto del hebreo, aunque en español suene intensivo.
theological_decisions:
- issue: Rendering of the divine name יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - Jehová
  - SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton. La política española del proyecto es rendirlo como 'Yahvé' de manera visible, manteniendo la identidad del nombre pactual sin sustituirlo por una convención de ocultamiento.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Force of נְדָבָה in vow context
  english_pob_reading: freewill offering
  chosen_spanish_reading: ofrenda voluntaria
  alternative_spanish_readings:
  - ofrenda libre
  - ofrenda de libre voluntad
  - don voluntario
  rationale: En este contexto, el término es cultual y subraya la ausencia de coacción. 'Ofrenda voluntaria' preserva tanto el valor religioso como la idea de libre disposición.
  doctrine_reference: HALOT, semantic range of נְדָבָה
translation_notes:
  revision_awareness: The English POB and review trail show high agreement with no applied revisions. The main doctrinal divergence for Spanish is the required visibility of the divine name as 'Yahvé' rather than the English masking convention. Lexical decisions preserve the Hebrew idiom of speech from the lips/mouth and the vow-fulfillment parallelism.
  spanish_consistency_notes:
  - Mantener 'Yahvé' en todo el corpus para יהוה, no 'SEÑOR'.
  - Conservar el vocabulario de voto/ofrenda sin sustituirlo por formulaciones eclesiásticas más libres.
  - Preservar el paralelismo entre 'guardar' y 'cumplir' para reflejar שׁמר / עשה.
  - Evitar suavizar la repetición de 'labios/boca', porque es parte del énfasis hebreo.
