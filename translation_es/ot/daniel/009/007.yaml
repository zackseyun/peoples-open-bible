translation:
  language: es
  text: 'A ti, Señor, pertenece la justicia, pero a nosotros la vergüenza del rostro[a], como sucede hoy: a los hombres de Judá[b], a los habitantes de Jerusalén y a todo Israel, los que están cerca y los que están lejos, en todas las tierras donde los has expulsado, a causa de la infidelidad[c] que han cometido contra ti.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «vergüenza abierta» o «rostro avergonzado». El hebreo usa el modismo literalmente «vergüenza del rostro».
    reason: lexical_alternative
  - marker: b
    text: O «a cada hombre de Judá». El hebreo usa una forma masculina singular con valor distributivo.
    reason: lexical_alternative
  - marker: c
    text: O «su traición» o «su falta de fidelidad». El hebreo expresa deslealtad o infidelidad de pacto.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנָי
  english_pob_choice: O Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Oh Señor
  - Mi Señor
  lexicon: HALOT
  rationale: Es un vocativo dirigido a Dios en oración. En español, «Señor» comunica la apelación directa con dignidad natural; no se usa «Yahvé» porque el hebreo aquí no es el nombre divino sino el título אֲדֹנָי.
- source_word: הַצְּדָקָה
  english_pob_choice: righteousness
  chosen_spanish: la justicia
  alternatives_spanish:
  - la rectitud
  - la justicia tuya
  lexicon: HALOT
  rationale: En este contexto confesional, el término expresa que Dios está en lo justo frente al pecado del pueblo. «Justicia» conserva el campo semántico y funciona bien en español bíblico; «rectitud» es posible, pero menos natural aquí.
- source_word: בֹּשֶׁת הַפָּנִים
  english_pob_choice: shame of face
  chosen_spanish: la vergüenza del rostro
  alternatives_spanish:
  - el oprobio del rostro
  - la vergüenza en el rostro
  lexicon: HALOT
  rationale: Se conserva el modismo hebreo de forma transparente. «Vergüenza del rostro» refleja la imagen de deshonra visible sin reducirla a una simple vergüenza interior.
- source_word: כַּיּוֹם הַזֶּה
  english_pob_choice: as it is this day
  chosen_spanish: como en este día
  alternatives_spanish:
  - como hasta este día
  - tal como en este día
  lexicon: HALOT
  rationale: Expresa la referencia temporal al estado presente. «Como en este día» es natural en español bíblico y mantiene la inmediatez del hebreo.
- source_word: לְאִישׁ יְהוּדָה
  english_pob_choice: to the men of Judah
  chosen_spanish: a los hombres de Judá
  alternatives_spanish:
  - a todo varón de Judá
  - al pueblo de Judá
  lexicon: HALOT
  rationale: El singular masculino אִישׁ tiene valor distributivo/representativo. «Hombres de Judá» conserva ese rasgo mejor que neutralizarlo a «pueblo de Judá».
- source_word: יוֹשְׁבֵי יְרוּשָׁלִַם
  english_pob_choice: the inhabitants of Jerusalem
  chosen_spanish: a los habitantes de Jerusalén
  alternatives_spanish:
  - a los que habitan en Jerusalén
  - a los residentes de Jerusalén
  lexicon: HALOT
  rationale: Es la manera más directa y natural de verter el participio de residencia. «Habitantes» reproduce con claridad el sentido local del hebreo.
- source_word: הַקְּרֹבִים וְהָרְחֹקִים
  english_pob_choice: those who are near and those who are far away
  chosen_spanish: los que están cerca y los que están lejos
  alternatives_spanish:
  - los cercanos y los lejanos
  - los de cerca y los de lejos
  lexicon: HALOT
  rationale: Mantiene el contraste geográfico del hebreo y su ritmo paralelo. La forma relativa evita que suene demasiado nominalizado en español.
- source_word: בְּכָל הָאֲרָצוֹת
  english_pob_choice: in all the lands
  chosen_spanish: en todas las tierras
  alternatives_spanish:
  - en todos los países
  - por todas las tierras
  lexicon: HALOT
  rationale: «Tierras» conserva mejor el ámbito territorial amplio del exilio que «países», que suena más moderno-político.
- source_word: הִדַּחְתָּם
  english_pob_choice: you have driven them
  chosen_spanish: los has echado
  alternatives_spanish:
  - los has expulsado
  - los has dispersado
  lexicon: HALOT
  rationale: El verbo hebreo expresa hacer salir/arrojar lejos. «Echado» preserva la agencia divina y el movimiento de expulsión; «dispersado» interpreta el resultado más que la acción.
- source_word: בְּמַעֲלָם
  english_pob_choice: because of their unfaithfulness
  chosen_spanish: a causa de la infidelidad
  alternatives_spanish:
  - por su traición
  - a causa de su falta de fidelidad
  lexicon: HALOT
  rationale: «Infidelidad» comunica bien la deslealtad de pacto implícita en מעל y mantiene el tono confesional. «Traición» es más fuerte, pero puede sonar más específico de lo que exige el texto.
- source_word: אֲשֶׁר מָעֲלוּ בָךְ
  english_pob_choice: that they committed against you
  chosen_spanish: que han cometido contra ti
  alternatives_spanish:
  - con la que se mostraron infieles contra ti
  - con la que obraron con traición contra ti
  lexicon: HALOT
  rationale: La cláusula relativa retoma y concreta la ofensa personal contra Dios. «Han cometido contra ti» es natural y conserva el objeto directo relacional del hebreo.
theological_decisions:
- issue: Contraste entre la justicia de Dios y la vergüenza del pueblo
  english_pob_reading: The verse contrasts God's righteous standing with the people's public disgrace without implying meritorious self-justification or denying divine mercy.
  chosen_spanish_reading: El versículo contrapone la justicia de Dios con la vergüenza pública del pueblo, sin insinuar autojustificación meritória ni negar la misericordia divina.
  alternative_spanish_readings:
  - la rectitud de Dios frente a la deshonra del pueblo
  - la justicia divina frente al oprobio humano
  rationale: «Justicia» en español conserva la afirmación confesional de que Dios está en lo correcto y el pueblo está avergonzado por su pecado. La formulación mantiene la tensión teológica del texto sin suavizarla.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, Contested terms table on δικαιοσύνη by analogy of semantic domain
- issue: Lenguaje masculino representativo en לְאִישׁ יְהוּדָה
  english_pob_reading: Retain masculine representative language with 'men of Judah' rather than neutralizing to 'people of Judah'.
  chosen_spanish_reading: Se conserva el lenguaje masculino representativo con «hombres de Judá» en vez de neutralizarlo a «pueblo de Judá».
  alternative_spanish_readings:
  - a todo el pueblo de Judá
  - a cada uno en Judá
  rationale: El hebreo usa אִישׁ en singular con valor distributivo; por fidelidad al dato gramatical, la traducción mantiene el referente masculino representativo en vez de borrarlo.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés POB, que ajustó la cláusula final para una redacción más natural («the unfaithfulness they have committed») sin cambiar el sentido hebreo. La versión española refleja esa misma relación causal y mantiene el paralelismo entre la infidelidad y el pecado cometido contra Dios.
  spanish_consistency_notes:
  - Se conserva la dirección vocativa a Dios con «Señor» sin ocultar el vocativo hebreo.
  - «Justicia» se usa de modo coherente con el contraste confesional del pasaje.
  - Se mantiene la imagen idiomática de «vergüenza del rostro» en una forma española inteligible.
  - El par «cerca/lejos» reproduce el contraste espacial del hebreo para Israel en el exilio.
  - No se introduce «Cristo» ni «SEÑOR» como convención tipográfica, porque el texto usa אֲדֹנָי y no el tetragrámaton.
