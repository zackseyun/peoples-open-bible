revisions:
- from: Así que Sisac, rey de Egipto, subió contra Jerusalén y tomó los tesoros de la casa de Yahvé[a] y los tesoros de la casa del rey. Tomó todo[b]; también tomó los escudos de oro que Salomón había hecho.
  to: Entonces Sisac, rey de Egipto, subió contra Jerusalén y tomó las tesorerías de la casa de Yahvé[a] y las tesorerías de la casa del rey[b]. Tomó todo; también tomó los escudos de oro que Salomón había hecho.
  rationale: Se corrigieron los anclajes de las notas para que coincidan con las frases pertinentes del texto y se ajustó «tesoros» a «tesorerías» para reflejar mejor el hebreo אֹצְרוֹת y la decisión léxica auditada en inglés. También se suavizó el inicio a «Entonces» para una narración más natural en español bíblico.
  reviewer_model: gpt-5.4
