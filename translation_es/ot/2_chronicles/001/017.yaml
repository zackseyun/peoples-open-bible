translation:
  language: es
  text: Importaron de Egipto un carro por seiscientos siclos de plata[a], y un caballo por ciento cincuenta; y así los exportaron a todos los reyes de los hititas y a los reyes de Aram[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «subieron y sacaron de Egipto». El hebreo usa verbos comunes de movimiento en un contexto comercial; «importaron» expresa ese sentido mercantil.'
    reason: lexical_alternative
  - marker: b
    text: Hebreo «Aram»; tradicionalmente, «Siria».
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּעֲלוּ / וַיּוֹצִיאוּ
  english_pob_choice: They imported
  chosen_spanish: Importaron
  alternatives_spanish:
  - Trajeron
  - Subieron y sacaron
  lexicon: HALOT
  rationale: El hebreo usa verbos comunes de movimiento, pero en este contexto comercial expresa la entrada de mercancía desde Egipto. «Importaron» comunica ese valor comercial sin borrar la base verbal del original.
- source_word: מֶרְכָּבָה
  english_pob_choice: a chariot
  chosen_spanish: un carro
  alternatives_spanish:
  - un carro de guerra
  - un carruaje
  lexicon: HALOT
  rationale: El término designa aquí una unidad comercial de transporte militar; «carro» es una forma natural en español y evita forzar «carruaje», que sería menos preciso en este contexto.
- source_word: בְּשֵׁשׁ מֵאוֹת כֶּסֶף
  english_pob_choice: for six hundred shekels of silver
  chosen_spanish: por seiscientas piezas de plata
  alternatives_spanish:
  - por seiscientos siclos de plata
  - a seiscientas piezas de plata
  lexicon: HALOT
  rationale: El hebreo menciona literalmente la cantidad de plata; «piezas de plata» comunica el valor monetario de manera clara en español. Se evita imponer una unidad explícita si el texto no la dice, aunque el sentido monetario queda preservado.
- source_word: וְסוּס
  english_pob_choice: and a horse
  chosen_spanish: y un caballo
  alternatives_spanish:
  - y un corcel
  - y un potro
  lexicon: HALOT
  rationale: «Caballo» es el equivalente más directo y natural; el contexto no exige especificar sexo ni matiz técnico.
- source_word: בַּחֲמִשִּׁים וּמֵאָה
  english_pob_choice: for one hundred fifty
  chosen_spanish: por ciento cincuenta
  alternatives_spanish:
  - a ciento cincuenta
  - por ciento cincuenta siclos
  lexicon: HALOT
  rationale: La expresión hebrea equivale a 150. Se mantiene la economía del original y el contexto de precio ya establece la unidad monetaria de la cláusula paralela.
- source_word: וְכֵן
  english_pob_choice: and so
  chosen_spanish: y así
  alternatives_spanish:
  - y de ese modo
  - y de la misma manera
  lexicon: HALOT
  rationale: La partícula enlaza la continuidad comercial entre la primera y la segunda mitad del verso; «y así» conserva el avance narrativo y la relación de equivalencia.
- source_word: לְכָל מַלְכֵי הַחִתִּים
  english_pob_choice: to all the kings of the Hittites
  chosen_spanish: a todos los reyes de los hititas
  alternatives_spanish:
  - a todos los reyes de los heteos
  - a todos los reyes hititas
  lexicon: HALOT
  rationale: «Hititas» reproduce el etnónimo de forma transparente y reconocible en español bíblico actual.
- source_word: וּמַלְכֵי אֲרָם
  english_pob_choice: the kings of Aram
  chosen_spanish: a los reyes de Aram
  alternatives_spanish:
  - a los reyes de Siria
  lexicon: HALOT
  rationale: Se conserva «Aram» siguiendo la preferencia de transliteración del proyecto, en lugar de sustituirlo por el equivalente tradicional «Siria».
theological_decisions:
- issue: Sentido comercial de los verbos de movimiento
  english_pob_reading: The English POB renders the verse with import/export language to reflect the commercial context rather than the literal motion verbs.
  chosen_spanish_reading: Se traduce con «importaron» y «exportaron» para reflejar el tráfico comercial sin perder el sentido contextual.
  alternative_spanish_readings:
  - Trajeron / sacaron
  - Subieron / hicieron salir
  rationale: El texto habla de transacciones y precios; en español, el par «importar/exportar» expresa con claridad la circulación mercantil que el hebreo presenta mediante verbos comunes de movimiento.
  doctrine_reference: No aplica; decisión de sentido contextual y lexical.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el audit trail inglés: se mantuvo la lectura comercial del verso con verbos equivalentes a importación/exportación, se preservó la transliteración de Aram y se evitó introducir una lectura excesivamente literal de la expresión instrumental final, que el inglés POB ya consideró idiomática y luego suavizó.'
  spanish_consistency_notes:
  - Se usa «Aram» de forma consistente, no «Siria».
  - Se conserva el registro comercial del verso para no diluir la fuerza contextual del hebreo.
  - «Caballo» y «carro» se mantienen simples y naturales, sin sobreespecificar el tipo de animal o vehículo.
  - Las notas a y b distinguen la cantidad de plata y la cifra 150 sin imponer una unidad no explicitada por el hebreo en la segunda cláusula.
