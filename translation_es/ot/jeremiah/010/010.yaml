    rationale: En el inglés, [a] trata la conjunción inicial, [b] la alternativa 'God of truth', y [c] pertenece a 'everlasting/eternal King'. El borrador solo incluye [a] y [c], y [c] queda asociado a un contenido que en el audit trail debería acompañarse además de [b] anterior.
