theological_decisions:
- issue: Rendering of ⲧⲙⲛⲧⲉⲩⲛⲟⲩ vis‑à‑vis creation out of nothing
  chosen_reading: non‑being
  alternative_readings:
  - nothing
  - nothingness
  rationale: Valentinian usage contrasts the Father as source of being with the realm
    of non‑being. “Non‑being” preserves the ontological register without importing
    later technical debates about creatio ex nihilo. “Nothingness” is philosophically
    heavy; “nothing” risks colloquial flattening.
- issue: Translation of the aeon vocabulary
  chosen_reading: aeon
  alternative_readings:
  - realm
  - age
  rationale: ‘Aeon’ is a marked technical term in Valentinian cosmology. We retain
    it rather than the flatter ‘realm,’ to keep readers oriented to the conceptual
    world of the text.
- issue: ⲡⲉⲉⲓ as a title
  chosen_reading: the One‑who‑is
  alternative_readings:
  - the One who is
  - the Existent One
  rationale: The hyphenated title signals a reified designation for the source of
    being, distinct from a simple clause, and resonates with known NH usage without
    forcing a direct Exodus 3:14 connection.
