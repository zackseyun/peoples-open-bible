    reason: lexical_alternative
  - marker: b
    text: Senir es un nombre antiguo para parte de la cordillera del Hermón.
    reason: cultural_note
  revision_rationale: 'Se corrigieron los anclajes de las notas para que coincidan con el contenido auditado: la alternativa léxica va en ‘Mira’ y la nota cultural en ‘Senir’. También se reemplazó ‘leopardas’ por ‘leopardos’ para reflejar fielmente el plural genérico hebreo y mejorar la naturalidad del español. No se requieren cambios doctrinales ni adjudicación adicional.'
