translation:
  language: es
  text: Y al final de cuatrocientos treinta años, en aquel mismo día, salieron todas las huestes de Yahvé[a] de la tierra de Egipto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los ejércitos de Yahvé». El hebreo צִבְאוֹת puede denotar compañías organizadas o ejércitos.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִקֵּץ
  english_pob_choice: at the end of
  chosen_spanish: al final de
  alternatives_spanish:
  - desde el final de
  - cuando llegó el final de
  lexicon: HALOT
  rationale: מִן con קֵץ señala el punto de conclusión de un período. «Al final de» expresa con naturalidad ese cierre temporal en español sin perder precisión.
- source_word: שְׁלֹשִׁים שָׁנָה וְאַרְבַּע מֵאוֹת שָׁנָה
  english_pob_choice: four hundred and thirty years
  chosen_spanish: cuatrocientos treinta años
  alternatives_spanish:
  - treinta años y cuatrocientos años
  lexicon: HALOT
  rationale: El hebreo expresa un total de 430 años; en español, el orden normal y más legible es «cuatrocientos treinta años».
- source_word: בְּעֶצֶם הַיּוֹם הַזֶּה
  english_pob_choice: on that very day
  chosen_spanish: en este mismo día
  alternatives_spanish:
  - en aquel mismo día
  - en el mismo día
  lexicon: HALOT
  rationale: La expresión enfatiza exactitud y solemnidad. «En este mismo día» conserva la fuerza enfática y funciona bien en narración retrospectiva en español.
- source_word: יָצְאוּ
  english_pob_choice: went out
  chosen_spanish: salieron
  alternatives_spanish:
  - fueron fuera
  - partieron
  lexicon: HALOT
  rationale: יצא significa salir/ir fuera. «Salieron» es el equivalente más directo y natural en español.
- source_word: צִבְאוֹת
  english_pob_choice: hosts
  chosen_spanish: ejércitos
  alternatives_spanish:
  - huestes
  - compañías
  lexicon: HALOT
  rationale: El término puede referirse a cuerpos organizados con matiz militar. En este contexto narrativo, «ejércitos» preserva el peso colectivo y organizado del hebreo; «huestes» es posible, pero menos transparente para el lector moderno.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: El Tetragrámaton se vierte como «Yahvé» conforme al criterio del proyecto, preservando el nombre propio divino en lugar de sustituirlo por un título.
- source_word: מֵאֶרֶץ מִצְרָיִם
  english_pob_choice: from the land of Egypt
  chosen_spanish: de la tierra de Egipto
  alternatives_spanish:
  - de Egipto
  - fuera de Egipto
  lexicon: HALOT
  rationale: El hebreo incluye explícitamente «tierra» (אֶרֶץ). Mantenerla en español conserva el alcance geográfico y nacional de la salida.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton. La traducción española mantiene el nombre propio divino como «Yahvé», sin enmascararlo como título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de צִבְאוֹת יְהוָה
  english_pob_reading: the hosts of Yahweh
  chosen_spanish_reading: los ejércitos de Yahvé
  alternative_spanish_readings:
  - las huestes de Yahvé
  - los ejércitos del SEÑOR
  rationale: «צִבְאוֹת» conserva el matiz de cuerpos organizados con resonancia militar. «Ejércitos» comunica mejor ese valor al lector español que «huestes», aunque ambas opciones son defensables.
  doctrine_reference: HALOT; decisión lexical contextual
- issue: Alcance narrativo de בְּעֶצֶם הַיּוֹם הַזֶּה
  english_pob_reading: on that very day
  chosen_spanish_reading: en este mismo día
  alternative_spanish_readings:
  - en aquel mismo día
  rationale: La expresión enfatiza la precisión del momento. «En este mismo día» mantiene el énfasis sin introducir una formulación demasiado arcaica.
  doctrine_reference: Decisión estilística fiel al hebreo
translation_notes:
  revision_awareness: Corregido para anclar la nota de pie [a] en el texto. La revisión anterior mantenía el valor léxico de צִבְאוֹת con una nota alternativa; aquí se conserva la misma ambigüedad documentada, pero el marcador aparece explícitamente en la frase correspondiente.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para el Tetragrámaton, conforme al criterio del proyecto.
  - Se eligió «ejércitos» para צִבְאוֹת por transparencia semántica en español, dejando la alternativa «huestes» en nota.
  - «Tierra de Egipto» preserva la presencia explícita de אֶרֶץ en el hebreo.
  - La estructura narrativa inicial con «Y» refleja la conjunción וַיְהִי del hebreo y coincide con la revisión auditada.
