translation:
  language: es
  text: ¡Ay de los pastores que destruyen y dispersan las ovejas de mi pasto[a]!, declara Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el rebaño de mi pasto».
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹי
  english_pob_choice: Woe
  chosen_spanish: ¡Ay de...!
  alternatives_spanish:
  - ¡Ay!
  - ¡Ay de los...!
  - ¡Desgracia para...!
  lexicon: HALOT
  rationale: La interjección profética expresa denuncia y lamento. En español, «¡Ay de...!» transmite con naturalidad esa carga de juicio sin perder el tono profético.
- source_word: רֹעִים
  english_pob_choice: shepherds
  chosen_spanish: pastores
  alternatives_spanish:
  - pastores espirituales
  - líderes
  - guías
  lexicon: HALOT
  rationale: Se conserva la metáfora literal de pastoreo, como en el texto hebreo y en la decisión inglesa, en vez de interpretarla como «líderes».
- source_word: מְאַבְּדִים
  english_pob_choice: are destroying
  chosen_spanish: destruyen
  alternatives_spanish:
  - están destruyendo
  - están haciendo perecer
  - arruinan
  lexicon: HALOT
  rationale: El participio describe una acción continua. En español, el presente simple puede funcionar de manera aspectual y resultar más idiomático que una perífrasis forzada.
- source_word: וּמְפִצִים
  english_pob_choice: and scattering
  chosen_spanish: y dispersan
  alternatives_spanish:
  - y esparcen
  - y desparraman
  - y dispersan por todas partes
  lexicon: HALOT
  rationale: «Dispersan» conserva el paralelo con el participio anterior y expresa bien el sentido de dispersión del rebaño.
- source_word: אֶת צֹאן
  english_pob_choice: the sheep
  chosen_spanish: las ovejas
  alternatives_spanish:
  - el rebaño
  - las ovejas del rebaño
  lexicon: HALOT
  rationale: Aunque צֹאן puede abarcar «rebaño», el sustantivo plural «ovejas» mantiene la imagen concreta del texto y la correspondencia con la versión inglesa.
- source_word: מַרְעִיתִי
  english_pob_choice: of my pasture
  chosen_spanish: de mi pastizal
  alternatives_spanish:
  - de mi pasto
  - de mi pastura
  - de mi pradera
  lexicon: HALOT
  rationale: El sustantivo significa «pastura/pastizal/pasto». «Pastizal» comunica de forma clara en español la idea de un lugar de pastoreo perteneciente a Yahvé. Se evita «mi pastura» por sonar más técnico o ambiguo para lectores generales.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - dice Yahvé
  - oráculo de Yahvé
  - declara el Yahvé
  lexicon: HALOT
  rationale: Se conserva la fórmula profética solemne con el nombre divino «Yahvé», conforme al criterio del proyecto para יהוה.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene la transliteración del nombre divino, no la sustitución por «SEÑOR».
theological_decisions:
- issue: Preservación de la metáfora pastoral
  english_pob_reading: Keep the pastoral metaphor in the main text rather than replacing it with 'leaders' and 'people.'
  chosen_spanish_reading: Conservar en el texto principal la metáfora de pastores/ovejas en vez de convertirla en «líderes/pueblo».
  alternative_spanish_readings:
  - ¡Ay de los líderes que destruyen y dispersan a mi pueblo!
  rationale: El hebreo usa deliberadamente el lenguaje de pastoreo; mantenerlo conserva la fuerza literaria y teológica del oráculo y evita aplanar la imagen.
  doctrine_reference: 'Translation philosophy: original-language primacy; no paraphrase beyond the source text.'
translation_notes:
  revision_awareness: Se siguió el estado revisado más reciente, que no requirió cambios sustantivos; la traducción española refleja el mismo acuerdo alto con la lectura fuente y la misma preservación de la metáfora pastoral.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יהוה.
  - Se conserva la metáfora pastoral «pastores / ovejas» sin interpretarla como «líderes / pueblo».
  - Se eligió el presente simple «destruyen y dispersan» para reflejar el valor aspectual continuo de los participios hebreos en un español natural.
  - La nota a pie de página mantiene la alternativa léxica principal sobre מַרְעִיתִי, equivalente a la nota inglesa sobre «pasture / flock of my pasture».
