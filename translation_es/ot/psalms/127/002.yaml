review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien el sentido general del hebreo y sigue la decisión principal del POB inglés: la futilidad del esfuerzo ansioso contrastada con el don divino del sueño para su amado. También preserva correctamente la ambigüedad sintáctica final mediante nota. Sin embargo, una frase clave no representa fielmente el hebreo idiomático: מְאַחֲרֵי שֶׁבֶת no significa ''tardarse en sentarse'', sino quedarse despiertos/sentados hasta tarde. Además, ''pan del trabajo'' debilita el matiz de labor penosa o afanosa de עֲצָבִים.'
  spanish_quality_summary: El texto es mayormente claro, pero 'tardarse en sentarse' suena poco natural y semánticamente equívoco en español; parece hablar de demorarse antes de sentarse, no de prolongar la jornada hasta tarde. 'Pues así da a su amado el sueño' es entendible, pero en español bíblico natural fluye mejor 'porque él da sueño a su amado' o similar. La redacción revisada mejora naturalidad, paralelismo y dignidad sin apartarse del original.
  glossary_alignment: No hay conflictos con la terminología nuclear del proyecto. 'Amado' para לִידִידוֹ es adecuado. 'Sueño' para שֵׁנָא es correcto, con la nota alternativa bien preservada. La principal corrección léxica necesaria es ajustar מְאַחֲרֵי שֶׁבֶת a una expresión idiomática española que refleje 'sentarse/quedarse hasta tarde', y fortalecer עֲצָבִים con 'fatiga' o 'afán penoso' en lugar de solo 'trabajo'.
  issues:
  - severity: high
    issue: '''tardarse en sentarse'' traduce mal מְאַחֲרֵי שֶׁבֶת'
    rationale: La frase hebrea contrasta con madrugar y describe prolongar la vigilia/labor hasta tarde. En español, 'tardarse en sentarse' normalmente significa demorarse antes de sentarse, lo cual desvía el sentido del original.
  - severity: medium
    issue: '''pan del trabajo'' atenúa demasiado הָעֲצָבִים'
    rationale: El hebreo apunta a trabajo penoso, fatiga o afán doloroso, no al trabajo en general. 'Pan de fatiga' o 'pan de afanes' preserva mejor la carga semántica sin sobreinterpretar.
  - severity: low
    issue: '''pues así da a su amado el sueño'' es algo rígido'
    rationale: Aunque no es incorrecto, suena menos natural que una formulación como 'porque él da sueño a su amado', que comunica mejor la lógica explicativa elegida por el POB inglés.
  revised_spanish_text: En vano es para ustedes madrugar, quedarse levantados hasta tarde, comer el pan de fatiga; porque él da sueño a su amado[a].
  revised_footnotes:
  - marker: a
    text: 'O: «porque así da a su amado en el sueño», o «porque da a su amado mientras duerme». El hebreo es compacto y puede entenderse o bien que Dios da el sueño mismo, o bien que concede sus dones aun durante el sueño.'
    reason: alternative_reading
