translation:
  language: es
  text: Él rescata al afligido[a] por su aflicción, y abre sus oídos[b] por la opresión.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «el pobre». El hebreo puede destacar pobreza, aflicción u opresión; aquí se traduce de manera más amplia por el contexto sapiencial.'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «descubre/abre sus oídos». Es un hebraísmo para hacer que alguien escuche o reciba instrucción.'
    reason: cultural_note
lexical_decisions:
- source_word: יְחַלֵּץ
  english_pob_choice: rescues
  chosen_spanish: rescata
  alternatives_spanish:
  - libera
  - saca
  lexicon: HALOT
  rationale: El piel de חלץ expresa sacar o librar de un peligro; «rescata» comunica bien la acción salvadora en español moderno y conserva el matiz activo mejor que un calco más rígido.
- source_word: עָנִי
  english_pob_choice: the afflicted
  chosen_spanish: el afligido
  alternatives_spanish:
  - el pobre
  - el humilde
  lexicon: HALOT
  rationale: Aunque el término puede significar «pobre», en este contexto sapiencial y por el paralelismo con aflicción y opresión, «afligido» preserva mejor la amplitud semántica que una lectura solo socioeconómica.
- source_word: בְעָנְיֹו
  english_pob_choice: by their affliction
  chosen_spanish: en su aflicción
  alternatives_spanish:
  - por su aflicción
  - mediante su aflicción
  lexicon: HALOT
  rationale: La preposición בְ aquí puede ser circunstancial o instrumental. En español, «en su aflicción» mantiene la idea de contexto/situación sin forzar demasiado la instrumentalidad, y deja abierta la tensión interpretativa observada en el audit trail.
- source_word: וְיִגֶל
  english_pob_choice: opens
  chosen_spanish: abre
  alternatives_spanish:
  - descubre
  - revela
  lexicon: HALOT
  rationale: 'Con «oídos» como objeto, la expresión es idiomática: no se trata de abrir físicamente, sino de hacer oír/atender. «Abre» es la forma más natural y fiel en español.'
- source_word: בַּלַּחַץ
  english_pob_choice: by oppression
  chosen_spanish: mediante la opresión
  alternatives_spanish:
  - por la opresión
  - en la opresión
  - mediante la angustia
  lexicon: HALOT
  rationale: לַחַץ denota presión, opresión o angustia. «Mediante la opresión» conserva el posible valor instrumental que destaca el inglés POB, sin cerrar el sentido a una sola experiencia de sufrimiento.
- source_word: אָזְנָם
  english_pob_choice: their ears
  chosen_spanish: sus oídos
  alternatives_spanish:
  - sus orejas
  lexicon: HALOT
  rationale: El sufijo plural de tercera persona está bien reflejado con «sus oídos». «Oídos» es más natural y solemne que «orejas» en este registro bíblico.
theological_decisions:
- issue: El sufrimiento como medio de instrucción divina
  english_pob_reading: Affliction/oppression is presented as an instrument through which God rescues and opens hearing, without implying that all suffering is good in itself or that every case of suffering is direct punishment.
  chosen_spanish_reading: La aflicción y la opresión aparecen como el contexto o instrumento mediante el cual Dios rescata y abre el oído, sin afirmar que todo sufrimiento sea bueno en sí mismo ni que toda pena sea castigo directo.
  alternative_spanish_readings:
  - La aflicción es solo el escenario del rescate, no su medio
  - El versículo enseña una retribución estricta
  rationale: El hebreo con ב repetida admite una lectura instrumental, pero en Job conviene preservar la tensión teológica sin resolverla en una doctrina simplificada del sufrimiento. La redacción española mantiene esa ambigüedad productiva.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'Se mantuvo el sentido general del audit trail inglés con ajuste natural al español: «rescata» para יְחַלֵּץ, «afligido» para עָנִי, y una solución idiomática para «abre sus oídos». La traducción conserva la ambigüedad entre contexto e instrumento en las frases preposicionales, sin imponer una explicación doctrinal cerrada.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma estándar del proyecto solo cuando el texto lo requiera; en este versículo no aparece.
  - Se conservó «afligido» en lugar de «pobre» para respetar el énfasis contextual del paralelismo.
  - «Oídos» refleja el plural del hebreo y evita singularizar innecesariamente el objeto idiomático.
