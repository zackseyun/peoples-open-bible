base_translation:
  language: en
  yaml_path: translation/ot/genesis/048/016.yaml
  text: The angel who has redeemed me from all evil[a], may he bless the boys; and may my name and the name of my fathers Abraham and Isaac be called on them[e][d][c][b]; and may they multiply greatly in the midst of the land.
  footnotes:
  - marker: a
    text: Or 'from all harm' or 'from every trouble.' The Hebrew 'evil' can include calamity as well as moral evil.
    reason: lexical_alternative
  - marker: b
    text: Or 'may they be called by my name.' The Hebrew idiom is literally 'may my name be called on them.'
    reason: lexical_alternative
  - marker: c
    text: Or 'may they grow into a multitude.' The Hebrew verb is rare and evokes abundant increase, possibly with fish-like imagery.
    reason: lexical_alternative
  - marker: d
    text: Or 'in the midst of the earth.' Hebrew 'land' can also mean 'earth' depending on context.
    reason: alternative_reading
  - marker: e
    text: Or 'and may my name be called on them, and the name of my fathers Abraham and Isaac'.
    reason: previous_rendering
