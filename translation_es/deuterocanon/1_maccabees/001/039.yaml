revisions:
- from: El santuario de ella fue arrasado como un desierto; sus fiestas se volvieron duelo, sus sábados, oprobio, su honor, desprecio.
  to: Su santuario fue arrasado como un desierto; sus fiestas se convirtieron en luto, sus sábados en oprobio, su honor en menosprecio.
