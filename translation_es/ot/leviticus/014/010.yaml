translation:
  language: es
  text: Y al octavo día tomará dos corderos machos sin defecto, y una cordera de un año sin defecto, y tres décimas de efa de flor de harina como ofrenda vegetal, mezclada con aceite, y un log[a] de aceite.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Un «log» es una pequeña medida líquida usada en la práctica ritual israelita.
    reason: cultural_note
lexical_decisions:
- source_word: וּבַיּוֹם הַשְּׁמִינִי
  english_pob_choice: And on the eighth day
  chosen_spanish: Y en el octavo día
  alternatives_spanish:
  - En el octavo día
  lexicon: HALOT
  rationale: La secuencia legal del hebreo se conserva de forma natural con «Y en». «Octavo día» refleja directamente הַשְּׁמִינִי sin añadir interpretación.
- source_word: יִקַּח
  english_pob_choice: he shall take
  chosen_spanish: tomará
  alternatives_spanish:
  - habrá de tomar
  - deberá tomar
  lexicon: HALOT
  rationale: En español, el futuro simple expresa con naturalidad la fuerza prescriptiva del imperfecto en material legal, manteniendo el tono normativo del texto.
- source_word: שְׁנֵי כְבָשִׂים
  english_pob_choice: two male lambs
  chosen_spanish: dos corderos machos
  alternatives_spanish:
  - dos corderos
  - dos carneros jóvenes
  lexicon: HALOT
  rationale: «כְבָשִׂים» designa corderos, y el masculino explícito debe mantenerse porque el hebreo contrasta con la hembra que sigue. «Corderos machos» conserva ese contraste sin perder naturalidad en español.
- source_word: תְּמִימִים
  english_pob_choice: without blemish
  chosen_spanish: sin defecto
  alternatives_spanish:
  - sin mancha
  - sin defecto alguno
  - perfectos
  lexicon: HALOT
  rationale: En contexto sacrificial, el sentido es animal apto, no defectuoso. «Sin defecto» es claro y fiel; evita una formulación demasiado devocional como «perfectos».
- source_word: וְכַבְשָׂה אַחַת
  english_pob_choice: and one ewe lamb
  chosen_spanish: y una cordera
  alternatives_spanish:
  - y una oveja joven hembra
  - y una cordera
  lexicon: HALOT
  rationale: La forma femenina debe quedar visible en español. «Cordera» comunica bien la hembra joven del cordero; «una cordera» también sería posible, pero «cordera» suena más idiomático.
- source_word: בַּת שְׁנָתָהּ
  english_pob_choice: a year old
  chosen_spanish: de un año
  alternatives_spanish:
  - en su primer año
  - de un año de edad
  lexicon: HALOT
  rationale: La locución hebrea indica un animal en su primer año. «De un año» es la manera más natural y concisa de decirlo en español.
- source_word: תְּמִימָה
  english_pob_choice: without blemish
  chosen_spanish: sin defecto
  alternatives_spanish:
  - sin mancha
  - sin defecto alguno
  - perfecta
  lexicon: HALOT
  rationale: Se repite el mismo valor sacrificial, ahora concordando con el femenino. Mantener «sin defecto» conserva consistencia léxica y la especificación cultual.
- source_word: וּשְׁלֹשָׁה עֶשְׂרֹנִים
  english_pob_choice: and three-tenths of an ephah
  chosen_spanish: y tres décimas de efa
  alternatives_spanish:
  - y tres décimas de un efa
  - y tres tenths de efa
  lexicon: HALOT
  rationale: «עֶשְׂרֹנִים» corresponde a fracciones decimales de medida; la equivalencia tradicional «tres décimas de efa» reproduce la medida con precisión y en español bíblico inteligible.
- source_word: סֹלֶת
  english_pob_choice: fine flour
  chosen_spanish: flor de harina
  alternatives_spanish:
  - harina fina
  - harina selecta
  lexicon: HALOT
  rationale: La expresión española bíblica y precisa para סֹלֶת es «flor de harina». Conserva el matiz de harina de molienda fina usada en ofrendas.
- source_word: מִנְחָה
  english_pob_choice: as a grain offering
  chosen_spanish: como ofrenda vegetal
  alternatives_spanish:
  - como ofrenda de cereal
  - como oblación
  lexicon: HALOT
  rationale: Aunque el inglés optó por «grain offering», en español «ofrenda vegetal» es una opción establecida para מִנְחָה y evita la ambigüedad de «cereal» como alimento moderno. Se conserva el valor cultual sin suavizarlo a una ofrenda genérica.
- source_word: בְּלוּלָה בַשֶּׁמֶן
  english_pob_choice: mixed with oil
  chosen_spanish: mezclada con aceite
  alternatives_spanish:
  - amalgamada con aceite
  - mezclada en aceite
  lexicon: HALOT
  rationale: El participio pasivo describe la harina ya combinada con aceite. «Mezclada con aceite» es natural y fiel, sin forzar el hebreo.
- source_word: וְלֹג אֶחָד שָׁמֶן
  english_pob_choice: and one log of oil
  chosen_spanish: y un log de aceite
  alternatives_spanish:
  - y una medida de log de aceite
  - y un log de aceite de oliva
  lexicon: HALOT
  rationale: «Log» es una unidad de medida ritual específica; se mantiene transliterada como en el inglés POB para no perder la referencia técnica. No se añade «de oliva» porque el hebreo dice solo «aceite».
translation_notes:
  revision_awareness: La versión inglesa revisada cambió «for a grain offering» por «as a grain offering» para reflejar mejor la relación apposicional del hebreo. En español se siguió esa decisión con «como ofrenda vegetal», manteniendo la precisión sintáctica y cultual.
  spanish_consistency_notes:
  - Se mantuvo «sin defecto» en ambas ocurrencias de תְּמִימִים / תְּמִימָה para conservar uniformidad léxica.
  - Se conservó «log» como unidad técnica transliterada, con nota cultural explicativa.
  - Se eligió «ofrenda vegetal» para מִנְחָה por coherencia con la terminología POB en español y por su valor cultual específico.
  - La distinción de sexo del animal se hizo explícita con «corderos machos» y «cordera», como requiere el hebreo.
