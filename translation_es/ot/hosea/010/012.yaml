base_translation:
  language: en
  yaml_path: translation/ot/hosea/010/012.yaml
  text: Sow for yourselves for righteousness[a]; reap according to steadfast love. Break up for yourselves unplowed ground, for it is time to seek Yahweh[b], until he comes and rains righteousness on you.
  footnotes:
