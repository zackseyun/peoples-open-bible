  yaml_path: translation/nt/romans/004/008.yaml
  text: Blessed is the man against whom the Lord will never count sin[a][b].
  footnotes:
  - marker: a
    text: Or 'Blessed is the person'; 'man' here has a representative sense, not a male-exclusive one.
