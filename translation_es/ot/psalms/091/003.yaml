translation:
  language: es
  text: Porque él te librará del lazo[a] del cazador, de la peste mortal[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «trampa del cazador». El hebreo también puede entenderse como «lazo del cazador de aves».
    reason: lexical_alternative
  - marker: b
    text: O «peste destructora» o «plaga de destrucción».
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  - Porque, en efecto
  lexicon: HALOT
  rationale: כִּי aquí introduce la base o explicación de la promesa anterior; en español, «Porque» conserva esa fuerza conectiva de manera natural y bíblica sin sobretraducir.
- source_word: הוּא
  english_pob_choice: he
  chosen_spanish: él
  alternatives_spanish:
  - él mismo
  lexicon: HALOT
  rationale: El pronombre independiente hebreo añade énfasis al sujeto. En español, «él» comunica adecuadamente el énfasis en contexto; «él mismo» sería posible, pero más pesado de lo necesario.
- source_word: יַצִּילְךָ
  english_pob_choice: will deliver you
  chosen_spanish: te librará
  alternatives_spanish:
  - te salvará
  - te rescatará
  lexicon: HALOT
  rationale: El hifil de נצל expresa sacar o librar de un peligro. «Librará» mantiene el sentido de liberación/protección divina con buen registro bíblico en español, sin sonar mecánico.
- source_word: מִפַּח
  english_pob_choice: from the snare
  chosen_spanish: de la red
  alternatives_spanish:
  - de la trampa
  - de lazo
  - de la snare
  lexicon: HALOT
  rationale: פַּח designa una trampa o lazo para capturar; en español, «red» funciona como imagen natural y comprensible para un instrumento de captura, mientras que «trampa» o «lazo» también serían posibles. Se evita «snare» por no ser español.
- source_word: יָקוּשׁ
  english_pob_choice: of the fowler
  chosen_spanish: del cazador
  alternatives_spanish:
  - del que pone lazos
  - del trampero
  - del cazador de aves
  lexicon: HALOT
  rationale: El término apunta al que pone lazos o trampas. «Cazador» es una solución amplia y natural en español; la referencia concreta a aves queda implícita en la imagen de la red, sin forzar una frase extraña.
- source_word: מִדֶּבֶר
  english_pob_choice: from the pestilence
  chosen_spanish: de la peste
  alternatives_spanish:
  - de la pestilencia
  - de la plaga
  - de la enfermedad
  lexicon: HALOT
  rationale: דֶּבֶר suele referirse a pestilencia/plaga. «Peste» es el equivalente español más directo y solemne para una calamidad mortal colectiva; mantiene el tono elevado del poema.
- source_word: הַוּוֹת
  english_pob_choice: deadly
  chosen_spanish: mortal
  alternatives_spanish:
  - destructora
  - ruinosa
  - de destrucción
  lexicon: HALOT
  rationale: El plural abstracto comunica destrucción y ruina; en español, «mortal» integra de forma idiomática la idea de peligro letal con «peste», sin perder la fuerza del hebreo.
theological_decisions:
- issue: Naturaleza de los peligros descritos
  english_pob_reading: The verse speaks of real threats using imagery that may also carry broader symbolic force, without restricting it to either literal-only or metaphor-only meaning.
  chosen_spanish_reading: El verso presenta amenazas concretas —la captura y la peste— que también pueden funcionar como imágenes paradigmáticas de peligro; la traducción conserva ambas posibilidades sin resolverlas.
  alternative_spanish_readings:
  - Solo peligros físicos literales
  - Solo imágenes espirituales o metafóricas
  rationale: El hebreo nombra peligros concretos, pero en poesía su alcance puede ser también representativo. «Red del cazador» y «peste mortal» preservan la tensión entre lo literal y lo emblemático en lugar de cerrarla.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica en lugar de resolverla.'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión auditada del inglés POB que prefirió «snare» para פַּח; en español se optó por «red» como equivalente natural y claro, manteniendo la imagen de captura y la precisión poética del versículo. También se respetó el ajuste hacia un término tradicional y preciso para la segunda cola, con «peste mortal».
  spanish_consistency_notes:
  - Se usa «Yahvé» por defecto en el proyecto, pero este versículo no contiene el nombre divino.
  - Se mantiene un registro bíblico sobrio y contemporáneo, evitando calcos innecesarios.
  - «Librará» conserva la fuerza de rescate/protección sin añadir matices ajenos al hebreo.
  - La nota de la segunda cola preserva la alternativa lexical que el inglés POB documentó para el término de destrucción.
