review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido general del hebreo y sigue de cerca la auditoría inglesa: mantiene el sujeto indefinido de קָרְאוּ לָהֶם, expresa la correlación proporcional de כֵּן, conserva el apartamiento de הָלְכוּ מִפְּנֵיהֶם, y traduce correctamente el plural לַבְּעָלִים y la acción cultual de יְקַטֵּרוּן. La nota sobre el sujeto no especificado también preserva la decisión teológica del POB. Sin embargo, la nota [a] actual no reproduce bien la alternativa inglesa, porque «Cuando más les llamaban» no corresponde a «As they called them, so they went away from them» y suena poco natural en español.'
  spanish_quality_summary: 'La redacción principal es clara, natural y eclesialmente legible: «Cuanto más... más...» funciona bien, «se alejaban de ellos» es idiomático, y «seguían sacrificando... y quemando incienso...» suena fluido. Solo requiere ajuste menor en la nota [a] para mayor fidelidad y naturalidad. El resto del español es sólido.'
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Baales» preserva el plural hebreo; «ídolos» con nota alternativa «imágenes talladas» concuerda con el razonamiento léxico auditado. No aparecen términos sensibles como Yahvé/Mesías/esclavo en este versículo.
  issues:
  - severity: medium
    issue: La nota [a] no refleja fielmente la alternativa inglesa/auditada.
    rationale: La auditoría inglesa ofrece «As they called them, so they went away from them», pero el español dice «Cuando más les llamaban, más se alejaban de ellos», que repite casi el texto principal en vez de ofrecer la alternativa correlativa «Así como... así...» o equivalente.
  - severity: low
    issue: Comillas y formulación de la nota [a] podrían pulirse para estilo editorial.
    rationale: La glosa actual es comprensible, pero una formulación más directa y natural en español mejoraría la claridad sin cambiar el sentido.
  revised_spanish_text: Cuanto más les llamaban[a], más se alejaban de ellos; seguían sacrificando a los baales y quemando incienso a los ídolos[b].
  revised_footnotes:
  - marker: a
    text: 'O: «Así como los llamaban, así ellos se alejaban de ellos». El hebreo deja sin especificar el sujeto de «llamaban».'
    reason: alternative_reading
  - marker: b
    text: 'O: «a imágenes talladas».'
    reason: lexical_alternative
  revision_rationale: Se mantiene intacto el texto principal porque es fiel y natural. Solo se corrige la nota [a] para que preserve la alternativa auditada en inglés y exprese con más precisión la correlación del hebreo sin perder la ambigüedad del sujeto.
