lexical_decisions:
- source_word: גְּמַלֵּיהֶם
  english_pob_choice: their camels
  chosen_spanish: sus camellos
  alternatives_spanish:
  - los camellos de ellos
  - los camellos que tenían
  lexicon: HALOT
  rationale: El plural con sufijo posesivo indica posesión directa. «Camellos» es el equivalente léxico normal; «sus camellos» comunica la relación posesiva con la misma concisión que el inglés POB.
- source_word: אַרְבַּע מֵאוֹת שְׁלֹשִׁים וַחֲמִשָּׁה
  english_pob_choice: '435'
  chosen_spanish: '435'
  alternatives_spanish:
  - cuatrocientos treinta y cinco
  lexicon: HALOT
  rationale: La cifra total es 435. En un listado censal, los dígitos conservan claridad y exactitud, como en el inglés POB.
- source_word: חֲמֹרִים
  english_pob_choice: donkeys
  chosen_spanish: asnos
  alternatives_spanish:
  - burros
  - burras
  lexicon: HALOT
  rationale: «חמור» puede traducirse como «asno» o «burro»; aquí se prefiere «asnos» por su precisión léxica y por mantener el registro bíblico sin perder inteligibilidad.
- source_word: שֵׁשֶׁת אֲלָפִים שְׁבַע מֵאוֹת וְעֶשְׂרִים
  english_pob_choice: 6,720
  chosen_spanish: 6,720
  alternatives_spanish:
  - seis mil setecientos veinte
  lexicon: HALOT
  rationale: La frase numérica suma 6,720. Los dígitos mantienen el formato de inventario y evitan ambigüedad en una lista de cantidades.
translation_notes:
  revision_awareness: El texto base en inglés no fue modificado en revisiones; se mantiene el mismo sentido y la misma decisión de representar los números en dígitos para un registro censal.
  spanish_consistency_notes:
  - Se conserva el posesivo de tercera persona plural con «sus» para reflejar el sufijo hebreo.
  - Se mantiene el estilo enumerativo con números en dígitos, coherente con listas censales.
  - «Asnos» preserva el valor léxico de חמור sin introducir un término más coloquial que altere el registro.
