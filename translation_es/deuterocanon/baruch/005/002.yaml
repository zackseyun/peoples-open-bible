translation:
  language: es
  text: Vístete del manto[a] de la rectitud[b] que viene de Dios, y pon sobre tu cabeza el turbante[c] de la gloria del Eterno[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «capa» o «túnica»; el término griego se refiere a una prenda exterior amplia o envolvente.
    reason: lexical_alternative
  - marker: b
    text: También puede traducirse «justicia que viene de Dios»; el término griego puede abarcar rectitud o justicia según el contexto.
    reason: lexical_alternative
  - marker: c
    text: «Turbante» expresa el sentido del término griego; también podría decirse «tocado» o la forma tradicional «mitra».
    reason: lexical_alternative
  - marker: d
    text: La frase también puede entenderse más libremente como «la gloria eterna», pero el griego probablemente apunta a «la gloria del Eterno», es decir, la gloria de Dios.
    reason: alternative_reading
lexical_decisions:
- source_word: περιβαλοῦ
  english_pob_choice: Put on
  chosen_spanish: Vístete de
  alternatives_spanish:
  - Ponte
  - Cúbrete con
  - Envuélvete en
  lexicon: LSJ
  rationale: El imperativo pide una acción de ponerse una prenda. «Vístete de» conserva la metáfora de vestidura y suena natural en español sin perder el tono exhortativo.
- source_word: διπλοΐδα
  english_pob_choice: robe
  chosen_spanish: túnica
  alternatives_spanish:
  - manto
  - capa
  - ropa exterior
  lexicon: LSJ
  rationale: El término griego nombra una prenda exterior amplia. En español, «túnica» comunica una vestidura digna y fluida; se evita «manto» o «capa» por menor adecuación al conjunto de la imagen vestida.
- source_word: τῆς παρὰ τοῦ θεοῦ δικαιοσύνης
  english_pob_choice: of the righteousness that comes from God
  chosen_spanish: de la justicia que viene de Dios
  alternatives_spanish:
  - de la rectitud que viene de Dios
  - de la justicia de parte de Dios
  - de la justicia procedente de Dios
  lexicon: BDAG
  rationale: Se mantiene δικαιοσύνη como «justicia», porque el contexto poético y la posibilidad semántica lo permiten en español sin forzar el texto. «Que viene de Dios» expresa bien παρὰ τοῦ θεοῦ como origen/procedencia.
- source_word: ἐπίθου
  english_pob_choice: place
  chosen_spanish: pon
  alternatives_spanish:
  - coloca
  - ponte
  - coloca sobre
  lexicon: LSJ
  rationale: El imperativo simple «pon» reproduce la acción de colocar sobre la cabeza y mantiene la fluidez del paralelo con la primera cláusula.
- source_word: μίτραν
  english_pob_choice: turban
  chosen_spanish: turbante
  alternatives_spanish:
  - mitra
  - headdress
  - tocado
  lexicon: LSJ
  rationale: «Turbante» es el equivalente más claro y transparente en español para la prenda de cabeza; «mitra» podría sonar eclesiástica y desviar el sentido.
- source_word: τῆς δόξης τοῦ αἰωνίου
  english_pob_choice: of the glory of the Eternal
  chosen_spanish: de la gloria del Eterno
  alternatives_spanish:
  - de la gloria del eterno
  - de la gloria del Dios eterno
  - de la gloria eterna
  lexicon: LSJ
  rationale: 'Se conserva la lectura sustantiva de αἰώνιος como título divino: «el Eterno». Esto evita reducir la frase a un mero adjetivo y mantiene la posible referencia a Dios.'
theological_decisions:
- issue: Renderización de δικαιοσύνη
  english_pob_reading: righteousness
  chosen_spanish_reading: justicia
  alternative_spanish_readings:
  - rectitud
  - justicia que salva
  rationale: Aunque «justicia» puede abarcar mejor el campo semántico bíblico y jurídico de δικαιοσύνη, en este contexto la imagen de una vestidura de justicia es natural y fiel. Se evita imponer una paráfrasis doctrinal.
  doctrine_reference: 'DOCTRINE.md Contested terms: δικαιοσύνη'
- issue: Entender τοῦ αἰωνίου como título sustantivo
  english_pob_reading: the Eternal
  chosen_spanish_reading: el Eterno
  alternative_spanish_readings:
  - el eterno
  - el ser eterno
  - la eternidad
  rationale: 'La construcción admite una lectura substantiva: «del Eterno». Se preserva así la probable referencia divina que la auditoría inglesa también señala.'
  doctrine_reference: DOCTRINE.md §1, §3
translation_notes:
  revision_awareness: 'El borrador sigue de cerca la decisión final del texto inglés auditado, sin cambios en el sentido principal. Se mantuvieron las opciones léxicas y teológicas clave: prenda exterior, δικαιοσύνη como justicia/righteousness, y αἰώνιος como título sustantivo divino.'
  spanish_consistency_notes:
  - Se conserva un registro poético y ceremonial adecuado al contexto de Baruc.
  - No se introdujo «Cristo» ni «SEÑOR» porque el texto no lo requiere.
  - La imagen de vestidura y tocado se mantiene con verbos breves y naturales en español.
  - Se prefirió «del Eterno» con mayúscula para reflejar el valor sustantivo y divino de αἰώνιος.
