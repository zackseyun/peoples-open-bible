lexical_decisions:
- source_word: εὐλογία
  english_pob_choice: blessing
  chosen_spanish: bendición
  alternatives_spanish:
  - bendición concedida
  - favor
  lexicon: BDAG
  rationale: El sustantivo expresa aquí una bendición de manera directa; «bendición» es el equivalente natural y transparente en español, sin añadir matices no requeridos por el griego.
- source_word: Κυρίου
  english_pob_choice: the Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  lexicon: BDAG
  rationale: Según la terminología del proyecto, κύριος que remite al nombre divino se vierte como «Yahvé» en el texto principal, no como una máscara reverencial. Conserva el vínculo con el nombre divino subyacente.
- source_word: μετʼ αὐτοῦ
  english_pob_choice: with him
  chosen_spanish: está con él
  alternatives_spanish:
  - con él
  - acompaña a él
  lexicon: BDAG
  rationale: La construcción con μετά + genitivo expresa compañía/presencia. En español, «está con él» reproduce con naturalidad esa relación y mantiene el sentido relacional sin sobreinterpretar.
- source_word: ἐν ἰσχύϊ
  english_pob_choice: in strength
  chosen_spanish: en fuerza
  alternatives_spanish:
  - en poder
  - en vigor
  - en poderío
  lexicon: BDAG
  rationale: ἰσχύς denota fuerza o poder. «En fuerza» sigue de cerca la forma griega y resulta idiomático en español; «en poder» o «en vigor» serían alternativas posibles, pero introducirían un matiz algo distinto.
- source_word: '[implied copula]'
  english_pob_choice: is
  chosen_spanish: está
  alternatives_spanish:
  - es
  lexicon: grammar
  rationale: El griego omite el verbo copulativo. En español se requiere un verbo explícito; aquí «está» refleja mejor la idea de presencia o acompañamiento de la bendición que una simple atribución estática.
theological_decisions:
- issue: Tratamiento del nombre divino en Κυρίου
  english_pob_reading: the Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  rationale: El paquete doctrinal del proyecto pide traducir el nombre divino como «Yahvé». Dado que el texto griego usa Κυρίου en un contexto que remite al nombre divino, se mantiene esa decisión en el texto principal.
  doctrine_reference: Project terminology default for יהוה / YHWH
- issue: Valor semántico de ἐν ἰσχύϊ
  english_pob_reading: in strength
  chosen_spanish_reading: en fuerza
  alternative_spanish_readings:
  - en poder
  - con poder
  rationale: No hay necesidad de cargar el término con un sentido teológico adicional. «En fuerza» conserva la tensión lexical entre fuerza, vigor y poder sin fijar una sola lectura más allá de lo que el griego exige.
  doctrine_reference: Lexical-theological consistency for ἰσχύς
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés están en alto acuerdo y no muestran revisiones aplicadas; por ello, la redacción española sigue de cerca la lectura establecida, con una sola nota léxica para ἐν ἰσχύϊ.
  spanish_consistency_notes:
  - Se conserva «bendición» para εὐλογία por ser el equivalente más claro y natural.
  - Se usa «Yahvé» conforme al estándar del proyecto para el nombre divino.
  - «En fuerza» mantiene la cercanía formal al griego sin sonar forzado en español.
  - La nota [a] queda anclada en «fuerza» para reflejar las alternativas léxicas del audit trail.
