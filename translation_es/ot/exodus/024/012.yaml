  rationale: Se reubica la nota léxica al término pertinente («la ley»), se ajusta «para instruirlos» a «para su instrucción» para seguir de cerca la decisión semántica documentada, y se mejora la naturalidad de «Sube a mí al monte» con «Sube hacia mí al monte» sin alterar el sentido del hebreo.
