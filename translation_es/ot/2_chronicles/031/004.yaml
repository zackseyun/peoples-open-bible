translation:
  language: es
  text: También mandó al pueblo, a los habitantes de Jerusalén, que dieran la porción debida a los sacerdotes y a los levitas, para que se dedicaran[a] a la ley de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «se fortalecieran en la ley de Yahvé», o «se mantuvieran firmes en la ley de Yahvé», o «se aferraran a la ley de Yahvé».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: He also commanded
  chosen_spanish: mandó
  alternatives_spanish:
  - dijo
  - ordenó
  lexicon: HALOT
  rationale: En este contexto de reforma real y con un infinitivo de mandato después, mandó comunica de forma natural la fuerza directiva del verbo sin debilitarla con un simple dijo.
- source_word: לָעָם
  english_pob_choice: the people
  chosen_spanish: al pueblo
  alternatives_spanish:
  - al pueblo
  - a la gente
  lexicon: HALOT
  rationale: עם designa aquí al colectivo sometido a la autoridad real; al pueblo es la forma más sobria y fiel en español.
- source_word: לְיוֹשְׁבֵי יְרוּשָׁלִַם
  english_pob_choice: the inhabitants of Jerusalem
  chosen_spanish: a los habitantes de Jerusalén
  alternatives_spanish:
  - a los moradores de Jerusalén
  - a los residentes de Jerusalén
  lexicon: HALOT
  rationale: El participio indica literalmente a los que habitan en Jerusalén. Habitantes conserva la referencia concreta y el registro formal.
- source_word: לָתֵת
  english_pob_choice: to give
  chosen_spanish: que dieran
  alternatives_spanish:
  - que entregaran
  - que proveyeran
  lexicon: HALOT
  rationale: El infinitivo expresa la acción ordenada; en español, la subordinada final con dieran resulta natural y mantiene la relación de mandato.
- source_word: מְנָת
  english_pob_choice: the portion due to
  chosen_spanish: la porción debida
  alternatives_spanish:
  - la porción
  - la parte asignada
  - la cuota debida
  lexicon: HALOT
  rationale: מְנָה indica una porción asignada o correspondiente. Debida expresa la idea de lo que les corresponde por asignación, sin sobreparafrasear.
- source_word: הַכֹּהֲנִים וְהַלְוִיִּם
  english_pob_choice: the priests and the Levites
  chosen_spanish: a los sacerdotes y a los levitas
  alternatives_spanish:
  - a los sacerdotes y a los levitas
  - a los sacerdotes y levitas
  lexicon: HALOT
  rationale: Se conservan ambos grupos ministeriales. Sacerdotes es el equivalente estándar de כֹּהֲנִים en español bíblico claro, y levitas mantiene la distinción.
- source_word: לְמַעַן
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - para
  lexicon: HALOT
  rationale: La conjunción introduce finalidad; para que es el equivalente más natural y preciso en español.
- source_word: יֶחֶזְקוּ
  english_pob_choice: they might devote themselves to / they might hold firmly to
  chosen_spanish: se fortalecieran
  alternatives_spanish:
  - se mantuvieran firmes
  - se aferraran
  lexicon: HALOT
  rationale: El verbo חזק tiene aquí el sentido de fortalecerse o quedar firmes en relación con la obligación cultual. Se fortalecieran conserva la tensión entre fortaleza y firmeza sin imponer una sola paráfrasis.
- source_word: בְּתוֹרַת יְהוָה
  english_pob_choice: the law of Yahweh
  chosen_spanish: en la ley de Yahvé
  alternatives_spanish:
  - en la ley de Yahvé
  - en la instrucción de Yahvé
  lexicon: HALOT
  rationale: תּוֹרָה puede significar ley o instrucción. Ley es la opción más estable y reconocible en este contexto de fidelidad covenantal; Yahvé reproduce el nombre divino según el estándar del proyecto.
theological_decisions:
- issue: Rendering of יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - Jehová
  rationale: Se conserva el nombre propio divino y no se lo sustituye por un título. Yahvé es la forma española estable para el Tetragrámaton en este proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sense of חזקו בתורת יהוה
  english_pob_reading: they might devote themselves to the law of Yahweh / hold firmly to the law of Yahweh
  chosen_spanish_reading: se fortalecieran en la ley de Yahvé
  alternative_spanish_readings:
  - se fortalecieran en la ley de Yahvé
  - se mantuvieran firmes en la ley de Yahvé
  - se entregaran a la ley de Yahvé
  rationale: El contexto habla del sostén material para que sacerdotes y levitas puedan cumplir sus funciones. Se fortalecieran preserva el valor semántico de חזק sin borrar su ambigüedad funcional.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, preserve tension where genuine ambiguity exists
translation_notes:
  revision_awareness: La revisión inglesa más reciente elevó 'commanded' frente a 'told'; por eso el español usa mandó para reflejar mejor la fuerza directiva del verbo. También se preserva la ambigüedad de חזק sin traducirla de manera excesivamente interpretativa.
  spanish_consistency_notes:
  - Se mantiene Yahvé para יְהוָה, conforme al estándar del proyecto.
  - Se emplea ley para תּוֹרָה en este contexto cultual y normativo.
  - Se eligió sacerdotes como equivalente natural de הכהנים y se conservó la distinción con levitas.
  - La nota textual está anclada en el término ley de Yahvé mediante [a], evitando notas sueltas.
