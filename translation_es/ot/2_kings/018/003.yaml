revisions:
- from: Él hizo lo recto[a] ante los ojos de Yahvé, conforme a todo lo que había hecho David su padre.
  to: Él hizo lo recto a los ojos de Yahvé, conforme a todo lo que había hecho David su padre[a].
  rationale: Se reubica la nota al término que realmente explica ('padre') y se ajusta levemente el modismo a una forma más natural en español sin cambiar el sentido. No se requiere adjudicación adicional.
  reviewer_model: gpt-5.4
