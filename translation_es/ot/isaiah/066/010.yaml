translation:
  language: es
  text: Alégrense con Jerusalén y alégrense en ella[a], todos los que la aman; regocíjense con ella con gozo[b], todos los que hacen duelo por ella.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «alégrense por Jerusalén». La construcción hebrea con אֶת después de «regocijarse» puede entenderse como si Jerusalén fuera el objeto de la alegría, aunque los paralelos «en ella» y «con ella» favorecen el sentido de alegría compartida.
    reason: lexical_alternative
  - marker: b
    text: O «regocíjense con ella grandemente» / «exulten con ella en gozo». El hebreo usa un sustantivo cognado después del verbo para dar énfasis.
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׂמְחוּ
  english_pob_choice: Rejoice
  chosen_spanish: Alégrense
  alternatives_spanish:
  - Regocíjense
  - Alegraos
  lexicon: HALOT
  rationale: El imperativo plural exige una exhortación directa y natural en español; «alégrense» conserva el valor exhortativo de rejoicing sin sonar arcaico.
- source_word: אֶת יְרוּשָׁלַםִ
  english_pob_choice: with Jerusalem
  chosen_spanish: con Jerusalén
  alternatives_spanish:
  - sobre Jerusalén
  - por Jerusalén
  lexicon: HALOT
  rationale: Sigo la lectura auditada del POB que entiende la construcción como participación en la alegría de Jerusalén, no solo como objeto gramatical. «Con Jerusalén» refleja mejor esa alegría compartida.
- source_word: וְגִילוּ
  english_pob_choice: be glad
  chosen_spanish: gócense
  alternatives_spanish:
  - alégrense
  - regocíjense
  lexicon: HALOT
  rationale: גיל añade un matiz de júbilo/exultación distinto de שׂמח; «gócense» mantiene una segunda exhortación de alegría sin repetir exactamente el primer verbo.
- source_word: בָהּ
  english_pob_choice: in her
  chosen_spanish: en ella
  alternatives_spanish:
  - sobre ella
  - con ella
  lexicon: HALOT
  rationale: La preposición ב se conserva de manera directa como «en», preservando la imagen de cercanía y la personificación de Jerusalén.
- source_word: כָּל אֹהֲבֶיהָ
  english_pob_choice: all you who love her
  chosen_spanish: todos los que la aman
  alternatives_spanish:
  - todos sus amantes
  - todos los que la quieren
  lexicon: HALOT
  rationale: El participio se vierte como relativa directa. «La aman» es idiomático y conserva el tono de apelación a los que tienen afecto por Jerusalén.
- source_word: שִׂישׂוּ
  english_pob_choice: rejoice / exult
  chosen_spanish: exulten
  alternatives_spanish:
  - alégrense
  - regocíjense
  lexicon: HALOT
  rationale: שׂישׂוּ refuerza la alegría con un verbo más intenso o vívido; «exulten» conserva esa intensificación y distingue este mandato del anterior.
- source_word: אִתָּהּ
  english_pob_choice: with her
  chosen_spanish: con ella
  alternatives_spanish:
  - junto con ella
  - junto a ella
  lexicon: HALOT
  rationale: La preposición de compañía se expresa naturalmente en español con «con ella», manteniendo la idea de alegría compartida.
- source_word: מָשׂוֹשׂ
  english_pob_choice: in joy
  chosen_spanish: en gozo
  alternatives_spanish:
  - con alegría
  - en júbilo
  lexicon: HALOT
  rationale: El sustantivo cognado enfatiza el júbilo; «en gozo» conserva la repetición enfática del hebreo sin convertirla en mera adverbialidad genérica.
- source_word: כָּל הַמִּתְאַבְּלִים
  english_pob_choice: all you who mourn
  chosen_spanish: todos los que hacen duelo
  alternatives_spanish:
  - todos los que lloran
  - todos los que se lamentan
  lexicon: HALOT
  rationale: El hitpael de אבל expresa duelo/luto formal. «Hacen duelo» reproduce mejor ese campo semántico que un simple «lloran».
- source_word: עָלֶיהָ
  english_pob_choice: over her
  chosen_spanish: por ella
  alternatives_spanish:
  - sobre ella
  - a causa de ella
  lexicon: HALOT
  rationale: En el contexto de duelo, עַל puede señalar el motivo u objeto del lamento. «Por ella» es natural en español y preserva la referencia a Jerusalén como causa del duelo.
theological_decisions:
- issue: Personificación de Jerusalén como objeto de alegría y duelo compartidos
  english_pob_reading: The verse invites shared joy with Jerusalem and mourning over her, preserving the personified-city imagery.
  chosen_spanish_reading: El versículo invita a compartir la alegría con Jerusalén y a hacer duelo por ella, manteniendo la imagen de la ciudad personificada.
  alternative_spanish_readings:
  - alégrense por Jerusalén
  - gócense en su presencia
  rationale: La sintaxis española elegida conserva la personificación sin reducirla a una referencia abstracta; esto sigue la lectura auditada del POB y la paralelidad hebrea.
  doctrine_reference: Isaías 66:10; personificación poética del pueblo/ciudad de Dios
- issue: Intensificación poética entre los verbos de alegría y el sustantivo cognado
  english_pob_reading: The Hebrew uses a cognate noun after the verb for emphasis.
  chosen_spanish_reading: «exulten en gozo» conserva la repetición enfática del hebreo.
  alternative_spanish_readings:
  - alégrense con gran alegría
  - regocíjense mucho
  rationale: Mantengo la tensión léxica entre verbo y sustantivo, evitando normalizarla a una sola idea de alegría y respetando el recurso poético del original.
  doctrine_reference: Poética hebrea; Isaías 66:10
translation_notes:
  revision_awareness: 'La versión inglesa auditada pasó de una formulación más literal («exult with her in exultation») a otra más natural («rejoice with her in joy»), manteniendo la repetición enfática del hebreo. La redacción española refleja esa decisión con una solución natural pero aún intensificadora: «exulten con ella en gozo».'
  spanish_consistency_notes:
  - Se mantiene «Jerusalén» como nombre propio sin artículo.
  - Se conservan dos verbos distintos de alegría para reproducir la progresión del hebreo.
  - «Hacen duelo» se usa de forma consistente para el hitpael de אבל en tono formal.
  - Las notas a y b siguen las alternativas auditadas del POB sin añadir interpretaciones ajenas al texto.
