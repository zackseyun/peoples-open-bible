translation:
  language: ko
  text: 그리하여 젊은 여자들[b]을 잘 권하여[a] 남편을 사랑하고 자녀를 사랑하며[c],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「격려하여」, 「분별 있게 행하도록 가르쳐」. 헬라어 동사는 신중한 처신으로 훈련·권면하는 어감을 지닌다.
    reason: lexical_alternative
  - marker: b
    text: 또는 「젊은 [여자]들」. 헬라어는 문자적으로 「더 어린 [여자]들」로, 앞 문맥의 나이 많은 여자들과 대조된다.
    reason: lexical_alternative
  - marker: c
    text: 직역하면 「남편을 사랑하는 자, 자녀를 사랑하는 자」.
    reason: lexical_alternative
lexical_decisions:
- source_word: σωφρονίζωσι
  english_pob_choice: train
  chosen_korean: 잘 권하여
  alternatives_korean:
  - 신중하도록 훈련하여
  - 분별 있게 행하도록 권하여
  - 격려하여
  lexicon: BDAG
  rationale: σωφρονίζω는 σώφρων(신중함)의 사역동사로, 「신중한 분별을 갖도록 가르치다·권하다」. 단순 「가르치다」보다 권면적 어감이 강하다. 「잘 권하여」가 자연스럽고 그 권면적 무게를 담는다.
- source_word: τὰς νέας
  english_pob_choice: the younger women
  chosen_korean: 젊은 여자들
  alternatives_korean:
  - 어린 여자들
  - 더 젊은 여자들
  lexicon: BDAG
  rationale: νέα의 비교급 형태이나 한국어에서 「젊은」이 일반적이며 앞의 「나이 많은 여자들」과 자연스럽게 대조된다.
- source_word: φιλάνδρους
  english_pob_choice: loving toward their husbands
  chosen_korean: 남편을 사랑하고
  alternatives_korean:
  - 남편을 사랑하는 자가 되며
  lexicon: BDAG
  rationale: φιλο- + ἀνήρ(남편). 「남편을 사랑하다」가 직역에 가깝다.
- source_word: φιλοτέκνους
  english_pob_choice: loving toward their children
  chosen_korean: 자녀를 사랑하며
  alternatives_korean:
  - 자녀를 사랑하는 자가 되며
  lexicon: BDAG
  rationale: φιλο- + τέκνον(자녀). 직역 「자녀를 사랑하다」.
