translation:
  language: es
  text: 'Y ahora, Yahvé, Dios de Israel, guarda para tu siervo David, mi padre, lo que le hablaste, diciendo: «No te faltará un hombre delante de mí[a] que se siente sobre el trono de Israel, con tal de que tus hijos guarden su camino, para andar delante de mí como tú has andado delante de mí».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit. «No será cortado para ti un hombre de delante de mí que se siente sobre el trono de Israel».
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino del Tetragrámaton como nombre propio, siguiendo el principio del POB de no sustituirlo por un título enmascarado. 'Yahvé' es la forma establecida en español para transliterar el nombre personal de Dios.
- source_word: שְׁמֹר
  english_pob_choice: keep
  chosen_spanish: guarda
  alternatives_spanish:
  - cumple
  - conserva
  - observa
  lexicon: HALOT
  rationale: En lenguaje de petición y promesa, שׁמר puede expresar 'guardar' en el sentido de atender y hacer valer lo dicho. 'Guarda' mantiene la fuerza verbal y resulta natural en español bíblico contemporáneo.
- source_word: לְעַבְדְּךָ
  english_pob_choice: for your servant
  chosen_spanish: para tu siervo
  alternatives_spanish:
  - para tu esclavo
  - para tu servidor
  lexicon: HALOT
  rationale: En este contexto de oración real dirigida a Dios, 'siervo' comunica la relación de dependencia y servicio sin imponer la dureza de 'esclavo'. 'Servidor' es posible, pero 'siervo' es más tradicional y preciso aquí.
- source_word: דָוִד אָבִי
  english_pob_choice: David my father
  chosen_spanish: David, mi padre
  alternatives_spanish:
  - mi padre David
  - David mi padre
  lexicon: HALOT
  rationale: Se mantiene el orden hebreo de manera natural en español con una coma. 'Mi padre' se conserva sin reordenar innecesariamente la expresión.
- source_word: אֵת אֲשֶׁר דִּבַּרְתָּ לּוֹ
  english_pob_choice: what you spoke to him
  chosen_spanish: lo que le hablaste
  alternatives_spanish:
  - lo que le dijiste
  - lo que le prometiste
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'lo que hablaste a él'. 'Le hablaste' preserva ese dato sin forzar el verbo 'prometer', aunque el contenido sea una promesa. Se evita añadir interpretación que no está explícita en la forma verbal.
- source_word: לֹא יִכָּרֵת לְךָ אִישׁ
  english_pob_choice: You shall not lack a man before me
  chosen_spanish: No será cortado para ti un hombre de delante de mí
  alternatives_spanish:
  - No te faltará un hombre delante de mí
  - No será quitado de delante de mí un hombre para ti
  lexicon: HALOT
  rationale: Se conserva el núcleo literal de נכרת ('ser cortado') para no perder la imagen verbal y su tensión auditables. Aunque en español suena menos idiomático, se mantiene la forma más cercana al hebreo, y la nota explica el sentido dinástico.
- source_word: מִלְּפָנַי
  english_pob_choice: from before me
  chosen_spanish: de delante de mí
  alternatives_spanish:
  - de mi presencia
  - delante de mí
  lexicon: HALOT
  rationale: '''De delante de mí'' refleja tanto la preposición מִן como el modismo espacial/relacional. Es una solución española natural y transparente.'
- source_word: יֹשֵׁב עַל כִּסֵּא יִשְׂרָאֵל
  english_pob_choice: one sitting on the throne of Israel
  chosen_spanish: un hombre que se siente sobre el trono de Israel
  alternatives_spanish:
  - uno sentado sobre el trono de Israel
  - un heredero sentado sobre el trono de Israel
  lexicon: HALOT
  rationale: El participio יֹשֵׁב se vierte de modo funcional con una relativa para que el español fluya. Se mantiene la referencia al trono de Israel y la idea de continuidad dinástica.
- source_word: רַק אִם
  english_pob_choice: if only
  chosen_spanish: con tal de que
  alternatives_spanish:
  - solo si
  - si únicamente
  lexicon: HALOT
  rationale: La construcción introduce una condición fuerte. 'Con tal de que' expresa bien la dependencia condicional sin sonar forzado, y conserva la tensión entre promesa y requisito.
- source_word: יִשְׁמְרוּ בָנֶיךָ אֶת דַּרְכָּם
  english_pob_choice: your sons keep their way
  chosen_spanish: tus hijos guarden su camino
  alternatives_spanish:
  - tus hijos cuiden su camino
  - tus hijos observen su camino
  lexicon: HALOT
  rationale: '''Guardar su camino'' reproduce el modismo hebreo de vigilar la conducta o la manera de vivir. ''Hijos'' es el término natural para בָנֶיךָ en este contexto.'
- source_word: לָלֶכֶת לְפָנַי
  english_pob_choice: to walk before me
  chosen_spanish: para andar delante de mí
  alternatives_spanish:
  - para caminar delante de mí
  - para vivir delante de mí
  lexicon: HALOT
  rationale: '''Andar delante de mí'' es la forma española más estable para conservar el valor relacional y ético de la expresión. Se evita sustituirlo por una paráfrasis más abstracta.'
- source_word: כַּאֲשֶׁר הָלַכְתָּ לְפָנָי
  english_pob_choice: as you have walked before me
  chosen_spanish: como tú has andado delante de mí
  alternatives_spanish:
  - tal como tú has andado delante de mí
  - como has caminado delante de mí
  lexicon: HALOT
  rationale: El perfecto hebreo se expresa con 'has andado' para reflejar la acción pasada con relevancia presente. Se conserva la repetición de 'delante de mí' para mantener el paralelismo.
theological_decisions:
- issue: Condicionalidad de la promesa davídica
  english_pob_reading: The verse presents the promise of dynastic continuity with an explicit condition on David's sons' conduct.
  chosen_spanish_reading: El versículo presenta la continuidad dinástica con una condición explícita sobre la conducta de los hijos de David.
  alternative_spanish_readings:
  - La promesa es incondicional y la condición solo afecta su disfrute histórico
  - La condición no pertenece a la promesa sino a su aplicación
  rationale: El hebreo introduce claramente רַק אִם ('con tal de que/solo si') seguido de la obediencia de los hijos. La traducción debe conservar esa tensión sin resolverla por armonización doctrinal con otros textos.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla de forma sistemática.
translation_notes:
  revision_awareness: La versión española sigue la revisión más reciente del POB en el punto clave de la promesa dinástica, pero opta por una solución más literal en el núcleo verbal («no será cortado») para mantener auditable la imagen hebrea, mientras suaviza la sintaxis con una relativa («un hombre que se siente») y conserva la condicionalidad explícita del texto.
  spanish_consistency_notes:
  - Se usa Yahvé para יְהוָה, conforme al estándar del proyecto.
  - Se mantiene siervo para עבד en un contexto de oración reverente.
  - Se conserva andar delante de mí para la expresión relacional/ética del hebreo.
  - No se introduce 'Mesías' ni otros términos no presentes en el versículo.
  - La nota a explica la alternativa idiomática del tramo dinámico de la promesa; la nota b aclara la expresión espacial 'de delante de mí'.
