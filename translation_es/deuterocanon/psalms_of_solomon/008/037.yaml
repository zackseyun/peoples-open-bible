review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja correctamente la sintaxis principal del griego: σὺ + ὁ θεὸς ἡμῶν como predicación (''tú eres nuestro Dios''), ἀπʼ ἀρχῆς como referencia temporal (''desde el principio''), y la segunda cláusula como afirmación de esperanza dirigida a Dios. También conserva de forma adecuada la doble apelación θεὸς ... Κύριε. Sin embargo, la formulación de la segunda cláusula puede alinearse mejor con el inglés POB auditado y con el orden informativo natural del español.'
  spanish_quality_summary: El español es claro y digno, pero 'en ti está nuestra esperanza' suena algo invertido/literario frente a la opción más natural y directa 'nuestra esperanza está en ti', que además corresponde mejor al ajuste final del inglés POB. También conviene omitir 'oh' en español bíblico moderno neutral, donde 'Señor' en vocativo basta y suena más natural.
  glossary_alignment: 'No hay conflicto con la terminología base: θεὸς → ''Dios'' y κύριος → ''Señor'' están bien aplicados. No corresponde usar ''Yahvé'' aquí, porque la fuente inmediata es κύριε y el proyecto para κύριος indica ''Lord/Señor''.'
  issues:
  - severity: medium
    issue: Orden poco natural en la cláusula de esperanza
    rationale: Aunque 'en ti está nuestra esperanza' es comprensible y fiel, 'nuestra esperanza está en ti' es más idiomático en español contemporáneo y refleja mejor la revisión final del inglés POB ('our hope is in you').
  - severity: low
    issue: Uso de 'oh' en el vocativo
    rationale: '''Oh Señor'' no es incorrecto, pero en español eclesial neutro moderno suele sonar más natural simplemente ''Señor''. El vocativo ya queda claro por la coma y el contexto de oración.'
  revised_spanish_text: Y tú eres nuestro Dios desde el principio, y nuestra esperanza está en ti, Señor.
  revision_rationale: Se ajusta la segunda cláusula a un español más natural y plenamente alineado con la revisión auditada del inglés POB, y se simplifica el vocativo final para mayor naturalidad sin pérdida de sentido ni de solemnidad.
