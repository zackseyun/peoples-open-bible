  rationale: Se corrige el verbo de petición divina para reflejar mejor הַגֶּד נָא («díselo»/«haz saber») y se restaura la nota necesaria sobre «su mano» para preservar la metáfora hebrea con claridad en español. El resto del verso puede mantenerse, incluida la repetición de «descenderá» por consistencia con el hebreo y la auditoría inglesa.
