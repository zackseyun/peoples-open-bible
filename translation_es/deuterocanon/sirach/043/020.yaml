    rationale: Aunque comprensible en algunas regiones, no es la opción más panhispánica para un texto bíblico de alcance amplio. 'Estanque' comunica mejor un cuerpo de agua reunida.
  - severity: low
    issue: '''Se viste como de coraza'' suena algo poco natural.'
    rationale: La metáfora de vestirse con armadura se puede expresar con mayor naturalidad en español sin perder literalidad.
