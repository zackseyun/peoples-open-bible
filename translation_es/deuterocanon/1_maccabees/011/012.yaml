translation:
  language: es
  text: Y, después de quitarle a su hija, se la dio a Demetrio; y el semblante de Alejandro cambió[a], y su enemistad se hizo evidente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «el rostro de Alejandro fue alterado». La frase probablemente alude a un cambio de disposición o semblante, no sólo a la apariencia facial.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀφελόμενος
  english_pob_choice: after taking ... away
  chosen_spanish: después de quitarle
  alternatives_spanish:
  - después de tomarle
  - habiéndole quitado
  lexicon: LSJ
  rationale: El participio aoristo medio de ἀφαιρέω expresa la acción previa de quitar o retirar algo de alguien. «Después de quitarle» conserva la idea de privación y fluye bien en español.
- source_word: αὐτοῦ
  english_pob_choice: from him
  chosen_spanish: le
  alternatives_spanish:
  - de él
  - de parte de él
  lexicon: LSJ
  rationale: El pronombre con ἀφελόμενος señala a la persona despojada, aquí Alejandro. En español, el dativo átono «le» hace natural esa relación de despojo sin forzar la sintaxis.
- source_word: τὴν θυγατέρα
  english_pob_choice: his daughter
  chosen_spanish: su hija
  alternatives_spanish:
  - la hija
  lexicon: LSJ
  rationale: Aunque el griego dice literalmente «la hija», el contexto identifica a la hija vinculada a Alejandro; por eso «su hija» comunica el referente de manera clara y fiel.
- source_word: ἔδωκεν αὐτὴν τῷ Δημητρίῳ
  english_pob_choice: he gave her to Demetrius
  chosen_spanish: se la dio a Demetrio
  alternatives_spanish:
  - la dio a Demetrio
  - la entregó a Demetrio
  lexicon: LSJ
  rationale: ἔδωκεν expresa simplemente «dio», y el contexto matrimonial se sobreentiende sin añadirlo. «Se la dio a Demetrio» preserva el acto de transferencia personal y suena natural en español.
- source_word: ἠλλοιώθη τὸ πρόσωπον Ἀλεξάνδρου
  english_pob_choice: Alexander’s attitude changed
  chosen_spanish: el rostro de Alejandro fue alterado
  alternatives_spanish:
  - el semblante de Alejandro cambió
  - la actitud de Alejandro cambió
  - el rostro de Alejandro cambió
  lexicon: LSJ
  rationale: La expresión griega dice literalmente que «el rostro» fue alterado. El POB inglés deja abierta la tensión entre rostro literal y disposición interior; el español mantiene esa literalidad básica con «fue alterado», sin cerrar del todo el posible matiz idiomático.
- source_word: ἐφάνη
  english_pob_choice: became evident
  chosen_spanish: se hizo evidente
  alternatives_spanish:
  - apareció
  - quedó manifiesta
  - salió a la luz
  lexicon: LSJ
  rationale: El verbo señala que algo quedó manifiesto. «Se hizo evidente» reproduce bien la idea de manifestación pública o perceptible.
- source_word: ἡ ἔχθρα αὐτῶν
  english_pob_choice: their hostility
  chosen_spanish: su enemistad
  alternatives_spanish:
  - su hostilidad
  - la enemistad entre ellos
  lexicon: LSJ
  rationale: ἔχθρα puede traducirse como enemistad u hostilidad. «Su enemistad» es natural en español y conserva el sentido de antagonismo mutuo.
translation_notes:
  revision_awareness: Se siguió de cerca el texto griego de Swete y el audit trail inglés. No se añadió «en matrimonio» porque el griego no lo dice explícitamente, aunque el contexto narrativo lo presupone. Se conservó la tensión entre la literalidad de «rostro» y el valor idiomático posible de la expresión.
  spanish_consistency_notes:
  - Se usó «Demetrio» para Δημήτριος conforme a la forma española estándar.
  - Se evitó «SEÑOR» u სხვა terminología no pertinente; no hay nombres divinos en el versículo.
  - «Enemistad» se prefirió frente a «hostilidad» por mayor naturalidad, manteniendo el valor semántico de ἔχθρα.
