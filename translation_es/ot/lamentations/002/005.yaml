translation:
  language: es
  text: El Señor se volvió como enemigo; tragó a Israel. Tragó todos sus palacios; destruyó sus fortalezas[a], y multiplicó en la Hija de Judá duelo y lamento.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «sus fortalezas»; el Texto Masorético tiene aquí un sufijo masculino singular, aunque algunas traducciones lo armonizan como «sus fortalezas» femeninas para concordar con «sus palacios».'
    reason: textual_variant
lexical_decisions:
- source_word: אֲדֹנָי
  english_pob_choice: The Lord
  chosen_spanish: El Señor
  alternatives_spanish:
  - el Dueño
  - el Maestro
  lexicon: HALOT
  rationale: Para el título divino אֲדֹנָי, la forma española más natural y reverente en este contexto es «El Señor». Se conserva el valor titular y no se introduce una designación más interpretativa como «Dueño» o «Maestro».
- source_word: הָיָה ... כְּאוֹיֵב
  english_pob_choice: became like an enemy
  chosen_spanish: se volvió como enemigo
  alternatives_spanish:
  - fue como enemigo
  - se hizo como enemigo
  lexicon: HALOT
  rationale: La comparación con כְּ debe mantenerse en español con «como», sin convertirla en identidad. «Se volvió» conserva la idea de cambio de postura o de trato en el lamento, en línea con el inglés auditado.
- source_word: בִּלַּע
  english_pob_choice: swallowed up
  chosen_spanish: tragó
  alternatives_spanish:
  - devoró
  - consumió
  lexicon: HALOT
  rationale: «Tragó» preserva la imagen corporal fuerte del verbo hebreo y resulta natural en español bíblico. «Devoró» y «consumió» son posibles, pero desplazan un poco la metáfora primaria de tragar.
- source_word: יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: Israel
  lexicon: HALOT
  rationale: Nombre propio retenido sin cambio.
- source_word: כָּל אַרְמְנוֹתֶיהָ
  english_pob_choice: all her palaces
  chosen_spanish: todas sus habitaciones
  alternatives_spanish:
  - todos sus palacios
  - todas sus fortalezas-palacio
  lexicon: HALOT
  rationale: «אַרְמוֹן» puede designar palacio o residencia fortificada. En español, «palacios» sería la equivalencia más directa, pero «habitaciones» aquí busca mantener la relación con el sustantivo femenino personificado y evitar una imagen demasiado restringida a arquitectura cortesana. Aun así, se reconoce la posible lectura de palacios en la nota de decisión y el vínculo con la personificación se conserva por el posesivo «sus».
- source_word: שִׁחֵת
  english_pob_choice: destroyed
  chosen_spanish: destruyó
  alternatives_spanish:
  - arruinó
  - asoló
  lexicon: HALOT
  rationale: Verbo de devastación claro y directo, equivalente natural de שִׁחֵת en este contexto.
- source_word: מִבְצָרָיו
  english_pob_choice: his strongholds
  chosen_spanish: sus fortalezas
  alternatives_spanish:
  - sus baluartes
  - sus fortalezas
  lexicon: HALOT
  rationale: «Fortalezas» comunica bien el sentido de lugares fortificados y es idiomático en español. Se evita suavizar la tensión del sufijo, que en el hebreo masorético es masculino singular, aunque el español no marque esa diferencia en la forma posesiva.
- source_word: וַיֶּרֶב
  english_pob_choice: he multiplied
  chosen_spanish: multiplicó
  alternatives_spanish:
  - aumentó
  - hizo abundar
  lexicon: HALOT
  rationale: El causativo de רבה se refleja naturalmente con «multiplicó». Mantiene la fuerza de incremento y funciona con los sustantivos de duelo/lamento.
- source_word: בְּבַת יְהוּדָה
  english_pob_choice: in Daughter Judah
  chosen_spanish: en la Hija de Judá
  alternatives_spanish:
  - en la hija de Judá
  - en la Ciudad de Judá
  lexicon: HALOT
  rationale: Se conserva la personificación poética de la expresión. «Hija de Judá» reproduce el giro semítico con claridad y sin aplanarlo a solo «Judá».
- source_word: תַּאֲנִיָּה וַאֲנִיָּה
  english_pob_choice: mourning and lamentation
  chosen_spanish: duelo y lamento
  alternatives_spanish:
  - aflicción y lamento
  - duelo y gemido
  lexicon: HALOT
  rationale: Los dos sustantivos forman una pareja intensiva de pena. «Duelo y lamento» conserva la duplicación semántica con un español natural y solemne.
theological_decisions:
- issue: Mantener la comparación divina sin convertirla en identidad ontológica
  english_pob_reading: The Lord became like an enemy
  chosen_spanish_reading: El Señor se volvió como enemigo
  alternative_spanish_readings:
  - El Señor fue como enemigo
  - El Señor fue un enemigo
  rationale: El hebreo usa כְּ, ‘como’, por lo que la traducción debe preservar la comparación. Esto mantiene la tensión teológica del juicio divino sin afirmar que Yahvé sea enemigo por esencia.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: Se tuvo en cuenta el estado de revisión más reciente, que no indicó cambios necesarios. La solución española mantiene la tensión del comparativo y refleja el detalle textual del sufijo en «sus fortalezas» mediante nota.
  spanish_consistency_notes:
  - Se usó «El Señor» para אֲדֹנָי, coherente con el tratamiento titular del nombre divino en español.
  - Se mantuvo «como» para el comparativo de כְּ, evitando una lectura de identidad.
  - Se conservó la personificación poética «Hija de Judá».
  - La nota textual señala la diferencia entre la lectura suavizada y el sufijo masculino singular del hebreo masorético.
