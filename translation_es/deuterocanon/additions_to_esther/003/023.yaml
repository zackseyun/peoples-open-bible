translation:
  language: es
  text: Pon en mi boca una palabra apropiada[a] delante del león[b], y vuelve su corazón al odio contra el que nos hace guerra, para su destrucción[c] y la de los que son de un mismo sentir con él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Dame una palabra bien ordenada en mi boca». La expresión griega λόγον εὔρυθμον puede destacar un habla apta, bien compuesta o debidamente formulada.'
    reason: lexical_alternative
  - marker: b
    text: «El león» es una metáfora del rey en la oración de Ester; el griego conserva la imagen y no lo nombra directamente.
    reason: cultural_note
  - marker: c
    text: 'O: «para su fin» o «para su ruina».'
    reason: lexical_alternative
lexical_decisions:
- source_word: δὸς
  english_pob_choice: Put
  chosen_spanish: Pon
  alternatives_spanish:
  - Da
  - Coloca
  lexicon: BDAG
  rationale: El imperativo pide que Dios conceda/provea la expresión adecuada. En español, «pon» funciona de modo natural con «en mi boca» y conserva la idea de suplir o disponer palabras para hablar.
- source_word: λόγον εὔρυθμον
  english_pob_choice: fitting words
  chosen_spanish: palabras adecuadas
  alternatives_spanish:
  - palabras bien ordenadas
  - habla conveniente
  - una palabra bien compuesta
  lexicon: LSJ
  rationale: La combinación griega apunta a habla bien ajustada, apta y apropiada para la situación. «Palabras adecuadas» conserva esa aptitud sin volver la frase artificial en español.
- source_word: ἐνώπιον τοῦ λέοντος
  english_pob_choice: before the lion
  chosen_spanish: delante del león
  alternatives_spanish:
  - en presencia del león
  - ante el león
  lexicon: BDAG
  rationale: Se mantiene la imagen del león como en el griego, sin interpretarla en el cuerpo del texto. «Delante de» expresa la situación de comparecer ante un poder superior de manera clara en español.
- source_word: μετάθες τὴν καρδίαν αὐτοῦ
  english_pob_choice: turn his heart
  chosen_spanish: vuelve su corazón
  alternatives_spanish:
  - cambia su corazón
  - gira su corazón
  lexicon: BDAG
  rationale: El griego pide un cambio de disposición interna. «Vuelve su corazón» conserva la metáfora de dirección o inclinación, con un matiz bíblico natural en español.
- source_word: εἰς μῖσος
  english_pob_choice: to hatred
  chosen_spanish: al odio
  alternatives_spanish:
  - hacia el odio
  - para odio
  lexicon: BDAG
  rationale: La preposición marca el resultado buscado del cambio interior. «Al odio» suena natural en español y mantiene el movimiento hacia ese estado afectivo.
- source_word: τοῦ πολεμοῦντος ἡμᾶς
  english_pob_choice: against the one who is warring against us
  chosen_spanish: contra el que nos hace guerra
  alternatives_spanish:
  - contra el que pelea contra nosotros
  - contra nuestro adversario
  lexicon: BDAG
  rationale: El participio singular conserva la referencia singular del griego. «Hace guerra» preserva el verbo de combate sin suavizarlo a un sustantivo más general como «enemigo».
- source_word: εἰς συντέλειαν αὐτοῦ
  english_pob_choice: for his destruction
  chosen_spanish: para su destrucción
  alternatives_spanish:
  - para su ruina
  - para su fin
  lexicon: LSJ
  rationale: La revisión inglesa favorece una relación de propósito o resultado, no un simple movimiento hacia. «Para su destrucción» refleja bien ese valor y la fuerza contextual del término.
- source_word: τῶν ὁμονοούντων αὐτῷ
  english_pob_choice: those who are of one mind with him
  chosen_spanish: los que están de un mismo sentir con él
  alternatives_spanish:
  - los que concuerdan con él
  - sus aliados
  - los que piensan igual que él
  lexicon: BDAG
  rationale: La expresión griega dice literalmente quienes comparten una misma mente o disposición. «De un mismo sentir» mantiene esa idea sin reducirla de inmediato a una categoría política o militar más interpretativa.
theological_decisions:
- issue: Mantener la metáfora del león
  english_pob_reading: Retain the metaphor 'the lion' in the main text
  chosen_spanish_reading: Conservar «el león» en el texto principal
  alternative_spanish_readings:
  - el rey
  - ante el rey
  rationale: El griego conserva la imagen metáforica y no la explicita. En español, retener «el león» respeta la textura literaria y la referencia velada al rey, en lugar de interpretarla dentro del versículo.
  doctrine_reference: Primacía del texto fuente; no aplanar la imaginería cuando el original la preserva.
- issue: Conservar el singular del adversario
  english_pob_reading: 'Render as singular: ''the one who is warring against us'''
  chosen_spanish_reading: 'Traducir en singular: «el que nos hace guerra»'
  alternative_spanish_readings:
  - los que nos hacen guerra
  - nuestro enemigo
  rationale: El participio griego es singular y probablemente apunta al adversario principal. Mantener el singular evita ampliar indebidamente el referente, aunque la frase siguiente sí incluye a sus asociados.
  doctrine_reference: No paraprasear más allá de lo que el texto fuente permite.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del POB en inglés, que ajustó εἰς συντέλειαν de una idea de movimiento final a una relación de propósito/resultado («for his destruction»). También se respetó la decisión auditada de conservar la metáfora del león, mantener el singular del participio τοῦ πολεμοῦντος ἡμᾶς y reflejar la frase final con una referencia a destrucción/ruina/end atendiendo al contexto.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino cuando aparece explícitamente; aquí no aparece.
  - Se mantiene el registro bíblico reverente sin arcaísmos innecesarios.
  - «De un mismo sentir» preserva la idea de mente/disposición compartida sin introducir una glosa excesiva en el texto principal.
  - Los marcadores de nota [a], [b], [c] aparecen exactamente donde corresponden en el texto principal.
