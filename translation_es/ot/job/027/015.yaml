  rationale: Se restituye la voz pasiva de יִקָּבֵרוּ y se mantiene la dureza compacta de בַּמָּוֶת con 'por la muerte', dejando la alternativa 'en la muerte' en nota. 'Sepultados' encaja bien en registro bíblico y evita la sobreinterpretación agentiva del borrador. La sintaxis inicial se simplifica para mayor naturalidad en español.
