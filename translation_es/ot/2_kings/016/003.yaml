translation:
  language: es
  text: Anduvo en el camino de los reyes de Israel, y aun hizo pasar a su hijo por el fuego[a], conforme a las abominaciones de las naciones que Yahvé había expulsado de delante de los hijos de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ofreció a su hijo en el fuego»; el hebreo literalmente dice «hizo pasar a su hijo por el fuego», un modismo asociado con un rito pagano condenado.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֵּלֶךְ
  english_pob_choice: He walked
  chosen_spanish: Anduvo
  alternatives_spanish:
  - Fue
  - Siguió
  lexicon: HALOT
  rationale: הלך con בְּדֶרֶךְ expresa conducta o modo de vida. ‘Anduvo’ conserva la metáfora del caminar y suena natural en español en un contexto de evaluación moral.
- source_word: בְּדֶרֶךְ
  english_pob_choice: in the way of
  chosen_spanish: en el camino de
  alternatives_spanish:
  - según el camino de
  - en la senda de
  lexicon: HALOT
  rationale: דֶּרֶךְ funciona aquí de forma figurada para indicar un patrón de conducta. ‘En el camino de’ preserva el giro y es claro en español.
- source_word: מַלְכֵי יִשְׂרָאֵל
  english_pob_choice: the kings of Israel
  chosen_spanish: los reyes de Israel
  alternatives_spanish:
  - los monarcas de Israel
  lexicon: HALOT
  rationale: La construcción posesiva es directa; se refiere a los reyes del reino del norte como modelo moral negativo.
- source_word: וְגַם
  english_pob_choice: and even
  chosen_spanish: y aun
  alternatives_spanish:
  - y también
  - incluso
  lexicon: HALOT
  rationale: גַּם añade énfasis y escalamiento. ‘Y aun’ conserva ese matiz de adición intensificada mejor que un simple ‘y también’.
- source_word: אֶת־בְּנוֹ
  english_pob_choice: his son
  chosen_spanish: a su hijo
  alternatives_spanish:
  - a su propio hijo
  lexicon: HALOT
  rationale: El sufijo posesivo singular debe mantenerse. En español, el objeto directo con persona suele marcarse con ‘a’.
- source_word: הֶעֱבִיר בָּאֵשׁ
  english_pob_choice: made his son pass through the fire
  chosen_spanish: hizo pasar a su hijo por el fuego
  alternatives_spanish:
  - hizo pasar a su hijo por el fuego
  - lo ofreció en el fuego
  - quemó a su hijo en el fuego
  lexicon: HALOT
  rationale: Se conserva el idiomático ‘hacer pasar por el fuego’ sin resolver en exceso si el rito fue sacrificio completo o un acto cultual condenado. ‘Por el fuego’ es la forma más natural en español para el valor idiomático del hebreo.
- source_word: כְּתֹעֲבוֹת
  english_pob_choice: according to the abominations of
  chosen_spanish: conforme a las abominaciones de
  alternatives_spanish:
  - según las abominaciones de
  - como las abominaciones de
  lexicon: HALOT
  rationale: כְּ expresa conformidad o patrón. ‘Conforme a’ reproduce bien esa relación normativa, sin suavizar el juicio moral del término.
- source_word: הַגּוֹיִם
  english_pob_choice: the nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - los pueblos
  - los gentiles
  lexicon: HALOT
  rationale: En este contexto histórico, גּוֹיִם apunta a los pueblos no israelitas del territorio. ‘Las naciones’ es neutral y fiel.
- source_word: אֲשֶׁר הוֹרִישׁ
  english_pob_choice: whom ... had driven out
  chosen_spanish: que Yahvé había expulsado
  alternatives_spanish:
  - que Yahvé había desposeído
  - que Yahvé había echado
  lexicon: HALOT
  rationale: הורישׁ en este contexto es expulsar/desposeer habitantes de la tierra. ‘Había expulsado’ es idiomático y respeta la referencia histórica.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: 'Se sigue la convención del proyecto para el Tetragrámaton: transcribir el nombre divino como ‘Yahvé’, en lugar de sustituirlo por un título.'
- source_word: מִפְּנֵי
  english_pob_choice: before
  chosen_spanish: de delante de
  alternatives_spanish:
  - de la presencia de
  - ante
  lexicon: HALOT
  rationale: La expresión marca expulsión ‘de delante de’ Israel. Esta opción mantiene la dirección espacial y la fuerza histórica del hebreo.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Se conserva el lenguaje del pacto y la forma masculina plural del hebreo con ‘hijos de Israel’, acorde con la línea terminológica del proyecto.
theological_decisions:
- issue: Cómo traducir הֶעֱבִיר בָּאֵשׁ sin resolver por completo la naturaleza del rito
  english_pob_reading: Retain the idiom 'made his son pass through the fire' in the main text
  chosen_spanish_reading: Mantener el modismo ‘hizo pasar a su hijo por el fuego’ en el texto principal
  alternative_spanish_readings:
  - ‘ofreció a su hijo en el fuego’
  - ‘quemó a su hijo en el fuego’
  - ‘sacrificó a su hijo en el fuego’
  rationale: El hebreo usa una fórmula ritual condenada, pero la expresión por sí sola sigue siendo idiomática. Mantenerla evita imponer más detalle del que el verso explicita, preservando la tensión teológica y permitiendo una nota alternativa.
  doctrine_reference: Primacía del texto fuente; conservar la tensión lexical y teológica en vez de resolverla por anticipado.
translation_notes:
  revision_awareness: 'Coincide con el último pase de revisión: el contexto auditado muestra alta concordancia y no se registraron cambios posteriores. Se conservó la decisión del inglés POB de mantener el modismo de ‘pasar por el fuego’ en el texto principal, con una nota que abre la alternativa interpretativa sin cerrar la tensión del hebreo.'
  spanish_consistency_notes:
  - Se usó ‘Yahvé’ de forma consistente con la política del proyecto para יְהוָה.
  - Se prefirió ‘hijos de Israel’ para mantener el lenguaje del texto fuente y la línea terminológica del proyecto.
  - Se evitó ‘SEÑOR’ como sustitución del nombre divino.
  - Se mantuvo el modismo cultual ‘hizo pasar por el fuego’ en lugar de una paráfrasis que especificara más de lo que dice el verso.
