translation:
  language: es
  text: Así Israel ha estado en rebelión contra la casa de David hasta hoy[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Israel se rebeló contra la casa de David hasta hoy». El verbo hebreo puede traducirse como pasado simple («se rebeló») o como un estado continuo («ha estado en rebelión»).'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּפְשְׁעוּ
  english_pob_choice: has been in rebellion
  chosen_spanish: ha estado en rebelión
  alternatives_spanish:
  - se rebeló
  - estuvo en rebelión
  - se ha rebelado
  lexicon: HALOT
  rationale: פשע expresa rebelión o alzamiento contra una autoridad. En este contexto histórico-político, el español «ha estado en rebelión» conserva tanto el acto de rebelarse como el estado continuado sugerido por «hasta hoy». «Se rebeló» comunica el hecho puntual, pero pierde el matiz de permanencia; «estuvo en rebelión» es posible, pero suena menos natural en este enunciado; «se ha rebelado» enfatiza el resultado sin expresar tan claramente el estado continuo.
- source_word: יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: Israel
  alternatives_spanish:
  - los israelitas
  - las tribus de Israel
  lexicon: HALOT
  rationale: Aquí «Israel» nombra al reino o conjunto tribal en contraste con la casa davídica. Mantener el nombre propio respeta el uso del hebreo y evita una expansión interpretativa que el texto no exige.
- source_word: בְּבֵית דָּוִיד
  english_pob_choice: against the house of David
  chosen_spanish: contra la casa de David
  alternatives_spanish:
  - desde la casa de David
  - contra la dinastía de David
  lexicon: HALOT
  rationale: Con פשע, la preposición ב puede señalar el grupo contra el cual se comete la rebelión. «Casa de David» conserva la imagen dinástica del hebreo; «contra la dinastía de David» aclara el sentido, pero añade una interpretación explicativa no presente de forma explícita en la frase.
- source_word: עַד הַיּוֹם הַזֶּה
  english_pob_choice: to this day
  chosen_spanish: hasta hoy
  alternatives_spanish:
  - hasta este día
  - hasta el día de hoy
  lexicon: HALOT
  rationale: Es un modismo temporal estándar que indica continuidad hasta el momento de referencia del narrador. «Hasta hoy» es la forma más natural y concisa en español contemporáneo, y preserva el valor idiomático del hebreo.
translation_notes:
  revision_awareness: El borrador sigue el texto hebreo masorético tal como está atestiguado en el WLC y armoniza con la decisión auditada en inglés de preservar el matiz durativo de פשע mediante una forma compuesta en español. No se registran revisiones aplicadas en el audit trail inglés, y el testimonio de revisión indica alta concordancia sin cambios necesarios.
  spanish_consistency_notes:
  - Se mantiene «casa de David» en lugar de «casa de David» con expansión eclesiástica, para conservar el lenguaje dinástico del hebreo.
  - «Hasta hoy» se usa como equivalente idiomático de עַד הַיּוֹם הַזֶּה, sin añadir explicación intratextual.
  - El pie de nota conserva la alternativa de pasado simple porque la ambigüedad aspectual del verbo hebreo fue documentada en la POB inglesa.
