translation:
  language: es
  text: 'Alrededor, dieciocho mil[a]; y el nombre de la ciudad, desde aquel día en adelante, será: Yahvé Está Allí.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «YHWH shammah», tradicionalmente transliterado «Yahvé está allí».'
    reason: alternative_reading
lexical_decisions:
- source_word: סָבִיב
  english_pob_choice: All around
  chosen_spanish: Todo alrededor
  alternatives_spanish:
  - Alrededor
  - Por todos lados
  lexicon: HALOT
  rationale: El adverbio expresa la medida/perímetro total en torno a la ciudad. «Todo alrededor» conserva el sentido espacial completo y suena natural en español bíblico moderno.
- source_word: שְׁמֹנָה עָשָׂר אָלֶף
  english_pob_choice: eighteen thousand
  chosen_spanish: dieciocho mil
  alternatives_spanish:
  - dieciocho mil codos
  - dieciocho mil medidas
  lexicon: HALOT
  rationale: El hebreo da la cifra de manera breve sin repetir la unidad en esta cláusula; el contexto inmediato de las medidas permite dejarla implícita, como en el inglés POB, en vez de añadir «codos» de forma interpretativa.
- source_word: וְשֵׁם הָעִיר
  english_pob_choice: and the name of the city
  chosen_spanish: y el nombre de la ciudad
  alternatives_spanish:
  - y el nombre de la ciudad misma
  - y el nombre de esa ciudad
  lexicon: HALOT
  rationale: La construcción nominal es directa y solemne. «El nombre de la ciudad» reproduce la fórmula con claridad y sin alterar el énfasis del texto.
- source_word: מִיּוֹם
  english_pob_choice: from that day on
  chosen_spanish: desde aquel día en adelante
  alternatives_spanish:
  - desde aquel día
  - a partir de aquel día
  lexicon: HALOT
  rationale: La preposición con «día» señala el punto de inicio del uso del nombre; la adición de «en adelante» hace explícita la continuidad temporal implicada por el contexto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: 'Se conserva el nombre propio divino del hebreo, conforme al criterio del proyecto en español: «Yahvé» para יְהוָה, evitando la sustitución por un título.'
- source_word: שָׁמָּה
  english_pob_choice: Is There
  chosen_spanish: Está Allí
  alternatives_spanish:
  - Allí está
  - Allí Habita
  lexicon: HALOT
  rationale: En el nombre simbólico de la ciudad, el adverbio funciona predicativamente. «Está Allí» comunica la fórmula nominal «Yahvé shammah» de manera natural en español y conserva el carácter de nombre propio.
theological_decisions:
- issue: Cómo renderizar el nombre divino en el nombre de la ciudad
  english_pob_reading: Yahweh Is There
  chosen_spanish_reading: Yahvé Está Allí
  alternative_spanish_readings:
  - Yahvé está allí
  - Jehová Está Allí
  rationale: El versículo usa directamente el Tetragrámaton יְהוָה. En coherencia con la doctrina del proyecto, se traduce como «Yahvé» y se mantiene el valor nominal de la expresión final como nombre dado a la ciudad.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: La versión inglesa POB mantiene la concisión del hebreo y no introduce «cubits» en el texto principal. También conserva el nombre divino como Yahweh y señala la forma hebrea del nombre de la ciudad en una nota. Esta versión española sigue esos mismos criterios y adapta la fórmula final a una construcción nominal natural en español.
  spanish_consistency_notes:
  - Se usa «Yahvé» para יְהוָה, en consonancia con los criterios del proyecto.
  - Se evita añadir «codos» al número, porque el hebreo no lo repite en esta cláusula y el contexto ya lo sugiere.
  - La expresión final se presenta como nombre propio de la ciudad, no como mera descripción circunstancial.
  - La nota al pie conserva la alternativa hebrea transliterada y su sentido tradicional.
