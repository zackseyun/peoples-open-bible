translation:
  language: es
  text: Ahora una palabra me fue traída en secreto[a], y mi oído captó un susurro de ella.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «mi oído recibió un indicio de ello» o «captó un leve sonido de ello».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֵלַי
  english_pob_choice: Now ... to me
  chosen_spanish: Ahora ... me
  alternatives_spanish:
  - Y ... me
  - Pero ... me
  lexicon: HALOT
  rationale: La partícula conjuntiva con la preposición marca transición discursiva y dirección hacia Elifaz. En español, «Ahora» comunica mejor el cambio de escena o de testimonio que un inicio literal con «Y» o «Pero», y mantiene explícita la referencia personal con «me».
- source_word: דָּבָר
  english_pob_choice: a word
  chosen_spanish: una palabra
  alternatives_spanish:
  - un mensaje
  - un asunto
  lexicon: HALOT
  rationale: En este contexto de revelación reportada, «palabra» conserva la brevedad y ambigüedad del hebreo sin convertirla en una explicación más amplia que el texto no exige.
- source_word: יְגֻנָּב
  english_pob_choice: was secretly brought
  chosen_spanish: me fue llevada en secreto
  alternatives_spanish:
  - me fue traída en secreto
  - fue introducida sigilosamente
  lexicon: HALOT
  rationale: El pasivo de גנב expresa algo que llega furtiva o secretamente. En español, «me fue llevada en secreto» conserva la idea de desplazamiento encubierto y el destinatario implícito, sin sugerir necesariamente robo material.
- source_word: וַתִּקַּח
  english_pob_choice: caught
  chosen_spanish: captó
  alternatives_spanish:
  - recibió
  - tomó
  lexicon: HALOT
  rationale: El verbo literalmente es «tomó», con «mi oído» como sujeto. «Captó» expresa de manera natural la recepción auditiva y preserva la imagen concreta sin sonar forzado en español.
- source_word: אָזְנִי
  english_pob_choice: my ear
  chosen_spanish: mi oído
  alternatives_spanish:
  - mi oreja
  - mi oído atento
  lexicon: HALOT
  rationale: «Oído» mantiene la imagen corporal del hebreo y funciona con naturalidad en español bíblico contemporáneo.
- source_word: שֵׁמֶץ
  english_pob_choice: a whisper
  chosen_spanish: un susurro
  alternatives_spanish:
  - un leve sonido
  - un indicio
  lexicon: HALOT
  rationale: El sustantivo puede denotar una pequeña porción, un indicio o un sonido apenas perceptible. En este contexto auditivo, «susurro» es la opción más idiomática y atmosférica; la alternativa de «indicio» queda preservada como matiz posible.
- source_word: מֶנְהוּ
  english_pob_choice: of it
  chosen_spanish: de ella
  alternatives_spanish:
  - de ello
  - de eso
  lexicon: HALOT
  rationale: El pronombre remite al sustantivo femenino implícito en la construcción española («palabra»). Aunque el hebreo usa un antecedente gramatical masculino, en español la concordancia con «palabra» pide «de ella» para mantener claridad y naturalidad.
translation_notes:
  revision_awareness: 'Se siguió de cerca el audit trail inglés, pero se ajustó la imagen verbal para que el español conserve naturalidad: el pasivo idiomático de יְגֻנָּב se vierte como llegada secreta, y שֵׁמֶץ se mantiene en el campo semántico de percepción auditiva.'
  spanish_consistency_notes:
  - Se usó «Yahvé» como término estándar del proyecto cuando aparezca el nombre divino; en este versículo no aplica.
  - Se prefirió «oído» en vez de «oreja» por mayor registro bíblico y estilístico sin perder literalidad.
  - La equivalencia de género en «de ella» responde a la referencia española de «palabra», sin alterar el antecedente conceptual del hebreo.
