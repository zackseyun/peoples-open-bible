translation:
  language: es
  text: Y mi pan[a] que te di —flor de harina, aceite y miel, con la que te alimenté— lo pusiste delante de ellos como aroma agradable[b], y así fue[c], declara el Señor, Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «mi alimento que te di». El hebreo «pan» puede abarcar también el alimento en sentido más amplio.'
    reason: lexical_alternative
  - marker: b
    text: «Aroma agradable» es lenguaje sacrificial estándar; aquí se usa irónicamente de lo que se ofreció ante ídolos.
    reason: cultural_note
  - marker: c
    text: 'Hebreo: «y fue», o «y ocurrió así». La breve fórmula confirma la acusación.'
    reason: alternative_reading
lexical_decisions:
- source_word: לַחְמִי
  english_pob_choice: my bread
  chosen_spanish: mi pan
  alternatives_spanish:
  - mi alimento
  lexicon: HALOT
  rationale: לֶחֶם puede significar literalmente 'pan' y, según contexto, también 'alimento'. 'Mi pan' conserva la imagen concreta de provisión divina y deja abierta la posible ampliación semántica, como en el texto fuente y en el audit trail inglés.
- source_word: סֹלֶת
  english_pob_choice: fine flour
  chosen_spanish: flor de harina
  alternatives_spanish:
  - harina fina
  - harina selecta
  lexicon: HALOT
  rationale: '''Flor de harina'' es una equivalencia natural en español bíblico para la harina refinada; conserva la cualidad de producto escogido sin sonar mecánica.'
- source_word: שֶׁמֶן
  english_pob_choice: oil
  chosen_spanish: aceite
  alternatives_spanish:
  - aceite de oliva
  lexicon: HALOT
  rationale: El hebreo dice solo 'aceite'. 'Aceite' mantiene la neutralidad del original; añadir 'de oliva' introduciría una precisión no explicitada.
- source_word: דְבַשׁ
  english_pob_choice: honey
  chosen_spanish: miel
  alternatives_spanish:
  - jarabe dulce
  - miel de dátiles
  lexicon: HALOT
  rationale: '''Miel'' es la traducción estándar y transparente. Aunque en algunos contextos el término puede abarcar un jarabe dulce, el texto no exige especificarlo.'
- source_word: הֶאֱכַלְתִּיךְ
  english_pob_choice: I fed you
  chosen_spanish: te alimenté
  alternatives_spanish:
  - te hice comer
  - te sustenté
  lexicon: HALOT
  rationale: El verbo causativo expresa que Dios provee alimento. 'Te alimenté' comunica con naturalidad esa acción y mantiene la relación directa entre lo dado y el sustento.
- source_word: וּנְתַתִּיהוּ
  english_pob_choice: you set it
  chosen_spanish: lo pusiste
  alternatives_spanish:
  - lo colocaste
  - lo presentaste
  lexicon: HALOT
  rationale: En contexto el sujeto pasa a la mujer/Jerusalén. 'Lo pusiste' reproduce la acción de colocar la ofrenda delante de otros sin añadir explicación interpretativa al texto principal.
- source_word: לִפְנֵיהֶם
  english_pob_choice: before them
  chosen_spanish: delante de ellos
  alternatives_spanish:
  - ante ellos
  lexicon: HALOT
  rationale: '''Delante de ellos'' es idiomático en español y conserva la referencia opaca del pronombre, que en contexto apunta a los ídolos o amantes mencionados antes.'
- source_word: לְרֵיחַ נִיחֹחַ
  english_pob_choice: as a pleasing aroma
  chosen_spanish: como aroma agradable
  alternatives_spanish:
  - como olor grato
  - como aroma placentero
  lexicon: HALOT
  rationale: En español, 'aroma agradable' comunica bien la fórmula cultual sin sonar forzado. Se mantiene la ironía sacrificial del original, donde una fórmula de adoración se aplica a la idolatría.
- source_word: וַיֶּהִי
  english_pob_choice: and so it was
  chosen_spanish: y así fue
  alternatives_spanish:
  - y sucedió así
  - y fue así
  lexicon: HALOT
  rationale: La frase confirma la realidad del acto denunciado. 'Y así fue' es breve, natural y suficientemente enfática.
- source_word: נְאֻם אֲדֹנָי יְהוִה
  english_pob_choice: declares the Lord GOD
  chosen_spanish: declara el Señor Yahvé
  alternatives_spanish:
  - oráculo del Señor Yahvé
  - declara el Señor, Yahvé
  lexicon: HALOT
  rationale: El hebreo presenta la fórmula profética con el nombre divino explícito. Se usa 'Yahvé' según la política terminológica del proyecto, y 'Señor' reproduce אדני en la fórmula titular sin ocultar el Tetragrama.
theological_decisions:
- issue: Lenguaje cultual usado irónicamente para la idolatría
  english_pob_reading: as a pleasing aroma
  chosen_spanish_reading: como aroma agradable
  alternative_spanish_readings:
  - como olor grato
  - como aroma placentero
  rationale: Se conserva la fórmula sacrificial sin explicarla en el cuerpo del verso. La ironía profética surge precisamente de aplicar lenguaje de ofrenda aceptable a un acto idolátrico.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: preserve theological tension rather than resolving it'
- issue: Representación del nombre divino יְהוָה en la fórmula profética
  english_pob_reading: Lord GOD / Yahweh
  chosen_spanish_reading: Señor Yahvé
  alternative_spanish_readings:
  - Señor Dios
  - Yahvé
  rationale: La política terminológica del proyecto pide 'Yahvé' para יְהוָה. Se conserva 'Señor' para אֲדֹנָי en la fórmula fija, evitando la máscara 'SEÑOR' y respetando la distinción entre título y nombre.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: 'Se tomó en cuenta la revisión más reciente del audit trail inglés: se evitó añadir énfasis no explícito como ''incluso'', y se mantuvo la relación gramatical de la lista de alimentos con la acción de alimentar. También se preservó el nombre divino explícito conforme a la política española del proyecto.'
  spanish_consistency_notes:
  - Se usó 'Yahvé' para יְהוָה y 'Señor' para אֲדֹנָי, manteniendo la distinción del hebreo.
  - '''Pan'' conserva la amplitud semántica posible sin perder la imagen concreta; la nota aclara la alternativa ''alimento''.'
  - '''Aroma agradable'' mantiene la fórmula sacrificial y su ironía profética sin expandirla en el texto principal.'
  - Se evitó el calco rígido 'olor suavizante' o fórmulas arcaizantes que no son necesarias en español actual.
