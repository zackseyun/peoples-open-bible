id: PHP.1.26
reference: Philippians 1:26
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ἵνα τὸ καύχημα ὑμῶν περισσεύῃ ἐν Χριστῷ Ἰησοῦ ἐν ἐμοὶ διὰ τῆς ἐμῆς παρουσίας πάλιν πρὸς ὑμᾶς.
base_translation:
  language: en
  yaml_path: translation/nt/philippians/001/026.yaml
  text: so that your boasting in Messiah Jesus may abound because of me through my coming to you again.
translation:
  language: ko
  text: 그리하여 메시아 예수 안에서의 여러분의 자랑[a]이 나로 인하여[b], 내가 다시 여러분에게 가는 일을 통하여 풍성해지도록 하기 위함입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「자랑할 근거」 또는 「자랑할 거리」. 헬라어 καύχημα는 자랑하는 행위 자체보다 자랑의 근거·내용을 가리킬 수 있다.
    reason: lexical_alternative
  - marker: b
    text: 문자적으로 「내 안에서」. 그러나 본 문맥의 의도는 「나로 인하여」 또는 「나를 통하여」이다.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἵνα
  english_pob_choice: so that
  chosen_korean: 그리하여 ~ 하기 위함입니다
  alternatives_korean:
  - ~을 위하여
  - ~하도록
  lexicon: BDAG
  rationale: 25절의 머무름의 목적·결과를 도입하는 ἵνα를 「그리하여 ~ 하기 위함입니다」로 자연스럽게 옮긴다.
- source_word: καύχημα
  english_pob_choice: boasting
  chosen_korean: 자랑
  alternatives_korean:
  - 자랑할 근거
  - 자랑할 거리
  lexicon: BDAG
  rationale: καύχημα는 자랑의 행위 또는 그 근거 모두를 가리킬 수 있다. 영어 POB의 최종 본문 「boasting」을 따라 「자랑」으로 옮기되, 「자랑할 근거」 가능성은 각주로 둔다.
- source_word: περισσεύῃ
  english_pob_choice: may abound
  chosen_korean: 풍성해지도록
  alternatives_korean:
  - 넘치도록
  - 가득해지도록
  lexicon: BDAG
  rationale: 9절과 일관되게 「풍성해지다」로 옮긴다.
- source_word: Χριστῷ Ἰησοῦ
  english_pob_choice: Messiah Jesus
  chosen_korean: 메시아 예수
  alternatives_korean:
  - 그리스도 예수
  lexicon: BDAG
  rationale: 본 번역의 원칙에 따라 칭호 Χριστός를 「메시아」로 옮긴다.
- source_word: ἐν ἐμοὶ
  english_pob_choice: because of me
  chosen_korean: 나로 인하여
  alternatives_korean:
  - 내 안에서
  - 나 때문에
  lexicon: BDAG
  rationale: 형식적으로 「내 안에서」이나 본 문맥의 관용 표현은 자랑의 근거·계기로서 「나로 인하여」가 자연스럽다.
- source_word: παρουσίας
  english_pob_choice: coming
  chosen_korean: 가는 일
  alternatives_korean:
  - 임함
  - 도래
  - 방문
  lexicon: BDAG
  rationale: 여기서 παρουσία는 종말론적 「강림」이 아니라 바울의 빌립보 방문을 가리킨다. 「가는 일」이 「다시 여러분에게」와 자연스럽게 결합된다.
- source_word: πάλιν πρὸς ὑμᾶς
  english_pob_choice: to you again
  chosen_korean: 다시 여러분에게
  alternatives_korean:
  - 여러분에게 다시
  lexicon: BDAG
  rationale: 한국어 자연스러운 어순으로 「다시 여러분에게」로 옮긴다.
