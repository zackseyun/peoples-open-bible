revisions:
- from: Y ahora, mira[a], el clamor de los hijos de Israel ha llegado hasta mí[b], y también he visto la opresión con que los egipcios los oprimen.
  to: Y ahora, he aquí[a], el clamor de los hijos de Israel ha llegado a mí[b], y también he visto la opresión con que los egipcios los oprimen.
  rationale: Se ajusta el registro de הִנֵּה a «he aquí» para una voz más digna y acorde con la auditoría inglesa, y se simplifica «ha llegado hasta mí» a «ha llegado a mí» para reflejar con más precisión בָּאָה אֵלַי. Se conservan «los hijos de Israel» y «los egipcios» por fidelidad léxica y teológica al expediente auditado.
