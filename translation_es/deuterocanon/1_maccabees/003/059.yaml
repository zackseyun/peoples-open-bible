translation:
  language: es
  text: Porque es mejor para nosotros morir en batalla que quedarnos mirando los males de nuestra nación y de las cosas santas[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el santuario» o «los lugares santos»; el griego dice «las cosas santas».
    reason: lexical_alternative
lexical_decisions:
- source_word: κρεῖσσον
  english_pob_choice: better
  chosen_spanish: mejor
  alternatives_spanish:
  - más conveniente
  - preferible
  lexicon: LSJ
  rationale: En este contexto exhortativo, κρεῖσσον expresa una comparación de conveniencia moral y práctica. «Mejor» es la equivalencia natural y clara en español.
- source_word: ἀποθανεῖν
  english_pob_choice: to die
  chosen_spanish: muramos
  alternatives_spanish:
  - morir
  - perecer
  lexicon: LSJ
  rationale: La forma de primera persona plural mantiene el sentido inclusivo del griego («nosotros») y suena más natural en la cita directa de resolución colectiva. «Morir» sería más literal en infinitivo, pero aquí «muramos» comunica mejor el tono del dicho.
- source_word: ἐν πολέμῳ
  english_pob_choice: in battle
  chosen_spanish: en batalla
  alternatives_spanish:
  - en guerra
  - en combate
  lexicon: LSJ
  rationale: Aunque πόλεμος puede significar «guerra», el contexto inmediato de enfrentamiento militar concreto favorece «batalla», como en la traducción inglesa POB.
- source_word: ἐφιδεῖν ἐπὶ
  english_pob_choice: to look on at
  chosen_spanish: mirar de lejos
  alternatives_spanish:
  - mirar
  - ver
  - contemplar
  lexicon: LSJ
  rationale: El verbo describe una observación dolorosa, casi pasiva, de algo que uno presencia sin poder impedirlo. «Mirar de lejos» intenta preservar esa idea de estar mirando mientras se soporta el mal, sin reducirlo simplemente a «ver».
- source_word: τὰ κακά
  english_pob_choice: the evils
  chosen_spanish: los males
  alternatives_spanish:
  - los males terribles
  - las desgracias
  - los daños
  lexicon: LSJ
  rationale: «Κακά» puede abarcar males, calamidades o desgracias. «Los males» conserva el rango amplio del término sin especificarlo demasiado ni convertirlo solo en sufrimiento político.
- source_word: τοῦ ἔθνους ἡμῶν
  english_pob_choice: of our nation
  chosen_spanish: de nuestra nación
  alternatives_spanish:
  - de nuestro pueblo
  lexicon: LSJ
  rationale: «Nación» conserva el sentido colectivo-político del griego y coincide con la decisión del inglés POB. «Pueblo» sería posible, pero más general.
- source_word: τῶν ἁγίων
  english_pob_choice: of the holy things
  chosen_spanish: de las cosas santas
  alternatives_spanish:
  - del santuario
  - de los lugares santos
  - de las cosas sagradas
  lexicon: LSJ
  rationale: El griego es neutro plural y, según el audit trail, no debe leerse como «santos» en sentido de personas. «Las cosas santas» sigue de cerca la forma griega plural y mantiene abierta la referencia probable al templo y sus realidades sagradas.
theological_decisions:
- issue: Referencia de τῶν ἁγίων
  english_pob_reading: the holy things
  chosen_spanish_reading: las cosas santas
  alternative_spanish_readings:
  - el santuario
  - los lugares santos
  rationale: La forma griega neutra plural favorece una traducción plural y no personal. «Las cosas santas» preserva esa tensión textual y permite que el contexto determine si alude al santuario, sus objetos o el ámbito sagrado en general.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency of key terms, or documented exception.
translation_notes:
  revision_awareness: El pasaje presenta acuerdo alto en la fuente y el audit trail inglés; no se registraron revisiones textuales. La decisión principal es mantener la ambigüedad útil de τῶν ἁγίων con una nota explicativa en español, siguiendo el POB inglés.
  spanish_consistency_notes:
  - Se mantiene «nación» para ἔθνος en coherencia con la decisión inglesa y con un registro político-colectivo.
  - Se evita «SEÑOR» o terminología eclesiástica no presente en el texto.
  - Se conserva un español sobrio y publicable, sin sobreexplicar en el cuerpo del versículo.
  - La nota al pie refleja la misma alternativa que el POB inglés, adaptada a la formulación española.
