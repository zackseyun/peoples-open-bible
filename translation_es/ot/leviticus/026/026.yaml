revisions:
- from: Cuando yo quiebre[a] el sustento[b] de tu pan, diez mujeres cocerán tu pan en un solo horno, y lo devolverán por peso; comerán, pero no se saciarán.
  to: Cuando yo quiebre tu provisión[a] de pan, diez mujeres hornearán tu pan en un solo horno, y te lo devolverán por peso; comerás, pero no te saciarás.
  rationale: Se corrige la persona gramatical para reflejar el hebreo y mantener la coherencia del versículo; se traslada la nota al lugar correcto del modismo מַטֵּה לֶחֶם; y se sustituye la expresión algo forzada 'el sustento de tu pan' por 'tu provisión de pan', que preserva el sentido documentado y suena más natural en español. También se explicita 'te lo devolverán' para mantener claro el objeto indirecto implícito en el hebreo.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:28:37Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la secuencia de juicio y la imagen de escasez: Yahvé quebranta el abastecimiento de pan, diez mujeres hornean en un solo horno, el pan se devuelve racionado por peso, y aun así no hay saciedad. Sin embargo, hay dos desajustes importantes con el hebreo y con el rastro POB en inglés: (1) la persona gramatical cambia indebidamente de segunda persona singular/tercera plural a una forma impersonal; el hebreo y el inglés dicen ''tu/vuestro pan... comerás/comerán ustedes'', no ''comerán'' referido ambiguamente a otros; (2) la nota [a] está anclada en ''quiebre'' pero explica el modismo מַטֵּה לֶחֶם, así que el anclaje debe moverse al sintagma del sustento/provisión de pan. También ''el sustento de tu pan'' suena algo forzado en español; una formulación como ''tu provisión de pan'' comunica mejor el sentido idiomático documentado.'
  spanish_quality_summary: El español es mayormente claro, pero presenta cierta rigidez idiomática en 'el sustento de tu pan' y una incoherencia pronominal que afecta la legibilidad. 'Cocerán' es posible, aunque 'hornearán' o 'cocerán' ambos sirven; no es un problema mayor. 'Por peso' es natural y fiel. 'No se saciarán' es bueno, pero debe concordar con el sujeto de segunda persona plural si se usa 'ustedes'.
  glossary_alignment: 'No hay conflictos con la terminología teológica principal del proyecto. La decisión sobre el modismo מַטֵּה לֶחֶם debe seguir la racionalidad POB: texto principal idiomático y nota con la literalidad ''la vara de pan''. Conviene mantener ''pan'' explícito en la expresión, no ampliarlo a ''alimento''.'
  issues:
  - severity: high
    issue: Cambio incorrecto de persona gramatical en la cláusula final
    rationale: El hebreo tiene segunda persona plural en וַאֲכַלְתֶּם ... תִשְׂבָּעוּ, y el contexto también usa sufijos de segunda persona. El borrador dice 'comerán, pero no se saciarán', que desplaza el referente a tercera persona y rompe la cohesión con 'tu pan'.
  - severity: high
    issue: La nota [a] está anclada a la palabra equivocada
    rationale: La nota [a] explica 'la vara de pan', que corresponde a מַטֵּה לֶחֶם, no al verbo 'quiebre'. Debe anclarse al sintagma que traduce ese modismo.
  - severity: medium
    issue: '''El sustento de tu pan'' suena poco natural en español'
    rationale: Aunque intenta conservar el vínculo con 'pan', la construcción resulta pesada y poco idiomática. 'Tu provisión de pan' o 'tu sustento de pan' no son equivalentes; la primera comunica mejor el sentido del modismo según el audit trail inglés.
  - severity: low
    issue: Posible mejora de registro en 'cocerán'
    rationale: '''Cocerán'' es defendible, pero en un contexto explícito de horno y pan, ''hornearán'' puede sonar más transparente para lectores generales. No es necesario para fidelidad.'
  revised_spanish_text: Cuando yo quiebre tu provisión[a] de pan, diez mujeres hornearán tu pan en un solo horno, y te lo devolverán por peso; comerás, pero no te saciarás.
  revised_footnotes:
  - marker: a
    text: Literalmente, «la vara de pan», un modismo para la provisión sustentadora de pan.
    reason: lexical_alternative
  revision_rationale: Se corrige la persona gramatical para reflejar el hebreo y mantener la coherencia del versículo; se traslada la nota al lugar correcto del modismo מַטֵּה לֶחֶם; y se sustituye la expresión algo forzada 'el sustento de tu pan' por 'tu provisión de pan', que preserva el sentido documentado y suena más natural en español. También se explicita 'te lo devolverán' para mantener claro el objeto indirecto implícito en el hebreo.
