translation:
  language: es
  text: Y Jasón[a], que había suplantado a su propio hermano, después de ser él mismo suplantado por otro, huyó y se refugió en la tierra de los amonitas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que había minado a su propio hermano... después de ser él mismo minado por otro». El griego usa el mismo verbo en forma activa y pasiva para subrayar un giro irónico.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑπονοθεύσας
  english_pob_choice: had supplanted
  chosen_spanish: había suplantado
  alternatives_spanish:
  - había minado
  - había desplazado con intriga
  - había engañado para desbancarlo
  lexicon: LSJ
  rationale: «Suplantar» en español conserva la idea de desplazar a otro mediante acción torcida o intriga, sin especificar indebidamente el mecanismo. Reproduce bien el juicio moral implícito en el contexto.
- source_word: ὑπονοθευθεὶς
  english_pob_choice: having himself been supplanted
  chosen_spanish: habiendo sido él mismo suplantado
  alternatives_spanish:
  - habiendo sido minado
  - habiendo sido desplazado con intriga
  - habiendo sido engañado
  lexicon: LSJ
  rationale: 'La forma pasiva cognada merece mantenerse para conservar la ironía y el paralelismo del griego: el que suplantó a otro termina siendo suplantado. «Él mismo» refuerza ese giro reversible.'
- source_word: φυγὰς
  english_pob_choice: fled
  chosen_spanish: huyó
  alternatives_spanish:
  - se volvió fugitivo
  - salió como fugitivo
  - se hizo fugitivo
  lexicon: LSJ
  rationale: El griego condensa la idea de estar en fuga; «huyó» comunica naturalmente esa condición sin recargar el verso con una perífrasis innecesaria.
- source_word: ὑπῆλθεν
  english_pob_choice: went into
  chosen_spanish: se fue
  alternatives_spanish:
  - fue
  - se retiró
  - se dirigió
  lexicon: LSJ
  rationale: Después de «huyó», «se fue» suena natural en español y conserva el movimiento hacia un destino, sin añadir un matiz demasiado formal.
- source_word: τὴν Ἀμμανῖτιν χώραν
  english_pob_choice: the land of the Ammonites
  chosen_spanish: el país de los amonitas
  alternatives_spanish:
  - la tierra de los amonitas
  - el territorio de Amón
  lexicon: LSJ
  rationale: «País» reproduce bien χώρα en este contexto narrativo y mantiene la referencia étnica. «Amonitas» expresa el grupo de personas, como en el inglés auditado.
- source_word: ὁ τὸν ἴδιον ἀδελφὸν
  english_pob_choice: his own brother
  chosen_spanish: su propio hermano
  alternatives_spanish:
  - su hermano
  lexicon: LSJ
  rationale: «Propio» refleja ἴδιον y preserva la fuerza moral de la traición dentro de la familia; omitirlo debilitaría el contraste.
theological_decisions:
- issue: Reversión irónica de la acción injusta
  english_pob_reading: The Greek uses the same verb in active and passive forms to emphasize ironic reversal.
  chosen_spanish_reading: 'El español conserva el mismo verbo en activa y pasiva para mantener la inversión irónica: el que suplantó es suplantado.'
  alternative_spanish_readings:
  - el que dañó es dañado
  - el que desplazó a otro fue desplazado
  rationale: La repetición de «suplantar» en ambas voces preserva la figura retórica y evita suavizar la retribución narrativa que el griego resalta.
  doctrine_reference: Principio de retribución narrativa; paralelismo retórico del texto
- issue: Lexema de desplazamiento fraudulento
  english_pob_reading: supplanted ... undermined ... displaced by intrigue
  chosen_spanish_reading: suplantado / suplantar
  alternative_spanish_readings:
  - minado
  - desplazado con intriga
  - derribado
  rationale: «Suplantar» mantiene el campo semántico de sustitución ilegítima sin imponer una interpretación más específica que la del griego.
  doctrine_reference: Precisión semántica; evitar sobreinterpretación
translation_notes:
  revision_awareness: 'Se revisó el pasaje a la luz del audit trail inglés y del griego: se mantuvo la simetría verbal ὑπονοθεύσας / ὑπονοθευθεὶς, se conservó ἴδιον con «propio», y se optó por una formulación española natural que no atenúe el matiz de traición ni la ironía del descenso de Jasón.'
  spanish_consistency_notes:
  - Se usa «amonitas» en minúscula como etnónimo común en español.
  - Se mantiene el nombre «Jasón» con acento gráfico estándar en español.
  - La frase verbal conserva dos movimientos consecutivos («huyó y se fue») para reflejar la secuencia del original sin añadir contenido.
