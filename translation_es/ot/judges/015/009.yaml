review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia verbal hebrea: movimiento militar (''subieron''), establecimiento de campamento (''acamparon''), y extensión/despliegue en Lehi. ''En Judá'' reproduce correctamente בִּיהוּדָה como ubicación. La principal falla está en la nota: no preserva la alternativa del POB inglés (''deployed themselves at Lehi''), porque repite esencialmente la lectura principal en vez de ofrecer una alternativa real.'
  spanish_quality_summary: El texto base es claro y natural en español. 'Se desplegaron' funciona bien para el matiz militar de וַיִּנָּטְשׁוּ. Conviene ajustar la nota al español idiomático y a la lógica editorial, evitando comillas y formulación redundante. El anclaje [a] en 'Judá' sigue el inglés, aunque la nota en realidad comenta la cláusula final; por consistencia con el audit trail puede conservarse.
  glossary_alignment: No hay términos del glosario teológicamente sensibles en este versículo. 'Los filisteos', 'Judá' y 'Lehi' son aceptables; 'Lehi' conserva el topónimo como en el inglés auditado. 'Se desplegaron' está alineado con la decisión léxica documentada para וַיִּנָּטְשׁוּ.
  issues:
  - severity: medium
    issue: La nota al pie no ofrece una alternativa léxica real
    rationale: El POB inglés da como alternativa 'deployed themselves at Lehi', mientras que la nota española repite prácticamente la traducción principal ('y se desplegaron en Lehi'). Una nota de alternativa debe preservar una opción distinta, por ejemplo 'se extendieron por Lehi' o similar.
  - severity: low
    issue: Redacción editorial poco natural en la nota
    rationale: 'La formulación "''O: «..." es tipográficamente torpe en español. Conviene una nota limpia: "O, ''se extendieron por Lehi''. El verbo hebreo puede sugerir un despliegue militar."'
  revised_spanish_text: Entonces los filisteos subieron y acamparon en Judá[a], y se desplegaron en Lehi.
  revised_footnotes:
  - marker: a
    text: O, "se extendieron por Lehi". El verbo hebreo puede sugerir un despliegue militar.
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal porque es fiel y natural. Se corrige únicamente la nota para que represente una alternativa léxica genuina y exprese con claridad el matiz militar documentado en el audit trail inglés.
