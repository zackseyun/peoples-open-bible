  rationale: Se sustituye «que es para sí» por «que es para él» en ambas ocurrencias para lograr un español más natural sin perder el sentido ritual de destinación personal de אֲשֶׁר לוֹ. Se mantiene «por sí» en la frase con בעד porque funciona bien en español y conserva la economía formal del original. También se pule la nota b para mayor claridad y corrección estilística.
