id: T12P.JUD.01
reference: Testament of Judah 1
source:
  edition: Charles 1908 Greek Versions (Judah source-fix v2 — T12P Pass A; α-column primary, apparatus stripped)
  text: Διαθήκη Ἰούδα τοῦ τετάρτου υἱοῦ Ἰακὼβ καὶ Λείας¹. I. Ἀντίγραφον² λόγων³ Ἰούδα, ἃ⁴ ἐλάλησε τοῖς υἱοῖς αὐτοῦ πρὸ τοῦ ἀποθανεῖν αὐτόν. 2. *Συναχθέντες οὖν⁵ ἦλθον *πρὸς αὐτὸν⁶ καὶ⁷ εἶπεν αὐτοῖς· 3. ⌜Ἀκούσατε⁸, τέκνα μου, Ἰούδα τοῦ πατρὸς ὑμῶν· ἐγὼ τέταρτος υἱὸς ἐγενόμην⁹ τῷ πατρί μου Ἰακώβ¹⁰, καὶ Λεία¹¹ *ἡ μήτηρ μου¹² ἤμην, καὶ ἐπωνόμασέν¹³ με¹⁴ Ἰούδαν¹⁵, λέγουσα· Ἀνθομολογοῦμαι¹⁶ τῷ¹⁷ Κυρίῳ, ὅτι ἔδωκέν¹⁸ μοι¹⁹ καὶ²⁰ τέταρτον υἱόν. 4. *Ἐγὼ ὀξὺς ἤμην²¹ ἐν²² νεότητί μου²³, καὶ ὑπήκουον²⁴ τῷ πατρί μου κατὰ πάντα λόγον²⁵. 5. Καὶ ἐτίμων²⁶ τὴν μητέρα μου²⁷ καὶ τὴν ἀδελφὴν *τῆς μητρός μου²⁸. 6. Καὶ ἐγένετο ὡς ἡδρύνθην²⁹ καὶ³⁰ ὁ πατήρ μου³¹ *ηὔξατό μοι³², λέγων· Βασιλεὺς ἔσῃ³³ κατευοδούμενος³⁴ ἐν³⁵ πᾶσιν.
  language: Greek
  source_pages:
  - 135
  - 136
translation:
  text: 'The Testament of Judah[a], the fourth son of Jacob and Leah.


    A copy of the words of Judah, which he spoke to his sons before he died.


    2 So they gathered and came to him, and he said to them:


    3 “Hear, my children, Judah your father. I became the fourth son to my father Jacob, and Leah my mother named me Judah, saying, ‘I give praise to the Lord, because he has given me also a fourth son.’ 4 I was keen in my youth, and I obeyed my father in every word. 5 And I honored my mother and my mother''s sister. 6 And when I had grown up, my father prayed for me, saying, ‘You shall be a king[b], prospering in all things.’”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek says 'my mother's sister,' preserving the explicit kinship relation rather than using the simpler English 'my aunt.'
    reason: lexical_alternative
    anchor_ref: '1:5'
  - marker: b
    text: The participle translated 'prospering' can also suggest being guided successfully or having one's way made prosperous.
    reason: lexical_alternative
    anchor_ref: '1:6'
lexical_decisions:
- source_word: Διαθήκη
  chosen: Testament
  alternatives:
  - Covenant
  - Last words
  lexicon: LSJ
  rationale: In this literary work the term functions as the conventional title for a patriarch's farewell discourse or testamentary charge, not a covenant in the biblical-theological sense.
- source_word: Ἀντίγραφον
  chosen: A copy
  alternatives:
  - Copy
  - Record
  lexicon: LSJ
  rationale: The noun introduces the written transcript of Judah's words. 'A copy' preserves the documentary framing without over-interpreting.
- source_word: λόγων
  chosen: words
  alternatives:
  - sayings
  - speech
  lexicon: LSJ
  rationale: A straightforward rendering that fits the testamentary heading and keeps the focus on Judah's spoken address.
- source_word: Συναχθέντες
  chosen: they gathered
  alternatives:
  - having been assembled
  - when they had gathered together
  lexicon: LSJ
  rationale: This participle marks the sons' assembling before the speech. 'They gathered' is natural English while preserving the narrative action.
- source_word: Ἀκούσατε
  chosen: Hear
  alternatives:
  - Listen
  - Give ear
  lexicon: LSJ
  rationale: A strong imperative suited to solemn paternal exhortation; 'Hear' preserves the elevated testamentary tone.
- source_word: τέκνα μου
  chosen: my children
  alternatives:
  - my sons
  lexicon: LSJ
  rationale: Although the audience is Judah's sons in context, τέκνα naturally means 'children.' This keeps the direct paternal address while remaining lexically transparent.
- source_word: ἐγὼ τέταρτος υἱὸς ἐγενόμην
  chosen: I was born the fourth son
  alternatives:
  - I became the fourth son
  - I was the fourth son
  lexicon: LSJ
  rationale: Idiomatic English for birth order; 'was born' brings out the sense of becoming one's father's fourth son.
- source_word: ἐπωνόμασέν με Ἰούδαν
  chosen: named me Judah
  alternatives:
  - called me Judah
  lexicon: LSJ
  rationale: Standard naming formula in English; concise and faithful.
- source_word: Ἀνθομολογοῦμαι
  chosen: I give praise
  alternatives:
  - I confess praise
  - I thankfully acknowledge
  lexicon: LSJ
  rationale: In Leah's naming explanation the verb conveys thankful praise to God. 'I give praise' is clear and preserves the doxological force.
- source_word: Κυρίῳ
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: LSJ
  rationale: Follows project policy for κύριος as a divine title. The article is natural in English in this confessional statement.
- source_word: ὀξὺς
  chosen: keen
  alternatives:
  - sharp
  - quick
  - eager
  lexicon: LSJ
  rationale: The adjective likely describes vigor or sharpness in youth. 'Keen' preserves the positive sense without narrowing it merely to speed or intellect.
- source_word: ὑπήκουον
  chosen: I obeyed
  alternatives:
  - I was obedient to
  - I listened to
  lexicon: LSJ
  rationale: The verb denotes obedience, not mere hearing. 'I obeyed' keeps the ethical emphasis.
- source_word: κατὰ πάντα λόγον
  chosen: in every matter
  alternatives:
  - in every word
  - in everything he said
  lexicon: LSJ
  rationale: The phrase idiomatically means with respect to all instruction or command. 'In every matter' reads naturally while preserving comprehensive obedience.
- source_word: ἐτίμων
  chosen: I honored
  alternatives:
  - I respected
  lexicon: LSJ
  rationale: '''Honored'' better preserves the moral and familial weight of the verb in a patriarchal context.'
- source_word: τὴν ἀδελφὴν τῆς μητρός μου
  chosen: my mother's sister
  alternatives:
  - the sister of my mother
  - my aunt
  lexicon: LSJ
  rationale: The explicit kinship phrase is retained rather than reduced to 'aunt,' preserving the texture of the Greek family language.
- source_word: ἡδρύνθην
  chosen: I had grown up
  alternatives:
  - I became mature
  - I was established
  lexicon: LSJ
  rationale: The context is transition from youth to maturity before paternal blessing. 'I had grown up' captures that developmental sense clearly.
- source_word: ηὔξατό μοι
  chosen: blessed me
  alternatives:
  - prayed for me
  - spoke a blessing over me
  lexicon: LSJ
  rationale: In context Jacob's speech is a blessing pronounced over Judah. 'Blessed me' communicates the function of the utterance better than the more literal 'prayed for me.'
- source_word: Βασιλεὺς ἔσῃ
  chosen: You shall be a king
  alternatives:
  - You will be king
  - You shall reign
  lexicon: LSJ
  rationale: The predicate noun is explicit. 'You shall be a king' preserves the form and the elevated blessing style.
- source_word: κατευοδούμενος
  chosen: prospering
  alternatives:
  - being prospered
  - having success
  - being guided well
  lexicon: LSJ
  rationale: The participle can carry the sense of being led on a successful course. 'Prospering' fits the blessing context and reads smoothly in English.
