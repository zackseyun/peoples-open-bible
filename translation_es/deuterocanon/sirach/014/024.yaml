translation:
  language: es
  text: El que acampa alrededor de su casa y clava su estaca en el muro de su casa.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se aloja cerca de su casa y fija una estaca en sus muros». El paralelo griego dice más explícitamente «cerca», mientras que el hebreo dice de manera vívida «alrededor».
    reason: lexical_alternative
lexical_decisions:
- source_word: הַחוֹנֶה
  english_pob_choice: He who camps
  chosen_spanish: El que acampa
  alternatives_spanish:
  - el que se aloja
  - el que acampa de manera habitual
  lexicon: HALOT
  rationale: חנה expresa la idea de acampar o hacer campamento. En español, «acampa» conserva la imagen concreta y habitual del participio, sin debilitarla como «se aloja».},{
- source_word: סְבִיבוֹת
  english_pob_choice: around
  chosen_spanish: alrededor de
  alternatives_spanish:
  - cerca de
  - en torno a
  lexicon: HALOT
  rationale: La hebrea indica una presencia circundante. «Alrededor de» preserva esa imagen espacial con naturalidad en español, y evita reducirla a mera cercanía.
- source_word: בֵּיתָהּ
  english_pob_choice: her house
  chosen_spanish: su casa
  alternatives_spanish:
  - su hogar
  - la casa de ella
  lexicon: HALOT
  rationale: La referencia femenina se mantiene por el contexto de la Sabiduría personificada. «Su casa» reproduce la posesión de forma clara y sobria en español.
- source_word: וְהֵבִיא
  english_pob_choice: drives
  chosen_spanish: clava
  alternatives_spanish:
  - hinca
  - fija
  - pone
  lexicon: HALOT
  rationale: Aunque el verbo hebreo es literalmente «traer», el contexto de la estaca y el paralelo griego πήξει («fijará/clavará») muestran el sentido idiomático de asegurar una estaca. «Clava» comunica bien esa acción en español.
- source_word: יְתֵדָיו
  english_pob_choice: his tent peg
  chosen_spanish: su estaca
  alternatives_spanish:
  - su estaca de tienda
  - su clavija
  - sus estacas
  lexicon: HALOT
  rationale: יתד designa una estaca o estaca de tienda. El español «estaca» es suficientemente general y natural; el singular sigue el griego πάσσαλον y evita una pluralización innecesaria del objeto.
- source_word: בְּקִירָהּ
  english_pob_choice: into her wall
  chosen_spanish: en su muro
  alternatives_spanish:
  - en su pared
  - contra su muro
  - en sus muros
  lexicon: HALOT
  rationale: קיר puede ser muro o pared. «Muro» conserva mejor la imagen de una construcción firme y encaja con la fijación de la estaca. El hebreo y el griego permiten la idea de fijarla en/contra el muro; en español «en su muro» es claro y fiel.
theological_decisions:
- issue: Referente de los pronombres femeninos
  english_pob_reading: The feminine pronouns refer to Wisdom personified.
  chosen_spanish_reading: Los pronombres femeninos se refieren a la Sabiduría personificada.
  alternative_spanish_readings:
  - una mujer genérica
  - un hogar femenino literal
  rationale: El contexto inmediato trata de la búsqueda de la Sabiduría, por lo que la imagen de la casa continúa esa personificación. Mantenerla evita convertir el pasaje en una escena ordinaria sin base textual.
  doctrine_reference: Sirach 14:23-24; personificación de la Sabiduría
translation_notes:
  revision_awareness: La versión inglesa POB opta por una equivalencia óptima que mantiene la imagen del campamento y registra en nota la diferencia entre el hebreo («alrededor») y el griego («cerca»). La redacción española sigue esa línea, conservando el participio de hábito y la estaca/clavado, y trasladando la alternativa semántica a una nota de pie de página.
  spanish_consistency_notes:
  - Se mantiene el tratamiento de la Sabiduría como referente femenino.
  - Se evita 'SEÑOR' u այլ equivalentes irrelevantes; no hay tétragrama en este versículo.
  - Se conserva el tono sobrio y poético, con vocabulario bíblico claro pero natural.
  - La nota recoge la tensión hebreo/griego sin eliminarla.
