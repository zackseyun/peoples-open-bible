id: PRO.1.5
reference: Proverbs 1:5
source:
  edition: WLC
  text: יִשְׁמַ֣ע חָ֭כָם וְ/י֣וֹסֶף לֶ֑קַח וְ֝/נָב֗וֹן תַּחְבֻּל֥וֹת יִקְנֶֽה׃
translation:
  text: Let the wise man hear and increase in learning[b][a], and the discerning man acquire guidance.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he will hear ... and gain'; the Hebrew imperfect verbs can be read more descriptively, but here they are rendered exhortational in keeping with the instructional setting.
    reason: alternative_reading
  - marker: b
    text: '''Guidance'' translates a term that can also mean ''wise counsel,'' ''direction,'' or, more literally, ''steering.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: יִשְׁמַע
  chosen: Let ... hear
  alternatives:
  - he will hear
  - may ... hear
  lexicon: HALOT
  rationale: 'Although morphologically an imperfect 3ms (''he hears/will hear''), in the proverb''s instructional context it functions naturally as a jussive-like exhortation: ''let the wise man hear.'' This best fits the surrounding purpose statements and preserves the hortatory force without over-paraphrase.'
- source_word: חָכָם
  chosen: the wise man
  alternatives:
  - the wise
  - a wise man
  lexicon: HALOT
  rationale: The singular masculine noun is rendered gender-accurately as 'wise man' per translation philosophy. 'The wise' is possible, but 'the wise man' better reflects the singular representative form in Hebrew wisdom literature.
- source_word: וְיֹסֶף
  chosen: and increase
  alternatives:
  - and add
  - and continue to add
  lexicon: HALOT
  rationale: From יסף, 'to add/increase.' In English, 'increase' idiomatically conveys growth in what follows ('in learning') better than the more wooden 'add.'
- source_word: לֶקַח
  chosen: learning
  alternatives:
  - instruction
  - teaching
  lexicon: HALOT
  rationale: לֶקַח can denote what is received as instruction/learning. Here, after 'hear' and with 'increase,' 'learning' is the most natural English complement and fits the wisdom context. 'Instruction' is possible but sounds more like what is given than what is gained.
- source_word: נָבוֹן
  chosen: the discerning man
  alternatives:
  - the understanding man
  - the prudent man
  - the discerning
  lexicon: HALOT
  rationale: The participial/adjectival form denotes one who has discernment or understanding. 'Discerning man' is readable modern English and preserves the representative masculine singular.
- source_word: תַּחְבֻּלוֹת
  chosen: guidance
  alternatives:
  - sound guidance
  - wise counsel
  - strategies
  - steering
  lexicon: HALOT
  rationale: The noun often carries the sense of guidance, direction, or skillful steering/counsel, especially in wisdom contexts. 'Guidance' is broad enough to preserve the metaphorical sense without forcing a military or tactical nuance such as 'strategies' in this context.
- source_word: יִקְנֶה
  chosen: acquire
  alternatives:
  - gain
  - obtain
  - buy
  lexicon: HALOT
  rationale: קנה commonly means acquire/get. 'Acquire' fits the wisdom context of gaining a valuable quality or resource. 'Buy' would be too literal here; 'gain' is possible but slightly less concrete.
