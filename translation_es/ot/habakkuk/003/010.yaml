translation:
  language: es
  text: Los montes te vieron y se estremecieron[a]; un torrente de aguas pasó de largo[b]. El abismo dio su voz; levantó en alto sus manos[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «temblaron», «estuvieron en angustia» o «se retorcieron» para «se estremecieron». El verbo hebreo puede sugerir sacudida o dolor semejante al de los partos.
    reason: lexical_alternative
  - marker: b
    text: O «pasó». El verbo hebreo es el común para pasar por o junto a algo; «pasó de largo» hace más vívida la fuerza del torrente en la escena.
    reason: lexical_alternative
  - marker: c
    text: Literalmente, «levantó sus manos en alto». Algunos entienden «manos» como metáfora de las olas que se elevan.
    reason: lexical_alternative
lexical_decisions:
- source_word: רָאוּךָ
  english_pob_choice: saw you
  chosen_spanish: te vieron
  alternatives_spanish:
  - te miraron
  - te contemplaron
  lexicon: HALOT
  rationale: El perfecto plural con sufijo de segunda persona expresa visión directa de la deidad. «Te vieron» es natural en español y conserva la inmediatez de la reacción personificada de los montes.
- source_word: יָחִילוּ
  english_pob_choice: writhed
  chosen_spanish: se estremecieron
  alternatives_spanish:
  - temblaron
  - se retorcieron
  - estuvieron en angustia
  lexicon: HALOT
  rationale: El verbo puede abarcar temblor, convulsión o dolor labor-like. En español, «se estremecieron» recoge el movimiento convulsivo y la sacudida sin cargar demasiado la imagen en una sola dirección.
- source_word: זֶרֶם מַיִם
  english_pob_choice: a torrent of waters
  chosen_spanish: un torrente de aguas
  alternatives_spanish:
  - una corriente de aguas
  - una inundación de aguas
  - un chubasco
  lexicon: HALOT
  rationale: La combinación enfatiza un caudal impetuoso. «Torrente de aguas» mantiene la fuerza poética y la proximidad léxica al hebreo.
- source_word: עָבָר
  english_pob_choice: swept by
  chosen_spanish: pasó
  alternatives_spanish:
  - pasó de largo
  - atravesó
  - cruzó
  lexicon: HALOT
  rationale: El verbo básico es «pasar». En español, «pasó» conserva la idea central sin forzar un giro idiomático que no está explícito en el hebreo.
- source_word: תְּהוֹם
  english_pob_choice: the deep
  chosen_spanish: el abismo
  alternatives_spanish:
  - el profundo
  - las profundidades
  lexicon: HALOT
  rationale: En poesía hebrea, תְּהוֹם designa las aguas profundas primordiales. «Abismo» es un equivalente español clásico y comprensible; se conserva la personificación del elemento acuático sin resolverlo en una imagen meramente meteorológica.
- source_word: נָתַן קוֹל
  english_pob_choice: gave its voice
  chosen_spanish: dio su voz
  alternatives_spanish:
  - emitió su voz
  - hizo oír su voz
  lexicon: HALOT
  rationale: La expresión idiomática se mantiene de manera bastante literal para preservar la personificación del abismo. «Dio su voz» es entendible en español poético y sigue de cerca la forma hebrea.
- source_word: רוֹם
  english_pob_choice: on high
  chosen_spanish: en alto
  alternatives_spanish:
  - en lo alto
  - arriba
  lexicon: HALOT
  rationale: Como complemento adverbial de elevación, «en alto» es breve y natural, y reproduce la dirección ascendente del gesto.
- source_word: יָדֵיהוּ נָשָׂא
  english_pob_choice: it lifted its hands
  chosen_spanish: levantó sus manos
  alternatives_spanish:
  - alzò sus manos
  - levantó sus manos en alto
  - alzò en alto sus manos
  lexicon: HALOT
  rationale: Se conserva la imagen antropomórfica. El sujeto sigue siendo el abismo; por eso «sus manos» mantiene la referencia personalizada del texto, en vez de reinterpretarla como olas.
theological_decisions:
- issue: Personificación cósmica en la teofanía
  english_pob_reading: Retain the personification of mountains and the deep as reacting to God rather than flattening into purely meteorological description.
  chosen_spanish_reading: Conservar la personificación de los montes y del abismo reaccionando ante Dios, sin convertir la escena en una mera descripción del clima.
  alternative_spanish_readings:
  - Reducir la imagen a un temblor geológico y una crecida de aguas
  - Explicar «sus manos» como simple metáfora de las olas
  rationale: 'El poema presenta una teofanía: la creación responde al aparecer de Yahvé. Mantener montes, abismo y manos personificados preserva la fuerza retórica y la tensión imaginativa del hebreo.'
  doctrine_reference: Translation philosophy §1, §3, §6
translation_notes:
  revision_awareness: La revisión disponible indica alta concordancia y ningún cambio sustancial necesario; se mantuvo la lectura poética-personificada del hebreo y se ajustó el español para lograr naturalidad sin perder la literalidad auditada.
  spanish_consistency_notes:
  - Se usó «Yahvé» implícitamente en la teofanía sin necesidad de repetir el nombre en este versículo.
  - «Abismo» traduce תְּהוֹם de manera consistente con el valor poético-cósmico del término.
  - Se conservó la metáfora de las manos del abismo, porque el hebreo la expresa explícitamente y la nota alternativa ya documenta la lectura metafórica de las olas.
