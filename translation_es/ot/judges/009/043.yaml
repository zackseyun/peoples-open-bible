translation:
  language: es
  text: Tomó al pueblo[a], lo dividió en tres grupos, y se puso al acecho en el campo. Cuando vio que el pueblo salía de la ciudad, se levantó contra ellos y los derribó.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “lo dividió en tres bandas/compañías”; literalmente, “en tres cabezas”, un modismo hebreo para divisiones o compañías.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקַּח אֶת־הָעָם
  english_pob_choice: He took the people
  chosen_spanish: Tomó al pueblo
  alternatives_spanish:
  - Tomó a la gente
  - Tomó a sus hombres
  lexicon: HALOT
  rationale: עָם significa literalmente “pueblo” o “gente”. En este contexto militar podría referirse a la fuerza de Abimelec, pero “al pueblo” conserva el sustantivo hebreo sin sobreespecificar más allá del texto.
- source_word: וַיֶּחֱצֵם לִשְׁלֹשָׁה רָאשִׁים
  english_pob_choice: divided them into three companies
  chosen_spanish: lo dividió en tres grupos
  alternatives_spanish:
  - lo dividió en tres compañías
  - lo dividió en tres bandas
  lexicon: HALOT
  rationale: חצה significa “dividir”. רָאשִׁים literalmente “cabezas” es un modismo para divisiones o compañías. “Tres grupos” comunica la división con naturalidad en español sin perder la fuerza del modismo.
- source_word: וַיֶּאֱרֹב בַּשָּׂדֶה
  english_pob_choice: and lay in wait in the field
  chosen_spanish: y se puso en emboscada en el campo
  alternatives_spanish:
  - y se tendió en espera en el campo
  - y aguardó en emboscada en el campo
  lexicon: HALOT
  rationale: אָרַב expresa el acto de tender una emboscada o permanecer al acecho. “Se puso en emboscada” conserva el sentido verbal y resulta natural en español; “en el campo” traduce בַּשָּׂדֶה de forma directa.
- source_word: וַיַּרְא וְהִנֵּה
  english_pob_choice: When he saw that
  chosen_spanish: Cuando vio que
  alternatives_spanish:
  - Y vio, y he aquí
  - Y al ver
  lexicon: HALOT
  rationale: La secuencia narrativa con וְהִנֵּה aporta viveza, pero en español moderno “Cuando vio que” transmite bien el cambio de escena sin calcar “he aquí” de manera mecánica.
- source_word: הָעָם יֹצֵא מִן־הָעִיר
  english_pob_choice: the people were coming out of the city
  chosen_spanish: el pueblo salía de la ciudad
  alternatives_spanish:
  - la gente salía de la ciudad
  - el pueblo estaba saliendo de la ciudad
  lexicon: HALOT
  rationale: El participio יֹצֵא da un matiz progresivo o en curso. “Salía” conserva ese aspecto de acción en desarrollo y sigue siendo idiomático en español.
- source_word: וַיָּקָם עֲלֵיהֶם
  english_pob_choice: he rose up against them
  chosen_spanish: se levantó contra ellos
  alternatives_spanish:
  - se alzó contra ellos
  - atacó contra ellos
  lexicon: HALOT
  rationale: קום עַל puede significar levantarse contra o atacar. “Se levantó contra ellos” mantiene la cercanía al hebreo y conserva el valor hostil del giro.
- source_word: וַיַּכֵּם
  english_pob_choice: and struck them down
  chosen_spanish: y los hirió
  alternatives_spanish:
  - y los golpeó
  - y los abatió
  lexicon: HALOT
  rationale: נכה abarca “golpear, herir, derrotar”. En este versículo, el contexto bélico permite “los hirió” como traducción sobria y fiel, sin añadir explícitamente “matar” cuando el verbo por sí solo no lo exige.
translation_notes:
  revision_awareness: 'Concordancia alta con el texto hebreo y con la auditoría inglesa: se conserva el sujeto militar implícito, el modismo de “tres cabezas” se resuelve de forma natural con nota, y no se intensifica el último verbo más allá de lo que נכה permite.'
  spanish_consistency_notes:
  - Se prefirió “pueblo” para mantener la correspondencia con עָם y evitar sustituirlo por “hombres” sin base explícita.
  - “Se puso en emboscada” conserva la imagen de ארב sin modernizarla a un simple “emboscó” que podría perder el matiz aspectual.
  - Se evitó “he aquí” en el cuerpo para una publicación más fluida, pero la nota mantiene la alternativa literal del hebreo.
  - El tono es narrativo y sobrio, adecuado para una versión interlinealmente auditable pero legible.
