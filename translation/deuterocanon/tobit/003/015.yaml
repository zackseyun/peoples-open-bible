theological_decisions:
- issue: How explicitly to identify the seven who have perished
  chosen_reading: Retain the implied wording 'seven have perished from me' rather than adding 'husbands' in the main text.
  alternative_readings:
  - Already seven husbands have perished from me
  - I have already lost seven husbands
  rationale: The immediate context in Tobit makes the referent clear, but the Greek here does not explicitly repeat 'husbands.' The main text preserves the source's terseness; the contextual clarification is better handled in a footnote.
  doctrine_reference: Translation philosophy §1, §5
- issue: How to render the difficult kinship/marriage clause
  chosen_reading: Translate closely as 'nor a near brother, nor does he have a son so that I might keep myself for him as a wife.'
  alternative_readings:
  - nor a close kinsman ... so that I should be kept for him as a wife
  - nor any male relative ... for whom I should preserve myself as wife
  rationale: The Greek is syntactically awkward and likely reflects Semitic family-law concerns. A close rendering avoids over-resolving the exact legal relationship while preserving the sense that her father's line lacks an heir or near male relative for whom she might remain available in marriage.
  doctrine_reference: Translation philosophy §3
