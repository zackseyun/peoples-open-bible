revisions:
- from: Mi ojo no te perdonará[a], ni tendré compasión; porque pondré tus caminos sobre ti, y tus abominaciones estarán dentro de ti[b]. Entonces sabrás que yo soy Yahvé.
  to: Mi ojo no te perdonará[a], ni tendré compasión; porque haré recaer tus caminos sobre ti, y tus abominaciones estarán dentro de ti[b]. Entonces sabrán que yo soy Yahvé.
  rationale: Se ajusta la fórmula de juicio a ‘haré recaer ... sobre ti’ para reflejar mejor el sentido retributivo de עָלַיִךְ אֶתֵּן y mejorar la naturalidad en español. Se corrige ‘sabrás’ a ‘sabrán’ para respetar el plural de וִידַעְתֶּם en el original. Se conservan ‘Yahvé’, ‘caminos’ y ‘abominaciones’, y se mantienen las notas léxicas pertinentes.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:41:12Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la mayor parte del hebreo: conserva el modismo con ‘ojo’, distingue el segundo verbo de compasión, mantiene ‘caminos’, ‘abominaciones’ y ‘Yahvé’. Sin embargo, hay dos problemas de fidelidad relevantes: (1) עָלַיִךְ אֶתֵּן se expresa mejor en español como ‘haré recaer/traeré ... sobre ti’ que como ‘pondré ... sobre ti’, porque aquí la fórmula es de retribución impuesta y ‘poner’ suena demasiado literal y menos idiomático; (2) וִידַעְתֶּם es plural en el hebreo y no debe singularizarse sin señal alguna. El español puede conservar el plural con ‘y sabrán’ o ‘entonces sabrán’, manteniendo la tensión con el singular femenino previo.'
  spanish_quality_summary: El español es generalmente claro y digno, pero ‘Mi ojo no te perdonará’ suena algo menos natural y ligeramente semánticamente desplazado frente al modismo de ‘no perdonar/no tener compasión’; además, ‘pondré tus caminos sobre ti’ resulta poco idiomático en español bíblico actual. ‘Haré recaer tus caminos sobre ti’ suena más natural y preserva mejor la fórmula judicial. El cierre en singular ‘sabrás’ rompe innecesariamente un rasgo del original.
  glossary_alignment: 'Alineación general buena con la terminología del proyecto: ‘Yahvé’ correcto para יהוה; ‘abominaciones’ correcto para תועבות; ‘caminos’ correcto para דרך. No hay conflictos con la glosa doctrinal central, salvo que la fórmula de retribución debe expresarse con mayor fuerza judicial en español y el plural de וִידַעְתֶּם debe respetarse.'
  issues:
  - severity: medium
    issue: ‘pondré tus caminos sobre ti’ es demasiado literal y poco natural
    rationale: La fórmula hebrea de juicio עָלַיִךְ אֶתֵּן comunica hacer recaer la propia conducta sobre la destinataria. ‘Pondré’ reproduce נתן de forma mecánica, pero en español no transmite tan bien la idea judicial de retribución. ‘Haré recaer’ o ‘traeré’ es más fiel al sentido contextual y más legible.
  - severity: high
    issue: El borrador cambia el plural hebreo וִידַעְתֶּם a singular ‘sabrás’
    rationale: Aunque el contexto personifica a la ciudad en singular femenino, el texto hebreo sí cambia a plural. El inglés POB no documenta una justificación textual suficiente para armonizarlo, y la racionalización del borrador contradice la primacía del original. Debe preservarse el plural en el texto español.
  - severity: low
    issue: ‘Mi ojo no te perdonará’ puede mejorarse a una formulación más natural sin perder la imagen
    rationale: La frase es comprensible, pero ‘Mi ojo no te perdonará’ suena algo rígida. ‘Mi ojo no te perdonará’ puede mantenerse; sin embargo, la nota debe explicar mejor la imagen de compasión/esparcimiento. No es un error grave, pero conviene pulir la nota y el resto del versículo para mayor naturalidad global.
