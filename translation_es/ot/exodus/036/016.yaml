translation:
  language: es
  text: Y unió cinco cortinas por separado[a], y seis cortinas por separado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse «aparte» o «por sí solas»; el sentido es que las cinco cortinas formaron un conjunto y las seis, otro.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְחַבֵּר
  english_pob_choice: joined
  chosen_spanish: unió
  alternatives_spanish:
  - juntó
  - enlazó
  - conectó
  lexicon: HALOT
  rationale: El hebreo חָבַר expresa unir o conectar. En español, «unió» comunica de manera natural la acción de ensamblar las piezas del tabernáculo sin añadir un detalle técnico no indicado por el texto.
- source_word: הַיְרִיעֹת
  english_pob_choice: the curtains
  chosen_spanish: las cortinas
  alternatives_spanish:
  - los paños
  - los lienzos
  - los paneles
  lexicon: HALOT
  rationale: En contexto tabernacular, יְרִיעָה designa grandes piezas de tela. «Cortinas» es el equivalente establecido y claramente comprensible en español; otras opciones son posibles pero menos naturales o más interpretativas.
- source_word: לְבָד
  english_pob_choice: by themselves
  chosen_spanish: aparte
  alternatives_spanish:
  - separadamente
  - por sí solas
  - aisladas
  lexicon: HALOT
  rationale: 'לְבָד señala separación o agrupación distinta. «Aparte» reproduce bien la idea de dos conjuntos diferenciados: cinco como un grupo y seis como otro, sin sobreexplicar el mecanismo.'
- source_word: חֲמֵשׁ
  english_pob_choice: five
  chosen_spanish: cinco
  alternatives_spanish:
  - —
  lexicon: HALOT
  rationale: Número cardinal directo.
- source_word: שֵׁשׁ
  english_pob_choice: six
  chosen_spanish: seis
  alternatives_spanish:
  - —
  lexicon: HALOT
  rationale: Número cardinal directo.
translation_notes:
  revision_awareness: 'La revisión inglesa reciente eliminó una repetición innecesaria de «of the» para mantener un inglés más natural sin perder el sentido hebreo. La redacción española sigue ese mismo principio de naturalidad controlada: conserva la separación de los dos grupos de cortinas y evita añadir elementos no presentes en el hebreo.'
  spanish_consistency_notes:
  - Se mantiene «cortinas» para יְרִיעֹת, en línea con el uso POB en contexto del tabernáculo.
  - Se traduce לְבָד con un adverbio de separación («aparte») para preservar la tensión entre agrupación y distinción.
  - La coordinación de los dos grupos queda explícita en la repetición de «y ... aparte», reflejando la estructura hebrea de dos conjuntos diferenciados.
