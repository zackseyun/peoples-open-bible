    text: 'Literalmente: «buscar herir con la lanza a David y a la pared»; la idea es que Saúl quería clavar a David contra la pared con la lanza.'
    reason: lexical_alternative
  revision_rationale: Se ajusta וַיִּפְטַר a un español que exprese evasión inmediata ('se le escapó') en vez de simple apartamiento. Se reemplaza 'clavó la lanza' por 'golpeó la lanza contra la pared' para respetar mejor la revisión inglesa más literal sobre la repetición de נכה. También se simplifica el estilo eliminando pronombres innecesarios y se suaviza la nota al pie para evitar una imagen excesivamente fuerte.
