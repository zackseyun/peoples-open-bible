translation:
  language: es
  text: Pero si su marido se mantiene en silencio de día en día, entonces confirma todos sus votos o todas sus obligaciones[a] que recaen sobre ella; las ha confirmado, porque guardó silencio el día en que oyó.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «todos sus compromisos vinculantes»; el término hebreo se refiere a compromisos que obligan a la persona que los hace.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַחֲרֵשׁ יַחֲרִישׁ
  english_pob_choice: indeed keeps silent
  chosen_spanish: se mantiene en silencio
  alternatives_spanish:
  - guarda silencio en verdad
  - permanece completamente en silencio
  lexicon: HALOT
  rationale: 'La combinación de infinitivo absoluto + verbo finito intensifica la acción. En español, «se mantiene en silencio» conserva la idea de persistencia enfática sin sonar artificial. El contexto es jurídico: silencio que implica no objeción.'
- source_word: אִישָׁהּ
  english_pob_choice: her husband
  chosen_spanish: su marido
  alternatives_spanish:
  - su esposo
  - su hombre
  lexicon: HALOT
  rationale: En este contexto legal matrimonial, «su marido» es claro, natural y preciso en español. «Esposo» sería posible, pero «marido» refleja mejor el registro jurídico del pasaje.
- source_word: מִיּוֹם אֶל יוֹם
  english_pob_choice: from day to day
  chosen_spanish: de día en día
  alternatives_spanish:
  - día tras día
  - de un día a otro
  lexicon: HALOT
  rationale: La locución hebrea expresa continuidad sucesiva. «De día en día» conserva bien la forma idiomática y la idea de silencio mantenido a lo largo del tiempo.
- source_word: וְהֵקִים
  english_pob_choice: then he confirms
  chosen_spanish: entonces confirma
  alternatives_spanish:
  - entonces establece
  - entonces ratifica
  lexicon: HALOT
  rationale: 'En Hifil, el verbo tiene fuerza legal: hacer que el voto permanezca en vigor. «Confirma» comunica mejor esa función jurídica en español que «establece».'
- source_word: נְדָרֶיהָ
  english_pob_choice: her vows
  chosen_spanish: todos sus votos
  alternatives_spanish:
  - todos sus votos votivos
  - todos sus votos hechos
  lexicon: HALOT
  rationale: «Votos» es el equivalente directo y tradicional para נדר en este contexto. Se conserva el sentido de compromiso religioso/legal.
- source_word: אֱסָרֶיהָ
  english_pob_choice: her obligations
  chosen_spanish: todas sus obligaciones
  alternatives_spanish:
  - todos sus vínculos
  - todos sus compromisos vinculantes
  lexicon: HALOT
  rationale: El sustantivo deriva de la idea de «atar» y designa compromisos que vinculan a la persona. «Obligaciones» expresa bien la fuerza legal en un español legible; mantiene la alternativa conceptual de compromisos vinculantes.
- source_word: אֲשֶׁר עָלֶיהָ
  english_pob_choice: that are upon her
  chosen_spanish: que están sobre ella
  alternatives_spanish:
  - que la obligan
  - que recaen sobre ella
  lexicon: HALOT
  rationale: La traducción conserva la metáfora hebrea de algo «puesto sobre» ella. «Que están sobre ella» mantiene la imagen jurídica sin sobreinterpretarla.
- source_word: הֵקִים אֹתָם
  english_pob_choice: he has confirmed them
  chosen_spanish: los ha confirmado
  alternatives_spanish:
  - los confirmó
  - los ha ratificado
  lexicon: HALOT
  rationale: El perfecto resume el efecto legal de su silencio previo. «Los ha confirmado» refleja bien el estado resultante.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: 'La relación es causal: la confirmación se debe a que guardó silencio cuando oyó. «Porque» es la opción más directa y clara.'
- source_word: הֶחֱרִשׁ לָהּ
  english_pob_choice: he kept silent on the day he heard
  chosen_spanish: guardó silencio
  alternatives_spanish:
  - no dijo nada
  - se calló
  lexicon: HALOT
  rationale: Se preserva el motivo legal del silencio como aprobación tácita. Se evita una calca demasiado pesada; el sentido queda explícito por el contexto y por la cláusula temporal siguiente.
- source_word: בְּיוֹם שָׁמְעוֹ
  english_pob_choice: on the day he heard
  chosen_spanish: el día que lo oyó
  alternatives_spanish:
  - el día en que lo oyó
  - cuando lo oyó
  lexicon: HALOT
  rationale: La expresión temporal hebrea queda bien en español con una cláusula natural y fiel. El pronombre «lo» recoge el contenido oído, sin añadir especificación no presente en el hebreo.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca la revisión inglesa más reciente: se evita repetir innecesariamente una referencia dativa equivalente a «a ella» después de «guardar silencio», y se mantiene la lógica legal de confirmación por silencio en el mismo día de oír. El español conserva el paralelismo entre votos y obligaciones, y la fórmula temporal sucesiva.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el tetragrámaton aparece explícitamente; este versículo no lo contiene.
  - Se mantiene «votos» para נדר y «obligaciones» para אֱסָרִים, siguiendo la distinción léxica documentada.
  - «Marido» se usa por el contexto jurídico matrimonial; no se sustituye por «esposo» para no perder el registro legal.
  - La nota al pie marca la alternativa léxica relevante sin introducir interpretaciones doctrinales ajenas al texto.
