id: 2CO.8.23
reference: '2 Corinthians 8:23'
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: εἴτε ὑπὲρ Τίτου, κοινωνὸς ἐμὸς καὶ εἰς ὑμᾶς συνεργός· εἴτε ἀδελφοὶ ἡμῶν, ἀπόστολοι ἐκκλησιῶν, δόξα Χριστοῦ.
base_translation:
  language: en
  yaml_path: translation/nt/2_corinthians/008/023.yaml
  text: As for Titus[a], he is my partner and fellow worker for you; as for our brothers, they are messengers of the churches[b], the glory of Messiah.
translation:
  language: ko
  text: 디도로 말하자면, 그는 나의 동역자이며 여러분을 위한 함께 일하는 자입니다. 우리 형제들로 말하자면, 그들은 교회들의 사자[a]이며 메시아의 영광입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 헬라어 ἀπόστολοι는 일반적으로 「보냄받은 자」, 「사절」을 뜻하며, 여기서는 교회의 공식 대표자를 가리킨다.
    reason: lexical_alternative
lexical_decisions:
- source_word: κοινωνός
  english_pob_choice: partner
  chosen_korean: 동역자
  lexicon: BDAG
  rationale: 명사형. 「동역자」가 사역적 결속을 가장 잘 담는다.
  alternatives_korean:
  - 동참자
- source_word: συνεργός
  english_pob_choice: fellow worker
  chosen_korean: 함께 일하는 자
  lexicon: BDAG
  rationale: 바울 표준어. 앞 κοινωνός와 구별을 두기 위해 「함께 일하는 자」로 풀어 옮긴다.
  alternatives_korean:
  - 동역자
- source_word: ἀπόστολοι
  english_pob_choice: messengers
  chosen_korean: 사자
  lexicon: BDAG
  rationale: 여기서는 12사도가 아닌 교회의 파송 대표자를 가리키므로 「사자」가 적절하다. 「사도」는 칭호적 무게가 과하다.
  alternatives_korean:
  - 사도
  - 대표
  - 사절
- source_word: δόξα Χριστοῦ
  english_pob_choice: glory of Messiah
  chosen_korean: 메시아의 영광
  lexicon: BDAG
  rationale: Χριστός를 칭호로 「메시아」로 옮긴다.
  alternatives_korean:
  - 그리스도의 영광
