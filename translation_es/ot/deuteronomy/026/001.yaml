translation:
  language: es
  text: Y cuando entres en la tierra que Yahvé tu Dios te da como herencia[a], y la tomes en posesión y habites en ella[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como heredad»; aquí נַחֲלָה tiene el matiz de una porción territorial recibida de parte de Dios.
    reason: lexical_alternative
  - marker: b
    text: O «vivas en ella» o «te establezcas en ella».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה כִּי
  english_pob_choice: And when
  chosen_spanish: Y cuando
  alternatives_spanish:
  - Y sucederá que cuando
  - Y será que cuando
  lexicon: HALOT
  rationale: La fórmula hebrea introduce una circunstancia futura de manera idiomática. «Y cuando» preserva el valor temporal sin volver la frase artificial en español.
- source_word: תָבֹוא
  english_pob_choice: you come
  chosen_spanish: entres
  alternatives_spanish:
  - vengas
  - entres
  lexicon: HALOT
  rationale: El verbo בוא con la preposición de movimiento hacia la tierra se vierte naturalmente como «entres»; conserva el segundo singular y la idea de ingreso al territorio.
- source_word: אֶל הָאָרֶץ
  english_pob_choice: into the land
  chosen_spanish: en la tierra
  alternatives_spanish:
  - a la tierra
  - dentro de la tierra
  lexicon: HALOT
  rationale: En español, con «entrar» la preposición se expresa con naturalidad como «en». «Tierra» mantiene la referencia territorial de la הארץ sin perder legibilidad.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se sigue la convención POB de traducir el Tetragrámaton con el nombre divino en vez de un título sustitutivo. En español, «Yahvé» es la forma idiomática correspondiente al mismo principio de transliteración.
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu Dios
  lexicon: HALOT
  rationale: El sufijo de segunda persona singular se refleja directamente como «tu Dios», preservando el tono de alianza personal del texto.
- source_word: נֹתֵן לְךָ
  english_pob_choice: is giving you
  chosen_spanish: te da
  alternatives_spanish:
  - te está dando
  - te concede
  lexicon: HALOT
  rationale: El participio hebreo expresa una acción en curso o inminente. En español, «te da» es una forma natural que conserva la dinámica del don divino sin sobrerrepresentar el aspecto progresivo.
- source_word: נַחֲלָה
  english_pob_choice: as an inheritance
  chosen_spanish: como heredad
  alternatives_spanish:
  - como herencia
  - como posesión heredada
  lexicon: HALOT
  rationale: «Heredad» reproduce bien el campo semántico de נַחֲלָה en contexto territorial y de pacto, y evita una lectura demasiado general de simple propiedad.
- source_word: וִירִשְׁתָּהּ
  english_pob_choice: and you take possession of it
  chosen_spanish: la tomes en posesión
  alternatives_spanish:
  - la poseas
  - la heredes
  lexicon: HALOT
  rationale: ירשׁ en contextos de tierra expresa ocupar/tomar posesión. «Tomes en posesión» mantiene la fuerza activa de la acción y distingue esta etapa de la heredad ya mencionada.
- source_word: וְיָשַׁבְתָּ בָּהּ
  english_pob_choice: and live in it
  chosen_spanish: habites en ella
  alternatives_spanish:
  - vivas en ella
  - te establezcas en ella
  lexicon: HALOT
  rationale: ישׁב puede significar habitar, vivir o establecerse. «Habites en ella» es digno y claro en español bíblico contemporáneo, y conserva el sentido de residencia asentada.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: La política POB preserva el nombre divino en lugar de sustituirlo por un título. «Yahvé» mantiene esa decisión en español con forma reconocible y reverente.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Secuencia teológica entre don divino y ocupación humana de la tierra
  english_pob_reading: Distinguish God's gift ('is giving you as an inheritance') from Israel's subsequent action ('you take possession of it and live in it')
  chosen_spanish_reading: Distinguir el don de Dios («te da como heredad») de la acción posterior del pueblo («la tomes en posesión y habites en ella»).
  alternative_spanish_readings:
  - Concentrar todo en la idea de recibir la tierra
  - Unir posesión y residencia en una sola idea
  rationale: 'El hebreo presenta una progresión: entrar, recibir, poseer y habitar. La traducción conserva esa secuencia para no diluir ni la iniciativa divina ni la respuesta humana.'
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #3'
translation_notes:
  revision_awareness: La revisión más reciente quedó sin cambios (high_agreement, agree); por eso no se introducen ajustes interpretativos nuevos, sino una adaptación cuidadosa al español que conserva el mismo trazado lexical y teológico del POB en inglés.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה conforme a la terminología del proyecto.
  - «Heredad» y la nota alternativa «herencia» preservan la tensión entre don recibido y posesión territorial.
  - «Tomes en posesión» distingue la acción de ירשׁ de la heredad previa, evitando fusionar ambos conceptos.
  - «Habites en ella» conserva el matiz de residencia estable sin forzar un tecnicismo eclesiástico.
  - El texto principal evita sustituciones tradicionales como «SEÑOR» para no ocultar el nombre divino.
