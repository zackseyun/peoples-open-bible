translation:
  language: es
  text: Porque estaban celebrando o bien ritos infanticidas[a], o misterios secretos[b], o celebraciones desenfrenadas de ordenanzas extrañas[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «ritos de matanza de niños» o «ritos de asesinato de niños». El compuesto griego es fuertemente condenatorio.'
    reason: lexical_alternative
  - marker: b
    text: 'También: «ritos secretos». El término griego usa la palabra técnica para observancias de cultos mistéricos.'
    reason: lexical_alternative
  - marker: c
    text: 'También: «celebraciones desenfrenadas de costumbres extrañas». La expresión concentra la idea de festejos tumultuosos marcados por prácticas anómalas o perversas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τεκνοφόνους
  english_pob_choice: child-killing
  chosen_spanish: matar niños
  alternatives_spanish:
  - asesinato de niños
  - rituales de matar niños
  - infanticidas
  lexicon: LSJ
  rationale: El compuesto griego une 'niño' y 'muerte/matar' con una fuerza muy condenatoria. En español, 'matar niños' comunica esa violencia de forma directa y natural, sin añadir tecnicismo ni suavizar el horror.
- source_word: τελετὰς
  english_pob_choice: rites
  chosen_spanish: ritos
  alternatives_spanish:
  - ceremonias
  - rituales
  - iniciaciones
  lexicon: LSJ
  rationale: En contexto religioso, τελετή alude a observancias rituales. 'Ritos' es claro, sobrio y compatible con el tono cultual del pasaje.
- source_word: κρύφια
  english_pob_choice: secret
  chosen_spanish: secretos
  alternatives_spanish:
  - ocultos
  - encubiertos
  lexicon: LSJ
  rationale: El adjetivo expresa algo escondido o clandestino. 'Secretos' funciona naturalmente con 'misterios' en español y conserva la idea de ocultamiento.
- source_word: μυστήρια
  english_pob_choice: mysteries
  chosen_spanish: misterios
  alternatives_spanish:
  - ritos secretos
  - misterios rituales
  lexicon: LSJ
  rationale: El término puede referirse técnicamente a cultos mistéricos paganos. 'Misterios' preserva ese matiz histórico-religioso sin explicarlo de más en el texto principal; el adjetivo 'secretos' ayuda a fijar el sentido.
- source_word: ἐμμανεῖς
  english_pob_choice: frenzied
  chosen_spanish: desenfrenadas
  alternatives_spanish:
  - frenéticas
  - furiosas
  - maníacas
  lexicon: LSJ
  rationale: El griego describe un estado de manía o frenesí. 'Desenfrenadas' comunica bien la pérdida de control y mantiene un registro natural en español.
- source_word: ἐξάλλων
  english_pob_choice: strange
  chosen_spanish: extrañas
  alternatives_spanish:
  - raras
  - bizarra
  - insólitas
  lexicon: LSJ
  rationale: El término apunta a algo desviado de lo normal o propio. 'Extrañas' es la opción más clara y menos ambigua en español moderno.
- source_word: θεσμῶν
  english_pob_choice: customs
  chosen_spanish: ordenanzas
  alternatives_spanish:
  - costumbres
  - normas
  - usos
  lexicon: LSJ
  rationale: Aunque el término puede denotar costumbres o usos, el audit trail inglés retuvo un tono más formal con 'ordinances'. 'Ordenanzas' refleja mejor esa formalidad y deja oír el matiz de prácticas reguladas o establecidas, sin convertirlo en lenguaje eclesiástico fijo.
- source_word: κώμους
  english_pob_choice: revelries
  chosen_spanish: orgías
  alternatives_spanish:
  - juergas
  - revelries
  - carousales
  lexicon: LSJ
  rationale: κῶμος señala celebraciones desordenadas, a menudo con exceso y desenfreno moral. 'Orgías' transmite ese carácter intenso, aunque con un registro fuerte; se eligió por su capacidad de expresar el tono del pasaje en español bíblico contemporáneo.
- source_word: ἄγοντες
  english_pob_choice: were conducting
  chosen_spanish: estaban realizando
  alternatives_spanish:
  - iban haciendo
  - celebraban
  - llevaban a cabo
  lexicon: LSJ
  rationale: El participio indica que practicaban activamente esas acciones. 'Estaban realizando' suena natural en español y conserva el aspecto progresivo/descriptivo del griego.
theological_decisions:
- issue: μυστήρια en contexto pagano
  english_pob_reading: secret mysteries
  chosen_spanish_reading: misterios secretos
  alternative_spanish_readings:
  - ritos secretos
  - ritos mistéricos secretos
  rationale: En este pasaje el término no tiene sentido cristiano positivo, sino cultual pagano. 'Misterios secretos' mantiene la categoría religiosa histórica y deja visible que eran observancias ocultas; no se sustituye por un lenguaje más interpretativo que borre el término técnico.
  doctrine_reference: Translation philosophy §1, §6
- issue: Fuerza condenatoria de τεκνοφόνους
  english_pob_reading: child-killing rites
  chosen_spanish_reading: ritos de matar niños
  alternative_spanish_readings:
  - ritos infanticidas
  - ritos de asesinato de niños
  rationale: La expresión debe conservar la severidad moral del griego sin amplificar más allá del dato textual. 'Matar niños' comunica la violencia de forma directa; el giro completo mantiene el vínculo con 'ritos' y evita suavizarlo.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: Se atendió la revisión final que ajustó la frase inglesa de 'with strange customs' a 'of strange ordinances' para reflejar mejor ἐξάλλων θεσμῶν modificando κώμους. La versión española opta por 'orgías de ordenanzas extrañas' para mantener esa relación sintáctica y el registro formal, sin perder la violencia semántica del conjunto.
  spanish_consistency_notes:
  - Se emplea 'Yahvé' no porque aparezca en este versículo, sino como norma del proyecto cuando corresponda.
  - Se prefirió 'misterios' para μυστήρια por su valor técnico-religioso; el adjetivo 'secretos' evita que se lea como un uso cristiano posterior.
  - '''Ordenanzas'' se escogió aquí por la pauta auditada de formalidad en inglés, aunque ''costumbres'' también sería posible en español; la nota lo deja explícito.'
  - '''Orgías'' refleja el tono de κώμους con una carga fuerte en español; se reconoce en nota la alternativa más neutra ''revelries/juergas'' para transparencia.'
