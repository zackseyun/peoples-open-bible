translation:
  language: es
  text: 'Y Moisés les dijo: «Si hacen este asunto, si se arman[a] delante de Yahvé[b] para la batalla»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «si se equipan», «si se presentan armados» o «si se alistan». El verbo hebreo tiene un matiz militar de preparación para la batalla.
    reason: lexical_alternative
  - marker: b
    text: Hebreo «delante de Yahvé», indicando que su acción militar se realiza en su presencia y bajo su autoridad.
    reason: cultural_note
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And ... said
  chosen_spanish: Y ... les dijo
  alternatives_spanish:
  - Entonces ... les dijo
  lexicon: HALOT
  rationale: La forma narrativa encadenada introduce el siguiente hecho en la secuencia; «Y ... les dijo» conserva ese flujo sin forzar un valor temporal más fuerte que el del hebreo.
- source_word: אֲלֵיהֶם
  english_pob_choice: to them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  lexicon: HALOT
  rationale: El dativo pronominal se expresa naturalmente en español con «les»; en el contexto ya queda claro a quiénes se dirige Moisés.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  alternatives_spanish:
  - Moisés
  lexicon: HALOT
  rationale: Nombre propio bíblico estándar en español.
- source_word: אִם ... תַּעֲשׂוּן
  english_pob_choice: If you will do
  chosen_spanish: Si hacen
  alternatives_spanish:
  - Si harán
  - Si hacen ustedes
  lexicon: HALOT
  rationale: La condición futura del hebreo puede sonar artificial con «si harán» en español. «Si hacen» mantiene la fuerza condicional y la referencia prospectiva sin calco mecánico.
- source_word: אֶת הַדָּבָר הַזֶּה
  english_pob_choice: this thing
  chosen_spanish: esta cosa
  alternatives_spanish:
  - este asunto
  - esta cosa/este asunto
  lexicon: HALOT
  rationale: דָּבָר admite «cosa», «asunto» o «palabra». Aquí el referente es la propuesta concreta que acaban de presentar, por lo que «esta cosa» mantiene el alcance amplio y concreto del hebreo.
- source_word: אִם תֵּחָלְצוּ
  english_pob_choice: if you will arm yourselves
  chosen_spanish: si se arman
  alternatives_spanish:
  - si se equipan
  - si se preparan para la batalla
  - si se presentan armados
  lexicon: HALOT
  rationale: En contexto militar, חלץ en nifal puede significar alistarse/armarse para la guerra. «Se arman» conserva la acción militar sin añadir más de lo que el hebreo exige.
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - ante Yahvé
  - en presencia de Yahvé
  lexicon: HALOT
  rationale: Se mantiene el nombre divino como «Yahvé» según el estándar del proyecto. «Delante de» refleja el valor espacial y relacional de לפני, no solo una ubicación física sino la actuación bajo su mirada y autoridad.
- source_word: לַמִּלְחָמָה
  english_pob_choice: for battle
  chosen_spanish: para la batalla
  alternatives_spanish:
  - para la guerra
  - para combatir
  lexicon: HALOT
  rationale: מִלְחָמָה puede ser «guerra» o «batalla». «Batalla» suena natural en español y coincide con la revisión inglesa que prefirió «battle» por adecuación contextual.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: Se sigue el estándar del proyecto para el Tetragrámaton. No se enmascara con «SEÑOR», y se preserva la forma reverencial y reconocible en español «Yahvé» para mantener el nombre del pacto en el texto principal.
  doctrine_reference: 'DOCTRINE.md: יְהוָה / YHWH → Yahvé'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que prefirió «for battle» en lugar de «for the war» por mayor naturalidad. En español, eso favorece «para la batalla» sobre «para la guerra». También se mantuvo el marco auditado del original hebreo, especialmente el sentido militar de חלץ y la presencia del nombre divino יְהוָה.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה.
  - Se traduce el matiz militar de חלץ sin sobreinterpretarlo como mera preparación general.
  - «Esta cosa» conserva el alcance amplio de דבר en este contexto, evitando reducirlo indebidamente a «palabra» o fijarlo solo como «asunto».
  - Se evita el giro tradicional «SEÑOR» para no ocultar el nombre divino, conforme a la política del proyecto.
