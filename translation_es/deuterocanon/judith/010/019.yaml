translation:
  language: es
  text: 'Y se maravillaron de su hermosura, y por causa de ella se maravillaron de los hijos de Israel[a]; y cada uno dijo a su prójimo: «¿Quién despreciará a este pueblo, que tiene entre sí mujeres así? Porque no es bueno que quede de entre ellos ni siquiera un hombre[b], pues los que queden podrán burlar con astucia a toda la tierra».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los israelitas». Griego: «los hijos de Israel».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «los que queden vivos podrán burlar con astucia al mundo entero».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐθαύμαζον
  english_pob_choice: they marveled
  chosen_spanish: se maravillaron
  alternatives_spanish:
  - se asombraron
  - admiraron
  lexicon: BDAG
  rationale: El imperfecto repetido expresa una reacción continua de asombro/admiración. «Se maravillaron» conserva ese matiz sin volverse demasiado coloquial y permite mantener el paralelismo del texto griego.
- source_word: κάλλει
  english_pob_choice: beauty
  chosen_spanish: hermosura
  alternatives_spanish:
  - belleza
  - atractivo
  lexicon: LSJ
  rationale: «Hermosura» funciona bien en español para una belleza visible y atractiva en este contexto narrativo; evita una posible frialdad técnica de «belleza» y no sobretraduce.
- source_word: τοὺς υἱοὺς Ἰσραήλ
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Jacob
  lexicon: LSJ
  rationale: Se conserva la forma masculina tradicional del griego, con la misma fuerza colectiva. «Hijos de Israel» mantiene el lenguaje formal y la huella del original.
- source_word: ἀπʼ αὐτῆς
  english_pob_choice: because of her
  chosen_spanish: por causa de ella
  alternatives_spanish:
  - a causa de ella
  - por ella
  lexicon: BDAG
  rationale: La preposición expresa motivo/ocasión. «Por causa de ella» refleja de manera directa la relación causal de su asombro respecto de Judith.
- source_word: καταφρονήσει
  english_pob_choice: would despise
  chosen_spanish: despreciará
  alternatives_spanish:
  - despreciaría
  - mirará con desprecio
  lexicon: BDAG
  rationale: El verbo denota desdén o menosprecio. En esta pregunta retórica, el futuro simple en español transmite bien la fuerza del griego sin necesidad de condicional.
- source_word: λαοῦ
  english_pob_choice: people
  chosen_spanish: pueblo
  alternatives_spanish:
  - gente
  - nación
  lexicon: BDAG
  rationale: «Pueblo» es la equivalencia más natural para λαός en un referente colectivo de Israel y conserva el tono bíblico sin perder claridad.
- source_word: γυναῖκας τοιαύτας
  english_pob_choice: such women
  chosen_spanish: mujeres tales
  alternatives_spanish:
  - mujeres como estas
  - mujeres de esta clase
  lexicon: LSJ
  rationale: La colocación «mujeres tales» reproduce la valoración del adjetivo sin volverla pesada. La inversión mantiene un registro bíblico y no agrega matices ausentes en el griego.
- source_word: οὐ καλόν ἐστιν
  english_pob_choice: it is not good
  chosen_spanish: no es bueno
  alternatives_spanish:
  - no conviene
  - no es adecuado
  lexicon: BDAG
  rationale: Se conserva el juicio amplio del griego, que en contexto es principalmente estratégico pero no exclusivamente moral. «No es bueno» es simple y fiel.
- source_word: ὑπολειπέσθαι
  english_pob_choice: to leave
  chosen_spanish: que quede
  alternatives_spanish:
  - que permanezca
  - que se deje
  lexicon: LSJ
  rationale: El infinitivo expresa el hecho de quedar/restar. En español, «que quede» comunica de forma natural la idea de que permanezca uno solo entre ellos, sin añadir explícitamente «vivo» que el griego deja implícito.
- source_word: ἄνδρα ἕνα
  english_pob_choice: even one man
  chosen_spanish: ni siquiera un hombre
  alternatives_spanish:
  - ni un solo hombre
  - un hombre siquiera
  lexicon: BDAG
  rationale: Se conserva la fuerza enfática de ἕνα. «Ni siquiera un hombre» es idiomático en español y mantiene el valor de exclusión total del original.
- source_word: οἱ ἀφεθέντες
  english_pob_choice: those who are left
  chosen_spanish: los que queden
  alternatives_spanish:
  - los que queden vivos
  - los que permanezcan
  lexicon: BDAG
  rationale: El participio pasivo apunta a los que quedan/son dejados atrás. En este contexto militar, «los que queden» es natural y deja que el sentido de supervivencia venga dado por el contexto.
- source_word: δυνήσονται κατασοφίσασθαι
  english_pob_choice: would be able to outwit
  chosen_spanish: podrán superar con astucia
  alternatives_spanish:
  - podrán engañar con astucia
  - podrán ser más astutos que
  lexicon: LSJ
  rationale: La idea es vencer mediante sagacidad o astucia, no simplemente engañar. «Superar con astucia» preserva el componente de superioridad intelectual/circunstancial y evita reducir el verbo a mera trampa.
- source_word: πᾶσαν τὴν γῆν
  english_pob_choice: the whole earth
  chosen_spanish: toda la tierra
  alternatives_spanish:
  - el mundo entero
  - toda la tierra
  lexicon: LSJ
  rationale: Se conserva la amplitud hiperbólica del griego con «toda la tierra», sin domesticarla a «el mundo entero» si el texto quiere sonar grandioso y total.
theological_decisions:
- issue: Lenguaje colectivo masculino aplicado a Israel
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - el pueblo de Israel
  rationale: Se mantiene la forma masculina del original en lugar de neutralizarla, porque el griego usa una expresión idiomática concreta y el proyecto prioriza la precisión del lenguaje de fuente aun cuando el referente sea colectivo.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Retención del singular masculino en el juicio estratégico
  english_pob_reading: even one man
  chosen_spanish_reading: ni siquiera un hombre
  alternative_spanish_readings:
  - ni una sola persona
  - ni un hombre
  rationale: El griego dice explícitamente ἄνδρα ἕνα. Dado que el contexto es bélico y habla de supervivientes masculinos, se preserva el masculino sin generalizarlo.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: La versión griega de Swete coincide bien con el contexto auditado en inglés; no se identificaron variantes textuales relevantes ni cambios editoriales posteriores que requirieran ajuste. Se ha preservado la repetición de ἐθαύμαζον, el matiz causal de ἀπʼ αὐτῆς y la hipérbole final de πᾶσαν τὴν γῆν.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se ha conservado el paralelismo de las dos cláusulas con «se maravillaron» para reflejar la repetición del griego.
  - «Los hijos de Israel» y «un hombre» preservan la forma masculina del original según la política de precisión del proyecto.
