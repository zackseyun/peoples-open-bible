translation:
  language: es
  text: Y después de esto cayó sobre su lecho[a], y supo que estaba muriendo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cayó en la cama» o, más idiomáticamente, «se fue a la cama». El griego conserva la expresión más física.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μετὰ ταῦτα
  english_pob_choice: after these things
  chosen_spanish: después de estas cosas
  alternatives_spanish:
  - después
  - luego de esto
  - tras esto
  lexicon: LSJ
  rationale: La expresión temporal griega se conserva de manera cercana y natural en español. 'Después de estas cosas' mantiene la secuencia narrativa y refleja bien el valor de transición del original, sin forzar una paráfrasis.
- source_word: ἔπεσεν
  english_pob_choice: fell
  chosen_spanish: cayó
  alternatives_spanish:
  - se acostó
  - se dejó caer
  - se desplomó
  lexicon: LSJ
  rationale: El verbo griego es concreto y físico. 'Cayó' conserva esa imagen mejor que una traducción interpretativa como 'se acostó', y evita exagerar la situación con 'se desplomó'.
- source_word: ἐπὶ τὴν κοίτην
  english_pob_choice: upon his bed
  chosen_spanish: sobre su lecho
  alternatives_spanish:
  - sobre la cama
  - en su lecho
  - a su cama
  lexicon: LSJ
  rationale: κοίτη puede significar cama o lecho; 'lecho' funciona bien en un registro bíblico y solemne. El posesivo 'su' sigue la naturalización idiomática que también hace el inglés, aunque no esté explícita en el griego.
- source_word: ἔγνω
  english_pob_choice: knew
  chosen_spanish: supo
  alternatives_spanish:
  - conoció
  - se dio cuenta
  - percibió
  lexicon: LSJ
  rationale: El aoristo de γινώσκω puede expresarse como conocimiento obtenido o reconocimiento de una realidad. 'Supo' es breve, sobrio y fiel al giro narrativo, sin añadir una explicación emocional que el griego no exige.
- source_word: ἀποθνήσκει
  english_pob_choice: he was dying
  chosen_spanish: estaba muriendo
  alternatives_spanish:
  - moría
  - iba a morir
  - estaba por morir
  lexicon: LSJ
  rationale: El presente griego aquí indica proceso en curso. 'Estaba muriendo' reproduce bien ese aspecto progresivo y conserva la solemnidad del enunciado mejor que una solución futura o meramente puntual.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto griego de Swete 1909 y el criterio de la POB en inglés para conservar la imagen física de ἔπεσεν/ἐπὶ τὴν κοίτην y el aspecto progresivo de ἀποθνήσκει. No se detectaron revisiones sustantivas posteriores en el expediente auditado.
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico claro y moderno, evitando calcos innecesarios pero sin suavizar la fuerza concreta del griego.
  - '''Lecho'' se eligió como equivalente estilísticamente digno de κοίτη, mientras la nota preserva la alternativa más literal ''cama''.'
  - '''Supo'' transmite el reconocimiento repentino del estado de morir sin introducir matices no presentes en el griego.'
