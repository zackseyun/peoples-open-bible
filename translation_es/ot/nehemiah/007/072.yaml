translation:
  language: es
  text: Los sacerdotes, los levitas, los guardianes de las puertas, los cantores, algunos del pueblo, los servidores del templo[a], y todo Israel habitaban en sus ciudades. Y cuando llegó el séptimo mes, los hijos de Israel[b] estaban en sus ciudades.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los netineos», transliteración tradicional del nombre de esta clase de servidores del templo.
    reason: lexical_alternative
  - marker: b
    text: O «los israelitas» o «el pueblo de Israel». El hebreo dice «los hijos de Israel».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּשְׁבוּ
  english_pob_choice: lived
  chosen_spanish: vivían
  alternatives_spanish:
  - habitaban
  - residían
  lexicon: HALOT
  rationale: ישׁב puede significar sentarse, morar o vivir. En este contexto de reasentamiento, «vivían» comunica residencia estable de manera natural en español y conserva el sentido básico de habitar.
- source_word: הַכֹּהֲנִים
  english_pob_choice: the priests
  chosen_spanish: los sacerdotes
  alternatives_spanish:
  - los presbíteros
  lexicon: HALOT
  rationale: Es el equivalente normal y claro de כהנים en español bíblico contemporáneo.
- source_word: הַלְוִיִּם
  english_pob_choice: the Levites
  chosen_spanish: los levitas
  alternatives_spanish:
  - los levíticos
  lexicon: HALOT
  rationale: Designación tribal y cultual estándar; «levitas» es la forma natural en español.
- source_word: הַשּׁוֹעֲרִים
  english_pob_choice: the gatekeepers
  chosen_spanish: los porteros
  alternatives_spanish:
  - los guardianes de la puerta
  lexicon: HALOT
  rationale: El término refiere a quienes custodiaban las puertas. «Porteros» es fiel y tradicional en español bíblico, sin perder el matiz funcional.
- source_word: הַמְשֹׁרְרִים
  english_pob_choice: the singers
  chosen_spanish: los cantores
  alternatives_spanish:
  - los cantantes
  - los músicos
  lexicon: HALOT
  rationale: El participio designa a quienes cantaban en el servicio del templo. «Cantores» es preciso y natural en registro bíblico.
- source_word: וּמִן הָעָם
  english_pob_choice: some of the people
  chosen_spanish: algunos del pueblo
  alternatives_spanish:
  - y de entre el pueblo
  - y algunos del común del pueblo
  lexicon: HALOT
  rationale: La expresión literal «y de/entre el pueblo» tiene valor partitivo. «Algunos del pueblo» transmite bien esa selección de una parte de la población sin sobrecargar el español.
- source_word: הַנְּתִינִים
  english_pob_choice: the temple servants
  chosen_spanish: los servidores del templo
  alternatives_spanish:
  - los netineos
  - los servidores del santuario
  lexicon: HALOT
  rationale: Se traduce la función del grupo para que el lector entienda su papel. Se evita imponer la transliteración como forma principal, aunque puede preservarse como alternativa contextual.
- source_word: וְכָל יִשְׂרָאֵל
  english_pob_choice: and all Israel
  chosen_spanish: y todo Israel
  alternatives_spanish:
  - y todo el Israel
  lexicon: HALOT
  rationale: «Todo Israel» conserva la colectividad del pueblo del pacto y sigue de cerca la formulación hebrea.
- source_word: בְּעָרֵיהֶם
  english_pob_choice: in their cities
  chosen_spanish: en sus ciudades
  alternatives_spanish:
  - en sus pueblos
  - en sus localidades
  lexicon: HALOT
  rationale: עיר puede ser ciudad o poblado; «ciudades» conserva el lenguaje bíblico usual y funciona bien en este contexto de asentamiento.
- source_word: וַיִּגַּע
  english_pob_choice: arrived
  chosen_spanish: llegó
  alternatives_spanish:
  - arribó
  - vino
  lexicon: HALOT
  rationale: Con expresiones temporales, נגע significa que el tiempo llegó o alcanzó. «Llegó» es la equivalencia natural en español.
- source_word: הַחֹדֶשׁ הַשְּׁבִיעִי
  english_pob_choice: the seventh month
  chosen_spanish: el séptimo mes
  alternatives_spanish:
  - el mes séptimo
  lexicon: HALOT
  rationale: Renderizado calendárico directo y claro en español.
- source_word: וּבְנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - la gente de Israel
  lexicon: HALOT
  rationale: Se preserva el valor masculino plural explícito de בני con «hijos», como el texto hebreo. Es la forma más cercana y auditable, aun cuando el referente sea colectivo.
theological_decisions:
- issue: Expresión colectiva masculina בני ישראל
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - el pueblo de Israel
  rationale: El hebreo usa una construcción masculina plural explícita. Para mantener la fidelidad de forma y la trazabilidad textual, se conserva «hijos» en el texto principal, sin neutralizar el género gramatical del original.
  doctrine_reference: DOCTRINE.md § Translation philosophy, punto 4
- issue: Identidad de נתינים
  english_pob_reading: the temple servants
  chosen_spanish_reading: los servidores del templo
  alternative_spanish_readings:
  - los netineos
  - los Nethinim
  rationale: No hay disputa doctrinal, pero sí una decisión cultural y lexical. Se prioriza la función del grupo para que el lector comprenda el texto, manteniendo abierta la equivalencia tradicional por medio de alternativas.
  doctrine_reference: DOCTRINE.md § Translation philosophy, puntos 1 y 6
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del inglés POB, que añadió la conjunción inicial «Y» al comienzo de la segunda oración para reflejar el hebreo. La presente versión también conserva la estructura bipartita y el paralelismo temporal del versículo sin introducir cambios de sentido.
  spanish_consistency_notes:
  - Se mantiene «Y» al inicio de la segunda oración para reflejar la conjunción hebrea וַ.
  - Se usa «Yahvé» solo cuando el texto lo exija; este versículo no contiene el nombre divino.
  - 'Se conserva el paralelismo entre los dos miembros del versículo: residencia en las ciudades y permanencia en ellas al llegar el séptimo mes.'
  - «Servidores del templo» se adopta como lectura principal, con nota para la transliteración tradicional.
