    issue: «has pesado tu yugo» no refleja bien ἐβάρυνας
    rationale: ἐβάρυνας significa ‘hiciste pesado’, ‘cargaste’, ‘agobiaste’. En español, «pesar» aplicado así al yugo resulta poco idiomático y puede entenderse como ‘poner en la balanza’ en vez de ‘hacer pesado’.
  - severity: low
    issue: «los males» puede sonar algo abstracto en contexto
    rationale: Aunque κακά admite «males», aquí se refiere a perjuicios concretos. La nota ya mitiga la posible abstracción, así que no exige cambio obligatorio.
