  text: 그분의 이름에 대한 믿음으로, 그분의 이름이 여러분이 보고 알고 있는 이 사람을 튼튼하게 하였습니다. 그리고 그분으로 말미암는 믿음이 여러분 모두 앞에서 이 사람에게 완전한 회복을 주었습니다.
