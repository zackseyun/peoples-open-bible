translation:
  language: es
  text: Las hienas[a] gritarán en sus palacios[b], y los chacales en sus salones lujosos. Su hora está cerca[c], y sus días no se prolongarán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El término hebreo es incierto en su referencia zoológica precisa; puede entenderse también como 'animales salvajes' o 'chacales'.
    reason: lexical_alternative
  - marker: b
    text: El hebreo es difícil aquí; algunos lo toman más literalmente como 'viudas', pero el contexto favorece edificios nobles o palacios arruinados.
    reason: lexical_alternative
  - marker: c
    text: Babilonia está personificada como una mujer, de ahí los posesivos femeninos.
    reason: cultural_note
lexical_decisions:
- source_word: וְעָנָה
  english_pob_choice: will cry out
  chosen_spanish: aullarán
  alternatives_spanish:
  - gritarán
  - clamarán
  lexicon: HALOT
  rationale: En un contexto de desolación con animales del desierto o ruinas, el hebreo puede expresar un sonido animal lúgubre. En español, 'aullarán' comunica de modo natural el sonido característico de hienas o chacales sin perder el matiz ominoso.
- source_word: אִיִּים
  english_pob_choice: hyenas
  chosen_spanish: hienas
  alternatives_spanish:
  - animales salvajes
  - chacales
  lexicon: HALOT
  rationale: La referencia zoológica precisa es incierta, pero la lectura 'hienas' sigue la decisión inglesa principal y funciona bien en español moderno para animales carroñeros asociados con ruinas. Se conserva la nota porque el referente exacto sigue siendo debatido.
- source_word: בְּאַלְמְנוֹתָיו
  english_pob_choice: in her palaces
  chosen_spanish: en sus palacios
  alternatives_spanish:
  - en sus viudas
  - en casas desiertas
  - en sus palacios arruinados
  lexicon: HALOT
  rationale: El hebreo es difícil, pero el contexto de ciudades en ruinas y el paralelismo con 'salones lujosos' favorecen un sentido arquitectónico. En español, 'palacios' mantiene la imagen de antiguos edificios nobles sin forzar una traducción literal de 'viudas' que no encaja aquí.
- source_word: וְתַנִּים
  english_pob_choice: jackals
  chosen_spanish: chacales
  alternatives_spanish:
  - serpientes
  - dragones
  lexicon: HALOT
  rationale: En oráculos de desolación, תנים suele referirse a chacales. 'Chacales' es la opción más clara y contextual en español, y conserva el contraste con los espacios antes opulentos.
- source_word: בְּהֵיכְלֵי עֹנֶג
  english_pob_choice: in her luxurious halls
  chosen_spanish: en sus salones lujosos
  alternatives_spanish:
  - en palacios de deleite
  - en templos del placer
  lexicon: HALOT
  rationale: היכל puede designar un gran salón palaciego o un edificio monumental; con עֹנֶג, la idea es de esplendor y lujo. 'Salones lujosos' suena natural en español y preserva el contraste con la ruina posterior.
- source_word: וְקָרוֹב לָבוֹא עִתָּהּ
  english_pob_choice: Her time is near to come
  chosen_spanish: Su tiempo está cerca de llegar
  alternatives_spanish:
  - Su tiempo está cerca de venir
  - El tiempo de su destrucción está cerca
  lexicon: HALOT
  rationale: La forma femenina alude a Babilonia personificada como ciudad-mujer. 'Su tiempo' conserva esa referencia y evita especificar 'destrucción' más allá de lo que el hebreo dice explícitamente.
- source_word: וְיָמֶיהָ לֹא יִמָּשֵׁכוּ
  english_pob_choice: her days will not be prolonged
  chosen_spanish: sus días no se prolongarán
  alternatives_spanish:
  - sus días no se alargarán
  - sus días no serán extendidos
  lexicon: HALOT
  rationale: משך en nifal expresa 'ser prolongado/extendido'. 'No se prolongarán' es una equivalencia clara y fiel, con buen registro bíblico en español contemporáneo.
theological_decisions:
- issue: Personificación de Babilonia en femenino
  english_pob_reading: Babylon is personified as a woman, hence 'her time' and 'her days.'
  chosen_spanish_reading: 'Babilonia queda implícitamente personificada como femenina: ''sus palacios'', ''su tiempo'', ''sus días''.'
  alternative_spanish_readings:
  - usar masculino impersonal ('su tiempo está cerca')
  - explicitar 'Babilonia' en el texto
  rationale: El hebreo usa sufijos femeninos, y la lectura poética supone la ciudad como una figura femenina. En español se puede conservar esa personificación con posesivos femeninos sin añadir el nombre de la ciudad, que no está en el versículo.
  doctrine_reference: Personificación poética en profecía; no implica doctrina específica.
translation_notes:
  revision_awareness: Se siguió la lectura de alta concordancia del inglés POB sin cambios sustantivos; se mantuvieron las notas sobre la incertidumbre zoológica y la dificultad de בְּאַלְמְנוֹתָיו, y se preservó la personificación femenina del texto.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, aunque este versículo no contiene el tetragrámaton.
  - '''Hienas'' y ''chacales'' reflejan la imaginería de desolación con registro bíblico natural en español.'
  - '''Palacios'' y ''salones lujosos'' conservan el contraste entre esplendor anterior y ruina venidera sin sobreparafrasear.'
