translation:
  language: es
  text: Él edifica su casa como una polilla, como una choza[a] que hace un guardián.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «como un refugio temporal que hace el que vigila». El hebreo puede expresarse más específicamente como una estructura temporal de campo y la persona que la guarda.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּנָה
  english_pob_choice: builds
  chosen_spanish: edifica
  alternatives_spanish:
  - construye
  - levanta
  lexicon: HALOT
  rationale: El qal perfecto en discurso poético expresa una afirmación general o caracterizadora. «Edifica» conserva el valor de construir una casa con registro digno y literario, sin sonar tan técnico como «construye».
- source_word: כָעָשׁ
  english_pob_choice: like a moth
  chosen_spanish: como una polilla
  alternatives_spanish:
  - como una polilla de la ropa
  - como un gusano
  - como una larva
  lexicon: HALOT
  rationale: עָשׁ suele designar una polilla; en el contexto la imagen es de fragilidad y destrucción fácil. «Polilla» es el equivalente natural en español y mantiene la comparación del texto.
- source_word: בֵּיתוֹ
  english_pob_choice: his house
  chosen_spanish: su casa
  alternatives_spanish:
  - su hogar
  - su casa-hogar
  lexicon: HALOT
  rationale: Aquí el paralelismo con «choza» y los verbos de construir favorece un edificio literal. «Casa» reproduce bien el sustantivo base sin desplazarlo al sentido más amplio de «hogar».
- source_word: וּכְסֻכָּה
  english_pob_choice: like a shelter
  chosen_spanish: como una choza
  alternatives_spanish:
  - como una cabaña
  - como una tienda
  - como un refugio
  lexicon: HALOT
  rationale: סֻכָּה es una estructura temporal y frágil. «Choza» transmite bien la idea de una construcción rudimentaria y pasajera en español; «shelter» en inglés se volvió aquí una imagen más concreta en español para conservar la fragilidad del hebreo.
- source_word: עָשָׂה
  english_pob_choice: makes
  chosen_spanish: hace
  alternatives_spanish:
  - construye
  - levanta
  - prepara
  lexicon: HALOT
  rationale: El verbo conserva el mismo valor general de «hacer»; en español «hace» resulta natural con el sujeto implícito del participio siguiente y mantiene el paralelismo verbal.
- source_word: נֹצֵר
  english_pob_choice: a watchman
  chosen_spanish: un vigilante
  alternatives_spanish:
  - un guardia
  - uno que vigila
  - un guardián
  lexicon: HALOT
  rationale: El participio de נצר puede designar a quien vigila o guarda. «Vigilante» conserva la función del observador/guardián y evita una restricción excesiva a un oficio específico. En la imagen agrícola, el sujeto que cuida el lugar encaja bien con la choza temporal.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el hebreo de Job 27:18 y el auditable criterio inglés: mantener la imagen de fragilidad («polilla») y la comparación con una estructura temporal. No se adoptaron cambios de sentido respecto del pasaje base; la única variación relevante es que «choza» se usa como equivalente natural de סֻכָּה en español, mientras la nota conserva la alternativa más literal «booth/choza de campo».'
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico sobrio y publicable, evitando un calco rígido de la sintaxis hebrea.
  - «Polilla» y «choza» sostienen la imagen de precariedad del verso sin introducir explicaciones ajenas al texto.
  - No se usó «SEÑOR» ni terminología teológica ajena porque el versículo no contiene el nombre divino ni un título cristológico.
