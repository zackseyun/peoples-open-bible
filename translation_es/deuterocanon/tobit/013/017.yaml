translation:
  language: es
  text: Y las calles de Jerusalén serán pavimentadas con berilo, carbunclo y piedras de Suphir[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «piedras de Ofir», si Σουφείρ se entiende como el nombre del lugar Ophir y no como una transliteración directa del testimonio griego.
    reason: alternative_reading
lexical_decisions:
- source_word: πλατεῖαι
  english_pob_choice: streets
  chosen_spanish: calles
  alternatives_spanish:
  - anchas calles
  - plazas
  lexicon: LSJ
  rationale: πλατεῖαι puede significar vías amplias o espacios abiertos urbanos. En español, «calles» es la opción más natural y clara en un cuadro de esplendor de la ciudad, sin forzar una precisión que el griego no exige.
- source_word: βηρύλλῳ
  english_pob_choice: beryl
  chosen_spanish: berilo
  alternatives_spanish:
  - berilo precioso
  - piedra de berilo
  lexicon: LSJ
  rationale: Se conserva el nombre de la gema para mantener la imaginería lujosa y específica del texto. «Berilo» es la forma natural y reconocible en español.
- source_word: ἄνθρακι
  english_pob_choice: carbuncle
  chosen_spanish: carbunclo
  alternatives_spanish:
  - granate
  - piedra roja resplandeciente
  lexicon: LSJ
  rationale: En esta lista de gemas, ἄνθραξ no se refiere a carbón común, sino a una piedra preciosa tradicionalmente llamada «carbunclo». Esa opción preserva la fuerza imagística del pasaje.
- source_word: λίθῳ ἐκ Σουφεὶρ
  english_pob_choice: stones from Suphir
  chosen_spanish: piedras de Suphir
  alternatives_spanish:
  - piedras de Ofir
  - piedra de Suphir
  lexicon: LSJ
  rationale: El testimonio griego trae la forma Σουφείρ; por eso se translitera como «Suphir» en el texto principal. Se mantiene el matiz de procedencia con «piedras de».
- source_word: ψηφολογηθήσονται
  english_pob_choice: will be paved
  chosen_spanish: serán pavimentadas
  alternatives_spanish:
  - serán enlosadas
  - serán mosaiqueadas
  lexicon: LSJ
  rationale: El verbo alude a colocar piedrecillas o teselas y, en contexto arquitectónico, a pavimentar. «Serán pavimentadas» comunica ese sentido de manera natural en español.
translation_notes:
  revision_awareness: El texto griego de Swete y el audit trail inglés coinciden de manera alta; no se requieren cambios de sentido. La única tensión lexical relevante es Σουφεὶρ/Suphir, donde el POB inglés optó por transliterar en el cuerpo y abrir la alternativa «Ophir» en nota; la versión española conserva esa misma decisión con equivalente español.
  spanish_consistency_notes:
  - Se mantiene la terminología de gemas con nombres comunes en español («berilo», «carbunclo») en lugar de explicaciones perifrásticas.
  - Se preserva la referencia toponímica transliterada «Suphir» en el cuerpo por fidelidad al testimonio griego, con la variante «Ofir» en nota.
  - 'Se usa el futuro pasivo perifrástico natural del español bíblico moderno: «serán pavimentadas».'
