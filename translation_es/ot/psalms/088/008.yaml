translation:
  language: es
  text: Tu ira ha reposado sobre mí, y con todos tus rompientes[a] me has afligido. Selah
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'olas' o 'oleajes'. El hebreo evoca olas que se quiebran, es decir, 'rompientes'.
    reason: lexical_alternative
lexical_decisions:
- source_word: סָמְכָה
  english_pob_choice: has rested
  chosen_spanish: se ha posado
  alternatives_spanish:
  - se ha asentado
  - ha recaído
  - se ha detenido
  lexicon: HALOT
  rationale: El verbo סמך comunica la idea de apoyar/recostarse, y en este contexto la imagen es que la indignación de Dios cae y queda sobre el salmista. 'Se ha posado' conserva la metáfora de algo que se posa sobre alguien sin volverla una paráfrasis excesiva como 'me ha pesado'.},{
- source_word: חֲמָתֶךָ
  english_pob_choice: your wrath
  chosen_spanish: tu indignación
  alternatives_spanish:
  - tu ira
  - tu furor
  lexicon: HALOT
  rationale: חֵמָה puede abarcar ira, ardor, furor o indignación. 'Indignación' funciona bien en español bíblico moderno y mantiene el peso judicial/emotivo del término sin sonar más coloquial que el hebreo.
- source_word: מִשְׁבָּרֶיךָ
  english_pob_choice: your breakers
  chosen_spanish: tus olas
  alternatives_spanish:
  - tus rompientes
  - tus rompientes olas
  - tus ondas
  lexicon: HALOT
  rationale: El POB inglés conserva 'breakers' para la precisión léxica y añade nota sobre 'waves/billows'. En español, 'olas' es la alternativa idiomática más natural y transparente; la nota preserva que el hebreo alude propiamente a olas rompientes.
- source_word: עִנִּיתָ
  english_pob_choice: you have afflicted me
  chosen_spanish: me has afligido
  alternatives_spanish:
  - me has humillado
  - me has oprimido
  lexicon: HALOT
  rationale: ענה en piel admite afligir, humillar u oprimir. 'Afligido' reproduce el valor de padecimiento causado por Dios en la lamentación sin estrecharlo a una sola esfera social o psicológica.
- source_word: וְכָל
  english_pob_choice: and with all
  chosen_spanish: y con todas
  alternatives_spanish:
  - y con todo
  - y con cada una de
  lexicon: HALOT
  rationale: La construcción coordinada expresa totalidad e instrumento. 'Y con todas' comunica de forma natural en español que la aflicción viene acompañada por la totalidad de las olas de Yahvé.
- source_word: סֶלָה
  english_pob_choice: Selah
  chosen_spanish: Selah
  lexicon: HALOT
  rationale: Se translitera por tratarse de un marcador litúrgico de sentido incierto; no conviene traducirlo especulativamente.
theological_decisions:
- issue: Atribución de la aflicción a Dios en un lamento
  english_pob_reading: 'The verse is rendered straightforwardly as the psalmist addressing God: God''s wrath rests on him, and God afflicts him with all his breakers.'
  chosen_spanish_reading: 'El versículo se mantiene como una acusación/lamento dirigido a Dios: su indignación recae sobre el hablante y Dios lo aflige con todas sus olas.'
  alternative_spanish_readings:
  - Su enojo me ha llevado a sufrir, sin afirmar agencia directa.
  - La imagen se suaviza para presentar solo angustia impersonal.
  rationale: El hebreo atribuye sin rodeos a Yahvé tanto la indignación como la aflicción. La traducción española conserva esa tensión teológica en vez de suavizarla o convertirla en mera descripción emocional.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El contexto de revisión indica alta concordancia y ningún cambio aplicado; por eso la redacción sigue de cerca el análisis léxico y la nota inglesa sobre la metáfora de las aguas.
  spanish_consistency_notes:
  - Se usa 'Yahvé' implícitamente en la decisión teológica, pero el verso mismo mantiene la segunda persona ('tu').
  - '''Selah'' se deja sin traducir para respetar el marcador litúrgico y la práctica del POB.'
  - Se prefiere 'olas' en el texto principal por legibilidad española, con nota que preserva la precisión de 'breakers'.
