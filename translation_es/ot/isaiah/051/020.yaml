revisions:
- from: Tus hijos[a] se han desmayado; yacen a la cabecera de todas las calles, como un antílope[b] en una red, llenos de la ira de Yahvé, del reprendo[c] de tu Dios.
  to: Tus hijos se han desmayado; yacen a la cabecera[a] de todas las calles, como un antílope[b] en una red, llenos de la ira de Yahvé, de la reprensión[c] de tu Dios.
  rationale: Se eliminó la nota errónea sobre «hijas», se añadió la alternativa documentada para la ubicación en las calles, y se sustituyó «reprendo» por «reprensión», que es fiel al hebreo y natural en español. Se mantuvo «Tus hijos», «antílope», «red» y «Yahvé» conforme al source evidence y al glosario del proyecto.
