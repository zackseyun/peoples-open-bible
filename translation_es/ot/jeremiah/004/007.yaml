base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/004/007.yaml
  text: A lion has come up from his thicket[a], and a destroyer of nations has set out; he has gone out from his place to make your land a desolation. Your cities will be laid waste[b], without inhabitant.
  footnotes:
