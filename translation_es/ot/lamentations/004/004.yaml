revisions:
- from: La lengua del niño de pecho se pega al paladar[a] por la sed; los niños piden pan[b], y no hay quien se lo parta.
  to: La lengua del lactante se pega al paladar[a] por la sed; los niños piden pan[b], pero no hay quien se lo parta para ellos.
  rationale: Se ajusta «niño de pecho» a «lactante» para una lectura más natural y ampliamente comprensible en español moderno, sin perder el sentido de יוֹנֵק. También se explicita «para ellos» para reflejar mejor אֵין לָהֶם y la lógica de la escena de hambre. Se mantiene «paladar» con nota alternativa y se conserva «pan» y «parta» conforme al hebreo y al audit trail inglés.
