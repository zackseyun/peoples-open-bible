revisions:
- from: Recuerda el fin[a], y deja la hostilidad; recuerda la corrupción y la muerte[b], y permanece en los mandamientos.
  to: Recuerda el fin[a], y deja de ser hostil; recuerda la decadencia y la muerte[b], y permanece en los mandamientos.
  rationale: Se ajusta «deja la hostilidad» a «deja de ser hostil» para reflejar mejor el participio griego de conducta continua, y «corrupción» a «decadencia» para evitar la lectura moral dominante en español y preservar mejor el sentido de deterioro/mortalidad emparejado con «muerte». No se requieren cambios en las notas.
