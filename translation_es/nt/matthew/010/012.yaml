  verdict: revise
  source_alignment_summary: 'El borrador conserva bien el sentido del griego: εἰσερχόμενοι se refleja naturalmente como «Al entrar», οἰκίαν como «la casa», y αὐτήν se mantiene con pronombre femenino singular en «salúdenla», preservando la metonimia del original. La instrucción imperativa de ἀσπάσασθε también está bien representada. La única desviación relevante está en la nota, donde «saluden al hogar» no corresponde bien al matiz de οἰκία ni suena natural en español bíblico corriente.'
  spanish_quality_summary: 'El texto principal es claro, natural y digno en español: «Al entrar en la casa, salúdenla». Sin embargo, la nota usa «hogar», que en este contexto suena menos preciso y menos idiomático como objeto de saludo. «Casa» o «los de la casa» serían mejores opciones. Conviene también alinear la nota más estrechamente con la audit trail inglesa.'
  glossary_alignment: No hay términos del glosario mayor directamente implicados. La decisión de mantener «casa» en vez de expandir a «los de la casa» está bien alineada con la filosofía POB de conservar la metonimia en el texto principal y explicar la alternativa en nota.
  issues:
  - severity: medium
    issue: La nota propone «saluden al hogar» como alternativa.
    rationale: «Hogar» no refleja tan bien οἰκίαν en este contexto y resulta poco natural como objeto de «saludar». La audit trail inglesa propone «greet the household», not «home/hearth», por lo que en español conviene «saluden a los de la casa» o similar.
  - severity: low
    issue: La nota puede formular con más claridad la alternativa metonímica.
    rationale: Ya que el texto principal preserva correctamente «salúdenla», la nota debe aclarar de manera idiomática que la referencia probable es a los habitantes, evitando una alternativa española extraña.
  revised_spanish_text: Al entrar en la casa[a], salúdenla.
  revised_footnotes:
  - marker: a
    text: O «saluden a los de la casa»; el griego dice «salúdenla», refiriéndose a la casa, probablemente como metonimia de quienes viven en ella.
    reason: lexical_alternative
  revision_rationale: Se mantiene intacto el texto principal porque es fiel al griego y natural en español. Solo se corrige la nota para sustituir «hogar», que aquí es menos preciso y menos idiomático, por una alternativa que expresa claramente la lectura interpretativa preservada en la audit trail inglesa.
