translation:
  text: |-
    3. In my life I saw envy and death, and I was not led astray, but remained in the truth of the Lord.
    4. My brothers hated me, but the Lord loved me. They wanted to kill me, but the God of my fathers kept me safe. They lowered me into a pit, and the Most High brought me up.
    5. I was sold into slavery, and the Master of all set me free. I was taken into captivity, and his mighty hand helped me. I was gripped by famine, and the Lord himself nourished me.
    6. I was alone, and God comforted me. I was weak, and the Lord visited me. I was in prison, and the Savior showed me favor. [I was in chains, and he loosed me.]
    7. Amid slanders he spoke in my defense. In the bitter talk of dreams he rescued me.
