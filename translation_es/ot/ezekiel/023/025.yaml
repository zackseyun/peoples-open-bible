review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y la mayor parte del sentido del hebreo: ''Pondré ... contra ti'', ''te tratarán con furor'', la remoción de nariz y orejas, la caída a espada, la toma de hijos e hijas, y la consumición por fuego. Sin embargo, se aparta de la decisión léxico-teológica auditada en קִנְאָתִי, donde el inglés POB eligió ''my jealousy'' para preservar la tensión relacional/pactual; el español ''mi celo'' suaviza y desplaza ese matiz. Además, la nota [a] no ofrece una verdadera alternativa y justifica una elección distinta de la auditada. El resto de las decisiones principales están dentro de lo aceptable.'
  spanish_quality_summary: El español es claro y legible, con tono digno y natural. 'Te quitarán la nariz y las orejas' y 'será consumido por fuego' funcionan bien. 'Tu resto' es entendible, pero suena algo menos natural que 'los que queden de ti' o una glosa equivalente; aun así puede mantenerse si la nota lo aclara. La corrección necesaria es principalmente terminológica y de nota, no de fluidez general.
  glossary_alignment: 'Desalineación principal: קִנְאָה debería seguir la racionalidad auditada como ''celos'' más que ''celo'', porque el proyecto pide preservar la fuerza relacional de ''jealousy'' en contextos pactuales. No hay conflicto con Yahvé/Mesías u otros términos por defecto del glosario. ''Remanente'' y ''resto'' son aceptables para אַחֲרִית en este contexto si se explica que aquí significa lo que queda tras la devastación.'
  issues:
