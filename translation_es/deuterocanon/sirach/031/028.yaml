translation:
  language: es
  text: En todas tus acciones, sé modesto[a], y ningún desastre te alcanzará.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego tiene una lectura sustancialmente distinta: «Uno construye y otro derriba; ¿qué han ganado más que fatigas?». Este versículo se traduce del hebreo conservado, que difiere marcadamente de la tradición griega.'
    reason: textual_variant
lexical_decisions:
- source_word: בכל
  english_pob_choice: In all
  chosen_spanish: En todos
  alternatives_spanish:
  - En cada
  - En todo
  lexicon: HALOT
  rationale: La construcción hebrea con ב + כל pide una cobertura amplia de la conducta. «En todos» conserva la esfera total sin volverla pesada en español.
- source_word: מעשיך
  english_pob_choice: your deeds
  chosen_spanish: tus hechos
  alternatives_spanish:
  - tus acciones
  - tus obras
  lexicon: HALOT
  rationale: מעשים puede abarcar actos o conducta. «Hechos» mantiene el sentido práctico y moral, y resulta natural en español bíblico contemporáneo.
- source_word: היה
  english_pob_choice: be
  chosen_spanish: sé
  alternatives_spanish:
  - hazte
  - conduce
  lexicon: HALOT
  rationale: El imperativo de היה con predicado adjetival se expresa con el imperativo simple «sé», que es fiel y fluido en español.
- source_word: צנוע
  english_pob_choice: modest
  chosen_spanish: modesto
  alternatives_spanish:
  - humilde
  - recatado
  - sobrio
  lexicon: HALOT
  rationale: צנוע denota modestia, reserva o contención en el comportamiento. «Modesto» conserva mejor esa noción ética-social que «humilde», sin forzar un matiz puramente interior.
- source_word: וכל
  english_pob_choice: and no
  chosen_spanish: y ningún
  alternatives_spanish:
  - y no
  - entonces ningún
  lexicon: HALOT
  rationale: La coordinación con resultado negativo se vuelve en español «y ningún...», que expresa de modo natural la consecuencia prometida.
- source_word: אסון
  english_pob_choice: disaster
  chosen_spanish: desastre
  alternatives_spanish:
  - calamidad
  - desgracia
  - daño
  lexicon: HALOT
  rationale: אסון designa una calamidad seria. «Desastre» comunica bien un mal grave sin restringirlo a lesión física.
- source_word: לא יגע בך
  english_pob_choice: will touch you
  chosen_spanish: te alcanzará
  alternatives_spanish:
  - te tocará
  - llegará a ti
  - te golpeará
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «no tocará en ti», en español «te alcanzará» transmite con naturalidad la idea de que el desastre no llegará a afectarte. Se evita una calca que sonaría extraña.
translation_notes:
  revision_awareness: Se siguió el hebreo conservado como texto base para la línea principal, en coherencia con el expediente POB. La lectura griega se retuvo como variante textual importante en nota, porque no coincide con el hebreo y afecta el contenido del versículo.
  spanish_consistency_notes:
  - Se usó «modesto» en línea con la decisión inglesa de mantener el valor ético-social de צנוע.
  - Se prefirió «desastre» para אסון, consistente con la fuerza de calamidad grave del término.
  - La traducción evita el tradicional «SEÑOR» u otras fórmulas no presentes en este versículo.
