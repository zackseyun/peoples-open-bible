    reason: lexical_alternative
  revision_rationale: Se reemplaza «llevan a este de mí» por «me quitan a este» para expresar con naturalidad la separación personal implicada por מֵעִם פָּנַי y el inglés revisado «from me». Se cambia «le sucede un mal» por «le sucede una desgracia» para reflejar mejor אָסוֹן como calamidad seria. Se ajusta «hasta el Seol» a «al Seol» para representar mejor el sentido direccional de שְׁאֹלָה. Se mueve la nota al pie a «Seol» para preservar la alternativa léxica principal documentada en el POB inglés.
