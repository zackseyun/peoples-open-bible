review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: una súplica a Dios para que recuerde el ultraje del enemigo y el desprecio de un pueblo moralmente necio hacia su nombre. Sin embargo, hay desajustes formales y de detalle: el texto principal dejó «Yahvé» correctamente, pero el anclaje de nota [a] está mal colocado y duplica referencia; además, la segunda cláusula en hebreo lleva verbo plural (נִאֲצוּ, «han despreciado»), por lo que «un pueblo necio ha despreciado» suaviza indebidamente la concordancia colectiva explícita del original.'
  spanish_quality_summary: 'El español es generalmente claro y digno. «Recuerda esto» y «el enemigo» funcionan bien. No obstante, «ha [a]afrentado a Yahvé[a]» es tipográficamente incorrecto y poco legible. También conviene armonizar la concordancia de «un pueblo necio» con un verbo plural para reflejar mejor el hebreo y sonar natural en español bíblico actual: «un pueblo necio ha despreciado» es posible como colectivo singular, pero aquí el original marca plural y el inglés auditado también. Además, faltan en español las notas que preservan la carga moral de «necio» y la alternativa léxica de «han tratado tu nombre con desprecio / han blasfemado».'
  glossary_alignment: Se alinea bien con el glosario del proyecto en «Yahvé», «necio» y «tu nombre». La elección «afrentado» para חרף es aceptable, aunque «se ha burlado de» o «ha insultado» serían más transparentes; puede mantenerse con nota. Hace falta reflejar en notas la dimensión moral de «necio» y la alternativa léxica para נאץ, como en el rastro auditado inglés.
  issues:
  - severity: high
    issue: Marcador de nota [a] mal colocado y duplicado en el texto principal
    rationale: El texto dice «ha [a]afrentado a Yahvé[a]», pero solo existe una nota. Esto viola la disciplina de marcadores y crea ambigüedad sobre qué palabra ancla la nota.
  - severity: medium
    issue: La segunda cláusula usa verbo singular en español donde el hebreo tiene plural
    rationale: נִאֲצוּ es 3ª persona plural. Aunque «pueblo» puede llevar singular en español, aquí el hebreo explicita plural y conviene preservarlo con «han despreciado».
  - severity: medium
    issue: Faltan dos notas significativas preservadas por el audit trail inglés
    rationale: El inglés conserva una nota sobre la fuerza moral de «foolish» y otra sobre alternativas para «have despised your name»; el español debería mantener esas alternativas/contexto para fidelidad auditada.
  - severity: low
    issue: 'Error léxico en alternativa española: «contempto»'
    rationale: Debe ser «desprecio» o «contempto» no es forma correcta en español estándar.
  revised_spanish_text: 'Recuerda esto: el enemigo ha afrentado[a] a Yahvé, y un pueblo necio[b] han despreciado[c] tu nombre.'
  revised_footnotes:
