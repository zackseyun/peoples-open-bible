  - severity: medium
    issue: '''Y fueron míos'' no refleja bien el matiz de ingreso en una relación de וַתִּהְיֶינָה לִי'
    rationale: El verbo hebreo en contexto, y el audit trail inglés ('They became mine'), apuntan mejor a 'llegaron a ser / vinieron a ser mías' que a un simple 'fueron mías/míos'.
  - severity: medium
    issue: Concordancia de género en 'míos'
    rationale: El referente inmediato son dos mujeres/personificaciones femeninas; en español 'mías' es la concordancia esperable y más natural, aun dentro de la alegoría.
  - severity: low
    issue: La nota [b] duplica la lectura principal en vez de preservar la alternativa del POB inglés
    rationale: Si el texto principal se corrige a 'llegaron a ser mías', la nota debe registrar como alternativa 'fueron mías'/'eran mías', alineándose mejor con la nota inglesa ('Or They were mine').
  revised_spanish_text: 'Y sus nombres eran Oholá[a] la mayor y Oholibá su hermana. Y llegaron a ser mías[b] y dieron a luz hijos e hijas. En cuanto a sus nombres: Samaria es Oholá, y Jerusalén es Oholibá.'
