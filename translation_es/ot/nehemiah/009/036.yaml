  to: Miren[a], hoy somos esclavos; y en la tierra que diste a nuestros padres para comer su fruto y lo bueno[b] de ella, miren, somos esclavos sobre ella[c].
  rationale: 'La revisión corrige el anclaje de notas para que cada una corresponda a la palabra o frase pertinente, elimina una nota estilística innecesaria, y mejora la naturalidad y fidelidad de טוּבָהּ con «lo bueno de ella». También suaviza la puntuación y adopta «Miren» como equivalente más natural de הִנֵּה en este lamento colectivo, sin alterar las decisiones clave ya correctas: «esclavos», «nuestros padres» y «sobre ella».'
