lexical_decisions:
- source_word: וְ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - e
  lexicon: HALOT
  rationale: La conjunción hebrea se vierte de forma simple como 'y'; aquí no se requiere 'e' porque la siguiente palabra no comienza con sonido /i/.
- source_word: צִקְלַג
  english_pob_choice: Ziklag
  chosen_spanish: Ziclag
  alternatives_spanish:
  - Ziklag
  lexicon: HALOT
  rationale: Es un nombre propio de lugar; en español se translitera para conservar el carácter toponímico. Se usa 'Ziclag' para adaptar la ortografía al sistema gráfico español, manteniendo la referencia al mismo lugar.
- source_word: בֵית הַמַּרְכָּבוֹת
  english_pob_choice: Beth-marcaboth
  chosen_spanish: Bet-marcabot
  alternatives_spanish:
  - casa de los carros
  - Bet-marcabot
  lexicon: HALOT
  rationale: La expresión funciona como nombre de lugar compuesto, no como descripción libre. Por eso se conserva como topónimo transliterado; la forma española elimina la h muda y simplifica la terminación para una lectura más natural, sin perder la identidad del nombre.
- source_word: חֲצַר סוּסָה
  english_pob_choice: Hazar-susah
  chosen_spanish: Hazar-susa
  alternatives_spanish:
  - enclosure of horses
  - asentamiento de caballos
  lexicon: HALOT
  rationale: También es un topónimo compuesto. Se mantiene el nombre propio en español con transliteración adaptada. El elemento סוּסָה conserva la relación con 'caballo', pero en el texto principal se respeta la forma toponímica en lugar de convertirla en glosa descriptiva.
translation_notes:
  revision_awareness: El paquete fuente muestra alta concordancia y sin revisiones aplicadas; por eso el borrador español sigue la misma decisión base de preservar los tres topónimos en la lista, con adaptación ortográfica al español y notas léxicas donde el audit trail del inglés preservó alternativas semánticas.
  spanish_consistency_notes:
  - Se mantiene el paralelismo de lista nominal con comas y conjunción final simple.
  - Se conserva el orden de los topónimos del texto hebreo.
  - Las notas al pie explican el valor léxico de los compuestos sin sustituir el nombre propio en el texto principal.
