    text: Or 'fear of you.' The Greek literally reads 'your fear,' a biblical expression for the fear directed toward God.
    reason: lexical_alternative
  - marker: b
    text: Or 'in our captivity.' The Greek term can denote the state of deportation or exile.
    reason: lexical_alternative
  - marker: c
    text: Or 'every wrongdoing' or 'all injustice.'
    reason: lexical_alternative
  - marker: d
    text: Or 'who sinned against you.' The Greek more literally says 'who sinned before you.'
    reason: lexical_alternative
