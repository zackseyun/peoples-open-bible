translation:
  language: es
  text: Y convocó a todos sus servidores y a todos sus nobles, y les expuso el secreto de su plan[a], y de su propia boca declaró todo el mal de la tierra[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «les reveló el misterio de su consejo». Aquí μυστήριον probablemente significa un asunto secreto o un plan confidencial, no un «misterio» teológico técnico.
    reason: lexical_alternative
  - marker: b
    text: La cláusula «declaró todo el mal de la tierra» es difícil. El griego también puede querer decir que expuso plenamente el mal relacionado con la tierra, más que afirmar que la tierra misma era mala.
    reason: alternative_reading
lexical_decisions:
- source_word: συνεκάλεσεν
  english_pob_choice: summoned
  chosen_spanish: reunió
  alternatives_spanish:
  - convocó
  - llamó a reunir
  - citó
  lexicon: LSJ
  rationale: El compuesto indica llamar a personas para reunirlas en asamblea. «Reunió» es natural en español y conserva la acción de agrupar con autoridad; «convocó» también sería viable, pero «reunió» evita un matiz demasiado jurídico o administrativo.
- source_word: θεράποντας
  english_pob_choice: attendants
  chosen_spanish: servidores
  alternatives_spanish:
  - sirvientes
  - asistentes
  - retainers
  lexicon: LSJ
  rationale: En este contexto cortesano, θεράποντας designa a quienes están al servicio personal de la corte, no necesariamente esclavos. «Servidores» mantiene la relación de servicio sin imponer el sentido más fuerte de δοῦλος. Se evita «sirvientes» por posible tono doméstico y «asistentes» por debilitar la dependencia.
- source_word: μεγιστᾶνας
  english_pob_choice: nobles
  chosen_spanish: nobles
  alternatives_spanish:
  - magnates
  - grandes
  - altos dignatarios
  lexicon: LSJ
  rationale: El término apunta a personajes de alto rango. «Nobles» es idiomático, elevado y claro en español, y conserva el registro de corte mejor que alternativas más técnicas o ambiguas.
- source_word: ἔθετο μετʼ αὐτῶν τὸ μυστήριον τῆς βουλῆς αὐτοῦ
  english_pob_choice: he set before them the secret of his plan
  chosen_spanish: les expuso el secreto de su consejo
  alternatives_spanish:
  - les dio a conocer el misterio de su consejo
  - les presentó el secreto de su plan
  - les reveló el misterio de su deliberación
  lexicon: LSJ
  rationale: ἔθετο μετʼ αὐτῶν expresa poner algo ante otros o compartirlo con ellos. «Les expuso» reproduce bien ese gesto discursivo. μυστήριον aquí es un secreto o asunto reservado, no un «misterio» técnico; por eso se traduce «el secreto». βουλή conserva su fuerza de deliberación, propósito o consejo, y «consejo» permite mantener esa amplitud sin reducirlo solo a un plan operativo.
- source_word: βουλῆς
  english_pob_choice: counsel
  chosen_spanish: consejo
  alternatives_spanish:
  - plan
  - propósito
  - decisión
  - deliberación
  lexicon: LSJ
  rationale: βουλή puede significar consejo, plan, propósito o decisión. «Consejo» conserva el componente deliberativo y encaja naturalmente en español con «el secreto de su consejo». Evita la redundancia de repetir «plan» dos veces y no aplana el matiz consultivo.
- source_word: συνετέλεσεν
  english_pob_choice: declared
  chosen_spanish: declaró
  alternatives_spanish:
  - expuso
  - dio a conocer
  - manifestó plenamente
  - completó
  lexicon: LSJ
  rationale: Aunque el verbo suele significar completar o llevar a término, aquí, unido a ἐκ τοῦ στόματος αὐτοῦ, el sentido más probable es comunicar plenamente por la boca. «Declaró» recoge esa fuerza verbal de manera idiomática y acorde con la revisión inglesa.
- source_word: πᾶσαν τὴν κακίαν τῆς γῆς
  english_pob_choice: all the evil of the land
  chosen_spanish: toda la maldad de la tierra
  alternatives_spanish:
  - todo el mal de la tierra
  - toda la maldad de la tierra
  - todo el daño de la tierra
  lexicon: LSJ
  rationale: 'κακία puede ser maldad o mal/evil en sentido amplio. Dado el contexto político-militar, la frase es ambigua: puede aludir al mal que se propone contra la tierra o al mal relacionado con ella. «Maldad» mantiene cercanía semántica con el griego y preserva la tensión interpretativa; «tierra» reproduce la amplitud de γῆ sin limitarla a un país específico.'
- source_word: ἐκ τοῦ στόματος αὐτοῦ
  english_pob_choice: from his own mouth
  chosen_spanish: de su propia boca
  alternatives_spanish:
  - con su propia boca
  - de su boca
  - por su propia boca
  lexicon: LSJ
  rationale: La expresión subraya habla directa y personal. «De su propia boca» es una forma natural en español y conserva el énfasis en la emisión directa del discurso.
theological_decisions:
- issue: μυστήριον no como “misterio” técnico sino como secreto político/cortesano
  english_pob_reading: Here μυστήριον likely means a secret matter or confidential plan, not a technical theological 'mystery.'
  chosen_spanish_reading: «El secreto de su consejo» entiende μυστήριον como asunto reservado y βουλή como deliberación o consejo, no como una categoría doctrinal.
  alternative_spanish_readings:
  - «el misterio de su consejo»
  - «el secreto de su plan»
  - «el secreto de su deliberación»
  rationale: El contexto es cortesano y administrativo. Traducir con «misterio» en español podría sugerir un sentido religioso o esotérico no presente aquí. «Secreto» preserva la confidencialidad del contenido, y «consejo» mantiene el matiz deliberativo de βουλή.
  doctrine_reference: No doctrinal issue; lexical-contextual decision
- issue: πᾶσαν τὴν κακίαν τῆς γῆς as an ambiguous phrase that may concern evil about the land rather than the land’s intrinsic wickedness
  english_pob_reading: The Greek may mean that he fully set forth the evil concerning the land, rather than that the land itself was wicked.
  chosen_spanish_reading: '«Toda la maldad de la tierra» mantiene la ambigüedad: puede leerse como el mal relacionado con la tierra o como la maldad atribuida a ella.'
  alternative_spanish_readings:
  - «todo el mal de la tierra»
  - «todo el mal contra la tierra»
  - «toda la maldad acerca de la tierra»
  rationale: La frase griega es difícil. En español conviene no resolverla demasiado, para no perder la tensión detectada en el aparato inglés. «Maldad» conserva el peso moral de κακία, mientras «tierra» deja abierta la referencia geográfica o política.
  doctrine_reference: No doctrinal issue; textual-lexical ambiguity
translation_notes:
  revision_awareness: La versión inglesa revisada cambió «laid before them» a «set before them», «the secret plan of his counsel» a «the secret of his plan», y «wickedness» a «evil». La propuesta española sigue esa revisión en el gesto verbal de ἔθετο con «les expuso», evita la redundancia de «plan»/«consejo» con «el secreto de su consejo», y conserva la tensión de κακία sin resolverla de forma excesiva. También se priorizó un español natural y auditable, sin depender mecánicamente del inglés.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto, aunque este versículo no lo contiene.
  - «Consejo» se usó para βουλή para preservar el matiz deliberativo; no se reemplazó por «plan» para evitar redundancia con μυστήριον.
  - «Servidores» se prefirió a «siervos» porque el contexto es cortesano y no exige la carga teológica de servicio devocional.
  - Se evitó «misterio» en el texto principal para no introducir una lectura doctrinal ajena al contexto.
  - La palabra final «tierra» conserva la amplitud de γῆ y no la restringe a «país» o «territorio».
