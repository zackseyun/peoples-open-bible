translation:
  language: es
  text: Todo fue contado por número y por peso[a], y todo el peso fue registrado en ese momento.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «por número, por peso, para todo; y todo el peso fue escrito en ese momento».'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּמִסְפָּר
  english_pob_choice: counted by number
  chosen_spanish: contado por número
  alternatives_spanish:
  - contado según el número
  - contado por conteo
  lexicon: HALOT
  rationale: מִסְפָּר designa número o cuenta. En español, «contado por número» mantiene la estructura instrumental del hebreo y expresa con naturalidad el procedimiento de inventario.
- source_word: בְּמִשְׁקָל
  english_pob_choice: by weight
  chosen_spanish: por peso
  alternatives_spanish:
  - según el peso
  - pesado
  lexicon: HALOT
  rationale: מִשְׁקָל refiere al peso. «Por peso» conserva la coordinación con «por número» y refleja el paralelismo del hebreo sin volverlo más explicativo de lo que el texto permite.
- source_word: לַכֹּל
  english_pob_choice: everything
  chosen_spanish: todo
  alternatives_spanish:
  - para todo
  - para todo ello
  - para el conjunto
  lexicon: HALOT
  rationale: La frase indica alcance total. «Todo» es la forma más natural y compacta en español para expresar que la operación abarcó la totalidad de los bienes.
- source_word: וַיִּכָּתֵב
  english_pob_choice: was recorded
  chosen_spanish: fue registrado
  alternatives_spanish:
  - fue escrito
  - quedó escrito
  lexicon: HALOT
  rationale: El nifal de כתב es pasivo, «fue escrito». En un contexto administrativo, «fue registrado» comunica con precisión la formalidad documental sin perder la pasividad del verbo.
- source_word: כָּל הַמִּשְׁקָל
  english_pob_choice: all the weight
  chosen_spanish: todo el peso
  alternatives_spanish:
  - todo el peso total
  - el peso entero
  lexicon: HALOT
  rationale: Literalmene, «todo el peso». Se evita «peso total» porque añade una abstracción que no está en el hebreo; «todo el peso» conserva la fuerza lexical de כָּל.
- source_word: בָּעֵת הַהִיא
  english_pob_choice: at that time
  chosen_spanish: en aquel tiempo
  alternatives_spanish:
  - en ese tiempo
  - entonces
  lexicon: HALOT
  rationale: La expresión temporal deíctica se traduce de forma directa y digna. «En aquel tiempo» mantiene el valor demostrativo de הַהִיא mejor que un simple «entonces».
translation_notes:
  revision_awareness: Se siguió el último ajuste del audit trail inglés que prefirió «all the weight» sobre «the total weight» para reflejar con mayor exactitud כָּל הַמִּשְׁקָל. La versión española conserva esa misma decisión con «todo el peso».
  spanish_consistency_notes:
  - 'Se mantuvo el paralelismo hebreo con dos miembros instrumentales: «por número» / «por peso».'
  - Se prefirió «registrado» por el matiz administrativo del contexto, aunque «escrito» sigue siendo una alternativa literal válida.
  - La nota al pie preserva la alternativa más literal, tal como el POB inglés conserva la posibilidad de lectura más cercana al hebreo.
