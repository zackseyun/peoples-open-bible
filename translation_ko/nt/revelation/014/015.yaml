theological_decisions:
- issue: '14장의 두 추수: 추수(곡식)와 포도 수확의 구분'
  chosen_reading: 14-16절은 곡식 추수, 17-20절은 포도 수확으로 구분
  alternative_readings:
  - 두 추수를 모두 심판으로 동일시
  rationale: 본문은 두 동사를 의도적으로 구분한다. θερίζω(거두다, 곡식 추수)와 τρυγάω(포도를 따다). 첫 추수의 성격은 모호한 채로 두되(구원의 첫 열매 또는 보편적 종말 추수), 두 번째는 진노의 포도주틀로 명백히 심판이다. 한국어 번역도 동사 구분을 살린다.
  doctrine_reference: 'DOCTRINE.md: Preserve lexical distinctions; do not flatten apocalyptic doublets'
