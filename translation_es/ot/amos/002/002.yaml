review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la secuencia del hebreo y la línea del POB inglés: juicio divino, fuego enviado contra/sobre Moab, destrucción de las אַרמנות de Queriot/Keriot, y muerte de Moab en medio de estruendo bélico. Sin embargo, desplaza indebidamente אַרמנות (''ciudadelas/citadelas; palacios; fortalezas'') a ''ciudades fortificadas'', que ya no refleja una estructura palacial/fortificada sino asentamientos urbanos. Además, la nota b está anclada en ''morirá'' cuando corresponde a Queriot/Keriot.'
  spanish_quality_summary: 'El español es generalmente claro y digno, pero hay reparaciones necesarias: ''las palacios'' es incorrecto; la ubicación de la nota b induce confusión; ''entre tumulto'' suena algo duro en español y mejora con ''en medio del tumulto''; y conviene hacer concordar mejor el texto principal con la nota léxica sobre Queriot. El resto es natural y legible.'
  glossary_alignment: 'No hay conflictos con la terminología troncal del proyecto. ''Moab'', ''fuego'', ''trompeta'' y el tono profético están bien. La principal desviación es léxica: אַרמנות debe mantenerse como ''ciudadelas'' o equivalente cercano, no ''ciudades fortificadas''.'
  issues:
