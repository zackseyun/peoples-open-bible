translation:
  language: es
  text: Oigan la instrucción y háganse sabios[a], y no la descuiden.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «no la desechen» o «no la dejen ir». El verbo hebreo puede expresar la idea de rechazar o descuidar la instrucción.
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁמְע֖וּ
  english_pob_choice: Hear
  chosen_spanish: Oigan
  alternatives_spanish:
  - Escuchen
  - Oigan atentamente
  - Obedezcan
  lexicon: HALOT
  rationale: El imperativo plural de שׁמע abarca oír con atención y, según el contexto, obedecer. En español, «Oigan» conserva esa amplitud sin volver explícita la idea de obedecer, que el hebreo aquí deja implícita.
- source_word: מוּסָ֥ר
  english_pob_choice: instruction
  chosen_spanish: la instrucción
  alternatives_spanish:
  - la disciplina
  - la corrección
  lexicon: HALOT
  rationale: En la literatura sapiencial, מוּסָר puede referirse a disciplina formativa o instrucción correctiva. «Instrucción» mantiene el tono pedagógico del pasaje y funciona bien junto con «háganse sabios».
- source_word: וַחֲכָ֗מוּ
  english_pob_choice: and become wise
  chosen_spanish: háganse sabios
  alternatives_spanish:
  - y sean sabios
  - y vuelvan sabios
  - y lleguen a ser sabios
  lexicon: HALOT
  rationale: El verbo חכם expresa el proceso de llegar a ser sabio. «Háganse sabios» comunica ese carácter resultativo/mejorativo en español con naturalidad y sin reducirlo a una mera cualidad estática.
- source_word: וְאַל
  english_pob_choice: and do not
  chosen_spanish: y no
  alternatives_spanish:
  - pero no
  - ni
  lexicon: HALOT
  rationale: La construcción negativa coordinada se expresa de forma directa con «y no», que preserva la unión de las cláusulas en el hebreo.
- source_word: תִּפְרָֽעוּ
  english_pob_choice: neglect it
  chosen_spanish: la desprecien
  alternatives_spanish:
  - la descuiden
  - la dejen ir
  - la rechacen
  lexicon: HALOT
  rationale: פרע puede llevar la idea de soltar, dejar ir, descuidar o rechazar lo recibido. Dado que el objeto es la instrucción recién mencionada, «la desprecien» comunica la fuerza de apartarse de ella sin sonar demasiado técnico; no obstante, el sentido de descuidarla queda disponible en la nota.
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo de Proverbios 8:33 y conserva la tensión lexical de תִּפְרָעוּ mediante una nota alternativa, en línea con el registro auditado en la traducción inglesa POB.
  spanish_consistency_notes:
  - Se usa «instrucción» para מוּסָר conforme al uso sapiencial y para evitar la carga más punitiva de «disciplina».
  - Se evita «SEÑOR» porque no aparece el nombre divino en este versículo.
  - «Háganse sabios» mantiene el matiz de proceso de חכם, coherente con el enfoque de la POB inglesa.
