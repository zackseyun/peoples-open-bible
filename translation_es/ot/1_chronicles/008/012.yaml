  glossary_alignment: No hay conflictos con la terminología teológica de proyecto. Los nombres propios y la sintaxis están en línea con el POB. La única desalineación léxica significativa es וּבְנֹתֶיהָ, donde 'ciudades' no refleja bien el modismo hebreo ni la decisión auditada del POB de 'villages'.
