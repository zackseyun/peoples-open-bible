  text: כִּ֚י יָדַ֣ע עַבְדְּ/ךָ֔ כִּ֖י אֲנִ֣י חָטָ֑אתִי וְ/הִנֵּֽה בָ֣אתִי הַ/יּ֗וֹם רִאשׁוֹן֙ לְ/כָל בֵּ֣ית יוֹסֵ֔ף לָ/רֶ֕דֶת לִ/קְרַ֖את אֲדֹנִ֥/י הַ/מֶּֽלֶךְ־־׃ס
base_translation:
  language: en
  yaml_path: translation/ot/2_samuel/019/021.yaml
  text: For your servant knows that I have sinned[a]. And behold, I have come today, the first of all the house of Joseph[b], to come down to meet my lord the king.
  footnotes:
  - marker: a
    text: '''The house of Joseph'' refers to the Joseph tribes, especially the northern tribal groupings associated with Ephraim and Manasseh.'
    reason: cultural_note
  - marker: b
    text: Or 'from all the house of Joseph.' The Hebrew construction can be understood to mean that he was the first one out of the whole Joseph group to come down and meet the king.
    reason: lexical_alternative
