review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: circunstancia temporal («Cuando»), acto formal de hacer un voto a Dios, prohibición de demorarse, razón basada en el desagrado divino hacia los necios, y mandato final de cumplir lo prometido. Sin embargo, hay un problema léxico relevante en español con «votes / votó», que hoy se entiende primariamente como ‘emitir un voto electoral’ y no como ‘hacer un voto religioso’. Esto afecta la fidelidad comunicativa del cierre y de la nota. También conviene explicitar «Dios» en la cláusula causal para alinearse mejor con la decisión documentada en la POB inglesa.'
  spanish_quality_summary: El español es generalmente claro y digno, pero «Cumple lo que votes» suena poco natural y potencialmente equívoco en español contemporáneo. «Porque no se complace en los necios» es aceptable, pero sin sujeto explícito queda algo más opaco de lo necesario; «porque Dios no se complace en los necios» comunica mejor el sentido. La nota a también necesita corregir «se votó», que en español moderno introduce una ambigüedad no presente en el original.
  glossary_alignment: 'No hay conflicto con la terminología principal del proyecto: אֱלֹהִים se vierte correctamente como «Dios». La elección de «necios» para כְּסִילִים está bien alineada con la categoría sapiencial. La opción «cumplir» para שׁלם es defendible en español, pero debe evitarse la familia léxica «votar/votes» por ambigüedad moderna.'
  issues:
  - severity: high
    issue: Uso de «votes / se votó» para lenguaje de voto religioso
    rationale: Aunque etimológicamente posible, en español actual «votar» se asocia abrumadoramente con elecciones. «Cumple lo que votes» puede malentenderse y no preserva con claridad el sentido del hebreo ni la intención de la POB inglesa.
  - severity: medium
    issue: Sujeto implícito no explicitado en «porque no se complace en los necios»
    rationale: La POB inglesa documentó la decisión de hacer explícito que el sujeto es Dios. En español puede omitirse el sujeto, pero aquí la explicitación mejora la claridad y la alineación con la justificación teológica ya auditada.
  - severity: low
    issue: 'Nota a con redacción poco natural: «no demores cumplirlo»'
    rationale: En español suena más natural «no demores en cumplirlo» o «no pospongas cumplirlo / no demores su cumplimiento». Además, la nota debe evitar «lo que se votó» por la misma ambigüedad de «votar».
  revised_spanish_text: Cuando hagas un voto a Dios[a], no tardes en cumplirlo, porque Dios no se complace en los necios[b]. Cumple lo que prometes en tu voto.
  revised_footnotes:
  - marker: a
    text: O «no demores en cumplirlo». El verbo hebreo puede denotar pagar, completar o cumplir lo que se prometió en el voto.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «porque no hay complacencia en necios», con el sujeto implícito; el sentido es que Dios no se complace en los necios.'
    reason: alternative_reading
  revision_rationale: Se corrige la ambigüedad moderna de «votar/votes» sustituyéndola por una formulación inequívoca de voto religioso. Se explicita «Dios» en la cláusula causal para reflejar mejor la decisión auditada en inglés y mejorar la claridad en español. También se pule la nota léxica para que suene natural y evite el falso sentido electoral.
