revisions:
- from: Estos son los hombres que David estableció sobre el servicio del canto en la casa de Yahvé[a][b], desde que el arca descansó.
  to: Estos son los hombres que David nombró sobre el servicio del canto en la casa de Yahvé[a][b], después de que el arca llegó a descansar.
  rationale: Se ajusta הֶעֱמִיד a «nombró» para expresar mejor la designación oficial de personas a un cargo. Se cambia la cláusula temporal a «después de que el arca llegó a descansar» para comunicar con mayor precisión el valor temporal de מִמְּנוֹחַ sin la ambigüedad aspectual de «desde que». Se normaliza la puntuación de la nota a.
