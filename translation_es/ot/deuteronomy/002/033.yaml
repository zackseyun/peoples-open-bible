revisions:
- from: Y Yahvé nuestro Dios lo entregó delante de nosotros[a], y nosotros lo derrotamos[b], junto con sus hijos y todo su pueblo.
  to: Y Yahvé nuestro Dios nos lo entregó[a], y lo abatimos, junto con sus hijos[b] y todo su pueblo.
