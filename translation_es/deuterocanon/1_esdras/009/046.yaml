review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue en gran medida el sentido del griego y del rastro POB en la cláusula temporal, la mención de la ley, la postura del pueblo y la cadena de títulos divinos. Sin embargo, introduce una expansión interpretativa en πάντες ὀρθοὶ ἔστησαν al añadir ''con reverencia'', matiz no explícito en el griego. Además, las notas están desancladas o mal asignadas respecto a las notas inglesas: [a] aparece sobre ''la ley'' pero trata del nombre Azarías; [b] y [c] invierten/alteran la lógica de las notas del POB, y falta la alternativa léxica sobre λῦσαι (''abrir/desenrollar'').'
  spanish_quality_summary: El español es claro y eclesialmente legible, con buena fluidez general. 'Se pusieron de pie con reverencia' suena natural, pero excede el contenido fuente; 'se quedaron de pie erguidos' o 'se pusieron de pie erguidos' sería más fiel. La cadena 'el Señor de los ejércitos' es idiomática y adecuada aquí, aunque conviene mantener la nota sobre σαβαώθ. La puntuación y el registro son buenos.
  glossary_alignment: 'Alineación mayormente buena con la terminología del proyecto: θεός -> ''Dios''; Παντοκράτωρ -> ''Todopoderoso''; σαβαώθ traducido semánticamente. No hay conflicto con Yahvé porque no aparece יהוה/κύριος como cita del nombre divino. El principal problema no es terminológico sino de fidelidad semántica y de correspondencia exacta de notas.'
  issues:
  - severity: medium
    issue: Expansión interpretativa en 'con reverencia'
    rationale: ὀρθοὶ ἔστησαν indica postura erguida/upright; la reverencia puede inferirse por contexto, pero no está expresada en el texto griego. El POB inglés preserva el matiz físico, no uno actitudinal añadido.
  - severity: high
    issue: Nota [a] anclada en lugar incorrecto y contenido mal ajustado
    rationale: La nota [a] está colocada sobre 'la ley', pero trata del nombre Ἀζαρίας/Azariah. Además, en español el paralelo hebreo no 'tiene Azarías' sino la forma hebrea equivalente a 'Azariah'; conviene expresarlo como 'Azariah' o 'Azarías' según la decisión, pero anclado al nombre.
  - severity: high
    issue: Falta la nota léxica sobre λῦσαι
    rationale: 'El rastro inglés conserva una nota importante: ''when the law was read'' puede también entenderse como ''when the law was unrolled/opened''. Esa alternativa desaparece en el borrador español, aunque es una decisión significativa del original griego.'
  - severity: medium
    issue: Las notas [b] y [c] no corresponden limpiamente al audit trail inglés
    rationale: En inglés, [c] explica 'hosts' para σαβαώθ y [b] explica la alternativa de λῦσαι. En el borrador español, [b] habla de σαβαώθ y [c] de παντοκράτωρ, creando una reconfiguración innecesaria y omitiendo la nota relevante sobre λῦσαι.
  revised_spanish_text: Y cuando se leyó la ley[b], todos se quedaron de pie erguidos; y Azarías[a] bendijo al Dios Altísimo, el Señor de los ejércitos[c], el Todopoderoso.
  revised_footnotes:
