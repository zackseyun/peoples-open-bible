revisions:
- from: Estoy encorvado y agobiado[a] en gran manera; todo el día ando en duelo.
  to: Estoy encorvado y muy abatido; todo el día ando en duelo[a].
  rationale: Se corrige el anclaje de la nota al pie para que corresponda a קֹדֵר, y se ajusta «agobiado» a «muy abatido» para reflejar mejor el paralelismo hebreo de doble rebajamiento sin perder naturalidad en español. La línea resultante sigue de cerca el sentido fuente y la decisión léxica documentada en el POB inglés.
