  text: וְ/עַתָּה֙ אוֹדִֽיעָה נָּ֣א אֶתְ/כֶ֔ם אֵ֛ת אֲשֶׁר אֲנִ֥י עֹשֶׂ֖ה לְ/כַרְמִ֑/י הָסֵ֤ר מְשׂוּכָּת/וֹ֙ וְ/הָיָ֣ה לְ/בָעֵ֔ר פָּרֹ֥ץ גְּדֵר֖/וֹ וְ/הָיָ֥ה לְ/מִרְמָֽס־־׃
base_translation:
  language: en
  yaml_path: translation/ot/isaiah/005/005.yaml
  text: 'And now[a], please let me make known to you what I will do to my vineyard: I will remove its hedge, and it will be consumed; I will break down its wall[b], and it will be trampled down.'
  footnotes:
  - marker: a
    text: Or 'and it will become fit for burning' / 'and it will be consumed.' The Hebrew expression is literally 'and it will be for burning.'
    reason: lexical_alternative
  - marker: b
    text: Or 'and it will become a trampling place.'
    reason: lexical_alternative
