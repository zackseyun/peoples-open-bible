translation:
  language: es
  text: 'Ustedes están de pie hoy, todos ustedes, delante de Yahvé su Dios: sus cabezas, sus tribus, sus ancianos[b] y sus oficiales; todos los hombres de Israel[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cada hombre de Israel». El hebreo dice literalmente «todo hombre de Israel», una expresión distributiva.'
    reason: lexical_alternative
  - marker: b
    text: «Sus cabezas» también puede entenderse idiomáticamente como «sus líderes», o, uniendo más de cerca la frase siguiente, como «las cabezas de sus tribus».
    reason: alternative_reading
lexical_decisions:
- source_word: נִצָּבִים
  english_pob_choice: are standing
  chosen_spanish: están de pie
  alternatives_spanish:
  - están parados
  - están presentes
  lexicon: HALOT
  rationale: El participio nifal expresa una postura/posición presente de la asamblea. En español, "están de pie" conserva mejor la escena y la idea de estar colocados delante de Dios que un imperativo o una formulación más interpretativa.
- source_word: הַיּוֹם
  english_pob_choice: today
  chosen_spanish: hoy
  alternatives_spanish:
  - en este día
  - este día
  lexicon: HALOT
  rationale: '"Hoy" es la equivalencia natural y moderna para el valor temporal inmediato del hebreo.'
- source_word: כֻּלְּכֶם
  english_pob_choice: all of you
  chosen_spanish: todos ustedes
  alternatives_spanish:
  - todos ustedes juntos
  - cada uno de ustedes
  lexicon: HALOT
  rationale: La forma plural enfática requiere una expresión colectiva clara en español. "Todos ustedes" comunica la totalidad del grupo sin perder naturalidad.
- source_word: לִפְנֵי
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - en presencia de
  - ante
  lexicon: HALOT
  rationale: En este contexto de alianza, la idea es estar ante la presencia de Dios. "Delante de" mantiene la relación espacial y ceremonial sin sonar arcaica.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino personal según la norma del proyecto. "Yahvé" corresponde al tratamiento español establecido para יְהוָה, en lugar de sustituirlo por un título.
- source_word: אֱלֹהֵיכֶם
  english_pob_choice: your God
  chosen_spanish: su Dios
  alternatives_spanish:
  - su Dios de ustedes
  - su Dios propio
  lexicon: HALOT
  rationale: El sufijo plural de segunda persona se expresa de manera natural con "su" en español, ya que el vocativo ya deja claro el referente plural. Mantiene el valor posesivo sin redundancia pesada.
- source_word: רָאשֵׁיכֶם
  english_pob_choice: your heads
  chosen_spanish: sus cabezas
  alternatives_spanish:
  - sus líderes
  - sus jefes
  lexicon: HALOT
  rationale: La decisión sigue de cerca la metáfora hebrea de "cabezas". Aunque puede entenderse idiomáticamente como líderes, aquí se preserva la imagen original porque el texto lista categorías sociales en paralelo.
- source_word: שִׁבְטֵיכֶם
  english_pob_choice: your tribes
  chosen_spanish: sus tribus
  alternatives_spanish:
  - las tribus de ustedes
  lexicon: HALOT
  rationale: '"Tribus" es el sentido léxico directo y encaja con la enumeración del versículo. Se conserva la estructura del listado sin introducir una glosa interpretativa.'
- source_word: זִקְנֵיכֶם
  english_pob_choice: your elders
  chosen_spanish: sus ancianos
  alternatives_spanish:
  - sus mayores
  - sus viejos
  lexicon: HALOT
  rationale: En contextos de organización comunitaria israelita, זקנים designa a los ancianos como autoridad social. "Ancianos" es la equivalencia estable y fiel al uso bíblico.
- source_word: וְשֹׁטְרֵיכֶם
  english_pob_choice: and your officers
  chosen_spanish: y sus oficiales
  alternatives_spanish:
  - y sus funcionarios
  - y sus inspectores
  lexicon: HALOT
  rationale: En contextos deuteronómicos, שֹׁטְרִים son funcionarios u oficiales administrativos. "Oficiales" reproduce bien la función sin sobreespecificarla.
- source_word: כֹּל אִישׁ יִשְׂרָאֵל
  english_pob_choice: all the men of Israel
  chosen_spanish: todos los hombres de Israel
  alternatives_spanish:
  - cada hombre de Israel
  - todo varón de Israel
  lexicon: HALOT
  rationale: El hebreo usa אִישׁ en singular distributivo con referencia masculina. Se conserva esa precisión con "los hombres de Israel" en vez de neutralizarlo, siguiendo la lectura auditada del POB.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El versículo emplea directamente el Tetragrámaton. La traducción mantiene el nombre propio del pacto y evita la sustitución por un título genérico, conforme a la política del proyecto.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Expresión masculina distributiva en כֹּל אִישׁ יִשְׂרָאֵל
  english_pob_reading: all the men of Israel
  chosen_spanish_reading: todos los hombres de Israel
  alternative_spanish_readings:
  - todos en Israel
  - todo Israel
  rationale: El sustantivo אִישׁ es masculino y distributivo. Se conserva la referencia masculina para no borrar la marca léxica del hebreo, aunque el contexto inmediato incluye a toda la comunidad del pacto.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: La revisión más reciente indicó acuerdo alto y no requirió cambios. Se mantiene la estructura del listado y la decisión de conservar la metáfora de «cabezas», así como la traducción del Nombre divino como Yahvé.
  spanish_consistency_notes:
  - Se mantiene el tratamiento reverencial y consistente de יְהוָה como Yahvé en todo el texto.
  - Se preserva la enumeración paratáctica del hebreo con dos puntos y comas para reflejar la lista de grupos.
  - Se conserva el masculino distributivo en «los hombres de Israel» por fidelidad al hebreo y coherencia con la política del proyecto.
  - La frase «delante de» reproduce de manera natural el valor de לִפְנֵי en contexto ceremonial.
  - 'La puntuación española se ajusta a la lista: coma tras «hoy» y dos puntos antes de la enumeración.'
