translation:
  language: es
  text: Y llegó a Jerusalén en el quinto mes[a], que era el séptimo año del rey.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y llegó a Jerusalén en el quinto mes; era el séptimo año del rey».'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיָּבֹא
  english_pob_choice: And he came
  chosen_spanish: Y llegó
  alternatives_spanish:
  - Y vino
  - Y vino a
  lexicon: HALOT
  rationale: El verbo de movimiento בוא admite en español tanto «vino» como «llegó». Dado que el contexto es una referencia de desplazamiento con destino ya explícito, «llegó» expresa con naturalidad el punto de llegada sin añadir interpretación ajena al hebreo. Mantiene la secuencia narrativa del waw-consecutivo.
- source_word: יְרוּשָׁלִַם
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  alternatives_spanish:
  - Jerusalem
  lexicon: HALOT
  rationale: Es un nombre propio geográfico; en español bíblico estándar se usa «Jerusalén».
- source_word: בַּחֹדֶשׁ הַחֲמִישִׁי
  english_pob_choice: in the fifth month
  chosen_spanish: en el quinto mes
  alternatives_spanish:
  - durante el quinto mes
  lexicon: HALOT
  rationale: La preposición temporal ב con חֹדֶשׁ se traduce de forma natural como «en». «Quinto mes» conserva el valor calendárico sin ampliar el sentido.
- source_word: הִיא
  english_pob_choice: which was
  chosen_spanish: que era
  alternatives_spanish:
  - y era
  - el cual era
  lexicon: HALOT
  rationale: El pronombre femenino funciona como enlace explicativo entre la mención del mes y la fecha regnal. «Que era» conserva esa relación sin forzar un relativo más pesado en español.
- source_word: שְׁנַת הַשְּׁבִיעִית
  english_pob_choice: the seventh year
  chosen_spanish: el séptimo año
  alternatives_spanish:
  - año siete
  lexicon: HALOT
  rationale: La construcción ordinal en un cómputo regnal se vierte con la forma idiomática española «el séptimo año».
- source_word: לַמֶּלֶךְ
  english_pob_choice: of the king
  chosen_spanish: del rey
  alternatives_spanish:
  - del rey Artajerjes
  - para el rey
  lexicon: HALOT
  rationale: El ל en este fechado regnal expresa pertenencia/relación cronológica; en español, «del rey» reproduce esa relación de manera directa. No se añade el nombre del rey porque este versículo no lo dice explícitamente.
theological_decisions:
- issue: Referencia regnal implícita sin nombrar al rey
  english_pob_reading: of the king
  chosen_spanish_reading: del rey
  alternative_spanish_readings:
  - del rey Artajerjes
  - del monarca
  rationale: El hebreo deja el referente real implícito. La traducción mantiene esa apertura textual en lugar de especificar un nombre no presente en el versículo, preservando la precisión documental del fechado.
  doctrine_reference: Principio de fidelidad textual y no-expansión interpretativa
translation_notes:
  revision_awareness: 'Se siguió el audit trail en inglés: verb movement simple (came/arrived), temporal phrase ''in the fifth month'', explanatory pronoun ''which was'', and regnal relation ''of the king''. No revisions were applied in the English record, so the Spanish draft mirrors the stable reading while choosing idiomatic Spanish where the Hebrew permits it.'
  spanish_consistency_notes:
  - Se mantiene «Jerusalén» como topónimo estándar en español.
  - Se conserva la secuencia narrativa con un verbo simple de movimiento.
  - No se introduce el nombre del rey, porque el versículo no lo explicita.
  - La nota preserva la alternativa inglesa 'arrived' y la posibilidad de segmentar la cláusula de manera más directa en español.
