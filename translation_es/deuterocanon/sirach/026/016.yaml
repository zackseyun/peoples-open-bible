translation:
  language: es
  text: Gracia sobre gracia es una mujer modesta[a], y ninguna balanza es digna de un alma dueña de sí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «mujer pudorosa» o «mujer recatada»; el griego es condensado, y αἰσχυντηρά también puede traducirse más literalmente como «ruborosa» o «tímida» según el contexto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: χάρις
  english_pob_choice: grace
  chosen_spanish: gracia
  alternatives_spanish:
  - favor
  - encanto
  - belleza
  lexicon: LSJ
  rationale: Mantengo la correspondencia léxica más directa con χάρις, tal como revisó la POB inglesa, en lugar de desplazarla a un valor más interpretativo como 'encanto'. En este dicho sapiencial, 'gracia' conserva la idea de cualidad atractiva/agradable sin perder el vínculo lexical principal.
- source_word: ἐπὶ χάριτι
  english_pob_choice: upon grace
  chosen_spanish: sobre gracia
  alternatives_spanish:
  - gracia sobre gracia
  - gracia añadida a gracia
  lexicon: LSJ
  rationale: La preposición ἐπί con dativo expresa adición o acumulación. 'Sobre gracia' preserva la repetición enfática sin convertirla en una paráfrasis ajena al griego. 'Gracia sobre gracia' sería posible, pero aquí se busca reflejar el orden y la compresión del original con naturalidad española.
- source_word: γυνὴ
  english_pob_choice: woman
  chosen_spanish: mujer
  alternatives_spanish:
  - esposa
  lexicon: LSJ
  rationale: Sin contexto marital explícito, γυνή se entiende de modo general como 'mujer'. 'Esposa' introduciría una relación no indicada por el texto.
- source_word: αἰσχυντηρά
  english_pob_choice: modest
  chosen_spanish: modesta
  alternatives_spanish:
  - tímida
  - vergonzosa
  - ruborosa
  - recatada
  lexicon: LSJ
  rationale: El adjetivo describe a una persona caracterizada por pudor o reserva apropiada. 'Modesta' comunica la virtud en español moderno y evita el tono arcaico de 'vergonzosa' o 'ruborosa', que podría sonar peyorativo.
- source_word: σταθμὸς
  english_pob_choice: scale
  chosen_spanish: balanza
  alternatives_spanish:
  - escala
  - peso
  - medida
  lexicon: LSJ
  rationale: En español 'balanza' transmite con claridad el instrumento de pesar y la metáfora de evaluación de valor. Es más natural que 'escala' para este contexto sapiencial.
- source_word: πᾶς ἄξιος
  english_pob_choice: worthy
  chosen_spanish: digna
  alternatives_spanish:
  - adecuada
  - capaz
  - suficiente
  lexicon: LSJ
  rationale: 'El griego es comprimido: literalmente no hay una balanza ''digna/adecuada'' para valorar este objeto. ''Digna'' conserva la idea de insuficiencia relativa al valor del alma, sin ampliar demasiado el sentido.'
- source_word: ἐγκρατοῦς ψυχῆς
  english_pob_choice: of a self-controlled soul
  chosen_spanish: de un alma templada
  alternatives_spanish:
  - de un alma autocontrolada
  - de un alma disciplinada
  - de un espíritu templado
  lexicon: LSJ
  rationale: ἐγκρατής expresa dominio de sí. 'Templada' en español bíblico-literario comunica sobriedad, contención y mesura de manera idiomática; 'autocontrolada' sería más explícito pero más técnico. Mantengo ψυχή como 'alma' por su valor antropológico habitual en este tipo de literatura.
theological_decisions:
- issue: Valor de χάρις en un contexto sapiencial de belleza/virtud
  english_pob_reading: grace upon grace
  chosen_spanish_reading: gracia sobre gracia
  alternative_spanish_readings:
  - encanto sobre encanto
  - favor sobre favor
  rationale: Aunque χάρις puede sugerir atractivo o encanto en contextos de belleza, la POB revisada privilegia la correspondencia lexical con 'grace'. En español, 'gracia' permite conservar esa amplitud semántica sin cerrar prematuramente el matiz sapiencial de cualidad agradable y estimable.
  doctrine_reference: Translation philosophy §1 y §6
- issue: Metáfora de valoración con σταθμός
  english_pob_reading: no scale is worthy of a self-controlled soul
  chosen_spanish_reading: ninguna balanza es digna de un alma templada
  alternative_spanish_readings:
  - ninguna medida es digna de un alma templada
  - ninguna balanza puede medir el valor de un alma templada
  rationale: La línea griega no afirma solamente incapacidad de medir, sino insuficiencia radical ante el valor del alma continente. 'No es digna' sigue el juicio de valor del texto y mantiene la imagen de la balanza sin convertirla en una explicación más libre.
  doctrine_reference: Translation philosophy §1 y §6
- issue: Matiz moral de αἰσχυντηρά
  english_pob_reading: modest woman
  chosen_spanish_reading: mujer modesta
  alternative_spanish_readings:
  - mujer recatada
  - mujer pudorosa
  - mujer vergonzosa
  rationale: '''Modesta'' conserva el sentido elogioso de pudor, decoro y reserva moral. Evita cargar el término con vergüenza negativa o con una connotación exclusivamente psicológica.'
  doctrine_reference: Translation philosophy §6
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente de la POB inglesa, que ajustó la primera mitad desde 'Charm' a 'Grace' y reformuló la segunda cláusula para reflejar con más literalidad la frase griega sobre la balanza y el alma templada. La versión española sigue esa preferencia por una correspondencia más cercana al léxico fuente, evitando expandir la metáfora más allá de lo que el griego y el audit trail justifican.
  spanish_consistency_notes:
  - Se mantiene 'gracia' para χάρις, en línea con la revisión inglesa más reciente y con el terminario POB.
  - '''Mujer'' se usa para γυνή porque no hay indicación contextual de matrimonio.'
  - '''Alma'' conserva ψυχή de forma directa y comprensible en español bíblico.'
  - '''Balanza'' se eligió como equivalente idiomático de σταθμός dentro de la metáfora del peso/valor.'
