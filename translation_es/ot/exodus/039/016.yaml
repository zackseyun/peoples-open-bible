translation:
  language: es
  text: Hicieron dos engastes[a] de oro y dos anillos de oro, y pusieron los dos anillos en los dos extremos del pectoral.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "monturas" o "engastes de filigrana"; el término hebreo se refiere al trabajo de oro usado como pieza de ajuste o sujeción ornamental.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲשׂוּ
  english_pob_choice: They made
  chosen_spanish: Hicieron
  alternatives_spanish:
  - Y hicieron
  - Y fabricaron
  lexicon: HALOT
  rationale: El wayyiqtol narra acción secuencial. En español, 'hicieron' mantiene la sucesión sin forzar una conjunción inicial, y conserva el sentido de fabricación artesanal del contexto.
- source_word: מִשְׁבְּצֹת
  english_pob_choice: settings
  chosen_spanish: monturas
  alternatives_spanish:
  - engastes
  - ajustes
  - soportes
  - montajes
  lexicon: HALOT
  rationale: El término hebreo designa una pieza de oro trabajada para servir de engaste o soporte ornamental. 'Monturas' comunica la función material sin cerrar demasiado la técnica, y evita una especificación excesiva que el contexto no obliga a fijar.
- source_word: זָהָב
  english_pob_choice: gold
  chosen_spanish: de oro
  alternatives_spanish:
  - de oro fino
  - de oro
  lexicon: HALOT
  rationale: La materia se expresa naturalmente en español con la construcción 'de oro'. Se conserva la repetición del material en ambas expresiones para reflejar la estructura hebrea.
- source_word: טַבְּעֹת
  english_pob_choice: rings
  chosen_spanish: anillos
  alternatives_spanish:
  - aros
  - aros de unión
  - argollas
  lexicon: HALOT
  rationale: En el contexto del tabernáculo, el término puede referirse a piezas de unión en forma de anillo. 'Anillos' es claro y suficientemente amplio en español, manteniendo la referencia a la pieza metálica descrita.
- source_word: וַיִּתְּנוּ
  english_pob_choice: they put
  chosen_spanish: pusieron
  alternatives_spanish:
  - colocaron
  - pusieron y
  - situaron
  lexicon: HALOT
  rationale: El verbo נתן aquí significa colocar o poner. 'Pusieron' es el equivalente más natural y directo en español, sin añadir matiz interpretativo.
- source_word: עַל
  english_pob_choice: 'on'
  chosen_spanish: sobre
  alternatives_spanish:
  - encima de
  - sobre los
  lexicon: HALOT
  rationale: '''Sobre'' conserva la relación espacial de colocación encima de los extremos del pectoral y suena natural en español bíblico contemporáneo.'
- source_word: שְׁנֵי קְצֹוֹת
  english_pob_choice: the two ends
  chosen_spanish: los dos extremos
  alternatives_spanish:
  - ambos extremos
  - las dos puntas
  lexicon: HALOT
  rationale: La frase constructa señala los dos extremos físicos de la pieza. 'Los dos extremos' reproduce de cerca la estructura y el sentido concreto del hebreo.
- source_word: הַחֹשֶׁן
  english_pob_choice: the breastpiece
  chosen_spanish: el pectoral
  alternatives_spanish:
  - el pectoral sacerdotal
  - el pectoral del juicio
  - la bolsa del pectoral
  lexicon: HALOT
  rationale: En español litúrgico y bíblico, 'pectoral' es un equivalente tradicional y claro para el objeto sacerdotal. Se evita añadir 'del juicio' porque el contexto inmediato no lo exige y el inglés POB tampoco lo incorpora.
translation_notes:
  revision_awareness: 'La redacción sigue el texto hebreo y el criterio óptimo-equivalente del POB inglés: mantiene la secuencia narrativa, duplica el material ''oro/de oro'' donde el hebreo lo repite, y conserva la ambigüedad técnica de מִשְׁבְּצֹת con una nota de alternativas en español.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para el nombre divino cuando aparezca; aquí no ocurre.
  - Se usa 'pectoral' para חֹשֶן en coherencia con el registro sacerdotal ya adoptado por el POB inglés.
  - Se conserva la repetición de la pieza y del material para reflejar la paralelía del hebreo.
  - No se introduce terminología eclesiástica tradicional que no esté respaldada por el contexto fuente.
