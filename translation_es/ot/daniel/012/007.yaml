translation:
  language: es
  text: Entonces oí al hombre vestido de lino, que estaba sobre las aguas del río; y él alzó su mano derecha y su mano izquierda hacia el cielo, y juró por el que vive para siempre que sería por un tiempo, tiempos y medio tiempo[a]; y cuando se haya terminado el quebrantamiento del poder[b] del pueblo santo, todas estas cosas se cumplirán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «por un tiempo señalado, tiempos señalados y medio»; muchos entienden esto como «por un año, dos años y medio año».'
    reason: alternative_reading
  - marker: b
    text: 'Hebreo: «la mano del pueblo santo»; aquí «mano» probablemente significa poder o fuerza.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְב֣וּשׁ הַ/בַּדִּים
  english_pob_choice: clothed in linen
  chosen_spanish: vestido de lino
  alternatives_spanish:
  - vestido con lino
  - con vestiduras de lino
  lexicon: HALOT
  rationale: La construcción participial pide una forma natural en español que conserve la imagen concreta. «Vestido de lino» comunica bien el dato material sin volver la frase pesada.
- source_word: הַ/יְאֹר
  english_pob_choice: the river
  chosen_spanish: el río
  alternatives_spanish:
  - el Nilo
  - el cauce
  lexicon: HALOT
  rationale: En Daniel el término funciona dentro de una visión con un río específico, pero el contexto inmediato en español no exige identificarlo como «Nilo». «El río» preserva la neutralidad contextual del POB inglés.
- source_word: וַ/יָּ֨רֶם יְמִינ֤/וֹ וּ/שְׂמֹאל/וֹ
  english_pob_choice: he raised his right hand and his left hand
  chosen_spanish: alzó su diestra y su siniestra
  alternatives_spanish:
  - alzó su mano derecha y su mano izquierda
  - levantó ambas manos
  lexicon: HALOT
  rationale: El hebreo nombra explícitamente ambas manos, y la versión española conserva ese gesto solemne de juramento. «Diestra» y «siniestra» son formas dignas y claras, aunque también sería posible decirlo en lenguaje más descriptivo.
- source_word: אֶל הַ/שָּׁמַ֔יִם
  english_pob_choice: to heaven
  chosen_spanish: hacia el cielo
  alternatives_spanish:
  - al cielo
  - hacia los cielos
  lexicon: HALOT
  rationale: En español, «hacia el cielo» expresa bien la dirección del gesto de juramento y mantiene el registro solemne sin forzar un calco.
- source_word: בְּ/חֵ֣י הָ/עוֹלָ֑ם
  english_pob_choice: by him who lives forever
  chosen_spanish: por el Viviente para siempre
  alternatives_spanish:
  - por el que vive para siempre
  - por el que vive eternamente
  lexicon: HALOT
  rationale: La fórmula hebrea invoca literalmente al que vive perpetuamente. La forma escogida conserva el valor reverente y personal de la expresión sin desdibujar el nombre implícito del juramento.
- source_word: לְ/מוֹעֵ֨ד מֽוֹעֲדִ֜ים וָ/חֵ֗צִי
  english_pob_choice: for a time, times, and half a time
  chosen_spanish: por un tiempo, tiempos y medio tiempo
  alternatives_spanish:
  - por un tiempo señalado, tiempos señalados y medio
  - por un tiempo, dos tiempos y medio tiempo
  lexicon: HALOT
  rationale: Se conserva la ambigüedad apocalíptica de la expresión, como hace el POB inglés. «Tiempo, tiempos y medio tiempo» suena natural en español bíblico y no fuerza una interpretación cronológica más específica de la que permite el hebreo.
- source_word: וּ/כְ/כַלּ֛וֹת
  english_pob_choice: and when ... is finished
  chosen_spanish: y cuando se haya terminado
  alternatives_spanish:
  - y al terminarse
  - y cuando concluya
  lexicon: HALOT
  rationale: El infinitivo con valor temporal se vierte con una subordinada natural en español. La redacción mantiene la secuencia futura y la idea de culminación.
- source_word: נַפֵּ֥ץ יַד
  english_pob_choice: the shattering of the power
  chosen_spanish: el quebrantamiento del poder
  alternatives_spanish:
  - el quebrantamiento de la mano
  - la destrucción de la fuerza
  lexicon: HALOT
  rationale: «Mano» funciona aquí como metonimia de poder o fuerza, tal como reconoce el POB inglés. «Poder» expresa con claridad el sentido sin perder la violencia de נַפֵּץ.
- source_word: עַם קֹ֖דֶשׁ
  english_pob_choice: the holy people
  chosen_spanish: del pueblo santo
  alternatives_spanish:
  - de la gente santa
  - de la nación santa
  lexicon: HALOT
  rationale: En español, «pueblo santo» es la forma más natural y precisa para el colectivo consagrado a Dios en este contexto apocalíptico.
- source_word: תִּכְלֶ֥ינָה כָל אֵֽלֶּה
  english_pob_choice: all these things will be completed
  chosen_spanish: todas estas cosas se cumplirán
  alternatives_spanish:
  - todas estas cosas terminarán
  - todo esto se completará
  lexicon: HALOT
  rationale: El verbo expresa consumación/culminación, no simple desaparición. «Se cumplirán» preserva el matiz de realización plena y es idiomático en español bíblico.
theological_decisions:
- issue: Interpretación de לְמוֹעֵד מוֹעֲדִים וָחֵצִי
  english_pob_reading: Rendered formally as 'for a time, times, and half a time' without specifying exact chronological units.
  chosen_spanish_reading: «por un tiempo, tiempos y medio tiempo» sin fijar unidades exactas.
  alternative_spanish_readings:
  - por un tiempo señalado, tiempos señalados y medio
  - por un año, dos años y medio año
  rationale: La expresión apocalíptica se mantiene deliberadamente abierta, como en el POB inglés. La traducción evita imponer una equivalencia cronológica que el hebreo no explicita.
  doctrine_reference: Daniel 12:7; principio de preservación de ambigüedad apocalíptica
- issue: Metonimia de יַד en נַפֵּץ יַד עַם קֹדֶשׁ
  english_pob_reading: Rendered 'the power of the holy people' rather than 'the hand of the holy people.'
  chosen_spanish_reading: «el quebrantamiento del poder del pueblo santo»
  alternative_spanish_readings:
  - el quebrantamiento de la mano del pueblo santo
  - el quebrantamiento de la fuerza del pueblo santo
  rationale: «Mano» es una metonimia semítica por poder o fuerza. En español, «poder» transmite con naturalidad la fuerza opresiva y la fragilidad del pueblo sin oscurecer el trasfondo hebreo.
  doctrine_reference: Daniel 12:7; metonimia semítica
- issue: Sujeto implícito del juramento en בְּחֵי הָעוֹלָם
  english_pob_reading: by him who lives forever
  chosen_spanish_reading: «por el Viviente para siempre»
  alternative_spanish_readings:
  - por el que vive para siempre
  - por el que vive eternamente
  rationale: La fórmula apunta a Dios como el Viviente eterno. La opción elegida es reverente, breve y compatible con el valor implícito del juramento.
  doctrine_reference: Daniel 12:7; fórmula de juramento divina
translation_notes:
  revision_awareness: La redacción sigue de cerca el audit trail inglés y no introduce revisiones posteriores sustantivas; se mantiene la ambigüedad del tiempo apocalíptico y la metonimia de «mano» como poder, tal como quedó aprobado en el pase final.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como término predeterminado cuando el texto lo requiere; aquí no aparece un tetragrámaton explícito.
  - Se usa «pueblo santo» para עַם קֹדֶשׁ, coherente con el uso bíblico y con la tradición POB de preservar el sentido colectivo.
  - «Tiempo, tiempos y medio tiempo» conserva la fórmula tradicional sin convertirla en una equivalencia interpretativa cerrada.
  - «Viviente para siempre» preserva el registro reverente del juramento sin añadir una paráfrasis doctrinal.
