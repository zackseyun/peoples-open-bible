  glossary_alignment: 'Alineado con la terminología del proyecto: יהוה → «Yahvé», אֱלֹהַי → «Dios mío», עָוֶל → «injusticia». La nota alternativa preserva correctamente la opción más amplia de culpabilidad moral asociada a «en mis manos».'
