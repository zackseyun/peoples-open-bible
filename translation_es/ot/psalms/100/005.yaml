review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: Yahvé, su bondad, la duración eterna de su חֶסֶד y la continuidad generacional de su fidelidad. Sin embargo, el anclaje de notas no respeta bien el rastro inglés: la nota [a] repite exactamente el texto principal en vez de ofrecer la alternativa real «Porque/Bueno» vs. «Porque/Porque», y la nota [c] presenta como alternativa la misma frase usada en el texto. Además, el inglés auditado preserva una nota léxica importante sobre חֶסֶד y una alternativa de formulación para la cola final que conviene mantener mejor en español.'
  spanish_quality_summary: El español es claro, natural y digno. «Porque Yahvé es bueno» y «su fidelidad dura de generación en generación» son idiomáticos. «Amor leal» es defendible y legible, aunque menos establecido que «amor fiel»; no exige cambio. Lo principal a reparar es la coherencia y utilidad de las notas al pie, no la redacción principal.
  glossary_alignment: 'Se alinea bien con la terminología del proyecto: יהוה → «Yahvé»; אֱמוּנָתוֹ → «su fidelidad». La elección «amor leal» para חַסְדּוֹ es compatible con la justificación teológica dada, aunque debe explicarse mejor en nota. No hay conflicto doctrinal que requiera adjudicación superior.'
  issues:
  - severity: medium
    issue: La nota [a] no aporta una alternativa real.
    rationale: 'El texto principal ya dice «Porque Yahvé es bueno», y la nota repite «O: “Porque Yahvé es bueno”». Esto no preserva la alternativa documentada en el audit trail inglés, que es más bien «Porque»/«Pues» o una resegmentación equivalente.'
  - severity: medium
    issue: La nota [c] duplica la redacción principal.
    rationale: 'La nota dice «O: “de generación en generación”», pero esa misma frase ya está en el texto. Debe reemplazarse por alternativas reales, como «para todas las generaciones» o una explicación de la forma hebrea «generación y generación».'
  - severity: low
    issue: Falta reflejar mejor la alternativa/forma más literal de la cláusula final.
    rationale: El inglés conserva la memoria de una formulación más literal del hebreo («to generation and generation»). En español no debe ir al texto principal, pero sí puede preservarse en nota como «hasta generación y generación» o explicarse como hebraísmo de continuidad sucesiva.
  revised_spanish_text: Porque Yahvé es bueno[a]; su amor leal[b] es para siempre, y su fidelidad dura de generación en generación[c].
  revised_footnotes:
  - marker: a
    text: 'O: «Pues Yahvé es bueno» o «Porque bueno es Yahvé».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo «su hesed»: amor leal, con matices de misericordia, fidelidad y amor del pacto.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «para todas las generaciones»; literalmente, «hasta generación y generación», una expresión hebrea de continuidad sucesiva.'
    reason: lexical_alternative
  revision_rationale: El texto principal puede mantenerse. Se revisan las notas para que preserven alternativas reales del source/audit trail, eviten duplicar la redacción ya adoptada y documenten mejor el hebraísmo final y la riqueza semántica de חֶסֶד.
