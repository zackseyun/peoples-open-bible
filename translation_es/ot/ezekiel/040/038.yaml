translation:
  language: es
  text: Había una cámara con su entrada junto a los postes de las puertas[a]; allí lavaban la ofrenda quemada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo usa un término arquitectónico (אֵילִים) cuyo referente exacto es discutido: puede entenderse como «postes», «pilares proyectantes», «vestíbulos» o una estructura semejante del complejo de la puerta.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לִשְׁכָּה
  english_pob_choice: a chamber
  chosen_spanish: una cámara
  alternatives_spanish:
  - una sala
  - un cuarto
  lexicon: HALOT
  rationale: לִשְׁכָּה designa una estancia o cámara dentro de un complejo arquitectónico; en este contexto visionario de templo, «cámara» conserva el sentido técnico y formal mejor que un término más general.
- source_word: וּפִתְחָהּ
  english_pob_choice: with its doorway
  chosen_spanish: con su entrada
  alternatives_spanish:
  - y su entrada
  - con su abertura
  lexicon: HALOT
  rationale: La forma con sufijo posesivo señala la entrada/apertura de la cámara. En español, «con su entrada» comunica la relación posesiva de manera natural y fiel al valor arquitectónico.
- source_word: בְּאֵילִים
  english_pob_choice: by the gateposts
  chosen_spanish: junto a los postes
  alternatives_spanish:
  - junto a los postes de las puertas
  - junto a los pilares
  - junto a los vestíbulos
  lexicon: HALOT
  rationale: אֵילִים es un término arquitectónico debatido en Ezequiel. «Postes» deja visible la imagen estructural sin forzar una identificación cerrada; el complemento «de las puertas» queda en el texto para situarlo en el complejo de las puertas.
- source_word: הַשְּׁעָרִים
  english_pob_choice: of the gates
  chosen_spanish: de las puertas
  alternatives_spanish:
  - de los portones
  - de los accesos
  lexicon: HALOT
  rationale: El plural se refiere a los accesos/puertas del complejo visionario. «Puertas» es claro y mantiene el plural del hebreo sin añadir interpretaciones.
- source_word: יָדִיחוּ
  english_pob_choice: they would rinse
  chosen_spanish: enjuagarían
  alternatives_spanish:
  - lavarían
  - enjuagan
  lexicon: HALOT
  rationale: El hiphil de דוח aquí expresa el lavado ritual de la ofrenda. «Enjuagarían» conserva la idea de aclarar/lavar en un contexto de preparación cultual, y refleja el valor habitual o descriptivo del imperfecto.
- source_word: הָעֹלָה
  english_pob_choice: the burnt offering
  chosen_spanish: el holocausto
  alternatives_spanish:
  - la ofrenda quemada
  - el sacrificio quemado
  lexicon: HALOT
  rationale: עֹלָה es la ofrenda completamente consumida por el fuego. «Holocausto» es el equivalente tradicional en español bíblico y mantiene con precisión el carácter total del sacrificio; se evita «ofrenda quemada» por sonar menos idiomático en español bíblico.
theological_decisions:
- issue: Terminología del sacrificio de ascensión/consumación total
  english_pob_reading: the burnt offering
  chosen_spanish_reading: el holocausto
  alternative_spanish_readings:
  - la ofrenda quemada
  - el sacrificio totalmente quemado
  rationale: No hay una tensión doctrinal adicional en el versículo, pero la palabra hebrea עֹלָה denota una ofrenda completamente consumida por el fuego. En español, «holocausto» conserva esa fuerza cultual y el registro bíblico tradicional sin sustituir indebidamente el término técnico.
  doctrine_reference: Levítico 1; Ezequiel 40:38
translation_notes:
  revision_awareness: El pasaje presenta alta concordancia con el texto fuente y con el audit trail inglés. La única decisión sensible es el término arquitectónico אֵילִים, para el cual se conservó una formulación abierta con nota de alternativa, y la elección de un español bíblico natural para עֹלָה.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - «Cámara», «entrada» y «puertas» conservan el registro arquitectónico del contexto de Ezequiel 40.
  - Se eligió «holocausto» para עֹלָה por fidelidad cultual y por ser un equivalente establecido en español bíblico.
