  text: וְ/אַתֶּ֕ם חֲשַׁבְתֶּ֥ם עָלַ֖/י רָעָ֑ה אֱלֹהִים֙ חֲשָׁבָ֣/הּ לְ/טֹבָ֔ה לְמַ֗עַן עֲשֹׂ֛ה כַּ/יּ֥וֹם הַ/זֶּ֖ה לְ/הַחֲיֹ֥ת עַם רָֽב־׃
base_translation:
  language: en
  yaml_path: translation/ot/genesis/050/020.yaml
  text: As for you[a], you intended evil against me, but God intended it for good, in order to do as it is this day—to keep many people alive.
  footnotes:
