translation:
  language: es
  text: Entonces los hombres de Quiriat-jearim vinieron e hicieron subir el arca de Yahvé[a], y la llevaron a la casa de Abinadab, en la colina[b]. Y consagraron a Eleazar, su hijo, para guardar el arca de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo usa el nombre divino YHWH; aquí se vierte como «Yahvé» conforme al criterio del proyecto.
    reason: lexical_alternative
  - marker: b
    text: O posiblemente, «en Gueba» o «en Gibeá», si בַּגִּבְעָה se toma como nombre de lugar en vez de como el sustantivo común «la colina».
    reason: alternative_reading
lexical_decisions:
- source_word: וַיָּבֹאוּ
  english_pob_choice: came
  chosen_spanish: vinieron
  alternatives_spanish:
  - llegaron
  lexicon: HALOT
  rationale: El wayyiqtol narrativo de בוא expresa avance de la acción; en español, «vinieron» mantiene el movimiento narrativo de forma natural. «Llegaron» también es posible, pero enfatiza más la llegada que el simple venir.
- source_word: אַנְשֵׁי קִרְיַת יְעָרִים
  english_pob_choice: the men of Kiriath-jearim
  chosen_spanish: los hombres de Quiriat-jearim
  alternatives_spanish:
  - la gente de Quiriat-jearim
  - los varones de Quiriat-jearim
  lexicon: HALOT
  rationale: אַנְשֵׁי designa específicamente «hombres», no solo «gente». Mantengo la transliteración del topónimo según la práctica del proyecto.
- source_word: וַיַּעֲלוּ
  english_pob_choice: brought up
  chosen_spanish: subieron
  alternatives_spanish:
  - trajeron arriba
  - llevaron arriba
  lexicon: HALOT
  rationale: עלה conserva la idea de movimiento hacia arriba. En español, con el objeto «el arca», «subieron» comunica adecuadamente la acción sin un giro forzado.
- source_word: אֲרוֹן יְהוָה
  english_pob_choice: the ark of the LORD
  chosen_spanish: el arca de Yahvé
  alternatives_spanish:
  - el arca de Yahveh
  - el arca del Señor
  lexicon: HALOT
  rationale: «Arca» corresponde al objeto cultual; el nombre divino se rinde como «Yahvé» conforme al criterio del proyecto, no con un sustituto reverencial.
- source_word: וַיָּבִאוּ אֹתוֹ
  english_pob_choice: they brought it
  chosen_spanish: la llevaron
  alternatives_spanish:
  - la trajeron
  - la introdujeron
  lexicon: HALOT
  rationale: ביא con objeto pronominal expresa traer/llevar. Dado el contexto de destino interior, «la llevaron» funciona con fluidez en español y evita duplicar la idea ya expresada por «subieron».
- source_word: אֶל בֵּית אֲבִינָדָב
  english_pob_choice: into the house of Abinadab
  chosen_spanish: a la casa de Abinadab
  alternatives_spanish:
  - en la casa de Abinadab
  - hasta la casa de Abinadab
  lexicon: HALOT
  rationale: אֶל marca dirección. En español, «a la casa de Abinadab» expresa la llegada al destino sin sobreespecificar interioridad que el hebreo no exige por sí mismo.
- source_word: בַּגִּבְעָה
  english_pob_choice: on the hill
  chosen_spanish: en la colina
  alternatives_spanish:
  - en el cerro
  - en el monte
  - en Gueba
  lexicon: HALOT
  rationale: 'Sigo la lectura del artículo con el sustantivo común: no se trata necesariamente del nombre propio «Gueba». «Colina» es una equivalencia natural de גִּבְעָה en español.'
- source_word: וְאֶת אֶלְעָזָר בְּנוֹ
  english_pob_choice: And they consecrated Eleazar his son
  chosen_spanish: Y consagraron a Eleazar, su hijo
  alternatives_spanish:
  - Y santificaron a Eleazar, su hijo
  - Y apartaron a Eleazar, su hijo
  lexicon: HALOT
  rationale: El objeto frontal se normaliza en español. «Su hijo» mantiene la referencia contextual a Abinadab. «Consagraron» preserva el matiz cultual de קִדְּשׁוּ.
- source_word: קִדְּשׁוּ
  english_pob_choice: consecrated
  chosen_spanish: consagraron
  alternatives_spanish:
  - santificaron
  - apartaron
  lexicon: HALOT
  rationale: En este contexto de servicio sagrado, «consagrar» conserva la fuerza ritual de קדשׁ mejor que una traducción más general.
- source_word: לִשְׁמֹר
  english_pob_choice: to keep
  chosen_spanish: para guardar
  alternatives_spanish:
  - para custodiar
  - para vigilar
  - para cuidar
  lexicon: HALOT
  rationale: שׁמר tiene aquí un sentido de custodia/protección. «Guardar» transmite bien esa obligación de custodia en español, con el matiz de vigilancia aún presente.
theological_decisions:
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh / the LORD (standard project practice in English is conflicted with footnote awareness)
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el Señor
  rationale: El proyecto exige traducir YHWH como «Yahvé» en el texto principal. No se sustituye por un título reverencial, para mantener transparencia frente al hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: 'בַּגִּבְעָה: sustantivo común o nombre propio'
  english_pob_reading: on the hill
  chosen_spanish_reading: en la colina
  alternative_spanish_readings:
  - en Gueba
  - en Gibeá
  rationale: La forma con artículo favorece la lectura como sustantivo común. Traducirlo como nombre propio introduciría una identificación geográfica no obligada por el texto.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1, original-language primacy over translation tradition'
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el texto sigue el consenso alto del auditor y conserva la decisión principal sobre בַּגִּבְעָה como sustantivo común.
  spanish_consistency_notes:
  - He mantenido «Quiriat-jearim» y «Abinadab» de forma consistente con la transliteración del proyecto.
  - He usado «Yahvé» en ambas apariciones de יהוה para uniformidad terminológica.
  - «Consagraron» y «guardar» preservan el registro cultual y custodial del versículo sin añadir interpretación doctrinal.
