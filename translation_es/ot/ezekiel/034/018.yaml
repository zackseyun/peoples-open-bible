    text: Or 'settled water,' that is, water left undisturbed and therefore clear.
    reason: lexical_alternative
  - marker: b
    text: Or 'foul' or 'stir up' what remains; the Hebrew verb refers to making the water muddy with the feet.
    reason: lexical_alternative
