translation:
  language: es
  text: Pero a los judíos[a], como había determinado no juzgarlos dignos ni siquiera de sepultura, sino arrojarlos con sus pequeños para que las aves los devoraran y las fieras los despedazaran, haría que todos ellos fueran iguales a los atenienses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más específicamente: «les concedería una condición igual a la de los atenienses», probablemente con referencia a privilegio cívico o estatus legal, más que a simple estima social.'
    reason: alternative_reading
lexical_decisions:
- source_word: τοὺς δὲ Ἰουδαίους
  english_pob_choice: But the Jews
  chosen_spanish: Pero a los judíos
  alternatives_spanish:
  - Pero los judíos
  - Y a los judíos
  lexicon: LSJ
  rationale: Se conserva el contraste adversativo de δέ con «Pero», y el objeto directo con artículo definido; «a los judíos» es natural en español y mantiene el énfasis del referente.
- source_word: διέγνωκε
  english_pob_choice: had determined
  chosen_spanish: había determinado
  alternatives_spanish:
  - había resuelto
  - había decidido
  lexicon: LSJ
  rationale: El pluscuamperfecto expresa una decisión ya fijada antes de la acción siguiente; «había determinado» conserva ese sentido de resolución estable.
- source_word: μηδὲ ταφῆς ἀξιῶσαι
  english_pob_choice: not even to count worthy of burial
  chosen_spanish: no juzgarlos dignos ni aun de sepultura
  alternatives_spanish:
  - no considerarlos dignos ni siquiera de sepultura
  - no reputarlos dignos de sepultura
  lexicon: LSJ
  rationale: ἀξιόω expresa valorar o tener por digno; en español, «juzgar dignos» comunica ese juicio evaluativo. «Sepultura» mantiene el matiz solemne y evita reducirlo a un simple entierro.
- source_word: οἰωνοβρώτους
  english_pob_choice: for the birds to devour
  chosen_spanish: para que las fieras los devoraran
  alternatives_spanish:
  - para ser devorados por las aves
  - para que las aves carroñeras los devoraran
  lexicon: LSJ
  rationale: El término alude a cadáveres expuestos a animales que comen carroña. En español, «fieras» recoge el carácter brutal del pasaje y se coordina con θηρίοις; el sentido de exposición para ser devorados queda explícito.
- source_word: σὺν τοῖς νηπίοις
  english_pob_choice: with their infants
  chosen_spanish: con sus niños
  alternatives_spanish:
  - con sus pequeños
  - con sus infantes
  lexicon: LSJ
  rationale: νήπιοι son niños muy pequeños; «niños» es claro y natural en español, y evita una rigidez excesiva. El contexto de violencia deja patente la vulnerabilidad de la edad.
- source_word: ἐκρίψαι
  english_pob_choice: to cast out
  chosen_spanish: arrojarlos
  alternatives_spanish:
  - echarlos fuera
  - expulsarlos
  lexicon: LSJ
  rationale: El verbo significa tirar o echar fuera violentamente. «Arrojarlos» preserva la crudeza del acto y su fuerza física.
- source_word: θηρίοις
  english_pob_choice: for the wild beasts
  chosen_spanish: las fieras
  alternatives_spanish:
  - a las fieras
  - para las fieras
  lexicon: LSJ
  rationale: 'El dativo expresa finalidad: dejarlos expuestos a los animales. En español, la estructura «para que las fieras los devoraran» hace visible ese propósito sin perder naturalidad.'
- source_word: πάντας αὐτοὺς ἴσους Ἀθηναίοις ποιήσειν
  english_pob_choice: he would make them all equal to the Athenians
  chosen_spanish: haría que todos ellos fueran iguales a los atenienses
  alternatives_spanish:
  - los haría a todos iguales a los atenienses
  - haría de todos ellos iguales a los atenienses
  lexicon: LSJ
  rationale: La construcción mantiene de modo directo la comparación del griego. «Iguales a los atenienses» conserva la literalidad necesaria y no especifica en el texto principal el mecanismo cívico implícito.
theological_decisions:
- issue: Sentido de la comparación con «los atenienses»
  english_pob_reading: Retain the literal comparison without specifying citizenship or legal status in the main text.
  chosen_spanish_reading: Mantener la comparación literal con «los atenienses» en el texto principal, sin explicitar ciudadanía o privilegio legal.
  alternative_spanish_readings:
  - hacerlos ciudadanos iguales a los atenienses
  - concederles derechos iguales a los atenienses
  rationale: El griego dice simplemente que los haría iguales a los atenienses; el mecanismo político o jurídico exacto no se explicita. Por fidelidad auditables, conviene dejar la frase abierta y, si hace falta, aclarar en nota la posible referencia cívica.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: 'El texto sigue de cerca el griego de Swete 1909 y concuerda con la auditoría inglesa: conserva el contraste adversativo, la negación de sepultura, la imagen de exposición a las fieras y la ambigüedad controlada de «iguales a los atenienses». No se registraron revisiones posteriores que alteren el sentido.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa «sepultura» para preservar el registro solemne y la oposición con la deshonra del cadáver.
  - «Fieras» recoge el tono violento del pasaje y evita suavizar la imagen zoológica.
  - La nota a[a] se ancla en «judíos» porque la ambigüedad interpretativa afecta al conjunto de la frase, no solo a la comparación final.
