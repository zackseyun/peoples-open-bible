lexical_decisions:
- source_word: וְהַיָּמִים
  english_pob_choice: Now the days
  chosen_spanish: Ahora bien, los días
  alternatives_spanish:
  - El tiempo
  - Los días
  lexicon: HALOT
  rationale: El hebreo introduce un resumen cronológico de reinado; «los días» conserva la literalidad, y «Ahora bien» reproduce con naturalidad el valor de enlace narrativo que el inglés POB expresaba con «Now».
- source_word: אֲשֶׁר
  english_pob_choice: that
  chosen_spanish: en que
  alternatives_spanish:
  - que
  - durante los cuales
  lexicon: HALOT
  rationale: La relativa hebrea une el sustantivo temporal con el reinado; «en que» suena natural en español y mantiene la relación temporal sin añadir paráfrasis.
- source_word: מָלַךְ
  english_pob_choice: reigned
  chosen_spanish: reinó
  alternatives_spanish:
  - fue rey
  - gobernó
  lexicon: HALOT
  rationale: En fórmulas regias resumidas, «reinó» es el equivalente directo y preciso de מָלַךְ, mejor que «gobernó» para conservar el matiz monárquico.
- source_word: יֵהוּא
  english_pob_choice: Jehu
  chosen_spanish: Jeú
  alternatives_spanish:
  - Jehú
  - Yehu
  lexicon: Nombre propio bíblico
  rationale: Se usa la forma española habitual «Jeú» para el nombre del rey, que corresponde al hebreo יֵהוּא.
- source_word: עַל יִשְׂרָאֵל
  english_pob_choice: over Israel
  chosen_spanish: sobre Israel
  alternatives_spanish:
  - en Israel
  - contra Israel
  lexicon: HALOT
  rationale: La preposición עַל con מָלַךְ expresa autoridad sobre un pueblo; «sobre Israel» mantiene esa fuerza de dominio soberano.
- source_word: עֶשְׂרִים וּשְׁמֹנֶה שָׁנָה
  english_pob_choice: twenty-eight years
  chosen_spanish: veintiocho años
  alternatives_spanish:
  - veinte y ocho años
  lexicon: HALOT
  rationale: La cifra se expresa de forma natural en español moderno como «veintiocho años», conservando exactamente el valor numérico del hebreo.
- source_word: בְּשֹׁמְרוֹן
  english_pob_choice: in Samaria
  chosen_spanish: en Samaria
  alternatives_spanish:
  - en la ciudad de Samaria
  - en la capital, Samaria
  lexicon: HALOT
  rationale: «En Samaria» refleja directamente el בְּ locativo y coincide con el uso bíblico habitual del topónimo como sede/capital del reino.
translation_notes:
  revision_awareness: 'La versión inglesa auditada pasó de una formulación más interpretativa («The time») a una más literal («Now the days») y mantuvo «in Samaria» como modificador locativo del reinado. La redacción española sigue esa revisión: conserva la estructura temporal con «los días en que» y coloca «en Samaria» dentro del marco del reinado, sin expandir el contenido.'
  spanish_consistency_notes:
  - Se mantiene el registro breve y formular, propio de los resúmenes cronológicos reales.
  - «Jeú» se conserva de manera consistente como forma española del nombre propio.
  - No se introduce puntuación explicativa ni notas, porque el versículo no presenta variantes textuales o tensiones teológicas relevantes en este pasaje.
