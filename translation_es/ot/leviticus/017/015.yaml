  text: וְ/כָל נֶ֗פֶשׁ אֲשֶׁ֨ר תֹּאכַ֤ל נְבֵלָה֙ וּ/טְרֵפָ֔ה בָּ/אֶזְרָ֖ח וּ/בַ/גֵּ֑ר וְ/כִבֶּ֨ס בְּגָדָ֜י/ו וְ/רָחַ֥ץ בַּ/מַּ֛יִם וְ/טָמֵ֥א עַד הָ/עֶ֖רֶב וְ/טָהֵֽר־־׃
base_translation:
  language: en
  yaml_path: translation/ot/leviticus/017/015.yaml
  text: And every person who eats an animal found dead or one torn by beasts[a], whether native or sojourner, shall wash his clothes and bathe in water, and he shall be unclean until the evening[b]; then he shall be clean.
  footnotes:
