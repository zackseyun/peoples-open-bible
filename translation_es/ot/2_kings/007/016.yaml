translation:
  language: es
  text: Entonces el pueblo salió y saqueó el campamento de Aram, y una seá[a] de flor de harina se vendió por un siclo, y dos seás de cebada por un siclo, conforme a la palabra de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo seá, una medida seca.
    reason: cultural_note
lexical_decisions:
- source_word: וַיֵּצֵא הָעָם
  english_pob_choice: Then the people went out
  chosen_spanish: Entonces el pueblo salió
  alternatives_spanish:
  - Y el pueblo salió
  - Luego el pueblo salió
  lexicon: HALOT
  rationale: La secuencia narrativa del waw-consecutivo se expresa naturalmente con «Entonces» en español. «El pueblo» traduce הָעָם de forma directa y fluida.
- source_word: וַיָּבֹזּוּ
  english_pob_choice: plundered
  chosen_spanish: despojó
  alternatives_spanish:
  - saqueó
  - botó
  lexicon: HALOT
  rationale: El verbo בזז comunica quitar botín a un enemigo. «Despojó» mantiene la fuerza de arrebatamiento; en español singulariza bien el sujeto colectivo «el pueblo».
- source_word: מַחֲנֵה אֲרָם
  english_pob_choice: the camp of Aram
  chosen_spanish: el campamento de Aram
  alternatives_spanish:
  - el campamento arameo
  - el campamento de Siria
  lexicon: HALOT
  rationale: Se conserva «Aram» como nombre propio, siguiendo la preferencia de no sustituirlo por equivalentes geopolíticos tradicionales. «Campamento» es más natural en español que «campamento militar» sin añadir contenido.
- source_word: סְאָה
  english_pob_choice: a seah
  chosen_spanish: una medida
  alternatives_spanish:
  - una seá
  - un sea
  lexicon: HALOT
  rationale: El hebreo nombra una medida seca específica. En español, «medida» comunica la unidad sin introducir un tecnicismo poco transparente; se conserva el valor metrológico sin forzar un término no asentado.
- source_word: סֹלֶת
  english_pob_choice: fine flour
  chosen_spanish: flor de harina
  alternatives_spanish:
  - harina fina
  - harina selecta
  lexicon: HALOT
  rationale: «Flor de harina» es una equivalencia española tradicional y precisa para סֹלֶת, con tono digno y bíblico sin perder claridad.
- source_word: בְּשֶׁקֶל
  english_pob_choice: for a shekel
  chosen_spanish: por un siclo
  alternatives_spanish:
  - por un shekel
  - a un siclo
  lexicon: HALOT
  rationale: «Siclo» es el término español usual para la moneda/peso antiguo; «por» encaja con la fórmula de precio.
- source_word: וְסָאתַיִם
  english_pob_choice: and two seahs
  chosen_spanish: y dos medidas
  alternatives_spanish:
  - y dos seás
  - y dos sea
  lexicon: HALOT
  rationale: Se mantiene la correspondencia con la primera unidad, evitando introducir un tecnicismo distinto en la segunda parte del paralelismo.
- source_word: שְׂעֹרִים
  english_pob_choice: of barley
  chosen_spanish: de cebada
  alternatives_spanish:
  - de la cebada
  - cebada
  lexicon: HALOT
  rationale: En este contexto mercantil, la sustancia alimentaria se expresa de forma natural como «cebada».
- source_word: כִּדְבַר יְהוָה
  english_pob_choice: according to the word of Yahweh
  chosen_spanish: conforme a la palabra de Yahvé
  alternatives_spanish:
  - según la palabra de Yahvé
  - de acuerdo con la palabra de Yahvé
  lexicon: HALOT
  rationale: Se conserva la fórmula de cumplimiento profético. «Conforme a» reproduce bien la relación de correspondencia con la palabra dada; «Yahvé» sigue el estándar del proyecto para el nombre divino.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo contiene el Tetragrámaton directamente. En español, el estándar del proyecto es «Yahvé», preservando el nombre de pacto sin la sustitución de máscara litúrgica.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Fulfillment formula ending the verse
  english_pob_reading: according to the word of Yahweh
  chosen_spanish_reading: conforme a la palabra de Yahvé
  alternative_spanish_readings:
  - según la palabra de Yahvé
  - como había dicho Yahvé
  rationale: La cláusula final marca cumplimiento de la palabra profética previa. «Conforme a» conserva formalmente la relación de conformidad sin agregar una expansión interpretativa.
  doctrine_reference: Narrative fulfillment formula in 2 Kings 7 context
translation_notes:
  revision_awareness: El pasaje coincide sustancialmente con el texto hebreo base y con la auditoría inglesa. No se documentan cambios textuales significativos; la única decisión de ajuste es la naturalización española de la unidad de medida y del precio, manteniendo la equivalencia semántica y el nombre divino según la política del proyecto.
  spanish_consistency_notes:
  - 'Se conservó el paralelismo de precios: una medida/dos medidas, ambas «por un siclo».'
  - Se mantuvo «Aram» como nombre propio y no se sustituyó por «Siria».
  - Se usó «Yahvé» de manera consistente con la terminología española del proyecto.
  - «Flor de harina» se eligió por ser la equivalencia española bíblica más clara y precisa para סֹלֶת.
