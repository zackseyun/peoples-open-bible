translation:
  language: es
  text: Además, aparta a tu siervo de los pecados presuntuosos[a]; no permitas que se enseñoreen de mí. Entonces seré íntegro[b] y quedaré libre de culpa[c] de gran transgresión[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «de los arrogantes» / «de personas soberbias». El hebreo puede referirse tanto a personas arrogantes como a pecados presuntuosos; el texto principal sigue la paralelización moral con el versículo anterior.'
    reason: alternative_reading
  - marker: b
    text: 'O: «seré completo» o «seré inocente». El término hebreo puede expresar integridad o plenitud.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «quedaré absuelto» o «seré limpiado».'
    reason: lexical_alternative
  - marker: d
    text: 'O: «de gran rebelión».'
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּם
  english_pob_choice: Also
  chosen_spanish: Además
  alternatives_spanish:
  - También
  - Asimismo
  lexicon: HALOT
  rationale: Conserva el valor aditivo del hebreo y enlaza esta petición con la anterior de forma natural en español.
- source_word: מִזֵּדִים
  english_pob_choice: from presumptuous sins
  chosen_spanish: de los pecados presuntuosos
  alternatives_spanish:
  - de los arrogantes
  - de personas soberbias
  - de los pecados voluntarios
  lexicon: HALOT
  rationale: Sigo la lectura contextual del POB en la que el término se refiere a pecados presuntuosos, no a personas arrogantes, porque el verso mantiene el campo semántico de faltas y transgresiones. 'Presuntuosos' preserva la idea de soberbia/insolencia del hebreo.
- source_word: חֲשֹׂךְ
  english_pob_choice: keep ... back
  chosen_spanish: guarda ... de
  alternatives_spanish:
  - contén ... de
  - refrena ... de
  - aparta ... de
  lexicon: HALOT
  rationale: '''Guardar de'' expresa con naturalidad la idea de impedir o mantener a alguien apartado de una acción, sin perder el matiz de restricción implícito en el imperativo.'
- source_word: עַבְדֶּךָ
  english_pob_choice: your servant
  chosen_spanish: tu siervo
  alternatives_spanish:
  - tu esclavo
  - tu servidor
  lexicon: HALOT
  rationale: En oración dirigida a Dios, 'tu siervo' conserva el tono reverente y es la forma española más natural para este contexto. 'Esclavo' sería más literal, pero sonaría menos idiomático aquí sin aportar claridad adicional.
- source_word: אַֽל יִמְשְׁלוּ בִי
  english_pob_choice: do not let them rule over me
  chosen_spanish: no permitas que se enseñoreen de mí
  alternatives_spanish:
  - no los dejes dominarme
  - no permitas que dominen sobre mí
  - no dejes que me gobiernen
  lexicon: HALOT
  rationale: '''Se enseñoreen de mí'' reproduce bien la idea de dominio/mastery del verbo hebreo y mantiene una resonancia bíblica clara en español, sin reducirlo a un simple ''mandar''.'
- source_word: אָז
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Así
  - Luego
  lexicon: HALOT
  rationale: Marca la consecuencia resultante de la intervención divina de manera directa y fluida en español.
- source_word: אֵיתָם
  english_pob_choice: I will be blameless
  chosen_spanish: seré íntegro
  alternatives_spanish:
  - seré irreprensible
  - seré completo
  - seré inocente
  lexicon: HALOT
  rationale: El término hebreo puede implicar integridad o plenitud moral; 'íntegro' comunica esa idea sin prometer perfección sin pecado.
- source_word: וְנִקֵּיתִי
  english_pob_choice: I will be cleared
  chosen_spanish: quedaré limpio
  alternatives_spanish:
  - quedaré absuelto
  - seré limpiado
  - quedaré libre de culpa
  lexicon: HALOT
  rationale: '''Quedaré limpio'' preserva la idea de quedar libre de culpa o mancha en un español claro y sobrio. No fuerza una lectura puramente ritual ni judicial, y deja espacio a la ambigüedad del verbo hebreo.'
- source_word: מִפֶּשַׁע רָב
  english_pob_choice: from great transgression
  chosen_spanish: de gran transgresión
  alternatives_spanish:
  - de gran rebelión
  - de mucha transgresión
  - de grave pecado
  lexicon: HALOT
  rationale: '''Transgresión'' mantiene el carácter de ruptura culpable del hebreo פשע. ''Gran'' conserva la intensidad del adjetivo sin sobreinterpretar el sustantivo como un término técnico específico.'
theological_decisions:
- issue: Referente de מִזֵּדִים
  english_pob_reading: presumptuous sins rather than arrogant persons
  chosen_spanish_reading: pecados presuntuosos, no personas arrogantes
  alternative_spanish_readings:
  - los arrogantes
  - personas soberbias
  rationale: El contexto inmediato trata de faltas, ocultas e involuntarias, y la siguiente petición sobre dominio encaja mejor con el poder del pecado que con un grupo de personas. La traducción mantiene esa tensión interpretativa sin borrarla.
  doctrine_reference: Translation philosophy §1, §3, §5
- issue: Fuerza de אֵיתָם
  english_pob_reading: blameless in the sense of integrity, not absolute sinlessness
  chosen_spanish_reading: íntegro, en sentido de integridad moral, no impecabilidad absoluta
  alternative_spanish_readings:
  - irreprensible
  - completo
  - inocente
  rationale: '''Íntegro'' en español conserva la noción de integridad, de una vida no dividida ni culpable, sin convertir el verso en una afirmación de perfección sin pecado.'
  doctrine_reference: Translation philosophy §3
- issue: Valor de וְנִקֵּיתִי
  english_pob_reading: cleared from guilt / acquitted
  chosen_spanish_reading: quedaré limpio en el sentido de quedar libre de culpa
  alternative_spanish_readings:
  - seré absuelto
  - quedaré absuelto
  - seré limpiado
  rationale: El hebreo permite una idea de ser liberado de culpa o quedar limpio. 'Quedaré limpio' mantiene esa amplitud y evita estrechar indebidamente el término a un registro judicial exclusivo.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente que mantuvo sin cambios la redacción inglesa, así como la nota previa que ajustó la fluidez del predicado compuesto; la versión española refleja esa misma naturalidad sin perder la distinción entre 'seré íntegro' y 'quedaré limpio'.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' solo cuando el texto fuente lo requiriera; este versículo no lo contiene.
  - Se eligió 'siervo' y no 'esclavo' porque la oración dirige la súplica a Dios y la postura reverente es el foco contextual.
  - '''Pecados presuntuosos'' sigue la decisión auditada del POB y evita convertir el término en personas arrogantes en la línea principal.'
  - '''Íntegro'' y ''quedaré limpio'' conservan la tensión entre integridad moral y liberación de culpa, sin resolverla en exceso.'
