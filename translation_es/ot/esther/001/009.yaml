translation:
  language: es
  text: La reina Vasti también ofreció un festín[a] para las mujeres en la casa real[b] que pertenecía al rey Asuero.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «banquete»; el término hebreo puede designar un festín, a menudo asociado con bebida.
    reason: lexical_alternative
  - marker: b
    text: O «en el palacio»; literalmente, «en la casa de la realeza/monarquía».
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּם
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - además
  - igualmente
  lexicon: HALOT
  rationale: Marca la adición respecto del banquete anterior; «también» reproduce de forma natural el valor aditivo sin sobrerrepresentar la fuerza del conector.
- source_word: וַשְׁתִּי
  english_pob_choice: Vashti
  chosen_spanish: Vasti
  alternatives_spanish:
  - Vashti
  lexicon: transliteración tradicional adaptada
  rationale: Se conserva el nombre propio con transliteración al español; «Vasti» es la forma más usable y reconocible en español bíblico, sin perder la referencia al original.
- source_word: הַמַּלְכָּה
  english_pob_choice: Queen
  chosen_spanish: la reina
  alternatives_spanish:
  - reina
  - la reina
  lexicon: HALOT
  rationale: Como título en aposición con el nombre, en español suena natural y fiel «la reina Vasti»; evita la construcción menos idiomática «Vasti, la reina» cuando el contexto funciona como identificación.
- source_word: עָשְׂתָה
  english_pob_choice: gave
  chosen_spanish: ofreció
  alternatives_spanish:
  - hizo
  - dio
  - celebró
  lexicon: HALOT
  rationale: El hebreo literalmente dice «hizo», pero con «banquete» el español natural pide una expresión que indique realizar/organizar el evento. «Ofreció» conserva la idea de disponer el banquete sin volverlo demasiado libre.
- source_word: מִשְׁתֵּה
  english_pob_choice: a feast
  chosen_spanish: un banquete
  alternatives_spanish:
  - una fiesta
  - un festín
  - un convite
  lexicon: HALOT
  rationale: El término puede referirse a banquete o festín, a menudo con bebida. En español, «banquete» comunica bien el evento solemne y mantiene la posibilidad de esa connotación sin explicitarla en el cuerpo.
- source_word: נָשִׁים
  english_pob_choice: for the women
  chosen_spanish: para las mujeres
  alternatives_spanish:
  - para las mujeres de la corte
  - para las damas
  lexicon: HALOT
  rationale: La referencia es directa al grupo destinatario del banquete. «Para las mujeres» conserva la sencillez del hebreo y evita introducir un matiz social no explícito en el texto.
- source_word: בֵּית הַמַּלְכוּת
  english_pob_choice: the royal house
  chosen_spanish: la casa real
  alternatives_spanish:
  - el palacio
  - la casa del reino
  lexicon: HALOT
  rationale: El hebreo literalmente es «la casa de la realeza/monarquía». «Casa real» mantiene la imagen de «casa» y comunica el espacio palaciego sin desplazar el sentido hacia «palacio» como interpretación más cerrada.
- source_word: אֲשֶׁר לַמֶּלֶךְ אֲחַשְׁוֵרוֹשׁ
  english_pob_choice: that belonged to King Ahasuerus
  chosen_spanish: que pertenecía al rey Asuero
  alternatives_spanish:
  - del rey Asuero
  - que era del rey Asuero
  lexicon: HALOT
  rationale: La cláusula relativa expresa pertenencia; «pertenecía» reproduce de manera clara y natural esa relación posesiva sin forzar el español con una calca de la sintaxis hebrea.
- source_word: אֲחַשְׁוֵרוֹשׁ
  english_pob_choice: Ahasuerus
  chosen_spanish: Asuero
  alternatives_spanish:
  - Ahasuero
  lexicon: transliteración bíblica tradicional
  rationale: En español bíblico, la forma establecida es «Asuero». Se conserva la identificación histórica del nombre propio con la tradición textual usual en español.
translation_notes:
  revision_awareness: 'El texto base en inglés mantiene una equivalencia óptima con dos notas léxicas: una sobre el valor posible de מִשְׁתֵּה y otra sobre בֵּית הַמַּלְכוּת. La versión española conserva esas mismas ambigüedades en notas, pero ajusta el cuerpo al español natural y al uso bíblico tradicional de los nombres propios.'
  spanish_consistency_notes:
  - Se preserva la aposición nombre+título de forma natural en español («la reina Vasti»).
  - Se elige una transliteración bíblica tradicional para el nombre persa («Asuero») para mantener consistencia con el uso hispano.
  - «Casa real» se usa como equivalente de la imagen hebrea sin cerrar indebidamente la referencia espacial a «palacio».
  - No se introduce lenguaje doctrinal; el versículo es narrativo y no plantea decisiones teológicas explícitas.
