    text: El verbo griego también puede traducirse «nos venga según nuestros pecados» o «ejerce retribución sobre nosotros según nuestros pecados»; aquí se expresa castigo divino en respuesta al pecado.
    reason: lexical_alternative
  revision_rationale: Se ajusta la formulación forense inicial a un español más natural y más cercano a la nota lexical del expediente inglés ('Invocamos como testigos'). Se reemplaza 'nos venga' por 'nos castiga' para evitar ambigüedad y reflejar mejor la fuerza punitiva de ἐκδικεῖ en este contexto. Se cambia 'nuestros padres' a 'nuestros antepasados' por claridad y naturalidad en español eclesial amplio, conservando el referente patriarcal.
