translation:
  language: es
  text: Porque Israel se arrancó de la casa de David[a], e hicieron rey a Jeroboam hijo de Nabat; y Jeroboam apartó a Israel de seguir a Yahvé, y los hizo cometer un gran pecado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «se separó de la casa de David». El hebreo usa un verbo de desgarro o ruptura, no solo de separación neutral.'
    reason: lexical_alternative
lexical_decisions:
- source_word: קָרַע
  english_pob_choice: tore itself away
  chosen_spanish: se había desgarrado
  alternatives_spanish:
  - se había separado
  - se había arrancado
  - se había rasgado
  lexicon: HALOT
  rationale: El verbo hebreo conserva una imagen vívida de desgarro, no solo de separación administrativa. «Se había desgarrado» mantiene la metáfora y el valor relacional/político del quiebre con la casa de David.
- source_word: מֵ/עַל בֵּית דָּוִד
  english_pob_choice: from the house of David
  chosen_spanish: de la casa de David
  alternatives_spanish:
  - de encima de la casa de David
  - de sobre la casa de David
  - alejándose de la casa de David
  lexicon: HALOT
  rationale: La relación preposicional marca apartamiento de la autoridad dinástica davídica. En español, «de la casa de David» es natural; el matiz de alejamiento ya queda expresado por «se había desgarrado».
- source_word: וַ/יַּמְלִ֖יכוּ
  english_pob_choice: they made ... king
  chosen_spanish: hicieron rey a
  alternatives_spanish:
  - coronaron a
  - pusieron como rey a
  - establecieron como rey a
  lexicon: HALOT
  rationale: El causativo de מלך indica instalar a alguien como rey. «Hicieron rey a» es claro y conserva esa fuerza causativa sin añadir solemnidad ajena al hebreo.
- source_word: יָרָבְעָ֣ם בֶּן נְבָ֑ט
  english_pob_choice: Jeroboam son of Nebat
  chosen_spanish: Jeroboam hijo de Nabat
  alternatives_spanish:
  - Jeroboam, hijo de Nabat
  - Jeroboam, el hijo de Nabat
  lexicon: HALOT
  rationale: Se mantiene la identificación apposicional del texto hebreo. «Hijo de Nabat» es la forma más directa y legible en español bíblico contemporáneo.
- source_word: ו/ידא
  english_pob_choice: drove ... away from following
  chosen_spanish: apartó
  alternatives_spanish:
  - desvió
  - alejó
  - hizo apartarse
  lexicon: HALOT
  rationale: El valor del verbo incluye impulsar/inducir a apartarse o extraviar. «Apartó» conserva la dirección del alejamiento y funciona bien con la frase siguiente.
- source_word: מֵ/אַחֲרֵ֣י יְהוָ֔ה
  english_pob_choice: from following Yahweh
  chosen_spanish: de seguir a Yahvé
  alternatives_spanish:
  - de ir tras Yahvé
  - de seguir tras Yahvé
  - de andar tras Yahvé
  lexicon: HALOT
  rationale: El hebreo idiomático «de detrás de» expresa seguir a alguien lealmente. «De seguir a Yahvé» es idiomático en español y conserva la imagen de discipulado/obediencia. Se usa «Yahvé» conforme al criterio del proyecto para יהוה.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino personal según la norma del proyecto. «Yahvé» es la forma española establecida para el Tetragrámaton, en lugar de sustituirlo por un título.
- source_word: וְ/הֶחֱטֵיאָ֖/ם
  english_pob_choice: caused them to commit
  chosen_spanish: los hizo cometer
  alternatives_spanish:
  - los hizo pecar
  - los causó a pecar
  - los indujo a pecar
  lexicon: HALOT
  rationale: 'El hiphil es causativo: Jeroboam hizo que Israel pecara. «Los hizo cometer» conserva la causalidad y permite conectar con el sustantivo siguiente sin redundancia.'
- source_word: חֲטָאָ֥ה גְדוֹלָֽה
  english_pob_choice: a great sin
  chosen_spanish: un gran pecado
  alternatives_spanish:
  - un pecado grande
  - un pecado gravísimo
  - un pecado muy grande
  lexicon: HALOT
  rationale: La combinación nombre + adjetivo expresa magnitud. «Un gran pecado» es fiel, directo y mantiene el énfasis hebreo sin intensificar más de lo debido.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton. Se conserva el nombre propio divino como «Yahvé», siguiendo la norma del proyecto y evitando la sustitución por un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Force of Jeroboam's action toward Israel
  english_pob_reading: Jeroboam drove Israel from following Yahweh
  chosen_spanish_reading: Jeroboam apartó a Israel de seguir a Yahvé
  alternative_spanish_readings:
  - Jeroboam desvió a Israel de seguir a Yahvé
  - Jeroboam hizo apartarse a Israel de seguir a Yahvé
  - Jeroboam alejó a Israel de seguir a Yahvé
  rationale: El hebreo presenta a Jeroboam como agente activo de apartamiento/apostasía. «Apartó a Israel de seguir a Yahvé» conserva la agencia y la dirección del alejamiento sin suavizar el juicio del texto.
  doctrine_reference: Lexical/theological force of causation in the Hiphil of נדח/ידא and covenantal following idiom
- issue: Causal sin-language in the final clause
  english_pob_reading: caused them to commit a great sin
  chosen_spanish_reading: los hizo cometer un gran pecado
  alternative_spanish_readings:
  - los hizo pecar gravemente
  - los indujo a un gran pecado
  - los causó a cometer un gran pecado
  rationale: El texto no solo describe una falta, sino una causación concreta de pecado. La forma elegida conserva la responsabilidad de Jeroboam y el carácter grave de la transgresión.
  doctrine_reference: Biblical causation and moral agency in prophetic/history prose
translation_notes:
  revision_awareness: 'El texto inglés auditado mantuvo la estructura y el contenido del versículo, con una revisión menor que ajustó la naturalidad de la frase idiomática «from following». La versión española sigue esa misma línea: conserva el paralelismo de causa y resultado, mantiene el nombre divino como Yahvé, y preserva el matiz fuerte del verbo de desgarro sin atenuarlo a una mera separación.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה, conforme a la política del proyecto.
  - Se prefirió «hijo de Nabat» para el patronímico, evitando el giro más arcaizante «el hijo de».
  - 'Se mantuvo la causalidad explícita en ambas cláusulas: «apartó» y «los hizo cometer».'
  - La puntuación conserva una sola oración compuesta, siguiendo la sintaxis del hebreo y del audit trail en inglés.
