translation:
  language: es
  text: Y no es solo con ustedes con quienes yo estoy haciendo esta alianza[a] y este juramento[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «cortando esta alianza». «Haciendo esta alianza» expresa el modismo hebreo de manera natural en español.'
    reason: lexical_alternative
  - marker: b
    text: O «maldición». El término hebreo puede referirse al juramento mismo o a la sanción de maldición ligada a ese juramento.
    reason: alternative_reading
lexical_decisions:
- source_word: וְלֹא
  english_pob_choice: And it is not
  chosen_spanish: Y no es
  alternatives_spanish:
  - Y no
  - Ni es
  lexicon: WLC/HALOT
  rationale: La negación con el conector inicial se conserva de manera natural en español con «Y no es», manteniendo la relación con el contexto inmediato sin forzar un calco.
- source_word: אִתְּכֶם
  english_pob_choice: with you
  chosen_spanish: con ustedes
  alternatives_spanish:
  - con vosotros
  - con ustedes todos
  lexicon: WLC/HALOT
  rationale: El sufijo de segunda persona plural se traduce de forma natural y neutra en español latinoamericano como «con ustedes».
- source_word: לְבַדְּכֶם
  english_pob_choice: alone
  chosen_spanish: solo
  alternatives_spanish:
  - solamente
  - únicamente
  lexicon: WLC/HALOT
  rationale: '«Solo» expresa la exclusividad del adverbio hebreo en un español fluido: no se trata únicamente de ese grupo, sino de ese grupo en exclusividad.'
- source_word: אָנֹכִי
  english_pob_choice: I
  chosen_spanish: yo
  alternatives_spanish:
  - yo mismo
  lexicon: WLC/HALOT
  rationale: El pronombre independiente aporta énfasis; en español se conserva con «yo», y el orden verbal ya mantiene la prominencia del sujeto.
- source_word: כֹּרֵת
  english_pob_choice: am making
  chosen_spanish: estoy haciendo
  alternatives_spanish:
  - estoy cortando
  - hago
  lexicon: WLC/HALOT
  rationale: El hebreo usa el idiomático «cortar un pacto». El texto principal español sigue la equivalencia de sentido con «hacer un pacto»; la lectura literal queda documentada como alternativa, sin perder la imagen idiomática de fondo.
- source_word: הַבְּרִית הַזֹּאת
  english_pob_choice: this covenant
  chosen_spanish: este pacto
  alternatives_spanish:
  - este convenio
  - esta alianza
  lexicon: WLC/HALOT
  rationale: Aunque «pacto» es una opción válida en español, aquí conserva bien el valor jurídico-relacional del hebreo y suena natural. Se evita una terminología más eclesiástica que no añade precisión.
- source_word: וְאֶת הָאָלָה הַזֹּאת
  english_pob_choice: and this oath
  chosen_spanish: este juramento
  alternatives_spanish:
  - esta maldición
  - esta sanción jurada
  lexicon: WLC/HALOT
  rationale: La palabra hebrea puede referirse al juramento mismo o a la sanción maldiciente ligada a él. En el texto principal se opta por «juramento» para reflejar la formulación del pacto; «maldición» se mantiene como alternativa semántica viable en la nota.
theological_decisions:
- issue: Valor de אָלָה en contexto de pacto
  english_pob_reading: oath, with 'curse' as a viable alternative
  chosen_spanish_reading: juramento, con 'maldición' como alternativa posible
  alternative_spanish_readings:
  - maldición
  - juramento maldito
  rationale: El paralelismo con «pacto» favorece entender אָלָה como el juramento ratificatorio. Sin embargo, el hebreo incluye la dimensión de sanción/maldición; por eso no se elimina esa tensión y se deja documentada.
  doctrine_reference: Preservar la tensión lexical-teológica del texto; no resolverla unilateralmente.
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el pasaje fuente inglés; el borrador español sigue directamente el sentido auditado del texto hebreo y conserva la tensión de אָלָה en una nota.
  spanish_consistency_notes:
  - Se mantiene un registro neutro y bíblico, sin recurrir a formulaciones eclesiásticas fijas cuando el hebreo pide precisión lexical.
  - Se usa «pacto» en lugar de «alianza» para reflejar el peso jurídico-covenantal del término en Deuteronomio.
  - La negación y el énfasis del sujeto se conservan sin añadir interpretación.
  - La nota de pie para el verbo idiomático marca explícitamente la lectura literal hebrea, conforme al criterio POB de transparencia auditable.
