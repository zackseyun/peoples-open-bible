translation:
  language: es
  text: Pero ¿quién tiene la fuerza para edificarle una casa[a], si los cielos, aun los cielos más altos, no pueden contenerlo? ¿Y quién soy yo para edificarle una casa[b], sino para quemar incienso delante de él?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «los cielos y los cielos de los cielos», una expresión idiomática que señala los cielos más altos.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «para ofrecer incienso delante de él».'
    reason: lexical_alternative
lexical_decisions:
- source_word: יַעֲצָר כֹּחַ
  english_pob_choice: has the strength
  chosen_spanish: tendrá la fuerza
  alternatives_spanish:
  - puede
  - es capaz
  - tiene poder
  lexicon: HALOT
  rationale: La expresión hebrea combina la idea de capacidad suficiente con fuerza/poder. «Tendrá la fuerza» conserva el matiz de aptitud para la tarea y suena natural en español, sin debilitar el énfasis retórico de la pregunta.
- source_word: לִבְנוֹת לוֹ בַיִת
  english_pob_choice: to build a house for him
  chosen_spanish: edificarle una casa
  alternatives_spanish:
  - construirle una casa
  - edificar un templo para él
  lexicon: HALOT
  rationale: «Casa» reproduce con fidelidad בַּיִת, sin sustituirlo por «templo». «Edificar» es un verbo digno y bíblicamente transparente; el dativo enclítico «le» expresa bien «para él».
- source_word: הַשָּׁמַיִם וּשְׁמֵי הַשָּׁמַיִם
  english_pob_choice: the heavens, even the highest heavens
  chosen_spanish: los cielos, aun los cielos de los cielos
  alternatives_spanish:
  - el cielo y el cielo de los cielos
  - los cielos y los cielos de los cielos
  lexicon: HALOT
  rationale: Se mantiene la estructura doble del hebreo y su fuerza superlativa mediante «aun». «Los cielos de los cielos» preserva la expresión idiomática sin interpretarla demasiado.
- source_word: לֹא יְכַלְכְּלֻהוּ
  english_pob_choice: cannot contain him
  chosen_spanish: no pueden contenerlo
  alternatives_spanish:
  - no pueden abarcarlo
  - no pueden sostenerlo
  - no pueden contenerlo dentro de sí
  lexicon: HALOT
  rationale: «Contener» comunica de forma clara la insuficiencia de los cielos para albergar a Dios, en línea con el valor contextual del verbo. Se conserva el pronombre directo «lo» para referir a Dios sin sustituirlo por un término más explicativo.
- source_word: וּמִי אֲנִי
  english_pob_choice: And who am I
  chosen_spanish: ¿Y quién soy yo?
  alternatives_spanish:
  - ¿Y quién soy?
  - ¿Pero quién soy yo?
  lexicon: HALOT
  rationale: La fórmula interrogativa en español suena más natural con orden directo. «Y» mantiene el פשוט hebreo; el contexto de humildad hace clara la autoubicación de Salomón.
- source_word: אֲשֶׁר אֶבְנֶה לוֹ בַיִת
  english_pob_choice: that I should build a house for him
  chosen_spanish: para que le edifique una casa
  alternatives_spanish:
  - que yo le edifique una casa
  - que edifique una casa para él
  lexicon: HALOT
  rationale: 'La subordinación final con «para que» expresa adecuadamente la incapacidad/indignidad implícita: no se trata de mera intención, sino de la pregunta sobre la idoneidad para tal obra.'
- source_word: כִּי אִם
  english_pob_choice: except
  chosen_spanish: sino
  alternatives_spanish:
  - excepto
  - sino solamente
  lexicon: HALOT
  rationale: Aquí la partícula introduce limitación exclusiva. «Sino» es la opción más natural y precisa en español para oponer la función restringida del edificio al acto de contener a Dios.
- source_word: לְהַקְטִיר לְפָנָיו
  english_pob_choice: to burn incense before him
  chosen_spanish: para quemar incienso delante de él
  alternatives_spanish:
  - para ofrecer incienso delante de él
  - para hacer subir incienso delante de él
  lexicon: HALOT
  rationale: «Quemar incienso» refleja el sentido cultual de הקטיר de manera clara y reverente. «Delante de él» conserva el valor relacional de לְפָנָיו, sin convertir la frase en una localización rígida.
theological_decisions:
- issue: Trascendencia divina frente a la localización en el templo
  english_pob_reading: The temple does not contain God; it is a place of worship before him.
  chosen_spanish_reading: El texto afirma que ni los cielos pueden contener a Dios, de modo que la casa no lo encierra, sino que sirve únicamente como lugar de incienso delante de él.
  alternative_spanish_readings:
  - la casa es la morada contenida de Dios
  - el templo contiene de algún modo la presencia divina
  rationale: 'La segunda cláusula controla la primera: el templo no limita a Dios. Por eso se conserva la tensión teológica sin suavizarla, y la función del edificio queda restringida al culto delante de Dios.'
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: Alineado con el último pase de revisión, que indicó alta concordancia y no requirió cambios. Se mantuvo la distinción entre la incapacidad de contener a Dios y la función cultual limitada del templo, conforme al audit trail inglés.
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma estándar del nombre divino cuando aparezca en el contexto, pero en este versículo el referente está expresado por pronombres.
  - Se conservó «casa» en lugar de «templo» para respetar בַּיִת, mientras que el sentido cultual se aclara por el contexto y la nota.
  - Se evitó la traducción doctrinalmente aplanada de «contener» para mantener la tensión entre trascendencia divina y espacio sagrado.
  - Las notas se anclan en los dos puntos donde el español puede perder el eco idiomático hebreo o admitir una alternativa cultual legítima.
