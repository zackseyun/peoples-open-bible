  text: אַל תֵּצֵ֥א לָ/רִ֗ב מַ֫הֵ֥ר פֶּ֣ן מַה תַּ֭עֲשֶׂה בְּ/אַחֲרִיתָ֑/הּ בְּ/הַכְלִ֖ים אֹתְ/ךָ֣ רֵעֶֽ/ךָ־־׃
base_translation:
  language: en
  yaml_path: translation/ot/proverbs/025/008.yaml
  text: Do not go out hastily to a dispute[a], lest in the end, when your neighbor puts you to shame[b], you not know what to do.
  footnotes:
  - marker: a
    text: 'Hebrew is elliptical: literally, ''lest what will you do in its end, when your neighbor puts you to shame?'' The translation makes explicit the implied sense, ''you not know what to do.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'Do not go out quickly to quarrel' or, with a more legal nuance, 'Do not go out hastily to court.'
    reason: alternative_reading
