revisions:
- from: Y sucederá que, si escuchas todo lo que yo te mande, y andas en mis caminos, y haces lo recto ante mis ojos, guardando mis estatutos y mis mandamientos, como hizo David, mi esclavo, yo estaré contigo y te edificaré una casa fiel[a], como edifiqué para David, y te daré a Israel.
  to: Y sucederá que, si escuchas todo lo que yo te mande, y andas en mis caminos, y haces lo recto ante mis ojos, guardando mis estatutos y mis mandamientos, como hizo David, mi siervo, yo estaré contigo y te edificaré una casa fiel[a], como edifiqué para David, y te daré a Israel.
  rationale: Se corrige 'mi esclavo' a 'mi siervo' para ajustarse al sentido honorífico contextual de עַבְדִּי documentado por el POB y para mantener un español bíblico natural y digno. Se conserva 'casa fiel' con nota léxica depurada, ya que el expediente inglés revisado prefirió 'faithful house' mientras aclaró el sentido dinástico permanente. No se requieren más cambios.
