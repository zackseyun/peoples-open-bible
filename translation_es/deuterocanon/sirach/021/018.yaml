review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del griego: la sabiduría en relación con el necio se compara con una casa arruinada, y la γνώσις del ἀσύνετος se equipara con λόγοι ἀδιεξέταστοι. Sin embargo, la segunda cola suena poco natural en español (''es palabras que no se pueden examinar'') y no reproduce con suficiente dignidad y concisión la revisión auditada del POB inglés (''unsearchable words'').'
  spanish_quality_summary: El texto es mayormente claro y fiel, pero requiere un ajuste de naturalidad y estilo en la segunda mitad. 'La sabiduría para el necio' es aceptable, aunque 'para un necio' fluye mejor de manera proverbial. 'Palabras que no se pueden examinar' es comprensible, pero resulta rígido y menos idiomático que 'palabras inescrutables', que además está ya documentado en nota como alternativa válida.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'Sabiduría', 'conocimiento', 'necio' y 'entendimiento' están bien alineados con las decisiones léxicas. La mejora propuesta mantiene la distinción entre σοφία/γνῶσις y μωρός/ἀσύνετος.
  issues:
  - severity: medium
    issue: La expresión 'es palabras que no se pueden examinar' es poco natural en español.
    rationale: Aunque formalmente cercana al griego, la construcción nominal sin artículo y con perífrasis larga suena forzada. El POB inglés ya optó por una forma más concisa ('unsearchable words'), y en español 'palabras inescrutables' comunica con más claridad y dignidad el mismo campo semántico.
  - severity: low
    issue: '''Para el necio'' funciona, pero ''para un necio'' encaja mejor en un dicho sapiencial general.'
    rationale: El griego usa μωρῷ de manera genérica, no referida a un individuo definido. En español proverbial, el indefinido evita una leve sensación de especificidad innecesaria.
  revised_spanish_text: La sabiduría para un necio es como una casa en ruinas[a], y el conocimiento del que carece de entendimiento es palabras inescrutables[b].
  revised_footnotes:
  - marker: a
    text: 'También: «una casa destruida»; el participio griego puede sugerir algo borrado, hecho desaparecer o arruinado.'
    reason: lexical_alternative
  - marker: b
    text: O «palabras que no se pueden examinar»; ἀδιεξέταστοι puede enfatizar tanto la imposibilidad de examinarlas como su incomprensibilidad.
    reason: lexical_alternative
  revision_rationale: Se ajusta la segunda cola a un español más natural y sapiencial mediante 'palabras inescrutables', manteniendo en nota la alternativa más literal 'palabras que no se pueden examinar', tal como permite la evidencia léxica y la auditoría inglesa. También se suaviza 'para el necio' a 'para un necio' para reflejar mejor el carácter genérico del proverbio.
