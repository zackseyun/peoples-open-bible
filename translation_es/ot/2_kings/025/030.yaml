translation:
  language: es
  text: Y su provisión[a], una provisión continua, le fue dada del rey, la porción para cada día en su día[b], todos los días de su vida.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O también: «ración», «porción» o «asignación» para «provisión». El término hebreo se refiere a una provisión asignada para él.'
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «la cosa» o «el asunto de un día en su día», un modismo que significa que la provisión se daba día tras día, conforme a la asignación de cada jornada.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲרֻחָה / אֲרֻחָתוֹ
  english_pob_choice: allowance
  chosen_spanish: provisión
  alternatives_spanish:
  - porción
  - ración
  - asignación
  lexicon: HALOT
  rationale: El término hebreo designa una provisión asignada y sostenida por el rey para Joaquín. «Provisión» conserva el sentido de suministro asignado sin sonar demasiado militar como «ración», y es natural en español bíblico moderno.
- source_word: תָּמִיד
  english_pob_choice: continual
  chosen_spanish: continua
  alternatives_spanish:
  - continual
  - constante
  - regular
  lexicon: HALOT
  rationale: El adjetivo expresa continuidad duradera. «Continua» comunica bien esa idea en español y mantiene el valor aspectual de la expresión sin forzar un adverbio.
- source_word: נִתְּנָה
  english_pob_choice: was given
  chosen_spanish: le era dada
  alternatives_spanish:
  - le fue dada
  - le fue concedida
  - se le daba
  lexicon: HALOT
  rationale: El pasivo de נתן se refleja de manera natural con una construcción pasiva perifrástica en español. «Le era dada» conserva la idea de suministro repetido o habitual en el marco del versículo.
- source_word: מֵאֵת הַמֶּלֶךְ
  english_pob_choice: from the king
  chosen_spanish: por el rey
  alternatives_spanish:
  - desde el rey
  - del rey
  lexicon: HALOT
  rationale: Aunque la expresión hebrea marca procedencia, en español «por el rey» transmite con claridad la agencia del monarca como dador de la provisión. «Del rey» sería posible, pero menos explícito respecto a la acción.
- source_word: דְּבַר יוֹם בְּיוֹמוֹ
  english_pob_choice: the portion for each day on its day
  chosen_spanish: la porción para cada día en su día
  alternatives_spanish:
  - día por día
  - la provisión de cada día en su día
  - la necesidad de cada día en su día
  lexicon: HALOT
  rationale: La frase hebrea es idiomática y alude a una asignación diaria. «La porción para cada día en su día» mantiene la distribución día por día y conserva la concreción del hebreo mejor que una simple adverbialización.
- source_word: כֹּל יְמֵי חַיָּו
  english_pob_choice: all the days of his life
  chosen_spanish: todos los días de su vida
  alternatives_spanish:
  - durante toda su vida
  - todo el tiempo de su vida
  lexicon: HALOT
  rationale: Es el equivalente idiomático normal en español y reproduce fielmente la duración vital indicada por el hebreo.
translation_notes:
  revision_awareness: 'La base inglesa revisó «regular allowance» a «continual allowance» y afinó la frase idiomática de «the matter of each day» a «the portion for each day». Esta versión española sigue esa línea: conserva la continuidad con «provisión continua» y preserva el sentido distributivo del hebreo con «la porción para cada día en su día».'
  spanish_consistency_notes:
  - Se mantiene «provisión» en lugar de «ración» como término principal, pero la nota recoge alternativas léxicas documentadas.
  - Se evita una traducción demasiado literal de דְּבַר יוֹם que sonaría extraña en español, pero se conserva la idea de asignación diaria.
  - La construcción «le era dada» refleja mejor la acción repetida/habitual del contexto que un simple pretérito puntual.
  - No hay elementos teológicos controvertidos en este versículo; la decisión principal es léxica e idiomática.
