review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el hebreo y el rastro auditado en inglés en la mayor parte del versículo: conserva ‘el hombre’, la fórmula repetida ‘Hijo de hombre’, los imperativos paralelos de ver/oír, ‘pon tu corazón’, y ‘la casa de Israel’. Sin embargo, la cláusula de propósito כִּי לְמַעַן הַרְאוֹתְכָה הֻבָאתָה הֵנָּה no queda bien reflejada por ‘para que te lo mostrara’, porque el inglés auditado corrigió precisamente hacia un sentido plural/colectivo (‘these things’), y en español ‘lo’ reduce indebidamente el contenido visionario. También la colocación de la nota [a] al final del versículo no cumple con el requisito de anclarla en la frase relevante.'
  spanish_quality_summary: El español es mayormente claro y digno, pero ‘Y me habló el hombre, diciendo’ suena algo calcado y menos natural que ‘Y el hombre me dijo’. Además, la nota al final del versículo está mal anclada; debe ir junto a ‘Hijo de hombre’. La frase ‘porque para que te lo mostrara fuiste traído aquí’ es comprensible, pero más natural y fiel sería ‘porque fuiste traído aquí para que yo te mostrara estas cosas’.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. ‘Hijo de hombre’ concuerda con la decisión documentada para בֶּן אָדָם en Ezequiel; ‘casa de Israel’ preserva la expresión profética fija; no aparecen términos como Yahvé/Mesías que requieran control especial. La principal desalineación es con la decisión léxica auditada sobre la cláusula de propósito, donde el español debe reflejar ‘estas cosas’ en vez de un neutro singular resumido.
  issues:
  - severity: medium
    issue: La cláusula de propósito usa ‘te lo mostrara’ en lugar de reflejar ‘estas cosas’/contenido colectivo.
    rationale: El rastro auditado en inglés revisó explícitamente ‘show it to you’ a ‘show you these things’. El hebreo apunta al conjunto de lo revelado, y el español ‘lo’ lo estrecha innecesariamente.
  - severity: medium
    issue: La nota [a] está anclada al final del versículo y no en ‘Hijo de hombre’.
    rationale: Las instrucciones requieren que cada nota aparezca en el punto relevante del texto. Esta nota explica específicamente בֶּן אָדָם.
  - severity: low
    issue: ‘Y me habló el hombre, diciendo’ suena más calcado que natural.
    rationale: Aunque no es incorrecto, ‘Y el hombre me dijo’ comunica mejor el mismo sentido en español moderno y digno sin perder fidelidad.
  revised_spanish_text: 'Y el hombre me dijo: «Hijo de hombre[a], mira con tus ojos, oye con tus oídos, y pon tu corazón en todo lo que yo te muestro, porque fuiste traído aquí para que yo te mostrara estas cosas. Declara a la casa de Israel todo lo que ves».'
  revised_footnotes:
  - marker: a
    text: O ‘mortal’ o ‘ser humano’ para «Hijo de hombre». La expresión hebrea es la forma habitual de dirigirse a Ezequiel.
    reason: lexical_alternative
  revision_rationale: Se ajusta la cláusula de propósito para reflejar el sentido colectivo documentado en el inglés POB (‘estas cosas’), se mejora la naturalidad del inicio con ‘Y el hombre me dijo’, y se mueve la nota al lugar correcto junto a ‘Hijo de hombre’. No se requieren cambios doctrinales ni de terminología mayor.
