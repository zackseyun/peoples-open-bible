    text: O «como la señal», «conforme al prodigio» o «según el portento». El hebreo מוֹפֵת puede significar señal, prodigio o portento.
    reason: lexical_alternative
  revision_rationale: Se corrigió el anclaje de la nota para que corresponda a «señal», que es el término explicado. Además, «fue desgarrado» representa mejor נִקְרָע que «fue arrancado», y «del altar» mejora la naturalidad sin alterar el sentido.
