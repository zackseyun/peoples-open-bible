review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el hebreo y el rastro POB en los puntos principales: conserva «Yahvé» para יְהוָה, mantiene la imaginería explícita de «padre/hijo», y traduce יוֹכִיחַ con un verbo de reprensión/corrección. También preserva la alternativa de lectura sobre la segunda mitad del versículo. Sin embargo, la nota a usa «del Señor», lo que contradice la política terminológica del proyecto y el texto base de este versículo.'
  spanish_quality_summary: El español es claro, natural y digno. «Porque Yahvé reprende al que ama, como un padre al hijo en quien se deleita» suena bien en registro bíblico moderno. La única reparación necesaria es terminológica en la nota, no en la redacción principal.
  glossary_alignment: 'Alineación fuerte en el texto principal: יְהוָה -> «Yahvé» correctamente; בֵּן -> «hijo» correctamente sin neutralización; יוֹכִיחַ -> «reprende» conforme a la decisión lexical documentada. Desalineación menor pero real en la nota a, donde «del Señor» debería ajustarse a «de Yahvé» para mantener consistencia del proyecto.'
  issues:
  - severity: medium
    issue: La nota a dice «la disciplina del Señor» en vez de «la disciplina de Yahvé».
    rationale: El proyecto exige usar «Yahvé» para el Tetragrámaton en el texto principal y mantener esa decisión terminológica cuando la nota explica el mismo contexto. «Señor» reintroduce la convención que el proyecto evita.
  revised_spanish_text: Porque Yahvé reprende al que ama[a], como un padre al hijo en quien se deleita[b].
  revised_footnotes:
  - marker: a
    text: 'O: «corrige» o «disciplina». El verbo hebreo enfatiza la reprensión o corrección; en el contexto contribuye al tema más amplio de la disciplina de Yahvé.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «y como un padre al hijo que favorece».'
    reason: alternative_reading
  revision_rationale: Se conserva el texto principal porque es fiel, idiomático y bien alineado con el hebreo y el POB. Solo se corrige la terminología de la nota para ajustarla a la política del proyecto sobre יְהוָה.
