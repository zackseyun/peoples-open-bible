translation:
  language: es
  text: Y se fue, y un león lo encontró en el camino y lo mató. Su cadáver fue arrojado en el camino, y el asno estaba de pie junto a él[a], y el león estaba de pie junto al cadáver.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Es decir, junto al cadáver. El hebreo usa aquí un sufijo femenino que remite a «su cadáver»/«su cuerpo muerto».
    reason: clarify_pronoun_reference
lexical_decisions:
- source_word: וַיֵּלֶךְ
  english_pob_choice: And he went
  chosen_spanish: Él fue
  alternatives_spanish:
  - Y fue
  - Entonces fue
  lexicon: HALOT
  rationale: El waw consecutivo avanza la narración; en español, “Él fue” conserva la secuencia sin añadir una conectividad interpretativa excesiva. Se omite la conjunción inicial para evitar torpeza estilística en una oración tan breve y mantener el flujo narrativo.
- source_word: וַיִּמְצָאֵהוּ
  english_pob_choice: found him
  chosen_spanish: lo encontró
  alternatives_spanish:
  - se encontró con él
  - dio con él
  lexicon: HALOT
  rationale: מצא en este contexto narrativo se entiende mejor como “encontrar”. “Lo encontró” reproduce la acción súbita del encuentro sin introducir matices no atestiguados por el hebreo.
- source_word: אַרְיֵה
  english_pob_choice: a lion
  chosen_spanish: un león
  alternatives_spanish:
  - el león
  lexicon: HALOT
  rationale: Es un sustantivo común de animal, indefinido en la primera mención del enunciado. “Un león” es el equivalente natural y fiel en español.
- source_word: בַּדֶּרֶךְ
  english_pob_choice: on the road
  chosen_spanish: en el camino
  alternatives_spanish:
  - sobre el camino
  - en la carretera
  lexicon: HALOT
  rationale: En este contexto de viaje, דרך se expresa con naturalidad como “camino”. “En el camino” preserva el sentido locativo sin sonar más técnico de lo necesario.
- source_word: וַיְמִיתֵהוּ
  english_pob_choice: killed him
  chosen_spanish: lo mató
  alternatives_spanish:
  - le dio muerte
  lexicon: HALOT
  rationale: El causativo de מות indica causar la muerte. “Lo mató” es la forma directa y más idiomática en español, fiel al valor verbal del hebreo.
- source_word: נִבְלָתוֹ
  english_pob_choice: his corpse
  chosen_spanish: su cadáver
  alternatives_spanish:
  - su cuerpo muerto
  - su cuerpo sin vida
  lexicon: HALOT
  rationale: נבלה designa un cuerpo muerto/cadáver. “Cadáver” conserva el tono grave y sobrio del pasaje mejor que una formulación más explicativa.
- source_word: מֻשְׁלֶכֶת
  english_pob_choice: was cast
  chosen_spanish: fue arrojado
  alternatives_spanish:
  - fue echado
  - quedó arrojado
  lexicon: HALOT
  rationale: La forma pasiva expresa que el cuerpo fue lanzado o arrojado. “Fue arrojado” conserva la fuerza pasiva y el acto de deposición; en español suena natural y mantiene la tensión del texto. No se simplifica a “yacía”, porque el hebreo destaca que fue puesto allí por haber sido lanzado.
- source_word: וְהַחֲמוֹר עֹמֵד אֶצְלָהּ
  english_pob_choice: and the donkey was standing beside it
  chosen_spanish: y el asno estaba de pie junto a él
  alternatives_spanish:
  - y el asno estaba junto a él
  - y el asno permanecía junto a él
  lexicon: HALOT
  rationale: עֹמֵד funciona aquí como una descripción de estado/escena, por lo que “estaba de pie” transmite la postura visible. “Asno” es un término bíblico y reverente para חמור; el pronombre masculino “él” concuerda con el antecedente implícito en español, aunque el hebreo retome el sustantivo femenino del cadáver.
- source_word: וְהָאַרְיֵה עֹמֵד אֵצֶל הַנְּבֵלָה
  english_pob_choice: and the lion was standing beside the corpse
  chosen_spanish: y el león estaba de pie junto al cadáver
  alternatives_spanish:
  - y el león estaba junto al cadáver
  - y el león permanecía de pie junto al cadáver
  lexicon: HALOT
  rationale: Se mantiene el valor descriptivo del participio con “estaba de pie”. “Cadáver” traduce נבלה en continuidad con la línea anterior y conserva la explicitud del hebreo, sin reemplazarlo por un pronombre ambiguo.
translation_notes:
  revision_awareness: 'La base inglesa recibió una revisión menor: en la última pasada se prefirió “was cast” sobre “was thrown” por registro más natural. La versión española refleja esa misma decisión semántica con “fue arrojado”, manteniendo el pasivo y la imagen de deposición. No se detectaron tensiones textuales adicionales ni variantes relevantes en el paquete fuente.'
  spanish_consistency_notes:
  - Se usa “Yahvé” como convención del proyecto solo cuando aparece el nombre divino; este versículo no lo contiene.
  - Se eligió “asno” en lugar de “burro” por registro bíblico más sobrio y consistente con el tono del pasaje.
  - Se mantiene “cadáver” para נבלה, evitando suavizar el impacto narrativo.
  - La estructura verbal conserva el avance secuencial de acciones y la escena final estática, acorde con el hebreo participial.
