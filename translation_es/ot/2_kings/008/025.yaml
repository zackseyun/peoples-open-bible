translation:
  language: es
  text: En el duodécimo año de Joram hijo de Ahab[a], rey de Israel, comenzó a reinar Ahazías hijo de Jehoram, rey de Judá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo tiene 'Joram' para el rey de Israel y 'Jehoram' para el rey de Judá; son formas relacionadas del mismo nombre y a veces ambas se traducen como 'Joram'.
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּ/שְׁנַת שְׁתֵּים עֶשְׂרֵה שָׁנָה
  english_pob_choice: In the twelfth year
  chosen_spanish: En el duodécimo año
  alternatives_spanish:
  - En año doce
  - En el duodécimo año de reinado
  lexicon: HALOT
  rationale: La fórmula hebrea es una expresión regnal idiomática; en español, 'En el duodécimo año' conserva la naturalidad y la estructura temporal sin añadir elementos no explícitos en el hebreo.
- source_word: לְ/יוֹרָם
  english_pob_choice: of Joram
  chosen_spanish: de Joram
  alternatives_spanish:
  - para Joram
  - perteneciente a Joram
  lexicon: HALOT
  rationale: La preposición en fórmulas de reinado marca el año contado respecto del rey mencionado; 'de Joram' reproduce bien esa relación en español.
- source_word: בֶּן אַחְאָב
  english_pob_choice: son of Ahab
  chosen_spanish: hijo de Ahab
  alternatives_spanish:
  - descendiente de Ahab
  lexicon: HALOT
  rationale: La construcción patronímica es directa y se traduce de manera formal y transparente.
- source_word: מֶלֶךְ יִשְׂרָאֵל
  english_pob_choice: king of Israel
  chosen_spanish: rey de Israel
  alternatives_spanish:
  - monarca de Israel
  lexicon: HALOT
  rationale: Título real estándar; 'rey de Israel' es la correspondencia natural y fiel.
- source_word: מָלַךְ
  english_pob_choice: became king
  chosen_spanish: comenzó a reinar
  alternatives_spanish:
  - se hizo rey
  - reinó
  lexicon: HALOT
  rationale: En avisos de acceso, el verbo puede señalar el inicio del reinado. 'Comenzó a reinar' evita la ambigüedad de 'reinó' como duración continua y conserva el valor inceptivo del hebreo.
- source_word: אֲחַזְיָהוּ
  english_pob_choice: Ahaziah
  chosen_spanish: Ahazías
  alternatives_spanish:
  - Ocozías
  lexicon: transliteration standard
  rationale: Se usa la forma estándar de transliteración al español para el nombre propio, coherente con el resto de la serie.
- source_word: בֶן יְהוֹרָם
  english_pob_choice: son of Jehoram
  chosen_spanish: hijo de Joram
  alternatives_spanish:
  - hijo de Jehorm
  lexicon: HALOT
  rationale: Aunque el registro inglés distinguió 'Jehoram', en español la forma 'Joram' es la usada aquí para mantener coherencia onomástica con el rey de Israel y reflejar que se trata de formas relacionadas del mismo nombre semítico; no se introduce una distinción artificial no necesaria para el lector español.
- source_word: מֶלֶךְ יְהוּדָה
  english_pob_choice: king of Judah
  chosen_spanish: rey de Judá
  alternatives_spanish:
  - monarca de Judá
  lexicon: HALOT
  rationale: Título real directo y transparente; 'rey de Judá' corresponde sin añadir matices.
translation_notes:
  revision_awareness: El pasaje coincide con la revisión inglesa más reciente y no presenta cambios textuales relevantes; se mantiene la solución óptima-equivalente con una ligera adaptación onomástica al español.
  spanish_consistency_notes:
  - Se conserva 'Yahvé' como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se mantiene 'Joram' para la referencia onomástica con una nota explicativa, evitando una distinción inconsistente en español entre Joram/Jehoram cuando el hebreo presenta formas relacionadas.
  - La traducción de 'מָלַךְ' como 'comenzó a reinar' preserva el valor de acceso al trono propio de la fórmula cronística.
