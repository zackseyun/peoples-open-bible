translation:
  language: es
  text: Y los hijos de Judá capturaron vivos a diez mil, los llevaron a la cima de la peña[a], y los arrojaron desde la cima de la peña, y todos ellos quedaron destrozados[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la roca» o «el peñasco» para el término hebreo selaʿ.'
    reason: lexical_alternative
  - marker: b
    text: 'Lit.: «fueron partidos» o «fueron abiertos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁבוּ
  english_pob_choice: captured
  chosen_spanish: capturaron
  alternatives_spanish:
  - tomaron cautivos
  - apresaron
  lexicon: HALOT
  rationale: En este contexto militar, con חַיִּים ('vivos'), el verbo expresa tomar prisioneros; 'capturaron' es natural en español y conserva la fuerza del acto.
- source_word: חַיִּים
  english_pob_choice: alive
  chosen_spanish: vivos
  alternatives_spanish:
  - con vida
  - vivas
  lexicon: HALOT
  rationale: 'Mantiene el sentido predicativo/adverbial del hebreo: los diez mil no murieron en la batalla, sino que fueron tomados con vida.'
- source_word: לְרֹאשׁ
  english_pob_choice: to the top of
  chosen_spanish: a la cima de
  alternatives_spanish:
  - a la cima de
  - a lo alto de
  lexicon: HALOT
  rationale: רֹאשׁ aplicado a un accidente geográfico significa la parte superior; 'a la cima de' comunica ese valor con naturalidad en español.
- source_word: הַסָּלַע / הַסֶּלַע
  english_pob_choice: the cliff
  chosen_spanish: la peña
  alternatives_spanish:
  - la roca
  - el peñasco
  - el precipicio
  lexicon: HALOT
  rationale: סֶלַע puede ser roca, peñasco o risco. Aquí, por la acción de arrojarlos desde arriba, 'peña' transmite una masa rocosa elevada sin decidir de más entre 'roca' y 'cliff'; en nota se conserva la alternativa.
- source_word: וַיַּשְׁלִיכוּם
  english_pob_choice: threw them down
  chosen_spanish: los arrojaron
  alternatives_spanish:
  - los echaron abajo
  - los lanzaron
  lexicon: HALOT
  rationale: שׁלך significa arrojar/lançar. En español el descenso ya queda implicado por 'desde la cima de la peña'; no hace falta añadir 'abajo' en el texto principal.
- source_word: נִבְקָעוּ
  english_pob_choice: were dashed to pieces
  chosen_spanish: quedaron destrozados
  alternatives_spanish:
  - fueron hechos pedazos
  - quedaron partidos
  lexicon: HALOT
  rationale: El nifal de בקע es 'ser partido/abierto'. En este contexto narrativo de caída violenta, 'quedaron destrozados' comunica el resultado sin suavizar la violencia ni sonar artificial en español.
- source_word: וְכֻלָּם
  english_pob_choice: all of them
  chosen_spanish: todos ellos
  alternatives_spanish:
  - todos
  lexicon: HALOT
  rationale: Conserva la explicitud del sufijo pronominal hebreo y el énfasis totalizante del original.
translation_notes:
  revision_awareness: La redacción sigue el acuerdo alto con el audit trail inglés y refleja la revisión que sustituyó una relación de consecuencia por coordinación simple; por eso se mantiene una serie de acciones unidas por «y».
  spanish_consistency_notes:
  - Se evitó «SEÑOR» porque el verso no contiene el nombre divino.
  - Se prefirió «peña» en el texto principal por claridad narrativa, pero la nota conserva las alternativas léxicas de selaʿ.
  - «Destrozados» intenta reproducir el resultado violento de נִבְקָעוּ sin atenuarlo ni introducir una paráfrasis explicativa.
