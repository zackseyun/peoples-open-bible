translation:
  language: es
  text: Entonces el Espíritu[a] me levantó y me llevó a Caldea, a los exiliados[b], en la visión por el Espíritu de Dios[c]; y la visión que yo había visto se fue de encima de mí[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «me llevó» para «me levantó».
    reason: lexical_alternative
  - marker: b
    text: O «a la comunidad de exiliados»; el hebreo «al exilio» puede referirse colectivamente al pueblo deportado.
    reason: lexical_alternative
  - marker: c
    text: O «en el Espíritu de Dios». La preposición hebrea puede expresar tanto medio/agencia como esfera.
    reason: alternative_reading
  - marker: d
    text: Lit. «se fue de encima de mí». El hebreo dice literalmente «subió de sobre mí».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְר֣וּחַ
  english_pob_choice: Then the Spirit
  chosen_spanish: Entonces el Espíritu
  alternatives_spanish:
  - Y el Espíritu
  - Y un viento
  - Y un soplo
  lexicon: HALOT
  rationale: רוּחַ puede significar espíritu, viento o aliento. En el contexto de transporte visionario de Ezequiel, y con la mención posterior del Espíritu de Dios, «el Espíritu» preserva la lectura teológica y narrativa más natural. La conjunción inicial se vierte como «Entonces» para reflejar la progresión del relato en español.
- source_word: נְשָׂאַתְנִי
  english_pob_choice: lifted me up
  chosen_spanish: me levantó
  alternatives_spanish:
  - me llevó
  - me alzó
  - me cargó
  lexicon: HALOT
  rationale: נשא puede significar levantar, llevar o cargar. «Me levantó» conserva la imagen concreta del transporte visionario y suena natural en español; la alternativa «me llevó» queda parcialmente representada por el verbo siguiente.
- source_word: וַתְּבִיאֵנִי
  english_pob_choice: brought me
  chosen_spanish: me llevó
  alternatives_spanish:
  - me trajo
  - me condujo
  - me hizo llegar
  lexicon: HALOT
  rationale: El causativo de בוא expresa hacer venir o llevar/traer. «Me llevó» funciona bien en español junto con «me levantó», sin perder el sentido de traslado efectivo hacia el lugar de la visión.
- source_word: כַשְׂדִּימָה
  english_pob_choice: to Chaldea
  chosen_spanish: en Caldea
  alternatives_spanish:
  - a Caldea
  - hacia Caldea
  - a Babilonia
  lexicon: HALOT
  rationale: La forma direccional indica movimiento hacia la región de los caldeos. «En Caldea» reproduce el destino dentro del marco narrativo en español, evitando la etnización directa «a los caldeos» y manteniendo la referencia geográfica.
- source_word: אֶל הַגּוֹלָה
  english_pob_choice: to the exiles
  chosen_spanish: a los exiliados
  alternatives_spanish:
  - al exilio
  - a la comunidad de exiliados
  - a los cautivos
  lexicon: HALOT
  rationale: הַגּוֹלָה puede referirse al grupo deportado. En este contexto, «los exiliados» es idiomático y conserva la referencia colectiva que el POB inglés explica en nota.
- source_word: בַּמַּרְאֶה
  english_pob_choice: in the vision
  chosen_spanish: en la visión
  alternatives_spanish:
  - en una visión
  - por medio de la visión
  - en apariencia
  lexicon: HALOT
  rationale: מַרְאֶה en este contexto profético señala una experiencia visionaria concreta. «En la visión» reproduce bien el artículo definido y evita suavizar el carácter revelatorio del pasaje.
- source_word: בְּרוּחַ אֱלֹהִים
  english_pob_choice: by the Spirit of God
  chosen_spanish: por el Espíritu de Dios
  alternatives_spanish:
  - en el Espíritu de Dios
  - mediante el Espíritu de Dios
  - por un espíritu de Dios
  lexicon: HALOT
  rationale: La preposición puede expresar medio o esfera. «Por el Espíritu de Dios» comunica con claridad la agencia del Espíritu en español y mantiene la tensión entre medio e instrumento sin reducirla a una sola opción.
- source_word: וַיַּעַל מֵעָלַי
  english_pob_choice: went up from me
  chosen_spanish: se fue de encima de mí
  alternatives_spanish:
  - subió de mí
  - se apartó de mí
  - subió de sobre mí
  lexicon: HALOT
  rationale: עלה con מעלי conserva la imagen vertical de algo que asciende desde encima del profeta. «Se fue de encima de mí» es una solución española que mantiene esa dirección espacial y evita una paráfrasis demasiado libre como «desapareció».
- source_word: הַמַּרְאֶה אֲשֶׁר רָאִיתִי
  english_pob_choice: the vision that I had seen
  chosen_spanish: la visión que yo había visto
  alternatives_spanish:
  - la visión que vi
  - la apariencia que había visto
  - la visión que había visto
  lexicon: HALOT
  rationale: Se conserva «visión» para מַרְאֶה, coherente con el uso anterior, y el pluscuamperfecto «había visto» refleja bien la secuencia temporal del hebreo y del inglés POB revisado.
theological_decisions:
- issue: 'Cómo traducir רוּחַ en un contexto de transporte profético: si como «viento/aliento» o como referencia personal al Espíritu'
  english_pob_reading: Both occurrences are rendered with reference to the Spirit, with the second explicitly 'the Spirit of God.'
  chosen_spanish_reading: Ambas ocurrencias se refieren al Espíritu; la segunda queda explícita como «el Espíritu de Dios».
  alternative_spanish_readings:
  - viento
  - aliento
  - soplo
  rationale: El contexto inmediato es la traslación visionaria y la revelación, no una descripción meteorológica. Traducir con «Espíritu» preserva la coherencia narrativa y teológica del pasaje sin ir más allá de lo que el texto requiere.
  doctrine_reference: Translation philosophy §3, §6
- issue: 'Valor de בְּרוּחַ אֱלֹהִים: medio, esfera o agencia'
  english_pob_reading: Or 'in the Spirit of God.' The Hebrew preposition can express either agency ('by') or sphere ('in').
  chosen_spanish_reading: «Por el Espíritu de Dios», manteniendo implícita la posibilidad de esfera o medio.
  alternative_spanish_readings:
  - en el Espíritu de Dios
  - mediante el Espíritu de Dios
  rationale: El hebreo permite más de una relación semántica. En español, «por» comunica mejor la acción eficaz sin cerrar innecesariamente la ambigüedad que el original contiene.
  doctrine_reference: Translation philosophy §3, §6
- issue: Cómo reflejar וַיַּעַל מֵעָלַי sin perder la imagen vertical
  english_pob_reading: Or 'departed from me.' The Hebrew literally says 'went up from upon me.'
  chosen_spanish_reading: «Se fue de encima de mí».
  alternative_spanish_readings:
  - se apartó de mí
  - subió de sobre mí
  - partió de mí
  rationale: La expresión hebrea es literalmente ascensional y espacial. «Se fue de encima de mí» conserva la imagen de algo que se eleva desde sobre el profeta, evitando borrar la metáfora con un verbo meramente abstracto.
  doctrine_reference: Translation philosophy §3, §6
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del POB inglés, que prefirió 'went up from me' sobre 'rose up from me' por ser una representación más natural y directa del hebreo. La redacción española conserva esa imagen de ascenso/desplazamiento espacial con «se fue de encima de mí», y mantiene la referencia a la visión como experiencia puntual, no como apariencia genérica.
  spanish_consistency_notes:
  - Se mantiene «Espíritu» con mayúscula cuando la referencia es al Espíritu de Dios y no a un uso impersonal de רוּחַ.
  - Se conserva «visión» para מַרְאֶה en ambas apariciones para asegurar consistencia terminológica.
  - «Exiliados» se usa de forma colectiva, en línea con la nota inglesa sobre הַגּוֹלָה.
  - 'La secuencia verbal reproduce el movimiento del original: levantar, llevar, visión, y luego retirada ascendente de la visión.'
