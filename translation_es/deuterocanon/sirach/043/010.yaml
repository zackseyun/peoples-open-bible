translation:
  language: es
  text: Por su palabra[a] permanece firme el decreto, y no desfallecen en sus guardias[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Variante textual: Masada lee ‘Por la palabra del Señor permanece firme el decreto’, haciendo explícito al sujeto divino donde el texto de la Geniza de El Cairo es menos explícito.'
    reason: textual_variant
  - marker: b
    text: 'También: ‘y no se debilitan en sus puestos’; el hebreo de este verbo es incierto, y el paralelo griego favorece la idea de no aflojar ni perder vigor.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בדבר / ἐν λόγοις
  english_pob_choice: At his word
  chosen_spanish: Por su palabra
  alternatives_spanish:
  - Al decir de él
  - A su palabra
  lexicon: HALOT; LXX ἐν λόγοις
  rationale: El hebreo ב־ con דבר puede expresar medio o causa, y el paralelo griego ἐν λόγοις apunta a una formulación de ‘por/mediante palabra’. ‘Por su palabra’ conserva el valor instrumental y suena natural en español. Se evita ‘At the word’ literal, porque en español sería menos fluido y más ambiguo en este contexto.
- source_word: יֵעָמֵד / στήσονται
  english_pob_choice: stands
  chosen_spanish: se establece
  alternatives_spanish:
  - permanece firme
  - se mantiene
  lexicon: HALOT; LSJ
  rationale: El verbo עמד transmite la idea de estar firme o permanecer. En español, ‘se establece’ comunica bien la fijación estable del decreto sin perder la noción de firmeza. ‘Permanece firme’ también es viable, pero ‘se establece’ encaja mejor con ‘decreto’.
- source_word: חק / κρίμα
  english_pob_choice: the decree
  chosen_spanish: el decreto
  alternatives_spanish:
  - la ordenanza
  - el estatuto
  - el orden fijado
  lexicon: HALOT; LSJ
  rationale: En este contexto cósmico, חק no es una simple ley humana sino una disposición fija y autorizada. ‘Decreto’ refleja bien una orden establecida y evita el tono demasiado técnico de ‘estatuto’. El griego κρίμα puede referirse a un juicio o determinación; en español, ‘decreto’ conserva la idea de determinación firme.
- source_word: ולא ישח / οὐ μὴ ἐκλυθῶσιν
  english_pob_choice: and they do not fail
  chosen_spanish: y no desfallecen
  alternatives_spanish:
  - y no se debilitan
  - y no flaquean
  - y no fallan
  lexicon: HALOT; LSJ
  rationale: El hebreo es incierto y el griego sugiere no debilitarse ni aflojar. ‘Desfallecen’ recoge la idea de pérdida de vigor o firmeza sin sonar demasiado coloquial. Se preserva la tensión textual de la tradición hebrea con apoyo del paralelo griego.
- source_word: באשמרותם / ἐν φυλακαῖς αὐτῶν
  english_pob_choice: in their watches
  chosen_spanish: en sus guardias
  alternatives_spanish:
  - en sus vigilias
  - en sus turnos
  - en sus puestos
  lexicon: HALOT; LSJ
  rationale: אשמרות alude a guardias, vigilias o turnos establecidos. ‘Guardias’ funciona en español como imagen de puestos asignados y también mantiene la resonancia de vigilancia. ‘Vigilias’ sería posible, pero puede sonar más litúrgico; ‘guardias’ es más directo.
theological_decisions:
- issue: Sujetividad divina implícita en בדבר
  english_pob_reading: 'Keep the subject implicit in the main text: ''At his word'''
  chosen_spanish_reading: 'Mantener el sujeto implícito: ‘Por su palabra’'
  alternative_spanish_readings:
  - Por la palabra del Señor
  - Por su mandato
  rationale: El hebreo transmitido no explicita claramente a Yahvé en la línea principal, aunque la variante de Masada sí lo hace. En español, ‘su’ conserva la referencia divina implícita sin introducir una expansión que no está en el texto base. La nota permite documentar la lectura explícita alternativa.
  doctrine_reference: Textual criticism / divine reference in variant tradition
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el estado auditado indica que no se requieren ajustes adicionales. Se mantuvo la decisión de conservar el sujeto divino implícito en la línea principal y de reflejar la incertidumbre verbal con una opción alternativa en nota.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ solo en notas si el texto lo requiere; aquí no se expande en el cuerpo porque la evidencia principal conserva la referencia implícita.
  - ‘Decreto’ se mantiene para חק como término de disposición fija, coherente con el valor cosmológico del pasaje.
  - ‘Guardias’ traduce אשמרות con un español claro y compatible con la imaginería de puestos asignados; no se optó por ‘vigilias’ para evitar una resonancia litúrgica no requerida por el contexto.
