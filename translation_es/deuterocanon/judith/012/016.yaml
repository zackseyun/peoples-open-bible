  to: Y cuando ella entró, Judit se recostó[b], y el corazón de Holofernes quedó fuera de sí por causa de ella; su alma fue sacudida. Tenía gran deseo de tener relaciones con ella, y estaba atento a una oportunidad para engañarla[a] desde el día en que la vio.
