translation:
  language: es
  text: ¿No se levantarán de repente tus acreedores[a], y se despertarán los que te hacen temblar? Entonces serás despojo para ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «los que te muerden». La expresión puede aludir intencionalmente tanto a agresores que muerden como a acreedores que exigen pago.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲלוֹא
  english_pob_choice: Will not
  chosen_spanish: ¿No
  alternatives_spanish:
  - ¿Acaso no
  - ¿No será que
  lexicon: HALOT
  rationale: La partícula introduce una pregunta retórica que espera respuesta afirmativa. En español, «¿No...?» conserva ese valor interrogativo y la expectativa de juicio.
- source_word: פֶתַע
  english_pob_choice: suddenly
  chosen_spanish: de repente
  alternatives_spanish:
  - repentinamente
  - en un instante
  lexicon: HALOT
  rationale: Adverbio de irrupción súbita; «de repente» es natural en español y mantiene la rapidez inesperada del evento.
- source_word: יָקוּמוּ
  english_pob_choice: rise
  chosen_spanish: se levantarán
  alternatives_spanish:
  - se alzarán
  - aparecerán
  lexicon: HALOT
  rationale: En el contexto hostil, קום expresa levantarse para actuar contra alguien. «Se levantarán» conserva el movimiento y la carga adversativa sin sonar artificial.
- source_word: נֹשְׁכֶיךָ
  english_pob_choice: your creditors
  chosen_spanish: tus acreedores
  alternatives_spanish:
  - los que te muerden
  - tus cobradores
  lexicon: HALOT
  rationale: La POB inglesa privilegia el sentido económico de נשך en este contexto, pero deja abierta la metáfora literal en nota. «Acreedores» comunica bien la inversión judicial/económica; el matiz literal queda preservado en la nota.
- source_word: וְיִקְצוּ
  english_pob_choice: awake
  chosen_spanish: se despertarán
  alternatives_spanish:
  - despertarán
  - se espabilarán
  lexicon: HALOT
  rationale: El paralelo poético con «se levantarán» sugiere activación súbita. «Se despertarán» conserva la imagen de despertar y la coordinación con el primer cola.
- source_word: מְזַעְזְעֶיךָ
  english_pob_choice: those who make you tremble
  chosen_spanish: los que te hacen temblar
  alternatives_spanish:
  - tus amedrentadores
  - los que te estremecen
  lexicon: HALOT
  rationale: El participio causativo expresa quienes producen temblor. «Los que te hacen temblar» es fiel, claro y evita cargar el sentido con interpretaciones adicionales.
- source_word: וְהָיִיתָ
  english_pob_choice: Then you will become
  chosen_spanish: Entonces serás
  alternatives_spanish:
  - y serás
  - llegarás a ser
  lexicon: HALOT
  rationale: El hebreo introduce consecuencia; «Entonces» explicita la relación resultativa. «Serás» es una forma breve y directa que mantiene el futuro.
- source_word: לִמְשִׁסּוֹת
  english_pob_choice: plunder
  chosen_spanish: despojo
  alternatives_spanish:
  - botín
  - presa
  lexicon: HALOT
  rationale: El sustantivo denota algo entregado a saqueo. «Despojo» comunica la condición de ser entregado al saqueo y funciona bien con la lógica de reversión del verso.
- source_word: לָמוֹ
  english_pob_choice: for them
  chosen_spanish: para ellos
  alternatives_spanish:
  - a ellos
  - de ellos
  lexicon: HALOT
  rationale: El sufijo pronominal plural retoma a los agresores. «Para ellos» es la opción idiomática con «ser despojo» y refleja el destino de reversión.
translation_notes:
  revision_awareness: Se siguió el paquete fuente hebreo y el audit trail inglés; no se requirieron revisiones previas. La decisión principal fue mantener la lectura económica de נֹשְׁכֶיךָ como «acreedores» y preservar el matiz literal en nota, en continuidad con la POB inglesa.
  spanish_consistency_notes:
  - Se usó «Yahvé» como convención de la serie cuando aparezca el nombre divino, pero este verso no lo contiene.
  - Se mantuvo el tono poético y de juicio sin añadir interpretaciones fuera del texto.
  - «Despojo» fue preferido a «botín» por su naturalidad en la frase final y por la idea de quedar a merced del saqueo.
