translation:
  language: es
  text: Pero cualquier[a] ofrenda por el pecado de cuya sangre se lleva una parte a la tienda de reunión para hacer expiación en el lugar santo no se comerá; será quemada con fuego.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘ofrenda por la purificación’ para חַטָּאת; el hebreo en Levítico puede designar la ofrenda que trata con la impureza y el pecado.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכָל
  english_pob_choice: But any
  chosen_spanish: Pero toda
  alternatives_spanish:
  - Y toda
  - Ahora bien, toda
  lexicon: HALOT
  rationale: 'El hebreo וְ enlaza esta norma con lo anterior, y en contexto tiene matiz restrictivo: no se trata de cualquier ofrenda sin más, sino de esa categoría específica. En español, ‘Pero toda’ conserva ese giro adversativo/restrictivo que reflejó la revisión inglesa final.'
- source_word: חַטָּאת
  english_pob_choice: sin offering
  chosen_spanish: ofrenda por el pecado
  alternatives_spanish:
  - ofrenda purificadora
  - sacrificio por el pecado
  lexicon: HALOT
  rationale: En este contexto cultual, חַטָּאת designa la ofrenda sacrificial, no la noción abstracta de pecado. ‘Ofrenda por el pecado’ comunica bien el referente tradicional sin imponer una teoría interpretativa; ‘ofrenda purificadora’ se deja como alternativa legítima.
- source_word: אֲשֶׁר יוּבָא מִדָּמָהּ
  english_pob_choice: from whose blood some is brought
  chosen_spanish: de la que parte de su sangre es llevada
  alternatives_spanish:
  - de cuya sangre es llevada
  - de la que se lleva sangre
  lexicon: HALOT
  rationale: 'El hebreo usa un giro partitivo con מִן: no dice simplemente que ‘su sangre’ sea llevada, sino que una porción de ella entra. ‘Parte de su sangre’ preserva esa fuerza partitiva y mantiene la referencia ritual precisa.'
- source_word: אֶל אֹהֶל מוֹעֵד
  english_pob_choice: into the tent of meeting
  chosen_spanish: al tabernáculo de reunión
  alternatives_spanish:
  - a la tienda de reunión
  - al tabernáculo del encuentro
  lexicon: HALOT
  rationale: ‘Ohel mo‘ed’ es la designación cultual estable del santuario. ‘Tabernáculo de reunión’ es una forma clara y reverente en español bíblico; ‘al’ refleja bien el movimiento hacia el interior en contexto de sangre llevada para uso ritual.
- source_word: לְכַפֵּר
  english_pob_choice: to make atonement
  chosen_spanish: para hacer expiación
  alternatives_spanish:
  - para hacer atonamiento
  - para efectuar expiación
  lexicon: HALOT
  rationale: En español bíblico, ‘expiación’ comunica adecuadamente la función ritual de כפר sin reducirla a un solo matiz doctrinal. ‘Hacer expiación’ conserva el valor cultual y la relación con el lugar santo.
- source_word: בַּקֹּדֶשׁ
  english_pob_choice: in the holy place
  chosen_spanish: en el lugar santo
  alternatives_spanish:
  - en el santuario
  - en lo santo
  lexicon: HALOT
  rationale: La expresión apunta al ámbito sagrado concreto donde se realiza el rito. ‘Lugar santo’ es natural en español y conserva la concreción espacial de la frase hebrea mejor que una abstracción como ‘lo santo’.
- source_word: לֹא תֵאָכֵל
  english_pob_choice: shall not be eaten
  chosen_spanish: no se comerá
  alternatives_spanish:
  - no debe comerse
  - no deberá comerse
  lexicon: HALOT
  rationale: La construcción pasiva legal se expresa con naturalidad en español mediante ‘no se comerá’, que mantiene el tono normativo y la pasiva sin añadir énfasis extra.
- source_word: בָּאֵשׁ תִּשָּׂרֵף
  english_pob_choice: it shall be burned with fire
  chosen_spanish: será quemada con fuego
  alternatives_spanish:
  - será quemada en el fuego
  - será consumida por fuego
  lexicon: HALOT
  rationale: El hebreo conserva la fórmula enfática ‘con fuego’. ‘Será quemada con fuego’ reproduce esa repetición idiomática de manera fiel y comprensible, sin suavizarla a una mera referencia general al fuego.
theological_decisions:
- issue: Sentido de חַטָּאת en legislación sacrificial
  english_pob_reading: Rendered as 'sin offering'
  chosen_spanish_reading: ofrenda por el pecado
  alternative_spanish_readings:
  - ofrenda purificadora
  rationale: El término puede señalar tanto el pecado como la ofrenda vinculada a él. En Levítico 6:23 el referente es claramente el sacrificio. ‘Ofrenda por el pecado’ conserva la tradición reconocible y no borra la dimensión de purificación; ‘ofrenda purificadora’ sigue siendo una alternativa posible, pero no la más transparente para lectura pública.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented exception)
- issue: Alcance partitivo de la sangre llevada al santuario
  english_pob_reading: Expressed partitive sense as 'from whose blood some is brought'
  chosen_spanish_reading: de la que parte de su sangre es llevada
  alternative_spanish_readings:
  - de cuya sangre es llevada
  rationale: El prefijo מִן sugiere una parte de la sangre, no necesariamente toda. Explicitar ‘parte de su sangre’ ayuda al lector español a percibir el detalle ritual y evita aplanar el hebreo.
  doctrine_reference: Translation philosophy §1 (original-language primacy over translation tradition)
- issue: Ubicación sagrada de la expiación
  english_pob_reading: to make atonement in the holy place
  chosen_spanish_reading: para hacer expiación en el lugar santo
  alternative_spanish_readings:
  - para hacer expiación en el santuario
  rationale: ‘Lugar santo’ mantiene el valor espacial y cultual del hebreo בַּקֹּדֶשׁ. No se amplía más allá de lo que el texto dice, pero tampoco se reduce a una abstracción doctrinal.
  doctrine_reference: Translation philosophy §1 (source-text primacy)
translation_notes:
  revision_awareness: La redacción española sigue la revisión final del POB inglés, que cambió el arranque a una forma restrictiva (‘But any’). También conserva el matiz partitivo de מִן en ‘parte de su sangre’ y mantiene la fórmula cultual de ‘expiación’/‘lugar santo’ sin desplazarla hacia un lenguaje menos preciso.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ solo cuando el texto hebreo lo exija; este versículo no contiene el Tetragrámaton.
  - Se mantiene ‘ofrenda por el pecado’ como término cultual reconocible, con nota para la alternativa ‘ofrenda por la purificación’.
  - ‘Tabernáculo de reunión’ y ‘lugar santo’ conservan la terminología bíblica de culto de forma consistente con el resto de la serie.
  - 'La pasiva legal se expresa de forma natural en español: ‘no se comerá’ y ‘será quemada con fuego’.'
