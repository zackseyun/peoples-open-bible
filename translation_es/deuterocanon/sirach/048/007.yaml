translation:
  language: es
  text: el que ungió a uno para actos de retribución[a][b], y un profeta en tu lugar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: «oyendo en Sinaí reprensión, y en Horeb juicios de venganza». El hebreo conservado aquí difiere notablemente de la tradición griega.'
    reason: alternative_reading
  - marker: b
    text: La frase hebrea alrededor de «uno para actos de retribución» es difícil en este texto genizático compuesto; la traducción sigue el sentido aparente en el contexto.
    reason: textual_variant
lexical_decisions:
- source_word: המושח
  english_pob_choice: who anointed
  chosen_spanish: el que ungió
  alternatives_spanish:
  - el que unge
  - ungiendo
  lexicon: HALOT
  rationale: Se entiende como participio/relativo de משח, describiendo a Elías por su acción de ungir. En español, «el que ungió» conserva el valor referencial y suena natural en una frase nominal.
- source_word: מלא
  english_pob_choice: one
  chosen_spanish: uno
  alternatives_spanish:
  - plenitud
  - lo que está lleno
  lexicon: HALOT
  rationale: El hebreo compuesto es difícil; siguiendo el audit trail inglés, se toma como referente personal. «Uno» mantiene la ambigüedad sin forzar una interpretación más específica de la que permite el testimonio conservado.
- source_word: תשלומות
  english_pob_choice: acts of retribution
  chosen_spanish: actos de retribución
  alternatives_spanish:
  - retribuciones
  - represalias
  - actos de venganza
  lexicon: HALOT
  rationale: Deriva de שלם en el sentido de pago/retribución. «Actos de retribución» reproduce el campo semántico judicial-punitivo del inglés POB sin intensificarlo innecesariamente como «venganza».
- source_word: ונביא
  english_pob_choice: and a prophet
  chosen_spanish: y un profeta
  alternatives_spanish:
  - y el profeta
  lexicon: HALOT
  rationale: El hebreo no lleva artículo; por eso se conserva la indefinición en español. El referente sigue siendo Eliseo, pero el texto leído no lo marca con artículo.
- source_word: תחליף
  english_pob_choice: as your successor
  chosen_spanish: en tu lugar
  alternatives_spanish:
  - como tu sucesor
  - como reemplazo tuyo
  lexicon: HALOT
  rationale: La revisión inglesa final prefirió una formulación más directa que no añadiera matiz interpretativo. «En tu lugar» refleja la sustitución funcional de תחתיך/תחליף sin introducir una terminología más técnica de sucesión.
- source_word: תחתיך
  english_pob_choice: your successor
  chosen_spanish: en tu lugar
  alternatives_spanish:
  - en vez de ti
  - como tu sucesor
  lexicon: HALOT
  rationale: La combinación indica sustitución en oficio o función, no solo posición espacial. «En tu lugar» conserva la idea de reemplazo/continuidad con buen español.
- source_word: ἐλεγμὸν
  english_pob_choice: acts of retribution
  chosen_spanish: actos de retribución
  alternatives_spanish:
  - reprensión
  - convicción
  lexicon: BDAG
  rationale: La paráfrasis/eco griego apunta al campo de reprobación y juicio, pero en el contexto de Sirácida y la lectura hebrea sobreviviente el énfasis es punitivo. Se mantiene la equivalencia semántica con el inglés POB.
- source_word: κρίματα ἐκδικήσεως
  english_pob_choice: acts of retribution
  chosen_spanish: actos de retribución
  alternatives_spanish:
  - juicios de venganza
  - juicios vindicativos
  lexicon: BDAG
  rationale: El paralelo griego confirma el matiz judicial-punitivo. «Actos de retribución» permite abarcar tanto la reprensión como el juicio sin imponer una traducción más áspera que la que sostiene el hilo hebreo.
theological_decisions:
- issue: Divergencia entre el hebreo conservado y el paralelo griego en Sirácida 48:7
  english_pob_reading: Main text follows the Hebrew witness about Elijah anointing agents for judgment and appointing a prophetic successor.
  chosen_spanish_reading: El texto principal sigue el testimonio hebreo sobre Elías ungendo a uno para actos de retribución y estableciendo un profeta en su lugar.
  alternative_spanish_readings:
  - «oyendo en Sinaí reprensión, y en Horeb juicios de venganza»
  - «escuchando en el Sinaí reprensión, y en Horeb juicios de retribución»
  rationale: En Sirácida, el proyecto prioriza el hebreo donde sobrevive, pero el paralelo griego es relevante y difiere de manera sustancial. Por eso el texto principal sigue el hebreo y la lectura griega queda preservada como alternativa en nota, sin borrarla ni fusionarla artificialmente.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives; use Greek parallel as actual input'
translation_notes:
  revision_awareness: 'La redacción española sigue la revisión final del expediente inglés: se evita una formulación como «como tu sucesor» y se prefiere «en tu lugar» para reflejar más directamente תחתיך. También se conserva «actos de retribución» para מלא תשלומות, alineando el texto principal con el hebreo sobreviviente y dejando constancia del contraste con el paralelo griego.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención del proyecto cuando aparezca el nombre divino; en este versículo no ocurre.
  - Se usa «un profeta» y no «el profeta» porque el hebreo carece de artículo en ונביא.
  - «En tu lugar» expresa reemplazo funcional y mantiene la ambigüedad de sucesión sin sobrerinterpretar.
  - Las notas distinguen con claridad el testimonio hebreo principal del paralelo griego, siguiendo el audit trail del POB.
