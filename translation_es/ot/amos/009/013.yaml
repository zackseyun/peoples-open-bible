base_translation:
  language: en
  yaml_path: translation/ot/amos/009/013.yaml
  text: Behold[a], days are coming, declares Yahweh, when the plowman will overtake the reaper, and the one who treads grapes the one who sows the seed; the mountains will drip sweet wine[c][b], and all the hills will melt.
  footnotes:
  - marker: a
    text: Or 'the one who sows seed.' The Hebrew literally says 'the one who draws out the seed,' likely an idiom for sowing.
    reason: lexical_alternative
  - marker: b
    text: Or 'new wine.'
    reason: lexical_alternative
  - marker: c
    text: The image is of such abundance that one season's work begins before the previous one has ended.
    reason: cultural_note
