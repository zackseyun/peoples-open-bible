translation:
  language: es
  text: 'Entonces el ángel de Yahvé le dijo[a]: «Mira, estás encinta y darás a luz un hijo, y le pondrás por nombre Ismael, porque Yahvé ha oído tu aflicción».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mensajero de Yahvé».
    reason: lexical_alternative
lexical_decisions:
- source_word: מַלְאַךְ יְהוָה
  english_pob_choice: the angel of the LORD
  chosen_spanish: el ángel de Yahvé
  alternatives_spanish:
  - el mensajero de Yahvé
  lexicon: HALOT
  rationale: מַלְאַךְ puede significar ‘mensajero’ o ‘ángel’. En este contexto narrativo, la lectura natural es la de un mensajero celestial. Se mantiene «ángel» como equivalente idiomático claro en español, y «Yahvé» preserva el nombre divino según la política de la obra.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: El Tetragrámaton se vierte como «Yahvé» para conservar el nombre personal divino, en lugar de sustituirlo por un título. Es la forma establecida por el proyecto en español.
- source_word: הִנָּךְ
  english_pob_choice: Behold
  chosen_spanish: Mira
  alternatives_spanish:
  - He aquí
  - Mira bien
  lexicon: HALOT
  rationale: La partícula introduce una declaración solemne y enfática. «Mira» comunica la función de atención en un español natural y digno, sin sobrecargar con un calco arcaico.
- source_word: הָרָה
  english_pob_choice: pregnant
  chosen_spanish: encinta
  alternatives_spanish:
  - embarazada
  lexicon: HALOT
  rationale: El hebreo describe el estado de embarazo. «Encinta» es preciso, sobrio y adecuado al registro bíblico; evita la modernidad un poco más coloquial de «embarazada».
- source_word: וְיֹלַדְתְּ בֵּן
  english_pob_choice: will bear a son
  chosen_spanish: darás a luz un hijo
  alternatives_spanish:
  - parirás un hijo
  - tendrás un hijo
  lexicon: HALOT
  rationale: La expresión anuncia el nacimiento futuro. «Darás a luz un hijo» reproduce bien el sentido sin sonar forzado en español.
- source_word: וְקָרָאת שְׁמוֹ
  english_pob_choice: you shall call his name
  chosen_spanish: llamarás su nombre
  alternatives_spanish:
  - le pondrás por nombre
  - nombrarás
  lexicon: HALOT
  rationale: Se conserva la fórmula nominal bíblica «llamarás su nombre», que refleja de cerca la estructura hebrea y su peso literario.
- source_word: יִשְׁמָעֵאל
  english_pob_choice: Ishmael
  chosen_spanish: Ismael
  lexicon: HALOT
  rationale: Los nombres propios se transliteran por convención al español bíblico.
- source_word: כִּי שָׁמַע יְהוָה
  english_pob_choice: because Yahweh has heard
  chosen_spanish: porque Yahvé ha oído
  alternatives_spanish:
  - porque Yahvé escuchó
  - pues Yahvé ha oído
  lexicon: HALOT
  rationale: כִּי introduce la razón del nombre. «Ha oído» conserva el valor perfectivo con relevancia presente; «oído» mantiene la conexión verbal con el nombre Ismael.
- source_word: עָנְיֵךְ
  english_pob_choice: your affliction
  chosen_spanish: tu aflicción
  alternatives_spanish:
  - tu sufrimiento
  - tu humillación
  - tu miseria
  lexicon: HALOT
  rationale: עָנְיֵךְ abarca aflicción, opresión o estado de sufrimiento. «Aflicción» preserva esa amplitud sin reducirla a una sola dimensión emocional o social.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se conserva el nombre personal de Dios en vez de una sustitución litúrgica. Esto mantiene la transparencia del texto frente al hebreo y coincide con la política doctrinal del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Identidad de מַלְאַךְ יְהוָה
  english_pob_reading: the angel of Yahweh
  chosen_spanish_reading: el ángel de Yahvé
  alternative_spanish_readings:
  - el mensajero de Yahvé
  rationale: La traducción conserva la expresión hebrea sin añadir una identificación teológica más fuerte, como una cristofanía, que el verso no exige explícitamente.
  doctrine_reference: DOCTRINE.md Affirmations; Translation philosophy §3 preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto hebreo y la línea de auditoría inglesa: mantiene el nombre divino como Yahvé, preserva la fórmula de nombramiento y usa una equivalencia natural para la anunciación del embarazo y el nacimiento. No hay cambios respecto de la última revisión auditada.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה, conforme a la terminología del proyecto.
  - Se prefiere «ángel» en el texto principal, con la alternativa «mensajero» en nota para reflejar la amplitud de מַלְאַךְ.
  - «Encinta» y «darás a luz» mantienen un registro bíblico claro sin caer en arcaísmo innecesario.
  - La fórmula «llamarás su nombre» conserva la estructura nominal hebrea.
  - «Aflicción» preserva la amplitud semántica de עָנְיֵךְ.
