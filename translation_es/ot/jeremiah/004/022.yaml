- from: Porque mi pueblo es necio; no me conoce. Hijos necios[a] son ellos, y no tienen entendimiento. Sabios son para el mal, pero para hacer el bien no saben.
  to: Porque mi pueblo es necio; no me conocen. Son hijos[a] necios, y no tienen entendimiento. Son sabios para hacer el mal, pero no saben hacer el bien.
  rationale: Se corrige la concordancia verbal a plural ('no me conocen'), se suaviza y aclara la sintaxis, y se mejora la expresión de la ironía práctica en 'para hacer el mal'. Se conserva la nota sobre el valor colectivo de בָּנִים, aunque el texto principal sigue siendo bastante literal y legible en español.
