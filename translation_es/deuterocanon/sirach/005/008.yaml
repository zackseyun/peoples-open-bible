translation:
  language: es
  text: 'Y dices[a]: «Sus misericordias son muchas; pues por la multitud de mis iniquidades él perdonará».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: «No te apoyes en riquezas injustas, porque nada te aprovecharán en el día de la visita». El hebreo conservado, en cambio, ofrece una advertencia contra presumir de la misericordia de Dios.'
    reason: textual_variant
lexical_decisions:
- source_word: וְאָמַרְתָּ
  english_pob_choice: And you say
  chosen_spanish: Y dices
  alternatives_spanish:
  - Y dirás
  - Y has dicho
  lexicon: HALOT
  rationale: El hebreo funciona aquí como una fórmula admonitoria dirigida al oyente; en español, el presente «dices» conserva ese valor directo y retórico mejor que un pasado literal. «Dirás» también es posible, pero suena más predictivo que exhortativo.
- source_word: רַחֲמָיו
  english_pob_choice: His mercies
  chosen_spanish: Sus misericordias
  alternatives_spanish:
  - Su misericordia
  - Sus compasiones
  lexicon: HALOT
  rationale: Se mantiene el plural hebreo con «misericordias», que refleja mejor la forma y el énfasis en actos abundantes de compasión. El singular «misericordia» suavizaría esa pluralidad.
- source_word: רַבִּים
  english_pob_choice: are many
  chosen_spanish: son muchas
  alternatives_spanish:
  - son abundantes
  - son grandes
  lexicon: HALOT
  rationale: «Muchas» reproduce de manera directa el valor de רַבִּים y se ajusta naturalmente al plural «misericordias». «Abundantes» sería más interpretativo.
- source_word: לְרֹב
  english_pob_choice: for the multitude of
  chosen_spanish: por la multitud de
  alternatives_spanish:
  - por la abundancia de
  - a causa de la multitud de
  lexicon: HALOT
  rationale: «Por la multitud de» conserva la relación causal y el matiz cuantitativo del hebreo sin añadir explicación ajena. «A causa de» es posible, pero menos cercano a la estructura del original.
- source_word: עֲוֹנוֹתַי
  english_pob_choice: my iniquities
  chosen_spanish: mis iniquidades
  alternatives_spanish:
  - mis pecados
  - mi culpa
  lexicon: HALOT
  rationale: «Iniquidades» mantiene el peso moral y la pluralidad del sustantivo hebreo, y corresponde a la decisión inglesa documentada. «Pecados» es más general; «culpa» cambia el matiz.
- source_word: יִסְלָח
  english_pob_choice: he will forgive
  chosen_spanish: él perdonará
  alternatives_spanish:
  - perdonará
  - él perdone
  lexicon: HALOT
  rationale: 'El futuro «perdonará» preserva la fuerza modal del hebreo: una expectativa presuntuosa sobre el perdón divino. Se explicita «él» para mantener la referencia personal del sujeto.'
theological_decisions:
- issue: Relación entre el hebreo sobreviviente y el paralelo griego, que presenta una admonición muy distinta
  english_pob_reading: Translate the extant Hebrew directly as the main text, while preserving the Greek as a textual-variant footnote
  chosen_spanish_reading: Traducir el hebreo conservado como texto principal y señalar el griego como variante textual significativa
  alternative_spanish_readings:
  - 'Seguir el griego: «No te apoyes en riquezas injustas, porque de nada te aprovecharán en el día de la visita.»'
  - Intentar armonizar ambos testimonios en una sola redacción
  rationale: La evidencia hebrea es la base principal cuando el hebreo está disponible. Aquí el griego no es una simple diferencia de estilo, sino un dicho distinto; por eso debe conservarse como variante en nota, no fusionarse con el texto principal.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives; use Greek parallel as actual input while keeping Hebrew primacy'
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión más reciente del inglés POB, que cambió «And you said» por «And you say» para reflejar mejor el perfecto hebreo en un contexto admonitorio. Por eso el español usa «Y dices» y no un pasado narrativo. También se conservó la decisión documentada de dar primacía al hebreo y relegar el paralelo griego a nota textual.
  spanish_consistency_notes:
  - Se mantuvo la terminología POB de «Yahvé»/«Mesías» cuando corresponda en el proyecto; aquí no aparece ninguna de esas formas.
  - Se preservó la pluralidad de «misericordias» y «iniquidades» para respetar el valor morfológico del hebreo.
  - «Iniquidades» y «perdonará» conservan el tono moral y presuntuoso del dicho sin suavizarlo a una formulación devocional general.
