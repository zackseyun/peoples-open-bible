translation:
  language: es
  text: Y estos fueron los que subieron de Tel-melah[a], Tel-harsha, Querub, Addón y Imer, pero no pudieron declarar la casa de sus padres[b] ni su descendencia, si eran de Israel[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Esdras 2:59 lee «Addan» donde Nehemías aquí tiene «Addon».
    reason: textual_variant
  - marker: b
    text: O «su casa ancestral»; el hebreo dice literalmente «la casa de sus padres».
    reason: lexical_alternative
  - marker: c
    text: O «si eran israelitas».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֵלֶּה
  english_pob_choice: And these were
  chosen_spanish: Y estos fueron
  alternatives_spanish:
  - Y estos eran
  - Y estos fueron los
  lexicon: HALOT
  rationale: La fórmula introduce un subgrupo dentro del registro genealógico. En español, «Y estos fueron» conserva el valor de introducción retrospectiva y suena natural en una lista histórica.
- source_word: הָעוֹלִים
  english_pob_choice: the ones who came up
  chosen_spanish: los que subieron
  alternatives_spanish:
  - los que fueron subiendo
  - los retornados
  lexicon: HALOT
  rationale: עלה en este contexto posexílico expresa ascenso desde el exilio; «subieron» preserva la imagen sin convertirla en una paráfrasis interpretativa como «retornados».
- source_word: מִתֵּל מֶלַח תֵּל חַרְשָׁא כְּרוּב אַדּוֹן וְאִמֵּר
  english_pob_choice: from Tel-melah, Tel-harsha, Kerub, Addon, and Immer
  chosen_spanish: de Tel-melah, Tel-harsha, Querub, Addón y Imer
  alternatives_spanish:
  - de Tel Melah, Tel Harsha, Cherub, Addan y Immer
  - de Tel-melah, Tel-harsha, Querub, Addan y Immer
  lexicon: HALOT
  rationale: Son nombres propios de lugar o clan y se transliteran. Se conserva la forma hebrea de Nehemías con «Addón», siguiendo el texto fuente; «Querub» e «Imer» reflejan la vocalización española más natural de los nombres.
- source_word: וְלֹא יָכְלוּ
  english_pob_choice: but they were not able
  chosen_spanish: pero no pudieron
  alternatives_spanish:
  - y no pudieron
  - pero no eran capaces
  lexicon: HALOT
  rationale: La cláusula expresa incapacidad efectiva. «Pero» reproduce el contraste del contexto y «no pudieron» es una equivalencia natural y precisa.
- source_word: לְהַגִּיד
  english_pob_choice: to declare
  chosen_spanish: declarar
  alternatives_spanish:
  - decir
  - mostrar
  - probar
  lexicon: HALOT
  rationale: נגד en hifil significa hacer saber o declarar. «Declarar» mantiene el tono legal/genealógico del pasaje y evita el matiz más interpretativo de «probar».
- source_word: בֵּית אֲבוֹתָם
  english_pob_choice: their fathers’ houses
  chosen_spanish: la casa de sus padres
  alternatives_spanish:
  - sus casas paternas
  - su casa ancestral
  - la casa paterna de ellos
  lexicon: HALOT
  rationale: Se conserva la expresión idiomática genealógica con un orden natural en español. «Casa de sus padres» es transparente y fiel al hebreo, aunque menos idiomática que una paráfrasis como «casa ancestral».
- source_word: וְזַרְעָם
  english_pob_choice: or their offspring
  chosen_spanish: ni su descendencia
  alternatives_spanish:
  - ni su linaje
  - ni su simiente
  - ni sus descendientes
  lexicon: HALOT
  rationale: זֶרַע puede referirse a descendencia o linaje. Aquí «descendencia» conserva el sentido genealógico y la coordinación negativa con «ni» refleja bien la serie del hebreo.
- source_word: אִם מִיִּשְׂרָאֵל הֵם
  english_pob_choice: whether they were from Israel
  chosen_spanish: si eran de Israel
  alternatives_spanish:
  - si pertenecían a Israel
  - si eran israelitas
  - si eran del Israel
  lexicon: HALOT
  rationale: La frase expresa incertidumbre acerca de la pertenencia genealógica. «Si eran de Israel» es breve, fiel y mantiene abierta la duda sin cerrar el sentido con una identificación más fuerte.
translation_notes:
  revision_awareness: La versión inglesa auditada eliminó el colon final y dejó la oración como una afirmación completa. El español sigue esa revisión y evita una puntuación conclusiva adicional; además, mantiene la tensión genealógica del hebreo entre identidad familiar y pertenencia a Israel sin resolverla interpretativamente.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto lo requiere; aquí no aparece el nombre divino.
  - Se usan nombres propios transliterados de forma consistente y no se sustituyen por equivalentes eclesiásticos tradicionales.
  - Se conserva la construcción genealógica «casa de sus padres» en lugar de un equivalente más interpretativo.
  - La secuencia negativa se ha respetado con «pero no pudieron... ni...», siguiendo el paralelismo del hebreo.
