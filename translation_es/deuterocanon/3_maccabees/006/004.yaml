    text: Or 'multiplying acts of insolence' for the difficult phrase 'increasing in reckless acts' (πληθύνoντα θράμασιν).
    reason: lexical_alternative
  - marker: b
    text: Literally 'you destroyed [them] sea-swallowed,' an image of Pharaoh and his army being engulfed by the sea.
    reason: lexical_alternative
  - marker: c
    text: Literally 'you shone forth the light of mercy' upon Israel.
    reason: lexical_alternative
