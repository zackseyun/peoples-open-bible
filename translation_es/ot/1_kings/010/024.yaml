revisions:
- from: Y toda la tierra buscaba el rostro de Salomón[a], para oír su sabiduría que Dios había puesto en su corazón.
  to: Y toda la tierra buscaba la presencia de Salomón[a], para oír su sabiduría que Dios había puesto en su corazón.
  rationale: Se cambia «el rostro de Salomón» por «la presencia de Salomón» para reflejar el sentido idiomático de אֶת פְּנֵי con español natural y fiel, manteniendo la imagen literal en nota al pie. El resto del versículo está bien alineado con el hebreo y con la auditoría POB.
