translation:
  language: es
  text: ¿No examina el oído las palabras,[a] como el paladar prueba la comida?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «¿No examina el oído el habla, como el paladar prueba la comida?»; también puede traducirse «discierne».
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲלֹא
  english_pob_choice: Does not
  chosen_spanish: ¿No... ?
  alternatives_spanish:
  - ¿Acaso no... ?
  - ¿No es cierto que... ?
  lexicon: HALOT
  rationale: La pregunta retórica hebrea espera asentimiento; en español, «¿No... ?» comunica de forma natural esa fuerza interrogativa sin añadir matiz innecesario.
- source_word: אֹזֶן
  english_pob_choice: ear
  chosen_spanish: oído
  alternatives_spanish:
  - oreja
  - oído
  lexicon: HALOT
  rationale: El hebreo usa el órgano literal, pero aquí funciona como facultad de discernimiento auditivo. «Oído» suena natural en español y preserva la imagen funcional del órgano.
- source_word: מִלִּין
  english_pob_choice: words
  chosen_spanish: palabras
  alternatives_spanish:
  - palabras
  - discursos
  - dichos
  lexicon: HALOT
  rationale: El plural hebreo admite «palabras» como correspondencia directa y clara; mantiene el paralelismo con «comida» y el acto de evaluar o probar.
- source_word: תִּבְחָן
  english_pob_choice: test
  chosen_spanish: examina
  alternatives_spanish:
  - prueba
  - discierne
  - examina
  lexicon: HALOT
  rationale: El verbo puede significar probar o examinar. En español, «examina» expresa bien la acción de evaluar cuidadosamente y conserva la relación con la segunda cola del verso.
- source_word: חֵךְ
  english_pob_choice: palate
  chosen_spanish: paladar
  alternatives_spanish:
  - paladar
  - boca
  - gusto
  lexicon: HALOT
  rationale: «Paladar» es el equivalente más preciso de la imagen sensorial hebrea y preserva el paralelo entre audición y degustación.
- source_word: אֹכֶל
  english_pob_choice: food
  chosen_spanish: comida
  alternatives_spanish:
  - comida
  - alimento
  - lo que se come
  lexicon: HALOT
  rationale: «Comida» es una traducción directa y natural en español. Conserva la concreción del sustantivo hebreo sin sobrecargar el verso.
- source_word: יִטְעַם
  english_pob_choice: tastes
  chosen_spanish: prueba
  alternatives_spanish:
  - prueba
  - saborea
  - degusta
  lexicon: HALOT
  rationale: Aunque el verbo es literalmente «gustar/probar», en español «prueba» mantiene el valor sensorial y el paralelo semántico con «examina» mejor que una forma más marcada como «saborea».
- source_word: לוֹ
  english_pob_choice: for itself
  chosen_spanish: —
  alternatives_spanish:
  - para sí
  - para él
  lexicon: HALOT
  rationale: El sufijo pronominal no se refleja de manera idiomática en la traducción final; el cierre hebreo funciona de forma natural en español sin un añadido reflexivo explícito. Esto sigue la revisión inglesa que descartó «for itself» por no quedar representado claramente en la fuente.
theological_decisions:
- issue: Paralelismo sapiencial sobre discernimiento humano
  english_pob_reading: Does not the ear test words, as the palate tastes food?
  chosen_spanish_reading: ¿No examina el oído las palabras, y el paladar prueba la comida?
  alternative_spanish_readings:
  - ¿No discierne el oído las palabras, y el paladar saborea la comida?
  - ¿Acaso el oído no prueba las palabras, como el paladar la comida?
  rationale: El versículo presenta una comparación sapiencial entre dos facultades de percepción. «Examina» y «prueba» conservan el carácter de evaluación real sin introducir una doctrina ajena al texto; la imagen sigue siendo la de discernir lo que se oye del mismo modo que se distingue el sabor de la comida.
  doctrine_reference: Sabiduría bíblica / discernimiento humano; no implica una afirmación doctrinal específica.
translation_notes:
  revision_awareness: 'La versión inglesa revisada eliminó «for itself» por no estar bien representado en la fuente y sonar poco natural. La traducción española sigue ese mismo criterio: no añade un equivalente reflexivo explícito y conserva únicamente el paralelismo auditivo-gustativo del hebreo.'
  spanish_consistency_notes:
  - Se mantiene un español bíblico claro y contemporáneo, sin recurrir a formulaciones eclesiásticas arcaizantes.
  - 'La imagen corporal se conserva: oído / paladar; examina / prueba. Esto ayuda a respetar el paralelismo hebreo.'
  - No se introduce «SEÑOR», «Cristo» ni terminología teológica ajena al verso, porque el texto no la contiene.
  - La puntuación reproduce la estructura interrogativa y comparativa del original con una coma antes de la segunda cola del paralelismo.
