translation:
  language: es
  text: 'Y de los hijos de Phaisur[a]: Elionaís, Asseías, Ismaélos, Natanaélos, Okaelédos[b][c] y Sálthas.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Griego Φαισούρ; el paralelo hebreo aproximado corresponde a Pashhur.
    reason: alternative_reading
  - marker: b
    text: El nombre Okaelédos refleja el testimonio griego aquí; la tradición hebrea paralela aproximada puede apuntar a otro nombre subyacente, a veces relacionado con Jozabad.
    reason: textual_variant
  - marker: c
    text: Varios nombres de este versículo aparecen en formas griegas que no coinciden exactamente con el paralelo hebreo aproximado; se conservan las formas griegas porque 1 Esdras se traduce aquí desde el testimonio de la Septuaginta.
    reason: cultural_note
lexical_decisions:
- source_word: ἐκ τῶν υἱῶν
  english_pob_choice: from the sons of
  chosen_spanish: de los hijos de
  alternatives_spanish:
  - entre los hijos de
  - de entre los hijos de
  lexicon: LSJ
  rationale: La fórmula griega introduce a un grupo familiar del cual provienen los nombres listados. En español, 'de los hijos de' reproduce con naturalidad la relación genealógica y la estructura de lista sin añadir matices no presentes en el texto.
- source_word: Φαισούρ
  english_pob_choice: Phaisour
  chosen_spanish: Phaisur
  alternatives_spanish:
  - Pashhur
  - Faisur
  lexicon: LSJ
  rationale: Se conserva la forma griega del nombre propio, siguiendo el anclaje principal en la Septuaginta. La posible correspondencia hebrea con Pashhur se reserva para nota, no para el texto principal.
- source_word: Ἐλιωναίς
  english_pob_choice: Elionais
  chosen_spanish: Elionaís
  alternatives_spanish:
  - Elionáis
  - Elionaís
  lexicon: LSJ
  rationale: Transliteración directa del nombre griego, ajustada a una forma legible en español sin intentar armonizarla con otra tradición nominal no explicitada en el versículo.
- source_word: Ἀσσείας
  english_pob_choice: Asseias
  chosen_spanish: Asseías
  alternatives_spanish:
  - Aseías
  - Asseias
  lexicon: LSJ
  rationale: Se mantiene la forma griega transliterada. La acentuación se adapta al español para facilitar la lectura pública sin alterar la identificación del nombre.
- source_word: Ἰσμαήλος
  english_pob_choice: Ismaēlos
  chosen_spanish: Ismaélos
  alternatives_spanish:
  - Ismael
  - Ismaelos
  lexicon: LSJ
  rationale: Se conserva la forma griega del nombre, en vez de normalizarla al más familiar 'Ismael', porque el texto base de 1 Esdras aquí sigue el testimonio griego y el proyecto preserva esa forma en nombres propios.
- source_word: Ναθανάηλος
  english_pob_choice: Nathanaēlos
  chosen_spanish: Natanaélos
  alternatives_spanish:
  - Natanael
  - Natanel
  lexicon: LSJ
  rationale: La forma española sigue de cerca el griego, preservando el final -os y la base fonética del nombre. No se sustituye por una forma hebraizada porque la evidencia primaria es la griega.
- source_word: Ὠκαιληδός
  english_pob_choice: Okaēlēdos
  chosen_spanish: Okaēlédos
  alternatives_spanish:
  - Ocailédos
  - Jozabad
  lexicon: LSJ
  rationale: Este nombre es textualmente difícil. Se mantiene una transliteración del griego de Swete para no importar una identificación semítica no segura. La alternativa hebrea aproximada queda documentada en nota.
- source_word: Σάλθας
  english_pob_choice: Salthas
  chosen_spanish: Sálthas
  alternatives_spanish:
  - Salthas
  - Salthas
  lexicon: LSJ
  rationale: Se translitera el nombre griego y se adapta mínimamente la acentuación al español. No se reemplaza por un equivalente hebreo, porque el texto principal sigue la forma griega transmitida.
translation_notes:
  revision_awareness: 'El borrador sigue la revisión más reciente sin cambios sustantivos: la evidencia principal es alta y el pasaje consiste en una lista nominal. Se mantuvo la forma griega de los nombres, con notas para los paralelos hebreos aproximados donde el audit trail lo documenta.'
  spanish_consistency_notes:
  - Se usa 'hijos de' para mantener la fórmula genealógica del griego.
  - Se preservan los nombres propios en transliteración griega en vez de normalizarlos a formas bíblicas más conocidas cuando ello borraría la huella del texto fuente.
  - La puntuación con dos puntos después del grupo introductorio refleja el paso a la enumeración de nombres.
  - Las notas [a], [b] y [c] se colocan solo en los puntos donde el audit trail documenta variantes o paralelos aproximados.
