source:
  edition: WLC
  text: וְ/אֵ֛לֶּה דִּבְרֵ֥י דָוִ֖ד הָ/אַֽחֲרֹנִ֑ים נְאֻ֧ם דָּוִ֣ד בֶּן יִשַׁ֗י וּ/נְאֻ֤ם הַ/גֶּ֨בֶר֙ הֻ֣קַם עָ֔ל מְשִׁ֨יחַ֙ אֱלֹהֵ֣י יַֽעֲקֹ֔ב וּ/נְעִ֖ים זְמִר֥וֹת יִשְׂרָאֵֽל־׃
base_translation:
  language: en
  yaml_path: translation/ot/2_samuel/023/001.yaml
  text: 'Now these are the last words of David: An oracle of David son of Jesse[a], an oracle of the man raised on high, the anointed of the God of Jacob[c][b], and the sweet singer of Israel.'
  footnotes:
  - marker: a
    text: Or "utterance" or "declaration" for "oracle"; the Hebrew term is a formal speech marker often used in solemn or prophetic pronouncements.
    reason: lexical_alternative
  - marker: b
    text: Or "the Messiah of the God of Jacob"; Hebrew "the anointed of the God of Jacob." Here the phrase refers directly to David, though it carries royal-messianic resonance.
    reason: alternative_reading
  - marker: c
    text: Or "the pleasant singer of Israel's songs."
    reason: lexical_alternative
