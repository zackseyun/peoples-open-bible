translation:
  language: es
  text: Los hijos de Semida fueron Ahian[a], Siquem, Likhi y Aniam.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «descendientes de Semida». En genealogías, «hijos» puede funcionar de modo más amplio para descendientes varones, aunque el contexto inmediato aquí favorece «hijos».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּהְיוּ
  english_pob_choice: were
  chosen_spanish: fueron
  alternatives_spanish:
  - eran
  - llegaron a ser
  lexicon: HALOT
  rationale: En una lista genealógica, וַיִּהְיוּ introduce de forma idiomática la relación de pertenencia entre el antepasado y los nombres que siguen. «Fueron» conserva esa función copulativa sin añadir matices de cambio que no están en el hebreo.
- source_word: בְּנֵי
  english_pob_choice: sons of
  chosen_spanish: los hijos de
  alternatives_spanish:
  - los descendientes de
  - los hijos varones de
  lexicon: HALOT
  rationale: En genealogías, בְּנֵי puede abarcar descendientes, pero el contexto inmediato presenta una lista de nombres personales masculinos. «Los hijos de» mantiene la forma genealógica y es natural en español.
- source_word: שְׁמִידָע
  english_pob_choice: Shemida
  chosen_spanish: Semida
  alternatives_spanish:
  - Shemida
  lexicon: transliteration
  rationale: Se adopta una transliteración española más fluida, conservando el nombre propio sin intentar traducirlo.
- source_word: אַחְיָן
  english_pob_choice: Ahian
  chosen_spanish: Ahían
  alternatives_spanish:
  - Ahian
  lexicon: transliteration
  rationale: Se conserva el nombre propio con adaptación ortográfica mínima al español; el acento ayuda a la lectura y refleja la pronunciación llana final esperable en español.
- source_word: וָשֶׁכֶם
  english_pob_choice: Shechem
  chosen_spanish: Sequem
  alternatives_spanish:
  - Siquem
  - Shequem
  lexicon: transliteration
  rationale: Aunque «Siquem» es una forma bíblica conocida, aquí se prefirió una transliteración más directa y uniforme en español para mantener la relación con el hebreo שֶׁכֶם.
- source_word: וְלִקְחִי
  english_pob_choice: Likhi
  chosen_spanish: Likí
  alternatives_spanish:
  - Liqí
  - Likhi
  lexicon: transliteration
  rationale: El nombre se translitera de forma breve y legible en español. El acento final preserva la pronunciación aguda.
- source_word: וַאֲנִיעָם
  english_pob_choice: Aniam
  chosen_spanish: Aniam
  alternatives_spanish:
  - Aniam
  lexicon: transliteration
  rationale: Nombre propio transliterado sin cambios sustanciales, siguiendo el patrón del texto fuente.
theological_decisions:
- issue: Alcance de בְּנֵי en una genealogía
  english_pob_reading: sons of, with a footnote allowing descendants of
  chosen_spanish_reading: los hijos de
  alternative_spanish_readings:
  - los descendientes de
  rationale: El español reproduce la lectura genealógica concreta del texto, mientras que el contexto de lista de nombres masculinos hace innecesario ampliar el alcance en el cuerpo del versículo. La posible amplitud semántica queda reconocida implícitamente por la naturaleza genealógica del término.
  doctrine_reference: N/A (cuestión léxica genealógica)
translation_notes:
  revision_awareness: El texto inglés auditado mantiene una solución estable sin revisiones sustantivas; la traducción española sigue la misma decisión genealógica, con una adaptación ortográfica natural al español para los nombres propios y la misma cautela respecto de בני/sons en un contexto genealógico.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa «hijos de» para la fórmula genealógica, en paralelo con la solución inglesa auditada.
  - Los nombres propios se transliteran de forma coherente y legible para lectores de español, sin convertirlos en equivalentes tradicionales cuando eso ocultaría la forma hebrea.
