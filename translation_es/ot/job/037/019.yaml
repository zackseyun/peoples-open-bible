translation:
  language: es
  text: Enséñanos qué debemos decirle; no podemos ordenar nuestras palabras[a] a causa de las tinieblas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no podemos disponer nuestras palabras» o «no podemos poner en orden nuestro caso».'
    reason: lexical_alternative
  - marker: b
    text: «Tinieblas» puede referirse en sentido figurado a la ignorancia o incapacidad humana, aunque también es posible un sentido más literal.
    reason: lexical_alternative
lexical_decisions:
- source_word: ה֭וֹדִיעֵנוּ
  english_pob_choice: Teach us
  chosen_spanish: Enséñanos
  alternatives_spanish:
  - Haznos saber
  - Infórmanos
  lexicon: HALOT
  rationale: El causativo de ידע expresa ‘hacer conocer’ o ‘causar a saber’. En español, ‘enséñanos’ comunica naturalmente la petición de instrucción sin perder el valor causativo del hebreo.
- source_word: מַה נֹּאמַר לוֹ
  english_pob_choice: what we should say to him
  chosen_spanish: qué debemos decirle
  alternatives_spanish:
  - qué podemos decirle
  - qué diremos a él
  lexicon: HALOT
  rationale: La pregunta dependiente del imperativo pide el contenido de lo que han de decir. ‘Debemos’ conserva la fuerza deliberativa/obligativa idiomática en español.
- source_word: לֹא נַעֲרֹךְ
  english_pob_choice: we cannot arrange our words
  chosen_spanish: no podemos ordenar nuestras palabras
  alternatives_spanish:
  - no podemos disponer nuestras palabras
  - no podemos poner en orden nuestras palabras
  - no podemos presentar nuestro caso
  lexicon: HALOT
  rationale: ערך significa ‘ordenar, disponer en orden’. Aquí el contexto favorece una formulación sobre el discurso, no una expansión judicial como ‘presentar nuestro caso’. ‘Ordenar nuestras palabras’ sigue de cerca el verbo y su fuerza retórica.
- source_word: מִפְּנֵי חֹשֶׁךְ
  english_pob_choice: because of darkness
  chosen_spanish: a causa de las tinieblas
  alternatives_spanish:
  - por causa de la oscuridad
  - debido a las tinieblas
  - por la oscuridad
  lexicon: HALOT
  rationale: מִפְּנֵי suele expresar causa u ocasión. ‘Tinieblas’ mantiene el registro poético y la ambigüedad entre oscuridad literal e ignorancia humana que el hebreo deja abierta.
theological_decisions:
- issue: Sentido de ‘tinieblas’ al final del versículo
  english_pob_reading: Retain the broad term 'darkness' without specifying whether it is intellectual confusion, human frailty, or literal obscurity.
  chosen_spanish_reading: Mantener ‘tinieblas’ sin concretar si alude a oscuridad literal, confusión humana o incapacidad para responder ante Dios.
  alternative_spanish_readings:
  - a causa de la ignorancia
  - a causa de la oscuridad
  - porque estamos confundidos
  rationale: La poesía del verso admite una imagen compacta y polisémica. ‘Tinieblas’ preserva la tensión entre lo literal y lo figurado sin resolverla prematuramente.
  doctrine_reference: Job 37:19; cf. Job 28:3; Job 38:2
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de ‘present our case’ a ‘arrange our words’ para evitar expansión interpretativa y ajustarse mejor a ערך; el español sigue ese ajuste con ‘ordenar nuestras palabras’. También se retuvo la ambigüedad de ‘darkness’ mediante ‘tinieblas’.
  spanish_consistency_notes:
  - Se usa ‘Dios’/‘Yahvé’ según el pasaje lo requiera; aquí no aparece el nombre divino.
  - Se evitó ‘Cristo’ por no corresponder al hebreo.
  - ‘Tinieblas’ se escogió por su valor poético y por preservar la ambigüedad del original.
  - El verso mantiene una sintaxis breve y directa, acorde con el hebreo poético.
