translation:
  language: es
  text: Y cuando habían entrado en combate[a], sucedió que cayeron[b] unos pocos de los judíos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más formalmente, “cuando se habían puesto en línea de batalla”. El participio griego es militar y puede destacar tanto la formación de combate como el hecho de trabar batalla.
    reason: lexical_alternative
  - marker: b
    text: “Cayeron” en un contexto de batalla probablemente implica muerte, pero el griego no dice explícitamente “fueron muertos”.
    reason: lexical_alternative
lexical_decisions:
- source_word: παραταξαμένους
  english_pob_choice: when they had joined battle
  chosen_spanish: cuando se habían dispuesto en orden de batalla
  alternatives_spanish:
  - cuando habían entrado en combate
  - cuando se habían alineado para la batalla
  lexicon: LSJ
  rationale: 'El participio aoristo medio tiene sentido militar: ordenar las tropas para el combate o entrar en formación de guerra. En español, “disponerse en orden de batalla” conserva esa idea de preparación/formación militar sin sonar forzado. Mantiene el valor de estado previo al evento principal, como en la lectura inglesa auditada.'
- source_word: συνέβη
  english_pob_choice: it happened
  chosen_spanish: sucedió
  alternatives_spanish:
  - ocurrió
  - pasó
  lexicon: LSJ
  rationale: El verbo impersonal marca el desarrollo narrativo de un hecho. “Sucedió” reproduce bien el tono histórico sin añadir interpretación.
- source_word: πεσεῖν
  english_pob_choice: fell
  chosen_spanish: cayeron
  alternatives_spanish:
  - murieron
  - fueron muertos
  lexicon: LSJ
  rationale: En contexto de batalla, πίπτω puede implicar morir, pero el griego no lo dice explícitamente. “Cayeron” preserva la ambigüedad del original, tal como lo hace la traducción inglesa auditada.
- source_word: ὀλίγους
  english_pob_choice: a few
  chosen_spanish: unos pocos
  alternatives_spanish:
  - pocos
  - un pequeño número de
  lexicon: LSJ
  rationale: La forma acusativa sustantivada con el genitivo pide un cuantificador natural en español. “Unos pocos” suena idiomático y conserva la pequeñez del número sin exagerar.
- source_word: τῶν Ἰουδαίων
  english_pob_choice: of the Jews
  chosen_spanish: de los judíos
  alternatives_spanish:
  - de los judeanos
  - entre los judíos
  lexicon: LSJ
  rationale: Aquí el sentido convencional del etnónimo es “judíos”, como en la línea inglesa de referencia. “Judeanos” sería posible en ciertos contextos, pero no es necesario aquí y podría oscurecer la recepción del texto.
translation_notes:
  revision_awareness: El texto griego coincide ampliamente con la traducción inglesa auditada; se conserva la estructura narrativa impersonal y la ambigüedad de πεσεῖν. No se requieren revisiones textuales ni decisiones doctrinales adicionales.
  spanish_consistency_notes:
  - Se mantuvo “judíos” en plural, en línea con el audit trail inglés y el uso estándar de 2 Macabeos.
  - Se evitó “Cristo”, “SEÑOR” u այլ terminología no pertinente al versículo.
  - 'La puntuación sigue el flujo narrativo del griego: participio temporal + verbo impersonal + complemento cuantitativo.'
