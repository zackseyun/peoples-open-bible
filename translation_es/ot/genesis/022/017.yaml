translation:
  language: es
  text: que ciertamente te bendeciré[a], y ciertamente multiplicaré tu descendencia[b] como las estrellas de los cielos y como la arena que está a la orilla del mar; y tu descendencia poseerá la puerta de los enemigos de él[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: ''te bendeciré de cierto''. La duplicación verbal intensifica la promesa.'
    reason: lexical_alternative
  - marker: b
    text: Hebreo 'tu semilla/descendencia'; se traduce 'descendencia' para conservar el singular colectivo.
    reason: lexical_alternative
  - marker: c
    text: O 'la puerta de sus enemigos'. El hebreo mantiene 'descendencia/semilla' en singular gramatical y dice literalmente 'sus enemigos' con referencia singular corporativa.
    reason: alternative_reading
lexical_decisions:
- source_word: בָרֵךְ אֲבָרֶכְךָ
  english_pob_choice: I will surely bless you
  chosen_spanish: ciertamente te bendeciré
  alternatives_spanish:
  - te bendeciré ciertamente
  - sin duda te bendeciré
  - te bendeciré con toda seguridad
  lexicon: HALOT
  rationale: El infinitivo absoluto con verbo finito expresa énfasis. En español, 'ciertamente' transmite bien esa intensificación sin forzar una repetición mecánica.
- source_word: וְהַרְבָּה אַרְבֶּה
  english_pob_choice: and I will surely multiply
  chosen_spanish: y ciertamente multiplicaré
  alternatives_spanish:
  - y multiplicaré abundantemente
  - y multiplicaré mucho
  - y multiplicaré con certeza
  lexicon: HALOT
  rationale: Se conserva el paralelismo enfático con la cláusula anterior. 'Multiplicar' es la raíz más directa; 'ciertamente' mantiene la fuerza del hebreo.
- source_word: זַרְעֲךָ
  english_pob_choice: your offspring
  chosen_spanish: tu descendencia
  alternatives_spanish:
  - tu simiente
  - tus descendientes
  - tu prole
  lexicon: HALOT
  rationale: '''Descendencia'' comunica el sentido colectivo singular del sustantivo hebreo mejor que una traducción literal como ''simiente'', y es más natural en español bíblico contemporáneo.'
- source_word: כְּכוֹכְבֵי הַשָּׁמַיִם
  english_pob_choice: like the stars of the heavens
  chosen_spanish: como las estrellas de los cielos
  alternatives_spanish:
  - como las estrellas del cielo
  - como las estrellas de los cielos
  lexicon: HALOT
  rationale: Se preserva el plural hebreo 'cielos' para no aplanar la imagen. 'De los cielos' sigue siendo natural en español solemne.
- source_word: וְכַחוֹל אֲשֶׁר עַל שְׂפַת הַיָּם
  english_pob_choice: and like the sand that is on the seashore
  chosen_spanish: y como la arena que está en la orilla del mar
  alternatives_spanish:
  - y como la arena de la orilla del mar
  - y como la arena que está sobre la orilla del mar
  - y como la arena junto al mar
  lexicon: HALOT
  rationale: '''Orilla del mar'' expresa con naturalidad שְׂפַת הַיָּם (''borde/orilla del mar''). Se conserva la cláusula relativa ''que está'' para reflejar אֲשֶׁר sin sonar forzado.'
- source_word: וְיִרַשׁ
  english_pob_choice: will possess
  chosen_spanish: poseerá
  alternatives_spanish:
  - tomará posesión de
  - heredará
  - ocupará
  lexicon: HALOT
  rationale: Aquí el sentido es posesión/control activo sobre la puerta enemiga; 'poseerá' mantiene el valor básico y el tono sobrio del texto.
- source_word: שַׁעַר
  english_pob_choice: the gate
  chosen_spanish: la puerta
  alternatives_spanish:
  - la puerta de la ciudad
  - la puerta
  - el portal
  lexicon: HALOT
  rationale: En español, 'puerta' comunica el elemento arquitectónico y el valor metonímico de autoridad sobre la ciudad/fortaleza. 'Puerta de sus enemigos' reproduce la imagen bíblica sin añadir explicación interpretativa.
- source_word: אֹיְבָיו
  english_pob_choice: his enemies
  chosen_spanish: sus enemigos
  alternatives_spanish:
  - sus enemigos
  - los enemigos de él
  lexicon: HALOT
  rationale: Se conserva el singular colectivo del hebreo mediante el posesivo singular implícito en el antecedente colectivo 'descendencia', que en español puede expresarse naturalmente como 'sus enemigos'.
theological_decisions:
- issue: Tensión entre singular colectivo y referencia a la descendencia
  english_pob_reading: 'Render as singular collective: ''your offspring ... his enemies'''
  chosen_spanish_reading: '''tu descendencia ... sus enemigos'''
  alternative_spanish_readings:
  - '''tus descendientes ... sus enemigos'''
  - '''tu simiente ... sus enemigos'''
  rationale: El hebreo mantiene זֶרַע en singular colectivo y el sufijo singular de 'sus enemigos'. 'Descendencia' preserva el singular colectivo sin obligar a pluralizar el referente ni a introducir una lectura mesiánica explícita no exigida por el versículo aislado.
  doctrine_reference: 'Translation philosophy #3, #5'
- issue: Fuerza enfática de las formas intensivas hebreas
  english_pob_reading: I will surely bless you / I will surely multiply
  chosen_spanish_reading: ciertamente te bendeciré / y ciertamente multiplicaré
  alternative_spanish_readings:
  - te bendeciré con certeza / multiplicaré con certeza
  - te bendeciré en verdad / multiplicaré en gran manera
  rationale: Las formas intensivas del hebreo se expresan con un adverbio de énfasis en español, sin perder fluidez ni añadir contenido doctrinal. Se evita debilitar la promesa a un mero futuro simple.
  doctrine_reference: HALOT; equivalencia óptima
- issue: Imagen de dominio en 'la puerta de sus enemigos'
  english_pob_reading: will possess the gate of his enemies
  chosen_spanish_reading: poseerá la puerta de sus enemigos
  alternative_spanish_readings:
  - heredará la puerta de sus enemigos
  - tomará posesión de la puerta de sus enemigos
  rationale: La 'puerta' en hebreo funciona como metonimia de control o dominio sobre la ciudad/fortaleza. 'Poseerá' conserva esa fuerza sin explicar de más ni convertir el verso en una glosa interpretativa.
  doctrine_reference: HALOT; uso idiomático bíblico
translation_notes:
  revision_awareness: La base inglesa revisada mantiene dos énfasis verbales ('surely bless' / 'surely multiply'), el símil con 'the stars of the heavens' y la imagen relativa 'the sand that is on the seashore'. La salida española refleja esos mismos rasgos con énfasis adverbial, plural 'cielos' y cláusula relativa 'que está en la orilla del mar', sin introducir glosas ajenas al texto.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el hebreo trae el nombre divino; este versículo no lo contiene explícitamente.
  - Se prefiere 'descendencia' como equivalente estable de זֶרַע en contexto colectivo.
  - Se conserva el orden de sentido del hebreo sin calco excesivo, pero con paralelismo retórico visible.
  - No se emplea 'Cristo' ni terminología eclesiástica no presente en el versículo.
