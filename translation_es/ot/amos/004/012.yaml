translation:
  language: es
  text: Por tanto, así te haré, Israel; porque te haré esto, prepárate para encontrarte[a] con tu Dios, Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “para salir al encuentro de tu Dios”. En contexto, el encuentro es una confrontación temible tras el juicio anunciado.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  lexicon: HALOT
  rationale: Expresa la conclusión inferida del contexto profético con naturalidad en español y conserva el valor consecutivo de la partícula.
- source_word: כֹּה
  english_pob_choice: thus
  chosen_spanish: así
  alternatives_spanish:
  - de esta manera
  - de este modo
  lexicon: HALOT
  rationale: Reproduce la fuerza deictica de la fórmula profética sin volverla pesada; 'así' mantiene la cercanía con el hebreo y con el ajuste auditado del inglés.
- source_word: אֶעֱשֶׂה לְךָ
  english_pob_choice: I will do to you
  chosen_spanish: haré contigo
  alternatives_spanish:
  - haré contra ti
  - haré para ti
  lexicon: HALOT
  rationale: '''Hacer'' es amplio en hebreo; en este contexto de juicio, ''contigo'' conserva la construcción directa sin añadir un objeto implícito más interpretativo que ''contra ti''.'
- source_word: יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: Israel
  lexicon: HALOT
  rationale: Nombre propio mantenido sin adaptación.
- source_word: עֵקֶב כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón/explicación del anuncio inmediato y es la equivalencia más natural en español bíblico contemporáneo.
- source_word: זֹאת
  english_pob_choice: this
  chosen_spanish: esto
  alternatives_spanish:
  - tal cosa
  - esto mismo
  lexicon: HALOT
  rationale: Demostrativo neutro que remite a la acción anunciada; 'esto' preserva la referencia directa sin expandir el sentido.
- source_word: אֶעֱשֶׂה לָךְ
  english_pob_choice: I will do this to you
  chosen_spanish: esto haré contigo
  alternatives_spanish:
  - haré esto contigo
  - esto haré para ti
  lexicon: HALOT
  rationale: Mantiene el paralelismo con la línea anterior y evita suavizar el valor adversativo del ל con una lectura benefactora.
- source_word: הִכּוֹן
  english_pob_choice: prepare
  chosen_spanish: prepárate
  alternatives_spanish:
  - dispónte
  - ponte listo
  lexicon: HALOT
  rationale: El imperativo/reflexivo es el equivalente más claro y digno en español para la idea de ponerse en estado de preparación.
- source_word: לִקְרַאת
  english_pob_choice: to meet
  chosen_spanish: para encontrarte con
  alternatives_spanish:
  - para salir al encuentro de
  - para recibir a
  lexicon: HALOT
  rationale: '''Encontrarte con'' comunica el acercamiento para un encuentro personal y conserva la posibilidad de confrontación marcada en el contexto.'
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu Dios y Señor
  - tu Dios
  lexicon: HALOT
  rationale: Respeta el sufijo singular de segunda persona y la forma directa del hebreo; 'Dios' es suficiente y evita introducir terminología no presente.
theological_decisions:
- issue: Tono del mandato final 'prepárate para encontrarte con tu Dios'
  english_pob_reading: An ominous summons to face God in judgment
  chosen_spanish_reading: Una advertencia solemne de confrontación divina en juicio
  alternative_spanish_readings:
  - Una invitación neutral a encontrarse con Dios
  - Un llamado a la adoración o al arrepentimiento
  rationale: El contexto inmediato de Amos acumula oráculos de juicio; por eso la formulación en español debe conservar el carácter ominoso de la exhortación, sin hacer explícito un modo de encuentro que el hebreo no especifica.
  doctrine_reference: Amós 4:12 en su contexto profético de juicio
- issue: Valor del ל en אֶעֱשֶׂה לְךָ / לָךְ
  english_pob_reading: I will do to you / I will do this to you
  chosen_spanish_reading: haré contigo / esto haré contigo
  alternative_spanish_readings:
  - haré contra ti
  - haré esto para ti
  rationale: La preposición permite en español varias opciones; aquí se preserva la ambigüedad formal del hebreo y, a la vez, el contexto de juicio guía la lectura sin convertirla en paráfrasis explícita.
  doctrine_reference: Gramática hebrea de preposición ל con verbo עשה en contexto judicial
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión auditada del inglés, que ajustó 'this is what' a 'thus' para acercarse más a כֹּה. En español se siguió ese mayor acercamiento con 'así', manteniendo al mismo tiempo una sintaxis natural y el paralelismo del versículo.
  spanish_consistency_notes:
  - Se conservó 'Dios' para אֱלֹהים, sin sustituirlo por 'SEÑOR' o 'Yahvé', porque aquí el hebreo usa אֱלֹהֶיךָ.
  - Se prefirió 'prepárate' frente a 'sé preparado' para un español moderno y digno, sin perder el valor imperativo del hebreo.
  - '''Contigo'' se usó en ambos miembros para reflejar la repetición del objeto pronominal y mantener la cohesión del paralelismo.'
  - No se añadió 'contra ti' al texto principal para no resolver de forma excesiva la dirección de ל; esa lectura queda implícita por el contexto de juicio y se explicita en las notas.
