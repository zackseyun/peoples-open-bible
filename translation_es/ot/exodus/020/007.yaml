translation:
  language: es
  text: No llevarás el nombre de Yahvé tu Dios falsamente[a], porque Yahvé no dejará sin castigo al que lleve su nombre falsamente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La expresión hebrea es más amplia que la fórmula tradicional «tomar el nombre ... en vano»: literalmente dice «llevar/cargar el nombre ... para vacío/false- dad». Puede abarcar juramentos falsos, invocación vacía o representación indebida del nombre divino.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תִשָּׂא / יִשָּׂא (נשא)
  english_pob_choice: bear / bears
  chosen_spanish: llevarás / lleve
  alternatives_spanish:
  - cargarás / cargue
  - portarás / porte
  - tomarás / tome
  lexicon: HALOT
  rationale: El hebreo נשא tiene el sentido concreto de 'levantar, cargar, llevar, portar'. En español, 'llevar' conserva mejor esa imagen física y la repetición entre la prohibición y la cláusula causal, sin reducirla demasiado a un acto verbal específico. 'Tomar' sería la fórmula tradicional, pero estrecha el campo semántico; 'cargar' y 'portar' suenan más marcados o menos naturales en este contexto legal.
- source_word: שֵׁם
  english_pob_choice: name
  chosen_spanish: nombre
  alternatives_spanish:
  - nombre
  - reputación
  - identidad revelada
  lexicon: HALOT
  rationale: '''Nombre'' es la equivalencia directa y mantiene el alcance bíblico de la expresión, que incluye no solo pronunciación, sino la persona, autoridad y reputación representadas por el nombre divino.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Tetragrámaton: ''Yahvé'' reproduce el nombre divino con una forma española clara y reconocible, evitando la sustitución por un título.'
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu Dios
  - tu Dios del pacto
  lexicon: HALOT
  rationale: La segunda persona singular se conserva con 'tu Dios', que transmite la relación personal y de pacto sin añadir explicaciones ajenas al texto.
- source_word: לַשָּׁוְא
  english_pob_choice: falsely
  chosen_spanish: falsamente
  alternatives_spanish:
  - en vano
  - para nada
  - con falsedad
  - vacíamente
  lexicon: HALOT
  rationale: Aunque el hebreo puede abarcar 'vacío', 'falsedad' e 'inutilidad', 'falsamente' comunica con naturalidad en español formal la idea de portar el nombre divino de manera falsa o sin verdad, y evita reducir el mandato a una sola connotación moderna de blasfemia o grosería. 'En vano' se conserva como posible lectura tradicional, pero hoy puede sonar demasiado limitada o idiomática.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - porque
  lexicon: HALOT
  rationale: '''Porque'' expresa bien la base o razón de la prohibición introducida por כִּי en español bíblico contemporáneo.'
- source_word: יְנַקֶּה (נקה)
  english_pob_choice: will not leave unpunished
  chosen_spanish: no dejará sin castigo
  alternatives_spanish:
  - no tendrá por inocente
  - no absolverá
  - no dejará impune
  lexicon: HALOT
  rationale: 'La forma piel de נקה en este contexto tiene fuerza judicial: no declarar inocente ni dejar libre de pena. ''No dejará sin castigo'' es claro, formal y transmite el peso judicial sin depender de una fórmula más técnica o menos natural.'
- source_word: אֲשֶׁר
  english_pob_choice: the one who
  chosen_spanish: al que
  alternatives_spanish:
  - al que
  - a quien
  - quien
  lexicon: HALOT
  rationale: '''Al que'' reproduce con naturalidad la construcción relativa aplicada a cualquier persona que incurra en la acción, manteniendo la singularidad y el tono jurídico.'
- source_word: שְׁמוֹ
  english_pob_choice: his name
  chosen_spanish: su nombre
  alternatives_spanish:
  - su nombre
  lexicon: HALOT
  rationale: El sufijo de tercera persona se conserva con 'su', refiriéndose a Yahvé. En español, la referencia queda clara en el contexto inmediato y evita redundancia excesiva.
theological_decisions:
- issue: Alcance de la prohibición sobre el nombre divino
  english_pob_reading: A broad prohibition against bearing Yahweh's name in a false, empty, or worthless way, not limited to casual speech alone.
  chosen_spanish_reading: Una prohibición amplia contra llevar el nombre de Yahvé de manera falsa, no limitada solo al habla casual o a una fórmula blasfema.
  alternative_spanish_readings:
  - Una prohibición más estrecha contra juramentos falsos
  - Una prohibición centrada solo en pronunciar el nombre irreverentemente
  rationale: La combinación de נשא con שֵׁם y לַשָּׁוְא apunta a un uso indebido más amplio que una simple grosería o una sola clase de juramento. Por eso el texto principal conserva 'llevar' y 'falsamente', dejando abierta la amplitud del mandato y evitando estrecharlo indebidamente.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Forma del nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  rationale: Se mantiene la decisión doctrinal y editorial del proyecto de transliterar el Tetragrámaton en vez de sustituirlo por un título como 'Señor'.
  doctrine_reference: 'Contested terms table: יְהוָה YHWH'
translation_notes:
  revision_awareness: 'La revisión inglesa reciente sustituyó «for emptiness» por «falsely» para sonar más natural, pero conservó el verbo ''bear''. La versión española sigue esa misma decisión de fondo: mantiene la imagen de ''llevar'' y usa ''falsamente'' para לַשָּׁוְא, de modo que el sentido sea idiomático sin perder la amplitud semántica del hebreo.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' para יְהוָה según la norma del proyecto.
  - Se conserva el paralelismo verbal entre 'llevarás' y 'lleve' para reflejar נשא en ambos miembros del verso.
  - '''Falsamente'' equilibra fidelidad semántica y fluidez española, evitando la reducción a la locución tradicional ''en vano''.'
  - Se mantiene el registro legal y solemne del mandato con una sintaxis directa y sobria.
