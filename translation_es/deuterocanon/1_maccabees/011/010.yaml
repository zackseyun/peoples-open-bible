translation:
  language: es
  text: Pues lamento haberle dado mi hija[a], porque procuró matarme.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «intentó matarme». El verbo griego puede expresar tanto «buscar/procurar» como «intentar».'
    reason: lexical_alternative
lexical_decisions:
- source_word: μεταμεμέλημαι
  english_pob_choice: I regret
  chosen_spanish: me arrepiento
  alternatives_spanish:
  - regreto
  - me doy por arrepentido
  - cambio de parecer
  lexicon: BDAG
  rationale: El perfecto con sentido presente expresa remordimiento/recapacitación respecto de una acción pasada. En español, «me arrepiento» comunica ese estado presente de manera natural y mantiene el peso retrospectivo del acto.
- source_word: δοὺς
  english_pob_choice: giving
  chosen_spanish: de haberle dado
  alternatives_spanish:
  - por haberle dado
  - cuando le di
  - después de darle
  lexicon: BDAG
  rationale: El participio aoristo explica la causa del arrepentimiento. «De haberle dado» conserva la relación causal con la acción ya completada y suena natural en español.
- source_word: τὴν θυγατέρα μου
  english_pob_choice: my daughter
  chosen_spanish: mi hija
  alternatives_spanish:
  - mi propia hija
  - la hija que tengo
  lexicon: BDAG
  rationale: La referencia familiar es directa y no requiere ampliación. «Mi hija» transmite con claridad el poseedor y evita sobretraducción.
- source_word: ἐζήτησεν
  english_pob_choice: he sought
  chosen_spanish: procuró
  alternatives_spanish:
  - buscó
  - intentó
  - trató de
  lexicon: BDAG
  rationale: Con infinitivo, ζητέω puede significar «buscar/ intentar». «Procuró» comunica el esfuerzo orientado a la acción de matar sin perder el valor de intención que la POB inglesa preserva con «he sought».
- source_word: ἀποκτεῖναί
  english_pob_choice: to kill
  chosen_spanish: matarme
  alternatives_spanish:
  - darme muerte
  - asesinarme
  lexicon: BDAG
  rationale: El infinitivo expresa la acción pretendida. «Matarme» es el equivalente directo y neutral; «asesinarme» añadiría una valoración moral no explícita en el griego.
translation_notes:
  revision_awareness: El testimonio disponible muestra alta concordancia con la traducción inglesa auditada y no reporta cambios recientes; la redacción española sigue de cerca el valor semántico del griego y conserva la ambigüedad verbal de ζητέω en una nota.
  spanish_consistency_notes:
  - Se mantiene «arrepiento» para μεταμεμέλημαι, evitando «me arrepiento de haber dado» o «me doy por arrepentido», que son más pesados sin añadir claridad.
  - «Mi hija» refleja el posesivo simple del original; no se introduce intensificación no presente en el texto fuente.
  - La nota al pie preserva la alternativa verbal documentada por la POB inglesa entre «buscar» e «intentar».
