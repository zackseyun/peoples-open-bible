translation:
  language: es
  text: 'Isaac les dijo[a]: «¿Por qué han venido a mí, si me odiaron y me enviaron lejos de entre ustedes?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «y me odiaron y me enviaron lejos de entre ustedes». La conjunción hebrea וְ en «וְאַתֶּם» puede traducirse más literalmente como «y», pero aquí probablemente tiene un sentido circunstancial o causal; por eso se vierte «si» en el texto principal.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: said
  chosen_spanish: les dijo
  alternatives_spanish:
  - dijo
  lexicon: HALOT
  rationale: אמר en narrativa introduce el habla directa; en español, «les dijo» conserva el complemento de destinatarios y suena natural y preciso.
- source_word: אֲלֵהֶם
  english_pob_choice: to them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  - a ellos les
  lexicon: HALOT
  rationale: El dativo clítico español expresa de modo idiomático el destinatario del discurso sin añadir peso innecesario.
- source_word: יִצְחָק
  english_pob_choice: Isaac
  chosen_spanish: Isaac
  lexicon: Convención onomástica estándar
  rationale: Nombre propio en forma habitual española, sin transliteración extra.
- source_word: מַדּוּעַ
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿Con qué motivo
  - ¿Para qué razón
  lexicon: HALOT
  rationale: Interrogativo causal natural en español, preserva la fuerza explicativa de la pregunta.
- source_word: בָּאתֶם אֵלַי
  english_pob_choice: have you come to me
  chosen_spanish: han venido a mí
  alternatives_spanish:
  - vinieron a mí
  - han llegado a mí
  lexicon: HALOT
  rationale: El perfecto español comunica la llegada reciente y su relevancia actual, como el inglés POB; «a mí» conserva el objeto personal del verbo de movimiento.
- source_word: וְאַתֶּם
  english_pob_choice: since/when you
  chosen_spanish: si
  alternatives_spanish:
  - y ustedes
  - puesto que
  lexicon: HALOT
  rationale: 'La conjunción hebrea aquí tiene valor circunstancial/causal en el contexto; «si» en español reproduce bien el contraste implícito: su venida resulta inesperada a la luz de la hostilidad previa.'
- source_word: שְׂנֵאתֶם אֹתִי
  english_pob_choice: you hated me
  chosen_spanish: me odiaron
  alternatives_spanish:
  - me aborrecieron
  - me tuvieron odio
  lexicon: HALOT
  rationale: שנא expresa odio real y fuerte; «odiaron» mantiene esa intensidad sin suavizarla.
- source_word: וַתְּשַׁלְּחוּנִי
  english_pob_choice: sent me away
  chosen_spanish: me despidieron
  alternatives_spanish:
  - me expulsaron
  - me echaron
  lexicon: HALOT
  rationale: שׁלח con objeto personal aquí significa despedir/enviar fuera. «Despidieron» conserva el sentido de enviar lejos sin añadir la violencia fuerte de «expulsaron» o «echaron».
- source_word: מֵאִתְּכֶם
  english_pob_choice: from among you
  chosen_spanish: de entre ustedes
  alternatives_spanish:
  - de ustedes
  - de en medio de ustedes
  lexicon: HALOT
  rationale: La preposición con את marca separación de su compañía; «de entre ustedes» preserva mejor la dimensión relacional/social que el simple «de ustedes».
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del POB en inglés que cambió «when» por «since» para reflejar mejor el valor adversativo/causal de la cláusula. En español se optó por «si» para conservar esa misma relación contextual sin forzar una coordinación literal.
  spanish_consistency_notes:
  - Se mantuvo el nombre propio «Isaac» como forma estándar en español.
  - Se conservó la intensidad de שנא con «odiaron», sin suavizarla.
  - «De entre ustedes» reproduce el matiz relacional de מֵאִתְּכֶם mejor que una simple procedencia física.
  - La puntuación con comillas angulares se ajusta al uso editorial en español.
