translation:
  language: es
  text: 'Entonces dijo[a]: «Cierto hombre tenía dos hijos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Un hombre tenía dos hijos». La frase griega incluye el indefinido τις, que puede representarse más plenamente como «cierto hombre».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Εἶπεν
  english_pob_choice: Then he said
  chosen_spanish: Entonces dijo
  alternatives_spanish:
  - Y dijo
  - Ahora dijo
  lexicon: BDAG
  rationale: El aoristo introductorio de λέγω marca el avance del discurso; «entonces» reproduce en español la transición suave que el POB inglés expresa con «Then».
- source_word: δέ
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Y
  - Ahora
  lexicon: BDAG
  rationale: δέ funciona aquí como conector leve de continuación; «entonces» conserva el flujo narrativo sin añadir contraste fuerte.
- source_word: Ἄνθρωπός τις
  english_pob_choice: A certain man
  chosen_spanish: Un hombre cierto
  alternatives_spanish:
  - Un hombre
  - Una persona cierta
  lexicon: BDAG
  rationale: τις aporta indefinición con cierto grado de especificidad. En español, «un hombre cierto» mantiene la idea de un hombre no identificado; se evita «una persona» porque el referente es masculino y padre de dos hijos.
- source_word: εἶχεν
  english_pob_choice: had
  chosen_spanish: tenía
  alternatives_spanish:
  - había tenido
  - poseía
  lexicon: BDAG
  rationale: El imperfecto expresa la circunstancia de fondo del relato parabólico. «Tenía» es el equivalente natural en español narrativo.
- source_word: δύο
  english_pob_choice: two
  chosen_spanish: dos
  alternatives_spanish:
  - '2'
  lexicon: BDAG
  rationale: Número cardinal directo y sin ambigüedad.
- source_word: υἱούς
  english_pob_choice: sons
  chosen_spanish: hijos
  alternatives_spanish:
  - hijos varones
  - hijos
  lexicon: BDAG
  rationale: Aunque el término griego especifica «sons», en español «hijos» comunica de manera natural la filiación masculina cuando ya se ha dicho «un hombre» y se introduce luego la relación padre-hijos; aquí se conserva el sentido familiar del pasaje sin forzar una fórmula más pesada. En nota se puede mantener la alternativa más literal si se requiere.
theological_decisions:
- issue: Fuerza de la indefinición en Ἄνθρωπός τις
  english_pob_reading: A certain man
  chosen_spanish_reading: Un hombre cierto
  alternative_spanish_readings:
  - Un hombre
  rationale: La parábola presenta un personaje genérico pero no vacío; la forma elegida conserva la indefinición de τις sin convertirla en una simple omisión estilística.
  doctrine_reference: Translation philosophy §4 (Gender-accurate) y §6 (Readable modern Spanish)
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el audit trail inglés: la decisión principal es cómo verter Ἄνθρωπός τις. El inglés favorece «A certain man» frente a «A man»; el español mantiene esa indefinición con «un hombre cierto», evitando una simplificación que pierda el matiz de τις. No hubo revisiones textuales en el expediente.'
  spanish_consistency_notes:
  - Se usa puntuación española y comillas angulares.
  - Se conserva el tono narrativo sobrio y parabólico.
  - No se introduce terminología eclesiástica ajena al texto.
  - La nota a mantiene la alternativa más breve para reflejar la posibilidad de una lectura menos explícita de τις.
