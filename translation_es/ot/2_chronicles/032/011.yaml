translation:
  language: es
  text: '¿No los está desviando Ezequías[a] para entregarlos a la muerte por hambre y por sed, diciendo: «Yahvé, nuestro Dios, nos librará de la mano del rey de Asiria»?'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «engañando» o «persuadiéndolos equivocadamente». El verbo hebreo puede expresar llevar a alguien por mal camino o inducirlo a una decisión errónea.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲלֹא
  english_pob_choice: Is not
  chosen_spanish: ¿No es... quien...
  alternatives_spanish:
  - ¿Acaso no es... quien...
  - ¿No...?
  lexicon: HALOT
  rationale: La pregunta retórica en hebreo espera asentimiento y tiene tono acusatorio. En español, «¿No es... quien...?» conserva esa fuerza interrogativa sin sonar forzado.
- source_word: מַסִּית
  english_pob_choice: misleading
  chosen_spanish: está desviando
  alternatives_spanish:
  - está engañando
  - los está persuadiendo erróneamente
  - los está seduciendo
  lexicon: HALOT
  rationale: El verbo en hifil puede expresar llevar a alguien por mal camino o persuadirlo equivocadamente. «Está desviando» comunica ese sentido sin reducirlo solo a fraude verbal ni cargarlo con connotaciones ajenas.
- source_word: לָתֵת אֶתְכֶם
  english_pob_choice: to give you over
  chosen_spanish: para entregarlos
  alternatives_spanish:
  - para darles
  - para ponerlos en manos de
  - para cederlos
  lexicon: HALOT
  rationale: La construcción expresa entregar a alguien a un destino. En español, «entregarlos» preserva el sentido hostil y el valor de entrega a una condición fatal.
- source_word: לָמוּת
  english_pob_choice: to die
  chosen_spanish: a morir
  alternatives_spanish:
  - para morir
  - hasta morir
  lexicon: HALOT
  rationale: La infinitiva final se expresa de manera natural con «a morir» después de «entregar». Mantiene la relación causal de la frase hebrea.
- source_word: בְּרָעָב וּבְצָמָא
  english_pob_choice: by famine and by thirst
  chosen_spanish: de hambre y de sed
  alternatives_spanish:
  - por hambre y por sed
  - con hambre y con sed
  - por una hambruna y una sed
  lexicon: HALOT
  rationale: «רָעָב» aquí se refiere a privación severa en contexto de asedio; en español, «hambre» comunica naturalmente esa realidad, y «sed» mantiene el paralelismo. Evito «hambruna» por sonar demasiado interpretativo en este contexto.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - al decir
  - y diciendo
  lexicon: HALOT
  rationale: Funciona como introducción de la cita reportada y en español «diciendo» mantiene la relación directa con la afirmación siguiente.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se conserva el nombre divino conforme a la convención del proyecto en español. «Yahvé» es la forma esperada y legible en español bíblico.
- source_word: אֱלֹהֵינוּ
  english_pob_choice: our God
  chosen_spanish: nuestro Dios
  alternatives_spanish:
  - nuestro Dios y Señor
  lexicon: HALOT
  rationale: La forma posesiva es directa y covenantal; «nuestro Dios» reproduce el vínculo del discurso citado sin añadir términos no presentes.
- source_word: יַצִּילֵנוּ
  english_pob_choice: will deliver us
  chosen_spanish: nos librará
  alternatives_spanish:
  - nos salvará
  - nos rescatará
  - nos liberará
  lexicon: HALOT
  rationale: El hifil de נצל suele significar librar/rescatar. «Nos librará» es natural en español, conserva el sentido de rescate desde peligro militar y evita sobrecargarlo con lenguaje técnico de salvación.
- source_word: מִכַּף
  english_pob_choice: from the hand of
  chosen_spanish: de la mano de
  alternatives_spanish:
  - del poder de
  - de las manos de
  lexicon: HALOT
  rationale: La idiomática hebrea se conserva literalmente pero con fluidez española. «De la mano de» reproduce la imagen de control o dominio.
- source_word: מֶלֶךְ אַשּׁוּר
  english_pob_choice: the king of Assyria
  chosen_spanish: el rey de Asiria
  alternatives_spanish:
  - el rey asirio
  - el monarca de Asiria
  lexicon: HALOT
  rationale: Es la forma estándar y transparente en español para el constructo final.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton, y el proyecto pide no enmascararlo con una sustitución de título. «Yahvé» preserva el nombre propio divino de forma reconocible y reverente en español.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sentido de מַסִּית en la acusación de Rabsaqué
  english_pob_reading: misleading
  chosen_spanish_reading: los está desviando
  alternative_spanish_readings:
  - los está engañando
  - los está incitando
  rationale: La acusación puede abarcar tanto persuasión errónea como desvío del camino leal. «Desviando» conserva esa amplitud sin escoger una lectura más estrecha que el hebreo permite.
  doctrine_reference: HALOT entry for סות in Hiphil
- issue: Valor contextual de רָעָב
  english_pob_reading: famine
  chosen_spanish_reading: hambre
  alternative_spanish_readings:
  - hambruna
  - escasez de alimento
  rationale: En este contexto de asedio la idea es muerte por privación; «hambre» es más natural en español y no fuerza una categoría técnica que el hebreo no exige aquí.
  doctrine_reference: Contexto de guerra y asedio en 2 Crónicas 32
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del inglés POB, que afinó la idea de לָתֵת אֶתְכֶם hacia «give you over» y mantuvo el resto de las decisiones. En español, se refleja esa precisión con «entregarlos», conservando el carácter de abandono a un destino fatal sin introducir explicaciones adicionales.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה conforme a la terminología del proyecto.
  - Se evita «Cristo» y «SEÑOR» porque no corresponden al hebreo ni a la política de transparencia del POB.
  - La frase verbal «de la mano de» conserva el hebraísmo idiomático de מִכַּף.
  - «Nos librará» se usa como equivalente natural de יַצִּילֵנוּ en contexto militar, sin convertirlo en lenguaje doctrinal más amplio.
