translation:
  language: es
  text: Ahora, mira[a], tú estás confiando en Egipto, ese bastón de caña quebrada, sobre el cual, si un hombre se apoya, le entrará en la mano y la atravesará[b]. Así es Faraón, rey de Egipto, para todos los que confían en él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Ahora, mira» sigue el tono de advertencia del hebreo עַתָּה הִנֵּה, más enfático que un simple «ahora».
    reason: spanish_style_note
  - marker: b
    text: El hebreo usa el singular masculino «un hombre» de manera genérica; se conserva esa forma por fidelidad al texto y al paralelismo del símil.
    reason: lexical_alternative
lexical_decisions:
- source_word: בָטַחְתָּ לְּךָ
  english_pob_choice: you are trusting
  chosen_spanish: estás confiando
  alternatives_spanish:
  - confías
  - has confiado
  lexicon: HALOT
  rationale: בטח expresa confianza o dependencia. Aunque la forma hebrea es perfecta, en este contexto de reproche tiene valor presente; por eso «estás confiando» comunica la acusación actual de manera natural en español sin perder la fuerza aspectual.
- source_word: מִשְׁעֶנֶת
  english_pob_choice: staff
  chosen_spanish: apoyo
  alternatives_spanish:
  - bastón
  - vara
  lexicon: HALOT
  rationale: El sustantivo designa algo sobre lo que uno se apoya. En español, «apoyo» comunica la función antes que el objeto físico y evita una imagen rígida que podría sonar menos natural que en inglés. La expresión completa «caña quebrada por apoyo» intenta preservar la metáfora funcional del hebreo.
- source_word: הַקָּנֶה הָרָצוּץ
  english_pob_choice: that broken reed
  chosen_spanish: esa caña quebrada
  alternatives_spanish:
  - esa caña rota
  - esa caña aplastada
  lexicon: HALOT
  rationale: קנה es «caña» o «junco»; רצוץ puede significar quebrado, roto, aplastado o magullado. «Quebrada» mantiene la imagen de algo que ya no sirve como sostén y reproduce bien el valor de la elección inglesa «broken», sin borrar la tensión lexical del término.
- source_word: עַל מִצְרַיִם
  english_pob_choice: in Egypt
  chosen_spanish: en Egipto
  alternatives_spanish:
  - sobre Egipto
  lexicon: HALOT
  rationale: Con בטח, el complemento se entiende naturalmente como objeto de confianza. «En Egipto» es la forma española más idiomática y reproduce el valor relacional del hebreo con la misma claridad que la traducción inglesa auditada.
- source_word: אֲשֶׁר יִסָּמֵךְ אִישׁ עָלָיו
  english_pob_choice: which, if a man leans on it
  chosen_spanish: sobre la cual, si un hombre se apoya
  alternatives_spanish:
  - en la que, si uno se apoya
  - sobre la que, si una persona se apoya
  lexicon: HALOT
  rationale: סמך en nifal expresa apoyarse para sostén. Se conserva la cláusula condicional y el singular genérico masculino del hebreo, como hace la POB en inglés, porque contribuye a la precisión imagética y no debería neutralizarse sin motivo.
- source_word: וּבָא בְכַפּוֹ
  english_pob_choice: will go into his hand
  chosen_spanish: le entrará en la mano
  alternatives_spanish:
  - le irá a la mano
  - le penetrará la mano
  lexicon: HALOT
  rationale: בוא aquí describe la entrada de la astilla o punta en la mano. «Le entrará en la mano» es una forma natural y directa en español, fiel al movimiento del hebreo y al ajuste revisado del inglés de «palm» a «hand».
- source_word: וּנְקָבָהּ
  english_pob_choice: and pierce it
  chosen_spanish: y la atravesará
  alternatives_spanish:
  - y la perforará
  - y la pinchará
  lexicon: HALOT
  rationale: נקב significa perforar o atravesar. «Atravesará» comunica con fuerza el daño causado por la caña al introducirse en la mano y mantiene el efecto vívido del texto.
- source_word: כֵּן
  english_pob_choice: So is
  chosen_spanish: Así es
  alternatives_spanish:
  - De igual modo es
  - Tal es
  lexicon: HALOT
  rationale: כֵּן introduce la comparación proverbial entre la imagen y Faraón. «Así es» conserva la correspondencia formal y el tono sentencioso.
- source_word: פַּרְעֹה מֶלֶךְ מִצְרַיִם
  english_pob_choice: Pharaoh king of Egypt
  chosen_spanish: Faraón, rey de Egipto
  alternatives_spanish:
  - Faraón, el rey de Egipto
  lexicon: HALOT
  rationale: Se mantiene el título real en aposición directa, como en inglés, porque la frase funciona como identificación formal del personaje y no requiere artículo para sonar natural en español.
- source_word: לְכָל הַבֹּטְחִים עָלָיו
  english_pob_choice: to all who trust in him
  chosen_spanish: para todos los que confían en él
  alternatives_spanish:
  - a todos los que confían en él
  - para cuantos confían en él
  lexicon: HALOT
  rationale: El lamed expresa aquí relación o efecto. «Para todos los que confían en él» reproduce bien esa orientación y mantiene el valor generalizador del participio hebreo.
translation_notes:
  revision_awareness: La redacción española sigue de cerca la lectura revisada del inglés auditado, especialmente el cambio de «palm» a «hand»; por eso se eligió «mano» en lugar de una imagen más específica. También se mantiene el valor presente de la confianza y el carácter proverbial del símil sin suavizar el reproche.
  spanish_consistency_notes:
  - Se usa «Yahvé» como término por defecto para el nombre divino, pero este versículo no lo contiene.
  - Se conserva la metáfora de la caña quebrada sin sustituirla por una paráfrasis explicativa más extensa.
  - «Confían» mantiene la generalización del participio hebreo para el cierre sentencioso.
  - Se evita «SEÑOR» porque el texto no contiene el tetragrámaton ni una cita directa del nombre divino.
