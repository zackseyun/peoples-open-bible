review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español capta bien las imágenes principales del griego: pastar como caballos, brincar/retozar como corderos, alabar a Dios en vocativo y reconocerlo como el que los rescató. Sin embargo, la nota [b] está mal anclada y explica διεσκίρτησαν aunque el marcador aparece junto a «Señor», lo cual rompe la correspondencia entre texto y nota. Además, «pues» suena menos directo que el simple «porque», y conviene mantener una redacción más natural y clara para lectura bíblica.'
  spanish_quality_summary: «Pacieron» y «retozaron» son fieles y dignos, aunque «pacieron» es algo literario; aquí sigue siendo inteligible en registro bíblico. La frase final «el que los libró» es correcta y natural para el participio articular. La principal deficiencia es de aparato crítico/footnotes, no de traducción base.
  glossary_alignment: 'No hay conflicto con la terminología principal del proyecto. Κύριε → «Señor» es apropiado en este contexto de vocativo divino, sin implicar el caso especial de Yahvé. El resto del léxico clave se conserva adecuadamente: ἀμνοί → «corderos», αἰνοῦντές → «alabándote», ῥυόμενον → «el que los libró».'
  issues:
  - severity: high
    issue: La nota [b] está colocada en «Señor» pero su contenido trata del verbo «διεσκίρτησαν» («retozaron/saltaron»).
    rationale: Las instrucciones exigen que cada marcador aparezca exactamente en la palabra o frase pertinente. Tal como está, el aparato induce a error y no preserva fielmente la auditoría inglesa.
  - severity: medium
    issue: La nota [b] duplica innecesariamente la lectura principal «retozaron».
    rationale: Una nota alternativa debe aportar una variante real; repetir la lectura principal dentro de la nota reduce claridad. Conviene dejar solo la alternativa significativa «saltaron».
  - severity: low
    issue: «Pues» puede reemplazarse por «Porque» para sonar más natural y directo en español bíblico contemporáneo.
    rationale: No es un error de fidelidad, pero «porque» enlaza mejor con el valor explicativo de γάρ en este contexto.
  revised_spanish_text: Porque pacieron como caballos[a], y retozaron[b] como corderos, alabándote, Señor, el que los libró.
  revised_footnotes:
  - marker: a
    text: O «fueron apacentados» / «fueron alimentados como caballos»; el verbo griego sugiere animales en pastura.
    reason: lexical_alternative
  - marker: b
