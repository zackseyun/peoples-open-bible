translation:
  language: es
  text: Naciones extranjeras[a][b] subieron sobre tu altar; lo pisotearon con sus sandalias, con arrogancia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «gentiles»; ἔθνη puede significar «naciones» en general o, en un contexto judío cultual, pueblos no israelitas específicamente.
    reason: lexical_alternative
  - marker: b
    text: O «ajenas» o «extrañas», para conservar el matiz añadido de otredad en ἀλλότρια.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνέβησαν
  english_pob_choice: went up onto
  chosen_spanish: subieron a
  alternatives_spanish:
  - subieron hasta
  - ascendieron a
  - subieron sobre
  lexicon: BDAG
  rationale: El verbo expresa movimiento ascendente; en español, «subieron a» conserva la imagen concreta sin introducir una matiz militar que el griego no exige.
- source_word: θυσιαστήριόν σου
  english_pob_choice: altar
  chosen_spanish: tu altar
  alternatives_spanish:
  - tu altar de sacrificio
  - tu altar sacrificial
  lexicon: BDAG
  rationale: «Altar» es la equivalencia natural y fiel para θυσιαστήριον. Añadir «de sacrificio» sería explicativo pero innecesariamente pesado aquí.
- source_word: ἔθνη ἀλλότρια
  english_pob_choice: Foreign nations
  chosen_spanish: Naciones extranjeras
  alternatives_spanish:
  - Naciones ajenas
  - Pueblos extranjeros
  - Gentiles extranjeros
  lexicon: BDAG
  rationale: «Naciones extranjeras» retiene tanto ἔθνη como el matiz de extrañeza/ajenidad de ἀλλότρια. «Gentiles» sería posible en contexto judío, pero aquí «naciones» comunica mejor el valor amplio del sustantivo.
- source_word: κατεπάτησαν
  english_pob_choice: trampled
  chosen_spanish: lo pisotearon
  alternatives_spanish:
  - lo aplastaron con los pies
  - lo hollaron
  - lo pisaron brutalmente
  lexicon: BDAG
  rationale: El verbo sugiere profanación bajo los pies. «Lo pisotearon» es natural en español y conserva la fuerza despectiva del acto.
- source_word: ἐν ὑποδήμασιν αὐτῶν
  english_pob_choice: with their sandals
  chosen_spanish: con sus sandalias
  alternatives_spanish:
  - con sus zapatos
  - con su calzado
  - con sus sandalias puestas
  lexicon: BDAG
  rationale: «Sandalias» mantiene la imagen cultural e histórica del texto y evita la neutralización de la escena con «zapatos».
- source_word: ἐν ὑπερηφανίᾳ
  english_pob_choice: in arrogance
  chosen_spanish: con arrogancia
  alternatives_spanish:
  - en arrogancia
  - con orgullo
  - con altanería
  lexicon: BDAG
  rationale: El adverbial de modo se vierte mejor en español con «con arrogancia», que comunica tanto la actitud como el tono moral del acto sacrílego.
theological_decisions:
- issue: 'ἐθνη ἀλλότρια: valor de ἔθνη en contexto judío'
  english_pob_reading: Foreign nations; Or 'Gentiles'
  chosen_spanish_reading: Naciones extranjeras; también puede entenderse como «gentiles» en sentido judío-cultual
  alternative_spanish_readings:
  - Gentiles
  - pueblos no israelitas
  - naciones ajenas
  rationale: Se mantiene «naciones extranjeras» como base porque es claro y no impone un tecnicismo. La nota conserva la posibilidad de leer ἔθνη como «Gentiles» en un contexto cultual judío sin borrar la amplitud semántica del término.
  doctrine_reference: Uso bíblico de ἔθνη en contextos judíos y cultuales
- issue: 'ἔθνη ἀλλότρια: tensión entre generalidad y extrañeza'
  english_pob_reading: Or 'alien' or 'strange' nations
  chosen_spanish_reading: Naciones extranjeras / naciones ajenas
  alternative_spanish_readings:
  - naciones extrañas
  - naciones alienígenas
  rationale: La combinación griega no solo indica procedencia externa, sino también ajenidad. «Extranjeras» en el texto principal y «ajenas» en la nota conservan esa tensión sin volverla artificial.
  doctrine_reference: Léxico de pertenencia y alteridad en textos litúrgicos judíos
translation_notes:
  revision_awareness: Se siguió el paquete fuente griego de Swete (1909) y el rastro auditado en inglés. No se detectaron revisiones aplicadas en el registro inglés; la redacción española busca reflejar directamente el griego, manteniendo la fuerza de profanación y el matiz de alteridad.
  spanish_consistency_notes:
  - Se mantuvo «altar» sin ampliarlo a «altar de sacrificio» para conservar naturalidad y fidelidad léxica.
  - «Naciones extranjeras» evita un tecnicismo eclesiástico y preserva la amplitud de ἔθνη.
  - «Con arrogancia» reproduce el tono moral del cierre sin suavizarlo.
