revisions:
- from: 'Porque si tu hermano[a], el hijo de tu madre, o tu hijo o tu hija, o la mujer de tu seno, o tu amigo[b] que es como tu propia alma, te seduce en secreto, diciendo: «Vamos y sirvamos a otros dioses», dioses que ni tú ni tus padres conocisteis—'
  to: 'Porque si tu hermano, el hijo de tu madre, o tu hijo o tu hija, o la mujer de tu seno, o tu amigo[a] que es como tu propia alma, te incita en secreto, diciendo: «Vayamos y sirvamos a otros dioses», dioses que ni tú ni tus padres han conocido—'
  rationale: Se corrige el verbo principal para reflejar mejor el sentido de incitación a la apostasía, se normaliza la concordancia al español neutro latinoamericano con «han conocido», y se conserva solo la nota útil sobre «alma/vida». «Vayamos y sirvamos» expresa de manera más directa los cohortativos hebreos que «Vamos y sirvamos».
