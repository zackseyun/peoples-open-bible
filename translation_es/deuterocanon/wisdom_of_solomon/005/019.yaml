lexical_decisions:
- source_word: λήμψεται
  english_pob_choice: will take
  chosen_spanish: tomará
  alternatives_spanish:
  - recibirá
  - tomará en sus manos
  lexicon: BDAG
  rationale: El futuro medio de λαμβάνω se expresa bien con «tomará» en español y conserva la imagen de armarse en sentido activo. «Recibirá» debilita la metáfora marcial; «tomará en sus manos» es más explicativo de lo que exige el griego.
- source_word: ἀσπίδα
  english_pob_choice: shield
  chosen_spanish: escudo
  alternatives_spanish:
  - broquel
  lexicon: LSJ
  rationale: «Escudo» es el equivalente natural y claro en español para ἀσπίς. «Broquel» es posible, pero suena más literario y menos accesible para el objetivo de lectura pública.
- source_word: ἀκαταμάχητον
  english_pob_choice: unconquerable
  chosen_spanish: invencible
  alternatives_spanish:
  - inconquistable
  - inconquistado
  lexicon: LSJ
  rationale: El adjetivo comunica que no puede ser vencido ni combatido con éxito. En español, «invencible» conserva bien la fuerza de la imagen y fluye con naturalidad; «inconquistable» es posible, pero resulta menos idiomático aquí.
- source_word: ὁσιότητα
  english_pob_choice: holiness
  chosen_spanish: la santidad
  alternatives_spanish:
  - la piedad
  - la devoción
  - la religiosidad
  lexicon: LSJ
  rationale: ὁσιότης puede abarcar santidad, piedad o devoción. Aquí, como virtud personificada que funciona como armadura divina, «santidad» preserva mejor el alcance moral y teológico que «piedad», que en español puede sonar más restringido a devoción externa.
theological_decisions:
- issue: Si ὁσιότητα debe sonar como virtud moral amplia o como devoción/piedad cultual.
  english_pob_reading: holiness
  chosen_spanish_reading: la santidad
  alternative_spanish_readings:
  - la piedad
  - la devoción
  rationale: La lectura inglesa eligió «holiness» para no estrechar el sentido a mera religiosidad externa. En español, «la santidad» mantiene esa amplitud ética y teológica dentro de la metáfora del armamento, sin importar una categoría doctrinal ajena al texto.
  doctrine_reference: Translation philosophy §§1, 5, 6
translation_notes:
  revision_awareness: 'El texto griego breve y el audit trail inglés coinciden en una imagen marcial: tomar algo como escudo. La revisión más reciente no introdujo cambios, y la traducción española sigue esa línea sin añadir expansión interpretativa.'
  spanish_consistency_notes:
  - Se mantiene el registro bíblico elevado pero natural en español.
  - «Santidad» evita reducir ὁσιότης a una devoción meramente exterior.
  - «Escudo invencible» conserva la metáfora de combate y la fuerza del adjetivo griego.
  - La puntuación con nota al pie sigue el patrón del texto base en inglés.
