translation:
  language: es
  text: y tú hiciste voto de reconstruir el templo que los judeanos quemaron, cuando Judea fue asolada por los caldeos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «que los judeanos quemaron». Algunos lectores podrían esperar «que quemaron los caldeos/babilonios» por tradiciones históricas paralelas, pero el texto griego presente dice explícitamente «los judeanos».'
    reason: alternative_reading
lexical_decisions:
- source_word: εὔξω
  english_pob_choice: you vowed
  chosen_spanish: juraste
  alternatives_spanish:
  - prometiste
  - hiciste un voto
  - votaste
  lexicon: LSJ
  rationale: El aoristo medio de εὔχομαι aquí expresa un compromiso solemne. En español, «juraste» comunica con naturalidad una promesa formal y vinculante; «hiciste un voto» conserva más literalmente la idea de voto, pero suena menos fluido en este contexto narrativo.
- source_word: οἰκοδομῆσαι
  english_pob_choice: to rebuild
  chosen_spanish: reconstruir
  alternatives_spanish:
  - edificar de nuevo
  - volver a construir
  - edificar
  lexicon: LSJ
  rationale: Aunque el verbo base significa «construir», el contexto del templo previamente destruido pide una idea restaurativa. «Reconstruir» expresa bien esa restauración sin añadir contenido ajeno al griego.
- source_word: ναὸν
  english_pob_choice: temple
  chosen_spanish: templo
  alternatives_spanish:
  - santuario
  lexicon: LSJ
  rationale: ναός se refiere aquí al edificio del templo de Jerusalén. «Templo» es la opción clara y estándar en español para este contexto histórico.
- source_word: ἐνεπύρισαν
  english_pob_choice: burned
  chosen_spanish: incendiaron
  alternatives_spanish:
  - quemaron
  - prendieron fuego a
  - quemaron hasta destruir
  lexicon: LSJ
  rationale: El verbo implica poner fuego. «Incendiaron» mantiene el sentido activo de quemar intencionalmente y es más preciso que el simple «quemaron» en este contexto.
- source_word: οἱ Ἰουδαῖοι
  english_pob_choice: the Judeans
  chosen_spanish: los judíos
  alternatives_spanish:
  - los judeanos
  - los de Judea
  lexicon: LSJ
  rationale: El inglés POB optó por «Judeans» para preservar el matiz etnogeográfico de la época. En español, «judíos» es la forma más natural y reconocible; «judeanos» suena forzado y «los de Judea» resulta más explicativo que el griego. Se conserva en nota la tensión textual sobre el sujeto del incendio.
- source_word: ἐρημώθη
  english_pob_choice: was laid waste
  chosen_spanish: fue asolada
  alternatives_spanish:
  - fue devastada
  - quedó desolada
  - fue desolada
  lexicon: LSJ
  rationale: El pasivo expresa ruina y desolación. «Fue asolada» es idiomático, solemne y cercano al valor de devastación del verbo.
- source_word: Χαλδαίων
  english_pob_choice: the Chaldeans
  chosen_spanish: los caldeos
  alternatives_spanish:
  - los babilonios
  lexicon: LSJ
  rationale: El griego nombra explícitamente a los caldeos. «Caldeos» mantiene visible el término histórico del texto fuente; «babilonios» sería una identificación interpretativa más amplia.
theological_decisions:
- issue: Atribución del incendio del templo a «los judíos»
  english_pob_reading: Retain the Greek wording as written, attributing the burning to 'the Judeans.'
  chosen_spanish_reading: Conservar la atribución explícita a «los judíos» sin corregirla interpretativamente.
  alternative_spanish_readings:
  - quemaron el templo
  - el templo que fue incendiado
  - el templo que incendiaron los caldeos
  rationale: El griego transmite de forma explícita οἱ Ἰουδαῖοι como sujeto de ἐνεπύρισαν. Aunque esto crea tensión histórica con otras tradiciones, la traducción POB no debe resolverla silenciosamente. La versión española mantiene esa tensión en lugar de armonizarla.
  doctrine_reference: Preservar la tensión del texto fuente; primacía del original sobre la tradición de traducción.
translation_notes:
  revision_awareness: El paquete de auditoría indica alta concordancia y sin cambios en la última revisión; no se documentaron revisiones aplicadas. La traducción española conserva la lectura griega explícita y la tensión histórica señalada en el audit trail inglés.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; este versículo no contiene el tetragrámaton.
  - Se mantiene «judíos» por naturalidad en español, con nota que preserva la tensión del sujeto griego.
  - «Caldeos» se conserva como etnónimo histórico visible, en paralelo al inglés POB.
  - El tono es formal y bíblico sin recurrir a calcos innecesarios.
