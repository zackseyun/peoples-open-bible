review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la secuencia narrativa hebrea: Balac oye la noticia de la llegada de Balaam, sale para encontrarse con él, y se identifica la ciudad moabita junto al Arnón y en el extremo del límite. Sin embargo, hay dos desajustes importantes con el sentido/documentación del POB: (1) la nota [a] no refleja la alternativa auditada en inglés, que es «a una ciudad de Moab / la ciudad de Moab», no un contraste aspectual sobre «estaba llegando»; y (2) «sobre la frontera del Arnón» suena espacialmente poco natural en español para עַל גְּבוּל. También «hasta la ciudad de Moab» introduce un matiz de trayecto límite que no está en el hebreo y es menos fiel que una localización simple tras «salió a su encuentro».'
  spanish_quality_summary: 'El texto es en general claro y digno, pero varias elecciones suenan poco idiomáticas en español bíblico natural: «sobre la frontera» y, en menor medida, «hasta la ciudad de Moab». Una redacción más natural y fiel es «en la ciudad de Moab» y «en la frontera del Arnón». Además, la nota [a] debe corregirse para coincidir con la ambigüedad léxica real del hebreo.'
  glossary_alignment: No hay términos teológicos del glosario mayor en juego aquí. Los nombres propios Balac, Balaam y Arnón están bien conservados. La revisión propuesta mejora la correspondencia léxica de אֶל עִיר מוֹאָב y עַל גְּבוּל sin apartarse de la filosofía de equivalencia óptima.
  issues:
  - severity: high
    issue: La nota [a] documenta una alternativa equivocada.
    rationale: El expediente inglés preserva la ambigüedad de עִיר מוֹאָב como «la ciudad de Moab» o «una ciudad de Moab». El borrador español reemplaza eso por «estaba llegando», alternativa que no corresponde a la nota auditada.
  - severity: medium
    issue: «Hasta la ciudad de Moab» añade un matiz no presente en el hebreo.
    rationale: Tras «salió a su encuentro», el español fluye mejor con una localización como «en la ciudad de Moab»; «hasta» enfatiza el recorrido o punto final más de lo que exige אֶל en este contexto.
  - severity: medium
    issue: «Sobre la frontera del Arnón» es poco natural en español.
    rationale: Aunque עַל puede ser literalmente «sobre», en español geográfico «en la frontera» o «junto a la frontera» expresa mejor la ubicación sin imagen extraña.
  revised_spanish_text: Cuando Balac oyó que Balaam había llegado, salió a su encuentro en la ciudad de Moab[a], que está en la frontera del Arnón, al borde de la frontera[b].
  revised_footnotes:
  - marker: a
    text: O «en una ciudad de Moab». La frase hebrea puede referirse a una ciudad específica conocida de Moab o más generalmente a una ciudad perteneciente a Moab.
    reason: lexical_alternative
  - marker: b
    text: O «al final del territorio». El término hebreo para «frontera» también puede referirse al territorio delimitado en algunos contextos.
    reason: lexical_alternative
