translation:
  language: es
  text: y tres décimas de efa de flor de harina como ofrenda vegetal[a], mezclada con aceite, para un toro, y dos décimas de efa de flor de harina como ofrenda vegetal, mezclada con aceite[b], para un carnero.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: “tres décimas” y “dos décimas”; se entiende que son décimas de un efa.'
    reason: cultural_note
  - marker: b
    text: O “entremezclada con aceite”.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּשְׁלֹשָׁה עֶשְׂרֹנִים
  english_pob_choice: and three-tenths of an ephah
  chosen_spanish: y tres décimas de efa
  alternatives_spanish:
  - y tres décimas de un efa
  - y tres tenth-partes de efa
  lexicon: HALOT
  rationale: עֶשְׂרוֹן expresa una décima de medida, entendida en este contexto como décimas de efa. En español, “tres décimas de efa” comunica la unidad de forma clara y conserva el valor concreto del texto sacrificial.
- source_word: סֹלֶת
  english_pob_choice: fine flour
  chosen_spanish: flor de harina
  alternatives_spanish:
  - harina fina
  - harina selecta
  lexicon: HALOT
  rationale: La expresión cultual habitual en español bíblico es “flor de harina”; comunica bien el sentido de סֹלֶת como harina refinada sin perder el registro sacrificial.
- source_word: מִנְחָה
  english_pob_choice: grain offering
  chosen_spanish: ofrenda vegetal
  alternatives_spanish:
  - ofrenda de cereal
  - ofrenda de grano
  lexicon: HALOT
  rationale: En contexto levítico, מִנְחָה nombra la ofrenda vegetal/cereal, no una ofrenda general. “Ofrenda vegetal” mantiene la categoría cultual sin reducirla a una sola especie de grano.
- source_word: בְּלוּלָה בַשֶּׁמֶן
  english_pob_choice: mixed with oil
  chosen_spanish: mezclada con aceite
  alternatives_spanish:
  - amasada con aceite
  - mezclada en aceite
  lexicon: HALOT
  rationale: El participio describe la preparación de la ofrenda. “Mezclada con aceite” es natural en español y conserva el matiz de composición sin forzar el hebreo.
- source_word: לַפָּר הָאֶחָד
  english_pob_choice: for the one bull
  chosen_spanish: para el único toro
  alternatives_spanish:
  - para el toro único
  - para un toro
  lexicon: HALOT
  rationale: El artículo más אֶחָד señala cada animal individualmente, no un ordinal. “El único toro” reproduce la fuerza distributiva y evita introducir “primero” sin base textual.
- source_word: וּשְׁנֵי עֶשְׂרֹנִים
  english_pob_choice: and two-tenths of an ephah
  chosen_spanish: y dos décimas de efa
  alternatives_spanish:
  - y dos décimas de un efa
  - y dos tenth-partes de efa
  lexicon: HALOT
  rationale: Se mantiene el mismo criterio métrico que en la primera mitad del versículo para asegurar consistencia y claridad en la medida ritual.
- source_word: לָאַיִל הָאֶחָד
  english_pob_choice: for the one ram
  chosen_spanish: para el único carnero
  alternatives_spanish:
  - para el carnero único
  - para un carnero
  lexicon: HALOT
  rationale: Se conserva el paralelismo con “el único toro” y el valor distributivo de הָאֶחָד. “Carnero” es el equivalente natural y preciso de אַיִל en este contexto sacrificial.
theological_decisions:
- issue: Naturaleza de מִנְחָה en contexto sacrificial
  english_pob_reading: grain offering
  chosen_spanish_reading: ofrenda vegetal
  alternative_spanish_readings:
  - ofrenda de cereal
  - ofrenda de grano
  - ofrenda
  rationale: No se suaviza a un término genérico, porque el pasaje prescribe una ofrenda específica dentro del sistema cultual. “Vegetal” evita restringirla indebidamente a un solo cereal, aunque admite la alternativa “cereal” como posible equivalente contextual.
  doctrine_reference: Levítico 2; Números 28–29
- issue: Valor distributivo de הָאֶחָד con animales sacrificiales
  english_pob_reading: the one bull / the one ram
  chosen_spanish_reading: el único toro / el único carnero
  alternative_spanish_readings:
  - el toro uno / el carnero uno
  - el primero de los toros / el primero de los carneros
  rationale: La forma hebrea describe cada animal singularmente y no introduce una secuencia ordinal. La traducción conserva esa restricción para no añadir un sentido que el texto no exige.
  doctrine_reference: Números 28:12; uso distributivo del artículo + אֶחָד
translation_notes:
  revision_awareness: Se tomó como base el texto hebreo masorético proporcionado y se contrastó con la auditoría inglesa existente. No hubo revisiones aplicadas en el registro inglés; por tanto, la redacción española sigue de cerca la solución óptima ya validada, ajustando solo las equivalencias naturales al español y manteniendo el mismo perfil de decisiones léxicas y métricas.
  spanish_consistency_notes:
  - Se mantiene “Yahvé” como norma del proyecto, pero este versículo no contiene el Tetragrámaton ni una cita del nombre divino.
  - Se preserva la terminología cultual específica con “ofrenda vegetal” para מִנְחָה y “flor de harina” para סֹלֶת.
  - Se usa “efa” como unidad de medida explícita para reflejar la aclaración contextual del inglés POB.
  - Se evita “sierva/ofrenda” genérica para no diluir el carácter sacrificial preciso del hebreo.
