revisions:
- from: Y cuando se siente sobre el trono de su reino, escribirá para sí en un libro una copia[a] de esta ley[b], de delante de los sacerdotes levitas.
  to: Y cuando se siente sobre el trono de su reino, escribirá para sí en un libro una copia de esta ley, de ante[a] los sacerdotes levitas[b].
  rationale: Se reubica la nota [a] al elemento que realmente explica la alternativa documentada («de ante los sacerdotes levitas») y se ajusta «de delante de» a «de ante» para mejorar la naturalidad sin perder transparencia frente al hebreo. Se conserva todo lo demás porque refleja fielmente el sentido fuente y las decisiones del POB inglés.
