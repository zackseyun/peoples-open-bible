- issue: Whether to expand 'the house of Jacob' into a more interpretive 'Israel'
  chosen_reading: Retained 'the house of Jacob' in the main text.
  alternative_readings:
  - Israel
  - the people of Israel
  rationale: The Greek names 'the house of Jacob' specifically. Preserving it maintains the covenantal and literary texture of the source without importing a broader interpretive gloss.
