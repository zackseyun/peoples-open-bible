  alternative_readings:
  - 너의 주 하나님
  rationale: 신명기 6:16의 히브리어 본문은 יהוה אֱלֹהֶיךָ이며, 70인역의 κύριος는 그 차폐 호명이다. 본 번역은 OT 직접 인용에서 야훼를 회복하는 정책에 따라 「야훼」로 옮긴다.
