translation:
  language: es
  text: Olvidaron sus obras[a], y sus maravillas[b] que les había mostrado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hechos» o «actos» para «obras».
    reason: lexical_alternative
  - marker: b
    text: O «hechos maravillosos» para «maravillas».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁכְּחוּ
  english_pob_choice: they forgot
  chosen_spanish: olvidaron
  alternatives_spanish:
  - se olvidaron
  - olvidaron de
  lexicon: HALOT
  rationale: El hebreo narra una acción pasada en secuencia. En español, «olvidaron» comunica el hecho sin sobreexplicar. «Se olvidaron» también sería posible, pero «olvidaron» mantiene mejor la concisión del paralelismo poético.
- source_word: עֲלִילוֹתָיו
  english_pob_choice: his deeds
  chosen_spanish: sus hechos
  alternatives_spanish:
  - sus obras
  - sus actos
  lexicon: HALOT
  rationale: «Hechos» conserva el sentido amplio de acciones realizadas por Dios y funciona bien en español poético. «Obras» es viable, pero puede sonar más teológico o litúrgico; «actos» es correcto pero menos natural aquí.
- source_word: וְנִפְלְאוֹתָיו
  english_pob_choice: and his wonders
  chosen_spanish: y sus maravillas
  alternatives_spanish:
  - y sus hechos maravillosos
  - y sus milagros
  lexicon: HALOT
  rationale: «Maravillas» reproduce bien el campo semántico de lo extraordinario y mantiene el vínculo con el lenguaje bíblico de actos admirables de Dios. «Milagros» estrecharía demasiado el término; «hechos maravillosos» explica, pero pierde fluidez poética.
- source_word: הֶרְאָם
  english_pob_choice: he had shown them
  chosen_spanish: les había mostrado
  alternatives_spanish:
  - les mostró
  - les había hecho ver
  lexicon: HALOT
  rationale: El hiphil de ראה tiene el sentido de hacer ver, idiomáticamente mostrar. «Les había mostrado» refleja el valor perfectivo previo al olvido y suena natural en español. «Les había hecho ver» conserva el matiz causal, pero es menos idiomático.
theological_decisions:
- issue: Referente del sufijo posesivo en «sus»
  english_pob_reading: 'The suffixes refer to God: ''his deeds ... his wonders.'''
  chosen_spanish_reading: 'Los posesivos «sus» se entienden como referencia a Dios: «sus hechos... sus maravillas».'
  alternative_spanish_readings:
  - sus hechos de él
  - los hechos de Yahvé... sus maravillas
  rationale: El contexto del salmo presupone que se trata de las acciones salvíficas de Yahvé. Mantener los posesivos simples preserva la lectura natural y la relación teológica sin añadir palabras innecesarias.
  doctrine_reference: Translation philosophy §1; affirmations on divine referent
- issue: Valor de עֲלִילוֹת y נִפְלְאוֹת
  english_pob_reading: deeds / wonders
  chosen_spanish_reading: hechos / maravillas
  alternative_spanish_readings:
  - obras / maravillas
  - actos / maravillas
  rationale: La pareja «hechos» y «maravillas» mantiene el contraste entre acciones históricas concretas y obras extraordinarias de Dios, sin reducir «wonders» a «milagros» ni volver demasiado abstracto el hebreo.
  doctrine_reference: Lexical-theological precision in poetic narrative
translation_notes:
  revision_awareness: El pasaje coincide ampliamente con la auditoría inglesa vigente y no requiere revisión textual adicional; se conserva la estructura breve y paralela del hebreo, con equivalencia óptima y sin añadir glosas al cuerpo principal.
  spanish_consistency_notes:
  - Se evita «SEÑOR» como máscara del nombre divino porque aquí el verso usa sufijos posesivos y el contexto ya identifica a Yahvé como sujeto implícito.
  - «Maravillas» se mantiene como término bíblico estable para נִפְלְאוֹת, evitando «milagros» por su posible restricción semántica.
  - La puntuación conserva la coordinación simple del hebreo y el ritmo poético en español.
