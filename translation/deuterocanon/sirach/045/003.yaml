translation:
  text: At his word the signs came quickly[a], and he strengthened him before a king. He commanded him concerning the people[c][b], and showed him his glory.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek reads, 'By his words he stopped signs,' rather than 'the signs came quickly.'
    reason: textual_variant
  - marker: b
    text: Greek has 'he honored/glorified him before kings' instead of 'he strengthened him before a king.'
    reason: textual_variant
  - marker: c
    text: The Hebrew here is difficult; as transmitted it could suggest 'and they saw his glory,' but the Greek supports 'and showed him his glory,' which is followed in the main text.
    reason: textual_variant
lexical_decisions:
- source_word: בדבריו
  chosen: At his word
  alternatives:
  - By his words
  - Through his word
  lexicon: HALOT
  rationale: The Hebrew preposition ב with דבר here is best rendered instrumentally/temporally as 'at/by his word.' Singular 'word' is smoother in English, while still reflecting the Hebrew phrase. The Greek ἐν λόγοις αὐτοῦ supports a wording centered on 'word(s).'
- source_word: האותות
  chosen: the signs
  alternatives:
  - the miracles
  - the tokens
  lexicon: HALOT
  rationale: '''Signs'' is the most direct rendering of אותות and matches the Greek σημεῖα. ''Miracles'' would over-interpret by foregrounding effect rather than the lexical sense.'
- source_word: מהרו
  chosen: came quickly
  alternatives:
  - hurried
  - were hastened
  lexicon: HALOT
  rationale: The Hebrew verb conveys haste. Because English 'the signs hurried' is awkward, 'came quickly' preserves the sense in readable modern English. The Greek κατέπαυσεν differs notably here, so the Hebrew witness is followed while the divergence is preserved in a footnote.
- source_word: ויחזקהו
  chosen: he strengthened him
  alternatives:
  - he made him strong
  - he established him
  - he honored him
  lexicon: HALOT
  rationale: The Hebrew חזק in hiphil commonly means 'strengthen' or 'make strong.' This is preferred from the Hebrew witness. The Greek ἐδόξασεν ('he glorified/honored') reflects a different Vorlage or interpretive rendering, so that alternative is footnoted rather than adopted in the main text.
- source_word: לפני מלך
  chosen: before a king
  alternatives:
  - before the king
  - in the presence of a king
  lexicon: HALOT
  rationale: The Hebrew lacks the article, so 'a king' is the more formally accurate rendering. The Greek has plural 'before kings,' indicating a source divergence; the Hebrew is retained in the main text and the Greek alternative is footnoted.
- source_word: ויצוהו
  chosen: He gave him commands
  alternatives:
  - He commanded him
  - He appointed him
  lexicon: HALOT
  rationale: The verb צוה means 'command.' Because the following phrase אל העם is difficult if rendered woodenly ('commanded him to the people'), 'gave him commands' captures the sense that Moses received divine instructions concerning the people. This is also supported by the Greek ἐνετείλατο αὐτῷ πρὸς λαὸν αὐτοῦ.
- source_word: אל העם
  chosen: for his people
  alternatives:
  - concerning the people
  - toward the people
  lexicon: HALOT
  rationale: The preposition אל is somewhat awkward in literal English here. In context, the sense is that the commands concerned God's people. 'For his people' is idiomatic while remaining close to the likely force of the phrase; the Greek πρὸς λαὸν αὐτοῦ points in the same direction.
- source_word: ויראו את כבודו
  chosen: and showed him his glory
  alternatives:
  - and let him see his glory
  - and they saw his glory
  lexicon: HALOT
  rationale: The Hebrew consonants as given suggest a plural/third-person form ('and they saw'), but the Greek ἔδειξεν αὐτῷ τῆς δόξης αὐτοῦ strongly supports the sense 'and showed him his glory.' Given the source validation flag and the major mismatch, the line is translated with the Greek-assisted sense while noting the Hebrew form's difficulty in a footnote.
