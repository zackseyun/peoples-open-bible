id: 1MA.14.10
reference: 1 Maccabees 14:10
source:
  edition: lxx-swete-1909
  text: ταῖς πόλεσιν ἐχορήγησεν βρώματα, καὶ ἔταξεν αὐτὰς ἐν σκεύεσιν ὀχυρώσεως, ἕως ὅτου ὠνομάσθη τὸ ὄνομα τῆς δόξης αὐτοῦ ἕως ἄκρου γῆς.
  language: Greek
  pages:
  - 676
  confidence: high
  validation: minor_mismatch
translation:
  text: He supplied the cities with provisions[a], and equipped them with implements of fortification[b], until the name of his glory was named to the end of the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'his glorious name became known to the end of the earth.' The Greek reads more literally, 'the name of his glory was named.'
    reason: lexical_alternative
  - marker: b
    text: The phrase 'implements of fortification' may refer broadly to defensive equipment or matériel for strengthening the cities.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐχορήγησεν
  chosen: supplied
  alternatives:
  - provided
  - furnished
  lexicon: LSJ
  rationale: The verb conveys providing at one's expense or furnishing what is needed. 'Supplied' fits the administrative/military context and reads naturally in English.
- source_word: βρώματα
  chosen: provisions
  alternatives:
  - food
  - supplies
  lexicon: LSJ
  rationale: Although literally 'foods,' in context of cities and defense it likely refers to food supplies/provisions rather than meals in general. 'Provisions' captures the civic-military sense.
- source_word: ἔταξεν
  chosen: equipped
  alternatives:
  - arranged
  - appointed
  - set
  lexicon: LSJ
  rationale: With αὐτὰς and the following phrase, the sense is that he put the cities into a fortified state or furnished them accordingly. 'Equipped' expresses the practical result more clearly than a wooden 'set' or 'arranged.'
- source_word: σκεύεσιν
  chosen: implements
  alternatives:
  - equipment
  - arms
  - vessels
  lexicon: LSJ
  rationale: σκεῦος can denote equipment or gear broadly. In the phrase 'implements of fortification' it likely refers to matériel used for defense. 'Implements' preserves the concrete sense without over-specifying as weapons.
- source_word: ὀχυρώσεως
  chosen: fortification
  alternatives:
  - defense
  - stronghold
  lexicon: LSJ
  rationale: 'The genitive denotes what the equipment pertains to: fortifying/defensive works. ''Fortification'' best preserves that military nuance.'
- source_word: ἕως ὅτου
  chosen: until
  alternatives:
  - so that
  - up to the point that
  lexicon: LSJ
  rationale: This phrase marks the extent/result in time or degree. 'Until' is the most direct rendering.
- source_word: ὠνομάσθη
  chosen: was named
  alternatives:
  - was renowned
  - was proclaimed
  - was called
  lexicon: LSJ
  rationale: The passive of ὀνομάζω is literally 'was named.' Here it idiomatically indicates that his glorious name became widely known. Retaining 'was named' stays close to the Greek while allowing the idiom to stand.
- source_word: τὸ ὄνομα τῆς δόξης αὐτοῦ
  chosen: the name of his glory
  alternatives:
  - his glorious name
  - the name of his splendor
  lexicon: LSJ
  rationale: The Greek construction is somewhat weighty and formal. 'The name of his glory' preserves the genitival structure and rhetorical force, though 'his glorious name' is a viable smoother alternative.
- source_word: ἕως ἄκρου γῆς
  chosen: to the end of the earth
  alternatives:
  - to earth's end
  - to the ends of the earth
  lexicon: LSJ
  rationale: Literally 'to the extremity/end of the earth.' Singular 'end' follows the Greek closely; the English idiom is still understandable.
