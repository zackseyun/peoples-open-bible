    issue: «Ten gracia de mí» es una formulación no idiomática en español.
    rationale: Aunque intenta calcar «be gracious to me», en español no suena natural ni ampliamente comprensible en registro bíblico moderno. Una opción como «Sé propicio conmigo» preserva mejor el matiz de favor/gracia sin caer en el calco defectuoso; «Ten misericordia de mí» sería más idiomática pero desplaza el énfasis léxico documentado.
