revisions:
- from: 'Ahora son creadas[a], y no desde mucho tiempo atrás; antes de hoy no las habías oído, para que no digas: «Mira, yo las conocía».'
  to: 'Ahora son creadas[a], y no desde mucho tiempo atrás; antes de hoy no habías oído de ellas, para que no digas: «Mira, yo ya las sabía».'
  rationale: 'Se conserva la decisión teológica clave de mantener «creadas», pero se mejora la naturalidad y precisión semántica en español: «no habías oído de ellas» expresa mejor שמע con este tipo de objeto, y «yo ya las sabía» comunica con mayor fidelidad la pretensión de conocimiento previo implícita en ידע en este contexto.'
