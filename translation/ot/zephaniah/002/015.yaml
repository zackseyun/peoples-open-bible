theological_decisions:
- issue: Rendering the city's boast אֲנִי וְאַפְסִי עוֹד
  chosen_reading: I am, and there is none besides me
  alternative_readings:
  - I am, and there is nothing else
  rationale: The wording intentionally preserves the striking echo of language elsewhere used of the LORD's unique sovereignty, here placed on the lips of a proud human city as blasphemous self-exaltation. This is a literary-theological effect in the Hebrew text and should not be flattened.
  doctrine_reference: Translation philosophy §1, §3
