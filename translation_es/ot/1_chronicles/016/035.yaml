translation:
  language: es
  text: 'Y digan: «Sálvanos, oh Dios de nuestra salvación; reúnenos y líbranos de las naciones[a], para que demos gracias a tu santo nombre y nos gloriemos en tu alabanza[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de los gentiles»; aquí el sentido es más ampliamente «de las naciones/pueblos».
    reason: lexical_alternative
  - marker: b
    text: O «nos jactemos en tu alabanza» o «exultemos en tu alabanza».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִמְרוּ
  english_pob_choice: And say
  chosen_spanish: Y dirán
  alternatives_spanish:
  - Y digan
  - Y decid
  lexicon: HALOT
  rationale: El verbo está en plural imperativo y funciona como introducción litúrgica de la respuesta congregacional. «Y dirán» conserva el enlace narrativo y la fuerza proclamativa de la fórmula sin volverla rígidamente literal.
- source_word: הוֹשִׁיעֵנוּ
  english_pob_choice: Save us
  chosen_spanish: Sálvanos
  alternatives_spanish:
  - Sálvanos, danos salvación
  - Rescátanos
  lexicon: HALOT
  rationale: El hifil de ישׁע pide una petición directa de salvación. «Sálvanos» es natural en español y mantiene el peso teológico del ruego; se evita confundirlo con el verbo posterior de librar/rescatar.
- source_word: אֱלֹהֵי יִשְׁעֵנוּ
  english_pob_choice: God of our salvation
  chosen_spanish: oh Dios de nuestra salvación
  alternatives_spanish:
  - Dios de nuestra salvación
  - nuestro Dios salvador
  lexicon: HALOT
  rationale: La construcción de genitivo se refleja con «de nuestra salvación». Se añadió «oh» para un vocativo solemne y natural en español, equivalente funcional de la vocación reverente del original y del ajuste inglés auditado.
- source_word: וְקַבְּצֵנוּ
  english_pob_choice: gather us
  chosen_spanish: reúnenos
  alternatives_spanish:
  - gánenos
  - júntanos
  - reúnenos
  lexicon: HALOT
  rationale: קבץ expresa reunir o congregar, con posible matiz de restauración desde la dispersión. «Reúnenos» preserva ese campo semántico y suena más natural que un calco más duro.
- source_word: וְהַצִּילֵנוּ
  english_pob_choice: deliver us
  chosen_spanish: líbranos
  alternatives_spanish:
  - rescátanos
  - sálvanos
  lexicon: HALOT
  rationale: נצל añade la idea de sacar/liberar de un peligro o dominio. «Líbranos» distingue bien este verbo del anterior «sálvanos» y conserva la diferenciación lexical documentada en el audit trail.
- source_word: מִן־הַגּוֹיִם
  english_pob_choice: from the nations
  chosen_spanish: de las naciones
  alternatives_spanish:
  - de los gentiles
  - de entre las naciones
  lexicon: HALOT
  rationale: En este contexto histórico, גוים remite a pueblos/naciones circundantes y no a la distinción técnico-teológica posterior de «gentiles». «De las naciones» reproduce el sentido más amplio y evita importar una categoría posterior.
- source_word: לְהֹדוֹת
  english_pob_choice: that we may give thanks
  chosen_spanish: para que demos gracias
  alternatives_spanish:
  - para dar gracias
  - a fin de dar gracias
  lexicon: HALOT
  rationale: El infinitivo con ל expresa finalidad. «Para que demos gracias» expresa claramente la finalidad en español y conserva el valor de acción agradecida de ידה en esta forma verbal.
- source_word: לְשֵׁם קָדְשֶׁךָ
  english_pob_choice: to your holy name
  chosen_spanish: a tu santo nombre
  alternatives_spanish:
  - a tu nombre santo
  - para tu santo nombre
  lexicon: HALOT
  rationale: La expresión fija se vierte con el orden natural español «santo nombre». Se usa «a» porque el complemento funciona con el verbo de dar gracias; la fórmula conserva la reverencia del nombre divino.
- source_word: לְהִשְׁתַּבֵּחַ
  english_pob_choice: and glory
  chosen_spanish: y nos gloriemos
  alternatives_spanish:
  - y nos jactemos
  - y exultemos
  lexicon: HALOT
  rationale: El hitpael de שׁבח tiene sentido de gloriarse/boast in the positive biblical sense. «Nos gloriemos» mantiene la fuerza reflexiva y evita la connotación negativa que «jactarse» puede tener en español actual.
- source_word: בִּתְהִלָּתֶךָ
  english_pob_choice: in your praise
  chosen_spanish: en tu alabanza
  alternatives_spanish:
  - en tu praise
  - en tu loor
  lexicon: HALOT
  rationale: תהלה se traduce bien por «alabanza» en español bíblico contemporáneo. «En tu alabanza» conserva la preposición y el vínculo semántico con el acto de elogiar a Dios, sin perder naturalidad.
theological_decisions:
- issue: Si el término גוים debe leerse como «gentiles» o «naciones»
  english_pob_reading: from the nations
  chosen_spanish_reading: de las naciones
  alternative_spanish_readings:
  - de los gentiles
  rationale: En 1 Crónicas 16:35 el sentido histórico es el de pueblos entre los cuales Israel puede estar disperso o de los cuales necesita ser librado. «Naciones» preserva el horizonte del texto sin introducir una oposición étnico-teológica posterior.
  doctrine_reference: Translation philosophy §6
- issue: Cómo reproducir el final verbal de lְהִשְׁתַּבֵּחַ + בִּתְהִלָּתֶךָ
  english_pob_reading: glory in your praise
  chosen_spanish_reading: nos gloriemos en tu alabanza
  alternative_spanish_readings:
  - nos jactemos en tu alabanza
  - exultemos en tu alabanza
  rationale: El hebreo comunica participación gozosa y autoimplicación en la alabanza a Dios. «Nos gloriemos» conserva el valor positivo de «glory in» y mantiene la tensión retórica entre la acción humana y el objeto divino de la alabanza.
  doctrine_reference: Translation philosophy §6
translation_notes:
  revision_awareness: La redacción española sigue el último ajuste auditado del inglés al mantener un vocativo solemne («oh»/equivalente funcional) y conserva la distinción léxica entre «salvar» y «librar» para reflejar ישׁע frente a נצל. También respeta la lectura ampliada de גוים como «naciones» en lugar de «gentiles», conforme al contexto de 1 Crónicas 16.
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico moderno y digno, evitando fórmulas arcaizantes donde no aportan fidelidad.
  - Se conservó la diferenciación entre «sálvanos» y «líbranos» para no perder la distinción hebrea entre ישׁע y נצל.
  - «Santo nombre» y «alabanza» se eligieron como equivalentes estables y transparentes para la audiencia hispanohablante.
  - Las notas al pie marcan únicamente alternativas relevantes que la traducción inglesa ya documentaba o que la españolización vuelve visibles.
