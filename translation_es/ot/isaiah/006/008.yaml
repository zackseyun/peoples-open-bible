translation:
  language: es
  text: 'Entonces oí la voz de Yahvé que decía[a]: «¿A quién enviaré, y quién irá por nosotros?». Y dije: «Heme aquí[b]. Envíame».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo dice literalmente «por nosotros». El plural puede reflejar el contexto del consejo celestial; algunos lectores cristianos también ven aquí una resonancia canónica con la revelación trinitaria posterior. El texto mismo no especifica el referente.
    reason: theological_note
  - marker: b
    text: 'O: «Aquí estoy». El modismo hebreo expresa disposición y disponibilidad.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֶשְׁמַע
  english_pob_choice: Then I heard
  chosen_spanish: Entonces oí
  alternatives_spanish:
  - Y oí
  - Luego oí
  lexicon: HALOT
  rationale: El wayyiqtol avanza la secuencia narrativa; «entonces» conserva ese valor consecutivo de forma natural en español, y «oí» reproduce de manera directa שׁמע en este contexto.
- source_word: קֹול
  english_pob_choice: voice
  chosen_spanish: voz
  alternatives_spanish:
  - sonido
  lexicon: HALOT
  rationale: Dado que sigue un discurso directo introducido por «que decía», «voz» es la opción más precisa y natural en español para un sonido articulado.
- source_word: אֲדֹנָי
  english_pob_choice: the Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  - el Dueño
  lexicon: HALOT
  rationale: Aunque el hebreo tiene la forma de tratamiento divina אֲדֹנָי, en el texto base bíblico se refiere a Dios; conforme a la terminología del proyecto, se rinde como «Yahvé» en el texto principal en lugar de la convención de ocultamiento «SEÑOR».
- source_word: אֹמֵר
  english_pob_choice: saying
  chosen_spanish: que decía
  alternatives_spanish:
  - diciendo
  - al decir
  lexicon: HALOT
  rationale: En español, tras «la voz de Yahvé», una subordinada relativa con «que decía» expresa con claridad el discurso en curso sin forzar un calco participial.
- source_word: מִי אֶשְׁלַח
  english_pob_choice: Whom shall I send
  chosen_spanish: ¿A quién enviaré?
  alternatives_spanish:
  - ¿A quién mandaré?
  lexicon: HALOT
  rationale: «A quién» refleja el objeto directo del verbo de envío y mantiene un registro natural y solemne; «enviaré» conserva el valor volitivo/interrogativo del hebreo.
- source_word: וּמִי יֵלֶךְ לָנוּ
  english_pob_choice: and who will go for us
  chosen_spanish: ¿y quién irá por nosotros?
  alternatives_spanish:
  - ¿y quién irá para nosotros?
  - ¿y quién irá en favor de nosotros?
  lexicon: HALOT
  rationale: Se conserva el plural de la primera persona en «por nosotros» para no resolver la referencia del hebreo. «Por» comunica con naturalidad la idea de representación o misión sin especificar más de lo que el texto dice.
- source_word: הִנְנִי
  english_pob_choice: Here am I
  chosen_spanish: Heme aquí
  alternatives_spanish:
  - Aquí estoy
  - Aquí me tienes
  lexicon: HALOT
  rationale: La fórmula idiomática expresa disponibilidad y auto-presentación solemne; «heme aquí» es una equivalencia tradicional y digna en español bíblico, más cercana al tono profético que una expresión coloquial.
- source_word: שְׁלָחֵנִי
  english_pob_choice: Send me
  chosen_spanish: Envíame
  alternatives_spanish:
  - Mándame
  lexicon: HALOT
  rationale: 'El imperativo con sufijo de primera persona se traduce como ruego/ofrecimiento directo: «Envíame». Mantiene el tono de disposición voluntaria del contexto.'
theological_decisions:
- issue: Plural en la frase divina «por nosotros»
  english_pob_reading: Retain the plural 'for us' in the main text without resolving its referent.
  chosen_spanish_reading: Conservar «por nosotros» sin identificar a los referidos.
  alternative_spanish_readings:
  - por mí
  - por el consejo celestial
  - por la Trinidad
  rationale: El hebreo conserva explícitamente la primera persona plural. La traducción debe mantener esa tensión teológica y literaria sin reducirla a singular ni imponer una explicación que el texto no desarrolla.
  doctrine_reference: Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: 'Coincide con la última revisión del inglés POB: no se requieren cambios adicionales; se mantiene el acuerdo alto del control cruzado.'
  spanish_consistency_notes:
  - Se conserva «Yahvé» conforme al estándar del proyecto para el nombre divino.
  - Se mantiene «nosotros» en la cita divina para respetar la forma plural del hebreo sin aclararla.
  - «Heme aquí» preserva el tono solemne del llamado profético y evita una colación demasiado coloquial.
