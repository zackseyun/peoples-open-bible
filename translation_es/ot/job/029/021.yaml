translation:
  language: es
  text: Me escuchaban y esperaban[a], y callaban ante mi consejo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Alternativamente: «me escuchaban y esperaban con expectativa». El verbo puede llevar el matiz de esperar con esperanza o expectativa.'
    reason: lexical_alternative
  - marker: b
    text: 'Alternativamente: «callaban por mi consejo». La frase final también puede entenderse como silencio en respuesta al consejo de Job.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לִי
  english_pob_choice: to me
  chosen_spanish: me
  alternatives_spanish:
  - a mí
  - para mí
  lexicon: HALOT
  rationale: El dativo de interés/dirección en español se expresa con el objeto indirecto "me"; en este contexto, "me escuchaban" comunica de forma natural que Job era el destinatario de la escucha.
- source_word: שָׁמְעוּ
  english_pob_choice: listened
  chosen_spanish: escuchaban
  alternatives_spanish:
  - oían
  - escucharon
  lexicon: HALOT
  rationale: El verbo no indica mera percepción auditiva, sino atención a la voz o consejo de Job. "Escuchaban" conserva esa atención continua mejor que "oían" y evita cerrar indebidamente el aspecto del hebreo.
- source_word: וְיִחֵלּוּ
  english_pob_choice: waited
  chosen_spanish: esperaban
  alternatives_spanish:
  - aguardaban
  - tenían esperanza
  lexicon: HALOT
  rationale: La forma hebrea puede implicar esperar con expectativa. En español, "esperaban" transmite bien esa expectativa sin convertirla en una abstracción más doctrinal como "tenían esperanza".
- source_word: וְיִדְּמ֗וּ
  english_pob_choice: kept silent
  chosen_spanish: callaban
  alternatives_spanish:
  - guardaban silencio
  - permanecían callados
  lexicon: HALOT
  rationale: El verbo denota silencio o quietud. "Callaban" mantiene el paralelismo y el sentido de silencio reverente o atento; "guardaban silencio" es una alternativa válida, pero algo más explicativa.
- source_word: לְמוֹ
  english_pob_choice: for
  chosen_spanish: ante
  alternatives_spanish:
  - por
  - para
  lexicon: HALOT
  rationale: En esta construcción poética, la relación no es solo causal sino de respuesta silenciosa frente al consejo de Job. "Ante" expresa mejor esa postura de deferencia que un simple "por" o "para".
- source_word: עֲצָתִי
  english_pob_choice: my counsel
  chosen_spanish: mi consejo
  alternatives_spanish:
  - mi consejo sabio
  - mi asesoramiento
  lexicon: HALOT
  rationale: עֵצָה en un marco sapiencial puede ser "consejo" o "counsel". "Consejo" es claro y digno en español; "asesoramiento" suena demasiado técnico y moderno. "Sabio" no aparece en el hebreo y por eso se evita.
translation_notes:
  revision_awareness: Base alineada con el consenso alto del audit trail inglés; se preservó la triple secuencia escuchar/esperar/silencio y se mantuvo la ambigüedad del último miembro con una nota alternativa.
  spanish_consistency_notes:
  - Se usó "escuchaban" para שׁמע por el valor de atención receptiva, no como simple audición.
  - Se prefirió "esperaban" para יחל por el matiz de expectativa reconocido en el audit trail.
  - '"Consejo" se mantuvo para עֵצָה como término sapiencial elevado, coherente con el registro de Job.'
