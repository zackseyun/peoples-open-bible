revisions:
- from: 'Hijo de hombre[a], tus hermanos, tus hermanos, los hombres de tu redención, y toda la casa de Israel, toda ella: a quienes los habitantes de Jerusalén les dijeron: «Aparteos de Yahvé[b]; esta tierra nos ha sido dada en posesión».'
  to: '«Hijo de hombre[a], tus hermanos, tus hermanos, los hombres de tu redención, y toda la casa de Israel, toda ella: estos son aquellos a quienes los habitantes de Jerusalén les dijeron: “Aléjense de Yahvé; esta tierra nos ha sido dada como posesión[b]”».'
  rationale: 'Se corrige la sintaxis del relativo para que el español sea natural y fiel al antecedente colectivo del hebreo, se mueve la nota [b] al sintagma correcto («como posesión»), y se ajusta el imperativo a una forma más clara en español neutro. Se conservan las decisiones léxicas principales del audit trail: «Hijo de hombre», la repetición «tus hermanos, tus hermanos», «los hombres de tu redención», «casa de Israel» y «Yahvé».'
  reviewer_model: gpt-5.4
