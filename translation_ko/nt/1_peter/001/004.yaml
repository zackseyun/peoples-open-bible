base_translation:
  language: en
  yaml_path: translation/nt/1_peter/001/004.yaml
  text: 'into an inheritance imperishable and undefiled and unfading, kept in the heavens for you,'
translation:
  language: ko
  text: '곧 썩지 아니하고 더럽지 아니하고 시들지 아니하는 유업[a], 여러분을 위하여 하늘에 간직되어 있는 유업에 이르게 하셨습니다.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 헬라어는 ἄφθαρτος(썩지 아니하는), ἀμίαντος(더럽혀지지 아니하는), ἀμάραντος(시들지 아니하는) 세 형용사가 두운(α-)으로 묶여 있다. 한국어에서는 동일 두운을 살리기 어려워 「~지 아니하는」 반복으로 리듬을 보존한다.
    reason: lexical_alternative
lexical_decisions:
- source_word: κληρονομίαν
  english_pob_choice: inheritance
  chosen_korean: 유업
  alternatives_korean:
  - 기업
  - 상속
  lexicon: BDAG
  rationale: 한국 성서 전통에서 굳은 「유업」을 채택. 「기업」도 가능하지만 사업적 어감이 끼어들 수 있다.
- source_word: ἄφθαρτον
  english_pob_choice: imperishable
  chosen_korean: 썩지 아니하는
  alternatives_korean:
  - 불멸의
  - 부패하지 않는
  lexicon: BDAG
  rationale: 1:18, 1:23과의 일관성을 위해 「썩지 아니하는」으로 통일한다.
- source_word: ἀμίαντον
  english_pob_choice: undefiled
  chosen_korean: 더럽지 아니하는
  alternatives_korean:
  - 더럽혀지지 아니하는
  - 오염되지 않은
  lexicon: BDAG
  rationale: 의례적·도덕적 「오염되지 않음」을 한국어로 가장 평이하게 옮긴다.
- source_word: ἀμάραντον
  english_pob_choice: unfading
  chosen_korean: 시들지 아니하는
  alternatives_korean:
  - 쇠하지 아니하는
  lexicon: BDAG
  rationale: 5:4 ἀμαράντινος와 짝지어 식물적 이미지(시들지 않는 꽃·풀)를 보존하기 위해 「시들지 아니하는」으로 옮긴다.
- source_word: τετηρημένην ἐν οὐρανοῖς εἰς ὑμᾶς
  english_pob_choice: kept in the heavens for you
  chosen_korean: 여러분을 위하여 하늘에 간직되어 있는
  alternatives_korean:
  - 너희를 위하여 하늘에 예비된
  - 하늘에 보존된 너희 몫의
  lexicon: BDAG
  rationale: 완료 수동분사의 「이미 지속되는 보관」을 「간직되어 있는」으로 옮기며, εἰς ὑμᾶς를 분명한 수혜자 표지로 살린다.
