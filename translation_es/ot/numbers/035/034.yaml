review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido del hebreo: prohibición de no contaminar/volver impura la tierra, doble énfasis en que Yahvé habita en medio de la tierra y del pueblo, y preserva correctamente Yahvé y los hijos de Israel. Sin embargo, la forma verbal española ''No contaminarán'' no corresponde al singular masculino hebreo תְטַמֵּא (''no contaminarás'' / ''no contamines''), y la nota al pie actual no reproduce la alternativa del inglés en el lugar correcto.'
  spanish_quality_summary: El español es generalmente claro y digno. 'Habitan/habito' funciona bien para la repetición de שכן. No obstante, conviene ajustar la concordancia verbal al singular y reparar la nota al pie, que ahora repite la misma frase del texto principal en vez de ofrecer la alternativa idiomática pertinente para 'los hijos de Israel'.
  glossary_alignment: 'Buena alineación con el glosario del proyecto: יְהוָה -> ''Yahvé'' correcto; שֹׁכֵן -> ''habito'' aceptable; בני ישראל -> ''los hijos de Israel'' correcto en el texto principal. La principal divergencia es más gramatical que terminológica: תְטַמֵּא exige segunda persona singular en este versículo. ''Contaminar'' es defendible, aunque ''hacer impura'' o ''profanar'' no serían mejores aquí; se puede mantener.'
  issues:
  - severity: high
    issue: 'La forma verbal inicial está en plural: ''No contaminarán''.'
    rationale: 'El hebreo תְטַמֵּא es Piel imperfecto 2ms, por lo que corresponde a singular masculino: ''no contaminarás'' o en estilo exhortativo ''no contamines''. El plural altera la referencia gramatical del mandato.'
  - severity: medium
    issue: La nota [a] está mal orientada y no corresponde al punto de variación del texto fuente/POB.
    rationale: La nota inglesa ofrece una alternativa idiomática para 'the sons of Israel' ('among the Israelites' / 'among the children of Israel'), no para 'en la que habitan'. En español, la nota debe anclarse en 'los hijos de Israel' y ofrecer la alternativa idiomática equivalente.
  revised_spanish_text: No contaminarás la tierra en la que habitas, en medio de la cual yo habito, porque yo, Yahvé, habito en medio de los hijos de Israel[a].
  revised_footnotes:
  - marker: a
    text: O, más idiomáticamente, 'entre los israelitas' o 'entre los hijos de Israel'.
    reason: lexical_alternative
  revision_rationale: Se corrige la forma verbal a singular para reflejar fielmente תְטַמֵּא (2ms) y se reubica/reformula la nota al pie para que corresponda a בני ישראל, siguiendo el rastro de auditoría inglés y manteniendo la literalidad principal con una alternativa idiomática en nota. No se requiere adjudicación adicional, porque la corrección es directa y no doctrinalmente disputada.
