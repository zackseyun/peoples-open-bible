translation:
  language: es
  text: Y los cinco mil restantes de ancho, junto[a] a los veinticinco mil, serán tierra común[b] para la ciudad, para habitación y para terreno abierto[c]; y la ciudad estará en medio de ella.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a lo largo de los veinticinco mil». La expresión hebrea dice literalmente «sobre la faz de» o «a la faz de», una formulación espacial que puede traducirse de varias maneras muy cercanas.
    reason: lexical_alternative
  - marker: b
    text: «Común» traduce un término hebreo que indica tierra no santa ni consagrada, en contraste con los lotes consagrados que la rodean.
    reason: theological_note
  - marker: c
    text: O «terreno de pasto»; el término puede entenderse como tierra abierta alrededor de la ciudad para uso común, posiblemente incluso para pastoreo.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַנּוֹתָר
  english_pob_choice: the remaining
  chosen_spanish: restantes
  alternatives_spanish:
  - que quedan
  - el resto
  lexicon: HALOT
  rationale: El participio comunica lo que queda después de la asignación previa. «Restantes» mantiene la idea de remanente y suena natural en español sin perder el sentido contable del texto.
- source_word: בָּרֹחַב
  english_pob_choice: in width
  chosen_spanish: de ancho
  alternatives_spanish:
  - en anchura
  - en cuanto al ancho
  lexicon: HALOT
  rationale: En un contexto de medidas, «de ancho» expresa con claridad la dimensión horizontal y evita una construcción más rígida.
- source_word: עַל־פְּנֵי
  english_pob_choice: along the face of
  chosen_spanish: a lo largo de la faz de
  alternatives_spanish:
  - junto a
  - al lado de
  - frente a
  lexicon: HALOT
  rationale: La expresión hebrea es espacialmente concreta y algo idiomática. «A lo largo de la faz de» conserva mejor la imagen formal del original que una paraprasis más libre.
- source_word: חֲמִשָּׁה וְעֶשְׂרִים אֶלֶף
  english_pob_choice: the twenty-five thousand
  chosen_spanish: los veinticinco mil
  alternatives_spanish:
  - los veinticinco mil codos
  - los veinticinco mil unidades
  lexicon: HALOT
  rationale: El número remite al tramo ya descrito; en esta cláusula el hebreo no repite la unidad. En español también conviene no suplirla en el texto principal para no sobreespecificar lo que el hebreo deja implícito.
- source_word: חֹל
  english_pob_choice: common land
  chosen_spanish: tierra común
  alternatives_spanish:
  - tierra profana
  - tierra ordinaria
  - tierra secular
  lexicon: HALOT
  rationale: חֹל contrasta con lo santo/sagrado. «Tierra común» reproduce bien ese contraste cultual sin cargar el término con matices peyorativos que «profana» podría sugerir en español.
- source_word: לָעִיר
  english_pob_choice: for the city
  chosen_spanish: para la ciudad
  alternatives_spanish:
  - de la ciudad
  - al servicio de la ciudad
  lexicon: HALOT
  rationale: El lamed marca destino o asignación. «Para la ciudad» es la forma más directa y fiel en español.
- source_word: לְמוֹשָׁב
  english_pob_choice: for dwelling
  chosen_spanish: para habitación
  alternatives_spanish:
  - para morada
  - para asentamiento
  lexicon: HALOT
  rationale: מוֹשָׁב designa lugar de habitación o residencia. «Habitación» mantiene el sustantivo abstracto en un registro sobrio y bíblico, sin volverlo arcaico.
- source_word: וּלְמִגְרָשׁ
  english_pob_choice: and for open land
  chosen_spanish: y para terreno abierto
  alternatives_spanish:
  - y para espacio abierto
  - y para pastizal
  - y para tierra abierta
  lexicon: HALOT
  rationale: מִגְרָשׁ puede referirse al espacio abierto alrededor de la ciudad, a veces con uso comunal o de pasto. «Terreno abierto» preserva esa amplitud semántica sin precisar más de lo que el contexto garantiza.
- source_word: בְּתוֹכָהּ
  english_pob_choice: in its midst
  chosen_spanish: en medio de ella
  alternatives_spanish:
  - en su interior
  - en su centro
  lexicon: HALOT
  rationale: «En medio de ella» transmite de forma natural la idea de que la ciudad queda situada centralmente dentro del área asignada, conservando el sentido espacial del hebreo.
theological_decisions:
- issue: Contraste cultual entre חֹל y las porciones consagradas
  english_pob_reading: common land renders a Hebrew term meaning land that is not holy or sacred, in contrast to the consecrated allotments described around it.
  chosen_spanish_reading: tierra común
  alternative_spanish_readings:
  - tierra profana
  - tierra secular
  rationale: La decisión conserva el contraste entre lo consagrado y lo no consagrado sin introducir un tono despectivo. En español bíblico, «común» comunica bien la oposición cultual del término hebreo.
  doctrine_reference: Distinción bíblica entre lo santo y lo común en la distribución del territorio sagrado.
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el pasaje fuente; se mantiene un acuerdo alto con el audit trail inglés y no hay cambios sustanciales respecto de la lectura base.
  spanish_consistency_notes:
  - Se preservó «Yahvé» solo cuando el hebreo lo exige explícitamente; este versículo no lo contiene, por lo que no aparece.
  - Se evitó «SEÑOR» y también «profana» para no borrar la distinción cultual documentada por el audit trail.
  - Se mantuvo un registro sobrio y topográfico, coherente con la serie de medidas y asignaciones de Ezequiel 48.
