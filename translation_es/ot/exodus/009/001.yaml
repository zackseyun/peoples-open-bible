translation:
  language: es
  text: 'Entonces Yahvé dijo a Moisés[a]: «Preséntate ante Faraón y háblale: “Así dice Yahvé, el Dios de los hebreos: Deja ir a mi pueblo, para que me sirvan”».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «me adoren». El verbo hebreo puede referirse al servicio rendido a Dios, incluido el culto, pero es más amplio que la adoración litúrgica sola.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre propio del pacto, conforme al criterio del proyecto para el Tetragrámaton. «Yahvé» evita sustituir el nombre por un título y corresponde al valor transliterado del hebreo.
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Y entonces ... dijo
  lexicon: HALOT
  rationale: La forma narrativa con waw consecutiva avanza la acción. «Entonces» comunica bien la secuencia en español moderno sin perder el movimiento del relato.
- source_word: בֹּא אֶל־פַּרְעֹה
  english_pob_choice: Go in to Pharaoh
  chosen_spanish: Entra a Faraón
  alternatives_spanish:
  - Ve a Faraón
  - Entra ante Faraón
  lexicon: HALOT
  rationale: El hebreo sugiere ir/entrar a la presencia de Faraón. «Entra a Faraón» conserva mejor el matiz idiomático que un simple «ve a». En español se evita la calca pesada «entra en» y se mantiene el sentido de acercarse a su presencia.
- source_word: וְדִבַּרְתָּ אֵלָיו
  english_pob_choice: and speak to him
  chosen_spanish: y háblale
  alternatives_spanish:
  - y dile
  - y comunícale
  lexicon: HALOT
  rationale: דבר conserva el valor de hablar/dirigir un mensaje. «Háblale» es natural en español y refleja la instrucción de comunicar el mensaje sin estrecharlo a una fórmula menos directa.
- source_word: כֹּה אָמַר
  english_pob_choice: Thus says
  chosen_spanish: Así dice
  alternatives_spanish:
  - Esto dice
  - Así ha dicho
  lexicon: HALOT
  rationale: Se mantiene la fórmula profética estándar con su fuerza declarativa. «Así dice» es la forma más transparente y reconocible en español para este encabezado oracular.
- source_word: אֱלֹהֵי הָעִבְרִים
  english_pob_choice: the God of the Hebrews
  chosen_spanish: el Dios de los hebreos
  alternatives_spanish:
  - el Dios de los israelitas
  lexicon: HALOT
  rationale: El hebreo dice literalmente «hebreos», no «israelitas». Se preserva esa designación étnica para no suavizar el término del texto fuente.
- source_word: שַׁלַּח אֶת־עַמִּי
  english_pob_choice: Let my people go
  chosen_spanish: Deja ir a mi pueblo
  alternatives_spanish:
  - Suelta a mi pueblo
  - Libera a mi pueblo
  lexicon: HALOT
  rationale: El imperativo שׁלח implica soltar/enviar fuera. «Deja ir a mi pueblo» mantiene el sentido exhortativo y la resonancia clásica del pasaje sin depender de una paráfrasis excesiva.
- source_word: וְיַעַבְדֻנִי
  english_pob_choice: so that they may serve me
  chosen_spanish: para que me sirvan
  alternatives_spanish:
  - y me sirvan
  - para que me adoren
  lexicon: HALOT
  rationale: עבד puede abarcar servicio religioso y obediencia de pacto, no solo culto litúrgico. «Me sirvan» preserva esa amplitud mejor que «me adoren», que estrecharía indebidamente el término.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: Se sigue el criterio confesional y transliterado del proyecto. «Yahvé» conserva el nombre personal de Dios y evita la sustitución por un título, manteniendo la transparencia frente al hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Alcance semántico de וְיַעַבְדֻנִי
  english_pob_reading: serve me
  chosen_spanish_reading: me sirvan
  alternative_spanish_readings:
  - me adoren
  - me rindan culto
  rationale: El verbo עבד abarca servicio, lealtad y también servicio cultual. «Me sirvan» conserva la amplitud semántica y no reduce el mandato a una práctica litúrgica exclusiva.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, §5
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y el expediente inglés auditado. Se conservó la fórmula narrativa, el nombre divino «Yahvé», la designación «hebreos» y la amplitud de עבד con una nota alternativa equivalente a la del POB en inglés.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה.
  - Se conserva «Faraón» como forma castellana estable para פַּרְעֹה.
  - Se mantiene «hebreos» y no «israelitas» para respetar el hebreo explícito.
  - La cita directa se ha puntuado según norma española con comillas angulares y cierre interno adecuado.
