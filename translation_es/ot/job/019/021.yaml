translation:
  language: es
  text: Tengan piedad de mí[a], tengan piedad de mí, ustedes mis amigos[b], porque la mano de Dios me ha herido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Sean compasivos conmigo» o «Muéstrenme misericordia».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «la mano de Dios me ha tocado»; el modismo aquí implica un impacto dañino, por eso se traduce «me ha herido».'
    reason: lexical_alternative
lexical_decisions:
- source_word: חָנֻּנִי
  english_pob_choice: Have pity on me
  chosen_spanish: Tened piedad de mí
  alternatives_spanish:
  - Tened gracia de mí
  - Mostradme misericordia
  lexicon: HALOT
  rationale: El hebreo es una súplica imperativa plural dirigida a los amigos de Job. «Tened piedad de mí» conserva el tono personal y afectivo de la petición sin volverla demasiado técnica; en español suena natural y comunica compasión, que es el núcleo pragmático que la POB inglesa destacó.
- source_word: חָנֻּנִי (repeated)
  english_pob_choice: have pity on me
  chosen_spanish: tened piedad de mí
  alternatives_spanish:
  - tened gracia de mí
  - mostradme misericordia
  lexicon: HALOT
  rationale: Se mantiene la repetición para preservar la intensidad emocional y la insistencia poética del verso. La repetición no se suaviza ni se condensa.
- source_word: רֵעַי
  english_pob_choice: you my friends
  chosen_spanish: vosotros mis amigos
  alternatives_spanish:
  - mis compañeros
  - mis allegados
  lexicon: HALOT
  rationale: «רֵעַ» aquí designa amigos o compañeros cercanos. En español, «vosotros mis amigos» reproduce el vocativo directo de la forma hebrea y conserva la apelación frontal de Job. Se evita «compañeros» porque atenúa la carga relacional que el contexto pide.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón de la súplica. «Porque» es la opción más clara y natural en español para una cláusula causal de este tipo.
- source_word: יַד אֱלוֹהַּ
  english_pob_choice: the hand of God
  chosen_spanish: la mano de Dios
  alternatives_spanish:
  - la mano de Dios
  - la mano divina
  lexicon: HALOT
  rationale: Se conserva la metáfora hebrea de la mano como imagen de acción/poder divino. «La mano de Dios» mantiene la estructura y no aplana la figuración a una explicación abstracta.
- source_word: אֱלוֹהַּ
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - Dios Todopoderoso
  lexicon: HALOT
  rationale: אֱלוֹהַּ es la forma poética singular para Dios en Job. «Dios» es el equivalente directo y suficiente; no hay base inmediata para ampliar el título.
- source_word: נָגְעָה בִּי
  english_pob_choice: has struck me
  chosen_spanish: me ha herido
  alternatives_spanish:
  - me ha tocado
  - me ha afligido
  lexicon: HALOT
  rationale: El verbo נגע con ב puede significar tocar, alcanzar, herir o afligir según el contexto. Aquí el contexto de sufrimiento extremo hace que «me ha herido» comunique mejor el impacto dañino que la POB inglesa preservó con «has struck me», sin perder la imagen de contacto/alcance implícita en el hebreo.
theological_decisions:
- issue: Agencia divina del sufrimiento de Job
  english_pob_reading: for the hand of God has struck me
  chosen_spanish_reading: porque la mano de Dios me ha herido
  alternative_spanish_readings:
  - porque la mano de Dios me ha tocado
  - porque la mano de Dios me ha afligido
  rationale: El hebreo atribuye de manera explícita y no suavizada el sufrimiento de Job a la acción de Dios mediante un modismo corporal. La traducción conserva esa tensión teológica sin resolverla ni atenuarla, en línea con la lectura inglesa auditada.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el paquete fuente; el último pase editorial indicó que no hacían falta cambios y el control cruzado señaló alta concordancia.
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלוֹהַּ, siguiendo la decisión auditada del inglés y el uso poético del libro de Job.
  - Se conserva la repetición del mandato para reproducir la urgencia retórica del hebreo.
  - «La mano de Dios» conserva la metáfora bíblica sin explicitarla en exceso; «me ha herido» recoge el efecto dañino que el contexto exige.
