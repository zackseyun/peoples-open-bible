revisions:
- from: Después de dar gracias y de exhortarlos de antemano también para el futuro a mostrarse bien dispuestos hacia la nación[a], llegaron a Jerusalén, cuando la fiesta de las semanas estaba próxima.
  to: Después de dar gracias y de exhortarlos de antemano también para el futuro a estar bien dispuestos hacia la nación[a], llegaron a Jerusalén, mientras se acercaba la fiesta de las semanas.
  rationale: Se ajustó «mostrarse» a «estar» para reflejar con más precisión εὐμενεῖς εἶναι como disposición favorable, no como mera manifestación externa. Se cambió «cuando ... estaba próxima» por «mientras se acercaba ...» para representar mejor el genitivo absoluto y el sentido de inminencia de οὔσης ὑπογύου, con un español más natural. No se requieren cambios en la nota ni en la terminología festiva principal.
