translation:
  language: es
  text: 'E inclinó el corazón de todo hombre de Judá[a] como un solo hombre[b], y enviaron mensaje al rey: «Vuelve, tú y todos tus siervos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «volvió el corazón de todo hombre de Judá»; el modismo hebreo se refiere a ganar o inclinar su lealtad o disposición.
    reason: lexical_alternative
  - marker: b
    text: «Como un solo hombre» es un modismo hebreo que significa actuar unidos o de común acuerdo.
    reason: cultural_note
lexical_decisions:
- source_word: וַיַּט
  english_pob_choice: inclined
  chosen_spanish: inclinó
  alternatives_spanish:
  - torció
  - volvió
  - ganó para sí
  lexicon: HALOT
  rationale: El hebreo נָטָה con «corazón» expresa influir la disposición o lealtad. «Inclinó» conserva esa imagen idiomática en español y sigue de cerca la revisión inglesa que prefirió una forma más formal y lexicamente ajustada que «swayed».
- source_word: לְבַב
  english_pob_choice: heart
  chosen_spanish: corazón
  alternatives_spanish:
  - mente
  - voluntad
  lexicon: HALOT
  rationale: «Corazón» preserva el antropologismo hebreo para la sede interna de decisiones y lealtad. «Mente» o «voluntad» explicitan demasiado una sola faceta y reducen la amplitud del término.
- source_word: כָּל אִישׁ יְהוּדָה
  english_pob_choice: every man of Judah
  chosen_spanish: todo hombre de Judá
  alternatives_spanish:
  - todos los hombres de Judá
  - cada hombre de Judá
  lexicon: HALOT
  rationale: La construcción distributiva masculina se refleja con «todo hombre». Mantiene el matiz masculino del hebreo y la referencia a los actores políticos del pasaje sin neutralizar el género del texto fuente.
- source_word: כְּאִישׁ אֶחָד
  english_pob_choice: as one man
  chosen_spanish: como un solo hombre
  alternatives_spanish:
  - como un hombre
  - con un solo acuerdo
  lexicon: HALOT
  rationale: Es un modismo de acción unida. «Como un solo hombre» conserva la imagen hebrea y es idiomático en español; evita una paráfrasis más interpretativa.
- source_word: וַיִּשְׁלְחוּ אֶל הַמֶּלֶךְ
  english_pob_choice: they sent word to the king
  chosen_spanish: y enviaron al rey
  alternatives_spanish:
  - y le enviaron un mensaje al rey
  - y enviaron palabra al rey
  lexicon: HALOT
  rationale: El hebreo omite el objeto de «enviaron» y se sobreentiende una petición/mensaje. En español, «enviaron al rey» permite elipsis natural; el contexto inmediato aclara que se trata de un ruego verbal, sin añadir un sustantivo no explícito en la forma hebrea.
- source_word: שׁוּב
  english_pob_choice: Return
  chosen_spanish: Vuelve
  alternatives_spanish:
  - Regresa
  - Vuelve atrás
  lexicon: HALOT
  rationale: En el imperativo directo a David, «Vuelve» es natural y fiel. «Regresa» también es posible, pero «Vuelve» conserva mejor el tono breve y urgente del pedido.
- source_word: עֲבָדֶיךָ
  english_pob_choice: your servants
  chosen_spanish: tus siervos
  alternatives_spanish:
  - tus servidores
  - tus sirvientes
  lexicon: HALOT
  rationale: En contexto real, עֲבָדִים puede abarcar subordinados del rey, pero la elección POB de «servants» se puede verter como «siervos» para conservar el registro bíblico y la relación de subordinación sin suavizarlo demasiado. «Servidores» o «sirvientes» cambian el matiz de dependencia.
translation_notes:
  revision_awareness: La revisión inglesa reciente sustituyó «swayed» por «inclined» para ajustarse mejor al valor léxico de נָטָה con «heart». La versión española sigue esa línea con «inclinó» y preserva la lectura idiomática del conjunto sin expandir innecesariamente el sentido. No se detectan tensiones doctrinales en este versículo.
  spanish_consistency_notes:
  - Se mantiene «Judá» como nombre propio del territorio y del pueblo político.
  - Se conserva el registro bíblico de «siervos» para עֲבָדֶיךָ, en coherencia con la terminología POB para subordinación.
  - 'La puntuación refleja el discurso directo final del hebreo: una orden breve y urgente al rey.'
