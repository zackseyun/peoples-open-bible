translation:
  language: es
  text: Solo teman a Yahvé y sírvanle en verdad con todo su corazón, porque consideren qué grandes cosas ha hecho por ustedes[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con ustedes»; el hebreo dice «con ustedes».
    reason: lexical_alternative
lexical_decisions:
- source_word: אַךְ
  english_pob_choice: Only
  chosen_spanish: Solo
  alternatives_spanish:
  - Solamente
  - Solo que
  - Tan solo
  lexicon: HALOT
  rationale: Aquí אַךְ funciona como partícula exhortativa restrictiva. «Solo» conserva el énfasis de exclusividad y suena natural en español bíblico moderno.
- source_word: יְרָאוּ
  english_pob_choice: fear
  chosen_spanish: teman
  alternatives_spanish:
  - reverencien
  - tengan temor de
  lexicon: HALOT
  rationale: El verbo ירא en este contexto pactal incluye temor reverente y obediencia. «Teman» mantiene la fuerza idiomática y la gravedad teológica sin suavizarla.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino del Tetragrámaton como «Yahvé», conforme al criterio del proyecto, evitando la sustitución por un título.
- source_word: וַעֲבַדְתֶּם אֹתוֹ
  english_pob_choice: and serve him
  chosen_spanish: sírvanle
  alternatives_spanish:
  - y sírvanlo
  - y adórenle
  - y sirvan a él
  lexicon: HALOT
  rationale: עבד se traduce normalmente como «servir». En español, el clítico enclítico hace la frase más fluida y mantiene el sentido de servicio leal a Dios.
- source_word: בֶּאֱמֶת
  english_pob_choice: in truth
  chosen_spanish: en verdad
  alternatives_spanish:
  - con verdad
  - fielmente
  - en fidelidad
  lexicon: HALOT
  rationale: El hebreo puede expresar verdad, sinceridad o fidelidad. «En verdad» preserva el paralelismo con el texto base y permite incluir sinceridad y lealtad sin añadir una interpretación más estrecha.
- source_word: בְּכָל לְבַבְכֶם
  english_pob_choice: with all your heart
  chosen_spanish: con todo su corazón
  alternatives_spanish:
  - con todo el corazón de ustedes
  - con el corazón entero
  lexicon: HALOT
  rationale: Es un modismo hebreo de entrega interior total. «Con todo su corazón» es natural y fiel al uso bíblico en español.
- source_word: רְאוּ
  english_pob_choice: see
  chosen_spanish: vean
  alternatives_spanish:
  - miren
  - consideren
  - observen
  lexicon: HALOT
  rationale: El imperativo es visual y reflexivo a la vez. «Vean» conserva la relación directa con el hebreo y funciona bien como llamada a reconocer lo que Yahvé ha hecho.
- source_word: אֵת אֲשֶׁר הִגְדִּל
  english_pob_choice: what great things he has done
  chosen_spanish: qué grandes cosas ha hecho
  alternatives_spanish:
  - lo mucho que ha engrandecido
  - cómo ha hecho grandes cosas
  lexicon: HALOT
  rationale: El hiphil de גדל aquí se entiende idiomáticamente como «hacer grandes cosas». «Qué grandes cosas ha hecho» reproduce bien el sentido sin literalidad torpe.
- source_word: עִמָּכֶם
  english_pob_choice: for you / with you
  chosen_spanish: con ustedes
  alternatives_spanish:
  - para ustedes
  - entre ustedes
  - a favor de ustedes
  lexicon: HALOT
  rationale: El hebreo dice literalmente «con ustedes». En español, «con ustedes» preserva la forma de la frase y deja abierta la idea de acción divina a favor de Israel, como indica el contexto.
theological_decisions:
- issue: Cómo renderizar בֶּאֱמֶת en la exhortación
  english_pob_reading: in truth
  chosen_spanish_reading: en verdad
  alternative_spanish_readings:
  - fielmente
  - con sinceridad
  - en fidelidad
  rationale: La expresión hebrea puede abarcar verdad, sinceridad y fidelidad de pacto. «En verdad» deja abiertas esas capas semánticas sin reducir el término a una sola dimensión ética.
  doctrine_reference: 'Hebreo bíblico: אֱמֶת como verdad/fidelidad en contexto de pacto'
- issue: Relación entre עִמָּכֶם y el sentido de beneficio
  english_pob_reading: for you / with you
  chosen_spanish_reading: con ustedes
  alternative_spanish_readings:
  - para ustedes
  - a favor de ustedes
  rationale: El texto hebreo usa «con ustedes», mientras que el contexto permite entender implícitamente el beneficio para Israel. «Con ustedes» mantiene la base textual y no borra la posible tensión entre literalidad y sentido contextual.
  doctrine_reference: Sintaxis y semántica de עִם en contexto narrativo-teológico
- issue: Nombre divino del Tetragrámaton
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: Se conserva el nombre propio divino en vez de sustituirlo por un título. Esto sigue la convención del proyecto y evita ocultar el dato del texto hebreo.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: 'El texto inglés auditado pasó de «faithfully» a «in truth», de «consider» a «see» y de «with you» a «for you» por razones de ajuste lexical y naturalidad. La versión española refleja esas decisiones, pero conserva la literalidad hebrea relevante donde el español lo permite: «en verdad», «vean» y «con ustedes».'
  spanish_consistency_notes:
  - Se usa «Yahvé» consistentemente para יְהוָה.
  - Se mantiene «con todo su corazón» como equivalente idiomático estable del hebreo.
  - «En verdad» preserva la ambigüedad entre sinceridad, verdad y fidelidad sin imponer una sola glosa.
  - La nota al pie marca la alternativa contextual de עִמָּכֶם sin sustituir el texto principal.
