translation:
  text: 'Jesus said, "Two will rest on a couch; one will die, one will live."


    Salome said, "Who are you, man? As from one, you have gotten up onto my couch
    and eaten from my table."


    Jesus said to her, "I am he who exists from the Equal. I was given from the things
    of my Father."


    [Salome said,] "I am your disciple."


    [Jesus said,] "Because of this I say: whenever one becomes empty, he will be filled
    with light; but whenever one becomes divided, he will be filled with darkness."'
  philosophy: formal
  drafter_model: gemini-3.1-pro-preview
  drafter_label: gemini_3_1_pro_thomas_redraft
  drafted_at: '2026-04-22T10:54:33Z'
  footnotes:
  - marker: As from one
    text: Literally 'as from one' (ϩⲱⲥ ⲉⲃⲟⲗ ϩⲛ̄ⲟⲩⲁ). This could mean 'as if from someone
      [special]' or 'as from the One', reflecting Thomas's theology of unity.
    reason: lexical_alternative
  - marker: the Equal
    text: Coptic ⲡⲉⲧϣⲏϣ, 'that which is equal' or 'the Equal' (from ϣⲓϣ, 'to be equal,
      level').
    reason: theological_note
  - marker: '[Salome said,] ... [Jesus said,]'
    text: The Coptic text does not include speaker tags for the final two sentences.
      They are supplied here for clarity.
    reason: textual_variant
  - marker: empty
    text: The manuscript reads ϣⲏϥ (stative of ϣⲱϥ, 'to be empty, desolate'), which
      creates a wordplay with 'filled' (ⲙⲟⲩϩ). Many scholars emend this to ϣⲏϣ ('equal')
      to match 'the Equal' (ⲡⲉⲧϣⲏϣ) earlier in the saying and to contrast directly
      with 'divided' (ⲡⲏϣ).
    reason: textual_variant
lexical_decisions:
- source_word: ϭⲗⲟϭ
  chosen: couch
  rationale: Standard term for a bed or couch, fitting the context of resting and
    dining.
  lexicon: Crum 811b
  alternatives:
  - bed
  entry: ϭⲗⲟϭ
- source_word: ⲧⲉⲗⲟ
  chosen: gotten up
  rationale: Variant of ⲧⲁⲗⲟ ('to mount, go up'). Salome is noting that Jesus has
    taken a place on her dining couch.
  lexicon: Crum 408a
  alternatives:
  - mounted
  - stepped onto
  entry: ⲧⲁⲗⲟ
- source_word: ϣⲏϣ
  chosen: the Equal
  rationale: Stative of ϣⲓϣ ('to be equal, level'). Used substantively here (ⲡⲉⲧϣⲏϣ)
    to denote the divine realm of unity and undifferentiated reality.
  lexicon: Crum 595b
  alternatives:
  - what is equal
  - the Undivided
  entry: ϣⲓϣ
- source_word: ϣⲏϥ
  chosen: empty
  rationale: Stative of ϣⲱϥ ('to be desolate, empty'). Retained as the manuscript
    reading, creating a deliberate wordplay with 'filled' (ⲙⲟⲩϩ).
  lexicon: Crum 593a
  alternatives:
  - desolate
  - equal (via emendation to ϣⲏϣ)
  entry: ϣⲱϥ
- source_word: ⲡⲏϣ
  chosen: divided
  rationale: Stative of ⲡⲱϣ ('to divide'). Contrasts with the concept of unity and
    equality.
  lexicon: Crum 276b
  alternatives:
  - split
  entry: ⲡⲱϣ
theological_decisions:
- issue: Emendation of ϣⲏϥ to ϣⲏϣ
  chosen_reading: empty
  rationale: While emending to 'equal' (ϣⲏϣ) creates a neat contrast with 'divided'
    (ⲡⲏϣ) and matches 'the Equal' earlier in the saying, the manuscript reading 'empty'
    (ϣⲏϥ) creates a profound Thomasine paradox and wordplay with 'filled' (ⲙⲟⲩϩ).
    We retain the manuscript reading.
  alternatives_noted:
  - equal
- issue: Translation of ⲡⲉⲧϣⲏϣ
  chosen_reading: the Equal
  rationale: Reflects the Thomasine concept of divine unity and undifferentiated reality,
    contrasting with the divided material world.
  alternatives_noted:
  - what is equal
  - the Undivided
drafter_notes: 'Saying 61 begins with a parallel to Luke 17:34 (''two in one bed''),
  but Thomas diverges significantly: instead of ''one taken, one left'' in an apocalyptic
  context, Thomas has ''one will die, one will live,'' shifting the focus to existential
  and spiritual states. The dialogue with Salome introduces profound Thomasine themes
  of unity (''the Equal'') versus division. The translation retains the manuscript
  reading ''empty'' (ϣⲏϥ) rather than emending it to ''equal'' (ϣⲏϣ), preserving the
  kenotic paradox of becoming empty to be filled with light.'
