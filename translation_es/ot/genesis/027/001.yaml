review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien la secuencia narrativa, la vejez de Isaac, el oscurecimiento de la vista, el llamado a Esaú y la respuesta «Aquí estoy». Sin embargo, la nota al pie no preserva la alternativa documentada en el inglés para הַגָּדֹל («older/eldest»), y en cambio añade una alternativa sobre la vista que no está en la auditoría inglesa. También conviene suavizar «ya era viejo» a una formulación más digna y natural.
  spanish_quality_summary: El español es claro y ampliamente legible, pero «ya era viejo» suena algo brusco; «era anciano» o «era viejo» sin «ya» sería mejor. La oración principal funciona bien, y «Hijo mío» / «Aquí estoy» son naturales y fieles. «Se habían nublado» es aceptable, aunque la estructura puede simplificarse ligeramente.
  glossary_alignment: No hay términos de glosario mayor en juego. «Esaú», «Isaac» y la formulación general están alineados. El punto principal es mantener la nota léxica sobre «su hijo mayor / su hijo primogénito o el mayor de sus hijos» según la documentación inglesa para הַגָּדֹל.
  issues:
  - severity: medium
    issue: La nota al pie está anclada al verbo de la vista en vez de al sintagma «su hijo mayor».
    rationale: La auditoría inglesa conserva una alternativa léxica para אֶת עֵשָׂו בְּנוֹ הַגָּדֹל («his older son» / «his eldest son»). La nota española debería preservar esa alternativa significativa, no introducir una distinta en otro segmento.
  - severity: low
    issue: «ya era viejo» suena menos digno y más coloquial de lo deseable.
    rationale: זָקֵן describe edad avanzada; en español bíblico moderno y digno, «era anciano» encaja mejor que «ya era viejo».
  - severity: low
    issue: La frase sobre la vista puede expresarse de modo más directo.
    rationale: «Sus ojos se habían nublado de tal manera que no podía ver» es comprensible, pero «sus ojos estaban demasiado nublados para ver» o «se le habían nublado los ojos y no podía ver» suena más natural sin perder el sentido.
  revised_spanish_text: 'Y sucedió que, cuando Isaac era anciano y sus ojos estaban demasiado nublados para ver, llamó a Esaú, su hijo mayor[a], y le dijo: «Hijo mío». Y él le respondió: «Aquí estoy».'
  revised_footnotes:
  - marker: a
    text: O «su hijo primogénito».
    reason: lexical_alternative
  revision_rationale: Se corrige la nota al pie para alinearla con la alternativa léxica documentada para הַגָּדֹל y se mejora ligeramente el registro y la naturalidad del español con «era anciano» y una formulación más directa de la vista debilitada. El resto del sentido y de las decisiones léxicas se conserva.
