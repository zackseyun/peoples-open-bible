review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura numérica, la procedencia desde todas las tribus, el propósito de obtener provisiones y la referencia a Guibeá de Benjamín. Sin embargo, la cadena verbal לַעֲשׂוֹת לְבוֹאָם queda demasiado literal y poco natural en español con ''para hacer cuando lleguen'', y además el anclaje de las notas está invertido: la nota [a] explica נְבָלָה pero está colocada tras ''Israel'', mientras que [b] corresponde a la expresión comprimida de llegada y debería ir junto a ''cuando lleguen'' o una frase equivalente. También conviene ajustar ''llevar provisiones'' a ''tomar/conseguir provisiones'' para reflejar mejor לָקַחַת צֵדָה.'
  spanish_quality_summary: El español es generalmente claro, pero 'para hacer cuando lleguen' suena forzado y poco idiomático. Reestructurar a 'para que, cuando lleguen..., actúen/hagan...' mejora mucho la legibilidad sin alejarse del hebreo ni del POB inglés. 'Conforme a toda la vileza' es entendible, aunque 'conforme a toda la vileza que hizo' sigue siendo algo áspero; aun así puede conservarse con una leve mejora sintáctica.
  glossary_alignment: No hay términos del glosario principal en juego salvo topónimos y vocabulario ético. 'Guibeá de Benjamín' es adecuado. 'Vileza' es aceptable para נְבָלָה, aunque la nota debe anclarse allí. No hay conflictos con Yahvé/Mesías/Espíritu, etc.
  issues:
  - severity: medium
    issue: Expresión española poco natural en 'para hacer cuando lleguen'
    rationale: 'La cadena hebrea infinitiva es comprimida, pero el español resultante no suena idiomático ni claro. Debe descomprimirse como propósito temporal: ''para que, cuando lleguen..., hagan/actúen...''.'
  - severity: medium
    issue: Marcadores de notas colocados en el lugar equivocado
    rationale: La nota sobre נְבָלָה debe ir anclada a 'vileza' y la nota sobre 'al llegar' debe ir junto a la expresión temporal de llegada. Tal como está, [a] aparece tras 'Israel' y [b] tras 'Benjamín', lo cual desinforma al lector.
  - severity: low
    issue: '''llevar provisiones'' no refleja tan bien לָקַחַת צֵדָה'
    rationale: El hebreo apunta a tomar/obtener/proveer suministros. 'Llevar' no es imposible en contexto, pero cambia levemente el foco desde la obtención/abastecimiento.
  revised_spanish_text: Y tomaremos diez hombres de cada cien de todas las tribus de Israel, y cien de cada mil, y mil de cada diez mil, para tomar provisiones para el pueblo, para que, cuando lleguen[a] a Guibeá de Benjamín, hagan conforme a toda la vileza[b] que hizo en Israel.
  revised_footnotes:
  - marker: a
    text: El hebreo dice literalmente 'para hacer al llegar ellos a Guibeá de Benjamín', una expresión comprimida para indicar la acción una vez que lleguen.
    reason: lexical_alternative
  - marker: b
    text: O 'acto vil' o 'hecho vergonzoso' para נְבָלָה. El término hebreo denota una acción chocante y moralmente degradante.
    reason: lexical_alternative
