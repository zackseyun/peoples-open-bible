review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura causal y la imaginería animal del hebreo: «Porque», «empujan», «con el costado y con el hombro», «con sus cuernos» y «cornean» reflejan fielmente יַעַן, בְּצַד וּבְכָתֵף, תֶּהְדֹּפוּ, וּבְקַרְנֵיכֶם, תְּנַגְּחוּ. También preserva correctamente el referente colectivo vulnerable del rebaño para כָּל הַנַּחְלוֹת. Sin embargo, la cláusula final se aleja del valor espacial de אֶל הַחוּצָה («afuera / al exterior»): «por todas partes» enfatiza dispersión extensa, pero debilita la idea de expulsión hacia fuera presente en el hebreo y reconocida en el audit trail inglés.'
  spanish_quality_summary: 'El español es claro y natural, con buen registro bíblico contemporáneo. No obstante, hay dos detalles a reparar: 1) el anclaje de la nota [a] está colocado sobre «hombro», cuando su contenido explica «las débiles»; debe moverse al sintagma pertinente. 2) «hasta que las han dispersado» suena menos idiomático tras un presente general («empujan… cornean…») que «hasta dispersarlas afuera» o «hasta que las dispersan afuera».'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. La elección «cornean» es buena para נגח. «Las débiles» encaja con la decisión del POB inglés sobre miembros vulnerables del rebaño, y la nota alternativa está bien orientada. La principal corrección terminológica-contextual es representar אֶל הַחוּצָה con «afuera», no «por todas partes».
  issues:
  - severity: medium
    issue: La nota [a] está anclada en «hombro» pero explica «las débiles».
    rationale: Según las reglas del proyecto, el marcador debe aparecer exactamente en la palabra o frase relevante. Tal como está, induce a pensar que la nota comenta «hombro», no la expresión hebrea difícil para los miembros vulnerables del rebaño.
  - severity: medium
    issue: «Por todas partes» no preserva bien אֶל הַחוּצָה.
    rationale: El hebreo expresa movimiento/expulsión «hacia afuera, al exterior». Aunque el inglés auditado use «abroad» por naturalidad, la justificación sigue vinculada a «to the outside/outward». «Por todas partes» cambia el foco a extensión geográfica y no a expulsión fuera del espacio seguro.
  - severity: low
    issue: «Hasta que las han dispersado» es algo rígido en español en esta secuencia verbal.
    rationale: No es incorrecto, pero suena menos natural que una formulación de resultado más fluida como «hasta dispersarlas afuera», que además conserva mejor la relación entre acción y resultado.
  revised_spanish_text: Porque ustedes empujan con el costado y con el hombro, y cornean a todas las débiles[a] con sus cuernos hasta dispersarlas afuera.
  revised_footnotes:
  - marker: a
    text: O «a todas las enfermas» o «a todas las flacas». La expresión hebrea se refiere a los miembros vulnerables del rebaño.
    reason: lexical_alternative
  revision_rationale: Se movió la nota al sintagma que realmente comenta («las débiles»), y se ajustó la cláusula final para reflejar mejor אֶל הַחוּצָה como expulsión hacia afuera. «Hasta dispersarlas afuera» suena natural en español, preserva el resultado de la acción abusiva y mantiene la imagen pastoral del hebreo sin parafrasear de más.
