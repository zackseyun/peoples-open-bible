review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido básico del hebreo: segunda persona singular dirigida a Dios, cercanía divina, momento temporal de la invocación, y la palabra de consuelo «No temas». Sin embargo, la nota al pie no corresponde al punto alternativo preservado en el rastro inglés: la alternativa documentada afecta principalmente a קָרַבְתָּ («came near» / «drew near») y al matiz de אֶקְרָאֶךָּ como «cried out to you», no a introducir «te acercaste» dentro de la nota como si fuera el elemento alternativo.'
  spanish_quality_summary: El español es claro y digno. No obstante, «en el día en que» suena algo más pesado de lo necesario; «el día que» o «el día en que» serían más naturales, y «te invoqué» es aceptable pero algo más interpretativo/cultual que el inglés auditado. Para seguir más de cerca la amplitud de «I called to you» y la alternativa «I cried out to you», conviene usar «te llamé» en el texto principal y reservar «clamé a ti» para la nota. También conviene mover la marca de nota al segmento relevante en el texto, no a «dijiste».
  glossary_alignment: No hay términos del glosario mayor en disputa aquí. La elección de «Te acercaste» encaja bien con קָרַבְתָּ. La revisión propuesta mejora la alineación con las decisiones léxicas auditadas para קרא sin apartarse del hebreo ni del estilo español del proyecto.
  issues:
  - severity: medium
    issue: La nota al pie está anclada en «dijiste» pero la alternativa documentada corresponde al primer hemistiquio.
    rationale: El rastro inglés pone la nota en «you said[a]» solo por ubicación editorial, pero el contenido de la nota ofrece una alternativa para «You came near ... I cried out to you». En español, para claridad, debe anclarse donde empieza el segmento alternativo relevante.
  - severity: medium
    issue: «Te invoqué» estrecha el sentido de אֶקְרָאֶךָּ más de lo que hace el inglés auditado.
    rationale: El hebreo קרא aquí permite «llamar» y en contexto puede implicar clamor orante, pero el POB eligió una forma amplia («I called to you») y dejó «I cried out to you» como alternativa. «Te invoqué» introduce un matiz cultual más específico que no es necesario en el texto principal.
  - severity: low
    issue: «En el día en que» es algo rígido en español.
    rationale: Aunque fiel al hebreo, una formulación como «el día que» mantiene el valor temporal con mejor naturalidad en español bíblico moderno.
  revised_spanish_text: 'Te acercaste[a] el día que te llamé; dijiste: «No temas».'
