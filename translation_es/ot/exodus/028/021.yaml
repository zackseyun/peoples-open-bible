- from: Y las piedras estarán según los nombres de los hijos de Israel[a], doce según sus nombres. Serán como grabados de sello, cada una según su nombre[b], para las doce tribus.
  to: Y las piedras serán según los nombres de los hijos de Israel[a], doce según sus nombres. Serán como grabados de sello, cada cual según su nombre[c][b], para las doce tribus.
  rationale: Se ajusta «estarán» a «serán» por mayor naturalidad en español, se cambia «cada una» por «cada cual» para reflejar mejor el distributivo hebreo אִישׁ sin sonar forzado, y se añade la nota faltante sobre «hijos de Israel» para preservar la justificación lexical/theológica del POB auditado.
