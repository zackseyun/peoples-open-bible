    reason: lexical_alternative
  - marker: b
    text: La expresión hebrea intensifica la idea de regreso mediante la repetición del verbo «volver / hacer volver».
    reason: lexical_alternative
  - marker: c
    text: O «adoraré a Yahvé». El verbo hebreo puede denotar servicio rendido a Dios en adoración.
    reason: lexical_alternative
  revision_rationale: El texto principal es fiel y natural; solo se corrige la nota [a] para que preserve de verdad la alternativa léxica formal del hebreo cognado נֵדֶר נָדַר, en vez de repetir la misma redacción del texto principal.
