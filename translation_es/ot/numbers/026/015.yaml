translation:
  language: es
  text: 'Los hijos de Gad, por sus clanes: de Zefón[a], el clan de los zefonitas; de Hagui, el clan de los haguítas; de Suni, el clan de los sunitas.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunas tradiciones en inglés leen «Zifón» / «zifonitas» aquí (compárese Génesis 46:16), pero el Texto Masorético de este versículo dice «Zefón» (צפון), por lo que se mantiene «Zefón» en el texto principal.
    reason: textual_variant
lexical_decisions:
- source_word: בְּנֵי
  english_pob_choice: The sons of
  chosen_spanish: Los hijos de
  alternatives_spanish:
  - Los descendientes de
  - Los hijos descendientes de
  lexicon: HALOT
  rationale: El hebreo genealógico בְּנֵי introduce descendencia tribal. «Hijos de» conserva el giro formal y transparente sin perder naturalidad en español.
- source_word: גָד
  english_pob_choice: Gad
  chosen_spanish: Gad
  alternatives_spanish:
  - Gad
  lexicon: HALOT
  rationale: Nombre propio tribal; se conserva transliterado.
- source_word: לְמִשְׁפְּחֹתָם
  english_pob_choice: by their clans
  chosen_spanish: por sus clanes
  alternatives_spanish:
  - según sus clanes
  - por sus familias
  lexicon: HALOT
  rationale: מִשְׁפָּחָה en contexto censal y genealógico designa agrupaciones de clan. «Por sus clanes» comunica la organización tribal de forma clara y natural.
- source_word: לִצְפוֹן
  english_pob_choice: of Zephon
  chosen_spanish: de Zefón
  alternatives_spanish:
  - de Zifón
  - procedente de Zefón
  lexicon: HALOT
  rationale: La preposición ל en la fórmula genealógica indica pertenencia/origen de linaje. Se usa «de» para reproducir la relación genealógica con naturalidad en español. Se adopta «Zefón» como forma transliterada del nombre según el texto masorético de este versículo.
- source_word: מִשְׁפַּחַת הַצְּפוֹנִי
  english_pob_choice: the clan of the Zephonites
  chosen_spanish: el clan de los zefonitas
  alternatives_spanish:
  - la familia del zefonita
  - el clan de los zifonitas
  lexicon: HALOT
  rationale: La construcción nombra el clan derivado del antepasado Zefón. El gentilicio plural «zefonitas» conserva el valor colectivo de la frase inglesa y la relación nominal del hebreo.
- source_word: לְחַגִּי
  english_pob_choice: of Haggi
  chosen_spanish: de Hagui
  alternatives_spanish:
  - de Jagui
  - procedente de Hagui
  lexicon: HALOT
  rationale: Nombre propio genealógico; se mantiene transliterado en forma breve y reconocible.
- source_word: מִשְׁפַּחַת הַחַגִּי
  english_pob_choice: the clan of the Haggites
  chosen_spanish: el clan de los haggitas
  alternatives_spanish:
  - la familia del haggita
  lexicon: HALOT
  rationale: Se conserva el valor colectivo del clan mediante un gentilicio plural. «Haggitas» refleja la forma de pertenencia del hebreo y el paralelo con la lista precedente.
- source_word: לְשׁוּנִי
  english_pob_choice: of Shuni
  chosen_spanish: de Shuni
  alternatives_spanish:
  - de Suni
  - procedente de Shuni
  lexicon: HALOT
  rationale: Nombre propio genealógico; se translitera de manera directa para mantener la consistencia con el resto de la lista.
- source_word: מִשְׁפַּחַת הַשּׁוּנִי
  english_pob_choice: the clan of the Shunites
  chosen_spanish: el clan de los shunitas
  alternatives_spanish:
  - la familia del shunita
  lexicon: HALOT
  rationale: Gentilicio colectivo que expresa la pertenencia clánica derivada de Shuni. «Shunitas» reproduce la función del inglés y mantiene el paralelismo de la enumeración.
translation_notes:
  revision_awareness: El control de revisión indica acuerdo alto y sin cambios necesarios; por ello se mantiene la lectura masorética del versículo y su estructura genealógica directa, con una sola nota textual para la variante tradicional relacionada con Zifón/Zefón.
  spanish_consistency_notes:
  - Se mantiene el patrón genealógico repetitivo «de X, el clan de los Y» para reflejar la sintaxis hebrea.
  - Se usa «clan» de forma consistente para מִשְׁפָּחָה en este contexto censal.
  - Los nombres propios se transliteran de manera uniforme, con Zefón en el texto principal según el MT.
  - Se preserva el plural colectivo de los gentilicios («zefonitas», «haggitas», «shunitas») para evitar una paráfrasis más libre.
