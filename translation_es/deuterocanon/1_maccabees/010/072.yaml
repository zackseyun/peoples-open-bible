review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del griego: mantiene los dos imperativos («pregunta» / «averigua»), identifica a «los demás que nos ayudan», conserva el presente vívido «dicen» y expresa la derrota repetida de los antepasados «en su propia tierra». Sin embargo, en la frase idiomática Οὐκ ἔστιν ὑμῖν στάσις ποδὸς, «lugar donde afirmarse» suaviza y reinterpreta demasiado la imagen de poder mantenerse en pie frente al adversario; conviene una formulación más directa y cercana al modismo militar del original.'
  spanish_quality_summary: El español es claro y legible, con tono digno. No obstante, «No tienen lugar donde afirmarse» suena algo explicativo y menos natural que una expresión más compacta. «No tienen dónde mantenerse en pie delante de nosotros» conserva mejor la imagen y fluye bien en español bíblico moderno.
  glossary_alignment: No hay términos teológicos clave del glosario del proyecto en este versículo. Las decisiones léxicas principales son en general consistentes con el rastro de auditoría inglés. La única corrección necesaria es ajustar la equivalencia del modismo στάσις ποδὸς para reflejar mejor la metáfora de mantenerse en pie / plantar cara.
  issues:
  - severity: medium
    issue: La expresión «No tienen lugar donde afirmarse» se aleja del modismo griego «στάσις ποδὸς».
    rationale: El original habla de «posición/estar de pie del pie», es decir, de no poder mantenerse en pie o sostenerse frente a ellos. «Afirmarse» introduce una idea interpretativa de estabilidad interior o apoyo que no refleja tan directamente la imagen física y militar del griego.
  - severity: low
    issue: La nota al pie explica «postura de pie», una formulación poco natural en español.
    rationale: La nota debe preservar el literal con mayor claridad; «estar de pie» o «posición de pie» comunica mejor el componente idiomático sin sonar torpe.
  revised_spanish_text: 'Pregunta y averigua quién soy yo y quiénes son los demás que nos ayudan; y dicen[a]: «No tienen dónde mantenerse en pie delante de nosotros, porque dos veces tus padres fueron derrotados en su propia tierra».'
  revised_footnotes:
  - marker: a
    text: 'Literalmente: «no hay para ustedes estar de pie del pie delante de nuestro rostro». El griego es un modismo que expresa que no pueden mantenerse en pie ni sostenerse frente a nosotros.'
    reason: lexical_alternative
  revision_rationale: Se ajusta la cláusula idiomática central para conservar mejor la imagen griega de no poder mantenerse en pie frente al enemigo. También se mejora la nota al pie para explicar el literal de forma más clara y útil en español.
