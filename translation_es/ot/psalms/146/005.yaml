review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido global del hebreo: una bienaventuranza sobre la persona cuya ayuda es el Dios de Jacob y cuya esperanza está en Yahvé su Dios. Conserva correctamente «Dios de Jacob», «esperanza» y «Yahvé». Sin embargo, «Bienaventurado[a]» y la nota con «Dichoso[a]» introducen corchetes ajenos al original y poco naturales en el texto bíblico; además, la nota inglesa alternativa no es sobre אַשְׁרֵי sino sobre la cláusula de ayuda («whose helper is the God of Jacob»).'
  spanish_quality_summary: El español es generalmente claro y digno, pero puede mejorarse. «Bienaventurado el que» suena natural; el marcador [a] pegado a «Bienaventurado[a]» genera confusión entre nota y desdoblamiento editorial. «Tiene al Dios de Jacob por ayuda» es entendible, aunque «tiene como ayuda» o «tiene al Dios de Jacob como su ayuda» sería algo más natural; no obstante, no requiere cambio obligatorio si se busca concisión. La coma en «Yahvé, su Dios» es aceptable como aposición explicativa.
  glossary_alignment: 'Hay buena alineación con la terminología del proyecto en «Yahvé» para יְהוָה y «Dios» para אֱלֹהָיו. No hay conflicto teológico importante. El punto principal es la gestión de la nota: debe preservar la alternativa documentada del POB inglés sobre «helper/help», no crear una nota distinta sobre «Dichoso».'
  issues:
  - severity: medium
    issue: Uso de «[a]» dentro de «Bienaventurado[a]»
    rationale: Los corchetes en el texto principal parecen mezclar inclusión de género con marcador de nota. El hebreo no exige desdoblamiento, y el proyecto pide texto español natural y legible.
  - severity: medium
    issue: La nota al pie no corresponde a la nota documentada en el POB inglés
    rationale: La nota inglesa preserva la alternativa «Happy is the one whose helper is the God of Jacob», con énfasis real en la cláusula de ayuda. La nota española actual solo ofrece «Dichoso» y omite «cuyo ayudador es el Dios de Jacob» o equivalente.
  - severity: low
    issue: «Por ayuda» es algo menos natural en español contemporáneo
    rationale: Aunque es defendible, «como ayuda» suena más natural. No obstante, la frase actual todavía preserva el sentido y puede mantenerse si se quiere cercanía formal.
  revised_spanish_text: Bienaventurado el que tiene al Dios de Jacob por ayuda[a], y cuya esperanza está en Yahvé, su Dios.
  revised_footnotes:
  - marker: a
    text: 'O: «Dichoso el que tiene al Dios de Jacob como su ayudador».'
    reason: lexical_alternative
