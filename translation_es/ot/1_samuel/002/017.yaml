translation:
  language: es
  text: Y el pecado de los jóvenes fue muy grande delante de Yahvé[b][a], porque los hombres despreciaron la ofrenda de Yahvé[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «delante del rostro de Yahvé», un modismo que significa «delante de Yahvé» o «en la presencia de Yahvé».'
    reason: lexical_alternative
  - marker: b
    text: «Delante de Yahvé» traduce el hebreo אֶת־פְּנֵי יְהוָה, literalmente «ante el rostro de Yahvé».
    reason: lexical_alternative
  - marker: c
    text: «Ofrenda» traduce el hebreo minḥah, que puede designar una ofrenda en general y, en algunos contextos, más específicamente, una ofrenda vegetal o de cereal.
    reason: lexical_alternative
lexical_decisions:
- source_word: חַטַּאת
  english_pob_choice: sin
  chosen_spanish: pecado
  alternatives_spanish:
  - pecado
  - culpa
  - ofensa
  lexicon: HALOT
  rationale: En este contexto se trata de la conducta culpable de los hijos de Elí, no de una ofrenda por el pecado. "Pecado" es la equivalencia natural y directa en español.
- source_word: הַנְּעָרִים
  english_pob_choice: the young men
  chosen_spanish: los jóvenes
  alternatives_spanish:
  - los muchachos
  - los siervos
  - los jóvenes
  lexicon: HALOT
  rationale: נַעַר puede abarcar desde 'muchacho' hasta 'sirviente/ayudante'. Aquí se refiere a hombres jóvenes con función sacerdotal; "los jóvenes" conserva el valor léxico sin sonar infantil.
- source_word: גְּדוֹלָה מְאֹד
  english_pob_choice: very great
  chosen_spanish: muy grande
  alternatives_spanish:
  - en gran manera
  - sumamente grande
  - muy grave
  lexicon: HALOT
  rationale: La expresión intensifica el grado del pecado. "Muy grande" reproduce de forma clara y sobria la fuerza del hebreo.
- source_word: אֶת פְּנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - en la presencia de Yahvé
  - ante Yahvé
  - delante del rostro de Yahvé
  lexicon: HALOT
  rationale: Se conserva el idioma hebreo de estar 'delante del rostro/presencia' de Yahvé, pero en español se expresa de manera idiomática con "delante de Yahvé".
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
  rationale: Se mantiene el nombre divino revelado, siguiendo la práctica del POB de no sustituirlo por un título como 'Señor'.
- source_word: נִאֲצוּ
  english_pob_choice: despised
  chosen_spanish: despreciaron
  alternatives_spanish:
  - menospreciaron
  - desestimaron
  - mostraron desprecio por
  lexicon: HALOT
  rationale: El verbo expresa desprecio o menosprecio. "Despreciaron" es una traducción directa y natural en español, cercana a la decisión inglesa final.
- source_word: הָאֲנָשִׁים
  english_pob_choice: the men
  chosen_spanish: los hombres
  alternatives_spanish:
  - esos hombres
  - los varones
  lexicon: HALOT
  rationale: El sustantivo común designa aquí a los responsables del acto. "Los hombres" mantiene la referencia simple y lexical sin añadir matices innecesarios.
- source_word: מִנְחַת יְהוָה
  english_pob_choice: the LORD’s offering
  chosen_spanish: la ofrenda de Yahvé
  alternatives_spanish:
  - la ofrenda de Yahvé
  - la ofrenda presentada a Yahvé
  - la oblación de Yahvé
  lexicon: HALOT
  rationale: מִנְחָה puede ser una ofrenda amplia y, en ciertos contextos, una ofrenda vegetal/granular. Aquí el contexto narrativo favorece el sentido general de 'ofrenda', sin precisar más de lo que el hebreo exige.
theological_decisions:
- issue: Forma de traducir el nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  rationale: El texto hebreo usa directamente el Tetragrámaton. La forma española adoptada preserva el nombre propio de Dios en vez de sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sentido de אֶת פְּנֵי יְהוָה
  english_pob_reading: before Yahweh / in the presence of Yahweh
  chosen_spanish_reading: delante de Yahvé
  alternative_spanish_readings:
  - en la presencia de Yahvé
  - ante Yahvé
  rationale: La expresión hebrea es idiomática y puede sonar literalmente como 'rostro'. En español, 'delante de Yahvé' conserva la idea relacional y de presencia sin forzar una traducción literal pesada.
  doctrine_reference: HALOT, entrada de פנים; uso idiomático en contexto narrativo
translation_notes:
  revision_awareness: El antecedente inglés pasó de una redacción más interpretativa ('treated ... with contempt') a una más directa ('despised'). La versión española sigue esa revisión con 'despreciaron', manteniendo la precisión léxica y el mismo orden argumental del hebreo.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' en lugar de 'SEÑOR' para el Tetragrámaton, conforme al estándar del proyecto.
  - '''Delante de Yahvé'' reproduce la idiomaticidad hebrea sin perder la referencia espacial-relacional.'
  - '''Ofrenda'' se usa en sentido amplio, coherente con la nota léxica sobre minḥah.'
  - La puntuación y el orden de cláusulas buscan reflejar la estructura del hebreo y la versión inglesa auditada sin depender mecánicamente de ella.
