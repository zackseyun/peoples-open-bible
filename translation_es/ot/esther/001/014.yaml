review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura global del hebreo: introducción colectiva de los siete personajes, lista de nombres, rango cortesano, modismo de acceso al rey y precedencia en el reino. Sin embargo, la nota al pie está mal anclada: [a] aparece en «siete» pero la nota explica «que veían el rostro del rey». Además, el inglés POB documenta una alternativa léxica para la última cláusula («occupied the highest positions in the kingdom»), y conviene preservarla en español como nota, ya que la redacción española ya interpreta el modismo de precedencia.'
  spanish_quality_summary: El español es claro y natural. «Los más cercanos a él» funciona bien para el singular colectivo hebreo. «Oficiales» es una opción aceptable y legible. «Ocupaban el primer lugar en el reino» suena idiomático, aunque se aparta un poco de la imagen de «sentarse primero»; sigue siendo fiel si se conserva la alternativa documentada en nota. Los nombres están razonablemente hispanizados. La reparación principal es la colocación de la nota y la adición de la nota alternativa correspondiente.
  glossary_alignment: 'No hay términos del glosario maestro particularmente disputados en este versículo. Las decisiones clave siguen el rastro POB: שָׂרֵי -> «oficiales», רֹאֵי פְּנֵי הַמֶּלֶךְ -> «veían el rostro del rey» con aclaración cultural, y הַיֹּשְׁבִים רִאשֹׁנָה בַּמַּלְכוּת -> «ocupaban el primer lugar en el reino» con alternativa de rango superior que debe preservarse en nota.'
  issues:
  - severity: medium
    issue: La nota [a] está anclada en «siete» pero su contenido explica «que veían el rostro del rey».
    rationale: Las instrucciones exigen que cada marcador aparezca en la palabra o frase pertinente. El anclaje actual induce a error y no corresponde al contenido de la nota.
  - severity: medium
    issue: Falta una nota para la alternativa documentada de הַיֹּשְׁבִים רִאשֹׁנָה בַּמַּלְכוּת.
    rationale: El English POB preserva explícitamente la alternativa «and occupied the highest positions in the kingdom». Dado que el español eligió una formulación interpretativa similar pero no idéntica, conviene mantener la alternativa como nota para transparencia léxica.
  revised_spanish_text: Y los más cercanos a él fueron Carshena, Setar, Admata, Tarsis, Meres, Marsena y Memucán, los siete oficiales de Persia y Media, que veían el rostro[a] del rey y ocupaban el primer lugar en el reino[b].
  revised_footnotes:
  - marker: a
    text: Literalmente, «que veían el rostro del rey», una expresión de la corte persa para quienes tenían acceso directo a la presencia del rey.
    reason: cultural_note
  - marker: b
    text: O «y ocupaban los puestos más altos en el reino».
    reason: lexical_alternative
  revision_rationale: Se corrige el anclaje de la nota cultural para que recaiga sobre la frase que realmente explica, y se añade la nota de alternativa léxica ya documentada en el rastro POB para la cláusula final. El resto del texto puede mantenerse.
