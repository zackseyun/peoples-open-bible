translation:
  language: es
  text: ¿Hasta cuándo carecerán de estas cosas[a], mientras su alma tiene mucha sed?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «¿Hasta cuándo carecerán de estas y de estas, y su alma estará muy sedienta?». El paralelo griego lo expresa de manera más idiomática: «¿Hasta cuándo dicen que carecen de estas cosas, mientras sus almas tienen mucha sed?». El texto principal sigue el hebreo como base primaria, usando el griego para aclarar el sentido.'
    reason: alternative_reading
lexical_decisions:
- source_word: עַד מָתַי
  english_pob_choice: How long
  chosen_spanish: ¿Hasta cuándo
  alternatives_spanish:
  - ¿Hasta cuándo será?
  - ¿Por cuánto tiempo?
  lexicon: HALOT
  rationale: Expresa de manera natural en español la pregunta temporal de reproche o exhortación, manteniendo el tono directo del hebreo.
- source_word: תַחְסְרוּן
  english_pob_choice: will you lack
  chosen_spanish: les faltarán
  alternatives_spanish:
  - les faltará
  - estarán privados de
  lexicon: HALOT
  rationale: El hebreo comunica carencia; en español, 'les faltarán' conserva el sentido de faltar sin forzar una perífrasis innecesaria. El plural verbal concuerda con el sujeto implícito del contexto.
- source_word: מִן אֵלּוּ וְאֵלּוּ
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - estas
  - estas cosas tales
  lexicon: HALOT
  rationale: La expresión hebrea es algo áspera aislada; 'estas cosas' refleja el referente inmediato de manera clara y publicada, sin sobreespecificar.
- source_word: וְנַפְשְׁכֶם
  english_pob_choice: your soul
  chosen_spanish: su alma
  alternatives_spanish:
  - su vida
  - ustedes mismos
  lexicon: HALOT
  rationale: '''Alma'' preserva el peso antropológico y sapiencial de נֶפֶשׁ. En español, el singular posesivo ''su'' puede referirse colectivamente a los destinatarios, manteniendo el matiz del original.'
- source_word: צְמֵאָה מְאֹד תִּהְיֶה
  english_pob_choice: is very thirsty
  chosen_spanish: tendrá una sed muy grande
  alternatives_spanish:
  - estará muy sedienta
  - tendrá muchísima sed
  lexicon: HALOT
  rationale: La construcción hebrea expresa una sed intensa; 'tendrá una sed muy grande' conserva la fuerza de מְאֹד / σφόδρα y suena natural en español, sin perder el valor figurado de la imagen.
theological_decisions:
- issue: Sentido antropológico de נֶפֶשׁ en una exhortación sapiencial
  english_pob_reading: your soul
  chosen_spanish_reading: su alma
  alternative_spanish_readings:
  - su vida
  - ustedes mismos
  rationale: Se mantiene 'alma' porque en este contexto de deseo y carencia interior preserva mejor la resonancia espiritual y sapiencial del texto, sin imponer una definición técnica posterior.
  doctrine_reference: Translation philosophy §4; preservar la tensión lexical y antropológica del texto fuente.
translation_notes:
  revision_awareness: La revisión inglesa reciente eliminó 'keep' para hacer más directa la idea de falta continua; por eso la versión española evita cualquier matiz iterativo y usa una formulación inmediata. También se atendió al paralelo griego, que apoya la idea de una sed intensa y presente, sin reemplazar la base hebrea.
  spanish_consistency_notes:
  - Se preservó 'alma' para נֶפֶשׁ, en continuidad con la decisión inglesa y con el registro sapiencial.
  - Se evitó 'SEÑOR' u otras sustituciones no pertinentes porque el pasaje no contiene el nombre divino.
  - '''Faltarán'' y ''sed muy grande'' mantienen la tensión entre carencia externa e ինտensidad interna sin suavizarla.'
