translation:
  language: es
  text: "1[4:1]. Pues la ira es ceguera. No permite ver el rostro de ningún hombre verdaderamente.\n\n\n\n    2. Pues primero es provocada por una palabra; luego, por las obras, fortalece al que se enoja; y con pérdidas amargas lo provoca. Arroja en confusión su propósito, y así agita su alma con gran ira.\n\n\n\n    3[4:4]. Por tanto, cuando alguien hable contra ustedes, no se enciendan en ira; y si alguien los alaba como santos, no se ensoberbezcan. No cambien ni hacia el deleite ni hacia el desagrado.\n\n\n\n    4. Pues primero deleita el oído, y así aguza la mente para percibir la provocación; y, ya enardecido, piensa que se enoja con razón.\n\n\n\n    5. Pero si caen en alguna pérdida o destrucción, hijos, no se dejen llevar a la confusión. Porque ese mismo espíritu hace que uno desee airarse por lo que se está perdiendo, de modo que caiga en la ira a través de la pasión.\n\n\n\n    6. Y si sufren pérdida voluntaria o involuntariamente, no se entristezcan; pues de la tristeza se levanta\
    \ también la ira con falsedad.\n\n\n\n    7. Y la ira con falsedad es un mal de dos rostros, y se unen entre sí para perturbar el corazón; y, al estar el alma continuamente perturbada[4:7][4:6], el Señor se aparta de ella, y Beliar la domina."
  philosophy: optimal-equivalence
  footnotes:
  - marker: '4:1'
    text: La oración inicial está parcialmente truncada en el fragmento griego suministrado; la traducción refleja el sentido implícito en la cláusula superviviente 'Pues la ira es ceguera'.
    reason: textual_variant
  - marker: '4:4'
    text: 'El griego en torno a ''percibir la provocación'' es textualmente difícil; alternativas posibles: ''percibir lo que ha sido suscitado'' o ''percibir la irritación''.'
    reason: alternative_reading
  - marker: '4:6'
    text: '''Con falsedad'' puede significar que la ira surge acompañada de engaño, o que la tristeza da lugar a una ira luego reforzada por mentiras.'
    reason: alternative_reading
  - marker: '4:7'
    text: Beliar es nombre tradicional del poder maligno/adversario en la literatura judía; algunas tradiciones inglesas normalizan el nombre como 'Belial'.
    reason: cultural_note
lexical_decisions:
- source_word: παροξύνεται
  english_pob_choice: is stirred up
  chosen_spanish: es provocada
  alternatives_spanish:
  - se enardece
  - es irritada
  lexicon: LSJ
  rationale: Conserva el matiz pasivo-incoativo y suena natural en español.
- source_word: δυναμοῖ
  english_pob_choice: strengthens
  chosen_spanish: fortalece
  alternatives_spanish:
  - empodera
  - robustece
  lexicon: LSJ
  rationale: Refleja la imagen de refuerzo del iracundo.
- source_word: ζημίαις πικραῖς
  english_pob_choice: by bitter losses
  chosen_spanish: con pérdidas amargas
  alternatives_spanish:
  - con daños penosos
  lexicon: LSJ
  rationale: Conserva el peso moral-psicológico.
- source_word: διαβούλιον
  english_pob_choice: purpose
  chosen_spanish: propósito
  alternatives_spanish:
  - plan
  - deliberación
  lexicon: LSJ
  rationale: Facultad de la intención considerada que la ira trastorna.
- source_word: κινεῖσθε εἰς ὀργήν
  english_pob_choice: be moved to anger
  chosen_spanish: se enardezcan a la cólera
  alternatives_spanish:
  - se muevan a la cólera
  lexicon: LSJ
  rationale: ὀργή se traduce 'cólera' (distinto de θυμός = ira).
- source_word: ἐπαίρεσθε
  english_pob_choice: be exalted
  chosen_spanish: se ensoberbezcan
  alternatives_spanish:
  - se enaltezcan
  lexicon: LSJ
  rationale: Advertencia contra la autoexaltación frente al elogio.
- source_word: μεταβάλλεσθε
  english_pob_choice: be changed
  chosen_spanish: no cambien
  alternatives_spanish:
  - no se alteren
  lexicon: LSJ
  rationale: Permite el contraste 'ni... ni...' con claridad.
- source_word: τέρψιν
  english_pob_choice: delight
  chosen_spanish: deleite
  alternatives_spanish:
  - placer
  lexicon: LSJ
  rationale: Término elevado que casa con el par retórico.
- source_word: ἀηδίαν
  english_pob_choice: disgust
  chosen_spanish: desagrado
  alternatives_spanish:
  - aversión
  lexicon: LSJ
  rationale: Captura la oscilación negativa frente a 'deleite'.
- source_word: ὀξύνει τὸν νοῦν
  english_pob_choice: sharpens the mind
  chosen_spanish: aguza la mente
  alternatives_spanish:
  - afila la mente
  lexicon: LSJ
  rationale: Conserva la metáfora del afilado mental.
- source_word: ἐρεθισθέν
  english_pob_choice: the provocation
  chosen_spanish: la provocación
  alternatives_spanish:
  - la irritación
  lexicon: LSJ
  rationale: Texto difícil; 'la provocación' encaja en el flujo del argumento.
- source_word: ἐκθροεῖσθε
  english_pob_choice: be distressed
  chosen_spanish: se dejen llevar a la confusión
  alternatives_spanish:
  - se aturdan
  lexicon: LSJ
  rationale: Captura perturbación emocional sin restringirla al miedo.
- source_word: πνεῦμα
  english_pob_choice: spirit
  chosen_spanish: espíritu
  alternatives_spanish:
  - disposición
  lexicon: LSJ
  rationale: Conserva la fuerza moral cuasi-personificada.
- source_word: τοῦ ἀπολλυμένου
  english_pob_choice: what is perishing
  chosen_spanish: lo que se está perdiendo
  alternatives_spanish:
  - aquello que perece
  lexicon: LSJ
  rationale: Mantiene la abstracción participial.
- source_word: πάθους
  english_pob_choice: affliction
  chosen_spanish: pasión
  alternatives_spanish:
  - padecimiento
  - sufrimiento
  lexicon: LSJ
  rationale: Sigue la revisión inglesa más reciente de 'affliction' a 'passion'; en español 'pasión' (en el sentido ético-emocional, no erótico) es lo más apropiado.
- source_word: λύπης
  english_pob_choice: grief
  chosen_spanish: tristeza
  alternatives_spanish:
  - pena
  - aflicción
  lexicon: LSJ
  rationale: Término ético estable; semillero de ira.
- source_word: διπρόσωπον κακὸν
  english_pob_choice: a two-faced evil
  chosen_spanish: un mal de dos rostros
  alternatives_spanish:
  - un mal duplicitario
  lexicon: LSJ
  rationale: Conserva la metáfora vívida de duplicidad.
- source_word: ταράξωσι τὴν καρδίαν
  english_pob_choice: trouble the heart
  chosen_spanish: perturbar el corazón
  alternatives_spanish:
  - turbar el corazón
  lexicon: LSJ
  rationale: Mantiene la imagen recurrente de perturbación.
- source_word: Βελίαρ
  english_pob_choice: Beliar
  chosen_spanish: Beliar
  alternatives_spanish:
  - Belial
  lexicon: Greek witness tradition
  rationale: Se sigue la transliteración del testimonio griego.
theological_decisions:
- issue: Agencia moral personificada en 'espíritu' y Beliar
  chosen_reading: Conservar el lenguaje de 'ese mismo espíritu' y 'Beliar la domina' tal como el griego presenta una dinámica moral-espiritual, no meramente psicológica.
  alternative_readings:
  - traducir 'espíritu' como 'impulso' y tratar a Beliar como mero mal metafórico
  rationale: El testamento combina exhortación ética con lenguaje de conflicto espiritual. Preservar ambas dimensiones se ajusta a la fuente y evita reduccionismo.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: κύριος en contexto paraenético testamentario
  chosen_reading: Traducir Κύριος como 'el Señor'.
  alternative_readings:
  - el SEÑOR
  - Maestro
  rationale: Sigue la norma del proyecto para κύριος preservando la fuerza pactual-religiosa elevada.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος'
translation_notes:
  revision_awareness: 'El inglés POB removió dos instancias de ''my'' antes de ''children'' porque el griego solo tiene τέκνα sin posesivo. El español refleja esa decisión: en el v. 5 ''hijos'' aparece sin ''mis''.'
  spanish_consistency_notes:
  - θυμός → ira; ὀργή → cólera (distinción léxica preservada).
  - Κύριος → Señor; Βελίαρ → Beliar.
  - πνεῦμα → espíritu; πάθος → pasión.
  - 'τέκνα sin posesivo: ''hijos'' simple en vocativo.'
