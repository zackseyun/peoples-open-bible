  text: וְ/דֵ֤י חֲלֵ֬ב עִזִּ֗ים לְֽ֭/לַחְמְ/ךָ לְ/לֶ֣חֶם בֵּיתֶ֑/ךָ וְ֝/חַיִּ֗ים לְ/נַעֲרוֹתֶֽי/ךָ׀׃
base_translation:
  language: en
  yaml_path: translation/ot/proverbs/027/027.yaml
  text: And there will be enough goats' milk for your food[a], for the food of your household[b], and sustenance for your servant girls.
  footnotes:
  - marker: a
    text: Or 'and life for your maidservants.' The Hebrew literally says 'and lives/life for your young women/servant girls,' using 'life' in the sense of what sustains life.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'bread' in both occurrences likely means food or provision more generally, not bread alone.
    reason: lexical_alternative
