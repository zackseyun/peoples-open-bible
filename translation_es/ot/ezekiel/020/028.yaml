    rationale: El inglés conserva una nota adicional ligada al tramo de «pleasing aromas» por su orden de marcas [c][b]. En español debe mantenerse una correspondencia clara de marcadores y anclajes en el texto revisado; además, toda nota debe aparecer con su marcador exacto en `spanish_text`.
