    text: O «el campo del batanero».
    reason: lexical_alternative
  revision_rationale: Se corrige el anclaje de la nota [b] para que recaiga sobre «campo del lavandero», que es donde corresponde según el hebreo y el rastro de auditoría inglés. También se simplifica el anclaje de [a] al nombre propio mismo y se ajusta «junto al camino de» a «en el camino hacia» para reflejar mejor la construcción locativa del original sin perder naturalidad en español.
