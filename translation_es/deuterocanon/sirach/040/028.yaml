translation:
  language: es
  text: Hijo mío, no vivas la vida de un mendigo[a]; mejor es morir[b] que mendigar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo dice literalmente algo como «la vida de מכי מתן»; la expresión es difícil, pero el paralelo griego aclara el sentido como vivir de mendigar o de buscar limosna.
    reason: lexical_alternative
  - marker: b
    text: 'El hebreo «ser reunido» es un modismo para la muerte; compárese el paralelo griego, que expresa el sentido explícitamente: «morir».'
    reason: alternative_reading
lexical_decisions:
- source_word: τέκνον / Hijo mío
  english_pob_choice: My child
  chosen_spanish: Hijo mío
  alternatives_spanish:
  - Hijo
  - Niño mío
  lexicon: BDAG
  rationale: El vocativo griego τέκνον está presente en el paralelo y forma parte del tono exhortativo. En español, «Hijo mío» conserva la cercanía y el registro sapiencial sin sonar forzado.
- source_word: ζωὴν ἐπαιτήσεως
  english_pob_choice: the life of a beggar
  chosen_spanish: la vida de mendigo
  alternatives_spanish:
  - la vida de un mendigo
  - una vida de mendicidad
  - la vida de pedir limosna
  lexicon: BDAG / contexto griego
  rationale: El griego apunta a una vida caracterizada por la petición de limosna o por mendigar. «La vida de mendigo» reproduce bien la idea de una forma de vida humillante y evita una paraphrasis excesiva.
- source_word: μὴ βιώσῃς
  english_pob_choice: do not live
  chosen_spanish: no vivas
  alternatives_spanish:
  - no sigas viviendo
  - no lleves
  lexicon: BDAG
  rationale: La prohibición es directa; «no vivas» es natural en español y conserva la fuerza del imperativo negativo.
- source_word: κρεῖσσον
  english_pob_choice: it is better
  chosen_spanish: mejor es
  alternatives_spanish:
  - es preferible
  - más vale
  lexicon: BDAG
  rationale: El comparativo griego se expresa de forma idiomática en español con «mejor es», manteniendo el valor sentencioso.
- source_word: ἀποθανεῖν
  english_pob_choice: to die
  chosen_spanish: morir
  alternatives_spanish:
  - fallecer
  - perecer
  lexicon: BDAG
  rationale: El griego usa el infinitivo común de morir; «morir» es la correspondencia más directa y no suaviza el contraste del dicho.
- source_word: ἐπαιτεῖν
  english_pob_choice: to beg
  chosen_spanish: mendigar
  alternatives_spanish:
  - pedir limosna
  - suplicar
  lexicon: BDAG
  rationale: «Mendigar» conserva el sentido fuerte de pedir limosna y mantiene la relación léxica con la primera mitad del verso.
translation_notes:
  revision_awareness: La presente redacción sigue el paralelo griego como control principal para una línea hebrea difícil y fragmentaria; coincide sustancialmente con la solución auditada en inglés, sin cambios de sentido relevantes.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» u otra sustitución irrelevante porque no aparece el tetragrámaton ni un equivalente divino en este versículo.
  - Se prefirió «mendigo/mendigar» por ser claro y de registro bíblico natural en español, sin desplazar el matiz de limosna del griego.
  - El vocativo inicial se marcó con nota para señalar que proviene del paralelo griego y no de la línea hebrea conservada.
