lexical_decisions:
- source_word: בְּבוֹא
  english_pob_choice: when ... came
  chosen_spanish: cuando ... fue
  alternatives_spanish:
  - al venir
  - al llegar
  lexicon: HALOT
  rationale: El infinitivo con ב introduce una cláusula temporal. En español, «cuando» expresa de manera natural la relación temporal del superscrito. Aquí «fue» evita una calca y mantiene la referencia narrativa al movimiento de Natán.
- source_word: אֵלָיו
  english_pob_choice: to him
  chosen_spanish: a él
  alternatives_spanish:
  - para él
  - hacia él
  lexicon: HALOT
  rationale: La construcción con אֶל + sufijo se rinde de forma directa como «a él», conservando la dirección del movimiento sin añadir matiz no presente en el hebreo.
- source_word: נָתָן
  english_pob_choice: Nathan
  chosen_spanish: Natán
  alternatives_spanish:
  - Natan
  lexicon: convención onomástica
  rationale: Nombre propio transliterado según la forma usual en español bíblico.
- source_word: הַנָּבִיא
  english_pob_choice: the prophet
  chosen_spanish: el profeta
  alternatives_spanish:
  - el profeta de Yahvé
  - el profeta Natán
  lexicon: HALOT
  rationale: Se conserva el título definido tal como está en hebreo. No se añade el nombre otra vez porque el texto ya identifica a Natán y el artículo definido marca la función.
- source_word: כַּאֲשֶׁר
  english_pob_choice: after
  chosen_spanish: después de
  alternatives_spanish:
  - cuando
  - tal como
  lexicon: HALOT
  rationale: En este contexto, la relación temporal queda mejor en español con «después de», que refleja la secuencia entre la visita de Natán y el episodio con Betsabé.
- source_word: בָּא אֶל
  english_pob_choice: he had gone in to
  chosen_spanish: haber ido a
  alternatives_spanish:
  - haber entrado en
  - haber llegado a
  lexicon: HALOT
  rationale: El hebreo usa בוא con אֶל en un eufemismo sexual. En español, una solución demasiado explícita podría sobrecargar el verso; «haber ido a» conserva el giro idiomático y deja claro el desplazamiento hacia Betsabé, mientras la nota explica la alusión sexual.
- source_word: בַּת שָׁבַע
  english_pob_choice: Bathsheba
  chosen_spanish: Betsabé
  alternatives_spanish:
  - Bat-seba
  - Bathsheba
  lexicon: convención onomástica
  rationale: Se usa la forma consagrada en español bíblico, adaptada a la fonética del idioma.
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés: el clúster בְּבוֹא + אֵלָיו se entendió como cláusula temporal; כַּאֲשֶׁר se tomó como secuencia posterior; y בָּא אֶל se trató como eufemismo idiomático. En español se optó por una formulación natural que conserve el orden y el sentido implícito sin volverlo excesivamente explícito en el texto principal.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - «Natán» y «Betsabé» siguen convenciones bíblicas españolas ampliamente reconocibles.
  - La nota [a] preserva la tensión lexical/idiomática que el POB inglés también documenta.
