revisions:
- from: Y quitará toda su grasa[a], como se quita la grasa de la víctima de los sacrificios de paz; y el sacerdote la quemará sobre el altar, como aroma grato[b] para Yahvé. Y el sacerdote hará expiación por él, y le será perdonado.
  to: Y quitará toda su grasa, como se quita la grasa del sacrificio de las ofrendas de paz[a]; y el sacerdote la quemará sobre el altar, como aroma grato[b] para Yahvé. Y el sacerdote hará expiación por él, y será perdonado.
  rationale: 'Se corrige la ubicación y el contenido de la nota lexical para que siga la auditoría POB: la alternativa corresponde a שְׁלָמִים, no a ''grasa''. También se elimina ''víctima'', que añadía interpretación no explícita, y se ajusta la cláusula final a ''será perdonado'' para reflejar mejor el resultado personal del hebreo y la redacción del POB inglés.'
  reviewer_model: gpt-5.4
