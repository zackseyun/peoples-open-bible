  rationale: Se corrigió la fórmula de nombramiento a un español natural sin perder el sentido del hebreo. Se mantuvo el topónimo transliterado según la política del proyecto y se reparó la nota léxica para reflejar mejor el valor de תַּאֲוָה. También se fortaleció «codiciado» con «con avidez» para comunicar con más claridad el matiz de deseo desordenado presente en הַמִּתְאַוִּים, manteniendo una redacción digna y clara.
