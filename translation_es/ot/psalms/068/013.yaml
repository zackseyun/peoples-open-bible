translation:
  language: es
  text: Los reyes de los ejércitos huyen[a], sí, huyen; y la mujer en casa reparte el botín.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O bien: «la mujer de la casa reparte el botín» / «la que mora en la casa reparte el botín». El hebreo está en femenino singular y probablemente presenta a la mujer que permanece en casa recibiendo y distribuyendo el botín de guerra.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַלְכֵי צְבָאוֹת
  english_pob_choice: kings of armies
  chosen_spanish: los reyes de los ejércitos
  alternatives_spanish:
  - los reyes de los huestes
  - los reyes con sus ejércitos
  lexicon: HALOT
  rationale: 'El hebreo está en constructo y expresa relación de posesión o pertenencia: reyes asociados con ejércitos. «Ejércitos» comunica con naturalidad el valor militar de צְבָאוֹת sin introducir en español la resonancia litúrgica de «huestes» ni el matiz técnico de un título divino.'
- source_word: יִדֹּדוּן יִדֹּדוּן
  english_pob_choice: flee, they flee
  chosen_spanish: huyen, huyen
  alternatives_spanish:
  - siguen huyendo
  - huyen por completo
  lexicon: HALOT
  rationale: El verbo repetido expresa huida enfática. La repetición directa en español preserva la fuerza poética y el paralelismo, sin añadir un adverbio interpretativo que el hebreo no obliga.
- source_word: וּנְוַת בַּיִת
  english_pob_choice: the woman at home
  chosen_spanish: la mujer en casa
  alternatives_spanish:
  - la ama de casa
  - la que mora en la casa
  - la mujer del hogar
  lexicon: HALOT
  rationale: La forma es femenina singular y describe a la mujer que permanece en el ámbito doméstico. «La mujer en casa» conserva el referente femenino singular y evita introducir un oficio o rol social moderno que el hebreo no especifica.
- source_word: תְּחַלֵּק
  english_pob_choice: divides
  chosen_spanish: reparte
  alternatives_spanish:
  - divide
  - distribuye
  - aporta
  lexicon: HALOT
  rationale: El piel tiene sentido de dividir o distribuir porciones. «Reparte» suena natural en español y transmite la acción de distribuir el botín con claridad, sin perder el valor distributivo del verbo.
- source_word: שָׁלָל
  english_pob_choice: the spoil
  chosen_spanish: el botín
  alternatives_spanish:
  - el despojo
  - el saqueo
  - el botín de guerra
  lexicon: HALOT
  rationale: שָׁלָל designa el botín o despojo tomado en la guerra. «Botín» es el equivalente más transparente y usual en español bíblico contemporáneo; «de guerra» puede añadirse contextualmente, pero aquí el paralelo ya fija el sentido militar.
translation_notes:
  revision_awareness: El texto sigue de cerca la lectura estable del hebreo consonántico/vocalizado y conserva la repetición enfática del verbo de huida. Se mantiene la imagen doméstico-militar sin suavizarla ni convertirla en una paráfrasis.
  spanish_consistency_notes:
  - Se prefirió «Yahvé» como norma del proyecto, pero este versículo no contiene el tetragrámaton ni κύριος.
  - Se evitó «SEÑOR» porque no corresponde a este pasaje.
  - Se eligió «botín» sobre «despojo» por naturalidad contemporánea y precisión militar.
  - Se mantuvo la repetición verbal para reflejar el énfasis del hebreo.
