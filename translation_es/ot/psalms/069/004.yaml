review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del hebreo: cansancio por clamar, garganta reseca, ojos agotados mientras espera en Dios. Sin embargo, la nota [a] no corresponde al segmento anclado «mi clamor»: introduce «mientras clamo a mi Dios» y mezcla indebidamente la ambigüedad de esperar/esperanza, que pertenece a מְיַחֵל al final del versículo, no a בְּקָרְאִי. También conviene hacer más idiomático en español el complemento de espera con «en mi Dios» o similar, ya que «espero a mi Dios» puede sugerir simplemente aguardar su llegada.'
  spanish_quality_summary: 'El español es claro y digno, pero hay dos detalles mejorables: «de mi clamor» suena algo nominal y menos natural que «de tanto clamar», y «mis ojos fallan» es comprensible pero algo calcado; «mis ojos se consumen» o «se me agotan los ojos» suena más bíblico-natural. La frase revisada gana fluidez sin apartarse del hebreo.'
  glossary_alignment: 'No hay conflictos mayores con la terminología del proyecto: אֱלֹהַי está bien como «mi Dios». No aparecen términos sensibles como Yahvé/Mesías. La decisión sobre יחל debe conservar la doble posibilidad esperar/esperar con esperanza en nota, pero aplicada al verbo correcto.'
  issues:
  - severity: high
    issue: La nota [a] está lexicalmente mal ubicada y explica el verbo equivocado.
    rationale: El ancla [a] está en «mi clamor», correspondiente a בְּקָרְאִי («mi clamar / mi clamor»). Pero la nota habla de «mientras clamo a mi Dios» y de «la espera confiada», lo cual pertenece a מְיַחֵל לֵאלֹהָי («mientras espero / espero con esperanza en mi Dios»). Esto distorsiona el audit trail y la evidencia fuente.
  - severity: medium
    issue: «Espero a mi Dios» es menos natural para la construcción de confianza/espera en Dios.
    rationale: Con יחל + ל, el sentido es esperar en dirección a Dios, con expectativa. En español bíblico-natural, «espero en mi Dios» comunica mejor la confianza que «espero a mi Dios», que puede leerse como simple espera de llegada.
  - severity: low
    issue: «De mi clamor» y «mis ojos fallan» son algo rígidos.
    rationale: No son incorrectos, pero «de tanto clamar» expresa mejor el valor causal de בְּקָרְאִי, y «mis ojos se consumen» reproduce mejor la imaginería de כלו en este contexto poético.
  revised_spanish_text: Estoy cansado de tanto clamar; se me ha secado la garganta[a]; mis ojos se consumen mientras espero en mi Dios[b].
  revised_footnotes:
