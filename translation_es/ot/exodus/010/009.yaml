translation:
  language: es
  text: 'Moisés dijo[a]: «Iremos con nuestros jóvenes y nuestros mayores; iremos con nuestros hijos y nuestras hijas, con nuestros rebaños y nuestro ganado, pues debemos celebrar una fiesta para Yahvé».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «celebrar una festividad para Yahvé» o «guardar una fiesta para Yahvé».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - respondió
  - habló
  lexicon: HALOT
  rationale: Es la fórmula narrativa normal para introducir discurso directo; en español, «dijo» conserva la naturalidad y la función del wayyiqtol sin añadir matices no presentes.
- source_word: בִּנְעָרֵינוּ
  english_pob_choice: with our young
  chosen_spanish: con nuestros jóvenes
  alternatives_spanish:
  - con nuestros muchachos
  - con nuestros jóvenes varones
  - con nuestros niños
  lexicon: HALOT
  rationale: נְעָרִים puede abarcar jóvenes en sentido amplio. «Jóvenes» mantiene el contraste de edad con «ancianos» y evita restringir indebidamente el grupo a varones o a niños.
- source_word: וּבִזְקֵנֵינוּ
  english_pob_choice: and our old
  chosen_spanish: y nuestros ancianos
  alternatives_spanish:
  - y nuestros viejos
  - y nuestros mayores
  lexicon: HALOT
  rationale: Aquí el paralelo con «nuestros jóvenes» favorece el valor etario de זְקֵנִים. «Ancianos» reproduce bien la oposición, aunque en otros contextos podría sugerir cargo comunitario.
- source_word: בְּבָנֵינוּ וּבִבְנוֹתֵינוּ
  english_pob_choice: with our sons and our daughters
  chosen_spanish: con nuestros hijos y nuestras hijas
  alternatives_spanish:
  - con nuestros hijos e hijas
  - con nuestros varones y nuestras mujeres
  lexicon: HALOT
  rationale: El hebreo nombra explícitamente hijos e hijas; en español, «hijos y nuestras hijas» preserva la especificidad familiar y evita una generalización excesiva como «nuestros niños».
- source_word: בְּצֹאנֵנוּ
  english_pob_choice: with our flocks
  chosen_spanish: con nuestros rebaños
  alternatives_spanish:
  - con nuestras ovejas y cabras
  - con nuestro ganado menor
  lexicon: HALOT
  rationale: צֹאן es un colectivo para ganado menor, especialmente ovejas y cabras. «Rebaños» es la equivalencia española más natural y compacta en este contexto.
- source_word: וּבִבְקָרֵנוּ
  english_pob_choice: and our herds
  chosen_spanish: y nuestros ganados
  alternatives_spanish:
  - y nuestro ganado
  - y nuestros hatos de ganado
  lexicon: HALOT
  rationale: בָּקָר apunta al ganado mayor, sobre todo vacuno. «Ganados» conserva el paralelismo con «rebaños» y la distinción de colectivos animales sin sonar demasiado técnico.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: pues
  alternatives_spanish:
  - porque
  - ya que
  lexicon: HALOT
  rationale: La partícula causal introduce la razón de la petición. «Pues» mantiene un registro formal y corresponde bien al valor explicativo de כִּי en este contexto.
- source_word: חַג
  english_pob_choice: hold a feast
  chosen_spanish: celebrar una fiesta
  alternatives_spanish:
  - hacer una fiesta
  - guardar una fiesta
  - celebrar una festividad
  lexicon: HALOT
  rationale: חַג designa una fiesta/festival cultual. «Celebrar una fiesta» comunica la acción de modo natural en español y conserva el sentido festivo y litúrgico sin imponer una formulación más eclesiástica que la fuente no exige.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se conserva el nombre divino del tetragrámaton con la forma española establecida en el proyecto, «Yahvé», en lugar de sustituirlo por un título.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: El texto hebreo usa el nombre propio del pacto, no un título. El español del proyecto lo normaliza como «Yahvé» para preservar esa distinción y evitar la ocultación del nombre por una sustitución litúrgica.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: 'La versión inglesa revisada prefirió «for» sobre «because» para un registro más formal y una relación más cercana con כִּי; por eso se eligió «pues» en español, que mantiene ese valor causal con dignidad y fluidez. Se conservó la estructura paralela del hebreo: grupos humanos primero, luego el ganado, y finalmente la razón cultual.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» conforme al criterio terminológico del proyecto para יְהוָה.
  - Se evitó «siervo» o vocabulario cultual eclesiástico no sustentado por el hebreo.
  - «Jóvenes / ancianos» conserva el contraste etario, no de liderazgo.
  - «Rebaños / ganados» reproduce la pareja de colectivos animales del hebreo sin sobreespecificar especies.
