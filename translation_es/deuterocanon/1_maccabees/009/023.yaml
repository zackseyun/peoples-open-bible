revisions:
- from: Y aconteció que, después de la muerte de Judas, los impíos[a] surgieron en todos los territorios de Israel[b], y todos los que practicaban la injusticia se alzaron.
  to: Y aconteció que, después de la muerte de Judas, los sin ley[a] surgieron en todos los territorios de Israel, y todos los que obraban la injusticia se alzaron.
  rationale: 'Se ajusta «los impíos» a «los sin ley» para preservar el vínculo con νόμος y la decisión auditada ''the lawless''. Se cambia «practicaban» a «obraban» para acercarse más a ἐργαζόμενοι sin forzar el español. Se elimina la nota sobre «territorios/regiones» porque no corresponde al expediente inglés para este versículo y no hace falta crear una nueva ambigüedad en español; en cambio, se corrige la nota de la sustantivación para que sea una alternativa real. No se requiere adjudicación adicional: la reparación es local y clara.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:12:02Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del griego: fórmula narrativa, muerte de Judas, aparición pública de los transgresores en todo Israel, y expansión general de quienes hacen ἀδικία. Sin embargo, dos decisiones atenúan o desplazan matices importantes del expediente POB: οἱ ἄνομοι se vertió como «los impíos», lo cual mueve el foco de ''sin ley / contrarios a la ley'' a ''impíos''; y «practicaban la injusticia» introduce imperfecto pasado y un verbo menos cercano a ἐργαζόμενοι que el inglés auditado revisó precisamente a ''worked''.'
  spanish_quality_summary: El español es claro y legible, con tono bíblico natural. No obstante, «aconteció» suena algo más tradicional que necesario; «sucedió» sería más natural, aunque no es obligatorio cambiarlo. La frase mejora en fidelidad y paralelismo con «obraban la injusticia» y con una opción más cercana a ἄνομοι como «los sin ley».
  glossary_alignment: 'No hay términos del glosario mayor directamente implicados, pero sí una decisión teológica-lexical auditada: preservar el campo semántico de νόμος. «Los impíos» no refleja suficientemente ''lawless''. Además, el expediente inglés conservó la alternativa sustantiva sin añadir ''hombres''; eso debe mantenerse en español.'
  issues:
  - severity: high
    issue: «los impíos» para οἱ ἄνομοι
    rationale: ἄνομοι significa 'sin ley / contrarios a la ley', con carga moral-covenantal ligada a νόμος. «Impíos» enfatiza irreverencia o falta de piedad, no específicamente la condición de anómicos. Dado que el inglés POB documentó 'the lawless' como decisión principal, el español debería conservar esa noción más de cerca.
  - severity: medium
    issue: «practicaban la injusticia» para οἱ ἐργαζόμενοι τὴν ἀδικίαν
    rationale: Aunque idiomático, cambia el participio presente a imperfecto narrativo y se aleja de la revisión auditada en inglés que volvió de 'practiced' a 'worked' por mayor cercanía léxica. «Los que obraban la injusticia» suena natural en español y preserva mejor la fuerza verbal.
  - severity: low
    issue: Nota al pie a no ofrece una alternativa real
    rationale: La nota dice «O 'los impíos'…» cuando el texto principal ya usa «los impíos». Debe reflejar una alternativa genuina vinculada a la sustantivación masculina plural, por ejemplo la posibilidad de añadir «hombres», o bien omitirse.
  revised_spanish_text: Y aconteció que, después de la muerte de Judas, los sin ley[a] surgieron en todos los territorios de Israel, y todos los que obraban la injusticia se alzaron.
  revised_footnotes:
  - marker: a
    text: O «los sin ley hombres»; el plural griego puede funcionar de manera sustantiva, de modo que no es necesario añadir «hombres».
    reason: lexical_alternative
  revision_rationale: 'Se ajusta «los impíos» a «los sin ley» para preservar el vínculo con νόμος y la decisión auditada ''the lawless''. Se cambia «practicaban» a «obraban» para acercarse más a ἐργαζόμενοι sin forzar el español. Se elimina la nota sobre «territorios/regiones» porque no corresponde al expediente inglés para este versículo y no hace falta crear una nueva ambigüedad en español; en cambio, se corrige la nota de la sustantivación para que sea una alternativa real. No se requiere adjudicación adicional: la reparación es local y clara.'
