id: 1PE.5.13
reference: 1 Peter 5:13
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ἀσπάζεται ὑμᾶς ἡ ἐν Βαβυλῶνι συνεκλεκτὴ καὶ Μᾶρκος ὁ υἱός μου.
base_translation:
  language: en
  yaml_path: translation/nt/1_peter/005/013.yaml
  text: 'She who is in Babylon, chosen together with you, greets you, and so does Mark, my son.'
translation:
  language: ko
  text: '바벨론[a]에 있는, 여러분과 함께 택하심을 받은 자가 여러분에게 안부를 전합니다. 또한 내 아들 마가도 그러합니다.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '「바벨론」은 대다수 주석가에 의해 로마의 비유적 호칭으로 본다 (계시록의 용법과 평행). 일부는 문자적 메소포타미아의 바벨론으로 본다. 「함께 택하심을 받은 자」(여성 단수)는 로마 교회 공동체를 가리키는 의인화로 보는 것이 일반적이다.'
    reason: cultural_note
lexical_decisions:
- source_word: Βαβυλῶνι
  english_pob_choice: Babylon
  chosen_korean: 바벨론
  alternatives_korean: []
  lexicon: BDAG
  rationale: 정착된 표기.
- source_word: ἡ ... συνεκλεκτὴ
  english_pob_choice: She who is ... chosen together with you
  chosen_korean: 여러분과 함께 택하심을 받은 자
  alternatives_korean:
  - 너희와 함께 택하심을 입은 여자
  - 함께 선택된 자매 (교회)
  lexicon: BDAG
  rationale: 여성 단수 분사. 베드로의 아내 또는 로마 교회 공동체(의인화)로 해석됨. 본문은 어느 쪽도 닫지 않고 「여러분과 함께 택하심을 받은 자」로 옮긴다.
- source_word: Μᾶρκος ὁ υἱός μου
  english_pob_choice: Mark, my son
  chosen_korean: 내 아들 마가
  alternatives_korean:
  - 나의 아들 마르코
  lexicon: BDAG
  rationale: 「마가」는 정착된 표기. 「아들」은 영적 자녀의 의미.
