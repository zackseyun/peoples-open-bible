translation:
  language: es
  text: Porque sabemos[a], hermanos amados por Dios, su elección[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hermanos y hermanas»; el griego dice «hermanos», pero en las cartas de Pablo esto a menudo se dirige a toda la comunidad creyente.
    reason: lexical_alternative
  - marker: b
    text: O «su ser escogidos». El sustantivo griego es «elección», y conviene no reducirlo aquí a un sistema teológico particular más allá de lo que el texto mismo afirma.
    reason: alternative_reading
lexical_decisions:
- source_word: εἰδότες
  english_pob_choice: For we know
  chosen_spanish: Porque sabemos
  alternatives_spanish:
  - sabiendo
  - ya que sabemos
  lexicon: οἶδα (BDAG)
  rationale: El participio perfecto con valor de circunstancia/explanación se traduce de modo natural en español como una cláusula causal que continúa el argumento de 1:3. «Porque sabemos» conserva el valor de conocimiento adquirido y el flujo explicativo sin forzar una construcción participial rígida.
- source_word: ἀδελφοὶ
  english_pob_choice: brothers
  chosen_spanish: hermanos
  alternatives_spanish:
  - hermanos y hermanas
  - hermanos/as
  lexicon: ἀδελφός (BDAG)
  rationale: Se mantiene la forma masculina plural del griego en el texto principal, como en el POB inglés, porque refleja con precisión la forma fuente. En español, «hermanos» puede funcionar de manera congregacional sin perder la marca gramatical original.
- source_word: ἠγαπημένοι ὑπὸ θεοῦ
  english_pob_choice: loved by God
  chosen_spanish: amados por Dios
  alternatives_spanish:
  - amados por Dios
  - amados de Dios
  - queridos por Dios
  lexicon: ἀγαπάω (BDAG)
  rationale: 'El participio perfecto pasivo expresa un estado resultante: haber sido amados. «Amados por Dios» conserva la voz pasiva y su sentido estable, y «amados» es un equivalente natural y digno en español bíblico contemporáneo.'
- source_word: ἐκλογὴν
  english_pob_choice: election
  chosen_spanish: elección
  alternatives_spanish:
  - ser escogidos
  - escogimiento
  - ser elegidos
  lexicon: ἐκλογή (BDAG)
  rationale: Se conserva el sustantivo formal «elección» para mantener el peso lexical y teológico del término, evitando una paráfrasis que resuelva indebidamente la cuestión doctrinal. Esta forma refleja bien el sustantivo griego sin estrecharlo a un sistema teológico particular.
- source_word: ὑμῶν
  english_pob_choice: your
  chosen_spanish: su
  alternatives_spanish:
  - su
  - de ustedes
  - vuestra
  lexicon: σύ (BDAG)
  rationale: El posesivo español concuerda con un referente plural de segunda persona. En una frase publicada para lectura comunitaria, «su» resulta natural y fluido; el referente se entiende por el contexto inmediato del destinatario colectivo.
theological_decisions:
- issue: Alcance de ἀδελφοί en una carta paulina
  english_pob_reading: brothers (with footnote noting possible inclusive address)
  chosen_spanish_reading: hermanos, con nota sobre el posible valor inclusivo
  alternative_spanish_readings:
  - hermanos y hermanas
  - la comunidad de creyentes
  rationale: Se retiene la forma gramatical del griego en el cuerpo del texto, pero se señala en nota que el vocativo masculino suele dirigirse a toda la comunidad creyente. Así se preserva la forma fuente sin perder la posible referencia inclusiva.
  doctrine_reference: Translation philosophy §4
- issue: Traducción de ἐκλογή en un contexto doctrinalmente sensible
  english_pob_reading: election, not narrowed to a particular theological system
  chosen_spanish_reading: elección, sin precisar un sistema doctrinal particular
  alternative_spanish_readings:
  - ser escogidos
  - la elección de Dios sobre ustedes
  rationale: «Elección» conserva la tensión lexical y teológica del sustantivo griego y evita introducir explicaciones que el texto no desarrolla. La nota protege contra una lectura sistemática prematura, igual que en el POB inglés.
  doctrine_reference: Affirmations; Translation philosophy §3, §5
- issue: Relación entre el amor divino y la elección
  english_pob_reading: loved by God, your election
  chosen_spanish_reading: amados por Dios, su elección
  alternative_spanish_readings:
  - amados por Dios, los elegidos de ustedes
  - amados por Dios, que han sido escogidos
  rationale: El texto griego une el amor divino con la elección sin explicitar causalidad adicional. La traducción mantiene ambos elementos en yuxtaposición para no resolver lo que el versículo deja en tensión.
  doctrine_reference: 1 Thessalonians 1:4; Translation philosophy §5
translation_notes:
  revision_awareness: 'El borrador sigue el texto griego SBLGNT y el acuerdo alto del control cruzado del POB inglés. No se introdujeron revisiones sustanciales respecto del sentido auditado: se preserva la secuencia causal de εἰδότες, el vocativo masculino plural, el participio pasivo perfecto de ἀγαπάω y el sustantivo doctrinalmente cargado ἐκλογή. La decisión principal es hacer explícita en español la relación lógica con «Porque» para naturalidad discursiva, sin alterar el contenido.'
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός según el estándar del proyecto.
  - Se conserva «elección» como sustantivo formal para ἐκλογή, en paralelo con el POB inglés.
  - El vocativo plural masculino «hermanos» se deja en el texto principal y se aclara su posible alcance inclusivo en nota.
  - La frase es breve y litúrgicamente legible, pero evita ampliar el texto con explicaciones no presentes en el griego.
