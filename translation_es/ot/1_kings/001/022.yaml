translation:
  language: es
  text: Y he aquí[a], mientras ella todavía hablaba con el rey, Natán el profeta entró.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mira»; el marcador discursivo hebreo llama la atención sobre el desarrollo repentino de la escena.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִנֵּה
  english_pob_choice: And behold
  chosen_spanish: Y he aquí
  alternatives_spanish:
  - Y mira
  - Y he aquí, ahora
  lexicon: HALOT
  rationale: הִנֵּה funciona como marcador discursivo que llama la atención sobre un giro repentino de la escena. «Y he aquí» conserva ese valor de sorpresa o señalamiento con un registro digno y natural en español.
- source_word: עוֹדֶנָּה
  english_pob_choice: while she was still
  chosen_spanish: todavía estaba
  alternatives_spanish:
  - aún estaba
  - seguía
  lexicon: HALOT
  rationale: El adverbio con sufijo expresa continuidad de la acción. En español, «todavía estaba» comunica bien que la acción no había terminado cuando ocurrió el siguiente evento.
- source_word: מְדַבֶּרֶת
  english_pob_choice: speaking
  chosen_spanish: hablando
  alternatives_spanish:
  - diciendo
  - conversando
  lexicon: HALOT
  rationale: El participio indica acción en curso. «Hablando» es la opción más directa y natural en español para mantener la progresividad del hebreo.
- source_word: עִם הַמֶּלֶךְ
  english_pob_choice: with the king
  chosen_spanish: con el rey
  alternatives_spanish:
  - ante el rey
  - al rey
  lexicon: HALOT
  rationale: La preposición עִם favorece «con». Aunque el contexto real implica audiencia ante el rey, «con el rey» preserva mejor la relación expresada por el hebreo.
- source_word: וְנָתָן
  english_pob_choice: Nathan
  chosen_spanish: Natán
  alternatives_spanish:
  - Natan
  lexicon: Transliteración estándar del nombre propio
  rationale: El nombre אישי נָתָן se adapta al uso español bíblico como «Natán», forma clara y ampliamente reconocible.
- source_word: הַנָּבִיא
  english_pob_choice: the prophet
  chosen_spanish: el profeta
  alternatives_spanish:
  - el profeta de Dios
  lexicon: HALOT
  rationale: El sustantivo en aposición identifica el oficio de Natán. «El profeta» es la traducción simple y fiel, sin añadir contenido que el texto no expresa.
- source_word: בָּא
  english_pob_choice: came in
  chosen_spanish: entró
  alternatives_spanish:
  - vino
  - llegó
  lexicon: HALOT
  rationale: En este contexto de sala real, בָּא comunica llegada al lugar o presencia del rey. «Entró» expresa con precisión ese desplazamiento sin forzar una perífrasis.
translation_notes:
  revision_awareness: 'La versión española sigue de cerca la lectura y el registro de la POB inglesa revisada, pero vuelve al matiz más natural del hebreo con una estructura fluida en español: marcador de atención, continuidad aspectual y verbo de entrada adecuados al contexto cortesano.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general para el nombre divino, pero este versículo no contiene el tetragrámaton.
  - Se usa «Natán» como forma española estable del nombre propio.
  - Se conserva un tono bíblico digno sin recurrir a calcos excesivamente arcaizantes.
