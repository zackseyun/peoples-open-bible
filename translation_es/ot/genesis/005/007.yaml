translation:
  language: es
  text: Después de haber engendrado a Enós, Set vivió ochocientos siete años y engendró hijos e hijas.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיְחִי
  english_pob_choice: lived
  chosen_spanish: vivió
  alternatives_spanish:
  - estuvo vivo
  - vivió durante
  lexicon: HALOT
  rationale: En una fórmula genealógica, חיה expresa la duración de la vida después del evento señalado. «Vivió» comunica de forma natural ese valor temporal en español sin perder la relación con el balance cronológico del pasaje.
- source_word: אֲחֲרֵי
  english_pob_choice: after
  chosen_spanish: después de
  alternatives_spanish:
  - tras
  - luego de
  lexicon: HALOT
  rationale: Marca el período posterior al nacimiento/engendramiento de Enós. «Después de» es claro y mantiene el orden temporal del hebreo.
- source_word: הוֹלִידוֹ
  english_pob_choice: he fathered
  chosen_spanish: haber engendrado
  alternatives_spanish:
  - haber sido padre de
  - haber dado a luz a
  lexicon: HALOT
  rationale: El hifil de ילד con sufijo de 3ms señala que Set fue el sujeto que engendró. «Haber engendrado» conserva el sentido genealógico y la relación causal del verbo, evitando una paráfrasis excesiva.
- source_word: אֶת אֱנוֹשׁ
  english_pob_choice: Enosh
  chosen_spanish: a Enós
  alternatives_spanish:
  - Enós
  - de Enós
  lexicon: HALOT
  rationale: El marcador de objeto directo exige en español una construcción verbal con objeto personal. Se conserva el nombre propio como «Enós» por transliteración estándar en español bíblico del proyecto.
- source_word: שֶׁבַע שָׁנִים וּשְׁמֹנֶה מֵאוֹת שָׁנָה
  english_pob_choice: eight hundred and seven years
  chosen_spanish: ochocientos siete años
  alternatives_spanish:
  - ochocientos y siete años
  - siete años y ochocientos años
  lexicon: HALOT
  rationale: El hebreo expresa primero la unidad y luego las centenas, pero el español idiomático ordena el número como «ochocientos siete años». Se mantiene la suma total sin calco innecesario.
- source_word: וַיּוֹלֶד
  english_pob_choice: and fathered
  chosen_spanish: engendró
  alternatives_spanish:
  - fue padre de
  - engendró también
  lexicon: HALOT
  rationale: El verbo repetido en la fórmula genealógica se traduce de modo consistente con «engendró». «Fue padre de» sería más explicativo; «engendró» conserva mejor la concisión y la fórmula del texto.
- source_word: בָּנִים וּבָנוֹת
  english_pob_choice: sons and daughters
  chosen_spanish: hijos e hijas
  alternatives_spanish:
  - varones y mujeres
  - descendencia
  lexicon: HALOT
  rationale: El hebreo distingue explícitamente entre masculino y femenino. En español, «hijos e hijas» comunica esa distinción de manera natural; aunque «sons and daughters» se puede verter literalmente como «hijos e hijas», aquí se prioriza la idiomaticidad y la inclusividad textual.
theological_decisions:
- issue: Fórmula genealógica de longevidad y engendramiento
  english_pob_reading: A factual genealogical report with no added doctrinal development.
  chosen_spanish_reading: Se mantiene como reporte genealógico factual, sin ampliar el sentido más allá de la cronología y la descendencia.
  alternative_spanish_readings:
  - lectura simbólica o homilética de la longevidad
  - paráfrasis explicativa sobre continuidad de linaje
  rationale: El versículo funciona como dato genealógico en la secuencia de Génesis 5. La traducción debe conservar esa función documental sin introducir interpretación teológica no requerida por el hebreo ni por el registro de la POB.
  doctrine_reference: Génesis 5:7; genealogías patriarcales como marco narrativo
translation_notes:
  revision_awareness: El contexto auditado muestra alta concordancia entre la traducción inglesa POB y la revisión; no se registran revisiones aplicadas ni notas textuales. La propuesta española sigue el mismo contenido, ajustando solo el orden numérico y la sintaxis natural del español.
  spanish_consistency_notes:
  - Se mantiene la transliteración «Enós» coherente con el nombre propio bíblico en español.
  - Se usa «engendró» de manera consistente para el verbo genealógico ילד, evitando alternar con perífrasis más interpretativas.
  - Se conserva el plural explícito «hijos e hijas» para reflejar con precisión el hebreo.
