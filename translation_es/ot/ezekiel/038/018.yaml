review_pass:
  verdict: revise
  source_alignment_summary: El borrador sigue bien la estructura hebrea, la temporalidad profética, el movimiento hostil de Gog contra la tierra de Israel y la fórmula oracular. También preserva correctamente el nombre divino como «Yahvé». Sin embargo, «en mi nariz» no refleja bien el hebreo בְּאַפִּי en español natural; el inglés auditado ya fijó el matiz más literal como «in my nostrils», y en español la correspondencia más fiel es «en mis narices» o «en mis fosas nasales», no el singular «nariz».
  spanish_quality_summary: El texto es generalmente claro y digno, pero «mi furor se levantará en mi nariz» suena extraño e incluso distractor en español. «Mis narices» conserva mejor la imagen corporal idiomática del hebreo y resulta más comprensible. También conviene ajustar la nota para que coincida exactamente con el texto revisado.
  glossary_alignment: Buen alineamiento con la terminología del proyecto en «Yahvé». «Señor Yahvé» es aceptable aquí para אֲדֹנָי יְהוִה. No hay conflicto con otros términos clave. La principal corrección es léxica/idiomática en אַף.
  issues:
  - severity: medium
    issue: «en mi nariz» no preserva adecuadamente la imagen idiomática de אַף
    rationale: El hebreo usa אַף literalmente ‘nariz/nostril(s)’ e idiomáticamente para ira. El inglés auditado optó por la imagen más concreta «in my nostrils». En español, el singular «nariz» suena menos fiel a la expresión corporal y menos natural que «mis narices» para conservar la imagen semítica.
  - severity: low
    issue: La nota al pie ya no sería exacta si se conserva la literalidad más fiel
    rationale: La nota debe corresponder exactamente al ancla textual revisada y explicar la función idiomática sin contradecir el texto principal.
  revised_spanish_text: Y sucederá en aquel día[a], en el día en que Gog venga contra la tierra de Israel, declara el Señor Yahvé, que mi furor se levantará en mis narices.
  revised_footnotes:
  - marker: a
    text: 'Hebreo: «en mis narices», donde «narices» funciona idiomáticamente para la ira; la imagen corporal se conserva aquí para no perder la fuerza del hebreo.'
    reason: lexical_alternative
  revision_rationale: Se revisó «en mi nariz» a «en mis narices» para reflejar mejor el hebreo אַף en su imaginería corporal concreta, en línea con la decisión auditada en inglés de preservar «nostrils». El resto del versículo puede mantenerse tal como está.
