    issue: «ha hablado a Moisés» suena poco natural en español
    rationale: Aunque es comprensible, en español la construcción más idiomática es «le habló a Moisés» o «habló con Moisés». Dado que el hebreo אֶל marca dirección, «le habló a Moisés» preserva bien el sentido sin rigidez innecesaria.
  - severity: low
    issue: La frase verbal completa puede sonar algo mecánica
    rationale: «se desvían sin intención y no hacen» es fiel, pero en español legal/religioso moderno funciona mejor con una leve pulida manteniendo el mismo contenido fuente.
