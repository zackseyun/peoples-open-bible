translation:
  language: es
  text: 'Porque así dice Yahvé de los ejércitos, el Dios de Israel, acerca de los vasos que quedan en la casa de Yahvé[a], en la casa del rey de Judá[b], y en Jerusalén:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el templo de Yahvé» para «la casa de Yahvé».
    reason: lexical_alternative
  - marker: b
    text: O «el palacio del rey de Judá» para «la casa del rey de Judá».
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה צְבָאוֹת
  english_pob_choice: Yahweh of hosts
  chosen_spanish: Yahvé de los ejércitos
  alternatives_spanish:
  - Yahvé de las huestes
  - Yahvé de los ejércitos celestiales
  lexicon: HALOT
  rationale: Mantiene el nombre divino revelado y conserva el título צְבָאוֹת con un equivalente español natural. 'De los ejércitos' sigue de cerca el hebreo y es inteligible en registro bíblico; 'huestes' es posible, pero menos transparente para lectores amplios.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - el Dios de Israel
  lexicon: HALOT
  rationale: Construcción posesiva directa y transparente; no requiere mayor ajuste en español. Se conserva el título pactual sin ampliar ni suavizar el sentido.
- source_word: עַל
  english_pob_choice: concerning
  chosen_spanish: acerca de
  alternatives_spanish:
  - sobre
  - respecto de
  - contra
  lexicon: HALOT
  rationale: En este encabezado profético, עַל introduce el tema del oráculo. 'Acerca de' expresa bien esa referencia temática en español sin volverlo adversativo como 'contra'.
- source_word: הַכֵּלִים
  english_pob_choice: the vessels
  chosen_spanish: los vasos
  alternatives_spanish:
  - los utensilios
  - los objetos
  - los vasos sagrados
  lexicon: HALOT
  rationale: '''Vasos'' conserva el campo léxico de objetos cultuales y es natural en español bíblico. ''Utensilios'' puede sonar más general y ''vasos sagrados'' añade especificación no explícita en el hebreo.'
- source_word: הַנּוֹתָרִים
  english_pob_choice: that remain
  chosen_spanish: que quedan
  alternatives_spanish:
  - que permanecen
  - restantes
  - que han quedado
  lexicon: HALOT
  rationale: El participio expresa objetos aún no retirados; 'que quedan' es la forma más natural y fiel en español. 'Restantes' sería más adjetival y menos verbal.
- source_word: בֵּית יְהוָה
  english_pob_choice: the house of Yahweh
  chosen_spanish: la casa de Yahvé
  alternatives_spanish:
  - el templo de Yahvé
  - la casa del Señor
  lexicon: HALOT
  rationale: Se conserva la metáfora literal 'casa' siguiendo el hebreo y la decisión POB en inglés. 'Templo' es un equivalente interpretativo correcto, pero menos cercano al término fuente.
- source_word: בֵית מֶלֶךְ יְהוּדָה
  english_pob_choice: the house of the king of Judah
  chosen_spanish: la casa del rey de Judá
  alternatives_spanish:
  - el palacio del rey de Judá
  - la residencia del rey de Judá
  lexicon: HALOT
  rationale: Se mantiene la repetición de 'casa' porque el hebreo repite בֵּית. 'Palacio' sería una interpretación contextual posible, pero perdería la correspondencia léxica que el POB inglés preservó.
- source_word: וִירוּשָׁלִָם
  english_pob_choice: and in Jerusalem
  chosen_spanish: y en Jerusalén
  alternatives_spanish:
  - y Jerusalén
  - y dentro de Jerusalén
  lexicon: HALOT
  rationale: El hebreo añade el lugar final en la serie. 'Y en Jerusalén' reproduce la secuencia locativa de manera natural; no conviene omitir la preposición.
theological_decisions:
- issue: Tratamiento del Tetragrámaton יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: La línea editorial pide transliterar el nombre divino en vez de sustituirlo por un título. En español, 'Yahvé' es la forma preferida para reflejar יְהוָה con dignidad y reconocimiento eclesial amplio.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh / Spanish equivalent Yahvé'
- issue: Redundancia espacial final del hebreo
  english_pob_reading: in the house ... in the house ... and in Jerusalem
  chosen_spanish_reading: en la casa ... en la casa ... y en Jerusalén
  alternative_spanish_readings:
  - en la casa ... y en la casa ... y en Jerusalén
  - en la casa ... la casa ... y en Jerusalén
  rationale: El hebreo enumera tres ubicaciones con valor enfático. La traducción conserva la serie y la repetición de 'en' donde corresponde, sin introducir un 'y' extra que no refleja el flujo del texto fuente.
  doctrine_reference: Jeremías 27:21; correspondencia sintáctica hebrea en enumeraciones locativas
translation_notes:
  revision_awareness: 'El texto inglés auditado fue afinado para eliminar un ''and'' redundante antes de las dos últimas ubicaciones, preservando la secuencia locativa del hebreo. La versión española sigue esa decisión: mantiene la enumeración fluida ''en la casa de Yahvé, en la casa del rey de Judá y en Jerusalén'' sin añadir conjunciones innecesarias, y conserva la metáfora literal ''casa'' donde el POB inglés también la retuvo.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' de manera consistente para יְהוָה, conforme al estándar del proyecto.
  - Se traduce צְבָאוֹת como 'de los ejércitos', no como 'de las huestes', para favorecer claridad pública sin perder el matiz militar/celestial.
  - Se conserva 'casa' en dos lugares para reflejar la repetición hebrea y la elección del POB inglés.
  - '''Vasos'' se mantiene por su valor cultual, coherente con el contexto del templo y con el inglés ''vessels''.'
