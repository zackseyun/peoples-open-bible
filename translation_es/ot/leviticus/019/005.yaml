review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura hebrea: conserva וְכִי como «Y cuando», mantiene la repetición de זבח con objeto explícito, usa «Yahvé» para יהוה conforme al proyecto, y refleja לִרְצֹנְכֶם con el sentido de aceptabilidad cultual. Sin embargo, «ofrendas de paz» en plural dentro de «un sacrificio de ofrendas de paz» suena menos natural y menos ajustado al valor de categoría sacrificial en español que «un sacrificio de paz».'
  spanish_quality_summary: El español es mayormente claro y digno, pero la secuencia «un sacrificio de ofrendas de paz» resulta pesada y poco idiomática. Además, la nota al pie duplica exactamente la redacción del texto y por eso no aporta una alternativa real. Una leve revisión mejora la legibilidad sin perder la explicitud del hebreo.
  glossary_alignment: «Yahvé» está correctamente alineado con la terminología del proyecto. «Sacrifiquen / lo sacrificarán» preserva bien זבח. Para זֶבַח שְׁלָמִים, el proyecto permite una formulación transparente; en español bíblico general «sacrificio de paz» comunica mejor la categoría que «ofrendas de paz» en este contexto. «Para su aceptación» es aceptable y mantiene la racionalidad documentada sobre aceptabilidad ante Dios.
  issues:
  - severity: medium
    issue: «un sacrificio de ofrendas de paz» es poco natural en español
    rationale: Aunque intenta reflejar la doble estructura hebrea, la combinación suena forzada y menos clara para lectores hispanos. «Un sacrificio de paz» conserva la categoría sacrificial y sigue siendo suficientemente cercano al original.
  - severity: medium
    issue: La nota [a] no ofrece una alternativa distinta
    rationale: 'El texto principal ya dice «para su aceptación», y la nota repite «O, más literalmente: “para su aceptación”». Eso no cumple una función informativa real y debe eliminarse si no hay alternativa genuina que preservar.'
  revised_spanish_text: Y cuando sacrifiquen un sacrificio de paz a Yahvé, lo sacrificarán para su aceptación.
  revision_rationale: Se suaviza «un sacrificio de ofrendas de paz» a «un sacrificio de paz» para lograr un español natural y fiel a la categoría sacrificial hebrea, sin perder el sustantivo explícito «sacrificio» que el rastro de auditoría inglés decidió conservar. Se elimina la nota al pie porque repetía exactamente la redacción del texto principal y no preservaba una alternativa léxica real.
