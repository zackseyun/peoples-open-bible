translation:
  language: es
  text: 'Como un ladrón se avergüenza cuando es hallado, así ha sido avergonzada la casa de Israel: ellos, sus reyes, sus oficiales, sus sacerdotes y sus profetas.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: כְּבֹשֶׁת
  english_pob_choice: As ... is ashamed
  chosen_spanish: Como la vergüenza de ...
  alternatives_spanish:
  - Como ... se avergüenza
  - Así como la vergüenza de ...
  lexicon: HALOT
  rationale: El hebreo introduce una comparación con כְּ + בֹשֶׁת; en español suena más natural conservar el sustantivo de cualidad «vergüenza» dentro de la comparación que forzar una perífrasis verbal. Mantiene el motivo de la vergüenza sin diluirlo.
- source_word: גַּנָּב
  english_pob_choice: a thief
  chosen_spanish: un ladrón
  alternatives_spanish:
  - el ladrón
  - un ratero
  lexicon: HALOT
  rationale: 'El singular indefinido expresa la comparación genérica: cualquier ladrón sorprendido encarna la imagen. «Ladrón» es transparente y sobrio.'
- source_word: כִּי יִמָּצֵא
  english_pob_choice: when he is found
  chosen_spanish: cuando es hallado
  alternatives_spanish:
  - cuando es encontrado
  - cuando es descubierto
  lexicon: HALOT
  rationale: «Hallar» conserva el valor básico de מצא en pasivo y sigue de cerca la revisión auditada del inglés. «Descubierto» añade una interpretación algo más explícita; se evita para no sobrecargar el texto.
- source_word: הֹבִישׁוּ
  english_pob_choice: has been put to shame
  chosen_spanish: ha sido avergonzada
  alternatives_spanish:
  - ha sido puesta en vergüenza
  - ha sido hecha avergonzar
  lexicon: HALOT
  rationale: La forma causativa/resultativa de בוש admite una traducción pasiva de estado. «Ha sido avergonzada» preserva la idea de quedar en vergüenza sin convertirla solo en emoción interna.
- source_word: בֵּית יִשְׂרָאֵל
  english_pob_choice: the house of Israel
  chosen_spanish: la casa de Israel
  alternatives_spanish:
  - la familia de Israel
  - Israel
  lexicon: HALOT
  rationale: Se conserva la expresión pactual colectiva, importante en el tono profético, en vez de reducirla a un simple «Israel».
- source_word: הֵמָּה
  english_pob_choice: they
  chosen_spanish: ellos
  alternatives_spanish:
  - sí, ellos
  - estos
  lexicon: HALOT
  rationale: El pronombre resumptivo/emfático se mantiene con «ellos» para introducir la lista de grupos incluidos en la vergüenza.
- source_word: מַלְכֵיהֶם
  english_pob_choice: their kings
  chosen_spanish: sus reyes
  alternatives_spanish:
  - los reyes de ellos
  lexicon: HALOT
  rationale: Correspondencia directa y natural del constructo con sufijo pronominal.
- source_word: שָׂרֵיהֶם
  english_pob_choice: their officials
  chosen_spanish: sus oficiales
  alternatives_spanish:
  - sus príncipes
  - sus jefes
  - sus gobernantes
  lexicon: HALOT
  rationale: «Oficiales» reproduce la amplitud semántica de שׂרים sin forzar el matiz hereditario de «príncipes». Mantiene la lectura de liderazgo civil que documenta el inglés POB.
- source_word: כֹהֲנֵיהֶם
  english_pob_choice: their priests
  chosen_spanish: sus sacerdotes
  alternatives_spanish:
  - sus sacerdotes cultuales
  lexicon: HALOT
  rationale: Término estándar y exacto para כהנים; no requiere matiz adicional.
- source_word: נְבִיאֵיהֶם
  english_pob_choice: their prophets
  chosen_spanish: sus profetas
  alternatives_spanish:
  - sus videntes
  lexicon: HALOT
  rationale: Término estándar y exacto para נביאים.
theological_decisions:
- issue: Alcance de la acusación colectiva y de liderazgo
  english_pob_reading: The verse indicts the whole covenant community, especially its leadership strata, without narrowing blame to one class alone.
  chosen_spanish_reading: El versículo acusa a toda la casa de Israel, destacando explícitamente a sus reyes, oficiales, sacerdotes y profetas.
  alternative_spanish_readings:
  - El versículo acusa principalmente solo a los líderes.
  - El versículo acusa a Israel en general sin énfasis especial en sus dirigentes.
  rationale: 'La estructura hebrea parte de «la casa de Israel» y luego añade el pronombre enfático con una lista de cargos. La traducción conserva ambos niveles: totalidad comunitaria y responsabilidades de liderazgo.'
  doctrine_reference: Responsabilidad pactual corporativa y liderazgo representativo en la literatura profética
translation_notes:
  revision_awareness: Se siguió el ajuste auditado del inglés POB que prefirió «found» frente a «found out»; por eso se eligió «hallado» en lugar de una ampliación interpretativa como «descubierto». La redacción española conserva la comparación, el perfecto pasivo resultativo y la lista de cargos sin añadir elementos no presentes en el hebreo.
  spanish_consistency_notes:
  - Se mantuvo «la casa de Israel» para la expresión colectiva pactual.
  - Se usó «sus oficiales» como equivalente moderno y amplio de שָׂרֵיהֶם, en continuidad con la decisión inglesa de no restringirlo a «princes».
  - Se evitó «SEÑOR» porque este versículo no contiene el tetragrámaton ni una referencia directa necesaria a Yahvé.
