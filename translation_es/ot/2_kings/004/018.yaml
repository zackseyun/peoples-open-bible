translation:
  language: es
  text: Y el muchacho creció[a], y un día[b] salió a donde estaba su padre, con los segadores.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el niño»; יָלֶד puede significar tanto «niño» como «muchacho».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo idiomático: «y fue el día», es decir, «un día» o «cuando llegó el día».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּגְדַּל
  english_pob_choice: grew
  chosen_spanish: creció
  alternatives_spanish:
  - creció
  - creció ya
  - fue creciendo
  lexicon: HALOT
  rationale: גדל aquí describe el desarrollo del niño; «creció» es natural en español y mantiene el valor básico de crecimiento físico sin añadir la idea más interpretativa de «creció ya» o «fue creciendo».
- source_word: הַיָּלֶד
  english_pob_choice: the boy
  chosen_spanish: el muchacho
  alternatives_spanish:
  - el niño
  - el chico
  - el hijo
  lexicon: HALOT
  rationale: יַלֶד puede referirse a «niño» o «muchacho». En este contexto narrativo, después de indicar que ha crecido y que sale al campo, «muchacho» comunica mejor la edad y el tono que «niño», sin convertirlo en «hijo», que sería menos exacto como equivalente léxico.
- source_word: וַיְהִי הַיּוֹם
  english_pob_choice: one day
  chosen_spanish: un día
  alternatives_spanish:
  - un día
  - cuando llegó el día
  - y sucedió un día
  lexicon: HALOT
  rationale: La expresión es un modismo narrativo que introduce una ocasión concreta. «Un día» reproduce con naturalidad el sentido idiomático sin forzar una traducción literal de la estructura hebrea.
- source_word: וַיֵּצֵא
  english_pob_choice: he went out
  chosen_spanish: salió
  alternatives_spanish:
  - salió
  - se fue
  - salió fuera
  lexicon: HALOT
  rationale: יצא expresa movimiento hacia afuera. En español, «salió» conserva esa dirección de forma concisa y natural; añadir «fuera» sería redundante.
- source_word: אֶל אָבִיו
  english_pob_choice: to his father
  chosen_spanish: hacia su padre
  alternatives_spanish:
  - a su padre
  - hacia su padre
  - para ver a su padre
  lexicon: HALOT
  rationale: אֶל marca movimiento dirigido a alguien. «Hacia su padre» conserva mejor la idea de aproximación física que el simple «a su padre», y evita sobreespecificar la intención.
- source_word: אֶל הַקֹּצְרִים
  english_pob_choice: to the reapers
  chosen_spanish: donde estaban los segadores
  alternatives_spanish:
  - a los segadores
  - junto a los segadores
  - donde estaban los segadores
  lexicon: HALOT
  rationale: 'קֹצְרִים son los que siegan/cosechan; «segadores» es un equivalente español fiel y claro. La segunda frase refleja el hebreo con dos direcciones: va hacia su padre, quien estaba entre los segadores, por eso «donde estaban los segadores» comunica la relación espacial implicada sin perder el sentido del texto.'
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto hebreo y el audit trail inglés: mantiene el crecimiento del muchacho, el modismo temporal y la doble dirección hacia el padre y los segadores, sin añadir elementos ajenos al versículo.'
  spanish_consistency_notes:
  - Se usa «Yahvé» en esta traducción cuando corresponda en el corpus; este versículo no contiene el nombre divino.
  - Se prefirió «muchacho» y «segadores» por adecuación contextual y naturalidad en español, manteniendo la referencia agrícola explícita.
  - La secuencia narrativa conserva el valor del hebreo con una oración principal simple y una cláusula espacial que aclara la doble relación de movimiento.
