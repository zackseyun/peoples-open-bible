base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/014/034.yaml
  text: And Saul said[a], “Disperse among the people and tell them, ‘Each man must bring me his ox and each man his sheep, and you must slaughter them here and eat, so that you may not sin against Yahweh by eating with the blood.’” So all the people brought, each man his ox in his hand that night[b], and they slaughtered them there.
  footnotes:
