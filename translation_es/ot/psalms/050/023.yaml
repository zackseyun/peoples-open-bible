translation:
  language: es
  text: El que ofrece un sacrificio de acción de gracias[a] me honra, y al que ordena su camino[b] le mostraré la salvación de Dios[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ofrenda de acción de gracias». El hebreo תּוֹדָה designa gratitud expresada en forma sacrificial.
    reason: lexical_alternative
  - marker: b
    text: O «al que dirige su conducta» o «al que prepara su camino». La expresión hebrea es compacta y puede entenderse como ordenar rectamente la propia vida.
    reason: alternative_reading
  - marker: c
    text: O «la liberación de Dios» o «la victoria de Dios».
    reason: lexical_alternative
lexical_decisions:
- source_word: זֹבֵחַ
  english_pob_choice: Whoever offers
  chosen_spanish: El que ofrece
  alternatives_spanish:
  - Quien ofrece
  - El que sacrifica
  lexicon: HALOT
  rationale: El participio se usa sustantivamente; en español, 'El que ofrece' expresa con naturalidad al oferente sin perder el valor general e impersonal del hebreo.
- source_word: תּוֹדָה
  english_pob_choice: a sacrifice of thanksgiving
  chosen_spanish: un sacrificio de acción de gracias
  alternatives_spanish:
  - una ofrenda de acción de gracias
  - un sacrificio de agradecimiento
  - acción de gracias
  lexicon: HALOT
  rationale: En contexto cultual, תּוֹדָה es thanksgiving expresado en forma sacrificial. 'Sacrificio de acción de gracias' conserva el sentido litúrgico y el componente de gratitud sin reducirlo a solo agradecimiento verbal.
- source_word: יְכַבְּדַנְנִי
  english_pob_choice: honors me
  chosen_spanish: me honra
  alternatives_spanish:
  - me glorifica
  - me da honra
  lexicon: HALOT
  rationale: El Piel de כבד aquí comunica honrar/glorificar. 'Me honra' es claro, sobrio y fiel al contraste ético-cultual del versículo.
- source_word: וְשָׂם דֶּרֶךְ
  english_pob_choice: to the one who orders his way
  chosen_spanish: al que ordena su camino
  alternatives_spanish:
  - al que pone en orden su camino
  - al que dirige bien su camino
  - al que prepara su camino
  lexicon: HALOT
  rationale: La expresión es compacta e idiomática. 'Ordena su camino' conserva la metáfora de דרך y refleja la lectura ética aprobada en el audit trail, sin expandir indebidamente la frase.
- source_word: אַ֝רְאֶ֗נּוּ
  english_pob_choice: I will show
  chosen_spanish: le mostraré
  alternatives_spanish:
  - lo haré ver
  - le haré ver
  lexicon: HALOT
  rationale: El Hiphil de ראה puede significar 'mostrar' o 'hacer ver'. 'Le mostraré' es una forma natural en español y mantiene el valor promisor.
- source_word: בְּיֵשַׁע אֱלֹהִים
  english_pob_choice: the salvation of God
  chosen_spanish: la salvación de Dios
  alternatives_spanish:
  - la liberación de Dios
  - la victoria de Dios
  - la salvación que viene de Dios
  lexicon: HALOT
  rationale: יֵשַׁע puede ser salvación, liberación o victoria. Se mantiene 'salvación' como la opción más natural en este contexto, tal como indica el audit trail.
theological_decisions:
- issue: Construal de וְשָׂם דֶּרֶךְ
  english_pob_reading: and to the one who orders his way I will show the salvation of God
  chosen_spanish_reading: y al que ordena su camino le mostraré la salvación de Dios
  alternative_spanish_readings:
  - y al que prepara su camino le mostraré la salvación de Dios
  - y al que dirige su conducta le mostraré la salvación de Dios
  - y al que anda por buen camino le mostraré la salvación de Dios
  rationale: 'El hebreo admite varias lecturas, pero la evidencia auditada favorece una referencia ética: ordenar la propia vida o conducta. La traducción evita convertir la frase en una afirmación distinta sobre ''preparar un camino'' literal.'
  doctrine_reference: Translation philosophy §3, §5
- issue: Sentido de תּוֹדָה en contexto sacrificial
  english_pob_reading: sacrifice of thanksgiving
  chosen_spanish_reading: sacrificio de acción de gracias
  alternative_spanish_readings:
  - ofrenda de acción de gracias
  - acción de gracias ofrecida en sacrificio
  rationale: Se preserva la tensión entre gratitud y culto sacrificial. No se reduce el término a simple emoción religiosa ni se lo reemplaza por una fórmula eclesiástica más tradicional sin base lexical.
  doctrine_reference: HALOT; Translation philosophy §3
translation_notes:
  revision_awareness: 'El borrador sigue la última revisión auditada: se prefirió ''ordena su camino'' sobre ''pone en orden su camino'' por ser más natural y conciso. Se mantuvieron las decisiones principales del audit trail: ''sacrificio de acción de gracias'', ''me honra'' y ''la salvación de Dios''.'
  spanish_consistency_notes:
  - Se usa 'Dios' para אֱלֹהִים conforme al estándar del proyecto.
  - Se conserva 'salvación' en vez de 'liberación' o 'victoria' como opción principal, pero se documentan las alternativas en nota.
  - '''Ordena su camino'' reproduce el énfasis ético del hebreo sin introducir un matiz doctrinal adicional.'
  - El texto evita 'SEÑOR' y mantiene el nombre divino conforme a la política del proyecto; en este versículo no aparece יהוה explícitamente.
