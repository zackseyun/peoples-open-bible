    issue: Nota innecesaria en «Yahvé[a]»
    rationale: El audit trail inglés no conserva una nota léxica para el nombre divino en este versículo, y la política del proyecto para español fija «Yahvé» en el texto principal. Ofrecer «Yahweh» como nota crea variación no necesaria y debilita la normalización terminológica.
  - severity: medium
    issue: Alternativa «portal» para אוּלָם es imprecisa
    rationale: אוּלָם se refiere al vestíbulo/pórtico del templo, es decir, la sala o estructura de entrada, no a una puerta o portal en sentido estricto. La nota debe limitarse a alternativas arquitectónicas fieles.
  revised_spanish_text: Entonces Salomón ofreció holocaustos a Yahvé sobre el altar de Yahvé, que había construido delante del vestíbulo[a].
  revised_footnotes:
  - marker: a
    text: O «el pórtico» o «el pórtico de entrada». El hebreo se refiere a la sala de entrada del templo.
    reason: lexical_alternative
