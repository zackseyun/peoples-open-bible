    rationale: El audit trail inglés preserva explícitamente que el hebreo dice «Saul your father», donde «father» puede significar antepasado; en este contexto es el abuelo de Mefiboset. En español, sin nota, «tu padre» induce una confusión factual innecesaria.
  - severity: medium
