base_translation:
  language: en
  yaml_path: translation/ot/2_kings/025/017.yaml
  text: The height of the one pillar was eighteen cubits[a], and a bronze capital was on it. The height of the capital was three cubits, with latticework and pomegranates all around on the capital, all of bronze. And the second pillar had the same[b], with the latticework.
  footnotes:
  - marker: a
    text: Or, 'network' for 'latticework' (Hebrew שְׂבָכָה), referring to a net-like ornamental structure on the capital.
    reason: lexical_alternative
  - marker: b
    text: 'The final clause is elliptical in Hebrew: literally, ''and like these for the second pillar upon the latticework.'' The sense is that the second pillar had matching ornamentation.'
    reason: alternative_reading
