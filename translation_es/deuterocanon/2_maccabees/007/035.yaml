translation:
  language: es
  text: Pues así no has escapado del juicio de Dios[a], el todopoderoso vigilante.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego transmitido en Swete dice literalmente: «pues así has escapado del juicio de Dios, el todopoderoso vigilante». Sin embargo, el contexto favorece claramente el sentido negativo: «no has escapado».'
    reason: textual_variant
lexical_decisions:
- source_word: οὕτω
  english_pob_choice: in this way
  chosen_spanish: pues así
  alternatives_spanish:
  - de esta manera
  - así
  lexicon: LSJ
  rationale: El adverbio retoma la situación previa y enlaza con la conclusión; «pues así» conserva el valor inferencial y suena natural en español.
- source_word: γὰρ
  english_pob_choice: for
  chosen_spanish: pues
  alternatives_spanish:
  - porque
  - en efecto
  lexicon: LSJ
  rationale: Introduce la explicación o fundamento de lo dicho antes; «pues» mantiene la conexión discursiva sin endurecer el tono.
- source_word: κρίσιν
  english_pob_choice: judgment
  chosen_spanish: juicio
  alternatives_spanish:
  - sentencia
  - justicia
  lexicon: LSJ
  rationale: En este contexto divino y retributivo, «juicio» comunica evaluación y condena sin volver demasiado técnico el término.
- source_word: ἐκπέφευγας
  english_pob_choice: you have not escaped
  chosen_spanish: no has escapado
  alternatives_spanish:
  - no has evitado
  - no has huido de
  lexicon: LSJ
  rationale: 'La forma griega transmitida es formalmente afirmativa, pero el contexto exige sentido negativo. En español se expresa de modo directo como resultado vigente: «no has escapado».'
- source_word: παντοκράτορος
  english_pob_choice: all-powerful
  chosen_spanish: todopoderoso
  alternatives_spanish:
  - omnipotente
  - todo-poderoso
  lexicon: LSJ
  rationale: «Todopoderoso» es la equivalencia más natural y reconocible para el atributo de poder ilimitado de Dios.
- source_word: ἐπόπτου
  english_pob_choice: overseer
  chosen_spanish: el que todo lo ve
  alternatives_spanish:
  - vigilante
  - supervisor
  lexicon: LSJ
  rationale: «Overseer» en inglés subraya vigilancia y superintendencia. En español, «el que todo lo ve» preserva la idea de observación divina con claridad y evita una palabra demasiado administrativa o extraña en este contexto.
- source_word: θεοῦ
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  - Dios mismo
  lexicon: LSJ
  rationale: Correspondencia directa y estándar para el genitivo dependiente de «juicio» y de los títulos divinos.
theological_decisions:
- issue: 'Tratamiento de los títulos divinos concatenados: παντοκράτορος ἐπόπτου θεοῦ'
  english_pob_reading: God, the all-powerful overseer
  chosen_spanish_reading: del Dios todopoderoso, el que todo lo ve
  alternative_spanish_readings:
  - del Dios omnipotente, vigilante
  - del Dios todopoderoso, vigilante de todo
  rationale: 'El griego acumula atributos en cadena. La versión española mantiene ambos rasgos: poder absoluto y vigilancia efectiva. «El que todo lo ve» reproduce la idea de ἐπόπτης sin imponer terminología eclesiástica posterior.'
  doctrine_reference: Translation philosophy §§1, 6
- issue: Manejo de la discrepancia textual en ἐκπέφευγας
  english_pob_reading: you have not escaped
  chosen_spanish_reading: no has escapado
  alternative_spanish_readings:
  - has escapado
  rationale: La lectura transmitida es formalmente afirmativa, pero el contexto inmediato demanda la negación. Por fidelidad al sentido contextual, el español sigue la lectura entendida por la POB y no la forma aislada del verbo.
  doctrine_reference: Translation philosophy §§1, 3
translation_notes:
  revision_awareness: Se revisó la diferencia clave entre la forma griega transmitida y el sentido contextual. La redacción española sigue la lectura contextual negativa documentada en la auditoría inglesa, manteniendo explícita la nota textual.
  spanish_consistency_notes:
  - Se usó «Dios» para θεοῦ y «todopoderoso» para παντοκράτορος, conforme a los valores predeterminados del proyecto.
  - Se evitó «Señor» para no sustituir el nombre/título divino sin base textual.
  - Se prefirió «el que todo lo ve» para ἐπόπτου por claridad natural en español, manteniendo la noción de vigilancia divina.
  - La nota al pie marca la variante textual sin duplicar marcadores.
