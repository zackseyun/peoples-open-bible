translation:
  language: es
  text: porque no escucharon mis palabras, declara Yahvé, las cuales les envié por medio de mis siervos los profetas, madrugando y enviando[a], y ustedes no escucharon[b], declara Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «madrugando y enviando», un modismo que expresa repetición insistente y diligente; alternativamente, «enviando persistentemente».'
    reason: lexical_alternative
  - marker: b
    text: El hebreo pasa de «ellos no escucharon» a «ustedes no escucharon», probablemente con efecto retórico; la traducción conserva ese cambio.
    reason: alternative_reading
lexical_decisions:
- source_word: תַּחַת אֲשֶׁר
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - ya que
  - puesto que
  lexicon: HALOT
  rationale: La construcción causal introduce el motivo del juicio. 'Porque' es la forma natural en español y conserva la relación causal sin añadir matices no presentes en el hebreo.
- source_word: שָׁמְעוּ / שְׁמַעְתֶּם
  english_pob_choice: did not listen / did not listen
  chosen_spanish: no escucharon / no escucharon
  alternatives_spanish:
  - no oyeron / no oyeron
  - no obedecieron / no obedecieron
  lexicon: HALOT
  rationale: שמַע con אֶל expresa oír con atención, es decir, escuchar/hear heedfully. 'Escuchar' preserva mejor la idea de prestar atención y responde al valor covenantal del verbo sin convertirlo en un equivalente más interpretativo como 'obedecer'.
- source_word: אֶל דְּבָרַי
  english_pob_choice: to my words
  chosen_spanish: mis palabras
  alternatives_spanish:
  - mi palabra
  - lo que dije
  lexicon: HALOT
  rationale: El plural hebreo דְּבָרַי se refleja mejor con 'mis palabras', conservando la pluralidad concreta de los mensajes divinos. Se evita singularizar a 'mi palabra' porque perdería esa precisión.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - dice Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: Se mantiene la fórmula profética solemne con 'declara', que reproduce el registro oracular. El nombre divino se vierte como 'Yahvé' según la terminología del proyecto, no como una sustitución titulada.
- source_word: שָׁלַחְתִּי אֲלֵיהֶם
  english_pob_choice: I sent to them
  chosen_spanish: envié a ellos
  alternatives_spanish:
  - los envié
  - envié hacia ellos
  lexicon: HALOT
  rationale: El hebreo subraya la dirección hacia los destinatarios. 'Envié a ellos' preserva esa relación de destino sin forzar una paráfrasis. Aunque en español común 'les envié' suena más fluido, se mantiene la estructura para no perder el valor sintáctico observado en el original.
- source_word: אֶת עֲבָדַי הַנְּבִיאִים
  english_pob_choice: by my servants the prophets
  chosen_spanish: por medio de mis esclavos los profetas
  alternatives_spanish:
  - por medio de mis siervos los profetas
  - mediante mis esclavos los profetas
  lexicon: HALOT
  rationale: El POB inglés documenta 'servants' aquí por razón contextual; sin embargo, el proyecto español de normalización pide 'esclavos' para עֶבֶד/עֲבָדַי cuando la fuerza léxica del término es relevante. Se conserva el carácter de dependencia/comisión con 'por medio de', evitando suavizar a 'siervos' sin justificación textual.
- source_word: הַשְׁכֵּם וְשָׁלֹחַ
  english_pob_choice: rising early and sending them
  chosen_spanish: madrugando y enviando
  alternatives_spanish:
  - levantándose temprano y enviando
  - madrugando y enviando repetidamente
  lexicon: HALOT
  rationale: La expresión idiomática se traduce con un equivalente verbal natural en español. 'Madrugando y enviando' conserva la imagen de iniciativa temprana y repetida; el sentido de insistencia queda implícito sin añadir una paráfrasis explicativa excesiva.
- source_word: וְלֹא שְׁמַעְתֶּם
  english_pob_choice: and you did not listen
  chosen_spanish: y ustedes no escucharon
  alternatives_spanish:
  - pero ustedes no escucharon
  - y no escucharon
  lexicon: HALOT
  rationale: Se conserva el cambio a segunda persona plural del hebreo, que intensifica la acusación y no debe armonizarse. 'Ustedes' hace explícita la dirección retórica al auditorio en español.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: El texto usa el Tetragramatón directamente. Conforme a la terminología del proyecto, se representa por el nombre propio 'Yahvé', preservando la referencia al nombre revelado y evitando la sustitución tradicional por un título.
  doctrine_reference: 'DOCTRINE.md: YHWH → Yahvé'
- issue: Cambio de persona de tercera a segunda
  english_pob_reading: they did not listen ... you did not listen
  chosen_spanish_reading: no escucharon ... ustedes no escucharon
  alternative_spanish_readings:
  - no escucharon ... no escucharon
  - no escucharon ... ustedes no escucharon
  rationale: Se mantiene la oscilación pronominal del hebreo. La segunda mención en segunda persona no se nivela, porque el recurso retórico acusa directamente a los oyentes y forma parte del sentido del verso.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
- issue: עֲבָדַי הַנְּבִיאִים
  english_pob_reading: my servants the prophets
  chosen_spanish_reading: mis esclavos los profetas
  alternative_spanish_readings:
  - mis siervos los profetas
  - mis servidores los profetas
  rationale: En español, 'esclavos' conserva la fuerza léxica de עֶבֶד cuando el contexto remite a dependencia total al mandato divino. Aunque 'siervos' sería más atenuado, aquí se evita suavizar la relación de pertenencia y comisión que el hebreo expresa.
  doctrine_reference: 'DOCTRINE.md: lexical force of δοῦλος/עֶבֶד when context requires stronger rendering'
translation_notes:
  revision_awareness: No hubo cambios en la revisión más reciente; el control de calidad reportó acuerdo moderado con observaciones menores, sin necesidad de ajustes sustantivos.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יְהוָה de forma consistente con el proyecto.
  - Se conserva 'escuchar' para שׁמע en lugar de 'obedecer', siguiendo la decisión lexical del POB.
  - Se usa 'esclavos' para עֲבָדַי de acuerdo con la preferencia terminológica del proyecto cuando la fuerza léxica debe ser visible.
  - Se preserva la transición de tercera a segunda persona plural sin armonizarla.
  - Las notas al pie usan marcadores únicos y están ancladas en el texto donde corresponde.
