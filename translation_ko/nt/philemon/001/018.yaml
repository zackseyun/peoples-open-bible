id: PHM.1.18
reference: Philemon 1:18
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: εἰ δέ τι ἠδίκησέν σε ἢ ὀφείλει, τοῦτο ἐμοὶ ⸀ἐλλόγα·
base_translation:
  language: en
  yaml_path: translation/nt/philemon/001/018.yaml
  text: But if he has wronged you in any way or owes you anything[a], charge this to me.
  footnotes:
  - marker: a
    text: Or 'count this to my account.' The verb carries an accounting sense of reckoning or charging something to someone.
    reason: lexical_alternative
translation:
  language: ko
  text: 그러나 만일 그가 그대에게 어떤 식으로든 부당한 일을 했거나 빚진 것이 있다면, 그것을 내 앞으로 달아 주시기[a] 바랍니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「내 계좌에 기입해 달라」. 헬라어 ἐλλογέω는 회계 용어로, 누군가의 계산에 기입하거나 채무로 셈하는 의미를 담는다.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰ δέ
  english_pob_choice: But if
  chosen_korean: 그러나 만일
  lexicon: BDAG
  rationale: 가벼운 대조의 δέ + 조건. 「그러나 만일」이 자연스럽다.
- source_word: τι
  english_pob_choice: in any way
  chosen_korean: 어떤 식으로든
  alternatives_korean:
  - 무엇이든
  - 조금이라도
  lexicon: BDAG
  rationale: 불특정 τι. 한국어 「어떤 식으로든」이 부정의 범위를 자연스럽게 살리며, 뒤의 「빚진 것이 있다면」과의 어휘 중복을 피한다.
- source_word: ἠδίκησέν σε
  english_pob_choice: he has wronged you
  chosen_korean: 그대에게 ... 부당한 일을 했거나
  alternatives_korean:
  - 그대에게 해를 끼쳤거나
  - 그대를 해롭게 했거나
  lexicon: BDAG
  rationale: ἀδικέω는 「부당한 일을 하다, 해를 끼치다」. 「부당한 일을 하다」가 도덕적·법적 무게를 자연스럽게 살리며, 인적·물질적 피해를 두루 담는다.
- source_word: ἢ ὀφείλει
  english_pob_choice: or owes you anything
  chosen_korean: 빚진 것이 있다면
  alternatives_korean:
  - 빚을 졌거나
  - 그대에게 갚을 것이 있다면
  lexicon: BDAG
  rationale: ὀφείλω는 채무 관계. 「빚진 것이 있다면」이 회계·법적 함의를 자연스럽게 살린다. 18절의 회계 어휘(ἐλλόγα)와 호응한다.
- source_word: τοῦτο
  english_pob_choice: this
  chosen_korean: 그것을
  lexicon: BDAG
  rationale: 앞 절을 받는 지시대명사.
- source_word: ἐμοὶ
  english_pob_choice: to me
  chosen_korean: 내 앞으로
  alternatives_korean:
  - 내게
  - 내 계좌로
  lexicon: BDAG
  rationale: 회계 동사 ἐλλογέω와 결합한 「내 앞으로 달다」가 채무 이전의 의미를 가장 자연스럽게 살리는 한국어 표현이다. 「내게」만으로는 회계의 무게가 약하다.
- source_word: ἐλλόγα
  english_pob_choice: charge
  chosen_korean: 달아 주시기 바랍니다
  alternatives_korean:
  - 기입해 주시기 바랍니다
  - 셈해 주시기 바랍니다
  - 전가해 주시기 바랍니다
  lexicon: BDAG
  rationale: ἐλλογέω는 회계 용어 — 「누군가의 계산에 기입하다」. 한국어 회계·상업 관용어 「~앞으로 달다」가 본 동사의 의미를 가장 자연스럽고 정확하게 담아낸다. 「전가하다」는 신학적 함의가 너무 무겁다.
