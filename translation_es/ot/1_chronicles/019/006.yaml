translation:
  language: es
  text: Cuando los amonitas vieron que se habían hecho odiosos[a] a David, Hanún y los amonitas enviaron mil talentos de plata para contratar para sí carros y jinetes de Aram-naharaim, de Aram-maacá y de Zobá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: "se habían hecho apestosos"; literalmente, "se habían hecho hediondos" para David, un modismo para volverse ofensivos o detestables.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּרְאוּ
  english_pob_choice: saw
  chosen_spanish: vieron
  alternatives_spanish:
  - advirtieron
  - se dieron cuenta
  lexicon: HALOT
  rationale: ראה expresa percepción visual; en contexto introduce la toma de conciencia de su situación. 'Vieron' conserva el verbo básico sin volverlo explicativo de más.
- source_word: בְּנֵי עַמּוֹן
  english_pob_choice: the Ammonites
  chosen_spanish: los ammonitas
  alternatives_spanish:
  - los hijos de Amón
  - los hijos de Ammón
  lexicon: HALOT
  rationale: Como etnónimo, en español fluido y bíblico es natural 'los ammonitas'; mantiene la referencia al pueblo sin la perífrasis literal.
- source_word: הִתְבָּאֲשׁוּ עִם דָּוִיד
  english_pob_choice: had become odious to David
  chosen_spanish: se habían hecho odiosos[a] a David
  alternatives_spanish:
  - se habían hecho detestables a David
  - se habían vuelto ofensivos para David
  - se habían hecho apestosos para David
  lexicon: HALOT
  rationale: 'El hitpael de באש es idiomático: literalmente implica ''oler mal'', pero el sentido contextual es volverse ofensivos o detestables. ''Odiosos'' conserva la fuerza relacional sin usar una imagen demasiado cruda en el cuerpo principal.'
- source_word: וַיִּשְׁלַח
  english_pob_choice: sent
  chosen_spanish: enviaron
  alternatives_spanish:
  - mandaron
  - remitieron
  lexicon: HALOT
  rationale: El verbo introduce el envío de recursos para contratar tropas; 'enviaron' es natural y mantiene la idea de despachar el pago.
- source_word: חָנוּן וּבְנֵי עַמּוֹן
  english_pob_choice: Hanun and the Ammonites
  chosen_spanish: Hanún y los ammonitas
  alternatives_spanish:
  - Hanún y los hijos de Amón
  lexicon: HALOT
  rationale: Se conserva el nombre propio y el sujeto colectivo coordinado, como en hebreo.
- source_word: אֶלֶף כִּכַּר כֶּסֶף
  english_pob_choice: a thousand talents of silver
  chosen_spanish: mil talentos de plata
  alternatives_spanish:
  - 1.000 talentos de plata
  lexicon: HALOT
  rationale: כִּכָּר se rinde con 'talento', medida bíblica convencional; 'plata' preserva el metal sin modernizar la unidad.
- source_word: לִשְׂכֹּר לָהֶם
  english_pob_choice: to hire for themselves
  chosen_spanish: para alquilar para sí
  alternatives_spanish:
  - para contratar para sí
  - para hire para ellos mismos
  lexicon: HALOT
  rationale: שׂכר aquí tiene el valor de contratar mercenarios o fuerzas militares. 'Alquilar para sí' mantiene el matiz económico y la reflexividad de לָהֶם.
- source_word: אֲרַם נַהֲרַיִם
  english_pob_choice: Aram-naharaim
  chosen_spanish: Aram-naharaim
  alternatives_spanish:
  - Aram de los dos ríos
  - Mesopotamia
  lexicon: HALOT
  rationale: Como nombre geográfico propio, se translitera; una glosa explicativa queda mejor en nota.
- source_word: אֲרַם מַעֲכָה
  english_pob_choice: Aram-maacah
  chosen_spanish: Aram-Maacá
  alternatives_spanish:
  - Aram de Maacá
  lexicon: HALOT
  rationale: Se conserva el nombre regional compuesto en transliteración, siguiendo la práctica del POB inglés.
- source_word: מִצּוֹבָה
  english_pob_choice: from Zobah
  chosen_spanish: de Zobá
  alternatives_spanish:
  - de Sobá
  lexicon: HALOT
  rationale: Topónimo propio transliterado al español con adaptación fonética mínima.
- source_word: רֶכֶב
  english_pob_choice: chariots
  chosen_spanish: carros
  alternatives_spanish:
  - carros de guerra
  - carros de combate
  lexicon: HALOT
  rationale: En español bíblico, 'carros' es una forma comprensible y natural; el contexto militar ya precisa su función.
- source_word: וּפָרָשִׁים
  english_pob_choice: horsemen
  chosen_spanish: jinetes
  alternatives_spanish:
  - caballería
  - hombres de a caballo
  lexicon: HALOT
  rationale: פָרָשִׁים son tropas montadas. 'Jinetes' es preciso y fluido en español, paralelo a 'carros'.
theological_decisions:
- issue: Renderizado del idiomático hitpael de באש sin borrar su dureza semántica
  english_pob_reading: had become odious to David
  chosen_spanish_reading: se habían hecho odiosos a David
  alternative_spanish_readings:
  - se habían vuelto detestables a David
  - se habían hecho apestosos para David
  rationale: El texto no dice simplemente que 'caían mal', sino que expresa una relación de repulsión/ofensa. 'Odiosos' mantiene la carga relacional y deja visible la tensión idiomática del hebreo; la nota ofrece la lectura más literal si se necesita.
  doctrine_reference: No doctrinal issue; lexical/theological transparency in idiom preservation.
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que el marcador [a] aparezca exactamente en el texto español donde corresponde. No se añadieron notas sin anclaje textual.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto para el Tetragrámaton, aunque este versículo no lo contiene.
  - Se usó 'ammonitas' como etnónimo natural en español; el nombre propio Hanún se conservó con acento.
  - Se prefirió 'talentos de plata' como medida bíblica tradicional, sin convertir a unidades modernas.
  - 'Los nombres geográficos se transliteran de forma consistente: Aram-naharaim, Aram-Maacá, Zobá.'
