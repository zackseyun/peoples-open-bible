    text: Or, more literally from the Greek, “a vow offering” or “an offering.” The Hebrew parallel has “a freewill offering.”
    reason: lexical_alternative
  - marker: b
    text: The Greek text here reads approximately “to the Lord, Lord of our fathers,” while the Hebrew parallel has “to the Lord, the God of your fathers.” The main text reflects the Greek pronoun perspective with the fuller covenantal sense supported by the Hebrew parallel.
