translation:
  language: es
  text: 'Entonces respondieron a Jeremías todos los hombres que sabían que sus mujeres estaban quemando incienso a otros dioses, y todas las mujeres que estaban allí[a] —una gran asamblea— y todo el pueblo que vivía en la tierra de Egipto, en Patros, diciendo:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que estaban de pie». El participio hebreo indica simplemente que las mujeres estaban presentes y de pie en la escena.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲנוּ
  english_pob_choice: answered
  chosen_spanish: respondieron
  alternatives_spanish:
  - contestaron
  - dieron respuesta
  lexicon: HALOT
  rationale: ענה en este contexto narrativo introduce una respuesta dirigida a Jeremías. 'Respondieron' mantiene el valor de réplica sin forzar una fórmula más literal que suene pesada en español.
- source_word: כָּל הָאֲנָשִׁים
  english_pob_choice: all the men
  chosen_spanish: todos los hombres
  alternatives_spanish:
  - todos los varones
  - todos los personas
  lexicon: HALOT
  rationale: אֲנָשִׁים aquí es marcadamente masculino, y el contraste con 'todas las mujeres' lo confirma. 'Hombres' conserva esa distinción.
- source_word: הַיֹּדְעִים
  english_pob_choice: who knew
  chosen_spanish: que sabían
  alternatives_spanish:
  - sabiendo
  - que estaban al tanto
  lexicon: HALOT
  rationale: 'El participio funciona como atributo identificador: son los hombres enterados de la conducta de sus esposas. La oración relativa ''que sabían'' es la forma más natural en español.'
- source_word: מְקַטְּרוֹת
  english_pob_choice: were burning incense
  chosen_spanish: estaban quemando incienso
  alternatives_spanish:
  - estaban ofreciendo incienso
  - estaban sahumando
  lexicon: HALOT
  rationale: קטר en piel alude al acto cultual de quemar incienso. 'Quemando incienso' conserva el sentido ritual y el contraste con otros dioses.
- source_word: לֵאלֹהִים אֲחֵרִים
  english_pob_choice: to other gods
  chosen_spanish: a otros dioses
  alternatives_spanish:
  - para otros dioses
  - ante otros dioses
  lexicon: HALOT
  rationale: La preposición ל expresa dirección/objeto del culto. 'A otros dioses' comunica de modo directo la orientación del incienso ofrecido.
- source_word: וְכָל הַנָּשִׁים הָעֹמְדוֹת
  english_pob_choice: and all the women who were standing by
  chosen_spanish: y todas las mujeres que estaban allí
  alternatives_spanish:
  - y todas las mujeres que estaban de pie
  - y todas las mujeres presentes
  lexicon: HALOT
  rationale: עמד participial aquí indica presencia corporal en la escena. 'Que estaban allí' preserva el hecho sin introducir una interpretación más específica de la postura.
- source_word: קָהָל גָּדוֹל
  english_pob_choice: a great assembly
  chosen_spanish: una gran asamblea
  alternatives_spanish:
  - una gran multitud
  - un gran conjunto
  lexicon: HALOT
  rationale: קָהָל denota un grupo reunido, no simplemente una masa de gente. 'Asamblea' conserva ese matiz colectivo y formal.
- source_word: וְכָל הָעָם
  english_pob_choice: and all the people
  chosen_spanish: y todo el pueblo
  alternatives_spanish:
  - y toda la gente
  - y toda la población
  lexicon: HALOT
  rationale: עָם aquí abarca al resto del grupo reunido. 'Pueblo' preserva el tono comunitario y bíblico sin perder naturalidad.
- source_word: הַיֹּשְׁבִים
  english_pob_choice: who were living
  chosen_spanish: que vivía
  alternatives_spanish:
  - que residía
  - que habitaba
  lexicon: HALOT
  rationale: ישׁב en este contexto geográfico expresa residencia estable. 'Que vivía' es idiomático en español y mantiene el sentido de asentamiento.
- source_word: בְּאֶרֶץ מִצְרַיִם
  english_pob_choice: in the land of Egypt
  chosen_spanish: en la tierra de Egipto
  alternatives_spanish:
  - en Egipto
  - en el país de Egipto
  lexicon: HALOT
  rationale: La fórmula 'tierra de Egipto' refleja más de cerca la expresión hebrea y su registro geográfico solemne.
- source_word: בְּפַתְרוֹס
  english_pob_choice: in Pathros
  chosen_spanish: en Patros
  alternatives_spanish:
  - en Pathros
  lexicon: HALOT
  rationale: Es un nombre propio geográfico; se translitera al español como 'Patros' para la pronunciación habitual en castellano bíblico.
- source_word: לֵאמֹר
  english_pob_choice: saying,
  chosen_spanish: 'diciendo:'
  alternatives_spanish:
  - 'y dijeron:'
  - 'así:'
  - 'con estas palabras:'
  lexicon: HALOT
  rationale: El introductor de discurso se rinde naturalmente con 'diciendo' antes de la cita siguiente. El dos puntos prepara la continuación en español.
translation_notes:
  revision_awareness: Esta versión sigue el texto hebreo masorético de Jeremías 44:15 y toma como apoyo la decisión del POB en inglés de preservar el valor participial de הַיֹּדְעִים / הָעֹמְדוֹת / הַיֹּשְׁבִים sin convertirlos en formas más interpretativas de lo que el hebreo exige. También ajusta el español para mantener el contraste de género entre hombres y mujeres, y conserva el nombre propio Patros.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto lo requiera explícitamente; este versículo no lo contiene.
  - '''Otros dioses'' conserva el plural del hebreo y el sentido de culto dirigido a deidades distintas del Dios de Israel.'
  - '''Asamblea'' mantiene el matiz de קָהָל como grupo reunido y no mero ''multitud''.'
  - El discurso introducido con 'diciendo:' deja el verbo principal en el verso siguiente, como en la sintaxis hebrea.
