revisions:
- from: Y ella lo enviaba a los amos[a], y ellos también le pagaban el salario, añadiendo además un cabrito.
  to: Y ella lo enviaba a los dueños[a], y ellos también le pagaban el salario, añadiendo también un cabrito.
  rationale: Se cambia 'amos' por 'dueños' para seguir la decisión contextual del POB auditado sobre κυρίοις en un entorno laboral no teológico y para mejorar la naturalidad del español. También se ajusta la nota para reflejar esa prioridad y se suaviza la redundancia de 'añadiendo además' con 'añadiendo también'.
