translation:
  language: es
  text: 'En sus días, Judá será salvo, e Israel habitará seguro; y este es el nombre por el cual será llamado: Yahvé es nuestra rectitud[a].[b]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Yahvé, nuestra rectitud». El título hebreo puede leerse como una fórmula nominal sin verbo expreso.'
    reason: lexical_alternative
  - marker: b
    text: «Rectitud» también puede traducirse «justicia», ya que el término hebreo puede abarcar ambos sentidos.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּיָמָיו
  english_pob_choice: In his days
  chosen_spanish: En sus días
  alternatives_spanish:
  - En aquellos días
  - Durante su reinado
  lexicon: HALOT
  rationale: Conserva el hebraísmo temporal y sigue de cerca el valor de la frase sin hacerlo más explícito de lo que el texto permite.
- source_word: תִּוָּשַׁע
  english_pob_choice: will be saved
  chosen_spanish: será salvado
  alternatives_spanish:
  - será liberado
  - será rescatado
  lexicon: HALOT
  rationale: El nifal de ישׁע admite el sentido de ser salvado o liberado. 'Será salvado' mantiene el valor básico y evita restringirlo a una liberación solo política o solo espiritual.
- source_word: יְהוּדָה
  english_pob_choice: Judah
  chosen_spanish: Judá
  lexicon: HALOT
  rationale: Nombre propio nacional estándar en español bíblico.
- source_word: יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: Israel
  lexicon: HALOT
  rationale: Nombre propio nacional estándar en español bíblico.
- source_word: יִשְׁכֹּן לָבֶטַח
  english_pob_choice: will dwell securely
  chosen_spanish: habitará seguro
  alternatives_spanish:
  - habitará con seguridad
  - morará seguro
  lexicon: HALOT
  rationale: שׁכן es 'habitar/dwelling'; לָבֶטַח añade la idea de seguridad. 'Habitará seguro' es natural en español y conserva la seguridad establecida del lugar de residencia.
- source_word: וְזֶה שְּׁמוֹ
  english_pob_choice: and this is the name
  chosen_spanish: y este es el nombre
  alternatives_spanish:
  - y este es su nombre
  - y así será llamado
  lexicon: HALOT
  rationale: Reproduce la fórmula nominal introducida por el hebreo con una construcción directa y clara en español.
- source_word: אֲשֶׁר יִקְרְאוֹ
  english_pob_choice: by which he will be called
  chosen_spanish: por el cual será llamado
  alternatives_spanish:
  - con el que será llamado
  - que le llamarán
  lexicon: HALOT
  rationale: La pasiva impersonal en español evita imponer un sujeto no expresado y reproduce la fuerza de la fórmula de nombramiento.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: Se mantiene el nombre divino en transliteración, conforme a la política del proyecto, en lugar de sustituirlo por un título como 'Señor'.
- source_word: צִדְקֵנוּ
  english_pob_choice: Is Our Righteousness
  chosen_spanish: es nuestra justicia
  alternatives_spanish:
  - es nuestra rectitud
  - es nuestra justicia y rectitud
  lexicon: HALOT
  rationale: צדק abarca justicia y rectitud. Aquí se conserva 'justicia' porque el nombre formula una afirmación de identidad/relación y la POB inglesa también subraya el posible matiz jurídico-covenantal. En español, 'nuestra justicia' es la opción más transparente y tradicionalmente inteligible sin perder la tensión semántica.
theological_decisions:
- issue: Cómo verter el nombre/título YHWH צִדְקֵנוּ
  english_pob_reading: Yahweh Is Our Righteousness
  chosen_spanish_reading: Yahvé es nuestra justicia
  alternative_spanish_readings:
  - Yahvé es nuestra rectitud
  - Yahvé, nuestra justicia
  rationale: El hebreo presenta una fórmula de nombre sin verbo explícito; en español conviene suplir 'es' para hacer legible la frase nominal. Se conserva el nombre divino 'Yahvé' y se evita ocultarlo tras 'SEÑOR'. Se eligió 'justicia' como equivalente principal porque el contexto de nombre-teológico admite el campo de צדק en sentido de rectitud/covenantal y porque coincide con la tensión documentada por la POB inglesa.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: El pasaje muestra alta concordancia con el control de fuente y sin revisiones aplicadas en la pasada más reciente; se mantiene la estructura del versículo y la tensión léxica principal en el nombre final.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma principal del Tetragrámaton.
  - Se usa 'justicia' para צדק, dejando constancia de la alternativa 'rectitud' en nota léxica.
  - Se conserva la fórmula de nombre con verbo suplido solo donde el español lo requiere.
  - La puntuación y la sintaxis siguen un registro bíblico moderno, no arcaizante.
