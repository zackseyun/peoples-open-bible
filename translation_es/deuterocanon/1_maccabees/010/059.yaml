translation:
  language: es
  text: Y el rey Alejandro escribió a Jonatán que viniera a encontrarse con él.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἔγραψεν
  english_pob_choice: wrote
  chosen_spanish: escribió
  alternatives_spanish:
  - mandó decir
  - envió carta
  lexicon: LSJ
  rationale: El aoristo de γράφω pide un verbo directo de escritura. «Escribió» mantiene la acción explícita sin añadir objeto que el griego no menciona.
- source_word: ὁ βασιλεὺς Ἀλέξανδρος
  english_pob_choice: King Alexander
  chosen_spanish: el rey Alejandro
  alternatives_spanish:
  - Rey Alejandro
  - Alejandro, el rey
  lexicon: LSJ
  rationale: Se conserva el título real y el nombre propio en un orden natural para el español, sin perder la referencia al soberano.
- source_word: Ἰωνάθῃ
  english_pob_choice: to Jonathan
  chosen_spanish: a Jonatán
  alternatives_spanish:
  - para Jonatán
  lexicon: LSJ
  rationale: El dativo funciona como destinatario de la carta. En español, «a Jonatán» expresa con claridad el destinatario del escrito.
- source_word: ἐλθεῖν
  english_pob_choice: to come
  chosen_spanish: viniera
  alternatives_spanish:
  - viniese
  - fuera
  lexicon: LSJ
  rationale: En una invitación, el infinitivo griego expresa venir desde la perspectiva del que invita. El subjuntivo en subordinada final («para que viniera») reproduce bien ese valor directivo en español.
- source_word: εἰς συνάντησιν αὐτῷ
  english_pob_choice: and meet him
  chosen_spanish: a entrevistarse con él
  alternatives_spanish:
  - a encontrarse con él
  - para encontrarse con él
  lexicon: LSJ
  rationale: La expresión idiomática indica venir para un encuentro. «Entrevistarse con él» comunica el encuentro recíproco con registro digno y evita una literalidad torpe; se mantiene el sentido de reunión personal.
translation_notes:
  revision_awareness: El inglés POB revisó «come and meet him» a «come to meet him» para acercarse más al infinitivo griego ἐλθεῖν εἰς συνάντησιν αὐτῷ. La versión española sigue esa misma relación de finalidad/encuentro mediante «para que viniera a entrevistarse con él», sin añadir contenido extra.
  spanish_consistency_notes:
  - Se usa «Y» al inicio para reflejar el simple καὶ del griego.
  - Se mantiene «Jonatán» como forma usual del nombre propio en español.
  - No se emplea una fórmula epistolar explícita («carta») porque el griego solo dice que escribió.
  - «Entrevistarse con él» preserva el carácter de encuentro personal sin sobreinterpretar la escena.
