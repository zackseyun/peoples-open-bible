translation:
  language: es
  text: 'Y dirás a los hijos de Amón: «Escuchen la palabra del Señor Yahvé. Así dice el Señor Yahvé: Porque dijiste: “¡Ahá!”[a] contra mi santuario, cuando fue profanado[b], y contra la tierra de Israel, cuando quedó desolada, y contra la casa de Judá, cuando fueron al exilio[c]»,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: una interjección de burla o triunfo malévolo. También puede traducirse «¡Ah!», «¡Ja!» o «¡Ahá!»; aquí se usa «¡Ahá!» para expresar mejor el tono de mofa.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «cuando fue contaminado» / «cuando fue profanado».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «fueron al cautiverio».'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְנֵי עַמּוֹן
  english_pob_choice: the sons of Ammon
  chosen_spanish: los hijos de Amón
  alternatives_spanish:
  - los amonitas
  - los hijos de Ammon
  lexicon: HALOT
  rationale: El hebreo usa una construcción filial/etnónima transparente. «Hijos de Amón» conserva esa forma literal y sigue siendo natural en español bíblico; «amonitas» sería más idiomático, pero borra la estructura del hebreo.
- source_word: דְּבַר אֲדֹנָי יְהוִה
  english_pob_choice: the word of the Lord GOD
  chosen_spanish: la palabra de Yahvé, el Señor
  alternatives_spanish:
  - la palabra del Señor Yahvé
  - la palabra del Señor Dios
  lexicon: HALOT
  rationale: Se preservan ambos títulos divinos del compuesto אֲדֹנָי יְהוִה sin ocultar el nombre propio. «Yahvé, el Señor» evita la redundancia de «Señor Señor» y mantiene la distinción auditable entre Adonái y YHWH.
- source_word: כֹּה אָמַר אֲדֹנָי יְהוִה
  english_pob_choice: Thus says the Lord GOD
  chosen_spanish: Así dice Yahvé, el Señor
  alternatives_spanish:
  - Así dice el Señor Yahvé
  - Así dice el Señor Dios
  lexicon: HALOT
  rationale: La fórmula profética pide un equivalente natural y solemne. «Así dice» conserva el registro oracular; el mismo criterio del título compuesto se mantiene con «Yahvé, el Señor».
- source_word: יַעַן
  english_pob_choice: Because
  chosen_spanish: Porque
  alternatives_spanish:
  - Ya que
  - Puesto que
  lexicon: HALOT
  rationale: Introduce la razón del juicio. «Porque» es la equivalencia más directa y clara en español.
- source_word: אָמְרֵךְ
  english_pob_choice: you said
  chosen_spanish: dijiste
  alternatives_spanish:
  - has dicho
  - tu decir
  lexicon: HALOT
  rationale: La forma hebrea funciona causalmente tras יַעַן. «Dijiste» comunica de manera natural la acción verbal imputada a Amón.
- source_word: הֶאָח
  english_pob_choice: Aha!
  chosen_spanish: ¡Ah!
  alternatives_spanish:
  - ¡Ja!
  - ¡Ahá!
  lexicon: HALOT
  rationale: Es una interjección de burla o triunfo malévolo. «¡Ah!» reproduce el valor exclamativo con naturalidad; se conserva la ambigüedad entre burla, regocijo y desprecio que el hebreo permite.
- source_word: אֶל
  english_pob_choice: against
  chosen_spanish: contra
  alternatives_spanish:
  - sobre
  - acerca de
  lexicon: HALOT
  rationale: En este contexto hostil, la preposición señala el blanco del regocijo de Amón. «Contra» expresa mejor la carga adversativa que «a/para» o «sobre».
- source_word: מִקְדָּשִׁי
  english_pob_choice: my sanctuary
  chosen_spanish: mi santuario
  alternatives_spanish:
  - mi lugar santo
  - mi templo
  lexicon: HALOT
  rationale: «Santuario» conserva el sentido cultual general de מִקְדָּשׁ sin estrecharlo innecesariamente a «templo». Es la equivalencia más fiel y clara en español.
- source_word: נִחָל
  english_pob_choice: it was profaned
  chosen_spanish: fue profanado
  alternatives_spanish:
  - fue contaminado
  - fue defraudado
  lexicon: HALOT
  rationale: La forma nifal expresa violación sacrílega o profanación del espacio santo. «Fue profanado» reproduce el registro cultual y el valor teológico del verbo.
- source_word: אַדְמַת יִשְׂרָאֵל
  english_pob_choice: the land of Israel
  chosen_spanish: la tierra de Israel
  alternatives_spanish:
  - el suelo de Israel
  - la nación de Israel
  lexicon: HALOT
  rationale: En contexto geopolítico y profético, אַדְמָה se entiende como territorio. «Tierra de Israel» es la forma más natural y tradicional en español sin perder el valor territorial.
- source_word: נָשַׁמָּה
  english_pob_choice: it was made desolate
  chosen_spanish: fue hecha desolación
  alternatives_spanish:
  - quedó desolada
  - fue devastada
  lexicon: HALOT
  rationale: La hebra señala estado resultante de devastación. «Fue hecha desolación» sigue de cerca la pasiva/resultativa del hebreo, aun siendo menos idiomática que «quedó desolada».
- source_word: בֵּית יְהוּדָה
  english_pob_choice: the house of Judah
  chosen_spanish: la casa de Judá
  alternatives_spanish:
  - Judá
  - el pueblo de Judá
  lexicon: HALOT
  rationale: «Casa de Judá» preserva el idiomatismo político-covenantal del hebreo. Evita reducirlo a un simple nombre geográfico o étnico.
- source_word: הָלְכוּ בַּגּוֹלָה
  english_pob_choice: they went into exile
  chosen_spanish: fueron al cautiverio
  alternatives_spanish:
  - fueron al exilio
  - fueron llevados al exilio
  lexicon: HALOT
  rationale: Aunque «exilio» es posible, la tradición auditada en inglés tomó «exile»; en español, «cautiverio» mantiene el sentido de deportación/ser llevados fuera, y refleja una alternativa válida en la historia interpretativa profética.
theological_decisions:
- issue: Traducción del nombre divino YHWH en combinación con Adonái (אֲדֹנָי יְהוִה)
  english_pob_reading: Lord GOD
  chosen_spanish_reading: Yahvé, el Señor
  alternative_spanish_readings:
  - el Señor Yahvé
  - el Señor Dios
  rationale: El texto hebreo conserva explícitamente el nombre propio divino. Siguiendo la norma del proyecto para YHWH, se usa «Yahvé» en el texto principal, y «el Señor» refleja Adonái. La coma evita confundir el compuesto con un título repetido.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
translation_notes:
  revision_awareness: Se revisó el contexto auditado en inglés y no se introdujeron cambios doctrinales nuevos. La principal adaptación consiste en mantener YHWH como «Yahvé» en lugar de la convención inglesa «LORD», y en resolver el compuesto אֲדֹנָי יְהוִה de forma legible en español. También se conservó la tensión léxica entre profanación del santuario, desolación de la tierra y cautiverio/exilio de Judá.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para יְהוָה conforme al estándar del proyecto.
  - Se eligió «santuario» para מִקְדָּשׁ y no «templo» para no estrechar el alcance del término.
  - «Fue hecha desolación» conserva el matiz resultativo del hebreo, aunque suene más literal que idiomático.
  - Se prefirió «cautiverio» en lugar de «exilio» para reflejar una alternativa semántica reconocida en el material auditado.
  - La puntuación reproduce la apertura profética y el cierre de cita incompleto propio del verso enlazado con el siguiente.
