translation:
  language: es
  text: Y los sacerdotes, los levitas y algunos del pueblo se establecieron en Jerusalén y en la región[a], y los cantores del templo y los porteros, y todo Israel en sus aldeas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los de su pueblo». La frase griega es literalmente «los de su pueblo», pero en contexto parece distinguir a los miembros no sacerdotales de la comunidad.
    reason: lexical_alternative
lexical_decisions:
- source_word: κατῳκίσθησαν
  english_pob_choice: settled
  chosen_spanish: se establecieron
  alternatives_spanish:
  - habitaron
  - se asentaron
  - tomaron residencia
  lexicon: BDAG
  rationale: El aoristo pasivo de κατοικίζω expresa quedar establecido en un lugar de residencia. «Se establecieron» conserva esa idea de asentamiento con español natural y digno, sin volverlo demasiado coloquial ni calcar la pasiva inglesa.
- source_word: οἱ ἱερεῖς
  english_pob_choice: the priests
  chosen_spanish: los sacerdotes
  alternatives_spanish:
  - los presbíteros
  lexicon: BDAG
  rationale: En este contexto cultual y judío, ἱερεῖς corresponde con precisión a «sacerdotes»; «presbíteros» introduciría un término ajeno al sentido del texto.
- source_word: οἱ Λευεῖται
  english_pob_choice: the Levites
  chosen_spanish: los levitas
  lexicon: BDAG
  rationale: La forma tradicional y exacta en español para el grupo levítico es «levitas».
- source_word: οἱ ἐκ τοῦ λαοῦ αὐτοῦ
  english_pob_choice: some of the people
  chosen_spanish: algunos del pueblo
  alternatives_spanish:
  - los de su pueblo
  - los que eran de su pueblo
  - el resto del pueblo
  lexicon: BDAG
  rationale: La frase griega es literalmente «los de su pueblo», pero en contexto funciona como subgrupo distinto de sacerdotes y levitas. «Algunos del pueblo» comunica de modo idiomático esa porción no sacerdotal sin forzar una categoría técnica inexistente en español.
- source_word: ἐν Ἰερουσαλὴμ καὶ τῇ χώρᾳ
  english_pob_choice: in Jerusalem and the region
  chosen_spanish: en Jerusalén y en la región
  alternatives_spanish:
  - en Jerusalén y en la tierra
  - en Jerusalén y en el país
  - en Jerusalén y en el distrito
  lexicon: BDAG
  rationale: χώρα puede significar «tierra», «país» o «región». Como Jerusalén se contrapone a un ámbito más amplio de asentamiento, «la región» mantiene la referencia geográfica sin añadir precisión no explicitada por el griego.
- source_word: οἵ τε ἱεροψάλται
  english_pob_choice: the temple singers
  chosen_spanish: los cantores del templo
  alternatives_spanish:
  - los cantores sagrados
  - los cantores
  lexicon: LSJ
  rationale: ἱεροψάλται no es simplemente «cantores»; apunta a una función cultual. «Cantores del templo» preserva esa especificidad de manera clara y natural para el lector hispanohablante.
- source_word: οἱ θυρωροὶ
  english_pob_choice: the gatekeepers
  chosen_spanish: los porteros
  alternatives_spanish:
  - los guardianes de la puerta
  - los guardas de la puerta
  - los doorkeepers
  lexicon: BDAG
  rationale: En español bíblico «porteros» es una forma estable para θυρωροί en contexto del templo o de la comunidad; comunica la función sin sonar arcaizante como «doorkeepers» ni demasiado explicativo.
- source_word: πᾶς Ἰσραήλ
  english_pob_choice: all Israel
  chosen_spanish: todo Israel
  alternatives_spanish:
  - todo el Israel
  - la totalidad de Israel
  lexicon: BDAG
  rationale: «Todo Israel» conserva la fórmula colectiva del griego y la resonancia de comunidad del pacto. No se explicita como suma matemática de individuos, siguiendo el uso corporativo documentado en la POB inglesa.
- source_word: ἐν ταῖς κώμαις αὐτῶν
  english_pob_choice: in their villages
  chosen_spanish: en sus aldeas
  alternatives_spanish:
  - en sus pueblos
  - en sus villas
  - en sus poblados
  lexicon: BDAG
  rationale: κώμη denota una aldea o asentamiento pequeño. «Aldeas» conserva mejor la escala que «pueblos» y mantiene la distribución geográfica del texto.
theological_decisions:
- issue: Sentido corporativo de πᾶς Ἰσραήλ
  english_pob_reading: 'Rendered as a covenant-community designation: ''all Israel'''
  chosen_spanish_reading: «todo Israel» como designación corporativa del pueblo restaurado
  alternative_spanish_readings:
  - cada israelita individual sin excepción
  - la totalidad numérica de Israel
  rationale: El contexto enumera grupos y lugares de asentamiento; por eso la expresión funciona como designación comunitaria, no como afirmación estadística absoluta. La traducción conserva esa tensión sin resolverla artificialmente.
  doctrine_reference: Preservar la tensión teológica y el uso corporativo del texto; consistencia terminológica con el original.
translation_notes:
  revision_awareness: Se siguió el último ajuste auditado de la POB inglesa, que prefirió «the region» frente a una ampliación como «the surrounding region», para no añadir precisión geográfica no explícita en el griego. En español se refleja con «la región».
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» solo cuando el texto lo requiera; aquí no aparece el tetragrama.
  - Se prefirió «sacerdotes», «levitas», «cantores del templo» y «porteros» por consistencia con el registro cultual del pasaje.
  - Se usó «todo Israel» para conservar la fórmula colectiva sin explicar de más el alcance.
  - «Región» y «aldeas» mantienen el nivel geográfico del griego sin modernizarlo excesivamente.
