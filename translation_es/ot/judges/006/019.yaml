  language: en
  yaml_path: translation/ot/judges/006/019.yaml
  text: Then Gideon went in and prepared a young goat and unleavened bread from an ephah of flour[a]. He put the meat in a basket and the broth in a pot[b], and brought it out to him under the terebinth and presented it.
  footnotes:
  - marker: a
    text: Or 'under the oak.' The Hebrew word likely refers to a terebinth tree, though 'oak' is a traditional rendering.
    reason: lexical_alternative
  - marker: b
    text: Or 'brought it near' / 'set it before him.' The Hebrew verb means 'brought near' or 'presented.'
    reason: lexical_alternative
