  - severity: low
    issue: «el cual» es más formal/duro de lo necesario
    rationale: Aunque no es incorrecto, «que» suele sonar más natural en español bíblico corriente y mantiene bien la conexión relativa. No obstante, esto es estilístico y menor frente al problema de «para Isaac».
