lexical_decisions:
- source_word: κληθήσεται
  english_pob_choice: will be called
  chosen_spanish: será llamado
  alternatives_spanish:
  - será nombrado
  - recibirá el nombre
  lexicon: BDAG
  rationale: El futuro pasivo expresa la imposición o concesión de un nombre; en español, «será llamado» conserva esa forma idiomática y la pasiva del original.
- source_word: τὸ ὄνομα
  english_pob_choice: name
  chosen_spanish: tu nombre
  alternatives_spanish:
  - tu título
  - tu designación
  lexicon: BDAG
  rationale: Se mantiene «nombre» para preservar la imagen bíblica de identidad conferida; «título» explicaría de más.
- source_word: παρὰ τοῦ θεοῦ
  english_pob_choice: by God
  chosen_spanish: por Dios
  alternatives_spanish:
  - de parte de Dios
  - desde Dios
  lexicon: BDAG
  rationale: La preposición con genitivo señala agente o fuente; «por Dios» es natural en español y conserva la idea de nombramiento divino.
- source_word: εἰς τὸν αἰῶνα
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por siempre
  - para el siglo
  lexicon: BDAG
  rationale: Expresa duración permanente de manera clara y bíblicamente sobria en español contemporáneo.
- source_word: εἰρήνη
  english_pob_choice: Peace
  chosen_spanish: Paz
  alternatives_spanish:
  - Paz
  - Bienestar
  lexicon: BDAG
  rationale: Se conserva como elemento nominal del nombre otorgado; la mayúscula ayuda a señalar su valor titular, como en el inglés POB.
- source_word: δικαιοσύνης
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  lexicon: BDAG
  rationale: Aunque el inglés POB optó por «righteousness», en español «justicia» es una equivalencia natural y válida del término, y además queda reflejada la alternativa teológica documentada en la nota.
- source_word: δόξα
  english_pob_choice: glory
  chosen_spanish: gloria
  alternatives_spanish:
  - honor
  - esplendor
  lexicon: BDAG
  rationale: «Gloria» preserva el peso bíblico y la resonancia cultual del término.
- source_word: θεοσεβείας
  english_pob_choice: godliness
  chosen_spanish: piedad
  alternatives_spanish:
  - devoción a Dios
  - reverencia hacia Dios
  lexicon: BDAG
  rationale: θεοσέβεια designa piedad/reverencia hacia Dios; «piedad» es conciso y fiel, y la nota recoge las alternativas posibles que el inglés POB dejó abiertas.
theological_decisions:
- issue: Cómo verter δικαιοσύνης en la fórmula nominal final
  english_pob_reading: righteousness
  chosen_spanish_reading: justicia
  alternative_spanish_readings:
  - rectitud
  - justicia social
  rationale: El término admite el campo semántico de justicia/rectitud. En esta construcción poética, «justicia» preserva el valor ético-covenantal sin estrechar el sentido a una sola subcategoría moderna.
  doctrine_reference: 'DOCTRINE.md Contested terms: δικαιοσύνη → righteousness / justice'
- issue: Entender las frases finales como el contenido del nombre conferido
  english_pob_reading: 'quoted appositional title: “Peace of righteousness and glory of godliness.”'
  chosen_spanish_reading: 'título apposicional citado: «Paz de justicia y gloria de piedad»'
  alternative_spanish_readings:
  - apposición sin comillas
  - nombre descriptivo no citado
  rationale: El griego presenta dos sintagmas nominativos tras la fórmula de nombramiento, por lo que funcionan mejor como el contenido del nombre. Las comillas ayudan al lector a percibir el giro nominal sin añadir explicación innecesaria.
  doctrine_reference: 'Audit trail POB: naming formula / bestowed identity'
translation_notes:
  revision_awareness: El pasaje coincide con la última pasada revisada sin cambios sustanciales. La presente redacción conserva el esquema de nombramiento divino y las dos alternativas léxicas documentadas en el rastro inglés, ajustándolas a un español natural y publicable.
  spanish_consistency_notes:
  - Se mantuvo «Dios» para θεός y no se introdujo ninguna convención de ocultamiento del nombre divino, ya que el texto griego aquí usa θεός explícitamente.
  - Se optó por «piedad» en la frase final para reflejar θεοσεβείας; la nota conserva la alternativa «gloria de piedad» / «gloria de reverencia para con Dios» según el margen semántico documentado.
  - Las comillas señalan la fórmula de nombre otorgado y ayudan a distinguir el contenido nominal de una simple predicación.
