translation:
  language: es
  text: porque él es hallado por los que no lo ponen a prueba[a], y se manifiesta a los que no desconfían de él[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «no lo tientan» o «no lo ponen a prueba». El verbo griego puede significar también «tentar» según el contexto.
    reason: lexical_alternative
  - marker: b
    text: O «no le creen» o «no carecen de fe en él».
    reason: lexical_alternative
lexical_decisions:
- source_word: εὑρίσκεται
  english_pob_choice: is found
  chosen_spanish: es hallado
  alternatives_spanish:
  - es encontrado
  - se deja hallar
  - se halla
  lexicon: BDAG
  rationale: ‘εὑρίσκεται’ en pasivo medio se expresa de manera natural como ‘es hallado’, conservando la idea de que Dios se deja encontrar sin añadir matices no presentes en el griego.
- source_word: τοῖς μὴ πειράζουσιν αὐτόν
  english_pob_choice: by those who do not test him
  chosen_spanish: por los que no lo ponen a prueba
  alternatives_spanish:
  - por los que no lo tientan
  - por los que no lo prueban
  - por los que no lo examinan
  lexicon: BDAG
  rationale: ‘πειράζω’ puede significar probar, tentar o poner a prueba; aquí, en un contexto sapiencial y aplicado a Dios, ‘poner a prueba’ conserva la fuerza verbal sin cargar innecesariamente el sentido de ‘tentar’.
- source_word: ἐμφανίζεται
  english_pob_choice: reveals himself
  chosen_spanish: se manifiesta
  alternatives_spanish:
  - se revela
  - se hace visible
  - se da a conocer
  lexicon: BDAG
  rationale: El verbo tiene un valor de hacerse visible o conocido. ‘Se manifiesta’ preserva ese sentido y suena sobrio en español bíblico, sin perder la dimensión personal del texto.
- source_word: τοῖς μὴ ἀπιστοῦσιν αὐτῷ
  english_pob_choice: to those who do not distrust him
  chosen_spanish: a los que no desconfían de él
  alternatives_spanish:
  - a los que no lo descreen
  - a los que no dudan de él
  - a los que no le son infieles
  lexicon: BDAG
  rationale: ‘ἀπιστέω’ puede ser ‘desconfiar’, ‘no creer’ o ‘ser incrédulo’. ‘Desconfiar de él’ conserva el matiz relacional que la POB inglesa destacó y evita reducir el texto solo a incredulidad intelectual.
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  - for
  lexicon: BDAG
  rationale: ‘Porque’ comunica con claridad la relación causal que introduce la cláusula y es idiomático en español moderno.
theological_decisions:
- issue: Matiz relacional de ἀπιστοῦσιν αὐτῷ
  english_pob_reading: do not distrust him
  chosen_spanish_reading: no desconfían de él
  alternative_spanish_readings:
  - no le niegan la fe
  - no lo consideran falso
  - no son incrédulos con respecto a él
  rationale: La formulación elegida conserva la dimensión de confianza-relación presente en el contexto sapiencial. No se reduce a mera disertación intelectual; mantiene la tensión entre fe, confianza y actitud hacia Dios.
  doctrine_reference: 'DOCTRINE.md: preservar la tensión teológica y no aplanar el lenguaje de fe.'
translation_notes:
  revision_awareness: 'La versión sigue de cerca el texto griego de Swete y mantiene la decisión auditada de la POB inglesa: ‘test’ para πειράζω y un verbo relacional para ἀπιστέω. No se detectaron cambios relevantes en la revisión más reciente; se conserva la lectura aprobada.'
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ para el nombre divino en el proyecto, pero este versículo no lo contiene explícitamente.
  - Se eligió ‘es hallado’ en lugar de una paráfrasis más explicativa para preservar la pasiva del griego.
  - ‘Se manifiesta’ mantiene el paralelismo con ‘es hallado’ y evita sobreinterpretar el alcance de ἐμφανίζεται.
