  from: And the Sodomitic sea will cast out fish, and by night it will give a voice that many have not known, but all will hear its voice.
  to: And the Sea of Sodom will cast out fish, and by night it will give a voice that many do not know, but all will hear its voice.
  rationale: The Latin adjective 'Sodomiticum' functions as a geographical descriptor. In modern English, 'Sodomitic' carries strong behavioral connotations that distract from the simple geographical reference to the city. 'Sea of Sodom' is the natural English phrasing for this geographical adjective and preserves the author's allusion without the modern baggage.
