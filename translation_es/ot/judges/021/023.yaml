  rationale: Se ajusta el modismo matrimonial a un español más claro ('tomaron esposas'), se reemplaza 'secuestrado' por 'arrebatado' para evitar un matiz penal moderno no exigido por גזל, se mejora ligeramente la fluidez de la secuencia verbal manteniendo ambos verbos hebreos, y se añaden notas que preservan las alternativas léxicas documentadas en el audit trail inglés.
