review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del hebreo: Faraón envía, constata que no murió ni uno del ganado de Israel, y no deja ir al pueblo. Sin embargo, en la cláusula וַיִּכְבַּד לֵב פַּרְעֹה no preserva adecuadamente la decisión auditada del POB en inglés, que revisó explícitamente de ''was hardened'' a ''was heavy'' para mantener la metáfora de ''pesadez'' y la tensión de agencia. ''Se endureció'' desplaza el matiz lexical hacia otra fórmula de endurecimiento de Éxodo.'
  spanish_quality_summary: El español es claro y legible. 'Envió' y 'no dejó ir al pueblo' funcionan bien. 'Y he aquí' es aceptable en registro bíblico, aunque algo elevado; no requiere cambio. 'Animales de Israel' es comprensible, pero 'ganado de Israel' o 'ganado de los israelitas' suena más natural y se alinea mejor con מִקְנֶה. La reparación principal es rehacer la cláusula del corazón para reflejar 'se puso pesado' o equivalente sin sonar demasiado forzada.
  glossary_alignment: No hay términos del glosario principal en disputa salvo la fidelidad a la metáfora de כבד. El borrador se aparta de la racionalidad lexical documentada al usar 'se endureció' en el texto principal cuando la auditoría inglesa decidió conservar 'heavy'. También conviene preferir 'ganado' sobre 'animales' para מִקְנֶה, ya que en español bíblico y general comunica mejor 'livestock' sin rebajar el registro.
  issues:
  - severity: high
    issue: La frase 'el corazón de Faraón se endureció' no sigue la revisión auditada del POB inglés.
    rationale: La versión inglesa fue revisada intencionalmente a 'Pharaoh’s heart was heavy' para reflejar más directamente וַיִּכְבַּד y evitar importar otra fórmula de endurecimiento. El español debería conservar esa metáfora en la medida de lo posible, sin introducir 'endureció' como texto principal.
  - severity: medium
    issue: '''Animales de Israel'' es menos preciso y menos idiomático que ''ganado de Israel/los israelitas''.'
    rationale: מִקְנֶה se refiere a ganado/livestock. 'Animales' es demasiado amplio y suena algo genérico; 'ganado' conserva mejor el campo semántico y el registro.
  - severity: low
    issue: La nota b explica correctamente el hebreo, pero queda en tensión con un texto principal que no lo refleja.
    rationale: Si el texto principal se corrige a una formulación con 'pesado', la nota puede simplificarse y alinearse mejor con la política de preservar la metáfora original.
  revised_spanish_text: Faraón envió[a], y he aquí que no había muerto ni uno del ganado de Israel. Pero el corazón de Faraón se puso pesado[b], y no dejó ir al pueblo.
