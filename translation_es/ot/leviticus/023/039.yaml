translation:
  language: es
  text: Sin embargo, el día quince del séptimo mes, cuando hayan recogido[a] el producto de la tierra, celebrarán la fiesta de Yahvé[b] por siete días. El primer día habrá un reposo solemne[c], y el octavo día un reposo solemne.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cuando recojan». La construcción hebrea expresa el momento en que ya se ha realizado la recolección.
    reason: lexical_alternative
  - marker: b
    text: O «festividad de Yahvé». El hebreo puede denotar una celebración festiva, a menudo una fiesta de peregrinación.
    reason: lexical_alternative
  - marker: c
    text: O «un sábado de reposo». El término hebreo designa un día especial de cesación asociado con la observancia sagrada.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַךְ
  english_pob_choice: However
  chosen_spanish: Sin embargo
  alternatives_spanish:
  - Sólo
  - Ciertamente
  - No obstante
  lexicon: HALOT
  rationale: La partícula marca una transición o matiz respecto de las instrucciones previas. «Sin embargo» reproduce bien ese giro discursivo en español sin convertirlo en una simple intensificación.
- source_word: בַּחֲמִשָּׁה עָשָׂר יוֹם
  english_pob_choice: on the fifteenth day
  chosen_spanish: el día quince
  alternatives_spanish:
  - el día decimoquinto
  - a los quince días
  lexicon: HALOT
  rationale: La fecha hebrea se expresa de forma idiomática en español con «el día quince», manteniendo la precisión calendárica.
- source_word: לַחֹדֶשׁ הַשְּׁבִיעִי
  english_pob_choice: of the seventh month
  chosen_spanish: del séptimo mes
  alternatives_spanish:
  - en el séptimo mes
  lexicon: HALOT
  rationale: La construcción de fecha exige en español la relación posesiva «del séptimo mes», que conserva el valor del hebreo constructo.
- source_word: בְּאָסְפְּכֶם
  english_pob_choice: when you have gathered in
  chosen_spanish: cuando hayan recogido
  alternatives_spanish:
  - cuando recojan
  - al recoger
  lexicon: HALOT
  rationale: 'El valor temporal circunstancial y el contexto de la cosecha se comunican naturalmente con una forma perfecta en español: «cuando hayan recogido».'
- source_word: תְּבוּאַת הָאָרֶץ
  english_pob_choice: the produce of the land
  chosen_spanish: la cosecha de la tierra
  alternatives_spanish:
  - el producto de la tierra
  - el fruto de la tierra
  - la producción de la tierra
  lexicon: HALOT
  rationale: «תְּבוּאָה» abarca el producto/cosecha obtenida. En este contexto agrícola festivo, «la cosecha de la tierra» comunica bien el ingathering sin estrecharlo a un solo cultivo.
- source_word: תָּחֹגּוּ
  english_pob_choice: you shall celebrate
  chosen_spanish: celebrarán
  alternatives_spanish:
  - harán fiesta
  - guardarán la fiesta
  - celebrarán la fiesta
  lexicon: HALOT
  rationale: El verbo חגג expresa celebrar una fiesta peregrina. «Celebrarán» es claro y natural; se completa con «la fiesta» para preservar el sentido festal del hebreo.
- source_word: חַג יְהוָה
  english_pob_choice: the feast of Yahweh
  chosen_spanish: la fiesta de Yahvé
  alternatives_spanish:
  - la festividad de Yahvé
  - la fiesta de Yahvé
  lexicon: HALOT
  rationale: 'Se mantiene la terminología POB para el Nombre divino: «Yahvé». «Fiesta» conserva el campo semántico de חג sin perder inteligibilidad en español.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: El Tetragrámaton se vierte como «Yahvé» según el estándar del proyecto, preservando el nombre propio del pacto en lugar de sustituirlo por un título.
- source_word: שִׁבְעַת יָמִים
  english_pob_choice: for seven days
  chosen_spanish: por siete días
  alternatives_spanish:
  - durante siete días
  - siete días
  lexicon: HALOT
  rationale: «Por siete días» expresa duración de manera natural en español y refleja el alcance temporal del hebreo.
- source_word: שַׁבָּתוֹן
  english_pob_choice: a solemn rest
  chosen_spanish: un reposo solemne
  alternatives_spanish:
  - un sábado de reposo
  - un descanso solemne
  - un reposo sabático
  lexicon: HALOT
  rationale: Se conserva el carácter especial y sagrado del término sin confundirlo con el sábado semanal. «Reposo solemne» comunica una cesación ritual distinguida.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: El texto hebreo usa directamente el Tetragrámaton. La forma española establecida por el proyecto es «Yahvé», que preserva el nombre propio divino y evita la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido cultual de חַג y su relación con la cosecha
  english_pob_reading: the feast of Yahweh
  chosen_spanish_reading: la fiesta de Yahvé
  alternative_spanish_readings:
  - la festividad de Yahvé
  - la fiesta/peregrinación de Yahvé
  rationale: La secuencia habla de una celebración festiva ligada a la ingathering agrícola. «Fiesta» mantiene el valor cultual sin añadir una especificación que el hebreo no exige en la forma breve del versículo.
  doctrine_reference: DOCTRINE.md Translation philosophy §6 (readable modern Spanish, not archaic or academic)
- issue: שַׁבָּתוֹן como día de descanso sagrado
  english_pob_reading: a solemn rest
  chosen_spanish_reading: un reposo solemne
  alternative_spanish_readings:
  - un descanso solemne
  - un reposo sabático
  rationale: La frase debe comunicar un cese ritual de trabajo y no simplemente un descanso común. «Reposo solemne» conserva la solemnidad cultual sin imponer la idea del sábado semanal.
  doctrine_reference: DOCTRINE.md Translation philosophy §6 (readable modern Spanish, not archaic or academic)
translation_notes:
  revision_awareness: 'La versión inglesa auditada fue aprobada sin cambios en la última pasada, con alta concordancia y sin revisiones aplicadas. La redacción española sigue ese mismo perfil estable, conservando las decisiones léxicas clave: el Nombre divino como «Yahvé», la fiesta como observancia cultual, y שַׁבָּתוֹן como reposo sagrado no identificado de forma automática con el sábado semanal.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme al estándar del proyecto para יְהוָה.
  - «Fiesta» se usa para חַג en coherencia con la lectura festiva del pasaje.
  - «Reposo solemne» preserva la distinción entre un descanso ritual y el sábado semanal.
  - La sintaxis española prioriza claridad litúrgica sin perder el orden informativo del hebreo.
