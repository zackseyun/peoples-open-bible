translation:
  language: es
  text: 'Así dice el Señor Yahvé: «Mira[a], yo estoy contra los pastores, y reclamaré mi rebaño de su mano[b], y los haré dejar de apacentar el rebaño. Los pastores ya no los apacentarán, y libraré a mi rebaño de su boca[c], y ya no será comida para ellos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Mira» o «He aquí». Se conserva la fuerza profética de llamada de atención y de oposición divina.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «de su mano», un modismo de rendición de cuentas y recuperación de posesión.'
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: «de su boca», preservando la imagen de los pastores como devoradores en vez de protectores.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: el Señor Yahvé
  alternatives_spanish:
  - el Señor Dios
  - el Señor Soberano Yahvé
  lexicon: HALOT
  rationale: Conservo el título compuesto como una sola fórmula reverente y explícita. En español, 'Yahvé' hace visible el nombre divino donde el inglés POB usó 'GOD' por convención tipográfica, y 'Señor' refleja אֲדֹנָי sin caer en un calco incómodo.
- source_word: הִנְנִי אֶל
  english_pob_choice: Behold, I am against
  chosen_spanish: Miren, yo estoy contra
  alternatives_spanish:
  - He aquí, yo estoy contra
  - Vean, yo estoy contra
  lexicon: HALOT
  rationale: La fórmula profética introduce énfasis y oposición. 'Miren' mantiene el valor de llamada atencional de 'Behold' con español natural; 'estoy contra' traduce el valor hostil de אֶל en este contexto.
- source_word: הָרֹעִים
  english_pob_choice: the shepherds
  chosen_spanish: los pastores
  alternatives_spanish:
  - los líderes
  - los pastores
  lexicon: HALOT
  rationale: Conservo la metáfora pastoral del hebreo. Aunque apunta a los dirigentes de Israel, el texto explota la imagen de pastor, y en español 'pastores' preserva esa carga metafórica y la repetición del pasaje.
- source_word: וְדָרַשְׁתִּי אֶת־צֹאנִי מִיָּדָם
  english_pob_choice: I will require my flock from their hand
  chosen_spanish: requeriré mi rebaño de su mano
  alternatives_spanish:
  - les pediré cuentas por mi rebaño
  - reclamaré mi rebaño de sus manos
  lexicon: HALOT
  rationale: '''Requerir'' mantiene la idea jurídica de reclamar/poner en cuenta y conserva la imagen hebrea de ''de su mano''. ''Mi rebaño'' comunica צֹאן en un español claro y fiel.'
- source_word: וְהִשְׁבַּתִּים מֵרְעוֹת צֹאן
  english_pob_choice: I will stop them from shepherding the flock
  chosen_spanish: los haré cesar de apacentar el rebaño
  alternatives_spanish:
  - los detendré de pastorear el rebaño
  - haré que dejen de apacentar el rebaño
  lexicon: HALOT
  rationale: הִשְׁבִּית significa hacer cesar; 'los haré cesar' refleja bien la causación. 'Apacentar' conserva el campo semántico pastoral de רעה sin perder fluidez en español bíblico contemporáneo.
- source_word: וְלֹא יִרְעוּ עוֹד הָרֹעִים אוֹתָם
  english_pob_choice: The shepherds will no longer shepherd them
  chosen_spanish: Los pastores ya no apacentarán más a ellos
  alternatives_spanish:
  - Los pastores ya no los pastorearán
  - Los pastores no los apacentarán más
  lexicon: HALOT
  rationale: Mantengo la repetición verbal de רעה con 'apacentar' para conservar el juego de palabras y la continuidad con la línea anterior. 'A ellos' sigue la referencia pronominal del hebreo sin suavizarla en exceso.
- source_word: וְהִצַּלְתִּי צֹאנִי מִפִּיהֶם
  english_pob_choice: I will rescue my flock from their mouth
  chosen_spanish: libraré a mi rebaño de su boca
  alternatives_spanish:
  - rescataré a mi rebaño de su boca
  - salvaré a mi rebaño de su boca
  lexicon: HALOT
  rationale: '''Libraré'' conserva el acto de sacar/liberar con fuerza salvadora. ''De su boca'' preserva la imagen depredadora de los pastores como devoradores, no solo como malos administradores.'
- source_word: וְלֹא תִהְיֶיןָ לָהֶם לְאָכְלָה
  english_pob_choice: it will no longer be food for them
  chosen_spanish: no les servirá más de comida
  alternatives_spanish:
  - no les será más de comida
  - ya no les servirá de alimento
  lexicon: HALOT
  rationale: El hebreo usa un singular colectivo; 'no les servirá más de comida' reproduce ese valor sin forzar plural en español. 'Comida' mantiene la imagen directa de depredación ligada a 'boca'.
theological_decisions:
- issue: Traducción del nombre divino en el título compuesto אֲדֹנָי יְהוִה
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Dios
  - el Señor Soberano Yahvé
  rationale: La base hebrea contiene explícitamente el nombre del pacto YHWH. En esta serie, el nombre no se enmascara; por eso 'Yahvé' es la opción principal. 'Señor' traduce אֲדֹנָי y evita una redundancia poco natural como 'Señor Yahvé' sin título, mientras que la combinación completa mantiene ambos elementos del hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for יְהוָה YHWH; Translation philosophy #6'
- issue: Conservación de la metáfora pastoral y su valor acusatorio
  english_pob_reading: the shepherds / shepherding the flock / from their mouth
  chosen_spanish_reading: los pastores / apacentar el rebaño / de su boca
  alternative_spanish_readings:
  - los líderes / gobernar al pueblo / de sus fauces
  - los pastores / pastorear el rebaño / de su boca
  rationale: Ezequiel 34 desarrolla de forma sostenida la metáfora del pastor para denunciar a los dirigentes. Mantener 'pastores' y verbos pastorales evita borrar la imagen original y conserva la tensión entre cuidado debido y voracidad abusiva.
  doctrine_reference: Ezequiel 34:1-10 contexto literario; metáfora extendida del pastor en profecía
- issue: Singular colectivo en la cláusula final
  english_pob_reading: it will no longer be food for them
  chosen_spanish_reading: no les servirá más de comida
  alternative_spanish_readings:
  - no les servirán más de comida
  - ya no será comida para ellos
  rationale: El hebreo usa un verbo singular con 'mi rebaño' como colectivo. En español, el singular impersonal 'no les servirá más de comida' reproduce mejor esa concordancia y evita una corrección interpretativa al plural.
  doctrine_reference: Concordancia gramatical del hebreo en uso colectivo
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión final del inglés POB que corrigió la cláusula final al singular colectivo ('it will no longer be food for them'). La redacción española refleja ese ajuste con un singular impersonal ('no les servirá más de comida'). También se respetó la decisión inglesa de mantener la metáfora de 'mouth' para no diluir la imagen depredadora.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma consistente para יְהוָה en la línea principal.
  - Se preserva la metáfora pastoral con 'pastores' y 'apacentar' en todo el versículo.
  - '''Rebaño'' traduce צֹאן de modo uniforme en singular colectivo.'
  - La cláusula final se mantiene en singular impersonal para concordar con el hebreo colectivo.
  - Se evita 'SEÑOR' como máscara tipográfica y se conserva la transparencia del nombre divino.
