translation:
  language: es
  text: Y en nuestros pecados, pecadores se levantaron contra nosotros[a]; nos atacaron y nos expulsaron. Aquellos a quienes no les habías prometido nada lo arrebataron por la fuerza[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego expresa un levantamiento u oposición hostil; «se levantaron contra» conserva ese sentido de enfrentamiento.
    reason: lexical_alternative
  - marker: b
    text: El griego no expresa directamente el objeto de «arrebataron»; la traducción conserva la elipsis tanto como lo permite el español.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπανέστησαν
  english_pob_choice: rose up against
  chosen_spanish: se levantaron contra
  alternatives_spanish:
  - se alzaron contra
  - se rebelaron contra
  lexicon: BDAG
  rationale: El verbo compuesto expresa oposición hostil o levantamiento contra alguien. «Se levantaron contra» conserva ese sentido adversarial en un español natural y claro.
- source_word: ἐπέθεντο
  english_pob_choice: attacked
  chosen_spanish: nos atacaron
  alternatives_spanish:
  - se abalanzaron sobre nosotros
  - nos acometieron
  lexicon: BDAG
  rationale: En el contexto de violencia seguido de expulsión, «atacaron» comunica bien la agresión sin perder la fuerza del verbo griego.
- source_word: ἐξώσαντο
  english_pob_choice: drove us out
  chosen_spanish: nos expulsaron
  alternatives_spanish:
  - nos echaron
  - nos arrojaron fuera
  lexicon: BDAG
  rationale: El verbo indica expulsión forzosa. «Nos expulsaron» conserva el valor coercitivo de manera directa y digna; «nos echaron» sería más coloquial.
- source_word: οἷς
  english_pob_choice: to them / to whom
  chosen_spanish: A quienes
  alternatives_spanish:
  - a los cuales
  - a ellos
  lexicon: BDAG
  rationale: El relativo dativo plural se vierte naturalmente con «A quienes», manteniendo la referencia a los pecadores mencionados antes.
- source_word: ἐπηγγείλω
  english_pob_choice: you had not promised
  chosen_spanish: no les habías prometido
  alternatives_spanish:
  - no les prometiste
  - no se lo habías prometido
  lexicon: BDAG
  rationale: 'La revisión auditada corrige el valor verbal: es segunda persona singular, por lo que el español debe mantener el «habías prometido» dirigido a Dios. Se conserva además el objeto implícito con «eso», siguiendo la elipsis del griego.'
- source_word: ἀφείλαντο
  english_pob_choice: took away
  chosen_spanish: se lo quitaron
  alternatives_spanish:
  - lo tomaron
  - lo arrebataron
  lexicon: BDAG
  rationale: El verbo denota tomar/remover por la fuerza. «Se lo quitaron» transmite la apropiación violenta y permite en español mantener el objeto implícito sin añadir contenido ajeno.
- source_word: μετὰ βίας
  english_pob_choice: by force
  chosen_spanish: por la fuerza
  alternatives_spanish:
  - con violencia
  - violentamente
  lexicon: BDAG
  rationale: La frase marca coerción. «Por la fuerza» es una equivalencia natural y fiel, con buen registro bíblico contemporáneo.
theological_decisions:
- issue: Sujeto implícito y continuidad de la segunda persona en ἐπηγγείλω
  english_pob_reading: 'The corrected reading keeps the direct address to God: ''you had not promised.'''
  chosen_spanish_reading: Se mantiene la segunda persona singular dirigida a Yahvé en «no les habías prometido».
  alternative_spanish_readings:
  - no les prometiste
  - no se les había prometido
  rationale: La revisión confirma que el griego continúa la خطاب/dirigida al Señor. Traducir en segunda persona preserva la forma del texto y evita borrar el rasgo gramatical señalado por la auditoría.
  doctrine_reference: Fidelidad textual y respeto al sujeto gramatical del original; continuidad del discurso directo a Yahvé.
- issue: Objeto no expresado de ἀφείλαντο
  english_pob_reading: Leave the object implicit in English.
  chosen_spanish_reading: Se deja el objeto implícito con «eso» y el clítico «lo».
  alternative_spanish_readings:
  - se lo arrebataron
  - lo arrebataron
  rationale: El griego no expresa el objeto. En español conviene un referente neutro mínimo («eso») para que la frase sea legible, sin especificar qué fue tomado.
  doctrine_reference: Respeto a la elipsis del texto fuente; no añadir interpretación sobre el objeto arrebatado.
translation_notes:
  revision_awareness: 'La auditoría revisada corrige el valor de ἐπηγγείλω: no es primera persona singular, sino segunda persona singular, continuando la dirección a Dios desde el contexto inmediato. También confirma que οἷς introduce a los mismos sujetos hostiles, no un objeto introducido por una cláusula de ''what''. La presente versión ajusta la sintaxis española a esa lectura y evita la error anterior.'
  spanish_consistency_notes:
  - Se usa «Yahvé» conforme al estándar del proyecto cuando el discurso se dirige a Dios.
  - Se conserva un registro bíblico sobrio y moderno, evitando calcos innecesarios.
  - 'Se mantiene la violencia del pasaje con verbos directos: «atacaron», «expulsaron», «por la fuerza».'
  - No se introdujo un objeto específico para el verbo final, porque el griego lo deja implícito.
