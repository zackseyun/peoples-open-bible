translation:
  language: es
  text: Caerás en campo abierto[a][b], porque yo he hablado, declara el Señor Yahvé[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: ''sobre la faz del campo'', un modismo que significa estar en campo abierto.'
    reason: lexical_alternative
  - marker: b
    text: 'O: ''Caerás sobre el campo.'''
    reason: alternative_reading
  - marker: c
    text: 'Hebreo: אֲדֹנָי יְהוִה; el segundo término es el nombre divino YHWH, aquí vertido como ''Yahvé''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל פְּנֵי הַשָּׂדֶה
  english_pob_choice: on the open field
  chosen_spanish: sobre el campo abierto
  alternatives_spanish:
  - sobre la superficie del campo
  - sobre el campo
  lexicon: HALOT
  rationale: El hebreo usa la idiomática expresión 'sobre la faz/superficie del campo', que aquí señala estar expuesto en terreno abierto. 'Campo abierto' comunica bien el matiz idiomático sin volver demasiado rígida la imagen.
- source_word: תִּפּוֹל
  english_pob_choice: you will fall
  chosen_spanish: Caerás
  alternatives_spanish:
  - caerás tú
  - caerás sobre
  lexicon: HALOT
  rationale: La forma verbal es segunda masculina singular, dirigida a Gog. En español, 'caerás' conserva la fuerza directa y el valor profético futuro del hebreo.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: 'Aquí introduce la razón de la caída: YHWH ha hablado. ''Porque'' expresa con claridad esa relación causal en español.'
- source_word: דִבַּרְתִּי
  english_pob_choice: I have spoken
  chosen_spanish: yo he hablado
  alternatives_spanish:
  - yo hablé
  - he hablado
  lexicon: HALOT
  rationale: El perfecto hebreo en este contexto profético subraya la certeza y firmeza de la palabra divina. 'Yo he hablado' mantiene ese valor de declaración consumada.
- source_word: נְאֻם
  english_pob_choice: declares
  chosen_spanish: declara
  alternatives_spanish:
  - dice
  - oráculo de
  lexicon: HALOT
  rationale: '''Declara'' funciona bien en la fórmula profética y preserva el tono solemne de la introducción oracular sin sonar forzado en español moderno.'
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: el Señor Yahvé
  alternatives_spanish:
  - el Señor Yahvé Dios
  - el Señor Dios
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
  rationale: 'En el texto español se sigue la convención del proyecto para יהוה: ''Yahvé''. En la fórmula combinada אֲדֹנָי יְהוִה, ''el Señor Yahvé'' conserva la doble referencia honorífica y el nombre divino sin mascarlo como ''SEÑOR''.'
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה en la fórmula אֲדֹנָי יְהוִה
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Dios
  - el Señor Yahvé Dios
  rationale: La política del proyecto pide traducir el Tetragrammaton como 'Yahvé'. Aquí, la combinación con אֲדֹנָי se vierte de modo que no se oculte el nombre divino ni se cree una repetición artificial en español.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'El pasaje coincide sustancialmente con el último pase de revisión: se mantiene la lectura profética, la equivalencia óptima para el modismo del campo abierto y la fórmula final con el nombre divino explicitado en español. No se introdujeron cambios textuales respecto al sentido básico del original.'
  spanish_consistency_notes:
  - Se mantiene el trato directo en segunda persona singular para coherencia con el hebreo.
  - '''Señor Yahvé'' preserva la solemnidad de la fórmula profética sin recurrir a la sustitución tradicional ''SEÑOR''.'
  - La nota alternativa en a recoge la imagen literal 'sobre la faz del campo' para auditar el modismo hebreo.
