translation:
  language: es
  text: Un hombre poderoso en el hablar es conocido de lejos[a]; pero el que tiene entendimiento sabe cuando resbala[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «es reconocido a distancia»; el griego puede sugerir tanto habla llamativa como una reputación que lo precede.
    reason: lexical_alternative
  - marker: b
    text: O «cuando tropieza». La imagen griega de resbalar puede referirse al tropiezo literal o al error figurado.
    reason: lexical_alternative
lexical_decisions:
- source_word: γνωστὸς μακρόθεν
  english_pob_choice: is known from afar
  chosen_spanish: es conocido de lejos
  alternatives_spanish:
  - es reconocido a distancia
  - llega a ser conocido muy lejos
  lexicon: LSJ
  rationale: Mantengo la concisión del giro griego y la idea de notoriedad perceptible a distancia. «De lejos» reproduce bien μακρόθεν sin añadir explicación interpretativa.
- source_word: ὁ δυνατὸς ἐν γλώσσῃ
  english_pob_choice: a man mighty in tongue
  chosen_spanish: un hombre poderoso en el hablar
  alternatives_spanish:
  - un hombre fuerte de lengua
  - uno poderoso en la palabra
  - un hablador poderoso
  lexicon: LSJ
  rationale: «Poderoso» conserva la fuerza de δυνατός, y «en el hablar» evita un calco extraño de «en lengua» en español. Se mantiene la imagen de capacidad verbal intensa, sin suavizarla a un simple elogio de elocuencia.
- source_word: ὁ δὲ νοήμων
  english_pob_choice: but one with understanding
  chosen_spanish: pero el que tiene entendimiento
  alternatives_spanish:
  - pero el entendido
  - pero el discernidor
  - pero la persona prudente
  lexicon: LSJ
  rationale: '«Entendimiento» conserva el campo semántico de νοήμων: comprensión, discernimiento e inteligencia práctica. «El que tiene entendimiento» es natural en español y mantiene el contraste con el hablador poderoso.'
- source_word: οἶδεν
  english_pob_choice: knows
  chosen_spanish: sabe
  alternatives_spanish:
  - conoce
  - percibe
  - reconoce
  lexicon: LSJ
  rationale: «Sabe» es el verbo más directo y natural para expresar la comprensión perceptiva del segundo miembro, sin sobrecargar el matiz.
- source_word: ἐν τῷ ὀλισθάνειν αὐτόν
  english_pob_choice: when he slips
  chosen_spanish: cuándo resbala
  alternatives_spanish:
  - cuando tropieza
  - en su resbalar
  - cuando cae en error
  lexicon: LSJ
  rationale: El infinitivo con ἐν tiene fuerza temporal; por eso «cuándo»/«cuando» expresa el momento del desliz. «Resbala» conserva la imagen física del griego y deja abierta la posible lectura figurada sin imponerla.
theological_decisions:
- issue: Imagen física con posible sentido moral
  english_pob_reading: when he slips / when he stumbles
  chosen_spanish_reading: cuándo resbala
  alternative_spanish_readings:
  - cuando tropieza
  - cuando cae en error
  rationale: El griego permite tanto el tropiezo literal como la caída figurada. La redacción escogida conserva la metáfora corporal básica y no fuerza una moralización explícita que el texto no formula directamente.
  doctrine_reference: Principio de fidelidad semántica y preservación de ambigüedad legítima
- issue: Masculino representativo en la construcción inicial
  english_pob_reading: A man mighty in tongue
  chosen_spanish_reading: Un hombre poderoso en el hablar
  alternative_spanish_readings:
  - Uno poderoso en el hablar
  - Una persona poderosa en el hablar
  rationale: El singular masculino del griego tiene valor representativo. «Un hombre» lo refleja con claridad en español, en paralelo con la solución inglesa auditada, sin implicar exclusión doctrinal.
  doctrine_reference: DOCTRINE.md §4 Gender-accurate over gender-neutral
translation_notes:
  revision_awareness: 'El texto griego coincide plenamente con el testimonio auditado y el control cruzado indica alta concordancia; no se requerían revisiones sustantivas. La versión española sigue la lectura inglesa auditada, pero afina la sintaxis para que suene natural en español mientras conserva las dos ambigüedades lexicales principales: la notoriedad a distancia y el resbalar literal/figurativo.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, aunque este versículo no contiene el nombre divino.
  - Se usa «entendimiento» para νοήμων, en coherencia con el campo de discernimiento del término.
  - «Resbala» conserva la imagen corporal del griego y evita una paráfrasis interpretativa excesiva.
  - Las notas al pie usan marcadores únicos y se anclan exactamente en la frase donde surge la ambigüedad.
