  text: וַ/יֹּ֕אמֶר בִּ֥/י נִשְׁבַּ֖עְתִּי נְאֻם יְהוָ֑ה כִּ֗י יַ֚עַן אֲשֶׁ֤ר עָשִׂ֨יתָ֙ אֶת הַ/דָּבָ֣ר הַ/זֶּ֔ה וְ/לֹ֥א חָשַׂ֖כְתָּ אֶת בִּנְ/ךָ֥ אֶת יְחִידֶֽ/ךָ־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/genesis/022/016.yaml
  text: and said[a], “By myself I have sworn, declares Yahweh, because you have done this thing and have not withheld your son[b], your only son,”
  footnotes:
