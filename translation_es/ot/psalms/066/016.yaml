translation:
  language: es
  text: Vengan y oigan, todos los que temen a Dios, y contaré lo que él ha hecho por mi alma[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lo que él ha hecho por mi vida». El hebreo נֶפֶשׁ (néfesh) puede significar «alma», «vida» o «yo mismo», según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְכוּ
  english_pob_choice: Come
  chosen_spanish: Vengan
  alternatives_spanish:
  - Vengan acá
  - Acérquense
  lexicon: HALOT
  rationale: En un llamado exhortativo dirigido a un auditorio, el verbo hebreo funciona idiomáticamente como una invitación a acercarse y prestar atención. En español, «Vengan» transmite mejor ese summons que un literal «vayan», que sonaría orientado en otra dirección.
- source_word: שִׁמְעוּ
  english_pob_choice: hear
  chosen_spanish: oigan
  alternatives_spanish:
  - escuchen
  lexicon: HALOT
  rationale: «Oigan» conserva el imperativo de atención auditiva y combina de manera natural con la invitación precedente. «Escuchen» es posible, pero aquí «oigan» mantiene con mayor claridad la forma de mandato breve del hebreo.
- source_word: וַאֲסַפְּרָה
  english_pob_choice: and I will tell
  chosen_spanish: y contaré
  alternatives_spanish:
  - y relataré
  - y declararé
  lexicon: HALOT
  rationale: El verbo expresa el acto de narrar o recounting. «Contaré» es natural en español y refleja la intención testimonial del hablante sin añadir énfasis interpretativo extra.
- source_word: כָּל יִרְאֵי אֱלֹהִים
  english_pob_choice: all you who fear God
  chosen_spanish: todos los que temen a Dios
  alternatives_spanish:
  - todos los reverentes de Dios
  - todos los que reverencian a Dios
  lexicon: HALOT
  rationale: La construcción se dirige a quienes se caracterizan por temor reverente hacia Dios. Se conserva «temen» para no suavizar la tensión bíblica de temor reverente ni reducirla a mera admiración.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  lexicon: HALOT
  rationale: El término hebreo aquí es el título genérico אֱלֹהִים, por lo que la traducción adecuada en español es «Dios».
- source_word: אֲשֶׁר עָשָׂה
  english_pob_choice: what he has done
  chosen_spanish: lo que él ha hecho
  alternatives_spanish:
  - lo que hizo
  - aquello que ha hecho
  lexicon: HALOT
  rationale: La cláusula relativa se vierte de forma idiomática con «lo que él ha hecho», que suena natural en español y mantiene el sentido de acción completada con relevancia presente.
- source_word: לְנַפְשִׁי
  english_pob_choice: for my soul
  chosen_spanish: por mi alma
  alternatives_spanish:
  - para mi vida
  - por mí
  lexicon: HALOT
  rationale: נֶפֶשׁ puede significar «alma», «vida» o «yo mismo». Se conserva «alma» para preservar el peso personal e interior del testimonio; «vida» sigue siendo una alternativa viable sin borrar la amplitud semántica.
theological_decisions:
- issue: Sentido de «temen a Dios»
  english_pob_reading: reverent fear toward God
  chosen_spanish_reading: temor reverente hacia Dios
  alternative_spanish_readings:
  - terror ante Dios
  - simple respeto por Dios
  rationale: La frase mantiene la tensión bíblica entre reverencia, obediencia y temor real. Se evita suavizarla a un mero respeto, pero también se evita convertirla en terror absoluto.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3'
- issue: Rango semántico de נֶפֶשׁ
  english_pob_reading: soul
  chosen_spanish_reading: alma
  alternative_spanish_readings:
  - vida
  - yo mismo
  rationale: «Alma» preserva la densidad espiritual y testimonial del verso en contexto poético. La alternativa «vida» queda implícitamente reconocida por la amplitud del término hebreo, sin borrar la preferencia principal del texto.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3'
translation_notes:
  revision_awareness: El texto inglés auditado ya había sido confirmado sin cambios en la última revisión, y la versión española sigue de cerca las decisiones léxicas y teológicas aprobadas, conservando la ambigüedad útil de נֶפֶשׁ en una nota.
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלֹהִים, conforme al criterio general del proyecto.
  - Se conserva el tono exhortativo directo con verbos en imperativo plural.
  - Se evita el uso de «SEÑOR» porque el hebreo aquí no contiene el nombre divino YHWH.
  - La nota sobre נֶפֶשׁ se ancla en «alma» y preserva la alternativa «vida» sin introducir interpretaciones no sustentadas.
