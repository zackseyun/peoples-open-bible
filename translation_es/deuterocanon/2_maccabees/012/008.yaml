translation:
  language: es
  text: y habiendo tratado también con los de Yamnia[a] que querían llevar a cabo la misma clase de acción contra los judíos que habitaban allí,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los de Yamnia que querían llevar a cabo la misma cosa contra los judíos que habitaban allí». El griego es sintácticamente compacto y la frase continúa en el versículo siguiente.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μεταλαβὼν
  english_pob_choice: having also dealt with
  chosen_spanish: habiendo tratado también con
  alternatives_spanish:
  - habiendo tomado en mano también a
  - habiendo afrontado también a
  - habiendo procedido también contra
  lexicon: LSJ
  rationale: El participio sugiere una acción tomada en curso o como transición a otra intervención. «Habiendo tratado con» conserva la fuerza de intervención sin concretar más de lo que el griego dice; evita introducir una acción militar específica que el verbo por sí solo no exige.
- source_word: τοὺς ἐν Ἰαμνίᾳ
  english_pob_choice: those in Jamnia
  chosen_spanish: los de Yamnia
  alternatives_spanish:
  - los que estaban en Yamnia
  - los habitantes de Yamnia
  - los de Jamnia
  lexicon: LSJ
  rationale: Se mantiene la referencia geográfica abierta y natural. «Los de Yamnia» es breve y idiomático en español bíblico, y respeta que el griego designa a un grupo localizado allí sin precisar más su composición.
- source_word: τὸν αὐτὸν ... τρόπον
  english_pob_choice: the same kind of action
  chosen_spanish: la misma clase de acción
  alternatives_spanish:
  - el mismo modo
  - la misma manera
  - el mismo plan
  lexicon: LSJ
  rationale: τρόπος puede ser «modo, manera, método». Dado el contexto hostil, «clase de acción» comunica en español la naturaleza del acto sin perder la ambigüedad del griego sobre el detalle exacto de esa conducta.
- source_word: ἐπιτελεῖν
  english_pob_choice: to carry out
  chosen_spanish: llevar a cabo
  alternatives_spanish:
  - realizar
  - ejecutar
  - cumplir
  lexicon: LSJ
  rationale: «Llevar a cabo» es el equivalente más natural y formal para una acción o plan que se pretende completar. Conserva el sentido de ejecución sin añadir un matiz técnico innecesario.
- source_word: βουλομένους
  english_pob_choice: were wanting
  chosen_spanish: querían
  alternatives_spanish:
  - intentaban
  - deseaban
  - pensaban hacer
  lexicon: LSJ
  rationale: La forma participial expresa voluntad o intención. En español, «querían» transmite esa intención de manera clara y breve; «intentaban» también sería posible, pero «querían» deja abierta la relación exacta entre querer y emprender la acción, como en el griego.
- source_word: τοῖς κατοικοῦσιν Ἰουδαίοις
  english_pob_choice: against the Jews living there
  chosen_spanish: contra los judíos que habitaban allí
  alternatives_spanish:
  - contra los judíos que vivían allí
  - contra los judíos residentes allí
  - contra los judíos que moraban allí
  lexicon: LSJ
  rationale: El dativo adquiere en contexto una dirección hostil. «Contra» hace explícita esa relación implícita en el griego y en la lectura inglesa POB, mientras que «que habitaban allí» conserva el valor descriptivo de κατοικοῦσιν.
translation_notes:
  revision_awareness: 'La revisión inglesa más reciente sustituyó una traducción más literal de μεταλαβών por una formulación más natural («having also dealt with»), sin cambiar la estructura general ni la ambigüedad sintáctica del pasaje. La versión española sigue esa línea: prefiere una redacción fluida («habiendo tratado también con») sin sobreespecificar el gesto verbal. También conserva el carácter incompleto o suspendido del griego, por lo que la frase queda abierta hacia el versículo siguiente.'
  spanish_consistency_notes:
  - Se mantiene «Yamnia» como forma hispana coherente con la transliteración del nombre propio, en lugar de alternar con «Jamnia» dentro del mismo registro.
  - Se usa «judíos» en minúscula, por tratarse de un etnónimo contextual, y «Yahvé» no interviene en este versículo.
  - Se conserva una estructura participial inicial para reflejar el encadenamiento narrativo del griego, evitando convertirlo en una oración principal cerrada.
