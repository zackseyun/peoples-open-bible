translation:
  language: es
  text: Hijo mío, en las cosas buenas no añadas reproche, ni con todo don[a] palabras que causen tristeza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con cada dádiva, no añadas palabras hirientes». El griego literalmente dice «ni en todo don tristeza de palabras», una expresión condensada que advierte contra arruinar la generosidad con palabras que entristecen.
    reason: lexical_alternative
lexical_decisions:
- source_word: Τέκνον
  english_pob_choice: My child
  chosen_spanish: Hijo mío
  alternatives_spanish:
  - Hijo
  - Niño mío
  lexicon: LSJ
  rationale: Es un vocativo afectuoso de instrucción sapiencial. «Hijo mío» reproduce bien el tono cercano y didáctico del original y del inglés POB, sin añadir un matiz de edad infantil que «niño mío» podría sugerir.
- source_word: ἐν ἀγαθοῖς
  english_pob_choice: in good things
  chosen_spanish: en las cosas buenas
  alternatives_spanish:
  - en los bienes
  - cuando hagas el bien
  - en las buenas acciones
  lexicon: LSJ
  rationale: La expresión es amplia y plural. «En las cosas buenas» conserva esa apertura sin reducirla solo a limosna o beneficencia, aunque el contexto apunta a actos de generosidad.
- source_word: μὴ δῷς
  english_pob_choice: do not add
  chosen_spanish: no añadas
  alternatives_spanish:
  - no des
  - no pongas
  lexicon: LSJ
  rationale: Aunque el verbo griego puede traducirse literalmente como «dar», el audit trail inglés opta por «add» para reflejar mejor el sentido contextual de introducir algo extra a una acción buena. «No añadas» mantiene esa lectura sin perder naturalidad en español.
- source_word: μῶμον
  english_pob_choice: reproach
  chosen_spanish: reproche
  alternatives_spanish:
  - tacha
  - defecto
  - mancha
  lexicon: LSJ
  rationale: En este contexto ético, μῶμον no describe una mancha física sino una expresión de censura o faultfinding asociada al acto de dar. «Reproche» sigue bien la elección inglesa y conserva la fuerza interpersonal.
- source_word: ἐν πάσῃ δόσει
  english_pob_choice: in any gift
  chosen_spanish: en ningún don
  alternatives_spanish:
  - en cualquier dádiva
  - con cualquier regalo
  - en toda dádiva
  lexicon: LSJ
  rationale: δόσις puede ser tanto el acto de dar como el don recibido. «Don» es más solemne y fiel al campo semántico de una dádiva generosa que «regalo», y encaja con el paralelismo del verso.
- source_word: λύπην λόγων
  english_pob_choice: grief of words
  chosen_spanish: tristeza de palabras
  alternatives_spanish:
  - palabras de tristeza
  - palabras hirientes
  - dolor de palabras
  lexicon: LSJ
  rationale: La construcción griega es comprimida. Se conserva su rareza en español con un genitivo literal («tristeza de palabras») en vez de normalizarlo por completo a «palabras hirientes», para no borrar la tensión lexical que el POB inglés también deja visible.
theological_decisions:
- issue: Relación entre la acción de dar y el habla que la acompaña
  english_pob_reading: The warning is not against giving, but against spoiling a good gift with reproachful or hurtful speech.
  chosen_spanish_reading: La advertencia no es contra dar, sino contra arruinar una buena acción con reproche o palabras que causan tristeza.
  alternative_spanish_readings:
  - no mezcles reproche con tus dones
  - no añadas palabras hirientes a cada don
  rationale: 'El griego une el don y el daño verbal en una sola advertencia. La traducción debe conservar esa tensión: el problema no es el don, sino el lenguaje que lo acompaña y lo amarga.'
  doctrine_reference: Sabiduría práctica bíblica; ética del hablar (cf. Prov 15:1; Stg 3:9-10)
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que corrigió «give reproach» por «add reproach» para reflejar mejor μὴ δῷς en contexto. Por eso el español usa «añadas reproche» y no una formulación que sonara a «dar reproche». También se preservó la compresión de λύπην λόγων en una forma todavía literal, como hace el POB inglés al mantener visible la estructura griega.
  spanish_consistency_notes:
  - Se usa «Hijo mío» para el vocativo sapiencial, conforme al tono del inglés POB.
  - Se evita «Señor» o terminología teológica ajena al versículo; no hay nombres divinos en el texto.
  - «Don» se eligió para δόσις por su solemnidad y porque refleja mejor una dádiva que «regalo» en este registro.
  - Se mantiene una sintaxis relativamente literal para no borrar la relación estrecha entre el don y las palabras que lo acompañan.
