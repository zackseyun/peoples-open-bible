  spanish_consistency_notes:
  - Se mantiene «reinó» para מָלַךְ en las tres ocurrencias, preservando el paralelismo.
  - 'Se conserva la secuencia temporal completa: cuarenta años total, siete en Hebrón y treinta y tres en Jerusalén.'
  - No se introduce «todo Israel» ni otras ampliaciones no presentes en el hebreo.
  - 'Se usa la toponimia bíblica habitual en español: Hebrón y Jerusalén.'
