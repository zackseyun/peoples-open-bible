translation:
  language: es
  text: Y los llevaban, bajo amarga coacción, a la conmemoración mensual del cumpleaños del rey, para el banquete sacrificial[a]; y cuando llegaba una fiesta de Dionisio, eran obligados, con coronas de hiedra[b], a participar en la procesión en honor de Dionisio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «para la comida sacrificial»; más literalmente, «para la ingestión de las porciones del sacrificio». El griego alude a participar en el rito comiendo las porciones ofrecidas.'
    reason: lexical_alternative
  - marker: b
    text: La hiedra estaba asociada con el culto dionisíaco; la expresión probablemente indica coronas o guirnaldas de hiedra usadas en la procesión.
    reason: cultural_note
lexical_decisions:
- source_word: ἤγον
  english_pob_choice: they were being led
  chosen_spanish: los llevaban
  alternatives_spanish:
  - eran conducidos
  - eran llevados
  lexicon: LSJ
  rationale: El imperfecto describe una acción repetida o habitual de coerción. En español, «los llevaban» conserva el movimiento impuesto sin sobrecargar con una pasiva más pesada.
- source_word: μετὰ πικρᾶς ἀνάγκης
  english_pob_choice: under bitter compulsion
  chosen_spanish: con amarga coerción
  alternatives_spanish:
  - bajo amarga compulsión
  - con dura imposición
  lexicon: LSJ
  rationale: «ἀνάγκη» expresa presión forzada; «coerción» comunica mejor la fuerza de la imposición que una mera «necesidad». «Amarga» preserva el matiz afectivo de πικρᾶς.
- source_word: εἰς τὴν κατὰ μῆνα τοῦ βασιλέως γενέθλιον ἡμέραν
  english_pob_choice: to the king’s monthly birthday observance
  chosen_spanish: al día mensual de cumpleaños del rey
  alternatives_spanish:
  - a la celebración mensual del cumpleaños del rey
  - a la conmemoración mensual del natalicio del rey
  lexicon: LSJ
  rationale: Se conserva la recurrencia de κατὰ μῆνα con «mensual» y el sentido de γενέθλιον ἡμέραν como día de cumpleaños/natalicio. «Cumpleaños» es claro y natural en español.
- source_word: ἐπὶ σπλαγχνισμόν
  english_pob_choice: for the sacrificial meal
  chosen_spanish: para el banquete sacrificial
  alternatives_spanish:
  - para la comida sacrificial
  - para la ingestión de las porciones del sacrificio
  lexicon: LSJ
  rationale: La expresión alude a la participación en el rito mediante la comida de las porciones ofrecidas. «Banquete sacrificial» comunica el acto cultual sin volverlo críptico.
- source_word: Διονυσίων ἑορτῆς
  english_pob_choice: a festival of Dionysus
  chosen_spanish: la fiesta de Dionisio
  alternatives_spanish:
  - una fiesta de Dionisio
  - el festival de Dionisio
  lexicon: LSJ
  rationale: El genitivo plural con ἑορτή indica una celebración dionisíaca; «fiesta de Dionisio» es transparente y suficientemente fiel.
- source_word: κισσοὺς ἔχοντες
  english_pob_choice: wearing ivy wreaths
  chosen_spanish: llevando coronas de hiedra
  alternatives_spanish:
  - con hiedra sobre sí
  - con guirnaldas de hiedra
  lexicon: LSJ
  rationale: En contexto dionisíaco, la hiedra suele funcionar como adorno procesional. «Coronas de hiedra» expresa con naturalidad la imagen cultural sin forzar una precisión no explícita en el griego.
- source_word: πομπεύειν
  english_pob_choice: to join the procession
  chosen_spanish: a participar en la procesión
  alternatives_spanish:
  - a marchar en procesión
  - a unirse a la procesión
  lexicon: LSJ
  rationale: El verbo se refiere a tomar parte en una procesión ritual. «Participar en la procesión» preserva el matiz ceremonial y evita una expresión demasiado coloquial.
- source_word: τῷ Διονύσῳ
  english_pob_choice: in honor of Dionysus
  chosen_spanish: en honor de Dionisio
  alternatives_spanish:
  - para Dionisio
  - a Dionisio
  lexicon: LSJ
  rationale: El dativo en contexto cultual marca orientación/dedicación. «En honor de» expresa con claridad esa relación religiosa en español.
theological_decisions:
- issue: Cómo expresar la coerción cultual pagana sin suavizarla
  english_pob_reading: under bitter compulsion; forced to join the procession in honor of Dionysus
  chosen_spanish_reading: con amarga coerción; eran obligados ... a participar en la procesión en honor de Dionisio
  alternative_spanish_readings:
  - bajo amarga compulsión
  - eran forzados ... a marchar en la procesión
  rationale: El versículo presenta imposición religiosa y política. La redacción mantiene la violencia del acto y la orientación idolátrica sin introducir doctrinas ajenas al texto.
  doctrine_reference: 2 Maccabees 6:7; coerción idolátrica en contexto helenístico
- issue: Cómo traducir ἐπὶ σπλαγχνισμόν sin oscurecer el trasfondo sacrificial
  english_pob_reading: for the sacrificial meal
  chosen_spanish_reading: para el banquete sacrificial
  alternative_spanish_readings:
  - para la comida sacrificial
  - para la ingestión de las porciones del sacrificio
  rationale: La escena implica participación en un rito sacrificial pagano. «Banquete sacrificial» conserva el sentido cultual y deja visible que no se trata de un simple festejo civil.
  doctrine_reference: 2 Maccabees 6:7; participación en rito sacrificial pagano
translation_notes:
  revision_awareness: El texto sigue el acuerdo alto del control previo y mantiene las decisiones auditadas del inglés POB, especialmente la coerción amarga, la referencia al rito sacrificial y la imaginería dionisíaca con hiedra. No se detectaron revisiones aplicadas en la última pasada.
  spanish_consistency_notes:
  - Se mantiene «Dionisio» para el nombre del dios, en coherencia con el español bíblico moderno y con el griego Διονύσῳ.
  - Se usa «procesión» para πομπεύειν, conservando el carácter ritual.
  - Se evita «SEÑOR» o equivalentes de ocultación, porque no hay aquí el nombre divino hebreo sino una referencia cultual pagana.
  - «Esclavo/siervo» no es pertinente en este versículo; no se introduce terminología innecesaria.
