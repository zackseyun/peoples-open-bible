translation:
  language: es
  text: 'Y él dijo[c][b][a]: «Así dice Yahvé: Hagan de este cauce[a] muchas fosas[b]»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: נחל puede traducirse «wadi», «valle», «cauce», «arroyo» o «lecho de arroyo», según el contexto; aquí se refiere a un curso de agua estacional.'
    reason: lexical_alternative
  - marker: b
    text: 'El hebreo repite גֵּבִים, literalmente «fosas, fosas»: la duplicación intensifica la idea de muchas fosas distribuidas por el cauce.'
    reason: lexical_alternative
  - marker: c
    text: Yahvé traduce el nombre divino YHWH; se conserva el nombre propio en vez de un sustituto como «el SEÑOR».
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And he said
  chosen_spanish: Y él dijo
  alternatives_spanish:
  - Entonces dijo
  lexicon: HALOT
  rationale: La forma narrativa wayyiqtol introduce el discurso directo; en español, «Y él dijo» conserva la secuencia narrativa sin forzar un matiz temporal más fuerte que el hebreo.
- source_word: כֹּה אָמַר יְהוָה
  english_pob_choice: Thus says Yahweh
  chosen_spanish: Así dice Yahvé
  alternatives_spanish:
  - Así dice el SEÑOR
  - Esto dice Yahvé
  lexicon: HALOT
  rationale: Se mantiene la fórmula profética con registro solemne. «Así dice» reproduce el presente profético de la fórmula, y «Yahvé» sigue el criterio doctrinal del nombre divino.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: El Tetragrámaton se vierte como el nombre propio «Yahvé», no como sustituto titulado. Es la decisión doctrinal indicada por el proyecto y preserva el nombre personal de Dios.
- source_word: עָשֹׂה
  english_pob_choice: Make
  chosen_spanish: Haz
  alternatives_spanish:
  - Prepara
  - Excava
  lexicon: HALOT
  rationale: El imperativo de עשה es amplio; aquí gobierna la acción requerida respecto del torrente. «Haz» es la forma más directa y natural en español. «Excava» interpreta más específicamente la acción, por eso se deja como alternativa.
- source_word: הַנַּחַל
  english_pob_choice: wadi
  chosen_spanish: torrente
  alternatives_spanish:
  - wadi
  - arroyo
  - cauce
  lexicon: HALOT
  rationale: En este contexto se trata de un cauce estacional que puede quedar seco. «Torrente» comunica bien la idea de curso intermitente en español; «wadi» se evita en el texto principal por ser menos transparente para lectores generales, aunque se conserva como alternativa por exactitud geográfica.
- source_word: הַזֶּה
  english_pob_choice: this
  chosen_spanish: este
  lexicon: HALOT
  rationale: Demostrativo directo, sin carga especial adicional.
- source_word: גֵּבִים גֵּבִים
  english_pob_choice: full of pits
  chosen_spanish: muchos hoyos
  alternatives_spanish:
  - hoyos, hoyos
  - fosas
  - zanjas
  lexicon: HALOT
  rationale: La repetición hebrea intensifica la pluralidad. En español, «muchos hoyos» transmite de modo natural la acumulación sin añadir una interpretación más concreta que el sustantivo hebreo requiere. Se evita «llenar de» porque el hebreo dice más literalmente que el cauce sea convertido en hoyos.
theological_decisions:
- issue: Traducción del nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: Se preserva el nombre propio divino tal como exige la pauta doctrinal del proyecto. No se sustituye por un título, para mantener la transparencia respecto del texto hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'El texto español sigue de cerca el audit trail inglés sin copiarlo mecánicamente: conserva la fórmula profética, el nombre divino como Yahvé, la imagen del curso de agua estacional y la intensificación por repetición de גֵּבִים. Se evita una paráfrasis excesiva y se mantiene la tensión entre una traducción natural («torrente», «muchos hoyos») y la precisión léxica del hebreo.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה.
  - Se prefiere un término natural y transparente para הַנַּחַל, con nota que preserva la alternativa «wadi».
  - La repetición hebrea de גֵּבִים se refleja en la nota, aunque el cuerpo principal opta por una formulación idiomática en español.
  - El orden discursivo conserva la introducción narrativa y la cita directa con puntuación española.
