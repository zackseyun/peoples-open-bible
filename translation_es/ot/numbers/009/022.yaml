translation:
  language: es
  text: Ya fueran dos días[a], un mes o más tiempo, cuando la nube permanecía sobre el tabernáculo, reposando sobre él, los hijos de Israel acampaban y no partían; pero cuando era levantada, partían.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'muchos días' para יָמִים; el hebreo dice literalmente 'días', y aquí probablemente significa un período prolongado.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֽוֹ ... אוֹ ... אוֹ
  english_pob_choice: Whether it was ... or ... or ...
  chosen_spanish: Ya fuera ... o ... o ...
  alternatives_spanish:
  - Fuera ... o ... o ...
  - Ya sea ... o ... o ...
  lexicon: HALOT
  rationale: La serie disyuntiva marca alternativas de duración. En español, 'Ya fuera ... o ... o ...' conserva la estructura y suena natural sin perder el valor distributivo.
- source_word: יֹמַיִם
  english_pob_choice: two days
  chosen_spanish: dos días
  alternatives_spanish:
  - un par de días
  lexicon: HALOT
  rationale: El dual hebreo es explícito; 'dos días' preserva la precisión numérica del texto.
- source_word: חֹדֶשׁ
  english_pob_choice: a month
  chosen_spanish: un mes
  alternatives_spanish:
  - mes
  lexicon: HALOT
  rationale: El indefinido del hebreo se refleja con 'un mes', que es claro y fiel en español.
- source_word: יָמִים
  english_pob_choice: longer
  chosen_spanish: más tiempo
  alternatives_spanish:
  - muchos días
  - un período más largo
  lexicon: HALOT
  rationale: Aquí 'días' funciona idiomáticamente como un período prolongado. 'Más tiempo' comunica esa duración extendida sin forzar una repetición literal que sonaría extraña en español.
- source_word: בְּהַאֲרִיךְ
  english_pob_choice: when ... remained
  chosen_spanish: cuando la nube se detenía
  alternatives_spanish:
  - cuando la nube permanecía
  - cuando la nube prolongaba su estancia
  lexicon: HALOT
  rationale: El infinitivo hebreo expresa continuidad o permanencia. 'Se detenía' transmite la idea de permanecer por más tiempo en un español natural, en línea con la lectura auditada del POB.
- source_word: הֶעָנָן
  english_pob_choice: the cloud
  chosen_spanish: la nube
  alternatives_spanish:
  - la nube
  lexicon: HALOT
  rationale: Correspondencia directa y estándar para la nube guía del desierto.
- source_word: הַמִּשְׁכָּן
  english_pob_choice: the tabernacle
  chosen_spanish: el tabernáculo
  alternatives_spanish:
  - la morada
  - el santuario portátil
  lexicon: HALOT
  rationale: Se conserva el término tradicional y claro 'tabernáculo', que corresponde al santuario portátil del desierto.
- source_word: לִשְׁכֹּן עָלָיו
  english_pob_choice: dwelling over it
  chosen_spanish: posándose sobre él
  alternatives_spanish:
  - morando sobre él
  - habitándolo
  lexicon: HALOT
  rationale: La raíz שכן combina permanencia y asentamiento. 'Posándose sobre él' conserva la imagen de la nube sobre el tabernáculo, mientras 'cuando la nube se detenía' ya cubre la continuidad del estado.
- source_word: יַחֲנוּ
  english_pob_choice: would camp
  chosen_spanish: acampaban
  alternatives_spanish:
  - se acampaban
  - permanecían acampados
  lexicon: HALOT
  rationale: El imperfecto habitual se vierte como acción repetida en pasado. 'Acampaban' es natural y fiel al patrón narrativo.
- source_word: בְנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Israel
  lexicon: HALOT
  rationale: Se conserva la fórmula hebrea tradicional con 'los hijos de Israel', que sigue de cerca la estructura del original y evita suavizarla innecesariamente.
- source_word: וְלֹא יִסָּעוּ
  english_pob_choice: and would not set out
  chosen_spanish: y no partían
  alternatives_spanish:
  - y no se ponían en marcha
  - y no se iban
  lexicon: HALOT
  rationale: נסע en contexto de travesía del desierto se refiere a levantar el campamento y salir. 'Partían' conserva ese valor de desplazamiento en español.
- source_word: וּבְהֵעָלֹתוֹ
  english_pob_choice: but when it was lifted up
  chosen_spanish: pero cuando era alzada
  alternatives_spanish:
  - y cuando era levantada
  - pero cuando se levantaba
  lexicon: HALOT
  rationale: La forma pasiva refleja que la nube es tomada en alto. 'Era alzada' conserva esa pasividad y suena natural en español.
- source_word: יִסָּעוּ
  english_pob_choice: they would set out
  chosen_spanish: partían
  alternatives_spanish:
  - se ponían en marcha
  - salían
  lexicon: HALOT
  rationale: Se mantiene la misma raíz de movimiento que en la primera ocurrencia para conservar la coherencia verbal del versículo.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB en inglés, que simplificó 'a longer time' a 'longer'. En español se reflejó esa misma simplificación con 'más tiempo', evitando una paráfrasis más pesada y conservando el contraste enumerativo del hebreo.
  spanish_consistency_notes:
  - Se conservó 'tabernáculo' como término técnico estable.
  - Se mantuvo 'los hijos de Israel' para alinearse con la fórmula hebrea y con el audit trail inglés.
  - '''Partían'' se usa de manera consistente para נסע en ambos miembros del versículo.'
  - La cláusula de la nube se tradujo con dos verbos complementarios ('se detenía' / 'era alzada') para preservar continuidad y contraste.
  - El marcador [a] se ancló en 'dos días' para señalar la alternativa textual/lexical ligada a יָמִים.
