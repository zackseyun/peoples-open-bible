review_pass:
  verdict: revise
  source_alignment_summary: El borrador capta el sentido general de destrucción y profanación, pero se aparta en varios puntos de la forma y de la racionalidad documentada del POB. «Encendieron fuego en tu santuario» no es español natural para este hebreo idiomático; el sentido es «prendieron fuego a / incendiaron». Además, «el lugar donde habita tu nombre» explicita demasiado el modismo hebreo מִשְׁכַּן שְׁמֶךָ, que el expediente inglés decidió preservar más literalmente como «dwelling place of your name». Finalmente, «hasta la tierra» no es una expresión idiomática natural en español para לָאָרֶץ aquí; conviene «por tierra» o «hasta el suelo», siendo «por tierra» la opción más natural para expresar abatimiento total.
  spanish_quality_summary: 'La redacción actual suena algo forzada: «encendieron fuego en» y «hasta la tierra» son poco idiomáticos en español general. También conviene mantener dos términos cultuales distintos con mejor fluidez: «santuario» y «morada». Una formulación como «Prendieron fuego a tu santuario[a]; profanaron por tierra la morada de tu nombre[b][c].» es más natural, conserva el paralelismo y respeta mejor la tensión teológica del original.'
  glossary_alignment: 'No hay conflicto con términos del glosario principal como Yahvé/Mesías. Sí hay una desviación respecto al criterio teológico documentado para מִשְׁכַּן שְׁמֶךָ: debe preservarse la construcción «de tu nombre» en vez de resolverla como «donde habita tu nombre». También es preferible mantener la distinción léxica entre מִקְדָּשׁ («santuario») y מִשְׁכַּן («morada»).'
  issues:
  - severity: medium
    issue: «Encendieron fuego en tu santuario»
    rationale: 'Aunque intenta reflejar el modismo hebreo, en español suena poco natural. El sentido idiomático es causar un incendio: «prendieron fuego a tu santuario» o «incendiaron tu santuario».'
  - severity: high
    issue: «el lugar donde habita tu nombre»
    rationale: Esta formulación interpreta y explica el modismo en vez de preservarlo. El expediente inglés subraya la importancia teológica de mantener «dwelling place of your name». En español, «la morada de tu nombre» conserva mejor esa tensión.
  - severity: medium
    issue: «hasta la tierra»
    rationale: No es una expresión idiomática clara en español para לָאָרֶץ en este contexto. «Por tierra» comunica mejor la idea de abatimiento/profanación total sin sonar calcado.
  - severity: low
    issue: Nota c no refleja bien la alternativa documentada
    rationale: 'La nota actual repite una frase poco natural. Debe señalar más bien la alternativa de orden/lectura: «O: “profanaron hasta el suelo la morada de tu nombre”».'
  revised_spanish_text: Prendieron fuego a tu santuario[a]; profanaron por tierra la morada de tu nombre[b][c].
  revised_footnotes:
  - marker: a
    text: 'O, más literalmente: «enviaron fuego a tu santuario». El modismo hebreo significa que lo incendiaron.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «la morada de tu nombre», un modismo para el lugar que Dios escogió para que allí se conociera su presencia.'
    reason: cultural_note
  - marker: c
    text: 'O: «profanaron hasta el suelo la morada de tu nombre».'
    reason: previous_rendering
  revision_rationale: Se revisa para ajustar mejor el español al sentido idiomático del hebreo, preservar la decisión teológica documentada sobre «la morada de tu nombre», y reemplazar expresiones poco naturales por formulaciones españolas claras y fieles.
