revisions:
- from: Porque cuando un oído oía[a], me llamaba bienaventurado, y cuando un ojo veía, daba testimonio de mí.
  to: Porque cuando un oído oyó, me llamaba bienaventurado, y cuando un ojo vio, testificó por mí[a].
  rationale: Se corrige el tiempo verbal para reflejar mejor el hebreo y mejorar la naturalidad del español; se ajusta la última cláusula para expresar el sentido favorable de la evidencia; y se reubica la nota al verbo correcto, preservando la alternativa léxica documentada por la auditoría inglesa.
