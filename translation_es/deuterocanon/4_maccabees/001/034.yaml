translation:
  language: es
  text: Por tanto[a], aunque deseamos criaturas acuáticas, aves y animales de cuatro patas—toda clase de alimentos prohibidos para nosotros por la ley—nos abstenemos debido al dominio de la razón[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «criaturas del agua» para «criaturas acuáticas».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «por la supremacía/dominio de la razón». La frase refleja la afirmación central del libro de que la razón disciplinada, formada por la ley, gobierna los deseos corporales.
    reason: lexical_alternative
lexical_decisions:
- source_word: τοιγαροῦν
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Así que
  - Por consiguiente
  lexicon: LSJ
  rationale: La partícula inferencial introduce una conclusión lógica; «Por tanto» conserva ese valor conclusivo con un registro natural y digno en español.
- source_word: ἐνύδρων
  english_pob_choice: creatures from the water
  chosen_spanish: criaturas del agua
  alternatives_spanish:
  - animales acuáticos
  - seres del agua
  lexicon: LSJ
  rationale: El griego designa animales que viven en el agua. «Criaturas del agua» mantiene amplitud semántica sin precisar más de lo que el texto dice.
- source_word: ἐπιθυμοῦντες
  english_pob_choice: though we desire
  chosen_spanish: aunque deseamos
  alternatives_spanish:
  - deseando
  - aunque anhelamos
  - aunque codiciamos
  lexicon: BDAG
  rationale: 'El participio tiene fuerza concesiva: a pesar del deseo real, se produce la abstención. «Aunque deseamos» expresa bien ese matiz en español.'
- source_word: ὀρνέων
  english_pob_choice: birds
  chosen_spanish: aves
  alternatives_spanish:
  - pájaros
  - aves del cielo
  lexicon: LSJ
  rationale: Término común para aves; «aves» es el equivalente más neutral y sobrio en español.
- source_word: τετραπόδων
  english_pob_choice: four-footed animals
  chosen_spanish: animales de cuatro patas
  alternatives_spanish:
  - cuadrúpedos
  - animales de cuatro pies
  lexicon: LSJ
  rationale: La expresión griega es literal. «Animales de cuatro patas» conserva la imagen y resulta claro para el lector actual.
- source_word: παντοίων βρωμάτων
  english_pob_choice: all kinds of food
  chosen_spanish: toda clase de alimentos
  alternatives_spanish:
  - todo tipo de alimentos
  - alimentos de toda clase
  lexicon: LSJ
  rationale: La frase es abarcadora; «toda clase de alimentos» reproduce la amplitud del griego con naturalidad en español.
- source_word: τῶν ἀπηγορευμένων ἡμῖν κατὰ τὸν νόμον
  english_pob_choice: forbidden to us by the law
  chosen_spanish: prohibidos para nosotros por la ley
  alternatives_spanish:
  - prohibidos para nosotros conforme a la ley
  - vedados para nosotros por la ley
  lexicon: LSJ
  rationale: El participio expresa alimentos vedados según la ley. «Prohibidos para nosotros por la ley» es directo y fiel; conserva la referencia normativa sin sobreexplicar.
- source_word: ἀπέχομεθα
  english_pob_choice: we abstain
  chosen_spanish: nos abstenemos
  alternatives_spanish:
  - nos apartamos
  - nos contenemos
  lexicon: BDAG
  rationale: El verbo significa abstenerse de algo. «Nos abstenemos» es el equivalente natural y preciso en español.
- source_word: διὰ τὴν τοῦ λογισμοῦ ἐπικράτειαν
  english_pob_choice: because of the mastery of reason
  chosen_spanish: debido al dominio de la razón
  alternatives_spanish:
  - por la supremacía de la razón
  - a causa del gobierno de la razón
  - por el dominio de la razón
  lexicon: LSJ
  rationale: La frase expresa que la razón ejerce control superior sobre los deseos. «Dominio de la razón» preserva el punto central del texto y evita tecnicismos innecesarios.
theological_decisions:
- issue: Sentido de λογισμός / ἐπικράτεια en el argumento ético-filosófico de 4 Macabeos
  english_pob_reading: reason; the phrase reflects the book's central claim that disciplined reason, shaped by the law, rules bodily desires.
  chosen_spanish_reading: la razón; la expresión refleja la afirmación central del libro de que la razón disciplinada, formada por la ley, gobierna los deseos corporales.
  alternative_spanish_readings:
  - el juicio racional
  - la mente
  - la facultad de razonar
  rationale: En 4 Macabeos, λογισμός es un término clave para la razón disciplinada que domina las pasiones bajo la ley. «Razón» es la opción más clara y consistente para el texto principal, mientras que la nota conserva el trasfondo conceptual.
  doctrine_reference: Translation philosophy §5 (consistencia de términos clave, o excepción documentada)
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés coinciden de manera alta. La única revisión notable en inglés fue la naturalización de "every kind of food" a "all kinds of food"; en español se optó por la equivalente natural «toda clase de alimentos», manteniendo la amplitud semántica. No se introdujeron expansiones doctrinales ni cambios de sentido respecto del griego.
  spanish_consistency_notes:
  - Se mantuvo «razón» para λογισμός, coherente con el valor técnico-filosófico del libro.
  - «Nos abstenemos» conserva el valor ético de ἀπέχομεθα sin caer en un calco rígido.
  - «Ley» traduce τὸν νόμον de forma directa y en registro bíblico claro.
  - 'La enumeración de alimentos conserva la secuencia del griego: agua, aves, animales de cuatro patas, y luego la categoría general de alimentos prohibidos.'
