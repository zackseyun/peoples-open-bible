base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/029/007.yaml
  text: When they took hold of you by your hand[a], you were crushed, and you tore open every shoulder for them; and when they leaned on you, you were broken[b], and you made all their loins stand unsteadily.
  footnotes:
  - marker: a
    text: Or 'when they relied on you.' The Hebrew keeps the physical image 'leaned on you,' continuing the reed metaphor.
    reason: lexical_alternative
  - marker: b
    text: Or 'all their loins.'
    reason: lexical_alternative
