translation:
  language: es
  text: Andarán tras Yahvé; él rugirá como un león. Porque rugirá, y los hijos[a] vendrán temblando desde el mar[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'niños' o 'hijos' en sentido colectivo; el hebreo es literalmente masculino plural.
    reason: lexical_alternative
  - marker: b
    text: Lit. 'del mar'. Aquí 'el mar' probablemente se refiere al occidente como dirección geográfica.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַחֲרֵי
  english_pob_choice: after
  chosen_spanish: tras
  alternatives_spanish:
  - después de
  - siguiendo a
  lexicon: HALOT
  rationale: אַחֲרֵי expresa seguimiento en sentido espacial e idiomático. En español, 'tras' conserva la imagen concreta de ir detrás de alguien sin volverlo una paráfrasis más interpretativa.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino propio en la tradición POB. 'Yahvé' preserva el Tetragrámaton como nombre personal, en lugar de sustituirlo por un título.
- source_word: יֵלְכוּ
  english_pob_choice: will walk
  chosen_spanish: Andarán
  alternatives_spanish:
  - Irán
  - Seguirán
  lexicon: HALOT
  rationale: הלך significa comúnmente 'andar/ir'. 'Andarán' conserva la imagen concreta del hebreo y funciona naturalmente con 'tras Yahvé'.
- source_word: כְּאַרְיֵה
  english_pob_choice: like a lion
  chosen_spanish: como un león
  alternatives_spanish:
  - igual que un león
  lexicon: HALOT
  rationale: La comparación es directa. 'Como un león' es la equivalencia normal y clara en español.
- source_word: יִשְׁאָג / יִשְׁאַג
  english_pob_choice: will roar
  chosen_spanish: rugirá
  alternatives_spanish:
  - clamará
  - bramará
  lexicon: HALOT
  rationale: שאג se usa para el rugido del león. 'Rugirá' conserva el campo semántico animal y la fuerza retórica del verbo repetido.
- source_word: וְיֶחֶרְדוּ
  english_pob_choice: will come trembling
  chosen_spanish: vendrán temblando
  alternatives_spanish:
  - temblarán
  - vendrán con temblor
  - acudirán temblando
  lexicon: HALOT
  rationale: חרד expresa temblor, sobresalto o estremecimiento. En este contexto la imagen sugiere respuesta y movimiento; 'vendrán temblando' recoge ambos rasgos sin añadir explícitamente un objeto no expresado.
- source_word: בָנִים
  english_pob_choice: sons
  chosen_spanish: los hijos
  alternatives_spanish:
  - los hijos varones
  - los hijos e hijas
  lexicon: HALOT
  rationale: El hebreo es masculino plural, pero en español 'los hijos' puede funcionar de manera colectiva y mantiene la referencia sin sonar forzado. Se evita neutralizar completamente a 'hijos' por una forma más abstracta como 'personas'.
- source_word: מִיָּם
  english_pob_choice: from the sea
  chosen_spanish: desde el mar
  alternatives_spanish:
  - del mar
  - desde el oeste
  lexicon: HALOT
  rationale: Se preserva la imagen literal de 'mar' como en la revisión final inglesa. En español, 'desde el mar' permite conservar la ambigüedad geográfica sin resolverla a 'oeste'.
theological_decisions:
- issue: Movimiento de retorno implícito en respuesta al rugido divino
  english_pob_reading: The people respond to Yahweh's lion-like roar by returning in trembling; the translation should preserve the return motif without adding an explicit object not present in Hebrew.
  chosen_spanish_reading: 'La frase conserva una respuesta de aproximación implícita: ''Andarán tras Yahvé'' y ''vendrán temblando'', sin añadir ''a él'' ni explicitar más allá del hebreo.'
  alternative_spanish_readings:
  - Temblarán únicamente, sin matiz de venida.
  - Volverán a él temblando.
  rationale: El contexto de Oseas 11:8–11 favorece leer una respuesta de retorno, pero el español no debe introducir un complemento no expresado. La solución mantiene la tensión entre temor y acercamiento sin resolverla excesivamente.
  doctrine_reference: Preservar la tensión textual y contextual sin sobreinterpretar.
translation_notes:
  revision_awareness: La versión española sigue la revisión inglesa más reciente al conservar el sentido más literal de 'from the sea' y no añadir énfasis innecesario al pronombre implícito. También mantiene la decisión de no convertir la imagen en una paráfrasis explicativa.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma consistente para el Tetragrámaton.
  - Se preserva el masculino plural de 'בָנִים' con 'los hijos', sin ampliar innecesariamente a una formulación inclusiva.
  - '''Desde el mar'' conserva la ambigüedad geográfica del hebreo y de la revisión final inglesa.'
  - '''Vendrán temblando'' mantiene tanto el temblor como el movimiento sugerido por el contexto.'
