    reason: lexical_alternative
  - marker: b
    text: O «terror» para «estremecimiento» y «pavor» para «miedo»; el hebreo empareja términos muy cercanos para intensificar la sensación de angustia.
    reason: lexical_alternative
  revision_rationale: Se corrige «voz» a «sonido» para ajustarse a la evidencia fuente y al razonamiento léxico auditado, manteniendo «voz» como alternativa en nota. También se repara la lógica de las notas para que reflejen correctamente las alternativas preservadas en inglés y no repitan el texto principal.
