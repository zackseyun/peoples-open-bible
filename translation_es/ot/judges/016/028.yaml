revisions:
- from: 'Entonces Sansón clamó a Yahvé y dijo: “Señor Yahvé, por favor acuérdate de mí, y por favor fortaléceme solo esta vez, oh Dios, para que me vengue de los filisteos por mis dos ojos, con una sola venganza”[a].'
  to: 'Entonces Sansón llamó a Yahvé y dijo: «Señor Yahvé, por favor acuérdate de mí, y por favor fortaléceme solo esta vez, oh Dios, para que me vengue de los filisteos por mis dos ojos[a] con un solo acto de venganza».'
  rationale: Se reemplaza «clamó» por «llamó» para alinearse mejor con la decisión fuente de קרא y evitar una intensificación innecesaria. Se cambia «con una sola venganza» por «con un solo acto de venganza» para conservar el valor del cognado hebreo de manera natural en español. Se reubica la nota al sintagma «mis dos ojos», que es exactamente lo que explica.
