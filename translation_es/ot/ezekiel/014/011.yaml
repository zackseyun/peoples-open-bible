  to: para que la casa de Israel ya no se extravíe de mí[a], ni se contamine más con todas sus rebeliones, sino que sea mi pueblo, y yo sea su Dios, declara el Señor Yahvé.
  rationale: Se corrige la concordancia con el sujeto singular 'la casa de Israel', se adopta una formulación más natural y estable de la fórmula del pacto en español ('mi pueblo... su Dios') sin perder el matiz de propósito, y se ajusta la nota al pie para concordancia y claridad. No se requiere adjudicación adicional porque los cambios son menores y no doctrinalmente disputados.
