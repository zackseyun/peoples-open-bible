translation:
  language: es
  text: El habla de quien jura mucho[a] hace que se ericen los cabellos, y su pleito hace taparse los oídos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego πολυκόρυφου es léxicamente difícil. Puede referirse a una persona dada a juramentos o maldiciones excesivos, o más ampliamente a un habla ruidosa, ofensiva o jactanciosa. La traducción principal adopta «quien jura mucho» como la mejor lectura contextual, pero el matiz exacto permanece incierto.
    reason: lexical_alternative
lexical_decisions:
- source_word: λαλιὰ
  english_pob_choice: talk
  chosen_spanish: habla
  alternatives_spanish:
  - hablar
  - discurso
  - charla
  lexicon: LSJ
  rationale: λαλιὰ es un término amplio para el acto o contenido del habla. «Habla» suena natural en español y conserva el tono proverbial sin forzar un registro demasiado coloquial.
- source_word: πολυκόρυφου
  english_pob_choice: one who swears much
  chosen_spanish: quien jura mucho
  alternatives_spanish:
  - el que blasfema mucho
  - el hablador jactancioso
  - el que maldice mucho
  lexicon: LSJ
  rationale: La forma griega es difícil y puede aludir a juramentos excesivos, maldición o habla ruidosa/escandalosa. Siguiendo la lectura contextual de la POB en inglés, «quien jura mucho» conserva la fuerza de la expresión sin cerrar indebidamente la ambigüedad.
- source_word: ὀρθώσει τρίχας
  english_pob_choice: makes the hair stand up
  chosen_spanish: hace que se ericen los cabellos
  alternatives_spanish:
  - pone los pelos de punta
  - hace que el cabello se ponga de punta
  - eriza el pelo
  lexicon: LSJ
  rationale: La frase es idiomática y expresa horror o sobresalto. «Hace que se ericen los cabellos» mantiene la imagen corporal y es comprensible en español actual.
- source_word: μάχη
  english_pob_choice: quarrel
  chosen_spanish: pleito
  alternatives_spanish:
  - riña
  - pelea
  - contienda
  lexicon: LSJ
  rationale: En este contexto sapiencial se trata de conflicto verbal o social más que de batalla literal. «Pleito» es natural en español y puede abarcar disputa o altercado.
- source_word: ἐμφραγμὸς ὤτιων
  english_pob_choice: stops the ears
  chosen_spanish: tapa los oídos
  alternatives_spanish:
  - obstruye los oídos
  - hace que uno se tape los oídos
  - es un tapón para los oídos
  lexicon: LSJ
  rationale: 'La imagen es metafórica: el conflicto resulta tan ofensivo que hace querer cerrar el oído. «Tapa los oídos» sigue la revisión inglesa más natural y conserva la fuerza proverbial.'
translation_notes:
  revision_awareness: La POB inglesa revisó la segunda cláusula de «is a stopping of the ears» a «stops the ears» para evitar una literalidad torpe. La redacción española sigue esa decisión con «tapa los oídos», manteniendo el valor figurado y la fluidez.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» o equivalentes porque no hay Tetragrámaton ni κύριος en este versículo.
  - «Habla» y «pleito» conservan el tono sapiencial breve del original sin expandir el sentido.
  - La nota [a] está anclada en el texto para respetar la ambigüedad léxica documentada.
