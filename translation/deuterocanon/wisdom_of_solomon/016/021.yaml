theological_decisions:
- issue: Referent of 'your substance'
  chosen_reading: The phrase refers to the manna's God-given material constitution rather than to God's own metaphysical essence.
  alternative_readings:
  - '''your nature'' referring more directly to God''s benevolent character'
  rationale: The immediate context describes the miraculous food's adaptability and taste. Rendering ὑπόστασις as 'substance' keeps the focus on the provision itself while still allowing the verse to imply divine kindness through that provision.
  doctrine_reference: Translation philosophy §§1, 3, 6
