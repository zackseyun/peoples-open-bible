base_translation:
  language: en
  yaml_path: translation/ot/2_kings/019/025.yaml
  text: Have you not heard? Long ago I made it[a]; from days of old I formed it. Now I have brought it to pass[c][b], that you should turn fortified cities into ruinous heaps.
  footnotes:
  - marker: a
    text: 'Or ''from afar''; the Hebrew expression can be read spatially, but here likely has a temporal sense: ''long ago.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'I fashioned it.'
    reason: lexical_alternative
  - marker: c
    text: Literally 'heaps, ruins'; the Hebrew phrase is difficult and may also be rendered 'standing heaps.'
    reason: lexical_alternative
