  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido del hebreo: los que vigilaban ven a un hombre salir de la ciudad, le piden que les muestre el acceso, y prometen un trato favorable. Sin embargo, las notas al pie no siguen fielmente la auditoría inglesa: el marcador [a] en el inglés corresponde a מְבוֹא/‘entrada’ (‘o: el camino para entrar en la ciudad’), mientras que en el borrador español [a] se aplicó a ‘de la ciudad’ con una alternativa para יוֹצֵא. Además, falta en español la nota léxica sobre חָסֶד que el POB inglés preserva.'
  spanish_quality_summary: El español principal es natural, claro y digno. ‘Los vigilantes’, ‘un hombre que salía’, ‘por favor’, y ‘te trataremos con bondad’ son legibles y fieles. Conviene reubicar las notas para que anclen donde corresponde y añadir una nota para חָסֶד. También es ligeramente más natural en español decir ‘la entrada de la ciudad’ o ‘cómo entrar en la ciudad’ que ‘la manera de entrar a la ciudad’.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. ‘חָסֶד’ como ‘bondad’/trato favorable concuerda con la decisión teológica inglesa de no sobrerrecargar el término con lenguaje pactal en este contexto narrativo.
  issues:
  - severity: medium
    issue: El marcador [a] está anclado a ‘de la ciudad’ y su nota trata יוֹצֵא, pero en la auditoría inglesa la nota alternativa corresponde a מְבוֹא/‘entrada’.
    rationale: La nota debe preservar las alternativas significativas del original y del POB inglés en el lugar semánticamente correcto.
  - severity: medium
    issue: Falta una nota para חָסֶד.
    rationale: El POB inglés conserva una nota léxica explicando el rango semántico de חֶסֶד; el español debe preservarla también, especialmente porque ‘bondad’ es una elección contextual entre varias posibles.
  - severity: low
    issue: La redacción de la nota alternativa ‘la manera de entrar a la ciudad’ suena menos natural que otras opciones.
    rationale: ‘Cómo entrar en la ciudad’ o ‘el camino para entrar en la ciudad’ suena más idiomático y mantiene mejor la alternativa léxica documentada.
  revised_spanish_text: 'Los vigilantes vieron a un hombre que salía de la ciudad, y le dijeron: «Por favor, muéstranos la entrada[a] de la ciudad, y te trataremos con bondad[b]».'
