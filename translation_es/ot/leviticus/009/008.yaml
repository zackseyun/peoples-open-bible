- from: Entonces Aarón se acercó al altar y degolló el becerro de la ofrenda por el pecado[a], que era para él mismo.
  to: Entonces Aarón se acercó al altar y degolló el becerro de la ofrenda por el pecado[a], que era para sí.
  rationale: Se conserva casi todo el borrador porque es fiel al hebreo y al rastro POB. Solo se ajusta «que era para él mismo» a «que era para sí» para lograr un español más natural y preciso al expresar que la ofrenda era la propia de Aarón.
