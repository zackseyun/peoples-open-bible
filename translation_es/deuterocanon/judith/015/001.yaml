translation:
  language: es
  text: Y cuando los que estaban en las tiendas[a] oyeron, quedaron asombrados ante lo sucedido,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «tiendas» traduce literalmente σκηνώμασιν en el marco militar del relato; no se opta por «campamentos» para no suavizar la imagen concreta de las tiendas de campaña.
    reason: lexical_alternative
lexical_decisions:
- source_word: Καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  - Ahora
  lexicon: LSJ
  rationale: Conserva la simple coordinación narrativa sin añadir un matiz temporal que no está explícito en el griego.
- source_word: ὡς
  english_pob_choice: when
  chosen_spanish: cuando
  alternatives_spanish:
  - en cuanto
  - así que
  lexicon: LSJ
  rationale: Con ἤκουσαν, la relación es temporal; «cuando» es natural en español y no fuerza una inmediatez mayor que la del griego.
- source_word: ἤκουσαν
  english_pob_choice: heard
  chosen_spanish: oyeron
  alternatives_spanish:
  - supieron
  - se enteraron
  lexicon: LSJ
  rationale: El verbo básico es de percepción auditiva. «Oyeron» preserva esa base y deja implícito que se trataba de una noticia escuchada.
- source_word: οἱ ἐν τοῖς σκηνώμασιν ὄντες
  english_pob_choice: those who were in the tents
  chosen_spanish: los que estaban en las tiendas
  alternatives_spanish:
  - los que estaban en los campamentos
  - los que estaban en los pabellones
  lexicon: LSJ
  rationale: La construcción participial se rinde de forma transparente con «los que estaban en…». «Tiendas» es el equivalente más natural para σκηνώμασιν en este contexto militar.
- source_word: σκηνώμασιν
  english_pob_choice: tents
  chosen_spanish: tiendas
  alternatives_spanish:
  - campamentos
  - dwellings
  lexicon: LSJ
  rationale: En español bíblico contemporáneo, «tiendas» mantiene el sentido literal de carpas/toldos de campamento y evita el falso amigo «tabernáculos».
- source_word: ἐξέστησαν
  english_pob_choice: were astonished
  chosen_spanish: quedaron asombrados
  alternatives_spanish:
  - se quedaron atónitos
  - quedaron desconcertados
  lexicon: LSJ
  rationale: El verbo puede abarcar asombro intenso e impacto mental. «Quedaron asombrados» conserva ese efecto sin sonar forzado.
- source_word: ἐπὶ τὸ γεγονός
  english_pob_choice: at what had happened
  chosen_spanish: por lo sucedido
  alternatives_spanish:
  - ante lo ocurrido
  - a causa de lo sucedido
  lexicon: LSJ
  rationale: La frase apunta al hecho consumado/acontecido. «Por lo sucedido» expresa la reacción provocada por ese acontecimiento y mantiene la referencia al evento realizado.
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés coinciden estrechamente; no se detectan variantes textuales ni revisiones aplicadas en el expediente. La traducción española sigue esa lectura estable y conserva el orden narrativo básico.
  spanish_consistency_notes:
  - Se mantiene un estilo bíblico moderno y sobrio.
  - Se evita «tabernáculos» por su carga eclesiástica/arcaica ajena al contexto.
  - «Quedaron asombrados» conserva el impacto emocional sin introducir una interpretación adicional.
