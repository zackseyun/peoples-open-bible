    text: 'Hebreo: «YHWH»; alternativamente puede transliterarse «Yahweh» o «Jehová».'
    reason: alternative_reading
  revision_rationale: Se conserva intacto el texto principal porque es fiel y natural. Solo se corrige la nota para que las alternativas realmente sean distintas de la forma principal «Yahvé» y para reflejar mejor el rastro de auditoría en inglés.
