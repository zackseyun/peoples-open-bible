translation:
  language: es
  text: Entonces, los siervos del rey Ezequías fueron a Isaías.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיָּבֹאוּ
  english_pob_choice: So ... came
  chosen_spanish: Así ... fueron
  alternatives_spanish:
  - Entonces ... vinieron
  - Y ... llegaron
  lexicon: HALOT
  rationale: El wayyiqtol introduce avance narrativo. En español, «Así» conserva la conexión discursiva natural que el POB expresó con «So», y «fueron» comunica el desplazamiento hacia el profeta de manera simple y fluida. «Vinieron» sería posible, pero «fueron» evita ambigüedad de punto de vista en español.
- source_word: עַבְדֵי
  english_pob_choice: servants
  chosen_spanish: siervos
  alternatives_spanish:
  - servidores
  - oficiales
  - esclavos
  lexicon: HALOT
  rationale: En este contexto de corte real, עֲבָדִים puede referirse a servidores/cortesanos del rey. «Siervos» mantiene la relación de dependencia sin imponer la idea de esclavitud, que el POB no destacó aquí. «Oficiales» especifica más de lo que el hebreo exige.
- source_word: הַמֶּלֶךְ
  english_pob_choice: King
  chosen_spanish: el rey
  alternatives_spanish:
  - rey
  lexicon: HALOT
  rationale: 'Se conserva el sustantivo definido en español de forma natural. Como en inglés, el sintagma funciona con el nombre propio siguiente: «el rey Ezequías».'
- source_word: חִזְקִיָּהוּ
  english_pob_choice: Hezekiah
  chosen_spanish: Ezequías
  alternatives_spanish:
  - Ezequías
  lexicon: transliteración bíblica estándar
  rationale: Se usa la forma española tradicional y ampliamente reconocible del nombre propio del rey.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  - hasta
  lexicon: HALOT
  rationale: La preposición direccional hebrea se expresa de modo natural en español con «a» delante de persona.
- source_word: יְשַׁעְיָהוּ
  english_pob_choice: Isaiah
  chosen_spanish: Isaías
  alternatives_spanish:
  - Isaías
  lexicon: transliteración bíblica estándar
  rationale: Se usa la forma española estándar del nombre del profeta.
translation_notes:
  revision_awareness: El texto inglés auditado no introduce notas ni variantes; la versión española sigue de cerca la sintaxis y el valor narrativo del hebreo sin añadir elementos interpretativos. No se detectan tensiones léxicas o teológicas que requieran preservar alternativas en nota.
  spanish_consistency_notes:
  - 'Se mantiene la forma española estándar de los nombres propios bíblicos: Ezequías e Isaías.'
  - Se evita «SEÑOR» porque el versículo no contiene el nombre divino.
  - El verbo «fueron» refleja el movimiento narrativo de entrada sin forzar una equivalencia mecánica con el inglés.
