review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: pregunta de lamento, imagen de la mano/derecha retenida, salida desde el seno, e imperativo final con objeto implícito suplido por contexto. Sin embargo, «Sáquela» introduce un imperativo de tercera persona singular incongruente con el tratamiento directo a Dios; debe ser «Sácala».'
  spanish_quality_summary: 'El español es mayormente claro y digno. «Retraes» es posible, pero suena algo menos natural que «retienes» o «retiras» en este contexto; aun así no exige cambio. El problema principal es gramatical: «Sáquela» no corresponde a la segunda persona y afecta la legibilidad. El resto del verso fluye bien en registro bíblico moderno.'
  glossary_alignment: No hay conflictos con la terminología del proyecto. No aparece el nombre divino ni otros términos glosados sensibles. «Tu mano derecha» es aceptable como opción moderna frente a «tu diestra». «Tu seno» preserva bien חֹוקֶךָ. «Consúmelos» sigue correctamente la decisión documentada sobre el objeto implícito.
  issues:
  - severity: high
    issue: Forma verbal «Sáquela»
    rationale: El texto se dirige a Dios en segunda persona singular («retraes», «tu mano»). «Sáquela» es imperativo/subjuntivo de tercera persona con objeto de cortesía o referencia externa, y no traduce adecuadamente el imperativo hebreo כַלֵּה en la secuencia exhortativa. Debe ser «Sácala».
  - severity: low
    issue: Nota al pie a algo extensa y algo divergente del audit trail inglés
    rationale: La nota española añade una reformulación del hebreo completo de la primera mitad del verso, cuando la nota inglesa se centra en la frase final y el objeto implícito. No es errónea, pero conviene mantener una nota más ceñida a la decisión léxica de «retraes».
