review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca la fórmula censal hebrea y conserva bien las unidades de parentesco: «hijos», «generaciones», «clanes», «casas de sus padres», y «según el número de nombres». También mantiene mediante nota el carácter idiomático de כֹּל יֹצֵא צָבָא. Sin embargo, «todo el que sale para la guerra» no refleja bien la decisión auditada en inglés («every man able to go out to war»): en español suena más como acción actual que como elegibilidad militar, y además atenúa el colectivo masculino presente en el contexto del censo.'
  spanish_quality_summary: 'El español es en general claro y digno, pero hay dos puntos mejorables: «de veinte años arriba» suena algo coloquial frente a la fórmula más natural y bíblica «de veinte años para arriba» o «de veinte años en adelante»; y «todo el que sale para la guerra» es poco natural en español bíblico contemporáneo. Una leve revisión puede hacer el texto más idiomático sin perder cercanía al hebreo.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. Las decisiones de parentesco y organización tribal están bien alineadas. La única corrección relevante es ajustar כֹּל יֹצֵא צָבָא para preservar mejor el sentido contextual de aptitud militar ya documentado por la auditoría inglesa.
  issues:
  - severity: medium
    issue: «todo el que sale para la guerra» suena aspectualmente activo, no de elegibilidad militar
    rationale: El hebreo es un modismo censal; la auditoría inglesa lo hace explícito con «every man able to go out to war». En español, «sale para la guerra» puede leerse como quien efectivamente marcha, no como quien califica para el servicio militar.
  - severity: low
    issue: «de veinte años arriba» es menos natural que la fórmula corriente
    rationale: Aunque comprensible, en español general y eclesial suena más fluido «de veinte años para arriba», que conserva el mismo límite inferior.
  revised_spanish_text: Para los hijos de Benjamín, por sus generaciones, por sus clanes, por las casas de sus padres, según el número de nombres, de veinte años para arriba, todo varón apto para salir a la guerra[a].
  revised_footnotes:
  - marker: a
    text: 'Hebreo literalmente: «todo el que sale a la guerra», un modismo para los aptos para el servicio militar.'
    reason: lexical_alternative
  revision_rationale: Se ajusta la última frase para expresar en español natural el sentido idiomático y censal de כֹּל יֹצֵא צָבָא, preservando a la vez el matiz masculino del contexto («todo varón»). También se suaviza la fórmula de edad a «de veinte años para arriba», que suena más idiomática sin alejarse del hebreo.
