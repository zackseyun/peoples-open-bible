  glossary_alignment: 'No hay conflicto con la terminología base del proyecto. ''Las naciones'' sigue bien τὰ ἔθνη, con nota alternativa para ''gentiles''. ''Combatir'' es una opción adecuada para πολεμῆσαι. La decisión clave es idiomática: mantener ''hacerse un nombre'' en vez de explicitar de nuevo ''para nosotros mismos''.'
