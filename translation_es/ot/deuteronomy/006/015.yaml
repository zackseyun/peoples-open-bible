    rationale: Empieza con una comilla simple innecesaria y suena torpe. Debe redactarse en español fluido y limpio.
  - severity: low
    issue: «De sobre la faz de la tierra» es fiel pero menos natural de lo necesario
    rationale: El hebreo מֵעַל פְּנֵי הָאֲדָמָה puede conservarse idiomáticamente en español como «de la faz de la tierra», que suena más natural y mantiene la fuerza de remoción total. La nota puede preservar el matiz más literal «de sobre».
