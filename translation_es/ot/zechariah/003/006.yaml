translation:
  language: es
  text: 'Entonces el ángel de Yahvé[a] amonestó solemnemente a Josué, diciendo:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el mensajero de Yahvé». El hebreo מַלְאַךְ puede significar tanto «ángel» como «mensajero»; en este contexto visionario, «ángel» es la opción más natural.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּעַד
  english_pob_choice: solemnly charged
  chosen_spanish: advirtió solemnemente
  alternatives_spanish:
  - amonestó solemnemente
  - hizo una seria advertencia
  - declaró solemnemente
  lexicon: HALOT
  rationale: El verbo transmite una carga formal y grave; en español, «advirtió solemnemente» conserva el matiz de una advertencia o amonestación seria sin perder la solemnidad del acto. «Amonestó» también es posible, pero suena un poco más eclesiástico y menos natural en este contexto visionario.
- source_word: מַלְאַךְ יְהוָה
  english_pob_choice: the angel of Yahweh
  chosen_spanish: el ángel de Yahvé
  alternatives_spanish:
  - el mensajero de Yahvé
  - el ángel de Yahveh
  lexicon: HALOT
  rationale: Se mantiene «ángel» porque en este contexto visionario es la opción más natural, tal como indica el audit trail inglés. «Mensajero» es una alternativa semánticamente válida, pero en español pierde la fuerza visual y tradicional del contexto. Se usa «Yahvé» según el estándar del proyecto para יהוה.
- source_word: בִּיהוֹשֻׁעַ
  english_pob_choice: Joshua
  chosen_spanish: Josué
  alternatives_spanish:
  - a Josué
  - sobre Josué
  - con Josué
  lexicon: HALOT
  rationale: El hebreo con ב puede marcar al destinatario de la exhortación; en español, «advirtió ... a Josué» expresa de manera natural esa relación sin forzar una preposición literal. «Josué» es la forma castellana estable del nombre.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - 'así:'
  - 'en estos términos:'
  lexicon: HALOT
  rationale: «Diciendo» reproduce la fórmula introductoria de discurso y prepara la cita directa siguiente, con un registro sobrio y bíblico.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: 'Se aplica el criterio doctrinal del proyecto para el Tetragrámaton en español: «Yahvé» como forma principal de representación del nombre divino, en lugar de ocultarlo con «SEÑOR».'
theological_decisions:
- issue: Representación del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: La línea doctrinal del proyecto exige preservar el nombre del pacto en la traducción española. «Yahvé» mantiene la referencia directa al Tetragrámaton sin sustituirlo por un título. La alternativa «el SEÑOR» se evita porque enmascara el nombre propio y debilita la transparencia textual.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: El texto sigue de cerca el paquete de fuente hebrea y el audit trail inglés. Se conserva la decisión léxica principal del inglés para וַיָּעַד como una advertencia/amonestación solemne, y se adapta al español con un verbo natural. No se introducen ampliaciones interpretativas ni se altera la referencia directa al ángel de Yahvé ni al nombre divino.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יהוה, conforme al estándar del proyecto.
  - «Ángel» se conserva por adecuación contextual visionaria; se anota la alternativa «mensajero» en nota.
  - «Josué» sigue la forma española común y clara del nombre propio.
  - El orden y la puntuación reflejan una introducción de discurso formal y breve, apta para publicación.
