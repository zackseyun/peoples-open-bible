translation:
  language: es
  text: Y toda contribución de todas las ofrendas santas[a] de los hijos de Israel[b], que traigan[c] al sacerdote, será suya.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cosas santas». El hebreo puede referirse en general a cosas consagradas o, por contexto, a ofrendas sagradas.
    reason: lexical_alternative
  - marker: b
    text: O «los israelitas» o «los hijos de Israel». El hebreo dice literalmente «los hijos de Israel».
    reason: lexical_alternative
  - marker: c
    text: El verbo puede también traducirse «presenten» o «acerquen» en contextos sacrificiales; literalmente, «hagan acercar / traigan cerca».
    reason: lexical_alternative
lexical_decisions:
- source_word: תְּרוּמָה
  english_pob_choice: contribution
  chosen_spanish: contribución
  alternatives_spanish:
  - ofrenda
  - aporte
  lexicon: HALOT
  rationale: תרומה designa algo apartado y entregado, con matiz de don u ofrenda reservada. «Contribución» conserva la idea de algo aportado para un fin sagrado sin recurrir a una fórmula demasiado técnica o arcaica en español.
- source_word: קָדְשֵׁי
  english_pob_choice: holy gifts
  chosen_spanish: cosas santas
  alternatives_spanish:
  - cosas sagradas
  - ofrendas santas
  lexicon: HALOT
  rationale: El constructo plural de קדשׁ aquí apunta a bienes u ofrendas consagradas. «Cosas santas» mantiene la amplitud del hebreo y deja abierta la referencia a objetos u ofrendas dedicadas.
- source_word: בְנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos varones de Israel
  lexicon: HALOT
  rationale: El hebreo usa «hijos». En español, «hijos de Israel» conserva la forma bíblica y la transparencia formal sin forzar una neutralización que borre el patrón léxico del original.
- source_word: יַקְרִיבוּ
  english_pob_choice: bring / present
  chosen_spanish: presenten
  alternatives_spanish:
  - traigan
  - acerquen
  lexicon: HALOT
  rationale: El verbo hifil de קרב tiene en contexto sacrificial el sentido de acercar o presentar. «Presenten» recoge el matiz cultual de ofrecer algo al sacerdote y suena natural en español bíblico contemporáneo.
- source_word: לַכֹּהֵן
  english_pob_choice: to the priest
  chosen_spanish: al sacerdote
  alternatives_spanish:
  - al sacerdote oficiador
  - para el sacerdote
  lexicon: HALOT
  rationale: El destinatario del acto es el sacerdote. «Al sacerdote» sigue directamente el hebreo y es idiomático en español, sin añadir aclaraciones no presentes en el texto.
- source_word: לוֹ יִהְיֶה
  english_pob_choice: shall be his
  chosen_spanish: será suya
  alternatives_spanish:
  - le pertenecerá
  - será de él
  lexicon: HALOT
  rationale: El giro expresa posesión legal. «Será suya» comunica pertenencia de manera natural en español y mantiene la brevedad jurídica del hebreo.
theological_decisions:
- issue: Designación comunitaria בְנֵי יִשְׂרָאֵל
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - los hijos de la nación de Israel
  rationale: No hay disputa doctrinal, pero se conserva la forma masculina familiar del hebreo en vez de sustituirla por un etnónimo más genérico. Esto sigue la preferencia de transparencia formal del proyecto.
  doctrine_reference: DOCTRINE.md § Translation philosophy, point 4
translation_notes:
  revision_awareness: El texto inglés de POB fue revisado de «bring near» a «bring» para mayor naturalidad, aunque se conservó el sentido cultual de יקריבו. En español, «presenten» mantiene explícitamente ese matiz sacrificial sin perder fluidez.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como término por defecto para el nombre divino, aunque este versículo no lo contiene.
  - «Sacerdote» se usa de manera consistente para כֹּהֵן.
  - 'Se preserva la transparencia del constructo hebreo con una estructura nominal amplia: «contribución de todas las cosas santas».'
  - Las notas distinguen entre la carga léxica de תרומה, קדשי y יקריבו sin sobreinterpretar el versículo.
