revisions:
- from: 'Entonces los oficiales de los hijos de Israel fueron y clamaron a Faraón[a], diciendo[b][c]: «¿Por qué haces así a tus esclavos?»'
  to: 'Entonces los oficiales de los hijos de Israel fueron y clamaron a Faraón[a], diciendo[c][b]: «¿Por qué haces esto a tus siervos?»'
  rationale: Se cambia 'esclavos' por 'siervos' en el texto principal para seguir la decisión auditada del POB sobre עבד en registro cortesano, dejando 'esclavos' como alternativa en nota. También se ajusta 'haces así' a 'haces esto' para un español más natural y en línea con la revisión inglesa final, mientras la literalidad de כֹה queda preservada en la nota correspondiente.
