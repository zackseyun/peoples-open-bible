translation:
  text: Jesus said[1], "The images are manifest to humanity, and the light that is
    within them is hidden in the image of the light of the Father. He will be revealed[2],
    and his image is hidden by his light."
  philosophy: formal
  drafter_model: gemini-3.1-pro-preview
  drafter_label: gemini_3_1_pro_thomas_redraft
  drafted_at: '2026-04-22T10:59:02Z'
  footnotes:
  - marker: '1'
    text: 'The Coptic masculine singular pronoun ϥ- (''he/it'') could refer either
      to the Father (ⲡⲉⲓⲱⲧ) or to the light (ⲡⲟⲩⲟⲉⲓⲛ), as both are masculine nouns.
      Thus, an alternative translation is: ''It will be revealed, and its image is
      hidden by its light.'''
    reason: textual_variant
  - marker: '2'
    text: Coptic ⲡⲣⲱⲙⲉ (literally 'the person' or 'the human'), functioning as a collective.
    reason: lexical_alternative
lexical_decisions:
- source_word: ⲛϩⲓⲕⲱⲛ
  chosen: the images
  rationale: Greek loanword εἰκών, referring to visible forms or appearances.
  lexicon: BDAG
  alternatives:
  - the forms
  entry: εἰκών
- source_word: ⲥⲉⲟⲩⲟⲛϩ ⲉⲃⲟⲗ
  chosen: are manifest
  rationale: Stative of ⲟⲩⲱⲛϩ ⲉⲃⲟⲗ, meaning 'to be manifest, visible, clear'.
  lexicon: Crum
  alternatives:
  - are visible
  - are revealed
  entry: ⲟⲩⲱⲛϩ (485a)
- source_word: ⲙ̄ⲡⲣⲱⲙⲉ
  chosen: to humanity
  rationale: Singular generic noun ⲡⲣⲱⲙⲉ ('the person/human') used collectively.
  lexicon: Crum
  alternatives:
  - to people
  - to the person
  entry: ⲣⲱⲙⲉ (294a)
- source_word: ϩⲏⲡ⳿
  chosen: is hidden
  rationale: Stative of ϩⲱⲡ, 'to hide, conceal'.
  lexicon: Crum
  alternatives:
  - is concealed
  entry: ϩⲱⲡ (695a)
- source_word: ϭⲱⲗⲡ⳿ ⲉⲃⲟⲗ
  chosen: be revealed
  rationale: Intransitive/passive sense of ϭⲱⲗⲡ ⲉⲃⲟⲗ, 'to be revealed, disclosed'.
  lexicon: Crum
  alternatives:
  - reveal himself
  - be disclosed
  entry: ϭⲱⲗⲡ (815a)
theological_decisions:
- issue: Referent of the masculine pronoun in 'He will be revealed'
  chosen_reading: He will be revealed, and his image is hidden by his light.
  rationale: The pronoun ϥ- grammatically matches both 'the Father' and 'the light'.
    Translating as 'He' (referring to the Father) aligns with the personal language
    of revelation common in Thomas, though 'It' (referring to the light) is equally
    possible grammatically. The ambiguity is preserved in the footnote.
  alternatives_noted:
  - It will be revealed, and its image is hidden by its light.
drafter_notes: 'This saying contrasts the visible, outward ''images'' (εἰκών) with
  the hidden, inward light of the Father. It presents a paradox of revelation: while
  the Father (or the light) will ultimately be revealed, his true image remains paradoxically
  concealed by the very brilliance of his light. The saying relies heavily on Platonic
  or Middle Platonic concepts of image, form, and light, adapted into Thomas''s distinct
  theological framework.'
