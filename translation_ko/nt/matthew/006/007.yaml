  text: Προσευχόμενοι δὲ μὴ βατταλογήσητε ὥσπερ οἱ ἐθνικοί, δοκοῦσιν γὰρ ὅτι ἐν τῇ πολυλογίᾳ αὐτῶν εἰσακουσθήσονται·
base_translation:
  language: en
  yaml_path: translation/nt/matthew/006/007.yaml
  text: And when you pray[a], do not heap up empty words like the Gentiles[b], for they think that they will be heard because of their many words.
  footnotes:
  - marker: a
    text: Or 'do not babble' or 'do not use meaningless repetition.' The Greek verb is rare and likely refers to empty, mechanical, or verbose speech rather than sincere repeated prayer.
    reason: lexical_alternative
  - marker: b
    text: Or 'pagans.' The Greek literally refers to the Gentiles, that is, the nations outside the covenant people.
    reason: lexical_alternative
translation:
