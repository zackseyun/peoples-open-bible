translation:
  language: es
  text: Y sobre las cabezas de los seres vivientes[a] había la semejanza de una extensión, como el aspecto de hielo[b] sobrecogedor, extendida sobre sus cabezas desde arriba.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las criaturas vivientes». El hebreo usa aquí una expresión colectiva singular, aunque el versículo después habla de «sus cabezas».
    reason: lexical_alternative
  - marker: b
    text: Tradicionalmente «cristal». El hebreo aquí favorece más directamente «hielo».
    reason: lexical_alternative
lexical_decisions:
- source_word: וּדְמוּת
  english_pob_choice: And ... there was the likeness of
  chosen_spanish: había la semejanza de
  alternatives_spanish:
  - había una semejanza de
  - y la semejanza de
  lexicon: HALOT
  rationale: דְּמוּת expresa semejanza o apariencia, no identidad. En español, «había la semejanza de» conserva el valor de analogía sin convertirlo en una identificación directa. Se omite una traducción demasiado literal de la coordinación inicial para mantener fluidez natural sin perder el encadenamiento descriptivo del relato.
- source_word: הַחַיָּה
  english_pob_choice: the living creatures
  chosen_spanish: los seres vivientes
  alternatives_spanish:
  - las criaturas vivientes
  - los seres vivientes
  lexicon: HALOT
  rationale: El hebreo usa un singular colectivo con referencias plurales posteriores. «Seres vivientes» preserva el valor colectivo y resulta natural en español bíblico contemporáneo. Se evita forzar el singular porque el contexto inmediato ya muestra pluralidad con «sus cabezas».
- source_word: רָקִיעַ
  english_pob_choice: an expanse
  chosen_spanish: una expansión
  alternatives_spanish:
  - un firmamento
  - una bóveda
  - un espacio extendido
  lexicon: HALOT
  rationale: רָקִיעַ alude a algo extendido o desplegado arriba. «Expansión» mantiene la idea espacial de algo extendido sobre ellos sin introducir el matiz más tradicional de «firmamento», que en español puede sonar más doctrinal que descriptivo.
- source_word: כְּעֵין
  english_pob_choice: like the appearance of
  chosen_spanish: como el aspecto de
  alternatives_spanish:
  - como la apariencia de
  - como el parecer de
  lexicon: HALOT
  rationale: La construcción intensifica la comparación visual. «Aspecto» comunica bien la percepción externa en español y conserva la distancia analogía/identidad del hebreo. No se simplifica a «como» sin sustantivo, para no perder la precisión del paralelo visual.
- source_word: הַקֶּרַח
  english_pob_choice: ice
  chosen_spanish: hielo
  alternatives_spanish:
  - cristal
  - escarcha
  lexicon: HALOT
  rationale: El hebreo favorece el sentido básico de «hielo». Se elige «hielo» en lugar de «cristal» para seguir la decisión auditada de no depender de la tradición interpretativa posterior. En español, «hielo» conserva la imagen concreta y extraña del texto visionario.
- source_word: הַנּוֹרָא
  english_pob_choice: awe-inspiring
  chosen_spanish: asombroso
  alternatives_spanish:
  - sobrecogedor
  - temible
  - terrible
  lexicon: HALOT
  rationale: El participio/adjetivo expresa algo que provoca temor reverente o asombro. «Asombroso» es una solución sobria en español que conserva el impacto perceptivo; se evita «terrible» por ser más ambiguo y «temible» por acentuar solo el miedo.
- source_word: נָטוּי
  english_pob_choice: stretched out
  chosen_spanish: extendida
  alternatives_spanish:
  - tendida
  - desplegada
  - estirada
  lexicon: HALOT
  rationale: El participio pasivo indica algo extendido o desplegado sobre ellos. «Extendida» es idiomático y claro en español. Aunque «tendida» es posible, «extendida» refleja mejor la configuración espacial de una superficie sobre las cabezas.
- source_word: מִלְמָעְלָה
  english_pob_choice: from above
  chosen_spanish: desde arriba
  alternatives_spanish:
  - de arriba
  - por encima
  - desde lo alto
  lexicon: HALOT
  rationale: 'La frase adverbial enfatiza procedencia/ubicación superior. «Desde arriba» reproduce el énfasis vertical del hebreo y mantiene en español la redundancia intencional del texto: ya está «sobre» sus cabezas y además viene «desde arriba».'
theological_decisions:
- issue: Lenguaje de visión y analogía
  english_pob_reading: Preserve Ezekiel's repeated markers of resemblance ('likeness,' 'appearance,' 'like') rather than simplifying them into direct description.
  chosen_spanish_reading: Conservar los marcadores de semejanza («semejanza», «como el aspecto de») en lugar de convertir la escena en una descripción directa.
  alternative_spanish_readings:
  - simplificar a una descripción directa de una expansión brillante sobre sus cabezas
  - reformular como una imagen menos reiterativa de semejanza
  rationale: 'El versículo funciona como informe visionario y acumula comparaciones para evitar una identificación simple. La traducción española conserva esa tensión: no afirma más de lo que el hebreo afirma. Esto protege el carácter profético y visual del pasaje sin suavizar sus matices.'
  doctrine_reference: Translation philosophy §3
- issue: Colectivo singular con referencia plural
  english_pob_reading: The Hebrew uses a singular collective expression here, though the verse later refers to 'their heads.'
  chosen_spanish_reading: «Seres vivientes» como colectivo, con el plural mantenido en «sus cabezas».
  alternative_spanish_readings:
  - el singular «ser viviente»
  - las criaturas vivientes como plural explícito
  rationale: El hebreo combina forma singular colectiva y referencias plurales. En español, el colectivo plural «seres vivientes» evita una discordancia extraña y hace visible la pluralidad ya presente en la frase siguiente. Se conserva la estructura teológica y visionaria sin forzar una armonización artificial.
  doctrine_reference: Translation philosophy §2
translation_notes:
  revision_awareness: El texto español sigue la última revisión del POB inglés, que ajustó el sujeto colectivo al plural («living creatures») por la referencia posterior a «their heads». También incorpora la decisión revisada de preferir «ice» sobre «crystal», manteniendo la lectura más directa del hebreo y la progresión de analogías propia del capítulo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como término estándar solo cuando el texto lo requiera; aquí no aparece.
  - 'Se conserva la cadena de analogías visionarias con vocabulario estable: «semejanza», «como el aspecto de», «hielo».'
  - «Seres vivientes» se usa de manera consistente para reflejar el colectivo hebreo sin perder la referencia plural posterior.
  - Se evita «firmamento» y «cristal» por ser más tradicionales que textualmente necesarios en este versículo.
