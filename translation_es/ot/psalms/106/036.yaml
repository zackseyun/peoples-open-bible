revisions:
- from: Sirvieron a sus ídolos[a], y llegaron a ser para ellos una trampa.
  to: Sirvieron a sus ídolos[a], y estos les fueron un lazo.
  rationale: Se conserva la decisión principal «sirvieron» para עבד y «sus ídolos» para עֲצַבֵּיהֶם. Se ajusta la segunda cláusula a «y estos les fueron un lazo» para expresar con más naturalidad y precisión en español que los ídolos llegaron a ser מוֹקֵשׁ para el pueblo. «Lazo» refleja mejor el matiz metafórico bíblico de מוֹקֵשׁ que «trampa», y «les fueron» comunica mejor el valor de לָהֶם que «para ellos». La nota alternativa se mantiene porque preserva la opción léxica inglesa documentada («worshiped / trap»).
