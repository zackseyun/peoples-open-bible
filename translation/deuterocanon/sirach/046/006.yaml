translation:
  text: He hurled destruction on an enemy nation[a], and as they fled he wiped them all out, so that every nation might know their ban[b], for Yahweh watches over their battle.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew חרם is a covenant-war term for something devoted to destruction under divine judgment; alternatively, 'so that every nation might know their devoted destruction.'
    reason: lexical_alternative
  - marker: b
    text: 'The Greek parallel differs notably: it speaks of bringing war upon a nation and destroying ''those who resisted,'' adding that the battle was before the Lord.'
    reason: alternative_reading
lexical_decisions:
- source_word: השליך
  chosen: hurled
  alternatives:
  - cast
  - threw
  lexicon: HALOT
  rationale: The verb conveys forceful casting or throwing. 'Hurled' preserves the violent, martial sense better than the flatter 'cast' or 'threw'.
- source_word: גוי אויב
  chosen: an enemy nation
  alternatives:
  - a hostile people
  - an enemy people
  lexicon: HALOT
  rationale: גוי commonly means 'nation' or 'people'; with אויב it denotes a hostile collective. 'Enemy nation' is natural English and preserves the corporate sense.
- source_word: ובנוסם
  chosen: as they fled
  alternatives:
  - in their flight
  - when they fled
  lexicon: HALOT
  rationale: The prefixed preposition with infinitive/construct-like form indicates circumstance. 'As they fled' gives clear temporal sense in idiomatic English.
- source_word: האביד כולם
  chosen: he wiped them all out
  alternatives:
  - he destroyed them all
  - he made them all perish
  lexicon: HALOT
  rationale: אבד in the Hiphil means to destroy or cause to perish. 'Wiped them all out' captures the totality marked by כולם, though still within the military context.
- source_word: למען דעת
  chosen: so that ... might know
  alternatives:
  - in order that ... may know
  - for ... to know
  lexicon: HALOT
  rationale: This purpose clause is best rendered with clear English purpose syntax.
- source_word: כל גוי
  chosen: every nation
  alternatives:
  - every people
  - all nations
  lexicon: HALOT
  rationale: The singular collective after כל is well represented by 'every nation'; it keeps the distributive force.
- source_word: חרם
  chosen: their ban
  alternatives:
  - their devoted destruction
  - the ban
  lexicon: HALOT
  rationale: חרם is a loaded term for something devoted to destruction under divine judgment. Because the Hebrew lacks an explicit verb here and the phrase is terse, 'their ban' preserves the compactness while signaling the concept; the fuller sense is preserved in a footnote.
- source_word: כי צופה
  chosen: for ... watches over
  alternatives:
  - for ... keeps watch over
  - for ... observes
  lexicon: HALOT
  rationale: צפה denotes watching, keeping lookout, or observing. 'Watches over' fits the military setting and explains the LORD's active oversight.
- source_word: יהוה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton is rendered 'the LORD'.
- source_word: מלחמתם
  chosen: their battle
  alternatives:
  - their war
  - their warfare
  lexicon: HALOT
  rationale: The Hebrew suffix points to 'their battle/war.' 'Battle' fits the immediate scene, while the Greek parallel also confirms a warfare context.
