review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura imprecatoria y los pares semánticos de vergüenza/deshonra. Sin embargo, hay dos desajustes relevantes con el hebreo y con el audit trail inglés: (1) מְבַקְשֵׁי נַפְשִׁי לִסְפּוֹתָהּ se ha comprimido en «los que buscan destruir mi vida», lo cual borra la distinción entre «buscar mi vida» y el infinitivo final «para acabarla / barrerla»; (2) «mi mal» para רָעָתִי es posible, pero en español suena más ambiguo y puede sugerir mal moral propio, mientras que el contexto exige «mi daño / mi calamidad / el mal que me desean».'
  spanish_quality_summary: El texto es legible, pero «a una» suena algo marcado/literario para una meta de español moderno ampliamente eclesial, y «mi mal» resulta menos claro de lo deseable. También la nota c no añade valor porque el texto ya dice «mi vida»; conviene usar las notas para la alternativa hebrea relevante y para aclarar «mi daño» si se desea.
  glossary_alignment: No hay conflictos con la terminología troncal del proyecto. La decisión נפש -> «vida» está bien alineada. Conviene ajustar לִסְפּוֹתָהּ para reflejar mejor el matiz documentado («acabar con ella / barrerla») y רָעָתִי a «mi daño» para preservar el sentido contextual de harm.
  issues:
  - severity: medium
    issue: Se fusionan dos elementos hebreos distintos en «los que buscan destruir mi vida».
    rationale: El hebreo distingue «los que buscan mi vida» (מְבַקְשֵׁי נַפְשִׁי) de «para acabarla / barrerla» (לִסְפּוֹתָהּ). La redacción actual expresa el sentido global, pero pierde una relación sintáctica y semántica que el POB inglés conservó y aun documentó en notas.
  - severity: medium
    issue: «Mi mal» es ambiguo en español y puede leerse como maldad propia.
    rationale: רָעָתִי aquí significa el daño o calamidad que desean al salmista, no su mal moral. «Mi daño» o «mi calamidad» comunica mejor el valor contextual y sigue el audit trail inglés («my harm»).
  - severity: low
    issue: «A una» es comprensible pero menos natural en español moderno general.
    rationale: Aunque válido, «juntos» o «a la vez» encaja mejor con la meta de neutralidad contemporánea sin sacrificar fidelidad.
  - severity: low
    issue: La nota c es redundante y poco precisa.
    rationale: Dice «Hebreo “mi vida”» cuando el texto principal ya traduce «mi vida». La nota útil aquí sería sobre la alternativa «mi alma» o sobre la construcción completa «buscar mi vida para acabarla».
  revised_spanish_text: Sean avergonzados y humillados juntos[a] los que buscan mi vida para acabar con ella[b]; vuelvan atrás y sean deshonrados los que se complacen en mi daño[c].
  revised_footnotes:
  - marker: a
    text: O «a una»; el hebreo indica que la vergüenza y la humillación recaen de manera conjunta o simultánea sobre ellos.
    reason: alternative_reading
  - marker: b
    text: O «para destruirla» o «para barrerla»; el hebreo puede expresar la idea de poner fin a la vida del salmista.
    reason: lexical_alternative
  - marker: c
    text: O «mi calamidad»; aquí se refiere al daño o mal que desean que me sobrevenga, no a una maldad moral propia.
    reason: lexical_alternative
  revision_rationale: La revisión restaura mejor la estructura del hebreo y del audit trail inglés al mantener «buscar mi vida» + propósito «para acabar con ella», mejora la claridad contextual de רָעָתִי con «mi daño», y usa una formulación más natural para español eclesial amplio con «juntos».
