translation:
  language: es
  text: Porque así dice Yahvé acerca del rey que se sienta en el trono de David, y acerca de todo el pueblo que habita en esta ciudad—vuestros hermanos[a] que no salieron con ustedes al destierro—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «vuestros parientes»; el hebreo dice literalmente «vuestros hermanos», un término de parentesco masculino plural que puede referirse de manera amplia a los demás judíos.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino propio del tetragrámaton, conforme a la política del proyecto. «Yahvé» es la forma española establecida en el POB para reproducir el nombre revelado, en vez de sustituirlo por un título.
- source_word: כֹה אָמַר
  english_pob_choice: thus says
  chosen_spanish: así dice
  alternatives_spanish:
  - así ha dicho
  - así dice Yahvé
  lexicon: HALOT
  rationale: La fórmula profética se vierte de modo natural y sobrio en español. «Así dice» mantiene el tono oracular sin recurrir a una perífrasis más interpretativa.
- source_word: אֶל
  english_pob_choice: concerning
  chosen_spanish: acerca de
  alternatives_spanish:
  - sobre
  - en cuanto a
  lexicon: HALOT
  rationale: Aquí אֶל introduce el tema del mensaje, no un destinatario directo. «Acerca de» conserva ese valor temático en español.
- source_word: הַמֶּלֶךְ הַיּוֹשֵׁב אֶל כִּסֵּא דָוִד
  english_pob_choice: the king who sits on the throne of David
  chosen_spanish: el rey que se sienta en el trono de David
  alternatives_spanish:
  - el rey que está sentado en el trono de David
  - el rey que ocupa el trono de David
  lexicon: HALOT
  rationale: Se mantiene la imagen dinástica literal del hebreo. «Se sienta» preserva el participio con una formulación natural en español y no borra la referencia al trono davídico.
- source_word: וְאֶל כָּל הָעָם
  english_pob_choice: and concerning all the people
  chosen_spanish: y acerca de todo el pueblo
  alternatives_spanish:
  - y acerca de todo el pueblo
  - y respecto de todo el pueblo
  lexicon: HALOT
  rationale: Se conserva el alcance total de כָּל y el valor temático de אֶל. «Pueblo» comunica el colectivo sin perder la referencia comunitaria.
- source_word: הַיּוֹשֵׁב בָּעִיר הַזֹּאת
  english_pob_choice: who dwell in this city
  chosen_spanish: que habita en esta ciudad
  alternatives_spanish:
  - que mora en esta ciudad
  - que vive en esta ciudad
  lexicon: HALOT
  rationale: «Habita» mantiene un registro digno y cercano al sentido de «dwell», sin forzar arcaísmo innecesario. Conserva el participio colectivo aplicado al pueblo.
- source_word: אֲחֵיכֶם
  english_pob_choice: your brothers
  chosen_spanish: sus hermanos
  alternatives_spanish:
  - vuestros hermanos
  - sus parientes
  lexicon: HALOT
  rationale: El hebreo usa un término masculino plural de parentesco. En español, «sus hermanos» evita ambigüedad de persona con «de ustedes» inmediatamente anterior y conserva la relación fraterna/tribal indicada por el original. Se deja abierta la amplitud referencial sin neutralizar el término.
- source_word: אֲשֶׁר לֹא יָצְאוּ אִתְּכֶם
  english_pob_choice: who did not go out with you
  chosen_spanish: que no salieron con ustedes
  alternatives_spanish:
  - que no partieron con ustedes
  - que no fueron con ustedes
  lexicon: HALOT
  rationale: יָצָא se expresa de forma idiomática en español con «salieron», que conserva la imagen de salida vinculada al exilio/deportación. El plural de cortesía o latinoamericano «ustedes» mantiene naturalidad.
- source_word: בַּגּוֹלָה
  english_pob_choice: into exile
  chosen_spanish: al destierro
  alternatives_spanish:
  - al exilio
  - a la deportación
  lexicon: HALOT
  rationale: «Destierro» comunica bien la realidad histórica de la deportación y el estado de alejamiento forzado. Se prefiere aquí por su naturalidad bíblica en español y su cercanía semántica con el contexto.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se sigue la decisión doctrinal del POB de no mascarar el nombre divino con un título. «Yahvé» preserva la referencia personal y pactual del tetragrámaton en español.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Alcance de אֲחֵיכֶם
  english_pob_reading: your brothers
  chosen_spanish_reading: sus hermanos
  alternative_spanish_readings:
  - sus parientes
  - vuestros hermanos
  rationale: Se mantiene el término de parentesco masculino plural sin convertirlo en una formulación neutral. En español, el contexto hace claro que el grupo es el del mismo pueblo/parentela, y la forma «sus hermanos» conserva esa tensión entre literalidad y referencia amplia.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over gender-neutral'
translation_notes:
  revision_awareness: 'La redacción española sigue el pasaje hebreo de forma directa y conserva la estructura de la fórmula profética, el referente dinástico davídico y el término de parentesco masculino plural. También toma en cuenta la revisión inglesa que prefirió una formulación más formal para la fórmula profética y para el verbo de residencia, pero sin depender mecánicamente del inglés: se evaluaron las opciones españolas según el hebreo y el estilo bíblico en español.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה, conforme al estándar POB en español.
  - Se conserva «trono de David» como calco transparente y teológicamente importante del linaje davídico.
  - «Destierro» se usa como equivalente bíblico natural de בַּגּוֹלָה, manteniendo la idea de exilio forzado.
  - La nota de pie de página aclara la amplitud semántica de «sus hermanos» sin borrar el masculino plural del hebreo.
