translation:
  language: es
  text: Pero desde el principio de la creación[a][b], los hizo varón y hembra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los creó». El griego usa el verbo «hizo», aunque «creó» refleja el trasfondo de Génesis.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «varón y hembra los hizo». Esta opción sigue más de cerca el orden de palabras del griego.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπὸ
  english_pob_choice: from
  chosen_spanish: desde
  alternatives_spanish:
  - a partir de
  - desde el
  lexicon: BDAG
  rationale: La preposición marca origen temporal; en español, "desde" expresa de manera natural ese punto de partida.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: δώ introduce contraste con el contexto previo; "Pero" conserva el matiz adversativo en español.
- source_word: ἀρχῆς
  english_pob_choice: the beginning
  chosen_spanish: el principio
  alternatives_spanish:
  - el comienzo
  - principio
  lexicon: BDAG
  rationale: Con ἀπό, la expresión idiomática se vierte naturalmente como "desde el principio"; "principio" mantiene el paralelismo bíblico y es plenamente inteligible.
- source_word: κτίσεως
  english_pob_choice: of creation
  chosen_spanish: de la creación
  alternatives_spanish:
  - de la criatura
  - del acto creador
  lexicon: BDAG
  rationale: El genitivo depende de ἀρχῆς y remite al ámbito creacional; "de la creación" preserva ese alcance sin ampliar innecesariamente el sentido.
- source_word: ἄρσεν
  english_pob_choice: male
  chosen_spanish: varón
  alternatives_spanish:
  - masculino
  - macho
  lexicon: BDAG
  rationale: En la cita de Génesis, el término señala el sexo masculino en contraste con θῆλυ; "varón" es natural en español bíblico y conserva la pareja creacional.
- source_word: θῆλυ
  english_pob_choice: female
  chosen_spanish: hembra
  alternatives_spanish:
  - femenina
  - mujer
  lexicon: BDAG
  rationale: En paralelo con ἄρσεν, el término designa el sexo femenino; "hembra" reproduce la simetría biológica de la cita mejor que "mujer".
- source_word: ἐποίησεν
  english_pob_choice: he made
  chosen_spanish: hizo
  alternatives_spanish:
  - creó
  - formó
  lexicon: BDAG
  rationale: ποιέω significa "hacer"; aunque el trasfondo es Génesis, el verbo griego aquí es "hizo", no κτίζω.
- source_word: αὐτούς
  english_pob_choice: them
  chosen_spanish: los
  alternatives_spanish:
  - a ellos
  - a ambos
  lexicon: BDAG
  rationale: El pronombre retoma a la pareja humana mencionada en la cita; en español, el objeto directo masculino plural "los" es idiomático y mantiene la referencia colectiva.
theological_decisions:
- issue: Cita creacional con distinción sexual
  english_pob_reading: male and female
  chosen_spanish_reading: varón y hembra
  alternative_spanish_readings:
  - hombre y mujer
  - masculino y femenino
  rationale: La formulación sigue de cerca el paralelo del texto original y conserva el énfasis en la pareja sexual creacional sin sustituirlo por categorías sociales posteriores.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §4 (Gender-accurate over gender-neutral)'
- issue: Verbo de acción divina en el trasfondo de Génesis
  english_pob_reading: he made them
  chosen_spanish_reading: los hizo
  alternative_spanish_readings:
  - los creó
  - los formó
  rationale: El griego usa ποιέω; traducirlo como "hizo" preserva la forma verbal del versículo y evita imponer "creó" donde el original no lo dice explícitamente.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §1 (Original-language primacy over translation tradition)'
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior: los marcadores de nota [a] y [b] ahora aparecen explícitamente en el texto español.'
  spanish_consistency_notes:
  - Se mantuvo "Yahvé" solo donde corresponda; en este versículo no aparece el nombre divino explícito.
  - Se prefirió "hizo" por fidelidad al verbo ποιέω, evitando armonizarlo de forma no justificada con el trasfondo de Génesis.
  - '"Varón y hembra" conserva la cita creacional en un registro bíblico claro para lectores hispanohablantes.'
