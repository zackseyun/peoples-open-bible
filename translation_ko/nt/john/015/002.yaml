id: JHN.15.2
reference: 'John 15:2'
language:
  code: ko
  name: Korean
  variant: '표준어 / modern formal-polite (합쇼체)'
source:
  edition: SBLGNT
  text: πᾶν κλῆμα ἐν ἐμοὶ μὴ φέρον καρπὸν αἴρει αὐτό, καὶ πᾶν τὸ καρπὸν φέρον καθαίρει αὐτὸ ἵνα ⸂καρπὸν πλείονα⸃ φέρῃ.
base_translation:
  language: en
  yaml_path: translation/nt/john/015/002.yaml
  text: Every branch in me that does not bear fruit[a], he removes; and every branch that bears fruit[b], he prunes so that it may bear more fruit.
  footnotes:
  - marker: a
    text: Or 'takes away'; some understand αἴρει here as 'lifts up.'
    reason: alternative_reading
  - marker: b
    text: The verb translated 'prunes' can also mean 'cleanses'; the wording fits the vineyard image and anticipates the language of being 'clean' in the next verse.
    reason: lexical_alternative
translation:
  language: ko
  text: 내 안에서 열매 맺지 못하는 가지는 모두 아버지께서 제거하시고, 열매 맺는 가지는 모두 더 많은 열매를 맺게 하시려고 깨끗하게 손질하십니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「들어 올리신다」. 헬라어 αἴρει는 「제거하다」가 일반적이나, 어떤 이들은 여기서 「들어 올리다」로 이해하기도 한다.
    reason: lexical_alternative
  - marker: b
    text: 「깨끗하게 손질하다」로 옮긴 동사는 「정결케 하다」의 뜻도 지닌다. 포도나무 비유와 다음 절의 「깨끗하다」 어휘와 연결되는 의도된 어휘유희이다.
    reason: lexical_alternative
lexical_decisions:
- source_word: αἴρει
  english_pob_choice: removes
  chosen_korean: 제거하시다
  alternatives_korean:
  - 치워 버리시다
  - 들어 올리시다
  lexicon: BDAG
  rationale: αἴρω의 일차 의미는 「치우다·제거하다」. 「들어 올리다」 해석도 가능하나 본문 흐름에서는 무열매 가지의 제거가 더 자연스럽다.
- source_word: καθαίρει
  english_pob_choice: prunes
  chosen_korean: 깨끗하게 손질하시다
  alternatives_korean:
  - 가지치기하시다
  - 정결케 하시다
  lexicon: BDAG
  rationale: καθαίρω는 가지치기와 정결케 함의 이중 의미를 지니며, 다음 절 καθαροί와 연결된다. 「깨끗하게 손질하다」가 두 의미를 함께 담는다.
- source_word: καρπόν
  english_pob_choice: fruit
  chosen_korean: 열매
  alternatives_korean: []
  lexicon: BDAG
  rationale: 표준 등가어.
