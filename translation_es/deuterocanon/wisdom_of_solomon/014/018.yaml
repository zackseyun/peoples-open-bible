translation:
  language: es
  text: Y la ambición del artesano impulsó incluso a los que eran ignorantes hacia una intensificación del culto[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para el aumento de la religión» o «para la intensificación de la observancia religiosa».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπίτασιν
  english_pob_choice: intensification
  chosen_spanish: aumento
  alternatives_spanish:
  - intensificación
  - agrandamiento
  - crecimiento
  lexicon: LSJ
  rationale: El griego indica un refuerzo o acrecentamiento. En español, «aumento» conserva la idea de un incremento real sin sonar tan técnico como «intensificación», y encaja bien con el paralelismo de la frase.
- source_word: θρησκείας
  english_pob_choice: worship
  chosen_spanish: culto
  alternatives_spanish:
  - religión
  - observancia religiosa
  - adoración
  lexicon: LSJ
  rationale: En este contexto de idolatría, θρησκεία apunta al ejercicio cultual concreto. «Culto» comunica mejor la práctica devocional que «religión», y evita una abstracción excesiva.
- source_word: ἀγνοοῦντας
  english_pob_choice: those who were ignorant
  chosen_spanish: los que eran ignorantes
  alternatives_spanish:
  - los ignorantes
  - los que no sabían
  - los que desconocían
  lexicon: LSJ
  rationale: La forma participial describe personas que carecían de conocimiento. «Los que eran ignorantes» mantiene la referencia personal y la cualidad descrita por el participio.
- source_word: τεχνίτου
  english_pob_choice: craftsman
  chosen_spanish: artesano
  alternatives_spanish:
  - artífice
  - fabricante
  - maestro artesano
  lexicon: LSJ
  rationale: «Artesano» conserva el sentido de alguien hábil en un oficio manual y sirve bien para el fabricante de la imagen. Es natural en español y no pierde el matiz de oficio técnico.
- source_word: προετρέψατο
  english_pob_choice: urged on
  chosen_spanish: impulsó
  alternatives_spanish:
  - instó
  - incitó
  - movió
  lexicon: LSJ
  rationale: El verbo medio expresa que la ambición llevó o movió a otros hacia algo. «Impulsó» refleja esa fuerza causal sin cargar el texto con un matiz demasiado violento como «incitó».
- source_word: φιλοτιμία
  english_pob_choice: ambition
  chosen_spanish: ambición
  alternatives_spanish:
  - afán de honor
  - amor a la distinción
  - vanidad
  lexicon: LSJ
  rationale: Aquí φιλοτιμία describe el afán del artesano por prestigio o reconocimiento. «Ambición» es la equivalencia más directa y comprensible en español, y conserva la valoración negativa implícita en el contexto.
theological_decisions:
- issue: θρησκεία en un contexto de idolatría
  english_pob_reading: worship
  chosen_spanish_reading: culto
  alternative_spanish_readings:
  - religión
  - observancia religiosa
  - adoración
  rationale: El pasaje no habla de religión en sentido abstracto, sino del aumento de la práctica devocional a los ídolos. «Culto» mantiene el foco en la acción religiosa concreta y evita una formulación más conceptual que podría desdibujar la polémica.
  doctrine_reference: Translation philosophy §6; consistencia terminológica del registro del texto
- issue: Ambición como motor del desvío religioso
  english_pob_reading: the ambition of the craftsman urged on even those who were ignorant toward an intensification of worship
  chosen_spanish_reading: la ambición del artesano impulsó aun a los que eran ignorantes hacia un aumento del culto
  alternative_spanish_readings:
  - el afán de honor del artesano impulsó aun a los que eran ignorantes hacia un aumento del culto
  - la ambición del artesano los incitó hacia un mayor culto
  rationale: 'La construcción mantiene la causalidad del griego: la ambición del artesano no solo lo afecta a él, sino que arrastra a otros hacia una práctica cultual más intensa. Se conserva la tensión ética del texto sin suavizarla.'
  doctrine_reference: Transmisión del argumento sapiencial contra la idolatría
translation_notes:
  revision_awareness: El texto griego dice literalmente que la ambición del artesano llevó a los ignorantes «a/para una intensificación de la θρησκεία». La versión española conserva esa relación causal con «impulsó … hacia un aumento del culto», siguiendo el ajuste de la auditoría inglesa que reordenó la frase final para hacer explícita la dirección del movimiento.
  spanish_consistency_notes:
  - Se mantuvo «artesano» para τεχνίτου por ser el término más natural y fiel al oficio del fabricante de la imagen.
  - Se prefirió «culto» a «religión» en el cuerpo principal, dejando las alternativas en nota porque el contexto es cultual e idólatra.
  - «Ignorantes» conserva la fuerza descriptiva del participio ἀγνοοῦντας sin convertirlo en un sustantivo abstracto.
