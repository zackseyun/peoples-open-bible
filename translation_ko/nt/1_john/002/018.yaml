id: 1JN.2.18
reference: 1 John 2:18
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Παιδία, ἐσχάτη ὥρα ἐστίν, καὶ καθὼς ἠκούσατε ⸀ὅτι ἀντίχριστος ἔρχεται, καὶ νῦν ἀντίχριστοι πολλοὶ γεγόνασιν· ὅθεν γινώσκομεν ὅτι ἐσχάτη ὥρα ἐστίν.
base_translation:
  language: en
  yaml_path: translation/nt/1_john/002/018.yaml
  text: Children[a], it is the last hour, and just as you heard that antichrist is coming, even now many antichrists have arisen[b]. From this we know that it is the last hour.
  footnotes:
  - marker: a
    text: Or 'the antichrist is coming.' The Greek noun is anarthrous ('antichrist' without the article), but English may also express it with the article to indicate a recognized expected figure.
    reason: alternative_reading
  - marker: b
    text: Or 'have appeared' or 'have come.' The Greek perfect verb emphasizes that many antichrists have arisen and are now present.
    reason: lexical_alternative
translation:
  language: ko
  text: 아이들이여, 지금은 마지막 때입니다. 그리고 적그리스도가 온다는 것을 여러분이 들은 것처럼, 이제 많은 적그리스도들이 일어났습니다. 이로써 우리는 지금이 마지막 때임을 압니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀντίχριστος
  english_pob_choice: antichrist
  chosen_korean: 적그리스도
  alternatives_korean:
  - 반(反)그리스도
  lexicon: BDAG
  rationale: ἀντίχριστος는 1 요한서의 특징적 칭호. 한국 교회 전통의 「적그리스도」가 표준 등가어이며 본 번역에서도 일관 사용한다(2:22; 4:3; 2 요 7).
- source_word: ἐσχάτη ὥρα
  english_pob_choice: last hour
  chosen_korean: 마지막 때
  alternatives_korean:
  - 마지막 시간
  - 종말의 때
  lexicon: BDAG
  rationale: ὥρα는 「시간」이지만 종말론적 결정의 시점을 가리킨다. 「마지막 때」가 한국어에서 그 종말론적 무게를 담는다.
