  from: Before the age, from the beginning, he created me, and until the age I will never fail.
  to: Before time, from the beginning, he created me, and unto eternity I will never cease.
  rationale: The Cartha draft follows NETS too closely, resulting in wooden English that obscures the author's meaning. While αἰών can mean 'age', in the phrases πρὸ τοῦ αἰῶνος and ἕως αἰῶνος it functions to denote the boundaries of time and eternity. 'Before the age' and 'until the age' sound like specific, bounded epochs rather than pre-creation and unending eternity. Furthermore, in the context of eternal existence, ἐκλείπω means 'to cease' or 'come to an end', not 'to fail' (which implies failing a task or moral failure). The blind draft correctly identifies these issues and offers a much more accurate and natural rendering.
