translation:
  language: es
  text: Así le sirvieron por separado a él, y a ellos por separado, y a los egipcios que comían con él por separado, porque los egipcios no podían comer pan[a] con los hebreos, pues eso era una abominación para los egipcios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «comer pan con los hebreos», un modismo para compartir una comida.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשִׂימוּ
  english_pob_choice: they served
  chosen_spanish: les sirvieron
  alternatives_spanish:
  - les pusieron
  - les sirvieron la comida
  lexicon: HALOT
  rationale: En contexto de mesa y reparto de comida, el valor de 'poner/colocar' se expresa naturalmente en español como 'servir'. Conserva el sentido narrativo sin volver mecánico el hebreo.
- source_word: לְבַדּוֹ / לְבַדָּם
  english_pob_choice: by himself / by themselves
  chosen_spanish: aparte
  alternatives_spanish:
  - por separado
  - solo / solos
  lexicon: HALOT
  rationale: '''Aparte'' preserva la separación social reiterada en el versículo y evita cargar ''solo'' con una posible lectura de soledad física.'
- source_word: הָאֹכְלִים אִתּוֹ
  english_pob_choice: who ate with him
  chosen_spanish: que comían con él
  alternatives_spanish:
  - que comieron con él
  - que estaban comiendo con él
  lexicon: HALOT
  rationale: El participio hebreo describe a los comensales en la escena; el presente progresivo narrativo 'comían' suena natural en español y mantiene la simultaneidad.
- source_word: לֹא יוּכְלוּן
  english_pob_choice: could not
  chosen_spanish: no podían
  alternatives_spanish:
  - no pudieron
  - no eran capaces de
  lexicon: HALOT
  rationale: '''No podían'' expresa tanto imposibilidad social como incapacidad práctica, acorde con el contexto de tabú cultural.'
- source_word: לֶאֱכֹל אֶת הָעִבְרִים לֶחֶם
  english_pob_choice: eat bread with the Hebrews
  chosen_spanish: comer pan con los hebreos
  alternatives_spanish:
  - comer con los hebreos
  - compartir pan con los hebreos
  lexicon: HALOT
  rationale: Se conserva la imagen literal 'comer pan' para reflejar el hebreo y la nota de idioma de mesa; en español sigue siendo comprensible como comer juntos.
- source_word: תוֹעֵבָה
  english_pob_choice: an abomination
  chosen_spanish: una abominación
  alternatives_spanish:
  - algo detestable
  - una cosa abominable
  lexicon: HALOT
  rationale: '''Abominación'' reproduce la fuerza negativa fuerte del término y coincide con el registro bíblico de rechazo ritual o cultural.'
- source_word: מִצְרִים / הָעִבְרִים
  english_pob_choice: the Egyptians / the Hebrews
  chosen_spanish: los egipcios / los hebreos
  alternatives_spanish:
  - egipcios / hebreos
  lexicon: HALOT
  rationale: Se mantienen los etnónimos con artículo para reflejar el contraste grupal marcado en el hebreo y en la traducción inglesa auditada.
theological_decisions:
- issue: Tabú alimentario y separación de mesa entre egipcios y hebreos
  english_pob_reading: the Egyptians could not eat bread with the Hebrews, for that is an abomination to the Egyptians
  chosen_spanish_reading: los egipcios no podían comer pan con los hebreos, pues eso era una abominación para los egipcios
  alternative_spanish_readings:
  - no podían comer con los hebreos, porque eso era detestable para los egipcios
  - no les era posible compartir mesa con los hebreos, porque eso era una abominación para los egipcios
  rationale: La redacción conserva el tabú cultural tal como está en el hebreo y en la lectura inglesa, sin suavizarlo a una mera diferencia social. 'Abominación' mantiene la carga fuerte del rechazo.
  doctrine_reference: Ninguna doctrina específica; observación histórico-cultural del relato patriarcal.
translation_notes:
  revision_awareness: Se ha seguido de cerca la lectura auditada en inglés y el texto hebreo, manteniendo la repetición de separación ('aparte') y la imagen idiomática de 'comer pan'. No se detectaron cambios de revisión aplicados en el paquete de referencia.
  spanish_consistency_notes:
  - Se prefirió 'aparte' sobre 'solo' para no introducir la idea de soledad física.
  - Se mantuvo 'pan' para reflejar el modismo hebreo de comer juntos, con nota explicativa.
  - '''Abominación'' se preservó por coherencia con el valor fuerte del término y con la traducción inglesa auditada.'
