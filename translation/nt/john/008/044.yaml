theological_decisions:
- issue: Referent of ὁ πατὴρ αὐτοῦ
  chosen_reading: The phrase refers to 'the lie/falsehood,' meaning the devil is the father/source of it.
  alternative_readings:
  - The phrase refers to the devil himself ('his father')
  - The phrase means 'the father of lies' as a generalized paraphrase
  rationale: In context, the nearest and most coherent antecedent is τὸ ψεῦδος. This yields the common sense that the devil is both a liar and the source of falsehood. Rendering 'his father' would create an awkward and theologically speculative statement about the devil having a father, which the context does not require. 'Father of lies' captures the sense but expands the singular noun into a paraphrase.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Whether to imply that the devil once stood in the truth and then fell
  chosen_reading: The translation avoids implying prior participation in the truth beyond what the Greek states.
  alternative_readings:
  - He did not remain in the truth, implying prior standing there
  rationale: The Greek ἔστηκεν with negation states that he has not stood in the truth; some English renderings such as 'did not continue/remain' can suggest a prior state from which he departed. Since that implication is debated and not explicit here, the wording preserves the image without resolving the theological question.
  doctrine_reference: Translation philosophy §3
