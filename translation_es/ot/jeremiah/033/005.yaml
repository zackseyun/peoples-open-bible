translation:
  language: es
  text: Vienen para pelear contra los caldeos[a], y para llenarlos[b] con los cadáveres[c] de los hombres[d] a quienes yo derribé en mi ira y en mi furor, y de esta ciudad he escondido mi rostro[e] a causa de toda su maldad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'los babilonios'. El hebreo dice 'los caldeos'.
    reason: lexical_alternative
  - marker: b
    text: El hebreo dice 'llenarlos'; probablemente se refiere a las casas o fortificaciones mencionadas en el versículo anterior.
    reason: cross_reference
  - marker: c
    text: O 'cadáveres humanos' / 'los cadáveres de la humanidad'.
    reason: lexical_alternative
  - marker: d
    text: El hebreo אָדָם puede significar 'hombre' o 'humanidad'; aquí el contexto apunta a personas concretas muertas en la ciudad.
    reason: lexical_alternative
  - marker: e
    text: '''Esconder el rostro'' es un modismo bíblico de retiro de favor o presencia, no solo un acto físico.'
    reason: theological_note
lexical_decisions:
- source_word: בָּאִים
  english_pob_choice: They are coming
  chosen_spanish: Vienen
  alternatives_spanish:
  - Están viniendo
  - Vienen acercándose
  lexicon: HALOT
  rationale: El participio qal plural expresa acción en curso o inminente; en español, el presente simple puede conservar ese valor de cercanía sin sonar forzado.
- source_word: לְהִלָּחֵם אֶת הַכַּשְׂדִּים
  english_pob_choice: to fight against the Chaldeans
  chosen_spanish: para pelear contra los caldeos
  alternatives_spanish:
  - para luchar contra los caldeos
  - para guerrear contra los caldeos
  lexicon: HALOT
  rationale: La preposición y el objeto señalan enfrentamiento hostil. 'Pelear contra' es natural en español y mantiene el sentido adversativo.
- source_word: הַכַּשְׂדִּים
  english_pob_choice: the Chaldeans
  chosen_spanish: los caldeos
  alternatives_spanish:
  - los babilonios
  lexicon: HALOT
  rationale: Se conserva el etnónimo del hebreo; 'babilonios' es una equivalencia histórica posible, pero el texto fuente dice 'caldeos'.
- source_word: וּלְמַלְאָם
  english_pob_choice: to fill them
  chosen_spanish: para llenar[a]
  alternatives_spanish:
  - y para llenarlos
  - para colmarlos
  lexicon: HALOT
  rationale: Se conserva el verbo 'llenar' y se ancla la nota porque el sufijo plural hebreo puede referirse a los edificios/fortificaciones del contexto inmediato, no solo a personas.
- source_word: פִּגְרֵי הָאָדָם
  english_pob_choice: the corpses of the men
  chosen_spanish: con los cadáveres[b] de los hombres[c]
  alternatives_spanish:
  - con los cuerpos muertos de los hombres
  - con los cadáveres de la humanidad
  lexicon: HALOT
  rationale: פגר es 'cadáver' con fuerte crudeza; אָדָם aquí es colectivo pero concreto en contexto bélico. 'Hombres' refleja bien el referente humano y masculino del pasaje.
- source_word: אֲשֶׁר הִכֵּיתִי
  english_pob_choice: whom I struck down
  chosen_spanish: a quienes yo herí
  alternatives_spanish:
  - a quienes yo golpeé
  - a quienes yo derribé
  lexicon: HALOT
  rationale: נכה puede ser 'herir' o 'golpear'; en este contexto judicial implica muerte. 'Herí' preserva el golpe divino, aunque la nota teológica deja claro que el resultado es mortal.
- source_word: בְאַפִּי וּבַחֲמָתִי
  english_pob_choice: in my anger and in my wrath
  chosen_spanish: en mi ira y en mi furor[d]
  alternatives_spanish:
  - en mi enojo y en mi furor
  - en mi ira y en mi cólera
  lexicon: HALOT
  rationale: Se mantienen dos términos distintos de juicio divino. 'Ira' y 'furor' conservan la intensificación del hebreo sin colapsar ambos vocablos en uno solo.
- source_word: וַאֲשֶׁר הִסְתַּרְתִּי פָנַי מֵהָעִיר הַזֹּאת
  english_pob_choice: from this city I have hidden my face
  chosen_spanish: y de esta ciudad he escondido mi rostro[e]
  alternatives_spanish:
  - y de esta ciudad he ocultado mi rostro
  - y he escondido mi rostro de esta ciudad
  lexicon: HALOT
  rationale: Se conserva el idiomático 'esconder el rostro', que en lenguaje bíblico expresa retirada de favor/presencia. El orden español sigue de cerca el hebreo y la revisión inglesa más reciente.
- source_word: עַל כָּל רָעָתָם
  english_pob_choice: because of all their evil
  chosen_spanish: por toda su maldad
  alternatives_spanish:
  - a causa de toda su maldad
  - por toda su maldad y perversidad
  lexicon: HALOT
  rationale: עַל tiene valor causal aquí. 'Maldad' transmite la fuerza moral de רָעָה con estilo fluido y publicado; el singular colectivo funciona bien en español.
theological_decisions:
- issue: Lenguaje de juicio divino directo
  english_pob_reading: Retain 'I struck down,' 'in my anger and in my wrath,' and 'I have hidden my face' as direct divine speech.
  chosen_spanish_reading: 'Mantener la acción divina directa: ''yo herí'', ''en mi ira y en mi furor'' y ''he escondido mi rostro''.'
  alternative_spanish_readings:
  - Suavizar a lenguaje impersonal de desastre
  - Reformular 'he escondido mi rostro' como simple abandono sin el idiomático bíblico
  rationale: El versículo atribuye el juicio a Dios y conserva una expresión pactual fuerte. En español conviene mantener el lenguaje directo y el modismo del rostro escondido para no diluir el peso teológico del texto.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Sentido de אָדָם en contexto bélico
  english_pob_reading: men
  chosen_spanish_reading: los hombres
  alternative_spanish_readings:
  - la humanidad
  - las personas
  rationale: Aunque אָדָם puede significar 'humanidad' en otros contextos, aquí se trata de muertos concretos en la ciudad sitiada. 'Los hombres' conserva el referente humano sin generalizar indebidamente.
  doctrine_reference: 'Contested terms table: אָדָם; Translation philosophy §4'
- issue: Correspondencia entre 'anger/wrath' y 'ira/furor'
  english_pob_reading: in my anger and in my wrath
  chosen_spanish_reading: en mi ira y en mi furor
  alternative_spanish_readings:
  - en mi ira y en mi cólera
  - en mi enojo y en mi furor
  rationale: El hebreo usa dos términos de juicio que se refuerzan mutuamente. 'Ira' y 'furor' preservan esa duplicidad con una distinción natural en español.
  doctrine_reference: 'Lexical pair in HALOT: אַף / חֵמָה'
translation_notes:
  revision_awareness: 'La redacción sigue la revisión inglesa más reciente: mantiene dos infinitivos coordinados (''para pelear... y para llenar...''), evita añadir ''solamente'', y refleja el orden final del hebreo: ''de esta ciudad he escondido mi rostro por toda su maldad''.'
  spanish_consistency_notes:
  - Se usa 'caldeos' para el etnónimo del hebreo, no 'babilonios', conforme al texto fuente.
  - '''Rostro'' se conserva como término bíblico estable para פָּנִים en el modismo de ocultación divina.'
  - '''Maldad'' traduce רָעָה de forma amplia y moral, sin introducir especificaciones no presentes en el hebreo.'
  - El registro evita arcaísmos innecesarios, pero conserva solemnidad y densidad bíblica.
