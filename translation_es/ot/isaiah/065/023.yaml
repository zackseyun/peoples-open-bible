review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura hebrea y preserva los elementos clave: negación doble, labor/parto, descendencia, nombre divino Yahvé y continuidad generacional. Sin embargo, «para el vacío» suena poco natural en español y no comunica con suficiente claridad la idea de labor inútil/fútil de לָרִיק; además, «descendencia de los bendecidos por Yahvé» introduce una formulación algo más enredada que el hebreo, que afirma simplemente que ellos son la descendencia de los bendecidos por Yahvé.'
  spanish_quality_summary: El texto es mayormente claro y digno, pero puede pulirse para una lectura más natural y eclesial. «No trabajarán en vano» expresa mejor el sentido en español que «para el vacío». También conviene simplificar «porque son descendencia de los bendecidos por Yahvé» a «porque ellos son la descendencia de los bendecidos por Yahvé» o similar para reflejar mejor הֵמָּה y mejorar el flujo. El resto es sólido; «darán a luz para la calamidad» es aceptable, aunque algo literal, y la nota conserva bien la amplitud semántica de בֶּהָלָה.
  glossary_alignment: Alinea correctamente יְהוָה como «Yahvé». No hay conflicto con otros términos doctrinales del glosario. La principal cuestión léxica es que, aunque el inglés documenta «for emptiness», el español no necesita calcarlo; «en vano» preserva fielmente el sentido de רִיק de forma idiomática y más legible.
  issues:
  - severity: medium
    issue: «para el vacío» es un calco poco natural de לָרִיק
    rationale: Aunque intenta seguir la imagen del inglés auditado, en español bíblico contemporáneo suena extraño y menos inteligible que «en vano», que comunica con precisión la futilidad del trabajo.
  - severity: low
    issue: La cláusula «porque son descendencia de los bendecidos por Yahvé» puede expresarse con más claridad
    rationale: El hebreo incluye הֵמָּה enfático; añadir «ellos» ayuda levemente, y la frase puede mantenerse sencilla sin perder fidelidad.
  revised_spanish_text: No trabajarán en vano, ni darán a luz para la calamidad[a], porque ellos son la descendencia de los bendecidos por Yahvé, y sus descendientes con ellos.
  revised_footnotes:
