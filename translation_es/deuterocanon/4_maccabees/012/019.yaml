translation:
  language: es
  text: Pero incluso en la vida presente[a], y después de que mueras, él te castigará.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''incluso en esta vida y cuando hayas muerto, te castigará.'''
