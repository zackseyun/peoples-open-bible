translation:
  language: es
  text: Pues ¿por qué, cuando nos vemos impulsados hacia los alimentos prohibidos, nos apartamos de los placeres que provienen de ellos? ¿No es porque la razón puede prevalecer sobre los deseos[a]? Yo creo que sí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'apetitos'; el término griego puede enfatizar el deseo corporal en este contexto de comida.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπεὶ
  english_pob_choice: For why is it that
  chosen_spanish: Pues ¿por qué
  alternatives_spanish:
  - Porque
  - ¿Por qué entonces?
  - Ya que
  lexicon: LSJ
  rationale: En este contexto introduce una pregunta retórica explicativa. 'Pues ¿por qué' conserva la fuerza conectiva e interrogativa de forma natural en español.
- source_word: κινούμενοι
  english_pob_choice: we are moved toward
  chosen_spanish: somos movidos hacia
  alternatives_spanish:
  - somos impulsados hacia
  - nos sentimos inclinados hacia
  - nos vemos movidos hacia
  lexicon: LSJ
  rationale: El participio expresa un movimiento o impulso interno hacia los alimentos; 'somos movidos hacia' mantiene esa pasividad/reflexividad sin alejarse del griego.
- source_word: τὰς ἀπειρημένας τροφάς
  english_pob_choice: the forbidden foods
  chosen_spanish: los alimentos prohibidos
  alternatives_spanish:
  - los alimentos vedados
  - los alimentos que han sido prohibidos
  - las comidas prohibidas
  lexicon: LSJ
  rationale: ἀπειρημένας significa 'prohibidas, vedadas'; τροφάς aquí se refiere a alimentos. 'Alimentos prohibidos' es claro y fiel.
- source_word: ἀποτρεπόμεθα
  english_pob_choice: we turn away from
  chosen_spanish: nos apartamos de
  alternatives_spanish:
  - nos alejamos de
  - nos desviamos de
  - nos retiramos de
  lexicon: LSJ
  rationale: El verbo sugiere apartarse o volverse lejos de algo. 'Nos apartamos de' preserva la imagen y suena idiomático en español.
- source_word: τὰς ἐξ αὐτῶν ἡδονάς
  english_pob_choice: the pleasures that come from them
  chosen_spanish: los placeres que de ellos provienen
  alternatives_spanish:
  - los placeres que nacen de ellos
  - los placeres derivados de ellos
  - los placeres procedentes de ellos
  lexicon: LSJ
  rationale: La frase indica los placeres originados en esos alimentos. 'Que de ellos provienen' conserva la relación causal sin añadir matices.
- source_word: ὁ λογισμός
  english_pob_choice: reason
  chosen_spanish: la razón
  alternatives_spanish:
  - el juicio racional
  - el razonamiento
  - la mente racional
  lexicon: LSJ
  rationale: En 4 Macabeos λογισμός es la facultad racional que gobierna las pasiones. 'La razón' es la equivalencia más directa y reconocible en español.
- source_word: τῶν ὀρέξεων ἐπικρατεῖν
  english_pob_choice: to prevail over desires
  chosen_spanish: prevalecer sobre los deseos
  alternatives_spanish:
  - dominar los deseos
  - vencer los deseos
  - imponerse a los deseos
  lexicon: LSJ
  rationale: ἐπικρατεῖν significa ser más fuerte que, dominar, prevalecer sobre. 'Prevalecer sobre' mantiene el sentido comparativo del griego.
- source_word: ἐγὼ μὲν οἶμαι
  english_pob_choice: I think so
  chosen_spanish: Yo pienso que sí
  alternatives_spanish:
  - Así lo pienso
  - Eso pienso yo
  - Yo creo que sí
  lexicon: LSJ
  rationale: La expresión cierra con una afirmación personal moderada. 'Yo pienso que sí' reproduce bien el matiz conclusivo e idiomático.
theological_decisions:
- issue: La relación entre razón y deseos en 4 Macabeos
  english_pob_reading: reason is able to prevail over desires
  chosen_spanish_reading: la razón puede prevalecer sobre los deseos
  alternative_spanish_readings:
  - la razón puede dominar los deseos
  - el juicio racional puede vencer los deseos
  rationale: 'El pasaje formula una tesis antropológica-filosófica central: la facultad racional puede gobernar los impulsos. ''Prevalecer sobre'' mantiene la tensión sin convertirla en un lenguaje doctrinal ajeno al texto.'
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; readable modern Spanish, not academic.'
