  text: וְ/אִשָּׁה֙ כִּֽי תִהְיֶ֣ה זָבָ֔ה דָּ֛ם יִהְיֶ֥ה זֹבָ֖/הּ בִּ/בְשָׂרָ֑/הּ שִׁבְעַ֤ת יָמִים֙ תִּהְיֶ֣ה בְ/נִדָּתָ֔/הּ וְ/כָל הַ/נֹּגֵ֥עַ בָּ֖/הּ יִטְמָ֥א עַד הָ/עָֽרֶב־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/leviticus/015/019.yaml
  text: When a woman has a discharge[a], and her discharge in her body is blood, she shall remain in her menstrual impurity seven days[b], and everyone who touches her shall be unclean until evening.
  footnotes:
  - marker: a
    text: Or 'in her flesh.' The Hebrew is more literally 'in her flesh/body.'
    reason: lexical_alternative
  - marker: b
    text: '''Menstrual impurity'' refers to ritual uncleanness in Levitical law, not necessarily to moral wrongdoing.'
    reason: cultural_note
