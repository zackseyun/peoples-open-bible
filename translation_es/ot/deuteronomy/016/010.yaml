revisions:
- from: Entonces celebrarás la Fiesta de las Semanas para Yahvé tu Dios con una ofrenda voluntaria como tributo[a] de tu mano, que darás conforme a cómo Yahvé tu Dios te bendiga.
  to: Entonces celebrarás la Fiesta de las Semanas para Yahvé tu Dios con el tributo de una ofrenda voluntaria de tu mano[a], que darás según lo que Yahvé tu Dios te haya bendecido.
  rationale: Se ajustó «como tributo» a «con el tributo de» para reflejar mejor la función nominal de מִסַּת sin convertirla en comparación. Se mantuvo «ofrenda voluntaria de tu mano» por fidelidad al hebreo y al razonamiento léxico auditado. También se cambió «conforme a cómo» por «según lo que ... te haya bendecido» para lograr un español más natural que preserve la idea de proporcionalidad basada en la bendición divina.
  reviewer_model: gpt-5.4
