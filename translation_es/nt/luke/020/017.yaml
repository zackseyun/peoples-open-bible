translation:
  language: es
  text: 'Pero él los miró y dijo[a]: «¿Qué, pues, es esto que está escrito: “La piedra que rechazaron los constructores, esta piedra ha llegado a ser la cabeza del ángulo”?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «la piedra angular»; también, «la piedra de remate». El griego dice literalmente: «la cabeza del ángulo».'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐμβλέψας
  english_pob_choice: looked at
  chosen_spanish: los miró
  alternatives_spanish:
  - fijó la vista en ellos
  - los observó
  lexicon: BDAG
  rationale: El participio aoristo expresa una mirada deliberada dirigida a ellos. «Los miró» es natural en español y conserva la direccionalidad sin exagerar la intensidad.
- source_word: Τί οὖν ἐστιν τὸ γεγραμμένον τοῦτο
  english_pob_choice: What then is this that is written
  chosen_spanish: ¿Qué, pues, es esto que está escrito
  alternatives_spanish:
  - ¿Qué, pues, es esto que ha sido escrito
  - ¿Qué, pues, significa este pasaje
  lexicon: BDAG
  rationale: Se mantiene la fuerza retórica y el sentido del participio perfecto pasivo con una formulación natural en español. «Está escrito» conserva la fórmula bíblica sin convertirla en una paráfrasis interpretativa.
- source_word: Λίθον
  english_pob_choice: The stone
  chosen_spanish: La piedra
  alternatives_spanish:
  - Una piedra
  lexicon: BDAG
  rationale: Aunque el sustantivo aparece sin artículo en la cita, la cita reconocible del Salmo favorece en español el artículo definido para señalar una referencia específica y conocida.
- source_word: ἀπεδοκίμασαν
  english_pob_choice: rejected
  chosen_spanish: rechazaron
  alternatives_spanish:
  - desestimaron
  - desecharon
  lexicon: BDAG
  rationale: «Rechazaron» transmite el valor evaluativo y de exclusión del verbo de manera clara y estándar, sin suavizarlo.
- source_word: οἰκοδομοῦντες
  english_pob_choice: the builders
  chosen_spanish: los constructores
  alternatives_spanish:
  - los que edificaban
  - los edificadores
  lexicon: BDAG
  rationale: El participio sustantivado se vierte de forma idiomática como «los constructores», conservando la imagen arquitectónica.
- source_word: οὗτος
  english_pob_choice: this has become / this one
  chosen_spanish: esta
  alternatives_spanish:
  - esta piedra
  - ésta
  lexicon: BDAG
  rationale: Se preserva el énfasis del demostrativo sin introducir una glosa excesiva. En español, repetir «la piedra» o usar «esta» mantiene la referencia enfática del griego.
- source_word: ἐγενήθη εἰς
  english_pob_choice: has become
  chosen_spanish: ha llegado a ser
  alternatives_spanish:
  - se ha convertido en
  - vino a ser
  lexicon: BDAG
  rationale: «Ha llegado a ser» conserva el sentido resultativo de γίνομαι en una cita con significado perdurable, y suena más natural que un calco rígido.
- source_word: κεφαλὴν γωνίας
  english_pob_choice: the head of the corner
  chosen_spanish: la cabeza del ángulo
  alternatives_spanish:
  - la piedra angular
  - la clave de la esquina
  - la piedra principal del ángulo
  lexicon: BDAG
  rationale: Se conserva la expresión más transparente y literal, porque la imagen arquitectónica admite varias interpretaciones y el texto fuente mantiene la tensión léxica. «La piedra angular» u otras opciones resuelven prematuramente la metáfora.
theological_decisions:
- issue: Metáfora arquitectónica de la cita del Salmo 118:22
  english_pob_reading: the head of the corner
  chosen_spanish_reading: la cabeza del ángulo
  alternative_spanish_readings:
  - la piedra angular
  - la capstone
  rationale: La frase griega permite varias lecturas tradicionales. Se preserva en el cuerpo del texto la forma más literal para no cerrar indebidamente el sentido. Las alternativas se registran como equivalentes interpretativos posibles.
  doctrine_reference: Translation philosophy §3; §5
translation_notes:
  revision_awareness: Se incorporó la revisión del audit trail que prefirió «escrito»/«está escrito» como fórmula natural frente a un calco más pesado. La traducción española mantiene esa naturalidad y conserva la tensión interpretativa de κεφαλὴ γωνίας mediante una nota alternativa.
  spanish_consistency_notes:
  - Se usa «piedra» para λίθος y «constructores» para οἰκοδομοῦντες, preservando el campo arquitectónico.
  - «Ha llegado a ser» refleja el valor resultativo de ἐγενήθη sin convertir la cita en una explicación doctrinal.
  - La nota al pie está anclada en el texto con [a], evitando notas sin marca visible.
