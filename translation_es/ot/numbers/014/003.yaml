revisions:
- from: ¿Y por qué Yahvé nos está llevando a esta tierra para caer bajo la espada? Nuestras mujeres y nuestros pequeños serán [a] botín. ¿No sería mejor para nosotros regresar a Egipto?
  to: ¿Y por qué Yahvé nos está llevando a esta tierra para caer bajo la espada? Nuestras esposas y nuestros pequeños serán botín[a]. ¿No sería mejor para nosotros regresar a Egipto?
