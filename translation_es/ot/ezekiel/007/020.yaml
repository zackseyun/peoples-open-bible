translation:
  language: es
  text: Y convirtieron la hermosura de su adorno en soberbia, y con él[a] hicieron las imágenes de sus abominaciones, sus cosas detestables; por eso la he hecho para ellos una cosa impura[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''en él''. La frase hebrea puede indicar lugar o material/instrumento: hicieron allí las imágenes, o las hicieron con ello.'
    reason: lexical_alternative
  - marker: b
    text: La expresión 'una cosa impura' traduce un término hebreo asociado con impureza ritual; alternativamente, 'algo que debe rechazarse'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּצְבִי
  english_pob_choice: the beauty
  chosen_spanish: la hermosura
  alternatives_spanish:
  - la belleza
  - el esplendor
  - la gloria
  lexicon: HALOT
  rationale: צְבִי expresa belleza, esplendor o gloria. En español, 'hermosura' conserva el valor estético/evaluativo del sustantivo sin volverse demasiado abstracto.
- source_word: עֶדְיוֹ
  english_pob_choice: his ornament
  chosen_spanish: su adorno
  alternatives_spanish:
  - su ornamento
  - su adorno precioso
  - sus joyas
  lexicon: HALOT
  rationale: עֶדְי designa adorno o adorno valioso. 'Su adorno' mantiene la referencia singular y la cadena posesiva sin especificar indebidamente si se trata de joyería o de un adorno más amplio.
- source_word: לְגָאוֹן
  english_pob_choice: into pride
  chosen_spanish: un motivo de soberbia
  alternatives_spanish:
  - para soberbia
  - en soberbia
  - como soberbia
  lexicon: HALOT
  rationale: גָּאוֹן puede significar orgullo o majestad. En este contexto de juicio, el matiz negativo es el relevante. 'Un motivo de soberbia' comunica el resultado sin forzar un giro poco natural en español.
- source_word: שָׂמָהוּ
  english_pob_choice: made ... into
  chosen_spanish: hicieron ...
  alternatives_spanish:
  - pusieron ...
  - lo hicieron ...
  - lo colocaron ...
  lexicon: HALOT
  rationale: שׂים tiene un sentido amplio de poner, colocar o hacer. Aquí expresa transformación de estado, por eso el español usa 'hicieron' con complemento predicativo para reflejar el cambio de valor o uso.
- source_word: וְצַלְמֵי תוֹעֲבֹתָם
  english_pob_choice: the images of their abominations
  chosen_spanish: las imágenes de sus abominaciones
  alternatives_spanish:
  - las imágenes de sus cosas abominables
  - las imágenes de sus idolatrías
  lexicon: HALOT
  rationale: צֶלֶם es 'imagen' y תּוֹעֵבָה es 'abominación'. La construcción en español conserva la relación genitiva del hebreo y deja abierto que se trata de imágenes vinculadas a prácticas idólatras.
- source_word: שִׁקּוּצֵיהֶם
  english_pob_choice: their detestable things
  chosen_spanish: sus cosas detestables
  alternatives_spanish:
  - sus detestables ídolos
  - sus abominaciones
  - sus cosas repugnantes
  lexicon: HALOT
  rationale: שִׁקּוּץ suele referirse a cosa detestable, con frecuencia un ídolo. Como el término anterior ya dice 'abominaciones', aquí conviene mantener una distinción léxica con 'cosas detestables'.
- source_word: עָשׂוּ בּוֹ
  english_pob_choice: they made ... in it
  chosen_spanish: hicieron ... en ella
  alternatives_spanish:
  - hicieron ... con ella
  - hicieron ... de ella
  - hicieron ... dentro de ella
  lexicon: HALOT
  rationale: La preposición ב puede indicar lugar o instrumento/material. 'En ella' conserva la ambigüedad del hebreo y permite leer tanto ubicación como uso material/instrumental del objeto.
- source_word: נְתַתִּיו לָהֶם
  english_pob_choice: I have made it to them
  chosen_spanish: la he hecho para ellos
  alternatives_spanish:
  - la he dado a ellos
  - la he hecho para ellos como
  lexicon: HALOT
  rationale: נָתַן aquí funciona en un giro resultativo junto con לְנִדָּה. El español 'la he hecho para ellos' expresa bien que Yahvé la ha convertido en algo para ellos, sin perder la idea de juicio.
- source_word: לְנִדָּה
  english_pob_choice: an unclean thing
  chosen_spanish: una cosa impura
  alternatives_spanish:
  - una impureza
  - algo impuro
  - una cosa inmunda
  lexicon: HALOT
  rationale: נִדָּה designa impureza ritual y, por extensión, algo rechazable. 'Una cosa impura' preserva la dimensión cultual y moral sin introducir una expresión demasiado técnica o arcaica.
theological_decisions:
- issue: 'La condición final del objeto: impureza ritual y rechazo judicial'
  english_pob_reading: render as ritual-moral uncleanness ('an unclean thing') rather than a purely metaphorical 'rejection'
  chosen_spanish_reading: una cosa impura
  alternative_spanish_readings:
  - algo rechazado
  - una impureza
  - una cosa inmunda
  rationale: El verso no solo declara desaprobación; expresa que el objeto quedó bajo un estatuto de impureza en el marco del juicio divino. 'Una cosa impura' mantiene esa tensión ritual-moral sin resolverla solo como rechazo abstracto.
  doctrine_reference: Ezequiel 7:20; pureza ritual e idolatría en el juicio profético
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión auditada que añadió la conjunción inicial 'And'; por eso el español comienza con 'Y'. También se conservó la distinción léxica entre תּוֹעֲבֹתָם y שִׁקּוּצֵיהֶם, evitando colapsarlos en un solo término.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para el hablante implícito cuando el contexto profético corresponde al divino nombre.
  - Se evita 'SEÑOR' como sustituto encubridor del nombre divino.
  - Se conserva la diferencia entre 'abominaciones' y 'cosas detestables' para reflejar la doble cadena hebrea.
  - '''Impura'' se eligió frente a ''inmunda'' por ser más neutral y publicable en español contemporáneo.'
