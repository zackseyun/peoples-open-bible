  verdict: revise
  source_alignment_summary: 'El borrador español no sigue el hebreo fuente primario. El hebreo dice: «Yahvé endureció el corazón de Faraón, quien no lo conoció, porque sus obras están reveladas bajo el cielo». El inglés POB también sigue ese hebreo y solo conserva el griego en nota como variante textual sustancial. El borrador, en cambio, traduce el paralelo griego como texto principal, invirtiendo la prioridad textual documentada.'
  spanish_quality_summary: El español del borrador es natural, pero corresponde al texto equivocado. La revisión propuesta produce un español claro y digno, manteniendo el eco bíblico de «endureció el corazón» y la sintaxis comprensible en español. Se ajusta mejor al sentido concesivo/explanatorio del hebreo.
  glossary_alignment: Debe usarse «Yahvé» para יהוה, no «Señor». «Faraón», «corazón», «obras» y «bajo el cielo» encajan bien con la terminología y el registro del proyecto. La variante griega debe quedar en nota, no en el cuerpo principal.
  issues:
  - severity: high
    issue: Se tradujo el paralelo griego como texto principal en lugar del hebreo conservado.
    rationale: La política documentada del proyecto para Sirácides da primacía al hebreo donde existe. Aquí tanto la evidencia fuente como el English POB siguen el hebreo; el griego solo se conserva como variante en nota.
  - severity: high
    issue: La decisión teológica/textual del borrador contradice explícitamente la auditoría inglesa.
    rationale: 'El borrador afirma que la línea principal sigue el griego, pero la auditoría inglesa estableció lo contrario: texto principal desde el hebreo y nota para la variante griega.'
  - severity: medium
    issue: 'Falta reflejar en español el contenido semántico completo del hebreo: endurecimiento del corazón de Faraón, desconocimiento de Yahvé, y revelación de las obras bajo el cielo.'
    rationale: El texto actual omite casi todo el versículo hebreo y por tanto no preserva el significado fuente.
  revised_spanish_text: Yahvé endureció el corazón de Faraón[a], aunque él no lo conocía, porque sus obras están reveladas bajo el cielo.
  revised_footnotes:
  - marker: a
    text: 'Paralelo griego: «No digas: “Me ocultaré del Señor”». El testimonio griego aquí difiere sustancialmente de la línea hebrea conservada, lo que sugiere una forma textual o una alineación de versículo distinta.'
    reason: textual_variant
