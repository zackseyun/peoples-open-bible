translation:
  language: es
  text: He aquí, estos son los impíos, siempre tranquilos[a]; aumentan su riqueza[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «siempre seguros» / «en seguridad perpetua». La expresión hebrea es literalmente «en reposo de/para siempre», un modismo para prosperidad o seguridad duraderas.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «han adquirido riqueza» o «han aumentado sus riquezas». El verbo puede enfatizar tanto el hecho de obtener bienes como su incremento.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  english_pob_choice: Behold
  chosen_spanish: He aquí
  alternatives_spanish:
  - Mira
  - Miren
  - He aquí
  lexicon: HALOT
  rationale: La partícula deíctica introduce una afirmación enfática. «He aquí» mantiene el tono formal y bíblico sin sonar tan arcaico como «He aquí» en contextos modernos, y conserva la fuerza de atención del hebreo.
- source_word: רְשָׁעִים
  english_pob_choice: the wicked
  chosen_spanish: los impíos
  alternatives_spanish:
  - los malvados
  - los injustos
  - los perversos
  lexicon: HALOT
  rationale: En Salmos, «impíos» es un equivalente natural y reverente para la categoría moral del texto. Conserva el carácter colectivo y definido del sustantivo sin ampliar el sentido.
- source_word: וְשַׁלְוֵי עוֹלָם
  english_pob_choice: always at ease
  chosen_spanish: siempre en reposo
  alternatives_spanish:
  - siempre tranquilos
  - en continua seguridad
  - en paz perpetua
  lexicon: HALOT
  rationale: La construcción hebrea comunica una condición prolongada de bienestar, seguridad o ausencia de perturbación. «Siempre en reposo» preserva la idea de permanencia y facilidad, aunque en español no reproduce de forma literal la metáfora de «seguridad»; por eso se conserva la alternativa semántica en la nota.
- source_word: הִשְׂגּוּ
  english_pob_choice: increase
  chosen_spanish: aumentan
  alternatives_spanish:
  - han aumentado
  - se han enriquecido
  - alcanzan
  lexicon: HALOT
  rationale: El verbo expresa crecimiento o incremento en el contexto de prosperidad. El presente «aumentan» sigue la decisión inglesa de reflejar el valor aspectual como una observación actual y vivida en el poema.
- source_word: חָיִל
  english_pob_choice: wealth
  chosen_spanish: riqueza
  alternatives_spanish:
  - bienes
  - caudal
  - fortuna
  lexicon: HALOT
  rationale: En este contexto económico, «riqueza» comunica con claridad el campo semántico de recursos acumulados. Es más natural en español que «fuerza» y mantiene la lectura de prosperidad material.
translation_notes:
  revision_awareness: 'La redacción española sigue la última revisión inglesa en dos puntos: usa una apertura más formal y conserva el presente para el verbo final, reflejando el valor observacional del hebreo en contexto. También mantiene la lectura de prosperidad material para חָיִל, evitando introducir una idea militar no indicada aquí.'
  spanish_consistency_notes:
  - Se prefirió «impíos» para alinear con el registro poético de Salmos y con la categoría moral definida del hebreo.
  - «He aquí» funciona como equivalente idiomático de la partícula deíctica inicial; se evita una calca excesivamente literal.
  - «Siempre en reposo» intenta unir la idea de permanencia con la de tranquilidad/seguridad; la nota preserva la alternativa más literal de seguridad duradera.
  - «Aumentan en riqueza» conserva la observación general del poema sin forzar un pasado perfecto que el hebreo no exige.
