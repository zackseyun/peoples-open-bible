theological_decisions:
- issue: 'Ethical contrast in the first colon: whether the negative command forbids withholding from evil in general or aiding an evil/sinful person'
  chosen_reading: 'The line forbids supporting a sinful person: ''do not support the sinner.'''
  alternative_readings:
  - withhold from evil
  - do not help an evildoer
  rationale: The Hebrew alone could be read more abstractly, but the Greek parallel explicitly personalizes the object as 'the sinner.' Since the task requires using the Greek parallel as actual translation input, the personal reading is preferred in the main text, while preserving the more literal Hebrew possibility in a footnote.
  doctrine_reference: 'Translation philosophy: original-language primacy with parallel-source consultation; preserve ambiguity in footnotes where genuine.'
- issue: Meaning of לְזֵר in the second colon
  chosen_reading: Rendered 'to a stranger' without specifying ethnicity.
  alternative_readings:
  - to a foreigner
  - to an outsider
  rationale: The Hebrew term can denote one outside the relevant social or covenantal circle. 'Stranger' preserves the breadth of the term and avoids importing a narrower ethnic reading not demanded by the text.
  doctrine_reference: 'Translation philosophy: do not import claims the text does not make.'
