lexical_decisions:
- source_word: וְ/אֵלֶּה
  english_pob_choice: Now these are
  chosen_spanish: Ahora bien, estas son
  alternatives_spanish:
  - Y estas son
  - Estas son
  lexicon: HALOT
  rationale: La expresión introduce un nuevo tramo discursivo en la genealogía. «Ahora bien» conserva el matiz de transición del hebreo y suena natural en español bíblico moderno.
- source_word: תּוֹלְדֹת
  english_pob_choice: the generations of
  chosen_spanish: las generaciones de
  alternatives_spanish:
  - la familia de
  - el relato de
  - los descendientes de
  lexicon: HALOT
  rationale: Se mantiene la fórmula estructural tradicional de Génesis para תּוֹלְדֹת, que en este contexto funciona como encabezado genealógico y no solo como «descendientes» en sentido estrecho.
- source_word: תֶּרַח
  english_pob_choice: Terah
  chosen_spanish: Taré
  alternatives_spanish:
  - Téraj
  - Teraj
  lexicon: Transliteración bíblica castellana estándar
  rationale: Se usa la forma española usual del nombre propio, clara y reconocible para lectores bíblicos en español.
- source_word: הוֹלִיד
  english_pob_choice: fathered
  chosen_spanish: engendró
  alternatives_spanish:
  - fue padre de
  - procreó
  lexicon: HALOT
  rationale: El verbo genealógico se expresa con «engendró», que conserva el valor de filiación biológica y la concisión del hebreo sin sonar demasiado coloquial.
- source_word: אֶת אַבְרָם אֶת נָחוֹר וְאֶת הָרָן
  english_pob_choice: Abram, Nahor, and Haran
  chosen_spanish: a Abram, a Nahor y a Harán
  alternatives_spanish:
  - a Abram, a Najor y a Harán
  - Abram, Nahor y Harán
  lexicon: Transliteración bíblica estándar
  rationale: Se conservan los nombres propios en forma bíblica española y se omiten los marcadores de objeto directo, como exige el español natural.
- source_word: וְ/הָרָן
  english_pob_choice: and Haran
  chosen_spanish: y Harán
  alternatives_spanish:
  - Ahora Harán
  - y el mismo Harán
  lexicon: HALOT
  rationale: La conjunción une de manera simple la cláusula final con la anterior, sin sobreinterpretar el valor discursivo.
- source_word: הוֹלִיד אֶת לֽוֹט
  english_pob_choice: fathered Lot
  chosen_spanish: engendró a Lot
  alternatives_spanish:
  - fue padre de Lot
  - procreó a Lot
  lexicon: HALOT
  rationale: Se traduce de modo consistente el mismo verbo genealógico con «engendró», manteniendo paralelismo y fuerza lexical.
