translation:
  language: es
  text: Y sus ojos están puestos en la casa[a] de un hombre en prosperidad[b], como una serpiente, para deshacer la sabiduría de unos y otros con palabras de hombres sin ley[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '"Casa" también puede llevar el sentido de hogar o patrimonio, no solo del edificio en sí.'
    reason: lexical_alternative
  - marker: b
    text: También puede entenderse como "en estabilidad", "en seguridad" o "en bienestar"; el griego puede expresar firmeza o estado asentado, no solo prosperidad material.
    reason: lexical_alternative
  - marker: c
    text: Literalmente, "de hombres sin ley"; el griego usa un genitivo plural sustantivado, no un adjetivo que califique directamente a "palabras".
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ ὀφθαλμοὶ αὐτῶν
  english_pob_choice: their eyes
  chosen_spanish: sus ojos
  alternatives_spanish:
  - su mirada
  - ellos miran
  lexicon: LSJ
  rationale: Conservo la imagen corporal concreta del griego. 'Sus ojos' es directo y mantiene el tono acusatorio sin volverlo abstracto.
- source_word: ἐπʼ οἶκον ἀνδρὸς
  english_pob_choice: on a man's house
  chosen_spanish: en la casa de un hombre
  alternatives_spanish:
  - sobre la casa de un hombre
  - hacia la casa de un hombre
  - en la casa/hogar de un hombre
  lexicon: LSJ
  rationale: '''En la casa de un hombre'' comunica bien la orientación fija de la mirada. ''Casa'' mantiene la imagen fuente y puede abarcar hogar o patrimonio, como indica el audit trail inglés.'
- source_word: ἐν εὐσταθείᾳ
  english_pob_choice: in prosperity
  chosen_spanish: en prosperidad
  alternatives_spanish:
  - en estabilidad
  - en seguridad
  - en bienestar
  lexicon: LSJ
  rationale: La opción principal sigue la lectura contextual de prosperidad, pero conserva en una nota la alternativa semántica de estabilidad/seguridad. 'Prosperidad' es la forma más natural en español para este contexto.
- source_word: ὡς ὄφις
  english_pob_choice: like a snake
  chosen_spanish: como serpiente
  alternatives_spanish:
  - como una serpiente
  - como serpiente
  - como un dragón
  lexicon: LSJ
  rationale: Uso 'serpiente' por naturalidad en español y por la equivalencia del símil predatorio. Mantiene la fuerza imagética sin introducir un término más interpretativo.
- source_word: διαλῦσαι
  english_pob_choice: to undo
  chosen_spanish: para deshacer
  alternatives_spanish:
  - para destruir
  - para derribar
  - para desbaratar
  lexicon: LSJ
  rationale: '''Deshacer'' conserva la idea de desarticular o desmantelar sin exagerar hacia destrucción total. Responde bien al infinitivo de propósito del griego.'
- source_word: σοφίαν ἀλλήλων
  english_pob_choice: one another's wisdom
  chosen_spanish: la sabiduría unos de otros
  alternatives_spanish:
  - la prudencia de los unos y de los otros
  - la sabiduría mutua
  - el buen juicio unos de otros
  lexicon: LSJ
  rationale: Mantengo 'sabiduría' para reflejar σοφία y 'unos de otros' para expresar el valor recíproco. La construcción suena natural en español y preserva la relación mutua.
- source_word: ἐν λόγοις παρανόμων
  english_pob_choice: with lawless words
  chosen_spanish: con palabras de hombres sin ley
  alternatives_spanish:
  - con palabras de transgresores
  - con palabras de los sin ley
  - con palabras impías
  lexicon: LSJ
  rationale: 'Sigo la corrección gramatical del audit trail: παρανόμων es genitivo plural sustantivado, por lo que se entiende mejor como ''de hombres sin ley'' y no como adjetivo que califique directamente a ''palabras''. ''Hombres sin ley'' conserva el matiz jurídico-moral de παράνομος.'
theological_decisions:
- issue: Sentido de εὐσταθία en un contexto de observación envidiosa o predatoria
  english_pob_reading: '''in prosperity'' with note alternatives ''stability,'' ''security,'' or ''well-being'''
  chosen_spanish_reading: '''en prosperidad'', con nota de ''estabilidad'', ''seguridad'' o ''bienestar'''
  alternative_spanish_readings:
  - en estabilidad
  - en seguridad
  - en bienestar
  rationale: 'No hay una decisión doctrinal, pero sí una decisión de sentido contextual: en español ''prosperidad'' comunica mejor el estado favorable del hogar observado, mientras que la nota preserva la amplitud léxica del término griego.'
  doctrine_reference: N/A
- issue: Valor de παρανόμων como genitivo sustantivado, no adjetivo de λόγοις
  english_pob_reading: the ending as 'with lawless words' in the latest revision
  chosen_spanish_reading: con palabras de hombres sin ley
  alternative_spanish_readings:
  - con palabras de transgresores
  - con palabras de los sin ley
  rationale: La revisión inglesa indica correctamente el problema gramatical. En español, 'de hombres sin ley' evita la falsa concordancia y conserva el juicio moral-jurídico del original.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'He seguido la corrección gramatical más reciente del audit trail: παρανόμων no modifica a λόγοις como adjetivo, sino que funciona como genitivo plural sustantivado. Por eso el final no se vierte como ''palabras sin ley'', sino como ''palabras de hombres sin ley''. También conservo la ambigüedad de εὐσταθείᾳ mediante nota, como en el inglés auditado.'
  spanish_consistency_notes:
  - Uso 'Y sus ojos' para mantener el paralelo con el griego y con el inglés POB, sin suavizar la imagen corporal.
  - '''Casa'' se conserva en singular para respetar la metáfora del texto, aunque en la nota se admite la extensión a hogar o patrimonio.'
  - He preferido 'serpiente' sobre 'serpiente antigua' o 'dragón' porque el griego solo dice ὄφις.
  - El cierre evita el calco incorrecto 'palabras de hombres sin ley' en favor de una construcción española transparente y gramaticalmente fiel.
