translation:
  language: es
  text: Y a todo animal de la tierra, y a toda ave de los cielos, y a todo lo que se arrastra sobre la tierra, en lo que hay una criatura viviente[a], toda planta verde es para alimento[b]. Y fue así.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O más literalmente: «en lo que hay un ser viviente» o «en lo que hay un alma viviente».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «Les doy toda planta verde como alimento».'
    reason: previous_rendering
lexical_decisions:
- source_word: חַיַּת הָאָרֶץ
  english_pob_choice: beast of the earth
  chosen_spanish: animal de la tierra
  alternatives_spanish:
  - bestia de la tierra
  - animal terrestre
  - bestia terrestre
  lexicon: HALOT
  rationale: חַיָּה en este contexto de creación designa animales de la tierra. En español, "animal de la tierra" conserva la categoría amplia sin introducir el matiz potencialmente más áspero de "bestia", aunque esta sigue siendo una alternativa posible si se quisiera reflejar con más fuerza el contraste taxonómico del texto.
- source_word: עוֹף הַשָּׁמַיִם
  english_pob_choice: bird of the heavens
  chosen_spanish: ave de los cielos
  alternatives_spanish:
  - ave del cielo
  - pájaro de los cielos
  - ave del firmamento
  lexicon: HALOT
  rationale: עוֹף puede abarcar aves o criaturas voladoras, pero en este pasaje la categoría natural es "ave". "De los cielos" conserva היטב la pluralidad de שָׁמַיִם mejor que "del cielo" y mantiene un registro bíblico claro en español.
- source_word: רוֹמֵשׂ עַל הָאָרֶץ
  english_pob_choice: everything that creeps on the earth
  chosen_spanish: todo lo que se arrastra sobre la tierra
  alternatives_spanish:
  - todo lo que se mueve sobre la tierra
  - toda criatura que se arrastra sobre la tierra
  - todo reptil sobre la tierra
  lexicon: HALOT
  rationale: רוֹמֵשׂ describe criaturas que se desplazan pegadas al suelo, con la imagen concreta de arrastrarse. "Se arrastra" conserva esa imaginería mejor que el más general "se mueve".
- source_word: אֲשֶׁר בּוֹ נֶפֶשׁ חַיָּה
  english_pob_choice: in which there is a living creature
  chosen_spanish: en el cual hay un ser viviente
  alternatives_spanish:
  - en el cual hay una criatura viviente
  - en el cual hay vida
  - en el cual hay un alma viviente
  lexicon: HALOT
  rationale: נֶפֶשׁ חַיָּה en contexto animal significa un ser/creatura viviente, no la noción técnica de "alma" en sentido doctrinal. "Ser viviente" es una forma natural en español que conserva la idea de vida animada sin confundirla con el hebreo más específico de la vida humana o con un calco poco idiomático.
- source_word: אֶת כָּל יֶרֶק עֵשֶׂב
  english_pob_choice: every green plant
  chosen_spanish: toda planta verde
  alternatives_spanish:
  - toda vegetación verde
  - toda hierba verde
  - toda planta de color verde
  lexicon: HALOT
  rationale: יֶרֶק עֵשֶׂב combina la idea de verdor con vegetación/herbaje. "Planta verde" comunica bien la referencia alimentaria y evita el arcaísmo de "hierba" en un contexto donde el español moderno entiende mejor "planta".
- source_word: לְאָכְלָה
  english_pob_choice: for food
  chosen_spanish: para alimento
  alternatives_spanish:
  - para comer
  - como alimento
  - para comida
  lexicon: HALOT
  rationale: El lamed de finalidad expresa propósito. "Para alimento" mantiene un registro más bíblico y sobrio que "para comer", y evita el matiz más coloquial de "comida".
- source_word: וַיְהִי כֵן
  english_pob_choice: And it was so
  chosen_spanish: Y fue así
  alternatives_spanish:
  - Y así fue
  - Y sucedió así
  - Y así fue hecho
  lexicon: HALOT
  rationale: Es la fórmula clásica de cumplimiento en Génesis 1. "Y fue así" es breve, solemne y natural en español.
theological_decisions:
- issue: Valor de נֶפֶשׁ חַיָּה en seres no humanos
  english_pob_reading: The English audit trail preserves the more literal option 'a living creature' and rejects conflation with 'breath of life' from Genesis 2:7.
  chosen_spanish_reading: '"ser viviente" en el texto principal, con la alternativa literal "criatura viviente" reconocida implícitamente por la formulación.'
  alternative_spanish_readings:
  - criatura viviente
  - alma viviente
  - ser con aliento de vida
  rationale: La expresión hebrea aquí califica a animales como portadores de vida animada. En español, "ser viviente" evita tanto el tecnicismo doctrinal de "alma" como la confusión con la frase distinta de Génesis 2:7. Se preserva así la tensión léxica sin importar un sentido ajeno al contexto.
  doctrine_reference: Translation philosophy §3, §6
- issue: Relación entre el decreto divino y la provisión alimentaria
  english_pob_reading: 'The English revision removed an implied ''I give'' not present in the verse and rendered the clause as a statement of provision: ''every green plant is for food.'''
  chosen_spanish_reading: '"toda planta verde será para alimento" como enunciado de provisión establecida.'
  alternative_spanish_readings:
  - toda planta verde es para alimento
  - toda planta verde les será para alimento
  - doy toda planta verde para alimento
  rationale: El hebreo presenta la asignación de alimento como hecho/decreto, no como una adición de "yo doy" en esta línea. El futuro "será" comunica adecuadamente la disposición vigente en el marco narrativo sin introducir un sujeto verbal inexistente en el versículo.
  doctrine_reference: Translation philosophy §2, §4
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del audit trail que eliminó una provisión verbal inexistente en el versículo y mantuvo la cláusula como declaración de asignación de alimento. También evita la confusión corregida entre נֶפֶשׁ חַיָּה y la expresión distinta de Génesis 2:7 para no trasladar inadvertidamente «aliento de vida» a este texto.
  spanish_consistency_notes:
  - Se mantiene "Yahvé" como convención general del proyecto solo cuando el texto lo requiera; aquí no aparece el tetragrámaton.
  - '"Cielos" conserva el plural hebreo de שָׁמַיִם.'
  - Se eligió "ser viviente" en vez de "alma viviente" para no introducir una carga antropológica no sustentada por el contexto.
  - 'El orden de miembros sigue la secuencia del hebreo: tierra, aves, reptiles, alimento, cumplimiento.'
