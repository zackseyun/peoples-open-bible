translation:
  language: es
  text: Y cuando todo esto se terminó, todo Israel que se hallaba presente salió a las ciudades de Judá, y quebraron los pilares, cortaron los asherim[a], derribaron los lugares altos y los altares, por todo Judá y Benjamín, y en Efraín y Manasés, hasta destruirlos por completo. Entonces todos los hijos de Israel regresaron, cada hombre a su posesión, a sus ciudades.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “postes de Aserá” / “árboles sagrados de Aserá”. El hebreo אֲשֵׁרִים puede designar objetos de culto asociados con Aserá, a menudo entendidos como postes o árboles.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּכְכַלּוֹת כָּל זֹאת
  english_pob_choice: And when all this was finished
  chosen_spanish: Y cuando todo esto hubo terminado
  alternatives_spanish:
  - Y cuando todo esto se hubo terminado
  - Y al terminarse todo esto
  lexicon: HALOT
  rationale: La construcción temporal se expresa naturalmente en español con una subordinada de tiempo. «Hubo terminado» mantiene el valor perfectivo y el carácter anterior del hebreo sin introducir un sujeto explícito. Se evita una paráfrasis excesiva.
- source_word: כָּל יִשְׂרָאֵל הַנִּמְצְאִים
  english_pob_choice: all Israel who were present
  chosen_spanish: todo Israel que se hallaba presente
  alternatives_spanish:
  - todo Israel que estaba presente
  - todo Israel hallado allí
  lexicon: HALOT
  rationale: El participio hebreo comunica presencia/asistencia. «Se hallaba presente» conserva la idea de estar allí, con un español digno y natural. Se evita «hallado» por ser más áspero y menos idiomático en este contexto.
- source_word: לְעָרֵי יְהוּדָה
  english_pob_choice: to the cities of Judah
  chosen_spanish: a las ciudades de Judá
  alternatives_spanish:
  - hacia las ciudades de Judá
  - a las ciudades de Judea
  lexicon: HALOT
  rationale: La preposición de dirección se traduce simplemente con «a». «Judá» se conserva como nombre territorial bíblico, no como «Judea», porque el contexto es el reino/territorio de Judá.
- source_word: וַיְשַׁבְּר֣וּ הַמַּצֵּבֹת
  english_pob_choice: shattered the pillars
  chosen_spanish: quebró los pilares
  alternatives_spanish:
  - destruyeron los pilares
  - hizo pedazos los pilares
  lexicon: HALOT
  rationale: מַצֵּבֹת son estelas o pilares cultuales. «Pilares» mantiene la forma breve y el referente cultual del contexto. «Quebró» conserva el valor fuerte de שׁבר; aunque el hebreo es plural, el sujeto colectivo admite la concordancia singular verbal en español por estilo literario, pero se mantiene el plural semántico en el objeto.
- source_word: וַיְגַדְּעוּ הָאֲשֵׁרִים
  english_pob_choice: cut down the Asherim
  chosen_spanish: cortó los asherim[a]
  alternatives_spanish:
  - cortó los postes de Aserá
  - derribó las Aseras
  lexicon: HALOT
  rationale: Se conserva el término transliterado «asherim» para no forzar una identificación única que el hebreo plural deja abierta. La nota explica que puede referirse a objetos de culto asociados con Aserá, frecuentemente entendidos como postes o árboles sagrados. Se usa transliteración por fidelidad al plural hebreo y para preservar la tensión lexical documentada.
- source_word: וַיְנַתְּצ֣וּ אֶת הַבָּמוֹת
  english_pob_choice: tore down the high places
  chosen_spanish: derribó los lugares altos
  alternatives_spanish:
  - derribó los altos lugares
  - destruyó los santuarios altos
  lexicon: HALOT
  rationale: «Lugares altos» es la forma castellana más clara para בָּמוֹת; «derribó» refleja bien el sentido de demolición de נָתַץ. Se mantiene el plural cultual sin sustituirlo por un término más interpretativo.
- source_word: וְאֶת הַמִּזְבְּחֹת
  english_pob_choice: and the altars
  chosen_spanish: y los altares
  alternatives_spanish:
  - y los sacrificaderos
  - y los altares de culto
  lexicon: HALOT
  rationale: מִזְבְּחֹת significa de manera directa «altares». No se añade glosa al cuerpo del texto porque el contexto ya los identifica como objetos de destrucción cultual.
- source_word: מִכָּל יְהוּדָה וּבִנְיָמִן וּבְאֶפְרַיִם וּמְנַשֶּׁה
  english_pob_choice: throughout all Judah and Benjamin, and in Ephraim and Manasseh
  chosen_spanish: por todo Judá y Benjamín, y en Efraín y Manasés
  alternatives_spanish:
  - a lo largo de todo Judá y Benjamín, y en Efraín y Manasés
  - en todo Judá y Benjamín, y en Efraín y Manasés
  lexicon: HALOT
  rationale: La secuencia hebrea indica alcance territorial. «Por todo» reproduce bien la extensión distributiva y es natural en español. Se respeta el cambio de preposición antes de Efraín y Manasés, siguiendo la alternancia del hebreo sin sobreexplicarla.
- source_word: עַד לְכַלֵּה
  english_pob_choice: until they had completely destroyed them
  chosen_spanish: hasta acabar por completo
  alternatives_spanish:
  - hasta destruirlos por completo
  - hasta terminar completamente
  lexicon: HALOT
  rationale: El infinitivo de culminación expresa totalización. En español, «hasta acabar por completo» comunica el cierre completo de la acción sin añadir un objeto implícito demasiado marcado cuando el referente ya es claro en el contexto inmediato.
- source_word: וַיָּשׁוּבוּ כָּל בְּנֵי יִשְׂרָאֵל
  english_pob_choice: Then all the sons of Israel returned
  chosen_spanish: Entonces todos los hijos de Israel regresaron
  alternatives_spanish:
  - Entonces todos los hijos de Israel volvieron
  - Luego regresaron todos los hijos de Israel
  lexicon: HALOT
  rationale: «Hijos de Israel» traduce el ethnónimo masculino explícito del hebreo. «Regresaron» mantiene el movimiento de retorno sin sonar repetitivo junto a «a sus ciudades».
- source_word: אִישׁ לַאֲחֻזָּתוֹ
  english_pob_choice: each man to his possession
  chosen_spanish: cada hombre a su posesión
  alternatives_spanish:
  - cada uno a su posesión
  - cada hombre a su propiedad
  lexicon: HALOT
  rationale: אֲחֻזָּה puede ser posesión heredada o tenencia territorial. «Posesión» es lo bastante amplio para conservar esa ambigüedad sin convertirla en un tecnicismo más estrecho como «heredad» o «propiedad».
- source_word: לְעָרֵיהֶם
  english_pob_choice: to their cities
  chosen_spanish: a sus ciudades
  alternatives_spanish:
  - a las ciudades de ellos
  - a sus poblaciones
  lexicon: HALOT
  rationale: El sufijo plural se expresa naturalmente con «sus». «Ciudades» sigue el hebreo sin introducir una equivalencia más libre como «poblaciones».
theological_decisions:
- issue: Preservación del etnónimo masculino en בני ישראל
  english_pob_reading: Then all the sons of Israel returned
  chosen_spanish_reading: Entonces todos los hijos de Israel regresaron
  alternative_spanish_readings:
  - Entonces todos los israelitas regresaron
  - Entonces todo el pueblo de Israel regresó
  rationale: El hebreo usa una forma masculina explícita. Se conserva el parentesco masculino del texto sin sugerir exclusión de mujeres; funciona como designación colectiva heredada del original.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Tensión lexical en אֲשֵׁרִים
  english_pob_reading: cut down the Asherim
  chosen_spanish_reading: cortó los asherim[a]
  alternative_spanish_readings:
  - cortó los postes de Aserá
  - cortó los árboles sagrados de Aserá
  rationale: El hebreo plural puede referirse a objetos de culto asociados con Aserá, pero no obliga a una sola concreción física. La transliteración preserva esa tensión y la nota ofrece la alternativa lexical sin resolverla indebidamente en el texto principal.
  doctrine_reference: HALOT; audit trail footnote a
- issue: Derribo de objetos cultuales con lenguaje intensivo
  english_pob_reading: shattered... cut down... tore down
  chosen_spanish_reading: quebró... cortó... derribó
  alternative_spanish_readings:
  - hizo pedazos... abatió... demolió
  - rompió... taló... destruyó
  rationale: 'Se conserva la gradación verbal del hebreo: romper, cortar, derribar. No se uniforma con un verbo genérico de destrucción porque el original distingue las acciones y sus objetos cultuales.'
  doctrine_reference: Source-text lexical distinction
translation_notes:
  revision_awareness: The English POB audit trail preserves a late revision from “from all Judah and Benjamin” to “throughout all Judah and Benjamin” for better scope rendering. The Spanish draft follows that revised sense with “por todo Judá y Benjamín,” while also preserving the documented lexical openness of אֲשֵׁרִים through transliteration and a footnote rather than collapsing it into one interpretive equivalent.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se usa «hijos de Israel» para reflejar la forma masculina explícita del hebreo, coherente con el criterio de transparencia del proyecto.
  - Se conserva la secuencia verbal de destrucción cultual sin suavizarla a un solo verbo genérico.
  - «Lugares altos» y «altares» se mantienen como términos bíblicos estables y comprensibles en español.
  - La nota sobre «asherim» preserva una alternativa real sin introducir vocabulario eclesiástico ajeno al hebreo.
