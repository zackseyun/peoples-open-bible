translation:
  language: es
  text: Y te haré extremadamente fecundo[a], y haré naciones de ti, y reyes saldrán de ti[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «muy, muy»'
    reason: lexical_alternative
  - marker: b
    text: O, «vendrán de ti»
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִפְרֵתִי
  english_pob_choice: I will make you exceedingly fruitful
  chosen_spanish: te haré extremadamente fecundo
  alternatives_spanish:
  - te haré muy, muy fecundo
  - te haré sumamente fecundo
  - te haré fructificar en gran manera
  lexicon: HALOT
  rationale: El hifil de פרה expresa hacer fértil o fecundo. «Hacer fecundo» conserva el valor causativo mejor que un simple «multiplicar», y «extremadamente» refleja la intensificación del doble מְאֹד sin sonar tan perifrástico como «muy, muy».
- source_word: בִּמְאֹד מְאֹד
  english_pob_choice: exceedingly
  chosen_spanish: extremadamente
  alternatives_spanish:
  - en gran manera
  - muchísimo
  - muy, muy
  lexicon: HALOT
  rationale: La repetición intensiva se vierte con un adverbio fuerte y natural en español. «Extremadamente» comunica la fuerza enfática del hebreo sin perder legibilidad.
- source_word: וּנְתַתִּיךָ לְגוֹיִם
  english_pob_choice: and I will make nations from you
  chosen_spanish: y te convertiré en naciones
  alternatives_spanish:
  - y te pondré para naciones
  - y haré naciones de ti
  - y haré naciones de tu linaje
  lexicon: HALOT
  rationale: 'Con נתן + ל, el sentido es resultativo: Abraham llega a ser origen de naciones. «Convertiré en naciones» comunica el resultado de forma natural en español, manteniendo la relación causal y genealógica.'
- source_word: לְגוֹיִם
  english_pob_choice: nations
  chosen_spanish: naciones
  alternatives_spanish:
  - pueblos
  - gentiles
  lexicon: HALOT
  rationale: גּוֹיִם aquí designa agrupaciones nacionales descendientes de Abraham. «Naciones» es la opción más precisa y evita una lectura eclesiástica ajena al contexto patriarcal.
- source_word: וּמְלָכִים
  english_pob_choice: and kings
  chosen_spanish: y reyes
  alternatives_spanish:
  - y gobernantes
  - y monarcas
  lexicon: HALOT
  rationale: מְלָכִים significa literalmente «reyes». Se conserva el término exacto porque el texto promete descendencia real, no solo autoridad genérica.
- source_word: מִמְּךָ יֵצֵאוּ
  english_pob_choice: will come from you
  chosen_spanish: saldrán de ti
  alternatives_spanish:
  - vendrán de ti
  - procederán de ti
  - descenderán de ti
  lexicon: HALOT
  rationale: יצא significa «salir», y en contexto genealógico puede expresarse como origen descendiente. «Saldrán de ti» conserva la imagen verbal del hebreo con claridad en español.
theological_decisions:
- issue: Promesa de descendencia y alcance de las naciones
  english_pob_reading: The verse promises that Abraham will become the ancestor of multiple nations and of kings.
  chosen_spanish_reading: La frase anuncia que Abraham será origen de varias naciones y de reyes.
  alternative_spanish_readings:
  - La frase podría leerse como una concesión de estatus entre las naciones.
  - La frase podría entenderse solo como una bendición de abundancia sin matiz genealógico.
  rationale: El contexto inmediato del pacto abrahámico enfatiza descendencia, linaje y cumplimiento genealógico. La traducción mantiene ese alcance sin diluirlo en una idea meramente honorífica.
  doctrine_reference: Génesis 12:2–3; Génesis 17:4–5; Traducción filosofía §1, §3
translation_notes:
  revision_awareness: El inglés auditado pasó de «make you into nations» a «make nations from you» para sonar más natural y ajustarse mejor al hebreo. La versión española adopta una solución igualmente resultativa («te convertiré en naciones») y mantiene la imagen verbal «saldrán de ti» para el clímax genealógico.
  spanish_consistency_notes:
  - Se mantiene «Dios/Yahvé» fuera del versículo porque no aparece ningún nombre divino aquí.
  - Se evita «Cristo» o terminología eclesial no presente en el texto.
  - «Naciones» conserva el sentido patriarcal de גּוֹיִם sin introducir una lectura de gentiles cristianos.
  - 'La secuencia verbal respeta el paralelismo del hebreo: fecundidad intensificada, resultado en naciones, y salida de reyes desde Abraham.'
