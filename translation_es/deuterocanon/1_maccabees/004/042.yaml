translation:
  language: es
  text: Y escogió sacerdotes sin mancha[a], devotos a la ley.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sacerdotes sin defecto, celosos por la ley». El griego puede enfatizar tanto la ausencia de defecto como el compromiso ferviente.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπέλεξεν
  english_pob_choice: chose
  chosen_spanish: escogió
  alternatives_spanish:
  - eligió
  - seleccionó
  lexicon: LSJ
  rationale: El aoristo de ἐπιλέγω expresa una selección deliberada. «Escogió» es natural en español y conserva la acción intencional sin sonar excesivamente formal.
- source_word: ἱερεῖς
  english_pob_choice: priests
  chosen_spanish: sacerdotes
  alternatives_spanish:
  - sacerdotes del templo
  - presbíteros
  lexicon: LSJ
  rationale: En este contexto cultual judío, «sacerdotes» comunica de forma directa ἱερεῖς. «Presbíteros» no corresponde al término griego y «sacerdotes del templo» añade información no explícita.
- source_word: ἀμώμους
  english_pob_choice: blameless
  chosen_spanish: sin mancha
  alternatives_spanish:
  - sin defecto
  - inmaculados
  - irreprochables
  lexicon: LSJ
  rationale: El adjetivo puede señalar ausencia de defecto o de culpa. «Sin mancha» conserva bien la fuerza ritual de aptitud física y moral; «blameless» en inglés fue acompañado por una nota sobre el matiz ritual, y esa tensión se mantiene aquí.
- source_word: θελητὰς
  english_pob_choice: devoted to
  chosen_spanish: celosos de
  alternatives_spanish:
  - entregados a
  - dedicados a
  - deseosos de
  lexicon: LSJ
  rationale: θελητής implica una adhesión o deseo activo. «Celosos de» expresa compromiso ferviente y encaja mejor en español que una traducción demasiado literal como «deseosos de».
- source_word: νόμου
  english_pob_choice: the law
  chosen_spanish: la ley
  alternatives_spanish:
  - ley
  - la Ley
  lexicon: LSJ
  rationale: En 1 Macabeos, νόμος remite a la ley judía/an-cestral. «La ley» mantiene esa especificidad covenantal en español sin necesidad de mayúscula litúrgica.
theological_decisions:
- issue: 'Alcance de ἀμώμους: defecto ritual frente a integridad moral'
  english_pob_reading: The Greek can emphasize both freedom from defect and eager commitment.
  chosen_spanish_reading: '«Sin mancha» deja abierta la doble carga: aptitud ritual y rectitud personal.'
  alternative_spanish_readings:
  - sin defecto
  - inmaculados
  - irreprochables
  rationale: La lectura inglesa preserva la tensión entre pureza ritual y cualificación moral. En español, «sin mancha» mantiene esa ambigüedad productiva sin resolverla en una sola esfera.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el texto griego y el audit trail inglés están en alto acuerdo, por lo que la redacción española sigue de cerca la equivalencia óptima documentada.
  spanish_consistency_notes:
  - Se conserva «ley» con artículo definido para reflejar la especificidad de νόμος en 1 Macabeos.
  - «Sin mancha» se usa como equivalente flexible de ἀμώμους para no perder el matiz ritual y moral.
  - «Celosos de» evita una calca de «devoted to» y transmite compromiso activo y positivo.
