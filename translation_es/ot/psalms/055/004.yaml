translation:
  language: es
  text: Por la voz[a] del enemigo, por la opresión del impío; porque echan calamidad sobre mí[b], y con furor me aborrecen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “clamor”. El hebreo קוֹל puede significar “voz”, “sonido” o “clamor”; aquí se conserva “voz” por ser la opción más cercana al texto y al paralelismo poético.'
    reason: lexical_alternative
  - marker: b
    text: 'O: “mal” o “daño”. El hebreo אָוֶן puede significar “calamidad”, “daño” o “mal”, según el contexto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִקּוֹל
  english_pob_choice: Because of the voice of
  chosen_spanish: Por la voz de
  alternatives_spanish:
  - A causa de la voz de
  - Desde la voz de
  lexicon: HALOT
  rationale: La construcción con מִן + קוֹל puede expresar causa o procedencia. En este lamento, el valor causal encaja con el paralelismo y mantiene la imagen concreta de la “voz” o “clamor” del enemigo.
- source_word: אוֹיֵב
  english_pob_choice: the enemy
  chosen_spanish: el enemigo
  alternatives_spanish:
  - un enemigo
  - el adversario
  lexicon: HALOT
  rationale: El singular hebreo funciona de modo genérico o representativo; “el enemigo” conserva esa fuerza y es natural en español.
- source_word: עָקַת
  english_pob_choice: the oppression of
  chosen_spanish: la opresión de
  alternatives_spanish:
  - la presión de
  - la angustia causada por
  lexicon: HALOT
  rationale: El sustantivo expresa presión, angustia u opresión. “Opresión” comunica bien el sufrimiento hostil atribuido al impío.
- source_word: רָשָׁע
  english_pob_choice: the wicked
  chosen_spanish: el impío
  alternatives_spanish:
  - el malvado
  - el perverso
  lexicon: HALOT
  rationale: “Impío” conserva el matiz moral y teológico de la raíz en un registro bíblico claro, sin perder inteligibilidad en español.
- source_word: יָמִיטוּ עָלַי אָוֶן
  english_pob_choice: they cast trouble upon me
  chosen_spanish: arrojan mal sobre mí
  alternatives_spanish:
  - echan mal sobre mí
  - me cargan de calamidad
  - hacen caer mal sobre mí
  lexicon: HALOT
  rationale: El hebreo transmite la acción de hacer caer o imponer algo sobre la persona. “Arrojan” mantiene el gesto violento de imponer desde fuera, y “mal” conserva una de las posibilidades semánticas de אָוֶן sin fijarlo solo en “trouble”.
- source_word: וּבְאַף
  english_pob_choice: and in anger
  chosen_spanish: y con furor
  alternatives_spanish:
  - y con ira
  - y airadamente
  lexicon: HALOT
  rationale: אַף es literalmente “nariz” pero idiomáticamente “ira”. “Con furor” expresa intensidad poética y conserva el matiz de enfurecimiento.
- source_word: יִשְׂטְמֽוּנִי
  english_pob_choice: they hate me
  chosen_spanish: me aborrecen
  alternatives_spanish:
  - me odian
  - me detestan
  - me guardan odio
  lexicon: HALOT
  rationale: El verbo denota hostilidad intensa y odio. “Aborrecen” es una opción digna y fuerte en español; evita suavizar el término a una mera hostilidad genérica.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés POB, que prefirió “cast trouble upon me” para יָמִיטוּ עָלַי אָוֶן. La versión española refleja ese movimiento con “arrojan mal sobre mí”, manteniendo la imagen de algo impuesto/echado sobre el salmista y evitando una paráfrasis más abstracta.
  spanish_consistency_notes:
  - Se mantiene Yahvé en los casos donde el Tetragrámaton aparezca; este versículo no lo contiene.
  - Se usó “impío” para רָשָׁע por coherencia con un registro bíblico amplio y comprensible.
  - La nota [a] está anclada en “enemigo[a]” y explica la posible lectura de קוֹל como “clamor”.
