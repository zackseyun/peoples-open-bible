translation:
  language: es
  text: No me avergonzaré de dar abrigo a un amigo, y de su presencia[a] no me esconderé de ningún modo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «de su rostro/presencia no me esconderé de ningún modo»; también puede entenderse más literalmente como «de ningún modo seré escondido de delante de él».'
    reason: lexical_alternative
lexical_decisions:
- source_word: φίλον
  english_pob_choice: a friend
  chosen_spanish: a un amigo
  alternatives_spanish:
  - a mi amigo
  - al amigo
  lexicon: LSJ
  rationale: El griego usa φίλον en acusativo sin posesivo explícito; por eso se conserva la referencia indefinida con «a un amigo», sin añadir un matiz de pertenencia que el texto no marca.
- source_word: σκεπάσαι
  english_pob_choice: to shelter
  chosen_spanish: dar abrigo
  alternatives_spanish:
  - cubrir
  - proteger
  - amparar
  lexicon: LSJ
  rationale: El infinitivo puede significar cubrir, proteger o dar cobijo. En español, «dar abrigo» conserva la imagen de protección y suena natural en este contexto ético de solidaridad con un amigo.
- source_word: οὐκ αἰσχυνθήσομαι
  english_pob_choice: I will not be ashamed
  chosen_spanish: No me avergonzaré
  alternatives_spanish:
  - No seré avergonzado
  - No sentiré vergüenza
  lexicon: LSJ
  rationale: La forma futura de αἰσχύνω/αἰσχύνομαι se expresa de manera directa y idiomática con «No me avergonzaré», que mantiene el sentido moral de la negativa.
- source_word: ἀπὸ προσώπου αὐτοῦ
  english_pob_choice: from his presence
  chosen_spanish: de su presencia
  alternatives_spanish:
  - de su rostro
  - de delante de él
  lexicon: LSJ
  rationale: Aunque πρόσωπον significa literalmente «rostro», la expresión idiomática ἀπὸ προσώπου comunica mejor la idea relacional de estar «en presencia de» alguien; por eso se traduce de forma natural con «de su presencia».
- source_word: οὐ μὴ κρυβῶ
  english_pob_choice: I will certainly not hide myself
  chosen_spanish: ciertamente no me ocultaré
  alternatives_spanish:
  - de ningún modo me esconderé
  - nunca me esconderé
  - no seré escondido
  lexicon: LSJ
  rationale: 'La construcción enfática οὐ μή exige una negación fuerte. Se conserva con «ciertamente no», y κρυβῶ se entiende aquí en sentido medio/reflexivo: el hablante no se apartará ni se ocultará del amigo.'
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto griego de Sirácida 22:25 y alinea las decisiones léxicas con el audit trail inglés, manteniendo la fuerza enfática de la negación y la imagen relacional de «presencia/rostro».
  spanish_consistency_notes:
  - Se usa «amigo» en sentido genérico, sin posesivo, porque el griego no lo explicita.
  - «Dar abrigo» mantiene el valor protector de σκεπάσαι sin volverlo una paráfrasis demasiado libre.
  - La nota al pie conserva la tensión entre la lectura idiomática («presencia») y la literal («rostro/ser ocultado»).
