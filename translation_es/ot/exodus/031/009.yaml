translation:
  language: es
  text: y el altar del holocausto, con todos sus utensilios, y la pila con su base,[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el lavacro con su base».'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִזְבַּח
  english_pob_choice: altar
  chosen_spanish: altar
  alternatives_spanish:
  - altar sacrificial
  lexicon: HALOT
  rationale: El sentido básico y estándar de מִזְבַּח es “altar”. En español, “altar” comunica el referente de forma natural sin añadir explicación innecesaria.
- source_word: הָעֹלָה
  english_pob_choice: of burnt offering
  chosen_spanish: del holocausto
  alternatives_spanish:
  - de la ofrenda quemada
  - para holocausto
  lexicon: HALOT
  rationale: En este contexto cultual, la expresión tradicional y fiel en español es “holocausto”, que conserva el vínculo con la ofrenda totalmente quemada. “Del holocausto” refleja bien el constructo con מִזְבַּח.
- source_word: כָּל
  english_pob_choice: all
  chosen_spanish: todos
  alternatives_spanish:
  - todo
  lexicon: HALOT
  rationale: Con un sustantivo plural como כֵּלָיו, la idea es la totalidad de los objetos; en español, “todos” es la forma natural y precisa.
- source_word: כֵּלָיו
  english_pob_choice: its utensils
  chosen_spanish: sus utensilios
  alternatives_spanish:
  - sus vasos
  - sus implementos
  - todo su equipo
  lexicon: HALOT
  rationale: כְּלִי en contexto tabernacular abarca los objetos de servicio asociados al altar. “Utensilios” conserva esa amplitud con un término claro y sobrio en español.
- source_word: הַכִּיּוֹר
  english_pob_choice: the basin
  chosen_spanish: la pila
  alternatives_spanish:
  - el lavacro
  - el lavabo
  - la vasija de lavar
  lexicon: HALOT
  rationale: Aunque la POB inglesa usa “basin”, en español bíblico “pila” es un equivalente natural y comprensible para el recipiente de lavado del tabernáculo. Evita un calco torpe y sigue siendo fiel al objeto.
- source_word: כַּנּוֹ
  english_pob_choice: its stand
  chosen_spanish: su base
  alternatives_spanish:
  - su soporte
  - su pedestal
  lexicon: HALOT
  rationale: כַּנּוֹ puede referirse al elemento de apoyo del recipiente. “Base” es una opción legítima y clara en español; mantiene la posible equivalencia con la nota inglesa “laver with its base”. Could also be rendered as a stand, but ‘base’ is the more immediate Spanish correlate here.
translation_notes:
  revision_awareness: La revisión más reciente indica que no se necesitaron cambios; se conserva la estructura inventarial del hebreo y la misma solución lexical principal, manteniendo la alternativa tradicional en nota.
  spanish_consistency_notes:
  - Se mantiene “Yahvé” como norma del proyecto cuando aparezca el nombre divino; este versículo no lo contiene.
  - “Holocausto” preserva el uso cultual tradicional sin perder la especificidad de la ofrenda totalmente quemada.
  - La secuencia nominal se ha mantenido con coordinación simple para reflejar el hebreo inventarial.
  - La nota alternativa reproduce la ambigüedad léxica del inglés POB entre “basin” y “laver” mediante una opción española equivalente.
