  yaml_path: translation/ot/daniel/012/007.yaml
  text: Then I heard the man clothed in linen[a], who was above the waters of the river, and he raised his right hand and his left hand to heaven and swore by him who lives forever that it would be for a time, times, and half a time; and when the shattering of the power of the holy people is finished[b], all these things will be completed.
  footnotes:
