  text: Refah su hijo[a], Resef, Telah su hijo, Tahan su hijo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'En hebreo, las genealogías suelen omitir un verbo explícito; la secuencia es una lista de descendientes: «Refah su hijo, Resef, Telah su hijo, Tahan su hijo».'
