translation:
  language: es
  text: Así subieron de Egipto y llegaron a la tierra de Canaán, adonde estaba Jacob, su padre.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיַּעֲלוּ
  english_pob_choice: went up
  chosen_spanish: subieron
  alternatives_spanish:
  - fueron hacia arriba
  - ascendieron
  - subieron de allá
  lexicon: HALOT
  rationale: עלה conserva en español la idea básica de movimiento ascendente, pero en este contexto narrativo el español natural para evitar un giro forzado es 'subieron'. Mantiene la direccionalidad implícita entre Egipto y Canaán sin perder la fluidez.
- source_word: מִמִּצְרַיִם
  english_pob_choice: from Egypt
  chosen_spanish: de Egipto
  alternatives_spanish:
  - desde Egipto
  lexicon: HALOT
  rationale: La preposición מִן marca origen. 'De Egipto' es la correspondencia española más directa y natural; 'desde Egipto' también es posible, pero 'de' encaja mejor con la secuencia narrativa.
- source_word: וַיָּבֹאוּ
  english_pob_choice: came
  chosen_spanish: llegaron
  alternatives_spanish:
  - vinieron
  - entraron
  lexicon: HALOT
  rationale: בוא puede ser 'venir/llegar/entrar'. Aquí el destino ya está expresado por 'a la tierra de Canaán', así que 'llegaron' comunica bien el arribo sin añadir la idea de entrada formal que 'entraron' podría sugerir.
- source_word: אֶרֶץ כְּנַעַן
  english_pob_choice: the land of Canaan
  chosen_spanish: la tierra de Canaán
  alternatives_spanish:
  - Canaán
  - el país de Canaán
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'tierra de Canaán'; por eso se conserva la expresión completa. 'Tierra' mantiene el valor del sustantivo constructo y evita reducirlo a un simple nombre propio.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  lexicon: HALOT
  rationale: La preposición marca dirección hacia una persona. En español, 'a' es la equivalencia más natural con ese valor direccional.
- source_word: יַעֲקֹב
  english_pob_choice: Jacob
  chosen_spanish: Jacob
  alternatives_spanish:
  - Ya'akov
  lexicon: HALOT
  rationale: Nombre propio bíblico establecido en español como 'Jacob'.
- source_word: אֲבִיהֶם
  english_pob_choice: their father
  chosen_spanish: su padre
  alternatives_spanish:
  - su propio padre
  - el padre de ellos
  lexicon: HALOT
  rationale: El posesivo plural hebreo se expresa naturalmente en español con 'su'. En este contexto, el antecedente es claro y no requiere repetir 'de ellos'.
translation_notes:
  revision_awareness: Coincide con el sentido del texto hebreo y con la lectura auditada en inglés; no se detectan tensiones textuales o teológicas que requieran nota. La revisión más reciente indicó que no hacía falta ningún cambio.
  spanish_consistency_notes:
  - Se mantiene 'tierra de Canaán' para conservar la estructura del hebreo.
  - Se usa 'Jacob' como forma tradicional y reconocible del nombre propio.
  - No se introduce vocabulario confesional adicional que no esté en el hebreo.
  - El verbo 'llegaron' evita una sobreadición interpretativa y conserva el movimiento narrativo.
