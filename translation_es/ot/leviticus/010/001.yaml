  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la secuencia hebrea: Nadab y Abiú, hijos de Aarón, cada uno toma su recipiente, pone fuego, pone incienso y presenta fuego no permitido ante Yahvé. También preserva correctamente el nombre divino Yahvé y la fuerza distributiva de אִישׁ. Sin embargo, «fuego prohibido» desplaza levemente el matiz de אֵשׁ זָרָה desde ''no autorizado/ajeno al mandato'' hacia ''expresamente prohibido'', mientras que la cláusula explicativa dice más precisamente ''que él no les había mandado''.'
  spanish_quality_summary: El español es claro y digno, pero puede afinarse. «Incensario» es legible, aunque en este contexto sacrificial «braser[o]/incensario» es debatible; no requiere cambio obligatorio. La principal mejora es preferir «fuego no autorizado» para reflejar mejor el valor legal-cultual documentado y alinear el texto principal con la nota. El resto del verso fluye naturalmente en español.
  glossary_alignment: Hay buena alineación con la terminología del proyecto en «Yahvé». La decisión sobre אֵשׁ זָרָה no queda idealmente alineada con el expediente inglés, que documenta «unauthorized fire» como elección principal; en español, «fuego no autorizado» reproduce mejor esa decisión que «fuego prohibido».
  issues:
  - severity: medium
    issue: «fuego prohibido» para אֵשׁ זָרָה
    rationale: Aunque comunica transgresión, puede sugerir una prohibición explícita previa más fuerte de lo que el hebreo afirma aquí. El expediente inglés y la cláusula relativa favorecen 'no autorizado' como formulación más exacta del ámbito legal-cultual.
