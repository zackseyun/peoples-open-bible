revisions:
- from: 'Entonces el ángel de Yahvé respondió y dijo[a]: «Oh Yahvé de los ejércitos, ¿hasta cuándo no tendrás compasión sobre Jerusalén y sobre las ciudades de Judá[c][b], contra las cuales has estado airado estos setenta años?»'
  to: 'Entonces el ángel de Yahvé respondió y dijo[a]: «Oh Yahvé de los ejércitos, ¿hasta cuándo no tendrás compasión de Jerusalén y de las ciudades de Judá[c][b], contra las cuales has estado airado estos setenta años?»'
  rationale: Se corrige la preposición con «compasión» y «misericordia» para producir un español natural y fiel. «Tener compasión de» y «mostrar misericordia a» comunican correctamente רחם sin calcos impropios. Se mantiene el resto del verso porque refleja bien el hebreo y la política terminológica del proyecto.
  reviewer_model: gpt-5.4
