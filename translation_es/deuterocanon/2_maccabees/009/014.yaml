translation:
  language: es
  text: En cuanto a la ciudad santa[a], que él se apresuraba a arrasar hasta dejarla al nivel del suelo y a convertirla en una fosa común, la declarará libre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'una sepultura común' o 'un lugar de sepultura para muchos'. El término griego designa una tumba para muchos muertos; 'fosa común' se elige por claridad y fuerza.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἁγίαν πόλιν
  english_pob_choice: the holy city
  chosen_spanish: la ciudad santa
  alternatives_spanish:
  - la ciudad sagrada
  lexicon: LSJ
  rationale: ἅγιος puede significar 'santo' o 'sagrado'. 'Ciudad santa' es la expresión española más natural y bíblicamente reconocible para Jerusalén, y conserva la referencia cultual sin forzar un calco.
- source_word: σπεύδων
  english_pob_choice: had been hurrying
  chosen_spanish: se apresuraba
  alternatives_spanish:
  - iba apresurándose
  - tenía prisa por
  lexicon: LSJ
  rationale: El participio comunica urgencia y actividad. 'Se apresuraba' reproduce bien la prisa intencional sin añadir matices temporales innecesarios en español.
- source_word: παρεγίνετο
  english_pob_choice: he had been ... to
  chosen_spanish: a
  alternatives_spanish:
  - al venir a
  - cuando llegó con el propósito de
  lexicon: LSJ
  rationale: Aquí el verbo de movimiento contribuye al sentido de acercarse con propósito. En español, la construcción 'se apresuraba a' integra naturalmente esa idea sin sobrecargar la frase.
- source_word: ἰσόπεδον ποιῆσαι
  english_pob_choice: to level to the ground
  chosen_spanish: arrasar hasta dejarla al nivel del suelo
  alternatives_spanish:
  - aplanar por completo
  - derribar hasta el suelo
  lexicon: LSJ
  rationale: La expresión indica dejar algo completamente nivelado. 'Arrasar hasta dejarla al nivel del suelo' transmite la fuerza destructiva y la imagen de total demolición.
- source_word: πολυάνδριον
  english_pob_choice: a mass grave
  chosen_spanish: una fosa común
  alternatives_spanish:
  - una sepultura común
  - una tumba colectiva
  lexicon: LSJ
  rationale: πολυάνδριον designa una sepultura para muchos muertos. 'Fosa común' es la equivalencia española más clara y contundente, y comunica bien el sentido lúgubre del pasaje.
- source_word: οἰκοδομῆσαι
  english_pob_choice: to make a mass grave
  chosen_spanish: convertirla en
  alternatives_spanish:
  - hacer de ella
  - edificarla como
  lexicon: LSJ
  rationale: El verbo literalmente significa 'construir', pero aquí expresa transformar la ciudad en algo mediante esa acción. 'Convertirla en' mantiene la relación semántica sin introducir una imagen extraña en español.
- source_word: ἐλευθέραν ἀναδείξει
  english_pob_choice: he will declare it free
  chosen_spanish: la declarará libre
  alternatives_spanish:
  - la proclamará libre
  - la establecerá como libre
  lexicon: LSJ
  rationale: ἀναδείκνυμι puede significar mostrar, designar o declarar públicamente. 'La declarará libre' preserva el acto público de conferir estatus sin precisar más de lo que el griego exige.
theological_decisions:
- issue: Alcance de la promesa sobre el estatus de Jerusalén
  english_pob_reading: he will declare it free
  chosen_spanish_reading: la declarará libre
  alternative_spanish_readings:
  - la hará libre
  - la proclamará autónoma
  rationale: El griego subraya una designación futura y pública respecto del estatus de la ciudad, no necesariamente un término técnico constitucional. 'La declarará libre' evita introducir precisiones políticas posteriores que el texto no explicita.
  doctrine_reference: 2 Macabeos 9:14
translation_notes:
  revision_awareness: Se siguió el último estado revisado del inglés auditado, especialmente la preferencia por 'level to the ground' y 'make a mass grave', reflejada en español como 'arrasar hasta dejarla al nivel del suelo' y 'convertirla en una fosa común'. También se mantuvo la lectura de futuro declarativo para ἐλευθέραν ἀναδείξει.
  spanish_consistency_notes:
  - Se mantiene 'ciudad santa' para ἁγίαν πόλιν, coherente con el uso bíblico estándar y con la terminología POB.
  - Se traduce πολυάνδριον como 'fosa común' en el texto y se preserva una nota alternativa para no perder la posibilidad de 'sepultura común'.
  - '''Declarará libre'' conserva el valor de acto público de ἀναδείξει sin añadir un matiz político más específico que el griego no exige.'
