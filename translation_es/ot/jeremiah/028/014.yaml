  language: en
  yaml_path: translation/ot/jeremiah/028/014.yaml
  text: 'For thus says Yahweh of hosts[a], the God of Israel: I have put an iron yoke on the necks of all these nations, to serve Nebuchadnezzar king of Babylon, and they shall serve him[b]. I have also given him the beasts of the field.'
