theological_decisions:
- issue: Rendering of אָדָם in context
  chosen_reading: the man
  alternative_readings:
  - the human
  - humankind
  rationale: Although אָדָם can denote humanity generically, this verse pivots on the relationship and wordplay between אִישׁ and אִשָּׁה. Rendering הָאָדָם as 'the man' best preserves the gendered and literary context without importing broader anthropological claims beyond the verse.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for אָדָם; Translation philosophy §4'
- issue: Preservation of the אִישׁ / אִשָּׁה wordplay
  chosen_reading: woman ... because from man she was taken
  alternative_readings:
  - wife ... because from husband she was taken
  rationale: The Hebrew wordplay is central to the verse and is naturally reproducible in English with 'woman' and 'man.' Rendering the pair as 'wife/husband' would narrow the sense and weaken the lexical correspondence present in the source text.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §§1, 5'
