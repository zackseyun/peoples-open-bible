revisions:
- from: Desde la salida del sol hasta su ocaso[a], el nombre de Yahvé[b] es digno de alabanza.
  to: Desde la salida del sol hasta su puesta[a], el nombre de Yahvé[b] ha de ser alabado.
  rationale: Se ajusta מְהֻלָּל a «ha de ser alabado» para reflejar mejor la decisión auditada «is to be praised» y la fuerza del participio pasivo. Se corrige la nota alternativa para que corresponda de verdad a «from the east to the west». También se usa «puesta» en el texto por mayor coherencia con la literalidad documentada y con el paralelismo hebreo.
