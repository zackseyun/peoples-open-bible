revisions:
- from: ¡Vengan[a] todos los sedientos! Vengan a las aguas; y el que no tiene dinero[b], vengan, compren y coman. Sí[c], vengan, compren vino y leche sin dinero y sin precio.
  to: ¡Vengan[a], todos los que tienen sed, vengan a las aguas! Y el que no tiene dinero[b], venga, compre y coma. Sí, vengan, compren vino y leche sin dinero y sin precio.
  rationale: Se corrige la expresión inicial a una formulación más idiomática («todos los que tienen sed») y se conserva la alternativa más formal en la nota [a]. Se elimina la nota [c] porque no hay una partícula equivalente a «sí» en el hebreo; la intensificación debe venir de la repetición del llamado. Además, se ajusta el segundo segmento a singular («venga, compre y coma») para corresponder mejor con «el que no tiene dinero», mientras el llamado general repetido sigue apareciendo en la oración final.
  reviewer_model: gpt-5.4
