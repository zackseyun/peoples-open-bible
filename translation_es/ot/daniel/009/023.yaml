    reason: lexical_alternative
  - marker: b
    text: O “salió un mensaje”. El hebreo dice literalmente “salió una palabra”, expresión que puede referirse a un mensaje comunicado o a una orden emitida.
    reason: lexical_alternative
  - marker: c
    text: O “eres altamente estimado”. La expresión hebrea comunica que Daniel es especialmente valioso o amado.
    reason: lexical_alternative
