  rationale: Nombre propio del rey de Judá; se translitera al español de forma estándar como «Amon». Se evita traducirlo, porque el hebreo aquí identifica una persona concreta en una genealogía.
- source_word: בְּנ֖וֹ
  english_pob_choice: his son
  chosen_spanish: su hijo
  alternatives_spanish:
  - hijo de él
  - su descendiente
  lexicon: HALOT
  rationale: El sustantivo בֵּן con sufijo de 3.ª persona masculina singular expresa filiación directa. En español, «su hijo» conserva la relación genealógica de manera natural y clara.
- source_word: יֹאשִׁיָּ֥הוּ
  english_pob_choice: Josiah
  chosen_spanish: Josías
  alternatives_spanish:
  - Josías
  - Yosías
  lexicon: HALOT
  rationale: Nombre propio del rey; la forma española habitual y reconocible es «Josías», que preserva la identificación histórica y bíblica sin necesidad de una transliteración más técnica.
- source_word: בְנֽוֹ
  english_pob_choice: his son
  chosen_spanish: su hijo
  alternatives_spanish:
  - hijo de él
  - su descendiente
  lexicon: HALOT
  rationale: La repetición del mismo patrón genealógico pide una traducción consistente. «Su hijo» mantiene el paralelismo y la cadena de sucesión del hebreo.
