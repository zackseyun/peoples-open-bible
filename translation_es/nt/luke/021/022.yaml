translation:
  language: es
  text: Porque estos son días de venganza[a], para que se cumpla todo lo que está escrito[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “retribución”.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «para que se cumpla todo lo que ha sido escrito».'
    reason: alternative_reading
lexical_decisions:
- source_word: ὅτι
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: Introduce la explicación causal o justificativa del enunciado anterior. En español, "porque" comunica con claridad esa relación sin sonar forzado; "pues" también sería posible, pero "porque" es más directo en este contexto.
- source_word: ἡμέραι
  english_pob_choice: days
  chosen_spanish: días
  alternatives_spanish:
  - tiempos
  - períodos
  lexicon: BDAG
  rationale: Se conserva el sustantivo plural de forma sobria y literal. "Días" mantiene la imagen temporal concreta del griego.
- source_word: ἐκδικήσεως
  english_pob_choice: vengeance
  chosen_spanish: venganza
  alternatives_spanish:
  - retribución
  - vindicación
  - justicia
  lexicon: BDAG
  rationale: La forma griega señala días de retribución judicial y divina. "Venganza" preserva la fuerza severa del término y el registro bíblico; "retribución" sería una alternativa válida pero menos incisiva, y "justicia" suaviza demasiado el matiz punitivo.
- source_word: αὗταί
  english_pob_choice: these
  chosen_spanish: estos
  alternatives_spanish:
  - éstos
  - tales
  lexicon: BDAG
  rationale: El demostrativo apunta enfáticamente a los días mencionados. En español, "estos" es la correspondencia natural y clara.
- source_word: εἰσιν
  english_pob_choice: are
  chosen_spanish: son
  alternatives_spanish:
  - están
  lexicon: BDAG
  rationale: Copulativo simple; se traduce con el verbo ser para mantener la estructura básica del enunciado.
- source_word: τοῦ πλησθῆναι
  english_pob_choice: that all the things written may be fulfilled
  chosen_spanish: para que se cumpla
  alternatives_spanish:
  - a fin de que se cumpla
  - para ser cumplido
  lexicon: BDAG
  rationale: La construcción articular con infinitivo expresa propósito o resultado. En español, "para que" comunica con naturalidad ese valor final/resultativo, preservando la tensión entre propósito y consecuencia sin cerrarla demasiado.
- source_word: πλησθῆναι
  english_pob_choice: may be fulfilled
  chosen_spanish: se cumpla
  alternatives_spanish:
  - sea cumplido
  - se realice
  - se lleve a cabo
  lexicon: BDAG
  rationale: Para el pasivo de cumplimiento referido a lo escrito, "se cumpla" es la forma más natural y fiel en español bíblico contemporáneo. Mantiene el sentido de realización de lo anunciado sin explicitar de más el agente.
- source_word: πάντα
  english_pob_choice: all
  chosen_spanish: todo
  alternatives_spanish:
  - todas las cosas
  - todo lo
  lexicon: BDAG
  rationale: Con el neutro plural sustantivado, el valor comprehensivo se expresa en español de forma más fluida como "todo". Así se conserva la amplitud total sin sonar mecánico.
- source_word: τὰ γεγραμμένα
  english_pob_choice: the things written
  chosen_spanish: lo que está escrito
  alternatives_spanish:
  - las cosas escritas
  - todo lo escrito
  lexicon: BDAG
  rationale: El participio perfecto pasivo funciona sustantivamente y alude a lo escrito de manera amplia, probablemente con referencia profética/escrituraria. "Lo que está escrito" es más natural que "las cosas escritas" y preserva la amplitud del referente sin restringirlo innecesariamente a un solo tipo de escrito.
theological_decisions:
- issue: ἐκδίκησις como juicio divino severo
  english_pob_reading: Rendered as 'vengeance' with the sense of divine judicial retribution tied to fulfillment of what is written.
  chosen_spanish_reading: '"Venganza" mantiene el tono de juicio divino severo y evita suavizar el carácter retributivo del pasaje.'
  alternative_spanish_readings:
  - retribución
  - justicia
  rationale: El contexto es escatológico y judicial. Traducir con un término más neutro o amplio debilitaría el peso de la advertencia. Se conserva la tensión teológica del original, que vincula estos días con el cumplimiento de lo escrito.
  doctrine_reference: Preservar la tensión teológica del texto sin diluir el juicio divino.
- issue: Construcción de propósito/resultadado con τοῦ + infinitivo
  english_pob_reading: 'Expressed as purpose/result: ''that all the things written may be fulfilled.'''
  chosen_spanish_reading: '"para que se cumpla" conserva la doble posibilidad de propósito y resultado.'
  alternative_spanish_readings:
  - a fin de que se cumpla
  - para ser cumplido
  rationale: La construcción griega puede entenderse con matiz final o consecutivo. En español, "para que" permite esa ambivalencia sin forzar una solución interpretativa única.
  doctrine_reference: Preservar la tensión hermenéutica del original.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca la revisión más reciente del inglés POB: conserva la relación causal de ὅτι, el carácter severo de ἐκδίκησις y la cláusula final sobre el cumplimiento de lo escrito, evitando sobreexplicar el sujeto implícito o convertir el verbo de cumplimiento en una paráfrasis más larga.'
  spanish_consistency_notes:
  - Se mantiene "Yahvé" como norma general cuando aparezca el nombre divino; en este versículo no aplica.
  - Se usa "venganza" como término técnico fuerte para ἐκδίκησις, en coherencia con el registro judicial del texto.
  - '"Lo que está escrito" preserva la amplitud del griego sin especificar indebidamente si se trata de profecías, Escrituras o ambas.'
  - La cláusula final conserva un español natural y no mecánico, pero sin perder el valor resultativo del infinitivo articular.
