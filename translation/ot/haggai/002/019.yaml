theological_decisions:
- issue: Implied object of the promise 'I will bless'
  chosen_reading: 'Explicitly supply ''you'' in English: ''I will bless you.'''
  alternative_readings:
  - 'Leave the object unstated: ''I will bless'''
  rationale: The Hebrew verb lacks an explicit object, but the oracle is addressed to the covenant community. Supplying 'you' makes the promise intelligible in English without adding new theological content; it simply makes explicit the implied addressee.
  doctrine_reference: Translation philosophy §1, §6
