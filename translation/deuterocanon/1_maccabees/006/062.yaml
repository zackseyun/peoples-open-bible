translation:
  text: And the king entered Mount Zion[a], and when he saw the fortification of the place[b], he broke the oath that he had sworn and gave orders to tear down the wall all around.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the fortification' or 'the fortress' for 'the stronghold.'
    reason: lexical_alternative
  - marker: b
    text: Or 'he set aside' or 'he violated' the oath; the Greek verb denotes invalidating or disregarding a binding commitment.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰσῆλθεν
  chosen: entered
  alternatives:
  - went into
  - came into
  lexicon: LSJ
  rationale: A straightforward narrative aorist of εἰσέρχομαι; 'entered' is natural modern English and preserves the motion into the location.
- source_word: ὁ βασιλεὺς
  chosen: the king
  lexicon: LSJ
  rationale: Standard rendering of βασιλεύς in historical narrative; no contextual reason to expand or specify beyond the Greek.
- source_word: τὸ ὄρος Σιών
  chosen: Mount Zion
  alternatives:
  - the hill of Zion
  lexicon: LSJ
  rationale: ὄρος commonly means 'mountain/mount'; 'Mount Zion' is the established and natural English geographical form.
- source_word: τὸ ὀχύρωμα
  chosen: the stronghold
  alternatives:
  - the fortification
  - the fortress
  lexicon: LSJ
  rationale: ὀχύρωμα denotes a fortified work or stronghold. 'Stronghold' fits the singular noun and the military context without over-specifying the structure.
- source_word: τοῦ τόπου
  chosen: of the place
  alternatives:
  - of that place
  - of the site
  lexicon: LSJ
  rationale: The genitive is retained with a simple English equivalent. 'Of the place' stays close to the Greek while remaining readable.
- source_word: ἠθέτησεν
  chosen: he broke
  alternatives:
  - he set aside
  - he nullified
  - he violated
  lexicon: LSJ
  rationale: In context with 'the oath that he had sworn,' the verb means to invalidate or violate a commitment. 'Broke' is idiomatic English for violating an oath and best conveys the moral force.
- source_word: τὸν ὁρκισμὸν ὃν ὤμοσεν
  chosen: the oath that he had sworn
  alternatives:
  - the sworn oath he made
  - the oath which he swore
  lexicon: LSJ
  rationale: This preserves both the noun ὁρκισμός and the relative clause ὃν ὤμοσεν. 'Had sworn' reflects the prior action naturally in English.
- source_word: ἐνετείλατο
  chosen: gave orders
  alternatives:
  - commanded
  - issued orders
  lexicon: LSJ
  rationale: Middle of ἐντέλλομαι in narrative commonly means 'commanded.' 'Gave orders' is idiomatic and fits the military setting.
- source_word: καθεῖλεν
  chosen: to pull down
  alternatives:
  - to tear down
  - to demolish
  lexicon: LSJ
  rationale: With ἐνετείλατο, the sense is that he ordered the wall's destruction. English commonly supplies an infinitive after 'gave orders.' 'Pull down' is a clear rendering of the demolition sense of καθαιρέω.
- source_word: τὸ τεῖχος κυκλόθεν
  chosen: the wall all around
  alternatives:
  - the wall round about
  - the surrounding wall
  lexicon: LSJ
  rationale: τεῖχος is 'wall'; κυκλόθεν indicates surrounding extent, hence 'all around.' This preserves the spatial sense without archaic phrasing.
