  - severity: medium
    issue: '''tú restauras'' en presente debilita la correspondencia verbal del versículo'
    rationale: El hebreo permite el giro poético con cambio de persona; en español, mantener futuro en ambos miembros ('lo sostendrá... tú restaurarás') preserva mejor la cohesión sin borrar el cambio de destinatario.
  - severity: low
