translation:
  language: es
  text: Tu vida penderá en incertidumbre[a] delante de ti; temerás noche y día, y no tendrás seguridad de tu vida[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Tu vida penderá delante de ti» o «estará suspendida delante de ti». La imagen hebrea es la de una vida suspendida precariamente, expresando continua incertidumbre sobre la supervivencia.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «no estarás seguro de tu vida» o «no confiarás en tu vida». El hebreo aquí no trata de creencia religiosa, sino de falta de certeza acerca de seguir con vida.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חַיֶּיךָ
  english_pob_choice: your life
  chosen_spanish: tu vida
  alternatives_spanish:
  - tus vidas
  - tu existencia
  - tu vida misma
  lexicon: HALOT
  rationale: Aunque la forma hebrea es plural en constructo, el sentido idiomático apunta a la continuidad de la existencia de una sola persona. En español, el singular 'tu vida' comunica mejor esa referencia sin perder el valor existencial del hebreo.
- source_word: תְּלֻאִים
  english_pob_choice: hang in doubt
  chosen_spanish: estará colgando en incertidumbre
  alternatives_spanish:
  - estará suspendida
  - colgará
  - estará suspendida precariamente
  lexicon: HALOT
  rationale: El verbo conserva la imagen física de algo colgante y, a la vez, la precariedad existencial. 'En incertidumbre' expresa la duda continua sobre la supervivencia, como en la elección inglesa de mantener imagen más tensión interpretativa.
- source_word: לְךָ מִנֶּגֶד
  english_pob_choice: before you
  chosen_spanish: delante de ti
  alternatives_spanish:
  - ante ti
  - frente a ti
  - en tu presencia
  lexicon: HALOT
  rationale: La expresión espacial hebrea significa literalmente 'ante/enfrente de ti'. 'Delante de ti' es natural en español y conserva la imagen de una amenaza siempre puesta a la vista.
- source_word: וּפָחַדְתָּ
  english_pob_choice: you will fear
  chosen_spanish: temerás
  alternatives_spanish:
  - tendrás temor
  - estarás en temor
  - estarás aterrado
  lexicon: HALOT
  rationale: El verbo פחד denota temor o pavor. 'Temerás' es directo, sobrio y suficiente para el énfasis del contexto sin añadir intensidad no explicitada por el hebreo.
- source_word: לַיְלָה וְיוֹמָם
  english_pob_choice: night and day
  chosen_spanish: noche y día
  alternatives_spanish:
  - de noche y de día
  - día y noche
  lexicon: HALOT
  rationale: Se mantiene el binomio temporal de forma natural en español. La secuencia expresa continuidad, no solo momentos aislados.
- source_word: לֹא תַאֲמִין בְּחַיֶּיךָ
  english_pob_choice: you will have no assurance of your life
  chosen_spanish: no tendrás seguridad de tu vida
  alternatives_spanish:
  - no confiarás en tu vida
  - no estarás seguro de tu vida
  - no tendrás confianza en tu vida
  lexicon: HALOT
  rationale: El hiphil de אמן aquí no expresa fe religiosa sino falta de confianza/certeza respecto a la propia supervivencia. 'No tendrás seguridad' comunica bien esa ausencia de certeza en español contemporáneo.
translation_notes:
  revision_awareness: Se siguió de cerca el paquete fuente hebreo y el audit trail inglés. La traducción española conserva la imagen de suspensión precaria de תְּלֻאִים y la ambigüedad semántica de אמן sin reducirlas a una sola paráfrasis interpretativa.
  spanish_consistency_notes:
  - Se preservó 'vida' en singular para reflejar el idiomático hebreo plural de constructo, coherente con la decisión inglesa.
  - Se evitó 'creer' para אמן porque en este contexto el objeto es la propia vida, no una afirmación doctrinal.
  - Se mantuvo el paralelismo temporal 'noche y día' para conservar el énfasis continuo del hebreo.
