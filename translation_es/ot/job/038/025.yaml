  rationale: La revisión corrige un matiz importante de שֶּׁטֶף, evitando «diluvio», que en español suele ser demasiado específico y puede sugerir el evento de Noé. También hace más concreta la imagen de פִלַּג con «ha abierto» y mejora la naturalidad poética con «cauce». Se conserva la solución principal «rayo de los truenos» y la nota mantiene la alternativa «relámpago» junto con la literalidad de «voces/sonidos».
