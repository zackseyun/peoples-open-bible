    rationale: Aunque intenta reflejar 'seek my harm', en español 'buscar mi mal' no es la forma más clara para expresar que intentan hacerle daño al salmista. 'Buscan mi daño' comunica mejor el sentido hostil y personal de וְדֹרְשֵׁי רָעָתִי.
  - severity: medium
