translation:
  language: es
  text: Y bendita sea tu prudencia[a], y bendita seas tú, que me has impedido en este día derramar sangre[b] y vengarme[c] con mi propia mano.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tu discernimiento» o «tu juicio».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «de venir en sangre(s)»; la frase también puede sugerir «culpa de sangre».'
    reason: lexical_alternative
  - marker: c
    text: Lit. «salvar mi mano para mí» o «salvarme con mi propia mano»; en este contexto se refiere a procurarme vindicación o venganza personalmente.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבָרוּךְ
  english_pob_choice: blessed be
  chosen_spanish: bendita sea
  alternatives_spanish:
  - bendito sea
  - sea bendita
  lexicon: HALOT
  rationale: La fórmula hebrea es una bendición predicativa dirigida a una cualidad/persona. En español, «bendita sea» mantiene el tono solemne y el valor optativo/benedictivo sin forzar una traducción mecánica.
- source_word: טַעְמֵךְ
  english_pob_choice: your discernment
  chosen_spanish: tu prudencia
  alternatives_spanish:
  - tu discernimiento
  - tu juicio
  lexicon: HALOT
  rationale: El término puede abarcar gusto, juicio, discreción o discernimiento. En este contexto David elogia la sensatez práctica de Abigail al frenarlo; «prudencia» comunica bien esa idea en español sin perder peso semántico.
- source_word: וּבְרוּכָה אָתְּ
  english_pob_choice: and blessed be you
  chosen_spanish: y bendita seas, tú
  alternatives_spanish:
  - y bendita eres tú
  - y bendita seas
  lexicon: HALOT
  rationale: La segunda cláusula repite la bendición directa a Abigail. «Seas, tú» conserva el paralelismo enfático y la dirección personal del hebreo.
- source_word: כְּלִתִנִי
  english_pob_choice: have kept me
  chosen_spanish: me has impedido
  alternatives_spanish:
  - me has retenido
  - me has contenido
  lexicon: HALOT
  rationale: 'El verbo expresa impedir o restringir. «Impedido» captura con claridad el efecto inmediato del acto de Abigail: evitar que David proceda en su plan violento.'
- source_word: הַיּוֹם הַזֶּה
  english_pob_choice: this day
  chosen_spanish: hoy
  alternatives_spanish:
  - en este día
  - este día
  lexicon: HALOT
  rationale: Aunque el hebreo es más formal, en español «hoy» resulta natural y no debilita la referencia temporal inmediata. Se mantiene el sentido de una acción concreta y presente.
- source_word: מִבּוֹא בְדָמִים
  english_pob_choice: from bloodshed
  chosen_spanish: venir a sangre
  alternatives_spanish:
  - caer en sangre
  - venir a derramar sangre
  - venir a sangre derramada
  lexicon: HALOT
  rationale: 'El hebreo dice literalmente «de venir en sangre(s)». Para no borrar la imagen idiomática, se conserva una construcción breve y directa en español: «venir a sangre». La nota explica la posible lectura de «sangre derramada» o «culpa de sangre».'
- source_word: וְהֹשֵׁעַ יָדִי לִי
  english_pob_choice: and from avenging myself with my own hand
  chosen_spanish: y salvarme con mi propia mano
  alternatives_spanish:
  - y vengarme con mi propia mano
  - y hacerme justicia con mi propia mano
  lexicon: HALOT
  rationale: El hebreo usa el verbo salvar/liberar, pero en este contexto apunta al acto de procurarse a sí mismo una salida mediante violencia o represalia. «Salvarme con mi propia mano» conserva el verbo de base y la ironía del giro; la alternativa interpretativa se preserva en nota.
theological_decisions:
- issue: 'Sentido de דָמִים: sangre derramada vs. sangreculpa/bloodguilt'
  english_pob_reading: bloodshed
  chosen_spanish_reading: sangre
  alternative_spanish_readings:
  - sangre derramada
  - culpa de sangre
  - sangre culpable
  rationale: El contexto narrativo inmediato es el intento de David de cometer violencia contra Nabal y su casa. Por eso, en el texto principal se mantiene una formulación concreta y breve («venir a sangre»), mientras la nota preserva la posible carga de culpa de sangre que el plural hebreo también puede sugerir.
  doctrine_reference: Preservar la tensión semántica y moral del texto sin resolverla prematuramente.
- issue: 'Valor de הֹשֵׁעַ יָדִי לִי: salvarse, vengarse o hacerse justicia'
  english_pob_reading: from avenging myself with my own hand
  chosen_spanish_reading: salvarme con mi propia mano
  alternative_spanish_readings:
  - vengarme con mi propia mano
  - hacerme justicia con mi propia mano
  - procurarme la victoria con mi propia mano
  rationale: El hebreo subraya el acto de procurarse la propia liberación por medio de la mano propia. La versión principal retiene el verbo más cercano al original; la dimensión de represalia queda accesible por el contexto y en la nota alternativa, evitando fijar de antemano una sola interpretación.
  doctrine_reference: Mantener la ambigüedad funcional del hebreo cuando el contexto permite más de una lectura legítima.
translation_notes:
  revision_awareness: 'Se siguió el último pase de revisión del contexto inglés: se prefirió una traducción que conserve la fórmula benedictoria, mantenga la referencia idiomática a «sangre(s)» sin resolverla en exceso, y preserve la ambigüedad entre salvación y represalia en la última cláusula. La redacción española se ajustó para sonar natural y publicable, pero sin perder las tensiones léxicas documentadas.'
  spanish_consistency_notes:
  - Se usa «Yahvé» cuando el texto no requiere aquí un reemplazo explícito de κύριος; este versículo no contiene el nombre divino.
  - Se eligió «prudencia» para טעם por su equilibrio entre discernimiento y sensatez práctica, en línea con la alabanza de David a Abigail.
  - «Venir a sangre» se mantiene como formulación breve y marcada para preservar la imagen hebrea, con aclaración en nota.
  - «Salvarme con mi propia mano» conserva el verbo base del hebreo y deja abierta la lectura contextual de represalia, como permite el audit trail.
