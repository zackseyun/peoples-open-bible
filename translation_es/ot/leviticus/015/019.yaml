translation:
  language: es
  text: Cuando una mujer tenga un flujo, y su flujo en su cuerpo[a] sea sangre, permanecerá en su impureza menstrual siete días[b]; y todo el que la toque será impuro hasta la tarde.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'en su carne'. El hebreo dice más literalmente 'en su carne/cuerpo'.
    reason: lexical_alternative
  - marker: b
    text: '''Impureza menstrual'' designa en la ley levítica una impureza ritual, no necesariamente una falta moral.'
    reason: cultural_note
lexical_decisions:
- source_word: זָבָה
  english_pob_choice: has a discharge
  chosen_spanish: tenga una hemorragia
  alternatives_spanish:
  - tenga una salida de sangre
  - tenga una descarga
  lexicon: HALOT
  rationale: El participio expresa un flujo corporal; en español, 'hemorragia' comunica con naturalidad una salida de sangre y prepara la especificación siguiente. 'Descarga' es posible, pero suena menos natural en este contexto ritual.
- source_word: דָּם
  english_pob_choice: blood
  chosen_spanish: sangre
  alternatives_spanish:
  - sangrado
  lexicon: HALOT
  rationale: El hebreo identifica la naturaleza de la hemorragia como sangre; 'sangre' mantiene la relación directa con el sustantivo bíblico.
- source_word: זֹבָהּ
  english_pob_choice: her discharge
  chosen_spanish: su hemorragia
  alternatives_spanish:
  - su flujo
  - su salida
  lexicon: HALOT
  rationale: Se conserva la conexión léxica con זָבָה mediante 'hemorragia', evitando una paráfrasis excesiva y manteniendo la referencia al flujo mismo.
- source_word: בִּבְשָׂרָהּ
  english_pob_choice: in her body
  chosen_spanish: en su cuerpo
  alternatives_spanish:
  - en su carne
  - dentro de su cuerpo
  lexicon: HALOT
  rationale: בשר puede ser 'carne', pero aquí el sentido natural es corporal/ físico. 'En su cuerpo' preserva el valor locativo de ב y es claro en español; 'en su carne' puede sonar más literal pero menos inteligible para lectores modernos.
- source_word: שִׁבְעַת יָמִים
  english_pob_choice: seven days
  chosen_spanish: siete días
  alternatives_spanish:
  - por siete días
  lexicon: HALOT
  rationale: Equivalencia directa y transparente.
- source_word: בְנִדָּתָהּ
  english_pob_choice: in her menstrual impurity
  chosen_spanish: en su impureza menstrual
  alternatives_spanish:
  - en su menstruación
  - en su período de impureza
  lexicon: HALOT
  rationale: Se conserva el matiz ritual de נִדָּה, no solo el evento biológico. 'Impureza menstrual' refleja la categoría legal sin imponer un juicio moral.
- source_word: הַנֹּגֵעַ בָּהּ
  english_pob_choice: everyone who touches her
  chosen_spanish: cualquiera que la toque
  alternatives_spanish:
  - todo el que la toque
  - quien la toque
  lexicon: HALOT
  rationale: El participio con כל expresa un sujeto general e indefinido; 'cualquiera que la toque' es natural y fiel al alcance general del hebreo.
- source_word: יִטְמָא
  english_pob_choice: shall be unclean
  chosen_spanish: será impuro
  alternatives_spanish:
  - quedará impuro
  - será inmundo
  lexicon: HALOT
  rationale: '''Impuro'' transmite el estado ritual de טמא sin cargar el término de la dureza de ''inmundo''. La legislación levítica aquí es de pureza ceremonial, no de culpa moral.'
- source_word: עַד הָעָרֶב
  english_pob_choice: until evening
  chosen_spanish: hasta la tarde
  alternatives_spanish:
  - hasta el atardecer
  - hasta la noche
  lexicon: HALOT
  rationale: '''La tarde'' es una forma bíblica y natural en español para el período final del día. ''Atardecer'' es posible, pero ''tarde'' sigue más de cerca la forma hebrea con artículo.'
theological_decisions:
- issue: Impureza ritual frente a contaminación moral
  english_pob_reading: Use 'unclean' and 'menstrual impurity' as ritual-status terms
  chosen_spanish_reading: Usar 'impuro' e 'impureza menstrual' como términos de estado ritual
  alternative_spanish_readings:
  - inmundo
  - definido como impuro
  rationale: Levítico 15 trata de pureza ritual. 'Impuro' comunica el estado legal sin insinuar necesariamente pecado personal; 'impureza menstrual' conserva el marco levítico y evita confundirlo con una acusación moral.
  doctrine_reference: La traducción debe preservar el sentido llano del texto y no importar una conclusión doctrinal que el pasaje no afirma.
translation_notes:
  revision_awareness: La revisión inglesa más reciente afinó solo la frase final ('until evening' -> 'until evening' por naturalidad). En español se reflejó esa misma naturalidad con 'hasta la tarde', manteniendo el valor temporal sin añadir solemnidad artificial.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como forma de Tetragrámaton en todo el proyecto, pero este versículo no lo contiene.
  - Se usó 'impuro' para טמא por coherencia con lenguaje ritual levítico y para evitar mezclar pureza ceremonial con culpa moral.
  - Se prefirió 'impureza menstrual' para נִדָּה, siguiendo la decisión auditada del texto fuente en inglés.
