    issue: 'Inicio no idiomático: ''No ciudad sitiada jamás resistió'''
    rationale: En español estándar debe ser 'Ninguna ciudad sitiada jamás resistió' o estructura equivalente. La forma actual suena a calco y perjudica la legibilidad sin necesidad.
  - severity: medium
    issue: '''conmovió'' atenúa demasiado ἐκίνησεν'
    rationale: El griego en este contexto de asedio y oposición sugiere que los perturbó o agitó, no solo que los emocionó. 'Agitó' o 'sacudió' preserva mejor la fuerza retórica.
  - severity: medium
