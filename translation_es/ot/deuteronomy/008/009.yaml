  glossary_alignment: 'No hay términos teológicos principales en disputa. Las decisiones léxicas principales se alinean en general con el POB inglés: «pan», «no te faltará nada», «hierro», «cobre». Se recomienda «extraerás» para reflejar mejor תַּחְצֹב que «sacarás».'
