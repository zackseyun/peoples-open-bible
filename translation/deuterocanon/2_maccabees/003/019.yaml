id: 2MA.3.19
reference: 2 Maccabees 3:19
source:
  edition: lxx-swete-1909
  text: ὑπεζωσμέναι δὲ ὑπὸ τοὺς μαστοὺς αἱ γυναῖκες σάκκους κατὰ τὰς ὁδοὺς ἐπλήθυνον· αἱ δὲ κατάκλειστοι τῶν παρθένων, αἱ μὲν συνέτρεχον ἐπὶ τοὺς πυλῶνας, αἱ δὲ ἐπὶ τὰ τείχη, τινὲς δὲ διὰ τῶν θυρίδων διεκύπτον.
  language: Greek
  pages:
  - 691
  confidence: high
  validation: agree
translation:
  text: And the women[a], with sackcloth bound under their breasts, were crowding the streets; and the virgins who were shut in, some were running together to the gates, others to the walls[c][b], and some were peering out through the windows.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'maidens'; the Greek more specifically says 'virgins.'
    reason: lexical_alternative
  - marker: b
    text: '''Were crowding the streets'' renders a Greek expression literally meaning ''were multiplying along the streets.'''
    reason: lexical_alternative
  - marker: c
    text: The phrase 'with sackcloth bound under their breasts' depicts women wearing mourning garb fastened around the chest.
    reason: cultural_note
lexical_decisions:
- source_word: ὑπεζωσμέναι
  chosen: with ... bound under
  alternatives:
  - girded under
  - having fastened under
  lexicon: LSJ
  rationale: The participle denotes being girded or bound underneath. In context with σάκκους and ὑπὸ τοὺς μαστούς, it describes sackcloth fastened beneath the breasts/chest. English idiom is clearer with 'with sackcloth bound under their breasts' rather than a more wooden 'girded under.'
- source_word: σάκκους
  chosen: sackcloth
  alternatives:
  - sacks
  - garments of mourning
  lexicon: LSJ
  rationale: The term commonly refers to coarse mourning cloth, not merely bags. 'Sackcloth' preserves the cultural and penitential sense.
- source_word: κατὰ τὰς ὁδοὺς ἐπλήθυνον
  chosen: were crowding the streets
  alternatives:
  - were increasing along the streets
  - were multiplying in the streets
  lexicon: LSJ
  rationale: Literally 'were multiplying along the streets,' but the idiomatic sense in context is that the women were appearing in great numbers in public thoroughfares. 'Crowding the streets' conveys the scene naturally without losing the idea of large numbers.
- source_word: κατάκλειστοι
  chosen: who were shut in
  alternatives:
  - confined
  - kept indoors
  - secluded
  lexicon: LSJ
  rationale: The adjective means shut up or enclosed. 'Who were shut in' stays close to the Greek while fitting the social picture of maidens normally kept indoors.
- source_word: παρθένων
  chosen: virgins
  alternatives:
  - young women
  - maidens
  lexicon: LSJ
  rationale: The Greek specifically denotes virgins, not merely unmarried young women in a vague sense. This follows the project's gender-accurate principle and preserves the social specificity of the term.
- source_word: συνέτρεχον
  chosen: were running together
  alternatives:
  - were rushing together
  - were hurrying together
  lexicon: LSJ
  rationale: The compound verb includes the sense of converging together in haste. 'Were running together' preserves both movement and collective action.
- source_word: πυλῶνας
  chosen: gates
  alternatives:
  - gateways
  - gate-towers
  lexicon: LSJ
  rationale: The word can denote monumental gates or gateways. 'Gates' is the most natural rendering here and sufficient for the city setting.
- source_word: διεκύπτον
  chosen: were peering out
  alternatives:
  - were looking out
  - were leaning out to look
  lexicon: LSJ
  rationale: The imperfect depicts repeated or ongoing action of looking out from within. 'Peering out' captures the anxious, searching nuance better than the flatter 'looking out.'
- source_word: θυρίδων
  chosen: windows
  alternatives:
  - lattices
  - small windows
  lexicon: LSJ
  rationale: The term refers to windows or window-openings. 'Windows' is the clearest default; more specific architectural nuance is possible but not required by the context.
