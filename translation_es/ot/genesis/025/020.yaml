translation:
  language: es
  text: Isaac tenía cuarenta años cuando tomó[a] a Rebeca, la hija de Betuel el arameo, de Paddán-aram, la hermana de Labán el arameo[b], para ser su esposa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más idiomática: «cuando se casó con Rebeca». El hebreo dice literalmente: «cuando tomó a Rebeca ... para ser su esposa».'
    reason: lexical_alternative
  - marker: b
    text: «Arameo» es más preciso que la traducción tradicional antigua «sirio».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: was
  chosen_spanish: tenía
  alternatives_spanish:
  - era
  - fue
  lexicon: HALOT
  rationale: En una indicación de edad, el hebreo usa una forma narrativa de היה que introduce el dato de manera idiomática. En español, «tenía» expresa naturalmente la edad en ese momento sin forzar un calco de la fórmula hebrea.
- source_word: בֶּן אַרְבָּעִים שָׁנָה
  english_pob_choice: forty years old
  chosen_spanish: cuarenta años
  alternatives_spanish:
  - de cuarenta años
  - cuarenta años de edad
  lexicon: HALOT
  rationale: La expresión hebrea es un idiomatismo para la edad. En español, en contexto narrativo, «cuarenta años» con «tenía» comunica el sentido completo de forma clara y natural.
- source_word: בְּקַחְתּוֹ
  english_pob_choice: when he took
  chosen_spanish: cuando tomó
  alternatives_spanish:
  - cuando se casó con
  - al tomar
  lexicon: HALOT
  rationale: El infinitivo con ב marca el momento de la acción. Mantener «tomó» conserva la fuerza lexical de לקח y deja la precisión matrimonial para la frase final, como en el análisis auditado en inglés.
- source_word: רִבְקָה
  english_pob_choice: Rebekah
  chosen_spanish: Rebeca
  alternatives_spanish:
  - Rebecca
  lexicon: HALOT
  rationale: Se usa la forma española estable del nombre propio, equivalente a la transliteración inglesa auditada, sin alterar la identidad del referente.
- source_word: בַּת בְּתוּאֵל
  english_pob_choice: the daughter of Bethuel
  chosen_spanish: hija de Betuel
  alternatives_spanish:
  - la hija de Betuel
  - Betuel hija
  lexicon: HALOT
  rationale: Se conserva la relación genealógica en una forma natural del español. La expresión resume fielmente el parentesco sin añadir explicaciones.
- source_word: הָאֲרַמִּי
  english_pob_choice: the Aramean
  chosen_spanish: el arameo
  alternatives_spanish:
  - el arameo sirio
  lexicon: HALOT
  rationale: «Arameo» reproduce con precisión el etnónimo original. Se evita «sirio» porque es menos exacto históricamente y no responde al valor léxico señalado en el contexto auditado.
- source_word: מִפַּדַּן אֲרָם
  english_pob_choice: from Paddan-aram
  chosen_spanish: de Paddán-aram
  alternatives_spanish:
  - de Paddán Aram
  - de la llanura de Aram
  lexicon: HALOT
  rationale: Es un topónimo y se translitera. La forma con guion es reconocible en español bíblico y preserva el nombre propio sin traducirlo.
- source_word: אֲחוֹת לָבָן
  english_pob_choice: the sister of Laban
  chosen_spanish: hermana de Labán
  alternatives_spanish:
  - la hermana de Labán
  - Labán su hermana
  lexicon: HALOT
  rationale: La relación de parentesco se mantiene en una fórmula clara y fiel al estilo genealógico del versículo. La forma breve funciona bien en español sin perder precisión.
- source_word: לוֹ לְאִשָּׁה
  english_pob_choice: to be his wife
  chosen_spanish: para ser su esposa
  alternatives_spanish:
  - como esposa
  - para que fuera su esposa
  lexicon: HALOT
  rationale: El hebreo indica el propósito y resultado de «tomar» a Rebeca. «Para ser su esposa» conserva el valor final de לְאִשָּׁה y hace explícito el vínculo matrimonial, como en el análisis inglés.
translation_notes:
  revision_awareness: 'Coincide con el control más reciente: no se requieren revisiones textuales respecto del paquete fuente y el audit trail en inglés.'
  spanish_consistency_notes:
  - Se mantiene el nombre divino fuera del versículo, sin impacto terminológico.
  - Los nombres propios se han españolizado donde existe forma estándar (Isaac, Rebeca, Betuel, Labán) y se ha transliterado el topónimo como Paddán-aram.
  - Se preserva la relación entre «tomó» y «para ser su esposa» para no borrar la tensión lexical entre el hebreo literal y el sentido matrimonial idiomático.
