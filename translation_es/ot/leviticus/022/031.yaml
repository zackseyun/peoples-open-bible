translation:
  language: es
  text: Así que guardaréis mis mandamientos y los pondréis por obra; yo soy Yahvé[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: יהוה, el nombre divino del pacto; tradicionalmente traducido «el SEÑOR».'
    reason: alternative_reading
lexical_decisions:
- source_word: וּשְׁמַרְתֶּם
  english_pob_choice: So you shall keep
  chosen_spanish: Guardaréis
  alternatives_spanish:
  - Y guardaréis
  - Así que guardaréis
  - Observaréis
  lexicon: HALOT
  rationale: שׁמר en contexto legal-covenantal expresa guardar/observar. En español, «guardaréis» conserva bien la idea de mantener fielmente lo mandado. No añadí un equivalente explícito de «So» porque aquí la conexión discursiva puede quedar implícita sin forzar una construcción más pesada.
- source_word: מִצְוֹתַי
  english_pob_choice: my commandments
  chosen_spanish: mis mandamientos
  alternatives_spanish:
  - mis órdenes
  - mis preceptos
  lexicon: HALOT
  rationale: מִצְוָה designa un mandato normativo; «mandamientos» mantiene el registro formal y bíblico, y es natural en español para el lenguaje del pacto.
- source_word: וַעֲשִׂיתֶם אֹתָם
  english_pob_choice: and do them
  chosen_spanish: y los cumpliréis
  alternatives_spanish:
  - y los haréis
  - y los pondréis por obra
  - y los obedeceréis
  lexicon: HALOT
  rationale: Aunque el hebreo usa literalmente «hacerlos», en español «cumplir» comunica de modo claro y fiel la ejecución concreta de los mandamientos sin perder la correlación con «guardar». Se conserva la distinción entre guardar y hacer, pero con un verbo natural para la segunda cláusula.
- source_word: אֲנִי יְהוָה
  english_pob_choice: I am Yahweh
  chosen_spanish: yo soy Yahvé
  alternatives_spanish:
  - yo soy Yahvé
  - yo soy Yahweh
  - yo soy el Señor
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se adopta «Yahvé» según el criterio del proyecto para el Tetragrámaton. En español, la mayúscula en «Yahvé» conserva el carácter divino del nombre. «Yo soy» reproduce la fórmula enfática de autoidentificación.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - el Señor
  - Yahweh
  rationale: El texto hebreo contiene directamente el nombre del pacto. La política del proyecto pide transliterarlo como «Yahvé» en el texto principal, evitando el sustituto litúrgico «SEÑOR».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: El contexto inglés mantiene la doble idea de «keep» y «do them» y anota la presencia del nombre divino. La traducción española conserva esa distinción semántica con «guardar» / «cumplir» y sigue la decisión doctrinal del proyecto de usar «Yahvé» en lugar de una máscara litúrgica.
  spanish_consistency_notes:
  - Se mantiene el tuteo reverencial en segunda persona plural («guardaréis», «cumpliréis») conforme al plural hebreo.
  - «Yahvé» se usa uniformemente como forma principal del nombre divino.
  - La nota de pie marca el valor textual del nombre divino sin introducir una traducción sustitutiva en el cuerpo del versículo.
