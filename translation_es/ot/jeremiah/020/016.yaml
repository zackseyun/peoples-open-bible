translation:
  language: es
  text: Que ese hombre sea como las ciudades que Yahvé derribó sin desistir[a], y que oiga un clamor por la mañana y una alarma[b] al mediodía.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sin retractarse». Aquí expresa que no desistió del juicio, no un arrepentimiento moral en Dios.
    reason: theological_note
  - marker: b
    text: O «un toque de alarma», «un grito de guerra» o «un clamor de guerra» para תְרוּעָה.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: Let ... be
  chosen_spanish: Haga que ... sea
  alternatives_spanish:
  - Sea ...
  - Que ... sea
  lexicon: HALOT
  rationale: En este contexto de imprecación, la forma verbal expresa deseo o maldición más que simple futuro. En español, «Haga que... sea» conserva ese valor volitivo con tono natural y solemne.
- source_word: הָאִישׁ הַהוּא
  english_pob_choice: that man
  chosen_spanish: ese hombre
  alternatives_spanish:
  - ese varón
  - aquel hombre
  lexicon: HALOT
  rationale: El demostrativo señala distancia y especificidad. «Ese hombre» reproduce bien el matiz despectivo o al menos distante del hebreo sin borrar el masculino singular.
- source_word: כֶּעָרִים
  english_pob_choice: like the cities
  chosen_spanish: como las ciudades
  alternatives_spanish:
  - igual que las ciudades
  - como ciudades
  lexicon: HALOT
  rationale: La preposición comparativa כ pide una comparación directa. «Como las ciudades» es claro y fiel al paralelo implícito con ciudades concretas de juicio.
- source_word: אֲשֶׁר הָפַךְ יְהוָה
  english_pob_choice: that Yahweh overthrew
  chosen_spanish: que Yahvé derribó
  alternatives_spanish:
  - que Yahvé destruyó
  - que Yahvé trastornó
  lexicon: HALOT
  rationale: הפך en contexto de juicio comunica una acción de ruina total. «Derribó» transmite el derribo devastador; se evita una paráfrasis más amplia que diluya el eco de destrucción judicial.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Tetragrámaton: «Yahvé», preservando el nombre divino sin sustituirlo por un título.'
- source_word: וְלֹא נִחָם
  english_pob_choice: without relenting
  chosen_spanish: sin arrepentirse
  alternatives_spanish:
  - sin ceder
  - sin volverse atrás
  - sin compadecerse
  lexicon: HALOT
  rationale: נחם aquí puede expresar que Yahvé no se retractó ni aflojó el juicio. En español, «sin arrepentirse» mantiene la tensión del texto, pero se entiende en sentido de no retractarse; se evita resolverla con un término demasiado técnico o ajeno al registro bíblico.
- source_word: וְשָׁמַע
  english_pob_choice: and let him hear
  chosen_spanish: y que oiga
  alternatives_spanish:
  - y oirá
  - y oiga
  lexicon: HALOT
  rationale: La fuerza sigue siendo volitiva/imprecativa. «Y que oiga» reproduce el deseo maldito en español con naturalidad.
- source_word: זְעָקָה
  english_pob_choice: a cry
  chosen_spanish: un clamor
  alternatives_spanish:
  - un grito
  - un alarido
  lexicon: HALOT
  rationale: זעקה es un clamor de angustia. «Clamor» conserva el peso colectivo y dramático mejor que un simple «grito».
- source_word: בַּבֹּקֶר
  english_pob_choice: in the morning
  chosen_spanish: por la mañana
  alternatives_spanish:
  - en la mañana
  - al amanecer
  lexicon: HALOT
  rationale: La expresión temporal se vierte con naturalidad española. «Por la mañana» es idiomático y mantiene el sentido general sin sobreespecificar.
- source_word: וּתְרוּעָה
  english_pob_choice: an alarm
  chosen_spanish: una alarma
  alternatives_spanish:
  - un toque de alarma
  - un clamor de guerra
  - un grito de guerra
  lexicon: HALOT
  rationale: תרועה puede ser alarma, toque o grito de guerra. Dado el contexto de juicio y el audit trail inglés, «una alarma» es una opción directa y sobria en español; se mantiene la posible alternativa bélica en nota.
- source_word: בְּעֵת צָהֳרָיִם
  english_pob_choice: at noon
  chosen_spanish: al mediodía
  alternatives_spanish:
  - a la hora del mediodía
  - en la hora del mediodía
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente más plena, pero en español «al mediodía» comunica con precisión la hora señalada y suena natural.
theological_decisions:
- issue: Judgment language and the verb נחם applied to Yahweh
  english_pob_reading: without relenting
  chosen_spanish_reading: sin arrepentirse
  alternative_spanish_readings:
  - sin ceder
  - sin volverse atrás
  - sin compadecerse
  rationale: El texto describe la firmeza irreversible del juicio divino sobre las ciudades destruidas. «Sin arrepentirse» preserva la tensión semántica de נחם sin convertirla en una afirmación teológicamente plana; se entiende como no retractarse del acto judicial, no como pecado o error divino.
  doctrine_reference: 'DOCTRINE.md: preservar la tensión teológica sin resolverla; no suavizar el lenguaje de juicio divino'
- issue: Imprecatory/jussive force in the whole verse
  english_pob_reading: Let that man be ... and let him hear ...
  chosen_spanish_reading: Haga que ese hombre sea ... y que oiga ...
  alternative_spanish_readings:
  - Sea ese hombre ... y oiga ...
  - Que ese hombre sea ... y oiga ...
  rationale: El hebreo no presenta mera predicción, sino una maldición/deseo. La formulación española mantiene esa fuerza volitiva, evitando leer el versículo como simple descripción futura.
  doctrine_reference: 'DOCTRINE.md: preserve literary force and rhetorical mood of the source'
translation_notes:
  revision_awareness: 'La redacción sigue el cierre revisado del audit trail inglés: una formulación más directa y natural para תְרוּעָה y עֵת צָהֳרָיִם, evitando una calca pesada y manteniendo el tono formal. También conserva la decisión auditada de expresar נחם en clave de no retractación/relentimiento, aquí llevada al español con un verbo que permite la tensión teológica del original.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el Tetragrámaton, conforme al estándar del proyecto.
  - Se evita «SEÑOR» para no enmascarar el nombre divino.
  - «Ese hombre» conserva el demostrativo distante del hebreo.
  - «Clamor» y «alarma» distinguen bien las dos realidades auditivas del versículo.
  - La puntuación conserva el paralelismo de dos miembros coordinados con imperativo volitivo.
