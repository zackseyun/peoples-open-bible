    changes_summary: Replaced 'urgently send' with 'indeed send' to reflect the emphatic infinitive absolute without adding interpretive nuance. Kept the rest essentially unchanged for accuracy and naturalness.
translation:
  language: es
  text: 'Y Balac dijo a Balaam[c]: «¿No te envié[a] de veras a llamarte? ¿Por qué no viniste a mí[b]? ¿Acaso realmente no puedo honrarte[c]?».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «¿No ciertamente te envié?», con el hebreo usando un infinitivo absoluto más un verbo finito para dar énfasis; algunos entienden ese énfasis, según el contexto, como envío repetido o urgente.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «¿Por qué no fuiste a mí?».
    reason: lexical_alternative
  - marker: c
    text: «Honrarte» puede incluir la idea de otorgarte recompensa o alto estatus, no solo mostrarte respeto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And ... said
  chosen_spanish: Y ... dijo
  alternatives_spanish:
  - Entonces ... dijo
  - Así que ... dijo
  lexicon: WLC/HALOT
  rationale: La forma narrativa wayyiqtol se reproduce con una coordinación simple en español para mantener el flujo hebreo sin sobreinterpretar la relación discursiva.
- source_word: בָּלָק
  english_pob_choice: Balak
  chosen_spanish: Balac
  alternatives_spanish:
  - Balak
  lexicon: WLC/HALOT
  rationale: Se adapta al uso español habitual del nombre propio, manteniendo la identidad del referente.
- source_word: בִּלְעָם
  english_pob_choice: Balaam
  chosen_spanish: Balaam
  alternatives_spanish:
  - Balaán
  lexicon: WLC/HALOT
  rationale: Se conserva la forma española ampliamente reconocible del nombre propio.
- source_word: הֲלֹא
  english_pob_choice: Did I not
  chosen_spanish: ¿No ...?
  alternatives_spanish:
  - ¿Acaso no ...?
  - ¿No es cierto que ...?
  lexicon: WLC/HALOT
  rationale: La partícula interrogativa con negación espera respuesta afirmativa; la forma española directa conserva el matiz retórico.
- source_word: שָׁלֹחַ שָׁלַחְתִּי
  english_pob_choice: did indeed send
  chosen_spanish: te envié, de verdad
  alternatives_spanish:
  - te envié ciertamente
  - te mandé, de verdad
  lexicon: WLC/HALOT
  rationale: El infinitivo absoluto con verbo finito expresa énfasis. Se evita agregar una idea de urgencia o repetición no exigida por la forma, y se conserva el valor enfático con una expresión natural en español.
- source_word: אֵלֶיךָ
  english_pob_choice: to you
  chosen_spanish: te
  alternatives_spanish:
  - a ti
  - hacia ti
  lexicon: WLC/HALOT
  rationale: El complemento pronominal se integra naturalmente al verbo de enviar en español para evitar una construcción pesada.
- source_word: לִקְרֹא לָךְ
  english_pob_choice: to call you
  chosen_spanish: para llamarte
  alternatives_spanish:
  - para convocarte
  - para citarte
  lexicon: WLC/HALOT
  rationale: קרא en este contexto implica citar o llamar a alguien para que venga. 'Llamarte' es claro y cercano al hebreo, y 'para' refleja la finalidad del envío.
- source_word: לָמָּה לֹא הָלַכְתָּ אֵלָי
  english_pob_choice: Why did you not come to me?
  chosen_spanish: ¿Por qué no viniste a mí?
  alternatives_spanish:
  - ¿Por qué no fuiste a mí?
  - ¿Por qué no viniste hacia mí?
  lexicon: WLC/HALOT
  rationale: הלך literalmente es 'ir', pero con אֵלַי desde la perspectiva de Balac la equivalencia natural es 'venir'. Esto conserva el sentido relacional sin perder el movimiento implícito.
- source_word: הַאֻמְנָם
  english_pob_choice: really
  chosen_spanish: de verdad
  alternatives_spanish:
  - realmente
  - en serio
  lexicon: WLC/HALOT
  rationale: La partícula añade incredulidad o énfasis. 'De verdad' mantiene ese tono en español sin sonar excesivamente formal.
- source_word: לֹא אוּכַל כַּבְּדֶךָ
  english_pob_choice: Am I really not able to honor you?
  chosen_spanish: ¿Acaso realmente no puedo honrarte?
  alternatives_spanish:
  - ¿Realmente no puedo honrarte?
  - ¿No puedo, acaso, honrarte?
  lexicon: WLC/HALOT
  rationale: יכל expresa capacidad y כבד en piel puede significar honrar o conferir honor. Se conserva 'honrarte' para no reducir el sentido a un simple pago, aunque el contexto incluya recompensa y estatus.
theological_decisions:
- issue: 'El alcance de כַּבְּדֶךָ: honor, recompensa o estatus'
  english_pob_reading: '"Honor you" may include the sense of bestowing reward or high status, not merely showing respect.'
  chosen_spanish_reading: '"honrarte" puede incluir recompensa o alto estatus, no solo respeto interpersonal.'
  alternative_spanish_readings:
  - '"recompensarte"'
  - '"darte honor"'
  - '"promoverte"'
  rationale: Se mantiene la amplitud semántica del verbo hebreo sin fijarlo a una sola modalidad. En este contexto Balac ofrece algo más que cortesía; la traducción conserva la tensión entre honor social y beneficio material.
  doctrine_reference: No doctrinal issue; lexical-semantic range only.
translation_notes:
  revision_awareness: Se incorporó la revisión del inglés POB que sustituyó 'urgently send' por un énfasis más neutral ('indeed send'); por eso la versión española evita cualquier adverbio que sugiera urgencia y conserva solo el énfasis retórico. También se preservó la equivalencia dinámica ya aprobada para הלך + אֵלַי como 'venir a mí'.
  spanish_consistency_notes:
  - Se usa 'Balac' para el nombre propio conforme al español bíblico usual, mientras se mantiene 'Balaam' como forma reconocible y estable en español.
  - No se añadió ninguna nota al pie porque el texto español no requiere marcar alternativas editoriales para esta línea; las decisiones semánticas quedan registradas en los campos de léxico.
  - '''Honrarte'' se eligió por ser suficientemente amplio para abarcar honor, favor y posible recompensa sin estrechar indebidamente el hebreo.'
