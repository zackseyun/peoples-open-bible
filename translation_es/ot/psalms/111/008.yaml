translation:
  language: es
  text: Están firmes[a] para siempre jamás, hechos en verdad[b] y rectitud.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sostenidos»; el participio hebreo puede enfatizar ser apoyados o mantenidos firmes.
    reason: lexical_alternative
  - marker: b
    text: «En verdad» también puede traducirse «en fidelidad».
    reason: lexical_alternative
lexical_decisions:
- source_word: סְמוּכִים
  english_pob_choice: established
  chosen_spanish: están firmes
  alternatives_spanish:
  - están establecidos
  - están sostenidos
  - están firmemente asentados
  lexicon: HALOT
  rationale: El participio pasivo de סמך comunica ser sostenido o hecho firme. En español, «están firmes» conserva la idea de permanencia y estabilidad sin sonar forzado; «están establecidos» también sería posible, pero aquí «firmes» refleja mejor la imagen de solidez.
- source_word: לָעַד
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por la eternidad
  - por perpetuidad
  - para toda la duración
  lexicon: HALOT
  rationale: La partícula con ל marca duración continua. «Para siempre» es natural en español y mantiene la fuerza temporal.
- source_word: לְעוֹלָם
  english_pob_choice: and ever
  chosen_spanish: y para siempre
  alternatives_spanish:
  - y eternamente
  - y por siempre
  - y para toda la eternidad
  lexicon: HALOT
  rationale: El paralelismo intensifica la permanencia; por eso se duplica en español como «para siempre y para siempre». Se mantiene la repetición enfática del hebreo sin volverla rígida.
- source_word: עֲשׂוּיִם
  english_pob_choice: done
  chosen_spanish: hechos
  alternatives_spanish:
  - hechos y establecidos
  - obrados
  - realizados
  lexicon: HALOT
  rationale: El participio pasivo de עשה puede expresar algo hecho o constituido. «Hechos» es fiel y natural en español, y conserva el valor pasivo del original.
- source_word: בֶּאֱמֶת
  english_pob_choice: in truth
  chosen_spanish: en verdad
  alternatives_spanish:
  - en verdad y fidelidad
  - en fidelidad
  - verdaderamente
  lexicon: HALOT
  rationale: אֱמֶת puede incluir verdad, confiabilidad y fidelidad. «En verdad» mantiene el núcleo léxico y permite oír también la idea de fidelidad sin forzarla.
- source_word: וְיָשָׁר
  english_pob_choice: and uprightness
  chosen_spanish: y rectitud
  alternatives_spanish:
  - y lo recto
  - y justicia recta
  - y lo derecho
  lexicon: HALOT
  rationale: יָשָׁר significa derecho, recto, correcto. En una serie abstracta tras «en verdad», «rectitud» funciona bien en español y conserva el sentido moral de lo recto.
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior asegurando que ambos marcadores de nota aparezcan exactamente en el texto español, anclados en la repetición enfática de לָעַד לְעוֹלָם.
  spanish_consistency_notes:
  - Se preserva la duplicación intensiva del hebreo con «para siempre y para siempre».
  - Se evita reemplazar el valor de אמת por una glosa doctrinal cerrada; se mantiene la ambigüedad verdad/fidelidad en nota.
  - «Rectitud» se usa para יָשָׁר por ser más natural en una serie nominal abstracta que «uprightness».
