lexical_decisions:
- source_word: Οἱ δὲ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Ahora bien
  - Pero
  lexicon: LSJ
  rationale: δέ funciona aquí como enlace narrativo suave, no como contraste fuerte. En español, 'Y' reproduce mejor ese avance secuencial sin sobrerrepresentar oposición.
- source_word: ἱερεῖς
  english_pob_choice: the priests
  chosen_spanish: los sacerdotes
  alternatives_spanish:
  - los sacerdotes
  lexicon: LSJ
  rationale: El artículo griego y el referente específico del pasaje se expresan de forma natural con 'los sacerdotes'.
- source_word: ἐπέψαλλον
  english_pob_choice: were chanting
  chosen_spanish: entonaban
  alternatives_spanish:
  - cantaban
  - coreaban
  lexicon: LSJ
  rationale: El imperfecto griego indica acción en curso. 'Entonaban' conserva ese valor progresivo y suena más preciso en español litúrgico que un simple perfecto; además evita la rigidez de un calco de progresivo.
- source_word: τοὺς ὕμνους
  english_pob_choice: the hymns
  chosen_spanish: los himnos
  alternatives_spanish:
  - los himnos
  - los cantos de alabanza
  lexicon: LSJ
  rationale: '''ὕμνοι'' se traduce con fidelidad y sobriedad como ''himnos'', manteniendo el artículo y la carga cultual del término sin ampliar innecesariamente a ''cantos de alabanza''.'
translation_notes:
  revision_awareness: El contexto auditado en inglés pasó de 'singing' a 'chanting' para reflejar mejor ἐπέψαλλον. La versión española adopta 'entonaban' para conservar ese matiz de canto litúrgico continuo sin introducir una formulación excesivamente técnica o arcaica.
  spanish_consistency_notes:
  - Se mantuvo 'himnos' para ὕμνους, en coherencia con la terminología litúrgica habitual y con la decisión inglesa de conservar 'the hymns'.
  - No se añadió nota teológica porque el versículo es descriptivo y no plantea una disputa doctrinal explícita.
  - El marcador [a] aparece en el punto exacto de la alternativa verbal para reflejar la variación de aspecto verbal en la fuente griega.
