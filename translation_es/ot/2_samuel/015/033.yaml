translation:
  language: es
  text: 'David le dijo: «Si pasas conmigo, me serás una carga[a].»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «Si cruzas conmigo, me serás una carga». El verbo hebreo puede leerse más literalmente como «pasar» o «cruzar».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר ... דָּוִד
  english_pob_choice: David said
  chosen_spanish: David le dijo
  alternatives_spanish:
  - Entonces David dijo
  - Y David dijo
  lexicon: HALOT
  rationale: El hebreo narra con wayyiqtol en una secuencia continua; en español natural, «le dijo» mantiene la progresión narrativa sin añadir una conjunción inicial innecesaria. El destinatario pronominal queda expresado en el dativo español conforme al hebreo ל֖וֹ.
- source_word: לוֹ
  english_pob_choice: to him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  - a Hushai
  lexicon: HALOT
  rationale: El objeto pronominal es explícito en hebreo, pero el referente no se nombra en el versículo. «Le» conserva el pronombre sin sobreespecificar el nombre en el texto principal.
- source_word: אִם
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - En caso de que
  - Si es que
  lexicon: HALOT
  rationale: Introduce una condición directa; «si» es la equivalencia natural y precisa en español.
- source_word: עָבַרְתָּ אִתִּי
  english_pob_choice: you pass on with me
  chosen_spanish: pasas conmigo
  alternatives_spanish:
  - cruzas conmigo
  - pasas de largo conmigo
  - vas conmigo
  lexicon: HALOT
  rationale: עָבַר puede significar «pasar / cruzar / pasar de largo». En este contexto de acompañar a David, «pasas conmigo» comunica el movimiento y la compañía de manera idiomática en español, sin perder la base semántica de «pasar».
- source_word: וְהָיִתָ עָלַי
  english_pob_choice: you will be ... to me
  chosen_spanish: me serás
  alternatives_spanish:
  - serás para mí
  - vendrás a ser para mí
  - estarás sobre mí
  lexicon: HALOT
  rationale: La construcción hebrea expresa el efecto resultante sobre David; en español, «me serás» prepara de forma natural la predicación con «carga» y conserva la idea relacional de peso o imposición.
- source_word: לְמַשָּׂא
  english_pob_choice: a burden
  chosen_spanish: una carga
  alternatives_spanish:
  - un peso
  - un burden
  - un estorbo
  lexicon: HALOT
  rationale: מַשָּׂא puede designar un peso o carga. «Carga» conserva la fuerza concreta y figurada del término mejor que un simple «estorbo», y en español bíblico es claro y digno.
translation_notes:
  revision_awareness: El borrador sigue de cerca el audit trail inglés de POB y el hebreo masorético. Se mantiene la alternativa lexical de עבר mediante una nota, pero en el texto principal se eligió una formulación española natural que conserva el sentido de acompañamiento y tránsito. No se introdujeron nombres ajenos al versículo ni se amplió el contenido beyond the source.
  spanish_consistency_notes:
  - Se conserva «David» como sujeto explícito, conforme al hebreo.
  - Se usa la segunda persona singular para reflejar el خطاب directo al interlocutor implícito.
  - «Carga» traduce el valor figurado de מַשָּׂא sin suavizarlo indebidamente.
  - La nota a pie mantiene la alternativa lexical de «pasar/cruzar» que el audit trail documenta para עבר.
