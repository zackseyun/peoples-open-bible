revisions:
- from: Efraín era una novilla[a] entrenada, que amaba trillar, y yo respeté su hermoso cuello. Yo pondré a Efraín bajo el yugo[b]; Judá arará[c]; Jacob hará el rastreo para él.
  to: Efraín era una novilla[a] entrenada, que amaba trillar, y yo le perdoné su hermoso cuello.[b] Unciré a Efraín; Judá arará; Jacob pasará la rastra[c] para él.
  rationale: Se revisa la cláusula del cuello para reflejar mejor la decisión auditada «spared her fair neck» y su fuerza contextual de haber sido librada de una carga más dura. Se cambia «pondré a Efraín bajo el yugo» por «Unciré a Efraín» por mayor naturalidad y concisión en español, manteniendo el sentido de harness/yoke. Se sustituye «hará el rastreo» por «pasará la rastra», que es una expresión más idiomática y precisa para la labor agrícola mencionada por יְשַׂדֵּד.
