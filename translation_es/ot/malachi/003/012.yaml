translation:
  language: es
  text: Entonces todas las naciones los llamarán bienaventurados, porque ustedes serán una tierra deleitosa[a], dice Yahvé de los ejércitos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una tierra de deleite» o «una tierra deseable».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִשְּׁר֥וּ
  english_pob_choice: will call you blessed
  chosen_spanish: los llamarán bienaventurados
  alternatives_spanish:
  - los considerarán felices
  - los declararán benditos
  - los llamarán benditos
  lexicon: HALOT
  rationale: El piel de אשר expresa declarar o reconocer como bienaventurado/feliz. «Llamarán bienaventurados» conserva la fuerza pública del reconocimiento y funciona con naturalidad en español bíblico contemporáneo.
- source_word: כָּל הַגּוֹיִם
  english_pob_choice: all the nations
  chosen_spanish: todas las naciones
  alternatives_spanish:
  - todos los pueblos
  - todas las gentes
  lexicon: HALOT
  rationale: «Naciones» reproduce bien גּוֹיִם en este contexto profético colectivo, sin cargar el término con el sentido técnico posterior de «gentiles».
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: En español, «porque» expresa con claridad la razón de la declaración anterior y mantiene la relación causal del hebreo.
- source_word: תִהְי֤וּ אַתֶּם֙
  english_pob_choice: you will be
  chosen_spanish: ustedes serán
  alternatives_spanish:
  - ustedes llegarán a ser
  - ustedes mismos serán
  lexicon: HALOT
  rationale: El futuro de היה se vierte de forma directa y natural en español. Se conserva el énfasis del pronombre explícito con «ustedes».
- source_word: אֶ֣רֶץ חֵ֔פֶץ
  english_pob_choice: a delightful land
  chosen_spanish: una tierra deleitosa
  alternatives_spanish:
  - una tierra de deleite
  - una tierra deseable
  - una tierra agradable
  lexicon: HALOT
  rationale: «חֵפֶץ» combina idea de deleite y deseo. «Tierra deleitosa» conserva esa amplitud y sigue siendo idiomática en español; evita reducir el matiz a solo «agradable».
- source_word: יְהוָ֥ה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Tetragrámaton: «Yahvé» como forma española estable para el nombre divino, en lugar de sustituirlo por un título.'
- source_word: צְבָאֽוֹת
  english_pob_choice: of hosts
  chosen_spanish: de los ejércitos
  alternatives_spanish:
  - de los ejércitos celestiales
  - de los ejércitos
  lexicon: HALOT
  rationale: En español, «de los ejércitos» transmite el valor de צְבָאוֹת de manera clara. Se mantiene la amplitud semántica sin adoptar una formulación más arcaica como «de los ejércitos celestiales».
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: El texto hebreo usa directamente el nombre del pacto; por la norma del proyecto se lo vierte como «Yahvé» y no como una sustitución reverencial.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Matiz de אֶרֶץ חֵפֶץ
  english_pob_reading: a delightful land
  chosen_spanish_reading: una tierra deleitosa
  alternative_spanish_readings:
  - una tierra de deleite
  - una tierra deseable
  rationale: La expresión puede comunicar tanto deleite como deseo. «Tierra deleitosa» preserva la tensión entre belleza, valor y deseabilidad sin estrechar el sentido.
  doctrine_reference: HALOT / English POB lexical note on אֶרֶץ חֵפֶץ
translation_notes:
  revision_awareness: 'El contexto inglés revisado no mostró cambios posteriores (applied_revisions: []); el borrador español sigue de cerca la lectura auditada y conserva la única nota léxica sobre אֶרֶץ חֵפֶץ.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה.
  - Se mantiene «naciones» para גּוֹיִם, no «gentiles», por coherencia con el contexto profético.
  - Se prefirió «de los ejércitos» para צְבָאוֹת, evitando una paráfrasis más amplia.
  - La nota al pie se ancla en «naciones» para corresponder con la alternativa lexical transmitida en el audit trail.
