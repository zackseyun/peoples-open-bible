translation:
  language: es
  text: Los afligidos comerán y se saciarán[a]; los que lo buscan alabarán a Yahvé[b]. Que vuestro corazón viva para siempre[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los humildes», «los pobres» o «los mansos» para עֲנָוִים.'
    reason: lexical_alternative
  - marker: b
    text: El comer puede aludir a un banquete sacrificial o votivo en el contexto del salmo, aunque esto no se expresa explícitamente en este versículo.
    reason: cultural_note
  - marker: c
    text: El hebreo tiene «vuestro corazón» en singular, probablemente como singular colectivo para la vida interior de la comunidad a la que se dirige la bendición.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֲנָוִים
  english_pob_choice: the afflicted
  chosen_spanish: los afligidos
  alternatives_spanish:
  - los humildes
  - los pobres
  - los mansos
  lexicon: HALOT
  rationale: El término puede abarcar humildes, pobres o afligidos según el contexto. En este salmo, el movimiento de aflicción a provisión y alabanza favorece "afligidos", porque conserva el sentido experiencial y social de quienes han sido abatidos y ahora son sostenidos por Dios.
- source_word: יֹאכְלוּ
  english_pob_choice: will eat
  chosen_spanish: comerán
  alternatives_spanish:
  - comerán ciertamente
  - comerán y
  lexicon: HALOT
  rationale: El imperfecto expresa aquí una acción futura en contexto. "Comerán" es la forma natural y directa en español sin añadir matices ajenos al hebreo.
- source_word: וְיִשְׂבָּעוּ
  english_pob_choice: and be satisfied
  chosen_spanish: y se saciarán
  alternatives_spanish:
  - y quedarán satisfechos
  - y estarán saciados
  lexicon: HALOT
  rationale: '"Saciarse" reproduce bien la idea de ser llenados plenamente. En español, "se saciarán" mantiene el tono bíblico sin volverse arcaico.'
- source_word: יְהַלְלוּ
  english_pob_choice: will praise
  chosen_spanish: alabarán
  alternatives_spanish:
  - alabarán a
  - lo alabarán
  lexicon: HALOT
  rationale: El piel imperfecto expresa la acción de alabanza. En español, "alabarán a Yahvé" comunica con claridad el acto cultual sin forzar una perífrasis más pesada.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: Se conserva el nombre divino en la forma adoptada por el proyecto en español, en lugar de sustituirlo por "Señor".
- source_word: דֹּרְשָׁיו
  english_pob_choice: those who seek him
  chosen_spanish: los que lo buscan
  alternatives_spanish:
  - los que le buscan
  - sus buscadores
  lexicon: HALOT
  rationale: El sufijo remite a Yahvé. "Los que lo buscan" es natural en español y conserva el sentido de orientación activa y continua hacia Dios.
- source_word: לְבַבְכֶם
  english_pob_choice: your heart
  chosen_spanish: su corazón
  alternatives_spanish:
  - vuestro corazón
  - sus corazones
  lexicon: HALOT
  rationale: El hebreo tiene singular con sufijo plural de segunda persona, probablemente un singular colectivo para la comunidad. En español, "su corazón" permite reflejar el valor colectivo sin imponer una segunda persona plural que suene menos natural en esta formulación benedictiva.
- source_word: לָעַד
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - eternamente
  - por siempre
  lexicon: HALOT
  rationale: '"Para siempre" es la equivalencia clara y corriente para la duración indefinida del hebreo.'
theological_decisions:
- issue: Tetragrámaton en el texto principal
  english_pob_reading: Render יְהוָה as Yahweh rather than masking it as LORD.
  chosen_spanish_reading: Conservar "Yahvé" en el texto principal.
  alternative_spanish_readings:
  - Señor
  - S EÑOR
  rationale: El proyecto español sigue la decisión auditada de preservar el nombre divino y no sustituirlo por un título. "Yahvé" mantiene la referencia personal al nombre revelado sin perder legibilidad.
  doctrine_reference: Project terminology default for יהוה / YHWH
- issue: 'Lectura del último hemistiquio: singular colectivo y destinatario'
  english_pob_reading: Hebrew 'your heart' is singular, likely a collective singular meaning the inner life of the community addressed.
  chosen_spanish_reading: '"Que su corazón viva para siempre" como singular colectivo de la comunidad.'
  alternative_spanish_readings:
  - Que sus corazones vivan para siempre
  - Que vuestro corazón viva para siempre
  rationale: El hebreo presenta un singular con sufijo plural, y la POB inglesa resalta el valor colectivo. En español, el singular "su corazón" preserva mejor esa unidad comunitaria y evita homogeneizar el giro hebreo en plural sin necesidad textual.
  doctrine_reference: Translation philosophy §§3, 5, 6
- issue: Naturaleza de la comida
  english_pob_reading: Render literally as eating and being satisfied, without specifying sacrificial meal in the main text.
  chosen_spanish_reading: Mantener "comerán y se saciarán" sin explicitar un banquete sacrificial.
  alternative_spanish_readings:
  - comerán del sacrificio y se saciarán
  - comerán en el banquete sacrificial y se saciarán
  rationale: Aunque el contexto puede sugerir un trasfondo cultual, el verso no lo dice explícitamente. La traducción principal no debe introducir esa interpretación como si estuviera expresada directamente en el hebreo.
  doctrine_reference: Translation philosophy §1
translation_notes:
  revision_awareness: La redacción sigue el último estado auditado en inglés, que mantiene la secuencia de comer/saciarse, alabar a Yahvé y cerrar con una bendición de vida duradera. También respeta la corrección revisada que observó el valor plural del sufijo en el último miembro, pero la expresa en español como singular colectivo para evitar una nivelación innecesaria del hebreo.
  spanish_consistency_notes:
  - Se usa "Yahvé" de forma consistente con la terminología del proyecto para יְהוָה.
  - Se evita "Señor" como sustituto del nombre divino.
  - '"Afligidos" mantiene el rango semántico documentado sin imponer "humildes" como lectura principal.'
  - El cierre benedictivo conserva el tono de deseo/benedición con "Que... viva".
  - La relación pronominal de דֹּרְשָׁיו se expresa con "lo" para un referente divino ya mencionado.
