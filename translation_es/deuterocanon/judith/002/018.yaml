translation:
  language: es
  text: y provisiones para cada hombre en abundancia, y muchísimo oro y plata de la casa del rey[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «del tesoro del rey» o «de la casa real»; el griego dice literalmente «de la casa del rey».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπισιτισμὸν
  english_pob_choice: provisions
  chosen_spanish: provisiones
  alternatives_spanish:
  - suministros
  - raciones
  - abastecimiento
  lexicon: LSJ
  rationale: El término griego designa el abastecimiento o suministro de alimentos y recursos. «Provisiones» conserva esa amplitud en español sin estrecharlo indebidamente a raciones militares ni introducir una precisión que el texto no exige.
- source_word: παντὶ ἀνδρὶ
  english_pob_choice: every man
  chosen_spanish: cada hombre
  alternatives_spanish:
  - cada soldado
  - cada persona
  - cada uno
  lexicon: LSJ
  rationale: La frase griega es distributiva y literalmente masculina singular. En este contexto militar puede implicar a cada combatiente, pero el griego dice «hombre», no específicamente «soldado»; por eso se mantiene la referencia genérica masculina.
- source_word: εἰς πλῆθος
  english_pob_choice: in abundance
  chosen_spanish: en abundancia
  alternatives_spanish:
  - en gran cantidad
  - abundantemente
  - en plenitud
  lexicon: LSJ
  rationale: La expresión idiomática comunica cantidad abundante. «En abundancia» es natural en español y reproduce bien la fuerza cuantitativa del griego.
- source_word: χρυσίον καὶ ἀργύριον
  english_pob_choice: gold and silver
  chosen_spanish: oro y plata
  alternatives_spanish:
  - oro y dinero
  - metales preciosos
  lexicon: LSJ
  rationale: El griego nombra directamente los metales preciosos; no añade la idea de dinero. «Oro y plata» es la correspondencia más directa y fiel.
- source_word: ἐξ οἴκου βασιλέως
  english_pob_choice: from the king’s house
  chosen_spanish: de la casa del rey
  alternatives_spanish:
  - del palacio del rey
  - del tesoro del rey
  - de la casa real
  lexicon: LSJ
  rationale: Se conserva la imagen literal de «la casa del rey» porque el griego dice eso de forma explícita. Aunque el contexto pueda sugerir tesorería o palacio, la versión principal evita precisar más de lo que el texto dice.
- source_word: σφόδρα
  english_pob_choice: very much
  chosen_spanish: mucho
  alternatives_spanish:
  - en gran manera
  - en extremo
  - muchísimo
  lexicon: LSJ
  rationale: Aquí el adverbio intensifica la cantidad de oro y plata. En español, «mucho» funciona de modo natural junto con el sustantivo plural implícito y preserva la intensificación sin sobrecargar la frase.
translation_notes:
  revision_awareness: El texto griego y el control inglés concuerdan estrechamente; no se registran revisiones aplicadas en el pasaje. La decisión principal fue mantener la literalidad de ἐξ οἴκου βασιλέως sin cerrar el sentido a «tesoro», aunque esa sea una posibilidad contextual.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - «Casa del rey» conserva la imagen concreta del griego; la nota registra alternativas contextuales sin sustituir el texto principal.
  - «Provisiones» es el equivalente más idiomático para ἐπισιτισμὸν y evita un matiz demasiado técnico de «raciones».
