    rationale: 'Aunque semánticamente defendible, en español bíblico legible resulta más natural expresar la privación con objeto indirecto: «te ha negado» o «te ha retenido el fruto del vientre». La opción actual suena calcada.'
  - severity: low
    issue: Orden ligeramente rígido en «¿Acaso yo estoy en lugar de Dios?»
    rationale: «¿Estoy yo en lugar de Dios?» conserva el énfasis sin sonar tan forzado en español natural.
