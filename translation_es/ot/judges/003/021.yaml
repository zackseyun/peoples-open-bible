translation:
  language: es
  text: Entonces Ehud extendió su mano izquierda, tomó la espada de su muslo derecho[a] y la hundió en su vientre[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «la espada»; el contexto puede sugerir una espada corta o un puñal.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «abdomen».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  english_pob_choice: reached
  chosen_spanish: extendió
  alternatives_spanish:
  - alargó
  - estiró
  lexicon: HALOT
  rationale: El verbo expresa un movimiento físico de extender la mano para tomar algo. «Extendió» conserva la acción concreta y funciona con naturalidad en español sin añadir un matiz no presente.
- source_word: יַד שְׂמֹאלוֹ
  english_pob_choice: his left hand
  chosen_spanish: su mano izquierda
  alternatives_spanish:
  - la mano izquierda de él
  - su izquierda
  lexicon: HALOT
  rationale: Se mantiene el sustantivo explícito «mano», como en hebreo, para conservar el énfasis narrativo en la destreza zurda de Ehud.
- source_word: וַיִּקַּח
  english_pob_choice: took
  chosen_spanish: tomó
  alternatives_spanish:
  - agarró
  - asió
  lexicon: HALOT
  rationale: «Tomó» es un equivalente directo y sobrio para la secuencia narrativa de לקח; no requiere una intensidad mayor que la que ofrece el contexto.
- source_word: הַחֶרֶב
  english_pob_choice: the sword
  chosen_spanish: la espada
  alternatives_spanish:
  - el puñal
  - el daga
  lexicon: HALOT
  rationale: Aunque el contexto sugiere un arma corta, el hebreo usa el término general para «espada». En español se conserva ese término, y la nota aclara la posible concreción del arma.
- source_word: מֵעַל יֶרֶךְ יְמִינוֹ
  english_pob_choice: from his right thigh
  chosen_spanish: de sobre su muslo derecho
  alternatives_spanish:
  - de encima de su muslo derecho
  - de su lado derecho
  lexicon: HALOT
  rationale: «מֵעַל» indica literalmente «de encima de / sobre». «De sobre su muslo derecho» conserva la imagen espacial con mayor fidelidad que una paráfrasis como «de su lado derecho».
- source_word: וַיִּתְקָעֶהָ
  english_pob_choice: thrust it into
  chosen_spanish: la hundió
  alternatives_spanish:
  - la clavó
  - la metió con fuerza
  lexicon: HALOT
  rationale: El verbo describe una inserción violenta. «La hundió» comunica el empuje penetrante de modo natural en español; el pronombre retoma «la espada».
- source_word: בְּבִטְנוֹ
  english_pob_choice: his belly
  chosen_spanish: en su vientre
  alternatives_spanish:
  - en su barriga
  - en su abdomen
  lexicon: HALOT
  rationale: «בטן» designa el vientre o abdomen. «Vientre» conserva un registro digno y bíblico sin ser demasiado técnico; en la nota se preserva la alternativa «abdomen».
translation_notes:
  revision_awareness: 'La versión inglesa revisada cambió de «drove it» a «thrust it» para reflejar mejor el verbo de empuje. En español, «la hundió» preserva ese impulso violento sin perder naturalidad. Se siguió la secuencia del hebreo WLC y se mantuvieron todos los elementos concretos: mano izquierda, arma tomada, ubicación en el muslo derecho y el acto de inserción en el vientre.'
  spanish_consistency_notes:
  - Se conservó «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton ni una cita directa que lo requiera.
  - Se eligió «espada» por fidelidad al lexema hebreo general, con nota que admite la posible concreción del arma.
  - «Vientre» se mantuvo para reflejar el campo semántico corporal del hebreo sin sobrerregularizarlo como término médico.
