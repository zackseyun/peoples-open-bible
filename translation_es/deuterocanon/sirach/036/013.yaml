translation:
  language: es
  text: Reúne todas las tribus de Jacob, y asígnales[a] su heredad como al principio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «y herédalos como al principio» o «y asígnalos como heredad como al principio». El verbo griego es inusual y conserva imágenes de herencia y reparto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: σύναγε
  english_pob_choice: Gather
  chosen_spanish: Reúne
  alternatives_spanish:
  - Junta
  - Convoca
  - Recoge
  lexicon: LSJ
  rationale: El imperativo pide reunir o congregar. «Reúne» conserva la fuerza directa del mandato y suena natural en español bíblico actual.
- source_word: πάσας φυλὰς Ἰακώβ
  english_pob_choice: all the tribes of Jacob
  chosen_spanish: todas las tribus de Jacob
  alternatives_spanish:
  - cada tribu de Jacob
  - todas las tribus de Israel
  - las tribus de Jacob
  lexicon: LSJ
  rationale: Se mantiene «Jacob» porque el griego lo nombra explícitamente. «Todas las tribus» refleja fielmente el plural totalizador de πάσας φυλάς.
- source_word: κατακληρονομήσεις
  english_pob_choice: allot them their inheritance
  chosen_spanish: asígnales su heredad
  alternatives_spanish:
  - allótales su heredad
  - dales su heredad
  - restáuralos en su heredad
  lexicon: LSJ
  rationale: El verbo raro combina la idea de herencia y reparto. «Asígnales su heredad» conserva el campo semántico de allotment/distribución y evita suavizar la imagen de heredad hereditaria.
- source_word: αὐτούς
  english_pob_choice: them
  chosen_spanish: les
  alternatives_spanish:
  - los
  - a ellos
  lexicon: LSJ
  rationale: En español, el dativo indirecto «les» encaja con «asignar la heredad a ellos» y evita una construcción menos natural en la oración.
- source_word: καθὼς ἀπʼ ἀρχῆς
  english_pob_choice: as from the beginning
  chosen_spanish: como desde el principio
  alternatives_spanish:
  - como al principio
  - como desde el comienzo
  - como de antiguo
  lexicon: LSJ
  rationale: La frase temporal se conserva sin precisar más de lo que el griego permite. «Desde el principio» es idiomático y mantiene la referencia a un orden original.
theological_decisions:
- issue: Sentido de κατακληρονομήσεις en un contexto de restauración de Israel
  english_pob_reading: A prayer for God to restore the tribes to their inherited place/portion, expressed as 'allot them their inheritance.'
  chosen_spanish_reading: Una petición para que Dios reúna a las tribus y les asigne de nuevo su heredad ancestral.
  alternative_spanish_readings:
  - hazlos heredar
  - toma posesión de ellos
  - asígnalos como herencia
  rationale: La construcción española debe conservar la tensión entre heredad recibida y reparto divino. «Asígnales su heredad» comunica la restauración sin borrar el matiz distributivo del verbo griego.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source sense without paraphrasing beyond what the text warrants.'
translation_notes:
  revision_awareness: Se siguió la revisión inglesa más reciente, que prefirió «allot them their inheritance» para reflejar con más precisión el sentido distributivo de κατακληρονομήσεις, y se trasladó ese matiz al español con «asígnales su heredad».
  spanish_consistency_notes:
  - Se mantuvo «Jacob» y no «Israel» porque el texto griego nombra explícitamente a Jacob.
  - Se eligió «heredad» para conservar el registro bíblico y el matiz de posesión heredada, en lugar de simplificar a «herencia».
  - La nota [a] está anclada en el texto para cumplir la correspondencia exacta entre marcador y pie de nota.
