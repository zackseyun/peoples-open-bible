translation:
  language: es
  text: 'Entonces Joram volvió las manos y huyó[a], y dijo a Ahazías: «¡Traición[b], Ahazías!»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «volvió las manos» o «giró las manos»; la expresión probablemente alude a la maniobra del carro mediante las manos, pero el hebreo no menciona explícitamente ni riendas ni carro aquí.
    reason: lexical_alternative
  - marker: b
    text: O «Engaño, Ahazías!»
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּהֲפֹךְ
  english_pob_choice: turned
  chosen_spanish: volvió
  alternatives_spanish:
  - giró
  - volvió atrás
  - volteó
  lexicon: HALOT
  rationale: El hebreo expresa la idea básica de volver/torcer la acción o dirección. En este contexto de huida en carro, «volvió» conserva la noción central sin añadir un objeto implícito que el texto no menciona explícitamente.
- source_word: יָדָיו
  english_pob_choice: his hands
  chosen_spanish: las manos
  alternatives_spanish:
  - sus manos
  - las riendas
  lexicon: HALOT
  rationale: Se mantiene la expresión concreta «las manos», porque el hebreo dice literalmente «sus manos». Aunque el contexto sugiere el manejo del carro o de las riendas, traducir «riendas» introduciría un elemento implícito no verbalizado en el texto fuente.
- source_word: וַיָּנֹס
  english_pob_choice: fled
  chosen_spanish: huyó
  alternatives_spanish:
  - escapó
  - corrió a huir
  lexicon: HALOT
  rationale: «Huyó» comunica con naturalidad la fuga urgente del relato. Es una equivalencia idiomática directa de נוּס en contexto narrativo.
- source_word: מִרְמָה
  english_pob_choice: Treachery
  chosen_spanish: Traición
  alternatives_spanish:
  - Engaño
  - Decepción
  - Deslealtad
  lexicon: HALOT
  rationale: Aquí la exclamación tiene fuerza acusatoria y alarmada. «Traición» captura bien ese tono en español y, aunque puede sonar algo más específico que «engaño», refleja la gravedad de la escena. «Engaño» es posible, pero resulta menos enérgico en este contexto.
- source_word: אֲחַזְיָהוּ / אֲחַזְיָה
  english_pob_choice: Ahaziah
  chosen_spanish: Ocozías
  alternatives_spanish:
  - Ahazías
  lexicon: standard Spanish biblical proper-name convention
  rationale: Se sigue la forma castellana tradicional ampliamente reconocible para este nombre bíblico. No afecta el sentido lexical, pero mejora la legibilidad e identificación del personaje para lectores en español.
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y el audit trail inglés de la POB, conservando la ambigüedad del gesto de «volvió las manos» y la exclamación abrupta «Traición». No se incorporan expansiones interpretativas como «riendas» o «carro» en el texto principal; esas posibilidades quedan solo en nota.
  spanish_consistency_notes:
  - Se mantiene la alternancia narrativa breve y enérgica propia del hebreo.
  - Se usa la forma castellana «Ocozías» para el nombre propio, coherente con el uso bíblico en español.
  - La puntuación con comillas angulares y signo de exclamación inicial respeta el estilo editorial español y la fuerza de la cita directa.
