lexical_decisions:
- source_word: וַעֲזַרְיָהוּ
  english_pob_choice: Now ... Azariah
  chosen_spanish: Y ... Azarías
  alternatives_spanish:
  - Ahora ... Azarías
  - Entonces ... Azarías
  lexicon: Nombre propio transliterado según uso bíblico hispano
  rationale: El prefijo conjuntivo se expresa naturalmente con «Y» en español bíblico para conservar la secuencia narrativa sin forzar un adverbio discursivo que el hebreo no exige. El nombre propio se adapta a la forma usual en español, «Azarías».
- source_word: בֶּן
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - descendiente de
  lexicon: HALOT
  rationale: Aquí el constructo indica filiación inmediata; «hijo de» es la equivalencia natural y precisa en español.
- source_word: עֽוֹדֵד
  english_pob_choice: Oded
  chosen_spanish: Oded
  lexicon: Nombre propio transliterado
  rationale: Se conserva el nombre propio en forma estándar hispana sin añadir interpretación.
- source_word: הָיְתָה עָלָיו
  english_pob_choice: came upon
  chosen_spanish: vino sobre
  alternatives_spanish:
  - estuvo sobre
  - estaba sobre
  lexicon: HALOT
  rationale: El hebreo idiomático con רוּחַ en contexto profético sugiere irrupción o venida de la acción divina. «Vino sobre» mantiene mejor ese valor eventivo que una forma estática como «estaba sobre».
- source_word: רוּחַ אֱלֹהִים
  english_pob_choice: the Spirit of God
  chosen_spanish: el Espíritu de Dios
  alternatives_spanish:
  - un espíritu de Dios
  - un espíritu divino
  lexicon: HALOT
  rationale: En este contexto profético, la construcción funciona de manera definida y personal; «el Espíritu de Dios» preserva esa lectura y sugiere la inspiración divina sin añadir más de lo que el texto requiere.
theological_decisions:
- issue: ¿Debe entenderse רוּחַ אֱלֹהִים como una realidad impersonal o como el Espíritu de Dios en sentido personal?
  english_pob_reading: the Spirit of God
  chosen_spanish_reading: el Espíritu de Dios
  alternative_spanish_readings:
  - un espíritu de Dios
  - un espíritu divino
  rationale: El contexto de 2 Crónicas presenta a Azarías recibiendo impulso/inspiración profética. La lectura «el Espíritu de Dios» refleja mejor el uso idiomático y la tradición exegética sin abandonar el soporte del hebreo.
  doctrine_reference: Afirmaciones; filosofía de traducción §§1, 3, 6
- issue: ¿Cómo reflejar la fuerza verbal de הָיְתָה עָלָיו con רוּחַ?
  english_pob_reading: came upon
  chosen_spanish_reading: vino sobre
  alternative_spanish_readings:
  - estuvo sobre
  - estaba sobre
  rationale: La forma elegida conserva el carácter dinámico y puntual del acontecimiento. Las alternativas más estativas suavizan indebidamente el movimiento del texto.
  doctrine_reference: HALOT; observación sintáctica del hebreo bíblico
translation_notes:
  revision_awareness: El texto hebreo y el audit trail inglés coinciden en alto grado; no se requieren revisiones textuales ni ajustes por variante. Se conserva la lectura dinámica de הָיְתָה עָלָיו y la identificación de רוּחַ אֱלֹהִים como «el Espíritu de Dios».
  spanish_consistency_notes:
  - Se mantiene «Espíritu» con mayúscula por tratarse de una referencia divina.
  - Se usa «Azarías» como forma española establecida del nombre.
  - La puntuación sigue el español bíblico moderno y conserva una cadencia breve y directa.
