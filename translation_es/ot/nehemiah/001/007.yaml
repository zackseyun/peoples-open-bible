translation:
  language: es
  text: Hemos actuado de manera muy corrupta contra ti, y no hemos guardado los mandamientos, los estatutos y los juicios[a] que mandaste a tu siervo Moisés.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «las ordenanzas» o «las reglas». El término hebreo puede aludir a decisiones legales o normas de caso.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חֲבֹל חָבַלְנוּ
  english_pob_choice: have acted very corruptly
  chosen_spanish: hemos obrado muy corruptamente
  alternatives_spanish:
  - hemos obrado corruptamente
  - hemos actuado muy mal
  - hemos actuado corruptamente
  lexicon: HALOT
  rationale: La construcción infinitivo absoluto + verbo finito expresa énfasis. «Hemos obrado muy corruptamente» conserva ese refuerzo sin sonar forzado en español, y mantiene la idea de conducta ruinosa o pervertida que el texto hebreo comunica.
- source_word: לָךְ
  english_pob_choice: against you
  chosen_spanish: contra ti
  alternatives_spanish:
  - a ti
  - para ti
  - hacia ti
  lexicon: HALOT
  rationale: En un contexto confesional, la preposición marca ofensa dirigida a Dios. «Contra ti» comunica la violación relacional y moral con claridad natural en español.
- source_word: שָׁמַרְנוּ
  english_pob_choice: have not kept
  chosen_spanish: no hemos guardado
  alternatives_spanish:
  - no hemos observado
  - no hemos vigilado
  - no hemos cumplido
  lexicon: HALOT
  rationale: שׁמר con mandamientos significa guardar/observar. «Guardar» es el equivalente español más estable en contextos de pacto y ley, y preserva el campo semántico bíblico.
- source_word: הַמִּצְוֺת
  english_pob_choice: the commandments
  chosen_spanish: los mandamientos
  alternatives_spanish:
  - los preceptos
  - los mandatos
  lexicon: HALOT
  rationale: «Mandamientos» refleja el carácter de obligación ordenada por Dios y es el término más natural y reconocible en español para מצוות.
- source_word: הַחֻקִּים
  english_pob_choice: the statutes
  chosen_spanish: los estatutos
  alternatives_spanish:
  - los decretos
  - las ordenanzas
  lexicon: HALOT
  rationale: «Estatutos» conserva un registro legal distintivo y permite mantener la diferenciación entre los tres términos jurídicos del versículo.
- source_word: הַמִּשְׁפָּטִים
  english_pob_choice: the judgments
  chosen_spanish: los juicios
  alternatives_spanish:
  - las ordenanzas
  - las reglas
  - los decretos judiciales
  lexicon: HALOT
  rationale: «Juicios» mantiene la raíz judicial de משפטים y refleja la nota de decisiones o normas legales. Aunque en español puede sonar menos corriente que «ordenanzas», conserva mejor la distinción léxica respecto de «estatutos».
- source_word: צִוִּיתָ
  english_pob_choice: you commanded
  chosen_spanish: mandaste
  alternatives_spanish:
  - mandasteis
  - diste órdenes
  - ordenaste
  lexicon: HALOT
  rationale: El verbo expresa mandato directo. «Mandaste» conserva la relación de autoridad divina y suena natural en español; además, enlaza con el sustantivo «mandamientos».
- source_word: עַבְדֶּךָ
  english_pob_choice: your servant
  chosen_spanish: tu siervo
  alternatives_spanish:
  - tu esclavo
  - tu servidor
  lexicon: HALOT
  rationale: Para Moisés ante Dios, «siervo» es la fórmula tradicional y contextualmente adecuada para servicio comisionado, sin forzar la imagen de esclavitud.
theological_decisions:
- issue: Mantener la triple serie legal del versículo
  english_pob_reading: commandments, statutes, and judgments
  chosen_spanish_reading: mandamientos, estatutos y juicios
  alternative_spanish_readings:
  - mandamientos, decretos y ordenanzas
  - mandatos, estatutos y reglas
  rationale: El hebreo presenta tres términos jurídicos distintos. La versión española conserva esa triple distinción en lugar de fusionarla en un solo campo semántico, para respetar la textura legal-covenantal del texto.
  doctrine_reference: Translation philosophy §5 (Consistency of key terms, or documented exception)
translation_notes:
  revision_awareness: El texto sigue el paquete fuente WLC y el audit trail inglés sin cambios de revisión pendientes; el veredicto de revisión más reciente fue de alta concordancia y sin modificaciones necesarias.
  spanish_consistency_notes:
  - Se conserva el registro confesional y legal del hebreo con vocabulario jurídico diferenciado.
  - «Siervo» se usa para Moisés por coherencia bíblica y por el valor de servicio comisionado ante Dios.
  - «Juicios» se mantiene para respetar la distinción léxica de משפטים, aunque se anota una alternativa más idiomática para español.
