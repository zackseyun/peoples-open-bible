translation:
  language: es
  text: 'José les dijo: «Es como les dije[a]: “Ustedes son espías”»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «Es eso que les dije, diciendo: “Ustedes son espías”»; o «Es como les dije, diciendo…».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - les dijo
  - habló
  lexicon: HALOT
  rationale: El verbo narrativo אמר se rinde de forma natural en pretérito simple como «dijo». En español, el complemento indirecto «les» expresa con claridad el destinatario del discurso.
- source_word: אֲלֵהֶם
  english_pob_choice: to them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  - a ellos les
  lexicon: HALOT
  rationale: El dativo pronominal español «les» comunica de manera idiomática el valor de ‘a ellos’ sin recargar la frase.
- source_word: יוֹסֵף
  english_pob_choice: Joseph
  chosen_spanish: José
  alternatives_spanish:
  - José
  lexicon: Tradicional Spanish biblical name
  rationale: Se usa la forma española estable del nombre propio bíblico.
- source_word: הוּא אֲשֶׁר
  english_pob_choice: It is as
  chosen_spanish: Es eso mismo que
  alternatives_spanish:
  - Es lo que
  - Es aquello que
  - Es eso que
  lexicon: HALOT
  rationale: 'La construcción enfática hebrea presenta un valor de reanudación: ‘eso mismo que’. Elegí una fórmula española que preserve el énfasis sin sonar mecánica.'
- source_word: דִּבַּרְתִּי
  english_pob_choice: I said
  chosen_spanish: les he dicho
  alternatives_spanish:
  - les dije
  - les hablé
  lexicon: HALOT
  rationale: Aunque el verbo base es ‘hablar/decir’, el contexto de cita y repetición favorece ‘he dicho’ para reflejar la referencia a una palabra ya pronunciada. El perfecto resalta la vigencia de lo dicho.
- source_word: אֲלֵכֶם
  english_pob_choice: to you
  chosen_spanish: les
  alternatives_spanish:
  - a ustedes
  - a vosotros
  lexicon: HALOT
  rationale: El pronombre átono retoma naturalmente el complemento indirecto plural en español.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - al decir
  - y dijo
  lexicon: HALOT
  rationale: Se conserva la función introductoria de la cita con un gerundio español que refleja la estructura hebrea sin eliminarla por completo.
- source_word: מְרַגְּלִים
  english_pob_choice: spies
  chosen_spanish: espías
  alternatives_spanish:
  - exploradores
  - reconocedores
  lexicon: HALOT
  rationale: El participio de רגל en este contexto judicial/acusatorio se entiende claramente como ‘espías’; ‘exploradores’ suavizaría indebidamente la acusación.
- source_word: אַתֶּם
  english_pob_choice: you are
  chosen_spanish: ustedes son
  alternatives_spanish:
  - son
  - vosotros sois
  lexicon: HALOT
  rationale: El pronombre independiente exige el predicado explícito en español; se usa ‘ustedes’ como forma neutral latinoamericana.
translation_notes:
  revision_awareness: La frase hebrea הוּא אֲשֶׁר דִּבַּרְתִּי ... לֵאמֹר mantiene una reanudación enfática y una fórmula explícita de cita. Frente a la traducción inglesa auditada, se conserva esa estructura de manera legible en español, evitando borrar el valor de ‘eso mismo que’ y la transición ‘diciendo’.
  spanish_consistency_notes:
  - 'Se mantiene el nombre bíblico en forma española estándar: José.'
  - Se usa «espías» para מְרַגְּלִים por su fuerza acusatoria y por coherencia con la lectura auditada.
  - 'Se conserva el pronombre plural de segunda persona en forma neutral latinoamericana: «ustedes».'
  - No se sustituye el hebraísmo por una paráfrasis más libre; se lo vuelve publicable sin perder la repetición enfática.
