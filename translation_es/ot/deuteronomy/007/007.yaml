translation:
  language: es
  text: No fue por ser ustedes más numerosos que todos los pueblos que Yahvé puso su afecto en ustedes[a] y los escogió, porque ustedes eran los menos numerosos de todos los pueblos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «puso su amor en ustedes». El verbo hebreo expresa un apego o afecto fuerte.
    reason: lexical_alternative
lexical_decisions:
- source_word: מֵרֻבְּכֶם
  english_pob_choice: because you were more numerous
  chosen_spanish: por ser ustedes más numerosos
  alternatives_spanish:
  - porque eran más numerosos
  - a causa de su multitud
  - por su mayor número
  lexicon: HALOT
  rationale: La construcción comparativa con מִן expresa superioridad numérica y base causal. En español, «por ser ustedes más numerosos» conserva la relación causal sin sonar forzado, y mantiene el contraste numérico del hebreo y del inglés POB.
- source_word: מִכָּל הָעַמִּים
  english_pob_choice: than all the peoples
  chosen_spanish: que todos los pueblos
  alternatives_spanish:
  - que todos los pueblos
  - que cualquiera de los pueblos
  - que todas las naciones
  lexicon: HALOT
  rationale: «Pueblos» reproduce mejor עַמִּים como grupos étnicos/colectivos. La comparación con מִן queda natural en español con «que».
- source_word: חָשַׁק
  english_pob_choice: set his affection on
  chosen_spanish: se aficionó a
  alternatives_spanish:
  - puso su afecto en
  - se prendó de
  - se apegó a
  lexicon: HALOT
  rationale: El verbo hebreo comunica adhesión afectiva fuerte. «Se aficionó a» intenta reproducir esa atracción o apego personal de manera natural en español, sin diluir la fuerza relacional. Se evita reducirlo solo a «amó» porque el POB inglés mantuvo la tensión de afecto/apego, no una fórmula más general.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahvé
  - Jehová
  lexicon: HALOT
  rationale: La política del proyecto para el Tetragrama es «Yahvé». Se conserva el nombre propio divino en lugar de una sustitución por título.
- source_word: וַיִּבְחַר
  english_pob_choice: and chose
  chosen_spanish: y los escogió
  alternatives_spanish:
  - y los eligió
  - y los seleccionó
  lexicon: HALOT
  rationale: בחר en contexto de pacto se rinde naturalmente por «escoger»/«elegir». «Escogió» mantiene la continuidad bíblica y la fuerza electiva del verbo sin introducir explicación adicional.
- source_word: הַמְעַט
  english_pob_choice: the fewest
  chosen_spanish: los más pocos
  alternatives_spanish:
  - los menos numerosos
  - el grupo más pequeño
  - los menos
  lexicon: HALOT
  rationale: El hebreo expresa pequeñez numérica relativa. Aunque «los más pocos» es menos idiomático, refleja de cerca la comparación absoluta del texto; se prefiere aquí para mantener la correspondencia semántica con el inglés POB «the fewest». En lectura pública, comunica la idea de mínima cantidad entre los pueblos.
theological_decisions:
- issue: Cómo rendir חָשַׁק sin borrar el matiz afectivo/covenantal
  english_pob_reading: set his affection on
  chosen_spanish_reading: se aficionó a ustedes
  alternative_spanish_readings:
  - puso su afecto en ustedes
  - se prendó de ustedes
  - se apegó a ustedes
  rationale: El texto no dice solo una elección fría; une afecto y elección. La formulación española busca conservar ese componente relacional. «Se aficionó» es una solución estilística que intenta captar el apego fuerte del verbo sin convertirlo en una paráfrasis doctrinal.
  doctrine_reference: 'DOCTRINE.md: Contested terms — חָשַׁק / affection, attachment'
- issue: No sobreinterpretar la elección divina de Israel
  english_pob_reading: and chose you
  chosen_spanish_reading: y los escogió
  alternative_spanish_readings:
  - y los eligió
  - y los seleccionó
  rationale: 'Se mantiene el lenguaje de elección del pacto tal como aparece en el versículo, sin añadir categorías sistemáticas que el texto no explicita. La redacción española conserva la línea causal: no por número, sino por la elección libre de Yahvé.'
  doctrine_reference: 'DOCTRINE.md Affirmations / Translation philosophy #3'
- issue: Uso del nombre divino
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  rationale: Se preserva el nombre propio del Tetragrama, en coherencia con la política del proyecto. Esto evita la sustitución por un título y mantiene visible el nombre del pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה YHWH → Yahvé'
translation_notes:
  revision_awareness: El texto hebreo y el audit trail inglés están en alto acuerdo; no se registran revisiones aplicadas. La versión española sigue la misma lectura de causa negada, afecto/adhesión y elección divina, preservando la tensión léxica del verbo חָשַׁק y el contraste numérico del verso.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el Tetragrama, conforme al estándar del proyecto.
  - Se mantiene «pueblos» para עַמִּים por su valor colectivo-étnico.
  - Se conserva la elección verbal «escogió» para בחר, en línea con el lenguaje bíblico de pacto.
  - La nota [a] recoge la alternativa semántica principal de חָשַׁק sin duplicar el sentido en el cuerpo del texto.
