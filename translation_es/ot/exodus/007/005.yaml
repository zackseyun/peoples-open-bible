    rationale: La coma en «que yo soy Yahvé, cuando extienda...» no es necesaria y entorpece levemente la fluidez del período en español.
  - severity: low
    issue: Expresión final algo menos natural
    rationale: «De en medio de ellos» es fiel, pero «de entre ellos» suena más idiomático en español neutro y mantiene el sentido de separación del hebreo מִתּוֹכָם.
  revised_spanish_text: Y los egipcios sabrán que yo soy Yahvé cuando extienda mi mano contra Egipto y saque a los hijos de Israel de entre ellos.
