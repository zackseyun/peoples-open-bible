review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del griego: condición (''Si, pues''), fugitivos que ''han escapado'', entrega a Simón como sumo sacerdote, y finalidad judicial. Sin embargo, hay dos puntos que conviene ajustar para mayor fidelidad al audit trail y al griego: (1) ''han venido a nosotros'' añade una idea no expresada directamente por πρὸς ἡμᾶς en este contexto de refugio/destino; basta ''a nosotros'' o ''se han refugiado con nosotros'', pero como el POB inglés eligió ''to us'', lo mejor es no expandir a ''han venido''; (2) κατὰ τὸν νόμον αὐτῶν debe reflejar claramente el plural ''su/ley de ellos''; ''conforme a su ley'' puede sonar singular ambiguo en español.'
  spanish_quality_summary: 'El español es claro, natural y digno. ''Entréguenlos'', ''sumo sacerdote'' y ''los castigue'' funcionan bien. No obstante, la nota b tiene un problema importante: ''pueda vengarlos'' significa ''avenge them'' en el sentido de actuar a favor de ellos, cuando el contexto y el griego exigen ''vengarse de ellos'' / ''tomar venganza contra ellos'' o mejor una formulación judicial. Además, la nota a repite ''hombres pestilentes'' y puede pulirse.'
  glossary_alignment: No hay términos del glosario mayor en conflicto. 'Sumo sacerdote' para ἀρχιερεῖ es correcto. La decisión de ἐκδικήσει como 'castigue' está en línea con la rationale jurídica del POB. Se debe, eso sí, conservar mejor el plural de αὐτῶν en 'la ley de ellos' o equivalente.
  issues:
  - severity: medium
    issue: Añadido interpretativo en 'han venido a nosotros'
    rationale: El griego dice πρὸς ἡμᾶς como destino de la fuga; 'han venido' no es grave, pero añade un verbo no presente y menos preciso que el audit trail inglés.
  - severity: medium
    issue: Ambigüedad de número en 'conforme a su ley'
    rationale: El audit trail subraya que αὐτῶν es plural ('their law'). En español, 'su ley' puede entenderse como singular posesivo indeterminado; 'la ley de ellos' preserva mejor el dato textual.
  - severity: high
    issue: Nota b traduce mal la alternativa de venganza con 'pueda vengarlos'
    rationale: '''Vengarlos'' en español significa vengar a alguien, no ejercer venganza contra ellos. Esto invierte la relación semántica del verbo y desinforma al lector.'
  - severity: low
    issue: Nota a contiene repetición innecesaria
    rationale: Repite 'hombres pestilentes' y puede expresarse con más limpieza sin perder las alternativas léxicas.
  revised_spanish_text: Si, pues, algunos hombres perniciosos[a] han escapado de su tierra a nosotros, entréguenlos a Simón, el sumo sacerdote, para que los castigue conforme a la ley de ellos[b].
  revised_footnotes:
  - marker: a
    text: También puede entenderse como 'hombres pestilentes', 'alborotadores' o, más literalmente, 'hombres pestilentes'. El griego λοιμοί es un término duro para personas peligrosas o perniciosas.
    reason: lexical_alternative
  - marker: b
    text: O 'para que haga justicia contra ellos' o 'para que tome venganza de ellos'. El griego puede implicar castigo o vindicación; el contexto legal favorece aquí el sentido judicial.
    reason: alternative_reading
  revision_rationale: La revisión elimina un añadido verbal no necesario, hace explícito el plural de 'their law', y corrige una nota que invertía el sentido de la alternativa de venganza. Se conserva el buen español del borrador y su alineación con las decisiones léxicas del POB.
