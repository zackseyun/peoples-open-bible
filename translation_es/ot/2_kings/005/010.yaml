translation:
  language: es
  text: 'Así, Eliseo le envió un mensajero, diciendo: «Ve y lávate siete veces en el Jordán; tu carne volverá a ti[a], y quedarás limpio[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tu carne volverá a ti». El hebreo expresa la restauración a un estado corporal saludable anterior.
    reason: lexical_alternative
  - marker: b
    text: O «serás limpiado». El verbo puede denotar volverse limpio o puro, con matices físicos y rituales.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - despachó
  lexicon: HALOT
  rationale: En narración, שלח expresa la acción básica de enviar. «Envió» es natural en español y conserva el movimiento causado sin añadir fuerza innecesaria.
- source_word: אֵלָיו
  english_pob_choice: to him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  lexicon: HALOT
  rationale: El pronombre dativo se integra de forma natural en español como complemento indirecto. El referente es Naamán por el contexto.
- source_word: מַלְאָךְ
  english_pob_choice: messenger
  chosen_spanish: mensajero
  alternatives_spanish:
  - enviado
  - ángel
  lexicon: HALOT
  rationale: Aquí el contexto narrativo exige una persona enviada, no un ser celestial. «Mensajero» conserva el valor humano del término.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - con este mensaje
  - y dijo
  lexicon: HALOT
  rationale: La fórmula introductoria de discurso se reproduce con una construcción idiomática que mantiene la conexión formal con la cita.
- source_word: הָלוֹךְ וְרָחַצְתָּ
  english_pob_choice: Go and wash
  chosen_spanish: Ve y lávate
  alternatives_spanish:
  - Ve, y lávate
  - Ve, lávate
  lexicon: HALOT
  rationale: El infinitivo absoluto con verbo finito intensifica el mandato. En español, «Ve y lávate» preserva el orden imperativo de manera natural.
- source_word: שֶׁבַע פְּעָמִים
  english_pob_choice: seven times
  chosen_spanish: siete veces
  alternatives_spanish:
  - siete ocasiones
  lexicon: HALOT
  rationale: Expresión numérica directa; no requiere paráfrasis.
- source_word: בַּיַּרְדֵּן
  english_pob_choice: in the Jordan
  chosen_spanish: en el Jordán
  alternatives_spanish:
  - en el río Jordán
  lexicon: HALOT
  rationale: El nombre propio se usa de modo corriente en español bíblico como «el Jordán». Añadir «río» no es necesario al texto hebreo.
- source_word: וְיָשֹׁב
  english_pob_choice: will be restored
  chosen_spanish: volverá
  alternatives_spanish:
  - será restaurada
  - será devuelta
  lexicon: HALOT
  rationale: El hebreo usa un verbo de «volver/retornar» con sentido idiomático de restauración. «Volverá» preserva la imagen de retorno de la carne a su estado anterior, que el inglés POB explicita con nota.
- source_word: בְּשָׂרְךָ
  english_pob_choice: your flesh
  chosen_spanish: tu carne
  alternatives_spanish:
  - tu cuerpo
  - tu carne volverá a ti
  lexicon: HALOT
  rationale: בשר se mantiene con su concretud corporal como «carne», evitando suavizarlo a «cuerpo». La lectura conserva la vividez del hebreo y la tensión lexical documentada.
- source_word: לְךָ
  english_pob_choice: to you
  chosen_spanish: a ti
  alternatives_spanish:
  - para ti
  lexicon: HALOT
  rationale: La preposición marca dirección/beneficio de la restauración hacia la misma persona. «A ti» refleja el dativo personal de manera clara.
- source_word: וּטְהָר
  english_pob_choice: and you will be clean
  chosen_spanish: y quedarás limpio
  alternatives_spanish:
  - y serás limpio
  - y serás purificado
  lexicon: HALOT
  rationale: טהר puede expresar limpieza física y resonancia de pureza. «Quedarás limpio» comunica el resultado del mandato en un español natural sin cerrar indebidamente la dimensión ritual.
theological_decisions:
- issue: Cómo reflejar בשר sin perder la fuerza corporal del hebreo
  english_pob_reading: flesh
  chosen_spanish_reading: carne
  alternative_spanish_readings:
  - cuerpo
  rationale: El texto habla de «tu carne» y no simplemente de tu cuerpo. Mantener «carne» conserva el lenguaje concreto y la restauración visible que el pasaje presenta.
  doctrine_reference: Translation philosophy §1, §5
- issue: Cómo traducir טהר sin eliminar su posible trasfondo de pureza
  english_pob_reading: you will be clean
  chosen_spanish_reading: quedarás limpio
  alternative_spanish_readings:
  - serás limpiado
  - serás purificado
  rationale: El contexto inmediato es sanidad, pero el verbo también puede sugerir limpieza/pureza. «Quedarás limpio» sostiene ambas posibilidades sin imponer un marco exclusivamente ritual.
  doctrine_reference: Translation philosophy §3, §6
translation_notes:
  revision_awareness: 'El contexto auditado muestra alta concordancia entre la traducción inglesa y el análisis original; no se registraron revisiones aplicadas y la última pasada indicó que no hacía falta cambiar nada. La versión española conserva la misma tensión léxica principal: בשר como «carne» y טהר como limpieza con posible trasfondo de pureza.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando aparece el nombre divino; este versículo no lo contiene.
  - «Jordán» se conserva como topónimo bíblico estable en español.
  - No se sustituye «carne» por «cuerpo», para no borrar la concreción léxica documentada.
