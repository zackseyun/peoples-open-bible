translation:
  language: es
  text: Así también, seiscientos mil soldados de a pie[a], reunidos en la arrogancia de su corazón[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Posible alusión a la generación del desierto de Israel; compárese el censo tradicional de Éxodo 12:37 y Números 11:21.
    reason: cross_reference
  - marker: b
    text: O «en la insolencia de su corazón» o «en la presunción de su corazón». El griego paralelo dice literalmente «en la dureza de su corazón».
    reason: lexical_alternative
lexical_decisions:
- source_word: כֵּן / καὶ οὕτως
  english_pob_choice: So also
  chosen_spanish: Así también
  alternatives_spanish:
  - De la misma manera
  - Igualmente
  lexicon: HALOT; BDAG (for connective sense in Greek parallel)
  rationale: La frase introduce otro ejemplo paralelo al contexto previo. «Así también» conserva la fuerza conectiva sin sonar rígida ni excesivamente interpretativa.
- source_word: שֵׁשׁ מֵאוֹת אֶלֶף / ἑξακοσίας χιλιάδας
  english_pob_choice: six hundred thousand
  chosen_spanish: seiscientos mil
  alternatives_spanish:
  - '600.000'
  lexicon: HALOT
  rationale: Se mantiene el cardinal en español natural y literario, fiel al hebreo y al griego, sin agregar ni omitir información.
- source_word: רַגְלִי / πεζῶν
  english_pob_choice: foot soldiers
  chosen_spanish: soldados
  alternatives_spanish:
  - infantería
  - soldados de a pie
  lexicon: HALOT; LSJ
  rationale: El hebreo y el griego expresan literalmente a los que van a pie, con sentido militar. En español, «soldados» comunica el referente de manera clara y digna; «soldados de a pie» sería más literal pero menos natural, y «infantería» suena más técnico que el contexto requiere.
- source_word: הַנֶּאֱסָפִים / ἐπισυναχθέντας
  english_pob_choice: gathered together
  chosen_spanish: reunidos
  alternatives_spanish:
  - juntados
  - convocados
  - agrupados
  lexicon: HALOT; BDAG
  rationale: «Reunidos» refleja bien la пасiva participial hebrea y la forma griega, con fluidez en español. Mantiene el matiz de grupo congregado sin introducir un detalle no presente en el texto.
- source_word: בִּזְדוֹן / ἐν σκληροκαρδίᾳ
  english_pob_choice: in the arrogance of their heart
  chosen_spanish: en la arrogancia de su corazón
  alternatives_spanish:
  - en la insolencia de su corazón
  - en la presunción de su corazón
  - en la dureza de su corazón
  lexicon: HALOT; BDAG
  rationale: El hebreo apunta a arrogancia/presunción insolente; el griego usa literalmente «dureza de corazón», pero el contexto y el hebreo favorecen el sentido moral de soberbia obstinada. «Arrogancia» preserva esa tensión sin borrar el testimonio del paralelo griego. Se evita «dureza» en el texto principal porque desplazaría el énfasis hacia otra cualidad.
- source_word: לִבָּם
  english_pob_choice: of their heart
  chosen_spanish: su corazón
  alternatives_spanish:
  - de su corazón
  - de sus corazones
  lexicon: HALOT
  rationale: El hebreo usa un singular colectivo con sufijo plural; en español, «su corazón» reproduce de forma natural la referencia colectiva sin forzar una construcción extraña.
theological_decisions:
- issue: Relación entre el hebreo «arrogancia» y el griego «dureza de corazón»
  english_pob_reading: in the arrogance of their heart
  chosen_spanish_reading: en la arrogancia de su corazón
  alternative_spanish_readings:
  - en la dureza de su corazón
  - en la insolencia de su corazón
  rationale: 'El testimonio hebreo y el griego no son idénticos: uno destaca la soberbia/presunción y el otro la dureza del corazón. La redacción española sigue la línea del hebreo principal, pero no pretende resolver la tensión textual; la nota conserva la alternativa griega relevante.'
  doctrine_reference: Preservar la tensión textual cuando las fuentes difieren; no armonizar sin base explícita.
- issue: Identificación del grupo de seiscientos mil
  english_pob_reading: Leave the referent implicit in the main text rather than naming Israel in translation.
  chosen_spanish_reading: Dejar implícito el referente en el texto principal.
  alternative_spanish_readings:
  - Nombrar a Israel
  - Identificar explícitamente a la generación del desierto
  rationale: El verso aporta el número y la caracterización moral, pero no nombra al grupo. La traducción no debe importar una identificación que el texto no formula explícitamente.
  doctrine_reference: Preservar la tensión histórica y literaria; no añadir sujetos implícitos al texto principal.
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión más reciente que eliminó el demostrativo innecesario en inglés y conservó «foot soldiers» y «the arrogance of their heart». La versión española refleja esa misma naturalidad, sin añadir un demostrativo equivalente y manteniendo el contraste entre el hebreo (arrogancia/presunción) y el griego (dureza de corazón) mediante nota.
  spanish_consistency_notes:
  - Se usa «corazón» en singular colectivo, coherente con el hebreo.
  - Se evitó «Cristo», «SEÑOR» y otras sustituciones no pertinentes al verso.
  - El estilo mantiene registro bíblico moderno y no arcaizante.
  - La nota textual conserva la tensión hebreo-griega en vez de armonizarla silenciosamente.
