id: 1TI.4.10
reference: 1 Timothy 4:10
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: εἰς τοῦτο ⸀γὰρ κοπιῶμεν καὶ ⸀ὀνειδιζόμεθα, ὅτι ἠλπίκαμεν ἐπὶ θεῷ ζῶντι, ὅς ἐστιν σωτὴρ πάντων ἀνθρώπων, μάλιστα πιστῶν.
base_translation:
  language: en
  yaml_path: translation/nt/1_timothy/004/010.yaml
  text: For to this end we labor and are reproached[a], because we have put our hope in the living God, who is the Savior of all people[c][b], especially of believers.
  footnotes:
  - marker: a
    text: Or 'we toil and are reviled.'
    reason: lexical_alternative
  - marker: b
    text: Or 'we have set our hope on the living God.'
    reason: lexical_alternative
  - marker: c
    text: The phrase 'Savior of all people, especially of believers' is rendered as written; interpreters differ on whether 'Savior' here emphasizes God's preserving care for all, his saving provision for all, or salvation applied especially to believers.
    reason: alternative_reading
translation:
  language: ko
  text: 이를 위하여 우리가 수고하고 책망을 받습니다[a]. 이는 우리가 살아 계신 하나님께 소망을 두었기[b] 때문입니다. 그분은 모든 사람의 구주이시며, 특히 믿는 자들의 구주이십니다[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「수고하고 모욕을 당합니다」.
    reason: lexical_alternative
  - marker: b
    text: 또는 「살아 계신 하나님께 우리의 소망을 두었기」.
    reason: lexical_alternative
  - marker: c
    text: 「모든 사람의 구주이시며, 특히 믿는 자들의 구주」는 본문 그대로 옮긴 것이다. 해석자들은 이 「구주」가 (1) 모든 사람에 대한 하나님의 보존적 돌보심을 강조하는지, (2) 모든 사람을 위한 구원의 제공을 강조하는지, (3) 특히 믿는 자들에게 적용되는 구원을 강조하는지에서 견해가 갈린다.
    reason: alternative_reading
lexical_decisions:
- source_word: κοπιῶμεν
  english_pob_choice: we labor
  chosen_korean: 우리가 수고하고
  alternatives_korean:
  - 애쓰고
  - 노력하고
  lexicon: BDAG
  rationale: κοπιάω의 「힘든 수고」를 「수고」로.
- source_word: ὀνειδιζόμεθα
  english_pob_choice: are reproached
  chosen_korean: 책망을 받습니다
  alternatives_korean:
  - 비난을 받습니다
  - 모욕을 당합니다
  lexicon: BDAG
  rationale: ὀνειδίζω의 「공개적 비난」을 「책망」으로(3:7 ὀνειδισμός 「수치」와 어휘 차이를 위해).
- source_word: ἠλπίκαμεν ἐπὶ θεῷ ζῶντι
  english_pob_choice: we have put our hope in the living God
  chosen_korean: 살아 계신 하나님께 소망을 두었기
  alternatives_korean:
  - 살아 계신 하나님께 우리의 소망을 두었기
  lexicon: BDAG
  rationale: ἐλπίζω의 완료형 「소망을 둠의 지속」을 보존.
- source_word: σωτὴρ πάντων ἀνθρώπων, μάλιστα πιστῶν
  english_pob_choice: Savior of all people, especially of believers
  chosen_korean: 모든 사람의 구주이시며, 특히 믿는 자들의 구주이십니다
  alternatives_korean:
  - 모든 사람의 구원자, 특별히 믿는 자들의 구원자
  - 만인의 구주, 특히 신자들의 구주
  lexicon: BDAG
  rationale: 본 어구의 신학적 해석을 좁히지 않고 본문 그대로 옮긴다.
