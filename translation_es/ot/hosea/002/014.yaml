revisions:
- from: 'Yo convertiré en desolación su vid y su higuera[a], de las cuales ella dijo: “Estas son mis ganancias que me dieron mis amantes”. Las convertiré en un bosque, y las bestias del campo las devorarán.'
  to: 'Devastaré su vid y su higuera[a], de las cuales ella dijo: «Estas son mi salario[a], que me dieron mis amantes». Las convertiré en bosque, y las bestias del campo las devorarán.'
  rationale: Se ajusta וַהֲשִׁמֹּתִי a una forma española más idiomática y enérgica ('Devastaré'). Se cambia 'ganancias' por 'salario' para alinearse mejor con el valor transaccional de אֶתְנָה y con la documentación inglesa ('wages' / 'hire'). Se elimina la alternativa impropia 'alquiler' de la nota. También se simplifica 'en un bosque' a 'en bosque' para mayor naturalidad bíblica, manteniendo el mismo sentido.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:36:16Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: juicio sobre la vid y la higuera, reclamación de ''wages'' atribuidas a los amantes, reversión a estado silvestre y destrucción por animales. Sin embargo, hay ajustes necesarios para alinear mejor algunos matices léxicos del original y del rastro POB en inglés.'
  spanish_quality_summary: 'El español es claro y digno, pero presenta algunas elecciones menos naturales o menos precisas: ''Yo convertiré en desolación'' suena más forzado que ''Devastaré''; ''ganancias'' debilita el sentido de remuneración/paga de אֶתְנָה; y en la nota, ''alquiler'' no encaja bien en español bíblico para este contexto. También conviene explicitar ''mis amantes'' para reflejar el sufijo posesivo.'
  glossary_alignment: 'No hay conflicto con los términos troncales del proyecto. La principal cuestión terminológica es אֶתְנָה: la decisión inglesa ''wages'' con nota alternativa ''hire'' pide en español una forma más cercana a ''salario/paga'' que a ''ganancias''. ''Bestias del campo'' es aceptable como excepción estilística tradicional, aunque ''animales salvajes del campo'' sería más moderno.'
  issues:
  - severity: medium
    issue: וַהֲשִׁמֹּתִי traducido como 'Yo convertiré en desolación'
    rationale: Aunque inteligible, suena poco idiomático. El hebreo expresa devastar/arruinar; 'Devastaré' o 'Asolaré' preserva mejor la fuerza judicial en español natural.
  - severity: medium
    issue: אֶתְנָה traducido como 'ganancias'
    rationale: '''Ganancias'' puede sugerir lucro general y diluye el sentido específico de remuneración/paga, importante en el audit trail y en la metáfora de infidelidad. ''Salario'' o ''paga'' encajan mejor con ''wages/hire''.'
  - severity: low
    issue: Nota al pie incluye 'alquiler' como alternativa
    rationale: '''Alquiler'' no es una alternativa adecuada aquí para אֶתְנָה en español bíblico; puede confundir. La alternativa documentada en inglés es ''hire'', mejor reflejada por ''salario'' o ''paga''.'
  - severity: low
    issue: מְאַהֲבַי reflejado en el texto sin posesivo explícito
    rationale: El borrador dice 'me dieron mis amantes' correctamente en la oración principal, pero la decisión léxica listada como 'amantes' debería corresponder al texto final con el posesivo explícito. Conviene mantener 'mis amantes' sin ambigüedad.
  revised_spanish_text: 'Devastaré su vid y su higuera[a], de las cuales ella dijo: «Estas son mi salario[a], que me dieron mis amantes». Las convertiré en bosque, y las bestias del campo las devorarán.'
  revised_footnotes:
