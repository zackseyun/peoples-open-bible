translation:
  language: es
  text: Pero ellos no eran de entre la descendencia de aquellos hombres por cuya mano había sido dada la salvación a Israel[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por su mano», o más idiomáticamente «por medio de ellos».
