translation:
  language: es
  text: Y no codiciarás[a] la esposa de tu prójimo; y no desearás la casa[b] de tu prójimo, su campo, su esclavo varón, su esclava, su buey, su asno, ni cosa alguna que pertenezca a tu prójimo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «no anhelarás». El hebreo usa aquí un verbo distinto del de la prohibición posterior, probablemente para intensificar o matizar la prohibición, no simplemente repetirla.
    reason: lexical_alternative
  - marker: b
    text: «Casa» también puede incluir el sentido más amplio de hogar o hacienda; sin embargo, la lista que sigue favorece aquí el sentido de propiedad.
    reason: lexical_alternative
lexical_decisions:
- source_word: תַחְמֹד
  english_pob_choice: covet
  chosen_spanish: codiciarás
  alternatives_spanish:
  - desearás
  - ambicionarás
  lexicon: HALOT
  rationale: חמד expresa un deseo injusto por lo ajeno. En español, «codiciar» conserva mejor esa fuerza ética y el tono jurídico del mandamiento que «desear».
- source_word: אֵשֶׁת רֵעֶךָ
  english_pob_choice: your neighbor’s wife
  chosen_spanish: la esposa de tu prójimo
  alternatives_spanish:
  - la mujer de tu prójimo
  - la esposa de tu vecino
  lexicon: HALOT
  rationale: 'La construcción hebrea indica posesión relacional: la esposa de otro miembro de la comunidad. «Esposa» es claro y fiel; «prójimo» reproduce el valor de רֵעַ mejor que «vecino» en este contexto legal.'
- source_word: תִתְאַוֶּה
  english_pob_choice: desire
  chosen_spanish: desearás
  alternatives_spanish:
  - anhelarás
  - codiciarás
  lexicon: HALOT
  rationale: El verbo hitpael de אוה no es idéntico a חמד. «Desear» conserva la distinción semántica preservada por el POB inglés sin borrar la segunda forma verbal.
- source_word: בֵּית רֵעֶךָ
  english_pob_choice: your neighbor’s house
  chosen_spanish: la casa de tu prójimo
  alternatives_spanish:
  - la casa de tu vecino
  - la casa/ hogar de tu prójimo
  - la familia de tu prójimo
  lexicon: HALOT
  rationale: Aunque בַּיִת puede extenderse a casa/hogar/estirpe, la lista de bienes que sigue favorece el sentido concreto de propiedad. «Casa» mantiene esa concreción en español.
- source_word: שָׂדֵהוּ
  english_pob_choice: his field
  chosen_spanish: su campo
  alternatives_spanish:
  - su tierra
  - su parcela
  lexicon: HALOT
  rationale: שָׂדֶה se refiere de manera natural a un campo cultivado o parcela de terreno. «Campo» es la equivalencia más directa y transparente.
- source_word: עַבְדּוֹ
  english_pob_choice: his male slave
  chosen_spanish: su esclavo varón
  alternatives_spanish:
  - su siervo
  - su servidor varón
  - su esclavo
  lexicon: HALOT
  rationale: El texto apunta al estado de dependencia/propiedad dentro del hogar. «Esclavo» preserva la fuerza del término hebreo; «varón» mantiene el contraste de género con la siguiente mención.
- source_word: אֲמָתוֹ
  english_pob_choice: his female slave
  chosen_spanish: su esclava
  alternatives_spanish:
  - su sierva
  - su criada
  lexicon: HALOT
  rationale: אָמָה designa una esclava o sirvienta dependiente. «Esclava» es la forma más clara y consistente con el tratamiento del término anterior.
- source_word: שׁוֹרוֹ
  english_pob_choice: his ox
  chosen_spanish: su buey
  alternatives_spanish:
  - su toro
  - su res
  lexicon: HALOT
  rationale: שׁוֹר puede referirse al animal de trabajo bovino; en español, «buey» comunica bien el sentido legal y rural del mandamiento.
- source_word: חֲמֹרוֹ
  english_pob_choice: his donkey
  chosen_spanish: su asno
  alternatives_spanish:
  - su burro
  - su mula
  lexicon: HALOT
  rationale: «Asno» es el equivalente tradicional y preciso en español bíblico para חֲמוֹר; evita la posible trivialidad de «burro».
- source_word: וְכֹל אֲשֶׁר לְרֵעֶךָ
  english_pob_choice: or anything that belongs to your neighbor
  chosen_spanish: ni cosa alguna que pertenezca a tu prójimo
  alternatives_spanish:
  - ni nada de lo que es de tu prójimo
  - ni todo lo que es de tu prójimo
  lexicon: HALOT
  rationale: La fórmula final amplía la prohibición de modo inclusivo. «Cosa alguna que pertenezca» expresa con naturalidad el alcance total del hebreo y su posesivo.
- source_word: רֵעֶךָ
  english_pob_choice: your neighbor
  chosen_spanish: tu prójimo
  alternatives_spanish:
  - tu vecino
  - tu semejante
  lexicon: HALOT
  rationale: רֵעַ en ética del pacto señala al otro miembro de la comunidad. «Prójimo» es el equivalente más estable en español bíblico y conserva ese marco relacional.
theological_decisions:
- issue: Distinguir los dos verbos de prohibición en el mandamiento
  english_pob_reading: Render חמד as 'covet' and אוה as 'desire'
  chosen_spanish_reading: Traducir תַחְמֹד como «codiciarás» y תִתְאַוֶּה como «desearás»
  alternative_spanish_readings:
  - traducir ambos como «codiciarás»
  - traducir ambos como «desearás»
  rationale: El hebreo usa dos verbos relacionados pero distintos. Mantener «codiciar»/«desear» preserva la estructura retórica del texto y evita aplanar una distinción que el POB inglés documenta explícitamente.
  doctrine_reference: Translation philosophy §5 (Consistency of key terms, or documented exception)
- issue: Terminología de esclavitud en contexto doméstico
  english_pob_reading: Use 'male slave' and 'female slave'
  chosen_spanish_reading: Usar «esclavo varón» y «esclava»
  alternative_spanish_readings:
  - siervo y sierva
  - sirviente y sirvienta
  rationale: En este contexto de bienes domésticos, el hebreo destaca el estatus dependiente. «Esclavo» mantiene esa fuerza semántica; el marcador de género conserva el paralelismo del original.
  doctrine_reference: Translation philosophy §1 (Original-language primacy over translation tradition)
- issue: Sentido de בַּיִת en la enumeración
  english_pob_reading: House may also carry the broader sense of household or estate, though the following list of possessions favors the property sense here.
  chosen_spanish_reading: «Casa» como sentido principal, con posible trasfondo de hogar/estado patrimonial implícito
  alternative_spanish_readings:
  - hogar
  - casa y hacienda
  - familia/estirpe
  rationale: La enumeración posterior de bienes concretos inclina el sentido hacia una propiedad material. En español, «casa» conserva la ambigüedad suficiente para no excluir el valor ampliado, sin abandonar el sentido favorecido por el contexto.
  doctrine_reference: Translation philosophy §5 (Consistency of key terms, or documented exception)
translation_notes:
  revision_awareness: Se tuvo en cuenta el último pase de revisión, que quedó sin cambios, y el control cruzado de alta concordancia, que confirmó el acuerdo con la lectura inglesa auditada. No se documentaron revisiones aplicadas en la fuente de trabajo.
  spanish_consistency_notes:
  - Se mantuvo la distinción verbal entre «codiciar» y «desear», conforme al audit trail inglés.
  - Se usó «prójimo» para רֵעַ de manera consistente por su valor relacional de pacto.
  - Se eligió «esclavo/esclava» en lugar de «siervo/sierva» por la fuerza del contexto patrimonial.
  - Se conservó una enumeración directa y legal, evitando paráfrasis expansiva.
  - La nota sobre «casa» deja abierta la posible amplitud semántica sin desplazar el sentido favorecido por el contexto.
