translation:
  language: es
  text: 'Entonces Joab cayó con el rostro en tierra, se postró y bendijo al rey. Joab dijo: «Hoy tu siervo sabe que he hallado favor en tus ojos, mi señor el rey, porque el rey ha hecho la palabra de su siervo»[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión «ha hecho la palabra de su siervo» es idiomática; aquí significa que el rey accedió a lo que su siervo pidió.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּפֹּל ... אֶל פָּנָיו אַרְצָה
  english_pob_choice: fell with his face to the ground
  chosen_spanish: cayó con el rostro en tierra
  alternatives_spanish:
  - cayó rostro en tierra
  - cayó postrado en tierra
  - cayó con el rostro contra el suelo
  lexicon: WLC/HALOT
  rationale: El hebreo expresa una caída hacia el suelo con el rostro orientado a tierra. «Con el rostro en tierra» conserva la imagen corporal de manera natural en español y evita una paráfrasis más interpretativa.
- source_word: וַיִּשְׁתַּחוּ
  english_pob_choice: bowed down
  chosen_spanish: se postró
  alternatives_spanish:
  - se inclinó
  - se arrodilló
  - se prosternó
  lexicon: WLC/HALOT
  rationale: En este contexto cortesano, el verbo indica una reverencia profunda ante una autoridad humana. «Se postró» refleja mejor la intensidad del gesto que «se inclinó», sin convertirlo en adoración religiosa.
- source_word: וַיְבָרֶךְ אֶת הַמֶּלֶךְ
  english_pob_choice: blessed the king
  chosen_spanish: bendijo al rey
  alternatives_spanish:
  - lo bendijo, al rey
  - lo saludó con bendición
  - alabó al rey
  lexicon: WLC/HALOT
  rationale: La forma verbal sigue siendo «bendecir»; en español, «bendijo al rey» preserva la correspondencia léxica. Dado que el objeto es un rey humano, el contexto es de respeto cortesano, no de bendición litúrgica.
- source_word: הַיּוֹם
  english_pob_choice: Today
  chosen_spanish: Hoy
  alternatives_spanish:
  - Este día
  - En este día
  lexicon: WLC/HALOT
  rationale: Adverbio temporal directo y natural en español.
- source_word: יָדַע עַבְדְּךָ
  english_pob_choice: your servant knows
  chosen_spanish: tu siervo sabe
  alternatives_spanish:
  - tu siervo conoce
  - tu siervo ha llegado a saber
  lexicon: WLC/HALOT
  rationale: En el lenguaje de cortesía, «tu siervo» reproduce la auto-designación deferente del hebreo. «Sabe» comunica la certeza o reconocimiento presente sin añadir matices innecesarios.
- source_word: עַבְדְּךָ
  english_pob_choice: your servant
  chosen_spanish: tu siervo
  alternatives_spanish:
  - tu esclavo
  lexicon: WLC/HALOT
  rationale: Aunque el lexema puede significar «esclavo», aquí funciona como fórmula de sumisión respetuosa en boca de un subordinado ante el rey. En español, la fórmula idiomática adecuada es «tu siervo».
- source_word: מָצָאתִי חֵן בְּעֵינֶיךָ
  english_pob_choice: I have found favor in your eyes
  chosen_spanish: he hallado favor en tus ojos
  alternatives_spanish:
  - he encontrado gracia ante tus ojos
  - he hallado gracia en tus ojos
  - he encontrado favor contigo
  lexicon: WLC/HALOT
  rationale: Se mantiene la imagen hebrea de «favor en tus ojos», que en español es comprensible y auditablemente cercana al original. «Favor» preserva el valor relacional; «gracia» podría sonar más teológico de lo que aquí exige el contexto.
- source_word: אֲדֹנִי הַמֶּלֶךְ
  english_pob_choice: my lord the king
  chosen_spanish: mi señor el rey
  alternatives_spanish:
  - mi señor, el rey
  - mi señor rey
  - mi amo el rey
  lexicon: WLC/HALOT
  rationale: «Mi señor el rey» conserva la fórmula de tratamiento honorífico y la aposición al título. Se evita «mi amo», que en español actual suena más doméstico o desigual que la cortesía real del pasaje.
- source_word: אֲשֶׁר
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - que
  - puesto que
  - ya que
  lexicon: WLC/HALOT
  rationale: Aquí la partícula introduce la explicación causal de por qué Joab sabe que ha hallado favor. «Porque» expresa con naturalidad esa relación causal en español.
- source_word: עָשָׂה ... אֶת דְּבַר עבדו
  english_pob_choice: has done the word of his servant
  chosen_spanish: ha hecho la palabra de su siervo
  alternatives_spanish:
  - ha cumplido la palabra de su siervo
  - ha hecho lo que dijo su siervo
  - ha atendido la petición de su siervo
  lexicon: WLC/HALOT
  rationale: 'Se conserva la literalidad documentada por el audit trail: «ha hecho la palabra de su siervo». Aunque suena menos idiomático que una paráfrasis, mantiene la tensión lexical del hebreo y deja visible la formulación original. En nota puede aclararse el sentido idiomático.'
theological_decisions:
- issue: Postración y bendición ante un rey humano
  english_pob_reading: Used 'bowed down' and 'my lord the king' without sacralizing the act.
  chosen_spanish_reading: «Se postró» y «mi señor el rey» describen homenaje cortesano, no adoración religiosa.
  alternative_spanish_readings:
  - se arrodilló
  - adoró al rey
  - se inclinó reverentemente ante el rey
  rationale: El contexto narrativo es de audiencia real. Traducir con vocabulario de adoración religiosa introduciría una lectura teológicamente indebida. La opción elegida preserva la dignidad del acto sin convertirlo en culto.
  doctrine_reference: Principio de diferenciación entre honor civil y adoración divina.
- issue: 'Última cláusula: literalidad frente a idiomatización'
  english_pob_reading: has done the word of his servant
  chosen_spanish_reading: ha hecho la palabra de su siervo
  alternative_spanish_readings:
  - ha cumplido la petición de su siervo
  - ha hecho lo que pidió su siervo
  rationale: La frase hebrea es claramente idiomática, pero la tradición auditada del POB decidió conservar una forma literal en inglés. En español se mantiene esa misma tensión para no borrar el rasgo del original; el sentido puede explicarse en nota sin reescribir el texto.
  doctrine_reference: Principio de fidelidad textual y de transparencia traductológica.
translation_notes:
  revision_awareness: El inglés POB revisó la cláusula final desde una paráfrasis interpretativa («has granted his servant’s request») a la forma más literal «has done the word of his servant». Esta versión española sigue esa revisión y conserva la misma decisión de transparencia, evitando suavizar el hebraísmo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, aunque este versículo no contiene el nombre divino.
  - Se usó «siervo» en la fórmula de cortesía cortesana, conforme al criterio contextual del POB para עבד cuando no se enfatiza esclavitud.
  - «Bendijo al rey» se conserva por correspondencia léxica con el hebreo y por el carácter respetuoso, no litúrgico, del gesto.
  - La última cláusula se deja literal con nota explicativa para no perder la tensión lexical documentada en el audit trail.
