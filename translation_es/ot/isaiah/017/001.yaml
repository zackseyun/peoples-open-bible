translation:
  language: es
  text: 'Oráculo sobre Damasco: He aquí[a], Damasco dejará de ser ciudad[b], y se convertirá en un montón de ruinas.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mira»; la partícula hebrea marca una llamada solemne de atención.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «será removida de una ciudad» o «será removida de ser ciudad»; es decir, dejará de existir como ciudad.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַשָּׂא
  english_pob_choice: oracle
  chosen_spanish: oráculo
  alternatives_spanish:
  - carga
  - pronunciamiento
  lexicon: HALOT
  rationale: En encabezamientos proféticos, el término introduce una declaración formal de juicio. «Oráculo» conserva ese valor técnico y es más natural en español bíblico que una traducción literal como «carga», que aquí suena opaca.
- source_word: דַּמָּשֶׂק
  english_pob_choice: Damascus
  chosen_spanish: Damasco
  alternatives_spanish:
  - Damascο
  lexicon: nombre propio
  rationale: Es el nombre propio de la ciudad; en español bíblico estándar se usa «Damasco».
- source_word: הִנֵּה
  english_pob_choice: Behold
  chosen_spanish: Mira
  alternatives_spanish:
  - He aquí
  - Mira, pues
  lexicon: HALOT
  rationale: La partícula introduce una llamada de atención profética. «Mira» comunica esa inmediatez en un español moderno y digno; «He aquí» es posible, pero suena más arcaico.
- source_word: מוּסָר מֵעִיר
  english_pob_choice: will be removed from being a city
  chosen_spanish: será removida de ser ciudad
  alternatives_spanish:
  - será quitada de ser ciudad
  - dejará de ser ciudad
  lexicon: HALOT
  rationale: La expresión hebrea apunta a la pérdida de su condición de ciudad, no solo a un traslado geográfico. «Ser removida de ser ciudad» mantiene la fuerza del pasivo y la idea de cese de estatus urbano.
- source_word: וְהָיְתָה
  english_pob_choice: and it will become
  chosen_spanish: y se convertirá en
  alternatives_spanish:
  - y será
  - y llegará a ser
  lexicon: HALOT
  rationale: Después del juicio, el verbo expresa resultado o transformación. «Se convertirá en» reproduce bien esa transición.
- source_word: מְעִי מַפָּלָה
  english_pob_choice: a heap of ruins
  chosen_spanish: un montón de ruinas
  alternatives_spanish:
  - un montón derrumbado
  - un montón de caída
  lexicon: HALOT
  rationale: La imagen hebrea describe un montón caracterizado por la ruina/catástrofe. «Un montón de ruinas» es natural en español y conserva el sentido de devastación total.
theological_decisions:
- issue: La fuerza del encabezamiento profético מַשָּׂא
  english_pob_reading: oracle concerning Damascus
  chosen_spanish_reading: oráculo sobre Damasco
  alternative_spanish_readings:
  - carga sobre Damasco
  - pronunciamiento sobre Damasco
  rationale: No se atenúa el carácter profético del título ni se sustituye por una formulación eclesiástica tradicional. «Oráculo» preserva el género de anuncio judicial y mantiene abierta la tensión semántica del hebreo.
  doctrine_reference: Profecía/juicio divino en los oráculos de Isaías
- issue: El estado resultante de Damasco como no-ciudad
  english_pob_reading: removed from being a city
  chosen_spanish_reading: será removida de ser ciudad
  alternative_spanish_readings:
  - dejará de ser ciudad
  - será quitada de su condición de ciudad
  rationale: Se conserva la idea de desclasificación o cese de identidad urbana, que es más fuerte que una simple destrucción física. La traducción evita suavizar la afirmación profética.
  doctrine_reference: Juicio histórico concreto en la profecía bíblica
translation_notes:
  revision_awareness: 'La revisión más reciente indica que no hubo cambios: el texto inglés final se mantuvo sin modificaciones y el cotejo externo reportó alta concordancia.'
  spanish_consistency_notes:
  - Se mantuvo «Damasco» como nombre propio estándar en español.
  - Se eligió «oráculo» para מַשָּׂא, coherente con el uso profético y con la decisión inglesa auditada.
  - «Mira» se usa como equivalente funcional de הִנֵּה; la nota conserva la alternativa tradicional «he aquí».
  - «Ser removida de ser ciudad» preserva el matiz idiomático de pérdida de estatus, paralelo a la nota inglesa.
  - «Un montón de ruinas» evita tecnicismos innecesarios y conserva la imagen de devastación total.
