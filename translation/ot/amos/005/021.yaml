id: AMO.5.21
reference: Amos 5:21
source:
  edition: WLC
  text: שָׂנֵ֥אתִי מָאַ֖סְתִּי חַגֵּי/כֶ֑ם וְ/לֹ֥א אָרִ֖יחַ בְּ/עַצְּרֹֽתֵי/כֶֽם׃
translation:
  text: I hate[a], I reject your festivals, and I will not delight in your solemn assemblies.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'I will not smell'—that is, I will not accept or take pleasure in them.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׂנֵאתִי
  chosen: I hate
  alternatives:
  - I have hated
  lexicon: HALOT
  rationale: Qal perfect 1cs of שׂנא expresses YHWH's strong personal abhorrence. In prophetic discourse, present English best conveys the force of the declaration, while retaining the starkness of the Hebrew.
- source_word: מָאַסְתִּי
  chosen: I reject
  alternatives:
  - I despise
  - I spurn
  lexicon: HALOT
  rationale: מאס carries the sense of rejecting or refusing as unacceptable. 'Reject' preserves the volitional repudiation without overstating emotional nuance already supplied by the preceding 'I hate.'
- source_word: חַגֵּיכֶם
  chosen: your festivals
  alternatives:
  - your feasts
  - your pilgrimage festivals
  lexicon: HALOT
  rationale: חג commonly denotes festival observances, often pilgrimage feasts. 'Festivals' is clear modern English and broad enough to fit the prophetic critique of Israel's cultic celebrations.
- source_word: וְלֹא
  chosen: and ... not
  alternatives:
  - and I do not
  - nor
  lexicon: HALOT
  rationale: The conjunction plus negation links the final clause closely to the preceding denunciation. 'And I will not' in English preserves the progression of the Hebrew.
- source_word: אָרִיחַ
  chosen: I will not delight
  alternatives:
  - I will not smell
  - I will not accept the pleasing aroma of
  lexicon: HALOT
  rationale: Hiphil of רוח literally relates to smelling, especially savoring an odor. In sacrificial/cultic contexts it idiomatically refers to taking pleasure in or accepting an offering's aroma. Because the object here is assemblies rather than sacrifices directly, 'delight in' communicates the idiomatic sense without awkward literalism; the more literal 'smell' is preserved in a footnote.
- source_word: בְּעַצְּרֹתֵיכֶם
  chosen: in your solemn assemblies
  alternatives:
  - at your assemblies
  - in your sacred assemblies
  lexicon: HALOT
  rationale: עֲצָרָה/עֲצֶרֶת denotes a solemn gathering or assembly, often cultic. 'Solemn assemblies' is a well-established and accurate rendering that preserves the religious setting and formal tone.
