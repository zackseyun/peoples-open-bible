lexical_decisions:
- source_word: παραγενόμενος
  english_pob_choice: when he arrived
  chosen_spanish: cuando llegó
  alternatives_spanish:
  - habiendo llegado
  - después de llegar
  lexicon: BDAG
  rationale: El participio aoristo marca una acción previa a los verbos principales. «Cuando llegó» conserva la secuencia temporal de forma natural en español sin perder el valor narrativo.
- source_word: συγκαλεσάμενος
  english_pob_choice: he called together
  chosen_spanish: convocó
  alternatives_spanish:
  - reunió
  - llamó a junta
  lexicon: BDAG
  rationale: El verbo medio expresa reunir mediante citación o convocatoria. «Convocó» reproduce bien el acto formal de reunir a un grupo en asamblea.
- source_word: τοὺς ὁμοεθνεῖς
  english_pob_choice: his fellow countrymen
  chosen_spanish: a sus compatriotas
  alternatives_spanish:
  - a sus conciudadanos
  - a los de su misma nación
  - a sus compañeros de nación
  lexicon: LSJ
  rationale: ὁμοεθνής denota personas de la misma nación o pueblo. «Compatriotas» conserva la solidaridad étnico-nacional sin añadir una identificación más específica que la del griego.
- source_word: τοὺς ἱερεῖς
  english_pob_choice: the priests
  chosen_spanish: a los sacerdotes
  alternatives_spanish:
  - a los presbíteros
  - al sacerdocio
  lexicon: BDAG
  rationale: El plural es directo y debe mantenerse como grupo concreto. «Sacerdotes» es la equivalencia natural y fiel en español.
- source_word: πρὸ τοῦ θυσιαστηρίου στῆσας
  english_pob_choice: stood them before the altar
  chosen_spanish: los puso delante del altar
  alternatives_spanish:
  - los colocó delante del altar
  - los hizo ponerse delante del altar
  lexicon: BDAG
  rationale: 'La revisión inglesa entendió στῆσας como transitivo con objeto explícito implícito: él los colocó delante del altar. En español, «los puso delante del altar» refleja esa relación con claridad y evita la lectura intransitiva.'
- source_word: μετεπέμψατο
  english_pob_choice: sent for
  chosen_spanish: mandó llamar
  alternatives_spanish:
  - envió a buscar
  - citó
  lexicon: BDAG
  rationale: El verbo significa enviar por alguien o mandarlo llamar. «Mandó llamar» conserva el matiz de iniciativa para traer a esas personas a su presencia.
- source_word: τοὺς ἐκ τῆς ἄκρας
  english_pob_choice: those from the citadel
  chosen_spanish: a los de la ciudadela
  alternatives_spanish:
  - a los de la Acra
  - a los hombres de la fortaleza
  lexicon: LSJ
  rationale: En el contexto macabeo, ἄκρα puede referir a la fortaleza de Jerusalén conocida como la Acra. «Ciudadela» mantiene el sentido común y legible; la identificación histórica específica se preserva en nota.
theological_decisions:
- issue: Referencia histórica de ἄκρα en Jerusalén
  english_pob_reading: the citadel
  chosen_spanish_reading: la ciudadela
  alternative_spanish_readings:
  - la Acra
  - la fortaleza
  rationale: No es una cuestión doctrinal sino histórico-geográfica. La forma principal en español mantiene la legibilidad, mientras que la nota preserva la identificación más precisa de la fortaleza de Jerusalén.
  doctrine_reference: 'Criterio editorial POB: claridad moderna con alternativas significativas en nota cuando el contexto histórico permite más de una identificación.'
translation_notes:
  revision_awareness: La versión inglesa revisada corrigió el valor de στῆσας de «stood before the altar» a «stood them before the altar», entendiendo un objeto implícito con sentido transitivo. La redacción española sigue esa revisión y evita una lectura intransitiva.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; este versículo no contiene el Tetragrámaton.
  - «Mesías/Cristo» no aparece en este versículo.
  - Se mantiene un registro narrativo sobrio y bíblico, evitando arcaísmos innecesarios.
  - La nota de ἄκρα conserva la alternativa histórica sin cargar el cuerpo principal con terminología especializada.
