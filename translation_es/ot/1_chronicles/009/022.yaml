    issue: Marcador de nota mal ubicado
    rationale: La nota [a] está puesta tras «doscientos doce», pero la nota trata de lecturas alternativas de בֶּאֱמוּנָתָם en la cláusula final. Esto rompe la correspondencia exigida entre ancla y contenido de la nota.
  - severity: low
    issue: Ligera mejora de naturalidad en «eran doscientos doce»
    rationale: En este contexto de recuento histórico, «fueron doscientos doce» o «sumaban doscientos doce» suena algo más natural en español que «eran doscientos doce», aunque el texto actual sigue siendo comprensible y fiel.
  revised_spanish_text: Todos estos, los escogidos para porteros en los umbrales, fueron doscientos doce. Fueron inscritos por genealogía en sus aldeas. David y Samuel el vidente los establecieron en su cargo de confianza[a].
  revised_footnotes:
