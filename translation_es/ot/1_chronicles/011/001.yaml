translation:
  language: es
  text: 'Entonces todo Israel se reunió a David en Hebrón, diciendo: «He aquí, somos tu hueso y tu carne[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más idiomática, «somos tu propia carne y sangre». El hebreo dice literalmente: «tu hueso y tu carne».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקָּבְצוּ
  english_pob_choice: Then ... gathered
  chosen_spanish: Entonces se reunieron
  alternatives_spanish:
  - Entonces se juntaron
  - Entonces se congregaron
  lexicon: HALOT
  rationale: El verbo expresa reunión colectiva; «se reunieron» es natural en español y conserva la acción corporativa. «Entonces» reproduce la secuencia narrativa del wayyiqtol.
- source_word: כָל יִשְׂרָאֵל
  english_pob_choice: all Israel
  chosen_spanish: todo Israel
  alternatives_spanish:
  - todos los israelitas
  - Israel entero
  lexicon: HALOT
  rationale: La expresión colectiva se mantiene como unidad nacional/covenantal. «Todo Israel» conserva mejor el giro hebreo que una expansión explicativa.
- source_word: אֶל דָּוִיד
  english_pob_choice: to David
  chosen_spanish: con David
  alternatives_spanish:
  - a David
  - ante David
  lexicon: HALOT
  rationale: En español, con el marco de la reunión en Hebrón, «con David» comunica la llegada y el encuentro de forma natural sin perder la dirección relacional del hebreo.
- source_word: חֶבְרֹנָה
  english_pob_choice: at Hebron
  chosen_spanish: en Hebrón
  alternatives_spanish:
  - a Hebrón
  lexicon: HALOT
  rationale: La dirección hacia Hebrón queda absorbida en el resultado narrativo de la reunión; «en Hebrón» sitúa el encuentro de modo idiomático en español.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijeron
  lexicon: HALOT
  rationale: La fórmula introductoria al discurso directo se rinde con el participio verbal estándar en español, manteniendo formalmente la conexión con lo dicho.
- source_word: הִנֵּה
  english_pob_choice: Behold
  chosen_spanish: Mira
  alternatives_spanish:
  - He aquí
  - Mira bien
  lexicon: HALOT
  rationale: «הִנֵּה» llama la atención del oyente. «Mira» conserva la fuerza deíctica en un español contemporáneo; «He aquí» es más formal pero más arcaizante.
- source_word: עַצְמְךָ וּבְשָׂרְךָ
  english_pob_choice: your bone and your flesh
  chosen_spanish: tu hueso y tu carne
  alternatives_spanish:
  - tu propio hueso y tu carne
  - tu propia carne y sangre
  lexicon: HALOT
  rationale: Se conserva el hebraísmo corporal literal para no borrar la imagen concreta de parentesco y solidaridad. «Hueso y carne» sigue de cerca la forma hebrea; «carne y sangre» sería más idiomático pero menos fuente-guiado.
- source_word: אֲנָחְנוּ
  english_pob_choice: we are
  chosen_spanish: somos
  alternatives_spanish:
  - nosotros somos
  lexicon: HALOT
  rationale: El predicado nominal hebreo requiere verbo copulativo en español. «Somos» es suficiente y más natural que explicitar el pronombre.
theological_decisions:
- issue: Idioma de parentesco en una aclamación real
  english_pob_reading: Rendered literally as 'your bone and your flesh' rather than interpreting it as a looser paraphrase such as 'we are your own people.'
  chosen_spanish_reading: Se mantiene literalmente como «tu hueso y tu carne» en lugar de «somos tu propia gente» o «somos de tu misma sangre».
  alternative_spanish_readings:
  - somos tu propia gente
  - somos tu misma sangre
  - somos tus parientes
  rationale: La expresión comunica parentesco y solidaridad nacional con David. Traducirla de forma libre explicaría el sentido, pero borraría la imagen hebrea concreta y su resonancia intertextual en contextos de alianza y realeza.
  doctrine_reference: Principios de traducción §§1, 3, 6
translation_notes:
  revision_awareness: La versión española sigue la revisión auditada del inglés POB, que optó por una formulación más formal para הִנֵּה; en español, se buscó un equivalente natural y digno («Mira») sin perder la función deíctica. También se preservó el hebraísmo corporal literal, tal como el texto inglés final conservó «bone and flesh».
  spanish_consistency_notes:
  - Se usa «Hebrón» con tilde y forma castellana estándar del topónimo.
  - Se conserva el tono directo y ceremonial del discurso.
  - «Hueso y carne» mantiene la metáfora física sin sustituirla por una paráfrasis eclesiástica como «pueblo» o «familia».
  - La puntuación con comillas latinas y dos puntos introduce correctamente el discurso directo en español.
