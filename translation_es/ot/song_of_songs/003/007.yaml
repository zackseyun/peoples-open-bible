translation:
  language: es
  text: Mira[a], es el lecho de Salomón; sesenta valientes lo rodean, de entre los valientes de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cama»; el término hebreo puede designar una cama o un lecho, y algunos lo entienden aquí como una litera o palanquín real portátil a la luz del contexto cercano.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira bien
  - Observa
  - He aquí
  lexicon: HALOT
  rationale: La partícula deíctica introduce la escena y llama la atención del lector. «Mira» conserva esa fuerza deíctica en un español natural, sin el tono arcaico de «He aquí».
- source_word: מִטָּתוֹ
  english_pob_choice: his couch
  chosen_spanish: el lecho
  alternatives_spanish:
  - la cama
  - el diván
  - la litera
  lexicon: HALOT
  rationale: El sustantivo puede abarcar cama/lecho/couch. En este contexto, «lecho» mantiene la amplitud semántica y evita fijar demasiado la imagen a una litera o palanquín, que el contexto cercano puede sugerir pero aquí no exige de forma explícita.
- source_word: שֶׁלִּשְׁלֹמֹה
  english_pob_choice: Solomon’s
  chosen_spanish: de Salomón
  alternatives_spanish:
  - que es de Salomón
  - perteneciente a Salomón
  lexicon: HALOT
  rationale: La construcción expresa posesión; el genitivo español «de Salomón» es la forma más natural y fiel.
- source_word: שִׁשִּׁים
  english_pob_choice: sixty
  chosen_spanish: sesenta
  alternatives_spanish:
  - sesenta exactamente
  lexicon: HALOT
  rationale: Número cardinal directo y sin dificultad.
- source_word: גִּבֹּרִים
  english_pob_choice: mighty men
  chosen_spanish: valientes
  alternatives_spanish:
  - hombres valientes
  - guerreros
  - héroes
  lexicon: HALOT
  rationale: El término designa hombres fuertes y valerosos en sentido militar. «Valientes» conserva la fuerza del hebreo y su resonancia bíblica, sin sonar tan marcado como «mighty men» en inglés ni tan técnico como «guerreros».
- source_word: סָבִיב
  english_pob_choice: around
  chosen_spanish: lo rodean
  alternatives_spanish:
  - alrededor de él
  - están alrededor
  lexicon: HALOT
  rationale: La idea espacial de rodear se expresa de manera natural con un verbo en español. Se mantiene el sentido de circundar al objeto sin necesidad de repetir una preposición poco elegante.
- source_word: לָהּ
  english_pob_choice: it
  chosen_spanish: lo
  alternatives_spanish:
  - la
  - le
  lexicon: HALOT
  rationale: Aunque el hebreo marca femenino gramatical por concordancia con מִטָּה, en español el referente inanimado pide el pronombre neutro masculino «lo» como objeto directo, siguiendo el sentido y la sintaxis natural.
- source_word: מִגִּבֹּרֵי יִשְׂרָאֵל
  english_pob_choice: from the mighty men of Israel
  chosen_spanish: de entre los valientes de Israel
  alternatives_spanish:
  - de los valientes de Israel
  - entre los valientes de Israel
  - de entre los guerreros de Israel
  lexicon: HALOT
  rationale: 'La preposición hebrea מִן aquí tiene matiz de selección/origen: los sesenta son tomados de entre ese grupo. «De entre» preserva ese valor mejor que un simple posesivo «de» y mantiene la relación con el conjunto de valientes de Israel.'
translation_notes:
  revision_awareness: El pasaje coincide en alto grado con el audit trail inglés; no se documentan revisiones textuales o cambios de sentido que requieran adaptación adicional en español.
  spanish_consistency_notes:
  - Se prefirió «valientes» para גִּבֹּרִים por coherencia con el valor militar del término y para evitar una paráfrasis excesiva.
  - Se conservó la ambigüedad controlada de מִטָּה con «lecho», dejando en nota la alternativa «cama» y la posibilidad de una litera o palanquín.
  - «De entre» en la última frase refleja el valor partitivo de מִן, no solo pertenencia genérica.
