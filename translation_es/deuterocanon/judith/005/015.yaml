translation:
  language: es
  text: Y habitaron en la tierra de los amorreos, y con su fuerza[a] destruyeron a todos los hesbonitas; y, después de cruzar el Jordán, tomaron posesión[b] de toda la región montañosa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en su fuerza» o «por su poder». La frase griega puede entenderse como medio o instrumento.
    reason: lexical_alternative
  - marker: b
    text: O «heredaron toda la región montañosa». El verbo griego puede tener el sentido de recibir una posesión, pero aquí se refiere a tomar posesión del territorio después de cruzar el Jordán.
    reason: lexical_alternative
lexical_decisions:
- source_word: ᾤκησαν
  english_pob_choice: lived
  chosen_spanish: habitaron
  alternatives_spanish:
  - vivieron
  - se establecieron
  lexicon: LSJ
  rationale: El aoristo de οἰκέω indica residir o morar en un lugar. 'Habitaron' conserva el valor narrativo sin sonar arcaico, y en español bíblico comunica mejor la permanencia que un simple 'vivieron'.
- source_word: γῇ Ἀμορραίων
  english_pob_choice: the land of the Amorites
  chosen_spanish: la tierra de los amorreos
  alternatives_spanish:
  - el país de los amorreos
  - la tierra amorrea
  lexicon: LSJ
  rationale: La construcción genitiva señala territorio asociado con ese pueblo. 'Tierra' es la equivalencia más directa y clara; 'amorreos' mantiene el nombre del grupo humano del texto griego.
- source_word: ἐξωλόθρευσαν
  english_pob_choice: destroyed
  chosen_spanish: destruyeron
  alternatives_spanish:
  - aniquilaron
  - exterminaron
  lexicon: LSJ
  rationale: El verbo expresa destrucción total. 'Destruyeron' conserva esa fuerza sin introducir una tonalidad técnica o más dura que el griego no exige por sí sola.
- source_word: πάντας τοὺς Ἐσεβωνείτας
  english_pob_choice: all the Heshbonites
  chosen_spanish: a todos los hesbonitas
  alternatives_spanish:
  - a todos los habitantes de Hesbón
  - a toda la gente de Hesbón
  lexicon: LSJ
  rationale: El etnónimo designa al pueblo vinculado con Hesbón. 'Hesbonitas' preserva el sentido de grupo humano y sigue de cerca el valor del griego.
- source_word: ἐν τῇ ἰσχύι αὐτῶν
  english_pob_choice: by their strength
  chosen_spanish: con su fuerza
  alternatives_spanish:
  - por su fuerza
  - en su fuerza
  - con su poder
  lexicon: LSJ
  rationale: La frase expresa medio o instrumento. 'Con su fuerza' es natural en español y mantiene la idea de capacidad militar; la nota recoge que también puede entenderse 'por' o 'a través de' su poder.
- source_word: διαβάντες τὸν Ἰορδάνην
  english_pob_choice: after crossing the Jordan
  chosen_spanish: después de cruzar el Jordán
  alternatives_spanish:
  - habiendo cruzado el Jordán
  - cuando cruzaron el Jordán
  lexicon: LSJ
  rationale: El participio antecede a la acción principal. 'Después de cruzar' hace explícita la secuencia temporal en español sin perder el orden narrativo.
- source_word: ἐκληρονόμησαν
  english_pob_choice: took possession of
  chosen_spanish: tomaron posesión de
  alternatives_spanish:
  - heredaron
  - ocuparon
  lexicon: LSJ
  rationale: En contexto de conquista, κληρονομέω puede implicar recibir como posesión, pero aquí la idea es la adquisición territorial. 'Tomaron posesión de' comunica ese resultado con claridad.
- source_word: πᾶσαν τὴν ὀρεινήν
  english_pob_choice: all the hill country
  chosen_spanish: toda la región montañosa
  alternatives_spanish:
  - toda la zona montañosa
  - todo el país montañoso
  - todo el territorio montañoso
  lexicon: LSJ
  rationale: ἡ ὀρεινή denota una región alta o montañosa. 'Región montañosa' suena natural en español y conserva el alcance geográfico completo de πᾶσαν.
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés muestran alta concordancia y no requieren correcciones textuales. La única decisión relevante es la solución española para ἐν τῇ ἰσχύι αὐτῶν y para el participio antecedente διαβάντες.
  spanish_consistency_notes:
  - Se preserva el tono narrativo sobrio y la secuencia de acciones del griego.
  - Se usa 'Jordán' con artículo español implícito en el nombre propio, sin añadir 'el río' porque el texto no lo requiere.
  - '''Hesbonitas'' mantiene el etnónimo del audit trail inglés y evita una paráfrasis explicativa que diluiría el paralelo con el griego.'
