translation:
  language: es
  text: Y Josué levantó estas doce piedras en Gilgal, que habían tomado del Jordán.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וְאֵת
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Ahora bien
  - Y también
  lexicon: HALOT
  rationale: La conjunción vincula el versículo con el relato anterior; en español, «Y» conserva esa continuidad narrativa sin añadir matiz innecesario. El objeto marcado por אֵת no tiene equivalente directo y no se representa por separado.
- source_word: שְׁתֵּים עֶשְׂרֵה
  english_pob_choice: twelve
  chosen_spanish: doce
  alternatives_spanish:
  - las doce
  lexicon: HALOT
  rationale: La expresión numérica hebrea significa «doce». En español, «doce» es la forma natural y fiel; el artículo se deja para el sustantivo siguiente, como permite la sintaxis española.
- source_word: הָאֲבָנִים הָאֵלֶּה
  english_pob_choice: these ... stones
  chosen_spanish: estas piedras
  alternatives_spanish:
  - estas piedras estas
  - las piedras estas
  lexicon: HALOT
  rationale: Se conserva el demostrativo cercano «estas» y el sustantivo se vierte como «piedras», término normal para el memorial del contexto. «Piedras» es más idiomático que «piedras aquí» o una duplicación del demostrativo.
- source_word: אֲשֶׁר לָקְחוּ
  english_pob_choice: which they had taken
  chosen_spanish: las cuales habían tomado
  alternatives_spanish:
  - que habían tomado
  - que tomaron
  lexicon: HALOT
  rationale: El relativo identifica las piedras; el pluscuamperfecto en español expresa con claridad que la toma ocurrió antes de la acción de Josué. «Las cuales» conserva una relación más explícita con el antecedente, aunque «que» también sería posible.
- source_word: מִן הַיַּרְדֵּן
  english_pob_choice: from the Jordan
  chosen_spanish: del Jordán
  alternatives_spanish:
  - desde el Jordán
  - del río Jordán
  lexicon: HALOT
  rationale: «Del Jordán» es la forma natural y suficientemente clara en español para el río conocido por nombre propio. «Río» puede añadirse, pero no es necesario en este contexto.
- source_word: הֵקִים
  english_pob_choice: set up
  chosen_spanish: erigió
  alternatives_spanish:
  - levantó
  - colocó
  lexicon: HALOT
  rationale: En el contexto de piedras memoriales, el verbo hebreo implica colocar/levantar de manera estable. «Erigió» conserva el acto formal de levantar un monumento y suena digno en español; «levantó» o «colocó» son alternativas más comunes pero algo menos precisas para un memorial.
- source_word: יְהוֹשֻׁעַ
  english_pob_choice: Joshua
  chosen_spanish: Josué
  alternatives_spanish:
  - Joshua
  lexicon: HALOT
  rationale: Se usa la forma española habitual del nombre propio bíblico.
- source_word: בַּגִּלְגָּל
  english_pob_choice: at Gilgal
  chosen_spanish: en Gilgal
  alternatives_spanish:
  - en el Guilgal
  - en Gilgal
  lexicon: HALOT
  rationale: Para un lugar propio, el español admite «en» con naturalidad; mantiene la referencia locativa del hebreo. Se conserva la forma tradicional del topónimo como nombre propio.
theological_decisions:
- issue: Naturaleza del acto de הֵקִים en un memorial de piedras
  english_pob_reading: set up
  chosen_spanish_reading: erigió
  alternative_spanish_readings:
  - levantó
  - colocó
  rationale: 'No hay una carga doctrinal distinta, pero sí una decisión léxica importante: el verbo describe la instalación estable de un monumento conmemorativo. «Erigió» comunica mejor ese carácter memorial que un simple «puso».'
  doctrine_reference: Memorial conmemorativo / señal histórica del pacto
translation_notes:
  revision_awareness: 'La versión inglesa revisada reordenó «these twelve stones» antes de «at Gilgal» para reflejar mejor el hebreo y sonar más natural. En español se siguió esa misma prioridad sintáctica: «estas doce piedras en Gilgal».'
  spanish_consistency_notes:
  - Se mantuvo el topónimo «Gilgal» sin artículo, de acuerdo con el uso español para nombres de lugar bíblicos.
  - No se añadió «río» a «Jordán» para evitar sobreespecificar frente al hebreo y al inglés POB.
  - Se prefirió «erigió» por la fuerza formal del acto memorial; si se traduce en series narrativas relacionadas, conviene mantener coherencia con verbos como «levantó/erigió» cuando el contexto sea de monumentos o altares.
