base_translation:
  language: en
  yaml_path: translation/ot/lamentations/001/012.yaml
  text: Is it nothing to you[a], all you who pass by on the road? Look and see whether there is any sorrow like my sorrow, which was dealt to me[b], with which Yahweh afflicted me in the day of his fierce anger.
  footnotes:
