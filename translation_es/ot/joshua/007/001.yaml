translation:
  language: es
  text: Pero los hijos de Israel actuaron infielmente respecto de las cosas consagradas a la destrucción[a], porque Acán, hijo de Carmi, hijo de Zabdi, hijo de Zéraj, de la tribu de Judá, tomó algo de las cosas consagradas a la destrucción; y la ira de Yahvé se encendió contra los hijos de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'las cosas dedicadas', o de manera más formal 'el anatema'. El hebreo חֵרֶם se refiere a personas o cosas apartadas para Dios para destrucción o para ser quitadas del uso humano ordinario.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּמְעֲלוּ
  english_pob_choice: acted unfaithfully
  chosen_spanish: actuaron infielmente
  alternatives_spanish:
  - fueron infieles
  - cometieron una infidelidad
  - obraron con deslealtad
  lexicon: HALOT
  rationale: מעל en contexto de pacto expresa ruptura de fidelidad o deslealtad, no solo pecado genérico. 'Actuaron infielmente' conserva esa fuerza y suena natural en español bíblico contemporáneo.
- source_word: בְנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los niños de Israel
  - la casa de Israel
  lexicon: HALOT
  rationale: Se conserva la expresión familiar plural del hebreo, que mantiene el matiz corporativo del texto. 'Los israelitas' sería más idiomático, pero atenúa la forma original.
- source_word: מַעַל
  english_pob_choice: unfaithfully
  chosen_spanish: infielmente
  alternatives_spanish:
  - con deslealtad
  - con traición
  - con infidelidad
  lexicon: HALOT
  rationale: El sustantivo intensivo/cognado con el verbo pide una forma adverbial que preserve la idea de deslealtad de pacto. 'Infielmente' es clara y refleja el valor semántico sin añadir explicación interpretativa.
- source_word: בַּחֵרֶם / מִן הַחֵרֶם
  english_pob_choice: the things devoted to destruction
  chosen_spanish: las cosas destinadas al anatema
  alternatives_spanish:
  - las cosas dedicadas al exterminio
  - las cosas consagradas a la destrucción
  - lo consagrado al anatema
  lexicon: HALOT
  rationale: חֵרֶם designa lo puesto bajo prohibición sagrada, para destrucción o remoción del uso humano ordinario. 'Anatema' conserva el término técnico tradicional y, unido a 'destinadas', evita reducirlo a una simple 'consagración' o a un 'ban' transliterado.
- source_word: וַיִּקַּח
  english_pob_choice: took some
  chosen_spanish: tomó de
  alternatives_spanish:
  - tomó algo de
  - se llevó parte de
  - apropió de
  lexicon: HALOT
  rationale: El hebreo usa la partícula partitiva מִן; en español, 'tomó de' reproduce de forma concisa la idea de haber tomado de un conjunto mayor sin forzar una cantidad precisa.
- source_word: לְמַטֵּה יְהוּדָה
  english_pob_choice: of the tribe of Judah
  chosen_spanish: de la tribu de Judá
  alternatives_spanish:
  - perteneciente a la tribu de Judá
  - de la casa de Judá
  lexicon: HALOT
  rationale: '''Tribu'' es el equivalente directo de מַטֶּה en genealogías tribales, y la preposición ''de'' resulta idiomática y fiel.'
- source_word: וַיִּחַר אַף יְהוָה
  english_pob_choice: the anger of Yahweh burned
  chosen_spanish: la ira de Yahvé se encendió
  alternatives_spanish:
  - la ira de Yahvé ardió
  - Yahvé se encendió de ira
  - la ira de Yahvé se inflamó
  lexicon: HALOT
  rationale: La metáfora hebrea de 'arder' se conserva con 'se encendió', que es natural en español y mantiene la imagen vívida del texto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto de traducir el Tetragrámaton por el nombre propio 'Yahvé', en lugar de sustituirlo por un título.
theological_decisions:
- issue: 'Responsabilidad corporativa: plural Israel / singular Acan'
  english_pob_reading: Retain the corporate subject while explicitly identifying Achan as the individual actor.
  chosen_spanish_reading: Mantener el sujeto corporativo 'los hijos de Israel' y, al mismo tiempo, identificar a Acán como el actor individual.
  alternative_spanish_readings:
  - Israel actuó infielmente
  - Acán actuó infielmente y ya no se menciona la culpa corporativa
  rationale: El hebreo conserva deliberadamente la tensión entre la culpa de uno y la responsabilidad del conjunto. La redacción española mantiene esa tensión sin resolverla.
  doctrine_reference: Preservar la tensión teológica del texto en lugar de suavizarla.
translation_notes:
  revision_awareness: La versión española sigue el pasaje base y el audit trail inglés sin cambios de revisión pendientes; se conservan el contraste corporativo/individual y el valor técnico de חֵרֶם. La nota sobre 'anatema' ofrece la alternativa semántica principal que el proyecto ya documenta en inglés.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de manera consistente para el Tetragrámaton.
  - Se preserva 'los hijos de Israel' para reflejar el plural corporativo del hebreo.
  - '''Anatema'' se emplea como equivalente técnico de חֵרֶם, con nota explicativa para evitar ambigüedad.'
  - Se mantiene el paralelismo verbal 'actuaron infielmente' / 'tomó' / 'se encendió' para reflejar la progresión del hebreo.
