translation:
  language: es
  text: Mira, nosotros, los servidores de Nebucodonosor el gran rey, estamos tendidos delante de ti[a]; trátanos como sea agradable a tus ojos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '«Nebucodonosor» sigue la forma griega del texto fuente; muchas Biblias en español usan «Nabucodonosor». También podría traducirse la frase final más idiomáticamente como «como te plazca». El griego dice literalmente: «como es agradable delante de tu rostro/presencia».'
    reason: alternative_reading
lexical_decisions:
- source_word: Ἰδοὺ
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira, pues
  - He aquí
  - Ve
  lexicon: BDAG
  rationale: La partícula deíctica introduce una súplica y llama la atención del oyente. «Mira» conserva ese valor apelativo en español actual sin el tono arcaico de «He aquí».
- source_word: παῖδες
  english_pob_choice: servants
  chosen_spanish: servidores
  alternatives_spanish:
  - siervos
  - esclavos
  - subordinados
  lexicon: LSJ
  rationale: En este contexto cortesano, el término expresa dependencia y servicio ante el rey. «Servidores» comunica sumisión respetuosa sin cargar el texto con la fuerza social de «esclavos», que aquí no parece ser el énfasis principal.
- source_word: Ναβουχοδονοσὸρ
  english_pob_choice: Nebuchodonosor
  chosen_spanish: Nebucodonosor
  alternatives_spanish:
  - Nabucodonosor
  - Nebuchodonosor
  lexicon: transliteración del griego
  rationale: Se conserva la forma del testimonio griego, pero adaptada a la ortografía española. La opción «Nebucodonosor» mantiene la correspondencia con la forma griega de Swete sin armonizarla a una forma bíblica más conocida por tradición.
- source_word: μεγάλου
  english_pob_choice: the great
  chosen_spanish: el gran
  alternatives_spanish:
  - el grande
  - gran
  lexicon: LSJ
  rationale: La expresión forma parte del título real. «El gran rey» reproduce de manera natural y fiel la titulatura honorífica del griego.
- source_word: παρακείμεθα
  english_pob_choice: lie before you
  chosen_spanish: estamos tendidos delante de ti
  alternatives_spanish:
  - yacemos delante de ti
  - nos hallamos delante de ti
  - estamos puestos delante de ti
  lexicon: LSJ
  rationale: La forma sugiere estar colocado o yacer en postura de sometimiento. «Estamos tendidos delante de ti» conserva la imagen corporal y la humillación implícita mejor que un simple «estamos presentes».
- source_word: χρῆσαι ἡμῖν
  english_pob_choice: deal with us
  chosen_spanish: trátanos
  alternatives_spanish:
  - úsanos
  - dispón de nosotros
  - haz con nosotros
  lexicon: BDAG
  rationale: El imperativo medio pide que el destinatario actúe como quiera respecto de ellos. «Trátanos» expresa bien ese sentido amplio en español y suena más idiomático que una traducción literal de «úsanos».
- source_word: καθὼς ἀρεστόν ἐστιν τῷ προσώπῳ σου
  english_pob_choice: as is pleasing in your sight
  chosen_spanish: como te sea agradable, en tu presencia
  alternatives_spanish:
  - como te agrade
  - como te parezca bien
  - según te plazca
  lexicon: LSJ
  rationale: El giro griego habla de lo que es agradable «al rostro/presencia» del interlocutor. La traducción mantiene la idea de agrado y conserva la referencia a la presencia divina/cortesana con «en tu presencia».
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que eliminó la repetición innecesaria de «king», ajustó la imagen a «lie before you» y prefirió una formulación idiomática para χρῆσαι ἡμῖν... τῷ προσώπῳ σου. La versión española evita duplicar títulos, conserva la postura de sometimiento y expresa el matiz de trato/acción sobre el grupo con naturalidad.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como convención general del proyecto, pero este versículo no contiene el nombre divino.
  - Se prefirió «Nebucodonosor» por fidelidad al testimonio griego, no por la forma castellana más usual.
  - «Servidores» se usa aquí por el contexto diplomático y no implica negar la posibilidad semántica de «esclavos» en otros pasajes.
