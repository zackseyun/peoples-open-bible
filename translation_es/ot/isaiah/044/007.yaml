  text: וּ/מִֽי כָמ֣וֹ/נִי יִקְרָ֗א וְ/יַגִּידֶ֤/הָ וְ/יַעְרְכֶ֨/הָ֙ לִ֔/י מִ/שּׂוּמִ֖/י עַם עוֹלָ֑ם וְ/אֹתִיּ֛וֹת וַ/אֲשֶׁ֥ר תָּבֹ֖אנָה יַגִּ֥ידוּ לָֽ/מוֹ־־׃
base_translation:
  language: en
  yaml_path: translation/ot/isaiah/044/007.yaml
  text: And who is like me? Let him call and declare it[a], and set it in order for me, since I appointed an ancient people. Let them declare to them the things to come[b], and what will happen.
  footnotes:
  - marker: a
    text: Or 'from the time I established the people of old.' The Hebrew phrase may be read temporally, and 'ancient people' could also be rendered 'the people of old.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the signs and the things that will come.' The Hebrew word can also be understood as 'signs' or 'tokens,' though here the context favors future events.
    reason: alternative_reading
