    rationale: El inglés base documenta como elección principal «You have gone too far», con «It is too much for you» como alternativa en nota. El borrador español pone en el texto «¡Mucho es para ustedes!» y así desplaza al cuerpo principal una opción secundaria, además de sonar menos natural.
  - severity: medium
    issue: La nota al pie está anclada en el lugar equivocado
    rationale: La marca [a] aparece tras «ellos», pero la nota explica una alternativa para la reprensión final «¡Mucho es para ustedes, hijos de Leví!». Las notas deben anclarse en la palabra o frase pertinente.
  - severity: low
    issue: «Mucho es para ustedes» es poco idiomático en español bíblico moderno
    rationale: Aunque cercano a la literalidad, no comunica con naturalidad el sentido de reproche. «Han ido demasiado lejos» o similar transmite mejor la fuerza sin apartarse del sentido contextual.
