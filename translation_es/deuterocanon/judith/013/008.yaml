    issue: «le quitó de allí su espada» es sintácticamente impreciso
    rationale: El dativo «le» puede hacer pensar en Holofernes como receptor afectado más que en una extracción desde el poste/soporte. El griego expresa retirar el arma desde la estructura de la cama; «tomó de allí» o «bajó de allí» lo refleja con mayor claridad.
  - severity: low
    issue: «soporte de la cama» es demasiado genérico
    rationale: κανών en este contexto designa una pieza concreta de la cama, y el inglés auditado opta por «bedpost». En español «poste de la cama» o «poste del lecho» transmite mejor una pieza localizada en la cabecera desde la cual se toma el arma.
