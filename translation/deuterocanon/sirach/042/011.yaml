  parallel_sources:
  - edition: lxx-swete-1909
    text: ἐπὶ θυγατρὶ ἀδιατρέπτῳ στερέωσον φυλακήν, μὴ ποτε ποιήσῃ σε ἐπίχαρμα ἐχθροῖς, λαλιὰν ἐν πόλει καὶ ἔκκλητον λαοῦ, καὶ καταισχύνῃ σε ἐν πλήθει πολλῶν.
