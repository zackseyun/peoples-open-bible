translation:
  language: es
  text: Sus profetas son imprudentes, hombres traicioneros; sus sacerdotes han profanado lo santo[a]; han hecho violencia a la ley[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el santuario» o «las cosas santas» para קֹדֶשׁ.
    reason: lexical_alternative
  - marker: b
    text: O «la instrucción» para תּוֹרָה.
    reason: lexical_alternative
lexical_decisions:
- source_word: נְבִיאֶיהָ
  english_pob_choice: her prophets
  chosen_spanish: sus profetas
  alternatives_spanish:
  - las profetisas de ella
  - los profetas de ella
  lexicon: HALOT
  rationale: El sufijo femenino de tercera persona se refiere a la ciudad/personificación femenina; en español, 'sus profetas' conserva la relación posesiva sin forzar una repetición innecesaria. Se evita especificar género femenino en los referentes porque el hebreo usa el masculino plural para el sustantivo base.
- source_word: פֹּחֲזִים
  english_pob_choice: reckless
  chosen_spanish: imprudentes
  alternatives_spanish:
  - irrefrenados
  - desenfrenados
  - temerarios
  lexicon: HALOT
  rationale: '''Imprudentes'' comunica la idea de conducta rash, sin freno y moralmente poco ponderada. ''Temerarios'' podría sonar más fuerte, pero en español puede sugerir valor físico más que desorden ético; ''imprudentes'' mantiene el matiz de falta de juicio que tiene el hebreo en este contexto.'
- source_word: אַנְשֵׁי בֹּגְדוֹת
  english_pob_choice: treacherous men
  chosen_spanish: hombres traicioneros
  alternatives_spanish:
  - hombres de traiciones
  - hombres infieles
  - hombres engañosos
  lexicon: HALOT
  rationale: La construcción hebrea es literalmente 'hombres de traiciones/betrayals'. 'Hombres traicioneros' es idiomático en español y conserva el carácter habitual de la traición. Se mantiene 'hombres' porque el sustantivo hebreo es explícitamente masculino.
- source_word: כֹּהֲנֶיהָ
  english_pob_choice: her priests
  chosen_spanish: sus sacerdotes
  alternatives_spanish:
  - los sacerdotes de ella
  lexicon: HALOT
  rationale: La forma posesiva se expresa de modo natural con 'sus sacerdotes', que conserva el paralelismo con 'sus profetas' y reproduce la relación de pertenencia marcada por el sufijo pronominal.
- source_word: חִלְּלוּ קֹדֶשׁ
  english_pob_choice: have profaned the holy
  chosen_spanish: han profanado lo santo
  alternatives_spanish:
  - han profanado el santo
  - han profanado el santuario
  - han profanado las cosas santas
  lexicon: HALOT
  rationale: '''קֹדֶשׁ'' puede abarcar ''lo santo'', ''las cosas santas'' o ''el santuario''. ''Lo santo'' preserva la amplitud semántica sin reducir el objeto a un lugar concreto. En español resulta más natural y fiel que ''el santo'', que sonaría incorrecto, y evita estrechar el sentido a ''santuario''.'
- source_word: חָמְסוּ תּוֹרָה
  english_pob_choice: have done violence to the law
  chosen_spanish: han hecho violencia a la ley
  alternatives_spanish:
  - han violado la ley
  - han agraviado la ley
  - han violentado la ley
  lexicon: HALOT
  rationale: El verbo חמס transmite violencia, abuso o violación. 'Han hecho violencia a la ley' preserva la imagen verbal fuerte del original y sigue de cerca la elección inglesa. 'Han violentado la ley' es posible, pero puede sonar más jurídico o moderno y menos transparente al trasfondo hebreo.
- source_word: תּוֹרָה
  english_pob_choice: the law
  chosen_spanish: la ley
  alternatives_spanish:
  - la instrucción
  - la Torá
  lexicon: HALOT
  rationale: En este contexto profético, תּוֹרָה puede significar 'ley' en sentido covenantal/institucional. 'La ley' es la equivalencia española más clara y transmite el alcance normativo que tiene aquí, mientras que 'la instrucción' se deja como alternativa de posible matiz.
theological_decisions:
- issue: Alcance de קֹדֶשׁ en la acusación contra los sacerdotes
  english_pob_reading: a broad reference to what is holy rather than a narrowed reference to the sanctuary alone
  chosen_spanish_reading: una referencia amplia a lo santo, no limitada al santuario
  alternative_spanish_readings:
  - el santuario
  - las cosas santas
  rationale: El hebreo no determina de forma explícita un lugar específico. Por eso 'lo santo' conserva la amplitud del término y evita resolver la tensión interpretativa. Esta decisión sigue la preferencia de la POB por no estrechar innecesariamente el alcance del original.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: 'La versión inglesa revisada sustituyó ''what is holy'' por ''the holy'' para hacer más formal la frase sin perder amplitud semántica. En español, ''lo santo'' refleja esa formalidad y mantiene la misma apertura interpretativa. También se conservó la fuerza de ''have done violence to the law'' con una construcción igualmente vívida: ''han hecho violencia a la ley''.'
  spanish_consistency_notes:
  - Se usa 'sus' para reflejar el sufijo posesivo femenino singular del hebreo referido a la ciudad/personificación.
  - Se mantiene el paralelismo sintáctico entre profetas y sacerdotes, con una cadencia breve y profética.
  - '''Lo santo'' preserva la ambigüedad entre santidad abstracta y realidades sagradas concretas.'
  - '''La ley'' comunica el valor normativo de תּוֹרָה sin introducir terminología eclesiástica posterior.'
