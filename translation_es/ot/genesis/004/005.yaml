translation:
  language: es
  text: Pero por Caín y por su ofrenda no miró con favor[a]. Entonces Caín se enojó mucho, y su rostro se abatió[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no tuvo consideración favorable por Caín y su ofrenda».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «su rostro cayó», un modismo para expresar abatimiento o decaimiento visible.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֶל
  english_pob_choice: for
  chosen_spanish: para
  alternatives_spanish:
  - hacia
  - a
  lexicon: HALOT
  rationale: En este contexto el preposición introduce el objeto de la atención o consideración divina. «Para» en español transmite de manera natural la relación de referencia hacia Caín y su ofrenda sin volverla mecánica.
- source_word: מִנְחָה
  english_pob_choice: offering
  chosen_spanish: ofrenda
  alternatives_spanish:
  - don
  - presente
  lexicon: HALOT
  rationale: El contexto de Génesis 4 es cultual; «ofrenda» es el equivalente español más claro y específico. «Don» o «presente» serían posibles, pero menos precisos en este marco.
- source_word: לֹא שָׁעָה
  english_pob_choice: he had no regard
  chosen_spanish: no tuvo consideración
  alternatives_spanish:
  - no miró con favor
  - no prestó atención
  lexicon: HALOT
  rationale: El verbo expresa mirar/prestar atención con favor. «No tuvo consideración» conserva la idea de falta de atención favorable sin añadir una explicación que el versículo no da.
- source_word: וַיִּחַר
  english_pob_choice: became very angry
  chosen_spanish: se enfureció
  alternatives_spanish:
  - ardió en ira
  - se indignó
  lexicon: HALOT
  rationale: El hebreo usa una imagen de ardor/encenderse. «Se enfureció» comunica con naturalidad la intensidad emocional; «ardió en ira» preserva más la imagen, pero suena más literario y menos directo.
- source_word: מְאֹד
  english_pob_choice: very
  chosen_spanish: muchísimo
  alternatives_spanish:
  - muy
  - en gran manera
  lexicon: HALOT
  rationale: Es un intensificador adverbial. Unido a «se enfureció», «muchísimo» refuerza la intensidad sin perder fluidez en español.
- source_word: וַיִּפְּל֖וּ פָּנָיו
  english_pob_choice: his face fell
  chosen_spanish: su rostro cayó
  alternatives_spanish:
  - se le descompuso el rostro
  - se abatió su semblante
  lexicon: HALOT
  rationale: Se conserva la imagen idiomática hebrea del rostro que cae. «Su rostro cayó» es fiel y auditable, aunque suene menos idiomático en español; por eso se mantiene acompañado del contexto emocional inmediato.
theological_decisions:
- issue: Naturaleza de la respuesta divina a Caín y su ofrenda
  english_pob_reading: Render God's response as withheld regard/favor without specifying a doctrinal reason in the translation.
  chosen_spanish_reading: Expresar que Dios no tuvo consideración, sin explicar en la traducción por qué no la tuvo.
  alternative_spanish_readings:
  - no aceptó
  - no miró con favor
  rationale: El hebreo solo afirma la falta de consideración, no su causa. «No tuvo consideración» evita introducir una explicación teológica ajena al texto y preserva la reserva del original.
  doctrine_reference: Principios de fidelidad semántica y no inferencia teológica indebida
- issue: Imagen idiomática de la reacción de Caín
  english_pob_reading: Hebrew 'his face fell,' an idiom for becoming downcast.
  chosen_spanish_reading: Mantener la metáfora del rostro que cae y no convertirla enteramente en paráfrasis psicológica.
  alternative_spanish_readings:
  - se abatió
  - quedó cabizbajo
  rationale: El hebreo presenta una imagen concreta. «Su rostro cayó» conserva esa textura textual; la frase siguiente («se enfureció muchísimo») ya da el sentido emocional general.
  doctrine_reference: Principios de preservación de imagen y figuración bíblica
translation_notes:
  revision_awareness: 'El pasaje coincide en lo esencial con el texto fuente y con la auditoría inglesa: se mantiene la ausencia de explicación causal para el rechazo de la ofrenda, se conserva la intensificación de la ira y se registra la metáfora del rostro caído. No se documentan revisiones previas adicionales en este fragmento.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el contexto lo requiera; aquí el versículo no nombra explícitamente al sujeto, por lo que la traducción se mantiene impersonal como en el hebreo inmediato.
  - «Ofrenda» se emplea como término cultual estándar y coherente con la serie de Génesis 4.
  - Se conserva la metáfora «su rostro cayó» para mantener la correspondencia con el hebreo y con la nota auditada del inglés POB.
