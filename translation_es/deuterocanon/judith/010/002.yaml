- from: Y se levantó de su postración[a] y llamó a su criada Abra, y descendió a la casa en la cual se alojaba durante los días de sus sábados y durante sus fiestas[b].
  to: Y se levantó de su postración[a] y llamó a su criada Abra, y bajó a la casa donde se alojaba durante los días de sus sábados y durante sus fiestas[b].
