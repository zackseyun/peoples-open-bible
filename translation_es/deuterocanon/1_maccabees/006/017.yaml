    rationale: Aunque reproduce de cerca el inglés «installed», en español general y eclesial «instalar» se asocia más con colocar físicamente o investir en cargos modernos. Para κατέστησεν βασιλεύειν, «puso ... a reinar» o similar comunica mejor la acción de hacer que alguien asuma la realeza.
