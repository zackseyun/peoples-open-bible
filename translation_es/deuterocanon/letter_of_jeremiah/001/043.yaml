revisions:
- from: Pero siempre que una de ellas sea arrastrada[a] por uno de los que pasan y se acueste con él[b], reprocha a la que está junto a ella, porque no fue considerada digna como ella[c], ni se rompió su cordel.
  to: Pero cuando una de ellas sea arrastrada[a] por uno de los que pasan y se acueste con él[b], reprocha a la que está junto a ella, porque no fue considerada digna como ella, ni se rompió su cordel[c].
  rationale: Se ajusta «siempre que» a «cuando» para un español más natural y fiel al valor de ὅταν δέ, y se reubica la nota [c] al término «cordel», que es el elemento que la nota explica. Se conserva el resto de la redacción, que refleja adecuadamente el sentido del original y del POB inglés.
