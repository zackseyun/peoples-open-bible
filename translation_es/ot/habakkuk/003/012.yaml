translation:
  language: es
  text: Con furor marchaste por la tierra[a]; con ira trillaste a las naciones[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el mundo»; el hebreo אֶרֶץ puede referirse a la tierra en general o a una tierra/territorio específico.
    reason: lexical_alternative
  - marker: b
    text: O «pisoteaste a las naciones»; el verbo hebreo evoca la trilla, a menudo mediante el pisoteo.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּזַעַם
  english_pob_choice: In wrath
  chosen_spanish: Con furor
  alternatives_spanish:
  - En ira
  - Con ira
  lexicon: HALOT
  rationale: La preposición ב con זַעַם funciona de manera adverbial/instrumental, indicando la manera de la acción divina. En español, «con furor» transmite el matiz de intensidad y violencia emotiva de forma natural y digna, sin perder la fuerza del hebreo.
- source_word: תִּצְעַד
  english_pob_choice: you marched through
  chosen_spanish: marchaste por
  alternatives_spanish:
  - pisaste por
  - caminaste por
  - marchaste
  lexicon: HALOT
  rationale: צעד expresa dar pasos o marchar. En este contexto teofánico, «marchaste» conserva la idea de avance decidido y poderoso. Se añadió «por» para expresar el movimiento a través del dominio de la tierra en español natural.
- source_word: אָרֶץ
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra
  - la tierra habitada
  - el país
  lexicon: HALOT
  rationale: Aunque el contexto amplio permite «la tierra» o «la tierra habitada», en español «la tierra» mantiene la amplitud del hebreo אָרֶץ sin forzar un giro más interpretativo. La nota conserva la alternativa «la tierra»/«el país» implícita en el campo semántico.
- source_word: בְּאַף
  english_pob_choice: in anger
  chosen_spanish: con ira
  alternatives_spanish:
  - en ira
  - con furia
  lexicon: HALOT
  rationale: אַף es literalmente «nariz» y, por extensión idiomática, «ira». «Con ira» reproduce bien el paralelismo con la primera cola y evita una calca extraña; «con furia» sigue siendo una alternativa válida en registro poético.
- source_word: תָּדוּשׁ
  english_pob_choice: you threshed
  chosen_spanish: trillaste
  alternatives_spanish:
  - trillaste con los pies
  - pisoteaste
  - desgranaste
  lexicon: HALOT
  rationale: דושׁ conserva la metáfora agrícola de trillar, a menudo mediante pisoteo. «Trillaste» preserva esa imagen verbal sin aplastarla en un simple «pisoteaste», manteniendo la fuerza poética del hebreo.
- source_word: גּוֹיִם
  english_pob_choice: the nations
  chosen_spanish: a las naciones
  alternatives_spanish:
  - a las naciones
  - a los pueblos
  - a los gentiles
  lexicon: HALOT
  rationale: גוֹיִם suele significar «naciones» o «pueblos». En este contexto de juicio, «a las naciones» es la opción más directa y conserva la referencia a los pueblos sometidos al juicio divino. «Gentiles» introduciría una carga teológica posterior no exigida por el verso.
theological_decisions:
- issue: Alcance de אָרֶץ en un contexto teofánico de juicio
  english_pob_reading: the earth
  chosen_spanish_reading: la tierra
  alternative_spanish_readings:
  - el mundo
  - la tierra habitada
  rationale: El poema presenta una marcha divina de juicio sobre la esfera creada. «La tierra» mantiene amplitud suficiente en español y evita restringir innecesariamente el escenario a un territorio local. La alternativa «el mundo» es posible, pero menos pegada al valor léxico básico de אָרֶץ.
  doctrine_reference: Translation philosophy §1, §3, §5
- issue: Metáfora de trillar como acto de juicio
  english_pob_reading: you threshed the nations
  chosen_spanish_reading: trillaste a las naciones
  alternative_spanish_readings:
  - pisoteaste a las naciones
  - las aplastaste
  rationale: La imagen de trillar conserva la dureza del juicio y el trasfondo agrícola del verbo hebreo. No se suaviza a «pisoteaste» como lectura principal, porque el POB inglés también preserva la metáfora («threshed») y la tensión semántica debe quedar visible en español.
  doctrine_reference: Translation philosophy §2, §4
translation_notes:
  revision_awareness: El texto inglés auditado muestra acuerdo alto y no introdujo revisiones recientes; por ello, el borrador español sigue de cerca la decisión óptima-equivalente ya validada, manteniendo la metáfora de la trilla y el posible alcance amplio de אֶרֶץ.
  spanish_consistency_notes:
  - 'Se conserva el paralelismo con dos miembros breves y solemnes: «Con furor...» / «con ira...».'
  - Se mantiene «trillaste» para reflejar la metáfora agrícola del hebreo, en coherencia con la opción inglesa «threshed».
  - Se usa «la tierra» en el cuerpo principal y la nota ofrece la alternativa de alcance más amplio, siguiendo el juicio textual del audit trail.
  - No se emplea «SEÑOR» ni «Cristo», pues el verso no contiene esos términos.
