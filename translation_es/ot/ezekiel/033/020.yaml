translation:
  language: es
  text: 'Sin embargo, ustedes dicen[a]: «El camino del Señor no es justo». Yo juzgaré a cada uno de ustedes según sus caminos[b], oh casa de Israel.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «El camino del Señor no es imparcial» o «no es recto». La expresión hebrea cuestiona si el modo de juzgar de Dios es considerado equitativo.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «cada hombre según sus caminos». El versículo se dirige a la casa de Israel como conjunto, pero recalca la responsabilidad individual.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲמַרְתֶּם
  english_pob_choice: Yet you say
  chosen_spanish: Sin embargo, ustedes dicen
  alternatives_spanish:
  - Y ustedes dicen
  - Pero ustedes dicen
  lexicon: HALOT
  rationale: El waw con valor adversativo en contexto responde a la queja del pueblo; «sin embargo» reproduce bien el contraste. Mantengo el presente de discurso directo, natural en español profético.
- source_word: לֹא יִתָּכֵן
  english_pob_choice: is not just
  chosen_spanish: no es justo
  alternatives_spanish:
  - no es correcto
  - no es recto
  - no es justo/fair
  lexicon: HALOT
  rationale: El verbo en esta construcción expresa si el proceder de Yahvé es considerado equitativo o conforme al derecho. «Justo» conserva la fuerza forense y moral del reproche mejor que una traducción meramente descriptiva.
- source_word: דֶּרֶךְ אֲדֹנָי
  english_pob_choice: the way of the Lord
  chosen_spanish: el camino de Yahvé
  alternatives_spanish:
  - el camino del Señor
  - la manera de Yahvé
  lexicon: HALOT
  rationale: דֶּרֶךְ conserva su valor idiomático de modo de obrar o proceder. Se usa «Yahvé» por la norma del proyecto para el nombre divino; «camino» evita forzar el sintagma hacia una paráfrasis abstracta.
- source_word: אִישׁ
  english_pob_choice: each of you
  chosen_spanish: cada uno de ustedes
  alternatives_spanish:
  - cada persona de ustedes
  - cada uno
  lexicon: HALOT
  rationale: Aunque el hebreo usa un singular distributivo, el español fluido requiere una distribución explícita en plural. «Cada uno de ustedes» preserva la accountability individual sin introducir un masculino marcado innecesario.
- source_word: כִּדְרָכָיו
  english_pob_choice: according to his ways
  chosen_spanish: según sus caminos
  alternatives_spanish:
  - conforme a su camino
  - según su conducta
  lexicon: HALOT
  rationale: El plural hebreo «caminos» debe conservarse para reflejar el patrón repetido de conducta. El posesivo plural en español sigue la referencia distributiva sin obligar a un singular engorroso.
- source_word: אֶשְׁפּוֹט אֶתְכֶם
  english_pob_choice: I will judge each of you
  chosen_spanish: Yo juzgaré a cada uno de ustedes
  alternatives_spanish:
  - Yo los juzgaré
  - Yo haré justicia sobre cada uno de ustedes
  lexicon: HALOT
  rationale: שׁפט es claramente judicial aquí. «Juzgaré» mantiene el sentido forense, y «a cada uno de ustedes» conserva la tensión entre el destinatario corporativo y la rendición de cuentas individual.
- source_word: בֵּית יִשְׂרָאֵל
  english_pob_choice: O house of Israel
  chosen_spanish: casa de Israel
  alternatives_spanish:
  - casa de Israel, oh
  - casa de Israel, ustedes
  lexicon: HALOT
  rationale: «Casa de Israel» es el equivalente idiomático estándar para la entidad corporativa del pueblo; en español profético puede funcionar sin vocativo explícito separado cuando el cierre del enunciado ya es claro.
theological_decisions:
- issue: Queja sobre la equidad del juicio divino
  english_pob_reading: The way of the Lord is not just
  chosen_spanish_reading: El camino de Yahvé no es justo
  alternative_spanish_readings:
  - El camino de Yahvé no es recto
  - El camino de Yahvé no es correcto
  - El camino del Señor no es justo
  rationale: La escena plantea una objeción a la justicia de Dios en términos judiciales. «Justo» conserva el peso moral y jurídico del hebreo sin diluir la acusación en una mera preferencia subjetiva.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Responsabilidad individual dentro del destinatario corporativo
  english_pob_reading: I will judge each of you according to his ways, O house of Israel
  chosen_spanish_reading: Yo juzgaré a cada uno de ustedes según sus caminos, casa de Israel
  alternative_spanish_readings:
  - Yo juzgaré a cada uno según sus caminos, casa de Israel
  - Yo los juzgaré según sus caminos, casa de Israel
  rationale: El hebreo mantiene en tensión el plural corporativo con la distribución individual. La traducción española conserva esa tensión mediante «cada uno de ustedes» y el plural «caminos», evitando borrar la responsabilidad personal dentro del conjunto.
  doctrine_reference: Translation philosophy §§3, 4, 5
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del POB inglés, que ajustó la idea de «each man of you» a «each of you» para mayor naturalidad, manteniendo el singular distributivo implícito. La versión española refleja esa decisión con «cada uno de ustedes» y conserva el plural «caminos» para representar fielmente el hebreo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» en lugar de «Señor» para el nombre divino, según la norma del proyecto.
  - «Justo» se usa en sentido forense/ético, coherente con el contexto judicial de Ezequiel 33.
  - La relación entre el destinatario corporativo («casa de Israel») y la rendición de cuentas individual se conserva sin neutralizarla.
  - «Caminos» se mantiene en plural para reflejar la forma hebrea y su sentido de conducta habitual.
