translation:
  language: es
  text: Desde el tiempo en que Amasías se apartó de seguir a Yahvé[a], conspiraron contra él en Jerusalén; él huyó a Laquis, pero enviaron tras él a Laquis y le dieron muerte allí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «se apartó de detrás de Yahvé», un modismo que significa que dejó de seguir a Yahvé.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמֵעֵת אֲשֶׁר
  english_pob_choice: Now from the time that
  chosen_spanish: Desde el tiempo en que
  alternatives_spanish:
  - Y desde el tiempo en que
  - Desde el momento en que
  lexicon: HALOT
  rationale: La expresión introduce el punto temporal a partir del cual comienza la conspiración. En español, «Desde el tiempo en que» conserva el valor temporal sin sobrecargar la narración con un «ahora» que sería menos natural aquí.
- source_word: סָר
  english_pob_choice: turned away
  chosen_spanish: se apartó
  alternatives_spanish:
  - se desvió
  - se apartó de
  lexicon: HALOT
  rationale: El verbo indica desviación o apostasía, no simple movimiento físico. «Se apartó» comunica bien la idea de abandonar una dirección relacional o religiosa, y el complemento posterior explicita de qué se apartó.
- source_word: מֵאַחֲרֵי יְהוָה
  english_pob_choice: from following Yahweh
  chosen_spanish: de seguir a Yahvé
  alternatives_spanish:
  - de ir tras Yahvé
  - de seguir tras Yahvé
  lexicon: HALOT
  rationale: El hebreo literalmente dice «de detrás de Yahvé», un modismo para dejar de seguirlo. «De seguir a Yahvé» preserva la fuerza relacional del idioma sin sonar artificial en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el nombre divino: «Yahvé» en el texto principal. Así se mantiene visible el Tetragrámaton y se evita la sustitución por un título.'
- source_word: וַיִּקְשְׁרוּ עָלָיו קֶשֶׁר
  english_pob_choice: they conspired against him
  chosen_spanish: conspiraron contra él
  alternatives_spanish:
  - hicieron una conspiración contra él
  - tramaron contra él
  lexicon: HALOT
  rationale: La combinación verbal-sustantiva intensifica la idea de complot. En español, «conspiraron contra él» reproduce la fuerza idiomática de modo claro y natural, sin perder el matiz de acción deliberada.
- source_word: בִּירוּשָׁלַם
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  alternatives_spanish:
  - dentro de Jerusalén
  lexicon: HALOT
  rationale: Correspondencia locativa directa y transparente.
- source_word: וַיָּנָס לָכִישָׁה
  english_pob_choice: and he fled to Lachish
  chosen_spanish: él huyó a Laquis
  alternatives_spanish:
  - escapó a Laquis
  - fue huyendo a Laquis
  lexicon: HALOT
  rationale: El verbo expresa huida ante peligro. «Huyó a Laquis» es la forma más directa y fiel; el nombre se adapta a la forma castellana habitual «Laquis».
- source_word: וַיִּשְׁלְחוּ אַחֲרָיו לָכִישָׁה
  english_pob_choice: but they sent after him to Lachish
  chosen_spanish: y enviaron tras él a Laquis
  alternatives_spanish:
  - y mandaron tras él a Laquis
  - y lo enviaron persiguiendo hasta Laquis
  lexicon: HALOT
  rationale: El hebreo dice literalmente «enviaron tras él». «Enviaron tras él a Laquis» conserva la idea de despachar perseguidores sin añadir elementos no expresados. Se omite aquí una adversativa explícita porque el español ya fluye bien con la secuencia narrativa.
- source_word: וַיְמִיתֻהוּ
  english_pob_choice: and put him to death
  chosen_spanish: lo mataron
  alternatives_spanish:
  - le dieron muerte
  - lo hicieron morir
  lexicon: HALOT
  rationale: El causativo de מות puede reflejarse como ejecución deliberada. En español, «lo mataron» es plenamente idiomático y no debilita indebidamente la acción intencional.
- source_word: שָׁם
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  lexicon: HALOT
  rationale: Adverbio locativo que remite a Laquis; «allí» suena más formal y adecuado para texto bíblico.
theological_decisions:
- issue: Nombre divino יְהוָה en un contexto de apostasía real
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se conserva el nombre propio divino porque el hebreo usa explícitamente el Tetragrámaton. En una acusación de apartarse de seguir a Yahvé, el nombre propio mantiene el contraste teológico del texto.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: La revisión inglesa más reciente quedó sin cambios y confirmó alta concordancia con el hebreo; por eso la redacción española sigue de cerca el flujo narrativo del original, manteniendo el nombre divino Yahvé, el giro idiomático de «seguir a Yahvé» y la secuencia de acciones sin expansión interpretativa.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה, conforme al criterio del proyecto.
  - Se eligió «se apartó de seguir a Yahvé» para preservar el modismo hebreo sin calcado opaco.
  - «Laquis» sigue la forma castellana común del topónimo y se mantiene estable en ambos usos del versículo.
  - 'La puntuación reproduce la progresión narrativa: apostasía, conspiración, huida, persecución y muerte.'
