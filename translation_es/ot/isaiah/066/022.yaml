  to: Porque, así como los cielos nuevos y la tierra nueva que yo hago permanecerán delante de mí[a], declara Yahvé, así permanecerán vuestra descendencia y vuestro nombre.
  rationale: Se corrige la persona gramatical para reflejar fielmente los sufijos hebreos de segunda persona plural y la apelación directa del versículo. También se elimina «también», que no es necesario para representar la correlación hebrea. Se mantiene el resto de la redacción, que es fiel al sentido fuente y natural en español.
