  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Dios», «salvación» y «justos» están bien. La principal decisión léxica a corregir es σημεῖον -> «marca» para mantener el paralelismo contextual documentado; θάνατος puede quedarse como «muerte» sin nota explicativa innecesaria.
