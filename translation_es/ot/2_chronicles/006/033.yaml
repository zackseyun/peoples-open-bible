translation:
  language: es
  text: entonces oye desde el cielo, desde tu morada, y haz conforme a todo lo que el extranjero te pida, para que todos los pueblos de la tierra conozcan tu nombre y te teman, como lo hace tu pueblo Israel, y sepan que tu nombre es llamado sobre[a] esta casa que yo he edificado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más interpretativa: «que esta casa lleva tu nombre». El hebreo dice literalmente: «tu nombre es llamado sobre esta casa».'
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּשְׁמַע
  english_pob_choice: hear
  chosen_spanish: oye
  alternatives_spanish:
  - escucha
  - oye atentamente
  lexicon: HALOT
  rationale: En contexto de oración, שׁמע expresa oír con atención y respuesta. «Oye» mantiene la brevedad y la fuerza verbal sin sonar mecánico en español.
- source_word: מִן הַשָּׁמַיִם
  english_pob_choice: from heaven
  chosen_spanish: desde los cielos
  alternatives_spanish:
  - desde el cielo
  - desde los cielos
  lexicon: HALOT
  rationale: El hebreo usa plural morfológico. En español, «los cielos» conserva mejor la forma y el registro bíblico que singularizarlo sin necesidad.
- source_word: מִמְּכוֹן שִׁבְתֶּךָ
  english_pob_choice: from your dwelling place
  chosen_spanish: desde tu morada
  alternatives_spanish:
  - desde el lugar de tu morada
  - desde tu habitación
  lexicon: HALOT
  rationale: מכון señala un lugar establecido; «morada» es natural y digno en español y preserva la idea de residencia divina sin exagerar la literalidad.
- source_word: וְעָשִׂיתָ
  english_pob_choice: do
  chosen_spanish: haz
  alternatives_spanish:
  - actúa
  - obra
  lexicon: HALOT
  rationale: Aquí עשה se refiere a la acción de Dios en respuesta a la petición. «Haz» mantiene la amplitud del verbo y su valor imperativo en la súplica.
- source_word: כְּכֹל אֲשֶׁר יִקְרָא אֵלֶיךָ
  english_pob_choice: according to all that ... calls to you for
  chosen_spanish: conforme a todo lo que el extranjero te pida
  alternatives_spanish:
  - según todo lo que el extranjero te invoque
  - de acuerdo con todo lo que el extranjero te solicite
  lexicon: HALOT
  rationale: קרא אל en este contexto es peticionario. «Pida» expresa la solicitud de oración en español con naturalidad y sin perder el contenido de la súplica.
- source_word: הַנָּכְרִי
  english_pob_choice: the foreigner
  chosen_spanish: el extranjero
  alternatives_spanish:
  - el forastero
  - el extranjero
  lexicon: HALOT
  rationale: נכרי designa a alguien de otro pueblo, no israelita. «El extranjero» es claro y conserva la alteridad étnica del término.
- source_word: לְמַעַן יֵדְעוּ
  english_pob_choice: so that ... may know
  chosen_spanish: para que ... conozcan
  alternatives_spanish:
  - a fin de que ... conozcan
  - para que ... sepan
  lexicon: HALOT
  rationale: La frase marca propósito. «Para que conozcan» es idiomático y mantiene el resultado esperado de la respuesta divina.
- source_word: כָל עַמֵּי הָאָרֶץ
  english_pob_choice: all the peoples of the earth
  chosen_spanish: todos los pueblos de la tierra
  alternatives_spanish:
  - todos los pueblos de la tierra
  - todas las naciones de la tierra
  lexicon: HALOT
  rationale: En este contexto universal, הארץ se entiende como «tierra». «Pueblos» conserva el plural colectivo mejor que una abstracción singular.
- source_word: אֶת שְׁמֶךָ
  english_pob_choice: your name
  chosen_spanish: tu nombre
  alternatives_spanish:
  - tu nombre
  lexicon: HALOT
  rationale: «Nombre» conserva la carga bíblica de reputación, identidad revelada y renombre covenantal sin añadir paráfrasis.
- source_word: וּלְיִרְאָה אֹתְךָ
  english_pob_choice: and fear you
  chosen_spanish: y te teman
  alternatives_spanish:
  - y te reverencien
  - y te teman
  lexicon: HALOT
  rationale: יָרֵא referido a Dios conserva el peso de la reverencia temerosa. «Teman» mantiene el idiomático bíblico más que suavizarlo a «reverencien».
- source_word: כְּעַמְּךָ יִשְׂרָאֵל
  english_pob_choice: as your people Israel do
  chosen_spanish: como tu pueblo Israel
  alternatives_spanish:
  - como tu pueblo Israel
  - como lo hace tu pueblo Israel
  lexicon: HALOT
  rationale: El hebreo plantea comparación con Israel como modelo. En español, la forma breve «como tu pueblo Israel» es suficientemente clara y evita añadir un verbo innecesario.
- source_word: וְלָדַעַת
  english_pob_choice: and may know
  chosen_spanish: y sepan
  alternatives_spanish:
  - y conozcan
  - y sepan
  lexicon: HALOT
  rationale: Se trata de una segunda finalidad paralela. «Sepan» mantiene la repetición con el versículo y funciona bien junto a «conozcan».
- source_word: כִּי שִׁמְךָ נִקְרָא עַל
  english_pob_choice: that your name is called upon
  chosen_spanish: que tu nombre es invocado sobre
  alternatives_spanish:
  - que tu nombre es llamado sobre
  - que tu nombre es invocado sobre
  - que esta casa lleva tu nombre
  lexicon: HALOT
  rationale: El hebreo usa un modismo de pertenencia/nombramiento. «Es invocado sobre» preserva la imagen literal con una forma comprensible en español; la lectura interpretativa queda reservada para nota.
- source_word: הַבַּיִת הַזֶּה
  english_pob_choice: this house
  chosen_spanish: esta casa
  alternatives_spanish:
  - esta casa
  - este templo
  lexicon: HALOT
  rationale: «Casa» sigue el hebreo בית y conserva la referencia al templo sin sustituirla por un término más explicativo que el texto no usa.
- source_word: אֲשֶׁר בָּנִיתִי
  english_pob_choice: that I have built
  chosen_spanish: que yo he edificado
  alternatives_spanish:
  - que he construido
  - que yo he construido
  lexicon: HALOT
  rationale: «He edificado» es más solemne y bíblico que «he construido», y corresponde bien a la voz del orante en este contexto cultual.
theological_decisions:
- issue: Cómo traducir el lenguaje de la morada divina sin reducirlo a una presencia vaga ni implicar confinamiento espacial
  english_pob_reading: hear from heaven, from your dwelling place
  chosen_spanish_reading: oye desde los cielos, desde tu morada
  alternative_spanish_readings:
  - oye desde el cielo, desde tu presencia celestial
  - oye desde los cielos, desde tu habitación
  rationale: El texto distingue los cielos como lugar de escucha/morada de Dios y la casa terrenal del templo. «Morada» conserva esa teología sin explicar de más ni borrar la imagen espacial del hebreo.
  doctrine_reference: Translation philosophy §1, §3
- issue: Si atenuar o no el lenguaje de temor reverente aplicado a las naciones
  english_pob_reading: fear you
  chosen_spanish_reading: te teman
  alternative_spanish_readings:
  - te reverencien
  - te veneren
  rationale: El hebreo usa el lenguaje bíblico fuerte del temor de Dios. «Teman» retiene la intensidad teológica y evita suavizarla hacia una mera admiración religiosa.
  doctrine_reference: Translation philosophy §1, §6
- issue: Cómo reflejar el modismo de que el nombre de Dios recae sobre la casa
  english_pob_reading: your name is called upon this house
  chosen_spanish_reading: tu nombre es invocado sobre esta casa
  alternative_spanish_readings:
  - esta casa lleva tu nombre
  - tu nombre es puesto sobre esta casa
  rationale: El hebreo נִקְרָא עַל expresa pertenencia/nombramiento por el nombre. La traducción elegida conserva la imagen verbal; la opción interpretativa puede notarse como alternativa sin borrar la tensión del modismo.
  doctrine_reference: Translation philosophy §1, §2
translation_notes:
  revision_awareness: Tomé como guía la revisión más reciente del POB en inglés, que eliminó una coma innecesaria tras «you» sin cambiar el contenido. En español, mantuve una sintaxis fluida y una correspondencia cercana al hebreo, preservando el modismo final con nota alternativa en vez de sustituirlo por una paráfrasis completa.
  spanish_consistency_notes:
  - Usé «Yahvé» solo cuando el texto fuente lo exigiera explícitamente; en este versículo no aparece el tetragrámaton, así que no fue necesario.
  - Mantuve «cielos» en plural para respetar la forma hebrea y el registro bíblico.
  - Conservé «teman» para el temor reverente, según la preferencia POB de no diluir el campo semántico.
  - Elegí «casa» frente a «templo» para seguir בית y conservar el enlace con el modismo del nombre.
  - El final «tu nombre es invocado sobre esta casa» conserva la literalidad hebrea y la nota ofrece la lectura interpretativa documentada.
