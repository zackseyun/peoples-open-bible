translation:
  language: es
  text: 'Y dijo: «Llamen a los jóvenes, y ellos declararán sus palabras[a]». Y fueron llamados, y entraron.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Declararán sus palabras» también puede entenderse como «harán saber sus declaraciones» o «presentarán sus argumentos», porque λόγους es un término amplio y puede referirse a palabras, declaraciones o argumentos.
    reason: lexical_alternative
lexical_decisions:
- source_word: Καλέσατε
  english_pob_choice: Call
  chosen_spanish: Llamad
  alternatives_spanish:
  - Llamen
  - Convocad
  lexicon: LSJ
  rationale: Aoristo imperativo plural de καλέω. «Llamad» conserva el imperativo directo y mantiene la repetición verbal con «fueron llamados» más abajo.
- source_word: τοὺς νεανίσκους
  english_pob_choice: the young men
  chosen_spanish: los jóvenes
  alternatives_spanish:
  - los muchachos
  - los jóvenes varones
  lexicon: LSJ
  rationale: νεανίσκος puede ser «joven» o «joven varón». En español «los jóvenes» es natural, claro y suficientemente preciso en el contexto narrativo de varones convocados en la corte.
- source_word: δηλώσουσιν
  english_pob_choice: they will declare
  chosen_spanish: declararán
  alternatives_spanish:
  - harán saber
  - expresarán
  lexicon: LSJ
  rationale: El futuro de δηλόω tiene el sentido de hacer claro, declarar o manifestar. «Declararán» preserva el tono formal de presentar su caso/posición.
- source_word: τοὺς λόγους αὐτῶν
  english_pob_choice: their words
  chosen_spanish: sus palabras
  alternatives_spanish:
  - sus declaraciones
  - sus argumentos
  lexicon: LSJ
  rationale: λόγοι es semánticamente amplio. «Sus palabras» sigue de cerca la amplitud del griego sin forzar aún un matiz técnico de «argumentos».
- source_word: ἐκλήθησαν
  english_pob_choice: they were called
  chosen_spanish: fueron llamados
  alternatives_spanish:
  - fueron convocados
  - se les llamó
  lexicon: LSJ
  rationale: La forma pasiva de καλέω se traduce con el mismo verbo raíz para conservar la correspondencia léxica del pasaje.
- source_word: εἰσήλθοσαν
  english_pob_choice: they entered
  chosen_spanish: entraron
  alternatives_spanish:
  - fueron adentro
  - pasaron
  lexicon: LSJ
  rationale: Aoristo de εἰσέρχομαι. «Entraron» es la equivalencia natural y sobria en español narrativo.
