translation:
  language: es
  text: O si algún leñador[a], carpintero, ha aserrado un árbol manejable y, con habilidad, le ha quitado toda la corteza, y con debida destreza artesanal ha hecho un objeto útil para el servicio de la vida[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fácil de trabajar» para «árbol manejable»; el adjetivo griego puede sugerir madera o tronco fácil de manejar o trabajar.
    reason: lexical_alternative
  - marker: b
    text: O «para las necesidades de la vida» / «para el uso cotidiano» para «para el servicio de la vida». La expresión griega se refiere al uso práctico ordinario en la vida humana.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑλοτόμος
  english_pob_choice: woodcutter
  chosen_spanish: leñador
  alternatives_spanish:
  - cortador de leña
  - talador
  lexicon: LSJ
  rationale: El compuesto designa a quien corta madera o leña. En español, «leñador» es natural y claro; conserva la idea de oficio manual sin sonar técnico en exceso.
- source_word: τέκτων
  english_pob_choice: carpenter
  chosen_spanish: carpintero
  alternatives_spanish:
  - artesano
  - oficial
  lexicon: LSJ
  rationale: En este contexto de trabajo sobre madera tras derribar el árbol, «carpintero» comunica bien el oficio artesanal y mantiene la concreción del inglés POB.
- source_word: εὐκίνητον
  english_pob_choice: manageable
  chosen_spanish: manejable
  alternatives_spanish:
  - fácil de trabajar
  - móvil
  - maleable
  lexicon: LSJ
  rationale: El adjetivo sugiere algo fácil de manejar o trabajar. «Manejable» reproduce esa utilidad práctica sin cargar el texto con una interpretación más específica de la necesaria.
- source_word: φυτὸν
  english_pob_choice: tree
  chosen_spanish: árbol
  alternatives_spanish:
  - planta
  - vegetal
  lexicon: LSJ
  rationale: Aunque literalmente puede significar planta o brote, el contexto de talar y descortezar exige «árbol» en español para reflejar el sentido inmediato.
- source_word: ἐκπρίσας
  english_pob_choice: has sawed down
  chosen_spanish: ha cortado
  alternatives_spanish:
  - ha aserrado
  - ha derribado con sierra
  lexicon: LSJ
  rationale: El verbo alude a cortar con sierra. En español, «ha cortado» es más fluido y suficientemente fiel en una secuencia de tala y trabajo de la madera; «ha aserrado» sonaría más técnico y menos natural.
- source_word: περιέξυσεν
  english_pob_choice: stripped off
  chosen_spanish: le ha quitado toda la corteza
  alternatives_spanish:
  - le ha raspado la corteza
  - le ha despojado la corteza
  lexicon: LSJ
  rationale: El verbo expresa raspar o quitar alrededor; aplicado al árbol, la imagen natural es descortezarlo. «Le ha quitado toda la corteza» conserva el resultado sin forzar un calco incómodo.
- source_word: εὐμαθῶς
  english_pob_choice: skillfully
  chosen_spanish: con habilidad
  alternatives_spanish:
  - con destreza
  - diestromente
  - con pericia
  lexicon: LSJ
  rationale: En el contexto artesanal, el adverbio apunta a una ejecución competente. «Con habilidad» transmite la idea de forma clara y sobria en español.
- source_word: φλοιός
  english_pob_choice: bark
  chosen_spanish: corteza
  alternatives_spanish:
  - cascarilla
  - piel externa
  lexicon: LSJ
  rationale: Para un árbol, el término natural en español es «corteza». Mantiene precisión botánica y evita una expresión extraña.
- source_word: τεχνησάμενος
  english_pob_choice: with proper craftsmanship
  chosen_spanish: con arte apropiado
  alternatives_spanish:
  - con la debida destreza artesanal
  - con habilidad técnica
  lexicon: LSJ
  rationale: El participio subraya el ejercicio del arte/oficio. «Con arte apropiado» preserva la relación con técnica y conveniencia sin sobrecargar la frase.
- source_word: εὐπρεπῶς
  english_pob_choice: proper
  chosen_spanish: apropiado
  alternatives_spanish:
  - conveniente
  - de manera decorosa
  - bien
  lexicon: LSJ
  rationale: El adverbio puede significar de manera adecuada o decorosa. Aquí se refiere a la forma correcta de fabricar el objeto; «apropiado» conserva esa suficiencia práctica.
- source_word: κατεσκεύασεν
  english_pob_choice: made
  chosen_spanish: ha hecho
  alternatives_spanish:
  - ha fabricado
  - ha confeccionado
  - ha preparado
  lexicon: LSJ
  rationale: El verbo significa hacer, construir o preparar. «Ha hecho» es directo y encaja con la secuencia de acciones artesanales sin añadir matices innecesarios.
- source_word: χρήσιμον σκεῦος
  english_pob_choice: a useful vessel
  chosen_spanish: un utensilio útil
  alternatives_spanish:
  - un recipiente útil
  - un objeto útil
  - un implemento útil
  lexicon: LSJ
  rationale: La expresión apunta a un objeto práctico para uso humano. «Utensilio» capta mejor la utilidad cotidiana que «vessel» traducido literalmente como «vasija», que sería demasiado estrecho.
- source_word: εἰς ὑπηρεσίαν ζωῆς
  english_pob_choice: for the service of life
  chosen_spanish: para el servicio de la vida
  alternatives_spanish:
  - para las necesidades de la vida
  - para el uso cotidiano
  - para el sustento de la vida
  lexicon: LSJ
  rationale: La frase griega remite al uso práctico ordinario en la vida humana. «Para el servicio de la vida» sigue de cerca la construcción del original y coincide con el inglés POB.
theological_decisions:
- issue: Tono descriptivo del trabajo humano antes del argumento contra los ídolos
  english_pob_reading: Retain the practical, non-polemical description in this verse without importing the later critique into the wording.
  chosen_spanish_reading: Mantener una descripción neutral y práctica del trabajo artesanal, sin añadir una censura que no está expresada aquí.
  alternative_spanish_readings:
  - Traducir con un tono más negativo para anticipar la crítica a la idolatría
  - Introducir una valoración implícita del objeto fabricado
  rationale: El versículo describe acciones ordinarias de carpintería y uso doméstico; la fuerza teológica viene del contexto cercano, no de este enunciado aislado. La traducción no debe cargarlo con una polémica que el griego no formula todavía.
  doctrine_reference: 'Principio de fidelidad textual: no importar conclusiones doctrinales que pertenezcan al contexto mayor pero no a la línea traducida.'
translation_notes:
  revision_awareness: Se siguió la última revisión del POB inglés, que cambió la transición de 'then' a 'and' para reflejar mejor la secuencia participial del griego sin añadir una temporalidad no explícita. También se mantuvo la lectura práctica de εὐκίνητον como 'manageable' y de εἰς ὑπηρεσίαν ζωῆς como un uso cotidiano o servicio de la vida.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino en todo el proyecto, aunque este versículo no lo menciona.
  - Se prefirió «árbol» por el contexto de tala y descortezado, aunque φυτὸν pueda ser más general en otros contextos.
  - «Utensilio útil» conserva el valor funcional de σκεῦος sin restringirlo a una vasija concreta.
  - El ritmo de la oración imita la acumulación griega de participios y acciones encadenadas, evitando una explicitación temporal extra que el original no requiere.
