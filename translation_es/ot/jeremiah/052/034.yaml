translation:
  language: es
  text: Y su ración[a], una ración continua, le era dada de parte del rey de Babilonia, una porción diaria, día por día, hasta el día de su muerte, todos los días de su vida.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'provisión', 'porción' o 'asignación' para 'ración' (heb. אֲרֻחָה). El término aquí se refiere al sustento asignado por el rey para Joaquín.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲרֻחָה / אֲרֻחָתוֹ
  english_pob_choice: allowance
  chosen_spanish: ración
  alternatives_spanish:
  - porción
  - provisión
  - asignación
  lexicon: HALOT
  rationale: El contexto es de manutención asignada por el rey para Joaquín, no de ‘comida’ en sentido general. ‘Ración’ comunica bien una provisión fijada y administrada, y en español conserva la idea de un suministro asignado.
- source_word: תָּמִיד
  english_pob_choice: continual
  chosen_spanish: continua
  alternatives_spanish:
  - regular
  - constante
  - continuamente
  lexicon: HALOT
  rationale: Aquí modifica a ‘ración’ como rasgo permanente u շարունակado. ‘Continua’ mantiene la fuerza de continuidad sin volver la frase más pesada.
- source_word: נִתְּנָה
  english_pob_choice: was given
  chosen_spanish: le fue dada
  alternatives_spanish:
  - le fue provista
  - le fue concedida
  - le fue entregada
  lexicon: HALOT
  rationale: La pasiva refleja el hebreo niphal y ‘le fue dada’ conserva la transparencia formal. Se antepone el pronombre para una lectura natural en español.
- source_word: מֵאֵת מֶלֶךְ בָּבֶל
  english_pob_choice: from the king of Babylon
  chosen_spanish: desde el rey de Babilonia
  alternatives_spanish:
  - por el rey de Babilonia
  - de parte del rey de Babilonia
  lexicon: HALOT
  rationale: El hebreo marca origen/procedencia. ‘Desde’ mantiene esa fuente de procedencia de manera bastante directa en español, sin desplazar del todo el matiz de origen.
- source_word: דְּבַר יוֹם בְּיוֹמוֹ
  english_pob_choice: a daily portion day by day
  chosen_spanish: una porción diaria, día por día
  alternatives_spanish:
  - una ración diaria, día tras día
  - la porción de cada día, día por día
  lexicon: HALOT
  rationale: La frase hebrea expresa la cantidad asignada para cada día, con repetición distributiva. ‘Una porción diaria, día por día’ preserva esa doble idea sin perder claridad en español.
- source_word: עַד יוֹם מוֹתוֹ
  english_pob_choice: until the day of his death
  chosen_spanish: hasta el día de su muerte
  alternatives_spanish:
  - hasta su muerte
  - hasta el día en que murió
  lexicon: HALOT
  rationale: La forma más directa y formal en español es reproducir el sintagma completo ‘hasta el día de su muerte’, que mantiene la cadencia del hebreo.
- source_word: כֹּל יְמֵי חַיָּיו
  english_pob_choice: all the days of his life
  chosen_spanish: todos los días de su vida
  alternatives_spanish:
  - toda su vida
  - durante todos los días de su vida
  lexicon: HALOT
  rationale: Es un modismo hebreo clásico. ‘Todos los días de su vida’ es la equivalencia más transparente y conserva el registro formal del verso.
translation_notes:
  revision_awareness: Se siguió de cerca el audit trail inglés y no se detectaron revisiones posteriores; el versículo muestra alta concordancia entre fuentes y traducción auditada.
  spanish_consistency_notes:
  - Se evitó ‘SEÑOR’ porque no aparece el tetragrámaton en este versículo.
  - Se mantuvo un tono sobrio y administrativo, acorde con la provisión real descrita en el hebreo.
  - La repetición ‘día por día’ se conservó para reflejar la distribución continua del sustento.
