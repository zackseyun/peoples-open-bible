review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura y la mayoría de las decisiones léxicas del hebreo: causalidad inicial, realidad continua de la pobreza, inferencia lógica, mandato directo, fórmula quotativa, metáfora de la mano, lenguaje de parentesco y distinción entre עָנִי y אֶבְיוֹן. Sin embargo, ‘en medio de la tierra’ en la primera cláusula suena en español más universal/cósmico que el marco deuteronómico de la tierra pactal; conviene alinearlo con ‘la tierra’ como ámbito del pacto. También falta en español la nota alternativa para ‘tu hermano’ que sí preserva el rastro inglés.'
  spanish_quality_summary: El texto es claro y digno, pero ‘Sin falta abrirás tu mano’ resulta algo tieso y menos natural que una formulación enfática más idiomática. ‘A tu afligido’ es aceptable por fidelidad a la distinción léxica, aunque algo marcado; con nota se sostiene. El principal ajuste estilístico es evitar la lectura planetaria de ‘en medio de la tierra’ y suavizar la fuerza imperativa para que siga siendo natural en español bíblico contemporáneo.
  glossary_alignment: No hay conflictos con la terminología global del proyecto. ‘Hermano’, ‘tierra’ y la distinción ‘afligido/pobre’ están en línea con el expediente inglés. Se recomienda añadir una nota para ‘hermano’ por la fuerza pactual representativa documentada en el POB inglés.
  issues:
  - severity: medium
    issue: ‘En medio de la tierra’ puede sugerir el planeta o una generalización abstracta.
    rationale: El hebreo הָאָרֶץ en este contexto de Deuteronomio apunta a la tierra del pacto. En español, ‘la tierra’ tras ‘en medio de’ suena más cósmico que ‘la tierra’ como territorio pactual. Una formulación como ‘de en medio de la tierra’ o ‘en la tierra’ evita esa desviación.
  - severity: medium
    issue: Falta la nota sobre ‘tu hermano’ presente en el expediente inglés.
    rationale: El POB inglés documenta la alternativa ‘fellow Israelite’ y la razón teológica/lexical del lenguaje de parentesco representativo. El español debería preservar esa información en nota para mantener el rastro de auditoría.
  - severity: low
    issue: ‘Sin falta abrirás tu mano’ suena algo forzado en español.
    rationale: Comunica énfasis, pero una forma como ‘de veras debes abrir tu mano’ o ‘de cierto abrirás’ sería más idiomática; no obstante, basta un ajuste menor para mejorar legibilidad sin perder intensidad.
  revised_spanish_text: 'Porque no dejará de haber pobres de en medio de la tierra; por eso te mando, diciendo: ‘Debes abrir bien tu mano a tu hermano[a], a tu afligido[b] y a tu pobre en tu tierra.’'
  revised_footnotes:
