revisions:
- from: Y la tierra de Judá será un terror para Egipto[a][b][c]; todo el que se la mencione temblará por causa del plan de Yahvé de los Ejércitos, que él está tramando contra ella.
  to: Y la tierra de Judá será un terror para Egipto[a][b][c]; todo aquel a quien se le mencione tendrá miedo por causa del plan de Yahvé de los Ejércitos, que él está planeando contra Egipto.
  rationale: Se corrige el referente del pronombre final para que el plan de Yahvé sea contra Egipto, tal como exige el hebreo y el audit trail inglés. También se ajusta יִפְחָד a «tendrá miedo» y se suaviza la frase distributiva para mejor legibilidad en español sin perder precisión.
