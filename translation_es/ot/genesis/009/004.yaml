translation:
  language: es
  text: Pero no comerán carne con su vida, es decir, su sangre.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: אַךְ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Sin embargo
  - No obstante
  - Solamente
  lexicon: HALOT
  rationale: אַךְ introduce una restricción o excepción respecto de la concesión anterior. En español, «Pero» comunica con naturalidad esa oposición restrictiva sin volver el texto áspero o demasiado literal. Se preserva la relación con el permiso previo, aunque el matiz de excepción también podría expresarse con «Solamente».
- source_word: בָּשָׂר
  english_pob_choice: flesh
  chosen_spanish: carne
  alternatives_spanish:
  - carne viva
  - carnes
  - cuerpo
  lexicon: HALOT
  rationale: «Carne» es el equivalente más directo y conserva la concreción legal del término hebreo. «Carnes» sonaría más culinario y pluralizado; «cuerpo» desplaza el sentido. No se usa «carne» en sentido moral, sino material/alimenticio.
- source_word: בְּנַפְשׁוֹ
  english_pob_choice: with its life
  chosen_spanish: con su vida
  alternatives_spanish:
  - en su vida
  - con su alma
  - con su soplo de vida
  lexicon: HALOT
  rationale: נֶפֶשׁ aquí designa la vida animada del animal, no «alma» en sentido teológico posterior. «Con su vida» conserva la relación asociativa/instrumental del hebreo y evita cargar el texto con una antropología ajena. «Soplo de vida» sería más interpretativo.
- source_word: דָמוֹ
  english_pob_choice: its blood
  chosen_spanish: su sangre
  alternatives_spanish:
  - su sangre vital
  - su sangre derramada
  lexicon: HALOT
  rationale: דָם se traduce de manera directa como «sangre». Mantener el término simple evita sobreexplicar y conserva la apposición con «vida» tal como la presenta el hebreo. «Sangre vital» sería interpretativo.
- source_word: בְּנַפְשׁוֹ דָמוֹ
  english_pob_choice: with its life, that is, its blood
  chosen_spanish: con su vida, es decir, con su sangre
  alternatives_spanish:
  - con su vida —su sangre—
  - con su vida, o sea, su sangre
  lexicon: HALOT
  rationale: El hebreo coloca «su vida» y «su sangre» en una relación appositiva concisa. En español, «es decir» hace explícita esa equivalencia sin perder claridad ni forzar una traducción demasiado literal. Se evita una paráfrasis como «sangre vital» para no diluir la tensión entre vida y sangre.
- source_word: לֹא תֹאכֵלוּ
  english_pob_choice: you shall not eat
  chosen_spanish: no comerán
  alternatives_spanish:
  - no comeréis
  - no deben comer
  - no han de comer
  lexicon: HALOT
  rationale: En español, la prohibición legal puede expresarse naturalmente con futuro prohibitivo en segunda persona plural («no comerán»), que transmite el tono normativo solemne del hebreo. No se usa un imperativo llano, para conservar el registro de mandato jurídico.
theological_decisions:
- issue: Relación entre vida y sangre
  english_pob_reading: 'Rendered with an appositional explanation: ''with its life, that is, its blood'''
  chosen_spanish_reading: «con su vida, es decir, con su sangre»
  alternative_spanish_readings:
  - «con su vida —su sangre—»
  - «con su sangre vital»
  rationale: La POB inglesa preserva la tensión textual entre vida y sangre en forma de apposición explícita. El español mantiene esa relación sin resolverla en una sola noción más abstracta. Así se evita borrar la equivalencia retórica que el texto establece entre ambos términos.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather than resolve it'
- issue: Sentido de נֶפֶשׁ en este contexto
  english_pob_reading: '''life'' rather than ''soul'''
  chosen_spanish_reading: «vida» en lugar de «alma»
  alternative_spanish_readings:
  - «alma»
  - «ser viviente»
  rationale: En este pasaje la prohibición se fundamenta en la vida del animal contenida en la sangre. «Vida» corresponde mejor al hebreo y evita introducir una noción de «alma» más propia de desarrollos posteriores o de otros contextos. La traducción mantiene la base biológica/ritual del mandato.
  doctrine_reference: Original-language primacy over translation tradition
translation_notes:
  revision_awareness: La versión inglesa más reciente alterna entre una explicación appositiva más explícita y una redacción con guion; la propuesta española sigue la lectura explicativa ya estabilizada en la revisión posterior, pero la expresa con una formulación natural en español («es decir»), coherente con el paralelismo hebreo y con la decisión auditada de mantener vida/sangre en relación appositiva.
  spanish_consistency_notes:
  - Se conserva el término concreto «carne» para בָּשָׂר, en consonancia con el valor léxico del hebreo.
  - «Vida» se usa para נֶפֶשׁ, no «alma», para no importar categorías doctrinales ajenas al contexto inmediato.
  - La relación entre «vida» y «sangre» queda explícita sin añadir contenido interpretativo adicional.
  - El registro mantiene solemnidad normativa adecuada para una ley alimentaria en contexto veterotestamentario.
