translation:
  language: es
  text: Y derramaron sangre inocente alrededor del santuario, y profanaron el santuario.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐξέχεαν
  english_pob_choice: poured out
  chosen_spanish: derramaron
  alternatives_spanish:
  - vertieron
  - esparcieron
  lexicon: BDAG
  rationale: El griego literalmente significa 'verter/derramar'. En un contexto de sangre, 'derramaron' conserva la imagen física y suena natural en español bíblico sin perder la fuerza del verbo.
- source_word: αἷμα ἀθῷον
  english_pob_choice: innocent blood
  chosen_spanish: sangre inocente
  alternatives_spanish:
  - sangre sin culpa
  - sangre inocente derramada
  lexicon: BDAG
  rationale: La expresión bíblica establecida en español es 'sangre inocente'. Mantiene el sentido de sangre derramada injustamente y comunica bien la dimensión moral del texto.
- source_word: κύκλῳ
  english_pob_choice: around
  chosen_spanish: alrededor de
  alternatives_spanish:
  - en torno a
  - rodeando
  lexicon: BDAG
  rationale: La preposición/adverbio indica una ubicación en torno al santuario. 'Alrededor de' es claro, natural y fiel al valor locativo del término.
- source_word: τοῦ ἁγιάσματος
  english_pob_choice: the sanctuary
  chosen_spanish: el santuario
  alternatives_spanish:
  - el lugar santo
  - el recinto sagrado del templo
  lexicon: BDAG
  rationale: Aquí ἁγίασμα designa el espacio sagrado del templo, no la cualidad abstracta de santidad. 'Santuario' reproduce bien el valor cultual y mantiene la repetición del término en la frase.
- source_word: ἐμόλυναν
  english_pob_choice: defiled
  chosen_spanish: profanaron
  alternatives_spanish:
  - contaminaron
  - hicieron impuro
  lexicon: BDAG
  rationale: El verbo expresa contaminación ritual y sacrilegio. En español, 'profanaron' transmite mejor la ofensa cultual contra un lugar santo que 'contaminaron', y preserva la gravedad teológica del acto.
- source_word: τὸ ἁγίασμα
  english_pob_choice: the sanctuary
  chosen_spanish: el santuario
  alternatives_spanish:
  - el lugar santo
  - el recinto sagrado
  lexicon: BDAG
  rationale: Se conserva el mismo equivalente que antes para reflejar la repetición enfática del griego y la reiteración del lugar sagrado violado.
theological_decisions:
- issue: Sangre inocente derramada como sacrilegio
  english_pob_reading: They poured out innocent blood around the sanctuary, and they defiled the sanctuary.
  chosen_spanish_reading: Derramaron sangre inocente alrededor del santuario, y profanaron el santuario.
  alternative_spanish_readings:
  - Derramaron sangre inocente en torno al santuario, y contaminaron el santuario.
  - Vertieron sangre inocente alrededor del santuario, y mancharon el santuario.
  rationale: El texto combina violencia injusta con violación cultual. 'Profanaron' mantiene el peso religioso del verbo griego y evita reducir el acto a una simple suciedad física; la repetición de 'santuario' preserva el énfasis en el lugar santo agredido.
  doctrine_reference: DOCTRINE.md §Translation philosophy 5 (consistency of key terms, or documented exception)
translation_notes:
  revision_awareness: The English POB audit trail shows high agreement and no applied revisions; the Spanish draft therefore follows the source closely while preserving the Greek repetition and the cultic force of ἁγίασμα/ἐμόλυναν.
  spanish_consistency_notes:
  - Se mantiene 'santuario' para ambas ocurrencias de ἁγίασμα, siguiendo la repetición del griego y la decisión inglesa.
  - Se evita un calco rígido de 'poured out' con una forma española natural ('derramaron') que conserva la imagen de sangre.
  - '''Profanaron'' se eligió por su fuerza cultual, coherente con el contexto del templo y con la noción de contaminación ritual.'
