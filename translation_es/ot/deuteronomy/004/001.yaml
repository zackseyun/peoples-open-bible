revisions:
- from: Y ahora[a], Israel, escucha los estatutos y los juicios que yo te enseño a hacer, para que vivas y entres y tomes posesión de la tierra que Yahvé, el Dios de tus padres[c][b], te da.
  to: Y ahora[a], Israel, escucha los estatutos y los juicios[b] que yo les enseño a hacer, para que vivan y entren y tomen posesión de la tierra que Yahvé, el Dios de sus padres[c], les da.
  rationale: Se corrigió la concordancia al plural para reflejar fielmente las formas hebreas de segunda persona plural, manteniendo el vocativo singular 'Israel' como colectivo. Se reparó la nota [a] para que ofrezca una alternativa real, y se añadió en [b] la alternativa léxica documentada para 'estatutos' y 'juicios'. Se mantuvo 'Yahvé' conforme a la política del proyecto.
