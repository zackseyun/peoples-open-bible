  to: Y todos los que habitaban la región montañosa se unieron a él[a], y todos los que habitaban junto al Éufrates, al Tigris y al Hidaspes, y todos los que habitaban en la llanura de Arioc[b], rey de los elimeos, se unieron a él. Y muchas naciones se reunieron para combatir[c] con los hijos de Cheleúl.
