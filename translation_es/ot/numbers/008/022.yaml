revisions:
- from: Y después de eso, los levitas vinieron a hacer su servicio en la tienda de reunión delante de Aarón y delante de sus hijos. Tal como Yahvé había mandado a Moisés acerca de los levitas, así hicieron a ellos.
  to: Y después de eso, los levitas vinieron a hacer su servicio en la tienda de reunión delante de Aarón y delante de sus hijos. Tal como Yahvé había mandado a Moisés acerca de los levitas, así hicieron con ellos[a].
  rationale: Se conserva casi todo el borrador porque refleja bien el hebreo y la terminología del proyecto. Solo se corrige la cláusula final a 'así hicieron con ellos' para lograr un español natural y fiel al sentido probable, y se añade una nota que preserva la concisión y ambigüedad del hebreo documentadas en la auditoría inglesa.
