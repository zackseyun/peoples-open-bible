  text: וְ/הִשְׁמַדְתִּ֞י אֶת בָּמֹֽתֵי/כֶ֗ם וְ/הִכְרַתִּי֙ אֶת חַמָּ֣נֵי/כֶ֔ם וְ/נָֽתַתִּי֙ אֶת פִּגְרֵי/כֶ֔ם עַל פִּגְרֵ֖י גִּלּוּלֵי/כֶ֑ם וְ/גָעֲלָ֥ה נַפְשִׁ֖/י אֶתְ/כֶֽם־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/leviticus/026/030.yaml
  text: And I will destroy your high places[a], and cut down your incense altars, and place your carcasses on the carcasses of your idols[b], and my soul will abhor you.
  footnotes:
  - marker: a
    text: Or 'your sun pillars.' The Hebrew term refers to cultic objects associated with illicit worship; the exact form is debated.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew repeats 'corpses' for both the people and their idols, emphasizing the lifelessness and disgrace of the idols.
    reason: lexical_alternative
