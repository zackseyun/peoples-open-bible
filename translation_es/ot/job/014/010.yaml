translation:
  language: es
  text: Pero un hombre muere y queda abatido[a]; un ser humano expira[c][b], ¿y dónde está?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Otras posibilidades para חלש: ''se debilita'' o ''queda débil''.'
    reason: lexical_alternative
  - marker: b
    text: 'Otra posibilidad para גוע: ''fenece'' o ''exhala el último aliento''.'
    reason: lexical_alternative
  - marker: c
    text: El hebreo usa tanto גבר ('hombre') como אדם ('ser humano/hombre') en paralelo, subrayando la mortalidad de la humanidad.
    reason: cultural_note
lexical_decisions:
- source_word: גֶּבֶר
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - un varón
  - un hombre fuerte
  - un guerrero
  lexicon: HALOT
  rationale: גבר suele designar a un hombre, a menudo con matiz de vigor o capacidad. Aquí, 'un hombre' conserva el singular masculino y el paralelismo poético sin introducir una lectura más específica como 'guerrero' o 'hombre fuerte' que el contexto no exige.
- source_word: יָמוּת
  english_pob_choice: dies
  chosen_spanish: muere
  alternatives_spanish:
  - morirá
  - va a morir
  - está muriendo
  lexicon: HALOT
  rationale: El imperfecto hebreo expresa aquí una realidad general en discurso poético. El presente 'muere' comunica bien el valor gnómico, como en la lectura inglesa 'dies'.
- source_word: וַיֶּחֱלָשׁ
  english_pob_choice: is laid low
  chosen_spanish: queda abatido
  alternatives_spanish:
  - se debilita
  - queda débil
  - es derribado
  lexicon: HALOT
  rationale: חלש señala volverse débil o sin fuerzas. 'Queda abatido' transmite el resultado de ese debilitamiento en un registro natural en español, sin reducirlo a una debilidad meramente pasajera.
- source_word: וַיִּגְוַע
  english_pob_choice: expires
  chosen_spanish: expira
  alternatives_spanish:
  - exhala el último aliento
  - fenece
  - muere
  lexicon: HALOT
  rationale: גוע suele expresar el acto de expirar o dar el último aliento. 'Expira' mantiene la formalidad y la concisión, y evita repetir simplemente 'muere'.
- source_word: אָדָם
  english_pob_choice: a human being
  chosen_spanish: un ser humano
  alternatives_spanish:
  - un hombre
  - la humanidad
  - una persona
  lexicon: HALOT
  rationale: אָדָם aquí funciona de manera genérica y paralela a גבר. 'Un ser humano' preserva el sentido universal sin perder la distinción poética entre los dos términos hebreos.
- source_word: וְאַיּוֹ
  english_pob_choice: and where is he?
  chosen_spanish: ¿y dónde está él?
  alternatives_spanish:
  - ¿y dónde queda?
  - ¿y dónde se encuentra?
  - ¿y dónde está entonces?
  lexicon: HALOT
  rationale: La pregunta final interroga por la desaparición del sujeto tras la muerte. '¿Y dónde está él?' es directo y fiel; se conserva el pronombre masculino singular por el enlace con los sustantivos previos.
translation_notes:
  revision_awareness: La versión inglesa más reciente cambió 'breathes his last' por 'expires' para גוע; la presente redacción española sigue esa decisión con 'expira', manteniendo además el paralelismo poético y la distinción entre חלש y גוע. Se evita traducir automáticamente 'y' como 'pero' en la primera cláusula, aunque el contraste implícito del hebreo puede sentirse en el flujo poético.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma predeterminada solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - 'Se conserva el paralelismo entre גבר y אדם con dos expresiones distintas: ''un hombre'' y ''un ser humano''.'
  - '''Expira'' se usa en sentido de morir, no de ''caducar'' en sentido moderno.'
