translation:
  language: es
  text: 'Han sanado la herida de mi pueblo a la ligera[a], diciendo: «Paz, paz», cuando no hay paz.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «superficialmente».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְרַפְּאוּ
  english_pob_choice: have healed
  chosen_spanish: han sanado
  alternatives_spanish:
  - han curado
  - han tratado
  lexicon: HALOT
  rationale: 'רפא suele significar ‘sanar/curar’. En este reproche profético conviene mantener el verbo médico, pero en perfecto compuesto español suena natural y conserva la ironía: se presenta como una sanación que en realidad no resuelve la condición del pueblo.'
- source_word: שֶׁבֶר
  english_pob_choice: wound
  chosen_spanish: herida
  alternatives_spanish:
  - quebranto
  - fractura
  - quiebre
  lexicon: HALOT
  rationale: שבר puede denotar rotura, quebranto o lesión. ‘Herida’ funciona bien con la metáfora de curación y expresa daño grave sin forzar un tecnicismo.
- source_word: עַמִּי
  english_pob_choice: my people
  chosen_spanish: mi pueblo
  alternatives_spanish:
  - mi gente
  lexicon: HALOT
  rationale: La construcción posesiva se conserva de forma directa. ‘Mi pueblo’ mantiene con claridad la voz profética y la relación de pacto implícita.
- source_word: עַל נְקַלָּה
  english_pob_choice: lightly
  chosen_spanish: a la ligera
  alternatives_spanish:
  - superficialmente
  - como si fuera algo trivial
  - por poco
  lexicon: HALOT
  rationale: La expresión señala minimización de algo grave. ‘A la ligera’ es una equivalencia natural en español que conserva la censura moral y la idea de tratar el mal como algo insignificante.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - al decir
  - y dijeron
  lexicon: HALOT
  rationale: Introductor estándar de discurso directo; ‘diciendo’ mantiene la relación sintáctica sin añadir matices inexistentes.
- source_word: שָׁלוֹם שָׁלוֹם
  english_pob_choice: Peace, peace
  chosen_spanish: «Paz, paz»
  alternatives_spanish:
  - «Todo está bien, todo está bien»
  - «Paz»
  lexicon: HALOT
  rationale: Se preserva la repetición para mantener la insistencia y la falsa seguridad. ‘Paz’ traduce el término hebreo clave con su amplitud de bienestar y seguridad.
- source_word: וְאֵין שָׁלוֹם
  english_pob_choice: when there is no peace
  chosen_spanish: cuando no hay paz
  alternatives_spanish:
  - pero no hay paz
  - aunque no hay paz
  lexicon: HALOT
  rationale: La cláusula contrapone la proclamación falsa con la realidad. ‘Cuando no hay paz’ suena natural en español y conserva la oposición sin sobreinterpretar la conjunción.
theological_decisions:
- issue: Reproche profético contra la falsa tranquilidad
  english_pob_reading: The verse condemns leaders/prophets for minimizing the people's serious condition and proclaiming well-being that does not exist.
  chosen_spanish_reading: El versículo reprende a quienes minimizan la condición grave del pueblo y proclaman una paz que no existe.
  alternative_spanish_readings:
  - El versículo describe una curación real pero incompleta.
  - El versículo denuncia una atención superficial al problema del pueblo.
  rationale: 'La versión debe conservar la ironía y la acusación moral del texto: no se trata de una sanación efectiva, sino de una falsa declaración de bienestar. ‘A la ligera’ mantiene esa tensión sin suavizarla.'
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: La redacción sigue el cierre editorial más reciente del inglés POB, que prefirió ‘healed’ sobre ‘treated’ para reflejar mejor el verbo hebreo רפא, pero mantiene la evaluación irónica mediante ‘a la ligera’. En español, ‘han sanado’ conserva ese equilibrio entre fidelidad léxica y fluidez.
  spanish_consistency_notes:
  - Se evitó ‘SEÑOR’ porque aquí no aparece el tetragrámaton; el versículo expresa la voz profética con ‘mi pueblo’.
  - Se mantuvo ‘Paz, paz’ con repetición literal para preservar la insistencia y la falsa seguridad.
  - ‘A la ligera’ se usa como equivalente idiomático de la minimización moral del hebreo, no como una simple referencia al modo de actuar.
