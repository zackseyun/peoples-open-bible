  verdict: revise
  source_alignment_summary: 'El borrador capta correctamente la estructura básica del hebreo: la ira divina reposa sobre el salmista y Dios mismo lo aflige con la totalidad de sus ''breakers''. Sin embargo, no preserva del todo la decisión léxica principal del POB para מִשְׁבָּרֶיךָ, ya que pone ''olas'' en el texto principal donde la evidencia y el rastro auditado favorecen una forma más precisa equivalente a ''breakers/rompientes''.'
  spanish_quality_summary: El español es claro y natural, pero 'se ha posado' puede sonar demasiado ligero para la imagen de la ira divina que recae sobre el salmista. 'Ha reposado' o 'ha descansado sobre mí' mantiene mejor la metáfora espacial sin trivializarla. También conviene evitar una nota innecesaria sobre 'indignación' si el texto principal se ajusta mejor a 'ira'.
  glossary_alignment: No hay términos del glosario mayor en conflicto salvo la fidelidad a la decisión lexical del POB sobre מִשְׁבָּרֶיךָ. 'Me has afligido' está bien. 'Selah' debe mantenerse transliterado. Se recomienda 'ira' para חֲמָה por mayor cercanía al inglés auditado 'wrath' y mejor registro bíblico en español.
  issues:
  - severity: medium
    issue: '''tus olas'' en el texto principal suaviza la precisión de מִשְׁבָּרֶיךָ'
    rationale: El POB inglés eligió deliberadamente 'your breakers' y reservó 'waves/billows' para nota. En español, 'rompientes' preserva mejor la imagen de olas que se quiebran; 'olas' debe quedar como alternativa en nota.
  - severity: low
    issue: '''se ha posado'' suena demasiado leve para סָמְכָה con ''tu ira'' como sujeto'
    rationale: Aunque comunica reposo sobre alguien, en español 'posarse' puede evocar un movimiento ligero. 'Ha reposado sobre mí' conserva mejor la fuerza de una carga divina asentada sobre el hablante.
  - severity: low
    issue: La nota sobre 'indignación' no es necesaria si se usa un término principal más directo
    rationale: El inglés no nota alternativas para 'wrath'; la nota española sobre 'indignación' añade complejidad no exigida por la evidencia. 'Ira' es más directo, bíblico y fiel al registro del pasaje.
  revised_spanish_text: Tu ira ha reposado sobre mí, y con todos tus rompientes[a] me has afligido. Selah
  revised_footnotes:
