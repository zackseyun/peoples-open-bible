translation:
  language: es
  text: Entonces Ester la reina, hija de Abihail, y Mardoqueo el judío escribieron con plena autoridad[a] para confirmar esta segunda carta de Purim.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con toda autoridad» o «con toda la fuerza». La expresión hebrea subraya el carácter oficial y enfático de la carta.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּכְתֹּב
  english_pob_choice: Then ... wrote
  chosen_spanish: Entonces ... escribieron
  alternatives_spanish:
  - Y ... escribieron
  - Así que ... escribieron
  lexicon: HALOT
  rationale: El waw consecutivo avanza la narración; «Entonces» mantiene el progreso narrativo en español sin perder el valor secuencial del verbo.
- source_word: אֶסְתֵּר הַמַּלְכָּה
  english_pob_choice: Esther the queen
  chosen_spanish: Ester la reina
  alternatives_spanish:
  - Reina Ester
  - Ester, la reina
  lexicon: HALOT
  rationale: La aposición hebrea se conserva de forma directa. «Ester la reina» refleja la identificación formal sin reorganizar el título de manera innecesaria.
- source_word: בַת אֲבִיחַיִל
  english_pob_choice: daughter of Abihail
  chosen_spanish: hija de Abihail
  alternatives_spanish:
  - la hija de Abihail
  lexicon: HALOT
  rationale: Es una expresión genealógica simple; se traduce de manera directa y sobria, como en el hebreo.
- source_word: וּמָרְדֳּכַי הַיְּהוּדִי
  english_pob_choice: Mordecai the Jew
  chosen_spanish: Mardoqueo el judío
  alternatives_spanish:
  - Mardoqueo el judeo
  - Mardoqueo el de Judá
  lexicon: HALOT
  rationale: Se conserva el designador étnico convencional en el contexto de Ester. «Judío» es la equivalencia natural y establecida; «judeo» suena artificial en este contexto.
- source_word: אֶת כָּל תֹּקֶף
  english_pob_choice: with full authority
  chosen_spanish: con plena autoridad
  alternatives_spanish:
  - con toda autoridad
  - con pleno poder
  - con toda la fuerza
  lexicon: HALOT
  rationale: תֹּקֶף expresa fuerza, vigor o poder de autoridad. «Plena autoridad» comunica mejor la fuerza oficial del decreto en español, como en el análisis inglés.
- source_word: לְקַיֵּם
  english_pob_choice: to confirm
  chosen_spanish: para confirmar
  alternatives_spanish:
  - para establecer
  - para sostener
  - para ratificar
  lexicon: HALOT
  rationale: El infinitivo indica finalidad. «Confirmar» sigue el sentido del texto fuente y del rastro auditado en inglés para una carta ya instituida.
- source_word: אֵת אִגֶּרֶת הַפּוּרִים הַזֹּאת הַשֵּׁנִית
  english_pob_choice: this second letter of Purim
  chosen_spanish: esta segunda carta de Purim
  alternatives_spanish:
  - esta segunda carta sobre Purim
  - esta carta de Purim, la segunda
  - esta segunda carta del Purim
  lexicon: HALOT
  rationale: La construcción nominal se vierte de forma formal como «carta de Purim», siguiendo la revisión inglesa que prefirió «of Purim» frente a una paráfrasis más libre. «Esta segunda» preserva la deixis y el orden sobrio del hebreo.
theological_decisions:
- issue: Traducción del etnónimo/identidad de Mardoqueo
  english_pob_reading: '''the Jew'' is the conventional and contextually appropriate rendering in Esther, where יהודי functions as an ethnic designation within the Persian setting.'
  chosen_spanish_reading: «el judío»
  alternative_spanish_readings:
  - «el judeano»
  - «el de Judá»
  rationale: No hay razón textual para desplazar el valor étnico convencional del término en Ester. «Judío» es claro, eclesialmente inteligible y fiel al uso contextual del libro.
  doctrine_reference: Uso contextual de designaciones étnicas en traducción bíblica; cf. Ester 2–9
- issue: Fuerza de תֹּקֶף en la fórmula de autorización
  english_pob_reading: '''with full authority'' best conveys official force rather than physical strength.'
  chosen_spanish_reading: «con plena autoridad»
  alternative_spanish_readings:
  - «con toda autoridad»
  - «con pleno poder»
  - «con toda la fuerza»
  rationale: El contexto es administrativo y epistolar, no físico. «Plena autoridad» conserva la tensión entre fuerza y autoridad oficial sin convertirla en mera energía o violencia.
  doctrine_reference: Principios de equivalencia semántica en lenguaje jurídico-administrativo bíblico
- issue: Relación genitiva de «carta de Purim»
  english_pob_reading: The construct with הַפּוּרִים is best represented in readable English as 'letter of Purim.'
  chosen_spanish_reading: «carta de Purim»
  alternative_spanish_readings:
  - «carta sobre Purim»
  - «carta del Purim»
  rationale: La frase española más natural y formal es «de Purim», que mantiene el vínculo nominal sin añadir explicación interpretativa. Se evita «sobre» porque debilita la relación constructa y suena más descriptivo que titular.
  doctrine_reference: Respeto del vínculo constructo hebreo en traducción
translation_notes:
  revision_awareness: La revisión inglesa reciente ajustó «about Purim» a «of Purim» para reflejar más de cerca la construcción nominal; el español sigue esa revisión con «de Purim». También se mantiene la decisión auditada de leer תֹּקֶף como fuerza/autoridad oficial, no como fuerza física.
  spanish_consistency_notes:
  - Se conservó «Ester» y «Mardoqueo» como formas bíblicas estándar en español, en coherencia con un registro eclesial legible.
  - «Judío» se mantuvo por su valor contextual y por consistencia con el uso bíblico del libro de Ester.
  - La nota al pie se ancla en «autoridad» porque la alternativa española afecta directamente la interpretación de תֹּקֶף.
  - Se evitó la paráfrasis «sobre Purim» para no diluir la relación nominal que la revisión inglesa quiso preservar.
