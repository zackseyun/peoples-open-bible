revisions:
- from: ¿Quién entre ustedes teme a Yahvé[a], escuchando la voz de su siervo? El que anda en tinieblas y no tiene resplandor, confíe en el nombre de Yahvé y apóyese en su Dios.
  to: ¿Quién entre ustedes teme a Yahvé[a] y escucha la voz de su siervo? El que anda en tinieblas y no tiene luz, confíe en el nombre de Yahvé y apóyese en su Dios.
  rationale: Se ajusta la sintaxis de «escuchando» a «y escucha» para lograr un español más natural y claro, manteniendo la amplitud semántica de שֹׁמֵעַ y conservando la nota con las alternativas más fuertes. Se cambia «resplandor» por «luz» para reflejar mejor וְאֵין נֹגַהּ לוֹ en español idiomático y en línea con el sentido experiencial del verso. No se requieren cambios doctrinales ni terminológicos mayores.
