translation:
  language: es
  text: 'Pero él se negó y dijo a la esposa de su amo: «Mira, mi amo no se preocupa de lo que hay en la casa[a], y todo lo que tiene lo ha puesto en mi mano[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «no sabe conmigo»; es un modismo que significa que no se ocupa personalmente de los asuntos de la casa.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «lo ha confiado a mí». Hebreo literalmente: «lo ha puesto en mi mano».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְמָאֵן
  english_pob_choice: But he refused
  chosen_spanish: Pero él rehusó
  alternatives_spanish:
  - Y él rehusó
  - Pero él se negó
  lexicon: HALOT
  rationale: El verbo expresa rechazo/negativa; «rehusó» conserva bien esa fuerza. «Pero» reproduce el valor adversativo del contexto, como reacción a la propuesta anterior.
- source_word: וַיֹּאמֶר אֶל אֵשֶׁת אֲדֹנָיו
  english_pob_choice: and said to his master's wife
  chosen_spanish: y dijo a la esposa de su amo
  alternatives_spanish:
  - y dijo a la mujer de su amo
  - y dijo a la esposa de su señor
  lexicon: HALOT
  rationale: «Esposa de su amo» preserva la relación doméstica del hebreo y evita elevar innecesariamente «señor», que en español puede sonar más teológico que social.
- source_word: הֵן
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira
  - He aquí
  - Fíjate
  lexicon: HALOT
  rationale: La partícula introduce atención a lo que sigue. «Mira» es natural en español moderno y conserva la función discursiva sin arcaísmo.
- source_word: אֲדֹנִי
  english_pob_choice: my master
  chosen_spanish: mi amo
  alternatives_spanish:
  - mi señor
  - mi patrón
  lexicon: HALOT
  rationale: En este contexto doméstico y de dependencia laboral, «amo» corresponde mejor al matiz relacional de אֲדֹנִי que «señor», y mantiene la fuerza social del original.
- source_word: לֹא יָדַע אִתִּי
  english_pob_choice: does not concern himself with
  chosen_spanish: no se preocupa de
  alternatives_spanish:
  - no sabe conmigo
  - no se ocupa de
  - no toma en cuenta conmigo
  lexicon: HALOT
  rationale: 'La expresión hebrea es idiomática: literalmente dice «no sabe conmigo». La POB inglesa la interpreta como falta de preocupación/atención administrativa. «No se preocupa de» comunica esa idea en español sin volverlo opaco.'
- source_word: מַה בַּבָּיִת
  english_pob_choice: what is in the house
  chosen_spanish: lo que hay en la casa
  alternatives_spanish:
  - lo que está en la casa
  - las cosas de la casa
  - lo que hay en la casa
  lexicon: HALOT
  rationale: La frase se refiere a los asuntos o bienes domésticos. «Lo que hay en la casa» sigue de cerca el hebreo y es natural en español.
- source_word: וְכֹל אֲשֶׁר יֶשׁ לוֹ
  english_pob_choice: everything that belongs to him
  chosen_spanish: y todo lo que tiene
  alternatives_spanish:
  - y todo lo que le pertenece
  - y todas sus posesiones
  lexicon: HALOT
  rationale: El sentido global es posesivo-total. «Todo lo que tiene» es claro y suficientemente cercano al hebreo sin sobrecargar el texto.
- source_word: נָתַן בְּיָדִי
  english_pob_choice: he has put into my hand
  chosen_spanish: lo ha puesto en mi mano
  alternatives_spanish:
  - lo ha confiado a mí
  - lo ha entregado en mi mano
  lexicon: HALOT
  rationale: La metáfora de la mano debe conservarse porque es semánticamente relevante en el hebreo y fue preservada en la POB inglesa. «Puesto en mi mano» refleja la idiomaticidad de encomienda/autoridad.
translation_notes:
  revision_awareness: La versión inglesa más reciente eliminó «with me around» por sobreinterpretar אִתִּי; por eso el español evita añadir una localización o presencia explícita, y conserva solo la idea de que el amo no se ocupa de los asuntos de la casa y ha confiado todo a José. También se retiene la metáfora de la mano, ya confirmada por la revisión inglesa.
  spanish_consistency_notes:
  - Se evita «SEÑOR» para אֲדֹנִי/אֲדֹנָיו porque aquí designa al dueño/capatáz doméstico, no al título divino.
  - Se mantiene «mano» en la frase final para respetar la metáfora hebrea y la decisión auditada de la POB inglesa.
  - «Mira» traduce la partícula הֵן con valor de llamada de atención, sin añadir contenido interpretativo.
