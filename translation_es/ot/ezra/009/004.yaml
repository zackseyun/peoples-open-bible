  - marker: b
    text: «Ofrenda de la tarde» traduce minḥah; a menudo designa específicamente la ofrenda vegetal, aunque aquí funciona como la hora señalada del servicio regular del templo.
    reason: cultural_note
  revision_rationale: Se conserva el texto propuesto porque es fiel y natural; solo se corrige la ubicación del marcador [b] para ajustarlo a la frase que la nota realmente explica.
