translation:
  language: es
  text: Él te hablará del bien de tu camino[a], y luego se pondrá frente a ti para observar tu ruina.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo es breve y algo incierto aquí. La frase final también puede entenderse como 'observar tu desgracia' o 'observar tu pobreza'. El paralelo griego de este versículo, en cambio, conserva una advertencia más desarrollada contra confiar en cierto tipo de personas para recibir consejo.
    reason: alternative_reading
lexical_decisions:
- source_word: ואמר לך
  english_pob_choice: He will speak to you
  chosen_spanish: Él te hablará
  alternatives_spanish:
  - Él te dirá
  - Él te hablará contigo
  lexicon: HALOT
  rationale: אמר es el verbo común 'decir/hablar'. En español, 'hablará' conserva el sentido de dirigirse a alguien de manera personal y suena natural en este contexto sapiencial.
- source_word: מטוב דרכך
  english_pob_choice: of the good of your way
  chosen_spanish: del bien de tu camino
  alternatives_spanish:
  - de lo bueno de tu camino
  - de la bondad de tu camino
  - acerca de lo bueno de tu camino
  lexicon: HALOT
  rationale: La construcción es breve y algo oscura. 'Del bien de tu camino' mantiene la idea de hablar favorablemente sobre el curso de vida o conducta de la persona, sin perder la metáfora de 'camino'.
- source_word: דרכך
  english_pob_choice: your way
  chosen_spanish: tu camino
  alternatives_spanish:
  - tu senda
  - tu curso
  lexicon: HALOT
  rationale: דרך conserva la metáfora de camino/senda tanto literal como figurada. 'Camino' es natural en español y preserva el lenguaje sapiencial.
- source_word: וקם מנגד
  english_pob_choice: and then stand opposite
  chosen_spanish: y luego se pondrá enfrente
  alternatives_spanish:
  - y luego se pondrá en contra
  - y luego quedará enfrente
  - y luego se alzará enfrente
  lexicon: HALOT
  rationale: מנגד expresa estar opuesto, enfrente o en posición contraria. 'Se pondrá enfrente' mantiene la imagen espacial sin imponer de forma explícita una hostilidad que el hebreo no formula directamente.
- source_word: להביט
  english_pob_choice: to watch
  chosen_spanish: para ver
  alternatives_spanish:
  - para mirar
  - para observar
  - para vigilar
  lexicon: HALOT
  rationale: הביט implica mirar atentamente. 'Para ver' es sencillo y fiel; en este contexto, unido a 'enfrente', comunica observación deliberada. 'Vigilar' sería más interpretativo.
- source_word: רישך
  english_pob_choice: your downfall
  chosen_spanish: tu ruina
  alternatives_spanish:
  - tu desgracia
  - tu miseria
  - tu desgracia final
  lexicon: HALOT
  rationale: La forma hebrea es difícil y probablemente alude a pobreza, necesidad o calamidad. El inglés optó por 'downfall' como síntesis contextual; en español, 'ruina' comunica bien el resultado negativo sin fijar indebidamente una lectura demasiado específica.
theological_decisions:
- issue: Prioridad del hebreo sobre el paralelo griego en una unidad con desajuste menor
  english_pob_reading: Translate primarily from the Hebrew, with the Greek used as a contextual control rather than as the main text.
  chosen_spanish_reading: Traducir principalmente del hebreo, manteniendo el control contextual del griego sin convertirlo en el texto base.
  alternative_spanish_readings:
  - Traducir íntegramente según la lista griega de personas poco confiables para el consejo
  - Fundir hebreo y griego en una paráfrasis armonizada
  rationale: La política del proyecto da primacía al hebreo conservado en Sirácides cuando existe. Aquí el hebreo es breve y algo incierto, mientras que el griego ofrece un desarrollo más amplio del mismo tema. Por eso el texto principal sigue al hebreo, pero se conserva la incertidumbre en nota.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives; use parallel Greek as actual input'
- issue: Marcado de la incertidumbre textual del final hebreo
  english_pob_reading: The final phrase may also be rendered 'to watch your misfortune' or 'to watch your poverty.'
  chosen_spanish_reading: La frase final puede entenderse como 'ver tu ruina', pero también como 'ver tu desgracia' o 'ver tu pobreza'.
  alternative_spanish_readings:
  - ver tu miseria
  - ver tu pobreza
  - ver tu desgracia
  rationale: El hebreo permite más de una matización y el paralelo griego confirma un trasfondo de advertencia sobre consejo poco fiable. La traducción principal debe ser legible, pero la nota debe preservar la tensión semántica.
  doctrine_reference: Sirach textual note / audit trail
- issue: Implied adversative force
  english_pob_reading: and then stand opposite
  chosen_spanish_reading: y luego se pondrá enfrente
  alternative_spanish_readings:
  - pero luego se pondrá enfrente
  - y después se pondrá en contra
  rationale: La revisión inglesa retiró 'but' para no añadir adversatividad no explícita. En español conviene evitar un 'pero' equivalente y mantener una coordinación simple con 'y luego'.
  doctrine_reference: applied_revisions 2026-04-23T15:45:21Z
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente del audit trail: se evitó introducir un contraste adversativo en la segunda cola y se conservó la coordinación simple. La redacción española mantiene la concisión del hebreo, pero la nota registra la mayor amplitud del paralelo griego y la incertidumbre del final hebreo.'
  spanish_consistency_notes:
  - Se usó 'camino' para דרך, siguiendo la metáfora bíblica habitual sin sustituirla por 'planes' o 'conducta'.
  - Se evitó 'SEÑOR' o equivalentes, porque este versículo no contiene el Tetragrámaton ni un caso de κύριος que requiera máscara nominal.
  - '''Ruina'' se eligió por legibilidad y por su amplitud semántica, sin cerrar la posibilidad de ''desgracia'' o ''pobreza''.'
  - 'La sintaxis española conserva la secuencia coordinada del hebreo: ''y luego...'' en lugar de una paráfrasis más interpretativa.'
