    rationale: El hebreo describe poner en pie/establecer las piedras memoriales. «Erigió» es posible, pero en español sugiere a menudo una construcción más monumental o solemne de lo que el contexto requiere. «Levantó» conserva mejor el valor léxico y suena más natural.
  - severity: low
