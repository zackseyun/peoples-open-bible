translation:
  language: es
  text: Yahvé destruirá por completo la lengua del mar de Egipto[a], y agitará su mano sobre el Río con el ardor de su viento[c]; lo golpeará en siete corrientes[b], y hará pasar con sandalias.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el golfo de Egipto»; literalmente, «la lengua del mar de Egipto».
    reason: lexical_alternative
  - marker: b
    text: Es decir, el Éufrates.
    reason: cross_reference
  - marker: c
    text: O «con el calor de su viento».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהֶחֱרִים
  english_pob_choice: will utterly destroy
  chosen_spanish: destruirá por completo
  alternatives_spanish:
  - consagrará a destrucción
  - destruirá totalmente
  - arrasará
  lexicon: HALOT
  rationale: El verbo hifil de חרם expresa eliminación completa o puesta bajo destrucción. En español, 'destruirá por completo' conserva la fuerza decisiva sin introducir una formulación más técnica que podría sonar litúrgica o interpretativa.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se conserva el nombre propio divino en la forma recomendada por el proyecto: ''Yahvé'', en lugar de una sustitución por título.'
- source_word: לְשׁוֹן יָם מִצְרַיִם
  english_pob_choice: the tongue of the sea of Egypt
  chosen_spanish: la lengua del mar de Egipto
  alternatives_spanish:
  - el golfo de Egipto
  - la lengua del mar egipcio
  lexicon: HALOT
  rationale: '''לְשׁוֹן'' significa literalmente ''lengua'' y puede designar una extensión de agua con forma de lengua. Se mantiene la imagen literal en el texto principal por transparencia.'
- source_word: וְהֵנִיף יָדוֹ
  english_pob_choice: he will wave his hand
  chosen_spanish: agitará su mano
  alternatives_spanish:
  - levantará su mano
  - blandirá su mano
  lexicon: HALOT
  rationale: '''Agitará'' reproduce con naturalidad el gesto de poder sin perder la imagen corporal del hebreo.'
- source_word: הַנָּהָר
  english_pob_choice: the River
  chosen_spanish: el Río
  alternatives_spanish:
  - el gran Río
  - el río
  lexicon: HALOT
  rationale: En uso profético, el artículo definido apunta al Éufrates. El español conserva la mayúscula reverente/identificadora 'Río' y la nota aclara la identificación.
- source_word: בַּעְיָם רוּחוֹ
  english_pob_choice: with the scorching of his wind
  chosen_spanish: con el ardor de su viento
  alternatives_spanish:
  - con el calor de su viento
  - con el fuego de su viento
  lexicon: HALOT
  rationale: '''בעים'' comunica calor ardiente o efecto abrasador; ''ardor'' mantiene esa intensidad en español. ''Viento'' preserva el sentido contextual de רוּחַ en relación con el secamiento de las aguas.'
- source_word: וְהִכָּהוּ
  english_pob_choice: he will strike it
  chosen_spanish: lo golpeará
  alternatives_spanish:
  - lo herirá
  - lo azotará
  lexicon: HALOT
  rationale: Se elige una forma directa y clara para נכה con sufijo, manteniendo el referente del Río.
- source_word: לְשִׁבְעָה נְחָלִים
  english_pob_choice: into seven streams
  chosen_spanish: en siete corrientes
  alternatives_spanish:
  - en siete canales
  - en siete arroyos
  lexicon: HALOT
  rationale: '''נְחָלִים'' puede referirse a cauces o corrientes. ''Corrientes'' funciona bien en español moderno y conserva la idea de múltiples brazos de agua.'
- source_word: וְהִדְרִיךְ
  english_pob_choice: make people walk through
  chosen_spanish: hará que se camine por allí
  alternatives_spanish:
  - hará pasar a la gente
  - permitirá caminar por allí
  lexicon: HALOT
  rationale: El hifil expresa causar el andar/pisar. Como el hebreo no explicita el objeto humano, el español lo vuelve impersonal para no añadir más de lo que dice el texto.
- source_word: בַּנְּעָלִים
  english_pob_choice: in sandals
  chosen_spanish: con sandalias
  alternatives_spanish:
  - calzados con sandalias
  - en sandalias
  lexicon: HALOT
  rationale: '''Con sandalias'' transmite con naturalidad el modo de pasar, manteniendo la imagen concreta de facilidad y seguridad.'
theological_decisions:
- issue: Naturaleza concreta de la imagen sobre las aguas de Egipto y del Río
  english_pob_reading: Render as a divine act over literal geographic waters using elevated prophetic imagery, without allegorizing in the translation.
  chosen_spanish_reading: Se mantiene la imagen concreta de aguas geográficas sometidas por Yahvé, sin convertirla en mera metáfora política en la traducción.
  alternative_spanish_readings:
  - Se refiere solo a obstáculos políticos
  - Es únicamente tipología del éxodo
  rationale: La poesía profética evoca liberación con imágenes de agua reales. La traducción debe preservar esa concreción y dejar la interpretación teológica al lector y al contexto.
  doctrine_reference: Translation philosophy §§1, 3
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios; este borrador sigue de cerca el texto auditado en inglés y conserva sus decisiones léxicas y de nota, ajustándolas a un español natural y reverente.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para el nombre divino, conforme al estándar del proyecto.
  - '''Río'' conserva la identificación profética implícita del hebreo y la nota explicita el Éufrates.'
  - '''Sandalias'' evita un calco extraño y mantiene la imagen concreta de paso fácil.'
  - Se preserva la tensión entre literalidad e interpretación en 'lengua del mar' mediante nota textual.
  - La impersonal 'hará que se camine' evita introducir un sujeto humano no explícito en el hebreo.
