translation:
  language: es
  text: 'Y Abimelec dijo[a]: «No sé quién hizo esta cosa. Tú tampoco me lo dijiste, y yo tampoco oí de eso hasta hoy».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Esta cosa» traduce de manera cercana el hebreo דָּבָר (davar), que también puede significar «asunto» o «hecho».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And ... said
  chosen_spanish: Y ... dijo
  alternatives_spanish:
  - Entonces ... dijo
  - Así que ... dijo
  lexicon: HALOT
  rationale: El waw consecutivo avanza la narración; en español, «Y ... dijo» conserva la progresión narrativa sin forzar una reconstrucción más interpretativa.
- source_word: אֲבִימֶלֶךְ
  english_pob_choice: Abimelech
  chosen_spanish: Abimelec
  alternatives_spanish:
  - Abimelek
  - Avimélec
  lexicon: convención onomástica bíblica
  rationale: Se mantiene el nombre propio en forma española de uso amplio y lectura natural, sin alterar la identificación del personaje.
- source_word: לֹא יָדַעְתִּי
  english_pob_choice: I do not know
  chosen_spanish: No sé
  alternatives_spanish:
  - No sabía
  - No he sabido
  lexicon: HALOT
  rationale: Aunque el hebreo es perfecto, el discurso directo en español suena más natural con presente de habla («No sé») y sigue bien el valor de ignorancia vigente al momento de hablar.
- source_word: מִי עָשָׂה
  english_pob_choice: who did
  chosen_spanish: quién hizo
  alternatives_spanish:
  - quién había hecho
  - quién realizó
  lexicon: HALOT
  rationale: El hebreo identifica al agente desconocido de un acto ya cometido; «quién hizo» reproduce de forma directa la cláusula sin introducir un pasado compuesto innecesario.
- source_word: אֶת הַדָּבָר הַזֶּה
  english_pob_choice: this thing
  chosen_spanish: esta cosa
  alternatives_spanish:
  - este asunto
  - este hecho
  lexicon: HALOT
  rationale: דָּבָר puede abarcar cosa, asunto o hecho. «Esta cosa» sigue de cerca el campo semántico básico y conserva la ambigüedad del hebreo; en nota se deja abierta la alternativa contextual.
- source_word: וְגַם אַתָּה
  english_pob_choice: You also
  chosen_spanish: Tú tampoco
  alternatives_spanish:
  - Y tú también
  - Además, tú
  lexicon: HALOT
  rationale: 'Aquí גם introduce la idea de inclusión en una negación: Abimelec también niega que Abraham le hubiera informado. «Tú tampoco» expresa mejor esa relación negativa que un simple «tú también».'
- source_word: לֹא הִגַּדְתָּ לִּי
  english_pob_choice: did not tell me
  chosen_spanish: me lo dijiste
  alternatives_spanish:
  - no me lo dijiste
  - no me informaste
  lexicon: HALOT
  rationale: Se usa el orden natural del español de diálogo, con objeto directo e indirecto explícitos. El pronombre «lo» recupera el referente implícito del hecho discutido.
- source_word: וְגַם אָנֹכִי
  english_pob_choice: and I myself
  chosen_spanish: y yo
  alternatives_spanish:
  - y yo tampoco
  - y yo mismo
  lexicon: HALOT
  rationale: אָנֹכִי puede ser enfático, pero en español el énfasis no exige un pronombre reforzado aquí. Se conserva la coordinación simple, ya reforzada por el contexto negativo.
- source_word: לֹא שָׁמַעְתִּי
  english_pob_choice: had not heard of it / did not hear of it
  chosen_spanish: no lo supe
  alternatives_spanish:
  - no lo oí
  - no había oído de ello
  lexicon: HALOT
  rationale: En este contexto, «oír» significa recibir noticia; sin embargo, «no lo supe» comunica mejor en español la falta de conocimiento informativo que el hebreo expresa con שׁמע, manteniendo la idea de no haber recibido noticia del hecho.
- source_word: בִּלְתִּי הַיּוֹם
  english_pob_choice: until today
  chosen_spanish: hasta hoy
  alternatives_spanish:
  - sino hasta hoy
  - antes de hoy
  lexicon: HALOT
  rationale: La construcción marca límite temporal excluyente. «Hasta hoy» es la equivalencia más natural y fiel en español.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión inglesa más reciente: se prefirió un tiempo verbal simple en la línea del hebreo narrativo, se evitó sobrerrepresentar el énfasis de אָנֹכִי y se tradujo גם con una relación negativa natural en español.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino en este proyecto, pero este versículo no lo contiene.
  - Se conservó un registro narrativo sobrio y directo, con discurso citado natural para español latinoamericano.
  - No se introdujo vocabulario eclesiástico no presente en el texto; se preservó la ambigüedad de דבר con nota.
  - El objeto implícito de «lo» recupera el referente del hecho discutido sin añadir paráfrasis innecesaria.
