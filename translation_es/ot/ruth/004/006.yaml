  yaml_path: translation/ot/ruth/004/006.yaml
  text: Then the redeemer said[a], “I cannot redeem it for myself, lest I ruin my own inheritance. Redeem for yourself my right of redemption[b], for I cannot redeem it.”
  footnotes:
  - marker: a
    text: Or “my redemption.” The Hebrew noun can be rendered more literally this way, but here it refers to the legal right/duty to redeem the property and marry Ruth within the family line.
    reason: lexical_alternative
  - marker: b
    text: “The redeemer” refers to the nearer family redeemer with prior claim before Boaz; traditional English often has “kinsman-redeemer.”
    reason: cultural_note
