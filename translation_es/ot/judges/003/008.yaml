revisions:
- from: Entonces la ira de Yahvé se encendió contra Israel[a], y los vendió en mano de Cusán-risatáin, rey de Aram-naharaim[b]. Y los hijos de Israel sirvieron a Cusán-risatáin ocho años.
  to: Entonces la ira de Yahvé se encendió[a] contra Israel, y los vendió en manos de Cusán-risataim, rey de Aram-naharaim[b]. Y los hijos de Israel[c] sirvieron a Cusán-risataim ocho años.
  rationale: La revisión corrige la ubicación de las notas para que correspondan a sus anclas reales, añade la nota faltante sobre «los hijos de Israel» conforme a la auditoría inglesa, mejora la naturalidad de בְּיַד con «en manos de», y estabiliza la transliteración del nombre propio como «Cusán-risataim».
  reviewer_model: gpt-5.4
