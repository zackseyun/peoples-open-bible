id: JOB.42.12
reference: Job 42:12
source:
  edition: WLC
  text: וַֽ/יהוָ֗ה בֵּרַ֛ךְ אֶת אַחֲרִ֥ית אִיּ֖וֹב מֵ/רֵאשִׁת֑/וֹ וַֽ/יְהִי ל֡/וֹ אַרְבָּעָה֩ עָשָׂ֨ר אֶ֜לֶף צֹ֗אן וְ/שֵׁ֤שֶׁת אֲלָפִים֙ גְּמַלִּ֔ים וְ/אֶֽלֶף צֶ֥מֶד בָּקָ֖ר וְ/אֶ֥לֶף אֲתוֹנֽוֹת־־־׃
translation:
  text: And Yahweh blessed the latter part of Job more than his beginning[a]. And he had fourteen thousand sheep, six thousand camels, a thousand yoke of oxen[b], and a thousand female donkeys.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''the latter end of Job more than his beginning.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'a thousand pairs of cattle' or 'a thousand teams of oxen.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: The divine name יְהוָה is rendered by the project default 'the LORD,' following the doctrinal guidance for this contested term and standard English Bible convention.
- source_word: בֵּרַךְ
  chosen: blessed
  alternatives:
  - prospered
  - favored
  lexicon: HALOT
  rationale: The verb ברך commonly means 'bless.' Here it refers to tangible divine favor expressed in restored prosperity, but 'blessed' preserves the theological source of the action without reducing it merely to material success.
- source_word: אַחֲרִית
  chosen: the latter part
  alternatives:
  - the latter days
  - the end
  - the latter end
  lexicon: HALOT
  rationale: אַחֲרִית can denote end, outcome, or latter time. 'The latter part' communicates Job's later period of life in natural English without implying only his final days or an abstract outcome.
- source_word: מֵרֵאשִׁתוֹ
  chosen: more than his beginning
  alternatives:
  - more than at first
  - than his former state
  lexicon: HALOT
  rationale: רֵאשִׁית with the preposition מִן marks comparison with Job's earlier condition. 'More than his beginning' is a close rendering that preserves the contrast between his earlier and later state.
- source_word: וַיְהִי לוֹ
  chosen: he had
  alternatives:
  - there came to be for him
  - there was to him
  lexicon: HALOT
  rationale: The Hebrew existential construction literally means 'and there was to him,' but idiomatic English is 'he had.' This is a standard optimal-equivalence adjustment.
- source_word: אַרְבָּעָה עָשָׂר אֶלֶף צֹאן
  chosen: fourteen thousand sheep
  lexicon: HALOT
  rationale: The numeral phrase is straightforward. צֹאן is a collective for small livestock, often sheep and goats, but in this context 'sheep' is the conventional and likely intended English rendering, matching the restoration list in Job 1:3.
- source_word: שֵׁשֶׁת אֲלָפִים גְּמַלִּים
  chosen: six thousand camels
  lexicon: HALOT
  rationale: Direct rendering of the numeral and noun phrase.
- source_word: אֶלֶף צֶמֶד בָּקָר
  chosen: a thousand yoke of oxen
  alternatives:
  - a thousand pairs of cattle
  - a thousand teams of oxen
  lexicon: HALOT
  rationale: צֶמֶד denotes a pair or yoke; with cattle it refers to yoked working animals. 'A thousand yoke of oxen' is the standard concise English expression and best reflects the agricultural sense.
- source_word: אֶלֶף אֲתוֹנוֹת
  chosen: a thousand female donkeys
  alternatives:
  - a thousand she-donkeys
  - a thousand donkeys
  lexicon: HALOT
  rationale: אֲתוֹנוֹת specifically denotes female donkeys, not donkeys generically. 'Female donkeys' is clear modern English and preserves the lexical specificity better than the more traditional 'she-donkeys'.
