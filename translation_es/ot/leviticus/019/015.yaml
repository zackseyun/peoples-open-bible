    reason: cultural_note
  revision_rationale: Se corrige el plural inicial para reflejar mejor el hebreo תַעֲשׂוּ, se reubica la nota [a] al lugar semánticamente correcto, y se mejora בְּצֶדֶק a 'con rectitud' para conservar mejor la tensión entre rectitud moral y justicia forense, manteniendo 'con justicia' como alternativa documentada.
