- from: Y Nobáh[a] fue y capturó Quenat[b] y sus aldeas, y la llamó Nobáh, con su propio nombre.
  to: 'Y Nobáh fue y capturó Quenat y sus aldeas[a], y le puso su propio nombre: Nobáh.'
  rationale: Se reubicó la nota al pie al término que realmente comenta ('sus aldeas'), se eliminó la nota innecesaria sobre la transliteración de Quenat, y se mejoró la cláusula final para reflejar con más naturalidad y precisión que la ciudad recibió el nombre del conquistador mismo.
