  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido básico del hebreo: abundancia de semilla llevada al campo, poca recolección, y causa en la langosta. Sin embargo, la elección de «grano» para זֶרַע desplaza el sentido léxico principal de «semilla/semilla para sembrar» hacia «grano» como producto, y el propio pie de nota inglés preserva explícitamente la imagen más literal de «seed».'
  spanish_quality_summary: El español es claro y natural, pero «mucho grano al campo» suena algo menos preciso en contexto de siembra que «mucha semilla al campo». La frase revisada mantiene buena legibilidad y preserva mejor la imagen agrícola del original. El resto de la redacción es fluida y adecuada para un registro bíblico moderno y digno.
  glossary_alignment: No hay términos teológicos del glosario mayor en juego. La principal cuestión léxica es זֶרַע, donde conviene alinearse más estrechamente con la decisión auditada «much seed» mediante «mucha semilla», dejando «Sembrarás mucho… cosecharás poco» como alternativa interpretativa en nota.
  issues:
