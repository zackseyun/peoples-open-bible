  rationale: 'Se conserva la estructura y las decisiones léxicas principales del borrador, pero se corrigen dos detalles: la nota al pie ahora concuerda con la forma verbal del texto y la frase final se normaliza a un español más natural sin perder la referencia explícita a «los dos».'
