translation:
  language: es
  text: El pueblo se mantuvo a cierta distancia[a], y Moisés se acercó a la espesa oscuridad donde estaba Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la nube oscura» o «la penumbra». El término hebreo puede denotar una oscuridad densa asociada con la manifestación de Dios.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲמֹד
  english_pob_choice: stood
  chosen_spanish: se quedó
  alternatives_spanish:
  - estuvo de pie
  - permaneció de pie
  lexicon: HALOT
  rationale: El hebreo narra aquí que el pueblo tomó su posición y quedó allí. En español, «se quedó» transmite de manera natural ese permanecer en el lugar sin añadir matices ajenos.
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - el pueblo de Israel
  lexicon: HALOT
  rationale: «El pueblo» reproduce el referente colectivo ya establecido en el contexto del Sinaí sin sobreespecificar con una expansión no presente en el hebreo.
- source_word: מֵרָחֹק
  english_pob_choice: at a distance
  chosen_spanish: a distancia
  alternatives_spanish:
  - lejos
  - desde lejos
  lexicon: HALOT
  rationale: La expresión española mantiene la idea espacial de separación de forma clara y natural, sin perder el valor relacional del hebreo.
- source_word: נִגַּשׁ
  english_pob_choice: approached
  chosen_spanish: se acercó
  alternatives_spanish:
  - se aproximó
  - se llegó
  lexicon: HALOT
  rationale: El verbo hebreo significa «acercarse» o «llegar cerca». «Se acercó» es la opción más directa y corriente en español.
- source_word: הָעֲרָפֶל
  english_pob_choice: the thick darkness
  chosen_spanish: la espesa oscuridad
  alternatives_spanish:
  - la densa oscuridad
  - la oscuridad espesa
  - la nube oscura
  lexicon: HALOT
  rationale: «עֲרָפֶל» denota una oscuridad densa asociada con la manifestación divina. «Espesa oscuridad» conserva la imagen y, como en el inglés POB, mantiene la tensión teofánica sin resolverla en una mera descripción meteorológica.
- source_word: הָאֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  - el Poderoso
  lexicon: HALOT
  rationale: Aquí אֱלֹהִים se refiere inequívocamente al Dios de Israel; en español, «Dios» es la forma más natural y fiel.
theological_decisions:
- issue: La oscuridad asociada a la presencia divina
  english_pob_reading: Render עֲרָפֶל concretely as 'thick darkness' without softening or overexplaining the imagery.
  chosen_spanish_reading: Traducir עֲרָפֶל como «espesa oscuridad», sin suavizar ni explicar de más la imagen.
  alternative_spanish_readings:
  - la nube oscura
  - la penumbra
  - la oscuridad donde Dios estaba presente
  rationale: 'La frase preserva la paradoja reverente del texto: Dios está allí, pero su manifestación queda envuelta en oscuridad densa. No se debe convertir en una simple referencia climática ni explicitar en exceso la presencia divina.'
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no hubo cambios aplicados y el control cruzado indicó alta concordancia con solo observaciones menores.'
  spanish_consistency_notes:
  - Se mantuvo «Dios» para אֱלֹהִים, conforme al contexto singular del verso.
  - Se eligió una solución verbal natural en español («se acercó», «se quedó») para preservar la acción narrativa sin calcos duros.
  - Se conservó la tensión teofánica de עֲרָפֶל con una expresión que sigue siendo readable en español litúrgico moderno.
