translation:
  language: es
  text: Habló tres mil proverbios[a], y sus cánticos fueron mil y cinco.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tres mil dichos» o «tres mil parábolas»; el hebreo מָשָׁל tiene un rango más amplio que el español «proverbio».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְדַבֵּר
  english_pob_choice: He spoke
  chosen_spanish: Habló
  alternatives_spanish:
  - Dijo
  - Pronunció
  lexicon: HALOT
  rationale: דבר en piel expresa hablar/decir. «Habló» es natural en español y conserva el hecho de la expresión verbal sin añadir la idea de composición escrita que el hebreo no marca explícitamente.
- source_word: שְׁלֹשֶׁת אֲלָפִים
  english_pob_choice: three thousand
  chosen_spanish: tres mil
  alternatives_spanish:
  - tres mil
  lexicon: HALOT
  rationale: La construcción numeral se vierte de forma directa y natural en español como «tres mil».
- source_word: מָשָׁל
  english_pob_choice: proverbs
  chosen_spanish: proverbios
  alternatives_spanish:
  - dichos
  - sentencias
  - parábolas
  lexicon: HALOT
  rationale: מָשָׁל tiene un campo semántico más amplio que el español «proverbio». En este contexto sapiencial, «proverbios» transmite bien la colección de dichos breves sin forzar el sentido de parábola.
- source_word: וַיְהִי
  english_pob_choice: were
  chosen_spanish: fueron
  alternatives_spanish:
  - llegaron a ser
  - resultaron ser
  lexicon: HALOT
  rationale: En una afirmación numérica, היה funciona como cópula/existencial. «Fueron» expresa naturalmente el total de manera idiomática en español.
- source_word: שִׁירוֹ
  english_pob_choice: his songs
  chosen_spanish: sus cánticos
  alternatives_spanish:
  - sus canciones
  - sus cantos
  lexicon: HALOT
  rationale: Aunque el hebreo es singular con sufijo, después del número funciona colectivamente. «Cánticos» conserva un registro más digno y bíblico que «canciones», sin perder el plural requerido por el recuento.
- source_word: חֲמִשָּׁה וָאָלֶף
  english_pob_choice: one thousand and five
  chosen_spanish: mil y cinco
  alternatives_spanish:
  - mil cinco
  - mil y cinco
  lexicon: HALOT
  rationale: El hebreo dice literalmente «cinco y mil», pero en español la forma natural y exacta es «mil y cinco», que conserva el número total sin calco artificial.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el sentido del texto hebreo y el audit trail inglés: mantiene la cuantificación exacta, conserva el matiz sapiencial de מָשָׁל y evita introducir una idea de composición escrita que no aparece en el verbo hebreo.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino por norma del proyecto, pero este versículo no contiene el Tetragrámaton.
  - Se mantiene «proverbios» como término principal por su adecuación al contexto sapiencial y por corresponder al tratamiento auditado en inglés.
  - «Cánticos» refleja שִׁירוֹ de manera digna y natural en español, con plural idiomático por el número expresado.
