base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/010/011.yaml
  text: 'Thus you shall say to them: “The gods that did not make the heavens and the earth will perish from the earth and from under the heavens.”[a][b]'
  footnotes:
  - marker: a
    text: Or “will be destroyed” or “will vanish.” The Aramaic verb can denote perishing or being wiped out.
    reason: lexical_alternative
  - marker: b
    text: “The gods” may refer to idols, supposed deities, or both; the text leaves the polemical reference broad.
    reason: alternative_reading
