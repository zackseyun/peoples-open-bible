  glossary_alignment: 'No hay conflictos con la terminología teológica del proyecto. Las decisiones relevantes son léxicas: conviene alinear ἀδάμαστος con la imagen ecuestre idiomática («sin domar»), σκληρός con «terco», ἀνειμένος con una expresión menos interpretativa que «sin disciplina» y προαλής con «obstinado» o similar para reflejar mejor el matiz de ‘headstrong’.'
