translation:
  text: It does not have double sight or hearing; for in everything that it does,
    or speaks, or sees, it knows that the Lord is looking on his soul. And it cleanses
    the mind, so as not to be condemned by men and by God. But the disposition of
    Beliar is twofold, and it has no singleness. Flee, therefore, evil-mindedness,
    my children, and love the good mind, which the law of God knows, so that you may
    rest in hope, because the good-minded man does not have a darkened eye. He shows
    mercy to all, even if they are sinners; even if they devise evil against him,
    by doing good he overcomes evil, being shielded by what is good. And he loves
    the righteous as his own soul. If anyone is glorified, he does not envy him; if
    anyone is enriched, he is not jealous; if anyone is valiant, he praises him; the
    virtuous man he commends; on the poor man he has mercy; with the weak he has compassion;
    to God he sings praise[d][c][b]. The one who has the grace of a good spirit he
    loves as his own soul.
