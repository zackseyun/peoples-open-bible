translation:
  language: es
  text: Todo el pueblo que quedó de los amorreos, los hititas, los ferezeos, los heveos y los jebuseos, que no eran de los hijos de Israel[a]—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que no eran de los israelitas». Hebreo: «que no eran de los hijos de Israel».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל הָעָם
  english_pob_choice: All the people
  chosen_spanish: Todo el pueblo
  alternatives_spanish:
  - Toda la gente
  - Todo el conjunto del pueblo
  lexicon: HALOT
  rationale: כָּל con un sustantivo definido expresa totalidad; en español, "Todo el pueblo" conserva el valor colectivo sin volverlo demasiado abstracto.
- source_word: הַנּוֹתָר
  english_pob_choice: who remained
  chosen_spanish: que quedó
  alternatives_spanish:
  - que permaneció
  - que fue dejado
  lexicon: HALOT
  rationale: El participio indica los que quedaron como remanente. "Que quedó" es natural en español y conserva la idea de resto/remanente.
- source_word: מִן
  english_pob_choice: of
  chosen_spanish: de entre
  alternatives_spanish:
  - de
  - entre
  lexicon: HALOT
  rationale: Aquí מִן marca procedencia dentro de un grupo listado; "de entre" hace visible la pertenencia residual sin sonar forzado.
- source_word: הָאֱמֹרִי
  english_pob_choice: the Amorites
  chosen_spanish: los amorreos
  alternatives_spanish:
  - los amoritas
  lexicon: HALOT
  rationale: '"Amorreos" es el etnónimo establecido en español bíblico y es inteligible en registro eclesial.'
- source_word: הַחִתִּי
  english_pob_choice: the Hittites
  chosen_spanish: los hititas
  alternatives_spanish:
  - los heteos
  lexicon: HALOT
  rationale: '"Hititas" es la forma estándar y reconocible en español moderno.'
- source_word: הַפְּרִזִּי
  english_pob_choice: the Perizzites
  chosen_spanish: los ferezeos
  alternatives_spanish:
  - los perizeos
  lexicon: HALOT
  rationale: '"Ferezeos" es una forma tradicional y ampliamente usada para este etnónimo; se prefiere por claridad bíblica.'
- source_word: הַחִוִּי
  english_pob_choice: the Hivites
  chosen_spanish: los heveos
  alternatives_spanish:
  - los hivitas
  lexicon: HALOT
  rationale: '"Heveos" es la transliteración asentada en español bíblico para este pueblo.'
- source_word: וְהַיְבוּסִי
  english_pob_choice: and the Jebusites
  chosen_spanish: y los jebuseos
  alternatives_spanish:
  - y los jebuseos
  lexicon: HALOT
  rationale: La conjunción se conserva y el etnónimo se vierte con la forma usual en español.
- source_word: אֲשֶׁר לֹא מִבְּנֵי יִשְׂרָאֵל
  english_pob_choice: who were not of the sons of Israel
  chosen_spanish: que no eran de entre los hijos de Israel
  alternatives_spanish:
  - que no eran de los hijos de Israel
  - que no pertenecían a los hijos de Israel
  lexicon: HALOT
  rationale: Se preserva la expresión masculina plural "hijos de Israel" por transparencia al hebreo, y "de entre" ayuda a reflejar la exclusión de un grupo de origen/pertenencia, no solo de localización.
- source_word: הֵמָּה
  english_pob_choice: —
  chosen_spanish: —
  alternatives_spanish:
  - ellos eran
  lexicon: HALOT
  rationale: El pronombre independiente añade énfasis resumptivo al cierre de la cláusula; en español, un guion final conserva el efecto abierto sin añadir palabras que el verso no trae.
theological_decisions:
- issue: La expresión masculina plural בְּנֵי יִשְׂרָאֵל
  english_pob_reading: sons of Israel
  chosen_spanish_reading: hijos de Israel
  alternative_spanish_readings:
  - israelitas
  - hijos de Israel
  rationale: Se mantiene la forma más transparente al hebreo y coherente con la política de precisión morfológica; "israelitas" sería más idiomático, pero borra la referencia explícita a "hijos" del original.
  doctrine_reference: DOCTRINE.md §Translation philosophy, punto 4
- issue: Relación de pertenencia excluyente expresada por לֹא מִבְּנֵי יִשְׂרָאֵל
  english_pob_reading: who were not of the sons of Israel
  chosen_spanish_reading: que no eran de entre los hijos de Israel
  alternative_spanish_readings:
  - que no eran de los hijos de Israel
  - que no pertenecían a los hijos de Israel
  rationale: '"De entre" comunica con naturalidad la separación de un remanente respecto del grupo de Israel, manteniendo la fuerza de origen/pertenencia del hebreo sin introducir una reinterpretación teológica.'
  doctrine_reference: DOCTRINE.md §Translation philosophy, punto 2
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente que prefirió "of" en lugar de "from" para acercarse más a la construcción hebrea; en español eso se reflejó con "de entre", que preserva la procedencia y la pertenencia sin repetir un calco rígido. También se mantuvo el cierre en guion largo porque el hebreo termina con una cláusula resumptiva abierta.
  spanish_consistency_notes:
  - Se mantuvo "Yahvé" como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - 'Se usaron etnónimos bíblicos consolidados en español: amorreos, hititas, ferezeos, heveos y jebuseos.'
  - Se preservó la equivalencia formal en "hijos de Israel" por transparencia al hebreo, con una nota que ofrece la alternativa idiomática "israelitas".
  - El final en guion largo refleja que la oración queda abierta en la sección siguiente, conforme al patrón del texto fuente.
