translation:
  language: es
  text: Y cuando coman del pan de la tierra[a], presentarán una contribución a Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “del pan de la tierra”. El hebreo dice literalmente “de la tierra”, con sentido de producto o alimento procedente de ella.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: And when
  chosen_spanish: Y cuando
  alternatives_spanish:
  - Y será que cuando
  - Y acontecerá que cuando
  lexicon: HALOT
  rationale: La forma verbal introduce una circunstancia temporal futura; en español, 'Y cuando' expresa de manera natural la relación temporal sin forzar una construcción impersonal.
- source_word: בַּאֲכָלְכֶם
  english_pob_choice: you eat
  chosen_spanish: coman
  alternatives_spanish:
  - cuando coman
  - al comer
  lexicon: HALOT
  rationale: El infinitivo constructo con prefijo temporal exige una cláusula temporal; 'coman' conserva el valor de segunda persona plural y suena natural en español bíblico moderno.
- source_word: מִלֶּחֶם
  english_pob_choice: from the bread
  chosen_spanish: del pan
  alternatives_spanish:
  - de parte del pan
  - de los alimentos
  lexicon: HALOT
  rationale: Se conserva el sentido partitivo de מן con 'del'. 'Pan' traduce literalmente el sustantivo y mantiene la imagen concreta del alimento producido.
- source_word: הָאָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  - la tierra prometida
  lexicon: HALOT
  rationale: '''La tierra'' corresponde al uso bíblico de הָאָרֶץ y es idiomática en español para el territorio productor de alimento.'
- source_word: תָּרִימוּ
  english_pob_choice: you shall present
  chosen_spanish: presentarán
  alternatives_spanish:
  - ofrecerán
  - elevarán
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente 'harán subir / alzarán', el contexto cultual permite 'presentarán' como equivalente natural, siguiendo la decisión auditada en inglés POB.
- source_word: תְרוּמָה
  english_pob_choice: a contribution
  chosen_spanish: una contribución
  alternatives_spanish:
  - una ofrenda
  - una porción apartada
  lexicon: HALOT
  rationale: '''Contribución'' reproduce el valor de algo apartado y entregado, evitando el tecnicismo tradicional ''ofrenda alzada'' y manteniendo la precisión semántica.'
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - para Yahvé
  - a YHWH
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se preserva el nombre divino como 'Yahvé', conforme al criterio del proyecto, y la preposición ל se expresa naturalmente con 'a' en el marco de una entrega dedicada.
theological_decisions:
- issue: Renderizado del Tetragrámaton יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa el nombre propio divino; la política del proyecto pide conservarlo explícitamente en la traducción española, no sustituirlo por un título enmascarado.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Lenguaje cultual de תָּרִימוּ תְרוּמָה
  english_pob_reading: you shall present a contribution
  chosen_spanish_reading: presentarán una contribución
  alternative_spanish_readings:
  - alzarán una contribución
  - ofrecerán una ofrenda
  rationale: La imagen literal de 'levantar' se conserva implícitamente en la acción cultual, pero en español 'presentar' comunica con claridad el acto ritual sin oscurecer la referencia técnica del hebreo.
  doctrine_reference: HALOT; audit trail lexical decision for תָּרִימוּ / תְרוּמָה
translation_notes:
  revision_awareness: Alineado con el audit trail inglés que pasó de 'lift up' a 'present' por naturalidad idiomática. La versión española sigue esa actualización y mantiene la equivalencia cultual sin calco innecesario. También incorpora el nombre divino Yahvé, conforme al criterio del proyecto, en lugar de un título enmascarado.
  spanish_consistency_notes:
  - Se conserva el paralelismo sencillo y directo del hebreo sin añadir elementos interpretativos.
  - '''Pan'' se mantiene como equivalente concreto de לחם, coherente con el sustantivo base y la referencia al producto de la tierra.'
  - No se usa 'SEÑOR' para יהוה, en conformidad con la terminología proyectual.
  - El marcador de nota [a] aparece exactamente en el texto y corresponde a una alternativa lexical real.
