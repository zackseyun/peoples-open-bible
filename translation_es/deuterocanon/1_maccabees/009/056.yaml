translation:
  language: es
  text: Y murió Alcimo en aquel tiempo después de un gran tormento[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con gran tormento». La frase griega μετὰ βασάνου μεγάλης puede entenderse como la circunstancia que acompañó su muerte o como el intenso sufrimiento que la precedió.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀπέθανεν
  english_pob_choice: died
  chosen_spanish: murió
  alternatives_spanish:
  - falleció
  - pereció
  lexicon: BDAG
  rationale: El aoristo narra la muerte como hecho consumado. En español, 'murió' es la equivalencia natural y directa, sin introducir matices devocionales ajenos al griego.
- source_word: ἐν τῷ καιρῷ ἐκείνῳ
  english_pob_choice: at that time
  chosen_spanish: en aquel tiempo
  alternatives_spanish:
  - entonces
  - en ese tiempo
  lexicon: BDAG
  rationale: La expresión marca simplemente el momento de la muerte. 'En aquel tiempo' conserva el valor temporal narrativo sin convertir καιρός en una categoría más técnica.
- source_word: μετὰ βασάνου μεγάλης
  english_pob_choice: after great torment
  chosen_spanish: con gran tormento
  alternatives_spanish:
  - después de gran tormento
  - con gran sufrimiento
  - en gran agonía
  lexicon: BDAG
  rationale: 'La preposición μετά con genitivo admite valor acompañante/circunstancial, como reflejó la nota inglesa. En español, ''con gran tormento'' mantiene abierta esa relación: puede entenderse como circunstancia acompañante de la muerte o como sufrimiento previo intenso, sin forzar una única lectura.'
- source_word: βασάνου
  english_pob_choice: torment
  chosen_spanish: tormento
  alternatives_spanish:
  - sufrimiento
  - agonía
  - dolor
  lexicon: BDAG
  rationale: '''Tormento'' conserva la fuerza intensa del término griego mejor que ''sufrimiento'' o ''dolor'', y corresponde al registro fuerte de la nota auditada.'
- source_word: Ἄλκιμος
  english_pob_choice: Alcimus
  chosen_spanish: Alcimo
  alternatives_spanish:
  - Alcimus
  lexicon: LSJ
  rationale: En español, el nombre se adapta de forma natural como 'Alcimo', manteniendo la identificación del personaje y la intelligibilidad para lectores hispanos.
translation_notes:
  revision_awareness: Se siguió el texto griego de Swete 1909 y se mantuvo la ambigüedad auditada por la POB inglesa en μετὰ βασάνου μεγάλης. No se introdujeron cambios textuales; la única variación relevante es la naturalización del nombre propio al español.
  spanish_consistency_notes:
  - Se prefirió 'murió' para el verbo principal por claridad narrativa y fidelidad al aoristo griego.
  - Se evitó 'Señor' u otra terminología teológica no presente en el versículo.
  - '''Con gran tormento'' conserva la ambigüedad semántica de μετὰ con genitivo, alineada con la nota inglesa.'
