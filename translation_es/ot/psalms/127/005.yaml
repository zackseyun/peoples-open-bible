translation:
  language: es
  text: Bienaventurado el hombre que llena su aljaba con ellos; no serán avergonzados[a] cuando hablen[b] con los enemigos en la puerta[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no serán avergonzados»; algunos entienden como sujeto al padre solo y traducen: «él no será avergonzado». Los verbos hebreos están en plural.'
    reason: alternative_reading
  - marker: b
    text: 'O: «cuando contiendan con enemigos» o «cuando aleguen su causa con enemigos». El verbo puede tener un matiz legal o adversarial en este contexto.'
    reason: lexical_alternative
  - marker: c
    text: La «puerta» era el lugar de juicio público y de asuntos cívicos en una ciudad antigua.
    reason: cultural_note
lexical_decisions:
- source_word: אַשְׁרֵי
  english_pob_choice: Blessed is
  chosen_spanish: Bienaventurado
  alternatives_spanish:
  - Feliz
  - Dichoso
  lexicon: HALOT
  rationale: La fórmula hebrea introduce una bienaventuranza sapiencial. «Bienaventurado» conserva el tono elevado y reverente mejor que «feliz», que suena más psicológico, o «dichoso», que puede sonar menos natural en español actual.
- source_word: הַגֶּבֶר
  english_pob_choice: the man
  chosen_spanish: el hombre
  alternatives_spanish:
  - la persona
  - el fuerte
  - el varón
  lexicon: HALOT
  rationale: גבר es masculino gramaticalmente y aquí designa al padre como figura representativa. «El hombre» mantiene esa forma sin neutralizar el género ni sobrecargar el matiz de fuerza.
- source_word: מִלֵּא
  english_pob_choice: fills
  chosen_spanish: llena
  alternatives_spanish:
  - ha llenado
  - llena plenamente
  lexicon: HALOT
  rationale: El verbo perfecto describe al hombre caracterizado por tener llena su aljaba. En español, el presente «llena» funciona de modo natural en esta bienaventuranza y expresa una verdad general.
- source_word: אַשְׁפָּתוֹ
  english_pob_choice: his quiver
  chosen_spanish: su aljaba
  alternatives_spanish:
  - su aljaba de flechas
  - su carcaj
  lexicon: HALOT
  rationale: El término hebreo refiere al recipiente para flechas. «Aljaba» es un equivalente claro y digno en español; «carcaj» también es posible, pero «aljaba» es más común y transparente para lectores bíblicos.
- source_word: מֵהֶם
  english_pob_choice: with them
  chosen_spanish: con ellos
  alternatives_spanish:
  - de ellos
  lexicon: HALOT
  rationale: En el contexto, la preposición indica el contenido con el que se llena la aljaba, retomando a los hijos comparados con flechas en el versículo anterior. «Con ellos» evita una traducción literal engañosa como «de ellos».
- source_word: לֹא יֵבֹשׁוּ
  english_pob_choice: they will not be put to shame
  chosen_spanish: no serán avergonzados
  alternatives_spanish:
  - no quedarán avergonzados
  - él no será avergonzado
  lexicon: HALOT
  rationale: בושׁ expresa vergüenza pública o deshonra. «No serán avergonzados» conserva bien ese sentido. Se mantiene el plural del hebreo, aunque algunos entienden al padre en singular.
- source_word: כִּי
  english_pob_choice: when
  chosen_spanish: cuando
  alternatives_spanish:
  - porque
  - pues
  lexicon: HALOT
  rationale: Aquí la partícula introduce la circunstancia temporal en la que no serán avergonzados. «Cuando» reproduce mejor el valor contextual que un causal «porque».
- source_word: יְדַבְּרוּ
  english_pob_choice: they speak
  chosen_spanish: hablen
  alternatives_spanish:
  - hablan
  - contiendan
  - aleguen su causa
  lexicon: HALOT
  rationale: El piel de דבר puede significar simplemente «hablar», pero en contexto judicial también puede implicar discutir o alegar una causa. «Hablen» mantiene la amplitud del verbo sin decidir de antemano por una lectura más estrecha.
- source_word: אֶת אוֹיְבִים
  english_pob_choice: with enemies
  chosen_spanish: con los enemigos
  alternatives_spanish:
  - contra los enemigos
  - ante los enemigos
  lexicon: HALOT
  rationale: La construcción con את tras דבר es idiomática y puede señalar a la parte con la que se trata o disputa. «Con los enemigos» conserva esa relación sin especificar excesivamente la dirección de la confrontación.
- source_word: בַּשָּׁעַר
  english_pob_choice: in the gate
  chosen_spanish: en la puerta
  alternatives_spanish:
  - en la puerta de la ciudad
  - en el tribunal
  lexicon: HALOT
  rationale: La «puerta» de la ciudad era el lugar de juicio público y de asuntos cívicos. «En la puerta» sigue de cerca el hebreo y deja que la nota explique su función cultural.
theological_decisions:
- issue: Lenguaje de género representativo
  english_pob_reading: the man
  chosen_spanish_reading: el hombre
  alternative_spanish_readings:
  - la persona
  - el que
  rationale: El hebreo usa una forma masculina y presenta al padre como cabeza representativa del hogar en esta bendición sapiencial. Se conserva la forma masculina para no neutralizar una señal del texto.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Pluralidad verbal en לֹא יֵבֹשׁוּ / יְדַבְּרוּ
  english_pob_reading: they will not be put to shame ... when they speak
  chosen_spanish_reading: no serán avergonzados ... cuando hablen
  alternative_spanish_readings:
  - no será avergonzado ... cuando hable
  rationale: El texto masorético tiene verbos plurales, lo cual puede referirse al padre junto con sus hijos, o al núcleo familiar colectivo. La traducción española preserva esa pluralidad en vez de resolverla artificialmente al singular.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: Matiz forense de la escena en la puerta
  english_pob_reading: when they speak with enemies in the gate
  chosen_spanish_reading: cuando hablen con los enemigos en la puerta
  alternative_spanish_readings:
  - cuando contiendan con los enemigos en la puerta
  - cuando aleguen su causa con los enemigos en la puerta
  rationale: La escena de la puerta sugiere un contexto público de juicio o disputa. Se mantiene «hablen» en el texto principal para no restringir el alcance, dejando abierta la lectura legal implícita.
  doctrine_reference: DOCTRINE.md §Translation philosophy 2
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios; el borrador sigue la línea ya aprobada con acuerdo alto entre revisores y conserva las tensiones del hebreo sobre pluralidad verbal y posible matiz forense.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, aunque este versículo no contiene el Tetragrámaton.
  - Se usa «Bienaventurado» para la fórmula sapiencial y «el hombre» para reflejar el sujeto masculino del hebreo.
  - Se preserva el plural del texto masorético en «no serán avergonzados» y «hablen».
  - «Aljaba» traduce אַשְׁפָּה de forma natural en español y coherente con la imagen de flechas del contexto inmediato.
  - «En la puerta» conserva la imagen bíblica y permite explicar en nota su función judicial/cívica.
