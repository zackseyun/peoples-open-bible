translation:
  language: es
  text: 'Entonces él dijo[a]: «Ve, pide prestados para ti[b] recipientes de afuera, de todos tus vecinos, recipientes vacíos. No recojas solo unos pocos[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «dijo». El verbo hebreo puede traducirse simplemente como «dijo»; esa es la lectura más directa aquí.
    reason: lexical_alternative
  - marker: b
    text: 'El pronombre expresa el beneficio o involucramiento personal de la acción: «para ti» o «para ti misma».'
    reason: lexical_alternative
  - marker: c
    text: Literalmente, «no hagas pocos» o «no disminuyas». El sentido en contexto es no reunir solo una pequeña cantidad de recipientes.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְכִי
  english_pob_choice: Go
  chosen_spanish: Ve
  alternatives_spanish:
  - Anda
  - Ve allá
  lexicon: HALOT
  rationale: Es el imperativo femenino singular de הלך dirigido a la mujer; «ve» es natural, breve y fiel al tono de instrucción inmediata.
- source_word: שַׁאֲלִי
  english_pob_choice: borrow
  chosen_spanish: pide prestados
  alternatives_spanish:
  - pide
  - solicita prestados
  - toma prestados
  lexicon: HALOT
  rationale: El verbo שאל puede significar «pedir» o «solicitar», pero el contexto de obtener recipientes temporalmente de los vecinos favorece «pide prestados», que expresa bien la idea sin imponer un término técnico ajeno.
- source_word: כֵּלִים
  english_pob_choice: vessels
  chosen_spanish: vasos
  alternatives_spanish:
  - vasijas
  - recipientes
  - vasos
  lexicon: HALOT
  rationale: כֵּלִים es amplio, pero en este contexto son objetos que recibirán aceite. «Vasos» mantiene amplitud y es más natural en español bíblico que «contenedores»; «vasijas» también sería posible, pero sugiere más fuertemente cerámica específica.
- source_word: לָךְ
  english_pob_choice: for yourself
  chosen_spanish: para ti
  alternatives_spanish:
  - para ti misma
  - para ti
  lexicon: HALOT
  rationale: El dativo expresa beneficio o implicación personal. En español, «para ti» comunica esa relación de manera clara y sin añadir un reflexivo innecesario.
- source_word: מִן הַחוּץ
  english_pob_choice: from outside
  chosen_spanish: de entre los de afuera
  alternatives_spanish:
  - de afuera
  - fuera de casa
  - de los de afuera
  lexicon: HALOT
  rationale: La frase apunta a salir a obtener los recipientes de otras personas, no desde dentro de la casa. «De entre los de afuera» conserva el valor relacional de la expresión hebrea y evita una lectura meramente locativa.
- source_word: מֵאֵת כָּל שכנכי
  english_pob_choice: from all your neighbors
  chosen_spanish: de todos tus vecinos
  alternatives_spanish:
  - de todos los vecinos tuyos
  - de todas tus vecinas y vecinos
  lexicon: HALOT
  rationale: La referencia al sufijo femenino singular indica la mujer como destinataria. «Tus vecinos» reproduce el sentido colectivo de שכנים sin sobreexplicar el género en español.
- source_word: כֵּלִים רֵקִים
  english_pob_choice: empty vessels
  chosen_spanish: vasos vacíos
  alternatives_spanish:
  - recipientes vacíos
  - vasijas vacías
  lexicon: HALOT
  rationale: La repetición del sustantivo con adjetivo en hebreo es enfática. Mantener «vasos vacíos» conserva la concisión y la insistencia del original; la secuencia «vasos, vasos vacíos» queda implícita por la repetición en el ritmo de la frase.
- source_word: אַל תַּמְעִיטִי
  english_pob_choice: Do not gather only a few
  chosen_spanish: No reduzcas la cantidad
  alternatives_spanish:
  - No hagas pocos
  - No disminuyas
  - No recojas sólo unos pocos
  lexicon: HALOT
  rationale: El hiphil con אַל expresa no hacer escaso o no disminuir. «No reduzcas la cantidad» preserva la fuerza negativa y evita limitar el sentido solo al acto de recoger, aunque ese sea el resultado práctico.
theological_decisions:
- issue: 'Alcance de שַׁאֲלִי: pedir vs. pedir prestado'
  english_pob_reading: borrow
  chosen_spanish_reading: pide prestados
  alternative_spanish_readings:
  - pide
  - solicita
  rationale: La escena presupone obtención temporal de vasijas de los vecinos; en español, «pide prestados» comunica mejor esa situación y no suaviza el alcance práctico del verbo.
  doctrine_reference: 2 Reyes 4:3; uso contextual del verbo שאל
- issue: 'Naturaleza de la instrucción final: cantidad insuficiente vs. simple escasez'
  english_pob_reading: Do not gather only a few
  chosen_spanish_reading: No reduzcas la cantidad
  alternative_spanish_readings:
  - No recojas sólo unos pocos
  - No hagas pocos
  rationale: El hebreo no solo prohíbe reducir numéricamente, sino también limitar la provisión prevista. La formulación española mantiene la tensión narrativa de abundancia sin convertirla en una interpretación más fuerte de lo que exige el texto.
  doctrine_reference: 2 Reyes 4:3; valor aspectual de מעט en hiphil
- issue: Referencia relacional de מִן הַחוּץ
  english_pob_reading: from outside
  chosen_spanish_reading: de entre los de afuera
  alternative_spanish_readings:
  - de afuera
  - fuera de casa
  rationale: La frase puede entenderse como una localización externa, pero aquí el sentido funcional es salir a buscar recipientes de otras personas. La redacción elegida conserva esa dirección sin borrar la imagen de exterioridad.
  doctrine_reference: 2 Reyes 4:3; análisis sintáctico de la preposición
translation_notes:
  revision_awareness: El expediente inglés quedó sin cambios en la última revisión y fue confirmado con alta concordancia; la redacción española sigue esa lectura optim-equivalente sin introducir variantes textuales nuevas.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estándar del proyecto, aunque este versículo no contiene el nombre divino.
  - Se evita «SEÑOR» como sustituto, conforme a la política del proyecto.
  - «Vasos» se usa como equivalente amplio de כֵּלִים en este contexto narrativo.
  - La nota [a] conserva la tensión lexical entre «preguntar» y «pedir prestado», ya documentada en el audit trail inglés.
  - La nota [c] preserva la advertencia cuantitativa del hebreo sin convertirla en una interpretación más expansiva.
