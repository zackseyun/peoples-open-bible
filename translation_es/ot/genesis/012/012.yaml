translation:
  language: es
  text: 'Y acontecerá[b] que, cuando los egipcios te vean, dirán: «Esta es su esposa»; y me matarán, pero a ti te dejarán vivir[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «te mantendrán con vida» o «te conservarán la vida».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «Y acontecerá que, cuando».'
    reason: source_note
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: And it will be that when
  chosen_spanish: Y acontecerá que
  alternatives_spanish:
  - Y será que
  - Y sucederá que
  lexicon: HALOT
  rationale: La fórmula hebrea introduce una situación futura anticipada. «Acontecerá que» conserva el valor narrativo y anticipatorio sin sonar arcaico en español.
- source_word: כִּי
  english_pob_choice: that when
  chosen_spanish: cuando
  alternatives_spanish:
  - que cuando
  - si
  lexicon: HALOT
  rationale: En este contexto, כִּי introduce la circunstancia temporal prevista; en español, «cuando» expresa con naturalidad esa relación sin añadir una construcción pesada.
- source_word: יִרְאוּ אֹתָךְ
  english_pob_choice: see you
  chosen_spanish: te vean
  alternatives_spanish:
  - te miren
  - te vean de vista
  lexicon: HALOT
  rationale: ראה aquí es el verbo común «ver». El subjuntivo en la subordinada temporal encaja con el marco prospectivo de la frase.
- source_word: הַמִּצְרִים
  english_pob_choice: the Egyptians
  chosen_spanish: los egipcios
  alternatives_spanish:
  - el pueblo egipcio
  lexicon: HALOT
  rationale: Es la designación étnico-nacional directa del texto, bien reflejada por «los egipcios».
- source_word: וְאָמְרוּ
  english_pob_choice: they will say
  chosen_spanish: dirán
  alternatives_spanish:
  - y dirán
  - y dirían
  lexicon: HALOT
  rationale: El futuro narrativo se expresa de forma natural con «dirán»; el valor de secuencia queda claro por el contexto.
- source_word: אִשְׁתּוֹ זֹאת
  english_pob_choice: This is his wife
  chosen_spanish: Esta es su esposa
  alternatives_spanish:
  - Esta es su mujer
  - Esta mujer es su esposa
  lexicon: HALOT
  rationale: La cláusula nominal hebrea con demostrativo se vierte de manera idiomática. «Esposa» comunica el vínculo conyugal con dignidad; «su» conserva el posesivo de la referencia masculina implícita en el contexto.
- source_word: וְהָרְגוּ אֹתִי
  english_pob_choice: they will kill me
  chosen_spanish: y me matarán
  alternatives_spanish:
  - y me asesinarán
  - y me darán muerte
  lexicon: HALOT
  rationale: הרג es el verbo básico de matar, no necesariamente más específico que «matar». Se conserva la fuerza directa del verbo sin intensificar indebidamente.
- source_word: וְאֹתָךְ יְחַיּוּ
  english_pob_choice: but they will let you live
  chosen_spanish: pero a ti te dejarán vivir
  alternatives_spanish:
  - y te mantendrán con vida
  - y te conservarán la vida
  - y te perdonarán la vida
  lexicon: HALOT
  rationale: El hifil de חיה significa «hacer vivir / dejar vivir». En español, «dejarán vivir» reproduce la idea de mantener con vida con naturalidad. Se añade «a ti» para reflejar el contraste enfático del hebreo y la oposición con «me matarán».
translation_notes:
  revision_awareness: El contexto auditado en inglés confirma la lectura narrativa prospectiva de וְהָיָה כִּי y la alternativa léxica de יְחַיּוּ como «let you live / spare your life». No se requiere ajuste doctrinal ni textual; la única tensión es estilística en español entre literalidad y fluidez, resuelta sin perder la estructura causal-temporal del hebreo.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto, aunque este versículo no contiene el nombre divino.
  - Se evitó «Cristo/Mesías» porque no aplica al versículo.
  - Se preservó el contraste entre «me matarán» y «a ti te dejarán vivir», reflejando el paralelismo adversativo del hebreo.
  - Se usó «esposa» en lugar de «mujer» por claridad relacional en español, sin alterar el sentido del texto.
