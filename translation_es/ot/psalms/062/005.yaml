  text: אַ֤ךְ מִ/שְּׂאֵת֨/וֹ יָעֲצ֣וּ לְ/הַדִּיחַ֮ יִרְצ֪וּ כָ֫זָ֥ב בְּ/פִ֥י/ו יְבָרֵ֑כוּ וּ֝/בְ/קִרְבָּ֗/ם יְקַלְלוּ סֶֽלָה׀־׃
