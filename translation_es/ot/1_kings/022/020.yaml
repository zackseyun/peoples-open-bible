translation:
  language: es
  text: 'Y Yahvé dijo[a]: «¿Quién seducirá a Acab, para que suba y caiga en Ramot de Galaad?» Y este decía una cosa, y aquel decía otra.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «persuadirá»; el verbo también puede llevar el sentido de «engañar», según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino del Tetragrama como transliteración reverente y auditable. En español, 'Yahvé' comunica el nombre propio de Dios sin sustituirlo por un título, en línea con el criterio del POB en inglés.
- source_word: יְפַתֶּה
  english_pob_choice: will entice
  chosen_spanish: engañará
  alternatives_spanish:
  - persuadirá
  - seducirá
  lexicon: HALOT
  rationale: El piel de פתה puede abarcar 'persuadir', 'seducir' o 'engañar' según el contexto. En este relato celestial/judicial, 'engañará' preserva la tensión teológica de una acción que conduce a Acab a su ruina, sin suavizarla a una mera persuasión.
- source_word: וְיַעַל
  english_pob_choice: so that he may go up
  chosen_spanish: para que suba
  alternatives_spanish:
  - y suba
  - a fin de que suba
  lexicon: HALOT
  rationale: 'La frase final en español expresa con naturalidad el valor de propósito o resultado del verbo: subir a la batalla. ''Para que suba'' mantiene la relación lógica del hebreo sin añadir interpretación.'
- source_word: וְיִפֹּל
  english_pob_choice: and fall
  chosen_spanish: y caiga
  alternatives_spanish:
  - y caiga derrotado
  - y perezca
  lexicon: HALOT
  rationale: Se conserva el verbo básico 'caer' para reflejar נפל. En contexto militar implica derrota y muerte, pero la traducción no explicita más de lo que el hebreo dice.
- source_word: בְּרָמֹת גִּלְעָד
  english_pob_choice: at Ramoth-gilead
  chosen_spanish: en Ramot de Galaad
  alternatives_spanish:
  - en Ramot-galaad
  - en Ramot de Galaad
  lexicon: HALOT
  rationale: Se translitera el topónimo en forma ampliamente legible para español, con el uso de 'Galaad' como forma común en castellano. La preposición 'en' suena natural para un lugar de combate en español.
- source_word: זֶה בְּכֹה וְזֶה אֹמֵר בְּכֹה
  english_pob_choice: this one said one thing, and that one said another
  chosen_spanish: este decía una cosa, y aquel decía otra
  alternatives_spanish:
  - este decía así, y aquel decía así
  - uno decía una cosa, y otro decía otra
  lexicon: HALOT
  rationale: Se reproduce la alternancia demostrativa del hebreo ('este... aquel...') y se conserva el contraste de opiniones en la escena del consejo celestial. 'Una cosa... otra' es una equivalencia idiomática natural que evita una literalidad opaca como 'así... así'.
theological_decisions:
- issue: Iniciativa divina en el engaño de Acab
  english_pob_reading: Retain the direct wording that the LORD asks who will entice Ahab, without softening the statement.
  chosen_spanish_reading: Se mantiene la pregunta directa de Yahvé acerca de quién engañará a Acab, sin atenuarla.
  alternative_spanish_readings:
  - ¿Quién influirá en Acab?
  - ¿Quién lo persuadirá?
  rationale: El hebreo presenta a Yahvé iniciando la escena del consejo y formulando la pregunta de manera directa. La traducción conserva esa tensión teológica y no la resuelve con un verbo más neutro que diluya la agencia divina en el juicio.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'Se siguió el ajuste revisado del POB en inglés para reflejar con mayor precisión los demostrativos hebreos finales: ''este... aquel...'' en lugar de una formulación más genérica. También se mantuvo la tensión léxica de יְפַתֶּה con una opción española que no suaviza el papel divino en el pasaje.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' para el Tetragrama, conforme al estándar del proyecto.
  - '''Engañará'' se eligió por la carga contextual del verbo, pero la nota mantiene la alternativa ''persuadirá'' para no borrar la ambigüedad léxica.'
  - '''Ramot de Galaad'' sigue la convención española de topónimos bíblicos ampliamente reconocibles.'
  - La clausula final conserva la deixis del hebreo con 'este... aquel...' para reflejar mejor el contraste de voces.
