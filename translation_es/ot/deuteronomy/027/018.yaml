translation:
  language: es
  text: 'Maldito el que desvía[a] a un ciego en el camino. Y todo el pueblo dirá: «Amén».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el que extravía a un ciego en el camino».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אָרוּר
  english_pob_choice: Cursed is
  chosen_spanish: Maldito[a]
  alternatives_spanish:
  - Sea maldito
  - Maldito sea
  lexicon: HALOT
  rationale: El hebreo presenta una fórmula de maldición declarativa. En español, «Maldito» conserva esa fuerza legal/covenantal de manera natural y pública. Se añade una nota por la posible lectura alternativa de la fórmula como pronunciamiento de maldición sobre la persona.
- source_word: מַשְׁגֶּה
  english_pob_choice: the one who misleads
  chosen_spanish: el que hace que se extravíe
  alternatives_spanish:
  - el que extravía
  - el que desvía
  lexicon: HALOT
  rationale: El participio causativo expresa hacer que otro se desvíe o se pierda. «Hace que se extravíe» mantiene el valor causativo sin endurecer la frase más de lo que exige el hebreo.
- source_word: עִוֵּר
  english_pob_choice: a blind man
  chosen_spanish: un ciego
  alternatives_spanish:
  - una persona ciega
  - el ciego
  lexicon: HALOT
  rationale: El sustantivo/adjetivo hebreo es masculino singular y se refiere a un individuo concreto. En español, «un ciego» conserva esa singularidad y la forma masculina del original sin sonar forzado.
- source_word: בַּדָּרֶךְ
  english_pob_choice: on the road
  chosen_spanish: en el camino
  alternatives_spanish:
  - en la ruta
  - sobre el camino
  lexicon: HALOT
  rationale: La expresión es espacial y concreta. «En el camino» es la equivalencia española más natural y mantiene la imagen de una persona vulnerable en tránsito.
- source_word: וְאָמַר
  english_pob_choice: And ... shall say
  chosen_spanish: Y ... dirá
  alternatives_spanish:
  - Y ... dirán
  - Y ... responderá
  lexicon: HALOT
  rationale: El hebreo funciona como una respuesta litúrgica prescrita. «Dirá» reproduce bien el valor injuntivo/futuro del giro y permite una construcción fluida con «todo el pueblo».
- source_word: כָּל הָעָם
  english_pob_choice: all the people
  chosen_spanish: todo el pueblo
  alternatives_spanish:
  - todo el pueblo de Israel
  - toda la gente
  lexicon: HALOT
  rationale: El hebreo dice simplemente «todo el pueblo». «Todo el pueblo» conserva la amplitud colectiva sin añadir especificación no explícita en el verso.
- source_word: אָמֵן
  english_pob_choice: Amen
  chosen_spanish: Amén
  alternatives_spanish:
  - Así sea
  - En verdad
  lexicon: HALOT
  rationale: «Amén» es la transliteración litúrgica estable y preserva mejor el eco ceremonial del hebreo que una paráfrasis.
theological_decisions:
- issue: Carácter de fórmula de maldición legal
  english_pob_reading: Cursed is the one who...
  chosen_spanish_reading: Maldito el que...
  alternative_spanish_readings:
  - Sea maldito el que...
  - Maldito sea el que...
  rationale: El hebreo presenta una declaración de maldición, no un deseo. «Maldito el que...» conserva el tono jurídico-covenantal y suena natural en español bíblico contemporáneo.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 1
- issue: Forma masculina singular de עִוֵּר
  english_pob_reading: a blind man
  chosen_spanish_reading: un ciego
  alternative_spanish_readings:
  - una persona ciega
  - el ciego
  rationale: La forma hebrea es masculina singular; en este contexto legal individual, el español masculino singular refleja con fidelidad la forma del original sin neutralizarla.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
translation_notes:
  revision_awareness: Revisado contra el paquete fuente hebreo y el audit trail inglés. Se mantuvieron la estructura de maldición declarativa, el valor causativo de מַשְׁגֶּה, el singular masculino de עִוֵּר y la respuesta litúrgica final sin añadir material ausente del texto.
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma de proyecto solo cuando el hebreo lo exigiera; en este versículo no aparece el Tetragrámaton.
  - Se conservó «Amén» como transliteración litúrgica estable.
  - No se añadió ninguna especificación como «de Israel», porque el hebreo dice simplemente «todo el pueblo».
