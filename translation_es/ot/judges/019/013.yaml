translation:
  language: es
  text: 'Él dijo a su joven[a]: «Ven[b], y acerquémonos a uno de estos lugares, y pasemos la noche en Guibeá o en Ramá».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su sirviente» o «su asistente». נַעַר puede referirse a un joven, un sirviente o un ayudante, según el contexto.
    reason: lexical_alternative
  - marker: b
    text: O «Ve, y acerquémonos a uno de los lugares».
    reason: lexical_alternative
lexical_decisions:
- source_word: לְנַעֲרוֹ
  english_pob_choice: to his young man
  chosen_spanish: a su joven
  alternatives_spanish:
  - a su servidor
  - a su asistente
  lexicon: HALOT
  rationale: נַעַר puede referirse a un joven, sirviente o asistente según el contexto. Aquí designa al acompañante masculino del levita. «Joven» conserva el valor léxico básico sin imponer de entrada una relación servil que el hebreo no exige en este verso.
- source_word: לְךָ
  english_pob_choice: Come
  chosen_spanish: Ven
  alternatives_spanish:
  - Ve
  lexicon: HALOT
  rationale: Aunque el imperativo de הלך puede equivaler literalmente a «ir», en el discurso directo invitando a moverse junto con la forma cohortativa siguiente, «Ven» suena natural en español y mantiene el valor exhortativo conjunto.
- source_word: וְנִקְרְבָה
  english_pob_choice: and let us draw near
  chosen_spanish: acerquémonos
  alternatives_spanish:
  - vayamos cerca
  - nos aproximemos
  lexicon: HALOT
  rationale: La forma cohortativa expresa resolución/invitación en primera persona plural. «Acerquémonos» preserva el movimiento de קרב y la fuerza inclusiva del verbo sin sonar forzado en español.
- source_word: בְּאַחַד הַמְּקֹמוֹת
  english_pob_choice: to one of these places
  chosen_spanish: a uno de estos lugares
  alternatives_spanish:
  - en uno de los lugares
  - a uno de los sitios
  lexicon: HALOT
  rationale: El contexto de viaje y la mención inmediata de Guibeá y Ramá muestran que se trata de lugares concretos entre varias opciones cercanas. «Estos lugares» conserva el matiz deíctico y «a» refleja el sentido direccional de la frase.
- source_word: וְלַנּוּ
  english_pob_choice: and spend the night
  chosen_spanish: pasemos la noche
  alternatives_spanish:
  - pernoctemos
  - alojémonos
  lexicon: HALOT
  rationale: לון significa pasar la noche o alojarse. «Pasemos la noche» es claro, natural y mantiene la decisión de sentido sin elevar demasiado el registro.
- source_word: בַגִּבְעָה
  english_pob_choice: in Gibeah
  chosen_spanish: en Guibeá
  alternatives_spanish:
  - en Gueba
  - en Gibeá
  lexicon: HALOT
  rationale: Se translitera el nombre propio siguiendo el uso habitual en español bíblico moderno. «En» es la preposición natural para una estancia nocturna dentro de una localidad.
- source_word: בָרָמָה
  english_pob_choice: in Ramah
  chosen_spanish: en Ramá
  alternatives_spanish:
  - en Ramah
  lexicon: HALOT
  rationale: Se translitera el topónimo para mantener consistencia con el resto del texto bíblico en español. La preposición «en» corresponde al destino de pernocta dentro de la ciudad.
translation_notes:
  revision_awareness: La revisión inglesa más reciente no introdujo cambios (estado de alta concordancia); por eso la propuesta española sigue de cerca la lectura auditada de la POB en inglés y mantiene sus decisiones léxicas principales, adaptándolas al español natural.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» en la tradición del proyecto cuando aparezca el tetragrámaton; aquí no está presente.
  - Se conserva el criterio de traducir נַעַר como «joven» por defecto, con nota para las alternativas contextuales.
  - Los topónimos se transliteran de forma estable como Guibeá y Ramá.
  - 'El tono directo de invitación se sostiene con imperativo + cohortativo: «Ven, y acerquémonos».'
