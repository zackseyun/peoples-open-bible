translation:
  language: es
  text: Sirvieron a sus ídolos[a], y estos les fueron un lazo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «adoraron a sus ídolos, y estos llegaron a serles una trampa».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַבְדוּ
  english_pob_choice: they served
  chosen_spanish: sirvieron
  alternatives_spanish:
  - adoraron
  - rindieron servicio a
  lexicon: HALOT
  rationale: עבד en qal expresa servicio prestado; en este contexto de idolatría, 'sirvieron' conserva la relación de devoción sin convertirla de entrada en una paráfrasis más interpretativa como 'adoraron'.
- source_word: עֲצַבֵּיהֶם
  english_pob_choice: their idols
  chosen_spanish: sus ídolos
  alternatives_spanish:
  - sus imágenes
  - sus ídolos de piedra
  lexicon: HALOT
  rationale: עֲצַבִּים designa ídolos con matiz polémico. 'Ídolos' es el equivalente más claro y directo en español; 'imágenes' puede sonar más neutral de lo que pide el contexto.
- source_word: וַיִּהְיוּ
  english_pob_choice: they became
  chosen_spanish: llegaron a ser
  alternatives_spanish:
  - fueron
  - se volvieron
  lexicon: HALOT
  rationale: 'El hebreo expresa resultado: algo pasó a funcionar como consecuencia dañina. ''Llegaron a ser'' conserva ese sentido resultativo sin forzar un verbo demasiado coloquial.'
- source_word: לָהֶם
  english_pob_choice: to them
  chosen_spanish: para ellos
  alternatives_spanish:
  - a ellos
  lexicon: HALOT
  rationale: La preposición ל aquí marca efecto o relación. En español, 'para ellos' comunica de forma natural el daño que recayó sobre el mismo pueblo.
- source_word: לְמוֹקֵשׁ
  english_pob_choice: a snare
  chosen_spanish: una trampa
  alternatives_spanish:
  - una red
  - un lazo
  lexicon: HALOT
  rationale: מוֹקֵשׁ puede ser 'snare' o 'trap'. En español, 'trampa' es una opción natural y transparente; 'lazo' sería posible pero más idiomático en otros contextos.
theological_decisions:
- issue: 'Referencia del complemento final: ¿qué llegó a ser una trampa?'
  english_pob_reading: The idols became a snare to the people who served them.
  chosen_spanish_reading: Los ídolos fueron la causa de la trampa para el pueblo que los sirvió, mantenido en la forma breve del versículo.
  alternative_spanish_readings:
  - Sus actos de servicio llegaron a serles una trampa
  - Los ídolos mismos se volvieron una trampa para ellos
  rationale: El antecedente inmediato más natural es 'sus ídolos'. La forma española conserva la ambigüedad funcional del hebreo y permite entender que los ídolos resultaron nocivos para quienes los sirvieron.
  doctrine_reference: Salmo 106:36 en su contexto histórico-teológico de idolatría y sus consecuencias
translation_notes:
  revision_awareness: El texto base inglés no requirió revisiones; se mantuvo la lectura resultativa y la alternativa lexical tradicional ('worshiped') como opción anotada. La traducción española sigue el hebreo directamente y conserva el efecto causal del segundo hemistiquio.
  spanish_consistency_notes:
  - Se mantiene 'ídolos' para עֲצַבִּים, coherente con el uso bíblico y con el audit trail inglés.
  - Se evita 'SEÑOR' u այլ sustitución no pertinente, ya que el versículo no contiene el tetragrámaton.
  - '''Trampa'' se eligió como equivalente natural de מוֹקֵשׁ, en continuidad con la nota alternativa inglesa ''trap''.'
  - La lectura de 'llegaron a ser' refleja el valor resultativo de וַיִּהְיוּ sin añadir una interpretación doctrinal extra.
