translation:
  language: es
  text: Si compras un esclavo hebreo[a], servirá seis años; pero en el séptimo año saldrá libre[b], sin pago.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Cuando compras un esclavo hebreo». La partícula condicional hebrea puede introducir una ley casuística con el sentido de «si» o de «cuando».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «saldrá a la libertad, sin costo». El hebreo también puede expresarse con la idea de salir «a la libertad».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Cuando
  lexicon: HALOT
  rationale: En la legislación casuística, la partícula introduce una cláusula condicional. «Si» expresa con naturalidad esa apertura normativa en español; «cuando» también es posible, pero suena más supuesto que condicional.
- source_word: תִקְנֶה
  english_pob_choice: you buy
  chosen_spanish: compras
  alternatives_spanish:
  - adquieres
  - compras
  lexicon: HALOT
  rationale: El verbo קנה aquí refiere una acción de compra/adquisición en contexto legal. «Compras» comunica con claridad la relación contractual y evita una formulación demasiado técnica.
- source_word: עֶבֶד
  english_pob_choice: slave
  chosen_spanish: esclavo
  alternatives_spanish:
  - siervo
  - criado
  lexicon: HALOT
  rationale: La POB inglesa elige «slave» para mantener visible el estatus de dependencia vinculada por compra. En español, «esclavo» conserva esa fuerza lexical y evita suavizar el término con «siervo».
- source_word: עִבְרִי
  english_pob_choice: Hebrew
  chosen_spanish: hebreo
  alternatives_spanish:
  - israelita
  lexicon: HALOT
  rationale: El hebreo dice literalmente «hebreo»; «hebreo» es la correspondencia directa y evita expandir el alcance étnico a «israelita» sin base inmediata en el texto.
- source_word: שֵׁשׁ שָׁנִים
  english_pob_choice: six years
  chosen_spanish: seis años
  alternatives_spanish:
  - por seis años
  - durante seis años
  lexicon: HALOT
  rationale: Expresión temporal directa y natural en español. No se añade «durante» porque el hebreo ya establece la duración de servicio.
- source_word: יַעֲבֹד
  english_pob_choice: he shall serve
  chosen_spanish: servirá
  alternatives_spanish:
  - trabajará
  - servirá como esclavo
  lexicon: HALOT
  rationale: El verbo עבד puede significar «servir/trabajar». En español, «servirá» mantiene la relación laboral-jurídica sin duplicar el estatus ya indicado por «esclavo».
- source_word: וּבַשְּׁבִעִת
  english_pob_choice: but in the seventh
  chosen_spanish: pero en el séptimo
  alternatives_spanish:
  - y en el séptimo
  - pero en el séptimo año
  lexicon: HALOT
  rationale: Se conserva el contraste introducido por la conjunción en el contexto de la ley. «Séptimo» puede funcionar sustantivamente en español por el contexto, aunque el referente temporal sea el año.
- source_word: יֵצֵא
  english_pob_choice: he shall go out
  chosen_spanish: saldrá
  alternatives_spanish:
  - saldrá fuera
  - será liberado
  lexicon: HALOT
  rationale: «Salir» reproduce bien el idiomático hebreo de salida/relevo. En español, «saldrá» es más fluido que una perífrasis pasiva y mantiene la imagen textual.
- source_word: לַחָפְשִׁי
  english_pob_choice: free
  chosen_spanish: libre
  alternatives_spanish:
  - a la libertad
  - en libertad
  lexicon: HALOT
  rationale: El hebreo expresa destino o estado de libertad. «Libre» es la forma breve y precisa en español; «en libertad» sería interpretativo y «a la libertad» demasiado pesado.
- source_word: חִנָּם
  english_pob_choice: without payment
  chosen_spanish: sin pago
  alternatives_spanish:
  - gratuitamente
  - sin rescate
  lexicon: HALOT
  rationale: La POB inglesa aclara que no hay pago de redención. «Sin pago» conserva esa precisión de manera concisa; «sin rescate» sería más interpretativo y «gratuitamente» puede sonar menos jurídico.
theological_decisions:
- issue: Cómo traducir עֶבֶד en una ley sobre dependencia laboral comprada
  english_pob_reading: slave
  chosen_spanish_reading: esclavo
  alternative_spanish_readings:
  - siervo
  - criado
  - esclavo con matiz de servicio
  rationale: La decisión mantiene visible la dimensión de propiedad/estatus legal que el texto regula. «Esclavo» evita suavizar el término y corresponde al criterio POB de usar el término más transparente cuando la condición servil es central.
  doctrine_reference: DOCTRINE.md Translation philosophy §1; contested bonded-status terminology by analogy
- issue: Cómo reflejar la liberación en el séptimo año sin añadir elementos ajenos
  english_pob_reading: he shall go out free, without payment
  chosen_spanish_reading: saldrá libre, sin pago
  alternative_spanish_readings:
  - saldrá en libertad, sin pago
  - saldrá libre, gratuitamente
  rationale: «Sin pago» conserva la negativa explícita de redención exigida por el hebreo חִנָּם y por la nota inglesa «without payment». Evita introducir un rescate implícito o una paráfrasis más amplia que no aporta el texto.
  doctrine_reference: DOCTRINE.md faithful rendering of lexical and legal force
translation_notes:
  revision_awareness: 'La revisión más reciente indica que no hubo cambios y que el texto permanece confirmado por el control cruzado de alta concordancia. Por eso la propuesta sigue de cerca la lectura auditada en inglés, manteniendo las mismas tensiones léxicas principales: condición casuística, estatus de esclavo, liberación al séptimo año y ausencia de pago.'
  spanish_consistency_notes:
  - Se mantiene «esclavo» de forma consistente para עֶבֶד en contexto legal de compra y servicio.
  - «Libre» y «sin pago» reproducen la liberación no redimida del hebreo sin añadir glosa interpretativa al texto principal.
  - La frase «el séptimo» queda sustantivada por el contexto; si se prefiere mayor explicitud, podría leerse «en el séptimo año», pero la forma breve es fiel y natural.
