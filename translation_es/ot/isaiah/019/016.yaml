translation:
  language: es
  text: En aquel día, Egipto será como mujeres[a]; temblará y tendrá miedo por el agitar[b] de la mano de Yahvé de los Ejércitos, que él agita contra ella.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo dice explícitamente «mujeres»; el símil refleja una imagen bélica antigua de vulnerabilidad y miedo.
    reason: cultural_note
  - marker: b
    text: 'O: «el blandir de la mano». El término puede comunicar la idea de un movimiento enérgico de la mano.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: In that day
  chosen_spanish: En aquel día
  alternatives_spanish:
  - En ese día
  lexicon: HALOT
  rationale: La fórmula profética temporal se conserva con el giro natural español «En aquel día», que mantiene el tono solemne y escatológico sin forzar una estructura extraña.
- source_word: מִצְרַיִם
  english_pob_choice: Egypt
  chosen_spanish: Egipto
  alternatives_spanish:
  - la tierra de Egipto
  lexicon: HALOT
  rationale: El referente es la nación personificada como unidad singular; «Egipto» reproduce de forma natural esa personificación en español.
- source_word: כַּנָּשִׁים
  english_pob_choice: like women
  chosen_spanish: como mujeres
  alternatives_spanish:
  - como feminas
  - como mujeres débiles
  lexicon: HALOT
  rationale: El hebreo usa explícitamente «mujeres». Se preserva el símil sin suavizarlo ni neutralizarlo, porque el texto fuente conserva esa imagen cultural de vulnerabilidad en guerra.
- source_word: וְחָרַד וּפָחַד
  english_pob_choice: trembling and afraid
  chosen_spanish: temblando y atemorizado
  alternatives_spanish:
  - temblando y con miedo
  - estremeciéndose y aterrorizado
  lexicon: HALOT
  rationale: Los dos verbos intensifican la reacción de temor. «Temblando y atemorizado» mantiene la duplicación enfática con español moderno y fluido.
- source_word: מִפְּנֵי
  english_pob_choice: because of
  chosen_spanish: por
  alternatives_spanish:
  - a causa de
  - debido a
  lexicon: HALOT
  rationale: Aquí la preposición introduce la causa del temor. «Por» permite un español sobrio y directo; la causalidad queda clara por el contexto inmediato.
- source_word: תְּנוּפַת יַד
  english_pob_choice: the waving of the hand
  chosen_spanish: el agitar de la mano
  alternatives_spanish:
  - el ondear de la mano
  - el brandir de la mano
  lexicon: HALOT
  rationale: El sustantivo de נוף y el verbo correlativo conservan el movimiento concreto de la mano. «Agitar» preserva mejor la imagen verbal repetida en el versículo que una paráfrasis abstracta.
- source_word: יְהוָה צְבָאוֹת
  english_pob_choice: the LORD of Armies
  chosen_spanish: Yahvé de los Ejércitos
  alternatives_spanish:
  - Yahvé de los Ejércitos
  - Yahvé de los Ejércitos Celestiales
  lexicon: HALOT
  rationale: Se mantiene «Yahvé» según la norma del proyecto para יהוה. צְבָאוֹת se vierte de manera transparente como «de los Ejércitos», conservando el matiz marcial sin sustituirlo por la tradición eclesiástica de «Señor de los ejércitos».
- source_word: אֲשֶׁר הוּא מֵנִיף עָלָיו
  english_pob_choice: which he waves against it
  chosen_spanish: que él agita contra él
  alternatives_spanish:
  - que él blande contra él
  - que él ondea contra él
  lexicon: HALOT
  rationale: El relativo retoma la misma imagen del movimiento de la mano. «Contra él» expresa el valor hostil del gesto y conserva el referente singular personificado de Egipto.
theological_decisions:
- issue: Representación de YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - el Señor
  rationale: El texto hebreo usa el Tetragrama directamente; según la convención del proyecto, se preserva el nombre divino en español como «Yahvé» en vez de ocultarlo tras una sustitución devocional.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh (adaptado al español como Yahvé)'
- issue: Traducción de צְבָאוֹת
  english_pob_reading: of Armies
  chosen_spanish_reading: de los Ejércitos
  alternative_spanish_readings:
  - de los Hosts
  - de los Ejércitos
  rationale: La opción «de los Ejércitos» hace transparente el sentido militar del título en español contemporáneo y evita un latinismo opaco como «Hosts».
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §6
- issue: Símil de género en el texto
  english_pob_reading: like women
  chosen_spanish_reading: como mujeres
  alternative_spanish_readings:
  - como seres débiles
  - como mujeres temerosas
  rationale: Se conserva el símil explícito del hebreo sin suavizarlo. La nota puede contextualizar la imaginería antigua, pero el texto principal no altera la formulación fuente.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: La revisión más reciente indicó que no hacía falta ningún cambio adicional; por eso se ha mantenido la estructura semántica del hebreo y del texto inglés auditado, ajustando solo la formulación al español natural y al criterio del proyecto para el nombre divino y צְבָאוֹת.
  spanish_consistency_notes:
  - Se usa «Yahvé» para יהוה conforme al estándar del proyecto.
  - «Ejércitos» se mantiene como traducción transparente de צְבָאוֹת.
  - El referente de Egipto sigue siendo singular; por eso los pronombres finales se mantienen en singular («él», «él»), como en el inglés auditado.
  - El símil «como mujeres» se conserva en el texto principal y se contextualiza en nota, sin neutralizarlo.
