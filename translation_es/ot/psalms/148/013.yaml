revisions:
- from: Que alaben el nombre de Yahvé[a], porque su nombre solo es enaltecido; su majestad está sobre la tierra y los cielos.
  to: Que alaben el nombre de Yahvé[a], porque solo su nombre es enaltecido; su majestad está por encima de la tierra y del cielo.
  rationale: Se conserva el contenido del borrador, pero se ajusta el orden a «solo su nombre» para una lectura más natural y enfática, y se cambia «está sobre» por «está por encima de» para reflejar mejor el valor comparativo/elevado de עַל en este contexto poético. También se adopta «del cielo» como formulación más idiomática en español, en línea con la decisión inglesa «earth and heaven».
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:17:04Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: llamado exhortativo a alabar, preservación de «nombre» y de «Yahvé», exclusividad en «su nombre solo», y la idea de elevación/superioridad en la segunda mitad. La nota léxica sobre הוֹדוֹ también coincide con la auditoría inglesa.'
  spanish_quality_summary: 'El español es claro y digno, pero hay dos mejoras importantes de naturalidad y precisión poética: «sobre la tierra y los cielos» suena menos idiomático aquí que «por encima de la tierra y del cielo/los cielos», y «está sobre» puede sonar demasiado espacial. Además, dado que el inglés POB optó por singular idiomático «heaven», en español «el cielo» fluye mejor en este contexto poético general, aunque el plural hebreo puede quedar reflejado en nota léxica si fuera necesario; no hace falta nota aquí.'
  glossary_alignment: Alinea correctamente con la política del proyecto en «Yahvé». No hay conflicto con otros términos doctrinales. «Majestad» para הוֹדוֹ sigue la decisión auditada, con alternativas en nota bien preservadas.
  issues:
  - severity: medium
    issue: «está sobre» para עַל
    rationale: Aunque no es imposible, aquí suena menos natural y menos claramente comparativo que «está por encima de», que expresa mejor la elevación/superioridad poética de הוֹדוֹ sobre la tierra y el cielo.
  - severity: low
    issue: «los cielos» frente a la línea auditada inglesa «heaven»
    rationale: El hebreo es plural, pero la POB inglesa eligió singular idiomático. En español bíblico moderno, «la tierra y el cielo» suena más natural y conserva bien el merismo; el plural no es error, pero la frase completa mejora con el singular idiomático.
  revised_spanish_text: Que alaben el nombre de Yahvé[a], porque solo su nombre es enaltecido; su majestad está por encima de la tierra y del cielo.
  revised_footnotes:
  - marker: a
    text: O «su esplendor» o «su gloria» para «su majestad».
    reason: lexical_alternative
  revision_rationale: Se conserva el contenido del borrador, pero se ajusta el orden a «solo su nombre» para una lectura más natural y enfática, y se cambia «está sobre» por «está por encima de» para reflejar mejor el valor comparativo/elevado de עַל en este contexto poético. También se adopta «del cielo» como formulación más idiomática en español, en línea con la decisión inglesa «earth and heaven».
