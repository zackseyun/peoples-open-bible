base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/026/020.yaml
  text: Azariah the chief priest turned toward him[a], and all the priests also, and behold, he was leprous on his forehead. So they hurried him out of there, and he himself also hastened to go out[c][b], because Yahweh had struck him.
  footnotes:
  - marker: a
    text: Or, 'they drove him out from there.' The Hebrew verb can convey urgent removal, with either the priests' forceful action or the haste of the moment in view.
    reason: lexical_alternative
  - marker: b
    text: Or, 'he was driven to go out.' The Hebrew may emphasize that he was impelled outward, though in context it likely means that he himself hurried out.
    reason: lexical_alternative
  - marker: c
    text: '''Leprous'' renders a Hebrew term used in priestly impurity laws for a serious skin affliction; it does not necessarily correspond exactly to modern medical leprosy.'
    reason: cultural_note
