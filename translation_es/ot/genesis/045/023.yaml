translation:
  language: es
  text: 'Y a su padre le envió esto: diez asnos que llevaban algunas de las mejores cosas de Egipto[a], y diez asnas que llevaban grano, pan y provisiones para el viaje de su padre.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «de lo mejor de Egipto» / «de la abundancia de Egipto».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּלְאָבִיו
  english_pob_choice: And to his father
  chosen_spanish: Y a su padre
  alternatives_spanish:
  - Y para su padre
  - Y a su padre mismo
  lexicon: WLC + HALOT
  rationale: El dativo hebreo se conserva de forma natural en español con 'a su padre'; no hace falta intensificarlo más allá del contexto narrativo.
- source_word: שָׁלַח כְּזֹאת
  english_pob_choice: he sent this
  chosen_spanish: le envió esto
  alternatives_spanish:
  - envió esto
  - mandó esto
  lexicon: WLC + HALOT
  rationale: '''Le envió esto'' mantiene el sentido resumptivo de כְזֹאת y la referencia al destinatario sin volver la frase rígida.'
- source_word: עֲשָׂרָה חֲמֹרִים
  english_pob_choice: ten donkeys
  chosen_spanish: diez asnos
  alternatives_spanish:
  - diez burros
  - diez mulos
  lexicon: WLC + HALOT
  rationale: '''Asnos'' es un equivalente directo y digno para חֲמֹרִים; evita el tono más coloquial de ''burros''.'
- source_word: נֹשְׂאִים
  english_pob_choice: carrying
  chosen_spanish: que llevaban
  alternatives_spanish:
  - que cargaban
  - cargados con
  lexicon: WLC + HALOT
  rationale: El participio expresa a los animales como portadores de la carga; 'que llevaban' suena natural y conserva la imagen sin añadir pasividad no explicitada.
- source_word: מִטּוּב מִצְרָיִם
  english_pob_choice: some of the best things of Egypt
  chosen_spanish: algunos de los mejores productos de Egipto
  alternatives_spanish:
  - de lo mejor de Egipto
  - algunos de los bienes de Egipto
  - algunos de los mejores dones de Egipto
  lexicon: HALOT
  rationale: טוּב aquí apunta a lo bueno/mejor de Egipto; 'productos' da una referencia concreta y comercial, mientras 'algunos de' preserva el matiz partitivo del מִן.
- source_word: וְעֶשֶׂר אֲתֹנֹת
  english_pob_choice: and ten female donkeys
  chosen_spanish: y diez asnas
  alternatives_spanish:
  - y diez burras
  - y diez asnas hembras
  lexicon: WLC + HALOT
  rationale: El hebreo distingue el femenino; 'asnas' comunica esa distinción de manera clara y sobria en español.
- source_word: נֹשְׂאֹת
  english_pob_choice: carrying
  chosen_spanish: que llevaban
  alternatives_spanish:
  - cargadas con
  - portando
  lexicon: WLC + HALOT
  rationale: Se mantiene el paralelismo con el primer grupo de animales y la función transportadora del participio.
- source_word: בָּר
  english_pob_choice: grain
  chosen_spanish: grano
  alternatives_spanish:
  - cereal
  - trigo
  lexicon: HALOT
  rationale: '''Grano'' es el equivalente más seguro y genérico; no precisa una especie concreta que el hebreo no nombra.'
- source_word: וָלֶחֶם
  english_pob_choice: bread
  chosen_spanish: pan
  alternatives_spanish:
  - panes
  - alimento
  lexicon: HALOT
  rationale: '''Leḥem'' suele ser ''pan'', y en la lista de provisiones de viaje mantiene su valor básico y reconocible.'
- source_word: וּמָזוֹן
  english_pob_choice: provisions
  chosen_spanish: provisiones
  alternatives_spanish:
  - víveres
  - alimentos
  lexicon: HALOT
  rationale: '''Provisiones'' conserva bien la idea de suministros para el trayecto y distingue este término del ''pan'' ya mencionado.'
- source_word: לַדָּרֶךְ
  english_pob_choice: for the journey
  chosen_spanish: para el viaje
  alternatives_spanish:
  - para el camino
  - para la ruta
  lexicon: HALOT
  rationale: '''Para el viaje'' es idiomático y claro en español moderno; conserva el sentido de provisión para el trayecto.'
translation_notes:
  revision_awareness: El texto coincide sustancialmente con la última revisión inglesa (sin cambios) y sigue el mismo juicio de alta concordancia; en español se mantiene la estructura narrativa y la partícula resumptiva de כְּזֹאת sin ampliar el contenido.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como norma del proyecto cuando corresponda, pero este versículo no contiene el nombre divino.
  - Se conservó el paralelismo de los dos grupos de animales y sus cargas para reflejar la simetría del hebreo.
  - '''Asnos/asnas'' se prefirió sobre términos más coloquiales para mantener un registro bíblico moderno y claro.'
  - '''Productos de Egipto'' preserva la amplitud semántica de טוּב sin reducirlo solo a ''bienes'' o solo a ''alimentos''.'
