  text: Entonces salió con tres mil soldados de infantería y cuatrocientos jinetes.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐξῆλθεν
  english_pob_choice: went out
  chosen_spanish: salió
  alternatives_spanish:
  - se fue
  - marchó
  lexicon: LSJ
  rationale: El aoristo de ἐξέρχομαι se rinde de manera directa con «salió», que conserva el movimiento narrativo sin añadir una idea militar más fuerte de la que exige el griego.
- source_word: μετὰ
  english_pob_choice: with
  chosen_spanish: con
  alternatives_spanish:
  - acompañado de
  lexicon: LSJ
  rationale: Aquí la preposición indica acompañamiento; «con» es la forma más natural y fiel en español.
- source_word: πεζῶν
  english_pob_choice: foot soldiers
  chosen_spanish: soldados de a pie
  alternatives_spanish:
  - infantería
  - hombres de a pie
  lexicon: LSJ
  rationale: πεζός contrasta con la caballería y significa uno que va a pie; «soldados de a pie» preserva el sentido militar en español moderno sin sonar técnico en exceso.
- source_word: τρισχιλίων
  english_pob_choice: three thousand
  chosen_spanish: tres mil
  lexicon: LSJ
  rationale: Número cardinal rendido de forma directa.
- source_word: ἱππέων
  english_pob_choice: horsemen
  chosen_spanish: de a caballo
  alternatives_spanish:
  - jinetes
  - caballería
  lexicon: LSJ
  rationale: ἱππεύς/ἱππέων nombra personas montadas; «de a caballo» conserva la referencia a los individuos sin convertirlos en una fuerza colectiva abstracta.
- source_word: τετρακοσίων
  english_pob_choice: four hundred
  chosen_spanish: cuatrocientos
  lexicon: LSJ
  rationale: Número cardinal rendido de forma directa.
translation_notes:
  revision_awareness: La versión en inglés no presenta notas ni tensiones textuales o teológicas en este versículo; la traducción española sigue de cerca el valor léxico del griego y mantiene la misma lectura narrativa simple.
  spanish_consistency_notes:
  - Se mantiene un español neutral y sobrio, apto para lectura pública.
  - Se evita «caballería» para no cambiar de personas a colectivo, en línea con la decisión inglesa sobre ἱππέων.
  - «Soldados de a pie» conserva el contraste militar con la montura sin recurrir a un calco duro como «pie-soldados».
