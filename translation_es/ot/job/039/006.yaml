translation:
  language: es
  text: al cual he dado el desierto[a] como su casa, y la tierra salitrosa[b][c] por su morada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la estepa» o «la llanura árida» para עֲרָבָה.
    reason: lexical_alternative
  - marker: b
    text: O «la salina» o «la tierra salada» para מְלֵחָה.
    reason: lexical_alternative
  - marker: c
    text: El hebreo usa el plural «sus moradas»; la traducción lo vierte en singular («morada») por naturalidad en español, entendiendo el plural como poético o intensivo.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲשֶׁר
  english_pob_choice: to whom
  chosen_spanish: al cual
  alternatives_spanish:
  - a quien
  - al que
  lexicon: HALOT
  rationale: El relativo retoma al asno montés del versículo anterior y aquí introduce el destinatario de la acción divina. En español, «al cual» mantiene un tono formal y claro sin añadir ambigüedad de caso.
- source_word: שַׂמְתִּי
  english_pob_choice: I have given
  chosen_spanish: he dado
  alternatives_spanish:
  - he puesto
  - he asignado
  - he establecido
  lexicon: HALOT
  rationale: Aunque el verbo hebreo puede significar «poner» o «establecer», en este contexto de habitat la idea es de asignación providencial. «He dado» sigue bien la lectura inglesa auditada y suena natural en español.
- source_word: עֲרָבָה
  english_pob_choice: the desert
  chosen_spanish: el desierto
  alternatives_spanish:
  - el desierto árido
  - la estepa
  - el Arabá
  lexicon: HALOT
  rationale: El término designa terreno árido de estepa o desierto. «El desierto» es la opción más clara y fiel para español general; «Arabá» sería demasiado técnico/toponímico en este contexto poético.
- source_word: בֵיתוֹ
  english_pob_choice: for his house
  chosen_spanish: por su casa
  alternatives_spanish:
  - como su casa
  - para su casa
  - por su hogar
  lexicon: HALOT
  rationale: El hebreo dice literalmente «su casa»; el sentido es metafórico, como lugar de habitación. «Por su casa» conserva la construcción relacional sin forzar una equivalencia más interpretativa como «hogar».
- source_word: וּמִשְׁכְּנוֹתָיו
  english_pob_choice: and ... for his dwelling place
  chosen_spanish: y la tierra salitrosa ... por su morada
  alternatives_spanish:
  - y sus moradas
  - y sus viviendas
  - y su morada
  lexicon: HALOT
  rationale: El plural hebreo puede ser intensivo o poético. En español, la forma singular «morada» mantiene naturalidad y el sentido de habitación, mientras que el plural se preserva en nota por su valor textual.
- source_word: מְלֵחָה
  english_pob_choice: the salt land
  chosen_spanish: la tierra salitrosa
  alternatives_spanish:
  - la salina
  - la salitral
  - la tierra salada
  lexicon: HALOT
  rationale: La expresión apunta a terreno afectado por sal, estéril o improductivo. «Tierra salitrosa» reproduce bien el matiz del sustantivo/adjetivo hebreo sin reducirlo solo a una formación geográfica específica.
translation_notes:
  revision_awareness: 'El texto español sigue de cerca el hebreo de Job 39:6 y también considera la solución auditada del POB en inglés. Se conservaron las tres imágenes del versículo: desierto, casa/morada y tierra salitrosa, sin suavizar la fuerza poética ni convertir el plural hebreo en un equivalente mecánico.'
  spanish_consistency_notes:
  - Se usó «Dios» implícito en primera persona por el contexto inmediato, sin añadir sujeto explícito innecesario.
  - Se mantuvo un registro bíblico moderno y digno, evitando arcaísmos innecesarios.
  - «Morada» se eligió por claridad; la nota preserva la pluralidad hebrea relevante.
