translation:
  language: es
  text: Y cada vez que Yehudí leía tres o cuatro columnas[a], él la cortaba con la navaja del escriba y la arrojaba al fuego que estaba en el brasero[b], hasta que todo el rollo se consumió en el fuego que estaba en el brasero.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: ''tres o cuatro puertas''; aquí la expresión se refiere a divisiones del rollo, probablemente columnas o paneles.'
    reason: lexical_alternative
  - marker: b
    text: O 'fogón' o 'recipiente de fuego' para 'brasero'.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּקְרֹא
  english_pob_choice: whenever ... had read
  chosen_spanish: cada vez que ... había leído
  alternatives_spanish:
  - cuando ... leía
  - mientras ... leía
  lexicon: HALOT
  rationale: La construcción temporal iterativa pide en español una repetición de acción, no un solo momento. 'Cada vez que ... había leído' conserva el valor reiterado del relato mejor que un simple 'cuando'.
- source_word: יְהוּדִי
  english_pob_choice: Yehudi
  chosen_spanish: Yehudí
  alternatives_spanish:
  - Jehudí
  lexicon: HALOT
  rationale: Nombre propio transliterado desde el hebreo. Se prefiere una forma que refleje más de cerca la vocalización hebrea y mantenga consistencia con el proyecto.
- source_word: שָׁלֹשׁ דְּלָתוֹת וְאַרְבָּעָה
  english_pob_choice: three or four columns
  chosen_spanish: tres o cuatro columnas
  alternatives_spanish:
  - tres o cuatro hojas
  - tres o cuatro secciones
  - tres o cuatro puertas
  lexicon: HALOT
  rationale: Aunque el hebreo literalmente dice 'puertas', en este contexto se refiere a divisiones sucesivas del rollo leído. 'Columnas' es la opción española más clara y fiel al uso del POB inglés.
- source_word: יִקְרָעֶהָ
  english_pob_choice: would cut it off
  chosen_spanish: lo cortaba
  alternatives_spanish:
  - lo rasgaba
  - lo cortaba y lo quitaba
  lexicon: HALOT
  rationale: El verbo hebreo puede sugerir 'rasgar', pero aquí va acompañado por el instrumento de corte, lo que apunta a cortar físicamente la sección leída. En español, 'lo cortaba' comunica la acción repetida sin añadir más de lo que el texto garantiza.
- source_word: בְּתַעַר הַסֹּפֵר
  english_pob_choice: with the scribe’s knife
  chosen_spanish: con la navaja del escriba
  alternatives_spanish:
  - con el cuchillo del escriba
  - con la hoja del escriba
  - con la navaja del secretario
  lexicon: HALOT
  rationale: תער es una hoja cortante/rastrillo/navaja; 'navaja' transmite mejor una herramienta pequeña y afilada que se usa para cortar pergamino. 'Escriba' preserva el oficio literario-administrativo del contexto.
- source_word: וְהַשְׁלֵךְ
  english_pob_choice: and throw it
  chosen_spanish: y lo arrojaba
  alternatives_spanish:
  - y lo echaba
  - y lo lanzaba
  - y lo tiraba
  lexicon: HALOT
  rationale: El verbo describe el desecho del fragmento al fuego como parte de una serie de acciones repetidas. 'Arrojaba' mantiene la fuerza del movimiento y un registro digno.
- source_word: הָאָח
  english_pob_choice: the brazier
  chosen_spanish: el brasero
  alternatives_spanish:
  - el fogón
  - el recipiente de fuego
  - la brasera
  lexicon: HALOT
  rationale: אָח denota un recipiente o dispositivo de fuego en el contexto doméstico. 'Brasero' es la equivalencia española más natural y precisa para esa realidad.
- source_word: עַד תֹּם כָּל הַמְּגִלָּה
  english_pob_choice: until the entire scroll was consumed
  chosen_spanish: hasta que todo el rollo fue consumido
  alternatives_spanish:
  - hasta que se acabó todo el rollo
  - hasta que el rollo entero fue consumido
  lexicon: HALOT
  rationale: '''Fue consumido'' expresa el resultado final de la quema, en paralelo con el inglés POB. ''Rollo'' es el equivalente español usual de מְגִלָּה y funciona mejor en este contexto que ''scroll''.'
- source_word: הַמְּגִלָּה
  english_pob_choice: scroll
  chosen_spanish: rollo
  alternatives_spanish:
  - pergamino
  - libro
  lexicon: HALOT
  rationale: מְגִלָּה es el escrito enrollado. 'Rollo' es natural en español y conserva la imagen material del texto destruido.
- source_word: עַל הָאֵשׁ אֲשֶׁר עַל הָאָח / אֶל הָאֵשׁ אֲשֶׁר אֶל הָאָח
  english_pob_choice: in the fire that was in the brazier
  chosen_spanish: en el fuego que estaba en el brasero
  alternatives_spanish:
  - sobre el fuego que estaba en el brasero
  - en el fuego del brasero
  - en el fuego que estaba en el brasero
  lexicon: HALOT
  rationale: El hebreo usa preposiciones que, tomadas literalmente, sonarían extrañas en español. 'En el fuego que estaba en el brasero' comunica con naturalidad la relación entre el fuego y el brasero sin perder el sentido básico ni introducir una explicación ajena al texto.
translation_notes:
  revision_awareness: Se siguió la revisión auditada del inglés POB que eliminó un sujeto explícito no presente en el hebreo. Por eso el español conserva el sujeto implícito 'él' sin importar 'el rey' al verbo de cortar. También se mantuvo la iteración ('cada vez que') y la progresión de acciones repetidas del pasaje.
  spanish_consistency_notes:
  - Se usa 'Yehudí' para el nombre propio, en línea con la transliteración directa desde el hebreo.
  - Se prefiere 'rollo' para מְגִלָּה y 'brasero' para הָאָח, con nota para la alternativa léxica.
  - La construcción repetitiva se expresa con imperfectos ('había leído', 'cortaba', 'arrojaba') para reflejar la acción iterativa del relato.
  - No se introdujo 'rey' como sujeto explícito del verbo hebreo, siguiendo la corrección auditada del inglés POB.
