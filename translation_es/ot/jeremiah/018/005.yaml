translation:
  language: es
  text: Entonces vino a mí la palabra de Yahvé[a], diciendo,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Y sucedió que la palabra de Yahvé vino a mí, diciendo»; tradicionalmente, «la palabra del SEÑOR».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִ֥י
  english_pob_choice: Then ... came
  chosen_spanish: Entonces ... vino
  alternatives_spanish:
  - Y sucedió que ... vino
  - Y aconteció que ... vino
  lexicon: HALOT
  rationale: La forma waw-consecutiva introduce una nueva acción en secuencia narrativa. En español, «Entonces» transmite bien la progresión sin recurrir a una fórmula arcaica, y «vino» mantiene la imagen del evento que llega al profeta.
- source_word: דְבַר
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - el mensaje
  - una palabra
  lexicon: HALOT
  rationale: En la fórmula profética, דבר puede implicar 'palabra' o 'mensaje'. «La palabra» conserva el giro establecido y la referencia a una comunicación divina específica.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: El texto hebreo usa explícitamente el Nombre divino. Siguiendo la convención del proyecto, se translitera como «Yahvé» en español, preservando el nombre personal en vez de sustituirlo por un título.
- source_word: אֵלַי
  english_pob_choice: to me
  chosen_spanish: a mí
  alternatives_spanish:
  - para mí
  - hacia mí
  lexicon: HALOT
  rationale: La preposición más sufijo de primera persona indica dirección hacia Jeremías. «A mí» es la equivalencia natural y clara en español moderno.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - con estas palabras
  lexicon: HALOT
  rationale: El infinitivo introduce el discurso siguiente. «Diciendo» reproduce la función de enlace de manera directa y se integra de forma natural en español.
theological_decisions:
- issue: Renderización del Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: La lectura auditada del POB inglés decide preservar el Nombre divino como transliteración. En español, «Yahvé» es la forma establecida por el proyecto para mantener esa misma decisión sin ocultar el Tetragrámaton bajo un sustituto titulado.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: El contexto inglés muestra alta concordancia y ningún cambio textual en la última pasada de revisión. La versión española sigue esa misma lectura sin introducir variantes no sustentadas.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme al estándar del proyecto para el Nombre divino.
  - Se conserva la fórmula profética breve y directa, sin añadir elementos interpretativos.
  - «Diciendo» funciona como enlace al discurso siguiente y evita una paráfrasis más libre.
