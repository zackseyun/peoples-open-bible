translation:
  language: es
  text: Y líbranos conforme a tus obras maravillosas[a], y da gloria a tu nombre, Señor[b];
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tus hechos maravillosos» para «tus obras maravillosas».
    reason: lexical_alternative
  - marker: b
    text: La expresión «da gloria a tu nombre» conserva el modismo bíblico de honrar el nombre revelado de Dios; compárese la redacción más interpretativa «glorifica tu nombre».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξελοῦ
  english_pob_choice: deliver
  chosen_spanish: líbranos
  alternatives_spanish:
  - sálvanos
  - rescátanos
  lexicon: BDAG
  rationale: En una súplica dirigida a Dios, el imperativo de ἐξαιρέω expresa pedir intervención salvadora. «Líbranos» comunica bien la petición de rescate sin volverla mecánica ni demasiado explicativa.
- source_word: κατὰ
  english_pob_choice: according to
  chosen_spanish: conforme a
  alternatives_spanish:
  - según
  - en conformidad con
  lexicon: BDAG
  rationale: La relación con τὰ θαυμάσιά σου pide una equivalencia formal clara. «Conforme a» conserva la idea de medida o ajuste a las acciones poderosas de Dios y suena natural en español bíblico.
- source_word: τὰ θαυμάσιά σου
  english_pob_choice: your wondrous deeds
  chosen_spanish: tus obras maravillosas
  alternatives_spanish:
  - tus prodigios
  - tus maravillas
  lexicon: BDAG
  rationale: El sustantivo apunta a intervenciones extraordinarias de Dios. «Obras maravillosas» mantiene el valor de acciones concretas, no solo de “maravillas” abstractas, y refleja bien el ajuste revisado del inglés a «wondrous deeds».
- source_word: δὸς δόξαν
  english_pob_choice: give glory
  chosen_spanish: da gloria
  alternatives_spanish:
  - otorga gloria
  - rinde gloria
  lexicon: BDAG
  rationale: El griego usa un imperativo directo con δόξαν. «Da gloria» reproduce con sencillez la forma verbal y mantiene la estructura de súplica litúrgica.
- source_word: τῷ ὀνόματί σου
  english_pob_choice: to your name
  chosen_spanish: a tu nombre
  alternatives_spanish:
  - para tu nombre
  - a tu Nombre
  lexicon: BDAG
  rationale: Se conserva el idiomático «nombre» como sede del honor y la revelación divina. «A tu nombre» corresponde mejor al dativo griego en español que «para tu nombre», sin perder el sentido teológico.
- source_word: Κύριε
  english_pob_choice: O Lord
  chosen_spanish: oh Señor
  alternatives_spanish:
  - Señor
  - oh Yahvé
  lexicon: BDAG
  rationale: El vocativo de oración se vierte de manera solemne con «oh». Aunque el proyecto normalmente traduce el Tetragrámaton como «Yahvé», aquí el source source is Greek κύριε in una invocación litúrgica; por eso se conserva «Señor», que corresponde al audit trail inglés y a la forma directa de dirección a Dios.
theological_decisions:
- issue: Tratamiento de κύριε en una oración litúrgica griega
  english_pob_reading: O Lord
  chosen_spanish_reading: oh Señor
  alternative_spanish_readings:
  - Señor
  - oh Yahvé
  rationale: El texto griego invoca a Dios mediante κύριε, no mediante el Tetragrámaton. En español, «oh Señor» conserva el vocativo devocional y evita forzar una identificación textual que no está explícita en este versículo.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Sentido bíblico de 'nombre'
  english_pob_reading: to your name
  chosen_spanish_reading: a tu nombre
  alternative_spanish_readings:
  - para tu nombre
  - a tu reputación
  rationale: La frase mantiene el valor bíblico-teológico del nombre como lugar de honor, autoridad y revelación, en vez de reducirlo a una explicación secularizada como 'reputación'.
  doctrine_reference: DOCTRINE.md §1, §3, §6
translation_notes:
  revision_awareness: El texto inglés revisado pasó de 'your wonders' a 'your wondrous deeds', afinando el sustantivo para referirse más precisamente a acciones divinas extraordinarias. La versión española refleja esa precisión con 'obras maravillosas' y mantiene la estructura de súplica breve y paralela del original griego.
  spanish_consistency_notes:
  - Se evita 'SEÑOR' como máscara tipográfica; se usa 'Señor' como vocativo de oración según el griego κύριε.
  - Se preserva 'nombre' en sentido bíblico-teológico, no como simple 'reputación'.
  - El registro es reverente y sobrio, con equivalencia formal cercana al griego y compatible con lectura eclesial amplia.
