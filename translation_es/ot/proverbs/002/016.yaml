translation:
  language: es
  text: para rescatarte de la mujer ajena[a], de la extranjera cuyas palabras son suaves[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la mujer extraña»; en Proverbios esta expresión a menudo se refiere a una mujer fuera de los límites apropiados del pacto o del matrimonio, no meramente a alguien étnicamente extranjera.
    reason: lexical_alternative
  - marker: b
    text: O «cuyas palabras son halagadoras».
    reason: lexical_alternative
lexical_decisions:
- source_word: לְהַצִּילְךָ
  english_pob_choice: to rescue you
  chosen_spanish: rescatarte
  alternatives_spanish:
  - librarte
  - salvarte
  lexicon: HALOT
  rationale: 'El infinitivo causativo con sufijo de 2ms expresa finalidad: el propósito es sacar al destinatario del peligro. «Rescatarte» conserva la idea de liberación desde una amenaza concreta, sin cargar innecesariamente el matiz teológico de «salvarte».'
- source_word: מֵאִשָּׁה
  english_pob_choice: from the ... woman
  chosen_spanish: de la mujer
  alternatives_spanish:
  - de una mujer
  lexicon: HALOT
  rationale: El hebreo marca separación con מִן; en español, «de la mujer» fluye bien en este contexto sapiencial, donde el tipo ya está presentado como figura advertida.
- source_word: זָרָה
  english_pob_choice: strange/forbidden woman
  chosen_spanish: mujer extraña
  alternatives_spanish:
  - mujer forastera
  - mujer prohibida
  - mujer extraña, es decir, apartada
  lexicon: HALOT
  rationale: «זָרָה» significa literalmente «extraña/ajena». La POB inglesa preserva la tensión entre lo literal y lo moralmente connotado; en español «mujer extraña» mantiene esa ambigüedad sin fijarla prematuramente en una sola categoría moral.
- source_word: מִנָּכְרִיָּה
  english_pob_choice: from the foreign woman
  chosen_spanish: de la extranjera
  alternatives_spanish:
  - de la forastera
  - de la mujer extranjera
  - de la outsider
  lexicon: HALOT
  rationale: «נָכְרִיָּה» apunta a lo foráneo/ajeno. «La extranjera» mantiene el paralelismo con «mujer extraña» y deja visible la doble descripción del mismo personaje, sin convertirla en dos mujeres distintas.
- source_word: אֲמָרֶיהָ
  english_pob_choice: whose words
  chosen_spanish: cuyas palabras
  alternatives_spanish:
  - cuyos dichos
  - su habla
  lexicon: HALOT
  rationale: El plural constructo «sus palabras/dichos» se vierte naturalmente como «cuyas palabras», que refleja bien la relación posesiva y suena fluido en español.
- source_word: הֶחֱלִיקָה
  english_pob_choice: are smooth
  chosen_spanish: son suaves
  alternatives_spanish:
  - son lisonjeras
  - son halagadoras
  - resbalan
  lexicon: HALOT
  rationale: El verbo Hifil de חלק literalmente comunica «hacer liso/suave» y, por metáfora, habla de discurso seductor o lisonjero. «Son suaves» preserva la imagen sin forzar una interpretación más marcada; el matiz de halago queda implícito.
theological_decisions:
- issue: La relación entre «mujer extraña» y «extranjera»
  english_pob_reading: The English POB keeps both expressions and notes that in Proverbs this refers often to a woman outside proper covenantal or marital bounds, not merely ethnically foreign.
  chosen_spanish_reading: «Mujer extraña» y «la extranjera» se conservan como dos descripciones paralelas de una misma figura, con posible carga moral y no solo étnica.
  alternative_spanish_readings:
  - «mujer prohibida»
  - «mujer inmoral»
  - «mujer forastera»
  rationale: El hebreo presenta dos términos en paralelismo que se refuerzan mutuamente. Traducirlos con un solo valor moral cerraría la tensión lexical; traducirlos solo como etnicidad diluiría el uso sapiencial. La formulación elegida deja abierta la lectura contextual sin sobreexplicar.
  doctrine_reference: Proverbios 2:16; cf. uso sapiencial de זרה / נכריה en Proverbios 5-7
translation_notes:
  revision_awareness: 'La redacción sigue el último pase de revisión que volvió a una forma más fiel al hebreo: mantener el paralelismo explícito entre «mujer extraña» y «la extranjera», y conservar el valor metafórico de הֶחֱלִיקָה como «suaves» en lugar de interpretarlo directamente como «halagadoras».'
  spanish_consistency_notes:
  - Se preservó «Yahvé» como default del proyecto cuando corresponda, pero este versículo no contiene el tetragrámaton.
  - Se mantuvo un estilo bíblico moderno y sobrio, evitando tanto arcaísmos como paráfrasis excesiva.
  - La puntuación con coma reproduce la apposición poética del hebreo y evita que parezcan dos rescates distintos.
