  and ⲉⲧⲉⲧⲛⲧⲁⲩⲟ is incomplete/unclear. I render the last clause with an ellipsis and
  footnote to avoid false precision. Note: some English consult editions place “I
  am sinless, and the root of sin is from me” near this area, but the present OCR
  excerpt corresponds instead to the name/sound/hearing motif.'
