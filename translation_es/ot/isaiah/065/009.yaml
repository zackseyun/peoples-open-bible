  yaml_path: translation/ot/isaiah/065/009.yaml
  text: And I will bring forth offspring from Jacob[a], and from Judah an heir of my mountains; my chosen ones will possess it[b], and my servants will dwell there.
  footnotes:
  - marker: a
    text: Or 'seed from Jacob.' The Hebrew זֶרַע is a collective singular that can mean 'seed,' 'offspring,' or 'descendants.'
    reason: lexical_alternative
  - marker: b
    text: Or 'will inherit them.' The same Hebrew root is used for both 'an heir' and 'will possess them,' emphasizing inheritance and possession together.
    reason: lexical_alternative
