translation:
  language: es
  text: Y su rival la provocaba[a] amargamente, para irritarla, porque Yahvé había cerrado su vientre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘su coesposa’; el término hebreo se refiere a una mujer en una relación marital rival dentro del hogar.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכִעֲסַתָּה
  english_pob_choice: would provoke
  chosen_spanish: la irritaba
  alternatives_spanish:
  - la provocaba
  - la vexaba
  - la enojaba
  lexicon: HALOT
  rationale: El verbo causativo de כעס pide una idea de provocar/irritar. En español, 'irritaba' comunica bien la acción repetida o habitual del contexto narrativo sin forzar una repetición demasiado pesada.
- source_word: צָרָתָהּ
  english_pob_choice: her rival
  chosen_spanish: su rival
  alternatives_spanish:
  - su adversaria
  - su coesposa
  lexicon: HALOT
  rationale: '''Rival'' mantiene la relación hostil entre las dos mujeres y sigue siendo natural en español. ''Coesposa'' explicita la situación matrimonial, pero resulta más interpretativa para el texto principal.'
- source_word: גַּם כַּעַס
  english_pob_choice: bitterly
  chosen_spanish: amargamente
  alternatives_spanish:
  - también con amargura
  - muchísimo
  - con gran enojo
  lexicon: HALOT
  rationale: La expresión intensifica el acto de provocar. 'Amargamente' conserva la carga afectiva fuerte del hebreo y evita una paráfrasis más libre.
- source_word: בַּעֲבוּר
  english_pob_choice: in order to
  chosen_spanish: para
  alternatives_spanish:
  - con el fin de
  - a fin de
  lexicon: HALOT
  rationale: '''Para'' expresa bien la finalidad del verbo siguiente en español y mantiene la relación sintáctica de propósito.'
- source_word: הַרְּעִמָהּ
  english_pob_choice: irritate her
  chosen_spanish: irritarla
  alternatives_spanish:
  - afligirla
  - perturbarla
  - hacerla temblar
  lexicon: HALOT
  rationale: El verbo raro apunta a causar agitación o aflicción. 'Irritarla' reproduce de manera breve y clara el efecto buscado por la rival.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
  rationale: Se conserva el nombre divino como 'Yahvé', siguiendo la convención del proyecto y evitando la sustitución por un título.
- source_word: בְּעַד רַחְמָהּ
  english_pob_choice: her womb
  chosen_spanish: su vientre
  alternatives_spanish:
  - su matriz
  - su útero
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente 'womb', en español bíblico contemporáneo 'vientre' comunica de forma digna y natural la imagen de la matriz cerrada. 'Matriz' es más técnico y 'útero' más médico.
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton. En el español del POB se mantiene el nombre propio de Dios, 'Yahvé', para preservar la referencia personal y de pacto del original.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el estado de revisión más reciente: no hubo cambios aplicados y el cotejo previo mostró alta concordancia, por lo que no se introdujeron ajustes textuales adicionales más allá de la adaptación al español.'
  spanish_consistency_notes:
  - Se usó 'Yahvé' de manera coherente con la política terminológica del proyecto.
  - Se prefirió 'vientre' para la imagen corporal del hebreo, evitando una lectura excesivamente médica.
  - Se mantuvo la doble idea de provocación e irritación con dos verbos distintos, como en el audit trail inglés.
