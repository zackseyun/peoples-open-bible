lexical_decisions:
- source_word: Ἐπὶ δυτὶ
  english_pob_choice: Over two things
  chosen_spanish: Sobre dos cosas
  alternatives_spanish:
  - Por dos cosas
  - A causa de dos cosas
  - Por dos motivos
  lexicon: LSJ
  rationale: ἐπί con dativo marca aquí la ocasión o base del pesar; en español, «sobre» reproduce bien esa relación y conserva el planteamiento enumerativo del dicho.
- source_word: λελύπηται
  english_pob_choice: is grieved
  chosen_spanish: se entristece
  alternatives_spanish:
  - está entristecido
  - está afligido
  - siente pesar
  lexicon: LSJ
  rationale: El perfecto medio/pasivo expresa un estado presente derivado del sufrimiento; «se entristece» comunica ese estado de manera natural en español sin perder la fuerza estativa.
- source_word: ἡ καρδία μου
  english_pob_choice: my heart
  chosen_spanish: mi corazón
  alternatives_spanish:
  - mi interior
  - mi mente
  - mi ser
  lexicon: LSJ
  rationale: La traducción literal es fiel y comprensible; «corazón» conserva el centro afectivo del hablante sin añadir paráfrasis.
- source_word: ἐπὶ τῷ τρίτῳ
  english_pob_choice: over the third
  chosen_spanish: por la tercera
  alternatives_spanish:
  - sobre la tercera
  - a causa de la tercera
  - por el tercer motivo
  lexicon: LSJ
  rationale: La segunda cláusula debe mantener el paralelismo con la primera. «Por la tercera» suena natural en español y preserva la progresión retórica hacia un tercer elemento culminante.
- source_word: θυμός
  english_pob_choice: anger
  chosen_spanish: ira
  alternatives_spanish:
  - enojo
  - cólera
  - indignación
  lexicon: LSJ
  rationale: θυμός denota una ira intensa o apasionada. «Ira» mantiene el peso léxico y el registro bíblico sin diluir la intensidad en un término demasiado coloquial.
- source_word: μοι ἐπῆλθεν
  english_pob_choice: came upon me
  chosen_spanish: me sobrevino
  alternatives_spanish:
  - vino sobre mí
  - me invadió
  - me acometió
  lexicon: LSJ
  rationale: El verbo compuesto con dativo expresa que la ira alcanza al hablante. «Me sobrevino» conserva esa idea de irrupción o acometida sin decidir indebidamente si la causa es interna o externa.
translation_notes:
  revision_awareness: El texto griego y el control cruzado coinciden sustancialmente con la lectura inglesa auditada; no se requieren cambios de fondo. Se mantuvo el paralelismo de la sentencia y la cualidad estativa de «λελύπηται».
  spanish_consistency_notes:
  - Se conservó «corazón» como centro afectivo, en línea con el uso bíblico habitual y con el auditable «my heart».
  - Se eligió «ira» para θυμός por ser más fuerte y más cercano al registro sapiencial que «enojo».
  - La nota al pie se ancla en toda la cláusula porque la incompletitud afecta a la unidad entera de la frase.
