revisions:
- from: 'Y yo vi, y supliqué ante el rostro del Señor, y dije: «Basta, Señor,[a][b][c] de tu mano que pesa sobre Israel, por el ataque de las naciones».'
  to: 'Y yo vi, y supliqué el favor de Yahvé[a], y dije: «Basta, Yahvé,[b][c] de que tu mano pese sobre Israel por el ataque de las naciones[d]».'
  rationale: Se ajustó κύριος a «Yahvé» según la política terminológica del proyecto para el nombre divino en el texto principal. Se reemplazó «supliqué ante el rostro» por «supliqué el favor de Yahvé», que preserva mejor en español el sentido del modismo semítico detrás de τοῦ προσώπου Κυρίου sin sonar torpe. También se reestructuró la cláusula con «de que tu mano pese sobre Israel» para reflejar mejor el infinitivo articular griego y mejorar la fluidez.
