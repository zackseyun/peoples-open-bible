  glossary_alignment: No hay conflictos con la terminología base del proyecto en este versículo. La personificación femenina de Jerusalén se conserva adecuadamente con «en ella». La distinción entre los dos verbos de alegría también se mantiene. La nota sobre la alternativa de «clamor» permanece válida.
