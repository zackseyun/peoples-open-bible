revisions:
- from: No calumnia con su lengua[a], no hace mal a su prójimo[b], y no levanta oprobio contra su cercano[c].
  to: No calumnia con su lengua[a], no hace mal a su prójimo[b], y no dirige reproche contra el que tiene cerca[c].
  rationale: Se revisa la tercera cláusula para lograr un español natural y fiel al sentido idiomático de חֶרְפָּה לֹא נָשָׂא עַל קְרֹבוֹ. 'Dirige reproche contra' comunica mejor el acto de cargar o lanzar afrenta contra alguien, y 'el que tiene cerca' evita el giro poco idiomático 'su cercano' mientras la nota conserva la amplitud semántica del hebreo. Se mantienen las demás decisiones porque son suficientemente fieles y legibles.
