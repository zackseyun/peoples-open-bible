translation:
  language: es
  text: Levántate[a], desciende al encuentro de Acab, rey de Israel, que está en Samaria. Mira, está en la viña de Nabot, donde ha bajado para tomar posesión de ella.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para poseerla». El verbo hebreo puede denotar tomar posesión, poseer o heredar, según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: ק֣וּם
  english_pob_choice: Arise
  chosen_spanish: Levántate
  alternatives_spanish:
  - Alzate
  - Levántate y ve
  lexicon: HALOT
  rationale: El imperativo de קום pide una orden breve y enérgica. En español, «Levántate» conserva el registro profético inmediato mejor que una paráfrasis más larga.
- source_word: רֵ֗ד
  english_pob_choice: go down
  chosen_spanish: desciende
  alternatives_spanish:
  - baja
  - ve hacia abajo
  lexicon: HALOT
  rationale: ירד expresa movimiento hacia abajo. «Desciende» mantiene la dirección con dignidad estilística; «baja» sería más coloquial.
- source_word: לִקְרַאת
  english_pob_choice: to meet
  chosen_spanish: al encuentro de
  alternatives_spanish:
  - para encontrarte con
  - a confrontar
  lexicon: HALOT
  rationale: La construcción preposicional + infinitivo comunica un movimiento hacia un encuentro. «Al encuentro de» evita añadir la idea de confrontación, que no está explicitada en el hebreo.
- source_word: מֶלֶךְ יִשְׂרָאֵל
  english_pob_choice: king of Israel
  chosen_spanish: rey de Israel
  alternatives_spanish:
  - el rey de Israel
  lexicon: HALOT
  rationale: Título real directo en constructo. «Rey de Israel» conserva el valor nominal del hebreo y fluye naturalmente en español.
- source_word: אֲשֶׁר בְּשֹׁמְרוֹן
  english_pob_choice: who is in Samaria
  chosen_spanish: que está en Samaria
  alternatives_spanish:
  - que reside en Samaria
  - que se encuentra en Samaria
  lexicon: HALOT
  rationale: El hebreo es una cláusula relativa locativa sin verbo expreso; en español se requiere suplirlo. «Está» es la solución más simple y natural.
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira, pues
  - Observa
  lexicon: HALOT
  rationale: La partícula deíctica llama la atención del oyente. «Mira» reproduce la inmediatez sin recurrir a un arcaísmo como «he aquí».
- source_word: בְּכֶרֶם נָבוֹת
  english_pob_choice: in the vineyard of Naboth
  chosen_spanish: en la viña de Nabot
  alternatives_spanish:
  - en el viñedo de Nabot
  - en la viña que es de Nabot
  lexicon: HALOT
  rationale: ב marca ubicación. «Viña» es la opción más natural y bíblica para כרם; «de Nabot» conserva la relación posesiva del nombre propio.
- source_word: אֲשֶׁר יָרַד שָׁם
  english_pob_choice: where he has gone down
  chosen_spanish: adonde ha bajado
  alternatives_spanish:
  - donde bajó
  - adonde descendió
  lexicon: HALOT
  rationale: El relativo local expresa destino/lugar asociado al movimiento. «Adonde ha bajado» enlaza bien con la situación presente y mantiene el sentido direccional del verbo.
- source_word: לְרִשְׁתּוֹ
  english_pob_choice: to take possession of it
  chosen_spanish: para tomar posesión de ella
  alternatives_spanish:
  - para poseerla
  - para heredarla
  - para apoderarse de ella
  lexicon: HALOT
  rationale: ירש puede significar poseer, heredar o tomar posesión según el contexto. Aquí el contexto de la viña recién adquirida por apropiación legal hace que «tomar posesión» sea la mejor equivalencia; «de ella» se ajusta al género femenino de «viña».
theological_decisions:
- issue: Referencia al nombre divino
  english_pob_reading: This verse contains no explicit divine-name rendering decision.
  chosen_spanish_reading: No se introduce ninguna decisión sobre Yahvé en este versículo.
  alternative_spanish_readings:
  - Sustituir por «SEÑOR»
  rationale: El versículo no contiene el tetragrámaton ni una cita directa de κύριος; por tanto, no hay motivo para introducir la convención «SEÑOR».
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'Se revisó el contexto auditado en inglés y no se detectaron cambios posteriores: la versión inglesa permanece estable, con acuerdo alto y sin revisiones aplicadas. La traducción española sigue esa lectura y conserva la ambigüedad lexical documentada en לְרִשְׁתּוֹ mediante una nota.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera del texto principal porque el versículo no lo contiene.
  - Se prefirió «viña» por ser el equivalente bíblico natural de כרם; no se usó «viñedo», que suena menos preciso en este contexto.
  - Se conservó la distinción entre movimiento literal («desciende», «ha bajado») y propósito posesivo («tomar posesión»).
  - Se usó el pronombre femenino «ella» porque el referente inmediato es «la viña».
