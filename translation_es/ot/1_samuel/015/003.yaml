translation:
  language: es
  text: Ahora ve y ataca a Amalec[a], y consagra a la destrucción todo lo que le pertenece. No lo perdones, sino mata de hombre a mujer, de niño a lactante, de buey a oveja[b], de camello a asno.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘destruye por completo’ o ‘pon bajo el anatema’. El verbo hebreo lleva la idea de consagrar algo irrevocablemente a la destrucción bajo juicio divino.
    reason: lexical_alternative
  - marker: b
    text: El singular ‘Amalec’ y, en este versículo, los pronombres singulares se refieren al pueblo amalecita como entidad corporativa.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַתָּה
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Pues ahora
  - En este momento
  lexicon: HALOT
  rationale: Funciona como marcador discursivo-temporal que introduce la orden; 'Ahora' es natural en español y conserva la inmediatez del mandato.
- source_word: לֵךְ
  english_pob_choice: go
  chosen_spanish: ve
  alternatives_spanish:
  - ve allá
  - parta
  lexicon: HALOT
  rationale: El imperativo de הלך se expresa de forma directa con 've'; evita solemnidad arcaica y mantiene la brevedad del hebreo.
- source_word: וְהִכִּיתָה
  english_pob_choice: strike
  chosen_spanish: golpea
  alternatives_spanish:
  - hiere
  - ataca
  lexicon: HALOT
  rationale: '''Golpea'' preserva el valor básico de נכה como acción violenta directa. Aunque ''hiere'' y ''ataca'' son posibles, ''golpea'' comunica mejor la concisión y la fuerza del mandato sin introducir un matiz militar más amplio que el hebreo.'
- source_word: עֲמָלֵק
  english_pob_choice: Amalek
  chosen_spanish: Amalec
  alternatives_spanish:
  - Amalek
  - el amalecita
  lexicon: HALOT
  rationale: Se mantiene el nombre propio bíblico en forma castellana habitual 'Amalec', sin convertirlo en un etnónimo interpretativo en el texto principal.
- source_word: וְהַחֲרַמְתֶּם
  english_pob_choice: devote to destruction
  chosen_spanish: consagra a destrucción
  alternatives_spanish:
  - entrega a destrucción
  - consagra al anatema
  lexicon: HALOT
  rationale: חרם conserva una carga técnico-sacral de apartar algo para destrucción bajo juicio divino. 'Consagra a destrucción' intenta retener esa tensión, evitando tanto la banalización de 'destruye' como una fórmula eclesiástica no transparentada. Se evita 'anatema' por su peso tradicional en español y porque puede sonar más doctrinal que textual.
- source_word: כָּל אֲשֶׁר לוֹ
  english_pob_choice: all that belongs to him
  chosen_spanish: todo lo que le pertenece
  alternatives_spanish:
  - todo lo que es suyo
  - todo cuanto tiene
  lexicon: HALOT
  rationale: La frase abarca posesiones y dependientes; 'le pertenece' es amplio, idiomático y mantiene el alcance totalizante del hebreo.
- source_word: וְלֹא תַחְמֹל עָלָיו
  english_pob_choice: Do not spare him
  chosen_spanish: No lo perdones
  alternatives_spanish:
  - No tengas compasión de él
  - No lo ahorres
  lexicon: HALOT
  rationale: חמל significa no perdonar/ahorrar, no mostrar compasión en contexto judicial o bélico. 'No lo perdones' conserva la negativa absoluta; se evita 'compasión' en el texto principal para no volver la frase más explicativa que el hebreo.
- source_word: וְהֵמַתָּה
  english_pob_choice: put to death
  chosen_spanish: mata
  alternatives_spanish:
  - haz morir
  - da muerte a
  lexicon: HALOT
  rationale: מות en causativo se expresa con un verbo directo en español. 'Mata' es breve, solemne y fiel al mandato de ejecución; 'haz morir' sería más literal pero menos natural.
- source_word: מֵאִישׁ עַד אִשָּׁה
  english_pob_choice: from man to woman
  chosen_spanish: de hombre a mujer
  alternatives_spanish:
  - desde hombre hasta mujer
  - de varón a mujer
  lexicon: HALOT
  rationale: La construcción hebrea marca totalidad de una categoría a otra; 'de hombre a mujer' reproduce el merismo con fluidez en español y conserva la referencia explícita a los dos sexos.
- source_word: מֵעֹלֵל וְעַד יוֹנֵק
  english_pob_choice: from child to nursing infant
  chosen_spanish: de niño a lactante
  alternatives_spanish:
  - de pequeño a lactante
  - de criatura a niño de pecho
  lexicon: HALOT
  rationale: עולל designa un niño muy pequeño; יונק, un lactante. 'Niño' y 'lactante' expresan la gradación etaria con claridad. Se evita 'niño de pecho' por sonar más tradicional que neutral.
- source_word: מִשּׁוֹר וְעַד שֶׂה
  english_pob_choice: from ox to sheep
  chosen_spanish: de buey a oveja
  alternatives_spanish:
  - de buey a cordero
  - de ganado vacuno a oveja
  lexicon: HALOT
  rationale: שור puede referirse a un animal bovino de labor; 'buey' es comprensible y concreto en español. שה se traduce como 'oveja' para mantener una categoría de ganado menor reconocible y breve.
- source_word: מִגָּמָל וְעַד חֲמוֹר
  english_pob_choice: from camel to donkey
  chosen_spanish: de camello a asno
  alternatives_spanish:
  - de camello a burro
  - de camello a mula
  lexicon: HALOT
  rationale: Los sustantivos distributivos finales se expresan con categorías animales en español. 'Asno' es más sobrio y bíblico que 'burro', y conserva el registro digno del pasaje.
theological_decisions:
- issue: Lenguaje de חרם / ḥerem como juicio divino y consagración destructiva
  english_pob_reading: devote to destruction
  chosen_spanish_reading: consagra a destrucción
  alternative_spanish_readings:
  - destruye por completo
  - pon bajo anatema
  rationale: El hebreo no describe mera violencia militar, sino una acción ritual-jurídica de apartar para destrucción bajo juicio. 'Consagra a destrucción' intenta sostener la tensión entre dedicación y destrucción sin esconderla detrás de un verbo genérico.
  doctrine_reference: Translation philosophy §1, §5
- issue: Sujeto corporativo en singular ('Amalek' / 'him')
  english_pob_reading: Amalek ... him
  chosen_spanish_reading: Amalec ... le pertenece / lo
  alternative_spanish_readings:
  - los amalecitas ... les pertenece / los
  - Amalec ... les pertenece / los
  rationale: El hebreo usa formas singulares para una entidad colectiva. En español se conserva el nombre singular y los pronombres singulares para respetar la forma del texto, aunque el referente sea corporativo.
  doctrine_reference: Translation philosophy §1, §5
- issue: Enumeración totalizante con merismo de edades y animales
  english_pob_reading: from man to woman, from child to nursing infant, from ox to sheep, from camel to donkey
  chosen_spanish_reading: de hombre a mujer, de niño a lactante, de buey a oveja, de camello a asno
  alternative_spanish_readings:
  - hombres y mujeres, niños y lactantes, bueyes y ovejas, camellos y asnos
  - desde el hombre hasta la mujer, desde el niño hasta el lactante
  rationale: La repetición de 'de ... a ...' preserva el merismo y la fuerza totalizadora del hebreo mejor que una simple lista coordinada. También mantiene el ritmo formal del mandato.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: 'La redacción sigue de cerca la revisión más reciente del texto inglés: conserva la secuencia imperativa, el valor técnico de חרם como ‘devote to destruction’ y la estructura merística repetida con ‘de ... a ...’. Se evitó expandir la lista en forma explicativa para no perder la concisión formal del hebreo.'
  spanish_consistency_notes:
  - Se usa 'Amalec' como forma castellana del nombre propio, manteniendo el singular corporativo del hebreo.
  - '''Consagra a destrucción'' se reservó para חרם en este pasaje por su valor técnico-sacral; no se normalizó como simple ''destruye''.'
  - '''No lo perdones'' traduce la negativa de חמל con un giro breve y bíblicamente solemne, sin introducir comentario interpretativo.'
  - La secuencia animal conserva el orden del hebreo y un registro uniforme en sustantivos singulares distributivos.
