    issue: La cláusula final omite el segundo infinitivo implícito en español
    rationale: El hebreo «y me hará/ver permitirá ver a él/ello y su morada» presenta dos objetos coordinados bajo el mismo verbo. «Y también su morada» debilita esa relación y resulta menos fiel y menos claro que «y ver su morada».
  - severity: low
