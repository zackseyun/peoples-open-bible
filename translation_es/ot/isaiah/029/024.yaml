translation:
  language: es
  text: Y los que se extravían en espíritu[a] llegarán a entender, y los que murmuran aprenderán instrucción[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los que yerran en espíritu».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «enseñanza».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיָדְעוּ
  english_pob_choice: will come to
  chosen_spanish: llegarán a entender
  alternatives_spanish:
  - conocerán
  - entenderán
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'y conocerán', pero en la construcción con בִּינָה el sentido resultativo es alcanzar entendimiento. 'Llegarán a entender' conserva ese matiz de proceso/resultado sin volver la frase rígida.
- source_word: תֹעֵי רוּחַ
  english_pob_choice: those who go astray in spirit
  chosen_spanish: los que se extravían en el espíritu
  alternatives_spanish:
  - los que yerran en espíritu
  - los espiritualmente extraviados
  - los de espíritu errante
  lexicon: HALOT
  rationale: '''תֹעֵי'' es participio de ''extraviarse/errar''; ''extravían'' preserva la imagen de desviación. ''רוּחַ'' aquí se entiende como disposición interior, no como el Espíritu Santo ni como viento, por eso se mantiene ''en el espíritu'' para respetar la ambigüedad antropológica del hebreo.'
- source_word: בִּינָה
  english_pob_choice: understanding
  chosen_spanish: entender
  alternatives_spanish:
  - entendimiento
  - discernimiento
  - insight
  lexicon: HALOT
  rationale: La idea de בִּינָה es entendimiento/discernimiento. En español, el verbo 'entender' funciona con naturalidad junto a 'llegarán a', y evita una formulación demasiado abstracta.
- source_word: וְרוֹגְנִים
  english_pob_choice: those who grumble
  chosen_spanish: los que murmuran
  alternatives_spanish:
  - los que se quejan
  - los murmuradores
  - los que protestan
  lexicon: HALOT
  rationale: El término denota queja o murmuración resistente. 'Murmuran' conserva el tono de oposición y suena más cercano al paralelo hebreo que 'se quejan'.
- source_word: יִלְמְדוּ
  english_pob_choice: will learn
  chosen_spanish: aprenderán
  alternatives_spanish:
  - estudiarán
  - recibirán
  lexicon: HALOT
  rationale: Es el futuro simple de למד. 'Aprenderán' es directo y fiel, sin añadir contenido ajeno.
- source_word: לֶקַח
  english_pob_choice: instruction
  chosen_spanish: instrucción
  alternatives_spanish:
  - enseñanza
  - lección
  lexicon: HALOT
  rationale: לֶקַח puede ser instrucción o enseñanza recibida. 'Instrucción' encaja bien con 'aprenderán' y conserva el valor formativo del término.
theological_decisions:
- issue: Sentido de רוּחַ en תֹעֵי רוּחַ
  english_pob_reading: human inner disposition/mind ('in spirit')
  chosen_spanish_reading: disposición interior ('en el espíritu')
  alternative_spanish_readings:
  - por el Espíritu
  - en el viento
  - en su espíritu
  rationale: El contexto trata de personas restauradas en su capacidad de entender; por eso se evita forzar una lectura pneumatológica o meteorológica. La formulación española mantiene la tensión del hebreo entre interioridad, ánimo y orientación de vida.
  doctrine_reference: Preservar la tensión teológica y semántica del texto; no importar una afirmación doctrinal que el versículo no exige.
translation_notes:
  revision_awareness: 'Coincide con el pass más reciente: alta concordancia, sin revisiones aplicadas; se mantiene la lectura estable del texto fuente y del audit trail inglés.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' por defecto solo cuando el texto lo requiere; aquí no aparece el tetragrámaton.
  - Se conserva 'espíritu' en minúscula porque refiere a la disposición interior, no al Espíritu Santo.
  - '''Instrucción'' se eligió por coherencia con ''aprenderán'' y por su fuerza formativa en español bíblico moderno.'
