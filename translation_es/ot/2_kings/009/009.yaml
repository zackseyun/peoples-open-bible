  verdict: revise
  source_alignment_summary: 'El borrador español refleja correctamente la estructura del hebreo: juicio sobre la casa de Acab por comparación con las casas de Jeroboam hijo de Nabat y de Baasa hijo de Ahías. La elección de «haré ... como» corresponde bien al valor idiomático de וְנָתַתִּי en esta fórmula. El sentido dinástico de «casa» también se preserva adecuadamente.'
  spanish_quality_summary: La redacción es clara y natural, pero necesita ajustes menores. «Ahab» debe normalizarse a «Acab» en español bíblico. La nota [b] sobre variantes transliteradas de «Ahías» no está motivada por el origen ni por el rastro de auditoría inglés y añade ruido innecesario. El resto del verso es legible y digno.
  glossary_alignment: 'No hay términos del glosario principal en disputa aquí. La decisión de conservar «casa» en vez de «dinastía» coincide con la filosofía del POB y con la nota léxica inglesa. Los nombres propios conviene presentarlos en formas españolas ampliamente reconocibles: «Acab», «Jeroboam», «Nabat», «Baasa», «Ahías».'
  issues:
