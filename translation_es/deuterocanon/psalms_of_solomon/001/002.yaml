    rationale: El expediente POB documenta como principal ‘righteousness’ y reserva ‘justice’ como alternativa. En español, «justicia» aquí puede desviar el sentido hacia lo jurídico/social. «Rectitud» preserva mejor la fuerza moral/religiosa sin perder legibilidad.
