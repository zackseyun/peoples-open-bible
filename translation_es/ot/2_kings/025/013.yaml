review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el hebreo: mantiene «los caldeos», «pilares de bronce», «mar de bronce», «Yahvé», la acción de romper para transportar y el destino «a Babilonia». Sin embargo, no sigue fielmente la decisión léxica auditada de la POB inglesa para הַמְּכֹנוֹת, que eligió «stands» como texto principal y dejó «bases» como alternativa en nota. En español, el texto principal debería reflejar esa decisión con «los soportes» o equivalente, no «las bases» como lectura principal.'
  spanish_quality_summary: 'El español es claro y natural en general. La única fricción importante es terminológica: «las bases» suena más estrecho y además duplica en el texto principal la alternativa que debía ir en nota. También conviene corregir la nota léxica, cuyo anclaje está puesto en «Yahvé[a]» en lugar de sobre הַמְּכֹנוֹת; así actualmente la ubicación del marcador no corresponde al contenido de la nota.'
  glossary_alignment: 'Alineación buena en «Yahvé», «bronce», «caldeos» y «mar de bronce». Desalineación media en הַמְּכֹנוֹת: la auditoría inglesa privilegia «stands», por lo que en español corresponde mejor «soportes» o «estructuras de apoyo» como texto principal, con «bases» como alternativa en nota. Las notas deben anclarse a la frase pertinente con marcadores únicos.'
  issues:
  - severity: medium
    issue: הַמְּכֹנוֹת se tradujo en el texto principal como «las bases»
    rationale: La POB inglesa estableció «the stands» como lectura principal y «the bases» como alternativa en nota. El español debería preservar esa prioridad léxica, idealmente con «los soportes» como equivalente principal.
  - severity: medium
    issue: El marcador de la nota léxica [a] está anclado a «Yahvé» en vez de a «las bases»/הַמְּכֹנוֹת
    rationale: La nota [a] explica el término de los soportes del templo, no el nombre divino. El anclaje actual crea confusión y no cumple bien la disciplina de notas.
  - severity: low
    issue: La redacción de la nota [a] puede hacerse más natural en español
    rationale: «los soportes del conjunto de lavamanos del templo» es comprensible, pero «las estructuras de apoyo de las pilas del templo» o similar fluye mejor y conecta mejor con la explicación inglesa.
