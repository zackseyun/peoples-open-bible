translation:
  language: es
  text: Él lo hizo cabalgar sobre las alturas de la tierra[a], y comió el producto[b] del campo; le hizo chupar[c] miel de la roca, y aceite de la roca de pedernal.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘sobre los altos lugares de la tierra’. Aquí la frase probablemente se refiere a terrenos elevados y fértiles, no necesariamente a “altos lugares” cultuales.
    reason: lexical_alternative
  - marker: b
    text: O ‘el rendimiento del campo’.
    reason: lexical_alternative
  - marker: c
    text: O ‘lo hizo mamar miel de la roca’. El verbo hebreo es literalmente ‘lo hizo chupar’.
    reason: lexical_alternative
lexical_decisions:
- source_word: יַרְכִּבֵהוּ
  english_pob_choice: He made him ride
  chosen_spanish: Él lo hizo cabalgar
  alternatives_spanish:
  - Él lo hizo montar
  - Él lo hizo ir montado
  lexicon: HALOT
  rationale: El causativo de רכב se expresa en español de modo natural con «hacer cabalgar»; conserva la fuerza causativa sin volverla perifrástica o explicativa.
- source_word: עַל במותי אָרֶץ
  english_pob_choice: on the heights of the land
  chosen_spanish: sobre las alturas de la tierra
  alternatives_spanish:
  - sobre los altos lugares de la tierra
  - sobre las alturas del país
  lexicon: HALOT
  rationale: «Alturas de la tierra» preserva el valor topográfico y poético, evitando la carga cultual que puede sugerir «altos lugares».
- source_word: וַיֹּאכַל
  english_pob_choice: and he ate
  chosen_spanish: y comió
  alternatives_spanish:
  - y se alimentó
  - y comía
  lexicon: HALOT
  rationale: El imperfecto consecutivo פשוט de אכל se vierte con el verbo llano «comió», que mantiene la concreción de la imagen.
- source_word: תְּנוּבֹת שָׂדָי
  english_pob_choice: the produce of the field
  chosen_spanish: el fruto del campo
  alternatives_spanish:
  - la producción del campo
  - el rendimiento del campo
  lexicon: HALOT
  rationale: «תְּנוּבֹת» remite a producto o rendimiento; «fruto del campo» suena natural en español y conserva la idea de abundancia agrícola sin estrecharla a un tecnicismo.
- source_word: וַיֵּנִקֵהוּ
  english_pob_choice: he made him suck
  chosen_spanish: le hizo chupar
  alternatives_spanish:
  - lo hizo succionar
  - lo alimentó con
  lexicon: HALOT
  rationale: El causativo de ינק es literalmente «hacer chupar/succionar». «Le hizo chupar» preserva la fuerza verbal y la imagen original, aunque sea áspera en español.
- source_word: דְבַשׁ
  english_pob_choice: honey
  chosen_spanish: miel
  alternatives_spanish:
  - miel de abeja
  lexicon: HALOT
  rationale: La equivalencia estándar «miel» es suficiente y fiel; el contexto poético la carga de sentido de provisión abundante.
- source_word: מִסֶּלַע
  english_pob_choice: from the rock
  chosen_spanish: de la roca
  alternatives_spanish:
  - de una roca
  - de la peña
  lexicon: HALOT
  rationale: «Roca» mantiene el sustantivo básico y la imaginería del texto; en castellano, «de la roca» resulta más fluido que «desde la roca».
- source_word: וְשֶׁמֶן
  english_pob_choice: and oil
  chosen_spanish: y aceite
  alternatives_spanish:
  - y aceite de oliva
  - y óleo
  lexicon: HALOT
  rationale: שֶׁמֶן significa literalmente «aceite»; no se especifica oliva en el hebreo, por lo que conviene no añadirla sin base textual.
- source_word: מֵחַלְמִישׁ צוּר
  english_pob_choice: from the flinty rock
  chosen_spanish: de la roca pedregosa
  alternatives_spanish:
  - de la roca sílex
  - de la roca flintosa
  lexicon: HALOT
  rationale: La expresión intensifica la dureza e improbabilidad de la fuente. «Roca pedregosa» comunica la aspereza del hebreo sin un tecnicismo poco transparente.
theological_decisions:
- issue: Referentes tácitos de los pronombres singulares
  english_pob_reading: Retain the Hebrew singular pronouns without replacing them with 'Israel' or 'the LORD' in the main text
  chosen_spanish_reading: Conservar los pronombres singulares implícitos sin explicitar ‘Israel’ o ‘Yahvé’ en el texto principal
  alternative_spanish_readings:
  - Hacer explícito ‘Israel’ como objeto y ‘Yahvé’ como sujeto
  - Reformular para aclarar todos los referentes en la línea principal
  rationale: El verso en hebreo funciona con pronombres ya anclados por el contexto inmediato. La traducción conserva esa economía discursiva y evita añadir interpretación dentro de la línea principal.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'La versión coincide con el pase más reciente: no se registran cambios posteriores ni ajustes requeridos tras la revisión de alta concordancia.'
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como norma general del proyecto cuando el contexto lo requiera; en este verso no aparece explícitamente en el texto hebreo y no se introduce innecesariamente.
  - 'Se conserva el paralelismo poético con dos miembros descriptivos: abundancia del campo y provisión de la roca.'
  - ‘Aceite’ se deja sin especificar como ‘oliva’ por fidelidad al término hebreo y para no agregar información no presente en el texto.
