revisions:
- from: Pero cuando los judíos le habían enviado, desde la asamblea de los ancianos y los ancianos, hombres para saludarlo, llevarle regalos de hospitalidad y alegrarse por lo que había sucedido, ocurrió que se mostró aún más dispuesto a ir a ellos lo antes posible.
  to: Pero cuando los judíos le habían enviado, de parte del consejo de ancianos[a] y de los ancianos, unos hombres para saludarlo, llevarle regalos de hospitalidad[b] y alegrarse por lo que había sucedido, ocurrió que se mostró aún más dispuesto a ir a visitarlos lo antes posible.
  rationale: Se añadió «unos hombres» para hacer explícito en español el objeto enviado, implícito en el griego y claro en el inglés auditado. Se cambió «asamblea de los ancianos» por «consejo de ancianos» para reflejar mejor γερουσία y distinguirlo de «los ancianos». Se ajustó «desde» a «de parte de» para expresar mejor procedencia institucional, y «ir a ellos» a «ir a visitarlos» para mayor naturalidad sin pérdida de sentido. Se preservaron y trasladaron las notas pertinentes del rastro inglés sobre γερουσία y ξένια.
