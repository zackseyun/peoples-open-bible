translation:
  language: es
  text: 'Entonces dijimos[b][a]: «Edifiquemos ahora para nosotros el altar, no para holocausto ni para sacrificio».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Así dijimos» o «Y dijimos». La conjunción hebrea puede verterse de varias maneras naturales según cuán estrechamente se enlace esta frase con el versículo anterior.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «Hagamos para nosotros, para edificar el altar»; un modismo que significa «Edifiquemos para nosotros el altar».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַנֹּאמֶר
  english_pob_choice: So we said
  chosen_spanish: Así dijimos
  alternatives_spanish:
  - Y dijimos
  - Entonces dijimos
  lexicon: HALOT
  rationale: La forma narrativa introduce la explicación del grupo; «así» reproduce bien el valor consecutivo/resultativo de la waw sin sonar rígido en español. «Dijimos» conserva el pretérito simple narrativo.
- source_word: נַעֲשֶׂה
  english_pob_choice: Let us ... build
  chosen_spanish: Edifiquemos
  alternatives_spanish:
  - Hagamos
  - Construyamos
  lexicon: HALOT
  rationale: El hebreo usa cohortativo con la idiomática construcción siguiente «para construir». En español, el verbo nuclear es el acto de edificar el altar; «edifiquemos» evita el calco «hagamos... para construir» y conserva el matiz de propuesta/decisión.
- source_word: נָּא
  english_pob_choice: now
  chosen_spanish: ahora
  alternatives_spanish:
  - por favor
  lexicon: HALOT
  rationale: Aquí נא suaviza o impulsa la propuesta. «Ahora» mantiene el tono exhortativo deliberativo mejor que «por favor», que en español podría sonar extraño en una autoexhortación.
- source_word: לָנוּ
  english_pob_choice: for ourselves
  chosen_spanish: para nosotros
  alternatives_spanish:
  - para nosotros mismos
  lexicon: HALOT
  rationale: El dativo preposicional marca beneficio/interés del grupo. «Para nosotros» es natural y suficientemente refleja el valor benefactivo/reflexivo sin sobrecargar el español.
- source_word: לִבְנוֹת
  english_pob_choice: build
  chosen_spanish: edificar
  alternatives_spanish:
  - construir
  - levantar
  lexicon: HALOT
  rationale: El infinitivo de בנה se expresa de manera natural con «edificar» en contexto cultual; mantiene un tono más bíblico y formal que «construir», sin perder claridad.
- source_word: הַמִּזְבֵּחַ
  english_pob_choice: the altar
  chosen_spanish: el altar
  alternatives_spanish:
  - un altar
  lexicon: HALOT
  rationale: El artículo definido señala un altar específico ya discutido. «El altar» preserva esa definitud.
- source_word: לֹא לְעוֹלָה
  english_pob_choice: not for burnt offering
  chosen_spanish: no para holocausto
  alternatives_spanish:
  - no para ofrenda quemada
  - no para sacrificio completo
  lexicon: HALOT
  rationale: עֹלָה es el sacrificio que sube/ardido por completo; «holocausto» es el término tradicional y preciso en español bíblico. Aunque «ofrenda quemada» explicita la imagen, «holocausto» conserva la terminología cultual establecida.
- source_word: וְלֹא לְזָבַח
  english_pob_choice: and not for sacrifice
  chosen_spanish: ni para sacrificio
  alternatives_spanish:
  - y no para sacrificio
  - ni para ofrenda
  lexicon: HALOT
  rationale: זֶבַח es un término general para sacrificio/ofrenda sacrificial. «Ni para sacrificio» refleja el contraste coordinado con la primera negación y suena natural en español; «sacrificio» preserva la amplitud semántica.
translation_notes:
  revision_awareness: El pasaje muestra alta concordancia con la traducción inglesa auditada; no se requirieron revisiones sustanciales. Se mantuvo la decisión de traducir נַעֲשֶׂה de forma idiomática en español, preservando la relación con לִבְנוֹת sin calco pesado.
  spanish_consistency_notes:
  - Se usó «Yahvé» como estándar del proyecto cuando el texto lo requiera; aquí no aparece.
  - Se mantuvo la terminología cultual con «holocausto» y «sacrificio», coherente con el valor técnico del hebreo.
  - La puntuación con comillas y notas sigue el estilo editorial del POB en español.
