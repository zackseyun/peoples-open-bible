source:
  edition: WLC
  text: וְ/נֶ֣פֶשׁ כִּֽי תֶחֱטָ֗א וְ/שָֽׁמְעָה֙ ק֣וֹל אָלָ֔ה וְ/ה֣וּא עֵ֔ד א֥וֹ רָאָ֖ה א֣וֹ יָדָ֑ע אִם ל֥וֹא יַגִּ֖יד וְ/נָשָׂ֥א עֲוֺנֽ/וֹ־־׃
base_translation:
  language: en
  yaml_path: translation/ot/leviticus/005/001.yaml
  text: If a person sins[a], and hears the voice of an oath, and he is a witness, whether he has seen or known, if he does not report it[b], then he shall bear his guilt.
  footnotes:
  - marker: a
    text: Or 'he hears the voice of an oath,' that is, a solemn sworn adjuration calling for testimony.
    reason: lexical_alternative
  - marker: b
    text: Or 'he shall bear his iniquity.' The Hebrew idiom means he remains liable for the guilt of withholding testimony.
    reason: lexical_alternative
