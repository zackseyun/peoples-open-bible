translation:
  language: es
  text: El hijo de la mujer israelita pronunció distintamente[a] el Nombre y maldijo, y lo llevaron a Moisés. Su madre se llamaba Selomit hija de Dibri, de la tribu de Dan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «blasfemó el Nombre». El verbo hebreo también puede entenderse como «pronunció explícitamente» o «pronunció distintamente» el Nombre, aquí en el contexto de una maldición.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּקֹּב
  english_pob_choice: blasphemed
  chosen_spanish: blasfemó
  alternatives_spanish:
  - pronunció distintamente
  - nombró
  - perforó
  lexicon: HALOT
  rationale: El verbo נקב puede implicar 'nombrar/expresar distintamente' o, en este contexto de profanación del Nombre, participar en una blasfemia. Dado que la revisión inglesa más reciente opta por 'blasphemed' y el paralelo inmediato con וַיְקַלֵּל ('maldijo') preserva dos acciones relacionadas pero distinguibles, 'blasfemó' comunica mejor la fuerza ofensiva del acto sin reducirlo a mera pronunciación.
- source_word: בֶּן הָאִשָּׁה הַיִּשְׂרְאֵלִית
  english_pob_choice: the son of the Israelite woman
  chosen_spanish: el hijo de la mujer israelita
  alternatives_spanish:
  - el hijo de la israelita
  - el hijo de la mujer de Israel
  lexicon: HALOT
  rationale: La cadena constructa se vierte de manera natural en español como 'el hijo de la mujer israelita', manteniendo la identificación narrativa y la referencia étnica sin sobrecargar el sintagma.
- source_word: אֶת הַשֵּׁם
  english_pob_choice: the Name
  chosen_spanish: el Nombre
  alternatives_spanish:
  - el nombre
  - el divino Nombre
  lexicon: HALOT
  rationale: Con artículo definido, la expresión funciona como referencia reverente al Nombre divino. La mayúscula en 'Nombre' conserva esa carga reverencial en español sin introducir el tetragrámaton en el cuerpo del texto.
- source_word: וַיְקַלֵּל
  english_pob_choice: and cursed
  chosen_spanish: y maldijo
  alternatives_spanish:
  - y blasfemó
  - y insultó
  - y vituperó
  lexicon: HALOT
  rationale: '''קלל'' en piel expresa ''maldecir''. En español, ''maldijo'' conserva la acción verbal separada de ''blasfemó'' para no fusionar las dos cláusulas hebreas y mantener la tensión jurídica del relato.'
- source_word: וַיָּבִיאוּ אֹתוֹ אֶל מֹשֶׁה
  english_pob_choice: and they brought him to Moses
  chosen_spanish: y lo llevaron a Moisés
  alternatives_spanish:
  - y lo trajeron a Moisés
  - y fue llevado a Moisés
  lexicon: HALOT
  rationale: El plural activo indefinido se expresa naturalmente con 'lo llevaron'. Evita una pasiva innecesaria y refleja bien el movimiento narrativo hacia Moisés.
- source_word: וְשֵׁם אִמּוֹ
  english_pob_choice: Now his mother's name was
  chosen_spanish: Ahora el nombre de su madre era
  alternatives_spanish:
  - Y el nombre de su madre era
  - Su madre se llamaba
  lexicon: HALOT
  rationale: '''Ahora'' funciona como marcador discursivo para introducir una nota de identificación. ''El nombre de su madre'' sigue de cerca la estructura hebrea y su tono explicativo.'
- source_word: שְׁלֹמִית בַּת דִּבְרִי
  english_pob_choice: Shelomith daughter of Dibri
  chosen_spanish: Selomit, hija de Dibri
  alternatives_spanish:
  - Shelomit, hija de Dibri
  - Selomit, hija de Dibri
  lexicon: HALOT
  rationale: Los nombres propios se transliteran de forma consistente y legible para español. 'Selomit' es una adaptación natural del hebreo שְׁלֹמִית en ortografía española.
- source_word: לְמַטֵּה דָן
  english_pob_choice: of the tribe of Dan
  chosen_spanish: de la tribu de Dan
  alternatives_spanish:
  - perteneciente a la tribu de Dan
  - de la casa de Dan
  lexicon: HALOT
  rationale: La locución de afiliación tribal se vierte de manera estándar como 'de la tribu de Dan', clara y fiel al idiolecto bíblico.
theological_decisions:
- issue: Relación entre וַיִּקֹּב y וַיְקַלֵּל en el contexto de blasfemia
  english_pob_reading: The verb refers to explicitly uttering/pronouncing the divine Name, followed by a separate act of cursing; the translation later revised this to 'blasphemed the Name' for lexical accuracy.
  chosen_spanish_reading: '''Blasfemó el Nombre'' conserva la idea de profanación verbal del Nombre divino y mantiene además la cercanía con ''maldijo'' como acto distinto.'
  alternative_spanish_readings:
  - '''Pronunció el Nombre y maldijo'''
  - '''Nombró el Nombre y maldijo'''
  - '''Profirió el Nombre y maldijo'''
  rationale: 'La revisión inglesa posterior privilegia ''blasphemed'' como valor léxico del verbo en este contexto. En español, ''blasfemó'' comunica esa carga ofensiva con naturalidad y mantiene la doble acción del versículo: atentado contra el Nombre y maldición posterior.'
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: La revisión inglesa más reciente cambió de 'pronounced the Name' a 'blasphemed the Name' por precisión léxica. Esta versión española sigue esa última decisión, pero conserva la separación entre 'blasfemó el Nombre' y 'maldijo' para no colapsar los dos verbos hebreos.
  spanish_consistency_notes:
  - Se usa 'Nombre' con mayúscula para reflejar el valor reverencial de אֶת הַשֵּׁם.
  - Se mantiene 'Moisés' y 'tribu de Dan' con formas estándar de español bíblico.
  - Los nombres propios se adaptan a una ortografía española legible sin alterar la identificación del texto.
