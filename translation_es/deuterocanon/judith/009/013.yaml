translation:
  language: es
  text: Y haz que mis palabras y mi engaño sean para ellos herida[a] y golpe, ellos que han tramado cosas duras contra tu alianza, contra tu casa santificada, contra la cumbre de Sión y contra la casa de posesión de tus hijos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en herida y golpe para ellos». La construcción griega es compacta y puede entenderse como el resultado de las palabras de Judith o como el daño que esas palabras provocan.'
    reason: lexical_alternative
  - marker: b
    text: La frase «la casa de posesión de tus hijos» es difícil. Puede referirse a la morada, herencia o posesión perteneciente a tu pueblo, manteniendo la ambigüedad del griego.
    reason: alternative_reading
lexical_decisions:
- source_word: δὸς
  english_pob_choice: make
  chosen_spanish: haz que
  alternatives_spanish:
  - da
  - concede
  - haz
  lexicon: LSJ
  rationale: En esta construcción griega, δὸς con εἰς expresa más naturalmente un efecto resultante que un simple “dar”. En español, “haz que” comunica mejor la idea de causar o disponer el resultado, manteniendo la fuerza imperativa dirigida a Dios.
- source_word: λόγον μου
  english_pob_choice: my words
  chosen_spanish: mis palabras
  alternatives_spanish:
  - mi palabra
  - mi hablar
  - mi discurso
  lexicon: LSJ
  rationale: λόγος puede ser palabra, dicho o discurso. Aquí el plural español refleja el ajuste del audit trail inglés revisado y suena natural en contexto de súplica retórica sin perder el contenido verbal de Judith.
- source_word: ἀπάτην
  english_pob_choice: deceit
  chosen_spanish: engaño
  alternatives_spanish:
  - decepción
  - deceit
  - astucia
  lexicon: LSJ
  rationale: El término griego conserva una carga moral fuerte de engaño. “Engaño” es claro en español y no suaviza la tensión ética del pasaje; además, evita un calco poco natural como “deceit”.
- source_word: εἰς τραῦμα καὶ μώλωπα
  english_pob_choice: their wound and bruise
  chosen_spanish: herida y moretón
  alternatives_spanish:
  - herida y contusión
  - lesión y moretón
  - daño y moretón
  lexicon: LSJ
  rationale: La pareja τραῦμα / μώλωψ presenta dos imágenes de daño corporal. “Herida y moretón” conserva la duplicidad y resulta idiomático; “moretón” mantiene un matiz visible y concreto de lesión.
- source_word: ἐβουλεύσαντο σκληρά
  english_pob_choice: have devised harsh things
  chosen_spanish: han tramado cosas duras
  alternatives_spanish:
  - han concebido cosas crueles
  - han maquinado cosas duras
  - han planeado cosas crueles
  lexicon: LSJ
  rationale: βουλεύομαι aquí apunta a planear o tramar, y σκληρά literalmente a “cosas duras”, con posible sentido de crueles o severas. “Han tramado cosas duras” mantiene la literalidad sin borrar la crudeza del griego.
- source_word: διαθήκης σου
  english_pob_choice: your covenant
  chosen_spanish: tu pacto
  alternatives_spanish:
  - tu alianza
  - tu convenio
  lexicon: LSJ
  rationale: Aunque “covenant” suele corresponder a “pacto” o “alianza”, en español bíblico “pacto” conserva bien la dimensión relacional y jurídica. Se evita “convenio” por sonar demasiado moderno-administrativo.
- source_word: οἴκου ἡγιασμένου σου
  english_pob_choice: your sanctified house
  chosen_spanish: tu casa santificada
  alternatives_spanish:
  - tu casa santa
  - tu casa consagrada
  lexicon: LSJ
  rationale: ἡγιασμένου es participio perfecto pasivo y señala una casa hecha santa o consagrada. “Santificada” preserva esa huella verbal mejor que el adjetivo más general “santa”.
- source_word: κορυφῆς Σιὼν
  english_pob_choice: the summit of Zion
  chosen_spanish: la cumbre de Sion
  alternatives_spanish:
  - la cima de Sion
  - la altura de Sion
  lexicon: LSJ
  rationale: κορυφή significa cima, cumbre o pico. “Cumbre” reproduce bien la imagen de elevación y conserva la referencia topográfica de Sion.
- source_word: οἴκου κατασχέσεως υἱῶν σου
  english_pob_choice: the house possessed by your sons
  chosen_spanish: la casa de posesión de tus hijos
  alternatives_spanish:
  - la casa poseída por tus hijos
  - la morada heredada por tus hijos
  - la casa de herencia de tus hijos
  lexicon: LSJ
  rationale: La expresión es difícil. “Casa de posesión” sigue de cerca el sustantivo κατασχέσεως y mantiene la ambigüedad auditável, mientras que “tus hijos” preserva el vínculo filial del texto sin resolver de modo prematuro si se trata de herencia, posesión o morada.
theological_decisions:
- issue: Mantener el rasgo de engaño pedido a Dios sin moralizar el pasaje
  english_pob_reading: Translate ἀπάτην directly as 'deceit' in the main text
  chosen_spanish_reading: Traducir ἀπάτην como “engaño” en el texto principal
  alternative_spanish_readings:
  - decepción
  - astucia
  - deceit
  rationale: El versículo presenta explícitamente la petición de Judith de que su palabra engañosa resulte eficaz contra el enemigo. La traducción no debe atenuar ni resolver la tensión ética; por eso se conserva el término fuerte “engaño”.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: Conservar el lenguaje de alianza del texto
  english_pob_reading: covenant
  chosen_spanish_reading: pacto
  alternative_spanish_readings:
  - alianza
  - convenio
  rationale: En el marco bíblico, διαθήκη tiene peso relacional y teológico. “Pacto” comunica esa fuerza mejor que “convenio”, y evita desplazar el campo semántico hacia un simple acuerdo humano.
  doctrine_reference: DOCTRINE.md §Contested terms / covenantal usage principles
translation_notes:
  revision_awareness: El audit trail inglés revisó la cláusula inicial de “give my word” a “make my words become” para reflejar mejor δὸς con εἰς. La versión española adopta esa mejora con “haz que mis palabras y engaño sean”, y conserva la dureza del final con una formulación cercana al griego, sin suavizar ni resolver la frase oscura sobre la “casa de posesión”.
  spanish_consistency_notes:
  - Se mantiene “Yahvé” solo cuando aparezca explícitamente el nombre divino; aquí el texto dirige la súplica a “tu”.
  - Se conserva el registro bíblico con “pacto”, “santificada” y “Sion”, evitando equivalentes demasiado eclesiásticos o explicativos.
  - Se prefirió una sintaxis directa y auditable, con mínima expansión interpretativa.
  - Se preserva la tensión ética de “engaño” sin convertirla en “astucia” o “estratagema”.
