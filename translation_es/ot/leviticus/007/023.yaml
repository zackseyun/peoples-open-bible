translation:
  language: es
  text: 'Habla a los hijos de Israel[a], diciendo: No deben comer ninguna grasa de un buey, de una oveja o de una cabra.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, de manera más idiomática, «los israelitas». El hebreo dice «los hijos de Israel».
    reason: lexical_alternative
lexical_decisions:
- source_word: דַּבֵּר
  english_pob_choice: Speak
  chosen_spanish: Habla
  alternatives_spanish:
  - Di
  - Habla
  lexicon: HALOT
  rationale: El imperativo piel de דבר mantiene el tono formal de una instrucción divina a Moisés. En español, «Habla» preserva la fórmula legal sin sonar tan forzada como una traducción más literal de dos palabras.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Israel
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente «hijos de Israel». En español, «hijos de Israel» conserva la forma y la referencia colectiva del pacto; «israelitas» es una alternativa idiomática pero menos cercana a la forma fuente.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y diciendo
  - diciendo
  lexicon: HALOT
  rationale: La fórmula introductoria se conserva con un gerundio español natural. «Diciendo» mantiene la relación sintáctica del hebreo sin añadir contenido.
- source_word: כָּל חֵלֶב
  english_pob_choice: any fat
  chosen_spanish: ninguna grasa
  alternatives_spanish:
  - toda grasa
  - toda la grasa
  lexicon: HALOT
  rationale: En una prohibición, el valor comprehensivo de כָּל se expresa mejor en español con una negación de alcance total. «Grasa» corresponde al sentido básico de חֵלֶב; «suet» sería demasiado técnico y menos claro.
- source_word: שׁוֹר
  english_pob_choice: ox
  chosen_spanish: toro
  alternatives_spanish:
  - buey
  - toro
  - vacuno
  lexicon: HALOT
  rationale: Aunque la POB inglesa usa «ox», en español «toro» comunica el bovino de manera clara y natural en una lista legal. Se evita «buey» porque puede sugerir un animal castrado, más específico que el hebreo; «vacuno» suena demasiado colectivo.
- source_word: כֶשֶׂב
  english_pob_choice: sheep
  chosen_spanish: oveja
  alternatives_spanish:
  - oveja
  - cordero
  - res
  lexicon: HALOT
  rationale: כֶשֶׂב designa un animal del rebaño sin precisar edad; en español, «oveja» es la opción más neutra y comprensible dentro de la lista sacrificial. «Cordero» sería más específico de lo que permite el hebreo.
- source_word: עֵז
  english_pob_choice: goat
  chosen_spanish: cabra
  alternatives_spanish:
  - cabra
  - macho cabrío
  - chiva
  lexicon: HALOT
  rationale: Aunque el término hebreo puede funcionar como genérico para cabra, «cabra» es la forma natural en español. Se evita «macho cabrío» por exceso de especificación de sexo.
- source_word: לֹא תֹאכֵלוּ
  english_pob_choice: You shall not eat
  chosen_spanish: No comerán
  alternatives_spanish:
  - No comeréis
  - No comerán
  - No han de comer
  lexicon: HALOT
  rationale: La prohibición legal se expresa de forma normativa y directa en español. Se eligió la tercera persona plural para concordar con «los hijos de Israel» como sujeto colectivo, manteniendo el valor preceptivo del hebreo.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto hebreo masorético y coincide sustancialmente con la auditoría inglesa: mandato introductorio, destinatario colectivo, fórmula de prohibición y lista de animales. No se detectan revisiones textuales relevantes en el expediente inglés, por lo que no se introducen variantes críticas.'
  spanish_consistency_notes:
  - Se conserva la fórmula legal breve y directa.
  - Se mantiene el orden de la lista de animales del hebreo.
  - Se evita «SEÑOR» porque este versículo no contiene el tetragrámaton ni una cita directa del nombre divino.
  - Se usa «grasa» como equivalente de חֵלֶב, sin introducir la distinción técnica «sebo/suet» que el contexto español no exige.
