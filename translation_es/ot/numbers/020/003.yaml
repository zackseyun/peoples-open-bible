review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: disputa del pueblo con Moisés, introducción de habla, deseo lamentoso, repetición del verbo de perecer, referencia a «nuestros hermanos» y uso de «Yahvé» para יְהוָה. Sin embargo, hay un desajuste gramatical importante: el sujeto hebreo es plural («y dijeron»), no singular («y dijo»).'
  spanish_quality_summary: El español es claro y digno. «Ojalá hubiéramos perecido cuando perecieron nuestros hermanos delante de Yahvé» suena natural y mantiene la repetición léxica. «Riñó con Moisés» es posible, pero con sujeto colectivo singular («el pueblo») suena algo menos natural que una forma pluralizada del verbo con el colectivo; aun así, es aceptable. La corrección necesaria es cambiar «dijo» por «dijeron».
  glossary_alignment: 'La terminología del proyecto está bien respetada: יְהוָה → «Yahvé», אַחֵינוּ → «nuestros hermanos», y el campo léxico de גוע se conserva con «perecido / perecieron». No hay conflicto doctrinal. La nota alternativa también es válida en español.'
  issues:
  - severity: high
    issue: Concordancia verbal incorrecta en la introducción del discurso
    rationale: El hebreo וַיֹּאמְרוּ es 3mp («y dijeron»). El borrador pone «y dijo[a]», que cambia el número del sujeto y no preserva fielmente el original.
  - severity: low
    issue: La explicación léxica de וַיֹּאמְרוּ לֵאמֹר justifica «y dijo»
    rationale: Además del texto principal, la decisión léxica documenta una forma singular incorrecta. Aunque esto no afecta directamente el texto final revisado solicitado aquí, confirma que la forma debe corregirse a plural.
  revised_spanish_text: 'Y el pueblo riñó con Moisés y dijeron[a]: «¡Ojalá hubiéramos perecido cuando perecieron nuestros hermanos delante de Yahvé!»'
  revised_footnotes:
  - marker: a
    text: 'O: «¡Ojalá hubiéramos muerto cuando murieron nuestros hermanos delante de Yahvé!»'
    reason: alternative_reading
  revision_rationale: Se corrige «dijo» a «dijeron» para reflejar fielmente el verbo hebreo plural וַיֹּאמְרוּ. Se conserva el resto porque transmite adecuadamente el sentido, la repetición léxica de גוע y la terminología del proyecto, incluido «Yahvé».
