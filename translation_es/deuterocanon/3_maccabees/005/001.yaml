- source_word: Ἕρμωνα
  english_pob_choice: Hermon
  chosen_spanish: Hermón
  alternatives_spanish:
  - Hermon
  lexicon: transliteración
  rationale: Se translitera el nombre propio al español con acento gráfico para la prosodia natural.
- source_word: τὸν πρὸς τῇ τῶν ἐλεφάντων ἐπιμελείᾳ
  english_pob_choice: who was in charge of the elephants
  chosen_spanish: que estaba a cargo de los elefantes
  alternatives_spanish:
  - encargado del cuidado de los elefantes
  - el oficial sobre los elefantes
  lexicon: LSJ
  rationale: ἐπιμέλεια aquí denota supervisión/administración; «a cargo de» expresa con claridad la función sin introducir matices técnicos no garantizados por el texto.
- source_word: βαρείᾳ
  english_pob_choice: grievous
  chosen_spanish: grave
  alternatives_spanish:
  - pesada
  - dolorosa
  lexicon: LSJ
  rationale: En español, «grave» comunica la intensidad opresiva del adjetivo sin sonar forzado junto a «ira».
- source_word: μεμεστωμένος
  english_pob_choice: being filled with
  chosen_spanish: estando lleno de
  alternatives_spanish:
  - lleno de
  - colmado de
  lexicon: LSJ
  rationale: El participio perfecto describe un estado duradero; «estando lleno de» preserva ese estado de manera idiomática.
- source_word: ὀργῇ
  english_pob_choice: anger
  chosen_spanish: ira
  alternatives_spanish:
  - enojo
  - cólera
  lexicon: LSJ
  rationale: «Ira» refleja bien el tono elevado y la intensidad emocional del término, y combina con el doblete con χόλος sin duplicar exactamente el mismo registro que «furor».
- source_word: καὶ χόλῳ
  english_pob_choice: and wrath
  chosen_spanish: y de furor
  alternatives_spanish:
  - y de ira
  - y de cólera
  lexicon: LSJ
  rationale: χόλος puede expresar ira vehemente o furor; «furor» conserva el segundo término del paralelo con una fuerza léxica distinta de ὀργή.
- source_word: κατὰ πᾶν
  english_pob_choice: altogether
  chosen_spanish: enteramente
  alternatives_spanish:
  - completamente
  - del todo
  lexicon: LSJ
  rationale: La frase intensifica el estado descrito; «enteramente» reproduce bien el alcance total del adverbio sin sonar demasiado coloquial.
- source_word: ἀμετά-
  english_pob_choice: unchangeable
  chosen_spanish: inmutable
  alternatives_spanish:
  - implacable
  - inalterable
  - inaleable
  lexicon: LSJ
  rationale: La palabra queda truncada en el griego transmitido y, por el contexto de la ira, el sentido apunta a una disposición no cede ni se altera. «Inmutable» mantiene la tensión textual y el valor semántico más probable.
theological_decisions:
- issue: La descripción de la ira final truncada en el manuscrito transmitido
  english_pob_reading: altogether unchangeable
  chosen_spanish_reading: enteramente inmutable
  alternative_spanish_readings:
  - implacable
  - inalterable
  rationale: El texto griego visible termina en una forma cortada por guion, por lo que no conviene cerrar el sentido con demasiada certeza. «Inmutable» sigue de cerca la morfología visible y deja abierta la fuerza exacta del término, como hace la nota inglesa.
  doctrine_reference: Textual criticism / preservation of textual uncertainty
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que ajustó la primera parte a una formulación más natural («being filled with grievous anger and wrath altogether unchangeable»), pero también el aviso de revisión pendiente por posibles problemas mayores. Por eso se conserva con cuidado la incertidumbre textual del final truncado y se evita sobreinterpretarlo.
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico sobrio y contemporáneo, sin recurrir a fórmulas eclesiásticas innecesarias.
  - Se distinguió entre «ira» y «furor» para reflejar el doblete griego ὀργῇ καὶ χόλῳ.
  - Se prefirió «a cargo de» para ἐπιμέλεια por ser claro y fiel a la función administrativa indicada.
  - Se usó «inmutable» como opción conservadora frente a la forma truncada del texto, dejando la alternativa «implacable» en nota.
