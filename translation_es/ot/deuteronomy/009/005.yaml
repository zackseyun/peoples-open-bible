review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura del hebreo: niega que la posesión de la tierra se deba a la justicia o rectitud de Israel, y afirma las dos razones positivas explícitas: la maldad de esas naciones y el cumplimiento/confirmación de la palabra jurada de Yahvé a los patriarcas. También preserva correctamente «Yahvé» para יְהוָה y mantiene «palabra» con nota alternativa para «promesa».'
  spanish_quality_summary: 'El texto es claro y natural en general, pero tiene un problema de concordancia pronominal: «estas naciones ... las desaloja» trata «naciones» como femenino, cuando en español «nación» es femenino pero el antecedente semántico en la cláusula hebrea es el grupo de pueblos/goyim que se está expulsando; aun así la forma femenina plural puede defenderse por concordar con «naciones». El problema más importante no es de concordancia sino de anclaje de la nota: la nota [a] está colocada sobre «su tierra», pero explica el verbo מוֹרִישָׁם («desaloja / desposee»), tal como en el inglés POB. Debe moverse al verbo correspondiente. Además, «desaloja» suena algo administrativo/urbano; «expulsa» o «desposee» comunica mejor el contexto bíblico de expulsión/disposesión territorial. Se requiere un pequeño ajuste.'
  glossary_alignment: 'Buena alineación con la terminología del proyecto: יְהוָה → «Yahvé»; אֱלֹהֶיךָ → «tu Dios»; צְדָקָה → «justicia»; יֹשֶׁר לְבָבְךָ → «rectitud de tu corazón»; דָבָר en contexto de juramento → «palabra» con nota de «promesa». La excepción recomendada es sustituir «desaloja» por «expulsa» como mejor equivalente contextual para מוֹרִישָׁם, manteniendo en nota la alternativa de desposesión.'
  issues:
  - severity: medium
    issue: La nota [a] está anclada en «su tierra», pero su contenido explica el verbo מוֹרִישָׁם.
    rationale: En el inglés auditado, la nota alternativa corresponde a «is driving them out / is dispossessing them», no a «their land». En español debe marcar el verbo para que la nota interprete la palabra correcta del texto fuente.
  - severity: medium
    issue: «Desaloja» no es la mejor opción principal para מוֹרִישָׁם en este contexto.
    rationale: Aunque puede expresar remoción, en español bíblico contemporáneo «desaloja» suena más civil o inmobiliario. «Expulsa» es más natural y fiel al contexto de naciones removidas de la tierra, mientras la nota conserva la matización de «desposee».
