translation:
  language: es
  text: ¿Y qué gran nación hay que tenga estatutos y juicios tan justos como toda esta ley[a] que pongo hoy delante de ustedes?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «instrucción» para תּוֹרָה, aunque aquí el contexto es específicamente legal: «estatutos y juicios».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/מִי
  english_pob_choice: And what ... is there
  chosen_spanish: ¿Y qué ... hay?
  alternatives_spanish:
  - ¿Y quién ... hay?
  - ¿Y qué nación ... hay?
  lexicon: HALOT
  rationale: La pregunta retórica en español suena más natural con «¿Y qué ... hay?». Mantiene el valor interrogativo de וּמִי sin perder la comparación que sigue con גּוֹי.
- source_word: גּוֹי גָּדוֹל
  english_pob_choice: great nation
  chosen_spanish: nación grande
  alternatives_spanish:
  - gran pueblo
  - nación grande
  lexicon: HALOT
  rationale: «Nación» conserva el sentido político-colectivo de גּוֹי en este contraste legal. Se mantiene «grande» como cualidad de tamaño/importancia, siguiendo el paralelo con el hebreo.
- source_word: חֻקִּים
  english_pob_choice: statutes
  chosen_spanish: estatutos
  alternatives_spanish:
  - decretos
  - ordenanzas
  lexicon: HALOT
  rationale: «Estatutos» es el equivalente jurídico más establecido para חֻקִּים y preserva el registro formal de normas prescritas.
- source_word: וּ/מִשְׁפָּטִים
  english_pob_choice: judgments
  chosen_spanish: juicios
  alternatives_spanish:
  - fallos
  - sentencias
  - ordenanzas
  lexicon: HALOT
  rationale: Se traduce como «juicios» para conservar la fuerza judicial de מִשְׁפָּטִים y distinguirlo de חֻקִּים. «Juicios» puede sonar menos idiomático que «sentencias», pero aquí mantiene mejor el paralelismo técnico del texto.
- source_word: צַדִּיקִם
  english_pob_choice: righteous
  chosen_spanish: tan justos
  alternatives_spanish:
  - tan rectos
  - tan justos y rectos
  lexicon: HALOT
  rationale: En español, «justos» comunica la dimensión legal-moral de צַדִּיקִם con claridad. Se añadió «tan» para reflejar la comparación intensiva implícita en el hebreo.
- source_word: כְּ/כֹל הַ/תּוֹרָה הַ/זֹּאת
  english_pob_choice: as all this law
  chosen_spanish: como toda esta ley[a]
  alternatives_spanish:
  - como toda esta instrucción
  - como toda esta enseñanza
  lexicon: HALOT
  rationale: Se conserva «ley» como en la decisión inglesa, porque el contexto inmediato es explícitamente jurídico («estatutos y juicios»). La alternativa «instrucción» se preserva para reflejar el alcance semántico más amplio de תּוֹרָה.
- source_word: נֹתֵן לִ/פְנֵי/כֶם
  english_pob_choice: I am setting before you
  chosen_spanish: pongo delante de ustedes
  alternatives_spanish:
  - estoy poniendo delante de ustedes
  - estoy presentando ante ustedes
  lexicon: HALOT
  rationale: «Pongo delante de ustedes» reproduce el idiomatismo hebreo de presentar la ley al pueblo y conserva el valor literal de לִפְנֵיכֶם sin sonar forzado en español.
- source_word: הַ/יּוֹם
  english_pob_choice: today
  chosen_spanish: hoy
  alternatives_spanish:
  - este día
  - en este día
  lexicon: HALOT
  rationale: «Hoy» es la equivalencia natural y moderna de הַיּוֹם, conservando el énfasis temporal.
theological_decisions:
- issue: Sentido de תּוֹרָה en contexto legal
  english_pob_reading: law, with a footnote allowing instruction
  chosen_spanish_reading: ley, con nota para instrucción
  alternative_spanish_readings:
  - instrucción
  - enseñanza
  rationale: En Deuteronomio 4:8 el contexto inmediato enfatiza normas legales («estatutos y juicios»), por lo que «ley» comunica mejor el referente principal. Aun así, la nota mantiene visible el valor más amplio de תּוֹרָה, para no borrar su alcance pedagógico/covenantal.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: 'Coincide con la evaluación de alta concordancia del audit trail inglés: no se reportan revisiones aplicadas en la última pasada, y la formulación española sigue de cerca las decisiones léxicas ya justificadas.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como convención general del proyecto solo cuando aparezca el Tetragrámaton; este versículo no lo contiene.
  - Se evitó «SEÑOR» y «Cristo/Mesías» porque no corresponden al texto.
  - «Juicios» se usó para distinguir מִשְׁפָּטִים de חֻקִּים dentro del paralelismo legal.
  - La nota única se ancla en «ley» para conservar la alternativa semántica de תּוֹרָה sin sobrecargar el texto principal.
