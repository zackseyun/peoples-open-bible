translation:
  language: es
  text: Hice para mí estanques de agua, para regar[a] con ellos una arboleda[b] de árboles que crecían.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para dar de beber» o «para irrigar». El verbo hebreo puede significar «dar de beber» o «regar»; aquí «regar» encaja mejor con el entorno agrícola.
    reason: lexical_alternative
  - marker: b
    text: O «un bosque de árboles que crecían» o «una zona boscosa con árboles que crecían». El hebreo יַעַר puede referirse a un bosque o zona arbolada; aquí se traduce «arboleda» porque el contexto es cultivado y regado.
    reason: lexical_alternative
lexical_decisions:
- source_word: עָשִׂיתִי
  english_pob_choice: I made
  chosen_spanish: Hice
  alternatives_spanish:
  - Construí
  - Hice para mí
  lexicon: HALOT
  rationale: El perfecto qal de 1.ª persona singular de עשה se expresa naturalmente en español con «hice». La idea reflexiva/posesiva que el hebreo refuerza con לִי queda mejor en la frase completa «hice para mí».
- source_word: לִי
  english_pob_choice: for myself
  chosen_spanish: para mí
  alternatives_spanish:
  - para mí mismo
  - para mi propio uso
  lexicon: HALOT
  rationale: La preposición ל con sufijo de 1cs marca beneficio o posesión personal. «Para mí» reproduce esa dirección sin añadir énfasis innecesario; el contexto ya deja claro el carácter autocentrado de la acción.
- source_word: בְּרֵכוֹת מָיִם
  english_pob_choice: pools of water
  chosen_spanish: estanques de agua
  alternatives_spanish:
  - pools de agua
  - reservorios de agua
  - lagunas de agua
  lexicon: HALOT
  rationale: בְּרֵכוֹת designa estanques, depósitos o reservorios. En español, «estanques de agua» suena natural y conserva la imagen concreta sin forzar un término técnico moderno.
- source_word: לְהַשְׁקוֹת
  english_pob_choice: to irrigate
  chosen_spanish: para regar
  alternatives_spanish:
  - para irrigar
  - para dar de beber
  - para regarlos
  lexicon: HALOT
  rationale: El hifil de שקה puede significar hacer beber o regar. En este contexto de estanques y vegetación, «para regar» comunica bien la función práctica en español sin sonar excesivamente técnico.
- source_word: מֵהֶם
  english_pob_choice: from them
  chosen_spanish: desde ellos
  alternatives_spanish:
  - de ellos
  - a partir de ellos
  lexicon: HALOT
  rationale: מִן con sufijo de 3.ª persona plural expresa origen o punto de partida. «Desde ellos» conserva la idea de fuente física del agua para el riego.
- source_word: יַעַר
  english_pob_choice: a grove
  chosen_spanish: un bosque
  alternatives_spanish:
  - un bosque arbolado
  - un arbolado
  - un bosquejo de árboles
  lexicon: HALOT
  rationale: יַעַר normalmente significa bosque o zona boscosa. Aunque el contexto es cultivado, el hebreo no obliga a «grove»; por eso se mantiene el campo semántico más básico con «bosque».
- source_word: צוֹמֵחַ עֵצִים
  english_pob_choice: growing trees
  chosen_spanish: de árboles que crecían
  alternatives_spanish:
  - de árboles en crecimiento
  - de árboles creciendo
  - de árboles brotando
  lexicon: HALOT
  rationale: El participio צוֹמֵחַ describe un crecimiento en curso. En español, «que crecían» evita una traducción forzada y conserva el carácter durativo del hebreo.
theological_decisions:
- issue: 'יַעַר: forest/woodland vs. grove'
  english_pob_reading: a grove of growing trees
  chosen_spanish_reading: un bosque de árboles que crecían
  alternative_spanish_readings:
  - una arboleda de árboles que crecían
  - un bosque arbolado
  rationale: La traducción inglesa opta por «grove» por el contexto cultivado e irrigado; sin embargo, el hebreo יַעַר admite también «bosque» o «zona boscosa». En español, «bosque» evita introducir una restricción demasiado específica y conserva la amplitud del término.
  doctrine_reference: No aplica; decisión léxica-contextual.
- issue: 'לְהַשְׁקוֹת: irrigate vs. water/give drink'
  english_pob_reading: to irrigate
  chosen_spanish_reading: para regar
  alternative_spanish_readings:
  - para irrigar
  - para dar de beber
  rationale: El inglés explicita la infraestructura agrícola con «to irrigate». En español, «para regar» comunica la misma función sin tecnicismo excesivo. No se pierde la idea de abastecimiento deliberado de agua desde depósitos construidos.
  doctrine_reference: No aplica; decisión léxica-contextual.
translation_notes:
  revision_awareness: La revisión inglesa reciente ajustó la fluidez de «growing trees» y añadió una preposición para mayor naturalidad. En español se adoptó una solución igualmente natural, manteniendo la relación de dependencia entre los estanques y el área arbolada, pero sin seguir mecánicamente la sintaxis inglesa.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto; este versículo no contiene el Tetragrámaton.
  - Se eligió «regar» en lugar de «irrigar» por claridad idiomática, aunque ambas opciones son compatibles con el hebreo.
  - Se conservó el valor concreto de בְּרֵכוֹת como depósitos/estanques, evitando una generalización a simple «agua» o una especificación técnica no sustentada.
