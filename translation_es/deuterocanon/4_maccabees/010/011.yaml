    rationale: Si el texto principal dice «sangre culpable», la nota ofrece una alternativa más natural que la propia traducción. Conviene armonizar texto y nota.
  revised_spanish_text: Pero a causa de tu impiedad y culpa de sangre[a], soportarás tormentos sin fin.
