    text: 'Hebreo: «por la boca de los malvados»; la expresión destaca el poder destructivo del habla perversa.'
    reason: cultural_note
  revision_rationale: Se ajusta el verbo a una expresión más natural en español ('se engrandece') que sigue comunicando elevación/prosperidad cívica, y se conserva la alternativa 'se levanta' en nota. La nota [b] debe entenderse como anclada a la frase completa 'por la boca de los malvados', que es precisamente el hebraísmo explicado.
