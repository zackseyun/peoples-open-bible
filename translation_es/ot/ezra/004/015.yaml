translation:
  language: es
  text: para que se haga una búsqueda en el libro de registros de tus padres[a], y encuentres en el libro de registros y sepas que esta ciudad es una ciudad rebelde, perjudicial para reyes y provincias, y que se ha hecho sedición dentro de ella desde días antiguos[b]; por esta razón esta ciudad fue devastada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'tus antepasados' o 'tus predecesores'; literalmente, 'tus padres'.
    reason: lexical_alternative
  - marker: b
    text: La expresión aramea traducida aquí como 'se ha hecho sedición' alude a la promoción o instigación de rebelión dentro de la ciudad.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְבַקַּר
  english_pob_choice: a search may be made
  chosen_spanish: se haga una búsqueda
  alternatives_spanish:
  - se investigue
  - se realice una búsqueda
  lexicon: HALOT
  rationale: El arameo impersonal/jusivo tras דִּי expresa una solicitud formal administrativa. El pasivo reflejo en español conserva ese tono sin imponer un sujeto personal.
- source_word: סְפַר דָּכְרָנַיָּא
  english_pob_choice: book of records
  chosen_spanish: libro de memorias
  alternatives_spanish:
  - libro de registros
  - archivo
  - libro de memoriales
  lexicon: HALOT
  rationale: La expresión alude a un archivo oficial escrito. 'Memorias' conserva la idea de registro con un matiz más cercano al uso histórico y diplomático que 'recuerdos' o una simple paráfrasis.
- source_word: אֲבָהָתָךְ
  english_pob_choice: your fathers
  chosen_spanish: tus padres
  alternatives_spanish:
  - tus antepasados
  - tus padres
  lexicon: HALOT
  rationale: Aunque literalmente es 'tus padres', en contexto se refiere a los predecesores reales/administrativos. 'Tus padres' mantiene la literalidad de la construcción, con la referencia histórica inferida por el contexto.
- source_word: וּתְהַשְׁכַּח
  english_pob_choice: you may find
  chosen_spanish: encuentres
  alternatives_spanish:
  - puedas encontrar
  - halles
  lexicon: HALOT
  rationale: La secuencia continua de petición/resultados en el estilo epistolar se expresa naturalmente en subjuntivo español. 'Encuentres' preserva la dependencia modal sin volverla pesada.
- source_word: וְתִנְדַּע
  english_pob_choice: and know
  chosen_spanish: y sepas
  alternatives_spanish:
  - y conozcas
  - y llegues a saber
  lexicon: HALOT
  rationale: '''Saber'' es la forma más natural en español para el conocimiento concluyente en este contexto judicial-administrativo.'
- source_word: קִרְיְתָא דָךְ
  english_pob_choice: this city
  chosen_spanish: esta ciudad
  alternatives_spanish:
  - esa ciudad
  lexicon: HALOT
  rationale: La deixis sigue la perspectiva de los redactores de la carta; 'esta ciudad' reproduce mejor el señalamiento directo.
- source_word: קִרְיָא מָרָדָא
  english_pob_choice: a rebellious city
  chosen_spanish: una ciudad rebelde
  alternatives_spanish:
  - una ciudad de rebelión
  - una ciudad insubordinada
  lexicon: HALOT
  rationale: '''Rebelde'' es la equivalencia más idiomática para el calificativo acusatorio y preserva el valor político del término.'
- source_word: מְהַנְזְקַת
  english_pob_choice: harmful to
  chosen_spanish: perjudicial para
  alternatives_spanish:
  - dañina para
  - nociva para
  lexicon: HALOT
  rationale: El participio expresa causar daño o perjuicio. 'Perjudicial para' suena natural en español y mantiene el registro formal.
- source_word: מַלְכִין וּמְדִנָן
  english_pob_choice: kings and provinces
  chosen_spanish: reyes y provincias
  alternatives_spanish:
  - reyes y satrapías
  - reyes y territorios
  lexicon: HALOT
  rationale: Se conserva la relación política entre gobernantes y sus administraciones. 'Provincias' es claro y adecuado para el marco imperial.
- source_word: אֶשְׁתַּדּוּר עָבְדִין
  english_pob_choice: sedition has been made
  chosen_spanish: se ha hecho sedición
  alternatives_spanish:
  - se ha cometido sedición
  - se ha levantado sedición
  - ha sido hecha sedición
  lexicon: HALOT
  rationale: La POB inglesa mantuvo la fuerza formal y poco idiomática del arameo. En español, 'se ha hecho sedición' reproduce esa literalidad controlada sin perder inteligibilidad, y conserva la tensión lexical de una expresión no totalmente naturalizada.
- source_word: בְּגַוַּהּ
  english_pob_choice: within it
  chosen_spanish: dentro de ella
  alternatives_spanish:
  - en su interior
  - en medio de ella
  lexicon: HALOT
  rationale: El referente es la ciudad; 'dentro de ella' es la forma más clara y natural en español para indicar actividad interna.
- source_word: מִן יוֹמָת עָלְמָא
  english_pob_choice: from ancient days
  chosen_spanish: desde días antiguos
  alternatives_spanish:
  - desde tiempos antiguos
  - desde los días de antaño
  lexicon: HALOT
  rationale: La frase es un modismo de gran antigüedad histórica, no de eternidad metafísica. 'Desde días antiguos' conserva la cadencia formal y la antigüedad indefinida.
- source_word: עַל דְּנָה
  english_pob_choice: for this reason
  chosen_spanish: por esta razón
  alternatives_spanish:
  - por eso
  - por consiguiente
  lexicon: HALOT
  rationale: Introduce la conclusión de la acusación anterior. 'Por esta razón' mantiene el nexo causal explícito y el tono burocrático.
- source_word: הָחָרְבַת
  english_pob_choice: was laid waste
  chosen_spanish: ha sido arrasada
  alternatives_spanish:
  - fue destruida
  - ha sido devastada
  - quedó arrasada
  lexicon: HALOT
  rationale: El pasivo expresa el estado resultante de devastación de la ciudad. 'Ha sido arrasada' preserva el valor resultativo y es idiomático en español.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente que sustituyó una formulación más interpretativa por 'sedición has been made within it'; por eso el español conserva una opción formal y ligeramente literal ('se ha hecho sedición') en lugar de normalizarla a 'rebelión' o 'insurrección'.
  spanish_consistency_notes:
  - Se mantuvo 'libro de memorias' para conservar la imagen de archivo/registro y no sustituirla por una paráfrasis más genérica.
  - Se evitó 'SEÑOR', 'Cristo' y otros términos no pertinentes al versículo.
  - La deixis y los tiempos verbales siguen el tono de carta oficial y la secuencia volitiva del arameo.
