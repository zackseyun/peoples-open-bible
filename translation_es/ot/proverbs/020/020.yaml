translation:
  language: es
  text: El que maldice a su padre o a su madre, su lámpara se apagará en la oscuridad más profunda[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «en la pupila de la oscuridad», un modismo hebreo para la oscuridad más profunda o más negra.
    reason: cultural_note
  - marker: b
    text: 'O: «su lámpara se apagará en oscuridad total». La imagen de la lámpara probablemente simboliza la vida, el bienestar o el futuro de la persona.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מְקַלֵּל
  english_pob_choice: Whoever curses
  chosen_spanish: El que maldice
  alternatives_spanish:
  - Quien maldice
  - El que maldice
  - Todo el que maldice
  lexicon: HALOT
  rationale: El participio hebreo funciona de manera sustantiva para una afirmación general proverbial. «El que maldice» conserva esa generalidad en español natural. Elegí «maldice» para mantener la fuerza de קלל en este contexto de honor filial, más precisa que «revilece».
- source_word: אָבִיו וְאִמּוֹ
  english_pob_choice: his father or his mother
  chosen_spanish: a su padre o a su madre
  alternatives_spanish:
  - a su padre y a su madre
  - a sus padres
  lexicon: HALOT
  rationale: La conjunción hebrea aquí se entiende de modo disyuntivo en esta fórmula proverbial/jurídica, como en el rastro auditado en inglés. Mantener «o» evita endurecer indebidamente el sentido y conserva la distribución individual del mandamiento implícito.
- source_word: יִדְעַךְ
  english_pob_choice: will be put out
  chosen_spanish: se apagará
  alternatives_spanish:
  - se extinguirá
  - se irá apagando
  lexicon: HALOT
  rationale: El verbo se usa de una lámpara que se apaga o se extingue. «Se apagará» es idiomático en español y comunica bien el pasivo/resultativo del hebreo sin introducir un agente no expresado.
- source_word: נֵרוֹ
  english_pob_choice: his lamp
  chosen_spanish: su lámpara
  alternatives_spanish:
  - su luz
  - su candelero
  lexicon: HALOT
  rationale: «Lámpara» conserva la imagen concreta de נֵר y, en literatura sapiencial, puede sugerir vida, prosperidad o futuro. «Luz» sería más abstracto y menos preciso.
- source_word: בְאִישׁוֹן חֹשֶׁךְ
  english_pob_choice: in deepest darkness
  chosen_spanish: en la oscuridad más profunda[a]
  alternatives_spanish:
  - en la oscuridad más negra
  - en tinieblas densas
  - en la pupila de las tinieblas
  lexicon: HALOT
  rationale: El hebreo usa un modismo que literalmente alude a la «pupila» o «niña» de la oscuridad; el sentido es de oscuridad extrema. «Oscuridad más profunda» reproduce el valor intensivo con naturalidad en español, sin perder la imagen idiomática. Se conserva la posibilidad literal en nota, como lo hace el audit trail inglés.
translation_notes:
  revision_awareness: El texto sigue de cerca el ajuste auditado del inglés POB que cambió la conjunción de «and» a «or» para reflejar mejor la conjunción hebrea en esta fórmula sapiencial/jurídica. También conserva la imagen concreta de la lámpara y explicita en nota el modismo de «la pupila de la oscuridad».
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se conservó «lámpara» para נֵר por coherencia con el uso sapiencial y para no diluir la metáfora.
  - No se usó «padres» porque el hebreo nombra a padre y madre por separado; la disyunción española sigue el ajuste auditado en inglés.
