translation:
  language: es
  text: Me sacó del pozo de tumulto[a], del lodo cenagoso; puso mis pies sobre una roca, afirmando mis pasos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «del pozo de estruendo/ruido»; muchas traducciones interpretan la expresión como «del pozo desolado» o «del pozo de destrucción».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲלֵנִי
  english_pob_choice: He brought me up
  chosen_spanish: Él me hizo subir
  alternatives_spanish:
  - Él me levantó
  - Él me sacó
  lexicon: HALOT
  rationale: עלה en Hifil expresa causar que alguien suba o hacerlo salir de abajo. «Me hizo subir» conserva la acción concreta de rescate y suena natural en español.
- source_word: מִבּוֹר
  english_pob_choice: out of the pit
  chosen_spanish: del pozo
  alternatives_spanish:
  - del foso
  - de la cisterna
  lexicon: HALOT
  rationale: בּוֹר puede designar pozo, foso o cisterna. En este contexto poético de rescate, «pozo» comunica bien la imagen de quedar atrapado en una cavidad profunda sin forzar una interpretación técnica.
- source_word: שָׁאוֹן
  english_pob_choice: of tumult
  chosen_spanish: de tumulto
  alternatives_spanish:
  - de estruendo
  - de ruido
  - de destrucción
  lexicon: HALOT
  rationale: שָׁאוֹן se refiere primariamente a ruido, estruendo o tumulto. «Tumulto» preserva esa carga sonora y evita sustituirla por una explicación interpretativa como «destrucción».
- source_word: מִטִּיט הַיָּוֵן
  english_pob_choice: out of the miry clay
  chosen_spanish: del lodo cenagoso
  alternatives_spanish:
  - del lodo del cieno
  - del fango cenagoso
  - del lodo pegajoso
  lexicon: HALOT
  rationale: טִיט e יָוֵן juntos intensifican la imagen de barro/lodo resbaladizo y pegajoso. «Lodo cenagoso» evita una repetición pesada y mantiene la idea de fango inestable y sucio.
- source_word: וַיָּקֶם
  english_pob_choice: he set
  chosen_spanish: puso
  alternatives_spanish:
  - estableció
  - hizo poner
  - hizo quedar
  lexicon: HALOT
  rationale: קום en Hifil puede significar poner, establecer o hacer quedar firme. «Puso» es la forma más natural en español para la imagen de colocar los pies en un lugar seguro.
- source_word: עַל סֶלַע
  english_pob_choice: on a rock
  chosen_spanish: sobre una roca
  alternatives_spanish:
  - sobre peña
  - en una roca
  - sobre un peñasco
  lexicon: HALOT
  rationale: סֶלַע es roca o peñasco. «Sobre una roca» conserva la metáfora de firmeza con un español claro y amplio.
- source_word: רַגְלַי
  english_pob_choice: my feet
  chosen_spanish: mis pies
  alternatives_spanish:
  - mis plantas
  - mis pies
  lexicon: HALOT
  rationale: La forma dual/plural con sufijo de primera persona se refleja de manera directa como «mis pies», sin necesidad de abstracción.
- source_word: כּוֹנֵן אֲשֻׁרָי
  english_pob_choice: making my steps secure
  chosen_spanish: afirmando mis pasos
  alternatives_spanish:
  - haciendo firmes mis pasos
  - asegurando mis pasos
  - estableciendo mis andares
  lexicon: HALOT
  rationale: כּוֹנֵן expresa hacer firme, establecer o asegurar. «Afirmando mis pasos» mantiene el sentido resultativo y poético, y «pasos» traduce bien אֲשֻׁרָי como andares/caminos concretos sin volverlo demasiado abstracto.
theological_decisions:
- issue: Si traducir la imagen como rescate concreto o como liberación moral/espiritual más interpretativa
  english_pob_reading: Preserve the concrete rescue imagery in the main text
  chosen_spanish_reading: 'Preservar en el texto principal la imagen concreta de rescate: pozo, lodo, roca y pasos firmes'
  alternative_spanish_readings:
  - Él me rescató de la destrucción
  - Él me sacó de la ruina
  rationale: El hebreo presenta una secuencia imagética muy concreta. La versión española conserva esa tensión poética sin convertirla en una explicación doctrinal abstracta.
  doctrine_reference: Principio de primacía del texto original; conservar la tensión metafórica sin resolverla prematuramente.
translation_notes:
  revision_awareness: La redacción sigue el ajuste más reciente del audit trail inglés, que prefirió «miry clay» para reflejar con mayor precisión el hebreo y evitar redundancia. En español se mantuvo esa precisión con «lodo cenagoso», preservando el paralelismo poético y la imaginería concreta.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino solo cuando aparezca en el pasaje; aquí no aparece.
  - Se mantiene un registro bíblico contemporáneo, evitando arcaísmos innecesarios como «barro cenagoso» o «hizo mis pies» si no aportan mayor fidelidad.
  - «Pasos» se conserva para mantener el paralelismo con «pies» y no diluir el hebreo en una abstracción demasiado amplia.
