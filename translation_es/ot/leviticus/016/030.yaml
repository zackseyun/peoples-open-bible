- from: Porque en este día se hará expiación por ustedes para purificarlos; de todos sus pecados, delante de Yahvé serán limpios.
  to: Porque en este día se hará expiación[a] por ustedes para purificarlos; de todos sus pecados delante de Yahvé quedarán limpios.
