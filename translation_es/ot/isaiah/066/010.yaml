  text: שִׂמְח֧וּ אֶת יְרוּשָׁלִַ֛ם וְ/גִ֥ילוּ בָ֖/הּ כָּל אֹהֲבֶ֑י/הָ שִׂ֤ישׂוּ אִתָּ/הּ֙ מָשׂ֔וֹשׂ כָּל הַ/מִּֽתְאַבְּלִ֖ים עָלֶֽי/הָ־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/isaiah/066/010.yaml
  text: Rejoice with Jerusalem and be glad in her[a], all you who love her; rejoice with her in joy[b], all you who mourn over her.
  footnotes:
  - marker: a
    text: Or 'Rejoice over Jerusalem.' The Hebrew construction with אֶת after 'rejoice' can be understood as marking Jerusalem as the object of rejoicing, though the parallel phrases 'in her' and 'with her' favor the sense of shared joy.
    reason: lexical_alternative
  - marker: b
    text: Or 'exult with her with joy' / 'rejoice with her greatly.' The Hebrew uses a cognate noun after the verb for emphasis.
    reason: lexical_alternative
