review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del hebreo: movimiento del hablante, paralelismo campo/viña, perezoso/hombre, y retiene correctamente el masculino individual en אדם. Sin embargo, חֲסַר לֵב es un modismo sapiencial de falta de juicio/entendimiento; «faltante de corazón» no preserva bien el sentido idiomático en español y suena calcado y potencialmente engañoso.'
  spanish_quality_summary: La frase es generalmente clara y natural en «Pasé junto al campo… y junto a la viña…», pero «faltante de corazón» es poco idiomático y puede sugerir falta de compasión o incluso una anomalía física, no falta de sensatez. «falto de entendimiento» comunica mejor el sentido en español digno y legible. También conviene mantener la nota para la literalidad «falto de corazón».
  glossary_alignment: Sin términos doctrinales de glosario mayor en este versículo. «Perezoso» funciona aceptablemente para עצל en Proverbios, aunque «holgazán» sería una alternativa posible. La decisión clave es alinear חֲסַר לֵב con el valor idiomático auditado por el POB inglés, preservando la literalidad en nota.
  issues:
  - severity: high
    issue: «faltante de corazón» para חֲסַר לֵב
    rationale: El hebreo es un modismo que significa falto de juicio/entendimiento. En español, «faltante de corazón» no es una expresión natural y distorsiona el sentido principal.
  - severity: medium
    issue: La nota actual no compensa suficientemente la mala elección principal
    rationale: La literalidad pertenece mejor en nota, mientras el texto principal debe comunicar el sentido idiomático. Así se preserva tanto fidelidad semántica como legibilidad.
