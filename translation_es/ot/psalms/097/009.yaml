translation:
  language: es
  text: Pues tú, Yahvé, eres Altísimo sobre toda la tierra; eres muy exaltado sobre todos los dioses[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sobre todos los seres divinos» o «sobre todos los seres celestiales». El hebreo אֱלֹהִים puede designar dioses, seres divinos o poderes celestiales según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - En efecto
  lexicon: HALOT
  rationale: Introduce la razón o fundamento del enunciado anterior. En español, «Porque» comunica bien esa relación causal/explicativa sin sonar forzado en poesía bíblica.
- source_word: אַתָּה
  english_pob_choice: you
  chosen_spanish: tú
  alternatives_spanish:
  - tú mismo
  - vos
  lexicon: HALOT
  rationale: 'Se conserva el pronombre explícito para mantener el énfasis del hebreo: el sujeto es Yahvé mismo.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: 'Se usa la forma de uso proyectado por el POB en español: transliteración del nombre divino, no sustitución por un título. «Yahvé» es la forma más natural y ampliamente reconocible en español bíblico contemporáneo.'
- source_word: עֶלְיוֹן
  english_pob_choice: Most High
  chosen_spanish: Altísimo
  alternatives_spanish:
  - El Altísimo
  - Supremo
  lexicon: HALOT
  rationale: «Altísimo» reproduce el valor superlativo y funciona naturalmente como título divino en español. Se evita una perífrasis más pesada sin perder la carga teológica.
- source_word: עַל כָּל הָאָרֶץ
  english_pob_choice: over all the earth
  chosen_spanish: sobre toda la tierra
  alternatives_spanish:
  - sobre toda la tierra
  - sobre el mundo entero
  lexicon: HALOT
  rationale: «Sobre toda la tierra» expresa bien la idea de supremacía y el alcance global del hebreo, con español idiomático y sobrio.
- source_word: מְאֹד
  english_pob_choice: far
  chosen_spanish: muy
  alternatives_spanish:
  - en gran manera
  - mucho
  lexicon: HALOT
  rationale: El hebreo intensifica la elevación. En español, «muy exaltado» es una manera natural de conservar esa intensificación sin introducir un adverbio espacial que podría sonar artificial.
- source_word: נַעֲלֵיתָ
  english_pob_choice: you are exalted
  chosen_spanish: eres exaltado
  alternatives_spanish:
  - has sido exaltado
  - estás exaltado
  lexicon: HALOT
  rationale: Se mantiene la voz/resultativo del verbo con una pasiva en español. «Eres exaltado» conserva el paralelo poético con «eres Altísimo» y la afirmación de elevación/supremacía.
- source_word: עַל כָּל אֱלֹהִים
  english_pob_choice: above all gods
  chosen_spanish: sobre todos los dioses
  alternatives_spanish:
  - sobre todos los seres divinos
  - sobre todos los seres celestiales
  lexicon: HALOT
  rationale: Se preserva el plural directo «dioses» para mantener la fuerza polémica y la tensión lexical del hebreo. No se resuelve de antemano hacia «seres divinos» o «celestiales».
theological_decisions:
- issue: Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  rationale: Se conserva el nombre propio del pacto, en línea con la política del POB de no ocultar YHWH tras un título como «Señor».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh / Spanish project default: Yahvé'
- issue: Sentido de אֱלֹהִים al final del verso
  english_pob_reading: gods
  chosen_spanish_reading: dioses
  alternative_spanish_readings:
  - seres divinos
  - seres celestiales
  rationale: 'Se preserva la ambigüedad controlada del hebreo: puede referirse a dioses rivales, seres divinos o poderes celestiales según el contexto. «Dioses» mantiene la tensión sin suavizarla.'
  doctrine_reference: DOCTRINE.md Translation philosophy §3 Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo masorético y coincide con el juicio de alta concordancia del audit trail inglés, sin cambios respecto a la revisión más reciente. La única adaptación relevante es la normalización al español de la construcción intensiva con «muy exaltado», manteniendo el paralelismo poético y la referencia polémica a «todos los dioses».
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה, conforme al estándar del proyecto en español.
  - Se mantiene «dioses» para אֱלֹהִים en su sentido plural contextual, con nota para las lecturas alternativas documentadas.
  - La puntuación conserva una pausa fuerte tras «tierra» para reflejar la cesura poética del verso.
  - «Altísimo» se emplea como título divino natural en español, sin sustituir el nombre propio divino.
