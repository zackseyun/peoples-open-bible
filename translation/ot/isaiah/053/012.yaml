id: ISA.53.12
reference: Isaiah 53:12
source:
  edition: WLC
  text: לָ/כֵ֞ן אֲחַלֶּק ל֣/וֹ בָ/רַבִּ֗ים וְ/אֶת עֲצוּמִים֮ יְחַלֵּ֣ק שָׁלָל֒ תַּ֗חַת אֲשֶׁ֨ר הֶעֱרָ֤ה לַ/מָּ֨וֶת֙ נַפְשׁ֔/וֹ וְ/אֶת פֹּשְׁעִ֖ים נִמְנָ֑ה וְ/הוּא֙ חֵטְא רַבִּ֣ים נָשָׂ֔א וְ/לַ/פֹּשְׁעִ֖ים יַפְגִּֽיעַ־־־־׃ס
translation:
  text: Therefore I will allot him a portion among the many[a], and he will divide plunder with the strong, because he poured out his life to death and was numbered with transgressors[c][b]; yet he bore the sin of many and intercedes for transgressors.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I will give him a share with the many'; the Hebrew of the first clause is compact and has been understood in more than one closely related way.
    reason: alternative_reading
  - marker: b
    text: Or 'was counted among transgressors.'
    reason: lexical_alternative
  - marker: c
    text: Or 'makes intercession for transgressors.' The Hebrew verb can be rendered either more formally or more idiomatically here.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - For this reason
  - Therefore
  lexicon: HALOT
  rationale: Marks the conclusion/result of the servant's suffering and vindication; 'Therefore' is the most natural English discourse marker here.
- source_word: אֲחַלֶּק לוֹ בָרַבִּים
  chosen: I will allot to him a portion among the many
  alternatives:
  - I will divide to him among the many
  - I will give him a share with the many
  - I will allot him the many
  lexicon: HALOT
  rationale: The Piel of חלק means divide/apportion. The phrase is syntactically difficult; 'allot to him a portion among the many' preserves the imagery of assigned spoil/share without overcommitting to a more interpretive reading such as 'the many as his portion.' 'The many' is retained rather than generalized to 'great' because רַבִּים here naturally parallels the later 'many' in the verse.
- source_word: עֲצוּמִים
  chosen: the strong
  alternatives:
  - the mighty
  - the numerous
  lexicon: HALOT
  rationale: The adjective commonly denotes those strong or mighty. 'The strong' is clear modern English and fits the parallelism with dividing spoil.
- source_word: יְחַלֵּק שָׁלָל
  chosen: he will divide plunder
  alternatives:
  - he will apportion spoil
  - he will divide the spoil
  lexicon: HALOT
  rationale: Standard military-victory imagery. 'Plunder' is idiomatic modern English for שָׁלָל.
- source_word: תַּחַת אֲשֶׁר
  chosen: because
  alternatives:
  - because
  - in return for
  - on account of which
  lexicon: HALOT
  rationale: Introduces the ground for the exaltation. 'Because' communicates the causal force naturally in English.
- source_word: הֶעֱרָה לַמָּוֶת נַפְשׁוֹ
  chosen: he poured out his life to death
  alternatives:
  - he poured out himself to death
  - he exposed his life to death
  lexicon: HALOT
  rationale: The idiom literally speaks of pouring out the נפשׁ to death. 'Life' is chosen for נפשׁ here because it best conveys the sense of one's life/self being given over, while remaining close to the Hebrew imagery.
- source_word: וְאֶת פֹּשְׁעִים נִמְנָה
  chosen: and was numbered with transgressors
  alternatives:
  - and was counted among transgressors
  - and was reckoned with rebels
  lexicon: HALOT
  rationale: 'A passive/reflexive sense is natural: he was counted as belonging among transgressors. ''Transgressors'' preserves the moral-legal force of פֹּשְׁעִים.'
- source_word: פֹּשְׁעִים
  chosen: transgressors
  alternatives:
  - rebels
  - offenders
  - sinners
  lexicon: HALOT
  rationale: From פשע, emphasizing rebellion/transgression rather than generic sin. 'Transgressors' best preserves that nuance and matches the repeated use later in the verse.
- source_word: וְהוּא
  chosen: yet he
  alternatives:
  - and he
  - but he
  - yet he
  lexicon: HALOT
  rationale: Though simple waw can be rendered 'and,' English style benefits from marking the contrast between his being numbered with transgressors and his actually bearing others' sin. 'Yet' brings out the adversative sense implied by the context without adding foreign theology.
- source_word: חֵטְא רַבִּים נָשָׂא
  chosen: he bore the sin of many
  alternatives:
  - he carried the sin of many
  - he bore many people's sin
  lexicon: HALOT
  rationale: נשא with sin commonly means bear/carry in a sacrificial or representative sense. Singular 'sin' with collective 'many' is preserved from the Hebrew construction.
- source_word: רַבִּים
  chosen: many
  alternatives:
  - the many
  - multitudes
  lexicon: HALOT
  rationale: Retained as 'many' in both occurrences tied to the servant's representative work. This preserves the Hebrew wording and avoids importing a universalizing or restrictive theological conclusion beyond the text.
- source_word: וְלַפֹּשְׁעִים יַפְגִּיעַ
  chosen: and intercedes for transgressors
  alternatives:
  - and makes intercession for transgressors
  - and pleads for transgressors
  - and caused it to strike upon transgressors
  lexicon: HALOT
  rationale: The Hiphil of פגע can mean intercede/entreat in contexts of petition. Given the parallel with bearing sin and the preposition לְ, 'intercedes for' is the best contextual rendering in clear modern English. 'Makes intercession' is more traditional but less natural.
