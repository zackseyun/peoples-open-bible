translation:
  language: es
  text: Ahora bien, el resto de los hechos de Azarías, y todo lo que hizo, ¿no están escritos[a] en el libro de las Crónicas de los reyes de Judá[b]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «registrados» en lugar de «escritos» para הֵם כְּתוּבִים; el texto principal conserva la redacción más literal.
    reason: lexical_alternative
  - marker: b
    text: «El libro de las Crónicas de los reyes de Judá» alude a un registro real o anales citado a lo largo de Reyes.
    reason: cultural_note
lexical_decisions:
- source_word: יֶתֶר
  english_pob_choice: the rest of
  chosen_spanish: el resto de
  alternatives_spanish:
  - lo demás de
  - el remanente de
  lexicon: HALOT
  rationale: La fórmula regnal expresa lo que queda sin narrar en este resumen; «el resto de» es natural en español y conserva el valor archivístico del hebreo.
- source_word: דִּבְרֵי
  english_pob_choice: acts
  chosen_spanish: hechos
  alternatives_spanish:
  - actos
  - obras
  - palabras
  lexicon: HALOT
  rationale: En este contexto histórico, דִּבְרֵי apunta a los hechos o acciones de un rey más que a sus palabras; «hechos» mantiene esa amplitud sin sonar forzado.
- source_word: עֲזַרְיָהוּ
  english_pob_choice: Azariah
  chosen_spanish: Azarías
  alternatives_spanish:
  - Azaríasu
  lexicon: Transliteración estándar del nombre hebreo
  rationale: El nombre se vierte de forma normalizada al español bíblico como «Azarías».
- source_word: וְכָל אֲשֶׁר עָשָׂה
  english_pob_choice: and all that he did
  chosen_spanish: y todo lo que hizo
  alternatives_spanish:
  - y todo lo que realizó
  - y cuanto hizo
  lexicon: HALOT
  rationale: La cláusula relativa es directa y formularia; «todo lo que hizo» reproduce bien la amplitud del hebreo sin añadir matices ajenos.
- source_word: הֵם כְּתוּבִים
  english_pob_choice: are they not written
  chosen_spanish: ¿no está escrito?
  alternatives_spanish:
  - ¿no están escritos?
  - ¿no se encuentran escritos?
  lexicon: HALOT
  rationale: El hebreo usa una pregunta retórica con plural semántico y verbo pasivo. En español, el referente es la información registrada, por lo que un singular impersonal resulta más natural y sigue el valor documental del texto.
- source_word: עַל סֵפֶר
  english_pob_choice: in the Book
  chosen_spanish: en el Libro
  alternatives_spanish:
  - en el rollo
  - sobre el libro
  lexicon: HALOT
  rationale: «Libro» refleja el sentido archivístico convencional de סֵפֶר en esta fórmula real, y es la forma más comprensible en español.
- source_word: דִּבְרֵי הַיָּמִים
  english_pob_choice: the Chronicles
  chosen_spanish: de las Crónicas
  alternatives_spanish:
  - de los anales
  - de los días
  lexicon: HALOT
  rationale: El título de la fuente histórica se conserva con «Crónicas», que corresponde al valor de archivo/registro del hebreo en este contexto.
- source_word: לְמַלְכֵי יְהוּדָה
  english_pob_choice: of the Kings of Judah
  chosen_spanish: de los reyes de Judá
  alternatives_spanish:
  - para los reyes de Judá
  lexicon: HALOT
  rationale: El ל aquí funciona como genitivo de pertenencia/título; «de los reyes de Judá» expresa el nombre de la fuente de modo natural y fiel.
