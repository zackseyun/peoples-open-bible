translation:
  language: es
  text: 'Hak-kain[a], Gibeah y Timnah: diez ciudades con sus asentamientos.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus aldeas». El término hebreo se refiere a asentamientos menores dependientes de las ciudades nombradas.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַקַּיִן
  english_pob_choice: Hak-kain
  chosen_spanish: Hak-kain
  alternatives_spanish:
  - Kain
  - el Kain
  lexicon: HALOT
  rationale: Se trata de un topónimo en una lista territorial; por ello se conserva la transliteración. Mantengo también el artículo hebreo incorporado a la forma convencional del nombre, en lugar de convertirlo en un artículo español independiente.
- source_word: גִּבְעָה
  english_pob_choice: Gibeah
  chosen_spanish: Gibeah
  alternatives_spanish:
  - Gibea
  - Colina
  lexicon: HALOT
  rationale: Es un nombre propio de lugar dentro de un inventario geográfico; la transliteración respeta el dato del original mejor que una traducción por sentido común como «colina».
- source_word: תִמְנָה
  english_pob_choice: Timnah
  chosen_spanish: Timna
  alternatives_spanish:
  - Timnah
  lexicon: HALOT
  rationale: Es un topónimo. «Timna» es una adaptación posible al español, pero «Timnah» conserva mejor la forma convencional y la continuidad con la audit trail en inglés.
- source_word: עָרִים עֶשֶׂר
  english_pob_choice: ten cities
  chosen_spanish: diez ciudades
  alternatives_spanish:
  - diez poblaciones
  - diez pueblos
  lexicon: HALOT
  rationale: La fórmula hebrea resume los sitios urbanos enumerados. «Ciudades» reproduce con claridad la categoría territorial usual en este tipo de listas.
- source_word: חַצְרֵיהֶן
  english_pob_choice: their settlements
  chosen_spanish: sus asentamientos
  alternatives_spanish:
  - sus aldeas
  - sus poblados
  - sus dependencias
  lexicon: HALOT
  rationale: El término designa asentamientos menores dependientes de las ciudades nombradas. «Asentamientos» preserva la amplitud semántica sin restringir innecesariamente a «aldeas» o «villages».
translation_notes:
  revision_awareness: La auditoría en inglés indica alta concordancia y no registra revisiones aplicadas; por ello el español sigue de cerca la segmentación y las decisiones léxicas ya establecidas, sin introducir cambios interpretativos adicionales.
  spanish_consistency_notes:
  - Se conserva la transliteración de los tres topónimos para mantener la correspondencia con el texto fuente y con la tradición auditada en inglés.
  - «Asentamientos» se usa como equivalente amplio de חַצְרֵיהֶן; la nota al pie preserva la alternativa más específica «aldeas» porque el hebreo admite esa matización.
  - La puntuación con dos puntos refleja el cierre de la fórmula de resumen numérico del versículo.
  - El artículo hebreo integrado en Hak-kain no se descompone en español para evitar una traducción artificial de un nombre propio.
