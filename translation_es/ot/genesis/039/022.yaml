translation:
  language: es
  text: Y el jefe de la cárcel puso[a] en la mano de Yosef a todos los presos que estaban en la cárcel, y todo lo que allí se hacía, él[b] era quien lo hacía.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: ''en la mano de Yosef'', un modismo que significa que los presos fueron encomendados a su control.'
    reason: lexical_alternative
  - marker: b
    text: O 'él lo hacía'; el hebreo destaca la responsabilidad y la acción continua de Yosef en la administración de la cárcel.
    reason: alternative_reading
lexical_decisions:
- source_word: שַׂר בֵּית הַסֹּהַר
  english_pob_choice: the chief of the prison
  chosen_spanish: el jefe de la cárcel
  alternatives_spanish:
  - el encargado de la cárcel
  - el warden de la cárcel
  - el capitán de la cárcel
  lexicon: HALOT
  rationale: שַׂר señala a un oficial con autoridad; en este contexto, 'jefe' comunica bien la idea de quien está a cargo sin sonar forzado en español. 'Cárcel' es más natural que 'prisión' en español moderno, aunque ambas son posibles.
- source_word: בְּיַד יוֹסֵף
  english_pob_choice: into Yosef’s hand
  chosen_spanish: en mano de Yosef
  alternatives_spanish:
  - en la mano de Yosef
  - bajo la autoridad de Yosef
  - entregado a Yosef
  lexicon: HALOT
  rationale: La expresión hebrea 'en/into la mano de' es idiomática y expresa encomienda o puesta bajo control. 'En mano de' conserva la imagen original y su fuerza de delegación.
- source_word: יוֹסֵף
  english_pob_choice: Yosef
  chosen_spanish: Yosef
  alternatives_spanish:
  - José
  lexicon: convención del proyecto
  rationale: Se conserva la transliteración del nombre propia del proyecto, en lugar de la forma tradicional española 'José'.
- source_word: כָּל הָאֲסִירִם
  english_pob_choice: all the prisoners
  chosen_spanish: a todos los presos
  alternatives_spanish:
  - a todos los prisioneros
  - a todos los cautivos
  - a todos los encarcelados
  lexicon: HALOT
  rationale: אֲסִירִים son personas atadas o encarceladas. 'Presos' es claro y natural en este contexto carcelario.
- source_word: אֲשֶׁר בְּבֵית הַסֹּהַר
  english_pob_choice: who were in the prison
  chosen_spanish: que estaban en la cárcel
  alternatives_spanish:
  - que estaban en la prisión
  - que se hallaban en la cárcel
  - que estaban dentro de la cárcel
  lexicon: HALOT
  rationale: La cláusula relativa identifica a los presos ubicados allí. 'Estaban en la cárcel' es una formulación natural y fiel al sentido locativo.
- source_word: וְאֵת כָּל אֲשֶׁר עֹשִׂים שָׁם
  english_pob_choice: and whatever was done there
  chosen_spanish: y todo lo que allí se hacía
  alternatives_spanish:
  - y todo lo que hacían allí
  - y cuanto se hacía allí
  - y todo lo que era hecho allí
  lexicon: HALOT
  rationale: El participio plural hebreo permite una construcción impersonal/pasiva en español. 'Se hacía' mantiene el carácter general e indefinido de toda actividad realizada allí.
- source_word: הוּא הָיָה עֹשֶׂה
  english_pob_choice: he was the one doing it
  chosen_spanish: él lo hacía
  alternatives_spanish:
  - él era el que lo hacía
  - era él quien lo hacía
  - él estaba a cargo de hacerlo
  lexicon: HALOT
  rationale: La combinación de pronombre enfático y participio expresa continuidad y responsabilidad. 'Él lo hacía' es breve y natural; la fuerza enfática se puede captar por el contexto, y en español se puede explicar mejor con una nota.
translation_notes:
  revision_awareness: El audit trail en inglés mantiene la idea de encomienda ('into Yosef’s hand') y la lectura de acción continua/emfática ('he was the one doing it'). También registra que la forma más natural en inglés pasó de 'he was the one who did it' a 'he was the one doing it' para reflejar mejor el participio hebreo. En español se optó por una redacción fluida, conservando la imagen de la 'mano' con nota y dejando una nota para la fuerza enfática del cierre.
  spanish_consistency_notes:
  - Se siguió la transliteración 'Yosef' para coherencia con el proyecto.
  - Se prefirió 'cárcel' por naturalidad en español, sin perder el referente de בית הסהר.
  - La sintaxis impersonal 'todo lo que allí se hacía' evita introducir sujetos no presentes en el hebreo.
  - La conclusión 'él lo hacía' es idiomática en español, pero la nota preserva la alternativa más explícita sobre la continuidad y responsabilidad.
