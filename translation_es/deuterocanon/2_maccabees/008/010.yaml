translation:
  language: es
  text: Pero Nicanor se comprometió a pagar al rey el tributo debido a los romanos[a], por valor de dos mil talentos[b], de la cautividad de los judíos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «el tributo al rey, para los romanos». El griego es compacto; el sentido es que Nicanor propuso cubrir con la captura de los judíos la obligación del rey hacia Roma.'
    reason: alternative_reading
  - marker: b
    text: Es decir, obteniéndolos mediante la captura y venta o rescate de judíos.
    reason: cultural_note
lexical_decisions:
- source_word: ἰδιωτεύσατο
  english_pob_choice: undertook
  chosen_spanish: se comprometió
  alternatives_spanish:
  - se hizo cargo de
  - tomó sobre sí
  - asumió
  lexicon: LSJ
  rationale: El verbo expresa que Nicanor tomó personalmente la iniciativa de encargarse de la obligación. «Se comprometió» comunica bien en español la idea de asumir una obligación de manera voluntaria, sin volverla demasiado técnica ni perder el matiz de iniciativa personal.
- source_word: φόρον
  english_pob_choice: tribute
  chosen_spanish: tributo
  alternatives_spanish:
  - impuesto
  - contribución
  - tributación
  lexicon: LSJ
  rationale: En este contexto político-imperial, «tributo» es el equivalente más natural y fiel para φόρος, mejor que el genérico «impuesto».
- source_word: τῷ βασιλεῖ
  english_pob_choice: to the king
  chosen_spanish: al rey
  alternatives_spanish:
  - para el rey
  - para el monarca
  lexicon: LSJ
  rationale: La dative de destinatario se rinde directamente con «al rey», sin añadir información no presente en el griego.
- source_word: τοῖς ις Ῥωμαίοις
  english_pob_choice: owed to the Romans
  chosen_spanish: debido a los romanos
  alternatives_spanish:
  - para los romanos
  - a los romanos
  - que debía a los romanos
  lexicon: LSJ
  rationale: El griego es compacto y puede leerse como el tributo relacionado con Roma. En español, «debido a los romanos» mantiene la relación de obligación que el audit trail inglés explicitó, sin forzar una paráfrasis excesiva.
- source_word: ὄντα
  english_pob_choice: amounting to
  chosen_spanish: por valor de
  alternatives_spanish:
  - que ascendía a
  - que era de
  - equivalente a
  lexicon: LSJ
  rationale: Para una suma monetaria, «por valor de» es una forma natural de expresar el participio cuantificador y conserva el dato económico de manera clara.
- source_word: τάλαντων δισχιλίων
  english_pob_choice: two thousand talents
  chosen_spanish: dos mil talentos
  alternatives_spanish:
  - dos mil talentos de plata
  - dos mil talentos
  lexicon: LSJ
  rationale: Traducción directa del monto, conservando la unidad antigua de valor sin modernizarla.
- source_word: ἐκ τῆς τῶν Ἰουδαίων αἰχμαλωσίας
  english_pob_choice: from the captivity of the Jews
  chosen_spanish: sacándolo de la cautividad de los judíos
  alternatives_spanish:
  - a partir de la cautividad de los judíos
  - mediante la cautividad de los judíos
  - de la cautividad de los judíos
  lexicon: LSJ
  rationale: La construcción expresa la fuente de la que se obtendría el dinero. «Sacándolo de» hace explícita la idea de financiarlo con ese medio, mientras «cautividad» conserva el sentido fuerte de captura/encierro que el inglés POB preservó con «captivity».
- source_word: ἐκπληρώσειν
  english_pob_choice: to pay
  chosen_spanish: pagar
  alternatives_spanish:
  - cumplir
  - saldar
  - desembolsar
  lexicon: LSJ
  rationale: En un contexto financiero, «pagar» es la opción más clara e idiomática para el infinitivo de cumplimiento de una obligación monetaria.
theological_decisions:
- issue: Relación sintáctica entre el tributo y los romanos
  english_pob_reading: the tribute owed to the Romans, understood as the king's obligation to Rome
  chosen_spanish_reading: el tributo debido a los romanos
  alternative_spanish_readings:
  - el tributo para los romanos
  - el tributo al rey, por los romanos
  rationale: El griego es comprimido, y la lectura inglesa entendió que se trata de la obligación del rey relacionada con Roma. En español mantengo esa comprensión con una formulación natural que conserva la tensión sintáctica sin resolverla de modo arbitrario.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source sense over wooden tradition.'
- issue: Matiz de la fuente del dinero
  english_pob_reading: from the captivity of the Jews
  chosen_spanish_reading: sacándolo de la cautividad de los judíos
  alternative_spanish_readings:
  - de la cautividad de los judíos
  - mediante la cautividad de los judíos
  - a partir de la cautividad de los judíos
  rationale: La frase no habla de una cautividad abstracta, sino del provecho obtenido por la captura de judíos. Mantengo «cautividad» para no suavizar el sentido moralmente grave del texto, y «sacándolo de» deja claro que ese era el medio de obtención.
  doctrine_reference: Source-faithful rendering of grim economic exploitation; avoid euphemizing captivity/enslavement.
translation_notes:
  revision_awareness: 'This draft follows the latest English revision that clarified the word order: the tribute is rendered as owed to the Romans and paid to the king, while retaining the source''s compact Greek structure and the grim financing through Jewish captivity. The Spanish preserves that same interpretive decision without flattening the ambiguity.'
  spanish_consistency_notes:
  - Se usa «Yahvé» por defecto en el proyecto, pero este versículo no contiene el nombre divino.
  - Se mantiene «cautividad» en lugar de suavizar a «prisión» o «esclavitud» para conservar el campo semántico del griego y el sentido económico-moral del contexto.
  - «Tributo» se conserva por coherencia con el valor político del término φόρος.
  - «Talentos» se deja sin conversión monetaria moderna, siguiendo el tratamiento auditado del texto base.
