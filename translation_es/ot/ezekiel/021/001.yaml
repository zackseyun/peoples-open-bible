lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: came
  chosen_spanish: vino
  alternatives_spanish:
  - llegó
  - se dirigió
  lexicon: HALOT
  rationale: En la fórmula profética ויהי דבר־יהוה אלי, el sentido idiomático es que la palabra divina 'vino' al profeta. 'Vino a mí' reproduce con naturalidad ese movimiento de comunicación sin volverlo mecánico.
- source_word: דְבַר
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - el mensaje
  - el asunto
  lexicon: HALOT
  rationale: דבר aquí designa una comunicación verbal de Dios. 'La palabra' preserva la fórmula profética establecida y su peso teológico mejor que 'mensaje', que sería más interpretativo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino en español como 'Yahvé', conforme al criterio del proyecto para יְהוָה, en lugar de sustituirlo por un título como 'el SEÑOR'.
- source_word: אֵלַי
  english_pob_choice: to me
  chosen_spanish: a mí
  alternatives_spanish:
  - para mí
  - hacia mí
  lexicon: HALOT
  rationale: La preposición con sufijo de primera persona expresa dirección hacia el profeta. 'A mí' es la forma natural y fiel en español contemporáneo.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - para decir
  lexicon: HALOT
  rationale: En esta fórmula introductoria, el infinitivo funciona como marcador de discurso directo. 'Diciendo' conserva esa función en español y prepara la cita que sigue.
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El hebreo usa el Tetragrámaton directamente. La forma española 'Yahvé' preserva el nombre propio del pacto y evita la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: La revisión más reciente indicó que no hacía falta ningún cambio; la presente redacción sigue ese acuerdo y mantiene la fórmula profética sin alteraciones sustantivas.
  spanish_consistency_notes:
  - Se mantuvo 'la palabra' como equivalente de דבר, en continuidad con la fórmula profética clásica del texto hebreo.
  - Se usó 'Yahvé' de manera consistente con la política del proyecto para יהוה.
  - El orden y la puntuación buscan sonar naturales en español sin perder la estructura introductoria del original.
