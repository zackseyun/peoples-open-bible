    rationale: La nota [b] en el borrador está anclada en «piedras cortadas[b]», pero su contenido explica «la casa» = templo. Eso crea una discordancia formal y semántica. La nota léxica alternativa debería ir con «piedras cortadas», y la nota de aclaración contextual con «la casa».
  - severity: medium
