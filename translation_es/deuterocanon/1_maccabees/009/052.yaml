translation:
  language: es
  text: Y fortificaron la ciudad, y Bet-sur, y Gazara[a], y la ciudadela[b], y pusieron en ellas fuerzas y provisiones de comida.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La forma griega es Gazara; a menudo se identifica con Gezer.
    reason: cross_reference
  - marker: b
    text: O «el Acra», nombre histórico de la fortaleza amurallada de Jerusalén.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὠχύρωσαν
  english_pob_choice: fortified
  chosen_spanish: fortificaron
  alternatives_spanish:
  - aseguraron
  - reforzaron
  lexicon: LSJ
  rationale: El verbo griego expresa hacer un lugar seguro mediante defensas. «Fortificaron» es la equivalencia militar natural en español y conserva el sentido de укрепcer/defender una plaza.
- source_word: τὴν πόλιν
  english_pob_choice: the city
  chosen_spanish: la ciudad
  alternatives_spanish:
  - la urbe
  - el pueblo
  lexicon: LSJ
  rationale: πόλις normalmente significa «ciudad». Mantengo el referente específico con artículo definido, como en el contexto narrativo.
- source_word: Βεθοσούραν
  english_pob_choice: Beth-zur
  chosen_spanish: Bet-sur
  alternatives_spanish:
  - Bet-zur
  - Beth-zur
  lexicon: transliteration policy
  rationale: Es un topónimo transliterado. «Bet-sur» comunica mejor en español la forma semítica del nombre sin depender de grafía inglesa.
- source_word: Γάζαρα
  english_pob_choice: Gazara
  chosen_spanish: Gazara
  alternatives_spanish:
  - Gezer
  - Gezara
  lexicon: transliteration policy
  rationale: El texto griego usa Γάζαρα, por lo que conservo la forma griega. «Gezer» es una identificación histórica posible, pero no sustituye el testimonio griego en el texto principal.
- source_word: ἄκραν
  english_pob_choice: the citadel
  chosen_spanish: la acrópolis
  alternatives_spanish:
  - la ciudadela
  - el Acra
  lexicon: LSJ
  rationale: ἄκρα puede designar una altura fortificada o una ciudadela; en 1 Macabeos alude al bastión fortificado de Jerusalén. «Acrópolis» comunica en español la idea de altura fortificada y permite mantener la referencia histórica sin imponer solo el nombre técnico «Acra».
- source_word: ἔθεντο
  english_pob_choice: stationed
  chosen_spanish: pusieron
  alternatives_spanish:
  - estacionaron
  - colocaron
  lexicon: LSJ
  rationale: El verbo básico significa «poner/colocar». En español, «pusieron» reproduce fielmente la acción sin sobre-especificar más de lo que exige el griego; el contexto militar aporta la noción de guarnición.
- source_word: δυνάμεις
  english_pob_choice: forces
  chosen_spanish: fuerzas
  alternatives_spanish:
  - tropas
  - guarniciones
  lexicon: LSJ
  rationale: «Fuerzas» corresponde bien al griego y mantiene el valor militar general. «Guarniciones» interpretaría más concretamente la función que el término por sí solo no explicita.
- source_word: παραθέσεις βρωμάτων
  english_pob_choice: supplies of food
  chosen_spanish: provisiones de alimento
  alternatives_spanish:
  - suministros de comida
  - depósitos de alimentos
  lexicon: LSJ
  rationale: παράθεσις sugiere una disposición o reserva puesta aparte, y βρώματα son alimentos/provisiones. «Provisiones de alimento» preserva el sentido de abastecimiento almacenado con un registro natural en español.
theological_decisions:
- issue: Nombre de la fortificación ἄκρα/Acra
  english_pob_reading: the citadel, with a footnote noting 'the Acra' as a historical name for the fortified stronghold in Jerusalem.
  chosen_spanish_reading: la acrópolis, con nota que identifica la alternativa histórica «el Acra»
  alternative_spanish_readings:
  - la ciudadela
  - el Acra
  rationale: El griego puede funcionar como designación común de una fortificación o como nombre histórico propio. En el texto principal opto por una equivalencia comprensible y en la nota preservo la tensión histórica con el nombre técnico.
  doctrine_reference: N/A
- issue: Topónimo Γάζαρα y su identificación histórica
  english_pob_reading: Gazara reflects the Greek form; the site is often identified with Gezer.
  chosen_spanish_reading: Gazara, con nota sobre su identificación frecuente con Gezer
  alternative_spanish_readings:
  - Gezer
  rationale: Para mantener la fidelidad al testimonio griego, el texto principal conserva Gazara. La nota permite al lector ubicar el sitio sin reemplazar la forma griega.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: El inglés auditado revisó 'placed' por 'stationed' y 'stores of food' por 'supplies of food'. En español se decidió no forzar un equivalente demasiado específico de 'stationed' en el verbo principal, porque «pusieron» reproduce el griego ἔθεντο con naturalidad y la idea militar queda clara por el contexto. Para βρωμάτων, «provisiones de alimento» sigue de cerca el sentido revisado de abastecimiento.
  spanish_consistency_notes:
  - Se mantiene «Y» inicial para seguir el tono narrativo de la serie bíblica, aunque el español moderno normalmente usaría «Entonces»; aquí el paralelismo con la fuente justifica la coordinación simple.
  - «Bet-sur» y «Gazara» conservan la transliteración del griego; no se normalizan a formas hebreas sin indicación textual.
  - No se usa «SEÑOR» ni terminología teológica ajena al versículo; es una cláusula histórica/militar.
  - «Acrópolis» se usa como solución española comprensible para ἄκρα, pero la nota preserva la alternativa histórica «Acra» para no borrar la tensión lexical del original.
