review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien el sentido básico del hebreo: Yahvé habla a David, aprueba la intención de edificar una casa para su nombre, y mantiene la repetición de ''en tu corazón''. Sin embargo, los anclajes y contenidos de las notas están cruzados respecto del original auditado: [a] fue colocado en ''mi padre'' pero su contenido trata ''casa/templo'', y [b] fue colocado en ''en tu corazón'' pero su contenido trata la cláusula final repetida. Además, la nota [a] actual dice ''para mi nombre'' cuando debería registrar la alternativa ''templo'' frente a ''casa''.'
  spanish_quality_summary: El español es mayormente claro y digno, pero 'hiciste bien que estaba en tu corazón' suena forzado. Una mejora mínima y más natural, aún fiel a la repetición hebrea, es 'hiciste bien, porque estaba en tu corazón'. Esto preserva la lógica aprobatoria sin añadir contenido ajeno. También conviene reubicar las notas para que correspondan al lugar relevante del texto.
  glossary_alignment: 'Alineación buena con el glosario del proyecto: יְהוָה -> ''Yahvé''; בַּיִת -> ''casa'' en el texto principal; לִשְׁמִי -> ''para mi nombre''; idiomática del corazón preservada. No hay conflicto terminológico doctrinal. El problema principal es de notas y de naturalidad sintáctica en la cláusula final.'
  issues:
  - severity: high
    issue: Las notas al pie están mal ancladas y su contenido no corresponde al lugar marcado.
    rationale: La nota [a] está en 'David mi padre' pero habla de 'casa/templo'; la nota [b] está en la primera ocurrencia de 'en tu corazón' pero describe la cláusula final alternativa. Esto rompe la trazabilidad del audit trail y puede confundir al lector.
  - severity: medium
    issue: El contenido de la nota [a] es incorrecto.
    rationale: Dice 'O “para mi nombre”' cuando la alternativa documentada en inglés es 'templo para mi nombre' frente a la traducción principal 'casa para mi nombre'.
  - severity: medium
    issue: La cláusula final 'hiciste bien que estaba en tu corazón' es poco natural en español.
    rationale: Aunque busca reflejar la repetición hebrea, en español resulta torpe. 'Hiciste bien, porque estaba en tu corazón' mantiene el sentido aprobatorio y la repetición sin paráfrasis excesiva.
  revised_spanish_text: 'Pero Yahvé dijo a David mi padre: «Porque estaba en tu corazón edificar una casa[a] para mi nombre, hiciste bien[b], porque estaba en tu corazón»'
  revised_footnotes:
