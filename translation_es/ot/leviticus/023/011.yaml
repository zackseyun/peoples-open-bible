translation:
  language: es
  text: Y mecerá la gavilla ante Yahvé, para vuestra aceptación[a]; al día siguiente del sábado la mecerá el sacerdote.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «para que seáis aceptados». La frase hebrea puede expresar la aceptación de los adoradores delante de Yahvé por medio de la ofrenda.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהֵנִיף
  english_pob_choice: And he shall wave
  chosen_spanish: Y lo mecerá
  alternatives_spanish:
  - Y lo waveará
  - Y lo ofrecerá meciéndolo
  - Y lo presentará meciéndolo
  lexicon: HALOT
  rationale: El verbo hifil de נוף designa aquí un gesto ritual de mecer/ondear la ofrenda. En español, «mecerá» comunica el acto cultual con naturalidad sin perder la imagen concreta del movimiento.
- source_word: הָעֹמֶר
  english_pob_choice: the sheaf
  chosen_spanish: la gavilla
  alternatives_spanish:
  - el omer
  - la medida de grano
  lexicon: HALOT
  rationale: En este contexto ritual, עֹמֶר se refiere a una gavilla presentada como primicias. «Gavilla» es transparente en español y conserva el sentido agrícola-cultual mejor que dejar el hebraísmo sin explicación.
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: ante Yahvé
  alternatives_spanish:
  - delante de Yahvé
  - en presencia de Yahvé
  lexicon: HALOT
  rationale: «Ante Yahvé» reproduce la fórmula cultual de presentación en su presencia y mantiene el nombre divino según la pauta del proyecto.
- source_word: לִרְצֹנְכֶם
  english_pob_choice: for your acceptance
  chosen_spanish: para que sea aceptado por vosotros
  alternatives_spanish:
  - para vuestra aceptación
  - para que vosotros seáis aceptados
  - para vuestro agrado
  lexicon: HALOT
  rationale: La construcción hebrea expresa aceptación ritual del acto/ofrenda en favor del pueblo. En español, una forma verbal impersonal conserva la idea de aceptabilidad sin forzar un giro nominal poco natural.
- source_word: מִמָּחֳרַת הַשַּׁבָּת
  english_pob_choice: on the day after the Sabbath
  chosen_spanish: al día siguiente del sábado
  alternatives_spanish:
  - el día después del sábado
  - a la mañana siguiente del sábado
  lexicon: HALOT
  rationale: La expresión temporal apunta al día posterior al sábado. «Al día siguiente del sábado» es claro y fiel sin añadir precisión no explícita en el hebreo.
- source_word: יְנִיפֶנּוּ
  english_pob_choice: the priest shall wave it
  chosen_spanish: lo mecerá el sacerdote
  alternatives_spanish:
  - el sacerdote lo mecerá
  - lo presentará el sacerdote como ofrenda mecida
  lexicon: HALOT
  rationale: Se conserva la repetición del mismo verbo ritual y el objeto pronominal «lo», que remite a la gavilla. El orden es más natural en español y mantiene el sentido cultual.
- source_word: הַכֹּהֵן
  english_pob_choice: the priest
  chosen_spanish: el sacerdote
  alternatives_spanish:
  - el cohen
  - el ministro
  lexicon: HALOT
  rationale: כֹּהֵן se refiere al oficiante del rito; «sacerdote» es la equivalencia española estándar y transparente.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton de forma directa. Siguiendo la norma del proyecto, se conserva el nombre propio divino en español como «Yahvé», en vez de sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de לִרְצֹנְכֶם en contexto sacrificial
  english_pob_reading: for your acceptance
  chosen_spanish_reading: para que sea aceptado por vosotros
  alternative_spanish_readings:
  - para vuestra aceptación
  - para que vosotros seáis aceptados
  rationale: La frase puede señalar la aceptabilidad de la ofrenda y, por extensión, la aceptación del pueblo delante de Dios. La redacción elegida conserva esa tensión sin cerrarla indebidamente.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
translation_notes:
  revision_awareness: Coincide con el sentido del paquete fuente y con la lectura inglesa auditada; no se identificaron revisiones aplicables en el pasaje base.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como traducción del Tetragrámaton, conforme a la terminología del proyecto.
  - Se usó «mecer» para el gesto ritual de נוף, evitando la sustitución por «ofrecer» que borraría el movimiento cultual.
  - Se optó por «gavilla» para עֹמֶר por claridad en español y fidelidad al contexto de ofrenda de primicias.
  - La estructura verbal de «para que sea aceptado» preserva la ambigüedad cultual del hebreo y la nota la explicita.
