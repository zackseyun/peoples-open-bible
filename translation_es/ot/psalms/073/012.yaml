review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido global del hebreo: deíxis enfática («הִנֵּה»), identificación de «estos» como «los impíos», estado continuo de bienestar/prosperidad, y aumento de riqueza. Sin embargo, la distribución de notas no sigue bien el expediente inglés: la nota [a] se ancla en «He aquí», aunque la alternativa lexical relevante preservada en inglés para [a] corresponde a «וְשַׁלְוֵי עוֹלָם»; además falta una nota para la alternativa de «הִשְׂגּוּ חָיִל» (‘han adquirido riqueza’ / ‘han aumentado sus riquezas’).'
  spanish_quality_summary: El español es claro y digno, pero «siempre en reposo» suena menos natural y menos preciso que una expresión como «siempre tranquilos» o «siempre seguros», porque «reposo» en español puede sugerir descanso físico más que prosperidad estable. «He aquí» es aceptable en registro bíblico, y «los impíos» funciona bien en Salmos. «Aumentan en riqueza» es comprensible, aunque «aumentan su riqueza» resulta más idiomático.
  glossary_alignment: No hay conflictos con la terminología de proyecto. «Los impíos» para רְשָׁעִים es defendible en Salmos. «Riqueza» para חָיִל concuerda con la decisión inglesa. La principal corrección es de legibilidad y de fidelidad al rastro de notas, no de glosario teológico.
  issues:
  - severity: medium
    issue: Las notas al pie no corresponden al expediente inglés ni a las decisiones léxicas significativas del versículo.
    rationale: La nota [a] inglesa documenta la alternativa de «וְשַׁלְוֵי עוֹלָם», no de «הִנֵּה». Además, el inglés conserva una nota para la ambigüedad de «הִשְׂגּוּ חָיִל», que falta en español.
  - severity: medium
    issue: «Siempre en reposo» suena poco natural y puede desviar el sentido.
    rationale: El hebreo describe facilidad/seguridad/prosperidad duradera, no meramente reposo físico. En español bíblico actual, «siempre tranquilos» comunica mejor el valor idiomático sin calco extraño.
  - severity: low
    issue: «Aumentan en riqueza» es menos idiomático que «aumentan su riqueza».
    rationale: La construcción con posesivo expresa de modo más natural en español el incremento de bienes, manteniendo el mismo sentido.
  revised_spanish_text: He aquí, estos son los impíos, siempre tranquilos[a]; aumentan su riqueza[b].
