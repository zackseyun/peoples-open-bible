translation:
  language: es
  text: 'Entonces le envié respuesta[a], diciendo: «No han sucedido cosas tales como las que tú dices, porque te las inventas de tu propio corazón».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «le envié este mensaje».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֶשְׁלְחָה
  english_pob_choice: So I sent
  chosen_spanish: Entonces le envié
  alternatives_spanish:
  - Y le envié
  - Así que le envié
  lexicon: HALOT
  rationale: El wayyiqtol marca avance narrativo secuencial; «Entonces» conserva esa progresión de forma natural en español sin perder el valor de continuación.
- source_word: אֵלָיו
  english_pob_choice: to him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  - para él
  lexicon: HALOT
  rationale: El dativo pronominal en español expresa de manera idiomática la dirección del envío; el pronombre átono mantiene fluidez y naturalidad.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dije
  - para decir
  lexicon: HALOT
  rationale: El infinitivo de decir introduce la cita directa; «diciendo» conserva el valor quotativo sin añadir contenido interpretativo.
- source_word: לֹא נִהְיָה
  english_pob_choice: No such things ... have happened
  chosen_spanish: No han sucedido
  alternatives_spanish:
  - No han ocurrido
  - No se han producido
  lexicon: HALOT
  rationale: נִהְיָה niega la realidad o el acontecer de lo alegado. «Han sucedido» comunica con naturalidad que los hechos denunciados no ocurrieron.
- source_word: כַּדְּבָרִים הָאֵלֶּה
  english_pob_choice: No such things
  chosen_spanish: cosas tales como las que
  alternatives_spanish:
  - tales cosas como
  - cosas como estas
  lexicon: HALOT
  rationale: דְּבָרִים puede abarcar «cosas», «asuntos» o «palabras». En este contexto de acusaciones, «cosas tales como las que» refleja el matiz de «tales cosas» sin rigidizar el sustantivo.
- source_word: אֲשֶׁר אַתָּה אוֹמֵר
  english_pob_choice: as you are saying
  chosen_spanish: que tú dices
  alternatives_spanish:
  - que estás diciendo
  - como tú dices
  lexicon: HALOT
  rationale: El participio אֹמֵר presenta la acción como vigente; en español, «tú dices» es una forma directa y natural que conserva la referencia a la acusación en curso.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón de la negación. «Porque» es la equivalencia más clara y común en español para esta relación causal.
- source_word: מִלִּבְּךָ
  english_pob_choice: out of your own heart
  chosen_spanish: desde tu propio corazón
  alternatives_spanish:
  - de tu propio corazón
  - desde tu interior
  lexicon: HALOT
  rationale: לֵב en hebreo alude al centro interior de pensamiento e intención. «Corazón» preserva la imagen antropológica; «desde» refleja el valor de procedencia de מִן.
- source_word: בּוֹדָאם
  english_pob_choice: you are inventing them
  chosen_spanish: las inventas
  alternatives_spanish:
  - las fabricas
  - las estás inventando
  lexicon: HALOT
  rationale: בדא significa inventar o fabricar. «Las inventas» comunica el sentido con sobriedad; el pronombre objeto retoma las acusaciones implícitas en contexto.
theological_decisions:
- issue: Valor antropológico de «corazón» en מִלֵּב
  english_pob_reading: out of your own heart
  chosen_spanish_reading: desde tu propio corazón
  alternative_spanish_readings:
  - desde tu propia mente
  - desde tu propio interior
  rationale: Se conserva la imagen bíblica del corazón como centro de intención y pensamiento. Esto evita reducir el hebreo a una mera facultad intelectual y mantiene la tensión antropológica del original.
  doctrine_reference: Antropología bíblica / intención del corazón
- issue: Negación de la acusación como hecho ocurrido
  english_pob_reading: No such things as you are saying have happened
  chosen_spanish_reading: No han sucedido cosas tales como las que tú dices
  alternative_spanish_readings:
  - No han ocurrido tales cosas como las que tú dices
  - No se han dado esas cosas que tú dices
  rationale: La frase hebrea niega la ocurrencia real de los hechos acusados. La versión española conserva esa negación factual sin suavizarla a un simple desacuerdo verbal.
  doctrine_reference: Veracidad / falsedad de la acusación
translation_notes:
  revision_awareness: Se siguió la revisión inglesa más reciente, que ajustó la primera cláusula a «No such things ... have happened». La versión española refleja esa lectura revisada con una negación de acontecimiento («No han sucedido cosas tales como las que tú dices») y mantiene el remate causal sobre la invención desde el corazón.
  spanish_consistency_notes:
  - Se usa «corazón» para לֵב conforme al estilo POB, preservando la antropología bíblica.
  - Se prefirió «inventas» por su fuerza lexical, con una nota alternativa que permite «fabricas» si se desea mayor explicitud.
  - «Entonces» reproduce el avance narrativo del wayyiqtol sin cargar el texto con un calco excesivo.
