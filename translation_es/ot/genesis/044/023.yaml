translation:
  language: es
  text: 'Y tú dijiste a tus siervos[a]: «Si su hermano más joven no baja con ustedes, no volverán a ver mi rostro[b]»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lexicalmente, עֲבָדֶיךָ puede traducirse «siervos» o «esclavos». En este contexto de corte y deferencia, «siervos» expresa mejor el tono relacional sin borrar el trasfondo de subordinación.
    reason: lexical_alternative
  - marker: b
    text: O, más idiomáticamente, «no volverán a presentarse ante mí». El hebreo dice literalmente «no añadirán a ver mi rostro», una forma idiomática de negar el acceso futuro.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֹּאמֶר
  english_pob_choice: And you said
  chosen_spanish: Y tú dijiste
  alternatives_spanish:
  - Entonces dijiste
  - Y usted dijo
  lexicon: HALOT
  rationale: El wayyiqtol narrativo se conserva con un pasado simple enlazado por «Y». Añadir «tú» refleja el sujeto singular explícito del hebreo y mantiene el tono directo del discurso.
- source_word: עֲבָדֶיךָ
  english_pob_choice: your servants
  chosen_spanish: tus siervos
  alternatives_spanish:
  - tus esclavos
  - tus servidores
  lexicon: HALOT
  rationale: Aquí el contexto cortesano favorece una forma deferente en español. «Siervos» conserva la relación de subordinación sin forzar la dureza de «esclavos», que en este pasaje no está en primer plano.
- source_word: אִם לֹא
  english_pob_choice: If ... does not
  chosen_spanish: Si no
  alternatives_spanish:
  - A menos que
  - A no ser que
  lexicon: HALOT
  rationale: La estructura condicional negativa se expresa con naturalidad en español como «Si no», manteniendo la forma de la cláusula hebrea sin volverla más interpretativa.
- source_word: יֵרֵד
  english_pob_choice: come down
  chosen_spanish: baja
  alternatives_spanish:
  - desciende
  - viene
  lexicon: HALOT
  rationale: El verbo hebreo literalmente es «bajar / descender». En español, «baja» reproduce bien la dirección desde la perspectiva del hablante, sin perder el valor espacial del original.
- source_word: אֲחִיכֶם הַקָּטֹן
  english_pob_choice: your youngest brother
  chosen_spanish: su hermano menor
  alternatives_spanish:
  - su hermano más pequeño
  - su hermano menor de ustedes
  lexicon: HALOT
  rationale: El hebreo identifica al hermano como el más joven. En español, «hermano menor» comunica la idea con claridad y evita una formulación demasiado pesada. Se conserva el valor relacional del grupo en el contexto del plural «ustedes».
- source_word: אִתְּכֶם
  english_pob_choice: with you
  chosen_spanish: con ustedes
  alternatives_spanish:
  - junto con ustedes
  - con vosotros
  lexicon: HALOT
  rationale: El plural del hebreo se refleja con «ustedes», que es la forma neutral y amplia para español bíblico contemporáneo. «Con ustedes» mantiene el acompañamiento sin añadir matiz.
- source_word: לֹא תֹסִפוּן
  english_pob_choice: you shall not continue
  chosen_spanish: no volverán
  alternatives_spanish:
  - no seguirán
  - no continuarán
  lexicon: HALOT
  rationale: El valor de יסף aquí es la reiteración o continuación de una acción. En español, la prohibición de una nueva ocurrencia se expresa de modo natural con «no volverán», que preserva la fuerza de «no seguirán/continuarán» en este contexto narrativo.
- source_word: לִרְאוֹת פָּנָי
  english_pob_choice: to see my face
  chosen_spanish: a ver mi rostro
  alternatives_spanish:
  - a ver mi cara
  - a presentarse ante mí
  lexicon: HALOT
  rationale: Se conserva la imagen hebrea de «ver mi rostro», pero en español bíblico «rostro» comunica mejor la dignidad del giro que «cara». La lectura idiomática de presentarse ante alguien queda implícita sin reemplazar la metáfora principal.
translation_notes:
  revision_awareness: Coincide sustancialmente con la revisión más reciente; no se detectaron cambios aplicados en el pasaje base. Se mantuvieron las decisiones auditadas del POB inglés, ajustándolas a un español natural y reverente.
  spanish_consistency_notes:
  - Se mantuvo la distinción entre «siervos» y «esclavos» como decisión léxica contextual, no doctrinal.
  - «Rostro» se conservó para preservar la imagen bíblica de פָּנִים, con la alternativa idiomática indicada en nota.
  - Se usó «ustedes» para el plural del discurso, por ser la forma más neutral en español latinoamericano.
  - No se introdujo lenguaje eclesiástico tradicional donde el hebreo no lo exige.
