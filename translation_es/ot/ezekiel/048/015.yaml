  text: וַ/חֲמֵ֨שֶׁת אֲלָפִ֜ים הַ/נּוֹתָ֣ר בָּ/רֹ֗חַב עַל פְּנֵ֨י חֲמִשָּׁ֤ה וְ/עֶשְׂרִים֙ אֶ֔לֶף חֹֽל ה֣וּא לָ/עִ֔יר לְ/מוֹשָׁ֖ב וּ/לְ/מִגְרָ֑שׁ וְ/הָיְתָ֥ה הָ/עִ֖יר ב/תוכ/ה־־׃
base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/048/015.yaml
  text: And the remaining five thousand in width[a], along the face of the twenty-five thousand, shall be common land for the city, for dwelling, and for open land[c][b]; and the city shall be in its midst.
  footnotes:
  - marker: a
    text: Or 'alongside the twenty-five thousand.' The Hebrew phrase literally reads 'along the face of,' a spatial expression that can be rendered in several close ways.
    reason: lexical_alternative
  - marker: b
    text: '''Common land'' renders a Hebrew term meaning land that is not holy or sacred, in contrast to the consecrated allotments described around it.'
    reason: cultural_note
  - marker: c
    text: Or 'open land' may be understood as land around the city for common use, possibly including pastureland.
    reason: lexical_alternative
