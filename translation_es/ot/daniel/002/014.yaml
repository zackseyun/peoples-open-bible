translation:
  language: es
  text: Entonces Daniel respondió a Arioque[a], el jefe de los verdugos del rey, con consejo y discreción—el que había salido para matar a los sabios de Babilonia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el capitán de la guardia del rey». El título arameo significa literalmente «jefe de los degolladores/verdugos», y en contexto real puede designar a ejecutores o a la guardia real.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֵּאדַיִן
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - En aquel momento
  lexicon: HALOT
  rationale: Marca discursiva de secuencia narrativa; «Entonces» conserva la progresión inmediata en español natural.
- source_word: הֲתִיב
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - replicó
  lexicon: HALOT
  rationale: El verbo arameo introduce una respuesta verbal. «Respondió» es natural y mantiene el tono narrativo formal.
- source_word: עֵטָא
  english_pob_choice: counsel
  chosen_spanish: consejo
  alternatives_spanish:
  - consejo prudente
  - asesoría
  lexicon: HALOT
  rationale: El sustantivo denota consejo o asesoramiento. «Consejo» preserva el valor léxico básico sin sobreinterpretar.
- source_word: וּטְעֵם
  english_pob_choice: discretion
  chosen_spanish: discreción
  alternatives_spanish:
  - prudencia
  - discernimiento
  - juicio
  lexicon: HALOT
  rationale: El término expresa juicio, discernimiento o tacto. «Discreción» comunica bien esa moderación sabia en español.
- source_word: עֵטָא וּטְעֵם
  english_pob_choice: with counsel and discretion
  chosen_spanish: con consejo y discreción
  alternatives_spanish:
  - con consejo prudente y discreción
  - con consejo y discernimiento
  lexicon: HALOT
  rationale: La pareja de sustantivos describe la calidad de la respuesta de Daniel. Se mantienen ambos términos, sin añadir adjetivos no explicitados por el arameo.
- source_word: לְאַרְיוֹךְ
  english_pob_choice: Arioch
  chosen_spanish: Ariooc
  alternatives_spanish:
  - Arioque
  - Arioch
  lexicon: HALOT
  rationale: Nombre propio transliterado. Se ajusta a la forma de uso en español bíblico, pero con criterio de legibilidad moderna; se conserva la identificación del personaje sin imponer una forma tradicional única.
- source_word: רַב טַבָּחַיָּא
  english_pob_choice: the chief of the king’s executioners
  chosen_spanish: el jefe de los verdugos del rey
  alternatives_spanish:
  - el capitán de la guardia del rey
  - el jefe de los ejecutores del rey
  lexicon: HALOT
  rationale: La expresión aramea literalmente alude a quienes ejecutan/degüellan, y en contexto real puede funcionar como oficial de ejecuciones o guardia real. «Verdugos» conserva la fuerza léxica y el contexto inmediato de la orden de matar.
- source_word: דִּי מַלְכָּא
  english_pob_choice: of the king’s
  chosen_spanish: del rey
  alternatives_spanish:
  - perteneciente al rey
  - real
  lexicon: HALOT
  rationale: Relación genitiva posesiva normalizada al español con «del rey».
- source_word: דִּי נְפַק
  english_pob_choice: who had gone out
  chosen_spanish: el que había salido
  alternatives_spanish:
  - quien salió
  - el que salió
  lexicon: HALOT
  rationale: La cláusula relativa describe a Ariooc; el pretérito pluscuamperfecto refleja la anterioridad respecto al diálogo.
- source_word: לְקַטָּלָה
  english_pob_choice: to kill
  chosen_spanish: para matar
  alternatives_spanish:
  - para ejecutar
  - a matar
  lexicon: HALOT
  rationale: Infinitivo de propósito. «Matar» es directo y fiel al contexto severo del decreto; «ejecutar» sería posible pero menos inmediato en español.
- source_word: לְחַכִּימֵי בָּבֶל
  english_pob_choice: the wise men of Babylon
  chosen_spanish: a los sabios de Babilonia
  alternatives_spanish:
  - a los sabios de Babilonia
  - a los sabios babilonios
  lexicon: HALOT
  rationale: La designación cortesana se conserva de forma transparente. El acusativo introducido por el infinitivo de propósito se vierte naturalmente como complemento con «a».
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que eliminó el adjetivo interpretativo «prudent» para dejar solo «counsel and discretion». Por eso la versión española conserva únicamente «con consejo y discreción», sin añadir adjetivación no explícita.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como término por defecto en la serie, pero este versículo no lo contiene.
  - Se usa «discreción» para וּטְעֵם, en paralelo con la solución inglesa, evitando reducir ambos sustantivos a uno solo.
  - El nombre propio se translitera de forma comprensible en español; la nota recoge la alternativa de sentido para el título oficial.
