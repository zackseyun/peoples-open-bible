base_translation:
  language: en
  yaml_path: translation/ot/judges/013/023.yaml
  text: But his wife said to him[a], “If Yahweh had intended to kill us, he would not have accepted from our hand a burnt offering and a grain offering, or shown us all these things[b], or now told us such things as these.”
  footnotes:
  - marker: a
    text: Or 'he would not have taken from our hand.' The Hebrew verb is literally 'taken,' but in sacrificial context it carries the sense of receiving or accepting an offering.
    reason: lexical_alternative
  - marker: b
    text: '''Grain offering'' translates Hebrew minḥah, which can also mean a gift or tribute offering depending on context.'
    reason: cultural_note
