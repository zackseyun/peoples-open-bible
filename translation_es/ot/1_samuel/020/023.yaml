    rationale: Aunque דָּבָר puede significar 'cosa', en español bíblico y general 'la cosa' aquí suena imprecisa y poco digna. 'Asunto' transmite mejor la referencia al acuerdo tratado, en línea con el English POB ('matter').
  - severity: medium
    issue: Construcción 'la cosa que hemos hablado'
    rationale: En español estándar esa combinación suena defectuosa o incompleta. Con 'asunto', lo natural es 'del que hemos hablado' o 'que hemos tratado'.
