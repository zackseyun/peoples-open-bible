translation:
  language: es
  text: 'Ellos dijeron: «Tu siervo nuestro padre está bien[a]; todavía vive». Entonces se inclinaron y se postraron.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo שָׁלוֹם («paz»), usado aquí de manera idiomática con el sentido de bienestar o estado de salud.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁלוֹם
  english_pob_choice: is well
  chosen_spanish: está bien
  alternatives_spanish:
  - paz
  - bienestar
  lexicon: HALOT
  rationale: Aquí שָׁלוֹם funciona de manera idiomática como respuesta sobre el estado de una persona. «Está bien» comunica en español el sentido de bienestar sin volver la frase demasiado literal o solemne.
- source_word: לְעַבְדְּךָ
  english_pob_choice: your servant
  chosen_spanish: tu siervo
  alternatives_spanish:
  - tu esclavo
  lexicon: HALOT
  rationale: El habla es deferente y cortesana. «Siervo» conserva la humillación respetuosa del hablante sin imponer en español la carga más fuerte de esclavitud física que a veces puede implicar עבד.
- source_word: לְאָבִינוּ
  english_pob_choice: our father
  chosen_spanish: nuestro padre
  alternatives_spanish:
  - el padre de nosotros
  lexicon: HALOT
  rationale: Construcción posesiva directa y natural en español, fiel al hebreo.
- source_word: עוֹדֶנּוּ חָי
  english_pob_choice: he is still alive
  chosen_spanish: todavía vive
  alternatives_spanish:
  - sigue vivo
  - aún está vivo
  lexicon: HALOT
  rationale: La combinación de עוד con חי expresa continuidad de vida. «Todavía vive» preserva esa fuerza temporal en un español fluido.
- source_word: וַיִּקְּדוּ
  english_pob_choice: they bowed down
  chosen_spanish: se inclinaron
  alternatives_spanish:
  - se inclinaron hasta el suelo
  - hicieron reverencia
  lexicon: HALOT
  rationale: קדד señala un gesto corporal de inclinación. «Se inclinaron» es breve y claro; el movimiento hacia abajo queda también reforzado por la siguiente acción.
- source_word: וישתחו
  english_pob_choice: prostrated themselves
  chosen_spanish: se postraron
  alternatives_spanish:
  - se arrodillaron
  - adoraron
  lexicon: HALOT
  rationale: השתחוה denota postración o reverencia profunda ante un superior. «Se postraron» conserva el gesto físico y evita introducir la lectura de adoración religiosa.
theological_decisions:
- issue: Distinción entre reverencia social y adoración en וישתחו
  english_pob_reading: prostrated themselves
  chosen_spanish_reading: se postraron
  alternative_spanish_readings:
  - adoraron
  - se inclinaron
  rationale: El contexto narrativo es de homenaje ante José, no de culto divino. «Se postraron» mantiene la acción corporal y evita una carga teológica no sustentada por el pasaje.
  doctrine_reference: 'Principio de traducción: no importar afirmaciones doctrinales que el texto no hace; preservar el sentido narrativo del hebreo.'
translation_notes:
  revision_awareness: La versión española sigue de cerca la revisión final del POB en inglés, incluyendo la frase breve y natural sobre el estado del padre y la doble acción de reverencia final, sin añadir ni omitir elementos del hebreo.
  spanish_consistency_notes:
  - He mantenido «siervo» para לְעַבְדְּךָ, en coherencia con el matiz deferente señalado por el audit trail.
  - He evitado «Cristo», «SEÑOR» o formulaciones litúrgicas ajenas al versículo.
  - He distinguido entre la inclinación inicial y la postración final para reflejar ambos verbos hebreos.
