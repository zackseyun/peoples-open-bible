translation:
  language: es
  text: Durante siete días el sacerdote de entre sus hijos, que lo suceda, se las pondrá[a][b], cuando entre en la tienda de reunión para ministrar en el lugar santo[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se las vestirá». El verbo hebreo puede significar tanto «ponérselas» como «vestirlas», según el contexto.
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «el sacerdote debajo de él de entre sus hijos», es decir, el sacerdote que lo sucede.'
    reason: lexical_alternative
  - marker: c
    text: O «en el santuario».
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁבְעַת יָמִים
  english_pob_choice: For seven days
  chosen_spanish: Durante siete días
  alternatives_spanish:
  - Por siete días
  - Siete días
  lexicon: HALOT
  rationale: El hebreo expresa duración; en español, "durante" comunica de forma natural el lapso en que ocurre la acción sin perder el valor temporal continuado.
- source_word: יִלְבָּשָׁם
  english_pob_choice: shall put them on
  chosen_spanish: se las pondrá
  alternatives_spanish:
  - las vestirá
  - las llevará puestas
  lexicon: HALOT
  rationale: לבש puede significar "ponerse" o "vestir". Aquí el foco está en el acto concreto de colocarse las vestiduras sacerdotales; "se las pondrá" preserva esa acción. El objeto directo femenino plural se refiere a las vestiduras implícitas por el contexto.
- source_word: הַכֹּהֵן תַּחְתָּיו
  english_pob_choice: the priest ... who succeeds him
  chosen_spanish: el sacerdote que lo suceda
  alternatives_spanish:
  - el sacerdote en su lugar
  - el sacerdote en vez de él
  lexicon: HALOT
  rationale: תחתיו indica sustitución o sucesión en su cargo. "Que lo suceda" transmite de forma clara la idea institucional de reemplazo sacerdotal, sin perder el matiz de continuidad hereditaria.
- source_word: מִבָּנָיו
  english_pob_choice: from among his sons
  chosen_spanish: de entre sus hijos
  alternatives_spanish:
  - de entre sus hijos varones
  - uno de sus hijos
  lexicon: HALOT
  rationale: La partícula מִ indica procedencia/selección de entre un grupo. "De entre sus hijos" mantiene el sentido partitivo y el linaje aarónico; en español, "hijos" puede abarcar hijos varones en este contexto genealógico.
- source_word: אֲשֶׁר יָבֹא
  english_pob_choice: when he enters
  chosen_spanish: cuando entre
  alternatives_spanish:
  - que entre
  - al entrar
  lexicon: HALOT
  rationale: Aunque la forma es relativa, en contexto funciona temporalmente ligada al servicio. "Cuando entre" fluye naturalmente en español y conserva el valor situacional del hebreo.
- source_word: אֹהֶל מוֹעֵד
  english_pob_choice: the tent of meeting
  chosen_spanish: la tienda de reunión
  alternatives_spanish:
  - la tienda del encuentro
  - el tabernáculo de reunión
  lexicon: HALOT
  rationale: La designación cultual estándar en español puede ser "tienda de reunión"; conserva el valor técnico del santuario portátil sin introducir una paráfrasis doctrinal.
- source_word: לְשָׁרֵת
  english_pob_choice: to minister
  chosen_spanish: para ministrar
  alternatives_spanish:
  - para servir
  - para ejercer servicio
  lexicon: HALOT
  rationale: En contexto sacerdotal, "ministrar" conserva el registro litúrgico y formal de servicio sagrado mejor que el mero "servir".
- source_word: בַּקֹּדֶשׁ
  english_pob_choice: in the holy place
  chosen_spanish: en el lugar santo
  alternatives_spanish:
  - en el santuario
  - en lo santo
  lexicon: HALOT
  rationale: קֹדֶשׁ en este contexto cultual se refiere al espacio sagrado. "Lugar santo" reproduce bien la referencia concreta del área de servicio; se evita "santuario" por ser algo más amplio o menos específico según contexto.
theological_decisions:
- issue: Sucesión sacerdotal aarónica
  english_pob_reading: the priest from among his sons who succeeds him
  chosen_spanish_reading: el sacerdote de entre sus hijos, que lo suceda
  alternative_spanish_readings:
  - el sacerdote en su lugar, de entre sus hijos
  - uno de sus hijos que sea sacerdote en su lugar
  rationale: El hebreo describe una sucesión dentro del sacerdocio aarónico, no una simple ubicación espacial. La traducción mantiene la continuidad genealógica y funcional sin añadir doctrina posterior.
  doctrine_reference: Translation philosophy §1, §5
- issue: Espacio cultual de בַּקֹּדֶשׁ
  english_pob_reading: in the holy place
  chosen_spanish_reading: en el lugar santo
  alternative_spanish_readings:
  - en el santuario
  - en el lugar sagrado
  rationale: La referencia es al ámbito santo del servicio tabernacular. "Lugar santo" conserva la concreción del espacio cultual y evita aplanar el término a una abstracción genérica.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: No se registraron revisiones aplicadas en el historial más reciente; el borrador sigue el pasaje hebreo y el auditorial inglés con acuerdo alto y solo observaciones menores.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» solo cuando corresponda al nombre divino; en este versículo no aparece.
  - Se preservó «sacerdote» para כֹּהֵן y «tienda de reunión» para אֹהֶל מוֹעֵד, conforme al uso técnico del tabernáculo.
  - «Lugar santo» traduce בַּקֹּדֶשׁ con concreción espacial, en paralelo al inglés auditado «holy place».
