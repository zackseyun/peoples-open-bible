- from: Porque, por favor, pregunta a la generación anterior[a] y disponte[b] a la investigación de sus padres[c].
  to: Pues pregunta, por favor, a la generación anterior[a] y disponte[b] para la investigación[c] de sus antepasados[d].
  rationale: Se reemplaza «Porque» por «Pues» para un conector discursivo más natural al inicio de la exhortación; se reubica «por favor» para español idiomático; se mantiene «disponte» por su buena correspondencia con וְכוֹנֵן; se añade la nota faltante sobre חֵקֶר; y se usa «sus antepasados» en el texto principal para evitar una lectura demasiado literal de «sus padres», preservando el hebreo literal en nota.
