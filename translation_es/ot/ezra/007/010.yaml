translation:
  language: es
  text: Porque Esdras había dispuesto su corazón[a] para buscar[b] la Ley de Yahvé[c], y para cumplirla, y para enseñar en Israel estatutos y juicios[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «había preparado su corazón». El hebreo expresa una resolución interior deliberada.
    reason: lexical_alternative
  - marker: b
    text: O «inquirir en» o «estudiar» la Ley de Yahvé.
    reason: lexical_alternative
  - marker: c
    text: Yahvé representa el nombre divino YHWH.
    reason: alternative_reading
  - marker: d
    text: O «estatuto y juicio», «estatuto y ordenanza» o «estatutos y normas».
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Porque en efecto
  lexicon: HALOT
  rationale: Introduce la explicación causal o justificativa del contexto inmediato. «Porque» conserva con naturalidad el valor explicativo de כִּי sin volverlo rígido.
- source_word: הֵכִין לְבָבוֹ
  english_pob_choice: had set his heart
  chosen_spanish: había dispuesto su corazón
  alternatives_spanish:
  - había preparado su corazón
  - había afirmado su corazón
  lexicon: HALOT
  rationale: El hebreo expresa una resolución interna deliberada. «Dispuesto su corazón» mantiene la idea volitiva y suena natural en español, sin perder el matiz de preparación interior.
- source_word: לִדְרוֹשׁ
  english_pob_choice: to seek
  chosen_spanish: buscar
  alternatives_spanish:
  - inquirir
  - estudiar
  lexicon: HALOT
  rationale: En este contexto, דרש abarca la búsqueda devota e intelectual de la Ley. «Buscar» preserva ambos aspectos mejor que reducirlo solo a «estudiar».
- source_word: תּוֹרַת יְהוָה
  english_pob_choice: the Law of Yahweh
  chosen_spanish: la Ley de Yahvé
  alternatives_spanish:
  - la instrucción de Yahvé
  - la Torá de Yahvé
  lexicon: HALOT
  rationale: En el marco sacerdotal-escribal de Esdras, תּוֹרָה apunta a la Ley pactal. Se mantiene el nombre divino como «Yahvé» según el criterio del proyecto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el estándar del proyecto para el nombre divino, preservando la referencia al Tetragrámaton y evitando la sustitución por «SEÑOR».
- source_word: וְלַעֲשׂוֹת
  english_pob_choice: and to do it
  chosen_spanish: y para cumplirla
  alternatives_spanish:
  - y para hacerla
  - y para obedecerla
  lexicon: HALOT
  rationale: El objeto implícito es la Ley mencionada antes. En español, «cumplirla» comunica con precisión la obediencia práctica exigida por el infinitivo hebreo, sin sonar mecánico.
- source_word: וּלְלַמֵּד
  english_pob_choice: and to teach
  chosen_spanish: y para enseñar
  alternatives_spanish:
  - y para instruir
  lexicon: HALOT
  rationale: למד en piel significa enseñar/instruir. «Enseñar» es la forma más clara y directa en español para esta secuencia.
- source_word: חֹק וּמִשְׁפָּט
  english_pob_choice: statutes and judgments
  chosen_spanish: estatutos y juicios
  alternatives_spanish:
  - estatutos y sentencias
  - decretos y juicios
  lexicon: HALOT
  rationale: Se conservan los dos términos legales hebreos con un registro bíblico claro. «Juicios» refleja מִשְׁפָּט en su sentido legal, y «estatutos» mantiene חֹק.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton. Conforme al criterio del proyecto, se traduce como «Yahvé» para mantener visible el nombre de pacto y no ocultarlo tras una convención tipográfica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de תּוֹרָה en el contexto de Esdras
  english_pob_reading: Law
  chosen_spanish_reading: Ley
  alternative_spanish_readings:
  - instrucción
  - Torá
  rationale: En el contexto postexílico de Esdras, תּוֹרָה se refiere a la Ley del pacto, no solo a instrucción genérica. «Ley» conserva ese peso normativo y comunitario en español.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
- issue: Valor de חֹק וּמִשְׁפָּט
  english_pob_reading: statutes and judgments
  chosen_spanish_reading: estatutos y juicios
  alternative_spanish_readings:
  - estatuto y juicio
  - estatutos y reglas
  rationale: Los dos sustantivos forman un par jurídico. En español plural se percibe con naturalidad y refleja el carácter colectivo idiomático de los sustantivos singulares hebreos sin borrar su fuerza legal.
  doctrine_reference: DOCTRINE.md Translation philosophy §2
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del texto inglés, que ajustó el final a «statutes and judgments» en plural para reflejar el hebreo colectivo. La draft española adopta desde el inicio ese plural natural («estatutos y juicios») y conserva la decisión de traducir el nombre divino como Yahvé.
  spanish_consistency_notes:
  - Se mantiene el tratamiento del nombre divino como «Yahvé» de forma consistente con el estándar del proyecto.
  - Se eligió «Ley» para תּוֹרָה en consonancia con el contexto de Esdras y la lectura auditada en inglés.
  - «Estatutos y juicios» preserva el paralelismo legal del hebreo y evita suavizarlo con términos menos jurídicos.
  - La construcción «había dispuesto su corazón» reproduce el sentido de resolución interior sin calcar de forma torpe el hebreo.
