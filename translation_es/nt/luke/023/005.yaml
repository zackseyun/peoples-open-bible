base_translation:
  language: en
  yaml_path: translation/nt/luke/023/005.yaml
  text: But they kept insisting[a], saying, “He stirs up the people, teaching throughout all Judea[c][b], beginning from Galilee even to here.”
  footnotes:
  - marker: a
    text: Or “incites the people.” The Greek verb can mean to arouse or stir up in a disruptive sense.
    reason: lexical_alternative
  - marker: b
    text: “Judea” may refer either to the region of Judea specifically or, more broadly in some contexts, to the Jewish territory under discussion; here the wording likely stresses the breadth of his activity.
    reason: cultural_note
  - marker: c
    text: Or “all the way here” or “up to this place.” The phrase points from Galilee to the present location before Pilate.
    reason: lexical_alternative
