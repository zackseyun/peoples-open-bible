translation:
  language: es
  text: Y lo llevaron primero a Anás; pues era suegro de Caifás, quien era sumo sacerdote de aquel año.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: ἤγαγον
  english_pob_choice: they led him
  chosen_spanish: lo llevaron
  alternatives_spanish:
  - lo condujeron
  - lo trajeron
  lexicon: BDAG
  rationale: El verbo ἄγω puede expresar llevar/conducir en un contexto de custodia. «Lo llevaron» comunica de manera natural el traslado del detenido y conserva el movimiento narrativo sin sobrecargar el matiz de dirección.
- source_word: πρὸς Ἅνναν
  english_pob_choice: to Annas
  chosen_spanish: ante Anás
  alternatives_spanish:
  - a Anás
  - hacia Anás
  lexicon: BDAG
  rationale: Aunque πρός con acusativo puede indicar movimiento hacia una persona, en este contexto judicial el español «ante» expresa mejor la presentación ante una autoridad. «A Anás» es posible, pero menos preciso para la escena. Se conserva el nombre propio transliterado como Anás.
- source_word: πρῶτον
  english_pob_choice: first
  chosen_spanish: primero
  alternatives_spanish:
  - en primer lugar
  - antes
  lexicon: BDAG
  rationale: El adverbio marca secuencia. «Primero» es la forma más directa y fiel al orden de los acontecimientos.
- source_word: πενθερὸς
  english_pob_choice: father-in-law
  chosen_spanish: suegro
  alternatives_spanish:
  - padre político
  - pariente por matrimonio
  lexicon: BDAG
  rationale: πενθερός designa específicamente al suegro. «Suegro» es el equivalente preciso y natural en español.
- source_word: ἀρχιερεὺς
  english_pob_choice: high priest
  chosen_spanish: sumo sacerdote
  alternatives_spanish:
  - sumo pontífice
  - jefe de los sacerdotes
  lexicon: BDAG
  rationale: Aunque la POB inglesa usa «high priest», en español el equivalente bíblico más claro y tradicionalmente entendido es «sumo sacerdote». Mantiene el oficio sin introducir una perífrasis menos natural.
- source_word: τοῦ ἐνιαυτοῦ ἐκείνου
  english_pob_choice: that year
  chosen_spanish: de aquel año
  alternatives_spanish:
  - de ese año
  - en aquel año
  lexicon: BDAG
  rationale: 'La frase genitiva se incorpora de manera natural en español como complemento de «sumo sacerdote»: «de aquel año». Conserva el marcador temporal sin literalidad pesada.'
- source_word: Ἅνναν
  english_pob_choice: Annas
  chosen_spanish: Anás
  alternatives_spanish:
  - Annas
  lexicon: standard transliteration practice
  rationale: Se usa la transliteración española habitual Anás, acorde con el nombre propio bíblico y la pronunciación tradicional en español.
- source_word: Καϊάφα
  english_pob_choice: Caiaphas
  chosen_spanish: Caifás
  alternatives_spanish:
  - Caiafas
  lexicon: standard transliteration practice
  rationale: Se usa la forma española usual Caifás, que es la transliteración bíblica más reconocible y adecuada para lectura eclesial.
theological_decisions:
- issue: Referencia del relativo «que era sumo sacerdote de aquel año»
  english_pob_reading: The relative clause modifies Caiaphas, not Annas.
  chosen_spanish_reading: La cláusula relativa modifica a Caifás, no a Anás.
  alternative_spanish_readings:
  - podría parecer en español que se refiere a Anás si se leyera con poca atención
  rationale: El griego ὃς es masculino singular y retoma con mayor naturalidad a Καϊάφα. El español debe preservar esa referencia clara para no introducir una ambigüedad que no está en el texto fuente.
  doctrine_reference: Respeto de la sintaxis del texto fuente y preservación de la referencia pronominal.
translation_notes:
  revision_awareness: El pasaje presenta alta concordancia con el audit trail inglés. La única decisión de adaptación relevante es la elección española «ante Anás» y «sumo sacerdote», buscando naturalidad sin perder la relación sintáctica del relativo con Caifás.
  spanish_consistency_notes:
  - 'Se mantienen los nombres propios en formas españolas habituales: Anás y Caifás.'
  - «Sumo sacerdote» conserva el término eclesial y bíblico estándar en español.
  - La secuencia narrativa queda explícita con «primero» y el relativo final queda unido a Caifás para evitar ambigüedad.
  - No se añadió ninguna glosa interpretativa fuera de lo que exige la sintaxis del original.
