source:
  edition: WLC
  text: הֵ֚ן לֹא הוּבָ֣א אֶת דָּמָ֔/הּ אֶל הַ/קֹּ֖דֶשׁ פְּנִ֑ימָה אָכ֨וֹל תֹּאכְל֥וּ אֹתָ֛/הּ בַּ/קֹּ֖דֶשׁ כַּ/אֲשֶׁ֥ר צִוֵּֽיתִי־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/leviticus/010/018.yaml
  text: Look[a], its blood was not brought inside into the holy place. You certainly should have eaten it in the holy place[b], as I commanded.
  footnotes:
  - marker: a
    text: Or 'into the holy place, inside.' The Hebrew uses a term for the sacred area plus 'inside,' emphasizing the interior sanctuary.
    reason: lexical_alternative
  - marker: b
    text: 'The Hebrew expression ''eating you should eat'' intensifies the command: ''you surely should have eaten it.'''
    reason: lexical_alternative
