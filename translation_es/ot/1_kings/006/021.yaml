- from: Salomón revistió el interior de la casa con oro puro[a], e hizo pasar cadenas de oro[b] delante del santuario interior[c], y lo revistió de oro.
  to: Salomón revistió el interior de la casa con oro puro[a], y tendió cadenas de oro a través del frente del santuario interior[b][c], y lo revistió de oro.
