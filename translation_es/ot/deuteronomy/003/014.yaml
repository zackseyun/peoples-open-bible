translation:
  language: es
  text: Jair hijo de Manasés tomó todo el territorio de Argob[a], hasta la frontera de los guesureos y de los maacateos, y los llamó por su propio nombre, es decir, Basán, Havot-jair[b], hasta hoy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O más literalmente: «y los llamó por su propio nombre, Basán, Havot-jair». La sintaxis hebrea es comprimida y puede entenderse de manera ligeramente distinta.'
    reason: alternative_reading
  - marker: b
    text: Havot-jair probablemente significa «las aldeas de Jair» o «los asentamientos de Jair».
    reason: lexical_alternative
lexical_decisions:
- source_word: חֶבֶל
  english_pob_choice: region
  chosen_spanish: territorio
  alternatives_spanish:
  - región
  - comarca
  - distrito
  lexicon: HALOT
  rationale: En este contexto geográfico, חֶבֶל designa una extensión territorial definida. «Territorio» preserva el sentido espacial de la tierra ocupada y suena natural en español bíblico contemporáneo.
- source_word: אַרְגֹּב
  english_pob_choice: Argob
  chosen_spanish: Argob
  alternatives_spanish:
  - Argob
  lexicon: HALOT
  rationale: Nombre propio de lugar; se translitera para conservar la referencia histórica y geográfica.
- source_word: גְּב֥וּל הַגְּשׁוּרִי וְהַמַּעֲכָתִי
  english_pob_choice: the border of the Geshurites and the Maacathites
  chosen_spanish: la frontera de los guesureos y de los maacateos
  alternatives_spanish:
  - el límite de los guesureos y de los maacateos
  - la frontera de Gesur y Maacá
  lexicon: HALOT
  rationale: גְּבוּל se expresa bien como «frontera» en español. Los adjetivos gentilicios se vierten como pueblos o grupos étnicos («guesureos», «maacateos») para mantener el valor colectivo del hebreo.
- source_word: וַיִּקְרָא אֹתָם
  english_pob_choice: he called them
  chosen_spanish: los llamó
  alternatives_spanish:
  - los nombró
  - les puso nombre
  lexicon: HALOT
  rationale: El sufijo plural se conserva con «los». En español, «los llamó» mantiene la posibilidad de la construcción hebrea comprimida sin forzar una paráfrasis más explicativa de lo necesario.
- source_word: עַל שְׁמוֹ
  english_pob_choice: after his own name
  chosen_spanish: es decir
  alternatives_spanish:
  - según su propio nombre
  - llamándolos con su propio nombre
  lexicon: HALOT
  rationale: La sintaxis hebrea es densa y admite una relación appositiva o explicativa. Aquí se mantiene la aclaración breve con «es decir», siguiendo el valor interpretativo de la auditoría inglesa sin sobrecargar el español.
- source_word: אֶת הַבָּשָׁן
  english_pob_choice: that is, Bashan
  chosen_spanish: Basán
  alternatives_spanish:
  - Bashán
  - en Basán
  lexicon: HALOT
  rationale: La frase funciona como una identificación apposicional difícil. Se integra «Basán» en la secuencia nominal para reflejar la identificación del lugar nombrado, sin añadir elementos no presentes en el hebreo.
- source_word: חַוֺּת יָאִיר
  english_pob_choice: Havvoth-jair
  chosen_spanish: Havot-jair
  alternatives_spanish:
  - las aldeas de Jair
  - los asentamientos de Jair
  - Havvot de Jair
  lexicon: HALOT
  rationale: Se conserva el nombre de lugar como topónimo. «Havot-jair» respeta la forma reconocible en español; las alternativas semánticas se reservan porque el nombre puede aludir a aldeas o campamentos.
- source_word: עַד הַיּוֹם הַזֶּה
  english_pob_choice: to this day
  chosen_spanish: hasta hoy
  alternatives_spanish:
  - hasta el día de hoy
  - hasta este día
  lexicon: HALOT
  rationale: Equivalente idiomático natural en español para indicar persistencia hasta el presente narrativo.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión inglesa más reciente: se mantuvo la aclaración appositiva breve equivalente a «that is, Bashan», pero en español se integró de modo más natural con «es decir, Basán», evitando una puntuación pesada. También se preservó el plural del objeto («los llamó») y el cierre idiomático «hasta hoy».'
  spanish_consistency_notes:
  - Se usó «Yair/Jair» únicamente como transliteración estable del nombre propio; aquí se eligió «Jair» para coherencia con el uso bíblico habitual en español.
  - Se mantuvieron transliteraciones toponímicas en formas breves y legibles, evitando traducir nombres propios salvo el sentido de los términos comunes dentro de ellos.
  - «Basán» se emplea con acento gráfico español; «Havot-jair» conserva la forma tradicional pero sin forzar la etimología en el texto principal.
