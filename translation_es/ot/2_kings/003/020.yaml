translation:
  language: es
  text: Y por la mañana[a], al ofrecerse la ofrenda de cereal, he aquí, vino agua desde la dirección de Edom[b], y la tierra se llenó de agua[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cuando se ofrecía la ofrenda de cereal». El hebreo dice literalmente «al subir la ofrenda de cereal», usando lenguaje sacrificial para su presentación en el altar.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «desde el camino de Edom» o «por la ruta de Edom».'
    reason: lexical_alternative
  - marker: c
    text: El hebreo dice literalmente «la tierra se llenó del agua»; en español se expresa más naturalmente «la tierra se llenó de agua».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And ... it happened / And
  chosen_spanish: Y sucedió
  alternatives_spanish:
  - Y aconteció
  - Y ocurrió
  lexicon: HALOT
  rationale: La fórmula narrativa hebrea introduce un hecho en secuencia. En español, 'Y sucedió' conserva el valor de engarce narrativo sin sonar arcaico como 'aconteció', y evita una traducción demasiado mecánica.
- source_word: בַּבֹּקֶר
  english_pob_choice: in the morning
  chosen_spanish: por la mañana
  alternatives_spanish:
  - en la mañana
  - en la mañana temprano
  lexicon: HALOT
  rationale: La referencia temporal es directa; 'por la mañana' es natural y fiel en español actual.
- source_word: כַּעֲלוֹת הַמִּנְחָה
  english_pob_choice: at the offering up of the grain offering
  chosen_spanish: cuando se ofrecía la ofrenda de cereal
  alternatives_spanish:
  - al ofrecerse la ofrenda de cereal
  - cuando se presentaba la ofrenda de cereal
  lexicon: HALOT
  rationale: כַּעֲלוֹת conserva el matiz de 'subir/ofrecer' en contexto sacrificial. 'Ofrecía' o 'se ofrecía' reproduce ese sentido cultual de presentación. 'Ofrenda de cereal' refleja מִנְחָה como ofrenda cultual específica.
- source_word: וְהִנֵּה
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - mira
  - y he aquí
  lexicon: HALOT
  rationale: '''He aquí'' preserva la fuerza deíctica y literaria de la partícula hebrea sin suavizarla a una mera interjección moderna.'
- source_word: מַיִם
  english_pob_choice: water
  chosen_spanish: el agua
  alternatives_spanish:
  - aguas
  lexicon: HALOT
  rationale: Aunque מַיִם es morfológicamente plural, en español 'agua' funciona naturalmente como sustantivo de masa. Mantener el singular evita un giro poco idiomático.
- source_word: בָּאִים
  english_pob_choice: came
  chosen_spanish: venía
  alternatives_spanish:
  - venían
  - llegaba
  lexicon: HALOT
  rationale: El participio describe movimiento observable. 'Venía' conserva el aspecto durativo que puede percibirse en la escena, mientras sigue siendo fluido en español.
- source_word: מִדֶּרֶךְ אֱדֹם
  english_pob_choice: from the direction of Edom
  chosen_spanish: desde la dirección de Edom
  alternatives_spanish:
  - por la vía de Edom
  - desde el camino de Edom
  lexicon: HALOT
  rationale: דֶּרֶךְ puede denotar ruta o dirección. 'Desde la dirección de Edom' evita reducirlo a un simple 'desde Edom' y preserva el matiz geográfico del texto.
- source_word: וַתִּמָּלֵא הָאָרֶץ אֶת הַמָּיִם
  english_pob_choice: the land was filled with water
  chosen_spanish: la tierra se llenó del agua
  alternatives_spanish:
  - la tierra quedó llena de agua
  - la región se llenó de agua
  lexicon: HALOT
  rationale: La construcción hebrea resalta el resultado de llenarse con ese agua concreta. 'Se llenó del agua' conserva la referencia específica al agua mencionada, siguiendo el valor del objeto explícito del hebreo.
translation_notes:
  revision_awareness: He seguido el estado revisado del audit trail en inglés, especialmente la preferencia por un verbo narrativo simple para el movimiento del agua y la eliminación de un artículo superfluo en inglés idiomático, pero he mantenido en español una formulación naturalmente literaria y fiel al hebreo. También he preservado la tensión cultual de מִנְחָה con una nota alternativa.
  spanish_consistency_notes:
  - He usado 'Y' al inicio para reflejar la continuidad narrativa del wayyiqtol hebreo.
  - He elegido 'ofrenda de cereal' para מִנְחָה en contexto cultual, en armonía con la terminología POB.
  - '''El agua'' se mantiene en singular por naturalidad del español, aunque la forma hebrea es plural.'
  - '''Desde la dirección de Edom'' conserva el valor direccional de מִדֶּרֶךְ sin volverlo excesivamente literal.'
  - He evitado 'SEÑOR' o cualquier sustitución teológica no presente en el verso.
