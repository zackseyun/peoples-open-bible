review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la secuencia narrativa, la postura de profunda reverencia, el tono formal de הִנֵּה y el tratamiento honorífico «mi señor». También intenta preservar la distinción entre אֲמָתְךָ y לְשִׁפְחָה. Sin embargo, dos decisiones no siguen bien el expediente auditado: (1) «se inclinó rostro en tierra» es menos natural en español y atenúa la idea de postración profunda expresada por וַתִּשְׁתַּחוּ אַפַּיִם אָרְצָה; (2) «los esclavos de mi señor» sobretraduce עַבְדֵי, donde la POB inglesa razonó específicamente que en este contexto cortesano conviene «servants».'
  spanish_quality_summary: El texto es mayormente claro y digno, pero «se inclinó rostro en tierra» suena algo calcado; «se postró con el rostro en tierra» es más natural y fiel. La combinación «tu esclava es una sierva» funciona en español para conservar la variación léxica, aunque sigue siendo una formulación deliberadamente humillante. El resto del verso lee bien en español bíblico moderno.
  glossary_alignment: 'Buen ajuste general a la terminología del proyecto: no hay nombres divinos ni títulos mesiánicos en juego; «mi señor» es adecuado para אֲדֹנִי. Para los términos de servidumbre femeninos, la diferenciación española es defendible. Pero para עַבְדֵי el borrador se aparta de la decisión contextual documentada en inglés, que prefirió «servants» por tratarse de asistentes domésticos/cortesanos; en español corresponde «siervos» o «servidores», no «esclavos».'
  issues:
  - severity: medium
    issue: «se inclinó rostro en tierra» suena poco natural y no refleja tan bien la profundidad de la reverencia.
    rationale: וַתִּשְׁתַּחוּ אַפַּיִם אָרְצָה describe una postración profunda. El propio expediente inglés da como alternativa explícita «prostrated herself». En español, «se postró con el rostro en tierra» expresa mejor la postura y evita un calco torpe.
  - severity: high
    issue: «los esclavos de mi señor» no sigue la decisión léxica contextual de עַבְדֵי.
    rationale: El expediente inglés documenta que aquí עַבְדֵי se refiere a los sirvientes de la casa de David y que la condición servil no es el foco, por lo que se escogió «the servants of». Traducir «esclavos» endurece innecesariamente el sentido y rompe la racionalización auditada.
  - severity: low
    issue: La nota de «He aquí» no es necesaria para la comprensión española.
    rationale: Puede mantenerse si se desea preservar la justificación auditada del registro, pero no aporta una ambigüedad nueva en español. Aun así, no daña el texto.
  revised_spanish_text: Ella se levantó y se postró con el rostro en tierra, y dijo:[a] «He aquí, tu esclava[b] es una sierva para lavar los pies de los siervos de mi señor».[c]
  revised_footnotes:
  - marker: a
    text: O «se levantó y se inclinó rostro en tierra». La expresión describe una reverencia profunda; también puede entenderse como «se postró».
    reason: lexical_alternative
  - marker: b
    text: O «tu sierva es una sierva». El hebreo usa dos términos femeninos de servidumbre estrechamente relacionados, y la traducción procura conservar esa variación.
    reason: lexical_alternative
  - marker: c
    text: «Los siervos de mi señor» refleja el contexto cortesano de los asistentes de David; otra posibilidad sería «los servidores de mi señor».
    reason: lexical_alternative
  revision_rationale: Se ajustó la frase de reverencia a un español más natural y más fiel a la idea de postración profunda, y se corrigió עַבְדֵי de «esclavos» a «siervos» para seguir la decisión contextual documentada en la POB inglesa. Se mantuvo la distinción entre «tu esclava» y «una sierva» porque preserva la variación hebrea de autohumillación sin sonar excesivamente artificial en español.
