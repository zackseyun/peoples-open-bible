translation:
  language: es
  text: 'Después de haber entregado el documento de compra a Baruc hijo de Nerías, oré a Yahvé[a], diciendo:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «YHWH». El proyecto lo vierte como «Yahvé»; alternativamente, «Yahweh».'
    reason: alternative_reading
lexical_decisions:
- source_word: וָאֶתְפַּלֵּל
  english_pob_choice: I prayed
  chosen_spanish: oré
  alternatives_spanish:
  - le oré
  - practiqué oración
  lexicon: HALOT
  rationale: El hitpael de פלל expresa aquí el acto de orar. En español, «oré» es natural, digno y fiel al valor verbal sin intensificar indebidamente la acción.
- source_word: אֶל יְהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - a Yahveh
  - al SEÑOR
  lexicon: HALOT
  rationale: El hebreo nombra directamente a יְהוָה. Conforme al criterio del proyecto, se conserva el nombre propio «Yahvé» en vez de sustituirlo por un título genérico.
- source_word: אַחֲרֵי תִתִּי
  english_pob_choice: After I had given
  chosen_spanish: Después de haber entregado
  alternatives_spanish:
  - Después de dar
  - Luego de haber dado
  lexicon: HALOT
  rationale: La secuencia temporal indica una acción previa completada antes de la oración. «Después de haber entregado» reproduce bien la anterioridad y la naturalidad del español.
- source_word: סֵפֶר הַמִּקְנָה
  english_pob_choice: the deed of purchase
  chosen_spanish: el documento de compra
  alternatives_spanish:
  - la escritura de compra
  - la escritura de adquisición
  - el contrato de compra
  lexicon: HALOT
  rationale: סֵפֶר designa un escrito o documento, y הַמִּקְנָה especifica la compra. «Documento de compra» conserva el valor documental sin sobrecargar con tecnicismos jurídicos que no están exigidos por el hebreo.
- source_word: אֶל בָּרוּךְ בֶּן נֵרִיָּה
  english_pob_choice: to Baruch son of Neriah
  chosen_spanish: a Baruc, hijo de Nerías
  alternatives_spanish:
  - a Baruc, el hijo de Nerías
  - a Baruc hijo de Nerías
  lexicon: HALOT
  rationale: 'Los nombres propios se hispanizan de forma estándar: Baruch → Baruc, Neriah → Nerías. Se conserva el patronímico «hijo de» como reflejo directo del hebreo.'
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: 'diciendo:'
  alternatives_spanish:
  - 'y dijo:'
  - 'al decir:'
  lexicon: HALOT
  rationale: לֵאמֹר introduce el discurso siguiente. «Diciendo:» preserva la transición formal al contenido citado y funciona de manera idiomática en español.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton. En esta serie, la forma española establecida es «Yahvé», que mantiene el nombre propio del pacto y evita el ocultamiento litúrgico del nombre.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el dato hebreo y el audit trail inglés: mantiene la secuencia temporal de אַחֲרֵי + תִתִּי, conserva el nombre divino como Yahvé según la directriz del proyecto, y traduce סֵפֶר הַמִּקְנָה como un documento de compra sin ampliar innecesariamente el sentido. No se aplicaron revisiones previas en el expediente inglés.'
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico claro y contemporáneo, evitando calcos duros salvo donde la sintaxis lo requiere.
  - «Yahvé» se usa consistentemente para יְהוָה en la redacción principal.
  - «Baruc» y «Nerías» siguen la hispanización habitual de los nombres propios bíblicos.
  - La coma antes de «diciendo» preserva la función introductoria de לֵאמֹר en español.
