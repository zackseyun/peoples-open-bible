    issue: '''campos de pastoreo'' no es la mejor solución para מגרש'
    rationale: Aunque comprensible, en español suena algo descriptivo y menos técnico/cultural que el terreno abierto o de pasto en torno a las ciudades. 'pastizales' o 'tierras de pasto' refleja mejor el uso y la referencia territorial.
  - severity: medium
    issue: '''designados por nombre'' y la nota ''nombrados por nombre'' suenan poco idiomáticas'
    rationale: El hebreo expresa identificación oficial por nombre. En español natural conviene 'designados por sus nombres', 'identificados por nombre' o 'inscritos/listados por nombre'. La alternativa 'nombrados por nombre' no es buena español.
  - severity: low
    issue: La nota c podría expresar mejor la fuerza distributiva
    rationale: '''Cada ciudad'' es correcto, pero la nota puede aclarar ''cada una de las ciudades'' para reflejar mejor el hebreo ''ciudad y ciudad''.'
