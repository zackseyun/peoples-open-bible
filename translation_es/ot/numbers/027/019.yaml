review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del hebreo: presenta a Josué ante Eleazar, ante toda la congregación, y expresa el acto público de investirlo. Sin embargo, dos elecciones españolas debilitan la naturalidad y precisión contextual: ''lo comisionarás'' suena anglicado y poco bíblico en español eclesial, y ''a su vista'' es menos natural que una expresión pública más idiomática. La nota también necesita ajustar la alternativa ''mandarlo'', que en español suena a enviarlo, no a darle mandato.'
  spanish_quality_summary: El texto es claro y mayormente fiel, pero requiere pulido para sonar natural en español bíblico moderno y digno. 'Lo encargarás' comunica mejor la idea de dar un cargo o encargo público; 'ante sus ojos' expresa bien לְעֵינֵיהֶם. El resto del verso es legible y adecuado.
  glossary_alignment: No hay conflictos con términos troncales del proyecto. 'Congregación' encaja bien para עֵדָה. El punto principal es que, aunque el inglés use 'commission', en español 'comisionar' no es la mejor equivalencia contextual; 'encargar' preserva mejor la fuerza formal sin calco innecesario.
  issues:
  - severity: medium
    issue: '''lo comisionarás'' suena poco natural en español bíblico'
    rationale: Aunque sigue de cerca el inglés 'commission', en español general y eclesial 'comisionar' suele sentirse administrativo o anglicado. 'Encargar' expresa mejor el acto formal de conferir responsabilidad pública en este contexto.
  - severity: low
    issue: '''a su vista'' es menos idiomático que otras opciones'
    rationale: לְעֵינֵיהֶם significa literalmente 'ante sus ojos' y denota publicidad visible. 'Ante sus ojos' o 'en presencia de ellos' suena más natural y solemne en español.
  - severity: medium
    issue: La nota al pie usa 'mandarlo', que puede entenderse como 'enviarlo'
    rationale: Como alternativa léxica de צוה, 'mandarlo' introduce ambigüedad en español. 'Mandarle' o mejor 'ordenarle' comunica el sentido verbal correcto.
  revised_spanish_text: Lo pondrás delante de Eleazar el sacerdote y delante de toda la congregación, y le encargarás[a] su comisión ante sus ojos.
  revised_footnotes:
  - marker: a
    text: O 'le ordenarás' o 'le darás cargo'. El verbo hebreo puede significar 'ordenar'; aquí probablemente se refiere a confiarle públicamente a Josué su comisión o encargo.
    reason: lexical_alternative
  revision_rationale: Se reemplaza 'comisionar' por una formulación más natural en español eclesial que aún conserva la idea de investidura pública; se mejora la expresión de visibilidad pública con 'ante sus ojos'; y se corrige la nota para evitar la ambigüedad de 'mandarlo'.
