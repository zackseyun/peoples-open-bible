  to: 'Moisés escogió varones capaces[a] de entre todo Israel y los nombró jefes[b] sobre el pueblo: jefes de mil, jefes de cien, jefes de cincuenta y jefes de diez.'
  rationale: Se añade la nota b para preservar una alternativa lexical significativa documentada en el POB inglés sobre רָאשִׁים, y se ajusta «jefes de ciento» a «jefes de cien» por naturalidad idiomática en español. Se mantiene el resto del texto porque refleja bien el sentido del hebreo y el registro buscado.
