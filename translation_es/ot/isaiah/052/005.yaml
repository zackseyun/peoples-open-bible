translation:
  language: es
  text: Y ahora, ¿qué tengo yo aquí? —declara Yahvé—. Porque mi pueblo ha sido llevado por nada; los que gobiernan sobre ellos[a] gimen —declara Yahvé—, y continuamente, todo el día[b], mi nombre es despreciado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los que los gobiernan». El hebreo puede referirse a quienes gobiernan sobre el pueblo; en este contexto, esos gobernantes son opresivos.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «mi nombre es blasfemado continuamente todo el día».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: And now
  chosen_spanish: Y ahora
  alternatives_spanish:
  - Ahora
  lexicon: HALOT
  rationale: La conjunción ו seguida del adverbio temporal pide en español una transición natural. 'Y ahora' conserva la conexión discursiva y el matiz de apertura profética.
- source_word: מַה־לִּי פֹה
  english_pob_choice: what do I have here?
  chosen_spanish: ¿qué tengo yo aquí?
  alternatives_spanish:
  - ¿qué es esto para mí aquí?
  - ¿qué tengo aquí?
  lexicon: HALOT
  rationale: La pregunta es retórica e idiomática. '¿Qué tengo yo aquí?' suena natural en español y conserva la extrañeza/protesta del hebreo sin volverlo explicativo en exceso.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: —declara Yahvé—
  alternatives_spanish:
  - —dice Yahvé—
  - —oráculo de Yahvé—
  lexicon: HALOT
  rationale: Se mantiene la fórmula profética con un verbo declarativo directo en español. 'Declara' preserva el tono solemne sin recurrir a una perífrasis más rígida.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto para el Nombre divino. 'Yahvé' preserva el Tetragrámaton en el texto principal.
- source_word: לֻקַּח עַמִּי
  english_pob_choice: my people have been taken away
  chosen_spanish: mi pueblo ha sido llevado
  alternatives_spanish:
  - mi pueblo ha sido tomado
  - mi pueblo ha sido arrebatado
  lexicon: HALOT
  rationale: '''Ha sido llevado'' refleja el pasivo consumado con sentido de deportación o traslado forzoso, sin añadir una interpretación más específica de la que el hebreo exige.'
- source_word: חִנָּם
  english_pob_choice: for nothing
  chosen_spanish: por nada
  alternatives_spanish:
  - sin costo
  - sin motivo
  - gratuitamente
  lexicon: HALOT
  rationale: '''Por nada'' conserva la ambigüedad entre ausencia de causa y ausencia de precio, como en el audit trail inglés.'
- source_word: מֹשְׁלָיו
  english_pob_choice: those who rule over them
  chosen_spanish: los que gobiernan sobre ellos
  alternatives_spanish:
  - sus gobernantes
  - sus opresores
  lexicon: HALOT
  rationale: La forma hebrea apunta a quienes ejercen dominio. 'Los que gobiernan sobre ellos' mantiene el referente sin introducir una interpretación más cargada que la base textual.
- source_word: יְהֵילִילוּ
  english_pob_choice: wail
  chosen_spanish: se lamentan
  alternatives_spanish:
  - aúllan
  - gimen
  - se lamentan a gritos
  lexicon: HALOT
  rationale: El verbo expresa lamento intenso o aullido. En español, 'se lamentan' comunica el lamento de manera publicable y algo más natural que una forma demasiado áspera, sin perder la carga de duelo.
- source_word: וְתָמִיד כָּל־הַיּוֹם
  english_pob_choice: and continually, all day long
  chosen_spanish: y continuamente, todo el día
  alternatives_spanish:
  - y continuamente, todo el día
  - y constantemente, todo el día
  lexicon: HALOT
  rationale: Se preservan ambos intensificadores para no aplanar el paralelismo hebreo. La duplicación adverbial comunica duración total e insistente.
- source_word: שְׁמִי
  english_pob_choice: my name
  chosen_spanish: mi nombre
  alternatives_spanish:
  - mi fama
  - mi reputación
  lexicon: HALOT
  rationale: '''Nombre'' debe permanecer en el texto por fidelidad al hebreo y por su peso teológico en la Biblia.'
- source_word: מִנֹּאָץ
  english_pob_choice: is despised
  chosen_spanish: es despreciado
  alternatives_spanish:
  - es blasfemado
  - es tratado con desprecio
  lexicon: HALOT
  rationale: '''Es despreciado'' conserva el campo semántico amplio de נאץ sin cerrar prematuramente a ''blasfemado''. Mantiene también la tensión teológica del honor debido al Nombre.'
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  rationale: El texto hebreo contiene directamente el Tetragrámaton. El español del proyecto lo vierte como 'Yahvé' para preservar el Nombre del pacto sin máscara litúrgica.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sentido de מִנֹּאָץ respecto al Nombre
  english_pob_reading: my name is despised
  chosen_spanish_reading: mi nombre es despreciado
  alternative_spanish_readings:
  - mi nombre es blasfemado
  - mi nombre es tratado con desprecio
  rationale: La elección principal deja abierta la gama de desprecio, deshonra y rechazo. La alternativa más fuerte 'blasfemado' se reserva como posibilidad interpretativa, pero no se impone en el texto principal.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3'
- issue: Sujeto de יְהֵילִילוּ
  english_pob_reading: those who rule over them wail
  chosen_spanish_reading: los que gobiernan sobre ellos se lamentan
  alternative_spanish_readings:
  - sus opresores aúllan
  - sus gobernantes gimen
  rationale: La ambigüedad del sujeto se resuelve siguiendo el audit trail inglés hacia 'those who rule over them'. En español, 'se lamentan' permite mantener el sentido de clamor doloroso sin forzar un aullido literal que podría sonar interpretativo en exceso.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #2'
translation_notes:
  revision_awareness: 'La redacción sigue de cerca la última revisión inglesa: se mantiene el giro interrogativo idiomático, se conserva ''for nothing'' como ambigüedad en español (''por nada''), y se adopta el sujeto contextual ''los que gobiernan sobre ellos'' para יְהֵילִילוּ. También se preserva la doble intensificación temporal ''continuamente, todo el día''.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' de manera consistente para יְהוָה.
  - '''Nombre'' se conserva literalmente para שֵׁם/שְׁמִי, sin sustituirlo por ''reputación'' en el texto principal.'
  - '''Por nada'' mantiene la ambigüedad semántica del hebreo y del audit trail inglés.'
  - El español evita el calco rígido de 'what do I have here?' pero conserva su función retórica.
  - Se mantuvo una distinción entre el lamento de los gobernantes y la deshonra del Nombre en la segunda cláusula.
