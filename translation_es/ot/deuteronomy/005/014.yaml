review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y la mayoría de las decisiones fuente: conserva «Yahvé», mantiene «esclavo/esclava», incluye la finalidad de descanso y retiene el modismo «dentro de tus puertas» con nota cultural. Sin embargo, hay dos desajustes principales con la evidencia fuente y la auditoría inglesa: (1) מְלָאכָה se vierte mejor como «trabajo» que «obra» en este contexto legal-sabático; «obra» suena menos natural en español bíblico actual. (2) El anclaje de notas a, b, c, d no corresponde bien a su contenido: la nota sobre גֵּר/residente extranjero falta en el texto, mientras que la nota d realmente explica «dentro de tus puertas». Además, «ninguno de tus animales» es menos natural que «ningún animal tuyo» o, mejor, «ninguno de tus animales domésticos/ganado», aunque el hebreo apunta a ganado/livestock más que animales en general.'
  spanish_quality_summary: El español es generalmente claro y digno, pero «No harás ninguna obra» suena rígido y poco idiomático frente a «No harás ningún trabajo». También conviene mejorar la gestión de notas para que cada marcador corresponda a la palabra o frase explicada. «Extranjero» es posible, pero en este contexto «residente extranjero» o «forastero residente» comunica mejor גֵּר; si se mantiene «extranjero», debe anclarse una nota léxica en esa palabra. El resto de la sintaxis fluye bien.
  glossary_alignment: Alineación fuerte con el glosario del proyecto en «Yahvé» y «esclavo/esclava». «Sábado» para שַׁבָּת es aceptable. La principal mejora terminológica es preferir «trabajo» para מְלָאכָה en este mandamiento. Para בְּהֵמָה, el borrador se aparta de la decisión auditada «livestock» al usar «animales»; en español sería mejor «ganado» con posible nota si se desea evitar estrechez, o una formulación como «tus animales domésticos».
  issues:
