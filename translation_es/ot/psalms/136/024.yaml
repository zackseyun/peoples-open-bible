translation:
  language: es
  text: y nos rescató de nuestros enemigos, porque su amor constante permanece para siempre.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: וַיִּפְרְקֵנוּ
  english_pob_choice: and rescued us
  chosen_spanish: y nos rescató
  alternatives_spanish:
  - y nos libró
  - y nos liberó
  lexicon: HALOT
  rationale: El verbo פרק, en la forma waw-consecutiva con objeto de 1.ª persona plural, expresa sacar o arrancar de una situación de peligro u opresión. «Rescató» comunica bien esa acción en español actual y conserva el sentido de salvación concreta del texto.
- source_word: מִצָּרֵינוּ
  english_pob_choice: from our foes
  chosen_spanish: de nuestros enemigos
  alternatives_spanish:
  - de nuestros adversarios
  - de nuestros opresores
  lexicon: HALOT
  rationale: צָרִים designa a quienes hostigan u oprimen. «Enemigos» es la equivalencia natural y transparente en español; «adversarios» es posible, pero menos directo en este contexto litúrgico.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Aquí introduce la razón del acto divino dentro del estribillo repetitivo. En español, «porque» expresa con claridad la relación explicativa sin perder la función de fundamento.
- source_word: לְעוֹלָם
  english_pob_choice: endures forever
  chosen_spanish: es para siempre
  alternatives_spanish:
  - permanece para siempre
  - dura para siempre
  lexicon: HALOT
  rationale: La expresión hebrea apunta a duración eterna. En este estribillo, «es para siempre» es una forma natural y fiel en español; preserva el valor litúrgico de permanencia absoluta.
- source_word: חַסְדּוֹ
  english_pob_choice: his steadfast love
  chosen_spanish: su misericordia
  alternatives_spanish:
  - su amor constante
  - su amor leal
  - su fidelidad amorosa
  lexicon: HALOT
  rationale: חֶסֶד abarca lealtad, bondad y amor de pacto. En español, «misericordia» es una opción tradicional y comprensible, aunque algo más estrecha que el hebreo; se mantiene aquí por la cadencia del refrán y su amplia inteligibilidad. Las alternativas conservan mejor el matiz de amor fiel, pero suenan menos idiomáticas en este estribillo.
theological_decisions:
- issue: Cómo rendir חֶסֶד en el refrán del Salmo 136
  english_pob_reading: his steadfast love endures forever
  chosen_spanish_reading: su misericordia es para siempre
  alternative_spanish_readings:
  - su amor constante es para siempre
  - su amor leal es para siempre
  - su fidelidad amorosa es para siempre
  rationale: El refrán celebra la permanencia del compromiso benevolente de Dios a lo largo de sus actos salvíficos. «Misericordia» conserva el énfasis en la bondad activa de Dios y mantiene una formulación breve y reconocible en español. Se deja constancia de que el hebreo es más amplio y puede abarcar fidelidad de pacto además de compasión.
  doctrine_reference: Translation philosophy §5 (consistencia de términos clave, o excepción documentada)
translation_notes:
  revision_awareness: Coincide con la última revisión indicada (sin cambios) y con el resumen de alta concordancia; no se incorporaron revisiones adicionales.
  spanish_consistency_notes:
  - Se mantuvo una cadencia litúrgica breve, acorde con el estribillo repetido del Salmo 136.
  - Se conservó el paralelismo entre la acción salvadora de Dios y la fórmula final de permanencia.
  - La elección de «misericordia» acepta una leve estrechez semántica respecto de חֶסֶד, pero evita una frase menos natural en español dentro del refrán.
