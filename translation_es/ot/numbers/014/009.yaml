translation:
  language: es
  text: Solo[a], no se rebelen contra Yahvé. Y no teman al pueblo de la tierra, porque son nuestro pan; su protección[b] se ha retirado de sobre ellos, y Yahvé está con nosotros. No les teman.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «porque son nuestro alimento». El hebreo dice literalmente: «son nuestro pan», una metáfora de conquista fácil o de ser consumidos.'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «su sombra se ha retirado de sobre ellos». Aquí «sombra» probablemente alude a protección o cobijo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַךְ
  english_pob_choice: Only
  chosen_spanish: Solo
  alternatives_spanish:
  - Solamente
  - Únicamente
  - Solo que
  lexicon: HALOT
  rationale: אַךְ introduce aquí una restricción o énfasis fuerte al mandato. «Solo» conserva esa fuerza de modo breve y natural en español, sin volverlo una simple conjunción adversativa.
- source_word: בַּיהוָה
  english_pob_choice: against Yahweh
  chosen_spanish: contra Yahvé
  alternatives_spanish:
  - contra Yahweh
  - frente a Yahvé
  - contra el SEÑOR
  lexicon: HALOT
  rationale: Con מרד, la preposición marca oposición o rebeldía dirigida contra la persona nombrada. Se usa «Yahvé» por la norma del proyecto para el nombre divino, manteniendo el valor de confrontación con «contra».
- source_word: תִּמְרֹדוּ
  english_pob_choice: do not rebel
  chosen_spanish: no se rebelen
  alternatives_spanish:
  - no se rebelen contra
  - no se subleven
  - no sean rebeldes
  lexicon: HALOT
  rationale: מרד expresa rebelión contra autoridad. En español, «no se rebelen» comunica el acto de rebelarse de forma directa y idiomática; la relación con Yahvé queda explícita por el complemento «contra Yahvé».
- source_word: תִּירְאוּ / תִּירָאֻם
  english_pob_choice: do not fear / do not fear them
  chosen_spanish: no teman / no teman a ellos
  alternatives_spanish:
  - no tengan miedo de / no tengan miedo de ellos
  - no los teman
  lexicon: HALOT
  rationale: En este contexto, ירא expresa miedo ante un enemigo. «No teman» es natural y solemne en español bíblico; se conserva la repetición final del mandato. En la última cláusula, «a ellos» refleja el objeto pronominal explícito del hebreo sin suavizar la reiteración.
- source_word: עַם הָאָרֶץ
  english_pob_choice: the people of the land
  chosen_spanish: el pueblo de la tierra
  alternatives_spanish:
  - la gente de la tierra
  - los habitantes de la tierra
  - el pueblo de aquel país
  lexicon: HALOT
  rationale: 'La expresión hebrea es literal: «el pueblo de la tierra». «Pueblo» mantiene mejor el tono colectivo y bíblico que «gente», y evita sobreinterpretar como un término técnico de la tierra prometida.'
- source_word: כִּי לַחְמֵנוּ הֵם
  english_pob_choice: for they are our bread
  chosen_spanish: porque son nuestro pan
  alternatives_spanish:
  - porque son nuestro alimento
  - porque son comida para nosotros
  - porque los devoraremos como pan
  lexicon: HALOT
  rationale: 'Se preserva la metáfora transparente del hebreo: «son nuestro pan». «Pan» es más cercano al texto que «alimento» y conserva la imagen de consumo o fácil victoria sin explicarla de más en el cuerpo principal.'
- source_word: סָר צִלָּם מֵעֲלֵיהֶם
  english_pob_choice: their protection has departed from over them
  chosen_spanish: su protección se ha retirado de sobre ellos
  alternatives_spanish:
  - su sombra se ha apartado de sobre ellos
  - su sombra se ha retirado de ellos
  - su refugio se ha apartado de ellos
  lexicon: HALOT
  rationale: צֵל literalmente es «sombra», pero aquí funciona metafóricamente como cobertura o amparo. «Protección» comunica el sentido funcional en español; «de sobre ellos» conserva la imagen espacial del hebreo. La alternativa literal se preserva en nota.
- source_word: וַיהוָה
  english_pob_choice: and Yahweh
  chosen_spanish: y Yahvé
  alternatives_spanish:
  - pero Yahvé
  - y el SEÑOR
  lexicon: HALOT
  rationale: El waw simple se traduce con «y». Se mantiene «Yahvé» por consistencia con el nombre divino del proyecto y con el hebreo מקור; no se introduce un contraste que el texto no exige.
- source_word: אִתָּנוּ
  english_pob_choice: with us
  chosen_spanish: está con nosotros
  alternatives_spanish:
  - está entre nosotros
  - está junto a nosotros
  - está con nosotros mismos
  lexicon: HALOT
  rationale: La expresión hebrea afirma presencia acompañante y protectora. «Está con nosotros» es la forma más natural y fiel en español, y refleja el valor covenantal de la presencia divina.
- source_word: תִּירָאֻם
  english_pob_choice: do not fear them
  chosen_spanish: No teman a ellos
  alternatives_spanish:
  - No les teman
  - No tengan miedo de ellos
  lexicon: HALOT
  rationale: Se conserva la repetición enfática del mandato. «No teman a ellos» refleja de manera transparente el pronombre objeto del hebreo; aunque «no les teman» suena más idiomático, la forma elegida mantiene la correspondencia auditiva con el texto fuente.
theological_decisions:
- issue: Nombre divino יהוה
  english_pob_reading: The English audit trail had rendered יהוה as 'Yahweh' rather than masking it as 'the LORD'.
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se sigue la norma del proyecto para no ocultar el nombre divino. «Yahvé» mantiene la audibilidad del Tetragrámaton y la coherencia con el English POB audit trail actualizado.
  doctrine_reference: Translation philosophy §1, §3
- issue: Metáfora de fácil conquista en כִּי לַחְמֵנוּ הֵם
  english_pob_reading: Preserve the metaphor as 'they are our bread' in the main text
  chosen_spanish_reading: Preservar la metáfora como «son nuestro pan»
  alternative_spanish_readings:
  - son nuestro alimento
  - los devoraremos
  rationale: La metáfora del pan se mantiene para no borrar la imagen de consumo o de victoria fácil. La nota permite informar la lectura alternativa sin reemplazar el tropo en el texto principal.
  doctrine_reference: Translation philosophy §6, §3
- issue: Metáfora de protección en סָר צִלָּם מֵעֲלֵיהֶם
  english_pob_reading: Translate the sense as 'their protection has departed from over them'
  chosen_spanish_reading: «su protección se ha retirado de sobre ellos»
  alternative_spanish_readings:
  - «su sombra se ha apartado de ellos»
  - «su sombra se ha retirado de sobre ellos»
  rationale: Se comunica el sentido funcional de צֵל como cobertura protectora, sin perder la imagen de retirada espacial. La alternativa literal queda registrada en nota para auditar la decisión.
  doctrine_reference: Translation philosophy §6, §3
- issue: Repetición final del mandato de no temer
  english_pob_reading: Do not fear them
  chosen_spanish_reading: «No teman a ellos»
  alternative_spanish_readings:
  - «No les teman»
  - «No tengan miedo de ellos»
  rationale: La repetición final pertenece a la fuerza retórica del versículo y no debe diluirse. Se conserva una forma semiliteral para reflejar el eco enfático del hebreo.
  doctrine_reference: Translation philosophy §2, §6
translation_notes:
  revision_awareness: 'El pasaje muestra alta concordancia con el borrador inglés auditado y la última pasada de revisión indicó que no eran necesarios cambios sustanciales. Se mantuvo la estrategia de equivalencia óptima: metáfora preservada en «son nuestro pan», explicación en nota; y sentido funcional para צֵל como «protección», también con nota literal. La única adaptación relevante al español fue hacer explícita la relación de rebelión con Yahvé mediante «contra Yahvé» para evitar una construcción menos transparente en castellano.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» en vez de «SEÑOR» para el nombre divino, de acuerdo con la norma del proyecto.
  - Se conserva «pan» en la metáfora central y no se sustituye por «alimento» en el texto principal.
  - «Protección» en el cuerpo principal y «sombra» en la nota preservan el doble nivel de sentido del hebreo.
  - La repetición final de «No teman» se conserva para reflejar la estructura enfática del hebreo.
  - Se emplea un español bíblico moderno y publicable, evitando calcos innecesarios como «pueblo de la tierra» cuando una forma más natural pero todavía literal es posible.
