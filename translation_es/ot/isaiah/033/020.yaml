base_translation:
  language: en
  yaml_path: translation/ot/isaiah/033/020.yaml
  text: Look upon Zion[a], the city of our appointed feasts; your eyes will see Jerusalem, a quiet habitation, a tent that will not be moved; its stakes will never be pulled up[c][b], and none of its ropes will be torn apart.
  footnotes:
  - marker: a
    text: Or 'the city of our appointed assemblies' or 'the city of our festivals.' The Hebrew מוֹעֲדֵנוּ can refer to appointed times or gatherings, especially in worship contexts.
    reason: lexical_alternative
  - marker: b
    text: Or 'a secure habitation.' The adjective can denote being at ease, undisturbed, or secure.
    reason: lexical_alternative
  - marker: c
    text: 'The Hebrew uses tent imagery for Jerusalem''s permanence: its stakes will not be pulled up and its ropes will not be broken.'
    reason: cultural_note
