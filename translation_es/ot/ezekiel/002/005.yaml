    text: Or 'whether they hear or refrain'; the Hebrew literally contrasts 'hear' with 'cease/refrain,' here meaning refusal to heed the message.
    reason: lexical_alternative
  - marker: b
    text: Or 'has been in their midst.'
    reason: lexical_alternative
