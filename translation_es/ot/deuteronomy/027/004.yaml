translation:
  language: es
  text: Y cuando crucen el Jordán[a], levantarán estas piedras, que yo les ordeno hoy, en el monte Ebal, y las recubrirán con cal.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunas tradiciones textuales, notablemente el Pentateuco samaritano, leen «monte Gerizim» en lugar de «monte Ebal».
    reason: textual_variant
lexical_decisions:
- source_word: וְהָיָה / בְּעָבְרְכֶם
  english_pob_choice: And when you cross
  chosen_spanish: Y cuando crucen
  alternatives_spanish:
  - Y será que, cuando crucen
  - Y cuando pasen
  lexicon: HALOT
  rationale: La construcción temporal hebrea introduce una circunstancia futura; en español, 'Y cuando crucen' comunica de modo natural ese valor sin perder la relación temporal del original.
- source_word: הַיַּרְדֵּן
  english_pob_choice: the Jordan
  chosen_spanish: el Jordán
  alternatives_spanish:
  - el río Jordán
  lexicon: HALOT
  rationale: En español bíblico el nombre propio 'el Jordán' es claro y natural; 'río' no es necesario en el texto principal.
- source_word: תָּקִימוּ
  english_pob_choice: you shall set up
  chosen_spanish: levantarán
  alternatives_spanish:
  - erigirán
  - colocarán
  lexicon: HALOT
  rationale: Para piedras, el sentido es ponerlas en posición vertical o establecerlas; 'levantarán' conserva el movimiento físico y suena más natural en español que una calca como 'set up'.
- source_word: הָאֲבָנִים הָאֵלֶּה
  english_pob_choice: these stones
  chosen_spanish: estas piedras
  alternatives_spanish:
  - estas piedras memoriales
  - estas piedras
  lexicon: HALOT
  rationale: '''אֲבָנִים'' se refiere directamente a piedras; ''piedras'' es la forma más transparente y evita añadir la idea de monumento, que no está explícita.'
- source_word: אֲשֶׁר אָנֹכִי מְצַוֶּה אֶתְכֶם הַיּוֹם
  english_pob_choice: which I am commanding you today
  chosen_spanish: que yo les ordeno hoy
  alternatives_spanish:
  - que yo les mando hoy
  - que hoy les estoy ordenando
  lexicon: HALOT
  rationale: '''מְצַוֶּה'' expresa una acción verbal vigente; en español, ''les ordeno hoy'' conserva el sentido directivo presente sin forzar una perífrasis innecesaria.'
- source_word: בְּהַר עֵיבָל
  english_pob_choice: on Mount Ebal
  chosen_spanish: en el monte Ebal
  alternatives_spanish:
  - sobre el monte Ebal
  - en el monte Ebal
  lexicon: HALOT
  rationale: Con un topónimo montañoso, español usa naturalmente 'en' o 'sobre'; 'en el monte Ebal' es claro y fiel.
- source_word: וְשַׂדְתָּ אוֹתָם
  english_pob_choice: and you shall plaster them
  chosen_spanish: y las recubrirás
  alternatives_spanish:
  - y las revocarás
  - y las enyesarás
  lexicon: HALOT
  rationale: El verbo שׂד indica cubrir o recubrir con una capa de material; en español, 'recubrir' evita sonar técnico o arcaizante y prepara bien el complemento material del versículo.
- source_word: בַּשִּׂיד
  english_pob_choice: with lime
  chosen_spanish: con yeso
  alternatives_spanish:
  - con cal
  - con argamasa de cal
  lexicon: HALOT
  rationale: '''שׂיד'' designa un material de encalado/yeso. En español, ''yeso'' comunica una capa blanqueadora o recubriente de manera comprensible; se mantiene la tensión material sin sobreinterpretar el compuesto exacto.'
theological_decisions:
- issue: Topónimo textual en Deuteronomio 27:4
  english_pob_reading: Mount Ebal
  chosen_spanish_reading: el monte Ebal
  alternative_spanish_readings:
  - el monte Gerizim
  rationale: El texto base hebreo (WLC/MT) lee 'Ebal'. Se mantiene esa lectura en el cuerpo principal y se conserva la variante tradicional en nota para auditar la tensión textual sin resolverla artificialmente.
  doctrine_reference: Primacía del original y preservación de variantes textuales relevantes en notas
- issue: 'Acción sobre las piedras: ''plaster'' y el material ''lime'''
  english_pob_reading: you shall plaster them with lime
  chosen_spanish_reading: las recubrirás con yeso
  alternative_spanish_readings:
  - las recubrirás con cal
  - las enlucirás con yeso
  rationale: El hebreo combina verbo de recubrimiento con el sustantivo del material. 'Recubrirás con yeso' mantiene ambos componentes sin caer en una repetición extraña; deja abierta la posibilidad de un recubrimiento mineral semejante al indicado por el término hebreo.
  doctrine_reference: Principio de equivalencia óptima con preservación del referente material
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo masorético de WLC y el andamiaje auditado en inglés. Se conserva la variante textual importante (Ebal/Gerizim) en nota, y se ajusta el verbo final para lograr un español natural sin perder el sentido material del recubrimiento.
  spanish_consistency_notes:
  - Se usa 'Jordán' como nombre propio del río, conforme al uso bíblico común en español.
  - Se evita 'SEÑOR' porque el versículo no contiene el nombre divino.
  - Se mantiene una sintaxis directa y formal, apta para lectura pública y auditabilidad.
  - '''Recubrir'' se eligió para no imponer más precisión material de la que permite el hebreo; la nota explica la opción frente a ''con yeso''.'
