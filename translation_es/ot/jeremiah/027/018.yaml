review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido del hebreo y del POB en casi todo: la condición adversativa («Pero si»), «la palabra de Yahvé está con ellos», la súplica/intercesión, la finalidad negativa («para que ... no vayan»), y la lista locativa de los objetos restantes. También preserva correctamente «Yahvé» para יְהוָה y mantiene «casa» en paralelo con בֵּית. Sin embargo, hay un problema formal importante: aparece un marcador [s] en el texto sin nota correspondiente, y falta una nota para la alternativa documentada de «vayan a Babilonia» frente al hebreo literal «vengan a Babilonia».'
  spanish_quality_summary: 'El español es claro, natural y digno. «Que ahora rueguen» suena bien y «utensilios restantes» es aceptable, aunque «objetos» o «vasos» también serían posibles. El principal defecto de calidad es de aparato crítico: marcación de nota inválida y omisión de una nota léxica importante ya preservada en el POB inglés. Además, la nota b actual explica el título «Yahvé de los ejércitos», pero no corresponde a una alternativa preservada en el inglés; conviene priorizar las notas realmente auditadas para este versículo.'
  glossary_alignment: 'Buena alineación general con la terminología del proyecto: יְהוָה → «Yahvé», יְהוָה צְבָאוֹת → «Yahvé de los ejércitos», נְבִאִים → «profetas». La decisión «rueguen» para יִפְגְּעוּ נָא es compatible con la racionalidad léxica documentada. No hay conflicto doctrinal significativo. La única corrección necesaria es al sistema de notas y a la preservación de la alternativa «venir/ir» para בֹאוּ ... בָּבֶלָה.'
  issues:
  - severity: high
    issue: Marcador de nota inválido [s] en el texto
    rationale: El texto contiene «que ahora[s]» pero no existe ninguna nota con marcador s. Esto incumple la disciplina requerida de notas y hace defectuoso el registro.
  - severity: medium
    issue: Falta la nota léxica sobre el hebreo literal «venir a Babilonia»
    rationale: El POB inglés preserva explícitamente la alternativa de בוא como «come to Babylon» frente a la adaptación idiomática «go to Babylon». En español también debe conservarse esa información, ya que «vayan a Babilonia» es una adaptación válida pero no literal.
  - severity: medium
    issue: La nota sobre «Yahvé de los ejércitos» no corresponde a una alternativa auditada en este versículo
    rationale: La nota b actual comenta el título, pero el inglés no la conserva como nota aquí. Dado que el número de notas debe reflejar alternativas significativas, conviene reemplazarla por la nota sobre «venir/ir», que sí está documentada.
  revised_spanish_text: Pero si son profetas[a], y si la palabra de Yahvé está con ellos, que ahora rueguen a Yahvé de los ejércitos para que los utensilios restantes en la casa de Yahvé, en la casa del rey de Judá[c], y en Jerusalén no vayan a Babilonia[b].
  revised_footnotes:
