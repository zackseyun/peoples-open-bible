translation:
  language: es
  text: Porque ella es un soplo del poder de Dios[a], y una emanación pura de la gloria del Todopoderoso[b]; por eso nada contaminado penetra en ella.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "vapor" para ἀτμίς. La imagen griega puede sugerir exhalación o vapor que asciende desde una fuente.
    reason: lexical_alternative
  - marker: b
    text: O "una emanación clara/sin mezcla" para "una emanación pura".
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀτμὶς
  english_pob_choice: breath
  chosen_spanish: soplo
  alternatives_spanish:
  - aliento
  - vapor
  - exhalación
  lexicon: LSJ
  rationale: ἀτμίς puede significar vapor, exhalación o aliento. "Soplo" conserva la imagen de algo que procede de una fuente viva y evita que el castellano suene demasiado físico o meteorológico. También mantiene la proximidad semántica con la decisión inglesa de priorizar la imagen de derivación desde Dios.
- source_word: δυνάμεως
  english_pob_choice: power
  chosen_spanish: potencia
  alternatives_spanish:
  - poder
  - fuerza
  lexicon: LSJ
  rationale: En este contexto genitivo, δύναμις expresa la capacidad o potencia divina. "Potencia" es una opción digna y natural en español bíblico cuando se quiere conservar el matiz de energía eficaz, sin perder la referencia a la fuerza activa de Dios.
- source_word: ἀπόρροια
  english_pob_choice: emanation
  chosen_spanish: emanación
  alternatives_spanish:
  - efluvio
  - corriente
  - desprendimiento
  lexicon: LSJ
  rationale: ἀπόρροια sugiere algo que fluye o procede de una fuente. "Emanación" reproduce bien el peso derivativo y teológico de la imagen, tal como en el inglés POB, sin añadir una explicación filosófica ajena al texto.
- source_word: εἰλικρινής
  english_pob_choice: pure
  chosen_spanish: pura
  alternatives_spanish:
  - clara
  - sin mezcla
  - íntegra
  lexicon: LSJ
  rationale: El adjetivo aquí califica la emanación como no mezclada ni contaminada. "Pura" es claro, idiomático y prepara la afirmación siguiente de que nada contaminado entra en ella.
- source_word: παντοκράτορος
  english_pob_choice: the Almighty
  chosen_spanish: el Todopoderoso
  alternatives_spanish:
  - el Omnipotente
  - el Soberano sobre todo
  - el que todo lo gobierna
  lexicon: LSJ
  rationale: En este título divino, "Todopoderoso" es la equivalencia más estable y comprensible en español contemporáneo. Conserva el valor titular de παντοκράτωρ sin convertirlo en una paráfrasis explicativa.
- source_word: μεμιαμμένον
  english_pob_choice: defiled
  chosen_spanish: contaminado
  alternatives_spanish:
  - manchado
  - impuro
  - ensuciado
  lexicon: LSJ
  rationale: El participio perfecto comunica un estado de contaminación o impureza. "Contaminado" transmite bien esa condición en español y mantiene el alcance moral y cultual sin estrecharlo demasiado.
- source_word: παρεμπίπτει
  english_pob_choice: enters into
  chosen_spanish: entra en
  alternatives_spanish:
  - cae en
  - penetra en
  - se introduce en
  lexicon: LSJ
  rationale: Aunque literalmente puede sugerir "caer dentro" o "caer al lado", el sentido en contexto es que nada contaminado logra acceso a ella. "Entra en" comunica con naturalidad esa idea en español.
theological_decisions:
- issue: Personificación de la sabiduría en femenino
  english_pob_reading: Retains feminine pronouns ('she,' 'her')
  chosen_spanish_reading: Se conserva la referencia femenina implícita con "ella" y "en ella"
  alternative_spanish_readings:
  - Repetir "sabiduría" sin pronombres
  - Neutralizar con "eso"
  rationale: El griego retoma a la sabiduría con concordancia femenina, y el pasaje la personifica de forma sostenida. Mantener "ella" preserva esa representación literaria y teológica sin introducir interpretaciones externas.
  doctrine_reference: DOCTRINE.md §Translation philosophy, preserving source meaning and readability
- issue: Imágenes derivativas de la relación entre la sabiduría y Dios
  english_pob_reading: Rendered imagery straightforwardly as 'a breath of the power of God' and 'a pure emanation of the glory of the Almighty'
  chosen_spanish_reading: Se traduce de forma directa como "un soplo de la potencia de Dios" y "una emanación pura de la gloria del Todopoderoso"
  alternative_spanish_readings:
  - Paráfrasis que atenúe la derivación
  - Lenguaje técnico filosófico
  rationale: El versículo usa imágenes fuertes de procedencia sin exigir formulaciones doctrinales posteriores. La traducción conserva la tensión y la fuerza del griego, sin resolverla ni sistematizarla en exceso.
  doctrine_reference: DOCTRINE.md §Translation philosophy, preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: El texto griego y el flujo de revisión coinciden con alta concordancia; no se detectaron cambios pendientes en la pasada más reciente. Esta versión mantiene la relación derivativa entre la sabiduría y Dios, la personificación femenina y la conclusión sobre la ausencia de contaminación.
  spanish_consistency_notes:
  - Se usa "Dios" y "Todopoderoso" de forma consistente con el vocabulario teológico del proyecto.
  - '"Soplo" conserva la metáfora de procedencia sin desplazarla a un tecnicismo innecesario.'
  - '"Contaminado" mantiene una ambigüedad cultual y moral compatible con "defiled".'
  - La puntuación reproduce el paralelismo y la conclusión causal del griego con "por eso".
