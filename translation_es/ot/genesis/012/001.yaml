translation:
  language: es
  text: 'Entonces Yahvé dijo a Abram[a]: «Sal de tu tierra, de tu parentela y de la casa de tu padre a la tierra que te mostraré».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Ve para ti» o «Ve tú mismo»; un mandato idiomático de partida.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El texto hebreo usa el nombre propio del pacto, no un título. En español, 'Yahvé' preserva ese nombre divino de manera transparente y coherente con la política de la POB, evitando la sustitución por 'el SEÑOR'.
- source_word: וַיֹּאמֶר
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - habló
  - les dijo
  lexicon: HALOT
  rationale: '''אָמַר'' normalmente significa ''decir''. ''Dijo'' es la forma natural y directa en español para el inicio narrativo del discurso.'
- source_word: לֶךְ לְךָ
  english_pob_choice: Go from
  chosen_spanish: Ve
  alternatives_spanish:
  - Vete
  - Ve de
  lexicon: HALOT
  rationale: 'La expresión hebrea es idiomática. La decisión principal de la POB en inglés fue no sobrecargarla con una explicación reflexiva; por eso en español se mantiene un mandato simple y natural: ''Ve''. La separación concreta (''de tu tierra...'') conserva la idea de salida exigida por el contexto.'
- source_word: מֵאַרְצְךָ
  english_pob_choice: from your land
  chosen_spanish: de tu tierra
  alternatives_spanish:
  - de tu país
  - de tu territorio
  lexicon: HALOT
  rationale: '''אֶרֶץ'' aquí designa la tierra natal o el territorio de origen. ''Tierra'' conserva bien ese alcance sin reducirlo a una noción moderna de Estado-nación.'
- source_word: וּמִמּוֹלַדְתְּךָ
  english_pob_choice: from your kindred
  chosen_spanish: de tu parentela
  alternatives_spanish:
  - de tu familia
  - de tu clan
  - de tus parientes
  lexicon: HALOT
  rationale: '''מוֹלֶדֶת'' puede referirse al grupo de origen o a la esfera de parentesco. ''Parentela'' mantiene el campo semántico social y familiar sin volver demasiado estrecha la idea.'
- source_word: וּמִבֵּית אָבִיךָ
  english_pob_choice: from your father’s house
  chosen_spanish: de la casa de tu padre
  alternatives_spanish:
  - de tu casa paterna
  - de tu hogar paterno
  lexicon: HALOT
  rationale: Es una expresión hebrea estable para el núcleo doméstico bajo la autoridad del padre. 'Casa de tu padre' es fiel y comprensible en español.
- source_word: אֶל הָאָרֶץ
  english_pob_choice: to the land
  chosen_spanish: a la tierra
  alternatives_spanish:
  - a la región
  - al país
  lexicon: HALOT
  rationale: '''אֶרֶץ'' se mantiene como ''tierra'' para conservar la correspondencia con ''de tu tierra'' y el sentido territorial prometido por Dios.'
- source_word: אֲשֶׁר אַרְאֶךָּ
  english_pob_choice: that I will show you
  chosen_spanish: que te mostraré
  alternatives_spanish:
  - que te haré ver
  - que yo te mostraré
  lexicon: HALOT
  rationale: El hiphil de 'ראה' significa 'mostrar'. 'Te mostraré' comunica con naturalidad la promesa futura de Dios sin perder el matiz de revelación del destino.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se preserva el nombre del pacto como nombre propio y no como título sustituto. 'Yahvé' mantiene la transparencia buscada por la POB.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Matiz de לֶךְ לְךָ
  english_pob_reading: Go from
  chosen_spanish_reading: Ve
  alternative_spanish_readings:
  - Vete
  - Ve para ti
  - Ve de
  rationale: La frase hebrea admite un matiz idiomático, incluso reflexivo, pero el contexto no obliga a explicitarlo en el cuerpo del texto. Se conserva la tensión mediante una traducción breve y una nota que documenta la alternativa literal.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'El borrador sigue el ajuste más reciente del audit trail inglés: se evitó sobrecargar לֶךְ־לְךָ con una paráfrasis como ''sal de'' o ''ve de salida'', y se optó por un mandato breve y natural. También se conservó la estructura tripartita del desarraigo y la promesa futura, con ''tierra'' como correspondencia estable de אֶרֶץ y ''mostraré'' para אַרְאֶךָּ.'
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' conforme al estándar del proyecto para יְהוָה.
  - '''Tierra'' traduce consistentemente אֶרֶץ en este versículo, tanto para origen como para destino.'
  - '''Parentela'' se eligió como término intermedio entre ''familia'' y ''clan'', preservando el ámbito social del hebreo.'
  - La nota [a] se ancla en 'Ve' para preservar la alternativa idiomática documentada sin recargar el texto principal.
