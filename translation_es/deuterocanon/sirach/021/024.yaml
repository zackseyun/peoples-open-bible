translation:
  language: es
  text: Es falta de disciplina en un hombre escuchar junto a una puerta[a], pero el hombre prudente será agobiado por la deshonra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «escuchar junto a una puerta»; la expresión sugiere escuchar a escondidas, pero sin explicitarlo en el texto principal.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπαιδευσία
  english_pob_choice: lack of discipline
  chosen_spanish: falta de disciplina
  alternatives_spanish:
  - indisciplina
  - falta de formación
  - grosería
  lexicon: LSJ
  rationale: ἀπαιδευσία expresa ausencia de formación o disciplina con matiz moral-social. «Falta de disciplina» conserva ese valor sin volverlo demasiado abstracto o técnico.
- source_word: ἀνθρώπου
  english_pob_choice: a man's
  chosen_spanish: de un hombre
  alternatives_spanish:
  - de un ser humano
  - de una persona
  lexicon: LSJ
  rationale: El genitivo singular masculino se mantiene de forma directa. «De un hombre» preserva la referencia gramatical del griego sin neutralizarla innecesariamente.
- source_word: ἀκροᾶσθαι
  english_pob_choice: to listen
  chosen_spanish: escuchar
  alternatives_spanish:
  - oír
  - ponerse a escuchar
  lexicon: LSJ
  rationale: El infinitivo significa escuchar/oir; en el contexto de «junto a una puerta» implica oír a escondidas, pero el griego dice literalmente «escuchar». «Escuchar» mantiene la literalidad base.
- source_word: παρὰ θύραν
  english_pob_choice: at a door
  chosen_spanish: a una puerta
  alternatives_spanish:
  - junto a una puerta
  - ante una puerta
  lexicon: LSJ
  rationale: παρά con acusativo indica cercanía o posición junto a algo. «A una puerta» suena natural en español y conserva la escena de estar colocado en la puerta ajena.
- source_word: φρόνιμος
  english_pob_choice: prudent man
  chosen_spanish: hombre prudente
  alternatives_spanish:
  - hombre sensato
  - hombre sabio
  lexicon: LSJ
  rationale: φρόνιμος apunta a prudencia práctica y buen juicio. «Prudente» es el equivalente más fiel y equilibrado frente al contraste con la conducta impropia del primer miembro.
- source_word: βαρυνθήσεται
  english_pob_choice: will be burdened
  chosen_spanish: será agobiado
  alternatives_spanish:
  - será cargado
  - será pesado
  - se verá agobiado
  lexicon: LSJ
  rationale: El futuro pasivo literalmente expresa ser hecho pesado o cargado. «Será agobiado» comunica de modo natural la carga de la deshonra, conservando la metáfora de pesadez.
- source_word: ἀτιμίᾳ
  english_pob_choice: by disgrace
  chosen_spanish: por la deshonra
  alternatives_spanish:
  - por la vergüenza
  - por el deshonor
  lexicon: LSJ
  rationale: 'El dativo expresa causa o medio: la persona prudente queda cargada a causa de la deshonra. «Deshonra» encaja con el registro social-moral del versículo y evita una abstracción excesiva.'
translation_notes:
  revision_awareness: El texto español sigue la revisión más reciente del POB inglés al preferir una formulación natural para βαρυνθήσεται («será agobiado/burdened») en vez de una más mecánica. También conserva la literalidad de ἀκροᾶσθαι con una nota que explica la implicación contextual de escuchar a escondidas.
  spanish_consistency_notes:
  - Se mantiene «hombre» para ἀνθρώπου conforme al valor gramatical masculino singular del griego.
  - Se evita «Señor»/«Cristo» porque no aparecen en este pasaje.
  - La metáfora de pesadez en βαρυνθήσεται se hace natural en español con «agobiado», sin perder el sentido de carga moral.
  - El orden de la oración sigue de cerca el griego y el inglés auditado para conservar el paralelismo entre la conducta impropia y la reacción del prudente.
