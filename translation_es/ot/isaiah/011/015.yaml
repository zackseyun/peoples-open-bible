revisions:
- from: Yahvé destruirá por completo la lengua del mar de Egipto[a], y agitará su mano sobre el Río con el ardor de su viento[c]; lo golpeará en siete corrientes[b], y hará que se camine por allí con sandalias.
  to: Yahvé destruirá por completo la lengua del mar de Egipto[a], y agitará su mano sobre el Río con el ardor de su viento[c]; lo golpeará en siete corrientes[b], y hará pasar con sandalias.
  rationale: Se reemplaza «hará que se camine por allí» por «hará pasar con sandalias» para expresar con más naturalidad en español el causativo de וְהִדְרִיךְ y el resultado concreto del paso a través del río dividido, sin añadir una paráfrasis innecesaria. Se mantienen las demás decisiones léxicas y las notas del POB.
