base_translation:
  language: en
  yaml_path: translation/ot/leviticus/020/023.yaml
  text: And you shall not walk in the statutes of the nation that I am driving out before you[a], because they did all these things[c][b], and I loathed them.
  footnotes:
  - marker: a
    text: Or 'customs' for 'statutes'; the Hebrew term can denote prescribed practices or fixed ordinances.
    reason: lexical_alternative
  - marker: b
    text: Literally 'sending away from before you'; here the sense is expelling or driving out.
    reason: lexical_alternative
  - marker: c
    text: Or 'I abhorred them.'
    reason: lexical_alternative
