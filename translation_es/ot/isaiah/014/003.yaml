revisions:
- from: Y será[a], en el día en que Yahvé te dé descanso de tu dolor y de tu agitación, y de la dura servidumbre[b] con que fuiste hecho servir.
  to: Y será, en el día en que Yahvé te dé descanso de tu dolor[a] y de tu agitación, y del duro servicio con la que se te hizo servir[b].
  rationale: Se ajusta «servidumbre» a «duro servicio» para seguir más de cerca la decisión léxica auditada y evitar sobreinterpretación. Se reemplaza «fuiste hecho servir» por «se te hizo servir» para un español más natural sin perder el sentido coercitivo pasivo. También se corrige la nota [a] para reflejar la alternativa léxica documentada en inglés.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:28:43Z'
