    text: O, «el que tenía mucho no tuvo exceso, y el que tenía poco no careció de nada».
    reason: lexical_alternative
  revision_rationale: 'El texto solo necesita un ajuste menor para mejorar la naturalidad y precisión del español: cambiar «por el omer» a «con el ómer» y normalizar la grafía de la medida. También se afina la nota alternativa para reflejar mejor la opción léxica documentada en inglés sin introducir un aspecto verbal menos preciso.'
