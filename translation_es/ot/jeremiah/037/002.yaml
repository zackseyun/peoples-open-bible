translation:
  language: es
  text: Pero él, sus servidores y el pueblo de la tierra[b] no escucharon[a] las palabras de Yahvé, que habló por medio de Jeremías el profeta[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'no obedecieron'. El verbo hebreo puede significar 'oír', 'escuchar' o, por implicación, 'obedecer'.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: ''el pueblo de la tierra'', una expresión que puede referirse en general a la población o al común del pueblo.'
    reason: cultural_note
  - marker: c
    text: Literalmente, 'por la mano de Jeremías el profeta'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/לֹא שָׁמַע
  english_pob_choice: did not listen to
  chosen_spanish: no escucharon
  alternatives_spanish:
  - no obedecieron
  - no oyeron
  lexicon: HALOT
  rationale: שׁמע puede expresar oír, escuchar o incluso obedecer. En este contexto, con el objeto 'las palabras de Yahvé' y una negativa profética, 'no escucharon' conserva el modismo auditivo y deja abierta la fuerza de desoír con posible implicación de desobediencia, sin imponerla en el texto principal.
- source_word: וַ/עֲבָדָיו
  english_pob_choice: his servants
  chosen_spanish: sus servidores
  alternatives_spanish:
  - sus siervos
  - sus oficiales
  lexicon: HALOT
  rationale: En el contexto real/cortesano, עֲבָדִים puede referirse a servidores de corte u কর্মকর্তarios. 'Servidores' es amplio y natural en español; 'oficiales' sería más interpretativo, y 'siervos' puede sonar más marcado teológicamente o devocionalmente.
- source_word: וְ/עַם הָ/אָרֶץ
  english_pob_choice: the people of the land
  chosen_spanish: el pueblo de la tierra
  alternatives_spanish:
  - la gente de la tierra
  - la población del país
  lexicon: HALOT
  rationale: Se conserva la expresión hebrea transparente 'el pueblo de la tierra' para no borrar el giro idiomático. La nota puede aclarar que se trata de la población general o del común del pueblo, según el contexto.
- source_word: דִּבְרֵי יְהוָה
  english_pob_choice: the words of Yahweh
  chosen_spanish: las palabras de Yahvé
  alternatives_spanish:
  - la palabra de Yahvé
  - los mensajes de Yahvé
  lexicon: HALOT
  rationale: El plural constructo דִּבְרֵי se refleja mejor con 'las palabras', no con un singular abstracto. Se mantiene 'Yahvé' conforme al criterio del proyecto para יְהוָה.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - el SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue la decisión doctrinal del proyecto: traducir el Tetragrámaton como ''Yahvé'' en el texto principal, preservando el nombre divino personal en lugar de sustituirlo por un título.'
- source_word: אֲשֶׁר דִּבֶּר
  english_pob_choice: that he spoke
  chosen_spanish: que él habló
  alternatives_spanish:
  - que había hablado
  - que pronunció
  lexicon: HALOT
  rationale: La cláusula relativa modifica directamente a 'las palabras de Yahvé'. 'Que él habló' es natural en español y mantiene como sujeto a Yahvé, sin introducir una temporalidad más fuerte que la hebrea no exige.
- source_word: בְּ/יַד
  english_pob_choice: through
  chosen_spanish: por medio de
  alternatives_spanish:
  - por la mano de
  - mediante
  lexicon: HALOT
  rationale: La expresión hebrea 'por la mano de' es un idiomático de mediación/instrumentalidad. 'Por medio de' comunica con claridad esa agencia profética en español contemporáneo sin perder fidelidad al giro semítico.
- source_word: יִרְמְיָהוּ הַ/נָּבִיא
  english_pob_choice: Jeremiah the prophet
  chosen_spanish: Jeremías el profeta
  alternatives_spanish:
  - el profeta Jeremías
  - Jeremías, el profeta
  lexicon: HALOT
  rationale: Se sigue el orden hebreo y la costumbre española natural para nombres con aposición. 'El profeta' conserva la identificación vocativa/funcional del mensajero.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: El texto hebreo contiene explícitamente el Tetragrámaton. El español adopta 'Yahvé' como forma principal para preservar el nombre revelado de Dios, en continuidad con la política del proyecto y sin recurrir a la sustitución tradicional por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor de שָׁמַע en contexto profético
  english_pob_reading: did not listen to
  chosen_spanish_reading: no escucharon
  alternative_spanish_readings:
  - no obedecieron
  - no oyeron
  rationale: La negativa se refiere a la respuesta debida a las palabras de Yahvé. En español, 'no escucharon' mantiene el campo semántico del oído/atención y permite la implicación de desobediencia sin convertirla en el único sentido explícito del verso.
  doctrine_reference: Principio de fidelidad semántica en verbos de audición/obediencia
- issue: עַם הָאָרֶץ como expresión cultural
  english_pob_reading: the people of the land
  chosen_spanish_reading: el pueblo de la tierra
  alternative_spanish_readings:
  - la gente de la tierra
  - el común del pueblo
  rationale: Se conserva la frase hebrea para no aplanar su valor cultural e histórico. La ambigüedad se deja visible porque el hebreo puede apuntar al conjunto de la población, sin imponer una precisión social no explicitada en el verso.
  doctrine_reference: Principio de preservación de expresiones culturales del hebreo
- issue: בְּיַד como mediación profética
  english_pob_reading: through Jeremiah the prophet
  chosen_spanish_reading: por medio de Jeremías el profeta
  alternative_spanish_readings:
  - por la mano de Jeremías el profeta
  - mediante Jeremías el profeta
  rationale: La expresión hebrea literalmente dice 'por la mano de', pero el sentido es mediación profética. 'Por medio de' es idiomático en español y conserva la función de Jeremías como canal del mensaje divino.
  doctrine_reference: Principio de equivalencia óptima para idioms semíticos
translation_notes:
  revision_awareness: 'El texto español sigue de cerca el audit trail inglés sin depender mecánicamente de él: conserva el orden y la fuerza del hebreo, mantiene la expresión cultural ''el pueblo de la tierra'', y refleja la mediación idiomática de בְּיַד con una locución natural en español. No se observaron revisiones posteriores que alteren la lectura base.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' de manera consistente para יְהוָה, conforme al estándar del proyecto.
  - Se mantiene 'el pueblo de la tierra' como expresión transparente; la nota aclara su alcance sin sustituirla por una paráfrasis.
  - '''No escucharon'' preserva la tensión semántica entre oír, atender y obedecer, en línea con el POB inglés.'
  - '''Por medio de'' traduce la mediación de בְּיַד sin calco innecesario.'
  - La aposición 'Jeremías el profeta' sigue el patrón español natural y el orden hebreo de forma inteligible.
