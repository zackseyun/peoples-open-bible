translation:
  language: es
  text: Tú escogiste esta casa para que tu nombre fuera llamado sobre ella[a], para ser una casa de oración y de petición para tu pueblo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «para llevar tu nombre», o «para que tu nombre fuera invocado sobre ella». El griego usa una fórmula bíblica que expresa que la casa pertenece a Dios y está bajo su nombre.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξελέξω
  english_pob_choice: you chose
  chosen_spanish: escogiste
  alternatives_spanish:
  - eligiste
  - seleccionaste
  lexicon: LSJ
  rationale: El aoristo medio de ἐκλέγω expresa una elección deliberada. «Escogiste» conserva ese sentido con español natural y digno, sin introducir tecnicismo ni suavizar la acción divina.
- source_word: τὸν οἶκον τοῦτον
  english_pob_choice: this house
  chosen_spanish: esta casa
  alternatives_spanish:
  - este templo
  - este edificio
  lexicon: LSJ
  rationale: «Casa» mantiene el idiomario bíblico del griego οἶκος y deja que el contexto de oración y nombre divino identifique el lugar sagrado, tal como hace la traducción inglesa auditada.
- source_word: ἐπικληθῆναι τὸ ὄνομά σου ἐπ’ αὐτόν
  english_pob_choice: for your name to be called upon it
  chosen_spanish: para que tu nombre fuera invocado sobre ella
  alternatives_spanish:
  - para que tu nombre fuera llamado sobre ella
  - para llevar tu nombre
  lexicon: LSJ
  rationale: La fórmula griega es una expresión bíblica de pertenencia y consagración. «Fuera invocado sobre ella» conserva el valor cultual y evita reducir el giro a una simple posesión nominal.
- source_word: εἶναι
  english_pob_choice: to be
  chosen_spanish: para ser
  alternatives_spanish:
  - para que sea
  - a fin de ser
  lexicon: LSJ
  rationale: El infinitivo de propósito se vierte de modo natural como «para ser», manteniendo la continuidad sintáctica del texto fuente.
- source_word: οἶκον προσευχῆς
  english_pob_choice: a house of prayer
  chosen_spanish: una casa de oración
  alternatives_spanish:
  - una casa para la oración
  lexicon: LSJ
  rationale: «Casa de oración» reproduce el giro establecido por la tradición bíblica y corresponde fielmente al genitivo de finalidad o cualidad.
- source_word: καὶ δεήσεως
  english_pob_choice: and petition
  chosen_spanish: y de petición
  alternatives_spanish:
  - y de súplica
  - y de ruego
  lexicon: LSJ
  rationale: δέησις denota una petición urgente o súplica. «Petición» distingue este término de προσευχή («oración») sin cargar la frase con un registro arcaico.
- source_word: τῷ λαῷ σου
  english_pob_choice: for your people
  chosen_spanish: para tu pueblo
  alternatives_spanish:
  - en favor de tu pueblo
  - para el bien de tu pueblo
  lexicon: LSJ
  rationale: El dativo se entiende naturalmente como referencia o beneficio. «Para tu pueblo» mantiene claridad y se ajusta al sentido funcional del templo como lugar al servicio del pueblo de Dios.
theological_decisions:
- issue: Fórmula del nombre divino sobre el templo
  english_pob_reading: for your name to be called upon it
  chosen_spanish_reading: para que tu nombre fuera invocado sobre ella
  alternative_spanish_readings:
  - para que tu nombre fuera llamado sobre ella
  - para llevar tu nombre
  rationale: La frase conserva la fórmula bíblica de asociación del nombre de Dios con el santuario. «Invocado sobre ella» mantiene la carga cultual y de pertenencia sin convertir el texto en una paráfrasis explicativa.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: El texto griego y el contexto auditado en inglés muestran alta concordancia; no se documentaron revisiones sustantivas, así que la redacción española sigue de cerca la sintaxis y las decisiones léxicas ya validadas.
  spanish_consistency_notes:
  - Se mantiene «casa» en vez de «templo» para conservar el idiomario οἶκος y la fórmula bíblica del nombre.
  - Se usa «oración» y «petición» para distinguir προσευχή y δέησις, respetando la tensión léxica del original.
  - El nombre divino no aparece aquí como יהוה, así que no se introduce «Yahvé» en el texto principal.
