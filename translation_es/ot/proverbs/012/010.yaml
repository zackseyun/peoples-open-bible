translation:
  language: es
  text: El justo conoce[a] las necesidades de su animal, pero la compasión de los malvados es cruel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «conoce la vida de su animal». El hebreo dice literalmente «conoce la vida/alma de su animal», expresando una atención cuidadosa a su bienestar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יוֹדֵעַ
  english_pob_choice: knows
  chosen_spanish: conoce
  alternatives_spanish:
  - sabe
  - reconoce
  lexicon: HALOT
  rationale: El participio de ידע expresa conocer/saber con alcance relacional y atento. «Conoce» conserva el núcleo léxico y sugiere una relación de cuidado sin convertir el verbo en una paráfrasis explicativa.
- source_word: צַדִּיק
  english_pob_choice: a righteous man
  chosen_spanish: el justo
  alternatives_spanish:
  - un hombre justo
  - la persona justa
  lexicon: HALOT
  rationale: En español, «el justo» mantiene el valor sustantivado proverbial del hebreo y suena natural en este tipo de sentencia. Evita forzar una perífrasis y conserva la referencia genérica masculina del original.
- source_word: נֶפֶשׁ
  english_pob_choice: the life
  chosen_spanish: la vida
  alternatives_spanish:
  - el alma
  - la necesidad
  - la vida/su ser
  lexicon: HALOT
  rationale: נֶפֶשׁ aquí remite a la vida o al ser vivo del animal, y «la vida» es la opción más literal y menos interpretativa en español. «El alma» podría sonar antropológico o teológicamente desviado en este contexto.
- source_word: בְּהֶמְתּוֹ
  english_pob_choice: his animal
  chosen_spanish: su animal
  alternatives_spanish:
  - su bestia
  - su ganado
  - su animal doméstico
  lexicon: HALOT
  rationale: «Su animal» reproduce la amplitud del término sin restringirlo indebidamente a ganado o bovinos. También refleja bien el alcance de un animal bajo el cuidado del justo.
- source_word: רַחֲמֵי
  english_pob_choice: the compassion
  chosen_spanish: la compasión
  alternatives_spanish:
  - las misericordias
  - la piedad
  - la ternura
  lexicon: HALOT
  rationale: El constructo plural de רחם expresa compasión/entrañas de misericordia. «La compasión» comunica con claridad el valor emocional y ético del término en español moderno.
- source_word: רְשָׁעִים
  english_pob_choice: the wicked
  chosen_spanish: de los malvados
  alternatives_spanish:
  - de los impíos
  - de los perversos
  - de los malos
  lexicon: HALOT
  rationale: «Malvados» es una equivalencia natural y fuerte para רְשָׁעִים. Preserva el juicio moral del hebreo sin adoptar un registro eclesiástico más rígido que podría sonar menos directo.
- source_word: אַכְזָרִי
  english_pob_choice: cruel
  chosen_spanish: cruel
  alternatives_spanish:
  - sin misericordia
  - duro
  - despiadado
  lexicon: HALOT
  rationale: '«Cruel» es el equivalente más directo y enérgico de אַכְזָרִי. Mantiene el contraste irónico del proverbio: aun la compasión de los malvados termina siendo crueldad.'
theological_decisions:
- issue: Render of the first colon as a generic masculine singular subject
  english_pob_reading: a righteous man knows...
  chosen_spanish_reading: el justo conoce...
  alternative_spanish_readings:
  - un justo conoce...
  - la persona justa conoce...
  - los justos conocen...
  rationale: El hebreo está en masculino singular y funciona genéricamente en sabiduría proverbial. «El justo» preserva esa forma sin neutralizarla, en coherencia con la política de precisión de género del proyecto.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over gender-neutral)
translation_notes:
  revision_awareness: Se tuvo en cuenta el texto hebreo de WLC, la tabla morfológica y el audit trail en inglés. No se requirieron revisiones recientes; la decisión principal fue mantener la literalidad controlada de נֶפֶשׁ como «vida» y la genericidad masculina de צַדִּיק sin perder naturalidad en español.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el contexto lo requiera; aquí no aparece el nombre divino.
  - Se mantiene «justo» como sustantivo proverbial, coherente con el uso bíblico en español.
  - Se evita «alma» para נֶפֶשׁ porque en español modernamente puede inducir una lectura demasiado espiritualizada para un animal.
  - La alternancia entre singular genérico y sentido inclusivo se conserva en la línea final sin añadir elementos no presentes en el hebreo.
