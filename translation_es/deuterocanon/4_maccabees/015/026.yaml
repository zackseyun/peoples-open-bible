translation:
  language: es
  text: una madre que sostiene dos votos[a] en favor de sus hijos, uno mortal y otro que salva,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'dos votos' o, más literalmente, 'dos piedrecillas', porque ψῆφος se refería originalmente a una piedra usada para votar.
    reason: lexical_alternative
lexical_decisions:
- source_word: δύο
  english_pob_choice: two
  chosen_spanish: dos
  alternatives_spanish:
  - ambos
  lexicon: uso común / cardinal
  rationale: El numeral griego es directo; en español conviene conservar la cifra explícita para mantener la simetría del contraste que sigue.
- source_word: ψήφους
  english_pob_choice: votes
  chosen_spanish: votos
  alternatives_spanish:
  - piedras
  - bolas
  - boletas
  lexicon: LSJ
  rationale: ψῆφος puede referirse a una piedrita usada para votar y, por extensión, a un voto. 'Votos' conserva la imagen decisiva y funciona con naturalidad en español; la alternativa material queda explicada en nota.
- source_word: κρατοῦσα
  english_pob_choice: holding
  chosen_spanish: que sostiene
  alternatives_spanish:
  - que tiene
  - que lleva
  lexicon: LSJ
  rationale: El participio presente describe a la madre como quien tiene/sostiene estas dos ψῆφοι. 'Sostiene' mantiene la concreción sin sonar forzado.
- source_word: μήτηρ
  english_pob_choice: a mother
  chosen_spanish: una madre
  alternatives_spanish:
  - madre
  lexicon: LSJ
  rationale: El sustantivo anartro funciona bien en español con artículo indefinido; preserva el énfasis en la figura materna sin alterar el matiz predicativo.
- source_word: θανατηφόρον
  english_pob_choice: deadly
  chosen_spanish: mortal
  alternatives_spanish:
  - mortalmente dañino
  - mortífero
  - que trae muerte
  lexicon: LSJ
  rationale: El adjetivo significa 'que causa muerte'. 'Mortal' es natural en español y conserva el contraste directo con el término siguiente.
- source_word: σωτήριον
  english_pob_choice: saving
  chosen_spanish: salvador
  alternatives_spanish:
  - que salva
  - salvífico
  - salvadoro
  lexicon: LSJ
  rationale: El adjetivo indica algo que salva o preserva. 'Salvador' es breve y claro en español; evita sobrecargar el verso con terminología doctrinal que no aparece explícitamente aquí.
- source_word: ὑπὲρ τέκνων
  english_pob_choice: on behalf of her children
  chosen_spanish: en favor de sus hijos
  alternatives_spanish:
  - por sus hijos
  - a favor de sus hijos
  - en nombre de sus hijos
  lexicon: LSJ
  rationale: ὑπέρ aquí expresa relación/beneficio respecto de los hijos. 'En favor de' conserva el valor de representación y ventaja sin volverlo demasiado interpretativo.
theological_decisions:
- issue: Cómo renderizar σωτήριον en un contexto de contraste muerte/vida
  english_pob_reading: bringing deliverance / saving
  chosen_spanish_reading: salvador
  alternative_spanish_readings:
  - que salva
  - salvífico
  - que trae salvación
  rationale: En este contexto la oposición inmediata es con 'mortal'; 'salvador' mantiene el paralelismo adjetival y no introduce un desarrollo doctrinal más amplio de lo que el griego expresa en la cláusula.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Valor de ψῆφος como objeto material de voto o como voto mismo
  english_pob_reading: votes / pebbles
  chosen_spanish_reading: votos
  alternative_spanish_readings:
  - piedras de voto
  - piedrecillas
  - boletas
  rationale: La metáfora subyacente conserva mejor su fuerza si el texto principal usa el sentido extendido 'votos'; la nota preserva la alternativa material documentada por el griego y por el audit trail inglés.
  doctrine_reference: Translation philosophy §2, §5
translation_notes:
  revision_awareness: 'El audit trail inglés muestra una revisión desde ''ballots'' a ''votes'' y una simplificación de ''bringing death/deliverance'' a ''deadly/saving''. La versión española sigue esa decisión más reciente: usa ''votos'' y un par adjetival breve (''mortal'' / ''salvador'') para reflejar de cerca θανατηφόρον ... καὶ σωτήριον.'
  spanish_consistency_notes:
  - Se mantiene 'votos' en el texto principal por consistencia con la revisión inglesa más reciente y con el valor extendido de ψῆφος.
  - '''En favor de'' reproduce adecuadamente ὑπέρ con matiz de beneficio/representación, sin convertirlo en una explicación interpretativa.'
  - El adjetivo 'salvador' se usa aquí como cualidad de lo que salva, no como título cristológico; el contexto lo permite y evita introducir lenguaje doctrinal ajeno.
