translation:
  language: es
  text: Cántico de las subidas[a]. De David. ¡He aquí[c], cuán bueno y cuán agradable es cuando los hermanos[b] habitan juntos!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Cántico de ascensos». La expresión también se ha entendido como un cántico relacionado con las subidas o peregrinaciones.
    reason: lexical_alternative
  - marker: b
    text: O «parientes». «Hermanos» puede referirse a hermanos literales o, más ampliamente, a miembros de la comunidad del pacto.
    reason: lexical_alternative
  - marker: c
    text: O «Miren» o «Vean».
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁיר הַמַּעֲלוֹת
  english_pob_choice: A Song of Ascents
  chosen_spanish: Cántico de ascensos
  alternatives_spanish:
  - Cántico de subidas
  - Cántico de peregrinación
  lexicon: HALOT
  rationale: La expresión hebrea es una fórmula técnica de los Salmos 120–134. "Ascensos" conserva el sustantivo מַעֲלוֹת de manera formal y transparente; "peregrinación" interpreta el trasfondo, y "subidas" suena menos natural en español bíblico.
- source_word: לְדָוִד
  english_pob_choice: Of David
  chosen_spanish: De David
  alternatives_spanish:
  - Por David
  - Para David
  lexicon: HALOT
  rationale: El לְ en los sobrescritos de los salmos puede señalar autoría, pertenencia o dedicación. "De David" mantiene esa ambigüedad mejor que resolverla hacia autoría o destino específico.
- source_word: הִנֵּה
  english_pob_choice: Behold
  chosen_spanish: He aquí
  alternatives_spanish:
  - Miren
  - Vean
  lexicon: HALOT
  rationale: Es una partícula de atención y admiración. "He aquí" conserva el tono elevado del hebreo sin volverlo demasiado explicativo.
- source_word: מַה טּוֹב
  english_pob_choice: how good
  chosen_spanish: cuán bueno
  alternatives_spanish:
  - qué bueno
  - qué tan bueno
  lexicon: HALOT
  rationale: El exclamativo מַה con adjetivo se expresa con naturalidad en español como "cuán bueno" o "qué bueno". Se prefiere "cuán" por su tono más poético y formal.
- source_word: וּמַה נָּעִים
  english_pob_choice: and how pleasant
  chosen_spanish: y cuán agradable
  alternatives_spanish:
  - y cuán delicioso
  - y cuán placentero
  lexicon: HALOT
  rationale: נָעִים expresa lo agradable, deleitoso o placentero. "Agradable" es una equivalencia clara y sobria; "delicioso" sería más marcado y "placentero" menos natural en este registro.
- source_word: שֶׁבֶת
  english_pob_choice: when ... dwell
  chosen_spanish: que los hermanos habiten
  alternatives_spanish:
  - cuando los hermanos habitan
  - el habitar de los hermanos
  lexicon: HALOT
  rationale: El infinitivo constructo comunica la acción/estado de morar. En español, una cláusula con "que ... habiten" permite un sintagma fluido y mantiene el valor verbal sin nominalizarlo en exceso.
- source_word: אַחִים
  english_pob_choice: brothers
  chosen_spanish: los hermanos
  alternatives_spanish:
  - los parientes
  - los miembros de la comunidad
  lexicon: HALOT
  rationale: Se conserva "hermanos" como equivalente principal del plural masculino hebreo. El término puede abarcar hermanos literales o, más ampliamente, miembros de la comunidad del pacto; esa amplitud no se borra en el texto base.
- source_word: גַּם יָחַד
  english_pob_choice: together
  chosen_spanish: juntos
  alternatives_spanish:
  - en unidad
  - a la vez
  lexicon: HALOT
  rationale: La revisión inglesa reciente optó por "together" para reflejar más directamente יָחַד y evitar expansión interpretativa. En español, "juntos" reproduce bien ese valor de convivencia compartida sin añadir la noción explícita de "unidad".
theological_decisions:
- issue: Alcance de אַחִים ('brothers')
  english_pob_reading: Retain 'brothers' in the main text while allowing that the psalm may speak more broadly of covenant kin/community.
  chosen_spanish_reading: Mantener "hermanos" en el texto principal, dejando abierta la posible referencia más amplia a la familia del pacto o comunidad.
  alternative_spanish_readings:
  - '"parientes"'
  - '"miembros de la comunidad"'
  - '"hermanos y hermanas"'
  rationale: El hebreo es masculino plural y puede referirse tanto a hermanos literales como a la comunidad del pacto. En español, "hermanos" conserva la correspondencia lexical y evita neutralizar el plural masculino sin base textual suficiente; el sentido amplio puede anotarse sin alterar el versículo.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
- issue: Fuerza de גַּם יָחַד
  english_pob_reading: Render as 'together'
  chosen_spanish_reading: Renderizar como "juntos"
  alternative_spanish_readings:
  - '"en unidad"'
  - '"juntos, sí"'
  rationale: La pareja hebrea intensifica la idea de convivencia compartida. La revisión inglesa descartó "in unity" por ser interpretativa; "juntos" mantiene la relación semántica directa con יָחַד sin introducir un concepto doctrinal adicional.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 1 and point 6
translation_notes:
  revision_awareness: Tomé en cuenta la revisión más reciente del inglés POB, que ajustó la clausula final de “in unity” a “together” para reflejar con mayor cercanía יחד y evitar expansión interpretativa. En español, por eso se eligió “juntos” y no “en unidad”.
  spanish_consistency_notes:
  - Se conservó el registro poético breve del sobrescrito y del exclamativo hebreo.
  - '"Cántico de ascensos" sigue la terminología técnica del ciclo de salmos sin interpretar el trasfondo.'
  - '"He aquí" mantiene el tono solemne del hebreo y permite la nota alternativa "Miren".'
  - Se evitó "SEÑOR" porque este versículo no contiene el Tetragrámaton ni una cita directa de κύριος.
  - '"Juntos" refleja la clausula final sin sobrerrepresentar la intensificación semántica.'
