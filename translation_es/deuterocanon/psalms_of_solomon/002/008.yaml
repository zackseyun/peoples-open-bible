revisions:
- from: Porque apartó su rostro de la misericordia hacia ellos[a] —joven y anciano y sus hijos[b], de una vez.
  to: Porque apartó su rostro de mostrarles misericordia[a]—joven y anciano y sus hijos[b], todos a la vez.
  rationale: La revisión mantiene la imagen concreta del original («apartó su rostro») pero reemplaza un calco poco natural por «de mostrarles misericordia», que expresa claramente el sentido comprimido de ἀπὸ ἐλέους αὐτῶν en español. También cambia «de una vez» por «todos a la vez» para reflejar mejor εἰς ἅπαξ, y ajusta la puntuación según uso español.
