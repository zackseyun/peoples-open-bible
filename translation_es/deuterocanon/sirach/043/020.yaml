base_translation:
  language: en
  yaml_path: translation/deuterocanon/sirach/043/020.yaml
  text: The cold of the north wind returns[a]; and like frost it freezes its watersource. Over every standing body of water it settles[b], and the pool puts on armor like a breastplate.
  footnotes:
  - marker: a
    text: Hebrew reads 'like rot, it freezes its spring,' a difficult image. The Greek parallel reads more straightforwardly, 'ice/crystal freezes from water.' The main text follows the Hebrew as primary for Sirach where extant, while preserving the Greek sense here.
    reason: alternative_reading
  - marker: b
    text: The Hebrew wording in the clause rendered 'over every standing body of water it settles' is textually difficult. The Greek parallel supports the sense of ice settling over every gathered body of water.
    reason: textual_variant
