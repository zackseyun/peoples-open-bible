    issue: '''mezclado'' debilita la fuerza de מָהוּל'
    rationale: El hebreo y la decisión inglesa auditada subrayan la idea de bebida rebajada/adulterada. 'Mezclado' puede describir una mezcla neutral; 'diluido' preserva mejor el matiz negativo y la correspondencia con 'diluted'.
  - severity: low
