translation:
  language: es
  text: Y yo mismo pelearé contra ustedes con una mano extendida y un brazo fuerte[a], y con enojo y furor y gran ira[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Expresión hebrea fija de acción poderosa de Dios; en contextos del éxodo suele referirse a liberación, pero aquí se orienta al juicio.
    reason: cross_reference
  - marker: b
    text: O «gran furor» para «gran ira».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנִלְחַמְתִּי
  english_pob_choice: And ... will fight
  chosen_spanish: pelearé
  alternatives_spanish:
  - lucharé
  - combatiré
  lexicon: HALOT
  rationale: El verbo hebreo expresa acción hostil de combate. En español, «pelearé» comunica de forma natural y directa la oposición militar/judicial de Yahvé sin endurecer el texto con un calco innecesario.
- source_word: אֲנִי
  english_pob_choice: I myself
  chosen_spanish: yo mismo
  alternatives_spanish:
  - yo
  - yo, precisamente yo
  lexicon: HALOT
  rationale: El pronombre independiente refuerza la participación personal de Yahvé. «Yo mismo» conserva ese énfasis sin sonar forzado en español.
- source_word: אִתְּכֶם
  english_pob_choice: against you
  chosen_spanish: contra ustedes
  alternatives_spanish:
  - con ustedes
  lexicon: HALOT
  rationale: Aunque la preposición puede significar «con», con נלחם el sentido idiomático es hostil. «Contra ustedes» refleja la lectura contextual de juicio sobre el pueblo.
- source_word: בְּיָד נְטוּיָה
  english_pob_choice: with an outstretched hand
  chosen_spanish: con mano extendida
  alternatives_spanish:
  - con mano tendida
  - con mano alzada
  lexicon: HALOT
  rationale: La expresión es un antropomorfismo convencional de poder divino activo. «Mano extendida» preserva la imagen y su resonancia bíblica en español de manera clara y digna.
- source_word: וּבִזְרֹעַ חֲזָקָה
  english_pob_choice: and a strong arm
  chosen_spanish: y brazo fuerte
  alternatives_spanish:
  - y brazo poderoso
  - y brazo vigoroso
  lexicon: HALOT
  rationale: La construcción paralela pide mantener el paralelismo corporal. «Brazo fuerte» es literal, natural y suficientemente solemne.
- source_word: וּבְאַף
  english_pob_choice: and with anger
  chosen_spanish: y con enojo
  alternatives_spanish:
  - y con ira
  - y con indignación
  lexicon: HALOT
  rationale: אַף literalmente es «nariz», pero en uso idiomático denota ira/enojo. Aquí «enojo» diferencia este primer término del siguiente par de intensificación sin duplicar demasiado «ira».
- source_word: וּבְחֵמָה
  english_pob_choice: and wrath
  chosen_spanish: y furor
  alternatives_spanish:
  - y ira
  - y rabia
  lexicon: HALOT
  rationale: חֵמָה comunica calor ardiente y furia punitiva. «Furor» preserva esa intensidad en un registro bíblico serio y distingue el matiz del término anterior.
- source_word: וּבְקֶצֶף גָּדוֹל
  english_pob_choice: and great fury
  chosen_spanish: y gran ira
  alternatives_spanish:
  - y gran furor
  - y gran indignación
  lexicon: HALOT
  rationale: קֶצֶף es ira intensa, enfática. «Gran ira» retiene la culminación del trío y mantiene el ritmo acumulativo del hebreo. La alternativa «gran furor» también sería posible, pero aquí se evita repetir el mismo sustantivo del miembro anterior.
theological_decisions:
- issue: Lenguaje antropomórfico de la acción divina
  english_pob_reading: Retain 'outstretched hand' and 'strong arm' as metaphorical bodily imagery for God's direct power in judgment.
  chosen_spanish_reading: Conservar «mano extendida» y «brazo fuerte» como imágenes corporales metafóricas del poder directo de Yahvé en juicio.
  alternative_spanish_readings:
  - parafrasear como «con gran poder»
  - neutralizar la imagen corporal
  rationale: El hebreo usa deliberadamente un lenguaje encarnado que conecta con contextos de éxodo y juicio. Mantener la metáfora evita borrar la resonancia intertextual y no implica corporeidad literal.
  doctrine_reference: Principio de primacía del texto original; preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: El texto inglés revisado se mantuvo sin cambios sustanciales en la última pasada; el acuerdo de revisión fue alto y no se registraron problemas. La versión española sigue ese trazado y conserva la misma estructura semántica y retórica.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» implícito en la referencia narrativa del libro sin introducirlo en el versículo, porque el hebreo de esta línea no lo expresa explícitamente.
  - Se conservó la secuencia acumulativa de tres términos de ira para no diluir la intensificación retórica.
  - «Contra ustedes» refleja el valor idiomático hostil de אִתְּכֶם con נלחם, no una simple compañía.
