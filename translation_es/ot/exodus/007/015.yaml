revisions:
- from: Ve al faraón por la mañana[a]. Mira, él sale al agua, y te pondrás para recibirlo en la orilla del Nilo[b], y tomarás en tu mano la vara que fue تبدیل?
  to: Ve al faraón por la mañana. Mira, él sale al agua, y te pondrás para encontrarte con él en la orilla del Nilo[a], y tomarás en tu mano la vara que fue convertida en serpiente[b].
  rationale: Se corrige una corrupción textual grave al final del versículo, se reubican las notas al pie en los términos correctos ('Nilo' y 'serpiente'), y se ajusta 'recibirlo' a 'encontrarte con él' para reflejar mejor לִקְרָאתוֹ sin perder naturalidad en español.
