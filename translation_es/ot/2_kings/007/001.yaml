revisions:
- from: 'Entonces Eliseo dijo[a]: «Escuchen la palabra de Yahvé. Así dice Yahvé: Mañana, a esta misma hora, una medida[b] de flor de harina costará un siclo, y dos medidas de cebada costarán un siclo, en la puerta de Samaria».'
  to: 'Entonces Eliseo dijo: «Escuchen la palabra de Yahvé. Así dice Yahvé: Mañana, como a esta hora, una seá[a] de flor de harina será por un siclo, y dos seás de cebada por un siclo, a la puerta de Samaria».'
  rationale: Se revisa para alinearse con la decisión fuente/auditoría de conservar la unidad específica סְאָה en el texto principal ('seá'), se elimina una nota no esencial, se ajusta el tiempo a 'como a esta hora' para reflejar mejor כָּעֵת, y se usa 'por un siclo' para una formulación más cercana al hebreo y natural en español. Se mantiene 'flor de harina', 'Yahvé' y la cadencia profética del pasaje.
