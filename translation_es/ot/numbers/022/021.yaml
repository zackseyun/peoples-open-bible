translation:
  language: es
  text: Así que Balaam se levantó por la mañana, enalbardó su asna[a] y fue con los príncipes de Moab.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'su burra'. El hebreo nombra específicamente una asna, es decir, una hembra del asno.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקָם
  english_pob_choice: rose
  chosen_spanish: se levantó
  alternatives_spanish:
  - se alzó
  - se puso de pie
  lexicon: HALOT
  rationale: El valor narrativo simple de קום en secuencia se expresa naturalmente en español con 'se levantó', que conserva la acción sin añadir solemnidad innecesaria.
- source_word: בַּבֹּקֶר
  english_pob_choice: in the morning
  chosen_spanish: por la mañana
  alternatives_spanish:
  - en la mañana
  - temprano por la mañana
  lexicon: HALOT
  rationale: La expresión hebrea señala el tiempo de la acción; 'por la mañana' es fluido y fiel, sin intensificar a 'temprano' lo que el hebreo no explicita.
- source_word: וַיַּחֲבֹשׁ
  english_pob_choice: saddled
  chosen_spanish: enalbardó
  alternatives_spanish:
  - ensilló
  - preparó
  lexicon: HALOT
  rationale: חבש con un asna o burra puede referir la preparación para montar. En español, 'enalbardó' comunica esa preparación de manera más precisa que 'ensilló', ya que evita implicar estrictamente una silla de montar; mantiene la fuerza idiomática del verbo sin volverlo una paráfrasis vaga.
- source_word: אֶת אֲתֹנוֹ
  english_pob_choice: his donkey
  chosen_spanish: su burra
  alternatives_spanish:
  - su asna
  - su burra hembra
  lexicon: HALOT
  rationale: אֲתֹן designa específicamente una hembra del asno. 'Burra' es natural en español y conserva esa especificación sexual mejor que el genérico 'burro' o 'donkey'.
- source_word: וַיֵּלֶךְ
  english_pob_choice: went
  chosen_spanish: se fue
  alternatives_spanish:
  - fue
  - partió
  lexicon: HALOT
  rationale: El hebreo narra una acción de desplazamiento en continuidad; 'se fue' suena natural en español y conserva el matiz de partida mejor que un simple 'fue'.
- source_word: שָׂרֵי מוֹאָב
  english_pob_choice: the princes of Moab
  chosen_spanish: los príncipes de Moab
  alternatives_spanish:
  - los oficiales de Moab
  - los jefes de Moab
  lexicon: HALOT
  rationale: שָׂרִים puede abarcar gobernantes, funcionarios o príncipes. 'Príncipes' mantiene el rango elevado del grupo y coincide con la decisión inglesa documentada.
translation_notes:
  revision_awareness: El texto base en inglés y el expediente de revisión muestran un acuerdo alto y sin cambios aplicados; esta versión española sigue directamente el hebreo, usando el inglés POB solo como contexto auditado para decisiones léxicas, especialmente en el valor de חבש y en la especificación sexual de אֲתֹן.
  spanish_consistency_notes:
  - Se mantiene 'Moab' como topónimo transliterado.
  - Se evita 'Señor' o equivalentes teológicos porque el versículo no contiene el nombre divino.
  - '''Burra'' se usa como equivalente natural de una hembra del asno, con nota para la alternativa más literal.'
  - La puntuación reproduce una secuencia narrativa simple con coma antes de la conjunción final, en estilo bíblico legible en español.
