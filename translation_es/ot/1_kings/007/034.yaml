    text: Hebreo «hombros»; probablemente se refiere a salientes estructurales o piezas de soporte en las esquinas de la base móvil.
    reason: lexical_alternative
  revision_rationale: Se ajusta מְכֹנָה a «base móvil» para reflejar mejor la decisión auditada «stand» en este contexto técnico y evitar vaguedad; se conserva «soportes» para כְּתֵפוֹת y se añade la nota léxica sobre el literal «hombros».
