translation:
  language: es
  text: ¡Oh, tú que estás en armonía con la ley[a], y filósofo del modo de vida divino[b]!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en consonancia con la ley» o «de acuerdo con la ley». El griego usa un término de consonancia o armonía.
    reason: lexical_alternative
  - marker: b
    text: O «de la vida divina» o «de la vida piadosa». La expresión griega también puede entenderse como una vida caracterizada por la devoción a Dios.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὦ
  english_pob_choice: O
  chosen_spanish: ¡Oh,
  alternatives_spanish:
  - ¡O!
  - Oh
  lexicon: LSJ
  rationale: El vocativo griego introduce una alocución solemne; «Oh» conserva el tono elevado en español sin sonar demasiado arcaico. Se mantiene la fuerza retórica del llamado directo.
- source_word: σύμφωνε
  english_pob_choice: who are in harmony with
  chosen_spanish: que estás en armonía con
  alternatives_spanish:
  - que estás de acuerdo con
  - que eres concordante con
  - que estás en consonancia con
  lexicon: LSJ
  rationale: El adjetivo vocativo expresa concordancia o consonancia. «En armonía con» reproduce la metáfora musical/relacional señalada en la auditoría inglesa y suena natural en español.
- source_word: νόμου
  english_pob_choice: the law
  chosen_spanish: la ley
  alternatives_spanish:
  - la Ley
  lexicon: LSJ
  rationale: En este contexto judío, νόμος remite a la ley normativa de Dios/Israel. Se eligió «la ley» en minúscula para no introducir una mayúscula interpretativa no visible en el griego.
- source_word: φιλόσοφε
  english_pob_choice: a philosopher
  chosen_spanish: filósofo
  alternatives_spanish:
  - amante de la sabiduría
  - pensador
  lexicon: LSJ
  rationale: «Filósofo» es el equivalente directo y conserva el vocabulario helenístico explícito del libro. Mantiene la referencia al lenguaje filosófico sin suavizarla.
- source_word: θείου βίου
  english_pob_choice: of the divine way of life
  chosen_spanish: del camino de vida divino
  alternatives_spanish:
  - de la vida divina
  - del modo de vida divino
  - de la vida piadosa
  lexicon: LSJ
  rationale: βίος puede significar vida en el sentido de modo de vivir; la revisión inglesa prefirió «way of life». «Camino de vida» preserva esa amplitud en español sin reducirlo solo a «vida» biológica. «Divino» mantiene θείου sin confesar más de lo que el texto dice.
theological_decisions:
- issue: Cómo traducir θείου βίου sin perder su densidad ética y religiosa
  english_pob_reading: the divine way of life
  chosen_spanish_reading: el camino de vida divino
  alternative_spanish_readings:
  - la vida divina
  - el modo de vida divino
  - la vida piadosa
  rationale: La frase es compacta y retóricamente elevada. «Camino de vida» permite conservar el matiz de βίος como forma de vivir, mientras «divino» traduce θείου sin sustituirlo por una explicación devocional más interpretativa.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Si νόμου debe entenderse como la Ley mosaica con mayúscula
  english_pob_reading: the law
  chosen_spanish_reading: la ley
  alternative_spanish_readings:
  - la Ley
  rationale: Aunque el contexto remite probablemente a la ley ancestral/judía, el griego no marca una mayúscula titulada. Se conserva «la ley» para evitar una precisión editorial no obligada por el texto.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: La versión inglesa revisada pasó de «divine life» a «divine way of life» para reflejar con más naturalidad θείου βίου. La redacción española sigue esa revisión mediante «camino de vida divino», manteniendo el tono vocativo y la equivalencia semántica amplia de βίος.
  spanish_consistency_notes:
  - Se mantuvo «ley» en minúscula por consistencia con el criterio auditado de no capitalizar títulos no marcados en el original.
  - «Filósofo» se conserva por coherencia con la terminología helenística del pasaje y con la opción inglesa auditada.
  - 'La puntuación y el orden siguen el vocativo griego: exclamación inicial, luego doble apelación unida por ‘y’.'
