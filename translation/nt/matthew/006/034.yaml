  - hardship
  rationale: The verse addresses anxious concern about the future, and the concluding maxim explains that each day already has sufficient burden. Translating κακία as 'trouble' preserves the practical force of Jesus' teaching without importing a narrower moral category that would sound unnatural in English here.
