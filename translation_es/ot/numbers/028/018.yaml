lexical_decisions:
- source_word: בַּיּוֹם הָרִאשׁוֹן
  english_pob_choice: On the first day
  chosen_spanish: En el primer día
  alternatives_spanish:
  - El primer día
  - En el día primero
  lexicon: HALOT
  rationale: La expresión temporal se traduce de forma directa y natural en español. No se añade “de la fiesta” porque, aunque el contexto amplio lo presupone, no aparece explícitamente en este versículo.
- source_word: מִקְרָא קֹדֶשׁ
  english_pob_choice: a holy convocation
  chosen_spanish: una convocación santa
  alternatives_spanish:
  - una asamblea santa
  - una santa asamblea
  lexicon: HALOT
  rationale: Se conserva el sentido formal de una reunión convocada cultualmente. “Convocación” refleja bien el matiz de מִקְרָא como acto de convocar, y “santa” mantiene el carácter consagrado del término.
- source_word: כָּל ... לֹא תַעֲשׂוּ
  english_pob_choice: you shall do no
  chosen_spanish: no harán ningún
  alternatives_spanish:
  - no harán
  - no deben hacer
  lexicon: HALOT
  rationale: En español, la negación total se expresa con naturalidad como “no harán ningún...”. Esto preserva el valor absoluto del hebreo sin una construcción pesada.
- source_word: מְלֶאכֶת עֲבֹדָה
  english_pob_choice: regular work
  chosen_spanish: trabajo ordinario
  alternatives_spanish:
  - trabajo regular
  - labor de ocupación
  - trabajo servil
  lexicon: HALOT
  rationale: La expresión alude al trabajo cotidiano u ocupacional, no a toda actividad en general. “Ordinario” comunica bien esa categoría en español y evita la carga excesiva o arcaica de “servil”.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y el rastro auditado en inglés, pero ajusta el segundo miembro para que “מְלֶאכֶת עֲבֹדָה” quede como una prohibición natural en español (“trabajo ordinario”) y no como una traducción mecánica. Se mantiene la distinción cultual de מִקְרָא קֹדֶשׁ y la negación total de כָּל ... לֹא.
  spanish_consistency_notes:
  - Se usa “convocación” para mantener la relación con el acto de convocar implícito en מִקְרָא.
  - Se evita “SEÑOR” u այլ lenguaje de sustitución porque el versículo no contiene el nombre divino.
  - “Trabajo ordinario” busca reproducir la restricción de labor cotidiana/ocupacional indicada en el audit trail inglés.
  - La puntuación con punto y coma refleja bien la estructura bipartita del hebreo.
