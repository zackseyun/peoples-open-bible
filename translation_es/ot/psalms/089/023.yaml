translation:
  language: es
  text: Ningún enemigo exigirá tributo de él[a], ni un hijo de maldad[b] lo afligirá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, ‘Ningún enemigo lo engañará’ o ‘se impondrá sobre él’. El verbo hebreo puede tener varios sentidos relacionados; aquí se vierte conforme al contexto de opresión hostil.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: ‘hijo de maldad’, un modismo para una persona malvada o un malhechor.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יַשִּׁא
  english_pob_choice: will exact tribute
  chosen_spanish: impondrá tributo
  alternatives_spanish:
  - engañará
  - impondrá sobre él
  - oprimirá
  lexicon: HALOT
  rationale: En este contexto real y de protección, el verbo en hifil se entiende mejor como ejercer una exigencia o carga sobre alguien. ‘Impondrá tributo’ conserva la fuerza de presión económica/política que refleja la opción inglesa sin reducirla a simple engaño.
- source_word: אוֹיֵב
  english_pob_choice: enemy
  chosen_spanish: un enemigo
  alternatives_spanish:
  - un adversario
  - un foe
  lexicon: HALOT
  rationale: ‘Enemigo’ es la equivalencia clara y natural en español para el sustantivo singular y mantiene el tono militar/real del salmo.
- source_word: בּוֹ
  english_pob_choice: from him
  chosen_spanish: sobre él
  alternatives_spanish:
  - de él
  - contra él
  lexicon: HALOT
  rationale: Con ‘imponer tributo’, el complemento natural en español es ‘sobre él’; esto conserva la idea de una exacción dirigida al rey protegido, aunque el hebreo permita matices preposicionales según el sentido verbal.
- source_word: בֶן עַוְלָה
  english_pob_choice: son of wickedness
  chosen_spanish: un hijo de maldad
  alternatives_spanish:
  - un hombre malvado
  - un malhechor
  - un hijo de injusticia
  lexicon: HALOT
  rationale: Se preserva el hebraísmo transparente ‘hijo de…’ para mantener la forma poética y el paralelismo. ‘Maldad’ comunica bien el valor moral amplio de עַוְלָה en este contexto.
- source_word: עַוְלָה
  english_pob_choice: wickedness
  chosen_spanish: maldad
  alternatives_spanish:
  - injusticia
  - maldad moral
  - perversidad
  lexicon: HALOT
  rationale: Aunque el término puede abarcar injusticia o agravio, ‘maldad’ funciona bien en español para el paralelo poético y evita estrechar indebidamente el sentido.
- source_word: יְעַנֶּנּוּ
  english_pob_choice: will afflict him
  chosen_spanish: lo afligirá
  alternatives_spanish:
  - lo oprimirá
  - lo humillará
  - lo maltratará
  lexicon: HALOT
  rationale: ‘Afligir’ reproduce el valor amplio de ענה en piel y mantiene el paralelismo con la primera línea. En español es solemne y suficientemente general para la amenaza de hostilidad.
theological_decisions:
- issue: Identidad del protegido singular
  english_pob_reading: Retain the singular pronoun 'him' without interpretive expansion.
  chosen_spanish_reading: Mantener el pronombre singular ‘él/lo’ sin ampliar a ‘David’, ‘el rey davídico’ o ‘el Mesías’.
  alternative_spanish_readings:
  - David
  - el rey davídico
  - el Mesías
  rationale: El hebreo presenta una figura singular protegida en el marco del pacto; la traducción debe conservar esa referencia abierta sin resolverla en la línea principal.
  doctrine_reference: Preservar la tensión teológica y el alcance tipológico sin imponer una identificación adicional.
translation_notes:
  revision_awareness: Se corrigió la relación entre el texto y las notas para que cada marcador de nota aparezca exactamente en el lugar correspondiente del español y no quede ningún pie de nota sin ancla.
  spanish_consistency_notes:
  - Se conservó el tono poético y real del versículo.
  - Se prefirió ‘afligirá’ para mantener el paralelismo y la amplitud semántica del hebreo.
  - Se mantuvo el hebraísmo ‘hijo de maldad’ con nota explicativa, en lugar de suavizarlo a ‘malhechor’.
  - No se expandió la referencia del sujeto protegido en el texto principal.
