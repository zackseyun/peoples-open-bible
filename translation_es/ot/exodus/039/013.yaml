translation:
  language: es
  text: 'y la cuarta fila: berilo[a], ónice y jaspe, engastadas en engastes[b] de oro, en sus monturas.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La identificación precisa de varias gemas del pectoral del sumo sacerdote es incierta; "berilo", "ónice" y "jaspe" siguen equivalentes tradicionales comunes.
    reason: lexical_alternative
  - marker: b
    text: 'O: "engastadas en monturas de oro, según sus monturas". La frase hebrea final es técnica y puede aludir a la forma en que las piedras fueron asentadas en sus alojamientos designados.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַטּוּר הָרְבִיעִי
  english_pob_choice: and the fourth row
  chosen_spanish: y la cuarta fila
  alternatives_spanish:
  - y la cuarta hilera
  - y la cuarta línea
  lexicon: HALOT
  rationale: טּוּר en la lista de las piedras del pectoral se refiere a una fila de gemas. En español, "fila" es natural y fiel al orden enumerativo.
- source_word: תַּרְשִׁישׁ
  english_pob_choice: beryl
  chosen_spanish: berilo
  alternatives_spanish:
  - berilo marino
  - crisólito
  lexicon: HALOT
  rationale: La identificación exacta es incierta; "berilo" es una equivalencia tradicional y clara en español para esta gema en contextos sacerdotales.
- source_word: שֹׁהַם
  english_pob_choice: onyx
  chosen_spanish: ónice
  alternatives_spanish:
  - ónice piedra
  - ónix
  lexicon: HALOT
  rationale: En español bíblico, "ónice" funciona como equivalente tradicional y comprensible de שֹׁהַם; conserva la terminología de gema sin forzar una identificación mineral moderna.
- source_word: וְיָשְׁפֵה
  english_pob_choice: and jasper
  chosen_spanish: y jaspe
  alternatives_spanish:
  - y jaspe fino
  - y piedra de jaspe
  lexicon: HALOT
  rationale: '"Jaspe" es el equivalente habitual y transparente en español para יָשְׁפֵה.'
- source_word: מֽוּסַבֹּת
  english_pob_choice: mounted
  chosen_spanish: montados
  alternatives_spanish:
  - fijados
  - engastados
  lexicon: HALOT
  rationale: El participio pasivo indica que las piedras estaban colocadas/fijadas en metal. "Montados" reproduce bien la idea de estar asentadas en la joyería/ornamentación.
- source_word: מִשְׁבְּצ֥וֹת זָהָ֖ב
  english_pob_choice: in settings of gold
  chosen_spanish: en engastes de oro
  alternatives_spanish:
  - en monturas de oro
  - en alvéolos de oro
  lexicon: HALOT
  rationale: '"Engastes de oro" expresa el sentido técnico de las piezas que sostienen las gemas y evita una paráfrasis amplia.'
- source_word: בְּמִלֻּאֹתָם
  english_pob_choice: in their mountings
  chosen_spanish: en sus monturas
  alternatives_spanish:
  - en sus rellenos
  - según sus monturas
  lexicon: HALOT
  rationale: La frase final es técnica y se solapa con la anterior; "en sus monturas" mantiene la referencia a los alojamientos asignados sin introducir una imagen extraña como "rellenos".
translation_notes:
  revision_awareness: La redacción sigue el último ajuste del inglés auditado, que prefirió una formulación más natural para בְּמִלֻּאֹתָם ("mountings") sin perder la estructura formal. En español, se reflejó esa decisión con "monturas" y se mantuvo el paralelismo técnico de las piedras engastadas en oro.
  spanish_consistency_notes:
  - Se mantuvo el estilo sobrio y enumerativo propio de los pasajes del tabernáculo.
  - Se evitó "SEÑOR" porque no aparece el Tetragrámaton en este versículo.
  - '"Berilo", "ónice" y "jaspe" conservan la tradición terminológica sin afirmar una identificación mineral absoluta.'
  - '"Engastes" y "monturas" se usaron para respetar el campo técnico de joyería/custodia de las piedras.'
