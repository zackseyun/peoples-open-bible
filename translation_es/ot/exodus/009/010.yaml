  rationale: 'Se corrige la descripción de la plaga para reflejar con mayor fidelidad שְׁחִין אֲבַעְבֻּעֹת פֹּרֵחַ y el razonamiento del POB inglés: «llagas con ampollas que brotaban» mantiene la imagen de lesiones eruptivas sin introducir el concepto más específico y menos fiel de «úlceras». Se elimina la nota [b] por no ser necesaria y por no corresponder al foco del aparato inglés en este expediente. El resto del versículo puede conservarse con ajustes mínimos.'
