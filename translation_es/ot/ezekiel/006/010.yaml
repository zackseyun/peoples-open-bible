    issue: Construcción «al hacer venir sobre ellos»
    rationale: No representa con precisión el infinitivo לַעֲשׂוֹת dependiente de «hablé» y en español suena como si la acción de traer la calamidad fuera simultánea al hablar, no el contenido anunciado.
  - severity: low
    issue: Nota [c] mezcla idiomas y presenta glosa torpe
    rationale: «maldad/evil» no es una nota limpia en español; debe decir simplemente «mal» o explicar el hebreo con claridad.
  - severity: low
