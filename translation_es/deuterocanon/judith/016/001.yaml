translation:
  language: es
  text: Comenzad[a] a mi Dios con panderos; cantad al Señor con címbalos; cantadle en armonía un salmo y una alabanza[b]; exaltad e invocad su nombre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Tomad la delantera para mi Dios con panderos», o «Entonad para mi Dios con panderos». El imperativo inicial Ἐξάρχετε es una orden musical para empezar o dirigir el canto.
    reason: lexical_alternative
  - marker: b
    text: El verbo vertido «cantadle en armonía» (ἐναρμόσασθε) también puede entenderse como «ajustad para él» o «armonizad para él», conservando la imagen de disponer un salmo y una alabanza en forma musical apropiada.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐξάρχετε
  english_pob_choice: Begin for my God with tambourines
  chosen_spanish: Comenzad para mi Dios con tamboriles
  alternatives_spanish:
  - Iniciad para mi Dios con tamboriles
  - Tomad la delantera para mi Dios con tamboriles
  - Entonad para mi Dios con tamboriles
  lexicon: LSJ
  rationale: En contexto musical y litúrgico, el imperativo comunica iniciar o dar comienzo a un canto. «Comenzad» preserva el valor imperativo y «para mi Dios» refleja el dativo de dedicación/dirigido al culto sin añadir objeto explícito que el griego no formula.
- source_word: τῷ θεῷ μου
  english_pob_choice: to my God / for my God
  chosen_spanish: para mi Dios
  alternatives_spanish:
  - a mi Dios
  - para mi Dios
  lexicon: LSJ
  rationale: El dativo se entiende naturalmente como dedicación o dirección cultual. «Para mi Dios» suena más natural en español litúrgico que un simple «a», y conserva el matiz de ofrecimiento musical.
- source_word: ἐν τυμπάνοις
  english_pob_choice: with tambourines
  chosen_spanish: con tamboriles
  alternatives_spanish:
  - con panderos
  - con címbalos de mano
  lexicon: LSJ
  rationale: τύμπανον designa un tambor manual o pandero/tamboril. «Tamboriles» mantiene la imagen de instrumento de percusión y evita un tecnicismo más estrecho; es más transparente que «timbales», que en español moderno puede sugerir otra familia instrumental.
- source_word: ᾄσατε
  english_pob_choice: sing
  chosen_spanish: cantad
  alternatives_spanish:
  - cantad
  - cantad alabanzas
  lexicon: LSJ
  rationale: El imperativo básico es «cantar». «Cantad» reproduce el mandato sin añadir el objeto «alabanzas», que ya aparece explícitamente más adelante en αἶνον.
- source_word: τῷ κυρίῳ
  english_pob_choice: to the Lord
  chosen_spanish: al Señor
  alternatives_spanish:
  - al Señor
  - al Señor Dios
  lexicon: LSJ
  rationale: 'Para κύριος sigo la convención de POB en este texto devocional: «Señor». En español, «al Señor» es la forma natural para un destinatario de canto litúrgico. No se usa «Yahvé» aquí porque el audit trail griego presenta κύριος, no el nombre divino explícito.'
- source_word: ἐν κυμβάλοις
  english_pob_choice: with cymbals
  chosen_spanish: con címbalos
  alternatives_spanish:
  - con címbalos
  - con platillos
  lexicon: LSJ
  rationale: «Címbalos» es la equivalencia bíblica estándar y conserva el instrumento de percusión metálico del griego. «Platillos» sería más moderno, pero menos preciso en registro bíblico.
- source_word: ἐναρμόσασθε
  english_pob_choice: sing in harmony to him
  chosen_spanish: cantadle en armonía
  alternatives_spanish:
  - cantadle en armonía
  - acomodadle un canto
  - armonizad con él
  lexicon: LSJ
  rationale: El verbo puede significar armonizar, ajustar o encajar musicalmente. «Cantadle en armonía» preserva la imagen musical resaltada por la revisión inglesa y evita una traducción demasiado literal o extraña como «adornad» o «acomodad».
- source_word: αὐτῷ
  english_pob_choice: to him
  chosen_spanish: le
  alternatives_spanish:
  - le
  - a él
  lexicon: LSJ
  rationale: El clítico dativo en español naturaliza la dirección del canto hacia Dios. En la frase compuesta, «cantadle» ya integra el referente, evitando repetición pesada.
- source_word: ψαλμὸν καὶ αἶνον
  english_pob_choice: a psalm and praise
  chosen_spanish: un salmo y alabanza
  alternatives_spanish:
  - un salmo y alabanza
  - un salmo y un himno de alabanza
  lexicon: LSJ
  rationale: «Salmo» conserva ψαλμός como forma litúrgica reconocible. αἶνος es «alabanza», no «himno», para no introducir ὕμνος ni desplazar el sustantivo hacia una categoría distinta.
- source_word: ὑψοῦτε
  english_pob_choice: exalt
  chosen_spanish: exaltad
  alternatives_spanish:
  - exaltad
  - ensalzad
  - levantad en alto
  lexicon: LSJ
  rationale: «Exaltad» mantiene el mandato de honor y elevación reverente en un registro bíblico claro y tradicional.
- source_word: ἐπικαλεῖσθε
  english_pob_choice: call upon
  chosen_spanish: invocad
  alternatives_spanish:
  - invocad
  - clamad a
  - llamad sobre
  lexicon: LSJ
  rationale: En contexto de adoración, ἐπικαλεῖσθε implica llamar/invocar en oración. «Invocad» conserva el matiz cultual y teológico mejor que un simple «llamad».
- source_word: τὸ ὄνομα αὐτοῦ
  english_pob_choice: his name
  chosen_spanish: su nombre
  alternatives_spanish:
  - su nombre
  lexicon: LSJ
  rationale: Se mantiene la expresión bíblica habitual sin explicarla más. El nombre en lenguaje bíblico implica identidad y presencia, y no requiere paráfrasis.
theological_decisions:
- issue: Tratamiento de κύριος en este himno
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Yahvé
  - Señor
  rationale: El griego usa κύριος. Aunque el proyecto normalmente vierte el nombre divino hebreo como «Yahvé», aquí el texto fuente inmediato es el título griego de adoración. «Señor» respeta el audit trail y evita introducir una identificación más fuerte de la que el griego explícitamente presenta.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Señor / Lord'
- issue: Valor de ἐναρμόσασθε en el imperativo de alabanza
  english_pob_reading: sing in harmony to him
  chosen_spanish_reading: cantadle en armonía
  alternative_spanish_readings:
  - armonizad con él
  - acomodadle un canto
  rationale: La frase conserva el carácter musical y la tensión semántica de «ajustar/armonizar» sin volverla opaca en español. No se reduce a un imperativo general de canto, porque el griego añade una imagen técnica o musical específica.
  doctrine_reference: LSJ ἐναρμόζω / ἐναρμόζομαι in liturgical use
- issue: Relación entre alabanza musical e invocación
  english_pob_reading: exalt and call upon his name
  chosen_spanish_reading: exaltad e invocad su nombre
  alternative_spanish_readings:
  - ensalzad e invocad su nombre
  - levantad y llamad su nombre
  rationale: 'La secuencia final mantiene dos imperativos distintos: exaltar y invocar. «Invocad» expresa oración/clamor reverente, no mera mención del nombre.'
  doctrine_reference: Biblical prayer language in Psalms and liturgical context
translation_notes:
  revision_awareness: 'La versión inglesa auditada revisó una formulación anterior más literal y la corrigió para evitar añadir «the song» y para traducir mejor ἐναρμόσασθε como una expresión de armonía musical. La redacción española sigue esa revisión: evita insertar un objeto no explícito, conserva el impulso musical del inicio y mantiene la relación entre salmo y alabanza como una disposición sonora hacia Dios.'
  spanish_consistency_notes:
  - 'Se mantiene el registro bíblico culto pero claro: «Señor», «salmo», «alabanza», «exaltad», «invocad».'
  - No se usa «Yahvé» porque el testimonio inmediato es κύριος en griego; la decisión se alinea con el audit trail y evita una armonización no documentada con el hebreo.
  - «Tamboriles» y «címbalos» preservan la imaginería instrumental antigua en un español comprensible.
  - «Cantadle en armonía» intenta reflejar la tensión semántica de ἐναρμόσασθε sin convertirla en una paráfrasis excesiva.
