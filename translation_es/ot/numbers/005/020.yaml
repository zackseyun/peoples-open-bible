source:
  edition: WLC
  text: וְ/אַ֗תְּ כִּ֥י שָׂטִ֛ית תַּ֥חַת אִישֵׁ֖/ךְ וְ/כִ֣י נִטְמֵ֑את וַ/יִּתֵּ֨ן אִ֥ישׁ בָּ/ךְ֙ אֶת שְׁכָבְתּ֔/וֹ מִֽ/בַּלְעֲדֵ֖י אִישֵֽׁ/ךְ־׃
base_translation:
  language: en
  yaml_path: translation/ot/numbers/005/020.yaml
  text: But if you have gone astray while under your husband[a], and if you have become defiled[c][b], and a man has lain with you besides your husband—
  footnotes:
  - marker: a
    text: Or 'have been unfaithful to your husband.' The Hebrew says 'have gone astray under your husband,' using a metaphor of deviation in a marital context.
    reason: lexical_alternative
  - marker: b
    text: Literally 'under your husband,' an idiom referring to the woman's marital bond or subjection to her husband.
    reason: cultural_note
  - marker: c
    text: Literally 'a man has given his lying with you,' a Hebrew euphemism for sexual relations.
    reason: lexical_alternative
