translation:
  language: es
  text: 'Y Salomón habló a todo Israel[a]: a los comandantes de millares y de centenas, a los jueces y a todo líder en todo Israel, los jefes de las casas de sus padres[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «dijo a todo Israel».
    reason: lexical_alternative
  - marker: b
    text: Hebreo «las casas de los padres», refiriéndose a líderes de clan o de casas ancestrales.
    reason: cultural_note
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: spoke
  chosen_spanish: habló
  alternatives_spanish:
  - dijo
  lexicon: HALOT
  rationale: El hebreo es un verbo de decir, pero en este contexto de discurso público con varios destinatarios, «habló» suena natural en español y conserva la idea de proclamación ante una asamblea. «Dijo» sería más literal, pero menos fluido.
- source_word: לְכָל יִשְׂרָאֵל
  english_pob_choice: to all Israel
  chosen_spanish: a todo Israel
  alternatives_spanish:
  - a todos los israelitas
  lexicon: HALOT
  rationale: Se mantiene la designación colectiva y corporativa del pueblo como entidad nacional. «Todo Israel» es una formulación bíblica clara y evita dispersar el sentido en individuos.
- source_word: שָׂרֵי הָאֲלָפִים וְהַמֵּאוֹת
  english_pob_choice: the commanders of thousands and of hundreds
  chosen_spanish: los comandantes de millares y de centenas
  alternatives_spanish:
  - los jefes de millares y de centenas
  - los capitanes de millares y de centenas
  lexicon: HALOT
  rationale: «שָׂרֵי» expresa jefatura o mando; en este contexto administrativo-militar, «comandantes» comunica bien la función. Se conserva la estructura genitiva «de millares y de centenas» sin suavizarla, porque el texto marca unidades organizadas de autoridad.
- source_word: וְלַשֹּׁפְטִים
  english_pob_choice: to the judges
  chosen_spanish: a los jueces
  alternatives_spanish:
  - a los magistrados
  - a los gobernantes
  lexicon: HALOT
  rationale: La raíz שׁפט aquí corresponde de modo directo a funcionarios judiciales. «Jueces» es la equivalencia más transparente y reconocible en español.
- source_word: וּלְכֹל נָשִׂיא
  english_pob_choice: and to every leader
  chosen_spanish: y a todo líder
  alternatives_spanish:
  - y a todo príncipe
  - y a todo jefe
  lexicon: HALOT
  rationale: «נָשִׂיא» puede significar príncipe, jefe o líder. Se elige «líder» para evitar una connotación monárquica o nobiliaria que el contexto no exige en español moderno.
- source_word: לְכָל יִשְׂרָאֵל
  english_pob_choice: in all Israel
  chosen_spanish: en todo Israel
  alternatives_spanish:
  - de todo Israel
  lexicon: HALOT
  rationale: Aquí la frase delimita el ámbito de esos líderes. «En todo Israel» conserva el matiz distributivo/geográfico que el audit trail inglés ya señaló.
- source_word: רָאשֵׁי הָאָבוֹת
  english_pob_choice: the heads of the fathers’ houses
  chosen_spanish: los jefes de las casas paternas
  alternatives_spanish:
  - los jefes de las casas de los padres
  - los jefes de los linajes
  - los jefes de las casas ancestrales
  lexicon: HALOT
  rationale: Se preserva el idioma social hebreo de unidades familiares patrilineales. «Casas paternas» comunica esa estructura sin reemplazarla por un término más moderno que diluya la forma original.
theological_decisions:
- issue: Idioma social patrilineal de הָאָבוֹת
  english_pob_reading: fathers’ houses
  chosen_spanish_reading: casas paternas
  alternative_spanish_readings:
  - casas de los padres
  - casas ancestrales
  - familias
  rationale: No hay cuestión doctrinal, pero sí una decisión de fidelidad cultural. Se mantiene el marcado patrilineal del hebreo en vez de neutralizarlo, para conservar la textura histórica del texto.
  doctrine_reference: Translation philosophy §4 (Gender-accurate over gender-neutral)
translation_notes:
  revision_awareness: El texto sigue de cerca el paquete fuente hebreo y el audit trail inglés. Se adoptó la equivalencia funcional de «habló» para וַיֹּאמֶר, se mantuvo el marco administrativo de «comandantes de millares y de centenas», y se conservó la apposición final «los jefes de las casas paternas» sin diluir el matiz patrilineal. No se requirieron revisiones respecto del trazado auditado.
  spanish_consistency_notes:
  - Se usó «Yahvé» en conformidad con las normas del proyecto cuando aparezca el nombre divino; este versículo no lo contiene.
  - «Israel» se mantuvo como designación corporativa singular colectiva, no como plural explícito.
  - Se prefirió «líder» para נָשִׂיא por evitar la falsa precisión de «príncipe» en español contemporáneo.
  - «Casas paternas» conserva la estructura social del hebreo y armoniza con otras secciones del POB donde se preserva el parentesco patrilineal.
