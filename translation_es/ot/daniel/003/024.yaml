translation:
  language: es
  text: 'Entonces el rey Nabucodonosor se asombró y se levantó apresuradamente. Respondió y dijo a sus consejeros[a]: «¿No arrojamos a tres hombres, atados, en medio[b] del fuego?» Ellos respondieron y dijeron al rey: «Ciertamente, oh rey».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a sus oficiales» o «a sus ministros»; el término arameo se refiere a quienes servían en la corte del rey.
    reason: lexical_alternative
  - marker: b
    text: O simplemente «en el fuego»; el arameo dice más plenamente «en medio del fuego».
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱדַיִן
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - En ese momento
  lexicon: HALOT
  rationale: Marcador discursivo arameo que introduce la siguiente acción en secuencia. «Entonces» conserva el flujo narrativo de forma natural en español sin perder el valor temporal.
- source_word: נְבוּכַדְנֶצַּר מַלְכָּא
  english_pob_choice: King Nebuchadnezzar
  chosen_spanish: el rey Nabucodonosor
  alternatives_spanish:
  - Nabucodonosor el rey
  - el rey Nabucodonosor
  lexicon: HALOT
  rationale: El orden español más natural coloca el título antes del nombre. Se mantiene la referencia al rey sin añadir o quitar contenido.
- source_word: תְּוַהּ
  english_pob_choice: was astonished
  chosen_spanish: se asombró
  alternatives_spanish:
  - se quedó atónito
  - se alarmó
  lexicon: HALOT
  rationale: El verbo expresa sorpresa intensa o sobresalto. «Se asombró» comunica bien el impacto inmediato en español y evita sobreinterpretar hacia un matiz puramente emocional como «alarmó».
- source_word: בְּהִתְבְּהָלָה
  english_pob_choice: in haste
  chosen_spanish: apresuradamente
  alternatives_spanish:
  - con prisa
  - de prisa
  lexicon: HALOT
  rationale: La forma aramea añade prisa con cierto tono de agitación. «Apresuradamente» conserva tanto la rapidez como la reacción súbita en una sola expresión adverbial.
- source_word: עָנֵה וְאָמַר
  english_pob_choice: He answered and said
  chosen_spanish: Respondió y dijo
  alternatives_spanish:
  - Respondió y habló
  - Dijo
  lexicon: HALOT
  rationale: Se conserva la fórmula semítica de respuesta + dicho, pero en un español fluido. «Respondió y dijo» mantiene el relieve textual sin sonar excesivamente repetitivo.
- source_word: לְהַדָּבְרוֹהִי
  english_pob_choice: to his counselors
  chosen_spanish: a sus consejeros
  alternatives_spanish:
  - a sus oficiales
  - a sus ministros
  lexicon: HALOT
  rationale: El término arameo refiere a quienes servían en el entorno cortesano del rey, con función de consejo o administración. «Consejeros» sigue de cerca la decisión inglesa y es claro en español; se preserva la posibilidad de un matiz más amplio de corte en la nota.
- source_word: הֲלָא
  english_pob_choice: Did we not
  chosen_spanish: ¿No
  alternatives_spanish:
  - ¿Acaso no
  - ¿No es cierto que no
  lexicon: HALOT
  rationale: La partícula introduce una pregunta retórica que espera confirmación. En español, la inversión interrogativa con «¿No...?» transmite de forma natural la expectativa implícita.
- source_word: גֻבְרִין תְּלָתָא
  english_pob_choice: three men
  chosen_spanish: a tres hombres
  alternatives_spanish:
  - a tres varones
  - a tres personas
  lexicon: HALOT
  rationale: El numeral y el sustantivo se traducen de modo directo. «Hombres» es preciso y mantiene el sentido masculino explícito del arameo.
- source_word: רְמֵינָא
  english_pob_choice: throw
  chosen_spanish: arrojamos
  alternatives_spanish:
  - echamos
  - lanzamos
  lexicon: HALOT
  rationale: Para el acto violento de echar al horno, «arrojar» reproduce bien la fuerza del verbo sin necesidad de un calco áspero.
- source_word: לְגוֹא נוּרָא
  english_pob_choice: into the midst of the fire
  chosen_spanish: en medio del fuego
  alternatives_spanish:
  - dentro del fuego
  - en el interior del fuego
  lexicon: HALOT
  rationale: Se preserva la fuerza espacial de «en medio de» que la POB inglesa defendió como lectura más completa. En español suena natural y mantiene la imagen del centro del fuego.
- source_word: מְכַפְּתִין
  english_pob_choice: bound
  chosen_spanish: atados
  alternatives_spanish:
  - sujetos
  - frenados
  lexicon: HALOT
  rationale: Participio que describe el estado de los hombres al ser arrojados. «Atados» es directo, claro y conserva la condición física de inmovilización.
- source_word: עָנַיִן וְאָמְרִין
  english_pob_choice: They answered and said
  chosen_spanish: respondieron y dijeron
  alternatives_spanish:
  - contestaron y dijeron
  - replicaron
  lexicon: HALOT
  rationale: Se mantiene la fórmula de réplica plural. «Respondieron y dijeron» conserva la textura del original y el paralelismo con la cláusula anterior.
- source_word: יַצִּיבָא
  english_pob_choice: Certainly
  chosen_spanish: Ciertamente
  alternatives_spanish:
  - Verdaderamente
  - Así es
  lexicon: HALOT
  rationale: La palabra expresa afirmación o confirmación. «Ciertamente» reproduce bien la concesión enfática dada al rey.
- source_word: מַלְכָּא
  english_pob_choice: O king
  chosen_spanish: oh rey
  alternatives_spanish:
  - rey
  - oh mi rey
  lexicon: HALOT
  rationale: Vocativo de respeto en la respuesta cortesana. «Oh rey» preserva la deferencia sin introducir formulaciones más litúrgicas o expansivas.
translation_notes:
  revision_awareness: 'Se siguió de cerca el paquete fuente arameo y la auditoría inglesa: se conservó la secuencia narrativa, la fórmula semítica de habla («respondió y dijo»), la lectura amplia de «en medio del fuego» y el vocativo cortesano, sin introducir un lenguaje eclesiástico ajeno al registro del pasaje.'
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto fuente lo requiera; este versículo no contiene el nombre divino.
  - Se mantuvo «consejeros» para reflejar la decisión inglesa y la amplitud del término de corte arameo.
  - Se prefirió «atados» frente a «frenados» o «sujetos» por claridad y fidelidad narrativa.
  - Se respetó el matiz de repetición semítica en ambas fórmulas de habla, aunque el español resulte más natural con esa estructura.
