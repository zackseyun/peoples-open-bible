    rationale: El griego especifica frankincense/olíbano, no incienso en general. En una revisión fuente-céntrica conviene conservar esa precisión léxica.
  - severity: medium
    issue: «enloquecidos» no refleja bien ἀγριωθέντας
    rationale: El participio indica que fueron vueltos feroces o salvajes por la bebida abundante; «enloquecidos» desplaza el sentido hacia pérdida de razón.
  - severity: medium
    issue: «para encontrar la destrucción de los judíos» es poco natural en español
    rationale: Aunque intenta conservar «meeting», en español suena duro y ambiguo. «para salir al encuentro de la destrucción de los judíos» mantiene el giro idiomático con mejor claridad.
  - severity: low
    issue: «generosas cantidades» suena menos preciso que «abundantes dosis/raciones»
    rationale: El griego habla de administración copiosa de bebida; «dosis» o «raciones» comunica mejor la idea de porciones dadas a beber.
