revisions:
- from: Cuando pasa la tormenta[a], el impío[b] ya no existe, pero el justo es un cimiento eterno.
  to: Cuando pasa la tormenta[a], el impío[b] ya no existe, pero el justo es fundamento eterno.
  rationale: Se reemplaza «cimiento» por «fundamento» para una correspondencia más natural y ampliamente inteligible con יְסוֹד en español bíblico contemporáneo, sin cambiar el sentido documentado. Se conservan las notas existentes porque siguen siendo pertinentes y están bien ancladas.
