  rationale: El hebreo usa un modismo de edad literalmente equivalente a «hijo de ocho años». En español, «tenía ocho años» expresa con naturalidad la edad al acceder al trono sin perder el sentido del hebreo.
- source_word: יֹאשִׁיָּהוּ
  english_pob_choice: Josiah
