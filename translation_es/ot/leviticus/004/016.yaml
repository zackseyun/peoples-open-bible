    text: Tradicionalmente se ha traducido «tabernáculo» por «tienda de reunión».
    reason: lexical_alternative
  revision_rationale: 'Se corrige únicamente la designación de אֹהֶל מוֹעֵד para alinearla con la evidencia fuente y la decisión auditada del POB: la forma principal debe ser la más literal y transparente en español («tienda de reunión»), mientras que «tabernáculo» queda como alternativa tradicional en nota. El resto del versículo puede mantenerse.'
