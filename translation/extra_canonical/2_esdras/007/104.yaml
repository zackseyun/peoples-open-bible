  rationale: 'The Latin verb ''ostendet'' is future tense (''will display''), not present (''displays''). Additionally, the word ''now'' is not in the Latin text (''quemadmodum enim non mittit pater filium'') and is unnecessary, as the present tense ''does not send'' already establishes the general analogy. | Azure: The proposed change is directly supported by the Latin. In 4 Ezra/2 Esdras 7:104, the clause reads "dies iudicii dies decretorius est, et omnibus signaculum ueritatis ostendet"; "ostendet" is straight'
