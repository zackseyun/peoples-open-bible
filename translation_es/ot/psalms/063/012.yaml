review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: contraste adversativo con «Pero», «el rey», gozo «en Dios», y el referente de «él» correctamente entendido como Dios. Sin embargo, hay problemas en la preservación del aparato auditado: la nota [a] está mal asignada y no corresponde al texto «en Dios»; además falta una nota para la alternativa «la boca/las bocas» y la nota [b] documenta una alternativa inferior («en él») en lugar de la alternativa relevante sobre el referente «por Dios».'
  spanish_quality_summary: El español es en general claro y digno, pero «los que hablan mentira» suena poco natural; «los que dicen mentiras» o «los que hablan falsedad» sería más idiomático. También «la boca ... será cerrada» es comprensible, pero en español natural y según la revisión inglesa auditada conviene «las bocas ... serán cerradas». «Se gloriará» es aceptable y más fiel al matiz de יתהלל que «se jactará».
  glossary_alignment: 'No hay conflicto con la terminología principal del proyecto: אֱלֹהִים se traduce correctamente como «Dios». No aparecen términos como Yahvé, Mesías/Cristo, Espíritu, esclavo, etc. La decisión teológica sobre «el rey» y el pronombre referido a Dios está bien conservada.'
  issues:
  - severity: high
    issue: La nota [a] no corresponde al segmento anclado «Dios[a]».
    rationale: La nota inglesa [a] explica una alternativa para «everyone who swears by him / by God», no para «in God». En el borrador, [a] contiene además un texto erróneo y confuso («porque de él jurará todo el que jura»), que no refleja el audit trail.
  - severity: high
    issue: Falta una nota para la alternativa de referente «por Dios» vs. «por él».
    rationale: El audit trail inglés preserva explícitamente la alternativa «everyone who swears by God». En español conviene conservar esa alternativa en una nota anclada a «él», no una nota sobre «en él».
  - severity: medium
    issue: Falta la nota sobre la imagen literal «la boca» frente a la formulación natural «las bocas».
    rationale: El inglés auditado conserva una nota literal sobre «the mouth of speakers of falsehood». Como la revisión principal usa plural en inglés por naturalidad, el español también debería usar «las bocas» en el texto principal y preservar el singular literal en nota.
  - severity: medium
    issue: «Los que hablan mentira» es poco idiomático en español general.
    rationale: Aunque intenta conservar la fuerza participial, suena forzado. «Los que dicen mentiras» mantiene la acción verbal y mejora la naturalidad sin perder sentido.
  revised_spanish_text: Pero el rey se alegrará en Dios; todo el que jura por él[a] se gloriará[b], porque las bocas de los que dicen mentiras[c] serán cerradas.
