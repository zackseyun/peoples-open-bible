base_translation:
  language: en
  yaml_path: translation/ot/leviticus/025/006.yaml
  text: The Sabbath produce of the land shall be for you for food—for you[a], for your male slave, for your female slave, for your hired worker[b], and for your resident foreigner who dwells with you.
  footnotes:
  - marker: a
    text: Or 'the sabbath produce of the land.' The Hebrew is literally 'the Sabbath of the land,' referring to what the land yields during its sabbatical rest.
    reason: lexical_alternative
  - marker: b
    text: '''Resident foreigner'' renders a term for a non-native person living among Israel; alternatively, ''sojourner'' or ''resident alien.'''
    reason: lexical_alternative
