translation:
  language: es
  text: No habrá prostituta de culto[a] entre las hijas de Israel, ni habrá prostituto de culto entre los hijos de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘prostituta del templo’. Los términos hebreos se vinculan tradicionalmente con actividad sexual ilícita relacionada con el culto pagano; el sentido más literal ‘mujer/hombre consagrado’ resulta engañoso aquí.
    reason: lexical_alternative
lexical_decisions:
- source_word: קְדֵשָׁה
  english_pob_choice: cult prostitute
  chosen_spanish: prostituta de culto
  alternatives_spanish:
  - prostituta del templo
  - mujer consagrada
  lexicon: HALOT
  rationale: El término femenino designa a una persona vinculada con práctica sexual cultual ilícita. 'Prostituta de culto' conserva el componente religioso sin suavizarlo ni presentar una consagración legítima. 'Mujer consagrada' sería engañoso en español.
- source_word: קָדֵשׁ
  english_pob_choice: cult prostitute
  chosen_spanish: prostituto de culto
  alternatives_spanish:
  - prostituto del templo
  - hombre consagrado
  lexicon: HALOT
  rationale: El masculino mantiene el paralelo léxico con קְדֵשָׁה y expresa también la dimensión cultual ilícita. 'Hombre consagrado' ocultaría el sentido peyorativo en el contexto legal.
- source_word: לֹא תִהְיֶה / וְלֹא יִהְיֶה
  english_pob_choice: There shall not be
  chosen_spanish: No habrá
  alternatives_spanish:
  - No debe haber
  - No existirá
  lexicon: HALOT
  rationale: La construcción hebrea expresa prohibición en registro legal. 'No habrá' es natural en español y conserva el tono jurídico sin añadir modalización interpretativa.
- source_word: מִבְּנוֹת יִשְׂרָאֵל
  english_pob_choice: among the daughters of Israel
  chosen_spanish: entre las hijas de Israel
  alternatives_spanish:
  - entre las mujeres de Israel
  - de entre las hijas de Israel
  lexicon: HALOT
  rationale: '''Entre'' refleja bien el valor de inclusión/exclusión del prefijo hebreo y suena más natural que un calco rígido. ''Hijas de Israel'' preserva la formulación familiar-nacional del original.'
- source_word: מִבְּנֵי יִשְׂרָאֵל
  english_pob_choice: among the sons of Israel
  chosen_spanish: entre los hijos de Israel
  alternatives_spanish:
  - entre los varones de Israel
  - de entre los hijos de Israel
  lexicon: HALOT
  rationale: Se mantiene el paralelismo con la primera cláusula y la simetría hijos/hijas del hebreo. 'Varones de Israel' sería más explícito, pero perdería la correspondencia formal del texto.
theological_decisions:
- issue: Sentido de קדש/קדשה en esta prohibición legal
  english_pob_reading: The terms refer to male and female persons engaged in cultic prostitution associated with pagan worship.
  chosen_spanish_reading: Los términos se refieren a varones y mujeres vinculados con prostitución cultual asociada al culto pagano.
  alternative_spanish_readings:
  - Los términos designan simplemente personas sexualmente inmorales
  - Los términos significan personas consagradas en sentido neutral
  rationale: La evidencia léxica y el contexto legal requieren visibilizar el elemento cultual ilícito. Evitar 'consagrado/a' impide una lectura positiva o neutral que no corresponde al uso técnico del término.
  doctrine_reference: 'Translation philosophy: original-language primacy; consistency of key terms, or documented exception.'
translation_notes:
  revision_awareness: La revisión inglesa cambió 'from' por 'among' para reflejar mejor el preposición hebrea; por eso la traducción española usa 'entre' en ambos miembros del paralelismo. Se conserva además la simetría femenina/masculina y el matiz cultual ilícito documentado en el expediente auditado.
  spanish_consistency_notes:
  - Se mantiene 'Israel' en la expresión nacional-covenantal del texto.
  - Se evita 'SEÑOR' u otra sustitución porque el versículo no contiene el nombre divino.
  - Se conserva el paralelismo de género y de estructura legal del hebreo.
  - El marcador [a] aparece en el texto donde corresponde a la alternativa léxica.
