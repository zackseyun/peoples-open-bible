translation:
  language: es
  text: ¡Oh Eleazar[a], anciano más fuerte que los tormentos, hombre anciano[b] más intenso que el fuego, y rey mayor que los sufrimientos!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «torturas» para βασάνων; en este contexto el griego puede denotar con más precisión sufrimientos de tortura.
    reason: lexical_alternative
  - marker: b
    text: Los vocativos griegos («anciano», «hombre anciano» y «rey») son aclamaciones honoríficas dirigidas a Eleazar, no afirmaciones de un cargo político.
    reason: cultural_note
lexical_decisions:
- source_word: βασάνων
  english_pob_choice: torments
  chosen_spanish: tormentos
  alternatives_spanish:
  - torturas
  - pruebas
  lexicon: LSJ
  rationale: En este contexto martirial, βάσανοι alude a tormentos o torturas infligidos, no a meras pruebas. «Tormentos» conserva el tono elevado de la alabanza y es natural en español.
- source_word: βιαιότερε
  english_pob_choice: more intense than
  chosen_spanish: más fuerte que
  alternatives_spanish:
  - más violento que
  - más enérgico que
  - más vigoroso que
  lexicon: LSJ
  rationale: El comparativo de βίαιος expresa fuerza/violencia/impulso. En español, «más fuerte que» comunica mejor la idea de superioridad resistente o dominante en este elogio retórico, sin sonar artificial.
- source_word: γέρων
  english_pob_choice: elder
  chosen_spanish: anciano
  alternatives_spanish:
  - viejo
  - elder
  lexicon: LSJ
  rationale: γέρων es un vocativo de anciano/anciano digno. «Anciano» mantiene la dignidad del apelativo y evita repetir exactamente el segundo vocativo.
- source_word: πυρός
  english_pob_choice: fire
  chosen_spanish: fuego
  lexicon: LSJ
  rationale: Es un sustantivo literal. «Fuego» conserva la imagen directa del texto griego.
- source_word: εὐτονώτερε
  english_pob_choice: more intense than
  chosen_spanish: más intenso que
  alternatives_spanish:
  - más vigoroso que
  - más resuelto que
  - más tenso que
  lexicon: LSJ
  rationale: El comparativo de εὔτονος tiene campo semántico de tensión, vigor e intensidad. «Más intenso que» transmite bien la fuerza retórica en español.
- source_word: πρεσβῦτα
  english_pob_choice: old man
  chosen_spanish: viejo
  alternatives_spanish:
  - anciano
  lexicon: LSJ
  rationale: El segundo vocativo repite la idea de edad pero con matiz paralelo. «Viejo» distingue este apelativo del anterior sin perder el valor vocativo; se usa aquí de forma literaria y no peyorativa.
- source_word: παθῶν
  english_pob_choice: sufferings
  chosen_spanish: sufrimientos
  alternatives_spanish:
  - pasiones
  - aflicciones
  lexicon: LSJ
  rationale: En este contexto πάθη se refiere a padecimientos infligidos, no a pasiones internas. «Sufrimientos» es el equivalente natural y fiel en español.
- source_word: μέγιστε
  english_pob_choice: greater than
  chosen_spanish: más grande que
  alternatives_spanish:
  - el mayor de
  - mayor que
  lexicon: LSJ
  rationale: Aunque literalmente es superlativo («máximo»), la construcción de comparación en el verso se vuelve idiomática en español con «más grande que», preservando el paralelismo con las comparaciones anteriores.
- source_word: βασιλεῦ
  english_pob_choice: king
  chosen_spanish: rey
  alternatives_spanish:
  - soberano
  - gobernante
  lexicon: LSJ
  rationale: Es un vocativo literal de realeza usado honoríficamente. «Rey» mantiene la metáfora exaltada dirigida a Eleazar.
- source_word: Ἐλεαζάρ
  english_pob_choice: Eleazar
  chosen_spanish: Eleazar
  lexicon: transliteration standard
  rationale: Nombre propio transliterado de forma estándar al español.
theological_decisions:
- issue: Vocativos honoríficos metafóricos dirigidos a Eleazar
  english_pob_reading: Retain the elevated metaphors ('elder... old man... king') rather than flattening them into explanatory prose.
  chosen_spanish_reading: Conservar los vocativos elevados («anciano... viejo... rey») como aclamaciones retóricas dirigidas a Eleazar.
  alternative_spanish_readings:
  - Parafrasear como 'eres más fuerte que los tormentos, más intenso que el fuego y mayor que los sufrimientos'
  rationale: El griego presenta una serie de vocativos elípticos y laudatorios, no una simple descripción. Mantener la forma vocativa preserva la fuerza retórica y evita añadir interpretación que el texto no explicita.
  doctrine_reference: 'Principio POB de equivalencia óptima: conservar el sentido y la fuerza retórica del original sin paraphrasear más allá de la evidencia.'
translation_notes:
  revision_awareness: 'La traducción española sigue la última revisión del audit trail: βιαιότερε se resolvió de manera más natural como idea de fuerza/dominio en lugar de un calco de violencia. Se conserva además la estructura vocativa exaltada y el paralelismo retórico de los tres apelativos.'
  spanish_consistency_notes:
  - Se usa «Yahvé» según el estándar del proyecto solo cuando corresponde al Tetragrámaton; aquí no aparece.
  - Se mantiene «Eleazar» como transliteración estable del nombre propio.
  - Se conserva el registro solemne y literario, evitando un español eclesiástico arcaizante donde no es necesario.
  - «Tormentos» y «sufrimientos» diferencian dos términos semánticamente cercanos pero no idénticos, para preservar el paralelismo del original.
