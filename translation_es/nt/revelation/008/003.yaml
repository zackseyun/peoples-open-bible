  text: Καὶ ἄλλος ἄγγελος ἦλθεν καὶ ἐστάθη ἐπὶ τοῦ θυσιαστηρίου ἔχων λιβανωτὸν χρυσοῦν, καὶ ἐδόθη αὐτῷ θυμιάματα πολλὰ ἵνα ⸀δώσει ταῖς προσευχαῖς τῶν ἁγίων πάντων ἐπὶ τὸ θυσιαστήριον τὸ χρυσοῦν τὸ ἐνώπιον τοῦ θρόνου.
base_translation:
  language: en
  yaml_path: translation/nt/revelation/008/003.yaml
  text: And another angel came and stood at the altar[a], holding a golden censer[b], and much incense was given to him so that he might offer it with the prayers of all the saints on the golden altar before the throne.
  footnotes:
