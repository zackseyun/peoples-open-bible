    text: 'O: «a la entrada de la cueva». El hebreo dice literalmente «a la boca de la cueva».'
    reason: lexical_alternative
  - marker: b
    text: El hebreo dice literalmente «para guardarlos», con un objeto plural, probablemente refiriéndose a los reyes encerrados en la cueva más que a la cueva misma. Aquí se sigue la revisión que toma el referente en singular.
    reason: lexical_alternative
