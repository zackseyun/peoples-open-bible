review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido del hebreo: «Entonces» para וַיֹּאמֶר, «Yahvé», «Moisés», «se niega» para מֵאֵן, y «dejar ir al pueblo» para לְשַׁלַּח הָעָם. También preserva correctamente la decisión teológica de no aplanar כָּבֵד a «duro» en el texto principal. Sin embargo, «está pesado» no suena natural en español para describir el corazón como metáfora moral; conviene una forma más idiomática que conserve «pesado».'
  spanish_quality_summary: La redacción es clara y digna, pero «El corazón de Faraón está pesado» resulta forzada en español contemporáneo y puede leerse casi físicamente, no metafóricamente. «Tiene el corazón pesado» conserva la imagen hebrea con mejor naturalidad y legibilidad. La nota al pie es útil y está bien anclada.
  glossary_alignment: 'Se respeta la terminología del proyecto: יְהוָה -> «Yahvé»; no hay conflictos con otros términos doctrinales clave. La decisión de mantener la metáfora de כָּבֵד como «pesado» en vez de «duro» está alineada con la auditoría inglesa, pero debe expresarse con mejor español.'
  issues:
  - severity: medium
    issue: «está pesado» es poco idiomático en español para «כָּבֵד לֵב»
    rationale: Aunque preserva el valor léxico de «heavy», en español suena antinatural y puede entorpecer la comprensión. «Tiene el corazón pesado» conserva la metáfora concreta y comunica mejor la disposición obstinada sin interpretarla de más.
  revised_spanish_text: 'Entonces Yahvé dijo a Moisés[a]: «Faraón tiene el corazón pesado; se niega a dejar ir al pueblo».'
