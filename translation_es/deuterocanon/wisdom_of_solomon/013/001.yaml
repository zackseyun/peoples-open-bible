  rationale: Se corrige la preposición principal para reflejar mejor el valor inferencial de ἐκ y para sonar natural en español («a partir de las cosas buenas visibles»). También se alisa la puntuación del participio instrumental sin cambiar el contenido. El resto del borrador es fiel al griego y al razonamiento léxico-teológico documentado.
