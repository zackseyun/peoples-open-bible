translation:
  language: es
  text: para aplastar bajo sus pies a todos los prisioneros[a] de la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «todos los prisioneros de la tierra/territorio». El hebreo אֶרֶץ puede significar «tierra» o «territorio»; aquí se ha escogido «tierra» para conservar el alcance poético amplio del verso.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְ/דַכֵּא
  english_pob_choice: to crush
  chosen_spanish: aplastar
  alternatives_spanish:
  - triturar
  - aplastar
  - oprimir
  lexicon: HALOT
  rationale: דכא expresa la idea de quebrantar o aplastar con fuerza. En español, «aplastar» conserva la imagen física y la concisión del infinitivo de propósito, sin volverlo innecesariamente abstracto.
- source_word: תַּ֣חַת
  english_pob_choice: under
  chosen_spanish: bajo
  alternatives_spanish:
  - debajo de
  - bajo
  lexicon: HALOT
  rationale: La preposición es espacial y directa. «Bajo» mantiene la imagen concreta de ubicación sin alargar la frase.
- source_word: רַגְלָיו
  english_pob_choice: his feet
  chosen_spanish: sus pies
  alternatives_spanish:
  - su pie
  - sus pies
  lexicon: HALOT
  rationale: El hebreo es plural con sufijo masculino singular. En español, «sus pies» reproduce mejor el giro idiomático y la imagen corporal del texto.
- source_word: כֹּל
  english_pob_choice: all
  chosen_spanish: todos
  alternatives_spanish:
  - todos
  - cada uno de
  lexicon: HALOT
  rationale: «Todos» refleja bien el alcance colectivo del hebreo antes del sintagma en constructo.
- source_word: אֲסִירֵי
  english_pob_choice: the prisoners of
  chosen_spanish: los prisioneros
  alternatives_spanish:
  - los cautivos
  - los prisioneros
  lexicon: HALOT
  rationale: El sustantivo puede referirse a prisioneros o cautivos. «Prisioneros» es claro, natural y mantiene la fuerza de injusticia presente en el contexto.
- source_word: אָרֶץ
  english_pob_choice: the earth
  chosen_spanish: de la tierra
  alternatives_spanish:
  - de la tierra
  - del país
  - de la tierra/país
  lexicon: HALOT
  rationale: אָרֶץ puede significar «tierra» o «país/territorio». Aquí se conserva «tierra» como opción amplia y poética, equivalente funcional a la elección inglesa de «earth», sin limitar indebidamente el alcance.
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios necesarios y que el acuerdo con el texto fuente es alto; se mantiene la misma lectura lexical básica del inglés auditado, ajustada a un español natural y fiel al hebreo.
  spanish_consistency_notes:
  - Se conserva «tierra» para אָרֶץ, en línea con la amplitud poética defendida en el audit trail inglés.
  - «Prisioneros» mantiene el tono concreto del hebreo y evita suavizar la imagen de cautiverio.
  - Se evita «SEÑOR» u otras sustituciones irrelevantes porque el versículo no contiene el Tetragrámaton ni un título divino directo.
