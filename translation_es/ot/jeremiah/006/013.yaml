revisions:
- from: Porque desde el menor de ellos hasta el mayor[a], todos buscan ganancia injusta; y desde el profeta hasta el sacerdote, todos practican la falsedad[c][b].
  to: Porque desde el menor de ellos hasta el mayor[a], cada uno de ellos codicia ganancias injustas; y desde el profeta hasta el sacerdote, cada uno de ellos practica la falsedad[c][b].
  rationale: Se ajusta el español para reflejar mejor el valor distributivo de כֻּלּוֹ («cada uno de ellos») y la fuerza léxica de בּוֹצֵעַ בָּצַע («codicia ganancias injustas»). También se corrigen y afinan las notas para alinearlas con mayor precisión al expediente inglés y al hebreo subyacente.
  reviewer_model: gpt-5.4
