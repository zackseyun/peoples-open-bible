translation:
  language: es
  text: hasta que Yahvé mire y vea desde el cielo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «mire y vea», una expresión en pareja que subraya la observación atenta de Yahvé desde el cielo.'
