translation:
  language: es
  text: No me entregues al deseo de mis adversarios[a], porque contra mí se han levantado testigos falsos[b], y respiran violencia[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «al querer de mis adversarios». Aquí נֶפֶשׁ probablemente significa deseo, apetito o voluntad, no «alma» en sentido estrecho.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «porque falsos testigos se han levantado contra mí, respirando violencia». El miembro final puede describir colectivamente a los testigos falsos.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «y uno que respira violencia».'
    reason: alternative_reading
lexical_decisions:
- source_word: תִּתְּנֵנִי
  english_pob_choice: give me over
  chosen_spanish: me entregues
  alternatives_spanish:
  - me des
  - me pongas en manos de
  lexicon: HALOT
  rationale: El verbo נתן con אַל expresa la idea de entregar o poner a alguien en poder de otro. «Me entregues» conserva esa fuerza de cesión/entrega y suena natural en español, sin suavizar la petición de protección.
- source_word: בְּנֶפֶשׁ
  english_pob_choice: to the desire of
  chosen_spanish: al deseo de
  alternatives_spanish:
  - a la voluntad de
  - al apetito de
  lexicon: HALOT
  rationale: En este giro, נֶפֶשׁ no se entiende en sentido estrecho de «alma», sino como deseo, apetito o voluntad. «Al deseo de» sigue la decisión auditada del inglés y evita una traducción engañosamente literal.
- source_word: צָרַי
  english_pob_choice: my adversaries
  chosen_spanish: mis adversarios
  alternatives_spanish:
  - mis enemigos
  - mis contrarios
  lexicon: HALOT
  rationale: «Adversarios» mantiene el matiz de oposición hostil y también puede resonar con el contexto de acusación judicial, sin reducirlo a un simple término bélico.
- source_word: קָמוּ בִי
  english_pob_choice: have risen against me
  chosen_spanish: se han levantado contra mí
  alternatives_spanish:
  - han surgido contra mí
  - se han alzado contra mí
  lexicon: HALOT
  rationale: קום con בְּ puede significar levantarse contra alguien. «Se han levantado contra mí» es una equivalencia clara y natural que conserva la hostilidad activa.
- source_word: עֵדֵי שֶׁקֶר
  english_pob_choice: false witnesses
  chosen_spanish: testigos falsos
  alternatives_spanish:
  - testigos de mentira
  - testigos mentirosos
  lexicon: HALOT
  rationale: La frase constructa describe testigos caracterizados por la falsedad. «Testigos falsos» es el equivalente jurídico natural en español y conserva el tono forense del verso.
- source_word: וִיפֵחַ חָמָס
  english_pob_choice: they breathe out violence
  chosen_spanish: respiran violencia
  alternatives_spanish:
  - exhalan violencia
  - bufan violencia
  lexicon: HALOT
  rationale: יפח expresa «respirar, soplar, exhalar». La construcción hebrea final puede funcionar de modo colectivo o descriptivo respecto de los testigos falsos. «Respiran violencia» preserva la imagen verbal sin imponer un sujeto singular que el español podría volver torpe.
- source_word: חָמָס
  english_pob_choice: violence
  chosen_spanish: violencia
  alternatives_spanish:
  - injusticia violenta
  - abuso
  lexicon: HALOT
  rationale: חָמָס suele denotar violencia, agravio violento o injusticia ruda. «Violencia» es la opción más directa y fuerte en español.
theological_decisions:
- issue: 'Identidad del último miembro: plural implícito o sujeto singular'
  english_pob_reading: '''false witnesses have risen against me, and they breathe out violence'' / ''one who breathes out violence'' as an appositional description'
  chosen_spanish_reading: «testigos falsos ... y respiran violencia»
  alternative_spanish_readings:
  - «testigos falsos ... y uno que respira violencia»
  - «testigos falsos ... y tal como respiran violencia»
  rationale: El hebreo presenta un singular verbal/adjetival final que describe a los testigos falsos. La versión española conserva la lectura colectiva y descriptiva, coherente con la revisión inglesa más reciente y con la claridad del español, sin borrar la tensión gramatical del original.
  doctrine_reference: Salmo 27:12; la observación es filológica y retórica, no doctrinal.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que prefirió una lectura más directa y colectiva («they breathe out violence») sobre una formulación singular más áspera. La presente redacción española sigue esa dirección, pero mantiene la nota alternativa para no borrar la posibilidad gramatical del hebreo.
  spanish_consistency_notes:
  - Se usa «Yahvé» por defecto en el proyecto, pero este versículo no contiene el nombre divino.
  - Se conserva «testigos falsos» como giro jurídico natural y coherente con el inglés auditado.
  - Se evita «alma» para נֶפֶשׁ porque el contexto hostil pide deseo/voluntad, no antropología espiritual.
  - «Respiran violencia» reproduce la imagen verbal sin forzar una paráfrasis interpretativa.
