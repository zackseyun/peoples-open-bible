  - marker: b
    text: Literalmente, «se volvieron a los talones de Judas y de los que estaban con él, por detrás»; el giro es un modismo que expresa persecución muy cercana por la retaguardia.
    reason: lexical_alternative
  revision_rationale: Se ajustó el modismo de persecución para que el español refleje mejor κατὰ πόδας ... ἐκ τῶν ὄπισθεν con una expresión natural y fiel («a los talones de ... por detrás»). También se corrigió la nota b para que el literal sea gramatical y claro en español.
