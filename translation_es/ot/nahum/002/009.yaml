    text: Or “Stand! Stand!” The Hebrew imperatives can be rendered more literally this way; “Stop! Stop!” brings out the sense in a flight scene.
    reason: lexical_alternative
  - marker: b
    text: Literally, “from the days she was,” an idiom meaning from Nineveh’s earliest existence or long-standing past.
    reason: lexical_alternative
