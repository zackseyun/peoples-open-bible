translation:
  language: es
  text: Pero después de esto restauraré la fortuna[a] del pueblo de Amón, declara Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el cautiverio» del pueblo de Amón. El modismo hebreo puede referirse a la reversión del cautiverio o, en sentido más amplio, a la restauración de la fortuna.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אַחֲרֵי כֵן
  english_pob_choice: But afterward
  chosen_spanish: Pero después de esto
  alternatives_spanish:
  - Y después de eso
  - Después de esto
  lexicon: HALOT
  rationale: אַחֲרֵי כֵן expresa secuencia temporal, y el prefijo conjuntivo permite un giro discursivo. «Pero» conserva el contraste con el juicio anterior; «después de esto» mantiene la relación temporal sin sonar forzado en español.
- source_word: אָשִׁיב
  english_pob_choice: I will restore
  chosen_spanish: restauraré
  alternatives_spanish:
  - haré volver
  - restableceré
  lexicon: HALOT
  rationale: El hifil de שוב puede significar «hacer volver» o «restaurar». En español, «restauraré» comunica bien la acción de reversión/restablecimiento y evita una literalidad menos natural.
- source_word: אֶת שְׁבוּת
  english_pob_choice: the fortunes
  chosen_spanish: la suerte
  alternatives_spanish:
  - el cautiverio
  - la cautividad
  - la condición de exilio
  lexicon: HALOT
  rationale: El hebreo es una fórmula idiomática de restauración que puede abarcar más que el regreso literal del cautiverio. «La suerte» es una equivalencia breve y natural en español para ese estado/favorecimiento restaurado; la alternativa tradicional «cautiverio» se preserva en nota.
- source_word: בְּנֵי עַמּוֹן
  english_pob_choice: the people of Ammon
  chosen_spanish: los hijos de Amón
  alternatives_spanish:
  - el pueblo de Amón
  - los amonitas
  lexicon: HALOT
  rationale: «Hijos de Amón» refleja con precisión la construcción hebrea בני עמון. Aunque «amonitas» también es posible, la forma filial conserva mejor el paralelismo del original.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - dice Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: La fórmula profética נְאֻם se vierte naturalmente como «declara». Conforme al criterio del proyecto, יְהוָה se traduce «Yahvé» y no se sustituye por un título ocultante.
theological_decisions:
- issue: Restauración prometida a Amón después del juicio
  english_pob_reading: Render the verse as a genuine future restoration oracle without narrowing its scope beyond the text.
  chosen_spanish_reading: Presentar el versículo como un oráculo real de restauración futura, sin concretar más de lo que el hebreo dice acerca de su forma o alcance.
  alternative_spanish_readings:
  - Reducirlo a una restauración política solamente
  - Espiritualizarlo y desvincularlo del referente nacional
  rationale: El hebreo promete una restauración para Amón, pero no especifica el modo exacto ni la extensión de esa restauración. La traducción conserva esa tensión interpretativa en vez de resolverla.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: 'El texto sigue la lectura auditada del inglés POB: mantiene el giro adversativo-temporal, la fórmula profética y la ambigüedad idiomática de שְׁבוּת, sin endurecerla a una sola interpretación.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma del nombre divino, conforme al estándar del proyecto.
  - «Hijos de Amón» preserva la construcción hebrea; no se reemplaza por un etnónimo más interpretativo en el cuerpo principal.
  - «Restauraré la suerte» deja abierta la amplitud idiomática del hebreo, y la nota recoge la alternativa tradicional «cautiverio».
