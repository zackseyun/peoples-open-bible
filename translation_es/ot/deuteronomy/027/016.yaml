  spanish_quality_summary: 'El español es claro, natural y digno. «Maldito el que...» funciona bien en contexto legal-litúrgico. «Y todo el pueblo dirá: “Amén”» es plenamente legible. La mejora principal es ubicar correctamente la nota en la palabra clave y preferir «deshonra» por mayor fidelidad semántica y mejor resonancia bíblica en español.'
