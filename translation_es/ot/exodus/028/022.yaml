- from: Y harás sobre el pectoral cadenas de oro puro[a], obra trenzada como cuerdas.
  to: Y harás sobre el pectoral cadenas de oro puro[a], de labor trenzada, como cordones.
  rationale: Se ajusta la sintaxis española para que la descripción artesanal modifique con claridad a 'cadenas' y suene natural sin perder la imaginería del hebreo. También se mejora la nota léxica para ofrecer alternativas idiomáticas en español.
  reviewer_model: gpt-5.4
