  to: '«Hijo de hombre, profetiza contra los pastores de Israel; profetiza y diles, a los pastores[b]: “Así dice el Señor, Yahvé: ¡Ay de los pastores de Israel que se han apacentado[a] a sí mismos! ¿No deberían los pastores apacentar al rebaño[b]?”»'
  rationale: Se corrige la ubicación y el contenido de la nota [a] para alinearla con la evidencia fuente y el audit trail inglés, y se reancla [b] en 'rebaño', donde corresponde la alternativa 'las ovejas'. Además, se mejora la naturalidad y precisión de la fórmula divina con 'el Señor, Yahvé' y se aligera 'diles a ellos' a 'diles'.
