lexical_decisions:
- source_word: לְקִישׁ
  english_pob_choice: For Kish
  chosen_spanish: Para Quis
  alternatives_spanish:
  - De Quis
  - 'Como encabezamiento: Quis'
  lexicon: HALOT
  rationale: La preposición לְ aquí funciona como marcador de encabezamiento o tópico en una lista genealógica. «Para» conserva esa función de rótulo de sección de manera natural en español, sin convertirlo en una relación posesiva demasiado fuerte.
- source_word: בְּנֵי
  english_pob_choice: the sons of
  chosen_spanish: los hijos de
  alternatives_spanish:
  - los descendientes de
  - hijos de
  lexicon: HALOT
  rationale: En este contexto genealógico, la expresión literal «hijos de» es clara y fiel. «Descendientes de» sería posible, pero suaviza el paralelismo nominal del texto hebreo.
- source_word: קִישׁ
  english_pob_choice: Kish
  chosen_spanish: Quis
  alternatives_spanish:
  - Kish
  lexicon: transliteración de nombre propio
  rationale: Se vierte el nombre propio con forma española habitual «Quis», manteniendo la identidad del antropónimo y la lectura natural en español bíblico.
- source_word: יְרַחְמְאֵל
  english_pob_choice: Jerahmeel
  chosen_spanish: Jerameel
  alternatives_spanish:
  - Jerahmeel
  lexicon: transliteración de nombre propio
  rationale: Se adapta el nombre propio a una forma española fluida y reconocible, conservando la referencia al personaje nombrado en la lista.
translation_notes:
