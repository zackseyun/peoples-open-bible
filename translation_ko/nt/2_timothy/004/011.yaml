  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Λουκᾶς ἐστιν μόνος μετ’ ἐμοῦ. Μᾶρκον ἀναλαβὼν ἄγε μετὰ σεαυτοῦ, ἔστιν γάρ μοι εὔχρηστος εἰς διακονίαν,
base_translation:
  language: en
  yaml_path: translation/nt/2_timothy/004/011.yaml
  text: Luke alone is with me. Pick up Mark and bring him with you, for he is useful to me for ministry.
translation:
  language: ko
  text: 누가만이 나와 함께 있습니다. 마가를 데리고 함께 오십시오. 그는 사역에[a] 나에게 유익한 사람이기 때문입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「섬김에」. 헬라어 διακονία는 넓게는 섬김 일반을, 좁게는 사역적 봉사를 가리킨다.
    reason: lexical_alternative
lexical_decisions:
- source_word: Λουκᾶς ... Μᾶρκον
  english_pob_choice: Luke ... Mark
  chosen_korean: 누가 ... 마가
  alternatives_korean:
  - 루카 ... 마르코
  lexicon: BDAG
  rationale: 글로사리 지침 및 한국 성서 전통을 따른다.
- source_word: ἀναλαβὼν ἄγε μετὰ σεαυτοῦ
  english_pob_choice: Pick up Mark and bring him with you
  chosen_korean: 마가를 데리고 함께 오십시오
  alternatives_korean:
  - 마가를 모셔서 함께 오십시오
  - 마가를 가는 길에 데리고 오십시오
  lexicon: BDAG
  rationale: ἀναλαμβάνω(데리고 옴)+ἄγε(인도하라)를 한국어 자연스러운 「데리고 함께 오십시오」로 옮긴다.
- source_word: εὔχρηστος εἰς διακονίαν
  english_pob_choice: useful to me for ministry
  chosen_korean: 사역에 나에게 유익한 사람
  alternatives_korean:
  - 섬김에 요긴한 자
  - 봉사에 쓸모 있는 사람
  lexicon: BDAG
  rationale: 2:21의 「주인에게 유익한」(εὔχρηστον τῷ δεσπότῃ)과 어휘 통일. διακονία를 본 문맥에서는 사역적 봉사로 옮긴다.
