translation:
  language: es
  text: Cuando mi vida se iba apagando dentro de mí[a], me acordé de Yahvé, y mi oración llegó hasta ti, a tu santo templo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Cuando mi alma se desmayaba dentro de mí». נפשׁ puede significar «vida», «alma» o «ser», según el contexto.
    reason: lexical_alternative
  - marker: b
    text: O «a tu santo palacio» o «a tu santo santuario». הֵיכָל puede referirse a palacio o templo; aquí «templo» encaja mejor con la oración dirigida a Dios.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּ/הִתְעַטֵּף
  english_pob_choice: was fainting away
  chosen_spanish: se iba apagando
  alternatives_spanish:
  - se desvanecía
  - decaía
  - se iba agotando
  lexicon: HALOT
  rationale: El valor temporal de בְּ + infinitivo se expresa naturalmente con «cuando». En español, «se iba apagando» comunica un debilitamiento progresivo sin volverlo demasiado técnico ni perder la imagen de vida que se extingue.
- source_word: עָלַי
  english_pob_choice: within me
  chosen_spanish: dentro de mí
  alternatives_spanish:
  - en mí
  - sobre mí
  lexicon: HALOT
  rationale: Aunque literalmente puede ser «sobre mí», el contexto de נפשׁ y del colapso interior pide una frase idiomática en español que conserve la interioridad. «Dentro de mí» refleja bien ese sentido sin forzar la imagen.
- source_word: נַפְשִׁי
  english_pob_choice: my life
  chosen_spanish: mi vida
  alternatives_spanish:
  - mi alma
  - mi ser
  - mi persona
  lexicon: HALOT
  rationale: En este contexto de peligro mortal, נפשׁ apunta concretamente a la vida que se extingue. «Mi vida» preserva esa fuerza concreta y evita introducir una antropología más técnica de la que exige el versículo.
- source_word: יְהוָה
  english_pob_choice: the LORD / Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: DOCTRINE.md contested terms
  rationale: 'Se sigue el criterio del proyecto para el nombre divino: en el texto principal se traduce YHWH como «Yahvé», conservando el nombre del pacto en vez de ocultarlo con un sustituto litúrgico.'
- source_word: זָכָרְתִּי
  english_pob_choice: I remembered
  chosen_spanish: me acordé
  alternatives_spanish:
  - recordé
  - me acordé de
  lexicon: HALOT
  rationale: El verbo expresa el acto simple de recordar. En español, «me acordé de Yahvé» es natural y fiel; mantiene la memoria como reacción del orante sin añadir matices no presentes en el hebreo.
- source_word: וַ/תָּבֹא
  english_pob_choice: came
  chosen_spanish: llegó
  alternatives_spanish:
  - vino
  - entró
  - alcanzó
  lexicon: HALOT
  rationale: Para la oración personificada, «llegó hasta ti» reproduce el movimiento hacia Dios de forma clara y sobria. «Llegó» evita la ambigüedad de «vino» en español y preserva la dirección del verbo.
- source_word: תְּפִלָּתִי
  english_pob_choice: my prayer
  chosen_spanish: mi oración
  alternatives_spanish:
  - mi plegaria
  - mi ruego
  lexicon: HALOT
  rationale: «Oración» es el equivalente más directo y estable en español para תפלה. Conserva el registro reverente y la sencillez del original.
- source_word: הֵיכַל קָדְשֶׁךָ
  english_pob_choice: your holy temple
  chosen_spanish: el templo de tu santidad
  alternatives_spanish:
  - tu santo templo
  - tu sagrado templo
  - tu santuario santo
  lexicon: HALOT
  rationale: El sustantivo הֵיכָל puede ser «templo», «palacio» o «santuario». Dado el contexto de la oración, «templo» es el término más claro. La construcción «de tu santidad» mantiene el vínculo con קָדְשֶׁךָ sin neutralizar el peso del sustantivo abstracto ni convertirlo automáticamente en un simple adjetivo.
theological_decisions:
- issue: Nombre divino YHWH
  english_pob_reading: Rendered as Yahweh rather than masking it with 'the LORD'.
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa explícitamente el Tetragrámaton; la traducción española sigue la decisión doctrinal del proyecto de mantener el nombre propio divino visible. «Yahvé» conserva la transparencia auditiva y evita la sustitución eclesiástica tradicional.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Alcance de נַפְשִׁי en el contexto de angustia extrema
  english_pob_reading: my life
  chosen_spanish_reading: mi vida
  alternative_spanish_readings:
  - mi alma
  - mi ser
  - mi persona
  rationale: La escena describe un agotamiento vital, no una formulación doctrinal sobre el alma. «Mi vida» preserva la tensión lexical sin imponer una lectura filosófica ajena al pasaje.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather than resolve it'
- issue: Imagen de la oración que se dirige al santuario
  english_pob_reading: into your holy temple
  chosen_spanish_reading: al templo de tu santidad
  alternative_spanish_readings:
  - en tu santo templo
  - hacia tu santo templo
  - hasta tu santo templo
  rationale: El hebreo marca movimiento hacia el espacio sagrado. En español, la frase mantiene la dirección implícita mediante «llegó hasta ti» y el complemento «al templo», evitando una solución demasiado rígida o una paráfrasis devocional.
  doctrine_reference: Applied revision pass noted the prepositional imagery and its preservation
translation_notes:
  revision_awareness: Tomé en cuenta la revisión reciente que reforzó la imagen de la oración que entra en el espacio santo. Por eso la cláusula final usa «llegó hasta ti» + «al templo», manteniendo el movimiento hacia el santuario sin perder naturalidad en español. También seguí la preferencia del audit trail por preservar la dirección espacial del hebreo, aunque el texto español requiera una formulación idiomática.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» de forma consistente con la terminología del proyecto para YHWH.
  - Se prefirió «vida» para נפשׁ en consonancia con el contexto de agotamiento mortal, pero se dejó nota alternativa para «alma».
  - «Oración» se usó como término estable para תְּפִלָּה.
  - La expresión final conserva el desplazamiento hacia el lugar santo sin sustituirlo por una formulación más teológica o devocional que el hebreo no exige.
