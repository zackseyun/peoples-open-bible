translation:
  language: es
  text: Apartarás para Yahvé todo el que abre el vientre[a], y todo primogénito varón del ganado que tengas le pertenece a Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Literalmente: «todo abridor del vientre» o «todo el que abre el vientre».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַעֲבַרְתָּ
  english_pob_choice: you shall set apart
  chosen_spanish: apartarás
  alternatives_spanish:
  - dedicarás
  - consagrarás
  - harás pasar
  lexicon: HALOT
  rationale: El verbo hiphil de עבר puede expresar ‘hacer pasar’, pero en este contexto cultual la idea es destinar algo a Yahvé. ‘Apartarás’ conserva el valor de separación/consecración sin volverlo un calco rígido.
- source_word: פֶּטֶר רֶחֶם
  english_pob_choice: every one that opens the womb
  chosen_spanish: todo el que abre el vientre
  alternatives_spanish:
  - todo primogénito
  - todo el que abre la matriz
  - todo primer nacido
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente ‘abridor del vientre’ y señala al primer nacimiento. ‘Vientre’ reproduce la imagen con naturalidad en español y mantiene la precisión idiomática del original.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: para Yahvé
  alternatives_spanish:
  - a Yahvé
  - para el SEÑOR
  lexicon: HALOT
  rationale: Se mantiene el nombre divino como ‘Yahvé’, conforme al marco terminológico del proyecto. ‘Para’ comunica bien la destinación/dedicación cultual del objeto o persona apartada.
- source_word: פֶּטֶר שֶׁגֶר בְּהֵמָה
  english_pob_choice: every male firstborn of the livestock
  chosen_spanish: todo primogénito varón del ganado
  alternatives_spanish:
  - todo primer crío del ganado
  - todo primer nacido del ganado
  - todo primer fruto del ganado
  lexicon: HALOT
  rationale: שֶׁגֶר se refiere a la cría o descendencia de los animales; en combinación con פֶּטֶר y la aclaración final ‘los varones’, el sentido es el primer nacido entre el ganado, específicamente varón. ‘Ganado’ es una forma natural en español para el conjunto de animales domésticos del pasaje.
- source_word: אֲשֶׁר יִהְיֶה לְךָ
  english_pob_choice: that you have
  chosen_spanish: que tengas
  alternatives_spanish:
  - que poseas
  - que sea tuyo
  - que esté en tu poder
  lexicon: HALOT
  rationale: La cláusula expresa posesión o pertenencia. ‘Que tengas’ es idiomático y breve en español, y conserva la referencia a los animales que están en posesión del destinatario.
- source_word: הַזְּכָרִים
  english_pob_choice: male
  chosen_spanish: varón
  alternatives_spanish:
  - macho
  - los machos
  - masculino
  lexicon: HALOT
  rationale: En español, ‘varón’ funciona aquí como adjetivo concordante con ‘primogénito’ y evita la dureza de ‘macho’ en un registro bíblico público. Conserva la distinción de sexo requerida por el texto.
- source_word: לַיהוָה
  english_pob_choice: belongs to Yahweh
  chosen_spanish: le pertenece a Yahvé
  alternatives_spanish:
  - es de Yahvé
  - pertenece a Yahvé
  - queda para Yahvé
  lexicon: HALOT
  rationale: La última cláusula declara pertenencia/consecración. ‘Le pertenece a Yahvé’ reproduce la fuerza posesiva del hebreo de manera clara y legal-sacral.
theological_decisions:
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo contiene el Tetragrámaton directamente. Conforme a la terminología del proyecto, se usa ‘Yahvé’ para preservar el nombre del pacto y evitar la sustitución por un título enmascarado.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sentido cultual de וְהַעֲבַרְתָּ
  english_pob_reading: you shall set apart
  chosen_spanish_reading: apartarás
  alternative_spanish_readings:
  - consagrarás
  - dedicarás
  - harás pasar
  rationale: El contexto no exige una traducción meramente literal de ‘hacer pasar’, sino la función ritual de destinar algo a Yahvé. ‘Apartarás’ mantiene esa tensión entre el movimiento literal y la consagración cultual.
  doctrine_reference: HALOT, entrada עבר en hiphil; contexto de primicias y consagración
- issue: Identificación de פֶּטֶר שֶׁגֶר בְּהֵמָה
  english_pob_reading: every male firstborn of the livestock
  chosen_spanish_reading: todo primogénito varón del ganado
  alternative_spanish_readings:
  - todo primer nacido varón del ganado
  - todo primogénito macho del ganado
  rationale: El hebreo combina la idea de ‘abrir’ con la de ‘cría/descendencia’ animal, y la cláusula final limita el grupo a los machos. La formulación española conserva la restricción sexual y el carácter de primer nacido sin añadir explicaciones innecesarias en el texto principal.
  doctrine_reference: HALOT, entradas פֶּטֶר, שֶׁגֶר, זָכָר
translation_notes:
  revision_awareness: La redacción sigue el último pase de revisión del POB en cuanto a la estructura de la cláusula animal (‘every male firstborn of the livestock’) y refleja el consenso alto del control cruzado. Se decidió mantener la fuerza cultual de ‘set apart’ mediante ‘apartarás’, y la nota léxica conserva la lectura alternativa literal del hebreo sobre ‘abrir el vientre’.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ de forma uniforme para יהוה, según el estándar del proyecto.
  - Se evita ‘SEÑOR’ como máscara litúrgica para no borrar el nombre divino del original.
  - ‘Primogénito varón’ conserva la restricción de sexo sin introducir ‘macho’ en el texto principal.
  - ‘Ganado’ funciona como equivalente natural de בְּהֵמָה en este contexto de animales domésticos.
