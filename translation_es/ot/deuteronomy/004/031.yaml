translation:
  language: es
  text: Porque Yahvé tu Dios es un Dios compasivo[a]; no te abandonará[b] ni te destruirá ni olvidará el pacto de tus padres[c] que les juró.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «misericordioso».
    reason: lexical_alternative
  - marker: b
    text: O «no te dejará».
    reason: lexical_alternative
  - marker: c
    text: O «el pacto de tus antepasados». El hebreo dice «tus padres», refiriéndose a los antepasados pactales de Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la razón o fundamento de la exhortación anterior. «Porque» preserva el valor explicativo y suena natural en español.
- source_word: אֵל רַחוּם
  english_pob_choice: a compassionate God
  chosen_spanish: un Dios compasivo
  alternatives_spanish:
  - un Dios misericordioso
  - un Dios lleno de compasión
  lexicon: HALOT
  rationale: רַחוּם expresa compasión/clemencia; «compasivo» comunica bien ese rasgo divino en español moderno sin perder dignidad ni introducir una formulación demasiado litúrgica.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se conserva el nombre divino del Tetragrámaton como «Yahvé», según el criterio del proyecto, en vez de sustituirlo por un título.
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu Dios
  lexicon: HALOT
  rationale: Mantiene el sentido de pacto y la segunda persona singular del hebreo de manera directa y clara.
- source_word: לֹא יַרְפְּךָ
  english_pob_choice: he will not abandon you
  chosen_spanish: no te abandonará
  alternatives_spanish:
  - no te dejará
  - no te soltará
  - no te desamparará
  lexicon: HALOT
  rationale: El verbo transmite la idea de soltar/dejar sin sostén; «abandonará» comunica bien el sentido relacional y de pacto en español contemporáneo.
- source_word: וְלֹא יַשְׁחִיתֶךָ
  english_pob_choice: or destroy you
  chosen_spanish: ni te destruirá
  alternatives_spanish:
  - ni te arruinará
  - ni te corromperá
  lexicon: HALOT
  rationale: שׁחת en esta forma expresa destruir/arruinar. «Destruirá» es la opción más directa y fiel en este contexto.
- source_word: וְלֹא יִשְׁכַּח אֶת בְּרִית
  english_pob_choice: or forget the covenant
  chosen_spanish: ni olvidará el pacto
  alternatives_spanish:
  - ni descuidará el pacto
  - ni pasará por alto el pacto
  lexicon: HALOT
  rationale: Se mantiene el verbo «olvidar» porque el hebreo lo expresa de modo literal y teológicamente importante; «pacto» conserva la referencia formal al acuerdo covenantal.
- source_word: בְּרִית אֲבֹתֶיךָ
  english_pob_choice: the covenant of your fathers
  chosen_spanish: el pacto de tus padres
  alternatives_spanish:
  - el pacto de tus antepasados
  lexicon: HALOT
  rationale: El hebreo dice literalmente «padres», con referencia histórica a los padres/patriarcas del pueblo. «Padres» preserva esa especificidad masculina y de pacto.
- source_word: אֲשֶׁר נִשְׁבַּע לָהֶם
  english_pob_choice: that he swore to them
  chosen_spanish: que juró a ellos
  alternatives_spanish:
  - que les juró
  - que se lo juró a ellos
  lexicon: HALOT
  rationale: נשבע indica jurar un juramento solemne. «Juró a ellos» conserva la forma y el peso del juramento del texto.
theological_decisions:
- issue: Traducción del Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: El versículo contiene explícitamente el Tetragrámaton. El proyecto requiere reproducir el nombre divino en la forma española «Yahvé», no ocultarlo tras una sustitución titulada.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Referencia genealógico-covenantal אֲבֹתֶיךָ
  english_pob_reading: the covenant of your fathers
  chosen_spanish_reading: el pacto de tus padres
  alternative_spanish_readings:
  - el pacto de tus antepasados
  rationale: El hebreo es masculino plural y alude a los padres/patriarcas del pacto; «padres» conserva esa especificidad histórica y no generaliza indebidamente a «antepasados».
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: El texto español sigue de cerca el hebreo y concuerda con el audit trail en inglés. No se introdujeron revisiones adicionales porque el consenso de revisión indica alta conformidad y no hubo cambios aplicados.
  spanish_consistency_notes:
  - Se usó «Yahvé» para el Nombre divino, conforme al estándar del proyecto.
  - Se mantuvo «pacto» para בְּרִית, sin reemplazarlo por un término más general.
  - Se conservó «padres» en el sentido histórico-covenantal del hebreo masculino plural.
  - La puntuación y el orden de cláusulas buscan ser naturales en español sin diluir la paralelía negativa del original.
