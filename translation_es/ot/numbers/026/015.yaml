review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura genealógica del hebreo: «Los hijos de Gad, por sus clanes» refleja adecuadamente בְּנֵי גָד לְמִשְׁפְּחֹתָם, y la secuencia «de X, el clan de los Xitas» preserva la fórmula repetida de descendencia/clan. También conserva correctamente la nota textual sobre צפון/Zephon. Sin embargo, varios etnónimos y transliteraciones en español están poco naturalizados o inconsistente con una lectura eclesial amplia.'
  spanish_quality_summary: El texto es claro, pero «haggitas» y «shunitas» con grafías iniciales dobles o con sh resultan poco naturales en español y suenan más a calco del inglés. Además, «zefonitas» en minúscula tras nombre propio puede mantenerse, pero la serie completa mejora con gentilicios hispanizados consistentes. «Hagui» y «Suni» son formas más naturales que «Hagui»/«Shuni» mezcladas con etnónimos semianglicados.
  glossary_alignment: No hay términos teológicos sensibles en este versículo. La principal cuestión es de transliteración y legibilidad en nombres propios y gentilicios. Se debe preservar «Zefón» por la evidencia masorética y mantener la nota textual; conviene hispanizar los derivados como «zefonitas», «haguítas» y «sunitas».
  issues:
  - severity: medium
    issue: «haggitas» es una forma poco natural en español
    rationale: Duplica la grafía inglesa con doble g y produce una forma extraña para lectores hispanos. Un gentilicio español legible y fiel sería «haguítas».
  - severity: medium
    issue: «Shuni» / «shunitas» conservan una transliteración demasiado anglicada
    rationale: La secuencia sh no es la opción más natural en español bíblico general. «Suni» / «sunitas» transmite el nombre con mayor legibilidad sin perder referencia.
  - severity: low
    issue: Inconsistencia de naturalización entre los nombres y sus gentilicios
    rationale: El borrador mezcla formas hispanizadas («Zefón») con otras casi calcadas del inglés («Shuni», «haggitas»). Una serie más uniforme mejora la dignidad y claridad del texto.
  revised_spanish_text: 'Los hijos de Gad, por sus clanes: de Zefón[a], el clan de los zefonitas; de Hagui, el clan de los haguítas; de Suni, el clan de los sunitas.'
  revised_footnotes:
  - marker: a
    text: Algunas tradiciones en inglés leen «Zifón» / «zifonitas» aquí (compárese Génesis 46:16), pero el Texto Masorético de este versículo dice «Zefón» (צפון), por lo que se mantiene «Zefón» en el texto principal.
    reason: textual_variant
  revision_rationale: 'Se mantiene la estructura y el sentido del hebreo, así como la decisión textual de conservar «Zefón». Se ajustan las transliteraciones para un español más natural y consistente: «haguítas» evita el calco extraño «haggitas», y «Suni/sunitas» evita la grafía anglicada con sh. No se requiere nota adicional porque el cambio es estilístico/ortográfico, no textual ni teológico.'
