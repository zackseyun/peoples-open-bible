  to: a los que guardan su alianza[a], y a los que recuerdan sus preceptos[b], para hacerlos.
  rationale: Se ajusta בְּרִיתוֹ a «alianza» por ser más natural y teológicamente adecuado en español bíblico, manteniendo «pacto» como alternativa válida en nota. Se cambia «para cumplirlos» por «para hacerlos» para reflejar más de cerca לַעֲשׂוֹתָם y la decisión final del POB inglés («to do them»). Se corrige la nota [a] para que sea una alternativa real y no una repetición del texto principal.
