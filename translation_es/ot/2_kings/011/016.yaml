review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del hebreo y del POB inglés: aprehensión de Atalía, traslado por la vía asociada a la entrada de los caballos hacia la casa del rey, y ejecución allí. Sin embargo, «pasó» debilita וַתָּבֹא, que en el contexto se refleja mejor como movimiento direccional simple («fue»), y la secuencia «por el camino de la entrada de los caballos hacia la casa del rey» suena menos fiel a la relación sintáctica de דֶּרֶךְ מְבוֹא הַסּוּסִים בֵּית הַמֶּלֶךְ que una formulación más directa como «por el camino de la entrada de los caballos a la casa del rey».'
  spanish_quality_summary: El español es generalmente claro y digno. «Le echaron mano» es idiomático y adecuado. No obstante, «ella pasó» resulta algo extraño aquí y puede sugerir simplemente tránsito, no conducción/movimiento al lugar de ejecución. Además, «hacia la casa del rey» introduce una relación menos compacta que el original. «Fue puesta a muerte» es aceptable y sobrio.
  glossary_alignment: 'No hay términos del glosario de proyecto en juego de forma conflictiva. Las decisiones léxicas principales respetan el razonamiento auditado: modismo de aprehensión, «entrada» en vez de imponer «puerta», «casa del rey» en vez de parafrasear como «palacio», y pasivo ejecutivo en «fue puesta a muerte».'
  issues:
  - severity: medium
    issue: «pasó» para וַתָּבֹא
    rationale: El hebreo marca movimiento simple «vino/fue». «Pasó» en español puede sonar a transitar por un lugar más que a ir por una ruta específica hacia el punto de ejecución. «Fue» preserva mejor la neutralidad del verbo fuente y la decisión del POB inglés.
  - severity: low
    issue: «hacia la casa del rey»
    rationale: La preposición «hacia» añade matiz de dirección aproximativa. La cadena hebrea y la nota inglesa describen la entrada de los caballos perteneciente o conducente a la casa del rey. «a la casa del rey» o una formulación equivalente refleja mejor la relación.
  revised_spanish_text: Así que le echaron mano[a], y ella fue por el camino de la entrada de los caballos[b] a la casa del rey, y allí fue puesta a muerte.
  revised_footnotes:
  - marker: a
    text: 'O: «la apresaron». El hebreo admite la idea concreta de sujetar o capturar; la frase española conserva el modismo sin excluir esa lectura.'
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «la entrada de los caballos». Probablemente alude al acceso o paso por donde entraban los caballos al recinto real.
    reason: cultural_note
  revision_rationale: Se ajusta «pasó» a «fue» para reflejar mejor וַתָּבֹא sin añadir matiz interpretativo, y se simplifica la relación sintáctica de la ruta con la casa del rey usando «a la casa del rey» en vez de «hacia la casa del rey». El resto del borrador puede mantenerse.
