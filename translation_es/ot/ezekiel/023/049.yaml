translation:
  language: es
  text: Harán recaer sobre ustedes su lascivia, y ustedes cargarán con los pecados de sus ídolos[a]; entonces sabrán que yo soy el Señor Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo גִלּוּלִים es un término fuertemente despectivo para los ídolos; también puede verterse como “ídolos inmundos” o, con más viveza, “ídolos de estiércol”.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָתְנוּ
  english_pob_choice: They will bring
  chosen_spanish: traerán
  alternatives_spanish:
  - pondrán
  - colocarán
  lexicon: HALOT
  rationale: נתן aquí conserva una fuerza concreta de poner/traer sobre alguien algo que le corresponde como juicio; en español, 'traerán sobre ustedes' transmite bien la idea de hacer recaer algo sobre ellas sin sonar forzado.
- source_word: זִמַּתְכֶנָה
  english_pob_choice: your lewdness
  chosen_spanish: su lascivia
  alternatives_spanish:
  - su perversidad
  - su desenfreno
  lexicon: HALOT
  rationale: En Ezequiel 23 el término pertenece a un contexto sexual-moral; 'lascivia' preserva el matiz de conducta sexual vergonzosa sin diluirlo en una generalidad moral.
- source_word: עֲלֵיכֶן
  english_pob_choice: upon you
  chosen_spanish: sobre ustedes
  alternatives_spanish:
  - encima de ustedes
  - contra ustedes
  lexicon: HALOT
  rationale: La preposición עַל expresa que la carga o consecuencia recae sobre ellas; 'sobre ustedes' mantiene la imagen de imposición/judicio en español natural.
- source_word: וַחֲטָאֵי
  english_pob_choice: and the sins of
  chosen_spanish: los pecados de
  alternatives_spanish:
  - las culpas de
  - las faltas de
  lexicon: HALOT
  rationale: חטאים se entiende con claridad como 'pecados'; esta forma conserva el lenguaje de responsabilidad moral y judicial del pasaje.
- source_word: גִלּוּלֵיכֶן
  english_pob_choice: your idols
  chosen_spanish: sus ídolos
  alternatives_spanish:
  - sus ídolos detestables
  - sus ídolos inmundos
  lexicon: HALOT
  rationale: Aunque גִלּוּלִים es un término despectivo, el texto principal puede decir 'ídolos' con la nota de su carga peyorativa; así se evita sobrecargar la línea principal y se preserva la transparencia auditiva.
- source_word: תִּשֶּׂאינָה
  english_pob_choice: you will bear
  chosen_spanish: cargarán con
  alternatives_spanish:
  - llevarán
  - soportarán
  lexicon: HALOT
  rationale: נשא en este marco legal significa llevar/cargar una culpa. 'Cargar con' comunica bien la carga de culpa o castigo, con un matiz más idiomático en español que 'llevar'.
- source_word: וִידַעְתֶּם
  english_pob_choice: then you will know
  chosen_spanish: entonces sabrán
  alternatives_spanish:
  - y sabrán
  - así sabrán
  lexicon: HALOT
  rationale: La secuencia causal o consecuencial del hebreo se expresa naturalmente con 'entonces' en español, manteniendo el tono profético de reconocimiento posterior al juicio.
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord YHWH
  chosen_spanish: el Señor Yahvé
  alternatives_spanish:
  - el Señor YHWH
  - el Señor Yahveh
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
  rationale: 'Se sigue la norma del proyecto para el Tetragrámaton: ''Yahvé'' en el texto principal. ''Señor'' traduce אֲדֹנָי y se mantiene la distinción reverente sin ocultar el nombre divino.'
theological_decisions:
- issue: Mantenimiento del nombre divino frente al título אֲדֹנָי
  english_pob_reading: the Lord YHWH
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor YHWH
  - el Señor Yahveh
  rationale: 'El hebreo combina el título אֲדֹנָי con el nombre del pacto יְהוָה. En español, ''el Señor Yahvé'' conserva ambos elementos: el título soberano y el nombre propio revelado.'
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Carga despectiva de גִלּוּלִים
  english_pob_reading: your idols
  chosen_spanish_reading: sus ídolos
  alternative_spanish_readings:
  - sus ídolos inmundos
  - sus ídolos detestables
  rationale: La línea principal conserva la referencia semántica básica ('ídolos') y deja la valoración despectiva para la nota, evitando una sobretraducción que altere el flujo del versículo.
  doctrine_reference: Lexical note from English POB audit trail on גִלּוּלִים
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB en sentido de dar una expresión más natural para וְנָתְנוּ (‘traerán sobre’), y refleja de forma transparente el nombre divino con Yahvé, en consonancia con la decisión doctrinal actual. También conserva el valor forense de ‘cargar con’ para נשא y mantiene el final profético de reconocimiento.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para יְהוָה conforme al estándar del proyecto.
  - Se conserva 'Señor' para אֲדֹנָי para mantener la distinción entre título y nombre propio.
  - '''Lascivia'' se usa por el contexto sexual-moral de Ezequiel 23.'
  - '''Ídolos'' aparece en el texto principal y la nota recupera el matiz despectivo de גִלּוּלִים.'
  - '''Cargar con'' transmite la carga de culpa/judicio de נשא en este contexto.'
