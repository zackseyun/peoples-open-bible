base_translation:
  language: en
  yaml_path: translation/nt/luke/023/022.yaml
  text: And he said to them a third time[a], “Why? What evil has this man done? I have found in him no grounds for death. Therefore, after disciplining him[c][b], I will release him.”
  footnotes:
  - marker: a
    text: Or “For what evil has this man done?” The opening Τί may be taken as an elliptical protest introducing the fuller question.
    reason: lexical_alternative
  - marker: b
    text: Or “no cause for death,” “nothing deserving death,” or “no basis for a death sentence.”
    reason: lexical_alternative
  - marker: c
    text: Or “after punishing him”; possibly more specifically “after flogging him.” The Greek παιδεύσας denotes disciplinary punishment, but the exact form is not specified by this word alone.
    reason: lexical_alternative
