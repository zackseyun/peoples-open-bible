review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del hebreo: Moisés selecciona hombres calificados de entre todo Israel y los pone en autoridad sobre el pueblo en una estructura por miles, cientos, cincuentas y dieces. Sin embargo, hay dos desajustes importantes con el rastro POB y con el español natural: (1) la nota al pie inglesa marcada en b sobre רָאשִׁים/«heads» no fue preservada en español, pese a que el inglés la conserva como alternativa significativa; (2) «jefes de ciento» suena menos natural que «jefes de cien» en español bíblico moderno, mientras mantiene el mismo valor numérico del hebreo. Además, la repetición de «jefes» para רָאשִׁים y שָׂרֵי es aceptable, pero conviene mantener la nota que explique el valor metafórico de רָאשִׁים.'
  spanish_quality_summary: El texto es claro y legible, con un registro digno y natural. «Moisés escogió» y «de entre todo Israel» funcionan bien. «Varones capaces» es fiel, aunque algo más tradicional que «hombres capaces»; no es necesario cambiarlo. «Los nombró jefes sobre el pueblo» es comprensible, pero al faltar la nota sobre «cabezas/jefes» se pierde una decisión lexical documentada. La serie final mejora con «jefes de mil, de cien, de cincuenta y de diez».
  glossary_alignment: 'No hay términos del glosario global especialmente comprometidos en este versículo. Las decisiones principales están bien alineadas: בחר -> «escogió», אַנְשֵׁי חַיִל -> «varones capaces», נתן idiomático -> «nombró», y la jerarquía numérica se mantiene. La principal falta de alineación es metodológica: no se preservó en español una alternativa lexical significativa ya documentada por el POB inglés para רָאשִׁים.'
  issues:
  - severity: medium
    issue: Falta la nota al pie correspondiente a la alternativa lexical sobre רָאשִׁים ('heads').
    rationale: El POB inglés conserva una nota b que explica el uso metafórico de «heads» como autoridades. La instrucción exige preservar alternativas significativas cuando el inglés las preserva. El borrador español no la incluye.
  - severity: medium
    issue: «Jefes de ciento» suena menos idiomático que «jefes de cien».
    rationale: Aunque «ciento» no es imposible, en títulos de grupos y divisiones «de cien» es la forma más natural y ampliamente legible en español sin perder fidelidad al hebreo מֵאוֹת.
  - severity: low
    issue: La duplicación de «jefes» para רָאשִׁים y שָׂרֵי neutraliza una distinción léxica del hebreo.
    rationale: No constituye error grave porque el contexto administrativo se entiende, pero conviene compensarlo con la nota explicativa sobre el valor metafórico de רָאשִׁים, como hace el inglés.
  - severity: low
    issue: "Hay un error tipográfico en las decisiones léxicas: «los nombró» tiene como alternativa «los \0नियुक्तó»."
    rationale: No afecta el texto bíblico publicado, pero muestra ruido editorial y debe corregirse en el expediente de revisión.
  revised_spanish_text: 'Moisés escogió varones capaces[a] de entre todo Israel y los nombró jefes[b] sobre el pueblo: jefes de mil, jefes de cien, jefes de cincuenta y jefes de diez.'
  revised_footnotes:
  - marker: a
    text: O «aptos». La frase hebrea אַנְשֵׁי חַיִל puede denotar hombres de fuerza, capacidad o probado valor; en este contexto señala principalmente idoneidad para el liderazgo.
    reason: lexical_alternative
  - marker: b
    text: O «líderes» o «principales» sobre el pueblo. El hebreo usa «cabezas» de manera metafórica para personas en autoridad.
    reason: lexical_alternative
  revision_rationale: Se añade la nota b para preservar una alternativa lexical significativa documentada en el POB inglés sobre רָאשִׁים, y se ajusta «jefes de ciento» a «jefes de cien» por naturalidad idiomática en español. Se mantiene el resto del texto porque refleja bien el sentido del hebreo y el registro buscado.
