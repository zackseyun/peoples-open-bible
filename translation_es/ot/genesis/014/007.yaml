translation:
  language: es
  text: Entonces se volvieron y llegaron a En-mispat (es decir[a], Cadés), e hirieron todo el país de los amalecitas[b], y también a los amorreos que habitaban en Hazazón-tamar[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: En-mispat significa «fuente de juicio».
    reason: cultural_note
  - marker: b
    text: O «todo el campo/país de los amalecitas». El hebreo dice literalmente «todo el campo del amalecita», probablemente con el sentido de la región ocupada por los amalecitas.
    reason: lexical_alternative
  - marker: c
    text: Hazazón-tamar se identifica con En-gedi en 2 Crónicas 20:2.
    reason: cross_reference
lexical_decisions:
- source_word: וַיָּשֻׁבוּ
  english_pob_choice: Then they turned back
  chosen_spanish: Entonces ellos se volvieron
  alternatives_spanish:
  - Entonces regresaron
  - Luego volvieron
  lexicon: HALOT
  rationale: El valor narrativo secuencial de la forma wayyiqtol pide una marca de progresión temporal como «entonces». «Se volvieron» conserva el matiz direccional de שוב, cercano a «turn back», sin perder naturalidad en español.
- source_word: וַיָּבֹאוּ
  english_pob_choice: and came to
  chosen_spanish: y llegaron a
  alternatives_spanish:
  - y vinieron a
  - y llegaron hasta
  lexicon: HALOT
  rationale: בוא con אֶל introduce meta de movimiento; «llegaron a» es natural y mantiene el cierre del desplazamiento previo.
- source_word: עֵין מִשְׁפָּט
  english_pob_choice: En-mishpat
  chosen_spanish: En-mispat
  alternatives_spanish:
  - Fuente de juicio
  - Ain-mispat
  lexicon: HALOT
  rationale: Se conserva el topónimo transliterado. En español bíblico conviene mantener el nombre propio; la forma «mispat» refleja mejor la transliteración usual del hebreo que una traducción del significado en el texto principal.
- source_word: הִוא קָדֵשׁ
  english_pob_choice: (that is, Kadesh)
  chosen_spanish: (es decir, Cadés)
  alternatives_spanish:
  - (esto es, Cadés)
  - (que es Cadés)
  lexicon: HALOT
  rationale: La construcción pronominal identifica el lugar con otro nombre. «Es decir» comunica la glosa explicativa de modo claro y moderno; «Cadés» es la forma española habitual del topónimo.
- source_word: וַיַּכּוּ
  english_pob_choice: and struck
  chosen_spanish: e hirieron
  alternatives_spanish:
  - y golpearon
  - y derrotaron
  lexicon: HALOT
  rationale: נכה admite el sentido de golpear/herir/derrotar. «Hirieron» conserva la fuerza verbal concreta sin añadir la implicación de conquista total que el hebreo no explicita.
- source_word: כָּל שְׂדֵה הָעֲמָלֵקִי
  english_pob_choice: all the country of the Amalekites
  chosen_spanish: todo el campo de los amalecitas
  alternatives_spanish:
  - toda la región de los amalecitas
  - todo el territorio de los amalecitas
  lexicon: HALOT
  rationale: שָׂדֶה literalmente es «campo», y la POB inglesa conserva esa cercanía léxica. En español, «campo» mantiene la literalidad; el contexto geográfico sigue sugiriendo una zona/área ocupada por ese pueblo.
- source_word: הָעֲמָלֵקִי
  english_pob_choice: the Amalekites
  chosen_spanish: los amalecitas
  alternatives_spanish:
  - el amalecita
  lexicon: HALOT
  rationale: Aunque el gentilicio es singular en forma, en español la referencia colectiva a un pueblo se expresa normalmente en plural.
- source_word: וְגַם
  english_pob_choice: and also
  chosen_spanish: y también
  alternatives_spanish:
  - también
  - y además
  lexicon: HALOT
  rationale: La partícula añade un segundo objetivo del ataque; «y también» conserva la adición enfática sin sonar pesada.
- source_word: הָאֱמֹרִי
  english_pob_choice: the Amorites
  chosen_spanish: a los amorreos
  alternatives_spanish:
  - al amorreo
  lexicon: HALOT
  rationale: Se trata de un colectivo étnico; el plural español es la forma natural para el grupo.
- source_word: הַיֹּשֵׁב
  english_pob_choice: who were living
  chosen_spanish: que habitaban
  alternatives_spanish:
  - que vivían
  - que moraban
  lexicon: HALOT
  rationale: El participio expresa residencia continuada. «Habitaban» conserva el carácter durativo y es sobrio en registro bíblico sin ser arcaizante.
- source_word: בְּחַצְצֹן תָּמָר
  english_pob_choice: in Hazazon-tamar
  chosen_spanish: en Hazazón-tamar
  alternatives_spanish:
  - en Hazazón de Tamar
  lexicon: HALOT
  rationale: Se translitera el topónimo; la preposición hebrea בְ se refleja con «en». Se mantiene la forma compuesta del nombre propio según la tradición de traducción bíblica en español.
theological_decisions:
- issue: Identificación explicativa de En-mispat con Cadés
  english_pob_reading: (that is, Kadesh)
  chosen_spanish_reading: (es decir, Cadés)
  alternative_spanish_readings:
  - (esto es, Cadés)
  - (que es Cadés)
  rationale: No hay conflicto doctrinal; se preserva la glosa explicativa del texto para evitar tratar los dos nombres como lugares distintos.
  doctrine_reference: Toponimia bíblica / claridad textual
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión final del inglés POB que prefirió «country» sobre «territory» para שְׂדֵה. En español se eligió «campo» para mantener la cercanía léxica con el hebreo, y se documentó la alternativa regional en la nota b, de modo análogo a la tensión textual conservada por la POB inglesa.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto solo cuando aparezca el tetragrámaton; este versículo no lo contiene.
  - 'Los nombres propios se transliteran de forma estable: En-mispat, Cadés, Hazazón-tamar.'
  - Se usa plural colectivo en etnónimos («amalecitas», «amorreos») por naturalidad del español bíblico moderno.
