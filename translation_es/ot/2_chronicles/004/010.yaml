translation:
  language: es
  text: Y puso el Mar[a] en el lado derecho, hacia el oriente, opuesto al sur.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente, 'en el lado derecho, hacia el oriente, opuesto al sur'. Como la orientación espacial hebrea suele asumir una mirada hacia el este, 'el lado derecho' corresponde al sur; juntas, las expresiones indican el lado sureste.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֶת
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Ahora
  - Y en cuanto a
  lexicon: HALOT
  rationale: La conjunción enlaza esta nota de colocación con la descripción previa. El objeto directo marcado por אֵת no se expresa en español.
- source_word: הַיָּם
  english_pob_choice: the Sea
  chosen_spanish: el Mar[a]
  alternatives_spanish:
  - la fuente
  - el mar fundido
  lexicon: HALOT
  rationale: Se conserva la designación literal del objeto ritual; en español, 'Mar' puede funcionar como nombre propio del gran recipiente de bronce. La mayúscula ayuda a distinguirlo como mueble del templo.
- source_word: נָתַן
  english_pob_choice: set
  chosen_spanish: puso
  alternatives_spanish:
  - colocó
  - situó
  lexicon: HALOT
  rationale: '''Puso'' es natural para el acto de ubicar un objeto físico y evita una paráfrasis más interpretativa.'
- source_word: מִכֶּתֶף
  english_pob_choice: at the ... side
  chosen_spanish: al lado
  alternatives_spanish:
  - en el flanco
  - desde el hombro
  lexicon: HALOT
  rationale: כָּתֵף literalmente es 'hombro', pero en descripciones espaciales significa costado o lado. 'Al lado' comunica el sentido idiomático sin calco extraño.
- source_word: הַיְמָנִית
  english_pob_choice: right side
  chosen_spanish: derecho
  alternatives_spanish:
  - de la derecha
  - diestro
  lexicon: HALOT
  rationale: Se preserva la referencia al lado derecho sin convertirla en una interpretación direccional completa que ya incluye la frase siguiente.
- source_word: קֵדְמָה
  english_pob_choice: eastward
  chosen_spanish: hacia el oriente
  alternatives_spanish:
  - al oriente
  - hacia el este
  lexicon: HALOT
  rationale: El adverbio aporta la componente oriental de la ubicación. 'Hacia el oriente' es claro y mantiene el valor direccional.
- source_word: מִמּוּל
  english_pob_choice: opposite
  chosen_spanish: frente a
  alternatives_spanish:
  - opuesto a
  - enfrente de
  lexicon: HALOT
  rationale: La preposición indica orientación relativa al sur. 'Frente a' expresa la relación espacial de manera fluida en español.
- source_word: נֶגְבָּה
  english_pob_choice: the south
  chosen_spanish: el sur
  alternatives_spanish:
  - hacia el sur
  - la parte sur
  lexicon: HALOT
  rationale: Denota la dirección sur. Después de 'frente a', 'el sur' resulta idiomático y mantiene la referencia geográfica.
theological_decisions:
- issue: Orientación espacial del recipiente llamado 'Mar'
  english_pob_reading: 'The English POB keeps the literal ''Sea'' and the explicit spatial components: right side, eastward, opposite the south.'
  chosen_spanish_reading: Se conserva 'Mar' como designación del objeto y se mantienen las cuatro marcas espaciales sin fusionarlas en una sola interpretación.
  alternative_spanish_readings:
  - el mar de bronce
  - la fuente grande
  rationale: El hebreo nombra el objeto con 'el Mar'; fusionar la ubicación en 'sureste' borraría componentes textuales que la revisión inglesa decidió preservar. Mantenerlas por separado respeta la evidencia y deja visible la orientación original.
  doctrine_reference: 1 Reyes 7:23-26; 2 Crónicas 4:2-5
translation_notes:
  revision_awareness: 'La versión inglesa revisada corrigió una paráfrasis interpretativa (''southeast side'') para reflejar más plenamente los elementos del hebreo: ''right side'', ''eastward'' y ''opposite the south''. La traducción española sigue esa revisión y evita condensar la orientación en un solo término.'
  spanish_consistency_notes:
  - Se mantiene 'Mar' con mayúscula como designación del objeto del templo, paralelo al inglés 'Sea'.
  - Se conserva la secuencia de relaciones espaciales en el mismo orden del hebreo para no perder el matiz direccional.
  - '''Oriente'' se usa como equivalente digno y natural de ''eastward'' en un registro bíblico moderno.'
