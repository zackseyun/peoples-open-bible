revisions:
- from: 'También sacudí el pliegue de mi manto[a] y dije: «Así sacuda Dios a todo hombre que no cumpla[b] esta promesa, desde su casa y desde su trabajo[c]; así sea sacudido y quede vacío». Y toda la asamblea dijo: «Amén», y alabaron a Yahvé. Y el pueblo hizo conforme a esta promesa.'
  to: 'También sacudí el pliegue de mi manto[a] y dije: «Así sacuda Dios a todo hombre que no cumpla[b] esta promesa; así sea sacudido de su casa y del fruto de su trabajo[c], y quede vacío». Y toda la asamblea dijo: «Amén», y alabó a Yahvé. Y el pueblo hizo conforme a esta promesa.'
