translation:
  language: es
  text: 'Entonces Manoaj dijo al ángel de Yahvé[a]: «¿Cuál es tu nombre, para que, cuando se cumplan tus palabras, te honremos?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el mensajero de Yahvé».
    reason: lexical_alternative
lexical_decisions:
- source_word: מַלְאַךְ יְהוָה
  english_pob_choice: the angel of the LORD
  chosen_spanish: el ángel de Yahvé
  alternatives_spanish:
  - el mensajero de Yahvé
  lexicon: HALOT
  rationale: מַלְאַךְ puede significar tanto «mensajero» como «ángel». En este relato la figura aparece con rasgos sobrenaturales, por lo que «ángel» comunica mejor el valor narrativo. יְהוָה se vierte como «Yahvé» conforme al estándar del proyecto para el nombre divino.
- source_word: מִי שְׁמֶךָ
  english_pob_choice: What is your name
  chosen_spanish: ¿Cuál es tu nombre?
  alternatives_spanish:
  - ¿Quién eres por nombre?
  - ¿Cómo te llamas?
  lexicon: HALOT
  rationale: La expresión hebrea pregunta por el nombre de la persona; en español natural y fiel, «¿Cuál es tu nombre?» expresa ese sentido sin volverlo rígido ni introducir matices innecesarios.
- source_word: כִּי
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - porque
  - cuando
  - a fin de que
  lexicon: HALOT
  rationale: Aquí כִּי introduce finalidad o resultado respecto de la pregunta de Manoaj. «Para que» conserva bien esa relación de propósito en español.
- source_word: יָבֹא דְבָרֶיךָ
  english_pob_choice: your words come to pass
  chosen_spanish: se cumpla tu palabra
  alternatives_spanish:
  - se cumplan tus palabras
  - llegue a cumplirse lo que dijiste
  lexicon: HALOT
  rationale: Aunque דְבָרֶיךָ es morfológicamente plural, el hebreo puede referirse al dicho o mensaje como un todo. En español, «tu palabra» refleja con naturalidad el contenido anunciado, y «se cumpla» expresa la idea de realización/acontecimiento del mensaje.
- source_word: וְכִבַּדְנוּךָ
  english_pob_choice: we may honor you
  chosen_spanish: te honremos
  alternatives_spanish:
  - te honraremos
  - te mostremos honor
  - te demos honra
  lexicon: HALOT
  rationale: El piʿel de כבד expresa dar honor o tratar con honra. «Te honremos» mantiene la fuerza verbal y la intención de Manoaj sin añadir elevación teológica ajena al contexto.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo emplea directamente el Tetragrámaton. Siguiendo la convención del proyecto para el nombre divino, se conserva como «Yahvé» en vez de sustituirlo por una máscara litúrgica.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: La revisión más reciente indica que no se requieren cambios; el borrador mantiene alta concordancia con el análisis hebreo y la decisión de renderizar el nombre divino como Yahvé.
  spanish_consistency_notes:
  - Se mantiene la distinción entre «ángel» y «mensajero» como alternativa documentada, sin forzar una equivalencia única.
  - «Palabra» se usa para דְבָרֶיךָ en un sentido de mensaje prometido/realizado, coherente con la intención contextual de cumplimiento.
  - El tono es bíblico y claro, evitando calcos duros y también evitando una paráfrasis libre.
