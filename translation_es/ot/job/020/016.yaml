translation:
  language: es
  text: Chupa el veneno[a] de cobras[b]; la lengua de una víbora lo mata.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'ponzoña de cobras'; el hebreo dice literalmente 'cabeza de cobras', con 'cabeza' usado idiomáticamente para el veneno en este contexto.
    reason: lexical_alternative
  - marker: b
    text: Tradicionalmente, 'áspides' en lugar de 'cobras'.
    reason: lexical_alternative
lexical_decisions:
- source_word: רֹאשׁ
  english_pob_choice: venom
  chosen_spanish: veneno
  alternatives_spanish:
  - veneno de serpiente
  - ponzoña
  - cabeza
  lexicon: HALOT
  rationale: En este contexto poético, רֹאשׁ no se entiende como 'cabeza' literal, sino como la sustancia tóxica asociada con la serpiente. 'Veneno' conserva el sentido idiomático y es más natural en español que una traducción literal como 'cabeza'.
- source_word: פְּתָנִים
  english_pob_choice: cobras
  chosen_spanish: cobras
  alternatives_spanish:
  - áspides
  - víboras
  lexicon: HALOT
  rationale: פְּתָנִים designa una serpiente venenosa; 'cobras' sigue la decisión inglesa por su claridad moderna y mantiene la imagen vívida. 'Áspides' es tradicional, pero menos transparente para el lector actual.
- source_word: יִינָק
  english_pob_choice: sucks
  chosen_spanish: chupa
  alternatives_spanish:
  - bebe
  - succiona
  lexicon: HALOT
  rationale: El verbo hebreo significa literalmente 'chupar/succionar'. 'Chupa' conserva la fuerza concreta y la imaginería corporal del texto, como el inglés 'sucks'.
- source_word: תַּהַרְגֵהוּ
  english_pob_choice: kills him
  chosen_spanish: lo mata
  alternatives_spanish:
  - lo matará
  - lo mata
  lexicon: HALOT
  rationale: La forma verbal expresa la acción de la lengua sobre 'él'. En español, el presente gnómico 'lo mata' suena natural en proverbio poético y comunica la consecuencia sin sobrecargar el tiempo verbal.
- source_word: לְשׁוֹן
  english_pob_choice: tongue
  chosen_spanish: lengua
  alternatives_spanish:
  - colmillo
  - mordida
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'lengua'. Se conserva esa imagen concreta en español, en vez de sustituirla por un mecanismo inferido como 'colmillo'.
- source_word: אֶפְעֶה
  english_pob_choice: viper
  chosen_spanish: víbora
  alternatives_spanish:
  - ám­pides
  - serpiente venenosa
  lexicon: HALOT
  rationale: אֶפְעֶה alude a una serpiente venenosa. 'Víbora' es un equivalente claro y natural en español, suficientemente específico sin forzar precisión zoológica mayor que la del hebreo.
translation_notes:
  revision_awareness: 'Se siguió de cerca el paquete fuente hebreo y el audit trail inglés. La línea se ajustó al español natural sin perder la imagen poética: el hebreo idiomático רֹאשׁ se entendió como ''veneno'', y פְּתָנִים/אֶפְעֶה se trasladaron con equivalentes modernos (''cobras'', ''víbora'') coherentes con la decisión inglesa. No se reportaron revisiones aplicadas en el contexto fuente.'
  spanish_consistency_notes:
  - Se mantiene 'cobras' para פְּתָנִים en coherencia con la decisión inglesa y con el estilo POB de transparencia léxica.
  - '''Víbora'' se usa para אֶפְעֶה como término común y claro en español, sin añadir especificación zoológica indebida.'
  - El presente gnómico 'lo mata' sigue el tono sapiencial/poético del hebreo y del inglés auditado.
