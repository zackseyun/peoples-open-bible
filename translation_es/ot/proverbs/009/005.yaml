translation:
  language: es
  text: Vengan[a], coman de mi pan y beban del vino que he mezclado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Vayan, coman de mi pan». El verbo hebreo literalmente significa «ir», pero en este contexto de invitación funciona idiomáticamente como un llamado a acercarse: «vengan».'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְכוּ
  english_pob_choice: Come
  chosen_spanish: Ven
  alternatives_spanish:
  - Id
  - Vengan
  lexicon: HALOT
  rationale: El verbo hebreo significa literalmente ‘ir/andar’, pero en un contexto de invitación funciona idiomáticamente como un llamado a acercarse. ‘Ven’ preserva esa fuerza exhortativa en español sin volver la frase rígida.
- source_word: לַחֲמוּ
  english_pob_choice: eat
  chosen_spanish: comed
  alternatives_spanish:
  - coman
  - comed de
  - alimentaos
  lexicon: HALOT
  rationale: El verbo aquí es ‘comer’, en paralelo con ‘beber’. ‘Comed’ mantiene el imperativo plural y la correspondencia poética con ‘bebed’.
- source_word: בְלַחְמִי
  english_pob_choice: of my bread
  chosen_spanish: de mi pan
  alternatives_spanish:
  - de mi pan
  - de mi alimento
  - de mi pan preparado
  lexicon: HALOT
  rationale: La preposición funciona de manera partitiva con el verbo de comer. ‘De mi pan’ conserva la sencillez concreta del hebreo y el paralelismo con el vino.
- source_word: וּשְׁתוּ
  english_pob_choice: and drink
  chosen_spanish: y bebed
  alternatives_spanish:
  - y beban
  - y tomad
  lexicon: HALOT
  rationale: El imperativo coordinado se rinde naturalmente con ‘bebed’, manteniendo la simetría con el mandato anterior.
- source_word: בְּיַיִן
  english_pob_choice: of the wine
  chosen_spanish: del vino
  alternatives_spanish:
  - de vino
  - del vino
  - del vino mezclado
  lexicon: HALOT
  rationale: Con ‘beber’, el valor partitivo de la preposición se expresa bien con ‘del vino’, que suena natural en español y preserva el equilibrio poético.
- source_word: מָסָכְתִּי
  english_pob_choice: I have mixed
  chosen_spanish: que he mezclado
  alternatives_spanish:
  - que he preparado
  - que he sazonado
  lexicon: HALOT
  rationale: El verbo apunta específicamente a mezclar el vino; ‘he mezclado’ es la opción más precisa. ‘Preparado’ es más amplio, pero menos fiel al matiz lexical.
theological_decisions:
- issue: Imagen concreta del banquete de Sabiduría
  english_pob_reading: Retain the concrete meal imagery without allegorical expansion in the translation.
  chosen_spanish_reading: Conservar la imagen concreta del banquete sin convertirla en una explicación doctrinal o sacramental.
  alternative_spanish_readings:
  - Interpretar el pan y el vino sacramentalmente
  - Generalizar la imagen como enseñanza espiritual
  rationale: El hebreo presenta a la Sabiduría invitando a una comida ya preparada. La traducción debe dejar esa imagen concreta intacta y no importar lecturas posteriores que el texto no expresa de forma explícita.
  doctrine_reference: Translation philosophy §§1, 3
translation_notes:
  revision_awareness: El paquete auditado muestra alta concordancia y ninguna revisión aplicada; por eso la redacción sigue de cerca la decisión inglesa ya asentada, especialmente en el valor idiomático de לְכוּ y en el matiz preciso de מָסָכְתִּי.
  spanish_consistency_notes:
  - Se mantiene el tono poético e imperativo plural del hebreo.
  - Se evita ‘SEÑOR’ u otras sustituciones teológicas, porque el versículo no contiene el nombre divino.
  - ‘Pan’ y ‘vino’ se conservan concretamente, sin expandir la metáfora.
  - La nota al pie marca solo la alternativa significativa sobre לְכוּ; no se añade nota para ‘mezclado’ porque la traducción principal ya refleja el matiz lexical.
