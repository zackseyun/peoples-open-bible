base_translation:
  language: en
  yaml_path: translation/ot/daniel/011/027.yaml
  text: As for both of them[a], the kings—their hearts are set on evil, and at one table they will speak lies, but it will not succeed[c][b], for the end is still for the appointed time.
  footnotes:
