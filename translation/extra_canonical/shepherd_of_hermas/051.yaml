  text: Λέγω· Κύριε, ἐγὼ ταύτας τὰς παραβολὰς οὐ γινώσκω οὐδὲ δύναμαι νοῆσαι, ἐὰν
    μή μοι ἐπιλύσῃς αὐτάς. 2. Πάντα σοι ἐπιλύσω, φησί, καὶ ὅσα ἂν λαλήσω μετὰ σοῦ,
    δείξω σοι. τὰς ἐντολὰ φροσύνης σου ὁ εἰληφὼς ἐμπλήσῃ τὴν ἑαυτοῦ ψυχὴν καὶ εὔξηται
    ὑπὲρ σοῦ πρὸς τὸν Κύριον. 8. ἐὰν οὖν οὕτω τελέσῃς τὴν νηστείαν ὥς σοι ἐνετειλάμην,
    ἔσται ἡ θυσία σου δεκτὴ παρὰ τῷ Θεῷ, καὶ ἔγγραφος ἔσται ἡ νηστεία αὕτη, καὶ ἡ
    λειτουργία οὕτως ἐργαζομένη καλὴ καὶ ἱλαρά ἐστι καὶ εὐπρόσδεκτος τῷ Κυρίῳ. 9.
    ταῦτα οὕτω τηρήσεις σὺ μετὰ τῶν τέκνων σου καὶ ὅλου τοῦ οἴκου σου· τηρήσας δὲ
    αὐτὰ μακάριος ἔσῃ· καὶ ὅσοι ἂν ἀκούσαντες αὐτὰ τηρήσωσι, μακάριοι ἔσονται, παρὰ
    τοῦ Κυρίου σύνεσιν καὶ λαμβάνεις παρ' αὐτοῦ; 5. λέγω αὐτῷ· Κύριε, ἐγὼ ἔχων σὲ
    μεθ' ἑαυτοῦ ἀνάγκην ἔχω σὲ αἰτεῖσθαι καὶ σὲ ἐπερωτᾶν· σὺ γάρ μοι δεικνύεις πάντα
    καὶ λαλεῖς μετ' ἐμοῦ· εἰ δὲ ἄτερ σοῦ ἔβλεπον ἢ ἤκουον αὐτά, ἠρώτων ἂν τὸν Κύριον
    ἵνα μοι δηλωθῇ.
