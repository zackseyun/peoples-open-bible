- from: Así como se ha hecho en este día[a], Yahvé ha mandado hacerlo, para hacer expiación por ustedes.
  to: Así como se ha hecho en este día[a], Yahvé ha mandado que se haga, para hacer expiación por ustedes.
  rationale: Se realiza una reparación menor para mejorar la naturalidad y reflejar mejor el valor impersonal/prescriptivo de לַעֲשֹׂת. Se conserva 'Yahvé' conforme al proyecto y se mantiene 'expiación' como término cultual español legible y ampliamente aceptado en este contexto sacerdotal. No requiere adjudicación adicional.
