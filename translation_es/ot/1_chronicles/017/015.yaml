translation:
  language: es
  text: Según todas estas palabras[a] y según toda esta visión[b], así habló Natán a David.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Palabras» también puede entenderse como «asuntos» o «cosas». Hebreo דְּבָרִים admite ese campo semántico, pero aquí se prefiere el sentido verbal por el contexto de un mensaje profético.
    reason: lexical_alternative
  - marker: b
    text: «Visión» también puede traducirse como «revelación». חָזוֹן designa una comunicación profética o una visión revelatoria; se conserva «visión» por ser la opción más directa.
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּכֹל
  english_pob_choice: According to all
  chosen_spanish: Según todas
  alternatives_spanish:
  - De acuerdo con todo
  - Conforme a todo
  lexicon: HALOT
  rationale: La preposición comparativa כְּ expresa conformidad o correspondencia; «Según» conserva esa relación de manera natural en español y mantiene el paralelismo de la frase.
- source_word: הַדְּבָרִים הָאֵלֶּה
  english_pob_choice: these words
  chosen_spanish: estas palabras
  alternatives_spanish:
  - estas cosas
  - estos asuntos
  - estas palabras/materias
  lexicon: HALOT
  rationale: דְּבָרִים puede significar palabras, cosas o asuntos. Aquí el contexto es el reporte de un mensaje revelado; «palabras» conserva mejor el carácter verbal del contenido.
- source_word: וּכְכֹל
  english_pob_choice: and according to all
  chosen_spanish: y según toda
  alternatives_spanish:
  - y conforme a toda
  - y de acuerdo con toda
  lexicon: HALOT
  rationale: Se conserva el segundo miembro paralelo de la construcción para reflejar la repetición enfática del hebreo.
- source_word: הֶחָזוֹן הַזֶּה
  english_pob_choice: this vision
  chosen_spanish: esta visión
  alternatives_spanish:
  - esta revelación
  - esta visión profética
  lexicon: HALOT
  rationale: חָזוֹן designa una visión profética o revelatoria; «visión» es la equivalencia más directa y natural, sin perder el matiz profético.
- source_word: כֵּן
  english_pob_choice: so
  chosen_spanish: así
  alternatives_spanish:
  - de ese modo
  - entonces
  lexicon: HALOT
  rationale: כֵּן marca correspondencia entre la revelación y la palabra pronunciada; «así» comunica bien esa correspondencia en español.
- source_word: דִּבֶּר
  english_pob_choice: spoke
  chosen_spanish: habló
  alternatives_spanish:
  - dijo
  - pronunció
  lexicon: HALOT
  rationale: דבר es el verbo normal «hablar». «Habló» mantiene el registro narrativo formal y la idea de comunicación verbal.
- source_word: נָתָן
  english_pob_choice: Nathan
  chosen_spanish: Natán
  alternatives_spanish:
  - Natan
  lexicon: Convención onomástica
  rationale: Se usa la forma castellana tradicional y ampliamente reconocible del nombre propio, sin alterar la identificación del personaje.
- source_word: אֶל דָּוִיד
  english_pob_choice: to David
  chosen_spanish: a David
  alternatives_spanish:
  - para David
  - con David
  lexicon: HALOT
  rationale: אֶל indica dirección hacia el destinatario del habla; «a David» es la traducción más directa y idiomática.
