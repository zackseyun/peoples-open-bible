translation:
  language: es
  text: Pero los que estaban con Nicanor avanzaban con trompetas y cantos de triunfo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “peanes”, es decir, cantos de victoria o triunfales, con sentido marcial.
    reason: lexical_alternative
lexical_decisions:
- source_word: Οἱ δὲ περὶ τὸν Νικάνορα
  english_pob_choice: But those around Nikanor
  chosen_spanish: Pero los que estaban con Nicanor
  alternatives_spanish:
  - Pero los que rodeaban a Nicanor
  - Pero los de alrededor de Nicanor
  lexicon: LSJ
  rationale: El giro περὶ + acusativo puede expresar compañía o cercanía alrededor de un líder. En español, “los que estaban con Nicanor” comunica de manera natural ese grupo acompañante sin añadir un matiz de circunferencia física más fuerte de lo que exige el griego.
- source_word: σαλπίγγων
  english_pob_choice: trumpets
  chosen_spanish: trompetas
  alternatives_spanish:
  - clarines
  - trompetas de guerra
  lexicon: LSJ
  rationale: El sustantivo se refiere a instrumentos de viento en contexto militar. “Trompetas” es el equivalente directo y claro en español; “de guerra” sería una amplificación innecesaria, y “clarines” sería más específico de uso moderno.
- source_word: παιάνων
  english_pob_choice: battle songs
  chosen_spanish: cantos de triunfo
  alternatives_spanish:
  - peanes
  - cantos guerreros
  - cantos de victoria
  lexicon: LSJ
  rationale: παιάνων puede ser “peanes”, es decir, cantos de victoria o triunfo, a menudo con tono marcial. “Cantos de triunfo” preserva ese valor celebratorio y resulta comprensible en español; “peanes” es más técnico y menos transparente para la lectura pública.
- source_word: προσῆγον
  english_pob_choice: advanced
  chosen_spanish: avanzaban
  alternatives_spanish:
  - se acercaban
  - marchaban adelante
  - iban avanzando
  lexicon: LSJ
  rationale: En este contexto de combate, προσῆγον indica movimiento hacia adelante en dirección al enfrentamiento. “Avanzaban” mantiene el sentido direccional y el tono militar sin sobrecargar la frase.
translation_notes:
  revision_awareness: El texto griego es breve y coincide sustancialmente con la traducción inglesa auditada; el único punto relevante es παιάνων, donde la POB inglesa opta por “battle songs” y deja nota alternativa. En español se reflejó como “cantos de triunfo”, conservando la idea de canto celebratorio/marcial y añadiendo nota para la alternativa técnica “peanes”.
  spanish_consistency_notes:
  - Se evitó “SEÑOR” o terminología no pertinente, dado que no aparece lenguaje divino en el versículo.
  - Se prefirió “Nicanor” como forma española estándar del nombre propio, aunque la audición inglesa usa “Nikanor”.
  - La puntuación y el ritmo buscan una frase breve y narrativa, acorde con el original griego.
