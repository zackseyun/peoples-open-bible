translation:
  language: es
  text: Disfruta de la vida mientras tu mano todavía tiene fuerza; recuerda que no hay placer en Seol, y la muerte no tarda, y el decreto para Seol[a] no te ha sido dado a conocer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: «recuerda que la muerte no tardará, y el pacto de Hades no te fue mostrado». El hebreo dice: «el decreto para Seol no te ha sido dado a conocer».'
    reason: alternative_reading
lexical_decisions:
- source_word: וּלְאֵל יָדְךָ
  english_pob_choice: while your hand still has strength
  chosen_spanish: mientras tu mano todavía tiene fuerza
  alternatives_spanish:
  - mientras aún tienes fuerzas
  - mientras tu mano aún tiene vigor
  - mientras todavía puedes
  lexicon: HALOT
  rationale: La imagen hebrea de la ‘mano’ conserva la idea concreta de capacidad o recursos presentes. ‘Tu mano todavía tiene fuerza’ sigue de cerca el giro y mantiene la fuerza idiomática sin sonar rígido en español.
- source_word: הִדָּשֵׁן
  english_pob_choice: Refresh yourself
  chosen_spanish: Recréate
  alternatives_spanish:
  - refresca tu vida
  - disfruta
  - hazte bien
  lexicon: HALOT
  rationale: En este contexto sapiencial, el verbo apunta a disfrutar o fortalecerse en la vida antes de la muerte. ‘Recréate’ comunica ese sentido de manera natural en español y conserva el matiz de gozo/renuevo.
- source_word: זְכוֹר
  english_pob_choice: remember
  chosen_spanish: recuerda
  alternatives_spanish:
  - ten presente
  - acuérdate
  - no olvides
  lexicon: HALOT
  rationale: Imperativo directo y estándar; ‘recuerda’ es claro, solemne y fiel al tono exhortativo del texto.
- source_word: בִשְׁאוֹל
  english_pob_choice: in Sheol
  chosen_spanish: en Sheol
  alternatives_spanish:
  - en el sepulcro
  - en la tumba
  - en el inframundo
  lexicon: HALOT
  rationale: Se conserva ‘Sheol’ por tratarse de un concepto hebreo específico del ámbito de los muertos. Traducirlo como ‘sepulcro’ o ‘tumba’ reduciría el campo semántico; ‘Sheol’ preserva la tensión teológica original.
- source_word: תַּעֲנוּג
  english_pob_choice: pleasure
  chosen_spanish: placer
  alternatives_spanish:
  - deleite
  - gozo
  - enjoyment
  lexicon: HALOT
  rationale: ‘Placer’ expresa bien la idea de disfrute o deleite que el texto niega en Sheol, y encaja con el contraste sapiencial del versículo.
- source_word: וְלֹא מָוֶת יִתְמַהְמַהּ
  english_pob_choice: and death does not delay
  chosen_spanish: y la muerte no tarda
  alternatives_spanish:
  - y la muerte no se demora
  - y la muerte no se detiene
  - y la muerte no se hace esperar
  lexicon: HALOT
  rationale: La forma española más natural para el valor gnómico del hebreo es ‘no tarda’. Mantiene la brevedad proverbial y corresponde al paralelo griego sobre la muerte que no se demora.
- source_word: וְחֹק לִשְׁאוֹל
  english_pob_choice: the decree for Sheol
  chosen_spanish: el decreto para Sheol
  alternatives_spanish:
  - el decreto de Sheol
  - la orden para Sheol
  - la ley para Sheol
  lexicon: HALOT
  rationale: ‘חֹק’ puede ser estatuto, decreto u orden fija. ‘Decreto para Sheol’ conserva el matiz de disposición establecida sin forzar una lectura doctrinal posterior; además refleja la relación preposicional del hebreo con claridad en español.
- source_word: לֹא הֻגַּד לָךְ
  english_pob_choice: has not been made known to you
  chosen_spanish: no te ha sido dado a conocer
  alternatives_spanish:
  - no te ha sido mostrado
  - no se te ha informado
  - no te ha sido revelado
  lexicon: HALOT
  rationale: El pasivo hebreo de נגד expresa que algo no ha sido comunicado o dado a conocer. ‘No te ha sido dado a conocer’ es formal, preciso y apto para el registro sapiencial.
theological_decisions:
- issue: Rendering of שְׁאוֹל / ᾅδης
  english_pob_reading: Sheol
  chosen_spanish_reading: Sheol
  alternative_spanish_readings:
  - la tumba
  - el sepulcro
  - el inframundo
  - Hades
  rationale: Se preserva el término hebreo específico para no aplanar el concepto del reino de los muertos ni introducir la carga doctrinal posterior asociada con ‘infierno’. El audit trail inglés también privilegia ‘Sheol’ sobre ‘Hades’ en el texto principal.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve theological tension rather than resolve it.'
- issue: Relación entre el hebreo y el paralelo griego en la cláusula final
  english_pob_reading: the decree for Sheol has not been made known to you
  chosen_spanish_reading: el decreto para Sheol no te ha sido dado a conocer
  alternative_spanish_readings:
  - el decreto de Sheol no te ha sido dado a conocer
  - el pacto de Hades no te ha sido mostrado
  - el convenio de Hades no te fue mostrado
  rationale: Se sigue el hebreo como texto base principal, pero se deja visible en nota la variante griega ‘covenant of Hades’. La elección evita resolver la tensión textual y mantiene la auditable diferencia entre testigos.
  doctrine_reference: Textual plurality in the deuterocanonical tradition; preserve variant rather than harmonize it.
translation_notes:
  revision_awareness: 'La redacción española sigue de cerca la última revisión inglesa en los puntos clave: ‘tu mano todavía tiene fuerza’ para יָדְךָ, el valor proverbial de ‘la muerte no tarda’, y la cláusula final como ‘decreto para Sheol’. Se conserva además la tensión textual entre hebreo y griego mediante nota, sin fusionar ambos testigos en el cuerpo principal.'
  spanish_consistency_notes:
  - Se preservó ‘Sheol’ como término técnico, en coherencia con la política de no ocultar vocabulario del original.
  - Se prefirió ‘decreto’ para חֹק por su registro jurídico-sapiencial y porque evita sobreinterpretar la expresión.
  - ‘Recréate’ busca equilibrar naturalidad española y cercanía al verbo hebreo de gozo/renuevo.
  - La nota al pie hace visible la variante griega sin desplazar el texto hebreo principal.
