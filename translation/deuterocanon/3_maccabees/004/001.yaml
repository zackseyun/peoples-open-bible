theological_decisions:
- issue: Rendering τοῖς ἔθνεσιν in a deuterocanonical Jewish narrative
  chosen_reading: among the Gentiles
  alternative_readings:
  - among the nations
  rationale: The narrative contrasts Jews with surrounding non-Jewish populations reacting to the decree. 'Gentiles' preserves that Jewish contextual sense better than the more neutral 'nations.'
  doctrine_reference: 'Translation philosophy: original-language primacy; consistency of key terms, or documented exception.'
