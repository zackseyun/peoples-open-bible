review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien el sentido forense de אֶרְשָׁע y la futilidad de הֶבֶל ... אִיגָע, pero introduce un matiz modal no presente al usar «sería condenado» y «me fatigaría». El hebreo y la POB inglesa apuntan mejor a un futuro/resultado asumido: «seré condenado; ¿por qué entonces he de esforzarme en vano?»'
  spanish_quality_summary: El español es claro y digno, pero «Yo [a] sería condenado» suena algo forzado por la separación del marcador y por el condicional. «Me fatigaría» es comprensible, aunque menos natural aquí que «he de esforzarme» o «trabajar». Conviene ajustar la sintaxis para mayor naturalidad y fidelidad.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. La nota sobre el valor alternativo moral de רשע está bien encaminada, pero «sería malo» conviene reemplazarlo por una alternativa más precisa y bíblica como «seré malvado» o «resultaré malvado», aunque la mejor alternativa breve sigue siendo «seré malvado»/«seré culpable».
  issues:
  - severity: medium
    issue: Uso del condicional «sería condenado» para אֶרְשָׁע
    rationale: El verbo hebreo está en imperfecto y la POB inglesa lo entiende como futuro/resultativo («I will be condemned»). El condicional español añade una hipótesis o potencialidad no requerida por el contexto.
  - severity: medium
    issue: Uso del condicional «me fatigaría» para אִיגָע
    rationale: Aunque la pregunta retórica admite perífrasis, el condicional aleja la fuerza de «¿por qué entonces he de esforzarme...?», que refleja mejor la inferencia del hebreo לָמָה זֶּה y la orientación del inglés «should I labor».
  - severity: low
    issue: Anclaje del marcador de nota tras «Yo»
    rationale: La nota explica אֶרְשָׁע, no el pronombre אָנֹכִי. El marcador debe ir sobre «condenado» o la forma verbal correspondiente para mantener precisión editorial.
  - severity: low
    issue: Alternativa de nota «sería malo»
    rationale: «Ser malo» suena coloquial y debilita el contraste léxico-teológico. Una formulación como «seré malvado» o «seré culpable» comunica mejor el valor moral alternativo del hebreo.
