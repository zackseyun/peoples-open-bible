translation:
  language: es
  text: ¿Quién lo puso a cargo de la tierra[a], y quién puso todo el mundo?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Quién le encargó la tierra, y quién puso sobre él todo el mundo?». El hebreo פקד puede abarcar la idea de asignar, encargar o encomendar responsabilidad.'
    reason: lexical_alternative
lexical_decisions:
- source_word: פָקַד
  english_pob_choice: appointed
  chosen_spanish: asignó
  alternatives_spanish:
  - nombró
  - encomendó
  - designó
  lexicon: HALOT
  rationale: En este contexto, פקד con עַל expresa poner algo bajo la responsabilidad o autoridad de alguien. «Asignó» comunica bien la idea de conferir la administración o incumbencia sobre la tierra sin volverla demasiado técnica en español.
- source_word: עָלָיו
  english_pob_choice: over him
  chosen_spanish: le
  alternatives_spanish:
  - sobre él
  - encima de él
  - a él
  lexicon: HALOT
  rationale: El sufijo masculino singular se entiende en el contexto de Eliú como referido a Dios. En español, el dativo «le» evita una construcción pesada y conserva la idea relacional de responsabilidad sin perder el referente personal.
- source_word: אֶרֶץ
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra
  - el mundo
  lexicon: HALOT
  rationale: Aquí אֶרֶץ aparece en contraste con תֵּבֵל, por lo que «la tierra» mantiene la distinción entre el ámbito terrenal y «el mundo entero» de la segunda cola.
- source_word: שָׂם
  english_pob_choice: set
  chosen_spanish: puso en su lugar
  alternatives_spanish:
  - puso
  - estableció
  - colocó
  lexicon: HALOT
  rationale: «Puso en su lugar» transmite bien el acto de colocar o fijar algo, conservando un tono natural en español y reflejando el paralelo con el primer hemistiquio.
- source_word: תֵּבֵל
  english_pob_choice: the world
  chosen_spanish: el mundo entero
  alternatives_spanish:
  - el mundo
  - el mundo habitado
  lexicon: HALOT
  rationale: תֵּבֵל designa el mundo ordenado o habitado. «El mundo entero» preserva la amplitud y el énfasis totalizador de כֻּלָּהּ con fluidez en español.
- source_word: כֻּלָּהּ
  english_pob_choice: the whole
  chosen_spanish: entero
  alternatives_spanish:
  - todo
  - completo
  - en su totalidad
  lexicon: HALOT
  rationale: El sufijo intensifica la totalidad de תֵּבֵל. En español, «entero» integra esa idea de totalidad sin necesidad de un giro más explicativo.
theological_decisions:
- issue: Referente de עָלָיו
  english_pob_reading: The pronoun refers to God, yielding 'over him.'
  chosen_spanish_reading: El pronombre se entiende referido a Dios, por eso se traduce con un dativo personal implícito en «le».
  alternative_spanish_readings:
  - «sobre él» si se quisiera explicitar el referente
  - «sobre eso» en una lectura menos personal
  rationale: En el argumento de Eliú (Job 34:10–15), la pregunta supone que nadie puso a Dios bajo una autoridad superior respecto de la tierra. La traducción evita resolver más de lo que el contexto exige, pero conserva el referente personal.
  doctrine_reference: Job 34:10–15; mantener la tensión contextual sin borrar la referencia a Dios.
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior asegurando que el marcador [a] aparezca explícitamente en el texto español. La redacción mantiene la relación semántica entre פקד y עַל sin forzar una sola glosa.
  spanish_consistency_notes:
  - Se prefirió «la tierra» para אֶרֶץ y «el mundo entero» para תֵּבֵל + כֻּלָּהּ, conservando la distinción del hebreo.
  - Se evitó «SEÑOR» para el referente divino porque el texto hebreo no usa el Tetragrámaton aquí; el tema es la autoridad de Dios en el contexto argumentativo.
  - «Puso en su lugar» mantiene un español natural y al mismo tiempo refleja el gesto de fijar/colocar propio de שָׂם.
