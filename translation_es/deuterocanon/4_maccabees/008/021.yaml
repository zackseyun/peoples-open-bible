lexical_decisions:
- source_word: γῆρας
  english_pob_choice: old age
  chosen_spanish: vejez
  alternatives_spanish:
  - ancianidad
  - edad avanzada
  lexicon: LSJ
  rationale: El sustantivo griego significa ‘vejez’ o ‘edad avanzada’. En este contexto fragmentario, ‘vejez’ conserva la brusquedad del inicio aislado sin añadir palabras explicativas.
- source_word: ἐνθυμηθῶμεν
  english_pob_choice: let us consider
  chosen_spanish: consideremos
  alternatives_spanish:
  - reflexionemos
  - pensemos
  lexicon: LSJ
  rationale: Es un subjuntivo exhortativo en primera persona plural. ‘Consideremos’ expresa bien la exhortación deliberativa en un español natural y sobrio.
- source_word: ἀπειθοῦντες
  english_pob_choice: if we disobey
  chosen_spanish: si desobedecemos
  alternatives_spanish:
  - mientras desobedecemos
  - por ser desobedientes
  lexicon: LSJ
  rationale: Aunque formalmente es un participio, aquí el sentido práctico es condicional. ‘Si desobedecemos’ reproduce esa fuerza exhortativa sin volverlo mecánico.
- source_word: τεθνηξόμεθα
  english_pob_choice: we will die
  chosen_spanish: moriremos
  alternatives_spanish:
  - vamos a morir
  - pereceremos
  lexicon: LSJ
  rationale: El futuro de θνῄσκω expresa la consecuencia de manera directa. ‘Moriremos’ es claro, natural y fiel al valor de advertencia.
