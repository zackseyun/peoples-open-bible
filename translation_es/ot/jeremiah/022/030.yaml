translation:
  language: es
  text: 'Así dice Yahvé: Escriban a este hombre como sin hijos[a], un hombre que no prosperará en sus días; porque ninguno de sus descendientes prosperará[b], sentado en el trono de David y gobernando de nuevo en Judá.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O ‘registren a este hombre como sin heredero’. El hebreo dice literalmente ‘sin hijos’, pero la cláusula siguiente muestra que el foco es la sucesión dinástica: ninguno de sus descendientes prosperará en el trono de David.'
    reason: lexical_alternative
  - marker: b
    text: Es decir, ningún descendiente de Jeconías reinará con éxito como rey davídico en Judá.
    reason: cultural_note
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto para el nombre divino del pacto, usando una forma audible y transparente en español sin enmascararlo con una sustitución tipográfica.
- source_word: כִּתְבוּ
  english_pob_choice: Write ... down
  chosen_spanish: Escriban
  alternatives_spanish:
  - Anoten
  - Registren
  - Escriban...
  lexicon: HALOT
  rationale: El plural imperativo conserva el valor oficial o administrativo del mandato. En español, el contexto ya comunica la idea de inscripción; no hace falta añadir una glosa verbal que suene forzada.
- source_word: הָאִישׁ הַזֶּה
  english_pob_choice: this man
  chosen_spanish: este hombre
  alternatives_spanish:
  - este varón
  - este individuo
  lexicon: HALOT
  rationale: ‘Hombre’ reproduce bien el referente masculino singular y suena natural en español bíblico moderno.
- source_word: עֲרִירִי
  english_pob_choice: childless
  chosen_spanish: estéril
  alternatives_spanish:
  - sin hijos
  - sin heredero
  - sin descendencia
  lexicon: HALOT
  rationale: El inglés POB mantiene ‘childless’ con una nota sobre el sentido dinástico. En español, ‘estéril’ conserva la fuerza de la declaración, aunque aquí funciona de modo jurídico/dinástico y no como afirmación biológica estricta; la nota explica esa tensión. ‘Sin hijos’ o ‘sin heredero’ suavizan demasiado el término o desplazan el matiz.
- source_word: גֶּבֶר
  english_pob_choice: a man
  chosen_spanish: un varón
  alternatives_spanish:
  - un hombre
  - un ser humano
  lexicon: HALOT
  rationale: ‘Varón’ preserva el tono enfático y masculino del término appositivo sin sonar artificial en español litúrgico moderno.
- source_word: לֹא יִצְלַח בְּיָמָיו
  english_pob_choice: who will not prosper in his days
  chosen_spanish: que no prosperará en sus días
  alternatives_spanish:
  - que no tendrá éxito en sus días
  - que no prosperará durante su vida
  lexicon: HALOT
  rationale: ‘Prosperará’ conserva el valor de צלח como éxito/éxito eficaz. ‘En sus días’ se mantiene de forma casi literal porque el giro temporal tiene peso en el juicio.
- source_word: מִזַּרְעוֹ
  english_pob_choice: of his offspring
  chosen_spanish: de su descendencia
  alternatives_spanish:
  - de su linaje
  - de su posteridad
  - de su simiente
  lexicon: HALOT
  rationale: ‘Descendencia’ expresa bien el colectivo singular y, en este pasaje, permite que el lector perciba la dimensión dinástica señalada por el contexto.
- source_word: אִישׁ יֹשֵׁב עַל כִּסֵּא דָוִד
  english_pob_choice: none of his offspring will prosper, sitting on the throne of David
  chosen_spanish: sentado en el trono de David
  alternatives_spanish:
  - para sentarse en el trono de David
  - que se siente en el trono de David
  - sentándose en el trono de David
  lexicon: HALOT
  rationale: La construcción española con participio preserva la relación del hebreo entre prosperar y ocupar el trono. No se explicita ‘ninguno de’ dentro de la frase porque ya queda cubierto por ‘ninguno de su descendencia’. ‘Trono de David’ se mantiene por su valor histórico-dinástico.
- source_word: וּמֹשֵׁל עוֹד בִּיהוּדָה
  english_pob_choice: and rule again in Judah
  chosen_spanish: y gobernando aún en Judá
  alternatives_spanish:
  - y gobernar de nuevo en Judá
  - y reinar otra vez en Judá
  - y seguir gobernando en Judá
  lexicon: HALOT
  rationale: ‘Gobernando aún’ conserva la idea de continuidad o ulterior ejercicio de dominio que el inglés POB deja con ‘again’. En español, ‘gobernando aún’ evita forzar ‘de nuevo’, que podría sonar menos preciso respecto del hebreo. ‘Judá’ se mantiene como nombre territorial.
theological_decisions:
- issue: Sentido de עֲרִירִי aplicado a Jeconías/Conías
  english_pob_reading: Render 'childless' in the main text, understanding it as dynastic/political childlessness rather than a denial of biological descendants.
  chosen_spanish_reading: Traducir con ‘estéril’ en el texto principal, entendiendo la palabra en sentido dinástico/político y no como negación de descendencia biológica.
  alternative_spanish_readings:
  - sin hijos
  - sin heredero
  - sin descendencia
  rationale: 'El contexto inmediato aclara que el punto no es la biología, sino la sucesión real: ninguno de su descendencia prosperará en el trono de David. La traducción mantiene la tensión lexical y la nota la explica sin neutralizarla.'
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Relación entre prosperar y sentarse en el trono de David
  english_pob_reading: Translate as a denial that any of his descendants will successfully occupy David's throne and rule in Judah.
  chosen_spanish_reading: 'Mantener la conexión entre ‘prosperará’ y la participación en el trono/mandato: ninguno de su descendencia prosperará, sentado en el trono de David y gobernando aún en Judá.'
  alternative_spanish_readings:
  - ninguno de su descendencia llegará a sentarse en el trono de David ni a gobernar en Judá
  - ninguno de su descendencia prosperará para reinar en Judá
  rationale: La sintaxis española respeta la relación participial del hebreo y deja claro que el juicio afecta a la sucesión davídica. No se reduce a un mero fracaso personal ni se amplía más allá de lo que la cláusula afirma.
  doctrine_reference: Translation philosophy §§1, 3
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente del inglés POB, que ajustó la cláusula final para reflejar mejor la estructura hebrea: la descendencia no prospera como la que se sienta en el trono de David y gobierna en Judá. La versión española imita esa relación sintáctica con una construcción participial equivalente y conserva el tono formal.'
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ según el estándar del proyecto para יְהוָה.
  - Se prefiere ‘estéril’ por su fuerza lexical, con nota aclaratoria para evitar una lectura biológica simplista.
  - ‘Descendencia’ se emplea para זרע por claridad colectiva y por su compatibilidad con el matiz dinástico.
  - ‘Trono de David’ se conserva literalmente para mantener la referencia real-teológica.
  - ‘Judá’ se mantiene sin artículo por consistencia onomástica y territorial.
