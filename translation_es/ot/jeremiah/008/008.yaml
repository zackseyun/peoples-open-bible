  glossary_alignment: 'Alineación buena con la terminología del proyecto: «Yahvé» para יהוה, «ley» para תּוֹרָה en este contexto, y tratamiento adecuado de «escribas». No hay conflicto doctrinal mayor. La principal desalineación está en la ubicación/contenido de la nota, no en el glosario principal.'
