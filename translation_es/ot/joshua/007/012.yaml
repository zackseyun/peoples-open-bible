translation:
  language: es
  text: Por tanto, los hijos de Israel no pueden ponerse en pie delante de sus enemigos; vuelven la espalda delante de sus enemigos, porque han quedado consagrados para destrucción.[a] Ya no estaré con ustedes, a menos que destruyan la cosa consagrada para destrucción de en medio de ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo חֵרֶם (cherem), algo consagrado a Dios para destrucción bajo prohibición. Las versiones tradicionales a menudo lo traducen «anatema» o «cosa maldita». Aquí se mantiene la conexión léxica entre esta cláusula y «la cosa consagrada para destrucción» al final del versículo.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Conserva la expresión de parentesco/corporatividad del hebreo y mantiene la fuerza pactal del grupo. En español, "hijos de Israel" es natural y fiel al giro fuente.
- source_word: יֻכְלוּ
  english_pob_choice: cannot
  chosen_spanish: no pueden
  alternatives_spanish:
  - no son capaces de
  - no podrán
  lexicon: HALOT
  rationale: El imperfecto expresa incapacidad en la situación actual; "no pueden" es idiomático y conserva el valor de imposibilidad sin añadir matices futuristas.
- source_word: לָקוּם לִפְנֵי אֹיְבֵיהֶם
  english_pob_choice: stand before their enemies
  chosen_spanish: ponerse en pie delante de sus enemigos
  alternatives_spanish:
  - resistir a sus enemigos
  - mantenerse firmes ante sus enemigos
  lexicon: HALOT
  rationale: El hebreo usa la imagen de levantarse/estar en pie frente al enemigo. "Ponerse en pie delante de" conserva la imagen con un español comprensible; alternativas más interpretativas como "resistir" suavizan el paralelo literal.
- source_word: עֹרֶף יִפְנוּ
  english_pob_choice: they turn their backs
  chosen_spanish: vuelven la espalda
  alternatives_spanish:
  - vuelven el cuello
  - huyen
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y señala retirada vergonzosa. "Vuelven la espalda" preserva la metáfora de manera natural en español.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la causa de la derrota. "Porque" es la equivalencia directa y clara en español.
- source_word: הָיוּ לְחֵרֶם
  english_pob_choice: they have become devoted to destruction
  chosen_spanish: han llegado a ser cosa dedicada a destrucción
  alternatives_spanish:
  - han quedado dedicados a destrucción
  - se han vuelto cosa consagrada para destrucción
  lexicon: HALOT
  rationale: 'Se preserva la tensión lexical de חֵרֶם: algo puesto bajo prohibición/consagración judicial para destrucción. "Cosa dedicada a destrucción" mantiene la relación con el término técnico sin recurrir a "maldito" o "anatema", que desplazan el sentido.'
- source_word: לֹא אוֹסִיף לִהְיוֹת עִמָּכֶם
  english_pob_choice: I will no longer be with you
  chosen_spanish: No volveré a estar con ustedes
  alternatives_spanish:
  - Ya no estaré con ustedes
  - No seguiré estando con ustedes
  lexicon: HALOT
  rationale: '"No volveré a estar" refleja el valor de continuidad/cese expresado por אוֹסִיף + infinitivo. "Con ustedes" en español es más natural que conservar la preposición literal, y mantiene el sentido de presencia acompañante.'
- source_word: אִם לֹא
  english_pob_choice: unless
  chosen_spanish: a menos que
  alternatives_spanish:
  - si no
  - salvo que
  lexicon: HALOT
  rationale: En español jurídico y bíblico, "a menos que" expresa mejor la condición negativa que "si no". Conserva el valor condicional sin ambigüedad.
- source_word: תַשְׁמִידוּ
  english_pob_choice: you destroy
  chosen_spanish: destruyan
  alternatives_spanish:
  - eliminan
  - exterminan
  lexicon: HALOT
  rationale: El verbo tiene fuerza de destrucción decisiva. "Destruyan" reproduce el mandato con suficiente intensidad sin introducir una connotación más dura o más técnica de la necesaria.
- source_word: הַחֵרֶם
  english_pob_choice: the devoted thing
  chosen_spanish: la cosa dedicada a destrucción
  alternatives_spanish:
  - la cosa consagrada para destrucción
  - el objeto dedicado a destrucción
  lexicon: HALOT
  rationale: 'Aquí חֵרֶם es concreto y singular, por lo que se traduce como un sustantivo de referencia: "la cosa dedicada a destrucción". Se mantiene la continuidad con la primera ocurrencia y se evita perder la diferencia entre el estado colectivo y el objeto específico.'
- source_word: מִקִּרְבְּכֶם
  english_pob_choice: from your midst
  chosen_spanish: de en medio de ustedes
  alternatives_spanish:
  - de entre ustedes
  - de su medio
  lexicon: HALOT
  rationale: Es una fórmula comunitaria/covenantal. "De en medio de ustedes" es natural en español bíblico contemporáneo y comunica bien la idea de remoción del ámbito comunitario.
theological_decisions:
- issue: Cómo rendir חֵרֶם en su doble uso dentro del mismo versículo
  english_pob_reading: Use 'devoted to destruction' for לְחֵרֶם and 'the devoted thing' for הַחֵרֶם
  chosen_spanish_reading: usar "cosa dedicada a destrucción" para לְחֵרֶם y "la cosa dedicada a destrucción" para הַחֵרֶם
  alternative_spanish_readings:
  - '"maldito" / "la cosa maldita"'
  - '"bajo anatema" / "el anatema"'
  - '"consagrado a destrucción" / "la cosa consagrada a destrucción"'
  rationale: La decisión preserva la relación léxica entre las dos ocurrencias y evita diluir el concepto en lenguaje meramente de maldición. También deja visible que se trata de un estado judicial-cultual y, en la segunda mitad del verso, de un objeto concreto dentro del campamento.
  doctrine_reference: 'Translation philosophy #5 (consistency of key terms, or documented exception)'
- issue: Presencia divina condicionada por la purga del חרם
  english_pob_reading: I will no longer be with you unless you destroy the devoted thing from your midst
  chosen_spanish_reading: No volveré a estar con ustedes, a menos que destruyan la cosa dedicada a destrucción de en medio de ustedes
  alternative_spanish_readings:
  - No seguiré con ustedes si no destruyen...
  - No estaré más con ustedes salvo que destruyan...
  rationale: 'La formulación mantiene la advertencia del texto: la presencia de Yahvé cesará si el חרם no es removido. "No volveré a estar" refleja continuidad/interrupción, sin suavizar la condición ni convertirla en mera cercanía abstracta.'
  doctrine_reference: Joshua 7:12; covenant holiness and divine presence
translation_notes:
  revision_awareness: Se siguió el pass más reciente, que quedó sin cambios tras revisión y obtuvo alto acuerdo; no se detectaron revisiones aplicadas al texto de referencia.
  spanish_consistency_notes:
  - Se mantuvo la misma raíz conceptual de חֵרֶם con una solución consistente en ambas mitades del versículo.
  - Se prefirió "hijos de Israel" para conservar la fórmula pactal del hebreo.
  - '"De en medio de ustedes" se eligió por naturalidad y por su uso comunitario-covenantal.'
  - Se evitó "SEÑOR" para el nombre divino porque en este versículo la referencia se expresa indirectamente mediante la presencia de Yahvé, según las normas del proyecto.
