    text: O «la doncella» o «la joven mujer». El singular hebreo probablemente funciona de manera representativa para las jóvenes de la comunidad.
    reason: lexical_alternative
  - marker: b
    text: O «los ancianos», si se toma como rol social más que como contraste de edad; aquí el paralelo con «los jóvenes» favorece «los hombres mayores».
    reason: lexical_alternative
  - marker: c
    text: O «en gozo» para «en alegría».
    reason: lexical_alternative
  revision_rationale: 'Se revisa para alinear mejor el español con las decisiones documentadas del POB inglés y con el hebreo: «hombres mayores» evita la ambigüedad institucional de «ancianos»; «duelo» representa mejor אֶבֶל que «lamento»; y la sintaxis se suaviza para un español más natural sin perder el movimiento desde el dolor hacia el gozo. Se conserva el singular representativo «la virgen» y la nota alternativa correspondiente.'
