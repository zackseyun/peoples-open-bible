review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del hebreo: imperativo dirigido a Josué, sacerdotes portadores del arca, y movimiento de salida desde el Jordán. También preserva correctamente אֲרוֹן הָעֵדוּת como «arca del testimonio» en vez de armonizar con «pacto/alianza». Sin embargo, «Da esta orden» introduce «esta», que no está en el hebreo, y la construcción más directa «Ordena a los sacerdotes...» preserva mejor la fuerza concisa de צַוֵּה.'
  spanish_quality_summary: El español es claro y natural, pero puede pulirse para mayor fidelidad y fluidez bíblica. «Ordena» es más limpio que «Da esta orden», y quitar la coma antes de «para que» mejora la sintaxis. El resto del verso suena bien y es ampliamente legible.
  glossary_alignment: No hay conflictos con el glosario mayor. «Arca del testimonio» está correctamente alineado con la decisión léxica documentada para עֵדוּת. «Sacerdotes», «Jordán» y «suban» son adecuados. La nota al pie debe evitar «testigo» como opción principal demasiado concreta; «arca del testimonio» / «arca del testigo» reproduce la alternativa documentada, pero conviene explicar mejor que el hebreo dice «testimonio» y que «testigo» es alternativa de sentido, no lectura literal distinta.
  issues:
  - severity: medium
    issue: «Da esta orden» añade un demostrativo ausente en el hebreo
    rationale: צַוֵּה es simplemente un imperativo directo, «ordena» o «manda». «Esta» no está motivado por el texto fuente y hace la orden más específica de lo que el hebreo expresa.
  - severity: low
    issue: Puntuación mejorable antes de «para que»
    rationale: La coma no es necesaria y la frase fluye mejor sin ella en español contemporáneo.
  - severity: low
    issue: La nota al pie puede formular con más precisión la alternativa léxica
    rationale: El audit trail inglés distingue entre «testimony» y la alternativa «witness». En español, conviene expresar que «testigo» es una traducción alternativa posible de sentido, mientras que el hebreo aquí dice «testimonio», no «pacto/alianza».
  revised_spanish_text: Ordena a los sacerdotes que llevan el arca del testimonio que suban del Jordán[a].
  revised_footnotes:
  - marker: a
    text: O «el arca del testigo». El hebreo dice «testimonio», no la expresión más familiar «pacto» o «alianza» que aparece en muchas otras referencias al arca.
    reason: lexical_alternative
  revision_rationale: Se ajusta el imperativo para reflejar con más exactitud y concisión צַוֵּה, se mejora la fluidez del español eliminando puntuación innecesaria y se afina la nota para conservar la distinción léxica documentada entre «testimonio» y las formulaciones tradicionales sobre el arca.
