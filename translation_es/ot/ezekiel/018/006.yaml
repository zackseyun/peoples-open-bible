base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/018/006.yaml
  text: he does not eat on the mountains[a], does not lift up his eyes to the idols of the house of Israel, does not defile his neighbor’s wife[c][b], and does not approach a woman during her menstrual impurity.
