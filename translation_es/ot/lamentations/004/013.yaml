translation:
  language: es
  text: Por los pecados de sus profetas, las iniquidades de sus sacerdotes, que derramaron[a] en medio de ella la sangre de los justos[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «vertieron». El participio hebreo puede traducirse de forma más literal como «derramaron» o con una opción más idiomática como «vertieron» la sangre.
    reason: lexical_alternative
  - marker: b
    text: O «los inocentes». צַדִּיקִים significa más literalmente «los justos».
    reason: lexical_alternative
lexical_decisions:
- source_word: מֵ/חַטֹּ֣את
  english_pob_choice: Because of the sins of
  chosen_spanish: Por los pecados de
  alternatives_spanish:
  - A causa de los pecados de
  - Por causa de los pecados de
  lexicon: HALOT
  rationale: El prefijo מ en este contexto expresa causa/origen. En español, «Por los pecados de» comunica con naturalidad esa relación causal sin perder el vínculo directo con חַטֹּאת.
- source_word: נְבִיאֶ֔י/הָ
  english_pob_choice: her prophets
  chosen_spanish: sus profetas
  alternatives_spanish:
  - los profetas de ella
  - sus videntes
  lexicon: HALOT
  rationale: El sufijo femenino singular se refiere a la ciudad; en español bíblico actual, «sus profetas» preserva la relación posesiva de forma natural y clara.
- source_word: עֲוֺנ֖וֹת
  english_pob_choice: the iniquities of
  chosen_spanish: las iniquidades de
  alternatives_spanish:
  - las culpas de
  - los pecados de
  lexicon: HALOT
  rationale: «Iniquidades» conserva el peso moral de עָוֹן y distingue este término del anterior «pecados», tal como hace la traducción inglesa POB.
- source_word: כֹּהֲנֶ֑י/הָ
  english_pob_choice: her priests
  chosen_spanish: sus sacerdotes
  alternatives_spanish:
  - los sacerdotes de ella
  lexicon: HALOT
  rationale: «Sacerdotes» es la equivalencia estándar de כֹּהֲנִים; el posesivo «sus» mantiene el referente femenino singular de la ciudad.
- source_word: הַ/שֹּׁפְכִ֥ים
  english_pob_choice: who poured out
  chosen_spanish: que derramaron
  alternatives_spanish:
  - que derramaban
  - que vertieron
  lexicon: HALOT
  rationale: El participio hebreo puede expresarse con relativo pasado en español. «Derramaron» conserva la imagen literal de שׁפך y resulta más idiomático que un calco participial.
- source_word: בְּ/קִרְבָּ֖/הּ
  english_pob_choice: in her midst
  chosen_spanish: en medio de ella
  alternatives_spanish:
  - dentro de ella
  - en su interior
  lexicon: HALOT
  rationale: «En medio de ella» preserva la imagen espacial de קִרְבָּהּ y es una fórmula natural y reverente en español bíblico.
- source_word: דַּ֥ם
  english_pob_choice: the blood of
  chosen_spanish: la sangre de
  alternatives_spanish:
  - sangre de
  lexicon: HALOT
  rationale: El sustantivo directo se traduce de forma literal. «La sangre de» mantiene la relación sintáctica con צַדִּיקִים.
- source_word: צַדִּיקִֽים
  english_pob_choice: the righteous
  chosen_spanish: los justos
  alternatives_spanish:
  - los rectos
  - los inocentes
  lexicon: HALOT
  rationale: «Justos» preserva la categoría moral y covenantal de צַדִּיקִים sin reducirla a inocencia jurídica. En español, «los justos» es claro y fiel; «los inocentes» sería más interpretativo.
theological_decisions:
- issue: Cómo renderizar צַדִּיקִים sin aplanar su carga moral
  english_pob_reading: the righteous
  chosen_spanish_reading: los justos
  alternative_spanish_readings:
  - los inocentes
  rationale: Se mantiene el valor ético de צַדִּיקִים como categoría de rectitud delante de Dios. «Los inocentes» desplaza el énfasis hacia la exoneración legal y atenúa la tensión moral del pasaje.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency of key terms, or documented exception.
translation_notes:
  revision_awareness: Se ha mantenido el sentido causal inicial del hebreo, la distinción entre «pecados» e «iniquidades», y la imagen concreta de sangre derramada en medio de la ciudad. La redacción final sigue de cerca el texto fuente, evitando una paráfrasis amplia.
  spanish_consistency_notes:
  - Se usa «Yahvé» en el proyecto cuando aparece el nombre divino; este versículo no lo contiene.
  - Se mantiene «justos» para צַדִּיקִים por consistencia terminológica con el valor moral del término.
  - «Derramaron» conserva el verbo de acción sin forzar una construcción más técnica o eclesiástica.
  - La puntuación reproduce la estructura acumulativa del hebreo con una sola oración causal y relativa.
