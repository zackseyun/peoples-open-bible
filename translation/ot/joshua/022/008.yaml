id: JOS.22.8
reference: Joshua 22:8
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר אֲלֵי/הֶ֜ם לֵ/אמֹ֗ר בִּ/נְכָסִ֨ים רַבִּ֜ים שׁ֤וּבוּ אֶל אָֽהֳלֵי/כֶם֙ וּ/בְ/מִקְנֶ֣ה רַב מְאֹ֔ד בְּ/כֶ֨סֶף וּ/בְ/זָהָ֜ב וּ/בִ/נְחֹ֧שֶׁת וּ/בְ/בַרְזֶ֛ל וּ/בִ/שְׂלָמ֖וֹת הַרְבֵּ֣ה מְאֹ֑ד חִלְק֥וּ שְׁלַל אֹיְבֵי/כֶ֖ם עִם אֲחֵי/כֶֽם־־־־׃פ
translation:
  text: And he said to them[a], “Return to your tents with great wealth, with very much livestock, with silver and gold, with bronze and iron, and with very many garments[c][b]. Divide the plunder of your enemies with your brothers.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the spoil of your enemies.'
    reason: lexical_alternative
  - marker: b
    text: '''Brothers'' refers to their fellow Israelites in the other tribes.'
    reason: cultural_note
  - marker: c
    text: Or 'bronze' may be rendered 'copper.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר אֲלֵיהֶם לֵאמֹר
  chosen: And he said to them, saying
  alternatives:
  - And he said to them
  - And he spoke to them, saying
  lexicon: HALOT
  rationale: Retains the Hebrew narrative formula and the infinitive 'saying' for transparency, even though English could omit it more smoothly.
- source_word: בִּנְכָסִים רַבִּים
  chosen: with great wealth
  alternatives:
  - with many riches
  - with abundant possessions
  lexicon: HALOT
  rationale: נְכָסִים denotes property/wealth/possessions. 'Great wealth' is idiomatic modern English and fits the broad sense before the more specific list that follows.
- source_word: שׁוּבוּ אֶל אָהֳלֵיכֶם
  chosen: Return to your tents
  alternatives:
  - Go back to your tents
  - Return to your homes
  lexicon: HALOT
  rationale: Formal sense is 'tents,' which in context refers to their dwelling places. 'Tents' preserves the historical setting better than the interpretive 'homes.'
- source_word: וּבְמִקְנֶה רַב מְאֹד
  chosen: with very much livestock
  alternatives:
  - with a great many cattle
  - with abundant herds
  lexicon: HALOT
  rationale: מִקְנֶה is a collective term for livestock rather than only cattle. 'Very much livestock' reflects the intensifier מְאֹד without narrowing the species.
- source_word: בְּכֶסֶף וּבְזָהָב
  chosen: with silver and gold
  lexicon: HALOT
  rationale: Straightforward material terms; 'with' is repeated in English to reflect the Hebrew accumulation.
- source_word: וּבִנְחֹשֶׁת וּבְבַרְזֶל
  chosen: with bronze and iron
  alternatives:
  - with copper and iron
  lexicon: HALOT
  rationale: נְחֹשֶׁת can denote copper/bronze depending on context; 'bronze' is the conventional rendering in lists of metals in the Hebrew Bible and likely fits the ancient material reference here.
- source_word: וּבִשְׂלָמוֹת הַרְבֵּה מְאֹד
  chosen: and with very many garments
  alternatives:
  - and with very many cloaks
  - and with a great many clothes
  lexicon: HALOT
  rationale: שְׂלָמוֹת refers to garments/cloaks. 'Garments' is broad enough and suitably dignified; the double intensification is rendered 'very many.'
- source_word: חִלְקוּ
  chosen: Divide
  alternatives:
  - Share out
  - Apportion
  lexicon: HALOT
  rationale: Imperative plural. 'Divide' is direct and preserves the command force.
- source_word: שְׁלַל אֹיְבֵיכֶם
  chosen: the plunder of your enemies
  alternatives:
  - the spoil of your enemies
  lexicon: HALOT
  rationale: שָׁלָל is war booty/plunder. 'Plunder' is more natural contemporary English than 'spoil' while preserving the military sense.
- source_word: עִם אֲחֵיכֶם
  chosen: with your brothers
  alternatives:
  - with your kinsmen
  lexicon: HALOT
  rationale: אָחִים here refers to fellow Israelites from the other tribes. Per translation philosophy, the masculine kinship term is preserved as 'brothers' rather than neutralized.
