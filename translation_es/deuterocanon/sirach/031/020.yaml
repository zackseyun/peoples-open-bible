translation:
  language: es
  text: Sabe que tu prójimo es un hombre como tú[a][b], y come lo que está puesto delante de ti.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más inclusiva: ''tu prójimo es una persona como tú''. El hebreo dice literalmente ''un hombre como tú''.'
    reason: lexical_alternative
  - marker: b
    text: 'El testimonio griego aquí difiere de manera sustancial: ''elevando el alma e iluminando los ojos, dando sanidad, vida y bendición''. El hebreo y el griego parecen conservar formas distintas del versículo.'
    reason: alternative_reading
lexical_decisions:
- source_word: דע
  english_pob_choice: Know
  chosen_spanish: Reconoce
  alternatives_spanish:
  - Conoce
  - Sabe
  lexicon: HALOT
  rationale: El imperativo de ידע permite 'conocer' o 'reconocer'. En español, 'reconoce' comunica mejor la exhortación práctica y relacional del proverbio sin perder la fuerza imperativa del hebreo.
- source_word: רעך
  english_pob_choice: your neighbor
  chosen_spanish: tu prójimo
  alternatives_spanish:
  - tu vecino
  - tu compañero
  lexicon: HALOT
  rationale: רעַ puede abarcar amigo, compañero o prójimo. 'Prójimo' mantiene el sentido ético-social y es natural en español bíblico contemporáneo.
- source_word: איש כמוך
  english_pob_choice: a man like yourself
  chosen_spanish: un hombre como tú
  alternatives_spanish:
  - una persona como tú
  - alguien como tú
  lexicon: HALOT
  rationale: El hebreo es explícitamente masculino singular. Se conserva 'hombre' en el texto principal para respetar la forma del original, con una alternativa más inclusiva en nota.
- source_word: ואכול
  english_pob_choice: and eat
  chosen_spanish: y come
  alternatives_spanish:
  - come entonces
  - así que come
  lexicon: HALOT
  rationale: La conjunción simple conserva la parataxis hebrea. 'Y come' es directo y fiel al mandato.
- source_word: דבר
  english_pob_choice: what
  chosen_spanish: lo que
  alternatives_spanish:
  - la cosa que
  - aquello que
  lexicon: HALOT
  rationale: Aquí דבר funciona idiomáticamente. 'Lo que' produce un español natural y adecuado al contexto de comida servida.
- source_word: ששם לפניך
  english_pob_choice: is set before you
  chosen_spanish: te pongan delante
  alternatives_spanish:
  - te han puesto delante
  - se ha puesto delante de ti
  lexicon: HALOT
  rationale: La expresión describe la comida servida en la mesa. 'Te pongan delante' refleja bien la situación de estar servido sin añadir solemnidad innecesaria.
theological_decisions:
- issue: Forma masculina de איש כמוך
  english_pob_reading: Retain 'a man like yourself' in the main text
  chosen_spanish_reading: Mantener 'un hombre como tú' en el texto principal
  alternative_spanish_readings:
  - una persona como tú
  - alguien como tú
  rationale: El sustantivo hebreo es masculino singular y la POB inglesa preserva esa fuerza lexical. En español se mantiene la referencia masculina en el cuerpo del texto y se ofrece una alternativa inclusiva en nota para la inteligibilidad amplia.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Diferencia sustancial entre el testimonio hebreo y el griego
  english_pob_reading: Translate from the Hebrew as the primary witness, while noting the Greek parallel as a substantially different reading
  chosen_spanish_reading: Traducir el hebreo como testimonio principal y registrar el griego como lectura paralela muy diferente
  alternative_spanish_readings:
  - 'Verter el griego: ''elevando el alma e iluminando los ojos, dando sanidad, vida y bendición'''
  - Armonizar hebreo y griego en una sola línea
  rationale: Para Sirácides, el hebreo disponible es la base principal, pero el griego conserva una forma notablemente distinta del verso. La traducción principal sigue el hebreo y la diferencia griega se preserva en nota para no borrar la tensión textual documentada.
  doctrine_reference: PHILOSOPHY.md 'What we are translating' y la instrucción de usar el texto paralelo griego como evidencia real
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el texto se mantiene conforme al último pase de auditoría, con acuerdo alto entre revisores.
  spanish_consistency_notes:
  - Se conserva 'Yahvé' como terminología general del proyecto cuando corresponda, pero este versículo no contiene el Nombre divino.
  - '''Prójimo'' se usa para רעך por coherencia ética y de registro bíblico en español.'
  - Se mantiene la tensión hebreo-griego sin armonización, siguiendo la auditoría.
  - La formulación 'lo que te pongan delante' preserva el contexto de comida servida sin sobreexplicar el idiomismo.
