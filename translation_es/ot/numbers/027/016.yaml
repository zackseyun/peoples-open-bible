translation:
  language: es
  text: Que Yahvé[a], el Dios de los espíritus de toda carne[b], nombre a un hombre sobre la congregación[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Que el SEÑOR, el Dios de los espíritus de toda carne, nombre a un hombre sobre la congregación»'
    reason: lexical_alternative
  - marker: b
    text: «Toda carne» es un modismo hebreo para la humanidad en su condición mortal.
    reason: cultural_note
  - marker: c
    text: 'O: «sobre la asamblea».'
    reason: lexical_alternative
lexical_decisions:
- source_word: יִפְקֹד
  english_pob_choice: appoint
  chosen_spanish: establezca
  alternatives_spanish:
  - nombre
  - ponga
  - asigne
  lexicon: HALOT
  rationale: El verbo hebreo פקד admite la idea de nombrar o poner a alguien en una función. En español, «establezca» comunica con claridad la acción de designar a una persona para el liderazgo sin sobrecargar el verso con tecnicismo administrativo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino como transliteración, conforme a la política del proyecto. «Yahvé» preserva el valor del Tetragrámaton como nombre personal y evita la sustitución por un título.
- source_word: אֱלֹהֵי הָרוּחֹת
  english_pob_choice: the God of the spirits
  chosen_spanish: el Dios de los espíritus
  alternatives_spanish:
  - el Dios de los alientos
  - el Dios de las disposiciones
  lexicon: HALOT
  rationale: רוּחוֹת se entiende aquí como «espíritus», en referencia a la vida interior o personal de los seres humanos bajo el conocimiento y autoridad de Dios. La expresión conserva la construcción genitiva del hebreo y su tono distintivo.
- source_word: לְכָל בָּשָׂר
  english_pob_choice: of all flesh
  chosen_spanish: de toda carne
  alternatives_spanish:
  - de toda la humanidad
  - de todo ser humano
  lexicon: HALOT
  rationale: Se mantiene el idiomatismo bíblico «carne» para בָּשָׂר, que en este contexto significa la humanidad en su condición mortal. «De toda carne» conserva mejor la textura bíblica que una paráfrasis más explicativa.
- source_word: אִישׁ
  english_pob_choice: a man
  chosen_spanish: a un hombre
  alternatives_spanish:
  - a una persona
  - a alguien
  lexicon: HALOT
  rationale: El hebreo usa el sustantivo masculino singular y el contexto se refiere al sucesor de Moisés. Por fidelidad lexical y precisión referencial, se conserva «hombre» sin neutralizar el género gramatical.
- source_word: עַל הָעֵדָה
  english_pob_choice: over the congregation
  chosen_spanish: sobre la congregación
  alternatives_spanish:
  - sobre la asamblea
  - sobre la comunidad
  lexicon: HALOT
  rationale: עֵדָה designa a la comunidad reunida de Israel. «Congregación» preserva el sentido colectivo y formal del término y suena natural en español eclesial sin perder el trasfondo israelita.
theological_decisions:
- issue: Modo de la petición e inclusión del sujeto divino
  english_pob_reading: May Yahweh... appoint...
  chosen_spanish_reading: Que Yahvé... establezca...
  alternative_spanish_readings:
  - Que Yahvé... nombre...
  - Ojalá Yahvé... establezca...
  rationale: El hebreo tiene fuerza volitiva/petitiva. En español, «Que Yahvé...» reproduce de forma natural la súplica dirigida a Dios sin convertirla en una simple afirmación.
  doctrine_reference: 'DOCTRINE.md: Rendering Hebrew jussive/volitive forms in prayer contexts'
- issue: Género de אִישׁ
  english_pob_reading: a man
  chosen_spanish_reading: a un hombre
  alternative_spanish_readings:
  - a una persona
  - a alguien
  rationale: El contexto narra la petición de un sucesor masculino para la conducción de Israel, y el hebreo es explícitamente masculino. Se mantiene la referencia masculina para no borrar una señal gramatical y contextual del texto.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral'
translation_notes:
  revision_awareness: 'Este borrador sigue de cerca el análisis auditado del texto hebreo y la decisión inglesa ya aprobada, sin cambios sustantivos respecto del sentido: conserva el nombre divino YHWH como «Yahvé», mantiene el idiomatismo de «carne», y retiene la referencia masculina de אִישׁ. La principal adaptación al español es la formulación volitiva natural «Que Yahvé...» para reflejar la petición del hebreo.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para יְהוָה, conforme al estándar del proyecto.
  - Se conserva «congregación» para עֵדָה por su valor colectivo formal.
  - «Toda carne» se mantiene como idiomismo bíblico y no se reemplaza por una paráfrasis explicativa en el texto principal.
  - La puntuación y el uso de comas siguen el ritmo oracional del español moderno sin añadir contenido interpretativo.
