translation:
  language: es
  text: 'Dios ha hablado en su santidad[a]: «Exultaré[b]; dividiré a Siquem y mediré el valle de Sucot».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en su lugar santo» o «por su santidad». La frase hebrea puede referirse a la santidad de Dios o a un lugar santo asociado con él.
    reason: lexical_alternative
  - marker: b
    text: O «me regocijaré». El verbo hebreo expresa un júbilo exaltante.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el dios
  - dioses
  lexicon: HALOT
  rationale: El verbo singular דִּבֶּר identifica aquí a אֱלֹהִים como el Dios de Israel; por eso en español corresponde el singular «Dios».
- source_word: דִּבֶּר
  english_pob_choice: has spoken
  chosen_spanish: ha hablado
  alternatives_spanish:
  - habló
  lexicon: HALOT
  rationale: El perfecto hebreo expresa una palabra ya emitida con vigencia presente en el discurso del salmo; «ha hablado» conserva ese valor mejor que un pasado simple.
- source_word: בְּקָדְשׁוֹ
  english_pob_choice: in his holiness
  chosen_spanish: en su santidad
  alternatives_spanish:
  - por su santidad
  - desde su santuario
  lexicon: HALOT
  rationale: La construcción puede referirse a la esfera o cualidad de Dios; en español «en su santidad» mantiene la lectura principal sin decidir prematuramente por un lugar santo. «Desde su santuario» queda como alternativa posible por la ambigüedad de קֹדֶשׁ.
- source_word: אֶעְלֹזָה
  english_pob_choice: I will exult
  chosen_spanish: me alegraré
  alternatives_spanish:
  - exultaré
  - me regocijaré
  lexicon: HALOT
  rationale: El verbo denota júbilo intenso. En español, «me alegraré» comunica la alegría celebrativa de manera natural; se conserva la nota de júbilo mediante la nota de pie, sin volver la frase forzada.
- source_word: אֲחַלְּקָה
  english_pob_choice: I will divide up
  chosen_spanish: dividiré
  alternatives_spanish:
  - repartiré
  - apartaré
  lexicon: HALOT
  rationale: En contexto territorial, el verbo implica distribuir o asignar. «Dividiré» es claro y fiel; el complemento geográfico ya aporta la idea de reparto de la tierra.
- source_word: שְׁכֶם
  english_pob_choice: Shechem
  chosen_spanish: Siquem
  alternatives_spanish:
  - Siquén
  lexicon: HALOT
  rationale: Nombre propio de lugar; «Siquem» es la forma más estable y reconocible en español bíblico, sin perder la referencia al topónimo.
- source_word: וְעֵמֶק סֻכּוֹת
  english_pob_choice: and the Valley of Succoth
  chosen_spanish: el valle de Sucot
  alternatives_spanish:
  - el Valle de Sucot
  - Sucot
  lexicon: HALOT
  rationale: La relación constructa se expresa naturalmente como «el valle de Sucot». Se mantiene el nombre propio transliterado de forma usual en español, y la mayúscula queda solo en el topónimo.
- source_word: אֲמַדֵּד
  english_pob_choice: measure out
  chosen_spanish: mediré
  alternatives_spanish:
  - mediré y repartiré
  - trazaré
  lexicon: HALOT
  rationale: El piel puede implicar medir con miras a asignar o controlar. En español «mediré» conserva el acto concreto y deja implícita la idea de delimitación territorial.
theological_decisions:
- issue: Alcance de בְּקָדְשׁוֹ
  english_pob_reading: '''in his holiness'' is preferred, though ''from his sanctuary'' remains possible.'
  chosen_spanish_reading: «en su santidad»
  alternative_spanish_readings:
  - «desde su santuario»
  - «por su santidad»
  rationale: La frase hebrea puede apuntar a la santidad divina o a un lugar santo asociado con Dios. La redacción principal mantiene la primera lectura, que el contexto poético favorece, sin borrar la alternativa espacial reconocida por el texto fuente.
  doctrine_reference: Santidad divina / lenguaje cultual poético
- issue: Naturaleza de las primeras personas del discurso
  english_pob_reading: The first-person verbs inside the quotation are God's own speech about his sovereign claim over the land.
  chosen_spanish_reading: Las formas en primera persona quedan como palabras directas de Dios sobre su derecho soberano sobre la tierra.
  alternative_spanish_readings:
  - El salmista habla después de informar que Dios ha hablado.
  rationale: La sintaxis del verso introduce un discurso divino y luego continúa con verbos en primera persona, lo que en español se refleja mejor como cita directa de Dios. Esto preserva la intención retórica y el énfasis en la soberanía territorial.
  doctrine_reference: Soberanía divina sobre la tierra prometida
translation_notes:
  revision_awareness: 'Se revisó la coherencia con la auditoría inglesa: se mantuvo la lectura principal de בְּקָדְשׁוֹ como cualidad/santidad divina, pero se conservó la ambigüedad relevante en la nota; también se ajustó el nivel de intensidad de אֶעְלֹזָה para que en español suene natural sin perder el matiz de exultación.'
  spanish_consistency_notes:
  - Se usó «Dios» para אֱלֹהִים por el verbo singular y el contexto de pacto.
  - 'Se transliteraron los topónimos con formas usuales en español bíblico: «Siquem» y «Sucot».'
  - Se prefirió «ha hablado» para reflejar el perfecto hebreo con vigencia presente.
  - Se evitó introducir «santuario» en el texto principal para no fijar una alternativa no decidida por el hebreo.
  - La cita directa mantiene la primera persona divina en paralelo con el texto fuente.
