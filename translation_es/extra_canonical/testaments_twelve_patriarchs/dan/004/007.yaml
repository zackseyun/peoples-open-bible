translation:
  language: es
  text: Y la ira con falsedad es un mal de dos rostros, y se unen entre sí para perturbar el corazón; y, al estar el alma continuamente perturbada, el Señor se aparta de ella, y Beliar la domina.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: διπρόσωπον κακὸν
  english_pob_choice: a two-faced evil
  chosen_spanish: un mal de dos rostros
  alternatives_spanish:
  - un mal de doble cara
  - un mal duplicitario
  lexicon: LSJ
  rationale: Conserva la metáfora vívida de duplicidad sin aplanarla a una etiqueta abstracta.
- source_word: συναίρονται ἀλλήλοις
  english_pob_choice: they join with one another
  chosen_spanish: se unen entre sí
  alternatives_spanish:
  - se asocian mutuamente
  - se confabulan
  lexicon: LSJ
  rationale: Conserva el matiz de cooperación recíproca.
- source_word: ταράξωσι τὴν καρδίαν
  english_pob_choice: trouble the heart
  chosen_spanish: perturbar el corazón
  alternatives_spanish:
  - turbar el corazón
  - alborotar el corazón
  lexicon: LSJ
  rationale: Sencillo y directo; mantiene la imaginería de perturbación recurrente del capítulo.
- source_word: ἀφίσταται ὁ Κύριος
  english_pob_choice: the Lord departs
  chosen_spanish: el Señor se aparta
  alternatives_spanish:
  - el Señor se retira
  - el Señor se aleja
  lexicon: LSJ
  rationale: Equivalente preciso de ἀφίσταμαι con el sentido espacial-relacional.
- source_word: Βελίαρ
  english_pob_choice: Beliar
  chosen_spanish: Beliar
  alternatives_spanish:
  - Belial
  lexicon: Greek witness tradition
  rationale: Se sigue la transliteración del testimonio griego, no la forma normalizada 'Belial'.
- source_word: κυριεύει
  english_pob_choice: rules over
  chosen_spanish: domina
  alternatives_spanish:
  - señorea sobre
  - manda sobre
  lexicon: LSJ
  rationale: Verbo fuerte que indica dominio efectivo, en contraste deliberado con la partida del Señor.
theological_decisions:
- issue: Dualismo Señor/Beliar
  chosen_reading: el Señor se aparta de ella, y Beliar la domina
  alternative_readings:
  - interpretar Beliar como mera metáfora del mal
  rationale: El testamento combina exhortación ética con lenguaje de conflicto espiritual. Preservar ambas dimensiones se ajusta a la fuente y evita el reduccionismo.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
translation_notes:
  revision_awareness: 'Esta unidad no recibió cambios en la revisión inglesa (unchanged: true).'
  spanish_consistency_notes:
  - Κύριος → Señor; Βελίαρ → Beliar (consistente).
  - διπρόσωπον → 'de dos rostros'.
