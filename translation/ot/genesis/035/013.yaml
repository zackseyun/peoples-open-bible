id: GEN.35.13
reference: Genesis 35:13
source:
  edition: WLC
  text: וַ/יַּ֥עַל מֵ/עָלָ֖י/ו אֱלֹהִ֑ים בַּ/מָּק֖וֹם אֲשֶׁר דִּבֶּ֥ר אִתּֽ/וֹ־׃
translation:
  text: Then God went up from him in the place where he had spoken with him[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'ascended from him.' The Hebrew preserves upward movement in God's departure from the encounter.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַל
  chosen: went up
  alternatives:
  - ascended
  - departed
  lexicon: HALOT
  rationale: עלה in the qal commonly means 'go up/ascend.' Here it describes God's departure from Jacob after appearing to him. 'Went up' preserves the concrete vertical imagery of the Hebrew better than the more interpretive 'departed,' while remaining natural English.
- source_word: מֵעָלָיו
  chosen: from him
  alternatives:
  - from upon him
  - from over him
  lexicon: HALOT
  rationale: The preposition literally has the sense 'from upon/over him,' but in English this is awkward in this context. 'From him' communicates the relational departure clearly while avoiding an over-literal rendering that would sound unnatural.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Although morphologically plural in form, אֱלֹהִים here takes a singular verb and refers to the one true God in narrative context, so 'God' is the correct English rendering.
- source_word: בַּמָּקוֹם
  chosen: at the place
  alternatives:
  - in the place
  lexicon: HALOT
  rationale: The beth preposition with מקום can be rendered 'in' or 'at.' 'At the place' is more idiomatic in English for a location where an encounter occurred.
- source_word: אֲשֶׁר
  chosen: where
  alternatives:
  - that
  - in which
  lexicon: HALOT
  rationale: The relative particle introduces the location clause. Because the antecedent is 'place,' English idiom favors 'where' rather than the more wooden 'that' or 'in which.'
- source_word: דִּבֶּר אִתּוֹ
  chosen: he had spoken with him
  alternatives:
  - he spoke with him
  - he had spoken to him
  lexicon: HALOT
  rationale: The piel of דבר with אֵת commonly means 'speak with.' The prior context identifies God as the speaker and Jacob as the addressee, so 'he had spoken with him' best reflects the completed prior action relative to God's going up. 'With' is preferable to 'to' because it matches the Hebrew construction more closely.
