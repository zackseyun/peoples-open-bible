translation:
  language: es
  text: Que aquel día sea tinieblas; que Dios desde arriba no lo busque[a], y que no resplandezca sobre él la luz[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «no lo busque ni le preste atención»; el verbo hebreo puede implicar buscar, atender o tomar en cuenta. También puede entenderse «que Dios de arriba no lo busque».
    reason: lexical_alternative
  - marker: b
    text: O «claridad» o «resplandor» para «luz».
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהִי
  english_pob_choice: May ... be
  chosen_spanish: sea
  alternatives_spanish:
  - que ... sea
  - haya
  lexicon: HALOT
  rationale: El yusivo expresa un deseo o imprecación. En español, la forma optativa natural en este contexto es «que ... sea», que conserva la fuerza de deseo sin sonar arcaica.
- source_word: חֹשֶׁךְ
  english_pob_choice: darkness
  chosen_spanish: tinieblas
  alternatives_spanish:
  - oscuridad
  - tiniebla
  lexicon: HALOT
  rationale: El sustantivo nombra la condición de oscuridad. «Tinieblas» mantiene el registro poético y el paralelismo con el lamento, sin convertirlo en adjetivo.
- source_word: יִדְרְשֵׁהוּ
  english_pob_choice: seek it
  chosen_spanish: lo busque
  alternatives_spanish:
  - lo busque y atienda
  - se ocupe de él
  - lo atienda
  lexicon: HALOT
  rationale: דרש puede significar buscar, inquirir o prestar atención. «Lo busque» preserva la imagen verbal básica y permite el matiz contextual de atenderse o tomar en cuenta.
- source_word: אֱלוֹהַּ
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - Dios Todopoderoso
  lexicon: HALOT
  rationale: אֱלוֹהַּ es el singular poético «Dios». No hay base inmediata para expandirlo a «Todopoderoso».
- source_word: מִמָּעַל
  english_pob_choice: above
  chosen_spanish: desde arriba
  alternatives_spanish:
  - de arriba
  - desde lo alto
  lexicon: HALOT
  rationale: La frase indica la perspectiva de arriba. «Desde arriba» conserva mejor el valor espacial de la expresión hebrea y encaja con el orden español.
- source_word: תּוֹפַע
  english_pob_choice: shine
  chosen_spanish: resplandezca
  alternatives_spanish:
  - brille
  - fulgure
  - arroje luz
  lexicon: HALOT
  rationale: El verbo en hifil transmite la idea de aparecer/brillar con claridad. «Resplandezca» refleja bien ese brillo activo y suena natural en poesía bíblica española.
- source_word: נְהָרָה
  english_pob_choice: light
  chosen_spanish: la luz
  alternatives_spanish:
  - claridad
  - brillo
  - resplandor
  lexicon: HALOT
  rationale: El sustantivo denota luz o brillo. «La luz» es la equivalencia más directa y conserva el paralelismo con «resplandezca».
- source_word: הַיּוֹם הַהוּא
  english_pob_choice: that day
  chosen_spanish: aquel día
  alternatives_spanish:
  - ese día
  - ese mismo día
  lexicon: HALOT
  rationale: La frase demostrativa apunta al día del nacimiento de Job. «Aquel día» es la forma española más natural y suficientemente precisa.
- source_word: עָלָיו
  english_pob_choice: upon it
  chosen_spanish: sobre él
  alternatives_spanish:
  - sobre ello
  - encima de él
  lexicon: HALOT
  rationale: El antecedente es masculino singular («aquel día»). «Sobre él» conserva la referencia y el registro poético.
theological_decisions:
- issue: Referencia directa a Dios en una imprecación
  english_pob_reading: Retain the direct reference 'God above' without softening or paraphrasing.
  chosen_spanish_reading: Mantener la referencia directa «Dios, desde arriba», sin reemplazarla por una circunlocución impersonal.
  alternative_spanish_readings:
  - el de arriba
  - desde el cielo no lo busque
  rationale: El hebreo nombra explícitamente a אֱלוֹהַּ. La traducción debe conservar el lenguaje audaz del lamento de Job y no diluirlo.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: El pasaje muestra alto acuerdo con la auditoría inglesa y no requiere revisiones sustanciales; se mantuvo la imprecación directa, la equivalencia poética de «tinieblas» y el valor ambivalente de דרש en una solución española natural.
  spanish_consistency_notes:
  - Se preservó «Dios» para אֱלוֹהַּ, conforme al estándar del proyecto.
  - Se evitó «SEÑOR» como máscara del nombre divino porque aquí no aparece el Tetragrámaton.
  - Se mantuvo el antecedente masculino singular en «sobre él» para concordar con «aquel día».
  - Se eligió una solución optativa con «Que ... sea» para reflejar el jussivo hebreo sin arcaísmo excesivo.
