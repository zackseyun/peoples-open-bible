    text: 'O: «Yo soy hijo de un residente extranjero, un amalecita». La frase hebrea puede entenderse como una identificación de su padre como un amalecita que residía en tierra ajena, o más ampliamente como una vinculación del hablante por descendencia con un amalecita que vivía como residente foráneo.'
    reason: lexical_alternative
