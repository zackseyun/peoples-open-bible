translation:
  language: es
  text: Y en el segundo año[a], cuando llegaron a la casa de Dios en Jerusalén, en el segundo mes, Zorobabel hijo de Salatiel y Jesúa hijo de Josadac comenzaron, junto con sus hermanos y con los sacerdotes, los levitas y todos los que habían venido de la cautividad a Jerusalén[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el templo de Dios» o «el santuario de Dios». El término griego puede referirse al complejo sagrado en sentido amplio; «casa de Dios» conserva el lenguaje de restauración.
    reason: lexical_alternative
  - marker: b
    text: O «todos los que habían regresado del exilio». El griego dice más literalmente «de la cautividad».
    reason: lexical_alternative
lexical_decisions:
- source_word: τῷ δευτέρῳ ἔτει
  english_pob_choice: in the second year
  chosen_spanish: en el segundo año
  alternatives_spanish:
  - durante el segundo año
  lexicon: BDAG
  rationale: La locución temporal dativa se expresa de manera directa y natural en español con «en el segundo año», conservando la cronología narrativa sin añadir matices no presentes en el griego.
- source_word: παραγενόμενοι
  english_pob_choice: when they had come
  chosen_spanish: cuando habían llegado
  alternatives_spanish:
  - habiendo llegado
  - después de haber llegado
  lexicon: BDAG
  rationale: El participio marca una acción previa respecto de «comenzaron». «Cuando habían llegado» conserva esa anterioridad de forma natural en español, sin forzar una relación causal que el griego no exige.
- source_word: τὸ ἱερὸν τοῦ θεοῦ
  english_pob_choice: the house of God
  chosen_spanish: la casa de Dios
  alternatives_spanish:
  - el templo de Dios
  - el santuario de Dios
  lexicon: BDAG
  rationale: Sigo la opción de la POB inglesa por el valor cultual amplio del término en el contexto de restauración. «Casa de Dios» preserva la idiomática bíblica y evita restringir innecesariamente el referente arquitectónico.
- source_word: μηνὸς δευτέρου
  english_pob_choice: in the second month
  chosen_spanish: en el segundo mes
  alternatives_spanish:
  - durante el segundo mes
  lexicon: BDAG
  rationale: La expresión temporal se traduce de forma simple y estándar. «En el segundo mes» es idiomática y fiel al genitivo de tiempo.
- source_word: ἤρξαντο
  english_pob_choice: began
  chosen_spanish: comenzaron
  alternatives_spanish:
  - empezaron
  lexicon: BDAG
  rationale: «Comenzaron» mantiene el registro narrativo formal del texto y corresponde bien al verbo simple de inicio de acción.
- source_word: Ζοροβαβὲλ ὁ τοῦ Σαλαθιὴλ
  english_pob_choice: Zerubbabel son of Shealtiel
  chosen_spanish: Zorobabel hijo de Salatiel
  alternatives_spanish:
  - Zorobabel hijo de Sealtiel
  lexicon: LSJ
  rationale: En español bíblico es preferible una transliteración estable del nombre propio. «Salatiel» sigue la forma griega; «Sealtiel» sería una alternativa hebraísta, pero aquí mantengo la forma más cercana al testimonio griego auditado.
- source_word: Ἰησοῦς ὁ τοῦ Ἰωσεδὲκ
  english_pob_choice: Jeshua son of Jozadak
  chosen_spanish: Jesúa hijo de Josadac
  alternatives_spanish:
  - Jeshúa hijo de Josadac
  - Josué hijo de Josedec
  lexicon: LSJ
  rationale: Sigo la forma española tradicional adaptada al nombre postexílico, evitando la ambigüedad de «Jesús». «Jesúa» refleja la forma del antropónimo en este contexto y mantiene el vínculo con el griego Ἰησοῦς.
- source_word: οἱ ἀδελφοὶ αὐτῶν
  english_pob_choice: their brothers
  chosen_spanish: sus hermanos
  alternatives_spanish:
  - sus parientes
  - sus compatriotas
  lexicon: BDAG
  rationale: Conservo el término relacional masculino plural del griego. En este contexto puede abarcar el grupo asociado de manera amplia, pero el texto dice literalmente «hermanos», así que no lo neutralizo.
- source_word: οἱ ἱερεῖς οἱ Λευεῖται
  english_pob_choice: the priests, the Levites
  chosen_spanish: los sacerdotes, los levitas
  alternatives_spanish:
  - los sacerdotes y los levitas
  - los sacerdotes levitas
  lexicon: BDAG
  rationale: La sintaxis griega coordina dos grupos; por eso los mantengo separados en español. La coma reproduce la enumeración sin fusionar indebidamente las categorías.
- source_word: πάντες οἱ παραγενόμενοι ἐκ τῆς αἰχμαλωσίας
  english_pob_choice: all who had come from the captivity
  chosen_spanish: todos los que habían venido de la cautividad
  alternatives_spanish:
  - todos los que habían regresado del cautiverio
  - todos los que habían venido del exilio
  lexicon: BDAG
  rationale: «Cautividad» conserva la fuerza concreta del griego αἰχμαλωσία y el trasfondo de restauración. «Habían venido» refleja el participio perfecto relativo con suficiente naturalidad en español.
theological_decisions:
- issue: Cómo verter τὸ ἱερὸν τοῦ θεοῦ en un contexto de restauración del templo
  english_pob_reading: the house of God
  chosen_spanish_reading: la casa de Dios
  alternative_spanish_readings:
  - el templo de Dios
  - el santuario de Dios
  rationale: La tradición de Esdras/1 Esdras usa lenguaje de «casa de Dios» para la comunidad restaurada. Mantenerlo evita una lectura excesivamente técnica de «templo» y conserva la resonancia bíblica del lugar de culto.
  doctrine_reference: Translation philosophy §1, §5
- issue: Si ἀδελφοί debe neutralizarse como colectivo inclusivo
  english_pob_reading: their brothers
  chosen_spanish_reading: sus hermanos
  alternative_spanish_readings:
  - sus parientes
  - sus correligionarios
  rationale: No neutralizo el masculino plural porque el texto griego sí lo usa. En este caso la fidelidad lexical es más importante que una paráfrasis inclusiva, aunque el contexto pueda abarcar al grupo entero de retornados.
  doctrine_reference: Translation philosophy §4
- issue: Cómo traducir Ἰησοῦς en un contexto postexílico sin confundirlo con Jesús del NT
  english_pob_reading: Jeshua son of Jozadak
  chosen_spanish_reading: Jesúa hijo de Josadac
  alternative_spanish_readings:
  - Jeshúa hijo de Josadac
  - Josué hijo de Josedec
  rationale: La forma española «Jesúa» permite mantener la continuidad con el griego Ἰησοῦς y, al mismo tiempo, evitar la identificación automática con el nombre del Nuevo Testamento. En este contexto, la identidad del sumo sacerdote queda clara por la tradición de Esdras.
  doctrine_reference: Translation philosophy §2, §6
translation_notes:
  revision_awareness: La redacción sigue el último pase revisado del inglés al preferir una relación temporal directa para παραγενόμενοι («when they had come») y conserva la opción de «house of God» como término cultual amplio. También respeta la coordinación griega de grupos y mantiene la referencia concreta a la cautividad frente a una domesticación como «exilio».
  spanish_consistency_notes:
  - He mantenido «casa de Dios» para armonizar con la terminología de restauración usada en Esdras y textos afines.
  - He usado «cautividad» como equivalente principal de αἰχμαλωσία, coherente con la opción auditada del inglés POB.
  - He evitado «Jesús» para Ἰησοῦς y empleé «Jesúa» para preservar la distinción contextual del personaje postexílico.
  - La puntuación refleja una sola oración prolongada, como en el griego, con una lista coordinada de agentes.
