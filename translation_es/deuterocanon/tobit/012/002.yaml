base_translation:
  language: en
  yaml_path: translation/deuterocanon/tobit/012/002.yaml
  text: And he said[a], “Father[b], I lose nothing by giving him half of what I have brought back.”
  footnotes:
  - marker: a
    text: The Greek says literally, 'I am not harmed, having given him half of what I have brought.' The sense is that paying the guide half the recovered goods would not leave Tobias at a loss.
    reason: lexical_alternative
  - marker: b
    text: The Semitic parallel likewise supports the sense of taking half of the money/goods brought back, reinforcing 'brought back' rather than a bare 'brought.'
    reason: cross_reference
