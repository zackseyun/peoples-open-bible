translation:
  language: es
  text: Bebieron el vino y alabaron a los dioses de oro y de plata, de bronce[a], de hierro, de madera y de piedra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'cobre' para 'bronce'. El término arameo puede denotar cobre o bronce; 'bronce' encaja mejor con la lista convencional de materiales de ídolos en este contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִשְׁתִּיו
  english_pob_choice: They drank
  chosen_spanish: Bebieron
  alternatives_spanish:
  - Estuvieron bebiendo
  lexicon: HALOT
  rationale: El verbo arameo expresa una acción narrativa completa en perfecto; el pretérito simple español reproduce mejor la secuencia que un progresivo.
- source_word: חַמְרָא
  english_pob_choice: the wine
  chosen_spanish: el vino
  alternatives_spanish:
  - vino
  lexicon: HALOT
  rationale: El estado enfático del sustantivo señala un vino específico del banquete; en español el artículo definido comunica bien esa especificidad.
- source_word: וְשַׁבַּחוּ
  english_pob_choice: and praised
  chosen_spanish: y alabaron
  alternatives_spanish:
  - y glorificaron
  - y ensalzaron
  lexicon: HALOT
  rationale: El verbo denota dar alabanza; 'alabaron' es la equivalencia natural en español y conserva el matiz cultual sin exagerarlo.
- source_word: לֵאלָהֵי
  english_pob_choice: the gods of
  chosen_spanish: a los dioses de
  alternatives_spanish:
  - a los dioses del
  - a los dioses de los
  lexicon: HALOT
  rationale: El ל marca el objeto indirecto de la alabanza. En español, 'alabar a' es la construcción natural; 'dioses' debe mantenerse en plural por la forma aramea y el contexto idolátrico.
- source_word: דַּהֲבָא
  english_pob_choice: gold
  chosen_spanish: oro
  alternatives_spanish:
  - de oro
  lexicon: HALOT
  rationale: En la lista material, el sustantivo funciona como descriptor de material. 'De oro' expresa con naturalidad la cadena genitiva en español.
- source_word: וְכַסְפָּא
  english_pob_choice: and silver
  chosen_spanish: y de plata
  alternatives_spanish:
  - y plata
  lexicon: HALOT
  rationale: Se conserva la coordinación y la estructura material del original con una preposición repetida para mayor claridad en español.
- source_word: נְחָשָׁא
  english_pob_choice: bronze
  chosen_spanish: bronce
  alternatives_spanish:
  - cobre
  lexicon: HALOT
  rationale: Como en la versión inglesa auditada, 'bronce' encaja mejor con la lista convencional de materiales de ídolos en este contexto; se preserva la alternativa léxica en nota.
- source_word: פַרְזְלָא
  english_pob_choice: iron
  chosen_spanish: hierro
  alternatives_spanish:
  - de hierro
  lexicon: HALOT
  rationale: Término estándar para el metal en la lista de materiales.
- source_word: אָעָא
  english_pob_choice: wood
  chosen_spanish: madera
  alternatives_spanish:
  - de madera
  lexicon: HALOT
  rationale: Término estándar del material; se integra en la enumeración de forma idiomática en español.
- source_word: וְאַבְנָא
  english_pob_choice: and stone
  chosen_spanish: y de piedra
  alternatives_spanish:
  - y piedra
  lexicon: HALOT
  rationale: En una lista de materiales de ídolos, 'piedra' es la equivalencia natural; la preposición repetida mantiene el paralelismo de la serie.
theological_decisions:
- issue: ¿'dioses' o 'Dios' en לֵאלָהֵי?
  english_pob_reading: the gods
  chosen_spanish_reading: los dioses
  alternative_spanish_readings:
  - Dios
  rationale: La forma plural y la lista de materiales de ídolos muestran que el texto habla de deidades paganas, no del Dios de Israel. Mantener el plural evita borrar la crítica al idolatrismo.
  doctrine_reference: 'Affirmations; Translation philosophy #1'
- issue: ¿'cobre' o 'bronce' para נְחָשָׁא?
  english_pob_reading: bronze (with copper as alternative)
  chosen_spanish_reading: bronce
  alternative_spanish_readings:
  - cobre
  rationale: El propio audit trail inglés prefiere 'bronze' por ajuste al catálogo convencional de materiales de ídolos; en español, 'bronce' es la elección más natural y reconocible para esa lista.
  doctrine_reference: HALOT; english lexical decision on נְחָשָׁא
translation_notes:
  revision_awareness: El control cruzado del inglés indica alto acuerdo (1.0) y no requirió revisiones posteriores; se conserva la decisión principal de 'bronce' y la lectura plural de 'dioses' sin cambios.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa 'alabar' para שׁבחַ, coherente con la traducción POB inglesa y con español eclesial actual.
  - La serie de materiales se mantiene como enumeración fluida en español sin alterar el orden del arameo.
