translation:
  language: es
  text: '¿Todavía dirás[a]: «Yo soy un dios», delante del que te mata? Pero tú eres un hombre[b], y no un dios, en manos de los que te hieren[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Acaso dirás?» o «¿De veras seguirás diciendo?»; el hebreo usa un infinitivo absoluto con el verbo finito para intensificar la pregunta.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «un hombre»; el contraste es entre un ser humano y la deidad pretendida.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «los que te profanan»; el verbo hebreo puede sugerir profanación o desacralización, pero la revisión inglesa privilegia aquí «los que te hieren».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֶאָמֹר תֹּאמַר
  english_pob_choice: Will you still say
  chosen_spanish: ¿Todavía dirás
  alternatives_spanish:
  - ¿Acaso dirás
  - ¿Dirás todavía
  - ¿Seguirás diciendo
  lexicon: HALOT
  rationale: La construcción de infinitivo absoluto con verbo finito intensifica la pregunta. En español, «todavía dirás» conserva bien la fuerza retadora y la continuidad implícita sin volverlo torpemente repetitivo.
- source_word: אֱלֹהִים
  english_pob_choice: a god
  chosen_spanish: un dios
  alternatives_spanish:
  - Dios
  - divino
  lexicon: HALOT
  rationale: Aquí el contexto es la autoexaltación blasfema del gobernante, no una referencia al Dios verdadero. Por eso en español corresponde el indefinido «un dios», que refleja mejor la ironía del pasaje.
- source_word: לִפְנֵי
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - en presencia de
  - ante
  lexicon: HALOT
  rationale: «Delante de» reproduce la relación espacial-relacional del hebreo de forma natural en español y encaja con el tono de confrontación.
- source_word: הֹרְגֶךָ
  english_pob_choice: the one who kills you
  chosen_spanish: el que te mata
  alternatives_spanish:
  - tu asesino
  - el que te está matando
  lexicon: HALOT
  rationale: El participio agente se expresa con una relativa activa en español. «El que te mata» mantiene la inmediatez y la fuerza verbal mejor que un sustantivo fijo.
- source_word: אָדָם
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - un ser humano
  - un mortal
  lexicon: HALOT
  rationale: El contraste es entre criatura humana y pretensión divina. «Un hombre» es directo, claro y conserva el filo retórico del hebreo.
- source_word: אֵל
  english_pob_choice: a god
  chosen_spanish: un dios
  alternatives_spanish:
  - Dios
  - una deidad
  lexicon: HALOT
  rationale: El sustantivo singular aquí sigue la misma negación irónica de la pretensión divina. En español, «un dios» conserva la simetría con la primera parte y evita confundirlo con el nombre del Dios verdadero.
- source_word: בְּיַד
  english_pob_choice: in the hand of
  chosen_spanish: en manos de
  alternatives_spanish:
  - bajo el poder de
  - a merced de
  lexicon: HALOT
  rationale: La expresión idiomática se entiende naturalmente en español como dominio o control. «En manos de» conserva la imagen hebrea y sugiere poder ejercido sobre la víctima.
- source_word: מְחַלְלֶיךָ
  english_pob_choice: those who wound you
  chosen_spanish: los que te hieren
  alternatives_spanish:
  - los que te profanan
  - los que te deshonran
  - los que te dañan
  lexicon: HALOT
  rationale: La revisión inglesa privilegia aquí el sentido contextual de herir, aunque el verbo pueda sugerir profanar o desacralizar. En español, «los que te hieren» transmite esa decisión revisada con naturalidad y sin perder la humillación implícita.
theological_decisions:
- issue: La pretensión de divinidad del gobernante de Tiro
  english_pob_reading: I am a god ... you are a man, and not a god
  chosen_spanish_reading: Yo soy un dios ... tú eres un hombre, y no un dios
  alternative_spanish_readings:
  - Yo soy Dios ... tú eres hombre, y no Dios
  rationale: El hebreo presenta predicados indefinidos que, en este contexto, denuncian una autodeificación humana. La traducción española conserva esa ironía y evita identificar la frase con una referencia directa al nombre de Dios.
  doctrine_reference: 'Principio POB: primacía del sentido original y preservación de la tensión lexical-teológica'
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada desde «those who profane you» a «those who wound you» para ajustar mejor el participio hebreo al contexto inmediato. La redacción española sigue esa decisión revisada, pero preserva en nota la alternativa semántica de profanación porque sigue siendo una posibilidad léxica real del verbo.
  spanish_consistency_notes:
  - Se mantiene «dios/un dios» y no «Dios» en los predicados del versículo, conforme al contexto de autodeificación humana.
  - Se evita «SEÑOR» u otras sustituciones para el nombre divino porque aquí no aparece יהוה; el pasaje contrasta criatura humana con pretensión divina.
  - «En manos de» conserva la imagen idiomática hebrea sin convertirla en una paráfrasis explicativa.
  - La nota c conserva la tensión entre la revisión contextual («herir») y el potencial léxico de profanación, sin borrar ninguna posibilidad documentada.
