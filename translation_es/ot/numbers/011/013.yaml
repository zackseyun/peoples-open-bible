  to: '¿De dónde voy a sacar carne para dar a todo este pueblo? Porque me lloran[a], diciendo: «Danos carne, para que comamos».'
  rationale: Se reemplaza «lloran hacia mí» por «me lloran[a]» porque el borrador original suena poco idiomático y no refleja bien el llanto dirigido a Moisés. La nota conserva el literal hebreo y las alternativas semánticas ya documentadas. El resto del versículo puede mantenerse, pues es fiel al origen y claro en español.
