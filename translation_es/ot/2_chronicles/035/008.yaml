review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura general del hebreo: los beneficiarios (''para el pueblo, para los sacerdotes y para los levitas''), los nombres propios, el cargo de los tres hombres y las cantidades dadas. También mantiene correctamente לַפְּסָחִים como referencia a ofrendas/animales pascuales y no a múltiples fiestas. Sin embargo, הֵרִימוּ no queda fielmente representado por «llevaron», ya que el sentido es de contribuir/aportar una ofrenda voluntaria, no meramente trasladarla.'
  spanish_quality_summary: El español es claro y legible, pero «llevaron una ofrenda voluntaria» suena menos natural y menos preciso que «contribuyeron con una ofrenda voluntaria» o «aportaron una ofrenda voluntaria». El resto del versículo fluye bien. «2.600» y «300 cabezas de ganado» son naturales en español.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «casa de Dios», «levitas», «Pascua» y los nombres propios están bien. La principal corrección léxica es alinear הֵרִימוּ con «contribuyeron»/«aportaron», coherente con la decisión auditada en inglés.
  issues:
  - severity: medium
    issue: «llevaron una ofrenda voluntaria» no refleja bien הֵרִימוּ
    rationale: El hiphil de רום en este contexto indica aportar/contribuir una ofrenda. «Llevaron» puede sugerir solo transporte físico y debilita el valor de donación presente en el hebreo y en la auditoría inglesa.
  - severity: low
    issue: Falta la nota sobre לַפְּסָחִים preservada en la auditoría inglesa
    rationale: 'El inglés conservó una alternativa léxica importante: el plural puede referirse a sacrificios/animales de la Pascua. En español conviene mantener esa nota para no cerrar innecesariamente la interpretación.'
  revised_spanish_text: Y sus oficiales contribuyeron con una ofrenda voluntaria para el pueblo, para los sacerdotes y para los levitas. Hilcías, Zacarías y Jehiel, los líderes de la casa de Dios, dieron a los sacerdotes 2.600 ofrendas de Pascua[a] y 300 cabezas de ganado.
  revised_footnotes:
  - marker: a
    text: O «sacrificios de Pascua». El plural hebreo puede referirse a los animales usados para la celebración de la Pascua.
    reason: lexical_alternative
  revision_rationale: Se reemplaza «llevaron» por «contribuyeron con» para reflejar con más fidelidad el sentido de aportar una ofrenda voluntaria en הֵרִימוּ. Además, se añade la nota léxica sobre «ofrendas de Pascua» para preservar la alternativa interpretativa documentada en la auditoría inglesa.
