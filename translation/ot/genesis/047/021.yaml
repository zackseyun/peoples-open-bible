theological_decisions:
- issue: Interpretation of Joseph's action toward the Egyptian population
  chosen_reading: he moved them into the cities
  alternative_readings:
  - he moved them from city to city
  - he reduced them to servitude
  rationale: The Hebrew wording most directly describes relocation, not enslavement. Some translations reflect a different textual tradition or interpretive expansion, but the Masoretic Text here supports movement/transfer of the people across the land. The translation therefore follows the Hebrew source text's plain sense without importing a harsher policy statement not explicit in this wording.
