base_translation:
  language: en
  yaml_path: translation/ot/1_kings/008/025.yaml
  text: And now[a], Yahweh, God of Israel, keep for your servant David my father what you spoke to him, saying, ‘You shall not lack a man before me to sit on the throne of Israel, if only your sons keep their way, to walk before me as you have walked before me.’
  footnotes:
