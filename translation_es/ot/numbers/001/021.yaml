  - pertenecientes a la tribu de
  - de la casa de
  lexicon: HALOT
  rationale: En este contexto censal, לְ con מַטֶּה indica pertenencia tribal. «Del clan de» evita una repetición demasiado rígida de «tribu» y sigue siendo fiel al valor de afiliación del original; se usa como opción natural en español sin cambiar el referente.
- source_word: רְאוּבֵן
