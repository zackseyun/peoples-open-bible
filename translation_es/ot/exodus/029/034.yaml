translation:
  language: es
  text: Y si queda algo de la carne de la ofrenda de ordenación[a] o del pan hasta la mañana, entonces quemarás con fuego lo que haya quedado. No se comerá, porque es santo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la ofrenda de consagración». El término hebreo se refiere al rito sacerdotal de instalación.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִוָּתֵר
  english_pob_choice: is left
  chosen_spanish: queda
  alternatives_spanish:
  - permanece
  - queda sobrante
  lexicon: HALOT
  rationale: El nifal expresa que algo queda o permanece sin consumirse. «Queda» es natural en español y conserva la idea pasiva de residuo sin añadir matices ajenos.
- source_word: בְּשַׂר
  english_pob_choice: flesh
  chosen_spanish: carne
  alternatives_spanish:
  - carne sacrificial
  - carne ofrecida
  lexicon: HALOT
  rationale: «Carne» mantiene el término concreto del hebreo y el registro sacrificial. «Carne sacrificial» sería más explicativo, pero el contexto ya aclara de qué carne se trata.
- source_word: הַמִּלֻּאִים
  english_pob_choice: the ordination offering
  chosen_spanish: la ofrenda de ordenación
  alternatives_spanish:
  - la ofrenda de consagración
  - la ofrenda de instalación
  lexicon: HALOT
  rationale: En este contexto sacerdotal, el término alude al rito de instalación/ordenación. «Ordenación» conserva ese valor ritual; se añade «ofrenda» porque el pasaje habla de la carne de ese acto sacrificial.
- source_word: לֶּחֶם
  english_pob_choice: bread
  chosen_spanish: pan
  alternatives_spanish:
  - panes
  lexicon: HALOT
  rationale: «Pan» es el equivalente normal en español bíblico para לֶחֶם cuando designa el alimento, y funciona mejor que una calca más rígida.
- source_word: עַד הַבֹּקֶר
  english_pob_choice: until the morning
  chosen_spanish: hasta la mañana
  alternatives_spanish:
  - hasta el amanecer
  - para la mañana
  lexicon: HALOT
  rationale: La preposición עַד marca un límite temporal; «hasta la mañana» lo expresa con claridad y sin sobreinterpretar la hora exacta.
- source_word: וְשָׂרַפְתָּ
  english_pob_choice: then you shall burn
  chosen_spanish: entonces quemarás
  alternatives_spanish:
  - y quemarás
  - luego quemarás
  lexicon: HALOT
  rationale: El waw consecutivo introduce la acción resultante del mandato condicional. «Entonces» ayuda a marcar la relación lógica sin perder la forma imperativa.
- source_word: הַנּוֹתָר
  english_pob_choice: what is left
  chosen_spanish: lo que haya quedado
  alternatives_spanish:
  - lo sobrante
  - el resto
  lexicon: HALOT
  rationale: El sustantivado derivado del mismo verbo de «quedar» se refleja bien con «lo que haya quedado», que conserva la relación léxica y suena natural en español.
- source_word: בָּאֵשׁ
  english_pob_choice: with fire
  chosen_spanish: en el fuego
  alternatives_spanish:
  - con fuego
  - al fuego
  lexicon: HALOT
  rationale: El hebreo usa la preposición instrumental/local. En español, «en el fuego» expresa de manera idiomática la acción de quemar lo restante.
- source_word: לֹא יֵאָכֵל
  english_pob_choice: It shall not be eaten
  chosen_spanish: No se comerá
  alternatives_spanish:
  - No debe comerse
  - No será comido
  lexicon: HALOT
  rationale: La pasiva impersonal de prohibición se vierte naturalmente como «No se comerá», manteniendo el tono legal y sobrio del mandato.
- source_word: קֹדֶשׁ
  english_pob_choice: holy
  chosen_spanish: santo
  alternatives_spanish:
  - sagrado
  - consagrado
  lexicon: HALOT
  rationale: «Santo» conserva la fuerza cultual y teológica del término en español bíblico. «Sagrado» sería válido, pero aquí «santo» enlaza mejor con la terminología ritual del pasaje.
theological_decisions:
- issue: Sentido ritual de הַמִּלֻּאִים en el marco sacerdotal
  english_pob_reading: the ordination offering
  chosen_spanish_reading: la ofrenda de ordenación
  alternative_spanish_readings:
  - la ofrenda de consagración
  rationale: El contexto de Éxodo 29 trata de la investidura sacerdotal. «Ordenación» recoge mejor ese acto de instalación ministerial; «consagración» sigue siendo posible, pero es algo más general.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented exception)
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y el audit trail inglés sin depender mecánicamente de la redacción inglesa. Se conserva la tensión lexical documentada en הַמִּלֻּאִים mediante una nota alternativa, y no se introducen glosas doctrinales fuera de lo que el contexto exige. No hay revisiones previas que incorporar.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma base del proyecto, aunque este versículo no contiene el nombre divino.
  - «Carne», «pan», «mañana» y «santo» conservan el registro cultual simple y directo del hebreo.
  - Se usa una construcción impersonal natural en español para la prohibición, sin perder el valor legal del pasaje.
