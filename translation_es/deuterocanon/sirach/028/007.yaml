    rationale: El marcador [a] aparece tras «mandamientos», pero la nota explica la alternativa de «pasa por alto / pass over ignorance». Esto rompe la correspondencia exigida entre ancla y contenido de la nota y debe corregirse.
  revised_spanish_text: Acuérdate de los mandamientos, y no te enojes con tu prójimo; acuérdate de la alianza del Altísimo, y pasa por alto[a] la ignorancia.
