translation:
  language: es
  text: Y te libraré[a] de la mano de hombres malvados, y te redimiré[b] del poder de los despiadados[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «te rescataré» para «te libraré».
    reason: lexical_alternative
  - marker: b
    text: O «te rescataré» para «te redimiré».
    reason: lexical_alternative
  - marker: c
    text: O «los violentos» para «los despiadados».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִצַּלְתִּיךָ
  english_pob_choice: And I will deliver you
  chosen_spanish: Y te libraré
  alternatives_spanish:
  - Y te rescataré
  - Y te salvaré
  lexicon: HALOT
  rationale: El piel/hiphil de נצל expresa sacar o librar de peligro. «Libraré» conserva la idea de liberación efectiva y suena natural en español bíblico actual, sin perder la fuerza de rescate implícita.
- source_word: מִיַּד
  english_pob_choice: from the hand of
  chosen_spanish: de la mano de
  alternatives_spanish:
  - del poder de
  - de la autoridad de
  lexicon: HALOT
  rationale: יַד es literalmente «mano» y funciona idiomáticamente para dominio o control. Mantener «mano» preserva la imagen concreta del hebreo.
- source_word: רָעִים
  english_pob_choice: evil men
  chosen_spanish: hombres malos
  alternatives_spanish:
  - hombres malvados
  - los malos
  - hombres perversos
  lexicon: HALOT
  rationale: El hebreo plural masculino se refiere a personas hostiles. «Hombres malos» conserva el referente humano y la fuerza moral del término sin introducir una abstracción más pesada.
- source_word: וּפְדִתִיךָ
  english_pob_choice: and I will redeem you
  chosen_spanish: y te redimiré
  alternatives_spanish:
  - y te rescataré
  - y te compraré de vuelta
  lexicon: HALOT
  rationale: פדה lleva la idea de rescatar pagando rescate o sacando de una situación de cautiverio. «Redimiré» conserva mejor el peso teológico y covenantal que una opción meramente funcional como «liberaré».
- source_word: מִכַּף
  english_pob_choice: from the grasp of
  chosen_spanish: de la garra de
  alternatives_spanish:
  - de la mano de
  - del puño de
  lexicon: HALOT
  rationale: כַּף es «palma/mano», pero en contexto hostil el inglés POB eligió «grasp». En español, «garra» comunica control agresivo y opresivo con naturalidad, manteniendo la imagen de captura.
- source_word: עָרִצִים
  english_pob_choice: the ruthless
  chosen_spanish: los violentos
  alternatives_spanish:
  - los crueles
  - los tiranos
  - los despiadados
  lexicon: HALOT
  rationale: עָרִיץ denota gente violenta, opresora o temible. «Los violentos» es breve y fiel; evita especificar un matiz político que el hebreo no exige en este verso.
theological_decisions:
- issue: Renderización del plural masculino רָעִים
  english_pob_reading: evil men
  chosen_spanish_reading: hombres malos
  alternative_spanish_readings:
  - los malos
  - personas malas
  - los malvados
  rationale: Se conserva el referente masculino plural del hebreo, sin neutralizarlo. La opción mantiene la correspondencia gramatical y el sentido de oposición moral y humana del texto.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Peso teológico de פדה
  english_pob_reading: redeem you
  chosen_spanish_reading: te redimiré
  alternative_spanish_readings:
  - te rescataré
  - te liberaré
  rationale: «Redimir» conserva el trasfondo de rescate con valor pactal y no reduce el verbo a una simple salida funcional. Esto respeta la densidad semántica que el POB destaca en inglés.
  doctrine_reference: HALOT; DOCTRINE.md Translation philosophy
translation_notes:
  revision_awareness: 'La versión inglesa más reciente se mantiene sin cambios; el cotejo reporta alta concordancia y ninguna revisión aplicada. La redacción española sigue esa lectura estable, preservando las dos acciones paralelas: librar/redimir, y las dos imágenes: mano/garra.'
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto fuente lo requiera explícitamente; este versículo no lo contiene.
  - «Libraré» se eligió por naturalidad y por equivaler al campo de נצל sin debilitarlo.
  - Se mantuvo la imaginería concreta del hebreo («mano», «garra») en lugar de abstraerla.
  - «Redimiré» conserva mejor la carga teológica de פדה que una mera «liberación».
