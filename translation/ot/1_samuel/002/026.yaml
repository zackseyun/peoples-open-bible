id: 1SA.2.26
reference: 1 Samuel 2:26
source:
  edition: WLC
  text: וְ/הַ/נַּ֣עַר שְׁמוּאֵ֔ל הֹלֵ֥ךְ וְ/גָדֵ֖ל וָ/ט֑וֹב גַּ֚ם עִם יְהוָ֔ה וְ/גַ֖ם עִם אֲנָשִֽׁים־־׃ס
translation:
  text: Now the boy Samuel continued to grow, and he was good in the sight of both Yahweh and men[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'continued to grow and to be pleasing,' preserving the Hebrew sequence more explicitly.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'both with the LORD and also with men.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/הַ/נַּעַר
  chosen: Now the boy
  alternatives:
  - And the boy
  - the young man
  lexicon: HALOT
  rationale: נַעַר commonly denotes a boy, youth, or young servant. In Samuel's context he is still a child serving at the sanctuary, so 'boy' best fits. The prefixed conjunction is rendered 'Now' for natural English narrative progression.
- source_word: שְׁמוּאֵל
  chosen: Samuel
  rationale: Personal name is transliterated according to the translation philosophy.
- source_word: הֹלֵךְ וְגָדֵל
  chosen: continued to grow
  alternatives:
  - went on growing
  - was growing
  lexicon: HALOT
  rationale: The participle הֹלֵךְ with following predicate/verb forms an idiom of ongoing progression ('kept on' / 'continued'). Rendering the pair as 'continued to grow' captures the durative sense in clear English without woodenly preserving both words.
- source_word: וָטוֹב
  chosen: and he was good in the sight of
  alternatives:
  - and favorable with
  - and pleasing to
  lexicon: HALOT
  rationale: טוֹב here functions predicatively in the idiom 'good with' someone, meaning approved, pleasing, or favored in relation to them. 'Good in the sight of' preserves the evaluative sense and works naturally with both divine and human observers.
- source_word: גַּם עִם יְהוָה וְגַם עִם אֲנָשִׁים
  chosen: of both the LORD and men
  alternatives:
  - with both the LORD and people
  - both with the LORD and with men
  lexicon: HALOT
  rationale: The repeated גַּם ... וְגַם marks a balanced 'both ... and ...' structure. עִם here expresses relation before or with regard to. אֲנָשִׁים is the ordinary masculine plural 'men'; per gender-accurate policy, 'men' is retained rather than neutralizing to 'people,' though the sense is human approval generally.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
