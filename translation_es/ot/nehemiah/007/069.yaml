translation:
  language: es
  text: Y algunos de los jefes de las casas paternas dieron para la obra. El gobernador[b] dio al tesoro mil dáricos de oro[c], cincuenta tazones y quinientas treinta y cinco túnicas de sacerdotes[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo dice «quinientas treinta y cinco túnicas de sacerdotes». El paralelo en Esdras 2:69 dice «cien túnicas de sacerdotes», y algunas traducciones armonizan o siguen otra tradición textual.
    reason: textual_variant
  - marker: b
    text: O «el Tirshata», título administrativo persa.
    reason: lexical_alternative
  - marker: c
    text: Es decir, dáricos persas de oro.
    reason: cultural_note
lexical_decisions:
- source_word: וּמִקְצָת
  english_pob_choice: And some of
  chosen_spanish: Y algunos de
  alternatives_spanish:
  - Y parte de
  - Y de algunos de
  lexicon: HALOT
  rationale: El hebreo introduce una parte del grupo total; «algunos de» conserva el valor partitivo de manera natural en español sin añadir matices no evidentes.
- source_word: רָאשֵׁי הָאָבוֹת
  english_pob_choice: the heads of the fathers’ houses
  chosen_spanish: los cabezas de las casas paternas
  alternatives_spanish:
  - los jefes de las casas paternas
  - los cabezas de las casas ancestrales
  - los jefes de familia
  lexicon: HALOT
  rationale: Se preserva la estructura idiomática del hebreo con «casas paternas». «Cabezas» refleja literalmente רָאשֵׁי, aunque en español «jefes» sería más natural; aquí se mantiene la relación formal con el original.
- source_word: לַמְּלָאכָה
  english_pob_choice: to the work
  chosen_spanish: para la obra
  alternatives_spanish:
  - para el trabajo
  - para la tarea
  lexicon: HALOT
  rationale: En este contexto de reconstrucción/ofrenda, «obra» suena natural y mantiene el sentido de una labor comunal o proyecto, sin reducirlo a un trabajo genérico.
- source_word: הַתִּרְשָׁתָא
  english_pob_choice: the governor
  chosen_spanish: el gobernador
  alternatives_spanish:
  - el Tirshata
  - el gobernador persa
  lexicon: HALOT
  rationale: El título persa se traduce por su función administrativa para claridad lectora, siguiendo la decisión auditada del POB en inglés. «El Tirshata» queda como alternativa transliterada.
- source_word: לָאוֹצָר
  english_pob_choice: to the treasury
  chosen_spanish: al tesoro
  alternatives_spanish:
  - al tesoro público
  - al almacén
  lexicon: HALOT
  rationale: En una lista de donativos, אוֹצָר puede ser «tesoro» o «tesorería»; «tesoro» funciona bien en español y conserva la idea de un depósito de riqueza.
- source_word: דַּרְכְּמֹנִים
  english_pob_choice: gold darics
  chosen_spanish: dáricos de oro
  alternatives_spanish:
  - daricos de oro
  - dáricos
  lexicon: HALOT
  rationale: Se conserva el término histórico «dáricos», explicitando el material con «de oro» como hace el inglés POB. Es un término técnico culturalmente preciso.
- source_word: מִזְרָקוֹת
  english_pob_choice: basins
  chosen_spanish: tazones
  alternatives_spanish:
  - cuencos
  - vasijas
  lexicon: HALOT
  rationale: El término puede referirse a recipientes utilizados en contexto cultual. «Tazones» es comprensible en español moderno; «cuencos» también sería posible, pero «tazones» mantiene un registro más bíblico sin volverse arcaico.
- source_word: כָּתְנוֹת כֹּהֲנִים
  english_pob_choice: priests’ tunics
  chosen_spanish: túnicas de sacerdotes
  alternatives_spanish:
  - túnicas sacerdotales
  - vestiduras de sacerdotes
  - ropas de sacerdotes
  lexicon: HALOT
  rationale: «Túnicas» reproduce bien כָּתְנוֹת, y el complemento «de sacerdotes» conserva la relación posesiva del hebreo. Se evita «sacerdotales» para no suavizar demasiado el paralelismo nominal.
- source_word: שְׁלֹשִׁים וַחֲמֵשׁ מֵאוֹת
  english_pob_choice: five hundred thirty-five
  chosen_spanish: quinientas treinta y cinco
  alternatives_spanish:
  - trescientas treinta y cinco
  lexicon: HALOT
  rationale: Se sigue la vocalización masorética, que da 535, y se mantiene la forma femenina por concordar con «túnicas» implicado en español. La alternativa armonizada con Esdras no se adopta en el texto principal.
theological_decisions:
- issue: Tratamiento del título persa הַתִּרְשָׁתָא
  english_pob_reading: the governor
  chosen_spanish_reading: el gobernador
  alternative_spanish_readings:
  - el Tirshata
  rationale: No se trata de una cuestión doctrinal, pero sí de una decisión histórico-administrativa con implicación de claridad. Traducir el título evita obscuridad para el lector hispanohablante y sigue la línea auditada del POB en inglés.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el audit trail inglés: se siguió la lectura masorética de 535 túnicas, se mantuvo la traducción funcional de הַתִּרְשָׁתָא como «gobernador», y se conservó la precisión histórica de «dáricos» en lugar de una equivalencia genérica.'
  spanish_consistency_notes:
  - Se prefirió un registro bíblico claro y contemporáneo, evitando «SEÑOR» o equivalencias litúrgicas irrelevantes aquí.
  - 'Se mantuvo la coherencia con la terminología POB: títulos administrativos traducidos por función, unidades monetarias conservadas con glosa cultural, y el número conforme al texto hebreo.'
  - La concordancia de «quinientas treinta y cinco» con «túnicas» responde al sustantivo implícito femenino en español y no altera el sentido del hebreo.
