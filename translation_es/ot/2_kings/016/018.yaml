base_translation:
  language: en
  yaml_path: translation/ot/2_kings/016/018.yaml
  text: And the covered way for the Sabbath that they had built in the house[a], and the outer entrance of the king[d][c][b], he turned away from the house of Yahweh because of the king of Assyria.
  footnotes:
  - marker: a
    text: Or 'the Sabbath covered structure,' 'the Sabbath pavilion,' or 'the Sabbath portico.' The exact architectural sense of the Hebrew term is uncertain.
    reason: lexical_alternative
  - marker: b
    text: Or 'the king's outer entrance' or 'the outer entryway for the king.'
    reason: lexical_alternative
  - marker: c
    text: Or 'he altered,' 'he turned aside,' or 'he relocated.' The Hebrew verb can denote turning aside or changing the placement of something, not only outright removal.
    reason: lexical_alternative
  - marker: d
    text: Or 'on account of the king of Assyria,' possibly 'for fear of the king of Assyria.'
    reason: alternative_reading
