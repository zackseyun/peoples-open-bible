translation:
  language: es
  text: y enriquece todo corazón[a], y no se acuerda ni de rey ni de sátrapa; y hace que todo hable en términos de talentos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También podría entenderse de manera más dinámica: «hace que todos hablen de dinero». El griego dice literalmente «hace que todo hable por medio de talentos», donde «talentos» alude a unidades monetarias.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πάσας καρδίας
  english_pob_choice: every heart
  chosen_spanish: todo corazón
  alternatives_spanish:
  - cada corazón
  - todos los corazones
  lexicon: LSJ
  rationale: Conservo el sentido distributivo de καρδία como el interior de la persona. En español, 'todo corazón' mantiene el matiz colectivo sin forzar una expresión poco natural; 'cada corazón' sería posible, pero suena más fragmentado en este encadenamiento.
- source_word: ποιεῖ πλουσίας
  english_pob_choice: makes ... rich
  chosen_spanish: hace rico
  alternatives_spanish:
  - enriquece
  - hace prosperar
  lexicon: LSJ
  rationale: La construcción griega es directa y el campo semántico apunta a riqueza material. 'Hace rico' preserva la imagen económica; 'enriquece' sería equivalente, pero 'hace rico' permite seguir el paralelismo del texto con más transparencia.
- source_word: οὐ μέμνηται
  english_pob_choice: remembers neither
  chosen_spanish: no se acuerda ni de
  alternatives_spanish:
  - no toma en cuenta ni
  - no presta atención a ni
  lexicon: LSJ
  rationale: El verbo literalmente expresa 'recordar', pero aquí implica desatención o indiferencia. 'No se acuerda ni de' conserva la forma de la POB inglesa y la tensión entre memoria literal y desprecio contextual.
- source_word: βασιλέα οὐδὲ σατράπην
  english_pob_choice: king nor satrap
  chosen_spanish: rey ni de sátrapa
  alternatives_spanish:
  - rey ni sátrapa
  - rey ni gobernador
  lexicon: LSJ
  rationale: '''Sátrapa'' preserva el título persa específico del griego y evita generalizarlo a ''gobernador''. En español, la preposición ''de'' se mantiene por la construcción idiomática con ''acordarse de''.'
- source_word: πάντα
  english_pob_choice: everything
  chosen_spanish: todo
  alternatives_spanish:
  - todo lo demás
  - todas las cosas
  lexicon: LSJ
  rationale: Aunque el griego es neutro plural, el contexto lo dirige a una referencia general que culmina en el efecto sobre el habla. 'Todo' conserva esa amplitud sin introducir un sujeto humano explícito que el griego no exige.
- source_word: διὰ ταλάντων
  english_pob_choice: in terms of talents
  chosen_spanish: en términos de talentos
  alternatives_spanish:
  - por medio de talentos
  - con referencia a talentos
  - hablando en talentos
  lexicon: LSJ
  rationale: '''Talentos'' conserva el valor monetario y la rareza del término. ''En términos de talentos'' sigue de cerca la solución inglesa y comunica que el habla queda mediada por unidades de dinero, sin eliminar la metáfora.'
- source_word: λαλεῖν
  english_pob_choice: speak
  chosen_spanish: hable
  alternatives_spanish:
  - hable
  - hablar
  lexicon: LSJ
  rationale: 'El infinitivo griego se vierte con una subordinada final/intensiva natural en español: ''hace que todo hable''. Mantiene el registro y evita una literalidad rígida como ''hacer hablar'' que en español podría sonar más mecánica.'
translation_notes:
  revision_awareness: La redacción sigue de cerca el griego de Swete y el audit trail inglés, conservando la imagen monetaria literal ('talentos') y la ambigüedad de πάντα. Se optó por una formulación española natural que no reduce de antemano la metáfora a una paráfrasis interpretativa, aunque la nota ofrece la lectura dinámica documentada por la POB inglesa.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como norma del proyecto solo cuando el texto lo exija; este versículo no contiene el nombre divino.
  - '''Sátrapa'' se conserva como título histórico específico, coherente con la decisión inglesa.'
  - '''Talentos'' se mantiene literal para preservar la imagen monetaria, con aclaración en nota.'
  - La estructura 'no se acuerda ni de...' reproduce de forma idiomática el valor de οὐ μέμνηται sin diluir el sentido de desatención.
