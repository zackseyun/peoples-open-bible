translation:
  language: es
  text: 'Y esta será la señal para ti: este año comerás lo que brote por sí mismo; y en el segundo año, lo que brote de eso[a]; pero en el tercer año sembrarán, segarán, plantarán viñas y comerán su fruto.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en el segundo año, segunda cosecha» o «rebrote». El término hebreo es raro y se refiere a producto que surge sin siembra normal.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאוֹת
  english_pob_choice: the sign
  chosen_spanish: la señal
  alternatives_spanish:
  - la señal
  - una señal
  lexicon: HALOT
  rationale: El hebreo lleva artículo definido, pero en español 'la señal' suena natural y precisa en este contexto de confirmación dada a Ezequías. 'Señal' comunica el valor de prueba o confirmación mejor que un término más general.
- source_word: אָכוֹל
  english_pob_choice: eat
  chosen_spanish: comerás
  alternatives_spanish:
  - comer
  - comerás
  lexicon: HALOT
  rationale: El infinitivo absoluto hebreo funciona aquí con valor exhortativo/predictivo. En español, el futuro 'comerás' conserva el tono de instrucción profética y evita una literalidad torpe.
- source_word: סָפִיחַ
  english_pob_choice: what grows by itself
  chosen_spanish: lo que brote por sí mismo
  alternatives_spanish:
  - lo que crezca solo
  - el brote espontáneo
  - la cosecha voluntaria
  lexicon: HALOT
  rationale: Se trata de un término agrícola raro para el crecimiento que surge sin siembra normal. 'Lo que brote por sí mismo' conserva la idea de surgimiento espontáneo sin tecnicismos poco transparentes.
- source_word: שָׁחִיס
  english_pob_choice: what springs from that
  chosen_spanish: lo que brote de ello
  alternatives_spanish:
  - lo que brote de eso
  - el segundo brote
  - el rebrote
  lexicon: HALOT
  rationale: El término es raro y probablemente alude al crecimiento del segundo año derivado del primer rebrote. 'Lo que brote de ello' mantiene la dependencia del crecimiento anterior sin resolver de más la ambigüedad.
- source_word: זִרְעוּ
  english_pob_choice: sow
  chosen_spanish: sembrarán
  alternatives_spanish:
  - siembren
  - sembrarán ustedes
  lexicon: HALOT
  rationale: Aunque la forma verbal es plural masculino y puede leerse como imperativa, el español profético fluye bien con futuro secuencial. Se mantiene el carácter instruccional sin forzar una orden directa.
- source_word: וְקִצְרוּ
  english_pob_choice: reap
  chosen_spanish: segarán
  alternatives_spanish:
  - segarán
  - cosecharán
  lexicon: HALOT
  rationale: '''Segar'' conserva el paralelismo agrícola con ''sembrar'' y es fiel al verbo básico de recoger la mies. ''Cosechar'' sería válido, pero menos marcado en la pareja clásica sembrar/segar.'
- source_word: וְנִטְעוּ כְרָמִים
  english_pob_choice: plant vineyards
  chosen_spanish: plantarán viñas
  alternatives_spanish:
  - plantarán viñedos
  - plantarán viñas
  lexicon: HALOT
  rationale: '''כְרָמִים'' son viñas o viñedos; en español bíblico ''viñas'' es directo y sobrio. ''Plantarán viñas'' preserva el sustantivo agrícola sin desplazarlo a una expresión más interpretativa.'
- source_word: וְאִכְלוּ פִרְיָם
  english_pob_choice: eat their fruit
  chosen_spanish: comerán su fruto
  alternatives_spanish:
  - comerán su fruto
  - comerán el fruto de ellas
  lexicon: HALOT
  rationale: El sufijo plural se refiere a las viñas. 'Su fruto' es la forma más natural en español y conserva el referente colectivo sin añadir palabras innecesarias.
- source_word: וְזֶה לְךָ
  english_pob_choice: And this will be for you
  chosen_spanish: Y esta será para ti
  alternatives_spanish:
  - Y esto será para ti
  - Y esta será para ti
  lexicon: HALOT
  rationale: El hebreo presenta una cláusula nominal. En español, 'esta' concuerda naturalmente con 'señal' y mantiene la referencia anticipada del signo.
translation_notes:
  revision_awareness: 'La versión española sigue de cerca el texto hebreo y el juicio del POB inglés: conserva el valor profético-instructivo de la secuencia verbal, mantiene la rareza de los dos términos agrícolas con una solución clara pero no excesivamente técnica, y refleja la estructura del versículo sin suavizarla ni armonizarla con formulaciones tradicionales.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' como norma del proyecto solo cuando aparece el nombre divino; aquí no aparece.
  - Se prefirió 'señal' y no 'milagro' o 'prueba' para mantener la neutralidad semántica del hebreo.
  - Se mantuvo el registro bíblico moderno con verbos sencillos y paralelismo claro.
  - La nota al pie marca la ambigüedad agrícola que el texto hebreo y el audit trail inglés preservan.
