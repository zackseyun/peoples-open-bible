base_translation:
  language: en
  yaml_path: translation/ot/habakkuk/003/010.yaml
  text: The mountains saw you and writhed[a]; a torrent of waters swept by. The deep gave its voice[c][b]; it lifted its hands on high.
  footnotes:
  - marker: a
    text: Or 'trembled,' 'were in anguish,' or 'quaked' for 'writhed.' The Hebrew verb can suggest shaking or labor-like writhing.
    reason: lexical_alternative
  - marker: b
    text: Or 'passed by.' The Hebrew verb is the common word for passing over or by; 'swept by' brings out the force of the torrent imagery.
    reason: lexical_alternative
  - marker: c
    text: Literally 'it lifted its hands on high.' Some understand 'hands' metaphorically of the deep's surging waves.
    reason: lexical_alternative
