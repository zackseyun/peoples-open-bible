    text: El hebreo usa singular en 'librarlo' y 'hacerlo subir', refiriéndose colectivamente a Israel como pueblo.
    reason: lexical_alternative
  - marker: b
    text: O 'una tierra buena y amplia'.
    reason: lexical_alternative
  revision_rationale: 'Se ajusta el texto para que preserve mejor el sentido del hebreo y la documentación POB con español más natural. ''Hacerlo subir'' mantiene el causativo y el motivo geográfico de ascenso mejor que ''subirlo''. ''Que mana leche y miel'' es la expresión española idiomática y fiel para זבת חלב ודבש. Se reemplaza la nota sobre etnónimos por la nota verdaderamente significativa del audit trail: el singular colectivo del pronombre. También se simplifica la nota alternativa sobre ''espaciosa/amplia''.'
