  rationale: 'The manuscript text is explicitly plural: ϩⲉⲛⲙⲁⲕⲁⲣⲓⲟⲥ ⲛⲉ (plural indefinite
    article + plural copula) and ⲛⲙⲟⲛⲁⲭⲟⲥ (plural definite article). Furthermore,
    ⲉⲧⲥⲟⲧⲡ is the relative converter ⲉⲧ- plus the qualitative form ⲥⲟⲧⲡ, which is
    passive/stative (''who are chosen'' or ''elect''), not active. The draft appears
    to have been misled by a faulty automated normalization that changed the number
    to singular and the verb form. | Azure: The proposed change is supported by the
    Coptic grammar. In Thomas 49 the construction is plural, not singular: ϩⲉⲛ- with
    ⲙⲁⲕⲁⲣⲓⲟⲥ and the plural copula ⲛⲉ yields ''blessed are ...'', and ⲛ̄ⲙⲟⲛⲁⲭⲟⲥ point'
