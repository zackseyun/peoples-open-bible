  glossary_alignment: 'Buena alineación con la terminología del proyecto: יְהוָה → «Yahvé» y מְשִׁיחַ → «ungido» en contexto no mesiánico. No hay conflicto doctrinal. La revisión propuesta mantiene estas decisiones.'
