base_translation:
  language: en
  yaml_path: translation/ot/leviticus/019/008.yaml
  text: Whoever eats it shall bear his iniquity[a], because he has profaned the holy thing of Yahweh[d][c][b], and that person shall be cut off from his people.
  footnotes:
  - marker: a
    text: Or 'shall bear his guilt.' The Hebrew idiom can refer to bearing culpability and its consequences.
    reason: lexical_alternative
  - marker: b
    text: '''The holy thing of the LORD'' refers to what has been consecrated to the LORD, here the sacrificial meat.'
    reason: cultural_note
  - marker: c
    text: Or 'that soul shall be cut off.' The Hebrew says 'soul,' a legal idiom for the person.
    reason: lexical_alternative
  - marker: d
    text: '''Shall be cut off'' is a covenantal penalty formula; the text does not specify here whether this means death, expulsion, or direct divine judgment.'
    reason: alternative_reading
