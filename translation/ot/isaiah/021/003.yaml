id: ISA.21.3
reference: Isaiah 21:3
source:
  edition: WLC
  text: עַל כֵּ֗ן מָלְא֤וּ מָתְנַ/י֙ חַלְחָלָ֔ה צִירִ֣ים אֲחָז֔וּ/נִי כְּ/צִירֵ֖י יֽוֹלֵדָ֑ה נַעֲוֵ֣יתִי מִ/שְּׁמֹ֔עַ נִבְהַ֖לְתִּי מֵ/רְאֽוֹת־׃
translation:
  text: Therefore my loins are filled with anguish[a]; pains have seized me like the pains of a woman giving birth. I am bent over from hearing[b]; I am dismayed from seeing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'trembling' for 'anguish'; the Hebrew term denotes intense bodily shaking or writhing distress.
    reason: lexical_alternative
  - marker: b
    text: Or 'I am twisted' / 'I am bowed down' for 'I am bent over.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מָלְאוּ מָתְנַי
  chosen: my loins are filled
  alternatives:
  - my waist is filled
  - my body is filled
  lexicon: HALOT
  rationale: מָתְנַיִם literally refers to the loins/waist. 'Loins' preserves the concrete bodily imagery and the formal force of the Hebrew, while remaining understandable in context.
- source_word: חַלְחָלָה
  chosen: anguish
  alternatives:
  - trembling
  - writhing
  - horror
  lexicon: HALOT
  rationale: The noun denotes intense bodily shaking or anguish. In this context of visceral distress and labor-pain imagery, 'anguish' best captures the experiential sense in natural English without losing severity.
- source_word: צִירִים
  chosen: pains
  alternatives:
  - convulsions
  - writhings
  lexicon: HALOT
  rationale: The term can denote pains, especially labor pains. Since the next clause explicitly compares them to the pains of a woman giving birth, rendering the first occurrence simply as 'pains' avoids redundancy while preserving the connection.
- source_word: אֲחָזוּנִי
  chosen: have seized me
  alternatives:
  - have taken hold of me
  - have gripped me
  lexicon: HALOT
  rationale: The verb conveys forceful grasping. 'Have seized me' communicates the sudden overpowering nature of the pains.
- source_word: כְּצִירֵי יוֹלֵדָה
  chosen: like the pains of a woman giving birth
  alternatives:
  - like labor pains
  - like the birth pains of a woman in labor
  lexicon: HALOT
  rationale: This simile is explicit and vivid. 'A woman giving birth' is clear modern English and preserves the source image without unnecessary idiom.
- source_word: נַעֲוֵיתִי
  chosen: I am bent over
  alternatives:
  - I am bowed down
  - I am twisted
  lexicon: HALOT
  rationale: The Niphal form expresses being bent, twisted, or doubled over. In context of overwhelming pain, 'I am bent over' is idiomatic and reflects the bodily effect of the distress.
- source_word: מִשְּׁמֹעַ
  chosen: from hearing
  alternatives:
  - so that I cannot hear
  - by what I hear
  lexicon: HALOT
  rationale: 'The preposition מן with infinitive here is best taken causally: the speaker is bent over because of what he hears. ''From hearing'' is concise and close to the Hebrew structure.'
- source_word: נִבְהַלְתִּי
  chosen: I am terrified
  alternatives:
  - I am dismayed
  - I am alarmed
  lexicon: HALOT
  rationale: The verb denotes being disturbed, alarmed, or terrified. Given the intensity of the verse, 'terrified' best matches the emotional force.
- source_word: מֵרְאוֹת
  chosen: from seeing
  alternatives:
  - at what I see
  - because of seeing
  lexicon: HALOT
  rationale: As with מִשְּׁמֹעַ, the phrase is causal. 'From seeing' preserves the parallelism with 'from hearing' and stays close to the Hebrew.
