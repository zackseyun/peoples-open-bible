translation:
  language: es
  text: Si he hallado favor[a] ante los ojos del rey, y si le parece bien al rey conceder mi petición y cumplir mi ruego, que vengan el rey y Amán al banquete que prepararé para ellos, y mañana haré conforme a la palabra del rey[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más idiomática: «Si he hallado favor con el rey».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «haré conforme a la palabra del rey», probablemente en el sentido de que Ester responderá a la petición del rey y dará a conocer su propia petición al día siguiente.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מָצָאתִי חֵן בְּעֵינֵי
  english_pob_choice: have found favor in the eyes of
  chosen_spanish: he hallado favor ante los ojos de
  alternatives_spanish:
  - he hallado favor con
  - he hallado gracia ante los ojos de
  lexicon: HALOT
  rationale: Conservo la imagen hebrea de 'los ojos' con 'ante los ojos de', que suena natural en español bíblico contemporáneo y mantiene el matiz de aceptación favorable en la corte. 'Favor' refleja mejor el contexto real que 'gracia', que podría cargar una resonancia teológica no dominante aquí.
- source_word: עַל הַמֶּלֶךְ טוֹב
  english_pob_choice: it pleases the king
  chosen_spanish: le parece bien al rey
  alternatives_spanish:
  - agrada al rey
  - es bueno ante el rey
  lexicon: HALOT
  rationale: La expresión hebrea indica lo que resulta aceptable o favorable al rey. 'Le parece bien al rey' reproduce esa cortesía idiomática en español sin volverla rígida.
- source_word: לָתֵת אֶת שְׁאֵלָתִי
  english_pob_choice: to grant my petition
  chosen_spanish: conceder mi petición
  alternatives_spanish:
  - dar mi petición
  - otorgar mi petición
  lexicon: HALOT
  rationale: '''Petición'' mantiene el registro formal de súplica ante un rey. ''Conceder'' expresa mejor que la solicitud sea aceptada; ''dar mi petición'' sería demasiado literal y poco natural en español.'
- source_word: וְלַעֲשׂוֹת אֶת בַּקָּשָׁתִי
  english_pob_choice: and fulfill my request
  chosen_spanish: y cumplir mi ruego
  alternatives_spanish:
  - y hacer mi ruego
  - y realizar mi petición
  lexicon: HALOT
  rationale: El hebreo usa otro sustantivo afín al anterior; en español conviene distinguirlo para preservar la variación. 'Ruego' conserva el tono suplicante y evita repetir exactamente 'petición'.
- source_word: שְׁאֵלָתִי / בַּקָּשָׁתִי
  english_pob_choice: petition / request
  chosen_spanish: petición / ruego
  alternatives_spanish:
  - ruego / petición
  - solicitud / ruego
  lexicon: HALOT
  rationale: La alternancia entre dos términos cercanos del hebreo se refleja con dos palabras distintas en español para no borrar la variación lexical del original.
- source_word: יָבֹא
  english_pob_choice: let the king and Haman come
  chosen_spanish: que vengan el rey y Amán
  alternatives_spanish:
  - que el rey y Amán vengan
  - pueda venir el rey y Amán
  lexicon: HALOT
  rationale: Aunque la forma es imperfecta, en contexto funciona como invitación/jussivo. 'Que vengan' conserva la fuerza petitoria y el orden natural del español.
- source_word: הַמִּשְׁתֶּה
  english_pob_choice: the banquet
  chosen_spanish: el banquete
  alternatives_spanish:
  - la fiesta
  - el convite
  lexicon: HALOT
  rationale: '''Banquete'' encaja bien en el marco real de Ester y corresponde al uso preferido en español para este tipo de comida formal.'
- source_word: אֲשֶׁר אֶעֱשֶׂה לָהֶם
  english_pob_choice: that I will prepare for them
  chosen_spanish: que prepararé para ellos
  alternatives_spanish:
  - que haré para ellos
  - que les haré
  lexicon: HALOT
  rationale: '''Prepararé'' traduce de forma natural el ''hacer'' hebreo aplicado a un banquete, sin perder el carácter de futuro de la acción.'
- source_word: וּמָחָר אֶעֱשֶׂה כִּדְבַר הַמֶּלֶךְ
  english_pob_choice: and tomorrow I will do according to the king’s word
  chosen_spanish: y mañana haré conforme a la palabra del rey
  alternatives_spanish:
  - y mañana actuaré conforme a la palabra del rey
  - y mañana haré según la palabra del rey
  lexicon: HALOT
  rationale: Mantengo la formulación abierta de la expresión hebrea, como hace el POB inglés, sin explicitar indebidamente que Esther responderá con su petición. 'Conforme a la palabra del rey' conserva la ambigüedad respetada en el original.
translation_notes:
  revision_awareness: El texto inglés de la POB para Ester 5:8 se mantiene sin cambios en la última revisión, con acuerdo alto en la verificación cruzada; la presente propuesta sigue esa lectura y conserva la ambigüedad final de כִּדְבַר הַמֶּלֶךְ.
  spanish_consistency_notes:
  - Se usa 'Yahvé' en el proyecto cuando aparece el Tetragrámaton; en este versículo no aparece.
  - Se mantiene 'Amán' como forma habitual en español para Haman.
  - '''Favor'' se reserva aquí para el favor cortesano; no se reemplaza por ''gracia'' para evitar una lectura teológica no requerida por el contexto.'
  - '''Petición'' y ''ruego'' distinguen las dos formas hebreas cercanas sin sobretraducirlas.'
