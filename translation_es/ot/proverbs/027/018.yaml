review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido básico del hebreo: quien cuida la higuera come su fruto, y quien atiende fielmente a su superior recibe honra. Sin embargo, «vela sobre su señor» y «su señor» juntos introducen en español una resonancia más elevada y potencialmente religiosa que el hebreo אֲדֹנָיו no exige aquí. Además, la nota b está mal formulada: el anclaje en el texto no corresponde a una alternativa real del segundo hemistiquio, y contiene un residuo no español («בלבד»).'
  spanish_quality_summary: 'La primera mitad es natural y clara: «El que cuida una higuera comerá su fruto». La segunda mitad suena menos idiomática y más ambigua teológicamente por «vela sobre su señor». En español eclesial general, «señor» puede sugerir fácilmente una referencia divina, pese a la decisión auditada de evitarla. «Cuida a su amo» o «atiende a su amo» expresa mejor la relación humana y el paralelismo sapiencial. También conviene corregir la nota con español limpio y con una alternativa verdaderamente alternativa.'
  glossary_alignment: 'No hay conflicto con los términos globales principales. La cuestión clave es אֲדֹנָיו: según la justificación inglesa, debe leerse como superior humano, no como título divino. En español, «amo» preserva mejor ese valor contextual que «señor». Para שֹׁמֵר, «cuida» mantiene el sentido de atención fiel mejor que «vela sobre» en este contexto.'
  issues:
  - severity: high
    issue: «su señor» sugiere innecesariamente un referente divino o litúrgico
    rationale: La decisión teológica auditada especifica un superior humano. En español bíblico, «señor» suele activar la lectura de «el Señor», especialmente junto con «vela sobre». Eso debilita la fidelidad contextual.
  - severity: medium
    issue: «vela sobre su señor» es menos natural e idiomático que otras opciones
    rationale: Aunque comprensible, la combinación suena rígida. «Cuida a su amo» o «atiende a su amo» transmite mejor el cuidado fiel y el paralelismo con el primer miembro.
  - severity: high
    issue: La nota b está defectuosa y contiene texto no español («בלבד»)
    rationale: La nota incluye un residuo hebreo ajeno al español final, lo que requiere corrección obligatoria de calidad editorial.
  - severity: medium
    issue: La nota b no presenta una alternativa adecuada al texto principal
    rationale: El texto principal ya dice «vela sobre su señor», y la nota ofrece prácticamente lo mismo. La nota debería conservar una alternativa significativa como «guarda a su amo» o explicar el matiz de cuidado fiel.
  revised_spanish_text: El que cuida una higuera comerá su fruto[a], y el que cuida a su amo[b] será honrado.
