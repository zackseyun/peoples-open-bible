id: PSA.59.0
reference: Psalms 59:0
source:
  edition: WLC
  text: לַ/מְנַצֵּ֣חַ אַל תַּשְׁחֵת֮ לְ/דָוִ֪ד מִ֫כְתָּ֥ם בִּ/שְׁלֹ֥חַ שָׁא֑וּל וַֽ/יִּשְׁמְר֥וּ אֶת הַ֝/בַּ֗יִת לַ/הֲמִיתֽ/וֹ־־׃
translation:
  text: 'For the choir director: “Do Not Destroy.” Of David[a]. A miktam, when Saul sent men[d][c][b], and they watched the house to kill him.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, “when Saul sent, and they watched the house to kill him.” The Hebrew does not explicitly state “men,” but the plural verb implies sent agents.
    reason: lexical_alternative
  - marker: b
    text: “Do Not Destroy” is likely a tune name or musical notation in the psalm heading.
    reason: cultural_note
  - marker: c
    text: The meaning of “miktam” is uncertain; it is therefore transliterated rather than translated.
    reason: lexical_alternative
  - marker: d
    text: Or 'when Saul sent men and they watched the house'.
    reason: previous_rendering
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  chosen: For the choir director
  alternatives:
  - For the music director
  - To the choirmaster
  lexicon: HALOT
  rationale: Superscription formula in the Psalms indicating direction to the musical leader. 'Choir director' is clear modern English while preserving the function.
- source_word: אַל־תַּשְׁחֵת
  chosen: Do Not Destroy
  alternatives:
  - Do not destroy
  - Destroy not
  lexicon: HALOT
  rationale: Likely the name of a tune or musical setting in the superscription. Capitalized and set in quotation marks to signal a title rather than a direct imperative within the psalm body.
- source_word: לְדָוִד
  chosen: Of David
  alternatives:
  - For David
  - By David
  lexicon: HALOT
  rationale: Standard superscriptional לְ with David is best left as 'Of David,' preserving the traditional ambiguity of authorship, association, or dedication rather than over-specifying.
- source_word: מִכְתָּם
  chosen: miktam
  alternatives:
  - inscription
  - psalm
  - golden song
  lexicon: HALOT
  rationale: The term's precise meaning is uncertain, so transliteration is more transparent and auditable than choosing a speculative gloss.
- source_word: בִּשְׁלֹחַ
  chosen: when Saul sent men
  alternatives:
  - when Saul sent
  - at Saul's sending
  lexicon: HALOT
  rationale: 'Temporal use of ב + infinitive construct: ''when ... sent.'' English supplies ''men'' from the following plural verb for natural sense.'
- source_word: וַיִּשְׁמְרוּ
  chosen: they watched
  alternatives:
  - they kept watch over
  - they guarded
  lexicon: HALOT
  rationale: שׁמר here denotes surveillance rather than protective guarding, in light of the hostile purpose clause that follows. 'Watched' is concise and contextually accurate.
- source_word: אֶת־הַבַּיִת
  chosen: the house
  alternatives:
  - his house
  - the household
  lexicon: HALOT
  rationale: Definite direct object 'the house.' English does not require adding 'his,' though the referent is David's house from context.
- source_word: לַהֲמִיתוֹ
  chosen: to kill him
  alternatives:
  - in order to kill him
  - to put him to death
  lexicon: HALOT
  rationale: Purpose infinitive with 3ms suffix. 'To kill him' is the most direct and natural rendering.
