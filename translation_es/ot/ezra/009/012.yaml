translation:
  language: es
  text: Y ahora[a], no den sus hijas a sus hijos, ni tomen las hijas de ellos para sus hijos; nunca busquen su paz ni su bienestar, para que ustedes sean fuertes, coman lo bueno de la tierra y la dejen como herencia a sus hijos varones[b] para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Literalmente: «no busquen su paz ni su bien para siempre».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «la dejen a sus hijos varones como herencia para siempre».'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנוֹתֵיכֶם ... לִבְנֵיהֶם
  english_pob_choice: give your daughters to their sons
  chosen_spanish: no den sus hijas a sus hijos
  alternatives_spanish:
  - no den sus hijas en matrimonio a sus hijos
  lexicon: HALOT
  rationale: El hebreo usa una formulación breve que, en este contexto, implica matrimonio. En español, «dar hijas a hijos» conserva la estructura y la fuerza del mandato; añadir «en matrimonio» sería válido, pero más explicativo que el hebreo.
- source_word: וּבְנֹתֵיהֶם אַל תִּשְׂאוּ לִבְנֵיכֶם
  english_pob_choice: do not take their daughters for your sons
  chosen_spanish: ni tomen las hijas de ellos para sus hijos
  alternatives_spanish:
  - ni tomen sus hijas en matrimonio para sus hijos
  - ni tomen las hijas de ellos como esposas para sus hijos
  lexicon: HALOT
  rationale: נשא aquí funciona como modismo de tomar en matrimonio. «Tomar las hijas de ellos para sus hijos» mantiene el paralelismo con la primera cláusula y deja claro el vínculo matrimonial por el contexto sin sobrecargar la frase.
- source_word: תִדְרְשׁוּ
  english_pob_choice: seek
  chosen_spanish: busquen
  alternatives_spanish:
  - persigan
  - procuren
  lexicon: HALOT
  rationale: דרש significa «buscar/solicitar». «Busquen» conserva el valor verbal directo y funciona bien con el objeto doble «su paz ni su bienestar».
- source_word: שְׁלֹמָם
  english_pob_choice: their peace
  chosen_spanish: su paz
  alternatives_spanish:
  - su bienestar
  - su seguridad
  lexicon: HALOT
  rationale: שָׁלוֹם abarca paz, bienestar y plenitud. «Paz» es el equivalente más inmediato y mantiene el término bíblico conocido; el segundo sustantivo cubre el matiz de beneficio material/social.
- source_word: וְטוֹבָתָם
  english_pob_choice: their prosperity
  chosen_spanish: su bienestar
  alternatives_spanish:
  - su prosperidad
  - su bien
  lexicon: HALOT
  rationale: טוֹבָה aquí apunta al bien/beneficio de esas personas. «Bienestar» en español moderno comunica mejor la amplitud del término que «prosperidad», sin reducirlo solo a lo económico.
- source_word: עַד עוֹלָם
  english_pob_choice: never
  chosen_spanish: nunca
  alternatives_spanish:
  - para siempre
  - jamás
  lexicon: HALOT
  rationale: En la prohibición, la expresión tiene fuerza absoluta y durativa. «Nunca» transmite de forma natural en español esa negación perpetua sin perder la idea de permanencia.
- source_word: לְמַעַן תֶּחֶזְקוּ
  english_pob_choice: so that you may be strong
  chosen_spanish: para que ustedes sean fuertes
  alternatives_spanish:
  - para que ustedes se fortalezcan
  - a fin de que ustedes sean fuertes
  lexicon: HALOT
  rationale: חזק en qal puede significar «ser fuerte» o «fortalecerse». La forma elegida mantiene el sentido de resultado/purpose sin hacerla más reflexiva de lo que exige el hebreo.
- source_word: וַאֲכַלְתֶּם אֶת טוּב הָאָרֶץ
  english_pob_choice: and eat the good of the land
  chosen_spanish: coman lo bueno de la tierra
  alternatives_spanish:
  - coman el fruto de la tierra
  - disfruten lo bueno de la tierra
  lexicon: HALOT
  rationale: 'El hebreo es concreto: «comer» lo bueno de la tierra. «Lo bueno de la tierra» conserva la imagen y evita interpretar de más; «disfruten» sería más interpretativo.'
- source_word: וְהוֹרַשְׁתֶּם
  english_pob_choice: leave it as an inheritance
  chosen_spanish: la entreguen en herencia
  alternatives_spanish:
  - la dejen en herencia
  - la hereden
  lexicon: HALOT
  rationale: 'El hifil de ירש es causativo: hacer que pase a los descendientes. En español, «entregar en herencia» expresa bien esa causatividad y suena natural; el antecedente implícito se entiende como la tierra/lo bueno de la tierra en contexto.'
- source_word: לִבְנֵיכֶם
  english_pob_choice: to your sons
  chosen_spanish: a sus hijos
  alternatives_spanish:
  - a sus hijos varones
  - a sus descendientes
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «a sus hijos varones», en español «hijos» puede incluir el valor filial de la línea hereditaria y evita una redundancia forzada con el contexto inmediato. Se conserva la referencia familiar sin masculinizar de forma innecesaria el final de la herencia.
theological_decisions:
- issue: Mandato de separación e intermarriage in post-exilic covenant context
  english_pob_reading: Render the prohibition straightforwardly as a ban on intermarriage and on seeking the peace/prosperity of the surrounding peoples in this specific covenant-historical setting, without softening or universalizing it.
  chosen_spanish_reading: Traducir el mandato de manera directa como prohibición de matrimonios mixtos y de buscar la paz o el bienestar de esos pueblos dentro del contexto histórico pactal de Esdras, sin atenuarlo ni convertirlo en una regla generalizada fuera del pasaje.
  alternative_spanish_readings:
  - Suavizarlo como una advertencia general contra vínculos espiritualmente peligrosos
  - Expandirlo como un mandato atemporal sobre toda relación con extraños
  rationale: El pasaje trata de la fidelidad del pueblo restaurado y de preservar la santidad del linaje del pacto. La traducción debe conservar la aspereza del mandato y su marco histórico, sin diluirlo en aplicaciones más amplias que el texto no formula.
  doctrine_reference: Translation philosophy items 1 and 3
translation_notes:
  revision_awareness: 'La versión final sigue de cerca el texto hebreo y coincide con la auditoría inglesa: mantiene el paralelismo de las dos prohibiciones matrimoniales, conserva la pareja semántica «paz / bienestar», y expresa el resultado final con herencia perpetua sin añadir explicaciones no presentes. No se introdujeron revisiones posteriores al pasaje auditado.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el nombre divino; en este versículo no se requiere.
  - Se mantiene el tono formal y comunitario del imperativo plural.
  - «Hijos» se usa en sentido heredero/familiar, sin alterar el foco en la línea descendiente masculina del hebreo.
  - El par «paz / bienestar» refleja la distinción entre שָׁלוֹם y טוֹבָה sin fusionarlos.
