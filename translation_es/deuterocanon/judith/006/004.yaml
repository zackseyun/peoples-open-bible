translation:
  language: es
  text: 'Pues los quemaremos donde están, y sus fronteras serán empapadas con su sangre[a], y sus llanuras se llenarán de sus muertos. El rastro de sus pies no resistirá frente a nosotros, sino que perecerán por completo, dice el rey Nabucodonosor, señor de toda la tierra. Porque él dijo: «Las palabras de su boca no quedarán vacías».[b]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O más literalmente: «sus fronteras serán embriagadas con su sangre». El griego usa una metáfora vívida de intoxicación para describir la matanza.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «Ni el rastro de sus pies resistirá frente a nosotros», es decir, no quedará ninguno que permanezca o se sostenga contra el ataque.'
    reason: lexical_alternative
lexical_decisions:
- source_word: κατακαύσομεν
  english_pob_choice: we will burn them up
  chosen_spanish: los quemaremos
  alternatives_spanish:
  - los quemaremos por completo
  - los consumiremos con fuego
  lexicon: LSJ
  rationale: El futuro de κατακαίω expresa destrucción por fuego; en español, «los quemaremos» conserva la fuerza verbal sin añadir paráfrasis innecesaria.
- source_word: ἐν αὐτοῖς
  english_pob_choice: where they are
  chosen_spanish: donde están
  alternatives_spanish:
  - entre ellos
  - en ellos
  lexicon: LSJ
  rationale: La repetición del pronombre en griego funciona locativamente; «donde están» comunica naturalmente la idea de destrucción en su propio lugar.
- source_word: τὰ ὅρια
  english_pob_choice: their borders
  chosen_spanish: sus fronteras
  alternatives_spanish:
  - sus límites
  - su territorio
  lexicon: LSJ
  rationale: «Fronteras» conserva la imagen geográfica concreta del texto y es idiomático en español para un contexto militar.
- source_word: μεθυσθήσεται ἐν τῷ αἵματι αὐτῶν
  english_pob_choice: will be drenched with their blood
  chosen_spanish: serán empapadas con su sangre
  alternatives_spanish:
  - serán embriagadas con su sangre
  - serán saturadas con su sangre
  lexicon: LSJ
  rationale: El verbo griego usa la metáfora de «embriagarse» aplicada a la tierra/los límites; «empapadas» conserva la imagen violenta en español natural, sin forzar una antropomorfización literal.
- source_word: τὰ πεδία
  english_pob_choice: their plains
  chosen_spanish: sus llanuras
  alternatives_spanish:
  - sus campos
  - su campo abierto
  lexicon: LSJ
  rationale: «Llanuras» corresponde bien a πεδία en un contexto geográfico-militar y evita una lectura demasiado agrícola de «campos».
- source_word: πληρωθήσεται νεκρῶν αὐτῶν
  english_pob_choice: will be filled with their dead
  chosen_spanish: se llenarán con sus muertos
  alternatives_spanish:
  - se llenarán con sus cadáveres
  - se llenarán de sus muertos
  lexicon: LSJ
  rationale: «Sus muertos» es una forma idiomática y sobria que mantiene el sentido macabro del original sin volverlo clínico.
- source_word: οὐκ ἀντιστήσεται τὸ ἴχνος τῶν ποδῶν αὐτῶν κατὰ πρόσωπον ἡμῶν
  english_pob_choice: The trace of their feet will not stand before us
  chosen_spanish: El rastro de sus pies no resistirá frente a nosotros
  alternatives_spanish:
  - Ni el rastro de sus pies permanecerá frente a nosotros
  - La huella de sus pies no se mantendrá ante nosotros
  lexicon: LSJ
  rationale: «Rastro de sus pies» conserva la imagen del ἴχνος sin exagerar. «No resistirá frente a nosotros» refleja el valor de ἀνθίστημι como mantenerse/estar en pie contra alguien, con una traducción española natural.
- source_word: ἀλλʼ ἀπωλείᾳ ἀπολοῦνται
  english_pob_choice: they will utterly perish
  chosen_spanish: perecerán por completo
  alternatives_spanish:
  - perecerán en ruina
  - serán destruidos por completo
  lexicon: LSJ
  rationale: La construcción intensiva nombre+verbo pide un equivalente enfático; «perecerán por completo» comunica la totalidad de la destrucción sin sobrecargar el castellano.
- source_word: κύριος πάσης τῆς γῆς
  english_pob_choice: lord of all the earth
  chosen_spanish: señor de toda la tierra
  alternatives_spanish:
  - dueño de toda la tierra
  - gobernante de toda la tierra
  lexicon: LSJ
  rationale: Como en la nota inglesa, κύριος es un título real aplicado a un rey humano; «señor» conserva la relación de dominio sin convertirlo en título divino en español.
- source_word: οὐ ματαιωθήσεται τὰ ῥήματα τῶν λόγων αὐτοῦ
  english_pob_choice: The words of his mouth will not prove empty
  chosen_spanish: Las palabras de su boca no quedarán vacías
  alternatives_spanish:
  - Sus palabras no serán anuladas
  - Las palabras de su boca no resultarán vanas
  lexicon: LSJ
  rationale: La frase pleonástica griega («las palabras de sus palabras») se expresa naturalmente como «las palabras de su boca», manteniendo la fuerza del anuncio y el matiz de no quedar vacías/vanas.
theological_decisions:
- issue: κύριος aplicado a Nabucodonosor como título imperial
  english_pob_reading: lowercase 'lord of all the earth' for a human king's boast
  chosen_spanish_reading: señor de toda la tierra
  alternative_spanish_readings:
  - dueño de toda la tierra
  - gobernante de toda la tierra
  rationale: Se preserva el valor de dominio del griego sin introducir mayúscula devocional ni confundir el título real con el nombre divino.
  doctrine_reference: 'DOCTRINE.md: Contested terms table, κύριος → Lord'
- issue: La metáfora de intoxicación en «serán empapadas con su sangre»
  english_pob_reading: '''drenched with their blood'' for a metaphor of drunkenness'
  chosen_spanish_reading: serán empapadas con su sangre
  alternative_spanish_readings:
  - serán embriagadas con su sangre
  - serán saturadas con su sangre
  rationale: El griego presenta una imagen metafórica intensa; el español conserva la violencia del cuadro sin suavizarlo ni volverlo extraño para el lector.
  doctrine_reference: POB lexical policy for metaphor preservation
translation_notes:
  revision_awareness: El borrador sigue el texto griego de Swete y conserva las decisiones del audit trail inglés, incluyendo la metáfora de sangre y el valor intensivo de la frase final; no se registran revisiones posteriores que alteren el contenido.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera del versículo porque aquí no aparece el nombre divino tetragramático.
  - Se usó «señor» en minúscula para κύριος referido a Nabucodonosor, conforme al valor humano del título en el contexto.
  - Se evitó «Cristo» y cualquier terminología eclesial no presente en el original.
  - «Muertos» traduce νεκρῶν de forma sobria y uniforme con el registro del pasaje.
