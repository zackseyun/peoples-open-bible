translation:
  text: Also[a], because he fully followed God, and in the days of Moses showed loyalty—he and Caleb son of Jephunneh—by standing firm against the assembly's rebellion, to keep the people from sin and to silence wicked grumbling.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''by standing firm in the assembly’s rebellion'' (wording compressed and somewhat uncertain); Greek more fully reads: ''to stand against the enemy, to keep the people from sin, and to stop wicked grumbling.'''
    reason: textual_variant
  - marker: b
    text: Or 'showed mercy.' The Hebrew and Greek terms can denote mercy, but here the context favors loyal, faithful action.
    reason: lexical_alternative
lexical_decisions:
- source_word: מלא אחרי אל
  chosen: fully followed God
  alternatives:
  - was wholly devoted to God
  - followed God completely
  lexicon: HALOT
  rationale: The Hebrew idiom 'filled/fulfilled after God' corresponds to wholehearted following. 'Fully followed God' preserves the idiomatic force and echoes the biblical characterization of Joshua/Caleb without becoming wooden.
- source_word: עשה חסד
  chosen: showed loyalty
  alternatives:
  - did mercy
  - showed steadfast love
  - acted faithfully
  lexicon: HALOT
  rationale: In this context the phrase describes covenantal fidelity or loyal action in Moses' time, not primarily emotional mercy. 'Showed loyalty' fits the immediate narrative of faithful resistance.
- source_word: להתיצב
  chosen: by standing firm
  alternatives:
  - to stand
  - to take a stand
  - to present themselves
  lexicon: HALOT
  rationale: The infinitive expresses decisive opposition in context. 'Standing firm' captures both posture and moral resolve.
- source_word: בפרע קהל
  chosen: against the assembly’s rebellion
  alternatives:
  - when the assembly broke loose
  - in the assembly's disorder
  - before the congregation's revolt
  lexicon: HALOT
  rationale: The Hebrew is somewhat compressed and the manuscript tradition is difficult here. In light of the Greek parallel, the sense is resistance in the face of communal rebellion/sedition. 'Against the assembly’s rebellion' makes the likely sense explicit in readable English.
- source_word: ἀντιστῆναι ἔναντι ἐχθροῦ
  chosen: against the assembly’s rebellion
  alternatives:
  - to stand against the enemy
  lexicon: BDAG
  rationale: The Greek parallel reads 'to stand against the enemy,' which does not align neatly with the extant Hebrew. Because the Hebrew is primary where extant but shows minor mismatch, the Greek helps confirm a sense of active resistance. I did not import 'enemy' into the main text because the Hebrew points more toward communal revolt; the Greek-informed expansion is instead reflected in the following purpose clauses.
- source_word: κωλῦσαι λαὸν ἀπὸ ἁμαρτίας
  chosen: to keep the people from sin
  alternatives:
  - to restrain the people from sinning
  lexicon: BDAG
  rationale: This purpose clause is present in the Greek parallel and likely preserves material abbreviated or damaged in the Hebrew witness. It is significant to the verse's sense and is translated straightforwardly.
- source_word: κοπάσαι γογγυσμὸν πονηρίας
  chosen: to silence wicked grumbling
  alternatives:
  - to stop evil murmuring
  - to quell wicked complaint
  lexicon: BDAG
  rationale: The Greek phrase is vivid and contextually apt for the wilderness rebellion tradition. 'Silence wicked grumbling' is natural English while preserving the moral evaluation in πονηρίας.
- source_word: חסד / ἔλεος
  chosen: loyalty
  alternatives:
  - mercy
  - steadfast love
  lexicon: HALOT; BDAG
  rationale: The Hebrew and Greek overlap semantically but the narrative context favors faithful, loyal action rather than compassion shown to a sufferer. 'Loyalty' best integrates the witnesses.
