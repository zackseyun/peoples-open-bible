translation:
  language: es
  text: Así Yahvé los desarraigó[a] de su tierra, con enojo, furia y gran ira, y los arrojó a otra tierra, como es evidente hasta hoy[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'los arrancó' o 'los arrancó de raíz' para 'los desarraigó'.
    reason: lexical_alternative
  - marker: b
    text: Hebreo 'como este día', un modismo que significa 'como es evidente hoy' o 'como es hasta este día'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְּשֵׁם
  english_pob_choice: uprooted them
  chosen_spanish: los arrancó
  alternatives_spanish:
  - los desarraigó
  - los arrancó de raíz
  lexicon: HALOT
  rationale: El verbo נתשׁ conserva la imagen de arrancar de la tierra, especialmente en contexto de juicio y expulsión. 'Arrancó' comunica la fuerza del acto con naturalidad en español; 'desarraigó' es posible, pero tiende a sonar más abstracto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino propio del Tetragrámaton como 'Yahvé', conforme a la terminología del proyecto, en lugar de sustituirlo por un título.
- source_word: מֵעַל אַדְמָתָם
  english_pob_choice: from their land
  chosen_spanish: de su tierra
  alternatives_spanish:
  - de sobre su suelo
  - de su territorio
  lexicon: HALOT
  rationale: אַדְמָה puede ser 'tierra/suelo/terreno'; en este contexto de desposesión pactal y exilio, 'tierra' es el equivalente más natural y claro en español.
- source_word: בְּאַף
  english_pob_choice: in anger
  chosen_spanish: con enojo
  alternatives_spanish:
  - en ira
  - con ira
  lexicon: HALOT
  rationale: אַף es un hebraísmo de 'enojo/ira'. 'Con enojo' mantiene el tono idiomático y evita un calco demasiado rígido.
- source_word: וּבְחֵמָה
  english_pob_choice: fury
  chosen_spanish: furia
  alternatives_spanish:
  - ira ardiente
  - cólera
  lexicon: HALOT
  rationale: חֵמָה denota ira ardiente, furia o furor. 'Furia' preserva el aumento de intensidad y distingue este término del siguiente.
- source_word: וּבְקֶצֶף גָּדוֹל
  english_pob_choice: and great wrath
  chosen_spanish: y gran ira
  alternatives_spanish:
  - y gran indignación
  - y una gran ira
  lexicon: HALOT
  rationale: קֶצֶף expresa ira, indignación o furor; el adjetivo גָּדוֹל intensifica la expresión. 'Gran ira' mantiene la acumulación retórica de términos de enojo sin sobreexplicar.
- source_word: וַיַּשְׁלִכֵם
  english_pob_choice: and cast them
  chosen_spanish: y los arrojó
  alternatives_spanish:
  - y los lanzó
  - y los echó
  lexicon: HALOT
  rationale: שׁלך significa arrojar/lanzar/castar. 'Arrojó' reproduce bien la acción violenta y el matiz judicial del contexto.
- source_word: אֶל אֶרֶץ אַחֶרֶת
  english_pob_choice: into another land
  chosen_spanish: a otra tierra
  alternatives_spanish:
  - hacia otra tierra
  - a una tierra extraña
  lexicon: HALOT
  rationale: La construcción indica deportación a territorio distinto. 'A otra tierra' es directa y fiel; 'tierra extraña' añade una valoración que el hebreo no explicita.
- source_word: כַּיּוֹם הַזֶּה
  english_pob_choice: as it is this day
  chosen_spanish: como sucede hasta hoy
  alternatives_spanish:
  - como es evidente hasta el día de hoy
  - como es este día
  lexicon: HALOT
  rationale: La expresión idiomática apunta a una condición observable en el presente. 'Como sucede hasta hoy' transmite la fuerza idiomática y su referencia al estado vigente.
theological_decisions:
- issue: Traducción del Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: Se mantiene la decisión doctrinal y editorial de representar el nombre personal de Dios con 'Yahvé', preservando la distinción entre el Nombre y un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Acumulación de términos de ira en el juicio divino
  english_pob_reading: anger, fury, and great wrath
  chosen_spanish_reading: con enojo, furia y gran ira
  alternative_spanish_readings:
  - con ira, furia y gran cólera
  - con enojo, ira y gran indignación
  rationale: El hebreo apila tres términos cercanos para intensificar el juicio. La traducción conserva esa progresión sin neutralizarla en una sola palabra.
  doctrine_reference: DOCTRINE.md Translation philosophy §5 (consistency of key terms, or documented exception)
- issue: k/3117 + הַזֶּה idiomático
  english_pob_reading: as it is this day
  chosen_spanish_reading: como sucede hasta hoy
  alternative_spanish_readings:
  - como es este día
  - como se ve hasta el día de hoy
  rationale: La expresión hebrea funciona como fórmula de actualidad observable. En español, 'como sucede hasta hoy' conserva el valor idiomático y sugiere la evidencia presente del juicio.
  doctrine_reference: HALOT, uso idiomático de כַּיּוֹם הַזֶּה
translation_notes:
  revision_awareness: 'El texto hebreo y la traducción inglesa auditada coinciden en lo esencial: el verbo de expulsión con imagen agrícola, el Nombre divino, la tríada de ira/juicio, el traslado a otra tierra y la fórmula idiomática final. La versión española sigue esa lectura sin introducir ampliaciones, y conserva las alternativas léxicas relevantes en nota.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma consistente para יְהוָה, conforme al estándar del proyecto.
  - '''Tierra'' traduce אַדְמָה en este contexto de posesión y exilio; no se opta por ''suelo'' por sonar más técnico que bíblico en español.'
  - La tríada 'enojo, furia y gran ira' preserva la intensificación retórica del hebreo y evita colapsar los tres términos en uno solo.
  - La frase final se entiende idiomáticamente; la nota aclara que no se trata simplemente de una referencia temporal literal.
