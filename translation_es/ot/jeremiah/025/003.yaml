  glossary_alignment: 'Alineación buena con la terminología del proyecto: יְהוָה = «Yahvé» correctamente; nombres propios y tono profético bien conservados. No hay conflicto doctrinal relevante. La decisión de mantener el idiomático literal «madrugando y hablando» concuerda con la revisión inglesa y debe conservarse, pero con la nota ubicada en esa frase, no en «Amón».'
