translation:
  language: es
  text: 'Y cuando se acercó a la cama, asió el cabello y dijo: «Fortaléceme, oh Dios de Israel, en este día».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐγγίσασα
  english_pob_choice: when she came near
  chosen_spanish: cuando se acercó
  alternatives_spanish:
  - al acercarse
  - habiéndose acercado
  lexicon: LSJ
  rationale: El participio aoristo indica una acción previa o concomitante al gesto siguiente. «Cuando se acercó» conserva la secuencia narrativa natural en español y el valor de aproximación sin volverla forzada.
- source_word: κλίνη
  english_pob_choice: bed
  chosen_spanish: cama
  alternatives_spanish:
  - lecho
  - cama o lecho
  lexicon: LSJ
  rationale: En este contexto narrativo, «cama» es claro y directo en español moderno. «Lecho» sería más elevado o literario, pero no añade fidelidad necesaria.
- source_word: ἐδράξατο
  english_pob_choice: she seized
  chosen_spanish: asió
  alternatives_spanish:
  - agarró
  - se apoderó de
  - tomó
  lexicon: LSJ
  rationale: El medio expresa una toma firme y decisiva. «Asió» comunica ese acto con más sobriedad y fuerza que «tomó», manteniendo un registro digno.
- source_word: κόμη / τῆς κεφαλῆς αὐτοῦ
  english_pob_choice: the hair of his head
  chosen_spanish: el cabello de su cabeza
  alternatives_spanish:
  - el pelo de su cabeza
  - su cabello
  lexicon: LSJ
  rationale: La construcción griega especifica el cabello de la cabeza; «el cabello de su cabeza» reproduce esa precisión. «Cabello» es más neutral y culto que «pelo» en español bíblico contemporáneo.
- source_word: Κραταίωσόν με
  english_pob_choice: Strengthen me
  chosen_spanish: Fortaléceme
  alternatives_spanish:
  - Hazme fuerte
  - Dame fuerzas
  lexicon: LSJ
  rationale: El imperativo pide vigor o fortalecimiento. «Fortaléceme» es la forma más natural y fiel en español para una súplica directa a Dios.
- source_word: ὁ θεὸς Ἰσραήλ
  english_pob_choice: O God of Israel
  chosen_spanish: Dios de Israel
  alternatives_spanish:
  - oh Dios de Israel
  - Dios de Israel
  lexicon: LSJ
  rationale: El griego tiene fuerza vocativa. En español, el vocativo puede quedar implícito por el contexto entre comas y por la oración de súplica; no es necesario añadir «oh» para que sea inteligible y reverente.
- source_word: ἐν τῇ ἡμέρᾳ ταύτῃ
  english_pob_choice: on this day
  chosen_spanish: en este día
  alternatives_spanish:
  - hoy
  - en el día de hoy
  lexicon: LSJ
  rationale: «En este día» mantiene la cercanía temporal y el tono solemne del original. «Hoy» sería más breve, pero perdería un poco de la formulación litúrgica del griego.
theological_decisions:
- issue: Dirección de la súplica y vocativo divino
  english_pob_reading: O God of Israel
  chosen_spanish_reading: Dios de Israel
  alternative_spanish_readings:
  - oh Dios de Israel
  - Dios de Israel, te ruego
  rationale: El griego presenta un llamado directo a Dios. En español, la forma vocativa puede quedar marcada por la puntuación y el contexto orante; así se preserva el sentido de invocación sin introducir palabras no presentes en el texto.
  doctrine_reference: 'DOCTRINE.md: traducir títulos y nombres con claridad, manteniendo el tono de oración'
- issue: Intensidad del verbo de petición
  english_pob_reading: Strengthen me
  chosen_spanish_reading: Fortaléceme
  alternative_spanish_readings:
  - Hazme fuerte
  - Dame fuerzas
  rationale: La petición expresa fortalecimiento/empoderamiento divino. «Fortaléceme» conserva tanto la dimensión física como la de apoyo concedido por Dios, sin desplazar el matiz semántico hacia una mera emoción o ánimo.
  doctrine_reference: LSJ κραταιόω; principio de equivalencia óptima del POB
translation_notes:
  revision_awareness: El texto inglés auditable no contiene notas ni variantes; la versión española sigue de cerca la secuencia y la fuerza imperativa del griego, sin introducir glosas ni suavizar la acción de ἐδράξατο.
  spanish_consistency_notes:
  - Se conserva «Dios» para θεός, conforme al estándar español del proyecto.
  - No se usa «SEÑOR» para el nombre divino porque el versículo tiene θεός, no κύριος.
  - Se mantiene un registro bíblico moderno y claro, evitando arcaísmos innecesarios.
