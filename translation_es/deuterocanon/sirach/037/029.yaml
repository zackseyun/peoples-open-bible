translation:
  language: es
  text: La vida de un hombre es un número de días, pero la del pueblo de Israel son días sin número.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: חַיֵּי אִישׁ
  english_pob_choice: A man's life
  chosen_spanish: La vida de un hombre
  alternatives_spanish:
  - La vida de una persona
  - La vida del hombre
  lexicon: HALOT
  rationale: El hebreo expresa la vida/longevidad de un ser humano individual. En español, 'un hombre' conserva el valor genérico singular de forma natural y sin forzar el género colectivo.
- source_word: מִסְפַּר יָמִים
  english_pob_choice: a number of days
  chosen_spanish: un número de días
  alternatives_spanish:
  - unos días contados
  - días contados
  lexicon: HALOT
  rationale: La expresión comunica una duración finita y contable. 'Un número de días' sigue de cerca la imagen del hebreo sin sonar mecánico en español.
- source_word: וְחַיֵּי עַם יִשְׂרָאֵל
  english_pob_choice: but the life of the people of Israel
  chosen_spanish: pero la vida del pueblo de Israel
  alternatives_spanish:
  - y la vida del pueblo de Israel
  - pero la vida de Israel
  lexicon: HALOT
  rationale: El hebreo permite leer la conjunción como coordinante o con matiz adversativo; el inglés POB adopta 'but' para marcar el contraste. En español, 'pero' preserva ese contraste entre la vida individual finita y la continuidad del pueblo.
- source_word: עַם יִשְׂרָאֵל
  english_pob_choice: the people of Israel
  chosen_spanish: el pueblo de Israel
  alternatives_spanish:
  - la nación de Israel
  - Israel
  lexicon: HALOT
  rationale: '''Pueblo de Israel'' mantiene el sentido colectivo del constructo y evita reducirlo al nombre propio sin el sustantivo colectivo.'
- source_word: יְמֵי אֵין מִסְפָּר
  english_pob_choice: is days without number
  chosen_spanish: es días sin número
  alternatives_spanish:
  - son días sin número
  - son innumerables días
  lexicon: HALOT
  rationale: La frase hebrea significa literalmente 'días de no número', es decir, innumerables. 'Días sin número' conserva el giro idiomático y la correspondencia con el primer hemistiquio.
theological_decisions:
- issue: Contraste entre mortalidad individual y continuidad de Israel
  english_pob_reading: The verse contrasts the finite lifespan of an individual with the enduring, effectively unending continuity of Israel as a people.
  chosen_spanish_reading: El versículo contrasta la vida finita de un individuo con la continuidad indefinida del pueblo de Israel.
  alternative_spanish_readings:
  - El versículo sólo afirma que la historia de Israel es larga
  - El versículo presenta una simple comparación poética sin implicación de continuidad
  rationale: El paralelismo 'número de días' / 'días sin número' pide conservar el contraste sin ampliarlo a una formulación doctrinal que no está explícita. 'Continuidad indefinida' mantiene la tensión interpretativa.
  doctrine_reference: Preservar la tensión teológica sin resolverla de más.
translation_notes:
  revision_awareness: Se corrigió la ausencia previa de anclaje de nota al eliminar la nota crítica no requerida; el texto español se presenta ahora sin notas para evitar marcadores huérfanos.
  spanish_consistency_notes:
  - Se conservó 'pueblo de Israel' por consistencia con el valor colectivo del hebreo.
  - Se prefirió 'pero' para reflejar el contraste explícito que el audit trail inglés documenta.
  - Se evitó 'innumerables' en el cuerpo para mantener la repetición idiomática de 'número/sin número'.
