translation:
  language: es
  text: El hombre vil cava mal[a], y en sus labios hay un fuego abrasador[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cava daño». El hebreo puede enfatizar tanto el mal moral como el daño destructivo que una persona provoca.'
    reason: lexical_alternative
  - marker: b
    text: 'Lit.: «y en sus labios [hay] como un fuego abrasador».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִישׁ
  english_pob_choice: man
  chosen_spanish: el hombre
  alternatives_spanish:
  - la persona
  lexicon: HALOT
  rationale: En este proverbio, אִישׁ funciona como sustantivo masculino singular representativo. En español, «el hombre» conserva ese valor genérico y el paralelismo poético sin neutralizar innecesariamente el sujeto.
- source_word: בְּלִיַּעַל
  english_pob_choice: worthless
  chosen_spanish: indigno
  alternatives_spanish:
  - perverso
  - malvado
  - depravado
  lexicon: HALOT
  rationale: El término puede denotar inutilidad moral o depravación. «Indigno» comunica bien la falta de valor moral y humano en un registro bíblico natural para el español, sin reducirlo solo a un matiz de maldad.
- source_word: כֹּרֶה
  english_pob_choice: digs up
  chosen_spanish: cava
  alternatives_spanish:
  - cava para
  - excava
  - desentierra
  lexicon: HALOT
  rationale: El verbo literalmente significa «cavar». Como imagen proverbial, «cava» mantiene la metáfora básica y resulta más natural en español que una perífrasis más pesada.
- source_word: רָעָה
  english_pob_choice: evil
  chosen_spanish: mal
  alternatives_spanish:
  - maldad
  - daño
  - daño malévolo
  lexicon: HALOT
  rationale: El hebreo permite un campo amplio entre mal moral y daño destructivo. «Mal» conserva esa amplitud mejor que una opción más estrecha como «daño» o solo «maldad».
- source_word: שפתיו
  english_pob_choice: his lips
  chosen_spanish: sus labios
  alternatives_spanish:
  - su խոսla
  - su boca
  lexicon: HALOT
  rationale: Se conserva la imagen corporal directa del hebreo. «Sus labios» prepara el símil del fuego y mantiene el paralelismo poético con fidelidad.
- source_word: כְּאֵשׁ
  english_pob_choice: like a scorching fire
  chosen_spanish: un fuego abrasador
  alternatives_spanish:
  - como fuego
  - como un fuego abrasador
  lexicon: HALOT
  rationale: El hebreo introduce una comparación con fuego; en español, el sintagma nominal «un fuego abrasador» integra naturalmente la intensidad del adjetivo siguiente y conserva la fuerza imagética.
- source_word: צָרָבֶת
  english_pob_choice: scorching
  chosen_spanish: abrasador
  alternatives_spanish:
  - ardiente
  - quemante
  - secoroso
  lexicon: HALOT
  rationale: El término raro expresa calor que quema o chamusca. «Abrasador» comunica ese efecto destructivo con un registro claro y digno en español.
- source_word: וְעַל
  english_pob_choice: and on
  chosen_spanish: y en
  alternatives_spanish:
  - y sobre
  - y sobre sus labios
  lexicon: HALOT
  rationale: La preposición hebrea literalmente es «sobre», pero en español la construcción «en sus labios» es idiomática y preserva la localización metafórica sin sonar forzada.
theological_decisions:
- issue: Valor semántico de בְּלִיַּעל en un proverbio sapiencial
  english_pob_reading: worthless man
  chosen_spanish_reading: el hombre indigno
  alternative_spanish_readings:
  - el hombre perverso
  - el hombre malvado
  rationale: El texto no trata el término como nombre propio sino como caracterización moral. «Indigno» mantiene la fuerza de desvalor moral del hebreo sin volverlo más técnico o más condenatorio de lo que el proverbio exige.
  doctrine_reference: Sabiduría proverbial; caracterización moral del impío
- issue: Relación entre la metáfora del fuego y el habla
  english_pob_reading: and on his lips is a scorching fire
  chosen_spanish_reading: y en sus labios hay un fuego abrasador
  alternative_spanish_readings:
  - y sobre sus labios hay un fuego abrasador
  - y en sus labios está como un fuego abrasador
  rationale: El hebreo conserva la imagen directa sin pronombre añadido. La formulación española evita introducir elementos no presentes y mantiene la tensión entre literalidad y naturalidad poética.
  doctrine_reference: Poética hebrea; metáfora de la palabra destructiva
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando ambas notas a marcadores presentes en el texto español. También se evitó añadir un pronombre ajeno al hebreo, manteniendo la estructura breve y proverbial del original.
  spanish_consistency_notes:
  - Se preserva el tono sapiencial breve y proverbial.
  - «Mal» y «indigno» mantienen la amplitud semántica sin sobreinterpretar el hebreo.
  - Se conserva la imagen corporal de «labios» en vez de generalizar a «palabras» o «habla».
  - La comparación con fuego se expresa de modo natural en español sin perder el valor metafórico.
