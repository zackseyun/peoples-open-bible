translation:
  language: es
  text: Si realmente permanecen en esta tierra[a], entonces yo los edificaré y no los derribaré, y los plantaré y no los arrancaré[b]; porque he cambiado de parecer[c] respecto a la calamidad que les hice.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Si verdaderamente permanecen en esta tierra». El hebreo usa un infinitivo absoluto antes del verbo finito para dar énfasis.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «no los desarraigaré» o «no los arrancaré de raíz».'
    reason: lexical_alternative
  - marker: c
    text: El hebreo dice literalmente «me he retractado/relentado respecto a la calamidad». Aquí expresa un cambio de curso respecto al juicio; no implica arrepentimiento moral. «Calamidad» traduce el sentido de juicio o desastre, no maldad ética.
    reason: theological_note
lexical_decisions:
- source_word: אִם שׁוֹב תֵּשְׁבוּ
  english_pob_choice: If you will indeed remain
  chosen_spanish: Si realmente permanecen
  alternatives_spanish:
  - Si verdaderamente se quedan
  - Si de veras permanecen
  - Si permanecen en verdad
  lexicon: HALOT
  rationale: El infinitivo absoluto antes del verbo finito da énfasis. En español, «realmente» comunica bien esa fuerza enfática sin volverlo pesado, y «permanecen» conserva la idea de continuar habitando, no de volver a entrar.
- source_word: בָּאָרֶץ הַזֹּאת
  english_pob_choice: in this land
  chosen_spanish: en esta tierra
  alternatives_spanish:
  - en este país
  - en esta tierra
  lexicon: HALOT
  rationale: «Tierra» conserva el valor geográfico y pactual de la expresión hebrea mejor que «país», que suena más moderno-político.
- source_word: וּבָנִיתִי אֶתְכֶם
  english_pob_choice: I will build you up
  chosen_spanish: yo los edificaré
  alternatives_spanish:
  - yo los construiré
  - yo los levantaré
  lexicon: HALOT
  rationale: El verbo hebreo es metafórico; «edificar» mantiene la imagen de restauración. Se omite «up» porque en español no es idiomático, pero el contexto de restauración queda claro.
- source_word: וְלֹא אֶהֱרֹס
  english_pob_choice: and not tear you down
  chosen_spanish: y no los destruiré
  alternatives_spanish:
  - y no los derribaré
  - y no los arrasaré
  lexicon: HALOT
  rationale: Aquí se equilibra con «edificaré». «Destruir» expresa bien el contraste en español, aunque es algo más general que «tear down»; «derribar» es posible, pero menos natural para personas como objeto directo.
- source_word: וְנָטַעְתִּי אֶתְכֶם
  english_pob_choice: and I will plant you
  chosen_spanish: y los plantaré
  alternatives_spanish:
  - y los sembraré
  - y los estableceré
  lexicon: HALOT
  rationale: Se conserva la metáfora agrícola directa; «plantar» es la correspondencia más clara y natural en español.
- source_word: וְלֹא אֶתּוֹשׁ
  english_pob_choice: and not uproot you
  chosen_spanish: y no los arrancaré
  alternatives_spanish:
  - y no los desarraigaré
  - y no los arrancaré de raíz
  lexicon: HALOT
  rationale: «Arrancar» reproduce la imagen de planta arrancada y es transparente en español. «Desarraigar» también es válido, pero suena más abstracto; «arrancar de raíz» explicita la metáfora.
- source_word: נִחַמְתִּי
  english_pob_choice: I relent
  chosen_spanish: me he arrepentido
  alternatives_spanish:
  - he desistido
  - he cedido
  lexicon: HALOT
  rationale: El hebreo con sujeto divino expresa un cambio de curso respecto del juicio anunciado. En español, «me he arrepentido» conserva la ambivalencia bíblica, pero requiere nota para evitar que se lea como arrepentimiento moral; alternativas como «he desistido» o «he cedido» atenúan demasiado la fuerza personal del verbo.
- source_word: הָרָעָה
  english_pob_choice: the harm/disaster
  chosen_spanish: del mal
  alternatives_spanish:
  - de la calamidad
  - del daño
  lexicon: HALOT
  rationale: El sustantivo puede referirse a calamidad o desastre, pero «mal» mantiene la polisemia del hebreo. Dado que en español «mal» puede sugerir maldad moral, conviene explicarlo en la nota como calamidad/jucio, siguiendo el cuidado del POB inglés.
- source_word: עָשִׂיתִי לָכֶם
  english_pob_choice: that I did to you
  chosen_spanish: que les hice
  alternatives_spanish:
  - que hice contra ustedes
  - que les causé
  lexicon: HALOT
  rationale: «Les hice» es breve y fiel. «Contra ustedes» o «les causé» interpretan más la agresión o el efecto que el hebreo básico.
theological_decisions:
- issue: Cómo expresar נִחַמְתִּי con Dios como sujeto sin sugerir pecado en Dios
  english_pob_reading: I relent concerning the harm that I did to you
  chosen_spanish_reading: me he arrepentido del mal que les hice
  alternative_spanish_readings:
  - he desistido del mal que les hice
  - me he retractado del mal que les hice
  - me he compadecido del mal que les hice
  rationale: El texto hebreo atribuye a Yahvé un cambio de curso respecto al juicio. En español, «me he arrepentido» refleja la forma verbal con honestidad, pero necesita aclaración doctrinal para que no se entienda como arrepentimiento moral por pecado cometido. Se preserva así la tensión antropopática del original y la referencia a calamidad, no a maldad ética.
  doctrine_reference: Jeremías 42:10; preservación de la tensión antropopática; traducción directa del hebreo נחם con sujeto divino
- issue: Valor de רָעָה en contexto de juicio
  english_pob_reading: the harm/disaster
  chosen_spanish_reading: el mal
  alternative_spanish_readings:
  - la calamidad
  - el desastre
  - el daño
  rationale: Aunque «mal» puede sonar moral, el hebreo aquí apunta a calamidad/judgment. Se conserva el término por su brevedad y por mantener la posible resonancia semántica amplia, con nota aclaratoria para evitar una lectura ética indebida.
  doctrine_reference: HALOT; uso contextual de רָעָה en oráculos de juicio
translation_notes:
  revision_awareness: Se tuvo en cuenta que el audit trail inglés resuelve נִחַם como ‘I relent’ para evitar ‘repent’ en sentido moral. En el borrador español se optó por un equivalente más literal del verbo hebreo con nota aclaratoria, pero el texto principal requiere ajuste para reflejar mejor la decisión auditada del POB inglés y evitar ambigüedad teológica. También se conservó la metáfora agrícola y de edificación, con leves adaptaciones idiomáticas al español.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino cuando corresponda en este proyecto, aunque este versículo no lo contiene explícitamente.
  - Se preservan las metáforas de construcción y plantación sin sustituirlas por abstracciones.
  - Los pronombres de objeto directo se acomodan al español para un registro neutro latinoamericano.
  - La nota sobre רָעָה debe evitar que «mal» se lea como maldad moral.
