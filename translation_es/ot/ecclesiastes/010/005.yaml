translation:
  language: es
  text: 'Hay un mal que he visto debajo del sol, como un error[a] que sale de delante del gobernante:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como una equivocación que sale de delante del gobernante». El hebreo puede sugerir tanto un error involuntario real como algo tratado como si fuera un error.
    reason: lexical_alternative
lexical_decisions:
- source_word: יֵשׁ
  english_pob_choice: There is
  chosen_spanish: Hay
  alternatives_spanish:
  - Existe
  lexicon: HALOT
  rationale: La partícula existencial introduce una observación directa; en español, «Hay» reproduce de forma natural y sobria esa fuerza presentativa.
- source_word: רָעָה
  english_pob_choice: an evil
  chosen_spanish: un mal
  alternatives_spanish:
  - una maldad
  - una desgracia
  - un malvado
  lexicon: HALOT
  rationale: En Eclesiastés, el sustantivo puede señalar algo malo, penoso o funesto observado en la vida. «Un mal» conserva la amplitud semántica sin precisar indebidamente entre mal moral o calamidad.
- source_word: רָאִיתִי
  english_pob_choice: I have seen
  chosen_spanish: he visto
  alternatives_spanish:
  - vi
  lexicon: HALOT
  rationale: El perfecto en Qohelet suele introducir una observación reflexiva con relevancia presente. «He visto» comunica bien esa experiencia constatada.
- source_word: תַּחַת הַשָּׁמֶשׁ
  english_pob_choice: under the sun
  chosen_spanish: debajo del sol
  alternatives_spanish:
  - bajo el sol
  - bajo el sol de la tierra
  lexicon: HALOT
  rationale: Es la expresión fija de Eclesiastés para la esfera de la vida terrenal. «Debajo del sol» conserva esa fórmula tradicional y transparente en español.
- source_word: כִּשְׁגָגָה
  english_pob_choice: like an error
  chosen_spanish: como un error
  alternatives_spanish:
  - como una equivocación
  - como una inadvertencia
  lexicon: HALOT
  rationale: El prefijo comparativo כ exige una comparación; «como un error» preserva la ambigüedad entre error real e impresión de error, sin cerrar el sentido.
- source_word: שֶׁיֹּצָא
  english_pob_choice: that goes out
  chosen_spanish: que sale
  alternatives_spanish:
  - que procede
  - que sale afuera
  lexicon: HALOT
  rationale: El verbo יצא significa salir o salir de un lugar. «Que sale» es el equivalente más directo y natural en español.
- source_word: מִלִּפְנֵי
  english_pob_choice: from before
  chosen_spanish: de delante de
  alternatives_spanish:
  - de la presencia de
  - desde delante de
  lexicon: HALOT
  rationale: La expresión conserva la imagen cortesana de origen o procedencia desde la presencia de alguien. «De delante de» mantiene esa concreción mejor que una paráfrasis más abstracta.
- source_word: הַשַּׁלִּיט
  english_pob_choice: the ruler
  chosen_spanish: el gobernante
  alternatives_spanish:
  - el ruler
  - el soberano
  - el que tiene autoridad
  lexicon: HALOT
  rationale: שׁליט designa a quien ejerce autoridad. «Gobernante» es claro, amplio y acorde con el contexto, sin elevar el registro más de lo que pide el texto.
translation_notes:
  revision_awareness: El pasaje fue revisado con acuerdo alto y sin cambios sustanciales en la última pasada; por eso la redacción española sigue de cerca la lectura del POB inglés, manteniendo la ambigüedad léxica documentada en כִּשְׁגָגָה.
  spanish_consistency_notes:
  - Se mantiene «debajo del sol» como fórmula de Eclesiastés.
  - Se evita «SEÑOR» u otra sustitución teológica porque el versículo no contiene el nombre divino.
  - «Gobernante» se traduce con un término sobrio y no eclesiástico, en línea con el contexto de autoridad civil/cortesana.
  - La nota al pie marca la ambigüedad de שְׁגָגָה sin resolverla artificialmente.
