    issue: La cláusula final omite el artículo en 'a espada, a espada'.
    rationale: El hebreo לַחֶרֶב / לֶחָרֶב incluye el artículo, y la auditoría inglesa preserva 'the sword'. En español bíblico natural, 'a la espada, a la espada' o 'para la espada, a la espada' comunica mejor la fórmula sin sonar truncado.
  - severity: low
    issue: La conjunción inicial 'Y' suena innecesaria en español.
    rationale: La auditoría inglesa documenta que la conjunción prefijada no necesita representarse separadamente para lectura natural. 'Él vendrá y herirá…' fluye mejor en español sin pérdida de sentido.
  - severity: low
    issue: '''Los destinados a…'' explicita más de lo que dice el hebreo.'
    rationale: El hebreo usa una fórmula escueta, más cercana a 'los que son para…'. No es un error grave, pero conviene no alejarse demasiado del tono judicial terso. Aun así, puede conservarse si se prioriza claridad española.
