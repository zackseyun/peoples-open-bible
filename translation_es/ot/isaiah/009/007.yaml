  - severity: medium
    issue: La nota al pie no preserva bien la alternativa documentada en el audit trail inglés.
    rationale: La nota española ofrece solo 'mensaje' con 'a Jacob', pero el POB inglés preserva una alternativa más cercana a 'to Jacob/upon Israel'. Conviene reflejar una alternativa española clara y consistente con el texto principal revisado.
  - severity: low
    issue: '''A Jacob'' es defendible, pero no refleja tan bien la revisión inglesa ''into Jacob''.'
    rationale: Dado que el audit trail cambió de 'against' a 'into', una revisión a 'en Jacob' preserva mejor la tensión de la preposición בְּ sin forzar una lectura hostil ni convertirla simplemente en dativo.
