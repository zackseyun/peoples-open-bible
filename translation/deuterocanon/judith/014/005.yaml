  text: πρὸ δὲ τοῦ ποιῆσαι ταῦτα καλέσατέ μοι Ἀχιὼρ τὸν Ἀμμανείτην, ἵνα ἴδῃ ἐπιγνοῖ τὸν ἐκφαυλίσαντα τὸν οἶκον τοῦ Ἰσραήλ, καὶ αὐτὸν ὡς εἰς θάνατον ἀποστείλαντα εἰς ἡμᾶς.
