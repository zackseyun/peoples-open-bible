translation:
  language: es
  text: '¿Por qué has profetizado en nombre de Yahvé, diciendo: «Esta casa será como Silo[a], y esta ciudad será devastada, sin habitante»? Entonces todo el pueblo se reunió contra Jeremías[c] en la casa de Yahvé.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «esta casa será como Silo».'
    reason: lexical_alternative
  - marker: b
    text: Silo era el antiguo lugar del santuario; su destrucción funcionaba como advertencia de juicio.
    reason: cultural_note
  - marker: c
    text: 'O: «todo el pueblo se reunió a Jeremías». La preposición hebrea puede leerse de manera más neutral, pero el contexto sugiere hostilidad.'
    reason: alternative_reading
lexical_decisions:
- source_word: מַדּוּעַ
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿Por qué razón
  - ¿Cómo es que
  lexicon: HALOT
  rationale: Interrogativo directo y natural para una acusación inmediata; conserva el tono confrontativo del hebreo sin añadir explicación.
- source_word: נִבֵּיתָ
  english_pob_choice: have you prophesied
  chosen_spanish: has profetizado
  alternatives_spanish:
  - profetizaste
  - has hablado como profeta
  lexicon: HALOT
  rationale: El verbo נבא en este contexto es profetizar. El presente perfecto español refleja bien la acusación sobre una acción ya realizada que se cuestiona ahora.
- source_word: בְשֵׁם יְהוָה
  english_pob_choice: in the name of Yahweh
  chosen_spanish: en nombre de Yahvé
  alternatives_spanish:
  - por nombre de Yahvé
  - bajo el nombre de Yahvé
  lexicon: HALOT
  rationale: En español, la locución estable y clara para hablar bajo autoridad es 'en nombre de'. Se mantiene Yahvé según la política del proyecto para el nombre divino.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se sigue la terminología del proyecto para el Tetragrámaton y se evita el reemplazo por 'SEÑOR' o formas litúrgicas opacas.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - que
  lexicon: HALOT
  rationale: Conserva la fuerza de cita directa y prepara la oración reportada sin atenuar el tono de la acusación.
- source_word: כְּשִׁלוֹ
  english_pob_choice: like Shiloh
  chosen_spanish: como Silo
  alternatives_spanish:
  - igual que Silo
  - al modo de Silo
  lexicon: HALOT
  rationale: La comparación con el antiguo santuario se expresa de manera natural con 'como'. Se usa 'Silo' como topónimo castellano habitual.
- source_word: יִהְיֶה הַבַּיִת הַזֶּה
  english_pob_choice: This house will be like Shiloh
  chosen_spanish: Esta casa será como Silo
  alternatives_spanish:
  - Esta casa llegará a ser como Silo
  - Esta casa quedará como Silo
  lexicon: HALOT
  rationale: El hebreo con יהיה seguido de la comparación comunica estado resultante. En español, 'será como' reproduce de manera directa y fiel el valor comparativo sin sobreexplicar.
- source_word: הַבַּיִת הַזֶּה
  english_pob_choice: This house
  chosen_spanish: Esta casa
  alternatives_spanish:
  - este templo
  lexicon: HALOT
  rationale: Se conserva el sustantivo literal 'casa', que el contexto identifica como el templo, preservando la formulación hebrea.
- source_word: וְהָעִיר הַזֹּאת
  english_pob_choice: and this city
  chosen_spanish: y esta ciudad
  alternatives_spanish:
  - y la ciudad esta
  lexicon: HALOT
  rationale: Correspondencia directa y clara para la referencia deíctica a Jerusalén.
- source_word: תֶּחֱרַב
  english_pob_choice: will be laid waste
  chosen_spanish: será devastada
  alternatives_spanish:
  - será arrasada
  - quedará desolada
  - será destruida
  lexicon: HALOT
  rationale: חרב expresa ruina/desolación. 'Devastada' mantiene el campo semántico de destrucción y despoblación sin forzar un matiz militar específico.
- source_word: מֵאֵין יוֹשֵׁב
  english_pob_choice: without inhabitant
  chosen_spanish: sin habitante
  alternatives_spanish:
  - sin habitantes
  - sin nadie que habite
  lexicon: HALOT
  rationale: Respeta el giro idiomático hebreo de desolación total. La singularidad concuerda con el participio colectivo y suena natural en español bíblico contemporáneo.
- source_word: וַיִּקָּהֵל כָּל הָעָם
  english_pob_choice: Then all the people gathered
  chosen_spanish: Entonces todo el pueblo se reunió
  alternatives_spanish:
  - Y se congregó todo el pueblo
  - Entonces se juntó todo el pueblo
  lexicon: HALOT
  rationale: El wayyiqtol introduce avance narrativo. 'Se reunió' expresa con naturalidad el acto de congregarse.
- source_word: אֶל יִרְמְיָהוּ
  english_pob_choice: against Jeremiah
  chosen_spanish: contra Jeremías
  alternatives_spanish:
  - a Jeremías
  - junto a Jeremías
  lexicon: HALOT
  rationale: Aunque אֶל puede ser neutral ('a'), el contexto hostil justifica preservar la dirección adversativa que el POB inglés documenta. En español, 'contra' comunica esa tensión sin añadir interpretación extra.
- source_word: בְּבֵית יְהוָה
  english_pob_choice: in the house of Yahweh
  chosen_spanish: en la casa de Yahvé
  alternatives_spanish:
  - en el templo de Yahvé
  - en la casa del Señor
  lexicon: HALOT
  rationale: Se conserva la formulación literal 'casa de Yahvé', alineada con el hebreo y con el patrón del proyecto de no sustituir el nombre divino por un título.
theological_decisions:
- issue: Tratamiento del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - SEÑOR
  rationale: La política del proyecto exige transliterar el nombre divino en lugar de ocultarlo bajo una convención litúrgica. 'Yahvé' es la forma elegida en español para mantener transparencia y trazabilidad textual.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
- issue: Fuerza de אֶל יִרְמְיָהוּ en un contexto hostil
  english_pob_reading: against Jeremiah
  chosen_spanish_reading: contra Jeremías
  alternative_spanish_readings:
  - a Jeremías
  - hacia Jeremías
  rationale: El contexto narrativo describe una reacción acusatoria del pueblo. 'Contra Jeremías' preserva la tensión hostil ya observada en el POB inglés sin resolverla en una formulación neutral.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: preserve tension rather than resolve it beyond the text'
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB inglés, que prefirió «will be like Shiloh» frente a una paráfrasis tipo «will become like Shiloh», y «without inhabitant» frente a una formulación más libre. Por eso el español conserva una comparación directa («será como Silo») y un cierre idiomático breve («sin habitante»), sin expandir el sentido más allá del hebreo.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma consistente para יהוה, evitando 'SEÑOR' por la política del proyecto.
  - Se mantiene 'casa' en lugar de 'templo' para respetar la literalidad del hebreo, aunque el referente contextual sea el templo.
  - '''Sin habitante'' reproduce el carácter idiomático y formal del hebreo, manteniendo la desolación total sin explicitar más de lo que el texto dice.'
  - '''Contra Jeremías'' refleja la lectura hostil documentada en el audit trail inglés y conserva la tensión narrativa.'
