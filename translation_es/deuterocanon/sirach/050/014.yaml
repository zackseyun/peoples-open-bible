translation:
  language: es
  text: hasta que terminó de ministrar en el altar[a], y de ordenar la ofrenda del Altísimo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «adornar/ordenar la ofrenda del Altísimo Todopoderoso». El hebreo dice más escuetamente: «ordenar las disposiciones del Altísimo».'
    reason: alternative_reading
lexical_decisions:
- source_word: עַד כַּלּוֹתוֹ
  english_pob_choice: until he finished
  chosen_spanish: hasta que terminó
  alternatives_spanish:
  - hasta que acabó
  - hasta que concluyó
  lexicon: HALOT
  rationale: El infinitivo constructo con sufijo expresa el límite temporal de la acción anterior. «Hasta que terminó» es natural en español y conserva ese valor de culminación.
- source_word: לְשָׁרֵת
  english_pob_choice: ministering
  chosen_spanish: ministrar
  alternatives_spanish:
  - servir
  - oficiar
  lexicon: HALOT
  rationale: En contexto sacerdotal, שׁרת denota servicio litúrgico. «Ministrar» mantiene el matiz cultual sin reducirlo a un servicio genérico.
- source_word: מִזְבֵּחַ
  english_pob_choice: altar
  chosen_spanish: altar
  alternatives_spanish:
  - altar sacrificial
  lexicon: HALOT
  rationale: Es el equivalente directo y natural en el contexto sacrificial.
- source_word: וּלְסַדֵּר
  english_pob_choice: arranging
  chosen_spanish: de arreglar
  alternatives_spanish:
  - de ordenar
  - de poner en orden
  lexicon: HALOT
  rationale: סדר significa ordenar o disponer. «De arreglar» comunica bien la acción en español y evita una rigidez innecesaria.
- source_word: מַעַרְכוֹת
  english_pob_choice: the offerings
  chosen_spanish: la ofrenda
  alternatives_spanish:
  - las ofrendas
  - las disposiciones
  - los ordenamientos
  lexicon: HALOT
  rationale: Aunque el hebreo puede sugerir ‘arreglos/disposiciones’, el paralelo griego προσφορὰν y la revisión inglesa favorecen un sentido cultual de ofrenda. En español, el singular colectivo «la ofrenda» conserva la idea de una ofrenda preparada u organizada, sin forzar el plural del hebreo.
- source_word: עֶלְיוֹן
  english_pob_choice: the Most High
  chosen_spanish: el Altísimo
  alternatives_spanish:
  - el Supremo
  - el Altísimo Dios
  lexicon: HALOT
  rationale: Título divino estándar en español bíblico, claro y reverente.
- source_word: Παντοκράτορος
  english_pob_choice: Almighty
  chosen_spanish: Todopoderoso
  alternatives_spanish:
  - Omnipotente
  - Soberano
  lexicon: LSJ
  rationale: Aunque el hebreo base omite el equivalente explícito, el griego lo añade. «Todopoderoso» es la forma española más transparente y reconocible para Παντοκράτωρ.
theological_decisions:
- issue: Tensión entre el hebreo plural מַעַרְכוֹת y el griego singular προσφορὰν
  english_pob_reading: retain the broader Hebrew sense as 'the orderings' while signaling cultic context through 'ministering at the altar' and 'of the Most High'
  chosen_spanish_reading: mantener un sentido cultual singular en «la ofrenda», con nota que preserve la alternativa hebrea más amplia
  alternative_spanish_readings:
  - las disposiciones
  - los ordenamientos
  - las ofrendas
  rationale: El testimonio hebreo disponible es fuerte, pero el paralelo griego y la revisión inglesa muestran que el campo semántico apunta a una acción sacrificial preparada. En español, un singular colectivo comunica mejor la función cultual y evita una expresión torpe, mientras la nota mantiene visible la alternativa del hebreo.
  doctrine_reference: Principio de primacía de la fuente original con uso responsable de paralelos y variantes; no sobre-resolver donde hay tensión textual documentada.
- issue: Adición griega de Παντοκράτωρ frente al hebreo sin equivalente explícito
  english_pob_reading: Most High / Almighty
  chosen_spanish_reading: «el Altísimo Todopoderoso»
  alternative_spanish_readings:
  - «el Altísimo»
  - «el Altísimo, el Todopoderoso»
  rationale: El griego fortalece el título divino con Παντοκράτωρ; incorporarlo en español evita perder un matiz textual documentado. La coordinación sin coma fluye bien y mantiene la dignidad del título.
  doctrine_reference: Uso de la tradición griega como control de consistencia cuando añade un título divino explícito no negado por el hebreo.
translation_notes:
  revision_awareness: La revisión inglesa más reciente desplazó ‘the orderings’ hacia ‘the offerings’ para reflejar מַעַרְכוֹת con mayor naturalidad en el contexto del altar. Esta solución española sigue esa línea revisada, pero conserva en la nota la alternativa hebrea más amplia para no borrar la tensión documental entre el hebreo y el griego.
  spanish_consistency_notes:
  - Se mantiene «Altísimo» para עֶלְיוֹן y se explicita «Todopoderoso» para Παντοκράτωρ, siguiendo el paralelo griego.
  - Se usa «ministrar» en contexto sacerdotal para reflejar el servicio cultual de לְשָׁרֵת.
  - La frase «de arreglar la ofrenda» intenta conservar el valor verbal de וּלְסַדֵּר sin introducir un objeto inexistente en el español.
  - La nota a pie de página preserva la alternativa hebrea y la glosa griega para dejar auditable la decisión lexical.
