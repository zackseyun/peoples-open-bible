translation:
  language: es
  text: 'La palabra que vino a Jeremías de Yahvé después de que Nebuzaradán, el capitán de la guardia[a], lo había enviado de Ramá, después de tomarlo mientras estaba atado con cadenas, entre todos los exiliados de Jerusalén y Judá que eran llevados al exilio a Babilonia:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “el jefe de los verdugos”; el título hebreo significa literalmente “jefe sobre los matadores”, y probablemente designa a un alto oficial de la guardia real con funciones de ejecución.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַדָּבָר
  english_pob_choice: The word
  chosen_spanish: La palabra
  alternatives_spanish:
  - El mensaje
  - Esta fue la palabra
  lexicon: HALOT
  rationale: דָּבָר en fórmulas proféticas introduce la comunicación revelada de Dios. 'La palabra' conserva el carácter formular y evita debilitar la expresión a un simple 'mensaje'.
- source_word: הָיָה אֶל
  english_pob_choice: came to
  chosen_spanish: vino a
  alternatives_spanish:
  - llegó a
  - fue dirigida a
  lexicon: HALOT
  rationale: El giro hebreo expresa llegada de revelación a Jeremías. 'Vino a' preserva la imagen y suena natural en español bíblico sin depender de un calco rígido.
- source_word: מֵאֵת יְהוָה
  english_pob_choice: from Yahweh
  chosen_spanish: de Yahvé
  alternatives_spanish:
  - de parte de Yahvé
  - procedente de Yahvé
  lexicon: HALOT
  rationale: Se mantiene el nombre divino Yahvé según la norma del proyecto; la preposición simple 'de' comunica bien el origen profético de la palabra.
- source_word: שַׁלַּח אֹתוֹ
  english_pob_choice: had sent him away
  chosen_spanish: lo había enviado
  alternatives_spanish:
  - lo había despedido
  - lo había dejado ir
  lexicon: HALOT
  rationale: En este contexto שׁלח tiene sentido de soltar/dar salida de custodia. 'Lo había enviado' sigue de cerca el movimiento de salida sin sobreespecificar más de lo que el hebreo exige.
- source_word: רַב טַבָּחִים
  english_pob_choice: the captain of the guard
  chosen_spanish: el capitán de la guardia
  alternatives_spanish:
  - el jefe de los verdugos
  - el capitán de los guardias
  lexicon: HALOT
  rationale: El título apunta a un alto oficial del aparato real. 'Capitán de la guardia' comunica bien la función administrativa y militar; se evita 'verdugos' en el texto principal porque, aunque literal, es más estrecho y puede desorientar en español.
- source_word: מִן הָרָמָה
  english_pob_choice: from Ramah
  chosen_spanish: desde Ramá
  alternatives_spanish:
  - de Ramá
  - de la altura
  lexicon: HALOT
  rationale: Se conserva el topónimo. 'Desde' refleja mejor el movimiento de salida señalado por el hebreo y por el contexto narrativo.
- source_word: בְּקַחְתּוֹ אֹתוֹ
  english_pob_choice: when he had taken him
  chosen_spanish: cuando lo había tomado
  alternatives_spanish:
  - cuando lo tomó
  - al tomarlo
  lexicon: HALOT
  rationale: La construcción temporal se expresa en español con pluscuamperfecto para mantener la secuencia narrativa del episodio y la revisión inglesa más reciente.
- source_word: וְהוּא אָסוּר
  english_pob_choice: while he was bound
  chosen_spanish: mientras él estaba atado
  alternatives_spanish:
  - y estaba atado
  - estando atado
  lexicon: HALOT
  rationale: אָסוּר describe estado de cautiverio. 'Estaba atado' evita un calco forzado y conserva la condición simultánea de Jeremías.
- source_word: בָּאזִקִּים
  english_pob_choice: in chains
  chosen_spanish: con cadenas
  alternatives_spanish:
  - en cadenas
  - con grillos
  lexicon: HALOT
  rationale: אֲזִקִּים designa ataduras/fetters; 'con cadenas' es idiomático en español y mantiene la imagen de sujeción física.
- source_word: בְּתוֹךְ כָּל גָּלוּת
  english_pob_choice: among all the exiles
  chosen_spanish: entre todos los desterrados
  alternatives_spanish:
  - en medio de todos los desterrados
  - entre toda la deportación
  lexicon: HALOT
  rationale: Aquí גָּלוּת se refiere al grupo humano deportado. 'Desterrados' transmite bien el sentido colectivo en español y conserva la tensión de comunidad exiliada sin convertirlo en una abstracción.
- source_word: יְרוּשָׁלִַם וִיהוּדָה
  english_pob_choice: of Jerusalem and Judah
  chosen_spanish: de Jerusalén y de Judá
  alternatives_spanish:
  - de Jerusalén y Judá
  - procedentes de Jerusalén y Judá
  lexicon: HALOT
  rationale: La frase modifica a los desterrados como procedencia/pueblo. Se repite 'de' para una lectura fluida y clara en español.
- source_word: הַמֻּגְלִים
  english_pob_choice: who were being exiled
  chosen_spanish: que eran llevados al destierro
  alternatives_spanish:
  - que eran deportados
  - que estaban siendo exiliados
  lexicon: HALOT
  rationale: El participio pasivo de גלה destaca el proceso de deportación. 'Llevados al destierro' expresa la acción sin perder la pasividad del hebreo y suena más natural que un tecnicismo rígido.
- source_word: בָּבֶלָה
  english_pob_choice: to Babylon
  chosen_spanish: a Babilonia
  alternatives_spanish:
  - hacia Babilonia
  - para Babilonia
  lexicon: HALOT
  rationale: El sufijo direccional se vierte con 'a'. 'Babilonia' es la forma española estable del topónimo.
theological_decisions:
- issue: Renderización del nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El paquete inglés ya adoptó Yahweh y la política del proyecto para YHWH es 'Yahvé' en español. Se evita la sustitución por 'el SEÑOR' para no ocultar el nombre revelado y mantener transparencia auditiva.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Rango semántico de רַב טַבָּחִים
  english_pob_reading: the captain of the guard
  chosen_spanish_reading: el capitán de la guardia
  alternative_spanish_readings:
  - el jefe de los verdugos
  - el capitán de los guardias
  rationale: La tensión entre el sentido literal 'verdugos' y el uso administrativo del título se resuelve en el texto principal con un equivalente funcional comprensible. No se borra la posible implicación ejecutiva, pero tampoco se exagera en el cuerpo del versículo.
  doctrine_reference: 'DOCTRINE.md: Proper names and titles — render functionally when literal force would mislead'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente que ajustó la secuencia temporal a 'had taken him'. Por eso el español usa 'cuando lo había tomado' para mantener la relación temporal más precisa entre las acciones. También se preservó la forma estable del nombre divino y la nota léxica sobre el título oficial.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de manera consistente para יְהוָה, conforme al estándar del proyecto.
  - Se evitó 'SEÑOR' como máscara del nombre divino.
  - '''desterrados'' se emplea para גָּלוּת en sentido colectivo humano, no como abstracción del estado de exilio.'
  - La nota [a] se ancla en 'capitán de la guardia' para conservar la alternativa literal del hebreo sin interferir con la lectura principal.
