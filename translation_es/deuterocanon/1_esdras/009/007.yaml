    issue: «Han obrado sin ley» es un giro poco natural en español.
    rationale: Aunque intenta conservar la fuerza de ἀνομέω, en español suena calcado y puede distraer. «Han actuado contra la ley» conserva el matiz jurídico y es más idiomático y claro.
  revised_spanish_text: 'Y Esdras se levantó y les dijo: «Ustedes han actuado contra la ley y se han casado con mujeres extranjeras[a], añadiendo pecado a Israel».'
