    text: Or 'your fellow Israelites'; the Hebrew reads 'your brothers, the sons of Israel.'
    reason: lexical_alternative
  - marker: b
    text: Or 'equipped for battle' for 'armed.'
    reason: lexical_alternative
  - marker: c
    text: '''Men of valor'' refers to able fighting men, not merely inward courage.'
    reason: cultural_note
