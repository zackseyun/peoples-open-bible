translation:
  language: es
  text: Tus cuerdas están sueltas[a]; no pueden afirmar la base de su mástil; no pueden desplegar la vela[b]. Entonces se repartirá abundante botín; aun los cojos se llevarán el botín.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «están flojas». El hebreo puede expresar cuerdas soltadas o aflojadas, y la imagen sigue siendo la de un barco averiado.
    reason: lexical_alternative
  - marker: b
    text: O «desplegar la bandera/enseña». El hebreo נֵס suele significar «bandera» o «estandarte/señal», pero «vela» encaja mejor con la imagen náutica del versículo.
    reason: lexical_alternative
lexical_decisions:
- source_word: נִטְּשׁוּ
  english_pob_choice: hang loose
  chosen_spanish: están sueltas
  alternatives_spanish:
  - están flojas
  - quedan flojas
  - se han soltado
  lexicon: HALOT
  rationale: El hebreo expresa cuerdas aflojadas o soltadas. En español, «están sueltas» comunica con naturalidad la imagen náutica sin añadir más de lo que dice el texto.
- source_word: חֲבָלָיִךְ
  english_pob_choice: your ropes
  chosen_spanish: Tus cuerdas
  alternatives_spanish:
  - Tus sogas
  - Tus cordajes
  lexicon: HALOT
  rationale: «Cuerdas» mantiene el sentido general del término y funciona bien en el cuadro del barco; el posesivo de segunda persona femenina se conserva con «Tus».
- source_word: בַּל
  english_pob_choice: cannot
  chosen_spanish: no pueden
  alternatives_spanish:
  - no logran
  - no son capaces de
  lexicon: HALOT
  rationale: Aquí la negación expresa incapacidad, no simple prohibición. «No pueden» refleja bien la fuerza de בַּל en el contexto.
- source_word: יְחַזְּקוּ
  english_pob_choice: hold firm
  chosen_spanish: afirmar
  alternatives_spanish:
  - fortalecer
  - asegurar
  - sostener
  lexicon: HALOT
  rationale: En el contexto náutico, el verbo implica hacer firme una parte del barco. «Afirmar» es una forma idiomática de expresar esa sujeción o fijación en español.
- source_word: כֵן
  english_pob_choice: base
  chosen_spanish: la base
  alternatives_spanish:
  - el soporte
  - el asiento
  - el apoyo
  lexicon: HALOT
  rationale: La palabra es difícil y probablemente alude a un apoyo fijo del mástil. «La base» sigue de cerca el valor funcional sin sobreespecificar el hebreo.
- source_word: תָּרְנָם
  english_pob_choice: their mast
  chosen_spanish: su mástil
  alternatives_spanish:
  - su palo mayor
  - su mástil
  lexicon: HALOT
  rationale: «Mástil» conserva la imagen del barco y es claro en español. El sufijo plural se integra naturalmente como posesivo colectivo en la escena.
- source_word: פָּרְשׂוּ
  english_pob_choice: spread
  chosen_spanish: desplegar
  alternatives_spanish:
  - extender
  - izar
  - abrir
  lexicon: HALOT
  rationale: Para un objeto izado en un barco, «desplegar» es el verbo más natural en español y preserva la idea de abrir o extender la pieza.
- source_word: נֵס
  english_pob_choice: the sail
  chosen_spanish: la enseña
  alternatives_spanish:
  - la bandera
  - el estandarte
  - la señal
  lexicon: HALOT
  rationale: El inglés POB preserva en nota la alternativa «banner/ensign» porque el hebreo puede referirse a una bandera o señal. En español se eligió «enseña» para mantener abierta esa tensión y permitir la lectura tradicional sin perder la posibilidad náutica.
- source_word: אָז
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - En ese momento
  lexicon: HALOT
  rationale: Marca la consecuencia resultante del colapso de la imagen anterior.
- source_word: חֻלַּק
  english_pob_choice: will be divided
  chosen_spanish: se repartirá
  alternatives_spanish:
  - será dividido
  - se distribuirá
  lexicon: HALOT
  rationale: El pasivo comunica la asignación del botín. «Se repartirá» suena natural en español y mantiene la pasiva impersonal.
- source_word: עַד שָׁלָל מַרְבֶּה
  english_pob_choice: abundant plunder
  chosen_spanish: abundante botín
  alternatives_spanish:
  - gran botín
  - mucho despojo
  lexicon: HALOT
  rationale: La frase indica gran cantidad de presa. «Abundante botín» es fiel, claro y conserva el tono de riqueza tomada al enemigo.
- source_word: פִּסְחִים
  english_pob_choice: the lame
  chosen_spanish: los cojos
  alternatives_spanish:
  - los lisiados
  - los impedidos
  lexicon: HALOT
  rationale: El término designa a personas cojas. «Los cojos» es directo y comprensible en español bíblico contemporáneo.
- source_word: בָּזְזוּ בַז
  english_pob_choice: will carry off the spoil
  chosen_spanish: saquearán el despojo
  alternatives_spanish:
  - tomarán el botín
  - llevarán el despojo
  lexicon: HALOT
  rationale: La combinación verbal intensifica el acto de tomar presa. «Saquearán el despojo» conserva esa fuerza y el paralelismo semítico sin sonar torpe.
theological_decisions:
- issue: Imágenes náuticas y posible sentido de נֵס
  english_pob_reading: The verse continues the metaphor of a disabled ship, with נֵס rendered as 'sail' in the main text and 'banner/ensign' preserved as an alternative.
  chosen_spanish_reading: Se mantiene la imagen del barco, pero con «enseña» para no cerrar la ambigüedad entre bandera/señal y pieza izada.
  alternative_spanish_readings:
  - la vela
  - la bandera
  - el estandarte
  rationale: El hebreo permite más de una lectura. En vez de fijar sin reserva «vela», que sería demasiado interpretativo, «enseña» preserva la posibilidad de un objeto alzado y al mismo tiempo deja abierta la lectura de banner o señal, tal como documenta el POB inglés.
  doctrine_reference: Hermenéutica poética y lexical; no implica doctrina específica.
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior asegurando que cada marcador de nota aparezca exactamente en el texto principal. Además, se evitó introducir notas sin anclaje y se conservó la tensión lexical de נֵס en español mediante una opción compatible con ambas lecturas.
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico moderno y digno, evitando arcaísmos innecesarios.
  - «Botín» y «despojo» se usaron de forma consistente para reproducir el léxico de presa/saqueo.
  - La imagen del barco se conservó en todo el verso para respetar la coherencia metáforica del original.
  - El posesivo de segunda persona femenina se trasladó de manera natural en español con «Tus» al inicio del verso.
