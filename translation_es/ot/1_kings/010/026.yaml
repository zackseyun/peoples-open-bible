translation:
  language: es
  text: Salomón reunió carros y jinetes[a], y tuvo 1.400 carros y 12.000 jinetes; los apostó en las ciudades de carros y con el rey en Jerusalén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «caballería» para פָרָשִׁים; el hebreo se refiere más literalmente a jinetes montados.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֶּאֱסֹף
  english_pob_choice: gathered
  chosen_spanish: reunió
  alternatives_spanish:
  - juntó
  - acumuló
  lexicon: HALOT
  rationale: En este contexto militar-administrativo, אסף expresa reunir o concentrar recursos. «Reunió» suena natural en español y conserva la idea de agrupar fuerzas sin añadir matices ajenos.
- source_word: רֶכֶב
  english_pob_choice: chariots
  chosen_spanish: carros
  alternatives_spanish:
  - carros de guerra
  - carros de combate
  lexicon: HALOT
  rationale: El hebreo usa un sustantivo colectivo ligado a carros militares. «Carros» es el equivalente más directo y ampliamente inteligible en español; «carros de guerra» explicita el uso, pero va un poco más allá del término base.
- source_word: פָרָשִׁים
  english_pob_choice: horsemen
  chosen_spanish: jinetes
  alternatives_spanish:
  - caballería
  - hombres de a caballo
  lexicon: HALOT
  rationale: El término señala hombres montados, no los caballos. «Jinetes» preserva mejor el valor léxico que «caballería», que ya suena colectivo e interpretativo.
- source_word: וַיְהִי ל֗וֹ
  english_pob_choice: he had
  chosen_spanish: tuvo
  alternatives_spanish:
  - le pertenecieron
  - le había
  lexicon: HALOT
  rationale: La expresión hebrea funciona como posesión. «Tuvo» reproduce de forma natural la relación de pertenencia/posesión sin calco innecesario.
- source_word: אֶלֶף וְאַרְבַּע מֵאוֹת רֶכֶב
  english_pob_choice: 1,400 chariots
  chosen_spanish: 1.400 carros
  alternatives_spanish:
  - mil cuatrocientos carros
  lexicon: HALOT
  rationale: La cifra se conserva de manera directa y legible en español moderno. Se mantiene la concordancia con «carros» para el referente militar.
- source_word: וּשְׁנֵים עָשָׂר אֶלֶף פָּרָשִׁים
  english_pob_choice: 12,000 horsemen
  chosen_spanish: 12.000 jinetes
  alternatives_spanish:
  - doce mil jinetes
  - 12.000 hombres de a caballo
  lexicon: HALOT
  rationale: Se mantiene el mismo término que para פָרָשִׁים, preservando coherencia léxica. «Jinetes» es claro y fiel al sentido de montados.
- source_word: וַיַּנְחֵם
  english_pob_choice: he stationed them
  chosen_spanish: los estableció
  alternatives_spanish:
  - los puso
  - los estacionó
  lexicon: HALOT
  rationale: El hiphil de נוח aquí indica colocar o disponer de manera organizada. «Los estableció» comunica una asignación fija o estratégica y evita la aspereza de un calco como «los estacionó».
- source_word: בְּעָרֵי הָרֶכֶב
  english_pob_choice: in the chariot cities
  chosen_spanish: en las ciudades de los carros
  alternatives_spanish:
  - en las ciudades de carros
  - en las ciudades para carros
  lexicon: HALOT
  rationale: La expresión se refiere a ciudades asociadas con la guarnición o administración de carros. «Ciudades de los carros» sigue de cerca la construcción hebrea y es clara en español; «ciudades para carros» sería más interpretativo.
- source_word: וְעִם הַמֶּלֶךְ בִּירוּשָׁלִָם
  english_pob_choice: and with the king in Jerusalem
  chosen_spanish: y con el rey en Jerusalén
  alternatives_spanish:
  - y junto al rey en Jerusalén
  - y con el rey, en Jerusalén
  lexicon: HALOT
  rationale: La frase indica proximidad y servicio al rey en Jerusalén. «Con el rey» conserva la relación directa del hebreo, sin necesidad de explicitar más de lo que el texto dice.
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo masorético y coincide con la lectura auditada en inglés, sin revisiones aplicadas en la pasada más reciente; se conservó la estructura militar y la numeración sin introducir armonizaciones externas.
  spanish_consistency_notes:
  - Se mantuvo «carros» para רֶכֶב y «jinetes» para פָרָשִׁים para conservar la distinción léxica del hebreo.
  - Se eligió «los estableció» para וַיַּנְחֵם por su valor de disposición estratégica en contexto militar.
  - Se usó el formato numérico con punto de miles, acorde con el español editorial de uso amplio.
  - Se mantuvo «Jerusalén» sin artículo, conforme al uso normal en español bíblico contemporáneo.
