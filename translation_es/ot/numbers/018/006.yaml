source:
  edition: WLC
  text: וַ/אֲנִ֗י הִנֵּ֤ה לָקַ֨חְתִּי֙ אֶת אֲחֵי/כֶ֣ם הַ/לְוִיִּ֔ם מִ/תּ֖וֹךְ בְּנֵ֣י יִשְׂרָאֵ֑ל לָ/כֶ֞ם מַתָּנָ֤ה נְתֻנִים֙ לַֽ/יהוָ֔ה לַ/עֲבֹ֕ד אֶת עֲבֹדַ֖ת אֹ֥הֶל מוֹעֵֽד־־׃
base_translation:
  language: en
  yaml_path: translation/ot/numbers/018/006.yaml
  text: And I—behold[a], I have taken your brothers the Levites from among the sons of Israel, given to you as a gift, given to Yahweh, to perform the service of the tent of meeting.
  footnotes:
