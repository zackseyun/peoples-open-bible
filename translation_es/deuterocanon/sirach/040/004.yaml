translation:
  language: es
  text: Desde el que lleva un turbante pequeño[a] y una corona de flores, hasta el que va envuelto en una prenda de piel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «desde el que lleva azul-púrpura y una corona, hasta el que va vestido con lino basto». Los testigos hebreo y griego difieren en la imaginería concreta de la ropa, aunque expresan el mismo rango social.'
    reason: textual_variant
lexical_decisions:
- source_word: מעוטה
  english_pob_choice: small
  chosen_spanish: pequeño
  alternatives_spanish:
  - de poco tamaño
  - modesto
  - menor
  lexicon: HALOT
  rationale: Se toma como adjetivo de צניף y se traduce con una cualidad de tamaño o modestia. 'Pequeño' mantiene la idea sin añadir un matiz social que el hebreo no exige de forma explícita.
- source_word: צניף
  english_pob_choice: turban
  chosen_spanish: turbante
  alternatives_spanish:
  - toca
  - cobertura de cabeza
  - pañoleta
  lexicon: HALOT
  rationale: Designa un tocado enrollado o cubrecabeza. 'Turbante' es claro en español y conserva la imagen de un adorno de cabeza, en paralelo con la corona.
- source_word: וציץ
  english_pob_choice: and a flowered crown
  chosen_spanish: y una corona de flores
  alternatives_spanish:
  - y una diadema
  - y un adorno floral
  - y una guirnalda
  lexicon: HALOT
  rationale: ציץ puede aludir a flor/brote y, por extensión, a un adorno frontal o diadema. Dado el paralelo griego στέφανον, 'corona de flores' retiene el matiz ornamental y la resonancia de corona/círculo de honor.
- source_word: ועד
  english_pob_choice: even to
  chosen_spanish: hasta
  alternatives_spanish:
  - e incluso hasta
  - y hasta
  - hasta llegar a
  lexicon: HALOT
  rationale: Marca el extremo de una escala social o material. 'Hasta' es la forma natural en español para expresar el límite del rango.
- source_word: עוטה
  english_pob_choice: wrapped
  chosen_spanish: va envuelto
  alternatives_spanish:
  - cubierto
  - vestido
  - rodeado
  lexicon: HALOT
  rationale: El participio comunica estar cubierto o envuelto por una prenda. 'Va envuelto' preserva el sentido dinámico y la imagen concreta del hebreo.
- source_word: שמלת עור
  english_pob_choice: a garment of skin
  chosen_spanish: una prenda de piel
  alternatives_spanish:
  - una vestidura de piel
  - una ropa de cuero
  - una prenda de cuero
  lexicon: HALOT
  rationale: La expresión es literalmente 'vestido/prenda de piel'. 'Prenda de piel' evita precisar cuero trabajado cuando el hebreo solo garantiza la materialidad/aspereza de la prenda.
- source_word: ὑάκινθον
  english_pob_choice: blue-purple
  chosen_spanish: turbante pequeño
  alternatives_spanish:
  - tocado azul-púrpura
  - tocado de azul púrpura
  - headdress azul-púrpura
  lexicon: LSJ
  rationale: La tradición textual griega sugiere un color o material de lujo para el tocado. Sin embargo, el texto hebreo citado en el expediente habla de un turbante modesto; por eso la traducción principal sigue el hebreo primario, pero la nota explica la variante griega y su imaginería diferente.
- source_word: στέφανον
  english_pob_choice: crown
  chosen_spanish: corona
  alternatives_spanish:
  - guirnalda
  - diadema
  - coroza
  lexicon: LSJ
  rationale: στέφανον puede ser corona, guirnalda o adorno de honor. 'Corona' es la opción más natural y permite mantener la relación con el hebreo ציץ sin forzar una equivalencia demasiado específica.
- source_word: ὠμόλινον
  english_pob_choice: coarse linen
  chosen_spanish: prenda de piel
  alternatives_spanish:
  - lino basto
  - lino áspero
  - lino crudo
  lexicon: LSJ
  rationale: El testimonio griego habla de una tela áspera de lino; el hebreo, en cambio, de una prenda de piel. La traducción principal sigue el hebreo, mientras la discrepancia queda documentada en nota textual para no borrar la tensión entre testigos.
theological_decisions:
- issue: Rango social/cultural de los atuendos
  english_pob_reading: from one with a small turban and a flowered crown, even to one wrapped in a garment of skin
  chosen_spanish_reading: Desde el que lleva un turbante pequeño y una corona de flores, hasta el que va envuelto en una prenda de piel.
  alternative_spanish_readings:
  - Desde el que lleva un turbante pequeño y una corona floral, hasta el que viste una prenda de piel.
  - Desde el tocado más modesto hasta la vestidura más rústica.
  rationale: La línea describe una amplitud de condiciones visibles, no una enseñanza doctrinal. La redacción española conserva el contraste entre adorno y rudeza sin añadir interpretaciones alegóricas no presentes en el texto.
  doctrine_reference: Sabiduría práctica / observación social en Sirácides, sin afirmación doctrinal específica.
- issue: Tratamiento de la variante textual hebreo-griego
  english_pob_reading: Greek and Hebrew witnesses differ in the specific clothing imagery while conveying the same social range.
  chosen_spanish_reading: Se mantiene el hebreo como base principal y se documenta en nota la variante griega, que cambia el tipo de tocado y la prenda final.
  alternative_spanish_readings:
  - Armonizar ambos testigos en una sola imagen compuesta.
  - Priorizar la forma griega por su paralelismo literario.
  rationale: El expediente indica que el hebreo es el texto base del proyecto, pero el testimonio griego conserva una variante relevante. La nota impide borrar esa tensión y deja auditable la decisión textual.
  doctrine_reference: Crítica textual / transparencia de variantes
translation_notes:
  revision_awareness: El último pase de revisión señaló que no hacía falta cambiar el contenido base; aun así, esta versión española ajusta la textura para leer con naturalidad y deja explícita la variante textual hebreo-griega en la nota.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se mantiene un registro sobrio y bíblico sin arcaísmos innecesarios.
  - '''Corona'' se conserva para respetar el paralelo con el griego στέφανον y el hebreo ציץ.'
  - La nota a pie documenta la variante textual sin mezclar ambas tradiciones en el texto principal.
