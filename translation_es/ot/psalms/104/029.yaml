  text: תַּסְתִּ֥יר פָּנֶי/ךָ֮ יִֽבָּהֵ֫ל֥וּ/ן תֹּסֵ֣ף ר֭וּחָ/ם יִגְוָע֑וּ/ן וְֽ/אֶל עֲפָרָ֥/ם יְשׁוּבֽוּ/ן־׃
base_translation:
