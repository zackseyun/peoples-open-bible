translation:
  language: es
  text: Que Yahvé te responda en el día de angustia; que el nombre del Dios de Jacob te proteja[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «te ponga a salvo»; el verbo hebreo presenta la imagen de colocar a alguien en un lugar alto e inaccesible, de modo seguro.
    reason: lexical_alternative
lexical_decisions:
- source_word: יַעַנְךָ / ענה
  english_pob_choice: May ... answer you
  chosen_spanish: Que ... responda
  alternatives_spanish:
  - Que ... te atienda
  - Que ... te conteste
  lexicon: HALOT
  rationale: El Hiphil de ענה aquí expresa la respuesta de Dios en un contexto de súplica o bendición; en español, la construcción optativa con «que» comunica mejor el valor de petición que un futuro simple.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino como «Yahvé», conforme al criterio del proyecto para יְהוָה, evitando la sustitución por un título y manteniendo la referencia personal del texto hebreo.
- source_word: בְּיוֹם צָרָה
  english_pob_choice: in the day of trouble
  chosen_spanish: en el día de angustia
  alternatives_spanish:
  - en el día de aflicción
  - cuando venga la angustia
  lexicon: HALOT
  rationale: La expresión es idiomática y temporal. «Angustia» transmite bien el campo semántico de צָרָה en español bíblico contemporáneo sin perder naturalidad.
- source_word: יְשַׂגֶּבְךָ
  english_pob_choice: protect you
  chosen_spanish: te proteja
  alternatives_spanish:
  - te guarde
  - te ponga a salvo
  lexicon: HALOT
  rationale: Aunque el verbo literalmente sugiere «poner en alto / en lugar inaccesible», la revisión inglesa ya optó por «protect you» como equivalente más natural y preciso. En español, «te proteja» preserva la fuerza protectora sin forzar la metáfora.
- source_word: שֵׁם
  english_pob_choice: the name
  chosen_spanish: el nombre
  alternatives_spanish:
  - la fama
  - la autoridad
  lexicon: HALOT
  rationale: Se conserva «el nombre» por su valor poético y teológico; en hebreo no conviene sustituirlo por una abstracción interpretativa salvo necesidad contextual.
- source_word: אֱלֹהֵי יַעֲקֹב
  english_pob_choice: the God of Jacob
  chosen_spanish: el Dios de Jacob
  alternatives_spanish:
  - el Dios de Yaacob
  - Jacob, su Dios
  lexicon: HALOT
  rationale: La construcción posesiva se vierte de manera directa y natural en español, manteniendo la resonancia pactal e histórica de la expresión.
theological_decisions:
- issue: Nombre divino YHWH en español
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se sigue la decisión doctrinal del POB de preservar el nombre propio del Tetragrámaton. «Yahvé» es la forma establecida para este proyecto en español, evitando la sustitución reverencial por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Fuerza verbal optativa de la bendición
  english_pob_reading: optative/jussive sense with 'May ...'
  chosen_spanish_reading: «Que ...» con subjuntivo
  alternative_spanish_readings:
  - 'futuro simple: «Yahvé te responderá ...»'
  - «Ojalá ...»
  rationale: En una fórmula de bendición/súplica, el hebreo imperfecto expresa deseo o petición. El español con subjuntivo optativo reproduce mejor esa función litúrgica que un futuro declarativo.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: preserve source text''s plain sense and theological tension'
- issue: Valor teológico de «el nombre del Dios de Jacob»
  english_pob_reading: the name of the God of Jacob
  chosen_spanish_reading: el nombre del Dios de Jacob
  alternative_spanish_readings:
  - la autoridad del Dios de Jacob
  - la presencia del Dios de Jacob
  rationale: Se conserva la ambigüedad fecunda de «nombre», que en hebreo puede implicar presencia, autoridad y reputación. No se reduce a una sola explicación para no cerrar el alcance poético del texto.
  doctrine_reference: Source-driven lexical tension preserved
translation_notes:
  revision_awareness: La revisión inglesa más reciente corrigió la primera opción metafórica de «set you securely on high» a «protect you» para reflejar con más naturalidad y precisión יְשַׂגֶּבְךָ. La presente versión española sigue esa revisión, optando por «te proteja» y manteniendo el tono optativo del versículo.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה.
  - Se mantiene «Dios» en «el Dios de Jacob» según el patrón del texto hebreo y la pauta del proyecto.
  - «Angustia» traduce צָרָה con un matiz bíblico natural en español.
  - La sintaxis optativa con «Que ...» conserva el sentido de bendición/petición del hebreo.
