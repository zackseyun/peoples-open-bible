base_translation:
  language: en
  yaml_path: translation/ot/2_kings/023/025.yaml
  text: And before him there was no king like him[a], who turned to Yahweh with all his heart and with all his soul and with all his might, according to all the law of Moses[c][b]; nor did any like him arise after him.
  footnotes:
  - marker: a
    text: Or 'returned to the LORD.' The Hebrew verb can carry the sense of turning back in covenant loyalty and repentance.
    reason: lexical_alternative
  - marker: b
    text: '''With all his heart and with all his soul and with all his might'' echoes Deuteronomy 6:5.'
    reason: cross_reference
  - marker: c
    text: Or 'strength' for 'might.'
    reason: lexical_alternative
