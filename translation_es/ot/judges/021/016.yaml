revisions:
- from: 'Entonces los ancianos de la congregación dijeron[a]: «¿Qué haremos para dar mujeres a los que han quedado, puesto que de Benjamín ha sido destruida una mujer?»'
  to: 'Entonces los ancianos de la congregación dijeron[a]: «¿Qué haremos para conseguirles esposas a los que han quedado, puesto que las mujeres de Benjamín han sido destruidas?»'
  rationale: 'Se ajusta el texto principal al sentido fuente comunicado en la auditoría inglesa: לְנָשִׁים se expresa como ''esposas'' y el singular colectivo de אִשָּׁה se conserva en nota, no en el cuerpo del versículo, para evitar confusión en español. ''Conseguirles esposas'' transmite con claridad la finalidad matrimonial sin añadir contenido no presente en el hebreo.'
