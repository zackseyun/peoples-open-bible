  text: וְ/הָיָ֧ה כִֽי נִרְאָ֛ה כִּֽי נִלְאָ֥ה מוֹאָ֖ב עַל הַ/בָּמָ֑ה וּ/בָ֧א אֶל מִקְדָּשׁ֛/וֹ לְ/הִתְפַּלֵּ֖ל וְ/לֹ֥א יוּכָֽל־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/isaiah/016/012.yaml
  text: And when it is seen that Moab is worn out on the high place[a], and he comes to his sanctuary to pray[c][b], he will not be able.
  footnotes:
  - marker: a
    text: Or 'he is seen' / 'it appears that Moab is weary on the high place.' The Hebrew allows a more personal or more impersonal sense in the opening clause.
    reason: lexical_alternative
  - marker: b
    text: '''High place'' refers to an elevated cult site used for worship.'
    reason: cultural_note
  - marker: c
    text: Or 'he will not be able.' The translation 'he will not prevail' makes explicit the likely sense of unsuccessful prayer.
    reason: lexical_alternative
