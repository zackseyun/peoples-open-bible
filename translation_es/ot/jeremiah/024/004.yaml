lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: came
  chosen_spanish: vino
  alternatives_spanish:
  - llegó
  - fue
  lexicon: HALOT
  rationale: En la fórmula profética ויהי דבר־יהוה אלי, «vino» reproduce de manera natural y fiel el movimiento de la palabra hacia el profeta, sin caer en un calco duro como «fue».
- source_word: דְבַר
  english_pob_choice: word
  chosen_spanish: palabra
  alternatives_spanish:
  - mensaje
  - asunto
  lexicon: HALOT
  rationale: «Palabra» mantiene la fórmula recurrente «la palabra de Yahvé» y conserva el registro profético tradicional del hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino como «Yahvé», conforme al criterio del proyecto para el Tetragrámaton, en lugar de sustituirlo por un título.
- source_word: אֵלַי
  english_pob_choice: to me
  chosen_spanish: a mí
  alternatives_spanish:
  - para mí
  lexicon: HALOT
  rationale: La preposición más pronombre se rinde de forma directa y natural como «a mí».
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - para decir
  - 'así:'
  lexicon: HALOT
  rationale: «Diciendo» es la forma usual en español para introducir el discurso directo profético y corresponde al valor introductorio del infinitivo hebreo.
theological_decisions:
- issue: Nombre divino YHWH en la fórmula profética
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  rationale: El texto hebreo usa explícitamente el Tetragrámaton; por la norma del proyecto, se traduce como «Yahvé» para preservar el nombre propio del Dios del pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior: el marcador de nota [a] ahora aparece anclado en el texto de traducción en «mí[a]», de modo que la nota queda debidamente vinculada. La redacción sigue el paralelismo del audit trail inglés y el hebreo fuente.'
  spanish_consistency_notes:
  - Se conservó la fórmula profética breve y directa, sin expandir el texto más allá de «Y vino la palabra de Yahvé a mí, diciendo,».
  - Se usó «Yahvé» de manera consistente con la terminología del proyecto para יְהוָה.
  - El orden español se ajustó para sonar natural en lectura pública, manteniendo el contenido semántico del hebreo.
