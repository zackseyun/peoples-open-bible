lexical_decisions:
- source_word: שֶׁ/הִכָּה
  english_pob_choice: who struck
  chosen_spanish: que hirió
  alternatives_spanish:
  - que golpeó
  - que hirió de muerte
  lexicon: HALOT
  rationale: La partícula relativa שֶׁ pide una cláusula dependiente; en español, «que» conserva esa continuidad. Para הִכָּה, «hirió» refleja el golpe violento sin añadir explícitamente «abajo», y suena natural en registro bíblico-poético. No se usa «golpeó» porque debilita el sentido bélico; «hirió de muerte» añade una especificación no expresada directamente.
- source_word: גּוֹיִם
  english_pob_choice: nations
  chosen_spanish: naciones
  alternatives_spanish:
  - pueblos
  - gentiles
  lexicon: HALOT
  rationale: «Naciones» es el equivalente directo y más neutro para גּוֹיִם en este contexto histórico-militar. «Pueblos» es posible, pero menos preciso aquí; «gentiles» introduciría una carga teológica posterior que el hebreo no exige.
- source_word: רַבִּים
  english_pob_choice: many
  chosen_spanish: muchas
  alternatives_spanish:
  - numerosas
  - grandes
  lexicon: HALOT
  rationale: El adjetivo cuantifica de manera simple a «naciones». «Muchas» es la opción más directa y natural en español; «numerosas» resulta más formal, y «grandes» desplaza el matiz cuantitativo.
- source_word: וְ/הָרַג
  english_pob_choice: and killed
  chosen_spanish: y mató
  alternatives_spanish:
  - y mató de muerte
  - y dio muerte a
  lexicon: HALOT
  rationale: הָרַג significa «matar, matar/asesinar, dar muerte». «Mató» es claro y fiel al verbo sin arcaísmo. «Dar muerte a» es más perifrástico y menos poético; «mató de muerte» es redundante en español.
- source_word: מְלָכִים
  english_pob_choice: kings
  chosen_spanish: reyes
  alternatives_spanish:
  - monarcas
  lexicon: HALOT
  rationale: «Reyes» es la correspondencia directa y la más natural en el registro bíblico. «Monarcas» sería correcto pero menos transparente y menos acorde con el paralelismo hebreo.
- source_word: עֲצוּמִים
  english_pob_choice: mighty
  chosen_spanish: poderosos
  alternatives_spanish:
  - fuertes
  - mighty
  lexicon: HALOT
  rationale: עֲצוּמִים expresa fuerza, poder o grandeza. «Poderosos» mantiene el sentido de poder/fortaleza en español y se adapta bien a «reyes». «Fuertes» suena algo más físico; «mighty» no corresponde a un término español.
theological_decisions:
- issue: Mantenimiento de la cláusula relativa dependiente
  english_pob_reading: Render the verse as a dependent clause beginning with 'who,' continuing the description of the LORD's acts.
  chosen_spanish_reading: Conservar la dependencia con «que» para que el versículo siga describiendo al sujeto del contexto anterior.
  alternative_spanish_readings:
  - He hirió a muchas naciones y mató a reyes poderosos.
  - El que hirió a muchas naciones y mató a reyes poderosos
  rationale: El hebreo abre con שֶׁ, marcando una cláusula relativa ligada al antecedente inmediato. En español, «que» preserva esa sintaxis y el efecto acumulativo del salmo. La forma independiente puede ser aceptable por fluidez, pero debilita la continuidad textual; «el que» introduce un giro nominal menos directo.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión posterior del inglés POB que retiró «down» de «struck down» para acercarse más al hebreo. Por eso el español usa «hirió» sin añadir un equivalente de «abajo», y mantiene el paralelismo simple «hirió... y mató...» conforme al texto hebreo y a la última decisión auditada.
  spanish_consistency_notes:
  - Se mantuvo «naciones» para גּוֹיִם, coherente con el uso bíblico estándar y con la decisión inglesa auditada.
  - Se eligió «poderosos» para עֲצוּמִים, evitando introducir una intensificación mayor que la del hebreo.
  - El tono es poético y reverente, pero sin arcaísmos innecesarios; esto favorece la legibilidad pública y la transparencia al original.
