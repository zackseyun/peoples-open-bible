  source_alignment_summary: 'El borrador refleja bien el sentido del griego: imperativos exhortativos, vocativo doble («ὅσιοι καὶ ταπεινοὶ τῇ καρδίᾳ»), y el cierre temporal de perpetuidad. También conserva la nota léxica sobre ὅσιοι. Sin embargo, «ustedes los santos» suena más explicativo que vocativo litúrgico, y «engrándezcanlo» es menos natural y menos preciso que una forma estándar de exaltación para ὑπερυψοῦτε.'
  spanish_quality_summary: El español es claro y mayormente fiel, pero puede mejorarse en naturalidad litúrgica y fluidez. «Bendigan al Señor» y «humildes de corazón» funcionan bien. Conviene quitar «ustedes» para un llamado más directo y reemplazar «engrándezcanlo» por «exáltenlo en gran manera», que suena más natural y preserva mejor la fuerza intensiva.
  glossary_alignment: 'Alineado con las decisiones del proyecto: κύριος → «Señor» en este contexto griego litúrgico; ὅσιοι → «santos» con nota alternativa; εὐλογεῖτε → «Bendigan». No hay conflicto con la política de «Yahvé», ya que el texto fuente tiene κύριος, no el Tetragrámaton.'
  issues:
