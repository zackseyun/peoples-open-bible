translation:
  language: es
  text: y también para recordar la destrucción inicua de los infantes inocentes[a], y las blasfemias cometidas contra su nombre, y aborrecer el mal[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los infantes sin pecado». El griego literalmente dice «sin pecado», pero aquí probablemente enfatiza su inocencia como víctimas.
    reason: lexical_alternative
  - marker: b
    text: O «odiar el mal» o «aborrecer la maldad». El verbo griego es raro y expresa una fuerte hostilidad hacia lo malo.
    reason: lexical_alternative
lexical_decisions:
- source_word: μνησθῆναι
  english_pob_choice: to remember
  chosen_spanish: recordar
  alternatives_spanish:
  - traer a la memoria
  - acordarse de
  lexicon: BDAG / LSJ
  rationale: El infinitivo aoristo en esta secuencia de petición se rinde con el verbo sencillo y natural 'recordar', que conserva el sentido de rememoración intencional sin sobrecargar el español.
- source_word: ἀναμαρτήτων
  english_pob_choice: innocent
  chosen_spanish: inocentes
  alternatives_spanish:
  - sin pecado
  - sin culpa
  lexicon: LSJ
  rationale: El griego dice literalmente 'sin pecado', pero en este contexto de víctimas asesinadas 'inocentes' comunica mejor la idea moral y victimaria sin convertirla en una afirmación doctrinal absoluta.
- source_word: νηπίων
  english_pob_choice: infants
  chosen_spanish: infantes
  alternatives_spanish:
  - niños pequeños
  - bebés
  lexicon: LSJ
  rationale: '''Infantes'' conserva la referencia a niños muy pequeños y mantiene un registro digno; ''bebés'' sería más coloquial y ''niños pequeños'' más amplio.'
- source_word: παρανόμου
  english_pob_choice: lawless
  chosen_spanish: ilegal
  alternatives_spanish:
  - sin ley
  - impío
  - inicuo
  lexicon: LSJ
  rationale: El término subraya lo contrario de la ley y la justicia. 'Ilegal' es la opción más directa en español para una destrucción realizada contra derecho, aunque 'sin ley' también conserva el matiz etimológico.
- source_word: ἀπωλίας
  english_pob_choice: destruction
  chosen_spanish: destrucción
  alternatives_spanish:
  - ruina
  - matanza
  lexicon: LSJ
  rationale: '''Destrucción'' sigue de cerca el valor semántico del sustantivo y permite implicar la violencia mortal sin añadir un término más interpretativo como ''matanza''.'
- source_word: βλασφημιῶν
  english_pob_choice: blasphemies
  chosen_spanish: blasfemias
  alternatives_spanish:
  - insultos
  - injurias
  lexicon: LSJ
  rationale: Dado que el objeto es 'su nombre', 'blasfemias' conserva el peso religioso del agravio y corresponde bien al uso de la POB en contextos teológicos.
- source_word: εἰς τὸ ὄνομα αὐτοῦ
  english_pob_choice: against his name
  chosen_spanish: contra su nombre
  alternatives_spanish:
  - en contra de su nombre
  - dirigidas a su nombre
  lexicon: LSJ
  rationale: La preposición y el contexto hostil favorecen 'contra'; esta formulación es natural en español y refleja bien la fuerza adversativa del original griego.
- source_word: μισοπνηρῆσαι
  english_pob_choice: to hate evil
  chosen_spanish: aborrecer el mal
  alternatives_spanish:
  - odiar el mal
  - aborrecer la maldad
  lexicon: LSJ
  rationale: El verbo raro expresa una hostilidad intensa hacia lo malo. 'Aborrecer el mal' mantiene la fuerza moral del griego y evita una expresión demasiado psicológica o suavizada.
theological_decisions:
- issue: Valor de ἀναμαρτήτων aplicado a los niños muertos
  english_pob_reading: innocent infants
  chosen_spanish_reading: infantes inocentes
  alternative_spanish_readings:
  - infantes sin pecado
  - infantes sin culpa
  rationale: 'Se preserva la tensión del original: el griego literalmente dice ''sin pecado'', pero la función retórica del pasaje enfatiza la inocencia de las víctimas. ''Inocentes'' evita convertir la frase en una afirmación doctrinal más fuerte de lo que el texto exige.'
  doctrine_reference: La traducción debe conservar el sentido narrativo y moral sin importar debates doctrinales ajenos al pasaje.
- issue: Intensidad ética de μισοπνηρῆσαι
  english_pob_reading: to hate evil
  chosen_spanish_reading: aborrecer el mal
  alternative_spanish_readings:
  - odiar el mal
  - detestar la maldad
  rationale: La POB corrigió el inglés a un mandato directo y sobrio. 'Aborrecer el mal' reproduce esa fuerza exhortativa con un registro bíblico claro, sin introducir un giro más dinámico que el griego no requiera.
  doctrine_reference: La traducción debe mantener la orientación moral explícita del texto sin atenuarla ni exagerarla.
translation_notes:
  revision_awareness: La versión inglesa auditada revisó 'to come to hate evil' por 'to hate evil'. La redacción española sigue esa revisión con 'aborrecer el mal', evitando una perífrasis de proceso y manteniendo la fuerza directa del verbo. También se preservó la tensión de ἀναμαρτήτων con una nota alternativa que explica por qué 'inocentes' es preferible en español de cuerpo principal.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como término por defecto cuando aparezca el nombre divino; aquí no ocurre.
  - '''Infantes'' conserva el registro solemne y es consistente con el léxico POB para niños muy pequeños.'
  - '''Aborrecer el mal'' evita el calco pesado y coincide con la revisión inglesa más directa.'
  - Se prefirió 'contra su nombre' para reflejar el contexto hostil de βλασφημιῶν con εἰς τὸ ὄνομα αὐτοῦ.
