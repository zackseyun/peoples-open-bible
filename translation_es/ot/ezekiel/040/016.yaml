base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/040/016.yaml
  text: And there were recessed windows toward the guardrooms and toward their side pillars[a], inward, all around the gate; and likewise for the porticos. And windows were all around on the inside[c][b], and on each pillar were palm-tree decorations.
  footnotes:
  - marker: a
    text: Or 'closed windows,' 'narrow windows,' or 'windows with recessed frames.' The Hebrew adjective likely describes a particular architectural form rather than windows that could not admit light at all.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew terms for these gateway structural elements (rendered here 'side pillars' and 'pillar') are difficult architectural vocabulary; alternatives include 'jambs' or 'pilasters.'
    reason: lexical_alternative
  - marker: c
    text: Or 'vestibules' or 'porches' for 'porticos.'
    reason: lexical_alternative
