base_translation:
  language: en
  yaml_path: translation/ot/1_chronicles/026/026.yaml
  text: Shelomoth and his brothers were over all the treasuries of the holy things that King David[a], the heads of the fathers’ houses, the commanders of thousands and of hundreds[b], and the commanders of the army had dedicated.
  footnotes:
