translation:
  language: es
  text: Vigila para ver de dónde le vendrá la salvación[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «liberación» para «salvación».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποσκοπεύει
  english_pob_choice: watches to see
  chosen_spanish: vigila para ver
  alternatives_spanish:
  - mira atentamente
  - está al acecho
  - observa
  lexicon: LSJ
  rationale: El verbo expresa una mirada atenta y expectante. «Vigila para ver» conserva ese sentido durativo y anticipatorio en español natural, sin volver la frase pesada ni demasiado interpretativa.
- source_word: ὅθεν
  english_pob_choice: from where
  chosen_spanish: de dónde
  alternatives_spanish:
  - desde dónde
  - de qué lugar
  lexicon: LSJ
  rationale: El adverbio indica procedencia u origen. «De dónde» reproduce bien esa fuerza de fuente/origen en español corriente.
- source_word: ἥξει
  english_pob_choice: will come
  chosen_spanish: le vendrá
  alternatives_spanish:
  - vendrá
  - llegará
  lexicon: LSJ
  rationale: El futuro expresa venir o llegar. En combinación con «salvación», «le vendrá» suena natural en español y mantiene la idea de movimiento hacia él.
- source_word: σωτηρία
  english_pob_choice: salvation
  chosen_spanish: la salvación
  alternatives_spanish:
  - la liberación
  - el rescate
  lexicon: LSJ
  rationale: «Salvación» es el equivalente más amplio y adecuado al registro religioso del texto. Se conserva la posibilidad de «liberación» sin restringir innecesariamente el sentido.
- source_word: αὐτῷ
  english_pob_choice: to him
  chosen_spanish: le
  alternatives_spanish:
  - para él
  lexicon: Greek grammar
  rationale: El dativo puede expresar dirección o beneficio. «Le» integra naturalmente el complemento con el verbo «vendrá» y mantiene la cercanía al griego.
translation_notes:
  revision_awareness: El texto griego y la traducción inglesa auditada están en alto acuerdo y no muestran revisiones aplicadas; la versión española sigue ese sentido sin introducir cambios interpretativos.
  spanish_consistency_notes:
  - Se mantiene «salvación» como término principal, coherente con el registro religioso del pasaje.
  - No se usa «Cristo», «SEÑOR» ni otros términos no presentes en el versículo.
  - 'La sintaxis española busca ser natural sin alejarse de la estructura fuente: vigilancia + origen + venida de la salvación.'
