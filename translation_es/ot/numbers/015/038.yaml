  text: דַּבֵּ֞ר אֶל בְּנֵ֤י יִשְׂרָאֵל֙ וְ/אָמַרְתָּ֣ אֲלֵ/הֶ֔ם וְ/עָשׂ֨וּ לָ/הֶ֥ם צִיצִ֛ת עַל כַּנְפֵ֥י בִגְדֵי/הֶ֖ם לְ/דֹרֹתָ֑/ם וְ/נָֽתְנ֛וּ עַל צִיצִ֥ת הַ/כָּנָ֖ף פְּתִ֥יל תְּכֵֽלֶת־־־׃
