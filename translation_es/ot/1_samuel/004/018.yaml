translation:
  language: es
  text: Y aconteció que, cuando él mencionó el arca de Dios, Elí cayó hacia atrás desde el asiento, junto a la puerta[a], y se le rompió el cuello, y murió, porque el hombre era viejo y pesado[b]. Y había juzgado a Israel cuarenta años.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'al lado de la puerta' o 'junto al portón'. El modismo hebreo es literalmente 'a/junto a la mano de la puerta'.
    reason: lexical_alternative
  - marker: b
    text: Literalmente 'pesado'. El término puede implicar que el peso de Elí, junto con su edad, contribuyó a la caída fatal.
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּהַזְכִּירוֹ
  english_pob_choice: when he mentioned
  chosen_spanish: cuando él mencionó
  alternatives_spanish:
  - cuando hizo mención de
  - al mencionar
  lexicon: HALOT
  rationale: El hifil de זכר aquí tiene el sentido de ‘mencionar’ o ‘hacer mención’. ‘Cuando él mencionó’ conserva la relación temporal de כְּ y suena natural en español.
- source_word: אֲרוֹן הָאֱלֹהִים
  english_pob_choice: the ark of God
  chosen_spanish: el arca de Dios
  alternatives_spanish:
  - el arca del Dios verdadero
  lexicon: HALOT
  rationale: La construcción se traduce de manera directa. ‘Dios’ refleja el referente contextual de Israel sin introducir una glosa innecesaria.
- source_word: וַיִּפֹּל ... אֲחֹרַנִּית
  english_pob_choice: fell backward
  chosen_spanish: cayó hacia atrás
  alternatives_spanish:
  - cayó de espaldas
  - cayó hacia atrás
  lexicon: HALOT
  rationale: אֲחֹרַנִּית es un adverbio que indica dirección hacia atrás. ‘Cayó hacia atrás’ conserva el movimiento de forma clara y natural.
- source_word: הַכִּסֵּא
  english_pob_choice: the seat
  chosen_spanish: el asiento
  alternatives_spanish:
  - la silla
  - su asiento
  lexicon: HALOT
  rationale: En este contexto no se trata de un trono; ‘asiento’ comunica el objeto de manera neutral y actual.
- source_word: בְּעַד יַד הַשַּׁעַר
  english_pob_choice: by the side of the gate
  chosen_spanish: al lado de la puerta
  alternatives_spanish:
  - junto a la puerta
  - al lado de la puerta
  lexicon: HALOT
  rationale: El hebreo usa un modismo locativo literalmente ‘por/at the hand of the gate’. La versión española opta por una formulación idiomática que conserva el sentido espacial. ‘Puerta’ comunica naturalmente la entrada/portal en español bíblico moderno.
- source_word: וַתִּשָּׁבֵר מַפְרַקְתּוֹ
  english_pob_choice: his neck was broken
  chosen_spanish: se le rompió la nuca
  alternatives_spanish:
  - se le quebró el cuello
  - se le rompió la nuca
  lexicon: HALOT
  rationale: מַפְרֶקֶת designa la nuca/cuello. ‘Nuca’ expresa con precisión anatómica el resultado de la caída; el giro impersonal ‘se le rompió’ refleja el evento sin forzar una pasiva poco natural en español.
- source_word: כִּי זָקֵן הָאִישׁ וְכָבֵד
  english_pob_choice: for the man was old and heavy
  chosen_spanish: porque el hombre era viejo y pesado
  alternatives_spanish:
  - porque el hombre era viejo y pesado
  - porque el hombre era anciano y pesado
  lexicon: HALOT
  rationale: כָבֵד significa literalmente ‘pesado’. Se conserva ese valor léxico, que en el contexto explica la gravedad de la caída. ‘Viejo’ traduce זָקֵן con naturalidad y sin suavizar la observación narrativa.
- source_word: שָׁפַט אֶת יִשְׂרָאֵל
  english_pob_choice: had judged Israel
  chosen_spanish: había juzgado a Israel
  alternatives_spanish:
  - había gobernado a Israel como juez
  - había juzgado a Israel
  lexicon: HALOT
  rationale: El perfecto hebreo resume retrospectivamente su período completo; el pluscuamperfecto español reproduce bien ese cierre biográfico. Se conserva ‘juzgado’ por el valor del verbo שָׁפַט en el marco de los jueces.
- source_word: אַרְבָּעִים שָׁנָה
  english_pob_choice: forty years
  chosen_spanish: cuarenta años
  alternatives_spanish:
  - cuarenta años
  lexicon: HALOT
  rationale: Correspondencia directa del numeral y la unidad temporal.
theological_decisions:
- issue: Referencia de אֱלֹהִים en אֲרוֹן הָאֱלֹהִים
  english_pob_reading: God
  chosen_spanish_reading: Dios
  alternative_spanish_readings:
  - dioses
  rationale: En este pasaje la referencia es al Dios de Israel, no a deidades múltiples. ‘Dios’ mantiene la lectura contextual sin perder el sustantivo común del hebreo.
  doctrine_reference: Monoteísmo bíblico / contexto narrativo de Israel
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del audit trail que ajusta la localización a la expresión más cercana al hebreo (‘by the side of the gate’). En español se optó por una equivalencia natural equivalente (‘al lado de la puerta’) sin perder el valor locativo del modismo.
  spanish_consistency_notes:
  - Se preservó ‘Dios’ para אֱלֹהִים conforme al contexto.
  - Se mantuvo ‘pesado’ para כָבֵד, evitando suavizar la tensión lexical.
  - ‘Asiento’ evita una lectura de trono o silla específica que el contexto no exige.
  - ‘Nuca’ es la solución anatómica más precisa para מַפְרַקְתּוֹ en español moderno.
