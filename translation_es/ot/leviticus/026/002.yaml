translation:
  language: es
  text: Guardarán mis sábados y reverenciarán mi santuario[a]. Yo soy Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «temerán mi santuario» o «tendrán temor reverente de mi santuario». El verbo hebreo puede expresar temor, reverencia o sobrecogimiento, según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: שַׁבְּתֹתַי
  english_pob_choice: my Sabbaths
  chosen_spanish: mis sábados
  alternatives_spanish:
  - mis Sabbats
  - mis días de sábado
  - mis observancias sabáticas
  lexicon: HALOT
  rationale: El plural con sufijo posesivo pide mantener la pluralidad y la referencia a tiempos sagrados. En español, «sábados» comunica de manera natural el campo semántico de los días/reposo sabáticos y conserva la amplitud cultual sin forzar un tecnicismo.
- source_word: תִּשְׁמֹרוּ
  english_pob_choice: you shall keep
  chosen_spanish: guardarán
  alternatives_spanish:
  - observarán
  - cumplirán
  - guardarán cuidadosamente
  lexicon: HALOT
  rationale: שׁמר incluye la idea de guardar, observar y custodiar. «Guardarán» conserva la fuerza de custodia obediente y se ajusta bien al paralelo con una realidad sagrada que debe preservarse con cuidado.
- source_word: וּמִקְדָּשִׁי
  english_pob_choice: and my sanctuary
  chosen_spanish: mi santuario
  alternatives_spanish:
  - mi lugar santo
  - mi santuario sagrado
  - mi lugar de santidad
  lexicon: HALOT
  rationale: מִקְדָּשׁ designa un lugar santo o santuario. «Santuario» es el equivalente más estable y claro en español bíblico moderno, sin introducir explicaciones no presentes en el hebreo.
- source_word: תִּירָאוּ
  english_pob_choice: you shall revere
  chosen_spanish: respetarán
  alternatives_spanish:
  - reverenciarán
  - temerán
  - tendrán en reverencia
  lexicon: HALOT
  rationale: El verbo ירא puede abarcar temor, reverencia y sobrecogimiento. En español, «respetarán» comunica bien la actitud de reverencia debida al santuario y evita reducir el mandato a miedo meramente emocional. La nota preserva las alternativas semánticas principales.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino en transliteración directa, conforme al criterio del proyecto. «Yahvé» es la forma española más reconocible y digna para el Tetragrámaton, sin sustituirlo por un título.
theological_decisions:
- issue: Modo de expresar el Tetragrámaton
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - Jehová
  - el SEÑOR
  rationale: El hebreo contiene יְהוָה de forma explícita. La traducción española conserva el nombre propio divino en vez de ocultarlo tras una sustitución titular, siguiendo la línea auditada de la POB y el principio de transparencia textual.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Fuerza de ירא aplicada al santuario
  english_pob_reading: revere
  chosen_spanish_reading: respetarán
  alternative_spanish_readings:
  - temerán
  - reverenciarán
  - estarán en awe de
  rationale: Aquí el objeto es el santuario, por lo que la fuerza principal es la reverencia cultual. «Respetarán» comunica la actitud debida sin sugerir terror. Se conserva la tensión semántica mediante la nota con las alternativas posibles.
  doctrine_reference: DOCTRINE.md Translation philosophy §§5–6
translation_notes:
  revision_awareness: El audit trail inglés muestra alta concordancia y sin revisiones sustantivas; se mantiene la decisión óptima ya aprobada, con ajuste natural al español para el verbo ירא y la conservación del nombre divino.
  spanish_consistency_notes:
  - Se mantiene la segunda persona plural como mandato directo, en paralelo con el hebreo.
  - «Mis sábados» conserva el plural hebreo y su alcance cultual amplio.
  - No se sustituye el nombre divino por «SEÑOR»; se conserva «Yahvé» por consistencia con la política del proyecto.
  - La nota de pie de página se ancla en «respetarán» para preservar la alternativa semántica documentada.
