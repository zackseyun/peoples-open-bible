translation:
  language: es
  text: Recuerda la ira[a] en los días de tu fin, y el tiempo de venganza al apartarse el rostro[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «enojo» para «ira». El griego puede denotar enojo intenso en general, aunque aquí probablemente alude a la ira divina en juicio.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «al apartarse un rostro». Probablemente alude al retiro del favor, quizá el de Dios, pero el griego no nombra explícitamente al sujeto.
    reason: lexical_alternative
lexical_decisions:
- source_word: μνήσθητι
  english_pob_choice: Remember
  chosen_spanish: Recuerda
  alternatives_spanish:
  - Acuérdate
  - Ten presente
  lexicon: BDAG
  rationale: El imperativo aoristo medio de μιμνῄσκομαι pide un mandato directo. «Recuerda» es natural en español y conserva el tono exhortativo sin suavizarlo.
- source_word: θυμοῦ
  english_pob_choice: wrath
  chosen_spanish: ira
  alternatives_spanish:
  - enojo
  - furor
  - ira divina
  lexicon: BDAG
  rationale: El POB inglés mantiene la tensión entre «wrath» e «anger». En español, «ira» conserva mejor la fuerza solemne y puede abarcar tanto ira intensa como juicio; «ira divina» se reserva para la nota porque el griego no nombra explícitamente al sujeto.
- source_word: ἐν ἡμέραις τελευτῆς
  english_pob_choice: in the days of your end
  chosen_spanish: en los días de tu fin
  alternatives_spanish:
  - en los días de tu muerte
  - al final de tu vida
  - en los días de tu término
  lexicon: LSJ
  rationale: τελευτή puede significar fin, término o muerte. «Fin» conserva la cercanía al griego y sigue siendo claro en español; «muerte» interpreta más específicamente de lo que el texto dice.
- source_word: καιρὸν
  english_pob_choice: the time
  chosen_spanish: el tiempo
  alternatives_spanish:
  - un tiempo
  - el momento
  - el tiempo señalado
  lexicon: BDAG
  rationale: El artículo definido en español fluye bien con la genitiva siguiente. «El tiempo» mantiene la referencia concreta a un tiempo determinado de juicio.
- source_word: ἐκδικήσεως
  english_pob_choice: vengeance
  chosen_spanish: venganza
  alternatives_spanish:
  - vindicación
  - retribución
  - castigo
  lexicon: BDAG
  rationale: «Venganza» reproduce con más fuerza la carga punitiva del sustantivo en este contexto de advertencia. «Vindicación» sería posible en otros contextos, pero aquí diluiría el tono de juicio.
- source_word: ἐν ἀποστροφῇ προσώπου
  english_pob_choice: at the turning away of the face
  chosen_spanish: en el apartamiento del rostro
  alternatives_spanish:
  - en el apartarse del rostro
  - en el retiro del rostro
  - en el apartamiento del semblante
  lexicon: LSJ
  rationale: La expresión es idiomática y no nombra al agente. «Apartamiento del rostro» conserva la imagen literal y la ambigüedad sobre si se trata del rostro humano o del rostro de Dios, como lo mantiene el POB inglés.
theological_decisions:
- issue: Si la ira, la venganza y el rostro apartado deben explicitarse como divinos
  english_pob_reading: Keep the wording implicit in the main text
  chosen_spanish_reading: Mantener la formulación implícita en el texto principal
  alternative_spanish_readings:
  - Interpretar explícitamente que se trata de la ira y la venganza de Dios
  - Sustituir por una paráfrasis de juicio divino
  rationale: El griego no menciona a Dios de manera explícita, aunque el contexto sugiere juicio divino. Para preservar la tensión y la imagen del original, el texto español no añade un sujeto que el griego no expresa.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del POB inglés, que ajustó la segunda mitad a una formulación más literal: «at the turning away of the face». Por eso el español conserva la estructura nominal («en el apartamiento del rostro») en lugar de convertirla en una cláusula verbal.'
  spanish_consistency_notes:
  - Se mantiene «ira» para θυμός en vez de «cólera» o «enojo» porque el contexto de advertencia y venganza exige mayor solemnidad.
  - Se usa «fin» para τελευτή para no sobreespecificar como «muerte»; el término admite el sentido de término final o postrero.
  - La expresión «apartamiento del rostro» preserva la ambigüedad del original y evita introducir explícitamente «Dios» en el texto principal.
  - El registro es formal pero legible para lectura eclesial en español latinoamericano.
