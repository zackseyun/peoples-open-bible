    text: Hebreo 'hijos de los hombres', una expresión idiomática para los seres humanos.
    reason: lexical_alternative
  revision_rationale: Se reemplazó 'se quedaron asombrados' por 'quedaron horrorizados' para reflejar mejor el shock de שָׁמְמוּ en este contexto. Se reformuló el centro del verso como 'tan desfigurado estaba su aspecto' para sonar natural en español y mantener la correlación 'tal como... tan...'. Se eliminó la nota redundante sobre 'aspecto' y se conservó la nota idiomática sobre 'hijos de los hombres'.
