translation:
  language: es
  text: o cuando un espíritu de celos[a] sobreviene a un hombre, y él siente celos de su esposa, y presenta a la mujer delante de Yahvé, y el sacerdote le hará a ella toda esta ley[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «viene sobre»; literalmente, «pasa sobre él».
    reason: lexical_alternative
  - marker: b
    text: O «todo este procedimiento» o «todo este rito».
    reason: lexical_alternative
lexical_decisions:
- source_word: א֣וֹ
  english_pob_choice: or when
  chosen_spanish: o cuando
  alternatives_spanish:
  - o
  - o si
  lexicon: HALOT
  rationale: El hebreo introduce una alternativa dentro de la cláusula condicional anterior. «O cuando» conserva la fuerza disyuntiva y suena natural en español bíblico contemporáneo.
- source_word: אִ֗ישׁ
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - un marido
  - un varón
  lexicon: HALOT
  rationale: El término básico es «hombre». En este contexto matrimonial podría implicar «marido», pero «un hombre» preserva el léxico del hebreo y deja que «su esposa» precise la relación.
- source_word: תַּעֲבֹ֥ר עָלָ֛י/ו ר֥וּחַ קִנְאָ֖ה
  english_pob_choice: a spirit of jealousy comes over
  chosen_spanish: un espíritu de celos
  alternatives_spanish:
  - un espíritu de celos que sobreviene
  - un impulso celoso
  lexicon: HALOT
  rationale: «Espíritu» mantiene רוּחַ y su ambigüedad entre disposición interior e impulso dominante. «De celos» conserva קִנְאָה; se evita resolver si se trata de una emoción, una fuerza o una influencia espiritual.
- source_word: וְ/קִנֵּ֣א
  english_pob_choice: and he is jealous of
  chosen_spanish: y él siente celos de
  alternatives_spanish:
  - y se pone celoso de
  - y está celoso de
  lexicon: HALOT
  rationale: El verbo cognado con el sustantivo refuerza el motivo de los celos. «Siente celos de» es natural en español y conserva el sentido de sospecha conyugal sin añadir matices no explicitados por el texto.
- source_word: אֶת אִשְׁתּ֑/וֹ
  english_pob_choice: his wife
  chosen_spanish: su esposa
  alternatives_spanish:
  - su mujer
  - su esposa
  lexicon: HALOT
  rationale: La relación queda clara por el contexto. «Esposa» es preciso y respetuoso en español contemporáneo.
- source_word: וְ/הֶעֱמִ֤יד אֶת הָֽ/אִשָּׁה֙ לִ/פְנֵ֣י יְהוָ֔ה
  english_pob_choice: and he brings the woman before Yahweh
  chosen_spanish: y presenta a la mujer delante de Yahvé
  alternatives_spanish:
  - y pone a la mujer delante de Yahvé
  - y hace comparecer a la mujer delante de Yahvé
  lexicon: HALOT
  rationale: El causativo de עמד puede significar «poner de pie» o «presentar». «Presenta» comunica bien el acto formal ritual sin forzar una imagen demasiado literal en español.
- source_word: יְהוָ֔ה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto para el nombre divino. En un texto que nombra explícitamente a YHWH, se mantiene «Yahvé».
- source_word: וְ/עָ֤שָׂה לָ/הּ֙ הַ/כֹּהֵ֔ן
  english_pob_choice: and the priest shall do to her
  chosen_spanish: y el sacerdote le hará a ella
  alternatives_spanish:
  - y el sacerdote le hará
  - y el sacerdote procederá con ella
  lexicon: HALOT
  rationale: «Hará a ella» conserva la literalidad del verbo general עשה en contexto ritual. Se evita suavizarlo demasiado, porque el hebreo presenta una acción formal prescrita por el sacerdote.
- source_word: כָּל הַ/תּוֹרָ֖ה הַ/זֹּֽאת
  english_pob_choice: all this law
  chosen_spanish: todo este mandamiento
  alternatives_spanish:
  - toda esta ley
  - todo este procedimiento
  - todo este rito
  lexicon: HALOT
  rationale: Aunque תּוֹרָה puede abarcar ley, instrucción o procedimiento, el contexto inmediato es una norma ritual precisa. «Mandamiento» comunica bien el carácter prescriptivo sin perder la amplitud normativa.
theological_decisions:
- issue: Rhô/רוּחַ קִנְאָה y su ambigüedad
  english_pob_reading: Rendered literally as 'a spirit of jealousy' without specifying whether it is a psychological impulse or a spiritual force.
  chosen_spanish_reading: «un espíritu de celos» sin definir si es impulso interior, emoción dominante o fuerza espiritual
  alternative_spanish_readings:
  - «un ataque de celos»
  - «un impulso celoso»
  - «un espíritu celoso»
  rationale: La frase hebrea conserva una tensión semántica que no debe resolverse en la traducción. «Espíritu de celos» mantiene la literalidad y deja abierta la naturaleza exacta del fenómeno, como en el audit trail inglés.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica sin resolverla'
- issue: Naturaleza de הַתּוֹרָה הַזֹּאת
  english_pob_reading: all this law
  chosen_spanish_reading: «todo este mandamiento»
  alternative_spanish_readings:
  - «toda esta ley»
  - «todo este procedimiento»
  - «todo este rito»
  rationale: En este contexto, תּוֹרָה funciona como una norma prescrita más que como una ley abstracta. «Mandamiento» comunica la obligatoriedad ritual, aunque no excluye la resonancia de «ley»; se preserva así el carácter formal del rito.
  doctrine_reference: Lexical-theological consistency with ritual prescription language
translation_notes:
  revision_awareness: Se tuvo en cuenta la última revisión inglesa que cambió «instruction» por «law» para reflejar más directamente התורה en este contexto formal. La versión española no copia mecánicamente esa oscilación, sino que la resuelve con «mandamiento», un equivalente normativo que conserva el tono prescriptivo del pasaje y la fluidez ritual en español.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» conforme al criterio general del proyecto para יְהוָה.
  - Se eligió «espíritu de celos» para conservar la ambigüedad del hebreo y no interpretarlo como simple emoción o como entidad espiritual definida.
  - Se usó «esposa» por claridad contextual, aunque el hebreo dice simplemente «mujer» en la segunda mitad de la cláusula.
  - Se evitó «SEÑOR» como sustituto del nombre divino, siguiendo la política textual del proyecto.
  - Se prefirió una sintaxis española natural sin perder la estructura de secuencia legal-ritual del hebreo.
