    issue: '''estaban antes de mí y antes de ti'' suena poco idiomático para predecesores temporales'
    rationale: Aunque capta el valor temporal de לְפָנַי/לְפָנֶיךָ, en español sugiere más un estado o posición que una precedencia histórica. 'fueron antes de mí y antes de ti' conserva el hebraísmo con mejor naturalidad y claridad.
  revised_spanish_text: Los profetas que fueron antes de mí y antes de ti desde tiempos antiguos profetizaron contra muchas tierras y contra grandes reinos[a], de guerra, de calamidad y de peste[b].
