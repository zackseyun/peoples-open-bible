review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo: הַצִּילֵנִי נָא = «Líbrame, por favor»; מִיַּד ... מִיַּד = «de la mano de ... de la mano de»; כִּי יָרֵא אָנֹכִי אֹתוֹ = «porque le tengo miedo»; פֶּן יָבֹא וְהִכַּנִי = «no sea que venga y me hiera». El problema principal está en la puntuación y el cierre de la frase idiomática אֵם עַל בָּנִים: falta el cierre de exclamación inicial y la secuencia final queda algo abrupta en español.'
  spanish_quality_summary: 'El español es generalmente claro y natural, pero necesita una reparación menor de puntuación: cerrar «¡Líbrame...!» o, mejor aún, evitar la exclamación para no introducir una intensidad no marcada en hebreo. También conviene ajustar ligeramente la nota para que refleje mejor el modismo sin sobreexplicar. «Madre con hijos» es defendible y legible en español bíblico moderno.'
  glossary_alignment: No hay conflicto con la terminología del proyecto. No aparece el nombre divino. «Esaú», «Dios» implícito, y el resto del léxico están alineados. La elección «madre con hijos» concuerda con la racionalidad lexical documentada para אֵם עַל בָּנִים.
  issues:
  - severity: medium
    issue: Puntuación incorrecta en la apertura de exclamación
    rationale: El texto empieza con «¡Líbrame...» pero no cierra con «!». En español esto es un error formal. Además, la exclamación no es necesaria para expresar el ruego hebreo, ya representado por «por favor».
  - severity: low
    issue: La nota al pie puede afinarse para reflejar mejor el valor idiomático
    rationale: La explicación actual es básicamente correcta, pero «golpear o destruir» mezcla niveles de interpretación. Es mejor expresar que el hebreo describe herir o destruir a una madre junto con sus hijos, manteniendo el carácter idiomático sin fijar demasiado el grado de violencia más allá del contexto.
  revised_spanish_text: Líbrame, por favor, de la mano de mi hermano, de la mano de Esaú, porque le tengo miedo; no sea que venga y me hiera, madre con hijos[a].
  revised_footnotes:
  - marker: a
    text: O «madre y hijos»; hebreo «madre sobre hijos», un modismo para herir o destruir a una madre junto con sus hijos.
    reason: lexical_alternative
  revision_rationale: Se elimina la exclamación para evitar una puntuación defectuosa y una intensidad añadida no exigida por el hebreo; se conserva la estructura y el sentido del original. Se mantiene «madre con hijos» como la mejor solución española breve y fiel para el modismo אֵם עַל בָּנִים, con una nota que preserva la alternativa y aclara el hebraísmo.
