translation:
  language: es
  text: y los dos riñones, y la grasa que está sobre ellos, que está sobre los lomos, y el apéndice[a] sobre el hígado, con los riñones[b], la quitará.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'el lóbulo sobre el hígado'. El término hebreo para esta parte anatómica (יֹתֶרֶת) es incierto, por eso se usa 'apéndice' en el texto principal para no afirmar con demasiada precisión una identificación discutida.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, 'sobre los riñones'. Aquí probablemente quiere decir que esta parte se quita junto con los riñones.
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁתֵּי הַכְּלָיֹת
  english_pob_choice: the two kidneys
  chosen_spanish: los dos riñones
  alternatives_spanish:
  - las dos kidneys
  lexicon: HALOT
  rationale: כְּלָיָה denota los riñones en anatomía sacrificial. En español, 'los dos riñones' conserva el sentido dual sin calco extraño.
- source_word: הַחֵלֶב
  english_pob_choice: the fat
  chosen_spanish: la grasa
  alternatives_spanish:
  - el sebo
  - la grasa selecta
  lexicon: HALOT
  rationale: En contexto levítico, חֵלֶב se refiere a la porción grasa destinada a ser retirada. 'La grasa' es claro y natural en español; 'sebo' puede sonar más técnico o demasiado estrecho.
- source_word: אֲשֶׁר עֲלֵהֶן
  english_pob_choice: that is on them
  chosen_spanish: que está sobre ellos
  alternatives_spanish:
  - que está encima de ellos
  - que está sobre éllos
  lexicon: HALOT
  rationale: La relación es literalmente locativa; 'sobre ellos' conserva la imagen sin forzar una explicación interpretativa.
- source_word: הַכְּסָלִים
  english_pob_choice: the loins
  chosen_spanish: los lomos
  alternatives_spanish:
  - los riñonales
  - los flancos
  lexicon: HALOT
  rationale: Para anatomía ritual, 'lomos' comunica bien la región corporal y es más idiomático en español bíblico que 'flancos' en este pasaje.
- source_word: הַיֹּתֶרֶת
  english_pob_choice: the appendage
  chosen_spanish: el apéndice
  alternatives_spanish:
  - el lóbulo
  - la protuberancia
  lexicon: HALOT
  rationale: El término hebreo es incierto; 'apéndice' preserva la indeterminación anatómica, como hace la POB en inglés con 'appendage'.
- source_word: עַל הַכָּבֵד
  english_pob_choice: on the liver
  chosen_spanish: del hígado
  alternatives_spanish:
  - sobre el hígado
  - del hígado, colocado sobre él
  lexicon: HALOT
  rationale: En español, 'apéndice del hígado' evita una construcción dura ('sobre el hígado') y sigue la idea de una pieza asociada al órgano, sin resolver indebidamente la localización exacta.
- source_word: עַל הַכְּלָיֹת
  english_pob_choice: with the kidneys
  chosen_spanish: junto con los riñones
  alternatives_spanish:
  - con los riñones
  - al lado de los riñones
  lexicon: HALOT
  rationale: El hebreo indica que esta pieza se retira en conexión con los riñones. 'Junto con' comunica mejor el sentido procedimental que un simple 'con'.
- source_word: יְסִירֶנָּה
  english_pob_choice: he shall remove
  chosen_spanish: lo quitará
  alternatives_spanish:
  - lo removerá
  - deberá quitarlo
  lexicon: HALOT
  rationale: El verbo hifil de סור tiene sentido causativo de retirar. 'Lo quitará' es natural en español y mantiene el tono de instrucción ritual.
translation_notes:
  revision_awareness: Se siguió la línea revisada de la POB en inglés que prefiere una equivalencia formal-optimal y mantiene 'with the kidneys' frente a una formulación más interpretativa. La propuesta española conserva esa prudencia, pero adapta la sintaxis para que resulte natural en español.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' implícito solo porque este versículo no lo contiene.
  - '''Riñones'' se emplea consistentemente para כְּלָיֹת en sentido anatómico sacrificial.'
  - '''Grasa'' evita introducir tecnicismos no requeridos por el texto fuente.'
  - '''Apéndice'' conserva la incertidumbre léxica de יֹתֶרֶת sin resolverla de forma dogmática.'
