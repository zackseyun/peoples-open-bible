translation:
  language: es
  text: Tú eres el Dios que hace maravillas; has dado a conocer tu fuerza[a] entre los pueblos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «tu poder» o «tu potencia». El hebreo עֹז puede significar fuerza, poder o potencia.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «entre las naciones». El hebreo עַמִּים puede referirse en sentido amplio a pueblos o naciones.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאֵל
  english_pob_choice: the God
  chosen_spanish: el Dios
  alternatives_spanish:
  - Dios
  lexicon: HALOT
  rationale: El artículo definido en hebreo identifica de manera enfática al Dios de Israel. En español, "el Dios" conserva esa identificación explícita y refleja mejor el matiz del inglés POB que un simple "Dios".
- source_word: עֹשֵׂה
  english_pob_choice: who works
  chosen_spanish: que hace
  alternatives_spanish:
  - que obra
  - que realiza
  - hacedor de
  lexicon: HALOT
  rationale: El participio expresa una acción característica y continua. "Que hace" es natural en español y mantiene el valor verbal, mientras que "obra" sería posible pero algo más marcado en registro bíblico.
- source_word: פֶלֶא
  english_pob_choice: wonders
  chosen_spanish: maravillas
  alternatives_spanish:
  - prodigios
  - milagros
  - portentos
  lexicon: HALOT
  rationale: El sustantivo apunta a actos extraordinarios y admirables. "Maravillas" preserva bien el campo semántico poético sin estrecharlo a un sentido más técnico como "milagros".
- source_word: הוֹדַעְתָּ
  english_pob_choice: you have made known
  chosen_spanish: has dado a conocer
  alternatives_spanish:
  - has hecho conocer
  - has revelado
  - hiciste conocer
  lexicon: HALOT
  rationale: 'El hifil de ידע tiene fuerza causativa: hacer saber, dar a conocer. "Has dado a conocer" conserva esa causatividad y encaja con el tono de recuerdo/presentación del salmo.'
- source_word: בָעַמִּים
  english_pob_choice: among the peoples
  chosen_spanish: entre los pueblos
  alternatives_spanish:
  - entre las naciones
  - a los pueblos
  lexicon: HALOT
  rationale: La preposición ב sugiere ubicación o esfera, no solo destinatario. "Entre los pueblos" mantiene el alcance amplio del hebreo y evita restringirlo innecesariamente.
- source_word: עֻזֶּךָ
  english_pob_choice: your strength
  chosen_spanish: tu fuerza
  alternatives_spanish:
  - tu poder
  - tu vigor
  - tu fortaleza
  lexicon: HALOT
  rationale: עֹז puede significar fuerza, poder o vigor. "Tu fuerza" es una equivalencia clara y natural en español; además conserva la conexión con los actos poderosos de Dios en el contexto poético.
theological_decisions:
- issue: Alcance público de la auto-manifestación divina en בָעַמִּים
  english_pob_reading: among the peoples
  chosen_spanish_reading: entre los pueblos
  alternative_spanish_readings:
  - entre las naciones
  - a los pueblos
  rationale: El versículo celebra que el poder de Dios fue dado a conocer públicamente en un ámbito amplio. "Entre los pueblos" reproduce ese alcance sin imponer una lectura más específica o nacionalizada.
  doctrine_reference: Translation philosophy §1, §3, §6
translation_notes:
  revision_awareness: 'Coincide con el control de revisión más reciente: no se registraron cambios necesarios y el consenso de auditoría fue alto.'
  spanish_consistency_notes:
  - Se mantuvo el paralelismo poético entre la declaración de identidad divina y la acción salvadora.
  - Se evitó "SEÑOR" para preservar el valor del hebreo con artículo en הָאֵל, siguiendo el criterio de identificación explícita.
  - '"Pueblos" se usó para conservar el rango semántico amplio de עַמִּים y su sonoridad poética en español.'
