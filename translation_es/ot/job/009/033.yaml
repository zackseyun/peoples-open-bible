translation:
  language: es
  text: No hay[a] entre nosotros un árbitro, que pueda poner su mano sobre ambos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mediador». El término hebreo puede designar a quien decide o interviene entre dos partes en disputa.
    reason: lexical_alternative
lexical_decisions:
- source_word: לֹא יֵשׁ
  english_pob_choice: There is no
  chosen_spanish: No hay
  alternatives_spanish:
  - No existe
  - No está
  lexicon: HALOT
  rationale: La construcción existencial negativa se expresa de manera natural en español con «No hay», conservando la negación simple de existencia sin añadir matices ajenos al hebreo.
- source_word: בֵּינֵינוּ
  english_pob_choice: between us
  chosen_spanish: entre nosotros
  alternatives_spanish:
  - entre ambos
  - entre las dos partes
  lexicon: HALOT
  rationale: La preposición con sufijo de 1ª plural indica una relación entre dos partes en disputa. «Entre nosotros» comunica bien esa relación y mantiene el tono directo del discurso de Job.
- source_word: מוֹכִיחַ
  english_pob_choice: arbiter
  chosen_spanish: árbitro
  alternatives_spanish:
  - mediador
  - juez
  - intermediario
  - el que decide
  lexicon: HALOT
  rationale: En este contexto jurídico-forense, el término designa a quien decide o interviene entre dos partes. «Árbitro» reproduce esa función sin convertir el término en una categoría teológica posterior; «mediador» queda como alternativa viable, tal como el audit trail inglés preserva esa posibilidad.
- source_word: יָשֵׁת
  english_pob_choice: might lay
  chosen_spanish: pueda poner
  alternatives_spanish:
  - podría poner
  - pusiera
  - colocara
  lexicon: HALOT
  rationale: El verbo expresa una acción potencial o deseada en una hipótesis. «Pueda poner» conserva esa posibilidad en un español fluido; «poner» mantiene además el gesto concreto del original.
- source_word: יָדוֹ
  english_pob_choice: his hand
  chosen_spanish: su mano
  alternatives_spanish:
  - la mano de él
  - su autoridad
  - su poder
  lexicon: HALOT
  rationale: Se conserva la imagen concreta de «la mano» en lugar de sustituirla por una abstracción como autoridad o poder, porque el hebreo mantiene la metáfora corporal.
- source_word: עַל שְׁנֵינוּ
  english_pob_choice: on us both
  chosen_spanish: sobre los dos
  alternatives_spanish:
  - sobre ambos
  - sobre nosotros dos
  lexicon: HALOT
  rationale: La frase indica una relación igual sobre ambas partes. «Sobre los dos» preserva la imagen de la mano extendida sobre ambos contendientes y suena natural en español.
theological_decisions:
- issue: Posible lectura de מוֹכִיחַ como «mediador» con resonancia teológica posterior
  english_pob_reading: arbiter
  chosen_spanish_reading: árbitro
  alternative_spanish_readings:
  - mediador
  - intercesor
  rationale: 'El contexto inmediato es el lamento jurídico de Job: falta un tercero que dirima entre los dos. «Árbitro» mantiene esa función judicial sin adelantar una identificación cristológica que el versículo no formula explícitamente. Se preserva así la tensión interpretativa documentada por el POB inglés.'
  doctrine_reference: Primacía del sentido contextual original; mantener la tensión hermenéutica sin resolverla prematuramente.
translation_notes:
  revision_awareness: 'El borrador sigue el estado revisado sin cambios del texto fuente inglés (latest_revision_pass: unchanged=true) y conserva su única nota alternativa sobre מוֹכִיחַ, trasladándola a una nota española equivalente.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» cuando corresponda en el proyecto, pero este versículo no contiene el nombre divino.
  - Se conserva la imagen concreta de «mano» en vez de explicar la metáfora en el texto principal.
  - «Árbitro» se usa como término forense neutral; no se reemplaza por vocabulario eclesiástico.
  - La nota al pie española conserva la alternativa lexical relevante sin introducir nuevas interpretaciones.
