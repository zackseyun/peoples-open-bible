    rationale: 'El hebreo זוּ aporta énfasis relativo, y el inglés lo reflejó con ''he against whom''. En español puede mantenerse mejor como aposición entre comas: ''Yahvé, él contra quien hemos pecado'', que suena más natural sin perder el énfasis.'
