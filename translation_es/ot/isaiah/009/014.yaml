    rationale: נשוא פנים describe a alguien favorecido, elevado o de alta posición. En español neutral, 'hombre de alto rango' o 'hombre respetado' preserva mejor el matiz social que 'honrado', que suele entenderse como moralmente recto.
  revised_spanish_text: El anciano y el hombre de alto rango[a] es la cabeza, y el profeta que enseña mentira[b] es la cola.
