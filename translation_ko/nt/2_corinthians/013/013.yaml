id: 2CO.13.13
reference: '2 Corinthians 13:13'
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ἡ χάρις τοῦ κυρίου Ἰησοῦ Χριστοῦ καὶ ἡ ἀγάπη τοῦ θεοῦ καὶ ἡ κοινωνία τοῦ ἁγίου πνεύματος μετὰ πάντων ⸀ὑμῶν.
base_translation:
  language: en
  yaml_path: translation/nt/2_corinthians/013/013.yaml
  text: The grace of the Lord Jesus Christ[a], and the love of God, and the fellowship of the Holy Spirit[b], be with all of you.
translation:
  language: ko
  text: 주 메시아 예수의 은혜와 하나님의 사랑과 성령의 교제가 여러분 모두와 함께하기를 바랍니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: χάρις
  english_pob_choice: grace
  chosen_korean: 은혜
  lexicon: BDAG
  rationale: 8-9장 일관 유지.
- source_word: τοῦ κυρίου Ἰησοῦ Χριστοῦ
  english_pob_choice: of the Lord Jesus Christ
  chosen_korean: 주 메시아 예수의
  lexicon: BDAG
  rationale: 칭호 보존.
  alternatives_korean:
  - 주 예수 그리스도의
- source_word: ἀγάπη τοῦ θεοῦ
  english_pob_choice: love of God
  chosen_korean: 하나님의 사랑
  lexicon: BDAG
  rationale: 표준.
- source_word: κοινωνία τοῦ ἁγίου πνεύματος
  english_pob_choice: fellowship of the Holy Spirit
  chosen_korean: 성령의 교제
  lexicon: BDAG
  rationale: '삼위적 축복의 세 번째 요소. 「교제」가 정형 등가어. 글로서리 정책 ἐκκλησία→교회와 별개로 κοινωνία는 본문에 따라 변별(8:4 동참함, 13:13 교제).'
- source_word: ἁγίου πνεύματος
  english_pob_choice: Holy Spirit
  chosen_korean: 성령
  lexicon: BDAG
  rationale: 수식어 ἅγιον이 분명히 동반된 곳에서는 「성령」으로 옮긴다는 글로서리 정책에 따라.
theological_decisions:
- issue: '13:13 삼위적 축복'
  chosen_reading: 메시아 예수의 은혜 + 하나님의 사랑 + 성령의 교제 — 세 요소의 평행 구조와 신학적 균형 보존
  alternative_readings:
  - 하나로 합쳐 해석
  rationale: 본문은 그리스도-아버지-성령의 세 격을 평행 구조로 호명한다. 한국어로도 세 속격 구문을 그대로 평행하게 옮겨 본문의 삼위적 구조를 시각적·신학적으로 보존한다. 「~의 은혜 / ~의 사랑 / ~의 교제」 세 평행이 한국어 정형으로 정착되어 있다.
  doctrine_reference: 'DOCTRINE.md §1, §3: preserve theological structure; triadic blessing'
