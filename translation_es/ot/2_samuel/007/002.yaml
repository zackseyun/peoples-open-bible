translation:
  language: es
  text: 'Y el rey dijo a Natán el profeta[a]: «Mira ahora, yo habito en una casa de cedro, pero el arca de Dios habita dentro de cortinas».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «dentro de una cortina»; el término hebreo puede referirse a una cortina o colgadura de tienda, probablemente evocando los revestimientos del tabernáculo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And ... said
  chosen_spanish: Y ... dijo
  alternatives_spanish:
  - Entonces ... dijo
  - Y ... habló
  lexicon: WLC/HALOT
  rationale: La forma wayyiqtol avanza la narración; «Y ... dijo» conserva el flujo hebreo sin añadir matices causales o conclusivos que el texto no exige.
- source_word: הַמֶּלֶךְ
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - el monarca
  - el soberano
  lexicon: WLC/HALOT
  rationale: El hebreo usa el título definido sin nombrar a David; «el rey» es la equivalencia natural y fiel al dato gramatical.
- source_word: נָתָן הַנָּבִיא
  english_pob_choice: Nathan the prophet
  chosen_spanish: Natán el profeta
  alternatives_spanish:
  - Natán, el profeta
  lexicon: WLC/HALOT
  rationale: Se conserva el nombre propio transliterado y el título en aposición, como en el hebreo.
- source_word: רְאֵה נָא
  english_pob_choice: See now
  chosen_spanish: Mira ahora
  alternatives_spanish:
  - Mira, por favor
  - Mira pues
  lexicon: WLC/HALOT
  rationale: El imperativo con נָא funciona como llamado de atención; «Mira ahora» mantiene la urgencia suave sin sobretraducirlo como ruego.
- source_word: אָנֹכִי
  english_pob_choice: I
  chosen_spanish: yo
  alternatives_spanish:
  - yo mismo
  lexicon: WLC/HALOT
  rationale: El pronombre independiente aporta énfasis, pero en español la simple presencia de «yo» basta para conservarlo de modo natural.
- source_word: יוֹשֵׁב
  english_pob_choice: dwell / dwells
  chosen_spanish: habito / habita
  alternatives_spanish:
  - moro / mora
  - vivo / vive
  lexicon: WLC/HALOT
  rationale: «Habitar» suena digno y natural en contraste con la morada del arca; evita un calco de «sentarse» y mantiene la idea de residencia.
- source_word: בְּבֵית אֲרָזִים
  english_pob_choice: in a house of cedar
  chosen_spanish: en una casa de cedro
  alternatives_spanish:
  - en una casa de cedros
  - en una casa de madera de cedro
  lexicon: WLC/HALOT
  rationale: El constructo expresa una casa hecha de cedro o revestida de cedro; en español «casa de cedro» reproduce bien la imagen y suena más natural que pluralizar «cedros».
- source_word: וַאֲרוֹן הָאֱלֹהִים
  english_pob_choice: but the ark of God
  chosen_spanish: pero el arca de Dios
  alternatives_spanish:
  - y el arca de Dios
  lexicon: WLC/HALOT
  rationale: 'La conjunción es adversativa por contraste discursivo: la casa de David frente a la morada humilde del arca. «Pero» refleja ese giro mejor que un simple «y».'
- source_word: בְּתוֹךְ הַיְרִיעָה
  english_pob_choice: within curtains
  chosen_spanish: entre cortinas
  alternatives_spanish:
  - dentro de cortinas
  - dentro de un cortinaje
  - dentro de una cortina
  lexicon: WLC/HALOT
  rationale: El término יְרִיעָה puede referirse colectivamente a las lonas/cortinas del santuario; «entre cortinas» preserva la referencia cultual sin forzar singularidad ni añadir «tienda» en el texto principal.
theological_decisions:
- issue: Ubicación del arca y lenguaje cultual
  english_pob_reading: Rendered concretely as the ark dwelling within curtains, preserving the tabernacle-like provisional setting without importing later temple theology.
  chosen_spanish_reading: «el arca de Dios habita entre cortinas», manteniendo el carácter provisional y cultual del lugar sin expandirlo a «templo» ni a una reconstrucción más explícita que el hebreo no da.
  alternative_spanish_readings:
  - «el arca de Dios habita en una tienda»
  - «el arca de Dios habita dentro de una cortina»
  rationale: El hebreo nombra una יריעה, relacionada con cortinas/lonas del santuario. La redacción española conserva esa tensión concreta y evita resolverla demasiado pronto hacia una sola imagen.
  doctrine_reference: Translation philosophy §§1, 5
translation_notes:
  revision_awareness: La base inglesa fue revisada de «within the tent curtain» a «within curtains» para reflejar con más naturalidad el colectivo hebreo; la versión española sigue esa corrección y la expresa con «entre cortinas», sin añadir especificaciones no presentes en el texto fuente.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como término por defecto para el nombre divino, pero en este versículo el hebreo usa אֱלֹהִים, por lo que corresponde «Dios».
  - Se usa «habita» para ambos verbos יוֹשֵׁב a fin de conservar el contraste de moradas sin introducir diferencias inexistentes.
  - «Natán el profeta» sigue el patrón apuesto del original y la tradición de la POB en nombres propios con título.
