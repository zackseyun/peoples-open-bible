translation:
  language: es
  text: 'Y sucedió que, al verla[a], rasgó sus vestidos y dijo: «¡Ay, hija mía! Me has abatido muchísimo, y has venido a ser causa de mi aflicción. Porque he abierto mi boca a Yahvé, y no puedo volver atrás».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de forma más explícita: «He hecho un voto a Yahvé». El hebreo dice literalmente: «he abierto mi boca a Yahvé».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִרְאוֹתוֹ / al verla
  english_pob_choice: And when he saw her
  chosen_spanish: al verla
  alternatives_spanish:
  - cuando la vio
  - y cuando la vio
  lexicon: HALOT
  rationale: La construcción temporal hebrea se expresa con naturalidad en español como una subordinada temporal. Se mantiene el objeto directo femenino explícito para reflejar el texto fuente y la acción inmediata.
- source_word: וַיִּקְרַע אֶת־בְּגָדָיו
  english_pob_choice: he tore his clothes
  chosen_spanish: rasgó sus vestidos
  alternatives_spanish:
  - rasgó sus ropas
  - desgarró sus vestidos
  lexicon: HALOT
  rationale: El hebreo usa el idiomático gesto de duelo o profundo dolor. «Vestidos» conserva el registro más digno y bíblico; «rasgó» refleja היטב el verbo קרע sin sonar excesivamente moderno.
- source_word: אֲהָהּ
  english_pob_choice: Alas
  chosen_spanish: ¡Ay!
  alternatives_spanish:
  - ¡Ah!
  - ¡Oh, no!
  lexicon: HALOT
  rationale: Es una interjección de lamento. «¡Ay!» comunica dolor y queja en español de forma natural y solemne.
- source_word: בִּתִּי
  english_pob_choice: my daughter
  chosen_spanish: hija mía
  alternatives_spanish:
  - mi hija
  lexicon: HALOT
  rationale: El vocativo con sufijo posesivo se vierte de manera directa como apelación afectiva. «Hija mía» conserva mejor el tono de lamento que una frase más neutra.
- source_word: הַכְרֵעַ הִכְרַעְתִּנִי
  english_pob_choice: You have brought me very low
  chosen_spanish: Me has abatido muchísimo
  alternatives_spanish:
  - Me has humillado muchísimo
  - Me has derribado por completo
  lexicon: HALOT
  rationale: La intensificación del infinitivo absoluto más verbo pide una traducción que conserve fuerza sin volver el español forzado. «Abatido» recoge la idea de ser rebajado o derribado en sentido emocional; «muchísimo» transmite la intensificación.
- source_word: וְאַתְּ הָיִיתְ בְּעֹכְרָי
  english_pob_choice: and you have become the cause of my trouble
  chosen_spanish: y has venido a ser causa de mi aflicción
  alternatives_spanish:
  - y te has convertido en mi perturbadora
  - y has sido quien me trae problemas
  lexicon: HALOT
  rationale: עכר expresa causar trouble/aflicción, no necesariamente culpa moral. «Causa de mi aflicción» preserva la carga dolorosa sin endurecer innecesariamente la acusación.
- source_word: וְאָנֹכִי פָּצִיתִי פִי אֶל־יְהוָה
  english_pob_choice: For I have opened my mouth to Yahweh
  chosen_spanish: Porque he abierto mi boca ante Yahvé
  alternatives_spanish:
  - Porque he abierto mi boca a Yahvé
  - Porque he pronunciado mi palabra ante Yahvé
  - Porque he hecho un voto a Yahvé
  lexicon: HALOT
  rationale: Se conserva la imagen literal hebrea «abrir la boca», que la POB inglesa mantuvo por su solemnidad, pero en español se ajusta con «ante Yahvé» para expresar correctamente la dirección del acto. Se evita convertirlo en interpretación explícita en el texto principal.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  lexicon: HALOT
  rationale: El Tetragrámaton se translitera como «Yahvé» conforme al criterio del proyecto, en vez de sustituirlo por un título.
- source_word: וְלֹא אוּכַל לָשׁוּב
  english_pob_choice: and I cannot turn back
  chosen_spanish: y no puedo volver atrás
  alternatives_spanish:
  - y no puedo retractarlo
  - y no puedo deshacerlo
  lexicon: HALOT
  rationale: שוב aquí comunica retroceder o desandar lo dicho. «Volver atrás» es la equivalencia española más natural y conserva la idea de imposibilidad de retractarse.
theological_decisions:
- issue: Si el texto debe explicitar el contenido del acto de Jefté como voto
  english_pob_reading: Retain the Hebrew idiom 'I have opened my mouth to Yahweh' and let the context imply the vow.
  chosen_spanish_reading: Mantener «he abierto mi boca ante Yahvé» y dejar que el contexto indique el voto.
  alternative_spanish_readings:
  - He hecho un voto a Yahvé
  - Le he dado mi palabra a Yahvé
  rationale: El contexto narrativo ya presenta el voto de Jefté; por eso conviene conservar la frase hebrea literal, que es solemne y auditable. La explicación explícita queda para nota, no para el cuerpo del versículo.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Cómo expresar la intensidad de la queja de Jefté hacia su hija
  english_pob_reading: You have brought me very low, and you have become the cause of my trouble.
  chosen_spanish_reading: Me has abatido muchísimo, y has venido a ser causa de mi aflicción.
  alternative_spanish_readings:
  - Me has destruido
  - Me has arruinado por completo
  rationale: Se preserva el dolor intenso sin atribuir al padre una acusación más fuerte que la del hebreo. «Aflicción» y «abatido» mantienen el campo semántico del sufrimiento y la humillación.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: 'El audit trail inglés muestra acuerdo alto y sin cambios recientes; se conservan las decisiones clave: fórmula temporal narrativa, imagen idiomática de «abrir la boca» y equivalencia prudente para la intensidad del lamento.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para el Tetragrámaton.
  - Se mantiene un registro bíblico natural y digno, evitando el calco excesivo.
  - Se conserva la ambigüedad lexical de «he abierto mi boca» en el texto principal, con aclaración en nota.
  - «Vestidos» y «aflicción» sostienen un tono elevado acorde con el pasaje narrativo-poético.
