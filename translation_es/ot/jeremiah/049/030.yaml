  yaml_path: translation/ot/jeremiah/049/030.yaml
  text: Flee! Wander far away! Dwell deep[a], inhabitants of Hazor, declares Yahweh[b], for Nebuchadnezzar king of Babylon has taken counsel against you and devised a plan against you.
