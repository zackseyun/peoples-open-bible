translation:
  language: es
  text: Escuchen[a], cielos, y hablaré; y oiga la tierra las palabras de mi boca.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Presten atención, cielos ... y oiga la tierra». El hebreo usa formas poéticas elevadas de mandato y apelación.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַאֲזִינוּ
  english_pob_choice: Give ear
  chosen_spanish: ¡Escuchad
  alternatives_spanish:
  - Oíd
  - Prestad atención
  lexicon: HALOT
  rationale: El imperativo en hifil de אזן pide una escucha atenta y solemne. «Escuchad» conserva el tono elevado del llamado poético mejor que una forma más plana, y es natural en español bíblico contemporáneo.
- source_word: הַשָּׁמַיִם
  english_pob_choice: O heavens
  chosen_spanish: cielos
  alternatives_spanish:
  - heavens
  - los cielos
  lexicon: HALOT
  rationale: En el par poético cielo/tierra, «cielos» reproduce el vocativo colectivo de שָׁמַיִם en español. Se evita «heavens» por no ser español; el vocativo queda implícito por la exclamación e invocación inicial.
- source_word: וַאֲדַבֵּרָה
  english_pob_choice: and I will speak
  chosen_spanish: y hablaré
  alternatives_spanish:
  - y hablaré entonces
  - y yo hablaré
  lexicon: HALOT
  rationale: La forma cohortativa expresa intención o resolución. «Hablaré» comunica de manera natural esa determinación futura en español sin añadir matices que el hebreo no exige.
- source_word: וְתִשְׁמַע
  english_pob_choice: and let the earth hear
  chosen_spanish: y oiga
  alternatives_spanish:
  - y que oiga
  - y oirá
  lexicon: HALOT
  rationale: Aunque la forma es imperfecta/jusiva, aquí funciona como apelación volitiva paralela al imperativo dirigido a los cielos. «Oiga» preserva mejor ese valor exhortativo que un simple futuro indicativo.
- source_word: הָאָרֶץ
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra
  - el mundo
  lexicon: HALOT
  rationale: «La tierra» mantiene el paralelismo cielo/tierra y el alcance cósmico del testimonio poético. «Mundo» sería más interpretativo y menos fiel al binomio hebreo.
- source_word: אִמְרֵי
  english_pob_choice: the words
  chosen_spanish: las palabras
  alternatives_spanish:
  - los dichos
  - las expresiones
  lexicon: HALOT
  rationale: אִמְרֵי se refiere a palabras o dichos pronunciados. «Las palabras» es la opción más natural y suficientemente sobria para el español, conservando el peso de la declaración.
- source_word: פִי
  english_pob_choice: of my mouth
  chosen_spanish: de mi boca
  alternatives_spanish:
  - de mi boca
  - que pronunciaré
  lexicon: HALOT
  rationale: 'La construcción posesiva concreta se conserva en español: «de mi boca». Esto mantiene la imagen poética hebrea y evita reducirla a una paráfrasis abstracta.'
theological_decisions:
- issue: El llamado al cielo y a la tierra como testigos poéticos
  english_pob_reading: A poetic summons to the cosmos as witness
  chosen_spanish_reading: Un llamado poético al cosmos para que oiga como testigo
  alternative_spanish_readings:
  - Un mero llamado retórico a todos los oyentes
  - Una personificación sin función testimonial
  rationale: El paralelismo cielo/tierra pertenece al marco solemne de testimonio pactual y profético. La redacción española conserva esa dignidad sin convertirlo en una mera exhortación general ni borrar la función de testigo implícita.
  doctrine_reference: Deuteronomio 32:1; uso pactual del motivo cielo/tierra en la Escritura
translation_notes:
  revision_awareness: La revisión más reciente del inglés indicó que no había cambios necesarios; la presente propuesta sigue de cerca ese estado estable y mantiene la equivalencia óptima con el hebreo, sin introducir ajustes interpretativos adicionales.
  spanish_consistency_notes:
  - Se mantiene «cielos / tierra» para conservar el par poético y su alcance cósmico.
  - Se usa español reverente pero actual, evitando fórmulas arcaicas innecesarias.
  - La nota al pie refleja la alternativa principal del imperativo poético, como en el texto inglés auditado.
