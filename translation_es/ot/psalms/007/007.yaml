  text: ק֘וּמָ֤/ה יְהוָ֨ה בְּ/אַפֶּ֗/ךָ הִ֭נָּשֵׂא בְּ/עַבְר֣וֹת צוֹרְרָ֑/י וְ/ע֥וּרָ/ה אֵ֝לַ֗/י מִשְׁפָּ֥ט צִוִּֽיתָ׀׃
base_translation:
  language: en
  yaml_path: translation/ot/psalms/007/007.yaml
  text: Rise up[a], O Yahweh, in your anger; lift yourself up against the fury of my enemies; awake for me[c][b]; you have appointed judgment.
  footnotes:
  - marker: a
    text: Or 'be exalted against the fury of my enemies.' The Hebrew verb can also carry the sense 'be lifted up' in exaltation.
    reason: lexical_alternative
  - marker: b
    text: Or 'awake to me'—that is, 'awake on my behalf.'
    reason: lexical_alternative
  - marker: c
    text: Or 'the judgment you have commanded.'
    reason: alternative_reading
