    text: O «Yo, Yahvé, he hablado».
    reason: alternative_reading
  revision_rationale: 'Se corrigió el texto para seguir más fielmente el hebreo y la auditoría del POB: se evitó explicitar «de hijos» en el cuerpo principal, trasladándolo a nota; se adoptó «derramamiento de sangre» para el sentido contextual de דָם; se mejoró la naturalidad y el valor semántico de רָעָב con «hambruna»; y se ajustó la preposición inicial a «contra ustedes» para expresar mejor la hostilidad del juicio sin afectar la transición posterior al singular femenino de la ciudad personificada.'
