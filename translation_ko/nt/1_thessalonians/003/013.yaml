id: 1TH.3.13
reference: 1 Thessalonians 3:13
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: εἰς τὸ στηρίξαι ὑμῶν τὰς καρδίας ἀμέμπτους ἐν ἁγιωσύνῃ ἔμπροσθεν τοῦ θεοῦ καὶ πατρὸς ἡμῶν ἐν τῇ παρουσίᾳ τοῦ κυρίου ἡμῶν ⸀Ἰησοῦ μετὰ πάντων τῶν ἁγίων ⸀αὐτοῦ.
base_translation:
  language: en
  yaml_path: translation/nt/1_thessalonians/003/013.yaml
  text: so that he may establish your hearts blameless in holiness before our God and Father at the coming of our Lord Jesus with all his holy ones[a].
  footnotes:
  - marker: a
    text: Or 'with all his saints.' The Greek 'holy ones' may refer to holy people, angels, or both in this context.
    reason: alternative_reading
translation:
  language: ko
  text: 그리하여 우리 주 예수께서 그분의 모든 거룩한 자들[a]과 함께 오실 때에, 여러분의 마음이 우리 하나님 아버지 앞에서 거룩함 가운데 흠 없이 굳건히 서게 하시기를 빕니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「모든 성도들」. 헬라어 「거룩한 자들」은 본 문맥에서 거룩한 사람들, 천사들, 혹은 둘 다를 가리킬 수 있다.
    reason: alternative_reading
lexical_decisions:
- source_word: στηρίξαι ὑμῶν τὰς καρδίας
  english_pob_choice: establish your hearts
  chosen_korean: 여러분의 마음이 ... 굳건히 서게 하시기를
  alternatives_korean:
  - 여러분의 마음을 견고히 세워 주시기를
  - 여러분의 심령을 굳건하게 하시기를
  lexicon: BDAG
  rationale: στηρίζω의 「확고히 세움」. 3:2의 동일 어휘와 일관성 유지.
- source_word: ἀμέμπτους ἐν ἁγιωσύνῃ
  english_pob_choice: blameless in holiness
  chosen_korean: 거룩함 가운데 흠 없이
  alternatives_korean:
  - 거룩하고 흠 없이
  - 거룩 속에서 책망 받을 일 없이
  lexicon: BDAG
  rationale: ἁγιωσύνη의 처소격 「거룩함 가운데서」를 보존한다.
- source_word: ἐν τῇ παρουσίᾳ τοῦ κυρίου ἡμῶν Ἰησοῦ
  english_pob_choice: at the coming of our Lord Jesus
  chosen_korean: 우리 주 예수께서 ... 오실 때에
  alternatives_korean:
  - 우리 주 예수의 임재 때에
  - 우리 주 예수의 재림 때에
  lexicon: BDAG
  rationale: παρουσία를 한국어 종결 「오실 때」로 자연스럽게 풀어내며 종말론적 강림의 함의를 보존한다. 2:19에서는 「임재」를 채택했으나 본 절은 모든 거룩한 자들과 함께 오시는 정황이 명확히 종말론적이므로 「오실 때」로 옮긴다. 자세한 정책은 theological_decisions 참조.
- source_word: τῶν ἁγίων αὐτοῦ
  english_pob_choice: his holy ones
  chosen_korean: 그분의 모든 거룩한 자들
  alternatives_korean:
  - 그분의 모든 성도들
  - 그분의 모든 거룩한 이들
  lexicon: BDAG
  rationale: 「거룩한 자들」이 천사·성도 양쪽 모두에 열려 있는 헬라어 어휘의 의미를 그대로 보존한다. 「성도」는 본 번역에서 ἅγιοι의 신자 호칭에 주로 사용되므로 본 절에서는 어휘 폭을 살린 「거룩한 자들」을 택한다.
theological_decisions:
- issue: παρουσία의 한국어 선택 — 본 절에서는 「오실 때」
  chosen_reading: 우리 주 예수께서 그분의 모든 거룩한 자들과 함께 오실 때에
  alternative_readings:
  - 우리 주 예수의 임재 때에
  - 우리 주 예수의 재림 때에
  rationale: 본 절은 거룩한 자들과 함께 오시는 정황이 명확히 종말론적 강림을 가리키므로, 동사화 「오실 때」로 옮겨 본문의 흐름을 자연스럽게 살린다. 2:19의 「임재」와 4:15·5:23의 「재림」 사이에서, 본 절은 동사형 표현이 헬라어 명사 παρουσία의 사건성과 한국어 자연성을 함께 담는다.
  doctrine_reference: 'KOREAN_PIPELINE.md Glossary — παρουσία case-by-case'
- issue: τῶν ἁγίων αὐτοῦ의 지시 대상
  chosen_reading: 모든 거룩한 자들
  alternative_readings:
  - 모든 천사들
  - 모든 성도들
  - 천사들과 성도들 모두
  rationale: 헬라어 「거룩한 자들」은 본 종말론적 강림 정황에서 천사(다른 NT 본문 참조)와 거룩하게 된 성도 양쪽 모두를 가리킬 수 있다. 본 번역은 어휘 자체를 보존하고 두 가능성을 각주로 둔다.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
