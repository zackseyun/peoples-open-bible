translation:
  language: es
  text: Ahora bien, en el primer año, cuando Ciro reinaba sobre la tierra de Babilonia, el rey Ciro escribió para edificar esta casa[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el rey Ciro emitió una orden de que esta casa fuera edificada». El griego dice literalmente «escribió ... para edificar esta casa», y en contexto se trata de una orden real por escrito.'
    reason: lexical_alternative
  - marker: b
    text: «Esta casa» se refiere al templo en Jerusalén.
    reason: cross_reference
lexical_decisions:
- source_word: ἐν δὲ τῷ πρώτῳ ἔτει
  english_pob_choice: Now in the first year
  chosen_spanish: Ahora, en el primer año
  alternatives_spanish:
  - Y en el primer año
  - En el primer año
  lexicon: LSJ
  rationale: Ἐν con dativo marca tiempo, y δέ aporta una transición leve. «Ahora» conserva el giro discursivo sin forzar una oposición que el griego no expresa.
- source_word: βασιλεύοντος Κύρου
  english_pob_choice: of Cyrus reigning
  chosen_spanish: de Ciro, que reinaba
  alternatives_spanish:
  - del reinado de Ciro
  - cuando Ciro reinaba
  lexicon: LSJ
  rationale: El genitivo absoluto pide una construcción temporal con fuerza verbal. «Que reinaba» reproduce esa acción en curso de manera natural en español.
- source_word: χώρας Βαβυλωνίας
  english_pob_choice: over the land of Babylonia
  chosen_spanish: sobre la tierra de Babilonia
  alternatives_spanish:
  - sobre la tierra de Babilonia
  - en la tierra de Babilonia
  - sobre Babilonia
  lexicon: LSJ
  rationale: χώρα se refiere a territorio o tierra, no a la ciudad. «Babilonia» mantiene el nombre territorial en un español bíblico comprensible, y «sobre» conserva el matiz de dominio real.
- source_word: ἔγραψεν
  english_pob_choice: wrote
  chosen_spanish: escribió
  alternatives_spanish:
  - escribió un decreto
  - emitió un decreto
  - redactó
  lexicon: LSJ
  rationale: El verbo griego es simplemente «escribió». Se evita introducir «decreto» en el texto principal, porque la idea administrativa proviene del contexto, no de una palabra explícita del verso.
- source_word: βασιλεὺς Κῦρος
  english_pob_choice: King Cyrus
  chosen_spanish: el rey Ciro
  alternatives_spanish:
  - rey Ciro
  - Ciro, el rey
  lexicon: LSJ
  rationale: El orden nombre-título es natural en español y conserva la designación real sin añadir énfasis extra.
- source_word: οἰκοδομῆσαι
  english_pob_choice: to build
  chosen_spanish: para edificar
  alternatives_spanish:
  - para construir
  - para levantar
  lexicon: LSJ
  rationale: El infinitivo expresa el contenido de la orden escrita. «Edificar» reproduce bien el registro bíblico y el sentido de construir un edificio sagrado.
- source_word: τὸν οἶκον τοῦτον
  english_pob_choice: this house
  chosen_spanish: esta casa
  alternatives_spanish:
  - este templo
  - la casa
  lexicon: LSJ
  rationale: οἶκος significa literalmente «casa». Se mantiene la imagen original en el texto principal; el referente al templo se entiende por el contexto y no se introduce como glosa en el cuerpo del versículo.
theological_decisions:
- issue: Referente de «esta casa»
  english_pob_reading: the phrase is left as 'this house' rather than expanded to 'this temple' in the main text
  chosen_spanish_reading: se mantiene «esta casa» en el texto principal, sin expandir a «este templo»
  alternative_spanish_readings:
  - este templo
  rationale: El griego usa οἶκος. El contexto de Esdras/Esdras griego hace claro que se trata del templo, pero la traducción conserva el idiomático «casa» para respetar el término fuente y la tensión léxica documentada.
  doctrine_reference: Translation philosophy §§1, 5
- issue: Fuerza de la acción real
  english_pob_reading: render ἔγραψεν with the simple verb 'wrote' rather than the interpretive 'issued a decree'
  chosen_spanish_reading: se traduce ἔγραψεν con «escribió» y no con una formulación interpretativa como «emitió un decreto»
  alternative_spanish_readings:
  - emitió un decreto
  - expidió un decreto
  rationale: El texto griego describe un acto escrito real, pero no usa un sustantivo para «decreto». La versión española evita intensificar el término más allá de lo que el griego afirma explícitamente.
  doctrine_reference: Translation philosophy §1
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del expediente inglés, que prefirió una formulación más cercana al infinitivo οἰκοδομῆσαι («para edificar») frente a una paráfrasis con «debería ser construida».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se conserva «casa» en lugar de «templo» en el texto principal, siguiendo la decisión auditada de respetar οἶκος.
  - Se usa «escribió» para ἔγραψεν, evitando un término jurídico más fuerte que el griego no explicita.
  - La puntuación y el orden buscan sonar naturales en español sin perder la secuencia temporal del griego.
