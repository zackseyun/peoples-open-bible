    issue: La nota [b] parafrasea demasiado la lectura alternativa
    rationale: El POB inglés dice «Or 'Shall we together rest in the dust?'» y explica que el sustantivo puede entenderse como «descent» o «rest». La nota española «¿Descenderemos juntos para descansar en el polvo?» mezcla ambas lecturas y añade «para», lo que desdibuja la alternativa textual.
  - severity: low
    issue: «Barras del Seol» suena menos natural que «cerrojos del Seol»
    rationale: Aunque «barras» es defendible, en español «cerrojos» evoca con más claridad puertas cerradas o confinamiento, en línea con la explicación de la nota y la imagen del inframundo encarcelante.
