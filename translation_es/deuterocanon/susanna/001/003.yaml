lexical_decisions:
- source_word: σφόδρα
  english_pob_choice: greatly
  chosen_spanish: grandemente
  alternatives_spanish:
  - muy
  - sobremanera
  lexicon: LSJ
  rationale: El adverbio intensifica la cualidad implícita del contexto anterior. «Grandemente» conserva esa fuerza intensificadora sin añadir contenido nuevo; «muy» sería más natural, pero menos marcado; «sobremanera» suena más literario y más intenso de lo que pide el griego.
- source_word: φοβουμένη
  english_pob_choice: fearing
  chosen_spanish: temiendo
  alternatives_spanish:
  - reverenciando
  - temiendo reverentemente
  lexicon: BDAG
  rationale: El participio expresa temor/reverencia hacia Dios. «Temiendo» mantiene el vínculo léxico con φοβέομαι y deja que el objeto «al Señor» delimite el sentido religioso sin paraphrasear.
- source_word: κύριον
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - el Señor
  - el Dueño
  lexicon: BDAG
  rationale: En este contexto de referencia a Dios, «Señor» es el equivalente natural en español y preserva la reverencia del término griego κύριος. No se usa «Yahvé» porque el texto fuente griego no trae el nombre divino explícito aquí.
- source_word: γονεῖς
  english_pob_choice: parents
  chosen_spanish: sus padres
  alternatives_spanish:
  - su padre y su madre
  lexicon: LSJ
  rationale: El plural designa a ambos progenitores colectivamente. «Sus padres» es idiomático, claro y exacto.
- source_word: δίκαιοι
  english_pob_choice: righteous
  chosen_spanish: justos
  alternatives_spanish:
  - rectos
  - piadosos
  lexicon: BDAG
  rationale: En español bíblico, «justos» conserva la carga moral y relacional del término sin reducirlo a un matiz meramente forense. «Rectos» es posible, pero pierde parte del peso teológico habitual del vocabulario bíblico.
- source_word: ἐδίδαξαν
  english_pob_choice: taught
  chosen_spanish: enseñaron
  alternatives_spanish:
  - instruyeron
  - educaron
  lexicon: BDAG
  rationale: El aoristo indica una acción concreta de impartir instrucción. «Enseñaron» es directo y fiel; «instruyeron» sería más técnico, pero menos natural en español.
- source_word: θυγατέρα
  english_pob_choice: daughter
  chosen_spanish: a su hija
  alternatives_spanish:
  - a su hija
  - a la hija de ellos
  lexicon: LSJ
  rationale: El sustantivo familiar se expresa de forma natural con el posesivo correspondiente. Mantiene explícita la relación familiar del texto griego.
- source_word: κατὰ τὸν νόμον Μωυσῆ
  english_pob_choice: according to the law of Moses
  chosen_spanish: conforme a la ley de Moisés
  alternatives_spanish:
  - según la ley de Moisés
  - de acuerdo con la ley de Moisés
  lexicon: BDAG
  rationale: La preposición κατά con acusativo expresa conformidad con una norma. «Conforme a» es formal, fiel y fluido en español bíblico contemporáneo.
theological_decisions:
- issue: Renderización de κύριος en referencia a Dios
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - Señor
  - Yahvé
  rationale: El griego usa κύριον, no el tetragrámaton. Por eso se mantiene una referencia reverente a Dios con «Señor», sin trasladar el texto a «Yahvé» donde la fuente inmediata no lo explícita.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Valor moral de δίκαιοι aplicado a los padres
  english_pob_reading: righteous
  chosen_spanish_reading: justos
  alternative_spanish_readings:
  - rectos
  - piadosos
  rationale: «Justos» conserva el sentido ético-covenantal del adjetivo y su resonancia bíblica, evitando una reducción a mera corrección social o legal.
  doctrine_reference: 'DOCTRINE.md Contested terms: δικαιοσύνη family default ''righteousness'' / ''justice'' with context-sensitive documentation'
translation_notes:
  revision_awareness: La versión inglesa revisada cambió «very much» por «greatly» y un punto por punto y coma para reflejar mejor la unión sintáctica griega. La versión española sigue esa lectura conexa con una primera cláusula adverbial breve y un punto y coma antes de la caracterización de los padres y su instrucción.
  spanish_consistency_notes:
  - Se mantiene «Señor» para κύριος conforme al uso doctrinal del proyecto y al contexto griego.
  - Se traduce δίκαιοι como «justos» para conservar el matiz bíblico-moral.
  - No se introduce «Yahvé» porque el texto fuente aquí es griego y no cita explícitamente el nombre divino hebreo.
  - La puntuación con punto y coma refleja que la primera expresión sigue a la cláusula anterior, como en el audit trail inglés.
