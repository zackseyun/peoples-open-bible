  text: 'Y los hijos de Coat, por sus clanes: Amram, Izhar, Hebrón y Uzziel.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וּבְנֵי
  english_pob_choice: And the sons of
  chosen_spanish: Y los hijos de
  alternatives_spanish:
  - Y los descendientes de
  - Ahora bien, los hijos de
  lexicon: HALOT
  rationale: בְּנֵי es el constructo plural de ‘hijos de’. En un contexto genealógico puede abarcar tanto hijos directos como descendientes; aquí se mantiene ‘hijos de’ porque conserva la forma hebrea y resulta natural en español. Se usa ‘Y’ para reproducir la continuidad de la lista.
- source_word: קְהָת
  english_pob_choice: Kohath
  chosen_spanish: Coat
  alternatives_spanish:
  - Kohat
  - Cohat
  lexicon: HALOT
  rationale: Nombre propio tradicionalmente castellanizado. ‘Coat’ es la forma más reconocible en español bíblico y mantiene la identificación del personaje.
- source_word: לְמִשְׁפְּחֹתָם
  english_pob_choice: by their clans
  chosen_spanish: por sus clanes
  alternatives_spanish:
  - según sus clanes
  - por sus familias
  lexicon: HALOT
  rationale: מִשְׁפָּחָה designa una subdivisión social de tipo clan/familia dentro de Israel. ‘Clanes’ conserva ese valor técnico mejor que ‘familias’, que puede sonar más doméstico. ‘Por’ refleja el sentido distributivo de לְ en esta lista.
- source_word: עַמְרָם
  english_pob_choice: Amram
  chosen_spanish: Amram
  alternatives_spanish:
  - Amrán
  lexicon: HALOT
  rationale: Nombre propio transliterado de forma estándar en español bíblico.
- source_word: וְיִצְהָר
  english_pob_choice: Izhar
  chosen_spanish: Izhar
  alternatives_spanish:
  - Izar
  lexicon: HALOT
  rationale: Nombre propio transliterado; se omite una conjunción explícita en español porque la coordinación ya queda clara en la enumeración.
- source_word: חֶבְרוֹן
  english_pob_choice: Hebron
  chosen_spanish: Hebrón
  alternatives_spanish:
  - Hebron
  lexicon: HALOT
  rationale: Nombre propio transliterado con acento ortográfico español. Aunque coincide con el topónimo Hebrón, aquí el contexto genealógico indica una persona.
- source_word: וְעֻזִּיאֵל
  english_pob_choice: and Uzziel
  chosen_spanish: y Uziel
  alternatives_spanish:
  - y Uzziel
  lexicon: HALOT
  rationale: Nombre propio transliterado en forma breve y natural en español. Se mantiene la conjunción final ‘y’ para cerrar la lista de manera idiomática.
translation_notes:
  revision_awareness: El texto base en inglés y la revisión más reciente muestran alta concordancia y no requieren cambios sustantivos. La versión española sigue de cerca el hebreo y la auditoría inglesa, ajustando solo la forma idiomática y las convenciones onomásticas del español.
  spanish_consistency_notes:
  - Se usa ‘Coat’ como forma castellanizada del nombre personal קְהָת, coherente con el uso bíblico tradicional en español.
  - Se mantiene ‘clanes’ para מִשְׁפְּחֹתָם por su valor técnico en la estructura social israelita.
  - La lista se resuelve con puntuación simple y sin notas al pie, ya que no hay variantes textuales ni tensiones teológicas relevantes en este versículo.
