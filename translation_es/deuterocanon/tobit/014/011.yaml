base_translation:
  language: en
  yaml_path: translation/deuterocanon/tobit/014/011.yaml
  text: And now[a], children, see what almsgiving does, and how righteousness delivers. And while he was saying these things, his soul departed on the bed. He was a hundred fifty-eight years old[c][b], and he buried him honorably.
  footnotes:
  - marker: a
    text: Or 'justice delivers.' The Greek word can denote either righteousness or justice depending on context.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'his soul failed/left him.' This is a Greek idiom for death.
    reason: lexical_alternative
  - marker: c
    text: 'Some readers may expect ''they buried him honorably,'' but the Greek witness here has a singular verb: ''he buried him honorably.'''
    reason: textual_variant
