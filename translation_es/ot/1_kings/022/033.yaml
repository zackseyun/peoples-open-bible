translation:
  language: es
  text: Y sucedió[a] que, cuando los comandantes de los carros vieron que él no era el rey de Israel, dejaron de perseguirlo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «de tras él»; es un hebraísmo que significa que dejaron de seguirlo o perseguirlo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And it happened
  chosen_spanish: Y aconteció
  alternatives_spanish:
  - Y sucedió
  - Y ocurrió
  - Y fue
  lexicon: HALOT
  rationale: La forma narrativa wayyiqtol introduce el siguiente episodio. «Aconteció» conserva el giro narrativo bíblico sin sonar mecánico, y mantiene el valor de encadenamiento del hebreo.
- source_word: כִּרְאוֹת
  english_pob_choice: when ... saw
  chosen_spanish: cuando ... vieron
  alternatives_spanish:
  - al ver
  - tan pronto como ... vieron
  lexicon: HALOT
  rationale: El infinitivo constructo con כ expresa circunstancia temporal. En español, «cuando ... vieron» comunica de manera natural esa relación temporal sin añadir matices no exigidos por el hebreo.
- source_word: שָׂרֵי הָרֶכֶב
  english_pob_choice: the commanders of the chariots
  chosen_spanish: los comandantes de los carros
  alternatives_spanish:
  - los capitanes de los carros
  - los comandantes de los carros de guerra
  - los jefes de los carros
  lexicon: HALOT
  rationale: שָׂרֵי denota jefes o comandantes militares; הָרֶכֶב puede referirse al conjunto de carros de guerra. «Comandantes de los carros» es claro y cercano al valor militar del contexto, sin introducir una perífrasis más larga que el hebreo no requiere.
- source_word: כִּי לֹא מֶלֶךְ יִשְׂרָאֵל הוּא
  english_pob_choice: that he was not the king of Israel
  chosen_spanish: que él no era el rey de Israel
  alternatives_spanish:
  - que no era el rey de Israel
  - que no se trataba del rey de Israel
  lexicon: HALOT
  rationale: La cláusula da el contenido de lo percibido por los comandantes. Se mantiene el referente personal de הוּא con «él», y «no era el rey de Israel» reproduce de forma directa la identificación negada.
- source_word: וַיָּשׁוּבוּ
  english_pob_choice: they turned back
  chosen_spanish: se volvieron
  alternatives_spanish:
  - volvieron atrás
  - se dieron la vuelta
  - retrocedieron
  lexicon: HALOT
  rationale: שׁוּב en este contexto expresa el giro de abandonar la persecución. «Se volvieron» es idiomático en español y conserva la idea de cambio de dirección sin forzar una interpretación más específica que el texto no exige por sí solo.
- source_word: מֵאַחֲרָיו
  english_pob_choice: from pursuing him
  chosen_spanish: de perseguirlo
  alternatives_spanish:
  - de seguirlo
  - de ir tras él
  - desde detrás de él
  lexicon: HALOT
  rationale: La expresión literal «de detrás de él / de tras él» es un hebraísmo idiomático que aquí significa cesar la persecución. Se opta por «de perseguirlo» para explicitar el sentido contextual reconocido por la POB inglesa, preservando el valor dinámico de la frase.
translation_notes:
  revision_awareness: El inglés POB ya estableció la lectura narrativa y la solución idiomática de מֵאַחֲרָיו como cese de persecución. La propuesta española mantiene esa equivalencia funcional, ajustando el registro a un español bíblico actual y claro, sin introducir cambios de sentido ni tensiones textuales nuevas.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención general del proyecto, pero este versículo no contiene el tetragrámaton.
  - «Comandantes» reproduce el valor militar de שָׂרֵי sin recurrir a «capitanes», que sería posible pero algo más estrecho en español.
  - La nota [a] se ancla en «perseguirlo» para conservar visible el hebraísmo subyacente de «de detrás de él».
