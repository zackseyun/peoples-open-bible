theological_decisions:
- issue: Rendering of sacred times in a denunciation of economic greed
  chosen_reading: Translate both חֹדֶשׁ and שַׁבָּת as recognized religious observances ('new moon' and 'Sabbath') without minimizing their cultic significance.
  alternative_readings:
  - Translate חֹדֶשׁ as 'month' in a purely calendrical sense
  rationale: The verse condemns those who begrudge holy times because they interrupt profit-making. Preserving the cultic sense is important to the prophetic critique and does not import extra doctrine.
  doctrine_reference: Translation philosophy §§1, 6
