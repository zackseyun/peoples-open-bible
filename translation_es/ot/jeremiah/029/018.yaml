review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la agencia divina explícita, el trío de juicio «espada, hambre, peste» y la serie de vergüenza pública. Sin embargo, varias preposiciones y una nota al pie no reflejan con suficiente fidelidad el hebreo ni el rastro auditado en inglés: לְ en la cadena nominal se vierte mejor como predicados coordinados («una maldición, una desolación…») que como «por…»; «para todos los reinos» suena menos preciso que «para/a todos los reinos» pero conviene una formulación más natural con «para todos los reinos de la tierra» unida al predicado; y la nota [a] fue anclada al verbo «perseguiré» cuando en realidad la alternativa léxica documentada corresponde a «horror/terror». También «he arrojado» es más brusco que el hebreo נדח en este contexto; «he expulsado» o «he dispersado» preserva mejor la idea de haberlos echado fuera entre las naciones.'
  spanish_quality_summary: El español es comprensible, pero «por maldición, por desolación, por objeto de silbido» resulta poco idiomático y algo calcado. Una revisión a «una maldición, una desolación, objeto de silbidos…» mejora la fluidez y mantiene el registro digno. «Con el hambre» es menos natural que «con hambre» o mejor «con hambruna», pero «hambre» sigue siendo aceptable; se puede mantener para cercanía formal. «Objeto de silbido» en singular es forzado en español; «objeto de silbidos» comunica mejor la burla pública.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. No aparece el nombre divino en este versículo. Las elecciones principales («espada», «peste», «oprobio») son compatibles con el estilo POB. El ajuste principal es de fidelidad sintáctica y claridad idiomática, no de glosario.
  issues:
  - severity: high
    issue: La nota [a] está anclada a «los perseguiré», pero la alternativa documentada corresponde a «un horror».
    rationale: En el POB inglés la nota a explica לְזַוֲעָה («a horror / a terror»), no וְרָדַפְתִּי («I will pursue»). Mantenerla en el verbo introduce una falsa alternativa léxica.
  - severity: medium
    issue: La serie «por maldición, por desolación, por objeto de silbido y por oprobio» suena antinatural y desdibuja la función predicativa de los sustantivos hebreos.
    rationale: 'Los varios לְ después de «los haré» enumeran lo que llegarán a ser: «una maldición, una desolación, objeto de silbidos y oprobio». «Por» no es la mejor solución en español aquí.'
  - severity: medium
    issue: «Objeto de silbido» en singular es poco idiomático.
    rationale: El sentido es ser blanco de burla expresada por silbidos/bufidos; en español «objeto de silbidos» o «objeto de burla y silbidos» suena más natural sin perder el matiz.
  - severity: medium
    issue: «Adonde los he arrojado» es más violento y menos exacto que la elección auditada «where I have driven them».
    rationale: נדח hiphil aquí enfatiza expulsar/ahuyentar/dispersar. «He expulsado» preserva mejor la acción divina de destierro sin introducir una imagen física de lanzar.
  revised_spanish_text: Y los perseguiré con la espada, con hambre y con peste; y los haré un horror[a] para todos los reinos de la tierra, una maldición, una desolación, objeto de silbidos[b] y oprobio entre todas las naciones adonde los he expulsado.
  revised_footnotes:
  - marker: a
    text: O «un terror». El hebreo puede denotar horror, terror o estremecimiento; aquí describe que llegarán a ser objeto de espanto ante los reinos.
    reason: lexical_alternative
  - marker: b
    text: O «un silbido», es decir, objeto de burla y desprecio expresados con silbidos o chiflidos escarnecedores.
    reason: lexical_alternative
  revision_rationale: La revisión corrige la ubicación de la nota léxica principal, mejora la fidelidad a la sintaxis hebrea y al POB inglés en la serie de predicados nominales, y hace el español más natural sin perder fuerza profética. También sustituye «arrojado» por «expulsado» para reflejar mejor el matiz de exilio forzado.
