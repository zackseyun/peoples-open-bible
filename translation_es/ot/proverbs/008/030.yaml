translation:
  language: es
  text: Entonces yo estaba junto a él[a], como un artífice experto; y yo era su delicia día tras día, alegrándome delante de él en todo tiempo[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘como una criatura pequeña’ (o ‘como una persona fiel’); la palabra hebrea traducida ‘artífice experto’ es difícil y puede tener un matiz distinto.
    reason: alternative_reading
  - marker: b
    text: O ‘jugando delante de él en todo tiempo’.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֶהְיֶה
  english_pob_choice: I was
  chosen_spanish: yo estaba / yo era
  alternatives_spanish:
  - yo llegué a ser
  - yo fui
  lexicon: HALOT
  rationale: El wayyiqtol de היה aquí describe la presencia continua de Sabiduría en la escena. En español, ‘estaba’ funciona mejor para la ubicación relacional, mientras que ‘era’ sostiene la segunda cláusula con naturalidad en el paralelismo.
- source_word: אֶצְלוֹ
  english_pob_choice: beside him
  chosen_spanish: junto a él
  alternatives_spanish:
  - al lado de él
  - con él
  lexicon: HALOT
  rationale: La preposición אצל expresa cercanía o presencia junto a alguien. ‘Junto a él’ conserva la proximidad sin cargarla con una relación más estrecha que la que el hebreo exige.
- source_word: אָמוֹן
  english_pob_choice: like a master workman
  chosen_spanish: como un maestro obrero
  alternatives_spanish:
  - como un artífice
  - como un arquitecto
  - como una criatura pequeña
  lexicon: HALOT
  rationale: אָמֹון es un término difícil y discutido. ‘Maestro obrero’ mantiene la imagen de pericia artesanal que encaja con el contexto creador, sin ocultar que existen otras lecturas posibles.
- source_word: שַׁעֲשֻׁעִים
  english_pob_choice: his delight
  chosen_spanish: su delicia
  alternatives_spanish:
  - su deleite
  - delicia
  lexicon: HALOT
  rationale: El sustantivo expresa aquello que produce gozo o deleite. ‘Su delicia’ reproduce bien el valor relacional implícito en el contexto y suena natural en español bíblico moderno.
- source_word: יוֹם יוֹם
  english_pob_choice: day after day
  chosen_spanish: día tras día
  alternatives_spanish:
  - cada día
  - día por día
  lexicon: HALOT
  rationale: La repetición hebrea indica continuidad reiterada. ‘Día tras día’ transmite esa regularidad de modo idiomático y fiel.
- source_word: מְשַׂחֶקֶת
  english_pob_choice: rejoicing
  chosen_spanish: regocijándome
  alternatives_spanish:
  - jugando
  - alegrándome
  lexicon: HALOT
  rationale: El participio puede referirse a jugar, reír o deleitarse gozosamente. En el contexto poético elevado, ‘regocijándome’ comunica la alegría activa sin trivializar la escena; se preserva la alternativa más literal en nota.
- source_word: לְפָנָיו
  english_pob_choice: before him
  chosen_spanish: delante de él
  alternatives_spanish:
  - en su presencia
  lexicon: HALOT
  rationale: La expresión señala estar en la presencia visible de alguien. ‘Delante de él’ es directo, claro y mantiene la imagen espacial del hebreo.
- source_word: בְּכָל עֵת
  english_pob_choice: at all times
  chosen_spanish: en todo tiempo
  alternatives_spanish:
  - siempre
  - constantemente
  lexicon: HALOT
  rationale: La frase expresa duración sin interrupción. ‘En todo tiempo’ conserva el alcance total de la expresión con un tono bíblico natural.
theological_decisions:
- issue: Sentido de אָמוֹן en el marco de la Sabiduría y la creación
  english_pob_reading: Render Wisdom as 'like a master workman' in the main text while preserving the alternative 'little child' in a footnote.
  chosen_spanish_reading: Traducir en el texto principal ‘como un maestro obrero’ y conservar en nota la alternativa ‘como una criatura pequeña’ o ‘como una persona fiel’ según las posibilidades tradicionales del término.
  alternative_spanish_readings:
  - como una criatura pequeña
  - como una persona fiel
  - como un arquitecto
  rationale: El hebreo es genuinamente ambiguo y no conviene resolverlo dogmáticamente. La lectura principal encaja mejor con el contexto de creación, pero la nota preserva la tensión lexical y teológica que el original permite.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El texto sigue de cerca el paquete fuente hebreo y el rastro auditado en inglés. No se requirieron revisiones posteriores; se mantuvo la ambigüedad de אָמוֹן mediante nota, y se eligieron equivalentes españoles naturales que conservan la imagen poética y la continuidad aspectual del versículo.
  spanish_consistency_notes:
  - Se usa ‘Dios/Yahvé’ según corresponda, pero este versículo no contiene ninguno de esos términos.
  - Se mantiene ‘delante de él’ para לְפָנָיו por coherencia con el estilo POB de transparencia espacial.
  - ‘Regocijándome’ preserva el carácter de participio activo sin convertirlo en una interpretación excesivamente libre.
  - Las notas usan marcadores únicos y aparecen ancladas en el texto principal donde corresponden.
