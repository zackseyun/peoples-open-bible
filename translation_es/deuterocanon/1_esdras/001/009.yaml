translation:
  language: es
  text: Y Jeconías y Samías y Natanael, el hermano[a], y Sabías y Oquielos y Jorám, jefes de mil, dieron a los levitas para la Pascua mil ovejas y setecientos terneros.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego sólo dice «el hermano»; por eso se evita añadir un posesivo que no está en el texto.
    reason: textual_variant
lexical_decisions:
- source_word: Ἰεχονίας
  english_pob_choice: Iechonias
  chosen_spanish: Jeconías
  alternatives_spanish:
  - Ieconías
  - Jeconías
  lexicon: equivalente propio
  rationale: Nombre propio griego transliterado al español de forma natural y reconocible; 'Jeconías' mantiene la relación formal con el nombre bíblico sin forzar una grafía arcaica.
- source_word: Σαμαιας
  english_pob_choice: Samaias
  chosen_spanish: Samías
  alternatives_spanish:
  - Samaías
  - Samaias
  lexicon: equivalente propio
  rationale: El griego transmite un nombre propio semítico helenizado; 'Samías' ofrece una forma española breve y publicable, conservando el valor onomástico sin introducir una pronunciación artificial.
- source_word: Ναθαναὴλ ὁ ἀδελφός
  english_pob_choice: Nathanael the brother
  chosen_spanish: Natanael, el hermano
  alternatives_spanish:
  - Natanael, su hermano
  - Natanael, el hermano de ...
  lexicon: LSJ
  rationale: La revisión inglesa eliminó el posesivo porque el griego sólo dice 'el hermano'. En español también se conserva la indefinición relacional sin añadir un antecedente inexistente en el texto.
- source_word: Σαβίας
  english_pob_choice: Sabias
  chosen_spanish: Sabías
  alternatives_spanish:
  - Sabias
  lexicon: equivalente propio
  rationale: Nombre propio adaptado a ortografía española con acento prosódico natural; el acento gráfico ayuda a la lectura sin alterar la identidad del nombre.
- source_word: Ὀχιηλος
  english_pob_choice: Ochielos
  chosen_spanish: Oquielos
  alternatives_spanish:
  - Ochielos
  - Oquielos
  lexicon: equivalente propio
  rationale: Se mantiene la secuencia vocálica del nombre con una forma española legible. La 'qu' evita una lectura no deseada de la 'ch' en español y conserva una transliteración aproximada.
- source_word: Ἰωρὰμ
  english_pob_choice: Joram
  chosen_spanish: Jorám
  alternatives_spanish:
  - Joram
  lexicon: equivalente propio
  rationale: Nombre propio bíblico ampliamente conocido; el acento se añade para reflejar el patrón prosódico español y distinguirlo en lectura continua.
- source_word: χιλίαρχοι
  english_pob_choice: commanders of thousands
  chosen_spanish: jefes de mil
  alternatives_spanish:
  - comandantes de mil
  - capitanes de mil
  lexicon: LSJ
  rationale: La expresión griega designa literalmente a quienes están sobre mil. 'Jefes de mil' comunica la función jerárquica sin importar un cargo romano posterior ni sonar excesivamente militarizado.
- source_word: ἔδωκαν τοῖς Λευείταις
  english_pob_choice: gave to the Levites
  chosen_spanish: dieron a los levitas
  alternatives_spanish:
  - entregaron a los levitas
  - dieron para los levitas
  lexicon: LSJ
  rationale: Se conserva el verbo simple de transferencia y el destinatario directo. 'Levitas' se escribe en minúscula como nombre de grupo, según uso castellano bíblico corriente.
- source_word: εἰς πάσχα
  english_pob_choice: for the Passover
  chosen_spanish: para la Pascua
  alternatives_spanish:
  - para la Pascua de los judíos
  - para el Passover
  lexicon: LSJ
  rationale: En español bíblico 'Pascua' es la designación natural del festival; 'para' conserva el valor final o de destino del griego sin sobrerinterpretar el matiz cultual.
- source_word: πρόβατα
  english_pob_choice: sheep
  chosen_spanish: ovejas
  alternatives_spanish:
  - ovejas y corderos
  - animales de rebaño
  lexicon: LSJ
  rationale: '''Ovejas'' es la correspondencia más directa y natural en español para πρόβατα. Aunque el término puede abarcar ganado menor, el uso sencillo coincide con la lectura inglesa y evita expansión innecesaria.'
- source_word: μόσχους
  english_pob_choice: calves
  chosen_spanish: terneros
  alternatives_spanish:
  - becerros
  - novillos jóvenes
  - calves
  lexicon: LSJ
  rationale: En español 'terneros' comunica con claridad la referencia a animales jóvenes de ganado vacuno. 'Becerros' también sería posible, pero 'terneros' resulta más transparente para lectores amplios.
theological_decisions:
- issue: Tratamiento del nombre divino implícito/no presente
  english_pob_reading: No divine-name masking issue arises here; the verse is narrative and contains no κύριος or θεός.
  chosen_spanish_reading: No se introduce ninguna sustitución teológica; el verso se traduce narrativamente sin apelaciones divinas.
  alternative_spanish_readings:
  - Ninguna
  rationale: El pasaje es una lista narrativa de oferentes y cantidades. No hay términos que exijan una decisión sobre Yahvé, Mesías o títulos divinos; por tanto, no se fuerza ninguna lectura doctrinal ajena al texto.
  doctrine_reference: None required for this verse
- issue: Relación en 'el hermano'
  english_pob_reading: The English revision deliberately changed 'his brother' to 'the brother' to reflect the Greek more closely without adding an explicit possessive.
  chosen_spanish_reading: Natanael, el hermano
  alternative_spanish_readings:
  - Natanael, su hermano
  - Natanael, el hermano de ...
  rationale: El español puede reproducir la misma ambigüedad controlada del griego. Se evita añadir un posesivo no sustentado y también se evita completar artificialmente la referencia.
  doctrine_reference: None required; textual fidelity issue only
translation_notes:
  revision_awareness: La decisión sigue la revisión inglesa más reciente, que eliminó 'his' para reflejar con mayor precisión ὁ ἀδελφός. El español conserva esa misma contención, manteniendo la referencia relacional sin posesivo añadido. No se siguió mecánicamente el inglés para los nombres propios; se ajustaron a transliteraciones españolas publicables donde la forma española más natural no altera la base onomástica griega.
  spanish_consistency_notes:
  - Se mantiene 'Pascua' como término festivo, coherente con el uso bíblico en español y con el inglés 'Passover'.
  - '''Jefes de mil'' reproduce el valor composicional de χιλίαρχοι sin introducir connotaciones romanas.'
  - Los nombres propios se adaptan a una forma española legible, pero sin reemplazarlos por equivalentes tradicionales cuando eso oscurecería la forma griega del testimonio.
  - '''Levitas'' y las cifras se conservan literalmente, sin armonizarlas con el paralelo hebreo, porque el texto base es el griego.'
