id: ISA.3.26
reference: Isaiah 3:26
source:
  edition: WLC
  text: וְ/אָנ֥וּ וְ/אָבְל֖וּ פְּתָחֶ֑י/הָ וְ/נִקָּ֖תָה לָ/אָ֥רֶץ תֵּשֵֽׁב׃
translation:
  text: And her gates will lament and mourn[a], and she will be stripped bare and sit on the ground.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'emptied' or 'left bare.' The Hebrew verb can convey being cleared out or stripped down.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאָנ֥וּ
  chosen: will lament
  alternatives:
  - will groan
  - will sigh
  lexicon: HALOT
  rationale: From אנה in a lament context; paired with the following אבלו, it denotes audible grieving. 'Will lament' is idiomatic and preserves the poetic personification of the gates.
- source_word: וְאָבְל֖וּ
  chosen: and mourn
  alternatives:
  - and grieve
  lexicon: HALOT
  rationale: אבל commonly denotes mourning, especially in contexts of bereavement or devastation. 'Mourn' fits the parallelism with 'lament' without collapsing the two verbs into one.
- source_word: פְּתָחֶ֑י/הָ
  chosen: her gates
  alternatives:
  - her entrances
  - her doorways
  lexicon: HALOT
  rationale: Though the noun can refer to openings or entrances, in the personified city context 'gates' is the natural English rendering and matches urban imagery in Isaiah.
- source_word: וְנִקָּ֖תָה
  chosen: stripped bare
  alternatives:
  - emptied
  - cleansed
  - made desolate
  lexicon: HALOT
  rationale: The Niphal of נקה here conveys being emptied out or left bare. 'Stripped bare' best fits the image of Zion deprived of adornment and inhabitants in the immediate context, while avoiding an overly interpretive 'desolate' in the main text.
- source_word: לָאָ֥רֶץ
  chosen: on the ground
  alternatives:
  - to the earth
  - to the land
  lexicon: HALOT
  rationale: 'Although ארץ can mean ''earth'' or ''land,'' with ישב in this humiliation scene the idiomatic sense is physical posture: sitting on the ground.'
- source_word: תֵּשֵֽׁב
  chosen: she will sit
  alternatives:
  - she will dwell
  lexicon: HALOT
  rationale: 'ישב can mean sit, dwell, or remain, but the collocation with ''on the ground'' strongly favors the concrete posture of humiliation: ''she will sit.'''
