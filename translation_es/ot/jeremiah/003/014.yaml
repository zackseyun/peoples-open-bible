    rationale: «Declara Yahvé» preserva mejor la solemnidad de נְאֻם y además sigue de cerca la decisión POB auditada.
  - severity: low
    issue: Nota [a] sobretraduce con «Volved de nuevo»
    rationale: שׁוּבוּ ya significa volver/regresar; añadir «de nuevo» en la alternativa no es necesario y puede sonar interpretativo.
  - severity: medium
    issue: «vuestro señor» puede resultar menos preciso que «su amo»
    rationale: Para בעלתי, «amo» transmite mejor la fuerza de master/authority en este contexto; «señor» en español bíblico puede confundirse con título honorífico o con el uso para Dios mismo.
