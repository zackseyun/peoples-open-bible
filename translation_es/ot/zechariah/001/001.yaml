    reason: alternative_reading
  revision_rationale: Se corrige la ubicación y el contenido de la nota para que corresponda al nombre divino YHWH en «Yahvé», conforme a las instrucciones del proyecto y al rastro inglés. También se mejora levemente la naturalidad del español cambiando «En el mes octavo» por «En el octavo mes», sin alterar el sentido ni la estructura formal del original.
