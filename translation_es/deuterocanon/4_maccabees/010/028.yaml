translation:
  language: es
  text: Ahora mira[a], siendo ajeno a Dios[b], haces la guerra contra los que actúan con reverencia hacia Dios[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Mira ahora» o «Ahora, mira».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «estando alejado de Dios» o «estando separado de Dios».'
    reason: lexical_alternative
  - marker: c
    text: 'Lit.: «los que actúan reverentemente hacia Dios».'
    reason: lexical_alternative
lexical_decisions:
- source_word: νῦν ἰδὲ
  english_pob_choice: Now look
  chosen_spanish: Ahora mira
  alternatives_spanish:
  - Mira ahora
  - Ahora, mira
  lexicon: LSJ
  rationale: La combinación introduce una exhortación inmediata y confrontativa. «Ahora mira» conserva la fuerza discursiva con español natural y sin arcaísmo.
- source_word: ἀλλότριος ὢν θεοῦ
  english_pob_choice: being alien to God
  chosen_spanish: estando alejado de Dios
  alternatives_spanish:
  - siendo ajeno a Dios
  - estando alienado de Dios
  - estando separado de Dios
  lexicon: LSJ
  rationale: ἀλλότριος con genitivo expresa pertenencia ajena o extrañeza relacional. En español, «alejado de Dios» comunica la distancia/alienación sin sonar tan técnico como «ajeno» ni más interpretativo que «separado».
- source_word: πολεμεῖς
  english_pob_choice: you are making war against
  chosen_spanish: haces guerra contra
  alternatives_spanish:
  - peleas contra
  - luchas contra
  - haces la guerra contra
  lexicon: LSJ
  rationale: El verbo implica hostilidad activa y lenguaje bélico. «Haces guerra contra» mantiene el campo semántico de guerra sin forzar una perífrasis demasiado pesada.
- source_word: τοὺς εὐσεβοῦντας
  english_pob_choice: those who are reverent toward God
  chosen_spanish: los que son reverentes hacia Dios
  alternatives_spanish:
  - los que actúan con reverencia hacia Dios
  - los piadosos
  - los devotos
  lexicon: LSJ
  rationale: El participio destaca la conducta reverente. «Los que son reverentes hacia Dios» preserva el aspecto verbal y evita reducirlo a una etiqueta más estática.
- source_word: εἰς τὸν θεόν
  english_pob_choice: toward God
  chosen_spanish: hacia Dios
  alternatives_spanish:
  - para con Dios
  - respecto de Dios
  lexicon: LSJ
  rationale: La preposición marca orientación/relación del acto de reverencia. «Hacia Dios» reproduce esa dirección sin añadir la especificación de «adoración» que el griego no exige aquí.
theological_decisions:
- issue: Relational force of ἀλλότριος θεοῦ
  english_pob_reading: being alien to God
  chosen_spanish_reading: estando alejado de Dios
  alternative_spanish_readings:
  - siendo ajeno a Dios
  - estando separado de Dios
  - estando alienado de Dios
  rationale: La frase describe distancia y extrañeza relacional respecto de Dios, no una tesis metafísica. «Alejado de Dios» mantiene la tensión relacional en español claro y auditable.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; readable modern Spanish, not archaic or academic.'
- issue: εύσεβοῦντας and the scope of reverence
  english_pob_reading: those who are reverent toward God
  chosen_spanish_reading: los que son reverentes hacia Dios
  alternative_spanish_readings:
  - los que actúan con reverencia hacia Dios
  - los devotos
  rationale: El griego describe una cualidad/acción reverente dirigida a Dios. En español se evita introducir explícitamente «adorar» o «culto» para no estrechar indebidamente el alcance del participio.
  doctrine_reference: 'DOCTRINE.md: Preserve lexical nuance and avoid importing later theological terminology unless warranted by source.'
translation_notes:
  revision_awareness: 'La base inglesa pasó de una versión más interpretativa («estranged from God», «worship God reverently») a una más cercana al griego («alien to God», «reverent toward God»). La redacción española sigue esa revisión: conserva la relación de extrañeza/alejamiento de ἀλλότριος θεοῦ y el matiz conductual de εὐσεβοῦντας sin añadir la noción de culto explícito.'
  spanish_consistency_notes:
  - Se usa «Dios» de manera consistente para θεοῦ/τὸν θεόν.
  - Se conserva el tono acusatorio directo del imperativo inicial.
  - «Haces guerra contra» mantiene el campo bélico de πολεμεῖς sin suavizarlo a «luchas».
