translation:
  language: es
  text: Así Israel quedó muy empobrecido[a] a causa de Madián, y los hijos de Israel[b] clamaron a Yahvé[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El verbo hebreo puede significar también “quedó muy abatido”, “fue rebajado” o “quedó debilitado”. Aquí se refleja el resultado de la opresión madianita como empobrecimiento y humillación a la vez.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: “los hijos de Israel”, designación pactal y explícitamente masculina en la forma gramatical del texto.'
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: YHWH. El proyecto lo vierte como “Yahvé” para conservar el nombre divino en el texto principal.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּדַּל
  english_pob_choice: became very poor / became very weak
  chosen_spanish: quedó muy empobrecido
  alternatives_spanish:
  - quedó muy abatido
  - quedó muy debilitado
  - fue reducido a gran pobreza
  lexicon: HALOT
  rationale: El verbo hebreo דל puede expresar estar rebajado, debilitado o empobrecido por opresión. En este contexto, el resultado de la presión madianita se entiende bien como una fuerte reducción de recursos y condición; 'empobrecido' recoge la revisión inglesa más reciente y conserva el sentido de quedar muy rebajado sin limitarlo solo a economía.
- source_word: מְאֹד
  english_pob_choice: very
  chosen_spanish: muy
  alternatives_spanish:
  - sumamente
  - grandemente
  - en extremo
  lexicon: HALOT
  rationale: Es un intensificador directo. 'Muy' suena natural en español y preserva la fuerza del adverbio sin elevar el registro innecesariamente.
- source_word: מִפְּנֵי
  english_pob_choice: because of
  chosen_spanish: a causa de
  alternatives_spanish:
  - por causa de
  - debido a
  - por
  lexicon: HALOT
  rationale: En este contexto el valor es causal. 'A causa de' comunica con claridad que la condición de Israel resulta de la opresión de Madián.
- source_word: מִדְיָן
  english_pob_choice: Midian
  chosen_spanish: Madián
  alternatives_spanish:
  - Midian
  lexicon: Nombre propio bíblico
  rationale: Se usa la forma castellana habitual 'Madián', que es clara y reconocible para lectores bíblicos en español.
- source_word: וַיִּזְעֲקוּ
  english_pob_choice: cried out
  chosen_spanish: clamaron
  alternatives_spanish:
  - gritaron
  - alzaron su clamor
  - clamaron pidiendo ayuda
  lexicon: HALOT
  rationale: זעק designa un clamor de angustia o auxilio. 'Clamaron' conserva el tono de súplica urgente y es idiomático en español bíblico sin volverse arcaizante.
- source_word: בְנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos del pueblo de Israel
  lexicon: HALOT
  rationale: Se mantiene la designación hebrea explícita y su forma masculina plural, como marcó el audit trail inglés. 'Los hijos de Israel' es comprensible en español y preserva el eco covenantal del original.
- source_word: אֶל יְהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - a Yahveh
  - al SEÑOR
  lexicon: Convención POB para YHWH
  rationale: El nombre divino יְהוָה se rinde como 'Yahvé' según el estándar del proyecto. La preposición אֶל se expresa con 'a', que es la opción natural con 'clamar a' en español.
theological_decisions:
- issue: Renderización del Tetragrámaton יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - SEÑOR
  rationale: La política del proyecto pide transparentar el nombre divino en lugar de ocultarlo tras una mayúscula litúrgica. 'Yahvé' mantiene la referencia directa al nombre del pacto y es la forma establecida para este registro español.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
- issue: Preservación de la expresión hebrea בְנֵי יִשְׂרָאֵל
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - los hijos del pueblo de Israel
  rationale: Se conserva la formulación masculina plural del hebreo, evitando neutralizarla a 'israelitas'. En este versículo, la forma explícita funciona como designación corporativa del pueblo del pacto.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over gender-neutral'
- issue: Sentido de וַיִּדַּל bajo opresión madianita
  english_pob_reading: became very poor / was brought very low
  chosen_spanish_reading: quedó muy empobrecido
  alternative_spanish_readings:
  - quedó muy abatido
  - fue muy rebajado
  - quedó muy debilitado
  rationale: El hebreo permite una gama que va de 'rebajado' o 'debilitado' a 'empobrecido'. La revisión inglesa reciente favoreció 'very poor'; en español 'empobrecido' comunica la reducción total causada por la opresión sin borrar la tensión semántica del verbo.
  doctrine_reference: HALOT / revisión interna del pasaje
translation_notes:
  revision_awareness: La revisión más reciente del audit trail cambió la idea inglesa de 'very weak' a 'very poor' para reflejar mejor el sentido de estar reducido o empobrecido por la opresión. Esta versión española sigue esa decisión con 'muy empobrecido', manteniendo al mismo tiempo la amplitud semántica del verbo hebreo mediante nota.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma consistente para יְהוָה, conforme al estándar del proyecto.
  - Se mantiene 'los hijos de Israel' por fidelidad al hebreo y por consistencia con la terminología covenantal.
  - El tono es bíblico moderno, sin depender de fórmulas tradicionales que oculten el nombre divino.
  - La puntuación sigue la convención española y el orden de las cláusulas reproduce la relación causal del hebreo.
