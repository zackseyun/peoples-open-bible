    issue: 'Construcción poco natural en español: «ninguna de todas estas cosas tocará al justo».'
    rationale: Aunque es fiel al griego y al énfasis de πάντων, en español suena más natural «nada de todas estas cosas» o «ni una sola de todas estas cosas». La revisión mejora la legibilidad sin pérdida semántica.
  revised_spanish_text: Porque terrible[a] es la destrucción del pecador, y nada de todas estas cosas tocará al justo.
