translation:
  text: For three years the fruit of everything that is eaten shall not be gathered;
    and in the fourth year its fruit shall be gathered, and the firstfruits acceptable
    before the LORD Most High, who created heaven and earth and everything, shall
    be offered up. Let them offer in abundance the first wine and oil as firstfruits
    on the altar of the LORD, who receives it; and what is left over let the servants
    of the house of the LORD eat before the altar that receives it.
