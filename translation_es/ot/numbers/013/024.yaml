  - marker: b
    text: Escol suena al término hebreo para «racimo». El lugar recibió ese nombre por el racimo cortado allí por los hijos de Israel.
    reason: cultural_note
  - marker: c
    text: O «los israelitas» o «los hijos de Jacob».
    reason: lexical_alternative
  revision_rationale: Se ajusta la fórmula de nombramiento a un español más idiomático («se llamó») y se corrige la nota c para que ofrezca alternativas reales en lugar de repetir la lectura principal. El resto del texto preserva fielmente el sentido del hebreo y las decisiones del POB inglés.
