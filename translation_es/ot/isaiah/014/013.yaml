translation:
  language: es
  text: 'Pero tú dijiste en tu corazón: «Subiré a los cielos; levantaré mi trono por encima de las estrellas de Dios, y me sentaré en el monte de la asamblea, en las partes más remotas del norte[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O posiblemente, «en las alturas de Zafón», si צָפוֹן alude a la montaña cósmica conocida en la tradición del antiguo Cercano Oriente.
    reason: alternative_reading
lexical_decisions:
- source_word: וְאַתָּה
  english_pob_choice: But you
  chosen_spanish: Pero tú
  alternatives_spanish:
  - Y tú
  - Y sin embargo, tú
  lexicon: HALOT
  rationale: El valor contrastivo de la conjunción se conserva mejor con «Pero» en un contexto de reprensión profética. «Tú» mantiene el énfasis directo del pronombre.
- source_word: אָמַרְתָּ
  english_pob_choice: said
  chosen_spanish: dijiste
  alternatives_spanish:
  - has dicho
  - decías
  lexicon: HALOT
  rationale: El pasado simple es natural en español y corresponde al tono de acusación retrospectiva del pasaje.
- source_word: בִלְבָבְךָ
  english_pob_choice: in your heart
  chosen_spanish: en tu corazón
  alternatives_spanish:
  - en tu mente
  - para ti mismo
  lexicon: HALOT
  rationale: La expresión hebrea idiomática se vierte de manera transparente en español con «corazón», que en este registro bíblico incluye la interioridad y el pensamiento.
- source_word: הַשָּׁמַיִם
  english_pob_choice: the heavens
  chosen_spanish: los cielos
  alternatives_spanish:
  - el cielo
  - los cielos celestiales
  lexicon: HALOT
  rationale: El plural hebreo se respeta con «los cielos»; «el cielo» perdería la forma plural y suavizaría la elevación del orgullo expresado.
- source_word: אֶעֱלֶה
  english_pob_choice: I will ascend
  chosen_spanish: Subiré
  alternatives_spanish:
  - ascenderé
  - iré hacia arriba
  lexicon: HALOT
  rationale: «Subiré» comunica de forma natural la idea de ascenso y el tono altivo del verbo sin volverlo rebuscado. Se mantiene el futuro del hablante.
- source_word: מִמַּעַל לְכוֹכְבֵי אֵל
  english_pob_choice: above the stars of God
  chosen_spanish: por encima de las estrellas de Dios
  alternatives_spanish:
  - sobre las estrellas de Dios
  - más alto que las estrellas de Dios
  lexicon: HALOT
  rationale: Se conserva la imagen literal y la posible amplitud referencial de «estrellas de Dios» sin aclararla en el texto principal. «Por encima de» expresa bien la relación espacial jerárquica.
- source_word: אָרִים כִּסְאִי
  english_pob_choice: I will raise my throne
  chosen_spanish: levantaré mi trono
  alternatives_spanish:
  - exaltaré mi trono
  - alzaré mi trono
  lexicon: HALOT
  rationale: «Levantaré» reproduce la idea de elevar/exaltar el trono y sugiere autoexaltación. Es idiomático y mantiene la imagen real.
- source_word: וְאֵשֵׁב
  english_pob_choice: and I will sit
  chosen_spanish: y me sentaré
  alternatives_spanish:
  - y habitaré
  - y me instalaré
  lexicon: HALOT
  rationale: Aquí el verbo conserva la imaginería de entronización; «me sentaré» es la forma más natural en español y evita añadir interpretación.
- source_word: בְּהַר מוֹעֵד
  english_pob_choice: on the mount of assembly
  chosen_spanish: en el monte de reunión
  alternatives_spanish:
  - en el monte de asamblea
  - en el monte del encuentro
  lexicon: HALOT
  rationale: «מועֵד» en este contexto se entiende mejor como reunión/convocación. «Monte de reunión» preserva la imagen sin forzar una identificación cultual específica.
- source_word: בְּיַרְכְּתֵי צָפוֹן
  english_pob_choice: in the far reaches of the north
  chosen_spanish: en las partes más remotas del norte
  alternatives_spanish:
  - en los confines del norte
  - en las regiones más apartadas del norte
  - en las alturas de Zafón
  lexicon: HALOT
  rationale: «יַרְכְּתֵי» denota lo más recóndito o extremo; «partes más remotas» lo expresa con claridad. «Norte» conserva el sentido inmediato, mientras la posible alusión a Zafón queda disponible para nota.
theological_decisions:
- issue: Posible alusión de צָפוֹן a Zafón
  english_pob_reading: Translate צָפוֹן as 'the north' in the main text, with a footnote for a possible allusion to Zaphon.
  chosen_spanish_reading: Traducir צָפוֹן como «el norte» en el cuerpo del texto, con nota sobre la posible alusión a Zafón.
  alternative_spanish_readings:
  - «Zafón» en el texto principal
  - «el monte Zafón»
  rationale: El sentido básico de la palabra es direccional y es el más inteligible en español. Mantenerlo en el texto principal preserva la transparencia y deja la posible referencia cosmológica como tensión interpretativa, no como decisión cerrada.
  doctrine_reference: Preservar la tensión teológica y literaria sin resolverla por adelantado.
- issue: Interpretación de 'stars of God'
  english_pob_reading: Retain the literal phrase 'stars of God' without specifying angels or rulers.
  chosen_spanish_reading: Conservar «las estrellas de Dios» sin especificar si alude a astros, seres celestiales o poderes exaltados.
  alternative_spanish_readings:
  - «los astros de Dios»
  - «los seres celestiales de Dios»
  rationale: La frase hebrea puede sostener varias resonancias. La traducción mantiene la literalidad y evita estrechar el alcance simbólico que el texto no explicita.
  doctrine_reference: Preservar la tensión teológica y literaria sin resolverla por adelantado.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto hebreo y coincide con la lectura auditada en inglés: mantiene el contraste inicial, el idiomatismo de interioridad, la pluralidad de «cielos», la imagen de entronización y la ambigüedad controlada de צָפוֹן. No se incorporaron revisiones posteriores ni cambios editoriales en el expediente.'
  spanish_consistency_notes:
  - Se mantiene «Dios» con mayúscula para el sintagma «las estrellas de Dios», conforme al uso bíblico en español y al valor del nombre común en el original.
  - Se usa «cielos» en plural para reflejar el hebreo y evitar la singularización del texto.
  - «Monte de reunión» conserva la imagen de מוֹעֵד sin imponer una lectura litúrgica técnica que el contexto no obliga.
  - La nota al pie se ancla en «norte» porque allí surge la alternativa interpretativa documentada en el expediente inglés.
