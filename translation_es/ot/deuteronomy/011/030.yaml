base_translation:
  language: en
  yaml_path: translation/ot/deuteronomy/011/030.yaml
  text: Are they not beyond the Jordan[a], behind the way of the setting sun, in the land of the Canaanites who dwell in the Arabah, opposite Gilgal[c][b], beside the oaks of Moreh?
  footnotes:
  - marker: a
    text: Or 'across the Jordan.' The Hebrew expression is a geographic idiom whose exact English sense depends on viewpoint.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'after the road of the going in of the sun'; that is, toward the west.
    reason: lexical_alternative
  - marker: c
    text: Or 'the terebinths of Moreh.' The Hebrew term may refer to large trees of either kind.
    reason: lexical_alternative
