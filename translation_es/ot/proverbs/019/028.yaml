    reason: lexical_alternative
  - marker: b
    text: 'O: «se mofa de la sentencia» o «desprecia la justicia».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «la boca de los impíos engulle el mal» o «la falsedad».'
    reason: lexical_alternative
