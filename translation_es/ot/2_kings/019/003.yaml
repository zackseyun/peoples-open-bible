  text: וַ/יֹּאמְר֣וּ אֵלָ֗י/ו כֹּ֚ה אָמַ֣ר חִזְקִיָּ֔הוּ יוֹם צָרָ֧ה וְ/תוֹכֵחָ֛ה וּ/נְאָצָ֖ה הַ/יּ֣וֹם הַ/זֶּ֑ה כִּ֣י בָ֤אוּ בָנִים֙ עַד מַשְׁבֵּ֔ר וְ/כֹ֥חַ אַ֖יִן לְ/לֵדָֽה־־׃
base_translation:
  language: en
  yaml_path: translation/ot/2_kings/019/003.yaml
  text: 'They said to him[a], “Thus says Hezekiah: This day is a day of distress, rebuke, and disgrace, for children have come to the point of birth[c][b], but there is no strength to give birth.”'
  footnotes:
  - marker: a
    text: 'Hebrew: ''children have come to the point of birth.'' The image is of labor reaching the moment of delivery, yet strength failing.'
    reason: cultural_note
  - marker: b
    text: Or 'children have come to the birthstool.' The Hebrew term מַשְׁבֵּר is difficult and may refer more concretely to the place or moment of delivery.
    reason: lexical_alternative
  - marker: c
    text: Or 'contempt' or 'scorn' for 'disgrace.'
    reason: lexical_alternative
