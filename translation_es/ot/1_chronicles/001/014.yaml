lexical_decisions:
- source_word: הַיְבוּסִי
  english_pob_choice: the Jebusites
  chosen_spanish: los jebuseos
  alternatives_spanish:
  - el jebuseo
  lexicon: HALOT
  rationale: El hebreo usa una forma gentilicia singular, pero en listas genealógicas y etnológicas funciona colectivamente como nombre de pueblo. En español, el plural etnónimo es la forma más natural y fiel al valor colectivo del listado.
- source_word: הָאֱמֹרִי
  english_pob_choice: the Amorites
  chosen_spanish: los amorreos
  alternatives_spanish:
  - el amorreo
  lexicon: HALOT
  rationale: Como en el caso anterior, la forma hebrea singular gentilicia designa aquí al pueblo en conjunto. El plural español mantiene el carácter colectivo de la lista y evita una lectura individualizada.
- source_word: הַגִּרְגָּשִׁי
  english_pob_choice: the Girgashites
  chosen_spanish: los gergeseos
  alternatives_spanish:
  - el gergeseo
  lexicon: HALOT
  rationale: Se traduce como etnónimo plural para conservar el paralelo con los demás pueblos enumerados. 'Gergeseos' comunica el referente colectivo con naturalidad en español bíblico.
- source_word: וְאֶת / וְאֵת
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - (marcador de objeto directo sin traducir)
  lexicon: gramática hebrea
  rationale: El hebreo introduce cada elemento con conjunción más marcador de objeto directo; en español no se reproduce el marcador, sino que se expresa la coordinación normal de la enumeración con 'y'.
translation_notes:
  revision_awareness: El texto hebreo y el audit trail inglés están en alta concordancia; no se requieren revisiones textuales ni decisiones doctrinales adicionales. La única cuestión relevante es la equivalencia colectiva de los gentilicios singulares hebreos en una lista de pueblos.
  spanish_consistency_notes:
  - Se mantiene el plural etnónimo en todo el verso para conservar el valor colectivo de la enumeración.
  - No se introduce 'SEÑOR' ni terminología eclesiástica ajena al texto.
  - La puntuación española usa comas y una 'y' final para reflejar la enumeración coordinada.
