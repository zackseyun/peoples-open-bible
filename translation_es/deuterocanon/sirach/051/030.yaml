review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador transmite bien el sentido general del hebreo y del paralelo griego: exhortación a obrar, promesa de recompensa divina, y doxología final a Yahvé. Sin embargo, en el primer hemistiquio ''en justicia'' suena menos natural y menos fiel al matiz ético-teológico de בִצְדָקָה que ''con rectitud'' o ''en rectitud''. Además, la nota al pie está anclada en ''justicia[a]'' pero explica בְּעִתּוֹ / ''en su tiempo'', por lo que el marcador está colocado en el lugar equivocado.'
  spanish_quality_summary: El español es claro y digno, pero requiere una corrección menor de naturalidad y de colocación de nota. 'Hagan su trabajo' es aceptable; 'Bendito sea Yahvé para siempre, y alabado sea su nombre de generación en generación' mejora el paralelismo y la fluidez. El principal problema formal es que la nota debe ir sobre 'en su tiempo[a]' y no sobre 'justicia[a]'.
  glossary_alignment: 'Se alinea bien con ''Yahvé'' para YHWH y con ''recompensa'' para שכר/μισθός. El término צְדָקָה merece mejor ajuste: aunque ''justicia'' es posible, aquí el español eclesial y sapiencial suena más natural con ''rectitud'', preservando el valor ético sin crear una lectura demasiado forense. No hay conflicto doctrinal serio.'
  issues:
  - severity: medium
    issue: Marcador de nota al pie mal ubicado
    rationale: La nota explica בְּעִתּוֹ / ἐν καιρῷ αὐτοῦ ('en su tiempo'), pero el marcador [a] está puesto en 'justicia'. Esto rompe la correspondencia requerida entre texto y nota.
  - severity: low
    issue: '''En justicia'' es poco natural en español en este contexto'
    rationale: Aunque refleja el léxico fuente, en español actual 'hagan su trabajo en justicia' suena forzado. 'Con rectitud' o 'en rectitud' conserva mejor el matiz de צְדָקָה y mejora la legibilidad.
  - severity: low
    issue: El segundo miembro doxológico puede fluir mejor con verbo explícito
    rationale: '''y alabado su nombre'' es entendible, pero ''y alabado sea su nombre'' mantiene mejor el paralelismo con ''Bendito sea'' y suena más natural en español litúrgico moderno.'
  revised_spanish_text: Hagan su trabajo con rectitud, y él les dará su recompensa en su tiempo[a]. Bendito sea Yahvé para siempre, y alabado sea su nombre de generación en generación.
  revised_footnotes:
  - marker: a
    text: También puede entenderse 'a su debido tiempo' o 'en el momento oportuno'; el hebreo בְּעִתּוֹ y el griego ἐν καιρῷ αὐτοῦ pueden referirse al tiempo propio de la recompensa, y algunos entienden el pronombre como referido a Dios más que a la recompensa.
    reason: lexical_alternative
  revision_rationale: Se corrige la ubicación de la nota para que ancle la expresión que realmente explica ('en su tiempo'). Se ajusta 'en justicia' a 'con rectitud' por naturalidad y fidelidad al matiz ético de בִצְדָקָה en español. También se añade 'sea' en la segunda cláusula doxológica para mejorar paralelismo y fluidez sin alterar el sentido.
