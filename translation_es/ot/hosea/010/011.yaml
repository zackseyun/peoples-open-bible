    reason: lexical_alternative
  - marker: b
    text: O, «pero pasé por alto su hermoso cuello». El hebreo de esta cláusula es difícil; el texto principal refleja la idea de que Efraín había sido preservado antes de una carga más pesada.
    reason: alternative_reading
  - marker: c
    text: «Pasará la rastra» se refiere al trabajo posterior al arado para deshacer y alisar el suelo; alternativamente, «desmenuzará los terrones».
    reason: cultural_note
  revision_rationale: Se revisa la cláusula del cuello para reflejar mejor la decisión auditada «spared her fair neck» y su fuerza contextual de haber sido librada de una carga más dura. Se cambia «pondré a Efraín bajo el yugo» por «Unciré a Efraín» por mayor naturalidad y concisión en español, manteniendo el sentido de harness/yoke. Se sustituye «hará el rastreo» por «pasará la rastra», que es una expresión más idiomática y precisa para la labor agrícola mencionada por יְשַׂדֵּד.
