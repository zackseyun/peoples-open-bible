translation:
  language: es
  text: O si lo golpeó con un objeto de madera en la mano[a], con el que se puede causar la muerte, y murió, es un homicida; el homicida ciertamente deberá ser condenado a muerte.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «con un implemento de madera en la mano» o «con un objeto de madera que se pueda empuñar».'
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּכְלִי עֵץ
  english_pob_choice: with a wooden object
  chosen_spanish: con un objeto de madera
  alternatives_spanish:
  - con un implemento de madera
  - con un instrumento de madera
  lexicon: HALOT
  rationale: 'כְּלִי es un término amplio: utensilio, implemento, objeto o arma según el contexto. En esta ley de homicidio, ''objeto de madera'' preserva la amplitud semántica y suena natural en español sin precisar indebidamente el tipo de arma.'
- source_word: יָד
  english_pob_choice: in the hand
  chosen_spanish: en la mano
  alternatives_spanish:
  - de mano
  - que se pueda empuñar con la mano
  lexicon: HALOT
  rationale: La expresión con יָד sugiere algo portátil o empuñable. 'En la mano' conserva la imagen hebrea y corresponde al sentido funcional indicado por el contexto.
- source_word: אֲשֶׁר יָמוּת בּוֹ
  english_pob_choice: by which one could die
  chosen_spanish: por el cual se podría morir
  alternatives_spanish:
  - con el cual se puede morir
  - por el cual una persona podría morir
  lexicon: HALOT
  rationale: La cláusula expresa capacidad letal del objeto, no solo el desenlace del caso. 'Se podría morir' mantiene esa potencialidad en español, aunque resulta menos literal que una traducción mecánica.
- source_word: הִכָּהוּ
  english_pob_choice: he struck him
  chosen_spanish: lo hirió
  alternatives_spanish:
  - lo golpeó
  - lo hirió de un golpe
  lexicon: HALOT
  rationale: Aunque נכה puede ser 'golpear' o 'herir', en este contexto legal la secuencia conduce a la muerte. 'Lo hirió' comunica mejor en español el acto lesivo sin adelantar totalmente el resultado, y sigue siendo compatible con el valor básico del verbo.
- source_word: וַיָּמֹת
  english_pob_choice: and he died
  chosen_spanish: y murió
  alternatives_spanish:
  - y falleció
  - y entonces murió
  lexicon: HALOT
  rationale: Una secuencia directa refleja bien la narración hebrea. 'Murió' es la forma más natural y sobria en español.
- source_word: רֹצֵחַ
  english_pob_choice: murderer
  chosen_spanish: homicida
  alternatives_spanish:
  - asesino
  - murderer
  lexicon: HALOT
  rationale: En español, 'homicida' comunica el carácter culpable del acto y funciona en lenguaje legal sin la carga más interpretativa de 'asesino'. 'Murderer' en inglés se refleja mejor aquí como el término jurídico general de quien mata culpablemente.
- source_word: מוֹת יוּמַת
  english_pob_choice: must surely be put to death
  chosen_spanish: ciertamente morirá
  alternatives_spanish:
  - debe morir
  - será condenado a muerte
  lexicon: HALOT
  rationale: La construcción intensiva hebrea expresa certeza/peso legal. 'Ciertamente morirá' conserva la fuerza enfática y evita añadir una formulación técnica de ejecución que el hebreo no especifica explícitamente.
theological_decisions:
- issue: Clasificación legal de רֹצֵחַ en una ley de homicidio
  english_pob_reading: Rendered as 'murderer' rather than the broader 'killer.'
  chosen_spanish_reading: Traducido como 'homicida' más que como 'matador' o 'asesino'.
  alternative_spanish_readings:
  - asesino
  - matador
  - culpable de homicidio
  rationale: El contexto distingue entre muerte accidental y culpable, por lo que el término debe señalar responsabilidad legal. 'Homicida' mantiene la carga jurídica sin introducir una matización demasiado coloquial o demasiado interpretativa.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: El contexto inglés no introdujo revisiones sustanciales; el resultado final fue confirmado sin cambios. La versión española sigue ese estado estable y conserva las decisiones léxicas principales del audit trail.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se evita 'SEÑOR' y también 'Cristo', porque no aparecen en el texto fuente.
  - Se usa 'homicida' para reflejar la clasificación jurídica; 'asesino' habría intensificado más de lo que el hebreo exige en esta línea específica.
  - La nota al pie preserva la alternativa de 'implemento/objeto' para reflejar la amplitud de כְּלִי sin fijar indebidamente el tipo de arma.
