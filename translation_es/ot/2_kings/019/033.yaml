translation:
  language: es
  text: Por el camino por el que él vino[a], por él volverá, y no vendrá a esta ciudad, declara Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más idiomáticamente: «Por el mismo camino por el que él vino, volverá».'
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּדֶּרֶךְ
  english_pob_choice: by the way
  chosen_spanish: por el camino
  alternatives_spanish:
  - por la vía
  - por la ruta
  - por el camino mismo
  lexicon: HALOT
  rationale: דֶּרֶךְ puede significar 'camino', 'ruta' o 'manera'. En este dicho, 'por el camino' conserva la imagen de la misma ruta recorrida, con un español natural y solemne.
- source_word: אֲשֶׁר
  english_pob_choice: that
  chosen_spanish: por el que
  alternatives_spanish:
  - que
  - por donde
  - por el cual
  lexicon: HALOT
  rationale: La cláusula relativa modifica 'camino'. En español, 'por el que' expresa de forma clara la relación del trayecto con el verbo de venir.
- source_word: יָבֹא
  english_pob_choice: he came
  chosen_spanish: vino
  alternatives_spanish:
  - viene
  - llegó
  - entró
  lexicon: HALOT
  rationale: Aunque la forma verbal hebrea es imperfecta, aquí funciona como referencia retrospectiva al avance del invasor. 'Vino' refleja bien esa perspectiva desde el punto de vista del hablante y encaja con el paralelo de retorno.
- source_word: בָּהּ
  english_pob_choice: by it
  chosen_spanish: por él
  alternatives_spanish:
  - por él mismo
  - por ese mismo camino
  - por allí
  lexicon: HALOT
  rationale: El sufijo femenino remite al 'camino'. En español, 'por él' mantiene la referencia anafórica y suena natural; el antecedente 'camino' permite entender el género concordante del pronombre relativo implícito.
- source_word: יָשׁוּב
  english_pob_choice: he will return
  chosen_spanish: volverá
  alternatives_spanish:
  - regresará
  - retornará
  - volverá atrás
  lexicon: HALOT
  rationale: שׁוּב expresa regresar o volver sobre el mismo trayecto. 'Volverá' es la forma más directa y fiel en español contemporáneo.
- source_word: וְאֶל הָעִיר הַזֹּאת
  english_pob_choice: and he will not come to this city
  chosen_spanish: y no entrará en esta ciudad
  alternatives_spanish:
  - y no vendrá a esta ciudad
  - y no llegará a esta ciudad
  - y no se acercará a esta ciudad
  lexicon: HALOT
  rationale: El hebreo dice literalmente que no vendrá a esta ciudad. En español, 'entrará' comunica mejor el sentido contextual de la amenaza contra la ciudad sin perder la negación del acceso.
- source_word: לֹא יָבֹא
  english_pob_choice: he will not come
  chosen_spanish: no entrará
  alternatives_spanish:
  - no vendrá
  - no llegará
  - no acudirá
  lexicon: HALOT
  rationale: La repetición del verbo de venir en la segunda cláusula puede sonar redundante en español. 'Entrará' conserva la fuerza de la prohibición con una equivalencia idiomática aceptable.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - dice Yahvé
  - oráculo de Yahvé
  - afirma Yahvé
  lexicon: HALOT
  rationale: נְאֻם es fórmula profética solemne; 'declara' mantiene ese registro. יְהוָה se rinde como 'Yahvé' según la terminología del proyecto, preservando el nombre divino.
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton. La política del proyecto en español es verterlo como 'Yahvé', manteniendo el nombre personal divino en lugar de sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'Se corrigió la validación anterior: la nota al pie ahora está anclada en el texto mediante [a], y la redacción principal conserva la relación camino/retorno sin mecanicismo innecesario.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' de forma consistente con la norma del proyecto para יְהוָה.
  - Se evita 'SEÑOR' como sustituto, preservando el nombre divino explícito.
  - '''Entrará'' se usa en la segunda cláusula por claridad idiomática, sin negar el sentido básico de ''venir'' del hebreo.'
