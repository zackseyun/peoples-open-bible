revisions:
- from: 'Sólo bajo esta condición estaremos de acuerdo con ustedes: si llegan a ser como nosotros, al circuncidar a todo varón entre ustedes.'
  to: 'Sólo con esta condición aceptaremos con ustedes[a]: si llegan a ser como nosotros, circuncidando a todo varón entre ustedes.[b]'
  rationale: La revisión mantiene el sentido del hebreo y del POB inglés, pero mejora la naturalidad y precisión del español. «Sólo con esta condición» expresa bien la restricción; «aceptaremos» refleja mejor el consentimiento formal; y «circuncidando» conserva la función instrumental de לְהִמֹּל mejor que «al circuncidar». Se añaden notas para preservar la alternativa léxica y la variante de formulación ya documentadas en el historial inglés.
