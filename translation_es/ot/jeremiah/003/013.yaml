  glossary_alignment: Alineación buena con la terminología del proyecto en «Yahvé» y en no explicitar «dioses» en el texto principal. Debe mantenerse una nota para la alternativa «extraños dioses»/«dioses extraños» porque la auditoría inglesa la conservó. La decisión de traducir שׁמע como mero «escuchar» no sigue bien la rationale auditada, que prioriza la fuerza de obediencia.
