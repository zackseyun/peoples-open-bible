    text: O ‘los heredará’; el verbo hebreo puede llevar también el sentido de heredar o recibir como posesión.
    reason: lexical_alternative
  - marker: b
    text: ‘Yahvé’ traduce el nombre divino YHWH.
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: ‘como esclavos varones y esclavas’; el texto marca explícitamente ambos géneros.'
    reason: lexical_alternative
