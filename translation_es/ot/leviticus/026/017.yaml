revisions:
- from: Y pondré mi rostro contra ustedes[a], y serán derribados delante de sus enemigos; los que los odian dominarán sobre ustedes[c][b], y huirán cuando nadie los persiga.
  to: Y pondré mi rostro contra ustedes[a], y serán derribados delante de sus enemigos; los que los odian gobernarán sobre ustedes, y huirán cuando nadie los persiga[b].
  rationale: 'Se revisa «dominarán sobre ustedes» a «gobernarán sobre ustedes» para ajustarse mejor al matiz documentado de רדה como «rule over» sin sobreinterpretar. Se corrigen y simplifican las notas para que coincidan con el audit trail: la nota cultural se ancla al modismo «mi rostro contra ustedes», y la alternativa léxica se mantiene en la cláusula final sobre huir sin perseguidor. Esto mejora fidelidad, claridad y coherencia editorial.'
  reviewer_model: gpt-5.4
