translation:
  language: es
  text: y maderos de cedro sin número[a], porque los sidonios y los tirios habían traído madera de cedro en abundancia a David.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘madera de cedro’. El hebreo puede referirse en sentido amplio al material de cedro; en este contexto de construcción, probablemente indica madera preparada para obra.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַעֲצֵי אֲרָזִים
  english_pob_choice: and cedar timbers
  chosen_spanish: madera de cedro
  alternatives_spanish:
  - madera de cedro
  - tablones de cedro
  - maderos de cedro
  lexicon: HALOT
  rationale: El hebreo usa עֲצֵי en constructo con אֲרָזִים para un material de cedro, y el contexto de construcción sugiere madera procesada más que árboles en pie. En español, 'madera de cedro' comunica con naturalidad el material sin forzar un tecnicismo que suene artificial.
- source_word: לְאֵין מִסְפָּר
  english_pob_choice: without number
  chosen_spanish: sin número
  alternatives_spanish:
  - sin número
  - sin contar
  - más allá de todo número
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática de innumerabilidad. 'Sin número' conserva la fuerza breve y directa del hebreo y funciona bien en español bíblico contemporáneo.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - porque
  - ya que
  lexicon: HALOT
  rationale: Aquí introduce la razón de la afirmación anterior. 'Porque' expresa con claridad esa relación causal en español, sin añadir matices innecesarios.
- source_word: הֵבִיאוּ
  english_pob_choice: had brought
  chosen_spanish: habían traído
  alternatives_spanish:
  - trajeron
  - habían llevado
  lexicon: HALOT
  rationale: El perfecto hebreo presenta la acción como anterior al estado descrito. El pluscuamperfecto español ('habían traído') mantiene esa relación temporal y la justificación del suministro previo.
- source_word: הַצִּידֹנִים
  english_pob_choice: the Sidonians
  chosen_spanish: los sidonios
  alternatives_spanish:
  - los de Sidón
  - los habitantes de Sidón
  lexicon: HALOT
  rationale: Es el gentilicio plural natural en español para los habitantes de Sidón. Mantiene la concisión del hebreo y el paralelismo con 'los tirios'.
- source_word: וְהַצֹּרִים
  english_pob_choice: and Tyrians
  chosen_spanish: y los tirios
  alternatives_spanish:
  - y los de Tiro
  - y los habitantes de Tiro
  lexicon: HALOT
  rationale: '''Tirios'' es el gentilicio estándar y paralelo a ''sidonios''. Conserva el tono bíblico y la simetría del original.'
- source_word: לָרֹב
  english_pob_choice: in abundance
  chosen_spanish: en abundancia
  alternatives_spanish:
  - abundantemente
  - en gran cantidad
  lexicon: HALOT
  rationale: La locución denota gran cantidad. 'En abundancia' es la equivalencia natural en español y conserva el valor cuantitativo del hebreo.
- source_word: לְדָוִיד
  english_pob_choice: to David
  chosen_spanish: a David
  alternatives_spanish:
  - para David
  - a David
  lexicon: HALOT
  rationale: La preposición ל marca dirección/beneficiario. En español, 'a David' es la forma más directa; 'para David' podría sonar más interpretativa. Aquí el complemento señala al destinatario del aporte.
translation_notes:
  revision_awareness: Se tomó como base el texto hebreo de WLC y el audit trail inglés de POB. Se mantuvo la decisión contextual de entender עֲצֵי אֲרָזִים como material de construcción, pero en español se optó por una formulación más natural y compacta ('madera de cedro') que conserva la alternativa lexical en nota. No hubo cambios respecto de la evaluación revisada del equivalente inglés, y se preservó la relación causal y temporal del versículo.
  spanish_consistency_notes:
  - Se usa 'los sidonios' y 'los tirios' como gentilicios paralelos y consistentes.
  - Se conserva el pluscuamperfecto 'habían traído' para reflejar la anterioridad del acto de traer.
  - Se mantiene 'en abundancia' como equivalente de cantidad abundante, sin ampliar el sentido.
  - El marcador de nota [a] está anclado en 'madera de cedro' para conservar la alternativa léxica del hebreo.
