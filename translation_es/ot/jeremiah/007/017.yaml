  glossary_alignment: No hay términos teológicos de proyecto especialmente activados aquí. 'Judá' y 'Jerusalén' están correctamente representados. La elección de 'plazas' con nota para 'calles'/'lugares abiertos' respeta la justificación léxica documentada.
