review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta correctamente el sentido comercial del hebreo: ‘stone and stone, ephah and ephah’ como pesos y medidas discrepantes usados con fraude, y preserva bien ‘abominación’ y ‘Yahvé’. Sin embargo, la redacción principal en español (‘Una pesa y una pesa, una medida y una medida’) suena demasiado literal y no comunica con suficiente claridad el valor semántico documentado en el rastro inglés: no se trata de mera repetición, sino de estándares diferentes.'
  spanish_quality_summary: El español es comprensible, pero la duplicación literal ‘una pesa y una pesa’ / ‘una medida y una medida’ resulta poco natural y puede sonar opaca o torpe para lectores modernos. Una formulación como ‘pesas diferentes y medidas diferentes’ o equivalente expresa mejor el proverbio en español digno y claro, manteniendo el sentido. La nota al pie ya conserva adecuadamente la literalidad hebrea.
  glossary_alignment: '‘Yahvé’ sigue correctamente la política del proyecto para יְהוָה. ‘Abominación’ alinea bien con תּוֹעֲבַת. ‘Medida’ para אֵיפָה está bien contextualizado. El punto a corregir es la realización de אֶבֶן / וָאֶבֶן y אֵיפָה / וְאֵיפָה: en español conviene explicitar la discrepancia semántica en el texto principal, como hizo el POB inglés, dejando la repetición literal para la nota.'
  issues:
  - severity: medium
    issue: 'La frase principal reproduce la repetición hebrea de forma demasiado literal: ‘Una pesa y una pesa, una medida y una medida’.'
    rationale: 'Aunque refleja la forma del original, no preserva con suficiente claridad el sentido idiomático documentado por el POB inglés: pesos y medidas discrepantes o dobles para engaño comercial.'
  - severity: low
    issue: ‘Ambas’ tiene antecedente algo difuso tras dos sintagmas singulares repetidos.
    rationale: Con una redacción más natural (‘pesas diferentes y medidas diferentes’), la referencia dual queda más clara y fluida en español.
  revised_spanish_text: 'Pesas diferentes y medidas diferentes: ambas son abominación para Yahvé[a].'
  revised_footnotes:
  - marker: a
    text: 'Hebreo literalmente: ‘piedra y piedra, efa y efa’; es decir, pesas y medidas distintas usadas con engaño en el comercio.'
    reason: lexical_alternative
  revision_rationale: Se revisa la línea principal para expresar claramente el sentido idiomático del hebreo en contexto comercial, en concordancia con la decisión auditada en inglés (‘a differing weight and a differing measure’). La nota conserva la literalidad hebrea y la explicación cultural, de modo que no se pierde el vínculo con la forma original.
