lexical_decisions:
- source_word: וַיֵּלֶךְ
  english_pob_choice: So he went
  chosen_spanish: Así que se fue
  alternatives_spanish:
  - Y fue
  - Entonces fue
  lexicon: HALOT
  rationale: El waw consecutivo avanza la narración; «Así que» conserva la secuencia narrativa natural en español, y «se fue» expresa bien el desplazamiento sin sonar rígido.
- source_word: בְּדֶרֶךְ אַחֵר
  english_pob_choice: by another way
  chosen_spanish: por otro camino
  alternatives_spanish:
  - por otra ruta
  - por otro sendero
  lexicon: HALOT
  rationale: דֶּרֶךְ puede ser ‘camino, ruta, vía’. «Por otro camino» es natural en español y mantiene el contraste con el camino de regreso.
- source_word: וְלֹא שָׁב
  english_pob_choice: and did not return
  chosen_spanish: y no regresó
  alternatives_spanish:
  - y no volvió
  - y no se devolvió
  lexicon: HALOT
  rationale: שׁוּב aquí significa volver o regresar. «No regresó» es claro, idiomático y preserva el sentido de no volver sobre sus pasos.
- source_word: בַּדֶּרֶךְ אֲשֶׁר בָּא בָהּ
  english_pob_choice: by the way he had come
  chosen_spanish: por el camino por el que había venido
  alternatives_spanish:
  - por el camino por donde había venido
  - por la misma ruta por la que había venido
  lexicon: HALOT
  rationale: La relativa especifica la ruta original. «Había venido» refleja bien el anterior desplazamiento sin introducir información ajena; «por el que» conserva el referente de דֶּרֶךְ de manera natural.
- source_word: אֶל בֵּית אֵל
  english_pob_choice: to Bethel
  chosen_spanish: a Betel
  alternatives_spanish:
  - hacia Betel
  - a Beth-el
  lexicon: HALOT
  rationale: בֵּית אֵל es el nombre propio del lugar. «Betel» sigue la transliteración española habitual y mantiene el destino geográfico del texto.
translation_notes:
  revision_awareness: El texto base inglés fue revisado y quedó sin cambios; la concordancia general con el hebreo es alta, así que la versión española sigue de cerca la estructura narrativa y los contrastes de ruta sin añadir matices interpretativos.
  spanish_consistency_notes:
  - Se mantiene «Betel» como topónimo propio.
  - Se usa «camino» para דֶּרֶךְ de manera consistente en este versículo.
  - Se evita un calco excesivo de la sintaxis hebrea, pero se conserva la oposición entre el camino de ida y el de regreso.
