translation:
  language: es
  text: Entonces Abigail se apresuró y tomó doscientos panes, dos odres de vino, cinco ovejas ya preparadas, cinco seás[a] de grano tostado, cien racimos de pasas y doscientas tortas de higos, y los puso sobre los asnos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cinco medidas de grano tostado»; el seá era una antigua medida seca.
    reason: cultural_note
lexical_decisions:
- source_word: וַתְּמַהֵר
  english_pob_choice: Then Abigail hurried
  chosen_spanish: Entonces Abigail se apresuró
  alternatives_spanish:
  - Y Abigail se apresuró
  - Abigail se dio prisa
  lexicon: HALOT
  rationale: El hebreo expresa rapidez narrativa; «se apresuró» conserva el valor verbal natural en español. «Entonces» refleja la secuencia del waw consecutivo sin volverlo mecánico.
- source_word: וַתִּקַּח
  english_pob_choice: took
  chosen_spanish: tomó
  alternatives_spanish:
  - llevó
  - recogió
  lexicon: HALOT
  rationale: לקח normalmente significa «tomar». «Tomó» es directo y adecuado para introducir la lista de provisiones.
- source_word: מָאתַיִם לֶחֶם
  english_pob_choice: two hundred loaves of bread
  chosen_spanish: doscientos panes
  alternatives_spanish:
  - doscientos panes de pan
  - doscientas hogazas
  lexicon: HALOT
  rationale: En español, «panes» comunica el sustantivo contado sin redundar. «Hogazas» sería más específico pero menos neutral; «panes de pan» es poco natural.
- source_word: שְׁנַיִם נִבְלֵי יַיִן
  english_pob_choice: two skins of wine
  chosen_spanish: dos odres de vino
  alternatives_spanish:
  - dos pellejos de vino
  - dos cueros de vino
  lexicon: HALOT
  rationale: נֵבֶל designa un recipiente flexible para líquidos; «odres» es la equivalencia española más natural y mantiene el matiz antiguo mejor que «botellas».
- source_word: חָמֵשׁ צֹאן עֲשׂוּיוֹת
  english_pob_choice: five sheep already prepared
  chosen_spanish: cinco ovejas ya preparadas
  alternatives_spanish:
  - cinco ovejas preparadas
  - cinco ovejas listas
  lexicon: HALOT
  rationale: El participio indica animales dispuestos para su uso/comida. «Ya preparadas» preserva la idea sin añadir una etapa culinaria más precisa de la que el hebreo exige.
- source_word: חָמֵשׁ סְאִים קָלִי
  english_pob_choice: five seahs of roasted grain
  chosen_spanish: cinco seás de grano tostado
  alternatives_spanish:
  - cinco medidas de grano tostado
  - cinco seás de grano asado
  lexicon: HALOT
  rationale: Se conserva el término de medida «seás» porque el texto fuente lo especifica. «Grano tostado» refleja קָלִי con un español claro y fiel; no se neutraliza el peso cultural del unitario.
- source_word: מֵאָה צִמֻּקִים
  english_pob_choice: a hundred clusters of raisins
  chosen_spanish: cien racimos de pasas
  alternatives_spanish:
  - cien pasas
  - cien racimos de uvas pasas
  lexicon: HALOT
  rationale: צִמּוּקִים se entiende como pasas; «racimos» mantiene la idea de unidades agrupadas. Se evita «uvas pasas» por ser más largo y menos idiomático aquí.
- source_word: מָאתַיִם דְּבֵלִים
  english_pob_choice: two hundred cakes of figs
  chosen_spanish: doscientas tortas de higos
  alternatives_spanish:
  - doscientos pasteles de higos
  - doscientos panes de higo
  lexicon: HALOT
  rationale: דְּבֵלָה es un bloque o torta prensada de higos; «tortas» es una solución clara y fiel, más natural que «pasteles» en este contexto.
- source_word: וַתָּשֶׂם עַל הַחֲמֹרִים
  english_pob_choice: and put them on the donkeys
  chosen_spanish: y los puso sobre los asnos
  alternatives_spanish:
  - y los cargó sobre los asnos
  - y los colocó sobre los asnos
  lexicon: HALOT
  rationale: El verbo básico es «poner»; «los puso» respeta la simplicidad del hebreo. «Asnos» conserva el registro bíblico sin recurrir a una palabra más moderna pero menos directa.
translation_notes:
  revision_awareness: Se siguió la lectura y el orden del texto hebreo con apoyo del control auditado en inglés. No se detectaron revisiones textuales o decisiones doctrinales adicionales en el pasaje; la única nota necesaria es cultural para la unidad de medida «seás».
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» en coherencia con el estándar del proyecto, aunque este versículo no lo contiene.
  - Se conservaron términos de objetos antiguos («odres», «seás», «asnos») para respetar el mundo material del relato.
  - No se añadió interpretación narrativa extra; la lista de provisiones quedó en el orden del hebreo.
