translation:
  language: es
  text: Ante tu reprensión[a], oh, Dios de Jacob[b], tanto el carro de guerra como el caballo fueron sumidos en un profundo sueño.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O también: «Por tu reprensión» o «A causa de tu reprensión». El hebreo con מִן puede indicar origen o causa.'
    reason: lexical_alternative
  - marker: b
    text: El hebreo dice literalmente «carro y caballo», una manera poética de referirse a la fuerza militar; algunos entienden que la imagen se extiende también a sus jinetes.
    reason: cultural_note
lexical_decisions:
- source_word: מִגַּעֲרָתְךָ
  english_pob_choice: At your rebuke
  chosen_spanish: Ante tu reprensión
  alternatives_spanish:
  - Por tu reprensión
  - A causa de tu reprensión
  - Con tu reprensión
  lexicon: HALOT
  rationale: La preposición מִן puede señalar origen o causa; en español, "ante" comunica de manera natural el efecto inmediato de la reprensión divina sin convertirla en un mero adjunto causal mecánico.
- source_word: אֱלֹהֵי יַעֲקֹב
  english_pob_choice: O God of Jacob
  chosen_spanish: oh Dios de Jacob
  alternatives_spanish:
  - Dios de Jacob
  - Dios, de Jacob
  lexicon: HALOT
  rationale: Se conserva el título divino en vocativo, con "oh" para reflejar la dirección de la invocación poética al Dios de Jacob.
- source_word: נִרְדָּם
  english_pob_choice: were cast into a deep sleep
  chosen_spanish: fueron sumidos en un profundo sueño
  alternatives_spanish:
  - fueron lanzados a un profundo sueño
  - cayeron en un profundo sueño
  - quedaron en un profundo sueño
  lexicon: HALOT
  rationale: El nifal de רדם expresa un estado de sopor o estupor profundo, con matiz pasivo. "Fueron sumidos" conserva la pasividad y la fuerza de incapacitación; "profundo sueño" mantiene la imagen poética sin reducirla a sueño ordinario.
- source_word: וְרֶכֶב וָסוּס
  english_pob_choice: both chariot and horse
  chosen_spanish: tanto el carro como el caballo
  alternatives_spanish:
  - el carro y el caballo
  - ambos, carro y caballo
  - tanto el carro de guerra como el caballo
  lexicon: HALOT
  rationale: Se traduce la pareja nominal tal como aparece en el hebreo. "Carro" comunica el carro de guerra en español bíblico claro; no se explicita "de guerra" en el texto principal para no añadir más de lo que el verso dice.
theological_decisions:
- issue: Alcance de la imagen militar
  english_pob_reading: The verse depicts God's rebuke rendering the enemy's military power helpless, using sleep/stupor imagery.
  chosen_spanish_reading: El verso presenta la reprensión de Dios como la causa que deja sin poder al carro y al caballo enemigos, mediante una imagen de sopor profundo.
  alternative_spanish_readings:
  - Describe un sueño literal de animales y equipo
  - Alude de forma explícita a muerte o destrucción total
  rationale: La imaginería poética centra el efecto en la incapacidad de la fuerza militar. En español conviene mantener la metáfora de estupor/sueño profundo sin forzarla hacia una lectura literalista ni hacia una equivalencia explícita con muerte.
  doctrine_reference: Salmo 76:7; uso poético de incapacitación divina de poderes hostiles
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail inglés, que prefirió una formulación pasiva («were cast into a deep sleep») por su mejor ajuste al sentido del hebreo. En español se reflejó con «fueron sumidos en un profundo sueño».
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלֹהים y el vocativo «oh» en la invocación.
  - Se conserva «carro» como término bíblico natural para רכב, sin sustituirlo por una paráfrasis moderna.
  - «Profundo sueño» reproduce la intensidad de נִרְדָּם sin diluirla en un simple «durmieron».
