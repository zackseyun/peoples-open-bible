translation:
  language: es
  text: Porque los juicios de Yahvé están en justicia, según cada hombre y cada casa[a][b][c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego dice literalmente «según hombre y casa», probablemente con sentido distributivo: aplicado a cada individuo y a cada casa.[a]'
    reason: lexical_alternative
  - marker: b
    text: «Justicia» mantiene el sustantivo δικαιοσύνη; también podría traducirse «rectitud» si se quisiera resaltar más el carácter moral de los juicios.
    reason: lexical_alternative
  - marker: c
    text: Otra posibilidad sería «son justos», pero eso convertiría la expresión en adjetiva y debilitaría la cadena léxica de δικαιοσύνη en el contexto.
    reason: alternative_reading
lexical_decisions:
- source_word: κρίματα
  english_pob_choice: judgments
  chosen_spanish: juicios
  alternatives_spanish:
  - sentencias
  - decretos
  lexicon: LSJ
  rationale: κρίματα designa decisiones o actos judiciales. «Juicios» conserva el peso jurídico y moral sin reducirlo a simples decretos verbales.
- source_word: Κυρίου
  english_pob_choice: the Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  - el Dueño
  lexicon: Project default / doctrinal rendering
  rationale: Aunque el contexto griego usa κύριος, el proyecto pide «Yahvé» para el nombre divino cuando corresponde. Aquí se trata de los juicios del Señor en sentido teológico, por lo que se explicita el nombre divino en español.
- source_word: ἐν δικαιοσύνῃ
  english_pob_choice: are in righteousness
  chosen_spanish: están en justicia
  alternatives_spanish:
  - están en rectitud
  - son justos
  lexicon: LSJ
  rationale: La frase preposicional conserva mejor la cadena léxica de δικαιοσύνη como sustantivo. «En justicia» mantiene el sustantivo y evita borrar el enlace temático del pasaje.
- source_word: κατʼ ἄνδρα
  english_pob_choice: according to each man
  chosen_spanish: según cada hombre
  alternatives_spanish:
  - según cada persona
  - conforme a cada hombre
  lexicon: LSJ
  rationale: κατά con acusativo aquí funciona distributivamente. «Según» reproduce bien el valor distributivo y jurídico; «cada hombre» mantiene el singular masculino del griego.
- source_word: οἶκον
  english_pob_choice: house
  chosen_spanish: casa
  alternatives_spanish:
  - casa
  - hogar
  - familia
  lexicon: LSJ
  rationale: El griego dice literalmente «casa». En español, «casa» es la forma más cercana y mantiene el paralelismo con ἄνδρα; «hogar» o «familia» serían más interpretativos.
theological_decisions:
- issue: Cómo verter Κυρίου en un contexto griego de Salmos de Salomón
  english_pob_reading: the Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  - el Dueño
  rationale: El flujo del texto habla de los juicios del pacto divino; el proyecto establece «Yahvé» como forma principal para יהוה. Aunque el griego usa κύριος, aquí funciona como designación del Dios de Israel, no como un título ambiguo de autoridad humana.
  doctrine_reference: Project terminology default for the divine name
- issue: Preservar la cadena léxica de δικαιοσύνη
  english_pob_reading: are in righteousness
  chosen_spanish_reading: están en justicia
  alternative_spanish_readings:
  - son justos
  - obran con justicia
  rationale: El contexto cercano repite δικαιοσύνη. Traducir con un adjetivo («son justos») perdería la insistencia nominal. «Están en justicia» conserva la forma preposicional y la repetición temática.
  doctrine_reference: Lexical cohesion / thematic repetition in the source
translation_notes:
  revision_awareness: La traducción toma en cuenta la revisión más reciente que corrigió κατʼ hacia «según/according to» y οἶκον hacia una forma más literal. También respeta la adjudicación que prefirió conservar δικαιοσύνη como sustantivo para mantener la cohesión léxica del pasaje.
  spanish_consistency_notes:
  - Se usó «Yahvé» según el estándar del proyecto para el nombre divino.
  - «Juicios» se eligió por su fuerza judicial, en línea con el inglés POB.
  - Se conservó «justicia» para δικαιοσύνη, evitando borrar la repetición temática.
  - «Casa» mantiene la literalidad de οἶκον y el paralelismo con «hombre».
