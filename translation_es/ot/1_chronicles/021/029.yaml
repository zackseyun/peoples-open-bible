translation:
  language: es
  text: Ahora bien, el tabernáculo de Yahvé, que Moisés había hecho en el desierto, y el altar del holocausto estaban en aquel tiempo en el lugar alto de Gabaón.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: מִשְׁכַּן
  english_pob_choice: tabernacle
  chosen_spanish: tabernáculo
  alternatives_spanish:
  - morada
  - tienda de reunión
  lexicon: HALOT
  rationale: En este contexto cultual, el término español establecido y preciso es 'tabernáculo'. 'Morada' es demasiado general y 'tienda de reunión' cambia el matiz del santuario mosaico aquí señalado.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: Se preserva el nombre divino propio en español como 'Yahvé', conforme al criterio del proyecto para el tetragrámaton, en lugar de sustituirlo por un título.
- source_word: אֲשֶׁר עָשָׂה
  english_pob_choice: which Moses had made
  chosen_spanish: que Moisés había hecho
  alternatives_spanish:
  - que Moisés hizo
  - que Moisés había construido
  lexicon: HALOT
  rationale: El relativo se vierte de manera natural con pretérito pluscuamperfecto porque el texto mira retrospectivamente a una obra anterior de Moisés en el desierto.
- source_word: בַמִּדְבָּר
  english_pob_choice: in the wilderness
  chosen_spanish: en el desierto
  alternatives_spanish:
  - en el yermo
  - en la estepa
  lexicon: HALOT
  rationale: '''Desierto'' es una equivalencia clara y bíblicamente comprensible en español; ''wilderness'' en la fuente inglesa corresponde a este campo semántico exodico.'
- source_word: מִזְבַּח הָעוֹלָה
  english_pob_choice: the altar of burnt offering
  chosen_spanish: el altar del holocausto
  alternatives_spanish:
  - el altar del sacrificio quemado
  - el altar para holocaustos
  lexicon: HALOT
  rationale: '''Holocausto'' es el equivalente cultual tradicional y exacto para הָעֹלָה en este contexto, donde se refiere al altar destinado a esas ofrendas completas.'
- source_word: בָּעֵת הַהִיא
  english_pob_choice: at that time
  chosen_spanish: en aquel tiempo
  alternatives_spanish:
  - entonces
  - en ese tiempo
  lexicon: HALOT
  rationale: La locución española 'en aquel tiempo' reproduce el valor temporal narrativo con un registro natural y digno.
- source_word: בַּבָּמָה
  english_pob_choice: on the high place
  chosen_spanish: en el lugar alto
  alternatives_spanish:
  - sobre el lugar alto
  - en la altura
  lexicon: HALOT
  rationale: '''Lugar alto'' conserva el sentido cultual de בָּמָה en español sin forzar una preposición literal poco natural; evita también perder el valor técnico del sitio de culto.'
- source_word: בְּגִבְעוֹן
  english_pob_choice: at Gibeon
  chosen_spanish: en Gabaón
  alternatives_spanish:
  - en Gibeón
  - en Gabaon
  lexicon: HALOT
  rationale: Se usa la forma castellana asentada 'Gabaón', natural para un topónimo bíblico en español y fiel al referente geográfico.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: La lectura de la POB inglesa preserva el nombre propio divino; en español la forma editorial coherente con el proyecto es 'Yahvé', que mantiene la distinción frente a un simple título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: La versión previa falló por incluir un marcador de nota sin anclaje en el texto. En esta revisión se eliminan todas las notas al pie y se verifica que el texto español no contenga marcadores huérfanos.
  spanish_consistency_notes:
  - Se mantiene el nombre divino 'Yahvé' de manera consistente con el estándar del proyecto.
  - '''Tabernáculo'' y ''altar del holocausto'' conservan el léxico cultual preciso sin reinterpretación.'
  - La frase 'en aquel tiempo' evita una paráfrasis excesiva y respeta la función temporal del hebreo.
