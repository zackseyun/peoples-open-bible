translation:
  language: es
  text: Entonces el rey dio un gran banquete para todos sus oficiales y servidores, el banquete de Ester, y concedió alivio[a] a las provincias y dio regalos según la generosidad del rey[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hizo un día de descanso para las provincias» o «les concedió remisión». El término hebreo puede abarcar alivio, reposo o remisión.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «según la mano del rey», un modismo para indicar generosidad o una medida propia de un rey.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִשְׁתֶּה גָדֹול
  english_pob_choice: a great banquet
  chosen_spanish: un gran banquete
  alternatives_spanish:
  - un gran banquete de comida
  - una gran fiesta
  lexicon: HALOT
  rationale: מִשְׁתֶּה designa una comida festiva o banquete; «banquete» conserva mejor el contexto cortesano que «fiesta». גָדוֹל se rinde naturalmente como «gran».
- source_word: לְכָל שָׂרָיו וַעֲבָדָיו
  english_pob_choice: for all his officials and servants
  chosen_spanish: para todos sus oficiales y siervos
  alternatives_spanish:
  - para todos sus príncipes y siervos
  - para todos sus nobles y servidores
  lexicon: HALOT
  rationale: שָׂרִים en el contexto persa alude a altos funcionarios; «oficiales» comunica bien esa función en español moderno. עֲבָדִים puede ser literalmente «siervos»; se evita «servidores» por ser menos preciso y «esclavos» por ser demasiado fuerte para este pasaje.
- source_word: אֵת מִשְׁתֵּה אֶסְתֵּר
  english_pob_choice: the banquet of Esther
  chosen_spanish: el banquete de Ester
  alternatives_spanish:
  - el banquete de Ester
  - el banquete de Esther
  lexicon: HALOT
  rationale: La construcción en hebreo expresa una relación posesiva o asociativa. «El banquete de Ester» preserva esa relación de forma literal y lecturable en español.
- source_word: וַהֲנָחָה לַמְּדִינוֹת עָשָׂה
  english_pob_choice: he granted relief to the provinces
  chosen_spanish: concedió alivio a las provincias
  alternatives_spanish:
  - hizo reposo para las provincias
  - les concedió descanso a las provincias
  - hizo un día de descanso para las provincias
  lexicon: HALOT
  rationale: הֲנָחָה puede significar alivio, descanso o remisión. «Alivio» mantiene la amplitud semántica sin forzar a una sola explicación administrativa o festiva.
- source_word: מַשְׂאֵת
  english_pob_choice: gifts
  chosen_spanish: regalos
  alternatives_spanish:
  - dones
  - presentes
  - obsequios
  lexicon: HALOT
  rationale: En este contexto cortesano, מַשְׂאֵת se refiere a lo que el rey distribuye. «Regalos» es idiomático y suficientemente amplio en español para la dádiva real.
- source_word: כְּיַד הַמֶּלֶךְ
  english_pob_choice: according to the king’s bounty
  chosen_spanish: según la mano del rey
  alternatives_spanish:
  - según la generosidad del rey
  - de acuerdo con la mano del rey
  - conforme a la mano del rey
  lexicon: HALOT
  rationale: Se conserva la metáfora hebrea «mano» porque el texto fuente la usa y el inglés POB la mantiene en su nota. En el cuerpo del texto, «según la mano del rey» preserva la idiomaticidad y deja visible la tensión entre literalidad y sentido de liberalidad o medida real.
- source_word: וַיַּעַשׂ
  english_pob_choice: gave
  chosen_spanish: dio
  alternatives_spanish:
  - hizo
  - celebró
  - ofreció
  lexicon: HALOT
  rationale: Aunque el hebreo literalmente dice «hizo», en español el uso natural para una comida formal es «dio un banquete». Esta elección sigue la equivalencia óptima del POB inglés.
translation_notes:
  revision_awareness: La nota de revisión inglesa afinó כְּיַד הַמֶּלֶךְ de «in keeping with» a «according to» para un registro más directo y formal. La redacción española sigue esa decisión con «según», manteniendo el modismo hebreo visible en nota.
  spanish_consistency_notes:
  - Se mantiene «Ester» para el nombre propio según uso bíblico en español.
  - Se usa «Yahvé» solo cuando aparezca el Tetragrámaton; aquí no aplica.
  - «Oficiales» y «siervos» conservan el contraste funcional del texto sin sobrecargar con términos cortesanos arcaizantes.
  - La puntuación con raya explica la aposición del «banquete de Ester» sin añadir interpretación no requerida.
