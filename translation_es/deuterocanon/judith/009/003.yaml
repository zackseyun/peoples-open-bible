  yaml_path: translation/deuterocanon/judith/009/003.yaml
  text: Therefore you gave their rulers over to slaughter[a], and their bed, which was ashamed of their deceit, was deceived into blood; and you struck slaves against rulers, and rulers upon their thrones.
  footnotes:
