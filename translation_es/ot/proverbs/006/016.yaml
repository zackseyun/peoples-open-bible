translation:
  language: es
  text: 'Hay seis cosas que Yahvé aborrece[a], y siete que le son abominables:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «siete abominaciones para su alma», es decir, siete cosas que le son aborrecibles.
    reason: lexical_alternative
lexical_decisions:
- source_word: שֶׁשׁ
  english_pob_choice: six
  chosen_spanish: Seis
  alternatives_spanish:
  - Hay seis
  - Seis cosas
  lexicon: HALOT
  rationale: El hebreo inicia un dicho numérico; en español puede conservarse el numeral inicial sin añadir una estructura existencial obligatoria. Se eligió una formulación breve y natural que preserva el paralelismo del proverbio.
- source_word: הֵנָּה
  english_pob_choice: There are
  chosen_spanish: (implícito en la estructura)
  alternatives_spanish:
  - hay
  - son estas
  lexicon: HALOT
  rationale: El pronombre funciona como introducción a los elementos enumerados. En español, el sentido se entiende de forma natural sin exigir un equivalente explícito; la frase con numeral inicial mantiene la economía proverbial del original.
- source_word: שָׂנֵא
  english_pob_choice: hates
  chosen_spanish: aborrece
  alternatives_spanish:
  - odia
  - detesta
  lexicon: HALOT
  rationale: Se escogió 'aborrece' porque transmite la fuerza del verbo hebreo con un tono bíblico pero aún claro en español. 'Odia' sería más directo, pero 'aborrece' conserva mejor el valor moral y relacional del contexto sapiencial.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: Se mantiene el nombre divino según la convención del proyecto en español. 'Yahvé' preserva el Tetragrámaton como nombre propio y evita la sustitución por un título.
- source_word: וְשֶׁבַע
  english_pob_choice: seven
  chosen_spanish: y aun siete
  alternatives_spanish:
  - y siete
  - incluso siete
  lexicon: HALOT
  rationale: La construcción hebrea 'seis... y siete' es una fórmula intensificadora, no una suma aritmética. 'Y aun siete' comunica esa progresión enfática en español sin perder la forma proverbial.
- source_word: תועבות
  english_pob_choice: an abomination
  chosen_spanish: abominables
  alternatives_spanish:
  - abominación
  - repugnantes
  - detestables
  lexicon: HALOT
  rationale: El plural hebreo expresa cosas moralmente repulsivas. En español, 'abominables' permite concordar naturalmente con 'cosas' y retiene la fuerza del término sin volver la línea pesada.
- source_word: נַפְשׁוֹ
  english_pob_choice: to him
  chosen_spanish: le son
  alternatives_spanish:
  - a su alma
  - a su ser
  - para él
  lexicon: HALOT
  rationale: El hebreo usa 'su alma/vida' idiomáticamente para la persona misma. 'Le son abominables' preserva el sentido sin introducir una antropología más literal de 'alma', aunque esa lectura queda implícitamente disponible.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: La decisión mantiene el nombre personal de Dios, no una sustitución titular. En español, 'Yahvé' es la forma establecida en el proyecto y comunica la referencia al Tetragrámaton con claridad reverente.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Expresión antropomórfica/idiomática נַפְשׁוֹ
  english_pob_reading: seven that are an abomination to him
  chosen_spanish_reading: y aun siete que le son abominables
  alternative_spanish_readings:
  - y aun siete abominaciones para su alma
  - y aun siete que su alma detesta
  rationale: Se evita traducir de modo demasiado literal 'su alma' porque en hebreo נֶפֶשׁ puede significar la persona misma. La versión española conserva la intensidad moral del hebreo sin imponer una lectura antropológica ajena al contexto sapiencial.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence; preserve source sense without unnecessary paraphrase'
translation_notes:
  revision_awareness: 'Coincide con el audit trail inglés: se preserva la fórmula numérica intensiva, el nombre divino como nombre propio y el valor idiomático de נֶפֶשׁ sin sobretraducirlo.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' conforme al estándar español del proyecto para יְהוָה.
  - '''Aborrece'' y ''abominables'' mantienen el campo semántico fuerte del hebreo sin suavizarlo.'
  - La nota al pie preserva la alternativa literal de la fórmula numérica para auditoría.
  - La traducción evita 'alma' en el cuerpo del texto para no oscurecer el sentido idiomático de נַפְשׁוֹ.
