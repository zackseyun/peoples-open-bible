    issue: El primer verbo יָשֹׁקּוּ se traduce igual que יְרֻצוּן
    rationale: El inglés auditado distingue «rush through» de «run». En español conviene reflejar ese mayor ímpetu con «irrumpen» o «se precipitan», para no perder intensidad ni colapsar los dos verbos en uno solo.
  - severity: medium
    issue: «Suben a las casas» no expresa bien la entrada hostil
    rationale: יַעֲלוּ en contexto de asalto a casas sugiere trepar/escalar para entrar. «Suben a las casas» puede sonar como subir al techo más que irrumpir en ellas.
  - severity: low
    issue: «como ladrón» suena menos idiomático que «como un ladrón»
    rationale: Aunque el hebreo no requiere artículo indefinido como el español, la comparación en español general es más natural con «un», sin pérdida de concisión ni cambio semántico.
  revised_spanish_text: Por la ciudad[a] irrumpen; corren sobre el muro; trepan a las casas; entran por las ventanas como un ladrón.
