  to: 'Y con el resto hace un dios[a], su imagen tallada; se postra ante ella y la adora, y ora[a] a ella y dice: «Líbrame[b], porque tú eres mi dios».'
  rationale: Se suavizan dos expresiones poco naturales en español («de ello» y «le ora») sin cambiar el sentido del hebreo ni las decisiones del POB. También se sustituye la raya por una coma, que en español aquí fluye mejor sin pérdida de énfasis. La nota léxica se conserva; la nota cultural sigue siendo válida. No hace falta adjudicación adicional.
