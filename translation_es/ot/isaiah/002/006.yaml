translation:
  language: es
  text: Porque has abandonado a tu pueblo, la casa de Jacob, porque están llenos de prácticas orientales[a], y practican adivinación como los filisteos[b], y hacen tratos[c] con los hijos de extranjeros.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «desde el oriente»; en contexto, la expresión probablemente alude a prácticas o influencias orientales más que a un origen geográfico simple.
    reason: lexical_alternative
  - marker: b
    text: O «son adivinos como los filisteos».
    reason: lexical_alternative
  - marker: c
    text: El verbo hebreo es raro e incierto; puede significar «golpean o estrechan las manos», «hacen acuerdos» o, más generalmente, «se unen» con los hijos de extranjeros.
    reason: alternative_reading
lexical_decisions:
- source_word: נָטַשְׁתָּה
  english_pob_choice: have forsaken
  chosen_spanish: has abandonado
  alternatives_spanish:
  - has dejado
  - has rechazado
  - has desamparado
  lexicon: HALOT
  rationale: נטשׁ expresa dejar, abandonar o forsake en sentido de ruptura de relación. En español, «has abandonado» comunica bien la acusación profética y su fuerza relacional sin sonar arcaico.
- source_word: עַמְּךָ בֵּית יַעֲקֹב
  english_pob_choice: your people, the house of Jacob
  chosen_spanish: a tu pueblo, la casa de Jacob
  alternatives_spanish:
  - a tu pueblo, la casa de Israel
  lexicon: HALOT
  rationale: Se conserva la estructura aposicional y el nombre explícito «Jacob», como en el hebreo, sin sustituirlo por «Israel».
- source_word: מָלְאוּ מִקֶּדֶם
  english_pob_choice: they are full of eastern ways
  chosen_spanish: están llenos de prácticas orientales
  alternatives_spanish:
  - están llenos de cosas del oriente
  - están llenos de influencias orientales
  lexicon: HALOT
  rationale: La expresión es elíptica; el sentido probable no es solo geográfico sino de prácticas o influencias importadas del oriente. «Prácticas orientales» preserva esa inferencia con naturalidad en español.
- source_word: עֹנְנִים
  english_pob_choice: practice divination
  chosen_spanish: practican adivinación
  alternatives_spanish:
  - practican hechicería
  - son agoreros
  - practican soothsaying
  lexicon: HALOT
  rationale: El participio designa actividad adivinatoria/soothsaying. «Practican adivinación» es claro, sobrio y fiel al campo semántico.
- source_word: כַּפְּלִשְׁתִּים
  english_pob_choice: like the Philistines
  chosen_spanish: como los filisteos
  alternatives_spanish:
  - igual que los filisteos
  - a la manera de los filisteos
  lexicon: HALOT
  rationale: Se mantiene la comparación directa y el nombre histórico del grupo sin amplificación.
- source_word: וּבְיַלְדֵי נָכְרִים
  english_pob_choice: with the children of foreigners
  chosen_spanish: con los hijos de extranjeros
  alternatives_spanish:
  - con los hijos de forasteros
  - con los niños de extranjeros
  lexicon: HALOT
  rationale: La frase literal se conserva en español. «Hijos de extranjeros» mantiene la forma hebrea sin restringir innecesariamente el alcance social del plural.
- source_word: יַשְׂפִּיקוּ
  english_pob_choice: they strike hands with
  chosen_spanish: estrechan manos
  alternatives_spanish:
  - se dan la mano
  - hacen acuerdos
  - se unen
  lexicon: HALOT
  rationale: El verbo es raro y su sentido exacto es incierto. «Estrechan manos» conserva la imagen de gesto de alianza o complicidad, con un español formal y comprensible.
theological_decisions:
- issue: Alcance moral de la denuncia profética
  english_pob_reading: The verse indicts the people for adopting eastern divinatory practices and entering into compromising association/alliance with foreigners.
  chosen_spanish_reading: La versión denuncia la adopción de prácticas adivinatorias y la asociación comprometida con extranjeros, no una condena étnica general.
  alternative_spanish_readings:
  - podría referirse más específicamente a pactos con extranjeros
  - «desde el oriente» podría tomarse de modo estrictamente geográfico
  rationale: 'La redacción debe reflejar sin simplificar el contexto profético: se trata de sincretismo y compromiso, no de xenofobia. Por eso se conserva el matiz de práctica y asociación, dejando abierta la ambigüedad del último miembro.'
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: Se sigue la revisión más reciente del inglés POB, que prefirió «strike hands with» frente a «clasp hands with» por ser más formal y más literal. En español se optó por «estrechan manos» para conservar esa literalidad con estilo natural.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando el hebreo nombra directamente YHWH; aquí el versículo no lo contiene.
  - «Adivinación» se usa para עֹנְנִים por ser la opción más neutra y fiel en español bíblico contemporáneo.
  - «Hijos de extranjeros» reproduce la estructura semítica sin convertirla en una categoría étnica moderna.
  - Las notas preservan la ambigüedad del hebreo sin sobreinterpretar el final del versículo.
