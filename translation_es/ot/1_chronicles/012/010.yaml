review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva correctamente la estructura de lista del hebreo: nombre + rango, seguido por los ordinales para los siguientes nombres. ''Ezer'' y ''Eliab'' están bien; ''Obadías'' es una forma española válida de עֹבַדְיָה. Sin embargo, para הָרֹאשׁ, ''el jefe'' transmite rango pero suena más coloquial y administrativo que el matiz de primacía/liderazgo de רֹאשׁ en una lista militar. ''El principal'' o ''el jefe principal'' no corresponde; la opción más fiel y natural aquí es ''el jefe'' o ''el principal'', pero dado el pie de nota del POB (''the chief'' con alternativa literal ''the head''), en español eclesial ''el principal'' preserva mejor la idea de primer rango sin tono moderno coloquial.'
  spanish_quality_summary: 'El texto es claro y legible, pero ''Ezer el jefe'' suena algo brusco y menos digno que el registro objetivo del pasaje. La nota al pie actual tiene comillas y puntuación poco naturales en español editorial bíblico (''O: ...; el hebreo dice literalmente ...''). Conviene suavizar el registro y ajustar la nota para mayor naturalidad y precisión.'
  glossary_alignment: 'No hay términos teológicos sensibles del glosario principal en este versículo. La política de transliterar nombres se respeta razonablemente, con adaptación española convencional en ''Obadías''. La decisión sobre הָרֹאשׁ debe alinearse mejor con el racional documentado: uso idiomático de rango/liderazgo, con alternativa literal ''cabeza''.'
  issues:
  - severity: medium
    issue: '''el jefe'' para הָרֹאשׁ suena demasiado coloquial'
    rationale: Aunque semánticamente posible, en español bíblico neutral 'el principal' refleja mejor rango y primacía en una enumeración de guerreros, y armoniza mejor con la nota inglesa 'the chief'.
  - severity: low
    issue: Redacción de la nota al pie poco natural
    rationale: 'La fórmula "O: ...; el hebreo dice literalmente ..." puede mejorarse a una redacción más limpia y editorialmente natural en español, conservando la alternativa y la literalidad.'
  revised_spanish_text: Ezer el principal[a], Obadías el segundo, Eliab el tercero.
