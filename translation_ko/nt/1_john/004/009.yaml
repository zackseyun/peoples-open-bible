source:
  edition: SBLGNT
  text: ἐν τούτῳ ἐφανερώθη ἡ ἀγάπη τοῦ θεοῦ ἐν ἡμῖν, ὅτι τὸν υἱὸν αὐτοῦ τὸν μονογενῆ ἀπέσταλκεν ὁ θεὸς εἰς τὸν κόσμον ἵνα ζήσωμεν δι’ αὐτοῦ.
base_translation:
  language: en
  yaml_path: translation/nt/1_john/004/009.yaml
  text: 'In this the love of God was revealed among us: that God has sent his one and only Son into the world so that we might live through him[a][b].'
  footnotes:
  - marker: a
    text: Or 'in us.' The Greek phrase can denote manifestation within believers or among us corporately.
    reason: lexical_alternative
  - marker: b
    text: 'Traditional rendering: ''his only begotten Son.'' The Greek μονογενής emphasizes the Son''s uniqueness; ''only begotten'' preserves the historic churchly wording.'
    reason: alternative_reading
translation:
  language: ko
  text: '이로써 하나님의 사랑이 우리 가운데 나타났습니다: 하나님께서 자기 독생자를 세상에 보내신 것은 우리가 그를 통하여 살게 하시려는 것입니다.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: τὸν μονογενῆ
  english_pob_choice: one and only
  chosen_korean: 독생자
  alternatives_korean:
  - 유일하신 아들
  - 외아들
  lexicon: BDAG
  rationale: μονογενής는 「유일하게 난」 — 요한 문헌의 핵심 칭호. 한국 교회 전통의 「독생자」가 표준 등가어이며 신학적 무게를 담는다.
