translation:
  language: es
  text: 'Y este es el número de los hombres valientes de David: Jashobeam[a] hijo de Hachmoni, jefe de los Treinta; él blandió su lanza contra trescientos caídos en una sola ocasión.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «levantó su lanza contra trescientos caídos de una vez». El hebreo es compacto, y las traducciones varían en cómo expresan literalmente la acción de la lanza y la referencia a una sola ocasión.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִסְפַּר
  english_pob_choice: the number of
  chosen_spanish: estos son
  alternatives_spanish:
  - el número de
  - la lista de
  lexicon: HALOT
  rationale: En español, «el número de» suena más literal pero poco natural para introducir un registro nominal. «Estos son» mantiene la función enumerativa del hebreo sin forzar una calca que oscurezca el sentido del versículo dentro de la lista de guerreros.
- source_word: הַגִּבֹּרִים
  english_pob_choice: mighty men
  chosen_spanish: hombres valientes
  alternatives_spanish:
  - hombres poderosos
  - guerreros valientes
  lexicon: HALOT
  rationale: «Hombres valientes» conserva la idea de heroísmo militar y es natural en español. «Mighty men» no se traslada bien como fórmula fija si se usa «mighty» literalmente; «hombres poderosos» perdería el matiz guerrero.
- source_word: לְדָוִיד
  english_pob_choice: David’s
  chosen_spanish: de David
  alternatives_spanish:
  - pertenecientes a David
  - que estaban con David
  lexicon: HALOT
  rationale: El complemento relacional se expresa de forma directa y natural con «de David», sin añadir explicación ajena al texto.
- source_word: יָשָׁבְעָם בֶּן חַכְמוֹנִי
  english_pob_choice: Jashobeam son of Hachmoni
  chosen_spanish: Jashobeam hijo de Hachmoni
  alternatives_spanish:
  - Jashobeam el hijo de Hachmoni
  lexicon: HALOT
  rationale: Se conserva la transliteración de los nombres propios y se traduce el patronímico de manera formal y clara con «hijo de».
- source_word: רֹאשׁ הַשלושים
  english_pob_choice: the chief of the Thirty
  chosen_spanish: jefe de los Treinta
  alternatives_spanish:
  - cabeza de los Treinta
  - líder de los Treinta
  lexicon: HALOT
  rationale: «Jefe» expresa bien el rango de liderazgo militar y suena más natural que «cabeza» en español. Se mantiene «los Treinta» como designación del grupo.
- source_word: עוֹרֵר אֶת חֲנִיתוֹ
  english_pob_choice: wielded his spear
  chosen_spanish: blandió su lanza
  alternatives_spanish:
  - levantó su lanza
  - empuñó su lanza
  - agitó su lanza
  lexicon: HALOT
  rationale: El verbo hebreo tiene la idea de agitar/activar una acción bélica sobre la lanza. «Blandió» recoge bien ese gesto militar en español sin volverse mecánico. «Lanza» es preferible aquí por ser el equivalente más natural de חֲנִית en este contexto.
- source_word: עַל שְׁלֹשׁ מֵאוֹת
  english_pob_choice: against three hundred
  chosen_spanish: contra trescientos
  alternatives_spanish:
  - sobre trescientos
  lexicon: HALOT
  rationale: Con un arma y un contexto de combate, «contra» comunica adecuadamente la dirección hostil del acto.
- source_word: חָלָל
  english_pob_choice: slain
  chosen_spanish: caídos
  alternatives_spanish:
  - muertos
  - abatidos
  - muertos en combate
  lexicon: HALOT
  rationale: «Caídos» preserva el valor de muertos en combate y funciona de manera sobria en español. «Abatidos» sería posible, pero introduce un matiz más interpretativo; «caídos» deja abierta la referencia al resultado letal sin añadir más de lo que el hebreo exige.
- source_word: בְּפַעַם אֶחָת
  english_pob_choice: in one encounter
  chosen_spanish: en una sola ocasión
  alternatives_spanish:
  - en un solo encuentro
  - de una vez
  lexicon: HALOT
  rationale: «En una sola ocasión» reproduce la idea de una única instancia/episodio sin implicar que todos fueran derribados por un solo golpe físico. Es una solución natural y fiel al valor idiomático compacto del hebreo.
theological_decisions:
- issue: El título militar רֹאשׁ הַשלושים y la posible fijación del grupo como designación propia
  english_pob_reading: the chief of the Thirty
  chosen_spanish_reading: jefe de los Treinta
  alternative_spanish_readings:
  - cabeza de los Treinta
  - líder de los Treinta
  rationale: No hay una cuestión doctrinal directa, pero sí una decisión de terminología histórica. «Jefe de los Treinta» conserva la jerarquía del texto y evita una traducción demasiado literal que suene extraña en español.
  doctrine_reference: No aplica; decisión léxica-histórica
- issue: La descripción bélica de la muerte de trescientos hombres y la forma de expresar חָלָל
  english_pob_reading: three hundred slain
  chosen_spanish_reading: trescientos caídos
  alternative_spanish_readings:
  - trescientos muertos
  - trescientos abatidos
  rationale: Se evita una equivalencia demasiado dura o demasiado interpretativa. «Caídos» mantiene el carácter narrativo de bajas en combate sin precisar más de lo que el texto dice.
  doctrine_reference: No aplica; decisión de registro narrativo
translation_notes:
  revision_awareness: Se siguió el texto hebreo consonante-vocalizado del WLC y se alineó con la auditoría inglesa de POB, especialmente en la compacta expresión bélica de עוֹרֵר אֶת חֲנִיתוֹ y בְּפַעַם אֶחָת. La revisión inglesa más reciente indica que no hubo cambios necesarios; por eso la redacción española mantiene una equivalencia óptima sin expandir innecesariamente el idiom a.
  spanish_consistency_notes:
  - 'Se mantiene transliteración consistente de nombres propios: Jashobeam, Hachmoni.'
  - Se usa «hijo de» por fidelidad al patronímico explícito.
  - Se prefiere «jefe» para רֹאשׁ en un contexto militar de rango.
  - «Lanza» se usa como equivalente natural de חֲנִית en español bíblico contemporáneo.
  - La frase final evita sugerir que los trescientos fueron muertos con un solo golpe; solo indica una única ocasión/encuentro.
