review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido principal del hebreo: los nobles de los pueblos se reúnen, se mantiene la identificación ambigua con el pueblo del Dios de Abraham, se preserva la imagen de «los escudos de la tierra», y la cláusula final se refiere a Dios como altamente exaltado. Sin embargo, las notas al pie quedaron invertidas respecto de sus anclajes textuales y del rastro de auditoría en inglés.'
  spanish_quality_summary: El español es claro, natural y digno. «Los nobles de los pueblos se han reunido como el pueblo del Dios de Abraham» y «a Dios pertenecen los escudos de la tierra» son formulaciones legibles y fieles. «Él es muy exaltado» es aceptable, aunque algo menos idiomático que «él es grandemente exaltado»; no requiere cambio obligado. El problema principal es de consistencia editorial de notas, no de redacción base.
  glossary_alignment: 'Alinea bien con la terminología del proyecto: אֱלֹהִים -> «Dios»; no hay conflicto con Yahvé, Mesías, Espíritu, etc. La decisión de conservar «escudos» en el texto principal sigue la política de equivalencia óptima y la justificación léxica documentada.'
  issues:
  - severity: high
    issue: Las notas al pie a y b están intercambiadas respecto del texto y del expediente inglés.
    rationale: En el texto, [a] ancla «Dios de Abraham», donde corresponde la nota sobre la lectura alternativa «con el pueblo del Dios de Abraham»; y [b] ancla «escudos de la tierra», donde corresponde la nota léxica «los gobernantes de la tierra». El contenido actual de las notas está invertido, lo que induce a error exegético.
  - severity: low
    issue: La nota léxica usa «gobernantes» donde el inglés auditado dice «rulers».
    rationale: «Gobernantes» es una equivalencia válida y natural en español; no hace falta cambiarla, pero debe quedar asociada al anclaje correcto en «escudos de la tierra».
  revised_spanish_text: Los nobles de los pueblos se han reunido como el pueblo del Dios de Abraham[a], porque a Dios pertenecen los escudos de la tierra[b]; él es muy exaltado.
  revised_footnotes:
  - marker: a
    text: O «se han reunido con el pueblo del Dios de Abraham». El hebreo puede expresar asociación estrecha o identificación.
    reason: alternative_reading
  - marker: b
    text: O «los gobernantes de la tierra»; literalmente, «los escudos de la tierra».
    reason: lexical_alternative
  revision_rationale: 'Se conserva el texto principal porque es fiel y natural. Solo se corrige la asignación de las notas al pie para que coincidan con los anclajes correctos y con la auditoría inglesa: la alternativa sintáctica pertenece a «Dios de Abraham», y la alternativa léxica pertenece a «escudos de la tierra».'
