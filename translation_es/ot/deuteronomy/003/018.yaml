translation:
  language: es
  text: 'Y les mandé en aquel tiempo[a], diciendo: «Yahvé, su Dios, les ha dado esta tierra para poseerla. Cruzarán armados[b] delante de sus hermanos[c], los hijos de Israel, todos los hombres de valor[d]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en aquel momento». La expresión hebrea marca el momento narrativo de la instrucción.
    reason: lexical_alternative
  - marker: b
    text: O «equipados para la batalla». El término hebreo describe preparación militar concreta.
    reason: lexical_alternative
  - marker: c
    text: O «sus compatriotas»; el hebreo dice literalmente «sus hermanos, los hijos de Israel».
    reason: lexical_alternative
  - marker: d
    text: «Hombres de valor» se refiere a combatientes capaces, no solo a valentía interior.
    reason: cultural_note
lexical_decisions:
- source_word: וָאֲצַו
  english_pob_choice: And I commanded
  chosen_spanish: Y los mandé
  alternatives_spanish:
  - Y les ordené
  - Y les di esta orden
  lexicon: HALOT
  rationale: צוה expresa dar una orden o mandato. En español, ‘mandé’ comunica con naturalidad la acción directiva de Moisés sin perder la fuerza imperativa.
- source_word: בָּעֵת הַהִוא
  english_pob_choice: at that time
  chosen_spanish: en aquel tiempo
  alternatives_spanish:
  - en ese tiempo
  - aquel tiempo
  lexicon: HALOT
  rationale: Es la fórmula temporal narrativa estándar; ‘en aquel tiempo’ conserva el valor contextual y suena natural en español bíblico contemporáneo.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - así
  lexicon: HALOT
  rationale: Es el introductor de discurso habitual; ‘diciendo’ mantiene la transición formal sin añadir contenido.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: El Tetragrámaton se vierte como ‘Yahvé’ conforme al criterio del proyecto para preservar el nombre divino, no sustituirlo por un título.
- source_word: אֱלֹהֵיכֶם
  english_pob_choice: your God
  chosen_spanish: su Dios
  alternatives_spanish:
  - su Dios de ustedes
  - su Dios
  lexicon: HALOT
  rationale: El sufijo plural de segunda persona se expresa de forma reverente y clara como ‘su Dios’ en una cita directa dirigida a Israel; el referente está contextualizado por el vocativo y la segunda persona verbal.
- source_word: נָתַן לָכֶם
  english_pob_choice: has given you
  chosen_spanish: les ha dado
  alternatives_spanish:
  - les dio
  - les ha entregado
  lexicon: HALOT
  rationale: El perfecto hebreo se traduce con presente perfecto para reflejar una acción concluida con relevancia presente en el discurso de Moisés.
- source_word: הָאָרֶץ הַזֹּאת
  english_pob_choice: this land
  chosen_spanish: esta tierra
  alternatives_spanish:
  - esta tierra
  - este territorio
  lexicon: HALOT
  rationale: ‘Tierra’ es el equivalente natural de אֶרֶץ en este contexto geográfico y pactal.
- source_word: לְרִשְׁתָּהּ
  english_pob_choice: to possess it
  chosen_spanish: para poseerla
  alternatives_spanish:
  - para tomar posesión de ella
  - para heredarla
  lexicon: HALOT
  rationale: ירשׁ aquí denota entrar en posesión de la tierra. ‘Poseerla’ es breve y fiel; ‘heredarla’ podría inclinar el sentido hacia recepción pasiva.
- source_word: חֲלוּצִים
  english_pob_choice: armed
  chosen_spanish: armados
  alternatives_spanish:
  - equipados para la batalla
  - preparados para la guerra
  lexicon: HALOT
  rationale: El término describe a hombres preparados para acción militar. ‘Armados’ preserva la fuerza concreta y la brevedad del mandato.
- source_word: תַּעַבְרוּ
  english_pob_choice: You shall cross over
  chosen_spanish: Cruzarán
  alternatives_spanish:
  - Pasarán
  - Deberán cruzar
  lexicon: HALOT
  rationale: El imperfecto en contexto exhortativo/mandatorio se vierte como futuro de mandato en español, que comunica orden con naturalidad.
- source_word: לִפְנֵי
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - ante
  - en frente de
  lexicon: HALOT
  rationale: En contexto militar, ‘delante de’ expresa con claridad ir en vanguardia.
- source_word: אֲחֵיכֶם
  english_pob_choice: your brothers
  chosen_spanish: sus hermanos
  alternatives_spanish:
  - sus hermanos
  - sus compatriotas
  lexicon: HALOT
  rationale: Se conserva el parentesco masculino literal. ‘Sus hermanos’ mantiene el vínculo representativo del hebreo sin neutralizarlo.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Israel
  lexicon: HALOT
  rationale: Se mantiene la estructura idiomática hebrea de forma transparente; ‘los hijos de Israel’ reproduce la apposición del texto fuente.
- source_word: כָּל בְּנֵי חָיִל
  english_pob_choice: all the men of valor
  chosen_spanish: todos los hombres de valor
  alternatives_spanish:
  - todos los guerreros
  - todos los hombres valientes
  lexicon: HALOT
  rationale: חַיִל aquí refiere capacidad/valor militar. ‘Hombres de valor’ conserva el sentido bélico y la referencia a combatientes capaces, no solo a valentía interior.
theological_decisions:
- issue: El nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - SEÑOR
  rationale: El texto hebreo usa explícitamente el Tetragrámaton. Siguiendo la política del proyecto, se conserva el nombre propio divino en lugar de sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Lenguaje masculino representativo en el mandato militar
  english_pob_reading: your brothers ... the sons of Israel ... all the men of valor
  chosen_spanish_reading: sus hermanos ... los hijos de Israel ... todos los hombres de valor
  alternative_spanish_readings:
  - sus compatriotas ... los israelitas ... todos los guerreros
  - sus hermanos y hermanas ... el pueblo de Israel ... todas las personas valerosas
  rationale: El hebreo usa términos masculinos en un contexto de movilización militar. Se preserva esa forma representativa para no borrar el marcaje del original ni suavizar la referencia a combatientes.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: La redacción española sigue el sentido del hebreo directo y el ajuste del audit trail inglés que eliminó el redundante 'it' en 'to possess'. Se optó por una construcción natural en español ('para poseerla') que conserva el referente femenino de 'la tierra'.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ para יְהוָה conforme al estándar del proyecto.
  - 'Se conserva la estructura repetitiva y apposicional del hebreo: ‘sus hermanos, los hijos de Israel’.'
  - ‘Armados’ y ‘hombres de valor’ preservan el matiz militar del versículo.
  - El futuro ‘Cruzarán’ funciona como mandato en español y corresponde al imperfecto exhortativo del hebreo.
