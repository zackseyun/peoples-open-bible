translation:
  language: es
  text: Reúne a todas las tribus de Jacob[a], y que hereden como en tiempos antiguos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El paralelo griego de este versículo dice, en cambio: «En medio de los nobles no te igualés, y cuando otro habla no hables demasiado». Esto parece reflejar otra línea textual o una distinta alineación del versículo.'
    reason: textual_variant
lexical_decisions:
- source_word: אסוף
  english_pob_choice: Gather
  chosen_spanish: Reúne
  alternatives_spanish:
  - Junta
  - Convoca
  - Agrupa
  lexicon: HALOT
  rationale: El imperativo pide traer de vuelta o juntar lo disperso; «reúne» expresa bien esa fuerza exhortativa en español natural sin perder el matiz de congregación.
- source_word: כל שבטי יעקב
  english_pob_choice: all the tribes of Jacob
  chosen_spanish: todas las tribus de Jacob
  alternatives_spanish:
  - cada una de las tribus de Jacob
  - todas las tribus de Israel
  lexicon: HALOT
  rationale: Se conserva la referencia genealógica y pactual a Jacob, siguiendo de cerca la construcción del hebreo y la decisión inglesa de no sustituirla por una formulación más general.
- source_word: ויתנחלו
  english_pob_choice: let them inherit
  chosen_spanish: que hereden
  alternatives_spanish:
  - que reciban su herencia
  - que posean su herencia
  - que se les asigne una herencia
  lexicon: HALOT
  rationale: El verbo en esta línea expresa entrar en posesión de una heredad; «que hereden» es la forma más directa y fiel al hebreo, sin añadir un objeto explícito que el texto no formula.
- source_word: כימי קדם
  english_pob_choice: as in former days
  chosen_spanish: como en los días antiguos
  alternatives_spanish:
  - como en tiempos antiguos
  - como en los días de antaño
  - como en los días pasados
  lexicon: HALOT
  rationale: La expresión idiomática mira hacia un tiempo anterior/restaurado; «días antiguos» mantiene el tono bíblico y el sentido retrospectivo del original.
theological_decisions:
- issue: Divergencia textual entre el hebreo conservado y el paralelo griego
  english_pob_reading: Translate the extant Hebrew as the primary text for this verse, while noting the Greek parallel reflects a substantially different line.
  chosen_spanish_reading: Traducir el hebreo conservado como texto principal y consignar en nota que el paralelo griego ofrece otra línea muy distinta.
  alternative_spanish_readings:
  - 'Seguir el griego: «No te igualés con los nobles, y cuando otro habla, no hables demasiado».'
  - Intentar armonizar ambos testigos en una sola paráfrasis.
  rationale: La línea hebrea es una súplica de restauración; el griego transmite una advertencia sapiencial distinta. Para no borrar la tensión documental, el cuerpo principal sigue el hebreo y la nota preserva el testimonio griego como variante textual sustancial.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives; preserve source uncertainty honestly.'
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB inglés, que simplificó «let them receive their inheritance» a «let them inherit» para reflejar con mayor cercanía el verbo hebreo y no introducir un objeto explícito no presente en la fuente. La versión española adopta esa simplificación con «que hereden».
  spanish_consistency_notes:
  - Se mantiene «Jacob» en lugar de sustituirlo por «Israel», porque la fuente hebrea y el texto inglés conservan esa designación ancestral.
  - «Hereden» se usa como verbo de posesión hereditaria, no como simple metáfora de obtener algo.
  - La nota al pie se ancla en el versículo con [a] para preservar la variante textual griega sin mezclarla con el texto principal.
