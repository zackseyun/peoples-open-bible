source:
  edition: Charles 1908 Greek Versions (pages 232-243, Gad pilot)
  text: 2. Οὐ γὰρ θέλει ἀκούειν Γλόγων⁵ ἐντολῶν⁶ αὐτοῦ περὶ ἀγάπης *τοῦ πλησίον⁷* *Γκαὶ¹ εἰς Θεὸν ἁμαρτάνει⁸.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/gad/004/002.yaml
  text: For it does not want to hear the words of his commandments concerning love for his neighbor, and it sins against God.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:55Z'
    unchanged: false
    changes_summary: Changed 'love of neighbor' to 'love for his neighbor' for smoother, more natural English while preserving the source sense.
translation:
  language: es
  text: Pues no quiere oír las palabras de sus mandamientos[a] sobre el amor al prójimo[b], y peca contra Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit. 'palabras de sus mandamientos'; doble genitivo griego que enfatiza el contenido verbal de los preceptos divinos.
    reason: lexical_alternative
  - marker: b
    text: 'Griego ἀγάπη τοῦ πλησίον: lit. ''amor del prójimo'', genitivo objetivo = ''amor hacia el prójimo''. Tradición bíblica española lo fija como ''amor al prójimo''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐ ... θέλει ἀκούειν
  english_pob_choice: it does not want to hear
  chosen_spanish: no quiere oír
  alternatives_spanish:
  - no quiere escuchar
  - rehúsa oír
  lexicon: BDAG
  rationale: '''Oír'' es la rendición natural de ἀκούειν con θέλει como verbo modal de voluntad.'
- source_word: λόγων ἐντολῶν αὐτοῦ
  english_pob_choice: the words of his commandments
  chosen_spanish: las palabras de sus mandamientos
  alternatives_spanish:
  - las palabras de sus preceptos
  - los dichos de sus mandatos
  lexicon: LSJ
  rationale: Conserva el genitivo doble griego sin parafrasearlo.
- source_word: περὶ ἀγάπης τοῦ πλησίον
  english_pob_choice: concerning love for his neighbor
  chosen_spanish: sobre el amor al prójimo
  alternatives_spanish:
  - acerca del amor al prójimo
  - tocante al amor por el prójimo
  lexicon: BDAG
  rationale: '''El amor al prójimo'' es la fórmula bíblica tradicional española para ἀγάπη τοῦ πλησίον; el revision_pass inglés se acercó a este sentido con ''love for his neighbor''.'
- source_word: εἰς Θεὸν ἁμαρτάνει
  english_pob_choice: it sins against God
  chosen_spanish: peca contra Dios
  alternatives_spanish:
  - ofende a Dios
  lexicon: BDAG
  rationale: '''Pecar contra Dios'' es la rendición tradicional del griego ἁμαρτάνει εἰς con sentido teológico.'
translation_notes:
  revision_awareness: El revision_pass cambió 'love of neighbor' a 'love for his neighbor' por naturalidad. En español 'el amor al prójimo' es la formulación bíblica estándar y captura el genitivo objetivo del griego sin necesidad de 'su prójimo'.
  spanish_consistency_notes:
  - '''el odio'' (sujeto implícito de los verbos en este verso, continuación del cap. 4:1).'
  - '''Dios'' para Θεός sin artículo.'
  - '''el prójimo'' como rendición fija de ὁ πλησίον.'
