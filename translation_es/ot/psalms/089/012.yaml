  glossary_alignment: No hay conflictos con la terminología del proyecto. El verso no contiene nombres divinos ni términos teológicos sensibles que requieran ajuste glosarial. Las decisiones para «los cielos», «la tierra», «el mundo» y «plenitud» están alineadas con el audit trail.
