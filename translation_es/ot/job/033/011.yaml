translation:
  language: es
  text: Él pone mis pies en el cepo[a]; vigila todos mis caminos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «guarda». El verbo hebreo puede significar vigilar, guardar u observar; aquí el contexto favorece una vigilancia hostil o judicial, no una protección benevolente.
    reason: lexical_alternative
lexical_decisions:
- source_word: יָשֵׂם
  english_pob_choice: puts
  chosen_spanish: pone
  alternatives_spanish:
  - coloca
  - pone en
  lexicon: HALOT
  rationale: El verbo שׂים expresa la acción concreta de poner/colocar. «Pone» es natural en español y conserva la imagen física de la acción sobre los pies.
- source_word: בַּסַּד
  english_pob_choice: in the stocks
  chosen_spanish: en el cepo
  alternatives_spanish:
  - en los cepos
  - en el bloque
  - en las prisiones para los pies
  lexicon: HALOT
  rationale: סַד designa un instrumento de sujeción para los pies. «Cepo» comunica bien en español la idea de inmovilización y castigo, sin suavizar la imagen.
- source_word: רַגְלַי
  english_pob_choice: my feet
  chosen_spanish: mis pies
  alternatives_spanish:
  - mi pie
  - mis plantas
  lexicon: HALOT
  rationale: La forma hebrea con sufijo de primera persona señala naturalmente ambos pies; en español, el plural «mis pies» es el equivalente idiomático más claro.
- source_word: יִשְׁמֹר
  english_pob_choice: he watches
  chosen_spanish: vigila
  alternatives_spanish:
  - guarda
  - observa
  - vela por
  lexicon: HALOT
  rationale: שׁמר puede significar guardar, vigilar u observar. Aquí, siguiendo el contexto de vigilancia hostil o judicial, «vigila» expresa mejor la supervisión atenta sin sugerir protección benevolente.
- source_word: כָּל
  english_pob_choice: all
  chosen_spanish: todos
  alternatives_spanish:
  - cada
  lexicon: HALOT
  rationale: El cuantificador total se refleja bien con «todos», que combina naturalmente con «caminos».
- source_word: אָרְחֹתַי
  english_pob_choice: my paths
  chosen_spanish: mis caminos
  alternatives_spanish:
  - mis sendas
  - mis pasos
  - mis rutas
  lexicon: HALOT
  rationale: אֹרַח conserva la metáfora de trayectoria o curso de vida. «Caminos» es el equivalente español más natural y mantiene la imagen sin explicitarla de más.
theological_decisions:
- issue: Si שׁמר debe leerse como protección o como vigilancia adversa en la segunda cola
  english_pob_reading: 'punitive surveillance: ''he watches all my paths'''
  chosen_spanish_reading: 'vigilancia adversa: «vigila todos mis caminos»'
  alternative_spanish_readings:
  - «guarda todos mis caminos»
  - «vela por todos mis caminos»
  rationale: En el contexto inmediato se describe una experiencia de confinamiento y escrutinio, no de cuidado protector. Por eso se preserva la tensión del texto con una traducción que suena a control y observación, no a amparo.
  doctrine_reference: Preservar la tensión teológica del pasaje; primacía del hebreo sobre la tradición interpretativa.
translation_notes:
  revision_awareness: La revisión más reciente quedó sin cambios y el cotejo externo reportó alta concordancia, por lo que este borrador mantiene la lectura del POB inglés sin ajustar la tensión semántica documentada.
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma general del proyecto cuando corresponde al Tetragrámaton, pero en este versículo no aparece el nombre divino.
  - Se mantuvo el paralelismo concreto del hebreo con imágenes físicas («cepo», «caminos») para conservar la fuerza poética.
  - No se introdujo lenguaje de protección en la segunda cola para no deshacer la ambigüedad hostil documentada por el audit trail.
