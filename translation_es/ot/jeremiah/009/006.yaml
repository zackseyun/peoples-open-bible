    reason: lexical_alternative
  - marker: b
    text: O, «pues, ¿cómo podría yo hacer de otra manera?».
    reason: alternative_reading
  revision_rationale: Se ajustó la fórmula profética a «así dice Yahvé» para un registro bíblico español más natural, se movió la nota sobre el modismo hebreo al lugar correcto («hija»), y se corrigió la puntuación final. Se mantuvo el resto del texto porque preserva adecuadamente el sentido fuente y las decisiones léxicas documentadas.
