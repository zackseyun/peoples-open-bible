translation:
  language: es
  text: 'Entonces el faraón dijo a José[a]: «Yo soy Faraón[b], y sin ti nadie alzará su mano o su pie en toda la tierra de Egipto»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «aparte de ti», subrayando que en Egipto nadie podía actuar independientemente de la autoridad de José.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «alzará su mano o su pie»; un modismo para emprender cualquier acción o hacer cualquier movimiento.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  lexicon: HALOT
  rationale: El waw consecutivo avanza la narración; «Entonces» conserva la secuencia narrativa de forma natural en español.
- source_word: פַּרְעֹה
  english_pob_choice: Pharaoh
  chosen_spanish: el faraón
  alternatives_spanish:
  - Faraón
  lexicon: HALOT
  rationale: Se mantiene el título real en forma normalizada y legible en español, coherente con el uso narrativo de José.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  - para
  lexicon: HALOT
  rationale: Preposición normal para introducir al destinatario en español.
- source_word: אֲנִי פַרְעֹה
  english_pob_choice: I am Pharaoh
  chosen_spanish: Yo soy el faraón
  alternatives_spanish:
  - Yo soy Faraón
  - Yo soy el faraón mismo
  lexicon: HALOT
  rationale: La cláusula sin verbo en hebreo expresa autoidentificación enfática. En español, «Yo soy el faraón» conserva la fuerza directa sin añadir interpretación excesiva.
- source_word: וּבִלְעָדֶיךָ
  english_pob_choice: without you
  chosen_spanish: fuera de ti
  alternatives_spanish:
  - sin ti
  - aparte de ti
  - excepto por tu autoridad
  lexicon: HALOT
  rationale: «Fuera de ti» comunica la exclusión de José de manera idiomática en español y deja implícita la dependencia de su autoridad, como sugiere el contexto.
- source_word: לֹא יָרִים
  english_pob_choice: will lift up
  chosen_spanish: alzará
  alternatives_spanish:
  - levantará
  - alzará en alto
  lexicon: HALOT
  rationale: El verbo hebreo en causativo conserva la imagen concreta de levantar. «Alzará» es natural en español y mantiene la fuerza del movimiento.
- source_word: אִישׁ
  english_pob_choice: man
  chosen_spanish: nadie
  alternatives_spanish:
  - ningún hombre
  - ninguna persona
  lexicon: HALOT
  rationale: Aunque el hebreo usa «hombre», el alcance es genérico. En español, «nadie» expresa mejor la prohibición universal sin perder el sentido.
- source_word: אֶת יָדוֹ וְאֶת רַגְלוֹ
  english_pob_choice: his hand or his foot
  chosen_spanish: su mano ni su pie
  alternatives_spanish:
  - su mano o su pie
  - su mano y su pie
  lexicon: HALOT
  rationale: Se conserva el idiomatismo corporal hebreo. En una prohibición negativa, «ni... ni...» comunica con naturalidad la totalidad de la restricción, sin borrar la imagen original.
- source_word: בְּכָל אֶרֶץ מִצְרַיִם
  english_pob_choice: in all the land of Egypt
  chosen_spanish: en toda la tierra de Egipto
  alternatives_spanish:
  - en todo el país de Egipto
  - por toda la tierra de Egipto
  lexicon: HALOT
  rationale: «Tierra» refleja el valor territorial de אֶרֶץ y conserva el tono bíblico sin sonar arcaico en exceso.
theological_decisions:
- issue: Alcance de la autoridad de José dentro de Egipto
  english_pob_reading: without you no man will lift up his hand or his foot in all the land of Egypt
  chosen_spanish_reading: fuera de ti nadie alzará su mano ni su pie en toda la tierra de Egipto
  alternative_spanish_readings:
  - sin ti nadie levantará la mano o el pie en toda la tierra de Egipto
  - excepto por tu autoridad nadie actuará en toda la tierra de Egipto
  rationale: El español elegido mantiene la afirmación de exclusividad de autoridad que el inglés POB destaca; no se reduce a una simple ausencia física de José, sino a la dependencia administrativa expresada por el contexto.
  doctrine_reference: Autoridad delegada en la providencia de Dios; lectura narrativa de Génesis 41
- issue: Idiomático corporal de «mano y pie»
  english_pob_reading: Hebrew “lift up his hand or his foot,” an idiom for taking any action or making any move.
  chosen_spanish_reading: alzará su mano ni su pie
  alternative_spanish_readings:
  - levantará su mano o su pie
  - hará cualquier cosa
  rationale: Se preserva el tropo corporal porque el POB inglés lo documenta como modismo. El español usa una negación coordinada natural, manteniendo la imagen y la idea de acción o movimiento.
  doctrine_reference: Nota cultural/idiomática, no doctrinal; fidelidad al modismo hebreo
translation_notes:
  revision_awareness: 'El texto sigue de cerca el acuerdo alto del control comparativo: no hay revisiones aplicadas al inglés POB base. La versión española conserva la estructura narrativa, la autoidentificación enfática de Faraón, la exclusividad de la autoridad concedida a José y la nota idiomática de «mano/pie» sin suavizarla indebidamente.'
  spanish_consistency_notes:
  - Se usa «faraón» en minúscula cuando funciona como título común en español, salvo inicio de oración.
  - Se mantiene «tierra de Egipto» para reflejar אֶרֶץ con el registro bíblico habitual.
  - La negación «nadie ... ni ... ni ...» expresa adecuadamente el alcance total de la prohibición en español.
  - Se preserva el nombre propio «José» y el nombre divino no aparece en este versículo.
