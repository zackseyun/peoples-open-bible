base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/048/044.yaml
  text: He who flees from the terror will fall into the pit[a], and he who comes up from the pit will be caught in the snare; for I will bring upon her, upon Moab, the year of their punishment, declares Yahweh.
