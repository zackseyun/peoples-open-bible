review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el hebreo en su estructura principal: Faraón percibe el alivio, endurece su propio corazón, no escucha a Moisés y Aarón, y esto ocurre conforme a lo dicho por Yahvé. También preserva correctamente el nombre divino como «Yahvé» y la agencia de Faraón en el endurecimiento. Sin embargo, la nota léxica introduce un matiz menos preciso con «reposo» y la alternativa «respiro» suena algo menos natural que «respiro/ respiro temporal» o «respiro» explicado como espacio para respirar; además, en las decisiones léxicas aparece el anglicismo/error «respite», que muestra una pequeña inconsistencia editorial.'
  spanish_quality_summary: El texto principal es claro, natural y digno en español. «Pero cuando Faraón vio que había alivio, endureció su corazón y no los escuchó, tal como Yahvé había dicho» es plenamente legible y fiel. La única reparación necesaria es de pulido editorial en la nota, para alinear mejor los matices semánticos con el hebreo y evitar formulaciones menos naturales o menos exactas.
  glossary_alignment: 'Alineación buena con el glosario del proyecto: יְהוָה -> «Yahvé» está correctamente aplicado; el idiomatismo וְהַכְבֵּד אֶת לִבּוֹ -> «endureció su corazón» está bien resuelto; וְלֹא שָׁמַע אֲלֵהֶם -> «no los escuchó» es aceptable y fiel al hebreo. No hay conflictos relevantes de terminología teológica.'
  issues:
  - severity: low
    issue: La nota al pie usa «reposo» como alternativa semántica de הָרְוָחָה.
    rationale: El campo semántico aquí apunta a alivio, tregua, respiro o cese de presión; «reposo» puede sugerir descanso en un sentido distinto y menos contextual para la plaga.
  - severity: low
    issue: En las decisiones léxicas aparece la alternativa «que había respite».
    rationale: «Respite» quedó sin traducir al español; aunque no afecta el texto principal, conviene corregir la consistencia editorial del registro.
  revised_spanish_text: Pero cuando Faraón vio que había alivio[a], endureció su corazón y no los escuchó, tal como Yahvé había dicho.
  revised_footnotes:
  - marker: a
    text: O «había tregua». El término hebreo puede denotar alivio, respiro o una disminución de la presión.
    reason: lexical_alternative
  revision_rationale: Se mantiene intacto el texto principal porque es fiel, claro y natural. Se ajusta únicamente la nota al pie para reflejar con mayor precisión el valor de הָרְוָחָה en contexto y evitar un matiz menos exacto como «reposo». No se requiere adjudicación adicional.
