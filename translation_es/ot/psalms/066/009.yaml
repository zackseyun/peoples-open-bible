revisions:
- from: el que mantiene[a] nuestra vida[b] en vida[c], y no ha permitido que resbalen nuestros pies[d].
  to: el que mantiene[a] nuestra vida[b] entre los vivientes[c], y no ha permitido que resbalen nuestros pies[d].
  rationale: Se hizo una reparación pequeña para mejorar la naturalidad del español sin apartarse del hebreo ni del expediente inglés. 'Entre los vivientes' evita la torpeza de 'vida en vida' y sigue siendo una alternativa documentada para בַּחַיִּים; la nota preserva la opción 'en vida' que apareció en la revisión inglesa. También se ajustó la nota de נֶפֶשׁ para reflejar mejor el rango léxico conservado por el POB.
