translation:
  language: es
  text: un macho cabrío para ofrenda por el pecado;[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O también: ''ofrenda de purificación''. El hebreo חַטָּאת en contextos sacrificiales puede referirse a la ofrenda que trata el pecado y la impureza ritual.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׂעִיר עִזִּים
  english_pob_choice: male goat
  chosen_spanish: macho cabrío
  alternatives_spanish:
  - cabra macho
  - chivo
  - macho de cabra
  lexicon: HALOT
  rationale: El hebreo designa un macho de la especie caprina apto para sacrificio. 'Macho cabrío' conserva la especificidad zoológica y el registro bíblico sin volverlo artificial en español.
- source_word: אֶחָד
  english_pob_choice: one
  chosen_spanish: uno
  alternatives_spanish:
  - un
  - un solo
  lexicon: HALOT
  rationale: Se mantiene el valor cardinal explícito del inventario ritual. En español, 'un' queda integrado naturalmente con el sustantivo, pero el sentido numérico sigue presente.
- source_word: לְחַטָּאת
  english_pob_choice: for a sin offering
  chosen_spanish: para ofrenda por el pecado
  alternatives_spanish:
  - como ofrenda por el pecado
  - para ofrenda de purificación
  lexicon: HALOT
  rationale: En contexto sacrificial, חַטָּאת puede referirse a la ofrenda que trata el pecado y la impureza ritual. 'Ofrenda por el pecado' comunica bien el sentido cultual en español, mientras 'ofrenda de purificación' preserva la alternativa léxica documentada.
theological_decisions:
- issue: Sentido sacrificial de חַטָּאת
  english_pob_reading: sin offering
  chosen_spanish_reading: ofrenda por el pecado
  alternative_spanish_readings:
  - ofrenda de purificación
  - ofrenda expiatoria
  rationale: La lista cultual de Números 7 apunta a la ofrenda prescrita. En español, 'ofrenda por el pecado' mantiene el vínculo con la convención bíblica y deja visible la tensión con el matiz de purificación ritual, sin resolverla en exceso.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather than resolve it; consistency of key terms, or documented exception.'
translation_notes:
  revision_awareness: Revisión reciente sin cambios sustantivos; el inglés POB mantuvo 'sin offering' y su nota alternativa, con acuerdo alto en la revisión. La versión española conserva esa misma tensión léxica en forma natural para el español.
  spanish_consistency_notes:
  - Se conserva el estilo enumerativo breve propio de Números 7.
  - '''Macho cabrío'' traduce de manera precisa el animal sacrificial sin sustituirlo por un término más general.'
  - Se evitó 'SEÑOR' u otras sustituciones no pertinentes, y no hay nombres divinos en este versículo.
  - La nota mantiene la alternativa documentada entre ofrenda por el pecado y ofrenda de purificación.
