translation:
  language: es
  text: Como el combustible de un fuego[a], así arderá; conforme a la fuerza de un hombre, así será su ira; y conforme a su riqueza levantará su enojo[b], y conforme a la intensidad del conflicto arderá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «leña» en lugar de «combustible» para ὕλην; el griego se refiere más literalmente al material que alimenta el fuego.
    reason: lexical_alternative
  - marker: b
    text: La última cláusula también puede entenderse de manera más interpretativa como «conforme a cuán severo sea el conflicto, así arderá».
    reason: lexical_alternative
lexical_decisions:
- source_word: ὕλην
  english_pob_choice: fuel
  chosen_spanish: combustible
  alternatives_spanish:
  - leña
  - material
  lexicon: LSJ
  rationale: En el contexto de πυρός y ἐκκαυθήσεται, ὕλη designa la materia que alimenta el fuego. «Combustible» conserva esa función con naturalidad en español y evita restringirlo indebidamente a «leña» o volverlo demasiado general como «material».
- source_word: ἐκκαυθήσεται
  english_pob_choice: will be kindled
  chosen_spanish: será encendido
  alternatives_spanish:
  - arderá
  - será inflamado
  - estallará en llamas
  lexicon: LSJ
  rationale: El futuro pasivo expresa ser prendido o puesto en llamas. «Será encendido» mantiene la imagen del fuego y puede repetirse en ambos miembros sin cargar de interpretación la primera ocurrencia.
- source_word: ἰσχὺν
  english_pob_choice: strength
  chosen_spanish: fuerza
  alternatives_spanish:
  - poder
  - mientras
  - capacidad
  lexicon: LSJ
  rationale: Ἰσχύς denota fuerza o capacidad. «Fuerza» es la equivalencia española más directa y natural para el paralelo proverbial entre la capacidad de una persona y la medida de su ira.
- source_word: ἀνθρώπου
  english_pob_choice: a man's
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  - un ser humano
  lexicon: LSJ
  rationale: El griego usa el singular genérico ἀνθρώπου, pero el verso conserva una formulación proverbial masculina singular. «Un hombre» reproduce esa forma representativa sin neutralizarla innecesariamente.
- source_word: θυμός
  english_pob_choice: wrath
  chosen_spanish: ira
  alternatives_spanish:
  - enojo
  - furor
  lexicon: LSJ
  rationale: θυμός puede expresar pasión airada o furia. «Ira» mantiene un registro digno y distingue este término del siguiente ὀργή, sin forzar una diferencia excesivamente técnica.
- source_word: πλοῦτον
  english_pob_choice: wealth
  chosen_spanish: riqueza
  alternatives_spanish:
  - riquezas
  - bienes
  lexicon: LSJ
  rationale: πλοῦτος se refiere a recursos materiales o medios de vida. «Riqueza» es claro en español y comunica bien el aumento de escala en el proverbio.
- source_word: ἀνυψώσει
  english_pob_choice: will raise up
  chosen_spanish: levantará
  alternatives_spanish:
  - alzará
  - aumentará
  - provocará
  lexicon: LSJ
  rationale: El verbo significa literalmente levantar o alzar. «Levantará» conserva la metáfora visible y evita reducirlo a una explicación abstracta como «aumentará».
- source_word: ὀργήν
  english_pob_choice: anger
  chosen_spanish: enojo
  alternatives_spanish:
  - ira
  - indignación
  lexicon: LSJ
  rationale: Ὀργή suele denotar enojo o indignación. «Enojo» ofrece una distinción útil frente a «ira» para θυμός, manteniendo una diferenciación léxica sin volverla artificiosa.
- source_word: στερέωσιν
  english_pob_choice: intensity
  chosen_spanish: intensidad
  alternatives_spanish:
  - firmeza
  - solidez
  - severidad
  lexicon: LSJ
  rationale: Στερέωσις denota firmeza, solidez o carácter asentado; en combinación con τῆς μάχης apunta a la fuerza o intensidad del conflicto. «Intensidad» sigue de cerca la revisión auditada del inglés y funciona naturalmente en español.
- source_word: μάχης
  english_pob_choice: conflict
  chosen_spanish: conflicto
  alternatives_spanish:
  - batalla
  - pleito
  - contienda
  lexicon: LSJ
  rationale: Μάχη puede significar batalla o pelea, pero en el contexto sapiencial de la ira interpersonal «conflicto» capta mejor el sentido amplio sin militarizar el verso.
theological_decisions:
- issue: Diferenciar los dos términos griegos para la ira, θυμός y ὀργή
  english_pob_reading: θυμός = 'wrath'; ὀργή = 'anger'
  chosen_spanish_reading: θυμός = «ira»; ὀργή = «enojo»
  alternative_spanish_readings:
  - θυμός = «enojo»; ὀργή = «ira»
  - traducir ambos como «ira»
  rationale: El griego usa dos vocablos emparentados pero distintos para la ira. Mantener una diferencia leve en español ayuda a reflejar la textura del original y evita borrar una tensión léxica que el POB inglés también preserva.
  doctrine_reference: DOCTRINE.md §Translation philosophy 5
- issue: Mantener el singular genérico ἀνθρώπου sin neutralizarlo por completo
  english_pob_reading: a man's
  chosen_spanish_reading: un hombre
  alternative_spanish_readings:
  - una persona
  - alguien
  rationale: El verso adopta forma proverbial singular con tono masculino representativo. «Un hombre» conserva esa forma del original y sigue la práctica de no borrar marcadores gramaticales presentes en la fuente.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del inglés POB, que ajustó la última expresión de «firmness of the conflict» a «intensity of the conflict» por ser más natural y ajustada al contexto de στερέωσιν. La redacción española refleja esa decisión auditada con «intensidad del conflicto», manteniendo la estructura paralela del verso.
  spanish_consistency_notes:
  - Se prefirió «Yahvé» en este proyecto cuando el texto lo requiera, pero aquí no aparece el nombre divino.
  - Se evitó «Cristo» y terminología cristológica porque el pasaje no la contiene.
  - Se mantuvo el paralelismo de dos cláusulas con «será encendido» para conservar la repetición metafórica del fuego.
  - Se empleó un registro digno y bíblico, sin arcaísmos innecesarios.
