translation:
  language: es
  text: Pero por tales obras enseñaste a tu pueblo que el justo debe ser benévolo con las personas[a], y llenaste de buena esperanza a tus hijos[b], porque concedes arrepentimiento por los pecados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el justo debe ser humano».'
    reason: lexical_alternative
  - marker: b
    text: «Tus hijos» puede entenderse de manera representativa como los hijos o el pueblo de Dios, pero el griego dice específicamente «hijos».
    reason: lexical_alternative
lexical_decisions:
- source_word: διὰ τῶν τοιούτων ἔργων
  english_pob_choice: by such deeds
  chosen_spanish: por tales obras
  alternatives_spanish:
  - por estas obras
  - mediante tales obras
  - por obras de ese tipo
  lexicon: LSJ
  rationale: διά con genitivo expresa medio o instrumento; en español, «por» comunica bien ese valor. «Obras» conserva el sentido concreto de actos realizados por Dios, y «tales» reproduce τοιούτων sin añadir matices.
- source_word: δεῖ
  english_pob_choice: must
  chosen_spanish: debe
  alternatives_spanish:
  - es necesario que
  - tiene que
  - debe ser
  lexicon: BDAG
  rationale: El verbo expresa necesidad moral o lógica. «Debe» es natural en español y mantiene esa fuerza obligatoria sin recargar la frase.
- source_word: τὸν δίκαιον
  english_pob_choice: the righteous
  chosen_spanish: el justo
  alternatives_spanish:
  - la persona justa
  - el recto
  - el justo hombre
  lexicon: BDAG
  rationale: El singular masculino griego funciona de manera representativa. «El justo» conserva esa forma breve y genérica en español sin introducir «hombre» donde el sentido ya es general.
- source_word: φιλάνθρωπον
  english_pob_choice: humane
  chosen_spanish: humano
  alternatives_spanish:
  - benévolo
  - bondadoso con las personas
  - amable con la humanidad
  lexicon: LSJ
  rationale: El término apunta a benevolencia hacia los seres humanos. «Humano» es breve, claro y suficientemente cercano al valor ético del adjetivo, aunque puede sonar amplio; por eso se mantiene la nota alternativa.
- source_word: εὐέλπιδας
  english_pob_choice: full of good hope
  chosen_spanish: de buena esperanza
  alternatives_spanish:
  - llenos de buena esperanza
  - esperanzados
  - con buena esperanza
  lexicon: LSJ
  rationale: La forma griega sugiere una cualidad de esperanza positiva. «De buena esperanza» conserva la densidad nominal del griego y resulta natural en español bíblico.
- source_word: τοὺς υἱούς σου
  english_pob_choice: your sons
  chosen_spanish: a tus hijos
  alternatives_spanish:
  - a tus hijos varones
  - a tus hijos, tus hijos varones
  - a tus hijos / a tus hijos varones
  lexicon: BDAG
  rationale: Aunque el griego dice literalmente «tus hijos/ hijos varones», el contexto permite una referencia representativa a los miembros del pueblo de Dios. «Tus hijos» es más natural en español y corresponde a la revisión inglesa que también optó por una forma más idiomática.
- source_word: διδοῖς ἐπὶ ἁμαρτήμασιν μετάνοιαν
  english_pob_choice: you grant repentance for sins
  chosen_spanish: das arrepentimiento por los pecados
  alternatives_spanish:
  - concedes arrepentimiento por los pecados
  - das arrepentimiento a causa de los pecados
  - otorgas arrepentimiento por los pecados
  lexicon: BDAG
  rationale: En este contexto μετάνοια expresa la provisión divina de arrepentimiento en relación con los pecados. «Das arrepentimiento» sigue de cerca la estructura del original y preserva la iniciativa divina; «por los pecados» refleja la relación marcada por ἐπὶ.
theological_decisions:
- issue: Forma representativa del singular griego en τὸν δίκαιον
  english_pob_reading: the righteous
  chosen_spanish_reading: el justo
  alternative_spanish_readings:
  - la persona justa
  - el justo hombre
  rationale: Se conserva el singular masculino representativo del griego sin introducir una masculinidad especificada que el contexto no exige. «El justo» mantiene la fuerza proverbial o general del enunciado.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Sentido de εὐέλπιδας aplicado a los destinatarios
  english_pob_reading: full of good hope
  chosen_spanish_reading: de buena esperanza
  alternative_spanish_readings:
  - llenos de buena esperanza
  - esperanzados
  rationale: 'La frase comunica el estado que Dios produce en sus hijos: una esperanza buena y firme. La formulación elegida mantiene la cualidad sin sobreexplicar su alcance teológico.'
  doctrine_reference: DOCTRINE.md §Translation philosophy 1
- issue: Sentido de μετάνοια en relación con la acción divina
  english_pob_reading: you grant repentance for sins
  chosen_spanish_reading: das arrepentimiento por los pecados
  alternative_spanish_readings:
  - das la posibilidad de arrepentirse por los pecados
  - concedes arrepentimiento por los pecados
  rationale: El texto enfatiza que Dios es quien da o concede arrepentimiento. «Das arrepentimiento» preserva la iniciativa divina y evita imponer una formulación doctrinal más desarrollada que el versículo no exige.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
translation_notes:
  revision_awareness: 'La redacción inglesa pasó de «the righteous man» a «the righteous» y de «your sons» a «your children» para sonar más natural sin perder el valor representativo. La versión española sigue esa misma línea: «el justo» y «tus hijos» conservan el paralelismo y la inteligibilidad, y «por tales obras» refleja el medio instrumental del griego con un español sobrio y publicable.'
  spanish_consistency_notes:
  - Se mantiene «Dios» implícito por el discurso directo en segunda persona; no se introduce «Señor» porque el griego no usa κύριος aquí.
  - «Arrepentimiento» se conserva para μετάνοια, en línea con el criterio del proyecto para contextos de cambio moral y retorno.
  - «Justo» y «hijos» conservan el paralelismo representativo del griego sin neutralizarlo innecesariamente.
  - La puntuación sigue el contraste del griego con coma fuerte antes de la cláusula causal final.
