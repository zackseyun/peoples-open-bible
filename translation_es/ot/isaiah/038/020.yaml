translation:
  language: es
  text: Yahvé está dispuesto a salvarme[a]; y tocaremos mis cantos con instrumentos de cuerda[b] todos los días de nuestras vidas, en la casa de Yahvé[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Yahvé me salvará», o más literalmente: «Yahvé, para salvarme». La expresión hebrea es elíptica.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «mi música» o «mis cantos de cuerda».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «en la casa de Yahvé».'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El texto hebreo usa el Tetragrámaton; en el proyecto POB en español se conserva el nombre divino como «Yahvé», evitando la sustitución por un título. «Jehová» se descarta por no corresponder al criterio doctrinal del proyecto y «el SEÑOR» por ocultar el nombre personal revelado en el original.
- source_word: לְהוֹשִׁיעֵנִי
  english_pob_choice: is ready to save me
  chosen_spanish: está dispuesto a salvarme
  alternatives_spanish:
  - me salvará
  - para salvarme
  - a salvarme
  lexicon: HALOT
  rationale: La construcción es elíptica y admite varias lecturas. En español, «está dispuesto a salvarme» comunica la idea de salvación inminente o intencional sin reducirla al infinitivo desnudo. Se conserva la tensión textual con una nota para las alternativas más literales.
- source_word: וּנְגִנוֹתַי
  english_pob_choice: my songs on stringed instruments
  chosen_spanish: mis cantos con instrumentos de cuerda
  alternatives_spanish:
  - mi música
  - mis cantos instrumentales
  - mi música de cuerdas
  lexicon: HALOT
  rationale: Se mantiene el posesivo y la referencia musical, pero en español «cantos con instrumentos de cuerda» resulta más natural que un calco como «música de cuerdas». Así se preserva tanto el contenido poético como el matiz instrumental indicado por el hebreo y por la línea siguiente.
- source_word: נְנַגֵּן
  english_pob_choice: we will play
  chosen_spanish: tocaremos
  alternatives_spanish:
  - haremos música
  - cantaremos
  - toquemos
  lexicon: HALOT
  rationale: El verbo en piel denota tocar instrumentos o hacer música. «Tocaremos» es la opción más directa en español y armoniza con «instrumentos de cuerda», evitando restringir indebidamente el sentido a «cantar».
- source_word: כָּל יְמֵי חַיֵּינוּ
  english_pob_choice: all the days of our lives
  chosen_spanish: todos los días de nuestra vida
  alternatives_spanish:
  - toda nuestra vida
  - todos los días de nuestras vidas
  lexicon: HALOT
  rationale: Se conserva el idiomatismo hebreo con una formulación natural en español. El singular «vida» suena más idiomático que el plural, aunque el hebreo posee un poseedor plural; la equivalencia funcional queda clara en contexto.
- source_word: עַל בֵּית יְהוָה
  english_pob_choice: at the house of Yahweh
  chosen_spanish: en la casa de Yahvé
  alternatives_spanish:
  - junto a la casa de Yahvé
  - en torno a la casa de Yahvé
  - ante la casa de Yahvé
  lexicon: HALOT
  rationale: La preposición עַל puede tener valor locativo amplio. Dado el español bíblico y la fluidez del verso, «en la casa de Yahvé» es una opción natural y plenamente reconocible; se conserva la alternativa de localización amplia mediante nota, siguiendo el audit trail inglés.
theological_decisions:
- issue: Tratamiento del nombre divino יהוה (YHWH)
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: 'Se sigue la política doctrinal del POB: el Tetragrámaton se translitera como nombre propio y no se sustituye por un título. En español, «Yahvé» es la forma estándar del proyecto y mantiene la referencia directa al nombre del pacto.'
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH'
translation_notes:
  revision_awareness: Se revisó el estado de auditoría más reciente (gpt-5.4, sin cambios) y el resumen de concordancia alta; no se detectaron revisiones pendientes. La redacción española mantiene el sentido del hebreo y las alternativas documentadas en el POB inglés.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma uniforme para יְהוָה.
  - Se mantiene la equivalencia poética sin sobrerreformular la construcción elíptica inicial.
  - «Tocaremos» y «instrumentos de cuerda» preservan el matiz musical sin perder naturalidad en español.
  - La nota c recoge la alternativa locativa, dado que עַל admite varias posibilidades en español.
