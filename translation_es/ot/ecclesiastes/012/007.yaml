translation:
  language: es
  text: y el polvo vuelve a la tierra, como era, y el espíritu[a] vuelve a Dios, quien lo dio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el aliento vuelve a Dios, quien lo dio». El hebreo רוּחַ puede significar «espíritu», «aliento» o «viento»; aquí el contexto de la muerte favorece «espíritu», aunque «aliento» sigue siendo una alternativa léxica plausible.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיָשֹׁב
  english_pob_choice: and returns
  chosen_spanish: vuelve
  alternatives_spanish:
  - volverá
  - retorna
  - regresa
  lexicon: HALOT
  rationale: El hebreo usa un imperfecto con valor gnómico/resultado inevitable; en español, el presente simple comunica mejor esa fuerza general y poética. «Vuelve» conserva la idea de retorno sin volver la frase demasiado interpretativa.
- source_word: הֶעָפָר
  english_pob_choice: the dust
  chosen_spanish: el polvo
  alternatives_spanish:
  - el polvo de la tierra
  - el polvo
  lexicon: HALOT
  rationale: «Polvo» es el equivalente natural en español para la imagen de mortalidad y mantiene el artículo definido del hebreo. En contexto funerario y de creación, comunica bien la sustancia terrenal del cuerpo.
- source_word: עַל הָאָרֶץ
  english_pob_choice: to the earth
  chosen_spanish: a la tierra
  alternatives_spanish:
  - sobre la tierra
  - a la tierra
  lexicon: HALOT
  rationale: Aunque על puede ser «sobre», con שוב expresa el destino de retorno. «A la tierra» suena natural en español y conserva la referencia a אֶרֶץ como tierra/territorio, no como אֲדָמָה.
- source_word: כְּשֶׁהָיָה
  english_pob_choice: as it was
  chosen_spanish: como era
  alternatives_spanish:
  - como fue
  - como antes
  lexicon: HALOT
  rationale: La cláusula compara el estado final con un estado previo. «Como era» es breve, fiel y fluido, sin añadir matices temporales que el hebreo no exige.
- source_word: וְהָרוּחַ
  english_pob_choice: and the spirit
  chosen_spanish: el espíritu
  alternatives_spanish:
  - el aliento
  - el viento
  lexicon: HALOT
  rationale: En este contexto de muerte y retorno a Dios, «espíritu» preserva el contraste con «polvo» y la dimensión personal/no material. Se mantiene abierta la alternativa lexical de «aliento» mediante nota, porque רוּחַ la permite.
- source_word: תָּשׁוּב
  english_pob_choice: returns
  chosen_spanish: vuelve
  alternatives_spanish:
  - volverá
  - regresa
  lexicon: HALOT
  rationale: Se repite שוב, por lo que conviene repetir el mismo verbo español para conservar el paralelismo. «Vuelve» mantiene la simetría con la primera cola del verso.
- source_word: אֶל הָאֱלֹהִים
  english_pob_choice: to God
  chosen_spanish: a Dios
  alternatives_spanish:
  - hacia Dios
  - para Dios
  lexicon: HALOT
  rationale: «A Dios» es la forma natural de movimiento hacia una persona divina en español y respeta el valor direccional de אֶל. No se conserva el artículo porque en español idiomático se omite con «Dios».
- source_word: אֲשֶׁר נְתָנָהּ
  english_pob_choice: who gave it
  chosen_spanish: quien lo dio
  alternatives_spanish:
  - que lo dio
  - quien le dio
  lexicon: HALOT
  rationale: El relativo identifica a Dios como el dador del espíritu. Se usa «lo» como referencia de género gramatical a «espíritu», aunque el antecedente hebreo es femenino; así se evita una traducción española marcada como «la dio», que sonaría menos natural.
theological_decisions:
- issue: Lectura de רוּחַ en el contexto de la muerte
  english_pob_reading: spirit
  chosen_spanish_reading: espíritu
  alternative_spanish_readings:
  - aliento
  - viento
  rationale: La contraposición entre el polvo que vuelve a la tierra y el espíritu que vuelve a Dios favorece «espíritu» en la línea principal. Sin embargo, la ambigüedad lexical del hebreo se preserva en nota para no resolverla artificialmente.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it)
- issue: Destino del ser humano al morir
  english_pob_reading: the spirit returns to God who gave it
  chosen_spanish_reading: el espíritu vuelve a Dios, quien lo dio
  alternative_spanish_readings:
  - el espíritu regresa a Dios, quien se lo dio
  - el aliento vuelve a Dios, quien lo dio
  rationale: La traducción conserva el paralelismo del verso y la afirmación sobria de que Dios es el dador de la vida/espíritu. No se añade una elaboración doctrinal sobre estado intermedio o inmortalidad del alma, porque el hebreo no lo especifica.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: Se siguió el estado de revisión más reciente sin cambios necesarios; la redacción española conserva el paralelismo del hebreo y la tensión léxica de רוּחַ documentada en el auditor inglés.
  spanish_consistency_notes:
  - Se usó «Yahvé» como terminología por defecto solo cuando el texto fuente lo requiera; en este versículo aparece אֱלֹהִים, por lo que corresponde «Dios».
  - Se mantuvo «espíritu» como término principal para רוּחַ, con nota de «aliento» para reflejar la ambigüedad documental.
  - Se preservó el paralelismo verbal con dos formas de «volver» para reproducir la estructura hebrea.
  - Se evitó «SEÑOR» y formulaciones doctrinalmente expansivas que no estén respaldadas por el verso.
