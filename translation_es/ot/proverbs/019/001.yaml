revisions:
- from: Mejor es el pobre que anda en su integridad que el de labios torcidos[a][b], y él es un necio.
  to: Mejor es el pobre que anda en su integridad[b] que el de habla torcida, y es un necio[a].
  rationale: Se ajustó la expresión de שְׂפָתָיו a 'habla' para evitar una imagen anatómica poco idiomática en español y reflejar mejor el sentido del hebreo según el audit trail. También se naturalizó la cláusula final eliminando el pronombre explícito y se corrigió la nota de lectura alternativa para que corresponda realmente a la opción documentada.
