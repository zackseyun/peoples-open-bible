translation:
  language: es
  text: Además, todo hombre[a] a quien Dios ha dado riqueza y bienes, y lo ha capacitado[b] para comer de ellos, y tomar su porción[c], y alegrarse en su trabajo, esto es don de Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'cada persona'. El hebreo dice literalmente 'todo hombre', con un singular masculino usado de manera genérica para los seres humanos.
    reason: lexical_alternative
  - marker: b
    text: O 'le ha dado poder', 'le ha concedido' o 'le ha permitido'. El verbo hebreo enfatiza la capacidad concedida por Dios para disfrutar de lo poseído.
    reason: lexical_alternative
  - marker: c
    text: O 'su parte' o 'su lote'. 'Porción' conserva el término temático de Eclesiastés para la parte asignada a cada uno.
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּם
  english_pob_choice: Also
  chosen_spanish: Además
  alternatives_spanish:
  - También
  - Asimismo
  lexicon: HALOT
  rationale: Mantiene el valor aditivo/conector del hebreo sin sonar demasiado solemne; encaja bien con la continuidad reflexiva del contexto.
- source_word: כָּל הָאָדָם
  english_pob_choice: every man
  chosen_spanish: todo hombre
  alternatives_spanish:
  - toda persona
  - todos
  - cada hombre
  lexicon: HALOT
  rationale: Conserva el singular genérico masculino del hebreo, que el POB en inglés decidió preservar como forma representativa, sin neutralizarlo en el texto principal.
- source_word: נָתַן לוֹ הָאֱלֹהִים
  english_pob_choice: God has given
  chosen_spanish: Dios le ha dado
  alternatives_spanish:
  - Dios dio
  - Dios le dio
  lexicon: HALOT
  rationale: El perfecto hebreo expresa una acción completada con relevancia vigente; el presente perfecto español comunica bien esa vigencia en un contexto sapiencial.
- source_word: עֹשֶׁר
  english_pob_choice: wealth
  chosen_spanish: riqueza
  alternatives_spanish:
  - riquezas
  - bienes
  lexicon: HALOT
  rationale: En español, 'riqueza' transmite de manera natural el campo semántico de abundancia material del término.
- source_word: וּנְכָסִים
  english_pob_choice: possessions
  chosen_spanish: bienes
  alternatives_spanish:
  - posesiones
  - propiedades
  - posesión
  lexicon: HALOT
  rationale: Distingue este término de 'riqueza' y suena natural en español bíblico contemporáneo; 'bienes' cubre propiedad/posesiones materiales.
- source_word: וְהִשְׁלִיטוֹ
  english_pob_choice: has empowered him
  chosen_spanish: le ha concedido
  alternatives_spanish:
  - le ha dado poder
  - le ha capacitado
  - le ha permitido
  lexicon: HALOT
  rationale: El verbo apunta a dar capacidad/autoridad efectiva para disfrutar de lo dado; 'ha concedido' conserva la iniciativa divina sin cargar el matiz con 'poder' de forma excesiva en español. La nota [b] preserva la alternativa de capacidad/poder.
- source_word: לֶאֱכֹל מִמֶּנּוּ
  english_pob_choice: to eat from them
  chosen_spanish: comer de ellos
  alternatives_spanish:
  - disfrutarlos
  - participar de ellos
  lexicon: HALOT
  rationale: Mantiene la imagen concreta de 'comer de' sin convertirla en una paráfrasis más abstracta; el plural responde al antecedente 'riqueza y bienes'.
- source_word: וְלָשֵׂאת אֶת חֶלְקוֹ
  english_pob_choice: to take his portion
  chosen_spanish: tomar su porción
  alternatives_spanish:
  - recibir su porción
  - tomar su parte
  - recibir su parte
  lexicon: HALOT
  rationale: '''Porción'' conserva el término clave de Eclesiastés para la parte asignada; ''tomar'' refleja de forma simple y fiel la idea de apropiarse de lo asignado. La nota [c] preserva la alternativa ''parte/lot'' del hebreo.'
- source_word: וְלִשְׂמֹחַ בַּעֲמָלוֹ
  english_pob_choice: to rejoice in his labor
  chosen_spanish: alegrarse en su trabajo
  alternatives_spanish:
  - gozar en su labor
  - alegrarse de su trabajo
  - disfrutar de su labor
  lexicon: HALOT
  rationale: Conserva explícitamente el verbo de gozo y un referente laboral natural en español; 'trabajo' es claro y digno, aunque 'labor' también sería viable si se quisiera enfatizar el peso del esfuerzo.
- source_word: זֹה מַתַּת אֱלֹהִים הִיא
  english_pob_choice: this is the gift of God
  chosen_spanish: esto es don de Dios
  alternatives_spanish:
  - esto es un don de Dios
  - esto es el don de Dios
  - esto es regalo de Dios
  lexicon: HALOT
  rationale: '''Don de Dios'' reproduce con concisión la predicación final. Se evita añadir artículo donde el hebreo no lo exige, aunque ''el don de Dios'' sería también posible en español natural.'
theological_decisions:
- issue: Masculino genérico en הָאָדָם
  english_pob_reading: every man
  chosen_spanish_reading: todo hombre
  alternative_spanish_readings:
  - toda persona
  - cada hombre
  rationale: Se mantiene el singular genérico masculino como en el hebreo y en la decisión auditada del POB inglés; no se neutraliza en el texto principal para no borrar la forma representativa del original.
  doctrine_reference: 'DOCTRINE.md §Translation philosophy 4; Contested terms: אָדָם adam'
- issue: Capacidad dada por Dios para disfrutar de los bienes
  english_pob_reading: has empowered him
  chosen_spanish_reading: le ha concedido comer de ellos
  alternative_spanish_readings:
  - le ha capacitado para comer de ellos
  - le ha dado poder para comer de ellos
  - le ha permitido comer de ellos
  rationale: El punto teológico no es solo posesión, sino capacidad otorgada por Dios para disfrutarla. 'Le ha concedido' conserva la agencia divina sin sobredeterminar el matiz de autoridad; la nota [b] explicita la alternativa de poder/capacidad.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
- issue: Portión asignada como parte en la vida
  english_pob_reading: to take his portion
  chosen_spanish_reading: tomar su porción
  alternative_spanish_readings:
  - recibir su porción
  - tomar su parte
  rationale: '''Porción'' preserva el término clave de Eclesiastés para la parte asignada; no se diluye a ''parte'' en el texto principal, aunque la alternativa queda indicada.'
  doctrine_reference: Eclesiastés 2:10; 3:13; 5:18 (uso temático de 'porción')
translation_notes:
  revision_awareness: 'Se revisó la salida anterior para corregir el problema de anclaje de notas al pie: ahora cada marcador [a], [b] y [c] aparece exactamente en el texto español. También se ajustó la redacción para que el texto principal sea publicable y coherente con la lectura auditada del POB en inglés, manteniendo la tensión entre ''conceder/permitir/capacitar'' en una nota en lugar de nivelarla en exceso.'
  spanish_consistency_notes:
  - Se preserva la forma genérica masculina 'todo hombre' conforme al hebreo y a la política auditada del POB.
  - '''Don de Dios'' sigue el predicado final sin añadir explicaciones interpretativas al texto principal.'
  - '''Porción'' se mantiene como término clave de Eclesiastés; no se sustituye por ''parte'' en el cuerpo principal.'
  - La colocación de las notas al pie evita ambigüedad de anclaje y respeta el requisito de que cada marcador aparezca en el texto.
  - Se usa 'Dios' para אֱלֹהִים y no se introduce una sustitución reverencial como 'Señor'.
