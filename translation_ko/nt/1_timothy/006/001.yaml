id: 1TI.6.1
reference: 1 Timothy 6:1
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Ὅσοι εἰσὶν ὑπὸ ζυγὸν δοῦλοι, τοὺς ἰδίους δεσπότας πάσης τιμῆς ἀξίους ἡγείσθωσαν, ἵνα μὴ τὸ ὄνομα τοῦ θεοῦ καὶ ἡ διδασκαλία βλασφημῆται.
base_translation:
  language: en
  yaml_path: translation/nt/1_timothy/006/001.yaml
  text: All who are slaves under a yoke should regard their own masters as worthy of all honor[c][b][a], so that the name of God and the teaching may not be slandered.
  footnotes:
  - marker: a
    text: Or 'servants' or 'bondservants'; Greek δοῦλοι. Here 'slaves' is used because the phrase 'under a yoke' makes the condition of bondage explicit.
    reason: alternative_reading
  - marker: b
    text: Or 'the doctrine.'
    reason: lexical_alternative
  - marker: c
    text: Or 'may not be blasphemed.'
    reason: lexical_alternative
translation:
  language: ko
  text: 멍에 아래 있는 모든 노예[a]는 자기 주인을 온전한 존경에 합당한 자로 여겨야 합니다. 그래야 하나님의 이름과 가르침[b]이 모독을 받지[c] 않을 것입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「종」 「매인 자」. 헬라어 δοῦλοι. 본 절은 「멍에 아래」라는 어구로 매임의 상태가 명시되므로 「노예」로 옮긴다.
    reason: alternative_reading
  - marker: b
    text: 또는 「교훈」.
    reason: lexical_alternative
  - marker: c
    text: 또는 「비방을 당하지」.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑπὸ ζυγὸν δοῦλοι
  english_pob_choice: slaves under a yoke
  chosen_korean: 멍에 아래 있는 ~ 노예
  alternatives_korean:
  - 멍에 아래 있는 종
  - 매여 있는 노예
  lexicon: BDAG
  rationale: 본 절은 바울이 매여 있는 노예들에게 직접 말하는 본문이며, 「멍에 아래」(ὑπὸ ζυγὸν)는 매임의 상태를 본문이 명시적으로 드러낸다. 따라서 글로서리 표준에 따라 「노예」로 옮겨 매임의 무게를 보존한다.
- source_word: τοὺς ἰδίους δεσπότας
  english_pob_choice: their own masters
  chosen_korean: 자기 주인
  alternatives_korean:
  - 자기 상전
  lexicon: BDAG
  rationale: δεσπότης는 주인. 「주인」이 자연스럽다.
- source_word: πάσης τιμῆς ἀξίους ἡγείσθωσαν
  english_pob_choice: regard as worthy of all honor
  chosen_korean: 온전한 존경에 합당한 자로 여겨야
  alternatives_korean:
  - 모든 존경에 합당한 자로 여겨야
  lexicon: BDAG
  rationale: 5:17 τιμή와 일관 「존경」.
- source_word: τὸ ὄνομα τοῦ θεοῦ καὶ ἡ διδασκαλία βλασφημῆται
  english_pob_choice: the name of God and the teaching may not be slandered
  chosen_korean: 하나님의 이름과 가르침이 모독을 받지 않을 것
  alternatives_korean:
  - 하나님의 이름과 교훈이 비방을 당하지 않게
  lexicon: BDAG
  rationale: 1:13·1:20 βλασφημ-와 일관 「모독」.
theological_decisions:
- issue: δοῦλος를 「노예」로 옮긴 결정
  chosen_reading: 노예
  alternative_readings:
  - 종
  - 매인 자
  rationale: 빌립보서 1:1과 마찬가지로, 본 절도 매임(bonded status)의 신학적 무게를 본문이 「멍에 아래」(ὑπὸ ζυγὸν)로 명시한 본보기이다. 한국 전통의 「종」은 봉사 기능에 무게가 실려 매임을 약화시키므로, 본문이 직접 드러내는 매임의 어감을 보존하기 위해 「노예」를 채택한다.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy; Contested terms table for δοῦλος; Korean glossary δοῦλος(6:1) → 노예'
