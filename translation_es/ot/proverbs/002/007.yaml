revisions:
- from: Él guarda sabiduría sólida[a] para los rectos; es escudo para los que andan en integridad[b].
  to: Él guarda sana sabiduría[a] para los rectos; es escudo para los que andan en integridad[b].
  rationale: Se revisa «sabiduría sólida» a «sana sabiduría» por mayor naturalidad y mejor correspondencia con el inglés auditado «sound wisdom» en español eclesial contemporáneo. Se corrige la nota b para eliminar el inglés residual y ofrecer alternativas plenamente españolas. No se requieren cambios adicionales en la sintaxis ni en la lectura teológica de las dos cláusulas.
