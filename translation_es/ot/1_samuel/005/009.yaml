translation:
  language: es
  text: Y sucedió que, después de haberlo trasladado[a], la mano de Yahvé vino contra la ciudad, causando un pánico muy grande; hirió a los hombres de la ciudad, desde el más pequeño hasta el más grande, y les brotaron tumores[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «después de haberlo llevado alrededor». El hebreo describe el traslado repetido o el movimiento del arca de un lugar a otro.
    reason: lexical_alternative
  - marker: b
    text: O «se llenaron de tumores». La expresión hebrea describe la aparición o erupción de hinchazones corporales.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵסַבּוּ אֹתוֹ
  english_pob_choice: they had moved it around
  chosen_spanish: después de haberlo trasladado
  alternatives_spanish:
  - después de haberlo movido de un lugar a otro
  - después de haberlo llevado alrededor
  lexicon: HALOT
  rationale: El verbo hebreo en el hifil de סבב con objeto pronominal expresa mover o hacer circular el objeto; en este contexto se refiere al traslado del arca. «Trasladado» conserva el movimiento efectivo sin cargar innecesariamente la frase con una imagen más concreta de la que el texto exige.
- source_word: יַד יְהוָה
  english_pob_choice: the hand of Yahweh
  chosen_spanish: la mano de Yahvé
  alternatives_spanish:
  - la mano de Yahvé fue contra la ciudad
  - el poder de Yahvé
  lexicon: HALOT
  rationale: Se conserva la metáfora hebrea de la «mano» como acción poderosa y judicial de Dios. «Mano de Yahvé» mantiene la fuerza idiomática y el paralelismo con el texto fuente; no se neutraliza en «poder» para no perder la imagen.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
  rationale: Se sigue el criterio del proyecto de renderizar el nombre divino por «Yahvé» en el texto principal. Así se preserva el Tetragrámaton en vez de sustituirlo por un título genérico.
- source_word: מְהוּמָה גְּדוֹלָה מְאֹד
  english_pob_choice: a very great panic
  chosen_spanish: un gran pánico
  alternatives_spanish:
  - una gran confusión
  - un gran tumulto
  lexicon: HALOT
  rationale: «מְהוּמָה» puede ser confusión, tumulto o pánico; el contexto de juicio y aflicción favorece una reacción de terror y desorden. «Gran pánico» comunica esa intensidad con naturalidad en español.
- source_word: וַיַּךְ
  english_pob_choice: he struck
  chosen_spanish: hirió
  alternatives_spanish:
  - golpeó
  - castigó
  lexicon: HALOT
  rationale: El verbo transmite un acto de golpe o herida infligido por Dios. «Hirió» conserva la concreción del hebreo y encaja bien en español bíblico sin volverse arcaizante.
- source_word: אַנְשֵׁי הָעִיר
  english_pob_choice: the men of the city
  chosen_spanish: a los hombres de la ciudad
  alternatives_spanish:
  - a los varones de la ciudad
  - a la gente de la ciudad
  lexicon: HALOT
  rationale: El hebreo dice literalmente «los hombres de la ciudad». Se mantiene ese matiz masculino, siguiendo la precisión lexical del texto y la decisión auditada del POB en inglés.
- source_word: מִקָּטֹן וְעַד גָּדֹל
  english_pob_choice: from small to great
  chosen_spanish: desde el más pequeño hasta el más grande
  alternatives_spanish:
  - de pequeño a grande
  - del más bajo al más alto
  lexicon: HALOT
  rationale: La expresión idiomática abarca toda la gama de afectados. En español, la forma comparativa explícita «desde el más pequeño hasta el más grande» reproduce bien la extensión total y sigue siendo clara para lectores modernos.
- source_word: וַיִּשָּׂתְרוּ לָהֶם עפלים
  english_pob_choice: tumors broke out on them
  chosen_spanish: les brotaron tumores
  alternatives_spanish:
  - les salieron tumores
  - aparecieron tumores en ellos
  lexicon: HALOT
  rationale: Se conserva la idea de una erupción o aparición súbita de tumores, sin precisar más de lo que el hebreo permite. «Les brotaron tumores» refleja bien la imagen verbal y el carácter físico de la afección.
theological_decisions:
- issue: El nombre divino יְהוָה en el texto principal
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El versículo usa directamente el Tetragrámaton. Conforme al criterio doctrinal del proyecto, se conserva el nombre propio de Dios como «Yahvé», evitando la sustitución por un título y manteniendo la visibilidad del nombre del pacto.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: 'Se revisó el contexto auditado en inglés: la traducción inglesa opta por «moved it around», «hand of Yahweh», «panic», «struck», «men of the city», «from small to great» y «tumors broke out on them». La versión española sigue esas decisiones con equivalentes naturales y conserva la ambigüedad médica de la última frase sin forzar una identificación clínica más específica.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» de forma consistente para יְהוָה.
  - Se preservó la metáfora corporal «mano de Yahvé» en lugar de una paráfrasis abstracta.
  - «Tumores» se conserva como término amplio; no se especifica «hemorroides» porque el texto hebreo y el audit trail no obligan a esa precisión.
  - La coordinación verbal sigue el movimiento narrativo hebreo con un inicio impersonal/narrativo «Y sucedió que».
