translation:
  language: es
  text: Entonces el que presenta su ofrenda a Yahvé presentará una ofrenda de cereal[a] de flor de harina, la décima parte de un efa, mezclada con la cuarta parte de un hin de aceite.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «un décimo»; en este contexto sacrificial, esto denota la décima parte de un efa.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִקְרִיב
  english_pob_choice: then ... shall present
  chosen_spanish: Entonces ... presentará
  alternatives_spanish:
  - Y ... acercará
  - Y ... ofrecerá
  lexicon: HALOT
  rationale: El waw consecutivo mantiene la secuencia legal del mandato anterior; «Entonces» conserva ese valor procedimental en español. «Presentará» reproduce el sentido sacrificial de הקריב con naturalidad, evitando un calco demasiado literal como «acercará».
- source_word: הַמַּקְרִיב
  english_pob_choice: the one who presents
  chosen_spanish: el que presenta
  alternatives_spanish:
  - el oferente
  - el que ofrece
  lexicon: HALOT
  rationale: El participio identifica a la persona que realiza la ofrenda. «El que presenta» conserva la función participial y suena claro en español actual.
- source_word: קָרְבָּנוֹ
  english_pob_choice: his offering
  chosen_spanish: su ofrenda
  alternatives_spanish:
  - su regalo
  - su sacrificio
  lexicon: HALOT
  rationale: קָרְבָּן es el término general para una ofrenda llevada ante Dios. «Ofrenda» es la equivalencia natural en este contexto ritual.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - a Yahweh
  lexicon: HALOT
  rationale: Siguiendo la norma del proyecto para יהוה, se traduce el nombre divino como «Yahvé». La preposición ל se mantiene como «a» en español.
- source_word: מִנְחָה
  english_pob_choice: a grain offering
  chosen_spanish: una ofrenda de cereal
  alternatives_spanish:
  - una ofrenda de grano
  - una ofrenda vegetal
  lexicon: HALOT
  rationale: En legislación sacrificial, מִנְחָה designa la ofrenda cereal/vegetal. «Ofrenda de cereal» es clara y evita una parafrasis más amplia que borraría el matiz cultual.
- source_word: סֹלֶת
  english_pob_choice: fine flour
  chosen_spanish: flor de harina
  alternatives_spanish:
  - harina fina
  - harina selecta
  lexicon: HALOT
  rationale: סֹלֶת se refiere a harina finamente molida y de calidad alta. «Flor de harina» es una expresión tradicional y comprensible en español bíblico, fiel al valor de excelente finura.
- source_word: עִשָּׂרוֹן
  english_pob_choice: a tenth of an ephah
  chosen_spanish: la décima parte de un efa
  alternatives_spanish:
  - un décimo de efa
  - la décima medida
  lexicon: HALOT
  rationale: Aunque literalmente significa «un décimo», en este contexto cultual se entiende como una décima parte de un efa. En español se explicita el referente para que la medida sea inteligible.
- source_word: בָּלוּל
  english_pob_choice: mixed
  chosen_spanish: mezclada
  alternatives_spanish:
  - mezclado
  - amasada
  lexicon: HALOT
  rationale: El participio describe la harina unida con el aceite. «Mezclada» es natural en español y conserva el sentido pasivo de la forma hebrea.
- source_word: בִּרְבִעִית הַהִין
  english_pob_choice: with a fourth of a hin
  chosen_spanish: con la cuarta parte de un hin
  alternatives_spanish:
  - con un cuarto de hin
  lexicon: HALOT
  rationale: Se conserva la medida antigua «hin» y se traduce la fracción de manera transparente. «Con» expresa adecuadamente la mezcla indicada por el hebreo.
- source_word: שָׁמֶן
  english_pob_choice: oil
  chosen_spanish: aceite
  alternatives_spanish:
  - aceite de oliva
  - óleo
  lexicon: HALOT
  rationale: El hebreo dice simplemente «aceite», sin especificar el tipo. En español, «aceite» comunica el referente sin añadir precisión no presente en el texto.
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: El proyecto español sigue la convención establecida para יהוה y usa «Yahvé» en el texto principal, manteniendo el nombre del pacto en lugar de sustituirlo por un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'El texto coincide con la revisión final del POB en inglés: conserva la secuencia legal, explicita la medida cultual y mantiene el nombre divino como Yahvé conforme a la norma doctrinal del proyecto. No se detectan cambios de última revisión que exijan ajuste adicional.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para יהוה según la terminología proyectada.
  - Se usó «ofrenda de cereal» para מִנְחָה, evitando sustituirlo por «ofrenda vegetal» o «sacrificio» sin necesidad.
  - «Flor de harina» conserva el registro bíblico y la precisión de סֹלֶת.
  - Se explicitó la medida «la décima parte de un efa» para עִשָּׂרוֹן, coherente con la nota inglesa.
  - Se evitó introducir «aceite de oliva», ya que el hebreo solo dice «aceite».
