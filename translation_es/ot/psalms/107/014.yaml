revisions:
- from: Él los sacó de las tinieblas y de la sombra de muerte[a], y rompió sus cadenas[b].
  to: Él los sacó de las tinieblas y de la sombra de muerte[a], e hizo pedazos sus ataduras[b].
  rationale: 'Se revisa la segunda cola para alinearla mejor con el hebreo y con la decisión final auditada en inglés: מוֹסְרוֹתֵיהֶם se representa mejor con «ataduras» que con la opción más específica «cadenas», y יְנַתֵּק se expresa con más fuerza mediante «hizo pedazos» que con «rompió». Se conserva «sombra de muerte» con nota por la ambigüedad léxica documentada de צַלְמָוֶת.'
