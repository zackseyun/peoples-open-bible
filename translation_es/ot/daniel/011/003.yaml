- from: Entonces se levantará un rey poderoso[a], y dominará con gran dominio y hará según su voluntad.
  to: Entonces se levantará un rey poderoso, y ejercerá un gran dominio y hará según su voluntad[a].
  rationale: Se corrige la ubicación de la nota para que corresponda al segmento fuente correcto y se mejora la naturalidad de la construcción sobre משל / מִמְשָׁל sin perder el énfasis del hebreo. Se conserva «hará según su voluntad» como traducción principal por su fidelidad léxica y tono digno.
