translation:
  language: es
  text: Una trampa se apodera de él por el talón[a]; un lazo lo sujeta firmemente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Una trampa lo atrapa al talón; un lazo le aprieta». El sustantivo final es raro y puede designar un tipo específico de lazo o lazo corredizo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יֹאחֵז
  english_pob_choice: seizes
  chosen_spanish: atrapa
  alternatives_spanish:
  - agarra
  - se apodera de
  lexicon: HALOT
  rationale: El verbo expresa tomar o asir con fuerza. En español, "atrapa" conserva la imagen de captura propia del contexto de acechanza y evita una formulación demasiado pesada.
- source_word: בְּעָקֵב
  english_pob_choice: by the heel
  chosen_spanish: por el talón
  alternatives_spanish:
  - al talón
  - en el talón
  lexicon: HALOT
  rationale: עָקֵב es "talón". La preposición con ב aquí puede marcar localización o medio en la imagen del cazador; "por el talón" comunica bien que la trampa lo alcanza en esa parte.
- source_word: פָּח
  english_pob_choice: trap
  chosen_spanish: trampa
  alternatives_spanish:
  - lazo
  - snare
  - red
  lexicon: HALOT
  rationale: פָּח suele referirse a una trampa o lazo. "Trampa" es claro y natural en español, y permite distinguir este término del segundo sustantivo paralelo.
- source_word: יַחֲזֵק
  english_pob_choice: holds fast
  chosen_spanish: lo sujeta firmemente
  alternatives_spanish:
  - lo apresa con fuerza
  - lo sostiene firmemente
  - lo agarra con firmeza
  lexicon: HALOT
  rationale: El hiphil de חזק transmite la idea de tomar con firmeza o retener con poder. "Lo sujeta firmemente" preserva esa fuerza y el paralelismo con la primera hemistiquio.
- source_word: עָלָיו
  english_pob_choice: to him
  chosen_spanish: lo
  alternatives_spanish:
  - sobre él
  - contra él
  lexicon: HALOT
  rationale: Después de חזק, על con sufijo puede expresar acción dirigida o dominante sobre la persona. En español, el clítico "lo" fluye mejor con "sujeta firmemente" sin perder el objeto afectado.
- source_word: צַמִּים
  english_pob_choice: snare
  chosen_spanish: red
  alternatives_spanish:
  - lazo
  - trampa
  - noose
  lexicon: HALOT
  rationale: Es un término raro y probablemente designa una clase de lazo o red para cazar. Como el primer miembro ya dice "trampa", "red" ayuda a conservar la distinción poética sin identificarlo del todo con el primero.
translation_notes:
  revision_awareness: La versión inglesa auditada ajustó el segundo miembro a un orden más natural («holds him fast»). La propuesta española sigue ese movimiento natural con «lo sujeta firmemente», manteniendo el paralelismo poético y la fuerza del verbo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención de proyecto cuando aparezca el nombre divino, aunque este versículo no lo contiene.
  - Se evita traducir mecánicamente «snare» por el mismo término que «trap» para preservar la distinción lexical del hebreo.
  - La estructura binaria del verso se conserva con dos miembros coordinados por punto y coma.
