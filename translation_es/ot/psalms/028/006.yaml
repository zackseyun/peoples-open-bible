  glossary_alignment: Alineado con la terminología del proyecto en «Yahvé» para יְהוָה. No hay conflicto doctrinal. La elección «voz» para קוֹל sigue la revisión inglesa. La principal mejora es estilístico-lexical en español para תַּחֲנוּנָי.
