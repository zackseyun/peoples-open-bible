revisions:
- from: Sus manos son cilindros de oro[a], llenos de berilo; su cuerpo[b] es marfil bruñido, cubierto de zafiros.
  to: Sus manos son varas[a] de oro, engastadas con berilo[b]; su cuerpo[c] es marfil bruñido, cubierto de zafiros.
  rationale: Se ajusta la frase para que suene natural y poética en español, conservando mejor la racionalidad léxica auditada por la POB. 'Varas de oro' evita el tecnicismo de 'cilindros' y mantiene la idea de formas alargadas/redondeadas, con nota que preserva la alternativa 'anillos'. 'Engastadas con berilo' expresa adecuadamente la imagen joyera de מְמֻלָּאִים בַּתַּרְשִׁישׁ. También se reubica la nota de incertidumbre de תַּרְשִׁישׁ al lugar correcto.
