  text: וְ/זָרְחָ֨ה לָ/כֶ֜ם יִרְאֵ֤י שְׁמִ/י֙ שֶׁ֣מֶשׁ צְדָקָ֔ה וּ/מַרְפֵּ֖א בִּ/כְנָפֶ֑י/הָ וִֽ/יצָאתֶ֥ם וּ/פִשְׁתֶּ֖ם כְּ/עֶגְלֵ֥י מַרְבֵּֽק׃
base_translation:
  language: en
  yaml_path: translation/ot/malachi/003/020.yaml
  text: But for you who fear my name[a], the sun of righteousness will rise with healing in its wings[c][b]; and you will go out and leap like calves from the stall.
  footnotes:
  - marker: a
    text: Or 'the sun of vindication.' The Hebrew צדקה can carry the sense of righteousness, justice, or vindication.
    reason: lexical_alternative
  - marker: b
    text: Or 'in its rays.' Hebrew 'wings' can be used metaphorically for the extremities or rays of the sun.
    reason: lexical_alternative
  - marker: c
    text: Or 'skip' or 'frolic.' The Hebrew verb is rare and may denote exuberant movement; some have understood it as 'grow fat.'
    reason: lexical_alternative
