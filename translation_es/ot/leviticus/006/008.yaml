review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue en general la estructura y el sentido del hebreo: tomar una porción de la ofrenda, incluir parte de la harina y del aceite, todo el incienso, y quemar la porción memorial sobre el altar para Yahvé. Sin embargo, hay dos desajustes importantes con la evidencia fuente y el rastro auditado: (1) לְבֹנָה es específicamente «franquincienso», no el genérico «incienso»; (2) falta en el texto principal la nota de alternativa ligada al primer sintagma verbal, mientras que la nota b del inglés sobre «porción memorial» está mejor anclada a esa expresión, no a «ofrenda vegetal». Además, «de él» suena forzado porque el antecedente inmediato en español es femenino.'
  spanish_quality_summary: El español es mayormente claro y digno, pero puede afinarse para sonar más natural y más preciso cultualmente. «Tomará de ella un puñado» o «sacará de ella un puñado» fluye mejor que «levantará de él». «Flor de harina» es aceptable y bíblicamente reconocible. «Ofrenda vegetal» es legible si es terminología de proyecto. «Franquincienso» mejora la precisión sin perder comprensibilidad. También conviene reubicar los anclajes de notas para que correspondan exactamente al contenido explicado.
  glossary_alignment: Alinea bien con «Yahvé» para יהוה y con «porción memorial» para אַזכָּרָתָהּ. «Ofrenda vegetal» puede mantenerse como decisión terminológica documentada para מִנְחָה. La principal falta de alineación léxica es לְבֹנָה, que debe reflejarse como «franquincienso» según la racionalidad auditada, no como el genérico «incienso».
  issues:
  - severity: high
    issue: לְבֹנָה se tradujo como «incienso» en vez de «franquincienso».
    rationale: La evidencia léxica y el English POB especifican frankincense, no incienso genérico. El español debe preservar esa precisión cultual.
  - severity: medium
    issue: El anclaje de la nota [a] falta en el texto principal.
    rationale: La nota de alternativa sobre «levantar/tomar con su puñado» debe aparecer marcada en el lugar correspondiente del texto, según la disciplina requerida.
  - severity: medium
    issue: La nota [b] está anclada a «ofrenda vegetal» pero explica «porción memorial».
    rationale: El marcador debe colocarse exactamente sobre la expresión que la nota comenta para evitar desajuste entre texto y nota.
  - severity: low
    issue: «De él» resulta poco natural con antecedente femenino en español.
    rationale: Aunque el hebreo usa un pronombre que remite a la ofrenda, en español «de ella» o la repetición del referente evita aspereza innecesaria.
  - severity: low
    issue: «Levantará» es posible, pero suena menos natural que «tomará» en esta instrucción ritual.
    rationale: El rastro auditado permite el matiz de elevación en nota; en el texto principal español conviene priorizar naturalidad sin perder sentido.
