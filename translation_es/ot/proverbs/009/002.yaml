translation:
  language: es
  text: Ella ha degollado su carne[a]; ha mezclado su vino[b]; también ha dispuesto su mesa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus animales sacrificados»; el hebreo se refiere a carne o animales preparados para el banquete, no necesariamente a un sacrificio ritual.
    reason: lexical_alternative
  - marker: b
    text: Es decir, ha preparado el vino mezclándolo, probablemente según la costumbre del banquete.
    reason: cultural_note
lexical_decisions:
- source_word: טָבְחָה
  english_pob_choice: has slaughtered
  chosen_spanish: ha sacrificado
  alternatives_spanish:
  - ha degollado
  - ha matado para el banquete
  lexicon: HALOT
  rationale: El hebreo expresa la acción concreta de matar un animal para preparar una comida o banquete. En español, «ha sacrificado» comunica bien esa acción preparatoria con dignidad y naturalidad; «ha degollado» sería más crudo y menos idiomático en este contexto.
- source_word: טִבְחָהּ
  english_pob_choice: her meat
  chosen_spanish: su carne
  alternatives_spanish:
  - su carne para el banquete
  - sus animales sacrificados
  lexicon: HALOT
  rationale: El sustantivo se refiere a la carne o provisión ya sacrificada para el banquete. «Su carne» mantiene la concreción del alimento preparado. «Sus animales sacrificados» explicita demasiado el referente y «su banquete» sería demasiado amplio.
- source_word: מָסְכָה
  english_pob_choice: has mixed
  chosen_spanish: ha mezclado
  alternatives_spanish:
  - ha preparado
  - ha vertido
  lexicon: HALOT
  rationale: El verbo denota mezclar el vino, probablemente con agua o especias, según la costumbre del banquete. «Ha mezclado» es la equivalencia más directa y estable en español.
- source_word: יֵינָהּ
  english_pob_choice: her wine
  chosen_spanish: su vino
  alternatives_spanish:
  - su vino para la fiesta
  lexicon: HALOT
  rationale: El posesivo es simple y directo. No hace falta añadir una especificación en el texto principal, porque el contexto del banquete ya la provee.
- source_word: אַף
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - además
  - incluso
  lexicon: HALOT
  rationale: La partícula añade otro acto completado en secuencia. «También» refleja bien el valor acumulativo sin sobrerrepresentar énfasis adicional.
- source_word: עָרְכָה
  english_pob_choice: has set
  chosen_spanish: ha dispuesto
  alternatives_spanish:
  - ha ordenado
  - ha preparado
  lexicon: HALOT
  rationale: El verbo significa ordenar o disponer. Para una mesa en español, «ha dispuesto» mantiene la idea de preparación ordenada sin sonar mecánico.
- source_word: שֻׁלְחָנָהּ
  english_pob_choice: her table
  chosen_spanish: su mesa
  alternatives_spanish:
  - su mesa de banquete
  lexicon: HALOT
  rationale: La referencia es literal a la mesa del banquete. «Su mesa» conserva la imagen concreta y funciona naturalmente en español; la precisión «de banquete» queda implícita en el contexto.
theological_decisions:
- issue: Sujeto femenino personificado
  english_pob_reading: Render the feminine singular subject straightforwardly as 'She' without capitalizing or adding interpretive identifiers in the verse text.
  chosen_spanish_reading: Renderizar el sujeto femenino de forma directa como «Ella», sin capitalización devocional ni glosa interpretativa en el texto.
  alternative_spanish_readings:
  - Sabiduría ha sacrificado su carne; ha mezclado su vino; también ha dispuesto su mesa.
  - La Sabiduría ha sacrificado su carne; ha mezclado su vino; también ha dispuesto su mesa.
  rationale: El hebreo usa verbos femeninos singulares y el contexto literario presenta a la Sabiduría personificada. «Ella» preserva la personificación sin introducir una identificación explicativa dentro del versículo. Las opciones con «Sabiduría» pueden ser válidas en una nota o en el contexto inmediato, pero agregan una aclaración que el hebreo del versículo no expresa explícitamente.
  doctrine_reference: 'Principio de fidelidad literaria: mantener la personificación del texto sin añadir interpretaciones no explícitas en el verso.'
translation_notes:
  revision_awareness: El contexto de auditoría inglesa muestra alto acuerdo y ningún cambio en la revisión más reciente; se conservan las decisiones léxicas centrales (slaughtered/meat, mixed, set) y se adaptan al español con equivalentes naturales sin perder la concreción del banquete.
  spanish_consistency_notes:
  - Se mantiene el sujeto femenino singular como «Ella», coherente con la personificación de la Sabiduría en el contexto inmediato.
  - «Sacrificado» traduce la acción concreta de preparar la comida por degüello/sacrificio, evitando un calco demasiado crudo.
  - «Ha mezclado su vino» conserva la práctica cultural de preparar el vino antes del banquete.
  - «Ha dispuesto su mesa» comunica bien el valor de ערך aplicado a una mesa, sin forzar un tecnicismo.
  - La nota sobre la carne evita borrar la tensión lexical entre carne y animales sacrificados, preservando la alternativa documentada por la auditoría.
