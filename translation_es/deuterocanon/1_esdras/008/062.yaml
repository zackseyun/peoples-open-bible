base_translation:
  language: en
  yaml_path: translation/deuterocanon/1_esdras/008/062.yaml
  text: And when the third day came there[a], the silver and the gold were weighed and handed over in the house of the Lord to Marmothi son of Ourias the priest, and with him was Eleazar son of Phinehas; and with them were Josabees son of Jesous and Moeth son of Sabannus, the Levites, by number and by weight, all of it; and the whole weight was recorded at that very time.
  footnotes:
  - marker: a
    text: The Greek names here differ from the MT-parallel tradition, which has forms such as Meremoth son of Uriah, Eleazar son of Phinehas, and Levites corresponding to Jonathan son of Jeshua and Noadiah son of Binnui. The main text follows the Greek witness of 1 Esdras.
