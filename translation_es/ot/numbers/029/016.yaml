translation:
  language: es
  text: y un macho cabrío, como ofrenda por el pecado[a], además del holocausto regular, su ofrenda de cereal y su libación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ofrenda de purificación» para «ofrenda por el pecado».
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/שְׂעִיר עִזִּים
  english_pob_choice: male goat
  chosen_spanish: un macho de los cabritos
  alternatives_spanish:
  - un macho cabrío
  - un macho de cabras
  - un cabrito macho
  lexicon: HALOT
  rationale: La construcción hebrea especifica un macho de la especie caprina para uso sacrificial. «Macho de los cabritos» conserva la literalidad de la relación posesiva/constructa y el rasgo de sexo; «macho cabrío» sería más idiomático, pero menos transparente respecto de la estructura del hebreo.
- source_word: אֶחָד
  english_pob_choice: one
  chosen_spanish: un
  alternatives_spanish:
  - uno
  lexicon: HALOT
  rationale: El cardinal indica cantidad única del animal ofrecido; en español, el artículo indefinido «un» transmite con naturalidad esa cifra en este contexto enumerativo.
- source_word: חַטָּאת
  english_pob_choice: sin offering
  chosen_spanish: ofrenda por el pecado
  alternatives_spanish:
  - ofrenda de expiación
  - sacrificio por el pecado
  - ofrenda de purificación
  lexicon: HALOT
  rationale: En contexto sacrificial, el sustantivo nombra la ofrenda, no la culpa misma. «Ofrenda por el pecado» conserva la terminología tradicional y la ambigüedad registrada por la POB inglesa; «ofrenda de purificación» sería una alternativa contextual posible.
- source_word: מִלְּבַד
  english_pob_choice: besides
  chosen_spanish: además de
  alternatives_spanish:
  - aparte de
  - fuera de
  - además del
  lexicon: HALOT
  rationale: La expresión marca una ofrenda adicional, no sustitutiva. «Además de» reproduce bien esa relación aditiva en español actual.
- source_word: עֹלַת הַתָּמִיד
  english_pob_choice: the regular burnt offering
  chosen_spanish: el holocausto regular
  alternatives_spanish:
  - el holocausto continuo
  - el holocausto diario
  - la ofrenda quemada regular
  lexicon: HALOT
  rationale: «עֹלָה» refiere a la ofrenda totalmente quemada; en español bíblico clásico y comprensible, «holocausto» preserva ese valor sacrificial. «Regular» comunica el carácter prescrito y recurrente de הַתָּמִיד, siguiendo la decisión inglesa de evitar una traducción demasiado técnica o arcaizante.
- source_word: מִנְחָתָהּ
  english_pob_choice: its grain offering
  chosen_spanish: su ofrenda de cereal
  alternatives_spanish:
  - su ofrenda de grano
  - su oblación
  - su ofrenda vegetal
  lexicon: HALOT
  rationale: מִנְחָה en este marco cultual es la ofrenda acompañante de grano/cereal. «Ofrenda de cereal» conserva el valor material sin introducir un término demasiado técnico o eclesiástico. El posesivo femenino concuerda con «holocausto».
- source_word: וְנִסְכָּהּ
  english_pob_choice: and its drink offering
  chosen_spanish: y su libación
  alternatives_spanish:
  - y su ofrenda líquida
  - y su ofrenda de bebida
  - y su derramamiento
  lexicon: HALOT
  rationale: נֶסֶךְ designa la ofrenda derramada. «Libación» es breve, precisa y reverente; en español funciona bien en el registro cultual y mantiene la conexión con el acompañamiento líquido de la ofrenda.
theological_decisions:
- issue: 'חַטָּאת en contexto sacrificial: ¿culpa abstracta o tipo de ofrenda?'
  english_pob_reading: The English POB reads 'sin offering' with a footnote noting 'purification offering' as an alternative.
  chosen_spanish_reading: «ofrenda por el pecado»
  alternative_spanish_readings:
  - ofrenda de purificación
  - sacrificio por el pecado
  rationale: El contexto enumera elementos rituales concretos junto al holocausto, la ofrenda de cereal y la libación; por tanto, el término nombra una categoría sacrificial. Se mantiene «por el pecado» para reflejar la lectura tradicional y la tensión léxica documentada por la nota inglesa, sin borrar la alternativa de purificación.
  doctrine_reference: Levítico 4; Números 28–29
translation_notes:
  revision_awareness: El testimonio inglés más reciente no introdujo cambios y fue marcado como de alta concordancia; esta versión española sigue esa lectura estable, conservando la estructura aditiva y el inventario sacrificial sin expandir ni reinterpretar el hebreo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» ausente aquí porque el versículo no contiene el nombre divino.
  - «Holocausto» se usa para עֹלָה por consistencia con el valor sacrificial total de la ofrenda.
  - Se conserva la concordancia posesiva femenina en «su ofrenda de cereal» y «su libación», referidas al holocausto (femenino en español).
