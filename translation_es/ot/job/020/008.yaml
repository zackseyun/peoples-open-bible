revisions:
- from: Como un sueño, vuela[a] y no se le halla[b]; es expulsado como una visión de la noche.
  to: Como un sueño, vuela[a] y no se lo encuentra[b]; es ahuyentado como una visión de la noche.
  rationale: Se reemplaza «es expulsado» por «es ahuyentado» para reflejar mejor la fuerza de וְיֻדַּד en un contexto de imagen poética de desaparición, más cercano a «driven away» que a una expulsión formal. También se suaviza «no se le halla» a «no se lo encuentra» para mejorar naturalidad en español moderno sin perder el sentido idiomático del hebreo ni la nota alternativa preservada por el expediente inglés.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:10:32Z'
