translation:
  language: es
  text: Pero en cuanto a mí[a], estoy lleno de poder, con el Espíritu de Yahvé, y de justicia y fuerza, para declarar a Jacob su rebelión[b] y a Israel su pecado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «estoy lleno de poder por el Espíritu de Yahvé, y de justicia y de fuerza». La secuencia hebrea puede entenderse como una lista de aquello de lo que el profeta está lleno, o como que el Espíritu de Yahvé es la fuente de ese poder.'
    reason: alternative_reading
  - marker: b
    text: «Rebelión» también puede traducirse «transgresión», destacando la idea de desafío contra Dios.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאוּלָם אָנֹכִי
  english_pob_choice: But as for me
  chosen_spanish: Pero yo, por mi parte
  alternatives_spanish:
  - Pero yo
  - Sin embargo, yo
  - Mas yo
  lexicon: HALOT
  rationale: Captura el contraste fuerte con el contexto previo y conserva el énfasis personal de אָנֹכִי sin sonar redundante o arcaico en español.
- source_word: מָלֵאתִי
  english_pob_choice: I am filled
  chosen_spanish: estoy lleno
  alternatives_spanish:
  - estoy lleno de
  - he sido lleno
  - estoy colmado
  lexicon: HALOT
  rationale: En español, el estado resultante se expresa con naturalidad en presente de estado. Mantiene el valor resultativo del perfecto hebreo.
- source_word: כֹחַ
  english_pob_choice: power
  chosen_spanish: poder
  alternatives_spanish:
  - fuerza
  - poderío
  - fortaleza
  lexicon: HALOT
  rationale: '''Poder'' funciona bien con el campo profético de habilitación divina y evita una repetición excesiva con ''poderío'' más adelante.'
- source_word: אֶת רוּחַ יְהוָה
  english_pob_choice: with the Spirit of Yahweh
  chosen_spanish: del Espíritu de Yahvé
  alternatives_spanish:
  - con el Espíritu de Yahvé
  - por el Espíritu de Yahvé
  - del espíritu de Yahvé
  lexicon: HALOT
  rationale: El hebreo permite leer esta secuencia como el contenido/instrumento de la plenitud; en español, 'del Espíritu' refleja bien la relación estrecha con el llenado. Se capitaliza 'Espíritu' por tratarse del Espíritu divino.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto de traducir el Tetragrámaton con el nombre propio 'Yahvé', preservando la referencia personal y de pacto.
- source_word: וּמִשְׁפָּט
  english_pob_choice: justice
  chosen_spanish: justicia
  alternatives_spanish:
  - juicio
  - derecho
  - sentencia
  lexicon: HALOT
  rationale: '''Justicia'' comunica mejor la función ética y judicial del profeta en este contexto que ''juicio'', que en español puede sonar más al acto de juzgar o a un veredicto.'
- source_word: וּגְבוּרָה
  english_pob_choice: might
  chosen_spanish: poderío
  alternatives_spanish:
  - maldad
  - fortaleza
  - valentía
  lexicon: HALOT
  rationale: '''Poderío'' conserva la fuerza de capacidad vigorosa sin duplicar exactamente ''poder''; también mantiene un tono digno y bíblico.'
- source_word: לְהַגִּיד
  english_pob_choice: to declare
  chosen_spanish: para declarar
  alternatives_spanish:
  - para anunciar
  - para decir
  - para proclamar
  lexicon: HALOT
  rationale: '''Declarar'' refleja el acto formal y público de anunciar acusación profética.'
- source_word: לְיַעֲקֹב
  english_pob_choice: to Jacob
  chosen_spanish: a Jacob
  alternatives_spanish:
  - a la casa de Jacob
  lexicon: HALOT
  rationale: Se conserva el nombre covenantal tal como aparece en el hebreo, sin expansión interpretativa.
- source_word: פִּשְׁעוֹ
  english_pob_choice: his transgression
  chosen_spanish: su rebelión
  alternatives_spanish:
  - su transgresión
  - su delito
  - su ofensa
  lexicon: HALOT
  rationale: La nota inglesa reconoce que פשע puede rendirse como 'rebellion'. En este contexto de denuncia profética, 'rebelión' expresa bien la idea de ruptura contra Dios y preserva la tensión lexical.
- source_word: וּלְיִשְׂרָאֵל
  english_pob_choice: and to Israel
  chosen_spanish: y a Israel
  alternatives_spanish:
  - y para Israel
  - y al Israel
  lexicon: HALOT
  rationale: Se mantiene el paralelismo con 'Jacob' y la designación del pueblo sin añadir elementos.
- source_word: חַטָּאתוֹ
  english_pob_choice: his sin
  chosen_spanish: su pecado
  alternatives_spanish:
  - su pecado cometido
  - su culpabilidad
  - su falta
  lexicon: HALOT
  rationale: '''Pecado'' es la equivalencia más directa y natural en español para preservar el paralelismo con ''rebelión'' y el peso moral del hebreo.'
theological_decisions:
- issue: Relación entre el Espíritu de Yahvé y la plenitud de poder del profeta
  english_pob_reading: I am filled with power, with the Spirit of Yahweh, and with justice and might
  chosen_spanish_reading: estoy lleno de poder, del Espíritu de Yahvé, de justicia y de poderío
  alternative_spanish_readings:
  - estoy lleno de poder por el Espíritu de Yahvé, y de justicia y poderío
  - estoy lleno con el Espíritu de Yahvé, y con justicia y poderío
  rationale: El hebreo puede entenderse como una lista de elementos de la plenitud o como que el Espíritu de Yahvé es la fuente de ese poder. La formulación española conserva esa ambigüedad sin decidirla de manera excesiva, aunque la preposición 'del' hace natural la conexión íntima entre el poder y el Espíritu.
  doctrine_reference: 'Translation philosophy #1 and #3'
- issue: Valor moral/jurídico de מִשְׁפָּט y גְבוּרָה en la denuncia profética
  english_pob_reading: justice and might
  chosen_spanish_reading: justicia y poderío
  alternative_spanish_readings:
  - justicia y fuerza
  - juicio y fortaleza
  - justicia y valentía
  rationale: '''Justicia'' conserva el peso ético-jurídico; ''poderío'' expresa capacidad vigorosa para confrontar y denunciar. No se reduce el par a un simple sinónimo, de modo que siga visible la combinación de discernimiento moral y energía profética.'
  doctrine_reference: 'Affirmations; Translation philosophy #2'
translation_notes:
  revision_awareness: 'El pasaje coincide en alto grado con el último pase de revisión: no se detectaron cambios necesarios en el audit trail inglés. Esta versión española conserva la ambigüedad reconocida sobre la relación entre el Espíritu de Yahvé y el poder, y mantiene la nota lexical sobre פִּשְׁעוֹ como posible ''rebelión''.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' para el Tetragrámaton, conforme al estándar del proyecto.
  - Se capitaliza 'Espíritu' por tratarse del Espíritu divino.
  - Se mantiene el paralelismo Jacob/Israel sin expansión interpretativa.
  - Se evita 'SEÑOR' como sustituto del nombre divino.
  - '''Rebelión'' se adopta para פִּשְׁעוֹ siguiendo la alternativa lexical documentada en el audit trail.'
