translation:
  language: es
  text: ¡Oh tirano más inmundo, enemigo de la justicia celestial[a] y de mente salvaje! No me torturas de esta manera porque haya cometido homicidio, ni porque haya actuado impíamente, sino porque defiendo la ley divina.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «juicio celestial». El término griego puede referirse tanto a la justicia en sentido amplio como al castigo judicial.
    reason: lexical_alternative
lexical_decisions:
- source_word: Τύραννε μιερώτατε
  english_pob_choice: Most defiled tyrant
  chosen_spanish: ¡Oh tirano más inmundo
  alternatives_spanish:
  - ¡Oh tirano más contaminado
  - ¡Oh tirano abominable
  - ¡Oh tirano más impío
  lexicon: LSJ
  rationale: El superlativo vocativo expresa insulto moral y contaminación ritual/ética. En español, "más inmundo" conserva la fuerza acusatoria y la intensidad del griego mejor que un término suavizado como "malvado".
- source_word: τῆς οὐρανίου δίκης
  english_pob_choice: heavenly justice
  chosen_spanish: de la justicia celestial
  alternatives_spanish:
  - del juicio celestial
  - de la justicia divina
  - del juicio divino
  lexicon: LSJ
  rationale: δίκη puede abarcar justicia, juicio o retribución. "Justicia celestial" mantiene el campo moral-jurídico amplio y sigue la decisión inglesa de no estrecharlo solo a un veredicto futuro.
- source_word: ὠμόφρον
  english_pob_choice: savage-minded
  chosen_spanish: de mente salvaje
  alternatives_spanish:
  - de mente cruel
  - de mente brutal
  - de ánimo feroz
  lexicon: LSJ
  rationale: El compuesto describe dureza/crueldad de disposición interior. "De mente salvaje" reproduce la imagen de carácter feroz con un español natural y conserva el énfasis en la mente más que en la acción externa.
- source_word: καταικίζεις
  english_pob_choice: are torturing
  chosen_spanish: me torturas
  alternatives_spanish:
  - me maltratas
  - me atormentas
  - me abusas
  lexicon: LSJ
  rationale: En este contexto de martirio, el verbo apunta a trato violento y físico. "Torturas" es directo, fuerte y corresponde al valor concreto del pasaje.
- source_word: ἀνδροφονήσαντά
  english_pob_choice: have committed murder
  chosen_spanish: haya cometido homicidio
  alternatives_spanish:
  - haya asesinado a alguien
  - haya matado a un hombre
  - haya cometido asesinato
  lexicon: LSJ
  rationale: El participio niega culpa de homicidio. "Homicidio" preserva el valor forense y evita cargar el texto con un objeto explícito que el griego no expresa aquí.
- source_word: ἀσεβήσαντα
  english_pob_choice: have acted impiously
  chosen_spanish: haya actuado impíamente
  alternatives_spanish:
  - haya obrado sin piedad
  - haya sido irreverente
  - haya cometido impiedad
  lexicon: LSJ
  rationale: ἀσεβέω remite a conducta impía ante Dios o lo sagrado. "Impíamente" conserva el registro religioso y la tensión teológica del griego.
- source_word: θείου νόμου
  english_pob_choice: the divine law
  chosen_spanish: la ley divina
  alternatives_spanish:
  - la ley de Dios
  - la ley sagrada
  - la ley del Dios
  lexicon: LSJ
  rationale: '"Ley divina" es el equivalente más cercano y elevado al griego θείου νόμου; mantiene la formulación de la fuente sin reemplazarla por una expresión más interpretativa.'
- source_word: προασπίζοντα
  english_pob_choice: am defending
  chosen_spanish: defiendo
  alternatives_spanish:
  - estoy defendiendo
  - amo y defiendo
  - me pongo en defensa de
  lexicon: LSJ
  rationale: El participio presente funciona aquí como defensa de la propia acción. En español, el presente simple "defiendo" suena natural y conserva la inmediatez retórica del griego.
theological_decisions:
- issue: Sentido de δίκη en τῆς οὐρανίου δίκης
  english_pob_reading: A broad moral-judicial sense ('justice') rather than a narrower eschatological 'judgment'
  chosen_spanish_reading: Una justicia celestial en sentido amplio, no reducida a un simple veredicto
  alternative_spanish_readings:
  - juicio celestial
  - justicia divina
  - retribución celestial
  rationale: El griego permite tanto justicia como juicio/punición. Siguiendo el audit trail inglés, "justicia celestial" mantiene la amplitud moral y judicial sin fijar indebidamente el momento o mecanismo del castigo.
  doctrine_reference: Teología bíblica de la justicia retributiva; vocabulario forense en literatura de martirio
- issue: Relación entre la ley divina y la fidelidad del hablante
  english_pob_reading: because I am defending the divine law
  chosen_spanish_reading: porque defiendo la ley divina
  alternative_spanish_readings:
  - porque estoy defendiendo la ley divina
  - porque sostengo la ley divina
  - porque protejo la ley divina
  rationale: El griego presenta al hablante como defensor activo de la ley divina. "Defiendo" conserva la postura confesional y martirial, sin introducir matices extraños como heroísmo militar o mera protección pasiva.
  doctrine_reference: Fidelidad a la ley de Dios en contexto de persecución; martirio judío helenístico
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del audit trail inglés, que ajustó la frase equivalente a 'have committed murder' para alinearla mejor con el participio griego ἀνδροφονήσαντα y con un registro más formal. En español se reflejó con 'haya cometido homicidio'. También se conservó la amplitud semántica de δίκη mediante 'justicia celestial', en consonancia con la nota lexical inglesa.
  spanish_consistency_notes:
  - Se mantuvo 'ley divina' para θείου νόμου, coherente con la terminología POB y con el tono elevado del pasaje.
  - Se prefirió 'homicidio' por su fuerza forense y para no sobreespecificar con 'asesinato' una acusación que el griego formula en términos de homicidio.
  - Se evitó 'Señor' o 'Cristo' porque no aparecen en el texto fuente.
  - La exclamación inicial conserva el tono vocativo e injurioso del griego sin añadir contenido no sustentado.
