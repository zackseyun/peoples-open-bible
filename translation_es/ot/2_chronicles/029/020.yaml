translation:
  language: es
  text: Entonces el rey Ezequías se levantó[a], reunió a los oficiales de la ciudad y subió a la casa de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «se levantó temprano».'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּשְׁכֵּם
  english_pob_choice: rose early
  chosen_spanish: se levantó
  alternatives_spanish:
  - se levantó temprano
  - se alzó muy de mañana
  lexicon: HALOT
  rationale: El hebreo indica levantarse temprano o iniciar la acción temprano. En español, «se levantó» comunica bien la acción inicial sin forzar una perífrasis pesada; el matiz temporal queda implícito por el contexto narrativo, y la nota conserva la opción alternativa explícita.
- source_word: יְחִזְקִיָּהוּ
  english_pob_choice: Hezekiah
  chosen_spanish: Ezequías
  alternatives_spanish:
  - Hizquías
  lexicon: Convención onomástica bíblica española
  rationale: Se usa la forma española más reconocible y establecida del nombre propio, manteniendo la identificación inequívoca del personaje.
- source_word: הַמֶּלֶךְ
  english_pob_choice: King
  chosen_spanish: el rey
  alternatives_spanish:
  - rey
  lexicon: HALOT
  rationale: El hebreo presenta el título en aposición. En español, «el rey Ezequías» conserva esa relación de manera natural y fiel.
- source_word: וַיֶּאֱסֹף
  english_pob_choice: gathered
  chosen_spanish: reunió
  alternatives_spanish:
  - juntó
  - convocó
  - agrupó
  lexicon: HALOT
  rationale: El verbo expresa traer personas juntas. «Reunió» comunica con claridad la acción deliberada de convocarlos sin perder el sentido colectivo.
- source_word: אֵת שָׂרֵי הָעִיר
  english_pob_choice: the officials of the city
  chosen_spanish: a los oficiales de la ciudad
  alternatives_spanish:
  - a los gobernantes de la ciudad
  - a los dirigentes de la ciudad
  - a los príncipes de la ciudad
  lexicon: HALOT
  rationale: שָׂרִים puede ser «príncipes», «jefes», «gobernantes» u «oficiales». En este contexto administrativo, «oficiales» evita una lectura nobiliaria no necesaria y mantiene el carácter cívico del grupo.
- source_word: וַיַּעַל
  english_pob_choice: went up
  chosen_spanish: subió
  alternatives_spanish:
  - fue subiendo
  - ascendió
  lexicon: HALOT
  rationale: «Subió» preserva la imagen espacial y cultual del ascenso al templo, con un español natural y directo.
- source_word: בֵּית יְהוָה
  english_pob_choice: the house of Yahweh
  chosen_spanish: la casa de Yahvé
  alternatives_spanish:
  - la casa de Yahveh
  - el templo de Yahvé
  lexicon: HALOT
  rationale: Se mantiene la expresión literal «casa de Yahvé», que refleja con fidelidad el hebreo בֵּית יְהוָה y la terminología preferida del proyecto para el nombre divino.
theological_decisions:
- issue: Representación del Tetragrámaton יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Yahveh
  rationale: El texto hebreo usa directamente el nombre divino propio. En español, la forma de proyecto «Yahvé» preserva ese nombre en vez de sustituirlo por un título; esto mantiene la transparencia textual y la continuidad con la política terminológica del POB en español.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'El contexto auditado en inglés propone «rose early», pero la forma española prioriza naturalidad sin perder el sentido temporal. También se ajusta la terminología del nombre divino al estándar español del proyecto: «Yahvé» en lugar de la convención inglesa «the LORD». No hay variantes textuales; el hebreo masorético y el audit trail coinciden plenamente.'
  spanish_consistency_notes:
  - Se mantiene el estilo narrativo sobrio y formal del libro de las Crónicas.
  - 'Se conserva el paralelismo de acciones en serie: levantarse, reunir y subir.'
  - La forma «casa de Yahvé» sigue el patrón del proyecto para בֵּית יְהוָה.
  - El título «el rey» se mantiene en aposición natural con el nombre propio.
  - La nota a pie de página se ancla en «se levantó» para conservar el matiz temporal del hebreo.
