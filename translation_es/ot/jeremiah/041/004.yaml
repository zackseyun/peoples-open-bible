translation:
  language: es
  text: Y sucedió al segundo día después de haber matado a Gedalías, y nadie lo[a] sabía.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «y nadie sabía». El objeto («lo», refiriéndose al asesinato de Gedalías) está implícito en el hebreo y se añade en español para mayor claridad.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And it happened
  chosen_spanish: Y aconteció
  alternatives_spanish:
  - Y sucedió
  - Y pasó
  lexicon: HALOT
  rationale: La fórmula narrativa hebrea introduce el siguiente episodio en secuencia; «Y aconteció» conserva el valor de encadenamiento sin sonar arcaico en español.
- source_word: בַּיּוֹם הַשֵּׁנִי
  english_pob_choice: on the second day
  chosen_spanish: en el segundo día
  alternatives_spanish:
  - al segundo día
  - en el día segundo
  lexicon: HALOT
  rationale: Se conserva el numeral explícito del hebreo. «En el segundo día» refleja la estructura temporal de forma directa y natural.
- source_word: לְהָמִית אֶת גְּדַלְיָהוּ
  english_pob_choice: after he had killed Gedaliah
  chosen_spanish: después de haber matado a Gedalías
  alternatives_spanish:
  - tras matar a Gedalías
  - después de que había matado a Gedalías
  lexicon: HALOT
  rationale: El infinitivo constructo con ל señala el punto temporal posterior al acto de matar; en español, «después de haber matado» expresa bien esa relación. Se mantiene el nombre propio transliterado como «Gedalías».
- source_word: וְאִישׁ
  english_pob_choice: no man
  chosen_spanish: nadie
  alternatives_spanish:
  - ningún hombre
  - ninguna persona
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «y un hombre», el conjunto coordinado con la negación funciona idiomáticamente como «nadie». En español, esta opción preserva el sentido sin forzar una construcción menos natural.
- source_word: לֹא יָדָע
  english_pob_choice: knew it
  chosen_spanish: lo supo
  alternatives_spanish:
  - no lo sabía
  - no llegó a saberlo
  lexicon: HALOT
  rationale: El verbo ידע aquí denota conocimiento de un hecho implícito (la muerte de Gedalías). En español, «lo supo» comunica ese hecho con concisión; el objeto directo implícito se recupera por contexto.
translation_notes:
  revision_awareness: Se corrigió la validación anterior eliminando la nota al pie no anclada. La traducción mantiene la coordinación narrativa del hebreo sin añadir marcadores de nota.
  spanish_consistency_notes:
  - Se usa «Gedalías» de forma consistente para el nombre propio.
  - Se preserva el tiempo pasado narrativo con una coordinación simple («Y aconteció… y nadie lo supo») acorde al hebreo.
  - No se introducen términos eclesiásticos ajenos al texto; la cláusula final mantiene el objeto implícito por contexto en lugar de explicitarlo con una nota.
