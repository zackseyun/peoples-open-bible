id: LUK.16.30
reference: Luke 16:30
source:
  edition: SBLGNT
  text: ὁ δὲ εἶπεν· Οὐχί, πάτερ Ἀβραάμ, ἀλλ’ ἐάν τις ἀπὸ νεκρῶν πορευθῇ πρὸς αὐτοὺς μετανοήσουσιν.
translation:
  text: But he said[a], ‘No, father Abraham, but if someone goes to them from among the dead, they will change their thinking.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or simply, “from the dead.”
    reason: lexical_alternative
lexical_decisions:
- source_word: Οὐχί
  chosen: 'No'
  alternatives:
  - No indeed
  - Certainly not
  lexicon: BDAG
  rationale: A strong negative reply. 'No' is the most natural modern English equivalent in direct speech here, preserving the contradiction without sounding overly formal.
- source_word: πάτερ Ἀβραάμ
  chosen: father Abraham
  alternatives:
  - Father Abraham
  lexicon: BDAG
  rationale: Vocative address. Lowercase 'father' treats it as a relational form of address rather than a formal title. This preserves the rich man's appeal to Abraham as ancestor.
- source_word: ἀλλ’ ἐάν
  chosen: but if
  alternatives:
  - rather, if
  - on the contrary, if
  lexicon: BDAG
  rationale: 'The conjunction pair marks correction/contrast to the prior statement: not merely hearing Moses and the Prophets, but a different condition. ''But if'' is idiomatic and preserves the argumentative turn.'
- source_word: τις
  chosen: someone
  alternatives:
  - anyone
  - a person
  lexicon: BDAG
  rationale: Indefinite singular referring to any person. 'Someone' is natural English and fits the singular verb.
- source_word: ἀπὸ νεκρῶν
  chosen: from among the dead
  alternatives:
  - from the dead
  lexicon: BDAG
  rationale: The phrase can be rendered simply 'from the dead,' but 'from among the dead' more transparently reflects ἀπό + genitive plural and the sense of emergence out from the realm/company of the dead.
- source_word: πορευθῇ
  chosen: goes
  alternatives:
  - should go
  - comes
  lexicon: BDAG
  rationale: Aorist subjunctive after ἐάν in a future more vivid condition. English present 'goes' after 'if' is idiomatic. 'Comes' would shift the deictic perspective; the Greek verb is 'go' with πρὸς αὐτούς ('to them').
- source_word: πρὸς αὐτοὺς
  chosen: to them
  alternatives:
  - to them personally
  - to those men
  lexicon: BDAG
  rationale: πρός with accusative here indicates movement toward persons. 'To them' is the direct and sufficient rendering.
- source_word: μετανοήσουσιν
  chosen: they will change their thinking
  alternatives:
  - they will change their minds
  - they will turn back
  lexicon: BDAG
  rationale: μετανοέω in Luke commonly denotes repentance in the moral-spiritual sense, not mere mental reconsideration. 'Repent' preserves the theological and ethical force without paraphrase.
