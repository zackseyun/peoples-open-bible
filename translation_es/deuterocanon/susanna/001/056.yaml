  yaml_path: translation/deuterocanon/susanna/001/056.yaml
  text: And after removing him[a], he ordered the other one to be brought forward. And he said to him, “Offspring of Canaan and not Judah, beauty has deceived you[b], and desire has corrupted your heart.”
  footnotes:
