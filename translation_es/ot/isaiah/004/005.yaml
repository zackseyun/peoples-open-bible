translation:
  language: es
  text: Entonces Yahvé creará sobre todo el sitio del monte Sion y sobre sus asambleas una nube de día[a], y humo, y el resplandor de un fuego llameante de noche[c][b]; porque sobre toda la gloria habrá un dosel[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus convocaciones». El término hebreo puede referirse a asambleas señaladas o reuniones convocadas.
    reason: lexical_alternative
  - marker: b
    text: O «el fulgor de un fuego abrasador de noche».
    reason: lexical_alternative
  - marker: c
    text: La imagen recuerda la nube y el fuego de Yahvé en el desierto (por ejemplo, Éxodo 13:21–22).
    reason: cross_reference
  - marker: d
    text: O «un cobertor»; el hebreo también puede sugerir un dosel nupcial.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבָרָא
  english_pob_choice: Then ... will create
  chosen_spanish: Entonces ... creará
  alternatives_spanish:
  - Y ... creó
  - Y ... creará
  lexicon: HALOT
  rationale: El hebreo perfecto con waw en discurso profético se entiende como futuro de promesa. «Creará» conserva el verbo fuerte ברא y «Entonces» reproduce la progresión discursiva de la conjunción.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el default del proyecto para el nombre divino, sin sustituirlo por una convención de ocultamiento.
- source_word: מְכוֹן
  english_pob_choice: site
  chosen_spanish: sitio
  alternatives_spanish:
  - lugar establecido
  - morada
  - fundamento
  lexicon: HALOT
  rationale: En este contexto espacial con «monte Sion», «sitio» comunica un lugar fijado o establecido sin cargar una interpretación más específica que el hebreo no exige.
- source_word: הַר צִיּוֹן
  english_pob_choice: Mount Zion
  chosen_spanish: monte Sion
  alternatives_spanish:
  - el monte de Sion
  lexicon: HALOT
  rationale: «Monte Sion» es la forma natural y fiel en español para el topónimo compuesto.
- source_word: מִקְרָאֶיהָ
  english_pob_choice: her assemblies
  chosen_spanish: sus asambleas
  alternatives_spanish:
  - sus convocaciones
  - las reuniones convocadas de ella
  - sus lugares de reunión
  lexicon: HALOT
  rationale: מִקְרָא puede referirse a asamblea o convocación. «Asambleas» conserva el sentido de grupo reunido; el sufijo femenino se refleja con «sus», remitiendo a Sion.
- source_word: עָנָן יוֹמָם
  english_pob_choice: a cloud by day
  chosen_spanish: una nube de día
  alternatives_spanish:
  - una nube en el día
  lexicon: HALOT
  rationale: La frase es directa y mantiene la imaginería de Éxodo sin añadir expansión interpretativa.
- source_word: וְעָשָׁן
  english_pob_choice: and smoke
  chosen_spanish: y humo
  alternatives_spanish:
  - e humo
  lexicon: HALOT
  rationale: Se conserva el sustantivo coordinado de manera explícita, reflejando la acumulación de señales visibles.
- source_word: וְנֹגַהּ אֵשׁ לֶהָבָה לָיְלָה
  english_pob_choice: and the brightness of a flaming fire by night
  chosen_spanish: y el resplandor de un fuego llameante de noche
  alternatives_spanish:
  - y el brillo de un fuego abrasador de noche
  - y el fulgor de una llama de fuego por la noche
  lexicon: HALOT
  rationale: «נֹגַהּ» apunta a resplandor/fulgor y «לֶהָבָה» a llama o fuego llameante. La fórmula elegida preserva ambos componentes sin colapsarlos en una sola imagen.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la base explicativa de lo anterior; «porque» es natural y precisa en español.
- source_word: כָּבוֹד
  english_pob_choice: the glory
  chosen_spanish: la gloria
  alternatives_spanish:
  - gloria
  - el honor
  lexicon: HALOT
  rationale: Se mantiene el valor de presencia/gloria asociado al contexto de Sion, con artículo para fluidez idiomática.
- source_word: חֻפָּה
  english_pob_choice: a canopy
  chosen_spanish: un dosel
  alternatives_spanish:
  - un cobertor
  - una cubierta
  - un palio
  lexicon: HALOT
  rationale: «Dosel» conserva la idea de cobertura/canopia y permite, sin imponerlo, el matiz nupcial posible del término hebreo.
theological_decisions:
- issue: Valor profético del perfecto con waw en וּבָרָא
  english_pob_reading: future promise ('will create')
  chosen_spanish_reading: futuro de promesa ('creará')
  alternative_spanish_readings:
  - pasado narrativo ('creó')
  rationale: En el contexto de restauración de Isaías, la forma verbal funciona proféticamente. Traducirla como futuro preserva el carácter de promesa de una acción nueva de Dios sobre Sion.
  doctrine_reference: Preservar el sentido profético sin neutralizarlo.
- issue: Imaginería de nube/fuego y posible eco del Éxodo
  english_pob_reading: retain imagery without making typological interpretation explicit in the main text
  chosen_spanish_reading: mantener la imaginería sin explicitar la tipología en el texto principal
  alternative_spanish_readings:
  - hacer explícita la alusión con 'columna de nube'/'columna de fuego'
  - añadir una lectura mesiánica o eclesiológica en el cuerpo del verso
  rationale: El hebreo evoca la teofanía del desierto, pero el texto base no desarrolla esa tipología. La traducción debe conservar la imagen y dejar la inferencia al lector, sin sobreinterpretar.
  doctrine_reference: Preservar la tensión teológica y la evidencia léxica.
translation_notes:
  revision_awareness: Se siguió el estado de revisión más reciente sin cambios materiales; la redacción española mantiene el sentido del hebreo y el audit trail inglés, incluyendo las alternativas léxicas y la nota de eco del Éxodo.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino según el estándar del proyecto.
  - Se mantiene «Sion» en la forma usual española, con «monte» como equivalente de Mount.
  - Se eligió «asambleas» para מִקְרָאֶיהָ, evitando una interpretación litúrgica más estrecha que no exige el texto.
  - «Dosel» conserva la imagen de cobertura sin fijar de modo demasiado fuerte el matiz nupcial.
  - La puntuación y las mayúsculas siguen el uso estándar del español contemporáneo.
