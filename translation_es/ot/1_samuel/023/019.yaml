translation:
  language: es
  text: 'Entonces los zifitas subieron a Saúl en Guibeá, diciendo: «¿No está David escondido entre nosotros en las fortalezas, en la zona boscosa[a], en la colina de Haquilá[b], que está a la derecha del Jesimón?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en Horesh», tomando el término como nombre de lugar y no como «zona boscosa».
    reason: alternative_reading
  - marker: b
    text: Literalmente, «a la derecha del Jesimón»; en el uso geográfico hebreo esto probablemente significa «al sur del Jesimón».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲלוּ
  english_pob_choice: went up
  chosen_spanish: subieron
  alternatives_spanish:
  - fueron
  - ascendieron
  lexicon: HALOT
  rationale: עלה expresa movimiento ascendente o hacia arriba. En español, «subieron» conserva el valor direccional natural sin sobrecargar el estilo.
- source_word: זִפִים
  english_pob_choice: the Ziphites
  chosen_spanish: los zifitas
  alternatives_spanish:
  - los hombres de Zif
  lexicon: HALOT
  rationale: El gentilicio plural designa a los habitantes de Zif. «Zifitas» es claro y sigue el valor gentilicio del hebreo.
- source_word: הַגִּבְעָתָה
  english_pob_choice: at Gibeah
  chosen_spanish: en Guibeá
  alternatives_spanish:
  - a Guibeá
  - en la Guibeá
  lexicon: HALOT
  rationale: El he direccional del topónimo indica movimiento hacia ese lugar, pero en español la referencia al lugar donde está Saúl se expresa con naturalidad como «en Guibeá».
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijeron
  lexicon: HALOT
  rationale: La fórmula introductoria del discurso directo se conserva con «diciendo» para reflejar la estructura hebrea.
- source_word: הֲלוֹא
  english_pob_choice: Is not
  chosen_spanish: ¿No está...?
  alternatives_spanish:
  - ¿Acaso no está...?
  lexicon: HALOT
  rationale: Es una pregunta retórica que espera asentimiento. En español, «¿No está...?» transmite bien ese valor.
- source_word: מִסְתַּתֵּר
  english_pob_choice: hiding
  chosen_spanish: escondido
  alternatives_spanish:
  - ocultándose
  - escondiéndose
  lexicon: HALOT
  rationale: El participio hitpael señala ocultamiento continuo. «Escondido» funciona de manera idiomática en español y mantiene el estado de ocultamiento.
- source_word: עִמָּנוּ
  english_pob_choice: among us
  chosen_spanish: entre nosotros
  alternatives_spanish:
  - con nosotros
  lexicon: HALOT
  rationale: Aunque literalmente es «con nosotros», el contexto espacial/comunitario pide «entre nosotros» para comunicar que David está en medio de su territorio.
- source_word: בַמְּצָדוֹת
  english_pob_choice: in the strongholds
  chosen_spanish: en los refugios
  alternatives_spanish:
  - en las fortalezas
  - en las fortalezas defensivas
  lexicon: HALOT
  rationale: מְצָדוֹת puede referirse a fortalezas o lugares de refugio. En este contexto de escondite en el desierto, «refugios» comunica la función sin perder la idea de lugar protegido.
- source_word: בַּחֹרְשָׁה
  english_pob_choice: in the wooded area
  chosen_spanish: en la zona boscosa
  alternatives_spanish:
  - en el bosque
  - en Horesh
  lexicon: HALOT
  rationale: La forma admite el sentido común de bosque/terreno arbolado o el topónimo Horesh. El texto principal adopta el sentido descriptivo, y la nota preserva la alternativa toponímica.
- source_word: בְּגִבְעַת הַחֲכִילָה
  english_pob_choice: on the hill of Hachilah
  chosen_spanish: en el monte de Haquilá
  alternatives_spanish:
  - en la colina de Haquilá
  - sobre el monte de Haquilá
  lexicon: HALOT
  rationale: גִּבְעָה es «colina» o «monte». En español bíblico, «monte» es natural para una elevación topográfica; se mantiene el nombre propio transliterado.
- source_word: אֲשֶׁר מִימִין הַיְשִׁימוֹן
  english_pob_choice: which is to the right of the Jeshimon
  chosen_spanish: que está a la derecha del Jesimón
  alternatives_spanish:
  - que está al sur del Jesimón
  lexicon: HALOT
  rationale: מִימִין significa literalmente «a la derecha». La POB en inglés decidió mantener esa literalidad en la revisión más reciente; en español se sigue esa elección y se preserva el topónimo Jesimón.
translation_notes:
  revision_awareness: La POB inglesa revisó el final de «south of the Jeshimon» a «to the right of the Jeshimon» para reflejar con más literalidad מִימִין y evitar una interpretación direccional no explícita. Esta versión española sigue esa revisión y conserva la posibilidad semántica en la nota b. También mantiene la ambigüedad de בַּחֹרְשָׁה entre «zona boscosa» y «Horesh» mediante nota.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se prefiere «Jesimón» para el topónimo hebreo הַיְשִׁימוֹן, en línea con una transliteración española estable.
  - «Guibeá» y «Haquilá» conservan la transliteración para nombres propios geográficos.
  - Se mantiene un registro bíblico moderno y claro, evitando calcos innecesarios pero sin ampliar el sentido más allá del hebreo.
