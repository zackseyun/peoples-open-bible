revisions:
- from: Y entraré en juicio con él mediante pestilencia y sangre[a]; y derramaré sobre él, sobre sus tropas[c], y sobre los muchos pueblos que están con él, lluvia torrencial, piedras de granizo, fuego y azufre[b].
  to: Y entraré en juicio con él mediante pestilencia y derramamiento de sangre; y haré llover sobre él, sobre sus tropas[c], y sobre los muchos pueblos que están con él, lluvia torrencial[a], piedras de granizo, fuego y azufre[b].
  rationale: Se corrigió 'sangre' a 'derramamiento de sangre' para reflejar mejor el valor metonímico de דָּם en contexto de juicio. Se reemplazó 'derramaré' por 'haré llover' para preservar la fuerza de אַמְטִיר. Se reubicó la nota [a] al sintagma correcto y se reformuló la nota [b] para que refleje fielmente la observación del POB inglés sin atribuir erróneamente 'tradicional' al hebreo.
  reviewer_model: gpt-5.4
