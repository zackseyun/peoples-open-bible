translation:
  language: es
  text: Permanece junto a tu campamento[a], asegurando a cada hombre de tu fuerza, y que tus servidores[b] tomen control del manantial de agua que sale del pie de la montaña[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «quédate». ἀνάμεινον puede expresar permanecer o quedarse en un lugar; aquí se prefiere «permanece» por su tono de orden militar.
    reason: lexical_alternative
  - marker: b
    text: O «tus hombres». οἱ παῖδές σου puede significar servidores, asistentes o subordinados; el contexto militar también permite entenderlo como «tus hombres».
    reason: lexical_alternative
  - marker: c
    text: Literalmente, «la raíz de la montaña», un giro idiomático que designa su base o pie.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνάμεινον
  english_pob_choice: Remain
  chosen_spanish: Permanece
  alternatives_spanish:
  - Quédate
  - Permanece allí
  lexicon: LSJ
  rationale: El imperativo pide permanecer en el lugar; «permanece» conserva la fuerza directiva y suena natural en español militar.
- source_word: παρεμβολῆς
  english_pob_choice: camp
  chosen_spanish: campamento
  alternatives_spanish:
  - campamento militar
  - real
  lexicon: LSJ
  rationale: En contexto militar, παρεμβολή designa el campamento. «Campamento» es claro y fiel sin sobrecargar.
- source_word: ἀσφαλίζων
  english_pob_choice: securing
  chosen_spanish: asegurando
  alternatives_spanish:
  - guardando
  - protegiendo
  lexicon: LSJ
  rationale: El participio expresa hacer seguro o asegurar. «Asegurando» conserva la acción continua y el matiz operativo.
- source_word: πάντα ἄνδρα
  english_pob_choice: every man
  chosen_spanish: a cada hombre
  alternatives_spanish:
  - a todo hombre
  - a cada uno de los hombres
  lexicon: LSJ
  rationale: La forma griega es singular distributiva y masculina. «A cada hombre» preserva esa precisión sin diluir el género gramatical.
- source_word: ἐκ τῆς δυνάμεώς σου
  english_pob_choice: of your force
  chosen_spanish: de tu fuerza
  alternatives_spanish:
  - de tu poderío
  - de tus fuerzas
  lexicon: LSJ
  rationale: Aquí δύναμις se refiere a una fuerza militar o capacidad de combate. «Fuerza» mantiene el sentido amplio sin introducir «ejército».
- source_word: οἱ παῖδές σου
  english_pob_choice: your servants
  chosen_spanish: tus servidores
  alternatives_spanish:
  - tus siervos
  - tus hombres
  - tus asistentes
  lexicon: LSJ
  rationale: παῖδες puede significar servidores, asistentes o subordinados. «Servidores» refleja la relación de dependencia y evita imponer «hombres» como interpretación militar exclusiva.
- source_word: ἐπικρατησάτωσαν
  english_pob_choice: take control
  chosen_spanish: tomen control
  alternatives_spanish:
  - se adueñen
  - tomen posesión
  lexicon: LSJ
  rationale: El verbo expresa llegar a dominar o ejercer control sobre algo. «Tomen control» reproduce de forma directa el objetivo táctico del pasaje.
- source_word: πηγῆς τοῦ ὕδατος
  english_pob_choice: the spring of water
  chosen_spanish: la fuente de agua
  alternatives_spanish:
  - el manantial de agua
  - la fuente de las aguas
  lexicon: LSJ
  rationale: La expresión concreta alude a una fuente o manantial. «Fuente de agua» es natural en español y conserva la imagen del lugar abastecedor.
- source_word: ἐκπορεύεται
  english_pob_choice: comes out
  chosen_spanish: sale
  alternatives_spanish:
  - fluye
  - brota
  lexicon: LSJ
  rationale: El verbo indica salir o proceder desde un punto. «Sale» es el equivalente más directo y transparente.
- source_word: ῥίζης τοῦ ὄρους
  english_pob_choice: the foot of the mountain
  chosen_spanish: la raíz de la montaña
  alternatives_spanish:
  - el pie de la montaña
  - la base de la montaña
  lexicon: LSJ
  rationale: El griego dice literalmente «raíz». Aunque el inglés POB aclara el valor idiomático como «foot», en español se puede conservar la imagen de «raíz» sin perder inteligibilidad, dejando visible la metáfora topográfica.
theological_decisions:
- issue: Relación entre la lectura literal de ῥίζα y su valor idiomático topográfico
  english_pob_reading: Literally 'the root of the mountain,' an idiom for its base or foot.
  chosen_spanish_reading: «la raíz de la montaña», con la imagen idiomática preservada
  alternative_spanish_readings:
  - «el pie de la montaña»
  - «la base de la montaña»
  rationale: El texto fuente conserva ῥίζα; traducirla como «raíz» deja visible la metáfora original. Como nota, puede entenderse como la parte baja de la montaña, pero la traducción principal no borra la tensión lexical.
  doctrine_reference: Ps 52:8; uso de imágenes topográficas en traducción bíblica
- issue: Valor de οἱ παῖδές σου en un mandato militar
  english_pob_reading: your servants; Or 'your men' ... the Greek term can denote servants, attendants, or subordinates in context.
  chosen_spanish_reading: tus servidores
  alternative_spanish_readings:
  - tus hombres
  - tus asistentes
  rationale: Se mantiene la apertura semántica de παῖδες sin reducirla de entrada a una sola solución militar. «Servidores» es compatible con el griego y deja espacio para la subordinación implícita por el contexto.
  doctrine_reference: Principio de transparencia lexical en la POB
translation_notes:
  revision_awareness: La traducción sigue la lectura revisada del audit trail en cuanto al valor de ἐπικρατησάτωσαν como «tomar control» y mantiene la relación posesiva de ἐκ τῆς δυνάμεώς σου como «de tu fuerza», evitando el calco incorrecto «desde tu fuerza». También conserva la nota idiomática sobre ῥίζα/«root of the mountain», visible en el texto principal mediante «raíz».
  spanish_consistency_notes:
  - Se usó «campamento» para παρεμβολή por consistencia con el campo militar del pasaje.
  - Se evitó «SEÑOR» u otras sustituciones teológicas no presentes en el texto fuente.
  - Se mantuvo el registro sobrio y bíblico sin arcaísmos innecesarios.
  - Las notas usan marcadores únicos y aparecen en el texto en los lugares correspondientes.
