  yaml_path: translation/ot/jeremiah/051/044.yaml
  text: And I will punish Bel in Babylon[a], and I will bring out of his mouth what he has swallowed; nations will no longer stream to him[b]. Even the wall of Babylon has fallen.
  footnotes:
