  rationale: Se cambia «hasta Tarsis» por «a Tarsis» para reflejar con precisión la dirección del he local; «lamentaos» por «giman» para expresar un clamor audible de duelo, más fiel a הֵילִילוּ y más natural en español moderno; y «moradores» por «habitantes» para mejorar claridad y naturalidad sin pérdida de sentido.
