- from: No temamos al que parece matar[a].
  to: No temamos al que parece poder matar[a].
  rationale: 'Se ajusta la frase principal para evitar una ambigüedad real del español y para reflejar mejor la decisión léxica y teológica auditada: el perseguidor solo parece tener poder para matar. La nota se normaliza estilísticamente.'
