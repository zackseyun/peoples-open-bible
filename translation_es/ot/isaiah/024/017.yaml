translation:
  language: es
  text: Terror y el foso y el lazo[a] están sobre ti, habitante de la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Temor y el foso y el lazo están sobre ti, tú que habitas sobre la tierra».'
    reason: lexical_alternative
lexical_decisions:
- source_word: פַּחַד
  english_pob_choice: Terror
  chosen_spanish: Terror
  alternatives_spanish:
  - Temor
  - Pavor
  lexicon: HALOT
  rationale: El hebreo designa miedo/dread, pero en esta fórmula judicial de juicio, junto con «foso» y «lazo», «terror» comunica mejor la amenaza objetiva e inminente que un simple estado interior. Además conserva la fuerza acumulativa del trío.
- source_word: פַחַת
  english_pob_choice: the pit
  chosen_spanish: foso
  alternatives_spanish:
  - el foso
  - la zanja-trampa
  - el hoyo
  lexicon: HALOT
  rationale: El sustantivo se refiere a un hoyo usado como trampa. «Foso» suena natural en español y mantiene la imagen de una trampa excavada; evita sobreexplicar con una perífrasis más larga.
- source_word: פָח
  english_pob_choice: the snare
  chosen_spanish: lazo
  alternatives_spanish:
  - trampa
  - red
  lexicon: HALOT
  rationale: El término nombra una trampa para capturar. «Lazo» preserva la idea de instrumento de captura y distingue bien este miembro del trío respecto de «foso».
- source_word: עָלֶיךָ
  english_pob_choice: are upon you
  chosen_spanish: están sobre ti
  alternatives_spanish:
  - caen sobre ti
  - vendrán sobre ti
  lexicon: HALOT
  rationale: La construcción preposicional literalmente dice «sobre ti». En español conviene explicitar el verbo copulativo para una cláusula natural, manteniendo la inmediatez del hebreo sin forzar un futuro que no está expresado de manera obligatoria.
- source_word: יוֹשֵׁב הָאָרֶץ
  english_pob_choice: inhabitant of the earth
  chosen_spanish: habitante de la tierra
  alternatives_spanish:
  - tú que habitas la tierra
  - morador de la tierra
  - habitante del mundo
  lexicon: HALOT
  rationale: El participio singular funciona como vocativo. «Habitante de la tierra» conserva esa dirección directa y, frente a «mundo», respeta mejor la literalidad de אֶרֶץ sin perder inteligibilidad en español.
theological_decisions:
- issue: Alcance de הָאָרֶץ / אֶרֶץ
  english_pob_reading: earth
  chosen_spanish_reading: tierra
  alternative_spanish_readings:
  - mundo
  - país
  rationale: Isaías 24 presenta un juicio de alcance universal. «Tierra» permite esa amplitud en español sin restringir el texto a una región concreta ni introducir un matiz más interpretativo como «mundo».
  doctrine_reference: Isaías 24:1-23; juicio universal sobre la tierra
- issue: Estructura nominal sin verbo explícito
  english_pob_reading: Terror and the pit and the snare are upon you
  chosen_spanish_reading: Terror y foso y lazo están sobre ti
  alternative_spanish_readings:
  - Terror, foso y lazo sobre ti
  - Terror y el foso y el lazo caen sobre ti
  rationale: El hebreo es una cláusula nominal con sentido de presencia/amenaza inmediata. En español, «están sobre ti» conserva esa inmediatez y hace la construcción plenamente publicable sin alterar el valor del texto.
  doctrine_reference: Sintaxis hebrea de cláusula nominal; Isaías 24:17
translation_notes:
  revision_awareness: 'El texto fuente y la traducción inglesa auditada concuerdan en el sentido general. La única decisión principal fue cómo verter פַּחַד: se optó por «terror» siguiendo la lectura inglesa, mientras se deja constancia de la alternativa «temor» en nota. No se detectan revisiones textuales ni variantes que obliguen a apartarse del WLC.'
  spanish_consistency_notes:
  - Se mantiene el trío nominal breve para reflejar la concisión hebrea.
  - «Tierra» se usa de forma consistente con el valor universal de אֶרֶץ en este capítulo.
  - Se evitó «SEÑOR» u otras sustituciones no pertinentes, ya que el versículo no contiene el nombre divino.
