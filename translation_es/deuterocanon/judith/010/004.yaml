translation:
  language: es
  text: Y se puso sandalias en los pies, y se puso las tobilleras, las pulseras, los anillos, los pendientes y todo su adorno[a]; y se hizo muy hermosa, para engañar a los ojos de los hombres que pudieran verla.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «toda su joyería» o «todo su atavío». El griego κόσμος aquí significa adorno u ornamentación, no «mundo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔλαβεν ... σανδάλια εἰς τοὺς πόδας αὐτῆς
  english_pob_choice: put sandals on her feet
  chosen_spanish: tomó sandalias para sus pies
  alternatives_spanish:
  - se puso sandalias
  - calzó sandalias en sus pies
  lexicon: LSJ
  rationale: El griego dice literalmente 'tomó', pero en contexto de vestimenta el sentido natural es que se las calzó o las tomó para ponérselas. En español, 'tomó sandalias para sus pies' conserva el matiz del verbo sin sonar demasiado mecánico.
- source_word: περιέθετο
  english_pob_choice: put on
  chosen_spanish: se puso
  alternatives_spanish:
  - se colocó
  - se ciñó con
  lexicon: LSJ
  rationale: El verbo medio expresa que ella misma se adornó. 'Se puso' es la forma más natural y mantiene la acción de vestirse con joyas.
- source_word: χλιδῶνας
  english_pob_choice: anklets
  chosen_spanish: brazaletes
  alternatives_spanish:
  - tobilleras
  - ornamentos de lujo
  lexicon: LSJ
  rationale: En la secuencia de adornos, el término designa una pieza concreta. 'Brazaletes' es una opción comprensible; sin embargo, queda abierta la posibilidad de un adorno corporal específico no totalmente seguro. Para no imponer una precisión dudosa, se usa un término de joyería general en la serie, con nota que preserva la alternativa de 'adorno'.
- source_word: ψέλια
  english_pob_choice: bracelets
  chosen_spanish: pulseras
  alternatives_spanish:
  - brazaletes
  - manillas
  lexicon: LSJ
  rationale: '''Pulseras'' comunica bien el sentido de joyas para la muñeca en español actual. ''Brazaletes'' también sería posible, pero ''pulseras'' resulta más natural en una lista de adornos.'
- source_word: δακτυλίους
  english_pob_choice: rings
  chosen_spanish: anillos
  alternatives_spanish:
  - sortijas
  lexicon: LSJ
  rationale: Es el equivalente directo y natural para el uso de joyería en español.
- source_word: ἐνώτια
  english_pob_choice: earrings
  chosen_spanish: pendientes
  alternatives_spanish:
  - aretes
  - zarcillos
  lexicon: LSJ
  rationale: '''Pendientes'' es ampliamente entendido en español latinoamericano y mantiene el carácter ornamental del término.'
- source_word: πάντα τὸν κόσμον αὐτῆς
  english_pob_choice: all her jewelry
  chosen_spanish: todo su adorno
  alternatives_spanish:
  - toda su joyería
  - toda su finura
  - todo su atavío
  lexicon: LSJ
  rationale: κόσμος aquí significa adorno u ornamento, no 'mundo'. 'Todo su adorno' preserva la amplitud semántica sin reducirla solo a joyas, manteniendo la tensión señalada por la POB inglesa entre 'jewelry' y alternativas más amplias.
- source_word: ἐκαλλωπίσατο σφόδρα
  english_pob_choice: she made herself very beautiful
  chosen_spanish: se hermoseó mucho
  alternatives_spanish:
  - se adornó en gran manera
  - se embelleció sobremanera
  lexicon: LSJ
  rationale: El verbo medio indica que ella misma se arregló o embelleció; 'se hermoseó' expresa el resultado estético sin perder el tono narrativo. 'Mucho' traslada σφόδρα de manera clara y sobria.
- source_word: εἰς ἀπάτησιν
  english_pob_choice: to deceive
  chosen_spanish: para engañar
  alternatives_spanish:
  - con el fin de engañar
  - para causar engaño
  lexicon: LSJ
  rationale: La preposición con sustantivo expresa finalidad. 'Para engañar' conserva el valor intencional y no suaviza la finalidad explícita del texto.
- source_word: ὀφθαλμῶν ἀνδρῶν
  english_pob_choice: the eyes of any men who might see her
  chosen_spanish: a los ojos de los hombres
  alternatives_spanish:
  - ante la vista de los hombres
  - a la vista de cualquier hombre
  lexicon: LSJ
  rationale: El griego menciona literalmente 'ojos', y conviene conservar esa imagen. 'A los ojos de los hombres' reproduce el giro de manera natural en español.
- source_word: ὅσοι ἂν ἴδωσιν αὐτήν
  english_pob_choice: any men who might see her
  chosen_spanish: de los hombres que pudieran verla
  alternatives_spanish:
  - de cuantos la vieran
  - de todos los hombres que la vieran
  lexicon: LSJ
  rationale: La construcción griega es indefinida y general. 'Que pudieran verla' recoge el sentido abierto sin absolutizarlo ni restringirlo demasiado.
theological_decisions:
- issue: Propósito moral de la ornamentación de Judith
  english_pob_reading: The text states explicitly that she beautified herself in order to deceive the eyes of men who might see her.
  chosen_spanish_reading: El texto dice explícitamente que se hermoseó con la finalidad de engañar a los hombres que pudieran verla.
  alternative_spanish_readings:
  - que se arregló solo para llamar la atención
  - que se adornó para resultar agradable
  rationale: No conviene suavizar ἀπάτησις ni convertir el propósito en mera atracción. La traducción conserva la tensión narrativa y moral del pasaje, tal como hace la POB inglesa.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
translation_notes:
  revision_awareness: La redacción sigue la lectura revisada del audit trail inglés, especialmente en el valor indefinido de ὅσοι ἂν ἴδωσιν αὐτήν ('any men who might see her'). Se mantuvo también la fuerza de ἀπάτησις como 'engañar' y no como una mera atracción estética.
  spanish_consistency_notes:
  - Se prefirió 'se hermoseó' para mantener un registro bíblico pero claro, sin recurrir a un arcaísmo excesivo.
  - Se conservó la imagen de 'ojos' para ὀφθαλμῶν, evitando una abstracción como 'vista' que diluye el paralelismo.
  - '''Todo su adorno'' deja abierta la amplitud semántica de κόσμος, en consonancia con la nota inglesa sobre ''all her jewelry'' frente a ''all her adornment''.'
