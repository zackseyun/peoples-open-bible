    rationale: La combinación de presente «existes» con «para siempre» suena infeliz y no refleja bien la decisión POB de una desaparición irreversible proyectada por el oráculo. Debe revisarse a una forma más natural y enfática, p. ej. «no existirás más jamás».
  revised_spanish_text: Todos los que te conocen entre los pueblos quedan horrorizados ante ti[a]; te has vuelto un espanto[b], y no existirás más jamás.
