review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la secuencia del hebreo: abandono/arrojamiento sobre la tierra, lanzamiento sobre el campo, aves que se posan sobre el cadáver y fieras saciadas con él. Sin embargo, introduce una explicitación no presente en el texto base al traducir מִמְּךָ como «con tu carne»; el hebreo dice literalmente «de ti» y el POB inglés prefirió la equivalencia idiomática «with you», reservando la explicación alimentaria para nota. También la nota [b] no preserva la alternativa léxica destacada por el POB inglés para la cláusula final.'
  spanish_quality_summary: El español es mayormente claro y digno, pero «sobre la superficie del campo» suena algo rígido; «en campo abierto» o «sobre el campo abierto» es más natural sin perder la imagen. La frase global funciona bien, aunque conviene evitar la sobreexplicación de «tu carne» en el texto principal y moverla a nota para mantener fidelidad y mejor estilo.
  glossary_alignment: No hay conflictos con terminología de proyecto clave. «Toda ave del cielo» y «las fieras de toda la tierra» son apropiados. La principal cuestión léxica es mantener el valor de מִמְּךָ sin ampliar indebidamente el texto principal.
  issues:
  - severity: medium
    issue: «con tu carne» añade un elemento no expreso en מִמְּךָ
    rationale: El hebreo dice literalmente «de ti», y el POB inglés eligió «with you» en el texto principal, dejando la explicación de que las fieras comen del cuerpo en nota. «Con tu carne» interpreta correctamente la imagen, pero va más allá de la evidencia inmediata.
  - severity: medium
    issue: La nota [b] comenta «haré posar...» pero omite la alternativa léxica del POB sobre «I will satisfy from you...»
    rationale: El audit trail inglés documenta como nota la literalidad de la cláusula final, no de la de las aves. La nota española actual desplaza el foco y no preserva esa decisión auditada.
  - severity: low
    issue: «sobre la superficie del campo» suena algo acartonado en español
    rationale: Aunque es defendible, la expresión es menos natural que «en campo abierto», que conserva bien el sentido de exposición de עַל־פְּנֵי הַשָּׂדֶה.
  revised_spanish_text: Te arrojaré a la tierra[a]; te echaré en campo abierto, y haré posar sobre ti a toda ave del cielo; y saciaré con tu cuerpo[b] a las fieras de toda la tierra.
  revised_footnotes:
