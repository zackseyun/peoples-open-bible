id: 1PE.2.6
reference: 1 Peter 2:6
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: διότι περιέχει ἐν γραφῇ· Ἰδοὺ τίθημι ἐν Σιὼν λίθον ἀκρογωνιαῖον ἐκλεκτὸν ἔντιμον, καὶ ὁ πιστεύων ἐπ’ αὐτῷ οὐ μὴ καταισχυνθῇ.
base_translation:
  language: en
  yaml_path: translation/nt/1_peter/002/006.yaml
  text: 'For it stands in Scripture: "Behold, I lay in Zion a chosen and honored cornerstone, and the one who believes in him will certainly not be put to shame."'
translation:
  language: ko
  text: '성경에 이르기를, 「보라, 내가 시온에 택하심을 받은 보배로운 모퉁이 돌을 두노니, 그분을 믿는 자는 결코 부끄러움을 당하지 아니하리라」[a] 하기 때문입니다.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 이사야 28:16 인용. 1인칭은 야훼의 자기 선언이다.
    reason: ot_citation
lexical_decisions:
- source_word: περιέχει ἐν γραφῇ
  english_pob_choice: it stands in Scripture
  chosen_korean: 성경에 이르기를
  alternatives_korean:
  - 성경에 담겨 있기를
  - 성경에 기록되었기를
  lexicon: BDAG
  rationale: 「~에 이르기를」은 한국 성서 전통의 자연스러운 인용 도입.
- source_word: Σιὼν
  english_pob_choice: Zion
  chosen_korean: 시온
  alternatives_korean: []
  lexicon: BDAG
  rationale: 정착된 표기.
- source_word: λίθον ἀκρογωνιαῖον ἐκλεκτὸν ἔντιμον
  english_pob_choice: a chosen and honored cornerstone
  chosen_korean: 택하심을 받은 보배로운 모퉁이 돌
  alternatives_korean:
  - 선택된 존귀한 모퉁이 돌
  - 뽑힌 보배로운 머릿돌
  lexicon: BDAG
  rationale: ἀκρογωνιαῖος는 「모퉁이의 머릿돌」을 가리키며, 한국 성서 전통의 「모퉁이 돌」을 채택. ἔντιμον은 2:4과 통일하여 「보배로운」으로 옮긴다.
- source_word: οὐ μὴ καταισχυνθῇ
  english_pob_choice: will certainly not be put to shame
  chosen_korean: 결코 부끄러움을 당하지 아니하리라
  alternatives_korean:
  - 결코 수치를 당하지 아니하리라
  - 절대 부끄럽지 아니하리라
  lexicon: BDAG
  rationale: οὐ μή + 부정 과거 가정법의 강한 부정을 「결코 ~아니하리라」로 옮긴다.
theological_decisions:
- issue: 사 28:16 인용 처리
  chosen_reading: '인용 부호와 OT citation 각주; 1인칭이 야훼임을 각주에서 명시'
  alternative_readings:
  - 인용 부호 없이 흐름에 흡수
  rationale: 베드로는 LXX 사 28:16을 그대로 인용한다. 1인칭(「내가 두노니」)은 야훼의 자기 선언으로 각주에 명시.
  doctrine_reference: 'DOCTRINE.md: OT 인용 투명성'
