translation:
  language: es
  text: para que el corazón se derrita y los tropiezos[a] sean muchos. A todas sus puertas he puesto el fulgor de la espada. ¡Ah! Está hecha para centellear, desenvainada[b] para la matanza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «y muchos tropiecen»; el hebreo puede señalar a los tropiezos mismos o a la caída resultante.
    reason: lexical_alternative
  - marker: b
    text: La frase final es difícil. «Desenvainada para la matanza» también puede traducirse «afilada para la matanza» o «pulida para la matanza».
    reason: lexical_alternative
lexical_decisions:
- source_word: לְמַעַן
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - con el propósito de que
  lexicon: HALOT
  rationale: Introduce propósito/resultado; en español, «para que» expresa con naturalidad la relación causal-final sin perder el valor de enlace del hebreo.
- source_word: לָמוּג לֵב
  english_pob_choice: the heart may melt
  chosen_spanish: el corazón se derrita
  alternatives_spanish:
  - el corazón desfallezca
  - el corazón se deshaga
  lexicon: HALOT
  rationale: מוג con «corazón» es un giro de desmayo/cobardía o colapso de valor. Mantengo la imagen vívida con un verbo idiomático en español.
- source_word: וְהַרְבֵּה הַמִּכְשֹׁלִים
  english_pob_choice: and the stumbling blocks may be many
  chosen_spanish: y los tropiezos sean muchos
  alternatives_spanish:
  - y muchos tropiecen
  - y se multipliquen los que caen
  lexicon: HALOT
  rationale: מכשול puede referirse al obstáculo mismo o a la caída producida. «Tropiezos» conserva la imagen concreta y permite la ambigüedad semántica sin forzar una paráfrasis.
- source_word: עַל כָּל שַׁעֲרֵיהֶם
  english_pob_choice: At all their gates
  chosen_spanish: A todas sus puertas
  alternatives_spanish:
  - contra todas sus puertas
  - en cada una de sus puertas
  lexicon: HALOT
  rationale: «Puertas» comunica de forma natural la referencia urbana/fortificada de שערים y evita una rigidez innecesaria en español.
- source_word: נָתַתִּי
  english_pob_choice: I have set
  chosen_spanish: he puesto
  alternatives_spanish:
  - he colocado
  - he situado
  lexicon: HALOT
  rationale: Con el objeto ominoso y el contexto de asedio, «he puesto» es una forma natural de «set/placed» en español.
- source_word: אִבְחַת חָרֶב
  english_pob_choice: the flash of the sword
  chosen_spanish: el fulgor de la espada
  alternatives_spanish:
  - el destello de la espada
  - el resplandor de la espada
  lexicon: HALOT
  rationale: El sustantivo raro apunta a un brillo o relámpago de arma. «Fulgor» conserva la imagen luminosa y suena más natural que un calco.
- source_word: אָח
  english_pob_choice: Ah!
  chosen_spanish: ¡Ah!
  alternatives_spanish:
  - ¡Ay!
  - ¡Aha!
  lexicon: HALOT
  rationale: La interjección se conserva como exclamación abrupta sin decidir en exceso entre lamento y asombro.
- source_word: עֲשׂוּיָה לְבָרָק
  english_pob_choice: It is made for lightning
  chosen_spanish: Está hecha para relámpago
  alternatives_spanish:
  - Está hecha para el fulgor
  - Está hecha para centellear
  lexicon: HALOT
  rationale: ברק puede ser «relámpago» o «destello». «Para relámpago» retiene la fuerza imagística y la relación con la espada preparada para brillar violentamente.
- source_word: מְעֻטָּה לְטָבַח
  english_pob_choice: drawn for slaughter
  chosen_spanish: afilada para la matanza
  alternatives_spanish:
  - preparada para la matanza
  - pulida para la matanza
  lexicon: HALOT
  rationale: El hebreo final es difícil; la POB inglesa preserva la incertidumbre con una lectura funcional. En español, «afilada» recoge una de las posibilidades lexicográficas tradicionales y «matanza» expresa היטב el contexto de destrucción.
translation_notes:
  revision_awareness: Texto elaborado a partir del hebreo masorético (WLC) y del rastro de auditoría en inglés; se conservaron la ambigüedad de מִכְשׁוֹל y la dificultad de la frase final sobre la espada, sin armonizar artificialmente el pasaje.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el hebreo explicita el nombre divino; aquí no aparece.
  - «Espada» se mantiene de forma consistente para חֶרֶב, con matiz bélico literal.
  - Se conserva el tono abrupto y oracular del verso, evitando suavizar las imágenes de juicio.
