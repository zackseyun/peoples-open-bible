  language: en
  yaml_path: translation/ot/joshua/003/015.yaml
  text: And when those carrying the ark came as far as the Jordan[a], and the feet of the priests carrying the ark were dipped in the edge of the water (now the Jordan was full over all its banks all the days of harvest)[b],
  footnotes:
  - marker: a
    text: Or 'at the edge of the water.' The Hebrew expression is literally 'in the edge/end of the water,' indicating the priests' feet entered the water at its margin.
    reason: lexical_alternative
  - marker: b
    text: That is, the Jordan was at flood stage during harvest season.
    reason: cultural_note
