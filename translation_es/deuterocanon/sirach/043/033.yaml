revisions:
- from: El Señor hizo todo, y a los que lo temen les dio sabiduría; la alabanza de los padres de antaño es eterna[a].
  to: Yahvé hizo todo[a], y a los que lo temen les dio sabiduría[b]; la alabanza de los padres antiguos es eterna.
  rationale: Se revisa para ajustarse a la terminología obligatoria del proyecto («Yahvé» para ה'), recuperar la transparencia de las dos notas del expediente inglés (variante textual y lectura alternativa), y pulir levemente la frase final sin cambiar su sentido.
  reviewer_model: gpt-5.4
