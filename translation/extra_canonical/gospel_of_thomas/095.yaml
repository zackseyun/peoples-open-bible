translation:
  text: Jesus said[a], “If you have money, do not lend at interest; rather[f][e][d][c][b],
    give it to the one from whom you will not take it back.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ‘Interest’ renders Coptic ⲙⲏⲥⲉ (Crum s.v.), often equivalent to ‘usury’
      in antiquity; historically ‘usury’ meant any interest, not just excessive rates.
    reason: cultural_note
  - marker: b
    text: The object pronoun is plural (‘them’), likely because ‘money’ is conceptualized
      as coins; the translation preserves the plural in ‘them back’.
    reason: dialect_note
  - marker: c
    text: 'The recipient phrase is uncertain: the manuscript shows possible ⲙ[ⲙⲟϥ]
      (‘give it’), while the normalized text reads ϯ ⲛⲛⲧⲟϥ (‘give to him’). The overall
      sense—directing the gift to a particular kind of person defined by the relative
      clause—is unchanged.'
    reason: textual_variant
  - marker: d
    text: ‘Jesus said’ at the start is restored due to minor damage in NHAM02.48/lb35.
    reason: lacuna_or_restoration
  - marker: e
    text: The relative clause can also be rendered ‘to one who will not give them
      back to you’; the chosen translation follows the common reading ‘from whom you
      will not take them back’.
    reason: lexical_alternative
  - marker: f
    text: Or 'give to the one from whom you will not take them back.'.
    reason: previous_rendering
lexical_decisions:
- source_word: ⲉϣⲱⲡⲉ
  chosen: if (it happens that)
  alternatives:
  - when
  lexicon: Lambdin
  rationale: Conditional/contingent clause marker; here introduces a general condition
    rather than a definite temporal sequence.
- source_word: ⲟⲩⲛⲧⲁⲛⲧⲱⲧⲛ ϩⲟⲙⲧ
  chosen: you have money
  alternatives:
  - there is money for you
  - there exists to you money
  lexicon: Layton
  rationale: Standard Coptic existential possession construction rendered into natural
    English possession while preserving sense.
- source_word: ϩⲟⲙⲧ
  chosen: money
  alternatives:
  - coin
  - coins
  lexicon: Crum
  rationale: Crum s.v. ϩⲟⲙⲧ shows usage for a coin/money generally; context is generic
    finances, thus ‘money’.
- source_word: ⲙⲡⲣϯ ⲉⲡⲙⲏⲥⲉ
  chosen: do not lend at interest
  alternatives:
  - do not give to interest
  - do not give at usury
  lexicon: Crum
  rationale: ϯ ‘give’ with ⲉ + ⲙⲏⲥⲉ (Crum s.v. ⲙⲏⲥⲉ ‘interest, usury’) idiomatically
    denotes lending at interest; English ‘lend at interest’ conveys the financial
    sense without anachronistic legal nuance.
- source_word: ϯ ⲛⲛⲧⲟϥ
  chosen: give to the one
  alternatives:
  - give it
  - give to him
  lexicon: Lambdin
  rationale: Read with prepositional pronoun ⲛ̄ⲧⲟϥ ‘to him’, immediately specified
    by the following relative clause; keeps the dative sense rather than a simple
    direct object.
- source_word: ⲛⲡⲉⲧⲉⲣⲉⲛⲧⲱⲧⲛⲛⲁϫⲓⲛⲧⲟⲟⲩ ⲁⲛ ⲛⲧⲛⲛⲧⲟϥ
  chosen: from whom you will not take them back
  alternatives:
  - who will not give them back to you
  - who will not take them from you
  lexicon: Layton
  rationale: Relative ⲡⲉⲧⲉⲣⲉ + future ⲛⲁϫⲓ ‘take’ with negative ⲁⲛ; object ⲛⲧⲟⲟⲩ ‘them’
    (coins/money), and a ‘from’-phrase; the direction most naturally yields ‘from
    whom you (pl.) will not take them back’. The plural object reflects a count notion
    (‘coins’).
textual_note: Opening formula ⟦pejeⲓⲏⲥⲟⲩⲥ ϫⲉ⟧ ‘Jesus said’ is partially damaged and
  restored in NHAM02.48/lb35. At NHAM02.49/lb1, the letters around ϯ are abraded;
  the printed line shows traces consistent with ⲙ[ⲙⲟϥ] (‘give it’), while Dilley’s
  normalized text reads ϯ ⲛⲛⲧⲟϥ ... (‘give to him ...’), which is supported by the
  following relative clause specifying the recipient; this constitutes a minor syntactic
  uncertainty rather than a semantic divergence. The sequence ⲛⲧⲟⲟⲩ is a 3pl object
  pronoun (‘them’), likely referring to coins, hence the plural pronominal reference
  to ‘money’. No POxy Greek fragment overlaps Saying 95. Orthography includes the
  Greek loan ⲁⲗⲗⲁ ‘but’.
