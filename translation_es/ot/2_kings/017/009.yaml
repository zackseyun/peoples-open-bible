base_translation:
  language: en
  yaml_path: translation/ot/2_kings/017/009.yaml
  text: And the sons of Israel secretly did things that were not right against Yahweh their God[a], and they built for themselves high places in all their cities[c][b], from watchtower to fortified city.
  footnotes:
  - marker: a
    text: Or 'covered up matters that were not right concerning the LORD their God.' The Hebrew verb is rare and may carry the sense of concealing or acting secretly.
    reason: lexical_alternative
  - marker: b
    text: '''High places'' were local worship sites, often associated with unauthorized worship.'
    reason: cultural_note
  - marker: c
    text: From 'watchtower' to 'fortified city' is a way of saying throughout the whole land, from the smallest outpost to the strongest city.
    reason: cultural_note
