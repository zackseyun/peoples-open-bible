translation:
  language: es
  text: Hijo mío[a], no dejes que se aparten de tus ojos; guarda el buen juicio[b] y la discreción.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no dejes que se deslicen de tu vista». El plural implícito se refiere a las instrucciones o cualidades del contexto inmediato.'
    reason: lexical_alternative
  - marker: b
    text: O «la sabiduría eficaz» o «la sensatez».
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנִי
  english_pob_choice: My son
  chosen_spanish: Hijo mío
  alternatives_spanish:
  - Hijo
  - Muchacho mío
  lexicon: HALOT
  rationale: El vocativo hebreo es masculino singular y funciona como un llamado paternal o docente. «Hijo mío» conserva esa relación y el tono sapiencial sin neutralizar el género.
- source_word: יָלֻזוּ
  english_pob_choice: let them depart
  chosen_spanish: se aparten
  alternatives_spanish:
  - se desvíen
  - salgan
  - se alejen
  lexicon: HALOT
  rationale: El verbo expresa apartarse o desviarse. En español, «se aparten» comunica bien la idea de que estas cosas no deben dejar de estar presentes ante la atención del oyente.
- source_word: מֵעֵינֶיךָ
  english_pob_choice: from your eyes
  chosen_spanish: de tus ojos
  alternatives_spanish:
  - de tu vista
  - de tu mirada
  lexicon: HALOT
  rationale: Se conserva la imagen corporal del hebreo, que en proverbios indica atención continua. «De tus ojos» suena natural y mantiene la metáfora.
- source_word: נְצֹר
  english_pob_choice: guard
  chosen_spanish: guarda
  alternatives_spanish:
  - custodia
  - vigila
  - guarda con cuidado
  lexicon: HALOT
  rationale: El imperativo pide preservar activamente. «Guarda» es el equivalente más directo y idiomático en español bíblico contemporáneo.
- source_word: תֻּשִׁיָּה
  english_pob_choice: sound wisdom
  chosen_spanish: la sabiduría sólida
  alternatives_spanish:
  - la sabiduría sana
  - la sensatez firme
  - el buen juicio
  lexicon: HALOT
  rationale: El término puede abarcar sabiduría eficaz, sólida o de buen juicio. «Sabiduría sólida» busca reflejar la fuerza de la noción sin reducirla solo a capacidad intelectual o práctica.
- source_word: וּמְזִמָּה
  english_pob_choice: and discretion
  chosen_spanish: y la discreción
  alternatives_spanish:
  - y la prudencia
  - y el discernimiento
  - y la previsión
  lexicon: HALOT
  rationale: En este contexto sapiencial el término es positivo, no «maquinación». «Discreción» comunica prudencia y tacto moral de manera clara y fiel.
theological_decisions:
- issue: Tratamiento de תֻּשִׁיָּה como cualidad sapiencial positiva
  english_pob_reading: sound wisdom
  chosen_spanish_reading: la sabiduría sólida
  alternative_spanish_readings:
  - la sabiduría sana
  - el buen juicio
  - la sensatez firme
  rationale: El contexto de Proverbios 3:21 presenta una exhortación a retener cualidades positivas. Se evita una traducción que suene demasiado técnica o abstracta, pero se preserva la idea de sabiduría confiable y eficaz.
  doctrine_reference: DOCTRINE.md §Terminología sapiencial
- issue: Lectura positiva de מְזִמָּה en Proverbios
  english_pob_reading: discretion
  chosen_spanish_reading: la discreción
  alternative_spanish_readings:
  - la prudencia
  - el discernimiento
  rationale: Aunque la raíz puede ser negativa en otros pasajes, aquí el paralelismo con תֻּשִׁיָּה exige un sentido constructivo. «Discreción» mantiene la cualidad moral y práctica sin introducir connotaciones de astucia.
  doctrine_reference: DOCTRINE.md §Contexto y polisemia
- issue: Vocativo masculino singular
  english_pob_reading: My son
  chosen_spanish_reading: Hijo mío
  alternative_spanish_readings:
  - Hijo
  - Muchacho mío
  rationale: El hebreo es explícitamente masculino singular. Se conserva el llamado filial directo como parte del marco pedagógico de Proverbios.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: El texto base del POB en inglés se mantiene sin cambios sustanciales según el registro de revisión más reciente; esta versión española sigue esa lectura estable y no introduce divergencias textuales.
  spanish_consistency_notes:
  - Se conservó el vocativo masculino singular «Hijo mío» para alinearlo con el hebreo y con la política POB de precisión de género.
  - «De tus ojos» mantiene la imagen idiomática del hebreo sin convertirla en una paráfrasis más abstracta.
  - «La sabiduría sólida» y «la discreción» reflejan la pareja sapiencial del verso y preservan el paralelismo positivo.
  - No se usó «Cristo», «SEÑOR» ni terminología litúrgica ajena al verso, porque el pasaje no lo requiere.
