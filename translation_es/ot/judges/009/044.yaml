  to: Y Abimélec y los jefes[a] que estaban con él avanzaron y se situaron a la entrada de la puerta de la ciudad; mientras tanto, los otros dos jefes[b] avanzaron contra todos los que estaban en el campo y los derribaron.
  rationale: Se ajustó 'los hirieron' a 'los derribaron' para reflejar mejor la fuerza de וַיַּכּוּם sin imponer que todos murieron. También se cambió 'se apostaron' por 'se situaron' para una equivalencia más natural y menos cargada tácticamente, manteniendo el sentido de colocarse en posición. Se conservaron las notas sobre 'jefes' y 'los dos jefes' porque reflejan bien el hebreo y el contexto narrativo.
