review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del hebreo: oye un sonido/voz, usa correctamente la imagen de parto, conserva la personificación de Sion y reproduce el clímax de lamentación final. Sin embargo, hay dos desajustes relevantes con la evidencia fuente y la auditoría inglesa: (1) la primera ocurrencia de קול se justificó en el POB inglés como ''sound'' porque la identidad del hablante aún no está explicitada; en español ''voz'' es posible, pero ''sonido'' preserva mejor esa progresión; (2) el texto español separa «¡Ay de mí!» del motivo causal con comillas y puntuación que debilitan la continuidad del lamento hebreo.'
  spanish_quality_summary: 'El español es generalmente claro y digno, pero puede mejorarse para mayor naturalidad y precisión poética. «Como de mujer en parto» suena algo rígido; «como de una mujer en trabajo de parto» o «como de una mujer que da a luz» sería más natural, pero no es imprescindible. El problema principal de estilo es la puntuación alrededor de la cita: conviene mantener una sola exclamación seguida de la cláusula causal. «Hija de Sion» es legible, aunque en español bíblico actual suele preferirse «Hija de Sion»/«hija de Sion» según política editorial; no es un error. «Homicidas» es entendible, pero «asesinos» suena más idiomático; aun así, no exige cambio porque el registro sobrio funciona.'
  glossary_alignment: No hay conflicto con la terminología troncal del proyecto (no aparecen Yahvé, Mesías, esclavo, etc.). Las decisiones principales son compatibles con la auditoría inglesa, salvo que la elección de «voz» para קול se aparta de la rationale documentada que prefería 'sound' en la primera mención. «Alma» sigue correctamente la revisión inglesa final.
  issues:
  - severity: medium
    issue: Primera ocurrencia de קול traducida como «voz» en lugar de «sonido».
    rationale: La auditoría inglesa documenta que la primera aparición introduce una impresión auditiva antes de identificar al emisor; «sonido» preserva mejor esa progresión semántica. «Voz» no es imposible, pero reduce el matiz fuente-audición del comienzo.
  - severity: medium
    issue: Puntuación del lamento final («¡Ay de mí!», porque...).
    rationale: 'El hebreo presenta una exclamación seguida inmediatamente de la razón del ay. Al cerrar la exclamación con comillas y coma externa, el español rompe innecesariamente la unidad del lamento. Es mejor: «¡Ay de mí, porque...!» o, si se mantiene la cita, «¡Ay de mí, porque ...!».'
  - severity: low
    issue: «Como de mujer en parto» suena algo menos natural en español contemporáneo.
    rationale: No distorsiona el sentido, pero una formulación como «como de una mujer en trabajo de parto» o «como de una mujer que da a luz» sería más fluida para lectores hispanos amplios.
