    rationale: El POB inglés conserva como alternativa léxica el matiz de excedente restante de וְהוֹתֵר. En español, «hacerla» no necesita nota, pero la cláusula final sí admite una alternativa como «quedó algo sobrante».
  - severity: low
    issue: La puntuación y la redacción final pueden mejorarse para sonar más naturales.
    rationale: «; y había de sobra» es comprensible, pero «, y aún sobraba» fluye mejor en español bíblico moderno y refleja más directamente el verbo hebreo final.
