review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien el sentido básico del hebreo: una súplica de atención al clamor, la razón causal de extrema postración, la petición de liberación de quienes persiguen al salmista y la explicación de que son más fuertes que él. Sin embargo, omite en las notas una alternativa para דַלּוֹתִי מְאֹד que sí está preservada en el rastro inglés, y conviene reflejar mejor el matiz resultativo de ‘ser llevado muy abajo’ con una formulación más cercana al audit trail.'
  spanish_quality_summary: El español es claro, natural y de registro bíblico digno. ‘Atiende a mi clamor’ y ‘líbrame’ funcionan muy bien. El punto mejorable es ‘estoy muy abatido’, que en español puede sonar más emocional que situacional; ‘he sido humillado mucho’ sería torpe, pero ‘he sido reducido muy bajo’ también. ‘Estoy muy postrado’ o ‘he sido abatido profundamente’ serían posibles, pero la opción más natural y fiel al audit trail es ‘he sido rebajado muy bajo’ no suena bien. Por eso conviene mantener una formulación natural como ‘he sido llevado muy abajo’ o ‘estoy muy debilitado’, con nota.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. ‘Líbrame’ refleja bien הַצִּילֵנִי según la decisión teológica documentada. ‘Clamor’ para רִנָּתִי y ‘perseguidores’ para מֵרֹדְפַי son adecuados. La revisión propuesta añade la alternativa léxica faltante para la expresión de debilidad/postración.
  issues:
  - severity: medium
    issue: Falta una nota para דַלּוֹתִי מְאֹד
    rationale: El audit trail inglés preserva alternativas significativas (‘I am very weak’ / ‘I have been brought very low’). El borrador español no conserva ninguna nota correspondiente, pese a que la decisión principal ‘estoy muy abatido’ reduce parte del matiz resultativo del hebreo.
  - severity: low
    issue: ‘Estoy muy abatido’ puede estrechar el sentido hacia lo anímico
    rationale: Aunque es posible en contexto, ‘abatido’ en español puede leerse como desánimo emocional. El hebreo apunta a reducción/debilitamiento extremo. Una redacción ligeramente ajustada y una nota ayudan a preservar mejor el campo semántico.
  revised_spanish_text: Atiende[a] a mi clamor, porque estoy muy debilitado[b]; líbrame de mis perseguidores[c], porque son más fuertes que yo.
  revised_footnotes:
