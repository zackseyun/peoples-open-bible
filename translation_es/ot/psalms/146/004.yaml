translation:
  language: es
  text: Su aliento[a] sale; él vuelve a su suelo; ese mismo día perecen sus planes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su espíritu». El hebreo רוּחַ puede significar «aliento» o «espíritu».
    reason: lexical_alternative
lexical_decisions:
- source_word: תֵּצֵא
  english_pob_choice: goes out
  chosen_spanish: se va
  alternatives_spanish:
  - sale
  - se marcha
  - sale de él
  lexicon: HALOT
  rationale: El hebreo expresa el salida concreta del aliento/espíritu en la muerte. «Se va» conserva el movimiento de salida sin forzar un tecnicismo ni sonar rígido en español.
- source_word: ר֭וּחוֹ
  english_pob_choice: his breath
  chosen_spanish: aliento
  alternatives_spanish:
  - espíritu
  - respiración
  - viento
  lexicon: HALOT
  rationale: En este contexto de muerte y retorno a la tierra, «aliento» transmite la imagen concreta de la vida que se extingue. Mantiene la tensión documentada con «espíritu» sin resolverla dogmáticamente en el cuerpo del texto.
- source_word: יָשֻׁב
  english_pob_choice: he returns
  chosen_spanish: vuelve
  alternatives_spanish:
  - regresa
  - retorna
  lexicon: HALOT
  rationale: «Vuelve» reproduce el valor de שוב de manera natural y directa, con el sujeto humano implícito que retoma el movimiento hacia la tierra.
- source_word: לְאַדְמָתוֹ
  english_pob_choice: to his ground
  chosen_spanish: a su tierra
  alternatives_spanish:
  - a su suelo
  - a su polvo
  - a su terreno
  lexicon: HALOT
  rationale: אַדְמָה es «tierra/suelo/terreno». «A su tierra» conserva el posesivo y la idea de retorno a la condición terrenal del ser humano, con buena claridad en español.
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: on that very day
  chosen_spanish: ese mismo día
  alternatives_spanish:
  - en ese día
  - en aquel mismo día
  lexicon: HALOT
  rationale: La expresión hebrea subraya inmediatez; «ese mismo día» refleja bien el énfasis demostrativo y suena idiomático en español.
- source_word: אָבְדוּ
  english_pob_choice: perish
  chosen_spanish: perecen
  alternatives_spanish:
  - se pierden
  - desaparecen
  - se frustran
  lexicon: HALOT
  rationale: אבד indica desaparición/ruina. «Perecen» mantiene el peso sentencioso del hebreo y funciona bien con «planes» en un contexto sapiencial.
- source_word: עֶשְׁתֹּנֹתָיו
  english_pob_choice: his plans
  chosen_spanish: sus planes
  alternatives_spanish:
  - sus pensamientos
  - sus designios
  - sus intenciones
  lexicon: HALOT
  rationale: El sustantivo raro se refiere a pensamientos, propósitos o planes. «Planes» es la opción más clara y contextual en español, sin exceder el alcance semántico del término.
theological_decisions:
- issue: Sentido de רוּחַ en contexto de muerte
  english_pob_reading: Main text renders the term as 'his breath,' with a footnote preserving the alternative 'his spirit.'
  chosen_spanish_reading: El texto principal dice «aliento» y la nota preserva «espíritu» como alternativa.
  alternative_spanish_readings:
  - espíritu
  - respiración
  rationale: En español, «aliento» comunica mejor la imagen concreta del principio vital que cesa al morir, mientras que la nota mantiene abierta la posibilidad semántica de «espíritu» porque el hebreo רוּחַ lo permite. Así se preserva la tensión antropológica sin imponer una lectura doctrinal cerrada.
  doctrine_reference: Preservar la tensión textual sobre antropología y muerte sin resolverla artificialmente.
translation_notes:
  revision_awareness: 'El pasaje coincide plenamente con la auditoría inglesa: la elección principal sigue siendo concreta y sobria, con la alternativa semántica de רוּחַ preservada en nota. No se requieren revisiones respecto del último pase, y la traducción conserva la imagen de mortalidad, retorno a la tierra y desaparición de los planes humanos.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto lo requiera; aquí no aparece.
  - «Aliento» se usa como equivalente principal de רוּחַ en este contexto de muerte, evitando «espíritu» en el cuerpo principal para no resolver la ambigüedad.
  - «Tierra» traduce אַדְמָה de manera natural en español, sin recurrir a «polvo», que pertenecería a otro léxico bíblico.
  - «Ese mismo día» refleja el énfasis de בַּיּוֹם הַהוּא con un giro idiomático y preciso.
