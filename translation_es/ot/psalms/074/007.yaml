revisions:
- from: Encendieron fuego en tu santuario[a]; profanaron el lugar donde habita tu nombre[b] hasta la tierra[c].
  to: Prendieron fuego a tu santuario[a]; profanaron por tierra la morada de tu nombre[b][c].
  rationale: Se revisa para ajustar mejor el español al sentido idiomático del hebreo, preservar la decisión teológica documentada sobre «la morada de tu nombre», y reemplazar expresiones poco naturales por formulaciones españolas claras y fieles.
  reviewer_model: gpt-5.4
