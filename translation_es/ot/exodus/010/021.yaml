translation:
  language: es
  text: 'Entonces Yahvé dijo a Moisés[a]: «Extiende tu mano hacia el cielo, para que haya oscuridad sobre la tierra de Egipto, y se pueda sentir la oscuridad[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: el nombre divino aparece aquí como יְהוָה; se traduce «Yahvé» para mantener visible el nombre del pacto.'
    reason: source_note
  - marker: b
    text: 'Hebreo: también puede entenderse como «y la oscuridad pueda palparse» o «y uno pueda sentir la oscuridad». El verbo final es raro y sugiere una oscuridad tangible.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT / convención del proyecto
  rationale: Se preserva el nombre divino del texto hebreo con la forma base del proyecto en español, sin sustituirlo por una máscara litúrgica. 'Yahvé' mantiene la referencia explícita al Tetragrámaton.
- source_word: נְטֵה
  english_pob_choice: Stretch out
  chosen_spanish: Extiende
  alternatives_spanish:
  - Alarga
  - Tiende
  lexicon: HALOT
  rationale: El imperativo pide un gesto dirigido hacia arriba; 'Extiende' expresa bien la acción física de elevar o alargar la mano en español natural.
- source_word: יָדְךָ
  english_pob_choice: your hand
  chosen_spanish: tu mano
  alternatives_spanish:
  - la mano tuya
  lexicon: HALOT
  rationale: Correspondencia directa del sustantivo con sufijo posesivo singular de segunda persona. En español, 'tu mano' es la forma más natural y fiel.
- source_word: עַל הַשָּׁמַיִם
  english_pob_choice: toward the sky
  chosen_spanish: hacia el cielo
  alternatives_spanish:
  - sobre los cielos
  - hacia el firmamento
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente 'sobre/encima de los cielos', el contexto del gesto indica dirección ascendente. 'Hacia el cielo' conserva esa orientación sin sonar forzado.
- source_word: וִיהִי חֹשֶׁךְ
  english_pob_choice: so that there may be darkness
  chosen_spanish: para que haya oscuridad
  alternatives_spanish:
  - y haya oscuridad
  - para que exista oscuridad
  lexicon: HALOT
  rationale: El valor jussivo/resultativo se expresa en español de manera natural con 'para que haya'. 'Oscuridad' mantiene el sustantivo concreto del hebreo.
- source_word: עַל אֶרֶץ מִצְרַיִם
  english_pob_choice: over the land of Egypt
  chosen_spanish: sobre la tierra de Egipto
  alternatives_spanish:
  - sobre la tierra de Egipto
  - sobre Egipto
  lexicon: HALOT
  rationale: Se conserva 'tierra' para אֶרֶץ, equivalente semántico de 'land' y más transparente que reducirlo solo a 'Egipto'.
- source_word: וְיָמֵשׁ חֹשֶׁךְ
  english_pob_choice: and the darkness may be felt
  chosen_spanish: y la oscuridad sea sentida
  alternatives_spanish:
  - y la oscuridad pueda palparse
  - y se pueda sentir la oscuridad
  - y la oscuridad sea palpable
  lexicon: HALOT
  rationale: Se mantiene la rareza lexical del verbo en una forma suficientemente literal. 'Sea sentida' evita domesticar el texto, aunque en español suene menos idiomático que una paráfrasis; por eso se conserva también la nota alternativa sobre la posibilidad de entenderlo como oscuridad palpable o como 'se puede sentir la oscuridad'.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton. La versión española debe reflejar ese nombre propio del pacto conforme a la terminología base del proyecto, no ocultarlo tras un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Fuerza de la última cláusula con verbo raro
  english_pob_reading: and the darkness may be felt
  chosen_spanish_reading: y la oscuridad sea sentida
  alternative_spanish_readings:
  - y la oscuridad pueda palparse
  - y se pueda sentir la oscuridad
  - y la oscuridad sea palpable
  rationale: El hebreo final emplea un verbo poco común que sugiere oscuridad tangible. En español conviene preservar la tensión semántica sin resolverla del todo; 'sea sentida' deja abierta la lectura de una oscuridad que se percibe físicamente.
  doctrine_reference: Lexical note on rare verb; no doctrinal conflict
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del inglés POB, que prefirió reflejar de manera más directa la cláusula final hebrea como una acción sobre 'la oscuridad' misma, no solo como una descripción apposicional. En español se conserva esa preferencia con 'y la oscuridad sea sentida'.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma uniforme para יְהוָה.
  - Se usa 'cielo' para הַשָּׁמַיִם por el contexto de gesto hacia arriba.
  - Se conserva 'tierra de Egipto' para אֶרֶץ מִצְרַיִם, alineado con el valor de 'land'.
  - La última cláusula conserva una literalidad moderada para no perder la rareza del verbo hebreo.
