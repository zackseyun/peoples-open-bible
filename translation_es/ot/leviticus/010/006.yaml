base_translation:
  language: en
  yaml_path: translation/ot/leviticus/010/006.yaml
  text: And Moses said to Aaron and to Eleazar and Ithamar his sons[a], “Do not uncover your heads, and do not tear your garments, lest you die and wrath come upon all the congregation. But your brothers, the whole house of Israel[b], shall weep for the burning that Yahweh has kindled.”
  footnotes:
  - marker: a
    text: Or, 'Do not uncover your heads' or 'Do not leave your hair unkempt.' The Hebrew refers to a mourning sign involving the head/hair.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the burning that the LORD burned'; the translation 'has kindled' is used for natural English with the cognate expression.
    reason: lexical_alternative
