translation:
  language: es
  text: En aquel día haré brotar un cuerno para la casa de Israel[a], y te daré una apertura de la boca entre ellos[b], y sabrán que yo soy Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «haré crecer un cuerno»; es decir, levantaré fuerza o honor para la casa de Israel.
    reason: lexical_alternative
  - marker: b
    text: «Una apertura de la boca» es un modismo hebreo para ser capacitado o autorizado para hablar, probablemente en eco con los períodos anteriores de Ezequiel en que su habla estaba restringida.
    reason: cultural_note
lexical_decisions:
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: On that day
  chosen_spanish: En aquel día
  alternatives_spanish:
  - En ese día
  - En aquel tiempo
  lexicon: HALOT
  rationale: La fórmula profética temporal se mantiene con un español natural y reverente. «Aquel día» conserva el valor de marcador escatológico o decisivo sin necesidad de arcaísmo.
- source_word: אַצְמִיחַ
  english_pob_choice: I will cause ... to sprout
  chosen_spanish: haré brotar
  alternatives_spanish:
  - haré crecer
  - haré surgir
  - haré que brote
  lexicon: HALOT
  rationale: El hifil es causativo; «haré brotar» conserva la metáfora vegetal de forma directa y clara en español, sin convertirla prematuramente en una abstracción.
- source_word: קֶרֶן
  english_pob_choice: horn
  chosen_spanish: cuerno
  alternatives_spanish:
  - fuerza
  - poder
  - macho
  lexicon: HALOT
  rationale: «Cuerno» preserva la imagen concreta del hebreo y, por extensión, su sentido metafórico de fuerza o dignidad. Traducirlo solo como «fuerza» resolvería demasiado pronto la metáfora.
- source_word: לְבֵית יִשְׂרָאֵל
  english_pob_choice: for the house of Israel
  chosen_spanish: para la casa de Israel
  alternatives_spanish:
  - para Israel
  lexicon: HALOT
  rationale: Se conserva la expresión pactal e histórica «casa de Israel», que es más específica que simplemente «Israel».
- source_word: פִּתְחוֹן פֶּה
  english_pob_choice: an opening of the mouth
  chosen_spanish: una apertura de boca
  alternatives_spanish:
  - una apertura de la boca
  - libertad para hablar
  - permiso para hablar
  lexicon: HALOT
  rationale: La locución hebrea se preserva de manera bastante literal para mantener el idiomatismo y su posible eco con la anterior restricción del habla de Ezequiel. «Apertura de boca» suena menos natural; por eso se usa «de boca» dentro de una construcción española comprensible.
- source_word: בְּתוֹכָם
  english_pob_choice: among them
  chosen_spanish: entre ellos
  alternatives_spanish:
  - en medio de ellos
  - en su medio
  lexicon: HALOT
  rationale: «Entre ellos» es natural y transmite la inserción pública de la palabra en la comunidad. También evita una redundancia innecesaria en español.
- source_word: וְיָדְעוּ
  english_pob_choice: and they will know
  chosen_spanish: y sabrán
  alternatives_spanish:
  - y conocerán
  - entonces sabrán
  lexicon: HALOT
  rationale: El futuro simple en español expresa bien la consecuencia del acto divino. Se mantiene el sujeto implícito «ellos» para referir la comunidad mencionada.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue la convención del proyecto para el Tetragrámaton: transliteración del nombre divino como «Yahvé», evitando la sustitución por un título.'
theological_decisions:
- issue: Imagen del «cuerno»
  english_pob_reading: Retain 'horn' as a metaphor for renewed strength/exaltation for Israel rather than interpreting it directly as a specific messianic figure in the translation.
  chosen_spanish_reading: Mantener «cuerno» como imagen metafórica de fuerza, dignidad o restauración para la casa de Israel, sin convertirla en una referencia mesiánica explícita en la traducción.
  alternative_spanish_readings:
  - Interpretar como «fuerza» o «poder»
  - Explicitar una lectura mesiánica
  rationale: El hebreo permite la metáfora y el texto no exige identificar aquí una figura mesiánica concreta. Conservar la imagen evita borrar una tensión interpretativa real y deja abierta la recepción bíblica posterior sin imponerla al versículo.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather than resolve it.'
- issue: Sentido de פִּתְחוֹן פֶּה aplicado a Ezequiel
  english_pob_reading: Translate as restored/granted speech without over-specifying whether this is permanent release from muteness or a particular prophetic opportunity.
  chosen_spanish_reading: Traducir como una apertura concedida de la boca, sin precisar si implica liberación permanente del mutismo o una nueva oportunidad profética para hablar.
  alternative_spanish_readings:
  - «libertad para hablar»
  - «valentía para hablar»
  - «apertura de tu boca»
  rationale: La expresión hebrea es idiomática y probablemente remite a la historia de la mudez profética de Ezequiel, pero el versículo mismo no define el alcance exacto. La formulación mantiene la referencia al habla sin sobreinterpretar el modo o la duración.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation tradition; preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: No se registraron revisiones posteriores en el expediente aplicado; el borrador sigue el pasaje y la lectura auditada con acuerdo alto, sin cambios en la pasada más reciente.
  spanish_consistency_notes:
  - Se usó «Yahvé» de forma consistente para el Tetragrámaton.
  - Se conservó la metáfora de «cuerno» en el texto principal y se explicó su posible valor semántico en nota.
  - La locución «apertura de boca» se mantuvo suficientemente literal para reflejar el hebreo, pero se suavizó a una construcción natural en español.
  - Se evitó «SEÑOR» y también «Cristo/Mesías», porque el verso no los exige ni el expediente los documenta aquí.
