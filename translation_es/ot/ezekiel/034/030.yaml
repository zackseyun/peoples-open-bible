translation:
  language: es
  text: Y sabrán que yo[a], Yahvé, su Dios, estoy con ellos, y que ellos, la casa de Israel, son mi pueblo, declara el Señor Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «entre ellos».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיָדְעוּ
  english_pob_choice: And they will know
  chosen_spanish: Y sabrán
  alternatives_spanish:
  - Y conocerán
  - Entonces sabrán
  lexicon: HALOT
  rationale: El verbo ידע en este contexto profético expresa conocimiento resultante y futuro; «sabrán» es natural en español y conserva el valor prospectivo sin endurecer el estilo.
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - porque
  - pues
  lexicon: HALOT
  rationale: Introduce el contenido de lo que sabrán, no una causalidad; «que» refleja mejor la sintaxis.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se preserva el nombre divino como transliteración de יְהוָה, conforme al estándar español del proyecto; no se sustituye por un título.
- source_word: אֱלֹהֵיהֶם
  english_pob_choice: their God
  chosen_spanish: su Dios
  alternatives_spanish:
  - Dios de ellos
  lexicon: HALOT
  rationale: La construcción con sufijo posesivo se vuelve de manera idiomática como «su Dios»; el referente plural queda claro por el contexto.
- source_word: אִתָּם
  english_pob_choice: am with them
  chosen_spanish: estoy con ellos
  alternatives_spanish:
  - estoy entre ellos
  lexicon: HALOT
  rationale: «Con ellos» refleja con precisión la preposición de presencia relacional y mantiene el lenguaje de pacto; «entre ellos» es una alternativa contextual, pero menos directa.
- source_word: וְהֵמָּה
  english_pob_choice: and that they
  chosen_spanish: y que ellos
  alternatives_spanish:
  - y ellos
  lexicon: HALOT
  rationale: Se conserva el segundo contenido con sujeto explícito para reflejar el énfasis del pronombre hebreo y mantener la claridad sintáctica en español.
- source_word: עַמִּי
  english_pob_choice: my people
  chosen_spanish: mi pueblo
  alternatives_spanish:
  - mi gente
  lexicon: HALOT
  rationale: Expresión pactual estándar; «mi pueblo» es la correspondencia directa y reverberante en español bíblico contemporáneo.
- source_word: בֵּית יִשְׂרָאֵל
  english_pob_choice: the house of Israel
  chosen_spanish: la casa de Israel
  alternatives_spanish:
  - la casa de Israel; el pueblo de Israel
  - Israel
  lexicon: HALOT
  rationale: Se conserva la fórmula fija profética «casa de Israel», que mantiene el matiz corporativo y de pacto sin aplanarlo.
- source_word: נְאֻם
  english_pob_choice: declares
  chosen_spanish: declara
  alternatives_spanish:
  - dice
  - oráculo de
  lexicon: HALOT
  rationale: En la fórmula profética, «declara» comunica solemnidad y actualidad sin sonar técnico ni arcaizante.
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: el Señor Yahvé
  alternatives_spanish:
  - el Señor Dios
  - el Señor Yahvé
  lexicon: HALOT
  rationale: Se traduce el título compuesto con un español natural y reverente. «Señor» representa אֲדֹנָי y «Yahvé» conserva el Tetragrámaton; se evita la sustitución tradicional por «SEÑOR».
theological_decisions:
- issue: Nombre divino יְהוָה en un oráculo de restauración
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. La traducción española mantiene el nombre propio divino para preservar la identidad pactual, en lugar de ocultarlo tras un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: 'Lenguaje de presencia: אִתָּם'
  english_pob_reading: am with them
  chosen_spanish_reading: estoy con ellos
  alternative_spanish_readings:
  - estoy entre ellos
  rationale: 'La frase se mantiene relacional y covenantal: Dios no solo acompaña externamente, sino que está presente con su pueblo. No se fuerza un matiz espacial que el hebreo no exige.'
  doctrine_reference: DOCTRINE.md Translation philosophy §3 Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: Revisado contra el paquete fuente hebreo y el audit trail inglés. No se requieren cambios respecto del sentido base; la única anotación es la alternativa contextual de presencia en אִתָּם, ahora anclada correctamente en el texto.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» de forma consistente para יְהוָה.
  - Se preservó la fórmula profética «la casa de Israel».
  - Se evitó «SEÑOR» como máscara tipográfica para el nombre divino.
  - La relación pronominal del final («mi pueblo») conserva el paralelismo con «su Dios».
