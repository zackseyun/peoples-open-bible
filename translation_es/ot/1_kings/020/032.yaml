translation:
  language: es
  text: 'Así que se ataron tela áspera de duelo a la cintura y sogas sobre la cabeza[a], y fueron al rey de Israel y dijeron: «Tu siervo Ben-adad dice: “Por favor, déjame vivir[b]”». Y él dijo[c]: «¿Aún vive? Él es mi hermano».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Sogas sobre la cabeza» conserva la imagen hebrea; la disposición exacta puede ser una señal de humillación o sometimiento.
    reason: source_note
  - marker: b
    text: 'O: «Perdona mi vida, por favor». Literalmente: «Que viva mi vida, por favor».'
    reason: lexical_alternative
  - marker: c
    text: «Él es mi hermano» probablemente expresa fraternidad política o de pacto, no parentesco literal.
    reason: cultural_note
lexical_decisions:
- source_word: וַיַּחְגְּרוּ
  english_pob_choice: they tied around
  chosen_spanish: se ciñeron
  alternatives_spanish:
  - se ataron
  - se pusieron
  lexicon: HALOT
  rationale: חגר expresa ceñir o atar alrededor del cuerpo. «Se ciñeron» conserva la acción concreta y funciona con naturalidad en español bíblico contemporáneo.
- source_word: שַׂקִּים
  english_pob_choice: sackcloth
  chosen_spanish: sacos
  alternatives_spanish:
  - cilicio
  - tela áspera
  lexicon: HALOT
  rationale: En este contexto, el hebreo se refiere a la vestidura o material de duelo. «Sacos» preserva la imagen del texto y evita cargar una equivalencia litúrgica posterior como «cilicio», que en español puede sonar más interpretativa.
- source_word: בְּמָתְנֵיהֶם
  english_pob_choice: around their waists
  chosen_spanish: a la cintura
  alternatives_spanish:
  - en los lomos
  - alrededor de sus lomos
  lexicon: HALOT
  rationale: מָתְנַיִם designa cintura/lomos. «A la cintura» comunica bien el gesto sin forzar un término menos natural como «lomos».
- source_word: וַחֲבָלִים
  english_pob_choice: ropes
  chosen_spanish: sogas
  alternatives_spanish:
  - cuerdas
  - cordeles
  lexicon: HALOT
  rationale: חֲבָלִים puede ser cuerdas o sogas. «Sogas» mantiene el valor material y el tono rústico del acto de sumisión.
- source_word: בְּרָאשֵׁיהֶם
  english_pob_choice: on their heads
  chosen_spanish: sobre la cabeza
  alternatives_spanish:
  - en la cabeza
  - encima de la cabeza
  lexicon: HALOT
  rationale: La preposición con רֹאשׁ indica colocación visible sobre la cabeza. «Sobre la cabeza» es claro y no especifica más de lo que el hebreo dice.
- source_word: עַבְדְּךָ
  english_pob_choice: Your servant
  chosen_spanish: Tu siervo
  alternatives_spanish:
  - Tu esclavo
  - Tu servidor
  lexicon: HALOT
  rationale: En lenguaje cortesano y diplomático, עבד es una fórmula de humillación. «Siervo» conserva el registro reverente y evita sobrecargar el texto con «esclavo», que aquí no parece ser la intención principal del hablante.
- source_word: בֶן הֲדַד
  english_pob_choice: Ben-hadad
  chosen_spanish: Ben-adad
  alternatives_spanish:
  - Ben-hadad
  lexicon: HALOT
  rationale: Se translitera el nombre propio siguiendo la forma habitual en español bíblico, con adaptación gráfica mínima para facilitar lectura.
- source_word: תְּחִי נָא נַפְשִׁי
  english_pob_choice: Please let me live
  chosen_spanish: Te ruego que me dejes vivir
  alternatives_spanish:
  - Por favor, deja que viva
  - Te pido que me conserves la vida
  lexicon: HALOT
  rationale: El hebreo dice literalmente «viva, por favor, mi vida». En español, «Te ruego que me dejes vivir» expresa la súplica con naturalidad y sin perder el sentido de petición de preservación de vida.
- source_word: הַעוֹדֶנּוּ חַי
  english_pob_choice: Is he still alive?
  chosen_spanish: ¿Aún vive?
  alternatives_spanish:
  - ¿Sigue vivo?
  - ¿Todavía está vivo?
  lexicon: HALOT
  rationale: La pregunta interrogativa con עוד + חי pide confirmar si sigue con vida. «¿Aún vive?» es breve, fiel y mantiene el impacto narrativo.
- source_word: אָחִי הוּא
  english_pob_choice: He is my brother
  chosen_spanish: Él es mi hermano
  alternatives_spanish:
  - Es mi hermano
  - Es como mi hermano
  lexicon: HALOT
  rationale: אָח puede expresar parentesco literal o una relación de fraternidad política/covenantal. «Él es mi hermano» preserva la ambigüedad y la tensión interpretativa sin resolverla artificialmente.
theological_decisions:
- issue: Sentido de «mi hermano» en la respuesta del rey
  english_pob_reading: 'Retain the kinship term literally: ''He is my brother.'''
  chosen_spanish_reading: Conservar literalmente «Él es mi hermano».
  alternative_spanish_readings:
  - Él es mi aliado
  - Es como un hermano para mí
  rationale: El hebreo usa el término ordinario de parentesco אָח. Aunque en contexto puede aludir a fraternidad política o a una maniobra diplomática, el texto no lo explicita. Mantener el término literal conserva la tensión narrativa y evita interpretar más allá de la evidencia.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica/narrativa en lugar de resolverla.'
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo masorético y el audit trail inglés, sin cambios revisionales relevantes en la última pasada; se mantiene la lectura abierta de אָחִי y la imagen concreta de saco/sogas.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando corresponda al Tetragrámaton; aquí no aparece.
  - Se conserva «Ben-adad» como transliteración española del nombre propio.
  - Se evita «SEÑOR» para el nombre divino, porque no aparece en este versículo.
  - Se mantiene el registro cortesano de «Tu siervo»/«mi hermano» sin convertirlo en lenguaje doctrinal posterior.
