- from: Y él será un santuario[a], y una piedra de tropiezo y una roca de ofensa para las dos casas de Israel[b], un lazo y una trampa para el habitante de Jerusalén.
  to: Y él será un santuario, y una piedra de tropiezo[a] y una roca de tropiezo para las dos casas de Israel, un lazo y una trampa para el habitante de Jerusalén[b].
  rationale: Se corrigen los anclajes de las notas para que coincidan con las palabras que realmente explican en el texto fuente y en la auditoría inglesa. También se sustituye «roca de ofensa» por «roca de tropiezo» para reflejar mejor מִכְשׁוֹל en español natural y claro, evitando una expresión menos idiomática que puede desviar la imagen física del hebreo.
