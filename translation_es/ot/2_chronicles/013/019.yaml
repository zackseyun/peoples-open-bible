translation:
  language: es
  text: Abías persiguió a Jeroboam y tomó de su poder Betel y sus ciudades hijas[a], Jeshaná y sus ciudades hijas, y Efrón y sus ciudades hijas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo «ciudades hijas», es decir, los asentamientos o poblados menores que dependían de cada ciudad principal.
    reason: lexical_alternative
  - marker: b
    text: Algunas traducciones leen «Ofra» en lugar de «Efrón». El Texto Masorético hebreo aquí lee «Efrón».
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּרְדֹּף
  english_pob_choice: pursued
  chosen_spanish: persiguió
  alternatives_spanish:
  - fue tras
  - perseguía
  lexicon: HALOT
  rationale: רָדַף en narrativa militar expresa persecución de un enemigo en retirada. «Persiguió» conserva el sentido bélico de manera natural en español y sigue de cerca la elección inglesa.
- source_word: וַיִּלְכֹּד
  english_pob_choice: captured
  chosen_spanish: capturó
  alternatives_spanish:
  - tomó
  - se apoderó de
  lexicon: HALOT
  rationale: לָכַד suele referirse a tomar o capturar una ciudad en contexto de guerra. «Capturó» mantiene explícito el matiz militar sin añadir elementos ausentes del hebreo.
- source_word: מִמֶּנּוּ
  english_pob_choice: from him
  chosen_spanish: le
  alternatives_spanish:
  - de él
  - de sus manos
  lexicon: HALOT
  rationale: El hebreo indica que las ciudades fueron quitadas de la posesión o control de Jeroboam. En español, el dativo «le» expresa con naturalidad el desplazamiento de esas ciudades de su dominio, sin forzar una imagen adicional.
- source_word: עָרִים
  english_pob_choice: cities
  chosen_spanish: ciudades
  alternatives_spanish:
  - poblados
  - villas
  lexicon: HALOT
  rationale: Aunque el versículo enumera directamente los lugares capturados, עָרִים es el término general para centros poblados. «Ciudades» preserva ese valor básico y encaja con la lista nominal.
- source_word: בְּנוֹתֶיהָ
  english_pob_choice: its daughter towns
  chosen_spanish: sus ciudades hijas
  alternatives_spanish:
  - sus aldeas
  - sus poblados dependientes
  - sus asentamientos satélite
  lexicon: HALOT
  rationale: El hebreo usa la metáfora literal de «hijas» para asentamientos dependientes de una ciudad principal. «Ciudades hijas» conserva esa tensión léxica en español y deja visible el vínculo jerárquico; no la sustituimos por una paráfrasis más interpretativa en el texto principal.
- source_word: בֵּית אֵל
  english_pob_choice: Bethel
  chosen_spanish: Betel
  alternatives_spanish:
  - Betel
  lexicon: toponym
  rationale: En español bíblico y geográfico, «Betel» es la forma asentada y transparente del topónimo.
- source_word: יְשָׁנָה
  english_pob_choice: Jeshanah
  chosen_spanish: Jeshaná
  alternatives_spanish:
  - Jeshanah
  lexicon: toponym
  rationale: Se translitera el nombre propio para mantener la forma de lugar del hebreo, adaptando la acentuación al español para lectura fluida.
- source_word: עפרון
  english_pob_choice: Ephron
  chosen_spanish: Efrón
  alternatives_spanish:
  - Efron
  - Efrón
  lexicon: toponym
  rationale: La forma consonántica del texto masorético se vierte como nombre propio en español. «Efrón» conserva mejor la pronunciación y la inteligibilidad en español que una transliteración más inglesa.
theological_decisions:
- issue: Topónimo con variante textual potencial en עפרון
  english_pob_reading: The MT reads 'Ephron'; some translations read 'Ophrah' instead.
  chosen_spanish_reading: Efrón
  alternative_spanish_readings:
  - Ofra
  rationale: Se sigue la lectura del Texto Masorético, como en la base inglesa POB, y se preserva la variante conocida «Ofra» en nota para no borrar la tensión textual.
  doctrine_reference: Crítica textual; conservación de la lectura del MT
translation_notes:
  revision_awareness: 'La revisión inglesa eliminó la palabra redundante ''cities'' porque el hebreo enumera directamente los lugares capturados. En español se siguió esa decisión: no se añadió un término genérico extra antes de la lista. También se mantuvo la frase repetida ''ciudades hijas'' como equivalente formal de בְּנוֹתֶיהָ, con nota explicativa para preservar el matiz metafórico sin domesticarlo.'
  spanish_consistency_notes:
  - Se usa el topónimo «Betel» con ortografía asentada en español bíblico.
  - Se conserva el patrón repetido «y sus ciudades hijas» para reflejar la estructura del hebreo.
  - Se optó por nombres propios adaptados al español («Jeshaná», «Efrón») para una lectura fluida y reverente.
