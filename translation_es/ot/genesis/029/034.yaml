translation:
  language: es
  text: 'Y concibió otra vez y dio a luz un hijo, y dijo: «Ahora, esta vez, mi esposo se unirá a mí[a], porque le he dado tres hijos». Por eso fue llamado Leví.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «estará unido a mí». El verbo hebreo suena como el nombre Leví.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתַּהַר עוֹד
  english_pob_choice: And she conceived again
  chosen_spanish: Y concibió otra vez
  alternatives_spanish:
  - Y quedó embarazada de nuevo
  - Y volvió a concebir
  lexicon: HALOT
  rationale: הרה expresa quedar embarazada o concebir; en español, «concibió» mantiene la forma narrativa breve y digna. עוֹד añade la idea de repetición, por eso «otra vez».
- source_word: וַתֵּלֶד בֵּן
  english_pob_choice: and bore a son
  chosen_spanish: y dio a luz un hijo
  alternatives_spanish:
  - y parió un hijo
  - y tuvo un hijo
  lexicon: HALOT
  rationale: יַלד en esta fórmula narrativa se traduce naturalmente como dar a luz. «Hijo» conserva el paralelismo directo con el hebreo.
- source_word: עַתָּה הַפַּעַם
  english_pob_choice: Now this time
  chosen_spanish: Ahora, esta vez
  alternatives_spanish:
  - Ahora, por fin, esta vez
  - Esta vez
  lexicon: HALOT
  rationale: La combinación intensiva se reproduce con dos marcadores de inmediatez y énfasis. Se evita sobreinterpretar con «por fin».
- source_word: יִלָּוֶה
  english_pob_choice: will be attached
  chosen_spanish: se unirá
  alternatives_spanish:
  - se juntará
  - estará unido a mí
  - será unido a mí
  lexicon: HALOT
  rationale: El nifal de לוה contiene la idea de unirse o estar ligado. «Se unirá» es idiomático en español y conserva el juego de palabras con Leví sin perder la fuerza relacional.
- source_word: אִישִׁי
  english_pob_choice: my husband
  chosen_spanish: mi esposo
  alternatives_spanish:
  - mi marido
  - mi hombre
  lexicon: HALOT
  rationale: En contexto matrimonial, אִישׁ con sufijo posesivo significa «esposo». «Esposo» es claro y respetuoso en español contemporáneo.
- source_word: אֵלַי
  english_pob_choice: to me
  chosen_spanish: a mí
  alternatives_spanish:
  - hacia mí
  - conmigo
  lexicon: HALOT
  rationale: La preposición אל expresa dirección hacia Leah. «A mí» preserva esa dirección y suena natural en español.
- source_word: כִּי יָלַדְתִּי לוֹ שְׁלֹשָׁה בָנִים
  english_pob_choice: because I have borne him three sons
  chosen_spanish: porque le he dado tres hijos
  alternatives_spanish:
  - porque le he dado a luz tres hijos
  - porque le he dado tres varones
  lexicon: HALOT
  rationale: El sentido causal de כִּי se mantiene con «porque». Para el verbo, «he dado» comunica el resultado de parir en un registro natural; «hijos» traduce בנים de manera fiel y menos marcada que «varones», sin ocultar el conteo.
- source_word: עַל כֵּן
  english_pob_choice: Therefore
  chosen_spanish: Por eso
  alternatives_spanish:
  - Por tanto
  - Así que
  lexicon: HALOT
  rationale: La fórmula etiológica se vierte con una conexión causal clara y pública en español. «Por eso» mantiene la relación sin sonar excesivamente formal.
- source_word: קָרָא שְׁמוֹ
  english_pob_choice: his name was called
  chosen_spanish: le puso por nombre
  alternatives_spanish:
  - se llamó
  - fue llamado
  - pusieron su nombre
  lexicon: HALOT
  rationale: El hebreo presenta la fórmula de nombramiento sin sujetar explícitamente al agente. En español, la pasiva impersonal suena menos natural; «le puso por nombre» preserva el hecho nominativo sin forzar la sintaxis.
- source_word: לֵוִי
  english_pob_choice: Levi
  chosen_spanish: Leví
  alternatives_spanish:
  - Levi
  lexicon: HALOT
  rationale: Se translitera el nombre propio con acentuación española habitual. Se mantiene el vínculo sonoro con יִלָּוֶה/לוה.
theological_decisions:
- issue: Juego de palabras entre יִלָּוֶה y לֵוִי
  english_pob_reading: Use 'attached' in the main text and preserve the more literal 'joined' in a footnote
  chosen_spanish_reading: Usar «se unirá» en el texto principal y preservar en nota la posibilidad de «se juntará / se unirá a mí» como eco del nombre Leví
  alternative_spanish_readings:
  - se juntará
  - estará unido a mí
  - se ligará a mí
  rationale: 'No hay disputa doctrinal, pero sí una tensión léxica importante: la frase de Lea explica el nombre con un verbo que suena al nombre Leví. «Se unirá» es natural en español y conserva el vínculo semántico; la nota permite ver la alternativa más literal sin perder fluidez.'
  doctrine_reference: Principios de equivalencia óptima y transparencia lexical del POB
- issue: Elección de «esposo» para אִישִׁי
  english_pob_reading: my husband
  chosen_spanish_reading: mi esposo
  alternative_spanish_readings:
  - mi marido
  - mi hombre
  rationale: En el contexto matrimonial de Génesis, la referencia es inequívoca. «Esposo» evita una literalidad áspera y expresa con claridad la relación conyugal sin alterar el contenido.
  doctrine_reference: Claridad contextual y uso español contemporáneo
- issue: Expresión final de nombramiento
  english_pob_reading: Therefore his name was called Levi
  chosen_spanish_reading: Por eso le puso por nombre Leví
  alternative_spanish_readings:
  - Por eso fue llamado Leví
  - Por eso se llamó Leví
  rationale: La fórmula hebrea puede sonar impersonal si se calca. La redacción elegida comunica el acto de nombrar de manera natural en español y conserva el valor etiológico del texto.
  doctrine_reference: Sintaxis natural en español bajo fidelidad semántica
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión más reciente del POB en inglés, que ajustó la idea de 'become attached' a 'be attached' por mayor naturalidad. En español, esa preferencia se refleja con «se unirá», que comunica el vínculo esperado sin añadir una fase innecesaria de transición. También se mantuvo la nota de juego de palabras con Leví para no perder la relación etimológica documentada.
  spanish_consistency_notes:
  - Se usó «Yahvé» como forma estándar del proyecto solo cuando aparezca el nombre divino; en este versículo no aparece.
  - Se prefirió «Leví» con acento gráfico para la adaptación española del nombre propio.
  - «Esposo» se eligió por claridad marital; no se usó «siervo» ni términos litúrgicos no pertinentes.
  - La nota al pie conserva la alternativa lexical que el audit trail inglés documenta para el verbo de unión.
