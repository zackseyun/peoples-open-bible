translation:
  language: es
  text: Ningún sacerdote beberá vino[a] al entrar en el atrio interior.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ningún sacerdote beberá vino al entrar en el atrio interior».'
