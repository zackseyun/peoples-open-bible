revisions:
- from: ¿Quién puede subir al monte de Yahvé? ¿Y quién puede estar en su lugar santo?[a]
  to: ¿Quién puede subir al monte de Yahvé?[a] Y ¿quién puede estar de pie en su lugar santo?
  rationale: 'Se revisa para reflejar mejor el hebreo y el rastro POB: se conserva «monte» con una nota útil que sí presenta la alternativa real «montaña»; se restituye la conjunción «Y» del paralelismo hebreo; y «puede estar» se fortalece a «puede estar de pie» para representar mejor יָקוּם sin volver la frase demasiado rígida. No se requiere adjudicación adicional, porque la corrección es clara y de bajo riesgo.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:20:24Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura interrogativa y preserva correctamente «Yahvé» para יהוה. Sin embargo, se aparta del matiz del hebreo y del rastro POB en dos puntos principales: יָקוּם se ha suavizado a «estar» en vez de reflejar la idea de «estar de pie / mantenerse», y se pierde la conjunción inicial del segundo hemistiquio («Y»/«Y quién»), que en el hebreo וּמִי sí está presente. Además, la nota al pie no preserva fielmente la alternativa del inglés, porque el texto principal ya usa «monte» y la alternativa debería contrastar con «montaña», no repetir «monte».'
  spanish_quality_summary: El español es claro y reverente, pero «puede estar» suena algo débil frente al paralelismo poético con «subir» y reduce la viveza cultual de קום. «Puede mantenerse en pie» sería más literal pero algo pesado; «puede estar de pie» o «puede permanecer» funcionan mejor. También conviene conservar la conjunción «Y» al inicio del segundo interrogante para reflejar mejor el paralelismo. La nota al pie necesita corrección para que sea útil y no redundante.
  glossary_alignment: 'Alineación general buena con la terminología del proyecto: «Yahvé» está correcto para יהוה. No hay otros términos doctrinales conflictivos. La principal desviación es léxica/estilística en יָקוּם, donde el proyecto inglés documenta «may stand» y el español debería preservar la noción de estar de pie/plantarse en presencia de Dios mejor que «estar».'
  issues:
  - severity: medium
    issue: יָקוּם se tradujo como «puede estar»
    rationale: El hebreo קום en este contexto, y según la decisión inglesa documentada («may stand»), expresa más que mera presencia; comunica la idea de estar de pie o sostenerse ante Dios. «Puede estar» debilita ese matiz.
  - severity: low
    issue: Falta la conjunción «Y» antes de la segunda pregunta
    rationale: וּמִי introduce explícitamente el segundo miembro paralelo. Omitir «Y» no destruye el sentido, pero sí reduce la fidelidad formal y el ritmo poético.
  - severity: medium
    issue: La nota al pie sobre הַר está mal formulada
    rationale: El texto principal ya usa «monte», pero la nota dice como alternativa «el monte de Yahvé», lo cual no aporta variante real. Debe indicar «la montaña de Yahvé» o equivalente, en paralelo con la nota inglesa.
  revised_spanish_text: ¿Quién puede subir al monte de Yahvé?[a] Y ¿quién puede estar de pie en su lugar santo?
  revised_footnotes:
  - marker: a
    text: 'O: «la montaña de Yahvé». El hebreo הַר puede significar «monte» o «montaña»; aquí se conserva «monte» por ser la traducción más habitual en este salmo.'
    reason: lexical_alternative
  revision_rationale: 'Se revisa para reflejar mejor el hebreo y el rastro POB: se conserva «monte» con una nota útil que sí presenta la alternativa real «montaña»; se restituye la conjunción «Y» del paralelismo hebreo; y «puede estar» se fortalece a «puede estar de pie» para representar mejor יָקוּם sin volver la frase demasiado rígida. No se requiere adjudicación adicional, porque la corrección es clara y de bajo riesgo.'
