translation:
  language: es
  text: Todas estas eran piedras costosas[a], cortadas según medida, aserradas con una sierra, por dentro y por fuera, desde el cimiento hasta el remate[b], y por fuera hasta el gran patio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «piedras preciosas». Aquí probablemente se trata de piedras de construcción de alta calidad y alto costo, no de gemas.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «hasta los tĕfaḥot»; el rasgo arquitectónico exacto es incierto. Puede referirse al acabado superior, como el remate o la hilada superior.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲבָנִים יְקָרֹת
  english_pob_choice: costly stones
  chosen_spanish: piedras costosas
  alternatives_spanish:
  - piedras preciosas
  - piedras valiosas
  lexicon: HALOT
  rationale: En este contexto arquitectónico, יְקָרֹת señala piedras de alto valor o alto costo, no gemas. «Piedras costosas» conserva la fuerza de precio/calidad del material y sigue la decisión auditada del POB inglés.
- source_word: כְמִדֹּת גָּזִית
  english_pob_choice: cut according to measure
  chosen_spanish: cortadas según medida
  alternatives_spanish:
  - cortadas conforme a las medidas de piedra labrada
  - labradas a medida
  lexicon: HALOT
  rationale: La frase combina la idea de medidas precisas con piedra labrada/hecha a escuadra. «Cortadas según medida» comunica la exactitud del ajuste sin volver la línea demasiado técnica o pesada en español.
- source_word: מְגֹרָרוֹת בַּמְּגֵרָה
  english_pob_choice: sawed with a saw
  chosen_spanish: labradas con sierra
  alternatives_spanish:
  - cortadas con sierra
  - aserradas con sierra
  lexicon: HALOT
  rationale: El hebreo enfatiza el trabajo con sierra y el instrumental mismo. «Labradas con sierra» mantiene el sentido de acabado artesanal en piedra y evita la redundancia demasiado dura de «aserradas con sierra», aunque esa opción también sería posible.
- source_word: מִבַּיִת וּמִחוּץ
  english_pob_choice: on the inside and on the outside
  chosen_spanish: por dentro y por fuera
  alternatives_spanish:
  - del lado interior y del lado exterior
  - en el interior y en el exterior
  lexicon: HALOT
  rationale: La ubicación describe las caras o superficies terminadas de la mampostería. «Por dentro y por fuera» es idiomático en español y reproduce bien la distribución interna/externa del hebreo, coherente con la revisión del POB inglés.
- source_word: מִמַּסָּד
  english_pob_choice: from the foundation
  chosen_spanish: desde el cimiento
  alternatives_spanish:
  - desde la base
  - desde el fundamento
  lexicon: HALOT
  rationale: En contexto de construcción, מַסָּד se refiere a la base estructural. «Cimiento» es natural en español arquitectónico y fiel a la idea de arranque inferior del revestimiento.
- source_word: הַטְּפָחוֹת
  english_pob_choice: the coping
  chosen_spanish: el remate
  alternatives_spanish:
  - la coronación
  - el copete
  lexicon: HALOT
  rationale: El referente exacto es incierto; el POB inglés opta por «coping» y mantiene la indeterminación arquitectónica. «Remate» preserva esa incertidumbre con un término amplio y natural para la parte superior de una obra.
- source_word: הֶחָצֵר הַגְּדוֹלָה
  english_pob_choice: the great court
  chosen_spanish: el gran atrio
  alternatives_spanish:
  - el gran patio
  - el gran patio exterior
  lexicon: HALOT
  rationale: חָצֵר puede traducirse como atrio/patio/corte. En el marco del templo, «atrio» es una equivalencia arquitectónica adecuada y readable; «gran» conserva la cualidad de gran tamaño sin introducir una interpretación más específica de la necesaria.
theological_decisions:
- issue: Alcance arquitectónico y grado de certeza de הַטְּפָחוֹת
  english_pob_reading: the coping; Hebrew 'to the tĕfaḥot'; the exact architectural feature is uncertain. It may refer to the upper finishing, such as the coping or top course.
  chosen_spanish_reading: el remate; el rasgo arquitectónico exacto es incierto y puede referirse al acabado superior
  alternative_spanish_readings:
  - la coronación
  - la hilada superior
  - el copete
  rationale: La lectura inglesa preserva la incertidumbre del término técnico. En español conviene no fijarlo dogmáticamente; «remate» deja abierta la posibilidad de un acabado superior, sin fingir certeza donde el hebreo no la ofrece.
  doctrine_reference: Principio de cautela textual y terminológica; no dogmatizar sobre un detalle arquitectónico incierto.
translation_notes:
  revision_awareness: 'La redacción sigue la lectura revisada del POB inglés: mantiene «on the inside and on the outside» como «por dentro y por fuera», y conserva la incertidumbre técnica de הַטְּפָחוֹת con una solución española igualmente amplia. No se fuerza una concreción mayor que la sustentada por el hebreo o por el audit trail inglés.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto base lo requiera explícitamente; este versículo no contiene el nombre divino.
  - Se mantiene el registro arquitectónico con términos naturales para construcción/templo en español.
  - «Costosas» se prefiere a «preciosas» para evitar sugerencia de gemas, conforme al sentido contextual documentado.
  - «Atrio» se eligió por el contexto del templo y su uso común en español bíblico, sin sustituir el sentido espacial del hebreo.
