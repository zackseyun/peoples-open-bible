review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido básico del hebreo: mandato directo de cortar la mano y conservación del modismo legal «tu ojo». También mantiene la alternativa léxica de כַּף como «palma». Sin embargo, la nota [b] no corresponde al mismo tipo de alternativa que preserva el inglés POB: el inglés ofrece «your eye shall not spare», mientras que el español propone «tu ojo no la perdonará», que introduce un objeto femenino no expreso y desplaza el matiz de compasión/piedad hacia perdón personal.'
  spanish_quality_summary: El español es claro y legible. «Le cortarás la mano» suena natural y suficientemente directo en contexto legal. «Tu ojo no tendrá compasión» es comprensible y conserva bien el modismo, aunque «no tendrá piedad» también sería posible. La principal reparación necesaria está en la nota [b], para alinear mejor la alternativa y evitar una expansión no presente en el hebreo.
  glossary_alignment: 'No hay términos del glosario mayor en juego. Las decisiones léxicas clave están bien encaminadas: קצץ como «cortar», כַּף como «mano» con nota a «palma», y חוס + «ojo» como modismo de no mostrar piedad/compasión. Conviene ajustar la nota para que la alternativa sea «no tendrá piedad» o «no perdonará» sin añadir «la».'
  issues:
  - severity: medium
    issue: La nota [b] introduce «la» en «tu ojo no la perdonará»
    rationale: El hebreo no expresa objeto directo femenino en esta cláusula. Esa adición hace la alternativa más interpretativa que el inglés auditado y desvía el foco del modismo legal.
  - severity: medium
    issue: Desalineación con la alternativa inglesa documentada para תָחוֹס
    rationale: El inglés POB conserva «shall pity» en texto y da «shall spare» en nota. La nota española debería reflejar mejor esa pareja semántica, no un giro de perdón personal.
  revised_spanish_text: le cortarás la mano[a]; tu ojo no tendrá compasión[b].
  revised_footnotes:
  - marker: a
    text: O «la palma». El hebreo כַּף puede referirse específicamente a la palma de la mano, aunque «mano» es más natural en este contexto legal.
    reason: lexical_alternative
  - marker: b
    text: O «tu ojo no tendrá piedad». El hebreo dice literalmente «tu ojo», una expresión idiomática para negar compasión o indulgencia.
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal porque es fiel, natural y suficientemente literal. Se corrige únicamente la nota [b] para alinearla con la evidencia fuente y el rastro de auditoría inglés, evitando añadir un objeto femenino no expreso en el hebreo y preservando mejor el valor idiomático de la fórmula legal.
