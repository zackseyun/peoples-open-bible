translation:
  language: es
  text: y la avestruz[a], el gavilán, la gaviota y el halcón, según su especie,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Las identificaciones de las aves hebreas en este versículo son inciertas en varios casos; entre las alternativas tradicionales se incluyen «búho» para «avestruz», «búho nocturno» o «búho» para «gavilán», «cuclillo» para «gaviota» y «gavilán» para «halcón».
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּת הַיַּעֲנָה
  english_pob_choice: the ostrich
  chosen_spanish: la avestruz
  alternatives_spanish:
  - el avestruz
  - el búho
  lexicon: HALOT; BDB
  rationale: La expresión hebrea literalmente significa «hija de la ya‘aná», pero en listas zoológicas funciona como nombre convencional de un ave; la identificación más probable es «avestruz». En español, «avestruz» es el equivalente natural y reconoce el valor léxico establecido sin forzar una paráfrasis.
- source_word: הַתַּחְמָס
  english_pob_choice: the hawk
  chosen_spanish: el halcón
  alternatives_spanish:
  - el milano
  - el búho nocturno
  - el halcón
  lexicon: HALOT; BDB
  rationale: La identificación exacta es incierta. Dado que el inglés POB usa un término amplio para un ave de rapiña y busca una lista natural, «halcón» conserva bien el campo semántico en español sin fingir mayor precisión de la que permite el hebreo.
- source_word: הַשָּׁחַף
  english_pob_choice: the gull
  chosen_spanish: la gaviota
  alternatives_spanish:
  - el cuclillo
  - la gaviota de mar
  lexicon: HALOT; BDB
  rationale: El término es incierto, pero «gull» se traduce de forma natural como «gaviota». Es una opción moderna y clara en español, sin sobreespecificar la especie.
- source_word: הַנֵּץ
  english_pob_choice: the falcon
  chosen_spanish: el falcón
  alternatives_spanish:
  - el halcón
  lexicon: HALOT; BDB
  rationale: Aunque el hebreo puede abarcar un ave de rapiña en general, el inglés POB distingue este término de תַּחְמָס con «falcon». En español, «falcón» mantiene esa distinción y refleja el intento de diferenciar dos aves emparentadas sin colapsarlas en una sola palabra.
- source_word: לְמִינֵהוּ
  english_pob_choice: according to its kind
  chosen_spanish: según su especie
  alternatives_spanish:
  - según su género
  - por sus clases
  lexicon: HALOT; BDB
  rationale: La fórmula clasifica por tipo o grupo. «Según su especie» transmite bien la función taxonómica del hebreo y es idiomático en español bíblico contemporáneo.
- source_word: וְאֵת / וְאֶת
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - —
  lexicon: Gramática hebrea
  rationale: Los marcadores de objeto directo con conjunción forman una lista continua; en español se omite el marcador y se conserva la coordinación natural con «y».
translation_notes:
  revision_awareness: 'El texto sigue de cerca el patrón del POB en inglés: lista coordinada de aves impuras con una nota de incertidumbre léxica. No se introdujeron cambios de contenido; solo se adaptó la terminología al español manteniendo la distinción entre las dos aves de rapiña y la frase clasificatoria final.'
  spanish_consistency_notes:
  - Se mantuvo «avestruz» como nombre zoológico establecido, aunque el hebreo es literalmente más opaco.
  - Se preservó la distinción entre «halcón» y «falcón» para reflejar la diferenciación del POB inglés entre תַּחְמָס y הַנֵּץ.
  - «Según su especie» conserva la fórmula clasificatoria sin modernizarla de forma excesiva.
  - La nota al pie refleja la incertidumbre textual/lexical del listado sin resolverla de manera artificial.
