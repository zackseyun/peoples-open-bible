revisions:
- from: Pero si el pueblo de la tierra realmente oculta[a] sus ojos de ese hombre cuando da parte de su descendencia[b] a Molec[c], para no hacerlo morir.
  to: Pero si el pueblo de la tierra ciertamente esconde[a] sus ojos ante ese hombre, cuando él da parte de sus hijos[b] a Molec[c], para no darle muerte,
  rationale: Se corrigió la concordancia y se hizo el español más natural sin perder el modismo hebreo ni su fuerza enfática. 'Ciertamente esconde' refleja mejor la intensificación del infinitivo absoluto. 'Ante ese hombre' evita un calco duro mientras conserva la imagen con apoyo de la nota. 'Hijos' aclara el referente contextual de 'semilla/descendencia', y 'para no darle muerte' recupera el registro legal del original.
