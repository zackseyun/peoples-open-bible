    issue: La nota [a] está innecesariamente añadida y mal enfocada.
    rationale: El inglés POB no preserva aquí una alternativa que requiera nota para φιλάνθρωπον; además, anclarla en 'ama' reduce indebidamente el sentido del adjetivo compuesto y produce una nota tautológica ('Literalmente, un espíritu que ama a la humanidad').
  - severity: medium
