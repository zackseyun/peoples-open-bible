review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del hebreo: Yahvé llama a todos los grupos de los reinos del norte; ellos vendrán; cada uno pondrá su trono en la entrada de las puertas de Jerusalén; y lo harán en actitud hostil contra sus muros y contra las ciudades de Judá. También preserva correctamente «Yahvé» para יְהוָה y la imaginería de «trono». Sin embargo, en dos puntos se aparta de la mejor alineación con la evidencia fuente y con el audit trail inglés: (1) מִשְׁפְּחוֹת se tradujo en el texto principal como «familias», cuando la decisión auditada favorece «clanes» para evitar un sentido demasiado doméstico; (2) «contra todos sus muros alrededor» suena menos natural y preciso que una formulación que exprese mejor סָבִיב como «por todos lados» o equivalente.'
  spanish_quality_summary: El español es claro y mayormente digno, pero requiere pequeños ajustes de naturalidad y terminología. «Porque he aquí» es aceptable en registro bíblico, aunque algo rígido; no exige cambio. El problema principal de legibilidad es «contra todos sus muros alrededor», que resulta algo trabado en español. «Contra todos sus muros por todos lados» fluye mejor y conserva la idea de cerco. Además, «familias» en el texto principal puede inducir un sentido demasiado estrecho frente al hebreo.
  glossary_alignment: Alinea bien con la política del proyecto en «Yahvé», «Judá», «trono» y el distributivo «cada uno». La principal desalineación con la racionalidad léxica documentada está en מִשְׁפְּחוֹת, donde el inglés POB escogió «clans» precisamente para evitar la lectura doméstica de «families»; en español, «clanes» es igualmente natural y más fiel a esa justificación. Las notas deben ajustarse para que la alternativa sea «familias», no al revés.
  issues:
  - severity: medium
    issue: «familias» en el texto principal para מִשְׁפְּחוֹת
    rationale: Aunque posible, no sigue la elección léxica principal del audit trail («clans») ni su razón explícita de evitar un sentido doméstico. En español, «clanes» comunica mejor grupos de parentesco amplios.
  - severity: low
    issue: «contra todos sus muros alrededor» suena poco idiomático
    rationale: Preserva el sentido básico, pero «alrededor» al final queda algo forzado. Una formulación como «por todos lados» o «a su alrededor» expresa mejor סָבִיב en español natural sin perder el matiz militar.
  revised_spanish_text: Porque he aquí[a], estoy llamando a todos los clanes[b] de los reinos del norte, declara Yahvé, y vendrán; cada uno pondrá su trono a la entrada de las puertas de Jerusalén, contra todos sus muros por todos lados, y contra todas las ciudades de Judá.
  revised_footnotes:
