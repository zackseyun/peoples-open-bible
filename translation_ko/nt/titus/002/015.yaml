id: TIT.2.15
reference: Titus 2:15
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Ταῦτα λάλει καὶ παρακάλει καὶ ἔλεγχε μετὰ πάσης ἐπιταγῆς· μηδείς σου περιφρονείτω.
base_translation:
  language: en
  yaml_path: translation/nt/titus/002/015.yaml
  text: Speak these things[a], and exhort and rebuke with all authority. Let no one disregard you.
  footnotes:
  - marker: a
    text: Or 'Let no one despise you' / 'Let no one look down on you.'
    reason: lexical_alternative
translation:
  language: ko
  text: 그대는 이것들을 말하고, 모든 권위를 가지고 권면하고 책망하십시오. 아무도 그대를 업신여기지 못하게 하십시오[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「아무도 그대를 멸시하지 못하게 하라」, 「아무도 그대를 깔보지 못하게 하라」.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ταῦτα λάλει
  english_pob_choice: Speak these things
  chosen_korean: 그대는 이것들을 말하고
  alternatives_korean:
  - 이것을 말하라
  - 이런 것들을 가르치라
  lexicon: BDAG
  rationale: 2:1의 「말하십시오」와 일관. 합쇼체 명령형.
- source_word: παρακάλει καὶ ἔλεγχε
  english_pob_choice: exhort and rebuke
  chosen_korean: 권면하고 책망하십시오
  alternatives_korean:
  - 권하고 논박하십시오
  - 격려하고 꾸짖으십시오
  lexicon: BDAG
  rationale: 1:9, 1:13의 어휘 흐름을 이어받아 「권면」과 「책망」으로 옮긴다. 디도가 회중에게 직접 행하는 권면적 행위로서 1:13과 일관되게 「책망」 어감.
- source_word: μετὰ πάσης ἐπιταγῆς
  english_pob_choice: with all authority
  chosen_korean: 모든 권위를 가지고
  alternatives_korean:
  - 모든 명령권으로
  - 온전한 권위로
  lexicon: BDAG
  rationale: ἐπιταγή는 「명령권·권위」. 1:3의 ἐπιταγή(명령)와 어휘는 같으나 본문에서는 디도가 그것을 행사하는 권위로 옮겨진다. 「권위」가 정립된 한국어.
- source_word: μηδείς σου περιφρονείτω
  english_pob_choice: Let no one disregard you
  chosen_korean: 아무도 그대를 업신여기지 못하게 하십시오
  alternatives_korean:
  - 아무도 그대를 멸시하지 못하게 하십시오
  - 누구도 그대를 깔보지 못하게 하십시오
  lexicon: BDAG
  rationale: περιφρονέω는 「얕보다·경시하다」. 「업신여기다」가 자연스러우면서도 디도의 권위에 도전하지 못함을 분명히 한다.
