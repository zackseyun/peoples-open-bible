translation:
  language: es
  text: 'Y sobrecogimiento se apoderó de todos, y glorificaban a Dios, y se llenaron de temor, diciendo: «Hemos visto cosas extraordinarias[a] hoy».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cosas notables» o «cosas extrañas»; el griego se refiere a cosas que van más allá de la expectativa ordinaria.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔκστασις
  english_pob_choice: amazement
  chosen_spanish: sobrecogimiento
  alternatives_spanish:
  - asombro
  - estupor
  - éxtasis
  lexicon: BDAG
  rationale: En este contexto el sustantivo describe la reacción intensa de la multitud ante la obra de Jesús; «sobrecogimiento» comunica bien la conmoción sin reducir el término a un mero «asombro» ni llevarlo al sentido místico de «éxtasis».
- source_word: ἔλαβεν ἅπαντας
  english_pob_choice: seized them all
  chosen_spanish: se apoderó de todos
  alternatives_spanish:
  - tomó a todos
  - los sobrecogió a todos
  - los tomó a todos
  lexicon: BDAG
  rationale: El griego expresa una acción que «toma» o domina a todos; en español, «se apoderó de todos» conserva la fuerza vívida e idiomática del giro.
- source_word: ἐδόξαζον
  english_pob_choice: they were glorifying
  chosen_spanish: glorificaban
  alternatives_spanish:
  - estaban glorificando
  - glorificaban a Dios
  lexicon: BDAG
  rationale: El imperfecto pide un valor de acción continua o repetida. «Glorificaban» preserva esa duratividad mejor que un pretérito simple.
- source_word: θεόν
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - a Dios
  lexicon: BDAG
  rationale: «Dios» es la equivalencia directa y natural para θεός aquí; el objeto verbal queda claramente expresado en español con la preposición.
- source_word: ἐπλήσθησαν φόβου
  english_pob_choice: they were filled with fear
  chosen_spanish: fueron llenos de temor
  alternatives_spanish:
  - fueron llenos de miedo
  - el temor los llenó
  - se llenaron de temor
  lexicon: BDAG
  rationale: Se conserva la expresión directa del griego sin suavizar φόβος a «awe». «Temor» mantiene la tensión reverencial y sobrecogedora que el audit trail inglés quiso preservar.
- source_word: λέγοντες
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y diciendo
  lexicon: BDAG
  rationale: Gerundio natural para introducir la cita y mantener la relación de acompañamiento del participio.
- source_word: Εἴδομεν
  english_pob_choice: We have seen
  chosen_spanish: Hemos visto
  alternatives_spanish:
  - Vimos
  lexicon: BDAG
  rationale: Aunque la forma es aoristo, en español el perfecto compuesto expresa bien la inmediatez del testimonio recién pronunciado.
- source_word: παράδοξα
  english_pob_choice: extraordinary things
  chosen_spanish: cosas extraordinarias
  alternatives_spanish:
  - cosas notables
  - cosas sorprendentes
  - cosas extrañas
  lexicon: BDAG
  rationale: Se conserva la idea de hechos fuera de la expectativa ordinaria. «Extraordinarias» refleja bien el valor semántico sin cargar el término con un matiz peyorativo.
- source_word: σήμερον
  english_pob_choice: today
  chosen_spanish: hoy
  alternatives_spanish:
  - el día de hoy
  lexicon: BDAG
  rationale: Adverbio temporal directo y natural en español.
theological_decisions:
- issue: φόβος como respuesta a la acción divina
  english_pob_reading: Render directly as 'fear' rather than interpretively softening to 'awe.'
  chosen_spanish_reading: Traducirlo directamente como «temor», no como «asombro reverente» o «admiración».
  alternative_spanish_readings:
  - asombro reverente
  - admiración
  - awe
  rationale: El versículo mantiene la mezcla de reverencia y conmoción; «temor» preserva esa tensión bíblica en lugar de disiparla en un sentimiento más blando.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'Se corrigió la ubicación del marcador de nota al texto principal: el indicador [a] aparece junto a «todos» y la nota correspondiente queda anclada correctamente en la misma entrada.'
  spanish_consistency_notes:
  - Se usó «Dios» para θεόν y no una sustitución eclesiástica.
  - Se mantuvo «temor» para φόβος, siguiendo la decisión auditada de no suavizarla a «awe».
  - «Glorificaban» conserva el imperfecto y la acción continua.
  - Se evitó un calco rígido en la cita final, pero sin ampliar el sentido del griego.
