translation:
  language: es
  text: 'Los hijos de Ladan: Jehiel, el principal[a], y Zetam y Joel; tres.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el jefe» o «la cabeza»; el hebreo probablemente marca a Jehiel como el hijo principal o el primero en la lista.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי
  english_pob_choice: The sons of
  chosen_spanish: Los hijos de
  alternatives_spanish:
  - Los descendientes de
  lexicon: HALOT
  rationale: En una lista genealógica inmediata, בְּנֵי introduce de forma natural a los hijos nombrados; 'hijos de' es la equivalencia más directa y clara en español.
- source_word: לַעְדָּן
  english_pob_choice: Ladan
  chosen_spanish: Ladan
  alternatives_spanish:
  - Laadán
  lexicon: HALOT
  rationale: Nombre propio transliterado. Se conserva la forma breve 'Ladan', coherente con el uso estándar y con la audit trail en inglés.
- source_word: הָרֹאשׁ
  english_pob_choice: the head
  chosen_spanish: el cabeza
  alternatives_spanish:
  - el jefe
  - el principal
  - el primero
  lexicon: HALOT
  rationale: El hebreo literalmente dice 'la cabeza/el jefe'. En esta lista genealógica, POB optó por una expresión que preserve la noción de liderazgo o primacía sin reducirla mecánicamente a un ordinal. En español, 'el cabeza' conserva esa relación aunque suene algo marcado; se mantiene para reflejar la tensión lexical y no borrarla.
- source_word: יְחִיאֵל
  english_pob_choice: Jehiel
  chosen_spanish: Jehiel
  alternatives_spanish:
  - Yejiel
  lexicon: HALOT
  rationale: Nombre propio transliterado siguiendo la convención española habitual para nombres bíblicos.
- source_word: וְזֵתָם
  english_pob_choice: and Zetham
  chosen_spanish: y Zetam
  alternatives_spanish:
  - y Zetam
  - y Zétham
  lexicon: HALOT
  rationale: Nombre propio transliterado. 'Zetam' mantiene una forma breve y legible en español; se evita añadir una aspiración no marcada en el hebreo consonántico.
- source_word: וְיוֹאֵל
  english_pob_choice: and Joel
  chosen_spanish: y Joel
  alternatives_spanish:
  - y Yoel
  lexicon: HALOT
  rationale: Nombre propio bien asentado en español como 'Joel'. Se conserva la forma tradicional y reconocible.
- source_word: שְׁלֹשָׁה
  english_pob_choice: three
  chosen_spanish: tres
  alternatives_spanish:
  - eran tres
  lexicon: HALOT
  rationale: Número cardinal que resume el total de nombres listados. Se traduce de forma directa y se mantiene al final como cierre enumerativo.
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del inglés POB, que corrigió 'the first' a 'the head' para reflejar mejor הָרֹאשׁ. La versión española evita convertirlo en un ordinal y conserva la noción de cabeza/primacía.
  spanish_consistency_notes:
  - Se conserva un tono genealógico sobrio y directo.
  - Los nombres propios se transliteran de forma simple y legible para lectores hispanohablantes.
  - Se mantiene el marcador numérico final 'tres' porque forma parte explícita del hebreo y confirma la lista.
  - La nota al pie preserva la tensión entre 'cabeza/jefe/principal' sin imponer una sola interpretación.
