translation:
  language: es
  text: Hanún y los habitantes de Zanoa[a] repararon la Puerta del Valle. La construyeron y colocaron sus puertas, sus cerrojos y sus barras; y repararon mil codos[b] de la muralla, hasta la Puerta del Estiércol[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fortalecieron» la Puerta del Valle; el verbo hebreo puede significar «hacer firme» o «reparar» en este contexto de reconstrucción.
    reason: lexical_alternative
  - marker: b
    text: Mil codos equivalen aproximadamente a 457 metros (unos 1,500 pies).
    reason: cultural_note
  - marker: c
    text: O «Puerta del Basurero».
    reason: lexical_alternative
lexical_decisions:
- source_word: הֶחֱזִיק
  english_pob_choice: repaired
  chosen_spanish: repararon
  alternatives_spanish:
  - fortalecieron
  - hicieron reparaciones en
  lexicon: HALOT
  rationale: En Nehemías 3 el verbo describe repetidamente la labor de reconstrucción/puesta en estado útil de una sección de la muralla o puerta. En español, "repararon" comunica bien esa labor constructiva sin perder la idea de restauración que admite el verbo hebreo.
- source_word: שַׁעַר הַגַּיְא
  english_pob_choice: the Valley Gate
  chosen_spanish: la Puerta del Valle
  alternatives_spanish:
  - la puerta del valle
  lexicon: HALOT
  rationale: Es un sintagma de nombre propio para una puerta de la ciudad. "Puerta del Valle" conserva la función de topónimo y es la forma natural en español.
- source_word: יֹשְׁבֵי זָנוֹחַ
  english_pob_choice: the inhabitants of Zanoah
  chosen_spanish: los habitantes de Zanoaj
  alternatives_spanish:
  - los residentes de Zanoaj
  - los que vivían en Zanoaj
  lexicon: HALOT
  rationale: El participio de ישב señala a quienes residen en el lugar. "Habitantes" es idiomático y mantiene el sentido colectivo. Se translitera Zanoaj para preservar el nombre propio hebreo.
- source_word: הֵמָּה בָנוּהוּ
  english_pob_choice: They built it
  chosen_spanish: Ellos la edificaron
  alternatives_spanish:
  - Ellos la construyeron
  - Ellos la reedificaron
  lexicon: HALOT
  rationale: El hebreo dice literalmente que la construyeron. "Edificaron" suena más natural para una puerta en español formal y conserva la acción de construcción; "reedificaron" sería posible por el contexto de restauración, pero el hebreo no lo explicita aquí.
- source_word: וַיַּעֲמִידוּ
  english_pob_choice: set up
  chosen_spanish: colocaron
  alternatives_spanish:
  - instalaron
  - pusieron
  lexicon: HALOT
  rationale: Para puertas y herrajes, el verbo implica poner en su lugar/poner de pie. "Colocaron" reproduce bien esa operación sin añadir tecnicismo moderno.
- source_word: דַּלְתֹתָיו
  english_pob_choice: its doors
  chosen_spanish: sus puertas
  alternatives_spanish:
  - sus hojas
  - sus hojas de puerta
  lexicon: HALOT
  rationale: El plural hebreo se refiere a las hojas de la puerta. "Puertas" es la equivalencia más clara y natural en español.
- source_word: מַנְעֻלָיו
  english_pob_choice: its bolts
  chosen_spanish: sus cerrojos
  alternatives_spanish:
  - sus pasadores
  - sus cerraduras
  lexicon: HALOT
  rationale: En un contexto de portón, el término denota la pieza de cierre o sujeción. "Cerrojos" es comprensible y mantiene el carácter de herraje de seguridad sin reducirlo a una cerradura moderna.
- source_word: וּבְרִיחָיו
  english_pob_choice: its bars
  chosen_spanish: sus barras
  alternatives_spanish:
  - sus trancas
  - sus travesaños
  lexicon: HALOT
  rationale: '"Barras" es una traducción directa y clara para el elemento transversal que asegura la puerta.'
- source_word: אֶלֶף אַמָּה
  english_pob_choice: a thousand cubits
  chosen_spanish: mil codos
  alternatives_spanish:
  - 1.000 codos
  lexicon: HALOT
  rationale: Se conserva la unidad antigua sin convertirla, para mantener la especificidad textual y evitar una precisión interpretativa no expresada por el hebreo.
- source_word: בַּחוֹמָה
  english_pob_choice: of the wall
  chosen_spanish: de la muralla
  alternatives_spanish:
  - de la pared
  - de la fortificación
  lexicon: HALOT
  rationale: Aquí el contexto de reconstrucción urbana favorece "muralla" en español, que comunica mejor una defensa de ciudad que "pared". "De la muralla" expresa la porción reparada.
- source_word: שַׁעַר הָשֲׁפוֹת
  english_pob_choice: the Dung Gate
  chosen_spanish: la Puerta del Estiércol
  alternatives_spanish:
  - la Puerta del Refugo
  - la Puerta del Desecho
  lexicon: HALOT
  rationale: El hebreo apunta a un nombre de lugar asociado con desechos. "Puerta del Estiércol" sigue de cerca el sentido tradicional y directo del nombre, evitando suavizarlo y preservando la referencia concreta.
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo y mantiene el valor de reconstrucción del capítulo. Se conserva la alternativa lexical documentada para הֶחֱזִיק y el posible nombre alterno de la última puerta, sin introducir paráfrasis no sustentadas.
  spanish_consistency_notes:
  - Se usa "Puerta del Valle" como nombre propio de la puerta, con mayúsculas en los sustantivos principales.
  - Se mantiene "muralla" para el tramo reparado por su mayor naturalidad en español dentro de este contexto urbano-fortificado.
  - Se translitera "Zanoaj" para el topónimo, de manera consistente con otros nombres hebreos en la serie.
  - Se conserva la unidad "codos" en vez de convertirla, siguiendo la práctica del POB de preservar medidas antiguas cuando el texto las especifica.
