translation:
  language: es
  text: 'Entonces, aquellos hombres estaban atentos a una señal[a], y rápidamente se aferraron a ello[b] por lo que él dijo, y dijeron: «Ben-hadad es tu hermano». Y él dijo: «Vayan, tráiganlo». Entonces Ben-hadad salió hacia él, y lo hizo subir al carro[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «estaban adivinando» / «estaban tomando eso como un presagio». El verbo hebreo puede referirse a buscar un augurio; aquí probablemente significa que estaban alertas a una señal favorable en las palabras de Ahab.
    reason: lexical_alternative
  - marker: b
    text: La expresión hebrea detrás de «se aferraron a ello por lo que él dijo» es difícil; el sentido es que captaron rápidamente la frase de Ahab como una concesión favorable.
    reason: lexical_alternative
  - marker: c
    text: 'O «lo llevó al carro». El verbo hebreo es causativo: Ahab hizo que Ben-hadad subiera al carro.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְנַחֲשׁוּ
  english_pob_choice: were watching for a sign
  chosen_spanish: estaban atentos a un signo
  alternatives_spanish:
  - estaban adivinando
  - estaban atentos a un presagio
  - estaban buscando un augurio
  lexicon: HALOT
  rationale: El verbo hebreo puede implicar adivinación o búsqueda de un presagio; en este contexto narrativo, la idea es que los hombres estaban pendientes de una señal favorable en las palabras de Ahab. «Estaban atentos a un signo» conserva la fuerza del término sin sugerir ritual ocultista donde el contexto no lo exige.
- source_word: וַיְמַהֲרוּ
  english_pob_choice: quickly
  chosen_spanish: rápidamente
  alternatives_spanish:
  - se apresuraron
  - de prisa
  - sin demora
  lexicon: HALOT
  rationale: Se usa como adverbio para mantener la naturalidad del español y reflejar la rapidez de la reacción.
- source_word: וַיַּחְלְטוּ הֲמִמֶּנּוּ
  english_pob_choice: took it from him
  chosen_spanish: lo tomaron de él
  alternatives_spanish:
  - se aferraron a ello de él
  - lo seizing/on de él
  - lo agarraron de él
  lexicon: HALOT
  rationale: La construcción hebrea es difícil. La POB inglesa entiende que captaron de inmediato la palabra de Ahab como concesión favorable. «Lo tomaron de él» conserva la idea de apropiarse de sus palabras sin añadir más de lo que el texto permite; el referente implícito se entiende por el contexto.
- source_word: אָחִיךָ
  english_pob_choice: your brother
  chosen_spanish: tu hermano
  alternatives_spanish:
  - tu pariente
  - tu hermano de sangre
  lexicon: HALOT
  rationale: Se conserva el sentido literal. En la escena, la frase funciona como la ficción diplomática que los siervos explotan a partir de las palabras de Ahab.
- source_word: בֹּאוּ קָחֻהוּ
  english_pob_choice: Come, take him
  chosen_spanish: Venid, tomadlo
  alternatives_spanish:
  - Id, traedlo
  - Venid, traedlo
  lexicon: HALOT
  rationale: Se conserva la secuencia imperativa directa. «Tomadlo» es breve y natural en español bíblico moderno, y refleja la orden de traer a Ben-hadad ante Ahab.
- source_word: וַיַּעֲלֵהוּ עַל הַמֶּרְכָּבָה
  english_pob_choice: he had him come up into the chariot
  chosen_spanish: lo hizo subir al carro
  alternatives_spanish:
  - lo hizo subir al carro de guerra
  - lo llevó al carro
  - lo subió al carro
  lexicon: HALOT
  rationale: El verbo en hifil es causativo; por eso se traduce con «lo hizo subir». «Carro» comunica bien el vehículo real en español y evita una concreción excesiva sobre su forma. Se mantiene la relación causal sin forzar una imagen de levantamiento físico.
- source_word: הַמֶּרְכָּבָה
  english_pob_choice: the chariot
  chosen_spanish: el carro
  alternatives_spanish:
  - el carruaje
  - el carro de guerra
  lexicon: HALOT
  rationale: Aunque «carro» puede sonar algo más general que «carro de guerra», aquí funciona bien y respeta la forma definida del hebreo sin introducir un posesivo que no está explícito.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB inglés, que prefirió «sign» sobre «omen» y simplificó la segunda mitad de la frase difícil a «took it from him». La versión española mantiene esa línea, pero conserva la tensión léxica del verbo hebreo con una nota explicativa.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; este versículo no lo contiene.
  - Se evita «Mesías/Cristo» porque no aparece ninguna terminología mesiánica aquí.
  - «Carro» se usa de forma coherente con el vehículo real del contexto y con una sintaxis española natural.
  - Se conserva la dificultad del hebreo en la nota, sin resolverla de manera excesivamente interpretativa.
