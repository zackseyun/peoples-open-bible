    text: Or 'cut threads' or 'cut it into strips.' The sense is that the gold was prepared as fine filaments to be woven into the fabric.
    reason: lexical_alternative
  - marker: c
    text: '''The work of a skillful designer'' renders a technical expression for expert artistic workmanship; some render ''the work of a skillful craftsman'' or ''an artistic weaver.'''
    reason: lexical_alternative
