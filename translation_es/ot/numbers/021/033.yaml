translation:
  language: es
  text: Entonces se volvieron y subieron por el camino de Basán[a], y Og, rey de Basán, salió a su encuentro, él y todo su pueblo, para la batalla en Edrei.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a su encuentro»; la expresión hebrea puede ser neutral en sí misma, pero la frase siguiente «para la batalla» muestra un encuentro hostil.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּפְנוּ
  english_pob_choice: they turned
  chosen_spanish: se volvieron
  alternatives_spanish:
  - se desviaron
  - cambiaron de dirección
  lexicon: HALOT
  rationale: El verbo indica un cambio de rumbo en la secuencia narrativa. En español, «se volvieron» conserva bien la idea de giro/dirección sin sonar rígido.
- source_word: וַיַּעֲלוּ
  english_pob_choice: went up
  chosen_spanish: subieron
  alternatives_spanish:
  - ascendieron
  - subieron hacia
  lexicon: HALOT
  rationale: עלה expresa movimiento hacia arriba; «subieron» mantiene la imagen topográfica de forma natural en español.
- source_word: דֶּרֶךְ הַבָּשָׁן
  english_pob_choice: by the way of Bashan
  chosen_spanish: por el camino de Basán
  alternatives_spanish:
  - por la ruta de Basán
  - hacia Basán por el camino
  lexicon: HALOT
  rationale: La construcción דרך + topónimo puede referirse a una ruta asociada con la región. «Por el camino de Basán» es cercano al hebreo y natural en español.
- source_word: עוֹג מֶלֶךְ הַבָּשָׁן
  english_pob_choice: Og king of Bashan
  chosen_spanish: Og, rey de Basán
  alternatives_spanish:
  - Og, el rey de Basán
  lexicon: HALOT
  rationale: Se conserva el nombre propio transliterado y el título en aposición. La coma ayuda a reflejar la estructura del hebreo.
- source_word: וַיֵּצֵא
  english_pob_choice: came out
  chosen_spanish: salió
  alternatives_spanish:
  - salió afuera
  - marchó
  lexicon: HALOT
  rationale: יצא en contexto narrativo y militar describe el acto de salir para un encuentro hostil. «Salió» es idiomático y suficiente.
- source_word: לִקְרָאתָם
  english_pob_choice: to meet them
  chosen_spanish: a su encuentro
  alternatives_spanish:
  - para encontrarse con ellos
  - contra ellos
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente «al encuentro de ellos», y el contexto bélico le da sentido hostil. «A su encuentro» conserva la ambigüedad lexical sin imponer «contra» en el texto principal.
- source_word: הוּא וְכָל עַמּוֹ
  english_pob_choice: he and all his people
  chosen_spanish: él y todo su pueblo
  alternatives_spanish:
  - él y todos sus hombres
  - él y toda su gente
  lexicon: HALOT
  rationale: עַם significa literalmente «pueblo»; aunque el contexto es militar, el hebreo no dice explícitamente «ejército». «Pueblo» preserva esa precisión.
- source_word: לַמִּלְחָמָה
  english_pob_choice: for battle
  chosen_spanish: para la batalla
  alternatives_spanish:
  - para la guerra
  - a pelear
  lexicon: HALOT
  rationale: El sustantivo מלחמה señala combate o guerra. En español, «para la batalla» refleja bien el propósito inmediato del movimiento.
- source_word: אֶדְרֶעִי
  english_pob_choice: at Edrei
  chosen_spanish: en Edrei
  alternatives_spanish:
  - a Edrei
  - junto a Edrei
  lexicon: HALOT
  rationale: El lugar marca la escena de la confrontación. «En Edrei» es la forma más natural en español para situar el combate.
theological_decisions:
- issue: Lectura hostil de לִקְרָאתָם
  english_pob_reading: to meet them; the Hebrew expression can be neutral in itself, but here the following phrase 'for battle' shows a hostile encounter.
  chosen_spanish_reading: a su encuentro; el contexto de «para la batalla» muestra que se trata de un encuentro hostil.
  alternative_spanish_readings:
  - contra ellos
  - para encontrarse con ellos
  rationale: 'No se debe borrar la tensión semántica del hebreo: la expresión base puede ser neutral, pero el contexto la orienta a hostilidad. El español principal mantiene la frase neutra y deja que el contexto haga la determinación, como en el audit trail inglés.'
  doctrine_reference: Ninguna; decisión lexical-contextual.
translation_notes:
  revision_awareness: 'La versión inglesa revisada cambió «against them» por «to meet them» para acercarse más a לִקְרָאתָם sin perder el matiz hostil gracias a «for battle». La versión española sigue esa revisión y conserva la misma estrategia: una expresión de encuentro relativamente neutra, esclarecida por el contexto bélico inmediato.'
  spanish_consistency_notes:
  - Se mantuvo «Basán» como transliteración consistente del topónimo.
  - Se conservó «Og» como nombre propio sin adaptación.
  - «Pueblo» traduce עַם con precisión y evita sobrerinterpretar como «ejército».
  - La nota al pie usa el marcador [a] exactamente una vez en el texto principal.
  - La puntuación española se ajusta a la estructura narrativa sin introducir información ausente del hebreo.
