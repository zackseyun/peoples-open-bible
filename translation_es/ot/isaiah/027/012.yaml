review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido básico del hebreo y del audit trail inglés: fórmula temporal profética, Yahvé, imagen agrícola de חבט, referencia geográfica desde «el Río» hasta el curso de Egipto, recolección individual y vocativo «hijos de Israel». Sin embargo, las notas fueron desalineadas: falta en español la nota del inglés sobre «Wadi/Brook of Egypt», y la nota sobre «hijos de Israel» está anclada erróneamente a «uno por uno».'
  spanish_quality_summary: El español es claro y digno. «Y en aquel día», «Yahvé», «desde el cauce del Río» y «uno por uno» funcionan bien. «Wadi» puede mantenerse por precisión, pero requiere la nota léxica correspondiente. También conviene reordenar las notas para que cada marcador apoye el elemento correcto y no cree confusión.
  glossary_alignment: Se alinea con la terminología del proyecto en «Yahvé» y mantiene adecuadamente «hijos de Israel» como masculino plural. «Trillará» es aceptable para יַחְבֹּט y preserva la metáfora agrícola. «Wadi de Egipto» concuerda con la decisión léxica inglesa, siempre que se conserve su nota alternativa. No hay conflicto doctrinal que requiera adjudicación superior.
  issues:
  - severity: medium
    issue: Falta la nota sobre «Wadi de Egipto / arroyo de Egipto» presente en el audit trail inglés.
    rationale: El inglés conserva una alternativa léxica importante para נחל מצרים, aclarando que no se trata necesariamente del Nilo sino de un curso estacional. El borrador español omite esta información documentada.
  - severity: high
    issue: Los marcadores de notas están mal asignados en «uno por uno[b][c][d]».
    rationale: La nota b actual habla de «hijos de Israel», pero está anclada a «uno por uno». Esto distorsiona la referencia y rompe la trazabilidad entre texto y nota. Cada nota debe anclarse a la palabra o frase pertinente.
  - severity: low
    issue: La nota d actual («O, “uno a uno”») no corresponde a las notas del audit trail inglés y desplaza una nota más importante.
    rationale: El inglés usa d para la alternativa «children of Israel» y c para el matiz de recolección individual. En español, «uno a uno» es una variante menor y no debe reemplazar la nota documentada sobre «Wadi of Egypt» o la de «sons/children of Israel».
  revised_spanish_text: Y en aquel día Yahvé trillará desde el cauce del Río hasta el Wadi de Egipto[a], y ustedes serán reunidos uno por uno[c], oh hijos de Israel[d].
  revised_footnotes:
  - marker: a
    text: O, «el Éufrates»; «el Río» es una designación habitual del Éufrates.
    reason: cross_reference
  - marker: b
    text: O, «arroyo de Egipto». El hebreo se refiere a un wadi o curso estacional, no necesariamente al Nilo.
    reason: lexical_alternative
  - marker: c
    text: El verbo evoca la recolección o espigueo individual después de trillar.
    reason: cultural_note
  - marker: d
    text: O, «hijos de Israel». El hebreo es literalmente «hijos de Israel».
    reason: lexical_alternative
  revision_rationale: Se corrigen los anclajes de notas para que correspondan al elemento correcto del texto y se restaura la nota léxica omitida sobre «Wadi de Egipto». También se conserva la política terminológica del proyecto («Yahvé», «hijos de Israel») sin cambiar el sentido principal del borrador. La nota b se incluye en el arreglo completo de notas revisadas por fidelidad al audit trail, aunque este verso no lleva marcador visible en el texto español revisado porque la alternativa se explica desde el mismo sintagma geográfico ya marcado en [a].
