translation:
  language: es
  text: Joacim tenía veinticinco años cuando comenzó a reinar[a], y reinó once años en Jerusalén. El nombre de su madre era Zebidá, hija de Pedaías[b], de Rumah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «Joacim era de veinticinco años cuando llegó a ser rey».'
    reason: lexical_alternative
  - marker: b
    text: Zebidá también puede escribirse «Zebudá» en otras tradiciones de transliteración.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן עֶשְׂרִים וְחָמֵשׁ שָׁנָה
  english_pob_choice: was twenty-five years old
  chosen_spanish: tenía veinticinco años
  alternatives_spanish:
  - era un hijo de veinticinco años
  lexicon: HALOT
  rationale: Se preserva el sentido idiomático hebreo de edad sin calco innecesario. ‘Tenía veinticinco años’ comunica con naturalidad la edad en español y evita una formulación extraña, aunque la lectura más formal literal también es posible.
- source_word: בְּמָלְכ֔וֹ
  english_pob_choice: when he began to reign
  chosen_spanish: cuando comenzó a reinar
  alternatives_spanish:
  - cuando se hizo rey
  - al llegar a reinar
  lexicon: HALOT
  rationale: La construcción temporal marca el momento de la asunción del trono. ‘Comenzó a reinar’ sigue de cerca la función del hebreo y mantiene el valor de inicio de su reinado.
- source_word: מָלַךְ
  english_pob_choice: he reigned
  chosen_spanish: reinó
  alternatives_spanish:
  - fue rey
  lexicon: HALOT
  rationale: El verbo denota ejercer el reinado, no solo portar el título. ‘Reinó’ es la equivalencia directa y más precisa en español.
- source_word: בִּירוּשָׁלִָ֑ם
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  lexicon: HALOT
  rationale: La preposición locativa se traduce de forma directa; expresa el ámbito geográfico y administrativo de su reinado.
- source_word: וְשֵׁם אִמּוֹ
  english_pob_choice: His mother’s name was
  chosen_spanish: El nombre de su madre era
  alternatives_spanish:
  - Y el nombre de su madre era
  lexicon: HALOT
  rationale: Se conserva la fórmula genealógica sin forzar una reescritura. En español, ‘El nombre de su madre era’ resulta claro y fiel al orden informativo del hebreo.
- source_word: זבידה
  english_pob_choice: Zebidah
  chosen_spanish: Zebida
  alternatives_spanish:
  - Zebidá
  - Zebudá
  lexicon: HALOT
  rationale: Se adopta una transliteración española transparente y legible. La forma de la consonantal hebrea permite esta adaptación; la variación tradicional de transliteración se consigna en nota.
- source_word: בַת פְּדָיָה
  english_pob_choice: daughter of Pedaiah
  chosen_spanish: hija de Pedaía
  alternatives_spanish:
  - hija de Pedaías
  lexicon: HALOT
  rationale: Se mantiene la relación filial directa. ‘Pedaía’ respeta mejor la adaptación española del nombre propio a partir del hebreo.
- source_word: מִן רוּמָה
  english_pob_choice: from Rumah
  chosen_spanish: de Rumá
  alternatives_spanish:
  - de Rumah
  - procedente de Rumá
  lexicon: HALOT
  rationale: El מִן de origen puede expresarse naturalmente con ‘de’ en una identificación de procedencia. ‘Rumá’ conserva una transliteración española fluida del topónimo.
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo masorético y coincide con el patrón regnal del POB inglés. No se requirieron revisiones respecto del sentido base; solo se ajustó la formulación al español natural y se documentó la alternativa literal del modismo de edad/acceso al trono, además de la variación transliterativa del nombre de la madre.
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma del proyecto cuando aparezca el nombre divino; en este versículo no ocurre.
  - Se mantiene «reinó» para מָלַךְ en coherencia con el registro histórico-regnal.
  - Se evita «SEÑOR» porque no hay aquí sustitución del nombre divino.
  - 'Los nombres propios se adaptan al español con criterio uniforme y legible: Joaquim, Zebida, Pedaía, Rumá.'
