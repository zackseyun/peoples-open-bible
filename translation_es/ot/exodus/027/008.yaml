translation:
  language: es
  text: Lo harás hueco por dentro[a], con tablas; como te fue mostrado en el monte, así lo harán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ahuecado con tablas». El hebreo describe el altar como una estructura hueca construida con tablas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נְבוּב
  english_pob_choice: hollow
  chosen_spanish: hueco
  alternatives_spanish:
  - hueco por dentro
  - ahuecado
  - vacío por dentro
  lexicon: HALOT
  rationale: El hebreo describe la estructura como vacía o hueca, no sólida. ‘Hueco’ es natural en español y conserva la idea de construcción no maciza.
- source_word: לֻחֹת
  english_pob_choice: with boards
  chosen_spanish: con tablas
  alternatives_spanish:
  - con planchas
  - de tablas
  - con tablones
  lexicon: HALOT
  rationale: El sustantivo plural apunta a tablas o tablones como material de construcción. ‘Con tablas’ comunica bien el sentido estructural sin sonar arcaico.
- source_word: תַּעֲשֶׂה אֹתוֹ
  english_pob_choice: you shall make it
  chosen_spanish: lo harás
  alternatives_spanish:
  - lo harás tú
  - harás eso
  - lo construirás
  lexicon: HALOT
  rationale: Mantiene la fuerza directiva de segunda persona masculina singular. ‘Harás’ es sobrio y fluido; el complemento ‘lo’ conserva la referencia al objeto ordenado.
- source_word: כַּאֲשֶׁר
  english_pob_choice: as
  chosen_spanish: como
  alternatives_spanish:
  - tal como
  - así como
  - según como
  lexicon: HALOT
  rationale: ‘Como’ reproduce de forma natural la comparación normativa del texto sin añadir énfasis interpretativo extra.
- source_word: הֶרְאָה אֹתְךָ
  english_pob_choice: it was shown to you
  chosen_spanish: te fue mostrado
  alternatives_spanish:
  - te mostraron
  - te mostró
  - se te mostró
  lexicon: HALOT
  rationale: 'El hebreo es pasivo: no dice simplemente ‘él te mostró’, sino que algo fue mostrado a Moisés. ‘Te fue mostrado’ conserva ese matiz y deja implícito el agente, como en el original.'
- source_word: בָּהָר
  english_pob_choice: on the mountain
  chosen_spanish: en el monte
  alternatives_spanish:
  - en la montaña
  - sobre el monte
  lexicon: HALOT
  rationale: ‘Monte’ es la forma bíblica más natural en español para el lugar de la revelación; ‘en el monte’ evita una adaptación demasiado moderna y mantiene el registro bíblico.
- source_word: כֵּן יַעֲשׂוּ
  english_pob_choice: so shall they make it
  chosen_spanish: así lo harán
  alternatives_spanish:
  - así lo harán ellos
  - de ese modo lo harán
  - así lo construirán
  lexicon: HALOT
  rationale: 'Conserva la relación resultado-patrón: según lo mostrado, así deben hacerlo quienes ejecutan la obra. ‘Así lo harán’ suena natural en español y mantiene el mandato plural.'
translation_notes:
  revision_awareness: El texto inglés auditado mantiene una traducción breve de נְבוּב (‘hollow’) y añade una nota que aclara la idea constructiva de una estructura hueca hecha con tablas. La versión española sigue esa decisión, pero ajusta ‘with boards’ a ‘con tablas’ para sonar natural en español y preservar el sentido material de לֻחֹת. También conserva el pasivo de הֶרְאָה con ‘te fue mostrado’, sin convertirlo en un activo que borre la forma verbal del hebreo.
  spanish_consistency_notes:
  - Se evita ‘SEÑOR’ y no aplica aquí ninguna sustitución para el nombre divino.
  - Se evita ‘Cristo/Mesías’ porque no aparece en el versículo.
  - ‘Monte’ se mantiene como término bíblico estándar para בָּהָר.
  - La nota al pie marca la alternativa lexical principal sin introducir expansión doctrinal.
