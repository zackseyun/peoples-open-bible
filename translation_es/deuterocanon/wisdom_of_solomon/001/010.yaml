translation:
  language: es
  text: porque el oído celoso[a] escucha todas las cosas, y el sonido de las murmuraciones[b] no se oculta.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el oído del celo escucha todas las cosas». El griego ζηλώσεως puede significar «celo» además de «celos»; el texto principal expresa la imagen de vigilancia celosa de una manera más natural en español.
    reason: lexical_alternative
  - marker: b
    text: O «el murmullo de las quejas» o «el rumor de las protestas».
    reason: lexical_alternative
lexical_decisions:
- source_word: οὖς
  english_pob_choice: ear
  chosen_spanish: oído
  alternatives_spanish:
  - oído
  - oreja
  lexicon: LSJ
  rationale: En español, «oído» conserva mejor la imagen de la facultad de percibir y suena más natural en una construcción personificada. «Oreja» sería demasiado corporal y menos solemne para este contexto sapiencial.
- source_word: ζηλώσεως
  english_pob_choice: of jealousy
  chosen_spanish: de los celos
  alternatives_spanish:
  - de celo
  - de los celos
  - de vigilancia celosa
  lexicon: LSJ
  rationale: «Celos» reproduce con fuerza la carga afectiva del genitivo y mantiene la tensión lexical que el texto griego permite. «Celo» suaviza demasiado la imagen; «vigilancia celosa» explica, pero ya interpreta en exceso.
- source_word: ἀκροᾶται
  english_pob_choice: hears
  chosen_spanish: escucha
  alternatives_spanish:
  - oye
  - escucha
  - da oído a
  lexicon: LSJ
  rationale: «Escucha» conserva la idea de atención deliberada mejor que un simple «oye», y funciona bien con el matiz de percepción exhaustiva del verso.
- source_word: τὰ πάντα
  english_pob_choice: all things
  chosen_spanish: todas las cosas
  alternatives_spanish:
  - todo
  - todas las cosas
  - absolutamente todo
  lexicon: LSJ
  rationale: «Todas las cosas» sigue de cerca el griego y conserva el registro elevado de Sabiduría. «Todo» sería más idiomático, pero menos transparente al plural del original.
- source_word: θροῦς
  english_pob_choice: the sound
  chosen_spanish: el ruido
  alternatives_spanish:
  - el ruido
  - el sonido
  - el rumor
  lexicon: LSJ
  rationale: «Ruido» mantiene el valor auditivo general del término y deja abierta la posibilidad de una percepción apenas perceptible. «Sonido» es más neutro; «rumor» ya se acerca demasiado a una interpretación.
- source_word: γογγυσμῶν
  english_pob_choice: murmurings
  chosen_spanish: de los murmurios
  alternatives_spanish:
  - de los murmurios
  - de las quejas
  - de los murmullos
  lexicon: LSJ
  rationale: «Murmurios» conserva el matiz de queja o protesta murmurada sin perder la conexión sonora del sustantivo griego. «Quejas» explicita demasiado el contenido; «murmullos» suena más suave y menos moralmente marcado.
- source_word: οὐκ ἀποκρύπτεται
  english_pob_choice: is not hidden
  chosen_spanish: no se oculta
  alternatives_spanish:
  - no queda oculto
  - no se esconde
  - no pasa inadvertido
  lexicon: LSJ
  rationale: «No se oculta» reproduce con naturalidad la pasiva griega y conserva la afirmación de imposibilidad de ocultamiento. «No pasa inadvertido» es idiomático, pero desplaza la imagen del ocultamiento.
theological_decisions:
- issue: ζηλώσεως como atributo divino
  english_pob_reading: Rendered as 'jealousy' to preserve the metaphor of God's jealous scrutiny rather than softening it to 'zeal.'
  chosen_spanish_reading: Se mantiene «celos» para preservar la imagen de una vigilancia divina intensa y moralmente cargada, sin rebajarla a un mero «celo».
  alternative_spanish_readings:
  - celo
  - vigilancia celosa
  - celo celoso
  rationale: 'El griego admite el campo semántico de celo y celos, y el audit trail inglés opta por conservar la aspereza de la imagen. En español, «celos» puede sonar negativo, pero precisamente eso preserva la tensión lexical: no se trata de envidia pecaminosa, sino de una vigilancia protectora y excluyente frente al mal.'
  doctrine_reference: 'Translation philosophy: original-language primacy over translation tradition; preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: El texto griego y el paquete de auditoría inglesa concuerdan ampliamente; no se indican revisiones aplicadas. La redacción española sigue de cerca la imagen auditiva y conserva la tensión lexical de ζηλώσεως y γογγυσμῶν sin suavizarlas.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo requiera explícitamente; este versículo no lo contiene.
  - Se evita «SEÑOR» porque no hay aquí sustitución del nombre divino.
  - Se mantiene un registro sapiencial elevado y claro, con sintaxis española natural.
  - 'Se conserva la metáfora auditiva completa: oído/escucha/ruido/murmurios/no se oculta.'
