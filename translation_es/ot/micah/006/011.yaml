translation:
  language: es
  text: ¿Absolveré a uno con balanzas injustas y con una bolsa de pesas fraudulentas?[a][b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Seré puro con balanzas injustas y con una bolsa de pesas falsas?» El verbo hebreo puede entenderse como «ser puro» o «ser absuelto/considerado inocente»; el contexto favorece el sentido forense.'
    reason: alternative_reading
  - marker: b
    text: 'Lit.: «piedras de engaño», es decir, pesas de piedra usadas en el comercio.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַ/אֶזְכֶּ֖ה
  english_pob_choice: Shall I acquit
  chosen_spanish: ¿Acogeré...
  alternatives_spanish:
  - ¿Absolveré...
  - ¿Declararé inocente...
  - ¿Lo tendré por puro...
  lexicon: HALOT
  rationale: El verbo hebreo permite una lectura forense de absolver o declarar inocente; en español, "acogeré" no sería adecuado, por lo que la forma correcta aquí es expresar la pregunta legal con "absolveré" o "declararé inocente". Se evita "seré puro" porque traslada indebidamente la acción al sujeto divino en vez de al acto judicial.
- source_word: בְּ/מֹאזְנֵי
  english_pob_choice: with ... scales
  chosen_spanish: balanzas
  alternatives_spanish:
  - con balanzas
  - con básculas
  - con pesos
  lexicon: HALOT
  rationale: מֹאזְנַיִם refiere al instrumento de pesar en el comercio. "Balanzas" es natural y preciso en español; mantiene el campo comercial sin sonar técnico en exceso.
- source_word: רֶשַׁע
  english_pob_choice: wicked
  chosen_spanish: injustas
  alternatives_spanish:
  - malvadas
  - impías
  - malas
  lexicon: HALOT
  rationale: Como atributo de balanzas, el término describe fraude y falta de rectitud en el comercio. "Injustas" preserva la carga moral/legal del contexto en español mejor que una adjetivación meramente general como "malvadas".
- source_word: וּ/בְ/כִיס
  english_pob_choice: and with a bag
  chosen_spanish: y con una bolsa
  alternatives_spanish:
  - y con un saco
  - y con una bolsa/puchero
  lexicon: HALOT
  rationale: כִּיס puede ser bolsa o bolsa/purse. "Bolsa" es la opción más clara y idiomática en español, sin perder la imagen del contenedor del mercader.
- source_word: אַבְנֵי
  english_pob_choice: weights
  chosen_spanish: pesas
  alternatives_spanish:
  - piedras
  - pesas de peso
  - pesos
  lexicon: HALOT
  rationale: 'Aunque literalmente significa "piedras", el contexto comercial exige el valor funcional: piezas de peso usadas en la balanza. "Pesas" comunica directamente el referente al lector español.'
- source_word: מִרְמָה
  english_pob_choice: deceptive
  chosen_spanish: fraudulentas
  alternatives_spanish:
  - falsas
  - engañosas
  - de engaño
  lexicon: HALOT
  rationale: El sustantivo expresa fraude, engaño o treta. "Fraudulentas" conserva la fuerza ética y jurídica del término mejor que "falsas", que en español puede sonar más genérico.
theological_decisions:
- issue: Force legal/forense de la pregunta retórica
  english_pob_reading: The speaker is God, asking whether he can declare innocent a person who uses dishonest measures.
  chosen_spanish_reading: Dios pregunta si puede absolver a quien usa medidas deshonestas.
  alternative_spanish_readings:
  - ¿Puedo ser puro con...
  - ¿Puedo tolerar a quien...
  rationale: En el marco del pleito de pacto de Miqueas 6, la pregunta no es sobre pureza moral subjetiva sino sobre sentencia judicial. "Absolver" mantiene la tensión forense señalada en el audit trail inglés y evita suavizar el juicio divino.
  doctrine_reference: Justicia divina y juicio forense en el pleito de pacto (Mic. 6).
translation_notes:
  revision_awareness: 'El texto inglés POB mantiene una lectura forense de הַאֶזְכֶּה y una nota léxica sobre «stones of deceit». Esta versión española conserva ambas tensiones: traduce la pregunta con valor judicial y deja en nota la alternativa de «ser puro», además de explicar que las «pesas» son las «piedras» comerciales del hebreo.'
  spanish_consistency_notes:
  - Se evita «SEÑOR» o perífrasis reverenciales porque el versículo aquí presenta una pregunta judicial en primera persona divina.
  - Se usa un registro formal pero natural, con términos jurídicos y comerciales claros para lectores de Biblia en español.
  - Se conserva la diferencia entre la lectura funcional («pesas») y la literal («piedras») mediante nota, sin perder la inteligibilidad del verso.
