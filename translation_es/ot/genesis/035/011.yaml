    text: Literalmente, «de tus lomos», un modismo para descendientes físicos de su propio cuerpo.
    reason: cultural_note
  revision_rationale: Se elimina una nota no sustentada por la evidencia, se restauran las notas léxica y cultural que sí están documentadas, y se mejora la naturalidad del español con «Sé fecundo» y «De ti saldrán» sin alterar el sentido fuente.
