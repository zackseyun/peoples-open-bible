review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido del hebreo: presencia en el lugar, identificación de los tres hijos de Zeruía, y la comparación de la rapidez de Asael con una gacela del campo. Sin embargo, la nota y la forma principal del nombre de la madre no siguen bien la orientación del English POB ni la evidencia fuente, que usa Zeruiah; en español conviene preferir una transliteración más cercana al nombre fuente.'
  spanish_quality_summary: El texto es claro, natural y de buen nivel bíblico en español. 'Ahora estaban allí' y 'ligero de pies' suenan bien y preservan el sentido. La única reparación necesaria es normalizar 'Sarvia' a 'Zeruía' en el texto principal y eliminar la nota innecesaria, ya que la forma principal actual introduce una preferencia tradicional no respaldada por el expediente auditado.
  glossary_alignment: No hay términos teológicos sensibles en este versículo. Los nombres propios están bien en general, pero 'Sarvia' se aparta del expediente fuente-inglés ('Zeruiah') sin necesidad contextual. 'Gacelas' concuerda con la decisión léxica documentada para צְבִי.
  issues:
  - severity: medium
    issue: Uso de 'Sarvia' en lugar de 'Zeruía' en el texto principal
    rationale: El hebreo tiene צְרוּיָה y el English POB usa 'Zeruiah'. Aunque 'Sarvia' tiene tradición en español, aquí el proyecto pide trabajar desde la evidencia fuente y la justificación auditada, no privilegiar una forma tradicional sin necesidad. 'Zeruía' preserva mejor la correspondencia con la fuente.
  - severity: low
    issue: Nota al pie innecesaria sobre 'Sarvia'/'Zeruía'
    rationale: La nota introduce una alternativa creada por preferencia tradicional española, no por una ambigüedad del original ni por una alternativa preservada por el English POB. Esto no añade claridad textual y complica innecesariamente el verso.
  revised_spanish_text: 'Ahora estaban allí los tres hijos de Zeruía: Joab, Abisai y Asael. Y Asael era ligero de pies, como una de las gacelas que están en el campo.'
  revision_rationale: Se sustituye 'Sarvia' por 'Zeruía' para ajustarse mejor al nombre fuente צְרוּיָה y al expediente auditado en inglés ('Zeruiah'). Se elimina la nota porque no responde a una ambigüedad léxica del original ni a una alternativa que deba preservarse en esta unidad. El resto del texto es fiel, claro y natural en español.
