translation:
  language: es
  text: Y Yahvé habló a Moisés[a], diciendo,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «YHWH»; tradicionalmente se traduce «el SEÑOR».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְדַבֵּר
  english_pob_choice: spoke
  chosen_spanish: habló
  alternatives_spanish:
  - dijo
  lexicon: HALOT
  rationale: El verbo hebreo דִּבֵּר introduce una fórmula narrativa estándar de comunicación divina. En español, 'habló' conserva ese valor de acto de hablar como introducción a discurso directo y resulta más natural que un calco más rígido.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino propio del texto hebreo con la forma española 'Yahvé', conforme al criterio del proyecto. Se evita sustituirlo por un título como 'SEÑOR', y 'Jehová' queda como forma tradicional menos preferida en este proyecto.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  lexicon: HALOT
  rationale: La preposición marca el destinatario del habla. En español, 'a' expresa de manera natural la relación indirecta sin introducir un matiz direccional innecesario.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  lexicon: HALOT
  rationale: Nombre propio bíblico en su forma española estándar y ampliamente reconocible.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  lexicon: HALOT
  rationale: El infinitivo constructo funciona como fórmula introductoria del discurso directo. 'Diciendo' preserva mejor la estructura hebrea que una expansión como 'y dijo'.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto usa directamente el Tetragrámaton, por lo que la traducción española conserva el nombre propio divino. 'Yahvé' mantiene la decisión teológica y textual de no enmascarar el nombre con una sustitución titular.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: 'El testimonio inglés no requiere cambios textuales adicionales: mantiene la fórmula narrativa breve y la decisión de nombrar a YHWH por su nombre propio. La versión española sigue esa misma línea, con ajuste natural de la sintaxis para lectura pública.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' de forma consistente con el criterio del proyecto para יְהוָה.
  - '''Moisés'' y la fórmula ''habló ... diciendo'' conservan el tono bíblico sin caer en arcaísmo innecesario.'
  - La nota al pie explica la alternativa tradicional 'el SEÑOR' sin adoptarla en el texto principal.
