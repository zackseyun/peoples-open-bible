id: T12P.GAD.4.1
reference: Testament of Gad 4:1
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 232-243, Gad pilot)
  text: IV. Φυλάξασθε οὖν, τέκνα μου¹, ἀπὸ τοῦ μίσους, ὅτι Γκαὶ² εἰς³ αὐτὸν τὸν Κύριον ἀνομίαν⁴ ποιεῖ.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/gad/004/001.yaml
  text: Therefore guard yourselves, my children, from hatred, because it even commits lawlessness against the Lord himself.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:55Z'
    unchanged: false
    changes_summary: Removed the footnote marker and adjusted the wording slightly for smoother English while preserving the source meaning.
translation:
  language: es
  text: Por tanto, guardaos[a], hijos míos, del odio, porque incluso comete iniquidad contra el Señor mismo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit. 'guardaos a vosotros mismos'; voz media griega Φυλάξασθε.
    reason: lexical_alternative
  - marker: b
    text: El énfasis αὐτὸν τὸν Κύριον subraya que el odio no solo daña al prójimo, sino que ofende directamente al Señor.
    reason: theological_note
lexical_decisions:
- source_word: Φυλάξασθε
  english_pob_choice: guard yourselves
  chosen_spanish: guardaos
  alternatives_spanish:
  - protegéos
  - cuidaos
  lexicon: BDAG
  rationale: '''Guardaos'' es la fórmula bíblica tradicional en español para Φυλάσσεσθε en advertencias éticas.'
- source_word: τέκνα μου
  english_pob_choice: my children
  chosen_spanish: hijos míos
  alternatives_spanish:
  - mis hijos
  lexicon: LSJ
  rationale: Aquí el griego sí lleva el posesivo μου, así que se traduce 'hijos míos' (a diferencia del cap. 3:1 donde es solo τέκνα).
- source_word: μίσους
  english_pob_choice: hatred
  chosen_spanish: odio
  alternatives_spanish:
  - aborrecimiento
  lexicon: BDAG
  rationale: '''Odio'' es el equivalente directo y consistente para μῖσος en este Testamento.'
- source_word: ἀνομίαν ποιεῖ
  english_pob_choice: commits lawlessness
  chosen_spanish: comete iniquidad
  alternatives_spanish:
  - obra contra la ley
  - obra ilegalidad
  lexicon: BDAG
  rationale: '''Cometer iniquidad'' conserva el peso jurídico-moral de ἀνομία, en línea con cap. 2.'
- source_word: Γκαὶ εἰς αὐτὸν τὸν Κύριον
  english_pob_choice: even against the Lord himself
  chosen_spanish: incluso ... contra el Señor mismo
  alternatives_spanish:
  - aun contra el Señor mismo
  lexicon: BDAG
  rationale: '''Incluso'' captura la fuerza intensiva de καὶ, y ''el Señor mismo'' refleja αὐτὸν τὸν Κύριον con el reflexivo enfático.'
translation_notes:
  revision_awareness: El revision_pass de gpt-5.4-mini eliminó un marcador de pie de página y reordenó 'commits lawlessness even against the Lord himself' a 'even commits lawlessness against the Lord himself' para fluidez. En español la sintaxis natural ya integra 'incluso comete iniquidad contra el Señor mismo' sin marcador adicional.
  spanish_consistency_notes:
  - '''hijos míos'' cuando el griego incluye μου, frente a ''hijos'' (sin posesivo) cuando solo aparece τέκνα.'
  - '''iniquidad'' para ἀνομία (consistente con caps. 2 y 4).'
  - '''el Señor'' para Κύριος en mayúscula.'
