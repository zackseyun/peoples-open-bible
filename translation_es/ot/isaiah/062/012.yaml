translation:
  language: es
  text: Y les llamarán[a] «Pueblo santo, los redimidos de Yahvé»; y a ti se te llamará «Buscada[b], ciudad no desamparada[c]».
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los redimidos de Yahvé» o «los redimidos por Yahvé».
    reason: lexical_alternative
  - marker: b
    text: También puede traducirse «Buscada con afán» o «Indagada».
    reason: lexical_alternative
  - marker: c
    text: O «ciudad no abandonada».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְקָרְאוּ
  english_pob_choice: And they will call
  chosen_spanish: Y les llamarán
  alternatives_spanish:
  - Y ellos llamarán
  - Y se les llamará
  lexicon: HALOT
  rationale: El imperfecto narrativo/profético en español se expresa naturalmente con futuro. La construcción impersonal con 'les' preserva el valor de nombrar a alguien sin forzar un sujeto explícito.
- source_word: לָהֶם
  english_pob_choice: them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  - para ellos
  lexicon: HALOT
  rationale: Con קרא en fórmulas de nombramiento, el complemento indica la persona nombrada; en español, el dativo 'les' refleja mejor esa función que un objeto directo.
- source_word: עַם הַקֹּדֶשׁ
  english_pob_choice: The holy people
  chosen_spanish: Pueblo santo
  alternatives_spanish:
  - el pueblo santo
  - una gente santa
  lexicon: HALOT
  rationale: '''עם'' aquí se entiende como ''pueblo''. En español, ''pueblo santo'' suena más natural como título apposicional; ''santo'' conserva el valor adjetival del hebreo con la idea de consagración.'
- source_word: גְּאוּלֵי יְהוָה
  english_pob_choice: the redeemed of Yahweh
  chosen_spanish: los redimidos de Yahvé
  alternatives_spanish:
  - los redimidos por Yahvé
  - el pueblo redimido de Yahvé
  lexicon: HALOT
  rationale: Se conserva el participio pasivo/resultado con 'redimidos'. La relación constructa con el nombre divino se vierte de manera genitiva natural en español con 'de Yahvé', sin perder la fuerza de pertenencia/redención.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Tetragrámaton: ''Yahvé''. Se evita el ocultamiento mediante ''SEÑOR'' y se preserva el nombre propio del pacto.'
- source_word: יִקָּרֵא
  english_pob_choice: will be called
  chosen_spanish: se te llamará
  alternatives_spanish:
  - serás llamada
  - te nombrarán
  lexicon: HALOT
  rationale: El niphal imperfecto en esta fórmula nominal es pasivo. En español, la pasiva refleja resulta idiomática y mantiene la pasividad del nombramiento.
- source_word: דְרוּשָׁה
  english_pob_choice: Sought Out
  chosen_spanish: Buscada
  alternatives_spanish:
  - Buscada de nuevo
  - Buscada con empeño
  - Buscada y hallada
  lexicon: HALOT
  rationale: '''דרשׁ'' expresa buscar, inquirir, procurar. ''Buscada'' conserva la idea básica de ser objeto de búsqueda sin añadir el matiz interpretativo de ''después'' o ''con empeño'' al texto principal. La mayúscula señaliza el nombre honorífico.'
- source_word: עִיר לֹא נֶעֱזָבָה
  english_pob_choice: a city not forsaken
  chosen_spanish: ciudad no abandonada
  alternatives_spanish:
  - ciudad no dejada
  - ciudad no desamparada
  lexicon: HALOT
  rationale: '''נעזב'' puede rendirse como ''abandonar/abandonado''. En español contemporáneo, ''abandonada'' comunica bien la antítesis de restauración; ''no abandonada'' mantiene el valor negativo del hebreo con claridad.'
- source_word: נֶעֱזָבָה
  english_pob_choice: forsaken
  chosen_spanish: abandonada
  alternatives_spanish:
  - desamparada
  - dejada
  lexicon: HALOT
  rationale: Se eligió 'abandonada' como equivalente idiomático más directo en español, conservando la tensión temática de Isaías sobre la desolación y la restauración.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: La lectura española sigue la decisión del POB de no enmascarar el Tetragrámaton. 'Yahvé' es la forma estándar del proyecto y preserva el nombre del pacto con claridad reverente.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Título nominal para Zion/Jerusalén
  english_pob_reading: Sought Out, a city not forsaken
  chosen_spanish_reading: Buscada, ciudad no abandonada
  alternative_spanish_readings:
  - Buscada, ciudad no desamparada
  - Buscada, una ciudad no abandonada
  rationale: Se conserva el doble nombramiento como título honorífico y su contraste teológico con el abandono previo. 'Abandonada' mantiene la antítesis restauradora sin volver el español arcaico.
  doctrine_reference: Isaías 62:4, 12; tema de restauración de Sion
translation_notes:
  revision_awareness: La revisión más reciente indicó alta concordancia y no requirió cambios; el presente borrador mantiene la misma decisión base, adaptándola al español con equivalencia óptima y conservando las alternativas léxicas relevantes en notas.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יְהוָה, conforme al estándar del proyecto.
  - Se usa 'redimidos' para גְּאוּלֵי, preservando el valor pasivo/resultativo.
  - '''Buscada'' conserva el nombre honorífico y la ambigüedad del verbo דרשׁ sin sobreinterpretación.'
  - '''abandonada'' se prefiere por naturalidad en español, aunque se deja constancia de ''desamparada'' como alternativa.'
  - La pasiva refleja 'se te llamará' respeta el carácter nominal de la fórmula de nombramiento para la destinataria femenina.
