translation:
  language: es
  text: Pero Jesurún engordó y pateó; engordaste, te volviste grueso y lustroso[a]. Entonces abandonó a Dios que lo hizo, y menospreció la Roca de su salvación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O bien: «te cubriste de grasa» o «te volviste abotagado». El término hebreo es raro, y el matiz exacto es incierto, aunque el sentido de exceso bien alimentado es claro.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְשֻׁרוּן
  english_pob_choice: Jeshurun
  chosen_spanish: Jesurún
  alternatives_spanish:
  - el Recto
  - Israel
  lexicon: HALOT
  rationale: Se conserva el nombre/título poético como transliteración, para no interpretar de antemano la función evocativa del apelativo y mantener la referencia tradicional al pueblo de Israel.
- source_word: וַיִּשְׁמַן
  english_pob_choice: grew fat
  chosen_spanish: engordó
  alternatives_spanish:
  - se hizo gordo
  - se volvió gordo
  lexicon: HALOT
  rationale: El verbo expresa literalmente volverse gordo; en este contexto poético conserva la imagen concreta de prosperidad que lleva a la complacencia.
- source_word: וַיִּבְעָט
  english_pob_choice: kicked
  chosen_spanish: pateó
  alternatives_spanish:
  - recalcitró
  - se rebeló
  lexicon: HALOT
  rationale: ‘Pateó’ mantiene la metáfora animal y la violencia del gesto, evitando diluir la imagen en una interpretación abstracta.
- source_word: שָׁמַנְתָּ
  english_pob_choice: you grew fat
  chosen_spanish: engordaste
  alternatives_spanish:
  - te hiciste gordo
  - te volvías gordo
  lexicon: HALOT
  rationale: La segunda persona se conserva para reflejar el cambio retórico del poema hacia la acusación directa.
- source_word: עָבִיתָ
  english_pob_choice: thick
  chosen_spanish: grueso
  alternatives_spanish:
  - espeso
  - corpulento
  lexicon: HALOT
  rationale: ‘Grueso’ preserva la intensificación física de la imagen con un español natural y claro.
- source_word: כָּשִׂיתָ
  english_pob_choice: sleek
  chosen_spanish: lustroso
  alternatives_spanish:
  - reluciente
  - grasoso
  lexicon: HALOT
  rationale: La forma rara parece continuar la imaginería de gordura/embotamiento y probablemente alude a un aspecto ‘engrasado’ o ‘lustroso’; ‘lustroso’ mantiene la idea de brillo por exceso sin imponer una paráfrasis demasiado específica. Se conserva la ambigüedad léxica documentada en la tradición auditada.
- source_word: וַיִּטֹּשׁ
  english_pob_choice: forsook
  chosen_spanish: abandonó
  alternatives_spanish:
  - desamparó
  - dejó
  lexicon: HALOT
  rationale: ‘Abandonó’ transmite la ruptura de lealtad del pacto en un registro claro y sobrio; se evita un arcaísmo innecesario.
- source_word: אֱל֣וֹהַ
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  - la Deidad
  lexicon: HALOT
  rationale: Se traduce con el término usual y reverente ‘Dios’, que en español comunica adecuadamente el referente divino singular.
- source_word: עָשָׂ֔הוּ
  english_pob_choice: who made him
  chosen_spanish: que lo hizo
  alternatives_spanish:
  - que lo creó
  - su Hacedor
  lexicon: HALOT
  rationale: La relativa se mantiene de forma directa; ‘lo hizo’ conserva la relación creativa sin sobrecargar el verso con formulaciones más interpretativas.
- source_word: צ֥וּר
  english_pob_choice: the Rock
  chosen_spanish: la Roca
  alternatives_spanish:
  - la peña
  - la roca
  lexicon: HALOT
  rationale: En Deuteronomio 32, ‘Roca’ funciona como título metafórico de Dios; la mayúscula ayuda a señalar su valor teológico en español.
- source_word: יְשֻׁעָתֽוֹ
  english_pob_choice: his salvation
  chosen_spanish: su salvación
  alternatives_spanish:
  - su liberación
  - su rescate
  lexicon: HALOT
  rationale: ‘Salvación’ conserva el peso teológico del sustantivo y la formulación estable del pasaje.
theological_decisions:
- issue: Cambio retórico de tercera persona a segunda persona y regreso a tercera
  english_pob_reading: 'Preserved the Hebrew poetic shifts: ''Jeshurun grew fat ... you grew fat ... he forsook God.'''
  chosen_spanish_reading: 'Se preserva el cambio: ''Jesurún engordó ... engordaste ... abandonó a Dios.'''
  alternative_spanish_readings:
  - 'Regularizar todo en tercera persona: ''engordó ... se volvió grueso ... abandonó a Dios'''
  rationale: El hebreo usa el cambio de persona como recurso de acusación poética; mantenerlo en español evita suavizar una tensión significativa del texto.
  doctrine_reference: Criterios de fidelidad poética y auditabilidad textual del proyecto
- issue: Metáfora divina צוּר
  english_pob_reading: '''the Rock'' capitalized as a divine title/metaphor'
  chosen_spanish_reading: ‘la Roca’ como título metafórico divino
  alternative_spanish_readings:
  - ‘la roca de su salvación’ en minúscula
  - ‘la Peña’
  rationale: La metáfora es teológicamente cargada en el Cántico de Moisés; ‘Roca’ con mayúscula ayuda a reconocer la designación de Dios sin perder la imagen original.
  doctrine_reference: Deuteronomio 32 y teología bíblica del título 'Roca'
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente del inglés POB: se prefirió una solución española que conserve la ambigüedad de כָּשִׂיתָ sin imponer un significado cerrado, y se mantuvo el registro formal para el cierre del verso.'
  spanish_consistency_notes:
  - Se emplea ‘Jesurún’ como transliteración estable del nombre poético.
  - ‘Roca’ se capitaliza cuando funciona como título divino, siguiendo la fuerza metafórica del contexto.
  - Se mantiene el cambio de persona del hebreo para respetar la retórica del pasaje.
  - ‘Salvación’ se conserva por su peso teológico y por coherencia con la tradición auditada del versículo.
