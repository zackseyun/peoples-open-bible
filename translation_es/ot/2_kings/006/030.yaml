  verdict: revise
  source_alignment_summary: El borrador sigue bien el hebreo y la auditoría inglesa en la secuencia narrativa, el gesto de duelo, la referencia al cilicio y la nota sobre מִבָּיִת. Sin embargo, la clausula final en español queda poco natural y algo ambigua por la colocación de «debajo» después de «sobre su cuerpo», y el anclaje de la nota conviene moverlo al adverbio que traduce מִבָּיִת.
  spanish_quality_summary: 'El texto es generalmente claro y de registro bíblico digno. «Rasgó sus vestidos» y «el cilicio» funcionan bien. La principal mejora necesaria es de fluidez idiomática: «estaba sobre su cuerpo debajo» suena forzado en español; «llevaba cilicio sobre su cuerpo, por debajo[a]» o «tenía el cilicio sobre su cuerpo por debajo[a]» expresa mejor el sentido. También «y he aquí que» puede simplificarse a «y vio que» o mantenerse; aquí se conserva para reflejar הִנֵּה.'
  glossary_alignment: No hay conflictos con la terminología del proyecto. No aparecen Yahvé/Mesías ni otros términos sensibles. «Cilicio» es una elección léxica apropiada y tradicional para הַשַּׂק.
  issues:
  - severity: medium
    issue: La frase «el cilicio estaba sobre su cuerpo[a] debajo» es poco idiomática en español.
    rationale: 'Aunque cada elemento refleja el hebreo, la sintaxis resultante suena antinatural y puede confundir. El sentido de מִבָּיִת es adverbial/circunstancial: el cilicio estaba debajo de la ropa exterior, no simplemente «debajo» del cuerpo.'
  - severity: low
    issue: El marcador de nota está anclado en «cuerpo» en vez de en la expresión que traduce מִבָּיִת.
    rationale: La nota explica el literal «de dentro/por dentro», por lo que el anclaje más preciso debe recaer sobre «por debajo» o equivalente, no sobre «cuerpo».
  revised_spanish_text: Y sucedió que, cuando el rey oyó las palabras de la mujer, rasgó sus vestidos mientras pasaba sobre la muralla, y el pueblo vio, y he aquí que llevaba cilicio sobre su cuerpo, por debajo[a].
  revised_footnotes:
  - marker: a
    text: 'Hebreo literalmente: «de dentro»; indica que el cilicio estaba puesto debajo de la ropa exterior.'
    reason: lexical_alternative
  revision_rationale: Se ajustó la clausula final para que el español exprese con naturalidad que el cilicio estaba debajo de la ropa exterior, preservando a la vez «sobre su cuerpo». Se movió el marcador de nota al segmento que traduce מִבָּיִת, que es el punto explicado por la nota. El resto del versículo se mantiene por ser fiel al hebreo y adecuado en español.
