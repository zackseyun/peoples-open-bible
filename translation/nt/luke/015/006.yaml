theological_decisions:
- issue: Parabolic imagery of recovery
  chosen_reading: Retain the concrete image 'my sheep that was lost' without importing interpretive language about sinners or salvation into the verse itself.
  alternative_readings:
  - my lost sheep
  rationale: The immediate verse is part of a parable whose interpretation comes in the surrounding context. The translation should preserve the image plainly and not collapse it into theological explanation within the verse. 'My sheep that was lost' is slightly fuller than 'my lost sheep' and reflects the Greek article + participle construction.
  doctrine_reference: Translation philosophy §§1, 3, 6
