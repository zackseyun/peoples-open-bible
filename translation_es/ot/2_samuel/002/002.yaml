translation:
  language: es
  text: 'David subió allí[a], y también sus dos esposas: Ahinoam la jezreelita y Abigail, la esposa de Nabal de Carmel.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O bien: «Abigail, la esposa de Nabal, la mujer de Carmel». El hebreo identifica a Abigail por su matrimonio anterior y a Nabal por su procedencia de Carmel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַל
  english_pob_choice: went up
  chosen_spanish: subió
  alternatives_spanish:
  - fue
  - ascendió
  lexicon: HALOT
  rationale: עלה en contexto narrativo de desplazamiento se expresa de manera natural con «subió». Conserva la dirección ascendente sin sonar tan abstracto como «ascendió».
- source_word: שָׁם
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  - allá
  lexicon: HALOT
  rationale: El adverbio de lugar se refiere al destino ya mencionado; «allí» mantiene la referencia espacial de forma clara y sobria.
- source_word: וְגַם
  english_pob_choice: and also
  chosen_spanish: y también
  alternatives_spanish:
  - también
  - y
  lexicon: HALOT
  rationale: La suma de la acción de David con la de sus esposas queda bien reflejada con «y también», sin perder el valor aditivo.
- source_word: שְׁתֵּי נָשָׁיו
  english_pob_choice: his two wives
  chosen_spanish: sus dos esposas
  alternatives_spanish:
  - las dos esposas de él
  - las dos mujeres
  lexicon: HALOT
  rationale: נָשִׁים aquí denota esposas; «esposas» preserva la relación matrimonial explícita. «Sus dos» sigue el valor posesivo del hebreo.
- source_word: אֲחִינֹעַם הַיִּזְרְעֵלִית
  english_pob_choice: Ahinoam the Jezreelite
  chosen_spanish: Ahinoam la jezreelita
  alternatives_spanish:
  - Ahinoam de Jezreel
  - Ahinoam, la mujer de Jezreel
  lexicon: HALOT
  rationale: El gentilicio femenino se traduce con el equivalente español «jezreelita», que conserva la identificación por origen y la forma concisa del hebreo.
- source_word: וַאֲבִיגַיִל
  english_pob_choice: and Abigail
  chosen_spanish: y Abigail
  alternatives_spanish:
  - e Abigail
  lexicon: HALOT
  rationale: La conjunción coordinante simple reproduce el paralelo del hebreo sin añadir matiz.
- source_word: אֵשֶׁת נָבָל
  english_pob_choice: the wife of Nabal
  chosen_spanish: la esposa de Nabal
  alternatives_spanish:
  - la mujer de Nabal
  - la mujer que fue esposa de Nabal
  lexicon: HALOT
  rationale: La construcción de estado constructo se expresa de forma natural con «la esposa de Nabal». Aunque Abigail ya es esposa de David en la narrativa, el hebreo la identifica por su vínculo anterior.
- source_word: הַכַּרְמְלִי
  english_pob_choice: the Carmelite
  chosen_spanish: el carmelita
  alternatives_spanish:
  - el de Carmel
  - el hombre de Carmel
  lexicon: HALOT
  rationale: El gentilicio masculino se vierte con «carmelita», equivalente directo y comprensible en español bíblico.
theological_decisions:
- issue: Identificación de Abigail por su matrimonio anterior, no por su estado actual en la trama
  english_pob_reading: The Hebrew identifies Abigail by her former marriage and Nabal by his origin from Carmel.
  chosen_spanish_reading: El hebreo identifica a Abigail por su matrimonio anterior y a Nabal por su procedencia de Carmel.
  alternative_spanish_readings:
  - Abigail, la esposa de Nabal, la mujer de Carmel
  - Abigail, antes esposa de Nabal, la mujer de Carmel
  rationale: 'No se suaviza la tensión narrativa: el texto conserva una designación retrospectiva de Abigail. La nota explica que el hebreo la caracteriza por su relación previa con Nabal y a Nabal por su origen, sin resolverlo por paráfrasis.'
  doctrine_reference: 2 Samuel 2:2; observación literaria sobre identificación gentilicia y marital
translation_notes:
  revision_awareness: Se siguió el estado de revisión más reciente sin cambios sustantivos; el alineamiento con el audit trail inglés es alto, y la única tensión relevante es la identificación de Abigail por su vínculo anterior con Nabal, conservada y explicada en nota.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto solo cuando el texto lo exija; este versículo no contiene el nombre divino.
  - 'Se usaron gentilicios españoles transparentes: «jezreelita» y «carmelita».'
  - Se preservó la relación constructa de Abigail con Nabal en vez de normalizarla a una formulación más explícita que borraría la ambigüedad del hebreo.
