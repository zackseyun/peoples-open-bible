translation:
  language: es
  text: a causa de las muchas prostituciones de la prostituta[a], hermosa y encantadora, señora de hechicerías, la que vende naciones por medio de sus prostituciones y clanes[b] por medio de sus hechicerías.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «bien favorecida» o «graciosa». La expresión hebrea describe un atractivo seductor.
    reason: lexical_alternative
  - marker: b
    text: O «familias». El término hebreo puede denotar grupos familiares extensos o clanes.
    reason: lexical_alternative
lexical_decisions:
- source_word: מֵרֹב
  english_pob_choice: because of the many
  chosen_spanish: a causa de las muchas
  alternatives_spanish:
  - por la abundancia de
  - debido a la gran cantidad de
  lexicon: HALOT
  rationale: La preposición מִן con רֹב expresa causalidad o fundamento; en español, «a causa de las muchas» conserva la relación causal y la fuerza cuantitativa sin sonar rígido.
- source_word: זְנוּנֵי / זוֹנָה
  english_pob_choice: prostitutions of the prostitute
  chosen_spanish: prostituciones de la prostituta
  alternatives_spanish:
  - fornicaciones de la ramera
  - actos de prostitución de la prostituta
  - harlotries de la ramera
  lexicon: HALOT
  rationale: Se mantiene la metáfora sexual y la intensificación del sustantivo con el participio nominal. «Prostituta» es más natural y menos arcaico que «ramera», pero conserva la carga figurada sin suavizarla.
- source_word: טוֹבַת חֵן
  english_pob_choice: beautiful in charm
  chosen_spanish: hermosa en encanto
  alternatives_spanish:
  - bien favorecida
  - graciosa
  - bella y encantadora
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y describe atractivo seductor. «Hermosa en encanto» conserva el sentido de atractivo/apariencia favorecedora sin reducirlo solo a belleza física.
- source_word: בַּעֲלַת כְּשָׁפִים
  english_pob_choice: mistress of sorceries
  chosen_spanish: señora de hechicerías
  alternatives_spanish:
  - dueña de hechicerías
  - maestra de hechicerías
  - poseedora de hechicerías
  lexicon: HALOT
  rationale: בַּעֲלַת indica posesión o caracterización femenina; «señora» respeta el género y el tono personificado. «Hechicerías» traduce כְּשָׁפִים de modo directo y vívido.
- source_word: הַמֹּכֶרֶת
  english_pob_choice: who sells
  chosen_spanish: la que vende
  alternatives_spanish:
  - la que trafica
  - quien vende
  lexicon: HALOT
  rationale: El participio retrata a la figura como agente continuo. «La que vende» es directo y conserva la imagen comercial de explotación sin añadir interpretación.
- source_word: גּוֹיִם
  english_pob_choice: nations
  chosen_spanish: naciones
  alternatives_spanish:
  - pueblos
  - gentiles
  lexicon: HALOT
  rationale: En este contexto profético y geopolítico, «naciones» es la equivalencia más precisa; «gentiles» sería equívoco y «pueblos» rebaja el matiz político.
- source_word: בִּזְנוּנֶיהָ
  english_pob_choice: through her prostitutions
  chosen_spanish: por medio de sus prostituciones
  alternatives_spanish:
  - por sus prostituciones
  - mediante sus prostituciones
  - con sus prostituciones
  lexicon: HALOT
  rationale: La preposición ב aquí es instrumental; «por medio de» expresa claramente el medio o instrumento y mantiene el paralelismo con la segunda mitad del verso.
- source_word: וּמִשְׁפָּחוֹת
  english_pob_choice: and clans
  chosen_spanish: y familias
  alternatives_spanish:
  - y clanes
  - y parentelas
  - y linajes
  lexicon: HALOT
  rationale: Aunque «clanes» comunica bien el sentido sociológico, en español bíblico «familias» es más amplio y natural; aquí se conserva la posibilidad semántica de grupos de parentesco extensos, como nota la tradición auditada en inglés.
- source_word: בִּכְשָׁפֶיהָ
  english_pob_choice: through her sorceries
  chosen_spanish: por medio de sus hechicerías
  alternatives_spanish:
  - mediante sus hechicerías
  - por sus hechicerías
  - con sus hechicerías
  lexicon: HALOT
  rationale: Se preserva el valor instrumental del hebreo y la correspondencia con el miembro anterior. «Hechicerías» mantiene la repetición léxica y la dimensión ominosa del término.
theological_decisions:
- issue: Naturaleza de la metáfora de la prostituta y la hechicería
  english_pob_reading: Maintain the metaphor of prostitution and sorcery as prophetic imagery for Nineveh's seductive, exploitative power without narrowing it to only sexual sin or only idolatry.
  chosen_spanish_reading: Mantener la metáfora de prostitución y hechicería como imagen profética del poder seductor y explotador de Nínive, sin reducirla solo a pecado sexual o solo a idolatría.
  alternative_spanish_readings:
  - Interpretarla exclusivamente como idolatría.
  - Interpretarla exclusivamente como seducción política y económica.
  rationale: El hebreo personifica a Nínive como una prostituta cuyas artes cautivan y corrompen. La traducción conserva esa tensión metafórica y no la resuelve de manera reductiva, en línea con la lectura auditada en inglés.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto hebreo y la revisión inglesa más reciente: conserva la causalidad inicial, el paralelo instrumental de בְּ, y la imagen intensiva de prostitución/hechicería; adopta una formulación más natural en español para טוֹבַת חֵן sin perder la ambigüedad de atractivo/gracia. También respeta la preferencia POB por no atenuar la metáfora ni sustituirla por lenguaje eclesiástico tradicional.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma por defecto cuando el contexto lo requiera; aquí no aparece.
  - «Hechicerías» se usa de manera consistente para כְּשָׁפִים/כְשָׁפֶיהָ.
  - «Prostituta/prostituciones» conserva la repetición enfática del hebreo.
  - «Naciones» se reserva para גּוֹיִם en sentido geopolítico.
  - La nota sobre «familias» preserva la alternativa semántica de clan/grupo de parentesco sin imponer una sola lectura.
