base_translation:
  language: en
  yaml_path: translation/ot/exodus/026/031.yaml
  text: And you shall make a veil of blue[a], purple, and scarlet yarn, and fine twisted linen; it shall be made with cherubim[c][b], the work of a skillful designer.
  footnotes:
