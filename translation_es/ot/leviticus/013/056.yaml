review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del hebreo: condición introductoria, inspección sacerdotal, marcador de constatación, debilitamiento visible de la zona afectada tras el lavado y mandato de quitar la parte afectada de prenda/cuero/urdimbre/trama. Sin embargo, dos puntos necesitan ajuste para mayor fidelidad: (1) ''después de ser lavada'' concuerda con ''la mancha'', pero el hebreo pasivo ''después de que fue lavado'' se refiere mejor al objeto afectado, no a la mancha misma; (2) ''la desgarrará fuera de...'' suena poco natural y hace menos clara la idea de arrancar la porción afectada del material. También conviene alinear la única nota con la alternativa inglesa documentada sobre ''woof/weft'', no sobre ''examina''.'
  spanish_quality_summary: El español es generalmente claro y digno, con buenos términos técnicos como 'urdimbre' y 'trama'. No obstante, 'he aquí que' encaja mejor que 'he aquí' antes de una cláusula completa, y 'la desgarrará fuera de' resulta torpe en español. 'La arrancará de' o 'la arrancará de la prenda...' comunica mejor la extracción física. La pasiva 'después de ser lavado' evita la lectura extraña de que se lava la mancha.
  glossary_alignment: No hay conflictos con la terminología doctrinal global. 'Sacerdote', 'mancha', 'cuero', 'urdimbre' y 'trama' concuerdan con las decisiones auditadas. La nota al pie debe reflejar la alternativa léxica preservada por el English POB para 'woof/weft'; la nota actual sobre 'examina/inspecciona' no corresponde a una nota preservada ni responde a una nueva ambigüedad importante en español.
  issues:
  - severity: medium
    issue: Referencia ambigua en 'después de ser lavada'
    rationale: El hebreo אַחֲרֵי הֻכַּבֵּס אֹתוֹ usa un pasivo con sufijo masculino singular que apunta al objeto/material afectado, no gramaticalmente a 'la mancha'. En español, 'lavada' hace pensar que la mancha fue lavada.
  - severity: medium
    issue: Expresión poco natural 'la desgarrará fuera de'
    rationale: Aunque intenta reflejar 'tear it out of', en español suena forzado y menos claro. 'La arrancará de' o 'la rasgará y la quitará de' transmite mejor la remoción del área afectada.
  - severity: low
    issue: Nota al pie desalineada con la auditoría inglesa
    rationale: La auditoría inglesa conserva una nota léxica para 'woof/weft', no para 'examines'. En este versículo el español no necesita nota sobre 'examina', mientras que una nota sobre 'trama' puede preservar la alternativa si se desea mantener el rastro auditado.
  - severity: low
    issue: Mejorar la fluidez de 'y he aquí que'
    rationale: Dado que sigue una cláusula completa, 'y he aquí que' fluye mejor que 'y he aquí que la mancha...' o 'y resulta que'. Mantiene el tono formal sin sonar truncado.
  revised_spanish_text: Pero si el sacerdote lo examina, y he aquí que la mancha se ha desvanecido después de ser lavado, entonces la arrancará de la prenda, o del cuero, o de la urdimbre, o de la trama[a].
  revised_footnotes:
  - marker: a
    text: O 'la trama transversal'; corresponde al término textil opuesto a 'urdimbre'.
    reason: lexical_alternative
  revision_rationale: Se ajusta la referencia del pasivo para reflejar mejor el hebreo, se reemplaza una construcción española torpe por otra natural que conserva la idea de extraer la zona afectada, y se alinea la nota al pie con la alternativa léxica documentada para el término textil final. No se requiere adjudicación adicional.
