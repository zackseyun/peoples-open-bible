  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'Justo/injusto' mantiene la relación léxica entre δίκαιος y ἀδίκου, e 'impíos' representa bien ἀσεβεῖς en literatura sapiencial. No aparecen términos de glosario mayor como Yahvé, Mesías o esclavo.
