translation:
  language: es
  text: un toro del ganado, un carnero, un cordero macho de un año, para holocausto;
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: פַּר
  english_pob_choice: bull
  chosen_spanish: toro
  alternatives_spanish:
  - buey
  - novillo
  lexicon: HALOT
  rationale: פַּר designa un toro/animal bovino para sacrificio. En español, «toro» comunica con claridad el animal macho adulto sin sonar forzado, y encaja bien con la precisión del sintagma siguiente.
- source_word: בֶּן־בָּקָר
  english_pob_choice: from the herd
  chosen_spanish: de la res
  alternatives_spanish:
  - de la manada
  - del ganado
  lexicon: HALOT
  rationale: El hebreo literalmente significa «hijo de ganado/res», un giro idiomático para indicar un bovino del ganado. «De la res» mantiene el valor de pertenencia al ganado y suena natural en una lista sacrificial.
- source_word: אַיִל
  english_pob_choice: ram
  chosen_spanish: carnero
  alternatives_spanish:
  - macho de oveja
  - ram
  lexicon: HALOT
  rationale: אַיִל es el término sacrificial normal para un macho adulto de oveja. «Carnero» es la equivalencia natural y precisa en español.
- source_word: כֶּבֶשׂ
  english_pob_choice: male lamb
  chosen_spanish: cordero macho
  alternatives_spanish:
  - cordero
  - borrego macho
  lexicon: HALOT
  rationale: El sustantivo se refiere a un cordero usado en sacrificios; la decisión inglesa explicita el sexo. «Cordero macho» preserva esa precisión sin perder claridad.
- source_word: בֶּן־שְׁנָתוֹ
  english_pob_choice: a year old
  chosen_spanish: de un año
  alternatives_spanish:
  - de un año de edad
  - en su primer año
  lexicon: HALOT
  rationale: La expresión idiomática indica un animal de un año. «De un año» es la formulación más natural y fiel en español.
- source_word: לְעֹלָה
  english_pob_choice: for a burnt offering
  chosen_spanish: para holocausto
  alternatives_spanish:
  - como holocausto
  - para una ofrenda quemada
  lexicon: HALOT
  rationale: עֹלָה es la ofrenda completamente quemada. «Holocausto» es el término bíblico tradicional y preciso en español para esta categoría sacrificial; aquí funciona bien en una enumeración ritual.
- source_word: אֶחָד
  english_pob_choice: one
  chosen_spanish: un
  alternatives_spanish:
  - uno
  lexicon: HALOT
  rationale: 'El numeral distributivo se expresa naturalmente en español con el artículo indefinido concordante: «un».'
theological_decisions:
- issue: Rendering of עֹלָה as a sacrificial category
  english_pob_reading: for a burnt offering
  chosen_spanish_reading: para holocausto
  alternative_spanish_readings:
  - para una ofrenda quemada
  - como holocausto
  rationale: No se trata solo de una ofrenda «quemada» en sentido descriptivo, sino del nombre técnico de la ofrenda completamente consumida por el fuego. «Holocausto» conserva el valor ritual y cultual del hebreo.
  doctrine_reference: Levítico 1; Números 7 (ofrendas de dedicación)
- issue: Masculine specificity of the sacrificial animal
  english_pob_reading: male lamb
  chosen_spanish_reading: cordero macho
  alternative_spanish_readings:
  - cordero
  - borrego macho
  rationale: La lista presenta animales con especificaciones concretas; al traducir el hebreo y seguir la decisión inglesa, conviene mantener el rasgo masculino para no diluir la precisión del inventario ritual.
  doctrine_reference: Números 7:51; HALOT on sacrificial livestock terms
translation_notes:
  revision_awareness: 'Se siguió de cerca la evidencia hebrea y la auditoría inglesa: פַּר + בֶּן־בָּקָר se conservaron como dos rasgos complementarios del bovino sacrificial; אַיִל como carnero; כֶּבֶשׂ como cordero macho; בֶּן־שְׁנָתוֹ como edad de un año; לְעֹלָה como holocausto. No hubo cambios revisados en el pasaje inglés y el consenso de verificación fue de alta concordancia.'
  spanish_consistency_notes:
  - Se mantuvo un registro cultual claro y bíblico, adecuado para una lista sacrificial.
  - Se evitó «SEÑOR» u otras sustituciones no pertinentes porque el versículo no contiene el nombre divino.
  - Se eligió «holocausto» como término técnico reconocido en español bíblico, no como calco mecánico sino por su equivalencia cultual estable.
