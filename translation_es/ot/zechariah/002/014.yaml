translation:
  language: es
  text: ¡Canta con alegría y regocíjate[a], hija de Sión[b], porque he aquí, yo vengo, y habitaré en medio de ti, declara Yahvé[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Grita de alegría y alégrate, hija de Sión».'
    reason: lexical_alternative
  - marker: b
    text: Personificación poética de Sión/Jerusalén.
    reason: cultural_note
  - marker: c
    text: 'Hebreo: YHWH, el nombre divino del pacto.'
    reason: theological_note
lexical_decisions:
- source_word: רָנִּי
  english_pob_choice: Sing for joy
  chosen_spanish: ¡Canta con alegría
  alternatives_spanish:
  - ¡Grita de alegría
  - ¡Prorrumpe en cánticos de júbilo
  lexicon: HALOT
  rationale: El imperativo femenino singular expresa júbilo intenso. En español, «canta con alegría» conserva el impulso celebrativo sin sonar forzado; también es posible una forma más exclamativa como «grita de alegría» si se quiere resaltar el matiz de proclamación.
- source_word: וְשִׂמְחִי
  english_pob_choice: and rejoice
  chosen_spanish: y regocíjate
  alternatives_spanish:
  - y alégrate
  - y goza
  lexicon: HALOT
  rationale: El verbo pide un llamado a la alegría activa. «Regocíjate» mantiene el tono elevado y el carácter verbal mejor que un adjetivo como «alegra».
- source_word: בַּת צִיּוֹן
  english_pob_choice: daughter Zion
  chosen_spanish: hija de Sión
  alternatives_spanish:
  - hija de Sion
  - hija de la hija de Sión
  lexicon: HALOT
  rationale: Es una personificación vocativa de Sión. En español, «hija de Sión» es claro, source-near y naturalmente bíblico; se prefiere «Sión» con tilde por uso español.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón del llamado a la alegría. «Porque» transmite la relación causal de manera natural en español contemporáneo.
- source_word: הִנְנִי
  english_pob_choice: behold
  chosen_spanish: mira
  alternatives_spanish:
  - he aquí
  - mira bien
  lexicon: HALOT
  rationale: La partícula deíctica exige atención profética. «Mira» funciona en español como llamado directo y solemne sin sonar arcaizante; «he aquí» es viable pero más tradicional.
- source_word: בָא
  english_pob_choice: I am coming
  chosen_spanish: yo vengo
  alternatives_spanish:
  - estoy viniendo
  - voy a venir
  lexicon: HALOT
  rationale: El participio con valor inminente se expresa de forma viva con «yo vengo». Mantiene la cercanía y la inmediatez del anuncio profético.
- source_word: וְשָׁכַנְתִּי
  english_pob_choice: I will dwell
  chosen_spanish: habitaré
  alternatives_spanish:
  - moraré
  - viviré
  lexicon: HALOT
  rationale: «Habitaré» es el equivalente español más natural para el lenguaje de presencia divina; conserva la fuerza teológica de שכן sin introducir una metáfora extraña.
- source_word: בְתוֹכֵךְ
  english_pob_choice: in your midst
  chosen_spanish: en medio de ti
  alternatives_spanish:
  - en tu interior
  - entre ti
  lexicon: HALOT
  rationale: La forma femenina singular se conserva con «de ti». «En medio de ti» preserva el sentido espacial y comunitario mejor que una lectura interiorizada.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - dice Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: Se mantiene el nombre divino tal como exige la política terminológica del proyecto. «Declara Yahvé» reproduce la fórmula profética breve y solemne.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton directamente. Según la norma del proyecto en español, debe renderizarse como «Yahvé» y no ocultarse tras un sustituto litúrgico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Presencia divina en Sión
  english_pob_reading: I will dwell in your midst
  chosen_spanish_reading: habitaré en medio de ti
  alternative_spanish_readings:
  - viviré entre ustedes
  - moraré en ti
  rationale: «Habitaré en medio de ti» preserva tanto la promesa de presencia como el destinatario singular femenino (Sión). Evita una paráfrasis que diluya el lenguaje espacial del hebreo.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
- issue: Personificación de Sión
  english_pob_reading: daughter Zion
  chosen_spanish_reading: hija de Sión
  alternative_spanish_readings:
  - hija de Jerusalén
  - Sión, hija
  rationale: Se conserva la personificación poética sin convertirla en un título rígido. El giro mantiene la cercanía a la imagen hebrea y su función vocativa.
  doctrine_reference: DOCTRINE.md Translation philosophy §2
translation_notes:
  revision_awareness: La revisión más reciente del contexto en inglés indica que no hubo cambios necesarios y que existe alto acuerdo (0.98). La redacción española sigue de cerca las decisiones auditadas del POB en inglés, pero ajusta la dicción para que sea idiomática en español y, a la vez, mantenga el nombre divino conforme a la norma del proyecto.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה, según la terminología del proyecto.
  - Se mantiene el vocativo poético «hija de Sión» sin añadir artículos que lo vuelvan menos directo.
  - El llamado verbal en plural implícito del hebreo se expresa con imperativos singulares femeninos dirigidos a Sión, preservando la personificación.
  - Se evita «SEÑOR» como máscara del nombre divino, en consonancia con la política editorial del POB en español.
