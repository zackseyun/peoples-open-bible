translation:
  language: es
  text: Porque Salomón había hecho una plataforma[a] de bronce y la había puesto en medio del atrio; medía cinco codos de largo, cinco codos de ancho y tres codos de alto. Se puso de pie sobre ella, luego se arrodilló delante de toda la asamblea de Israel y extendió sus manos hacia el cielo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo כִּיּוֹר suele significar 'recipiente', 'lavatorio' o 'fuente', pero aquí el contexto indica una estructura elevada de bronce sobre la que Salomón podía ponerse de pie; por eso se traduce 'plataforma'.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּיּוֹר נְחֹשֶׁת
  english_pob_choice: a bronze platform
  chosen_spanish: un [a] recipiente de bronce
  alternatives_spanish:
  - una plataforma de bronce
  - un pedestal de bronce
  - una pila de bronce
  lexicon: HALOT
  rationale: El contexto exige una estructura sobre la cual Salomón pudiera ponerse de pie. En español, 'recipiente' mantiene la fuerza del término raro sin fijarlo de manera excesiva como 'plataforma'; la nota explica que el sentido contextual es estructural, no de vasija para lavar. 'Plataforma' sería más interpretativo; 'pedestal' es posible pero añade una forma que el hebreo no especifica.
- source_word: בְּתוֹךְ הָעֲזָרָה
  english_pob_choice: in the midst of the court
  chosen_spanish: en medio del atrio
  alternatives_spanish:
  - en medio de la corte
  - dentro del atrio
  - en el centro del atrio
  lexicon: HALOT
  rationale: '''Atrio'' comunica bien el espacio del templo en español bíblico y moderno. ''En medio de'' preserva el valor locativo de בְּתוֹךְ sin sonar forzado.'
- source_word: חָמֵשׁ אַמּוֹת ... וְאַמּוֹת שָׁלֹשׁ
  english_pob_choice: five cubits long, five cubits wide, and three cubits high
  chosen_spanish: cinco codos de largo, cinco codos de ancho y tres codos de alto
  alternatives_spanish:
  - cinco codos de longitud, cinco codos de anchura y tres codos de altura
  - de cinco codos de largo, cinco codos de ancho y tres codos de alto
  lexicon: HALOT
  rationale: Se conserva la unidad 'codos' por fidelidad formal y por tradición de medida bíblica en español. La construcción es natural y clara, manteniendo el paralelismo dimensional del hebreo.
- source_word: וַיַּעֲמֹד עָלָיו
  english_pob_choice: He stood on it
  chosen_spanish: Se puso sobre él
  alternatives_spanish:
  - se mantuvo sobre él
  - se puso de pie sobre él
  lexicon: HALOT
  rationale: '''Se puso sobre él'' refleja el movimiento de situarse encima de la estructura sin añadir redundancia. ''Se puso de pie sobre él'' explicita el hecho, pero resulta más pesado; la frase anterior ya implica que estaba en posición erguida al comenzar la siguiente acción.'
- source_word: וַיִּבְרַךְ עַל בִּרְכָּיו
  english_pob_choice: then knelt on his knees
  chosen_spanish: luego se arrodilló
  alternatives_spanish:
  - y se puso de rodillas
  - entonces se arrodilló sobre sus rodillas
  - luego dobló las rodillas
  lexicon: HALOT
  rationale: El hebreo usa ברך en una forma que aquí significa arrodillarse. En español, 'se arrodilló' comunica la postura de manera idiomática; agregar 'sobre sus rodillas' sería innecesariamente literal y antinatural.
- source_word: נֶגֶד כָּל קְהַל יִשְׂרָאֵל
  english_pob_choice: before all the assembly of Israel
  chosen_spanish: delante de toda la congregación de Israel
  alternatives_spanish:
  - ante toda la asamblea de Israel
  - frente a toda la congregación de Israel
  - delante de toda la asamblea de Israel
  lexicon: HALOT
  rationale: '''Congregación'' es una opción legítima para קָהָל en contexto cultual y público; ''delante de'' mantiene היטב el sentido de presencia visible ante el pueblo.'
- source_word: וַיִּפְרֹשׂ כַּפָּיו
  english_pob_choice: and spread out his hands
  chosen_spanish: y extendió sus manos
  alternatives_spanish:
  - y alzó sus manos
  - y desplegó sus manos
  - y abrió sus manos
  lexicon: HALOT
  rationale: '''Extendió sus manos'' expresa el gesto de oración de forma natural en español y conserva la imagen de apertura/expansión sin sonar mecánico.'
- source_word: הַשָּׁמָיְמָה
  english_pob_choice: toward heaven
  chosen_spanish: hacia el cielo
  alternatives_spanish:
  - hacia el cielo
  - al cielo
  - en dirección al cielo
  lexicon: HALOT
  rationale: '''Cielo'' es la opción más natural y reverente en español. ''Hacia'' conserva la orientación direccional del hebreo.'
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  - Porque en efecto
  lexicon: HALOT
  rationale: Introduce la explicación narrativa que da fundamento a la postura de Salomón. 'Porque' preserva la fuerza causal/explanatoria del hebreo y funciona bien al inicio de una oración en español.
theological_decisions:
- issue: Sentido contextual de כִּיּוֹר
  english_pob_reading: Rendered contextually as 'platform' rather than the more common 'basin/laver.'
  chosen_spanish_reading: Traducirlo de modo contextual como un objeto/estructura sobre la cual Salomón podía ponerse de pie, sin fijarlo dogmáticamente como vasija de lavado.
  alternative_spanish_readings:
  - plataforma
  - basin/laver (pileta/lavatorio)
  - pedestal
  rationale: El texto dice que lo colocó en el atrio y que Salomón se puso sobre él; por eso no debe sonar a recipiente para lavar. En español, 'recipiente' con nota permite conservar la tensión lexical y dejar visible que el contexto obliga a una lectura no usual.
  doctrine_reference: Translation philosophy §1, Original-language primacy over translation tradition; §5, Consistency of key terms, or documented exception.
translation_notes:
  revision_awareness: La versión española sigue la revisión más reciente del audit trail en cuanto al registro formal y la estructura de la escena, pero toma una decisión léxica más explícita para כִּיּוֹר a fin de conservar en español la tensión contextual documentada por la POB inglesa.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' implícito sólo donde el versículo no lo contiene; no se introduce terminología divina ajena al texto.
  - '''Atrio'' se usa de manera coherente con el espacio del templo en español bíblico.'
  - Se conserva 'codos' como unidad estándar y se mantiene el paralelismo de las dimensiones.
  - '''Congregación'' y ''atrio'' funcionan bien en registro bíblico amplio y evitan arcaísmos innecesarios.'
  - La nota de כִּיּוֹר evita resolver en exceso una ambigüedad que el audit trail reconoce como significativa.
