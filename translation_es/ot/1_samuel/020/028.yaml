translation:
  language: es
  text: 'Jonatán respondió a Saúl[a]: «David me pidió encarecidamente permiso para ir a Belén».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «David me pidió permiso con insistencia para Belén». El hebreo usa un infinitivo absoluto con el verbo finito para intensificar la acción.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַן
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió
  lexicon: HALOT
  rationale: En un contexto de diálogo narrativo, ענה expresa la respuesta verbal a otro interlocutor. «Respondió» es natural y fiel en español, y mantiene el tono directo del intercambio.
- source_word: אֶת שָׁאוּל
  english_pob_choice: Saul
  chosen_spanish: a Saúl
  alternatives_spanish:
  - Saúl
  lexicon: HALOT
  rationale: El marcador de objeto directo con el nombre propio señala a Saúl como destinatario de la respuesta; en español, la preposición «a» expresa con claridad esa relación discursiva.
- source_word: נִשְׁאֹל נִשְׁאַ֥ל
  english_pob_choice: earnestly asked leave
  chosen_spanish: me pidió encarecidamente permiso
  alternatives_spanish:
  - me pidió permiso con insistencia
  - me rogó permiso
  - me solicitó permiso con insistencia
  lexicon: HALOT
  rationale: La forma infinitivo absoluto + verbo finito intensifica la petición. En español, «pidió encarecidamente permiso» conserva el valor enfático sin sonar forzado; «permiso» explicita que la petición es para obtener autorización.
- source_word: מֵעִמָּדִי
  english_pob_choice: of me
  chosen_spanish: de mí
  alternatives_spanish:
  - de mi parte
  - de mí
  lexicon: HALOT
  rationale: La expresión indica origen o dependencia respecto de la presencia/autoridad de Jonatán. «De mí» preserva la relación sintáctica y el sentido de que la autorización procede de Jonatán.
- source_word: עַד בֵּית לָחֶם
  english_pob_choice: to go to Bethlehem
  chosen_spanish: para ir a Belén
  alternatives_spanish:
  - hacia Belén
  - para ir a Belén
  - hasta Belén
  lexicon: HALOT
  rationale: Con שאל, la meta implícita es una solicitud de permiso para desplazarse. «Para ir a Belén» expresa de forma natural la finalidad del permiso sin perder el sentido direccional.
- source_word: בֵּית לָחֶם
  english_pob_choice: Bethlehem
  chosen_spanish: Belén
  alternatives_spanish:
  - Belén
  lexicon: HALOT
  rationale: 'Topónimo bíblico en español estándar: «Belén».'
translation_notes:
  revision_awareness: 'Coincide con el sentido del hebreo y con el cierre auditado en inglés: la petición de David se expresa con énfasis (infinitivo absoluto + verbo finito), sin necesidad de cambios textuales.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» en otros contextos, pero este versículo no contiene el nombre divino.
  - Se prefiere «Belén» como forma española estándar del topónimo.
  - «Respondió a Saúl» conserva la estructura narrativa directa y es idiomático en español bíblico contemporáneo.
