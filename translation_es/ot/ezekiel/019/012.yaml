review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido del hebreo y del POB inglés: vid arrancada, arrojada al suelo/tierra, viento del oriente que seca el fruto, rama/vara fuerte quebrada y consumida por fuego. La principal desviación está al final: el sufijo masculino en אֲכָלָתְהוּ apunta mejor a ''lo'' (el mַטֶּה, masculino) que a ''la'', por lo que ''fuego la consumió'' desajusta el referente inmediato. También conviene afinar ''se quebró'' a ''fue quebrada'' o ''se quebró'' con matiz de separación; pero el punto más claro es el pronombre final.'
  spanish_quality_summary: El español es claro y digno, con buen registro bíblico. 'Fue arrancada en furor' y 'el viento del oriente' funcionan bien. 'Su rama fuerte' es comprensible, aunque 'rama poderosa' sonaría algo más natural; no es necesario cambiarlo. La nota [a] es aceptable, pero puede simplificarse para centrarse en la alternativa española. La corrección necesaria es principalmente de concordancia/referencia pronominal en la última cláusula.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. La decisión de mantener la imagen vegetal en 'rama' y conservar el matiz real en nota está en línea con el POB. No aparecen términos sensibles como Yahvé/Mesías/doûlos. La nota léxica sobre מַטֵּה עֻזָּהּ debe mantenerse.
  issues:
  - severity: medium
    issue: Pronombre objeto final mal alineado con el referente inmediato
    rationale: En אֵשׁ אֲכָלָתְהוּ, el sufijo masculino singular se refiere naturalmente a מַטֵּה ('rama/vara/cetro', masculino). 'Fuego la consumió' hace pensar en la vid o en una referencia femenina, y pierde la precisión del hebreo y del POB inglés ('it').
  - severity: low
    issue: La nota [a] añade explicación interpretativa no necesaria para una nota de alternativa breve
    rationale: El POB inglés solo preserva la alternativa 'ground'. En español basta con documentar 'al suelo'; la explicación sobre descenso violento ya queda expresada en el texto principal y en las decisiones léxicas.
  revised_spanish_text: Pero fue arrancada en furor; fue arrojada a tierra[a]. Y el viento del oriente secó su fruto; su rama fuerte[b] se quebró y se secó; fuego lo consumió.
  revised_footnotes:
  - marker: a
    text: O 'al suelo'.
    reason: alternative_reading
  - marker: b
    text: O 'cetro poderoso' o 'vara de su fuerza'; el hebreo puede llevar tanto la imagen de una rama como un trasfondo de autoridad real en este lamento.
    reason: lexical_alternative
  revision_rationale: Se cambió 'la consumió' por 'lo consumió' para reflejar mejor el objeto masculino singular del hebreo, referido a 'mַטֵּה' ('rama/vara/cetro'). Se mantuvo la imagen principal de 'rama fuerte' con la nota sobre el matiz real. También se simplificó la nota [a] para dejarla como alternativa de traducción, en línea con el rastro del POB inglés.
