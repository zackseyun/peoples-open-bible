revisions:
- from: Porque el juicio volverá a la justicia[a], y tras él seguirán todos los rectos de corazón[b].
  to: Porque el juicio volverá a la rectitud[a], y todos los rectos de corazón irán tras él[b].
  rationale: Se ajusta צֶדֶק a «rectitud» para preservar en español la distinción documentada entre מִשְׁפָּט y צֶדֶק. También se suaviza el segundo hemistiquio con un orden más natural, manteniendo el valor idiomático de וְאַחֲרָיו y las notas léxicas necesarias.
