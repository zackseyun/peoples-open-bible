translation:
  language: es
  text: 'De los hijos de Secanías[a], de los hijos de Parós: Zacarías, y con él fueron inscritos por genealogía 150 varones.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'con él fueron registrados por genealogía 150 varones'. El verbo hebreo se refiere a una inscripción o cómputo formal en un registro genealógico.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִבְּנֵי
  english_pob_choice: From the sons of
  chosen_spanish: De los hijos de
  alternatives_spanish:
  - Entre los hijos de
  - De entre los hijos de
  lexicon: HALOT
  rationale: La partícula מִן con בְּנֵי introduce un subgrupo dentro de la lista genealógica. En español, 'De los hijos de' conserva esa relación de pertenencia/subconjunto sin endurecer el giro a una calca extraña.
- source_word: שְׁכַנְיָה
  english_pob_choice: Shecaniah
  chosen_spanish: Secañías
  alternatives_spanish:
  - Secanías
  - Shecanías
  lexicon: Transliteración bíblica estándar en español
  rationale: Se usa una forma española reconocible del nombre propio. La grafía 'Secañías' mantiene la correspondencia fonética aproximada y la dignidad de la lista genealógica.
- source_word: פַרְעֹשׁ
  english_pob_choice: Parosh
  chosen_spanish: Parós
  alternatives_spanish:
  - Parosh
  lexicon: Transliteración bíblica estándar en español
  rationale: El nombre de familia se adapta a la ortografía española habitual de nombres hebreos, conservando la identificación con la casa/familia de Parosh.
- source_word: זְכַרְיָה
  english_pob_choice: Zechariah
  chosen_spanish: Zacarías
  alternatives_spanish:
  - Zekarías
  lexicon: Transliteración bíblica estándar en español
  rationale: Zacarías es la forma española establecida del nombre propio y resulta más natural y reconocible que una transliteración estricta.
- source_word: וְעִמּוֹ
  english_pob_choice: and with him
  chosen_spanish: y con él
  alternatives_spanish:
  - y acompañado de él
  - y junto con él
  lexicon: HALOT
  rationale: La fórmula hebrea marca asociación estrecha con Zacarías dentro del registro. 'Y con él' conserva la concisión del original sin añadir matices interpretativos innecesarios.
- source_word: הִתְיַחֵשׂ
  english_pob_choice: were enrolled by genealogy
  chosen_spanish: fueron inscritos por genealogía
  alternatives_spanish:
  - fueron registrados por genealogía
  - fueron contados por genealogía
  - fueron empadronados por genealogía
  lexicon: HALOT
  rationale: El hitpael de יחס expresa inscripción o reconocimiento en un registro genealógico formal. 'Fueron inscritos por genealogía' comunica la acción de quedar asentados en el registro sin diluir el sentido técnico.
- source_word: לִזְכָרִים
  english_pob_choice: males
  chosen_spanish: varones
  alternatives_spanish:
  - males
  - hombres
  lexicon: HALOT
  rationale: '''Varones'' expresa el rasgo sexual explícito del hebreo y suena más natural y digno en español bíblico que ''males'', que sería preciso pero menos idiomático.'
- source_word: מֵאָה וַחֲמִשִּׁים
  english_pob_choice: '150'
  chosen_spanish: '150'
  alternatives_spanish:
  - ciento cincuenta
  lexicon: HALOT
  rationale: Se conserva el número en cifra por tratarse de un listado censal. 'Ciento cincuenta' sería igualmente válido, pero la cifra facilita la lectura y mantiene la exactitud.
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y el rastro auditado en inglés. Se mantiene la estructura genealógica, el valor técnico del verbo hitpael de יחס y el especificador de sexo de לִזְכָרִים. No se detectaron revisiones sustantivas en el contexto inglés; la única variación relevante es la formulación española natural de nombres propios y de la relación de pertenencia en la lista.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el hebreo aporta el tetragrámaton; este versículo no lo contiene.
  - '''Varones'' se eligió por precisión semántica y por adecuación estilística en una lista censal.'
  - La nota al pie conserva la alternativa verbal documentada en el inglés POB, adaptada a español sin perder el matiz técnico.
