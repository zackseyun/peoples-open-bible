revisions:
- from: 'Cuando el ángel extendió su mano contra Jerusalén para destruirla[a], Yahvé se arrepintió respecto de la calamidad y dijo al ángel que destruía al pueblo: «Basta[b]; ahora retira tu mano». Y el ángel de Yahvé estaba junto a la era de Arauná, el jebuseo.'
  to: 'Cuando el ángel extendió su mano contra Jerusalén para destruirla, Yahvé desistió[a] respecto de la calamidad y dijo al ángel que destruía al pueblo: «Basta[b]; ahora retira tu mano». Y el ángel de Yahvé estaba junto a la era de Arauná, el jebuseo.'
  rationale: Se reemplaza «se arrepintió» por «desistió» para reflejar mejor el valor de נחם en este contexto según la auditoría inglesa y para evitar en español una lectura de arrepentimiento moral en Dios. Se reubica la nota léxica al verbo correspondiente y se ajusta su redacción para que explique con precisión la alternativa preservada. Se mantiene el resto del verso, que es fiel, claro y bien alineado con la terminología del proyecto.
