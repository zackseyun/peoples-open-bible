revisions:
- from: Tan lejos como está el oriente del occidente[b][a], así alejó de nosotros nuestras transgresiones.
  to: Cuanto está de lejos el oriente del occidente, así ha alejado de nosotros nuestras transgresiones[b].[a]
  rationale: Se ajusta la comparación a una formulación más natural en español, se refleja mejor el aspecto resultativo de הִרְחִיק con «ha alejado», y se corrige el anclaje de la nota léxica [b] para que acompañe a «transgresiones», que es el término explicado.
