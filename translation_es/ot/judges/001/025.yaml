translation:
  language: es
  text: Así les mostró la entrada de la ciudad, y hirieron la ciudad a filo de espada[a]; pero dejaron ir al hombre y a toda su familia[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «con la boca de la espada», un modismo que significa «con el filo de la espada».'
    reason: lexical_alternative
  - marker: b
    text: También puede entenderse «a toda su casa» o «a todo su clan».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּרְאֵם
  english_pob_choice: he showed them
  chosen_spanish: les mostró
  alternatives_spanish:
  - les hizo ver
  - les señaló
  lexicon: HALOT
  rationale: El hebreo con sufijo plural tiene fuerza causativa/indicativa en contexto. «Les mostró» conserva el sentido de revelar o señalar la entrada, sin forzar una traducción mecánica de ראה.
- source_word: מְבוֹא הָעִיר
  english_pob_choice: the entrance to the city
  chosen_spanish: la entrada de la ciudad
  alternatives_spanish:
  - el acceso a la ciudad
  - la vía de entrada a la ciudad
  lexicon: HALOT
  rationale: מְבוֹא designa una entrada, acceso o punto de ingreso. «La entrada de la ciudad» es natural en español y preserva la concreción militar del contexto.
- source_word: וַיַּכּוּ
  english_pob_choice: they struck
  chosen_spanish: atacaron
  alternatives_spanish:
  - golpearon
  - hirieron
  lexicon: HALOT
  rationale: Aunque el verbo básico es «golpear/abatir», aquí el contexto bélico exige un verbo que comunique la acción militar sin perder la relación con el golpe. «Atacaron» mantiene la fuerza narrativa del pasaje en español.
- source_word: לְפִי חָרֶב
  english_pob_choice: with the edge of the sword
  chosen_spanish: con filo de espada
  alternatives_spanish:
  - a filo de espada
  - con la boca de la espada
  lexicon: HALOT
  rationale: El hebreo dice literalmente «según la boca de la espada», un modismo para el filo. «Con filo de espada» transmite la imagen original y evita una calca extraña.
- source_word: שִׁלֵּחוּ
  english_pob_choice: they let ... go
  chosen_spanish: dejaron ir
  alternatives_spanish:
  - soltaron
  - enviaron lejos
  lexicon: HALOT
  rationale: En este contexto el sentido es liberar y perdonar la vida, no solo enviar. «Dejaron ir» es idiomático en español y refleja bien la decisión narrativa del texto.
- source_word: כָּל מִשְׁפַּחְתּוֹ
  english_pob_choice: all his family
  chosen_spanish: a toda su familia
  alternatives_spanish:
  - a toda su casa
  - a todo su clan
  lexicon: HALOT
  rationale: מִשְׁפָּחָה puede abarcar familia extensa, casa o clan. Aquí «familia» es claro y suficientemente amplio; el indefinido «toda» conserva la totalidad del grupo.
- source_word: הָאִישׁ
  english_pob_choice: the man
  chosen_spanish: al hombre
  alternatives_spanish:
  - a ese hombre
  - al varón
  lexicon: HALOT
  rationale: El sustantivo definido remite al individuo mencionado antes. «Al hombre» suena natural en español narrativo y conserva la referencia directa.
translation_notes:
  revision_awareness: 'La revisión más reciente del registro inglés no introdujo cambios: el pasaje quedó aprobado sin modificaciones y con alta concordancia con la fuente hebrea.'
  spanish_consistency_notes:
  - Se mantuvo un registro narrativo sobrio y bíblico, sin recurrir a fórmulas eclesiásticas no exigidas por el hebreo.
  - Se conservó la ambigüedad de מִשְׁפַּחְתּוֹ en nota, aunque el texto principal usa «familia» por claridad.
  - No se sustituyó el modismo bélico hebreo por una explicación intrusiva en el cuerpo del texto; la aclaración queda en la nota.
  - La elección de «Yahvé» no aplica aquí porque el versículo no contiene el nombre divino.
