translation:
  language: es
  text: Y su límite era Helcat, Hali, Beten y Akshaf[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Akshaf» corresponde al hebreo אַכְשָׁף; algunas versiones tradicionales escriben «Achshaf».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And ... was
  chosen_spanish: Y ... era
  alternatives_spanish:
  - Y ... fue
  - Entonces ... era
  lexicon: HALOT
  rationale: El wayyiqtol introduce la lista de localidades en continuidad narrativa. En español, «Y ... era» conserva la estructura descriptiva de pertenencia/límite sin forzar una narración más dinámica que el hebreo de este contexto.
- source_word: גְּבוּלָם
  english_pob_choice: their border
  chosen_spanish: su límite
  alternatives_spanish:
  - su frontera
  - su borde
  lexicon: HALOT
  rationale: גְּבוּל denota un límite territorial o fronterizo. «Límite» comunica bien la extensión asignada en una lista de repartos y evita la rigidez de «frontera», que en español suele sugerir una demarcación política moderna.
- source_word: חֶלְקַת
  english_pob_choice: Helkath
  chosen_spanish: Helcat
  alternatives_spanish:
  - Helkath
  - Helqat
  lexicon: HALOT
  rationale: Es un nombre propio de lugar. Se translitera conservando la consonante final gutural con una forma natural en español. «Helcat» es más transparente para lectores hispanos que una transliteración más técnica con -th.
- source_word: וַחֲלִי
  english_pob_choice: Hali
  chosen_spanish: Hali
  alternatives_spanish:
  - Jali
  - Chali
  lexicon: HALOT
  rationale: Nombre propio. Se mantiene la forma breve y reconocible en español, sin añadir una adaptación fonética innecesaria que altere el paralelo con la lista hebrea.
- source_word: וָבֶטֶן
  english_pob_choice: Beten
  chosen_spanish: Betén
  alternatives_spanish:
  - Beten
  lexicon: HALOT
  rationale: Nombre propio. Se conserva la acentuación gráfica para ayudar a la lectura en español sin cambiar la identificación del topónimo.
- source_word: וְאַכְשָׁף
  english_pob_choice: Akshaph
  chosen_spanish: Akshaf
  alternatives_spanish:
  - Achshaf
  - Akshaph
  lexicon: HALOT
  rationale: Nombre propio. Se prefiere una transliteración directa y coherente con el hebreo. «Akshaf» refleja mejor la forma consonántica que una grafía tradicionalizada como «Achshaph», que el audit trail registra como alternativa histórica en inglés.
translation_notes:
  revision_awareness: 'La versión española sigue de cerca el audit trail inglés y la forma hebrea: trata el verso como una lista de topónimos fronterizos, preserva el valor de גְּבוּל como límite territorial y mantiene transliteraciones consistentes para los nombres propios. No se detectaron tensiones teológicas ni variantes textuales relevantes en este versículo.'
  spanish_consistency_notes:
  - Se mantuvo un registro sobrio y genealógico/topográfico, propio de una lista de fronteras.
  - Se evitó «frontera» por su posible matiz moderno; «límite» es más neutral en el contexto de reparto territorial.
  - Se normalizó la acentuación de Betén para facilitar la lectura en español.
  - Se usó «Y» inicial para reflejar la continuación narrativa del hebreo sin añadir contenido.
  - La nota a cubre únicamente la alternativa tradicional en la transliteración del primer topónimo.
