translation:
  language: es
  text: Y las aguas se retiraron de sobre la tierra, yendo y volviendo[a], y las aguas disminuyeron al cabo de ciento cincuenta días.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente, "yendo y volviendo"; es un modismo que expresa el retiro continuo o progresivo de las aguas.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשֻׁבוּ
  english_pob_choice: receded
  chosen_spanish: retrocedieron
  alternatives_spanish:
  - recedieron
  - volvieron atrás
  lexicon: HALOT
  rationale: El hebreo שוב puede significar 'volver/retroceder'. Con 'aguas' y la frase siguiente 'de sobre la tierra', el sentido no es un regreso literal sino el retiro de las aguas; 'retrocedieron' comunica bien ese movimiento sin introducir una imagen demasiado coloquial.
- source_word: מֵעַל הָאָרֶץ
  english_pob_choice: from upon the earth
  chosen_spanish: de sobre la tierra
  alternatives_spanish:
  - de la tierra
  - de encima de la tierra
  lexicon: HALOT
  rationale: '''מֵעַל'' expresa con precisión la idea espacial de estar ''sobre'' algo. ''De sobre la tierra'' conserva esa imagen de las aguas cubriendo el suelo, y es natural en español bíblico moderno.'
- source_word: הָלוֹךְ וָשׁוֹב
  english_pob_choice: going and returning
  chosen_spanish: yendo y volviendo
  alternatives_spanish:
  - continuamente retrocediendo
  - de un lado a otro
  lexicon: HALOT
  rationale: La construcción con infinitivo absoluto expresa acción continua o progresiva. El POB inglés preserva la forma más literal 'going and returning'; en español, 'yendo y volviendo' mantiene esa literalidad y la idea de movimiento repetido, mientras la nota explica el valor idiomático.
- source_word: וַיַּחְסְרוּ
  english_pob_choice: diminished
  chosen_spanish: disminuyeron
  alternatives_spanish:
  - se redujeron
  - mermaron
  - bajaron
  lexicon: HALOT
  rationale: חסר indica que algo se hace menor o escasea. 'Disminuyeron' es una equivalencia clara y neutra; además permite distinguir esta cláusula de la anterior, como hace el hebreo con dos verbos distintos.
- source_word: מִקְצֵה
  english_pob_choice: at the end of
  chosen_spanish: al cabo de
  alternatives_spanish:
  - al final de
  - después de
  lexicon: HALOT
  rationale: En uso temporal, 'מִקְצֵה' puede significar 'al cabo de' o 'al final de'. 'Al cabo de' suena natural en español y conserva el valor de cumplimiento de un período de tiempo.
- source_word: חֲמִשִּׁים וּמְאַת יוֹם
  english_pob_choice: a hundred and fifty days
  chosen_spanish: ciento cincuenta días
  alternatives_spanish:
  - ciento cincuenta días completos
  - un total de ciento cincuenta días
  lexicon: HALOT
  rationale: La expresión cardinal es directa. 'Ciento cincuenta días' es la forma normal y fiel en español; no requiere expansión.
theological_decisions:
- issue: Cómo reflejar la imagen idiomática del movimiento de las aguas sin suavizarla en exceso
  english_pob_reading: '''going and returning'' is retained as a literal idiom, with a note explaining that it expresses continual or progressive recession'
  chosen_spanish_reading: '''yendo y volviendo'' se mantiene como giro literal, con nota que explica que expresa un retroceso continuo o progresivo'
  alternative_spanish_readings:
  - '''disminuyendo continuamente'''
  - '''retrocediendo sin cesar'''
  rationale: 'No hay una tensión doctrinal, pero sí una decisión hermenéutica: el hebreo no describe un simple estado, sino un movimiento repetido/continuado. El español literal permite auditar el idiomático original; la nota preserva la lectura dinámica sin borrar la forma fuente.'
  doctrine_reference: None
translation_notes:
  revision_awareness: 'La versión inglesa más reciente volvió de ''continually receded'' a ''receded ... going and returning'' para reflejar con mayor literalidad הָלוֹךְ וָשׁוֹב. Esta draft sigue ese ajuste: conserva el giro idiomático en la nota y evita una paráfrasis que borre la imagen verbal del hebreo.'
  spanish_consistency_notes:
  - Se mantiene 'aguas' en plural para concordar con el hebreo.
  - '''Sobre la tierra'' conserva la imagen espacial de cobertura sin introducir ''la superficie'' ni otras explicaciones.'
  - Se evita 'SEÑOR' y no hay términos divinos en el verso.
  - No se introduce vocabulario teológico ajeno al texto; el verso describe el descenso de las aguas y el cómputo temporal.
