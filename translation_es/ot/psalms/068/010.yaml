translation:
  language: es
  text: Enviaste lluvia abundante[a], Dios; cuando tu herencia[b] estaba cansada, tú la estableciste.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una lluvia generosa» o «lluvia de generosidad»; la expresión hebrea es idiomática y destaca la provisión abundante de Dios.
    reason: lexical_alternative
  - marker: b
    text: «Tu herencia» puede referirse al pueblo de Dios, a la tierra, o a ambos juntos en la expresión poética.
    reason: alternative_reading
lexical_decisions:
- source_word: גֶּשֶׁם
  english_pob_choice: rain
  chosen_spanish: lluvia
  alternatives_spanish:
  - aguacero
  - lluvia torrencial
  lexicon: HALOT
  rationale: El sustantivo nombra precipitación; en español, «lluvia» es la base más natural y fiel. No se requiere intensificar más allá de lo que el contexto poético justifica.
- source_word: נְדָבוֹת
  english_pob_choice: abundant
  chosen_spanish: abundante
  alternatives_spanish:
  - generosa
  - copiosa
  - bountiful
  lexicon: HALOT
  rationale: En esta construcción, el término no se limita a la idea cultual de «ofrenda voluntaria», sino que funciona idiomáticamente como abundancia/liberalidad. «Abundante» conserva esa amplitud sin imponer una imagen sacrificial ajena al verso.
- source_word: תָּנִיף
  english_pob_choice: you sent
  chosen_spanish: enviaste
  alternatives_spanish:
  - mandaste
  - hiciste caer
  - derramaste
  lexicon: HALOT
  rationale: El verbo en contexto expresa la acción divina de hacer venir la lluvia. «Enviaste» sigue la revisión del POB inglés y suena directo y formal en español, sin perder la agencia divina.
- source_word: אֱלֹהִים
  english_pob_choice: O God
  chosen_spanish: oh Dios
  alternatives_spanish:
  - Dios
  lexicon: HALOT
  rationale: El hebreo está en vocativo. «Oh Dios» preserva el tono de invocación poética mejor que una simple referencia nominal.
- source_word: נַחֲלָתְךָ
  english_pob_choice: your inheritance
  chosen_spanish: tu heredad
  alternatives_spanish:
  - tu herencia
  - tu posesión
  - tu patrimonio
  lexicon: HALOT
  rationale: «Heredad» conserva mejor en español el valor bíblico de posesión asignada por pacto y evita la asociación moderna de «herencia» como solo bienes recibidos. Mantiene también la ambigüedad de si el referente incluye pueblo, tierra o ambos.
- source_word: וְנִלְאָה
  english_pob_choice: was weary
  chosen_spanish: estaba cansada
  alternatives_spanish:
  - estaba agotada
  - languidecía
  - estaba fatigada
  lexicon: HALOT
  rationale: El participio/adjetivo femenino singular concuerda con «heredad». «Estaba cansada» es claro, natural y refleja el estado de desgaste o agotamiento sin exagerarlo.
- source_word: כּוֹנַנְתָּהּ
  english_pob_choice: you established it
  chosen_spanish: tú la estableciste
  alternatives_spanish:
  - tú la afirmaste
  - tú la restauraste
  - tú la sostuviste
  lexicon: HALOT
  rationale: «Estableciste» reproduce el núcleo semántico de fijar, afirmar o establecer. El pronombre «la» mantiene la referencia femenina de «heredad» y deja abierta la posible amplitud del referente.
theological_decisions:
- issue: Referente de «tu heredad»
  english_pob_reading: Kept as 'your inheritance' without specifying land or people
  chosen_spanish_reading: Se mantiene «tu heredad» sin precisar si se trata principalmente del pueblo, de la tierra o de ambos en conjunto.
  alternative_spanish_readings:
  - tu pueblo
  - la tierra de Israel
  - tu posesión
  rationale: El hebreo permite una referencia colectiva de pacto y el POB inglés preserva esa amplitud. En español, «tu heredad» conserva la tensión interpretativa sin cerrarla prematuramente.
  doctrine_reference: Preservar la tensión textual y teológica en lugar de resolverla de forma interpretativa.
translation_notes:
  revision_awareness: La versión inglesa más reciente cambió «showered» por «sent» para dar un giro más directo y formal al verbo. Esta versión española sigue ese ajuste con «enviaste», manteniendo además la lectura amplia de «tu heredad» y la imagen poética de lluvia abundante.
  spanish_consistency_notes:
  - Se prefirió «Yahvé» para el nombre divino en este proyecto, pero aquí el hebreo dice אֱלֹהִים en vocativo; por eso corresponde «oh Dios».
  - Se mantuvo «heredad» para conservar el matiz bíblico de posesión/patrimonio asignado y la ambigüedad poética del referente.
  - La puntuación reproduce un corte natural de poesía hebrea con una pausa fuerte tras «oh Dios».
