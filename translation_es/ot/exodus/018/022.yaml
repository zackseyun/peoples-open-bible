  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia y el sentido del hebreo: juzgar al pueblo continuamente, remitir los asuntos grandes a Moisés, resolver los pequeños por los jueces mismos, y así compartir la carga. Conserva acertadamente el contraste «grande/pequeño» y el énfasis de «ellos mismos».'
  spanish_quality_summary: El texto es claro y digno, pero necesita pequeños ajustes para sonar más natural en español eclesial general. «En todo tiempo» puede mantenerse, pero «y sucederá que» suena algo calcado y «más liviano» resulta menos idiomático cuando el sujeto implícito es la carga/trabajo; «más ligero para ti» fluye mejor. También conviene evitar «lo traerán a ti» en favor de «te lo traerán».
  glossary_alignment: 'No hay términos del glosario doctrinal mayor en este versículo. Las decisiones léxicas principales están bien alineadas con el POB: «pueblo», «asunto grande/pequeño», y explicitación contextual de «la carga».'
  issues:
  - severity: medium
    issue: «lo traerán a ti» es gramatical pero poco natural en español estándar.
    rationale: El hebreo indica dirección hacia Moisés; en español fluye mejor «te lo traerán» o «lo traerán ante ti». Esto mejora la legibilidad sin perder literalidad.
  - severity: medium
    issue: «Y sucederá que» suena calcado y rígido para el valor consecutivo de וְהָיָה.
    rationale: Aquí la función es resultativa/consecutiva, no narrar un acontecimiento futuro independiente. «Entonces» expresa mejor la relación lógica preservada por el POB inglés.
  - severity: medium
    issue: «Así te será más liviano» suena menos idiomático porque deja implícito de forma extraña qué será liviano.
    rationale: El hebreo expresa alivio de la carga sobre Moisés; el inglés auditado optó por «it will be lighter for you». En español «Así será más ligero para ti» comunica mejor el resultado manteniendo la metáfora de peso.
  revised_spanish_text: Y juzgarán al pueblo en todo tiempo[a]. Entonces, todo asunto grande te lo traerán, pero todo asunto pequeño lo juzgarán ellos mismos. Así será más ligero para ti[b], y llevarán la carga contigo.
