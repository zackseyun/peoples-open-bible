translation:
  language: es
  text: Y cuando todo Israel oyó que Jeroboam había regresado, enviaron y lo llamaron a la asamblea, y lo hicieron rey sobre todo Israel. Nadie siguió[a] a la casa de David, excepto solo la tribu de Judá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Nadie permaneció con la casa de David». El hebreo dice literalmente «estar después de la casa de David», un giro que expresa lealtad o alineación política.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי כִּשְׁמֹעַ
  english_pob_choice: And when ... heard
  chosen_spanish: Y cuando ... oyó
  alternatives_spanish:
  - Y aconteció que, cuando ... oyó
  - Ahora bien, cuando ... oyó
  lexicon: HALOT
  rationale: La construcción narrativa introduce un cambio temporal. En español, ‘Y cuando’ conserva la secuencia sin sobrecargar con una fórmula más rígida que no aporta claridad.
- source_word: כָּל יִשְׂרָאֵל
  english_pob_choice: all Israel
  chosen_spanish: todo Israel
  alternatives_spanish:
  - todos los israelitas
  - todo el pueblo de Israel
  lexicon: HALOT
  rationale: Se mantiene la expresión colectiva y nacional. ‘Todo Israel’ suena natural y refleja el sujeto corporativo del hebreo.
- source_word: כִּי שָׁב יָרָבְעָם
  english_pob_choice: that Jeroboam had returned
  chosen_spanish: que Jeroboam había regresado
  alternatives_spanish:
  - que Jeroboam había vuelto
  - que Jeroboam regresó
  lexicon: HALOT
  rationale: שׁוּב se rinde con ‘regresar/volver’. El pluscuamperfecto en español refleja bien que el regreso precede a las acciones siguientes.
- source_word: וַיִּשְׁלְחוּ
  english_pob_choice: they sent
  chosen_spanish: enviaron
  alternatives_spanish:
  - enviaron mensajeros
  - mandaron
  lexicon: HALOT
  rationale: El verbo no especifica el objeto. ‘Enviaron’ conserva esa vaguedad y evita añadir ‘mensajeros’ sin apoyo explícito del texto.
- source_word: וַיִּקְרְאוּ אֹתוֹ אֶל הָעֵדָה
  english_pob_choice: and called him to the assembly
  chosen_spanish: y lo hicieron llamar a la asamblea
  alternatives_spanish:
  - y lo llamaron a la asamblea
  - y lo convocaron a la asamblea
  lexicon: HALOT
  rationale: La acción implica convocatoria. ‘Hacer llamar’ reproduce bien la idea de mandar a buscarlo, sin perder el matiz de llamada a una reunión pública.
- source_word: הָעֵדָה
  english_pob_choice: the assembly
  chosen_spanish: la asamblea
  alternatives_spanish:
  - la congregación
  - la comunidad reunida
  lexicon: HALOT
  rationale: En este contexto político, ‘asamblea’ es la mejor equivalencia para un cuerpo reunido de Israel. ‘Congregación’ podría sonar demasiado eclesial.
- source_word: וַיַּמְלִיכוּ אֹתוֹ
  english_pob_choice: and made him king
  chosen_spanish: lo hicieron rey
  alternatives_spanish:
  - lo proclamaron rey
  - lo coronaron rey
  lexicon: HALOT
  rationale: El causativo de מלך expresa ‘hacer rey’. ‘Lo hicieron rey’ es directo y no introduce ceremonial no mencionado.
- source_word: עַל כָּל יִשְׂרָאֵל
  english_pob_choice: over all Israel
  chosen_spanish: sobre todo Israel
  alternatives_spanish:
  - sobre todo el Israel
  - sobre la totalidad de Israel
  lexicon: HALOT
  rationale: Se conserva la extensión del reinado y la preposición de soberanía con una fórmula natural en español.
- source_word: לֹא הָיָה אַחֲרֵי בֵית דָּוִד
  english_pob_choice: None followed the house of David
  chosen_spanish: Ninguno siguió a la casa de David
  alternatives_spanish:
  - Nadie siguió a la casa de David
  - No hubo ninguno tras la casa de David
  lexicon: HALOT
  rationale: El hebreo usa la idiomática ‘estar después de’ para indicar lealtad o alineación. En español, ‘seguir a’ comunica bien esa adhesión política sin borrar la tensión idiomática.
- source_word: זוּלָתִי שֵׁבֶט יְהוּדָה לְבַדּוֹ
  english_pob_choice: except the tribe of Judah alone
  chosen_spanish: excepto la tribu de Judá, sola
  alternatives_spanish:
  - excepto la tribu de Judá solamente
  - salvo la tribu de Judá, sola
  lexicon: HALOT
  rationale: Se mantiene la excepción y el refuerzo de exclusividad. ‘Sola’ intenta reflejar לְבַדּוֹ sin añadir una formulación más interpretativa.
theological_decisions:
- issue: Lealtad política expresada con el idiomático 'after the house of David'
  english_pob_reading: None followed the house of David except the tribe of Judah alone
  chosen_spanish_reading: Ninguno siguió a la casa de David, excepto la tribu de Judá, sola
  alternative_spanish_readings:
  - Ninguno permaneció con la casa de David, excepto la tribu de Judá, sola
  - Nadie quedó tras la casa de David, excepto la tribu de Judá, sola
  rationale: La frase describe adhesión política, no mera ubicación física. ‘Siguió’ preserva la fuerza relacional del hebreo sin resolverla por completo en una idea más estática como ‘permaneció’.
  doctrine_reference: Preservar la tensión semántica del idiomatismo hebreo; prioridad del texto original sobre la tradición de lectura.
translation_notes:
  revision_awareness: La redacción española sigue la revisión final del auditorio inglés, que prefirió la forma colectiva «None followed» sobre «No one followed» para ajustarse mejor al sentido nacional del hebreo. Se conservó la misma decisión básica de interpretar אַחֲרֵי como lealtad/alineación, no como simple secuencia espacial.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ como norma de este proyecto cuando aparezca el nombre divino; en este versículo no ocurre.
  - Se mantiene ‘asamblea’ por el contexto político del relato, evitando ‘congregación’ por su carga eclesial.
  - Se conserva ‘casa de David’ como fórmula dinástica estable.
  - ‘Ninguno’ reproduce el alcance colectivo del hebreo y armoniza con el ajuste revisado del inglés POB.
