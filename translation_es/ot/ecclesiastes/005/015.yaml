translation:
  language: es
  text: 'Esto también es un mal grave: exactamente como vino, así se irá. ¿Y qué provecho tiene el que se afana por el viento[a]?'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “por el espíritu” o “por el aliento”. El hebreo רוּחַ puede significar “viento”, “aliento” o “espíritu”; aquí “viento” encaja mejor con el contexto de esfuerzo inútil.
    reason: lexical_alternative
lexical_decisions:
- source_word: רָעָה חוֹלָה
  english_pob_choice: a grievous evil
  chosen_spanish: un mal grave
  alternatives_spanish:
  - un mal doloroso
  - un mal enfermizo
  - un mal muy grave
  lexicon: HALOT
  rationale: La combinación hebrea expresa algo dañino y penoso, con una cualidad casi “enfermiza”, pero en español “mal grave” transmite bien la fuerza idiomática sin volverlo literal o extraño. Mantiene el valor intensivo de la expresión.
- source_word: כָּל עֻמַּת שֶׁבָּא
  english_pob_choice: exactly as he came
  chosen_spanish: exactamente como vino
  alternatives_spanish:
  - así como vino
  - tal como vino
  - del mismo modo que vino
  lexicon: HALOT
  rationale: עֻמַּת indica correspondencia exacta. “Exactamente como vino” conserva esa simetría con naturalidad en español y refleja el paralelismo del verso.
- source_word: יֵלֵךְ
  english_pob_choice: he will go
  chosen_spanish: se irá
  alternatives_spanish:
  - irá
  - se va
  - partirá
  lexicon: HALOT
  rationale: El imperfecto hebreo expresa certeza proverbial. “Se irá” comunica el sentido de partida en la muerte con fluidez y sin perder la fuerza futura del original.
- source_word: יִּתְרוֹן
  english_pob_choice: profit
  chosen_spanish: provecho
  alternatives_spanish:
  - ganancia
  - utilidad
  - beneficio
  lexicon: HALOT
  rationale: En Qohelet, יִתְרוֹן es el “sobrante” o ventaja obtenida. “Provecho” es un equivalente claro y bíblicamente natural en español, sin cargar innecesariamente el verso con un registro comercial.
- source_word: שֶׁיַּעֲמֹל
  english_pob_choice: who toils
  chosen_spanish: el que se afana
  alternatives_spanish:
  - el que trabaja
  - el que labora
  - el que se fatiga
  lexicon: HALOT
  rationale: עָמַל lleva la idea de trabajo fatigoso y labor penosa. “Se afana” comunica bien esa tensión de esfuerzo intenso, mejor que un simple “trabaja”.
- source_word: לָרוּחַ
  english_pob_choice: for the wind
  chosen_spanish: por el viento
  alternatives_spanish:
  - por el espíritu
  - por el aliento
  - para el viento
  lexicon: HALOT
  rationale: En este contexto sapiencial de futilidad, “viento” es la lectura más concreta y coherente. “Por el viento” conserva la imagen de esforzarse en algo inaprensible, siguiendo la decisión del POB inglés.
theological_decisions:
- issue: Sentido de רוּחַ en un contexto de futilidad
  english_pob_reading: wind
  chosen_spanish_reading: viento
  alternative_spanish_readings:
  - espíritu
  - aliento
  rationale: El contexto inmediato habla del carácter inútil del esfuerzo humano al morir. Traducir רוּחַ como “viento” mantiene la imagen física de lo imposible de retener y evita una lectura espiritualizada que el verso no exige.
  doctrine_reference: Ecclesiastés 5:15; filosofía de traducción del POB §1, §3
- issue: Tensión idiomática entre “mal grave” y la metáfora hebrea de enfermedad
  english_pob_reading: a grievous evil
  chosen_spanish_reading: un mal grave
  alternative_spanish_readings:
  - un mal enfermizo
  - un mal doliente
  rationale: El hebreo usa un adjetivo vinculado con estar enfermo para intensificar el sustantivo “mal”. En español, “mal grave” preserva la gravedad sin forzar una metáfora médica que sonaría extraña o confusa.
  doctrine_reference: Ecclesiastés 5:15; criterio de equivalencia óptima
translation_notes:
  revision_awareness: El texto inglés auditado pasó de “for him that he toils” a la forma más natural “for him who toils”. El español adopta una solución igualmente natural (“el que se afana”) y mantiene el valor proverbial y la conclusión de inutilidad, sin añadir matices inexistentes en el hebreo.
  spanish_consistency_notes:
  - Se mantiene “Yahvé” como norma del proyecto cuando el tetragrámaton aparezca; aquí no ocurre.
  - Se usa “viento” para רוּחַ conforme a la decisión auditada del POB inglés; la nota conserva las alternativas semánticas relevantes.
  - “Mal grave” preserva la intensidad de רָעָה חוֹלָה sin volver literal la metáfora de enfermedad.
  - “Se irá” refleja el valor general del imperfecto hebreo como acción segura y proverbial, no como mero presente narrativo.
