translation:
  language: es
  text: Y ahora, Señor Yahvé, tú eres Dios, y tus palabras son verdaderas[a], y has hablado este bien a tu siervo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «tus palabras serán verdaderas» o «tus palabras son dignas de confianza». El hebreo admite un valor aspectual que puede leerse como afirmación presente o futura.'
    reason: alternative_reading
lexical_decisions:
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: Lord GOD
  chosen_spanish: Señor Yahvé
  alternatives_spanish:
  - Señor Dios
  - Señor Yahvé, mi Señor
  lexicon: HALOT
  rationale: El hebreo combina el título de soberanía אֲדֹנָי con el nombre divino יְהוִה. En español, 'Señor Yahvé' preserva ambos elementos sin caer en la repetición poco natural de 'Señor Señor'. 'Señor Dios' es posible, pero borra el nombre propio del pacto que el proyecto busca mantener.
- source_word: אַתָּה הוּא הָאֱלֹהִים
  english_pob_choice: you are God
  chosen_spanish: tú eres Dios
  alternatives_spanish:
  - tú mismo eres Dios
  - tú eres el Dios
  lexicon: HALOT
  rationale: La construcción enfática se naturaliza en español como 'tú eres Dios'. Conserva la afirmación confesional sin añadir un artículo que el hebreo no exige en esta frase directa.
- source_word: וּדְבָרֶיךָ
  english_pob_choice: your words
  chosen_spanish: tus palabras
  alternatives_spanish:
  - tu palabra
  - tus promesas
  lexicon: HALOT
  rationale: El plural hebreo דְבָרֶיךָ se refleja mejor con 'tus palabras'. 'Tu palabra' singularizaría el plural; 'tus promesas' interpreta el contenido más allá de la forma lexical.
- source_word: יִהְיוּ אֱמֶת
  english_pob_choice: are true
  chosen_spanish: son verdaderas
  alternatives_spanish:
  - serán verdaderas
  - son verdad
  - son fieles
  lexicon: HALOT
  rationale: 'El hebreo permite un valor durativo o confessional: las palabras de Yahvé se afirman como verdaderas. ''Son verdaderas'' suena natural en español y conserva el predicado de אֱמֶת sin convertirlo en una paráfrasis como ''son fieles''.'
- source_word: וַתְּדַבֵּר
  english_pob_choice: you have spoken
  chosen_spanish: has hablado
  alternatives_spanish:
  - hablaste
  - has prometido
  lexicon: HALOT
  rationale: El verbo simplemente significa 'hablar'. En español, el perfecto 'has hablado' expresa adecuadamente una palabra divina ya pronunciada y mantenida en vigencia. 'Has prometido' sería más interpretativo que el hebreo.
- source_word: אֶל עַבְדְּךָ
  english_pob_choice: to your servant
  chosen_spanish: a tu siervo
  alternatives_spanish:
  - a tu esclavo
  - a tu servidor
  lexicon: HALOT
  rationale: Aunque עֶבֶד puede ser 'esclavo', en el registro de oración real de David ante Dios, 'siervo' es la forma más natural y reverente en español. 'Servidor' atenúa el vínculo de dependencia, y 'esclavo' suena demasiado duro para este contexto.
- source_word: הַטּוֹבָה הַזֹּאת
  english_pob_choice: this good thing
  chosen_spanish: esta buena cosa
  alternatives_spanish:
  - esta buena promesa
  - esta bondad
  - este bien
  lexicon: HALOT
  rationale: La frase es literalmente un sintagma amplio, 'esta buena [cosa]'. 'Esta buena cosa' conserva la amplitud del hebreo y evita convertirla en 'promesa' o 'bendición' sin base explícita en la forma del texto. Si se quiere mayor naturalidad, 'esta buena promesa' es una lectura posible pero más interpretativa.
theological_decisions:
- issue: Cómo reflejar el nombre divino en יְהוִה dentro del vocativo compuesto
  english_pob_reading: Lord GOD avoids the awkward repetition that would result from rendering both elements as Lord.
  chosen_spanish_reading: Señor Yahvé evita la repetición 'Señor Señor' y conserva el nombre del pacto.
  alternative_spanish_readings:
  - Señor Dios
  - Señor Yahvé
  rationale: El texto hebreo usa el Tetragrámaton explícitamente. Dado el compromiso del proyecto, se conserva 'Yahvé' en el texto principal. La combinación con 'Señor' reproduce el valor del vocativo compuesto sin ocultar el nombre divino.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Valor de אֱמֶת en la cláusula sobre las palabras divinas
  english_pob_reading: your words are true
  chosen_spanish_reading: tus palabras son verdaderas
  alternative_spanish_readings:
  - tus palabras son verdad
  - tus palabras son fieles
  - tus palabras son fiables
  rationale: אֱמֶת puede abarcar verdad, fidelidad o confiabilidad. Aquí, con 'palabras', el sentido confesional de verdad es el más directo. 'Verdaderas' mantiene la afirmación sin desplazar el matiz hacia 'fidelidad' o 'fiabilidad', que son posibles pero menos inmediatos.
  doctrine_reference: HALOT אֱמֶת; cf. uso confesional en oraciones de alabanza y reconocimiento
translation_notes:
  revision_awareness: El borrador sigue la revisión inglesa más reciente que prefirió 'your words are true' frente a 'your words are truth'. En español, 'tus palabras son verdaderas' conserva esa naturalidad revisada sin perder la fuerza confesional de אֱמֶת. La decisión sobre 'Señor Yahvé' responde al criterio del proyecto de no enmascarar el nombre divino.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para יְהוִה de forma consistente con la política del proyecto.
  - Se usa 'siervo' para עֶבֶד en esta oración de dependencia reverente, no 'esclavo'.
  - Se conserva el plural 'palabras' para דְבָרֶיךָ.
  - La frase 'esta buena cosa' mantiene la literalidad amplia del hebreo; no se expande a 'promesa' en el texto principal.
