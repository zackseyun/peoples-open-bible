translation:
  language: es
  text: Entonces Hiram, rey de Tiro, envió mensajeros[a] a David, y madera de cedro, canteros y carpinteros[b], para edificarle una casa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Mensajeros» también puede entenderse como «enviados» o, en contexto oficial, «embajadores»; se mantiene el término más general.
    reason: lexical_alternative
  - marker: b
    text: «Casa» puede referirse aquí a una residencia real o palacio; el texto principal conserva la palabra más literal.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  english_pob_choice: Then ... sent
  chosen_spanish: Entonces ... envió
  alternatives_spanish:
  - Y ... envió
  - Envió
  lexicon: WLC/HALOT
  rationale: El waw consecutivo marca avance narrativo; «Entonces» conserva esa secuencia en español sin perder naturalidad.
- source_word: חירם
  english_pob_choice: Hiram
  chosen_spanish: Hiram
  alternatives_spanish:
  - Huram
  lexicon: WLC/HALOT
  rationale: El nombre propio se translitera de forma estándar; la forma consonántica aquí apoya «Hiram».
- source_word: מֶלֶךְ צֹר
  english_pob_choice: king of Tyre
  chosen_spanish: rey de Tiro
  alternatives_spanish:
  - el rey de Tiro
  lexicon: WLC/HALOT
  rationale: La cadena constructa identifica el oficio real y su reino; en español la aposición simple es natural y fiel.
- source_word: מַלְאָכִים
  english_pob_choice: messengers
  chosen_spanish: mensajeros
  alternatives_spanish:
  - enviados
  - embajadores
  lexicon: WLC/HALOT
  rationale: El término puede abarcar representantes oficiales, pero «mensajeros» conserva el valor léxico básico sin sobredeterminar su rango diplomático.
- source_word: וַעֲצֵי אֲרָזִים
  english_pob_choice: and cedar timber
  chosen_spanish: y madera de cedro
  alternatives_spanish:
  - y cedros
  - y troncos de cedro
  - y madera de cedro
  lexicon: WLC/HALOT
  rationale: El hebreo alude a material de construcción, no a árboles vivos; «madera de cedro» expresa bien ese sentido.
- source_word: חָרָשֵׁי קִיר
  english_pob_choice: masons
  chosen_spanish: canteros
  alternatives_spanish:
  - albañiles
  - maestros de obra
  - trabajadores de piedra
  lexicon: WLC/HALOT
  rationale: חָרָשׁ designa artesanos, y con קִיר en contexto constructivo apunta a trabajo en piedra/mampostería; «canteros» es una equivalencia breve y adecuada.
- source_word: חָרָשֵׁי עֵצִים
  english_pob_choice: carpenters
  chosen_spanish: carpinteros
  alternatives_spanish:
  - madereros
  - artesanos de la madera
  - trabajadores en madera
  lexicon: WLC/HALOT
  rationale: La construcción con «madera» señala artesanos que trabajan ese material; «carpinteros» es la correspondencia española natural en este contexto.
- source_word: לִבְנוֹת לוֹ בָּיִת
  english_pob_choice: to build a house for him
  chosen_spanish: para edificarle una casa
  alternatives_spanish:
  - para construirle una casa
  - para construirle un palacio
  - para edificar una casa para él
  lexicon: WLC/HALOT
  rationale: Se conserva «casa» como equivalente directo de בַּיִת, sin interpretar de antemano «palacio», aunque el contexto sea real.
translation_notes:
  revision_awareness: La versión inglesa revisada cambió «along with» por «and» para reflejar más directamente la coordinación hebrea; en español se refleja con «y» sin añadir matiz de compañía.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se conserva «casa» en el texto principal por fidelidad léxica, aunque la nota aclara la posible referencia a residencia real.
  - La secuencia narrativa se expresa con «Entonces» para reflejar el waw consecutivo sin sonar arcaico.
