review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura y el sentido forense del hebreo: mantiene la segunda persona dirigida a Dios, la idea de que el estado físico de Job sirve como testimonio, y el movimiento de un testigo que se levanta contra él. Sin embargo, la nota al pie está anclada al lugar equivocado: la alternativa léxica documentada corresponde a כחשי (''mi flacura/consunción''), no a ''testigo''. Además, ''delante de mi rostro'' suena demasiado calcado para el hebreo בפני en español natural.'
  spanish_quality_summary: El español es mayormente claro y digno, pero necesita un ajuste de naturalidad y precisión. 'Tú me has marchitado' y 'se ha vuelto un testigo' funcionan. 'Mi flacura' es legible, aunque 'consunción' también sería posible; no es necesario cambiarlo. La mayor mejora es reemplazar 'delante de mi rostro' por 'en mi cara' o mejor 'ante mí'/'en mi presencia'; dado el matiz confrontacional de 'to my face', 'en mi cara' es demasiado coloquial, así que 'ante mí' equilibra fidelidad y registro. También debe moverse la nota al pie para que ancle en 'mi flacura[a]'.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. No aparecen Yahvé, Mesías, Cristo, esclavo, etc. Las decisiones léxicas principales son coherentes con el expediente inglés: וַתִּקְמְטֵנִי = ''me has marchitado'', לְעֵד הָיָה = ''se ha vuelto un testigo'', כחשי = ''mi flacura'', יענה = ''testifica''.'
  issues:
  - severity: high
    issue: La nota al pie [a] está anclada a 'testigo' pero explica el término כחשי ('mi flacura/consunción').
    rationale: Esto desaline­a evidencia, traducción y aparato crítico. El lector entenderá erróneamente que la variante léxica afecta a 'testigo' en vez de al sustantivo corporal posterior.
  - severity: medium
    issue: '''Delante de mi rostro'' es una formulación demasiado literal y poco natural en español actual.'
    rationale: Aunque refleja בפני palabra por palabra, suena acartonado. El contexto forense y confrontacional se preserva mejor con 'ante mí', que mantiene dignidad y legibilidad.
  revised_spanish_text: Tú me has marchitado; se ha vuelto un testigo; mi flacura[a] se levanta contra mí y testifica ante mí.
  revised_footnotes:
  - marker: a
    text: O «mi consumición». El término hebreo puede denotar emaciación física; algunos lo toman en cambio como «mi falsedad» o «la mentira contra mí», pero el sentido corporal encaja mejor con el contexto.
    reason: lexical_alternative
  revision_rationale: Se corrige el anclaje de la nota para que corresponda al término hebreo כחשי, y se mejora la naturalidad de בפני con 'ante mí' en lugar de 'delante de mi rostro'. El resto del verso ya preservaba adecuadamente el sentido físico-forense del original y las decisiones del POB inglés.
