translation:
  language: es
  text: 'En respuesta, dijo[a]: «Los llamados Hasideos entre los judíos, cuyo líder es Judas Macabeo, alimentan la guerra y promueven la rebelión[b], sin permitir»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «los así llamados Hasideos», si λεγόμενοι se toma con un matiz más distante o despectivo.'
    reason: lexical_alternative
  - marker: b
    text: El griego continúa en el versículo siguiente; este versículo termina con «sin permitir» y deja sin expresar el objeto hasta la continuación.
    reason: textual_variant
lexical_decisions:
- source_word: πρὸς ταῦτα
  english_pob_choice: In reply
  chosen_spanish: En respuesta
  alternatives_spanish:
  - A esto
  - Como respuesta
  lexicon: LSJ
  rationale: La expresión introduce una reacción directa a lo anterior; «En respuesta» conserva la función discursiva de inicio de réplica de manera natural en español.
- source_word: ἔφη
  english_pob_choice: he said
  chosen_spanish: dijo
  alternatives_spanish:
  - afirmó
  - respondió
  lexicon: LSJ
  rationale: Verbo narrativo simple; «dijo» es la forma más natural y fiel sin añadir matiz interpretativo extra.
- source_word: Οἱ λεγόμενοι
  english_pob_choice: Those ... who are called
  chosen_spanish: Los llamados
  alternatives_spanish:
  - Los así llamados
  - Los que son llamados
  lexicon: LSJ
  rationale: Se mantiene el valor neutral de «llamados»; la posible ironía o distancia se reserva como alternativa interpretativa sin imponerla en el texto principal.
- source_word: Ἀσιδαῖοι
  english_pob_choice: Hasideans
  chosen_spanish: Hasideos
  alternatives_spanish:
  - Hasideanos
  - Asideos
  lexicon: LSJ
  rationale: Nombre propio de grupo histórico judío; se translitera para conservar la referencia específica. «Hasideos» es una forma clara y sobria en español.
- source_word: ὧν ἀφηγεῖται
  english_pob_choice: whose leader is
  chosen_spanish: cuyo jefe es
  alternatives_spanish:
  - cuyo líder es
  - al frente de los cuales está
  lexicon: LSJ
  rationale: La construcción relativa expresa jefatura o conducción de grupo; «jefe» comunica bien la relación sin forzar una paráfrasis excesiva.
- source_word: Ἰούδας ὁ Μακκαβαῖος
  english_pob_choice: Judas Maccabaeus
  chosen_spanish: Judas Macabeo
  alternatives_spanish:
  - Judas el Macabeo
  - Judas Maccabeo
  lexicon: LSJ
  rationale: Nombre histórico habitual en español bíblico; «Macabeo» mantiene la identificación histórica con lectura fluida y digna.
- source_word: πολεμοτροφοῦσιν
  english_pob_choice: keep feeding war
  chosen_spanish: alimentan la guerra
  alternatives_spanish:
  - siguen alimentando la guerra
  - fomentan la guerra
  lexicon: LSJ
  rationale: El compuesto sugiere la metáfora de nutrir/alimentar la guerra; «alimentan la guerra» conserva la imagen con naturalidad en español.
- source_word: στασιάζουσιν
  english_pob_choice: stirring up rebellion
  chosen_spanish: promueven la rebelión
  alternatives_spanish:
  - incitan a la rebelión
  - siembran rebelión
  lexicon: LSJ
  rationale: El verbo remite a sedición, facción o alzamiento civil; «promueven la rebelión» transmite la acción sin exagerar más allá del contexto.
- source_word: οὐκ ἐῶντες
  english_pob_choice: not allowing
  chosen_spanish: no permitiendo
  alternatives_spanish:
  - sin permitir
  - impidiendo
  lexicon: LSJ
  rationale: Se conserva la forma participial abierta porque el griego continúa en el verso siguiente; «no permitiendo» reproduce esa suspensión sintáctica.
theological_decisions:
- issue: Nombre del grupo Ἀσιδαῖοι
  english_pob_reading: Hasideans
  chosen_spanish_reading: Hasideos
  alternative_spanish_readings:
  - los piadosos
  - Asideos
  rationale: Se prefiere transliterar el nombre del grupo en lugar de interpretarlo como una cualidad moral. Así se preserva la tensión histórica y se evita introducir una valoración no explicitada por el texto.
  doctrine_reference: Transliterar nombres; evitar glosas interpretativas no necesarias.
- issue: Posible matiz de distancia en Οἱ λεγόμενοι
  english_pob_reading: Those ... who are called
  chosen_spanish_reading: Los llamados
  alternative_spanish_readings:
  - Los así llamados
  - Los llamados, o sea, los supuestos
  rationale: El griego puede ser neutral o ligeramente despectivo. El texto principal mantiene neutralidad; no se fuerza «así llamados» para no resolver una ambigüedad que el original deja abierta.
  doctrine_reference: Preservar tensión lexical; no cerrar ambigüedades sin necesidad.
translation_notes:
  revision_awareness: El pasaje griego presenta una frase interrumpida al final del versículo; por eso el español conserva la apertura con «no permitiendo» sin suplir objeto. Se siguió la lectura inglesa auditada en cuanto al valor de λεγόμενοι, pero se eligió un español más natural («llamados») y se dejó la alternativa distante en nota.
  spanish_consistency_notes:
  - Se usa «Yahvé» por defecto para el nombre divino, pero este versículo no lo contiene.
  - Se translitera el grupo histórico como «Hasideos» para mantener la referencia específica.
  - Se conserva el corte sintáctico final del versículo, sin completar la oración.
  - Se emplea «rebelión» para στασιάζουσιν por su fuerza de sedición civil en contexto helenístico.
