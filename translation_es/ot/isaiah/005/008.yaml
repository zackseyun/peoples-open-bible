translation:
  language: es
  text: ¡Ay de los que juntan casa con casa, que acercan campo a campo[a], hasta que no queda lugar, y se les hace vivir a ustedes solos[b] en medio de la tierra!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «que añaden campo a campo» o «que unen campo con campo». El verbo hebreo es literalmente «acercar»; aquí describe la acumulación de propiedades.'
    reason: lexical_alternative
  - marker: b
    text: El hebreo pasa a segunda persona («y se les hace vivir a ustedes solos»), dirigiendo la acusación directamente a los culpables.
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹי
  english_pob_choice: Woe
  chosen_spanish: ¡Ay de
  alternatives_spanish:
  - ¡Ay!
  - ¡Ay de ustedes
  lexicon: HALOT
  rationale: La interjección profética exige en español una exclamación de lamento y denuncia. «¡Ay de» conserva el tono oracular y encabeza naturalmente el reproche.
- source_word: מַגִּיעֵי
  english_pob_choice: who join
  chosen_spanish: juntan
  alternatives_spanish:
  - unen
  - acercan
  lexicon: HALOT
  rationale: El inglés POB eligió «who join» para reflejar la idea de hacer contiguas propiedades. En español, «juntan» comunica con naturalidad la consolidación de casas sin perder la fuerza de la imagen.
- source_word: בַיִת בְּבַיִת
  english_pob_choice: house to house
  chosen_spanish: casa con casa
  alternatives_spanish:
  - casa tras casa
  - casa a casa
  lexicon: HALOT
  rationale: La construcción hebrea distributiva se refleja con una repetición breve y fluida. «Casa con casa» preserva la acumulación y resulta idiomática en español.
- source_word: שָׂדֶה בְשָׂדֶה יַקְרִיבוּ
  english_pob_choice: who bring field near to field
  chosen_spanish: acercan campo a campo
  alternatives_spanish:
  - juntan campo con campo
  - añaden campo a campo
  lexicon: HALOT
  rationale: Se mantiene el matiz distinto de קרב, que literalmente es «acercar». «Acercan campo a campo» conserva la elección del POB inglés y deja visible la metáfora de expansión territorial.
- source_word: עַד אֶפֶס מָקוֹם
  english_pob_choice: until there is no place left
  chosen_spanish: hasta que no queda lugar
  alternatives_spanish:
  - hasta que no queda espacio
  - hasta no dejar lugar
  lexicon: HALOT
  rationale: «No queda lugar» expresa con claridad el resultado de la apropiación sin añadir interpretaciones. Conserva el sentido de agotamiento total del espacio.
- source_word: וְהוּשַׁבְתֶּם
  english_pob_choice: and you are made to dwell
  chosen_spanish: vosotros quedáis habitando
  alternatives_spanish:
  - y sois hechos habitar
  - y se os hace habitar
  lexicon: HALOT
  rationale: El hebreo cambia bruscamente a segunda persona. En español, «vosotros» evita ambigüedad referencial y el giro «quedáis habitando» mantiene la pasividad/resultado sin sonar rígido. Se preserva la confrontación directa.
- source_word: לבדכם
  english_pob_choice: alone
  chosen_spanish: solos
  alternatives_spanish:
  - solamente vosotros
  - por vuestra cuenta
  lexicon: HALOT
  rationale: '«Solos» transmite la exclusividad del resultado: la tierra queda ocupada únicamente por los acusados.'
- source_word: בקרב הארץ
  english_pob_choice: in the midst of the land
  chosen_spanish: en medio de la tierra
  alternatives_spanish:
  - en medio del país
  - dentro de la tierra
  lexicon: HALOT
  rationale: «En medio de la tierra» es la forma más directa y fiel para conservar la imagen espacial del hebreo y el inglés POB.
translation_notes:
  revision_awareness: El borrador sigue de cerca el audit trail inglés y el hebreo WLC. Se conserva la alternancia de imágenes de propiedad (casa/campo), el valor literal de קרב como «acercar», el resultado absoluto de אפס מקום y el cambio a segunda persona en la clausula final. No se introdujeron revisiones adicionales.
  spanish_consistency_notes:
  - Se usa «tierra» para הָאָרֶץ, manteniendo la amplitud del hebreo en vez de restringirlo a «país» o «territorio».
  - Se evita «SEÑOR» porque el versículo no contiene el Tetragrámaton ni una cita explícita del nombre divino.
  - La puntuación reproduce una invectiva profética continua, con separación clara de cláusulas pero sin suavizar la denuncia.
