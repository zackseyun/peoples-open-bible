    rationale: Aunque reproduce literalmente בְּקוֹל גָּדוֹל, en español suena extraño. El objetivo es preservar el sentido fuente con buena legibilidad. Puede mejorarse en el texto y conservar la literalidad en nota.
  - severity: low
