translation:
  language: es
  text: 'Jonás comenzó a entrar en la ciudad, una jornada de camino, y clamó y dijo: «Aún cuarenta días[a], y Nínive será trastornada[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cuarenta días más» o «dentro de cuarenta días». La expresión hebrea marca el tiempo que queda antes del acontecimiento anunciado.
    reason: lexical_alternative
  - marker: b
    text: O «será derribada». El verbo hebreo puede significar «ser trastornada» o «ser derribada», permitiendo tanto el sentido de juicio como la idea más amplia de reversión.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיָּחֶל
  english_pob_choice: began
  chosen_spanish: comenzó
  alternatives_spanish:
  - empezó
  lexicon: HALOT
  rationale: El Hifil de חלל aquí funciona idiomáticamente con לָבוֹא para indicar el inicio de la acción. «Comenzó» comunica bien ese comienzo narrativo en español sin añadir matices ajenos.
- source_word: לָבוֹא בָעִיר
  english_pob_choice: to go into the city
  chosen_spanish: a entrar en la ciudad
  alternatives_spanish:
  - a ir a la ciudad
  - a ingresar en la ciudad
  lexicon: HALOT
  rationale: בוא con ב expresa movimiento hacia el interior de la ciudad. «Entrar en» conserva la dirección del movimiento y suena natural en español.
- source_word: מַהֲלַךְ יוֹם אֶחָד
  english_pob_choice: a day's journey
  chosen_spanish: a la distancia de un día de camino
  alternatives_spanish:
  - una jornada de camino
  - el trayecto de un día
  lexicon: HALOT
  rationale: La construcción hebrea es una expresión idiomática de extensión o distancia recorrida en un día. En español, «a la distancia de un día de camino» mantiene el sentido espacial sin imponer una equivalencia demasiado libre.
- source_word: וַיִּקְרָא
  english_pob_choice: he cried out
  chosen_spanish: proclamó
  alternatives_spanish:
  - clamó
  - gritó
  lexicon: HALOT
  rationale: En un contexto profético, קרא puede referirse a una proclamación pública. «Proclamó» expresa el acto público con dignidad en español, aunque «clamó» mantiene más del tono audible.
- source_word: וַיֹּאמַר
  english_pob_choice: and said
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  lexicon: HALOT
  rationale: La secuencia narrativa hebrea une los dos verbos; en español, «proclamó diciendo» conserva la progresión y el encadenamiento sin recargar la frase.
- source_word: עוֹד אַרְבָּעִים יוֹם
  english_pob_choice: Yet forty days
  chosen_spanish: Aún cuarenta días
  alternatives_spanish:
  - Todavía cuarenta días
  - En cuarenta días
  lexicon: HALOT
  rationale: עוֹד indica tiempo restante antes del evento anunciado. «Aún cuarenta días» preserva ese valor de cuenta regresiva y deja abierta la alternativa de «cuarenta días más» que el inglés anotó.
- source_word: נֶהְפָּכֶת
  english_pob_choice: will be overturned
  chosen_spanish: será trastornada
  alternatives_spanish:
  - será derribada
  - será volcada
  - será sobrevertida
  lexicon: HALOT
  rationale: El nifal de הפך puede abarcar volverse, invertirse, trastornarse u overthrow. «Trastornada» en español conserva la amplitud semántica y la tensión literaria entre juicio y reversión, sin fijar demasiado pronto la destrucción total.
theological_decisions:
- issue: Alcance de נֶהְפָּכֶת en la advertencia contra Nínive
  english_pob_reading: will be overturned
  chosen_spanish_reading: será trastornada
  alternative_spanish_readings:
  - será destruida
  - será derribada
  - será sobrevertida
  rationale: El verbo hebreo permite una gama que incluye catástrofe, derrocamiento y cambio de estado. «Será trastornada» preserva esa tensión y evita resolver el texto solo como destrucción, en línea con la lectura literaria del libro de Jonás.
  doctrine_reference: Translation philosophy §3 (preservar la tensión teológica donde el texto la permite)
translation_notes:
  revision_awareness: El texto inglés auditado está en alta concordancia y no requiere revisión sustantiva; se conserva la ambigüedad principal de נֶהְפָּכֶת y la expresión idiomática de «a day's journey» con una formulación española natural.
  spanish_consistency_notes:
  - Se mantiene «Jonás» y «Nínive» como formas estables y ampliamente reconocibles.
  - Se evitó «SEÑOR» u otra sustitución, porque no aplica en este versículo.
  - Se conservó el valor narrativo de la doble cadena verbal hebrea con una redacción española fluida.
  - «Trastornada» se usa deliberadamente para no cerrar la polisemia de הפך en una sola dirección interpretativa.
