translation:
  language: es
  text: 'Entonces el Acusador respondió a Yahvé y dijo[a][b]: «¿Acaso Job teme a Dios por nada?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «el Satanás» o «el adversario»; el término lleva artículo y funciona como título, de ahí «el Acusador».'
    reason: alternative_reading
  - marker: b
    text: O «sin motivo» o «sin causa». La frase cuestiona si el temor de Job es desinteresado.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַן
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió
  lexicon: HALOT
  rationale: En español, «respondió» conserva la fórmula narrativa de diálogo y suena natural en una escena de controversia; evita la rigidez de un calco y corresponde al valor estándar de ענה en este contexto.
- source_word: הַשָּׂטָן
  english_pob_choice: the Accuser
  chosen_spanish: el Acusador
  alternatives_spanish:
  - el Satanás
  - el adversario
  - Satanás
  lexicon: HALOT
  rationale: Con artículo, el término funciona como título/rol y no como nombre propio. «El Acusador» mantiene el matiz judicial y la oposición implícita en la escena, en línea con la lectura auditada del inglés.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino del Tetragrámaton en la forma POB «Yahvé», conforme al criterio doctrinal del proyecto y en lugar de sustituirlo por un título.
- source_word: וַיֹּאמַר
  english_pob_choice: and said
  chosen_spanish: y dijo
  alternatives_spanish:
  - y habló
  - y contestó
  lexicon: HALOT
  rationale: La fórmula hebrea de introducción directa se vierte de modo simple y natural con «y dijo», que preserva la secuencia narrativa.
- source_word: הַֽחִנָּם
  english_pob_choice: for nothing
  chosen_spanish: por nada
  alternatives_spanish:
  - sin motivo
  - sin causa
  - de balde
  lexicon: HALOT
  rationale: «Por nada» refleja de forma idiomática la pregunta sobre si el temor de Job es desinteresado, manteniendo la ambigüedad entre ausencia de pago/beneficio y ausencia de causa.
- source_word: יָרֵא
  english_pob_choice: fear
  chosen_spanish: teme
  alternatives_spanish:
  - reverencia
  - venera
  lexicon: HALOT
  rationale: En relación con Dios, ירא expresa temor reverente; «teme» conserva la fuerza bíblica del verbo y evita suavizarlo a una paráfrasis.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios verdadero
  lexicon: HALOT
  rationale: Aquí el referente es el Dios verdadero en el discurso directo sobre la piedad de Job; «Dios» es la equivalencia directa y natural en español.
theological_decisions:
- issue: Función titulativa de הַשָּׂטָן
  english_pob_reading: the Accuser
  chosen_spanish_reading: el Acusador
  alternative_spanish_readings:
  - Satanás
  - el adversario
  rationale: El artículo hebreo señala un papel o función en esta escena. Traducirlo como «el Acusador» preserva el sentido de oposición forense sin cerrar la tensión textual hacia un nombre propio posterior.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton; por coherencia doctrinal y de auditable equivalence se mantiene el nombre propio divino, no una sustitución honorífica.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: El borrador sigue de cerca el consenso auditado del inglés POB y no introduce cambios de sentido; solo adapta la formulación al español con equivalencia óptima y mantiene la tensión lexical de הַשָּׂטָן y הַחִנָּם.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה, conforme al estándar del proyecto.
  - «El Acusador» conserva el valor titular del hebreo con artículo y evita importar de forma no justificada el nombre propio «Satanás».
  - «Por nada» mantiene la ambigüedad de הַחִנָּם y permite la nota alternativa sin perder naturalidad en español.
  - «Teme a Dios» reproduce la fórmula bíblica reverencial sin suavizar el verbo.
  - La puntuación y la colocación de las notas siguen el patrón de la POB inglesa para facilitar la trazabilidad auditable.
