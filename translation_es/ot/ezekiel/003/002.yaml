lexical_decisions:
- source_word: וָאֶפְתַּח
  english_pob_choice: So I opened
  chosen_spanish: Entonces abrí
  alternatives_spanish:
  - Y abrí
  - Luego abrí
  lexicon: HALOT
  rationale: La forma wayyiqtol marca secuencia narrativa; «Entonces» conserva esa continuidad en español sin sonar forzado.
- source_word: אֶת־פִּי
  english_pob_choice: my mouth
  chosen_spanish: mi boca
  alternatives_spanish:
  - mi boca misma
  - mi boca
  lexicon: HALOT
  rationale: El marcador de objeto directo con «mi boca» se expresa naturalmente en español como «mi boca»; aquí «boca» es plenamente fiel y más idiomático que una réplica más literal.
- source_word: וַיַּאֲכִלֵנִי
  english_pob_choice: and he fed me
  chosen_spanish: y me hizo comer
  alternatives_spanish:
  - y me alimentó
  - y me hizo comer este rollo
  lexicon: HALOT
  rationale: 'El hiphil de אכל conserva fuerza causativa: no es solo «alimentar» en sentido suave, sino «hacer comer». En español, «me hizo comer» refleja mejor esa causatividad; el contexto explica que el objeto es el rollo.'
- source_word: אֵת־הַמְּגִלָּה הַזֹּאת
  english_pob_choice: this scroll
  chosen_spanish: este rollo
  alternatives_spanish:
  - este libro en rollo
  - este escrito
  lexicon: HALOT
  rationale: מְגִלָּה designa un rollo o pergamino enrollado. «Rollo» comunica el soporte material con fidelidad; «este» mantiene el demostrativo de cercanía.
translation_notes:
  revision_awareness: El texto base en inglés estaba en acuerdo alto con la fuente hebrea y no requirió revisión sustantiva; la decisión principal en español fue preservar la causatividad del hiphil de אכל con una formulación natural.
  spanish_consistency_notes:
  - Se mantiene el orden narrativo breve y directo del hebreo.
  - «Rollo» se usa por su valor material y visual; evita una lectura excesivamente moderna de «libro».
  - La nota conserva la alternativa formal señalada por el POB inglés sin perder la solución principal idiomática.
