base_translation:
  language: en
  yaml_path: translation/ot/proverbs/028/007.yaml
  text: Whoever keeps the law is a discerning son[b][a], but he who associates with gluttons shames his father.
  footnotes:
  - marker: a
    text: Or 'associates with gluttons'; literally, 'shepherds gluttons.' The Hebrew verb carries a pastoral image used idiomatically for keeping company with certain people.
    reason: lexical_alternative
  - marker: b
    text: '''Gluttons'' may also be understood more broadly as wastrels or profligates—people given to excess and dissipation.'
    reason: lexical_alternative
