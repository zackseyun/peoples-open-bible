translation:
  language: es
  text: Pero ustedes, todos los exiliados a quienes yo envié desde Jerusalén a Babilonia, escuchen la palabra de Yahvé.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וְ/אַתֶּם
  english_pob_choice: But you
  chosen_spanish: Pero ustedes
  alternatives_spanish:
  - Y ustedes
  - Y vosotros
  - Asímismo, ustedes
  lexicon: HALOT
  rationale: El hebreo abre con una conjunción contrastiva y pronombre independiente; en español, «Pero ustedes» comunica mejor el giro discursivo que un simple «Y ustedes».
- source_word: שִׁמְע֣וּ
  english_pob_choice: hear
  chosen_spanish: escuchen
  alternatives_spanish:
  - oigan
  - escuchen atentamente
  - obedezcan
  lexicon: HALOT
  rationale: El imperativo de שׁמע admite «oir/escuchar». «Escuchen» conserva el tono profético de la fórmula «escuchen la palabra de Yahvé» sin explicitar la implicación obediencial.
- source_word: דְבַר יְהוָה
  english_pob_choice: the word of Yahweh
  chosen_spanish: la palabra de Yahvé
  alternatives_spanish:
  - el mensaje de Yahvé
  - la palabra del SEÑOR
  lexicon: HALOT
  rationale: «Palabra» preserva la expresión profética fija y su peso teológico. Se mantiene «Yahvé» como traducción del Tetragrama, conforme al criterio del proyecto.
- source_word: כָּל הַגּוֹלָה
  english_pob_choice: all the exiles
  chosen_spanish: todos los exiliados
  alternatives_spanish:
  - toda la comunidad en el exilio
  - todos los deportados
  lexicon: HALOT
  rationale: Aunque el sustantivo hebreo es colectivo en singular, en español «todos los exiliados» expresa naturalmente el sentido comunitario sin perder el valor colectivo.
- source_word: אֲשֶׁר שִׁלַּחְתִּי
  english_pob_choice: whom I sent
  chosen_spanish: a quienes yo envié
  alternatives_spanish:
  - a quienes he enviado
  - a quienes mandé
  lexicon: HALOT
  rationale: «Enviar» reproduce el sentido básico de שׁלח en esta cláusula relativa. «A quienes» evita ambigüedad en español y conserva la referencia personal a la comunidad.
- source_word: מִירוּשָׁלִַם
  english_pob_choice: from Jerusalem
  chosen_spanish: desde Jerusalén
  alternatives_spanish:
  - de Jerusalén
  lexicon: HALOT
  rationale: El hebreo usa מִן con valor de origen; «desde» suena más natural en español y refleja el punto de partida del envío.
- source_word: בָּבֶלָה
  english_pob_choice: to Babylon
  chosen_spanish: a Babilonia
  alternatives_spanish:
  - hacia Babilonia
  - hasta Babilonia
  lexicon: HALOT
  rationale: El sufijo direccional indica movimiento hacia Babilonia; «a Babilonia» es la forma más clara y natural en español.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se conserva el nombre propio divino en transliteración, siguiendo la decisión doctrinal del proyecto y evitando la sustitución por un título impersonal.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: 'El español sigue de cerca el hebreo y coincide con el sentido auditado en inglés: contraste inicial, imperativo profético, comunidad colectiva en exilio y dirección geográfica completa del envío. No se detectan tensiones textuales adicionales en este versículo.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» en lugar de «SEÑOR» para el Tetragrama.
  - Se prefirió «escuchen» sobre «oigan» para conservar la fórmula profética estable.
  - «Todos los exiliados» traduce el colectivo hebreo en forma natural y no individualizante.
  - «Desde Jerusalén a Babilonia» reproduce el origen y el destino del envío sin añadir matices no presentes en el hebreo.
