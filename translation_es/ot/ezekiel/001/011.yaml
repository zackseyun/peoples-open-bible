translation:
  language: es
  text: Sus rostros y sus alas se extendían por separado arriba[a]; cada uno tenía dos unidas entre sí[b], y dos que cubrían sus cuerpos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "estaban separadas arriba". El verbo hebreo significa principalmente "estar separadas/divididas", pero en el contexto también puede implicar que las alas estaban extendidas hacia arriba.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, "para cada uno, dos estaban unidas, cada una con la de la otra, y dos cubrían sus cuerpos". La frase hebrea es distributiva y compacta.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּפְנֵיהֶם
  english_pob_choice: their faces
  chosen_spanish: sus rostros
  alternatives_spanish:
  - sus caras
  - sus faces
  lexicon: HALOT
  rationale: פָּנִים es formalmente plural y en este contexto visionario de seres vivientes puede expresarse naturalmente como "rostros" en español, manteniendo el plural y la referencia a las facciones visibles sin volverlo singular. "Caras" sería posible, pero "rostros" suena más digno y bíblicamente natural.
- source_word: וְכַנְפֵיהֶם
  english_pob_choice: their wings
  chosen_spanish: sus alas
  alternatives_spanish:
  - sus alas
  lexicon: HALOT
  rationale: כָּנָף se refiere de manera estándar a "alas" en este contexto de criaturas visionarias.
- source_word: פְּרֻדוֹת
  english_pob_choice: were separated
  chosen_spanish: estaban separadas
  alternatives_spanish:
  - estaban divididas
  - estaban apartadas
  lexicon: HALOT
  rationale: El verbo comunica separación/división; "estaban separadas" conserva ese núcleo léxico y suena natural en español. Se evita "extendidas" como traducción principal porque añade una interpretación más específica que el hebreo por sí solo no exige.
- source_word: מִלְמָעְלָה
  english_pob_choice: above
  chosen_spanish: arriba
  alternatives_spanish:
  - arriba
  - por arriba
  lexicon: HALOT
  rationale: La expresión indica ubicación/orientación superior. "Arriba" es breve y clara en español; mantiene la referencia espacial sin sobrecargarla con una preposición adicional.
- source_word: לְאִישׁ
  english_pob_choice: each
  chosen_spanish: cada uno
  alternatives_spanish:
  - cada uno
  - para cada uno
  lexicon: HALOT
  rationale: Aquí אִישׁ funciona distributivamente. "Cada uno" transmite ese valor sin forzar una construcción literal en español.
- source_word: שְׁתַּיִם חֹבְרוֹת אִישׁ
  english_pob_choice: two joined to one another
  chosen_spanish: dos unidas entre sí
  alternatives_spanish:
  - dos unidas la una a la otra
  - dos unidas entre una y otra
  lexicon: HALOT
  rationale: חבר expresa unión/conexión recíproca. "Unidas entre sí" conserva el sentido de relación mutua y resulta más idiomático en español que una repetición excesivamente literal.
- source_word: וּשְׁתַּיִם מְכַסּוֹת
  english_pob_choice: and two covering
  chosen_spanish: y dos que cubrían
  alternatives_spanish:
  - y dos cubrían
  - y dos cubriendo
  lexicon: HALOT
  rationale: El participio describe una acción continua o característica. "Que cubrían" mantiene ese valor descriptivo de manera natural en español.
- source_word: אֵת גְּוִיֹתֵיהֶנָה
  english_pob_choice: their bodies
  chosen_spanish: sus cuerpos
  alternatives_spanish:
  - sus cuerpos
  - sus troncos
  lexicon: HALOT
  rationale: גְּוִיָּה aquí se entiende como "cuerpo" en sentido visible/físico de las criaturas. "Cuerpos" es claro y fiel; "troncos" sería demasiado específico y poco natural en español.
translation_notes:
  revision_awareness: 'La redacción sigue el sentido del texto hebreo y el audit trail inglés: conserva "separadas arriba" como núcleo léxico y refleja la lectura recíproca de חֹבְרוֹת con "unidas entre sí", equivalente natural de "joined to one another". También mantiene el paralelismo de las dos alas restantes que cubren los cuerpos.'
  spanish_consistency_notes:
  - Se usó "Yahvé" para el tetragrámaton cuando corresponda en el proyecto, pero este versículo no lo contiene.
  - Se evitó "SEÑOR" como sustituto porque no aparece aquí ningún nombre divino.
  - '"Rostros" se eligió por el plural formal de פָּנִים y por coherencia con el registro visionario.'
  - '"Cuerpos" conserva el sentido general de גְּוִיָּה sin introducir la más específica "espaldas".'
