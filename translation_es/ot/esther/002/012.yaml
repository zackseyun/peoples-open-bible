  text: וּ/בְ/הַגִּ֡יעַ תֹּר֩ נַעֲרָ֨ה וְ/נַעֲרָ֜ה לָ/ב֣וֹא אֶל הַ/מֶּ֣לֶךְ אֲחַשְׁוֵר֗וֹשׁ מִ/קֵּץ֩ הֱי֨וֹת לָ֜/הּ כְּ/דָ֤ת הַ/נָּשִׁים֙ שְׁנֵ֣ים עָשָׂ֣ר חֹ֔דֶשׁ כִּ֛י כֵּ֥ן יִמְלְא֖וּ יְמֵ֣י מְרוּקֵי/הֶ֑ן שִׁשָּׁ֤ה חֳדָשִׁים֙ בְּ/שֶׁ֣מֶן הַ/מֹּ֔ר וְ/שִׁשָּׁ֤ה חֳדָשִׁים֙ בַּ/בְּשָׂמִ֔ים וּ/בְ/תַמְרוּקֵ֖י הַ/נָּשִֽׁים׀־׃
base_translation:
  language: en
  yaml_path: translation/ot/esther/002/012.yaml
  text: 'Now when the turn of each young woman came to go in to King Ahasuerus[a], after she had been under the regulation for the women for twelve months—for in this way the days of their beauty treatments were completed: six months with oil of myrrh[c][b], and six months with spices and women''s cosmetics—'
  footnotes:
  - marker: a
    text: Or 'according to the law/custom for the women.' The Hebrew דָּת can denote an official regulation, law, or established rule.
    reason: lexical_alternative
  - marker: b
    text: Or 'the days of their cosmetic treatment' or, less likely here, 'the days of their purification.'
    reason: lexical_alternative
  - marker: c
    text: '''Spices'' here refers to aromatic substances used in beautification, not necessarily culinary spices.'
    reason: cultural_note
