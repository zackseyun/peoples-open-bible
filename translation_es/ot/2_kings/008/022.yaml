revisions:
- from: Así que Edom se rebeló de debajo de la mano de Judá hasta hoy[a]. Entonces también Libna[b] se rebeló en aquel tiempo.
  to: Así Edom se rebeló contra el dominio de Judá hasta hoy[a]. Entonces también Libna se rebeló en aquel tiempo.
  rationale: Se reemplaza «Así que» por «Así» para evitar un matiz inferencial no exigido por el hebreo. Se sustituye «de debajo de la mano de Judá» por «contra el dominio de Judá», que comunica con claridad el sentido de sublevación frente al control de Judá, aunque sin conservar literalmente la imagen de «mano»; en español esta adaptación es preferible por naturalidad y precisión. Se elimina la nota de «Libna» por no ser necesaria.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:50:10Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido básico del hebreo: Edom se rebela políticamente contra el dominio de Judá, la situación continúa hasta el presente del narrador, y Libna también se rebela en ese mismo período. Sin embargo, «de debajo de la mano de Judá» suena poco natural en español y no refleja bien la fuerza idiomática; conviene una formulación más idiomática que preserve la imagen de sujeción. Además, la nota sobre «Libna» no está justificada por el audit trail inglés ni por una ambigüedad creada en español.'
  spanish_quality_summary: El texto es mayormente claro y digno, pero «Así que» introduce un matiz consecutivo más fuerte que el simple avance narrativo de וַיִּפְשַׁע; «de debajo de la mano» resulta forzado; y la nota de «Libna» añade aparato innecesario. «Hasta hoy» y «en aquel tiempo» son naturales. Una ligera revisión mejora fidelidad idiomática y legibilidad.
  glossary_alignment: No hay términos teológicos sensibles en este versículo. «Judá», «Edom» y «Libna» están bien. «Se rebeló» alinea correctamente con פשע. La revisión propuesta mantiene la coherencia léxica y elimina una nota no requerida.
  issues:
  - severity: medium
    issue: «de debajo de la mano de Judá» es demasiado calcado
    rationale: מִתַּחַת יַד expresa sujeción/dominio. En español, «de debajo de la mano» suena antinatural. «del dominio de Judá» o «de bajo la mano de Judá» sería mejor; la primera comunica claramente el sentido político sin torpeza.
  - severity: low
    issue: «Así que» añade matiz consecutivo innecesario
    rationale: El hebreo waw consecutivo aquí narra el hecho; «Así que» puede sugerir inferencia o consecuencia argumentativa. «Así» o ausencia de conector es más neutro.
  - severity: low
    issue: Nota [b] sobre «Libna» es innecesaria
    rationale: El inglés no preserva una nota sobre el topónimo, y el español no crea una ambigüedad que requiera explicarla. Añade aparato sin necesidad editorial.
  revised_spanish_text: Así Edom se rebeló contra el dominio de Judá hasta hoy[a]. Entonces también Libna se rebeló en aquel tiempo.
  revised_footnotes:
  - marker: a
    text: O «se sublevó» / «se apartó». El verbo hebreo expresa rebelión política contra una autoridad.
    reason: lexical_alternative
