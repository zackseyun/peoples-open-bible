id: 1TI.1.5
reference: 1 Timothy 1:5
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: τὸ δὲ τέλος τῆς παραγγελίας ἐστὶν ἀγάπη ἐκ καθαρᾶς καρδίας καὶ συνειδήσεως ἀγαθῆς καὶ πίστεως ἀνυποκρίτου,
base_translation:
  language: en
  yaml_path: translation/nt/1_timothy/001/005.yaml
  text: Now the goal of the instruction is love from a pure heart and a good conscience and sincere faith[c][b][a],
  footnotes:
  - marker: a
    text: Or 'the aim' or 'the outcome' of the instruction.
    reason: lexical_alternative
  - marker: b
    text: Or 'command' or 'charge' for 'instruction.'
    reason: lexical_alternative
  - marker: c
    text: Or 'unhypocritical faith'; πίστις can also be understood as 'faithfulness' or 'trust' in some contexts.
    reason: alternative_reading
translation:
  language: ko
  text: 이 명령의 목표[a]는 정결한 마음과 선한 양심과 거짓 없는 믿음[b]에서 우러나오는 사랑입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「귀결」 「결말」. 헬라어 τέλος는 종결이 아니라 의도된 목적을 가리킨다.
    reason: lexical_alternative
  - marker: b
    text: 또는 「위선 없는 믿음」. πίστις는 「신실함」 「신뢰」의 어감도 가지나, 본문은 사랑이 흘러나오는 진정한 신앙을 가리킨다.
    reason: alternative_reading
lexical_decisions:
- source_word: τέλος
  english_pob_choice: goal
  chosen_korean: 목표
  alternatives_korean:
  - 목적
  - 귀결
  lexicon: BDAG
  rationale: τέλος는 종결이 아니라 의도된 목적을 가리키므로 「목표」가 가장 자연스럽다.
- source_word: παραγγελίας
  english_pob_choice: instruction
  chosen_korean: 명령
  alternatives_korean:
  - 분부
  - 권면
  - 가르침
  lexicon: BDAG
  rationale: 3절 παραγγείλῃς와 동일 어근. 권위적 분부의 무게를 살려 「명령」으로 일관되게 옮긴다.
- source_word: ἀγάπη
  english_pob_choice: love
  chosen_korean: 사랑
  alternatives_korean: []
  lexicon: BDAG
  rationale: 프로젝트 표준.
- source_word: ἐκ
  english_pob_choice: from
  chosen_korean: ~에서 우러나오는
  alternatives_korean:
  - ~로부터 나오는
  lexicon: BDAG
  rationale: ἐκ의 근원·기원 어감을 한국어로 「~에서 우러나오는」으로 자연스럽게 살린다.
- source_word: καθαρᾶς καρδίας
  english_pob_choice: a pure heart
  chosen_korean: 정결한 마음
  alternatives_korean:
  - 깨끗한 마음
  - 청결한 마음
  lexicon: BDAG
  rationale: 「정결한」이 도덕적·내적 청결의 의미를 자연스럽게 담는다.
- source_word: συνειδήσεως ἀγαθῆς
  english_pob_choice: a good conscience
  chosen_korean: 선한 양심
  alternatives_korean:
  - 깨끗한 양심
  lexicon: BDAG
  rationale: ἀγαθός에 가장 가까운 「선한」을 유지한다. 「깨끗한」은 해석적 윤색이다.
- source_word: πίστεως ἀνυποκρίτου
  english_pob_choice: sincere faith
  chosen_korean: 거짓 없는 믿음
  alternatives_korean:
  - 위선 없는 믿음
  - 진실한 믿음
  lexicon: BDAG
  rationale: ἀνυπόκριτος는 「위선 없는」의 어감을 가진 부정 합성어. 한국어로는 「거짓 없는」이 더 자연스럽고 강력하다.
