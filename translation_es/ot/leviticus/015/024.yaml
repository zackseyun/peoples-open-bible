translation:
  language: es
  text: Si un hombre se acuesta con ella[a], y su impureza menstrual viene sobre él, quedará impuro durante siete días, y toda cama sobre la que se acueste quedará impura.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más explícitamente: «Si un hombre tiene relaciones sexuales con ella». El hebreo, literalmente, dice: «si un hombre ciertamente se acuesta con ella».'
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁכֹב יִשְׁכַּב
  english_pob_choice: indeed lies
  chosen_spanish: realmente se acuesta
  alternatives_spanish:
  - se acuesta con ella
  - tiene relaciones sexuales con ella
  lexicon: HALOT
  rationale: El infinitivo absoluto con el imperfecto intensifica la acción. «Realmente se acuesta» conserva esa fuerza en español sin volver demasiado técnica la frase; el objeto «con ella» mantiene el sentido idiomático de relación sexual que el contexto exige.
- source_word: אִישׁ
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - alguien
  - un varón
  lexicon: HALOT
  rationale: El sustantivo es singular masculino y designa a un adulto varón. «Un hombre» es natural y fiel al valor léxico.
- source_word: אֹתָהּ
  english_pob_choice: her
  chosen_spanish: ella
  alternatives_spanish:
  - a ella
  lexicon: HALOT
  rationale: El pronombre retoma a la mujer mencionada en el contexto; en español, la construcción verbal «acostarse con ella» expresa de modo natural el objeto directo.
- source_word: נִדָּתָהּ
  english_pob_choice: her menstrual impurity
  chosen_spanish: su impureza menstrual
  alternatives_spanish:
  - su menstruación
  - su periodo
  - su impureza
  - su inmundicia menstrual
  lexicon: HALOT
  rationale: En Levítico, נִדָּה nombra el estado ritual asociado a la menstruación, no solo el evento biológico. «Impureza menstrual» preserva el ámbito ritual sin convertirlo en un término moral.
- source_word: וּתְהִי ... עָלָיו
  english_pob_choice: comes upon him
  chosen_spanish: cae sobre él
  alternatives_spanish:
  - viene sobre él
  - recae sobre él
  - está sobre él
  lexicon: HALOT
  rationale: Literalmente es «y estará sobre él». «Cae sobre él» comunica con naturalidad la transferencia/impacto de la impureza en español, manteniendo la imagen del texto.
- source_word: וְטָמֵא
  english_pob_choice: he shall be unclean
  chosen_spanish: quedará impuro
  alternatives_spanish:
  - será impuro
  - será considerado impuro
  - quedará inmundo
  lexicon: HALOT
  rationale: En contexto legal, la forma expresa el resultado prescriptivo. «Quedará impuro» suena jurídico y refleja el estado resultante sin cargarlo innecesariamente de valoración moral.
- source_word: שִׁבְעַת יָמִים
  english_pob_choice: seven days
  chosen_spanish: siete días
  alternatives_spanish:
  - por siete días
  lexicon: HALOT
  rationale: Expresión cardinal directa y convencional en español.
- source_word: הַמִּשְׁכָּב
  english_pob_choice: bed
  chosen_spanish: cama
  alternatives_spanish:
  - lecho
  - cama de descanso
  - lugar donde se acuesta
  lexicon: HALOT
  rationale: El sustantivo puede referirse al lugar de acostarse. «Cama» es la opción más natural en español y adecuada al marco ritual.
- source_word: אֲשֶׁר יִשְׁכַּב עָלָיו
  english_pob_choice: on which he lies
  chosen_spanish: sobre la que se acueste
  alternatives_spanish:
  - en la que se acueste
  - sobre la que él se acueste
  - donde se acueste
  lexicon: HALOT
  rationale: La relativa modifica «cama». «Sobre la que se acueste» sigue de cerca la sintaxis hebrea y mantiene la idea de apoyo/superficie.
- source_word: יִטְמָא
  english_pob_choice: shall be unclean
  chosen_spanish: quedará impura
  alternatives_spanish:
  - será impura
  - se contaminará
  lexicon: HALOT
  rationale: Mantiene la terminología ritual de impureza y el valor consecuencial del imperfecto legal.
theological_decisions:
- issue: Lenguaje de pureza ritual sin moralizar el estado de impureza
  english_pob_reading: Use 'unclean' and 'menstrual impurity' as ritual-purity terms
  chosen_spanish_reading: Usar «impuro» e «impureza menstrual» como términos de pureza ritual
  alternative_spanish_readings:
  - inmundo
  - contaminado
  - impuro en sentido moral
  rationale: Levítico 15 trata de impureza ritual, no de culpa moral directa en este versículo. «Impuro» e «impureza menstrual» conservan la categoría bíblica sin importar una condena ética que el texto no afirma aquí.
  doctrine_reference: La traducción debe preservar el sentido llano del texto fuente sin añadir afirmaciones doctrinales ajenas al pasaje.
translation_notes:
  revision_awareness: La versión inglesa más reciente no mostró cambios sustanciales y recibió acuerdo alto; esta propuesta sigue esa línea, trasladando al español la misma decisión léxica sobre el idiomatismo sexual, el lenguaje de impureza ritual y la consecuencia legal, sin introducir paráfrasis adicionales.
  spanish_consistency_notes:
  - Se mantiene «impureza» en sentido ritual, no moral.
  - Se usa «quedará impuro» para reflejar la consecuencia jurídica del texto.
  - «Cama» traduce el objeto cotidiano de «מִּשְׁכָּב» en un registro claro y bíblico.
  - La nota a conserva la alternativa explícita sobre relaciones sexuales, como en el audit trail inglés.
