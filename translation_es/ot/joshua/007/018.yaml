revisions:
- from: Entonces hizo acercar su casa[a] a los hombres, y Acan, hijo de Carmi, hijo de Zabdi, hijo de Zera, de la tribu de Judá, fue tomado.
  to: Entonces hizo acercarse a su familia, hombre por hombre[a], y Acan, hijo de Carmi, hijo de Zabdi, hijo de Zera, de la tribu de Judá, fue tomado.
  rationale: Se corrige la frase procedimental para reflejar mejor לַגְּבָרִים, siguiendo la auditoría inglesa y el hebreo subyacente. También se reemplaza «su casa» por «su familia» para evitar la lectura de edificio y comunicar el sentido de unidad doméstica en este contexto narrativo. Se mantiene «fue tomado» por fidelidad a וַיִּלָּכֵד y se conserva la genealogía formal.
