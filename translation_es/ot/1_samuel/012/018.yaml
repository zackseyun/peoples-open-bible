translation:
  language: es
  text: Entonces Samuel clamó a Yahvé[a], y Yahvé envió truenos y lluvia aquel día; y todo el pueblo temió mucho a Yahvé y a Samuel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «voces»; en este contexto de tormenta, el término se refiere a truenos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרָא
  english_pob_choice: called
  chosen_spanish: clamó
  alternatives_spanish:
  - llamó
  - invocó
  lexicon: HALOT
  rationale: El verbo קרא con אֶל seguido de YHWH, en este contexto de oración y súplica, puede expresar un clamor dirigido a Dios. 'Clamó' conserva mejor en español la intensidad devocional del acto que un simple 'llamó', sin dejar de ser fiel al llamado directo a Yahvé.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - SEÑOR
  lexicon: HALOT
  rationale: Se mantiene el nombre propio del pacto como 'Yahvé', conforme al criterio del proyecto para יְהוָה. No se sustituye por una титulación como 'SEÑOR', para conservar la referencia nominal directa del hebreo.
- source_word: וַיִּתֵּן
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - dio
  - produjo
  lexicon: HALOT
  rationale: Aunque el verbo base es 'dar', en este contexto Dios hace venir la tormenta como señal. 'Envió' expresa en español la causación divina de los truenos y la lluvia de un modo natural y acorde con la lectura contextual auditada.
- source_word: קֹלֹת
  english_pob_choice: thunder
  chosen_spanish: truenos
  alternatives_spanish:
  - voces
  - sonidos
  - truenos y relámpagos
  lexicon: HALOT
  rationale: En contexto de tormenta, קֹלֹת alude a truenos. 'Truenos' comunica el fenómeno meteorológico implicado; 'voces' o 'sonidos' serían demasiado literales y opacos para el lector español.
- source_word: וּמָטָר
  english_pob_choice: rain
  chosen_spanish: lluvia
  alternatives_spanish:
  - aguacero
  - chubasco
  lexicon: HALOT
  rationale: מָטָר se traduce de forma directa como 'lluvia'. 'Aguacero' intensificaría indebidamente el término si no se explicitara en el hebreo.
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: that day
  chosen_spanish: aquel día
  alternatives_spanish:
  - ese día
  - en aquel día
  lexicon: HALOT
  rationale: '''Aquel día'' reproduce de manera idiomática la referencia temporal definida del hebreo y suena natural en español bíblico contemporáneo.'
- source_word: וַיִּירָא
  english_pob_choice: feared
  chosen_spanish: temió
  alternatives_spanish:
  - tuvo miedo de
  - estuvo en temor de
  lexicon: HALOT
  rationale: יָרֵא conserva en este verso el peso de una reacción reverente y temerosa ante la señal divina. 'Temió' preserva esa densidad mejor que una paráfrasis como 'estuvo en temor'.
- source_word: כָל הָעָם
  english_pob_choice: all the people
  chosen_spanish: todo el pueblo
  alternatives_spanish:
  - todo el pueblo de Israel
  - la gente
  lexicon: HALOT
  rationale: '''Todo el pueblo'' reproduce el alcance colectivo de כָל הָעָם sin añadir especificaciones que el hebreo no expresa aquí.'
- source_word: מְאֹד
  english_pob_choice: greatly
  chosen_spanish: mucho
  alternatives_spanish:
  - en gran manera
  - sumamente
  lexicon: HALOT
  rationale: El adverbio intensifica el temor. 'Mucho' es una forma breve y natural en español; 'en gran manera' sería más tradicional pero menos fluido.
- source_word: אֶת יְהוָה וְאֶת שְׁמוּאֵל
  english_pob_choice: the LORD and Samuel
  chosen_spanish: a Yahvé y a Samuel
  alternatives_spanish:
  - de Yahvé y de Samuel
  - ante Yahvé y Samuel
  lexicon: HALOT
  rationale: 'Se conserva la doble referencia con objeto marcado: el pueblo teme tanto a Yahvé como a Samuel. En español, la preposición ''a'' mantiene la estructura del objeto personal y evita diluir la fuerza sintáctica del hebreo.'
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrama. Se preserva el nombre divino en forma transliterada para mantener la transparencia y la audibilidad del original, conforme al criterio doctrinal del proyecto.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Temor hacia Yahvé y Samuel
  english_pob_reading: feared Yahweh and Samuel
  chosen_spanish_reading: temió mucho a Yahvé y a Samuel
  alternative_spanish_readings:
  - tuvo mucho temor de Yahvé y de Samuel
  - estuvo en reverencia ante Yahvé y respeto por Samuel
  rationale: El hebreo usa el mismo verbo para ambos objetos, sin separar explícitamente temor reverente y respeto social. La traducción conserva esa tensión y no la resuelve artificialmente; el contexto indica reverencia ante Yahvé y temor/respetuoso reconocimiento hacia Samuel como profeta.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3'
translation_notes:
  revision_awareness: 'El pasaje coincide plenamente con el audit trail inglés: no hubo cambios de revisión posteriores, y la solución española mantiene la decisión contextual sobre קֹלֹת como ''truenos'' y la rendición del nombre divino como ''Yahvé''.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma consistente para יְהוָה, sin sustituirlo por un título.
  - Se mantiene un registro bíblico moderno y digno, evitando calcos duros donde el español natural exige una formulación idiomática.
  - '''Temió'' conserva la ambigüedad reverente/temerosa del hebreo sin reducirla a mera emoción psicológica.'
