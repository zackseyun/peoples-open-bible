translation:
  language: es
  text: No entregues tu paloma[a] a la bestia salvaje; no olvides para siempre la vida de tus afligidos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tu tórtola». El hebreo puede referirse más específicamente a una tórtola, imagen apropiada de vulnerabilidad.
    reason: lexical_alternative
  - marker: b
    text: O «No olvides para siempre a tus afligidos». El hebreo usa un singular («vida»), que puede entenderse en sentido colectivo o como referencia a las vidas de los afligidos.
    reason: lexical_alternative
lexical_decisions:
- source_word: חַיַּת
  english_pob_choice: wild beast
  chosen_spanish: animal salvaje
  alternatives_spanish:
  - bestia salvaje
  - fiera
  - animal feroz
  lexicon: HALOT
  rationale: La construcción hebrea comunica una criatura salvaje y hostil. En español, «animal salvaje» preserva la idea de un depredador sin introducir un matiz más fuerte que el texto soporte. Evita además sobrecargar «bestia» con un tono excesivamente literario para este lamento.
- source_word: נֶפֶשׁ
  english_pob_choice: life
  chosen_spanish: vida
  alternatives_spanish:
  - alma
  - ser
  - persona
  lexicon: HALOT
  rationale: Aquí נֶפֶשׁ apunta a la vida o existencia, no al alma inmortal. «Vida» mantiene el sentido concreto y encaja con el paralelismo del ruego.
- source_word: תּוֹרֶךָ
  english_pob_choice: your dove
  chosen_spanish: tu paloma
  alternatives_spanish:
  - tu tórtola
  - tu tórtola silvestre
  lexicon: HALOT
  rationale: El hebreo puede referirse de manera más específica a una tórtola, pero «paloma» es la forma más natural y clara en español moderno para conservar la imagen de vulnerabilidad. La opción más específica se deja como alternativa.
- source_word: עֲנִיֶּיךָ
  english_pob_choice: your afflicted ones
  chosen_spanish: tus afligidos
  alternatives_spanish:
  - tus pobres
  - tus oprimidos
  - tus necesitados
  lexicon: HALOT
  rationale: El término abarca aflicción, pobreza y opresión. «Afligidos» reproduce bien el dolor sufrido sin restringir indebidamente el campo semántico a una sola condición social.
- source_word: לָנֶצַח
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - eternamente
  - perpetuamente
  - sin cesar
  lexicon: HALOT
  rationale: La frase expresa duración indefinida o permanente. «Para siempre» es la equivalencia natural y solemne en español para una súplica negativa de este tipo.
- source_word: אַל תִּתֵּן ... אַל תִּשְׁכַּח
  english_pob_choice: Do not give ... do not forget
  chosen_spanish: No entregues ... no olvides
  alternatives_spanish:
  - No des ... no olvides
  - No pongas ... no recuerdes
  lexicon: HALOT
  rationale: Aunque נתן puede traducirse literalmente «dar», en este contexto de peligro la idea es de ceder o poner en manos hostiles; «entregues» expresa mejor esa fuerza sin abandonar el verbo básico. «Olvides» reproduce con naturalidad el imperativo negativo hebreo.
translation_notes:
  revision_awareness: El trabajo base en inglés pasó por revisiones sobre cómo entender la construcción de חַיַּת en el primer hemistiquio y sobre si traducir נֶפֶשׁ en singular o como plural implícito. La versión española sigue el texto masorético y conserva la tensión entre la imagen del ave vulnerable y la amenaza del animal salvaje, además de mantener «vida» en singular en el segundo hemistiquio mientras la nota admite la lectura colectiva/plural. No se adopta una paráfrasis como «dejar en manos de» porque el audit trail inglés privilegia una correspondencia más directa con נתן.
  spanish_consistency_notes:
  - Se mantiene un tono de súplica poética adecuado a los Salmos.
  - «Afligidos» se usa de forma consistente para עֲנִיִּים/עֲנִיֶּיךָ en contextos de lamento cuando el énfasis es sufrimiento más que pobreza económica.
  - «Para siempre» conserva la duración enfática de לָנֶצַח sin añadir matices doctrinales.
  - La imagen del ave se conserva sin sustituirla por metáforas eclesiásticas posteriores.
