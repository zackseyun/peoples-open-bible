    rationale: 'En el texto español [b] aparece tras «descendiste», pero la nota dice «O: “delante de ti”; literalmente, “de delante de tu rostro/presencia”», lo cual explica מִפָּנֶיךָ, no ירדת. Esto desalineó el aparato crítico respecto del hebreo y del audit trail inglés.'
  - severity: medium
