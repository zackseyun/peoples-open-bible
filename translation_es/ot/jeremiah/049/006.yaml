    rationale: Aunque literal, el inglés auditado justificó una forma colectiva equivalente a «the people of Ammon». En español neutral y legible, «el pueblo de Amón» preserva mejor el sentido nacional/colectivo sin literalismo innecesario.
  - severity: low
    issue: «la suerte» resulta menos natural aquí
    rationale: Para la fórmula idiomática de restauración, «la fortuna» funciona mejor en español bíblico moderno. «La suerte» no es incorrecta, pero puede sonar más coloquial o ambiguo.
  - severity: low
