review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura básica del hebreo: ''flechas ... de un guerrero ... con brasas''. También preserva la alternativa léxica de שְׁנוּנִים en nota. Sin embargo, ''retam'' como transliteración en el texto principal no sigue la decisión auditada del POB inglés (''broom tree'') ni la preferencia de legibilidad en español cuando existe un equivalente claro; además, la nota cultural ya presupone ''retama del desierto''.'
  spanish_quality_summary: El español es claro y digno. 'Flechas agudas' es comprensible, aunque 'afiladas' encaja más naturalmente con flechas en español bíblico moderno. El principal problema de legibilidad es 'retam', que suena técnico y opaco para lectores hispanos generales. 'Retama' comunica mejor sin perder el referente botánico, y la nota puede conservar el matiz cultural.
  glossary_alignment: 'No hay conflictos con términos teológicos del glosario. La revisión propuesta ajusta una decisión léxica-cultural: רְתָמִים debe verterse como ''retama'' en el texto principal, no ''retam'', porque el proyecto pide español claro y no hay razón documentada suficiente para preferir la transliteración sobre el equivalente común. Se conserva nota cultural sobre la planta.'
  issues:
  - severity: medium
    issue: Uso de 'retam' transliterado en el texto principal
    rationale: El hebreo רְתָמִים nombra la planta conocida convencionalmente como retama del desierto/broom tree. La transliteración reduce la inteligibilidad en español y no está respaldada por la pista inglesa, que opta por un nombre común de la especie y deja el detalle botánico para nota.
  - severity: low
    issue: La nota [a] está redactada de forma poco natural
    rationale: '"''O: «afiladas».''" contiene puntuación innecesaria y comillas redundantes. Debe normalizarse a una formulación editorial limpia en español.'
  - severity: low
    issue: '''Agudas'' para flechas es menos idiomático que ''afiladas'''
    rationale: Aunque semánticamente posible, en español 'flechas afiladas' reproduce mejor el valor de שְׁנוּנִים y la alternativa inglesa documentada ('sharpened').
  revised_spanish_text: Flechas afiladas de un guerrero,[a] con brasas de la retama[b].
  revised_footnotes:
  - marker: a
    text: 'O: «flechas agudas de un hombre poderoso»'
    reason: lexical_alternative
  - marker: b
    text: La retama del desierto (hebreo retam) era apreciada por producir carbón de larga duración.
    reason: cultural_note
  revision_rationale: Se cambia 'retam' por 'la retama' para seguir mejor la evidencia léxica y la claridad del español, dejando el hebreo técnico en la nota cultural. También se ajusta 'agudas' a 'afiladas' por mayor naturalidad e idiomaticidad, conservando la alternativa documentada en una nota más limpia. No se requiere adjudicación adicional porque la corrección es directa y no doctrinalmente sensible.
