  revision_rationale: Se reubicó la nota al término correcto ('naciones'). Se mejoró γενόμενος ... ἐν συστήματι a 'había formado un grupo' por mayor naturalidad y fidelidad contextual. Se reemplazó 'se había vuelto misericordia' por 'se había tornado en misericordia' para expresar de forma más idiomática el cambio metafórico de la ira a la misericordia, manteniendo la causalidad teológica del griego. No se requiere adjudicación adicional porque la corrección es local y clara.
