review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del hebreo: sujeto legal general («Quienquiera que sacrifique»), objeto idolátrico distributivo («a cualquier dios»), excepción exclusiva («excepto a Yahvé solo») y sanción de חרם. También acierta en usar «Yahvé» conforme al proyecto. Sin embargo, la formulación principal de la pena como «será entregado al anatema» no preserva con suficiente claridad en español actual el sentido documentado de ''ser puesto bajo חרם / dedicado irrevocablemente a destrucción''; puede sonar eclesiástico o excomulgatorio más que penal-destruccional.'
  spanish_quality_summary: El español es generalmente claro y digno, pero «Quienquiera que» suena algo más pesado de lo necesario en una ley breve, y «Yahvé solo» es entendible aunque «solo a Yahvé» o «a Yahvé únicamente» suele sonar más natural en español. Lo más importante es que «entregado al anatema» resulta menos transparente que una formulación que explicite destrucción/devoción a destrucción. Conviene una reparación menor para fidelidad y legibilidad.
  glossary_alignment: 'Hay buena alineación con la terminología del proyecto en «Yahvé» y «dios». No hay conflicto con términos doctrinales principales. La divergencia está en חרם: «anatema» no es imposible, pero aquí no comunica tan bien como «será consagrado[a] a destrucción» o similar la fuerza legal-teológica documentada por el POB. La nota existente puede conservar alternativas, pero el texto principal debe expresar mejor la destrucción irrevocable.'
  issues:
  - severity: medium
    issue: La pena «será entregado al anatema» es semánticamente ambigua en español.
    rationale: En uso eclesiástico moderno, «anatema» suele evocar maldición o excomunión, no necesariamente quedar dedicado irrevocablemente a destrucción. El hebreo יָחֳרָם exige que el texto principal preserve la fuerza de חרם, no solo la nota.
  - severity: low
    issue: «Quienquiera que» suena más pesado que necesario.
    rationale: «Quien sacrifique» o «El que sacrifique» conserva el valor legal general de forma más natural en español bíblico moderno.
  - severity: low
    issue: La colocación «excepto a Yahvé solo» es correcta pero algo menos idiomática.
    rationale: «excepto solo a Yahvé» sería ambiguo, pero «salvo a Yahvé únicamente» o «excepto a Yahvé únicamente» fluye mejor; aun así, no es un error grave.
  revised_spanish_text: Quien sacrifique a cualquier dios, excepto a Yahvé únicamente, será consagrado[a] a destrucción.
  revised_footnotes:
  - marker: a
    text: 'O: «será puesto bajo el anatema» o «será totalmente destruido». El verbo hebreo implica quedar irrevocablemente dedicado a destrucción.'
    reason: lexical_alternative
  revision_rationale: 'Se ajusta la cláusula penal para que el texto principal exprese con mayor claridad la idea de חרם documentada por el POB: no mera destrucción, sino dedicación irrevocable a destrucción. También se aligera el sujeto legal a «Quien sacrifique» y se hace más natural la exclusividad con «Yahvé únicamente». La nota léxica se conserva como alternativa tradicional/técnica.'
