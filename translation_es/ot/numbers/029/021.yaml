    rationale: מִנְחָה en listas cúlticas se refiere convencionalmente a la ofrenda de cereal/grano que acompaña al sacrificio; 'vegetal' puede sonar demasiado amplio.
  - severity: low
    issue: '''Conforme al estatuto'' es aceptable, pero ''ordenanza'' refleja mejor el matiz ritual-normativo y el audit trail inglés.'
    rationale: כַּמִּשְׁפָּט aquí apunta a una regla ritual establecida; 'ordenanza' suena más natural en español bíblico para este contexto.
  revised_spanish_text: y sus ofrendas de cereal y sus libaciones, para los toros[a], para los carneros y para los corderos, conforme a su número, conforme a la ordenanza[b];
