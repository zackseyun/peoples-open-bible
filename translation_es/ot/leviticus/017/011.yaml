  to: Porque la vida[a] de la carne está en la sangre, y yo les he dado la sangre sobre el altar para hacer expiación por sus vidas[b], porque la sangre es la que, por la vida[c], hace expiación.
  rationale: 'Se explicitó “la sangre” como objeto de “he dado” para corregir una ambigüedad significativa introducida por el clítico femenino. También se redujeron y alinearon las notas con el rastro de auditoría inglés: se conservaron las dos notas léxicas sobre nephesh y una nota de lectura alternativa para la cláusula final debatida, formulada de manera más cercana al POB inglés.'
