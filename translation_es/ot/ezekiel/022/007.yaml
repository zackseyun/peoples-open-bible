    text: O «han deshonrado» o «han menospreciado» para «han tratado con desprecio».
    reason: lexical_alternative
  - marker: b
    text: O «al huérfano y a la viuda». El hebreo dice más literalmente «al que no tiene padre».
    reason: lexical_alternative
  - marker: c
    text: La repetición de «en ti» dirige la acusación a la ciudad personificada, Jerusalén, tratada como mujer.
    reason: cultural_note
