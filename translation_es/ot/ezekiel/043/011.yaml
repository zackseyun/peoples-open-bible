translation:
  language: es
  text: Y si se avergüenzan de todo lo que han hecho, hazles conocer el diseño[a] de la casa, su disposición, sus salidas, sus entradas, todas sus formas, todos sus estatutos y todas sus leyes[b]; y escríbelo delante de sus ojos, para que guarden todo su diseño y todos sus estatutos, y los hagan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la forma/el patrón de la casa ... todas sus formas ... todo su patrón». El hebreo repite lenguaje de צוּרָה, enfatizando el patrón estructural del templo.
    reason: lexical_alternative
  - marker: b
    text: «Sus leyes» también puede entenderse como «sus instrucciones». El hebreo תּוֹרָה puede abarcar instrucción normativa además de ley en sentido estricto.
    reason: lexical_alternative
lexical_decisions:
- source_word: נִכְלְמוּ
  english_pob_choice: are ashamed
  chosen_spanish: se avergüenzan
  alternatives_spanish:
  - se humillan
  - se avergüencen
  - quedan avergonzados
  lexicon: HALOT
  rationale: El nifal expresa vergüenza o humillación ante la conciencia de lo hecho. En español, «se avergüenzan» conserva la reacción moral y es natural en una condición introductoria.
- source_word: צוּרַת הַבַּיִת
  english_pob_choice: the design of the house
  chosen_spanish: el diseño de la casa
  alternatives_spanish:
  - la forma de la casa
  - el patrón de la casa
  - el plano de la casa
  lexicon: HALOT
  rationale: En este contexto de visión arquitectónica, צוּרָה apunta al perfil/estructura del templo. «Diseño» comunica forma y planificación sin volver demasiado técnico el español.
- source_word: תְכוּנָתוֹ
  english_pob_choice: its arrangement
  chosen_spanish: su disposición
  alternatives_spanish:
  - su arreglo
  - su ordenamiento
  - su distribución
  lexicon: HALOT
  rationale: El sustantivo indica configuración ordenada o estructura medida. «Disposición» reproduce bien la idea de organización espacial en español bíblico moderno.
- source_word: מוֹצָאָיו
  english_pob_choice: its exits
  chosen_spanish: sus salidas
  alternatives_spanish:
  - sus salidas al exterior
  - sus puntos de salida
  - sus salidas/egresos
  lexicon: HALOT
  rationale: En un marco arquitectónico, el término se refiere a los puntos por donde se sale del edificio o recinto. «Salidas» es claro y directo.
- source_word: מוֹבָאָיו
  english_pob_choice: its entrances
  chosen_spanish: sus entradas
  alternatives_spanish:
  - sus accesos
  - sus puertas de entrada
  - sus ingresos
  lexicon: HALOT
  rationale: En paralelo con «salidas», el término designa los puntos de acceso al recinto. «Entradas» mantiene el paralelismo y la claridad.
- source_word: צֽוּרֹתָיו
  english_pob_choice: all its forms
  chosen_spanish: todas sus formas
  alternatives_spanish:
  - todos sus patrones
  - todas sus figuras
  - todos sus diseños
  lexicon: HALOT
  rationale: La repetición de צורָה subraya la forma/patrón estructural del templo. «Formas» conserva el paralelismo léxico y la insistencia del hebreo.
- source_word: חֻקֹּתָיו
  english_pob_choice: its statutes
  chosen_spanish: sus estatutos
  alternatives_spanish:
  - sus decretos
  - sus ordenanzas
  - sus preceptos
  lexicon: HALOT
  rationale: חֹק/חֻקָּה denota norma prescriptiva establecida. «Estatutos» preserva el valor legal-normativo y es término bíblico comprensible en español.
- source_word: תּוֹרֹתָיו
  english_pob_choice: its laws
  chosen_spanish: sus leyes
  alternatives_spanish:
  - sus instrucciones
  - sus enseñanzas
  - sus normas
  lexicon: HALOT
  rationale: Aquí תּוֹרָה funciona dentro de una lista normativa. «Leyes» distingue este término de «estatutos» y mantiene el peso jurídico del pasaje.
- source_word: הוֹדַע אוֹתָם
  english_pob_choice: make known to them
  chosen_spanish: hazles conocer
  alternatives_spanish:
  - dales a conocer
  - haz que lo conozcan
  - informa a ellos
  lexicon: HALOT
  rationale: El hiphil de ידע expresa causar conocimiento. «Hazles conocer» es formal, claro y fiel al mandato dirigido al profeta.
- source_word: וּכְתֹב לְעֵינֵיהֶם
  english_pob_choice: write it before their eyes
  chosen_spanish: escríbelo delante de sus ojos
  alternatives_spanish:
  - escríbelo ante sus ojos
  - escríbelo en su presencia
  - ponlo por escrito a la vista de ellos
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y pública. «Delante de sus ojos» mantiene la imagen de algo escrito a la vista de todos.
- source_word: וְיִשְׁמְרוּ
  english_pob_choice: so that they may keep
  chosen_spanish: para que guarden
  alternatives_spanish:
  - para que observen
  - para que cumplan
  - a fin de que conserven
  lexicon: HALOT
  rationale: שׁמר aquí es observar/cumplir cuidadosamente. «Guardar» es la equivalencia bíblica natural en español y conserva la idea de obediencia atenta.
- source_word: וְעָשׂוּ אוֹתָם
  english_pob_choice: and do them
  chosen_spanish: y los hagan
  alternatives_spanish:
  - y los cumplan
  - y los practiquen
  - y los realicen
  lexicon: HALOT
  rationale: El hebreo culmina con la ejecución concreta de lo mandado. «Hacerlos» preserva el verbo simple y completo del original, sin suavizar la exigencia.
theological_decisions:
- issue: Cómo reflejar la tensión entre visión arquitectónica y norma jurídica en el templo idealizado
  english_pob_reading: Use architectural language ('design,' 'arrangement,' 'exits,' 'entrances') while preserving the normative terms ('statutes,' 'laws') without resolving larger interpretive debates about the temple's fulfillment.
  chosen_spanish_reading: Usar lenguaje arquitectónico («diseño», «disposición», «salidas», «entradas») y conservar los términos normativos («estatutos», «leyes») sin decidir si la visión es meramente simbólica o estrictamente constructiva.
  alternative_spanish_readings:
  - 'Volver todo más literal: «forma», «patrón» en cada caso'
  - 'Volver todo más interpretativo: «planos» y «reglamentos»'
  rationale: El verso combina vocabulario de estructura y de mandato. La traducción española conserva esa tensión en vez de resolverla anticipadamente.
  doctrine_reference: Translation philosophy §3
- issue: Cómo tratar la repetición de צורָה sin perder naturalidad en español
  english_pob_reading: Preserve the repetition substantially, but vary the final occurrence to 'its whole design' for natural English.
  chosen_spanish_reading: Conservar la repetición de «forma» en la medida posible, usando aquí «todas sus formas» para la primera serie y manteniendo la lista completa sin eliminar el eco retórico del hebreo.
  alternative_spanish_readings:
  - Usar «forma» en todas las apariciones
  - Sustituir por «patrón» en una o más apariciones
  rationale: La repetición es significativa en hebreo; en español, «formas» conserva esa insistencia sin sonar artificial. No se oculta ni se borra la reiteración del original.
  doctrine_reference: Translation philosophy §5
translation_notes:
  revision_awareness: 'El texto español sigue la última revisión del audit trail, que eliminó una repetición accidental en la serie inglesa de «all its forms». Aquí se mantiene la secuencia hebrea relevante sin duplicaciones artificiales y con el cierre normativo completo: formas, estatutos y leyes.'
  spanish_consistency_notes:
  - Se usa «Yahvé» no aplica en este versículo porque el Tetragrámaton no aparece en el texto base.
  - Se prefiere «leyes» para תּוֹרֹתָיו en coherencia con la lista normativa y para distinguirlo de «estatutos».
  - Se conserva el paralelismo «salidas/entradas» para מוֹצָאָיו / מוֹבָאָיו.
  - «Delante de sus ojos» mantiene el valor público y visual de la expresión hebrea, sin añadir matices interpretativos no presentes en el original.
