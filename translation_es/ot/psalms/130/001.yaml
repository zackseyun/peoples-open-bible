translation:
  language: es
  text: Cántico de ascenso[a]. Desde las profundidades clamo a ti, Yahvé[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Cántico de ascenso», el título tradicional de este grupo de salmos.'
    reason: cultural_note
  - marker: b
    text: 'O: «Desde las profundidades he clamado a ti, oh Yahvé». El verbo hebreo puede entenderse como pasado simple; el texto principal usa presente para conservar la inmediatez de la oración del salmo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁיר
  english_pob_choice: A Song
  chosen_spanish: Cántico
  alternatives_spanish:
  - Un canto
  - Canción
  lexicon: HALOT
  rationale: שִׁיר designa un canto o composición poética musical. En una cabecera salmódica, «Cántico» comunica bien el género sin forzar el término técnico «salmo» cuando el hebreo dice simplemente «canto».
- source_word: הַמַּעֲלוֹת
  english_pob_choice: of Ascents
  chosen_spanish: de ascensos
  alternatives_spanish:
  - de las ascensiones
  - para subir
  lexicon: HALOT
  rationale: El sustantivo plural מַעֲלוֹת se relaciona con la idea de subir/ascender. «Ascensos» conserva la noción tradicional del título de colección y suena natural en español, aunque permanece algo abierto como en el hebreo.
- source_word: מִמַּעֲמַקִּים
  english_pob_choice: Out of the depths
  chosen_spanish: Desde lo profundo
  alternatives_spanish:
  - Desde las profundidades
  - Desde lo hondo
  lexicon: HALOT
  rationale: La imagen hebrea es plural y metafórica, de gran aflicción. «Desde lo profundo» mantiene la fuerza poética y evita una formulación demasiado rígida; el plural puede explicitarse con «las profundidades», pero el singular colectivo fluye mejor en español.
- source_word: קְרָאתִיךָ
  english_pob_choice: I cry to you
  chosen_spanish: clamo a ti
  alternatives_spanish:
  - grito a ti
  - he clamado a ti
  lexicon: HALOT
  rationale: El verbo קרא puede expresar invocar, llamar, clamar. Dado que la POB inglesa opta por «cry» para preservar la urgencia, «clamo» reproduce el acto de súplica en presente y la inmediatez del salmo; «he clamado» sería posible por el qatal, pero aquí se conserva el valor orante actual.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: El tetragrámaton יְהוָה se vierte con el nombre divino «Yahvé» según el criterio del proyecto, en lugar de sustituirlo por un título. Esto preserva el nombre personal del Dios de Israel de forma transparente en español.
theological_decisions:
- issue: Traducción del nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - SEÑOR
  rationale: La línea doctrinal del proyecto exige transliterar el Nombre divino y no ocultarlo tras una sustitución. «Yahvé» mantiene la referencia al pacto y evita la neutralización litúrgica del texto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: El inglés auditado pasó de «call» a «cry» para reflejar mejor el tono urgente del hebreo. La versión española adopta igualmente un presente intensivo («clamo») para conservar esa inmediatez orante, y mantiene el nombre divino como «Yahvé» conforme al criterio doctrinal actualizado.
  spanish_consistency_notes:
  - Se preserva el paralelismo breve de la cabecera poética con puntuación simple.
  - Se evita «SEÑOR» para YHWH por coherencia con la terminología del proyecto.
  - «Cántico» y «clamo» mantienen un registro bíblico digno sin caer en arcaísmos innecesarios.
  - La nota sobre «ascensos» conserva la apertura semántica del título hebreo sin sobredeterminar su trasfondo histórico.
