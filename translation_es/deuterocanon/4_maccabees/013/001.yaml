translation:
  language: es
  text: Por tanto[a], como los siete hermanos despreciaron los padecimientos[b] hasta la muerte, se reconoce por todas partes que la razón piadosa tiene dominio sobre las pasiones[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «Así pues» o «Por consiguiente».'
    reason: lexical_alternative
  - marker: b
    text: También puede entenderse como «dolores» o «tormentos»; el griego expresa sufrimientos intensos que llegan hasta la muerte.
    reason: lexical_alternative
  - marker: c
    text: «Pasiones» designa en 4 Macabeos impulsos o inclinaciones desordenadas, no meramente sentimientos en general.
    reason: cultural_note
lexical_decisions:
- source_word: δὲ τοίνυν
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Así pues
  - Entonces
  - Por consiguiente
  lexicon: LSJ
  rationale: La combinación inferencial introduce una conclusión; «Por tanto» conserva el valor lógico de manera natural en español.
- source_word: τῶν μέχρι θανάτου πόνων
  english_pob_choice: pains even to death
  chosen_spanish: los dolores hasta la muerte
  alternatives_spanish:
  - los padecimientos hasta la muerte
  - los tormentos hasta la muerte
  - los dolores incluso hasta la muerte
  lexicon: LSJ
  rationale: πόνων admite «dolores» o «padecimientos»; «hasta la muerte» conserva el alcance de μέχρι θανάτου sin añadir matices ajenos.
- source_word: ὑπερεφρόνησαν
  english_pob_choice: despised
  chosen_spanish: despreciaron
  alternatives_spanish:
  - desestimaron
  - miraron con desprecio
  - tuvieron por cosa menor
  lexicon: LSJ
  rationale: El verbo expresa tratar algo como indigno de consideración; «despreciaron» reproduce mejor esa fuerza que una mera apreciación mental.
- source_word: οἱ ἑπτὰ ἀδελφοί
  english_pob_choice: the seven brothers
  chosen_spanish: los siete hermanos
  alternatives_spanish:
  - los siete hermanos varones
  - los siete hermanos de una misma familia
  lexicon: LSJ
  rationale: ἀδελφοί es plural masculino y en el relato se refiere específicamente a siete hermanos.
- source_word: συνομολογεῖται ἀπανταχόθεν
  english_pob_choice: it is acknowledged everywhere
  chosen_spanish: se reconoce por todas partes
  alternatives_spanish:
  - se admite en todas partes
  - se reconoce universalmente
  - se confiesa por todas partes
  lexicon: LSJ
  rationale: La pasiva impersonal y ἀπανταχόθεν piden una fórmula que exprese reconocimiento amplio; «por todas partes» conserva la idea de extensión total.
- source_word: αὐτόδεσπότος
  english_pob_choice: master of
  chosen_spanish: dueña de
  alternatives_spanish:
  - señora de
  - maestra de
  - soberana sobre
  lexicon: LSJ
  rationale: El término indica auto-dominio o dominio propio; en español, «dueña de» comunica posesión y autoridad sobre las pasiones sin forzar un tecnicismo.
- source_word: τῶν παθῶν
  english_pob_choice: the passions
  chosen_spanish: las pasiones
  alternatives_spanish:
  - los impulsos
  - los afectos desordenados
  - las emociones
  lexicon: LSJ
  rationale: En 4 Macabeos, πάθη es un término moral-filosófico para impulsos pasionales, no simples emociones; «pasiones» preserva la terminología del libro.
- source_word: ὁ εὐσεβὴς λογισμός
  english_pob_choice: godly reason
  chosen_spanish: la razón piadosa
  alternatives_spanish:
  - la razón devota
  - la razón reverente
  - el razonamiento piadoso
  lexicon: LSJ
  rationale: λογισμός es razón o juicio racional, y εὐσεβής añade la cualidad de piedad hacia Dios; «razón piadosa» mantiene ambas dimensiones.
theological_decisions:
- issue: Cómo traducir εὐσεβὴς λογισμός sin borrar la relación entre racionalidad y piedad
  english_pob_reading: godly reason
  chosen_spanish_reading: la razón piadosa
  alternative_spanish_readings:
  - la razón devota
  - la razón reverente
  rationale: 'La expresión es programática en 4 Macabeos: no se trata de razón abstracta, sino de razón ordenada por reverencia a Dios. «Razón piadosa» conserva esa tensión sin resolverla en un término más doctrinal.'
  doctrine_reference: 'DOCTRINE.md: preserve theological tension; source-language primacy; readable modern Spanish.'
- issue: Valor moral-filosófico de πάθη en 4 Macabeos
  english_pob_reading: passions
  chosen_spanish_reading: pasiones
  alternative_spanish_readings:
  - impulsos
  - afectos desordenados
  rationale: El contexto presenta las pasiones como fuerzas que deben ser dominadas; «pasiones» mantiene el vocabulario técnico del libro sin convertirlo en simple emotividad.
  doctrine_reference: 'DOCTRINE.md: consistency of key terms; avoid flattening philosophical vocabulary.'
translation_notes:
  revision_awareness: 'Se ajustó la redacción española para evitar dependencia mecánica del inglés y conservar los rasgos semánticos del griego: la inferencia de δὲ τοίνυν, la intensidad de μέχρι θανάτου, el desprecio implícito en ὑπερεφρόνησαν, la extensión de ἀπανταχόθεν y el sentido técnico de εὐσεβὴς λογισμός y πάθη. Se corrigió además la anotación para que cada nota aparezca anclada en el texto.'
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico digno y contemporáneo.
  - «Razón piadosa» conserva el paralelo con el inglés auditado «godly reason», pero en español suena natural y transparente.
  - «Dueña de las pasiones» refleja el dominio de αὐτόδεσπότος sin introducir un sustantivo ajeno al contexto.
