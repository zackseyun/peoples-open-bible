    issue: «para hacer lo malo delante de él»
    rationale: El hebreo לַעֲשׂוֹת הָרַע בְּעֵינָיו expresa la evaluación divina «en sus ojos / a sus ojos», no meramente localización «delante de él». «Ante sus ojos» o «a sus ojos» conserva mejor la fórmula bíblica y su fuerza moral.
  - severity: medium
    issue: «lo heriste» para הִכִּיתָ
    rationale: Aunque literalmente posible, en español puede sonar no letal y queda demasiado débil frente al contexto. «Derribaste» o «abatistе» preserva mejor la progresión retórica sin colapsarla del todo en «mataste».
  - severity: low
    issue: «tomaste para ti a su mujer como esposa»
    rationale: Es fiel, pero «por mujer» es más idiomático y más cercano a la fórmula matrimonial bíblica española, a la vez que preserva la apropiación personal con «para ti».
