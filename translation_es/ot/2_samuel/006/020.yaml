    text: Or 'How glorious the king of Israel was today'—the Hebrew wording is overtly sarcastic in context.
    reason: lexical_alternative
  - marker: b
    text: Or 'maidservants' for 'slave girls.' The Hebrew refers to female household dependents of low status.
    reason: lexical_alternative
  - marker: c
    text: Or 'as one of the worthless fellows shamelessly exposes himself.'
    reason: lexical_alternative
