lexical_decisions:
- source_word: אֵיךְ
  english_pob_choice: How can
  chosen_spanish: ¿Cómo pueden...
  alternatives_spanish:
  - ¿Cómo...
  - ¿De qué manera pueden...
  lexicon: HALOT
  rationale: La partícula introduce una pregunta retórica de reproche; en español, «¿Cómo pueden...?» expresa mejor la fuerza incrédula y confrontativa que un simple «¿Cómo...?».
- source_word: תֹּאמְרוּ
  english_pob_choice: you say
  chosen_spanish: decir
  alternatives_spanish:
  - decir así
  - afirmar
  lexicon: HALOT
  rationale: El verbo del discurso directo se mantiene simple y natural en presente. La modalidad de reproche ya queda cargada por «¿Cómo pueden...?».
- source_word: גִּבּוֹרִים
  english_pob_choice: mighty men
  chosen_spanish: guerreros
  alternatives_spanish:
  - hombres poderosos
  - hombres valientes
  - mighty men
  lexicon: HALOT
  rationale: En este contexto militar, גִּבּוֹרִים designa hombres de guerra o de fuerza combativa. «Guerreros» comunica bien la idea en español actual, sin perder el matiz bélico.
- source_word: אֲנָחְנוּ
  english_pob_choice: we are
  chosen_spanish: nosotros somos
  alternatives_spanish:
  - somos
  - nosotros
  lexicon: HALOT
  rationale: El pronombre independiente se conserva explícitamente porque forma parte de la autoafirmación citada. En español, «nosotros somos» reproduce con claridad ese énfasis.
- source_word: וְ/אַנְשֵׁי חַיִל
  english_pob_choice: men of valor
  chosen_spanish: hombres de valor
  alternatives_spanish:
  - hombres valientes
  - hombres de guerra
  - hombres de fuerza
  lexicon: HALOT
  rationale: La construcción en hebreo significa literalmente «hombres de fuerza/valor». «Hombres de valor» mantiene el registro digno y militar, muy cercano al sentido léxico.
- source_word: חַיִל
  english_pob_choice: valor
  chosen_spanish: valor
  alternatives_spanish:
  - fuerza
  - maleza
  - poder
  lexicon: HALOT
  rationale: Aquí חַיִל expresa capacidad o valor militar, no solo fuerza física. «Valor» preserva bien ese rango semántico en español.
- source_word: לַ/מִּלְחָמָה
  english_pob_choice: for battle
  chosen_spanish: para la batalla
  alternatives_spanish:
  - para la guerra
  - en batalla
  lexicon: HALOT
  rationale: El prefijo ל indica finalidad o relación. «Para la batalla» es idiomático y conserva el marco militar inmediato del texto.
