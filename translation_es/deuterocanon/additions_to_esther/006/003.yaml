translation:
  language: es
  text: El pequeño manantial que se convirtió en río es Ester[a], a quien el rey tomó por esposa y hizo reina; y hubo luz, sol y agua abundante.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego más formalmente: «Ester es el río». La traducción suaviza la identificación en español, pero conserva la ecuación simbólica.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἡ μικρὰ πηγή
  english_pob_choice: the little spring
  chosen_spanish: la pequeña fuente
  alternatives_spanish:
  - la pequeña primavera
  - el pequeño manantial
  lexicon: LSJ
  rationale: πηγή designa una fuente de agua, un manantial o nascente. En español, "fuente" conserva bien la imagen de un origen de agua, con un registro natural y digno. "Manantial" también sería posible, pero "fuente" mantiene mejor la sencillez del griego en este contexto simbólico.
- source_word: ἡ ἐγένετο ποταμός
  english_pob_choice: that became a river
  chosen_spanish: que se convirtió en río
  alternatives_spanish:
  - que llegó a ser río
  - que se hizo río
  lexicon: LSJ
  rationale: El aoristo con ἐγένετο expresa transformación. "Se convirtió en río" comunica de forma clara y directa el cambio de estado sin añadir interpretación extra.
- source_word: φῶς
  english_pob_choice: light
  chosen_spanish: luz
  alternatives_spanish:
  - claridad
  lexicon: LSJ
  rationale: El sentido básico es literal; "luz" preserva la imaginería del sueño/visión sin expansión figurativa.
- source_word: ἥλιος
  english_pob_choice: sun
  chosen_spanish: sol
  alternatives_spanish:
  - el sol
  lexicon: LSJ
  rationale: Se traduce de manera literal como parte de la imagen interpretativa.
- source_word: ὕδωρ πολύ
  english_pob_choice: abundant water
  chosen_spanish: mucha agua
  alternatives_spanish:
  - agua abundante
  - gran cantidad de agua
  lexicon: LSJ
  rationale: πολύ modifica cuantitativamente a ὕδωρ. "Mucha agua" es natural en español y conserva la idea de abundancia sin inflar el estilo.
- source_word: Ἐσθήρ ἐστιν ὁ ποταμός
  english_pob_choice: is Esther
  chosen_spanish: es Ester
  alternatives_spanish:
  - Ester es el río
  - Ester es ese río
  lexicon: LSJ
  rationale: 'El griego presenta una identificación en presente: "Ester es el río". En español, la forma breve "es Ester" permite mantener esa identificación sin forzar una estructura demasiado rígida; el sentido queda explícito en el contexto inmediato. El referente con nombre propio se conserva como ecuación simbólica.'
- source_word: ἣν ἐγάμησεν ὁ βασιλεύς
  english_pob_choice: whom the king married
  chosen_spanish: a quien el rey desposó
  alternatives_spanish:
  - a quien el rey tomó por esposa
  - a quien el rey se casó
  lexicon: LSJ
  rationale: ἐγαμέω significa casarse con una mujer / tomarla por esposa. "Desposó" es una opción digna y fiel que preserva la relación matrimonial sin sonar mecánica. Se evita "casó" como transitivo por ser menos natural en español actual.
- source_word: ἐποίησεν βασίλισσαν
  english_pob_choice: made queen
  chosen_spanish: hizo reina
  alternatives_spanish:
  - la hizo reina
  - la nombró reina
  lexicon: LSJ
  rationale: El verbo más el predicativo expresa causarla a ser reina. "Hizo reina" reproduce la sencillez del griego y mantiene la fuerza del acto de elevación.
theological_decisions:
- issue: Identificación simbólica de Ester con el río
  english_pob_reading: The verse identifies the transformed spring/river with Esther while preserving the dream imagery.
  chosen_spanish_reading: El verso identifica la fuente/río transformado con Ester, sin perder la imaginería simbólica de luz, sol y agua abundante.
  alternative_spanish_readings:
  - La pequeña fuente que se convirtió en río es Ester
  - 'La pequeña fuente que se hizo río: Ester'
  rationale: No se trata de una afirmación histórica literal, sino de una lectura simbólica del relato. La redacción española mantiene la ecuación interpretativa y los elementos imagísticos del texto griego, evitando una paráfrasis que borre la tensión entre símbolo e identificación.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve the source meaning and symbolic structure without flattening the image.'
- issue: Valor del presente ἐστιν en la identificación
  english_pob_reading: The revision changed 'was Esther' to 'is Esther' to reflect the Greek present tense more accurately.
  chosen_spanish_reading: 'Se conserva el presente: "es Ester".'
  alternative_spanish_readings:
  - era Ester
  - fue Ester
  rationale: El griego usa ἐστιν, presente. En español conviene reflejarlo con "es" para mantener la correspondencia verbal y la inmediatez de la identificación.
  doctrine_reference: Faithfulness to tense and aspect in source-language exegesis.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés POB, que corrigió el tiempo verbal de "was Esther" a "is Esther" para reflejar con mayor precisión ἐστιν. La draft española refleja ese presente y mantiene la identificación simbólica sin perder la imagen de la fuente, el río, la luz, el sol y el agua abundante.
  spanish_consistency_notes:
  - Se usó "Ester" como forma española estándar del nombre bíblico.
  - Se evitó "SEÑOR" u otro reemplazo innecesario; el pasaje no contiene el tetragrámaton ni κύριος con valor divino.
  - '"Fuente" se empleó para πηγή por ser natural y fiel al campo semántico de manantial/origen de agua.'
  - '"Desposó" conserva dignidad estilística y el valor de ἐγαμέω sin caer en calco torpe.'
  - 'Se mantuvo la secuencia de imágenes del griego: fuente → río → luz/sol/agua abundante → identificación con Ester.'
