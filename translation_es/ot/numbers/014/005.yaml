revisions:
- from: Entonces Moisés y Aarón cayeron sobre sus rostros delante de toda la asamblea de la congregación de los hijos de Israel[a][b].
  to: Entonces Moisés y Aarón cayeron rostro en tierra delante de toda la asamblea de la congregación de los hijos de Israel[a][b].
  rationale: Se ajusta únicamente la expresión idiomática de postración para que el español sea natural y fiel al hebreo sin caer en un calco rígido. También se depura la nota a para evitar redundancia con el texto principal y dejar más clara la alternativa léxica conservada.
