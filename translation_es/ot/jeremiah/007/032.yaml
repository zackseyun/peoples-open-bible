translation:
  language: es
  text: Por tanto[a], he aquí, vienen días, declara Yahvé, en que ya no será llamado Tófet ni el valle de Ben Hinón, sino el valle de la Matanza[b]; y enterrarán en Tófet, porque no queda lugar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Así que». El hebreo introduce una consecuencia directa del juicio previo.'
    reason: alternative_reading
  - marker: b
    text: 'O: «por falta de espacio». El hebreo indica literalmente ausencia de lugar para sepultura.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Así que
  - Por eso
  lexicon: HALOT
  rationale: Marca claramente la conclusión inferida del juicio anterior. «Por tanto» conserva el valor consecutivo de manera natural en español.
- source_word: הִנֵּה
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - miren
  - vean
  lexicon: HALOT
  rationale: Mantiene el valor de llamada profética y atención inmediata sin sonar coloquial en exceso.
- source_word: יָמִים בָּאִים
  english_pob_choice: days are coming
  chosen_spanish: vienen días
  alternatives_spanish:
  - se acercan días
  - los días vienen
  lexicon: HALOT
  rationale: Conserva el giro profético de futuro inminente en una forma idiomática y sobria en español.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - dice Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: «Declara» transmite el valor oracular de נְאֻם, y «Yahvé» sigue el criterio del proyecto para el nombre divino.
- source_word: וְלֹא יֵאָמֵר עוֹד
  english_pob_choice: it will no longer be called
  chosen_spanish: ya no se dirá más
  alternatives_spanish:
  - ya no será llamado
  - ya no se le llamará más
  lexicon: HALOT
  rationale: El pasivo impersonal del hebreo queda bien reflejado con una construcción impersonal natural en español, sin perder el énfasis en el cambio de nombre.
- source_word: הַתֹּפֶת
  english_pob_choice: Topheth
  chosen_spanish: Tophet
  alternatives_spanish:
  - Tófet
  - Topet
  lexicon: HALOT
  rationale: Se mantiene el nombre propio como topónimo transliterado. «Tophet» coincide con la forma usada en el contexto inglés y evita una paráfrasis explicativa.
- source_word: גֵיא בֶן הִנֹּם
  english_pob_choice: the Valley of Ben-hinnom
  chosen_spanish: el valle de Ben-hinom
  alternatives_spanish:
  - el valle del hijo de Hinom
  - el valle de Hinom
  lexicon: HALOT
  rationale: Conserva la estructura nominal hebrea como nombre de lugar. «Ben-hinom» preserva la forma toponímica sin expandirla interpretativamente.
- source_word: כִּי אִם
  english_pob_choice: but
  chosen_spanish: sino
  alternatives_spanish:
  - sino más bien
  - pero
  lexicon: HALOT
  rationale: En una fórmula de renombramiento contrastivo, «sino» refleja con precisión el contraste excluyente del hebreo.
- source_word: גֵיא הַהֲרֵגָה
  english_pob_choice: the Valley of Slaughter
  chosen_spanish: el valle de la Matanza
  alternatives_spanish:
  - el valle de la Muerte
  - el valle del Degüello
  lexicon: HALOT
  rationale: «Matanza» comunica con fuerza el sentido de matanza masiva/judicial del sustantivo y su uso como nuevo nombre del lugar.
- source_word: וְקָבְרוּ
  english_pob_choice: and they will bury
  chosen_spanish: y enterrarán
  alternatives_spanish:
  - y sepultarán
  - y se enterrará
  lexicon: HALOT
  rationale: El sujeto indefinido plural se reproduce de forma natural con una impersonal española. «Enterrarán» conserva la fuerza directa del acto.
- source_word: בְתֹפֶת
  english_pob_choice: in Topheth
  chosen_spanish: en Tophet
  alternatives_spanish:
  - en Tófet
  - en Tophet
  lexicon: HALOT
  rationale: La preposición local se expresa con «en», sin alterar el valor topográfico del nombre propio.
- source_word: מֵאֵין מָקוֹם
  english_pob_choice: because there is no place left
  chosen_spanish: porque no queda lugar
  alternatives_spanish:
  - porque no hay lugar
  - por falta de espacio
  lexicon: HALOT
  rationale: Resume la ausencia de espacio para sepultura con una formulación clara y fiel. «No queda lugar» preserva la idea de agotamiento total del espacio disponible.
theological_decisions:
- issue: Traducción del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El texto hebreo usa explícitamente el Tetragrama; el proyecto pide «Yahvé» como forma principal en español para mantener visible el nombre propio del Dios del pacto.
  doctrine_reference: 'DOCTRINE.md Contested terms: יהוה YHWH'
- issue: Renombramiento profético del lugar
  english_pob_reading: Topheth ... the Valley of Ben-hinnom ... the Valley of Slaughter
  chosen_spanish_reading: Tophet ... el valle de Ben-hinom ... el valle de la Matanza
  alternative_spanish_readings:
  - Tófet ... el valle del hijo de Hinom ... el valle del Degüello
  rationale: Se conserva la tensión entre nombre propio tradicional y nuevo nombre judicial. «Matanza» mantiene el tono de juicio masivo sin suavizarlo ni convertirlo en una explicación abstracta.
  doctrine_reference: Jeremiah 7:32 judgment oracle context
- issue: Fórmula contrastiva כִּי אִם
  english_pob_reading: but
  chosen_spanish_reading: sino
  alternative_spanish_readings:
  - pero
  - sino más bien
  rationale: En castellano, «sino» expresa mejor la exclusión del nombre anterior en favor del nuevo nombre, siguiendo la fuerza de reemplazo del hebreo.
  doctrine_reference: Hebrew contrastive renaming construction
translation_notes:
  revision_awareness: El auditorio inglés revisó «look» por «behold» y afinó la relación «or» entre Topheth y Ben-hinnom. En español se optó por conservar la lógica revisada del hebreo con «he aquí» y «ni ... ni ... sino», evitando un calco del inglés y manteniendo el renombramiento contrastivo.
  spanish_consistency_notes:
  - Se usa «Yahvé» para יהוה conforme al estándar del proyecto.
  - Se conserva «Tophet» como topónimo transliterado, sin traducirlo.
  - «Ben-hinom» mantiene la forma toponímica del hebreo; no se expande a «hijo de Hinom» en el cuerpo principal.
  - «Matanza» preserva la fuerza judicial del nuevo nombre del valle.
  - La puntuación sigue el patrón profético solemne del original, con cláusula de anuncio, renombramiento y causal final.
