translation:
  language: es
  text: si, pues, la razón[a] evidentemente puede prevalecer sobre las pasiones que impiden el dominio propio, tanto la gula como el deseo,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «si, en verdad, la razón parece prevalecer sobre las pasiones que obstaculizan a los que se dominan a sí mismos». La frase griega con σωφρονούντων está condensada y puede traducirse de manera más formal, aunque con menos claridad en español.'
    reason: alternative_reading
lexical_decisions:
- source_word: εἰ ἄρα
  english_pob_choice: if, then
  chosen_spanish: si, pues
  alternatives_spanish:
  - si, entonces
  - si en verdad
  - si, por tanto
  lexicon: LSJ
  rationale: La combinación conserva la fuerza condicional de εἰ y el matiz inferencial de ἄρα con una formulación natural en español. «Si, pues» mantiene el enlace lógico sin volver la frase rígida.
- source_word: τῶν σωφρονούντων
  english_pob_choice: that hinder self-control
  chosen_spanish: que impiden el dominio propio
  alternatives_spanish:
  - de los que practican el dominio propio
  - de los autocontrolados
  - que obstaculizan la sobriedad
  lexicon: LSJ
  rationale: 'Sigo el sentido funcional indicado por la POB inglesa: el genitivo comprimido se entiende en relación con la capacidad de dominio propio. «Dominio propio» expresa σωφροσύνη de manera clara y contemporánea en español.'
- source_word: κωλυτικῶν παθῶν
  english_pob_choice: the passions that hinder
  chosen_spanish: las pasiones que impiden
  alternatives_spanish:
  - las pasiones obstructivas
  - las pasiones que estorban
  - las pasiones que frenan
  lexicon: LSJ
  rationale: κωλυτικῶν expresa la idea de impedir u obstaculizar; πάθη son pasiones. «Impiden» conserva la fuerza del verbo sin perder naturalidad.
- source_word: ὁ λογισμός
  english_pob_choice: reason
  chosen_spanish: la razón
  alternatives_spanish:
  - el razonamiento
  - la facultad racional
  - el juicio racional
  lexicon: LSJ
  rationale: En 4 Macabeos λογισμός es un término filosófico clave para la razón/juicio racional. «La razón» es la forma más breve y fiel para el lector español, sin tecnicismo innecesario.
- source_word: φαίνεται ἐπικρατεῖν
  english_pob_choice: is evidently able to prevail over
  chosen_spanish: se muestra capaz de prevalecer sobre
  alternatives_spanish:
  - parece dominar
  - se ve que vence sobre
  - aparece como vencedor sobre
  lexicon: LSJ
  rationale: «Se muestra» recoge φαίνεται con un matiz de evidencia, no mera apariencia; «capaz de prevalecer sobre» expresa ἐπικρατεῖν con precisión idiomática.
- source_word: γαστριμαργίας
  english_pob_choice: gluttony
  chosen_spanish: la gula
  alternatives_spanish:
  - la glotonería
  - el exceso de apetito
  - la voracidad
  lexicon: LSJ
  rationale: El término refiere a apetito desordenado por la comida. «Gula» es el equivalente español más directo y sobrio, y encaja bien en un registro eclesial moderno.
- source_word: ἐπιθυμίας
  english_pob_choice: desire
  chosen_spanish: el deseo
  alternatives_spanish:
  - el anhelo
  - la codicia
  - la concupiscencia
  lexicon: LSJ
  rationale: La voz griega es amplia; «deseo» evita estrechar el sentido hacia lo sexual o lo moralmente más específico que el contexto inmediato aún no impone.
theological_decisions:
- issue: Sentido filosófico de λογισμός en 4 Macabeos
  english_pob_reading: reason
  chosen_spanish_reading: la razón
  alternative_spanish_readings:
  - el razonamiento
  - la facultad racional
  rationale: El pasaje afirma la superioridad de la razón disciplinada sobre las pasiones. «La razón» preserva el argumento filosófico del texto sin introducir terminología posterior o excesivamente técnica.
  doctrine_reference: Translation philosophy §1, §5
- issue: Relación sintáctica comprimida de τῶν σωφρονούντων con κωλυτικῶν παθῶν
  english_pob_reading: understood functionally as referring to self-control hindered by passions
  chosen_spanish_reading: entendido funcionalmente como pasiones que impiden el dominio propio
  alternative_spanish_readings:
  - leído más literalmente como «de los que son prudentes»
  - tomado como «de los que se dominan a sí mismos»
  rationale: La construcción griega es compacta y difícil; una traducción literal en español sería oscura. La formulación elegida aclara la relación sintáctica sin abandonar la tensión interpretativa que ya reconocía la POB inglesa.
  doctrine_reference: Translation philosophy §6
translation_notes:
  revision_awareness: 'Reviso la validación previa: la única observación fue que el marcador de nota [a] no aparecía en el texto. Se corrigió anclando [a] en «la razón[a]». No se introdujeron otras notas no ancladas.'
  spanish_consistency_notes:
  - Mantengo «Yahvé» solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Uso «razón» para λογισμός de forma consistente con el marco filosófico de 4 Macabeos.
  - «Dominio propio» se emplea para σωφροσύνη y sus derivados cuando el contexto apunta a autocontrol ético.
  - No se usa «Cristo», «SEÑOR» ni terminología litúrgica ajena al texto.
  - La puntuación con coma inicial en «si, pues,» refleja el arranque condicional-inferencial del griego.
