translation:
  language: es
  text: Y te conduciré por en medio de Judea hasta que llegues frente a Jerusalén[a], y pondré tu carro en medio de ella, y los arrearás como ovejas sin pastor, y ni siquiera un perro gruñirá con su lengua contra ti[b]; porque estas cosas me fueron dichas según mi conocimiento previo[c], y me las comunicaron, y fui enviada para anunciártelas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «delante de Jerusalén» / «frente a Jerusalén» para ἀπέναντι.
    reason: alternative_reading
  - marker: b
    text: El griego dice literalmente «ni siquiera un perro gruñirá con su lengua contra ti», un modismo que expresa ausencia total de resistencia.
    reason: cultural_note
  - marker: c
    text: Aquí «conocimiento previo» probablemente significa conocimiento adelantado o información previa, no necesariamente un concepto teológico técnico.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄξω
  english_pob_choice: I will lead
  chosen_spanish: te conduciré
  alternatives_spanish:
  - te llevaré
  - te guiaré
  lexicon: BDAG
  rationale: «Conducir» expresa mejor la acción de ir al frente y guiar a través del territorio, sin perder el matiz direccional del futuro de ἄγω.
- source_word: διὰ μέσου τῆς Ἰουδαίας
  english_pob_choice: through the midst of Judea
  chosen_spanish: por en medio de Judea
  alternatives_spanish:
  - a través de Judea
  - por medio de Judea
  lexicon: BDAG
  rationale: Mantiene la imagen espacial intensa del griego con una construcción natural en español.
- source_word: ἕως τοῦ ἐλθεῖν ἀπέναντι Ἰερουσαλήμ
  english_pob_choice: until you come opposite Jerusalem
  chosen_spanish: hasta que llegues frente a Jerusalén[a]
  alternatives_spanish:
  - hasta que llegues delante de Jerusalén
  - hasta que llegues frente a la Jerusalén
  lexicon: BDAG
  rationale: «Frente a» recoge el valor de ἀπέναντι como estar enfrente/opuesto, sin sugerir necesariamente ingreso a la ciudad. Se conserva la opción interpretativa en la nota.
- source_word: θήσω τὸν δίφρον σου
  english_pob_choice: I will set your chariot
  chosen_spanish: pondré tu carro
  alternatives_spanish:
  - pondré tu carro de guerra
  - colocaré tu carro
  lexicon: LSJ
  rationale: δίφρος puede referirse al carro/chariot; «carro» es más natural en español y conserva el contexto militar.
- source_word: ἐν μέσῳ αὐτῆς
  english_pob_choice: in her midst
  chosen_spanish: en medio de ella
  alternatives_spanish:
  - en su centro
  - en medio de la ciudad
  lexicon: BDAG
  rationale: Se mantiene la referencia a Jerusalén personificada como femenina en griego, sin forzar un giro poco natural en español.
- source_word: ἄξεις αὐτούς
  english_pob_choice: you will drive them
  chosen_spanish: los llevarás
  alternatives_spanish:
  - los conducirás
  - los arriarás
  lexicon: BDAG
  rationale: Aunque el inglés auditado opta por «drive», en español «llevarás» evita aspereza y sigue siendo compatible con la imagen de conducir un rebaño ante uno mismo.
- source_word: ὡς πρόβατα οἷς οὐκ ἔστιν ποιμήν
  english_pob_choice: like sheep that have no shepherd
  chosen_spanish: como ovejas sin pastor
  alternatives_spanish:
  - como ovejas que no tienen pastor
  - como ovejas sin un pastor
  lexicon: BDAG
  rationale: Es la formulación española más natural y fiel al símil bíblico de vulnerabilidad sin guía.
- source_word: οὐ γρύξει κύων τῇ γλώσσῃ αὐτοῦ
  english_pob_choice: not even a dog will growl with its tongue
  chosen_spanish: ni siquiera un perro gruñirá con su lengua
  alternatives_spanish:
  - ni un perro ladrará con su lengua
  - ni siquiera un perro refunfuñará con su lengua
  lexicon: LSJ
  rationale: «Gruñirá» refleja mejor γρύζω que «ladrare». Se conserva «con su lengua» porque el griego lo expresa de forma explícita y el giro es parte del énfasis idiomático.
- source_word: κατὰ πρόγνωσίν μου
  english_pob_choice: according to my foreknowledge
  chosen_spanish: según mi conocimiento previo[c]
  alternatives_spanish:
  - según mi presciencia
  - de acuerdo con lo que sabía de antemano
  lexicon: BDAG
  rationale: «Conocimiento previo» comunica la idea de anticipación/información previa sin cargar el término con un sentido doctrinal técnico que el contexto no exige.
- source_word: ἀπηγγέλη μοι
  english_pob_choice: they were reported to me
  chosen_spanish: me las comunicaron
  alternatives_spanish:
  - me fueron comunicadas
  - me las informaron
  lexicon: BDAG
  rationale: El pasivo griego indica que Judith recibió la información; el español activo es más natural y conserva el contenido.
- source_word: ἀπεστάλην ἀναγγεῖλαί σοι
  english_pob_choice: I was sent to tell you
  chosen_spanish: fui enviado para anunciártelas
  alternatives_spanish:
  - fui enviado para decirte esto
  - fui enviado para comunicártelas
  lexicon: BDAG
  rationale: «Anunciártelas» conserva el valor de ἀναγγέλλω como anunciar/comunicar, y mantiene el objeto implícito del mensaje.
theological_decisions:
- issue: Valor de πρόγνωσις en el discurso de Judith
  english_pob_reading: Rendered as 'foreknowledge' in a non-technical sense of prior knowledge or advance awareness.
  chosen_spanish_reading: «Conocimiento previo» en sentido no técnico de información anticipada o previa.
  alternative_spanish_readings:
  - presciencia
  - premonición
  rationale: El contexto es una declaración estratégica de Judith ante Holofernes; la traducción evita importar un sentido doctrinal posterior de la palabra y conserva la tensión del original.
  doctrine_reference: Primacía del sentido original; evitar resolver en la traducción una carga teológica que el contexto no exige.
translation_notes:
  revision_awareness: 'Coincide con el último pase revisado: no se aplicaron cambios posteriores; se mantiene la alta concordancia del auditor y la lectura de πρόγνωσις como conocimiento previo no técnico.'
  spanish_consistency_notes:
  - Se evita «SEÑOR» porque el versículo no contiene el tetragrámaton ni κύριος con función de reemplazo divino.
  - «Carro» se usa de modo consistente para δίφρος en contexto bélico.
  - Se mantiene el paralelismo verbal y el ritmo de la enumeración sin añadir explicaciones al cuerpo del texto.
  - Las notas conservan las ambigüedades relevantes sin sobreinterpretar el pasaje.
