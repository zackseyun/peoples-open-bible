review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido base del hebreo: condición, dispersión extrema, reunión por Yahvé y acción posterior de ''tomar''. Conserva correctamente la repetición de «de allí», el nombre divino «Yahvé» y la segunda persona singular corporativa. Sin embargo, la formulación verbal «estuvieren» suena arcaizante y además está mal documentada en las decisiones léxicas («estu vieren»). El sentido fuente no exige ese registro; una forma moderna como «están» o «se encuentran» comunica mejor el valor idiomático señalado por el English POB.'
  spanish_quality_summary: La redacción es generalmente clara y digna, pero «Si tus desterrados estuvieren...» resulta innecesariamente arcaica para el estilo meta pedido. «Desterrados» es aceptable, aunque «dispersos» sería también viable; no hace falta cambiarlo. La nota c introduce «te llevará», que no corresponde bien al matiz documentado del inglés («he will bring you»), pero en español la nota más natural para la alternativa es «te traerá».
  glossary_alignment: 'Alineación buena con la terminología del proyecto: יְהוָה → «Yahvé», אֱלֹהֶיךָ → «tu Dios». No hay conflictos con términos doctrinales clave. La decisión de mantener «te tomará» respeta la preferencia léxica por לקח. La principal corrección es estilística y de precisión de nota, no de glosario doctrinal.'
  issues:
  - severity: medium
    issue: Registro arcaizante en «estuvieren»
    rationale: El proyecto pide español moderno pero digno. El hebreo no obliga a una forma arcaica; el English POB justificó una lectura idiomática presente («are»). «Están» conserva mejor naturalidad y fidelidad funcional.
  - severity: low
    issue: 'Error tipográfico en la documentación léxica: «estu vieren»'
    rationale: Aunque no afecta directamente el texto publicado, muestra inconsistencia en la justificación y conviene corregirla en la revisión editorial.
  - severity: medium
    issue: Nota c con alternativa «te llevará»
    rationale: La alternativa documentada en inglés es «he will bring you». En español, «te llevará» cambia la orientación deíctica y no representa bien la alternativa prevista. «Te traerá» es la opción más fiel como nota alternativa.
  revised_spanish_text: Si tus desterrados[a] están al fin de los cielos[b], de allí Yahvé tu Dios te reunirá, y de allí te tomará[c].
  revised_footnotes:
  - marker: a
    text: O «tus expulsados» o «tus dispersos». El hebreo se refiere a los que han sido alejados o esparcidos.
    reason: lexical_alternative
  - marker: b
    text: «Al fin de los cielos» es un modismo hebreo para indicar el lugar más remoto posible.
    reason: cultural_note
  - marker: c
    text: O «te traerá». El verbo hebreo es más literalmente «tomar».
    reason: lexical_alternative
  revision_rationale: Se actualiza «estuvieren» a «están» para ajustarse al español moderno y al valor idiomático reconocido por el English POB; se mantiene «desterrados», «al fin de los cielos», «Yahvé», la repetición de «de allí» y «te tomará» por fidelidad léxica. La nota c se corrige a «te traerá» para reflejar con precisión la alternativa documentada sin alterar el texto principal.
