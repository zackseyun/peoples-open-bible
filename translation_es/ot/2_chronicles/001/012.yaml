translation:
  language: es
  text: La sabiduría y el conocimiento te son dados, y yo te daré riquezas, posesiones y honor, como no los ha tenido ningún rey antes de ti, ni los tendrá después de ti[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «lo cual no ha sido así para los reyes que fueron antes de ti, y después de ti no será así».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַחָכְמָה
  english_pob_choice: wisdom
  chosen_spanish: sabiduría
  alternatives_spanish:
  - la sabiduría
  lexicon: HALOT
  rationale: חָכְמָה designa sabiduría en sentido general; en español, «sabiduría» conserva bien el valor abstracto y elegante del contexto real.
- source_word: הַמַּדָּע
  english_pob_choice: knowledge
  chosen_spanish: conocimiento
  alternatives_spanish:
  - entendimiento
  - la ciencia
  lexicon: HALOT
  rationale: מַדָּע apunta a conocimiento o entendimiento. «Conocimiento» empareja naturalmente con «sabiduría» sin desplazar el sentido hacia una interpretación más técnica o filosófica.
- source_word: נָתוּן לָךְ
  english_pob_choice: are given to you
  chosen_spanish: te son dados
  alternatives_spanish:
  - te han sido dados
  - te son concedidos
  lexicon: HALOT
  rationale: El participio pasivo expresa un estado dado/conferido. En español, «te son dados» mantiene la pasividad y el plural concordando con el par «sabiduría y conocimiento».
- source_word: עֹשֶׁר
  english_pob_choice: riches
  chosen_spanish: riquezas
  alternatives_spanish:
  - riqueza
  - bienes
  lexicon: HALOT
  rationale: עֹשֶׁר se refiere a riqueza/riquezas; «riquezas» es natural y solemne en este marco real.
- source_word: נְכָסִים
  english_pob_choice: possessions
  chosen_spanish: posesiones
  alternatives_spanish:
  - bienes
  - propiedades
  lexicon: HALOT
  rationale: נְכָסִים denota posesiones o propiedad. «Posesiones» distingue bien este término del anterior y evita un tecnicismo innecesario.
- source_word: כָבוֹד
  english_pob_choice: honor
  chosen_spanish: honor
  alternatives_spanish:
  - gloria
  lexicon: HALOT
  rationale: En este contexto de dones regios, כָבוֹד puede ser «honor» o «gloria». «Honor» preserva el sentido de distinción concedida sin sugerir de manera primaria la gloria divina.
- source_word: אֶתֶּן לָךְ
  english_pob_choice: I will give you
  chosen_spanish: yo te daré
  alternatives_spanish:
  - te daré
  - yo daré a ti
  lexicon: HALOT
  rationale: El imperfecto de נתן expresa aquí una promesa futura. «Yo te daré» hace explícito al dador y suena natural en español.
- source_word: אֲשֶׁר לֹא הָיָה כֵן
  english_pob_choice: such as no kings before you have had
  chosen_spanish: como no lo ha habido
  alternatives_spanish:
  - como no ha sido así
  - como no se ha visto
  lexicon: HALOT
  rationale: La comparación hebrea se expresa idiomáticamente en español con «como no lo ha habido», evitando una literalidad pesada y conservando el alcance comparativo.
- source_word: לַמְּלָכִים
  english_pob_choice: kings
  chosen_spanish: para los reyes
  alternatives_spanish:
  - entre los reyes
  - a los reyes
  lexicon: HALOT
  rationale: Aunque el hebreo usa una construcción comparativa, en español «para los reyes» comunica con naturalidad el referente comparado de la provisión recibida.
- source_word: לְפָנֶיךָ
  english_pob_choice: before you
  chosen_spanish: que estuvieron antes de ti
  alternatives_spanish:
  - anteriores a ti
  - antes que tú
  lexicon: HALOT
  rationale: El sentido temporal/sucesorio se vierte con una expresión natural en español que mantiene la idea de reyes precedentes.
- source_word: וְאַחֲרֶיךָ לֹא יִהְיֶה כֵן
  english_pob_choice: and none after you will have the like
  chosen_spanish: ni después de ti lo habrá
  alternatives_spanish:
  - ni después de ti habrá semejante cosa
  - ni tras de ti será así
  lexicon: HALOT
  rationale: La segunda mitad mantiene el paralelismo comparativo. «Ni después de ti lo habrá» es conciso y fiel al valor de continuidad temporal con negación.
theological_decisions:
- issue: Alcance de la comparación regia
  english_pob_reading: The verse states that Solomon will receive wisdom, knowledge, riches, possessions, and honor unmatched by prior or subsequent kings.
  chosen_spanish_reading: El versículo afirma que Salomón recibirá sabiduría, conocimiento, riquezas, posesiones y honor, sin precedente entre los reyes anteriores ni posterior entre los reyes futuros.
  alternative_spanish_readings:
  - una afirmación absoluta sobre Salomón en todo aspecto
  - una exaltación genérica de su grandeza sin limitarse a los dones enumerados
  rationale: La comparación del hebreo está ligada a los dones enumerados; la redacción española conserva ese alcance y no amplía indebidamente la afirmación a todos los aspectos de la persona o del reinado de Salomón.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el sentido del hebreo y armoniza con el audit trail inglés: mantiene el paralelismo de dones regios, conserva la pasividad de נָתוּן, y expresa la comparación final de modo idiomático en español sin perder el límite del texto a los dones nombrados.'
  spanish_consistency_notes:
  - Se usa «Yahvé» en el proyecto cuando aparece el nombre divino; en este versículo no aparece.
  - Se elige «sabiduría / conocimiento» para mantener el par lexical del original.
  - «Honor» se reserva aquí para כָבוֹד en contexto real, no como gloria divina.
  - La nota a pie de página marca la alternativa semántica de מַדָּע sin introducir una glosa interpretativa excesiva.
