review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido general del hebreo: fórmula temporal, llegada del rey de Asiria, captura de ciudades/regiones, resumen territorial de Neftalí y traslado forzoso a Asiria. También conserva adecuadamente la nota léxica sobre וַיַּגְלֵם. Sin embargo, hay pequeños problemas de fidelidad/legibilidad en la puntuación y en algunos topónimos transliterados de manera poco natural o inconsistente para un español eclesial amplio.'
  spanish_quality_summary: 'El español es generalmente claro, pero la puntuación con raya y coma queda torpe, y varios topónimos conviene normalizarlos para mayor legibilidad y consistencia: "Abel-bet-Maacá" con mayúscula interna, "Hazor" en vez de "Hatzor", y "Janoa" como forma española más natural que "Janoah". "Capturó" funciona, aunque "tomó" también sería posible; no exige cambio. La nota al pie está bien orientada.'
  glossary_alignment: No hay términos teológicos sensibles en este versículo. Se respeta Asiria/Israel/Neftalí/Galaad/Galilea. La principal cuestión es la normalización de nombres propios, no del glosario doctrinal del proyecto.
  issues:
  - severity: medium
    issue: Puntuación poco natural alrededor del inciso con raya
    rationale: 'La secuencia "Galilea[a]—toda la tierra de Neftalí—, y" suena forzada en español. Es mejor integrar el inciso sin coma después de la raya de cierre: "Galilea[a] —toda la tierra de Neftalí— y..."'
  - severity: medium
    issue: Topónimo "Hatzor" poco natural en español
    rationale: La forma española bíblica más reconocible y legible es "Hazor"; la grafía con tz no aporta fidelidad adicional para este proyecto y suena menos natural.
  - severity: low
    issue: Topónimo "Janoah" poco adaptado al español
    rationale: '"Janoa" es más natural en español y suficientemente fiel al hebreo/uso bíblico hispano. "Janoah" no es incorrecto, pero resulta más anglicado.'
  - severity: low
    issue: Capitalización interna de "Abel-bet-maaca"
    rationale: Al ser un topónimo compuesto, "Abel-bet-Maacá" mejora la presentación y reconocimiento del nombre propio. Además, la acentuación final ayuda a la pronunciación española.
  revised_spanish_text: En los días de Peka, rey de Israel, vino Tiglat-pileser, rey de Asiria, y capturó a Ijón, Abel-bet-Maacá, Janoa, Quedes, Hazor, Galaad y Galilea[a] —toda la tierra de Neftalí— y los llevó a Asiria.
  revised_footnotes:
