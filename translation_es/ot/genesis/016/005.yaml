translation:
  language: es
  text: 'Entonces Sarai dijo a Abram[a]: «La injusticia hecha contra mí recae sobre ti. Yo entregué a mi esclava en tus brazos[b], y cuando vio que había concebido, quedé rebajada a sus ojos. Que Yahvé juzgue entre tú y yo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Mi agravio recaiga sobre ti», conservando más literalmente la frase hebrea; el sentido es una acusación de que Abram carga con la responsabilidad por la injusticia que Sarai ha sufrido.'
    reason: lexical_alternative
  - marker: b
    text: Hebreo «en tu seno»; aquí es un modismo de recepción íntima.
    reason: lexical_alternative
lexical_decisions:
- source_word: חֲמָסִי
  english_pob_choice: the wrong done to me
  chosen_spanish: la injusticia hecha contra mí
  alternatives_spanish:
  - mi agravio
  - el daño hecho contra mí
  - mi injusticia
  lexicon: HALOT
  rationale: חָמָס puede abarcar violencia, agravio o injusticia. En este contexto Sarai no admite culpa propia; formula una acusación contra Abram por la situación sufrida. «La injusticia hecha contra mí» conserva el matiz de daño sufrido y evita sugerir que la injusticia proviene de Sarai.
- source_word: עָלֶיךָ
  english_pob_choice: is on you
  chosen_spanish: recae sobre ti
  alternatives_spanish:
  - está sobre ti
  - cae sobre ti
  - te corresponde
  lexicon: HALOT
  rationale: La preposición עַל con sufijo de segunda persona asigna responsabilidad o carga. «Recae sobre ti» suena natural en español y mantiene la idea de culpa o responsabilidad atribuida a Abram.
- source_word: שִׁפְחָתִי
  english_pob_choice: my female slave
  chosen_spanish: mi esclava femenina
  alternatives_spanish:
  - mi esclava
  - mi sierva
  - mi criada
  lexicon: HALOT
  rationale: שִׁפְחָה designa una esclava o servidora dependiente. Se conserva «esclava» por la fuerza lexical que el proyecto exige cuando la condición servil es relevante. Se añade «femenina» para reflejar explícitamente el género del término hebreo y evitar ambigüedad en español.
- source_word: בְּחֵיקֶךָ
  english_pob_choice: into your embrace
  chosen_spanish: en tu abrazo
  alternatives_spanish:
  - en tu seno
  - en tu regazo
  - en tu intimidad
  lexicon: HALOT
  rationale: חֵיק literalmente es «seno» o «regazo», pero aquí funciona como un modismo de recepción íntima. «En tu abrazo» comunica la cercanía relacional sin volverse arcaico ni demasiado explícito.
- source_word: הָרָתָה
  english_pob_choice: she had conceived
  chosen_spanish: había concebido
  alternatives_spanish:
  - quedó encinta
  - quedó embarazada
  - concibió
  lexicon: HALOT
  rationale: El verbo perfecto señala una concepción ya consumada. «Había concebido» respeta la secuencia narrativa y el valor aspectual del hebreo.
- source_word: וָאֵקַל
  english_pob_choice: I became contemptible
  chosen_spanish: quedé rebajada
  alternatives_spanish:
  - fui despreciada
  - quedé desconsiderada
  - me volví despreciable
  lexicon: HALOT
  rationale: El verbo expresa quedar en menos o ser tratada como de poco valor. «Quedé rebajada» conserva la idea de disminución de honor y status que el contexto sugiere, sin cargar innecesariamente con una autodescripción moral.
- source_word: בְּעֵינֶיהָ
  english_pob_choice: in her eyes
  chosen_spanish: en sus ojos
  alternatives_spanish:
  - a sus ojos
  - ante ella
  - en su opinión
  lexicon: HALOT
  rationale: Se mantiene la imagen hebrea de evaluación personal. «En sus ojos» es una calca idiomática natural en español bíblico moderno y conserva la metáfora de valoración.
- source_word: יִשְׁפֹּט יְהוָה
  english_pob_choice: May Yahweh judge
  chosen_spanish: Yahvé juzgue
  alternatives_spanish:
  - Que Yahvé juzgue
  - Yahvé juzgará
  - Juzgue Yahvé
  lexicon: HALOT
  rationale: El jussivo expresa una apelación o deseo. «Yahvé juzgue» reproduce esa fuerza, y se usa «Yahvé» conforme al estándar terminológico del proyecto para יְהוָה.
- source_word: בֵּינִי וּבֵינֶיךָ
  english_pob_choice: between me and you
  chosen_spanish: entre tú y yo
  alternatives_spanish:
  - entre mí y ti
  - entre nosotros
  - entre ti y yo
  lexicon: HALOT
  rationale: La fórmula invoca a Yahvé como árbitro entre las dos partes. En español bíblico natural, «entre tú y yo» mantiene la relación directa y la corrección estilística del discurso.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: 'El texto hebreo usa explícitamente el Tetragrámaton. Se sigue la convención española del proyecto: «Yahvé», para preservar el nombre del pacto en la forma establecida para la traducción española.'
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Force of the complaint formula חֲמָסִי עָלֶיךָ
  english_pob_reading: The wrong done to me is on you
  chosen_spanish_reading: La injusticia hecha contra mí recae sobre ti
  alternative_spanish_readings:
  - Mi agravio recae sobre ti
  - La culpa de mi injusticia recae sobre ti
  - Mi injusticia recae sobre ti
  rationale: La expresión no confiesa un mal propio de Sarai, sino que atribuye a Abram la responsabilidad del daño sufrido. La opción española conserva la acusación y evita suavizarla en un simple lamento.
  doctrine_reference: 'DOCTRINE.md: Lexical force and responsibility language'
- issue: Rendering of שִׁפְחָתִי in light of project terminology
  english_pob_reading: my female slave
  chosen_spanish_reading: mi esclava femenina
  alternative_spanish_readings:
  - mi esclava
  - mi sierva
  rationale: Dado que el contexto destaca la condición social subordinada, se mantiene «esclava» en vez de sustituirla por el más eclesiástico «sierva». «Femenina» explicita el género del sustantivo hebreo sin alterar la referencia.
  doctrine_reference: 'DOCTRINE.md: Slave terminology in lexically marked contexts'
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el paquete fuente hebreo y el audit trail inglés. Se conservó la tensión lexical de חֲמָסִי como acusación de injusticia sufrida, y se mantuvo la terminología de esclavitud para שִׁפְחָתִי. La frase final adopta la convención española del proyecto para el nombre divino: Yahvé.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para יְהוָה en todo el registro, en coherencia con la terminología del proyecto.
  - «Esclava» se conserva por el valor lexical marcado de שִׁפְחָה; no se suaviza a «sierva».
  - «Entre tú y yo» refleja la fórmula relacional directa del hebreo sin introducir un plural no presente en el texto.
  - La nota sobre בְּחֵיקֶךָ explica el modismo sin forzar una traducción anatómica o explícita.
