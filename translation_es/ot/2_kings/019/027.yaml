translation:
  language: es
  text: Pero yo sé tu sentarte[a], tu salir y tu entrar, y tu furia[b] contra mí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebraísmo: ‘tu sentarte, tu salir y tu entrar’ expresa la totalidad de los movimientos y la conducta de una persona.'
    reason: cultural_note
  - marker: b
    text: También puede traducirse ‘tu agitación’ o ‘tu furor contra mí’.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשִׁבְתְּךָ
  english_pob_choice: your sitting down
  chosen_spanish: tu sentarte
  alternatives_spanish:
  - tu estar sentado
  - tu residencia
  - tu estancia
  lexicon: HALOT
  rationale: La secuencia hebrea usa un sustantivo verbal ligado a ישׁב y forma parte de un merismo fijo con ‘salir’ y ‘entrar’. En español, ‘tu sentarte’ conserva la concreción del gesto/estado sin reemplazarlo por una interpretación más abstracta como ‘residencia’ o ‘estancia’.
- source_word: וְצֵאתְךָ
  english_pob_choice: your going out
  chosen_spanish: tu salir
  alternatives_spanish:
  - tu salida
  - tu partida
  - tu ir afuera
  lexicon: HALOT
  rationale: De יצא, en paralelo con ‘entrar’. ‘Tu salir’ mantiene el paralelismo verbal y la forma breve del hebreo mejor que una nominalización más interpretativa.
- source_word: וּבֹאֲךָ
  english_pob_choice: your coming in
  chosen_spanish: tu entrar
  alternatives_spanish:
  - tu entrada
  - tu venir
  - tu llegada
  lexicon: HALOT
  rationale: De בוא. ‘Tu entrar’ preserva el paralelismo idiomático con ‘salir’ y refleja el merismo hebreo sin forzar una formulación más explicativa.
- source_word: יָדָעְתִּי
  english_pob_choice: I know
  chosen_spanish: yo conozco
  alternatives_spanish:
  - yo sé
  - he conocido
  - lo conozco
  lexicon: HALOT
  rationale: El perfecto qal 1cs de ידע expresa conocimiento pleno y establecido. ‘Yo conozco’ comunica en español la certeza continua del hablante divino; aunque ‘yo sé’ también sería posible, ‘conozco’ suena más personal y directo en esta declaración.
- source_word: הִתְרַגֶּזְךָ
  english_pob_choice: your raging
  chosen_spanish: tu furor
  alternatives_spanish:
  - tu agitación
  - tu ira
  - tu rabia
  lexicon: HALOT
  rationale: El hitpael de רגז puede indicar agitación o furor. El POB inglés eligió ‘your raging’; en español, ‘tu furor’ comunica mejor el sentido hostil y ofensivo de la protesta contra Dios sin perder la tensión léxica entre agitación e ira.
- source_word: אֵלַי
  english_pob_choice: against me
  chosen_spanish: contra mí
  alternatives_spanish:
  - hacia mí
  - ante mí
  - sobre mí
  lexicon: HALOT
  rationale: Aunque la preposición básica es ‘a/toward’, el contexto hostil requiere una equivalencia adversativa natural en español. ‘Contra mí’ refleja adecuadamente el sentido de oposición que el inglés POB también explicita con ‘against me’.
- source_word: וְאֵת
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - también
  - e incluso
  lexicon: HALOT
  rationale: La partícula introductoria del último objeto no se traduce de forma rígida. ‘Y’ reproduce con naturalidad la coordinación en español, como hace el inglés POB con ‘and’.
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo y mantiene el merismo tradicional ‘sentarte / salir / entrar’, en línea con la lectura auditada del POB inglés. Se ajustó la sintaxis para que suene natural en español sin perder la concreción idiomática del original.
  spanish_consistency_notes:
  - Se mantuvo ‘mí’ con minúscula por tratarse de discurso directo en español, salvo criterio editorial distinto en la serie.
  - Se evitó ‘SEÑOR’ porque aquí no aparece el Tetragrámaton en el versículo.
  - ‘Furor’ se prefirió a ‘ira’ para conservar la fuerza hostil y la ambigüedad entre agitación y cólera documentada en el audit trail.
