id: 2CO.1.12
reference: 2 Corinthians 1:12
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Ἡ γὰρ καύχησις ἡμῶν αὕτη ἐστίν, τὸ μαρτύριον τῆς συνειδήσεως ἡμῶν, ὅτι ἐν ⸀ἁγιότητι καὶ εἰλικρινείᾳ ⸀τοῦ θεοῦ, ⸀οὐκ ἐν σοφίᾳ σαρκικῇ ἀλλ’ ἐν χάριτι θεοῦ, ἀνεστράφημεν ἐν τῷ κόσμῳ, περισσοτέρως δὲ πρὸς ὑμᾶς·
base_translation:
  language: en
  yaml_path: translation/nt/2_corinthians/001/012.yaml
  text: 'For this is our boast: the testimony of our conscience, that we conducted ourselves in the world in holiness and sincerity of God, not in fleshly wisdom but in the grace of God—and especially toward you.'
  footnotes:
  - marker: a
    text: Some manuscripts read "simplicity" instead of "holiness."
    reason: textual_variant
  - marker: b
    text: Or "godly sincerity."
    reason: lexical_alternative
  - marker: c
    text: Or "human wisdom."
    reason: lexical_alternative
translation:
  language: ko
  text: 우리의 자랑은 이것이니, 곧 우리 양심의 증언입니다. 우리가 세상에서 행한 것이 하나님의 거룩하심과 진실하심을 따른 것이며, 육신적 지혜가 아니라 하나님의 은혜로 한 것임을, 더욱 여러분을 향하여 그러했음을 우리 양심이 증언합니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: καύχησις
  english_pob_choice: boast
  chosen_korean: 자랑
  alternatives_korean:
  - 자랑함
  lexicon: BDAG
  rationale: 바울 특유의 「자랑」 어휘. 부정적 자만이 아닌 정당한 자긍의 의미.
- source_word: συνειδήσεως
  english_pob_choice: conscience
  chosen_korean: 양심
  alternatives_korean: []
  lexicon: BDAG
  rationale: 바울 인간학의 정립 어휘.
- source_word: ἁγιότητι
  english_pob_choice: holiness
  chosen_korean: 거룩하심
  alternatives_korean:
  - 거룩
  lexicon: BDAG
  rationale: 하나님의 속성에서 비롯된 거룩함을 가리키므로 합쇼체 존칭으로 「거룩하심」.
- source_word: εἰλικρινείᾳ
  english_pob_choice: sincerity
  chosen_korean: 진실하심
  alternatives_korean:
  - 순전함
  - 순수함
  lexicon: BDAG
  rationale: 햇빛에 비추어도 흠 없는 투명성. 한국어 「진실」 또는 「순전함」.
- source_word: σαρκικῇ
  english_pob_choice: fleshly
  chosen_korean: 육신적
  alternatives_korean:
  - 육적인
  lexicon: BDAG
  rationale: 바울의 σάρξ 신학 정형 어휘.
