    changes_summary: Changed 'labor' to 'work' for more natural formal English, 'food' to 'prey' to reflect טָּרֶף more precisely, and 'provides him bread' to 'is bread for him' to more closely match the source wording.
translation:
  language: es
  text: Mira[a], como asnos salvajes en el desierto, salen a su trabajo, buscando temprano su presa; el desierto es pan para él[b], para los niños.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «He aquí».'
    reason: lexical_alternative
  - marker: b
    text: Se conserva el singular «para él» del hebreo. El final puede entenderse distributivamente, y לַנְּעָרִים también puede traducirse «para sus pequeños» o «para los muchachos».
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵן
  english_pob_choice: Look
  chosen_spanish: ¡Mira!
  alternatives_spanish:
  - ¡Mira ahora!
  - ¡He aquí!
  lexicon: HALOT
  rationale: La exclamación deíctica introduce la escena con fuerza de atención. '¡Mira!' conserva el énfasis y suena natural en español moderno sin perder el carácter apelativo del hebreo.
- source_word: פְּרָאִים
  english_pob_choice: wild donkeys
  chosen_spanish: asnos salvajes
  alternatives_spanish:
  - burros salvajes
  - asnos del desierto
  lexicon: HALOT
  rationale: פְּרָאִים designa asnos no domesticados. 'Asnos salvajes' es preciso y conserva el matiz zoológico; 'burros salvajes' es más coloquial, mientras que 'asnos del desierto' añade una especificación no presente en el término.
- source_word: בַּמִּדְבָּר
  english_pob_choice: in the wilderness
  chosen_spanish: en el desierto
  alternatives_spanish:
  - en la estepa
  - en el yermo
  lexicon: HALOT
  rationale: El hebreo apunta a un espacio árido e inhóspito. 'Desierto' es el equivalente más claro y natural en español; 'estepa' es más técnico y 'yermo' es más literario pero menos directo.
- source_word: בְּפָעֳלָם
  english_pob_choice: to their work
  chosen_spanish: a su trabajo
  alternatives_spanish:
  - a su labor
  - a su tarea
  lexicon: HALOT
  rationale: La idea es de actividad propia y orientada a sustento. 'A su trabajo' refleja bien el valor funcional del sustantivo sin cargarlo con una solemnidad innecesaria; 'labor' sería más marcado y puede sonar menos natural.
- source_word: מְשַׁחֲרֵי
  english_pob_choice: seeking ... early
  chosen_spanish: buscando ... temprano
  alternatives_spanish:
  - buscando ... al alba
  - levantándose temprano para
  lexicon: HALOT
  rationale: El participio expresa búsqueda con matiz temporal de madrugada/temprano. 'Buscando ... temprano' conserva ambas ideas; 'al alba' es más poético, y 'levantándose temprano para' introduce un movimiento no explicitado.
- source_word: לַטָּרֶף
  english_pob_choice: prey
  chosen_spanish: presa
  alternatives_spanish:
  - alimento
  - provisión
  lexicon: HALOT
  rationale: Aunque en contexto humano puede rozar la idea de sustento, el término básico es 'presa'. 'Presa' mantiene la fuerza lexical y la imagen de búsqueda necesaria para sobrevivir; 'alimento' suaviza demasiado el término.
- source_word: עֲרָבָה
  english_pob_choice: the desert
  chosen_spanish: el desierto
  alternatives_spanish:
  - la estepa
  - la llanura árida
  lexicon: HALOT
  rationale: La imagen presenta una extensión seca e inhóspita. 'El desierto' reproduce bien el valor espacial; 'estepa' y 'llanura árida' son posibles, pero menos transparentes para la lectura pública.
- source_word: לוֹ
  english_pob_choice: him
  chosen_spanish: para él
  alternatives_spanish:
  - para ellos
  - para uno
  lexicon: HALOT
  rationale: Se conserva el singular del texto consonántico, tal como refleja la POB inglesa. En español, 'para él' mantiene la tensión distributiva sin aplanarla en plural.
- source_word: לֶחֶם
  english_pob_choice: bread
  chosen_spanish: pan
  alternatives_spanish:
  - comida
  - alimento
  lexicon: HALOT
  rationale: '''Pan'' preserva la concreción hebrea de sustento básico y evita generalizar demasiado. En español bíblico moderno, ''pan'' sigue funcionando como metonimia de alimento esencial.'
- source_word: לַנְּעָרִים
  english_pob_choice: for the children
  chosen_spanish: para los niños
  alternatives_spanish:
  - para los muchachos
  - para los jóvenes
  lexicon: HALOT
  rationale: En el contexto, el sustantivo puede referirse a dependientes jóvenes. 'Niños' expresa la dependencia y la necesidad de provisión con claridad; 'muchachos' o 'jóvenes' son más ambiguos en español.
theological_decisions:
- issue: Imagen del desierto como provisión
  english_pob_reading: the desert is bread for him, for the children
  chosen_spanish_reading: el desierto es pan para él, para los niños
  alternative_spanish_readings:
  - el desierto les da pan
  - el desierto les provee alimento
  rationale: Se mantiene la imagen fuerte de carencia convertida en provisión, sin suavizarla a una formulación explicativa. El valor teológico-poético es la supervivencia precaria en un mundo injusto, no una declaración doctrinal abstracta.
  doctrine_reference: Job 24:5; providencia en lenguaje poético
translation_notes:
  revision_awareness: 'La POB inglesa revisó la línea para acercarse más al hebreo: cambió ''food'' a ''prey'' y ''provides him bread'' a ''is bread for him''. La redacción española sigue esa revisión, conservando ''presa'' y la cópula ''es pan para él'' para reflejar mejor la imagen original.'
  spanish_consistency_notes:
  - Se evitó 'SEÑOR' u otras sustituciones teológicas no presentes en el verso.
  - '''Asnos salvajes'' se eligió por precisión zoológica y claridad pública; no se optó por el arcaísmo ''asnos monteses''.'
  - Se mantuvo la singularidad de 'para él' por fidelidad al hebreo y a la decisión auditada de la POB inglesa.
  - '''Niños'' traduce de manera clara y no sexista el plural final, sin forzar ''hijos'' o ''muchachos''.'
