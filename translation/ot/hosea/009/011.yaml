theological_decisions:
- issue: Referent of 'their glory'
  chosen_reading: Ephraim's 'glory' is left metaphorical in the main text, with the context implying offspring/fertility and national vitality.
  alternative_readings:
  - their wealth
  - their honor in a broader national sense
  rationale: The verse itself does not explicitly define the metaphor, though the surrounding context strongly associates it with children and fertility. Leaving 'glory' in the text preserves the Hebrew image without over-specifying beyond the verse.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Force of the three prepositional phrases
  chosen_reading: 'The phrases express the removal or absence of offspring at every stage: conception, gestation, and birth.'
  alternative_readings:
  - a simple list without rhetorical progression
  rationale: The Hebrew lists stages in reverse order after the main clause. English smooths this as deprivation extending from birth back to conception, while preserving the triad.
