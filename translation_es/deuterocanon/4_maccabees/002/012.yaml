translation:
  language: es
  text: y domina el amor por los hijos[a], castigándolos por su maldad; y domina el apego a los amigos, reprendiéndolos por su mal.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «el amor de los hijos» y «la familiaridad/relación habitual de los amigos»; el sentido es el afecto o apego hacia los propios hijos y amigos.
    reason: lexical_alternative
lexical_decisions:
- source_word: κυριεύει
  english_pob_choice: masters
  chosen_spanish: domina
  alternatives_spanish:
  - tiene dominio sobre
  - se enseña como señor de
  lexicon: BDAG
  rationale: El verbo expresa ejercer dominio o señorío. «Domina» conserva la fuerza de control y funciona con naturalidad en español sin debilitar la imagen de autoridad.
- source_word: τῆς τέκνων φιλίας
  english_pob_choice: love of children
  chosen_spanish: el amor por los hijos
  alternatives_spanish:
  - el afecto por los hijos
  - el amor de los hijos
  lexicon: LSJ
  rationale: La construcción genitiva apunta a la afección dirigida a los hijos; en español, «amor por los hijos» comunica mejor la relación afectiva que un calco más duro.
- source_word: διὰ κακίαν αὐτῶν
  english_pob_choice: for their wickedness
  chosen_spanish: por su maldad
  alternatives_spanish:
  - a causa de su maldad
  - por su wickedness
  lexicon: LSJ
  rationale: «Maldad» reproduce el registro moral fuerte de κακία en este contexto mejor que un término más débil como «maldad/badness» en sentido genérico.
- source_word: κολάζων
  english_pob_choice: punishing
  chosen_spanish: castigándolos
  alternatives_spanish:
  - corrigiéndolos
  - reprendiéndolos
  lexicon: LSJ
  rationale: El participio describe una acción disciplinaria real sobre los hijos. «Castigándolos» mantiene esa fuerza inmediata sin suavizarla indebidamente.
- source_word: τῆς φίλων συνηθείας
  english_pob_choice: attachment to friends
  chosen_spanish: la intimidad con los amigos
  alternatives_spanish:
  - la familiaridad con los amigos
  - el trato con los amigos
  - el apego a los amigos
  lexicon: LSJ
  rationale: συνήθεια puede indicar trato habitual, cercanía o vínculo por familiaridad. «Intimidad con los amigos» comunica de manera idiomática esa cercanía relacional, evitando un calco demasiado rígido.
- source_word: δεσπόζει
  english_pob_choice: rules over
  chosen_spanish: se impone sobre
  alternatives_spanish:
  - domina sobre
  - ejerce señorío sobre
  lexicon: BDAG
  rationale: El verbo paralelo a κυριεύει expresa autoridad o dominio. «Se impone sobre» conserva la idea de supremacía activa en un español claro y fluido.
- source_word: διὰ πονηρίας
  english_pob_choice: for their evil
  chosen_spanish: por su mal
  alternatives_spanish:
  - por su maldad
  - a causa de su perversidad
  lexicon: LSJ
  rationale: πονηρία apunta a mal moral o perversidad. «Mal» es conciso y natural en español; aquí mantiene la severidad sin añadir matices no exigidos por el texto.
- source_word: ἐξελέγχων
  english_pob_choice: reproving
  chosen_spanish: reprendiéndolos
  alternatives_spanish:
  - convenciéndolos de culpa
  - exponiéndolos
  - corrigiéndolos
  lexicon: BDAG
  rationale: El verbo puede significar reprender, convencer o sacar a la luz la culpa. «Reprendiéndolos» recoge bien la función de reprobación/corrección que el inglés POB fijó con «reproving».
theological_decisions:
- issue: Sujeto implícito del dominio
  english_pob_reading: The verse keeps an implied 'it' that refers to reason from the surrounding context, but does not import the noun into the verse itself.
  chosen_spanish_reading: La frase española también mantiene un sujeto implícito y no nombra explícitamente a «la razón» dentro del verso.
  alternative_spanish_readings:
  - y la razón domina...
  - y esto domina...
  rationale: El griego no expresa un sujeto nominal en el versículo. Mantener la elipsis respeta la continuidad del argumento sin resolverla demasiado pronto ni añadir una interpretación no presente en la línea.
  doctrine_reference: Primacía del texto original y preservación de la tensión contextual.
- issue: Intensidad moral de la disciplina
  english_pob_reading: punishing/reproving indicates moral discipline rather than mere dislike or social disapproval.
  chosen_spanish_reading: «castigándolos» y «reprendiéndolos» conservan la disciplina moral fuerte.
  alternative_spanish_readings:
  - corrigiéndolos
  - amonestándolos
  rationale: El texto no describe simple desagrado, sino acción correctiva frente al mal. La traducción debe conservar esa severidad sin exagerarla más allá del griego.
  doctrine_reference: Disciplina moral / retribución correctiva en el discurso sapiencial helenístico.
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente al evitar un artículo demasiado pesado en la primera cola y al preferir un verbo de reprensión/corrección para ἐξελέγχων, en lugar de una simple idea de «exposición».
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; este versículo no lo contiene.
  - Se mantiene el registro moral fuerte con «maldad/mal» para κακία/πονηρία.
  - Se conserva la estructura paralela del griego con dos miembros coordinados y participios en español.
  - No se introduce «Cristo/Mesías» ni terminología doctrinal ajena al pasaje.
