  glossary_alignment: 'No hay términos del glosario mayor en juego. Las decisiones léxicas clave concuerdan con la POB inglesa: שׂכר -> «contrataron», יעצים -> «consejeros», הפר -> «frustrar», עצה -> «plan» con nota alternativa, מלכות -> «reinado».'
