translation:
  language: es
  text: 'Y le dijo al hombre vestido de lino[a]: «Entra entre el conjunto de ruedas, debajo del querubín, y llena tus manos con brasas de fuego de entre los querubines, y espárcelas sobre la ciudad». Y él entró ante mis ojos.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «entre las ruedas». El término hebreo puede referirse al conjunto con ruedas, más que a una sola rueda.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְבֻשׁ הַבַּדִּים
  english_pob_choice: clothed in linen
  chosen_spanish: vestido de lino
  alternatives_spanish:
  - clothed in linen
  - cubierto de lino
  - con vestiduras de lino
  lexicon: HALOT
  rationale: La expresión participial identifica al hombre por su atuendo. «Vestido de lino» es natural en español, conserva el rasgo descriptivo y evita añadir «vestiduras» como glosa innecesaria.
- source_word: בֵּינוֹת לַגַּלְגַּל
  english_pob_choice: among the wheelwork
  chosen_spanish: entre el engranaje
  alternatives_spanish:
  - entre las ruedas
  - en medio del conjunto de ruedas
  - entre el mecanismo de ruedas
  lexicon: HALOT
  rationale: El hebreo puede designar la estructura rodada en conjunto, no solo una rueda aislada. «Engranaje» intenta reflejar ese sentido colectivo/mecánico sin forzar una imagen moderna de maquinaria más allá de lo que permite el contexto visionario.
- source_word: אֶל תַּחַת לַכְּרוּב
  english_pob_choice: under the cherub
  chosen_spanish: debajo del querubín
  alternatives_spanish:
  - bajo el querubín
  - debajo del querub
  - bajo el querub
  lexicon: HALOT
  rationale: La preposición es espacial y el singular se mantiene. «Querubín» es la forma más transparente y bíblicamente reconocible en español, sin perder el singular del texto.
- source_word: וּמַלֵּא חָפְנֶיךָ
  english_pob_choice: fill your hands
  chosen_spanish: llena tus manos
  alternatives_spanish:
  - llena tus palmas
  - llena tus manos ahuecadas
  lexicon: HALOT
  rationale: חָפְנַיִם alude al hueco o cantidad que pueden contener las manos. «Llena tus manos» conserva la idiomaticidad y la fuerza concreta del mandato.
- source_word: גַחֲלֵי אֵשׁ
  english_pob_choice: coals of fire
  chosen_spanish: brasas de fuego
  alternatives_spanish:
  - brasas encendidas
  - carbones de fuego
  lexicon: HALOT
  rationale: «Brasas de fuego» reproduce la imagen ardiente sin apagarla en una paráfrasis. Mantiene la viveza del hebreo y sugiere el elemento de juicio sin explicarlo.
- source_word: מִבֵּינוֹת לַכְּרֻבִים
  english_pob_choice: from among the cherubim
  chosen_spanish: de entre los querubines
  alternatives_spanish:
  - de en medio de los querubines
  - desde entre los querubines
  lexicon: HALOT
  rationale: La preposición señala origen desde el espacio ocupado por los querubines. «De entre» es una equivalencia natural que conserva la relación espacial.
- source_word: וּזְרֹק עַל הָעִיר
  english_pob_choice: scatter them over the city
  chosen_spanish: y derrámalas sobre la ciudad
  alternatives_spanish:
  - y arrójalas sobre la ciudad
  - y espárcelas sobre la ciudad
  - y castígalas sobre la ciudad
  lexicon: HALOT
  rationale: El objeto directo se sobreentiende por el contexto inmediato. «Derrámalas» funciona en español para dispersar algo suelto y ardiente, sin perder la idea de acción sobre la ciudad.
- source_word: לְעֵינָי
  english_pob_choice: before my eyes
  chosen_spanish: a mis ojos
  alternatives_spanish:
  - ante mis ojos
  - en mi presencia
  lexicon: HALOT
  rationale: El hebreo expresa la visión del profeta. «A mis ojos» suena menos natural; la forma publicada adopta «ante mis ojos» en el sentido de testimonio visible, manteniendo la perspectiva ocular del relato.
- source_word: וַיֹּאמֶר ... וַיֹּאמֶר
  english_pob_choice: And he said ... and said
  chosen_spanish: Y le dijo ...
  alternatives_spanish:
  - Y dijo ...
  - Entonces le dijo ...
  lexicon: HALOT
  rationale: Se evita la repetición redundante en español, siguiendo la revisión inglesa que suprimió el segundo «and said» para reflejar el hebreo con naturalidad.
theological_decisions:
- issue: Función de las brasas arrojadas sobre la ciudad
  english_pob_reading: Render the command straightforwardly as an act of judgment without explicating symbolism in the main text.
  chosen_spanish_reading: Presentar el mandato como una acción directa sobre la ciudad, sin añadir interpretación simbólica en el texto principal.
  alternative_spanish_readings:
  - explicitar que es un acto de juicio
  - introducir una nota de purificación
  rationale: El versículo, por sí mismo, no desarrolla la simbolización. Mantener la imagen desnuda preserva la tensión interpretativa y se alinea con el principio de no resolver teológicamente lo que el texto no explica.
  doctrine_reference: 'Translational principle: preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La revisión inglesa reciente eliminó la repetición redundante de “and said”, manteniendo el resto del formulado. La versión española sigue esa decisión y conserva la estructura breve del mandato y el cierre visual.
  spanish_consistency_notes:
  - Se usó «Yahvé» como forma base para el nombre divino solo cuando aparezca en el texto; en este versículo no ocurre.
  - Se prefirió «querubín/querubines» para mantener el singular/plural del hebreo sin normalizarlo en un sentido litúrgico posterior.
  - «Brasas de fuego» conserva la imagen ardiente sin convertirla en explicación doctrinal.
  - La nota [a] está anclada explícitamente en «entre el engranaje» y ofrece la alternativa espacial del hebreo.
