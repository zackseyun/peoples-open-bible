translation:
  language: es
  text: En cambio[a], deberás destruirlos por completo[b]—los hititas, los amorreos, los cananeos, los ferezeos, los heveos y los jebuseos— como Yahvé tu Dios te ha mandado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «más bien / en cambio»; aquí se expresa el contraste con la instrucción anterior.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «los pondrás bajo חרם / la prohibición total»; el verbo intensifica la orden y se refiere a una destrucción total bajo mandato divino.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: Instead
  chosen_spanish: En cambio
  alternatives_spanish:
  - Más bien
  - Por el contrario
  - En vez de eso
  lexicon: HALOT
  rationale: Aquí כִּי introduce contraste con la instrucción anterior; «En cambio» comunica bien la oposición en español sin perder naturalidad.
- source_word: הַחֲרֵם תַּחֲרִימֵם
  english_pob_choice: utterly destroy them
  chosen_spanish: destruirlos por completo
  alternatives_spanish:
  - exterminarlos totalmente
  - ponerlos bajo la prohibición total
  - arrasarlos por completo
  lexicon: HALOT
  rationale: La construcción intensiva expresa una acción total y enfática. «Destruirlos por completo» conserva la fuerza sin oscurecer al lector, y mantiene abierta la tensión legal/cultual de חרם.
- source_word: הַחִתִּי
  english_pob_choice: the Hittites
  chosen_spanish: los hititas
  alternatives_spanish:
  - los hetitas
  lexicon: HALOT
  rationale: Nombre étnico estándar en español bíblico moderno.
- source_word: וְהָאֱמֹרִי
  english_pob_choice: the Amorites
  chosen_spanish: los amorreos
  alternatives_spanish:
  - los amoritas
  lexicon: HALOT
  rationale: Forma tradicional y comprensible para el grupo étnico/nacional.
- source_word: הַכְּנַעֲנִי
  english_pob_choice: the Canaanites
  chosen_spanish: los cananeos
  alternatives_spanish:
  - los canaanitas
  lexicon: HALOT
  rationale: Equivalente español consolidado para el pueblo de Canaán.
- source_word: וְהַפְּרִזִּי
  english_pob_choice: the Perizzites
  chosen_spanish: los ferezeos
  alternatives_spanish:
  - los perizitas
  lexicon: HALOT
  rationale: «Ferezeos» es la forma bíblica asentada en español y evita una transliteración menos reconocible.
- source_word: הַחִוִּי
  english_pob_choice: the Hivites
  chosen_spanish: los heveos
  alternatives_spanish:
  - los hibitas
  lexicon: HALOT
  rationale: La forma española establecida es «heveos».
- source_word: וְהַיְבוּסִי
  english_pob_choice: the Jebusites
  chosen_spanish: los jebuseos
  alternatives_spanish:
  - los jebusitas
  lexicon: HALOT
  rationale: Forma española usual para el grupo étnico de Jerusalén.
- source_word: כַּאֲשֶׁר
  english_pob_choice: as
  chosen_spanish: como
  alternatives_spanish:
  - tal como
  - según
  lexicon: HALOT
  rationale: «Como» reproduce de manera simple la comparación/normativa del hebreo en español natural.
- source_word: צִוְּךָ
  english_pob_choice: has commanded you
  chosen_spanish: te ha mandado
  alternatives_spanish:
  - te mandó
  - te ordenó
  lexicon: HALOT
  rationale: El presente perfecto en español transmite la orden previa con vigencia actual, como en el audit trail inglés.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
  rationale: Se sigue el estándar del proyecto para el Tetragrámaton, preservando el nombre divino en lugar de un sustituto funcional.
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu Dios y Señor
  lexicon: HALOT
  rationale: Expresión pactual directa y estándar en español bíblico, sin sobreexplicar.
theological_decisions:
- issue: Sentido de חֵרֶם/חרם en mandato de guerra
  english_pob_reading: utterly destroy them
  chosen_spanish_reading: destruirlos por completo
  alternative_spanish_readings:
  - ponerlos bajo la prohibición total
  - exterminarlos totalmente
  - darlos por completo a destrucción
  rationale: El hebreo señala una destrucción total bajo mandato divino, con trasfondo de consagración/prohibición. En el texto principal se opta por una formulación directa y legible, y se conserva en nota la alternativa más técnica para no borrar la tensión léxica.
  doctrine_reference: 'DOCTRINE.md Contested terms: חרם (ḥerem)'
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: Se mantiene la transliteración establecida por el proyecto para el nombre pactual de Dios, en vez de sustituirla por un título genérico.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: El audit trail inglés muestra una revisión desde una paráfrasis más técnica («completely devote them to destruction») hacia una formulación más directa («utterly destroy them»). La versión española sigue esa última decisión en el texto principal, pero mantiene en nota el trasfondo de חרם para no perder el valor lexical y teológico documentado.
  spanish_consistency_notes:
  - Se usa «Yahvé» consistentemente para יְהוָה según el estándar del proyecto.
  - Se eligen formas étnicas bíblicas asentadas en español («hititas», «amorreos», «cananeos», «ferezeos», «heveos», «jebuseos») para máxima inteligibilidad.
  - «Destruirlos por completo» busca equilibrio entre fidelidad al intensivo hebreo y fluidez natural en español.
  - Los corchetes de nota se colocan solo en palabras con decisión lexical documentable.
