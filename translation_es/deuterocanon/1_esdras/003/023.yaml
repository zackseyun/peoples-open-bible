translation:
  language: es
  text: Señores[a], ¿no prevalece el vino, puesto que obliga a obrar así? Y enmudeció después de decir esto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «Oh hombres, ¿no prevalece el vino porque obliga así a obrar?».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὦ ἄνδρες
  english_pob_choice: Men
  chosen_spanish: Hombres
  alternatives_spanish:
  - Oh hombres
  - Varones
  - Señores
  lexicon: LSJ
  rationale: El vocativo masculino plural se vierte de forma directa y natural en español con "Hombres". Mantiene la apelación al auditorio masculino sin añadir un registro más formal de lo que exige el griego.
- source_word: οὐχ ὑπερισχύει
  english_pob_choice: does not ... prevail
  chosen_spanish: ¿no prevalece?
  alternatives_spanish:
  - ¿no es más fuerte?
  - ¿no domina?
  - ¿no tiene la ventaja?
  lexicon: LSJ
  rationale: '"Prevalece" conserva la idea de superioridad o fuerza dominante en una pregunta retórica, sin reducir el sentido a una mera comparación de fuerza física.'
- source_word: ὁ οἶνος
  english_pob_choice: wine
  chosen_spanish: el vino
  alternatives_spanish:
  - el vino fermentado
  - la bebida
  - el vino bebido
  lexicon: LSJ
  rationale: Equivalente léxico directo y transparente.
- source_word: ὅτι οὕτως ἀναγκάζει ποιεῖν
  english_pob_choice: since it compels one to act this way
  chosen_spanish: puesto que obliga a obrar así
  alternatives_spanish:
  - porque fuerza a hacer esto
  - ya que constriñe a actuar de este modo
  - porque hace obrar así
  lexicon: LSJ
  rationale: '"Obliga" recoge la fuerza de ἀναγκάζει, y "obrar" mantiene el valor amplio de ποιεῖν como actuar o hacer, con una formulación natural en español. "Así" preserva el demostrativo de la situación descrita.'
- source_word: ἐσίγησεν
  english_pob_choice: became silent
  chosen_spanish: enmudeció
  alternatives_spanish:
  - quedó en silencio
  - se calló
  - permaneció callado
  lexicon: LSJ
  rationale: El aoristo narrativo marca el paso a la ausencia de habla; "enmudeció" es conciso y idiomático en español, y conserva el cierre de la intervención.
- source_word: οὕτως εἴπας
  english_pob_choice: after saying this
  chosen_spanish: después de decir esto
  alternatives_spanish:
  - habiendo dicho esto
  - tras decir esto
  - así que dijo esto
  lexicon: LSJ
  rationale: La frase participial se vierte de manera temporal y clara, manteniendo la secuencia anterior a callar.
translation_notes:
  revision_awareness: La versión española sigue la lectura griega de Swete (alta confianza, acuerdo confirmado) y refleja el ajuste del audit trail inglés en ἐσίγησεν como un cierre narrativo neutro. Se ha optado por un español natural sin perder la pregunta retórica ni la relación causal del vino con la conducta.
  spanish_consistency_notes:
  - Se mantiene "vino" como término literal y no se interpreta metafóricamente más allá de lo que exige el contexto.
  - '"Obrar" se usa para conservar la amplitud verbal de ποιεῖν sin volver la frase demasiado coloquial.'
  - '"Enmudeció" expresa el final del habla de forma más concisa que una perífrasis, acorde con el valor narrativo del aoristo.'
