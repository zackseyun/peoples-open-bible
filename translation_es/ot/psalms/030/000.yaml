translation:
  language: es
  text: Un salmo. Un cántico para la dedicación de la casa[a]. De David.[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el templo» o «el palacio»; el hebreo dice simplemente «la casa».
    reason: alternative_reading
  - marker: b
    text: O «Un salmo, un cántico para la dedicación de la casa, de David».
    reason: previous_rendering
lexical_decisions:
- source_word: מִזְמ֡וֹר
  english_pob_choice: A psalm
  chosen_spanish: Un salmo
  alternatives_spanish:
  - Un cántico salmódico
  - Una composición para cantar
  lexicon: HALOT
  rationale: «Salmo» es el equivalente natural en español para el género del superscrito y conserva la identificación litúrgico-poética sin añadir contenido ajeno.
- source_word: שִׁיר
  english_pob_choice: a song
  chosen_spanish: Un cántico
  alternatives_spanish:
  - Una canción
  - Un canto
  lexicon: HALOT
  rationale: «Cántico» expresa bien la idea de una pieza para ser cantada en registro bíblico y evita la redundancia de repetir «salmo» con otra palabra demasiado plana; mantiene la pareja de designaciones del hebreo.
- source_word: חֲנֻכַּת
  english_pob_choice: for the dedication
  chosen_spanish: para la dedicación
  alternatives_spanish:
  - en la dedicación
  - de dedicación
  lexicon: HALOT
  rationale: La preposición «para» refleja de forma natural la función u ocasión indicada por el superscrito, equivalente al valor de uso/ocasión que el inglés POB captó con «for the dedication».
- source_word: הַבַּיִת
  english_pob_choice: the house
  chosen_spanish: la casa
  alternatives_spanish:
  - el templo
  - el palacio
  lexicon: HALOT
  rationale: Se conserva el sustantivo genérico «la casa» para no resolver la ambigüedad del hebreo. Esto mantiene abierta la referencia posible a templo, palacio o una casa en sentido más amplio, tal como exige el audit trail.
- source_word: לְדָוִד
  english_pob_choice: of David
  chosen_spanish: De David
  alternatives_spanish:
  - Para David
  - Perteneciente a David
  lexicon: HALOT
  rationale: En un superscrito, «De David» preserva la ambigüedad genitiva de autoría, asociación o dedicación sin volver más específico de lo que permite el hebreo.
theological_decisions:
- issue: Referencia de «la casa» en el superscrito
  english_pob_reading: the house
  chosen_spanish_reading: la casa
  alternative_spanish_readings:
  - el templo
  - el palacio de David
  rationale: El texto hebreo no identifica de manera inequívoca el referente de בַּיִת. Mantener «la casa» preserva la tensión interpretativa documentada por el POB en vez de cerrarla con una conclusión histórica no explicitada.
  doctrine_reference: 'Translation philosophy 3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'El inglés POB fue revisado para presentar el superscrito como una lista de rótulos breves separados por puntos: género, ocasión y atribución. Este borrador español sigue esa misma estructura para reflejar mejor la sintaxis del hebreo y la claridad editorial del estado más reciente del texto auditado.'
  spanish_consistency_notes:
  - Se mantuvo la distinción entre «salmo» y «cántico» para preservar los dos términos hebreos.
  - Se eligió «la casa» en lugar de un equivalente interpretativo como «el templo» para respetar la ambigüedad documentada.
  - «De David» se deja como rótulo de atribución breve, acorde con el formato de superscripción.
  - La nota al pie marca la alternativa semántica principal sin introducir una decisión no respaldada por el paquete fuente.
