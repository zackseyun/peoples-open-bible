translation:
  language: es
  text: 'Así dice el Señor Yahvé: Este es el límite por el cual ustedes repartirán la tierra como herencia entre las doce tribus de Israel[a]; José tendrá dos porciones.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «José, porciones»; es decir, José recibe una doble porción territorial.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: Yahvé, el Señor
  alternatives_spanish:
  - el Señor Yahvé
  - el Señor Dios
  lexicon: HALOT
  rationale: Se conserva el nombre divino YHWH como «Yahvé» según el criterio español del proyecto, y אֲדֹנָי se vierte como «el Señor». En español, la secuencia «Yahvé, el Señor» evita la redundancia artificial de «Señor Dios» y preserva la distinción entre el título אדני y el nombre propio divino.
- source_word: גֵּה גְבוּל
  english_pob_choice: This is the boundary
  chosen_spanish: Este es el límite
  alternatives_spanish:
  - Este es el borde
  - Esta es la frontera
  lexicon: HALOT
  rationale: «Límite» comunica bien el marco de la repartición territorial y suena natural en español bíblico actual. «Frontera» sería posible, pero puede sugerir un sentido político moderno; «borde» resulta menos formal.
- source_word: תִּתְנַחֲלוּ
  english_pob_choice: you shall apportion ... as an inheritance
  chosen_spanish: ustedes repartirán la tierra como herencia
  alternatives_spanish:
  - ustedes la heredarán
  - ustedes dividirán para herencia
  lexicon: HALOT
  rationale: El verbo hebreo expresa tanto la asignación distributiva como el marco de herencia. «Repartirán ... como herencia» mantiene esa fuerza sin reducirlo solo a «heredar».
- source_word: הָאָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  - el territorio
  lexicon: HALOT
  rationale: En Ezequiel, el contexto es la restauración y distribución territorial de la הארץ; «la tierra» es el equivalente más estable y bíblico en español.
- source_word: לִשְׁנֵי עָשָׂר שִׁבְטֵי יִשְׂרָאֵל
  english_pob_choice: among the twelve tribes of Israel
  chosen_spanish: entre las doce tribus de Israel
  alternatives_spanish:
  - para las doce tribus de Israel
  - a las doce tribus de Israel
  lexicon: HALOT
  rationale: La preposición se entiende distributivamente en este contexto. «Entre» expresa con claridad que el reparto ocurre dentro del conjunto de las tribus.
- source_word: יוֹסֵף חֲבָלִים
  english_pob_choice: Joseph shall have two portions
  chosen_spanish: José tendrá dos porciones
  alternatives_spanish:
  - José tendrá dos lotes
  - José tendrá dos repartos
  lexicon: HALOT
  rationale: 'חֲבָלִים puede referirse a porciones/partes territoriales en un contexto de medición y reparto. Se sigue el sentido auditado por el POB inglés: una doble porción para José.'
theological_decisions:
- issue: Tratamiento del Tetragrámaton en el título compuesto אֲדֹנָי יְהוִה
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: Yahvé, el Señor
  alternative_spanish_readings:
  - el Señor Yahvé
  - el Señor Dios
  rationale: El proyecto español usa «Yahvé» para YHWH. Como אֲדֹנָי ya aporta el título «Señor», se mantiene la distinción nombre/título con «Yahvé, el Señor»; esto evita perder la lectura del nombre divino y respeta el valor compuesto del hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se requieren cambios respecto del sentido base. Se conservó la decisión auditada de una doble porción para José y el valor compositivo de אֲדֹנָי יְהוִה en español.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para YHWH conforme al estándar del proyecto.
  - Se mantiene «la tierra» en sentido territorial-restaurativo, no como mero suelo físico.
  - «José tendrá dos porciones» refleja la fuerza distributiva de חֲבָלִים sin explicitar en el texto principal la glosa interpretativa.
