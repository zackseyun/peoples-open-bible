review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la estructura y el sentido general del hebreo y del POB inglés: mantiene la doble llamada de atención, «el día», la inminencia de «viene» y la secuencia metafórica de vara/retoño/floración. También conserva con nota la alternativa para הַצְּפִרָה. Sin embargo, «desastre» atenúa y desplaza el matiz de fatalidad/decreto de juicio que el POB inglés fijó como «doom»; una opción como «la condena» o «la ruina» refleja mejor el contexto ominoso y la decisión auditada.'
  spanish_quality_summary: 'El español es claro, natural y legible. No obstante, «¡Mira!» dirigido en singular puede sonar algo marcado en un anuncio profético no dirigido a un interlocutor individual; «¡Miren!» sería posible, pero no es necesario cambiarlo porque la personificación exhortativa existe en español bíblico moderno. La mejora principal es léxica: sustituir «desastre» por una formulación más acorde con el juicio anunciado. El resto («vara», «ha retoñado», «ha florecido», «soberbia») funciona bien.'
  glossary_alignment: 'No hay conflictos con los términos doctrinales principales del proyecto. La decisión clave debatida es הַצְּפִרָה: el inglés auditado optó por «doom» con nota «morning». En español, «desastre» no preserva del todo esa misma racionalidad; «la condena» se alinea mejor con el valor de juicio/fatalidad sin cerrar indebidamente la dificultad textual. La nota existente está bien orientada y debe mantenerse.'
  issues:
  - severity: medium
    issue: «el desastre» para הַצְּפִרָה queda demasiado genérico
    rationale: 'El POB inglés documenta una elección contextual fuerte: «doom». «Desastre» puede describir una calamidad en general, pero pierde el matiz de fatalidad sentenciada o juicio ya desatado que estructura el versículo.'
  - severity: low
    issue: La nota no refleja la alternativa inglesa «has gone out» con toda la fuerza del hebreo debatido
    rationale: La nota en sí es aceptable, pero el texto principal debería coordinar mejor con ella mediante una palabra más afín a «doom» que a un simple resultado calamitoso.
  revised_spanish_text: ¡Mira[a], el día! ¡Mira, viene! Ha salido la condena; ha retoñado la vara; ha florecido la soberbia.
  revised_footnotes:
  - marker: a
    text: O «la mañana»; el término hebreo es difícil y puede referirse literalmente a la mañana o figuradamente al giro fatal que ha llegado.
    reason: alternative_reading
