    issue: Concordancia implícita de «la tercera»
    rationale: El griego tiene neutro elíptico («lo tercero / el tercero»), mientras que el español adapta la elipsis al femenino por concordancia con «clases». Esto es aceptable y además queda cubierto por la nota alternativa «la tercera clase». No requiere cambio.
