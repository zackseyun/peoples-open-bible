translation:
  language: es
  text: Todas las personas pertenecientes a Jacob que llegaron a Egipto, que salieron de sus lomos[a], aparte de las esposas de los hijos de Jacob, eran en total sesenta y seis personas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente, ‘los que salen de su muslo o lomo’, un modismo para los descendientes biológicos.
    reason: lexical_alternative
  - marker: b
    text: 'O: ‘todas las almas ... sesenta y seis’. Aquí נֶפֶשׁ es una manera hebrea de contar personas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל הַנֶּפֶשׁ
  english_pob_choice: All the persons
  chosen_spanish: Todas las personas
  alternatives_spanish:
  - Todas las almas
  - Toda persona
  lexicon: HALOT
  rationale: En un contexto de recuento genealógico, נֶפֶשׁ funciona idiomáticamente como ‘persona’ y no como ‘alma’ en sentido espiritual. ‘Todas las personas’ conserva el valor de conteo sin introducir un calco teológico ajeno al pasaje.
- source_word: הַבָּאָה לְיַעֲקֹב מִצְרַיְמָה
  english_pob_choice: belonging to Jacob who came to Egypt
  chosen_spanish: pertenecientes a Jacob que llegaron a Egipto
  alternatives_spanish:
  - que vinieron con Jacob a Egipto
  - que llegaron a Jacob a Egipto
  lexicon: HALOT
  rationale: La revisión inglesa destaca la pertenencia a Jacob más que una simple compañía física. En español, ‘pertenecientes a Jacob’ refleja ese matiz relacional, y ‘que llegaron a Egipto’ preserva el movimiento del texto hebreo.
- source_word: יֹצְאֵי יְרֵכ֔וֹ
  english_pob_choice: who came from his loins
  chosen_spanish: que salieron de sus lomos
  alternatives_spanish:
  - que salieron de su muslo
  - sus descendientes biológicos
  lexicon: HALOT
  rationale: La expresión hebrea es un modismo corporal para descendencia biológica. ‘Sus lomos’ mantiene la concreción del hebreo y la imagen idiomática; ‘descendientes biológicos’ sería más explicativo, pero menos fiel al color del original.
- source_word: מִלְּבַד
  english_pob_choice: besides
  chosen_spanish: aparte de
  alternatives_spanish:
  - además de
  - excepto
  lexicon: HALOT
  rationale: Aquí introduce una exclusión del total contado. ‘Aparte de’ es natural en español y conserva la función exceptiva del término.
- source_word: נְשֵׁי בְנֵי יַעֲקֹב
  english_pob_choice: the wives of Jacob’s sons
  chosen_spanish: las esposas de los hijos de Jacob
  alternatives_spanish:
  - las mujeres de los hijos de Jacob
  - las esposas de los hijos de Jacob
  lexicon: HALOT
  rationale: ‘Esposas’ es el equivalente más claro y digno en español contemporáneo. ‘Hijos de Jacob’ conserva la relación genitiva del hebreo sin necesidad de una reexpresión más libre.
- source_word: כָּל נֶפֶשׁ שִׁשִּׁים וָשֵׁשׁ
  english_pob_choice: were sixty-six persons in all
  chosen_spanish: fueron en total sesenta y seis personas
  alternatives_spanish:
  - eran sesenta y seis personas en total
  - el total fue de sesenta y seis personas
  lexicon: HALOT
  rationale: El hebreo cierra con el total del recuento. ‘Fueron en total’ comunica con naturalidad el resultado numérico y mantiene ‘personas’ para coherencia con el inicio del versículo.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés POB, que ajusta la frase principal para reflejar mejor la construcción hebrea de pertenencia a Jacob. La versión española adopta ese matiz con ‘pertenecientes a Jacob’ y conserva el resto del versículo con el mismo valor de recuento genealógico.
  spanish_consistency_notes:
  - Se mantuvo ‘personas’ para נֶפֶשׁ dentro del recuento, en línea con el criterio POB de evitar ‘almas’ como traducción automática en contextos censales.
  - Se preservó el modismo corporal de ‘sus lomos’ mediante nota, porque el español común permite la expresión sin perder inteligibilidad.
  - Se evitó ‘SEÑOR’ u otras sustituciones no pertinentes, ya que este versículo no contiene el nombre divino.
