  to: Él también escribió acerca de la provisión y de la vestidura sacerdotal[a], en qué habían de ministrar en ella.
  rationale: Se ajusta la redacción para reflejar mejor la compresión sintáctica del griego y la nota léxica del POB, evitando una sobreinterpretación de ἐν τίνι. También se mejora la naturalidad y dignidad del español con «vestidura sacerdotal» y «provisión», manteniendo el matiz cultual de «ministrar».
