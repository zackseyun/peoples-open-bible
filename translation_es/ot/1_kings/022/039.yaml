translation:
  language: es
  text: El resto de los hechos de Ahab, y todo lo que hizo, y la casa de marfil[a] que edificó, y todas las ciudades que edificó, ¿no están escritos en el Libro de las Crónicas de los reyes de Israel[b]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la casa de marfil». La expresión probablemente se refiere a un edificio real adornado con marfil, más que a una construcción hecha enteramente de marfil.'
    reason: lexical_alternative
  - marker: b
    text: «El Libro de las Crónicas de los reyes de Israel» designa una fuente real de archivo citada en Reyes, no necesariamente el libro bíblico de Crónicas.
    reason: cross_reference
lexical_decisions:
- source_word: וְיֶתֶר
  english_pob_choice: Now the rest of
  chosen_spanish: El resto de
  alternatives_spanish:
  - Y el resto de
  - Ahora el resto de
  lexicon: HALOT
  rationale: יֶתֶר introduce el remanente del relato sobre un rey. En español, 'El resto de' conserva el valor de 'the rest of' sin añadir un adverbio discursivo no requerido por el hebreo.
- source_word: דִּבְרֵי
  english_pob_choice: acts
  chosen_spanish: hechos
  alternatives_spanish:
  - actos
  - cosas
  - asuntos
  lexicon: HALOT
  rationale: En la fórmula regnal de Reyes, דברי no significa solo 'palabras', sino el conjunto de hechos registrados de un rey. 'Hechos' comunica bien ese sentido histórico y evita una traducción demasiado literal que sonaría extraña en español.
- source_word: וְכָל אֲשֶׁר עָשָׂה
  english_pob_choice: and all that he did
  chosen_spanish: y todo lo que hizo
  alternatives_spanish:
  - y todo cuanto hizo
  - y todo lo que realizó
  lexicon: HALOT
  rationale: La cláusula relativa se rinde de manera directa. 'Hizo' preserva el amplio alcance del verbo עשה sin interpretarlo como 'logró' o 'consumó'.
- source_word: בֵּית הַשֵּׁן
  english_pob_choice: the ivory house
  chosen_spanish: la casa de marfil
  alternatives_spanish:
  - la casa de marfil
  - el palacio de marfil
  - la casa de marfil
  lexicon: HALOT
  rationale: El hebreo permite tanto una construcción genitiva ('casa de marfil') como una descripción adjetival. Dado que el inglés POB documenta la alternativa literal 'the house of ivory' y aclara que probablemente se trata de un edificio real adornado con marfil, 'casa de marfil' mantiene la ambigüedad lexical sin convertirla en 'palacio', que sería una interpretación adicional.
- source_word: אֲשֶׁר בָּנָה
  english_pob_choice: that he built
  chosen_spanish: que edificó
  alternatives_spanish:
  - que construyó
  - que levantó
  - que hizo construir
  lexicon: HALOT
  rationale: '''Edificó'' conserva el sentido de construir un edificio y combina bien con ''casa de marfil'' y ''ciudades''. ''Construyó'' también sería posible, pero ''edificó'' suena algo más solemne y bíblico sin ser arcaizante.'
- source_word: וְכָל הֶעָרִים אֲשֶׁר בָּנָה
  english_pob_choice: and all the cities that he built
  chosen_spanish: y todas las ciudades que edificó
  alternatives_spanish:
  - y todas las ciudades que construyó
  - y todas las urbes que edificó
  lexicon: HALOT
  rationale: עָרִים se rinde normalmente por 'ciudades'. Se conserva el verbo 'edificar' para mantener la misma raíz semántica en la secuencia de construcciones reales.
- source_word: הֲלוֹא
  english_pob_choice: are they not
  chosen_spanish: ¿no están
  alternatives_spanish:
  - ¿acaso no están
  - ¿no se hallan
  lexicon: HALOT
  rationale: La partícula introduce una pregunta retórica con respuesta afirmativa esperada. En español, '¿no están...?' expresa naturalmente esa expectativa sin volverla excesivamente enfática.
- source_word: כְּתוּבִים
  english_pob_choice: written
  chosen_spanish: escritos
  alternatives_spanish:
  - anotados
  - registrados
  lexicon: HALOT
  rationale: El participio pasivo se traduce de forma directa por 'escritos'. 'Registrados' sería posible, pero 'escritos' conserva con mayor fidelidad la imagen del texto fuente.
- source_word: עַל סֵפֶר
  english_pob_choice: in the Book
  chosen_spanish: en el Libro
  alternatives_spanish:
  - en el rollo
  - sobre el libro
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente 'sobre un libro/rollo', el español bíblico puede decir 'en el Libro' para una fuente escrita archivística. Esta solución sigue la decisión del inglés POB de mantener la referencia a una fuente documental.
- source_word: סֵפֶר דִּבְרֵי הַיָּמִים
  english_pob_choice: the Book of the Chronicles
  chosen_spanish: el Libro de las Crónicas
  alternatives_spanish:
  - el libro de los anales
  - el libro de los hechos de los días
  lexicon: HALOT
  rationale: Se conserva la designación habitual del título documental. 'Crónicas' es el equivalente más natural en español para esta fórmula historiográfica, sin identificarla con el libro canónico de Crónicas.
- source_word: לְמַלְכֵי יִשְׂרָאֵל
  english_pob_choice: of the Kings of Israel
  chosen_spanish: de los reyes de Israel
  alternatives_spanish:
  - para los reyes de Israel
  lexicon: HALOT
  rationale: La preposición ל expresa relación/posesión en el título documental. 'De los reyes de Israel' transmite mejor esa vinculación que una lectura final o dativa.
theological_decisions:
- issue: Referencia a una fuente documental no canónica
  english_pob_reading: The Book of the Chronicles of the Kings of Israel refers to a royal record source cited in Kings, not necessarily to the biblical book of Chronicles.
  chosen_spanish_reading: El Libro de las Crónicas de los reyes de Israel refiere a una fuente real de archivo citada en Reyes, no necesariamente al libro bíblico de Crónicas.
  alternative_spanish_readings:
  - una crónica histórica de los reyes de Israel
  - un registro real de los reyes de Israel
  rationale: La frase debe leerse como cita de una fuente historiográfica real, no como identificación automática con el libro canónico de Crónicas. Esta distinción preserva la nota crítica del POB en inglés.
  doctrine_reference: Crítica textual e historiografía bíblica
- issue: Construcción de בֵּית הַשֵּׁן
  english_pob_reading: The phrase likely refers to a royal building decorated with ivory rather than a structure made entirely of ivory.
  chosen_spanish_reading: La casa de marfil sugiere probablemente un edificio real adornado con marfil, no necesariamente una construcción hecha enteramente de marfil.
  alternative_spanish_readings:
  - palacio de marfil
  - casa hecha de marfil
  rationale: 'La traducción mantiene la tensión lexical documentada: el sintagma puede referirse tanto a una ''casa de marfil'' como, interpretativamente, a un edificio de élite adornado con marfil. No se cierra la ambigüedad en el texto principal.'
  doctrine_reference: Ninguna
translation_notes:
  revision_awareness: 'Coincide con la última revisión disponible: no se registran cambios aplicados ni desacuerdos sustanciales en el cotejo más reciente.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como término por defecto cuando corresponda; en este versículo no aparece.
  - Se conserva 'de los reyes de Israel' para reflejar la relación posesiva del título documental.
  - Se evita 'SEÑOR' porque el versículo no contiene el tetragrámaton ni una cita directa de κύριος.
  - '''Casa de marfil'' preserva la ambigüedad lexical señalada por el audit trail inglés sin introducir ''palacio''.'
