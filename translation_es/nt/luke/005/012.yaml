source:
  edition: SBLGNT
  text: Καὶ ἐγένετο ἐν τῷ εἶναι αὐτὸν ἐν μιᾷ τῶν πόλεων καὶ ἰδοὺ ἀνὴρ πλήρης λέπρας· ⸂καὶ ἰδὼν⸃ τὸν Ἰησοῦν πεσὼν ἐπὶ πρόσωπον ἐδεήθη αὐτοῦ λέγων· Κύριε, ἐὰν θέλῃς δύνασαί με καθαρίσαι.
base_translation:
  language: en
  yaml_path: translation/nt/luke/005/012.yaml
  text: And it happened that while he was in one of the towns[a], behold, there was a man full of leprosy. And when he saw Jesus, he fell on his face and begged him, saying, “Lord, if you are willing[b], you can cleanse me.”
  footnotes:
  - marker: a
    text: Or “covered with leprosy.” The Greek says “full of leprosy,” emphasizing the severity of his condition.
    reason: lexical_alternative
  - marker: b
    text: Or “make me clean.” The verb can refer to cleansing in both physical and ritual/social senses, not merely medical healing.
    reason: lexical_alternative
