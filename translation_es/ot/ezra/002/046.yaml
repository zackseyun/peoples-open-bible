lexical_decisions:
- source_word: בְּנֵי
  english_pob_choice: the sons of
  chosen_spanish: los hijos de
  alternatives_spanish:
  - los descendientes de
  - los niños de
  lexicon: HALOT
  rationale: En listas genealógicas del retorno, la construcción funciona como fórmula de clan o linaje. En español, «los hijos de» conserva el registro genealógico y resulta natural y transparente. «Los descendientes de» explicaría el sentido, pero pierde la forma repetida del hebreo; «los niños de» no conviene al contexto.
- source_word: חָגָב
  english_pob_choice: Hagab
  chosen_spanish: Hagab
  alternatives_spanish:
  - Jagab
  lexicon: HALOT
  rationale: Nombre propio o de grupo, por lo que se translitera. Se mantiene «Hagab» para seguir la tradición de transliteración usada en el inglés POB; «Jagab» sería una adaptación gráfica posible en español, pero aquí no es necesaria.
- source_word: שמלי
  english_pob_choice: Shamlai
  chosen_spanish: Shamlai
  alternatives_spanish:
  - Shalmai
  lexicon: HALOT
  rationale: Nombre propio transliterado. Se conserva «Shamlai» porque refleja directamente la forma consonántica de este versículo. «Shalmai» sigue siendo una alternativa textual conocida, pero no es la forma principal del texto base aquí.
- source_word: חָנָן
  english_pob_choice: Hanan
  chosen_spanish: Hanan
  alternatives_spanish:
  - Janán
  lexicon: HALOT
  rationale: Nombre propio transliterado directamente. Se conserva la forma breve y estándar «Hanan» en español bíblico.
