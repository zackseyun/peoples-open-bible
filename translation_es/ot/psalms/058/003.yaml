revisions:
- from: Sí, aun en vuestro corazón cometéis injusticia[a]; sobre la tierra vuestras manos pesan violencia[b].
  to: Aun en vuestro corazón cometéis injusticia; sobre la tierra[a] vuestras manos pesan[b] violencia.
  rationale: 'Se corrige el problema principal de fidelidad editorial: las notas al pie ahora están ancladas al sintagma correcto y en el orden debido. Además, se mejora ligeramente la naturalidad del arranque sustituyendo ''Sí, aun'' por ''Aun'', sin perder la fuerza enfática de אַף.'
