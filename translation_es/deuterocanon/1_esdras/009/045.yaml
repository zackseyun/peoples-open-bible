translation:
  language: es
  text: Y tomó Esdras el libro ante la multitud[a], pues estaba sentado en un lugar prominente delante de todos[c][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Multitud» conserva el matiz de un gran grupo reunido; también puede entenderse como «gente», «asamblea» o «muchedumbre».
    reason: lexical_alternative
  - marker: b
    text: El griego dice «el libro»; históricamente podría tratarse de un rollo.
    reason: cultural_note
  - marker: c
    text: También puede traducirse «estaba sentado con distinción» o «estaba sentado honorablemente»; el adverbio griego indica una posición públicamente distinguida.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀναλαβών
  english_pob_choice: took up
  chosen_spanish: tomó
  alternatives_spanish:
  - tomó en sus manos
  - levantó
  - recogió
  lexicon: LSJ
  rationale: El participio expresa que Esdras tomó el libro para manejarlo; en español, «tomó» comunica esa acción de modo natural sin añadir una elevación ceremonial que el griego no exige.
- source_word: τὸ βιβλίον
  english_pob_choice: the book
  chosen_spanish: el libro
  alternatives_spanish:
  - el rollo
  - el manuscrito
  lexicon: LSJ
  rationale: βιβλίον designa literalmente «libro», aunque históricamente pudiera ser un rollo. Se conserva el término directo del griego y se deja abierta la nota cultural.
- source_word: τοῦ πλήθους
  english_pob_choice: the multitude
  chosen_spanish: la multitud
  alternatives_spanish:
  - la gente
  - la asamblea
  - la muchedumbre
  lexicon: LSJ
  rationale: πλῆθος se refiere a un gran conjunto reunido. «La multitud» mantiene la fuerza de una gran asamblea pública y sigue de cerca el sustantivo griego.
- source_word: ἐνώπιον
  english_pob_choice: before
  chosen_spanish: ante / delante de
  alternatives_spanish:
  - en presencia de
  - frente a
  lexicon: LSJ
  rationale: El adverbio/preposición marca una escena pública visible; «ante» y «delante de» conservan esa relación espacial y social sin sobreinterpretarla.
- source_word: προεκάθητο
  english_pob_choice: was seated
  chosen_spanish: estaba sentado
  alternatives_spanish:
  - se hallaba sentado
  - se sentaba
  - estaba colocado sentado
  lexicon: LSJ
  rationale: El imperfecto describe su postura/estado en ese momento. «Estaba sentado» reproduce bien la situación continua sin forzar una acción puntual.
- source_word: ἐπιδόξως
  english_pob_choice: prominently
  chosen_spanish: en lugar prominente
  alternatives_spanish:
  - honrosamente
  - con distinción
  - de manera visible
  lexicon: LSJ
  rationale: El adverbio indica una posición distinguida y pública. En español, «en lugar prominente» comunica mejor el estatus visible que una adverbialidad abstracta como «honrosamente».
- source_word: πάντων
  english_pob_choice: them all
  chosen_spanish: de todos
  alternatives_spanish:
  - de ellos todos
  - de todos los presentes
  - de toda la gente
  lexicon: LSJ
  rationale: En contexto, πάντων se refiere a los reunidos. «Delante de todos» preserva la referencia global sin redundancia excesiva.
translation_notes:
  revision_awareness: 'Se sigue el texto griego de Swete como ancla principal, con el paralelo hebreo/masorético solo como control de nombres y escena. La formulación española conserva la secuencia simple del griego: tomar el libro, la presencia de la multitud y la postura distinguida de Esdras. No se introduce contenido litúrgico ajeno al versículo.'
  spanish_consistency_notes:
  - Se usa «Esdras» como forma estable del nombre.
  - Se mantiene «libro» en el texto principal y se aclara en nota la posible referencia histórica a un rollo.
  - Se preserva la duplicación espacial de ἐνώπιον con «ante» / «delante de» para mantener el carácter público de la escena.
  - El registro es sobrio y readable en español contemporáneo sin depender de fórmulas tradicionales no requeridas por el griego.
