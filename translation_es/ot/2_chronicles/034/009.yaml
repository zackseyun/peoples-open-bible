translation:
  language: es
  text: Entonces llegaron a Hilcías, el sumo sacerdote, y entregaron el dinero que habían llevado a la casa de Dios, el cual los levitas, los guardianes del umbral[a], habían reunido de manos de Manasés y Efraín, y de todo el remanente de Israel, y de todo Judá y Benjamín, y de los habitantes de Jerusalén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los porteros» o «los guardianes de la puerta»; literalmente, «los guardianes del umbral».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹאוּ
  english_pob_choice: Then they came
  chosen_spanish: Entonces fueron
  alternatives_spanish:
  - Y fueron
  - Luego fueron
  lexicon: HALOT
  rationale: El wayyiqtol expresa avance narrativo secuencial. En español, «Entonces fueron» conserva esa progresión de manera natural y solemne.
- source_word: חִלְקִיָּהוּ
  english_pob_choice: Hilkiah
  chosen_spanish: Hilcías
  alternatives_spanish:
  - Jilquías
  - Hilkías
  lexicon: HALOT
  rationale: Nombre propio adaptado a la forma española más reconocible y estable en uso bíblico, sin perder la referencia al hebreo.
- source_word: הַכֹּהֵן הַגָּדוֹל
  english_pob_choice: the high priest
  chosen_spanish: el sumo sacerdote
  alternatives_spanish:
  - el gran sacerdote
  - el jefe de los sacerdotes
  lexicon: HALOT
  rationale: «Sumo sacerdote» es el equivalente español natural y exacto para el cargo supremo sacerdotal; «alto sacerdote» sonaría menos idiomático.
- source_word: וַיִּתְּנוּ
  english_pob_choice: and gave
  chosen_spanish: entregaron
  alternatives_spanish:
  - dieron
  - pusieron en manos
  lexicon: HALOT
  rationale: En este contexto de transferir fondos, «entregaron» comunica con claridad la acción de poner el dinero bajo custodia o administración.
- source_word: הַכֶּסֶף
  english_pob_choice: the money
  chosen_spanish: el dinero
  alternatives_spanish:
  - la plata
  - el metal
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «plata», aquí el referente es una suma destinada al templo; «dinero» es la forma más clara en español.
- source_word: הַמּוּבָא
  english_pob_choice: that had been brought in
  chosen_spanish: que había sido traído
  alternatives_spanish:
  - traído
  - que fue traído
  lexicon: HALOT
  rationale: El participio pasivo se expresa bien con un pluscuamperfecto relativo en español para mantener la anterioridad respecto de «entregaron».
- source_word: בֵית אֱלֹהִים
  english_pob_choice: the house of God
  chosen_spanish: la casa de Dios
  alternatives_spanish:
  - el templo de Dios
  - la casa de Yahvé
  lexicon: HALOT
  rationale: Se conserva la formulación directa del hebreo. «Casa de Dios» mantiene la transparencia textual mejor que «templo».
- source_word: אָסְפוּ
  english_pob_choice: had collected
  chosen_spanish: habían reunido
  alternatives_spanish:
  - habían recogido
  - habían juntado
  lexicon: HALOT
  rationale: «Reunido» expresa bien la acción de juntar fondos con valor colectivo y administrativo.
- source_word: הַלְוִיִּם
  english_pob_choice: the Levites
  chosen_spanish: los levitas
  alternatives_spanish:
  - los levitas sacerdotales
  lexicon: HALOT
  rationale: Término tribal/ministerial estándar en español bíblico.
- source_word: שֹׁמְרֵי הַסַּף
  english_pob_choice: the keepers of the threshold
  chosen_spanish: los guardianes del umbral
  alternatives_spanish:
  - los porteros
  - los guardianes de la puerta
  lexicon: HALOT
  rationale: Se preserva el sentido literal de «umbral» para no borrar la imagen concreta del hebreo, y «guardianes» comunica la función. En nota se conserva la alternativa funcional.
- source_word: מִיַּד
  english_pob_choice: from
  chosen_spanish: de manos de
  alternatives_spanish:
  - de parte de
  - procedentes de
  lexicon: HALOT
  rationale: Se mantiene el matiz idiomático del hebreo «de la mano de», que aquí señala procedencia/mediación de la aportación.
- source_word: מְנַשֶּׁה וְאֶפְרַיִם
  english_pob_choice: Manasseh and Ephraim
  chosen_spanish: Manasés y de Efraín
  alternatives_spanish:
  - Manasés y Efraín
  lexicon: HALOT
  rationale: Nombres tribales en formas españolas habituales; la repetición de «de» sigue la sintaxis distributiva del pasaje.
- source_word: שְׁאֵרִית יִשְׂרָאֵל
  english_pob_choice: the remnant of Israel
  chosen_spanish: el remanente de Israel
  alternatives_spanish:
  - el resto de Israel
  - el resto que quedaba de Israel
  lexicon: HALOT
  rationale: «Remanente» conserva mejor la carga histórica y bíblica del hebreo שְׁאֵרִית sin imponer una lectura excesivamente teológica.
- source_word: וּמִכָּל יְהוּדָה וּבִנְיָמִן
  english_pob_choice: and from all Judah and Benjamin
  chosen_spanish: y de todo Judá y Benjamín
  alternatives_spanish:
  - y de todo el territorio de Judá y Benjamín
  - y de toda Judá y Benjamín
  lexicon: HALOT
  rationale: La preposición distributiva queda bien en español con «de todo», manteniendo el alcance de la contribución sin añadir elementos no presentes.
- source_word: וישבי יְרוּשָׁלִָם
  english_pob_choice: and the inhabitants of Jerusalem
  chosen_spanish: y de los habitantes de Jerusalén
  alternatives_spanish:
  - y de los que habitaban en Jerusalén
  - y de los moradores de Jerusalén
  lexicon: HALOT
  rationale: «Habitantes» es una equivalencia natural y sobria para el participio sustantivado, sin perder el sentido de residencia permanente.
theological_decisions:
- issue: שְׁאֵרִית יִשְׂרָאֵל como término con posible resonancia teológica de «remanente»
  english_pob_reading: the remnant of Israel
  chosen_spanish_reading: el remanente de Israel
  alternative_spanish_readings:
  - el resto de Israel
  rationale: Se conserva «remanente» porque refleja tanto el sentido básico de los sobrevivientes/restantes como la resonancia bíblica posible en Chronicles, sin resolver esa tensión con una paráfrasis más débil.
  doctrine_reference: Preservar la tensión textual y la posible resonancia canónica sin sobredeterminarla.
translation_notes:
  revision_awareness: El texto inglés auditado no fue revisado en la última pasada; se mantiene la decisión estable de traducir literalmente la imagen de «threshold» en la nota, mientras el cuerpo español usa una equivalencia natural y clara.
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלֹהִים según el criterio del proyecto.
  - «Sumo sacerdote» se usa como equivalente idiomático de הַכֹּהֵן הַגָּדוֹל.
  - «Remanente» conserva la posible carga bíblica de שְׁאֵרִית sin ampliarla.
  - La nota sobre שֹׁמְרֵי הַסַּף preserva la alternativa funcional sin duplicar la imagen en el cuerpo principal.
