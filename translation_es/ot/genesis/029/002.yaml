translation:
  language: es
  text: Él miró[a], y he aquí[b], había un pozo en el campo, y he aquí[b], allí había tres rebaños de ovejas recostados junto a él[c], porque de ese pozo abrevaban[d] los rebaños. Y la piedra sobre la boca del pozo[e] era grande.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «vio».'
    reason: lexical_alternative
  - marker: b
    text: El hebreo repite «he aquí» dos veces para dar viveza a la escena.
    reason: lexical_alternative
  - marker: c
    text: 'O: «junto a ella» o, más literalmente, «sobre ella».'
    reason: lexical_alternative
  - marker: d
    text: 'O: «porque de ese pozo darían de beber a los rebaños».'
    reason: lexical_alternative
  - marker: e
    text: 'Literalmente: «sobre la boca del pozo»; es decir, sobre su abertura.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּרְא
  english_pob_choice: He looked
  chosen_spanish: Él miró
  alternatives_spanish:
  - Él vio
  lexicon: HALOT
  rationale: El verbo narrativo avanzando la escena admite tanto ‘ver’ como ‘mirar’; ‘miró’ conserva mejor la vivacidad inmediata que el inglés POB quiso resaltar con ‘looked’, sin perder el sentido básico de percepción.
- source_word: וְהִנֵּה ... וְהִנֵּה
  english_pob_choice: and behold ... and behold
  chosen_spanish: y he aquí ... y he aquí
  alternatives_spanish:
  - y había ... y había
  - mira ... mira
  lexicon: HALOT
  rationale: ‘He aquí’ preserva la fuerza deíctica y el efecto de sorpresa/vividness del hebreo, alineado con la decisión del POB inglés de mantener ‘behold’.
- source_word: בְאֵר
  english_pob_choice: a well
  chosen_spanish: un pozo
  alternatives_spanish:
  - un pozo de agua
  - una cisterna
  lexicon: HALOT
  rationale: ‘Pozo’ es el equivalente directo y natural en español para בְאֵר en este contexto pastoral; ‘cisterna’ no corresponde tan bien al campo semántico aquí.
- source_word: בַּשָּׂדֶה
  english_pob_choice: in the field
  chosen_spanish: en el campo
  alternatives_spanish:
  - en el terreno
  - en la campiña
  lexicon: HALOT
  rationale: ‘Campo’ comunica de manera natural el espacio abierto rural que el hebreo שָׂדֶה designa en este pasaje.
- source_word: שְׁלֹשָׁה עֶדְרֵי צֹאן
  english_pob_choice: three flocks of sheep
  chosen_spanish: tres rebaños de ovejas
  alternatives_spanish:
  - tres rebaños
  - tres manadas de ovejas
  lexicon: HALOT
  rationale: ‘Rebaños de ovejas’ mantiene la concreción pastoral del hebreo y corresponde al POB inglés, que especifica sheep para evitar ambigüedad del término colectivo.
- source_word: רֹבְצִים
  english_pob_choice: were lying
  chosen_spanish: recostados
  alternatives_spanish:
  - echados
  - acostados
  lexicon: HALOT
  rationale: El participio describe animales echados/descansando; ‘recostados’ suena natural en español y conserva la imagen de los animales en reposo, sin sugerir necesariamente inmovilidad total.
- source_word: עָלֶיהָ
  english_pob_choice: beside it
  chosen_spanish: junto a él
  alternatives_spanish:
  - junto a ella
  - sobre él
  lexicon: HALOT
  rationale: Aunque el referente hebreo es femenino (‘él/la’ en español depende del sustantivo), en español la construcción más idiomática con ‘pozo’ es ‘junto a él’. Se preserva la proximidad espacial que el POB expresó con ‘beside it’.
- source_word: מִן הַבְּאֵר הַהִוא
  english_pob_choice: from that well
  chosen_spanish: de ese pozo
  alternatives_spanish:
  - de aquel pozo
  - de aquel mismo pozo
  lexicon: HALOT
  rationale: El demostrativo apunta a un pozo específico ya visible; ‘ese’ reproduce bien la deixis cercana al hablante/narrador y encaja con el flujo narrativo en español.
- source_word: יַשְׁקוּ
  english_pob_choice: they watered
  chosen_spanish: abrevarían
  alternatives_spanish:
  - darían de beber
  - abrevaban
  lexicon: HALOT
  rationale: El Hifil de שׁקה significa dar de beber/abrevar. En español, ‘abrevarían’ preserva la relación con el suministro de agua a los animales y permite reflejar el valor habitual/general del imperfecto en este contexto explicativo.
- source_word: הָעֲדָרִים
  english_pob_choice: the flocks
  chosen_spanish: los rebaños
  alternatives_spanish:
  - los hatos
  - las manadas
  lexicon: HALOT
  rationale: Se mantiene la misma familia léxica que en ‘tres rebaños’ para conservar cohesión textual; ‘rebaños’ es natural y pastoralmente claro.
- source_word: וְהָאֶבֶן גְּדֹלָה
  english_pob_choice: And the stone ... was large
  chosen_spanish: Y la piedra ... era grande
  alternatives_spanish:
  - Y la piedra ... estaba grande
  - Y había una piedra grande
  lexicon: HALOT
  rationale: La cláusula descriptiva se vierte como oración completa para reflejar la estructura hebrea y preparar la acción del siguiente versículo; ‘era grande’ es la copulativa más sobria y natural.
- source_word: עַל פִּי הַבְּאֵר
  english_pob_choice: on the mouth of the well
  chosen_spanish: sobre la boca del pozo
  alternatives_spanish:
  - sobre la abertura del pozo
  - en la boca del pozo
  lexicon: HALOT
  rationale: ‘Boca del pozo’ reproduce el modismo de פִּי y conserva la imagen concreta de la abertura; ‘sobre’ mantiene la relación espacial del hebreo.
translation_notes:
  revision_awareness: 'La revisión más reciente del POB inglés indicó que no se requerían cambios: se mantuvo la lectura óptima-equivalente con las mismas notas léxicas básicas, y no hubo revisiones aplicadas.'
  spanish_consistency_notes:
  - Se preservó la repetición enfática de ‘he aquí’ para reflejar el hebreo y el POB inglés.
  - Se mantuvo ‘pozo’ y ‘boca del pozo’ para conservar el léxico concreto del pasaje.
  - ‘Rebaños’ se usó de forma consistente para עֶדֶר/הָעֲדָרִים, evitando alternar con ‘hatos’ o ‘manadas’.
  - Se evitó introducir términos eclesiásticos o paráfrasis no respaldadas por el texto fuente.
