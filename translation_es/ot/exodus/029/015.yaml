translation:
  language: es
  text: Entonces tomarás el primer carnero[a], y Aarón y sus hijos pondrán las manos sobre la cabeza del carnero.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «el carnero uno», distinguiendo este carnero del otro carnero en el rito de consagración; algunas traducciones lo vierten como «el primer carnero».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אֶת
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Y
  - Ahora
  lexicon: HALOT
  rationale: La partícula conjuntiva introduce el siguiente paso del procedimiento. «Entonces» conserva la secuencia instrucional de forma natural en español.
- source_word: הָ/אַיִל
  english_pob_choice: the ram
  chosen_spanish: el carnero
  alternatives_spanish:
  - el macho de oveja
  - el ram
  lexicon: HALOT
  rationale: אַיִל se refiere al macho adulto de la oveja. En español bíblico y moderno, «carnero» comunica con precisión el animal sacrificial.
- source_word: הָ/אֶחָד
  english_pob_choice: the one
  chosen_spanish: uno
  alternatives_spanish:
  - el uno
  - el primero
  lexicon: HALOT
  rationale: El hebreo distingue este carnero del otro del rito. «Uno» mantiene la marca de singularidad sin convertirla prematuramente en ordinal.
- source_word: תִּקָּח
  english_pob_choice: you shall take
  chosen_spanish: tomarás
  alternatives_spanish:
  - deberás tomar
  - has de tomar
  lexicon: HALOT
  rationale: 'La forma verbal instructiva en segunda persona se traduce de manera directa con futuro exhortativo en español bíblico: «tomarás».'
- source_word: וְ/סָמְכ֜וּ
  english_pob_choice: shall lay
  chosen_spanish: pondrán sus manos
  alternatives_spanish:
  - apoyarán sus manos
  - echarán sus manos
  lexicon: HALOT
  rationale: En contexto sacrificial, סמך expresa el gesto ritual de colocar las manos sobre la víctima. «Pondrán sus manos» es claro y evita una lectura demasiado libre de «apoyar» o una calca menos natural.
- source_word: אַהֲרֹ֧ן וּ/בָנָ֛י/ו
  english_pob_choice: Aaron and his sons
  chosen_spanish: Aarón y sus hijos
  alternatives_spanish:
  - Aarón y sus hijos varones
  - Aarón y sus descendientes
  lexicon: HALOT
  rationale: בנים aquí designa a los hijos de Aarón, los participantes en la consagración sacerdotal. «Hijos» es exacto y conserva la relación familiar del texto.
- source_word: אֶת יְדֵי/הֶ֖ם
  english_pob_choice: their hands
  chosen_spanish: sus manos
  alternatives_spanish:
  - las manos de ellos
  lexicon: HALOT
  rationale: El hebreo pluraliza explícitamente las manos; en español, «sus manos» es la forma natural y precisa para el gesto ritual.
- source_word: עַל
  english_pob_choice: 'on'
  chosen_spanish: sobre
  alternatives_spanish:
  - encima de
  - en
  lexicon: HALOT
  rationale: La preposición señala colocación física sobre la víctima. «Sobre» reproduce bien la relación espacial del rito.
- source_word: רֹ֥אשׁ
  english_pob_choice: the head of
  chosen_spanish: la cabeza del
  alternatives_spanish:
  - el cabeza de
  lexicon: HALOT
  rationale: El sustantivo se refiere a la parte superior del animal. «La cabeza del» es la formulación natural y precisa en español.
theological_decisions:
- issue: Terminología del gesto ritual de imposición de manos
  english_pob_reading: shall lay their hands on the head of the ram
  chosen_spanish_reading: pondrán sus manos sobre la cabeza del carnero
  alternative_spanish_readings:
  - apoyarán sus manos sobre la cabeza del carnero
  - impondrán sus manos sobre la cabeza del carnero
  rationale: El hebreo סמך admite matices como apoyar, recostar o colocar. La POB inglesa opta por «lay» para mantener el acto ritual sin explicarlo en exceso. En español, «pondrán sus manos» preserva la acción cultual sin añadir una terminología sacramental que el versículo no desarrolla.
  doctrine_reference: Preservar la tensión lexical del rito sin importar una doctrina posterior sobre imposición de manos.
translation_notes:
  revision_awareness: La versión sigue de cerca el texto hebreo y el hilo de la traducción inglesa POB, sin cambios de sentido respecto al pasaje auditado. Se mantiene la distinción del «carnero uno» mediante nota, como en el inglés.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma del proyecto cuando aparezca el nombre divino; aquí no ocurre.
  - «Carnero» se mantiene para אַיִל en contexto sacrificial, coherente con el uso del proyecto.
  - «Sus manos» mantiene el plural hebreo y fluye naturalmente en español.
  - No se introduce lenguaje sacramental ajeno al mandato ritual del versículo.
