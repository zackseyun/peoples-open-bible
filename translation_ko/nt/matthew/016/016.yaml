  text: 'Simon Peter answered[a], "You are the Messiah, the Son of the living God."'
translation:
  language: ko
  text: '시몬 베드로가 대답하여 말합니다. 「당신은 메시아이시며, 살아 계신 하나님의 아들이십니다.」'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「그리스도」. 헬라어 칭호 Χριστός는 「그리스도」로 옮길 수 있으나, 여기서는 칭호적 의미와 유대 메시아 사상의 맥락을 보존하기 위해 「메시아」로 옮긴다.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ χριστὸς
  english_pob_choice: the Messiah
  chosen_korean: 메시아
  alternatives_korean:
  - 그리스도
  lexicon: BDAG
  rationale: '글로사리 정책: 칭호로 기능하는 Χριστός는 「메시아」로 옮긴다. 베드로의 고백에서 칭호의 무게가 분명하다.'
- source_word: ὁ υἱὸς τοῦ θεοῦ τοῦ ζῶντος
  english_pob_choice: the Son of the living God
  chosen_korean: 살아 계신 하나님의 아들
  lexicon: BDAG
  rationale: 한국 성경 정착어. 「살아 계신」은 우상의 죽은 신들과 대조되는 야훼의 살아 있음을 강조한다.
theological_decisions:
- issue: 베드로의 고백에서 Χριστός의 칭호적 의미
  chosen_reading: 메시아
  alternative_readings:
  - 그리스도
  rationale: 한국 전통 번역은 음역 「그리스도」를 채택해 왔으나, 그 결과 칭호성이 박제된 이름처럼 가려진다. 베드로의 고백은 다윗 가문 메시아 사상에 직접 호소하는 신학적 절정의 순간이므로, 칭호로서의 무게를 살리기 위해 「메시아」를 채택한다.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested terms table for Χριστός'
