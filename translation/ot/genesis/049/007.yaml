theological_decisions:
- issue: Object of the curse
  chosen_reading: The curse falls on Simeon and Levi's anger and wrath, not directly on their persons.
  alternative_readings:
  - The brothers themselves are being cursed
  rationale: The Hebrew explicitly says 'Cursed be their anger ... and their wrath,' focusing the denunciation on their violent disposition and actions. The translation preserves that distinction rather than intensifying the curse onto the men themselves.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language primacy over translation tradition.
