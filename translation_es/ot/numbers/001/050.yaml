  text: וְ/אַתָּ֡ה הַפְקֵ֣ד אֶת הַ/לְוִיִּם֩ עַל מִשְׁכַּ֨ן הָ/עֵדֻ֜ת וְ/עַ֣ל כָּל כֵּלָי/ו֮ וְ/עַ֣ל כָּל אֲשֶׁר ל/וֹ֒ הֵ֜מָּה יִשְׂא֤וּ אֶת הַ/מִּשְׁכָּן֙ וְ/אֶת כָּל כֵּלָ֔י/ו וְ/הֵ֖ם יְשָׁרְתֻ֑/הוּ וְ/סָבִ֥יב לַ/מִּשְׁכָּ֖ן יַחֲנֽוּ־־־־־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/numbers/001/050.yaml
  text: But you[a], appoint the Levites over the tabernacle of the testimony, and over all its furnishings, and over all that belongs to it. They are to carry the tabernacle and all its furnishings, and they are to minister to it[b], and they are to camp around the tabernacle.
  footnotes:
  - marker: a
    text: Or 'tent of the testimony.' The Hebrew מִשְׁכַּן can denote a dwelling/tabernacle, and some English versions render the phrase more explicitly as 'tent of meeting/testimony' depending on context.
    reason: lexical_alternative
  - marker: b
    text: Or 'serve it' or 'attend to it.' The verb carries the sense of ministering in a sacred-service context.
    reason: lexical_alternative
