id: REV.3.19
reference: Revelation 3:19
source:
  edition: SBLGNT
  text: ἐγὼ ὅσους ἐὰν φιλῶ ἐλέγχω καὶ παιδεύω· ⸀ζήλευε οὖν καὶ μετανόησον.
translation:
  text: Those whom I love[a], I rebuke and discipline[c][b]. Therefore be zealous and repent.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'whomever I love.'
    reason: lexical_alternative
  - marker: b
    text: Or 'be earnest.'
    reason: lexical_alternative
  - marker: c
    text: '''Discipline'' here carries the sense of corrective training, not merely punishment.'
    reason: cultural_note
lexical_decisions:
- source_word: ἐγὼ
  chosen: As for me
  alternatives:
  - I
  lexicon: BDAG
  rationale: The explicit pronoun is emphatic in Greek. Rendering it as 'As for me' brings out the marked emphasis more clearly than a bare 'I,' while remaining natural English.
- source_word: ὅσους ἐὰν
  chosen: those whom
  alternatives:
  - whomever
  - all whom
  lexicon: BDAG
  rationale: 'This construction introduces an indefinite relative sense: ''as many as / whoever.'' In idiomatic English here, ''those whom'' best conveys the class of persons addressed without awkwardness.'
- source_word: φιλῶ
  chosen: I love
  alternatives:
  - I have affection for
  - I am fond of
  lexicon: BDAG
  rationale: φιλέω denotes love/affection. 'I love' is the most natural and weighty English rendering in this context. More diluted alternatives understate the relational force.
- source_word: ἐλέγχω
  chosen: I rebuke
  alternatives:
  - I reprove
  - I expose
  lexicon: BDAG
  rationale: In this context of corrective address, 'rebuke' best captures verbal correction directed toward moral change. 'Expose' is too forensic here; 'reprove' is accurate but less natural in contemporary English.
- source_word: παιδεύω
  chosen: discipline
  alternatives:
  - train
  - chasten
  - instruct
  lexicon: BDAG
  rationale: παιδεύω includes corrective training, not mere punishment. 'Discipline' preserves both correction and formative intent. 'Chasten' is traditional but archaic; 'train' is too weak for the context.
- source_word: ζήλευε
  chosen: be zealous
  alternatives:
  - be earnest
  - be fervent
  lexicon: BDAG
  rationale: The imperative calls for ardent earnestness. 'Be zealous' is the most direct lexical match and preserves the intensity of the command. It also avoids reducing the term to mere emotional warmth.
- source_word: οὖν
  chosen: Therefore
  alternatives:
  - then
  - so
  lexicon: BDAG
  rationale: 'οὖν marks inference from the preceding statement: because the speaker lovingly rebukes and disciplines, the hearer should respond. ''Therefore'' makes that logical connection explicit.'
- source_word: μετανόησον
  chosen: repent
  alternatives:
  - change your mind
  - turn back
  lexicon: BDAG
  rationale: '''Repent'' is the established and accurate rendering for μετανοέω in moral-spiritual contexts. The alternatives capture aspects of the sense but are either too narrow or too paraphrastic for the main text.'
