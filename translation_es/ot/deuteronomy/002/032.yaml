translation:
  language: es
  text: Entonces Sihón salió a encontrarnos[a], él y todo su pueblo, para combatir en Yahaz[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «contra nosotros»; literalmente, «a encontrarnos», pero en este contexto la expresión implica un encuentro hostil.
    reason: lexical_alternative
  - marker: b
    text: El topónimo también aparece como «Yahzah» en algunas tradiciones.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֵּצֵא
  english_pob_choice: came out
  chosen_spanish: salió
  alternatives_spanish:
  - salió afuera
  - salió fuera
  lexicon: HALOT
  rationale: El verbo narrativo יצא se expresa naturalmente en español con «salió». Conserva el movimiento de salida sin añadir matices innecesarios.
- source_word: סִיחֹן
  english_pob_choice: Sihon
  chosen_spanish: Sihón
  alternatives_spanish:
  - Sijón
  lexicon: Transliteración propia del nombre hebreo
  rationale: Se conserva el nombre propio con adaptación gráfica española usual. La forma con acento ayuda a la pronunciación en español.
- source_word: לִקְרָאתֵנוּ
  english_pob_choice: to meet us
  chosen_spanish: a encontrarnos
  alternatives_spanish:
  - para encontrarnos
  - contra nosotros
  lexicon: HALOT
  rationale: La frase básica es «salió a encontrarnos», pero en este contexto bélico el encuentro es hostil. El español mantiene la literalidad de «encontrarnos» sin ocultar la tensión militar que aporta el contexto inmediato.
- source_word: הוּא
  english_pob_choice: he
  chosen_spanish: él
  alternatives_spanish:
  - él mismo
  lexicon: HALOT
  rationale: El pronombre independiente añade énfasis o aclaración. En español basta «él» para reflejarlo de forma natural; «él mismo» sería más pesado.
- source_word: וְכָל עַמּוֹ
  english_pob_choice: and all his people
  chosen_spanish: y todo su pueblo
  alternatives_spanish:
  - y toda su gente
  - y todo su ejército
  lexicon: HALOT
  rationale: עַם normalmente significa «pueblo». Aunque el contexto es militar, «pueblo» conserva mejor el alcance del hebreo que restringirlo a «ejército».
- source_word: לַמִּלְחָמָה
  english_pob_choice: for battle
  chosen_spanish: para la batalla
  alternatives_spanish:
  - para guerra
  - a la batalla
  lexicon: HALOT
  rationale: La construcción indica propósito. «Para la batalla» es natural en español y conserva la fuerza militar sin ampliar a «guerra» más de lo necesario.
- source_word: יָהְצָה
  english_pob_choice: Jahaz
  chosen_spanish: Yahaz
  alternatives_spanish:
  - Jahaz
  - Yahzah
  lexicon: Transliteración toponímica
  rationale: Se adopta «Yahaz» como forma española transparente derivada del hebreo, preservando el nombre del lugar. Se evita depender de una tradición inglesa específica.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto hebreo y el audit trail inglés: se conserva el sentido literal de לִקְרָאתֵנוּ («a encontrarnos») mientras el contexto bélico deja claro el carácter hostil. También se mantiene la referencia locativa final con un topónimo españolizado de forma transparente.'
  spanish_consistency_notes:
  - Se prefirió «Sihón» con acento por uso español y claridad fonética.
  - Se evitó «SEÑOR» o equivalentes teológicos porque no aparecen en este verso.
  - «Pueblo» traduce עַם con amplitud semántica mejor que «ejército», aunque el contexto sea de guerra.
  - El marcador [a] señala la alternativa lexical principal; [b] marca la variante toponímica documentada.
