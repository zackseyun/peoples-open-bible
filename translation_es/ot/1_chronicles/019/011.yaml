translation:
  language: es
  text: Puso al resto de las tropas bajo el mando de Abisai, su hermano[a], y se dispusieron en formación de batalla para enfrentar a los amonitas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «dio en la mano de Abisai, su hermano», un modismo para confiarlo a su autoridad o mando.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יֶתֶר הָעָם
  english_pob_choice: the rest of the troops
  chosen_spanish: el resto del pueblo
  alternatives_spanish:
  - el resto de las tropas
  - el resto del ejército
  - la restante gente
  lexicon: HALOT
  rationale: יֶתֶר expresa la idea de resto o remanente. הָעָם significa literalmente «el pueblo», y en este contexto designa a los hombres disponibles para la acción militar. En español, «pueblo» conserva el valor literal de la base hebrea, mientras que el contexto bélico queda suficientemente aclarado por «bajo el mando» y «formación de batalla».
- source_word: נָתַן בְּיַד
  english_pob_choice: put ... under the command of
  chosen_spanish: puso ... bajo el mando de
  alternatives_spanish:
  - entregó ... en la mano de
  - puso ... en la mano de
  - confió ... al mando de
  lexicon: HALOT
  rationale: 'La expresión hebrea es idiomática: literalmente, «dar en la mano de»; aquí significa confiar o asignar a la autoridad de alguien. «Bajo el mando de» comunica bien ese sentido de autoridad militar sin perder la relación con el acto de encargarle a Abisai la responsabilidad.'
- source_word: אַבְשַׁי אָחִיו
  english_pob_choice: Abishai his brother
  chosen_spanish: Abisai, su hermano
  alternatives_spanish:
  - Abisai su hermano
  - Abshai, su hermano
  lexicon: tradición onomástica española / transliteración bíblica
  rationale: «Abisai» es la forma española usual y clara para el nombre propio. Se conserva el vínculo fraternal en aposición, como en el hebreo y en la traducción inglesa auditada.
- source_word: וַיַּעַרְכוּ
  english_pob_choice: they drew up in battle formation
  chosen_spanish: se dispusieron en formación de batalla
  alternatives_spanish:
  - se alinearon para la batalla
  - se ordenaron en formación
  - se pusieron en batalla
  lexicon: HALOT
  rationale: El verbo ערך en contextos militares describe ordenar o disponer tropas para el combate. «Se dispusieron en formación de batalla» mantiene el sentido militar con español natural y digno.
- source_word: לִקְרַאת
  english_pob_choice: to meet
  chosen_spanish: para enfrentar
  alternatives_spanish:
  - para ir al encuentro de
  - para encontrarse con
  - para hacer frente a
  lexicon: HALOT
  rationale: לִקְרַאת puede significar «al encuentro de» o «para enfrentar». En este contexto de combate, «para enfrentar» hace explícita la hostilidad que ya está implícita en la escena, sin añadir una interpretación ajena al texto.
- source_word: בְּנֵי עַמּוֹן
  english_pob_choice: the Ammonites
  chosen_spanish: los amonitas
  alternatives_spanish:
  - los hijos de Ammón
  - los hijos de Amón
  lexicon: uso bíblico castellano / etnónimo
  rationale: El etnónimo castellano habitual es «amonitas», que comunica de forma natural la referencia a בני עמון. Se evita una construcción más literal que resultaría menos idiomática en español.
translation_notes:
  revision_awareness: El pasaje muestra plena concordancia con el texto hebreo y con la solución auditada en inglés; no se documentan revisiones aplicadas ni variantes textuales relevantes. La principal decisión de traducción en español es reflejar el modismo hebreo de autoridad militar con una expresión natural («bajo el mando de») sin perder su base idiomática.
  spanish_consistency_notes:
  - Se mantiene la forma española «Abisai» para el nombre propio.
  - Se conserva «Yahvé» como norma del proyecto, aunque este versículo no la contiene.
  - «Pueblo» se usa por fidelidad al hebreo; el contexto militar se explicita en la sintaxis.
  - «Amonitas» es el etnónimo natural en español y corresponde a «hijos de Ammón».
