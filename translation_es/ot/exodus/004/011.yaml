translation:
  language: es
  text: 'Y Yahvé le dijo[a]: «¿Quién le puso boca al hombre? ¿O quién hace que uno sea mudo, sordo, que vea o ciego? ¿No soy yo, Yahvé?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “humanidad”. El hebreo ʾadam aquí es un singular genérico, referido a la humanidad en general.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: Tetragrámaton
  rationale: Se conserva el nombre divino propio, siguiendo el criterio del proyecto, en lugar de sustituirlo por un título. 'Yahvé' es la forma base en español para representar el Tetragrámaton.
- source_word: וַיֹּאמֶר
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - habló
  - le habló
  lexicon: HALOT
  rationale: Es el verbo narrativo normal para introducir discurso directo y suena natural en español sin perder la sencillez del hebreo.
- source_word: מִי שָׂם פֶּה לָאָדָם
  english_pob_choice: Who has put a mouth on man?
  chosen_spanish: ¿Quién ha puesto una boca al hombre?
  alternatives_spanish:
  - ¿Quién ha colocado una boca al hombre?
  - ¿Quién ha puesto una boca a la humanidad?
  lexicon: HALOT
  rationale: Se mantiene la imagen concreta de 'poner una boca' y el objeto indirecto 'al hombre' para reproducir la construcción hebrea sin suavizarla.
- source_word: לָאָדָם
  english_pob_choice: man
  chosen_spanish: al hombre
  alternatives_spanish:
  - a la humanidad
  - al ser humano
  lexicon: HALOT
  rationale: Se conserva el singular genérico masculino del hebreo, como en la decisión inglesa, sin neutralizarlo en 'humanidad'.
- source_word: אִלֵּם
  english_pob_choice: mute
  chosen_spanish: mudo
  alternatives_spanish:
  - mudo, incapaz de hablar
  - sin voz
  lexicon: HALOT
  rationale: '''Mudo'' es el equivalente natural y directo en español para la incapacidad de hablar; además conserva el paralelismo con los otros adjetivos.'
- source_word: חֵרֵשׁ
  english_pob_choice: deaf
  chosen_spanish: sordo
  alternatives_spanish:
  - sordo, incapaz de oír
  lexicon: HALOT
  rationale: Es la traducción estándar y precisa de la condición de no oír.
- source_word: פִקֵּחַ
  english_pob_choice: seeing
  chosen_spanish: el que ve
  alternatives_spanish:
  - vidente
  - el que tiene vista
  lexicon: HALOT
  rationale: Se refleja la relación semántica con 'ciego' mediante una expresión verbal natural en español. 'El que ve' conserva mejor la oposición del hebreo que un adjetivo más técnico.
- source_word: עִוֵּר
  english_pob_choice: blind
  chosen_spanish: ciego
  alternatives_spanish:
  - privado de vista
  lexicon: HALOT
  rationale: Equivalente directo y transparente para la falta de visión.
- source_word: הֲלֹא
  english_pob_choice: Is it not
  chosen_spanish: ¿No
  alternatives_spanish:
  - ¿Acaso no
  lexicon: HALOT
  rationale: La partícula retórica se vierte de forma breve y natural en español, preservando la fuerza de la autoafirmación divina.
- source_word: אָנֹכִי
  english_pob_choice: I
  chosen_spanish: yo
  alternatives_spanish:
  - yo mismo
  lexicon: Pronombre personal enfático
  rationale: En español el pronombre explícito en la pregunta retórica ya comunica el énfasis; aquí se integra en la forma natural '¿No soy yo, Yahvé?'.
theological_decisions:
- issue: Agencia divina sobre capacidades y discapacidades
  english_pob_reading: The verse straightforwardly affirms the LORD's sovereign agency over speech, muteness, hearing, deafness, sight, and blindness, without softening the claim.
  chosen_spanish_reading: El verso afirma directamente la agencia soberana de Yahvé sobre el hablar, el mutismo, el oír, la sordera, la visión y la ceguera, sin atenuar la afirmación.
  alternative_spanish_readings:
  - ¿No soy yo quien permite estas condiciones?
  - ¿No soy yo quien las dispone?
  rationale: El hebreo usa verbos activos y una pregunta retórica fuerte; la traducción española debe conservar esa tensión teológica sin convertirla en una paráfrasis permisiva.
  doctrine_reference: Translation philosophy §3
- issue: Tratamiento del hebreo אָדָם como genérico singular
  english_pob_reading: man
  chosen_spanish_reading: hombre
  alternative_spanish_readings:
  - humanidad
  - ser humano
  rationale: Se conserva el singular genérico masculino, acorde con el valor representativo del hebreo y con la decisión auditada en inglés.
  doctrine_reference: Translation philosophy §4; Contested terms table for אָדָם
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando la nota [a] en el texto principal. La redacción mantiene la decisión auditada de conservar אָדָם como singular genérico y ajusta la sintaxis española para que el marcador aparezca exactamente donde corresponde.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para יְהוָה de manera consistente con el criterio del proyecto.
  - Se conserva la estructura retórica de preguntas directas sin suavizar la agencia divina.
  - '''Mudo'', ''sordo'', ''el que ve'' y ''ciego'' mantienen el paralelismo semántico del hebreo.'
  - La nota [a] está anclada en 'hombre' para reflejar la alternativa genérica documentada.
