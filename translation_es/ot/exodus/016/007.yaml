translation:
  language: es
  text: Y por la mañana verán la gloria de Yahvé[a], porque ha oído sus quejas contra Yahvé. Y nosotros, ¿qué somos, para que se quejen contra nosotros?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cuando oiga sus quejas contra Yahvé». La construcción hebrea puede entenderse también en sentido temporal además de causal.'
    reason: alternative_reading
lexical_decisions:
- source_word: וּבֹקֶר
  english_pob_choice: And in the morning
  chosen_spanish: Y por la mañana
  alternatives_spanish:
  - Y en la mañana
  - Y por la madrugada
  lexicon: HALOT
  rationale: La construcción con ו + sustantivo funciona adverbialmente para marcar tiempo. 'Por la mañana' es natural en español y conserva el valor secuencial del contexto.
- source_word: וּרְאִיתֶם
  english_pob_choice: you will see
  chosen_spanish: verán
  alternatives_spanish:
  - y verán
  - verán ustedes
  lexicon: HALOT
  rationale: El verbo expresa una acción futura en esta secuencia de promesa/instrucción. 'Verán' comunica claramente el futuro sin forzar un calco sintáctico.
- source_word: כְּבוֹד יְהוָה
  english_pob_choice: the glory of Yahweh
  chosen_spanish: la gloria de Yahvé
  alternatives_spanish:
  - la gloria de Yahweh
  - la gloria de Yahvé
  lexicon: HALOT
  rationale: כבוד se refiere aquí al esplendor/peso manifiesto de la presencia divina. 'Gloria' es la equivalencia estable en español bíblico; se conserva el nombre divino como 'Yahvé' según la norma del proyecto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue la política del proyecto para el Tetragrámaton: transliterar el nombre divino como ''Yahvé'', preservando el nombre personal del pacto en lugar de sustituirlo por un título.'
- source_word: בְּשָׁמְעוֹ
  english_pob_choice: because he has heard
  chosen_spanish: porque ha oído
  alternatives_spanish:
  - cuando oiga
  - al oír
  lexicon: HALOT
  rationale: La preposición ב con infinitivo de שמע admite matiz causal o temporal. Aquí el contexto explica por qué verán la gloria de Yahvé, por eso 'porque ha oído' refleja bien la lógica del verso; se mantiene abierta la otra posibilidad en nota.
- source_word: תְּלֻנֹּתֵיכֶם
  english_pob_choice: your grumblings
  chosen_spanish: sus murmullos
  alternatives_spanish:
  - sus quejas
  - sus murmuraciones
  lexicon: HALOT
  rationale: '''Murmullos'' conserva el matiz de descontento repetido del sustantivo hebreo. Se evita ''quejas'' por ser más neutral; ''murmuraciones'' sería posible pero suena más eclesiástico/arcaico en español actual.'
- source_word: עַל יְהוָה
  english_pob_choice: against Yahweh
  chosen_spanish: contra Yahvé
  alternatives_spanish:
  - acerca de Yahvé
  - sobre Yahvé
  lexicon: HALOT
  rationale: עַל en este contexto indica oposición dirigida contra Yahvé, no simple tema de conversación. 'Contra' reproduce esa fuerza adversativa.
- source_word: וְנַחְנוּ מָה
  english_pob_choice: And what are we
  chosen_spanish: Y nosotros, ¿qué somos?
  alternatives_spanish:
  - ¿Y qué somos nosotros?
  - ¿Qué somos nosotros?
  lexicon: HALOT
  rationale: La pregunta es retórica y subraya la insignificancia de Moisés y Aarón frente a Yahvé. Se conserva el enlace con 'Y' para reflejar la conjunción hebrea y el giro interrogativo natural del español.
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: para que
  alternatives_spanish:
  - que
  - de modo que
  lexicon: HALOT
  rationale: 'En esta cláusula introduce el contenido de la pregunta retórica: ''¿qué somos, para que murmuren...?''. ''Para que'' expresa bien la relación resultativa/explicativa sin perder la tensión del hebreo.'
- source_word: תלונו
  english_pob_choice: you grumble
  chosen_spanish: murmuren
  alternatives_spanish:
  - se quejen
  - murmuren
  lexicon: HALOT
  rationale: Se mantiene coherencia léxica con 'murmullos'. 'Murmuren' conserva el tono despectivo del verbo hebreo y su carácter de queja rebelde.
- source_word: עָלֵינוּ
  english_pob_choice: against us
  chosen_spanish: contra nosotros
  alternatives_spanish:
  - sobre nosotros
  - acerca de nosotros
  lexicon: HALOT
  rationale: La preposición indica dirección hostil de la queja hacia Moisés y Aarón. 'Contra nosotros' reproduce ese valor adversativo y paraleliza 'contra Yahvé'.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. Según la política doctrinal del proyecto, se preserva el nombre del pacto como 'Yahvé' en vez de sustituirlo por un título como 'Señor'.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor causal o temporal de בְּשָׁמְעוֹ
  english_pob_reading: because he has heard
  chosen_spanish_reading: porque ha oído
  alternative_spanish_readings:
  - cuando oiga
  - al oír
  rationale: 'El contexto presenta la causa por la que se verá la gloria de Yahvé: él ha oído los murmullos del pueblo. Aun así, la construcción hebrea admite lectura temporal; se conserva esa tensión en una nota.'
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: La redacción sigue de cerca la revisión final del POB inglés, que cambió 'But' por 'And' para reflejar con más precisión la conjunción hebrea. En español se mantuvo ese flujo coordinado con 'Y', y se conservó la decisión lexical sobre el nombre divino, el matiz de בְּשָׁמְעוֹ y la repetición de 'murmullos/murmuren'.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma uniforme para יְהוָה.
  - '''Murmullos'' y ''murmuren'' mantienen cohesión léxica entre sustantivo y verbo.'
  - Se conserva la coordinación con 'Y' al inicio de ambas cláusulas principales, en paralelo al hebreo.
  - La nota a preserva la alternativa temporal sin deshacer la lectura causal principal.
