    reason: lexical_alternative
  revision_rationale: Se reubica la nota al pie en la palabra pertinente ('oficiales') para corregir el anclaje semántico. Se sustituye 'mató' por 'degolló' en ambas ocurrencias para reflejar mejor la violencia específica de שׁחט y conservar la repetición léxica del hebreo, en línea con la justificación del POB inglés. El resto de la redacción se mantiene por ser fiel y natural en español.
