lexical_decisions:
- source_word: לִשְׁמֹר
  english_pob_choice: to keep
  chosen_spanish: guardar
  alternatives_spanish:
  - observar
  - guardar
  lexicon: HALOT
  rationale: En este contexto deuteronómico, el infinitivo expresa la acción de cumplir fielmente lo mandado. «Guardar» conserva la idea de observar y cumplir con lealtad, sin sonar forzado en español.
- source_word: מִצְוֺת
  english_pob_choice: the commandments
  chosen_spanish: los mandamientos
  alternatives_spanish:
  - los mandatos
  - los preceptos
  lexicon: HALOT
  rationale: «Mandamientos» mantiene el registro covenantal/legal de Deuteronomio y refleja bien el plural de מִצְוֹת.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: Se conserva el nombre divino personal según la convención del proyecto. «Yahvé» es la forma establecida en el texto español, en lugar de sustituirlo por un título.
- source_word: חֻקֹּתָיו
  english_pob_choice: his statutes
  chosen_spanish: sus estatutos
  alternatives_spanish:
  - sus decretos
  - sus ordenanzas
  lexicon: HALOT
  rationale: «Estatutos» reproduce con claridad el valor jurídico-covenantal de חֻקִּים y empareja bien con «mandamientos» en español.
- source_word: אֲשֶׁר אָנֹכִי מְצַוְּךָ הַיּוֹם
  english_pob_choice: that I am commanding you today
  chosen_spanish: que yo te estoy mandando hoy
  alternatives_spanish:
  - que yo te mando hoy
  - que hoy te estoy mandando
  lexicon: HALOT
  rationale: El participio presente expresa una acción en curso; «estoy mandando» lo refleja de manera natural en español. «Hoy» conserva la urgencia pactal del pasaje.
- source_word: לְטוֹב לָךְ
  english_pob_choice: for your good
  chosen_spanish: para tu bien
  alternatives_spanish:
  - para tu beneficio
  - para tu bienestar
  lexicon: HALOT
  rationale: La expresión idiomática señala finalidad beneficiosa. «Para tu bien» es breve, natural y preserva el sentido de beneficio para el destinatario.
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  rationale: El texto hebreo usa directamente el Tetragrámaton; por fidelidad al nombre del pacto, se traduce como «Yahvé» y no como una sustitución titulada.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente al unir «para tu bien» sin coma intermedia, reflejando mejor el flujo del hebreo y del audit trail inglés, y conserva la lectura con el nombre divino explícito.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para יְהוָה conforme a la terminología del proyecto.
  - Se prefirió «mandamientos» y «estatutos» por su registro jurídico-covenantal coherente en Deuteronomio.
  - Se optó por «para tu bien» como equivalente idiomático directo de לְטוֹב לָךְ.
  - El verbo «guardar» en el texto principal preserva la gama semántica de לשׁמר sin caer en calco mecánico.
