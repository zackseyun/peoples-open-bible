translation:
  language: es
  text: En cuanto a los Avvim[a], que habitaban en aldeas[b] hasta Gaza, los caftoritas, que salieron de Caftor, los destruyeron y se establecieron en su lugar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los avvitas».
    reason: lexical_alternative
  - marker: b
    text: «Aldeas» también puede traducirse «poblados» o «asentamientos»; el hebreo חֲצֵרִים puede referirse a lugares de habitación abiertos o no amurallados.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָעַוִּים
  english_pob_choice: the Avvim
  chosen_spanish: los avvitas
  alternatives_spanish:
  - los avvim
  lexicon: HALOT
  rationale: Es un nombre de pueblo; en español, ‘avvitas’ conserva la relación con la forma hebrea y sigue la estrategia de transliterar etnónimos sin sustituirlos por un término explicativo no atestiguado.
- source_word: הַיֹּשְׁבִים
  english_pob_choice: who lived
  chosen_spanish: que habitaban
  alternatives_spanish:
  - que vivían
  - que residían
  lexicon: HALOT
  rationale: יׁשב expresa residencia estable. ‘Habitaban’ mantiene el valor de asentamiento continuo y suena natural en español bíblico moderno.
- source_word: בַּחֲצֵרִים
  english_pob_choice: in villages
  chosen_spanish: en aldeas
  alternatives_spanish:
  - en villas
  - en poblados
  - en aldeas/encampamentos
  lexicon: HALOT
  rationale: El campo semántico de חֲצֵרִים puede abarcar poblados abiertos o asentamientos. ‘Aldeas’ comunica bien la idea de núcleos de habitación sin forzar ‘campamentos’ cuando el contexto geográfico apunta a asentamiento.
- source_word: עַד עַזָּה
  english_pob_choice: as far as Gaza
  chosen_spanish: hasta Gaza
  alternatives_spanish:
  - así como Gaza
  - a la distancia de Gaza
  lexicon: HALOT
  rationale: עַד marca límite geográfico. ‘Hasta Gaza’ preserva la frontera territorial con naturalidad en español.
- source_word: כַּפְתֹּרִים
  english_pob_choice: the Caphtorim
  chosen_spanish: los caftoritas
  alternatives_spanish:
  - los caphtorim
  lexicon: HALOT
  rationale: Se translitera el etnónimo con adaptación española (‘caftoritas’) para facilitar lectura y mantener el valor de nombre de pueblo.
- source_word: הַיֹּצְאִים מִכַּפְתּוֹר
  english_pob_choice: who came out from Caphtor
  chosen_spanish: que salieron de Caftor
  alternatives_spanish:
  - que venían de Caftor
  - que salieron desde Caftor
  lexicon: HALOT
  rationale: יצא en participio conserva el movimiento de procedencia. ‘Salieron de Caftor’ mantiene la imagen sin añadir matices no presentes en el hebreo.
- source_word: הִשְׁמִידֻם
  english_pob_choice: destroyed them
  chosen_spanish: los destruyeron
  alternatives_spanish:
  - los aniquilaron
  - los exterminaron
  - los arrasaron
  lexicon: HALOT
  rationale: שׁמד en hifil indica destrucción fuerte. ‘Los destruyeron’ conserva la fuerza del verbo sin intensificar más allá del testimonio base.
- source_word: וַיֵּשְׁבוּ תַחְתָּם
  english_pob_choice: and settled in their place
  chosen_spanish: y habitaron en su lugar
  alternatives_spanish:
  - y se establecieron en su lugar
  - y vivieron en su lugar
  - y ocuparon su lugar
  lexicon: HALOT
  rationale: El idiomático תַחְתָּם señala reemplazo/ocupación del lugar de los anteriores habitantes. ‘Habitaron en su lugar’ conserva residencia y sustitución sin introducir una formulación demasiado interpretativa.
translation_notes:
  revision_awareness: 'El texto español sigue la revisión más reciente del POB en inglés al preferir una forma más natural y léxicamente ajustada para חֲצֵרִים, reflejada aquí como ‘aldeas’ en lugar de una opción más genérica. También conserva el esquema sintáctico del hebreo: etnónimo + participio de residencia + límite geográfico + etnónimo de procedencia + destrucción + ocupación sucesiva.'
  spanish_consistency_notes:
  - Se mantuvo ‘Caftor’ y no ‘Caphtor’ para una adaptación española uniforme del topónimo, mientras que el etnónimo se ajustó a ‘caftoritas’.
  - Se preservó el paralelismo narrativo y la relación de sucesión territorial en ‘habitaron en su lugar’.
  - No se introdujo terminología eclesiástica ni interpretaciones históricas adicionales que el versículo no requiere.
