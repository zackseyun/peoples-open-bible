  glossary_alignment: No hay conflictos con la terminología de proyecto (Yahvé, Mesías, etc.) en este versículo. Los nombres propios y el lenguaje real/militar están mayormente alineados con las decisiones auditadas. Recomiendo conservar «su oficial» y «Arie» como en el borrador, pero ajustar la frase de los gileaditas para reflejar mejor el partitivo hebreo.
