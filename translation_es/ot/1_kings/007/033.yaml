translation:
  language: es
  text: La obra de las ruedas era como la obra de una rueda de carro; sus ejes[a], sus aros, sus radios[b] y sus cubos[b], todo era de metal fundido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «manijas» o «soportes» para «ejes»; el término hebreo literalmente se relaciona con «manos», pero en este contexto de ruedas probablemente se refiere a piezas axiales o de soporte.
    reason: lexical_alternative
  - marker: b
    text: O «bandas» para «radios» y «refuerzos» o «herrajes» para «cubos»; ambos términos hebreos son raros, y su sentido técnico exacto se infiere del contexto de la construcción de la rueda.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַעֲשֵׂה
  english_pob_choice: workmanship
  chosen_spanish: obra
  alternatives_spanish:
  - trabajo
  - manufactura
  lexicon: HALOT
  rationale: En este contexto describe la hechura o el modo de construcción de las piezas. «Obra» comunica bien el resultado trabajado sin forzar un tecnicismo poco natural en español.
- source_word: הָאֹפַנִּים / אוֹפַן
  english_pob_choice: wheels / wheel
  chosen_spanish: ruedas / rueda
  alternatives_spanish:
  - llantas
  - rodas
  lexicon: HALOT
  rationale: El término estándar y claro en español para este componente es «rueda». Mantiene el paralelo entre el plural del sujeto y el singular de la comparación con una rueda de carro.
- source_word: כְּמַעֲשֵׂה
  english_pob_choice: was like the workmanship of
  chosen_spanish: era como la obra de
  alternatives_spanish:
  - era como la manufactura de
  - era semejante a la obra de
  lexicon: HALOT
  rationale: El כ comparativo exige una formulación de semejanza. «Era como la obra de» conserva la comparación formal y suena natural en español.
- source_word: הַמֶּרְכָּבָה
  english_pob_choice: chariot
  chosen_spanish: carro
  alternatives_spanish:
  - carroza
  - carreta
  lexicon: HALOT
  rationale: En el contexto bíblico español, «carro» expresa mejor el vehículo de guerra/uso antiguo que «carroza» o «carreta». La comparación resultante, «rueda de carro», es idiomática y fiel.
- source_word: יְדוֹתָם
  english_pob_choice: axles
  chosen_spanish: ejes
  alternatives_spanish:
  - manijas
  - soportes
  lexicon: HALOT
  rationale: Aunque el término hebreo literalmente se relaciona con «mano», en este contexto de anatomía de la rueda el sentido técnico más probable es la pieza axial o estructural. «Ejes» sigue la decisión inglesa de «axles» y encaja con la lista de partes.
- source_word: וְגַבֵּיהֶם
  english_pob_choice: rims
  chosen_spanish: aros
  alternatives_spanish:
  - bordes
  - bordes exteriores
  lexicon: HALOT
  rationale: Para una rueda, «aros» comunica la parte circular exterior de manera clara y natural. «Rims» en inglés apunta a ese borde/aro exterior; «aros» preserva la imagen sin sonar demasiado técnica.
- source_word: וְחִשֻּׁקֵיהֶם
  english_pob_choice: spokes
  chosen_spanish: radios
  alternatives_spanish:
  - brazos
  - refuerzos
  lexicon: HALOT
  rationale: En la anatomía de una rueda, «radios» es el equivalente español más claro para los miembros que unen cubo y aro. Aunque el hebreo es raro, la función contextual coincide con el sentido adoptado en inglés.
- source_word: וְחִשֻּׁרֵיהֶם
  english_pob_choice: hubs
  chosen_spanish: cubos
  alternatives_spanish:
  - naves
  - bujes
  lexicon: HALOT
  rationale: «Cubos» es el término español usual para la parte central de la rueda. Es más transparente que «naves» y más bíblicamente/ técnicamente apropiado que un regionalismo como «buje» en un texto de lectura amplia.
- source_word: מוּצָק
  english_pob_choice: cast metal
  chosen_spanish: fundido en metal
  alternatives_spanish:
  - de metal fundido
  - moldeado en metal
  lexicon: HALOT
  rationale: El participio pasivo indica que las piezas fueron vertidas/fundidas. «Fundido en metal» conserva el proceso manufacturero y evita añadir un sustantivo que el hebreo no exige de forma explícita.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el estado final inglés: mantiene la comparación singular con una rueda de carro, conserva la lista de partes mecánicas y refleja el cierre sumativo de que todo era fundido. No se introdujeron cambios respecto del audit trail inglés; la decisión española prioriza claridad técnica sin perder la rareza lexical de los términos hebreos.'
  spanish_consistency_notes:
  - Se usa «obra» de manera consistente para מַעֲשֵׂה en descripciones de manufactura.
  - Se mantiene «rueda»/«ruedas» para אוֹפַן/הָאֹפַנִּים conforme al uso técnico de la pieza.
  - Se eligieron términos españoles comunes de anatomía de la rueda («ejes», «aros», «radios», «cubos») para reflejar el listado técnico sin arcaísmos.
  - «Fundido en metal» intenta reproducir el matiz de מוּצָק como metal vertido y solidificado.
