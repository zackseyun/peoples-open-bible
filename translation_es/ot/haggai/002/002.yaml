  text: אֱמָר נָ֗א אֶל זְרֻבָּבֶ֤ל בֶּן שַׁלְתִּיאֵל֙ פַּחַ֣ת יְהוּדָ֔ה וְ/אֶל יְהוֹשֻׁ֥עַ בֶּן יְהוֹצָדָ֖ק הַ/כֹּהֵ֣ן הַ/גָּד֑וֹל וְ/אֶל שְׁאֵרִ֥ית הָ/עָ֖ם לֵ/אמֹֽר־־־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/haggai/002/002.yaml
  text: Speak now to Zerubbabel son of Shealtiel[a], governor of Judah, and to Joshua son of Jehozadak, the high priest, and to the remnant of the people, saying[b],
  footnotes:
