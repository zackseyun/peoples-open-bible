translation:
  language: es
  text: Mis antepasados me recibirán como un[a] campeón, ya que no temí tus coacciones, hasta la muerte.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «me recibirán para una lucha/contienda»; el griego usa imaginería agonística que puede evocar lenguaje atlético o de combate.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀγών᾽
  english_pob_choice: as a champion
  chosen_spanish: como un campeón
  alternatives_spanish:
  - para un combate
  - para una contienda
  - como uno para la lucha
  lexicon: LSJ
  rationale: El griego evoca la imagen agonística de lucha/competencia. En español, «como un campeón» conserva la idea honorífica de alguien acreditado por su resistencia, sin volver la frase forzada o demasiado técnica.
- source_word: οἱ πατέρες
  english_pob_choice: my fathers
  chosen_spanish: mis padres
  alternatives_spanish:
  - mis antepasados
  - los padres
  - mis padres ancestrales
  lexicon: LSJ
  rationale: Aunque el inglés auditado usa «my fathers» para reflejar el valor ancestral, en español «mis padres» puede sonar a progenitores inmediatos. Por claridad y fidelidad al sentido de los antepasados varones del hablante, se optó por «mis padres» como fórmula heredada/ancestral, sin añadir explicación doctrinal en el texto principal.
- source_word: προσδέξονται
  english_pob_choice: will welcome
  chosen_spanish: me recibirán
  alternatives_spanish:
  - me acogerán
  - me darán la bienvenida
  - me aceptarán
  lexicon: LSJ
  rationale: El futuro medio indica recepción favorable. «Recibirán» es natural en español y mantiene la idea de aceptación honrosa; «acogerán» sería posible, pero «recibirán» encaja mejor con la construcción predicativa.
- source_word: μὴ φοβηθέντα
  english_pob_choice: since I did not fear
  chosen_spanish: ya que no temí
  alternatives_spanish:
  - porque no temí
  - al no haber temido
  - puesto que no temí
  lexicon: LSJ
  rationale: El participio aoristo expresa circunstancia o razón. «Ya que no temí» mantiene la relación causal y un registro formal aceptable en español.
- source_word: τὰς μέχρι θανάτου ἀνάγκας
  english_pob_choice: your constraints, even unto death
  chosen_spanish: tus constricciones, hasta la muerte
  alternatives_spanish:
  - tus constricciones, incluso hasta la muerte
  - tus coerciones, hasta la muerte
  - tus presiones, hasta la muerte
  lexicon: LSJ
  rationale: ἀνάγκη designa fuerza/compulsión/coerción más que simple necesidad. «Constricciones» intenta preservar la idea de presión forzada sin introducir un tecnicismo poco transparente; «hasta la muerte» conserva el alcance extremo de μέχρι θανάτου.
theological_decisions:
- issue: Recepción por los antepasados y posible trasfondo escatológico
  english_pob_reading: The phrase refers to the speaker's ancestral forebears welcoming him after faithful endurance, without expanding the text into a fuller doctrinal statement about the afterlife.
  chosen_spanish_reading: La frase se entiende como una recepción por los antepasados del hablante después de su fidelidad bajo presión, sin desarrollar más allá de lo dicho una doctrina sobre el estado de los muertos.
  alternative_spanish_readings:
  - mis padres como progenitores inmediatos
  - mis antepasados sin matiz de recepción tras la muerte
  - un juicio explícito sobre la vida después de la muerte
  rationale: El texto solo afirma que «mis padres» lo recibirán. La traducción evita cerrar la tensión entre lenguaje ancestral y posible resonancia escatológica, manteniendo el alcance mínimo que exige el griego y el audit trail en inglés.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que prefirió un registro más formal con «since», «constraints» y «unto death». En español se reflejó ese tono formal con «ya que» y «hasta la muerte», aunque se optó por una formulación más natural para ἀνάγκας mediante «constricciones».
  spanish_consistency_notes:
  - Se mantiene un registro formal y digno, sin arcaísmos innecesarios.
  - No se emplea «SEÑOR» ni terminología eclesiástica tradicional no requerida por el texto.
  - La nota a pie conserva la alternativa agonística documentada en el audit trail inglés.
