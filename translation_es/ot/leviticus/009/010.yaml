translation:
  language: es
  text: Y la grasa, los riñones y el lóbulo del hígado de la ofrenda por el pecado[a] los hizo subir en humo sobre el altar, tal como Yahvé había mandado a Moisés.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «ofrenda de purificación». El término hebreo puede enfatizar la función de la ofrenda de quitar la impureza, así como su relación con el pecado.
    reason: alternative_reading
lexical_decisions:
- source_word: חֵלֶב
  english_pob_choice: fat
  chosen_spanish: grasa
  alternatives_spanish:
  - la grasa sacrificial
  - los pedazos de grasa
  lexicon: HALOT
  rationale: En contexto sacrificial, חֵלֶב alude a la grasa reservada para Yahvé. 'Grasa' es el equivalente más directo y natural en español; 'grasa sacrificial' aclara la función, pero añade explicación no presente en el hebreo.
- source_word: כְּלָיֹת
  english_pob_choice: kidneys
  chosen_spanish: riñones
  alternatives_spanish:
  - los riñones
  lexicon: HALOT
  rationale: El término es anatómico y concreto. 'Riñones' conserva el detalle ritual del texto hebreo sin suavizarlo.
- source_word: יֹּתֶרֶת מִן־הַכָּבֵד
  english_pob_choice: the lobe of the liver
  chosen_spanish: el lóbulo del hígado
  alternatives_spanish:
  - la porción del hígado
  - el apéndice del hígado
  - el lóbulo del hígado
  lexicon: HALOT
  rationale: La construcción hebrea describe una parte adicional asociada al hígado en el sacrificio. 'Lóbulo del hígado' comunica esa pieza concreta con un español natural y cercano al valor anatómico del hebreo.
- source_word: חַטָּאת
  english_pob_choice: sin offering
  chosen_spanish: ofrenda por el pecado
  alternatives_spanish:
  - ofrenda por el pecado
  - ofrenda de purificación
  lexicon: HALOT
  rationale: 'El español ''ofrenda por el pecado'' mantiene la categoría cultual tradicional y deja abierta la tensión documentada: el término puede enfatizar también la purificación. ''Ofrenda de purificación'' se preserva como alternativa, pero no reemplaza la lectura principal sin más apoyo contextual.'
- source_word: הִקְטִיר
  english_pob_choice: turned into smoke
  chosen_spanish: lo hizo subir en humo
  alternatives_spanish:
  - lo convirtió en humo
  - lo quemó
  - lo ofreció en humo
  lexicon: HALOT
  rationale: '''Hizo subir en humo'' refleja el valor cultual de הִקְטִיר mejor que un simple ''quemó'', porque no describe solo combustión sino el acto de hacer ascender la ofrenda en humo sobre el altar.'
- source_word: הַמִּזְבֵּחָה
  english_pob_choice: on the altar
  chosen_spanish: sobre el altar
  alternatives_spanish:
  - en el altar
  - al altar
  lexicon: HALOT
  rationale: Con el verbo sacrificial, el español idiomático es 'sobre el altar'. Mantiene la escena ritual sin forzar el matiz direccional del hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahvé
  lexicon: HALOT
  rationale: Se conserva el nombre divino revelado, no el título sustitutorio 'Señor'. 'Yahvé' es la forma establecida en el proyecto para el Tetragrámaton.
theological_decisions:
- issue: Ambigüedad cultual de חַטָּאת
  english_pob_reading: sin offering, with a footnote preserving 'purification offering'
  chosen_spanish_reading: ofrenda por el pecado, con nota que preserva la opción 'ofrenda de purificación'
  alternative_spanish_readings:
  - ofrenda de purificación
  - ofrenda expiatoria
  rationale: 'La frase española principal conserva la categoría familiar y transparente. La nota mantiene la tensión exegética documentada: en contexto sacerdotal, el término puede destacar el efecto de purificación además de la relación con el pecado.'
  doctrine_reference: Translation philosophy §§3 y 5; nota lexical sobre el campo semántico de חַטָּאת
- issue: Nombre divino en legislación sacerdotal
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  rationale: Dado que el texto hebreo usa explícitamente el Tetragrámaton, la traducción conserva el nombre propio divino. Esto evita la sustitución por un título y mantiene la audibilidad del nombre en el texto.
  doctrine_reference: Convención terminológica del proyecto para יהוה
translation_notes:
  revision_awareness: El audit trail inglés revisó la frase de la pieza del hígado desde una formulación menos natural a 'the lobe of the liver'. La versión española sigue esa corrección y la hace idiomática como 'el lóbulo del hígado', sin diluir la precisión anatómica. También se conservó la decisión revisada de 'turned into smoke' mediante 'lo hizo subir en humo'.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יהוה en armonía con la terminología del proyecto.
  - Se usa 'ofrenda por el pecado' como texto principal y no 'purificación', pero la nota preserva la alternativa documentada.
  - '''Sobre el altar'' se usa como equivalente culto natural de la acción sacrificial.'
  - El objeto directo neutro 'lo' resume la serie de elementos ofrecidos sin añadir sustantivos no presentes en el hebreo.
