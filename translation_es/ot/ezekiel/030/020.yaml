translation:
  language: es
  text: Y aconteció en el undécimo año, en el primer mes, el séptimo día del mes, que vino la palabra de Yahvé a mí, diciendo,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And it happened
  chosen_spanish: Y aconteció
  alternatives_spanish:
  - Y sucedió
  - Y fue
  lexicon: HALOT
  rationale: La forma narrativa וַיְהִי introduce un aviso profético fechado; «aconteció» conserva ese valor discursivo en español sin sonar arcaico, y mantiene el inicio enlazado con la narración previa.
- source_word: בְּאַחַת עֶשְׂרֵה שָׁנָה
  english_pob_choice: in the eleventh year
  chosen_spanish: en el undécimo año
  alternatives_spanish:
  - en año once
  lexicon: HALOT
  rationale: 'La construcción hebrea cardinal + «año» se expresa naturalmente en español con un ordinal: «undécimo año». Evita una formulación poco idiomática y conserva el dato cronológico exacto.'
- source_word: בָּרִאשׁוֹן
  english_pob_choice: in the first month
  chosen_spanish: en el primer mes
  alternatives_spanish:
  - en el primero
  lexicon: HALOT
  rationale: Aquí el adjetivo funciona de modo sustantivado en una fórmula de fecha y se refiere al primer mes. En español conviene suplir el sustantivo implícito («mes») para claridad y fidelidad.
- source_word: בְּשִׁבְעָה לַחֹדֶשׁ
  english_pob_choice: on the seventh day of the month
  chosen_spanish: a los siete días del mes
  alternatives_spanish:
  - el séptimo día del mes
  - a los siete del mes
  lexicon: HALOT
  rationale: La expresión hebrea es una fórmula fechada literal «en siete del mes». «A los siete días del mes» respeta la estructura semítica y sigue siendo comprensible en español; la alternativa más explícita, «el séptimo día del mes», también sería válida, pero aquí se privilegia una correspondencia más cercana al patrón del original.
- source_word: הָיָה דְבַר יְהוָה
  english_pob_choice: the word of Yahweh came
  chosen_spanish: vino a mí la palabra de Yahvé
  alternatives_spanish:
  - la palabra de Yahvé vino a mí
  - me vino la palabra de Yahvé
  lexicon: HALOT
  rationale: La fórmula profética estándar usa הָיָה con דְבַר יְהוָה; en español bíblico natural se expresa con «vino a mí la palabra». Se preserva el sujeto «la palabra de Yahvé» y el movimiento de revelación sin forzar un calco como «fue la palabra».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: Se mantiene la decisión del proyecto de reproducir el nombre divino como transliteración del Tetragrámaton. «Yahvé» es la forma establecida en el texto español del proyecto, en lugar de la sustitución litúrgica «SEÑOR».
- source_word: אֵלַי
  english_pob_choice: to me
  chosen_spanish: a mí
  alternatives_spanish:
  - me
  lexicon: HALOT
  rationale: El sufijo de primera persona se vierte de modo directo y natural con «a mí», manteniendo la dirección de la palabra revelada hacia el profeta.
- source_word: לֵאמֹר
  english_pob_choice: saying,
  chosen_spanish: diciendo,
  alternatives_spanish:
  - 'y dijo:'
  - 'para decir:'
  lexicon: HALOT
  rationale: La fórmula introductoria de discurso se conserva con «diciendo», que funciona bien en la cadencia profética y deja abierta la continuación del discurso.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahveh
  rationale: El texto hebreo usa el Tetragrámaton directamente. Siguiendo la línea doctrinal del proyecto, se traslada como «Yahvé» para preservar el nombre propio del Dios del pacto, en lugar de ocultarlo tras un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה / YHWH → Yahvé'
translation_notes:
  revision_awareness: El pasaje inglés auditado no presenta notas ni variantes textuales; la traducción española sigue la misma lectura alta de acuerdo con el control cruzado y conserva la fórmula profética estándar con ajuste idiomático mínimo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para יְהוָה.
  - Se conserva un tono bíblico claro y moderno, sin arcaísmos innecesarios.
  - La fecha se expresa con ordinales naturales en español, pero sin perder la estructura de la fórmula hebrea.
