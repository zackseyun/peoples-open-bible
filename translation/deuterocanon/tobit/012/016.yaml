theological_decisions:
- issue: Nature of the response to Raphael's revelation
  chosen_reading: The verse describes fear-induced prostration without adding worship
    language.
  alternative_readings:
  - The action could be understood as reverential prostration before an angel.
  rationale: The Greek explicitly states that they fell facedown because they were
    afraid. The translation preserves the emotional and physical response without
    importing a stronger claim about worship that the verse itself does not state.
  doctrine_reference: Preserve theological tension rather than resolve it.
