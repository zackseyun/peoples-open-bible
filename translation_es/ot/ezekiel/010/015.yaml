translation:
  language: es
  text: Y se elevaron los querubines[a]. Eran el ser viviente que yo había visto junto al canal de Kebar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Eran los seres vivientes que yo vi junto al río Quebar». El hebreo tiene singular, «el ser viviente», probablemente para identificar a los querubines con la clase de seres vistos antes; «canal de Kebar» también puede traducirse «río Quebar».'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֵּרֹמּוּ
  english_pob_choice: rose up
  chosen_spanish: se elevaron
  alternatives_spanish:
  - se levantaron
  - subieron
  lexicon: HALOT
  rationale: El verbo de רוּם en esta forma narrativa expresa ascenso o elevación. En español, «se elevaron» conserva el movimiento hacia arriba sin añadir pasividad excesiva ni un matiz mecánico.
- source_word: הַכְּרוּבִים
  english_pob_choice: the cherubim
  chosen_spanish: los querubines
  alternatives_spanish:
  - los querubes
  lexicon: HALOT
  rationale: Se mantiene el término técnico tradicional transliterado en español bíblico. «Querubines» preserva el registro solemne y la referencia visionaria.
- source_word: הִיא
  english_pob_choice: They were
  chosen_spanish: Era
  alternatives_spanish:
  - Eran
  - Esto era
  lexicon: HALOT
  rationale: Aunque el hebreo usa un pronombre singular femenino, aquí funciona con valor identificador respecto de la entidad visionaria. En español, el singular «Era» conserva mejor la concordancia con «el ser viviente» y mantiene la tensión literaria del texto.
- source_word: הַחַיָּה
  english_pob_choice: the living creature
  chosen_spanish: el ser viviente
  alternatives_spanish:
  - la criatura viviente
  - el ser vivo
  lexicon: HALOT
  rationale: «חַיָּה» designa en Ezequiel una figura viviente celestial. «Ser viviente» es más natural en español que «criatura viviente» y permite conservar el enlace conceptual con Ezequiel 1 y 10 sin reducirlo a una criatura ordinaria.
- source_word: אֲשֶׁר רָאִיתִי
  english_pob_choice: that I had seen
  chosen_spanish: que yo había visto
  alternatives_spanish:
  - que vi
  - que yo vi
  lexicon: HALOT
  rationale: El pluscuamperfecto español reproduce bien la anterioridad respecto del momento narrativo presente y refleja la relación con la visión previa.
- source_word: בִּנְהַר כְּבָר
  english_pob_choice: by the Kebar Canal
  chosen_spanish: junto al canal de Kebar
  alternatives_spanish:
  - junto al río Kebar
  - junto al canal Quebar
  lexicon: HALOT
  rationale: «נְהַר» puede designar un cauce o canal en el contexto babilónico. «Canal de Kebar» sigue la decisión auditable del POB inglés y «junto a» expresa adecuadamente la preposición locativa.
theological_decisions:
- issue: Identificación de los querubines con el ser viviente visto antes en la visión de Ezequiel
  english_pob_reading: They were the living creature that I had seen by the Kebar Canal.
  chosen_spanish_reading: Era el ser viviente que yo había visto junto al canal de Kebar.
  alternative_spanish_readings:
  - Eran los seres vivientes que yo había visto junto al canal de Kebar.
  - Era la criatura viviente que yo había visto junto al canal de Kebar.
  rationale: El hebreo conserva una tensión entre el sujeto plural («los querubines») y la identificación en singular («el ser viviente»). La redacción española mantiene esa tensión con un singular identificador, en lugar de resolverla por completo en plural o pluralizar el sustantivo principal.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el paquete fuente; el último pase indicó que no eran necesarios cambios. La presente versión sigue de cerca el texto hebreo y el criterio auditado del POB inglés, manteniendo la tensión entre plural y singular en la identificación visionaria.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el nombre divino; en este versículo no se requiere.
  - Se mantiene «querubines» como término técnico bíblico y no se sustituye por vocabulario devocional más genérico.
  - «Canal de Kebar» conserva la precisión geográfica adoptada en el POB inglés, con la variante alternativa «río Quebar» explicada en nota.
