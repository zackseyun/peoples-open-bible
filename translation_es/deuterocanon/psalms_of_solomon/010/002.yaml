    reason: lexical_alternative
  - marker: d
    text: O «la corrección» o «el castigo correctivo».
    reason: lexical_alternative
  revision_rationale: Se ajusta καθαρισθήσεται a «será limpiado» para seguir más de cerca la decisión principal auditada («will be cleansed»), dejando «será purificado» como alternativa en nota. También se mejora la naturalidad del español con «porque el Señor es bueno con...» sin alterar el sentido. Se conserva «azotes» por la continuidad léxica con el verso anterior y «disciplina» por la fuerza correctiva de παιδεία.
