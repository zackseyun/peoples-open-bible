translation:
  language: es
  text: Pero Sihón, rey de Hesbón, no quiso[a] dejarnos pasar por su tierra, porque Yahvé tu Dios endureció su espíritu y afirmó su corazón, para entregarlo en tu mano, como sucede hoy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se negó». El verbo hebreo expresa voluntad o consentimiento, no solo una negativa externa.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָבָה
  english_pob_choice: was not willing
  chosen_spanish: no quiso
  alternatives_spanish:
  - no estuvo dispuesto
  - se negó
  lexicon: HALOT
  rationale: El verbo expresa voluntad o consentimiento, no solo un acto externo de negativa. En español, «no quiso» conserva de manera natural el matiz volitivo.
- source_word: הַעֲבִרֵנוּ בּוֹ
  english_pob_choice: to let us pass through him
  chosen_spanish: dejarnos pasar por él
  alternatives_spanish:
  - dejarnos pasar por su tierra
  - hacernos pasar por él
  lexicon: HALOT
  rationale: La redacción hebrea usa el pronombre con valor territorial o de dominio, y el testimonio inglés reciente opta por mantener «through him». En español, «por él» refleja más de cerca la forma hebrea sin añadir «tierra».
- source_word: הִקְשָׁה ... אֶת רוּחוֹ
  english_pob_choice: had hardened his spirit
  chosen_spanish: endureció su espíritu
  alternatives_spanish:
  - hizo duro su espíritu
  - volvió obstinado su espíritu
  lexicon: HALOT
  rationale: «Endurecer» reproduce היטב la fuerza de הִקְשָׁה y conserva «espíritu» como término antropológico y teológico, sin desplazarlo por una paráfrasis más interpretativa.
- source_word: וְאִמֵּץ אֶת לְבָבוֹ
  english_pob_choice: made his heart firm
  chosen_spanish: afirmó su corazón
  alternatives_spanish:
  - fortaleció su corazón
  - hizo firme su corazón
  lexicon: HALOT
  rationale: אָמֵץ puede significar fortalecer o hacer firme. «Afirmó su corazón» comunica el valor de firmeza con buena naturalidad en español y mantiene la distinción respecto de «endureció su espíritu».
- source_word: לְמַעַן
  english_pob_choice: in order to
  chosen_spanish: para
  alternatives_spanish:
  - a fin de
  - con el propósito de
  lexicon: HALOT
  rationale: La partícula expresa propósito; «para» es la opción más directa y natural en español, sin perder el sentido final.
- source_word: תִּתּוֹ בְיָדְךָ
  english_pob_choice: to give him into your hand
  chosen_spanish: entregarlo en tu mano
  alternatives_spanish:
  - darlo en tu mano
  - ponerlo en tu mano
  lexicon: HALOT
  rationale: La expresión idiomática de dar/entregar en la mano señala poder o dominio. «Entregarlo en tu mano» es fiel e inteligible en español bíblico contemporáneo.
- source_word: כַּיּוֹם הַזֶּה
  english_pob_choice: as it is this day
  chosen_spanish: como hasta este día
  alternatives_spanish:
  - como en este día
  - como sucede hoy
  lexicon: HALOT
  rationale: La fórmula deuteronómica apunta al estado vigente y comprobable. «Como hasta este día» conserva ese valor formular sin sonar forzado.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre propio divino según el criterio del proyecto para יְהוָה, en lugar de sustituirlo por un título.
theological_decisions:
- issue: Endurecimiento divino y falta de voluntad humana
  english_pob_reading: Retain both Sihon's unwillingness and the LORD's hardening without softening either element.
  chosen_spanish_reading: Conservar tanto que Sihón no quiso como que Yahvé endureció su espíritu y afirmó su corazón, sin resolver la tensión.
  alternative_spanish_readings:
  - Suavizar el texto para hablar solo de obstinación humana
  - Parafrasear el endurecimiento como mera permisión divina
  rationale: El hebreo afirma explícitamente ambas realidades. La traducción española preserva esa tensión teológica sin atenuar ni desplazar ninguno de los dos polos.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La redacción sigue de cerca la revisión más reciente del audit trail al traducir el pasaje con «endureció su espíritu» y «afirmó su corazón», manteniendo la tensión teológica indicada en el contexto inglés y evitando añadir «tierra» donde el hebreo dice literalmente «por él».
  spanish_consistency_notes:
  - Se usó «Yahvé» para יהוה conforme al estándar del proyecto.
  - Se mantuvo la distinción entre «espíritu» y «corazón» para reflejar los dos términos hebreos distintos.
  - Se evitó sustituir el pronombre hebreo por una expansión territorial no presente en el texto base.
  - La nota al pie está anclada explícitamente en «no quiso[a]» para cumplir la trazabilidad del aparato crítico.
