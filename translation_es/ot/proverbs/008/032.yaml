- from: Y ahora[a], hijos, escúchenme; bienaventurados los que guardan mis caminos.
  to: Y ahora[a], hijos, escúchenme; bienaventurados son los que guardan mis caminos.
  rationale: Se conserva íntegramente el sentido del hebreo y la política de género-precisión del POB, pero se corrige la nota para que ofrezca una alternativa real equivalente a la inglesa y se mejora levemente la naturalidad española con «bienaventurados son los que».
