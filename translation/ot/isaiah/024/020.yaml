id: ISA.24.20
reference: Isaiah 24:20
source:
  edition: WLC
  text: נ֣וֹעַ תָּנ֤וּעַ אֶ֨רֶץ֙ כַּ/שִּׁכּ֔וֹר וְ/הִֽתְנוֹדְדָ֖ה כַּ/מְּלוּנָ֑ה וְ/כָבַ֤ד עָלֶ֨י/הָ֙ פִּשְׁעָ֔/הּ וְ/נָפְלָ֖ה וְ/לֹא תֹסִ֥יף קֽוּם־׃ס
translation:
  text: The earth will stagger like a drunkard[a], and sway back and forth like a hut; its transgression lies heavy upon it, and it will fall and not rise again.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like a watchman's hut' or 'like a temporary shelter'; the Hebrew term refers to a flimsy temporary lodging.
    reason: lexical_alternative
lexical_decisions:
- source_word: נ֣וֹעַ תָּנ֤וּעַ
  chosen: will stagger, staggering
  alternatives:
  - will reel to and fro
  - will totter greatly
  - will shake violently
  lexicon: HALOT
  rationale: The infinitive absolute plus imperfect of נוע intensifies the verbal idea. English 'will stagger, staggering' preserves the emphatic repetition without becoming wooden. 'Reel to and fro' is possible, but 'stagger' fits the immediate simile of a drunkard more naturally.
- source_word: אֶ֨רֶץ֙
  chosen: the earth
  alternatives:
  - the land
  lexicon: HALOT
  rationale: In this cosmic judgment context, 'earth' is more likely than the more localized 'land.' Isaiah 24 has universal scope, so 'the earth' best reflects the discourse setting.
- source_word: כַּ/שִּׁכּ֔וֹר
  chosen: like a drunkard
  alternatives:
  - like a drunken man
  lexicon: HALOT
  rationale: The noun denotes one who is drunk. 'Drunkard' is concise, idiomatic, and avoids adding 'man' where the Hebrew simply uses the singular adjective/substantive.
- source_word: וְ/הִֽתְנוֹדְדָ֖ה
  chosen: and sway back and forth
  alternatives:
  - and totter
  - and wander
  - and shake
  lexicon: HALOT
  rationale: The hitpolel of נוד conveys unsteady movement or swaying. 'Sway back and forth' captures the reflexive, repeated motion and pairs well with the image of instability.
- source_word: כַּ/מְּלוּנָ֑ה
  chosen: like a hut
  alternatives:
  - like a shack
  - like a temporary shelter
  - like a watchman's hut
  lexicon: HALOT
  rationale: מְלוּנָה refers to a temporary shelter or lodging hut, often flimsy and unstable. 'Hut' is readable and preserves the image of a frail structure. Because 'watchman's hut' is contextually possible but not explicit here, it is preserved in a footnote rather than the main text.
- source_word: וְ/כָבַ֤ד עָלֶ֨י/הָ֙
  chosen: lies heavy upon it
  alternatives:
  - is heavy upon it
  - weighs heavily on it
  lexicon: HALOT
  rationale: The verb כבד here expresses burden or weight. 'Lies heavy upon it' is idiomatic English that preserves the metaphor of oppressive weight.
- source_word: פִּשְׁעָ֔/הּ
  chosen: its transgression
  alternatives:
  - its rebellion
  - its offense
  lexicon: HALOT
  rationale: פשע commonly denotes rebellion or transgression, often with covenantal overtones. 'Transgression' is broad enough to fit the context while retaining moral seriousness; 'rebellion' is possible but slightly more interpretive.
- source_word: וְ/נָפְלָ֖ה
  chosen: and it will fall
  alternatives:
  - and it falls
  lexicon: HALOT
  rationale: The qatal with prefixed conjunction in this prophetic sequence is well rendered futurally in English. 'Will fall' matches the surrounding future-like judgments.
- source_word: וְ/לֹא תֹסִ֥יף קֽוּם
  chosen: and not rise again
  alternatives:
  - and not continue to rise
  - and never rise again
  lexicon: HALOT
  rationale: The idiom יסף + infinitive means 'to do again/continue to do.' Here it means the earth will not rise again after falling. 'Not rise again' is the clearest idiomatic rendering; 'never rise again' is slightly stronger but acceptable.
