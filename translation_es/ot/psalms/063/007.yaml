translation:
  language: es
  text: Si te recuerdo en mi lecho,[a] medito en ti en las vigilias de la noche.[b][c]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Cuando te recuerdo en mi lecho, medito en ti en las vigilias de la noche». La partícula hebrea puede entenderse como condicional (''si'') o temporal (''cuando''); aquí se adopta la lectura condicional que reflejó la revisión inglesa.'
    reason: alternative_reading
  - marker: b
    text: «Vigilias de la noche» alude a las divisiones de la noche usadas para hacer guardia.
    reason: cultural_note
  - marker: c
    text: El verbo puede sugerir también un sentido de «musitar» o «murmurar», además de «meditar».
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Cuando
  lexicon: HALOT
  rationale: La partícula hebrea אִם puede leerse condicional o temporalmente. Dado que el texto fuente y la revisión inglesa optan por la lectura condicional ('If'), en español se conserva 'Si', que refleja mejor esa decisión auditada; 'Cuando' quedaría como alternativa interpretativa, pero no como texto principal.
- source_word: זְכַרְתִּיךָ
  english_pob_choice: I remember you
  chosen_spanish: te recuerdo
  alternatives_spanish:
  - me acuerdo de ti
  - te he recordado
  lexicon: HALOT
  rationale: El verbo זכר comunica recordar/callar a la memoria. En español, 'te recuerdo' transmite una acción personal y directa, manteniendo la relación orante con Dios sin volverla demasiado idiomática o pesada. 'Me acuerdo de ti' sería más conversacional, pero menos sobrio; 'te he recordado' enfatiza el perfecto más de lo necesario.
- source_word: עַל יְצוּעָי
  english_pob_choice: on my bed
  chosen_spanish: en mi lecho
  alternatives_spanish:
  - sobre mi cama
  - en mi cama
  lexicon: HALOT
  rationale: 'יְצוּעַ designa el lugar donde uno se acuesta: lecho/cama. ''En mi lecho'' preserva el registro poético y algo más formal que ''cama'', sin alejarse del sentido concreto.'
- source_word: בְּאַשְׁמֻרוֹת
  english_pob_choice: in the night watches
  chosen_spanish: en las vigilias de la noche
  alternatives_spanish:
  - en las guardias nocturnas
  - durante las vigilias nocturnas
  lexicon: HALOT
  rationale: אַשְׁמֻרוֹת alude a las divisiones de la noche marcadas por guardias. La opción principal mantiene la imagen cultural y el tono poético. 'Vigilias de la noche' comunica el referente sin requerir explicación en el cuerpo del verso.
- source_word: אֶהְגֶּה
  english_pob_choice: I meditate
  chosen_spanish: medito
  alternatives_spanish:
  - medito en silencio
  - murmuro
  - pienso
  lexicon: HALOT
  rationale: הגה puede abarcar meditar, musitar o murmurar en voz baja. En este contexto devocional, 'medito' reproduce bien la reflexión sostenida que el audit trail inglés también privilegia, sin perder la posibilidad de un matiz de murmullo sugerido por la nota inglesa.
- source_word: בָּךְ
  english_pob_choice: on you
  chosen_spanish: en ti
  alternatives_spanish:
  - sobre ti
  - acerca de ti
  lexicon: HALOT
  rationale: Aunque en inglés se traduce 'on you', en español el giro natural con 'meditar' es 'meditar en ti'. Esta opción conserva el foco personal del objeto de meditación y evita un calco incómodo.
translation_notes:
  revision_awareness: Se siguió el último estado revisado del audit trail inglés, que cambió la lectura de אִם de 'When' a 'If'. La redacción española mantiene esa decisión, conserva la imagen concreta del lecho y la referencia cultural a las vigilias nocturnas, y recoge la amplitud semántica de הגה en nota.
  spanish_consistency_notes:
  - Se usó 'Yahvé' solo cuando corresponda a este proyecto; en este verso no aparece ningún nombre divino explícito.
  - Se prefirió 'lecho' por el registro poético y por corresponder a יְצוּעַ sin perder inteligibilidad.
  - Se evitó 'SEÑOR' como máscara porque no hay שם יהוה en el texto base.
  - La puntuación y colocación de comas siguen el ritmo poético del hebreo y el patrón de la versión inglesa auditada.
