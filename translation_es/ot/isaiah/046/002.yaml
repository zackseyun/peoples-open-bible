translation:
  language: es
  text: Se encorvan[a]; se inclinan juntos. No pueden salvar la carga, y ellos mismos van al cautiverio[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se agachan»; el verbo hebreo puede sugerir hundirse o colapsar, además de encorvarse.
    reason: lexical_alternative
  - marker: b
    text: 'O «y su alma/vida va al cautiverio». El hebreo dice literalmente: «y su néfesh fue al cautiverio», donde néfesh puede significar «alma», «vida» o «sí mismos / ellos mismos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: קָרְסוּ
  english_pob_choice: they stoop
  chosen_spanish: se encorvan
  alternatives_spanish:
  - se agachan
  - se agazapan
  - se derrumban
  lexicon: HALOT
  rationale: El verbo hebreo sugiere hundirse o inclinarse. «Se encorvan» conserva la imagen física de descenso sin cargar la línea con la idea más fuerte de derrumbe total.
- source_word: כָּרְעוּ
  english_pob_choice: they bow down
  chosen_spanish: se doblegan
  alternatives_spanish:
  - se arrodillan
  - se inclinan
  - se postran
  lexicon: HALOT
  rationale: El paralelo pide otra acción corporal de humillación. «Se doblegan» mantiene el movimiento de abatimiento y evita introducir un gesto litúrgico más específico como «postrarse».
- source_word: יַחְדָּו
  english_pob_choice: together
  chosen_spanish: juntos
  alternatives_spanish:
  - a la vez
  - en conjunto
  lexicon: HALOT
  rationale: Adverbio de acción conjunta; «juntos» suena natural en español y conserva el sentido de simultaneidad/colectividad.
- source_word: לֹא יָכְלוּ
  english_pob_choice: they are unable
  chosen_spanish: no pueden
  alternatives_spanish:
  - no pudieron
  - no eran capaces
  lexicon: HALOT
  rationale: La incapacidad general del sujeto se expresa con claridad en presente gnómico. «No pueden» es idiomático y mantiene el tono de reprimenda profética.
- source_word: מַלֵּט
  english_pob_choice: to save
  chosen_spanish: salvar
  alternatives_spanish:
  - rescatar
  - librar
  lexicon: HALOT
  rationale: El infinitivo expresa causar escape o liberación. «Salvar» sigue la revisión inglesa más directa y funciona bien en el registro formal del texto.
- source_word: מַשָּׂא
  english_pob_choice: the burden
  chosen_spanish: la carga
  alternatives_spanish:
  - el fardo
  - el peso
  - el bulto
  lexicon: HALOT
  rationale: Aquí el término apunta a lo que se lleva. «La carga» es el equivalente más natural y claro en español; además, evita la posible ambigüedad doctrinal de «carga» como responsabilidad moral porque el contexto inmediato es material e irónico.
- source_word: וְנַפְשָׁם
  english_pob_choice: they themselves
  chosen_spanish: ellos mismos
  alternatives_spanish:
  - su vida
  - su alma
  - su ser
  lexicon: HALOT
  rationale: נֶפֶשׁ puede significar alma, vida o self. Siguiendo la decisión inglesa, la versión española idiomática «ellos mismos» preserva la fuerza reflexiva sin forzar una afirmación antropológica sobre el 'alma' de los ídolos.
- source_word: בַּשְּׁבִי
  english_pob_choice: into captivity
  chosen_spanish: al cautiverio
  alternatives_spanish:
  - en cautiverio
  - a la cautividad
  - al exilio
  lexicon: HALOT
  rationale: «Cautiverio» transmite la condición de estar tomado preso y suena más natural que una repetición literal de «captividad» en español contemporáneo.
- source_word: הָלָכָה
  english_pob_choice: go
  chosen_spanish: van
  alternatives_spanish:
  - fueron
  - han ido
  lexicon: HALOT
  rationale: Aunque la forma hebrea es perfectiva y concuerda con נֶפֶשׁ, el español profético suele preferir presente para vividez. «Van» mantiene el movimiento continuo del cuadro y armoniza con el tono sentencioso de la línea.
theological_decisions:
- issue: Sentido de נֶפֶשׁ en la clausula final
  english_pob_reading: Render וְנַפְשָׁם idiomatically as 'they themselves' rather than 'their soul/life'
  chosen_spanish_reading: «ellos mismos» en lugar de «su alma» o «su vida»
  alternative_spanish_readings:
  - y su alma va al cautiverio
  - y su vida va al cautiverio
  - y su ser va al cautiverio
  rationale: La línea es una sátira contra ídolos/gods impotentes. En español, «ellos mismos» conserva la personificación y evita introducir una discusión antropológica que el contexto no exige. Así se preserva la tensión teológica sin suavizarla.
  doctrine_reference: Personificación e ironía profética; no resolver indebidamente la polisemia de נֶפֶשׁ.
translation_notes:
  revision_awareness: La redacción sigue la lectura inglesa más reciente de מַלֵּט como «save» y conserva la decisión del equipo POB de no traducir mecánicamente נֶפֶשׁ como «alma» aquí. También mantiene el ritmo paralelo de dos miembros breves antes de la cláusula final.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino en todo el proyecto, aunque este versículo no lo contiene.
  - Se evita «postran» porque en español puede sonar más cultual de lo que requiere esta sátira contra imágenes/idolos.
  - Se prefiere «cautiverio» por consistencia con el registro bíblico contemporáneo del proyecto y para diferenciarlo de simples metáforas de opresión.
