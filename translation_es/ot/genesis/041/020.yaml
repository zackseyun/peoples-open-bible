translation:
  language: es
  text: Y las vacas flacas y feas[a] se comieron a las primeras siete vacas saludables.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘flacas y de mal aspecto’; ‘las primeras siete vacas gordas’.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֹּאכַ֨לְנָה
  english_pob_choice: ate up
  chosen_spanish: se comieron
  alternatives_spanish:
  - devoraron
  - comieron
  lexicon: HALOT
  rationale: El verbo expresa consumo completo en la visión; en español, la forma reflexiva plural 'se comieron' transmite naturalmente esa totalidad sin sonar demasiado recargada. 'Devoraron' sería más intensa y 'comieron' más débil.
- source_word: הַפָּרוֹת
  english_pob_choice: cows
  chosen_spanish: vacas
  alternatives_spanish:
  - reses
  - ganado
  lexicon: HALOT
  rationale: El sustantivo hebreo es femenino plural y designa vacas de manera precisa; 'vacas' conserva esa precisión mejor que el genérico 'ganado' o 'reses'.
- source_word: הָרַקּוֹת
  english_pob_choice: thin
  chosen_spanish: flacas
  alternatives_spanish:
  - delgadas
  - magras
  - lean
  lexicon: HALOT
  rationale: Para el cuadro onírico, 'flacas' comunica bien la desnutrición o falta de robustez. 'Delgadas' sería más neutro; 'magras' más técnico o literario.
- source_word: וְהָרָעוֹת
  english_pob_choice: ugly
  chosen_spanish: feas
  alternatives_spanish:
  - de mal aspecto
  - malas de aspecto
  - feas de aspecto
  lexicon: HALOT
  rationale: Aquí רעות describe apariencia, no maldad moral. 'Feas' es la equivalencia más natural y directa en español; 'de mal aspecto' sería más explícito pero menos fluido.
- source_word: אֵת שֶׁבַע הַפָּרוֹת
  english_pob_choice: the seven cows
  chosen_spanish: las siete vacas
  alternatives_spanish:
  - las siete vacas aquellas
  - las siete vacas
  lexicon: HALOT
  rationale: El marcador de objeto directo no requiere equivalencia visible en español; el numeral y el sustantivo se traducen de forma directa. El orden español natural es 'las siete vacas'.
- source_word: הָרִאשֹׁנוֹת
  english_pob_choice: the first
  chosen_spanish: primeras
  alternatives_spanish:
  - primeras de todas
  - anteriores
  - primeras
  lexicon: HALOT
  rationale: 'En la secuencia del sueño, el sentido es temporal: las vacas que aparecieron primero. ''Primeras'' mantiene esa relación sin añadir explicación.'
- source_word: הַבְּרִיאֹת
  english_pob_choice: healthy
  chosen_spanish: saludables
  alternatives_spanish:
  - gordas
  - bien alimentadas
  - robustas
  lexicon: HALOT
  rationale: El adjetivo señala estado sano o robusto. 'Saludables' preserva el valor semántico general sin forzar solo la idea de gordura, aunque en el contexto también contrasta con la flacura. 'Gordas' sería más interpretativo.
theological_decisions:
- issue: 'Valor de רָעוֹת en el sueño: apariencia, no maldad moral'
  english_pob_reading: ugly
  chosen_spanish_reading: feas
  alternative_spanish_readings:
  - malas
  - malvadas
  - de mal aspecto
  rationale: El contexto onírico trata de forma y aspecto; por eso se evita leer una cualidad moral. 'Feas' conserva el juicio visual y no introduce maldad ética.
  doctrine_reference: Hermenéutica del contexto inmediato; semántica contextual del adjetivo.
- issue: הַבְּרִיאֹת como condición robusta/saudable, no doctrina sobre gordura
  english_pob_reading: healthy
  chosen_spanish_reading: saludables
  alternative_spanish_readings:
  - gordas
  - bien alimentadas
  - robustas
  rationale: '''Saludables'' mantiene la descripción de vigor físico sin absolutizar un detalle corporal específico. Esto deja intacto el contraste narrativo entre vacas débiles y vacas fuertes.'
  doctrine_reference: Lectura narrativa y semántica lexical; no se deriva enseñanza doctrinal directa.
translation_notes:
  revision_awareness: Se tomó en cuenta que la auditoría inglesa mantiene una equivalencia óptima con 'ate up', 'thin', 'ugly' y 'healthy', sin revisiones posteriores. La versión española busca conservar esa misma línea semántica, ajustando la fluidez a la sintaxis natural del español.
  spanish_consistency_notes:
  - Se mantiene 'vacas' para הַפָּרוֹת por precisión zoológica.
  - Se evita 'SEÑOR' u otra convención de sustitución porque el versículo no contiene el nombre divino.
  - '''Feas'' se usa como equivalente idiomático de ''ugly'' en sentido visual, no moral.'
  - El orden 'las siete vacas primeras' sigue siendo comprensible, pero se prefiere 'las siete vacas primeras' con lectura temporal de la secuencia.
