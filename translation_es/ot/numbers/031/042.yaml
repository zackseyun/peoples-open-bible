translation:
  language: es
  text: Y de la mitad de los hijos de Israel, que Moisés había separado de los hombres que iban a la guerra[a]—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de los hombres que estaban en campaña» / «de los hombres que salieron a la guerra».
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/מִֽ/מַּחֲצִ֖ית
  english_pob_choice: And from the half
  chosen_spanish: Y de la mitad
  alternatives_spanish:
  - Y de la media parte
  - Y de la mitad-porción
  - Ahora bien, de la mitad
  lexicon: HALOT
  rationale: מַחֲצִית expresa una mitad o porción dividida en dos. En español, «la mitad» es natural y fiel en este contexto de reparto del botín. Conservo la conjunción y la preposición del hebreo como «Y de».
- source_word: בְּנֵ֣י יִשְׂרָאֵ֑ל
  english_pob_choice: belonging to the sons of Israel
  chosen_spanish: de los hijos de Israel
  alternatives_spanish:
  - de los israelitas
  - de los hijos de Israel
  lexicon: HALOT
  rationale: Se mantiene la expresión literal «hijos de Israel» para conservar la forma del hebreo y su valor genealógico/corporativo. En español, el genitivo se expresa de manera natural con «de»; no se neutraliza a «israelitas» porque el POB inglés preservó la referencia masculina explícita.
- source_word: חָצָ֣ה
  english_pob_choice: had separated
  chosen_spanish: había separado
  alternatives_spanish:
  - había dividido
  - había apartó
  - había distribuido
  lexicon: HALOT
  rationale: El verbo aquí describe apartar una porción del total. «Había separado» refleja bien la acción de Moisés en el reparto sin introducir una idea más específica que el hebreo no exige.
- source_word: מֹשֶׁ֔ה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  alternatives_spanish:
  - Moisés
  lexicon: HALOT
  rationale: Nombre propio estándar en español bíblico.
- source_word: מִן הָאֲנָשִׁ֖ים
  english_pob_choice: from the men
  chosen_spanish: de los hombres
  alternatives_spanish:
  - de los varones
  - de los hombres
  lexicon: HALOT
  rationale: אֲנָשִׁים significa literalmente «hombres». Dado que el pasaje contrasta al grupo militar masculino con la otra mitad, «hombres» conserva la referencia directa mejor que una neutralización a «personas».
- source_word: הַצֹּבְאִֽים
  english_pob_choice: who served in the army
  chosen_spanish: que iban a la guerra
  alternatives_spanish:
  - que servían en el ejército
  - que estaban en campaña
  - que iban a la guerra
  lexicon: HALOT
  rationale: El participio צֹבְאִים se refiere a quienes salen en campaña militar o van a la guerra. Opto por «iban a la guerra» porque es una equivalencia transparente y cercana al sentido del hebreo; además coincide con la alternativa auditada que el inglés POB preservó en nota.
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios necesarios y el cotejo externo muestra alto acuerdo; por eso se mantiene una redacción cercana al audit trail, con ajuste al español natural sin desplazar el sentido del hebreo.
  spanish_consistency_notes:
  - Se conserva «hijos de Israel» para mantener la forma corporativa masculina del hebreo.
  - Se usa «la mitad» como equivalente natural de מַחֲצִית en un contexto de distribución.
  - «Iban a la guerra» preserva el matiz militar de צֹבְאִים sin sobreespecificar el tipo de servicio.
  - El guion final reproduce el corte sintáctico abierto del texto base, ya que el versículo continúa la enumeración en el contexto inmediato.
