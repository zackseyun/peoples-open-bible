    rationale: El inglés conserva la literalidad «whose tongue you will not hear» y explica que el sentido es entender el idioma. La nota española actual sobre «desde el extremo de la tierra» repite el sentido del texto principal y omite esa decisión léxica importante.
  - severity: low
