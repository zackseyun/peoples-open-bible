theological_decisions:
- issue: Interpretation of שְׁכֶם in relation to the place-name Shechem and the 'double portion' motif for Joseph
  chosen_reading: Render the common noun sense in the main text ('one ridge') and preserve the place-name/portion alternative in a footnote.
  alternative_readings:
  - '''one portion'' above your brothers'
  - '''Shechem, one portion'' above your brothers'
  rationale: The Hebrew likely exploits a wordplay between שׁכם as a topographical/common noun and Shechem as a place associated with Joseph (cf. Josh 24:32; John 4:5). The main text should not collapse the ambiguity into a proper name without signaling it. A footnote preserves the interpretive alternatives and the likely connection to Joseph's extra inheritance share through Ephraim and Manasseh.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather than resolve it.
