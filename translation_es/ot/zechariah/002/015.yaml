review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el hebreo y conserva los puntos clave: adhesión voluntaria de muchas naciones a Yahvé, la fórmula de pacto ''serán mi pueblo'', el singular femenino ''a ti/en medio de ti'', y la tensión teológica de ''Yahvé de los Ejércitos me ha enviado a ti''. Sin embargo, hay un problema de alineación con el rastro POB en la nota a: en inglés la alternativa tradicional documentada corresponde a ''the LORD of hosts'', no a una fórmula con enmascaramiento del nombre divino en el texto español del proyecto. La nota debe ajustarse a una alternativa española tradicional sin introducir ''SEÑOR'' como convención principal del proyecto.'
  spanish_quality_summary: El español es claro, natural y digno. 'Se unirán', 'en aquel día', 'serán mi pueblo' y 'habitaré en medio de ti' funcionan bien. La puntuación y el registro son adecuados. La principal reparación necesaria es la redacción de la nota léxica para evitar inconsistencia terminológica con la política del proyecto y con el hecho de que la alternativa se refiere al sintagma tradicional equivalente de 'hosts', no a reinstalar una convención de ocultamiento del Tetragrámaton en el texto principal.
  glossary_alignment: 'Buen alineamiento general con la glosa del proyecto: יהוה -> ''Yahvé''; יְהוָה צְבָאוֹת -> ''Yahvé de los Ejércitos''; גוֹיִם -> ''naciones''; שׁכן -> ''habitar''. La excepción problemática está en la nota a, donde ''el SEÑOR de los ejércitos'' entra en tensión con la norma principal del proyecto; una mejor nota sería ''O, más tradicionalmente, "Yahvé de los ejércitos"'' o ''... "el Señor de los ejércitos"'' si se quiere señalar tradición, pero sin mayúsculas de enmascaramiento tipo small caps.'
  issues:
  - severity: medium
    issue: La nota al pie a introduce 'el SEÑOR de los ejércitos'
    rationale: Eso mezcla una alternativa tradicional con una convención de enmascaramiento del nombre divino que el proyecto español explícitamente evita en el texto principal. La nota debe expresar la alternativa tradicional de forma coherente con la política española.
  - severity: low
    issue: Capitalización de 'Ejércitos' en el título divino
    rationale: No es incorrecta, pero en español corriente de Biblia moderna 'Yahvé de los ejércitos' también sería plenamente natural. No requiere cambio forzoso si el proyecto capitaliza títulos divinos de este modo.
  revised_spanish_text: Y muchas naciones se unirán a Yahvé[a] en aquel día, y serán mi pueblo. Y habitaré en medio de ti[b], y sabrás que Yahvé de los Ejércitos me ha enviado a ti.
  revised_footnotes:
  - marker: a
    text: O, más tradicionalmente, 'Yahvé de los ejércitos'.
    reason: lexical_alternative
  - marker: b
    text: 'El hablante dice: ''Yahvé de los Ejércitos me ha enviado a ti''. El texto no identifica explícitamente quién es el ''me''; conviene preservar esa ambigüedad.'
    reason: alternative_reading
  revision_rationale: El texto principal es sustancialmente fiel y solo necesita una reparación menor en la nota léxica para mantener coherencia con la terminología del proyecto en español. También se pule la redacción de la nota b para mayor naturalidad en español.
