translation:
  language: es
  text: 'Si él es destruido[a] desde su lugar, entonces lo desconocerá[b], diciendo: «No te he visto».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «desde su sitio». El sufijo hebreo puede leerse con la imagen de la planta en vista, aunque el versículo también personifica la imagen en relación con el hombre malvado.
    reason: lexical_alternative
  - marker: b
    text: O «lo negará», «lo repudia» o «trata falsamente con él». El verbo hebreo puede expresar negación, repudio o desautorización.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Cuando
  lexicon: HALOT
  rationale: La cláusula es condicional en el hebreo y en la lectura inglesa de POB; «si» preserva mejor la hipótesis poética que una lectura temporal.
- source_word: יְבַלְּעֶנּוּ
  english_pob_choice: he is destroyed
  chosen_spanish: es destruido
  alternatives_spanish:
  - es tragado
  - es engullido
  - es consumido
  lexicon: HALOT
  rationale: El verbo בלע puede expresar ser tragado o consumido, pero la revisión inglesa optó por «destroyed» por naturalidad contextual. En español, «es destruido» conserva ese sentido sin perder la fuerza de ser absorbido o aniquilado por la imagen poética.
- source_word: מִמְּקוֹמוֹ
  english_pob_choice: from his place
  chosen_spanish: de su lugar
  alternatives_spanish:
  - de su sitio
  - desde su lugar
  - de su puesto
  lexicon: HALOT
  rationale: La forma posesiva masculina puede referirse al hombre representado o a la planta personificada. «De su lugar» mantiene esa ambigüedad auditada en la nota inglesa y suena natural en español.
- source_word: וְכִחֶשׁ בּוֹ
  english_pob_choice: then it will deny him
  chosen_spanish: entonces lo negará
  alternatives_spanish:
  - entonces lo repudiará
  - entonces lo desmentirá
  - entonces lo desconocerá
  lexicon: HALOT
  rationale: כחש puede significar negar, desmentir o disown. «Lo negará» conserva la personificación del lugar y la fuerza verbal sin cargar el texto con una equivalencia interpretativa excesiva.
- source_word: לֹא רְאִיתִיךָ
  english_pob_choice: I have not seen you
  chosen_spanish: No te he visto
  alternatives_spanish:
  - No te vi
  - Nunca te vi
  - No te conozco
  lexicon: HALOT
  rationale: La forma perfecta funciona como fórmula de negación directa. «No te he visto» reproduce bien la lectura inglesa y preserva la imagen concreta; «no te conozco» sería más interpretativa.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que cambió «swallowed up» por «destroyed» para dar una traducción más natural en contexto, manteniendo la personificación del lugar que niega al hombre y la cita directa final sin expansión.
  spanish_consistency_notes:
  - Se mantuvo «Dios»/«Yahvé» fuera del versículo porque no aparecen en este texto.
  - Se evitó «SEÑOR» y otra terminología no presente en la unidad textual.
  - La elección de «lo negará» conserva la personificación del sujeto inanimado, en paralelo con el audit trail inglés.
