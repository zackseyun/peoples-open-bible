    issue: Anclaje incorrecto de las notas al pie
    rationale: La nota cultural sobre los cuernos del altar está marcada en «diciendo[b]», pero debe ir donde se menciona la acción cultual. La nota léxica [a] aparece tras «Salomón» y otra vez al final, reutilizando el mismo marcador para un solo contenido, lo cual incumple la disciplina de salida.
  - severity: low
