translation:
  language: es
  text: 'Entonces se lavó el rostro, salió, se contuvo y dijo: «Sirvan la comida[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «pan»; aquí probablemente se usa en sentido más amplio para la comida o el alimento que se estaba sirviendo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּרְחַץ
  english_pob_choice: washed
  chosen_spanish: se lavó
  alternatives_spanish:
  - lavó
  - se enjuagó
  lexicon: HALOT
  rationale: El verbo רחץ denota lavar. En este contexto narrativo, con un gesto previo a volver a la mesa, «se lavó» transmite de forma natural la acción de limpiar su rostro sin sobrecargar el español.
- source_word: פָּנָיו
  english_pob_choice: his face
  chosen_spanish: el rostro
  alternatives_spanish:
  - su rostro
  - la cara
  lexicon: HALOT
  rationale: Aunque el hebreo usa la forma plural idiomática, en español la referencia a una sola persona se expresa de manera natural con un singular como «el rostro». Mantiene un tono digno y evita una literalidad extraña.
- source_word: וַיֵּצֵא
  english_pob_choice: came out
  chosen_spanish: salió
  alternatives_spanish:
  - salió de allí
  - volvió a salir
  lexicon: HALOT
  rationale: יצא significa salir. En español, «salió» es la forma más directa y natural; el contexto ya indica que sale de un espacio privado para regresar ante los demás.
- source_word: וַיִּתְאַפַּק
  english_pob_choice: controlled himself
  chosen_spanish: se contuvo
  alternatives_spanish:
  - se controló
  - se refrenó
  - se contuvo a sí mismo
  lexicon: HALOT
  rationale: El hitpael de אפק expresa autolimitación frente a una emoción intensa. «Se contuvo» conserva bien la fuerza de la acción y su carácter reflexivo sin sonar forzado en español.
- source_word: שִׂימוּ
  english_pob_choice: Serve
  chosen_spanish: Sirvan
  alternatives_spanish:
  - Pongan
  - Coloquen
  - Sírvanles
  lexicon: HALOT
  rationale: El hebreo dice literalmente «pongan/coloquen», pero en el contexto de una comida la orden idiomática en español es «Sirvan». Refleja correctamente la función pragmática del mandato.
- source_word: לָחֶם
  english_pob_choice: the food
  chosen_spanish: la comida
  alternatives_spanish:
  - el pan
  - el alimento
  - la mesa
  lexicon: HALOT
  rationale: לֶחֶם puede designar pan, alimento o comida. En esta escena de banquete, «la comida» reproduce la amplitud semántica sin restringirlo indebidamente a pan literal.
translation_notes:
  revision_awareness: 'Se mantuvo el sentido narrativo estable del texto base: lavado del rostro, salida, autocontrol y orden para servir la comida. No se aplicaron revisiones recientes; el pasaje presenta alto acuerdo con el contexto auditado.'
  spanish_consistency_notes:
  - Se evitó «SEÑOR» porque no aparece el Tetragrámaton en este versículo.
  - «Se contuvo» conserva la tensión emocional del hebreo mejor que una paráfrasis explicativa.
  - La nota sobre לָחֶם preserva la alternativa semántica documentada entre «pan» y «comida».
