translation:
  language: es
  text: Cuídate[a], hijo, de toda inmoralidad sexual, y primero toma esposa de la descendencia de tus padres. No tomes esposa extranjera, que no sea de la tribu de tu padre, porque somos hijos de los profetas[b]. Recuerda, hijo, a Noé, Abraham, Isaac y Jacob, nuestros padres desde antiguo, que todos ellos tomaron esposas de entre sus hermanos[c], y fueron bendecidos en sus hijos, y su descendencia heredará la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Guárdate». El griego expresa atención vigilante sobre uno mismo, con matiz de cuidado continuo de la propia conducta.'
    reason: alternative_reading
  - marker: b
    text: 'O: «descendientes de los profetas». El griego dice literalmente: «hijos de los profetas».'
    reason: alternative_reading
  - marker: c
    text: Es decir, de entre sus parientes cercanos o su clan, no necesariamente de sus hermanos literales.
    reason: lexical_alternative
lexical_decisions:
- source_word: πρόσεχε σεαυτῷ
  english_pob_choice: Guard yourself
  chosen_spanish: Cuídate
  alternatives_spanish:
  - Guárdate
  - Estate alerta
  lexicon: LSJ
  rationale: El griego expresa vigilancia reflexiva sobre la propia conducta. «Cuídate» conserva el llamado directo y natural en español moderno, con un matiz de auto-guardia que funciona bien en estilo bíblico sin sonar arcaico.
- source_word: παιδίον
  english_pob_choice: child
  chosen_spanish: hijo
  alternatives_spanish:
  - niño
  - hijo mío
  lexicon: LSJ
  rationale: Aunque el griego usa un diminutivo afectuoso, en este contexto Tobit habla a su propio hijo; «hijo» es el vocativo más claro y natural en español, y evita añadir «mío», que no está explícito.
- source_word: ἀπὸ πάσης πορνείας
  english_pob_choice: from all sexual immorality
  chosen_spanish: de toda inmoralidad sexual
  alternatives_spanish:
  - de toda fornicación
  - de toda impureza sexual
  lexicon: BDAG
  rationale: «Inmoralidad sexual» comunica el alcance amplio de πορνεία sin reducirlo a una sola práctica ni volverlo demasiado arcaico. Mantiene la fuerza moral del término en español contemporáneo.
- source_word: γυναῖκα πρῶτον λάβε
  english_pob_choice: first take a wife
  chosen_spanish: primero toma esposa
  alternatives_spanish:
  - toma esposa primero
  - cásate primero
  lexicon: LSJ
  rationale: La colocación de πρῶτον enfatiza prioridad. «Primero toma esposa» conserva ese orden y evita suavizar el verbo griego con una formulación más interpretativa.
- source_word: ἀπὸ τοῦ σπέρματος τῶν πατέρων σου
  english_pob_choice: from the offspring of your fathers
  chosen_spanish: de la descendencia de tus padres
  alternatives_spanish:
  - de la semilla de tus padres
  - de tu linaje ancestral
  lexicon: LSJ
  rationale: σπέρμα aquí significa descendencia o linaje. «Descendencia» preserva el sentido genealógico y suena natural en español, sin perder la referencia a la línea familiar de origen.
- source_word: γυναῖκα ἀλλοτρίαν
  english_pob_choice: a foreign woman
  chosen_spanish: mujer extranjera
  alternatives_spanish:
  - mujer ajena
  - mujer de fuera
  lexicon: LSJ
  rationale: En el contexto inmediato la extrañeza es de pertenencia tribal y familiar. «Mujer extranjera» comunica esa alteridad con claridad en español, aunque no deba leerse como una categoría política moderna estricta.
- source_word: φυλῆς τοῦ πατρός σου
  english_pob_choice: the tribe of your father
  chosen_spanish: la tribu de tu padre
  alternatives_spanish:
  - la tribu paterna
  - la tribu de tu linaje paterno
  lexicon: LSJ
  rationale: La frase remite a afiliación tribal paterna. «La tribu de tu padre» sigue de cerca el griego y resulta transparente para el lector en español.
- source_word: υἱοὶ προφητῶν ἐσμεν
  english_pob_choice: we are sons of the prophets
  chosen_spanish: somos hijos de los profetas
  alternatives_spanish:
  - somos descendientes de los profetas
  lexicon: LSJ
  rationale: Se mantiene la formulación literal y distintiva. «Hijos de los profetas» conserva la tensión del texto y su resonancia de identidad ancestral; el sentido más interpretativo queda en nota.
- source_word: ἀπὸ τοῦ αἰῶνος
  english_pob_choice: from of old
  chosen_spanish: desde antiguo
  alternatives_spanish:
  - desde tiempos antiguos
  - desde el principio
  lexicon: LSJ
  rationale: La expresión señala antigüedad remota respecto de los patriarcas. «Desde antiguo» es breve, elegante y fiel sin sonar excesivamente arcaico.
- source_word: ἐκ τῶν ἀδελφῶν αὐτῶν
  english_pob_choice: from among their brothers
  chosen_spanish: de entre sus hermanos
  alternatives_spanish:
  - de entre sus parientes
  - de entre su propio clan
  lexicon: LSJ
  rationale: El griego dice literalmente «hermanos», pero el contexto matrimonial apunta a parentesco cercano o clan. Se conserva la literalidad en el texto principal y se aclara en nota.
- source_word: εὐλογήθησαν ἐν τοῖς τέκνοις αὐτῶν
  english_pob_choice: they were blessed in their children
  chosen_spanish: fueron bendecidos en sus hijos
  alternatives_spanish:
  - fueron bendecidos por medio de sus hijos
  - fueron bendecidos con sus hijos
  lexicon: LSJ
  rationale: «En sus hijos» sigue de cerca ἐν y permite entender que la bendición se manifestó en la descendencia. «Fueron bendecidos» conserva el pasivo teológico del griego.
- source_word: κληρονομήσει γῆν
  english_pob_choice: will inherit the land
  chosen_spanish: heredará la tierra
  alternatives_spanish:
  - heredará la tierra prometida
  - poseerá la tierra como herencia
  lexicon: LSJ
  rationale: En este contexto ancestral, γῆ puede referirse a la tierra prometida o a la tierra heredada por el pueblo. «Heredará la tierra» mantiene el vínculo bíblico y es idiomático en español, sin especificar más de lo que el texto exige.
theological_decisions:
- issue: Sentido de «hijos de los profetas» en una instrucción sobre matrimonio
  english_pob_reading: Retain the literal phrase 'sons of the prophets' in the main text
  chosen_spanish_reading: Mantener «somos hijos de los profetas» en el texto principal
  alternative_spanish_readings:
  - somos descendientes de los profetas
  rationale: La expresión griega es inusual y merece permanecer visible. No se resuelve en el texto principal porque el dicho conserva una tensión identitaria que el lector debe percibir; el sentido explicativo se deja en nota.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve it
- issue: Lenguaje de parentesco en la exhortación matrimonial
  english_pob_reading: Keep 'brothers' in the main text with explanatory footnote
  chosen_spanish_reading: Conservar «hermanos» en el texto principal y aclararlo en nota
  alternative_spanish_readings:
  - parientes
  - consanguíneos
  rationale: El griego usa lenguaje de parentesco masculino. En contexto alude a casarse dentro del clan o del parentesco cercano, no necesariamente con hermanos literales. La traducción mantiene la forma del original y la nota protege el sentido contextual.
  doctrine_reference: DOCTRINE.md §4 Gender-accurate over gender-neutral
translation_notes:
  revision_awareness: La revisión más reciente indicó acuerdo alto y no introdujo cambios sustanciales; esta versión sigue de cerca el texto griego de Swete con las decisiones léxicas y teológicas ya auditadas en el inglés POB, adaptándolas a un español natural y publicable.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estándar del proyecto solo cuando aparezca el tetragrámaton; este versículo no lo contiene.
  - Se conserva «hijos de los profetas» como fórmula literal, con nota explicativa para el posible sentido de «descendientes».
  - «Hermanos» se mantiene por transparencia textual; la nota aclara el valor de clan/parentesco cercano.
  - «Heredará la tierra» evita decidir innecesariamente entre tierra prometida y tierra en sentido más amplio, aunque el contexto favorece una lectura hereditaria y ancestral.
