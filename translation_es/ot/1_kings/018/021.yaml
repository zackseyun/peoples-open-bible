base_translation:
  language: en
  yaml_path: translation/ot/1_kings/018/021.yaml
  text: Then Elijah came near to all the people and said[a], “How long will you keep limping between two opinions? If Yahweh is God, follow him; but if Baal, follow him.” But the people did not answer him a word.
  footnotes:
  - marker: a
    text: Or 'wobbling between two opinions.' The Hebrew more literally speaks of limping or hobbling 'upon/between two branches/forks,' a metaphor for divided loyalty.
    reason: lexical_alternative
