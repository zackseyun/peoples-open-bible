    rationale: El hebreo מִקָּטֹן וְעַד גָּדוֹל no necesariamente describe solo edad o sexo; señala totalidad sin excepción. En español, «desde pequeñas hasta grandes» sugiere solo mujeres jóvenes y adultas, no la fórmula inclusiva general.
  - severity: medium
    issue: La nota alternativa usa «viejos» en masculino
    rationale: La nota «desde jóvenes hasta viejos» no concuerda con el referente inmediato «las mujeres» y resulta infeliz en español. Si se mantiene una alternativa interpretativa por edad, debe formularse de manera inclusiva y natural.
  - severity: low
    issue: «sino que se las llevaron» repite parcialmente la idea previa
    rationale: No es incorrecto, pero tras «Se llevaron cautivas» puede sonar redundante. Una formulación como «las condujeron» o «se las llevaron consigo» distingue mejor entre capturar y conducir/alejar.
