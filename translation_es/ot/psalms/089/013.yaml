translation:
  language: es
  text: El norte y el sur[a]—tú los creaste; Tabor y Hermón cantan de gozo[b] en tu nombre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el norte y la derecha» o «el norte y el lado derecho». Aquí «derecha» probablemente es un modismo geográfico para «sur».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «gritan de alegría».'
    reason: lexical_alternative
lexical_decisions:
- source_word: צָפוֹן
  english_pob_choice: the north
  chosen_spanish: el norte
  alternatives_spanish:
  - Zafón
  lexicon: HALOT
  rationale: En este contexto poético, el término funciona como designación direccional de una región del mundo creado; por eso, como en la POB inglesa, se vierte con el sentido común de orientación espacial y no como nombre propio.
- source_word: יָמִין
  english_pob_choice: the south
  chosen_spanish: el sur
  alternatives_spanish:
  - la derecha
  - el lado derecho
  lexicon: HALOT
  rationale: La POB inglesa entiende aquí un merismo geográfico con צָפוֹן. En español, 'el sur' comunica naturalmente esa oposición espacial; las opciones literales conservan el valor básico de 'derecha', pero oscurecen el paralelismo.
- source_word: בְרָאתָם
  english_pob_choice: you created them
  chosen_spanish: tú los creaste
  alternatives_spanish:
  - tú los has creado
  lexicon: HALOT
  rationale: El perfecto qal 2ms con sufijo 3mp se expresa con pasado simple en español para mantener la afirmación poética directa de la acción creadora de Dios.
- source_word: תָּבוֹר
  english_pob_choice: Tabor
  chosen_spanish: Tabor
  alternatives_spanish:
  - el monte Tabor
  lexicon: HALOT
  rationale: Es un nombre propio de lugar; se conserva en transliteración, como en la POB inglesa.
- source_word: חֶרְמוֹן
  english_pob_choice: Hermon
  chosen_spanish: Hermón
  alternatives_spanish:
  - el monte Hermón
  lexicon: HALOT
  rationale: Es un nombre propio de lugar; en español se conserva la forma transliterada habitual con acento gráfico.
- source_word: בְּשִׁמְךָ
  english_pob_choice: in your name
  chosen_spanish: en tu nombre
  alternatives_spanish:
  - por tu nombre
  - a tu nombre
  lexicon: HALOT
  rationale: La preposición con 'nombre' puede implicar esfera, referencia o base; 'en tu nombre' es la formulación natural en español y preserva la idea de alabanza vinculada a la identidad revelada de Dios.
- source_word: יְרַנֵּנוּ
  english_pob_choice: sing for joy
  chosen_spanish: cantan con alegría
  alternatives_spanish:
  - cantan de alegría
  - gritan de alegría
  lexicon: HALOT
  rationale: El piel de רנן expresa júbilo sonoro. La POB inglesa opta por 'sing for joy'; en español, 'cantan con alegría' mantiene el valor de gozo expresivo y suena natural con la personificación poética de Tabor y Hermón.
theological_decisions:
- issue: Lectura de יָמִין junto a צָפוֹן
  english_pob_reading: 'directional merism: ''the north and the south'''
  chosen_spanish_reading: 'merismo direccional: ''el norte y el sur'''
  alternative_spanish_readings:
  - '''el norte y la derecha'''
  - '''el norte y el lado derecho'''
  rationale: La combinación funciona como una expresión de la amplitud de la creación. Traducir יָמִין como 'sur' conserva el paralelismo y evita una literalidad que en español resultaría oscura o extraña.
  doctrine_reference: Translation philosophy §1, §5
- issue: Personificación de Tabor y Hermón
  english_pob_reading: the mountains are poetically personified as singing for joy
  chosen_spanish_reading: los montes son personificados poéticamente como cantando con alegría
  alternative_spanish_readings:
  - sus habitantes cantan con alegría
  rationale: El hebreo admite una lectura poética en la que los montes mismos alaban. La traducción preserva esa personificación en lugar de explicarla como una referencia a sus habitantes.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: No se aplicaron revisiones posteriores; el último pase indicó que no había cambios necesarios y el cotejo final mostró alta concordancia.
  spanish_consistency_notes:
  - 'Se conserva el tratamiento reverente de la segunda persona singular para Dios: ''tú'', ''tu''.'
  - 'Se mantiene la transliteración de nombres propios de montes: Tabor y Hermón.'
  - Se evita 'SEÑOR' como sustituto de Yahvé porque este versículo no contiene el Tetragrámaton; la referencia es a Dios en segunda persona.
