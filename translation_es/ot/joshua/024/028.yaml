    issue: La nota [a] está anclada en el lugar incorrecto.
    rationale: La nota trata sobre אִישׁ (‘cada hombre / cada uno’), pero en el borrador está colocada después de ‘pueblo’. Las notas deben anclarse exactamente en la palabra o frase relevante del texto.
  - severity: low
    issue: ‘Entonces’ añade una conexión discursiva no explícita en el hebreo.
    rationale: El verbo con vav consecutiva puede traducirse simplemente en español narrativo sin ‘Entonces’. No es un error grave, pero omitirlo produce una línea más ceñida al original.
  revised_spanish_text: Josué despidió al pueblo, cada hombre[a] a su heredad.
