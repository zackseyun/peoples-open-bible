translation:
  language: es
  text: Entonces pasó al hombro[b] opuesto al Arabá[a], al norte, y descendió al Arabá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la llanura» para «Arabá»; el término hebreo puede funcionar como designación geográfica regional y también como sustantivo común topográfico.
    reason: lexical_alternative
  - marker: b
    text: Hebreo «hombro», metáfora topográfica para un lado, cresta o ladera.
    reason: cultural_note
lexical_decisions:
- source_word: וְעָבַר
  english_pob_choice: Then it passed on
  chosen_spanish: Entonces pasará
  alternatives_spanish:
  - y pasará
  - entonces pasará adelante
  lexicon: HALOT
  rationale: En descripciones de límites, עבר expresa la continuación del lindero de un punto a otro. «Pasará» mantiene el movimiento del borde; «entonces» reproduce el valor secuencial de la cláusula.
- source_word: כֶּתֶף
  english_pob_choice: the shoulder
  chosen_spanish: el hombro
  alternatives_spanish:
  - la ladera
  - el costado
  lexicon: HALOT
  rationale: La imagen topográfica literal es «hombro». Se conserva para mantener la metáfora concreta del hebreo, tal como la POB en inglés conservó «shoulder».
- source_word: מוּל
  english_pob_choice: opposite
  chosen_spanish: opuesto
  alternatives_spanish:
  - enfrente de
  - frente a
  lexicon: HALOT
  rationale: «Opuesto» expresa bien la relación espacial entre el hombro y el Arabá, con un registro natural en español geográfico.
- source_word: הָעֲרָבָה
  english_pob_choice: the Arabah
  chosen_spanish: el Arabá
  alternatives_spanish:
  - la llanura
  - el valle del Jordán
  lexicon: HALOT
  rationale: Se preserva el nombre/topónimo tradicional «Arabá» para no perder el valor regional del término. La opción «llanura» quedará como alternativa implícita en nota.
- source_word: צָפֹנָה
  english_pob_choice: on the north
  chosen_spanish: al norte
  alternatives_spanish:
  - hacia el norte
  - en el lado norte
  lexicon: HALOT
  rationale: El sufijo direccional señala orientación septentrional; «al norte» es natural y evita sugerir movimiento adicional más allá del marco topográfico.
- source_word: וְיָרַד
  english_pob_choice: and went down
  chosen_spanish: y descenderá
  alternatives_spanish:
  - y bajará
  - y irá descendiendo
  lexicon: HALOT
  rationale: ירד es el verbo estándar para bajar en terreno. «Descenderá» conserva la imagen espacial con dignidad, sin perder claridad.
- source_word: הָעֲרָבָתָה
  english_pob_choice: to the Arabah
  chosen_spanish: al Arabá
  alternatives_spanish:
  - hacia el Arabá
  - al valle Arabá
  lexicon: HALOT
  rationale: La he direccional expresa movimiento hacia el Arabá; en español se rinde con «al Arabá». Se mantiene la misma designación regional que en la primera mención.
translation_notes:
  revision_awareness: La revisión inglesa más reciente indicó que no hacía falta ningún cambio y mantuvo la solución de alta concordancia; por eso la versión española conserva la misma estructura sintáctica y la misma distinción entre el nombre regional Arabá y la metáfora topográfica «hombro».
  spanish_consistency_notes:
  - Se preservó la metáfora topográfica de כֶּתֶף como «hombro», en paralelo con la POB inglesa.
  - Se mantuvo «Arabá» como topónimo/región y no se sustituyó por «llanura» en el cuerpo del texto.
  - La secuencia verbal se ajustó al español bíblico moderno sin introducir contenido no atestiguado.
