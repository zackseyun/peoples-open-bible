translation:
  language: es
  text: Miren[a], por favor, tengo dos hijas que no han conocido varón. Por favor, déjenme sacarlas ante ustedes, y hagan con ellas como bien les parezca. Solo a estos hombres no les hagan nada, porque han venido bajo la sombra de mi techo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más explícita: «que no han tenido relaciones con un hombre»; tradicionalmente, «que son vírgenes».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «bajo la sombra de mi techo», un modismo de protección debida a los huéspedes que han entrado en la casa.'
    reason: cultural_note
lexical_decisions:
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira, pues
  - Mira aquí
  - Observa
  lexicon: HALOT
  rationale: El hebreo introduce atención inmediata. «Mira» conserva ese llamado deíctico con naturalidad en español moderno, mejor que un arcaísmo como «He aquí».
- source_word: נָא
  english_pob_choice: please
  chosen_spanish: te ruego
  alternatives_spanish:
  - por favor
  - te pido
  - ruego
  lexicon: HALOT
  rationale: La partícula expresa súplica y cortesía en un contexto urgente. «Te ruego» transmite mejor el tono rogado y solemne que un simple «por favor».
- source_word: שְׁתֵּי בָנוֹת
  english_pob_choice: two daughters
  chosen_spanish: dos hijas
  alternatives_spanish:
  - dos hijas mías
  lexicon: HALOT
  rationale: Correspondencia directa y clara del sintagma nominal.
- source_word: אֲשֶׁר לֹא יָדְעוּ אִישׁ
  english_pob_choice: who have not known a man
  chosen_spanish: que no han conocido varón
  alternatives_spanish:
  - que no han tenido relaciones con un hombre
  - que son vírgenes
  lexicon: HALOT
  rationale: Se conserva el giro hebreo «conocer varón», comprensible en español y menos interpretativo que explicitar relaciones sexuales o traducir por «vírgenes».
- source_word: אוֹצִיאָה נָּא אֶתְהֶן אֲלֵיכֶם
  english_pob_choice: Please let me bring them out to you
  chosen_spanish: Te las sacaré ahora
  alternatives_spanish:
  - Permíteme sacarlas hacia ustedes
  - Déjame sacarlas
  lexicon: HALOT
  rationale: El cohortativo expresa intención/volición. «Te las sacaré» reproduce la oferta con naturalidad; «ahora» ayuda a reflejar la urgencia de נָא en esta cláusula.
- source_word: וַעֲשׂוּ לָהֶן כַּטּוֹב בְּעֵינֵיכֶם
  english_pob_choice: and do to them as is good in your eyes
  chosen_spanish: y haced con ellas como bien os parezca
  alternatives_spanish:
  - y tratadlas como mejor os parezca
  - y haced con ellas lo que os parezca bien
  lexicon: HALOT
  rationale: Se mantiene el modismo hebreo «como bien os parezca» para conservar la crudeza y la transparencia de la expresión, sin suavizarla más de lo que el texto permite.
- source_word: רַק
  english_pob_choice: Only
  chosen_spanish: Solo[b]
  alternatives_spanish:
  - Pero solo
  - Solamente
  lexicon: HALOT
  rationale: «Solo» refleja la restricción/excepto que introduce רַק. Se marca con nota porque en español puede sonar menos contrastivo que en hebreo y conviene explicar la fuerza limitativa.
- source_word: לָאֲנָשִׁים הָאֵל
  english_pob_choice: to these men
  chosen_spanish: a estos hombres
  alternatives_spanish:
  - a estos varones
  - a estos hombres mismos
  lexicon: HALOT
  rationale: «Hombres» reproduce el referente masculino explícito de אֲנָשִׁים en el contexto de los visitantes.
- source_word: אַל תַּעֲשׂוּ דָבָר
  english_pob_choice: do nothing
  chosen_spanish: no les hagáis nada
  alternatives_spanish:
  - no hagan nada
  - no les hagan cosa alguna
  lexicon: HALOT
  rationale: El hebreo usa una prohibición absoluta con «cosa/del asunto». En español, «no les hagáis nada» expresa con naturalidad la totalidad de la prohibición.
- source_word: כִּי עַל כֵּן בָּאוּ
  english_pob_choice: for they have come
  chosen_spanish: porque para eso han venido
  alternatives_spanish:
  - porque por eso han venido
  - pues han venido para esto
  lexicon: HALOT
  rationale: 'Se conserva el valor causal de עַל כֵּן. «Para eso» comunica el motivo relevante desde la perspectiva de Lot: su llegada al amparo de su casa.'
- source_word: בְּצֵל קֹרָתִי
  english_pob_choice: under the shadow of my roof
  chosen_spanish: bajo la sombra de mi techo
  alternatives_spanish:
  - bajo mi techo
  - a la sombra de mi techo
  - bajo la protección de mi techo
  lexicon: HALOT
  rationale: Se preserva la imagen idiomática de sombra/protección y la referencia concreta al techo/cubierta de la casa. «Techo» es una forma natural de comunicar la imagen sin eliminar su trasfondo hospitalario.
theological_decisions:
- issue: Cómo presentar la oferta moralmente perturbadora de Lot sin suavizarla indebidamente
  english_pob_reading: Retain the plain force of the Hebrew without euphemistic mitigation
  chosen_spanish_reading: Conservar el impacto directo del ofrecimiento de Lot, sin eufemismos que lo atenúen
  alternative_spanish_readings:
  - Suavizar la frase con una formulación más general
  - Reformular para evitar la crudeza del intercambio
  rationale: El texto expone el ofrecimiento de manera frontal; la traducción no debe moralizarlo ni embellecerlo. Se mantiene la dureza del contenido y la restricción final, como lo hace el POB en inglés.
  doctrine_reference: 'Translation philosophy: original-language primacy; no paraphrase beyond what the source warrants.'
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del POB en inglés, que restauró «Only» para reflejar רַק con mayor precisión. En español se eligió «Solo» como equivalente directo y se mantuvo la limitación contrastiva; también se conservó la imagen idiomática de «under the shadow of my roof» mediante «bajo la sombra de mi techo».
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo exige; en este versículo no aparece.
  - Se mantiene «varón» en la nota como alternativa más explícita para el sentido sexual de יָדַע, pero en el texto principal se prefiere «varón» para conservar el modismo hebreo.
  - Se evita «siervo» u otras suavizaciones; el registro conserva la aspereza narrativa del pasaje.
  - La puntuación y el orden de miembros siguen el flujo del hebreo y la revisión inglesa, con adaptación natural al español.
