    rationale: 'La nota dice ''O "los israelitas" o "los hijos de Israel". Hebreo: "los hijos de Israel".'' pero la primera alternativa ya coincide con el texto principal; debe presentar la alternativa real distinta del texto y mantener la aclaración del hebreo.'
  revised_spanish_text: Porque los hijos de Israel son mis siervos[a]; ellos son mis siervos, a quienes saqué de la tierra de Egipto. Yo soy Yahvé, vuestro Dios.
  revised_footnotes:
