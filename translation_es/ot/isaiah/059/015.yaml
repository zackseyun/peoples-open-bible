base_translation:
  language: en
  yaml_path: translation/ot/isaiah/059/015.yaml
  text: So truth was lacking[a], and whoever turned away from evil was despoiled. Yahweh saw[b], and it was evil in his eyes that there was no justice.
  footnotes:
