revisions:
- from: Tú visitas la tierra y la riegas[a]; la enriqueces grandemente. El río de Dios está lleno de agua; preparas su grano[b], porque así preparas la tierra.
  to: Tú visitas la tierra y la riegas[a]; la enriqueces grandemente. El río de Dios está lleno de agua; preparas el grano de ellos[b], porque así preparas la tierra.
  rationale: Se mantiene la traducción base, pero se corrige «su grano» a «el grano de ellos» para preservar en español la diferencia gramatical y semántica entre el sufijo plural masculino de דְּגָנָם y la referencia singular femenina a «la tierra». También se ajustan las notas para evitar una alternativa impropia («lo riegas») y para reflejar mejor las alternativas léxicas auditadas.
