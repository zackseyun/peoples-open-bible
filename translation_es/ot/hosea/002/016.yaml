translation:
  language: es
  text: Por tanto[a], he aquí, yo la atraeré y la llevaré al desierto, y hablaré a su corazón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''le hablaré tiernamente''. Literalmente, ''hablaré a su corazón''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Así que
  - Por eso
  lexicon: HALOT
  rationale: Expresa con naturalidad la consecuencia marcada por el hebreo y conserva el giro discursivo profético de transición desde juicio hacia restauración.
- source_word: הִנֵּה
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - mira
  - he aquí
  lexicon: HALOT
  rationale: Mantiene el gesto deíctico y enfático del hebreo; en español bíblico y eclesial sigue siendo claro y solemne.
- source_word: אָנֹכִי
  english_pob_choice: I
  chosen_spanish: yo
  alternatives_spanish:
  - yo mismo
  lexicon: HALOT
  rationale: El pronombre independiente añade énfasis al sujeto divino; en español basta con 'yo' en este contexto, reforzado por la posición explícita.
- source_word: מְפַתֶּיהָ
  english_pob_choice: I will allure her
  chosen_spanish: la seduciré
  alternatives_spanish:
  - la persuadiré
  - la atraeré
  - la cortejaré
  lexicon: HALOT
  rationale: El campo semántico de פתה aquí es persuasivo y relacional dentro de la metáfora matrimonial. 'Seduciré' comunica la fuerza de atracción y persuasión; se evita suavizarlo demasiado con 'atraeré' y se evita 'cortejaré', que estrecha el matiz metafórico.
- source_word: וְהֹלַכְתִּיהָ
  english_pob_choice: I will bring her
  chosen_spanish: la llevaré
  alternatives_spanish:
  - la traeré
  - la conduciré
  - la guiaré
  lexicon: HALOT
  rationale: El causativo de הלך pide una acción dirigida de hacer ir/llevar. 'Llevaré' es idiomático y fiel; 'conduciré' o 'guiaré' añaden matices que el contexto no exige, y 'traeré' podría sonar menos preciso respecto del movimiento hacia el desierto.
- source_word: הַמִּדְבָּר
  english_pob_choice: the wilderness
  chosen_spanish: el desierto
  alternatives_spanish:
  - el yermo
  - el desierto
  lexicon: HALOT
  rationale: En español, 'desierto' es la opción más natural y comprensible para el lugar de prueba y encuentro divino. 'Wilderness' en inglés no debe forzarse como calco; aquí el texto apunta al espacio desolado, no a una categoría técnica que requiera 'yermo'.
- source_word: וְדִבַּרְתִּי
  english_pob_choice: and speak
  chosen_spanish: y hablaré
  alternatives_spanish:
  - y le hablaré
  - y hablaré
  lexicon: HALOT
  rationale: El hebreo expresa una acción futura coordinada; 'hablaré' conserva la secuencia natural en español. El sujeto ya está claro por el contexto, así que no es necesario repetir 'le' antes del complemento siguiente.
- source_word: עַל לִבָּהּ
  english_pob_choice: to her heart
  chosen_spanish: a su corazón
  alternatives_spanish:
  - a su corazón
  - sobre su corazón
  - a lo más profundo de su ser
  lexicon: HALOT
  rationale: Se preserva el hebraísmo de hablar al corazón, que en español se entiende con claridad como habla íntima, persuasiva y consoladora. 'A su corazón' es más transparente que 'tiernamente', que ya interpreta el efecto.
theological_decisions:
- issue: El valor de פתה en la metáfora matrimonial de restauración
  english_pob_reading: allure her
  chosen_spanish_reading: la seduciré
  alternative_spanish_readings:
  - la persuadiré
  - la atraeré
  - la cortejaré
  rationale: El contexto no describe tentación moral sino una iniciativa divina de reconciliación después del juicio. 'Seduciré' conserva la fuerza de atracción personal y el tono relacional sin borrar la tensión semántica del verbo; se evita domesticarlo demasiado con un equivalente genérico.
  doctrine_reference: Translation philosophy §3, §6
- issue: La expresión 'hablaré a su corazón' como hebraísmo de consuelo y persuasión
  english_pob_reading: speak to her heart
  chosen_spanish_reading: hablaré a su corazón
  alternative_spanish_readings:
  - hablaré tiernamente con ella
  - le hablaré al corazón
  rationale: Se mantiene el giro figurado porque forma parte del modo profético de expresar restauración íntima. Traducirlo por un adverbio ('tiernamente') explicaría demasiado y ocultaría la metáfora original.
  doctrine_reference: Translation philosophy §2, §5
translation_notes:
  revision_awareness: 'Se siguió el estado revisado más reciente del audit trail inglés: se prefirió una formulación directa para el verbo principal, se mantuvo la secuencia futura coordinada y se conservó la nota sobre el hebraísmo final. En español se ajustó el movimiento verbal para que ''la llevaré al desierto'' refleje con naturalidad el causativo hebreo y la puntuación conserve el ritmo profético.'
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se optó por 'desierto' en vez de 'wilderness' o 'yermo' por claridad y porque el pasaje usa el lugar como espacio teológico de encuentro.
  - Se conservó el paralelismo de futuro con 'seduciré / llevaré / hablaré' para reflejar la secuencia verbal del hebreo.
