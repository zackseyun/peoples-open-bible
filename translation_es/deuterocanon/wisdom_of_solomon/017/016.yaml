translation:
  language: es
  text: Entonces, quienquiera que estuviera allí, cuando cayó, fue puesto bajo guardia, encerrado en aquella prisión sin hierro[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Literalmente, ''la prisión sin hierro'': una imagen de confinamiento sin cadenas ni barrotes físicos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἶθʼ οὕτως
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Y entonces
  - Luego
  - Así que
  lexicon: LSJ
  rationale: Marca la progresión narrativa con una transición natural en español, sin añadir matiz causal fuerte ni una reescritura interpretativa.
- source_word: ὃς δὴ ποτʼ οὖν ἦν ἐκεῖ
  english_pob_choice: whoever it might have been there
  chosen_spanish: quienquiera que estuviera allí
  alternatives_spanish:
  - quienquiera que hubiera estado allí
  - cualquiera que estuviera allí
  - quien sea que estuviera allí
  lexicon: LSJ
  rationale: Conserva la indefinición enfática del griego y evita identificar al sujeto. El imperfecto subjuntivo mantiene la referencia general y el tono narrativo.
- source_word: καταπίπτων
  english_pob_choice: when he fell down
  chosen_spanish: cuando cayó
  alternatives_spanish:
  - al caer
  - cuando se desplomó
  - habiendo caído
  lexicon: LSJ
  rationale: Expresa el participio circunstancial con un español claro y concreto. 'Cayó' conserva la imagen de caída sin ampliar el sentido a 'desplomó'.
- source_word: ἐφρουρεῖτο
  english_pob_choice: was kept under guard
  chosen_spanish: quedó bajo guardia
  alternatives_spanish:
  - fue guardado
  - fue custodiado
  - estaba bajo guardia
  lexicon: LSJ
  rationale: Mantiene la idea de custodia/guarda. 'Quedó bajo guardia' refleja el estado resultante de quedar vigilado, de forma natural en español.
- source_word: εἰς τὴν ἀσίδηρον εἱρκτήν
  english_pob_choice: that ironless prison
  chosen_spanish: aquella prisión sin hierro
  alternatives_spanish:
  - aquella cárcel sin hierro
  - la prisión carente de hierro
  - aquella prisión sin barras de hierro
  lexicon: LSJ
  rationale: Preserva la metáfora de ἀσίδηρον como 'sin hierro' sin forzar una interpretación más específica de cadenas o barrotes. 'Aquella' responde al demostrativo del contexto narrativo.
- source_word: κατακλεισθείς
  english_pob_choice: shut up
  chosen_spanish: encerrado
  alternatives_spanish:
  - cerrado dentro
  - aprisionado
  - metido
  lexicon: LSJ
  rationale: Recoge la intensificación del encierro de modo idiomático y sobrio. 'Encerrado' comunica la clausura sin un coloquialismo excesivo.
theological_decisions:
- issue: Género y singularidad del sujeto indefinido
  english_pob_reading: he
  chosen_spanish_reading: quienquiera que estuviera allí
  alternative_spanish_readings:
  - quienquiera que estuviera allí, él
  - él, quienquiera que estuviera allí
  - quienquiera que estuviese allí
  rationale: El griego usa una forma masculina singular indefinida, pero en español resulta más natural y fiel al indefinido mantener 'quienquiera que' sin introducir un pronombre explícito. Así se conserva la singularidad sin sobrecargar el texto.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Imagen de 'prisión sin hierro'
  english_pob_reading: ironless prison
  chosen_spanish_reading: prisión sin hierro
  alternative_spanish_readings:
  - prisión sin barras de hierro
  - prisión carente de hierro
  - cárcel sin hierro
  rationale: La expresión griega es metafórica y literal a la vez; el español debe preservar esa tensión sin explicarla del todo en el cuerpo del texto. La nota aclara la imagen de confinamiento sin cadenas o barrotes físicos.
  doctrine_reference: Audit trail lexical note on ἀσίδηρον εἱρκτήν
translation_notes:
  revision_awareness: La versión inglesa revisó 'that prison without iron' a 'that ironless prison' para ganar naturalidad sin perder la metáfora. La redacción española sigue esa misma decisión, pero la vierte como 'aquella prisión sin hierro' para conservar la transparencia lexical y la legibilidad.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' solo cuando aparece el nombre divino; aquí no aplica.
  - Se evita 'cárcel' en el texto principal para conservar el tono más neutro de 'prisión', acorde con la metáfora del griego.
  - '''Quienquiera que'' preserva la indefinición del original sin masculinizar innecesariamente el español.'
  - La nota al pie usa una glosa literal breve para reflejar la observación del audit trail en inglés.
