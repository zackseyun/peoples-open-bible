translation:
  language: es
  text: Bendecirás a los justos, y no los llamas a cuentas por las cosas en que pecaron; y tu bondad es hacia los que pecan en arrepentimiento[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse «con arrepentimiento»; el sustantivo griego también puede llevar el sentido de remordimiento o pesar.
    reason: lexical_alternative
lexical_decisions:
- source_word: δικαίους
  english_pob_choice: the righteous
  chosen_spanish: los justos
  alternatives_spanish:
  - los rectos
  - los rectos de corazón
  - los justos (como personas justas)
  lexicon: BDAG
  rationale: El adjetivo funciona sustantivado. En español, 'los justos' conserva el valor moral y comunitario del término sin volverlo técnico o eclesiástico en exceso.
- source_word: εὐλογήσεις
  english_pob_choice: you will bless
  chosen_spanish: bendecirás
  alternatives_spanish:
  - tú bendecirás
  - has de bendecir
  - bendices
  lexicon: BDAG
  rationale: El futuro griego se preserva con el futuro español. 'Bendecirás' mantiene el tono de promesa/divina acción covenantal mejor que 'favorecerás'.
- source_word: οὐκ εὐθύνεις
  english_pob_choice: you do not call them to account
  chosen_spanish: no los llamarás a cuentas
  alternatives_spanish:
  - no los llamarás a cuenta
  - no los harás rendir cuentas
  - no los pedirás cuenta
  lexicon: BDAG
  rationale: '''εὐθύνω'' aquí expresa rendir cuenta o ser requerido por culpa, no ''enderezar''. ''Llamar a cuentas'' conserva la fuerza judicial en un español natural. Aunque el inglés auditado pasó a presente por una decisión gramatical, en español se mantiene la secuencia futura del hemistiquio y la afirmación gnómica del trato de Dios.'
- source_word: περὶ ὧν ἥμαρτοσαν
  english_pob_choice: for the things in which they sinned
  chosen_spanish: por las cosas en que pecaron
  alternatives_spanish:
  - por aquello en que pecaron
  - por lo que pecaron
  - por las cosas en las que pecaron
  lexicon: BDAG
  rationale: La construcción indica el ámbito o materia del pecado. 'Por las cosas en que pecaron' sigue de cerca la estructura griega y suena idiomático en español.
- source_word: χρηστότης
  english_pob_choice: goodness
  chosen_spanish: bondad
  alternatives_spanish:
  - bondad
  - amabilidad
  - benignidad
  lexicon: BDAG
  rationale: '''Bondad'' transmite la cualidad moral y benefactora de χρηστότης. En español resulta más natural que ''bondad'' aplicada a Dios que ''amabilidad'', sin perder la fuerza relacional.'
- source_word: ἁμαρτάνοντας
  english_pob_choice: those who sin
  chosen_spanish: los que pecan
  alternatives_spanish:
  - los que están pecando
  - pecadores
  - los que cometen pecado
  lexicon: BDAG
  rationale: El participio se vierte verbalmente para no convertirlo en una etiqueta estática. 'Los que pecan' conserva la acción y encaja con el participio sustantivado.
- source_word: ἐν μεταμελείᾳ
  english_pob_choice: in repentance
  chosen_spanish: en arrepentimiento
  alternatives_spanish:
  - con arrepentimiento
  - en remordimiento
  - con arrepentimiento y dolor
  lexicon: BDAG
  rationale: '''Μετάμελεια'' puede incluir pesar, remordimiento o cambio de actitud. ''En arrepentimiento'' es la forma más comprensible y fiel en español; el matiz afectivo se preserva en la nota.'
theological_decisions:
- issue: Relación entre justicia humana, pecado pasado y la bondad divina
  english_pob_reading: God blesses the righteous and does not call them to account for past sins; his goodness is toward those who sin in repentance.
  chosen_spanish_reading: Dios bendice a los justos, no los llama a cuentas por pecados ya cometidos, y su bondad se dirige a los que pecan en arrepentimiento.
  alternative_spanish_readings:
  - Dios bendice a los justos y no los acusa por sus pecados anteriores
  - Dios bendice a los justos y no los juzga por lo que pecaron
  rationale: 'La cláusula mantiene la tensión entre justicia y misericordia: no niega el pecado, sino que afirma que Dios no lo exige como cuenta judicial contra quienes se vuelven a él. ''En arrepentimiento'' conserva que el texto no describe licencia para pecar, sino una condición de retorno/contrición.'
  doctrine_reference: misericordia divina y arrepentimiento; cf. Sal 103:10-12; Prov 28:13
- issue: Valor aspectual de la segunda cláusula
  english_pob_reading: you do not call them to account
  chosen_spanish_reading: no los llamarás a cuentas
  alternative_spanish_readings:
  - no los llamas a cuentas
  - no los llamarás a cuenta
  rationale: Aunque el inglés auditado optó por presente por una revisión gramatical, el español puede reflejar sin problema el futuro del paralelismo y la afirmación proverbial. No se pierde la idea de trato habitual de Dios con los justos perdonados.
  doctrine_reference: uso poético/proverbial del futuro; paralelismo hebraizante
translation_notes:
  revision_awareness: 'El auditable inglés muestra una revisión importante en la segunda cláusula: se corrigió la forma verbal de un futuro a un presente/gnómico por la acentuación griega de εὐθύνεις. Para el español se decidió conservar el futuro de εὐλογήσεις y expresarlo de modo natural en la segunda cláusula con un futuro también aceptable en estilo proverbial, sin borrar el carácter habitual/gnómico del enunciado. Además, la última cláusula del inglés fue ajustada para evitar la ambigüedad de ''those who sin in repentance''; la traducción española mantiene esa distinción con la nota c.'
  spanish_consistency_notes:
  - Se mantuvo 'justos' como sustantivo y no 'rectos', por mayor naturalidad y cercanía al campo semántico documentado.
  - '''Bondad'' se usa para χρηστότης siguiendo la preferencia auditada; no se sustituyó por ''amabilidad'' para no debilitar el tono moral.'
  - '''Arrepentimiento'' se conserva como traducción principal de μετάμελεια, con nota para el posible matiz de remordimiento.'
  - Se evitó 'SEÑOR' y se tradujo literalmente según el griego, sin necesidad de un nombre divino explícito en este versículo.
