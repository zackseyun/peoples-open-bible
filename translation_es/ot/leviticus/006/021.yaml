review_pass:
  verdict: revise
  source_alignment_summary: El borrador sigue bien la estructura del hebreo y conserva la distinción entre vasija de barro y vasija de bronce, así como la instrucción de romper una y limpiar la otra. Sin embargo, la decisión para תְּבֻשַּׁל / בֻּשָּׁלָה como «se haya cocido / se ha cocido» debilita la precisión de בשׁל en este contexto, donde la evidencia y la auditoría inglesa favorecen específicamente «hervir» o una formulación equivalente a «ser hervido».
  spanish_quality_summary: El español es claro y natural, pero mezcla tiempos compuestos («se haya cocido / se ha cocido») que suenan menos directos en una ley ritual. También «restregada» funciona, pero «fregada a fondo» o «raspada/estregada» sería más idiomático según región; aun así no es un problema grave. La reparación principal es hacer más precisa y sobria la referencia al hervor.
  glossary_alignment: No hay términos del glosario mayor implicados salvo la consistencia léxica con la POB inglesa. «Vasija de barro», «vasija de bronce[a]» y la nota sobre «cobre» están bien alineadas. La mayor desalineación está en traducir בשׁל como «cocer» en vez de reflejar el valor más específico «hervir».
  issues:
  - severity: medium
    issue: תְּבֻשַּׁל / בֻּשָּׁלָה se tradujo como «se haya cocido / se ha cocido».
    rationale: La auditoría inglesa documenta que בשׁל aquí es más preciso como «is boiled» en este contexto sacrificial. «Cocer» es más amplio y puede perder el matiz específico de hervir que subyace al contraste ritual.
  - severity: low
    issue: El uso de tiempos compuestos («se haya cocido / se ha cocido») suena menos normativo y menos directo que una formulación simple.
    rationale: En español legal/ritual, «en la que sea hervida» / «si es hervida» o una pasiva refleja equivalente comunica mejor la instrucción general sin sugerir un evento ya completado.
  - severity: low
    issue: La justificación léxica de כְלִי נְחֹשֶׁת contiene una frase defectuosa.
    rationale: Dice «evita el “bronce” tradicional», cuando precisamente la elección es «bronce». Esto no afecta el texto bíblico, pero muestra una inconsistencia en la nota de decisión.
  revised_spanish_text: Y una vasija de barro en la que sea hervida será quebrada; pero si es hervida en una vasija de bronce[a], esta será fregada a fondo y enjuagada con agua.
  revised_footnotes:
  - marker: a
    text: O «vasija de cobre». El hebreo נְחֹשֶׁת puede referirse a cobre o bronce según el contexto.
    reason: lexical_alternative
  revision_rationale: Se revisa principalmente בשׁל para reflejar con mayor precisión el sentido de «hervir» documentado en la auditoría inglesa y en el contexto sacrificial. También se simplifica la sintaxis hacia una formulación normativa más natural en español. Se conserva la nota léxica sobre «bronce/cobre» porque está bien fundada y correctamente anclada.
