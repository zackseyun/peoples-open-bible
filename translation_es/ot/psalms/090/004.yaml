review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien la comparación central del hebreo: mil años desde la perspectiva divina son como algo brevísimo. Sin embargo, no sigue del todo la decisión auditada del POB en dos puntos significativos: (1) וְאַשְׁמוּרָה fue documentado como una segunda comparación alternativa (''or like a watch''), no meramente aditiva; y (2) la nota cultural sobre ''watch'' se perdió, aunque en español ''vigilia'' puede resultar ambigua como estado de desvelo más que como turno/guardia nocturna. Además, ''el día de ayer, cuando ha pasado'' suena algo forzado en español; una formulación más idiomática puede conservar el sentido de pasado consumado.'
  spanish_quality_summary: 'El texto es comprensible y digno, pero tiene cierta rigidez: ''el día de ayer'' y ''cuando ha pasado'' juntos resultan poco naturales, y ''vigilia'' no es la opción más clara para una división de la noche. Para español bíblico general, ''como ayer, cuando ya pasó'' o ''como el ayer cuando ya pasó'' fluye mejor; y ''una guardia en la noche'' o ''una vigilia de la noche'' con nota aclara el referente. También conviene reflejar la estructura comparativa con ''o como''.'
  glossary_alignment: 'No hay términos del glosario mayor en juego (Yahvé, Mesías, etc.). Sí hay una cuestión de consistencia metodológica: el inglés POB preservó la noción cultural de ''watch'' como división nocturna, y el español debería mantenerla con una expresión menos ambigua o con nota explicativa.'
  issues:
  - severity: medium
    issue: Uso de 'y como' en lugar de 'o como'
    rationale: La decisión inglesa auditada entendió וְ como continuación de una segunda imagen comparativa mejor expresada con 'or like'. En español, 'o como' preserva mejor esa estructura y evita sugerir simple acumulación aditiva.
  - severity: medium
    issue: '''Vigilia'' es potencialmente ambigua'
    rationale: En español común, 'vigilia' puede entenderse como estado de estar despierto o práctica devocional/ayuno, no necesariamente como turno de guardia nocturna. El hebreo אַשְׁמוּרָה refiere una división de la noche para guardar; 'guardia' o una nota cultural lo aclara mejor.
  - severity: low
    issue: '''como el día de ayer, cuando ha pasado'' suena poco idiomático'
    rationale: Aunque fiel en sentido, la combinación es torpe en español. Puede conservarse el matiz de pasado consumado con una redacción más natural, por ejemplo 'como ayer, cuando ya pasó'.
  revised_spanish_text: Porque mil años, ante tus ojos, son como ayer, cuando ya pasó[a], o como una guardia[b] en la noche.
  revised_footnotes:
  - marker: a
    text: 'O: «cuando ha pasado». La cláusula hebrea puede expresarse con un matiz temporal ligeramente distinto.'
    reason: lexical_alternative
  - marker: b
    text: Una «guardia» era una división de la noche para hacer vigilancia.
    reason: cultural_note
  revision_rationale: Se ajusta la segunda comparación a 'o como' para seguir la decisión auditada del POB; se reemplaza 'vigilia' por 'guardia' para mayor claridad semántica en español; y se alisa la frase temporal para que suene natural sin perder el matiz de algo ya pasado. Se preservan en notas la alternativa temporal documentada y la explicación cultural de 'watch'.
