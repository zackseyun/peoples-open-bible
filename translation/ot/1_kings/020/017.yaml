id: 1KI.20.17
reference: 1 Kings 20:17
source:
  edition: WLC
  text: וַ/יֵּצְא֗וּ נַעֲרֵ֛י שָׂרֵ֥י הַ/מְּדִינ֖וֹת בָּ/רִֽאשֹׁנָ֑ה וַ/יִּשְׁלַ֣ח בֶּן הֲדַ֗ד וַ/יַּגִּ֤ידוּ ל/וֹ֙ לֵ/אמֹ֔ר אֲנָשִׁ֕ים יָצְא֖וּ מִ/שֹּׁמְרֽוֹן־׃
translation:
  text: Then the young men of the commanders of the provinces went out first[a], and Ben-hadad sent, and they reported to him, saying, “Men have come out from Samaria.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew simply says 'Ben-hadad sent'; 'sent out scouts' makes explicit the implied object from the context of the ensuing report.
    reason: lexical_alternative
lexical_decisions:
- source_word: נַעֲרֵי
  chosen: the young men of
  alternatives:
  - the servants of
  - the attendants of
  lexicon: HALOT
  rationale: נַעַר can denote a youth, servant, attendant, or military aide depending on context. In this military narrative, these are the retainers/assistants attached to the commanders. 'Young men' preserves the Hebrew term's basic sense while fitting the battle setting; the possessive construction with the following nouns clarifies their affiliation.
- source_word: שָׂרֵי הַמְּדִינוֹת
  chosen: the provincial commanders
  alternatives:
  - the commanders of the provinces
  - the officials of the districts
  lexicon: HALOT
  rationale: שָׂרִים are rulers, officials, or commanders; in this context they are military leaders under Ahab. מְדִינוֹת refers to administrative districts/provinces. 'Provincial commanders' is a concise optimal-equivalence rendering of the construct chain.
- source_word: בָּרִאשֹׁנָה
  chosen: first
  alternatives:
  - at first
  - in the first wave
  lexicon: HALOT
  rationale: The adverb indicates priority in sequence. 'First' best captures the temporal/sequential force without over-interpreting the military maneuver as a 'first wave,' which is possible but more specific than the Hebrew states.
- source_word: וַיִּשְׁלַח
  chosen: sent out scouts
  alternatives:
  - sent
  - dispatched men
  lexicon: HALOT
  rationale: The verb by itself means 'sent,' but the immediate result is that a report is brought back to Ben-hadad. English idiom benefits from making explicit that he sent men to observe/inquire. 'Sent out scouts' captures the military context and the implied object, though the object is not overtly stated in Hebrew.
- source_word: וַיַּגִּידוּ לוֹ לֵאמֹר
  chosen: and they reported to him, saying
  alternatives:
  - and they told him, saying
  - and they informed him
  lexicon: HALOT
  rationale: נגד in the Hiphil commonly means 'declare, report, tell.' In a military reconnaissance context, 'reported' is the most natural English equivalent. Retaining 'saying' reflects the Hebrew introduction to direct speech.
- source_word: אֲנָשִׁים
  chosen: Men
  alternatives:
  - Some men
  - People
  lexicon: HALOT
  rationale: The plural noun straightforwardly means 'men.' Per the translation philosophy, gender-accurate rendering is preferred over neutralizing language where the source is masculine. Here it likely refers to male combatants or envoys emerging from the city.
- source_word: יָצְאוּ מִשֹּׁמְרוֹן
  chosen: have come out from Samaria
  alternatives:
  - have gone out from Samaria
  - have come out of Samaria
  lexicon: HALOT
  rationale: The perfect reports a completed action from the scouts' perspective. 'Have come out from Samaria' is idiomatic in English direct speech and preserves the sense of emergence from the city. 'Samaria' is the standard English form of שֹׁמְרוֹן.
- source_word: בֶּן הֲדַד
  chosen: Ben-hadad
  rationale: Personal names are transliterated by standard convention per project philosophy.
