revisions:
- from: 'Y les dijeron[a]: “Nosotros, tus esclavos, somos doce hermanos, hijos de un solo hombre en la tierra de Canaán. Y he aquí, el menor está hoy con nuestro padre, y uno ya no está.”'
  to: 'Y dijeron[a]: “Nosotros, tus siervos, somos doce hermanos, hijos de un solo hombre en la tierra de Canaán. Y he aquí, el menor está hoy con nuestro padre, y uno ya no está.”'
  rationale: Se corrigió 'Y les dijeron' a 'Y dijeron' para no añadir un objeto indirecto ausente en el hebreo. Se cambió 'tus esclavos' por 'tus siervos' porque en este contexto עֲבָדֶיךָ funciona como fórmula de deferencia cortesana, y así se alinea con la decisión auditada de POB ('your servants') sin distorsionar el estatus social. Se conservan 'Y he aquí', 'el menor', 'hoy' y 'uno ya no está' por fidelidad y buena naturalidad en español.
  reviewer_model: gpt-5.4
