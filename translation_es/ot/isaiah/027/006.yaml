- from: En los días venideros[a] Jacob echará raíces; Israel florecerá y brotará[b], y llenarán la faz del mundo de fruto.
  to: En los días venideros[a] Jacob echará raíces; Israel brotará y florecerá, y llenarán la faz del mundo de fruto[b].
  rationale: Se corrige la ubicación de la nota léxica para que ancle en «fruto», que es la palabra correspondiente a תְּנוּבָה, y se ajusta la pareja verbal a «brotará y florecerá» para reflejar mejor la progresión de la imagen vegetal del hebreo en español natural. También se mejora la nota [b] sustituyendo «produce» por «producto».
