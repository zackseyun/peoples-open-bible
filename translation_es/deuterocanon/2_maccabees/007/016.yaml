translation:
  language: es
  text: 'Pero, al mirarlo, le dijo: «Aunque tienes autoridad entre los hombres[a], siendo mortal, haces lo que quieres[b];»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «entre los seres humanos». El griego usa un plural masculino con fuerza genérica.
    reason: lexical_alternative
  - marker: b
    text: O «siendo perecedero» o «siendo corruptible».
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ δὲ πρὸς αὐτὸν ἰδὼν
  english_pob_choice: But looking at him
  chosen_spanish: Pero, al mirarlo
  alternatives_spanish:
  - Pero cuando lo miró
  - Pero él, mirándolo
  lexicon: LSJ
  rationale: La construcción participial se vierte de modo natural en español conservando el matiz visual y confrontativo de ἰδών. «Pero» expresa la transición narrativa de δέ.
- source_word: Ἐξουσίαν
  english_pob_choice: authority
  chosen_spanish: autoridad
  alternatives_spanish:
  - poder
  - derecho
  lexicon: BDAG/LSJ
  rationale: En este contexto ἐξουσία significa autoridad ejercida en el ámbito político, más que simple fuerza. «Autoridad» reproduce bien ese matiz sin diluirlo.
- source_word: ἐν ἀνθρώποις
  english_pob_choice: among men
  chosen_spanish: entre los hombres
  alternatives_spanish:
  - entre los seres humanos
  - entre la humanidad
  lexicon: LSJ
  rationale: La preposición ἐν con dativo expresa aquí el ámbito de ejercicio de la autoridad. «Entre los hombres» conserva el valor genérico masculino del griego, con sentido inclusivo de la humanidad en sociedad.
- source_word: φθαρτὸς ὤν
  english_pob_choice: being mortal
  chosen_spanish: siendo mortal
  alternatives_spanish:
  - siendo perecedero
  - siendo corruptible
  lexicon: LSJ
  rationale: φθαρτός puede significar «perecedero» o «corruptible», pero en esta reprensión a un gobernante humano la idea central es su condición mortal y pasajera. «Siendo mortal» comunica esa fuerza con claridad en español.
theological_decisions:
- issue: Tensión semántica de φθαρτὸς ὤν en una amonestación a un gobernante terrenal
  english_pob_reading: being mortal
  chosen_spanish_reading: siendo mortal
  alternative_spanish_readings:
  - siendo perecedero
  - siendo corruptible
  rationale: La frase contrasta la autoridad humana con la fragilidad humana. «Mortal» preserva el golpe retórico y teológico sin introducir un vocabulario doctrinal que el pasaje no requiere.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: 'Sin cambios respecto del último pase de revisión: el texto griego y el auditor de inglés muestran acuerdo suficiente; se mantiene la decisión de traducir φθαρτὸς ὤν como «siendo mortal» por su fuerza retórica en este contexto.'
  spanish_consistency_notes:
  - Se mantiene «autoridad» para ἐξουσία, en coherencia con el uso técnico habitual de la POB.
  - Se evita «SEÑOR» o vocabulario eclesiástico no presente en el texto; el pasaje habla de una autoridad humana concreta.
  - «Hombres» conserva el genérico masculino del griego, con nota para la alternativa inclusiva.
