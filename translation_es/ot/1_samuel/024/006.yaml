translation:
  language: es
  text: Después de esto, el corazón de David lo golpeó[a] porque había cortado el borde[b] del manto de Saúl.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «el corazón de David lo golpeó», un modismo que expresa una conciencia inquieta.'
    reason: lexical_alternative
  - marker: b
    text: O «extremo» o «orilla» del manto de Saúl; el hebreo כָּנָף puede referirse a una extremidad de la prenda.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי אַחֲרֵי כֵן
  english_pob_choice: Afterward
  chosen_spanish: Después de esto
  alternatives_spanish:
  - Después
  - Más tarde
  - Luego de eso
  lexicon: HALOT
  rationale: La secuencia temporal introduce lo que sigue al episodio anterior. 'Después de esto' conserva el valor narrativo sin volverse mecánico ni añadir información.
- source_word: וַיַּךְ לֵב דָּוִד אֹתוֹ
  english_pob_choice: David’s heart struck him
  chosen_spanish: el corazón de David lo golpeó
  alternatives_spanish:
  - David se sintió golpeado en su corazón
  - David quedó herido en su conciencia
  - a David le remordió el corazón
  lexicon: HALOT
  rationale: Se conserva la imagen hebrea del corazón como sujeto que afecta interiormente a David. 'Golpeó' mantiene la fuerza del verbo sin pasar directamente a una explicación interpretativa como 'conciencia'.
- source_word: לֵב
  english_pob_choice: heart
  chosen_spanish: corazón
  alternatives_spanish:
  - conciencia
  - interior
  - mente
  lexicon: HALOT
  rationale: '''Corazón'' preserva el término concreto del hebreo, que puede incluir la conciencia moral, pero sin sustituirlo por una abstracción moderna que borre la imagen original.'
- source_word: עַל אֲשֶׁר
  english_pob_choice: because
  chosen_spanish: por haber
  alternatives_spanish:
  - porque
  - a causa de
  - por cuanto
  lexicon: HALOT
  rationale: La construcción causal se expresa naturalmente en español con 'por haber', que enlaza la reacción interior con el acto previo de cortar.
- source_word: כָּרַת
  english_pob_choice: had cut off
  chosen_spanish: haber cortado
  alternatives_spanish:
  - haber cortado de un tajo
  - haber desgarrado
  - haber separado
  lexicon: HALOT
  rationale: El verbo indica un acto de cortar/separar ya ocurrido. 'Haber cortado' reproduce bien la relación temporal y causal sin sobreespecificar el modo del corte.
- source_word: כָּנָף
  english_pob_choice: corner
  chosen_spanish: esquina
  alternatives_spanish:
  - orilla
  - borde
  - extremo
  lexicon: HALOT
  rationale: En contexto de prenda, כָּנָף puede referirse a una extremidad del vestido. 'Esquina' es una opción literal que conserva la idea de un extremo recortado, aunque en español resulte menos idiomática que 'borde'.
- source_word: אֶת כָּנָף אֲשֶׁר לְשָׁאוּל
  english_pob_choice: the corner of Saul’s robe
  chosen_spanish: la esquina del manto de Saúl
  alternatives_spanish:
  - el borde del manto de Saúl
  - el extremo del manto de Saúl
  - la orilla del manto de Saúl
  lexicon: HALOT
  rationale: El contexto inmediato identifica una prenda de Saúl. 'Manto' comunica de forma natural la pieza de vestir y mantiene la ambigüedad relativa del hebreo sobre la parte exacta de la prenda.
theological_decisions:
- issue: El idiomático hebreo "el corazón de David lo golpeó" frente a una paráfrasis de conciencia
  english_pob_reading: David’s heart struck him, an idiom expressing a troubled conscience.
  chosen_spanish_reading: el corazón de David lo golpeó, como expresión de un remordimiento interior
  alternative_spanish_readings:
  - David tuvo remordimiento
  - David se sintió culpable
  - su conciencia lo reprendió
  rationale: Se conserva la imagen corporal del hebreo y se deja el valor moral implícito en la frase. La POB inglés explica el modismo como conciencia troubled; en español se mantiene la tensión entre imagen literal y sentido moral sin sustituirlo por un término abstracto como 'conciencia'.
  doctrine_reference: Conciencia moral implícita en el lenguaje bíblico del corazón; cf. uso semítico de לב.
translation_notes:
  revision_awareness: 'El texto inglés revisado eliminó la coma para lograr un flujo más natural: ''Afterward David’s heart struck him because...'' La versión española sigue esa fluidez causal sin coma innecesaria, y conserva la relación temporal-causal del original hebreo.'
  spanish_consistency_notes:
  - Se usa 'corazón' para לֵב, no 'conciencia', para mantener la imagen hebrea.
  - Se usa 'manto' como equivalente de la prenda de Saúl, siguiendo el contexto inmediato aunque el hebreo nombre solo la 'esquina/extremo'.
  - Se conserva la causalidad con 'por haber' para reflejar עַל אֲשֶׁר sin sobrerelaborar.
