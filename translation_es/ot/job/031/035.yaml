    text: O ‘mi marca’ o ‘mi señal’. El hebreo probablemente se refiere a la marca de atestación que Job pone en su declaración.
    reason: lexical_alternative
  - marker: b
    text: O ‘y que el hombre de mi disputa escriba un documento’. El hebreo es más literalmente ‘y un documento escribió el hombre de mi disputa’, pero en el contexto expresa el deseo de Job de una acusación escrita por su acusador.
    reason: alternative_reading
  revision_rationale: Se ajusta תָּוִי a 'mi firma' para alinearlo con la decisión principal del POB y mantener explícita la imaginería forense, dejando las alternativas más literales en nota. También se mejora la naturalidad jurídica de la última cláusula con 'la acusación por escrito' y se pule ligeramente la primera cláusula para mejor legibilidad en español contemporáneo.
