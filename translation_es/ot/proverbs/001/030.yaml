translation:
  language: es
  text: No quisieron[a] aceptar mi consejo; despreciaron toda mi reprensión[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «No estaban dispuestos a aceptar mi consejo».'
    reason: alternative_reading
  - marker: b
    text: O «toda mi corrección» o «todo mi reproche».
    reason: lexical_alternative
lexical_decisions:
- source_word: לֹא / לֹא אָבוּ
  english_pob_choice: were unwilling / would not
  chosen_spanish: No quisieron
  alternatives_spanish:
  - No estuvieron dispuestos
  - No quisieron aceptar
  - No quisieron recibir
  lexicon: HALOT
  rationale: אָבוּ expresa falta de voluntad o negativa voluntaria. En español, «no quisieron» comunica bien esa resistencia de la voluntad sin volverla más fuerte que el hebreo.
- source_word: לַעֲצָתִי
  english_pob_choice: to accept my counsel
  chosen_spanish: aceptar mi consejo
  alternatives_spanish:
  - recibir mi consejo
  - obedecer mi consejo
  - seguir mi consejo
  lexicon: HALOT
  rationale: עֵצָה significa consejo/aconsejamiento. «Aceptar mi consejo» conserva la idea de no dar acogida a la instrucción; «consejo» mantiene el registro sapiencial más fiel que «consejo» en sentido meramente casual de «consejito».
- source_word: נָאֲצוּ
  english_pob_choice: despised
  chosen_spanish: despreciaron
  alternatives_spanish:
  - menospreciaron
  - rechazaron con desprecio
  - desdeñaron
  lexicon: HALOT
  rationale: El verbo implica rechazo con desprecio. «Despreciaron» reproduce esa carga evaluativa de forma natural en español y mantiene la tensión del original.
- source_word: כָּל
  english_pob_choice: all
  chosen_spanish: toda
  alternatives_spanish:
  - toda la
  - cada
  lexicon: HALOT
  rationale: En español, «toda mi reprensión» refleja el cuantificador total del hebreo antes de un sustantivo singular colectivo. «Toda» preserva la totalidad sin forzar pluralidad.
- source_word: תּוֹכַחְתִּי
  english_pob_choice: my reproof / correction / rebuke
  chosen_spanish: reprensión
  alternatives_spanish:
  - corrección
  - reprendido
  - reproche
  lexicon: HALOT
  rationale: תּוֹכַחַת pertenece al campo de reprobación/corrección disciplinaria sapiencial. «Reprensión» suena bíblico pero claro, y conserva mejor el tono de advertencia que «corrección» en español contemporáneo.
translation_notes:
  revision_awareness: Conforme al audit trail inglés, se mantiene la doble idea de negativa voluntaria y desprecio. La revisión más reciente indica que no se requerían cambios respecto al consenso alto; la versión española conserva esa estabilidad sin suavizar la fuerza semántica del hebreo.
  spanish_consistency_notes:
  - Se mantiene «consejo» para עֵצָה por coherencia con el registro sapiencial.
  - Se mantiene «reprensión» para תּוֹכַחַת para preservar el tono disciplinario y evitar una neutralización excesiva.
  - 'El orden de las dos cláusulas sigue el paralelismo hebreo: negativa voluntaria y desprecio de la reprensión.'
