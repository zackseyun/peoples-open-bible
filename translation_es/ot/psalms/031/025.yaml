revisions:
- from: Sean fuertes[a], y que su corazón sea valiente, todos los que esperan en Yahvé.
  to: Sean fuertes, y que su corazón sea valiente, todos los que esperan[a] a Yahvé.
  rationale: Se conserva la exhortación poética y el nombre divino «Yahvé», pero se corrige la ubicación y el contenido de la nota para reflejar la alternativa léxica documentada en הַמְיַחֲלִים. También se ajusta «esperan en Yahvé» a «esperan a Yahvé» para mantener mejor la imagen de espera expectante del hebreo y del rastro POB, mientras la nota preserva el matiz de esperanza/confianza.
