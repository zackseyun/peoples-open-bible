id: MAT.8.28
reference: Matthew 8:28
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Καὶ ⸂ἐλθόντος αὐτοῦ⸃ εἰς τὸ πέραν εἰς τὴν χώραν τῶν ⸀Γαδαρηνῶν ὑπήντησαν αὐτῷ δύο δαιμονιζόμενοι ἐκ τῶν μνημείων ἐξερχόμενοι, χαλεποὶ λίαν ὥστε μὴ ἰσχύειν τινὰ παρελθεῖν διὰ τῆς ὁδοῦ ἐκείνης.
base_translation:
  language: en
  yaml_path: translation/nt/matthew/008/028.yaml
  text: 'And when he came to the other side[a], into the region of the Gadarenes, two demon-possessed men met him, coming out of the tombs[c][b], so extremely fierce that no one was able to pass along that road.'
  footnotes:
  - marker: a
    text: Some manuscripts read “Gergesenes” or “Gerasenes” instead of “Gadarenes.”
    reason: textual_variant
  - marker: b
    text: Or “very fierce.”
    reason: lexical_alternative
  - marker: c
    text: Or 'pass by that road'.
    reason: previous_rendering
translation:
  language: ko
  text: '예수님이 호수 건너편 가다라[a] 지방에 이르시자, 귀신들린 두 사람이 무덤들에서 나와 그분을 맞이했습니다. 그들은 매우 사나워서 아무도 그 길로 지나갈 수 없었습니다.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 본문 사본은 Γαδαρηνῶν(가다라인) / Γερασηνῶν(거라사인) / Γεργεσηνῶν(게르게세) 등 지명 이형(異形)이 있다. SBLGNT는 「가다라」를 본문으로 채택했다.
    reason: textual_variant
