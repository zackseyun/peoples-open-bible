    reason: textual_variant
  - marker: b
    text: O «calamidad». El sustantivo puede denotar terror, consternación o un desastre devastador.
    reason: lexical_alternative
  revision_rationale: Se hace una reparación menor para mejorar la naturalidad y dignidad del español, ajustar el anclaje de la nota al formato requerido y acercar la nota [a] al alcance explicativo del POB inglés sin cambiar el sentido traducido.
