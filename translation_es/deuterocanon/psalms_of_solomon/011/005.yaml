lexical_decisions:
- source_word: ὄρη
  english_pob_choice: mountains
  chosen_spanish: montes
  alternatives_spanish:
  - montañas
  lexicon: LSJ
  rationale: ὄρη designa montes o montañas. En español, «montes» mantiene bien la imagen elevada y admite un registro bíblico natural; «montañas» también sería posible, pero «montes» resulta más sobrio y fluido aquí.
- source_word: ὑψηλά
  english_pob_choice: high
  chosen_spanish: altos
  alternatives_spanish:
  - elevados
  - lofty
  lexicon: LSJ
  rationale: El adjetivo describe la altura física. «Altos» es la forma más directa y natural en español; «elevados» sería correcto pero algo más abstracto.
- source_word: ἐταπείνωσεν
  english_pob_choice: brought low
  chosen_spanish: humilló
  alternatives_spanish:
  - bajó
  - rebajó
  - abajó
  lexicon: LSJ
  rationale: El verbo puede abarcar abatir o humillar. Dado que el texto aplica la acción a montes, en español «humilló» conserva la tensión personificante del griego y el valor de abatimiento sin volver la frase demasiado mecánica.
- source_word: εἰς ὁμαλισμόν
  english_pob_choice: into level ground
  chosen_spanish: hasta dejarlos en terreno llano
  alternatives_spanish:
  - en llanura
  - en un llano
  - hasta convertirlos en llano
  lexicon: LSJ
  rationale: 'La frase expresa resultado: quedar nivelados. «Hasta dejarlos en terreno llano» comunica ese desenlace con claridad en español y evita una construcción demasiado literal o técnica.'
- source_word: αὐτοῖς
  english_pob_choice: for them
  chosen_spanish: para ellos
  alternatives_spanish:
  - a favor de ellos
  - en beneficio de ellos
  lexicon: LSJ
  rationale: El dativo se entiende mejor como beneficio o ventaja. «Para ellos» conserva esa relación de provecho de forma simple y natural.
translation_notes:
  revision_awareness: El texto inglés de POB lee «brought the high mountains low into level ground for them», con nota alternativa «humbled the lofty mountains into a plain for them». La versión española sigue esa misma decisión principal, conservando la imagen de abatimiento físico y el resultado de nivelación, con una nota que mantiene la alternativa semántica de «en un llano».
  spanish_consistency_notes:
  - Se evita «SEÑOR» o fórmulas de máscara, porque aquí no aparece el Tetragrámaton ni una cita del nombre divino.
  - «Montes» y «terreno llano» mantienen el paralelismo imagístico sin introducir una paráfrasis más interpretativa que la del original.
  - No se traduce «ὁμαλισμός» como «plano» para no perder la idea de nivelación resultante que el inglés POB destaca con «level ground».
