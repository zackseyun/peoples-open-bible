translation:
  language: es
  text: Habla brevemente[a], aunque sepas mucho, y sé como quien sabe y guarda silencio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El texto hebreo está algo comprimido y puede ser elíptico; literalmente sería algo como «habla poco; mucho; y sé como uno que sabe y guarda silencio al mismo tiempo». La traducción expresa el sentido probable de hablar con reserva. El paralelo griego de Swete para este versículo no corresponde a esta línea hebrea, por lo que aquí se sigue el hebreo como testimonio principal.
    reason: textual_variant
lexical_decisions:
- source_word: כל לאמר
  english_pob_choice: speak briefly
  chosen_spanish: Habla brevemente
  alternatives_spanish:
  - Habla en pocas palabras
  - Di poco
  lexicon: HALOT
  rationale: El hebreo comprimido sugiere una instrucción adverbial de hablar con concisión; «brevemente» expresa bien ese valor en español sin volverlo tosco.
- source_word: ומעט הרבה
  english_pob_choice: though you know much
  chosen_spanish: aunque sepas mucho
  alternatives_spanish:
  - aunque conozcas mucho
  - aunque sepas muchas cosas
  lexicon: HALOT
  rationale: El hebreo es elíptico; la versión inglesa explicita el sentido probable con «you know». En español, «aunque sepas mucho» conserva la reserva sapiencial y evita una paráfrasis excesiva.
- source_word: ודמה ליודע
  english_pob_choice: and be like one who knows
  chosen_spanish: y sé como uno que sabe
  alternatives_spanish:
  - y sé semejante a uno que sabe
  - y sé como el que sabe
  lexicon: HALOT
  rationale: דמה expresa semejanza; «sé como» es natural y fiel. «Uno que sabe» mantiene el valor general, sin convertirlo en título o figura específica.
- source_word: ומחריש יחדו
  english_pob_choice: and keeps silent
  chosen_spanish: y guarda silencio
  alternatives_spanish:
  - y permanece callado
  - y calla
  lexicon: HALOT
  rationale: חרש en este contexto denota guardar silencio de forma deliberada. «Guarda silencio» conserva mejor la dimensión activa y sapiencial que un simple «calla».
theological_decisions:
- issue: Tensión textual entre el hebreo transmitido y el paralelo griego
  english_pob_reading: The Hebrew is primary here; the Greek parallel does not correspond to this Hebrew line.
  chosen_spanish_reading: Se sigue el hebreo como texto principal, con el sentido sapiencial de hablar con brevedad y discreción.
  alternative_spanish_readings:
  - 'Seguir el griego: «La ofrenda del justo unge el altar, y su aroma agradable está delante del Altísimo»'
  - Una armonización marginal entre ambos textos
  rationale: El paquete fuente indica que el hebreo de Kahana es el testimonio principal y que el griego de Swete no corresponde a esta línea. Por fidelidad auditada, la traducción española sigue el hebreo y no fusiona ambos testimonios.
  doctrine_reference: Principio de primacía del testimonio fuente en POB; crítica textual y seguimiento de la variante principal
translation_notes:
  revision_awareness: 'La redacción española sigue la decisión revisada del audit trail inglés: se elimina cualquier matiz innecesario como «sin embargo» o «y aun» y se conserva una formulación más formal, directa y sobria. La solución mantiene la brevedad exhortativa del proverbio y respeta la prioridad del hebreo frente al paralelo griego no correspondiente.'
  spanish_consistency_notes:
  - Se prefirió «brevemente» para reflejar el valor adverbial del hebreo comprimido.
  - Se evitó «Cristo/Señor» u otras convenciones no pertinentes; no hay lenguaje teológico de títulos divinos aquí.
  - «Guarda silencio» preserva una acción voluntaria y prudente, coherente con la literatura sapiencial.
  - La puntuación sigue la estructura exhortativa del verso y mantiene la cláusula final como paralelo de conducta.
