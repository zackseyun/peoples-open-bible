    text: Or 'had fallen forward on his bed.' The Greek participle can be rendered more literally, but the context suggests drunken collapse.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'for the wine had been poured around him' or similar; the expression is idiomatic for being overcome by wine.
    reason: lexical_alternative
