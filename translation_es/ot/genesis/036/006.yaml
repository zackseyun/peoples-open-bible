    reason: textual_variant
  revision_rationale: Se corrigió el anclaje de la nota textual para que recaiga sobre «a una tierra», que es el lugar pertinente según el hebreo y la auditoría inglesa. También se ajustó «sus mujeres» a «sus esposas» por mayor precisión contextual y mejor español. La puntuación se suavizó levemente sin alterar el contenido ni la estructura de la enumeración.
