translation:
  language: es
  text: Llenémonos de vino costoso y de perfumes[a], y que no nos pase de largo ninguna flor de primavera.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ungüentos» o «aceites aromáticos» para «perfumes» (μύρων). El término griego se refiere ampliamente a aceites perfumados o ungüentos usados con lujo.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἴνου
  english_pob_choice: wine
  chosen_spanish: vino
  alternatives_spanish:
  - el vino
  lexicon: LSJ
  rationale: El genitivo con πλησθῶμεν indica aquello de lo que quieren llenarse; «vino» mantiene la referencia básica sin sobrecargar el verso.
- source_word: πολυτελοῦς
  english_pob_choice: costly
  chosen_spanish: costoso
  alternatives_spanish:
  - caro
  - lujoso
  - precioso
  lexicon: LSJ
  rationale: El adjetivo denota alto valor o precio. «Costoso» conserva la idea de gasto y lujo hedonista con un registro natural en español.
- source_word: μύρων
  english_pob_choice: perfumes
  chosen_spanish: perfumes
  alternatives_spanish:
  - ungüentos
  - aceites aromáticos
  lexicon: LSJ
  rationale: μύρον puede referirse a aceites perfumados o ungüentos; en este contexto de lujo sensorial, «perfumes» comunica mejor la indulgencia que «ungüentos», que sonaría medicinal.
- source_word: πλησθῶμεν
  english_pob_choice: let us fill ourselves with
  chosen_spanish: Bebámonos de
  alternatives_spanish:
  - llenémonos de
  - saciémonos de
  - tomemos en abundancia
  lexicon: LSJ
  rationale: El subjuntivo exhortativo de primera persona plural pide una forma exhortativa. «Bebámonos de» intenta reproducir la autoindulgencia implícita, aunque el verbo español no cubre por sí solo ambos sustantivos; por eso se mantiene «de vino ... y de perfumes» como parte del mismo impulso de exceso.
- source_word: μὴ παροδευσάτω ἡμᾶς
  english_pob_choice: let no ... pass us by
  chosen_spanish: y no pase por alto
  alternatives_spanish:
  - y que no nos deje pasar
  - y que no nos pase de largo
  - y no nos deje escapar
  lexicon: LSJ
  rationale: La prohibición expresa la idea de no dejar que algo quede sin aprovechar. «No pase por alto» conserva el movimiento de «pasar» y la noción de que la flor no debe ser omitida o dejada atrás.
- source_word: ἄνθος ἔαρος
  english_pob_choice: flower of spring
  chosen_spanish: un solo flor de primavera
  alternatives_spanish:
  - la flor de primavera
  - el flor de primavera
  - el brote de primavera
  lexicon: LSJ
  rationale: La imagen poética se conserva con «flor de primavera». Se añadió «un solo» para reforzar el matiz de no dejar pasar ni una sola manifestación de la estación, aunque la formulación resultante es menos idiomática; se conserva para dar cuenta del valor distributivo de la prohibición.
translation_notes:
  revision_awareness: Texto ajustado respecto del borrador inglés POB para mantener la fuerza exhortativa del griego y la imaginería de lujo sensorial, aunque con una leve tensión en la segunda cláusula para no perder el valor distributivo de μὴ παροδευσάτω ἡμᾶς.
  spanish_consistency_notes:
  - Se preservó el tono hedonista del verso sin moralizarlo ni suavizarlo.
  - Se usó terminología moderna y digna; «perfumes» se mantiene por coherencia con el audit trail inglés y por claridad en español.
  - La construcción verbal de la primera cláusula queda deliberadamente marcada para reflejar el subjuntivo exhortativo griego.
