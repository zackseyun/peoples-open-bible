revisions:
- from: ¿Todavía te ensalzas[a] contra mi pueblo por no dejarlos ir?
  to: ¿Todavía sigues exaltándote[a] contra mi pueblo por no dejarlos ir?
  rationale: Se ajusta la redacción principal para que el español suene más natural y mantenga con claridad la fuerza reflexiva y arrogante de מִסְתּוֹלֵל. 'Sigues exaltándote' expresa mejor una acción persistente dirigida a Faraón en esta pregunta retórica. También se suaviza la nota alternativa para evitar una formulación demasiado rígida en español, preservando las alternativas léxicas del expediente inglés.
  reviewer_model: gpt-5.4
