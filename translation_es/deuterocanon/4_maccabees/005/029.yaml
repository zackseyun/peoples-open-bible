translation:
  language: es
  text: ni desatenderé los sagrados juramentos de los padres de guardar la ley[a][b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de los antepasados». El griego προγόνων puede significar «antepasados» o «forefathers/fathers»; se retiene «padres» para conservar el lenguaje ancestral masculino del original y de la tradición de la POB.
    reason: lexical_alternative
  - marker: b
    text: Es decir, la ley ancestral judía; alternativamente, «la Ley».
    reason: lexical_alternative
lexical_decisions:
- source_word: οὔτε
  english_pob_choice: nor
  chosen_spanish: ni
  alternatives_spanish:
  - ni tampoco
  - ni siquiera
  lexicon: LSJ
  rationale: En español, la coordinación negativa natural en esta estructura se expresa mejor con «ni», que conserva la continuidad de una serie negada sin forzar una réplica demasiado literal de «nor».
- source_word: ἱεροὺς
  english_pob_choice: sacred
  chosen_spanish: sagrados
  alternatives_spanish:
  - santos
  - consagrados
  lexicon: LSJ
  rationale: «Sagrados» comunica la solemnidad religiosa de ὁ ἱερός aplicado a «juramentos» y suena idiomático en español moderno sin perder el peso cultual.
- source_word: τῶν προγόνων
  english_pob_choice: of the fathers
  chosen_spanish: de los padres
  alternatives_spanish:
  - de los antepasados
  - de los progenitores
  lexicon: LSJ
  rationale: Se mantiene el lenguaje ancestral masculino del griego y de la POB inglesa revisada. «Padres» conserva la fuerza de tradición heredada; «antepasados» sería posible, pero suaviza ese matiz.
- source_word: περὶ τοῦ φυλάξαι τὸν νόμον
  english_pob_choice: to keep the law
  chosen_spanish: para guardar la ley
  alternatives_spanish:
  - para observar la ley
  - para cumplir la ley
  - para conservar la ley
  lexicon: LSJ
  rationale: El infinitivo articular con περί expresa finalidad o contenido de los juramentos. «Guardar la ley» conserva la idea de custodia/observancia covenantal de φυλάσσω y resulta natural en español bíblico.
- source_word: τὸν νόμον
  english_pob_choice: the law
  chosen_spanish: la ley
  alternatives_spanish:
  - la Ley
  - la Torá
  lexicon: LSJ
  rationale: En este contexto judío se refiere a la ley ancestral; se mantiene «ley» en minúscula por fidelidad al griego y claridad de lectura, sin imponer una capitalización interpretativa.
- source_word: ὅρκους
  english_pob_choice: oaths
  chosen_spanish: juramentos
  alternatives_spanish:
  - votos
  - promesas juradas
  lexicon: LSJ
  rationale: «Juramentos» es la equivalencia española más directa de ὅρκος y conserva el carácter solemne y vinculante del término mejor que «votos».
- source_word: οὐ παρήσω
  english_pob_choice: will I disregard
  chosen_spanish: pasaré por alto
  alternatives_spanish:
  - desatenderé
  - descartaré
  - abandonaré
  lexicon: LSJ
  rationale: παρίημι aquí tiene la idea de dejar pasar, descuidar o pasar por alto. «Pasaré por alto» reproduce bien la noción de no tratar los juramentos como algo que puede omitirse o ignorarse.
theological_decisions:
- issue: Lenguaje ancestral masculino en τῶν προγόνων
  english_pob_reading: of the fathers
  chosen_spanish_reading: de los padres
  alternative_spanish_readings:
  - de los antepasados
  - de los forefathers
  rationale: Se conserva el lenguaje masculino heredado del texto en lugar de neutralizarlo. Esto mantiene la fuerza retórica de la apelación a la tradición recibida y sigue la política de exactitud de género cuando el griego la presenta.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Referencia de τὸν νόμον
  english_pob_reading: the law
  chosen_spanish_reading: la ley
  alternative_spanish_readings:
  - la Ley
  - la ley ancestral
  rationale: El contexto hace claro que se trata de la ley judía heredada por los padres. La forma principal se mantiene simple y cercana al texto; las mayúsculas o ampliaciones interpretativas se reservan para nota, no para el cuerpo del versículo.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
translation_notes:
  revision_awareness: La redacción sigue el ajuste más reciente del audit trail, que eliminó el añadido «our» de la versión inglesa para no introducir un posesivo ausente en el griego. Por eso en español se evita cualquier posesivo añadido y se traduce de forma directa y sobria.
  spanish_consistency_notes:
  - Se preserva el paralelismo negativo con «ni» como equivalente natural de οὔτε.
  - «Juramentos» se usa consistentemente para ὅρκους, sin rebajar su fuerza a «promesas».
  - «Guardar la ley» mantiene el sentido de observancia fiel y evita una paráfrasis doctrinal más amplia.
  - Las notas distinguen entre la lectura principal y la alternativa léxica sin duplicar el contenido del texto principal.
