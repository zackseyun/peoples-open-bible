    rationale: Aunque idiomática, la frase singularizada puede sonar más genérica. «montados en caballos» refleja mejor רֹכְבֵי סוּסִים sin perder naturalidad suficiente en contexto poético-profético.
  - severity: low
    issue: 'Errata en decisión léxica interna: «deputados»'
    rationale: No afecta el texto bíblico publicado, pero en la justificación léxica debe ser «diputados» si se conserva ese alternativo.
