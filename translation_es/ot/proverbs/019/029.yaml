review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del hebreo: נָכ֣וֹנוּ = «están preparados», לַלֵּצִים = «para los burladores», שְׁפָטִים = «juicios», וּמַהֲלֻמוֹת = «golpes», לְגֵו = «para la espalda de», כְּסִילִים = «los necios». También conserva correctamente el singular de «espalda» según la revisión inglesa auditada.'
  spanish_quality_summary: 'La redacción principal es clara y natural en español bíblico moderno. Sin embargo, la nota al pie está mal formulada: omite el verbo en la segunda mitad («y golpes...») y su puntuación/comillas son poco naturales. Conviene reparar esa nota para que sea legible y paralela al texto principal.'
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Necios» para כְּסִילִים y «burladores» para לֵצִים son adecuados en Proverbios. «Juicios» mantiene la decisión léxica documentada, aunque con sentido punitivo por el contexto.
  issues:
  - severity: medium
    issue: La nota al pie alternativa está gramaticalmente defectuosa.
    rationale: 'La nota dice: «O: “están listos para los burladores, y golpes para la espalda de los necios”». Falta el verbo «están» antes de «golpes», a diferencia del inglés auditado («Judgments are ready..., and blows...»). Debe corregirse para fidelidad y buena legibilidad.'
  revised_spanish_text: Los juicios[a] están preparados para los burladores, y los golpes para la espalda de los necios.
  revised_footnotes:
  - marker: a
    text: 'O: «Los juicios están listos para los burladores, y los golpes para la espalda de los necios».'
    reason: lexical_alternative
  revision_rationale: Se mantiene el texto principal porque es fiel al hebreo y al rastro de auditoría inglés. Solo se corrige la nota léxica alternativa para restaurar la gramática, el paralelismo y la naturalidad del español.
