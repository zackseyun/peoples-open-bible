revisions:
- from: La barca de paso[a] cruzó para hacer pasar la casa del rey[b] y para hacer lo bueno[c] a sus ojos, y Semeí hijo de Gera cayó delante del rey mientras éste cruzaba el Jordán.
  to: La barca[a] cruzó para hacer pasar a la familia del rey[b] y para hacer lo que era bueno ante sus ojos[c], y Semeí hijo de Gera cayó delante del rey mientras el rey cruzaba el Jordán.
  rationale: Se ajusta «la casa del rey» a «la familia del rey» para preservar el sentido humano/colectivo en español claro, dejando la forma literal en nota. Se mejora el modismo a «hacer lo que era bueno ante sus ojos» para conservar la imagen hebrea con mejor naturalidad. También se simplifica la referencia final repitiendo «el rey» en vez de «éste».
  reviewer_model: gpt-5.4
