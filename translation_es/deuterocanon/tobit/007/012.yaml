translation:
  language: es
  text: 'Entonces Ragüel dijo: «Tómala desde ahora conforme al juicio[b]. Tú, en cambio, eres su hermano[a], y ella es tuya. Y el Dios misericordioso hará prosperar lo mejor para ustedes[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Hermano» refleja aquí lenguaje de parentesco y probablemente significa un pariente cercano apto según la costumbre familiar, no un hermano literal.
    reason: cultural_note
  - marker: b
    text: 'También puede entenderse: «según la decisión» o «conforme al dictamen legal».'
    reason: lexical_alternative
  - marker: c
    text: 'El griego también admite una formulación más literal: «el Dios misericordioso hará prosperar para ustedes las mejores cosas».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Κομίζου
  english_pob_choice: Take
  chosen_spanish: Tómala
  alternatives_spanish:
  - Recíbela
  - Llévala contigo
  - Toma a esta mujer
  lexicon: LSJ
  rationale: El imperativo medio de κομίζω aquí funciona como una instrucción directa para recibir/tomar a Sara como esposa. «Tómala» conserva la fuerza imperativa y suena natural en español sin diluir el acto jurídico-matrimonial.
- source_word: ἀπὸ τοῦ νῦν
  english_pob_choice: from now on
  chosen_spanish: desde ahora
  alternatives_spanish:
  - de aquí en adelante
  - desde este momento
  - en adelante
  lexicon: LSJ
  rationale: La expresión marca el inicio de una nueva स्थिति marital. «Desde ahora» es claro, actual y mantiene el valor temporal inmediato del griego.
- source_word: κατὰ τὴν κρίσιν
  english_pob_choice: according to the judgment
  chosen_spanish: conforme al juicio
  alternatives_spanish:
  - según la decisión
  - conforme al fallo
  - según el dictamen legal
  lexicon: LSJ
  rationale: κρίσις puede significar juicio, decisión o resolución legal. «Conforme al juicio» conserva la forma formal y jurídica sin especificar más de lo que el contexto griego asegura.
- source_word: ἀδελφὸς
  english_pob_choice: brother
  chosen_spanish: hermano
  alternatives_spanish:
  - pariente
  - consanguíneo
  - familiar
  lexicon: LSJ
  rationale: El griego dice «hermano», y el POB inglés conserva esa forma para no borrar la tensión léxica. En español se mantiene «hermano» y el sentido de parentesco amplio queda en nota.
- source_word: ἐλεήμων
  english_pob_choice: merciful
  chosen_spanish: misericordioso
  alternatives_spanish:
  - compasivo
  - clemente
  - misericorde
  lexicon: LSJ
  rationale: ἐλεήμων describe a quien muestra misericordia. «Misericordioso» es la opción más natural y teológicamente transparente en español.
- source_word: εὐοδώσει
  english_pob_choice: prosper
  chosen_spanish: hará prosperar
  alternatives_spanish:
  - prosperará
  - dará éxito a
  - conducirá prosperamente a
  lexicon: LSJ
  rationale: El verbo puede significar prosperar o conceder éxito. La construcción «hará prosperar» conserva el matiz causativo del futuro griego y encaja bien en una bendición.
- source_word: τὰ κάλλιστα
  english_pob_choice: what is best
  chosen_spanish: lo mejor
  alternatives_spanish:
  - las mejores cosas
  - lo más excelente
  - las cosas mejores
  lexicon: LSJ
  rationale: El neutro plural superlativo apunta a «las mejores cosas» o a «lo mejor». En español, «lo mejor» es más idiomático y mantiene la amplitud del cierre benéfico.
theological_decisions:
- issue: Kinship term in marriage authorization
  english_pob_reading: Retain 'brother' in the main text while understanding it as close-kin language, not literal siblinghood.
  chosen_spanish_reading: Se mantiene «hermano» en el texto principal como lenguaje de parentesco, no como afirmación de hermandad literal.
  alternative_spanish_readings:
  - «pariente» en el texto principal
  - «consanguíneo» en el texto principal
  rationale: El griego usa ἀδελφός y el POB inglés conserva la forma para no resolver la ambigüedad. En español, «hermano» preserva la tensión textual; la aclaración sobre parentesco se deja a la nota.
  doctrine_reference: 'DOCTRINE.md: preservar la tensión textual y no borrarla con una traducción interpretativa excesiva'
- issue: Future indicative in blessing formula
  english_pob_reading: 'Render as a prayer-wish in English: ''may the merciful God prosper what is best for you.'''
  chosen_spanish_reading: 'Se vierte como bendición deseativa: «hará prosperar lo mejor para ustedes», sin introducir una explicación doctrinal ajena al texto.'
  alternative_spanish_readings:
  - «que el Dios misericordioso prospere lo mejor para ustedes»
  - «el Dios misericordioso prosperará lo mejor para ustedes»
  rationale: El griego emplea futuro indicativo; en contexto de bendición, el español puede conservar esa forma con sentido benedictivo. «Hará prosperar» mantiene el valor verbal y evita forzar un subjuntivo inexistente en el original.
  doctrine_reference: 'DOCTRINE.md: equivalencia óptima y respeto del acto de habla'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que ajustó la cláusula final para expresar con más naturalidad el sentido de prosperar aquello que es mejor para los destinatarios. En español, se optó por «hará prosperar lo mejor para ustedes» para mantener esa naturalidad sin perder el trasfondo del futuro griego y su tono de bendición.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero este versículo usa θεός; por eso se traduce «Dios» sin sustitución del nombre divino.
  - Se conservó «hermano» en la línea principal para reflejar el griego y la decisión auditada del POB inglés.
  - Se evitó «Cristo» porque no hay Χριστός en el pasaje.
  - El orden y la puntuación buscan un español bíblico moderno, legible y sobrio, sin calco excesivo del inglés.
