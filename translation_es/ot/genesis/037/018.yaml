translation:
  language: es
  text: Lo vieron de lejos, y antes de que se acercara a ellos, conspiraron[a] contra él para matarlo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «tramaron contra él». El verbo hebreo puede denotar maquinación o proceder engañoso; aquí el contexto deja explícito que se trata de un complot homicida.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּרְאוּ
  english_pob_choice: They saw
  chosen_spanish: Lo vieron
  alternatives_spanish:
  - Y lo vieron
  lexicon: HALOT
  rationale: El wayyiqtol narrativo de ראה se expresa naturalmente en pasado simple en español. Se omite la conjunción inicial para mayor fluidez, sin perder la secuencia narrativa.
- source_word: מֵרָחֹק
  english_pob_choice: from a distance
  chosen_spanish: de lejos
  alternatives_spanish:
  - a distancia
  - desde lejos
  lexicon: HALOT
  rationale: La idea es la de ver a alguien a cierta lejanía. 'De lejos' es idiomático y fiel; 'a distancia' es posible, pero suena más técnico.
- source_word: וּבְטֶרֶם
  english_pob_choice: and before
  chosen_spanish: y antes de que
  alternatives_spanish:
  - pero antes de que
  - antes de que
  lexicon: HALOT
  rationale: בְּטֶרֶם marca anterioridad temporal. En español, 'antes de que' transmite el valor temporal con naturalidad; se conserva la coordinación narrativa con 'y'.
- source_word: יִקְרַב אֲלֵיהֶם
  english_pob_choice: he came near to them
  chosen_spanish: se acercara a ellos
  alternatives_spanish:
  - se acercara
  - se aproximara a ellos
  lexicon: HALOT
  rationale: קרב expresa acercamiento espacial. El subjuntivo imperfecto en la subordinada temporal con 'antes de que' es la forma natural en español.
- source_word: וַיִּתְנַכְּלוּ
  english_pob_choice: they conspired against
  chosen_spanish: conspiraron contra él
  alternatives_spanish:
  - trazaron un plan contra él
  - tramaron contra él
  lexicon: HALOT
  rationale: El hitpael de נכל puede abarcar maquinación o conducta engañosa. En este contexto, la intención homicida hace que 'conspiraron contra él' sea la equivalencia más clara y concordante con la nota inglesa.
- source_word: לַהֲמִיתוֹ
  english_pob_choice: to kill him
  chosen_spanish: para matarlo
  alternatives_spanish:
  - para darle muerte
  - a fin de matarlo
  lexicon: HALOT
  rationale: 'El infinitivo causativo de מות expresa finalidad: el complot tenía como meta su muerte. ''Para matarlo'' es directo y plenamente natural en español.'
translation_notes:
  revision_awareness: El borrador sigue de cerca la lectura inglesa auditada, sin cambios de contenido respecto al texto fuente hebreo; se conserva el matiz temporal de בְּטֶרֶם y el valor hostil/maquinador de וַיִּתְנַכְּלוּ, intensificado por el infinitivo final de matar.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, aunque este versículo no contiene el Tetragrámaton.
  - Se evita «Cristo»/«Mesías» porque no hay referencia cristológica en el pasaje.
  - «Conspiraron contra él» preserva la fuerza hostil del verbo hebreo sin suavizarla a un mero 'planear'.
  - La subordinada con 'antes de que' requiere subjuntivo en español, por lo que 'se acercara' refleja correctamente la temporalidad anterior.
