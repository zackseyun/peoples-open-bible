translation:
  language: es
  text: Para el nativo[a] entre los hijos de Israel y para el residente extranjero[b] que habita entre ellos, habrá una sola ley[c] para ustedes, para el que actúa sin intención[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "el nacido en el país entre los israelitas".'
    reason: lexical_alternative
  - marker: b
    text: '"Residente extranjero" aquí designa al extranjero que vive dentro de la comunidad de Israel.'
    reason: cultural_note
  - marker: c
    text: 'O: "una sola instrucción" o "un solo estatuto".'
    reason: lexical_alternative
  - marker: d
    text: 'O: "por error", "involuntariamente" o "por inadvertencia".'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאֶזְרָח
  english_pob_choice: the native
  chosen_spanish: el natural
  alternatives_spanish:
  - el nativo
  - el nacido en el país
  - el ciudadano
  lexicon: HALOT
  rationale: אֶזְרָח designa al miembro nativo de la comunidad en contraste con el גֵּר. 'El natural' conserva bien ese contraste legal y suena natural en español bíblico contemporáneo.
- source_word: בִּבְנֵי יִשְׂרָאֵל
  english_pob_choice: among the sons of Israel
  chosen_spanish: entre los hijos de Israel
  alternatives_spanish:
  - entre los israelitas
  - de los hijos de Israel
  lexicon: HALOT
  rationale: La expresión conserva el paralelo formal del hebreo con בְּנֵי, sin neutralizar indebidamente la formulación representativa del texto fuente.
- source_word: וְלַגֵּר
  english_pob_choice: and for the sojourner
  chosen_spanish: y para el forastero
  alternatives_spanish:
  - y para el residente extranjero
  - y para el peregrino
  lexicon: HALOT
  rationale: גֵּר en contexto legal se refiere a un residente no nativo dentro de la comunidad. 'Forastero' mantiene la idea de no pertenencia originaria, aunque en español 'residente extranjero' también sería posible.
- source_word: הַגָּר בְּתוֹכָם
  english_pob_choice: who sojourns among them
  chosen_spanish: que habita entre ellos
  alternatives_spanish:
  - que reside entre ellos
  - que vive entre ellos
  - que sojuzga entre ellos
  lexicon: HALOT
  rationale: El participio describe residencia estable dentro de la comunidad. 'Habita entre ellos' comunica la relación espacial y social sin forzar el verbo 'sojornar', poco natural en español.
- source_word: תּוֹרָה אַחַת
  english_pob_choice: one law
  chosen_spanish: una sola ley
  alternatives_spanish:
  - una sola instrucción
  - un solo estatuto
  lexicon: HALOT
  rationale: En este marco jurídico תּוֹרָה funciona como norma legal. 'Una sola ley' reproduce bien el carácter normativo y la igualdad de aplicación.
- source_word: יִהְיֶה לָכֶם
  english_pob_choice: there shall be one law for you
  chosen_spanish: habrá ... para ustedes
  alternatives_spanish:
  - será ... para ustedes
  - les corresponderá ...
  lexicon: HALOT
  rationale: La construcción expresa una norma vigente para el grupo interpelado. 'Habrá' es idiomático y mantiene el tono legal prescriptivo.
- source_word: לָעֹשֶׂה
  english_pob_choice: for the one who acts
  chosen_spanish: para el que actúa
  alternatives_spanish:
  - para el que hace
  - para quien comete
  lexicon: HALOT
  rationale: El participio sustantivado señala a la persona que realiza la acción en cuestión. 'Actúa' conserva la cercanía semántica sin endurecer el español.
- source_word: בִּשְׁגָגָה
  english_pob_choice: unintentionally
  chosen_spanish: por error
  alternatives_spanish:
  - sin intención
  - involuntariamente
  - por inadvertencia
  lexicon: HALOT
  rationale: שְׁגָגָה en contexto legal denota una acción no deliberada o equivocada. 'Por error' es claro y compatible con el matiz jurídico; la alternativa 'sin intención' también sería válida.
theological_decisions:
- issue: Aplicación igual de la norma al nativo y al forastero residente
  english_pob_reading: The verse states that the same legal instruction applies equally to both groups for unintentional acts.
  chosen_spanish_reading: El versículo afirma que la misma ley aplica por igual al natural y al forastero residente en caso de acción no deliberada.
  alternative_spanish_readings:
  - La misma instrucción vale para ambos grupos.
  - Hay un solo estatuto para ambos casos.
  rationale: El hebreo subraya la igualdad normativa sin ampliar el alcance doctrinal más allá del contexto legal inmediato. La traducción española preserva esa equivalencia explícita.
  doctrine_reference: Números 15:29; principios de equivalencia legal en la traducción bíblica
- issue: Valor de תּוֹרָה en contexto jurídico
  english_pob_reading: one law
  chosen_spanish_reading: una sola ley
  alternative_spanish_readings:
  - una sola instrucción
  - un solo estatuto
  rationale: '''Ley'' recoge mejor en español la fuerza normativa del hebreo en este pasaje que una traducción más genérica. Se mantiene, no obstante, la posibilidad semántica de ''instrucción'' o ''estatuto'' sin borrar la tensión lexical.'
  doctrine_reference: HALOT; contexto legal de Números 15
translation_notes:
  revision_awareness: Se tuvo en cuenta el audit trail inglés y su consenso alto; no se introdujeron revisiones sustantivas porque la equivalencia léxica y legal es estable. La versión española preserva el contraste nativo/forastero, la unicidad de la norma y el matiz de acción no deliberada.
  spanish_consistency_notes:
  - Se prefirió 'Yahvé' como convención general del proyecto, pero este versículo no contiene el tetragrámaton.
  - '''Natural'' se usa para אֶָזְרָח en contraste con גֵּר, manteniendo el paralelismo legal.'
  - '''Forastero'' se eligió como equivalente sobrio de גֵּר; en nota se aclara su sentido de residente extranjero.'
  - '''Por error'' conserva el matiz de שְׁגָגָה sin diluir la categoría jurídica.'
  - El texto evita 'SEÑOR' como sustituto no solicitado y mantiene un estilo bíblico moderno y digno.
