base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/009/006.yaml
  text: Old man[a], young man, and virgin, and little children, and women—you shall kill them utterly. But do not come near anyone on whom is the mark, and begin at my sanctuary[b]. So they began with the old men who were before the house.
  footnotes:
  - marker: a
    text: Hebrew 'the taw'; that is, the protective mark placed on the faithful (see v. 4).
    reason: lexical_alternative
  - marker: b
    text: Or 'the elders' who were before the house (that is, the temple).
    reason: alternative_reading
