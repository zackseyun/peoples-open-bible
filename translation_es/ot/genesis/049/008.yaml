translation:
  language: es
  text: Judá[a], tus hermanos te alabarán; tu mano estará sobre la nuca de tus enemigos; los hijos de tu padre se inclinarán ante ti[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “te darán gracias”. El verbo hebreo puede expresar dar gracias, confesar o alabar; aquí “alabarán” encaja mejor con la bendición y con el juego de palabras con el nombre de Judá.
    reason: lexical_alternative
  - marker: b
    text: O “los hijos de tu padre se postrarán ante ti”.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוּדָה
  english_pob_choice: Judah
  chosen_spanish: Judá
  alternatives_spanish:
  - Judah
  lexicon: HALOT
  rationale: Nombre propio transliterado según la forma española estándar. Se conserva la referencia a la tribu/persona sin traducir el nombre.
- source_word: יוֹדוּךָ
  english_pob_choice: will praise you
  chosen_spanish: te alabarán
  alternatives_spanish:
  - te darán gracias
  - te confesarán
  lexicon: HALOT
  rationale: El verbo hebreo admite agradecer, confesar o alabar; en este contexto de bendición y juego con el nombre de Judá, "alabarán" reproduce mejor el sentido de honor y la resonancia literaria.
- source_word: אַחֶיךָ
  english_pob_choice: your brothers
  chosen_spanish: tus hermanos
  alternatives_spanish:
  - tus hermanos y hermanas
  - tu parentela
  lexicon: HALOT
  rationale: El plural masculino con sufijo de segunda persona singular corresponde de manera directa a "hermanos"; en el contexto inmediato se refiere a los hijos de Jacob.
- source_word: יָדְךָ
  english_pob_choice: your hand
  chosen_spanish: tu mano
  alternatives_spanish:
  - tu poder
  - tu fuerza
  lexicon: HALOT
  rationale: Se conserva la imagen concreta de la mano, aunque en contexto comunique poder o dominio. Mantener la metáfora evita suavizar el hebreo.
- source_word: בְּעֹרֶף אֹיְבֶיךָ
  english_pob_choice: on the neck of your enemies
  chosen_spanish: sobre la nuca de tus enemigos
  alternatives_spanish:
  - sobre el cuello de tus enemigos
  - contra la nuca de tus enemigos
  lexicon: HALOT
  rationale: עֹרֶף se refiere a la nuca o cuello posterior. "Nuca" es una opción natural en español para conservar la imagen corporal y la fuerza idiomática de sometimiento.
- source_word: יִשְׁתַּחֲווּ לְךָ
  english_pob_choice: will bow down to you
  chosen_spanish: se inclinarán ante ti
  alternatives_spanish:
  - se postrarán ante ti
  - te adorarán
  lexicon: HALOT
  rationale: El gesto expresa homenaje o sumisión humana, no culto divino. "Se inclinarán ante ti" mantiene el acto de reverencia sin introducir lenguaje de adoración indebida.
- source_word: בְּנֵי אָבִיךָ
  english_pob_choice: the sons of your father
  chosen_spanish: los hijos de tu padre
  alternatives_spanish:
  - los hijos de tu padre mismo
  - los hijos de tu padre te
  lexicon: HALOT
  rationale: Se preserva la literalidad del giro hebreo. En este contexto, la expresión alude a los hermanos de Judá; la forma española sigue siendo clara y transparente.
theological_decisions:
- issue: Sentido de homenaje en יִשְׁתַּחֲווּ לְךָ
  english_pob_reading: human bowing in submission/honor, not divine worship
  chosen_spanish_reading: reverencia humana de sumisión/honor, no adoración divina
  alternative_spanish_readings:
  - adoración
  - postración cultual
  rationale: El destinatario es Judá dentro de la bendición de Jacob. Por eso el gesto debe leerse como homenaje real o familiar, sin importar una connotación de culto que el texto no exige.
  doctrine_reference: 'Translation philosophy §3: preserve theological tension rather than resolve it; do not import doctrinal claims the text does not make.'
translation_notes:
  revision_awareness: La revisión más reciente indicó que no había cambios necesarios; se mantiene la lectura de alta concordancia con el audit trail inglés y sin ajustes textuales adicionales.
  spanish_consistency_notes:
  - Se mantiene "Yahvé" como convención general del proyecto, aunque este versículo no contiene el tetragrámaton.
  - Se usa "alabarán" para יוֹדוּךָ por la misma razón funcional que el inglés POB usa "will praise you".
  - Se conserva la imagen corporal de "mano" y "nuca" para no desactivar el lenguaje de dominación presente en el hebreo.
  - '"Se inclinarán ante ti" evita el traslado a adoración litúrgica, coherente con el contexto de parentesco y bendición.'
