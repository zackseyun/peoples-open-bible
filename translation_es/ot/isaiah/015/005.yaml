    reason: lexical_alternative
  - marker: b
    text: Eglat-shelishiyá probablemente es un nombre de lugar. La expresión también podría entenderse literalmente como «una ternera de tres años».
    reason: lexical_alternative
  - marker: c
    text: Los verbos hebreos de este versículo alternan entre singular y plural; la traducción suaviza esa variación para reflejar el movimiento colectivo del pueblo de Moab.
    reason: lexical_alternative
  revision_rationale: Se revisa la cláusula central para seguir la decisión auditada de plural colectivo y eliminar la ambigüedad de «sube». También se ajusta la referencia vial a «hacia Horonaim» para expresar dirección, y se mejora levemente la transliteración del topónimo incierto sin cambiar la estrategia de transliteración ni las notas.
