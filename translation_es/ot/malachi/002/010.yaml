base_translation:
  language: en
  yaml_path: translation/ot/malachi/002/010.yaml
  text: Do we not all have one Father? Has not one God created us? Why then are we faithless[a], each man to his brother[b], profaning the covenant of our fathers?
  footnotes:
  - marker: a
    text: Or, 'Why then do we deal treacherously, each man with his brother?' The Hebrew verb carries the sense of acting treacherously or faithlessly in a covenant relationship.
    reason: lexical_alternative
  - marker: b
    text: '''One Father'' may refer directly to God, as the parallel ''one God created us'' suggests; some understand it more broadly as a shared covenant ancestor.'
    reason: alternative_reading
