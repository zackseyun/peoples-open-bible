translation:
  language: es
  text: 'Él dijo al que estaba a cargo del guardarropa[a]: «Saca vestiduras[b] para todos los adoradores de Baal[c]». Y les sacó las vestiduras.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «al encargado del guardarropa». La expresión hebrea es más literalmente «al que estaba sobre el guardarropa», es decir, la persona responsable de esa dependencia.
    reason: lexical_alternative
  - marker: b
    text: También puede traducirse «prendas» o «ropa»; «vestiduras» mantiene un registro más formal.
    reason: lexical_alternative
  - marker: c
    text: Más literalmente, «los que sirven a Baal» o «servidores de Baal»; aquí se refiere a personas dedicadas a su culto.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמֶּלְתָּחָה
  english_pob_choice: the wardrobe
  chosen_spanish: el guardarropa
  alternatives_spanish:
  - la guardarropía
  - la sala de vestidos
  - el armario de vestidos
  lexicon: HALOT
  rationale: El hebreo se refiere a un lugar o dependencia relacionada con las prendas. «Guardarropa» conserva la idea de un lugar/oficina para guardar ropa y resulta natural en español actual sin introducir asociaciones eclesiásticas ajenas.
- source_word: לַאֲשֶׁר עַל הַמֶּלְתָּחָה
  english_pob_choice: to the one who was over the wardrobe
  chosen_spanish: al que estaba sobre el guardarropa
  alternatives_spanish:
  - al que estaba a cargo del guardarropa
  - al encargado del guardarropa
  - al que era responsable del guardarropa
  lexicon: HALOT
  rationale: La construcción hebrea expresa a la persona que estaba sobre esa dependencia. La frase elegida mantiene la relación administrativa sin sobrecargar el español con un giro demasiado técnico.
- source_word: הוֹצֵא
  english_pob_choice: Bring out
  chosen_spanish: Saca
  alternatives_spanish:
  - Trae afuera
  - Saca fuera
  - Haz salir
  lexicon: HALOT
  rationale: El imperativo causativo pide que se traigan las prendas desde el lugar de almacenamiento. «Saca» es idiomático y directo en español.
- source_word: לְבוּשׁ
  english_pob_choice: garments
  chosen_spanish: vestiduras
  alternatives_spanish:
  - vestidos
  - prendas
  - ropas
  lexicon: HALOT
  rationale: El término hebreo puede abarcar ropa o prendas de vestir. «Vestiduras» conserva un registro más formal y bíblico, apto para un contexto narrativo sin perder el sentido colectivo.
- source_word: עֹבְדֵי הַבָּעַל
  english_pob_choice: the worshipers of Baal
  chosen_spanish: los servidores de Baal
  alternatives_spanish:
  - los adoradores de Baal
  - los siervos de Baal
  - los que servían a Baal
  lexicon: HALOT
  rationale: El hebreo literalmente dice «los que sirven a Baal». En este contexto cultual, el español puede reflejar esa servidumbre religiosa con «servidores»; se preserva la fuerza de עבד sin reducirla a una mera actividad devocional.
- source_word: וַיֹּצֵא לָהֶם הַמַּלְבּוּשׁ
  english_pob_choice: So he brought out the garments for them
  chosen_spanish: Y él les sacó las vestiduras
  alternatives_spanish:
  - Y les sacó las vestiduras
  - Así que les sacó las vestiduras
  - Y les sacó la vestidura
  lexicon: HALOT
  rationale: El sustantivo hebreo funciona aquí de manera colectiva, aunque sea singular en la forma. El español plural «vestiduras» preserva el sentido distributivo y evita una singular artificial.
theological_decisions:
- issue: 'עֹבְדֵי הַבָּעַל: matiz de servicio cultual'
  english_pob_reading: the worshipers of Baal
  chosen_spanish_reading: los servidores de Baal
  alternative_spanish_readings:
  - los adoradores de Baal
  - los siervos de Baal
  rationale: La POB en inglés decidió no traducir mecánicamente como 'servants' sino explicar el sentido de culto. En español, «servidores» conserva la raíz de servicio del hebreo y deja visible la pertenencia religiosa, sin imponer una categoría doctrinal adicional.
  doctrine_reference: Uso bíblico de עבד en contextos cultuales; cf. servicio/devoción a una deidad.
translation_notes:
  revision_awareness: La redacción sigue el ajuste del control inglés que prefirió «garments» por registro más formal y por mejor correspondencia con el singular/plural hebreo, en lugar de la primera opción más general «clothing». En español se reflejó esa preferencia con «vestiduras», manteniendo el plural colectivo en la segunda cláusula.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» porque no hay aquí el tetragrámaton ni una cita directa de κύριος.
  - Se prefirió un término de lugar/administración («guardarropa») sobre una formulación eclesiástica como «vestry», que sería engañosa en español.
  - Se mantuvo la estructura narrativa simple con verbo repetido («sacó») para reflejar el hebreo וַיֹּצֵא.
  - No se introdujo lenguaje de «esclavos» porque el contexto cultual del participio עֹבְדֵי pide aquí la relación de servicio religioso, no una categoría social literal.
