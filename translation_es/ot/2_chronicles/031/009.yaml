translation:
  language: es
  text: Y Ezequías preguntó a los sacerdotes y a los levitas sobre los montones[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las pilas». El hebreo se refiere a montones o acumulaciones reunidas, probablemente de los productos y las ofrendas aportados en los versículos vecinos.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּדְרֹשׁ
  english_pob_choice: questioned
  chosen_spanish: preguntó
  alternatives_spanish:
  - inquirió
  - consultó
  - cuestionó
  lexicon: HALOT
  rationale: El verbo דרש con עַל aquí expresa una indagación sobre un asunto. En español, «preguntó» comunica de manera natural y fiel la acción de averiguar, sin endurecer el matiz con «cuestionó» ni volverlo demasiado formal con «inquirió».
- source_word: יְחִזְקִיָּהוּ
  english_pob_choice: Hezekiah
  chosen_spanish: Ezequías
  alternatives_spanish:
  - Hezequías
  lexicon: Convención bíblica española
  rationale: Se emplea la forma tradicional y reconocible en español bíblico para el nombre propio, manteniendo claridad y lectura litúrgica amplia.
- source_word: עַל
  english_pob_choice: about
  chosen_spanish: acerca de
  alternatives_spanish:
  - sobre
  - respecto de
  lexicon: HALOT
  rationale: Después de דרש, עַל introduce el tema de la indagación. «Acerca de» preserva ese valor temático en español con naturalidad.
- source_word: הַכֹּהֲנִים
  english_pob_choice: the priests
  chosen_spanish: los sacerdotes
  alternatives_spanish:
  - los presbíteros
  lexicon: HALOT
  rationale: En el contexto cultual, כֹּהֲנִים se refiere a los ministros sacerdotales. «Sacerdotes» es el equivalente directo y más transparente en español.
- source_word: וְהַלְוִיִּם
  english_pob_choice: and the Levites
  chosen_spanish: y los levitas
  alternatives_spanish:
  - y los levítas
  lexicon: HALOT
  rationale: Se conserva el término étnico-levítico estándar en español bíblico para לְוִיִּם.
- source_word: הָעֲרֵמוֹת
  english_pob_choice: the heaps
  chosen_spanish: los montones
  alternatives_spanish:
  - las pilas
  - las acumulaciones
  - los terrones
  lexicon: HALOT
  rationale: עֲרֵמוֹת designa cosas apiladas o acumuladas. «Montones» es claro en español y refleja bien la imagen material del texto sin introducir una interpretación excesiva.
translation_notes:
  revision_awareness: El texto inglés auditado cambió de «asked» a «questioned» para reflejar más de cerca el sentido de indagación de דרש, manteniendo naturalidad. La versión española sigue ese criterio con «preguntó», que en este contexto expresa indagación sin sonar forzado. También se preservó la nota sobre הָעֲרֵמוֹת como acumulaciones físicas, evitando espiritualizar o generalizar el término.
  spanish_consistency_notes:
  - 'Se mantiene la terminología POB habitual: «Ezequías», «sacerdotes», «levitas».'
  - «Acerca de» conserva el valor temático de עַל tras דרש.
  - «Montones» refleja la imagen concreta del hebreo y deja abierta la posibilidad de una traducción alternativa, como en el inglés auditado.
