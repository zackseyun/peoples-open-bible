translation:
  language: es
  text: Después de Abimélec, Tola hijo de Púa, hijo de Dodó[a], hombre de Isacar, se levantó para salvar a Israel; y habitó en Samir en la región montañosa de Efraín.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «hijo de su tío». El hebreo בֶּן־דּוֹדוֹ puede leerse como un patronímico con Dodó como nombre personal, o como una expresión apelativa.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיָּקָם
  english_pob_choice: arose
  chosen_spanish: se levantó
  alternatives_spanish:
  - se alzó
  - surgió
  lexicon: HALOT
  rationale: En este contexto narrativo, קום introduce la aparición de un líder; «se levantó» conserva ese sentido formal y natural en español sin sugerir necesariamente un nombramiento oficial.
- source_word: אַחֲרֵי אֲבִימֶלֶךְ
  english_pob_choice: After Abimelech
  chosen_spanish: Después de Abimélec
  alternatives_spanish:
  - Tras Abimélec
  - Luego de Abimélec
  lexicon: HALOT
  rationale: La expresión marca sucesión temporal de manera directa. Mantengo el nombre propio en forma española estándar y la relación temporal simple de la fuente.
- source_word: לְהוֹשִׁיעַ אֶת־יִשְׂרָאֵל
  english_pob_choice: to save Israel
  chosen_spanish: para salvar a Israel
  alternatives_spanish:
  - para librar a Israel
  - para rescatar a Israel
  lexicon: HALOT
  rationale: El hifil de ישׁע permite «salvar» o «librar». «Salvar» reproduce bien el valor narrativo y teológico de rescate y preservación sin restringirlo a una liberación militar.
- source_word: תּוֹלָע
  english_pob_choice: Tola
  chosen_spanish: Tola
  lexicon: transliteration policy
  rationale: Nombre propio transliterado de manera consistente con la política del proyecto.
- source_word: בֶּן פּוּאָה
  english_pob_choice: son of Puah
  chosen_spanish: hijo de Púa
  alternatives_spanish:
  - descendiente de Púa
  lexicon: HALOT
  rationale: Construcción genealógica normal; «hijo de» es la forma más directa y fiel al hebreo.
- source_word: בֶּן דּוֹד֖וֹ
  english_pob_choice: son of Dodo
  chosen_spanish: hijo de Dodó
  alternatives_spanish:
  - hijo de su tío
  lexicon: HALOT
  rationale: La lectura principal trata דּוֹדוֹ como nombre propio, por eso conservo «Dodó». Dado que la forma también puede admitir la lectura appellativa «su tío», la ambigüedad se preserva en nota.
- source_word: אִישׁ יִשָּׂשכָר
  english_pob_choice: a man of Issachar
  chosen_spanish: hombre de Isacar
  alternatives_spanish:
  - isacarita
  lexicon: HALOT
  rationale: Esta frase indica afiliación tribal. «Hombre de Isacar» sigue de cerca la forma hebrea y resulta clara en español; «isacarita» sería más interpretativa.
- source_word: וְהוּא יֹשֵׁב
  english_pob_choice: and he lived
  chosen_spanish: y habitó
  alternatives_spanish:
  - y vivía
  - y residía
  lexicon: HALOT
  rationale: El participio describe residencia estable. «Habitó» mantiene un registro bíblico sobrio y corresponde bien al valor de asentamiento permanente.
- source_word: בְּשָׁמִיר
  english_pob_choice: in Shamir
  chosen_spanish: en Samir
  alternatives_spanish:
  - en Shamir
  lexicon: transliteration policy
  rationale: Se translitera el topónimo a una forma española fluida. «Samir» evita una grafía ajena al español y conserva la referencia geográfica.
- source_word: בְּהַר אֶפְרָיִם
  english_pob_choice: in the hill country of Ephraim
  chosen_spanish: en la región montañosa de Efraín
  alternatives_spanish:
  - en la sierra de Efraín
  - en la serranía de Efraín
  lexicon: HALOT
  rationale: La expresión hebrea nombra el área montañosa asociada con Efraín. «Región montañosa» comunica el sentido geográfico sin sonar demasiado literal ni oscurecer el referente.
theological_decisions:
- issue: לְהוֹשִׁיעַ אֶת־יִשְׂרָאֵל / save Israel
  english_pob_reading: to save Israel
  chosen_spanish_reading: para salvar a Israel
  alternative_spanish_readings:
  - para librar a Israel
  - para rescatar a Israel
  rationale: No se reduce la acción a victoria militar solamente; «salvar» mantiene el alcance amplio de rescate y liberación que el verbo admite en este contexto narrativo.
  doctrine_reference: soteriological language in narrative Hebrew; no doctrinal expansion beyond the text
- issue: בֶּן־דּוֹדוֹ / Dodo or 'his uncle'
  english_pob_reading: Or, 'son of his uncle.'
  chosen_spanish_reading: hijo de Dodó
  alternative_spanish_readings:
  - hijo de su tío
  rationale: La vocalización recibida favorece un nombre propio, pero la consonancia permite una lectura alternativa apelativa. Conservar la nota evita borrar esa tensión textual.
  doctrine_reference: text-critical and lexical ambiguity in Hebrew genealogy
translation_notes:
  revision_awareness: 'Revisado a la luz del paquete fuente y del control cruzado: no se requieren cambios sustantivos respecto del sentido base; se mantiene la ambigüedad documentada de בֶּן־דּוֹדוֹ mediante nota.'
  spanish_consistency_notes:
  - Se mantiene Yahvé no pertinente aquí; no aparece el Tetragrámaton en el versículo.
  - Se conserva la distinción narrativa entre «se levantó» y «habitó» para reflejar el hebreo de acción seguida de residencia estable.
  - 'Los nombres propios se adaptan a grafía española estándar donde corresponde: Abimélec, Dodó, Isacar, Efraín, Samir.'
