    issue: «porque por Yahvé he jurado» es poco natural en español directo
    rationale: El hebreo de juramento en discurso directo se expresa más idiomáticamente con «juro por Yahvé». La forma actual es comprensible, pero suena rígida y menos viva que la fuerza exhortativa del original.
  - severity: medium
    issue: «todo el mal» introduce una ambigüedad moral no ideal para רָעָה en este contexto
    rationale: En la cláusula comparativa se habla de las desgracias sufridas por David desde su juventud. «Adversidad» o «desgracia» transmite mejor calamidad sufrida que «mal», que en español puede leerse como maldad o categoría moral.
  revised_spanish_text: Ahora, levántate, sal y habla al corazón de tus siervos[a], porque juro por Yahvé que, si no sales, ni un hombre se quedará contigo esta noche, y esto será para ti peor que toda la adversidad que te ha sobrevenido desde tu juventud hasta ahora.
  revised_footnotes:
