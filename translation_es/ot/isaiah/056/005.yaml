review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la mayor parte del hebreo: «daré», «en mi casa», «dentro de mis muros», «nombre», «mejor que hijos e hijas» y «que no será cortado» preservan adecuadamente el sentido. Sin embargo, no sigue fielmente una decisión clave documentada en el rastro POB inglés: יָד fue elegido como «monument» en el texto principal, con «memorial» como alternativa en nota. Además, el hebreo cambia de plural a singular (לָהֶם ... לוֹ), y tanto la evidencia fuente como las decisiones léxicas/teológicas inglesas piden conservar ese cambio; la revisión auditada que lo armonizó al plural contradice esa documentación, así que el español no debe basarse en ella.'
  spanish_quality_summary: 'El español es claro y digno, pero puede mejorarse. «Un memorial» es comprensible, aunque «un monumento» comunica mejor el valor concreto y conmemorativo del modismo en español bíblico actual. «Que no será cortado» es fiel, pero sin problema puede mantenerse tal cual para conservar la resonancia hebrea. El flujo mejora si se conserva el cambio a singular en la segunda cláusula: «le daré».'
  glossary_alignment: 'No hay conflictos con la terminología global principal. La cuestión clave es de decisión léxica y de forma textual: preferir «monumento» como equivalente principal de יָד en este modismo, con nota para «memorial»/«mano»; y respetar el cambio de plural a singular documentado en el hebreo.'
  issues:
  - severity: high
    issue: El texto principal usa «memorial» donde la decisión léxica POB principal eligió «monument».
    rationale: La auditoría inglesa documenta «a monument and a name» como la mejor representación del modismo יָד וָשֵׁם, dejando «memorial» como alternativa en nota. El español invierte indebidamente esa prioridad.
  - severity: high
    issue: El borrador armoniza al plural («les daré») la cláusula final, en contra del singular hebreo לוֹ.
    rationale: La evidencia fuente muestra un cambio real de לָהֶם a לוֹ. Las decisiones léxicas/teológicas inglesas piden retenerlo para individualizar la promesa dentro del grupo. La nota actual justifica una armonización basada en una revisión auditada que contradice ese análisis fuente-primario.
  - severity: medium
    issue: La nota b explica y defiende una decisión textual incorrecta en lugar de alertar sobre el cambio de número preservado.
    rationale: Si se conserva el singular en español, la nota debe informar el cambio hebreo, no racionalizar su eliminación.
