  alternative_readings:
  - 'Translate the extant Hebrew: ''And if you come near, you will not incur guilt, lest he take your life.'''
  rationale: The Zone 1 Hebrew and Greek are not minor variants but entirely different sayings, and the Hebrew witness is explicitly flagged 'major_mismatch.' Per project philosophy for Sirach, Hebrew is primary where it survives, but the parallel Greek must be used as actual translation input and source uncertainty must be stated honestly. Given the severity of the mismatch and the deuterocanonical base-text policy centered on Swete LXX for these books, the Greek is adopted for the main line, with the Hebrew preserved in a footnote as a major alternative witness rather than silently ignored.
  doctrine_reference: 'PHILOSOPHY.md: Sirach translated from Hebrew where it survives and from Greek where it does not; preserve source uncertainty honestly.'
