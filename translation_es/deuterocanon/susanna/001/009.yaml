translation:
  language: es
  text: Pervirtieron su mente[a] y apartaron sus ojos para no mirar al cielo ni recordar los juicios justos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «torcieron su mente». El verbo griego puede expresar corrupción moral además de deformación o torcimiento.
    reason: lexical_alternative
  - marker: b
    text: «Juicios justos» también puede entenderse como «juicios rectos» o «decisiones justas». La frase probablemente alude a los actos o estándares justos de Dios, aunque el griego no expresa el posesivo de manera explícita.
    reason: lexical_alternative
lexical_decisions:
- source_word: διέστρεψαν
  english_pob_choice: twisted
  chosen_spanish: torcieron
  alternatives_spanish:
  - pervirtieron
  - corrompieron
  lexicon: BDAG
  rationale: El verbo expresa una desviación o deformación moral de la facultad interior. «Torcieron» conserva la idea de desvío y resulta natural en español sin perder la fuerza ética.
- source_word: τὸν νοῦν
  english_pob_choice: their minds
  chosen_spanish: la mente
  alternatives_spanish:
  - el entendimiento
  - la inteligencia
  lexicon: BDAG
  rationale: νοῦς se refiere a la facultad interior de pensar y percibir moralmente. En español, «la mente» comunica bien esa sede interior; se mantiene el plural implícito en el contexto con «les».
- source_word: ἐξέκλιναν
  english_pob_choice: turned away
  chosen_spanish: apartaron
  alternatives_spanish:
  - desviaron
  - volvieron aparte
  lexicon: BDAG
  rationale: El verbo indica apartar o desviar. «Apartaron» funciona con el objeto concreto «sus ojos» y preserva la imagen física de rechazo deliberado.
- source_word: τοὺς ὀφθαλμοὺς αὐτῶν
  english_pob_choice: their eyes
  chosen_spanish: sus ojos
  lexicon: BDAG
  rationale: Correspondencia directa y concreta con el griego; sostiene la imagen corporal de no mirar.
- source_word: τοῦ μὴ βλέπειν εἰς τὸν οὐρανόν
  english_pob_choice: so as not to look to heaven
  chosen_spanish: para no mirar al cielo
  alternatives_spanish:
  - a fin de no mirar al cielo
  - para evitar mirar al cielo
  lexicon: BDAG
  rationale: El infinitivo con μή expresa propósito de evitar la acción. «Mirar al cielo» es idiomático en español y conserva el sentido de dirección sin añadir explicaciones.
- source_word: μνημονεύειν
  english_pob_choice: remember
  chosen_spanish: recordar
  alternatives_spanish:
  - tener presente
  - hacer memoria de
  lexicon: BDAG
  rationale: El verbo significa recordar o tener presente. «Recordar» es claro, breve y fiel al valor básico del término.
- source_word: κριμάτων δικαίων
  english_pob_choice: righteous judgments
  chosen_spanish: los juicios justos
  alternatives_spanish:
  - los juicios rectos
  - las justas decisiones
  lexicon: BDAG
  rationale: κριμάτων puede significar juicios o decisiones judiciales; δίκαια añade la cualidad de justicia. «Juicios justos» conserva el carácter judicial y moral sin importar un posesivo explícito que no aparece en el griego.
theological_decisions:
- issue: Referente implícito de «el cielo» y de «los juicios justos»
  english_pob_reading: The line is rendered to preserve the implied orientation toward God and his just judgments without making the divine referent more explicit than the Greek does.
  chosen_spanish_reading: La traducción conserva la referencia implícita a Dios sin añadir un posesivo o explicación que el griego no ofrece.
  alternative_spanish_readings:
  - para no mirar al Cielo y recordar los juicios justos de Dios
  rationale: El texto griego dice «al cielo» y «juicios justos» sin posesivo divino explícito. El contexto apunta a Dios, pero la versión española no debe resolver esa implicación añadiendo palabras no presentes.
  doctrine_reference: 'Principio de fidelidad textual: no insertar determinaciones teológicas ausentes del original; mantener la tensión interpretativa donde el griego la deja implícita.'
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego normalizado de Susana 1:9 y la solución auditada en inglés, manteniendo la ambigüedad teológica sobre el referente implícito y conservando las dos alternativas léxicas principales documentadas en la POB inglesa.
  spanish_consistency_notes:
  - Se usa «cielo» para οὐρανός, con minúscula por tratarse del sustantivo común y no de un nombre propio.
  - Se evita «SEÑOR» o un equivalente interpretativo, porque aquí no aparece el tetragrámaton ni κύριος.
  - 'Se mantiene el paralelismo de acciones internas y externas: mente / ojos; recordar / mirar.'
