translation:
  language: es
  text: Paloma mía, en las hendiduras de la roca, en el escondite del precipicio[a], muéstrame tu aspecto[b]; déjame oír tu voz, porque tu voz es dulce, y tu aspecto es hermoso.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "en el lugar secreto de la subida escarpada" o "en el refugio del risco"; el término hebreo es raro y puede referirse a una subida rocosa empinada, una cornisa o un precipicio.'
    reason: lexical_alternative
  - marker: b
    text: 'O: "rostro"; el hebreo puede referirse más específicamente al aspecto visible o al semblante.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יוֹנָתִי
  english_pob_choice: My dove
  chosen_spanish: Palomita mía
  alternatives_spanish:
  - Mi paloma
  - Paloma mía
  lexicon: HALOT
  rationale: El hebreo es un término de cariño, literalmente “mi paloma”. En español, “palomita mía” conserva el tono afectuoso y poético sin perder la imagen de ave. Evito “paloma” sola por ser menos íntima en este contexto.
- source_word: בְּחַגְוֵי הַסֶּלַע
  english_pob_choice: in the clefts of the rock
  chosen_spanish: en las hendiduras de la roca
  alternatives_spanish:
  - en las grietas de la roca
  - en las hendeduras de la roca
  lexicon: HALOT
  rationale: חַגְוֵי alude a cavidades o hendiduras rocosas. “Hendiduras” reproduce bien la imagen plural y concreta, y es natural en español contemporáneo.
- source_word: בְּסֵתֶר הַמַּדְרֵגָה
  english_pob_choice: in the hiding place of the cliff
  chosen_spanish: en el escondite del precipicio
  alternatives_spanish:
  - en el lugar oculto de la pendiente escarpada
  - en el refugio del risco
  lexicon: HALOT
  rationale: סֵתֶר expresa ocultamiento; מַדְרֵגָה es un término difícil y puede referirse a una subida escarpada, cornisa o precipicio. “Escondite del precipicio” mantiene la tensión semántica sin forzar una precisión topográfica no segura.
- source_word: הַרְאִינִי אֶת־מַרְאַיִךְ
  english_pob_choice: let me see your appearance
  chosen_spanish: muéstrame tu apariencia
  alternatives_spanish:
  - déjame ver tu apariencia
  - muéstrame tu rostro
  lexicon: HALOT
  rationale: 'El hebreo es una petición causativa: “hazme ver / muéstrame”. מַרְאֶה puede significar apariencia, aspecto o semblante. “Apariencia” conserva la amplitud del término mejor que “rostro”, que estrecha el sentido.'
- source_word: הַשְׁמִיעִינִי אֶת־קוֹלֵךְ
  english_pob_choice: let me hear your voice
  chosen_spanish: déjame oír tu voz
  alternatives_spanish:
  - hazme oír tu voz
  - permíteme oír tu voz
  lexicon: HALOT
  rationale: El hiphil literalmente significa “causarme oír”, pero en español la forma natural y fiel al tono rogativo es “déjame oír tu voz”.
- source_word: עָרֵב
  english_pob_choice: sweet
  chosen_spanish: suave
  alternatives_spanish:
  - dulce
  - agradable
  lexicon: HALOT
  rationale: El adjetivo puede expresar agradable, placentero o dulce. Opto por “suave” para la voz porque suena natural en español y mantiene la cualidad deleitosa sin sobredeterminar una dulzura excesivamente literal.
- source_word: נָאוֶה
  english_pob_choice: lovely
  chosen_spanish: hermosa
  alternatives_spanish:
  - linda
  - bella
  - encantadora
  lexicon: HALOT
  rationale: El adjetivo describe belleza o lozanía con registro poético. “Hermosa” comunica bien la valoración positiva y encaja con el paralelismo del verso.
- source_word: מַרְאַיִךְ / מַרְאֵיךְ
  english_pob_choice: appearance
  chosen_spanish: apariencia
  alternatives_spanish:
  - aspecto
  - semblante
  - rostro
  lexicon: HALOT
  rationale: La revisión inglesa prefirió “appearance” sobre “form” y el hebreo puede referirse al aspecto visible o al semblante. “Apariencia” preserva esa amplitud y mantiene la correspondencia con la segunda mención del verso.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente que sustituyó “form” por “appearance” en ambas ocurrencias de מַרְאֶה/מַרְאַיִךְ. La redacción española adopta “apariencia” para reflejar mejor esa decisión y conservar el paralelismo del verso. También se consideró la nota inglesa sobre la rareza de מַדְרֵגָה; en español se preserva la incertidumbre con una solución comprensible sin fijar demasiado la topografía.
  spanish_consistency_notes:
  - Se mantiene el registro poético y afectuoso del texto.
  - Se conserva la repetición de “apariencia” para reflejar la cohesión léxica del hebreo y del audit trail inglés.
  - No se sustituye la metáfora de ave por una expresión explicativa; se mantiene la imagen de cariño.
  - Se evita el calco rígido en la segunda mitad del verso, pero sin ampliar el sentido más allá de lo que el hebreo permite.
