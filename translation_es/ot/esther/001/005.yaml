revisions:
- from: Y cuando se cumplieron estos días, el rey dio un banquete[a] para todo el pueblo que se hallaba en Susa la ciudadela[b], desde el grande hasta el pequeño[c], durante siete días, en el patio del jardín del palacio del rey[d].
