  to: En la tierra no hay nadie como él[a], hecho sin temor[b].
  rationale: 'Se ajusta la cláusula final al sentido más directo del hebreo y al texto principal auditado del POB inglés: ''hecho sin temor'' preserva mejor la descripción del estado de la criatura. La lectura más interpretativa/teleológica se mantiene en nota como alternativa legítima. También se corrige la nota b para que no repita el texto principal.'
