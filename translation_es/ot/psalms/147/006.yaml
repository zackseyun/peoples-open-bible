translation:
  language: es
  text: Yahvé levanta a los humildes[a]; humilla a los impíos hasta la tierra[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sostiene» / «apoya a los humildes».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «hasta la tierra», es decir, hasta el suelo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מְעוֹדֵד
  english_pob_choice: lifts up
  chosen_spanish: sostiene
  alternatives_spanish:
  - levanta
  - fortalece
  - apoya
  lexicon: HALOT
  rationale: El participio puede expresar apoyar, sostener o fortalecer. En español, «sostiene» comunica bien la acción de dar apoyo efectivo a los humildes y conserva la idea de ayuda continua; además evita una metáfora más libre que «levanta» en una primera mitad donde el paralelo con «humilla» ya aporta el contraste vertical.
- source_word: עֲנָוִים
  english_pob_choice: the humble
  chosen_spanish: los humildes
  alternatives_spanish:
  - los mansos
  - los afligidos
  - los mansos y humildes
  lexicon: HALOT
  rationale: «Humildes» es la opción más clara y natural para el sentido moral-social del término en este paralelismo con «los impíos». Mantiene la amplitud semántica sin forzar el matiz de «afligidos».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - el SEÑOR
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se usa la forma española establecida en el proyecto para el Tetragrámaton. «Yahvé» preserva el nombre propio del pacto y evita la sustitución por un título.
- source_word: מַשְׁפִּיל
  english_pob_choice: brings ... down
  chosen_spanish: humilla
  alternatives_spanish:
  - derriba
  - abate
  - rebaja
  lexicon: HALOT
  rationale: El hifil de שׁפל significa hacer bajar, abatir o humillar. En español, «humilla» conserva el valor causativo y se ajusta bien al contraste con «sostiene»; el objeto «hasta la tierra» mantiene la imagen de abatimiento total.
- source_word: רְשָׁעִים
  english_pob_choice: the wicked
  chosen_spanish: los impíos
  alternatives_spanish:
  - los malvados
  - los perversos
  - los culpables
  lexicon: HALOT
  rationale: «Impíos» es un término bíblico y válido en español para רשעים; conserva el peso ético-religioso del término sin volverlo demasiado genérico.
- source_word: עֲדֵי אָרֶץ
  english_pob_choice: to the ground
  chosen_spanish: hasta la tierra
  alternatives_spanish:
  - hasta el suelo
  - hasta el polvo
  - a la tierra
  lexicon: HALOT
  rationale: La expresión hebrea intensifica la idea de descenso «hasta la tierra / el suelo». «Hasta la tierra» reproduce con fidelidad la imagen y permite mantener la fuerza del paralelo vertical. En una nota puede explicitarse que el sentido es «hasta el suelo».
theological_decisions:
- issue: Traducción del nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: Se preserva el nombre divino revelado en el texto hebreo. La forma «Yahvé» es la convención de este proyecto en español y mantiene la transparencia frente a la sustitución tradicional por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Valor de עֲנָוִים en el paralelismo
  english_pob_reading: the humble
  chosen_spanish_reading: los humildes
  alternative_spanish_readings:
  - los afligidos
  - los mansos
  rationale: El versículo contrapone a los humildes con los impíos. En español, «humildes» conserva la dimensión moral y social del contraste y evita cargar el texto con una lectura exclusivamente de sufrimiento.
  doctrine_reference: HALOT / contexto poético del Salmo 147:6
translation_notes:
  revision_awareness: Coincide con el audit trail inglés en la decisión principal de traducir יְהוָה por el nombre divino y en mantener el contraste vertical entre la acción hacia los humildes y la de abatir a los impíos. La redacción española ajusta «lifts up» a «sostiene» para un español natural sin perder el matiz de apoyo, y conserva la imagen intensiva de «hasta la tierra» con nota explicativa.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estándar del proyecto para יְהוָה.
  - Se evita «SEÑOR» para no ocultar el nombre divino.
  - «Humildes» y «impíos» conservan el paralelismo ético del hebreo.
  - La nota de «hasta la tierra» aclara la imagen sin alterar el texto principal.
