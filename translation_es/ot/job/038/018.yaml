translation:
  language: es
  text: ¿Has comprendido la amplitud de la tierra? Dime[a], si sabes todo esto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la anchura de la tierra».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִתְבֹּנַנְתָּ
  english_pob_choice: have you comprehended
  chosen_spanish: ¿Has comprendido...
  alternatives_spanish:
  - ¿Has considerado...
  - ¿Has entendido...
  - ¿Has percibido...
  lexicon: HALOT
  rationale: El hitpolel de בין expresa una observación atenta que llega a entender; «comprendido» conserva la fuerza del reto retórico y sugiere una aprehensión real, no solo una mirada superficial.
- source_word: עַד רַחֲבֵי אָרֶץ
  english_pob_choice: the expanse of the earth
  chosen_spanish: la amplitud de la tierra
  alternatives_spanish:
  - la anchura de la tierra
  - los espacios anchos de la tierra
  - la extensión de la tierra
  lexicon: HALOT
  rationale: La expresión literal habla de los «anchos» o «anchuras» de la tierra. En español, «amplitud» comunica de manera natural la idea de vastedad espacial sin perder el matiz de extensión amplia.
- source_word: הַגֵּד
  english_pob_choice: Tell me
  chosen_spanish: Háblame
  alternatives_spanish:
  - Declara
  - Respóndeme
  - Hazme saber
  lexicon: HALOT
  rationale: En este interrogatorio divino, el imperativo es directo. «Háblame» reproduce la confrontación en español actual con naturalidad y sin perder el tono imperativo.
- source_word: אִם
  english_pob_choice: if
  chosen_spanish: si
  alternatives_spanish:
  - si acaso
  - cuando
  lexicon: HALOT
  rationale: 'Introduce una condición retadora: «si conoces...». «Si» es la correspondencia directa y más clara en español.'
- source_word: יָדַעְתָּ
  english_pob_choice: you know
  chosen_spanish: conoces
  alternatives_spanish:
  - has sabido
  - entiendes
  - sabes
  lexicon: HALOT
  rationale: En una pregunta retórica, el perfecto hebreo puede expresarse en presente español para mantener fluidez. «Conoces» conserva el sentido de conocimiento real y actual sin sonar excesivamente abstracto.
- source_word: כֻלָּהּ
  english_pob_choice: all this
  chosen_spanish: todo esto
  alternatives_spanish:
  - todo ello
  - la totalidad de eso
  - lo entero
  lexicon: HALOT
  rationale: El pronombre retoma la amplitud de la tierra como un todo. «Todo esto» evita la idea idiomática de omnisciencia de «lo sabes todo» y refleja mejor el referente inmediato.
translation_notes:
  revision_awareness: El inglés POB revisó el cierre de «if you know it all» a «if you know all this» para evitar una lectura idiomática de omnisciencia. La versión española sigue esa revisión con «si conoces todo esto».
  spanish_consistency_notes:
  - Se mantuvo el paralelismo interrogativo-retador del hebreo.
  - Se evitó «SEÑOR» o vocabulario doctrinal no presente en el versículo.
  - «Amplitud» traduce el campo semántico de רחבי sin forzar un calco de «anchura» en el cuerpo principal; la alternativa queda en nota.
  - «Háblame» conserva el imperativo directo de הַגֵּד en un registro natural para el español bíblico contemporáneo.
