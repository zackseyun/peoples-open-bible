translation:
  language: es
  text: Dios vio a los hijos de Israel[a], y Dios supo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los israelitas». Literalmente, «los hijos de Israel».
    reason: lexical_alternative
  - marker: b
    text: 'O «Dios tomó nota», «Dios se interesó», o «Dios los reconoció». El hebreo simplemente dice: «Dios supo».'
