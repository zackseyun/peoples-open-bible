    unchanged: false
    changes_summary: Changed 'strike them down' to 'strike them' for closer lexical accuracy to the Hebrew, which simply says 'did not strike them.'
translation:
  language: es
  text: Pero los hijos de Israel no los hirieron[a], porque los líderes de la congregación les habían jurado[b] por Yahvé, el Dios de Israel. Y toda la congregación murmuró[c] contra los líderes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'los atacaron' o 'los mataron'. El verbo hebreo puede denotar golpear con violencia letal según el contexto.
    reason: lexical_alternative
  - marker: b
    text: O 'les habían hecho juramento'. El hebreo también puede expresarse como 'habían jurado a favor de ellos', pero en español 'les habían jurado' es la forma más natural en este contexto.
    reason: lexical_alternative
  - marker: c
    text: O 'toda la asamblea murmuró contra los líderes'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/לֹא הִכּוּ/ם
  english_pob_choice: did not strike them
  chosen_spanish: no los hirieron
  alternatives_spanish:
  - no los golpearon
  - no los atacaron
  - no los mataron
  lexicon: HALOT
  rationale: El hebreo הִכּוּ puede significar 'golpear' y, según el contexto, implicar violencia letal. En español, 'hirieron' conserva la fuerza concreta de un acto violento sin decidir innecesariamente por 'matar'.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - el pueblo de Israel
  lexicon: HALOT
  rationale: La expresión es literalmente 'hijos de Israel'. Se mantiene esa transparencia formal en español, con una forma natural y comprensible.
- source_word: נִשְׁבְּעוּ לָהֶם
  english_pob_choice: had sworn to them
  chosen_spanish: habían jurado a ellos
  alternatives_spanish:
  - les habían jurado
  - habían hecho juramento a ellos
  lexicon: HALOT
  rationale: El nifal de שׁבע expresa jurar o tomar juramento. El pluscuamperfecto refleja que el juramento precedía a la negativa de atacar.
- source_word: נְשִׂיאֵי הָעֵדָה
  english_pob_choice: the leaders of the congregation
  chosen_spanish: los líderes de la congregación
  alternatives_spanish:
  - los jefes de la asamblea
  - los príncipes de la congregación
  lexicon: HALOT
  rationale: נְשִׂיאִים se refiere a líderes o jefes reconocidos. 'Líderes' es claro en español moderno; 'congregación' conserva el sentido de la comunidad reunida.
- source_word: בַּיהוָה
  english_pob_choice: by Yahweh
  chosen_spanish: por Yahvé
  alternatives_spanish:
  - en Yahvé
  lexicon: HALOT
  rationale: Se preserva el nombre divino como 'Yahvé', conforme al estándar del proyecto. Con jurar, la preposición marca el referente por el cual se presta el juramento; 'por' es idiomático en español.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - el Dios de los israelitas
  lexicon: HALOT
  rationale: Es la construcción genitiva estándar y no presenta ambigüedad. 'Dios de Israel' es la forma más fiel y natural.
- source_word: וַיִּלֹּנוּ
  english_pob_choice: grumbled
  chosen_spanish: murmuró
  alternatives_spanish:
  - se quejó
  - murmuraron
  - protestó
  lexicon: HALOT
  rationale: El verbo לון en este contexto narra la queja colectiva contra los líderes. 'Murmuró' comunica bien el matiz bíblico de descontento comunitario; aunque el sujeto es plural, el verbo español puede leerse con el sustantivo colectivo 'toda la congregación'.
- source_word: כָל הָעֵדָה
  english_pob_choice: all the congregation
  chosen_spanish: toda la congregación
  alternatives_spanish:
  - toda la asamblea
  - la congregación entera
  lexicon: HALOT
  rationale: Conserva la totalidad del colectivo y mantiene consistencia con 'congregación' en la primera cláusula.
- source_word: עַל הַנְּשִׂיאִים
  english_pob_choice: against the leaders
  chosen_spanish: contra los líderes
  alternatives_spanish:
  - sobre los líderes
  - acerca de los líderes
  lexicon: HALOT
  rationale: El עַל tras לון indica el objeto de la murmuración/queja; 'contra' reproduce mejor el valor adversativo.
theological_decisions:
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se sigue la convención del proyecto de transliterar el Tetragrámaton como 'Yahvé', manteniendo visible el nombre de pacto en vez de ocultarlo con un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: עֵדָה como comunidad de pacto
  english_pob_reading: congregation
  chosen_spanish_reading: congregación
  alternative_spanish_readings:
  - asamblea
  - comunidad
  rationale: '''Congregación'' preserva el carácter de pueblo reunido sin proyectar una eclesiología posterior; además mantiene consistencia interna en la frase.'
  doctrine_reference: DOCTRINE.md Translation philosophy §5
translation_notes:
  revision_awareness: La revisión inglesa reciente ajustó 'strike them down' a 'strike them' para mayor precisión léxica. La redacción española evita sobredeterminar el resultado y conserva la negación simple de violencia en el verbo 'hirieron'.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para el nombre divino, conforme al estándar del proyecto.
  - '''Congregación'' se usa de forma consistente para עֵדָה en ambas cláusulas.'
  - La relación de autoridad se expresa con 'líderes' para נְשִׂיאִים, en registro claro y bíblico.
  - Las notas a pie están ancladas exactamente en los puntos léxicos ambiguos del texto.
  - Se conserva el tono narrativo bíblico sin arcaísmos innecesarios.
