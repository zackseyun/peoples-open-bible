translation:
  language: es
  text: para cumplir la palabra de Yahvé por boca de Jeremías[a], hasta que la tierra hubo gozado de sus sábados. Todos los días de su desolación guardó sábado[d][c][b], para cumplir setenta años.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «por medio de Jeremías». Literalmente: «por la boca de Jeremías».'
    reason: lexical_alternative
  - marker: b
    text: O «hubo recibido» o «hubo hecho compensación por» sus sábados; la idea es que la tierra recibió el descanso sabático que se le había negado.
    reason: lexical_alternative
  - marker: c
    text: Esta formulación evoca las advertencias del pacto acerca de que la tierra gozaría de sus sábados durante el exilio (véase Levítico 26:34–35).
    reason: cross_reference
  - marker: d
    text: O «reposó». El hebreo mantiene un juego de palabras entre «sus sábados» y «guardó sábado».
    reason: lexical_alternative
lexical_decisions:
- source_word: לְמַלֹּאות
  english_pob_choice: to fulfill
  chosen_spanish: para cumplir
  alternatives_spanish:
  - para completar
  - para llevar a cumplimiento
  lexicon: HALOT
  rationale: El infinitivo constructo con לְ expresa propósito o resultado. «Cumplir» comunica bien la idea de que el exilio ocurrió para que se realizara la palabra anunciada, sin perder la fuerza profética del hebreo.
- source_word: דְּבַר יְהוָה
  english_pob_choice: the word of Yahweh
  chosen_spanish: la palabra de Yahvé
  alternatives_spanish:
  - el mensaje de Yahvé
  lexicon: HALOT
  rationale: «דָּבָר» en este contexto profético conserva mejor el valor de «palabra» que de «mensaje», porque subraya el cumplimiento de una declaración divina concreta.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
  rationale: Se mantiene el nombre divino como «Yahvé», de acuerdo con la práctica del proyecto y con el valor del Tetragrámaton como nombre propio, no como título sustituido.
- source_word: בְּפִי יִרְמְיָהוּ
  english_pob_choice: by the mouth of Yirmeyahu
  chosen_spanish: por boca de Jeremías
  alternatives_spanish:
  - por medio de Jeremías
  - por la boca de Jeremías
  lexicon: HALOT
  rationale: En español, «por boca de» preserva la imagen idiomática de mediación profética sin sonar forzado. «Por medio de» es posible, pero pierde la metáfora concreta del hebreo.
- source_word: הָאָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  - la región
  lexicon: HALOT
  rationale: Aquí se refiere a la tierra de Judá en contexto histórico, no a la tierra global. «La tierra» mantiene la amplitud y la resonancia bíblica del término.
- source_word: שַׁבְּתוֹתֶיהָ
  english_pob_choice: its Sabbaths
  chosen_spanish: sus sábados
  alternatives_spanish:
  - sus reposos sabáticos
  - sus años sabáticos
  lexicon: HALOT
  rationale: «Sábados» conserva el plural del hebreo y el vínculo verbal con שָׁבָתָה. Aunque «reposos sabáticos» explicita más, resulta más pesado. «Años sabáticos» sería demasiado específico para este plural.
- source_word: כָּל יְמֵי הָשַּׁמָּה
  english_pob_choice: All the days of its desolation
  chosen_spanish: Todos los días de su desolación
  alternatives_spanish:
  - Durante todo el tiempo de su desolación
  - Todos los días en que estuvo desolada
  lexicon: HALOT
  rationale: La frase indica la totalidad del período de devastación. «Su desolación» hace explícito el referente y fluye de manera natural en español.
- source_word: שָׁבָתָה
  english_pob_choice: it kept Sabbath
  chosen_spanish: guardó sábado
  alternatives_spanish:
  - reposó
  - descansó
  lexicon: HALOT
  rationale: El hebreo conserva un juego de palabras entre el sustantivo «sábados» y el verbo «guardar sábado». «Guardó sábado» mantiene ese vínculo y sugiere el descanso sabático de la tierra.
- source_word: לְמַלֹּאות שִׁבְעִים שָׁנָה
  english_pob_choice: to fulfill seventy years
  chosen_spanish: para cumplir setenta años
  alternatives_spanish:
  - para completar setenta años
  - hasta completar setenta años
  lexicon: HALOT
  rationale: Se repite el verbo de cumplimiento para mantener la estructura del hebreo y el enlace con la primera cláusula. «Cumplir setenta años» suena natural y conserva la idea de un plazo profético que llega a su término.
theological_decisions:
- issue: Nombrar el Tetragrámaton en español
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: La elección preserva el nombre personal del pacto en vez de una sustitución litúrgica. Esto sigue la política del proyecto y evita borrar la referencia explícita al nombre divino presente en el hebreo.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Conservar la teología sabática del pasaje
  english_pob_reading: its Sabbaths ... it kept Sabbath
  chosen_spanish_reading: sus sábados ... guardó sábado
  alternative_spanish_readings:
  - sus reposos ... reposó
  - sus descansos sabáticos ... descansó
  rationale: El texto enlaza la devastación del exilio con el reposo sabático debido a la tierra, probablemente en eco de Levítico 26. «Sábados» y «guardó sábado» mantienen visible ese enlace léxico y teológico.
  doctrine_reference: Levítico 26:34–35
- issue: Relación entre Jeremías y la palabra cumplida
  english_pob_reading: by the mouth of Yirmeyahu
  chosen_spanish_reading: por boca de Jeremías
  alternative_spanish_readings:
  - por medio de Jeremías
  - según Jeremías
  rationale: La formulación conserva la mediación profética sin convertirla en una paráfrasis. La imagen de la «boca» expresa con fuerza que la palabra de Yahvé llegó mediante la voz del profeta.
  doctrine_reference: Profecía y cumplimiento
- issue: Matiz del verbo רצה aplicado a la tierra
  english_pob_reading: had enjoyed
  chosen_spanish_reading: hubo disfrutado
  alternative_spanish_readings:
  - hubo aceptado
  - hubo recibido
  rationale: «Disfrutado» intenta conservar la idea de que la tierra recibió y experimentó el descanso sabático que le correspondía. Aunque no es una expresión cotidiana para la tierra, refleja mejor el matiz relacional que «descansado» o «reposado» por sí solos.
  doctrine_reference: Eco de Levítico 26:34–35
translation_notes:
  revision_awareness: El último pase indicó que no hacían falta cambios y el control cruzado reportó alta concordancia con observaciones menores; por eso se conserva la estructura semántica del audit trail en una redacción española natural, sin suavizar el juego léxico de «sábados/guardó sábado».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino en coherencia con la política terminológica del proyecto.
  - Se conserva la alternancia léxica entre «sábados» y «guardó sábado» para reflejar el paralelismo hebreo.
  - «Boca de Jeremías» se normaliza en español como «por boca de Jeremías», sin perder la imagen de mediación profética.
  - La puntuación y el orden de la frase buscan leer con naturalidad en español moderno manteniendo el paralelismo del original.
