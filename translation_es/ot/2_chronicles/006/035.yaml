translation:
  language: es
  text: entonces escucha desde el cielo su oración y su súplica[a], y defiende su causa[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «petición de favor»; el hebreo תְּחִנָּה expresa una súplica insistente por misericordia o favor.
    reason: lexical_alternative
  - marker: b
    text: 'O «hazles justicia» o «ejecuta su juicio». El hebreo dice literalmente: «haz su justicia/juicio».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשָׁמַעְתָּ
  english_pob_choice: then hear
  chosen_spanish: entonces escucha
  alternatives_spanish:
  - y escucha
  - oye entonces
  - escucha
  lexicon: HALOT
  rationale: El imperfecto perfecto con waw en este contexto de súplica funciona como petición dirigida a Dios. En español, «escucha» comunica con naturalidad la oración. «Entonces» preserva la relación discursiva con la condición anterior sin volverla rígida.
- source_word: מִן הַשָּׁמַיִם
  english_pob_choice: from heaven
  chosen_spanish: desde los cielos
  alternatives_spanish:
  - desde el cielo
  - desde los cielos
  - del cielo
  lexicon: HALOT
  rationale: El hebreo está en plural, y aunque en español «cielo» puede funcionar bien, aquí «los cielos» conserva mejor la forma del original y el lenguaje cultual de oración. «Desde» expresa bien el origen de la respuesta divina.
- source_word: תְּפִלָּתָם
  english_pob_choice: their prayer
  chosen_spanish: su oración
  alternatives_spanish:
  - su oración
  - su plegaria
  - su oración colectiva
  lexicon: HALOT
  rationale: תְּפִלָּה es el término general para oración. El sufijo plural se puede verter naturalmente con «su» en español por referencia colectiva al pueblo; «oración» es el equivalente más claro y fiel.
- source_word: תְּחִנָּתָם
  english_pob_choice: their plea for favor
  chosen_spanish: su súplica[a]
  alternatives_spanish:
  - su súplica
  - su ruego
  - su petición de favor
  lexicon: HALOT
  rationale: תְּחִנָּה denota una petición intensa de gracia o favor. «Súplica» conserva la fuerza de ruego insistente mejor que una repetición demasiado explicativa. Se marca nota porque el inglés POB explicitó el matiz de favor, que en español puede quedar implícito en el término.
- source_word: וְעָשִׂיתָ מִשְׁפָּטָם
  english_pob_choice: maintain their cause
  chosen_spanish: mantén su causa
  alternatives_spanish:
  - hazles justicia
  - defiende su causa
  - ejecuta su juicio
  lexicon: HALOT
  rationale: 'מִשְׁפָּט aquí conserva su sentido forense: actuar judicialmente en favor del pueblo. «Mantén su causa» refleja la lectura del POB inglés («maintain their cause») y sugiere vindicación/defensa sin reducirlo a un tecnicismo jurídico ni a una formulación extraña en español.'
theological_decisions:
- issue: Sentido forense de מִשְׁפָּט en la respuesta divina
  english_pob_reading: maintain their cause
  chosen_spanish_reading: mantén su causa
  alternative_spanish_readings:
  - hazles justicia
  - ejecuta su juicio
  - defiende su causa
  rationale: 'El texto pide más que oír: pide que Dios actúe como juez a favor de su pueblo. «Mantén su causa» conserva la dimensión judicial y relacional del hebreo sin imponer una sola glosa técnica. Se evita neutralizar el pasaje en un mero ‘escuchar’ devocional.'
  doctrine_reference: Translation philosophy §§1, 5, 6
- issue: Tratamiento del plural hebreo de «los cielos»
  english_pob_reading: from heaven
  chosen_spanish_reading: desde los cielos
  alternative_spanish_readings:
  - desde el cielo
  - del cielo
  rationale: El plural hebreo no siempre exige plural en español, pero aquí el plural ayuda a transparentar la forma original y armoniza con el lenguaje de la dedicación del templo. No implica una doctrina distinta sobre el lugar de Dios, sino una decisión de fidelidad formal moderada.
  doctrine_reference: Translation philosophy §2
translation_notes:
  revision_awareness: Se tomó en cuenta el último pase de revisión del POB inglés, que prefirió «maintain their cause» a «uphold their cause» por mayor formalidad. La versión española refleja esa misma dirección con «mantén su causa», evitando un giro demasiado interpretativo y preservando el matiz forense del hebreo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma editorial habitual del proyecto solo cuando aparezca el Tetragrámaton; en este versículo no aparece.
  - «Cielos» se usó en plural para reflejar la forma hebrea, aunque en español singular también sería natural.
  - La elección de «súplica» evita recargar el verso con una explicación, dejando el matiz de favor en la nota.
  - «Causa» sigue el campo semántico judicial del hebreo משפט y el POB inglés revisado.
