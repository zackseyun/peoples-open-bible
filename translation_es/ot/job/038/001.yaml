translation:
  language: es
  text: Entonces Yahvé respondió a Job desde en medio del torbellino y dijo:[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «desde la tempestad».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַן
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió
  lexicon: HALOT
  rationale: ענה en esta fórmula narrativa expresa dar respuesta a una intervención previa. En español, «respondió» mantiene la relación formal con los discursos de Job y suena natural en registro bíblico.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: El texto hebreo usa el nombre propio del pacto, no un título. La política del proyecto pide transliterar יְהוָה como «Yahvé», conservando el nombre divino y evitando la sustitución por un título.
- source_word: אֶת אִיּוֹב
  english_pob_choice: Job
  chosen_spanish: a Job
  alternatives_spanish:
  - a Job
  lexicon: HALOT
  rationale: El marcador de objeto directo no se traduce; en español sí conviene expresar la relación con la preposición «a». El nombre propio se conserva como «Job».
- source_word: מִן־הַסְּעָרָה
  english_pob_choice: out of the whirlwind
  chosen_spanish: desde el torbellino
  alternatives_spanish:
  - desde la tempestad
  - desde el vendaval
  lexicon: HALOT
  rationale: סְעָרָה admite varios matices de violencia atmosférica. «Torbellino» recoge bien la imagen tradicional y la fuerza teofánica sin perder la ambigüedad del hebreo; «desde» conserva la dirección espacial del מן.
- source_word: וַיֹּאמַר
  english_pob_choice: and said
  chosen_spanish: y dijo
  alternatives_spanish:
  - y dijo
  lexicon: HALOT
  rationale: La forma narrativa וַיֹּאמַר se vierte con la fórmula directa «y dijo», que preserva la secuencia verbal y el tono solemne del relato.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: La lectura inglesa documenta la decisión de usar el nombre divino. En español, «Yahvé» es el equivalente coherente con la política del proyecto y mantiene el valor teológico del nombre propio revelado.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Naturaleza de מִן־הַסְּעָרָה en contexto teofánico
  english_pob_reading: from the whirlwind
  chosen_spanish_reading: desde el torbellino
  alternative_spanish_readings:
  - desde la tempestad
  - desde el vendaval
  rationale: La tradición inglesa preserva «whirlwind» como alternativa lexical; en español «torbellino» conserva ese matiz específico. No se reduce a una palabra más genérica para no borrar la imaginería teofánica del pasaje.
  doctrine_reference: 'Translation philosophy: preserve lexical/theological tension rather than over-resolve it'
translation_notes:
  revision_awareness: El borrador inglés pasó por una revisión que favoreció «whirlwind» sobre «storm» para acercarse más al hebreo. La versión española sigue esa línea con «torbellino», manteniendo la equivalencia dinámica natural en español y la precisión lexicográfica.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente con la política del proyecto para יהוה.
  - Se evita «SEÑOR» como sustituto litúrgico, porque el texto fuente conserva el nombre propio.
  - «Desde el torbellino» refleja mejor el matiz revisado del audit trail inglés que una opción más genérica.
  - La puntuación final con dos puntos antes del habla directa se mantiene como en el registro narrativo bíblico.
