revisions:
- from: Y estará con él[a], y leerá en él todos los días de su vida, para que aprenda a temer a Yahvé su Dios, a guardar todas las palabras de esta ley y estos estatutos[b][c], para cumplirlos.
  to: Y estará con él, y leerá en él[a] todos los días de su vida, para que aprenda a temer a Yahvé su Dios, a guardar todas las palabras de esta ley y estos estatutos[b][c], para hacerlos.
  rationale: Se reubica la nota [a] en la frase correcta, «leerá en él», porque esa es la expresión a la que corresponde la alternativa léxica. Además, se cambia «para cumplirlos» por «para hacerlos» para reflejar con mayor fidelidad el hebreo לַעֲשֹׂתָם y la decisión auditada «to do them», sin perder claridad en español.
