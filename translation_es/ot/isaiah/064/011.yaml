    rationale: Aunque léxicamente posible para תִתְאַפַּק, en español suena algo forzado y menos claro que una formulación como «te reprimirás» o «te contendrás a causa de estas cosas». El problema es de legibilidad más que de exactitud bruta.
  - severity: medium
    issue: «tanto» atenúa la intensidad de עַד מְאֹד
    rationale: La expresión hebrea intensifica con fuerza el verbo de aflicción. «Tanto» es entendible, pero no transmite bien el grado enfático que el inglés auditado expresó como «so very severely».
  - severity: low
    issue: La nota [a] usa «te detendrás», que no refleja tan bien la autorrestricción interna
    rationale: La alternativa española propuesta en la nota no es la mejor correspondencia para el hitpael de אפק. «Te reprimirás» o «te contendrás a causa de estas cosas» sería más precisa.
  revised_spanish_text: ¿Te reprimirás[a] por estas cosas, Yahvé? ¿Seguirás callando y afligiéndonos[b] en gran manera?
