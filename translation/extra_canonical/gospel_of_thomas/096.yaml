translation:
  text: Jesus said[a], "The Father's kingdom is like a woman. She took a little leaven,
    hid it in dough, and made it into big loaves. Whoever has ears[c][b], let him
    hear."
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ‘Leaven’ (ⲥⲓⲣ) refers to traditional sourdough starter, not modern commercial
      yeast.
    reason: cultural_note
  - marker: b
    text: ⲛⲟⲩⲛⲟϭ ⲛⲛⲟⲉⲓⲕ can also be read as ‘a large amount of bread’ or ‘many loaves.’
      We render ‘big loaves’ to keep the concrete image of size.
    reason: lexical_alternative
  - marker: c
    text: Several letters are damaged or restored in NHAM02.49, but the reading ‘a
      woman … hid it in dough … made it into big loaves’ is secure (Dilley 2025).
    reason: lacuna_or_restoration
lexical_decisions:
- source_word: ⲙⲛⲧⲣⲣⲟ
  chosen: kingdom
  alternatives:
  - kingship
  - royal power
  lexicon: Crum; Layton
  rationale: Standard Coptic expression for ‘kingship/kingdom’; in Thomas this idiom
    refers to the divine reign. ‘Kingdom’ preserves the established sense without
    over-interpretation.
- source_word: ⲡⲉⲓⲱⲧ
  chosen: the Father
  alternatives:
  - the parent
  lexicon: Crum
  rationale: Common Coptic designation for God in Thomas. ‘Father’ reflects the explicit
    masculine theonym in the text.
- source_word: ⲥϩⲓⲙⲉ
  chosen: woman
  alternatives:
  - wife
  lexicon: Crum
  rationale: Basic sense is ‘woman’; context does not require ‘wife’.
- source_word: ⲕⲟⲩⲓ
  chosen: a little
  alternatives:
  - small
  - a small amount
  lexicon: Crum
  rationale: Functions partitively with following genitive (‘of leaven’). ‘A little’
    captures quantity.
- source_word: ⲥⲓⲣ
  chosen: leaven
  alternatives:
  - yeast
  - sourdough starter
  lexicon: Crum
  rationale: Traditional term ‘leaven’ preserves ancient baking context; ‘yeast’ could
    mislead toward modern commercial yeast.
- source_word: ϩⲱⲡ
  chosen: hid
  alternatives:
  - concealed
  lexicon: Crum
  rationale: Core meaning is ‘to hide, conceal.’ Simple past ‘hid’ keeps Thomas’s
    terseness.
- source_word: ϣⲱⲧⲉ
  chosen: dough
  alternatives:
  - meal
  - flour
  lexicon: Crum
  rationale: In baking context the target is the mixed mass; ‘dough’ is the best fit.
- source_word: ⲉⲓⲣⲉ … ⲛⲟⲩⲛⲟϭ ⲛⲛⲟⲉⲓⲕ
  chosen: made it into big loaves
  alternatives:
  - made it into great loaves
  - made it into much bread
  - caused it to become many loaves
  lexicon: Crum; Layton
  rationale: ⲉⲓⲣⲉ + object + ⲛⲟⲩⲛⲟϭ ⲛⲛⲟⲉⲓⲕ expresses resulting state. We opt for size
    emphasis (‘big loaves’) but note possible quantity sense.
- source_word: ⲛⲟϭ
  chosen: big
  alternatives:
  - great
  - large
  - many
  lexicon: Crum
  rationale: Adjective of magnitude; context with ‘loaves’ can indicate size or abundance.
    We render ‘big’ to preserve concrete imagery.
- source_word: ⲛⲟⲉⲓⲕ
  chosen: loaves
  alternatives:
  - bread
  lexicon: Crum
  rationale: Plural ‘loaves’ is explicit; avoids genericizing to ‘bread’.
- source_word: ⲙⲁⲁϫⲉ
  chosen: ears
  alternatives: []
  lexicon: Crum
  rationale: Standard anatomical term; plural is intended.
- source_word: ⲥⲱⲧⲙ
  chosen: hear
  alternatives:
  - listen
  lexicon: Crum; Layton
  rationale: Thomas regularly uses the hearing formula; ‘hear’ is the conventional,
    concise rendering.
textual_note: Dialect is primarily Sahidic with Lycopolitan features. The repeated
  aNTOS- forms (ⲁⲛⲧⲟⲥϫⲓ / ⲁⲛⲧⲟⲥϩⲱⲡⲛⲧⲟϥ / ⲁⲛⲧⲟⲥⲉⲓⲣⲉⲛⲧⲟϥ) reflect a Lycopolitan-flavored
  3sg feminine past/perfective narrative sequence equivalent to Sahidic ⲁⲥ-. Minor
  surface damage on NHAM02.49 affects a few letters (e.g., ⲡ̣[ⲉϫ]ⲉ̣ⲓⲥ …; ⲉⲥⲧⲛ̄ⲧⲱ[ⲛ
  ⲉⲩ]ⲥϩⲓⲙⲉ; ⲁ[ⲥϩ]ⲟ̣ⲡϥ; ⲛ̄ϩⲛ̄ⲛⲟ[ϭ ⲛ]ⲛⲟⲉⲓⲕ; ⲙⲁ[ⲣⲉ]ϥ̣ⲥⲱⲧⲙ̄), but Dilley’s normalization
  yields the unambiguous reading given here. No lacuna affects meaning, and no restorations
  have been silently supplied in the translation.
