translation:
  language: es
  text: Hijo de hombre, estos hombres han puesto sus ídolos[a] en su corazón y han colocado el tropiezo de su iniquidad delante de sus rostros[b]. ¿Acaso he de dejar que me consulten?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo גִלּוּלִים es un término fuertemente despectivo para los ídolos.
    reason: lexical_alternative
  - marker: b
    text: 'O: «¿Acaso debería ser consultado por ellos?». El hebreo intensifica la pregunta e implica una respuesta negativa.'
    reason: alternative_reading
lexical_decisions:
- source_word: בֶּן אָדָם
  english_pob_choice: Son of man
  chosen_spanish: Hijo de hombre
  alternatives_spanish:
  - Ser humano
  - Mortal
  lexicon: HALOT
  rationale: Se conserva la fórmula profética fija de Ezequiel. En español, 'Hijo de hombre' mantiene el eco idiomático mejor que una suavización como 'ser humano' o 'mortal'.
- source_word: הָאֲנָשִׁים הָאֵלֶּה
  english_pob_choice: these men
  chosen_spanish: estos hombres
  alternatives_spanish:
  - estas personas
  - estos varones
  lexicon: HALOT
  rationale: אֲנָשִׁים es masculino plural y aquí alude a los ancianos varones del contexto. 'Hombres' preserva esa referencia sin neutralizarla.
- source_word: הֶעֱלוּ
  english_pob_choice: have set up
  chosen_spanish: han puesto
  alternatives_spanish:
  - han levantado
  - han instalado
  lexicon: HALOT
  rationale: Aunque el verbo puede significar 'hacer subir/levantar', con 'ídolos' y 'en su corazón' el sentido es de colocar o instalar interiormente. 'Han puesto' transmite bien esa acción sin forzar el español.
- source_word: גִלּוּלֵיהֶם
  english_pob_choice: their idols
  chosen_spanish: sus ídolos
  alternatives_spanish:
  - sus ídolos abominables
  - sus imágenes
  lexicon: HALOT
  rationale: El término hebreo es despectivo; el POB inglés lo vertió como 'idols' en el texto principal. En español se mantiene 'ídolos' por claridad, reservando el matiz peyorativo para una nota.
- source_word: עַל לִבָּם
  english_pob_choice: in their hearts
  chosen_spanish: en su corazón
  alternatives_spanish:
  - sobre su corazón
  - en lo íntimo de su corazón
  lexicon: HALOT
  rationale: La imagen hebrea expresa adhesión interior. 'En su corazón' suena natural en español y conserva el valor metafórico de orientación interna.
- source_word: מִכְשׁוֹל עֲוֺנָם
  english_pob_choice: the stumbling block of their iniquity
  chosen_spanish: el tropiezo de su iniquidad
  alternatives_spanish:
  - la piedra de tropiezo de su culpa
  - el obstáculo de su pecado
  lexicon: HALOT
  rationale: '''מִכְשׁוֹל'' es ''tropiezo'' o causa de caída; ''עָוֹן'' carga con el peso moral de ''iniquidad''. La combinación conserva el registro profético y la gravedad del original.'
- source_word: נָתְנוּ נֹכַח פְּנֵי/הֶם
  english_pob_choice: have placed ... before their faces
  chosen_spanish: han colocado ... delante de su rostro
  alternatives_spanish:
  - han puesto ... frente a su rostro
  - lo han presentado ante su cara
  lexicon: HALOT
  rationale: La expresión espacial debe seguir siendo visible. 'Delante de su rostro' conserva la imagen de algo expuesto intencionalmente ante ellos; 'rostro' también mantiene el paralelismo hebreo con 'faces'.
- source_word: הַאִדָּרֹשׁ אִדָּרֵשׁ לָהֶם
  english_pob_choice: Should I indeed let myself be consulted by them?
  chosen_spanish: ¿Acaso debería ser consultado por ellos?
  alternatives_spanish:
  - ¿Debería en verdad ser consultado por ellos?
  - ¿Debería acaso permitir que me consulten?
  lexicon: HALOT
  rationale: El nifal de דרש aquí significa ser consultado o inquirido, especialmente para buscar un oráculo. La pregunta retórica se conserva sin añadir un 'no' explícito, como en el inglés POB.
theological_decisions:
- issue: Consulta divina por personas que mantienen ídolos en el corazón
  english_pob_reading: 'The clause is rendered as a rhetorical refusal: ''Should I indeed let myself be consulted by them?'''
  chosen_spanish_reading: 'La cláusula se traduce como una negativa retórica implícita: ''¿Acaso debería ser consultado por ellos?'''
  alternative_spanish_readings:
  - ¿Debería ser consultado por ellos en absoluto?
  - ¿Debería permitirles consultarme?
  rationale: El hebreo usa infinitivo absoluto con imperfecto para intensificar la pregunta. En el contexto, la fuerza esperada es negativa, pero conviene mantener la forma interrogativa sin explicitar una negación que el texto no formula directamente.
  doctrine_reference: Preservar la tensión teológica en vez de resolverla; equivalencia óptima.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto hebreo y el audit trail inglés: conserva la fórmula profética ''Hijo de hombre'', el valor despectivo de גִלּוּלִים mediante una nota, la imagen espacial de ''delante de su rostro'' y la pregunta retórica intensificada de דרש sin convertirla en una negación explícita. No se introdujeron revisiones posteriores en el paquete fuente.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' según la norma del proyecto cuando corresponda; en este versículo no aparece el tetragrámaton.
  - '''Ídolos'' se mantiene en el cuerpo del texto por legibilidad, con nota para el matiz peyorativo de גִלּוּלִים.'
  - '''Iniquidad'' conserva el registro profético y jurídico de עָוֹן, en línea con la terminología del proyecto.'
  - '''Rostro'' se prefirió a ''cara'' para reflejar mejor el paralelismo semítico y el tono bíblico sin sonar arcaico.'
