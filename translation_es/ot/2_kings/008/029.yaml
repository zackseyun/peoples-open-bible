base_translation:
  language: en
  yaml_path: translation/ot/2_kings/008/029.yaml
  text: Then King Yoram returned to Jezreel to recover from the wounds that the Arameans had inflicted on him at Ramah when he fought against Hazael king of Aram[a]. And Ahaziah son of Jehoram, king of Judah, went down to see Yoram son of Ahab in Jezreel[c][b], because he was sick.
  footnotes:
  - marker: a
    text: Or 'to be healed' for 'to recover.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'Arameans'; traditionally 'Syrians.'
    reason: lexical_alternative
  - marker: c
    text: Or 'to visit Yoram.' The Hebrew literally says 'to see Yoram.'
    reason: lexical_alternative
