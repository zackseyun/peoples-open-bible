translation:
  language: es
  text: Pero Manasés no expulsó a Bet-seán y sus ciudades dependientes[a], ni a Tanac y sus ciudades dependientes, ni a los habitantes de Dor y sus ciudades dependientes, ni a los habitantes de Ibleam y sus ciudades dependientes, ni a los habitantes de Meguidó y sus ciudades dependientes; y los cananeos persistieron en habitar en esta tierra[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: “sus hijas”, un modismo para las ciudades o asentamientos dependientes de una ciudad principal.'
    reason: cultural_note
  - marker: b
    text: 'O: “y los cananeos se resolvieron a habitar en esta tierra”. El verbo hebreo puede expresar disposición o determinación; el texto principal sigue el sentido contextual.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹרִישׁ
  english_pob_choice: did not dispossess
  chosen_spanish: no expulsó
  alternatives_spanish:
  - no desposeyó
  - no desalojó
  - no expulsó de su posesión
  lexicon: HALOT
  rationale: El hifil de ירשׁ aquí expresa causar que otro pierda la posesión del territorio; en español, "expulsó" comunica bien la acción efectiva sin sonar forzado. "No desposeyó" sería más formal pero menos natural; "desalojó" puede sonar demasiado moderno o administrativo.
- source_word: בְּנוֹתֶיהָ
  english_pob_choice: its daughter towns
  chosen_spanish: sus ciudades dependientes
  alternatives_spanish:
  - sus ciudades hijas
  - sus aldeas dependientes
  - sus poblados dependientes
  lexicon: HALOT
  rationale: El hebreo dice literalmente "sus hijas", un modismo para asentamientos subordinados a una ciudad principal. En español, "ciudades dependientes" conserva la relación jerárquica y evita una metáfora poco clara. No se usa "hijas" en el texto principal para no oscurecer el sentido.
- source_word: ישב / יוֹשְׁבֵי
  english_pob_choice: the inhabitants of
  chosen_spanish: los habitantes de
  alternatives_spanish:
  - los que habitaban en
  - los moradores de
  - los pobladores de
  lexicon: HALOT
  rationale: Los participios de ישׁב designan a quienes residen en un lugar. "Los habitantes de" es natural en español y mantiene el sentido colectivo.
- source_word: וַיּוֹאֶל
  english_pob_choice: persisted
  chosen_spanish: persistieron
  alternatives_spanish:
  - se resolvieron a quedarse
  - se determinaron a habitar
  - consintieron en
  lexicon: HALOT
  rationale: El verbo puede expresar disposición o determinación; en este contexto, después del fracaso de Manasés, el sentido es que los cananeos se mantuvieron decididos a permanecer. "Persistieron" reproduce esa fuerza contextual de manera idiomática.
- source_word: הַכְּנַעֲנִי
  english_pob_choice: the Canaanites
  chosen_spanish: los cananeos
  alternatives_spanish:
  - el cananeo
  lexicon: HALOT
  rationale: Aunque el hebreo es singular morfológico, funciona colectivamente para el pueblo cananeo. En español, el plural es la forma más natural y fiel al valor colectivo.
- source_word: לָשֶׁבֶת בָּאָרֶץ הַזֹּאת
  english_pob_choice: in dwelling in this land
  chosen_spanish: en habitar esta tierra
  alternatives_spanish:
  - para habitar esta tierra
  - en permanecer en esta tierra
  - en morar en esta tierra
  lexicon: HALOT
  rationale: El infinitivo con ל expresa la acción en la que persistieron. "En habitar esta tierra" conserva la construcción y el demostrativo hebreo sin añadir matices no presentes.
- source_word: בֵּית שְׁאָן / תַּעְנַךְ / דּוֹר / יִבְלְעָם / מְגִדּוֹ
  english_pob_choice: Beth-shean, Taanach, Dor, Ibleam, Megiddo
  chosen_spanish: Bet-seán, Tanac, Dor, Ibleam y Meguidó
  alternatives_spanish:
  - Bet-shean, Taanac, Dor, Ibleam y Meguido
  - Betseán, Tanac, Dor, Ibleam y Megiddo
  lexicon: project standard transliteration
  rationale: Se transliteran los nombres propios según una forma castellana amplia y reconocible. "Meguidó" y "Bet-seán" ayudan a una lectura natural en español; se mantiene la correspondencia con los topónimos del hebreo.
theological_decisions:
- issue: 'La frase final וַיּוֹאֶל הַכְּנַעֲנִי לָשֶׁבֶת בָּאָרֶץ הַזֹּאת admite dos matices: voluntad/determinación o simple persistencia.'
  english_pob_reading: The Canaanites persisted in dwelling in this land.
  chosen_spanish_reading: y los cananeos persistieron en habitar esta tierra
  alternative_spanish_readings:
  - y los cananeos se resolvieron a habitar esta tierra
  - y el cananeo quiso habitar esta tierra
  rationale: 'Se conserva el sentido contextual adoptado por el POB inglés: no meramente que comenzaron a vivir allí, sino que siguieron decididos a permanecer. "Persistieron" comunica bien la resistencia a salir sin exagerar el aspecto volitivo.'
  doctrine_reference: 'Josué/Jueces: la posesión de la tierra bajo el pacto y la persistencia de los pueblos cananeos; no hay doctrina controvertida, sino una decisión de matiz semántico.'
translation_notes:
  revision_awareness: Se siguió el sentido ya estabilizado en el auditable inglés POB, sin cambios de revisión relevantes; la única tensión principal está en el modismo hebreo "sus hijas" y en el valor de וַיּוֹאֶל, ambos reflejados en notas.
  spanish_consistency_notes:
  - Se usa "Yahvé" solo cuando el hebreo lo exige; este versículo no lo contiene.
  - '"Los cananeos" se mantiene en plural colectivo para reflejar el sustantivo singular con sentido de pueblo.'
  - Los topónimos se han adaptado a formas castellanas comunes y consistentes dentro del versículo.
  - Se evita "SEÑOR" porque no aparece el Tetragrámaton en este pasaje.
