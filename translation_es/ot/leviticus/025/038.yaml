revisions:
- from: Yo soy Yahvé, su Dios[a], que los saqué de la tierra de Egipto para darles la tierra de Canaán, para ser su Dios.
  to: Yo soy Yahvé, el Dios de ustedes[a], que los saqué de la tierra de Egipto para darles la tierra de Canaán, para ser el Dios de ustedes.
  rationale: 'La revisión no cambia el sentido, pero mejora la claridad referencial y la naturalidad del español neutral al explicitar la segunda persona plural en la fórmula pactual: «el Dios de ustedes ... para ser el Dios de ustedes». Esto preserva mejor el valor de אֱלֹהֵיכֶם / לָכֶם לֵאלֹהִים para lectores hispanohablantes sin introducir paráfrasis. La nota sobre el Tetragrama se mantiene sin cambios.'
