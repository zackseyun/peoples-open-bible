translation:
  language: es
  text: Entonces salió uno al campo a recoger hierbas[a]; y halló una vid silvestre y recogió de ella calabazas silvestres, llenando su manto. Luego vino y las cortó en la olla del guiso[c][b], porque no sabían lo que eran.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘verdes’ para אֹרֹת. El hebreo se refiere de forma amplia a plantas comestibles recogidas en el campo.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, ‘vid del campo’ ... ‘calabazas del campo’; es decir, una vid silvestre que produce calabazas silvestres.
    reason: lexical_alternative
  - marker: c
    text: O ‘ya que no sabían’ / ‘pues no sabían’. La conjunción hebrea puede leerse de modo explicativo o causal.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶחָד
  english_pob_choice: one man
  chosen_spanish: uno
  alternatives_spanish:
  - un hombre
  - uno de ellos
  lexicon: HALOT
  rationale: En español, el numeral sustantivado “uno” conserva la referencia individual sin añadir innecesariamente “hombre”, que no está explícito en el hebreo.
- source_word: לְלַקֵּט אֹרֹת
  english_pob_choice: to gather herbs
  chosen_spanish: recoger hierbas
  alternatives_spanish:
  - recoger verdes
  - juntar hierbas comestibles
  lexicon: HALOT
  rationale: אֹרֹת designa plantas comestibles recogidas del campo. “Hierbas” es una solución natural y suficientemente amplia en español para este contexto culinario.
- source_word: גֶּפֶן שָׂדֶה
  english_pob_choice: a wild vine
  chosen_spanish: una vid silvestre
  alternatives_spanish:
  - una vid del campo
  - una vid agreste
  lexicon: HALOT
  rationale: La expresión comunica mejor en español como una vid no cultivada. “Silvestre” preserva el contraste con la planta domesticada sin volver el texto técnico.
- source_word: פַּקֻּעֹת שָׂדֶה
  english_pob_choice: wild gourds
  chosen_spanish: calabazas silvestres
  alternatives_spanish:
  - güisquiles silvestres
  - güeros silvestres
  lexicon: HALOT
  rationale: El término hebreo apunta a frutos silvestres de la familia de las calabazas/gourds. “Calabazas silvestres” comunica el sentido general sin sobreespecificar la especie.
- source_word: מְלֹא בִגְדוֹ
  english_pob_choice: filling his garment
  chosen_spanish: llenando su vestido
  alternatives_spanish:
  - llenando su manto
  - hasta llenar su ropa
  lexicon: HALOT
  rationale: “Vestido” mantiene el sentido del textil usado como recipiente y sigue la imagen concreta del hebreo. “Manto” sería posible, pero introduce una identificación más específica que no exige el texto.
- source_word: וַיְפַלַּח
  english_pob_choice: sliced them
  chosen_spanish: las cortó
  alternatives_spanish:
  - las rebanó
  - las partió
  lexicon: HALOT
  rationale: El verbo indica cortar o partir el material antes de echarlo al recipiente. En español, “las cortó” es claro y no añade matices no seguros como “rebanó”.
- source_word: סִיר הַנָּזִיד
  english_pob_choice: the pot of stew
  chosen_spanish: la olla del guiso
  alternatives_spanish:
  - la olla del estofado
  - el cazo del guiso
  lexicon: HALOT
  rationale: נָזִיד es un plato cocido tipo guiso/estofado. “Olla del guiso” es natural y transparente en español contemporáneo.
- source_word: כִּי לֹא יָדָעוּ
  english_pob_choice: though they did not know what they were
  chosen_spanish: porque no sabían lo que eran
  alternatives_spanish:
  - pues no sabían lo que eran
  - ya que no sabían lo que eran
  - aunque no sabían lo que eran
  lexicon: HALOT
  rationale: El hebreo כִּי puede ser causal o explicativo; aquí el flujo narrativo admite una causal en español muy natural. Se explicita el objeto implícito (“lo que eran”) para evitar ambigüedad.
translation_notes:
  revision_awareness: 'Coincide con el pasaje de referencia y con el audit trail inglés en sus decisiones principales: recolección de plantas comestibles, vid silvestre, frutos silvestres, llenado del vestido, corte en la olla y lectura causal/explicativa de כִּי. No se documentan revisiones previas que alteren la base de traducción.'
  spanish_consistency_notes:
  - Se mantiene “Yahvé” fuera de este versículo porque el texto no contiene el tetragrámaton.
  - Se evita “Cristo/Mesías” por no estar presente en el verso.
  - Se conserva un registro narrativo simple y directo, acorde con el hebreo.
  - La secuencia verbal en pretérito perfecto simple sigue el ritmo narrativo del original.
