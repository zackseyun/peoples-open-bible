translation:
  language: es
  text: Muchos[a], cuanto más eran honrados por la gran bondad de sus benefactores, tanto más se volvieron arrogantes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «pensaron más de sí mismos». El griego dice literalmente «pensaron cosas mayores», un modismo para volverse orgullosos o arrogantes.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πολλοὶ
  english_pob_choice: Many
  chosen_spanish: Muchos
  alternatives_spanish:
  - Muchas personas
  - Muchos de ellos
  lexicon: BDAG
  rationale: El sustantivo/adjetivo plural introduce una observación general; «Muchos» conserva brevedad y naturalidad en español.
- source_word: τῇ πλείστῃ ... χρηστότητι
  english_pob_choice: because of the greatest kindness
  chosen_spanish: por la grandísima bondad
  alternatives_spanish:
  - por la máxima bondad
  - a causa de la gran benevolencia
  - por la extremada bondad
  lexicon: BDAG
  rationale: El dativo expresa la base o causa de la honra recibida. «Bondad» comunica χρηστότης de manera natural en español, y «grandísima» refleja el superlativo πλείστῃ sin forzar una construcción literal.
- source_word: τῶν εὐεργετούντων
  english_pob_choice: of their benefactors
  chosen_spanish: de sus benefactores
  alternatives_spanish:
  - de los que les hacían bien
  - de quienes les beneficiaban
  lexicon: BDAG
  rationale: El participio señala a los que actúan con beneficencia. «Benefactores» es idiomático y mantiene la relación de favor recibido.
- source_word: πυκνότερον
  english_pob_choice: the more
  chosen_spanish: cuanto más ... tanto más
  alternatives_spanish:
  - más y más
  - mientras más ... más
  lexicon: LSJ
  rationale: La comparación correlativa del griego se expresa naturalmente en español con «cuanto más ... tanto más», conservando la fuerza intensificadora del adverbio.
- source_word: τιμώμενοι
  english_pob_choice: they were honored
  chosen_spanish: eran honrados
  alternatives_spanish:
  - recibían honores
  - eran estimados
  lexicon: BDAG
  rationale: El pasivo de τιμάω se vierte con el verbo común «honrar»; el imperfecto español sostiene el valor progresivo implícito en la estructura comparativa.
- source_word: μεῖζον ἐφρόνησαν
  english_pob_choice: became more arrogant
  chosen_spanish: se volvieron arrogantes
  alternatives_spanish:
  - pensaron más de sí mismos
  - se engrandecieron en su propia mente
  - se hicieron más altivos
  lexicon: BDAG
  rationale: La locución griega literalmente significa «pensaron cosas mayores» y se usa idiomáticamente para orgullo o presunción. «Se volvieron arrogantes» transmite el sentido moral claramente, sin perder la tensión lexical que el original sugiere.
theological_decisions:
- issue: El valor idiomático de μεῖζον ἐφρόνησαν frente a una traducción más literal
  english_pob_reading: became more arrogant, with a footnote noting the literal idiom 'thought greater things' and the alternative 'thought more highly of themselves.'
  chosen_spanish_reading: se volvieron arrogantes, con nota sobre el sentido literal «pensaron cosas mayores» y la alternativa «pensaron más altamente de sí mismos»
  alternative_spanish_readings:
  - pensaron más de sí mismos
  - pensaron cosas mayores
  - se ensoberbecieron
  rationale: El griego no describe solo una opinión elevada sino una disposición de orgullo que resulta del honor recibido. El texto principal comunica el sentido, mientras la nota preserva la tensión idiomática documentada por la POB inglesa.
  doctrine_reference: Ninguno; decisión lexical/semántica sin implicación doctrinal específica.
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se necesitaban cambios; este borrador conserva el sentido del texto griego y la decisión POB inglesa, expresándolo en español natural sin suavizar la ironía moral del enunciado.
  spanish_consistency_notes:
  - Se mantiene «Muchos» como sujeto general y «benefactores» para τῶν εὐεργετούντων, coherente con el registro bíblico y la auditoría inglesa.
  - Se usa «Yahvé» solo cuando el texto base lo requiera; aquí no aparece ningún nombre divino.
  - La correlación comparativa se resuelve con «cuanto más ... tanto más», que suena idiomática en español y conserva la progresión del griego.
  - «Arrogantes» conserva el juicio moral fuerte que la POB inglesa expresó con «arrogant», evitando un giro demasiado suave como «altivos» o demasiado literal como «pensaron cosas mayores» en el texto principal.
