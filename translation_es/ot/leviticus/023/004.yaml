translation:
  language: es
  text: Estas son los tiempos señalados de Yahvé[a], santas convocaciones[b], que ustedes proclamarán en sus tiempos señalados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «fiestas señaladas» o «tiempos establecidos». El hebreo מוֹעֲדֵי es más amplio que «fiestas» e indica tiempos fijados por Yahvé.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «asambleas santas».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵלֶּה
  english_pob_choice: These are
  chosen_spanish: Estas son
  alternatives_spanish:
  - Estas
  lexicon: HALOT
  rationale: El demostrativo plural introduce la enumeración y en español suena natural explicitar el verbo copulativo. Conserva el arranque identificador del hebreo sin añadir contenido.
- source_word: מוֹעֲדֵי
  english_pob_choice: appointed times
  chosen_spanish: citas señaladas
  alternatives_spanish:
  - tiempos señalados
  - tiempos establecidos
  - citas nombradas
  lexicon: HALOT
  rationale: מועד abarca tiempo señalado, cita o encuentro designado. En español, 'citas señaladas' comunica la idea de momentos fijados por Dios sin reducirla solo a festividades; además permite mantener la repetición conceptual con 'en sus tiempos señalados' al final del versículo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino del Tetragrámaton como 'Yahvé', conforme al criterio del proyecto, en lugar de sustituirlo por un título. Es la forma española estable y públicamente reconocible en este marco.
- source_word: מִקְרָאֵי קֹדֶשׁ
  english_pob_choice: holy convocations
  chosen_spanish: santas convocaciones
  alternatives_spanish:
  - convocaciones santas
  - asambleas santas
  - convocatorias sagradas
  lexicon: HALOT
  rationale: La construcción apunta a reuniones convocadas y calificadas por santidad. 'Santas convocaciones' preserva el sustantivo de llamamiento/reunión del hebreo y mantiene la forma cercana al valor formal del texto fuente.
- source_word: תִּקְרְאוּ
  english_pob_choice: you shall proclaim
  chosen_spanish: proclamarán
  alternatives_spanish:
  - convocarán
  - anunciarán
  - declararán
  lexicon: HALOT
  rationale: קרא aquí no es solo 'llamar' o 'nombrar', sino dar a conocer públicamente. 'Proclamarán' conserva ese carácter formal y público.
- source_word: בְּמוֹעֲדָם
  english_pob_choice: at their appointed times
  chosen_spanish: en sus tiempos señalados
  alternatives_spanish:
  - a sus tiempos señalados
  - en su tiempo señalado
  - en sus citas
  lexicon: HALOT
  rationale: La preposición con el sufijo posesivo señala el momento apropiado de cada una de estas citas. 'En sus tiempos señalados' preserva la relación con מוֹעֵד y evita forzar una lectura exclusivamente calendárica o litúrgica.
theological_decisions:
- issue: Cómo rendir el Tetragrámaton
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: El texto hebreo usa יְהוָה directamente. Se mantiene el nombre divino en español como 'Yahvé' para no enmascarar la referencia personal del pacto y para seguir la política del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Alcance de מוֹעֵד en contexto levítico
  english_pob_reading: appointed times
  chosen_spanish_reading: citas señaladas
  alternative_spanish_readings:
  - tiempos señalados
  - festividades señaladas
  - citas designadas
  rationale: En Levítico 23 el término incluye festividades, pero también tiene un alcance más amplio que 'fiestas' solamente. 'Citas señaladas' retiene la amplitud temporal y el carácter designado por Dios.
  doctrine_reference: 'DOCTRINE.md: Lexical precision — appointed times / sacred assemblies'
translation_notes:
  revision_awareness: El pasaje ha sido revisado y el último control indicó alta concordancia sin cambios necesarios; esta propuesta mantiene ese sentido base, pero ajusta el español a una formulación natural y auditable, conservando las decisiones léxicas principales del audit trail inglés.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' de forma consistente para el nombre divino.
  - Se evitó 'fiestas' como traducción principal de מוֹעֲדֵי para no estrechar indebidamente el término.
  - '''Santas convocaciones'' conserva el paralelismo con ''citas señaladas'' y la formalidad del hebreo.'
  - La frase final refleja el valor del verbo de proclamación y del sufijo posesivo sin añadir elementos inexistentes en el hebreo.
