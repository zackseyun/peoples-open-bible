translation:
  language: es
  text: 'Lo mandó llamar para que se acercara más[a], y procuraba animarlo, diciendo:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Lo mandó llamar más cerca, e intentaba consolarlo, diciendo» o «Lo hizo acercarse más, y trataba de consolarlo, diciendo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: πλησιέστερον
  english_pob_choice: to come nearer
  chosen_spanish: para que se acercara más
  alternatives_spanish:
  - más cerca
  - para que viniera más cerca
  lexicon: LSJ
  rationale: El comparativo adverbial expresa mayor proximidad. En español, «se acercara más» conserva la idea de movimiento hacia mayor cercanía con naturalidad narrativa.
- source_word: αὐτὸν
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  lexicon: morfología del texto griego
  rationale: Es el objeto directo masculino singular referido al joven en contexto. En español, el clítico «lo» es más natural en esta construcción.
- source_word: μετεπέμψατο
  english_pob_choice: sent for
  chosen_spanish: lo mandó llamar
  alternatives_spanish:
  - lo llamó
  - lo mandó buscar
  - lo hizo llamar
  lexicon: LSJ
  rationale: El medio de μεταπέμπω significa «mandar llamar / hacer venir». «Lo mandó llamar» comunica bien la acción de enviar por alguien sin añadir formalidad excesiva.
- source_word: παρηγορεῖν
  english_pob_choice: to encourage
  chosen_spanish: animarlo
  alternatives_spanish:
  - consolarlo
  - alentarlo
  lexicon: LSJ
  rationale: El infinitivo apunta al intento de infundir ánimo en medio de la situación. «Animarlo» conserva el matiz exhortativo del contexto; «consolarlo» es posible, pero centra más el consuelo emocional.
- source_word: ἐπειρᾶτο
  english_pob_choice: tried
  chosen_spanish: intentó
  alternatives_spanish:
  - estaba intentando
  - procuraba
  lexicon: LSJ
  rationale: El imperfecto medio expresa una acción en curso. «Intentó» en español puede funcionar narrativamente aquí, pero «estaba intentando» y «procuraba» también reflejan la duración implícita.
- source_word: λέγων
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  lexicon: LSJ
  rationale: El participio presente introduce el discurso directo y mantiene la relación con la acción anterior; «diciendo» preserva esa estructura mejor que convertirlo en una oración principal.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto griego de 4 Macabeos 12:3 y el rastro auditado en inglés, sin depender mecánicamente del inglés. Se conserva la secuencia narrativa de llamado, intento de animar/consolar y presentación del discurso.
  spanish_consistency_notes:
  - Se usa «mandó llamar» para μεταπέμψατο, un giro natural en español que mantiene la idea de enviar por alguien.
  - Se prefirió «animarlo» sobre «consolarlo» en el texto principal por el matiz exhortativo que el audit trail en inglés destacó para παρηγορεῖν.
  - El pronombre clítico «lo» se ajusta al español moderno y mantiene el objeto directo masculino singular.
  - La puntuación con coma antes de «e intentó» refleja la coordinación de acciones en curso del griego.
