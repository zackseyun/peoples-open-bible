lexical_decisions:
- source_word: בְּנֵי
  english_pob_choice: the sons of
  chosen_spanish: los hijos de
  alternatives_spanish:
  - los descendientes de
  - la familia de
  lexicon: HALOT
  rationale: En una lista genealógica o de retorno, el hebreo constructo de בֵּן suele designar linaje o grupo familiar. En español, «los hijos de» conserva la forma más directa del texto fuente y funciona bien en este registro. «Los descendientes de» explicita mejor la idea de linaje, pero se aleja más de la formulación breve del original.
- source_word: בֵבָי
  english_pob_choice: Bebai
  chosen_spanish: Bebai
  alternatives_spanish:
  - Bebay
  lexicon: nombre propio
  rationale: Es un nombre propio transliterado; se conserva la forma tradicional de transliteración usada por la POB en inglés para mantener identificable el referente sin interpretarlo.
- source_word: שֵׁשׁ מֵאוֹת עֶשְׂרִים וּשְׁלֹשָׁה
  english_pob_choice: six hundred twenty-three
  chosen_spanish: seiscientos veintitrés
  alternatives_spanish:
  - seiscientos veintitrés
  lexicon: HALOT
  rationale: El hebreo expresa claramente 6 + 100 + 20 + 3 = 623. En español se vierte con la cifra en palabras, de manera natural y fiel, sin añadir «y» porque no es necesario en el conteo cardinal estándar.
