translation:
  language: es
  text: Porque si caen, uno levantará a su compañero[a]; pero ¡ay del que cae cuando no hay un segundo[b] para levantarlo!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a su amigo» para חֲבֵרוֹ.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «y no hay un segundo para levantarlo».
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי אִם
  english_pob_choice: For if
  chosen_spanish: Porque si
  alternatives_spanish:
  - Si de hecho
  - Pues si
  lexicon: HALOT
  rationale: La construcción introduce una condición con matiz explicativo o inferencial respecto de la observación anterior. «Porque si» conserva esa relación lógica en español sin volver la frase artificial.
- source_word: יִפֹּלוּ
  english_pob_choice: they fall
  chosen_spanish: caen
  alternatives_spanish:
  - se caen
  - cayeren
  lexicon: HALOT
  rationale: El verbo conserva la imagen concreta de una caída física y mantiene el paralelismo con la segunda mitad del versículo. «Caen» funciona naturalmente en una cláusula condicional general.
- source_word: הָאֶחָד
  english_pob_choice: one
  chosen_spanish: uno
  alternatives_spanish:
  - el uno
  - uno de ellos
  lexicon: HALOT
  rationale: En español, «uno» expresa de manera idiomática el sentido distributivo dentro del contraste entre dos personas. No hace falta forzar «el uno» en la primera cláusula.
- source_word: יָקִים
  english_pob_choice: will lift up
  chosen_spanish: levantará
  alternatives_spanish:
  - alzará
  - hará levantar
  lexicon: HALOT
  rationale: El hiphil de קום indica causar que alguien se ponga de pie. «Levantará» preserva la imagen corporal y suena natural en español, mientras que «alzará» puede resultar menos claro aquí.
- source_word: אֶת חֲבֵרוֹ
  english_pob_choice: his companion
  chosen_spanish: a su compañero
  alternatives_spanish:
  - a su amigo
  - a su camarada
  lexicon: HALOT
  rationale: חבר designa un asociado o compañero. «Compañero» sigue de cerca ese campo semántico y evita restringir el sentido a una amistad emocional específica.
- source_word: וְאִילוֹ
  english_pob_choice: but woe
  chosen_spanish: pero ¡ay
  alternatives_spanish:
  - pero ay
  - pero pobrecido
  lexicon: HALOT
  rationale: La interjección expresa lamento y advertencia. «¡Ay!» reproduce bien la fuerza exclamativa y el tono sapiencial de la expresión.
- source_word: הָאֶחָד שֶׁיִּפּוֹל
  english_pob_choice: to the one who falls
  chosen_spanish: del que cae
  alternatives_spanish:
  - de quien cae
  - del que se cae
  lexicon: HALOT
  rationale: El sentido es el del individuo solitario en contraste con la pareja. «Del que cae» es natural en español y conserva la oposición entre el que cuenta con ayuda y el que no.
- source_word: וְאֵין שֵׁנִי
  english_pob_choice: when there is not a second
  chosen_spanish: cuando no hay un segundo
  alternatives_spanish:
  - y no hay otro
  - cuando no existe un segundo
  lexicon: HALOT
  rationale: Se mantiene el contraste numérico literal del hebreo. «Un segundo» conserva la idea de otra persona disponible para ayudar, como en la nota inglesa.
- source_word: לַהֲקִימוֹ
  english_pob_choice: to lift him up
  chosen_spanish: para levantarlo
  alternatives_spanish:
  - para alzarlo
  - para ayudarlo a levantarse
  lexicon: HALOT
  rationale: El infinitivo con sufijo retoma el mismo verbo de la primera mitad del versículo. «Para levantarlo» preserva la repetición y la imagen física de ayuda al caído.
translation_notes:
  revision_awareness: Se siguió el texto hebreo masorético y el audit trail en inglés, conservando la imagen concreta de caída y levantamiento, el contraste numérico entre uno y segundo, y la interjección de lamento. No se requieren revisiones adicionales según el historial más reciente.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Se prefirió «compañero» por el valor léxico de חבר y se mantuvo la repetición de «levantar» para reflejar la estructura hebrea.
  - Se optó por un español formal y bíblico, pero natural, sin calcos innecesarios.
