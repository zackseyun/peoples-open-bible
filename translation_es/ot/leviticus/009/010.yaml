- from: Y la grasa[a], los riñones y el lóbulo del hígado[b] de la ofrenda por el pecado lo hizo subir en humo sobre el altar, tal como Yahvé había mandado a Moisés.
  to: Y la grasa, los riñones y el lóbulo del hígado de la ofrenda por el pecado[a] los hizo subir en humo sobre el altar, tal como Yahvé había mandado a Moisés.
