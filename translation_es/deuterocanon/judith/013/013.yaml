translation:
  language: es
  text: Y todos corrieron juntos[a], desde el menor hasta el mayor entre ellos, porque les parecía asombroso que ella hubiera venido; y abrieron la puerta y les dieron la bienvenida. Después de encender un fuego para dar luz, se reunieron alrededor de ellas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El pronombre femenino plural se refiere a Judit y a su compañera.
    reason: lexical_alternative
lexical_decisions:
- source_word: συνέδραμον
  english_pob_choice: ran together
  chosen_spanish: corrieron juntos
  alternatives_spanish:
  - acudieron juntos
  - se precipitaron juntos
  lexicon: LSJ
  rationale: El compuesto expresa movimiento convergente y apresurado. «Corrieron juntos» conserva la prisa y el sentido colectivo sin volver el español artificial.
- source_word: ἀπὸ μικροῦ ἕως μεγάλου
  english_pob_choice: from the least to the greatest
  chosen_spanish: desde el menor hasta el mayor
  alternatives_spanish:
  - desde el más pequeño hasta el más grande
  - de pequeño a grande
  lexicon: LSJ
  rationale: Es un merismo que abarca a toda la comunidad. «Desde el menor hasta el mayor» mantiene el alcance total y suena natural en español.
- source_word: παράδοξον
  english_pob_choice: astonishing
  chosen_spanish: asombroso
  alternatives_spanish:
  - extraño
  - inesperado
  - extraordinario
  lexicon: LSJ
  rationale: El término señala algo que sorprende o resulta contra lo esperado. «Asombroso» reproduce mejor esa reacción que «extraño», que podría sonar más negativo.
- source_word: τοῦ ἐλθεῖν αὐτήν
  english_pob_choice: that she had come
  chosen_spanish: que ella hubiera venido
  alternatives_spanish:
  - por haber venido
  - a su llegada
  lexicon: LSJ
  rationale: El infinitivo articular expresa el contenido de la sorpresa. En español, una subordinada con subjuntivo pluscuamperfecto comunica con claridad que la sorpresa era por su llegada.
- source_word: ἀπεδέξαντο
  english_pob_choice: welcomed
  chosen_spanish: recibieron
  alternatives_spanish:
  - acogieron
  - dieron la bienvenida
  lexicon: LSJ
  rationale: El verbo implica recibir favorablemente. «Recibieron» mantiene la neutralidad narrativa y, junto con la apertura de la puerta, deja implícito el trato favorable sin añadir matiz excesivo.
- source_word: ἅψαντες πῦρ
  english_pob_choice: after lighting a fire
  chosen_spanish: Después de encender un fuego
  alternatives_spanish:
  - Habiendo encendido un fuego
  - Tras encender fuego
  lexicon: LSJ
  rationale: El participio antecede a la acción principal. «Después de encender un fuego» expresa bien la secuencia temporal en español.
- source_word: εἰς φάσιν
  english_pob_choice: for light
  chosen_spanish: para dar luz
  alternatives_spanish:
  - para iluminar
  - como luz
  lexicon: LSJ
  rationale: La frase indica finalidad. «Para dar luz» evita sobreinterpretar la imagen y conserva el propósito práctico del fuego.
- source_word: περιεκύκλωσαν
  english_pob_choice: gathered around
  chosen_spanish: las rodearon
  alternatives_spanish:
  - se reunieron alrededor de ellas
  - las circundaron
  lexicon: LSJ
  rationale: Aunque literalmente significa «rodearon», en el contexto puede implicar que se agruparon alrededor. Aquí se conserva la forma más directa del griego, ya que el contexto no exige suavizarla.
- source_word: αὐτάς
  english_pob_choice: them
  chosen_spanish: las
  alternatives_spanish:
  - a ellas
  lexicon: LSJ
  rationale: El pronombre femenino plural se refiere a Judit y su compañera. En español, el clítico «las» es la forma natural en este contexto.
