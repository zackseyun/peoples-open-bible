translation:
  language: es
  text: ¿Quién es como el sabio[a], y quién conoce la interpretación de un asunto? La sabiduría de un hombre ilumina su rostro, y la dureza de su rostro cambia[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «como el hombre sabio». El hebreo usa singular genérico («el sabio»), no una pluralización abstracta.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «la audacia/la severidad de su rostro cambia». La expresión hebrea es idiomática y puede referirse a un semblante duro o severo que la sabiduría altera.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִי
  english_pob_choice: Who
  chosen_spanish: ¿Quién
  alternatives_spanish:
  - ¿Quién es?
  - ¿Cuál
  lexicon: HALOT
  rationale: Interrogativo directo y retórico; en español, «¿Quién» conserva la forma natural de la pregunta sin añadir contenido.
- source_word: כְּהֶחָכָם
  english_pob_choice: like the wise man
  chosen_spanish: como el sabio
  alternatives_spanish:
  - como el hombre sabio
  - como el sabio hombre
  lexicon: HALOT
  rationale: El comparativo כְ exige «como». «El sabio» preserva el valor sustantivado del hebreo y resulta más natural que forzar una perífrasis más pesada.
- source_word: יוֹדֵעַ
  english_pob_choice: knows
  chosen_spanish: conoce
  alternatives_spanish:
  - sabe
  - entiende
  lexicon: HALOT
  rationale: En esta pregunta retórica, «conoce» funciona bien para expresar conocimiento real de algo complejo sin perder la sencillez del verbo hebreo.
- source_word: פֵּשֶׁר דָּבָר
  english_pob_choice: the interpretation of a matter
  chosen_spanish: la interpretación de un asunto
  alternatives_spanish:
  - la explicación de una cosa
  - el significado de un asunto
  lexicon: HALOT
  rationale: פֵּשֶׁר apunta a interpretación/explicación; דָּבָר es amplio y aquí equivale a «asunto» o «materia». «Asunto» evita una traducción demasiado abstracta o mecánica.
- source_word: חָכְמַת אָדָם
  english_pob_choice: A man's wisdom
  chosen_spanish: La sabiduría de un hombre
  alternatives_spanish:
  - La sabiduría humana
  - La sabiduría de una persona
  lexicon: HALOT
  rationale: Se conserva el singular genérico de אָדָם tal como lo trata el audit trail inglés. «De un hombre» mantiene la forma representativa y evita neutralizar prematuramente el matiz del hebreo.
- source_word: תָּאִיר
  english_pob_choice: lights up
  chosen_spanish: ilumina
  alternatives_spanish:
  - alumbra
  - hace brillar
  lexicon: HALOT
  rationale: El hifil de אור expresa causar luz; «ilumina» es idiomático en español y mantiene la fuerza causativa.
- source_word: פָּנָיו
  english_pob_choice: his face
  chosen_spanish: su rostro
  alternatives_spanish:
  - su cara
  - su semblante
  lexicon: HALOT
  rationale: «Rostro» es natural, digno y claro en español bíblico contemporáneo.
- source_word: עֹז פָּנָיו
  english_pob_choice: the hardness of his face
  chosen_spanish: la dureza de su rostro
  alternatives_spanish:
  - la severidad de su rostro
  - la dureza de su semblante
  - la firmeza de su rostro
  lexicon: HALOT
  rationale: El audit trail inglés interpreta esta locución como una expresión idiomática de dureza/severidad facial; «dureza» preserva mejor esa tensión que suavizarla a un rasgo meramente positivo como «firmeza».
- source_word: יְשֻׁנֶּא
  english_pob_choice: is changed
  chosen_spanish: es cambiada
  alternatives_spanish:
  - es alterada
  - se cambia
  lexicon: HALOT
  rationale: El pasivo/reflexivo de שנה requiere un cambio real. «Es cambiada» sigue de cerca la forma verbal sin introducir una lectura más fuerte como «transformada».
theological_decisions:
- issue: Renderizar אָדָם en sentido genérico sin perder el singular representativo
  english_pob_reading: A man's wisdom
  chosen_spanish_reading: La sabiduría de un hombre
  alternative_spanish_readings:
  - La sabiduría humana
  - La sabiduría de una persona
  rationale: El texto hebreo usa singular genérico. La opción elegida conserva la forma representativa documentada por el audit trail inglés y evita borrar el matiz mediante una abstracción impersonal.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4; Contested terms table for אָדָם
- issue: Mantener la tensión idiomática de עֹז פָּנָיו sin neutralizarla
  english_pob_reading: the hardness of his face is changed
  chosen_spanish_reading: la dureza de su rostro es cambiada
  alternative_spanish_readings:
  - la severidad de su rostro es cambiada
  - la firmeza de su rostro es cambiada
  rationale: El hebreo describe una expresión facial endurecida o severa. «Dureza» preserva la tensión interpretativa que el propio audit trail inglés señala, sin resolverla en una suavización interpretativa demasiado específica.
  doctrine_reference: HALOT; audit trail lexical note on idiomatic expression
translation_notes:
  revision_awareness: 'El pasaje coincide con el último pase de revisión auditado: no hubo cambios aplicados y el veredicto fue de alto acuerdo. La presente versión sigue esa lectura, con ajustes de estilo natural en español y manteniendo las dos notas léxicas relevantes del audit trail.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el tetragrama.
  - «Sabio» se usa como sustantivo singular representativo, en paralelo con el inglés POB.
  - «Rostro» se prefiere por consistencia bíblica y por claridad frente a «cara» o «semblante» en este contexto.
  - Se conserva la tensión semántica de עֹז פָּנָיו con una nota alternativa en vez de resolverla demasiado pronto.
