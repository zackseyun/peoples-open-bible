lexical_decisions:
- source_word: וַיִּקְשְׁרוּ
  english_pob_choice: conspired
  chosen_spanish: conspiraron
  alternatives_spanish:
  - formaron una conspiración
  - maquinaron
  lexicon: HALOT
  rationale: El verbo קשר עַל en contextos reales y de asesinato tiene sentido de conspirar contra alguien. «Conspiraron» conserva ese valor hostil y es natural en español.
- source_word: עָלָיו
  english_pob_choice: against him
  chosen_spanish: contra él
  alternatives_spanish:
  - sobre él
  lexicon: HALOT
  rationale: Con קשר, la preposición marca el objetivo de la conspiración. «Contra él» expresa con claridad la dirección hostil sin forzar el español.
- source_word: עֲבָדָיו
  english_pob_choice: his servants
  chosen_spanish: sus siervos
  alternatives_spanish:
  - sus servidores
  - sus funcionarios
  - sus esclavos
  lexicon: HALOT
  rationale: En un contexto real, עבד puede referirse a servidores de la corte o funcionarios subordinados. «Siervos» preserva esa amplitud y mantiene la relación de dependencia; «esclavos» sería demasiado fuerte y «funcionarios» añade precisión no explícita.
- source_word: וַיְמִיתֻהוּ
  english_pob_choice: put him to death
  chosen_spanish: lo mataron
  alternatives_spanish:
  - lo dieron muerte
  - lo pusieron a muerte
  lexicon: HALOT
  rationale: El hifil de מות es causativo. En español, «lo mataron» comunica de forma directa y natural la acción homicida sin perder la fuerza del verbo.
- source_word: בְּבֵיתוֹ
  english_pob_choice: in his own house
  chosen_spanish: en su propia casa
  alternatives_spanish:
  - en su casa
  - en su propia morada
  lexicon: HALOT
  rationale: La preposición ב indica ubicación. El posesivo con énfasis en «propia» refleja bien el matiz de pertenencia y la intimidad del lugar, tal como lo hace la audit trail inglesa.
translation_notes:
  revision_awareness: 'El texto base inglés no presenta notas ni revisiones aplicadas; el hebreo y la auditoría inglesa coinciden en el sentido narrativo: conspiración real seguida de asesinato en el ámbito doméstico.'
  spanish_consistency_notes:
  - Se mantuvo el paralelismo narrativo simple del hebreo con dos acciones coordinadas por «y».
  - Se evitó «esclavos» porque el contexto cortesano del texto permite un término más amplio y menos cargado.
  - Se conservó «contra él» para la preposición de hostilidad asociada al verbo «conspirar».
