  - marker: a
    text: O «para buscar con empeño a Saulo» o «para ir en busca de Saulo».
    reason: lexical_alternative
  revision_rationale: Se conserva intacto el texto principal porque es fiel, natural y claro. Solo se corrige la nota para que preserve alternativas léxicas genuinas del expediente inglés, sin repetir la lectura principal.
