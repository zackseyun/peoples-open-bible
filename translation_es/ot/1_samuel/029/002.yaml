review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido del hebreo: los dirigentes filisteos avanzan en formación, y David con sus hombres va en la parte posterior con Aquis. Se conserva adecuadamente el aspecto procesional de עֹבְרִים con ''iban pasando'' y el valor espacial de בָּאַחֲרֹנָה con ''en la retaguardia''.'
  spanish_quality_summary: El español es claro y publicable, pero 'príncipes' para סַרְנֵי puede sugerir demasiado una categoría dinástica/monárquica en español bíblico moderno. 'Los jefes de los filisteos' suena más natural, fiel al rango dirigente, y armoniza mejor con la nota léxica ya incluida. También conviene retirar la coma antes de 'con Aquis' para una lectura más fluida.
  glossary_alignment: No hay conflictos con la terminología troncal del proyecto. 'Filisteos', 'sus hombres' y 'Aquis' están bien. La principal cuestión léxica es preferir 'jefes' sobre 'príncipes' para סַרְנֵי en este contexto histórico-militar.
  issues:
  - severity: medium
    issue: '''príncipes'' para סַרְנֵי puede sonar demasiado dinástico o monárquico.'
    rationale: Aunque comunica alto rango, en español moderno 'príncipes' suele evocar hijos de reyes o una nobleza específica, mientras que el hebreo aquí se refiere a los altos gobernantes/caudillos filisteos. 'Jefes' preserva mejor la función político-militar sin añadir asociaciones impropias.
  - severity: low
    issue: Coma innecesaria antes de 'con Aquis'.
    rationale: No es un error de sentido, pero la frase fluye mejor sin pausa entre 'en la retaguardia' y 'con Aquis', ya que ambos complementos pertenecen al mismo predicado.
  revised_spanish_text: Y los jefes[a] de los filisteos iban pasando por centenas y por millares, y David y sus hombres iban pasando en la retaguardia con Aquis.
  revised_footnotes:
  - marker: a
    text: O «príncipes» o «gobernantes»; el hebreo סַרְנֵי se refiere a los altos dirigentes filisteos.
    reason: lexical_alternative
  revision_rationale: Se ajusta סַרְנֵי a 'jefes' por mayor naturalidad y precisión funcional en español, evitando la connotación dinástica de 'príncipes'. También se elimina una coma no necesaria para mejorar la fluidez sin cambiar el sentido.
