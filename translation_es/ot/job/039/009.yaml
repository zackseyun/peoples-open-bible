translation:
  language: es
  text: ¿El buey salvaje[a] querrá servirte? ¿Pasará la noche junto a tu pesebre[b]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Buey salvaje» sigue una traducción amplia del hebreo רֵּים; la identificación precisa del animal es incierta. También puede traducirse como «toro salvaje» o «auroco».
    reason: lexical_alternative
  - marker: b
    text: O «tu comedero». El hebreo se refiere al lugar donde comen los animales.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲיֹאבֶה
  english_pob_choice: will ... be willing
  chosen_spanish: querrá
  alternatives_spanish:
  - estará dispuesto a
  - consentirá a
  lexicon: HALOT
  rationale: El hebreo expresa voluntad o disposición, no simple capacidad. En español, la pregunta retórica suena natural con «querrá», que conserva la idea de disposición voluntaria del animal a servir.
- source_word: רֵּים
  english_pob_choice: wild ox
  chosen_spanish: buey salvaje
  alternatives_spanish:
  - toro salvaje
  - auroco
  lexicon: HALOT
  rationale: El término hebreo designa un animal salvaje no domesticado; la identificación exacta es incierta. «Buey salvaje» mantiene la imagen amplia y comprensible en español sin afirmar más precisión zoológica de la que el texto permite.
- source_word: עָבְדֶךָ
  english_pob_choice: to serve you
  chosen_spanish: servirte
  alternatives_spanish:
  - ser tu siervo
  - trabajar para ti
  lexicon: HALOT
  rationale: El verbo עבד aquí comunica servicio o labor rendidos a un amo. «Servirte» conserva esa relación de servicio de forma natural y breve en español.
- source_word: אִם
  english_pob_choice: Will
  chosen_spanish: ¿
  alternatives_spanish:
  - o
  - si
  lexicon: HALOT
  rationale: En la segunda cola poética, אִם introduce una pregunta paralela. En español conviene repetir la forma interrogativa directa para reproducir el paralelo retórico.
- source_word: יָלִין
  english_pob_choice: spend the night
  chosen_spanish: pasará la noche
  alternatives_spanish:
  - se hospedará
  - pernoctará
  lexicon: HALOT
  rationale: לין refiere a alojarse o permanecer durante la noche. «Pasará la noche» es claro, moderno y adecuado para el contexto de animales domésticos.
- source_word: עַל
  english_pob_choice: at
  chosen_spanish: en
  alternatives_spanish:
  - sobre
  - junto a
  lexicon: HALOT
  rationale: Aunque la preposición es literalmente «sobre/en», en español el lugar se expresa con naturalidad con «en» respecto del pesebre.
- source_word: אֲבוּסֶךָ
  english_pob_choice: your feeding trough
  chosen_spanish: tu pesebre
  alternatives_spanish:
  - tu mangera
  - tu trough de comida
  lexicon: HALOT
  rationale: אֲבוּס señala un lugar de alimentación para animales. «Pesebre» es el equivalente español tradicional y comprensible; en este contexto no implica una lectura navideña, sino simplemente el lugar donde se alimenta al ganado.
translation_notes:
  revision_awareness: La versión inglesa audita la incertidumbre zoológica de רֵּים y la alternativa léxica de אֲבוּס como «manger/feeding trough». La redacción española conserva ambas tensiones con un término amplio («buey salvaje») y un término tradicional pero transparente («pesebre»), sin domesticar el paralelismo ni introducir explicaciones ajenas al verso.
  spanish_consistency_notes:
  - Se mantuvo el tratamiento de segunda persona singular con enclíticos («servirte», «tu pesebre»), coherente con el hebreo.
  - Se evitó «SEÑOR» o vocabulario teológico ajeno, porque el verso no contiene el nombre divino.
  - La puntuación reproduce dos preguntas retóricas separadas, conforme al paralelismo del hebreo.
