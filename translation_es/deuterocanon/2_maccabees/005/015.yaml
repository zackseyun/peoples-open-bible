translation:
  language: es
  text: Pero no contento con estas cosas, se atrevió incluso a entrar en el templo santísimo[a] de toda la tierra, con Menelao como guía, el que había llegado a ser traidor tanto de las leyes como de su patria,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el santuario más santo de toda la tierra». El griego γῆ puede significar «tierra» o «país».
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐκ ἀρκεσθεὶς
  english_pob_choice: not satisfied
  chosen_spanish: no contento
  alternatives_spanish:
  - no satisfecho
  - no contento con esto
  lexicon: LSJ
  rationale: El participio expresa que no estaba colmado ni detenido por lo ya hecho. En español, «no contento» comunica bien la idea de insatisfacción moral y de escalada narrativa sin sonar mecánico.
- source_word: τούτοις
  english_pob_choice: these things
  chosen_spanish: esto
  alternatives_spanish:
  - estas cosas
  - estos actos
  lexicon: LSJ
  rationale: El referente son los atropellos anteriores del contexto inmediato. «Esto» evita una repetición pesada y mantiene la referencia anafórica clara en español.
- source_word: κατετόλμησεν
  english_pob_choice: he even dared
  chosen_spanish: se atrevió incluso
  alternatives_spanish:
  - se atrevió
  - osó incluso
  lexicon: LSJ
  rationale: El verbo subraya audacia insolente. «Se atrevió incluso» conserva la intensificación de εἰς/δέ en el avance del relato.
- source_word: πάσης τῆς γῆς
  english_pob_choice: in all the earth
  chosen_spanish: de toda la tierra
  alternatives_spanish:
  - de toda la tierra
  - de toda la tierra y del mundo entero
  lexicon: LSJ
  rationale: La expresión superlativa se refiere a la extensión universal de la afirmación sobre la santidad del templo. «De toda la tierra» reproduce el alcance sin restringir γῆ a «país».
- source_word: ἁγιώτατον ἱερὸν
  english_pob_choice: the most holy temple
  chosen_spanish: el templo santísimo
  alternatives_spanish:
  - el templo más santo
  - el santísimo santuario
  lexicon: LSJ
  rationale: «Templo santísimo» conserva el superlativo y su solemnidad en un giro natural en español. «Santuario» es posible, pero «templo» corresponde mejor al sentido contextual de ἱερόν.
- source_word: εἰσελθεῖν
  english_pob_choice: to enter
  chosen_spanish: entrar
  alternatives_spanish:
  - ingresar
  - ir a entrar
  lexicon: LSJ
  rationale: El infinitivo de movimiento se vierte con el verbo simple «entrar», suficiente y natural en español formal.
- source_word: ὁδηγὸν ἔχων
  english_pob_choice: with Menelaus as his guide
  chosen_spanish: teniendo como guía a Menelao
  alternatives_spanish:
  - con Menelao como guía
  - guiado por Menelao
  lexicon: LSJ
  rationale: La construcción participial indica acompañamiento e instrumentación. «Teniendo como guía a Menelao» conserva la relación de dependencia del verbo griego.
- source_word: προδότην
  english_pob_choice: a traitor
  chosen_spanish: traidor
  alternatives_spanish:
  - un traidor
  - un betrayor
  lexicon: LSJ
  rationale: «Traidor» expresa la deslealtad política y religiosa del término griego sin añadir matices no presentes.
- source_word: τῶν νόμων
  english_pob_choice: the laws
  chosen_spanish: de las leyes
  alternatives_spanish:
  - de la ley
  - de las normas
  lexicon: LSJ
  rationale: El plural griego debe mantenerse. «Leyes» refleja adecuadamente las disposiciones ancestrales a las que alude el contexto, evitando singularizarlas indebidamente.
- source_word: τῆς πατρίδος
  english_pob_choice: his homeland
  chosen_spanish: de su patria
  alternatives_spanish:
  - de su tierra natal
  - de su país
  lexicon: LSJ
  rationale: πατρίς expresa la patria o tierra propia. «Patria» conserva el peso histórico y afectivo del término mejor que «país».
- source_word: γεγονότα
  english_pob_choice: had become
  chosen_spanish: había llegado a ser
  alternatives_spanish:
  - se había vuelto
  - había pasado a ser
  lexicon: LSJ
  rationale: El perfecto participio indica un estado resultante ya consolidado. «Había llegado a ser» preserva la idea de un cambio consumado previo a la escena.
theological_decisions:
- issue: Título superlativo del templo
  english_pob_reading: the most holy temple in all the earth
  chosen_spanish_reading: el templo santísimo de toda la tierra
  alternative_spanish_readings:
  - el templo más santo de toda la tierra
  - el santísimo santuario de toda la tierra
  rationale: La frase griega eleva al máximo la santidad del recinto. En español, «templo santísimo» mantiene el superlativo y la fuerza reverencial sin suavizar la afirmación ni reinterpretarla.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Alcance de γῆ
  english_pob_reading: in all the earth
  chosen_spanish_reading: de toda la tierra
  alternative_spanish_readings:
  - de todo el país
  - de toda la tierra
  rationale: Se conserva el alcance amplio del griego, que puede sonar universalizante y no debe reducirse de manera automática a «país» o «tierra de Judá» sin justificación contextual adicional.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: 'El texto español sigue de cerca el informe auditado: conserva la escalada de indignación («no contento», «se atrevió incluso»), mantiene el superlativo de santidad del templo y respeta el matiz participial de Menelao como guía y traidor consolidado. No se detectaron revisiones posteriores que afecten este versículo.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, aunque no aparece en este versículo.
  - Se usa «templo» para ἱερόν conforme al uso contextual y a la pauta de distinguirlo de «santuario» solo cuando el español lo requiera.
  - Se conserva el plural «leyes» para τῶν νόμων, evitando una reducción al singular.
  - «Patria» se elige por su valor semántico y retórico en español bíblico y no como fórmula eclesiástica tradicional.
