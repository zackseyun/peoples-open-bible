translation:
  language: es
  text: Este es el sueño que yo, el rey Nabucodonosor, vi. Y tú, Belsasar, declara la interpretación, porque todos los sabios de mi reino no pueden darme a conocer la interpretación, pero tú puedes, porque el espíritu de los dioses santos[a] está en ti.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el Espíritu del Dios santo». Las formas arameas son plurales, pero algunos entienden la expresión como una referencia singular.'
    reason: alternative_reading
lexical_decisions:
- source_word: דְּנָה / This
  english_pob_choice: This
  chosen_spanish: Este
  alternatives_spanish:
  - Esto
  lexicon: HALOT
  rationale: El demostrativo introduce el relato de manera directa; 'Este' conserva la deixis y funciona con naturalidad ante 'sueño' en español.
- source_word: חֶלְמָא / the dream
  english_pob_choice: the dream
  chosen_spanish: el sueño
  alternatives_spanish:
  - el sueño soñado
  - el sueño de noche
  lexicon: HALOT
  rationale: El sustantivo arameo lleva estado definido; 'el sueño' refleja esa definitud sin sobreexplicar.
- source_word: חֲזֵית / saw
  english_pob_choice: saw
  chosen_spanish: vi
  alternatives_spanish:
  - he visto
  lexicon: HALOT
  rationale: Perfecto narrativo en primera persona; 'vi' es el equivalente español más natural y fiel al tiempo verbal.
- source_word: אֲנָה מַלְכָּא נְבוּכַדְנֶצַּר / I, King Nebuchadnezzar
  english_pob_choice: I, King Nebuchadnezzar
  chosen_spanish: yo, el rey Nabucodonosor
  alternatives_spanish:
  - yo, Nabucodonosor el rey
  lexicon: HALOT
  rationale: Se conserva la autoidentificación enfática y el orden natural del español, manteniendo el título real junto al nombre propio.
- source_word: וְאַנתָּה / And you
  english_pob_choice: And you
  chosen_spanish: Y tú
  alternatives_spanish:
  - Pero tú
  - Ahora tú
  lexicon: HALOT
  rationale: La conjunción simple se mantiene como enlace discursivo; no se fuerza un contraste explícito que el arameo no exige de forma obligatoria.
- source_word: בֵּלְטְשַׁאצַּר / Belteshazzar
  english_pob_choice: Belteshazzar
  chosen_spanish: Belsasar
  alternatives_spanish:
  - Beltsasar
  - Beltesasar
  lexicon: HALOT
  rationale: Se usa la forma castellana más reconocible del nombre en Daniel, adecuada para una edición bíblica en español.
- source_word: פִּשְׁרֵא אֱמַר / tell the interpretation
  english_pob_choice: tell the interpretation
  chosen_spanish: declara la interpretación
  alternatives_spanish:
  - di la interpretación
  - expón la interpretación
  lexicon: HALOT
  rationale: '''Decir'' puede sonar demasiado débil en español; ''declara'' conserva el valor imperativo de hacer explícito el sentido del sueño sin añadir contenido.'
- source_word: כָּל־קֳבֵל דִּי / because
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - ya que
  - puesto que
  lexicon: HALOT
  rationale: La construcción causal se vierte con el conector más claro y natural en español.
- source_word: כָּל חַכִּימֵי מַלְכוּתִי / all the wise men of my kingdom
  english_pob_choice: all the wise men of my kingdom
  chosen_spanish: todos los sabios de mi reino
  alternatives_spanish:
  - todos los sabios de mi reino
  - todos los hombres sabios de mi reino
  lexicon: HALOT
  rationale: '''חכמים'' en Daniel designa a los consejeros/sabios de la corte; ''sabios'' es fiel y fluido en español.'
- source_word: לָא יָכְלִין / are not able
  english_pob_choice: are not able
  chosen_spanish: no pueden
  alternatives_spanish:
  - no son capaces
  - no pudieron
  lexicon: HALOT
  rationale: El presente de incapacidad expresa correctamente la situación actual del rey sobre sus consejeros.
- source_word: פִּשְׁרָא לְהוֹדָעוּתַנִי / to make the interpretation known to me
  english_pob_choice: to make the interpretation known to me
  chosen_spanish: darme a conocer la interpretación
  alternatives_spanish:
  - hacerme conocer la interpretación
  - comunicarme la interpretación
  lexicon: HALOT
  rationale: La causativa de 'hacer saber' se traduce con una expresión española idiomática que conserva el objeto directo y el destinatario.
- source_word: וְאַנתָּה כָּהֵל / but you are able
  english_pob_choice: but you are able
  chosen_spanish: pero tú puedes
  alternatives_spanish:
  - y tú puedes
  - tú eres capaz
  lexicon: HALOT
  rationale: '''Poder'' comunica de modo directo la capacidad/competencia destacada en el texto, y ''pero'' conserva el contraste pragmático con la incapacidad previa.'
- source_word: דִּי רוּחַ אֱלָהִין קַדִּישִׁין / for the spirit of the holy gods
  english_pob_choice: for the spirit of the holy gods
  chosen_spanish: porque el espíritu de los dioses santos
  alternatives_spanish:
  - porque el Espíritu del Dios santo
  - porque un espíritu de dioses santos
  lexicon: HALOT
  rationale: La forma plural aramea se refleja en el plural 'dioses'; 'espíritu' mantiene la ambigüedad auditada entre un ser espiritual y la presencia divina, sin armonizarla prematuramente.
- source_word: בָּךְ / is in you
  english_pob_choice: is in you
  chosen_spanish: está en ti
  alternatives_spanish:
  - está dentro de ti
  - habita en ti
  lexicon: HALOT
  rationale: La preposición simple se vierte de forma directa; 'está en ti' es claro y suficientemente literal para el contexto.
theological_decisions:
- issue: La frase רוּחַ אֱלָהִין קַדִּישִׁין / the spirit of the holy gods
  english_pob_reading: the spirit of the holy gods
  chosen_spanish_reading: el espíritu de los dioses santos
  alternative_spanish_readings:
  - el Espíritu del Dios santo
  - un espíritu de dioses santos
  rationale: Se conserva la superficie plural del arameo, coherente con el habla de Nabucodonosor y con la decisión inglesa de no resolver la tensión en el texto principal. La alternativa singular se deja como posibilidad interpretativa, no como texto base.
  doctrine_reference: Principio POB de preservar la tensión textual; Daniel 4:15; traducción auditada alternativa en nota.
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del audit trail inglés: se mantiene ''the interpretation'' como ''la interpretación'' y se evita introducir posesivos innecesarios. También se conserva en español la alternativa teológica documentada para la frase final, sin resolverla en el texto principal.'
  spanish_consistency_notes:
  - Se usó 'Belsasar' como forma castellana del nombre, consistente con el uso bíblico en español.
  - Se mantuvo 'sabios' para חַכִּימֵי, en armonía con el uso de Daniel y con un registro bíblico claro.
  - Se preservó el contraste pragmático entre incapacidad general y capacidad atribuida a Daniel sin exagerar el conector de וְאַנתָּה.
  - La nota textual se ancla solo en la frase final, donde existe una tensión interpretativa documentada en el audit trail.
