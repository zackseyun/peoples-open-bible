translation:
  language: es
  text: Bajo su mando había un ejército de 307.500[a], compuesto de hombres que hacían la guerra con gran poder, para ayudar al rey contra el enemigo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, de manera más formal, «Por su mano había una fuerza militar de 307.500, los que hacían la guerra». El texto principal vierte los modismos militares hebreos en español natural.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַל יָדָם
  english_pob_choice: Under their command
  chosen_spanish: Bajo su mando
  alternatives_spanish:
  - Bajo su autoridad
  - En su cargo
  - Por su mano
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y señala supervisión/autoridad militar, no la mano física. «Bajo su mando» comunica el sentido administrativo y militar de forma natural en español.
- source_word: חֵיל צָבָא
  english_pob_choice: an army
  chosen_spanish: un ejército
  alternatives_spanish:
  - una fuerza militar
  - un hoste
  - una fuerza de guerra
  lexicon: HALOT
  rationale: La combinación de los sustantivos hebreos designa una fuerza militar. «Un ejército» evita calcos como «fuerza de ejército» y conserva el sentido claro y bíblico.
- source_word: שְׁלֹשׁ מֵאוֹת אֶלֶף וְשִׁבְעַת אֲלָפִים וַחֲמֵשׁ מֵאוֹת
  english_pob_choice: 307,500
  chosen_spanish: '307.500'
  alternatives_spanish:
  - trescientos siete mil quinientos
  lexicon: Números cardinales
  rationale: El total hebreo es la suma directa de las cifras dadas. En español se presenta en formato numérico moderno para legibilidad, sin alterar el valor.
- source_word: עוֹשֵׂי מִלְחָמָה
  english_pob_choice: making war
  chosen_spanish: que hacía guerra
  alternatives_spanish:
  - hacedor de guerra
  - que combatía
  - gente de guerra
  lexicon: HALOT
  rationale: El hebreo dice literalmente «los que hacen guerra». La versión española conserva el verbo de acción en lugar de sustituirlo por una paráfrasis que suavice el rasgo militar.
- source_word: בְּכֹחַ חָיִל
  english_pob_choice: with mighty power
  chosen_spanish: con gran poder
  alternatives_spanish:
  - con poderoso valor
  - con fuerza de valía
  - con gran fuerza
  lexicon: HALOT
  rationale: La expresión acumula fuerza/poder con valor o vigor militar. «Con gran poder» mantiene la fuerza del original y suena natural en español; se evita desdoblar demasiado la frase.
- source_word: לַעְזֹר לַמֶּלֶךְ
  english_pob_choice: to help the king
  chosen_spanish: para ayudar al rey
  alternatives_spanish:
  - para asistir al rey
  - para socorrer al rey
  - para apoyar al rey
  lexicon: HALOT
  rationale: עזר significa ayudar/auxiliar. «Ayudar» es la correspondencia directa y suficiente en este contexto militar.
- source_word: עַל הָאוֹיֵב
  english_pob_choice: against the enemy
  chosen_spanish: contra el enemigo
  alternatives_spanish:
  - frente al enemigo
  - en contra del enemigo
  lexicon: HALOT
  rationale: Con un verbo de ayuda en contexto bélico, עַל marca oposición respecto del enemigo. «Contra el enemigo» refleja bien la relación adversativa.
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión más reciente del POB inglés, que prefirió «making war» y «mighty power» sobre una traducción más interpretativa. El español conserva esa mayor literalidad dinámica sin perder naturalidad.
  spanish_consistency_notes:
  - Se mantiene «ejército» para חֵיל צָבָא, evitando el calco «fuerza de ejército».
  - «Bajo su mando» refleja el modismo de autoridad de עַל יָדָם, en armonía con la solución inglesa auditada.
  - Se conserva la formulación verbal «que hacía guerra» para no borrar el matiz activo de עוֹשֵׂי מִלְחָמָה.
  - 'El número se presenta con separador decimal español estándar como miles: 307.500.'
