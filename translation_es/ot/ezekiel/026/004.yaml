revisions:
- from: Ellos destruirán los muros de Tiro y derribarán sus torres[a]; y yo barreré su polvo de ella y la convertiré en roca desnuda.
  to: Ellos destruirán los muros de Tiro y derribarán sus torres, y yo quitaré[a] su polvo de sobre ella y la convertiré en roca desnuda.
  rationale: Se reemplaza «barreré» por «quitaré» para representar mejor la acción de remover el material superficial sin introducir una imagen doméstica débil; la nota conserva la alternativa más cercana al matiz de «rasparé». Se corrige el aparato de nota para que explique realmente el rango de עָפָר y la imagen del sitio despojado, y se suaviza la sintaxis con «de sobre ella» para mantener la personificación de la ciudad en español natural.
