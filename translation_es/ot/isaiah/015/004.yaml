translation:
  language: es
  text: Hesbón y Elealé gritan[a]; su voz se oye hasta Yahaz. Por eso los hombres armados de Moab gritan[b]; su alma tiembla dentro de él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «grita». El hebreo puede expresarse en singular al personificar las ciudades.
    reason: lexical_alternative
  - marker: b
    text: El hebreo final es difícil; también puede entenderse como «su alma está angustiada dentro de él» o «su alma tiembla por él».
    reason: alternative_reading
lexical_decisions:
- source_word: וַתִּזְעַק
  english_pob_choice: cry out
  chosen_spanish: gritan
  alternatives_spanish:
  - claman
  - gritan de angustia
  - vociferan
  lexicon: HALOT
  rationale: El verbo זעק expresa un grito fuerte de angustia o alarma. En español, «gritan» conserva la intensidad y la naturalidad poética sin añadir matices no asegurados por el hebreo.
- source_word: חֶשְׁבּוֹן וְאֶלְעָלֵה
  english_pob_choice: Heshbon and Elealeh
  chosen_spanish: Hesbón y Elealé
  alternatives_spanish:
  - Hesbón y Elealeh
  - Jeshbón y Eleale
  lexicon: Transliteración propia de nombres
  rationale: Son nombres de lugar y deben conservarse como topónimos transliterados. Se usa una forma española clara y estable, sin traducirlos.
- source_word: עַד יַהַץ
  english_pob_choice: as far as Jahaz
  chosen_spanish: hasta Yahaz
  alternatives_spanish:
  - hasta Jahaz
  - hasta Yajaz
  - a Yahaz
  lexicon: HALOT
  rationale: עַד marca extensión; «hasta» comunica bien el alcance del clamor. Se mantiene el topónimo con transliteración española coherente.
- source_word: נִשְׁמַע קוֹלָם
  english_pob_choice: their voice is heard
  chosen_spanish: su voz se oye
  alternatives_spanish:
  - se oye su voz
  - se escucha su voz
  - su clamor se oye
  lexicon: HALOT
  rationale: קוֹל puede ser «voz», «sonido» o «clamor». «Voz» sigue de cerca la imagen hebrea y funciona bien en español literario.
- source_word: עַל כֵּן
  english_pob_choice: Therefore
  chosen_spanish: Por eso
  alternatives_spanish:
  - Por tanto
  - Así que
  - Entonces
  lexicon: HALOT
  rationale: La expresión introduce consecuencia. «Por eso» suena natural en español moderno y mantiene el vínculo lógico del pasaje.
- source_word: חֲלֻצֵי מוֹאָב
  english_pob_choice: the armed men of Moab
  chosen_spanish: los hombres armados de Moab
  alternatives_spanish:
  - los guerreros de Moab
  - los armados de Moab
  lexicon: HALOT
  rationale: חֲלֻצֵי designa a los equipados para la batalla. «Hombres armados» conserva el sentido militar sin forzar una traducción más técnica que el español no exigiría aquí.
- source_word: יָרִיעוּ
  english_pob_choice: cry out
  chosen_spanish: gritan
  alternatives_spanish:
  - claman
  - alzan un grito
  - gritan en batalla
  lexicon: HALOT
  rationale: El verbo puede ser «gritar» o «dar un grito». Dado que la revisión inglesa volvió a «cry out», se prefiere en español el equivalente directo «gritan», sin explicitar «grito de guerra» porque el hebreo no obliga a ello.
- source_word: נַפְשׁוֹ
  english_pob_choice: his soul
  chosen_spanish: su alma
  alternatives_spanish:
  - su vida
  - su ser interior
  - su persona
  lexicon: HALOT
  rationale: נפש suele abarcar alma, vida o ser interior. «Alma» mantiene la fuerza poética y la interioridad del hebreo; se respeta el singular del sufijo, aunque el referente sea difícil.
- source_word: יָרְעָה לוֹ
  english_pob_choice: trembles within him
  chosen_spanish: tiembla dentro de él
  alternatives_spanish:
  - se estremece dentro de él
  - está abatida dentro de él
  - se angustia dentro de él
  lexicon: HALOT
  rationale: La cláusula final es difícil. «Tiembla dentro de él» conserva la ambigüedad entre quebranto, temblor y angustia, sin resolverla demasiado en una sola dirección.
translation_notes:
  revision_awareness: La redacción inglesa revisada cambió «raise a battle cry» por «cry out» para acercarse más al verbo hebreo. La versión española sigue esa revisión con «gritan», y mantiene la dificultad del clausulado final sin suavizarla.
  spanish_consistency_notes:
  - Se mantiene Yahvé para el nombre divino cuando aparezca; en este versículo no aplica.
  - 'Se prefirió la transliteración de topónimos con acento español: Hesbón, Elealé, Yahaz.'
  - «Alma» conserva la fuerza de נפש sin recurrir a una paráfrasis interpretativa como «ser interior», aunque esa alternativa se documenta en la nota.
  - No se introduce «grito de guerra» para no exceder el verbo hebreo en este contexto.
