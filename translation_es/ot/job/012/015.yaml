translation:
  language: es
  text: He aquí[a], si él retiene las aguas, se secan; si las suelta, trastornan la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el país». El hebreo אֶרֶץ puede significar «tierra» o «país/territorio» según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵן
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira bien
  - Observa
  - He aquí
  lexicon: HALOT
  rationale: La partícula introduce una afirmación enfática o demostrativa. «Mira» comunica la llamada de atención con naturalidad en español moderno y conserva el tono de evidencia del original.
- source_word: יַעְצֹר
  english_pob_choice: holds back
  chosen_spanish: retiene
  alternatives_spanish:
  - contiene
  - detiene
  - refrena
  lexicon: HALOT
  rationale: Con בַּמַּיִם, el verbo expresa la acción de impedir o contener las aguas. «Retiene» es claro, sobrio y suficientemente cercano al matiz de control sobre el agua.
- source_word: בַּמַּיִם
  english_pob_choice: the waters
  chosen_spanish: las aguas
  alternatives_spanish:
  - el agua
  lexicon: HALOT
  rationale: El plural hebreo מים se refleja mejor con «las aguas», manteniendo el plural idiomático y el alcance poético del texto.
- source_word: וְיִבָשׁוּ
  english_pob_choice: they dry up
  chosen_spanish: se secan
  alternatives_spanish:
  - se desecan
  - quedan secas
  - se secan por completo
  lexicon: HALOT
  rationale: La forma verbal comunica el resultado de la retención de las aguas. «Se secan» es idiomático en español y conserva la brevedad del hebreo.
- source_word: וִישַׁלְּחֵם
  english_pob_choice: if he sends them out
  chosen_spanish: si las suelta
  alternatives_spanish:
  - si las envía
  - si las deja salir
  - si las libera
  lexicon: HALOT
  rationale: El verbo causativo de enviar/liberar las aguas puede expresarse de modo natural como «soltar» en español. «Las suelta» preserva la idea de liberación activa sin perder fluidez.
- source_word: וְיַהַפְכוּ
  english_pob_choice: they overturn
  chosen_spanish: trastornan
  alternatives_spanish:
  - destruyen
  - derriban
  - subvierten
  lexicon: HALOT
  rationale: El verbo הפך aquí describe una convulsión o volteo destructivo. «Trastornan» conserva la fuerza de upheaval sin forzar una sola imagen física como «voltean».
- source_word: אָרֶץ
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra firme
  - el país
  - la tierra/país
  lexicon: HALOT
  rationale: אָרֶץ puede significar «tierra» o «país/territorio». En este contexto sapiencial y cósmico, «la tierra» mantiene la amplitud semántica y es natural en español.
theological_decisions:
- issue: Alcance de אָרֶץ en una afirmación sobre el dominio divino sobre las aguas
  english_pob_reading: the earth
  chosen_spanish_reading: la tierra
  alternative_spanish_readings:
  - el país
  - la tierra firme
  rationale: El versículo presenta el poder de Dios sobre las aguas en términos generales y no exige restringir אָרֶץ a una región concreta. «La tierra» conserva el alcance amplio y la resonancia cósmica del texto.
  doctrine_reference: Providencia soberana de Dios sobre la creación
- issue: Relación entre las dos cláusulas condicionales implícitas
  english_pob_reading: if he holds back... if he sends them out...
  chosen_spanish_reading: si él retiene... si las suelta...
  alternative_spanish_readings:
  - cuando él retiene... cuando las suelta...
  - si las retiene... si las suelta...
  rationale: El hebreo presenta paralelismo condicional/descriptivo. Repetir «si» en español preserva la estructura y el contraste entre contención y liberación de las aguas.
  doctrine_reference: Soberanía activa de Dios en la creación
translation_notes:
  revision_awareness: El texto hebreo y el audit trail en inglés muestran alta concordancia y no registran cambios revisionales. La versión española sigue esa lectura estable, conservando el paralelismo condicional y la amplitud semántica de אֶרֶץ sin introducir matices ajenos al verso.
  spanish_consistency_notes:
  - Se mantiene «las aguas» para reflejar el plural hebreo מים.
  - Se usa «la tierra» como equivalente amplio de אֶרֶץ, con nota alternativa sobre «país/territorio».
  - «Retiene» y «las suelta» preservan el contraste de control y liberación divina de modo idiomático.
  - El tono es sobrio y publicable, sin arcaísmos innecesarios.
