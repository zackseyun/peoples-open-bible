review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la secuencia ritual del hebreo: degollar el macho cabrío por el pecado del pueblo, llevar su sangre al interior del velo, hacer con esa sangre como con la del animal anterior, y rociarla sobre y delante del כַּפֹּרֶת. Sin embargo, hay dos desajustes importantes con el expediente auditado: 1) la nota al pie está mal anclada y es incoherente, porque el texto principal ya usa «propiciatorio» mientras la nota dice «O, tradicionalmente, “propiciatorio”»; 2) «becerro» debilita la correspondencia con הַפָּר y con el inglés auditado «the bull».'
  spanish_quality_summary: El español es en general claro y digno. «Degollará», «macho cabrío», «dentro del velo» y «delante del propiciatorio» funcionan bien. No obstante, la nota actual confunde al lector, y «la rociará» suena menos natural que «rociará la sangre» o «rociará con ella»; además, conviene mantener un término más estándar para הַפָּר, como «toro», para evitar una imagen demasiado juvenil en «becerro».
  glossary_alignment: No hay conflicto con los glosarios mayores del proyecto. Para כַּפֹּרֶת, el borrador usa «propiciatorio», que es una opción tradicional y ampliamente legible en español; dado que el audit trail inglés terminó también con el término tradicional («mercy seat»), esta elección puede mantenerse. Pero si el texto principal usa «propiciatorio», no debe conservarse una nota que ofrezca exactamente la misma lectura. La mejor reparación es eliminar la nota y mantener «propiciatorio» en el texto principal.
  issues:
  - severity: high
    issue: La nota al pie [a] es errónea e incoherente con el texto principal.
    rationale: El texto ya dice «propiciatorio», pero la nota afirma «O, tradicionalmente, “propiciatorio”». Eso no preserva la lógica del audit trail ni aporta una alternativa real; además, crea ruido editorial.
  - severity: medium
    issue: «el becerro» para הַפָּר no refleja bien el valor léxico ni la decisión inglesa auditada.
    rationale: פַּר corresponde normalmente a «toro» o «novillo», no «becerro» en el sentido más común. «Toro» mantiene mejor la fuerza del original y la alineación con «the bull».
  - severity: low
    issue: «y la rociará» tiene antecedente pronominal menos claro que una formulación explícita.
    rationale: Aunque gramaticalmente puede referirse a «la sangre», en una frase larga resulta algo menos transparente en español que repetir el sustantivo.
  revised_spanish_text: Entonces degollará el macho cabrío del sacrificio por el pecado, que es para el pueblo, y llevará su sangre dentro del velo, y hará con su sangre como hizo con la sangre del toro; y rociará la sangre sobre el propiciatorio y delante del propiciatorio.
  revision_rationale: Se elimina la nota porque estaba mal formulada y no ofrecía una alternativa real. Se cambia «becerro» por «toro» para reflejar mejor הַפָּר y la decisión auditada «the bull». Se explicita «la sangre» en lugar de «la» para mejorar claridad en español sin apartarse del sentido del hebreo.
