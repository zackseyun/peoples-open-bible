translation:
  language: es
  text: El rey David ya era viejo[a], avanzado en días; y lo cubrieron con ropas, pero no podía entrar en calor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión hebrea «avanzado en días» es un modismo que significa muy viejo o muy entrado en años.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/הַ/מֶּלֶךְ
  english_pob_choice: Now King
  chosen_spanish: Ahora el rey
  alternatives_spanish:
  - Y el rey
  - El rey
  lexicon: HALOT
  rationale: El וְ inicial introduce la escena narrativa; en español, «Ahora» funciona bien como marcación de inicio de episodio. Se conserva el sustantivo «rey» como equivalente directo de מֶלֶךְ, con el artículo definido por el hebreo.
- source_word: דָּוִד
  english_pob_choice: David
  chosen_spanish: David
  alternatives_spanish:
  - —
  lexicon: HALOT
  rationale: Nombre propio transliterado de manera estándar en español.
- source_word: זָקֵן
  english_pob_choice: was old
  chosen_spanish: estaba viejo
  alternatives_spanish:
  - era anciano
  - había envejecido
  lexicon: HALOT
  rationale: El hebreo expresa edad avanzada de manera directa. «Estaba viejo» mantiene la fuerza factual sin suavizarla; «anciano» sería más formal, pero algo más interpretativo en registro.
- source_word: בָּא בַּיָּמִים
  english_pob_choice: advanced in days
  chosen_spanish: avanzado en días
  alternatives_spanish:
  - bien entrado en años
  - muy anciano
  - ya entrado en años
  lexicon: HALOT
  rationale: Se conserva el giro idiomático con un equivalente muy cercano al original y al auditable inglés POB. «En días» refleja el componente literal del hebreo y mantiene la imagen temporal.
- source_word: וַיְכַסֻּהוּ
  english_pob_choice: they covered him
  chosen_spanish: lo cubrían
  alternatives_spanish:
  - lo cubrieron
  - lo habían cubierto
  lexicon: HALOT
  rationale: El sujeto plural indefinido se mantiene con «lo cubrían». El imperfecto español puede reflejar la acción habitual o en curso sin añadir una lectura concesiva que el hebreo no exige.
- source_word: בַּבְּגָדִים
  english_pob_choice: with garments
  chosen_spanish: con vestidos
  alternatives_spanish:
  - con ropas
  - con prendas
  - con mantos
  lexicon: HALOT
  rationale: בְּגָדִים significa vestidos/ropa. «Vestidos» es formal y suficientemente general; «mantos» sería demasiado específico e interpretativo.
- source_word: וְלֹא יִחַם לוֹ
  english_pob_choice: he could not get warm
  chosen_spanish: no podía calentarse
  alternatives_spanish:
  - no podía entrar en calor
  - no se calentaba
  - no lograba entrar en calor
  lexicon: HALOT
  rationale: El verbo חם expresa volverse caliente o entrar en calor. «No podía calentarse» es natural en español y conserva la idea de incapacidad persistente sin agregar matices ajenos.
translation_notes:
  revision_awareness: 'Se revisó la progresión narrativa para evitar introducir una concesión no explícita en el hebreo. La versión española mantiene el contraste simple: el rey recibe abrigo, pero no consigue entrar en calor.'
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se prefirió «vestidos»/«vestir» por el campo semántico de בְּגָדִים; no se especifican mantas porque el texto no lo indica.
  - Se mantuvo el orden narrativo breve y directo del hebreo, con un español fluido y de registro bíblico moderno.
