revisions:
- from: Aun en tus pensamientos[a], no maldigas a un rey, y en tu dormitorio[b] no maldigas a un rico, porque un ave de los cielos[c] puede llevar la voz, y un ser alado puede dar a conocer el asunto.
  to: Aun en tus pensamientos[a], no maldigas a un rey, y en tu dormitorio[b] no maldigas a un rico, porque un ave de los cielos[c] puede llevar el sonido, y un ser alado puede dar a conocer el asunto.
  rationale: 'Se hace una reparación pequeña pero importante: «llevar el sonido» sigue mejor la elección auditada «carry the sound» y evita la ambigüedad idiomática de «llevar la voz». También se corrige la comilla errónea en la nota c. El resto del versículo puede mantenerse tal como está.'
