translation:
  language: es
  text: Miren ahora que yo[a], yo mismo, soy él, y no hay dios[b] junto a mí. Yo doy muerte[c] y yo doy vida; yo he herido[d] y yo sanaré; y no hay quien libre de mi mano[e].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «yo, yo soy él». La repetición del pronombre hebreo es enfática.
    reason: previous_rendering
  - marker: b
    text: O «conmigo». El hebreo puede leerse más literalmente como «con», pero aquí probablemente expresa que no hay ningún dios al lado de Yahvé.
    reason: lexical_alternative
  - marker: c
    text: O «Yo mato y yo hago vivir».
    reason: lexical_alternative
  - marker: d
    text: O «yo he quebrantado, y sanaré». El verbo hebreo puede tener un sentido más fuerte, como aplastar o quebrantar.
    reason: lexical_alternative
  - marker: e
    text: Hebreo «de mi mano», un modismo para escapar del poder o control de alguien.
    reason: cultural_note
lexical_decisions:
- source_word: רְאוּ
  english_pob_choice: See
  chosen_spanish: Miren
  alternatives_spanish:
  - Vean
  - Observen
  lexicon: HALOT
  rationale: El imperativo plural convoca a toda la audiencia a reconocer la verdad declarada. «Miren» es natural en español y conserva el llamado directo mejor que una formulación más abstracta.
- source_word: עַתָּה
  english_pob_choice: now
  chosen_spanish: ahora
  alternatives_spanish:
  - en este momento
  lexicon: HALOT
  rationale: Marca el momento presente de la exhortación; «ahora» es la equivalencia más directa y clara en español.
- source_word: כִּי אֲנִי אֲנִי הוּא
  english_pob_choice: that I, even I, am he
  chosen_spanish: que yo, yo mismo, soy él
  alternatives_spanish:
  - que yo, yo soy él
  - que yo mismo soy él
  lexicon: HALOT
  rationale: Se preserva la repetición enfática del pronombre y la identificación «soy él». «Yo mismo» transmite la fuerza enfática natural del hebreo sin sonar como error tipográfico en español.
- source_word: וְאֵין אֱלֹהִים עִמָּדִי
  english_pob_choice: and there is no god beside me
  chosen_spanish: y no hay Dios junto a mí
  alternatives_spanish:
  - y no hay dios con respecto a mí
  - y no hay Dios conmigo
  lexicon: HALOT
  rationale: La preposición עִם en este contexto expresa compañía o asociación en una afirmación de exclusividad divina. «Junto a mí» comunica esa exclusión de manera idiomática; se conserva «Dios» con mayúscula porque el referente es el único Dios verdadero, no una deidad rival genérica.
- source_word: אָמִית
  english_pob_choice: I put to death
  chosen_spanish: yo doy muerte
  alternatives_spanish:
  - yo hago morir
  - yo mato
  lexicon: HALOT
  rationale: El causativo expresa la acción divina de ejecutar la muerte. «Doy muerte» es solemne y fiel, y evita una lectura demasiado coloquial de «mato».
- source_word: וַאֲחַיֶּה
  english_pob_choice: and I make alive
  chosen_spanish: y yo doy vida
  alternatives_spanish:
  - y yo hago vivir
  - y yo revivo
  lexicon: HALOT
  rationale: En paralelo con «doy muerte», «doy vida» mantiene la simetría y la agencia divina. Es una equivalencia clara para el hebreo sin perder el contraste poético.
- source_word: מָחַצְתִּי
  english_pob_choice: I have wounded
  chosen_spanish: yo hiero
  alternatives_spanish:
  - yo he herido
  - yo he golpeado
  lexicon: HALOT
  rationale: El verbo puede abarcar herir, golpear o aplastar. En español, el par con «sanaré» se expresa con claridad y brevedad con «hiero»; mantiene la tensión entre daño y restauración, aunque es menos explícito que «he herido».
- source_word: וַאֲנִי אֶרְפָּא
  english_pob_choice: and I will heal
  chosen_spanish: y yo sanaré
  alternatives_spanish:
  - y yo curaré
  - y yo sanaré de nuevo
  lexicon: HALOT
  rationale: El futuro conserva el movimiento del texto hacia la restauración. «Sanaré» es la forma más natural y digna en español bíblico contemporáneo.
- source_word: וְאֵין מִיָּדִי מַצִּיל
  english_pob_choice: and there is no one who can deliver from my hand
  chosen_spanish: y no hay quien libre de mi mano
  alternatives_spanish:
  - y no hay quien pueda rescatar de mi mano
  - y no hay libertador de mi mano
  lexicon: HALOT
  rationale: Se preserva el modismo «de mi mano» como imagen de poder y control. «Libre» comunica la acción de rescatar/deliverar de manera breve y idiomática en español.
theological_decisions:
- issue: Exclusividad divina frente a otros dioses
  english_pob_reading: The verse is rendered as an exclusive claim that no god exists beside the LORD, without softening it to mere superiority over other deities.
  chosen_spanish_reading: 'La traducción afirma exclusividad: no hay otro Dios junto a Yahvé.'
  alternative_spanish_readings:
  - no hay dioses aliados conmigo
  - no hay un dios comparable a mí
  rationale: El hebreo no solo contrasta poder, sino la ausencia de cualquier deidad que acompañe o rivalice. «Junto a mí» preserva esa exclusión sin convertirla en una paráfrasis filosófica.
  doctrine_reference: Afirmaciones; filosofía de traducción §3
- issue: Énfasis de ‘yo, yo mismo, soy él’
  english_pob_reading: Retain the simple wording 'I am he' without expanding it into a doctrinal formula.
  chosen_spanish_reading: Se conserva la identificación enfática sin convertirla en fórmula doctrinal ampliada.
  alternative_spanish_readings:
  - yo soy él
  - yo, yo soy él
  rationale: La repetición pronominal es teológicamente significativa y conviene mantenerla. «Yo mismo» expresa el énfasis de manera natural en español, sin añadir explicaciones ajenas al texto.
  doctrine_reference: Filosofía de traducción §1, §3
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que resolvió la incomodidad de «I, I am he» hacia una forma enfática natural («I, even I, am he»). Por eso el español usa «yo mismo» para reflejar la repetición sin sonar defectuoso. También se atendió la nota de exclusividad de אֵין אֱלֹהִים עִמָּדִי y el juego verbal entre muerte/vida y herida/sanación, manteniendo esas tensiones en español.
  spanish_consistency_notes:
  - Se usa «Yahvé» en el sistema de traducción POB, pero en este versículo el texto hebreo presenta una autoafirmación divina sin el Tetragrámaton explícito; por eso la forma del versículo no lo introduce.
  - Se mantiene el paralelismo poético con verbos breves y solemnes.
  - «Dios» se escribe con mayúscula al referirse al único Dios verdadero, mientras que la negación excluye la existencia de otro ser divino junto a él.
