translation:
  language: es
  text: Pero toda la plata y el oro, y los utensilios de bronce y de hierro, son consagrados a Yahvé[a]; entrarán en el tesoro de Yahvé[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo usa singular («es santo» y «entrará/irá»), refiriéndose al conjunto como una sola realidad consagrada.
    reason: lexical_alternative
  - marker: b
    text: 'O «el tesoro de Yahvé»; hebreo: «tesoro de Yahvé».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/כֹל
  english_pob_choice: But all
  chosen_spanish: Pero todo
  alternatives_spanish:
  - Y todo
  - Mas todo
  lexicon: HALOT
  rationale: El hebreo une la frase con la instrucción anterior y aquí el valor adversativo se expresa de manera natural en español con «Pero». «Todo» conserva el alcance total de כֹּל sin añadir elementos no presentes.
- source_word: כֶּסֶף
  english_pob_choice: silver
  chosen_spanish: plata
  alternatives_spanish:
  - dinero
  lexicon: HALOT
  rationale: Aquí el término designa el metal, coordinado con oro y con objetos metálicos; «plata» es el equivalente natural en español y evita la abstracción de «dinero».
- source_word: וְ/זָהָב
  english_pob_choice: and gold
  chosen_spanish: y el oro
  alternatives_spanish:
  - y oro
  lexicon: HALOT
  rationale: Se mantiene el metal en forma directa; el artículo ayuda a la fluidez en español en una enumeración sustantivada.
- source_word: וּ/כְלֵי
  english_pob_choice: and the vessels of
  chosen_spanish: y los utensilios de
  alternatives_spanish:
  - y los vasos de
  - y los objetos de
  lexicon: HALOT
  rationale: כְּלִי es un término amplio para objetos/implementos. «Utensilios» conserva la amplitud semántica y funciona bien con la lista de metales y con el contexto de consagración al santuario.
- source_word: נְחֹשֶׁת
  english_pob_choice: bronze
  chosen_spanish: bronce
  alternatives_spanish:
  - cobre
  lexicon: HALOT
  rationale: En contextos materiales bíblicos, la equivalencia habitual y más idiomática en español es «bronce»; «cobre» podría estrechar indebidamente el alcance del término.
- source_word: וּ/בַרְזֶל
  english_pob_choice: and iron
  chosen_spanish: y de hierro
  alternatives_spanish:
  - y hierro
  lexicon: HALOT
  rationale: Se mantiene el metal de manera directa. El «de» ayuda a coordinar naturalmente con la serie «de bronce y de hierro».
- source_word: קֹדֶשׁ הוּא לַ/יהוָה
  english_pob_choice: are holy to Yahweh
  chosen_spanish: son cosa consagrada a Yahvé
  alternatives_spanish:
  - son santos para Yahvé
  - pertenecen como cosa sagrada a Yahvé
  - están consagrados a Yahvé
  lexicon: HALOT
  rationale: El hebreo presenta un singular colectivo («es santo») referido al conjunto. En español, «cosa consagrada» conserva la idea de separación sacra sin forzar una fórmula litúrgica ajena al contexto; el plural verbal sigue la lectura colectiva del conjunto de plata, oro y utensilios.
- source_word: לַֽ/יהוָה
  english_pob_choice: the LORD / Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - para Yahvé
  - de Yahvé
  lexicon: HALOT
  rationale: Según la pauta del proyecto, יְהוָה se vierte «Yahvé». La preposición לַ indica destinación/pertenencia consagratoria; «a Yahvé» la conserva de forma breve y fiel.
- source_word: אוֹצַר יְהוָה
  english_pob_choice: the treasury of Yahweh
  chosen_spanish: el tesoro de Yahvé
  alternatives_spanish:
  - el tesoro de Yahvé
  - el almacén de Yahvé
  - la tesorería de Yahvé
  lexicon: HALOT
  rationale: אוֹצָר puede ser tesoro o depósito/almacén. «Tesoro» es el equivalente más natural en español y mantiene la imagen de bienes reservados para Yahvé; «tesorería» sonaría más administrativa.
- source_word: יָבֹוא
  english_pob_choice: they shall go into
  chosen_spanish: entrarán
  alternatives_spanish:
  - irán
  - serán llevados
  lexicon: HALOT
  rationale: El verbo hebreo está en singular colectivo, como señaló el texto inglés. En español, el plural expresa con naturalidad el sujeto compuesto implícito sin perder la idea de movimiento hacia el tesoro.
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El paquete de auditaría inglesa usa «Yahweh» como decisión teológica para preservar el nombre propio divino. En español, el equivalente consagrado en este proyecto es «Yahvé», coherente con la política terminológica indicada y con la transparencia frente al tetragrámaton.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé in Spanish'
- issue: Colectivo singular en la cláusula de santidad
  english_pob_reading: Hebrew has singular 'is holy' and 'shall come/go,' treating the listed metals and objects as a collective whole.
  chosen_spanish_reading: 'plural colectivo: «son cosa consagrada» y «entrarán»'
  alternative_spanish_readings:
  - 'singular literal: «es cosa consagrada» y «entrará»'
  - 'impersonal: «se consagra… y entra…»'
  rationale: El hebreo trata la serie como un solo conjunto consagrado. El español requiere concordancia más natural; se optó por un plural que preserva el sentido colectivo señalado por el texto auditado, sin borrar la tensión gramatical del original.
  doctrine_reference: Observación gramatical del texto hebreo en el audit trail inglés
translation_notes:
  revision_awareness: No se registraron cambios posteriores en el texto de referencia auditado; el pasaje muestra alto acuerdo entre la revisión y el control cruzado, sin correcciones pendientes. Se ha mantenido la decisión terminológica sobre el nombre divino y la lectura colectiva del hebreo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יהוה conforme a la política del proyecto en español.
  - «Plata» traduce כֶּסֶף como metal, no como dinero.
  - «Tesoro» conserva la idea de un depósito reservado para uso sagrado.
  - La concordancia plural en español refleja el sujeto colectivo del hebreo sin alterar el contenido.
  - Se evita «SEÑOR» para no ocultar el nombre divino explícito del texto.
