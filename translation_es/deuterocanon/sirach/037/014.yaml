review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue correctamente el hebreo como texto principal y conserva en nota la fuerte divergencia del paralelo griego, en línea con la política del proyecto. Sin embargo, la formulación española no preserva bien dos matices léxicos: אל תתגר se acerca más a ''regatear/negociar'' que a ''tratar'', y el par ממקנה / ממכר debe mantenerse como compra/venta, no comprimirse en ''compraventa'', porque el hebreo presenta dos términos coordinados.'
  spanish_quality_summary: La frase actual es comprensible, pero 'No trates con un mercader' suena demasiado amplia y puede sugerir simple asociación social, no regateo comercial. 'Ni sobre compraventa' también resulta algo nominal y condensado en exceso; 'ni sobre comprar y vender' fluye mejor y conserva el paralelismo. La nota es clara, pero conviene traducir αὐτῆς de forma femenina para concordar con 'el consejo'.
  glossary_alignment: 'No hay conflictos con la terminología doctrinal principal del proyecto. La cuestión clave es estilística y semántica: preferir un verbo comercial más preciso y no perder el contraste hebreo compra/venta. ''Mercader'' es aceptable, aunque ''comerciante'' también sería natural; se puede conservar ''mercader'' por el tono sapiencial.'
  issues:
  - severity: medium
    issue: '''No trates'' es demasiado amplio para אל תתגר en este contexto comercial.'
    rationale: El contexto con 'mercader' y la cláusula de compra/venta acota el verbo a entrar en regateo o negociación, no simplemente 'tratar con' alguien.
  - severity: medium
    issue: '''sobre compraventa'' colapsa dos términos hebreos distintos en un solo sustantivo.'
    rationale: ממקנה y ממכר forman un par de compra/venta. La compresión en 'compraventa' borra el paralelismo y debilita la correspondencia con la evidencia fuente y el audit trail inglés.
  - severity: low
    issue: La nota dice 'nadie más fiel a ti que él' para un antecedente femenino en griego/español ('el consejo').
    rationale: Aunque en español puede entenderse por atracción al sustantivo 'consejo', la traducción más ajustada al griego αὐτῆς y al antecedente explícito es 'que este' o una reformulación impersonal.
  revised_spanish_text: No regatees con un mercader[a], ni sobre comprar y vender.
  revised_footnotes:
