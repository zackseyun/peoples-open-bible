- from: Y me volveré hacia ustedes, y los haré fecundos y los multiplicaré[a], y estableceré mi pacto con ustedes.
  to: Y me volveré hacia ustedes, y los haré fecundos y los multiplicaré[a], y estableceré mi alianza con ustedes.
