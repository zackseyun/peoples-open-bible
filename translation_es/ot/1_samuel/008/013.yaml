translation:
  language: es
  text: Tomará a sus hijas para que sean perfumistas[a], cocineras y panaderas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'preparadoras de ungüentos' para 'perfumistas'. El término hebreo puede referirse en general a quienes preparan mezclas aromáticas, incluyendo perfumes o ungüentos.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֶת
  english_pob_choice: '[direct object marker, not translated independently]'
  chosen_spanish: '[marcador de objeto directo, no traducido de forma independiente]'
  alternatives_spanish:
  - —
  lexicon: HALOT
  rationale: En español, el marcador de objeto directo hebreo no se representa como palabra aparte; la función sintáctica queda marcada por el orden y la concordancia del verbo con el objeto.
- source_word: בְּנוֹתֵיכֶם
  english_pob_choice: your daughters
  chosen_spanish: sus hijas
  alternatives_spanish:
  - vuestras hijas
  - sus muchachas
  lexicon: HALOT
  rationale: 'El sentido principal es familiar y posesivo: hijas de ustedes. ''Sus'' funciona de manera neutra en español latinoamericano y evita forzar un tono peninsular.'
- source_word: יִקָּח
  english_pob_choice: he will take
  chosen_spanish: tomará
  alternatives_spanish:
  - tomará para sí
  - se llevará
  lexicon: HALOT
  rationale: El imperfecto hebreo tiene fuerza futura en esta advertencia. 'Tomará' conserva el valor de apropiación/coacción sin añadir un matiz reflexivo que no exige el hebreo.
- source_word: לְרַקָּחוֹת
  english_pob_choice: to be perfumers
  chosen_spanish: perfumistas
  alternatives_spanish:
  - preparadoras de ungüentos
  - mezcladoras de perfumes
  lexicon: HALOT
  rationale: El término hebreo puede abarcar quienes preparan perfumes o ungüentos aromáticos. 'Perfumistas' es natural en español y mantiene la amplitud semántica mejor que una versión demasiado estrecha.
- source_word: וּלְטַבָּחוֹת
  english_pob_choice: cooks
  chosen_spanish: cocineras
  alternatives_spanish:
  - cocineros
  - mujeres cocineras
  lexicon: HALOT
  rationale: La forma femenina plural del hebreo queda reflejada con 'cocineras'. En español suena más preciso que el masculino genérico, porque el texto habla de las hijas.
- source_word: וּלְאֹפוֹת
  english_pob_choice: bakers
  chosen_spanish: panaderas
  alternatives_spanish:
  - panificadoras
  - amasadoras de pan
  lexicon: HALOT
  rationale: El sustantivo verbal hebreo designa mujeres dedicadas a hornear pan. 'Panaderas' comunica de manera natural el oficio y preserva la referencia femenina.
translation_notes:
  revision_awareness: El testimonio de revisión más reciente indica concordancia alta y sin cambios necesarios; por eso el borrador español sigue de cerca la lectura auditada en inglés, ajustando solo la formulación para que sea natural y fiel en español.
  spanish_consistency_notes:
  - Se mantiene el futuro profético con 'tomará'.
  - Se conserva el matiz femenino explícito en los oficios ('perfumistas', 'cocineras', 'panaderas').
  - Se evita 'SEÑOR' u otra terminología no pertinente, pues el versículo no contiene el nombre divino.
  - La nota al pie conserva la alternativa lexical documentada para el primer oficio.
