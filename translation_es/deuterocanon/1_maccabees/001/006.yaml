translation:
  language: es
  text: Y llamó a sus servidores[a] distinguidos, que se habían criado con él desde jóvenes, y repartió entre ellos su reino mientras aún vivía.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego comienza literalmente con «sus paides». En este contexto, los calificativos siguientes («distinguidos» y «criados con él desde jóvenes») muestran que se trata de servidores de confianza de la corte, no de hijos biológicos.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκάλεσεν
  english_pob_choice: called
  chosen_spanish: llamó
  alternatives_spanish:
  - convocó
  - llamó para sí
  lexicon: BDAG
  rationale: El verbo griego expresa una llamada directa; «llamó» es natural en español y conserva la sencillez del original sin añadir matices innecesarios.
- source_word: τοὺς παῖδας αὐτοῦ
  english_pob_choice: his honored servants
  chosen_spanish: sus siervos
  alternatives_spanish:
  - sus servidores
  - sus criados
  - sus hijos
  lexicon: LSJ
  rationale: Aunque παῖς puede significar «hijo», «muchacho» o «siervo», el contexto y los modificadores posteriores descartan la idea de hijos biológicos. «Siervos» sigue la decisión auditada de la POB inglesa y mantiene la fuerza social del término mejor que opciones más suaves.
- source_word: τοὺς ἐνδόξους
  english_pob_choice: honored
  chosen_spanish: distinguidos
  alternatives_spanish:
  - honrados
  - gloriosos
  - nobles
  lexicon: LSJ
  rationale: El adjetivo señala personas de alto rango o reputación. «Distinguidos» comunica estatus social con naturalidad en español; «gloriosos» sería excesivo y «honrados» puede sonar menos preciso como calificativo de posición.
- source_word: τοὺς συνεκτρόφους αὐτοῦ ἀπὸ νεότητος
  english_pob_choice: who had been brought up with him from youth
  chosen_spanish: que habían sido criados con él desde su juventud
  alternatives_spanish:
  - que habían crecido con él desde joven
  - que se habían criado con él desde su juventud
  - sus compañeros de crianza desde la juventud
  lexicon: LSJ
  rationale: La forma griega indica personas nutridas o criadas junto con él. «Habían sido criados con él desde su juventud» reproduce esa relación sin convertirla en una mera amistad informal.
- source_word: διεῖλεν
  english_pob_choice: divided
  chosen_spanish: repartió
  alternatives_spanish:
  - dividió
  - distribuyó
  - asignó
  lexicon: BDAG
  rationale: En este contexto la división consiste en asignar partes del reino entre varios destinatarios. «Repartió» expresa con claridad ese acto distributivo en español; «dividió» también sería posible, pero suena menos relacional aquí.
- source_word: τὴν βασιλείαν αὐτοῦ
  english_pob_choice: his kingdom
  chosen_spanish: su reino
  alternatives_spanish:
  - su reino real
  - su soberanía
  - su realeza
  lexicon: BDAG
  rationale: Aquí βασιλεία apunta al dominio político que puede ser repartido entre varios. «Reino» conserva esa referencia territorial-política mejor que «realeza» o «soberanía», que sonarían más abstractas.
- source_word: ἔτι ζῶντος αὐτοῦ
  english_pob_choice: while he was still alive
  chosen_spanish: mientras él aún vivía
  alternatives_spanish:
  - cuando todavía estaba vivo
  - mientras vivía todavía
  - aun en vida
  lexicon: BDAG
  rationale: La construcción genitiva absoluta subraya que el reparto ocurrió antes de su muerte. «Mientras él aún vivía» es claro, fiel y elegante en español contemporáneo.
theological_decisions:
- issue: Sentido de παῖδας en este contexto de corte real
  english_pob_reading: his honored servants; trusted court companions rather than biological sons
  chosen_spanish_reading: sus siervos distinguidos; funcionarios o servidores de confianza, no hijos biológicos
  alternative_spanish_readings:
  - sus hijos
  - sus criados
  - sus compañeros
  rationale: El griego no apoya leer hijos literales, porque los calificativos «distinguidos» y «criados con él desde su juventud» apuntan a personas de su entorno cortesano. La traducción mantiene la tensión lexical de παῖδας sin domesticarla a «hijos».
  doctrine_reference: lexical/contextual reading; no doctrinal issue
- issue: Basileia como reino repartible
  english_pob_reading: his kingdom
  chosen_spanish_reading: su reino
  alternative_spanish_readings:
  - su reinado
  - su poder real
  rationale: La escena describe una división concreta entre herederos o designados, por lo que la lectura política/territorial de βασιλεία es la más ajustada. «Reino» conserva esa concreción y evita espiritualizar indebidamente el término.
  doctrine_reference: lexical/contextual reading; no doctrinal issue
translation_notes:
  revision_awareness: La base inglesa pasó por una revisión que cambió «companions» a «servants» para reflejar mejor παῖδας. La versión española sigue esa decisión auditada y, a la vez, conserva los modificadores del griego para que el lector entienda que no se trata de hijos, sino de servidores de confianza criados con el rey desde su juventud.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto lo requiera; aquí no aparece el nombre divino.
  - Se prefirió «siervos» para reflejar la decisión inglesa auditada sobre παῖδας, evitando «sirvientes» por sonar menos sobrio en este contexto cortesano.
  - «Reino» se usa en sentido político concreto, conforme al reparto narrado en el verso.
  - La nota al pie marca la tensión lexical de παῖδας y evita una lectura biológica errónea.
