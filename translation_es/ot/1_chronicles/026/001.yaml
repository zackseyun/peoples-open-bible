translation:
  language: es
  text: 'Para las divisiones de los porteros[a]: de los coreítas, Meselemías hijo de Coré, de los hijos de Asaf.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Según las divisiones de los porteros». La frase inicial funciona como encabezado que introduce las divisiones de los porteros.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְמַחְלְקוֹת
  english_pob_choice: For the divisions
  chosen_spanish: Para las divisiones
  alternatives_spanish:
  - Según las divisiones
  - Con respecto a las divisiones
  lexicon: HALOT
  rationale: La ל prefijada funciona aquí como encabezado o rubro de sección, no como finalidad estricta. En español, 'Para las divisiones' conserva ese valor de encabezado de manera natural y readable, sin perder la idea de grupos organizados.
- source_word: לְשֹׁעֲרִים
  english_pob_choice: of the gatekeepers
  chosen_spanish: de los porteros
  alternatives_spanish:
  - de los guardianes de la puerta
  - de los doorkeepers
  lexicon: HALOT
  rationale: שֹׁעֲרִים designa a los encargados de las puertas; 'porteros' es un equivalente español claro y bíblicamente inteligible. 'Gatekeepers' se vierte con un término funcional, no con una transliteración innecesaria.
- source_word: לַקָּרְחִים
  english_pob_choice: of the Korahites
  chosen_spanish: de los coreítas
  alternatives_spanish:
  - de los coraítas
  - de los descendientes de Coré
  lexicon: HALOT
  rationale: El grupo se identifica por descendencia/clan. 'Coreítas' preserva la forma gentilicia del hebreo y mantiene la referencia colectiva sin ampliar más de lo que el texto dice. Se prefiere esta forma a una paráfrasis explicativa en el cuerpo del versículo.
- source_word: מְשֶׁלֶמְיָהוּ
  english_pob_choice: Meshelemiah
  chosen_spanish: Meshelemías
  alternatives_spanish:
  - Meshelemía
  - Shelemías
  lexicon: HALOT
  rationale: Nombre propio transliterado con adaptación morfológica al español. Se usa la forma que mejor reproduce el valor consonántico y resulta legible en español bíblico.
- source_word: בֶן
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - descendiente de
  lexicon: HALOT
  rationale: En una genealogía inmediata, 'hijo de' es la equivalencia directa y más natural en español. 'Descendiente de' sería más general de lo que exige el hebreo en este contexto.
- source_word: קֹרֵא
  english_pob_choice: Kore
  chosen_spanish: Core
  alternatives_spanish:
  - Coré
  lexicon: HALOT
  rationale: Nombre propio transliterado según el uso bíblico en español para este linaje. Se conserva la forma de nombre, sin añadir identificación interpretativa adicional.
- source_word: מִן בְּנֵי אָסָף
  english_pob_choice: from the sons of Asaph
  chosen_spanish: de los hijos de Asaf
  alternatives_spanish:
  - entre los hijos de Asaf
  - procedente de los hijos de Asaf
  lexicon: HALOT
  rationale: מִן expresa procedencia o pertenencia dentro de un grupo. En español, 'de los hijos de Asaf' mantiene la relación de pertenencia de manera directa y evita sobreinterpretar la preposición.
theological_decisions:
- issue: Valor de encabezado de la preposición inicial לְ en un listado administrativo
  english_pob_reading: The opening phrase functions like a section heading introducing the gatekeeper divisions.
  chosen_spanish_reading: La frase inicial funciona como encabezado de sección que introduce las divisiones de los porteros.
  alternative_spanish_readings:
  - La frase inicial indica a qué se refieren las divisiones
  - La frase inicial puede leerse como encabezado administrativo
  rationale: El hebreo presenta una fórmula de rubro/listado. La traducción española debe conservar ese valor organizativo sin convertirlo en una finalidad teológica o en una frase más explicativa de lo que permite el texto.
  doctrine_reference: Estructura textual y uso administrativo del culto levítico; no implica una doctrina específica.
translation_notes:
  revision_awareness: El texto español sigue de cerca el hebreo y coincide con la lectura aprobada en inglés; no se aplicaron revisiones textuales ni cambios de sentido.
  spanish_consistency_notes:
  - Se preservó 'Yahvé' como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se evitó 'Cristo/Mesías' porque el pasaje es una lista genealógico-administrativa y no usa esos títulos.
  - Se usó 'porteros' para שֹׁעֲרִים por claridad bíblica en español, manteniendo el valor funcional del término.
  - Se mantuvo la estructura de lista con dos puntos, coherente con el valor de encabezado reconocido en el audit trail.
