  - severity: low
    issue: La nota [b] no preserva una alternativa significativa
    rationale: La nota actual ('de un lado y del otro', es decir, 'a ambos lados') repite el sentido del texto en vez de reflejar la alternativa documentada en inglés, equivalente a 'de un lado y del otro / a un lado y al otro' o, mejor aún, la alternativa asociada a la frase final.
  - severity: low
