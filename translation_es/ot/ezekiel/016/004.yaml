translation:
  language: es
  text: Y en cuanto a tu nacimiento[a], el día en que naciste no te cortaron el cordón, y no fuiste lavada con agua para tu limpieza[b]; no fuiste frotada con sal[c], y no fuiste envuelta en paños[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tus orígenes». El hebreo plural es idiomático y puede referirse a las circunstancias de tu nacimiento.
    reason: lexical_alternative
  - marker: b
    text: O «para asearte»; o «para suavizarte». El hebreo es raro, y los intérpretes difieren sobre si destaca la limpieza del recién nacido o el frotamiento de su piel.
    reason: lexical_alternative
  - marker: c
    text: Es decir, según una práctica antigua de cuidado del recién nacido, al bebé se le frotaba con sal.
    reason: cultural_note
  - marker: d
    text: O «no fuiste fajada».
    reason: lexical_alternative
lexical_decisions:
- source_word: מוֹלְדוֹתַיִךְ
  english_pob_choice: your birth
  chosen_spanish: tu nacimiento
  alternatives_spanish:
  - tus orígenes
  - tu natividad
  lexicon: HALOT
  rationale: El hebreo plural funciona de modo idiomático para las circunstancias del nacimiento/origen. «Tu nacimiento» es natural en español y conserva la referencia inmediata al parto, sin ampliar innecesariamente el sentido a «orígenes».
- source_word: בְּיוֹם הוּלֶּדֶת אֹתָךְ
  english_pob_choice: on the day you were born
  chosen_spanish: el día en que naciste
  alternatives_spanish:
  - en el día en que naciste
  lexicon: HALOT
  rationale: Es una cláusula temporal directa. «El día en que naciste» suena más natural en español moderno que un calco con «en el día».
- source_word: שָׁרֵךְ
  english_pob_choice: your cord
  chosen_spanish: el cordón
  alternatives_spanish:
  - tu cordón umbilical
  - tu cordón
  lexicon: HALOT
  rationale: El referente es el cordón umbilical del recién nacido. Aquí «cordón» funciona con suficiente claridad dentro del contexto de nacimiento, sin volver el texto excesivamente clínico.
- source_word: כָרַּת
  english_pob_choice: was not cut
  chosen_spanish: no te cortaron
  alternatives_spanish:
  - no fue cortado
  - no te lo cortaron
  lexicon: HALOT
  rationale: El hebreo presenta el cordón como objeto afectado; en español, la pasiva refleja o impersonal con dativo resulta más natural. «No te cortaron el cordón» comunica bien la acción sin forzar una pasiva.
- source_word: רֻחַצְתְּ בְמַיִם
  english_pob_choice: you were not washed with water
  chosen_spanish: no fuiste lavada con agua
  alternatives_spanish:
  - no te lavaron con agua
  - no fuiste bañada con agua
  lexicon: HALOT
  rationale: Se trata de la limpieza posnatal. «Lavada con agua» reproduce con claridad la imagen hebrea y es idiomática en español; «bañada» podría sonar más fuerte de lo necesario.
- source_word: לְמִשְׁעִי
  english_pob_choice: for cleansing
  chosen_spanish: para limpiar
  alternatives_spanish:
  - para limpieza
  - para asearte
  lexicon: HALOT
  rationale: La forma es rara y el inglés POB opta por un matiz de finalidad, no por una expansión interpretativa. «Para limpiar» mantiene ese valor funcional en español, sin fijar demasiado el mecanismo exacto.
- source_word: הָמְלֵחַ ... הֻמְלַחַתְּ
  english_pob_choice: you were not rubbed with salt
  chosen_spanish: no fuiste frotada con sal
  alternatives_spanish:
  - no fuiste salada
  - no te salaron
  lexicon: HALOT
  rationale: El hebreo alude a la práctica antigua de frotar al recién nacido con sal. «Frotada con sal» conserva la acción concreta y evita la ambigüedad culinaria de «salada».
- source_word: הָחְתֵּל ... חֻתָּלְתְּ
  english_pob_choice: you were not wrapped in cloths
  chosen_spanish: no fuiste envuelta en paños
  alternatives_spanish:
  - no fuiste envuelta en telas
  - no fuiste fajada
  lexicon: HALOT
  rationale: El verbo describe el envolvimiento del recién nacido. «Envuelta en paños» es claro y digno en español; «fajada» es más tradicional pero menos transparente para lectores generales.
theological_decisions:
- issue: Imagen de abandono neonatal como figura de humillación
  english_pob_reading: 'The verse lists unmet newborn-care practices: cutting the cord, washing, salting, and wrapping.'
  chosen_spanish_reading: 'El verso enumera cuidados posnatales omitidos: cortar el cordón, lavar, frotar con sal y envolver.'
  alternative_spanish_readings:
  - lista rasgos de descuido total al nacer
  - describe una falta de atención médica o ritual
  rationale: No conviene convertir la descripción en una generalización moderna de «atención médica». El hebreo presenta prácticas concretas de cuidado del recién nacido, y el español debe conservar esa concreción para sostener la metáfora de abandono y vergüenza.
  doctrine_reference: Ezequiel 16:4; lectura literaria y profética del abandono
- issue: Valor de לְמִשְׁעִי
  english_pob_reading: The English POB preserves interpretive restraint with 'for cleansing' and notes the rare term in a footnote.
  chosen_spanish_reading: Se mantiene el mismo pudor interpretativo con «para limpiar».
  alternative_spanish_readings:
  - para limpieza
  - para asearte
  - para suavizarte
  rationale: El término es raro y admite debate entre limpieza y frotado/suavizado. En español, «para limpiar» deja abierta la tensión sin imponer una reconstrucción más específica que la que el texto sustenta.
  doctrine_reference: Lexicografía hebrea; HALOT
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB inglés, que ajustó la cláusula final de finalidad a una forma más literal («for cleansing») sin expandirla a un infinitivo interpretativo. También conserva la secuencia concreta de prácticas de cuidado neonatal y su tono de abandono.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto lo requiera; aquí no aparece ningún tetragrámaton.
  - «No te cortaron el cordón» usa impersonal con dativo para mayor naturalidad en español.
  - Se evita «Cristo»/«Mesías» porque no hay léxico cristológico en el versículo.
  - Se conserva la tensión léxica de לְמִשְׁעִי con una formulación abierta y una nota de alternativas.
