translation:
  language: es
  text: 'Y él dijo: «¿Qué te daré?». Y Jacob dijo: «No me darás nada. Si haces esto por mí, volveré[a] a apacentar tu rebaño y a guardarlo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «volveré, apacentaré tu rebaño y lo guardaré». El verbo hebreo puede sugerir tanto regresar como reanudar la labor.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מָה אֶתֶּן לָךְ
  english_pob_choice: What shall I give you?
  chosen_spanish: ¿Qué te daré?
  alternatives_spanish:
  - ¿Qué debería darte?
  - ¿Qué podría darte?
  lexicon: HALOT
  rationale: La pregunta ofrece una compensación; en español, el futuro simple expresa bien la oferta/pregunta directa sin sonar forzado.
- source_word: לֹא תִתֶּן לִי מְא֔וּמָה
  english_pob_choice: You shall not give me anything
  chosen_spanish: No me darás nada
  alternatives_spanish:
  - No necesitas darme nada
  - No me des nada
  lexicon: HALOT
  rationale: מְאוּמָה en contexto negativo significa 'nada'. El futuro negativo conserva la fuerza de rechazo de pago que refleja el hebreo y la opción inglesa.
- source_word: אִם תַּעֲשֶׂה לִּי הַדָּבָר הַזֶּה
  english_pob_choice: If you will do this thing for me
  chosen_spanish: Si haces por mí esta cosa
  alternatives_spanish:
  - Si haces esto por mí
  - Si me concederás esta cosa
  lexicon: HALOT
  rationale: Se mantiene la construcción demostrativa 'esta cosa' para reflejar el hebreo, aunque en español también sería posible 'esto'; se prefirió la forma más cercana al sustantivo con demostrativo.
- source_word: אָשׁוּבָה
  english_pob_choice: I will again
  chosen_spanish: volveré[a]
  alternatives_spanish:
  - volveré de nuevo
  - retomaré
  lexicon: HALOT
  rationale: El verbo puede indicar regreso o reanudación. En este contexto, 'volveré' admite ambas posibilidades en español; la nota [a] preserva la alternativa de reanudar el trabajo.
- source_word: אֶרְעֶה
  english_pob_choice: pasture
  chosen_spanish: apacentar
  alternatives_spanish:
  - pastorear
  - pacer
  lexicon: HALOT
  rationale: רעה en contexto de ganado expresa la labor de cuidar y alimentar el rebaño; 'apacentar' es un término bíblico claro y fiel en español.
- source_word: צֹאנְךָ
  english_pob_choice: your flock
  chosen_spanish: tu rebaño
  alternatives_spanish:
  - tu ganado menor
  - tus ovejas y cabras
  lexicon: HALOT
  rationale: צֹאן designa ganado menor, especialmente ovejas y cabras; 'rebaño' es el colectivo natural en español para este contexto pastoral.
- source_word: אֶשְׁמֹר
  english_pob_choice: keep it
  chosen_spanish: y a guardarlo
  alternatives_spanish:
  - y cuidarlo
  - y velar por él
  lexicon: HALOT
  rationale: שׁמר aquí complementa la idea de atender el rebaño con vigilancia protectora. 'Guardar' conserva el paralelismo semántico y el objeto implícito en español.
translation_notes:
  revision_awareness: Se corrigió el anclaje de la nota al incluir [a] en el texto español junto a «volveré», para reflejar la alternativa semántica de אָשׁוּבָה sin perder fluidez.
  spanish_consistency_notes:
  - Se mantiene Yahvé como forma de referencia divina en todo el proyecto cuando corresponda; este versículo no la contiene.
  - Se conserva el paralelismo pastoral entre 'apacentar' y 'guardar' para reflejar los dos verbos hebreos.
  - Se evita 'siervo' porque no aparece el léxico de servidumbre aquí; el foco está en el acuerdo laboral/pastoral.
