theological_decisions:
- issue: Referent and imagery of the flock/crown-stones metaphors
  chosen_reading: The verse describes the LORD saving his people, who are compared first to his flock and then to crown-stones shining conspicuously over his land.
  alternative_readings:
  - The flock image could be taken adverbially ('he will save them like a flock is saved').
  - The crown-stones could be understood as memorial or consecrated stones rather than jewels.
  rationale: The syntax most naturally reads the people as the flock belonging to him, and the following clause shifts to a poetic image of their exalted splendor. This preserves the metaphorical richness without collapsing it into a single literal picture.
