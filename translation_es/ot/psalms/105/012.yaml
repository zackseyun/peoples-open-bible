  source_alignment_summary: 'El borrador español sigue bien la estructura del hebreo: cláusula temporal («Cuando eran»), modismo cuantitativo («pocos en número»), intensificación («muy pocos») y condición de residencia ajena («forasteros en ella»). Sin embargo, «forasteros» no preserva tan bien como «residentes temporales/forasteros residentes» la fuerza lexical de גרים, que en el rastro POB se documenta como ‘sojourners’ con matiz de extranjeros que residen temporalmente en una tierra no propia.'
  spanish_quality_summary: El español es claro y legible, con tono digno. «Pocos en número» y «muy pocos» suenan naturales en registro bíblico moderno. La única debilidad de estilo y precisión es «forasteros», que en español puede sonar más a gente de fuera en sentido general que a residentes extranjeros temporales. «Residentes temporales» es más exacto, aunque algo más técnico; «extranjeros residentes» también sería posible, pero es menos natural aquí.
  glossary_alignment: 'No hay conflictos con la terminología principal del proyecto. La decisión relevante es גרים: el inglés POB prioriza ‘sojourners’ y conserva ‘strangers’ solo en nota. En español conviene reflejar esa preferencia con «residentes temporales» en texto principal y mantener «extraños» como alternativa en nota, o mejor aún «forasteros» como alternativa más idiomática. Dado el rastro inglés ya fijado, se conserva la nota alternativa y se mejora el término principal.'
  issues:
