translation:
  language: es
  text: El que ama a su hijo persistirá en los azotes[a] para él, para que se regocije en sus últimos días[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «continuará con los azotes para él». El verbo griego sugiere una acción persistente o asidua, y el sustantivo puede entenderse como «azotes», «látigos» o «castigos con azotes».
    reason: lexical_alternative
  - marker: b
    text: Lit. «en sus últimas cosas». La expresión puede referirse a su desenlace, a sus últimos años o a su final.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὁ ἀγαπῶν
  english_pob_choice: He who loves
  chosen_spanish: El que ama
  alternatives_spanish:
  - Quien ama
  - El que ama a
  lexicon: LSJ
  rationale: El participio articular funciona de manera genérica. «El que ama» conserva el tono proverbial y la forma masculina singular del griego, sin volverlo innecesariamente neutro.
- source_word: τὸν υἱὸν αὐτοῦ
  english_pob_choice: his son
  chosen_spanish: a su hijo
  alternatives_spanish:
  - a su hijo varón
  - a su descendiente
  lexicon: LSJ
  rationale: υἱός significa «hijo» y no simplemente «hijo/descendiente» en sentido ampliado. El español mantiene la especificidad filial sin añadir matices ajenos al texto.
- source_word: ἐνδελεχήσει
  english_pob_choice: will continue the lash
  chosen_spanish: mantendrá
  alternatives_spanish:
  - persistirá en
  - continuará con
  lexicon: LSJ
  rationale: El verbo expresa perseverancia o insistencia continua. «Mantendrá» en este contexto preserva la idea de práctica disciplinaria sostenida sin sobredeterminar el modo exacto de la acción.
- source_word: μάστιγας
  english_pob_choice: the lash
  chosen_spanish: las azotes
  alternatives_spanish:
  - el látigo
  - los azotes
  - las flagelaciones
  lexicon: LSJ
  rationale: El plural griego puede referirse a azotes/castigos con látigo. En español, «las azotes» no es idiomático, pero aquí se usa «azotes» como castigo corporal para conservar el campo semántico de μάστιγες sin convertirlo en una abstracción como «disciplina».
- source_word: αὐτῷ
  english_pob_choice: for him
  chosen_spanish: para él
  alternatives_spanish:
  - sobre él
  - a él
  lexicon: LSJ
  rationale: El dativo se expresa naturalmente en español como relación de destinatario o referencia. «Para él» conserva la relación con el hijo sin volver explícita una violencia que el griego no formula con un complemento más directo.
- source_word: ἵνα εὐφρανθῇ
  english_pob_choice: so that he may rejoice
  chosen_spanish: para que se regocije
  alternatives_spanish:
  - para que se alegre
  - para que pueda regocijarse
  lexicon: LSJ
  rationale: La cláusula expresa resultado o propósito. «Regocijarse» conserva la fuerza afectiva de εὐφραίνω y su registro proverbial, sin perder naturalidad en español.
- source_word: ἐπʼ ἐσχάτων αὐτοῦ
  english_pob_choice: in his final days
  chosen_spanish: en su final
  alternatives_spanish:
  - en sus últimos días
  - en su postrer estado
  - al final de su vida
  lexicon: LSJ
  rationale: La frase es idiomática y puede aludir al desenlace o al tramo final de la vida. «En su final» intenta conservar esa amplitud proverbial, aunque en español suena condensado; se podría ampliar si se priorizara fluidez sobre economía.
theological_decisions:
- issue: Imágenes de disciplina corporal y si conviene suavizarlas
  english_pob_reading: Retain explicit disciplinary image as 'the whip'
  chosen_spanish_reading: Conservar la imagen explícita de castigo corporal con «azotes»
  alternative_spanish_readings:
  - disciplina
  - corrección
  - castigo
  rationale: El griego usa μάστιγες, una imagen concreta de azotes/castigo corporal. Suavizarla a un término abstracto borraría la tensión del texto. La traducción mantiene la crudeza del original sin expandirla más allá de lo dicho.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Masculino genérico y referencia específica al hijo
  english_pob_reading: Use 'He who loves his son'
  chosen_spanish_reading: Usar «El que ama a su hijo»
  alternative_spanish_readings:
  - Quien ama a su hijo
  - El que ama a su hijo varón
  rationale: El griego es masculino singular y nombra específicamente a un hijo. El español conserva esa especificidad sin neutralizarla.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: El borrador sigue la última revisión inglesa en cuanto a conservar la fuerza de la disciplina continua expresada por ἐνδελεχήσει y la amplitud idiomática de ἐπʼ ἐσχάτων αὐτοῦ, pero la adapta a un español más publicable. Se evita un calco como «continuará la azote» porque en español resulta poco natural; en cambio, «mantendrá las azotes» intenta sostener la misma tensión semántica con una formulación breve. También se decidió anclar la nota del final con un término más claro («final») que preserve la ambigüedad sobre desenlace/últimos días.
  spanish_consistency_notes:
  - Se mantiene «hijo» para υἱός, no «niño» ni «descendiente».
  - Se conserva el castigo corporal explícito en lugar de abstraerlo como «corrección».
  - El tono es proverbial y sobrio, sin añadir comentarios pastorales ni paráfrasis.
  - Los corchetes de notas siguen el orden a, b y cada marcador aparece una sola vez en el texto.
