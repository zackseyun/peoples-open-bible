review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja fielmente el hebreo: וַיְדַבֵּר = «habló», יְהוָה = «Yahvé», אֶל מֹשֶׁה = «a Moisés», לֵאמֹר = «diciendo». La estructura narrativa y la fórmula introductoria quedan bien preservadas.'
  spanish_quality_summary: 'El texto principal es natural, claro y digno en español bíblico contemporáneo. Sin embargo, la nota al pie entra en conflicto con la política del proyecto: presenta «Yahvé» como alternativa cuando ya es la forma principal en el texto, y además conserva innecesariamente la referencia inglesa a «YHWH» como variante.'
  glossary_alignment: La elección principal «Yahvé» está alineada con el glosario del proyecto para יהוה / YHWH. «Moisés» y «diciendo» también encajan bien. El único desajuste está en la nota, no en el texto principal.
  issues:
  - severity: medium
    issue: La nota al pie está mal adaptada al español y a la decisión terminológica del proyecto.
    rationale: 'El texto principal ya usa «Yahvé», por lo que la nota «Hebreo: «YHWH»; alternativamente, «Yahvé»» resulta incoherente: no puede presentar como alternativa la misma forma elegida. Además, en español POB la nota debe reflejar la evidencia o una alternativa real, no reproducir mecánicamente la nota inglesa.'
  revised_spanish_text: Entonces Yahvé habló a Moisés, diciendo,
  revision_rationale: Se elimina la nota al pie porque no aporta una alternativa real en español y contradice la elección principal «Yahvé». El texto principal no requiere otros cambios.
