  to: Y cuando terminaron su canto de lamentación profundamente doloroso, retomaron el canto de sus padres[a], alabando a Dios, el salvador de Israel y hacedor de maravillas; y, habiendo desechado todo clamor de dolor y lamento, formaron danzas[b] como señal de pacífica alegría.
  rationale: Se corrige el anclaje de la nota sobre πάτριον, se ajusta el tiempo verbal final para reflejar mejor la acción narrativa, y se mejora la naturalidad de varias expresiones españolas sin apartarse del griego ni del audit trail inglés. La revisión preserva 'canto' para μέλος, 'de sus padres' para πάτριον, la aposición sobre Dios, y la idea de danzas como signo de alegría pacífica.
