translation:
  language: es
  text: Oigan esto[a], todos los pueblos; presten oído, todos los habitantes del mundo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'Escuchen esto'. El hebreo admite un llamado directo tanto a 'oír' como a 'escuchar con atención'.
    reason: lexical_alternative
  - marker: b
    text: O 'la tierra'. El hebreo חָלֶד puede referirse al mundo de la vida humana o al ámbito terrenal.
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁמְעוּ
  english_pob_choice: Hear
  chosen_spanish: Oigan
  alternatives_spanish:
  - Escuchen
  - Oigan atentamente
  lexicon: HALOT
  rationale: El imperativo plural de שׁמע pide una convocatoria directa y solemne. 'Oigan' conserva la fuerza exhortativa y la brevedad poética del hebreo; 'escuchen' sería también posible, pero aquí 'oigan' suena más natural en un llamado público.
- source_word: זֹאת
  english_pob_choice: this
  chosen_spanish: esto
  alternatives_spanish:
  - esta palabra
  - esta exhortación
  - esto que se dice
  lexicon: HALOT
  rationale: El demostrativo apunta a la instrucción o proclamación que sigue. 'Esto' mantiene la referencia abierta y no agrega contenido no explícito.
- source_word: כָּל הָעַמִּים
  english_pob_choice: all peoples
  chosen_spanish: pueblos todos
  alternatives_spanish:
  - todos los pueblos
  - todas las naciones
  - todos los pueblos de la tierra
  lexicon: HALOT
  rationale: פְּלURAL עַמִּים denota colectividades humanas. 'Pueblos todos' refleja el orden enfático del hebreo y su amplitud universal sin restringirlo a 'naciones' como término político.
- source_word: הַאֲזִינוּ
  english_pob_choice: give ear
  chosen_spanish: presten oído
  alternatives_spanish:
  - oigan con atención
  - atiendan
  - inclinen el oído
  lexicon: HALOT
  rationale: El causativo de אזן expresa una escucha atenta e intencional. 'Presten oído' conserva el tono elevado y la paralelía con 'Oigan', sin sonar demasiado arcaico.
- source_word: כָּל יֹשְׁבֵי
  english_pob_choice: all inhabitants of
  chosen_spanish: todos los habitantes de
  alternatives_spanish:
  - todos los que habitan en
  - todos los moradores de
  lexicon: HALOT
  rationale: El participio sustantivado señala a quienes moran en un lugar. 'Habitantes de' es la forma española más clara y natural para esta construcción.
- source_word: חָלֶד
  english_pob_choice: the world
  chosen_spanish: el mundo
  alternatives_spanish:
  - la tierra
  - la tierra habitable
  - el mundo humano
  lexicon: HALOT
  rationale: Siguiendo la auditoría inglesa, חָלֶד puede referirse al mundo de la vida humana o al ámbito terrenal. 'El mundo' comunica bien el alcance universal y evita escoger prematuramente entre 'tierra' y 'edad'.
translation_notes:
  revision_awareness: La revisión inglesa más reciente no introdujo cambios y el control cruzado reportó alta concordancia; por eso la versión española sigue de cerca la lectura auditada sin añadir ampliaciones interpretativas.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto cuando aparezca el Tetragrámaton; en este versículo no aparece.
  - Se conserva un registro poético y público, con paralelismo entre 'Oigan' y 'presten oído'.
  - '''Pueblos'' se usa para כָּל הָעַמִּים siguiendo el plural hebreo y evitando una restricción geopolítica innecesaria.'
