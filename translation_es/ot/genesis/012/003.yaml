translation:
  language: es
  text: Y bendeciré a los que te bendigan[a], y al que te maldiga[b] yo maldeciré; y en ti serán bendecidas[c] todas las familias de la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «al que te maldice»; el hebreo usa un participio que puede expresarse también como «los que te bendicen / el que te maldice» según el contexto inmediato.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «al que te trate con desprecio». El verbo hebreo aquí puede significar maldecir, despreciar o tomar a la ligera, y es más débil que el verbo siguiente, «yo maldeciré».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «todas las familias de la tierra se bendecirán por ti», o: «por medio de ti todas las familias de la tierra serán bendecidas». El hebreo permite debate entre un sentido pasivo y uno reflexivo/medio, y la preposición también puede entenderse instrumentalmente.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַאֲבָרֲכָה
  english_pob_choice: And I will bless
  chosen_spanish: Y yo te bendeciré
  alternatives_spanish:
  - Y bendeciré
  - Y yo bendeciré
  lexicon: HALOT
  rationale: La forma verbal expresa una promesa divina en primera persona; en español, el futuro simple conserva bien ese valor promissorio. Se mantiene el pronombre explícito para claridad y énfasis.
- source_word: מְבָרְכֶיךָ
  english_pob_choice: those who bless you
  chosen_spanish: a los que te bendigan
  alternatives_spanish:
  - a los que te bendicen
  - a quienes te bendicen
  lexicon: HALOT
  rationale: El participio plural funciona de manera sustantiva para un grupo de personas. 'A los que te bendigan' mantiene el plural y suena natural en español bíblico contemporáneo.
- source_word: וּמְקַלֶּלְךָ
  english_pob_choice: the one who curses you
  chosen_spanish: al que te maldiga[b]
  alternatives_spanish:
  - al que te maldice
  - al que te desprecie
  lexicon: HALOT
  rationale: Se elige 'maldiga' porque el audit trail inglés revisó esta frase hacia la equivalencia léxica más directa con קלל en este contexto. En español se conserva el singular, como en el hebreo, para contrastar con el plural anterior.
- source_word: אָאֹר
  english_pob_choice: I will curse
  chosen_spanish: yo maldeciré
  alternatives_spanish:
  - yo maldeciré con maldición
  - yo lo maldeciré
  lexicon: HALOT
  rationale: ארר es el verbo más fuerte de maldecir; 'maldeciré' reproduce la fuerza de la respuesta divina y mantiene el contraste con el verbo anterior.
- source_word: וְנִבְרְכוּ
  english_pob_choice: will be blessed
  chosen_spanish: serán benditas
  alternatives_spanish:
  - serán bendecidas
  - se bendecirán
  lexicon: HALOT
  rationale: Se traduce en voz pasiva porque es la lectura más directa del Niphal. 'Serán benditas' concuerda con 'familias' y preserva la promesa universal.
- source_word: בְךָ
  english_pob_choice: in you
  chosen_spanish: en ti
  alternatives_spanish:
  - por ti
  - por medio de ti
  lexicon: HALOT
  rationale: '''En ti'' sigue de cerca la preposición hebrea y conserva la formulación pactual tradicional sin forzar una paráfrasis instrumental en el texto principal.'
- source_word: כֹּל מִשְׁפְּחֹת הָאֲדָמָה
  english_pob_choice: all the families of the earth
  chosen_spanish: todas las familias de la tierra
  alternatives_spanish:
  - todas las familias del suelo
  - todos los clanes de la tierra
  lexicon: HALOT
  rationale: '''Familias'' refleja bien מִשְׁפְּחֹת; ''tierra'' comunica el alcance universal de הָאֲדָמָה de modo claro y natural para el lector en español.'
theological_decisions:
- issue: Sentido de וְנִבְרְכוּ בְךָ en la promesa abrahámica
  english_pob_reading: 'passive: ''will be blessed ... in you'''
  chosen_spanish_reading: 'pasivo: ''serán benditas en ti'''
  alternative_spanish_readings:
  - '''se bendecirán por ti'''
  - '''serán bendecidas por medio de ti'''
  rationale: Se conserva la lectura pasiva como la opción más directa, sin ocultar que el hebreo admite matices reflexivos o instrumentales. El texto español mantiene la tensión interpretativa sin resolverla en una sola dirección doctrinal.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: Se incorporó la revisión más reciente que prefirió 'the one who curses you' sobre una paráfrasis más amplia. En español se siguió esa decisión con 'al que te maldiga', y se mantuvo la diferencia singular/plural del hebreo. También se evitó una construcción marcada al final, usando el orden natural 'yo maldeciré'.
  spanish_consistency_notes:
  - Se mantuvo 'bendecir' / 'benditas' para reflejar ברך de manera consistente.
  - Se usó 'tierra' para הָאֲדָמָה como equivalente amplio y bíblicamente natural.
  - La puntuación separa claramente las tres cláusulas del versículo y preserva el paralelismo hebreo.
