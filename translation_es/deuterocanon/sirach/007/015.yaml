  spanish_quality_summary: «No te creas entre los altos del pueblo» suena poco natural y semánticamente erróneo. «Recuerda que el pasar no pasará» conserva algo del juego verbal, pero en español resulta demasiado opaco; conviene expresar la idea de la mortalidad que no pasa de largo, manteniendo la nota explicativa para la dificultad hebrea.
  glossary_alignment: 'No hay conflictos mayores con la glosa teológica del proyecto en este versículo, pero sí un incumplimiento de la racionalidad léxica auditada: debe reflejar «los muertos del pueblo», no «los altos del pueblo». La nota sobre la tradición griega puede mantenerse con «Altísimo».'
  issues:
