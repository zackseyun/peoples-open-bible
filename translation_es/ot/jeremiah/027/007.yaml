translation:
  language: es
  text: Todas las naciones le servirán[a], y a su hijo, y a su nieto, hasta que llegue el tiempo de su propia tierra[b]; entonces muchas naciones y grandes reyes harán que incluso él les sirva[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «y su hijo y el hijo de su hijo».
    reason: lexical_alternative
  - marker: b
    text: O, más literalmente, «hasta que llegue el tiempo de su tierra»; es decir, el tiempo señalado respecto de la propia tierra de Babilonia.
    reason: lexical_alternative
  - marker: c
    text: El hebreo probablemente quiere decir que muchas naciones y grandes reyes someterán a Babilonia a servidumbre; una traducción más tosca sería «lo usarán para servicio» o «harán servicio con él».
    reason: alternative_reading
lexical_decisions:
- source_word: וְעָבְדוּ אֹתוֹ
  english_pob_choice: will serve him
  chosen_spanish: le servirán
  alternatives_spanish:
  - lo servirán
  - estarán sujetos a él
  lexicon: HALOT
  rationale: En este contexto político, עבד expresa servicio/sujeción de vasallaje, no solo trabajo. «Le servirán» comunica la relación de dominio de manera natural en español y mantiene la idea de subordinación de las naciones al rey.
- source_word: כָּל הַגּוֹיִם
  english_pob_choice: all the nations
  chosen_spanish: Todas las naciones
  alternatives_spanish:
  - Todos los pueblos
  - Todos los gentiles
  lexicon: HALOT
  rationale: Aquí גּוֹיִם se refiere a entidades políticas bajo la dominación babilónica. «Naciones» preserva mejor ese sentido geopolítico que «pueblos» o «gentiles».
- source_word: וְאֶת בְּנוֹ וְאֶת בֶּן בְּנוֹ
  english_pob_choice: and his son, and his grandson
  chosen_spanish: a su hijo, y al hijo de su hijo
  alternatives_spanish:
  - a su hijo, y a su nieto
  - a su hijo, y al hijo de su hijo
  lexicon: HALOT
  rationale: El hebreo dice literalmente «su hijo y el hijo de su hijo». En español, «hijo de su hijo» conserva con exactitud la forma idiomática y la sucesión dinástica; «nieto» sería válido, pero menos transparente respecto del texto base.
- source_word: עַד בֹּא עֵת אַרְצוֹ
  english_pob_choice: until the time of his own land comes
  chosen_spanish: hasta que llegue el tiempo de su propia tierra
  alternatives_spanish:
  - hasta que llegue el tiempo de su tierra
  - hasta que llegue el tiempo destinado a su tierra
  lexicon: HALOT
  rationale: La frase es comprimida y probablemente apunta al tiempo señalado respecto de la propia tierra de Babilonia. «Su propia tierra» refleja el valor reflexivo del hebreo sin añadir una explicación interpretativa en el texto principal.
- source_word: גַּם הוּא
  english_pob_choice: then / even him
  chosen_spanish: incluso él
  alternatives_spanish:
  - también él
  - hasta él
  lexicon: HALOT
  rationale: 'El hebreo añade énfasis: Babilonia misma también entrará en servidumbre. «Incluso él» conserva ese golpe enfático de reversión; en español, «él» mantiene la referencia al rey/imperio personificado según el flujo del versículo.'
- source_word: וְעָבְדוּ ב/וֹ
  english_pob_choice: will make him serve them
  chosen_spanish: harán que incluso él les sirva
  alternatives_spanish:
  - lo harán servirles
  - lo someterán a servidumbre
  - servirán con él
  lexicon: HALOT
  rationale: 'La construcción con עבד + ב indica inversión de poder: otros pueblos impondrán servicio sobre Babilonia. «Harán que ... les sirva» expresa bien esa reversión sin perder la fuerza del verbo.'
- source_word: גּוֹיִם רַבִּים וּמְלָכִים גְּדֹלִים
  english_pob_choice: many nations and great kings
  chosen_spanish: muchas naciones y grandes reyes
  alternatives_spanish:
  - muchos pueblos y grandes reyes
  - muchas naciones y poderosos reyes
  lexicon: HALOT
  rationale: Se preserva el paralelismo político del hebreo. «Grandes reyes» es una traducción directa y clara de גְּדֹלִים en este contexto real.
theological_decisions:
- issue: Reversión de Babilonia de dominación a sujeción
  english_pob_reading: After the appointed time for Babylon's land arrives, Babylon itself will be subjected by many nations and great kings.
  chosen_spanish_reading: Después del tiempo señalado para su propia tierra, Babilonia misma será sometida por muchas naciones y grandes reyes.
  alternative_spanish_readings:
  - Babilonia será servida por muchas naciones y grandes reyes
  - muchas naciones y grandes reyes servirán a Babilonia
  rationale: El contexto amplio de Jeremías anuncia el dominio temporal de Babilonia y luego su juicio. La traducción española debe reflejar esa inversión de manera clara, sin borrar la tensión del hebreo que usa un giro de servicio/sujeción.
  doctrine_reference: Jeremías 25–27; juicio divino sobre Babilonia
translation_notes:
  revision_awareness: 'La redacción sigue el pasaje fuente hebreo y tiene en cuenta el audit trail inglés: mantiene la lectura de vasallaje para עבד, preserva el giro reflexivo de ארצו con una formulación natural en español, y refleja explícitamente גם הוא con «incluso él». También conserva la inversión final de dominio sin suavizarla hacia una simple repetición de «servir».'
  spanish_consistency_notes:
  - Se usa «naciones» para גּוֹיִם por el contexto político, no «gentiles».
  - Se conserva la personificación del imperio/rey con pronombres masculinos, siguiendo el hebreo y el inglés auditado.
  - «Servir» se usa en sentido de sujeción política, no de servicio voluntario.
  - La nota del versículo mantiene la tensión entre una versión más natural y una más literal, sin borrar el giro de reversión final.
