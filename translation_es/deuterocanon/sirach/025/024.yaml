    issue: Ubicación inadecuada de las notas [a][b] en «pecado»
    rationale: La nota de alusión a la mujer de la caída explica «una mujer», no «pecado». La nota lexical sobre tiempo/aspecto verbal pertenece a la cláusula «morimos», no al sustantivo «pecado».
  - severity: medium
    issue: «Por ella» puede leerse como instrumental más que causal
    rationale: El hebreo בגלל y el griego δι' αὐτήν aquí son causales. «A causa de ella» expresa esa relación de forma más inequívoca en español bíblico moderno.
  - severity: low
    issue: «Todos morimos juntos» puede sonar a simultaneidad
    rationale: Aunque «juntos» preserva יַחַד, en español puede inducir una imagen temporal no necesariamente pretendida. Dado que el griego paralelo enfatiza πάντες, una formulación con «todos» basta para la universalidad; no obstante, mantener «juntos» sigue siendo defendible. La revisión conserva «juntos» por cercanía lexical, pero mejora el resto de la línea.
