translation:
  language: es
  text: Y el hijo de Jehonatán fue Merib-baal[a][b], y Merib-baal engendró a Mica.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo escribe el nombre del padre en dos formas ligeramente distintas en este versículo: «Merib-baal» y una forma abreviada «Meri-baal». La traducción las regulariza para mayor claridad.'
    reason: textual_variant
  - marker: b
    text: En el paralelo genealógico, 1 Samuel 14:49 nombra al hijo de Saúl como «Jonathan» en vez de «Jehonatán». Aquí la forma hebrea del Cronista es Jehonatán.
    reason: cross_reference
lexical_decisions:
- source_word: וּ/בֶן
  english_pob_choice: And the son of
  chosen_spanish: Y el hijo de
  alternatives_spanish:
  - Ahora el hijo de
  - El hijo de
  lexicon: HALOT
  rationale: בֶן significa “hijo”. La conjunción inicial ו se vierte como “Y” para conservar la continuidad genealógica del contexto inmediato en español natural.
- source_word: יְהוֹנָתָן
  english_pob_choice: Jehonathan
  chosen_spanish: Jehonatán
  alternatives_spanish:
  - Jonatán
  lexicon: HALOT
  rationale: El hebreo de este versículo presenta la forma larga יְהוֹנָתָן; por fidelidad al texto base se conserva la forma más cercana en español, “Jehonatán”, en vez de normalizarla a la forma más conocida “Jonatán”.
- source_word: מְרִיב בָּעַל
  english_pob_choice: Merib-baal
  chosen_spanish: Merib-baal
  alternatives_spanish:
  - Meribbaal
  lexicon: HALOT
  rationale: Es un nombre propio compuesto. Se mantiene la transliteración convencional con guion para reflejar visualmente los dos elementos del hebreo y no convertirlo en un significado interpretativo.
- source_word: וּ/מְרִי בַעַל
  english_pob_choice: and Merib-baal
  chosen_spanish: y Merib-baal
  alternatives_spanish:
  - y Meri-baal
  - y Meribbaal
  lexicon: HALOT
  rationale: El hebreo presenta una forma abreviada del mismo nombre. Para claridad en una genealogía, se regulariza a la misma forma completa “Merib-baal”, como hace el POB en inglés.
- source_word: הוֹלִיד
  english_pob_choice: fathered
  chosen_spanish: engendró
  alternatives_spanish:
  - fue padre de
  - procreó
  lexicon: HALOT
  rationale: En contextos genealógicos, el hifil de ילד expresa la acción de engendrar o ser padre de. “Engendró” es una solución natural y precisa en español bíblico contemporáneo.
- source_word: אֶת מִיכָה
  english_pob_choice: Micah
  chosen_spanish: a Micá
  alternatives_spanish:
  - a Miqueas
  lexicon: HALOT
  rationale: מִיכָה es un nombre propio. Se conserva la transliteración breve “Micá” para reflejar el nombre hebreo; la forma tradicional “Miqueas” puede sugerir el profeta y no es necesaria aquí.
theological_decisions:
- issue: Nombre divino ausente en una genealogía
  english_pob_reading: No theological wording is involved beyond transparent name forms.
  chosen_spanish_reading: No hay terminología teológica añadida; se conservan solo los nombres propios y la relación genealógica.
  alternative_spanish_readings:
  - Normalizar nombres a formas tradicionales
  - Usar equivalentes bíblicos más conocidos
  rationale: El versículo es estrictamente genealógico. La decisión principal es de transparencia onomástica, no doctrinal.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: Se siguió el pasaje fuente y el auditoría inglesa sin cambios de revisión posteriores relevantes; se mantuvo la regularización del nombre compuesto y la distinción de la forma larga Jehonatán.
  spanish_consistency_notes:
  - Se usa «Y» inicial para conservar la continuidad narrativa/genealógica.
  - Se preserva el guion en «Merib-baal» como ayuda visual para un nombre compuesto hebreo.
  - Se evita «SEÑOR» o cualquier terminología divina porque el versículo no contiene el nombre de Dios.
  - «Engendró» mantiene el sentido genealógico del hebreo sin arcaísmo excesivo.
  - Se evita normalizar «Jehonatán» a «Jonatán» para respetar la forma textual del Cronista.
