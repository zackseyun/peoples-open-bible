    reason: alternative_reading
  - marker: b
    text: Literalmente ‘en el vientre de la llena’, un modismo para una mujer embarazada.
    reason: cultural_note
  revision_rationale: La revisión mantiene todas las decisiones léxicas centrales del original y del POB inglés, pero corrige la sintaxis final para un español más natural y fiel. ‘Que hace todas las cosas’ expresa con mayor claridad la relativa que describe a Dios, evitando la construcción algo rígida ‘el que hace todo’. También se suaviza ‘así tampoco’ a ‘así’, sin pérdida de sentido.
