translation:
  language: es
  text: 'Declaren entre las naciones y proclamen; levanten una bandera. Proclamen; no lo oculten. Digan: «Babilonia ha sido capturada; Bel ha sido avergonzado; Merodac[a] está consternado. Sus imágenes han sido avergonzadas; sus ídolos[b] están consternados».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Merodac es la forma hebrea del dios babilonio más conocido como Marduk.
    reason: alternative_reading
  - marker: b
    text: El término hebreo traducido «ídolos» es fuertemente peyorativo y puede tener el sentido de algo inmundo o despreciable.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַגִּידוּ
  english_pob_choice: Declare among the nations
  chosen_spanish: Declaren entre las naciones
  alternatives_spanish:
  - Anuncien entre las naciones
  - Den a conocer entre las naciones
  lexicon: HALOT
  rationale: El imperativo hifil de נגד pide una proclamación pública. «Declaren» conserva el tono heraldico sin volverse coloquial, y «entre las naciones» refleja con naturalidad el alcance internacional de בַגּוֹיִם.
- source_word: וְהַשְׁמִיעוּ / הַשְׁמִיעוּ
  english_pob_choice: proclaim
  chosen_spanish: proclamen
  alternatives_spanish:
  - háganlo oír
  - publiquen
  lexicon: HALOT
  rationale: La repetición intensifica la publicidad del anuncio. En español, «proclamen» reproduce bien la fuerza de hacer oír un mensaje en público y permite mantener la repetición retórica del hebreo.
- source_word: וּשְׂאוּ נֵס
  english_pob_choice: lift up a banner
  chosen_spanish: levanten una bandera
  alternatives_spanish:
  - levanten un estandarte
  - alcen una señal
  lexicon: HALOT
  rationale: נֵס es una señal levantada para convocatoria o aviso público. «Bandera» es la opción más comprensible en español moderno y conserva la imagen de señal visible.
- source_word: אַל תְּכַחֵדוּ
  english_pob_choice: do not conceal it
  chosen_spanish: no lo oculten
  alternatives_spanish:
  - no lo encubran
  - no lo disimulen
  lexicon: HALOT
  rationale: כחד expresa ocultar o encubrir. «No lo oculten» es natural en español y conserva la prohibición de suprimir el anuncio. Se usa el objeto neutro «lo» porque el antecedente es el mensaje proclamado.
- source_word: נִלְכְּדָה בָבֶל
  english_pob_choice: Babylon is captured
  chosen_spanish: Babilonia ha sido capturada
  alternatives_spanish:
  - Babilonia ha sido tomada
  - Babilonia fue capturada
  lexicon: HALOT
  rationale: El nifal perfecto presenta el hecho como consumado. «Ha sido capturada» mantiene el valor resultativo sin forzar una temporalidad demasiado específica.
- source_word: הֹבִישׁ
  english_pob_choice: is put to shame
  chosen_spanish: ha sido avergonzado
  alternatives_spanish:
  - ha sido avergonzado públicamente
  - ha sido deshonrado
  lexicon: HALOT
  rationale: בוש en hifil comunica vergüenza o deshonra. «Ha sido avergonzado» conserva la pasiva de resultado y funciona bien en paralelo con los nombres divinos.
- source_word: בֵּל
  english_pob_choice: Bel
  chosen_spanish: Bel
  alternatives_spanish:
  - Bel
  lexicon: HALOT
  rationale: Nombre propio del dios babilónico; se translitera sin traducción.
- source_word: חַת
  english_pob_choice: is dismayed
  chosen_spanish: ha sido consternado
  alternatives_spanish:
  - está consternado
  - ha quedado aterrorizado
  lexicon: HALOT
  rationale: El pasaje de revisión del POB en inglés corrigió la idea de «shattered» hacia «dismayed», y חַת connota temor/consternación más que fractura física. «Ha sido consternado» preserva esa tensión sin suavizarla a simple sorpresa.
- source_word: מְרֹדָךְ
  english_pob_choice: Merodach
  chosen_spanish: Merodac
  alternatives_spanish:
  - Merodac
  - Marduc
  lexicon: HALOT
  rationale: La forma hebrea es מְרֹדָךְ. En español, «Merodac» adapta la transliteración a la ortografía usual, mientras que la forma mejor conocida «Marduc» puede reservarse para una nota lexical.
- source_word: עֲצַבֶּיהָ
  english_pob_choice: her images
  chosen_spanish: sus ídolos
  alternatives_spanish:
  - sus imágenes
  - sus estatuas
  lexicon: HALOT
  rationale: עֲצַבִּים puede referirse a imágenes idolátricas fabricadas. Dado que en la misma línea aparece otro término peyorativo para ídolos, «ídolos» comunica el campo semántico de idolatría con claridad en el texto principal.
- source_word: גִּלּוּלֶיהָ
  english_pob_choice: her idols
  chosen_spanish: sus falsos dioses
  alternatives_spanish:
  - sus ídolos inmundos
  - sus ídolos despreciables
  lexicon: HALOT
  rationale: גִּלּוּלִים es un término intensamente despectivo. El texto principal usa «falsos dioses» para mantener legibilidad y el tono polémico; el matiz más grosero o despectivo queda disponible en la nota textual. Esta decisión evita repetir «ídolos» dos veces y diferencia los dos vocablos hebreos.
theological_decisions:
- issue: Nombres de deidades babilónicas en una denuncia profética
  english_pob_reading: Transliterate the names as 'Bel' and 'Merodach'
  chosen_spanish_reading: Transliterar los nombres como «Bel» y «Merodac» en el cuerpo del texto
  alternative_spanish_readings:
  - Traducirlos por equivalencias religiosas o identificaciones históricas
  - Usar «Marduc» como forma principal
  rationale: 'La lectura se mantiene histórica y auditables: el texto nombra divinidades concretas de Babilonia sin explicarlas ni absorberlas en categorías genéricas. La transliteración preserva la especificidad del juicio profético y evita introducir interpretaciones adicionales en el texto principal.'
  doctrine_reference: Translation philosophy §2
- issue: Tratamiento de la vergüenza/consternación de los dioses babilónicos
  english_pob_reading: is put to shame / is dismayed
  chosen_spanish_reading: «ha sido avergonzado» y «ha sido consternado»
  alternative_spanish_readings:
  - «ha sido humillado»
  - «está aterrorizado»
  - «ha sido quebrado»
  rationale: La revisión inglesa más reciente favorece «dismayed» para חַת, y el hebreo distingue entre vergüenza (בוש) y consternación/terror (חתת). En español conviene conservar ambas tensiones sin reducirlas a una sola idea de derrota física o moral.
  doctrine_reference: Jer. 50:2; revisión auditada del POB
- issue: Dos términos hebreos distintos para imágenes idolátricas
  english_pob_reading: her images ... her idols
  chosen_spanish_reading: «sus ídolos» ... «sus falsos dioses»
  alternative_spanish_readings:
  - «sus imágenes» ... «sus ídolos»
  - «sus imágenes» ... «sus ídolos inmundos»
  rationale: El hebreo emplea עֲצַבִּים y גִּלּוּלִים, vocablos emparentados pero no idénticos. Diferenciarlos en español ayuda a no borrar la repetición retórica ni la variación léxica; al mismo tiempo, «falsos dioses» mantiene inteligibilidad sin debilitar el carácter polémico del segundo término.
  doctrine_reference: Translation philosophy §§5–6
translation_notes:
  revision_awareness: 'La versión española sigue la última revisión auditada del POB en inglés: se evita añadir un objeto explícito donde el hebreo no lo expresa, se conserva el paralelismo imperativo, y se refleja la corrección de חַת / חַתּוּ hacia «dismayed» mediante «consternado» en lugar de una imagen de fractura física. También se mantiene la distinción entre los dos vocablos hebreos de idolatría, tal como la auditoría inglesa la preserva entre «images» e «idols».'
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino cuando aparezca; en este versículo no aparece.
  - «Mesías/Cristo» no aplica aquí.
  - Se prefiere el español «proclamen» para repetir la fuerza pública de הַשְׁמִיעוּ.
  - «Merodac» es una adaptación española de la forma hebrea; la equivalencia histórica «Marduc» queda para nota, no para el cuerpo.
  - La opción «sus falsos dioses» evita una repetición plana de «ídolos» y conserva el contraste léxico del hebreo.
