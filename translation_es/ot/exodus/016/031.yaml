review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura básica del hebreo: «la casa de Israel», el acto de nombrar, «maná», la comparación con semilla de cilantro/coriandro blanca y el sabor con miel. Sin embargo, dos puntos no preservan fielmente el sentido/documentación del POB: (1) «y era» debilita la reanudación pronominal explícita de וְהוּא, mejor reflejada por «y este era» o «y ello era»; (2) «tortas sin levadura» añade una idea no presente en צַפִּיחִת y contradice la nota inglesa, que apunta a obleas/tortas delgadas, no a pan ácimo.'
  spanish_quality_summary: El texto es legible y digno, pero «semilla de cilantro blanco» suena algo trabado; «semilla blanca de cilantro» es más natural. «Tortas sin levadura» suena interpretativo y menos preciso. «Obleas con miel» funciona bien en español bíblico moderno y coincide mejor con la imagen culinaria del original.
  glossary_alignment: No hay conflicto con los términos doctrinales del proyecto. «Maná» está bien justificado en español con nota. La revisión propuesta mejora la precisión léxica de צַפִּיחִת y la naturalidad de la frase sobre גַּד לָבָן.
  issues:
  - severity: high
    issue: «tortas sin levadura» añade contenido no presente en el hebreo
    rationale: צַפִּיחִת se refiere a una torta delgada/oblea/wafer; el original no menciona levadura. Esta adición altera el significado y además no concuerda con la documentación del English POB.
  - severity: medium
    issue: «y era» omite la fuerza explícita del pronombre וְהוּא
    rationale: El hebreo introduce la descripción con pronombre resumptivo. En español, «y este era» refleja mejor esa transición que el simple «y era».
  - severity: low
    issue: «semilla de cilantro blanco» es menos natural en español
    rationale: Aunque entendible, «semilla blanca de cilantro» o «la semilla de cilantro, blanca» suena más idiomático y expresa con más claridad que «blanca» modifica la semilla.
  revised_spanish_text: La casa de Israel llamó su nombre maná[a], y este era como semilla blanca de cilantro[b], y su sabor era como obleas[c] con miel.
  revised_footnotes:
