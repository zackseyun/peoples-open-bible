  source_alignment_summary: 'El borrador refleja bien el griego: εὐλόγηται = «bendito es», γὰρ = «porque», ξύλον = «leño», δι'' οὗ = «por el cual», γίνεται = «viene», δικαιοσύνη = «justicia». Sin embargo, la nota léxica se desvía del rastro auditado inglés al presentar «rectitud» como alternativa principal, cuando el inglés conserva «justice» como alternativa a «righteousness». En español conviene mantener la decisión principal «justicia», pero la nota debe señalar «rectitud» como alternativa posible en español sin invertir la relación documentada.'
  spanish_quality_summary: El texto es claro, natural y digno en español eclesial amplio. «Leño» funciona, aunque es algo más literario; sigue siendo aceptable. La sintaxis es fluida. La única reparación necesaria es la nota al pie, para alinear mejor la lógica léxica y teológica con el expediente inglés y evitar que la alternativa opaque la opción principal.
  glossary_alignment: No hay conflicto con la terminología base del proyecto salvo el tratamiento de δικαιοσύνη. El expediente inglés privilegia «righteousness» con nota «justice». En español, «justicia» puede quedar en el texto principal por naturalidad y amplitud semántica, pero la nota debe explicar que también puede traducirse «rectitud», en vez de formularlo como si «rectitud» fuera la alternativa primaria equivalente al inglés.
  issues:
  - severity: medium
    issue: La nota al pie de δικαιοσύνη no sigue con precisión la relación principal/alternativa del audit trail inglés.
    rationale: 'El inglés: texto principal «righteousness», alternativa «justice». El español puede usar «justicia» como principal por naturalidad, pero la nota actual «O ‘la rectitud’» reconfigura demasiado la decisión documentada y su explicación.'
  revised_spanish_text: Porque bendito es el leño por el cual viene la justicia[a].
  revised_footnotes:
  - marker: a
    text: También puede traducirse «la rectitud». δικαιοσύνη puede denotar justicia o rectitud; el texto principal sigue la opción más natural en español para este contexto.
    reason: lexical_alternative
  revision_rationale: Se mantiene el texto principal, que es fiel y natural, pero se corrige la nota para alinear mejor la explicación léxica con el expediente inglés y con la amplitud semántica de δικαιοσύνη en español.
