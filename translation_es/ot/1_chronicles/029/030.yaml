  - severity: medium
    issue: Falta una nota anclada en «tierras» para la alternativa «países».
    rationale: El inglés POB sí preserva esta alternativa para כָּל מַמְלְכוֹת הָאֲרָצוֹת. En español debe mantenerse con un marcador en el sintagma correspondiente.
