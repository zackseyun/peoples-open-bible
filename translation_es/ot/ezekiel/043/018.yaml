review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura básica del hebreo: vocativo «Hijo de hombre», referencia al altar, cláusula temporal «el día en que se haga», propósito doble («para ofrecer… y para… sangre»), y el nombre divino «Yahvé». Sin embargo, hay desajustes importantes con el sentido fuente y con la auditoría inglesa: la nota [a] está anclada a «me dijo» pero la nota inglesa relevante corresponde a «on the day it is made»; además, «derramar sangre» no representa bien וְלִזְרֹק … דָּם, que en contexto sacrificial es aplicación ritual sobre el altar, mejor «rociar» o «esparcir», con nota de alternativa «arrojar/dar golpes de sangre».'
  spanish_quality_summary: 'El español es generalmente claro y digno, pero presenta decisiones menos adecuadas para una Biblia eclesial legible: «Adonay Yahvé» suena poco natural frente a «el Señor Yahvé», y «normas» rebaja algo el registro cultual-jurídico donde «estatutos» u «ordenanzas» encaja mejor. «Hijo de hombre» y «holocaustos» funcionan bien. También conviene corregir la distribución de notas para que correspondan exactamente a los puntos auditados.'
  glossary_alignment: Cumple con Yahvé para יהוה, pero no sigue del todo el criterio de legibilidad del proyecto al mantener «Adonay» transliterado en texto principal. El léxico sacrificial queda mejor alineado con el paquete auditado si חֻקּוֹת se vierte como «estatutos» y זָרַק דָּם como «rociar sangre» con nota sobre una acción más enérgica («arrojar/esparcir/dar golpes de sangre»).
  issues:
  - severity: high
    issue: La nota [a] está mal asignada y no refleja la auditoría inglesa.
    rationale: En el texto inglés la nota textual relevante en esta zona corresponde a בְּיוֹם הֵעָשׂוֹתוֹ («on the day it is made / when it is made»), no a «y me dijo». La nota actual sobre «y me dijo» introduce una alternativa irrelevante.
  - severity: high
    issue: «Derramar sangre» no es la mejor representación de וְלִזְרֹק ... דָּם.
    rationale: El verbo זרק en ritual sacrificial indica aplicación de sangre sobre el altar; «derramar» puede sugerir simplemente verterla sin el matiz cultual direccional. «Rociar» en texto con nota alternativa preserva mejor la base auditada.
  - severity: medium
    issue: «Adonay Yahvé» resulta poco natural en español bíblico corriente.
    rationale: Aunque intenta reflejar el doble título, el estándar del proyecto pide «Yahvé» para יהוה, pero no exige transliterar אֲדֹנָי. «El Señor Yahvé» conserva ambos elementos y es más legible para la audiencia meta.
  - severity: medium
    issue: «Normas» rebaja el registro de חֻקּוֹת en contexto cultual-jurídico.
    rationale: «Estatutos» comunica mejor el carácter prescriptivo fijo del término y se alinea mejor con la decisión auditada «statutes».
