  source_alignment_summary: El borrador acierta con שְׂעִיר עִזִּים como un animal masculino caprino y mantiene la función sacrificial de לְחַטָּאת, pero 'para expiación' no preserva con suficiente precisión que חַטָּאת aquí nombra una ofrenda/sacrificio específico, no solo el efecto abstracto de expiación. Además, el numeral אֶחָד debe aparecer explícitamente en el texto principal, conforme al hebreo y al patrón enumerativo de Números 7.
  spanish_quality_summary: '''Macho cabrío'' es comprensible y digno, pero la omisión de ''un'' debilita la enumeración formal. ''Para expiación'' suena natural, pero en español bíblico/cultual resulta demasiado abstracto frente al valor técnico del sustantivo sacrificial. ''Un macho cabrío para una ofrenda por el pecado'' es más fiel y sigue siendo claro.'
  glossary_alignment: No hay conflicto con los términos globales principales. La decisión clave es alinear חַטָּאת con la práctica del proyecto de preservar el término sacrificial concreto; en español conviene 'ofrenda por el pecado', con nota alternativa 'ofrenda de purificación', en vez de 'expiación'.
  issues:
  - severity: high
    issue: '''para expiación'' traduce חַטָּאת de forma demasiado abstracta'
    rationale: En este contexto cultual de inventario, חַטָּאת designa la ofrenda/sacrificio, no meramente el resultado expiatorio. La traducción española debe conservar la categoría sacrificial explícita, como hace el inglés POB con 'for a sin offering'.
  - severity: medium
    issue: Falta el numeral explícito correspondiente a אֶחָד
    rationale: El hebreo dice 'uno', y el inglés auditado lo conserva por la estructura repetitiva de Números 7. El español también debe retener 'un' en el texto principal.
  - severity: low
    issue: La nota al pie no coincide plenamente con la redacción principal
    rationale: Si el texto principal usa un sustantivo abstracto ('expiación') y la nota habla de 'ofrenda de purificación', se pierde el contraste auditado entre dos lecturas sacrificiales cercanas. La nota debe acompañar una base como 'ofrenda por el pecado'.
  revised_spanish_text: un macho cabrío para una ofrenda por el pecado;[a]
