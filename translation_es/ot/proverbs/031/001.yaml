translation:
  language: es
  text: Las palabras del rey Lemuel, un oráculo[a] que le enseñó[b] su madre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Las palabras del rey Lemuel de Massa, que le enseñó su madre». El hebreo מַשָּׂא puede leerse como «oráculo» o como el nombre del lugar «Massa».'
    reason: alternative_reading
  - marker: b
    text: También puede significar «disciplinó» o «instruyó».
    reason: lexical_alternative
lexical_decisions:
- source_word: דִּבְרֵי
  english_pob_choice: The words of
  chosen_spanish: Las palabras de
  alternatives_spanish:
  - Los dichos de
  - Las sentencias de
  lexicon: HALOT / equivalente funcional de constructo plural de דָּבָר
  rationale: El hebreo presenta un encabezado en constructo plural para introducir una colección o sección. En español, 'Las palabras de' conserva la fórmula directa y natural del encabezado sin añadir interpretación.
- source_word: לְמוּאֵל
  english_pob_choice: Lemuel
  chosen_spanish: Lemuel
  alternatives_spanish:
  - —
  lexicon: nombre propio transliterado
  rationale: Es nombre propio; se translitera sin traducir, como en la auditoría inglesa.
- source_word: מֶלֶךְ
  english_pob_choice: King
  chosen_spanish: rey
  alternatives_spanish:
  - Rey
  lexicon: HALOT
  rationale: Se conserva la aposición titulativa del hebreo ('rey Lemuel') de forma natural en español.
- source_word: מַשָּׂא
  english_pob_choice: an oracle
  chosen_spanish: un oráculo
  alternatives_spanish:
  - Massa
  - una carga
  lexicon: HALOT
  rationale: La lectura principal sigue el sentido profético habitual de מַשָּׂא, que en español se expresa con 'oráculo'. Se conserva la alternativa geográfica en nota porque el consonántico permite leerlo como topónimo.
- source_word: אֲשֶׁר
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - el cual
  lexicon: partícula relativa
  rationale: '''Que'' reproduce de manera idiomática la cláusula relativa en español.'
- source_word: יִסְּרַתּוּ
  english_pob_choice: taught him
  chosen_spanish: le enseñó
  alternatives_spanish:
  - lo disciplinó
  - lo instruyó
  lexicon: HALOT
  rationale: El verbo יסר puede abarcar 'disciplinar' e 'instruir'. En este contexto de transmisión materna de sabiduría, 'le enseñó' comunica bien la fuerza instructiva sin perder la tensión léxica, que se conserva en nota como alternativa.
- source_word: אִמּוֹ
  english_pob_choice: his mother
  chosen_spanish: su madre
  alternatives_spanish:
  - la madre de él
  lexicon: HALOT
  rationale: Se traduce directamente el sustantivo con sufijo posesivo de tercera persona masculina singular.
theological_decisions:
- issue: 'מַשָּׂא: ''oráculo'' frente a topónimo ''Massa'''
  english_pob_reading: an oracle, with a footnote preserving the place-name reading
  chosen_spanish_reading: un oráculo, con nota que preserva la lectura geográfica 'Massa'
  alternative_spanish_readings:
  - Massa
  - una carga
  rationale: La decisión principal sigue la lectura semántica profética favorecida por el puntaje masorético y por la auditoría inglesa. La alternativa como topónimo se deja disponible en nota porque el texto consonántico la permite y no debe borrarse.
  doctrine_reference: Principio de respeto a la ambigüedad textual y al valor profético del encabezado.
- issue: 'יִסְּרַתּוּ: enseñar frente a disciplinar'
  english_pob_reading: taught him, with note that it can also mean disciplined or instructed
  chosen_spanish_reading: le enseñó, con nota sobre 'disciplinó' o 'instruyó'
  alternative_spanish_readings:
  - lo disciplinó
  - lo instruyó
  rationale: En el marco de un prólogo sapiencial y de la enseñanza materna, 'le enseñó' es la opción española más clara y natural. Sin embargo, se preserva la tensión lexical del hebreo יסר, que puede incluir disciplina, para no borrar el alcance semántico documentado.
  doctrine_reference: Sabiduría bíblica y formación moral en el hogar.
translation_notes:
  revision_awareness: 'Se siguió la lectura principal del texto hebreo con el mismo criterio de la auditoría inglesa: מַשָּׂא como ''oráculo'' en el texto principal, dejando la lectura geográfica en nota; y יִסְּרַתּוּ como verbo de enseñanza en el contexto sapiencial, preservando su tensión disciplinaria en nota. No se aplicaron revisiones posteriores.'
  spanish_consistency_notes:
  - Se mantuvo un registro formal y bíblico, pero con sintaxis española natural.
  - Se evitó 'SEÑOR' porque el verso no contiene el nombre divino.
  - '''Lemuel'' se translitera de manera consistente como nombre propio.'
  - '''Oráculo'' conserva mejor el posible valor profético del encabezado que una traducción más general.'
  - La nota sobre el verbo evita borrar la alternativa 'disciplinó', importante para la amplitud semántica del hebreo.
