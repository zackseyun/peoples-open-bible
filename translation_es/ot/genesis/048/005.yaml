base_translation:
  language: en
  yaml_path: translation/ot/genesis/048/005.yaml
  text: And now[a], your two sons, who were born to you in the land of Egypt before I came to you in Egypt, are mine; Ephraim and Manasseh shall be mine[c][b], like Reuben and Simeon.
  footnotes:
