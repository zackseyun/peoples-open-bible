base_translation:
  language: en
  yaml_path: translation/ot/1_chronicles/018/010.yaml
  text: So he sent Hadoram his son to King David to ask about his welfare and to bless him because he had fought against Hadadezer and struck him down[a], for Hadadezer had been at war with Tou[d][c][b]; and he sent all kinds of articles of gold and silver and bronze.
  footnotes:
  - marker: a
    text: Or 'to inquire of him concerning peace.' The Hebrew idiom uses 'peace' in the sense of well-being or welfare.
    reason: lexical_alternative
  - marker: b
    text: Or 'and to congratulate him.' The verb literally means 'to bless him,' here in a diplomatic setting after victory.
    reason: lexical_alternative
  - marker: c
    text: Literally 'for Hadadezer was a man of wars with Tou,' an idiom meaning that Hadadezer had been at war with Tou.
    reason: lexical_alternative
  - marker: d
    text: The Hebrew text ends with 'and all the articles of gold and silver and bronze'; English supplies 'he sent' from the context.
    reason: lexical_alternative
