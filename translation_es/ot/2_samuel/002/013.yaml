translation:
  language: es
  text: Y Joab, hijo de Sarvia, y los siervos de David salieron y se reunieron con ellos allí, junto al estanque[a] de Gabaón. Y estos se sentaron a un lado del estanque, y aquellos al otro lado del estanque.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «reservorio de Gabaón»; el término hebreo puede referirse a un estanque construido o a un depósito de agua.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/יוֹאָב
  english_pob_choice: And Joab
  chosen_spanish: Y Joab
  alternatives_spanish:
  - Entonces Joab
  - Luego Joab
  lexicon: HALOT
  rationale: La conjunción narrativa וְ se conserva con «Y» para mantener el enlace simple del hebreo sin introducir una secuencia más interpretativa como «entonces».
- source_word: בֶּן צְרוּיָה
  english_pob_choice: son of Zeruiah
  chosen_spanish: hijo de Sarvia
  alternatives_spanish:
  - el hijo de Sarvia
  lexicon: HALOT
  rationale: Se mantiene el valor filial del hebreo. «Sarvia» sigue la forma española habitual del nombre propio, equivalente a Zeruiah, sin añadir explicaciones no presentes en el texto.
- source_word: וְ/עַבְדֵי דָוִד
  english_pob_choice: the servants of David
  chosen_spanish: los siervos de David
  alternatives_spanish:
  - los servidores de David
  - los servidores militares de David
  lexicon: HALOT
  rationale: עבדים conserva su fuerza relacional como personas pertenecientes a David. «Siervos» es una opción española fiel y sobria, sin desplazar prematuramente el término a «soldados».
- source_word: יָֽצְא֔וּ
  english_pob_choice: went out
  chosen_spanish: salieron
  alternatives_spanish:
  - fueron afuera
  - marcharon
  lexicon: HALOT
  rationale: El verbo יצא se traduce de manera directa con «salieron», que es natural en español y suficientemente amplia para el contexto narrativo.
- source_word: וַֽ/יִּפְגְּשׁ֛וּ/ם
  english_pob_choice: met them
  chosen_spanish: se encontraron con ellos
  alternatives_spanish:
  - los encontraron
  - se toparon con ellos
  lexicon: HALOT
  rationale: פגשׁ indica encuentro. «Se encontraron con ellos» conserva la reciprocidad del contacto y evita una traducción demasiado mecánica que podría sonar menos natural en español.
- source_word: עַל בְּרֵכַ֥ת גִּבְע֖וֹן
  english_pob_choice: by the pool of Gibeon
  chosen_spanish: junto al estanque de Gabaón
  alternatives_spanish:
  - junto al estanque de Gabaón
  - junto al reservorio de Gabaón
  lexicon: HALOT
  rationale: בְּרֵכָה puede denotar un estanque o un reservorio construido. «Estanque» refleja el sentido espacial de un cuerpo de agua sin fijar innecesariamente una sola forma técnica; «Gabaón» es la forma española del topónimo.
- source_word: יַחְדָּ֑ו
  english_pob_choice: together
  chosen_spanish: juntos
  alternatives_spanish:
  - a la vez
  - en el mismo lugar
  lexicon: HALOT
  rationale: El adverbio refuerza que ambos grupos llegaron al mismo punto. «Juntos» transmite esa coincidencia sin sobreexplicar el matiz.
- source_word: וַ/יֵּ֨שְׁב֜וּ
  english_pob_choice: sat
  chosen_spanish: se sentaron
  alternatives_spanish:
  - se acomodaron
  - tomaron asiento
  lexicon: HALOT
  rationale: ישׁב puede significar sentarse o establecerse. Aquí el movimiento escénico de dos grupos enfrentados hace adecuado «se sentaron», que conserva la imagen concreta.
- source_word: אֵ֤לֶּה ... וְ/אֵ֥לֶּה
  english_pob_choice: these ... and those
  chosen_spanish: estos ... aquellos
  alternatives_spanish:
  - unos ... otros
  - un grupo ... el otro
  lexicon: HALOT
  rationale: Se conserva el contraste demostrativo del hebreo sin agregar sustantivos ajenos al texto. «Estos ... aquellos» es claro y equilibrado en español.
- source_word: עַל הַ/בְּרֵכָה֙ מִ/זֶּ֔ה ... עַל הַ/בְּרֵכָ֖ה מִ/זֶּֽה
  english_pob_choice: on one side of the pool ... on the other side of the pool
  chosen_spanish: de un lado del estanque ... del otro lado del estanque
  alternatives_spanish:
  - a un lado del estanque ... al otro lado del estanque
  - en un lado del estanque ... en el otro lado del estanque
  lexicon: HALOT
  rationale: La expresión hebrea idiomática señala lados opuestos de la misma masa de agua. «De un lado ... del otro lado» comunica con naturalidad esa oposición espacial en español.
translation_notes:
  revision_awareness: El texto inglés auditado fue revisado mínimamente para fijar «the son of Zeruiah» y mantener la equivalencia formal-optimal. La versión española sigue ese mismo alcance, preservando la escena, el contraste espacial y la ambigüedad lexical de בְּרֵכָה con una nota opcional.
  spanish_consistency_notes:
  - Se usa «Yahvé» en textos donde aparezca el Tetragrámaton; aquí no ocurre.
  - Se prefiere «siervos» para עַבְדֵי conforme al valor lexical documentado, sin sustituirlo por «soldados».
  - Se mantiene el contraste demostrativo del hebreo con «estos ... aquellos» y la oposición espacial con «de un lado ... del otro lado».
  - El topónimo se adapta a la forma española «Gabaón» por consistencia onomástica.
  - La nota de pie marca solo la alternativa lexical relevante para בְּרֵכָה, siguiendo el auditable English POB trail.
