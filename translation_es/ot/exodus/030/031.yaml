revisions:
- from: 'Y hablarás a los hijos de Israel[a], diciendo[b]: «Este será un aceite santo de unción[c] para mí[d], por vuestras generaciones».'
  to: 'Y hablarás a los hijos de Israel[a], diciendo: «Este será aceite de santa unción[b] para mí, a través de sus generaciones»'
  rationale: Se conserva la fidelidad básica al hebreo y a las decisiones del POB, pero se corrigen detalles de estilo y notas. Se elimina una nota redundante, se depura la nota de alternativas de «hijos de Israel», se reubica la aclaración de consagración al sintagma del aceite, y se ajusta «por vuestras generaciones» a «a través de sus generaciones» para lograr español neutral y natural. También se adopta «aceite de santa unción», opción ya documentada y más idiomática en español.
