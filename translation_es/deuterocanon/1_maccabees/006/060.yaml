translation:
  language: es
  text: Y la propuesta agradó al rey y a los gobernantes[a], y él envió a ellos[b] para hacer la paz, y aceptaron[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la palabra» o «el asunto agradó al rey y a los gobernantes». El griego λόγος puede denotar la propuesta hablada o el asunto tratado.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «envió a ellos para hacer la paz». El griego no especifica si envió mensajeros o un mensaje.
    reason: lexical_alternative
  - marker: c
    text: Es decir, aceptaron la propuesta o los términos de paz.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤρεσεν
  english_pob_choice: pleased
  chosen_spanish: agradó
  alternatives_spanish:
  - les pareció bien
  - les complació
  lexicon: LSJ
  rationale: ἀρέσκω expresa que algo resultó aceptable o aprobó ante alguien. En español, «agradar» conserva bien ese matiz de aprobación sin sonar forzado.
- source_word: ὁ λόγος
  english_pob_choice: the proposal
  chosen_spanish: la propuesta
  alternatives_spanish:
  - la palabra
  - el asunto
  - el mensaje
  lexicon: LSJ
  rationale: En este contexto diplomático, λόγος no es simplemente «palabra», sino la iniciativa o planteamiento que se había presentado. «La propuesta» comunica con naturalidad ese sentido.
- source_word: ἐναντίον
  english_pob_choice: to
  chosen_spanish: al
  alternatives_spanish:
  - ante
  - en presencia de
  lexicon: LSJ
  rationale: El giro griego literalmente es «delante de» o «en presencia de», pero unido a ἤρεσεν el sentido en español se expresa de modo natural con «agradó al rey y a los gobernantes».
- source_word: ἀρχόντων
  english_pob_choice: the rulers
  chosen_spanish: los gobernantes
  alternatives_spanish:
  - los jefes
  - los oficiales
  - los príncipes
  lexicon: LSJ
  rationale: ἄρχοντες designa a quienes ejercen autoridad. «Gobernantes» mantiene esa idea de autoridad sin introducir un cargo más específico que el griego no da.
- source_word: ἀπέστειλεν πρὸς αὐτοὺς
  english_pob_choice: he sent to them
  chosen_spanish: les envió
  alternatives_spanish:
  - envió a ellos
  - les mandó
  lexicon: LSJ
  rationale: El griego no especifica si envió mensajeros o un mensaje. «Les envió» preserva esa vaguedad deliberada y funciona bien en español.
- source_word: εἰρηνεῦσαι
  english_pob_choice: to make peace
  chosen_spanish: para hacer la paz
  alternatives_spanish:
  - para concertar la paz
  - para buscar la paz
  - para concluir la paz
  lexicon: LSJ
  rationale: El infinitivo expresa finalidad en un contexto de negociación. «Hacer la paz» es una formulación natural en español y se ajusta al valor del verbo sin añadir tecnicismo.
- source_word: ἐπεδέξαντο
  english_pob_choice: they accepted
  chosen_spanish: la aceptaron
  alternatives_spanish:
  - aceptaron la propuesta
  - la recibieron
  - estuvieron de acuerdo
  lexicon: LSJ
  rationale: El verbo puede significar recibir o aceptar. En el contexto, el objeto implícito es la oferta de paz; por eso «la aceptaron» mantiene la brevedad del griego y la referencia implícita.
