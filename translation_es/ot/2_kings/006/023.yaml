revisions:
- from: Así que les preparó un gran banquete[a], y comieron y bebieron. Luego los despidió, y fueron a su señor[b]. Y las bandas de saqueo de Aram[c] no volvieron a entrar en la tierra de Israel.
  to: Así que les preparó un gran banquete[a], y comieron y bebieron. Luego los despidió, y fueron a su amo[b]. Y las partidas de saqueo de Aram[c] no volvieron a entrar en la tierra de Israel.
  rationale: Se ajusta «a su señor» a «a su amo» para alinearlo mejor con la decisión léxica del POB inglés y evitar connotaciones litúrgicas innecesarias en español. Se mejora «bandas» a «partidas» por naturalidad y precisión semántica para גְּדוּדֵי. También se corrige la nota sobre «Aram» para que sea útil en español y no dependa de una referencia a traducciones inglesas.
