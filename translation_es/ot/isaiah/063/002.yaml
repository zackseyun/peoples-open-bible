translation:
  language: es
  text: ¿Por qué es roja[a] tu ropa, y tus vestiduras como las de uno que pisa en el lagar[b]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «enrojecida» o «carmesí»; el hebreo dice simplemente «roja», dejando que el contexto aclare la causa.
    reason: lexical_alternative
  - marker: b
    text: La comparación es con una persona que pisa uvas en un lagar; así sus vestiduras quedan teñidas de rojo por el jugo.
    reason: cultural_note
lexical_decisions:
- source_word: מַדּוּעַ
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿Por qué razón
  - ¿A qué se debe
  lexicon: HALOT
  rationale: מַדּוּעַ introduce una pregunta directa de causa; «¿Por qué?» es la equivalencia natural y clara en español, sin añadir matices explicativos que el hebreo no expresa.
- source_word: אָדֹם
  english_pob_choice: red
  chosen_spanish: roja
  alternatives_spanish:
  - enrojecida
  - carmesí
  lexicon: HALOT
  rationale: El adjetivo hebreo nombra el color rojo de manera simple. «Roja» conserva la observación visual directa y evita interpretar prematuramente la causa del color.
- source_word: לִלְבוּשֶׁךָ
  english_pob_choice: your clothing
  chosen_spanish: tu ropa
  alternatives_spanish:
  - tu vestidura
  - tu vestimenta
  lexicon: HALOT
  rationale: לְבוּשׁ se refiere de modo amplio a ropa o vestimenta. «Tu ropa» es idiomático en español y mantiene el sentido general sin restringirlo a una prenda específica.
- source_word: וּבְגָדֶיךָ
  english_pob_choice: and your garments
  chosen_spanish: tus vestidos
  alternatives_spanish:
  - tus prendas
  - tus ropas
  lexicon: HALOT
  rationale: בֶּגֶד suele designar una prenda o vestidura. «Tus vestidos» conserva el paralelismo poético con «tu ropa» y es suficientemente natural en este registro bíblico.
- source_word: כְּדֹרֵךְ
  english_pob_choice: like one who treads
  chosen_spanish: como los de uno que pisa
  alternatives_spanish:
  - como el que pisa
  - como uno que pisa
  lexicon: HALOT
  rationale: El participio expresa a alguien en la acción de pisar. En español, «como los de uno que pisa» mantiene la comparación con las prendas de esa persona, reflejando el valor del participio sin forzar una paráfrasis.
- source_word: בְּגַת
  english_pob_choice: in the winepress
  chosen_spanish: en el lagar
  alternatives_spanish:
  - en el lagar de vino
  - en la prensa de uvas
  lexicon: HALOT
  rationale: גַּת es el lagar donde se pisan uvas. «Lagar» es el equivalente bíblico natural en español; además, mantiene la imagen cultural del trabajo de pisar uvas.
theological_decisions:
- issue: Si explicitar o no la imagen de sangre/jucio detrás de la ropa roja
  english_pob_reading: Retain the literal visual description 'red' without adding interpretive language such as 'bloodstained.'
  chosen_spanish_reading: Mantener la descripción visual literal «roja» sin añadir «manchada de sangre» ni una interpretación semejante
  alternative_spanish_readings:
  - ¿Por qué tu ropa está manchada de sangre...?
  - ¿Por qué tus vestiduras están color carmesí...?
  rationale: El hebreo pregunta por el color rojo y compara las prendas con las de quien pisa uvas en el lagar; la lectura de sangre o juicio se aclara más adelante en el contexto inmediato. Mantener «roja» preserva la tensión teológica y evita resolverla antes de tiempo.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios y el control cruzado reportó alta concordancia, con solo observaciones menores; por ello se mantiene la solución literal-base con aclaración cultural en nota.
  spanish_consistency_notes:
  - Se conservó «Yahvé» donde no aparece en este versículo; aquí no aplica ningún reemplazo del nombre divino.
  - Se eligió «roja» para אָדֹם por su sencillez semántica, evitando intensificar a «manchada de sangre» en el texto principal.
  - «Lagar» se usa como término bíblico claro y natural en español para בְּגַת.
  - La comparación del participio כְּדֹרֵךְ se mantuvo con valor agentivo en español («uno que pisa»), sin convertirla en una explicación interpretativa del juicio.
