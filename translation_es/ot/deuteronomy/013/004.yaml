base_translation:
  language: en
  yaml_path: translation/ot/deuteronomy/013/004.yaml
  text: You shall not listen to the words of that prophet or to that dreamer of dreams[a], for Yahweh your God is testing you[b], to know whether you love Yahweh your God with all your heart and with all your soul.
  footnotes:
  - marker: a
    text: Or 'whether you love the LORD your God.' The Hebrew participle can be rendered as a simple present, though 'are loving' more explicitly reflects the ongoing/state nuance.
    reason: lexical_alternative
  - marker: b
    text: '''Soul'' here can also mean ''life,'' ''self,'' or ''being.'' In this covenant formula, ''soul'' preserves the traditional and intertextually important wording.'
    reason: lexical_alternative
