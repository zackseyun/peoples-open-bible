translation:
  language: es
  text: Y comieron y bebieron[a], y cuando quedaron satisfechos, se retiraron. Pero Darío el rey fue a su alcoba y durmió, y después despertó.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse «habiendo quedado satisfechos»; el participio griego ἐμπλησθέντες enfatiza la saciedad tras la comida.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐφάγοσαν
  english_pob_choice: they ate
  chosen_spanish: comieron
  alternatives_spanish:
  - se alimentaron
  - comieron
  lexicon: LSJ
  rationale: El aoristo de ἐσθίω expresa la acción simple de comer; en español, «comieron» reproduce de manera natural y directa ese sentido narrativo.
- source_word: ἐπίοσαν
  english_pob_choice: drank
  chosen_spanish: bebieron
  alternatives_spanish:
  - tomaron
  - bebieron
  lexicon: LSJ
  rationale: El aoristo de πίνω pide el verbo «beber»; «bebieron» conserva el paralelismo con «comieron» y evita una paráfrasis más libre.
- source_word: ἐμπλησθέντες
  english_pob_choice: when they were filled
  chosen_spanish: cuando quedaron satisfechos
  alternatives_spanish:
  - habiendo quedado satisfechos
  - cuando se saciaron
  - después de haberse saciado
  lexicon: LSJ
  rationale: El participio indica saciedad después de comer y beber. «Quedaron satisfechos» mantiene la idea de plenitud sin volverla demasiado pesada; el matiz de saciedad queda recogido en la formulación.
- source_word: ἀνέλυσαν
  english_pob_choice: they departed
  chosen_spanish: se retiraron
  alternatives_spanish:
  - partieron
  - se fueron
  - se dispersaron
  lexicon: LSJ
  rationale: Aquí el verbo describe el cierre de la reunión y la salida del lugar. «Se retiraron» es idiomático en español y conserva la idea de apartarse o irse sin añadir detalle innecesario.
- source_word: κοιτών
  english_pob_choice: bedchamber
  chosen_spanish: cámara de dormir
  alternatives_spanish:
  - alcoba
  - dormitorio
  - cámara
  lexicon: LSJ
  rationale: El término remite a un cuarto destinado al descanso. «Cámara de dormir» preserva el carácter de aposento real más claramente que «dormitorio», y evita modernizar en exceso el ambiente narrativo.
- source_word: ἐκοιμήθη
  english_pob_choice: slept
  chosen_spanish: durmió
  alternatives_spanish:
  - se durmió
  - estuvo dormido
  lexicon: LSJ
  rationale: El aoristo relata simplemente que durmió. «Durmió» es la opción más directa y fiel al aspecto narrativo del griego.
- source_word: ἔξυπνος ἐγένετο
  english_pob_choice: then awoke
  chosen_spanish: despertó
  alternatives_spanish:
  - se despertó
  - quedó despierto
  - se volvió despierto
  lexicon: LSJ
  rationale: La expresión idiomática literalmente significa «llegó a estar despierto». «Despertó» transmite con naturalidad el cambio de estado sin perder el sentido del giro griego.
translation_notes:
  revision_awareness: 'Coincide sustancialmente con la auditoría inglesa: la secuencia narrativa se mantiene, ἐμπλησθέντες se conserva como saciedad y ἔξυπνος ἐγένετο se vierte como un cambio de estado a la vigilia. La versión española ajusta únicamente el registro para que suene natural y publicable en español sin perder los matices del griego.'
  spanish_consistency_notes:
  - Se usa «Darío el rey» para reflejar el orden apposicional del griego y mantener el énfasis narrativo.
  - «Cámara de dormir» conserva el matiz de aposento real de κοιτών, en línea con la decisión inglesa de «bedchamber».
  - Se evita «SEÑOR» o terminología teológica ajena al versículo, ya que el pasaje es puramente narrativo.
