translation:
  language: es
  text: Sin embargo[a], los lugares altos no fueron quitados[b]; el pueblo todavía sacrificaba y quemaba incienso en los lugares altos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'los santuarios'. El término hebreo se refiere a sitios cultuales locales elevados, tradicionalmente traducidos 'lugares altos'.
    reason: lexical_alternative
  - marker: b
    text: El versículo no especifica si estos sacrificios se ofrecían a Yahvé en sitios no autorizados o como parte de una práctica más amplia de idolatría.
    reason: cultural_note
lexical_decisions:
- source_word: אַךְ
  english_pob_choice: However
  chosen_spanish: Sin embargo
  alternatives_spanish:
  - Pero
  - No obstante
  lexicon: HALOT
  rationale: Marca contraste adversativo con la evaluación positiva precedente. 'Sin embargo' conserva bien la fuerza de transición y suena natural en español bíblico moderno.
- source_word: הַבָּמוֹת
  english_pob_choice: the high places
  chosen_spanish: los lugares altos
  alternatives_spanish:
  - las alturas
  - los santuarios
  lexicon: HALOT
  rationale: '''Bamot'' designa sitios cultuales elevados. ''Lugares altos'' mantiene el término tradicional y el sentido histórico-religioso sin volverlo más interpretativo de lo que permite el hebreo.'
- source_word: לֹא סָרוּ
  english_pob_choice: were not removed
  chosen_spanish: no fueron quitados
  alternatives_spanish:
  - no fueron removidos
  - no desaparecieron
  - no se eliminaron
  lexicon: HALOT
  rationale: Con 'los lugares altos' como sujeto, la idea es que no fueron retirados de su sitio. 'Fueron quitados' refleja el idiomatismo pasivo del inglés POB y evita una traducción demasiado literal de 'apartarse'.
- source_word: עוֹד
  english_pob_choice: still
  chosen_spanish: todavía
  alternatives_spanish:
  - aún
  - seguían
  lexicon: HALOT
  rationale: Expresa continuidad pese a la reforma. 'Todavía' es claro y natural, preservando el matiz de persistencia.
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - el pueblo entero
  lexicon: HALOT
  rationale: Referencia colectiva simple y fiel. 'El pueblo' es la forma más sobria y bíblica en español.
- source_word: מְזַבְּחִים
  english_pob_choice: were sacrificing
  chosen_spanish: sacrificaba
  alternatives_spanish:
  - estaba sacrificando
  - ofrecía sacrificios
  lexicon: HALOT
  rationale: El participio expresa acción habitual o continua. En español, el imperfecto comunica esa continuidad de manera natural sin añadir perífrasis innecesaria.
- source_word: וּמְקַטְּרִים
  english_pob_choice: and burning incense
  chosen_spanish: y quemaba incienso
  alternatives_spanish:
  - y ofrecía incienso
  - y hacía humear ofrendas
  lexicon: HALOT
  rationale: En este contexto cultual, קטר puede referirse a quemar incienso o hacer humo ritual. 'Quemaba incienso' es idiomático y precisa el acto litúrgico sin sobreexplicar.
- source_word: בַּבָּמוֹת
  english_pob_choice: on the high places
  chosen_spanish: en los lugares altos
  alternatives_spanish:
  - sobre los lugares altos
  - en las alturas
  lexicon: HALOT
  rationale: La preposición con el sitio cultual se expresa con naturalidad como 'en'. Repite el mismo referente para conservar la cohesión del versículo.
theological_decisions:
- issue: Naturaleza del culto en los lugares altos
  english_pob_reading: Render the verse descriptively without specifying whether the sacrifices were to the LORD or to other deities.
  chosen_spanish_reading: Traducir descriptivamente sin precisar si los sacrificios eran a Yahvé o a otras deidades.
  alternative_spanish_readings:
  - El pueblo seguía adorando a Yahvé en lugares no autorizados
  - El pueblo practicaba un culto idólatra o sincretista
  rationale: El hebreo solo afirma que el pueblo sacrificaba y quemaba incienso en los lugares altos. El texto critica la permanencia de esos sitios, pero no identifica aquí el objeto del culto. La traducción conserva esa tensión en lugar de resolverla.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'Se siguió el último pase de revisión en inglés al preferir una formulación más natural para la acción continua (''sacrificaba y quemaba incienso'') en lugar de una perífrasis más pesada, manteniendo todos los elementos del hebreo: contraste adversativo, permanencia de los lugares altos, continuidad del culto y la ambigüedad sobre el objeto del sacrificio.'
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como término estándar del proyecto cuando corresponde, aunque este versículo no lo explicita.
  - '''Lugares altos'' conserva la terminología técnica del culto en Reyes y evita sustituirla por ''santuarios'' en el texto principal.'
  - El imperfecto español ('sacrificaba', 'quemaba incienso') reproduce la acción habitual/continua del participio hebreo.
  - No se añadió especificación teológica sobre a quién iban dirigidos los sacrificios, siguiendo el audit trail en inglés.
