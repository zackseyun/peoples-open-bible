revisions:
- from: Oh Yahvé, nuestro Dios[a], tú les respondiste; fuiste un Dios que perdona para ellos[b], y aun así un vengador de sus hechos.
  to: Oh Yahvé, nuestro Dios, tú les respondiste; fuiste para ellos un Dios que perdona[a], y aun así un vengador de sus hechos[b].
  rationale: Se corrigieron los anclajes de notas para que coincidan con las palabras hebreas pertinentes en el audit trail y se suavizó una construcción poco natural («para ellos») con una reestructuración mínima que preserva el sentido relacional de היה + ל. Se mantuvo «Yahvé», la tensión entre perdón y venganza, y el léxico principal del borrador.
