lexical_decisions:
- source_word: אֶלְעוּזַי
  english_pob_choice: Eluzai
  chosen_spanish: Eluzai
  alternatives_spanish:
  - El-uzai
  lexicon: nombre propio
  rationale: Se trata de un nombre personal; se translitera, no se traduce. Se conserva la forma breve y reconocible sin añadir segmentación artificial.
- source_word: וִירִימוֹת
  english_pob_choice: Jerimoth
  chosen_spanish: Jerimot
  alternatives_spanish:
  - Yerimot
  lexicon: nombre propio
  rationale: Nombre propio en una lista; se adapta a la ortografía española con terminación -ot, manteniendo la transliteración del hebreo sin forzar una forma tradicional castellana inexistente en este contexto.
- source_word: וּבְעַלְיָה
  english_pob_choice: Bealiah
  chosen_spanish: Bealía
  alternatives_spanish:
  - Baalía
  lexicon: nombre propio
  rationale: Se conserva el nombre propio con adaptación gráfica al español. La forma con acento final refleja la pronunciación esperable en español y evita una lectura errónea.
- source_word: וּשְׁמַרְיָהוּ
  english_pob_choice: Shemariahu
  chosen_spanish: Semarías
  alternatives_spanish:
  - Shemaríahu
  - Semaríah
  lexicon: nombre propio
  rationale: Nombre propio hebreo; se translitera de manera readable en español. Se evita un calco excesivamente técnico del final -yahu, pero se mantiene la identidad del nombre.
- source_word: וּשְׁפַטְיָהוּ
  english_pob_choice: Shephatiah
  chosen_spanish: Sefatías
  alternatives_spanish:
  - Sefatíahu
  - Shefatías
  lexicon: nombre propio
  rationale: Nombre propio con forma reconocible en español bíblico, ajustada a la ortografía castellana. Se conserva el valor transliterado sin traducir el nombre.
- source_word: הַחֲרִיפִי
  english_pob_choice: the Haruphite
  chosen_spanish: el harufita
  alternatives_spanish:
  - el harifita
  lexicon: HALOT
  rationale: Se vierte como gentilicio/clasificación de clan con '-ita', siguiendo el valor del inglés POB y la forma consonántica vocalizada del hebreo. Se prefiere 'harufita' porque el texto consonántico/vocalizado de este pasaje apunta a Haruph; se mantiene la alternativa tradicional/relacionada en nota.
theological_decisions:
- issue: Designación gentilicia/clánica del último nombre
  english_pob_reading: the Haruphite, with note that the Hebrew gentilicial form may reflect a clan name also represented elsewhere with the form Hariph.
  chosen_spanish_reading: el harufita, con nota que admite también la forma harifita.
  alternative_spanish_readings:
  - el harifita
  rationale: No hay una cuestión doctrinal, sino una tensión lexical/textual sobre el nombre del clan. La nota preserva la alternativa documentada por el POB y evita cerrar indebidamente la identificación.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: El texto fuente presenta una lista nominal con alta concordancia entre el hebreo y el audit trail inglés. No hubo revisiones aplicadas en el POB inglés; se mantuvo la decisión sobre el gentilicio final y se trasladó su alternativa documentada al español.
  spanish_consistency_notes:
  - Se mantuvo un registro consistente de nombres propios transliterados, con adaptación mínima a la ortografía española.
  - Se evitó la sustitución por títulos eclesiásticos tradicionales; se conservó el gentilicio del último término como marca de clan.
  - La puntuación en serie respeta el estilo español natural sin alterar el contenido de la lista.
