    issue: La nota b está mal formulada.
    rationale: El texto principal ya dice «la nación de los justos», pero la nota b presenta esa misma formulación como si fuera la alternativa. Según el audit trail inglés, la alternativa real es «la nación justa». Esto afecta la fidelidad al expediente y puede confundir al lector.
  revised_spanish_text: Y por su grito toda nación quedó preparada para la guerra[a], para combatir contra la nación de los justos[b].
  revised_footnotes:
  - marker: a
    text: 'O «voz» o «sonido»: el griego puede referirse de manera más amplia al ruido o al clamor que emitieron.'
    reason: lexical_alternative
  - marker: b
    text: O «la nación justa». La frase griega puede entenderse como un genitivo («nación de los justos») o como una idea descriptiva compacta.
    reason: alternative_reading
  revision_rationale: Se conserva el texto principal porque representa fielmente el griego y el razonamiento léxico-teológico documentado. Solo se corrige la nota b para que refleje la alternativa real preservada en el expediente inglés.
