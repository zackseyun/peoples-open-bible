  to: 'Y dirás a ellos esta palabra: «Así dice Yahvé: el Dios de Israel: “Toda vasija[a] será llenada de vino”. Y te dirán: “¿Acaso no sabemos muy bien que toda vasija será llenada de vino?”»'
