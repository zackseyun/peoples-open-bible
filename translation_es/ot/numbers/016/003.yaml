translation:
  language: es
  text: 'Se reunieron contra Moisés y contra Aarón, y les dijeron[a]: «¡Ya es demasiado de parte de ustedes! Porque toda la congregación, todos ellos, son santos, y Yahvé está en medio de ellos[b]. ¿Por qué, pues, se enaltecen sobre la asamblea de Yahvé?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Es demasiado para ustedes» o «Basta de ustedes». Se traduce «¡Ya es demasiado de parte de ustedes!» para expresar con claridad en español moderno la reprimenda idiomática dirigida contra Moisés y Aarón.'
    reason: lexical_alternative
  - marker: b
    text: El nombre divino YHWH se traduce aquí como «Yahvé», conforme a la convención del proyecto para preservar el nombre propio de Dios.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּקָּהֲלוּ
  english_pob_choice: They assembled
  chosen_spanish: Se reunieron
  alternatives_spanish:
  - Se congregaron
  - Se juntaron
  lexicon: HALOT
  rationale: קהל en sentido de reunirse deliberadamente. En español, «se reunieron» es natural y conserva el valor colectivo sin añadir matiz hostil por sí mismo.
- source_word: עַל מֹשֶׁה וְעַל אַהֲרֹן
  english_pob_choice: against Moses and against Aaron
  chosen_spanish: contra Moisés y contra Aarón
  alternatives_spanish:
  - ante Moisés y ante Aarón
  - acerca de Moisés y Aarón
  lexicon: HALOT
  rationale: En este contexto de oposición, עַל expresa hostilidad. «Contra» reproduce bien la fuerza confrontativa del hebreo.
- source_word: רַב לָכֶם
  english_pob_choice: You have gone too far!
  chosen_spanish: ¡Basta para ustedes!
  alternatives_spanish:
  - ¡Demasiado es para ustedes!
  - ¡Les basta ya!
  lexicon: HALOT
  rationale: El hebreo es una reprimenda idiomática. «¡Basta para ustedes!» comunica de manera natural la idea de límite o suficiente sin mecanizar la expresión.
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la razón de la acusación. «Porque» mantiene la relación causal de forma clara en español.
- source_word: כָל הָעֵדָה כֻּלָּם
  english_pob_choice: all the congregation—all of them—
  chosen_spanish: toda la congregación, todos ellos
  alternatives_spanish:
  - toda la congregación, todos
  - toda la comunidad, todos ellos
  lexicon: HALOT
  rationale: Se conserva la totalidad enfática del hebreo con una repetición natural en español. «Congregación» refleja al pueblo reunido como cuerpo del pacto.
- source_word: קְדֹשִׁים
  english_pob_choice: holy
  chosen_spanish: santos
  alternatives_spanish:
  - sagrados
  - consagrados
  lexicon: HALOT
  rationale: Aquí el adjetivo describe la pretensión de estatus santo del pueblo. «Santos» conserva el peso bíblico y cultual del término sin suavizarlo.
- source_word: וּבְתוֹכָם יְהוָה
  english_pob_choice: and Yahweh is among them
  chosen_spanish: y Yahvé está en medio de ellos
  alternatives_spanish:
  - y Yahvé está entre ellos
  - y Yahvé está en su medio
  lexicon: HALOT
  rationale: El giro indica presencia divina dentro de la comunidad. «En medio de ellos» reproduce la imagen con fidelidad y naturalidad; Yahvé se usa para el nombre divino según la pauta del proyecto.
- source_word: וּמַדּוּעַ
  english_pob_choice: So why
  chosen_spanish: ¿Por qué, pues?
  alternatives_spanish:
  - ¿Y por qué?
  - ¿Por qué entonces?
  lexicon: HALOT
  rationale: La partícula introduce una conclusión inferida. «Pues» ayuda a reflejar la inferencia retórica sin forzar una paráfrasis.
- source_word: תִּתְנַשְּׂאוּ
  english_pob_choice: do you exalt yourselves
  chosen_spanish: se enaltecen
  alternatives_spanish:
  - se exaltan
  - se levantan por encima
  lexicon: HALOT
  rationale: El hitpael expresa autoelevación. «Se enaltecen» conserva el matiz de elevarse a sí mismos, con un tono natural en español.
- source_word: עַל קְהַל יְהוָה
  english_pob_choice: above the assembly of Yahweh
  chosen_spanish: sobre la asamblea de Yahvé
  alternatives_spanish:
  - por encima de la asamblea de Yahvé
  - sobre la congregación de Yahvé
  lexicon: HALOT
  rationale: «Sobre» reproduce la idea de superioridad jerárquica. «Asamblea» distingue bien קהל de עֵדָה y suena apropiado para el contexto litúrgico-corporativo.
theological_decisions:
- issue: Cómo renderizar יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo contiene el Tetragrammaton. Se sigue la convención del proyecto de transliterarlo como «Yahvé», preservando el nombre propio del pacto en lugar de sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: יְהוָה / YHWH → Yahvé'
- issue: Cómo presentar la afirmación «toda la congregación... son santos»
  english_pob_reading: Rendered straightforwardly as the speakers' claim without interpretive qualification
  chosen_spanish_reading: Se presenta de forma directa como la afirmación de los hablantes, sin añadir corrección interpretativa
  alternative_spanish_readings:
  - «dicen que toda la congregación... es santa»
  - «afirman que toda la congregación... son santos»
  rationale: 'La traducción mantiene la tensión teológica del pasaje: la frase se cita tal como fue dicha, sin resolver en el mismo verso si la afirmación es correcta o no. La evaluación narrativa pertenece al contexto mayor.'
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'El borrador sigue el contexto auditado en inglés, sin cambios revisionales respecto de la última pasada: se mantiene la equivalencia óptima, la lectura directa de la acusación y la transliteración de YHWH como Yahvé.'
  spanish_consistency_notes:
  - Se mantiene «Moisés» y «Aarón» con la ortografía estándar en español.
  - Se usa «congregación» para עֵדָה y «asamblea» para קְהַל, conservando la distinción del hebreo.
  - Se preserva la repetición enfática con «todos ellos» y la puntuación con comas y raya para reflejar el énfasis.
  - «Santos» conserva el valor bíblico-cultual de קְדֹשִׁים sin reinterpretarlo como mera moralidad.
