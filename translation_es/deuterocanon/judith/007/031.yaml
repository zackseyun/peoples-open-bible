translation:
  language: es
  text: Pero si pasan estos días y no nos llega ayuda, haré conforme a sus palabras.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐὰν δὲ
  english_pob_choice: But if
  chosen_spanish: Pero si
  alternatives_spanish:
  - Y si
  - Mas si
  lexicon: BDAG
  rationale: El griego combina una condición con una leve transición adversativa; «Pero si» conserva ese matiz sin volverlo más fuerte de lo que pide el texto.
- source_word: διέλθωσιν αὗται
  english_pob_choice: these days pass
  chosen_spanish: pasan estos días
  alternatives_spanish:
  - transcurren estos días
  - si estos días se acaban
  lexicon: BDAG
  rationale: αὗται es femenino plural y remite a días ya mencionados en el contexto; en español conviene explicitar el sustantivo implícito para que la referencia sea clara y natural.
- source_word: μὴ ἔλθῃ ἐφʼ ἡμᾶς βοήθεια
  english_pob_choice: no help comes to us
  chosen_spanish: no nos llega ayuda
  alternatives_spanish:
  - no viene ayuda hacia nosotros
  - no nos sobreviene ayuda
  lexicon: BDAG
  rationale: βοήθεια significa ayuda o socorro. «Nos llega ayuda» comunica el movimiento hacia los destinatarios sin cargar el verbo con un matiz más fuerte que el griego.
- source_word: ποιήσω
  english_pob_choice: I will do
  chosen_spanish: yo haré
  alternatives_spanish:
  - haré
  - yo actuaré
  lexicon: BDAG
  rationale: El futuro de ποιέω es un hacer general; «haré» preserva la sencillez del original. Se mantiene «yo» para reflejar con claridad el sujeto explícito del griego, aunque en español podría omitirse.
- source_word: κατὰ τὰ ῥήματα ὑμῶν
  english_pob_choice: according to your words
  chosen_spanish: conforme a vuestras palabras
  alternatives_spanish:
  - según vuestras palabras
  - de acuerdo con vuestras palabras
  lexicon: BDAG
  rationale: ῥήματα son «palabras» o dicho. «Conforme a vuestras palabras» conserva la referencia a lo que han dicho y suena natural en español bíblico contemporáneo. Se mantiene el plural de segunda persona para reflejar el griego.
translation_notes:
  revision_awareness: La revisión inglesa reciente ajustó «comes upon us» a «comes to us» por naturalidad. En español, «no nos llega ayuda» ya expresa de modo natural la misma relación sin añadir o quitar sentido.
  spanish_consistency_notes:
  - Se preservó el tono condicional-adversativo con «Pero si» para reflejar ἐὰν δὲ.
  - Se evitó traducir βοήθεια con un término más técnico como «liberación», porque el griego dice «ayuda» de forma más general.
  - Se mantuvo una sintaxis sobria y directa, acorde con el registro narrativo de Judit.
