translation:
  language: es
  text: Ahora bien, Elí era muy anciano[a], y oyó todo lo que sus hijos hacían a todo Israel, y que yacían con las mujeres que servían a la entrada de la tienda de reunión.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'las mujeres que se reunían a la entrada de la tienda de reunión'. El participio hebreo puede denotar reunirse o servir de manera organizada.
    reason: lexical_alternative
lexical_decisions:
- source_word: זָקֵן מְאֹד
  english_pob_choice: was very old
  chosen_spanish: era muy anciano
  alternatives_spanish:
  - era muy viejo
  - había llegado a una edad muy avanzada
  lexicon: HALOT
  rationale: El hebreo expresa un estado con intensificador. En español, 'muy anciano' conserva la fuerza de edad avanzada con un registro digno y natural, sin perder el valor estativo del original.
- source_word: וְשָׁמַע
  english_pob_choice: and he heard
  chosen_spanish: y oyó
  alternatives_spanish:
  - y escuchó
  - y llegó a oír
  lexicon: HALOT
  rationale: El qatal narrativo reporta un hecho ya recibido por Elí. 'Oyó' es breve, formal y fiel al valor de percepción auditiva sin sugerir iteración.
- source_word: כָּל אֲשֶׁר יַעֲשׂוּן
  english_pob_choice: all that ... were doing
  chosen_spanish: todo lo que ... hacían
  alternatives_spanish:
  - todo lo que ... hicieron
  - todo lo que ... solían hacer
  lexicon: HALOT
  rationale: La construcción abarca la totalidad de las acciones de los hijos en un trasfondo de conducta continua. El imperfecto español 'hacían' reproduce bien ese matiz de acción en curso o habitual.
- source_word: לְכָל יִשְׂרָאֵל
  english_pob_choice: to all Israel
  chosen_spanish: a todo Israel
  alternatives_spanish:
  - contra todo Israel
  - para todo Israel
  lexicon: HALOT
  rationale: La preposición ל aquí expresa referencia o relación hacia el pueblo afectado. 'A todo Israel' es la equivalencia más directa y no fuerza el matiz hacia una lectura más interpretativa como 'contra'.
- source_word: יִשְׁכְּבוּן אֶת־הַנָּשִׁים
  english_pob_choice: they were lying with the women
  chosen_spanish: yacían con las mujeres
  alternatives_spanish:
  - se acostaban con las mujeres
  - tenían relaciones sexuales con las mujeres
  lexicon: HALOT
  rationale: שׁכב con objeto humano es un eufemismo sexual. 'Yacían con' mantiene el registro formal y el valor eufemístico sin volver la frase demasiado clínica o demasiado moderna.
- source_word: הַצֹּבְאוֹת
  english_pob_choice: who served
  chosen_spanish: que servían
  alternatives_spanish:
  - que se reunían
  - que ministraban
  lexicon: HALOT
  rationale: El participio de צבא admite la idea de servicio organizado o de reunirse en torno al santuario. En este contexto, 'servían' es la opción más clara y natural; conserva la función cultual sin introducir categorías posteriores.
- source_word: פֶּתַח אֹהֶל מוֹעֵד
  english_pob_choice: at the entrance to the tent of meeting
  chosen_spanish: en la entrada de la tienda de reunión
  alternatives_spanish:
  - a la entrada de la tienda de reunión
  - en el umbral de la tienda de reunión
  lexicon: HALOT
  rationale: La expresión es técnica y estable en el pentateuco y Samuel. 'Entrada de la tienda de reunión' preserva el referente cultual y suena más natural en español que un calco rígido.
theological_decisions:
- issue: Función de las mujeres en el santuario
  english_pob_reading: Render הַצֹּבְאוֹת as women who served at the entrance to the tent of meeting.
  chosen_spanish_reading: Traducir הַצֹּבְאוֹת como 'que servían' en un contexto de actividad cultual organizada.
  alternative_spanish_readings:
  - que se reunían
  - que ministraban
  rationale: El hebreo puede sugerir servicio organizado o reunión. La elección 'servían' mantiene la amplitud semántica sin imponer una institución sacerdotal posterior ni reducir el sentido a simple congregarse.
  doctrine_reference: Translation philosophy §1, §5
- issue: Grado de explicitud del pecado sexual
  english_pob_reading: Use the euphemistic but clear phrase 'lying with.'
  chosen_spanish_reading: Usar el eufemismo formal 'yacían con'.
  alternative_spanish_readings:
  - se acostaban con
  - tenían relaciones sexuales con
  rationale: El hebreo usa un eufemismo convencional; la traducción debe ser clara sobre la inmoralidad sin volverse más explícita de lo que el texto exige. 'Yacían con' conserva esa tensión entre decoro y claridad.
  doctrine_reference: Translation philosophy §6
translation_notes:
  revision_awareness: La revisión inglesa más reciente cambió 'sleeping with' por 'lying with' para un registro más formal sin alterar el sentido. La presente redacción española sigue esa dirección con 'yacían con', manteniendo el eufemismo y la formalidad del pasaje.
  spanish_consistency_notes:
  - Se conservó 'tienda de reunión' para אֹהֶל מוֹעֵד, siguiendo la terminología técnica del santuario.
  - Se eligió 'Yahvé' solo cuando corresponda; este versículo no contiene el Tetragrámaton.
  - '''Yacían con'' refleja el eufemismo sexual del hebreo sin añadir detalles no presentes en el texto.'
