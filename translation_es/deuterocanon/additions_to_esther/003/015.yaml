translation:
  language: es
  text: Yo había oído[a] desde mi nacimiento, en la tribu de mi familia ancestral, que tú, Yahvé, tomaste a Israel de entre todas las naciones y a nuestros padres de entre todos sus antepasados, como herencia eterna, e hiciste para ellos lo que dijiste.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «desde que nací».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγὼ ἤκουον
  english_pob_choice: I had heard
  chosen_spanish: Yo había oído
  alternatives_spanish:
  - Yo oí
  - Yo estaba oyendo
  lexicon: BDAG
  rationale: El imperfecto en un contexto retrospectivo expresa un estado pasado de haber recibido la tradición; en español, el pluscuamperfecto reproduce bien ese valor de anterioridad y recuerdo.
- source_word: ἐκ γενετῆς μου
  english_pob_choice: from my birth
  chosen_spanish: desde mi nacimiento
  alternatives_spanish:
  - desde mi nacimiento
  - desde mi origen
  lexicon: LSJ
  rationale: γενετή alude al nacimiento/origen temporal. 'Desde mi nacimiento' es natural en español y conserva el inicio temporal de la tradición recibida.
- source_word: ἐν φυλῇ πατριάς μου
  english_pob_choice: in the tribe of my ancestral family
  chosen_spanish: en la tribu de mi familia ancestral
  alternatives_spanish:
  - en la tribu de mi linaje
  - en la tribu de mi familia paterna
  - en mi tribu familiar ancestral
  lexicon: LSJ
  rationale: φυλή es 'tribu' y πατριά señala familia/clan de ascendencia. 'Familia ancestral' mantiene el parentesco sin sonar arcaico, y evita aplanar los dos términos griegos.
- source_word: σύ, Κύριε
  english_pob_choice: you, Lord
  chosen_spanish: tú, Yahvé
  alternatives_spanish:
  - tú, Señor
  - tú, oh Yahvé
  lexicon: BDAG
  rationale: Aunque el texto griego dice Κύριε, en este contexto de invocación al Dios de Israel corresponde reflejar el nombre divino según la norma del proyecto; 'Yahvé' evita el enmascaramiento con 'Señor' y mantiene la referencia auditada al nombre divino.
- source_word: ἔλαβες
  english_pob_choice: took
  chosen_spanish: tomaste
  alternatives_spanish:
  - escogiste
  - recibiste
  lexicon: BDAG
  rationale: λαμβάνω aquí tiene el sentido de tomar/seleccionar de entre otros. 'Tomaste' permanece cercano al griego y funciona con la frase siguiente de selección entre naciones.
- source_word: ἐκ πάντων τῶν ἐθνῶν
  english_pob_choice: from among all the nations
  chosen_spanish: de entre todas las naciones
  alternatives_spanish:
  - de entre todos los pueblos
  - de entre todas las naciones y pueblos
  lexicon: BDAG
  rationale: ἐκ con el genitivo marca extracción o selección de un conjunto mayor. 'Naciones' conserva el valor habitual de ἐθνῶν sin introducir una equivalencia más interpretativa como 'pueblos'.
- source_word: τοὺς πατέρας ἡμῶν
  english_pob_choice: our fathers
  chosen_spanish: a nuestros padres
  alternatives_spanish:
  - a nuestros padres
  - a nuestros antepasados
  lexicon: BDAG
  rationale: El griego dice literalmente 'nuestros padres'. Se mantiene ese kinship term masculinely marcado, siguiendo la preferencia de no neutralizar sin razón textual.
- source_word: ἐκ πάντων τῶν προγόνων αὐτῶν
  english_pob_choice: from among all their ancestors
  chosen_spanish: de entre todos sus antepasados
  alternatives_spanish:
  - de entre todos sus mayores
  - de entre todos sus antecesores
  lexicon: LSJ
  rationale: πρόγονοι significa antepasados/antecesores. 'Antepasados' es claro y digno; el posesivo 'sus' se toma de forma natural vinculándolo con 'nuestros padres'.
- source_word: εἰς κληρονομίαν αἰώνιον
  english_pob_choice: as an everlasting inheritance
  chosen_spanish: como herencia eterna
  alternatives_spanish:
  - como herencia perpetua
  - como posesión eterna
  - como herencia para siempre
  lexicon: BDAG
  rationale: κληρονομία puede ser herencia o posesión, y αἰώνιος señala permanencia. 'Herencia eterna' conserva el registro pactual y suena más fluido en español que una calca más pesada.
- source_word: ἐποίησας αὐτοῖς ὅσα ἐλάλησας
  english_pob_choice: you did for them what you spoke
  chosen_spanish: e hiciste para ellos lo que hablaste
  alternatives_spanish:
  - e hiciste para ellos lo que dijiste
  - e cumpliste para ellos lo que hablaste
  - e hiciste para ellos todo lo que prometiste
  lexicon: BDAG
  rationale: 'El griego es literal: ''hiciste ... lo que hablaste''. Se conserva esa tensión entre hablar y realizar, sin resolverla de más con ''prometiste''.'
theological_decisions:
- issue: Nombre divino en la invocación (Κύριε)
  english_pob_reading: Rendered as 'Lord' while preserving the vocative force; the audit trail notes the divine title.
  chosen_spanish_reading: '''Yahvé'' en vez de ''Señor'''
  alternative_spanish_readings:
  - Señor
  - oh Yahvé
  rationale: En este proyecto, el nombre divino se representa como 'Yahvé' para evitar el enmascaramiento convencional. Aunque el griego usa Κύριε, el contexto remite al Dios de Israel y la decisión española sigue la política terminológica del proyecto.
  doctrine_reference: Project terminology default for יהוה / YHWH; preserve source-based divine-name distinction.
- issue: Registro pactual de εἰς κληρονομίαν αἰώνιον
  english_pob_reading: '''as an everlasting inheritance'' preserves covenantal register without over-defining who inherits whom.'
  chosen_spanish_reading: '''como herencia eterna'''
  alternative_spanish_readings:
  - como posesión eterna
  - como herencia perpetua
  rationale: '''Herencia eterna'' conserva la ambigüedad útil del texto: puede oírse como don permanente y como lenguaje pactual. No se explicita más de lo que el griego dice.'
  doctrine_reference: Preserve theological tension rather than resolve it; consistency of key terms.
translation_notes:
  revision_awareness: Se siguió de cerca el texto griego de Swete y el auditable English POB, manteniendo la sintaxis acumulativa y la tensión literal de ἐποίησας αὐτοῖς ὅσα ἐλάλησας. La única adaptación significativa fue traducir Κύριε como 'Yahvé' conforme al término divino del proyecto en español, dado que el contexto identifica al Dios de Israel y no requiere el enmascaramiento litúrgico 'Señor'.
  spanish_consistency_notes:
  - Se mantuvo 'de entre' para expresar selección desde un conjunto mayor en ἐκ + genitivo.
  - '''Padres'' se conservó como término de parentesco masculino, coherente con la política del proyecto.'
  - '''Herencia eterna'' mantiene el campo semántico covenantal sin resolver la ambigüedad interpretativa.'
  - Se evitó 'Cristo' y cualquier terminología eclesiástica ajena al pasaje.
  - La nota[a] solo aclara una alternativa de matiz temporal en ἐκ γενετῆς μου.
