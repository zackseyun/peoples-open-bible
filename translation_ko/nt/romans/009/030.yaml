  text: Τί οὖν ἐροῦμεν; ὅτι ἔθνη τὰ μὴ διώκοντα δικαιοσύνην κατέλαβεν δικαιοσύνην, δικαιοσύνην δὲ τὴν ἐκ πίστεως·
base_translation:
  language: en
  yaml_path: translation/nt/romans/009/030.yaml
  text: What then shall we say? That the Gentiles, who were not pursuing righteousness, attained righteousness—but the righteousness that is from faith.
  footnotes:
  - marker: a
    text: Or 'justice' for 'righteousness' (δικαιοσύνη) here and in the repeated uses of the term; Paul can use the word with a range that includes both moral/legal rightness and covenantal justice.
    reason: lexical_alternative
  - marker: b
    text: Or 'the nations' for 'the Gentiles.'
    reason: lexical_alternative
  - marker: c
    text: Or 'the righteousness that comes by faith' or, less likely here, 'the righteousness that comes from faithfulness.'
    reason: alternative_reading
translation:
  language: ko
  text: 그러면 우리가 무엇이라고 말하겠습니까? 의를 따라가지 않던 이방인들은 의를 얻었으니, 곧 믿음에서 난 의입니다.
  philosophy: optimal-equivalence
