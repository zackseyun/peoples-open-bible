base_translation:
  language: en
  yaml_path: translation/ot/1_chronicles/014/011.yaml
  text: So they went up to Baal-perazim[a], and David struck them down there. And David said, “God has broken through my enemies by my hand, like a bursting flood of waters.” Therefore they called the name of that place Baal-perazim.
  footnotes:
