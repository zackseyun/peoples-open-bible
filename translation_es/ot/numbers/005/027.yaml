translation:
  language: es
  text: Cuando la haga beber el agua, entonces, si ella se ha contaminado y ha actuado infielmente contra su marido, el agua que trae la maldición entrará en ella[a] para amargura, y su vientre se hinchará y su muslo caerá[b], y la mujer se convertirá en maldición entre su pueblo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el agua que trae la maldición entrará en ella como agua amarga». La frase hebrea «para amargura» es difícil y puede describir el efecto del agua o su cualidad.'
    reason: lexical_alternative
  - marker: b
    text: Lit. «su muslo caerá». La expresión probablemente funciona como eufemismo de una aflicción corporal grave, quizá relacionada con los órganos reproductivos, pero el sentido exacto es incierto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִשְׁקָהּ אֶת־הַמַּיִם
  english_pob_choice: When he makes her drink the water
  chosen_spanish: Cuando le haga beber el agua
  alternatives_spanish:
  - Y le dará a beber el agua
  - Cuando la haga beber el agua
  lexicon: HALOT
  rationale: 'El hifil de שׁקה expresa causación: ‘hacer beber / dar a beber’. En español, ‘le haga beber’ conserva esa fuerza causativa de manera natural y digna.'
- source_word: וְהָיְתָה אִם
  english_pob_choice: then if
  chosen_spanish: entonces, si
  alternatives_spanish:
  - y si
  - y entonces, si
  lexicon: HALOT
  rationale: La construcción introduce una condición dentro de una secuencia ritual; ‘entonces, si’ refleja bien el valor temporal-condicional sin sonar mecánico.
- source_word: נִטְמְאָה
  english_pob_choice: she has defiled herself
  chosen_spanish: se ha contaminado
  alternatives_spanish:
  - se ha hecho impura
  - se ha defiliado
  lexicon: HALOT
  rationale: Aquí el contexto del rito de los celos mezcla impureza ritual y posible infidelidad. ‘Se ha contaminado’ conserva el campo semántico de טמא sin forzar una sola lectura teológica; en nota se preserva la tensión interpretativa.
- source_word: וַתִּמְעֹל מַעַל בְּאִישָׁהּ
  english_pob_choice: has acted unfaithfully against her husband
  chosen_spanish: ha sido infiel contra su marido
  alternatives_spanish:
  - ha obrado con infidelidad contra su marido
  - ha cometido traición contra su marido
  - ha sido desleal con su marido
  lexicon: HALOT
  rationale: El cognado מעל intensifica la idea de quiebre de fidelidad. ‘Ha sido infiel’ comunica bien la traición relacional y es más idiomático que ‘ha cometido trasgresión’ en español.
- source_word: וּבָאוּ בָהּ
  english_pob_choice: will enter into her
  chosen_spanish: entrará en ella
  alternatives_spanish:
  - vendrá sobre ella
  - entrará dentro de ella
  lexicon: HALOT
  rationale: El verbo בוא con la preposición ב indica entrada en su cuerpo. ‘Entrará en ella’ es la opción más directa y clara en español.
- source_word: הַמַּיִם הַמְאָֽרֲרִים
  english_pob_choice: the water that brings the curse
  chosen_spanish: el agua que trae la maldición
  alternatives_spanish:
  - el agua que acarrea la maldición
  - el agua maldicienta
  - el agua de maldición
  lexicon: HALOT
  rationale: El participio de ארר describe el agua como portadora de maldición. ‘Trae la maldición’ es transparente y mantiene la relación causal.
- source_word: לְמָרִים
  english_pob_choice: for bitterness
  chosen_spanish: para amargura
  alternatives_spanish:
  - en amargura
  - como amargura
  - para lo amargo
  lexicon: HALOT
  rationale: La frase hebrea es difícil. ‘Para amargura’ mantiene la ambigüedad de efecto/cualidad, sin resolver indebidamente si describe el estado del agua o su resultado.
- source_word: וְצָבְתָה בִטְנָהּ
  english_pob_choice: her belly will swell
  chosen_spanish: su vientre se hinchará
  alternatives_spanish:
  - su barriga se hinchará
  - su abdomen se hinchará
  lexicon: HALOT
  rationale: בטן es literalmente ‘vientre/abdomen’. ‘Vientre’ suena más digno y bíblico en español que ‘barriga’, sin perder claridad.
- source_word: וְנָפְלָה יְרֵכָהּ
  english_pob_choice: her thigh will fall away
  chosen_spanish: su muslo caerá
  alternatives_spanish:
  - su muslo se desplomará
  - su cadera caerá
  - su muslo se consumirá
  lexicon: HALOT
  rationale: La expresión es notoriamente difícil y puede ser eufemística. ‘Muslo’ conserva la literalidad del hebreo; ‘caerá’ sigue de cerca el verbo sin cerrar de más el sentido fisiológico.
- source_word: וְהָיְתָה הָאִשָּׁה לְאָלָה
  english_pob_choice: the woman will become a curse
  chosen_spanish: la mujer será maldición
  alternatives_spanish:
  - la mujer será para maldición
  - la mujer se volverá maldición
  - la mujer será una maldición
  lexicon: HALOT
  rationale: אָלָה denota maldición, a menudo en contexto de juramento. ‘Será maldición’ reproduce la construcción de forma concisa y mantiene el carácter ejemplarizante del juicio.
- source_word: בְּקֶרֶב עַמָּהּ
  english_pob_choice: among her people
  chosen_spanish: en medio de su pueblo
  alternatives_spanish:
  - entre su pueblo
  - entre la gente de su pueblo
  - en medio de la comunidad
  lexicon: HALOT
  rationale: ‘En medio de su pueblo’ conserva la dimensión pública y comunitaria de la deshonra/juicio mejor que una formulación más abstracta.
theological_decisions:
- issue: Tensión entre contaminación ritual y posible infidelidad moral en נִטְמְאָה
  english_pob_reading: she has defiled herself
  chosen_spanish_reading: se ha contaminado
  alternative_spanish_readings:
  - se ha hecho impura
  - se ha profanado
  rationale: El hebreo permite una lectura ritual y moral a la vez. ‘Se ha contaminado’ evita resolver la tensión en una sola dirección, manteniendo la ambigüedad documentada por el texto y la auditoría inglesa.
  doctrine_reference: 'Translation philosophy §3: Preservar la tensión teológica en vez de resolverla.'
- issue: Efecto corporal de la prueba y su ambigüedad anatómica
  english_pob_reading: her thigh will fall away
  chosen_spanish_reading: su muslo caerá
  alternative_spanish_readings:
  - su muslo se consumirá
  - su región pélvica caerá
  - sus órganos reproductivos serán afectados
  rationale: El hebreo usa lenguaje concreto pero enigmático. La versión principal mantiene la literalidad y no impone una explicación médica o ginecológica específica; las alternativas interpretativas quedan implícitas en la nota del texto.
  doctrine_reference: 'Translation philosophy §3: Mantener la tensión interpretativa sobre el resultado físico.'
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el último ajuste del POB inglés: conserva la secuencia condicional, incluye la preposición de entrada (‘en ella’) y mantiene la metáfora corporal literal (‘muslo caerá’) sin resolverla interpretativamente. También respeta la variante auditada de ‘for bitterness’ con una solución española que deja abierta la ambigüedad.'
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ solo cuando aparece explícitamente el Nombre divino; aquí no aplica.
  - Se prefirió ‘maldición’ frente a ‘anatema’ o ‘imprecación’ por fidelidad semántica y claridad pública.
  - ‘Contaminado’ conserva el campo de טמא sin sustituirlo por un tecnicismo ritual demasiado estrecho.
  - Se mantiene registro bíblico sobrio y comprensible para lectura eclesial amplia.
