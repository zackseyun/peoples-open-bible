translation:
  language: es
  text: Los aradores araron sobre mi espalda; hicieron largos[a] sus surcos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «alargaron sus surcos». El hebreo mantiene la metáfora de arar para expresar opresión severa o heridas profundas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל
  english_pob_choice: 'on'
  chosen_spanish: sobre
  alternatives_spanish:
  - en
  - encima de
  lexicon: HALOT
  rationale: La preposición expresa que la acción recae sobre el cuerpo del salmista. «Sobre» conserva la imagen espacial sin sonar forzado en español.
- source_word: גַּבִּי
  english_pob_choice: my back
  chosen_spanish: mi espalda
  alternatives_spanish:
  - mi dorso
  - mi espalda/cuerpo
  lexicon: HALOT
  rationale: «גב» designa la espalda; «espalda» es la equivalencia más natural y clara en español, y funciona bien dentro de la metáfora agrícola de sufrimiento corporal.
- source_word: חָרְשׁוּ
  english_pob_choice: have plowed
  chosen_spanish: araron
  alternatives_spanish:
  - han arado
  - han labrado
  lexicon: HALOT
  rationale: El verbo significa literalmente «arar». En español, el pretérito simple suena más natural en esta línea poética que un perfecto compuesto, sin perder el valor de acción consumada.
- source_word: חֹרְשִׁים
  english_pob_choice: plowmen
  chosen_spanish: araron
  alternatives_spanish:
  - los aradores
  - quienes aran
  lexicon: HALOT
  rationale: Aquí el participio funciona como sujeto agente del mismo campo verbal; en español la repetición de la raíz se puede resolver de forma natural con el verbo correspondiente, sin introducir una palabra ajena al hebreo. La metáfora agrícola sigue siendo transparente en el conjunto del verso.
- source_word: הֶאֱרִיכוּ
  english_pob_choice: they have made ... long
  chosen_spanish: hicieron largos
  alternatives_spanish:
  - alargaron
  - extendieron
  lexicon: HALOT
  rationale: El causativo de «ser largo» se traduce con un verbo que exprese «volver largo». «Hicieron largos» conserva la idea de prolongación y permite mantener el paralelismo poético con el primer hemistiquio.
- source_word: לְמַעֲנוֹתָם
  english_pob_choice: their furrows
  chosen_spanish: sus surcos
  alternatives_spanish:
  - sus acanaladuras
  - sus zanjas
  lexicon: HALOT
  rationale: «Surcos» es el término agrícola natural en español y preserva el cuadro literal de la imagen. Aunque el inglés opta por «furrows», el equivalente directo y claro en español es «surcos».
theological_decisions:
- issue: Metáfora del sufrimiento mantenida en forma agrícola
  english_pob_reading: Retain the literal agricultural metaphor rather than interpret it in the main text as whipping or oppression.
  chosen_spanish_reading: Mantener el lenguaje agrícola literal («Araron...; hicieron largos sus surcos») en vez de explicitar en el texto principal una paráfrasis como castigo o maltrato.
  alternative_spanish_readings:
  - Golpearon mi espalda como un campo
  - Me causaron heridas largas en la espalda
  rationale: El hebreo conserva una imagen vívida y deliberadamente cruda. La traducción española debe preservar esa tensión sin convertirla en explicación interpretativa, dejando que la metáfora comunique la severidad de la aflicción.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: La revisión inglesa reciente ajustó el tiempo verbal para armonizar los perfectos hebreos; en español se optó por un pretérito simple poético («araron / hicieron») que mantiene la acción completa y la paralelización del verso sin introducir redundancia artificial. Se conservó la metáfora literal, siguiendo el audit trail de POB.
  spanish_consistency_notes:
  - Se mantuvo «espalda» como equivalente directo de גַּבִּי, en línea con el valor corporal específico del hebreo.
  - Se eligió «surcos» para לְמַעֲנוֹתָם por ser el término agrícola estándar y transparente en español.
  - No se usó una glosa interpretativa principal sobre opresión o azotes, para respetar la imagen fuente.
