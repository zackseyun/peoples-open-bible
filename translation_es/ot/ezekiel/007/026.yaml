translation:
  language: es
  text: Desastre sobre desastre vendrá[a], y rumor sobre rumor surgirá. Buscarán una visión de un profeta, pero la instrucción perecerá del sacerdote[b], y desaparecerá el consejo de los ancianos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «reporte sobre reporte». El término hebreo puede significar «rumor» o «reporte»; aquí probablemente se refiere a noticias alarmantes que se multiplican entre el pueblo.
    reason: lexical_alternative
  - marker: b
    text: O «la ley perecerá del sacerdote». El hebreo torah puede significar «instrucción», «enseñanza» o «ley»; en este contexto probablemente se refiere a la instrucción sacerdotal.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֹוָה
  english_pob_choice: disaster
  chosen_spanish: desastre
  alternatives_spanish:
  - calamidad
  - ruina
  - desgracia
  lexicon: HALOT
  rationale: El sustantivo expresa una calamidad destructiva en un contexto de juicio. «Desastre» es natural en español contemporáneo y conserva la fuerza acumulativa de הֹוָה עַל הֹוָה sin sonar forzado.
- source_word: עַל
  english_pob_choice: upon
  chosen_spanish: sobre
  alternatives_spanish:
  - sobre
  - encima de
  - tras
  lexicon: HALOT
  rationale: En la construcción idiomática, el sentido es de acumulación de una calamidad sobre otra. «Sobre» mantiene la imagen de apilamiento mejor que una traducción más plana.
- source_word: תָּב֔וֹא
  english_pob_choice: will come
  chosen_spanish: vendrá
  alternatives_spanish:
  - llegará
  - acaecerá
  - sobrevendrá
  lexicon: HALOT
  rationale: El verbo básico בוא se expresa de modo directo con «vendrá». En español suena natural con el sujeto abstracto «desastre».
- source_word: שְׁמֻעָה / שְׁמוּעָה
  english_pob_choice: rumor
  chosen_spanish: rumor
  alternatives_spanish:
  - noticia
  - reporte
  - noticia alarmante
  lexicon: HALOT
  rationale: En este contexto de crisis social, «rumor» comunica mejor la circulación de noticias inquietantes. Se conserva la repetición para reflejar el paralelismo hebreo.
- source_word: אֶל
  english_pob_choice: upon
  chosen_spanish: sobre
  alternatives_spanish:
  - a
  - tras
  lexicon: HALOT
  rationale: 'Aunque literalmente puede ser «a», aquí funciona idiomáticamente como acumulación: rumor sobre rumor. La misma solución que en el primer colon preserva el paralelismo.'
- source_word: תִּֽהְיֶ֑ה
  english_pob_choice: will arise
  chosen_spanish: surgirá
  alternatives_spanish:
  - será
  - habrá
  - aparecerá
  lexicon: HALOT
  rationale: Con «rumor» como sujeto, «surgirá» expresa bien la aparición y propagación de nuevas noticias sin perder la idea básica de היה.
- source_word: וּבִקְשׁוּ
  english_pob_choice: they will seek
  chosen_spanish: buscarán
  alternatives_spanish:
  - pedirán
  - inquirirán
  - buscarán respuesta
  lexicon: HALOT
  rationale: בקשׁ se traduce de forma directa con «buscar». Aquí mantiene la urgencia de querer obtener orientación profética.
- source_word: חָזוֹן
  english_pob_choice: a vision
  chosen_spanish: una visión
  alternatives_spanish:
  - un oráculo
  - una revelación
  lexicon: HALOT
  rationale: חזון en lenguaje profético alude a una visión reveladora. «Una visión» es la opción más directa y transparente en español.
- source_word: מִנָּבִיא
  english_pob_choice: from a prophet
  chosen_spanish: de un profeta
  alternatives_spanish:
  - del profeta
  lexicon: HALOT
  rationale: El hebreo no lleva artículo definido, por lo que el indefinido «de un profeta» respeta mejor la referencia general a cualquier profeta disponible.
- source_word: תּוֹרָה
  english_pob_choice: instruction
  chosen_spanish: la instrucción
  alternatives_spanish:
  - la ley
  - la enseñanza
  lexicon: HALOT
  rationale: Aquí תּוֹרָה se refiere a instrucción sacerdotal, no a la Ley como corpus abstracto. «La instrucción» mantiene ese matiz y evita estrechar innecesariamente el sentido.
- source_word: תֹּאבַד
  english_pob_choice: will perish
  chosen_spanish: perecerá
  alternatives_spanish:
  - se perderá
  - desaparecerá
  - se extinguirá
  lexicon: HALOT
  rationale: אבד transmite pérdida total o desaparición. «Perecerá» conserva la gravedad del texto y la fuerza del paralelo con las demás carencias.
- source_word: מִכֹּהֵן
  english_pob_choice: from the priest
  chosen_spanish: del sacerdote
  alternatives_spanish:
  - de un sacerdote
  - del sacerdote
  lexicon: HALOT
  rationale: Aunque el hebreo es singular sin artículo, en español «del sacerdote» suena más natural y puede expresar la función institucional. Se mantiene la idea de que falta la instrucción sacerdotal como fuente normal de guía.
- source_word: עֵצָה
  english_pob_choice: counsel
  chosen_spanish: el consejo
  alternatives_spanish:
  - la consejería
  - la orientación
  - el consejo
  lexicon: HALOT
  rationale: El término apunta a sabiduría deliberativa de liderazgo. «El consejo» conserva la dignidad del término y encaja con los ancianos como guía comunitaria.
- source_word: מִזְּקֵנִים
  english_pob_choice: from the elders
  chosen_spanish: de los ancianos
  alternatives_spanish:
  - de ancianos
  - de los mayores
  lexicon: HALOT
  rationale: En contexto, זְקֵנִים son líderes comunitarios, no simplemente personas de edad avanzada. «Los ancianos» es el equivalente institucional más claro en español.
theological_decisions:
- issue: Renderización de תּוֹרָה en contexto sacerdotal
  english_pob_reading: instruction
  chosen_spanish_reading: la instrucción
  alternative_spanish_readings:
  - la ley
  - la enseñanza
  rationale: 'El verso describe el colapso de las fuentes normales de orientación: profeta, sacerdote y ancianos. En ese triángulo, תּוֹרָה del sacerdote apunta mejor a instrucción/enseñanza sacerdotal que a la Ley mosaica como corpus abstracto. «La instrucción» evita una restricción semántica no exigida por el contexto.'
  doctrine_reference: Translation philosophy §1, §5
- issue: Alcance institucional de los sustantivos singulares y plurales en la tríada de liderazgo
  english_pob_reading: from a prophet ... from the priest ... from the elders
  chosen_spanish_reading: de un profeta ... del sacerdote ... de los ancianos
  alternative_spanish_readings:
  - del profeta ... del sacerdote ... de los ancianos
  - de un profeta ... de un sacerdote ... de los ancianos
  rationale: El hebreo usa singulares para profeta y sacerdote, y plural para ancianos. La traducción en español conserva ese contraste sin convertirlo en referencia a individuos concretos; comunica el agotamiento de los canales normales de guía.
  doctrine_reference: Translation philosophy §6
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios y el resumen de concordancia indicó alta coincidencia; no se requieren ajustes adicionales respecto del análisis base.
  spanish_consistency_notes:
  - Se mantiene la repetición paralela «desastre sobre desastre» / «rumor sobre rumor» para reflejar el hebreo.
  - Se eligió «del sacerdote» como equivalente idiomático de מִכֹּהֵן, manteniendo la fuerza institucional del oficio.
  - «Los ancianos» se usa en sentido de liderazgo comunitario, no de mera edad.
  - La puntuación reproduce dos miembros principales unidos por coma y coordenadas adversativas en el segundo miembro.
