translation:
  language: es
  text: Y ahora, Yahvé nuestro Dios, sálvanos, te rogamos, de su mano[a], para que todos los reinos de la tierra[b] sepan que solo tú eres Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «de su mano», un modismo para ser librados de su poder.'
    reason: cultural_note
  - marker: b
    text: O «todos los reinos de la tierra»; aquí «tierra» refleja mejor el alcance internacional del contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: And now
  chosen_spanish: Y ahora
  alternatives_spanish:
  - Ahora
  lexicon: HALOT
  rationale: Conserva la transición discursiva y temporal que introduce la petición culminante, con una coordinación natural en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se mantiene el nombre divino del Tetragrámaton como forma principal en español, conforme al criterio del proyecto.
- source_word: אֱלֹהֵינוּ
  english_pob_choice: our God
  chosen_spanish: nuestro Dios
  alternatives_spanish:
  - Dios nuestro
  lexicon: HALOT
  rationale: Apelación de pacto directa y transparente; 'nuestro Dios' es la forma más natural y fiel en español.
- source_word: הוֹשִׁיעֵנוּ נָא
  english_pob_choice: please save us
  chosen_spanish: sálvanos, te rogamos
  alternatives_spanish:
  - sálvanos, por favor
  - líbranos, te rogamos
  lexicon: HALOT
  rationale: El imperativo de salvar/deliver expresado con urgencia y súplica. 'Te rogamos' transmite היטב נָא sin sonar mecánico; 'sálvanos' conserva la fuerza del verbo.
- source_word: מִיָּדוֹ
  english_pob_choice: from his hand
  chosen_spanish: de su mano
  alternatives_spanish:
  - de su poder
  - fuera de su mano
  lexicon: HALOT
  rationale: Se preserva la metáfora hebrea de 'mano' como poder/control, tal como la auditoría inglesa la retuvo.
- source_word: וְיֵדְעוּ
  english_pob_choice: so that ... may know
  chosen_spanish: para que ... sepan
  alternatives_spanish:
  - y ... conocerán
  - de modo que ... sepan
  lexicon: HALOT
  rationale: La forma verbal expresa propósito/resultados en contexto; 'para que' es la equivalencia natural en español.
- source_word: כָּל מַמְלְכוֹת הָאָרֶץ
  english_pob_choice: all the kingdoms of the earth
  chosen_spanish: todos los reinos de la tierra
  alternatives_spanish:
  - todos los reinos del país
  - todos los reinos de la tierra
  lexicon: HALOT
  rationale: En este contexto internacional, 'tierra' corresponde al alcance global de הָאָרֶץ, como en la decisión inglesa.
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - porque
  - pues
  lexicon: HALOT
  rationale: Introduce el contenido de lo que deben saber; 'que' funciona de manera idiomática en español.
- source_word: אַתָּה יְהוָה אֱלֹהִים
  english_pob_choice: you are God
  chosen_spanish: solo tú eres Dios
  alternatives_spanish:
  - tú eres Dios, y solo tú
  - tú, Yahvé, eres Dios
  lexicon: HALOT
  rationale: La cláusula identifica exclusivamente a Yahvé como Dios. En español, la forma más clara y fiel para la exclusividad de לְבַדֶּךָ es 'solo tú eres Dios'.
- source_word: לְבַדֶּךָ
  english_pob_choice: alone
  chosen_spanish: solo tú
  alternatives_spanish:
  - tú solo
  - únicamente tú
  lexicon: HALOT
  rationale: Mantiene la exclusividad confesional sin añadir matices ajenos; 'solo tú' es natural y enfático en español.
theological_decisions:
- issue: Nombre divino en la invocación
  english_pob_reading: Yahweh our God
  chosen_spanish_reading: Yahvé nuestro Dios
  alternative_spanish_readings:
  - Yahweh nuestro Dios
  - el Señor nuestro Dios
  rationale: Se preserva el Tetragrámaton como nombre propio, evitando la sustitución por un título. Esto sigue la política del proyecto y el audit trail inglés.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de la petición 'from his hand'
  english_pob_reading: from his hand, an idiom for deliverance from his power
  chosen_spanish_reading: de su mano
  alternative_spanish_readings:
  - de su poder
  - de su control
  rationale: Se conserva la imagen bíblica de 'mano' como metáfora de poder o dominio, sin explicar en el texto principal lo que el hebreo deja figurado.
  doctrine_reference: 'POB translation philosophy: preserve metaphor where intelligible'
- issue: Alcance de 'all the kingdoms of the earth'
  english_pob_reading: earth best fits the international scope
  chosen_spanish_reading: todos los reinos de la tierra
  alternative_spanish_readings:
  - todos los reinos del mundo
  - todos los reinos del país
  rationale: El contexto es de alcance internacional; 'tierra' conserva el valor global de הָאָרֶץ sin reducirlo a una sola región.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: preserve theological tension rather than resolve it'
- issue: Exclusividad de la confesión final
  english_pob_reading: you alone are God
  chosen_spanish_reading: solo tú eres Dios
  alternative_spanish_readings:
  - tú solo eres Dios
  - solo tú eres el Dios
  rationale: El hebreo afirma la unicidad exclusiva de Yahvé. 'Solo tú eres Dios' comunica esa confesión con claridad y sin ampliar el texto.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: Tomé en cuenta la revisión inglesa que prefirió una formulación más natural sin 'O' y que ajustó la cláusula final a 'you alone are God'. En español, eso se reflejó en 'Yahvé nuestro Dios' sin vocativo adicional y en 'solo tú eres Dios', manteniendo la exclusividad del hebreo sin sobrecargar el título.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de manera consistente para יהוה.
  - Se preserva la metáfora de 'mano' como idiomática y se aclara en nota.
  - '''Tierra'' se emplea con alcance global, en paralelo al audit trail inglés.'
  - '''Solo tú eres Dios'' conserva la fuerza monoteísta sin introducir títulos no necesarios.'
