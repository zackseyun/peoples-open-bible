translation:
  language: es
  text: Porque si tú no fortaleces[b], ¿quién soportará la disciplina[a] en la pobreza?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «instrucción» para «disciplina» (παιδείαν).
    reason: lexical_alternative
  - marker: b
    text: El griego deja sin especificar el objeto de «fortalecer».
    reason: cultural_note
lexical_decisions:
- source_word: ἐνισχύσῃς
  english_pob_choice: strengthen
  chosen_spanish: fortaleces
  alternatives_spanish:
  - fortaleces
  - das fuerzas
  - refuerzas
  lexicon: BDAG
  rationale: ἐνισχύσῃς expresa el acto de impartir fuerza o vigor. «Fortaleces» conserva ese sentido de manera natural y directa en español, sin añadir un objeto implícito que el griego no especifica.
- source_word: ὑφέξεται
  english_pob_choice: will endure
  chosen_spanish: soportará
  alternatives_spanish:
  - aguantará
  - resistirá
  - sostendrá
  lexicon: LSJ
  rationale: El verbo futuro transmite la idea de resistir o mantenerse bajo una carga. «Soportará» comunica bien ese matiz de aguante en una pregunta retórica, con registro sobrio.
- source_word: παιδείαν
  english_pob_choice: discipline
  chosen_spanish: disciplina
  alternatives_spanish:
  - instrucción
  - formación
  - corrección
  lexicon: BDAG
  rationale: En este contexto de aflicción y resistencia, παιδείαν no es mera enseñanza, sino disciplina formativa o correctiva. «Disciplina» preserva esa tensión sin diluirla; la nota ofrece la alternativa lexical «instrucción».
- source_word: ἐν πενίᾳ
  english_pob_choice: in poverty
  chosen_spanish: en la pobreza
  alternatives_spanish:
  - en pobreza
  - en necesidad
  - en la escasez
  lexicon: LSJ
  rationale: πενία indica pobreza o carencia material. «En la pobreza» refleja de modo directo el sentido socioeconómico del griego y encaja con el tono del verso.
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del audit trail: se optó por un verbo breve y formal equivalente a «strengthen» y se mantuvo la pregunta retórica con «disciplina en la pobreza». No se añadió un objeto explícito a «fortaleces», porque el griego no lo expresa.'
  spanish_consistency_notes:
  - Se mantuvo el tratamiento de segunda persona singular para reflejar el griego ἐὰν μὴ σὺ.
  - Se preservó el contraste semántico entre disciplina e pobreza sin suavizar la dureza del enunciado.
  - Se evitó «SEÑOR» o equivalentes porque este versículo no contiene el nombre divino ni una cita de κύριος.
