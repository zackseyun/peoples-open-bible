translation:
  language: es
  text: Si eres puro y recto, ciertamente aun ahora él se despertará en tu favor[a] y restaurará[b] tu morada de justicia[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se despertará por ti» o «se pondrá en acción en tu favor».
    reason: lexical_alternative
  - marker: b
    text: O «hará entero» o «retribuirá»; el verbo hebreo puede implicar restauración o recomposición.
    reason: lexical_alternative
  - marker: c
    text: Literalmente, «la morada de tu justicia».
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Si acaso
  lexicon: HALOT
  rationale: La partícula condicional se expresa de forma directa con «si», manteniendo la estructura condicional del hebreo sin añadir matices innecesarios.
- source_word: זַךְ
  english_pob_choice: pure
  chosen_spanish: puro
  alternatives_spanish:
  - limpio
  - inocente
  lexicon: HALOT
  rationale: «Puro» comunica limpieza moral y se ajusta bien al par con «recto», sin cargar el término con una absolución forense más fuerte de la que exige el hebreo.
- source_word: יָשָׁר
  english_pob_choice: upright
  chosen_spanish: recto
  alternatives_spanish:
  - derecho
  - justo
  lexicon: HALOT
  rationale: «Recto» es el equivalente natural de valor moral y ético, y conserva la imagen de conducta alineada con lo correcto.
- source_word: כִּי עַתָּה
  english_pob_choice: surely even now
  chosen_spanish: ciertamente aun ahora
  alternatives_spanish:
  - pues ahora
  - seguramente incluso ahora
  lexicon: HALOT
  rationale: Aquí כִּי funciona con fuerza enfática; «ciertamente» reproduce esa afirmación insistente, y «aun ahora» conserva la urgencia temporal de עַתָּה.
- source_word: יָעִיר עָלֶיךָ
  english_pob_choice: he will rouse himself for you
  chosen_spanish: él se despertará en tu favor
  alternatives_spanish:
  - él se levantará por ti
  - él se avivará a tu favor
  lexicon: HALOT
  rationale: El hiphil de עור puede significar despertar, espolear o estimular. En español, «se despertará en tu favor» mantiene la metáfora de despertar y la orientación benefactora implícita por el contexto, sin explicitar indebidamente el sujeto como «Dios».
- source_word: וְשִׁלַּם
  english_pob_choice: and restore
  chosen_spanish: y restaurará
  alternatives_spanish:
  - y hará entero
  - y pagará
  - y repondrá
  lexicon: HALOT
  rationale: Con objeto posesivo y la imagen de la morada, «restaurará» expresa mejor la idea de rehacer o restablecer la situación del hogar que una traducción de «pagar» o «retribuir».
- source_word: נְוַת
  english_pob_choice: dwelling
  chosen_spanish: morada
  alternatives_spanish:
  - habitación
  - vivienda
  - hogar
  lexicon: HALOT
  rationale: «Morada» es natural en español bíblico y puede abarcar tanto la casa como el asentamiento o condición doméstica, acorde con el hebreo.
- source_word: צִדְקֶךָ
  english_pob_choice: your righteous dwelling
  chosen_spanish: de justicia
  alternatives_spanish:
  - justa
  - de rectitud
  - de tu justicia
  lexicon: HALOT
  rationale: La construcción hebrea literalmente sugiere «la morada de tu justicia». En español, para evitar una frase demasiado rígida o ambigua, se conserva el núcleo semántico con «morada de justicia», manteniendo la tensión entre una cualidad moral y la posesión del destinatario.
theological_decisions:
- issue: Sujetos implícitos en el segundo hemistiquio
  english_pob_reading: The subject is left as 'he,' referring contextually to God without inserting 'God' into the text.
  chosen_spanish_reading: Se mantiene el pronombre «él» sin añadir «Dios», dejando que el contexto identifique al sujeto.
  alternative_spanish_readings:
  - Dios se despertará en tu favor
  - el Señor se despertará en tu favor
  rationale: El hebreo no nombra explícitamente al sujeto del verbo; por fidelidad auditada, la traducción conserva la referencia implícita y evita introducir un nombre que el texto no pone.
  doctrine_reference: Translation philosophy §1, §3
- issue: Fuerza retributiva de la afirmación de Bildad
  english_pob_reading: The verse is translated as Bildad's conditional claim without endorsing its theology.
  chosen_spanish_reading: Se presenta como la afirmación condicional de Bildad, sin corregirla ni avalarla en la redacción.
  alternative_spanish_readings:
  - Parafrasear suavizando la afirmación para distanciarla del hablante
  - Introducir una nota interpretativa doctrinal
  rationale: La traducción debe reflejar con transparencia la voz del hablante. El texto español conserva la fuerza de la declaración sin añadir una evaluación editorial que el hebreo no explicita.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'Coincide con el último pase revisado: no se registraron cambios adicionales y la traducción sigue el estado de alta concordancia del paquete auditado.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como término estándar del proyecto solo cuando el texto lo requiriera explícitamente; aquí el sujeto queda implícito, por lo que no se insertó un nombre divino.
  - Se eligieron «puro», «recto» y «morada» por su registro bíblico claro en español sin caer en arcaísmo excesivo.
  - Se preservó la ambigüedad del objeto constructo al optar por «morada de justicia», reflejando la tensión del hebreo entre posesión y cualidad moral.
