translation:
  language: es
  text: 'Así dice Yahvé: Todavía en este lugar, del cual ustedes dicen: «Está desolado[a], sin hombre ni bestia», en las ciudades de Judá y en las calles[c] de Jerusalén que están desoladas, sin hombre ni habitante ni bestia[b], se oirá otra vez'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También podría traducirse «devastado» o «hecho un desierto» para חָרֵב; el hebreo usa aquí un término de devastación y luego un término afín de desolación en el mismo versículo.
    reason: lexical_alternative
  - marker: b
    text: «Sin hombre» usa אָדָם en sentido representativo; también podría expresarse «sin humanidad» o «sin gente».
    reason: lexical_alternative
  - marker: c
    text: O «plazas» para «calles» (חֻצוֹת), en referencia a los espacios públicos o vías abiertas de la ciudad.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
  rationale: 'Se sigue la política del proyecto para el Tetragrámaton: traducir el nombre divino como «Yahvé», preservando el nombre personal de Dios en vez de una sustitución titulatoria.'
- source_word: כֹּה אָמַר
  english_pob_choice: Thus says
  chosen_spanish: Así dice
  alternatives_spanish:
  - Así ha dicho
  - Esto dice
  lexicon: HALOT
  rationale: Fórmula profética estándar. «Así dice» conserva el tono solemne y es natural en español bíblico actual.
- source_word: עוֹד
  english_pob_choice: Yet
  chosen_spanish: Todavía
  alternatives_spanish:
  - Aún
  - Otra vez
  lexicon: HALOT
  rationale: En este contexto introduce expectativa de reversión/restauración. «Todavía» reproduce la idea de continuidad hacia el futuro sin sobrecargar el inicio del versículo.
- source_word: יִשָּׁמַע
  english_pob_choice: there shall again be heard
  chosen_spanish: se oirá otra vez
  alternatives_spanish:
  - será oído de nuevo
  - habrá de oírse otra vez
  lexicon: HALOT
  rationale: El nifal impersonal se expresa de forma natural en español con «se oirá». «Otra vez» recoge el matiz de restauración que la POB inglesa distribuye entre עוֹד y el adverbio de repetición.
- source_word: בַּמָּקוֹם הַזֶּה
  english_pob_choice: in this place
  chosen_spanish: en este lugar
  alternatives_spanish:
  - en este sitio
  - en este lugar mismo
  lexicon: HALOT
  rationale: «Lugar» es amplio y adecuado al contexto, que luego se concreta en ciudades de Judá y calles de Jerusalén.
- source_word: חָרֵב
  english_pob_choice: desolate
  chosen_spanish: desolado
  alternatives_spanish:
  - desierto
  - devastado
  lexicon: HALOT
  rationale: La POB inglesa equilibró este término con el adjetivo relacionado posterior. «Desolado» mantiene el campo semántico de devastación sin hacer más fuerte la imagen que el hebreo.
- source_word: מֵאֵין אָדָם
  english_pob_choice: without man
  chosen_spanish: sin hombre
  alternatives_spanish:
  - sin gente
  - sin ser humano
  lexicon: HALOT
  rationale: Se conserva el valor representativo de אָדָם en una fórmula de desolación. «Sin hombre» mantiene la cadencia bíblica y la fuerza lexical que la POB documenta.
- source_word: בְּהֵמָה
  english_pob_choice: beast
  chosen_spanish: bestia
  alternatives_spanish:
  - animal
  - ganado
  lexicon: HALOT
  rationale: En fórmulas de desolación, «bestia» preserva el registro solemne y el alcance amplio del término, en vez de restringirlo a ganado.
- source_word: בְּעָרֵי יְהוּדָה
  english_pob_choice: in the cities of Judah
  chosen_spanish: en las ciudades de Judá
  alternatives_spanish:
  - entre las ciudades de Judá
  lexicon: HALOT
  rationale: Traducción locativa directa y natural.
- source_word: וּבְחֻצוֹת יְרוּשָׁלִַם
  english_pob_choice: in the streets of Jerusalem
  chosen_spanish: en las calles de Jerusalén
  alternatives_spanish:
  - en las plazas de Jerusalén
  - en las vías públicas de Jerusalén
  lexicon: HALOT
  rationale: «Calles» es la opción más natural en español moderno; la POB inglesa también registró la alternativa de «squares» por el valor posible de חֻצוֹת, pero aquí el contexto urbano favorece «calles».
- source_word: הַנְשַׁמּוֹת
  english_pob_choice: that are desolate
  chosen_spanish: desoladas
  alternatives_spanish:
  - que están desoladas
  - devastadas
  lexicon: HALOT
  rationale: Se mantiene el vínculo léxico con חָרֵב sin traducir ambos términos con la misma forma exacta. El participio se vierte como adjetivo concordante con ciudades y calles.
- source_word: יוֹשֵׁב
  english_pob_choice: inhabitant
  chosen_spanish: habitante
  alternatives_spanish:
  - morador
  - residente
  lexicon: HALOT
  rationale: La POB distingue este término de אָדָם. «Habitante» conserva esa distinción y funciona bien en la serie de negaciones.
theological_decisions:
- issue: Uso del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se aplica la convención confesional y editorial del proyecto para el nombre propio de Dios, manteniendo transparencia textual y evitando la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: La versión inglesa revisada sustituyó «a waste» por «desolate» para acercarse más a חָרֵב/הַנְשַׁמּוֹת y mantener coherencia formal. La redacción española adopta esa alineación léxica con «desolado/desoladas» y conserva la estructura que prepara la continuación del versículo.
  spanish_consistency_notes:
  - Se conserva «Yahvé» para יְהוָה conforme a la política terminológica del proyecto.
  - Se mantiene la distinción entre חָרֵב («desolado») y הַנְשַׁמּוֹת («desoladas») para no borrar la tensión léxica documentada.
  - «Hombre» traduce אָדָם en la fórmula fija de desolación como equivalente representativo, mientras «habitante» traduce יוֹשֵׁב para mantener contraste semántico.
  - «Calles» se usa como opción principal para חֻצוֹת; la alternativa «plazas» queda documentada por su posible valor urbano público.
