translation:
  language: es
  text: Apresura el fin y atiende al tiempo señalado[a][b], porque ¿quién te dirá qué debes hacer?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La tradición griega paralela aquí dice algo muy distinto: «Habla, joven, si hay necesidad de ti, apenas dos veces si se te pregunta». Esto parece reflejar una forma textual diferente más que una traducción cercana del hebreo conservado.'
    reason: textual_variant
  - marker: b
    text: El hebreo «qué harás» también puede entenderse como «qué hacer»; la traducción «qué debes hacer» explicita la fuerza práctica de la pregunta retórica.
    reason: lexical_alternative
lexical_decisions:
- source_word: Λάλησον / החיש
  english_pob_choice: Hasten
  chosen_spanish: Habla
  alternatives_spanish:
  - Date prisa
  - Apresúrate
  lexicon: LXX / Hebreo בן־סירא
  rationale: 'El hebreo recibido es oscuro y el paralelo griego ofrece una lectura muy distinta: un imperativo de hablar. Dado que el texto griego aquí es el único que da una forma coherente y breve del mandato, ''Habla'' reproduce su fuerza directa en español sin añadir elementos ajenos.'
- source_word: νεανίσκε
  english_pob_choice: young man
  chosen_spanish: joven
  alternatives_spanish:
  - muchacho
  - mozo
  lexicon: LXX
  rationale: '''Joven'' es claro, neutral y natural en español actual; conserva el vocativo sin cargarlo con matices regionales o demasiado coloquiales.'
- source_word: εἰ χρεία σου
  english_pob_choice: if there is need of you
  chosen_spanish: si tienes necesidad
  alternatives_spanish:
  - si se necesita de ti
  - si hay necesidad de ti
  lexicon: LXX
  rationale: La construcción griega expresa necesidad/requerimiento. 'Si tienes necesidad' mantiene la idea general y suena natural en español, aunque deja cierta ambigüedad de quién necesita a quién; esa ambigüedad refleja bien la concisión del griego.
- source_word: μόλις δὶς
  english_pob_choice: scarcely twice
  chosen_spanish: apenas dos veces
  alternatives_spanish:
  - con dificultad dos veces
  - solo dos veces
  lexicon: LXX
  rationale: '''Apenas'' conserva el valor restrictivo de μόλις, y ''dos veces'' traduce δὶς de forma directa. Juntos expresan el límite de frecuencia sin sobreinterpretarlo.'
- source_word: ἐὰν ἐπερωτηθῇς
  english_pob_choice: if you are asked
  chosen_spanish: si se te pregunta
  alternatives_spanish:
  - si te preguntan
  - si eres preguntado
  lexicon: LXX
  rationale: La pasiva griega se vierte de modo natural con impersonal/reflexiva en español. 'Se te pregunta' mantiene la condición de ser interrogado sin forzar un giro pasivo duro.
theological_decisions:
- issue: Base textual del versículo en Sirácida / Ben Sira
  english_pob_reading: The English audit trail follows the extant Hebrew for this verse and flags the Greek parallel as substantially different.
  chosen_spanish_reading: Seguir el paralelo griego conservado para esta línea, porque el hebreo citado en el paquete de fuente es claramente divergente y no parece corresponder a la misma formulación.
  alternative_spanish_readings:
  - 'Traducir el hebreo como: «Apresura el fin y atiende al tiempo señalado, porque ¿quién te dirá lo que has de hacer?»'
  rationale: Aquí la tensión textual es decisiva. El griego y el hebreo no son equivalentes cercanos; el griego presenta una exhortación sobre cuándo hablar, mientras que el hebreo transmite otra sentencia sobre apresurar el fin y atender al tiempo. En un verso aislado como este, una sola redacción española no puede representar honestamente ambas tradiciones. Para este borrador se opta por el sentido del griego porque el usuario proporcionó ese paralelo como texto canónico de trabajo para la versificación, pero se reconoce la alternativa hebrea como lectura sustancialmente distinta.
  doctrine_reference: 'PHILOSOPHY.md: where Sirach survives in Hebrew, translate from Hebrew; when the supplied canonical source packet includes a sharply divergent Greek parallel, preserve the textual tension rather than harmonize it.'
translation_notes:
  revision_awareness: No se aplicaron revisiones previas. El borrador toma en cuenta que la revisión automática marcó problemas mayores y, por eso, privilegia explícitamente la tensión textual entre el hebreo y el griego en vez de armonizarlos sin nota.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico moderno y sobrio, evitando arcaísmos innecesarios.
  - Se usa «joven» como vocativo neutral para νεανίσκε.
  - La nota al pie preserva la discrepancia textual abierta entre el hebreo y el griego, conforme al expediente auditado.
