translation:
  language: es
  text: El mar[a] ha subido sobre Babilonia; ella está cubierta por la multitud[b] de sus olas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La imagen de «el mar» es metafórica para la fuerza abrumadora que avanza contra Babilonia; se conserva la metáfora en vez de reemplazarla por una interpretación.
    reason: cultural_note
  - marker: b
    text: O «con el tumulto de sus olas». El sustantivo hebreo puede expresar tanto multitud abundante como tumulto; aquí se opta por «multitud» para conservar la imagen de masa abrumadora.
    reason: lexical_alternative
lexical_decisions:
- source_word: עָלָה
  english_pob_choice: has come up
  chosen_spanish: ha subido
  alternatives_spanish:
  - ha venido
  - ha ascendido
  - ha llegado
  lexicon: HALOT
  rationale: El qal perfecto de עלה expresa movimiento ascendente o de llegada. En español, «ha subido» conserva ese movimiento y funciona bien con el siguiente complemento hostil, sin introducir una interpretación ajena al texto.
- source_word: עַל
  english_pob_choice: against
  chosen_spanish: contra
  alternatives_spanish:
  - sobre
  - encima de
  lexicon: HALOT
  rationale: Aunque el valor básico es locativo, aquí el contexto es de asalto o invasión. «Contra» transmite mejor la fuerza hostil que «sobre» o «encima de».
- source_word: בָּבֶל
  english_pob_choice: Babylon
  chosen_spanish: Babilonia
  alternatives_spanish:
  - Babel
  lexicon: uso bíblico estándar
  rationale: «Babilonia» es la forma española clara y reconocible del topónimo, adecuada para lectura pública.
- source_word: הַיָּם
  english_pob_choice: The sea
  chosen_spanish: el mar
  alternatives_spanish:
  - el océano
  lexicon: HALOT
  rationale: Se conserva la imagen literal/metafórica del sustantivo definido. «Mar» mantiene la metáfora de la fuerza invasora sin explicarla en el cuerpo del texto.
- source_word: בַּהֲמוֹן
  english_pob_choice: with the multitude
  chosen_spanish: de la multitud
  alternatives_spanish:
  - del tumulto
  - de la multitud de
  - con el tumulto
  lexicon: HALOT
  rationale: הֲמוֹן puede denotar abundancia, muchedumbre o tumulto. Dado que la revisión inglesa optó por «multitude» por precisión aquí, «multitud» preserva mejor ese sentido que una solución puramente sonora.
- source_word: גַּלָּיו
  english_pob_choice: its waves
  chosen_spanish: de sus olas
  alternatives_spanish:
  - de sus ondas
  lexicon: HALOT
  rationale: El sufijo posesivo se refiere al «mar». En español, «olas» es la correspondencia natural y mantiene la imagen acuática sin añadir matices.
- source_word: נִכְסָתָה
  english_pob_choice: she is covered
  chosen_spanish: está cubierta
  alternatives_spanish:
  - ha sido cubierta
  - fue cubierta
  lexicon: HALOT
  rationale: El nifal perfecto de כסה expresa que Babilonia queda cubierta. «Está cubierta» conserva la imagen de estado resultante y la personificación de la ciudad de modo idiomático en español.
theological_decisions:
- issue: La imagen del mar como metáfora de fuerza invasora contra Babilonia
  english_pob_reading: The sea has come up against Babylon; she is covered with the multitude of its waves.
  chosen_spanish_reading: El mar ha subido contra Babilonia; ella está cubierta de la multitud de sus olas.
  alternative_spanish_readings:
  - El mar ha subido sobre Babilonia; ella está cubierta por la multitud de sus olas.
  - Una inundación ha subido contra Babilonia; ella está cubierta por la multitud de sus olas.
  rationale: Se conserva la metáfora del mar en lugar de sustituirla por su interpretación, porque el texto presenta la imagen poética de un embate abrumador. Esto respeta la tensión entre sentido literal e imagen profética.
  doctrine_reference: Jeremías 51:42; imagen profética de juicio
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión inglesa más reciente, que prefirió «multitude of its waves» frente a una lectura más sonora. Por eso la nota léxica para הֲמוֹן favorece «multitud» y no «tumulto» como opción principal, aunque se conserva como alternativa. También se mantuvo la metáfora del mar en el texto principal, tal como el POB inglés la preserva.
  spanish_consistency_notes:
  - Se mantiene «Babilonia» como topónimo bíblico estándar.
  - Se usa «mar» sin explicitar la fuerza invasora en el cuerpo del texto, para respetar la imagen profética.
  - «Multitud» reproduce el matiz cuantitativo de הֲמוֹן; «tumulto» queda como alternativa válida.
  - La personificación de Babilonia con «ella» se conserva conforme al hebreo y al POB inglés.
