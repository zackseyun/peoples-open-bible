translation:
  language: es
  text: Así que David dejó los suministros[a] al cuidado del encargado de los suministros, y corrió a la línea de batalla[b]. Llegó y preguntó a sus hermanos por su bienestar[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'el equipaje' / 'el equipo' para 'los suministros' (hebreo כֵּלִים), término amplio para artículos o enseres. Aquí probablemente se refiere a las provisiones que David llevaba.
    reason: lexical_alternative
  - marker: b
    text: O 'las filas' para 'la línea de batalla' (hebreo מַעֲרָכָה), en referencia a la formación ordenada de las tropas.
    reason: lexical_alternative
  - marker: c
    text: Literalmente, 'preguntó por la paz de sus hermanos'; este modismo hebreo significa que inquirió por su bienestar o condición.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּטֹּשׁ
  english_pob_choice: left
  chosen_spanish: dejó
  alternatives_spanish:
  - abandonó
  - dejó caer
  - depositó
  lexicon: HALOT
  rationale: En este contexto narrativo, el verbo indica que David puso temporalmente aparte lo que llevaba; 'dejó' comunica bien esa acción sin sugerir abandono definitivo.
- source_word: הַכֵּלִים
  english_pob_choice: the supplies
  chosen_spanish: los suministros
  alternatives_spanish:
  - el equipaje
  - los utensilios
  - el equipo
  lexicon: HALOT
  rationale: כֵּלִים es un término amplio para objetos, equipo o provisiones. Aquí el contexto inmediato sugiere lo que David traía consigo al campamento, por lo que 'los suministros' es claro y fiel.
- source_word: עַל יַד שֹׁמֵר הַכֵּלִים
  english_pob_choice: in the care of the keeper of the supplies
  chosen_spanish: en manos del guardián de los suministros
  alternatives_spanish:
  - bajo la custodia del guardián de los suministros
  - a cargo del guardián de los suministros
  - en la custodia del guardián del equipaje
  lexicon: HALOT
  rationale: La expresión literal 'en la mano de' transmite encargo o custodia. 'En manos de' es una forma natural en español que conserva la idea de confiar algo a la responsabilidad de otro.
- source_word: שׁוֹמֵר
  english_pob_choice: keeper
  chosen_spanish: guardián
  alternatives_spanish:
  - encargado
  - custodio
  - vigilante
  lexicon: HALOT
  rationale: El participio denota quien cuida o vigila. 'Guardián' mantiene la idea de custodia sin introducir necesariamente matiz militar.
- source_word: הַמַּעֲרָכָה
  english_pob_choice: the battle line
  chosen_spanish: la línea de batalla
  alternatives_spanish:
  - las filas
  - la formación de combate
  - el despliegue de batalla
  lexicon: HALOT
  rationale: El término se refiere a la disposición ordenada de tropas. 'Línea de batalla' es una equivalencia clara y moderna que conserva el sentido militar del pasaje.
- source_word: וַיִּשְׁאַ֥ל לְ/אֶחָ֖י/ו לְ/שָׁלֽוֹם
  english_pob_choice: he asked his brothers about their welfare
  chosen_spanish: preguntó a sus hermanos por su bienestar
  alternatives_spanish:
  - preguntó a sus hermanos cómo estaban
  - les preguntó por su paz
  - inquirió acerca de su bienestar
  lexicon: HALOT
  rationale: La frase hebrea es un modismo para preguntar por la condición o bienestar de alguien. 'Por su bienestar' preserva la formalidad y el sentido idiomático.
- source_word: אֶחָיו
  english_pob_choice: his brothers
  chosen_spanish: sus hermanos
  alternatives_spanish:
  - sus hermanos y parientes
  - sus hermanos de sangre
  lexicon: HALOT
  rationale: El contexto identifica a los hermanos literales de David presentes en el ejército de Saúl; no es necesario ampliar el referente.
theological_decisions:
- issue: Traducción del modismo לְשָׁלוֹם
  english_pob_reading: Literally 'asked his brothers for peace'; this Hebrew idiom means he inquired about their welfare or well-being.
  chosen_spanish_reading: preguntó a sus hermanos por su bienestar
  alternative_spanish_readings:
  - les deseó paz
  - preguntó por la paz de ellos
  - les preguntó cómo estaban
  rationale: No se trata de una petición de paz ni solo de un saludo. El hebreo usa un modismo de cortesía para indagar por la condición de los hermanos, y 'bienestar' preserva ese valor sin perder naturalidad.
  doctrine_reference: Uso idiomático del hebreo bíblico; no hay decisión doctrinal específica.
translation_notes:
  revision_awareness: 'Se siguió el pasaje hebreo de 1 Samuel 17:22 y el control de revisiones inglés: se conservó la secuencia narrativa (''llegó y preguntó''), se reflejó el valor custodial de עַל יַד con ''en manos de'', y se mantuvo el modismo לְשָׁלוֹם como una pregunta por el bienestar, no como un deseo de paz.'
  spanish_consistency_notes:
  - Se usó 'Yahvé' según la norma del proyecto, aunque este versículo no contiene el Tetragrámaton.
  - Se prefirió 'bienestar' en lugar de una formulación más coloquial para mantener el registro bíblico y el matiz idiomático.
  - '''Suministros'' se eligió por claridad contextual; queda abierta la alternativa más literal ''equipaje/equipo'' en nota.'
  - La secuencia verbal mantiene el ritmo narrativo hebreo sin sobretraducir con subordinadas innecesarias.
