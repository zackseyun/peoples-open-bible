base_translation:
  language: en
  yaml_path: translation/ot/psalms/081/008.yaml
  text: In distress you called[a], and I rescued you; I answered you in the hiding place of thunder; I tested you at the waters of Meribah[b]. Selah
  footnotes:
  - marker: a
    text: Or 'in the secret place of thunder' or 'from the hiding place of thunder.' The Hebrew image likely evokes God's concealed presence in the storm.
    reason: lexical_alternative
  - marker: b
    text: Meribah recalls the wilderness episode where God tested Israel and Israel quarreled over water (Exod 17:1–7; Num 20:1–13).
    reason: cross_reference
