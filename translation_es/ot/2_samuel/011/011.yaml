translation:
  language: es
  text: 'Urías dijo a David: «El arca, e Israel y Judá, están en refugios temporales[a], y mi señor Joab y los siervos de mi señor están acampados en el campo abierto. ¿He de ir yo a mi casa[b] para comer y beber y acostarme con mi esposa? Tan cierto como que tú vives, y como que vive tu alma[c], no haré tal cosa».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo 'sucot', es decir, 'cabañas', 'booths' o refugios temporales; se refiere a alojamientos provisionales usados en campaña.
    reason: lexical_alternative
  - marker: b
    text: 'O: «¿Voy a ir a mi casa...?» El hebreo usa una pregunta retórica para expresar la negativa de Urías.'
    reason: alternative_reading
  - marker: c
    text: 'Fórmula hebrea de juramento: «Tan cierto como que tú vives, y como que vive tu alma; si hago tal cosa». Aquí el ''si'' expresa una negación fuerte implícita: «no haré tal cosa».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאָרוֹן
  english_pob_choice: the ark
  chosen_spanish: el arca
  alternatives_spanish:
  - el Arca de Dios
  - el arca del pacto
  lexicon: HALOT
  rationale: El hebreo dice simplemente ‘el arca’ con artículo. En español, ‘el arca’ conserva la forma breve del texto sin añadir un título ampliado que el versículo no explicita.
- source_word: יֹשְׁבִים בַּסֻּכּוֹת
  english_pob_choice: are staying in shelters
  chosen_spanish: están en refugios temporales
  alternatives_spanish:
  - están en tiendas
  - están habitando en cabañas
  lexicon: HALOT
  rationale: סֻכּוֹת denota alojamientos provisionales. ‘Refugios temporales’ comunica en español la idea de ocupación precaria y militar sin sonar mecánico ni forzar ‘booths’ como ‘cabañas’ en sentido festivo.
- source_word: וַאדֹנִי יוֹאָב
  english_pob_choice: my lord Joab
  chosen_spanish: mi señor Joab
  alternatives_spanish:
  - mi amo Joab
  - mi maestro Joab
  lexicon: HALOT
  rationale: Aquí אדני es un título humano de respeto. ‘Mi señor’ mantiene el registro social y evita mezclarlo con el uso divino del título.
- source_word: וְעַבְדֵי אֲדֹנִי
  english_pob_choice: the servants of my lord
  chosen_spanish: los siervos de mi señor
  alternatives_spanish:
  - los esclavos de mi señor
  - los servidores de mi señor
  lexicon: HALOT
  rationale: עבדים puede ser ‘siervos’ o ‘esclavos’. En este contexto militar y de lealtad personal, ‘siervos’ comunica adecuadamente la relación de dependencia sin introducir una dureza social que el español actual podría exagerar.
- source_word: עַל פְּנֵי הַשָּׂדֶה
  english_pob_choice: in the open field
  chosen_spanish: en campo abierto
  alternatives_spanish:
  - sobre la faz del campo
  - en el campo
  lexicon: HALOT
  rationale: La expresión idiomática señala exposición al aire libre. ‘Campo abierto’ reproduce bien el contraste con la casa y preserva la imagen de vulnerabilidad militar.
- source_word: חֹנִים
  english_pob_choice: are camped
  chosen_spanish: están acampados
  alternatives_spanish:
  - están acampando
  - están acuartelados
  lexicon: HALOT
  rationale: El participio describe una acción en curso de tipo militar. ‘Están acampados’ es natural en español y mantiene la idea de posición provisional en campaña.
- source_word: וַאֲנִי אָבוֹא אֶל בֵּיתִי
  english_pob_choice: Shall I then go to my house
  chosen_spanish: ¿Y yo he de ir a mi casa
  alternatives_spanish:
  - ¿Y yo voy a ir a mi casa?
  - ¿Debo ir yo a mi casa?
  lexicon: HALOT
  rationale: La forma hebrea es una pregunta retórica que expresa protesta. ‘He de ir’ comunica el matiz de obligación/indignación mejor que una simple futura o una formulación demasiado libre.
- source_word: לֶאֱכֹל וְלִשְׁתּוֹת וְלִשְׁכַּב עִם אִשְׁתִּי
  english_pob_choice: to eat and to drink and to lie with my wife
  chosen_spanish: para comer y beber y acostarme con mi esposa
  alternatives_spanish:
  - para comer y beber y dormir con mi esposa
  - para comer, beber y acostarme con mi esposa
  lexicon: HALOT
  rationale: Se conserva la cadena verbal con un infinitivo final natural en español. ‘Acostarme con mi esposa’ mantiene el eufemismo sexual de forma digna y suficientemente literal.
- source_word: חַיֶּךָ וְחֵי נַפְשֶׁךָ
  english_pob_choice: As surely as you live, and as your soul lives
  chosen_spanish: ¡Vive Yahvé, y vive tu alma!
  alternatives_spanish:
  - ¡Por tu vida, y por la vida de tu alma!
  - ¡Tan ciertamente como vives, y como vive tu alma!
  lexicon: HALOT
  rationale: El hebreo forma una fórmula de juramento. El español conserva la solemnidad con ‘vive tu alma’; se explicita el nombre divino en el juramento porque la construcción introduce una invocación directa y el proyecto usa Yahvé para יהוה. La exclamación idiomática es más natural que una calca rígida.
- source_word: אִם אֶעֱשֶׂה אֶת הַדָּבָר הַזֶּה
  english_pob_choice: I will not do this thing
  chosen_spanish: no haré tal cosa
  alternatives_spanish:
  - si hago tal cosa
  - no haré esta cosa
  lexicon: HALOT
  rationale: Tras la fórmula de juramento, אִם funciona como negación elíptica. En español, ‘no haré tal cosa’ expresa con claridad la negación implícita y evita una traducción engañosa del condicional aislado.
theological_decisions:
- issue: Rendering the divine name in the oath formula
  english_pob_reading: The English POB uses 'As surely as you live...' and footnotes the oath force; it does not expand the divine-name issue in this verse, but the source invokes יהוה explicitly in the oath context.
  chosen_spanish_reading: «¡Vive Yahvé…!»
  alternative_spanish_readings:
  - «¡Vive el SEÑOR…!»
  - «¡Por vida de Yahvé…!»
  rationale: Dado el texto hebreo con יהוה, el nombre divino se mantiene como ‘Yahvé’ según la terminología del proyecto. La exclamación conserva el valor juramentario sin ocultar el nombre sagrado.
  doctrine_reference: Ex 3:15; uso del nombre divino en traducción bíblica
- issue: Negative force of the final אם-clause after an oath
  english_pob_reading: '''I will not do this thing'' reflects the strong negative implied by the oath construction; the English footnote notes the literal if-clause.'
  chosen_spanish_reading: «no haré tal cosa»
  alternative_spanish_readings:
  - «si hago tal cosa»
  - «jamás haré esto»
  rationale: En hebreo, la construcción elíptica tras juramento comunica una negación enfática. El español debe hacer explícita esa negación para no perder el sentido retórico y pragmático del enunciado.
  doctrine_reference: Pragmática de juramentos en el AT; Nm 5:21, 1 S 3:17 como paralelos formales
translation_notes:
  revision_awareness: El audit trail inglés revisó la primera formulación interrogativa hacia una más claramente retórica ('Shall I then go to my house'). La versión española sigue ese ajuste con «¿Y yo he de ir a mi casa…?», manteniendo el matiz de protesta implícita y la conexión con las circunstancias militares previas. También se conservó la negación elíptica del cierre mediante una formulación explícita en español, como exige el hebreo y el propio comentario inglés.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ para יהוה conforme al estándar del proyecto.
  - Se mantiene ‘el arca’ sin ampliar a ‘arca de la alianza’ porque el hebreo no lo dice explícitamente.
  - ‘Siervos’ se usa para עבדים en este contexto relacional y militar; no se fuerza ‘esclavos’.
  - El tono es sobrio y digno, sin arcaísmos innecesarios, pero preserva la fuerza retórica del juramento y la negativa final.
