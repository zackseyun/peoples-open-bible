    rationale: La auditoría inglesa documenta «complete splendor» y la nota alternativa menciona «full ornament of beauty». En español, «gloria» además se repite inmediatamente en «con gloria y fuerza», debilitando la distinción entre כליל תפארת y בכבוד.
  - severity: high
    issue: «calzoncillos» para מכנסים
    rationale: Aunque apunta a ropa interior, en español neutro actual suena coloquial e impropio del tono digno requerido. «Prendas interiores» comunica el sentido sacerdotal sin rebajar el registro.
  - severity: medium
    issue: «un manto» para ומעיל
    rationale: מעיל es la prenda exterior tipo túnica/robe en contexto sacerdotal. «Manto» puede sugerir capa o prenda suelta y se aleja de la decisión inglesa «robe».
  - severity: low
    issue: Nota b no refleja la alternativa conservada por la auditoría inglesa
    rationale: La nota inglesa en b trata la alternativa para כליל תפארת, no para מעיל. En español conviene conservar esa misma incertidumbre léxica documentada.
