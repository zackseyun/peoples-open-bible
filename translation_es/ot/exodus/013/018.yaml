  text: וַ/יַּסֵּ֨ב אֱלֹהִ֧ים אֶת הָ/עָ֛ם דֶּ֥רֶךְ הַ/מִּדְבָּ֖ר יַם ס֑וּף וַ/חֲמֻשִׁ֛ים עָל֥וּ בְנֵי יִשְׂרָאֵ֖ל מֵ/אֶ֥רֶץ מִצְרָֽיִם׀־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/exodus/013/018.yaml
  text: So God led the people around by the way of the wilderness to the Sea of Reeds[b][a], and the sons of Israel went up from the land of Egypt armed.
  footnotes:
  - marker: a
    text: Or 'the Red Sea.' The Hebrew name is literally 'Sea of Reeds.'
    reason: alternative_reading
  - marker: b
    text: The Hebrew term rendered 'equipped for battle' is uncertain; it may also mean 'armed,' 'in battle array,' or more generally 'in ordered ranks.'
    reason: lexical_alternative
