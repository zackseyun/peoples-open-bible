translation:
  language: es
  text: Y acontecerá en aquel día, declara el Señor Yahvé, que haré que el sol se ponga al mediodía, y oscureceré la tierra[a] en pleno día.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el país»; el hebreo אֶרֶץ puede referirse tanto a la tierra en general como a una tierra o país concreto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: And it shall happen
  chosen_spanish: Y acontecerá
  alternatives_spanish:
  - Y sucederá
  - Y será
  lexicon: HALOT
  rationale: La fórmula profética pide un futuro solemne y natural en español. «Acontecerá» conserva el tono formal sin caer en un giro demasiado arcaico.
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: in that day
  chosen_spanish: en aquel día
  alternatives_spanish:
  - en ese día
  - en tal día
  lexicon: HALOT
  rationale: «En aquel día» mantiene el valor idiomático profético y el distanciamiento temporal del hebreo.
- source_word: נְאֻם אֲדֹנָי יְהוִה
  english_pob_choice: declares the Lord GOD
  chosen_spanish: declara el Señor Yahvé
  alternatives_spanish:
  - declara el Señor Dios
  - oráculo del Señor Yahvé
  lexicon: HALOT
  rationale: Se conserva la fórmula de declaración profética con «declara». Para אֲדֹנָי יְהוִה, la guía del proyecto pide «Yahvé» para יְהוִה; «Señor Yahvé» evita la redundancia de «Señor SEÑOR» y preserva el nombre divino sin máscara.
- source_word: וְהֵבֵאתִי הַשֶּׁמֶשׁ
  english_pob_choice: that I will make the sun go down
  chosen_spanish: que haré que el sol se ponga
  alternatives_spanish:
  - que haré bajar al sol
  - que haré caer el sol
  lexicon: HALOT
  rationale: El hiphil expresa causación. «Haré que el sol se ponga» es idiomático y mantiene la agencia divina sin forzar un literalismo extraño en español.
- source_word: בַּצָּהֳרָיִם
  english_pob_choice: at noon
  chosen_spanish: al mediodía
  alternatives_spanish:
  - a mediodía
  - al medio día
  lexicon: HALOT
  rationale: «Al mediodía» es la equivalencia más clara y corriente para el término horario.
- source_word: וְהַחֲשַׁכְתִּי
  english_pob_choice: and I will darken
  chosen_spanish: oscureceré
  alternatives_spanish:
  - haré oscuro
  - haré que se oscurezca
  lexicon: HALOT
  rationale: El verbo causativo se expresa con naturalidad mediante «oscureceré», que conserva la acción divina de producir oscuridad.
- source_word: לָאָרֶץ
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra/ el país
  - el mundo
  lexicon: HALOT
  rationale: Siguiendo la nota POB, אֶרֶץ puede ser «tierra» o «país». Aquí se mantiene la amplitud semántica con «la tierra», que en español puede abarcar la superficie terrenal sin decidir innecesariamente por «país».
- source_word: בְּיוֹם אוֹר
  english_pob_choice: in broad daylight
  chosen_spanish: en pleno día
  alternatives_spanish:
  - a plena luz del día
  - en luz diurna
  lexicon: HALOT
  rationale: La locución busca intensificar el contraste con la oscuridad repentina. «En pleno día» comunica bien ese choque visual y mantiene la fuerza del original.
theological_decisions:
- issue: Representación del nombre divino en אֲדֹנָי יְהוִה
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Dios
  - el Señor Yahweh
  rationale: La directriz del proyecto establece que יְהוִה se traduzca como «Yahvé» y no como «SEÑOR». En el compuesto con אֲדֹנָי, «Señor Yahvé» preserva ambos elementos sin perder la referencia al nombre pactal.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: El contexto auditado muestra acuerdo alto y sin revisiones aplicadas; esta redacción sigue de cerca la decisión inglesa POB, pero ajusta el nombre divino al estándar español del proyecto («Yahvé») y conserva la alternativa lexical de אֶרֶץ en nota.
  spanish_consistency_notes:
  - Se mantuvo el estilo profético sobrio y solemne con futuro simple y fórmula declarativa.
  - «Yahvé» se usa como forma principal para יְהוִה, conforme a la terminología española del proyecto.
  - «La tierra» conserva la amplitud de אֶרֶץ y se anota la alternativa «la tierra/el país» donde el hebreo lo permite.
  - La imagen de oscuridad en pleno día se volvió a un español natural sin perder el impacto retórico.
