revisions:
- from: 'Todavía dijiste[a]: «Soy inocente; sin duda se apartó de mí su ira». ¡Mira!, entro en juicio contigo[b] porque dices: «No he pecado».'
  to: 'Pero tú dijiste: «Soy inocente; sin duda su ira se ha apartado de mí». He aquí, entro en juicio contigo[a] porque dices: «No he pecado».'
  rationale: Se reemplaza «Todavía dijiste» por «Pero tú dijiste» para reflejar el contraste discursivo del hebreo sin insinuar temporalidad. Se cambia «¡Mira!» por «He aquí» para mantener un registro más solemne y alineado con «Behold». Se elimina la nota incorrecta sobre «dijiste/Soy inocente» y se conserva únicamente la nota forense documentada en el audit trail inglés, anclada correctamente en «entro en juicio contigo[a]».
