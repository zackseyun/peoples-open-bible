revisions:
- from: 'Entonces me dijo[a]: «No temas, Daniel, porque desde el primer día en que diste tu corazón para entender y para humillarte[b] delante de tu Dios, tus palabras fueron oídas, y yo he venido a causa de tus palabras».'
  to: 'Entonces me dijo: «No temas, Daniel, porque desde el primer día en que pusiste tu corazón para entender y para humillarte[a] delante de tu Dios, tus palabras fueron oídas, y yo he venido a causa de tus palabras».'
  rationale: Se corrige el giro no idiomático «diste tu corazón» por «pusiste tu corazón», que preserva mejor el hebreo y suena natural en español eclesial. También se elimina la nota duplicada y se reubica el único marcador en «humillarte», que es donde corresponde el contraste léxico con «afligirte». No se requiere adjudicación adicional porque se trata de una reparación menor y clara.
  reviewer_model: gpt-5.4
