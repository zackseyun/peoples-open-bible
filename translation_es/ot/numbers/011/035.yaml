translation:
  language: es
  text: Desde Quibrot-hataavá[a] el pueblo partió hacia Jazerot, y se quedaron en Jazerot.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Quibrot-hataavá significa ‘sepulturas del deseo’ o ‘sepulturas de la codicia’.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִ/קִּבְר֧וֹת הַֽתַּאֲוָ֛ה
  english_pob_choice: From Kibroth-hattaavah
  chosen_spanish: Desde Quibrot-hataavá[b]
  alternatives_spanish:
  - Desde las tumbas del deseo
  - Desde las tumbas de la codicia
  - Desde Quibrot de deseo
  lexicon: HALOT
  rationale: El hebreo funciona aquí como nombre propio de lugar, aunque su composición transparente conserva el sentido común de ‘sepulturas/tumbas’ + ‘deseo/craving’. Por eso se translitera en el texto principal y se preserva el significado literal en nota.
- source_word: נָסְע֥וּ
  english_pob_choice: set out
  chosen_spanish: partió
  alternatives_spanish:
  - salió
  - se puso en camino
  - viajó
  lexicon: HALOT
  rationale: En contexto de itinerario, נסע indica levantar el campamento e iniciar la marcha. ‘Partió’ comunica ese movimiento de salida de manera natural y sobria en español.
- source_word: הָ/עָ֖ם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - la nación
  lexicon: HALOT
  rationale: Aquí עם se refiere al conjunto de Israel como comunidad. ‘El pueblo’ es la opción más natural y fiel al registro narrativo.
- source_word: חֲצֵר֑וֹת
  english_pob_choice: Hazeroth
  chosen_spanish: Jazerot
  alternatives_spanish:
  - Hazerot
  - Haserot
  lexicon: HALOT
  rationale: Es un topónimo; se adapta a la transliteración española más habitual con J para representar la consonante gutural inicial en este nombre.
- source_word: וַ/יִּהְי֖וּ בַּ/חֲצֵרֽוֹת
  english_pob_choice: and they stayed at Hazeroth
  chosen_spanish: y estuvo en Jazerot
  alternatives_spanish:
  - y permanecieron en Jazerot
  - y se quedaron en Jazerot
  - y estuvieron en Jazerot
  lexicon: HALOT
  rationale: El hebreo literal dice ‘y estuvieron/eran en Jazerot’, y en contexto de recorrido puede implicar detenerse o permanecer allí. Mantengo una forma sobria y breve que deja visible el valor básico del verbo sin forzar un matiz más específico que el hebreo no exige por sí mismo.
translation_notes:
  revision_awareness: 'La versión inglesa auditada pasó de ‘remained’ a ‘stayed’ para sonar más natural, sin cambiar el sentido. En español, la construcción final mantiene esa misma neutralidad narrativa: no añade un matiz interpretativo más fuerte que el hebreo ni pierde la idea de permanencia en el lugar.'
  spanish_consistency_notes:
  - Se mantiene el nombre propio transliterado en vez de traducirlo dentro del texto principal, siguiendo la práctica POB para topónimos con sentido transparente.
  - Se usa ‘el pueblo’ para עם, evitando ‘nación’ por ser menos natural en este contexto narrativo.
  - ‘Estuvo en Jazerot’ conserva la literalidad básica de היה + ב sin sobreespecificar si el énfasis es ‘quedarse’ o simplemente ‘estar’.
