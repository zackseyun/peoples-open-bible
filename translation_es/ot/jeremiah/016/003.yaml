translation:
  language: es
  text: 'Porque así dice Yahvé: acerca de los hijos y de las hijas nacidos en este lugar[a], y acerca de sus madres que los dan a luz[c][b], y acerca de sus padres que los engendran en esta tierra:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «los hijos y las hijas», nombrando explícitamente ambos sexos en vez de usar un término genérico para hijos o niños.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «que los alumbran».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «que los engendran».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la explicación profética con una conexión causal/narrativa natural en español. 'Porque' conserva el enlace discursivo de כִּי sin volver la frase pesada.
- source_word: כֹה אָמַר יְהוָה
  english_pob_choice: thus says Yahweh
  chosen_spanish: así dice Yahvé
  alternatives_spanish:
  - así dice el Señor
  - esto dice Yahvé
  lexicon: HALOT
  rationale: Mantiene la fórmula profética formal y el nombre divino directo 'Yahvé', conforme al criterio del proyecto. 'Así dice' reproduce bien el tono oracular de כֹה אָמַר.
- source_word: עַל
  english_pob_choice: concerning
  chosen_spanish: acerca de
  alternatives_spanish:
  - sobre
  - en cuanto a
  lexicon: HALOT
  rationale: Aquí עַל introduce el tema del anuncio; 'acerca de' suena natural en español y conserva el valor tópico repetido del hebreo.
- source_word: הַבָּנִים וְהַבָּנוֹת
  english_pob_choice: the sons and the daughters
  chosen_spanish: los hijos y las hijas
  alternatives_spanish:
  - los niños y las niñas
  - los hijos e hijas
  lexicon: HALOT
  rationale: El hebreo nombra explícitamente masculino y femenino. 'Los hijos y las hijas' conserva esa duplicación sin colapsarla en un genérico.
- source_word: הַיִּלּוֹדִים
  english_pob_choice: born
  chosen_spanish: nacidos
  alternatives_spanish:
  - que nacen
  - naciendo
  lexicon: HALOT
  rationale: El participio pasivo funciona como adjetivo de 'hijos e hijas'. 'Nacidos' es conciso y fiel en español.
- source_word: בַּמָּקוֹם הַזֶּה
  english_pob_choice: in this place
  chosen_spanish: en este lugar
  alternatives_spanish:
  - aquí
  - en este sitio
  lexicon: HALOT
  rationale: Traslada de forma directa la referencia locativa, con dignidad profética y sin coloquialismo excesivo.
- source_word: אִמֹּתָם
  english_pob_choice: their mothers
  chosen_spanish: sus madres
  alternatives_spanish:
  - las madres de ellos
  - sus mamás
  lexicon: HALOT
  rationale: Equivalencia posesiva directa y natural en español.
- source_word: הַיֹּלְדוֹת אוֹתָם
  english_pob_choice: who bear them
  chosen_spanish: que los dan a luz
  alternatives_spanish:
  - que los alumbran
  - que los paren
  lexicon: HALOT
  rationale: El participio de ילד aplicado a las madres expresa el acto de dar a luz. 'Dan a luz' es claro, digno y evita una literalidad áspera.
- source_word: אֲבוֹתָם
  english_pob_choice: their fathers
  chosen_spanish: sus padres
  alternatives_spanish:
  - sus progenitores
  - sus padres varones
  lexicon: HALOT
  rationale: El plural masculino incluye a los padres biológicos; 'sus padres' es el paralelo natural de 'sus madres'.
- source_word: הַמּוֹלִדִים אוֹתָם
  english_pob_choice: who father them
  chosen_spanish: que los engendran
  alternatives_spanish:
  - que los engendran como padres
  - que los hacen nacer
  lexicon: HALOT
  rationale: El hiphil de ילד con el sujeto 'padres' apunta a engendrar/fundar la paternidad biológica. 'Engendran' conserva esa relación sin forzar el español con un verbo poco idiomático.
- source_word: בָּאָרֶץ הַזֹּאת
  english_pob_choice: in this land
  chosen_spanish: en esta tierra
  alternatives_spanish:
  - en esta tierra misma
  - en el país
  lexicon: HALOT
  rationale: '''ארץ'' puede ser ''tierra'' o ''país/land''. Aquí ''esta tierra'' preserva el ámbito concreto del juicio profético y suena natural en español bíblico contemporáneo.'
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton de forma explícita. La norma del proyecto pide 'Yahvé' en el texto principal, evitando el reemplazo por 'el SEÑOR' y manteniendo visible el nombre pactal de Dios.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Valor de הַיִּלּוֹדִים y הַיֹּלְדוֹת / הַמּוֹלִדִים
  english_pob_reading: born / who bear them / who father them
  chosen_spanish_reading: nacidos / que los dan a luz / que los engendran
  alternative_spanish_readings:
  - que nacen / que los alumbran / que los hacen nacer
  - nacidos / que los paren / que los engendran
  rationale: El hebreo distingue entre el estado de los hijos/hijas y las funciones reproductivas de madres y padres. 'Dar a luz' y 'engendrar' conservan esa diferenciación sin introducir términos más duros o más técnicos que el texto no exige.
  doctrine_reference: Jeremiah 16:3 lexical parallelism and participial force
translation_notes:
  revision_awareness: 'Se revisó el verso a la luz del audit trail inglés y del hebreo: se mantuvo la fórmula profética, el paralelismo entre hijos/hijas, madres y padres, y la traducción directa del nombre divino como Yahvé. No se siguieron las opciones inglesas que usan ''the LORD''; se respetó la norma española del proyecto. También se evitó una calca con ''bear/father'' en favor de verbos españoles naturales que conservan la relación biológica y el tono solemne.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' según el estándar del proyecto.
  - Se conserva la duplicación 'hijos y hijas' porque el hebreo la explicita.
  - '''Dar a luz'' y ''engendran'' reflejan dos participios hebreos distintos sin nivelarlos.'
  - '''Esta tierra'' corresponde a אֶרֶץ en contexto territorial, no a ''tierra'' en sentido cosmológico.'
