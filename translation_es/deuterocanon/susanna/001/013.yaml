lexical_decisions:
- source_word: ἐξωμολογήσαντο
  english_pob_choice: confessed
  chosen_spanish: confesó
  alternatives_spanish:
  - admitió
  - reconoció abiertamente
  - declaró
  lexicon: BDAG
  rationale: El verbo medio comunica una declaración abierta y recíproca. «Confesó» conserva la franqueza del acto sin convertirlo en una confesión litúrgica; en español también es natural para una revelación sincera entre dos personas.
- source_word: πρὸς ἀλλήλους
  english_pob_choice: to the other
  chosen_spanish: al otro
  alternatives_spanish:
  - el uno al otro
  - entre sí
  - uno al otro
  lexicon: BDAG
  rationale: La frase es recíproca y aquí describe claramente a dos personas. «Al otro» preserva esa direccionalidad en español con naturalidad y sin añadir redundancia.
- source_word: ἑκάτερος
  english_pob_choice: each
  chosen_spanish: cada uno
  alternatives_spanish:
  - cada cual
  - cada uno de los dos
  lexicon: BDAG
  rationale: Ἑκάτερος enfatiza a cada miembro del par por separado. «Cada uno» expresa bien ese valor distributivo en español.
- source_word: τὴν ὀδύνην
  english_pob_choice: anguish
  chosen_spanish: su angustia
  alternatives_spanish:
  - su dolor
  - su aflicción
  - su tormento
  lexicon: BDAG
  rationale: Ὀδύνη puede abarcar dolor intenso o aflicción interior. En este contexto narrativo se trata de una pena interna, y «angustia» transmite ese sufrimiento profundo sin reducirlo a dolor físico.
- source_word: αὐτοῦ
  english_pob_choice: his own
  chosen_spanish: su
  alternatives_spanish:
  - su propia
  - la suya
  lexicon: BDAG
  rationale: El posesivo griego marca que cada uno habla de su propio dolor. En español, «su» ya queda determinado por «cada uno» y mantiene el sentido distributivo sin forzar la redacción.
translation_notes:
  revision_awareness: El inglés POB revisó la redacción desde «And each confessed to the other his own anguish» a «And each confessed his anguish to the other» para lograr mayor naturalidad sin perder la reciprocidad. La versión española sigue esa misma intención y conserva la ambigüedad distributiva de ἑκάτερος... αὐτοῦ.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico moderno y sobrio.
  - «Angustia» se eligió para preservar el matiz de sufrimiento interior de ὀδύνη.
  - La relación recíproca queda clara por la combinación de «cada uno» y «al otro».
