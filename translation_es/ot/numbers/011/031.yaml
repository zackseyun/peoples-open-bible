revisions:
- from: Entonces un viento salió de Yahvé[a] e hizo entrar codornices desde el mar, y las dejó caer junto al campamento, como a una jornada de camino de este lado y como a una jornada de camino del otro lado, alrededor de todo el campamento[b], y como a dos codos sobre la superficie de la tierra.
  to: Entonces un viento salió de Yahvé[a] e hizo venir codornices del mar, y las dejó caer junto al campamento, como a una jornada de camino de este lado y como a una jornada de camino del otro lado, alrededor del campamento, y como a dos codos sobre la superficie de la tierra[b].
  rationale: La revisión corrige el anclaje de la nota [b] para que coincida con la cláusula que realmente explica, y pule levemente la naturalidad del español con «del mar», «hizo venir» y «alrededor del campamento», sin cambiar el sentido documentado por la auditoría inglesa ni las decisiones léxicas principales.
