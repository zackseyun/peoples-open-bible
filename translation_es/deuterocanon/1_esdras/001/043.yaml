review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del griego: la referencia temporal, la acción de Nabucodonosor, el traslado a Babilonia y el acompañamiento de los vasos sagrados. Sin embargo, «lo hizo llevar» diluye innecesariamente la secuencia de ἀποστείλας ... μετήγαγεν («envió y se lo llevó / lo trasladó») y suena más indirecto que el original. También conviene preservar la alternativa léxica de μετήγαγεν, como hace el inglés.'
  spanish_quality_summary: El español es claro y digno, pero «lo hizo llevar» resulta algo forzado y menos natural que «envió y se lo llevó» o «envió y lo trasladó». «Vasos santos» es comprensible, aunque «vasos sagrados» suena algo más idiomático en español eclesial moderno; no obstante, no exige cambio obligatorio. La frase temporal y «junto con» funcionan bien.
  glossary_alignment: «del Señor» está justificado aquí porque la fuente primaria es κυρίου, no יהוה explícito. No hay conflicto serio con la política terminológica. El tratamiento de ἱεροῖς como «santos/sagrados» es aceptable. El principal ajuste es lexical-sintáctico para ἀποστείλας + μετήγαγεν.
  issues:
  - severity: medium
    issue: «lo hizo llevar» para ἀποστείλας ... μετήγαγεν
    rationale: 'El griego presenta dos acciones narrativas coordinables: Nabucodonosor envió y luego lo trasladó/llevó a Babilonia. «Lo hizo llevar» introduce una causatividad indirecta no explícita y aplana la secuencia verbal del original y del audit trail inglés.'
  - severity: low
    issue: Falta una nota alternativa sobre el verbo principal de traslado
    rationale: El inglés conserva una nota para la alternativa «carried him off». El español debería preservar esa posibilidad, por ejemplo con «lo deportó» o «se lo llevó a Babilonia», ya que μετήγαγεν tiene matiz de remoción/traslado.
  revised_spanish_text: Y al cabo de un año[a], Nabucodonosor envió y lo trasladó[a] a Babilonia, junto con los vasos santos[b] del Señor.
  revised_footnotes:
  - marker: a
    text: O «un año después». Además, el verbo griego de traslado también puede entenderse como «se lo llevó a Babilonia» o «lo deportó a Babilonia».
    reason: lexical_alternative
  - marker: b
    text: O «sagrados». El griego ἱεροῖς puede traducirse como «santos» o «sagrados».
    reason: lexical_alternative
  revision_rationale: Se revisa la cláusula verbal para reflejar mejor la secuencia del griego ἀποστείλας ... μετήγαγεν y evitar la causatividad indirecta de «lo hizo llevar». Se conserva la redacción temporal y el acompañamiento de los vasos, y se mantienen notas léxicas útiles, incluyendo la alternativa de traslado presente en el audit trail inglés.
