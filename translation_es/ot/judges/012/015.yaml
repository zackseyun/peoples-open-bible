translation:
  language: es
  text: Y murió Abdón hijo de Hilel, el piratonita, y fue sepultado en Piratón, en la tierra de Efraín, en la región montañosa de los amalecitas[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más formalmente, «en el monte del amalecita». El hebreo probablemente usa un gentilicio singular con sentido colectivo o territorial.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּמָת
  english_pob_choice: died
  chosen_spanish: murió
  alternatives_spanish:
  - falleció
  - pereció
  lexicon: BDB/HALOT
  rationale: El hebreo מות expresa muerte de manera directa. En español, «murió» es la equivalencia más natural y directa, sin eufemismo indebido.
- source_word: עַבְדּוֹן
  english_pob_choice: Abdon
  chosen_spanish: Abdón
  alternatives_spanish:
  - Abdon
  lexicon: Transliteración tradicional española
  rationale: Se conserva el nombre propio con la forma española usual «Abdón», que mantiene la identificación del personaje y es legible para lectores bíblicos en español.
- source_word: בֶּן
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - el hijo de
  lexicon: BDB/HALOT
  rationale: La relación de filiación se expresa de forma natural en español con «hijo de». Mantiene el vínculo genealógico sin añadir artículos innecesarios.
- source_word: הִלֵּל
  english_pob_choice: Hillel
  chosen_spanish: Hilel
  alternatives_spanish:
  - Hillel
  lexicon: Transliteración tradicional española
  rationale: Se translitera el nombre propio de manera transparente. «Hilel» sigue la forma española normalizada y evita una grafía híbrida.
- source_word: הַפִּרְעָתוֹנִי
  english_pob_choice: the Pirathonite
  chosen_spanish: el piratonita
  alternatives_spanish:
  - el de Piratón
  - el piratoneo
  lexicon: BDB/HALOT
  rationale: El gentilicio se vierte como sustantivo/adjetivo de origen «piratonita», conservando la fuerza identificadora del hebreo. El artículo se mantiene porque el hebreo también lo lleva.
- source_word: וַיִּקָּבֵר
  english_pob_choice: he was buried
  chosen_spanish: fue sepultado
  alternatives_spanish:
  - fue enterrado
  - y fue sepultado
  lexicon: BDB/HALOT
  rationale: El nifal de קבר indica pasividad. «Fue sepultado» reproduce el hecho con dignidad y es plenamente natural en español bíblico contemporáneo.
- source_word: בְּפִרְעָתוֹן
  english_pob_choice: in Pirathon
  chosen_spanish: en Piratón
  alternatives_spanish:
  - en Piratón
  lexicon: Topónimo
  rationale: Se conserva el topónimo con transliteración española. La preposición locativa «en» refleja adecuadamente el בְּ.
- source_word: בְּאֶרֶץ אֶפְרַיִם
  english_pob_choice: in the land of Ephraim
  chosen_spanish: en la tierra de Efraín
  alternatives_spanish:
  - en el país de Efraín
  - en la región de Efraín
  lexicon: BDB/HALOT
  rationale: El hebreo incluye explícitamente אֶרֶץ, por lo que «tierra» preserva la extensión geográfica del texto mejor que una versión comprimida.
- source_word: בְּהַר הָעֲמָלֵקִי
  english_pob_choice: in the hill country of the Amalekites
  chosen_spanish: en el monte de los amalecitas
  alternatives_spanish:
  - en la región montañosa de los amalecitas
  - en el monte del amalecita
  lexicon: BDB/HALOT
  rationale: Aunque הַר puede tener valor regional, aquí se mantiene una traducción más cercana al hebreo con «monte». El gentilicio singular con artículo se entiende de forma colectiva en español como «los amalecitas», evitando una construcción extraña y conservando el sentido territorial.
theological_decisions:
- issue: Valor del gentilicio final singular con artículo en בְּהַר הָעֲמָלֵקִי
  english_pob_reading: The hill country of the Amalekites, with a note that the Hebrew likely uses a singular gentilic in a collective or territorial sense.
  chosen_spanish_reading: el monte de los amalecitas, entendiendo el gentilicio como colectivo/territorial
  alternative_spanish_readings:
  - el monte del amalecita
  - el monte del amalecio
  rationale: El hebreo parece emplear un gentilicio singular con sentido colectivo o territorial. En español, el plural «amalecitas» comunica ese valor natural y evita una forma artificial, sin borrar la tensión textual señalada por el aparato inglés.
  doctrine_reference: Nota lexical/textual, no doctrinal
translation_notes:
  revision_awareness: El pasaje coincide con el audit trail inglés en lectura y alcance; no se registran revisiones aplicadas en la fuente inglesa y no hay cambios textuales necesarios respecto del sentido del hebreo.
  spanish_consistency_notes:
  - Se mantiene la fórmula narrativa breve y directa del hebreo.
  - Los nombres propios se transliteran de forma consistente al español bíblico.
  - Se conserva la distinción entre «tierra» y «monte» para reflejar los dos complementos locativos del hebreo.
  - La nota al pie preserva la tensión entre el gentilicio singular del hebreo y la naturalidad del plural español.
