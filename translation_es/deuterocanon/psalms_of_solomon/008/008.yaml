translation:
  language: es
  text: Dios expuso sus pecados ante el sol[a]; toda la tierra llegó a conocer los juicios justos de Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «rectos».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνεκάλυψεν
  english_pob_choice: exposed
  chosen_spanish: expuso
  alternatives_spanish:
  - descubrió
  - dejó al descubierto
  - reveló
  lexicon: BDAG
  rationale: El verbo expresa hacer visible lo que estaba oculto. «Expuso» conserva la idea de poner públicamente a la vista y encaja bien con el tono de vergüenza pública del contexto, sin sonar mecánico.
- source_word: τὰς ἁμαρτίας αὐτῶν
  english_pob_choice: their sins
  chosen_spanish: sus pecados
  alternatives_spanish:
  - sus faltas
  - sus ofensas
  lexicon: BDAG
  rationale: «Pecados» es el equivalente directo y más claro en español para ἁμαρτίας; mantiene la fuerza moral del término sin suavizarla.
- source_word: ἐναντίον τοῦ ἡλίου
  english_pob_choice: before the sun
  chosen_spanish: ante el sol
  alternatives_spanish:
  - delante del sol
  - a la vista del sol
  - bajo el sol
  lexicon: BDAG
  rationale: «Ante el sol» preserva la imagen literal de exposición pública. «Bajo el sol» introduciría un matiz idiomático no exigido por el griego.
- source_word: ἔγνω
  english_pob_choice: came to know
  chosen_spanish: llegó a conocer
  alternatives_spanish:
  - conoció
  - llegó a saber
  - reconoció
  lexicon: BDAG
  rationale: 'La forma aorista marca el resultado de una percepción pública: no solo «supo», sino que «llegó a conocer» expresa mejor el proceso de reconocimiento universal.'
- source_word: πᾶσα ἡ γῆ
  english_pob_choice: all the earth
  chosen_spanish: toda la tierra
  alternatives_spanish:
  - toda la tierra habitada
  - el mundo entero
  lexicon: BDAG
  rationale: «Toda la tierra» reproduce con naturalidad el alcance universal del griego y evita restringir el sentido a una región.
- source_word: τὰ κρίματα τοῦ θεοῦ
  english_pob_choice: the judgments of God
  chosen_spanish: los juicios de Dios
  alternatives_spanish:
  - las decisiones de Dios
  - los decretos de Dios
  lexicon: BDAG
  rationale: «Juicios» es la correspondencia más directa para κρίματα y funciona bien en lenguaje bíblico español, manteniendo el sentido judicial del término.
- source_word: τὰ δίκαια
  english_pob_choice: righteous
  chosen_spanish: justos
  alternatives_spanish:
  - rectos
  - righteous
  lexicon: BDAG
  rationale: Aquí δίκαια califica los juicios de Dios; en español, «justos» comunica con naturalidad tanto rectitud moral como validez judicial. Se conserva la tensión entre «justos» y «rectos» sin forzar una sola matización.
theological_decisions:
- issue: Matiz de δίκαια aplicado a los juicios divinos
  english_pob_reading: righteous judgments
  chosen_spanish_reading: juicios justos
  alternative_spanish_readings:
  - juicios rectos
  - juicios justos de Dios
  rationale: La frase puede entenderse en clave moral («justos») y judicial («rectos»). Se mantiene «justos» para ser fiel al valor bíblico directo, sin perder la resonancia de imparcialidad y rectitud divina.
  doctrine_reference: Preservar la tensión lexical sin resolverla de forma excesiva; coherencia terminológica con justicia/rectitud.
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés están en alto acuerdo; no se registran revisiones aplicadas. La versión española sigue de cerca la imagen de exposición pública («ante el sol») y conserva la elección ética/judicial de δίκαια como «justos», con una alternativa breve en nota.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός, conforme al estándar del proyecto.
  - Se preserva el campo semántico judicial con «juicios» para κρίματα.
  - No se introduce «Cristo», «SEÑOR» ni otras sustituciones no justificadas por el fuente.
  - El registro es bíblico pero claro, apto para lectura pública.
