translation:
  language: es
  text: Mucho[a] me han afligido desde mi juventud, pero no han prevalecido sobre mí[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Muchas veces me han afligido desde mi juventud». El hebreo inicial puede subrayar intensidad («mucho») o repetición («muchas veces»).'
    reason: lexical_alternative
  - marker: b
    text: 'O: «no han podido conmigo» o «no me han vencido».'
    reason: lexical_alternative
lexical_decisions:
- source_word: רַבַּת
  english_pob_choice: Greatly
  chosen_spanish: Mucho
  alternatives_spanish:
  - Grandemente
  - Muchas veces
  - Con mucha intensidad
  lexicon: HALOT
  rationale: El hebreo funciona adverbialmente para expresar intensidad o extensión. En español, «mucho» comunica con naturalidad esa fuerza poética sin sonar forzado; mantiene abierta la posibilidad de intensidad más que de simple frecuencia.
- source_word: צְרָר֣וּ/נִי
  english_pob_choice: they have afflicted me
  chosen_spanish: me han afligido
  alternatives_spanish:
  - me han oprimido
  - me han hostigado
  - me han atacado
  lexicon: HALOT
  rationale: El verbo צרר transmite tratar como enemigo, hostigar u oprimir. «Afligido» conserva la idea de hostilidad sostenida en un registro bíblico comprensible en español, sin reducirlo a ataque militar.
- source_word: מִנְּעוּרָ֑/י
  english_pob_choice: from my youth
  chosen_spanish: desde mi juventud
  alternatives_spanish:
  - desde que era joven
  - desde mis años mozos
  - desde mi niñez
  lexicon: HALOT
  rationale: La expresión temporal hebrea indica un punto de inicio que llega hasta el presente. «Desde mi juventud» es la forma más natural y fiel en español.
- source_word: גַּם
  english_pob_choice: yet
  chosen_spanish: pero
  alternatives_spanish:
  - y sin embargo
  - aun así
  - no obstante
  lexicon: HALOT
  rationale: Aquí גַּם funciona en sentido concesivo/adversativo por el contraste con la cláusula negativa siguiente. «Pero» expresa bien el giro en español, aunque «sin embargo» también sería posible.
- source_word: לֹא יָכְלוּ לִי
  english_pob_choice: they have not prevailed against me
  chosen_spanish: no han prevalecido contra mí
  alternatives_spanish:
  - no han podido conmigo
  - no me han vencido
  - no han podido contra mí
  lexicon: HALOT
  rationale: יכל con ל expresa incapacidad de imponerse o vencer a alguien. «Prevalecido contra mí» preserva la fuerza del hebreo y el matiz de fracaso en dominar, más preciso que un simple «vencido».
translation_notes:
  revision_awareness: Se siguió de cerca el audit trail inglés y el hebreo base. No hubo cambios textuales relevantes en la revisión más reciente; el consenso de control cruzado fue de alta concordancia.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como término preferente del proyecto cuando corresponda; este versículo no lo contiene.
  - Se usa «afligido» para צרר siguiendo la opción inglesa documentada, sin neutralizar la hostilidad del verbo.
  - La adversativa «pero» reproduce el giro concesivo de גַּם en contexto negativo.
  - La nota de pie de página a conserva la alternativa de frecuencia («muchas veces») porque el hebreo permite esa lectura además de la intensidad.
