translation:
  language: es
  text: Entonces Josué se hizo cuchillos de pedernal[a] y circuncidó a los hijos de Israel[b] en Gibeat-haaralot[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cuchillos de piedra». El hebreo se refiere más precisamente a pedernal; la palabra para el instrumento puede también entenderse como «espadas» o «hojas», pero aquí se trata de herramientas de corte usadas para la circuncisión.
    reason: lexical_alternative
  - marker: b
    text: Hebreo «hijos de Israel»; muchas traducciones ponen «israelitas».
    reason: lexical_alternative
  - marker: c
    text: O, con transliteración más formal, «Gibeath-haaraloth». El hebreo significa «Colina de los prepucios».
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּעַשׂ
  english_pob_choice: made
  chosen_spanish: se hizo
  alternatives_spanish:
  - hizo
  - fabricó
  lexicon: HALOT
  rationale: En este contexto narrativo, עשה expresa preparación o confección de instrumentos. «Se hizo» comunica que Josué los preparó para sí, de forma natural en español y con el matiz reflexivo de לּוֹ.
- source_word: לּוֹ
  english_pob_choice: for himself
  chosen_spanish: se hizo
  alternatives_spanish:
  - para sí
  - para él
  lexicon: HALOT
  rationale: El pronombre con preposición apunta a beneficio o destino personal. El español reflexivo «se hizo» integra bien ese valor sin perder el sentido de que fueron para su propio uso.
- source_word: חַרְבוֹת
  english_pob_choice: knives
  chosen_spanish: cuchillos
  alternatives_spanish:
  - espadas
  - hojas
  lexicon: HALOT
  rationale: Aunque la raíz suele significar «espada», en el contexto de la circuncisión el referente funcional son herramientas de corte. «Cuchillos» es más preciso en español que «espadas».
- source_word: צֻרִים
  english_pob_choice: flint
  chosen_spanish: de piedra
  alternatives_spanish:
  - de pedernal
  - de sílex
  lexicon: HALOT
  rationale: El hebreo alude a material lítico para cortar. Dado que en español «pedernal» o «sílex» pueden sonar más técnicos o regionales, «de piedra» mantiene transparencia y evita una equivalencia demasiado específica que no exige el contexto inmediato.
- source_word: וַיָּמָל
  english_pob_choice: circumcised
  chosen_spanish: circuncidó
  alternatives_spanish:
  - circuncidó ritualmente
  lexicon: HALOT
  rationale: El verbo מול significa sin ambigüedad «circuncidar». El español estándar «circuncidó» conserva la fuerza verbal directa del hebreo.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los niños de Israel
  lexicon: HALOT
  rationale: Se conserva la construcción formal hebrea. «Los hijos de Israel» es más transparente al texto fuente que la versión idiomática «los israelitas».
- source_word: אֶל
  english_pob_choice: at
  chosen_spanish: en
  alternatives_spanish:
  - junto a
  - allí en
  lexicon: HALOT
  rationale: Con un topónimo, el español natural exige localización estática. «En» expresa mejor el lugar donde ocurrió la acción.
- source_word: גִּבְעַת הָעֲרָלוֹת
  english_pob_choice: Gibeath-haaraloth
  chosen_spanish: Gibeat-haaralot
  alternatives_spanish:
  - Guibeat-haaralot
  - la Colina de los Prepucios
  lexicon: HALOT
  rationale: La revisión inglesa prefirió transliterar el nombre del lugar para preservar el topónimo hebreo. En español se mantiene la transliteración adaptada y reconocible. Se evita una traducción interpretativa del nombre propio en el texto principal.
theological_decisions:
- issue: Topónimo descriptivo vs. transliteración
  english_pob_reading: Gibeath-haaraloth, preserving the Hebrew place name rather than translating it as 'the Hill of the Foreskins.'
  chosen_spanish_reading: Gibeat-haaralot
  alternative_spanish_readings:
  - la Colina de los Prepucios
  - la Colina de las Naturalezas
  rationale: La POB inglesa revisada decidió preservar el topónimo hebreo por transparencia formal. En español se sigue esa decisión, evitando una glosa que podría sonar más explicativa que el texto base.
  doctrine_reference: Principio de transparencia textual y fidelidad al topónimo hebreo
translation_notes:
  revision_awareness: La revisión más reciente de la POB inglesa reemplazó la traducción explicativa del topónimo por la transliteración Gibeath-haaraloth. Esta versión española sigue esa revisión, manteniendo la forma del nombre propio en el texto principal y evitando una paráfrasis explicativa.
  spanish_consistency_notes:
  - Se mantiene «Josué» para el nombre propio y no se introduce una forma alternativa.
  - Se conserva «los hijos de Israel» para reflejar la estructura hebrea y el paralelismo con el audit trail inglés.
  - Se evita «SEÑOR» o equivalentes de ocultamiento porque el versículo no contiene el nombre divino.
  - El estilo busca ser publicable, claro y fiel al hebreo sin endurecer innecesariamente el español.
