    reason: lexical_alternative
  - marker: c
    text: O 'para hacer volver' o 'para retribuir'; el verbo hebreo puede significar 'volver' o 'devolver/retribuir' en sentido judicial.
    reason: lexical_alternative
  revision_rationale: 'Se revisa la cláusula final para mejorar la naturalidad del español sin perder el sentido judicial del hebreo: ''descargar su ira'' expresa mejor la ejecución del juicio que ''retribuir su ira''. Además, se elimina una nota innecesaria sobre ''llamas de fuego'' y se añade una nota en el lugar donde sí existe una alternativa léxica importante en el original y en el rastro inglés: לְהָשִׁיב.'
