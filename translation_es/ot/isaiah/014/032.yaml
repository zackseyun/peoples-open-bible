    text: O "los enviados" o "los embajadores" de la nación. El término hebreo puede referirse a mensajeros diplomáticos.
    reason: lexical_alternative
  - marker: b
    text: O "los pobres de su pueblo" o "los humildes de su pueblo". El hebreo puede denotar pobreza económica, aflicción o condición humilde, según el contexto.
    reason: lexical_alternative
  revision_rationale: Se corrige la construcción española impropia 'ha fundado a Sion' a 'ha fundado Sion', que es más fiel y natural para יסד. También se restauran las notas léxicas significativas preservadas por la auditoría inglesa para mantener la transparencia traductológica del proyecto.
