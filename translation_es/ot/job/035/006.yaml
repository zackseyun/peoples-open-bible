translation:
  language: es
  text: Si pecas, ¿qué logras contra él?[a] Y si tus transgresiones son muchas, ¿qué le haces?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «¿qué le haces?» en la primera cláusula también. El verbo hebreo puede significar simplemente «hacer» o «efectuar»; «logras contra él» procura expresar el sentido retórico.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Cuando
  lexicon: HALOT
  rationale: La partícula introduce una condición hipotética; «Si» reproduce con naturalidad la fuerza condicional del hebreo.
- source_word: חָטָאתָ
  english_pob_choice: you sin
  chosen_spanish: pecas
  alternatives_spanish:
  - has pecado
  - pecaras
  lexicon: HALOT
  rationale: En este dicho retórico, el presente gnómico en español comunica mejor la condición general que un pasado compuesto, y conserva la idea de pecado como acción real.
- source_word: מַה תִּפְעָל בּוֹ
  english_pob_choice: what do you accomplish against him
  chosen_spanish: ¿qué logras contra él?
  alternatives_spanish:
  - ¿qué haces contra él?
  - ¿qué efecto produces en él?
  - ¿qué consigues contra él?
  lexicon: HALOT
  rationale: פעל puede ser «hacer» o «efectuar», pero el contexto retórico pide el matiz de resultado. «Logras» comunica en español la idea de obtener un efecto real, y «contra él» preserva el valor adversativo de בּוֹ sin suavizar la tensión.
- source_word: וְרַבּוּ
  english_pob_choice: And if ... are many
  chosen_spanish: Y si ... son muchas
  alternatives_spanish:
  - Y si se multiplican
  - Y aunque sean muchas
  lexicon: HALOT
  rationale: La cláusula mantiene el paralelismo condicional con la primera. En español, «si ... son muchas» hace explícita la elipsis con claridad y sin añadir sentido.
- source_word: פְשָׁעֶיךָ
  english_pob_choice: your transgressions
  chosen_spanish: tus transgresiones
  alternatives_spanish:
  - tus rebeliones
  - tus ofensas
  lexicon: HALOT
  rationale: «Transgresiones» conserva el peso moral y jurídico de פשע y evita debilitar el término con una palabra más general.
- source_word: מַה תַּעֲשֶׂה לּוֹ
  english_pob_choice: what do you do to him
  chosen_spanish: ¿qué le haces?
  alternatives_spanish:
  - ¿qué puedes hacerle?
  - ¿qué haces para él?
  lexicon: HALOT
  rationale: La forma breve en español preserva la pregunta retórica del hebreo. El dativo pronominal «le» refleja לּוֹ de manera idiomática y natural.
theological_decisions:
- issue: Cómo reflejar la idea teológica de que el pecado humano no daña ni afecta a Dios en el sentido último del argumento de Eliú.
  english_pob_reading: The wording emphasizes that human sin does not accomplish anything against God or do harm to him in the sense intended by Elihu's argument.
  chosen_spanish_reading: La traducción deja ver que el pecado humano no logra nada contra Dios en el sentido de dañarlo o alterarlo, sin convertir la pregunta retórica en una paráfrasis excesiva.
  alternative_spanish_readings:
  - ¿qué daño le haces?
  - ¿qué le afecta tu pecado?
  - ¿qué consigues contra él?
  rationale: 'La primera pregunta conserva la tensión de la reprensión: el hombre no puede producir un efecto decisivo contra Dios. A la vez, evita decir más de lo que el hebreo afirma, ya que el punto es la inutilidad del pecado frente a la trascendencia divina, no una negación de toda relevancia moral.'
  doctrine_reference: Translation philosophy items 1, 3, and 6
translation_notes:
  revision_awareness: El pasaje coincide con el control de revisión más reciente, que no introdujo cambios y confirmó un alto grado de acuerdo con el texto fuente y la lectura auditada en inglés.
  spanish_consistency_notes:
  - Se mantiene «transgresiones» para פשע conforme a su valor moral fuerte.
  - Se usa «él» para Dios siguiendo el antecedente implícito del contexto y la economía del español bíblico.
  - La puntuación reproduce el paralelismo de dos preguntas retóricas breves.
