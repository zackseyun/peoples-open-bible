review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia y el sentido básico del hebreo: la transición temporal tras la muerte de Gedeón, la recaída de Israel, la metáfora sexual para la idolatría, el plural «los Baales» y la designación de Baal-berit como deidad. Sin embargo, las notas están mal alineadas con el rastro inglés: la nota [a] en inglés explica el significado de «Baal-berith», no la fórmula narrativa, mientras que la nota [b] corresponde a la metáfora de זנה. También conviene hacer más natural en español «volvieron a prostituirse» en vez de «volvieron atrás y se prostituyeron».'
  spanish_quality_summary: 'El español es generalmente claro y digno, pero tiene dos puntos mejorables: «volvieron atrás» suena algo calcado en este contexto y «pusieron para sí a Baal-berit como su dios» es comprensible pero menos idiomático que «hicieron de Baal-berit su dios». Además, la nota [a] actual comenta otra decisión y no el nombre cultual, lo que genera incoherencia editorial.'
  glossary_alignment: No hay conflicto con los términos por defecto del proyecto. «los hijos de Israel» es aceptable como preservación formal de בְּנֵי יִשְׂרָאֵל; «los Baales» mantiene bien el plural cultual; «Baal-berit» como nombre propio es defendible en el texto principal. No intervienen Yahvé/Mesías/Cristo. La principal corrección es de aparato crítico y naturalidad sintáctica, no de glosario base.
  issues:
  - severity: high
    issue: La nota [a] no corresponde al mismo punto que en el rastro inglés ni al anclaje textual más pertinente.
    rationale: En la auditoría inglesa, [a] explica «Baal-berith» como nombre/significado alternativo. En el borrador español, [a] está anclada en «aconteció que» y comenta la fórmula narrativa. Eso rompe la trazabilidad del aparato y omite la nota léxica más importante sobre el nombre cultual.
  - severity: medium
    issue: «volvieron atrás» suena poco natural en español en este contexto de recaída espiritual.
    rationale: Aunque intenta reflejar שׁוּב como recaída, en español bíblico natural «volvieron» o «volvieron a...» comunica mejor la idea. «Volvieron a prostituirse» conserva tanto el retorno como la metáfora sexual sin calco innecesario.
  - severity: medium
    issue: «pusieron para sí a Baal-berit como su dios» es menos idiomático que una formulación de designación más natural.
    rationale: El hebreo expresa designación cultual. En español, «hicieron de Baal-berit su dios» o «establecieron para sí a Baal-berit como dios» suena más claro. La primera opción conserva bien el sentido y fluye mejor.
  revised_spanish_text: Y aconteció que, cuando murió Gedeón, los hijos de Israel volvieron a prostituirse tras los Baales[b], e hicieron de Baal-berit[a] su dios.
  revised_footnotes:
  - marker: a
    text: Baal-berit probablemente significa «Baal del pacto» o «Señor del pacto».
    reason: lexical_alternative
  - marker: b
    text: O «se prostituyeron tras los Baales»; el hebreo usa una imagen sexual para la infidelidad idolátrica.
    reason: lexical_alternative
  revision_rationale: 'Se reordenan y corrigen las notas para que coincidan con la evidencia y el rastro POB: [a] ahora explica el nombre cultual «Baal-berit» y [b] la metáfora sexual de זנה. En la línea principal, «volvieron a prostituirse» expresa mejor la recaída implícita en שׁוּב sin el calco rígido «volvieron atrás», y «hicieron de Baal-berit su dios» comunica con naturalidad la designación cultual de לָהֶם ... לֵאלֹהִים.'
