translation:
  language: es
  text: Y en cuanto a Ismael, te he oído. He aquí, lo he bendecido, y lo haré fecundo, y lo multiplicaré en gran manera[b]. Él engendrará doce príncipes[a], y haré de él una gran nación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «jefes» o «líderes» para «príncipes».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «muy, muy»; es decir, en gran manera o muy grandemente.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּלְיִשְׁמָעֵאל
  english_pob_choice: And as for Ishmael
  chosen_spanish: Y en cuanto a Ismael
  alternatives_spanish:
  - Y respecto de Ismael
  - Y para Ismael
  lexicon: HALOT
  rationale: La preposición con conjunción introduce un cambio de foco discursivo. «En cuanto a» reproduce bien ese giro temático en español sin sonar mecánico.
- source_word: שְׁמַעְתִּיךָ
  english_pob_choice: I have heard you
  chosen_spanish: te he oído
  alternatives_spanish:
  - te he escuchado
  - he atendido tu petición
  lexicon: HALOT
  rationale: El hebreo expresa que Dios oyó favorablemente la petición, pero el texto dice «oír» y no «conceder». «Te he oído» preserva esa precisión.
- source_word: הִנֵּה
  english_pob_choice: Behold
  chosen_spanish: Mira
  alternatives_spanish:
  - He aquí
  - Mira, pues
  lexicon: HALOT
  rationale: Es una partícula de atención. «Mira» es natural en español, aunque algo más conversacional; por eso se acompaña de un registro sobrio en el resto del versículo.
- source_word: בֵּרַכְתִּי אֹתוֹ
  english_pob_choice: I have blessed him
  chosen_spanish: lo he bendecido
  alternatives_spanish:
  - lo he bendecido de verdad
  - lo he bendecido
  lexicon: HALOT
  rationale: «Bendecir» es el equivalente estándar de ברך y mantiene el tono de promesa pactal.
- source_word: וְהִפְרֵיתִי אֹתוֹ
  english_pob_choice: and will make him fruitful
  chosen_spanish: lo haré fecundo
  alternatives_spanish:
  - lo haré fructificar
  - lo haré fértil
  lexicon: HALOT
  rationale: El hifil de פרה es causativo. «Fecundo» expresa de modo breve y digno la idea de hacer productivo en descendencia.
- source_word: וְהִרְבֵּיתִי אֹתוֹ
  english_pob_choice: and will multiply him
  chosen_spanish: lo multiplicaré muchísimo
  alternatives_spanish:
  - lo multiplicaré en gran manera
  - lo haré muy numeroso
  lexicon: HALOT
  rationale: La duplicación de מאוד intensifica la promesa. «Muchísimo» conserva la fuerza enfática con naturalidad en español.
- source_word: שְׁנֵים עָשָׂר נְשִׂיאִם
  english_pob_choice: twelve princes
  chosen_spanish: doce príncipes[a]
  alternatives_spanish:
  - doce jefes
  - doce caudillos
  lexicon: HALOT
  rationale: «Príncipes» sigue la elección de la POB y preserva el rango tribal elevado. Se ancla la nota porque el español puede sugerir una asociación monárquica que no agota el hebreo.
- source_word: יוֹלִיד
  english_pob_choice: He will father
  chosen_spanish: Él engendrará
  alternatives_spanish:
  - Él será padre de
  - Él tendrá
  lexicon: HALOT
  rationale: Con sujeto masculino, el verbo se refiere a engendrar/fundar descendencia. «Engendrará» es más preciso y más directo que «tener».
- source_word: וּנְתַתִּיו לְגוֹי גָּדוֹל
  english_pob_choice: and I will make him into a great nation
  chosen_spanish: y lo haré una nación grande[b]
  alternatives_spanish:
  - y lo haré una gran nación
  - y lo pondré como nación grande
  lexicon: HALOT
  rationale: נתן con ל expresa constituir o hacer en cierto estado. «Lo haré una nación grande» conserva el sentido de transformación del sujeto en pueblo/nación sin añadir un matiz explicativo ajeno.
theological_decisions:
- issue: Alcance de la respuesta divina en שְׁמַעְתִּיךָ
  english_pob_reading: God states that he has heard Abraham's request concerning Ishmael without making this clause itself mean full covenantal election.
  chosen_spanish_reading: Dios afirma que oyó la petición respecto de Ismael, sin que la frase implique por sí sola la elección pactual plena.
  alternative_spanish_readings:
  - Dios ha concedido tu petición
  - Dios ha aceptado a Ismael en los mismos términos pactales que a Isaac
  rationale: El contexto distingue claramente entre el favor hacia Ismael y la línea pactal que continúa por Isaac. La traducción mantiene esa tensión sin resolverla en exceso.
  doctrine_reference: Génesis 17; Romanos 9:7-9
- issue: Sentido de נְשִׂיאִם
  english_pob_reading: princes
  chosen_spanish_reading: príncipes
  alternative_spanish_readings:
  - jefes
  - líderes
  rationale: El término apunta a caudillos o gobernantes de tribus. «Príncipes» conserva el rango social alto y el eco bíblico tradicional sin convertirlo en una monarquía posterior.
  doctrine_reference: Génesis 25:16
- issue: Intensificación de בִּמְאֹד מְאֹד
  english_pob_reading: exceedingly / very greatly
  chosen_spanish_reading: muchísimo
  alternative_spanish_readings:
  - en gran manera
  - muy, muy
  rationale: La duplicación hebrea pide una intensificación fuerte. «Muchísimo» condensa esa fuerza en español moderno y lectura pública.
  doctrine_reference: Génesis 17:6; 17:20
translation_notes:
  revision_awareness: 'La versión española sigue el mismo flujo del texto revisado en inglés: conserva el giro discursivo inicial, mantiene la distinción entre «oír» y «conceder», y refleja la intensificación final de מאוד mediante una equivalencia natural en español. Se evitó traducir mecánicamente con «he aquí» donde el registro público en español favorece una partícula atencional más directa, y se preservó el contraste teológico entre el favor hacia Ismael y la continuidad pactal por Isaac.'
  spanish_consistency_notes:
  - Se usa «Ismael» como nombre propio estándar.
  - Se usa «Yahvé» no aparece en este versículo.
  - 'Se conserva la secuencia verbal del hebreo: perfecto divino seguido de futuros promisorios.'
  - Se mantiene «príncipes» como término técnico-bíblico, con nota de alternativas.
  - Los marcadores de nota [a] y [b] aparecen exactamente en el texto principal donde corresponden.
