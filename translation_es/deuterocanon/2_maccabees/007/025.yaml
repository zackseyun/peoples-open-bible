  yaml_path: translation/deuterocanon/2_maccabees/007/025.yaml
  text: But since the young man was paying no attention at all[b][a], the king called the mother to him and urged her to become an adviser to the youth for his safety.
  footnotes:
  - marker: a
    text: Or 'was not listening at all.' The Greek emphasizes complete refusal to heed.
    reason: lexical_alternative
  - marker: b
    text: Or 'for his safety,' 'for his deliverance,' or 'for his salvation.' The Greek σωτηρία can cover a range from physical preservation to broader deliverance; here the immediate context favors preservation of life.
    reason: lexical_alternative
