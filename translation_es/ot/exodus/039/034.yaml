translation:
  language: es
  text: la cubierta de pieles de carneros teñidas de rojo, la cubierta de cuero fino[a], y el velo de la pantalla;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo תְּחָשִׁים tiene un referente incierto. Puede aludir a la piel de un animal específico (tradicionalmente vertido como 'pieles de marsopa/dugongo' o transliterado como 'tachash').
    reason: lexical_alternative
lexical_decisions:
- source_word: מִכְסֵה
  english_pob_choice: covering
  chosen_spanish: cubierta
  alternatives_spanish:
  - cobertura
  - cubierta exterior
  lexicon: HALOT
  rationale: El sustantivo designa algo que cubre; en español, 'cubierta' conserva bien el valor nominal y suena natural en el contexto del tabernáculo.
- source_word: עוֹרֹת הָאֵילִם הַמְאָדָּמִים
  english_pob_choice: ram skins dyed red
  chosen_spanish: pieles de carneros teñidas de rojo
  alternatives_spanish:
  - pieles rojas de carneros
  - pieles de carneros rojas
  lexicon: HALOT
  rationale: עוֹרֹת son 'pieles'; אֵילִם son 'carneros'; הַמְאָדָּמִים indica coloración/teñido rojo. 'Teñidas de rojo' comunica mejor el sentido procesado que una simple referencia a color natural.
- source_word: עֹרֹת הַתְּחָשִׁים
  english_pob_choice: fine leather
  chosen_spanish: pieles finas
  alternatives_spanish:
  - cuero fino
  - pieles de tachás
  - cuero de animal desconocido
  lexicon: HALOT
  rationale: El referente de תְּחָשִׁים es incierto; el inglés POB evita precisar un animal. En español, 'pieles finas' mantiene la reserva y comunica un material de cobertura sin imponer una identificación dudosa.
- source_word: פָּרֹכֶת
  english_pob_choice: veil
  chosen_spanish: velo
  alternatives_spanish:
  - cortina
  - cortinaje
  lexicon: HALOT
  rationale: פָּרֹכֶת es el velo cultual del santuario. 'Velo' preserva mejor la función técnica y tradicional que 'cortina', aunque aquí se complementa con 'del cortinaje' por la relación con הַמָּסָךְ.
- source_word: הַמָּסָךְ
  english_pob_choice: the screen
  chosen_spanish: el cortinaje
  alternatives_spanish:
  - la pantalla
  - el telón
  - la mampara
  lexicon: HALOT
  rationale: מָסָךְ puede denotar un colgante o pantalla de entrada. En español, 'cortinaje' expresa con naturalidad el elemento de tela colgante al que se refiere el sintagma, sin perder el matiz de separación/entrada.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el hebreo y la solución inglesa auditada: ''ram skins dyed red'' se vuelve ''pieles de carneros teñidas de rojo'', y el elemento incierto תְּחָשִׁים se mantiene sin identificación zoológica segura, tal como en la nota inglesa. Para הַמָּסָךְ se eligió ''cortinaje'' para reflejar el objeto colgante en un registro español claro y culto.'
  spanish_consistency_notes:
  - 'Se mantuvo el orden listado del hebreo: tres elementos coordinados con coma y ''y'' antes del último.'
  - Se conservó la distinción entre 'velo' y el elemento asociado al 'screen' mediante 'cortinaje'.
  - La nota a pie marca únicamente la incertidumbre léxica de תְּחָשִׁים, sin añadir especulación no atestiguada.
