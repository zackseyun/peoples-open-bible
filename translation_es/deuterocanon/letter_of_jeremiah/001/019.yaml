revisions:
- from: Son, en verdad, como una viga de una casa; pero dicen que sus corazones[a] son lamidos. Mientras las cosas que reptan por la tierra los devoran a ellos y también su ropa, no lo perciben.
  to: Son, en verdad, como una viga de una casa; pero dicen que se les van lamiendo los corazones[a]. Mientras los seres que se arrastran desde la tierra los devoran a ellos y también su ropa, no lo perciben.
  rationale: 'Se conserva la estructura y las decisiones principales del POB auditado, pero se ajusta el español en dos lugares clave: ἐκλείχεσθαι se vierte de forma más inteligible como un proceso de desgaste (''se les van lamiendo los corazones'') y ἑρπετῶν se expresa naturalmente como ''los seres que se arrastran''. La nota al pie también se afina para ofrecer una alternativa idiomática en español sin perder la razón lexical documentada.'
