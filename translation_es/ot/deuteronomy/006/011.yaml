translation:
  language: es
  text: y casas llenas de toda clase de bienes que tú no llenaste, y cisternas[a] excavadas que tú no excavaste, viñedos y olivos que tú no plantaste; y comerás y te saciarás[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse «pozos», pero en este contexto se trata más precisamente de cisternas excavadas en roca para almacenar agua.
    reason: lexical_alternative
  - marker: b
    text: 'O: «y comerás y quedarás satisfecho». El hebreo expresa una secuencia de resultado; el futuro español refleja bien esa lectura.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בָתִּים
  english_pob_choice: houses
  chosen_spanish: casas
  alternatives_spanish:
  - hogares
  lexicon: HALOT
  rationale: «Casas» preserva el sentido material y concreto del hebreo, en paralelo con cisternas, viñedos y olivos. «Hogares» suavizaría la imagen hacia lo familiar y perdería precisión.
- source_word: מְלֵאִים כָּל טוּב
  english_pob_choice: full of every good thing
  chosen_spanish: llenas de todo bien
  alternatives_spanish:
  - llenas de toda clase de bienes
  - llenas de todo lo bueno
  lexicon: HALOT
  rationale: «Todo bien» refleja la amplitud de כָּל טוּב sin forzar una valoración moral. En español suena natural y mantiene la idea de abundancia de bienes/provisiones.
- source_word: אֲשֶׁר לֹא מִלֵּאתָ
  english_pob_choice: that you did not fill
  chosen_spanish: que tú no llenaste
  alternatives_spanish:
  - que no llenaste
  - que tú no habías llenado
  lexicon: HALOT
  rationale: Mantiene la segunda persona singular y el contraste entre lo recibido y lo producido por Israel. El pretérito simple sigue bien la secuencia del hebreo en español.
- source_word: בֹרֹת
  english_pob_choice: cisterns
  chosen_spanish: cisternas
  alternatives_spanish:
  - pozos
  - aljibes
  lexicon: HALOT
  rationale: «Cisternas» es más preciso que «pozos» en este contexto de almacenamiento de agua. «Aljibes» sería comprensible pero menos transparente para un registro bíblico general.
- source_word: חֲצוּבִים
  english_pob_choice: hewn out
  chosen_spanish: labradas
  alternatives_spanish:
  - talladas
  - escavadas
  lexicon: HALOT
  rationale: La idea principal es que fueron hechas por labor humana en roca. «Labradas» comunica bien el trabajo de talla/corte y suena natural en español; «talladas» también sería posible, pero algo más rígida aquí.
- source_word: אֲשֶׁר לֹא חָצַבְתָּ
  english_pob_choice: that you did not hew
  chosen_spanish: que tú no labraste
  alternatives_spanish:
  - que no tallaste
  - que no excavaste
  lexicon: HALOT
  rationale: Se conserva la correspondencia con «labradas» y la imagen de trabajar la roca. «Excavaste» podría sonar demasiado general y desplazar la idea de talla/hechura.
- source_word: כְּרָמִים
  english_pob_choice: vineyards
  chosen_spanish: viñedos
  alternatives_spanish:
  - viñas
  lexicon: HALOT
  rationale: «Viñedos» corresponde a plantaciones o terrenos de vid, no a las vides mismas. Conserva mejor el listado de bienes agrícolas recibidos.
- source_word: וְזֵיתִים
  english_pob_choice: olive trees
  chosen_spanish: olivos
  alternatives_spanish:
  - árboles de olivo
  - olivares
  lexicon: HALOT
  rationale: En español bíblico y actual, «olivos» es natural y claro para la plantación/árboles mencionados. «Olivares» introduciría un matiz de conjunto que el hebreo no exige.
- source_word: אֲשֶׁר לֹא נָטָעְתָּ
  english_pob_choice: that you did not plant
  chosen_spanish: que tú no plantaste
  alternatives_spanish:
  - que no plantaste
  lexicon: HALOT
  rationale: Mantiene el paralelismo repetido y el énfasis en que esos bienes no proceden del trabajo de Israel.
- source_word: וְאָכַלְתָּ
  english_pob_choice: and you eat
  chosen_spanish: y comerás
  alternatives_spanish:
  - y comes
  - y luego comerás
  lexicon: HALOT
  rationale: Aquí el hebreo continúa la secuencia de resultado futura. En español, el futuro expresa mejor esa consecuencia esperada que el presente.
- source_word: וְשָׂבָעְתָּ
  english_pob_choice: and are satisfied
  chosen_spanish: y quedarás satisfecho
  alternatives_spanish:
  - y te saciarás
  - y estarás satisfecho
  lexicon: HALOT
  rationale: «Quedarás satisfecho» comunica el resultado de comer hasta saciarse sin perder la idea de plenitud. «Te saciarás» también sería válido, pero «quedarás satisfecho» suena más sobrio y general.
theological_decisions:
- issue: Abundancia como don recibido, no como mérito humano
  english_pob_reading: Material provisions received by Israel through God's gift, without adding moral evaluation beyond the text
  chosen_spanish_reading: Bienes materiales recibidos como don de Yahvé, sin añadir una valoración moral que el versículo todavía no formula
  alternative_spanish_readings:
  - Una paráfrasis de advertencia dentro del propio versículo
  - Una insinuación de que los bienes son ilegítimos
  rationale: El texto enumera bienes concretos que Israel no produjo. En español se conserva esa sencillez y no se traslada la amonestación del contexto inmediato al versículo mismo.
  doctrine_reference: Contexto literario de Deuteronomio 6:10–12
- issue: Mantenimiento del singular covenantal
  english_pob_reading: Retain singular 'you' throughout
  chosen_spanish_reading: Mantener el singular «tú»/«tú no...» en toda la cláusula
  alternative_spanish_readings:
  - Pasar a plural implícito
  - Reformular con impersonal
  rationale: El hebreo se dirige a Israel en singular. Mantenerlo en español conserva la forma pactal del discurso sin volverlo artificial.
  doctrine_reference: Uso discursivo del singular en Deuteronomio
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail inglés, que afinó la imagen a «hewn cisterns» para mayor naturalidad sin cambiar el sentido. En español se incorporó esa precisión con «cisternas labradas».
  spanish_consistency_notes:
  - Se usó «Yahvé» como nombre divino por norma del proyecto, aunque este versículo no lo contiene explícitamente.
  - Se evitó «Cristo» y cualquier terminología no presente en el hebreo.
  - Se mantuvo un registro bíblico claro y contemporáneo, con «cisternas» para la precisión técnica y «quedarás satisfecho» para una sintaxis natural en español.
  - La cláusula final se vertió en futuro para reflejar la secuencia resultativa del hebreo, coherente con la nota auditada en inglés.
