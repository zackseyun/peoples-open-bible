review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el hebreo y el rastro POB en los puntos principales: condición casuística (''Y si''), sujeto genérico (''el levita''), repetición verbal (''viene ... y viene''), metonimia literal (''puertas'' con nota), residencia (''donde reside''), y el nombre divino ''Yahvé''. Sin embargo, la nota [b] no preserva plenamente las alternativas auditadas en inglés, que incluyen tanto ''con todo el anhelo de su alma'' como una opción más idiomática equivalente a ''con todo el deseo de su corazón''.'
  spanish_quality_summary: El español es claro y digno. La sintaxis principal es natural. 'De una de tus puertas' suena algo extraño en español, pero es defendible por la decisión de máxima cercanía léxica y queda aclarado por la nota cultural. La única reparación necesaria es normalizar la redacción/puntuación de la nota [b] y ampliar su contenido para reflejar mejor la alternativa léxica preservada en el expediente inglés.
  glossary_alignment: 'Buena alineación con el glosario del proyecto: יהוה -> ''Yahvé'' correctamente; no hay conflictos con otros términos sensibles. ''Alma'' para נֶפֶשׁ está bien en este contexto de deseo intenso, y ''reside'' conserva el matiz de גָּר sin sobreinterpretar.'
  issues:
  - severity: medium
    issue: La nota [b] es incompleta y está mal puntuada
    rationale: 'El expediente inglés preserva dos alternativas relevantes (''with all his heart’s desire'' / ''with all the longing of his soul''). La nota española solo ofrece una, además con comillas y prefijo poco naturales (''O: ...''). Debe reflejar mejor el abanico léxico auditado.'
  revised_spanish_text: Y si el levita viene de una de tus puertas[a], de entre todo Israel, donde reside, y viene con todo el deseo de su alma al lugar que Yahvé escogerá[b],
  revised_footnotes:
  - marker: a
    text: Literalmente, "de una de tus puertas". Aquí "puertas" funciona metonímicamente por una ciudad o asentamiento cívico.
    reason: cultural_note
  - marker: b
    text: 'O: "con todo el anhelo de su alma"; o: "con todo el deseo de su corazón".'
    reason: lexical_alternative
  revision_rationale: Se conserva intacto el texto principal porque es fiel al hebreo y al expediente POB. Solo se corrige y amplía la nota [b] para preservar adecuadamente las alternativas léxicas documentadas y mejorar el español editorial.
