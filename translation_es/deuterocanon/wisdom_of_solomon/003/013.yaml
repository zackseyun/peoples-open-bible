    reason: lexical_alternative
  - marker: c
    text: La expresión puede referirse a la futura intervención o revisión de Dios respecto de las almas humanas; por eso puede implicar vindicación o juicio.
    reason: alternative_reading
  revision_rationale: Se ajusta ἀμίαντος a «sin mancha» para evitar la sobrecarga mariológica de «inmaculada» y se cambia «visita» por «visitación» para reflejar mejor el registro bíblico y la ambigüedad de ἐπισκοπή. Se mantiene el resto del texto, que es fiel al griego y al razonamiento del POB inglés.
