translation:
  language: es
  text: 'Pero Jesús, al percibir[a] sus pensamientos, respondió y les dijo: «¿Por qué razonan en sus corazones?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «al conocer sus razonamientos».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπιγνοὺς
  english_pob_choice: perceiving
  chosen_spanish: al percibir
  alternatives_spanish:
  - al conocer
  - al reconocer
  - al darse cuenta de
  lexicon: BDAG
  rationale: El aoristo participial de ἐπιγινώσκω expresa que Jesús advierte plenamente lo que ellos estaban pensando. «Al percibir» comunica esa conciencia de forma natural en español y sin añadir explicaciones sobre el modo de conocimiento.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: δέ introduce un giro narrativo suave con matiz de contraste respecto de la escena anterior. «Pero» conserva bien ese cambio en español.
- source_word: διαλογισμοὺς
  english_pob_choice: thoughts
  chosen_spanish: pensamientos
  alternatives_spanish:
  - razonamientos
  - deliberaciones
  lexicon: BDAG
  rationale: En este contexto se refiere a las reflexiones internas de ellos. «Pensamientos» es natural y claro; la forma verbal posterior mantiene el matiz activo de razonar.
- source_word: ἀποκριθεὶς εἶπεν
  english_pob_choice: answered and said
  chosen_spanish: respondió y les dijo
  alternatives_spanish:
  - respondió
  - les dijo
  lexicon: BDAG
  rationale: La fórmula narrativa semítica se conserva con ambos verbos. En español, «respondió y les dijo» refleja adecuadamente la secuencia del texto sin sonar forzado.
- source_word: Τί
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿Qué
  - ¿Para qué
  lexicon: BDAG
  rationale: Aunque τί puede significar «qué», aquí con διαλογίζεσθε funciona idiomáticamente como una pregunta por la razón. «¿Por qué» es la opción más fiel al sentido y natural en español.
- source_word: διαλογίζεσθε
  english_pob_choice: are you reasoning
  chosen_spanish: razonan
  alternatives_spanish:
  - están razonando
  - discuten mentalmente
  - deliberan
  lexicon: BDAG
  rationale: El presente medio indica un proceso mental en curso. «Razonan» mantiene el verbo cognitivo con suficiente fuerza, y evita una paráfrasis más larga que diluiría la inmediatez de la pregunta.
- source_word: ἐν ταῖς καρδίαις ὑμῶν
  english_pob_choice: in your hearts
  chosen_spanish: en sus corazones
  alternatives_spanish:
  - dentro de ustedes
  - en lo profundo de ustedes
  lexicon: BDAG
  rationale: «Corazones» conserva la antropología bíblica del centro interior de pensamiento y voluntad. Aunque «corazones» puede sonar algo más semítico, es la forma más fiel al giro bíblico de καρδία y mantiene el lenguaje del texto.
theological_decisions:
- issue: Conocimiento de Jesús de los pensamientos internos
  english_pob_reading: Render the text straightforwardly as Jesus perceiving their thoughts without adding explanatory language about the mode of knowledge.
  chosen_spanish_reading: Presentar que Jesús percibe sus pensamientos sin explicar el mecanismo de ese conocimiento.
  alternative_spanish_readings:
  - Jesús conoció sobrenaturalmente sus pensamientos
  - Jesús adivinó lo que pensaban
  rationale: El versículo afirma el hecho de la percepción de Jesús, pero no explica cómo la obtiene. La traducción evita tanto una explicitación sobrenatural añadida como una minimización escéptica, preservando la tensión del texto.
  doctrine_reference: Affirmations; Translation philosophy §3
translation_notes:
  revision_awareness: Se corrige la validación anterior anclando la nota al marcador [a] en el texto español, manteniendo el mismo sentido y la misma alternativa lexical documentada en el audit trail.
  spanish_consistency_notes:
  - Se conservó la fórmula narrativa con dos verbos («respondió y les dijo») por fidelidad al patrón semítico del griego.
  - Se eligió «pensamientos» en el sustantivo y «razonan» en el verbo para reflejar la relación entre διαλογισμοί y διαλογίζεσθε sin volver ambas expresiones idénticas.
  - Se mantuvo «corazones» para καρδίαις, respetando el lenguaje bíblico del interior humano.
  - No se introdujo ninguna explicación sobre el modo del conocimiento de Jesús, en coherencia con el registro auditado.
