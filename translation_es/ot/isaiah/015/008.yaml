    rationale: 'Las decisiones léxicas registran «y hasta Beer-elim», mientras el texto dice «y su aullido hasta Beer-elim». No es error de traducción, pero conviene coherencia formulando la línea completa con el mismo sustantivo repetido: «y su lamento hasta Beer-elim».'
  revised_spanish_text: Porque el clamor[a] ha rodeado la frontera de Moab; su lamento llega hasta Eglaim, y su lamento hasta Beer-elim[b].
