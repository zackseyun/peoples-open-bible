  to: Que tus misericordias se adelanten pronto a nosotros[a]; y pon alabanza en la boca de los que han caído y cuyas almas[b] están quebrantadas, habiéndonos dado paz.
  rationale: Se reemplazó «nos salgan pronto al encuentro» por «se adelanten pronto a nosotros» para reflejar mejor προκαταλαβέτωσαν sin añadir una imagen innecesaria. Se cambió «habiendo hecho paz para nosotros» por «habiéndonos dado paz» porque expresa de manera natural en español el participio aoristo de acción completada y el resultado de εἰρήνην, sin alejarse del sentido fuente. Se mantuvieron «misericordias», «alabanza» y «almas» por su buena fidelidad al griego y al rastro inglés.
