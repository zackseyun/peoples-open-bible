review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien el lamento autobiográfico y el contraste entre haber dado a luz y quedar sin hijos. Sin embargo, dos elecciones importantes debilitan la fidelidad léxica: «muchas veces tristemente desgraciada» no preserva adecuadamente el colorido intensivo de πολλάκις τρισαθλία, y «he llegado a no ser madre de ninguno» suena menos natural en español y no expresa tan bien el perfecto resultativo paradójico como una formulación más directa.'
  spanish_quality_summary: El español es generalmente claro y digno, pero «tristemente desgraciada» suena añadido y poco idiomático respecto al griego, y «he llegado a no ser madre de ninguno» resulta algo forzado. Conviene una redacción más natural y literariamente fuerte, manteniendo el paralelismo del lamento.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. Las decisiones relevantes aquí son de intensidad retórica y naturalidad sintáctica: conviene conservar «triple/muchas veces» en la nota y usar «hijos» en el texto con nota sobre «hijos varones».'
  issues:
  - severity: medium
    issue: «muchas veces tristemente desgraciada» diluye τρισαθλία
    rationale: τρισαθλία significa literalmente «tres veces desgraciada / triplemente desdichada», no «tristemente desgraciada». La versión actual pierde el matiz llamativo que el inglés auditado preserva en nota.
  - severity: medium
    issue: «he llegado a no ser madre de ninguno» es poco natural
    rationale: Aunque intenta reflejar γεγένημαι, en español suena torpe y abstracto. «he llegado a ser madre de ninguno» además no funciona; mejor «he venido a ser madre de ninguno» o, más natural, «he quedado sin ser madre de ninguno» tampoco. La opción más clara y fiel al resultado paradójico es «he venido a ser madre de ninguno» o mejor «he llegado a ser madre de ninguno» no es idiomática. Lo más natural es «he venido a quedar madre de ninguno» tampoco. Por ello conviene «he venido a ser madre de ninguno» como calco moderado, o mejor «he llegado a quedar sin ninguno» pero eso pierde μήτηρ. Se recomienda «he venido a ser madre de ninguno» como la menos mala y más cercana.
  - severity: low
    issue: La puntuación puede simplificarse
    rationale: El encadenamiento de comas funciona, pero una formulación algo más limpia mejora la lectura sin apartarse del griego.
