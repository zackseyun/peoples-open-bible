translation:
  language: es
  text: 'Como una jaula[a] llena de aves, así sus casas están llenas de engaño[b]; por eso se han hecho grandes y se han enriquecido.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse como «canasto» o «gallinero»; el hebreo nombra un recipiente para aves.'
    reason: lexical_alternative
  - marker: b
    text: '«Engaño» también puede traducirse como «fraude» o «traición»; el hebreo abarca en sentido amplio la conducta deshonesta y explotadora.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כְלוּב
  english_pob_choice: cage
  chosen_spanish: jaula
  alternatives_spanish:
  - canasto
  - gallinero
  lexicon: HALOT
  rationale: El término apunta a un recipiente/encierro para aves. En español, «jaula» comunica de forma natural la imagen de aves contenidas y retenidas, sin perder la fuerza visual del símil. «Canasto» o «gallinero» serían opciones posibles según el matiz, pero aquí el contexto favorece la idea de un encierro lleno de aves.
- source_word: מָלֵא עוֹף
  english_pob_choice: full of birds
  chosen_spanish: llena de aves
  alternatives_spanish:
  - llena de pájaros
  - llena de aves voladoras
  lexicon: HALOT
  rationale: «עוֹף» nombra aves en sentido amplio. «Aves» es un español sobrio y amplio, mientras que «pájaros» sería más coloquial y «aves voladoras» redundante.
- source_word: כֵּן
  english_pob_choice: so
  chosen_spanish: así
  alternatives_spanish:
  - de la misma manera
  - de este modo
  lexicon: HALOT
  rationale: 'La partícula introduce comparación: como la jaula está llena de aves, así sus casas están llenas de engaño. «Así» reproduce bien esa relación comparativa en español.'
- source_word: בָּתֵּיהֶם
  english_pob_choice: their houses
  chosen_spanish: sus casas
  alternatives_spanish:
  - sus hogares
  - sus moradas
  lexicon: HALOT
  rationale: El plural literal es «sus casas». Mantener «casas» conserva la imagen concreta de viviendas/estancias enriquecidas por medios injustos.
- source_word: מְלֵאִים מִרְמָה
  english_pob_choice: are full of deceit
  chosen_spanish: están llenas de engaño
  alternatives_spanish:
  - están llenas de fraude
  - están llenas de treta
  lexicon: HALOT
  rationale: «מִרְמָה» abarca engaño, fraude y conducta tramposa. «Engaño» es el equivalente amplio y natural en español; «fraude» estrecha el sentido hacia lo jurídico-económico, y «treta» suena más idiomático pero menos completo en este contexto.
- source_word: עַל כֵּן
  english_pob_choice: therefore
  chosen_spanish: por eso
  alternatives_spanish:
  - por lo tanto
  - así que
  lexicon: HALOT
  rationale: La frase marca consecuencia. «Por eso» es claro, natural y mantiene el valor resultativo del hebreo sin endurecer el registro.
- source_word: גָּדְל֖וּ
  english_pob_choice: have become great
  chosen_spanish: se han hecho grandes
  alternatives_spanish:
  - han crecido
  - se han vuelto poderosos
  lexicon: HALOT
  rationale: El verbo expresa llegar a ser grande o importante. «Se han hecho grandes» conserva ese valor de aumento de estatus; «se han vuelto poderosos» interpreta más de lo que exige la forma verbal.
- source_word: וַיַּעֲשִׁירוּ
  english_pob_choice: and grown rich
  chosen_spanish: y se han enriquecido
  alternatives_spanish:
  - y han acumulado riquezas
  - y se han vuelto ricos
  lexicon: HALOT
  rationale: El verbo significa hacerse rico. «Se han enriquecido» es directo y natural en español. «Han acumulado riquezas» introduce una explicación más expansiva que el hebreo no requiere.
translation_notes:
  revision_awareness: 'El pasaje concuerda altamente con el texto base y con el seguimiento inglés: no hubo revisiones aplicadas en la última pasada, y la redacción española conserva el símil central, el valor resultativo de עַל כֵּן y la progresión «se han hecho grandes / se han enriquecido».'
  spanish_consistency_notes:
  - Se mantuvo «casas» para conservar la imagen concreta y no suavizarla en «hogares».
  - Se eligió «engaño» como término amplio, evitando estrechar מִרְמָה a un fraude meramente financiero.
  - La formulación «se han hecho grandes» sigue de cerca la evolución de גָּדְלוּ sin convertirla en una paráfrasis interpretativa.
