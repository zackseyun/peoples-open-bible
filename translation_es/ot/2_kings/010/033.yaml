translation:
  language: es
  text: desde el Jordán hacia el este, toda la tierra de Galaad—los gaditas, los rubenitas y los manasitas—desde Aroer, que está junto al valle del Arnón[a], y Galaad y Basán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que está sobre el Arnón»; el hebreo נַחַל puede referirse a un cauce, wadi o valle.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִן הַיַּרְדֵּן
  english_pob_choice: from the Jordan
  chosen_spanish: desde el Jordán
  alternatives_spanish:
  - del Jordán
  - desde el río Jordán
  lexicon: HALOT
  rationale: La preposición מִן indica punto de partida territorial. En español, «desde» comunica mejor el inicio de la delimitación geográfica que un simple «de». Se conserva el nombre propio «Jordán» sin añadir «río», porque el topónimo ya identifica el curso de agua.
- source_word: מִזְרַח הַשֶּׁמֶשׁ
  english_pob_choice: eastward
  chosen_spanish: hacia el este
  alternatives_spanish:
  - al este
  - hacia la salida del sol
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente direccional y geográfica. «Hacia el este» suena natural en español moderno y conserva el sentido de orientación sin volverlo más interpretativo que el original.
- source_word: כָּל אֶרֶץ הַגִּלְעָד
  english_pob_choice: all the land of Gilead
  chosen_spanish: toda la tierra de Galaad
  alternatives_spanish:
  - toda la tierra de Gilead
  - todo el territorio de Galaad
  lexicon: HALOT
  rationale: «Tierra» refleja bien אֶרֶץ en este contexto regional y bíblico. Se usa «Galaad» como forma española tradicional y transparente. «Toda» conserva la extensión total del territorio.
- source_word: הַגָּדִי וְהָרֻאובֵנִי וְהַמְנַשִּׁי
  english_pob_choice: the Gadites, the Reubenites, and the Manassites
  chosen_spanish: los gaditas, los rubenitas y los manasitas
  alternatives_spanish:
  - Gad, Rubén y Manasés
  - los gaditas, rubenitas y manasitas
  lexicon: HALOT
  rationale: Los sufijos gentilicios señalan a los grupos tribales asentados en Transjordania. En español, los plurales étnicos expresan mejor el colectivo que los nombres singulares. Se conserva la enumeración tribal sin suavizarla a términos más eclesiásticos.
- source_word: מֵעֲרֹעֵר
  english_pob_choice: from Aroer
  chosen_spanish: desde Aroer
  alternatives_spanish:
  - de Aroer
  lexicon: HALOT
  rationale: Se mantiene el topónimo transliterado como punto de referencia fronteriza. «Desde» reproduce el valor de origen/límite que funciona en la fórmula geográfica.
- source_word: אֲשֶׁר עַל נַחַל אַרְנֹן
  english_pob_choice: which is by the Valley of the Arnon
  chosen_spanish: que está junto al valle del Arnón
  alternatives_spanish:
  - que está sobre el valle del Arnón
  - que está junto al Arnón
  lexicon: HALOT
  rationale: La POB inglesa revisada optó por «Valley of the Arnon» para reflejar נַחַל en forma formal y cercana al hebreo. «Junto al valle del Arnón» comunica la relación locativa de עַל sin decidir en exceso entre valle, cauce o barranco, y mantiene la ambigüedad léxica documentada.
- source_word: וְהַגִּלְעָד וְהַבָּשָׁן
  english_pob_choice: and Gilead and Bashan
  chosen_spanish: y Galaad y Basán
  alternatives_spanish:
  - e incluso Galaad y Basán
  - y también Galaad y Basán
  lexicon: HALOT
  rationale: Se conserva el añadido final como mera coordinación, sin introducir énfasis que no está en la revisión inglesa final. Los nombres propios se adaptan a la forma española habitual «Galaad» y «Basán».
translation_notes:
  revision_awareness: 'La redacción española sigue la revisión más reciente del audit trail inglés: «Valley of the Arnon» en lugar de una paráfrasis más libre, y una simple coordinación final («y Galaad y Basán») sin añadir fuerza intensiva. También se preserva la función fronteriza del hebreo mediante preposiciones de origen y dirección.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el Tetragrámaton.
  - Se usa «Galaad», «Basán» y «Jordán» como formas españolas estándar para topónimos bíblicos ampliamente reconocibles.
  - Se opta por plurales tribales («gaditas», «rubenitas», «manasitas») para reflejar el sentido colectivo de los gentilicios hebreos.
  - La nota [a] se ancla en «hacia el este» porque allí está la ambigüedad direccional del hebreo מִזְרַח הַשֶּׁמֶשׁ.
