translation:
  language: es
  text: Pero ustedes no deben indagar en mi proceder, porque no les diré hasta que se haya cumplido lo que yo estoy haciendo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐξερευνήσετε
  english_pob_choice: investigate
  chosen_spanish: investigar
  alternatives_spanish:
  - examinar detenidamente
  - sondear
  - indagar
  lexicon: LSJ
  rationale: ἐξερευνήσετε expresa una búsqueda o pesquisa minuciosa. «Investigar» conserva esa idea de examinar con detenimiento sin volver la frase demasiado técnica o forzada en español.
- source_word: τὴν πρᾶξίν μου
  english_pob_choice: my action
  chosen_spanish: mi acción
  alternatives_spanish:
  - mi obra
  - mi proceder
  - lo que hago
  lexicon: LSJ
  rationale: πρᾶξις puede referirse a una acción, obra o proceder. «Mi acción» mantiene el sustantivo explícito que el texto griego usa, en línea con la revisión inglesa que preservó el sustantivo en la primera cláusula.
- source_word: οὐ γὰρ ἐρῶ ὑμῖν
  english_pob_choice: for I will not tell you
  chosen_spanish: porque no les diré nada
  alternatives_spanish:
  - porque no les diré
  - porque no les hablaré de ello
  - porque no se lo diré
  lexicon: LSJ
  rationale: ἐρῶ aquí funciona naturalmente como «decir/tell». En español, «no les diré nada» transmite la negativa de comunicar información sin añadir un complemento no explícito en el griego.
- source_word: ἕως τοῦ τελεσθῆναι
  english_pob_choice: until ... has been completed
  chosen_spanish: hasta que se haya cumplido
  alternatives_spanish:
  - hasta que se haya terminado
  - hasta que se complete
  - hasta el cumplimiento de
  lexicon: LSJ
  rationale: El infinitivo pasivo τελεσθῆναι señala alcanzar su culminación o cumplimiento. «Se haya cumplido» comunica bien ese término de finalización en español natural.
- source_word: ἃ ἐγὼ ποιῶ
  english_pob_choice: what I am doing
  chosen_spanish: lo que yo estoy haciendo
  alternatives_spanish:
  - lo que hago
  - las cosas que hago
  - mi proceder
  lexicon: LSJ
  rationale: La forma presente ποιῶ indica una acción en curso. «Lo que yo estoy haciendo» preserva ese aspecto progresivo y evita reducirlo a una sola acción puntual.
translation_notes:
  revision_awareness: La redacción española sigue de cerca la decisión revisada del POB inglés de mantener un sustantivo explícito para τὴν πρᾶξίν μου en la primera cláusula, mientras expresa la segunda referencia con un verbo progresivo para sonar natural en español.
  spanish_consistency_notes:
  - Se usa «investigar» para ἐξερευνήσετε, coherente con la terminología POB.
  - Se mantiene el contraste entre el sustantivo «mi acción» y la expresión verbal «lo que yo estoy haciendo», reflejando la revisión inglesa.
  - «Y ustedes»/«Pero ustedes» se conserva con valor adversativo de δέ en el contexto inmediato.
