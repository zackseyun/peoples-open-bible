review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la secuencia del hebreo: cruce del Jordán, residencia en la tierra que Yahvé da como herencia, descanso de los enemigos circundantes y vida segura. También conserva correctamente Yahvé. Sin embargo, hay dos problemas de fidelidad/claridad: «les da para heredar» suena poco idiomático en español y no expresa tan bien como podría la idea de posesión heredada; y la nota «dormen seguros» no corresponde al sentido de וִישַׁבְתֶּם בֶּטַח, que habla de habitar/vivir con seguridad, no de dormir.'
  spanish_quality_summary: El texto es generalmente legible y digno, pero «Yahvé, su Dios» con coma es menos natural que «Yahvé su Dios» o «Yahvé, el Dios de ustedes» en este contexto. Además, «alrededor de ustedes» es comprensible, aunque algo pesado junto con el voseo implícito de «ustedes». La frase mejora en naturalidad con «les da para que la hereden» y una nota léxica correcta.
  glossary_alignment: Alinea bien con la terminología del proyecto al usar «Yahvé». «Tierra» es adecuado para בָּאָרֶץ. «Habiten» y «vivirán seguros» respetan el campo semántico de ישב y בטח. La principal desviación está en la nota al pie, que introduce un verbo ajeno al original («duerman»/«dormen»), y en una formulación española mejorable para מַנְחִיל.
  issues:
  - severity: medium
    issue: La nota al pie traduce mal la alternativa léxica
    rationale: 'El inglés preserva «Or ''dwell securely.''». El borrador dice «O: «dormen seguros».», que cambia el verbo de residencia por uno de sueño y además contiene una forma no estándar («dormen»).'
  - severity: medium
    issue: «les da para heredar» es poco idiomático
    rationale: Aunque intenta reflejar el causativo de נחל, en español suena forzado. «les da para que la hereden» o «les da en herencia» expresa mejor la idea sin perder el matiz de herencia.
  - severity: low
    issue: Puntuación menos natural en «Yahvé, su Dios»
    rationale: La coma separa innecesariamente la aposición posesiva; «Yahvé su Dios» fluye mejor en español bíblico moderno y sigue fielmente el hebreo.
  revised_spanish_text: Pero cuando crucen el Jordán y habiten en la tierra que Yahvé su Dios les da para que la hereden, y él les dé descanso de todos sus enemigos alrededor de ustedes, entonces vivirán seguros[a].
  revised_footnotes:
  - marker: a
    text: 'O: «habitarán con seguridad».'
    reason: lexical_alternative
  revision_rationale: Se corrigió la nota al pie para reflejar fielmente la alternativa de וִישַׁבְתֶּם בֶּטַח, se mejoró «les da para heredar» a una formulación más natural en español que conserva el motivo de herencia, y se suavizó la puntuación en «Yahvé su Dios». No se requiere adjudicación adicional porque los cambios son claros y de bajo riesgo doctrinal.
