translation:
  language: es
  text: Que su campamento quede desolado[a][b]; que no haya nadie que habite en sus tiendas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Campamento» conserva la imagen concreta del hebreo; también puede entenderse como «habitación» o «morada».
    reason: lexical_alternative
  - marker: b
    text: «Tiendas» sigue el hebreo literal; por extensión, puede referirse a sus viviendas.
    reason: lexical_alternative
lexical_decisions:
- source_word: תְּהִי
  english_pob_choice: May ... become
  chosen_spanish: Que ... quede
  alternatives_spanish:
  - Que ... sea
  - Que ... llegue a ser
  lexicon: HALOT
  rationale: El jussivo de היה expresa un deseo o imprecación; en español, «que ... quede» comunica bien ese matiz volitivo sin sonar forzado.
- source_word: טִירָתָם
  english_pob_choice: their encampment
  chosen_spanish: su campamento
  alternatives_spanish:
  - su encampamiento
  - su habitación
  - su asentamiento
  lexicon: HALOT
  rationale: «Campamento» conserva la imagen concreta y colectiva del hebreo, y es natural en español bíblico contemporáneo.
- source_word: נְשַׁמָּה
  english_pob_choice: desolate
  chosen_spanish: desolado
  alternatives_spanish:
  - hecho desolación
  - arruinado
  - devastado
  lexicon: HALOT
  rationale: El adjetivo español refleja el valor de devastación/ruina del término hebreo y funciona bien con «quede».
- source_word: בְּאָהֳלֵיהֶם
  english_pob_choice: in their tents
  chosen_spanish: en sus tiendas
  alternatives_spanish:
  - en sus viviendas
  - en sus moradas
  lexicon: HALOT
  rationale: «Tiendas» reproduce la imagen literal de אֹהֶל y mantiene el paralelismo poético con «campamento».
- source_word: אַל יְהִי
  english_pob_choice: let there be no
  chosen_spanish: que no haya
  alternatives_spanish:
  - que no exista
  - no haya
  lexicon: HALOT
  rationale: La construcción negativa jussiva se expresa de forma natural con «que no haya», preservando el tono de petición/imprecación.
- source_word: יֹשֵׁב
  english_pob_choice: one dwelling
  chosen_spanish: nadie que habite
  alternatives_spanish:
  - ningún habitante
  - ninguno que more
  - nadie morando
  lexicon: HALOT
  rationale: El participio de ישב en este contexto señala a quien habita; «nadie que habite» mantiene el valor verbal y el sentido de ausencia total.
theological_decisions:
- issue: Imprecación en forma de deseo volitivo
  english_pob_reading: Render as petitions/wishes rather than as simple futures.
  chosen_spanish_reading: Traducir con construcciones optativas («Que ...», «que no haya ...») y no como futuro descriptivo.
  alternative_spanish_readings:
  - Su campamento será desolado; no habrá nadie que habite en sus tiendas.
  - Su campamento quedará desolado; no habrá nadie habitando en sus tiendas.
  rationale: El hebreo usa formas jussivas/volitivas; la versión española debe conservar ese carácter de ruego o imprecación ante Dios, no convertirlo en mera predicción.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando en el texto los marcadores de nota [a] y [b]. No se introdujeron cambios de contenido más allá de hacer explícitas las alternativas léxicas en el verso.
  spanish_consistency_notes:
  - Se mantuvo el paralelismo entre «campamento» y «tiendas» para reflejar la imaginería concreta del hebreo.
  - Se evitó «SEÑOR» y otras sustituciones no presentes en el texto fuente.
  - La sintaxis optativa en español preserva la fuerza jussiva del hebreo.
