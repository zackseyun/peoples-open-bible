review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: mandato de recordar la esclavitud en Egipto y de guardar/hacer estos estatutos. También conserva correctamente la nota léxica sobre עֶבֶד como «esclavo» con alternativa «siervo». Sin embargo, la pareja verbal וְשָׁמַרְתָּ וְעָשִׂיתָ corresponde más estrechamente a «guardar y hacer»; «guardar y cumple» es aceptable pero desplaza el segundo verbo desde una realización directa a una formulación más interpretativa.'
  spanish_quality_summary: El español es claro, natural y digno. La frase suena bien en registro bíblico moderno. Aun así, «guarda y cumple» introduce una leve redundancia semántica en español legal-religioso, mientras que «guarda y pon en práctica» o «guarda y haz» preserva mejor la distinción de los dos verbos. Para mantener fidelidad y buena legibilidad, conviene un ajuste menor.
  glossary_alignment: No hay conflicto con la terminología del proyecto. «esclavo» alinea con la preferencia por términos fuertes de servidumbre cuando la condición de bondage es saliente. «estatutos» también alinea bien con חֻקִּים. No aparecen términos sensibles como Yahvé/Mesías.
  issues:
  - severity: medium
    issue: La expresión «guarda y cumple» atenúa la distinción verbal de שׁמר + עשה.
    rationale: El hebreo usa dos verbos coordinados, uno de observancia/guardia y otro de ejecución/acción. «Cumplir» comunica obediencia, pero se superpone demasiado con «guardar». Una formulación como «guarda y pon en práctica» preserva mejor ambas dimensiones sin sonar mecánica.
  revised_spanish_text: Recuerda que fuiste esclavo en Egipto[a], y guarda y pon en práctica estos estatutos.
  revised_footnotes:
  - marker: a
    text: O «siervo». El hebreo עֶבֶד puede significar siervo o esclavo, pero aquí «esclavo» refleja mejor la condición de servidumbre de Israel en Egipto.
    reason: lexical_alternative
  revision_rationale: Se realiza una reparación menor para reflejar con más precisión la pareja legal hebrea «guardar y hacer», evitando que ambos verbos queden demasiado fusionados en «guardar y cumplir». «Pon en práctica» mantiene fidelidad semántica y suena natural en español bíblico contemporáneo.
