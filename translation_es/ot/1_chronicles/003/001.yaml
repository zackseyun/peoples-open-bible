translation:
  language: es
  text: 'Estos fueron los hijos de David que le nacieron en Hebrón: el primogénito[a], Amnón, de Ahinoam la jezreelita; el segundo, Daniel, de Abigail la carmelita.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: En el pasaje paralelo de 2 Samuel 3:3, este hijo se llama Quileab, no Daniel.
    reason: alternative_reading
lexical_decisions:
- source_word: וְאֵלֶּה
  english_pob_choice: Now these
  chosen_spanish: Y estos
  alternatives_spanish:
  - Ahora estos
  - Estos
  lexicon: HALOT
  rationale: El hebreo abre una nueva lista genealógica con fuerza demostrativa y continuidad narrativa. En español, 'Y estos' conserva la transición sin añadir una glosa temporal no explícita en el hebreo.
- source_word: הָיוּ
  english_pob_choice: were
  chosen_spanish: fueron
  alternatives_spanish:
  - eran
  lexicon: HALOT
  rationale: En un aviso genealógico pasado, 'fueron' transmite adecuadamente el valor perfectivo del hebreo sin sonar forzado.
- source_word: בְּנֵי דָוִיד
  english_pob_choice: David’s sons
  chosen_spanish: los hijos de David
  alternatives_spanish:
  - los hijos varones de David
  - los hijos de David
  lexicon: HALOT
  rationale: '''בְּנֵי'' puede traducirse literalmente como ''hijos''; en español resulta natural y suficientemente preciso para una genealogía. Se evita ''descendientes'' porque borraría la especificidad masculina del hebreo.'
- source_word: אֲשֶׁר נוֹלַד ל֖וֹ
  english_pob_choice: who were born to him
  chosen_spanish: que le nacieron
  alternatives_spanish:
  - que fueron nacidos a él
  - que le fueron nacidos
  lexicon: HALOT
  rationale: El pasivo hebreo con לּוֹ expresa pertenencia/filiación; 'le nacieron' mantiene la pasividad relativa y suena natural en español bíblico contemporáneo, sin convertirlo en una formulación activa de paternidad más interpretativa.
- source_word: בְּחֶבְרוֹן
  english_pob_choice: in Hebron
  chosen_spanish: en Hebrón
  alternatives_spanish:
  - en Hebron
  lexicon: HALOT
  rationale: Topónimo normalizado en español con acento gráfico conforme a la adaptación usual.
- source_word: הַבְּכוֹר
  english_pob_choice: the firstborn
  chosen_spanish: el primogénito
  alternatives_spanish:
  - el primero en nacer
  - el mayor
  lexicon: HALOT
  rationale: '''Primogénito'' preserva el valor de estatus genealógico del hebreo mejor que una simple referencia a edad.'
- source_word: לַאֲחִינֹעַם הַיִּזְרְעֵאלִית
  english_pob_choice: by Ahinoam the Jezreelite
  chosen_spanish: de Ahinoam la jezreelita
  alternatives_spanish:
  - de Ahinoam la yizreelita
  - de Ahinoam la mujer de Jezreel
  lexicon: HALOT
  rationale: El לְ genealógico marca maternidad/parentesco; 'de' es la preposición española más natural en este marco. Se conserva el gentilicio femenino con forma transparente 'jezreelita'.
- source_word: שֵׁנִי
  english_pob_choice: the second
  chosen_spanish: el segundo
  alternatives_spanish:
  - segundo
  lexicon: HALOT
  rationale: Mantiene la estructura ordinal de la lista con artículo, como en español bíblico natural.
- source_word: דָּנִיֵּאל
  english_pob_choice: Daniel
  chosen_spanish: Daniel
  lexicon: HALOT
  rationale: Nombre propio transliterado de manera estándar en español.
- source_word: לַאֲבִיגַיִל הַכַּרְמְלִית
  english_pob_choice: by Abigail the Carmelite
  chosen_spanish: de Abigail la carmelita
  alternatives_spanish:
  - de Abigail la de Carmel
  - de Abigail la carmelita
  lexicon: HALOT
  rationale: Se conserva el gentilicio femenino con la forma habitual en español 'carmelita'. 'De' reproduce el valor genealógico del לְ, evitando una lectura locativa innecesariamente explicativa.
theological_decisions:
- issue: Tratamiento del dato genealógico y del nacimiento en pasado
  english_pob_reading: 'Simple past genealogical notice: ''were born to him'''
  chosen_spanish_reading: 'Aviso genealógico en pasado: ''le nacieron'''
  alternative_spanish_readings:
  - '''fueron nacidos a él'''
  - '''nacieron de él'''
  rationale: No hay carga doctrinal especial, pero sí una forma semítica de filiación que conviene no desactivar. 'Le nacieron' conserva el pasivo relacional del hebreo y evita una paráfrasis activa excesiva.
  doctrine_reference: Ninguna; decisión de fidelidad semántica y sintáctica al hebreo.
- issue: Valor del primogénito como estatus genealógico
  english_pob_reading: the firstborn
  chosen_spanish_reading: el primogénito
  alternative_spanish_readings:
  - el mayor
  - el primero
  rationale: '''Primogénito'' retiene el sentido técnico de rango y precedencia familiar, no solo de edad. Esto preserva la fuerza del hebreo en una lista dinástica.'
  doctrine_reference: Ninguna; decisión lexical-genealógica.
translation_notes:
  revision_awareness: El audit trail inglés mantiene la lectura optimizada 'Now these... who were born to him in Hebron' sin cambios, y conserva una nota de variante textual/nominativa para el hijo llamado Daniel en 1 Crónicas 3:1 frente a Quileab en 2 Samuel 3:3. La versión española sigue esa misma decisión, con una nota de pie para la variante onomástica.
  spanish_consistency_notes:
  - Se mantiene 'Y estos' para la apertura genealógica y 'le nacieron' para el pasivo relacional del hebreo.
  - Se usa 'primogénito' para הַבְּכוֹר y 'el segundo' para שֵׁנִי, conservando la secuencia ordinal.
  - Los gentilicios se normalizan en español como 'jezreelita' y 'carmelita' para coherencia léxica.
  - Se translitera 'Hebrón' con acento gráfico conforme al uso español estándar.
  - La nota [a] se ancla únicamente al nombre del hijo en el texto, como en el audit trail inglés.
