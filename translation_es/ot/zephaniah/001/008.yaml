translation:
  language: es
  text: Y en el día del sacrificio de Yahvé[a], castigaré a los funcionarios[b], a los hijos del rey y a todos los que visten ropa extranjera[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el sacrificio de Yahvé»; la frase también puede evocar un banquete sacrificial preparado por Yahvé en juicio (cf. 1:7).
    reason: alternative_reading
  - marker: b
    text: O «príncipes» o «gobernantes».
    reason: lexical_alternative
  - marker: c
    text: Es decir, prendas asociadas con pueblos extranjeros; la expresión puede implicar la adopción de costumbres o lealtades extranjeras, no solo una tela no nativa.
    reason: cultural_note
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se preserva el nombre divino personal del tetragrámaton con la forma española ya establecida en el proyecto. No se sustituye por un título como 'el SEÑOR', porque el texto fuente usa el nombre propio.
- source_word: זֶבַח
  english_pob_choice: the LORD’s sacrifice
  chosen_spanish: sacrificio
  alternatives_spanish:
  - sacrificio del Yahvé
  - banquete sacrificial
  lexicon: HALOT
  rationale: '''Sacrificio'' reproduce directamente el sustantivo hebreo. En español, la construcción posesiva ''del Yahvé'' resulta menos natural que ''de Yahvé'', pero aquí la frase se mantiene simple en el texto principal y se aclara la alternativa en nota por la ambigüedad cultual/judicial.'
- source_word: וּפָקַדְתִּי עַל
  english_pob_choice: I will punish
  chosen_spanish: castigaré
  alternatives_spanish:
  - visitaré con juicio
  - tomaré cuentas de
  lexicon: HALOT
  rationale: En contextos de juicio, פָּקַד con עַל expresa intervención punitiva. 'Castigaré' comunica esa fuerza judicial de manera clara y natural en español, sin perder el matiz de visita judicial.
- source_word: הַשָּׂרִים
  english_pob_choice: the officials
  chosen_spanish: los funcionarios
  alternatives_spanish:
  - los príncipes
  - los jefes
  - los gobernantes
  lexicon: HALOT
  rationale: '''Funcionarios'' refleja el rango de autoridad sin introducir por sí solo una idea hereditaria. ''Príncipes'' puede sonar demasiado nobiliario en español y ''gobernantes'' sería más amplio de lo que el término suele abarcar.'
- source_word: בְּנֵי הַמֶּלֶךְ
  english_pob_choice: the king’s sons
  chosen_spanish: los hijos del rey
  alternatives_spanish:
  - los hijos reales
  - los hijos del monarca
  lexicon: HALOT
  rationale: Se mantiene la relación familiar explícita y el masculino plural del hebreo. 'Hijos del rey' es transparente y preciso.
- source_word: כָּל הַלֹּבְשִׁים
  english_pob_choice: all who wear
  chosen_spanish: todos los que visten
  alternatives_spanish:
  - todos los que llevan
  - todos los que se visten con
  lexicon: HALOT
  rationale: El participio se vierte como relativa natural en español. 'Visten' conserva la acción habitual sin sobretraducir.
- source_word: מַלְבּוּשׁ נָכְרִי
  english_pob_choice: foreign clothing
  chosen_spanish: ropa extranjera
  alternatives_spanish:
  - vestidura extranjera
  - vestimenta foránea
  - ropa de extranjeros
  lexicon: HALOT
  rationale: '''Ropa extranjera'' comunica con claridad la asociación con lo extranjero. Aunque ''vestidura'' es más solemne, suena más marcada y menos natural para el lector moderno; ''foránea'' sería posible, pero menos inmediata. La nota preserva el matiz cultural señalado por el POB.'
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se conserva la decisión doctrinal del POB de rendir el Tetragrámaton como nombre propio y no como sustituto reverencial. En español, 'Yahvé' es la forma más estable y reconocible dentro de esta línea de traducción.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Posible sentido del 'sacrificio de Yahvé'
  english_pob_reading: the LORD’s sacrifice / sacrificial feast prepared by the LORD in judgment
  chosen_spanish_reading: el sacrificio de Yahvé
  alternative_spanish_readings:
  - el banquete sacrificial de Yahvé
  - el sacrificio preparado por Yahvé
  rationale: El hebreo puede sugerir tanto sacrificio como un banquete sacrificial en contexto de juicio. Se deja 'sacrificio' en el texto principal por fidelidad léxica y se explicita la alternativa en nota, sin borrar la tensión interpretativa.
  doctrine_reference: Zeph 1:7 context / POB lexical note
- issue: Sentido judicial de פקד con עַל
  english_pob_reading: I will punish
  chosen_spanish_reading: castigaré
  alternative_spanish_readings:
  - visitaré con juicio
  - tomaré cuentas de
  rationale: La acción divina aquí no es mera observación sino intervención judicial. 'Castigaré' transmite esa lectura con claridad pastoral y lexical, en línea con el POB.
  doctrine_reference: HALOT punitive visitation usage
translation_notes:
  revision_awareness: Se revisó el paquete fuente y el audit trail inglés. No hubo cambios editoriales posteriores relevantes; la versión más reciente del POB inglés quedó sin modificación tras la revisión y con alto acuerdo de cotejo.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יְהוָה según la política del proyecto.
  - Se usa 'funcionarios' para הַשָּׂרִים, evitando 'príncipes' en el cuerpo por claridad moderna.
  - '''Ropa extranjera'' conserva el matiz cultural señalado por el POB y se explica en nota.'
  - '''Castigaré'' expresa el valor judicial de פקד con עַל sin volver el verso excesivamente técnico.'
