translation:
  language: es
  text: Pero si el sol ya ha salido sobre él[a], hay culpa de sangre[b]. Sin falta deberá hacer restitución. Si no tiene nada[c], será vendido por su robo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más interpretativa: «si ocurre después del amanecer» o «si se hace de día». El hebreo dice literalmente: «si el sol ha salido sobre él».'
    reason: lexical_alternative
  - marker: b
    text: Es decir, en esta circunstancia, quien lo mate incurre en responsabilidad de sangre.
    reason: alternative_reading
  - marker: c
    text: Es decir, no tiene con qué hacer restitución; esta venta funciona como remedio de deuda por el robo.
    reason: cultural_note
lexical_decisions:
- source_word: אִם
  english_pob_choice: But if
  chosen_spanish: Pero si
  alternatives_spanish:
  - Si
  lexicon: HALOT
  rationale: La partícula es condicional, pero el contexto contrasta con el caso anterior; por eso «Pero si» conserva la oposición discursiva sin dejar de ser una condición.
- source_word: זָרְחָה הַשֶּׁמֶשׁ
  english_pob_choice: the sun has risen
  chosen_spanish: el sol ya ha salido
  alternatives_spanish:
  - el sol ha salido
  - ha amanecido
  - si ocurre de día
  lexicon: HALOT
  rationale: Mantiene la imagen concreta del sol como sujeto y expresa en español natural el valor perfecto/resultativo. «Ya» refuerza que el momento ya pasó, sin borrar la referencia literal al sol.
- source_word: עָלָיו
  english_pob_choice: on him
  chosen_spanish: sobre él
  alternatives_spanish:
  - en él
  - contra él
  lexicon: HALOT
  rationale: Conserva la preposición espacial del hebreo. En este contexto legal, «sobre él» mantiene la expresión figurada del texto sin convertirla en una paráfrasis interpretativa.
- source_word: דָּמִים לוֹ
  english_pob_choice: there is bloodguilt for him
  chosen_spanish: hay sangre sobre él
  alternatives_spanish:
  - hay culpa de sangre para él
  - tiene sangre sobre sí
  - es culpable de sangre
  lexicon: HALOT
  rationale: El hebreo usa דָּמִים en sentido jurídico de responsabilidad por sangre. Opto por una forma cercana y transparente que conserva la tensión lexical; «sangre sobre él» deja visible el modismo, mientras la nota aclara el sentido de sangreguilt/bloodguilt.
- source_word: שַׁלֵּם יְשַׁלֵּם
  english_pob_choice: He must surely make restitution
  chosen_spanish: Ciertamente deberá hacer restitución
  alternatives_spanish:
  - deberá pagar completamente
  - pagará sin falta
  - deberá resarcir
  lexicon: HALOT
  rationale: La combinación enfática se refleja con «Ciertamente deberá». «Hacer restitución» mantiene el matiz legal de compensación, más preciso que un simple «pagar».
- source_word: אִם אֵין לוֹ
  english_pob_choice: If he has nothing
  chosen_spanish: Si no tiene nada
  alternatives_spanish:
  - si no tiene medios
  - si no tiene con qué
  - si carece de recursos
  lexicon: HALOT
  rationale: Es una equivalencia idiomática natural del hebreo para falta de recursos. «Nada» preserva la brevedad del original, y el contexto legal permite entender que se trata de medios para pagar.
- source_word: וְנִמְכַּר
  english_pob_choice: then he shall be sold
  chosen_spanish: será vendido
  alternatives_spanish:
  - entonces será vendido
  - se le venderá
  - será puesto a la venta
  lexicon: HALOT
  rationale: El pasivo legal del hebreo se expresa con un futuro pasivo directo. En español, «será vendido» conserva la fuerza jurídica y evita una paráfrasis más explicativa.
- source_word: בִּגְנֵבָתוֹ
  english_pob_choice: for his theft
  chosen_spanish: por su robo
  alternatives_spanish:
  - a causa de su robo
  - por su hurto
  - debido a su robo
  lexicon: HALOT
  rationale: גנבה puede referirse al acto de robar o a lo robado; aquí el contexto penal favorece el acto. «Robo» es claro y natural en español, y mantiene el vínculo causal con la venta.
theological_decisions:
- issue: Muerte del intruso después del amanecer / responsabilidad de sangre
  english_pob_reading: The verse states that killing the intruder after sunrise incurs bloodguilt, in contrast to the previous verse's nighttime case.
  chosen_spanish_reading: El texto afirma que, si el sol ya ha salido sobre el intruso, hay responsabilidad de sangre; por tanto, matarlo en esa circunstancia no queda legitimado por este versículo.
  alternative_spanish_readings:
  - si amanece sobre él, hay sangre sobre él
  - hay sangre derramada por él
  - se le puede matar sin culpa
  rationale: Conservo la tensión legal del hebreo sin suavizarla. La formulación «hay sangre sobre él» deja visible el modismo y evita resolver el matiz por una explicación ética más amplia que el versículo no desarrolla.
  doctrine_reference: Mantener la tensión textual; no expandir más allá del contraste legal explícito del contexto inmediato.
translation_notes:
  revision_awareness: La revisión más reciente indica que no se requirieron cambios y que hubo alto acuerdo con el control cruzado; por eso se mantiene la estructura semántica del borrador base, ajustando el español para mayor naturalidad sin perder el trasfondo jurídico ni la literalidad del modismo de sangre.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma del proyecto solo cuando el texto lo requiera; este versículo no la contiene.
  - Se mantiene un registro jurídico sobrio, con «restitución» y pasivo legal («será vendido») para respetar el contexto forense.
  - «Hay sangre sobre él» preserva la tensión lexical del hebreo en lugar de sustituirla automáticamente por una explicación más suave.
  - El orden condicional-contrastivo «Pero si» refleja el enlace discursivo con el versículo anterior.
