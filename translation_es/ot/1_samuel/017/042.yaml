translation:
  language: es
  text: El filisteo miró y vio a David, y lo despreció, porque era un joven, rojizo[a] y bien parecido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «rubicundo»; el adjetivo hebreo puede indicar una coloración rojiza más general, no necesariamente solo el color del cabello.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּבֵּט
  english_pob_choice: looked
  chosen_spanish: miró
  alternatives_spanish:
  - observó
  - miró fijamente
  lexicon: HALOT
  rationale: נבט expresa dirigir la mirada o fijarse en algo. «Miró» reproduce con naturalidad el primer movimiento visual sin añadir intensidad no requerida por el hebreo.
- source_word: הַפְּלִשְׁתִּי
  english_pob_choice: the Philistine
  chosen_spanish: el filisteo
  alternatives_spanish:
  - el filisteo guerrero
  - el filisteo campeón
  lexicon: HALOT
  rationale: El hebreo usa la designación étnica simple. En español, «el filisteo» conserva esa forma sin introducir un título que el texto hebreo no da aquí.
- source_word: וַיִּרְאֶה אֶת־דָּוִד
  english_pob_choice: saw David
  chosen_spanish: vio a David
  alternatives_spanish:
  - divisó a David
  - alcanzó a ver a David
  lexicon: HALOT
  rationale: ראה es el verbo común «ver». «Vio a David» mantiene la secuencia narrativa de mirar y luego ver, sin sobretraducir.
- source_word: וַיִּבְזֵהוּ
  english_pob_choice: he despised him
  chosen_spanish: lo despreció
  alternatives_spanish:
  - lo desdeñó
  - lo trató con desprecio
  lexicon: HALOT
  rationale: בזה denota despreciar o considerar con desprecio. «Lo despreció» es breve, idiomático y conserva la fuerza personal del objeto.
- source_word: הָיָה נַעַר
  english_pob_choice: he was a youth
  chosen_spanish: era un muchacho
  alternatives_spanish:
  - era un joven
  - era un muchacho joven
  lexicon: HALOT
  rationale: נַעַר puede abarcar de muchacho a joven, según el contexto. «Muchacho» comunica la relativa juventud de David sin sugerir necesariamente niñez pequeña.
- source_word: וְאַדְמֹנִי
  english_pob_choice: ruddy
  chosen_spanish: rubicundo
  alternatives_spanish:
  - rojizo
  - de tez rojiza
  lexicon: HALOT
  rationale: El adjetivo indica una coloración rojiza o rubicunda, no necesariamente el color del cabello. «Rubicundo» es un equivalente natural y digno en español bíblico; evita estrechar el sentido a «pelirrojo» sin base obligatoria.
- source_word: עִם יְפֵה מַרְאֶה
  english_pob_choice: and handsome in appearance
  chosen_spanish: y de hermoso aspecto
  alternatives_spanish:
  - y de buen parecer
  - y bien parecido
  lexicon: HALOT
  rationale: La expresión combina עִם con «bello/hermoso de apariencia». «De hermoso aspecto» conserva la estructura descriptiva y evita la imposición de un modismo más interpretativo.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el hebreo masorético y concuerda sustancialmente con la revisión inglesa POB: secuencia de miró/ver, sujeto étnico simple, desprecio, juventud y descripción física. La principal decisión adaptada al español es renderizar אַדְמֹנִי como «rubicundo» para mantener la amplitud semántica señalada por la nota inglesa, con nota alternativa para no fijar indebidamente el rasgo en el cabello.'
  spanish_consistency_notes:
  - Se conserva «filisteo» como designación simple, sin añadir «campeón» o «guerrero».
  - Se mantiene la progresión verbal doble «miró y vio» para reflejar el hebreo.
  - «De hermoso aspecto» preserva el valor descriptivo de יְפֵה מַרְאֶה sin una paráfrasis más libre.
  - La nota sobre «rubicundo» deja abierta la posibilidad de una coloración general rojiza, coherente con la advertencia lexical del audit trail.
