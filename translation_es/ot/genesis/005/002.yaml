translation:
  language: es
  text: Varón y mujer los creó, y los bendijo, y les puso por nombre Adán[a] el día en que fueron creados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: Adán. La palabra puede significar «hombre» o «humanidad» en sentido colectivo, y también es el nombre personal Adán.'
    reason: alternative_reading
lexical_decisions:
- source_word: זָכָר
  english_pob_choice: Male
  chosen_spanish: Varón
  alternatives_spanish:
  - macho
  - masculino
  lexicon: HALOT
  rationale: En este paralelismo con נְקֵבָה, «varón» conserva la referencia sexuada y mantiene una simetría natural en español. «Masculino» suena más adjetival y técnico; «macho» sería demasiado biológico o coloquial para este contexto.
- source_word: נְקֵבָה
  english_pob_choice: female
  chosen_spanish: mujer
  alternatives_spanish:
  - hembra
  - femenina
  lexicon: HALOT
  rationale: El hebreo contrapone dos términos sexuales/creacionales. «Mujer» funciona de manera idiomática y digna en español junto a «varón». «Hembra» preserva el valor biológico, pero en español puede sonar más zoológico o duro.
- source_word: בְּרָאָם
  english_pob_choice: he created them
  chosen_spanish: los creó
  alternatives_spanish:
  - los había creado
  lexicon: HALOT
  rationale: El perfecto hebreo narra la acción creadora de Dios de forma directa. El pretérito simple en español comunica bien el acto creador sin añadir matices aspectuales no exigidos por el texto.
- source_word: וַיְבָרֶךְ אֹתָם
  english_pob_choice: and he blessed them
  chosen_spanish: y los bendijo
  alternatives_spanish:
  - y pronunció bendición sobre ellos
  lexicon: HALOT
  rationale: «Bendijo» es la forma más natural y fiel de ברך aquí. La opción más explícita sería más interpretativa sin una ganancia necesaria.
- source_word: וַיִּקְרָא אֶת־שְׁמָם
  english_pob_choice: and called their name
  chosen_spanish: y llamó su nombre
  alternatives_spanish:
  - y les puso por nombre
  lexicon: HALOT
  rationale: La construcción hebrea dice literalmente «llamó su nombre». Mantener esa forma preserva el singular de «nombre» con sufijo plural, que es relevante para el sentido colectivo.
- source_word: אָדָם
  english_pob_choice: Adam
  chosen_spanish: Adán
  alternatives_spanish:
  - hombre
  - humanidad
  - género humano
  lexicon: HALOT
  rationale: En este contexto, el texto nombra colectivamente a la pareja humana con אָדָם. El español «Adán» conserva la posibilidad de leerlo como nombre propio y mantiene la conexión con el uso posterior en la genealogía. Las opciones colectivas («hombre», «humanidad») no reflejan tan bien la decisión de la POB inglesa de preservar la forma Adam como nombre viable.
- source_word: בְּיוֹם הִבָּרְאָם
  english_pob_choice: on the day they were created
  chosen_spanish: el día en que fueron creados
  alternatives_spanish:
  - el día de su creación
  - el día que fueron creados
  lexicon: HALOT
  rationale: La pasiva conserva el sentido del niphal hebreo y su referencia al acto creador de Dios. «En que» suena más fluido que una traducción rígida, sin perder el valor temporal del hebreo.
theological_decisions:
- issue: Sentido colectivo de אָדָם con posibilidad de nombre propio
  english_pob_reading: Adam
  chosen_spanish_reading: Adán
  alternative_spanish_readings:
  - hombre
  - humanidad
  - género humano
  rationale: 'La audit trail inglesa decidió preservar «Adam» como forma viable, porque el hebreo puede funcionar como nombre propio y como término colectivo. En español, «Adán» permite esa misma ambigüedad productiva: puede leerse como nombre y sigue anclado al juego lexical del texto. Se evita sustituirlo por un término genérico que borre la tensión documentada.'
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral; Contested terms table for אָדָם'
- issue: Referencia conjunta a varón y mujer en la creación
  english_pob_reading: Male and female he created them
  chosen_spanish_reading: Varón y mujer los creó
  alternative_spanish_readings:
  - Hombre y mujer los creó
  - Varón y hembra los creó
  rationale: Se mantiene la pareja sexuada explícita del hebreo sin introducir un sustantivo más genérico que debilite el paralelismo. «Varón y mujer» es claro, reverente y suficientemente literal para el contexto de creación.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral'
translation_notes:
  revision_awareness: La versión inglesa más reciente corrigió la elección de «Man» por «Adam» para reflejar mejor el valor de אָדָם en este contexto. La redacción española sigue esa decisión al usar «Adán» en el texto principal y preservar en nota la alternativa colectiva que el hebreo permite.
  spanish_consistency_notes:
  - Se mantiene «Adán» como forma principal para respetar la tensión entre nombre propio y sentido colectivo documentada en el audit trail.
  - Se usa «los» para el objeto plural masculino genérico en referencia a la pareja humana, siguiendo el referente conjunto del hebreo.
  - 'La secuencia verbal conserva el orden narrativo simple del hebreo: creó, bendijo, llamó.'
  - No se introduce «Señor» ni otras sustituciones devocionales, porque el versículo no contiene el tetragrámaton.
