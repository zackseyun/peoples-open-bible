    text: O «a pleito por fuego», «a litigio por fuego» o «a contender por fuego»; el hebreo לָרִיב lleva matices judiciales de disputa o causa legal.
    reason: lexical_alternative
  - marker: b
    text: «Porción» puede referirse a la parte asignada, al territorio o a la heredad; el hebreo no lo especifica más aquí.
    reason: lexical_alternative
  revision_rationale: Se corrigió el anclaje de la nota para que recaiga sobre «juicio», que es donde pertenece la observación sobre לָרִיב. También se cambió «al pleito por fuego» por «a juicio por fuego» para alinearlo con la decisión principal documentada en la auditoría inglesa y mejorar la naturalidad del español, manteniendo las alternativas forenses en nota. Se conservan «Señor Yahvé», «gran abismo» y «la porción» por fidelidad al proyecto y al hebreo.
