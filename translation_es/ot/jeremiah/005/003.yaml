translation:
  language: es
  text: Yahvé, ¿acaso tus ojos no están sobre la fidelidad? Tú los golpeaste, pero no sintieron dolor[a]; los consumiste, pero se negaron a aceptar disciplina. Hicieron sus rostros más duros que la roca; se negaron a volver[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «no se debilitaron», «no enfermaron» o «no sintieron aflicción».
    reason: lexical_alternative
  - marker: b
    text: O «arrepentirse». El hebreo dice literalmente «volver», una expresión profética común para volver a Dios.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהֹוָה
  english_pob_choice: O Yahweh
  chosen_spanish: Oh Yahvé
  alternatives_spanish:
  - Oh SEÑOR
  - Oh Jehová
  lexicon: WLC/HALOT
  rationale: Se mantiene la vocación directa al nombre divino con «Yahvé», conforme al criterio del proyecto para יהוה. «Oh» conserva el tono de invocación del hebreo y de la POB inglesa sin ocultar el nombre propio.
- source_word: עֵינֶיךָ
  english_pob_choice: your eyes
  chosen_spanish: tus ojos
  alternatives_spanish:
  - tu mirada
  - tú miras
  lexicon: HALOT
  rationale: Se conserva la imagen antropomórfica concreta de «ojos» en lugar de abstraerla a una paráfrasis. «Tus ojos» refleja el posesivo singular y la imagen del texto.
- source_word: לֶאֱמוּנָה
  english_pob_choice: faithfulness
  chosen_spanish: la fidelidad
  alternatives_spanish:
  - la verdad
  - la firmeza
  - la fe
  lexicon: HALOT
  rationale: En este contexto profético, אֱמוּנָה expresa fidelidad, firmeza confiable o lealtad del pacto. «Fidelidad» es la opción más natural y precisa en español para el juicio de Jeremías.
- source_word: הִכִּיתָה אֹתָם
  english_pob_choice: You struck them
  chosen_spanish: Tú los golpeaste
  alternatives_spanish:
  - Tú los heriste
  - Tú los golpeaste con fuerza
  - Tú los castigaste
  lexicon: HALOT
  rationale: נכה se vierte de modo directo y fuerte. «Golpeaste» conserva la fuerza física del verbo y deja visible el lenguaje de juicio divino.
- source_word: וְלֹא חָלוּ
  english_pob_choice: they did not feel pain
  chosen_spanish: pero no sintieron dolor
  alternatives_spanish:
  - pero no se dolieron
  - pero no se estremecieron
  - pero no se debilitaron
  lexicon: HALOT
  rationale: חלה puede significar enfermarse, debilitarse o experimentar dolor. Dado el paralelismo con ser golpeados, «no sintieron dolor» comunica con naturalidad la falta de reacción esperada sin imponer una sola glosa estrecha.
- source_word: כִּלִּיתָם
  english_pob_choice: you consumed them
  chosen_spanish: los consumiste
  alternatives_spanish:
  - los acabaste
  - los destruiste
  - los aniquilaste
  lexicon: HALOT
  rationale: כלה en Piel puede expresar consumir, acabar o llevar a término. «Consumiste» sigue de cerca la imaginería de la POB inglesa y el escalamiento del juicio.
- source_word: מֵאֲנ֖וּ קַ֣חַת מוּסָ֑ר
  english_pob_choice: they refused to accept discipline
  chosen_spanish: se negaron a aceptar disciplina
  alternatives_spanish:
  - rehusaron recibir corrección
  - se negaron a recibir instrucción
  - rehusaron aceptar castigo
  lexicon: HALOT
  rationale: מוּסָר abarca disciplina, corrección e instrucción. «Aceptar disciplina» preserva el sentido formativo y correctivo a la vez.
- source_word: חִזְּק֤וּ פְנֵי/הֶם֙ מִ/סֶּ֔לַע
  english_pob_choice: They made their faces harder than rock
  chosen_spanish: Endurecieron su rostro más que la roca
  alternatives_spanish:
  - Hicieron su rostro más duro que la roca
  - Endurecieron sus caras más que la piedra
  - Volvieron su rostro más duro que el pedernal
  lexicon: HALOT
  rationale: La expresión es idiomática y compara la dureza de actitud con la roca. «Endurecieron su rostro» preserva la imagen hebrea; «más que la roca» mantiene el comparativo sin volverlo excesivamente interpretativo.
- source_word: מֵאֲנ֖וּ לָ/שֽׁוּב
  english_pob_choice: they refused to return
  chosen_spanish: se negaron a volver
  alternatives_spanish:
  - rehusaron regresar
  - se negaron a arrepentirse
  - rehusaron volver
  lexicon: HALOT
  rationale: שׁוּב significa literalmente «volver/retornar» y en los profetas con frecuencia lleva fuerza de arrepentimiento. Se deja «volver» en el texto principal para preservar la literalidad y la tensión interpretativa.
theological_decisions:
- issue: El valor profético de שׁוּב en contexto moral/religioso
  english_pob_reading: they refused to return
  chosen_spanish_reading: se negaron a volver
  alternative_spanish_readings:
  - se negaron a arrepentirse
  - rehusaron regresar
  rationale: Se mantiene la imagen primaria de retorno para no resolver de antemano la carga teológica del verbo. En Jeremías, el retorno suele implicar arrepentimiento, pero esa lectura se conserva como alternativa y no se impone en el cuerpo principal.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica cuando el hebreo la permite.'
- issue: Posible ambigüedad de חָלוּ
  english_pob_reading: they did not feel pain
  chosen_spanish_reading: no sintieron dolor
  alternative_spanish_readings:
  - no se debilitaron
  - no enfermaron
  - no sintieron aflicción
  rationale: El hebreo admite matices de dolor, enfermedad o debilidad. «No sintieron dolor» ofrece una solución natural en español y conserva la imagen de una reprensión que no produjo respuesta.
  doctrine_reference: 'Transparencia lexical: preferir una glosa que sea fiel al contexto y no borre las otras posibilidades semánticas.'
translation_notes:
  revision_awareness: La versión inglesa más reciente cambió «did not writhe» por «did not feel pain» para reflejar mejor וְלֹא חָלוּ. La redacción española adopta esa revisión con «no sintieron dolor», manteniendo el tono formal y la secuencia del juicio.
  spanish_consistency_notes:
  - Se usa «Yahvé» para יהוה conforme al estándar español del proyecto.
  - Se conserva la distinción entre «volver» y «arrepentirse» en nota para no borrar la carga profética de שׁוּב.
  - «Disciplina» traduce מוּסָר de manera amplia, sin reducirlo solo a castigo.
  - «Rostro» mantiene la metáfora hebrea de actitud endurecida; no se reemplaza por una explicación abstracta.
