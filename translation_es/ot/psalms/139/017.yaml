translation:
  language: es
  text: Y a mí[a], ¡cuán preciosos son tus pensamientos, oh Dios; cuán inmensa es la suma de ellos[b]!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'tus amigos' o 'los que te son queridos'. La forma hebrea רֵעֶיךָ puede entenderse así, pero el contexto de contar e inmensidad en los vv. 17–18 favorece 'tus pensamientos'.
    reason: alternative_reading
  - marker: b
    text: Literalmente 'sus cabezas'. Aquí el modismo probablemente significa 'la suma de ellos' o 'su total'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלִי
  english_pob_choice: And to me
  chosen_spanish: Y para mí
  alternatives_spanish:
  - Pero para mí
  - Asomente para mí
  - Y a mí
  lexicon: HALOT
  rationale: La construcción con preposición y sufijo personal expresa una referencia personal enfática. 'Y para mí' conserva el enlace con lo anterior y el énfasis subjetivo sin añadir una oposición no explícita.
- source_word: מַה
  english_pob_choice: how
  chosen_spanish: cuán
  alternatives_spanish:
  - qué
  - cómo
  lexicon: HALOT
  rationale: En exclamación, la partícula funciona de modo intensivo. 'Cuán' reproduce mejor el valor admirativo del hebreo que un interrogativo literal.
- source_word: יָּקְרוּ
  english_pob_choice: are ... precious
  chosen_spanish: son preciosos
  alternatives_spanish:
  - son valiosos
  - son estimados
  - son preciados
  lexicon: HALOT
  rationale: El verbo de la raíz יקר comunica valor/estimación. 'Preciosos' es natural en español bíblico moderno y preserva el matiz de algo altamente apreciado.
- source_word: רֵעֶיךָ
  english_pob_choice: your thoughts
  chosen_spanish: tus pensamientos
  alternatives_spanish:
  - tus amigos
  - tus intenciones
  - tus propósitos
  lexicon: HALOT
  rationale: Aunque la forma consonántica puede sugerir 'amigos/compañeros', el contexto inmediato de conteo e inmensidad en los vv. 17–18 favorece el sentido contextual de 'pensamientos'. Se mantiene ese valor porque es el que mejor sigue la lectura auditada del POB inglés.
- source_word: אֵל
  english_pob_choice: O God
  chosen_spanish: oh Dios
  alternatives_spanish:
  - Dios
  - ¡oh, Dios!
  lexicon: HALOT
  rationale: Es un vocativo directo. 'Oh Dios' conserva la apelación poética en español sin desplazarla a una forma más litúrgica que el hebreo no exige.
- source_word: מֶה
  english_pob_choice: how
  chosen_spanish: cuán
  alternatives_spanish:
  - qué
  - cómo
  lexicon: HALOT
  rationale: Como en el primer hemistiquio, la partícula introduce exclamación de magnitud, no una pregunta de información.
- source_word: עָצְמוּ
  english_pob_choice: is ... vast
  chosen_spanish: es inmenso
  alternatives_spanish:
  - es vasto
  - son innumerables
  - es grande
  lexicon: HALOT
  rationale: La raíz puede expresar fuerza o multitud/immensidad. En paralelo con la idea de contar en el verso siguiente, 'inmenso' comunica mejor la magnitud total que una traducción de fuerza física.
- source_word: רָאשֵׁיהֶם
  english_pob_choice: the sum of them
  chosen_spanish: su total
  alternatives_spanish:
  - la suma de ellos
  - sus cabezas
  - su totalidad
  lexicon: HALOT
  rationale: Literalmente 'sus cabezas', pero en hebreo es un idiomatismo para el total o la suma. 'Su total' expresa esa suma colectiva con naturalidad en español y evita la imagen corporal que aquí no parece primaria.
theological_decisions:
- issue: Sentido de רֵעֶיךָ
  english_pob_reading: your thoughts
  chosen_spanish_reading: tus pensamientos
  alternative_spanish_readings:
  - tus amigos
  - los que te son queridos
  rationale: El contexto de los vv. 17–18 apunta a lo innumerable y contable, por lo que el sentido abstracto es preferible. Se conserva la tensión textual del hebreo sin forzar una lectura relacional más concreta que la que sostiene el flujo del poema.
  doctrine_reference: Translation philosophy §1, §3, §5
- issue: Imagen idiomática de רָאשֵׁיהֶם
  english_pob_reading: the sum of them
  chosen_spanish_reading: su total
  alternative_spanish_readings:
  - la suma de ellos
  - sus cabezas
  rationale: Se mantiene el valor idiomático sin perder la referencia literal subyacente. Esto respeta la transparencia del POB y la inteligibilidad en español.
  doctrine_reference: Translation philosophy §2, §4
translation_notes:
  revision_awareness: Se ha seguido el último pase de revisión, que indicó 'sin cambios necesarios', y se ha mantenido la decisión contextual sobre רֵעֶיךָ como 'pensamientos' y el idiomatismo de רָאשֵׁיהֶם como 'total'.
  spanish_consistency_notes:
  - Se usa 'Yahvé' según el estándar del proyecto solo cuando aparece el nombre divino explícito; aquí el hebreo usa אֵל, por lo que se traduce 'Dios'.
  - Se mantiene 'pensamientos' en coherencia con el POB inglés y con el contexto de los vv. 17–18.
  - Se evita 'SEÑOR' porque no corresponde al hebreo de este versículo.
  - '''Cuán'' se usa en ambos hemistiquios para reflejar la exclamación intensiva del hebreo.'
