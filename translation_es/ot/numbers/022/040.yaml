revisions:
- from: Y Balac sacrificó ganado y ovejas[b][a], y envió a Balaam y a los funcionarios que estaban con él.
  to: Y Balac sacrificó ganado y ovejas[b], y les envió parte[a] a Balaam y a los funcionarios que estaban con él.
  rationale: Se corrige el verbo con un objeto mínimo explícito («les envió parte») para reflejar el sentido contextual de וַיְשַׁלַּח sin sobretraducir. Esto evita la lectura errónea de que Balac envió a Balaam mismo. Se conserva la nota léxica alternativa sobre «porciones» y la nota sobre el alcance de צֹאן.
