base_translation:
  language: en
  yaml_path: translation/ot/esther/008/011.yaml
  text: that the king granted the Jews in every city to assemble and to stand for their lives[a], to destroy, to kill, and to annihilate every armed force of any people or province that would attack them, children and women[b], and to plunder their spoil.
  footnotes:
  - marker: a
    text: Or 'that were hostile to them.' The Hebrew participle can denote those acting as enemies toward them; 'that might attack them' makes the hostile sense explicit in context.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'children and women.' The decree's wording explicitly includes them within the enemy group described.
    reason: cultural_note
