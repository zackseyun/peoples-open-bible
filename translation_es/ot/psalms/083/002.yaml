translation:
  language: es
  text: Oh, Dios[a], no guardes silencio; no te quedes quieto[b], oh, Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo usa dos títulos divinos distintos en este verso: אֱלֹהִים («Dios») y אֵל («Dios», posiblemente «Poderoso»).'
    reason: lexical_alternative
  - marker: b
    text: O «no permanezcas en reposo»; el hebreo puede expresar quietud, calma o inactividad en este contexto.
    reason: alternative_reading
lexical_decisions:
- source_word: אֱלֹהִים
  english_pob_choice: O God
  chosen_spanish: Oh Dios
  alternatives_spanish:
  - Dios
  lexicon: HALOT
  rationale: En vocativo de súplica, el hebreo usa אֱלֹהִים como dirección directa a Dios. En español, «Oh Dios» reproduce esa apelación poética y natural sin perder la fuerza de la oración.
- source_word: אַל
  english_pob_choice: do not
  chosen_spanish: 'no'
  alternatives_spanish:
  - no permitas que
  lexicon: HALOT
  rationale: La partícula negativa introduce una petición/jussivo. «No» conserva la concisión imperativa y la urgencia del ruego en español.
- source_word: דֳּמִי לָךְ
  english_pob_choice: be silent
  chosen_spanish: guardes silencio
  alternatives_spanish:
  - calles
  - permanezcas en silencio
  - estés callado
  lexicon: HALOT
  rationale: La expresión pide que Dios no permanezca en silencio o inactivo. «Guardes silencio» suena idiomático en español y conserva el valor de la imagen sin endurecerla innecesariamente.
- source_word: תֶּחֱרַשׁ
  english_pob_choice: be silent / be deaf
  chosen_spanish: estés callado
  alternatives_spanish:
  - calles
  - permanezcas callado
  - seas sordo
  lexicon: HALOT
  rationale: Aunque el hebreo puede rozar la idea de «ser sordo», el contexto y la revisión inglesa favorecen la idea de silencio o falta de respuesta. «Estés callado» mantiene el paralelismo con la primera cláusula y evita introducir una connotación fisiológica que el verso no exige.
- source_word: וְאַל תִּשְׁקֹט
  english_pob_choice: and do not be still
  chosen_spanish: no estés callado
  alternatives_spanish:
  - no estés quieto
  - no permanezcas en reposo
  - no descanses
  lexicon: HALOT
  rationale: שׁקט expresa quietud, inmovilidad o reposo apacible; en este contexto intensifica la súplica para que Dios no se mantenga inactivo. En español, «no estés callado» hace audible la urgencia del verso y se alinea con el paralelismo de las cláusulas previas.
- source_word: אֵל
  english_pob_choice: O God
  chosen_spanish: oh Dios
  alternatives_spanish:
  - oh Poderoso
  - oh Dios todopoderoso
  lexicon: HALOT
  rationale: El cierre repite otro título divino. Dado que el uso poético español no suele distinguir aquí entre אֱלֹהִים y אֵל de manera natural, se conserva la repetición reverente de «oh Dios» y se documenta la posible distinción semántica.
theological_decisions:
- issue: Reproducción de dos títulos divinos distintos en el mismo verso
  english_pob_reading: Both rendered as 'God' in English vocative form
  chosen_spanish_reading: Ambos títulos se vierten como «Dios» en forma vocativa («Oh Dios … oh Dios»).
  alternative_spanish_readings:
  - «Oh Dios … oh Poderoso»
  - «Oh Dios … oh Dios, el Poderoso»
  rationale: El hebreo usa אֱלֹהִים y luego אֵל; existe una distinción léxica real, pero en la oración poética española la duplicación natural de «Oh Dios» comunica con claridad la súplica sin sobrecargar el verso. La diferencia queda preservada en la documentación y en la nota.
  doctrine_reference: Principio POB de mantener lectura reverente y clara, dejando constancia de distinciones léxicas documentadas sin forzar un tecnicismo innecesario en el texto principal.
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del contexto inglés, que eliminó la idea de «ser sordo» y dejó el verso centrado en la petición de que Dios no permanezca en silencio ni en quietud. La versión española refleja ese ajuste y mantiene el paralelismo poético con dos peticiones breves y una repetición final del vocativo.
  spanish_consistency_notes:
  - Se mantiene «Dios» como equivalente principal de אֱלֹהִים y אֵל, con nota que documenta la posible distinción semántica.
  - Se usa registro reverente y contemporáneo, evitando arcaísmos innecesarios.
  - La cláusula final conserva la repetición del vocativo, rasgo retórico importante del hebreo.
  - No se introduce «sordo» en el texto principal porque la revisión auditada del inglés la descartó como lectura principal.
