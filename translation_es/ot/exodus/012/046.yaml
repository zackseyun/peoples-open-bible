revisions:
- from: Se comerá en una sola casa; no sacarás fuera de la casa ningún pedazo de la carne[a], y no le quebrarán ningún hueso.
  to: Se comerá en una sola casa; no sacarás nada de la carne fuera de la casa[a], y no quebrarán un hueso de él.
  rationale: Se corrige la sobreespecificación de “pedazo” para reflejar mejor el partitivo hebreo sin añadir imagen no explicitada, y se repara la cláusula final para evitar la construcción poco natural “le quebrarán ningún hueso” y expresar con más fidelidad el sentido de וְעֶצֶם לֹא תִשְׁבְּרוּ בוֹ. Se conserva la nota sobre ‘casa/familia’ porque responde al audit trail inglés y a la ambigüedad léxica real.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:03:57Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo en la estructura general: mandato pasivo inicial, prohibición de sacar carne fuera de la casa, y prohibición de quebrar hueso alguno del animal pascual. Conserva correctamente la nota léxica sobre בַּיִת como casa/hogar doméstico. Sin embargo, introduce ajustes no justificados por la evidencia fuente: “ningún pedazo de la carne” sobreexplicita מִן־הַבָּשָׂר, y “no le quebrarán ningún hueso” cambia indebidamente la persona/número del verbo respecto de תִשְׁבְּרוּ y produce una construcción española poco natural.'
  spanish_quality_summary: El texto es mayormente claro, pero tiene dos problemas de naturalidad y fidelidad. “No sacarás fuera de la casa ningún pedazo de la carne” suena algo pesado y añade “pedazo” sin apoyo explícito en el original; “ninguna de la carne” o “nada de la carne” no sería ideal tampoco, pero “nada de la carne”/“ninguna parte de la carne” o mejor “nada de la carne fuera de la casa” serían más naturales. Además, “y no le quebrarán ningún hueso” mezcla un futuro de tercera persona plural con un dativo “le” que no corresponde al hebreo ni al flujo de la frase; debe mantenerse la segunda persona plural o una formulación impersonal normativa más natural.
  glossary_alignment: No hay conflictos con la terminología principal del proyecto. La decisión sobre בַּיִת como “casa” con nota alternativa “familia/hogar doméstico” está bien encaminada. La referencia final al animal pascual debe expresarse en español como “un hueso de él” o “ningún hueso” con referente claro, evitando el dativo “le” en esta construcción.
  issues:
  - severity: medium
    issue: “ningún pedazo de la carne” añade contenido no presente de forma explícita en מִן הַבָּשָׂר
    rationale: El partitivo hebreo sí comunica ‘algo de la carne’, pero “pedazo” especifica una unidad física concreta que el texto no exige. Conviene una solución más literal y natural, como “nada de la carne” o “ninguna parte de la carne”.
  - severity: high
    issue: “no le quebrarán ningún hueso” altera la persona/número del hebreo y resulta poco natural en español
    rationale: תִשְׁבְּרוּ es segunda persona plural, no tercera plural. Además, la construcción con “le” no refleja bien el idiomatismo español bíblico ni el referente ‘de él/del animal’. Una forma fiel y clara es “y no quebrarán ningún hueso de él” o, mejor aún en registro normativo, “y no le quebrarán ni un solo hueso” solo si se mantiene la concordancia adecuada; aquí la opción más segura es con ‘de él’.
  revised_spanish_text: Se comerá en una sola casa; no sacarás nada de la carne fuera de la casa[a], y no quebrarán un hueso de él.
  revised_footnotes:
  - marker: a
    text: O “en una sola familia”. La palabra hebrea puede designar tanto la casa física como el grupo doméstico reunido allí.
    reason: lexical_alternative
  revision_rationale: Se corrige la sobreespecificación de “pedazo” para reflejar mejor el partitivo hebreo sin añadir imagen no explicitada, y se repara la cláusula final para evitar la construcción poco natural “le quebrarán ningún hueso” y expresar con más fidelidad el sentido de וְעֶצֶם לֹא תִשְׁבְּרוּ בוֹ. Se conserva la nota sobre ‘casa/familia’ porque responde al audit trail inglés y a la ambigüedad léxica real.
