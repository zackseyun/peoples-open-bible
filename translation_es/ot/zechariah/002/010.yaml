base_translation:
  language: en
  yaml_path: translation/ot/zechariah/002/010.yaml
  text: Up! Up! Flee from the land of the north[a], declares Yahweh, for I have spread you abroad to the four winds of the heavens[b], declares Yahweh.
  footnotes:
  - marker: a
    text: Or 'to the four winds of heaven I have scattered you.' The Hebrew can be understood as either a comparison ('like the four winds') or a directional idiom ('to the four winds').
    reason: alternative_reading
  - marker: b
    text: Traditional English versions often render the opening as 'Ho! Ho!' The Hebrew is an urgent summons, hence 'Up! Up!' here.
    reason: lexical_alternative
