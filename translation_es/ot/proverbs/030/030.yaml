- from: El león[a], poderoso entre las bestias, y no retrocede ante nadie.
  to: El león[a], poderoso entre las bestias, no retrocede ante ninguno.
  rationale: Se reemplaza 'ante nadie' por 'ante ninguno' para conservar el alcance amplio de כֹל sin restringirlo a personas. También se elimina la conjunción 'y' para una línea más natural en español, sin pérdida de sentido. Se mantiene 'el león' y la nota alternativa, en línea con la justificación léxica del POB.
