revisions:
- from: Que ofrezcan sacrificios con fuego continuo[a], cuya altura es de sesenta codos y su anchura de sesenta codos, con tres hiladas de piedra labrada y una hilada de madera local nueva[b]; y que el gasto sea dado de la casa de Ciro el rey.
  to: Que ofrezcan sacrificios con fuego continuo[a], en un edificio de sesenta codos de altura y sesenta codos de anchura, con tres hiladas de piedra labrada y una hilada de madera local nueva[b]; y que el gasto se pague de la casa de Ciro el rey.
  rationale: Se reemplazó «cuya altura...» por «en un edificio de...» para resolver la ambigüedad del relativo y hacer explícito en español el antecedente implícito de las dimensiones. También se cambió «sea dado» por «se pague», una formulación más idiomática y administrativa en español que conserva la fuerza directiva del griego. Se mantuvieron las notas existentes porque siguen siendo pertinentes y están bien ancladas en el texto revisado.
