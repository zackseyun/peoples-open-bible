translation:
  language: es
  text: Pero cuando oyeron que Simón, su hermano, había llegado a ser sumo sacerdote en lugar de él y gobernaba el país y las ciudades que estaban en él,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὡς δὲ ἤκουσαν
  english_pob_choice: But when they heard
  chosen_spanish: Pero cuando oyeron
  alternatives_spanish:
  - Y cuando oyeron
  - Ahora bien, cuando oyeron
  lexicon: BDAG
  rationale: ὡς con el aoristo introduce una cláusula temporal; δέ aporta transición narrativa leve. «Pero cuando oyeron» reproduce bien ese avance del relato en español sin sobredeterminar el contraste.
- source_word: Σίμων ὁ ἀδελφὸς αὐτοῦ
  english_pob_choice: Simon his brother
  chosen_spanish: Simón, su hermano
  alternatives_spanish:
  - Simón su hermano
  - Simón, el hermano de él
  lexicon: BDAG
  rationale: La aposición identifica a Simón como el hermano de la persona mencionada previamente. En español, la coma hace explícita la aposición y mantiene naturalidad.
- source_word: γέγονεν
  english_pob_choice: had become
  chosen_spanish: había llegado a ser
  alternatives_spanish:
  - había sido hecho
  - llegó a ser
  lexicon: BDAG
  rationale: El perfecto expresa un estado resultante de una acción ya completada. «Había llegado a ser» conserva ese matiz de resultado anterior al acto de oír.
- source_word: ἀντ' αὐτοῦ
  english_pob_choice: in his place
  chosen_spanish: en lugar de él
  alternatives_spanish:
  - en su lugar
  - en vez de él
  lexicon: BDAG
  rationale: ἀντί aquí indica sucesión o reemplazo. «En lugar de él» expresa con claridad la sustitución en el cargo sin añadir implicaciones ajenas.
- source_word: ἀρχιερεὺς
  english_pob_choice: high priest
  chosen_spanish: sumo sacerdote
  alternatives_spanish:
  - gran sacerdote
  - pontífice
  lexicon: BDAG
  rationale: «Sumo sacerdote» es el equivalente bíblico natural en español y conserva la referencia al oficio judío con precisión y legibilidad.
- source_word: ἐπικρατεῖ
  english_pob_choice: was ruling over
  chosen_spanish: gobernaba
  alternatives_spanish:
  - tenía dominio sobre
  - estaba ejerciendo autoridad sobre
  lexicon: BDAG
  rationale: En este contexto histórico-político, ἐπικρατέω denota autoridad efectiva sobre un territorio. «Gobernaba» comunica bien ese sentido sin forzar un matiz más técnico de dominio o control.
- source_word: τῆς χώρας
  english_pob_choice: the country
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  - el territorio
  - la región
  lexicon: BDAG
  rationale: χώρα puede significar tierra, territorio o país. Dado el paralelismo con «las ciudades», «la tierra» suena más natural en español bíblico y conserva amplitud geográfica.
- source_word: τῶν πόλεων τῶν ἐν αὐτῇ
  english_pob_choice: the cities in it
  chosen_spanish: las ciudades que había en ella
  alternatives_spanish:
  - las ciudades en ella
  - sus ciudades
  lexicon: BDAG
  rationale: La frase explicita la ubicación de las ciudades dentro de la χώρα. «Que había en ella» mantiene la relación espacial y fluye con naturalidad en español.
theological_decisions:
- issue: Término para el cargo sacerdotal supremo
  english_pob_reading: high priest
  chosen_spanish_reading: sumo sacerdote
  alternative_spanish_readings:
  - gran sacerdote
  - pontífice
  rationale: No hay tensión doctrinal aquí, pero sí de terminología bíblica estable. «Sumo sacerdote» es la forma más transparente y ampliamente reconocible para el oficio judío.
  doctrine_reference: Uso bíblico estándar del oficio sacerdotal
- issue: Matiz de autoridad política en ἐπικρατεῖ
  english_pob_reading: was ruling over
  chosen_spanish_reading: gobernaba
  alternative_spanish_readings:
  - tenía dominio sobre
  - estaba gobernando sobre
  rationale: El contexto es histórico y territorial, no doctrinal. «Gobernaba» preserva la fuerza de autoridad efectiva sin introducir una connotación teológica no presente en el texto.
  doctrine_reference: Principio de precisión histórica en narrativa bíblica
translation_notes:
  revision_awareness: El texto español sigue de cerca el griego Swete 1909 y armoniza con la decisión inglesa auditable sin depender mecánicamente del inglés. No se detectaron revisiones aplicadas en el audit trail reciente; por eso la redacción se mantiene estable y directa.
  spanish_consistency_notes:
  - Se mantiene «Simón» como transliteración habitual del nombre propio.
  - Se usa «sumo sacerdote» para el cargo, en coherencia con el uso bíblico español estándar.
  - Se prefiere voz narrativa simple y orden temporal claro para reflejar ὡς δὲ ἤκουσαν.
  - Se evita «SEÑOR» u այլ terminología no pertinente, pues el versículo no contiene el nombre divino.
