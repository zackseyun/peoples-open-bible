translation:
  language: es
  text: Pues la red se tiende en vano a la vista de cualquier ave[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, 'cualquier poseedor de ala'.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  - Porque entonces
  lexicon: HALOT
  rationale: En este contexto introduce la razón del aviso anterior; en español, "Porque" conserva bien la relación explicativa sin añadir matices ajenos.
- source_word: חִנָּם
  english_pob_choice: in vain
  chosen_spanish: en vano
  alternatives_spanish:
  - sin provecho
  - gratuitamente
  - sin causa
  lexicon: HALOT
  rationale: La idea es de inutilidad o fracaso del acto; "en vano" es idiomático y fiel al valor de futilidad del hebreo.
- source_word: מְזֹרָה
  english_pob_choice: is spread
  chosen_spanish: está tendida
  alternatives_spanish:
  - está extendida
  - está echada
  - está esparcida
  lexicon: HALOT
  rationale: Para una red, el estado resultante se expresa naturalmente en español con "está tendida"; mantiene la imagen de una trampa preparada.
- source_word: הָרָשֶׁת
  english_pob_choice: the net
  chosen_spanish: la red
  alternatives_spanish:
  - la malla
  - la red de caza
  - la trampa
  lexicon: HALOT
  rationale: רֶשֶׁת designa una red; "la red" es la equivalencia clara y directa para el castellano bíblico contemporáneo.
- source_word: בְּעֵינֵי
  english_pob_choice: in the sight of
  chosen_spanish: ante los ojos de
  alternatives_spanish:
  - a la vista de
  - en presencia de
  - delante de
  lexicon: HALOT
  rationale: La locución hebrea literalmente es "en los ojos de"; "ante los ojos de" conserva la imagen visual sin sonar excesivamente literal en español.
- source_word: כָל
  english_pob_choice: any
  chosen_spanish: cualquier
  alternatives_spanish:
  - todo
  - cualquiera
  - ningún
  lexicon: HALOT
  rationale: Con el sustantivo singular colectivo que sigue, "cualquier" reproduce bien el valor genérico de "any".
- source_word: בַּעַל כָּנָף
  english_pob_choice: bird
  chosen_spanish: ave
  alternatives_spanish:
  - ave alada
  - criatura alada
  - pájaro
  lexicon: HALOT
  rationale: El hebreo significa literalmente "poseedor de ala"; en español, "ave" comunica el referente natural y preserva la concisión proverbial. El tono es más amplio y digno que "pájaro".
translation_notes:
  revision_awareness: El texto inglés más reciente no fue revisado y mantiene alta concordancia con la fuente; esta versión española sigue la misma lectura sin introducir cambios textuales ni interpretativos nuevos.
  spanish_consistency_notes:
  - Se mantiene "red" para רֶשֶׁת en sentido literal de trampa de caza.
  - Se evita "SEÑOR" u otra terminología teológica porque el versículo no la requiere.
  - '"Ave" se eligió como equivalente idiomático de בַּעַל כָּנָף, con nota literal para transparentar la imagen hebrea.'
