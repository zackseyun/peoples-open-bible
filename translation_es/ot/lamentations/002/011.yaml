base_translation:
  language: en
  yaml_path: translation/ot/lamentations/002/011.yaml
  text: My eyes are spent with tears[a]; my inward parts churn; my liver is poured out to the earth because of the destruction of the daughter of my people[d][c][b], because infant and nursing child faint in the streets of the city.
  footnotes:
  - marker: a
    text: Or 'my inward parts are troubled' for 'my inward parts churn'; the Hebrew uses visceral body imagery for deep anguish.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'my liver is poured out to the earth,' a concrete bodily image for profound grief and collapse.
    reason: cultural_note
  - marker: c
    text: Or 'because of the brokenness of the daughter of my people.'
    reason: alternative_reading
  - marker: d
    text: '''The daughter of my people'' is a Hebrew poetic personification for the people/city.'
    reason: cultural_note
