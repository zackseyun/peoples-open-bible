translation:
  language: es
  text: Si su padre se niega rotundamente a dársela[a], él deberá pesar plata[b] equivalente al precio de novia para las vírgenes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «a dársela a él»; el hebreo usa una expresión idiomática que aquí se refiere al consentimiento del padre para el matrimonio.'
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «deberá pesar plata», lo que refleja un pago por metal pesado y no simplemente moneda acuñada.
    reason: cultural_note
lexical_decisions:
- source_word: אִם
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Cuando
  - En caso de que
  lexicon: HALOT
  rationale: La partícula condicional introduce una cláusula de caso; «Si» expresa con claridad la estructura legal del hebreo.
- source_word: מָאֵן יְמָאֵן
  english_pob_choice: absolutely refuses
  chosen_spanish: se niega rotundamente
  alternatives_spanish:
  - rechaza con firmeza
  - se niega por completo
  lexicon: HALOT
  rationale: El infinitivo absoluto con verbo finito intensifica la negación; «se niega rotundamente» reproduce esa fuerza enfática sin sonar artificial en español.
- source_word: אָבִיהָ
  english_pob_choice: her father
  chosen_spanish: su padre
  alternatives_spanish:
  - el padre de ella
  - el padre de la joven
  lexicon: HALOT
  rationale: El sufijo posesivo de tercera femenina singular queda naturalmente expresado por «su padre» en español.
- source_word: לְתִתָּהּ לוֹ
  english_pob_choice: to give her to him
  chosen_spanish: dársela a él
  alternatives_spanish:
  - entregarla a él
  - dársela en matrimonio
  lexicon: HALOT
  rationale: El hebreo usa un giro idiomático de entrega para matrimonio. En español, el pronombre objeto directo e indirecto hace la frase natural, mientras que el contexto legal conserva la referencia matrimonial sin añadir más que el original exige.
- source_word: כֶּסֶף
  english_pob_choice: silver
  chosen_spanish: plata
  alternatives_spanish:
  - dinero
  - plata en metal
  lexicon: HALOT
  rationale: Se conserva el valor concreto de «silver» con «plata», evitando la abstracción de «dinero» y manteniendo la imagen de pago en metal pesado.
- source_word: יִשְׁקֹל
  english_pob_choice: weigh out
  chosen_spanish: pesará
  alternatives_spanish:
  - pesará y entregará
  - pesará plata
  lexicon: HALOT
  rationale: El verbo significa literalmente pesar; el español «pesará» preserva esa acción de pago por peso, en línea con la revisión del POB en inglés.
- source_word: כְּמֹהַר
  english_pob_choice: equal to the bride-price
  chosen_spanish: equivalente al precio de novia
  alternatives_spanish:
  - según el precio de novia
  - como precio de novia
  lexicon: HALOT
  rationale: מֹהַר designa el pago matrimonial. «Precio de novia» conserva el sentido técnico y evita reemplazarlo por un término eclesiástico ajeno al texto.
- source_word: הַבְּתוּלֹת
  english_pob_choice: for virgins
  chosen_spanish: para las vírgenes
  alternatives_spanish:
  - de las vírgenes
  - correspondiente a las vírgenes
  lexicon: HALOT
  rationale: El plural con artículo funciona de manera genérica como clase de referencia; «para las vírgenes» transmite ese valor de tarifa o medida asociada al grupo.
theological_decisions:
- issue: Giro matrimonial implícito en «darla a él»
  english_pob_reading: The Hebrew idiom 'give her to him' refers to the father's consent to marriage.
  chosen_spanish_reading: «Dársela a él» conserva el giro idiomático, con el contexto jurídico indicando el consentimiento matrimonial.
  alternative_spanish_readings:
  - dársela en matrimonio
  - entregarla en matrimonio a él
  rationale: No se debe borrar la tensión entre el hebreo literal y la referencia legal. La frase española mantiene la literalidad suficiente y deja que el contexto haga visible el matrimonio implícito, como en el audito inglés.
  doctrine_reference: Lexical/grammatical contextual reading; Hebrew idiom in legal marriage law
- issue: Pago en metal pesado, no moneda acuñada
  english_pob_reading: Literally, 'he shall weigh out silver,' reflecting payment by weighed metal rather than coined currency.
  chosen_spanish_reading: «Pesará plata» deja visible que el pago se hace por peso de metal, no por moneda acuñada.
  alternative_spanish_readings:
  - pesará plata y la entregará
  - pesará metal precioso
  rationale: La acción de pesar es parte del contenido semántico del verbo; traducirlo así preserva el detalle cultural-jurídico sin añadir una explicación intrusiva al texto principal.
  doctrine_reference: Cultural-historical reference to pre-monetary payment
- issue: Precio de novia como término técnico
  english_pob_reading: equal to the bride-price
  chosen_spanish_reading: «precio de novia» funciona como equivalente técnico transparente del bride-price.
  alternative_spanish_readings:
  - precio nupcial
  - dote
  rationale: «Dote» sería incorrecto porque en español normalmente nombra el aporte de la novia o su familia, no el pago al padre. «Precio de novia» conserva la dirección del pago y la especificidad legal del hebreo.
  doctrine_reference: Ancient Near Eastern marriage customs
translation_notes:
  revision_awareness: La versión española sigue la revisión inglesa más reciente que pasó de «pagar plata» a «pesar plata», por lo que conserva explícitamente el valor literal de יִשְׁקֹל. También mantiene el giro idiomático de «darla a él» como una referencia matrimonial controlada por el contexto, igual que el POB inglés, sin expandir innecesariamente el texto base.
  spanish_consistency_notes:
  - Se evita «SEÑOR» y no hay término divino en este versículo.
  - «plata» reproduce el concreto del hebreo; no se sustituye por «dinero».
  - «precio de novia» se usa como término técnico por coherencia con la elección inglesa de bride-price.
  - La puntuación y el registro buscan ser publicables y bíblicos sin arcaísmo excesivo.
