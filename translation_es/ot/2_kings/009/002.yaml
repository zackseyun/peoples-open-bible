review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la secuencia hebrea y la mayoría de las decisiones del POB en inglés: llegada al lugar, localización de Jehú, separación de entre sus hermanos y traslado a un cuarto interior. Sin embargo, la nota al pie está anclada en el lugar equivocado: el marcador [a] aparece tras «allá», pero la nota explica חֶדֶר בְּחָדֶר («un cuarto dentro de un cuarto»). Además, «mira allá por» suena poco natural en español; el sentido de וּרְאֵה שָׁם se preserva mejor con «busca allí a».'
  spanish_quality_summary: 'El español es generalmente claro y digno, pero tiene dos problemas de legibilidad/edición: 1) «mira allá por Jehú» resulta torpe y poco idiomático; 2) el marcador de nota debe moverse a «cuarto interior» porque la nota no corresponde a «allá». El resto fluye bien. «Hazlo levantarse» es aceptable, aunque «haz que se levante» sería un poco más natural; no es necesario cambiarlo para fidelidad.'
  glossary_alignment: 'No hay términos teológicos sensibles en juego. Los nombres propios están bien en formas españolas usuales: Jehú, Josafat/Joásafat, Nimsi. La cadena «hijo de» preserva correctamente בן. «Hermanos» mantiene la fuerza literal de אֶחָיו. «Cuarto interior» corresponde bien a חֶדֶר בְּחָדֶר, con la alternativa literal conservada en nota.'
  issues:
  - severity: medium
    issue: Marcador de nota colocado en «allá» en vez de en «cuarto interior».
    rationale: La nota documenta la alternativa literal de חֶדֶר בְּחָדֶר, no de וּבָאתָ שָׁמָּה. Tal como está, induce a error sobre qué palabra/frase comenta.
  - severity: medium
    issue: «mira allá por Jehú» es poco natural en español.
    rationale: Aunque intenta reflejar el doble elemento espacial («look there for»), en español suena forzado. «Busca allí a Jehú» conserva el sentido de localizarlo y mantiene el adverbio espacial repetido.
  revised_spanish_text: Cuando llegues allá, busca allí a Jehú, hijo de Joásafat, hijo de Nimsi. Entra, hazlo levantarse de entre sus hermanos, y llévalo a un cuarto interior[a].
  revised_footnotes:
  - marker: a
    text: 'Hebreo literalmente: «un cuarto dentro de un cuarto», es decir, una cámara interior privada.'
    reason: lexical_alternative
  revision_rationale: Se corrige la colocación del marcador de nota para que ancle la explicación de חֶדֶר בְּחָדֶר en «cuarto interior», y se mejora la naturalidad de וּרְאֵה שָׁם con «busca allí a», que preserva el sentido de localizar a Jehú sin el giro extraño «mira allá por».
