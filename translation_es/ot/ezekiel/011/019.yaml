translation:
  language: es
  text: Y yo les daré un solo corazón[a], y pondré dentro de ellos[b] un espíritu nuevo. Quitaré el corazón de piedra de su carne y les daré un corazón de carne.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Un solo corazón» también puede entenderse como «un corazón indiviso», con el matiz de lealtad unificada.
    reason: lexical_alternative
  - marker: b
    text: La forma hebrea puede leerse también como «dentro de ustedes»; aquí se adopta «dentro de ellos» por el contexto inmediato y por el paralelo cercano de Ezequiel 36:26.
    reason: textual_variant
lexical_decisions:
- source_word: לֵב אֶחָד
  english_pob_choice: one heart
  chosen_spanish: un solo corazón
  alternatives_spanish:
  - un corazón unido
  - un corazón indiviso
  lexicon: HALOT
  rationale: 'לֵב designa el centro interior de la persona: voluntad, pensamiento y disposición. «Un solo corazón» conserva la imagen hebrea y, en español, comunica bien la unidad interior y lealtad unificada sin convertir el texto en paráfrasis.'
- source_word: רוּחַ חֲדָשָׁה
  english_pob_choice: a new spirit
  chosen_spanish: un espíritu nuevo
  alternatives_spanish:
  - una nueva disposición
  - un nuevo aliento
  lexicon: HALOT
  rationale: En este contexto de renovación interior, רוּחַ apunta al ámbito espiritual o interior, no a «viento». «Un espíritu nuevo» sigue de cerca el paralelo hebreo y mantiene la fuerza antropológica del pasaje.
- source_word: בְּקִרְבְּכֶם
  english_pob_choice: within them
  chosen_spanish: dentro de ellos
  alternatives_spanish:
  - en medio de ustedes
  - dentro de ustedes
  lexicon: HALOT
  rationale: La forma consonántica permite leer «dentro de ustedes», pero el contexto inmediato y los pronombres cercanos en plural de tercera persona apoyan «dentro de ellos». Se conserva así la lectura coherente con la secuencia del versículo y con el paralelo de Ezequiel 36:26.
- source_word: וַהֲסִרֹתִי
  english_pob_choice: I will remove
  chosen_spanish: Quitaré
  alternatives_spanish:
  - Eliminaré
  - Retiraré
  lexicon: HALOT
  rationale: El causativo de סור expresa hacer que algo se aparte o sea quitado. «Quitaré» es natural en español y mantiene el sentido de remoción sin intensificarlo indebidamente.
- source_word: לֵב הָאֶבֶן
  english_pob_choice: the heart of stone
  chosen_spanish: el corazón de piedra
  alternatives_spanish:
  - el corazón pétreo
  - el corazón de roca
  lexicon: HALOT
  rationale: La metáfora constructa se vierte literalmente para conservar la imagen y el contraste con «corazón de carne». «Piedra» es más transparente en español que «pétreo» y mantiene el valor figurado.
- source_word: מִבְּשָׂרָם
  english_pob_choice: from their flesh
  chosen_spanish: de su carne
  alternatives_spanish:
  - de su cuerpo
  - de su ser
  lexicon: HALOT
  rationale: בָּשָׂר se traduce aquí por «carne», el equivalente más directo y consistente con el contraste simbólico del pasaje. «Carne» preserva la materialidad de la metáfora sin suavizarla.
- source_word: לֵב בָּשָׂר
  english_pob_choice: a heart of flesh
  chosen_spanish: un corazón de carne
  alternatives_spanish:
  - un corazón tierno
  - un corazón sensible
  lexicon: HALOT
  rationale: Se mantiene la metáfora literal para no resolverla interpretivamente. «Corazón de carne» conserva el contraste con «corazón de piedra» y deja abiertas las connotaciones de sensibilidad, vida y receptividad.
theological_decisions:
- issue: Relación entre «corazón» y «espíritu» en la renovación interior
  english_pob_reading: Retain 'heart' and 'spirit' as distinct but related terms in the main text.
  chosen_spanish_reading: Mantener «corazón» y «espíritu» como términos distintos pero relacionados.
  alternative_spanish_readings:
  - Reducirlo a «mente» y «actitud»
  - fusionar ambos conceptos en una sola idea
  rationale: El versículo usa categorías antropológicas propias del texto bíblico. Conservar ambos términos preserva la textura teológica de la promesa de transformación interior sin aplanar sus matices.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Metáfora de «corazón de carne»
  english_pob_reading: Render literally as 'heart of flesh' rather than interpretively as 'soft/tender heart.'
  chosen_spanish_reading: Traducir literalmente «corazón de carne» y no «corazón tierno» ni «corazón sensible».
  alternative_spanish_readings:
  - corazón tierno
  - corazón sensible
  - corazón blando
  rationale: La oposición piedra/carne forma parte del argumento imagético del texto. La traducción literal preserva la tensión teológica y literaria en lugar de explicarla anticipadamente.
  doctrine_reference: Translation philosophy §3, §5
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el texto se mantiene en alta concordancia con el paquete de fuente y la auditoría inglesa, con la única decisión contextual importante de resolver בְּקִרְבְּכֶם como referencia a «ellos» por coherencia interna.
  spanish_consistency_notes:
  - Se mantiene «corazón» y «espíritu» en registro antropológico y teológico, sin sustituirlos por equivalentes psicológicos modernos.
  - «Carne» se conserva para בָּשָׂר en ambos miembros del paralelismo, manteniendo el contraste metafórico con «piedra».
  - Se evita «SEÑOR» porque no aparece el Tetragrámaton en este versículo; no se requiere máscara del nombre divino aquí.
  - La puntuación reproduce el paralelismo del hebreo con dos cláusulas principales y una secuencia final de remoción/donación.
