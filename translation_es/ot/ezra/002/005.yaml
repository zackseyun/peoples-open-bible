  rationale: En este censo/lista, בְּנֵי introduce un grupo familiar o clan vinculado a un antepasado. En español, «los hijos de» conserva la transparencia formal del hebreo y funciona de manera natural en una enumeración genealógica.
- source_word: אָרַח
  english_pob_choice: Arah
  chosen_spanish: Arah
  lexicon: nombre propio
