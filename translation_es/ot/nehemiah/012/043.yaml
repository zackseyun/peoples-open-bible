translation:
  language: es
  text: Aquel día ofrecieron grandes sacrificios y se alegraron[a], porque Dios había hecho que se alegraran con gran alegría[b]. También las mujeres[c] y los niños se alegraron, y la alegría de Jerusalén se oyó desde lejos[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «sacrificaron grandes sacrificios».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «Dios les había dado gran alegría». El hebreo dice más literalmente que Dios hizo que se alegraran con gran alegría.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «las esposas», pues el hebreo puede significar «mujeres» o «esposas» según el contexto.'
    reason: lexical_alternative
  - marker: d
    text: 'O: «se oyó de lejos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּזְבְּחוּ
  english_pob_choice: they offered
  chosen_spanish: ofrecieron
  alternatives_spanish:
  - sacrificaron
  lexicon: HALOT
  rationale: En este contexto cultual, זבח se refiere a presentar sacrificios. «Ofrecieron» suena natural en español y mantiene el sentido sacrificial sin forzar una repetición pesada con el objeto siguiente.
- source_word: זְבָחִים גְּדוֹלִים
  english_pob_choice: great sacrifices
  chosen_spanish: grandes sacrificios
  alternatives_spanish:
  - sacrificios grandes
  - muchos sacrificios
  lexicon: HALOT
  rationale: «Grandes sacrificios» conserva el paralelo con el hebreo y permite el matiz de magnitud e importancia. «Muchos» estrecharía demasiado el sentido.
- source_word: וַיִּשְׂמָחוּ
  english_pob_choice: rejoiced
  chosen_spanish: se alegraron
  alternatives_spanish:
  - rebozaron de gozo
  - se gozaron
  lexicon: HALOT
  rationale: El verbo שׂמח expresa alegría/rejojo. «Se alegraron» es idiomático en español y conserva la repetición del campo léxico del gozo en el versículo.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  lexicon: HALOT
  rationale: Aquí introduce la razón de la alegría. «Porque» es la opción más clara y directa en español contemporáneo.
- source_word: הָאֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: HALOT
  rationale: Aunque el hebreo lleva artículo, en español bíblico natural «Dios» comunica mejor la referencia al Dios de Israel sin artificialidad.
- source_word: שִׂמְּחָם שִׂמְחָה גְדוֹלָה
  english_pob_choice: had made them rejoice with great joy
  chosen_spanish: los había hecho alegrarse con gran alegría
  alternatives_spanish:
  - les había dado gran alegría
  - los había hecho regocijarse con gran gozo
  lexicon: HALOT
  rationale: La forma piel de שׂמח es causativa. «Los había hecho alegrarse» conserva esa agencia divina y el giro intensivo del hebreo con el sustantivo cognado «gran alegría».
- source_word: וְגַם
  english_pob_choice: Also
  chosen_spanish: También
  alternatives_spanish:
  - Y también
  - Además
  lexicon: HALOT
  rationale: El valor aditivo/enfático de וְגַם se expresa con «También», que fluye con naturalidad en español.
- source_word: הַנָּשִׁים
  english_pob_choice: the women
  chosen_spanish: las mujeres
  alternatives_spanish:
  - las esposas
  lexicon: HALOT
  rationale: נָשִׁים puede significar «mujeres» o «esposas». Sin un posesivo ni otro marcador contextual, «las mujeres» es la opción más amplia y segura.
- source_word: וְהַיְלָדִים
  english_pob_choice: the children
  chosen_spanish: los niños
  alternatives_spanish:
  - los muchachos
  - los pequeños
  lexicon: HALOT
  rationale: יְלָדִים se refiere aquí de manera directa a niños; «los niños» es el equivalente más claro y natural.
- source_word: שָׂמֵחוּ
  english_pob_choice: rejoiced
  chosen_spanish: se alegraron
  alternatives_spanish:
  - estuvieron contentos
  - se gozaron
  lexicon: HALOT
  rationale: Se repite el mismo verbo de alegría; mantener «se alegraron» preserva la cohesión léxica del versículo.
- source_word: וַתִּשָּׁמַע
  english_pob_choice: was heard
  chosen_spanish: se oyó
  alternatives_spanish:
  - fue oída
  - podía oírse
  lexicon: HALOT
  rationale: La forma nifal es pasiva. En español, «se oyó» transmite con naturalidad que la alegría llegó a escucharse sin añadir una modalidad no explícita.
- source_word: שִׂמְחַת יְרוּשָׁלִַם
  english_pob_choice: the joy of Jerusalem
  chosen_spanish: la alegría de Jerusalén
  alternatives_spanish:
  - el regocijo de Jerusalén
  - la celebración de Jerusalén
  lexicon: HALOT
  rationale: El constructo se conserva como genitivo en español. «La alegría de Jerusalén» es conciso y no sobreinterpreta si se trata de la ciudad o de su población.
- source_word: מֵרָחוֹק
  english_pob_choice: from far away
  chosen_spanish: desde lejos
  alternatives_spanish:
  - desde muy lejos
  - de lejos
  lexicon: HALOT
  rationale: מִן + רָחוֹק indica distancia. «Desde lejos» comunica con claridad el alcance sonoro en español actual.
theological_decisions:
- issue: Agencia divina en el gozo
  english_pob_reading: God is explicitly presented as the one who caused the people's rejoicing.
  chosen_spanish_reading: Dios es presentado explícitamente como quien hizo que el pueblo se alegrara.
  alternative_spanish_readings:
  - Dios les dio gran alegría
  - Dios los llenó de gozo
  rationale: El hebreo usa una forma causativa de שׂמח. La traducción mantiene esa agencia divina sin suavizarla, preservando la intención del texto.
  doctrine_reference: Translation philosophy §1, §3
- issue: Alcance comunitario de la celebración
  english_pob_reading: The verse explicitly includes women and children in the communal celebration.
  chosen_spanish_reading: El versículo incluye explícitamente a las mujeres y a los niños en la celebración comunitaria.
  alternative_spanish_readings:
  - las familias
  - todos los presentes
  rationale: El hebreo nombra estos grupos de forma directa. La versión española los conserva para no diluir el énfasis en la amplitud del gozo compartido.
  doctrine_reference: Translation philosophy §4
- issue: Posible doble sentido de נָשִׁים
  english_pob_reading: Or, 'the wives and the children,' since the Hebrew word can mean either 'women' or 'wives' depending on context.
  chosen_spanish_reading: las mujeres
  alternative_spanish_readings:
  - las esposas
  rationale: En ausencia de un poseedor explícito, el sentido general «mujeres» es más seguro. Se deja constancia de la alternativa contextual, sin imponerla.
  doctrine_reference: Léxico hebreo contextual
translation_notes:
  revision_awareness: 'La auditoría inglesa muestra una revisión menor: se eliminó el «And» inicial antes de «also» para mayor naturalidad. La redacción española adopta directamente una solución natural equivalente con «También» y mantiene intacto el contenido semántico y la estructura informativa del versículo.'
  spanish_consistency_notes:
  - Se mantiene «Dios» para הָאֱלֹהִים, conforme al estándar del proyecto.
  - Se conserva el verbo de alegría de manera repetida para reflejar la cohesión léxica del hebreo.
  - Se usa «las mujeres» y no «las esposas» como lectura principal, pero se documenta la alternativa contextual.
  - «Desde lejos» reproduce de forma natural el alcance auditivo de מֵרָחוֹק.
