  lexicon: Transliteración estándar
  rationale: Se adapta la transliteración al uso español, evitando una grafía demasiado anglicada y manteniendo el nombre propio reconocible.
- source_word: הוֹדַוְיָה
  english_pob_choice: Hodaviah
  chosen_spanish: Hodavías
  alternatives_spanish:
  - Hodaviah
  lexicon: Transliteración estándar
  rationale: Se conserva el nombre propio conforme al hebreo masorético de este versículo; la acentuación española ayuda a su lectura natural.
- source_word: הַ/סְּנֻאָה
  english_pob_choice: Hassenuah
  chosen_spanish: Hasenuá
  alternatives_spanish:
  - Hasenua
  lexicon: Transliteración estándar
  rationale: En este contexto genealógico se trata de un nombre propio; la forma española simplifica la doble aspiración inglesa sin perder la identidad del nombre.
