translation:
  language: es
  text: El viento del norte trae lluvia[a], y un rostro enojado, una lengua calumniadora[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «El viento del norte dispersa la lluvia». El verbo hebreo puede entenderse de otra manera, y algunos intérpretes toman el proverbio como que el viento del norte disipa la lluvia en lugar de producirla.'
    reason: alternative_reading
  - marker: b
    text: 'Literalmente: «una lengua de secreto» o «una lengua oculta»; es decir, habla encubierta, como la murmuración o la calumnia.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ר֣וּחַ צָ֭פוֹן
  english_pob_choice: the north wind
  chosen_spanish: el viento del norte
  alternatives_spanish:
  - un viento del norte
  - el viento norteño
  lexicon: HALOT
  rationale: La expresión hebrea nombra el viento asociado con el norte; en español, «el viento del norte» es natural y conserva la imagen concreta.
- source_word: תְּח֣וֹלֵֽל
  english_pob_choice: brings forth
  chosen_spanish: hace caer
  alternatives_spanish:
  - produce
  - trae
  - engendra
  lexicon: HALOT
  rationale: El verbo admite una lectura causal. Para el paralelismo del proverbio, «hace caer» comunica de manera clara la relación entre el viento y la lluvia sin imponer más de lo que el hebreo exige.
- source_word: גָּ֑שֶׁם
  english_pob_choice: rain
  chosen_spanish: la lluvia
  alternatives_spanish:
  - lluvia
  - aguacero
  - chaparrón
  lexicon: HALOT
  rationale: Término directo y natural para גָּשֶׁם; «la lluvia» mantiene el sentido básico y la forma proverbial.
- source_word: וּ/פָנִ֥ים נִ֝זְעָמִ֗ים
  english_pob_choice: an angry face
  chosen_spanish: un rostro enojado
  alternatives_spanish:
  - un semblante airado
  - un rostro airado
  - un semblante enojado
  lexicon: HALOT
  rationale: Aunque פנים es plural en forma, funciona idiomáticamente como singular en este tipo de dicho. «Rostro» conserva la imagen bíblica y «enojado» expresa היטב la idea de indignación/enojo.
- source_word: לְשׁ֣וֹן
  english_pob_choice: a tongue
  chosen_spanish: una lengua
  alternatives_spanish:
  - la lengua
  - habla
  lexicon: HALOT
  rationale: Se conserva el sustantivo concreto «lengua» para mantener la imaginería del hebreo, en vez de abstraerlo como «habla».
- source_word: סָֽתֶר
  english_pob_choice: slanderous
  chosen_spanish: de secreto
  alternatives_spanish:
  - oculta
  - a escondidas
  - de ocultamiento
  lexicon: HALOT
  rationale: El hebreo significa literalmente «secreto/oculto». En español, «de secreto» conserva la literalidad y la tensión semántica documentada por la POB inglesa, que entiende el resultado como habla encubierta o maliciosa.
theological_decisions:
- issue: Leer el segundo hemistiquio como habla encubierta/maliciosa sin perder la literalidad de סָתֶר
  english_pob_reading: literally 'a tongue of secrecy' or 'a hidden tongue,' that is, covert speech such as backbiting or slander.
  chosen_spanish_reading: una lengua de secreto
  alternative_spanish_readings:
  - una lengua oculta
  - una lengua calumniadora
  - habla encubierta
  rationale: La POB inglesa preserva la literalidad y luego aclara el sentido probable. En español, «de secreto» mantiene el nexo nominal literal, dejando abierta la interpretación de habla encubierta o dañina sin fijarla demasiado pronto.
  doctrine_reference: Proverbios 25:23; sabiduría proverbial sobre el poder del habla
- issue: Mantener la posibilidad de la lectura alternativa del verbo תְּחוֹלֵל
  english_pob_reading: 'The north wind brings forth rain; note: some interpreters take the proverb to mean that the north wind dispels rain rather than produces it.'
  chosen_spanish_reading: El viento del norte hace caer la lluvia
  alternative_spanish_readings:
  - El viento del norte dispersa la lluvia
  - El viento del norte aparta la lluvia
  rationale: El hebreo permite más de una relación causal. La redacción principal sigue la opción de la POB inglesa, pero la nota registra la lectura alternativa sin borrarla.
  doctrine_reference: Proverbios 25:23; crítica textual y semántica del verbo חול
translation_notes:
  revision_awareness: 'Se revisó el equilibrio entre literalidad y claridad: se mantuvo la imagen del «viento del norte» y de la «lengua», pero se ajustó el segundo hemistiquio a un español más natural que conserve la ambigüedad lexical de סָתֶר. La nota sobre el verbo reproduce la tensión interpretativa documentada en el audit trail inglés.'
  spanish_consistency_notes:
  - Se usó «Yahvé» por norma del proyecto solo cuando aparece el nombre divino; en este versículo no aplica.
  - Se evitó «Señor» y «Cristo» porque no hay tetragrámaton ni lenguaje mesiánico en el texto.
  - «Lengua» se mantuvo de forma concreta para respetar la imagen hebrea y la correspondencia con la nota lexical.
  - La opción «de secreto» es deliberadamente literal para que la nota explique el posible sentido de habla oculta o dañina.
