translation:
  language: es
  text: Y sus hermanos, hombres valientes, fueron dos mil setecientos jefes de casas paternas; y el rey David los designó sobre los rubenitas, los gaditas y la mitad de la tribu de Manasés, para todo asunto de Dios[a] y del rey.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para todo lo relacionado con Dios y con el rey».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֶחָיו
  english_pob_choice: And his brothers
  chosen_spanish: Y sus hermanos
  alternatives_spanish:
  - Y sus parientes
  - Y sus familiares
  lexicon: HALOT
  rationale: La forma hebrea retoma a los hombres vinculados con el personaje anterior; «hermanos» conserva la referencia directa y la relación de clan sin ampliar innecesariamente a un sentido más difuso de parentesco.
- source_word: בְּנֵי חַיִל
  english_pob_choice: valiant men
  chosen_spanish: hombres valientes
  alternatives_spanish:
  - hombres de valor
  - hombres capaces
  lexicon: HALOT
  rationale: La expresión idiomática describe hombres de fuerza y competencia para una función de responsabilidad. «Hombres valientes» mantiene el tono de capacidad y vigor que el POB inglés quiso preservar.
- source_word: אַלְפַּיִם וּשְׁבַע מֵאוֹת
  english_pob_choice: two thousand seven hundred
  chosen_spanish: dos mil setecientos
  alternatives_spanish:
  - 2,700
  lexicon: HALOT
  rationale: Es una cifra cardinal directa; se mantiene sin interpretación adicional.
- source_word: רָאשֵׁי הָאָבוֹת
  english_pob_choice: heads of fathers’ houses
  chosen_spanish: jefes de casas paternas
  alternatives_spanish:
  - jefes de casas de los padres
  - cabezas de casas paternas
  lexicon: HALOT
  rationale: La expresión técnica alude a jefes de clanes o casas familiares. «Casas paternas» conserva la estructura social del hebreo mejor que una generalización como «familias».
- source_word: וַיַּפְקִידֵם
  english_pob_choice: appointed them
  chosen_spanish: los puso
  alternatives_spanish:
  - los nombró
  - los designó
  - los puso a cargo
  lexicon: HALOT
  rationale: El verbo implica asignación oficial de responsabilidad. «Los puso sobre» reproduce bien la idea de comisión/encargo y permite conservar la preposición de autoridad del hebreo.
- source_word: עַל
  english_pob_choice: over
  chosen_spanish: sobre
  alternatives_spanish:
  - a cargo de
  - encima de
  lexicon: HALOT
  rationale: En este contexto administrativo, עַל marca autoridad o supervisión. «Sobre» es la equivalencia más directa y transparente.
- source_word: הָראוּבֵנִי וְהַגָּדִי וַחֲצִי שֵׁבֶט הַמְנַשִּׁי
  english_pob_choice: the Reubenites, the Gadites, and the half-tribe of Manasseh
  chosen_spanish: los rubenitas, los gaditas y la mitad de la tribu de Manasés
  alternatives_spanish:
  - el rubenita, el gadita y la mitad de la tribu de Manasés
  - los de Rubén, los de Gad y la media tribu de Manasés
  lexicon: HALOT
  rationale: Los gentilicios tribales en español se expresan naturalmente en plural colectivo. «La mitad de la tribu de Manasés» refleja el hebreo sin añadir explicaciones no presentes en el texto.
- source_word: לְכָל דְּבַר הָאֱלֹהִים
  english_pob_choice: for every matter of God
  chosen_spanish: para todo asunto de Dios
  alternatives_spanish:
  - para cada asunto de Dios
  - para todo lo referente a Dios
  - para todo el negocio de Dios
  lexicon: HALOT
  rationale: דבר puede significar asunto, causa o materia. «Asunto» es una opción natural en español que conserva la amplitud y la posible ambigüedad del hebreo sin volverlo demasiado abstracto.
- source_word: וּדְבַר הַמֶּלֶךְ
  english_pob_choice: and of the king
  chosen_spanish: y de el rey
  alternatives_spanish:
  - y del rey
  - y el asunto del rey
  - y los asuntos del rey
  lexicon: HALOT
  rationale: La construcción paralela con la frase anterior sugiere mantener la relación breve del hebreo. Aquí, sin embargo, la forma correcta en español es «del rey»; se prefiere una solución que conserve la elipsis de «asunto» implícita en el miembro anterior.
theological_decisions:
- issue: Distinción entre los asuntos de Dios y los asuntos del rey
  english_pob_reading: The appointees were responsible for both matters pertaining to God and matters pertaining to the king.
  chosen_spanish_reading: Los nombrados estaban encargados tanto de asuntos de Dios como de asuntos del rey.
  alternative_spanish_readings:
  - para todo lo referente a Dios y al rey
  - para los asuntos de Dios y del rey
  rationale: El hebreo distingue dos esferas de responsabilidad sin explicitar jerarquía doctrinal. La traducción conserva esa distinción administrativa y religiosa, evitando expandir el sentido hacia categorías posteriores no expresadas en el texto.
  doctrine_reference: Translation philosophy §3, §6
translation_notes:
  revision_awareness: La redacción sigue de cerca la revisión final del POB inglés, que ajustó el orden a «King David» y afinó la construcción final para reflejar de manera más natural la frase hebrea. En español se conservó la misma relación paralela entre «asunto de Dios» y «asunto del rey», pero se optó por una formulación idiomática que evita calco innecesario.
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלֹהִים y se evita cualquier sustitución por un equivalente más interpretativo.
  - «Casa paterna» y «jefes» conservan la estructura administrativa-genealógica del hebreo.
  - Se usa «Manasés» como nombre tribual estándar en español.
  - La nota al pie preserva la alternativa lexical del POB inglés para el segmento final.
  - Se corrigió la preposición final a «del rey» para gramática española natural, manteniendo la correspondencia con el hebreo.
