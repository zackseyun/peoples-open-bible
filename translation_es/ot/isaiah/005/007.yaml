translation:
  language: es
  text: Porque la viña de Yahvé de los Ejércitos[c] es la casa de Israel, y los hombres[b] de Judá son la plantación de su deleite. Buscó justicia, pero he aquí sangre derramada[a]; rectitud, pero he aquí un clamor[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo hace un juego de sonidos entre «justicia» (mishpat) y «sangre derramada» (mispach), y entre «rectitud» (tsedaqah) y «clamor» (tse‘aqah). El juego verbal intensifica el contraste entre lo que Yahvé buscó y lo que halló.
    reason: lexical_alternative
  - marker: b
    text: O «el hombre de Judá», con sentido colectivo; el singular hebreo אִישׁ puede representar al grupo.
    reason: alternative_reading
  - marker: c
    text: «Yahvé de los Ejércitos» se ha traducido tradicionalmente «SEÑOR de los Ejércitos».
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la explicación del sentido de la parábola de la viña; «Porque» conserva bien la relación causal o explicativa del hebreo en español.
- source_word: כֶרֶם
  english_pob_choice: vineyard
  chosen_spanish: viña
  alternatives_spanish:
  - viñedo
  - vine
  lexicon: HALOT
  rationale: En español bíblico, «viña» es natural y fiel al cultivo figurado; comunica la imagen agrícola sin sonar técnico.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el nombre divino: «Yahvé», en lugar de ocultarlo con un título sustitutivo.'
- source_word: צְבָאוֹת
  english_pob_choice: of Armies
  chosen_spanish: de los Ejércitos
  alternatives_spanish:
  - de los Hosts
  - Todopoderoso
  lexicon: HALOT
  rationale: «Ejércitos» reproduce el sentido del título divino en un español claro y reverente; «Hosts» sería menos transparente para lectores hispanohablantes.
- source_word: בֵּית יִשְׂרָאֵל
  english_pob_choice: the house of Israel
  chosen_spanish: la casa de Israel
  alternatives_spanish:
  - la familia de Israel
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Conserva la expresión de alianza y linaje del hebreo sin diluir su forma establecida.
- source_word: וְאִישׁ יְהוּדָה
  english_pob_choice: the men of Judah
  chosen_spanish: los hombres de Judá
  alternatives_spanish:
  - el hombre de Judá
  - el pueblo de Judá
  lexicon: HALOT
  rationale: El singular hebreo funciona de modo colectivo; «los hombres de Judá» mantiene el valor colectivo y la fuerza masculina del término original.
- source_word: נְטַע שַׁעֲשׁוּעָיו
  english_pob_choice: the planting of his delight
  chosen_spanish: la plantación de su deleite
  alternatives_spanish:
  - la plantación que él ama
  - su plantación deleitosa
  lexicon: HALOT
  rationale: «Plantación» conserva la metáfora de lo plantado, y «su deleite» reproduce el matiz posesivo y afectivo del hebreo con la menor pérdida posible.
- source_word: וַיְקַו
  english_pob_choice: He looked for
  chosen_spanish: Esperó
  alternatives_spanish:
  - Buscó
  - Anticipó
  lexicon: HALOT
  rationale: En este contexto poético, «Esperó» expresa con naturalidad la expectativa divina del fruto justo que debía encontrar.
- source_word: לְמִשְׁפָּט
  english_pob_choice: justice
  chosen_spanish: justicia
  alternatives_spanish:
  - juicio
  - derecho
  lexicon: HALOT
  rationale: Aquí משפט se refiere a rectitud social y orden justo, por lo que «justicia» es la opción más clara.
- source_word: מִשְׂפָּח
  english_pob_choice: bloodshed
  chosen_spanish: sangre derramada
  alternatives_spanish:
  - derramamiento de sangre
  - violencia sanguinaria
  lexicon: HALOT
  rationale: «Sangre derramada» expresa el resultado violento con naturalidad española y mantiene el contraste semántico con «justicia»; no se pierde la idea de derramamiento que exige el contexto.
- source_word: לִצְדָקָה
  english_pob_choice: for righteousness
  chosen_spanish: para rectitud
  alternatives_spanish:
  - para justicia
  - para justicia recta
  lexicon: HALOT
  rationale: צדקה puede abarcar justicia/rectitud; aquí «rectitud» ayuda a evitar la repetición de «justicia» y conserva el orden moral y covenantal del término.
- source_word: צְעָקָה
  english_pob_choice: an outcry
  chosen_spanish: un clamor
  alternatives_spanish:
  - un grito
  - una protesta
  lexicon: HALOT
  rationale: «Clamor» comunica bien la queja pública y dolida del término, en un registro digno y bíblico.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. Se mantiene el nombre propio divino como «Yahvé» según la norma del proyecto, evitando la sustitución por un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Collective force of וְאִישׁ יְהוּדָה
  english_pob_reading: the men of Judah
  chosen_spanish_reading: los hombres de Judá
  alternative_spanish_readings:
  - el hombre de Judá
  - el pueblo de Judá
  rationale: Aunque la forma hebrea es singular, funciona colectivamente. «Los hombres de Judá» conserva ese valor plural y el matiz masculino señalado en el audit trail inglés.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over gender-neutral)
- issue: Poetic wordplay between justice/righteousness and bloodshed/outcry
  english_pob_reading: justice / bloodshed; righteousness / outcry
  chosen_spanish_reading: justicia / sangre derramada; rectitud / clamor
  alternative_spanish_readings:
  - justicia / derramamiento de sangre; justicia / grito
  - derecho / sangre derramada; justicia / alarido
  rationale: El hebreo encadena un juego sonoro y semántico entre los términos. En español no es posible reproducirlo por completo, pero se conserva el contraste de expectativas frustradas y se marca la pareja lexical con equivalentes fieles.
  doctrine_reference: Poetic devices and wordplay; preserve tension rather than flattening
translation_notes:
  revision_awareness: La revisión más reciente indicó alta concordancia y sin cambios sustanciales; se mantuvo la estructura del verso, con ajuste de español natural para «viña/viña», «Esperó», y la pareja final «sangre derramada / clamor» sin añadir interpretaciones ajenas al hebreo.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה.
  - Se evita «SEÑOR» como máscara del nombre divino.
  - Se preserva el valor colectivo de «los hombres de Judá».
  - «Rectitud» se emplea para צדקה para no sobrecargar «justicia», ya presente para משפט.
  - La nota a documenta el juego de palabras hebreo y la nota b aclara la colocación de «he aquí».
