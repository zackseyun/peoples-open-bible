    issue: פֶּן se tradujo como 'para que no' en ambas cláusulas
    rationale: Aunque no es imposible, 'para que no' suena más final que preventivo. El hebreo expresa advertencia/resultado temido ('lest'); 'no sea que' refleja mejor la lógica poética y la decisión documentada del POB inglés.
  - severity: medium
    issue: La nota [b] está anclada en 'filisteos' pero explica 'incircuncisos'
    rationale: Las instrucciones exigen que cada nota aparezca en la palabra o frase pertinente. La nota debe ir sobre 'incircuncisos' o la frase completa correspondiente, no sobre un término distinto.
  - severity: low
    issue: La nota [a] sobre 'Gat' es innecesaria y está mal formulada
    rationale: 'Dice ''O: «en Gat» como forma hispana del topónimo'', pero el texto principal ya usa ''Gat''. No preserva una alternativa real del POB inglés ni resuelve una ambigüedad nueva en español.'
