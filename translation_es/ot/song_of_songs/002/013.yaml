revisions:
- from: La higuera ha dado sus higos tempranos[a], y las vides en flor[b] desprenden fragancia. Levántate, amor mío, hermosa mía[c], y ven conmigo.
  to: La higuera ha madurado sus higos tempranos[a], y las vides en flor[b] desprenden fragancia. Levántate, amor mío, hermosa mía, y ven[c].
  rationale: Se ajusta חָנְטָה a 'ha madurado' para seguir mejor la decisión lexical auditada sobre el desarrollo de los higos tempranos. Se reemplaza 'ven conmigo' por 'ven' para evitar añadir contenido no explícito en el hebreo, dejando en nota el valor idiomático de וּלְכִי לָךְ como invitación a apartarse con el hablante.
