translation:
  language: es
  text: Y esparciré a Egipto entre las naciones[a], y los dispersaré entre los países.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Egipto» funciona aquí como nombre de la nación que representa a su población; el plural de la segunda cláusula lo muestra explícitamente.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַהֲפִצוֹתִי
  english_pob_choice: I will scatter
  chosen_spanish: esparciré
  alternatives_spanish:
  - dispersaré
  - haré que sean esparcidos
  lexicon: HALOT
  rationale: El hebreo expresa una acción causativa de dispersión. En español, «esparciré» comunica bien la iniciativa divina y mantiene un tono natural y digno, sin cargar innecesariamente la forma causativa.
- source_word: מִצְרַיִם
  english_pob_choice: Egypt
  chosen_spanish: Egipto
  alternatives_spanish:
  - los egipcios
  lexicon: HALOT
  rationale: Se conserva el nombre de la nación como en el hebreo. En este contexto profético, el nombre del país representa a su población, lo cual permite que el pronombre plural posterior se entienda metonímicamente.
- source_word: בַּגּוֹיִם
  english_pob_choice: among the nations
  chosen_spanish: entre las naciones
  alternatives_spanish:
  - entre los pueblos
  - en medio de las naciones
  lexicon: HALOT
  rationale: «Naciones» refleja el sentido habitual de גּוֹיִם y «entre» reproduce con naturalidad la idea de dispersión dentro del conjunto de otros pueblos.
- source_word: וְזֵרִיתִם
  english_pob_choice: and I will disperse them
  chosen_spanish: y los dispersaré
  alternatives_spanish:
  - y los esparciré
  - y los aventaré
  lexicon: HALOT
  rationale: זרה puede significar dispersar o aventar. Aquí «los dispersaré» mantiene la paralela poética con el primer verbo y explicita el referente plural del sufijo pronominal.
- source_word: בָּאֲרָצוֹת
  english_pob_choice: among the lands
  chosen_spanish: entre las tierras
  alternatives_spanish:
  - entre los países
  - en las tierras
  lexicon: HALOT
  rationale: El plural hebreo indica extensión por varias tierras o regiones. «Entre las tierras» conserva esa amplitud geográfica y el paralelismo con «entre las naciones».
theological_decisions:
- issue: Tensión entre «Egipto» singular y el pronombre plural «los»
  english_pob_reading: Retain 'Egypt' in the first clause and render the suffix explicitly as 'them' in the second, allowing the nation-name to stand metonymically for its people.
  chosen_spanish_reading: Conservar «Egipto» y traducir el sufijo plural como «los», entendiendo el nombre nacional como representación de su ժողովրդի/población.
  alternative_spanish_readings:
  - «los egipcios» en ambas cláusulas
  - «Egipto» y luego «a sus habitantes»
  rationale: El hebreo yuxtapone el nombre singular de la nación con un sufijo plural. Mantener esa tensión en español evita borrar la metonimia profética y sigue de cerca la estructura del original.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather than resolve it; Original-language primacy over translation tradition.'
translation_notes:
  revision_awareness: La revisión inglesa más reciente ajustó la preposición del segundo miembro a un paralelismo más natural con el primero («among the lands»). En español, «entre las tierras» mantiene ese paralelismo y la amplitud distributiva sin forzar un calco.
  spanish_consistency_notes:
  - Se mantuvo la forma verbal en primera persona singular futura para reflejar la acción divina directa del hebreo.
  - Se evitó «SEÑOR» o «Yahvé» porque este versículo no contiene el nombre divino explícito en el texto fuente provisto.
  - Se preservó el paralelismo sintáctico entre las dos cláusulas con «entre... entre...» para reflejar la repetición hebrea.
