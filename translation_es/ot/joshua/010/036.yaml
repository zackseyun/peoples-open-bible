revisions:
- from: Entonces Josué[a], y todo Israel con él, subieron de Eglón a Hebrón, y pelearon contra ella.
  to: Entonces Josué[a] y todo Israel con él subió de Eglón a Hebrón, y pelearon contra ella.
  rationale: Se corrige «subieron» a «subió» para reflejar la forma singular del verbo hebreo y la sintaxis del original, donde Josué es el sujeto principal y «todo Israel con él» lo acompaña. También se suaviza la puntuación para un español más natural y se pule la redacción de la nota sin cambiar su contenido.
