translation:
  language: es
  text: ¿Por qué duermes[a], oh, alma[b], y no bendices al Señor?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿estás durmiendo, oh, alma?»'
    reason: lexical_alternative
  - marker: b
    text: El griego se dirige al alma en vocativo; no dice «mi alma».
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἵνα τί
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿Por qué razón
  - ¿A causa de qué
  lexicon: BDAG
  rationale: La pregunta griega introduce una reprensión o llamado a despertar; «¿Por qué» comunica de forma natural esa fuerza interrogativa sin añadir contenido.
- source_word: ὑπνοῖς
  english_pob_choice: do you sleep
  chosen_spanish: duermes
  alternatives_spanish:
  - estás durmiendo
  - andas dormida
  lexicon: BDAG
  rationale: El presente indicativo segunda singular se expresa de manera directa con «duermes»; en español suena más natural que una perífrasis y conserva el matiz de acción en curso implícito en el contexto.
- source_word: ψυχή
  english_pob_choice: O soul
  chosen_spanish: oh alma
  alternatives_spanish:
  - alma
  - mi alma
  lexicon: BDAG
  rationale: La vocación directa queda reflejada con «oh alma». No se añade «mi», porque el griego no lo dice. Se conserva el tono de apostrofe personal.
- source_word: εὐλογεῖς
  english_pob_choice: bless
  chosen_spanish: bendices
  alternatives_spanish:
  - alabas
  - hablas bien de
  lexicon: BDAG
  rationale: En contexto dirigido a Dios, «bendecir» reproduce bien el valor doxológico de εὐλογέω; en español «bendices» mantiene la resonancia bíblica sin volverse opaco.
- source_word: τὸν κύριον
  english_pob_choice: the Lord
  chosen_spanish: al Señor
  alternatives_spanish:
  - al Señor Dios
  - al Amo
  lexicon: BDAG
  rationale: Se conserva la equivalencia litúrgica estándar de κύριος en este contexto de adoración. «Señor» comunica la referencia a Dios sin sustituirla por una formulación más interpretativa.
theological_decisions:
- issue: Tratamiento de κύριος en contexto doxológico
  english_pob_reading: the Lord
  chosen_spanish_reading: al Señor
  alternative_spanish_readings:
  - a Yahvé
  - al Señor Yahvé
  rationale: Aunque la política general del proyecto privilegia «Yahvé» para יהוה, aquí el texto griego presenta κύριος en una fórmula de alabanza. La traducción española mantiene «Señor» para respetar el dato del texto fuente y la lectura doxológica directa, sin ocultar que se trata del título divino.
  doctrine_reference: κύριος / divine title usage
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés muestran alta concordancia; no hay revisiones sustantivas aplicadas en la revisión más reciente, por lo que el español sigue de cerca la sintaxis y las decisiones léxicas ya auditadas.
  spanish_consistency_notes:
  - Se mantiene un tono bíblico claro y moderno.
  - No se añadió posesivo en «alma», conforme al griego.
  - Se preservó la pregunta retórica con fuerza de reprensión.
  - Se usó «Señor» para κύριος en armonía con el contexto de alabanza.
