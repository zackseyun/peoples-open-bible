translation:
  language: es
  text: 'Y Jacob[a] te recibirá, y todos los padres te alabarán. Y a medida que se llevaban a cada uno de sus hermanos, los que quedaban decían: «No nos avergüences, hermano[b], ni les falles a los que murieron antes que nosotros».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «te acogerá» o «te dará la bienvenida» para «te recibirá».
    reason: lexical_alternative
  - marker: b
    text: O «ni hagas falsos a los que murieron antes que nosotros», es decir, no traiciones el testimonio de los hermanos que ya han muerto.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑποδέξονται
  english_pob_choice: will welcome
  chosen_spanish: te recibirá
  alternatives_spanish:
  - te acogerá
  - te dará la bienvenida
  - te recibirá con honra
  lexicon: LSJ
  rationale: El verbo puede expresar recibir u ofrecer acogida hospitalaria. En español, «recibirá» conserva la idea de recepción personal sin forzar una perífrasis demasiado explicativa; el contexto honorífico queda implícito por la escena con Jacob y los padres.
- source_word: Ἰακὼβ
  english_pob_choice: Jacob
  chosen_spanish: Jacob
  alternatives_spanish:
  - Jacobo
  lexicon: N/A
  rationale: Se conserva el nombre propio tradicional «Jacob», que corresponde al patriarca del contexto de los padres.
- source_word: οἱ πατέρες
  english_pob_choice: the fathers
  chosen_spanish: los padres
  alternatives_spanish:
  - los antepasados
  - los patriarcas
  lexicon: LSJ
  rationale: Se mantiene la forma literal «los padres» para reproducir la fuerza honorífica y ancestral del griego. «Antepasados» explicaría más de lo que el texto dice, y «patriarcas» estrecha demasiado el término.
- source_word: ἐπαινέσουσιν
  english_pob_choice: will praise
  chosen_spanish: alabarán
  alternatives_spanish:
  - elogiarán
  - alabarán y aprobarán
  lexicon: LSJ
  rationale: «Alabarán» es la equivalencia directa y natural en español para el elogio solemne indicado por el verbo.
- source_word: τῶν ἀποσπωμένων
  english_pob_choice: was being taken away
  chosen_spanish: era llevado aparte
  alternatives_spanish:
  - era arrancado
  - era llevado
  - era apartado
  lexicon: LSJ
  rationale: El participio denota a alguien que está siendo arrancado o separado por la fuerza. «Era llevado aparte» conserva la idea de desplazamiento forzoso con un español más fluido y menos literal que «arrancado», sin borrar la coerción del contexto martirial.
- source_word: οἱ περιλειπόμενοι
  english_pob_choice: those who remained
  chosen_spanish: los que quedaban
  alternatives_spanish:
  - los que permanecían
  - los sobrevivientes
  lexicon: LSJ
  rationale: «Los que quedaban» reproduce bien la situación narrativa inmediata sin añadir la implicación más fuerte de «sobrevivientes», que podría sonar retrospectiva.
- source_word: Μὴ καταισχύνῃς ἡμᾶς
  english_pob_choice: Do not disgrace us
  chosen_spanish: No nos avergüences
  alternatives_spanish:
  - No nos deshonres
  - No nos avergüences ni nos cubras de vergüenza
  lexicon: LSJ
  rationale: καταισχύνω expresa avergonzar o deshonrar. «Avergüences» es claro y natural en español; aunque «deshonres» también es posible, «avergüences» conserva la resonancia del honor/vergüenza en la exhortación.
- source_word: ψεύσῃ
  english_pob_choice: prove false
  chosen_spanish: resultes falso
  alternatives_spanish:
  - mientas
  - defraudes
  - traiciones
  lexicon: LSJ
  rationale: 'El verbo puede significar mentir, engañar o resultar falso. «Resultes falso» procura conservar la idea testimonial: no falles a la verdad mostrada por los hermanos que ya murieron, sin reducirlo a una mentira verbal simple.'
- source_word: τοὺς προαποθανόντας
  english_pob_choice: those who died before us
  chosen_spanish: los que murieron antes que nosotros
  alternatives_spanish:
  - los que habían muerto antes que nosotros
  - los que murieron antes de nosotros
  lexicon: LSJ
  rationale: La construcción temporal se rinde con naturalidad en español. «Antes que nosotros» mantiene el sentido relacional y el contraste entre los muertos previos y los hermanos que aún esperan.
theological_decisions:
- issue: Identidad de Jacob en la escena de recepción honorífica
  english_pob_reading: Jacob refers to the patriarch Jacob, who is imagined as welcoming the martyrs among the honored ancestors.
  chosen_spanish_reading: Jacob es el patriarca Jacob, presentado como quien recibe con honor a los mártires junto con los padres.
  alternative_spanish_readings:
  - Jacob como abreviatura colectiva de Israel
  - Jacob como figura ideal de la nación
  rationale: La mención coordinada con «todos los padres» favorece a Jacob como figura patriarcal individual, no como colectividad nacional. La traducción conserva el nombre propio sin ampliar el sentido.
  doctrine_reference: Patriarcas/ancestros honoríficos en la literatura martirial judía
- issue: Sentido testimonial de «no resultes falso»
  english_pob_reading: Or 'nor make false those who died before us,' i.e. do not betray the witness of the brothers who have already died.
  chosen_spanish_reading: «no resultes falso» conserva el matiz de fallar al testimonio de los hermanos ya muertos, no solo de mentir verbalmente.
  alternative_spanish_readings:
  - no traiciones a los que murieron antes que nosotros
  - no hagas falsos a los que murieron antes que nosotros
  - no mientas a los que murieron antes que nosotros
  rationale: 'La frase griega admite una tensión entre engañar, mentir y resultar falso. La opción elegida mantiene esa ambigüedad útil: la vergüenza del hermano vivo implicaría desautorizar el testimonio de los mártires anteriores.'
  doctrine_reference: Testimonio fiel en el martirio; honra de los que perseveran
translation_notes:
  revision_awareness: La redacción sigue el texto griego de Swete y el audit trail inglés, pero ajusta ὑποδέξονται con un español más natural que conserva la recepción honorífica, y ἀποσπωμένων con una expresión menos rígida que aún sugiere separación forzada. También mantiene la ambigüedad de ψεύσῃ sin reducirla a mera falsedad verbal.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; aquí no aparece.
  - Se conserva «Jacob» como nombre propio patriarcal, acorde con el contexto de «los padres».
  - «Los padres» se mantiene literal para preservar el tono ancestral y honorífico.
  - «No nos avergüüences» se evita por ortografía; la forma correcta es «avergüences».
  - Se prefiere un español sobrio y litúrgicamente legible, sin sustituir la tensión testimonial del griego por una paráfrasis explicativa excesiva.
