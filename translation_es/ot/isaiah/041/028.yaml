translation:
  language: es
  text: Y miré[a], pero no había hombre; entre estos no había consejero, de modo que, cuando les preguntara[b], respondieran una palabra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «vi». El hebreo usa una forma que puede expresar la observación retrospectiva; «miré» conserva ese matiz.
    reason: lexical_alternative
  - marker: b
    text: 'O «y respondieran algo». El hebreo literalmente dice: «y respondieran una palabra».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֵרֶא
  english_pob_choice: And I looked
  chosen_spanish: Y miré
  alternatives_spanish:
  - Y vi
  - Entonces miré
  lexicon: HALOT
  rationale: ראה en este contexto profético tiene fuerza retrospectiva de observación. «Miré» conserva el acto de examinar con atención mejor que un simple «vi», y mantiene un tono natural en español.
- source_word: וְאֵין אִישׁ
  english_pob_choice: but there was no man
  chosen_spanish: y no había hombre
  alternatives_spanish:
  - y no había nadie
  - y no había una persona
  lexicon: HALOT
  rationale: אִישׁ es masculino singular y puede funcionar representativamente. Se conserva «hombre» para respetar la forma hebrea y la política de precisión de género, sin neutralizar indebidamente el término.
- source_word: וּמֵאֵלֶּה
  english_pob_choice: among these
  chosen_spanish: entre estos
  alternatives_spanish:
  - de entre estos
  - entre los que estaban allí
  lexicon: HALOT
  rationale: La preposición partitiva מִן con el demostrativo aquí se entiende mejor como «entre». En español «entre estos» transmite con naturalidad la idea de selección dentro del grupo examinado.
- source_word: וְאֵין יוֹעֵץ
  english_pob_choice: there was no counselor
  chosen_spanish: no había consejero
  alternatives_spanish:
  - no había un consejero
  - no había consejero que diera consejo
  lexicon: HALOT
  rationale: יוֹעֵץ es un sustantivo participial de יעץ y designa a quien da consejo. «Consejero» preserva la fuerza sustantiva y es claro en español bíblico contemporáneo.
- source_word: וְאֶשְׁאָלֵם
  english_pob_choice: that when I asked them
  chosen_spanish: para que, cuando yo les preguntara
  alternatives_spanish:
  - para que yo les preguntara
  - cuando yo les preguntara
  lexicon: HALOT
  rationale: 'El imperfecto con ו aquí expresa la situación hipotética o eventual: no había consejero tal que, cuando el hablante preguntara, pudieran responder. «Cuando yo les preguntara» conserva bien ese valor.'
- source_word: וְיָשִׁיבוּ דָבָר
  english_pob_choice: they would answer a word
  chosen_spanish: respondieran una palabra
  alternatives_spanish:
  - dieran respuesta
  - respondieran algo
  lexicon: HALOT
  rationale: Hiphil de שוב puede significar responder, y דָבָר literalmente es «palabra». «Respondieran una palabra» preserva la tersura y la aspereza retórica del hebreo, evitando suavizarlo a una frase más interpretativa.
theological_decisions:
- issue: Referente de «estos» y del consejero ausente
  english_pob_reading: The verse continues the polemic against idols and their representatives, stressing that none among them can give counsel or answer.
  chosen_spanish_reading: El versículo continúa la polémica contra los ídolos y sus representantes, sin precisar más allá de «entre estos» quiénes son exactamente.
  alternative_spanish_readings:
  - podría referirse a las naciones en general
  - podría aludir a los dioses falsos de forma más amplia
  rationale: El contexto inmediato es una disputa judicial contra los ídolos. La traducción conserva la ambigüedad textual de «estos» y no la resuelve de forma excesiva en el cuerpo del texto.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it)
- issue: Valor representativo de אִישׁ
  english_pob_reading: man
  chosen_spanish_reading: hombre
  alternative_spanish_readings:
  - nadie
  - persona
  rationale: El hebreo usa un singular masculino con valor representativo. En español, «hombre» conserva esa correspondencia formal y la tensión de género del original.
  doctrine_reference: Translation philosophy §4 (gender-accurate over gender-neutral)
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión más reciente del inglés POB, que ajustó la cláusula final para expresar con mayor naturalidad la relación temporal («cuando les preguntara»). La versión española refleja ese mismo valor condicional/temporal sin convertirlo en una paráfrasis explicativa.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, aunque este versículo no contiene el Tetragrámaton.
  - Se conserva una sintaxis sobria y cercana al hebreo, pero con fluidez natural en español.
  - «Hombre» se mantiene por fidelidad al singular masculino hebreo representativo.
  - «Palabra» reproduce la literalidad de דָבָר y deja abierta la posible fuerza idiomática de «respuesta».
