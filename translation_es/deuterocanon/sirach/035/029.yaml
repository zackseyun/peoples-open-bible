translation:
  language: es
  text: Mientras aún vivas y haya aliento en ti[a], no te entregues a ningún mortal.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más formalmente, «no te cambies por ninguna carne». La formulación griega es idiomática y puede implicar «no te entregues a los simples mortales».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἕως ἔτι
  english_pob_choice: As long as you still
  chosen_spanish: Mientras aún
  alternatives_spanish:
  - Mientras todavía
  - Tan pronto como
  lexicon: LSJ
  rationale: La expresión marca duración continua con énfasis en el tiempo que todavía queda. «Mientras aún» conserva ese valor temporal de manera natural en español.
- source_word: ζῇς
  english_pob_choice: live
  chosen_spanish: vivas
  alternatives_spanish:
  - estés vivo
  - vivas todavía
  lexicon: LSJ
  rationale: El subjuntivo presente tras ἕως se expresa bien en español con «vivas», manteniendo la idea de una condición temporal vigente.
- source_word: πνοὴ
  english_pob_choice: breath
  chosen_spanish: aliento
  alternatives_spanish:
  - respiración
  - espíritu
  - soplo de vida
  lexicon: LSJ
  rationale: «πνοή» aquí designa el aliento físico o aliento de vida; «aliento» es idiomático y conserva mejor la imagen que «espíritu», que sería más cargado teológicamente.
- source_word: ἐν σοί
  english_pob_choice: in you
  chosen_spanish: en ti
  alternatives_spanish:
  - dentro de ti
  lexicon: LSJ
  rationale: La locución locativa es directa; «en ti» sigue de cerca el griego sin sobreinterpretar.
- source_word: μὴ ἀλλάξῃς
  english_pob_choice: do not yield yourself to
  chosen_spanish: no te entregues
  alternatives_spanish:
  - no te cambies
  - no te sometas
  - no cedas
  lexicon: LSJ
  rationale: Aunque ἀλλάσσω puede significar «cambiar» o «intercambiar», con el reflexivo y el dativo la fuerza es de cederse o ponerse bajo otra influencia. «No te entregues» comunica bien esa advertencia ética en español, con tono formal y claro.
- source_word: σεαυτὸν
  english_pob_choice: yourself
  chosen_spanish: te
  alternatives_spanish:
  - a ti mismo
  - te mismo
  lexicon: LSJ
  rationale: El reflexivo está implícito en «te entregues»; se mantiene la fuerza de la acción sobre uno mismo sin redundancia pesada.
- source_word: πάσῃ σαρκί
  english_pob_choice: any flesh
  chosen_spanish: a toda carne
  alternatives_spanish:
  - a cualquier carne
  - a todo mortal
  - a toda persona
  lexicon: LSJ
  rationale: «σάρξ» en este contexto sapiencial alude a seres humanos en su condición mortal. «A toda carne» conserva la literalidad y el alcance general del giro semítico-griego sin convertirlo en una formulación doctrinal posterior.
theological_decisions:
- issue: Sentido de σάρξ en este contexto sapiencial
  english_pob_reading: flesh = mortal human being(s), not sinful nature
  chosen_spanish_reading: carne = humanidad mortal / seres humanos frágiles, no «naturaleza pecaminosa»
  alternative_spanish_readings:
  - carne = deseo carnal
  - carne = naturaleza pecaminosa
  rationale: En Sirácides, πάσῃ σαρκί funciona como una expresión convencional para la humanidad en su fragilidad. Traducirla como «naturaleza pecaminosa» introduciría un sentido paulino posterior que no está exigido por el contexto.
  doctrine_reference: 'DOCTRINE.md: σάρξ = carne (literal) / naturaleza pecaminosa (metafórico), según contexto'
- issue: Fuerza de la advertencia μὴ ἀλλάξῃς σεαυτὸν πάσῃ σαρκί
  english_pob_reading: a warning against putting oneself under the control or judgment of mere mortals
  chosen_spanish_reading: una advertencia contra entregarse o cederse a la presión de los seres humanos mortales
  alternative_spanish_readings:
  - no cambiarte por nadie
  - no acomodarte a cualquiera
  - no hacerte como todo hombre
  rationale: La frase griega es comprimida e idiomática. La traducción elegida conserva la idea de no cederse a la influencia humana sin borrar la literalidad de «carne».
  doctrine_reference: Sirach 35:29 wisdom exhortation; lexical idiom note
translation_notes:
  revision_awareness: Se tomó como referencia la última revisión inglesa, que sustituyó «give yourself over to» por «yield yourself to» para reflejar de forma más formal y directa ἀλλάξῃς σεαυτόν con πάσῃ σαρκί. La versión española sigue esa línea con «no te entregues», manteniendo el valor idiomático y la transparencia lexical.
  spanish_consistency_notes:
  - Se evitó «Señor» o equivalentes, porque no aparece el nombre divino en el texto fuente.
  - Se prefirió «Mesías/Cristo» no aplica aquí; el verso no contiene terminología mesiánica.
  - «Carne» se mantuvo de forma literal en la nota para preservar la transparencia audit trail.
  - El registro es reverente y sobrio, apto para lectura bíblica pública en español neutro.
