  yaml_path: translation/ot/judges/006/026.yaml
  text: Then build an altar to Yahweh your God on the top of this stronghold[a], in orderly arrangement, and take the second bull and offer it up as a burnt offering with the wood of the Asherah that you cut down.
  footnotes:
