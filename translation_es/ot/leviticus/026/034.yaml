  glossary_alignment: 'No hay conflicto con la terminología troncal del proyecto. «La tierra», «descansará» y el registro general son adecuados. La principal cuestión léxica es רצה: en español conviene apartarse del inglés publicado para preservar mejor el sentido de compensación/restitución documentado en el expediente.'
