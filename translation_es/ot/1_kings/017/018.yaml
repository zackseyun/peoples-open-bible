    issue: '''¿Qué tengo yo contigo?'' suena algo calcado'
    rationale: Aunque comprensible, en español natural la queja idiomática se expresa mejor como '¿Qué tengo yo que ver contigo?' o, más literalmente, '¿Qué hay entre tú y yo?'. La primera preserva bien la fuerza confrontativa y la legibilidad.
  - severity: medium
    issue: '''¿Has venido a mí?'' es gramatical pero poco idiomático'
    rationale: En español general y eclesial suena más natural '¿Has venido a verme?' o '¿Has venido a mí?' solo en contextos muy literales. Aquí 'a verme' comunica la dirección hacia la viuda sin pérdida relevante del sentido acusatorio.
