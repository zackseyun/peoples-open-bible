translation:
  language: es
  text: Cuando llegó la tarde[a], sus esclavos se apresuraron a retirarse; y Bagoás cerró la tienda desde afuera y excluyó de la presencia de su señor a los que estaban allí, y se fueron a sus camas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'anochecía'. El griego ὀψία ἐγένετο significa literalmente que llegó la tarde o la tarde avanzó hacia la noche.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὀψία
  english_pob_choice: evening
  chosen_spanish: la tarde
  alternatives_spanish:
  - la noche
  - el atardecer
  lexicon: LSJ
  rationale: En la construcción temporal ὀψία ἐγένετο, el sentido natural es el momento en que cae la tarde. 'La tarde' es claro y idiomático en español; 'el atardecer' o 'la noche' intensifican o desplazan ligeramente el matiz.
- source_word: ἐσπούδασαν
  english_pob_choice: hurried
  chosen_spanish: se apresuraron
  alternatives_spanish:
  - dieron prisa
  - se dieron prisa
  lexicon: BDAG
  rationale: El verbo expresa premura o urgencia. 'Se apresuraron' conserva el valor de prisa sin sonar arcaico.
- source_word: οἱ δοῦλοι αὐτοῦ
  english_pob_choice: his slaves
  chosen_spanish: sus esclavos
  alternatives_spanish:
  - sus siervos
  - sus servidores
  lexicon: BDAG
  rationale: Se preserva la fuerza social de δοῦλοι, como personas bajo autoridad de un amo en un entorno cortesano/militar. 'Esclavos' mantiene la relación de dependencia que el texto griego hace visible.
- source_word: ἀναλύειν
  english_pob_choice: to depart
  chosen_spanish: retirarse
  alternatives_spanish:
  - marcharse
  - partir
  lexicon: LSJ
  rationale: Aquí el sentido es retirarse de la presencia del amo al terminar la jornada. 'Retirarse' suena natural en registro formal y mantiene la idea de dejar la escena.
- source_word: συνέκλεισεν τὴν σκηνὴν ἔξωθεν
  english_pob_choice: shut the tent from outside
  chosen_spanish: cerró la tienda desde afuera
  alternatives_spanish:
  - aseguró la tienda desde afuera
  - cerró la tienda por fuera
  lexicon: LSJ
  rationale: La frase indica asegurar la tienda desde el exterior. 'Cerrar' es idiomático en español y no añade un mecanismo no explicitado por el griego.
- source_word: ἀπέκλεισεν
  english_pob_choice: excluded
  chosen_spanish: excluyó
  alternatives_spanish:
  - cerró el paso a
  - dejó fuera
  lexicon: LSJ
  rationale: El compuesto intensifica el acto de impedir acceso. 'Excluyó' reproduce bien esa acción formal de dejar fuera a los presentes.
- source_word: τοὺς παρεστῶτας
  english_pob_choice: those in attendance
  chosen_spanish: a los que estaban allí
  alternatives_spanish:
  - a los asistentes
  - a los que estaban de pie
  lexicon: BDAG
  rationale: El participio refiere a los que asistían o estaban presentes junto al amo. 'Los que estaban allí' evita sobretraducir el matiz verbal y encaja con la sintaxis española.
- source_word: ἐκ προσώπου τοῦ κυρίου αὐτοῦ
  english_pob_choice: from the presence of his lord
  chosen_spanish: de la presencia de su señor
  alternatives_spanish:
  - de la presencia de su amo
  - de delante de su señor
  lexicon: BDAG
  rationale: '''Presencia'' transmite el idiomatismo ἐκ προσώπου. ''Señor'' corresponde al rango social de κύριος aquí, sin implicar uso divino.'
- source_word: ἀπῴχοντο εἰς τὰς κοίτας αὐτῶν
  english_pob_choice: they went away to their beds
  chosen_spanish: se fueron a sus camas
  alternatives_spanish:
  - se retiraron a sus lechos
  - se acostaron
  lexicon: LSJ
  rationale: κοίτη denota cama o lugar para dormir. 'Sus camas' conserva la pluralidad y el movimiento narrativo; 'lechos' sería más solemne, 'se acostaron' adelanta la acción más de lo que el griego expresa.
- source_word: Βαγώας
  english_pob_choice: Bagoas
  chosen_spanish: Bagoás
  alternatives_spanish:
  - Bagoas
  lexicon: transliteration
  rationale: Se translitera el nombre propio y se adapta la acentuación al español para facilitar la lectura.
theological_decisions:
- issue: δοῦλοι en un contexto cortesano/militar
  english_pob_reading: his slaves
  chosen_spanish_reading: sus esclavos
  alternative_spanish_readings:
  - sus siervos
  - sus servidores
  rationale: Se conserva 'esclavos' porque el texto presenta una relación de dependencia real bajo autoridad de un señor. La lectura suavizada ('siervos') borraría una tensión social que el audit trail inglés decidió mantener.
  doctrine_reference: 'DOCTRINE.md: Contested terms — δοῦλος; Translation philosophy §1'
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés en las decisiones principales: δοῦλοι se mantiene como ''esclavos''; ἀναλύειν se expresa con ''retirarse'' en un registro natural; συνέκλεισεν/ἀπέκλεισεν se distinguen con ''cerró'' y ''excluyó''. Se evitó el uso de ''SEÑOR'' en mayúsculas porque κύριος aquí es un título social para Holofernes, no una referencia divina.'
  spanish_consistency_notes:
  - Se mantiene un registro formal y legible, con verbos de movimiento naturales en español.
  - '''Bagoás'' lleva tilde para acomodación ortográfica española; el nombre sigue siendo transliteración del griego.'
  - '''señor'' se usa en sentido cortesano/social, no como título divino.'
  - La relación entre 'cerró' y 'excluyó' conserva la progresión de cierre físico y exclusión de acceso del griego.
