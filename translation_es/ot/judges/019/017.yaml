base_translation:
  language: en
  yaml_path: translation/ot/judges/019/017.yaml
  text: He looked up and saw the traveler in the open square of the city[a], and the old man said, “Where are you going[b], and where do you come from?”
  footnotes:
  - marker: a
    text: Or “the wayfarer” or “the guest.” The Hebrew term refers to one who is traveling and, by extension in hospitality contexts, a guest.
    reason: lexical_alternative
  - marker: b
    text: Or “in the street of the city.” The Hebrew more specifically denotes a broad public place or square.
    reason: lexical_alternative
