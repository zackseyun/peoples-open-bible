translation:
  text: Jesus says[1], "Where there are three gods, they are gods. Where there are
    two or one[a][3][2], I am with him."
  philosophy: optimal-equivalence
  footnotes:
  - marker: '1'
    text: The codex as printed reads “ϩⲛ̄ⲛⲟⲩⲧⲉ ⲛⲉ” (lit. “they are in a god”), while
      the normalized lemma presents “ⲟⲩⲛⲟⲩⲧⲉ ⲡⲉ.” The translation takes this as a
      plural predication “they are gods,” which also matches the Greek witness (POxy
      1).
    reason: textual_variant
  - marker: '2'
    text: POxy 1 continues with “Take up the stone … split the wood …,” which in the
      Coptic occurs separately at NHC II, 46:26–28 (Saying 77). The Greek also omits
      “two,” reading only “when one is alone.”
    reason: cross_reference
  - marker: '3'
    text: The doubled “I—I” renders ⲁⲛⲟⲕ ⲁⲛⲟⲕ, an emphatic repetition common in Coptic
      to mark focus/intensity.
    reason: dialect_note
  - marker: a
    text: Or 'I—I am with him.'.
    reason: previous_rendering
lexical_decisions:
- source_word: ⲡⲉϫⲉ
  chosen: says
  alternatives:
  - said
  lexicon: Lambdin
  rationale: Thomas typically uses the narrative present; rendering as “says” preserves
    immediacy and Thomasine terseness.
- source_word: ⲡⲙⲁ … ⲉⲣⲉ-
  chosen: where (lit. the place where)
  alternatives:
  - the place where
  lexicon: Layton
  rationale: ⲡⲙⲁ with a relative clause functions adverbially; English “where” best
    captures the construction without overloading the line.
- source_word: ⲉⲣⲉⲟⲩⲛ-
  chosen: there are
  alternatives:
  - exist
  lexicon: Lambdin
  rationale: Standard existential construction; “there are” is idiomatic and concise.
- source_word: ϣⲟⲙⲧ
  chosen: three
  lexicon: Crum
  rationale: Numeral; straightforward rendering.
- source_word: ⲛⲛⲟⲩⲧⲉ
  chosen: gods
  alternatives:
  - deities
  lexicon: Crum
  rationale: Plural indefinite; preserve the literal plural “gods,” maintaining Thomas’s
    provocative diction.
- source_word: ⲙⲙⲁⲩ
  chosen: (implicit in “where …”)
  alternatives:
  - there
  lexicon: Crum
  rationale: Spatial deictic is inherent in the “where”-clause; not repeated in English
    to avoid redundancy.
- source_word: ⲟⲩⲛⲟⲩⲧⲉ ⲡⲉ / ⲛⲉ (predication)
  chosen: they are gods
  alternatives:
  - it is a god
  - they are in a god
  lexicon: Layton
  rationale: Given the subject “three gods” and the codex’s plural copula (printed
    ⲛⲉ), the natural sense is a plural predication; this also aligns with the Greek
    witness without forcing harmonization.
- source_word: ⲥⲛⲁⲩ
  chosen: two
  lexicon: Crum
  rationale: Numeral; unambiguous.
- source_word: ⲏ
  chosen: or
  lexicon: Crum
  rationale: Coordinating disjunction; straightforward.
- source_word: ⲟⲩⲁ
  chosen: one
  lexicon: Crum
  rationale: Numeral; unambiguous.
- source_word: ⲁⲛⲟⲕ ⲁⲛⲟⲕ ϣⲱⲡⲉ
  chosen: I—I am (present)
  alternatives:
  - I am
  - I myself am
  lexicon: Crum
  rationale: Duplication of ⲁⲛⲟⲕ for emphasis retained with a dash to preserve Thomas’s
    emphatic cadence; ϣⲱⲡⲉ conveys presence/being.
- source_word: ⲙⲛⲛⲧⲟϥ
  chosen: with him
  lexicon: Crum
  rationale: Standard prepositional phrase; masculine singular pronominal object retained
    as “him.”
textual_note: 'Sahidic with some Lycopolitan flavor. The codex line (NHAM02.39 lb
  3–4) shows an orthographic issue: printed has “ϩⲛ̄ⲛⲟⲩⲧⲉ ⲛⲉ” after “ⲙ̄ⲙⲁⲩ,” which
  literally reads “they are in a god.” Dilley’s normalized lemma gives “ⲟⲩⲛⲟⲩⲧⲉ ⲡⲉ.”
  I construe the clause as a plural predication over the subject “three gods,” yielding
  “they are gods,” consistent with the plural copula in the codex and common sense
  of the construction. The second clause has duplication “ⲁⲛⲟⲕ ⲁⲛⲟⲕ,” kept for emphasis.
  No lacunae are marked in Dilley for this saying.'
