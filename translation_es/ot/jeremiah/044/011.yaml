review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del hebreo y del POB inglés: fórmula profética, Nombre divino como Yahvé, título ''de los Ejércitos'', y la idea de juicio determinado contra Judá. Sin embargo, ''para cortar a toda Judá'' no expresa bien וּלְהַכְרִית אֶת כָּל יְהוּדָה, porque en español ''cortar a'' suena incompleto o físico de manera extraña; el hebreo aquí significa ''extirpar / eliminar / destruir por completo'' en contexto de juicio. También conviene mejorar ''He aquí, pongo'' a ''He aquí, pongo mi rostro...'' o mejor ''He aquí, vuelvo/fijo mi rostro...'' pero el problema principal es el infinitivo final.'
  spanish_quality_summary: El español es mayormente claro y digno, con registro bíblico apropiado. 'Por tanto', 'así dice', y 'Yahvé de los Ejércitos' funcionan bien. La frase final necesita reparación por naturalidad y precisión idiomática. 'Para mal' es aceptable si se mantiene la nota aclaratoria, aunque 'para calamidad' sería más transparente; no es indispensable cambiarlo.
  glossary_alignment: 'Buena alineación con la terminología del proyecto: יְהוָה -> ''Yahvé''; צְבָאוֹת -> ''de los Ejércitos''; אֱלֹהֵי יִשְׂרָאֵל -> ''Dios de Israel''. No hay conflicto doctrinal importante. La principal desviación es léxico-idiomática en וּלְהַכְרִית, donde ''cortar'' no comunica adecuadamente la fuerza del hebreo en español natural.'
  issues:
  - severity: medium
    issue: '''para cortar a toda Judá'' es una traducción poco natural y semánticamente deficiente'
    rationale: וּלְהַכְרִית significa 'cortar de', 'extirpar', 'eliminar', 'destruir'. En español, 'cortar a toda Judá' no transmite esa idea de exterminio judicial y puede confundir al lector.
  - severity: low
    issue: La nota alternativa del marcador a usa 'SEÑOR' aunque el proyecto prefiere 'Yahvé' en texto principal
    rationale: Como nota de alternativa histórica/tradicional es aceptable, pero debe entenderse como alternativa léxica documentada, no como preferencia del proyecto.
  revised_spanish_text: 'Por tanto[a], así dice Yahvé de los Ejércitos, Dios de Israel: He aquí, pongo mi rostro contra ustedes para mal[b], para extirpar a toda Judá.'
  revised_footnotes:
