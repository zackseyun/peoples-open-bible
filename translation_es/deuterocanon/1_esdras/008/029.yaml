translation:
  language: es
  text: De entre los hijos de Phoros[a], Tarosotomos; de entre los hijos de Ietamar, Gamelos; de entre los hijos de David[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Los nombres griegos aquí difieren notablemente del paralelo hebreo aproximado de Esdras 8:2, que lee: «de entre los hijos de Finés, Gersón; de entre los hijos de Itamar, Daniel; de entre los hijos de David, Hattush». Como 1 Esdras se traduce desde el testimonio griego, el texto principal conserva las formas griegas en lugar de armonizarlas con el paralelo hebreo.'
    reason: alternative_reading
  - marker: b
    text: La frase «de entre los hijos de David» queda abierta porque la lista griega continúa en el versículo siguiente.
    reason: cross_reference
lexical_decisions:
- source_word: ἐκ τῶν υἱῶν
  english_pob_choice: from the sons of
  chosen_spanish: de los hijos de
  alternatives_spanish:
  - de entre los hijos de
  - de los hijos de
  lexicon: LSJ
  rationale: La fórmula genealógica repetida se conserva en español con un calco natural y legible. 'Hijos' refleja directamente υἱῶν en este contexto de linaje/lista.
- source_word: Φορός
  english_pob_choice: Phoros
  chosen_spanish: Phoros
  alternatives_spanish:
  - Parosh
  lexicon: LSJ
  rationale: Se preserva la forma griega transliterada, porque 1 Esdras se traduce desde el testimonio griego y el POB inglés prioriza esa forma sobre la paralela hebrea aproximada.
- source_word: Ταροσότομος
  english_pob_choice: Tarosotomos
  chosen_spanish: Tarosotomos
  alternatives_spanish:
  - un nombre griego divergente del paralelo hebreo
  - Hattush (según el paralelo MT, no adoptado)
  lexicon: LSJ
  rationale: El nombre se mantiene según la forma griega transmitida. No se armoniza con el paralelo hebreo para no borrar la tensión textual documentada.
- source_word: Ἰεταμάρου
  english_pob_choice: Ietamar
  chosen_spanish: Ietamar
  alternatives_spanish:
  - Ithamar
  lexicon: LSJ
  rationale: La transliteración sigue de cerca la grafía griega. Aunque el nombre es reconocible como Ithamar, el POB inglés opta por la forma griega aquí.
- source_word: Γάμηλος
  english_pob_choice: Gamelos
  chosen_spanish: Gamelos
  alternatives_spanish:
  - Daniel (según el paralelo MT, no adoptado)
  lexicon: LSJ
  rationale: Se conserva el nombre griego en lugar de sustituirlo por la forma del paralelo hebreo, manteniendo la base textual griega de 1 Esdras.
- source_word: τῶν υἱῶν Δαυείδ
  english_pob_choice: from the sons of David,
  chosen_spanish: de los hijos de David,
  alternatives_spanish:
  - de los hijos de David
  lexicon: LSJ
  rationale: Se mantiene la frase abierta y el final con coma, porque la lista continúa en el versículo siguiente. En español, 'de los hijos de David' reproduce la estructura listada sin añadir información.
theological_decisions:
- issue: Dependencia del testimonio griego frente al paralelo hebreo aproximado
  english_pob_reading: The Greek names here differ notably from the approximate MT parallel in Ezra 8:2, but the main text preserves the Greek forms rather than harmonizing them.
  chosen_spanish_reading: El texto principal conserva las formas griegas y no las armoniza con el paralelo hebreo aproximado.
  alternative_spanish_readings:
  - armonizar los nombres con Esdras 8:2
  - reemplazar las formas griegas por las hebreas conocidas
  rationale: La decisión evita borrar una tensión textual documentada y respeta la prioridad del testimonio griego en 1 Esdras, conforme al marco editorial del POB.
  doctrine_reference: Crítica textual / prioridad del testimonio fuente
translation_notes:
  revision_awareness: 'No se requieren cambios respecto del pasaje fuente: la revisión más reciente indicó que no había modificaciones necesarias y el cotejo cruzado mostró acuerdo alto.'
  spanish_consistency_notes:
  - Se mantiene 'hijos de' para υἱῶν en una lista genealógica, por claridad y fidelidad estructural.
  - Se preservan las formas griegas de los nombres propios para no homogeneizar 1 Esdras con el paralelo hebreo.
  - La coma final se conserva porque el segmento es sintácticamente incompleto y continúa en el siguiente versículo.
  - Se usa español neutro y publicable, evitando arcaísmos innecesarios.
