translation:
  language: es
  text: El que no es perspicaz no será instruido.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «astuto», «hábil» o «prudente»; la palabra griega también puede tener en otros contextos un sentido negativo, como «maquiavélico» o «tramposo».
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐ παιδευθήσεται
  english_pob_choice: will not be instructed
  chosen_spanish: no será instruido
  alternatives_spanish:
  - no será disciplinado
  - no será enseñado
  - no será educado
  lexicon: BDAG
  rationale: El futuro pasivo de παιδεύω puede abarcar instrucción, formación o disciplina. En este contexto sapiencial, «no será instruido» conserva la idea de recibir corrección y enseñanza sin restringirla a castigo ni a escolaridad formal.
- source_word: ὃς
  english_pob_choice: He who
  chosen_spanish: El que
  alternatives_spanish:
  - Quien
  - Quienquiera que
  lexicon: LSJ
  rationale: La construcción relativa introduce una afirmación general sobre una persona tipo. «El que» mantiene el valor genérico y suena natural en español bíblico contemporáneo.
- source_word: οὐκ ἔστιν
  english_pob_choice: is not
  chosen_spanish: no es
  alternatives_spanish:
  - no resulta ser
  - no se muestra como
  lexicon: BDAG
  rationale: La cópula simple expresa adecuadamente la relación sin añadir matices que el griego no exige.
- source_word: πανοῦργος
  english_pob_choice: shrewd
  chosen_spanish: prudente
  alternatives_spanish:
  - astuto
  - hábil
  - perspicaz
  lexicon: LSJ
  rationale: Aunque el término puede tener matiz negativo en otros contextos («astuto», «mañoso»), aquí el paralelo con la capacidad de recibir instrucción favorece una cualidad positiva de agudeza práctica. «Prudente» comunica esa aptitud de modo inteligible en español, sin cargar el dicho con una connotación moral negativa.
theological_decisions:
- issue: Valor moral de πανοῦργος en un dicho sapiencial
  english_pob_reading: Render the term in a relatively neutral-positive sense ('shrewd') rather than a negative sense ('crafty').
  chosen_spanish_reading: Traducirlo como «prudente», en un sentido de sensatez práctica, no de astucia moralmente torcida.
  alternative_spanish_readings:
  - astuto
  - mañoso
  - hábil
  rationale: 'El proverbio relaciona la cualidad nombrada con la receptividad a la instrucción. Una traducción abiertamente negativa sugeriría que solo el de conducta torcida puede aprender, lo que no encaja bien con el sentido sapiencial. «Prudente» preserva la tensión: no es mera inocencia, sino discernimiento práctico.'
  doctrine_reference: Translation philosophy §§1, 5, 6
translation_notes:
  revision_awareness: El texto sigue la última revisión del inglés POB, que mantuvo sin cambios la opción «shrewd» para πανοῦργος y la formulación «will not be instructed» para παιδευθήσεται, con acuerdo alto en la revisión cruzada.
  spanish_consistency_notes:
  - Se conservó un registro sobrio y sapiencial, adecuado para una sentencia breve.
  - Se evitó «SEÑOR» u otras convenciones que no corresponden al texto griego de este versículo.
  - La nota mantiene la alternativa semántica documentada por el audit trail inglés sin convertirla en una lectura moralmente cargada.
