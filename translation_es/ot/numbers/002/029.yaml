  glossary_alignment: No hay términos teológicos sensibles aquí. Los nombres propios están bien en español («Neftalí», «Ahira», «Enán»). «Tribu» para מַטֶּה y «hijo de» para בֶּן están alineados. Recomiendo cambiar «jefe» por «líder» para seguir más de cerca la decisión auditada del POB para נָשִׂיא.
