base_translation:
  language: en
  yaml_path: translation/ot/hosea/013/014.yaml
  text: From the hand of Sheol I will ransom them[a]; from death I will redeem them. O Death, where are your plagues? O Sheol[c][b], where is your destruction? Compassion will be hidden from my eyes.
  footnotes:
  - marker: a
    text: Or, 'Shall I ransom them from the hand of Sheol? Shall I redeem them from death?'—taking the opening lines as rhetorical questions of judgment rather than promises of deliverance.
    reason: alternative_reading
  - marker: b
    text: 'Hebrew אֱהִי may also be understood as ''I will be'' or ''let me be'': ''I will be your plagues, O Death; I will be your destruction, O Sheol.'''
    reason: alternative_reading
  - marker: c
    text: 'Traditional rendering influenced by the Greek tradition: ''Where, O Death, is your sting? Where, O Sheol, is your victory/sting?'' Compare 1 Corinthians 15:55.'
    reason: cross_reference
