translation:
  language: es
  text: Porque sus cabezas estaban en reposo, y la cabeza del medio era mayor que las otras cabezas, pero también ella estaba en reposo con ellas.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: Nam
  english_pob_choice: For
  chosen_spanish: Pues
  alternatives_spanish:
  - Porque
  - Ya que
  - Pues bien
  lexicon: nam
  rationale: El latín 'nam' tiene valor explicativo o causal, no adversativo. 'Pues' comunica bien esa relación en español sin sonar tan pesada como 'porque' al inicio de una cláusula narrativa, y evita trasladar indebidamente el contraste al comienzo del versículo.
- source_word: capita eius
  english_pob_choice: its heads
  chosen_spanish: sus cabezas
  alternatives_spanish:
  - las cabezas de ella
  - sus vértices
  lexicon: caput
  rationale: '''capita'' se refiere literalmente a ''cabezas''. ''Sus cabezas'' conserva la imagen y la relación posesiva del latín, con un español natural y claro.'
- source_word: erant quiescentia
  english_pob_choice: were at rest
  chosen_spanish: estaban en reposo
  alternatives_spanish:
  - estaban quietas
  - reposaban
  lexicon: quiescens
  rationale: '''Quiescentia'' describe un estado de reposo. ''En reposo'' es preciso y sobrio en español bíblico, sin perder el matiz estático de la forma latina.'
- source_word: medium caput
  english_pob_choice: the middle head
  chosen_spanish: la cabeza del medio
  alternatives_spanish:
  - la cabeza central
  - la cabeza intermedia
  lexicon: medius + caput
  rationale: '''Medium caput'' es literalmente ''la cabeza del medio''. Esta forma mantiene la estructura del original y la jerarquía visual de la imagen.'
- source_word: maius aliorum capitum
  english_pob_choice: was larger than the other heads
  chosen_spanish: era mayor que las otras cabezas
  alternatives_spanish:
  - era más grande que las demás cabezas
  - superaba en tamaño a las otras cabezas
  lexicon: maior
  rationale: '''maius'' aquí compara tamaño. ''Era mayor que'' preserva la comparación sin añadir interpretación simbólica extra.'
- source_word: sed et ipsa quiescebat cum eis
  english_pob_choice: yet it too was at rest with them
  chosen_spanish: pero también ella estaba en reposo con ellas
  alternatives_spanish:
  - mas también ella reposaba con ellas
  - sin embargo, también ella estaba en reposo con ellas
  lexicon: sed ... etiam ... quiescebat
  rationale: '''sed'' introduce la corrección o contraste dentro de la oración, mientras que ''et ipsa'' enfatiza que incluso la cabeza mayor comparte el mismo estado. ''Pero también ella...'' conserva esa tensión sin suavizarla.'
theological_decisions:
- issue: Relación entre 'nam' y 'sed' en la estructura de la frase
  english_pob_reading: The verse opens with an explanatory 'For', and the contrast belongs later to 'yet'.
  chosen_spanish_reading: El verso abre con 'Pues' como explicación, y el contraste se reserva para 'pero también'.
  alternative_spanish_readings:
  - Abrir con 'pero'
  - Abrir con 'porque'
  rationale: La revisión del texto latino confirma que 'nam' es explicativo y que el giro adversativo corresponde a 'sed'. La traducción mantiene esa distinción para no borrar la lógica interna del versículo.
  doctrine_reference: No doctrinal issue; discourse logic only.
translation_notes:
  revision_awareness: El registro de revisión confirma que la corrección principal fue cambiar el arranque de 'But' a 'For' por el valor explicativo de 'nam'. La versión española refleja esa decisión con 'Pues' y mantiene el contraste posterior en 'pero también'.
  spanish_consistency_notes:
  - Se conserva 'cabezas' para 'capita', evitando sustituir la imagen por un término interpretativo.
  - '''En reposo'' mantiene el valor estático de ''quiescentia/quiescebat''.'
  - Se evita iniciar con una adversativa, siguiendo la revisión del latín 'nam'.
