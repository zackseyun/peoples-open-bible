translation:
  language: es
  text: Él golpeó sus vides y sus higueras[a], y quebró los árboles de su territorio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los árboles dentro de sus límites».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּךְ
  english_pob_choice: He struck
  chosen_spanish: Él golpeó
  alternatives_spanish:
  - Él hirió
  - Él asestó un golpe a
  lexicon: HALOT / נכה
  rationale: El verbo expresa una acción directa y contundente. «Golpeó» conserva esa fuerza en español moderno sin volver el tono arcaico.
- source_word: גַּפְנָם
  english_pob_choice: their vines
  chosen_spanish: sus vides
  alternatives_spanish:
  - sus vinas
  - sus parras
  lexicon: HALOT / גֶּפֶן
  rationale: «Vid» es el término natural y preciso para גֶּפֶן; «sus vides» preserva el plural colectivo del inglés POB y el sentido agrícola del hebreo.
- source_word: וּתְאֵנָתָם
  english_pob_choice: and their fig trees
  chosen_spanish: y sus higueras
  alternatives_spanish:
  - y sus árboles de higo
  - y sus higueras de higo
  lexicon: HALOT / תְּאֵנָה
  rationale: Aunque la forma hebrea es singular con sufijo, el contexto colectivo favorece un plural en español coordinado con «sus vides». «Higuera» es el equivalente normal y fiel.
- source_word: וַיְשַׁבֵּר
  english_pob_choice: and shattered
  chosen_spanish: y quebró
  alternatives_spanish:
  - y destrozó
  - y rompió
  lexicon: HALOT / שׁבר
  rationale: El Piel intensivo comunica ruptura violenta. «Quebró» mantiene la fuerza del verbo sin exagerar con una imagen más interpretativa que el hebreo.
- source_word: עֵץ
  english_pob_choice: the trees
  chosen_spanish: los árboles
  alternatives_spanish:
  - la arboleda
  - los árboles frutales
  lexicon: HALOT / עֵץ
  rationale: En este contexto de juicio sobre la vegetación del país, «árboles» es el sentido más natural y directo. Conserva la referencia a árboles reales, no a madera.
- source_word: גְּבוּלָם
  english_pob_choice: of their territory
  chosen_spanish: de su territorio
  alternatives_spanish:
  - de sus fronteras
  - dentro de sus límites
  lexicon: HALOT / גְּבוּל
  rationale: «Territorio» expresa bien la extensión delimitada por גְּבוּל y suena más natural en español bíblico contemporáneo que una lectura excesivamente literal de «fronteras».
theological_decisions:
- issue: Sujeto implícito de los verbos
  english_pob_reading: He = God, continuing the psalm's narration of the LORD's acts in Egypt
  chosen_spanish_reading: Él = Dios, continuando la narración de las acciones de Yahvé en Egipto
  alternative_spanish_readings:
  - Yahvé = Él, continuando la narración
  - Dios = Él
  rationale: El hebreo omite el sujeto porque viene dado por el contexto. En español conviene explicitar «Él» para mantener la fluidez narrativa sin añadir más precisión doctrinal que la requerida por el verso; el referente sigue siendo Yahvé en el contexto del salmo.
  doctrine_reference: Principio de primacía del texto original y continuidad narrativa en traducción bíblica.
translation_notes:
  revision_awareness: El contexto auditado del inglés POB mantiene la lectura de una acción divina contra los cultivos y árboles de Egipto, con una nota alternativa para גְּבוּלָם. No se registraron revisiones posteriores que alteren el sentido base; la versión española sigue esa misma línea semántica y conserva la alternativa en nota.
  spanish_consistency_notes:
  - Se mantiene «vides» para גַּפְנָם en vez de «vinos» o una calca extraña, por ser el equivalente agrícola natural.
  - Se traduce תְּאֵנָה de forma colectiva en plural español («higueras») para corresponder al paralelismo y al uso distributivo del hebreo.
  - «Territorio» conserva el valor espacial delimitado de גְּבוּל sin forzar un tecnicismo bíblico arcaizante.
  - Se evita «SEÑOR» para יהוה; aquí el verso lleva sujeto pronominal implícito, pero el marco del salmo sigue refiriéndose a Yahvé.
