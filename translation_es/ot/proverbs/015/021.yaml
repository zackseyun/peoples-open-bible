revisions:
- from: La necedad es gozo para el que carece de entendimiento[a], pero el hombre de entendimiento endereza su camino.
  to: La necedad es gozo para el que carece de entendimiento[a], pero el hombre entendido endereza su andar.
  rationale: Se ajusta «el hombre de entendimiento» a «el hombre entendido» por mayor naturalidad en español, y «su camino» a «su andar» para reflejar mejor el infinitivo hebreo לָכֶת como curso de vida o conducta. Se conserva la nota que explica el modismo «falto de corazón».
