translation:
  language: es
  text: ¿No te enojaste con nosotros para destruirnos, sin dejar raíz, semilla ni nombre de nosotros?[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de forma más interpretativa: «sin dejar ningún resto, descendencia ni nombre de nosotros». El griego dice literalmente «raíz, semilla y nombre».'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐχὶ
  english_pob_choice: Were you not
  chosen_spanish: ¿No te enojaste
  alternatives_spanish:
  - ¿Acaso no te enojaste
  - ¿No estabas enojado
  lexicon: LSJ
  rationale: La partícula interrogativa introduce una pregunta retórica que espera afirmación. En español, la inversión con «¿No te enojaste» conserva la fuerza interrogativa sin sonar forzada.
- source_word: ὠργίσθης
  english_pob_choice: were ... angry
  chosen_spanish: te enojaste
  alternatives_spanish:
  - estuviste enojado
  - te airaste
  - te indignaste
  lexicon: BDAG
  rationale: El aoristo de ὀργίζω expresa enojo divino con matiz judicial. «Te enojaste» es claro y natural en español moderno; evita exagerar el tono más allá del texto.
- source_word: ἡμῖν
  english_pob_choice: with us
  chosen_spanish: con nosotros
  alternatives_spanish:
  - contra nosotros
  - por causa de nosotros
  lexicon: LSJ
  rationale: El dativo con verbos de enojo se puede verter naturalmente como relación personal. «Con nosotros» reproduce bien el valor relacional que el inglés POB expresó con «with us».
- source_word: ἀπολέσαι
  english_pob_choice: to destroy us
  chosen_spanish: para destruirnos
  alternatives_spanish:
  - para aniquilarnos
  - para acabar con nosotros
  - para arruinarnos
  lexicon: BDAG
  rationale: El infinitivo de propósito se expresa con «para». «Destruirnos» es el equivalente más directo y mantiene el contexto de juicio total sin introducir mayor intensificación.
- source_word: ἕως τοῦ μὴ καταλιπεῖν
  english_pob_choice: leaving no
  chosen_spanish: sin dejar
  alternatives_spanish:
  - hasta no dejar
  - de modo que no dejaste
  lexicon: BDAG
  rationale: 'La construcción indica el resultado final de la destrucción: no dejar nada. «Sin dejar» comunica con naturalidad el valor de resultado total que el inglés auditado captó con «leaving no».'
- source_word: ῥίζαν
  english_pob_choice: root
  chosen_spanish: raíz
  alternatives_spanish:
  - raíz/linaje
  - tronco
  lexicon: LSJ
  rationale: «Raíz» conserva el sentido literal y la imagen de continuidad vital o genealógica presente en el griego.
- source_word: σπέρμα
  english_pob_choice: seed
  chosen_spanish: semilla
  alternatives_spanish:
  - descendencia
  - linaje
  lexicon: BDAG
  rationale: El griego usa el término literal «semilla». En español, «semilla» mantiene la metáfora con una resonancia natural; «descendencia» explicaría más de lo que el texto dice.
- source_word: ὄνομα
  english_pob_choice: name
  chosen_spanish: nombre
  alternatives_spanish:
  - memoria
  - renombre
  lexicon: BDAG
  rationale: «Nombre» es la traducción directa y preserva la idea de identidad pública y continuidad de existencia que el contexto sugiere.
- source_word: ἡμῶν
  english_pob_choice: of ours
  chosen_spanish: nuestro
  alternatives_spanish:
  - de nosotros
  - de los nuestros
  lexicon: LSJ
  rationale: El genitivo final modifica el conjunto de la triada. En español, «nombre nuestro» suena menos pesado que repetir «de nosotros» en la serie, y sigue siendo fiel al sentido posesivo.
theological_decisions:
- issue: Lenguaje de juicio total sin suavizar la triada concreta
  english_pob_reading: The verse is rendered as a rhetorical question about God being angry to the point that no surviving lineage or identity remained.
  chosen_spanish_reading: La frase conserva la pregunta retórica y la triada concreta «raíz, semilla, nombre», sin sustituirla por un resumen como «remanente».
  alternative_spanish_readings:
  - ¿No te enojaste con nosotros para destruirnos hasta no dejar remanente, descendencia ni nombre?
  - ¿No te airaste contra nosotros para arruinarnos completamente?
  rationale: El griego no usa un término abstracto para «remanente», sino imágenes concretas de continuidad y existencia. La traducción mantiene esa tensión para que la implicación teológica surja del texto mismo.
  doctrine_reference: Preservar la tensión textual; primacía del original sobre la paráfrasis interpretativa.
translation_notes:
  revision_awareness: El borrador sigue la última revisión del audit trail al reflejar la idea de ἕως τοῦ μὴ καταλιπεῖν con «sin dejar», en lugar de una fórmula más explicativa como «hasta que no quedara». También conserva el tono de pregunta retórica y la tríada literal del griego.
  spanish_consistency_notes:
  - Se usa «Dios» solo cuando el texto lo exija explícitamente; aquí el sujeto está implícito en la forma verbal y no se añade.
  - Se mantiene «semilla» para σπέρμα por fidelidad al campo semántico y por coherencia con el audit trail en inglés.
  - Se evita «remanente» en el texto principal porque esa aclaración no está en el griego y el POB inglés la dejó solo como alternativa interpretativa.
  - La puntuación con coma después de «destruirnos» sigue la revisión del audit trail y ayuda a leer la cláusula final como resultado del acto de destruir.
