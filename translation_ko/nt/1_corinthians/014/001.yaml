id: 1CO.14.1
reference: 1 Corinthians 14:1
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Διώκετε τὴν ἀγάπην, ζηλοῦτε δὲ τὰ πνευματικά, μᾶλλον δὲ ἵνα προφητεύητε.
base_translation:
  language: en
  yaml_path: translation/nt/1_corinthians/014/001.yaml
  text: Pursue love[a], and earnestly desire the spiritual things[c][b], but especially that you may prophesy.
  footnotes:
  - marker: a
    text: Or 'the spiritual things' or 'spiritual matters.' The Greek is broader than 'gifts,' but here the context focuses on Spirit-given manifestations in the church.
    reason: lexical_alternative
  - marker: b
    text: Or 'but rather that you may prophesy.'
    reason: alternative_reading
  - marker: c
    text: Or 'but especially that you may prophesy'.
    reason: previous_rendering
translation:
  language: ko
  text: 사랑을 추구하십시오. 그리고 영적인 것들[a]을 간절히 사모하되, 특히 예언하기를 사모하십시오.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 헬라어 τὰ πνευματικά는 「영적인 것들」을 가리키는 넓은 표현이며, 본문 문맥에서는 교회 안의 성령의 나타남(은사)을 가리킨다.
    reason: lexical_alternative
lexical_decisions:
- source_word: διώκετε
  english_pob_choice: Pursue
  chosen_korean: 추구하다
  alternatives_korean:
  - 뒤따르다
  - 간절히 구하다
  lexicon: BDAG
  rationale: διώκω의 능동적·지속적 추격의 함의를 살리기 위해 「추구하다」를 택했다. 「구하다」는 약해지므로 피한다.
- source_word: ἀγάπην
  english_pob_choice: love
  chosen_korean: 사랑
  alternatives_korean: []
  lexicon: BDAG
  rationale: 프로젝트 기본 정책에 따라 ἀγάπη는 「사랑」으로 옮긴다.
- source_word: τὰ πνευματικά
  english_pob_choice: the spiritual gifts
  chosen_korean: 영적인 것들
  alternatives_korean:
  - 신령한 것
  - 영의 일들
  lexicon: BDAG
  rationale: 헬라어 그대로는 「영적인 것들」이며 본문은 은사로 좁혀 읽히기 쉽지만, 본문이 명시한 폭을 보존하기 위해 「영적인 것들」로 옮기고 각주에서 은사 함의를 밝힌다.
- source_word: προφητεύητε
  english_pob_choice: may prophesy
  chosen_korean: 예언하다
  alternatives_korean: []
  lexicon: BDAG
  rationale: 글로사리 기본값. 「예언」은 14장 내내 일관되게 유지한다.
theological_decisions:
- issue: 예언과 방언의 비교에서 바울의 선호를 흐리지 않을 것
  chosen_reading: 특히 예언하기를 사모하십시오
  alternative_readings:
  - 오히려 예언하기를 사모하라
  rationale: 헬라어 μᾶλλον δὲ ἵνα προφητεύητε는 14장 전체의 논지(예언 우선)의 서두에 해당한다. 「특히」로 옮겨 바울의 선호를 분명히 드러내되, 다른 은사를 부정하지 않는다.
  doctrine_reference: 'DOCTRINE.md: render the strongest plain meaning'
