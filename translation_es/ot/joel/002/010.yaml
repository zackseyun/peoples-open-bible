translation:
  language: es
  text: Ante él la tierra se estremece[a]; los cielos tiemblan. El sol y la luna se oscurecen[b], y las estrellas retiran su resplandor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Ante su presencia la tierra tiembla».'
    reason: lexical_alternative
  - marker: b
    text: 'Lit.: «las estrellas recogen su resplandor», es decir, dejan de dar luz.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְפָנָיו
  english_pob_choice: Before him
  chosen_spanish: Ante él
  alternatives_spanish:
  - En su presencia
  - Delante de él
  lexicon: HALOT
  rationale: La construcción preposicional expresa proximidad o presencia personal. «Ante él» conserva el valor relacional y suena natural en español bíblico sin forzar una literalidad de «rostro».
- source_word: רָגְזָה
  english_pob_choice: quakes
  chosen_spanish: se estremece
  alternatives_spanish:
  - tiembla
  - se sacude
  lexicon: HALOT
  rationale: El verbo comunica temblor intenso o agitación. Con «tierra» como sujeto, «se estremece» transmite bien la conmoción sin repetir exactamente el verbo del segundo hemistiquio.
- source_word: אֶרֶץ
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - el mundo
  - la tierra/país
  lexicon: HALOT
  rationale: El contexto cósmico amplia el sentido más allá de una región local, pero en español «la tierra» mantiene esa amplitud y la correspondencia poética con «los cielos».
- source_word: רָעֲשׁוּ
  english_pob_choice: tremble
  chosen_spanish: tiemblan
  alternatives_spanish:
  - se estremecen
  - se sacuden
  lexicon: HALOT
  rationale: El paralelo pide otra expresión de agitación sin duplicar en exceso. «Tiembla»/«tiemblan» preserva la intensidad y el ritmo del hebreo.
- source_word: שָׁמָיִם
  english_pob_choice: the heavens
  chosen_spanish: los cielos
  alternatives_spanish:
  - los cielos/las alturas
  - el cielo
  lexicon: HALOT
  rationale: «Los cielos» reproduce bien el plural hebreo y el registro profético, mientras que «el cielo» sonaría demasiado singular y menos solemne.
- source_word: קָדָרוּ
  english_pob_choice: grow dark
  chosen_spanish: se oscurecen
  alternatives_spanish:
  - se ennegrecen
  - se apagan
  lexicon: HALOT
  rationale: El verbo indica volverse oscuro o sombrío. «Se oscurecen» expresa ese cambio de estado de manera clara y sobria en español.
- source_word: אָסְפ֥וּ נָגְהָם
  english_pob_choice: withdraw their brightness
  chosen_spanish: retiran su resplandor
  alternatives_spanish:
  - recogen su brillo
  - retiran su luz
  - se recogen en su resplandor
  lexicon: HALOT
  rationale: El hebreo dice literalmente que las estrellas «reúnen/recogen» su brillo, es decir, dejan de irradiarlo. «Retiran su resplandor» conserva la imagen idiomática sin explicarla de más, y mantiene la tensión entre literalidad e interpretación que el inglés POB documenta.
- source_word: שֶׁמֶשׁ וְיָרֵחַ
  english_pob_choice: The sun and the moon
  chosen_spanish: El sol y la luna
  alternatives_spanish:
  - El sol y la luna
  lexicon: HALOT
  rationale: La pareja celestial se traduce de forma directa y natural, conservando la progresión poética del texto.
- source_word: וְכוֹכָבִים
  english_pob_choice: and the stars
  chosen_spanish: y las estrellas
  alternatives_spanish:
  - y los astros
  lexicon: HALOT
  rationale: «Estrellas» corresponde de manera directa al sustantivo plural y preserva la imaginería astral del verso.
theological_decisions:
- issue: Alcance de la imagen cósmica de juicio
  english_pob_reading: Render the language as direct cosmic upheaval without reducing it to mere metaphor or expanding it into a specific end-times scheme.
  chosen_spanish_reading: Presentar el lenguaje como conmoción cósmica directa, sin reducirlo a mera metáfora ni convertirlo en un esquema escatológico cerrado.
  alternative_spanish_readings:
  - Solo metáfora del terror producido por un ejército invasor
  - Profecía explícita y sistemática del fin de los tiempos
  rationale: La poesía profética mantiene deliberadamente una amplitud de sentido. La versión española debe conservar esa tensión y no resolverla más allá de lo que el texto y el auditor inglés justifican.
  doctrine_reference: Preservar la tensión teológica sin resolverla de forma dogmática.
translation_notes:
  revision_awareness: El texto coincide sustancialmente con la última pasada auditada, que no requirió cambios. Se conserva la lectura poética y la ambigüedad controlada del original, con notas alternativas donde el hebreo ofrece una imagen idiomática importante.
  spanish_consistency_notes:
  - Se usa «Yahvé» en el proyecto como norma general cuando aparece el nombre divino; este versículo no lo contiene.
  - Se mantiene un registro profético sobrio y contemporáneo, evitando arcaísmos innecesarios.
  - Las imágenes astrales se traducen con términos directos para no debilitar el paralelismo hebreo.
