  text: 예수께서 한 동네에 계실 때, 보십시오, 온몸에 나병이 번진 한 사람이 있었습니다. 그가 예수를 보자 얼굴을 땅에 대고 엎드려 간구하였습니다. 「주여, 당신께서 원하신다면 저를 깨끗하게 해 주실 수 있습니다.」
