translation:
  language: es
  text: Así, Moisés los contó, conforme al mandato de Yahvé[a], tal como le había sido mandado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «según la boca de Yahvé».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּפְקֹד
  english_pob_choice: counted
  chosen_spanish: los contó
  alternatives_spanish:
  - los numeró
  - los registró
  - los hizo el censo
  lexicon: HALOT
  rationale: En este contexto de censo, פקד expresa realizar el conteo o registro de personas. «Los contó» es natural en español y conserva el valor administrativo del verbo sin volverlo más técnico de lo que exige el pasaje.
- source_word: אֹתָם
  english_pob_choice: them
  chosen_spanish: los
  alternatives_spanish:
  - a ellos
  - les
  lexicon: Pronombre de objeto directo en español
  rationale: El pronombre retoma a los levitas mencionados en el contexto inmediato. «Los» mantiene la referencia directa y la fluidez del español bíblico moderno.
- source_word: עַל פִּי יְהוָה
  english_pob_choice: at the command of Yahweh
  chosen_spanish: conforme al mandato de Yahvé
  alternatives_spanish:
  - según la palabra de Yahvé
  - por boca de Yahvé
  - por mandato de Yahvé
  lexicon: HALOT
  rationale: La expresión hebrea lit. «según la boca de» comunica conformidad con la orden/instrucción divina. «Conforme al mandato de Yahvé» transmite la fuerza de autoridad sin forzar un calco poco natural en español; se conserva «Yahvé» por la política terminológica del proyecto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: Doctrinal name rendering
  rationale: El Tetragrámaton se vierte como el nombre propio «Yahvé», siguiendo la decisión doctrinal del proyecto y evitando la sustitución por un título.
- source_word: כַּאֲשֶׁר
  english_pob_choice: just as
  chosen_spanish: tal como
  alternatives_spanish:
  - como
  - así como
  - exactamente como
  lexicon: HALOT
  rationale: La partícula introduce correspondencia exacta con la orden previa. «Tal como» es idiomático en español y mantiene la idea de conformidad precisa.
- source_word: צֻוָּה
  english_pob_choice: he had been commanded
  chosen_spanish: le había sido mandado
  alternatives_spanish:
  - había sido mandado
  - había recibido el mandato
  - se le había mandado
  lexicon: HALOT
  rationale: El pasivo indica que la acción provino de una orden recibida. «Le había sido mandado» conserva el pasivo y la relación personal con Moisés; en español bíblico moderno suena solemne y claro.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El hebreo usa directamente el nombre del pacto, no un título. «Yahvé» preserva la identidad propia del nombre divino y sigue la convención del POB en español.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: 'Coincide plenamente con el audit trail inglés: se mantiene el sentido de censo de פקד, la conformidad exacta de כַּאֲשֶׁר, y el nombre divino se conserva como Yahvé. No se requieren revisiones respecto del texto base auditado.'
  spanish_consistency_notes:
  - Se evitó «SEÑOR» para no ocultar el nombre divino donde el original usa יְהוָה.
  - «Conforme al mandato de Yahvé» equilibra fidelidad literal e inteligibilidad; la nota conserva la alternativa más literal «según la boca de Yahvé».
  - Se prefirió una construcción pasiva natural en español («le había sido mandado») para reflejar el pasivo hebreo sin perder claridad.
