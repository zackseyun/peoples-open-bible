lexical_decisions:
- source_word: υἱοὶ
  english_pob_choice: the sons of
  chosen_spanish: los hijos de
  alternatives_spanish:
  - hijos de
  lexicon: LSJ
  rationale: En esta lista censal, υἱοὶ introduce una fórmula genealógica/clánica. En español, «los hijos de» conserva el valor de pertenencia o descendencia sin forzar una paráfrasis más interpretativa.
- source_word: Ἰωλάμου
  english_pob_choice: Iolamus
  chosen_spanish: Iolamo
  alternatives_spanish:
  - Iolamus
  lexicon: LSJ
  rationale: El nombre griego se translitera desde la forma disponible, adaptándolo a una terminación más natural en español. Se evita introducir una forma hebraizante no atestiguada en el texto griego base.
- source_word: δύο
  english_pob_choice: two
  chosen_spanish: dos
  lexicon: LSJ
  rationale: Cardinal simple, equivalente exacto.
- source_word: Ζατοῦ
  english_pob_choice: Zatou
  chosen_spanish: Zatú
  alternatives_spanish:
  - Zatou
  lexicon: LSJ
  rationale: Se sigue la transliteración del griego, pero con acento gráfico para lectura española. La tradición paralela hebrea/masorética sugiere la forma Zattu, por lo que se conserva la diferencia en nota sin sustituir el texto griego.
- source_word: ἐννακόσιοι ἑβδομήκοντα
  english_pob_choice: nine hundred seventy
  chosen_spanish: novecientos setenta
  alternatives_spanish:
  - novecientos y setenta
  lexicon: LSJ
  rationale: Se traduce el número de manera directa y estándar en español moderno, manteniendo la exactitud aritmética.
- source_word: Χορβέ
  english_pob_choice: Chorbe
  chosen_spanish: Corbé
  alternatives_spanish:
  - Chorbe
  lexicon: LSJ
  rationale: El griego presenta Χορβέ; en español se adapta con grafía más natural y pronunciable. Dado que la correspondencia con la tradición paralela hebrea es incierta, no se armoniza el nombre con otra lista.
- source_word: ἑπτακόσιοι πέντε
  english_pob_choice: seven hundred five
  chosen_spanish: setecientos cinco
  alternatives_spanish:
  - setecientos y cinco
  lexicon: LSJ
  rationale: Número exacto, expresado con el orden natural del español.
- source_word: Βανεί
  english_pob_choice: Banei
  chosen_spanish: Banei
  alternatives_spanish:
  - Bani
  lexicon: LSJ
  rationale: Se conserva la transliteración basada en el griego. La forma paralela masorética Bani se mantiene como alternativa documentada en nota, sin reemplazar la lectura griega primaria.
- source_word: ἑξακόσιοι τεσσεράκοντα ὀκτώ
  english_pob_choice: six hundred forty-eight
  chosen_spanish: seiscientos cuarenta y ocho
  alternatives_spanish:
  - seiscientos y cuarenta y ocho
  lexicon: LSJ
  rationale: Número exacto, con formulación idiomática contemporánea en español.
theological_decisions:
- issue: Tratamiento de nombres propios en una lista censal con paralelos textuales distintos
  english_pob_reading: The Greek witness is primary; Hebrew/MT parallels are noted but not allowed to silently overwrite the Greek forms.
  chosen_spanish_reading: Se mantiene la forma griega transliterada en el texto principal y se documentan las formas paralelas en notas.
  alternative_spanish_readings:
  - Harmonizar Iolamo/Zatú/Banei con formas masoréticas más conocidas
  rationale: 'No hay decisión doctrinal, pero sí una decisión textual: preservar el testimonio griego de 1 Esdras y no borrar las tensiones con la tradición paralela. Esto respeta el carácter auditable del POB.'
  doctrine_reference: Principios de crítica textual y transparencia del POB
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el contexto inglés; por tanto, la versión española sigue de forma directa el testimonio griego de Swete 1909, manteniendo las tensiones textuales señaladas en el aparato auditivo.
  spanish_consistency_notes:
  - Se mantuvo el patrón repetido «los hijos de ...» para reflejar la fórmula genealógica.
  - Se prefirió una transliteración española legible de los nombres propios, sin forzar homogeneización con la tradición masorética.
  - Los números se expresan en formato natural del español y sin artículo, como en una lista censal.
  - Las notas usan marcadores únicos y aparecen ancladas en el texto principal donde corresponde.
