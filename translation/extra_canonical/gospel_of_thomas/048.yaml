translation:
  text: Jesus said[a], "If two make peace with each other in this one house, they
    will say to the mountain[c][b], ‘Move away,’ and it will move."
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ‘in this one house’ could also be rendered ‘in a single house’ or ‘in this
      same house’ (ⲟⲩⲱⲧ has the sense ‘one/single/same’).
    reason: lexical_alternative
  - marker: b
    text: ‘with each other’ translates ⲙⲛ ⲡⲟⲩⲉⲣⲏⲩ, literally ‘with their companions/friends,’
      used idiomatically for mutuality.
    reason: cultural_note
  - marker: c
    text: ‘Move away’ reflects ⲉⲃⲟⲗ ‘out, away’; alternatives include ‘move out’ or
      simply ‘move.’
    reason: lexical_alternative
lexical_decisions:
- source_word: ⲉⲣϣⲁⲛ
  chosen: if (prospective/conditional marker)
  alternatives:
  - when
  lexicon: Layton, Coptic Grammar
  rationale: ⲉⲣϣⲁⲛ + clause functions as a prospective protasis; in this gnomic sentence,
    English ‘if’ preserves conditional force better than ‘when.’
- source_word: ⲥⲛⲁⲩ
  chosen: two
  lexicon: Crum
  rationale: Cardinal number; straightforward rendering.
- source_word: ⲣⲉⲓⲣⲏⲛⲏ
  chosen: make peace
  alternatives:
  - be at peace
  lexicon: Crum; Greek loan (eirēnē)
  rationale: Though a noun, the Coptic construction expresses a mutual state/action;
    ‘make peace’ conveys reciprocal reconciliation in English.
- source_word: ⲙⲛ ⲡⲟⲩⲉⲣⲏⲩ
  chosen: with each other
  alternatives:
  - with their companions
  - with their friends
  lexicon: Crum s.v. ⲉⲣⲏⲩ
  rationale: Idiomatic mutual sense; not specifying ‘friends’ avoids narrowing the
    scope beyond the reciprocal force of the phrase.
- source_word: ϩⲛ ⲡⲉⲓⲏⲓ
  chosen: in this house
  lexicon: Crum
  rationale: Demonstrative ⲡⲉⲓ- + ⲏⲓ ‘house’; keep deictic ‘this.’
- source_word: ⲟⲩⲱⲧ
  chosen: one
  alternatives:
  - single
  - same
  lexicon: Lambdin; Crum
  rationale: Postposed to ‘this house’; ‘this one house’ preserves the markedness/strangeness
    (unity nuance) without smoothing to ‘same.’
- source_word: ⲛⲧⲟⲟⲩ ⲛⲁϫⲱ ⲛⲧⲟⲥ
  chosen: they will say to it
  alternatives:
  - they will speak to it
  lexicon: Layton (future ⲛⲧⲟ- + infinitive); Crum s.v. ϫⲱ
  rationale: Standard future/periphrastic with pleonastic dative pronoun; explicit
    ‘say’ best fits ϫⲱ.
- source_word: ⲛⲡⲧⲟⲟⲩ
  chosen: the mountain
  lexicon: Crum
  rationale: Common noun; no special nuance.
- source_word: ϫⲉ ⲡⲱⲱⲛⲉ ⲉⲃⲟⲗ
  chosen: Move away
  alternatives:
  - Move out
  - Go away
  lexicon: Crum s.v. ⲡⲱⲱⲛⲉ; ⲉⲃⲟⲗ ‘out, away’
  rationale: Imperatival content; ‘away’ reflects ⲉⲃⲟⲗ’s outward/away-from sense.
- source_word: ⲛⲧⲟϥ ⲛⲁ ⲡⲱⲱⲛⲉ
  chosen: and it will move
  lexicon: Layton; Crum
  rationale: Future marker with 3ms subject; simple predictive rendering.
textual_note: 'No lacunae or restorations are indicated for Saying 48 in Dilley 2025.
  Orthography shows Lycopolitan features: the manuscript has ϩⲙ̄ⲡⲉⲓⲏⲉⲓ (preposition
  spelling) normalized to Sahidic ϩⲛ ⲡⲉⲓⲏⲓ; it writes ⲙ̄ⲡⲧⲁⲩ for ‘the mountain,’ normalized
  to ⲛⲡⲧⲟⲟⲩ; and presents finite forms like ϥⲛⲁⲡⲱⲱⲛⲉ and ⲥⲉⲛⲁϫⲟⲟⲥ, which Dilley regularizes
  to ⲛⲧⲟϥ ⲛⲁ ⲡⲱⲱⲛⲉ and ⲛⲧⲟⲟⲩ ⲛⲁϫⲱ ⲛⲧⲟⲥ, respectively. Note the pleonastic dative pronoun
  ⲛⲧⲟⲥ referring forward to ⲛⲡⲧⲟⲟⲩ, a common Coptic feature emphasizing the indirect
  object.'
