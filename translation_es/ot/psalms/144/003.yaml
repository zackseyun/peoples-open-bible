translation:
  language: es
  text: Yahvé[a], ¿qué es el hombre, para que tú lo conozcas[c], el hijo del hombre[b], para que pienses en él?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo usa aquí el nombre divino YHWH, el Tetragrámaton.
    reason: source_note
  - marker: b
    text: Hebreo «el hijo del hombre», una expresión poética para un ser humano, especialmente en su fragilidad; aquí es genérica, no un título mesiánico.
    reason: lexical_alternative
  - marker: c
    text: Este verso se hace eco estrechamente de Salmo 8:4.
    reason: cross_reference
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahvé
  - Jehová
  lexicon: HALOT
  rationale: El hebreo tiene el nombre divino YHWH en vocativo. En español se mantiene la forma «Yahvé» como equivalente directo y reverente, en vez de ocultarlo como «SEÑOR». La opción «Yahvé» conserva el nombre propio del pacto y el tono de invocación del verso.
- source_word: מָה
  english_pob_choice: what is
  chosen_spanish: ¿qué es
  alternatives_spanish:
  - ¿qué
  - ¿cuán pequeño es
  lexicon: HALOT
  rationale: La partícula introduce una pregunta retórica de pequeñez e insignificancia. «¿Qué es...?» reproduce con naturalidad el valor interrogativo del hebreo sin añadir interpretación extra.
- source_word: אָדָם
  english_pob_choice: man
  chosen_spanish: el hombre
  alternatives_spanish:
  - la humanidad
  - un ser humano
  lexicon: HALOT
  rationale: Aunque el término puede tener fuerza representativa y genérica, aquí el paralelismo poético con «hijo de hombre» favorece una forma singular tradicional y comprensible. «El hombre» conserva el eco literario y la contraposición entre Dios y la fragilidad humana.
- source_word: וַתֵּדָעֵהוּ
  english_pob_choice: that you know him
  chosen_spanish: para que tú lo conozcas
  alternatives_spanish:
  - para que lo conozcas
  - para que tú lo sepas
  lexicon: HALOT
  rationale: El verbo ידע expresa conocimiento, atención o reconocimiento. En español, «lo conozcas» mantiene el núcleo léxico y funciona bien dentro de la estructura final de la pregunta retórica. Se evita diluirlo en una paraphrasis más explicativa.
- source_word: בֶּן אֱנוֹשׁ
  english_pob_choice: the son of man
  chosen_spanish: el hijo de hombre
  alternatives_spanish:
  - hijo de mortal
  - un ser humano
  lexicon: HALOT
  rationale: Se preserva el giro hebreo idiomático, que en este contexto es poético y genérico, no mesiánico. «Hijo de hombre» mantiene la tensión semántica y el paralelo con «el hombre» mejor que una normalización a «ser humano».
- source_word: וַתְּחַשְּׁבֵהוּ
  english_pob_choice: that you think of him
  chosen_spanish: para que pienses en él
  alternatives_spanish:
  - para que lo consideres
  - para que lo tengas en cuenta
  lexicon: HALOT
  rationale: חשב puede significar pensar, considerar, contar o estimar. Dado el paralelismo con «conocerlo», «pienses en él» comunica con claridad la idea de atención mental y consideración divina sin exagerar el matiz contable.
theological_decisions:
- issue: Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - SEÑOR
  rationale: El texto hebreo usa explícitamente el Tetragrammaton. La lectura en español debe preservar el nombre divino y no sustituirlo por un título. «Yahvé» corresponde a la política terminológica del proyecto y mantiene la referencia directa al nombre del pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Antropología genérica y paralelismo poético
  english_pob_reading: man ... the son of man
  chosen_spanish_reading: el hombre ... el hijo de hombre
  alternative_spanish_readings:
  - la humanidad ... un ser humano
  - el hombre ... un ser humano
  rationale: El verso expresa la pequeñez de la humanidad ante Dios mediante singular representativo y paralelismo. Mantener formas masculinas singulares preserva el ritmo, la simetría y la intertextualidad con Salmo 8:4, sin convertir el poema en una formulación abstracta.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over gender-neutral'
translation_notes:
  revision_awareness: Se revisó el pasaje frente al audit trail en inglés y no se detectaron cambios necesarios respecto de la lectura aprobada más reciente; la traducción propuesta mantiene el sentido, el paralelismo y las decisiones léxicas documentadas.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para יְהוָה.
  - Se conserva el paralelismo entre «el hombre» y «el hijo de hombre».
  - «Conozcas» y «pienses» reproducen el doble movimiento de conocimiento y consideración divina sin añadir interpretaciones doctrinales.
  - La puntuación española respeta la sintaxis interrogativa del verso.
