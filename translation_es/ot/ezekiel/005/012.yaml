review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura tripartita del hebreo y conserva las imágenes de juicio: pestilencia, hambre, espada, dispersión a todo viento y persecución posterior. Sin embargo, hay desajustes formales y de notas: los marcadores de notas están invertidos respecto al contenido heredado del POB inglés; el modismo «a todo viento» debe llevar la nota cultural, mientras que «desenvainaré / sacaré» debe llevar la nota léxica alternativa. También conviene mejorar «detrás de ellos» a «tras ellos» para reflejar mejor el sentido de persecución de אַחֲרֵיהֶם. Además, «hambre» queda algo débil frente a רָעָב en este contexto; «hambruna» preserva mejor el sentido de condiciones de famine sin perder naturalidad.'
  spanish_quality_summary: El español es generalmente claro y digno, pero hay pequeños tropiezos de naturalidad y precisión. «Un tercio de ti» funciona por la personificación de la ciudad, aunque suena algo literal; aun así es aceptable y fiel. «Caerá a espada» y «en medio de ti» son buenos giros. «A todo viento» es poético y entendible si se apoya con nota. «Tras ellos» suena mejor que «detrás de ellos» en registro bíblico contemporáneo. La principal reparación necesaria es la correcta colocación de notas y una leve mejora léxica.
  glossary_alignment: No hay conflictos con la terminología troncal del proyecto. No aparece el nombre divino ni términos sensibles como Mesías/Cristo, Espíritu o esclavo/siervo. «Pestilencia» y «espada» concuerdan bien con las decisiones del POB. Se recomienda «hambruna» en vez de «hambre» para alinearse mejor con el valor de רָעָב como 'famine'.
  issues:
  - severity: high
    issue: Los marcadores de las notas al pie están intercambiados.
    rationale: En el POB inglés, la nota cultural corresponde a «to every wind» y la alternativa léxica corresponde a «I will draw out / unsheathe a sword». En el borrador español, [a] está anclado en «morirá» pero contiene la nota sobre «a todo viento», y [b] está anclado en «a todo viento» pero contiene la alternativa de «desenvainaré». Esto rompe la trazabilidad y debe corregirse.
  - severity: medium
    issue: «Detrás de ellos» no expresa tan bien la persecución implícita como «tras ellos».
    rationale: אַחֲרֵיהֶם con la espada desenvainada sugiere persecución. «Detrás de ellos» puede leerse solo espacialmente; «tras ellos» conserva literalidad y suena más idiomático en contexto bíblico.
  - severity: medium
    issue: «Hambre» atenúa el valor contextual de רָעָב.
    rationale: Aunque no es incorrecto, aquí el sustantivo alude a hambruna/famine como juicio devastador, no meramente a la sensación de hambre. «Hambruna» mejora la precisión semántica en español contemporáneo.
  revised_spanish_text: Un tercio de ti morirá por pestilencia y será consumido por la hambruna en medio de ti, y un tercio caerá a espada alrededor de ti, y un tercio yo esparciré a todo viento[a], y desenvainaré una espada tras ellos[b].
  revised_footnotes:
