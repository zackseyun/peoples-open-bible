translation:
  language: es
  text: ¡Oh[a], que fueras para mí como un hermano, que mamó de los pechos de mi madre! Si te encontrara fuera, te besaría[b], y nadie me despreciaría[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¡Si tan solo fueras para mí como un hermano!». El hebreo abre con una expresión de deseo.'
    reason: lexical_alternative
  - marker: b
    text: Es decir, un beso que socialmente sería aceptable porque se trata de un hermano de leche, amamantado por la misma madre.
    reason: cultural_note
  - marker: c
    text: 'Hebreo literalmente: «no me despreciarían», con un plural indefinido para la desaprobación pública.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִי יִתֶּנְךָ
  english_pob_choice: Oh, that you were
  chosen_spanish: ¡Oh[a], que fueras para mí...!
  alternatives_spanish:
  - ¡Si solo fueras para mí...!
  - ¿Quién te diera ser...?
  lexicon: HALOT
  rationale: El hebreo expresa un deseo optativo, no una pregunta literal. El giro con «Oh, que...» conserva bien esa fuerza desiderativa en español y mantiene el tono afectivo del verso.
- source_word: כְּאָח לִי
  english_pob_choice: like a brother to me
  chosen_spanish: como un hermano, para mí
  alternatives_spanish:
  - como mi hermano
  - como hermano mío
  lexicon: HALOT
  rationale: כְּ indica comparación, no identidad. «Como un hermano» preserva la comparación; añadir «para mí» refleja לִי como relación personal sin volverlo posesivo de forma excesiva.
- source_word: יוֹנֵק שְׁדֵי אִמִּי
  english_pob_choice: who nursed at my mother’s breasts
  chosen_spanish: que mamó los pechos de mi madre
  alternatives_spanish:
  - que mamó de los pechos de mi madre
  - que fue amamantado de los pechos de mi madre
  lexicon: HALOT
  rationale: יוֹנֵק describe al que mama o es amamantado. «Mamó los pechos de mi madre» conserva la imagen concreta y la base social del argumento del verso; «amamantado» sería más explícito pero menos directo.
- source_word: אֶמְצָאֲךָ
  english_pob_choice: If I found you
  chosen_spanish: Si te encontrara
  alternatives_spanish:
  - Si llegara a encontrarte
  - Cuando te encontrara
  lexicon: HALOT
  rationale: El imperfecto en contexto funciona de modo hipotético/contingente. «Si te encontrara» encaja naturalmente con la situación imaginada y con el tono optativo del inicio.
- source_word: בַחוּץ
  english_pob_choice: outside
  chosen_spanish: afuera
  alternatives_spanish:
  - en la calle
  - al aire libre
  lexicon: HALOT
  rationale: «Afuera» comunica el espacio público sin precisar más de lo que dice el hebreo. Es suficientemente amplio para la lógica social de la escena.
- source_word: אֶשָׁקְךָ
  english_pob_choice: I would kiss you
  chosen_spanish: te besaría
  alternatives_spanish:
  - te daría un beso
  - te besaría allí
  lexicon: HALOT
  rationale: El verbo פשוט de besar se vierte con el condicional «besaría» para reflejar la acción hipotética derivada de la cláusula anterior.
- source_word: גַּם לֹא יָבֻזוּ לִי
  english_pob_choice: and no one would despise me
  chosen_spanish: y nadie me despreciaría[c]
  alternatives_spanish:
  - y no me despreciarían
  - y no me mirarían con desprecio
  lexicon: HALOT
  rationale: El plural impersonal del hebreo se expresa de manera idiomática con «nadie». Así se mantiene la idea de desaprobación pública sin sonar forzado en español. La nota explica la forma plural del original.
theological_decisions:
- issue: Imágenes eróticas y comparación fraterna en poesía
  english_pob_reading: Retain the sibling comparison as a social convention, not as a literal familial claim
  chosen_spanish_reading: Conservar la comparación con un hermano como convención social, no como afirmación de parentesco literal
  alternative_spanish_readings:
  - Suavizar la imagen para evitar el lenguaje fraternal
  - Interpretar el verso como parentesco real
  rationale: La fuerza del verso está en la conveniencia social de un hermano de leche, que haría aceptable el afecto público. La traducción conserva esa imagen sin moralizarla ni diluirla, fiel al género poético y al sentido social del texto.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation tradition; Never paraphrase beyond what the source text warrants.'
translation_notes:
  revision_awareness: La redacción sigue la revisión final del POB en inglés, que simplificó «one who nursed» a «who nursed» por naturalidad. En español se adopta una formulación igualmente directa («que mamó»), preservando la imagen materna y el valor social del argumento.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; aquí no aparece el nombre divino.
  - Se mantiene el tono poético sin convertir la optatividad en pregunta retórica.
  - «Nadie me despreciaría» reproduce de forma idiomática el plural indefinido del hebreo, explicado en nota.
  - No se suaviza la imaginería corporal del verso, ya que es central para la lógica social del pasaje.
