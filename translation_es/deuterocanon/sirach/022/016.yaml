  rationale: Se reemplazó «en el tiempo» por «a su tiempo» para mantener la cercanía al griego ἐν καιρῷ con mejor español. Se eliminó la nota sobre «terremoto» por no ser necesaria ni corresponder a una alternativa textual significativa. Se conservaron solo las notas útiles para las alternativas léxicas principales.
