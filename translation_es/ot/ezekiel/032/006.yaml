translation:
  language: es
  text: Saturaré la tierra con tu sangre hasta las montañas, y los barrancos[a] se llenarán de ti[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Barrancos» traduce aquí un término que también puede referirse a canales, cauces o lechos de río.
    reason: lexical_alternative
  - marker: b
    text: Lit. «de ti»; probablemente significa con tu sangre, tus restos, o ambos.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִשְׁקֵיתִי
  english_pob_choice: I will drench
  chosen_spanish: Saturaré
  alternatives_spanish:
  - Regaré
  - Empaparé
  - Empaparé abundantemente
  lexicon: HALOT
  rationale: El verbo הִשְׁקָה en este contexto de juicio violento comunica una acción de empapar o saturar con sangre. «Saturaré» conserva la fuerza figurada sin sonar agrícola en español.
- source_word: אֶרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra
  - el país
  - el suelo
  lexicon: HALOT
  rationale: Aquí el cuadro es geográfico y de superficie; «la tierra» funciona de modo natural en español y mantiene la amplitud de אֶרֶץ sin volverla demasiado abstracta.
- source_word: צָפָתְךָ
  english_pob_choice: your blood
  chosen_spanish: tu sangre
  alternatives_spanish:
  - tu sangre derramada
  - tu sangre que fluye
  - tu derramamiento
  lexicon: HALOT
  rationale: La expresión hebrea es difícil y el audit trail inglés finalmente la simplifica a «your blood» tras retirar «flowing». En español se sigue esa decisión, evitando añadir un adjetivo no claramente sustentado en el texto.
- source_word: מִדָּמְךָ
  english_pob_choice: with your blood
  chosen_spanish: con tu sangre
  alternatives_spanish:
  - desde tu sangre
  - a causa de tu sangre
  lexicon: HALOT
  rationale: El hebreo usa מִן, literalmente «de/desde», pero en el contexto la relación es material o instrumental. «Con tu sangre» expresa con naturalidad el sentido de la acción de saturar la tierra.
- source_word: אֶל הֶהָרִים
  english_pob_choice: up to the mountains
  chosen_spanish: hasta las montañas
  alternatives_spanish:
  - hasta los montes
  - al borde de las montañas
  lexicon: HALOT
  rationale: אֶל marca extensión hacia un límite. «Hasta las montañas» conserva esa idea de alcance sin forzar una dirección física simple.
- source_word: וַאֲפִקִים
  english_pob_choice: the ravines
  chosen_spanish: los barrancos
  alternatives_spanish:
  - los cauces
  - los canales
  - los valles encajonados
  lexicon: HALOT
  rationale: אֲפִיקִים puede designar cauces, canales o barrancos. Dado el paralelismo con montañas en una imagen de paisaje de juicio, «barrancos» es una opción clara y vívida para el lector español.
- source_word: יִמָּלְאוּן
  english_pob_choice: will be filled
  chosen_spanish: serán llenados
  alternatives_spanish:
  - se llenarán
  - quedarán llenos
  lexicon: HALOT
  rationale: El nifal de מלא expresa voz pasiva/reflexiva. «Serán llenados» mantiene la pasividad del hebreo y el tono formal del texto profético.
- source_word: מִמֶּךָּ
  english_pob_choice: with you
  chosen_spanish: contigo
  alternatives_spanish:
  - de ti
  - con tus restos
  lexicon: HALOT
  rationale: 'Literalmente «de ti / desde ti», pero el audit trail inglés conserva la ambigüedad personal: los barrancos se llenan con lo que proviene del derrotado. «Contigo» preserva esa dureza directa sin precisar más de lo que el hebreo obliga.'
translation_notes:
  revision_awareness: Se siguió el tramo final del audit trail inglés, que retiró «flowing» por no estar claramente representado en el hebreo. Por eso la traducción española no añade «derramada» ni otro modificador equivalente. También se mantuvo la estructura de paralelismo con montañas y barrancos, sin convertir el pasaje en una paráfrasis interpretativa.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» o «Yahvé» porque este versículo no contiene el nombre divino.
  - Se prefirió un léxico de juicio físico («Saturaré», «barrancos») acorde con el cuadro hebreo y con la solución inglesa auditada.
  - 'Se mantuvo el orden de imágenes del texto fuente: tierra, sangre, montañas, barrancos.'
  - No se introdujo ninguna aclaración doctrinal, ya que el versículo es descriptivo y no plantea una decisión teológica específica.
