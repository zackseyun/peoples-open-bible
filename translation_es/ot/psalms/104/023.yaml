  to: El hombre sale[a] a su trabajo y a su labor hasta el atardecer[b].
  rationale: Se cambia «anochecer» por «atardecer» para reflejar mejor עָרֶב / «evening» sin desplazar el sentido hacia la noche. También se reemplaza la nota [b] por una alternativa real y útil en español, en lugar de repetir exactamente la redacción principal.
