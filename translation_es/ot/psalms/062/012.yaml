    issue: 'Frase inicial poco natural: ''Una cosa ha hablado Dios'''
    rationale: Aunque comprensible y cercana al hebreo, esta colocación verbal suena forzada en español moderno y menos legible en voz alta. 'Dios ha dicho una cosa' conserva la fórmula retórica y mejora la naturalidad.
  - severity: medium
    issue: 'Desalineación léxica en עֹז: ''poder'' en vez de ''fuerza'''
    rationale: El POB inglés documentó 'strength' precisamente para no aplanar el matiz léxico. En español, 'fuerza' refleja mejor esa elección que 'poder', que es más amplio y abstracto.
  revised_spanish_text: 'Dios ha dicho una cosa[a]; dos cosas he oído: que la fuerza pertenece a Dios.'
