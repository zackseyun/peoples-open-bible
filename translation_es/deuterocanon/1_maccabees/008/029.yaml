translation:
  language: es
  text: De acuerdo con estos términos, los romanos hicieron así este acuerdo con el pueblo de los judíos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de los judeanos». El griego Ἰουδαίων puede referirse al pueblo judío o a la población de Judea, según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: κατὰ
  english_pob_choice: According to
  chosen_spanish: De acuerdo con
  alternatives_spanish:
  - Conforme a
  - Según
  lexicon: BDAG
  rationale: La preposición con acusativo expresa conformidad con las estipulaciones previas; en español jurídico-formal, «De acuerdo con» conserva bien ese valor sin sonar forzado.
- source_word: τοὺς λόγους τούτους
  english_pob_choice: these terms
  chosen_spanish: estos términos
  alternatives_spanish:
  - estas palabras
  - estas disposiciones
  lexicon: BDAG
  rationale: En contexto de tratado, λόγοι remite a cláusulas o estipulaciones, no solo a «palabras»; «términos» transmite mejor la fuerza contractual.
- source_word: οὕτως
  english_pob_choice: thus
  chosen_spanish: así
  alternatives_spanish:
  - de este modo
  - de esta manera
  lexicon: BDAG
  rationale: ὁὕτως retoma la forma en que se ha descrito el pacto; «así» es natural en español y mantiene el enlace formal.
- source_word: ἔστησαν
  english_pob_choice: made an agreement with
  chosen_spanish: hicieron un acuerdo con
  alternatives_spanish:
  - establecieron un acuerdo con
  - confirmaron un acuerdo con
  lexicon: LSJ
  rationale: Aunque el verbo literalmente puede sugerir «poner/establecer», en contexto diplomático el sentido es pactar o dejar establecido un arreglo. «Hicieron un acuerdo con» reproduce ese valor sin sobrecargar el texto.
- source_word: Ῥωμαῖοι
  english_pob_choice: the Romans
  chosen_spanish: los romanos
  alternatives_spanish:
  - Romanos
  lexicon: BDAG
  rationale: Como sujeto colectivo étnico-político, el español natural es «los romanos».
- source_word: τῷ δήμῳ
  english_pob_choice: with the people
  chosen_spanish: con el pueblo
  alternatives_spanish:
  - con la gente
  - con la asamblea
  lexicon: LSJ
  rationale: δῆμος designa aquí el cuerpo colectivo con el que se celebra el acuerdo; «pueblo» conserva el referente colectivo y el registro formal.
- source_word: τῶν Ἰουδαίων
  english_pob_choice: of the Jews
  chosen_spanish: de los judíos
  alternatives_spanish:
  - de los judeanos
  lexicon: BDAG
  rationale: En este contexto histórico, el término abarca al pueblo judío como colectivo. «Judíos» es la forma española más clara y usual; se conserva la alternativa geográfica en nota.
theological_decisions:
- issue: Alcance de Ἰουδαίων
  english_pob_reading: of the Jews
  chosen_spanish_reading: de los judíos
  alternative_spanish_readings:
  - de los judeanos
  rationale: No hay diferencia doctrinal, pero sí histórica. Aquí el texto se refiere al pueblo judío en conjunto dentro de un arreglo diplomático; por eso se mantiene «judíos», dejando abierta la matización etnogeográfica en la nota.
  doctrine_reference: Consistencia terminológica y primacía del texto original.
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del POB inglés, que reemplazó una formulación demasiado literal sobre ἔστησαν por «made an agreement with». La versión española adopta esa misma decisión semántica, manteniendo el tono formal y el valor jurídico del contexto.
  spanish_consistency_notes:
  - Se mantiene «acuerdo» para reflejar el contexto diplomático, en lugar de calcos más duros como «establecieron materias».
  - Se usa «pueblo» para τῷ δήμῳ por claridad natural en español.
  - Se preserva la posibilidad alternativa «judeanos» en nota, en paralelo con la nota inglesa sobre Ἰουδαίων.
