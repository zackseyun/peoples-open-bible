translation:
  language: es
  text: La soberbia de Israel da testimonio[a] contra él, y no vuelven a Yahvé su Dios, ni lo buscan en todo esto[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ante él» o «delante de él»; el hebreo dice literalmente «en/contra de su rostro».
    reason: lexical_alternative
  - marker: b
    text: O «a pesar de todo esto».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָנָה
  english_pob_choice: testifies
  chosen_spanish: testifica
  alternatives_spanish:
  - responde
  - da testimonio
  - atestigua
  lexicon: HALOT
  rationale: En este contexto forense-profético, la idea es de dar testimonio o declarar en contra de alguien. «Testifica» comunica la función acusatoria con naturalidad en español y evita el calco de «responde».
- source_word: גְאוֹן יִשְׂרָאֵל
  english_pob_choice: the pride of Israel
  chosen_spanish: la soberbia de Israel
  alternatives_spanish:
  - el orgullo de Israel
  - la majestad de Israel
  lexicon: HALOT
  rationale: El contexto de reprensión favorece el matiz negativo de גאון. «Soberbia» conserva la carga de altivez culpable mejor que «majestad», y mantiene la personificación del sujeto acusador.
- source_word: בְּפָנָיו
  english_pob_choice: against him
  chosen_spanish: contra él
  alternatives_spanish:
  - en su presencia
  - ante él
  - a su rostro
  lexicon: HALOT
  rationale: La expresión hebrea literalmente puede leerse «en/contra su rostro». En español, «contra él» transmite bien el valor adversativo de testimonio y conserva el referente singular sin suavizar la forma.
- source_word: שָׁבוּ אֶל
  english_pob_choice: return to
  chosen_spanish: vuelven a
  alternatives_spanish:
  - regresan a
  - se vuelven a
  - se convierten a
  lexicon: HALOT
  rationale: Aquí el verbo expresa retorno relacional y de fidelidad pactual. «Vuelven a» es natural en español y permite oír tanto la idea de regreso como la de arrepentimiento sin sobreexplicar.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto para el Tetragrámaton. «Yahvé» preserva el nombre divino personal en lugar de sustituirlo por un título.
- source_word: אֱלֹהֵיהֶם
  english_pob_choice: their God
  chosen_spanish: su Dios
  alternatives_spanish:
  - su Dios de ellos
  - el Dios de ellos
  lexicon: HALOT
  rationale: El posesivo se mantiene en español con «su», que en este contexto puede referir naturalmente a Israel. La forma breve conserva la relación de pacto sin redundancia.
- source_word: בִּקְשֻׁהוּ
  english_pob_choice: seek him
  chosen_spanish: lo buscan
  alternatives_spanish:
  - lo buscan con diligencia
  - lo procuran
  - lo buscan a él
  lexicon: HALOT
  rationale: «Buscar» es el equivalente más directo y relacional para בקש en contexto religioso. El pronombre objeto directo «lo» permite una frase fluida en español sin perder el referente divino.
- source_word: בְּכָל זֹאת
  english_pob_choice: in all this
  chosen_spanish: en todo esto
  alternatives_spanish:
  - después de todo esto
  - a pesar de todo esto
  - con todo esto
  lexicon: HALOT
  rationale: La fórmula admite una lectura global o concesiva. «En todo esto» conserva la cercanía al hebreo y deja abierta la tensión interpretativa que el inglés POB también preserva mediante nota.
theological_decisions:
- issue: Cómo reflejar el valor pactual de «volver a Yahvé»
  english_pob_reading: return to Yahweh their God
  chosen_spanish_reading: no vuelven a Yahvé, su Dios
  alternative_spanish_readings:
  - no se vuelven a Yahvé, su Dios
  - no retornan a Yahvé, su Dios
  rationale: La frase española mantiene el sentido de retorno relacional, no solo desplazamiento físico. «Vuelven a» es idiomático y suficiente para oír la dimensión de arrepentimiento sin imponer una glosa interpretativa.
  doctrine_reference: Arrepentimiento y restauración del pacto
- issue: Cómo preservar el singular de «contra él»
  english_pob_reading: retained singular 'him'
  chosen_spanish_reading: contra él
  alternative_spanish_readings:
  - contra ellos
  - contra Israel
  rationale: Se conserva el singular del hebreo para no borrar la tensión gramatical documentada. Aunque el referente es corporativo, el singular mantiene la forma del texto y su posible efecto retórico.
  doctrine_reference: Primacía del texto original y preservación de tensiones del hebreo
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés sin depender mecánicamente de él: se conservó el sujeto singular de la acusación, el nombre divino Yahvé y el valor pactual de «volver/seek». No se introdujeron cambios de sentido ni se resolvió la tensión del singular/plural más allá de lo documentado. La formulación española fue ajustada para sonar natural y publicable.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el Tetragrámaton, conforme al estándar del proyecto.
  - Se usa «vuelven a» para שׁוּב con valor relacional/pactual.
  - Se conserva el singular «él» para reflejar el sufijo hebreo singular.
  - Se evita «el SEÑOR» como sustitución reverencial.
  - «Buscar» se usa para בקש en sentido de buscar a Dios relacionalmente.
