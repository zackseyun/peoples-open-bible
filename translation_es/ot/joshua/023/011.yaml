revisions:
- from: Cuídense mucho de ustedes mismos, para amar a Yahvé su Dios[a].
  to: Tengan mucho cuidado por ustedes mismos[a], para amar a Yahvé su Dios.
  rationale: Se revisa la cláusula reflexiva para que suene natural en español y conserve mejor la función de לְנַפְשֹׁתֵיכֶם en la exhortación hebrea. «Tengan mucho cuidado por ustedes mismos» evita la torpeza de «cuídense de ustedes mismos» y mantiene la idea de velar por el propio ser. La nota se ajusta para ofrecer alternativas españolas idiomáticas coherentes con el análisis léxico del inglés POB.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:38:13Z'
