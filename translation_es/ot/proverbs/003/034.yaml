translation:
  language: es
  text: Si él se burla de los burladores[a], a los humildes[b] les concede favor[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se burla de los escarnecedores»; el hebreo repite la misma raíz para «burladores» y «se burla», creando un juego de palabras deliberado.
    reason: lexical_alternative
  - marker: b
    text: O «pobres» o «afligidos»; el término hebreo puede designar a quienes son bajos de condición o se hallan abatidos, aunque aquí «humildes» encaja mejor con el contraste con los burladores.
    reason: lexical_alternative
  - marker: c
    text: O «gracia».
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Si acaso
  - Cuando
  lexicon: HALOT
  rationale: La partícula introduce una relación condicional o proverbial; en español, «Si» conserva esa forma sin forzar una lectura explicativa o temporal que el hebreo no exige.
- source_word: לַּלֵּצִים
  english_pob_choice: to scoffers
  chosen_spanish: a los burladores
  alternatives_spanish:
  - a los escarnecedores
  - a los mofadores
  lexicon: HALOT
  rationale: לֵץ designa al que se burla o escarnece. «Burladores» es natural en español y mantiene el campo semántico de desprecio verbal propio de la sabiduría bíblica.
- source_word: יָלִיץ
  english_pob_choice: scoffs
  chosen_spanish: se burla
  alternatives_spanish:
  - mofa
  - escarnece
  - se burla de
  lexicon: HALOT
  rationale: El verbo en hiphil reproduce un juego de palabras con לֵצִים. En español, «se burla» conserva la repetición léxica y el valor retributivo del proverbio, aunque no puede imitarse plenamente el mismo eco consonántico.
- source_word: וְלַעֲנִיִּים
  english_pob_choice: but to the humble
  chosen_spanish: a los humildes
  alternatives_spanish:
  - a los pobres
  - a los afligidos
  - a los bajos de condición
  lexicon: HALOT
  rationale: Aunque el término puede aludir a pobres o afligidos, el contraste del proverbio es ético y postural frente a los burladores; por eso «humildes» expresa mejor la antítesis sin perder la posible trasfondo de bajeza o aflicción.
- source_word: יִתֶּן
  english_pob_choice: he gives
  chosen_spanish: les concede
  alternatives_spanish:
  - les da
  - les otorga
  lexicon: HALOT
  rationale: El imperfecto gnómico expresa acción habitual o característica. «Concede» comunica la iniciativa benévola de Dios con un registro digno y natural en español.
- source_word: חֵן
  english_pob_choice: favor
  chosen_spanish: favor
  alternatives_spanish:
  - gracia
  - benevolencia
  lexicon: HALOT
  rationale: «Favor» es la opción más directa y menos cargada teológicamente en este contexto sapiencial. «Gracia» queda como alternativa válida, pero puede sonar más específicamente teológica en español.
theological_decisions:
- issue: Referente implícito del sujeto
  english_pob_reading: The subject is left as 'he,' with God understood from the surrounding context.
  chosen_spanish_reading: El sujeto se deja implícito en el verbo, con Dios entendido por el contexto.
  alternative_spanish_readings:
  - Dios se burla de los burladores y da favor a los humildes
  - Yahvé se burla de los burladores y da favor a los humildes
  rationale: El hebreo usa un pronombre explícito sin nombrar a Dios. En español, la forma natural es mantener la referencia implícita mediante el verbo, evitando añadir un sujeto que el versículo no expresa. El contexto cercano permite identificar a Dios sin expandir el texto.
  doctrine_reference: Translation philosophy §1, §3
- issue: Sentido de עניים en este proverbio
  english_pob_reading: Rendered as 'the humble' rather than 'the poor.'
  chosen_spanish_reading: Se traduce como «humildes» y no como «pobres».
  alternative_spanish_readings:
  - los pobres
  - los afligidos
  - los oprimidos
  rationale: 'Como en la lectura inglesa auditada, el contraste es principalmente moral y relacional: burladores frente a humildes. «Humildes» preserva mejor la antítesis sapiencial; las otras opciones siguen siendo posibles según el matiz de pobreza o aflicción.'
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: 'La revisión inglesa corrigió una formulación inicial poco natural («it is to scoffers») y la ajustó a una estructura más fiel al hebreo: «If he scoffs at scoffers, he gives favor to the humble.» La redacción española sigue esa misma línea revisada, conservando el paralelismo y la fuerza proverbial.'
  spanish_consistency_notes:
  - Se mantuvo «humildes» para עניים, en consonancia con la decisión inglesa auditada, en lugar de ampliar a «pobres» en el texto principal.
  - Se optó por «favor» para חֵן, dejando «gracia» en nota como alternativa, para evitar sobrecargar el versículo con una lectura más técnica o confesional.
  - El sujeto divino no se explicitó en el texto principal, respetando la economía del hebreo y la lectura auditada en inglés.
