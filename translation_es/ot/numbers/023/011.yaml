translation:
  language: es
  text: 'Entonces Balac dijo a Balaam: «¿Qué me has hecho? Yo te tomé para maldecir a mis enemigos, y he aquí, los has ciertamente bendecido[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «los has seguramente bendecido» o «los has de veras bendecido»; el hebreo usa un verbo finito con infinitivo absoluto para expresar énfasis.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Luego ... dijo
  lexicon: HALOT
  rationale: La forma narrativa con waw consecutiva pide una progresión natural en español; «Entonces» conserva la secuencia sin sonar mecánico.
- source_word: מֶה עָשִׂיתָ לִי
  english_pob_choice: What have you done to me?
  chosen_spanish: ¿Qué me has hecho?
  alternatives_spanish:
  - ¿Qué hiciste conmigo?
  - ¿Qué me hiciste?
  lexicon: HALOT
  rationale: Es una pregunta directa y idiomática; el presente perfecto suena natural para una acción recién ocurrida con efecto presente.
- source_word: לָקֹב
  english_pob_choice: to curse
  chosen_spanish: para maldecir
  alternatives_spanish:
  - para echar una maldición sobre
  - para pronunciar una maldición contra
  lexicon: HALOT
  rationale: En este contexto קבב se refiere a maldecir. «Maldecir» es la equivalencia más clara y natural en español.
- source_word: אֹיְבַי
  english_pob_choice: my enemies
  chosen_spanish: mis enemigos
  alternatives_spanish:
  - los que me son hostiles
  lexicon: HALOT
  rationale: El posesivo plural se expresa de forma directa y fiel con «mis enemigos».
- source_word: לְקַחְתִּיךָ
  english_pob_choice: I took you
  chosen_spanish: yo te tomé
  alternatives_spanish:
  - yo te traje
  - yo te llevé
  lexicon: HALOT
  rationale: לקח significa literalmente «tomar». Mantengo la cercanía al hebreo, aunque en español «tomé» puede sonar menos idiomático que «te traje»; aquí preserva mejor la imagen verbal del texto.
- source_word: וְהִנֵּה
  english_pob_choice: behold
  chosen_spanish: y he aquí
  alternatives_spanish:
  - y mira
  - he aquí
  lexicon: HALOT
  rationale: «Y he aquí» conserva el valor deíctico y enfático del hebreo con registro bíblico digno en español.
- source_word: בֵּרַכְתָּ בָרֵךְ
  english_pob_choice: you have surely blessed them
  chosen_spanish: los has bendecido en gran manera
  alternatives_spanish:
  - los has ciertamente bendecido
  - has bendecido, sí, bendecido
  lexicon: HALOT
  rationale: La combinación verbo finito + infinitivo absoluto intensifica la acción. En español, «en gran manera» comunica la fuerza intensiva sin sobrecargar el texto ni suavizar la repetición enfática.
theological_decisions:
- issue: Valor intensivo del infinitivo absoluto en «בֵּרַכְתָּ בָרֵךְ»
  english_pob_reading: you have surely blessed them
  chosen_spanish_reading: los has bendecido en gran manera
  alternative_spanish_readings:
  - los has ciertamente bendecido
  - los has bendecido, sin duda
  rationale: No hay una tensión doctrinal, sino una cuestión de fuerza retórica. Opto por una equivalencia que conserve la intensificación sin convertirla en explicación interpretativa.
  doctrine_reference: None
translation_notes:
  revision_awareness: La revisión inglesa reciente prefirió una forma más formal («behold») y redujo una paráfrasis intensiva a una equivalencia más cercana al hebreo («you have surely blessed them»). El español sigue esa línea, evitando una glosa explicativa excesiva y conservando el énfasis con una formulación natural.
  spanish_consistency_notes:
  - Se mantiene «Balaam» como transliteración propia del nombre en esta perícopa, y «Balac» para el rey moabita.
  - Se usa «Yahvé» solo cuando el texto fuente lo exige; aquí no aparece el Tetragrámaton.
  - «Maldecir» se eligió por la fuerza verbal del hebreo en este contexto, en armonía con el uso previo de POB para קבב.
  - La frase final conserva el contraste enfático del hebreo sin introducir vocabulario doctrinal ajeno al versículo.
