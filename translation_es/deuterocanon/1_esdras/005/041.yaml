  yaml_path: translation/deuterocanon/1_esdras/005/041.yaml
  text: 'All these were Israelites[a], from twelve years old and upward, apart from male and female servants: forty-two thousand three hundred sixty. Their male and female servants were seven thousand three hundred thirty-seven[b]; and the singers and songstresses were two hundred forty-five.'
  footnotes:
