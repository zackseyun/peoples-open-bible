base_translation:
  language: en
  yaml_path: translation/ot/1_chronicles/015/022.yaml
  text: And Chenaniah[a], chief of the Levites, directed the carrying[b], because he was skillful at it.
  footnotes:
  - marker: a
    text: Or 'directed the singing ... because he was skillful in it.' The Hebrew word מַשָּׂא usually means 'burden' or 'carrying,' but some take it here in a musical sense because of the surrounding references to singers and musicians.
    reason: alternative_reading
  - marker: b
    text: 'Hebrew repeats the same noun: ''in the carrying ... in the carrying.'' The translation renders the second occurrence idiomatically as ''at it.'''
    reason: lexical_alternative
