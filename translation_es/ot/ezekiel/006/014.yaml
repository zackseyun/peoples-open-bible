revisions:
- from: Así extenderé mi mano contra ellos y haré de la tierra una desolación y un desierto[a], desde el desierto hasta Diblat[b], en todos sus lugares de habitación[c]. Entonces sabrán que yo soy Yahvé.
  to: Así extenderé mi mano contra ellos y haré de la tierra una desolación y una ruina, desde el desierto hasta Diblat[a], en todos sus asentamientos[b]. Entonces sabrán que yo soy Yahvé.
  rationale: 'Se corrigió «un desierto» a «una ruina» para reflejar mejor el doblete hebreo de devastación. Se simplificó «lugares de habitación» a «asentamientos» por naturalidad y precisión contextual. Se consolidó la nota textual de la frase geográfica difícil en un solo anclaje sobre «Diblat[a]», y se mantuvo una nota léxica para la alternativa de מוֹשְׁבוֹתֵיהֶם. No se requiere adjudicación adicional: la reparación es clara y de bajo riesgo doctrinal.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:33:01Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español capta bien la estructura general del hebreo: acción judicial de Yahvé, desolación de la tierra, alcance geográfico, y fórmula final de reconocimiento. Sin embargo, hay dos desajustes importantes con la evidencia fuente y la auditoría POB: (1) שְׁמָמָה וּמְשַׁמָּה no se preserva fielmente con «una desolación y un desierto», porque «desierto» reinterpreta la segunda palabra como bioma/terreno en vez de devastación o ruina; (2) las notas sobre מִמִּדְבַּר דִּבְלָתָה están mal distribuidas, porque la nota textual sobre la frase difícil debe anclarse a toda la expresión geográfica, no crear una nota separada que diga «O hasta Diblat», lo cual no refleja la incertidumbre real. El resto está básicamente alineado, incluido «Yahvé».'
  spanish_quality_summary: El español es comprensible y de registro bíblico moderno, pero «una desolación y un desierto» suena semánticamente desbalanceado y algo interpretativo. «En todos sus lugares de habitación» es correcto pero pesado; «en todos sus asentamientos» o «en todas sus poblaciones» sería más natural y cercano al valor de מוֹשָׁבוֹת. La puntuación y fluidez general son buenas.
  glossary_alignment: Cumple con el nombre divino «Yahvé». No hay otros términos doctrinales clave conflictivos aquí. Conviene alinear mejor שְׁמָמָה וּמְשַׁמָּה con el doblete de devastación del POB inglés, y representar מוֹשְׁבוֹתֵיהֶם con un término más natural como «asentamientos», manteniendo la nota alternativa «moradas» si se desea.
  issues:
  - severity: high
    issue: «un desierto» para וּמְשַׁמָּה
    rationale: מְשַׁמָּה en este contexto intensifica la devastación de la tierra; «desierto» introduce la idea de un tipo de paisaje, no simplemente ruina o desolación. Esto altera el sentido fuente.
  - severity: medium
    issue: Anclaje y contenido de notas sobre «desde el desierto hasta Diblat»
    rationale: La incertidumbre textual/geográfica recae sobre toda la frase מִמִּדְבַּר דִּבְלָתָה. La nota b actual («O “hasta Diblat”») no aporta una alternativa real útil y separa indebidamente lo que debe explicarse en una sola nota textual.
  - severity: medium
    issue: «lugares de habitación» es poco natural
    rationale: Aunque comprensible, suena pesado en español actual. «Asentamientos» preserva mejor el sentido habitacional/colectivo de מוֹשָׁבוֹת en contexto territorial.
  revised_spanish_text: Así extenderé mi mano contra ellos y haré de la tierra una desolación y una ruina, desde el desierto hasta Diblat[a], en todos sus asentamientos[b]. Entonces sabrán que yo soy Yahvé.
  revised_footnotes:
  - marker: a
    text: 'Hebreo: «desde el desierto hacia Diblata». El nombre del lugar es incierto; algunos entienden «desde el desierto hasta Diblata», y algunas propuestas textuales lo relacionan con Ribla.'
    reason: textual_variant
  - marker: b
    text: O «en todas sus moradas».
    reason: lexical_alternative
  revision_rationale: 'Se corrigió «un desierto» a «una ruina» para reflejar mejor el doblete hebreo de devastación. Se simplificó «lugares de habitación» a «asentamientos» por naturalidad y precisión contextual. Se consolidó la nota textual de la frase geográfica difícil en un solo anclaje sobre «Diblat[a]», y se mantuvo una nota léxica para la alternativa de מוֹשְׁבוֹתֵיהֶם. No se requiere adjudicación adicional: la reparación es clara y de bajo riesgo doctrinal.'
