    unchanged: false
    changes_summary: Revised the final clause from 'be for serving' to 'be to serve' for more natural formal English while preserving the Hebrew sense. Retained 'wave offering' and 'from the sons of Israel' as accurate renderings.
translation:
  language: es
  text: Y Aarón presentará a los levitas como ofrenda mecida[a] delante de Yahvé, de entre[b] los hijos de Israel, y serán para servir en el servicio de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mecerá a los levitas como ofrenda mecida». El verbo hebreo comparte raíz con el sustantivo técnico y alude a una presentación ritual.
    reason: lexical_alternative
  - marker: b
    text: También puede entenderse «de parte de los hijos de Israel», indicando que los levitas son presentados como representantes de Israel en el servicio de Yahvé.
    reason: alternative_reading
lexical_decisions:
- source_word: וְהֵנִיף
  english_pob_choice: shall present
  chosen_spanish: presentará
  alternatives_spanish:
  - mecerá
  - ofrecerá
  lexicon: HALOT
  rationale: El hebreo implica un acto ritual de mover/presentar; en español, «presentará» comunica con naturalidad la acción ceremonial cuando el objeto directo son personas. Se conserva el matiz técnico con «ofrenda mecida».
- source_word: הַלְוִיִּם
  english_pob_choice: the Levites
  chosen_spanish: los levitas
  alternatives_spanish:
  - los levíes
  lexicon: HALOT
  rationale: Nombre tribal establecido en español bíblico; «levitas» es claro y fiel al grupo designado.
- source_word: תְּנוּפָה
  english_pob_choice: a wave offering
  chosen_spanish: ofrenda mecida
  alternatives_spanish:
  - ofrenda alzada
  - ofrenda de presentación
  lexicon: HALOT
  rationale: El término es técnico cultual. «Ofrenda mecida» conserva la imagen ritual y evita una paráfrasis excesiva.
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - en presencia de Yahvé
  lexicon: HALOT
  rationale: «Delante de Yahvé» reproduce el modismo de presencia ritual sin convertirlo en explicación interpretativa.
- source_word: מֵאֵת בְּנֵי יִשְׂרָאֵל
  english_pob_choice: from the sons of Israel
  chosen_spanish: de entre los hijos de Israel
  alternatives_spanish:
  - de parte de los hijos de Israel
  - de los hijos de Israel
  lexicon: HALOT
  rationale: La preposición hebrea puede expresar procedencia/separación. «De entre» mantiene que los levitas son tomados del conjunto de Israel, y deja abierto el matiz representativo señalado en el audit trail.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Se preserva la forma hebrea masculina plural por fidelidad léxica y para no neutralizar el giro covenantal del original.
- source_word: וְהָיוּ
  english_pob_choice: and they shall be
  chosen_spanish: y estarán
  alternatives_spanish:
  - y serán
  - y quedarán
  lexicon: HALOT
  rationale: En español, «estarán» expresa de modo natural el estado/función asignada que sigue a la presentación ritual.
- source_word: לַעֲבֹד
  english_pob_choice: to serve
  chosen_spanish: para servir
  alternatives_spanish:
  - a servir
  - para ministrar
  lexicon: HALOT
  rationale: La construcción final de propósito se expresa mejor con «para servir», manteniendo la relación con el sustantivo siguiente.
- source_word: עֲבֹדַת יְהוָה
  english_pob_choice: the service of Yahweh
  chosen_spanish: el servicio de Yahvé
  alternatives_spanish:
  - la obra de Yahvé
  - el ministerio de Yahvé
  lexicon: HALOT
  rationale: En contexto sacerdotal/cultual, «servicio» es la equivalencia más directa y sobria para עֲבֹדָה.
theological_decisions:
- issue: Conservación del rito de presentación de los levitas como ofrenda mecida
  english_pob_reading: Use 'present ... as a wave offering' rather than a more interpretive paraphrase.
  chosen_spanish_reading: «presentará a los levitas como ofrenda mecida»
  alternative_spanish_readings:
  - «mecerá a los levitas como ofrenda mecida»
  - «presentará a los levitas como ofrenda»
  rationale: El texto describe una consagración ritual con lenguaje sacrificial/presentacional. «Ofenda mecida» conserva la categoría técnica sin sugerir inmolación literal, y «presentará» evita una traducción extraña cuando el objeto son personas.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Valor de מֵאֵת בְּנֵי יִשְׂרָאֵל
  english_pob_reading: '''From the sons of Israel'' may also mean ''on behalf of the sons of Israel,'' indicating that the Levites are presented as representatives of the Israelites in the LORD''s service.'
  chosen_spanish_reading: «de entre los hijos de Israel» con nota de posible sentido representativo
  alternative_spanish_readings:
  - «de parte de los hijos de Israel»
  - «en nombre de los hijos de Israel»
  rationale: La traducción principal conserva la procedencia/separación indicada por la preposición, mientras la nota permite el matiz representativo documentado por el audit trail sin fijarlo indebidamente en el texto principal.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: La redacción sigue el cierre revisado del inglés auditado («to serve the service of Yahweh») con una solución española natural («estarán para servir el servicio de Yahvé»), preserva el término cultual técnico «ofrenda mecida» y mantiene el genitivo hebreo «hijos de Israel» con el matiz de procedencia/representación señalado en el expediente.
  spanish_consistency_notes:
  - Se usa «Yahvé» según la norma del proyecto para יהוה.
  - Se conserva «hijos de Israel» por fidelidad al hebreo masculino plural, sin neutralización.
  - «Ofrenda mecida» mantiene la terminología cultual técnica correspondiente a תְּנוּפָה.
  - La nota b recoge el sentido alternativo representativo sin sobrecargar el texto principal.
