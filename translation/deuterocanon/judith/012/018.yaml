theological_decisions:
- issue: Sense of Judith’s statement about life being 'magnified'
  chosen_reading: Retain the elevated, somewhat literal expression rather than flattening it into a simple statement of happiness or prosperity.
  alternative_readings:
  - my life has prospered today more than ever before
  - I have never felt so alive as today
  rationale: The Greek uses μεγαλύνω with τὸ ζῆν μου in a rhetorically heightened way. Because the text does not explicitly say merely that she is happy or flourishing, the translation preserves the metaphorical grandeur instead of resolving it into a paraphrase.
  doctrine_reference: 'DOCTRINE.md: Preserve theological/interpretive tension rather than resolve it; original-language primacy over translation tradition.'
