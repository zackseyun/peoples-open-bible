revisions:
- from: Sin embargo, vuelve tu rostro a la oración de tu siervo y a su súplica de favor[a], Yahvé, mi Dios[b], para oír el clamor y la oración que tu siervo está haciendo delante de ti hoy.
  to: Sin embargo, vuelve tu atención a la oración de tu siervo y a su súplica de favor[a], Yahvé mi Dios, para oír el clamor[b] y la oración que tu siervo está orando delante de ti hoy.
  rationale: 'La revisión corrige dos problemas de fidelidad y uno de presentación: elimina el añadido «rostro», reemplaza «está haciendo» por «está orando» para reflejar מִתְפַּלֵּל, y mueve la nota [b] al término «clamor», que es donde corresponde por el hebreo הָרִנָּה. También suaviza la puntuación vocativa a un español más fluido sin alterar el sentido.'
