translation:
  language: es
  text: Porque no es el poder de las cosas por las que juran[a], sino el castigo de los que pecan[b], el que siempre persigue la transgresión de los injustos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «el poder de los juramentos» o «el poder de aquello por lo que juran». La expresión griega es comprimida y puede referirse al juramento mismo o a los seres/objetos invocados al jurar.
    reason: lexical_alternative
  - marker: b
    text: O, «el castigo de los pecadores siempre persigue la transgresión de los injustos».
    reason: alternative_reading
lexical_decisions:
- source_word: οὐ γὰρ
  english_pob_choice: For it is not
  chosen_spanish: Porque no es
  alternatives_spanish:
  - Pues no es
  - Ya que no es
  lexicon: BDAG
  rationale: Conserva el valor explicativo-causal de la partícula griega y suena natural en español, sin volverlo una simple paráfrasis.
- source_word: ἡ τῶν ὀμνυμένων δύναμις
  english_pob_choice: the power of the things by which they swear
  chosen_spanish: el poder de las cosas por las que juran
  alternatives_spanish:
  - el poder de los juramentos
  - el poder de aquello por lo que juran
  lexicon: LSJ
  rationale: Mantiene visible la construcción comprimida del griego. 'Las cosas por las que juran' refleja el valor del participio y evita decidir de más entre el juramento mismo o los objetos invocados.
- source_word: ἀλλ᾽ ἡ τῶν ἁμαρτανόντων δίκη
  english_pob_choice: but the punishment of those who sin
  chosen_spanish: sino el castigo de los que pecan
  alternatives_spanish:
  - sino la pena de los que pecan
  - sino la justicia de los que pecan
  lexicon: BDAG
  rationale: Aquí δίκη se entiende naturalmente como retribución/castigo en este contexto sapiencial. 'Castigo' comunica la fuerza retributiva sin perder la relación judicial.
- source_word: ἐπεξέρχεται
  english_pob_choice: that always pursues
  chosen_spanish: el que siempre persigue
  alternatives_spanish:
  - el que siempre alcanza
  - el que siempre va tras
  lexicon: LSJ
  rationale: '''Persigue'' conserva la imagen activa y dinámica del verbo, más cercana al griego que una formulación estática.'
- source_word: ἀεὶ
  english_pob_choice: always
  chosen_spanish: siempre
  alternatives_spanish:
  - constantemente
  - sin cesar
  lexicon: BDAG
  rationale: Equivalente directo y natural en español.
- source_word: τὴν τῶν ἀδίκων παράβασιν
  english_pob_choice: the transgression of the unrighteous
  chosen_spanish: la transgresión de los injustos
  alternatives_spanish:
  - la transgresión de los malvados
  - la violación de los injustos
  lexicon: BDAG
  rationale: '''Injustos'' conserva el campo semántico de ἀδίκων y mantiene el registro moral-jurídico del texto. ''Transgresión'' refleja παράβασις con precisión.'
theological_decisions:
- issue: Valor de δίκη en un enunciado sapiencial sobre retribución
  english_pob_reading: the punishment of those who sin
  chosen_spanish_reading: el castigo de los que pecan
  alternative_spanish_readings:
  - la pena de los que pecan
  - la justicia de los que pecan
  rationale: En este versículo, δίκη funciona como retribución efectiva sobre los pecadores. 'Castigo' preserva la tensión entre justicia y sanción sin diluir el énfasis retributivo del pasaje.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; consistency of key terms, or documented exception.'
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del texto inglés POB, que optó por mantener con claridad la estructura griega y por leer δίκη aquí como castigo/retribución más que como una formulación abstracta de justicia. También conserva la ambigüedad de ἡ τῶν ὀμνυμένων δύναμις mediante una expresión española que no decide de más entre el juramento y los objetos invocados.
  spanish_consistency_notes:
  - Se mantiene 'transgresión' para παράβασις y 'injustos' para ἀδίκων, coherente con un registro jurídico-moral.
  - '''Castigo'' se usa aquí por el contexto retributivo, sin eliminar la tensión semántica de δίκη entre justicia y pena.'
  - 'La puntuación reproduce la estructura contrastiva del griego: ''no..., sino..., el que...''.'
