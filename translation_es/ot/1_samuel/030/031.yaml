translation:
  language: es
  text: y a los de Hebrón[a], y a todos los lugares por donde David y sus hombres habían recorrido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “habían viajado” o “se habían movido de un lugar a otro”. El verbo hebreo sugiere un desplazamiento repetido de un sitio a otro.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/לַ/אֲשֶׁר
  english_pob_choice: and to those
  chosen_spanish: y a los que
  alternatives_spanish:
  - y para los que
  - y a aquellos que
  lexicon: HALOT
  rationale: La combinación preposición + relativo introduce la continuidad de la lista de destinatarios. En español, 'a los que' conserva esa referencia plural y receptora sin forzar un calco innecesario.
- source_word: בְּ/חֶבְרוֹן
  english_pob_choice: in Hebron
  chosen_spanish: en Hebrón
  alternatives_spanish:
  - en Hebrón
  - en la ciudad de Hebrón
  lexicon: HALOT
  rationale: Es una referencia locativa directa al topónimo. 'En Hebrón' es la forma natural y fiel en español.
- source_word: וּֽ/לְ/כָל הַ/מְּקֹמוֹת
  english_pob_choice: and to all the places
  chosen_spanish: y a todos los lugares
  alternatives_spanish:
  - y a cada lugar
  - y a todos los sitios
  lexicon: HALOT
  rationale: Se conserva el sentido distributivo de 'todos' con un sustantivo plural natural en español. 'Lugares' mantiene el alcance geográfico del hebreo.
- source_word: אֲשֶׁר
  english_pob_choice: where
  chosen_spanish: por donde
  alternatives_spanish:
  - donde
  - en los cuales
  lexicon: HALOT
  rationale: Con un antecedente espacial y el verbo de desplazamiento, 'por donde' comunica mejor el recorrido repetido que un simple 'donde'.
- source_word: הִתְהַלֶּךְ
  english_pob_choice: had gone about
  chosen_spanish: habían andado
  alternatives_spanish:
  - habían ido de un lugar a otro
  - habían recorrido
  lexicon: HALOT
  rationale: El hitpael de הלך expresa movimiento repetido o itinerante. 'Habían andado' preserva ese matiz de desplazamiento habitual sin exagerar con una paráfrasis.
- source_word: דָּוִד ה֥וּא
  english_pob_choice: David and
  chosen_spanish: David
  alternatives_spanish:
  - David mismo
  - David, él
  lexicon: HALOT
  rationale: Siguiendo la revisión inglesa, el pronombre hebreo funciona aquí appositivamente y no exige un refuerzo como 'mismo' en español.
- source_word: וַ/אֲנָשָׁי/ו
  english_pob_choice: and his men
  chosen_spanish: y sus hombres
  alternatives_spanish:
  - y sus guerreros
  - y sus compañeros
  lexicon: HALOT
  rationale: En el contexto narrativo, אֲנָשִׁים se refiere al grupo masculino que acompañaba a David. 'Hombres' es la correspondencia más directa y natural.
translation_notes:
  revision_awareness: La redacción sigue el texto hebreo WLC y la trayectoria auditada del POB inglés. Se conserva la lista de destinatarios, el valor locativo de Hebrón, el matiz itinerante de הִתְהַלֶּךְ y la lectura revisada de דָּוִד הוּא sin añadir énfasis no requerido.
  spanish_consistency_notes:
  - Se usa 'Hebrón' como topónimo estándar en español.
  - Se eligió 'hombres' para אֲנָשָׁיו por coherencia con el registro narrativo militar.
  - La nota textual/lexical [a] está anclada directamente en 'habían andado' para evitar una nota sin marcador en el texto.
