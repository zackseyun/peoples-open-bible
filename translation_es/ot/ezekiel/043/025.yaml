base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/043/025.yaml
  text: For seven days you shall offer a goat as a sin offering each day[a], and they shall offer a bull, a son of the herd, and a ram from the flock[b], without blemish.
  footnotes:
  - marker: a
    text: Hebrew literally, 'a bull, a son of the herd.' This is a standard sacrificial expression; many translations smooth it to 'a young bull' or 'a bull from the herd.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew shifts from singular ('you shall offer') to plural ('they shall offer'). The translation preserves this change rather than smoothing it out.
    reason: alternative_reading
