base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/033/009.yaml
  text: But if you warn a wicked man to turn from his way[a], and he does not turn from his way, he will die in his iniquity[b]; but you will have delivered your soul.
  footnotes:
  - marker: a
    text: Or 'you have saved your soul.' Here 'life' renders Hebrew nephesh in the sense of one's life/self, not necessarily the immaterial soul.
    reason: lexical_alternative
  - marker: b
    text: '''He will die in his iniquity'' may also be understood as ''he will die for his iniquity.'''
    reason: alternative_reading
