translation:
  language: es
  text: ¿Por qué andas de un lado a otro tanto[a], cambiando tu camino? También serás avergonzada por Egipto[b], como fuiste avergonzada por Asiria.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Por qué andas tanto para cambiar tu rumbo?». La expresión hebrea puede subrayar un movimiento inquieto en busca de alianzas cambiantes.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «te avergonzarás de Egipto… como te avergonzaste de Asiria». El verbo puede indicar vergüenza o decepción por la confianza frustrada.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַה
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿Cómo
  lexicon: HALOT
  rationale: La pregunta es retórica y de reprensión; en español, «¿Por qué» comunica mejor el tono evaluativo que un literal «¿Cómo».
- source_word: תֵּזְלִי
  english_pob_choice: do you go about
  chosen_spanish: te andas
  alternatives_spanish:
  - te mueves
  - andas de un lado a otro
  - andas
  lexicon: HALOT
  rationale: La imagen hebrea sugiere movimiento inquieto o errante. «Te andas» conserva esa idea de desplazamiento sin forzar una traducción demasiado explicativa.
- source_word: מְאֹד
  english_pob_choice: so much
  chosen_spanish: tanto
  alternatives_spanish:
  - muchísimo
  - en gran manera
  lexicon: HALOT
  rationale: «Tanto» expresa bien la intensidad del verbo en un español natural y mantiene el énfasis retórico.
- source_word: לְשַׁנּוֹת
  english_pob_choice: changing
  chosen_spanish: cambiando
  alternatives_spanish:
  - para cambiar
  - alterando
  lexicon: HALOT
  rationale: El infinitivo con valor de propósito se vierte de forma natural con gerundio en español, preservando la conexión entre el movimiento y el cambio de rumbo.
- source_word: דַּרְכֵּךְ
  english_pob_choice: your way
  chosen_spanish: tu camino
  alternatives_spanish:
  - tu conducta
  - tu rumbo
  - tu proceder
  lexicon: HALOT
  rationale: '«Camino» mantiene la amplitud semántica de דרך: conducta, curso o política. En este contexto no se reduce solo a lo moral o solo a lo diplomático.'
- source_word: גַּם
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - además
  - incluso
  lexicon: HALOT
  rationale: 'Marca adición y paralelismo: Egipto, además de Asiria, será fuente de vergüenza.'
- source_word: מִמִּצְרַיִם
  english_pob_choice: by Egypt
  chosen_spanish: por Egipto
  alternatives_spanish:
  - de Egipto
  - a causa de Egipto
  lexicon: HALOT
  rationale: Con בושׁ, la preposición señala la fuente u ocasión de la vergüenza. «Por Egipto» suena natural en español y conserva ese valor causal/agentivo.
- source_word: תֵּבֹשִׁי
  english_pob_choice: you will be put to shame
  chosen_spanish: serás avergonzada
  alternatives_spanish:
  - te avergonzarás
  - quedarás avergonzada
  - serás puesta en vergüenza
  lexicon: HALOT
  rationale: El verbo puede expresar vergüenza o decepción por fracaso. Aquí se traduce con pasiva/resultativa para reflejar la humillación que sobreviene por la confianza mal puesta.
- source_word: כַּאֲשֶׁר
  english_pob_choice: as
  chosen_spanish: como
  alternatives_spanish:
  - tal como
  - así como
  lexicon: HALOT
  rationale: Introduce la comparación con la experiencia anterior con Asiria. «Como» es breve y fiel.
- source_word: בֹּשְׁתְּ
  english_pob_choice: you were put to shame
  chosen_spanish: te avergonzaste
  alternatives_spanish:
  - fuiste avergonzada
  - quedaste avergonzada
  lexicon: HALOT
  rationale: Mantiene la correspondencia verbal con el presente profético y conserva la relación con el estado previo de vergüenza por Asiria. Aunque puede leerse también como pasivo/resultativo, el español aquí admite la forma media sin perder el sentido.
- source_word: מֵאַשּׁוּר
  english_pob_choice: by Assyria
  chosen_spanish: de Asiria
  alternatives_spanish:
  - por Asiria
  - a causa de Asiria
  lexicon: HALOT
  rationale: Se conserva el paralelismo con «por Egipto» y la referencia histórica a la fuente de la vergüenza ligada a la alianza fallida.
theological_decisions:
- issue: Alcance de «tu camino / tu way»
  english_pob_reading: Rendered broadly as 'your way' without specifying only political alliance or only moral conduct.
  chosen_spanish_reading: '«Tu camino» queda igualmente amplio: puede abarcar rumbo político, conducta y orientación general.'
  alternative_spanish_readings:
  - tu conducta
  - tu rumbo político
  - tu proceder
  rationale: El hebreo דרך en Jeremías 2 puede incluir tanto política exterior como conducta moral. La traducción evita estrechar el sentido y preserva la tensión profética.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica en vez de resolverla.'
translation_notes:
  revision_awareness: Coincide con la lectura auditada en inglés y no requiere revisión adicional; se mantiene la imagen de movimiento inquieto y la vergüenza resultante de confiar en poderes extranjeros.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» en otros contextos del proyecto, pero este versículo no contiene el nombre divino.
  - «Camino» conserva la amplitud de דרך sin precisar indebidamente solo política o moral.
  - «Avergonzada» refleja el pasivo/resultativo de בושׁ y mantiene el paralelismo entre Egipto y Asiria.
  - El orden sintáctico español sigue de cerca el hebreo sin sonar artificial.
