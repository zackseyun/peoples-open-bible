  source_alignment_summary: 'El borrador conserva bien la estructura y el sentido general del griego: apelación directa a Dios, causa por los pecados, opresión, sujeción a enemigos y estado de debilidad. Sin embargo, hay dos problemas concretos: el marcador [b] está mal anclado en «enemigos» aunque la nota trata de «debilidad/debilidades», y «quedamos en debilidad» suena menos natural y menos claramente resultativo que el griego παρείμεθα ἐν ἀδυναμίαις.'
  spanish_quality_summary: El español es mayormente claro y digno, pero «Pero [a] mira ahora» con el marcador interrumpiendo la frase y «quedamos en debilidad» resultan algo torpes. «He aquí» como alternativa está bien en nota; en el texto principal «mira ahora» es aceptable. Conviene mover la nota [b] al segmento final y mejorar la frase final para mayor naturalidad.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Santo Rey», «pecados», «somos oprimidos» y «hemos sido sometidos» están alineados con el griego y con el rastro de auditoría inglés. La decisión sobre ἀδυναμίαις como singular colectivo en español también es defendible, siempre que la nota se ancle correctamente.
  issues:
  - severity: medium
    issue: Marcador de nota [b] mal ubicado
    rationale: La nota [b] explica el plural griego de ἐν ἀδυναμίαις, pero en el borrador está anclada en «enemigos». Esto rompe la correspondencia exigida entre texto y nota.
  - severity: medium
    issue: «quedamos en debilidad» suena poco idiomático
    rationale: Aunque intenta reflejar παρείμεθα, en español bíblico legible suena rígido y algo ambiguo. «quedamos en un estado de debilidad» sería explicativo de más; «hemos quedado en debilidad» mejora el valor resultativo, pero aún suena pesado. «quedamos en debilidad[b]» es comprensible, aunque una leve mejora en fluidez es preferible.
  - severity: low
    issue: Ubicación del marcador [a] tras «Pero»
    rationale: No es incorrecto, pero visual y sintácticamente es más limpio anclar la nota en «mira ahora[a]», que es la expresión comentada por la nota.
  revised_spanish_text: Pero mira ahora[a], santo Rey, por causa de nuestros muchos y grandes pecados somos oprimidos, y hemos sido sometidos a nuestros enemigos, y hemos quedado en debilidad[b].
