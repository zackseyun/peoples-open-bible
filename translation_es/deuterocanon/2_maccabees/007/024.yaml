translation:
  language: es
  text: Pero Antíoco[a], pensando que era despreciado y advirtiendo la voz de reproche, mientras el menor aún vivía, no solo lo exhortaba con palabras, sino que también le aseguraba con juramentos que lo haría rico y lo haría dichoso[b], si se apartaba de las tradiciones de sus padres, y que lo tendría como amigo[c] y le confiaría cargos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'la voz insultante' o 'el discurso de reproche'; el griego dice literalmente 'la voz que reprocha'.
    reason: lexical_alternative
  - marker: b
    text: O 'lo haría feliz' o 'lo haría bienaventurado'; μακαριστόν aquí expresa dicha o estado favorecido, no necesariamente bendición religiosa.
    reason: lexical_alternative
  - marker: c
    text: '''Amigo'' también puede tener sentido de título cortesano: un asociado real o funcionario favorecido.'
    reason: cultural_note
lexical_decisions:
- source_word: οἰόμενος
  english_pob_choice: thinking
  chosen_spanish: pensando
  alternatives_spanish:
  - suponiendo
  - imaginando
  lexicon: LSJ
  rationale: Conserva la percepción subjetiva de Antíoco sin endurecer el matiz más allá del griego.
- source_word: καταφρονεῖσθαι
  english_pob_choice: being despised
  chosen_spanish: era despreciado
  alternatives_spanish:
  - era tratado con desprecio
  - era menospreciado
  lexicon: LSJ
  rationale: Mantiene la idea de desprecio en un giro natural para el español, acorde al contexto de honor y afrenta.
- source_word: τὴν ὀνειδίζουσαν ὑφορώμενος φωνήν
  english_pob_choice: the reproachful tone
  chosen_spanish: la voz de reproche
  alternatives_spanish:
  - la voz insultante
  - el discurso de reprensión
  lexicon: LSJ
  rationale: El griego dice literalmente 'la voz que reprocha'; 'voz de reproche' preserva el vínculo con 'φωνή' sin sonar forzado.
- source_word: ὑφορώμενος
  english_pob_choice: taking note of
  chosen_spanish: advirtiendo
  alternatives_spanish:
  - notando
  - percibiendo
  lexicon: LSJ
  rationale: En contexto expresa captar o advertir la actitud ofensiva; 'advirtiendo' es idiomático y mantiene la atención reaccionaria de Antíoco.
- source_word: ἔτι τοῦ νεωτέρου περιόντος
  english_pob_choice: while the youngest was still alive
  chosen_spanish: mientras el menor aún vivía
  alternatives_spanish:
  - mientras el más joven aún sobrevivía
  - mientras el joven todavía permanecía
  lexicon: LSJ
  rationale: La circunstancia temporal se expresa con naturalidad y sin perder el sentido de supervivencia en el relato martirial.
- source_word: τὴν παράκλησιν
  english_pob_choice: urged him
  chosen_spanish: lo exhortaba
  alternatives_spanish:
  - lo urgía
  - le hacía súplicas
  lexicon: LSJ
  rationale: '''Exhortaba'' comunica la insistencia persuasiva del verbo idiomático griego, sin debilitar la fuerza de la escena.'
- source_word: διʼ ὅρκων ἐπίστου
  english_pob_choice: assured him with oaths
  chosen_spanish: le aseguraba con juramentos
  alternatives_spanish:
  - le prometía bajo juramento
  - le garantizaba con juramentos
  lexicon: LSJ
  rationale: '''Juramentos'' reproduce el medio solemne de la promesa y conserva el valor verbal de la garantía.'
- source_word: πλουτιεῖν
  english_pob_choice: make him rich
  chosen_spanish: lo haría rico
  alternatives_spanish:
  - lo enriquecería
  lexicon: LSJ
  rationale: Refleja la promesa material de forma directa y clara.
- source_word: μακαριστὸν ποιήσειν
  english_pob_choice: make him blessed
  chosen_spanish: lo haría bienaventurado
  alternatives_spanish:
  - lo haría feliz
  - lo haría dichoso
  - lo haría bendito
  lexicon: LSJ
  rationale: Sigue la revisión más cercana al sentido léxico de μακαριστός en un registro elevado; 'bienaventurado' conserva dignidad sin forzar una lectura devocional.
- source_word: μεταθέμενον ἀπὸ τῶν πατρίων
  english_pob_choice: if he turned away from the traditions of his fathers
  chosen_spanish: si se apartaba de las tradiciones de sus padres
  alternatives_spanish:
  - si abandonaba las costumbres de sus padres
  - si cambiaba de las costumbres ancestrales
  lexicon: LSJ
  rationale: Preserva el matiz de apostasía o abandono de herencia ancestral con un español transparente.
- source_word: φίλον ἕξειν
  english_pob_choice: have him as a friend
  chosen_spanish: lo tendría como amigo
  alternatives_spanish:
  - lo contaría entre sus amigos
  - lo haría su amigo
  lexicon: LSJ
  rationale: Mantiene la literalidad básica y deja abierta la posible resonancia cortesana del término.
- source_word: χρείας ἐμπιστεύσειν
  english_pob_choice: entrust him with offices
  chosen_spanish: le confiaría cargos
  alternatives_spanish:
  - le confiaría responsabilidades
  - le encomendaría puestos
  lexicon: LSJ
  rationale: '''Cargos'' comunica funciones o puestos de autoridad de modo sobrio y más natural que una traducción demasiado abstracta.'
theological_decisions:
- issue: πατρίων en contexto de presión para abandonar la fidelidad ancestral
  english_pob_reading: the traditions of his fathers
  chosen_spanish_reading: las tradiciones de sus padres
  alternative_spanish_readings:
  - las costumbres de sus padres
  - la herencia de sus padres
  rationale: Se conserva la dimensión heredada y religiosa del término sin sobreexplicar el alcance exacto; en español 'tradiciones' transmite bien el campo semántico del texto y su carga identitaria.
  doctrine_reference: Translation philosophy §§1, 5
- issue: μακαριστόν en una promesa cortesana y secular
  english_pob_reading: make him blessed
  chosen_spanish_reading: lo haría bienaventurado
  alternative_spanish_readings:
  - lo haría bendito
  - lo haría dichoso
  - lo haría feliz
  rationale: Se sigue la revisión más literal respecto del adjetivo sin introducir un tono doctrinal ajeno; 'bienaventurado' en español puede expresar el estado prometido sin convertirlo en una bendición litúrgica.
  doctrine_reference: Translation philosophy §§1, 6
- issue: φίλον ἕξειν como posible título cortesano
  english_pob_reading: have him as a friend
  chosen_spanish_reading: lo tendría como amigo
  alternative_spanish_readings:
  - lo contaría entre sus amigos
  - lo tendría como aliado
  rationale: Se conserva la forma literal en el texto principal; el posible matiz de 'amigo del rey' queda disponible por el contexto sin imponerlo en la lectura principal.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: Tomé en cuenta la revisión final del audit trail que prefirió 'blessed' sobre 'enviable' para μακαριστόν. Por eso evité 'envidiable' y elegí 'bienaventurado', manteniendo un registro alto y una equivalencia más cercana al valor léxico documentado. También preservé la promesa cortesana de 'amigo' y 'cargos' sin añadir explicaciones al cuerpo del verso.
  spanish_consistency_notes:
  - Usé 'Antíoco' como forma española estable del nombre propio.
  - Mantuve 'tradiciones de sus padres' para reflejar el peso ancestral y religioso de πατρίων.
  - 'Preferí vocabulario sobrio y bíblico pero natural: ''exhortaba'', ''aseguraba'', ''cargos''.'
  - Las notas al pie están ancladas exactamente en el texto para evitar marcadores huérfanos.
