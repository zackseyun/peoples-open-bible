translation:
  language: es
  text: Yahvé ha jurado por su mano derecha y por su brazo fuerte:[b] No volveré a dar tu grano como alimento para tus enemigos,[a] ni beberán los extranjeros tu vino nuevo,[c] por el que te esforzaste.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «si doy tu grano ... y si los hijos de tierra extranjera beben tu vino nuevo ...»; en esta fórmula de juramento, «si» expresa una negación enfática: «ciertamente no».'
    reason: lexical_alternative
  - marker: b
    text: 'También puede traducirse: «brazo poderoso».'
    reason: lexical_alternative
  - marker: c
    text: Hebreo «hijos de tierra extranjera», es decir, extranjeros.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: DOCTRINE.md contested terms / Tetragrammaton
  rationale: 'Se sigue el criterio del proyecto para el nombre divino: mantener el nombre propio del pacto en lugar de ocultarlo con un título. En español, "Yahvé" es la forma estable y reverente que corresponde a "Yahweh" en el POB inglés.'
- source_word: נִשְׁבַּע
  english_pob_choice: has sworn
  chosen_spanish: ha jurado
  alternatives_spanish:
  - juró
  - ha hecho juramento
  lexicon: HALOT
  rationale: El perfecto niphal expresa un juramento ya realizado; "ha jurado" conserva el tiempo completivo y suena natural en español bíblico contemporáneo.
- source_word: בִּימִינוֹ
  english_pob_choice: by his right hand
  chosen_spanish: por su mano derecha
  alternatives_spanish:
  - con su mano derecha
  - por su diestra
  lexicon: HALOT
  rationale: La fórmula juramentaria se expresa de manera directa en español con "por su mano derecha"; "diestra" sería posible, pero menos transparente para un lector amplio.
- source_word: וּבִזְרֹעַ עֻזּוֹ
  english_pob_choice: and by his strong arm
  chosen_spanish: y por su brazo fuerte
  alternatives_spanish:
  - y por su brazo poderoso
  - y por el brazo de su fuerza
  lexicon: HALOT
  rationale: '"Brazo fuerte" comunica bien el valor de עֹז como fuerza/energía. Se evita una paráfrasis más libre y se conserva el paralelismo con "mano derecha".'
- source_word: אִם אֶתֵּן
  english_pob_choice: I will never again give
  chosen_spanish: No volveré a dar
  alternatives_spanish:
  - Ciertamente no daré otra vez
  - Si doy
  lexicon: HALOT
  rationale: Se explicita en español la negación idiomática del juramento, como hace el POB inglés. "No volveré a dar" integra bien עוֹד y evita una traducción literal engañosa del condicional.
- source_word: דְּגָנֵךְ
  english_pob_choice: your grain
  chosen_spanish: tu grano
  alternatives_spanish:
  - tu cereal
  - tu trigo
  lexicon: HALOT
  rationale: '"Grano" es la equivalencia moderna más amplia y fiel al hebreo. Se evita restringirlo a una especie concreta como "trigo".'
- source_word: עוֹד
  english_pob_choice: again
  chosen_spanish: volveré a
  alternatives_spanish:
  - todavía
  - aún
  lexicon: HALOT
  rationale: En este contexto, עוֹד refuerza la idea de repetición que cesa; por eso se integra en "volveré a" / "no volveré a" en lugar de traducirse aislado.
- source_word: מַאֲכָל
  english_pob_choice: as food
  chosen_spanish: como alimento
  alternatives_spanish:
  - como comida
  - para alimento
  lexicon: HALOT
  rationale: '"Alimento" preserva el valor nominal de מַאֲכָל de manera sobria y digna. "Comida" sería más coloquial.'
- source_word: לְאֹיְבַיִךְ
  english_pob_choice: for your enemies
  chosen_spanish: para tus enemigos
  alternatives_spanish:
  - a tus enemigos
  - en favor de tus enemigos
  lexicon: HALOT
  rationale: Con נתן + ל, la relación de destino/beneficio se comunica naturalmente con "para" en español, como en el audit trail inglés.
- source_word: וְאִם יִשְׁתּוּ
  english_pob_choice: nor will ... drink
  chosen_spanish: ni beberán
  alternatives_spanish:
  - ni beberán jamás
  - y no beberán
  lexicon: HALOT
  rationale: La segunda cláusula mantiene la fuerza negativa del juramento; "ni beberán" reproduce bien la continuidad con la primera negación sin sonar forzado.
- source_word: בְנֵי נֵכָר
  english_pob_choice: foreigners
  chosen_spanish: los extranjeros
  alternatives_spanish:
  - los de tierra extraña
  - los hijos de extranjeros
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente "hijos de extranjería", el sentido colectivo es el de personas extranjeras. "Extranjeros" comunica claramente ese valor sin perder la referencia a בני נכר.
- source_word: תִּירוֹשֵׁךְ
  english_pob_choice: your new wine
  chosen_spanish: tu mosto
  alternatives_spanish:
  - tu vino nuevo
  - tu vino fresco
  lexicon: HALOT
  rationale: תִּירוֹשׁ denota vino nuevo o mosto, no vino maduro en general. Se eligió "mosto" por su precisión semántica; "vino nuevo" sería una alternativa más explicativa.
- source_word: אֲשֶׁר יָגַעַתְּ בּוֹ
  english_pob_choice: for which you have labored
  chosen_spanish: por el cual trabajaste
  alternatives_spanish:
  - en el cual trabajaste
  - por el que te afanaste
  lexicon: HALOT
  rationale: יָגַע con בּוֹ indica esfuerzo aplicado a algo. "Por el cual trabajaste" conserva la relación causal/de esfuerzo y suena natural en español.
theological_decisions:
- issue: Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se mantiene el nombre propio del pacto conforme al estándar del proyecto, evitando la sustitución por un título que oscurecería la evidencia hebrea.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Forma juramentaria con אִם en contexto de juramento
  english_pob_reading: I will never again give... nor will foreigners drink...
  chosen_spanish_reading: No volveré a dar... ni beberán...
  alternative_spanish_readings:
  - Si doy... y si beben...
  - Ciertamente no daré...
  rationale: El hebreo usa un condicional de juramento con fuerza de negación enfática. En español se explicita la negación para preservar el sentido real del juramento y evitar una lectura condicional literal.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence; preserve source sense over translation inertia'
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el audit trail inglés: el nombre divino se conserva como Yahvé; la negación implícita del juramento se hace explícita en español; y la cláusula final se une a «por el cual trabajaste» sin coma, siguiendo la revisión más reciente.'
  spanish_consistency_notes:
  - Se mantuvo el paralelismo de dos miembros con «por su mano derecha y por su brazo fuerte».
  - Se evitó traducir mecánicamente el condicional hebreo, pero se preservó su fuerza juramentaria.
  - Se conservó un registro bíblico moderno y claro, apto para publicación eclesial amplia.
  - Se usó «mosto» por precisión lexical; si el proyecto prefiere uniformidad con el inglés «new wine», puede reemplazarse por «vino nuevo» sin alterar el sentido central.
