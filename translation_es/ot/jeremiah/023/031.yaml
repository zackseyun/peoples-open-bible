  glossary_alignment: 'Buena alineación con la terminología del proyecto: יְהוָה -> ''Yahvé'' correctamente; ''los profetas'' preserva la literalidad sin importar ''falsos''; la fórmula נְאֻם יְהוָה queda como ''declara Yahvé''. No hay conflictos doctrinales. La revisión propuesta afina la correspondencia léxica entre וַיִּנְאֲמוּ y נְאֻם mediante ''declaran''/''Declara Yahvé''.'
