id: JHN.17.12
reference: John 17:12
source:
  edition: SBLGNT
  text: ὅτε ἤμην μετ’ ⸀αὐτῶν ἐγὼ ἐτήρουν αὐτοὺς ἐν τῷ ὀνόματί σου ⸀ᾧ δέδωκάς μοι, ⸀καὶ ἐφύλαξα, καὶ οὐδεὶς ἐξ αὐτῶν ἀπώλετο εἰ μὴ ὁ υἱὸς τῆς ἀπωλείας, ἵνα ἡ γραφὴ πληρωθῇ.
translation:
  text: While I was with them[a], I kept them in your name, which you have given me, and I guarded them, and not one of them perished except the son of destruction[b], so that the Scripture might be fulfilled.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'none of them was lost.'
    reason: lexical_alternative
  - marker: b
    text: '''The son of destruction'' is a Hebrew-style expression; alternatively, ''the one destined for destruction'' or traditionally ''the son of perdition.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅτε
  chosen: While
  alternatives:
  - When
  lexicon: BDAG
  rationale: Introduces a temporal clause. 'While' fits the imperfect aspect of ἤμην and ἐτήρουν, conveying ongoing action during Jesus' presence with the disciples.
- source_word: ἤμην μετ’ αὐτῶν
  chosen: I was with them
  alternatives:
  - I was among them
  lexicon: BDAG
  rationale: Straightforward temporal-state expression; 'with them' is the most natural and direct rendering of μετά with the genitive here.
- source_word: ἐγὼ
  chosen: I
  lexicon: BDAG
  rationale: The explicit pronoun adds emphasis in Greek, but English can carry the sense without typographical emphasis. Retained simply as 'I' in natural English.
- source_word: ἐτήρουν
  chosen: was keeping
  alternatives:
  - kept
  - was watching over
  lexicon: BDAG
  rationale: Imperfect tense suggests ongoing action. 'Was keeping' preserves the progressive sense better than simple past 'kept.'
- source_word: ἐν τῷ ὀνόματί σου
  chosen: in your name
  alternatives:
  - by your name
  - in the power of your name
  lexicon: BDAG
  rationale: A literal rendering preserves the theological richness of 'name' as representing God's revealed character and authority without over-interpreting it.
- source_word: ᾧ δέδωκάς μοι
  chosen: which you have given to me
  alternatives:
  - that you have given me
  - whom you have given me
  lexicon: BDAG
  rationale: 'The relative pronoun is neuter singular, agreeing most naturally with ''name,'' not with the disciples. Therefore the clause modifies ''name'': ''which you have given to me.'' ''To me'' is slightly more explicit than ''me'' and reflects μοι.'
- source_word: καὶ ἐφύλαξα
  chosen: and I guarded them
  alternatives:
  - and I protected them
  - and I kept them
  lexicon: BDAG
  rationale: φυλάσσω overlaps with τηρέω but carries a stronger sense of guarding/protecting. Rendering it distinctly as 'guarded' preserves the verbal variation in the Greek.
- source_word: οὐδεὶς ἐξ αὐτῶν ἀπώλετο
  chosen: not one of them perished
  alternatives:
  - none of them was lost
  - not one of them was destroyed
  lexicon: BDAG
  rationale: ἀπόλλυμι in the middle/intransitive here can mean 'perish' or 'be lost.' 'Perished' avoids flattening the term into mere misplacement while fitting the solemn context. The common alternative 'was lost' is preserved in a footnote because of its strong Johannine resonance.
- source_word: εἰ μὴ
  chosen: except
  alternatives:
  - except for
  lexicon: BDAG
  rationale: Standard exceptive construction.
- source_word: ὁ υἱὸς τῆς ἀπωλείας
  chosen: the son of destruction
  alternatives:
  - the son of perdition
  - the one destined for destruction
  lexicon: BDAG
  rationale: A semitic-style genitive expression. 'Son of destruction' is more transparent in modern English than 'son of perdition' while remaining formally close to the Greek. The idiomatic interpretive alternative is preserved in a footnote.
- source_word: ἵνα ἡ γραφὴ πληρωθῇ
  chosen: so that the Scripture might be fulfilled
  alternatives:
  - in order that the Scripture might be fulfilled
  - so that Scripture might be fulfilled
  lexicon: BDAG
  rationale: Retains the purpose/result nuance of ἵνα with the aorist passive subjunctive. The article with γραφή supports 'the Scripture,' likely referring to a specific scriptural witness or Scripture as a recognized authority.
