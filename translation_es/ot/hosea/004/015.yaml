  glossary_alignment: 'Se respeta bien la terminología del proyecto: יְהוָה → «Yahvé»; se preserva la metáfora sexual; «Bet-aven» mantiene el topónimo polémico. No hay conflicto doctrinal. La única corrección necesaria es mover la nota al topónimo y pulir la sintaxis verbal para concordar con «Judá».'
