id: 1TI.1.1
reference: 1 Timothy 1:1
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Παῦλος ἀπόστολος ⸂Χριστοῦ Ἰησοῦ⸃ κατ’ ἐπιταγὴν θεοῦ σωτῆρος ἡμῶν καὶ ⸂Χριστοῦ Ἰησοῦ⸃ τῆς ἐλπίδος ἡμῶν
base_translation:
  language: en
  yaml_path: translation/nt/1_timothy/001/001.yaml
  text: 'Paul[a], an apostle of Messiah Jesus by the command of God our Savior and Messiah Jesus our hope[b],'
  footnotes:
  - marker: a
    text: Or 'Christ Jesus' in both occurrences of 'Messiah Jesus.' The Greek title Χριστός can function either as the translated title 'Messiah' or, in some contexts, as the more name-like 'Christ.'
    reason: alternative_reading
  - marker: b
    text: Or 'God our Savior and of Messiah Jesus our hope'.
    reason: previous_rendering
translation:
  language: ko
  text: 우리 구주 하나님과 우리 소망이신 메시아[a] 예수의 명령을 따라 메시아 예수의 사도가 된 바울은,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「그리스도」. 헬라어 칭호 Χριστός는 본 번역에서 칭호의 무게를 살리기 위해 「메시아」로 옮긴다.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπόστολος
  english_pob_choice: apostle
  chosen_korean: 사도
  alternatives_korean:
  - 보냄받은 자
  - 사자
  lexicon: BDAG
  rationale: 바울의 자기 정체 진술에서 정립된 직무·직함이며, 한국 교회에서 「사도」가 가장 분명한 등가어이다.
- source_word: Χριστοῦ Ἰησοῦ
  english_pob_choice: Messiah Jesus
  chosen_korean: 메시아 예수
  alternatives_korean:
  - 그리스도 예수
  lexicon: BDAG
  rationale: 본 인사문의 두 차례 출현 모두 칭호로 기능하므로 「메시아」로 옮긴다. 한국 전통의 음역 「그리스도」는 칭호성을 가린다.
- source_word: κατ’ ἐπιταγήν
  english_pob_choice: by the command
  chosen_korean: 명령을 따라
  alternatives_korean:
  - 명에 따라
  - 분부대로
  lexicon: BDAG
  rationale: κατά + 대격으로 권위적 분부에 근거함을 표현한다. 한국어 「명령을 따라」가 권위·근거의 두 가지 어감을 함께 살린다.
- source_word: θεοῦ σωτῆρος ἡμῶν
  english_pob_choice: of God our Savior
  chosen_korean: 우리 구주 하나님
  alternatives_korean:
  - 우리의 구주이신 하나님
  lexicon: BDAG
  rationale: 동격 속격을 자연스러운 한국어 어순으로 옮기되 「구주」를 하나님께 적용한 칭호로 명시한다.
- source_word: ἐλπίδος ἡμῶν
  english_pob_choice: our hope
  chosen_korean: 우리 소망
  alternatives_korean:
  - 우리의 소망
  - 우리의 희망
  lexicon: BDAG
  rationale: 「소망」은 바울 신학에서 종말론적 확신을 담는 굳은 어휘이다. 「희망」은 일반어로 신학적 무게가 약하다.
theological_decisions:
- issue: Χριστός를 칭호로 번역
  chosen_reading: 메시아
  alternative_readings:
  - 그리스도
  rationale: DOCTRINE.md는 칭호로 기능하는 Χριστός를 칭호로 번역하라고 지시한다. 본 인사문에서도 두 차례 모두 칭호의 무게가 살아 있어 「메시아」로 옮긴다.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested terms table for Χριστός'
