translation:
  language: es
  text: Porque tu siervo solo cruzaría el Jordán un poco de camino con el rey; ¿por qué habría de recompensarme el rey con esta recompensa[a]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «retribuirme con esta retribución». El hebreo usa un verbo y un sustantivo cognados de la misma raíz (גמל), destacando la idea de pago o retribución.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּמְעַט
  english_pob_choice: would only ... a little way
  chosen_spanish: apenas
  alternatives_spanish:
  - solo un poco
  - por poco
  lexicon: HALOT
  rationale: El hebreo expresa una limitación breve del trayecto; en español, «apenas» comunica con naturalidad que la acción sería muy corta, conservando el matiz de restricción causal sin volverlo más explicativo de lo necesario.
- source_word: יַעֲבֹר
  english_pob_choice: would ... cross/go across
  chosen_spanish: cruzaría
  alternatives_spanish:
  - pasaría
  - cruzaría de un lado a otro
  lexicon: HALOT
  rationale: El verbo en imperfecto, dentro de este discurso, expresa una acción hipotética o voluntaria, no simple futuro. «Cruzaría» mantiene esa modalidad y refleja bien el movimiento sobre el Jordán.
- source_word: עַבְדְּךָ
  english_pob_choice: your servant
  chosen_spanish: tu siervo
  alternatives_spanish:
  - tu servidor
  - tu esclavo
  lexicon: HALOT
  rationale: En el registro cortesano, la fórmula de auto-humillación se expresa de modo natural en español como «tu siervo». Aunque el trasfondo puede ser de subordinación fuerte, aquí la función pragmática es honorífica y no requiere «esclavo».
- source_word: אֶת הַיַּרְדֵּן
  english_pob_choice: across the Jordan
  chosen_spanish: el Jordán
  alternatives_spanish:
  - el río Jordán
  - el Jordán de un lado al otro
  lexicon: HALOT
  rationale: Con «cruzaría» y el nombre del río, el sentido de atravesarlo queda claro sin añadir una preposición que suene forzada. El español bíblico admite este uso conciso cuando el contexto ya implica el cruce.
- source_word: וְלָמָּה
  english_pob_choice: why should
  chosen_spanish: ¿por qué habría de... ?
  alternatives_spanish:
  - ¿por qué debería... ?
  - ¿y por qué... ?
  lexicon: HALOT
  rationale: La pregunta es retórica y expresa rechazo respetuoso de la recompensa. «¿Por qué habría de... ?» conserva ese tono más que una mera pregunta informativa.
- source_word: יִגְמְלֵנִי
  english_pob_choice: repay me
  chosen_spanish: recompensarme
  alternatives_spanish:
  - pagarme
  - darme recompensa
  lexicon: HALOT
  rationale: El verbo גמל admite la idea de retribuir o recompensar. En español, «recompensarme» enlaza bien con el sustantivo cognado que sigue y mantiene la relación léxica sin sonar redundante.
- source_word: הַגְּמוּלָה הַזֹּאת
  english_pob_choice: this reward
  chosen_spanish: esta recompensa
  alternatives_spanish:
  - este pago
  - esta retribución
  lexicon: HALOT
  rationale: El sustantivo designa la retribución o recompensa resultante del acto. «Esta recompensa» es claro y fiel, y preserva la tensión del par verbal-sustantivo del hebreo.
theological_decisions:
- issue: Relación léxica בין גמל וגמולה
  english_pob_reading: The Hebrew uses a verb and cognate noun from the same root, emphasizing repayment or recompense.
  chosen_spanish_reading: Se mantiene la cercanía entre «recompensarme» y «recompensa» para conservar el énfasis de retribución del hebreo.
  alternative_spanish_readings:
  - «pagarme con este pago»
  - «darme esta retribución»
  rationale: La estructura hebrea subraya la idea de retribución mediante raíz cognada. En español, repetir exactamente la misma familia puede sonar menos natural, pero conservar dos formas semánticamente próximas preserva la observación textual sin oscurecerla.
  doctrine_reference: Principio de equivalencia semántica y respeto por la figura etimológica del texto fuente
translation_notes:
  revision_awareness: 'El borrador sigue la revisión inglesa más reciente al reflejar el orden más cercano al hebreo: el cruce del Jordán se expresa de manera directa y breve, y la pregunta final conserva la fuerza retórica de rechazo a la recompensa. No se adopta una paráfrasis expansiva; se mantiene la relación cognada entre verbo y sustantivo indicada en el audit trail.'
  spanish_consistency_notes:
  - Se usa «Jordán» sin artículo añadido, conforme al uso bíblico natural en español.
  - Se prefiere «tu siervo» por registro cortesano y por consistencia con el valor de עבד en fórmulas de deferencia.
  - Se conserva «recompensarme / recompensa» para reflejar el vínculo léxico de גמל, siguiendo el comentario del texto fuente.
