  glossary_alignment: No hay conflictos con la terminología base del proyecto. Las decisiones 'dinero', 'región' y 'se retiraron' están bien alineadas con la evidencia y la auditoría inglesa. La única mejora léxica recomendada es mover συγκλειόμενοι de 'siendo acorralados' a 'viéndose constreñidos' o equivalente, para preservar mejor la ambigüedad causal documentada.
