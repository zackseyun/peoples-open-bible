  spanish_quality_summary: 'El texto principal es natural y legible en español amplio: ''Soy intachable; no me conozco; desprecio mi vida.'' No obstante, la nota necesita corrección idiomática y de ubicación. ''mi alma/yo'' suena poco natural; ''mi alma/mi ser'' o ''mi alma/yo mismo'' funciona mejor. También conviene mover la marca al segmento relevante para evitar confusión exegética.'
