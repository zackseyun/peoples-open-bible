translation:
  language: es
  text: Como el sol que sale en las alturas de Yahvé[a], así es la belleza de una buena esposa en el adorno[b] de la casa de él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en las alturas del Señor». El griego tiene Κυρίου; se traduce aquí con «Yahvé» por la convención del proyecto para el nombre divino.
    reason: source_note
  - marker: b
    text: O «en el arreglo ordenado de la casa de él». El griego κόσμῳ puede referirse tanto al adorno como al arreglo ordenado; en este contexto se ha preferido «adorno».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἥλιος ἀνατέλλων
  english_pob_choice: the sun rising
  chosen_spanish: el sol que sale
  alternatives_spanish:
  - el sol naciente
  - el sol saliendo
  lexicon: LSJ
  rationale: La imagen participial se vierte de forma natural en español como una cláusula relativa. «Que sale» conserva el movimiento de la comparación sin sonar artificial.
- source_word: ἐν ὑψίστοις Κυρίου
  english_pob_choice: in the heights of the Lord
  chosen_spanish: en las alturas de Yahvé
  alternatives_spanish:
  - en las alturas del Señor
  - en los lugares más altos de Yahvé
  lexicon: LSJ
  rationale: Se mantiene el plural de ὑψίστοις con «las alturas». Se usa «Yahvé» conforme al criterio del proyecto para el nombre divino, en lugar de enmascararlo con «Señor».
- source_word: κάλλος
  english_pob_choice: beauty
  chosen_spanish: la belleza
  alternatives_spanish:
  - el esplendor
  - la hermosura
  lexicon: LSJ
  rationale: «Belleza» es el equivalente léxico directo y adecuado para el paralelo proverbial.
- source_word: ἀγαθῆς γυναικός
  english_pob_choice: of a good wife
  chosen_spanish: de una buena esposa
  alternatives_spanish:
  - de una buena mujer
  lexicon: LSJ
  rationale: Aunque γυνή puede significar «mujer» o «esposa», el contexto doméstico favorece «esposa». «Buena» conserva ἀγαθῆς sin ampliar innecesariamente el matiz moral.
- source_word: ἐν κόσμῳ
  english_pob_choice: in the adornment
  chosen_spanish: en el adorno
  alternatives_spanish:
  - en el ornato
  - en el orden
  lexicon: LSJ
  rationale: κόσμος puede significar orden, arreglo u ornamento. Aquí el contexto del hogar y la revisión del texto inglés favorecen «adorno/ornato»; «adornó» no se usa por ser demasiado verbal, y «orden» reduciría indebidamente el matiz estético.
- source_word: οἰκίας αὐτοῦ
  english_pob_choice: of his house
  chosen_spanish: de su casa
  alternatives_spanish:
  - de la casa de él
  - del hogar
  lexicon: LSJ
  rationale: Se conserva el posesivo masculino implícito en αὐτοῦ con «su casa». «Casa» es una traducción directa y idiomática; «hogar» sería más interpretativo.
theological_decisions:
- issue: Nombre divino en un contexto sapiencial con genitivo Κυρίου
  english_pob_reading: heights of the Lord
  chosen_spanish_reading: las alturas de Yahvé
  alternative_spanish_readings:
  - las alturas del Señor
  - las alturas del cielo
  rationale: El texto griego atribuye las alturas a Κυρίου; en el proyecto se prefiere «Yahvé» para el nombre divino. «Del cielo» suavizaría el vínculo explícito con el genitivo del original.
  doctrine_reference: DOCTRINE.md §Nombre divino y transparencia textual
- issue: γυνή en marco doméstico
  english_pob_reading: good wife
  chosen_spanish_reading: buena esposa
  alternative_spanish_readings:
  - buena mujer
  - buena señora
  rationale: La secuencia con «su casa» apoya una lectura matrimonial y doméstica. «Esposa» preserva esa relación sin neutralizar el género. «Mujer» ampliaría el referente y perdería precisión contextual.
  doctrine_reference: DOCTRINE.md §Precisión semántica y género gramatical
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés POB, que corrigió 'ordering' a 'adornment' para reflejar mejor κόσμῳ. La versión española adopta ese ajuste con «adorno», manteniendo la estructura comparativa y el registro sapiencial.
  spanish_consistency_notes:
  - Se preserva la metáfora comparativa «Como ... así ...» para reflejar la estructura del griego.
  - «Yahvé» se usa de manera consistente con el estándar del proyecto para יהוה / κύριος cuando se refiere al nombre divino.
  - Se evita el calco rígido de «en las alturas del Señor» dentro del texto principal, pero se registra como alternativa en nota.
  - «Esposa» se elige por el contexto doméstico; no se neutraliza a «mujer» en el texto principal.
