lexical_decisions:
- source_word: εἶπεν
  english_pob_choice: told
  chosen_spanish: les dijo
  alternatives_spanish:
  - les habló
  - les contó
  lexicon: BDAG
  rationale: El verbo griego λέγω con complemento directo de una parábola funciona naturalmente en español como «les dijo». Mantiene el valor narrativo sin añadir la idea de explicación que tendría «les contó» ni la vaguedad de «les habló».
- source_word: παραβολὴν
  english_pob_choice: parable
  chosen_spanish: parábola
  alternatives_spanish:
  - comparación
  - ilustración
  lexicon: BDAG
  rationale: «Parábola» es el equivalente directo y técnico en español para παραβολή en los Evangelios. Las alternativas suavizan o diluyen la categoría literaria del dicho de Jesús.
- source_word: Ἴδετε
  english_pob_choice: Look at
  chosen_spanish: Miren
  alternatives_spanish:
  - Vean
  - Vean ustedes
  - Consideren
  lexicon: BDAG
  rationale: El imperativo plural pide atención visual y encaja de forma natural en español como «Miren». Conserva la fuerza exhortativa del griego sin sonar rígido.
- source_word: συκῆν
  english_pob_choice: fig tree
  chosen_spanish: la higuera
  alternatives_spanish:
  - la higuera de higos
  - el árbol de higos
  lexicon: BDAG
  rationale: συκῆ se refiere al árbol, no solo al fruto. «Higuera» es el sustantivo preciso y natural en español.
- source_word: πάντα τὰ δένδρα
  english_pob_choice: all the trees
  chosen_spanish: todos los árboles
  alternatives_spanish:
  - cada árbol
  - todos los demás árboles
  lexicon: BDAG
  rationale: La expresión griega plural se traduce de manera directa como «todos los árboles». «Todos los demás» introduciría un matiz no explícito en el texto griego.
translation_notes:
  revision_awareness: El texto inglés revisado eliminó una coma antes de 'and' para mayor fluidez; el español mantiene una sola coordinación continua («la higuera y todos los árboles») y no necesita una pausa equivalente. No se observan tensiones textuales adicionales en este versículo breve.
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico claro y contemporáneo, sin recurrir a arcaísmos innecesarios.
  - No se introdujo ninguna glosa interpretativa sobre el sentido de la parábola, ya que el griego solo introduce el ejemplo visual.
  - Se eligió «Miren» por naturalidad en español plural y porque conserva la fuerza del imperativo griego.
