base_translation:
  language: en
  yaml_path: translation/ot/isaiah/049/022.yaml
  text: 'Thus says the Lord GOD: Behold[a], I will lift up my hand to the nations, and raise my banner to the peoples; and they will bring your sons in their bosom[b], and your daughters will be carried on the shoulder.'
  footnotes:
  - marker: a
    text: Or 'raise my signal' or 'raise my standard' for 'raise my banner.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'in the bosom' or 'in the fold [of the garment]'; the sense is that the children are carried close against the body.
    reason: lexical_alternative
