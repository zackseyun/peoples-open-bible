  to: Dios[a], hemos oído con nuestros propios oídos; nuestros padres nos han contado el hecho[b] que hiciste en sus días, en tiempos antiguos[c].
  rationale: Se ajustó la frase para un español más natural sin perder la imagen corporal del hebreo («hemos oído con nuestros propios oídos»). Se cambió «la obra» por «el hecho» para alinearse mejor con la revisión documentada del inglés hacia «the deed» y con el sentido contextual de una acción concreta de Dios. También se simplificó la sintaxis eliminando el «lo» catafórico.
