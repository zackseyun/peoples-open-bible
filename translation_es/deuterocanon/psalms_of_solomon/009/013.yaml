translation:
  language: es
  text: porque la vergüenza está sobre nosotros y sobre nuestros rostros[a], por causa de todo esto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «sobre nuestros rostros». Se conserva la imagen física del griego para expresar vergüenza visible y pública.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅτι
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: Introduces la razón de la afirmación anterior; en español, «porque» comunica de forma natural la fuerza explicativa sin añadir matices ajenos.
- source_word: αἰσχύνη
  english_pob_choice: shame
  chosen_spanish: vergüenza
  alternatives_spanish:
  - deshonra
  - afrenta
  lexicon: BDAG
  rationale: «Vergüenza» conserva el campo semántico de honor/deshonor y suena natural en español bíblico contemporáneo; «deshonra» intensifica más de lo que exige el griego.
- source_word: ἡμῖν
  english_pob_choice: is ours
  chosen_spanish: está sobre nosotros
  alternatives_spanish:
  - es nuestra
  - nos pertenece
  lexicon: BDAG
  rationale: El dativo expresa posesión o incumbencia, pero en español la imagen idiomática «está sobre nosotros» preserva la carga de peso/aflicción que el contexto sugiere y evita una posesión demasiado abstracta.
- source_word: τοῖς προσώποις ἡμῶν
  english_pob_choice: on our faces
  chosen_spanish: sobre nuestros rostros
  alternatives_spanish:
  - en nuestras caras
  - ante nuestros rostros
  lexicon: BDAG
  rationale: La expresión literal de πρόσωπα se conserva con «rostros» para mantener la imagen concreta y visible de la vergüenza pública; «caras» sería más coloquial, pero menos digno en este registro.
- source_word: περὶ ἁπάντων
  english_pob_choice: because of all this
  chosen_spanish: por causa de todo esto
  alternatives_spanish:
  - a causa de todo esto
  - por todo esto
  lexicon: BDAG
  rationale: La preposición aquí expresa motivo/ocasión; «por causa de todo esto» refleja bien la relación causal sin introducir un demostrativo innecesariamente interpretativo. Se mantiene la referencia global del plural totalizador en forma natural.
translation_notes:
  revision_awareness: 'El texto sigue la revisión que unificó la estructura del verso: un solo sujeto («vergüenza») con dos dativos paralelos. También evita expandir περὶ ἁπάντων más allá de su alcance causal, manteniendo una equivalencia natural en español.'
  spanish_consistency_notes:
  - Se mantiene la terminología concreta de «rostros» para preservar el paralelismo con el griego.
  - Se evita «SEÑOR» u otras sustituciones no pertinentes, pues el verso no contiene el nombre divino.
  - 'El orden del verso conserva la estructura paralela del original: sujeto singular + doble dativo + complemento causal.'
