revisions:
- from: 'Así los corredores fueron con las cartas desde la mano del rey y de sus oficiales por todo Israel y Judá[a], conforme al mandamiento del rey, diciendo: «Hijos de Israel, vuelvan a Yahvé, el Dios de Abraham, Isaac e Israel[b], para que él vuelva al remanente que ha escapado y queda para ustedes de la mano de los reyes de Asiria».'
  to: 'Así, los correos fueron con las cartas de mano del rey y de sus oficiales por todo Israel y Judá, conforme al mandato del rey, diciendo: «Hijos de Israel, vuelvan a Yahvé, el Dios de Abraham, Isaac e Israel[a], para que él vuelva al remanente que ha escapado y queda para ustedes[b] de la mano de los reyes de Asiria».'
  rationale: 'Se corrigen los anclajes de las notas para que correspondan a las expresiones que explican. También se mejora la naturalidad del español con cambios menores y fieles al hebreo auditado: «los correos» por «los corredores» en contexto administrativo, «de mano del rey» para conservar la imagen idiomática sin calco duro, y «mandato» por «mandamiento» para una directiva real más natural en español contemporáneo. No se altera el sentido teológico ni textual principal.'
