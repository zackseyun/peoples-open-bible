    issue: Falta la nota de lectura alternativa para la cláusula difícil וְהוּא דֶּרֶךְ חֹל
    rationale: La POB inglesa preserva explícitamente una nota sobre la dificultad del hebreo y una posible relectura de toda la cláusula final. El borrador español no la incluye, con lo que se pierde información importante del expediente textual.
  - severity: medium
    issue: La nota sobre el modismo temporal está anclada a 'las mujeres han sido apartadas de nosotros[a]' en lugar de a 'desde ayer y anteayer'
    rationale: El marcador [a] en el texto actualmente corresponde a la abstinencia sexual, pero la nota [b] del borrador explica el modismo temporal. Esto desalineado dificulta la lectura y no sigue la disciplina de anclaje pedida.
  - severity: medium
    issue: La nota sobre 'utensilios' no cubre la referencia final 'en el utensilio'
    rationale: El expediente inglés vincula la ambigüedad de כְּלִי tanto en 'the young men’s vessels' como en la frase final 'in the vessel'. En español conviene reflejar esa continuidad y la oscuridad de la última cláusula.
  - severity: low
    issue: '''camino común'' es poco natural en español bíblico contemporáneo'
    rationale: Aunque es posible, 'viaje ordinario' comunica mejor el sentido de דֶּרֶךְ חֹל sin sugerir un 'camino' físico. Esto mejora legibilidad sin alejarse del hebreo.
  - severity: low
    issue: La exclamación '¡Cuánto más...!' introduce un énfasis gráfico no exigido por el hebreo
    rationale: '''Cuánto más'' o ''con mayor razón'' dentro de la oración suena más sobrio y natural en este registro.'
