    rationale: «Arco» es masculino en español; la forma dada es gramaticalmente inaceptable y no debe conservarse en nombre de literalidad. El hebreo requiere «el arco», no una forma incorrecta en español.
  - severity: medium
    issue: La nota [b] intenta defender una forma española incorrecta
    rationale: Las notas deben aclarar el texto, no justificar un error gramatical. Además, el POB inglés solo conserva una nota léxica sobre «rainbow», no una nota estilística paralela.
