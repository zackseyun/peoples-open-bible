translation:
  language: es
  text: Entonces Yahvé descendió en una columna de nube y se detuvo a la entrada de la tienda[b]; llamó a Aarón y a Miriam, y ambos salieron adelante[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los dos salieron» / «ambos salieron». El hebreo dice literalmente «salieron», pero aquí probablemente significa que dieron un paso al frente en respuesta al llamado de Yahvé.
    reason: lexical_alternative
  - marker: b
    text: Hebreo «la tienda»; el contexto se refiere a la tienda de reunión.
    reason: cross_reference
lexical_decisions:
- source_word: וַיֵּרֶד / ירד
  english_pob_choice: came down
  chosen_spanish: descendió
  alternatives_spanish:
  - bajó
  - vino abajo
  lexicon: HALOT
  rationale: El hebreo expresa movimiento descendente real. «Descendió» conserva esa imagen con dignidad y claridad en español, sin suavizarla indebidamente.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Tetragrama: transliterar el nombre divino como «Yahvé», en lugar de sustituirlo por un título.'
- source_word: בְּעַמּוּד עָנָן
  english_pob_choice: in a pillar of cloud
  chosen_spanish: en una columna de nube
  alternatives_spanish:
  - en la columna de nube
  - con una columna de nube
  lexicon: HALOT
  rationale: «Columna de nube» reproduce el sintagma nominal tradicional y el hebreo permite el sentido de manifestación/medio en que Yahvé desciende. «En» mantiene la relación local/manifestativa que la POB inglesa quiso conservar.
- source_word: וַיַּעֲמֹד
  english_pob_choice: stood
  chosen_spanish: se detuvo
  alternatives_spanish:
  - estuvo de pie
  - tomó su lugar
  lexicon: HALOT
  rationale: En este contexto narrativo, «se detuvo» comunica con naturalidad el acto de ponerse y permanecer en un punto preciso, sin perder la idea de estar situado ante la entrada.
- source_word: פֶּתַח הָאֹהֶל
  english_pob_choice: at the entrance of the tent
  chosen_spanish: a la entrada de la tienda
  alternatives_spanish:
  - a la entrada del tent de reunión
  - en la puerta de la tienda
  lexicon: HALOT
  rationale: «Entrada» es fiel a פתח. «Tienda» traduce literalmente אֹהֶל; aunque el contexto remite a la tienda de reunión, el hebreo aquí no la nombra con el título completo, por lo que el texto principal no lo amplía.
- source_word: וַיִּקְרָא
  english_pob_choice: he called
  chosen_spanish: llamó
  alternatives_spanish:
  - convocó
  - llamó a
  lexicon: HALOT
  rationale: «Llamó» es la equivalencia más directa y natural para קרא. En español ya queda claro que el llamado va dirigido a Aarón y a Miriam.
- source_word: אַהֲרֹן וּמִרְיָם
  english_pob_choice: Aaron and Miriam
  chosen_spanish: Aarón y a Miriam
  alternatives_spanish:
  - Aarón y Miriam
  lexicon: HALOT
  rationale: Se conservan los nombres propios habituales en español bíblico. La repetición de la preposición con cada nombre responde a la sintaxis natural del llamado directo en español.
- source_word: וַיֵּצְאוּ שְׁנֵיהֶם
  english_pob_choice: both of them came forward
  chosen_spanish: ambos salieron
  alternatives_spanish:
  - los dos salieron
  - ambos se acercaron
  - los dos se presentaron
  lexicon: HALOT
  rationale: יצא significa literalmente «salieron»; la POB inglesa ya registró la tensión entre el valor léxico y el sentido contextual de responder al llamado. En español, «ambos salieron» conserva el hebreo sin forzar una paráfrasis interpretativa.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se mantiene la decisión doctrinal y editorial del proyecto de representar el Nombre propio de Dios con «Yahvé», evitando la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה / YHWH → Yahvé'
- issue: Lenguaje antropomórfico del descenso de Yahvé
  english_pob_reading: Retain the concrete language 'came down'
  chosen_spanish_reading: descendió
  alternative_spanish_readings:
  - apareció
  - se manifestó
  rationale: El hebreo presenta un descenso concreto dentro de la escena teofánica. «Descendió» preserva esa imaginería sin explicarla o desdibujarla.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #3'
translation_notes:
  revision_awareness: El borrador sigue el pasaje fuente y el audit trail inglés sin cambios de revisión pendientes; se conserva la imagen concreta del descenso divino y la tensión léxica de וַיֵּצְאוּ mediante una traducción española directa pero natural.
  spanish_consistency_notes:
  - Se usa «Yahvé» conforme al estándar del proyecto para el Tetragrama.
  - Se prefiere «tienda» en el texto principal, con nota contextual sobre la tienda de reunión.
  - 'Se conserva la progresión narrativa simple del hebreo: descendió, se detuvo, llamó, salieron.'
  - No se introduce «Mesías», «SEÑOR» ni otras sustituciones no motivadas por el hebreo.
  - La nota sobre וַיֵּצְאוּ mantiene visible la alternativa contextual sin eliminar el valor léxico de «salieron».
