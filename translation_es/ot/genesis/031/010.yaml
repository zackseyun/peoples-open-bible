translation:
  language: es
  text: Y aconteció que, al tiempo en que la grey estaba en celo, alcé mis ojos y vi en un sueño, y vi que los machos cabríos que montaban la grey eran listados[a], moteados y abigarrados[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «anillados de rayas». El término hebreo se refiere a marcas en bandas en los animales.
    reason: lexical_alternative
  - marker: b
    text: O «jaspeados». Los tres términos de color probablemente describen patrones de pelaje distintos entre sí.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And it happened
  chosen_spanish: Y aconteció
  alternatives_spanish:
  - Y sucedió
  - Y pasó
  lexicon: HALOT
  rationale: La forma narrativa introduce un hecho pasado sin añadir interpretación. «Aconteció» conserva el tono bíblico y el flujo del wayyiqtol en un español natural y digno.
- source_word: בְּעֵת יַחֵם הַצֹּאן
  english_pob_choice: at the time when the flock was mating
  chosen_spanish: al tiempo en que la grey estaba en celo
  alternatives_spanish:
  - cuando la grey estaba en celo
  - al tiempo en que el rebaño estaba en celo
  lexicon: HALOT
  rationale: El contexto es reproductivo animal. «Estaba en celo» expresa bien el estado fisiológico de apareamiento; «grey» mantiene un término bíblico comprensible y evita la ambigüedad de «concebía» o una paráfrasis más libre.
- source_word: וָאֶשָּׂא עֵינַי
  english_pob_choice: I lifted up my eyes
  chosen_spanish: alcé mis ojos
  alternatives_spanish:
  - levanté mis ojos
  - alcé la vista
  lexicon: HALOT
  rationale: Es un hebraísmo de percepción visual. «Alcé mis ojos» conserva la imagen idiomática sin resultar forzado en español.
- source_word: וָאֵרֶא בַּחֲלוֹם
  english_pob_choice: and saw in a dream
  chosen_spanish: y vi en sueños
  alternatives_spanish:
  - y vi en un sueño
  - y lo vi en sueños
  lexicon: HALOT
  rationale: La frase puede referirse al medio de la visión. «En sueños» es una forma idiomática española que mantiene la indeterminación del hebreo sin sobreexplicarla.
- source_word: הָעַתֻּדִים
  english_pob_choice: the male goats
  chosen_spanish: los machos cabríos
  alternatives_spanish:
  - los cabríos
  - los machos de cabra
  lexicon: HALOT
  rationale: El término se refiere a machos reproductores. «Machos cabríos» es claro, bíblico y preciso para el referente zoológico.
- source_word: הָעֹלִים עַל הַצֹּאן
  english_pob_choice: that were mounting the flock
  chosen_spanish: que montaban la grey
  alternatives_spanish:
  - que subían sobre la grey
  - que se apareaban con la grey
  lexicon: HALOT
  rationale: «Montaban» conserva el sentido concreto y reproductivo de עלה על. Evita una paráfrasis demasiado interpretativa como «se apareaban con», aunque esa sea una posible explicación.
- source_word: עֲקֻדִּים
  english_pob_choice: striped
  chosen_spanish: listados
  alternatives_spanish:
  - rayados
  - rayados de bandas
  lexicon: HALOT
  rationale: El término describe marcas en bandas o rayas. «Listados» es un castellano válido y sobrio que conserva la idea de bandas marcadas sin imponer una imagen más específica que la del hebreo.
- source_word: נְקֻדִּים
  english_pob_choice: speckled
  chosen_spanish: pintados
  alternatives_spanish:
  - moteados
  - salpicados
  lexicon: HALOT
  rationale: El hebreo apunta a un patrón de manchas o puntos. «Pintados» en español bíblico puede funcionar como término de pelaje variado; se mantiene la distinción de color/patrón sin cerrarla demasiado.
- source_word: וּבְרֻדִּים
  english_pob_choice: mottled
  chosen_spanish: abigarrados
  alternatives_spanish:
  - moteados
  - dappleados
  - jaspeados
  lexicon: HALOT
  rationale: Este tercer término indica un patrón mixto y distinto de los anteriores. «Abigarrados» comunica variedad irregular de coloraciones y conserva la diferencia con «listados» y «pintados».
translation_notes:
  revision_awareness: Se siguió el texto hebreo masorético (WLC) y el audit trail inglés sin cambios posteriores reportados; la versión española mantiene la misma estructura narrativa, la escena onírica y la tríada de patrones de pelaje con equivalencias auditables.
  spanish_consistency_notes:
  - Se empleó «Yahvé» solo cuando el nombre divino aparece; aquí no ocurre.
  - Se prefirió «grey» por «flock» como término bíblico general para el rebaño, manteniendo legibilidad contemporánea.
  - Se conservaron tres adjetivos diferenciados para no borrar la tensión lexical de los patrones de pelaje.
  - «Machos cabríos» y los adjetivos de pelaje se coordinaron para mantener el paralelismo del hebreo.
