revisions:
- from: 'Y dijo[a]: «Vi a todo Israel disperso sobre los montes, como ovejas que no tienen pastor. Y Yahvé dijo: “Estos no tienen un solo amo[b]; que cada hombre vuelva a su casa en paz”».'
  to: 'Y dijo[a]: «Vi a todo Israel disperso sobre los montes, como ovejas que no tienen pastor. Y Yahvé dijo: “Estos no tienen señores[b]; que cada hombre vuelva a su casa en paz”».'
  rationale: Se revisa la cláusula sobre אֲדֹנִים para reflejar fielmente el plural hebreo y evitar el añadido interpretativo «un solo». Se escoge «señores» por ser más natural en español para autoridad/gobierno en este contexto que «amo». También se corrige la nota para que describa con precisión el número y las alternativas.
