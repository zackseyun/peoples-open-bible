translation:
  language: es
  text: 'Para el director del coro: según «La paloma silenciosa de lugares lejanos».[a] De David. Un miktam[b], cuando los filisteos lo apresaron en Gat.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «La paloma del silencio lejano», o posiblemente otro título de melodía; el significado exacto de la frase es incierto.'
    reason: alternative_reading
  - marker: b
    text: Miktam es un término técnico en los encabezamientos de los salmos; su significado preciso es incierto.
    reason: lexical_alternative
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  english_pob_choice: For the choir director
  chosen_spanish: Para el director del coro
  alternatives_spanish:
  - Para el director musical
  - Al maestro de coro
  lexicon: HALOT
  rationale: Expresa la función litúrgico-musical del encabezamiento con español claro y natural, sin perder el sentido de dirección para la ejecución del salmo.
- source_word: עַל
  english_pob_choice: according to
  chosen_spanish: según
  alternatives_spanish:
  - con la melodía de
  - sobre
  lexicon: HALOT
  rationale: En encabezamientos salmódicos introduce una indicación asociada a una melodía o título; «según» mantiene esa relación sin añadir una interpretación más fuerte de la necesaria.
- source_word: יוֹנַת אֵלֶם רְחֹקִים
  english_pob_choice: “The Silent Dove of Distant Places”
  chosen_spanish: “La paloma silenciosa de lugares lejanos”
  alternatives_spanish:
  - “La paloma del silencio de lugares lejanos”
  - “La paloma muda de regiones distantes”
  lexicon: HALOT
  rationale: La revisión inglesa subraya que אֵלֶם sugiere silencio/mudez y רְחֹקִים significa lugares lejanos; en español conviene conservar la oscuridad del título y no convertirlo en una explicación segura que el hebreo no garantiza.
- source_word: לְדָוִד
  english_pob_choice: Of David
  chosen_spanish: De David
  alternatives_spanish:
  - Por David
  - Para David
  lexicon: HALOT
  rationale: Mantiene la ambigüedad canónica de atribución o asociación sin decidir más de lo que el hebreo indica.
- source_word: מִכְתָּם
  english_pob_choice: A miktam
  chosen_spanish: Un miktam
  alternatives_spanish:
  - Un salmo
  - Una inscripción
  lexicon: HALOT
  rationale: Se translitera como término técnico de sentido incierto, evitando una traducción conjetural que borre la tensión léxica documentada.
- source_word: בֶּאֱחֹז
  english_pob_choice: when ... seized
  chosen_spanish: cuando ... apresaron
  alternatives_spanish:
  - cuando ... lo tomaron
  - cuando ... lo capturaron
  lexicon: HALOT
  rationale: En español, «apresar» comunica bien el acto hostil de tomar por fuerza sin sonar excesivamente técnico o arcaico.
- source_word: פְלִשְׁתִּים
  english_pob_choice: the Philistines
  chosen_spanish: los filisteos
  alternatives_spanish:
  - los filisteos
  lexicon: HALOT
  rationale: Nombre étnico estándar en español bíblico.
- source_word: בְּגַת
  english_pob_choice: in Gath
  chosen_spanish: en Gat
  alternatives_spanish:
  - en Gath
  lexicon: HALOT
  rationale: Se adapta el topónimo a la forma usual en español bíblico, conservando la referencia geográfica precisa.
theological_decisions:
- issue: Naturaleza del encabezamiento salmódico como parte del texto canónico
  english_pob_reading: Translate the heading as part of the canonical verse, preserving its musical and historical notices without converting uncertain technical terms into interpretive claims.
  chosen_spanish_reading: Traducir el encabezamiento como parte del versículo canónico, conservando las indicaciones musicales e históricas sin convertir términos inciertos en afirmaciones interpretativas.
  alternative_spanish_readings:
  - Tratar la línea como metadato editorial no traducido
  - Traducir מִכְתָּם con un significado conjetural como «salmo dorado»
  rationale: La forma hebrea presenta este material como encabezamiento del salmo; la versión española debe preservarlo sin resolver artificialmente lo que el texto deja incierto.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail, que corrigió la frase del título de la melodía desde una interpretación relacionada con «robles» a «lugares lejanos», por ajustarse mejor a אֵלֶם y רְחֹקִים. Se mantuvo la estructura del encabezamiento y la nota sobre Miktam, con ajustes mínimos de puntuación y naturalidad española.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando corresponda en otros contextos; aquí el hebreo no contiene el nombre divino.
  - Se conservó «David» y el topónimo «Gat» como formas bíblicas estándar en español.
  - Se mantuvo el tono sobrio y publicable del encabezamiento, evitando paráfrasis explicativas que borrarían la ambigüedad del título musical.
