translation:
  language: es
  text: Y ahora, oh Yahvé, Dios de Israel, que sacaste a tu pueblo de la tierra de Egipto con mano poderosa, con señales y prodigios, con gran poder y con brazo levantado[a], y te hiciste un nombre, como hasta este día,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión griega dice literalmente «brazo alto/levantado» (βραχίονι ὑψηλῷ). La traducción mantiene «brazo levantado» para reflejar la imagen, aunque en otros pasajes del éxodo aparece la fórmula más conocida «brazo extendido».
    reason: lexical_alternative
lexical_decisions:
- source_word: Κύριε
  english_pob_choice: Lord
  chosen_spanish: oh Yahvé
  alternatives_spanish:
  - oh Señor
  - Señor
  lexicon: BDAG
  rationale: El vocativo dirige la oración a Dios; según la terminología del proyecto, el nombre divino se vierte como «Yahvé». Mantengo el carácter de invocación con «oh» y evito «SEÑOR» como sustituto de ocultamiento.
- source_word: ὁ θεὸς Ἰσραήλ
  english_pob_choice: God of Israel
  chosen_spanish: Dios de Israel
  alternatives_spanish:
  - el Dios de Israel
  lexicon: BDAG
  rationale: 'En español, el sintagma funciona naturalmente sin artículo en vocativo. Se conserva la relación de pertenencia y pacto: Dios es el Dios propio de Israel.'
- source_word: ἐξήγαγες
  english_pob_choice: brought ... out
  chosen_spanish: sacaste
  alternatives_spanish:
  - sacaste fuera
  - trajiste ... fuera
  - sacaste a
  lexicon: BDAG
  rationale: El verbo de éxodo se expresa de forma idiomática con «sacar»; «sacaste a tu pueblo de la tierra de Egipto» comunica el movimiento sin endurecer el español.
- source_word: ἐν χειρὶ κραταιῷ
  english_pob_choice: with a mighty hand
  chosen_spanish: con mano poderosa
  alternatives_spanish:
  - con mano fuerte
  - con mano valiente
  lexicon: BDAG
  rationale: «Mano poderosa» preserva la metáfora bíblica y el valor de fuerza efectiva. «Poderosa» resulta más natural que un calco adjetival rígido.
- source_word: σημείοις
  english_pob_choice: signs
  chosen_spanish: señales
  alternatives_spanish:
  - signos
  - milagros-señales
  lexicon: BDAG
  rationale: En contexto de éxodo y actos divinos, «señales» es transparente y mantiene la fuerza de actos que confirman la intervención de Dios.
- source_word: τέρασιν
  english_pob_choice: wonders
  chosen_spanish: prodigios
  alternatives_spanish:
  - maravillas
  - portentos
  lexicon: BDAG
  rationale: «Prodigios» conserva el tono solemne y la distinción tradicional respecto de «señales» sin perder claridad en español contemporáneo.
- source_word: δυνάμει μεγάλῃ
  english_pob_choice: great power
  chosen_spanish: gran poder
  alternatives_spanish:
  - gran fuerza
  - gran potencia
  lexicon: BDAG
  rationale: La collocación expresa fuerza eficaz y manifiesta; «gran poder» es la forma más natural y fiel al sustantivo δύναμις.
- source_word: βραχίονι ὑψηλῷ
  english_pob_choice: an uplifted arm
  chosen_spanish: brazo levantado
  alternatives_spanish:
  - brazo alzado
  - brazo elevado
  - brazo levantado en alto
  lexicon: BDAG
  rationale: El griego dice literalmente «brazo alto/exaltado», y la POB inglés opta por una solución cercana a la imagen. En español, «brazo levantado» retiene la metáfora bíblica y deja abierta la tensión con la fórmula más familiar «brazo extendido».
- source_word: ἐποίησας σεαυτῷ ὄνομα
  english_pob_choice: made for yourself a name
  chosen_spanish: te ganaste un nombre
  alternatives_spanish:
  - te hiciste un nombre
  - te formaste un nombre para ti
  - te diste renombre
  lexicon: BDAG
  rationale: La expresión hebraizante indica adquirir fama/renombre mediante actos poderosos. «Te ganaste un nombre» comunica el sentido idiomático en español sin perder el matiz reflexivo.
- source_word: ὡς ἡ ἡμέρα αὕτη
  english_pob_choice: as at this day
  chosen_spanish: como hasta este día
  alternatives_spanish:
  - como en este día
  - hasta el día de hoy
  lexicon: BDAG
  rationale: La fórmula temporal indica duración de la fama hasta el presente. «Como hasta este día» conserva el sentido formular y la referencia al estado actual.
theological_decisions:
- issue: Vocativo divino y tratamiento del nombre de YHWH
  english_pob_reading: Lord / God of Israel
  chosen_spanish_reading: oh Yahvé, Dios de Israel
  alternative_spanish_readings:
  - Señor, Dios de Israel
  - oh Señor, Dios de Israel
  rationale: El texto griego usa Κύριε como vocativo dirigido al Dios de Israel; en el marco del proyecto, el equivalente principal de יהוה es «Yahvé». Así se evita la convención de reemplazo por «SEÑOR» y se mantiene la identificación del Dios del éxodo.
  doctrine_reference: Éxodo 3:15; Deuteronomio 6:4
- issue: Cadena instrumental del éxodo como retórica teológica
  english_pob_reading: with a mighty hand, with signs and wonders and with great power and with an uplifted arm
  chosen_spanish_reading: con mano poderosa, con señales y prodigios, con gran poder y con brazo levantado
  alternative_spanish_readings:
  - con mano poderosa, con señales, con maravillas, con gran poder y con brazo extendido
  - con mano fuerte, con señales y portentos, con gran poder y con brazo alto
  rationale: La acumulación de medios no se suaviza; conserva el peso retórico y la memoria del éxodo como manifestación de poder divino. Se mantiene la posible tensión entre la formulación griega de «brazo levantado» y la más conocida de otros textos.
  doctrine_reference: Éxodo 6:6; Deuteronomio 4:34
- issue: Renombre divino como resultado de la liberación
  english_pob_reading: made for yourself a name
  chosen_spanish_reading: te ganaste un nombre
  alternative_spanish_readings:
  - te hiciste un nombre
  - te diste renombre
  rationale: La frase comunica que Dios hizo manifiesta su gloria/honor mediante sus actos históricos. «Te ganaste un nombre» preserva la idea de renombre adquirido sin diluir el carácter bíblico del idiomático.
  doctrine_reference: Isaías 63:12, 14; Nehemías 9:10
translation_notes:
  revision_awareness: 'El audit trail inglés preservó la secuencia retórica del éxodo y ajustó la fórmula temporal a un equivalente más literal («as at this day»). La versión española sigue esa misma línea: mantiene la acumulación instrumental, traduce el vocativo con tratamiento directo y conserva la tensión lexical de βραχίονι ὑψηλῷ mediante una nota, sin homogeneizarla con la fórmula más familiar de otros textos.'
  spanish_consistency_notes:
  - Se usó «Yahvé» para el vocativo divino conforme al estándar del proyecto.
  - Se evitó «Cristo» porque no aparece en el texto fuente.
  - «Señales y prodigios» conserva la pareja semántica de σημείοις / τέρασιν sin forzar sinonimia plana.
  - «Brazo levantado» deja visible la diferencia con la expresión exódica más usual y queda explicada en nota.
  - La clausula final «como hasta este día» reproduce la fórmula temporal de duración hasta el presente.
