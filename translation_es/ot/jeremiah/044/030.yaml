  to: 'Así dice Yahvé: He aquí, yo entrego al faraón Hofra, rey de Egipto, en manos de sus enemigos y en manos de los que buscan su vida, así como entregué a Sedequías, rey de Judá, en manos de Nabucodrezar[a], rey de Babilonia, su enemigo y el que busca su vida.'
