  glossary_alignment: No hay términos del glosario mayor especialmente controvertidos en este versículo. «Amo» para אֲדֹנִי / אֲדֹנָיו concuerda con la racionalidad documentada del contexto doméstico. La preservación de la metáfora «en mi mano» está alineada con la POB inglesa y con el hebreo. No hay conflictos con Yahvé/Mesías/Espíritu u otros términos de control del proyecto.
