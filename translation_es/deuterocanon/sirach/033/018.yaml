translation:
  language: es
  text: Comprendan que no he trabajado solo para mí, sino para todos los que buscan instrucción[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «disciplina» o «formación» para παιδείαν, un término que puede incluir formación moral además de enseñanza.
    reason: lexical_alternative
lexical_decisions:
- source_word: κατανοήσατε
  english_pob_choice: Understand
  chosen_spanish: Comprendan
  alternatives_spanish:
  - Entiendan
  - Consideren
  - Tomen nota
  lexicon: LSJ
  rationale: El imperativo aoristo plural pide captar el sentido del argumento; «Comprendan» comunica con claridad el llamamiento a reconocer la afirmación, sin perder la fuerza exhortativa.
- source_word: οὐκ ἐμοὶ μόνῳ
  english_pob_choice: not for myself alone
  chosen_spanish: no he trabajado solo para mí
  alternatives_spanish:
  - no he trabajado para mí solo
  - no he trabajado únicamente para mí
  - no he trabajado solo en beneficio propio
  lexicon: LSJ
  rationale: 'La construcción dativa con μόνος expresa beneficio o interés: el trabajo no fue meramente para el propio provecho del hablante. «Solo para mí» reproduce bien esa idea en español natural.'
- source_word: ἐκοπίασα
  english_pob_choice: I have labored
  chosen_spanish: he trabajado
  alternatives_spanish:
  - he labrado
  - he sudado
  - he trabajado duro
  lexicon: LSJ
  rationale: κοπιάω implica esfuerzo intenso o fatiga. En español, «he trabajado» es idiomático y suficientemente fuerte; «he trabajado duro» explicita demasiado, y «he labrado» suena más marcado y menos natural aquí.
- source_word: πᾶσιν τοῖς ζητοῦσιν
  english_pob_choice: for all who seek
  chosen_spanish: para todos los que buscan
  alternatives_spanish:
  - para todos los que buscan instrucción
  - para todos los que la buscan
  - para todos los buscadores
  lexicon: LSJ
  rationale: La frase es inclusiva y general. «Para todos los que buscan» conserva el participio de manera natural en español, como en el inglés POB.
- source_word: παιδείαν
  english_pob_choice: instruction
  chosen_spanish: instrucción
  alternatives_spanish:
  - disciplina
  - formación
  - educación
  lexicon: LSJ
  rationale: En Sirácides, παιδεία abarca formación moral e intelectual, además de enseñanza. «Instrucción» mantiene el alcance amplio sin volverlo demasiado institucional ni restringirlo a disciplina punitiva.
translation_notes:
  revision_awareness: El texto griego y el auditorial inglés coinciden estrechamente; no se detectan revisiones posteriores ni cambios textuales relevantes. La traducción mantiene la equivalencia óptima del POB en un español natural y público.
  spanish_consistency_notes:
  - Se conserva «instrucción» como renderizado principal de παιδείαν, siguiendo el criterio lexical del POB en inglés.
  - Se mantiene un registro reverente pero contemporáneo, adecuado para lectura eclesial amplia.
  - La nota al pie preserva la tensión semántica entre enseñanza e formación moral sin preferir indebidamente una sola opción.
