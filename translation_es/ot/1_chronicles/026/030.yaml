review_pass:
  verdict: revise
  source_alignment_summary: El borrador español refleja bien la estructura del hebreo y conserva correctamente el sentido administrativo general, el nombre divino Yahvé y la nota sobre «más allá del Jordán… hacia el occidente». Sin embargo, בְּנֵי חַיִל fue documentado en el rastro POB inglés como «capable men» por el contexto administrativo, no militar; «hombres valientes» desplaza el sentido hacia valor marcial y no sigue la decisión auditada.
  spanish_quality_summary: El español es claro y legible, con registro digno. La frase geográfica funciona, aunque es algo pesada; la nota compensa bien la posible ambigüedad. El único problema importante de estilo/precisión es «hombres valientes», que suena más militar que administrativo. «Hombres capaces» o «hombres competentes» sería más fiel y natural aquí.
  glossary_alignment: 'Alineación buena en Yahvé, Hasabías, hermanos, supervisión, obra de Yahvé y servicio del rey. Desalineación relevante en בְּנֵי חַיִל: el proyecto fijó una elección contextual de capacidad/competencia, no de valentía. No hay otros conflictos significativos con la terminología del proyecto.'
  issues:
  - severity: medium
    issue: «hombres valientes» para בְּנֵי חַיִל
    rationale: El hebreo puede incluir valor o fuerza, pero en este contexto de supervisión/encargo administrativo el POB inglés documentó expresamente «capable men». «Hombres valientes» introduce un matiz militar que no corresponde al razonamiento lexical auditado.
  revised_spanish_text: 'Para los hebronitas: Hasabías y sus hermanos[a], mil setecientos hombres capaces, estaban a cargo de la supervisión de Israel más allá del Jordán, hacia el occidente, para toda la obra de Yahvé y para el servicio del rey.'
  revised_footnotes:
  - marker: a
    text: 'Hebreo: «más allá del Jordán hacia el occidente», es decir, en el lado occidental del Jordán.'
    reason: lexical_alternative
  revision_rationale: Se reemplaza «hombres valientes» por «hombres capaces» para ajustarse al sentido contextual administrativo de בְּנֵי חַיִל y a la decisión lexical documentada en el POB inglés. Se mantiene el resto, incluida la nota geográfica, porque preserva adecuadamente el hebreo y la política del proyecto sobre «Yahvé».
