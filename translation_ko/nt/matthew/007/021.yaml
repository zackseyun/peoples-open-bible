id: MAT.7.21
reference: Matthew 7:21
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Οὐ πᾶς ὁ λέγων μοι· Κύριε κύριε εἰσελεύσεται εἰς τὴν βασιλείαν τῶν οὐρανῶν, ἀλλ’ ὁ ποιῶν τὸ θέλημα τοῦ πατρός μου τοῦ ἐν ⸀τοῖς οὐρανοῖς.
base_translation:
  language: en
  yaml_path: translation/nt/matthew/007/021.yaml
  text: Not everyone who says to me[a], ‘Lord, Lord,’ will enter into the kingdom of heaven[b], but the one who does the will of my Father who is in heaven will enter.
  footnotes:
  - marker: a
    text: Or “into the kingdom of the heavens.” Matthew frequently uses this expression where other contexts say “kingdom of God.”
    reason: lexical_alternative
  - marker: b
    text: Greek “the heavens” (plural) also at the end of the verse; rendered idiomatically as “heaven.”
    reason: lexical_alternative
translation:
  language: ko
  text: 나에게 『주여, 주여』 하는 사람마다 다 하늘 나라에 들어가는 것이 아닙니다. 다만 하늘에 계신 내 아버지의 뜻을 행하는 사람만 들어갈 것입니다.
  philosophy: optimal-equivalence
