    rationale: La nota cultural en la auditoría inglesa pertenece al término del terreno abierto alrededor de la ciudad, no al infinitivo «para habitar». En español debe anclarse al sustantivo correspondiente para preservar precisión exegética y editorial.
  - severity: medium
