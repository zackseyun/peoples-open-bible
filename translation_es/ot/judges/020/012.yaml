translation:
  language: es
  text: 'Entonces las tribus de Israel enviaron hombres por todas las tribus de Benjamín[a], diciendo[b]: «¿Qué es este mal que ha ocurrido entre ustedes?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a todas las tribus de Benjamín». La preposición hebrea puede entenderse de manera distributiva.
    reason: lexical_alternative
  - marker: b
    text: O «este mal», «esta maldad» o «esta injusticia».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלְחוּ
  english_pob_choice: sent
  chosen_spanish: enviaron
  alternatives_spanish:
  - mandaron
  - despacharon
  lexicon: HALOT
  rationale: El verbo básico de שלח es 'enviar'. En español, 'enviaron' es natural, claro y conserva el valor de acción realizada por las tribus.
- source_word: שִׁבְטֵי יִשְׂרָאֵל
  english_pob_choice: the tribes of Israel
  chosen_spanish: las tribus de Israel
  alternatives_spanish:
  - las tribus israelitas
  - Israel, en sus tribus
  lexicon: HALOT
  rationale: La construcción posesiva se vierte de forma directa y transparente, manteniendo el sujeto colectivo del hebreo.
- source_word: אֲנָשִׁים
  english_pob_choice: men
  chosen_spanish: hombres
  alternatives_spanish:
  - varones
  - representantes
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'hombres'. 'Hombres' conserva esa literalidad; aunque actúan como enviados, el texto no los llama explícitamente mensajeros.
- source_word: בְּכָל שִׁבְטֵי בִנְיָמִן
  english_pob_choice: through all the tribes of Benjamin
  chosen_spanish: por todas las tribus de Benjamín
  alternatives_spanish:
  - a todas las tribus de Benjamín
  - entre todas las tribus de Benjamín
  lexicon: HALOT
  rationale: La preposición ב admite lectura distributiva. 'Por todas las tribus de Benjamín' mantiene esa amplitud espacial/distributiva sin forzar una sola dirección.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - para decir
  - y dijeron
  lexicon: HALOT
  rationale: Es la fórmula estándar que introduce discurso directo; 'diciendo' conserva el enlace sintáctico sin añadir interpretación.
- source_word: מָה
  english_pob_choice: What
  chosen_spanish: ¿Qué
  alternatives_spanish:
  - ¿Por qué
  lexicon: HALOT
  rationale: 'La pregunta hebrea pide identificar la naturaleza del asunto: ''¿Qué...?'' es más fiel que convertirla en una pregunta causal.'
- source_word: הָרָעָה הַזֹּאת
  english_pob_choice: this evil
  chosen_spanish: este mal
  alternatives_spanish:
  - esta maldad
  - esta perversidad
  - esta injusticia
  lexicon: HALOT
  rationale: '''רָעָה'' aquí nombra una acción moralmente mala o una grave ofensa. En español, ''mal'' comunica esa carga sin sobredeterminarla con un término más técnico o más acusatorio.'
- source_word: אֲשֶׁר נִהְיְתָה
  english_pob_choice: that has happened
  chosen_spanish: que ha ocurrido
  alternatives_spanish:
  - que ha sucedido
  - que ha tenido lugar
  lexicon: HALOT
  rationale: El nifal de היה expresa aquí algo que llegó a pasar. 'Ha ocurrido' es idiomático y mantiene el sentido de acontecimiento consumado.
- source_word: בָּכֶם
  english_pob_choice: among you
  chosen_spanish: entre ustedes
  alternatives_spanish:
  - en medio de ustedes
  - con ustedes
  lexicon: HALOT
  rationale: En el contexto comunitario, la preposición indica que la ofensa se dio dentro del grupo benjaminita. 'Entre ustedes' conserva esa ubicación interna y es natural en español.
theological_decisions:
- issue: Alcance de la acusación moral en הָרָעָה הַזֹּאת
  english_pob_reading: this evil / this wickedness / this wrong
  chosen_spanish_reading: este mal
  alternative_spanish_readings:
  - esta maldad
  - esta injusticia
  - esta perversidad
  rationale: El texto no define todavía el acto específico; solo lo caracteriza como una grave maldad. 'Este mal' preserva la amplitud semántica y permite que el lector vea la acusación sin introducir matices jurídicos o psicológicos no explícitos en el hebreo.
  doctrine_reference: Lexical/theological caution on moral evil without over-specifying the offense
translation_notes:
  revision_awareness: Se siguió el estado revisado sin cambios del audit trail inglés, con acuerdo alto y solo observaciones menores. La redacción española mantiene la ambigüedad distributiva de בְּכָל y la amplitud moral de הָרָעָה sin añadir interpretación extra.
  spanish_consistency_notes:
  - Se mantiene 'Israel' y 'Benjamín' con acentuación española estándar de nombres propios bíblicos.
  - Se evita 'SEÑOR' porque el verso no contiene el Tetragrámaton ni una sustitución divina.
  - Se conserva un estilo formal y readable, con puntuación de discurso directo en español.
  - '''Entre ustedes'' traduce el valor comunitario de בָּכֶם sin volverlo excesivamente literal o arcaico.'
