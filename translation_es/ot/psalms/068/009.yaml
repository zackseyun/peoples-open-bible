    text: 'Hebrew is abrupt: ''this Sinai.'' It may mean ''before God at Sinai'' or emphasize that Sinai itself shook in God''s presence.'
    reason: alternative_reading
  - marker: b
    text: Or 'dropped' or 'poured down'; the Hebrew verb literally suggests dripping.
    reason: lexical_alternative
