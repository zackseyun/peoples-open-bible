translation:
  language: es
  text: Juntos rugen como leoncillos; gruñen[a] como cachorros de león.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «bufan». El verbo hebreo puede denotar un sonido animal áspero; «gruñen» se elige por ser la opción más natural en español dentro del paralelismo con «rugen».
    reason: lexical_alternative
lexical_decisions:
- source_word: יַחְדָּו
  english_pob_choice: Together
  chosen_spanish: Juntos
  alternatives_spanish:
  - Altoque
  - En conjunto
  - Asamblea
  lexicon: HALOT
  rationale: El adverbio expresa acción colectiva; «juntos» es natural en español y conserva la simultaneidad/unidad del hebreo sin añadir matiz ajeno.
- source_word: כְּפִרִים
  english_pob_choice: young lions
  chosen_spanish: leoncillos
  alternatives_spanish:
  - leones jóvenes
  - cachorros de león
  lexicon: HALOT
  rationale: כְּפִרִים denota leones jóvenes; «leoncillos» mantiene la imagen animal, sugiere juventud y funciona bien en poesía breve. La alternativa «leones jóvenes» es más literal, pero menos idiomática.
- source_word: יִשְׁאָגוּ
  english_pob_choice: they roar
  chosen_spanish: rugen
  alternatives_spanish:
  - rugean
  - braman
  - rugirán
  lexicon: HALOT
  rationale: El verbo es el término normal para el rugido del león. «Rugen» conserva el valor léxico directo y el paralelismo con la primera línea.
- source_word: נָעֲרוּ
  english_pob_choice: they growl
  chosen_spanish: gruñen
  alternatives_spanish:
  - bufan
  - rezongan
  - gruñirán
  lexicon: HALOT
  rationale: En este contexto animal, el hebreo describe un sonido áspero. «Gruñen» es la forma más natural en español y preserva la alternativa léxica que el inglés POB resolvió como «growl» frente a «snarl».
- source_word: גֹרֵי אֲרָיוֹת
  english_pob_choice: lion cubs
  chosen_spanish: cachorros de león
  alternatives_spanish:
  - crías de león
  - leoncillos
  lexicon: HALOT
  rationale: La construcción significa los jóvenes de los leones. «Cachorros de león» es claro y conserva el paralelismo con «leoncillos» sin borrar la variación poética entre ambas mitades.
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente del tramo inglés: no hubo cambios textuales ni de decisión léxica, y el hebreo consonante con el audit trail sostiene la equivalencia óptima ya aprobada.'
  spanish_consistency_notes:
  - Se mantiene el paralelismo poético con dos miembros breves y equivalentes.
  - No se introduce vocabulario eclesiástico ni explicativo ajeno al hebreo.
  - «Leoncillos» y «cachorros de león» conservan la distinción semántica entre los dos grupos de animales jóvenes sin sobrecargar el verso.
