review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del hebreo: Aarón presenta el macho cabrío, se identifica por la suerte asignada a Yahvé, y luego se indica su destino cultual. También preserva correctamente el nombre divino como «Yahvé» y la alternativa idiomática de עָלָה ... הַגּוֹרָל mediante una nota. Sin embargo, la cláusula final וְעָשָׂהוּ חַטָּאת no queda fielmente representada por «lo hará expiación por el pecado», porque חַטָּאת aquí en legislación sacrificial denota la ofrenda/sacrificio por el pecado, no la abstracción «expiación».'
  spanish_quality_summary: El español es mayormente claro y digno. «Entonces Aarón presentará...» funciona bien. «Macho cabrío» es aceptable y preciso, aunque algo más pesado que «cabrío» o «chivo»; no constituye un error. El principal problema de legibilidad y naturalidad está en «lo hará expiación por el pecado», giro poco idiomático en español bíblico actual y semánticamente menos exacto que «lo hará ofrenda por el pecado» o «lo ofrecerá como ofrenda por el pecado».
  glossary_alignment: Hay buena alineación con la política del proyecto en «Yahvé». La decisión sobre חַטָּאת, sin embargo, no sigue el valor sacrificial documentado en el POB inglés («sin offering»). En español, la mejor correspondencia contextual es «ofrenda por el pecado»; también podría tolerarse «sacrificio por el pecado», pero «expiación por el pecado» desplaza el término desde la ofrenda hacia su efecto.
  issues:
  - severity: high
    issue: «lo hará expiación por el pecado» no representa con precisión חַטָּאת
    rationale: En Levítico, חַטָּאת en este contexto ritual significa la ofrenda/sacrificio por el pecado. «Expiación» expresa un resultado o función, no el tipo de ofrenda que el hebreo nombra.
  - severity: medium
    issue: La formulación española de la cláusula final es poco natural
    rationale: «Lo hará expiación por el pecado» suena forzado y no es una construcción idiomática clara en español moderno. «Lo hará ofrenda por el pecado» conserva mejor la sintaxis hebrea y resulta más inteligible.
  revised_spanish_text: Entonces Aarón presentará el macho cabrío[a] sobre el cual cayó la suerte para Yahvé, y lo hará ofrenda por el pecado.
  revised_footnotes:
  - marker: a
    text: 'O: «sobre el cual salió la suerte para Yahvé».'
    reason: alternative_reading
  revision_rationale: Se mantiene la estructura y casi todo el léxico del borrador, pero se corrige la cláusula final para reflejar fielmente el valor sacrificial de חַטָּאת en este contexto. «Ofrenda por el pecado» preserva tanto el sentido del original como la decisión documentada en el POB inglés, y además mejora la naturalidad del español sin introducir una paráfrasis mayor. No se requiere adjudicación adicional, porque la corrección es textual y léxicamente directa.
