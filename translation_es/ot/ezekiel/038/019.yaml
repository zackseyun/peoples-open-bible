translation:
  language: es
  text: 'Porque en mis celos[a], en el fuego de mi ira, he hablado: seguramente en aquel día habrá un gran terremoto sobre la tierra de Israel.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'celo'. El hebreo קִנְאָה puede expresar tanto 'celos' como 'celo'; aquí se eligió 'celos' para conservar la fuerza relacional y afectiva del término.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְקִנְאָתִי
  english_pob_choice: For in my jealousy
  chosen_spanish: Porque en mi celos[a]
  alternatives_spanish:
  - Y en mi celos
  - Pues en mi celo
  - Porque en mi celo
  lexicon: HALOT
  rationale: El hebreo inicia con וּבְ, que aquí conecta con la declaración previa; por eso se usa 'Porque'. קִנְאָה puede ser 'celos' o 'celo'. En este contexto de indignación pactual, 'celos' conserva mejor la fuerza afectiva y relacional del original, aunque suena menos natural en español que 'celo'. Se mantiene la tensión semántica con una nota.
- source_word: בְאֵשׁ עֶבְרָתִי
  english_pob_choice: in the fire of my wrath
  chosen_spanish: en el fuego de mi ira
  alternatives_spanish:
  - en el fuego de mi furor
  - con el fuego de mi ira
  lexicon: HALOT
  rationale: Se conserva la imagen metafórica del fuego y se traduce עֶבְרָה como 'ira', palabra fuerte y natural en español bíblico. 'Furor' es posible, pero 'ira' mantiene mejor la correspondencia directa y el tono solemne.
- source_word: דִּבַּרְתִּי
  english_pob_choice: I have spoken
  chosen_spanish: he hablado
  alternatives_spanish:
  - hablé
  - declaro
  lexicon: HALOT
  rationale: El perfecto hebreo expresa una palabra divina completa con vigencia presente. 'He hablado' reproduce ese valor sin convertirlo en paráfrasis interpretativa.
- source_word: אִם לֹא
  english_pob_choice: surely
  chosen_spanish: seguramente
  alternatives_spanish:
  - ciertamente
  - de seguro
  lexicon: HALOT
  rationale: En este uso aseverativo, אִם לֹא no introduce una condición, sino una afirmación enfática. 'Seguramente' comunica bien esa fuerza en español actual.
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: on that day
  chosen_spanish: en aquel día
  alternatives_spanish:
  - en ese día
  - aquel día
  lexicon: HALOT
  rationale: La fórmula profética temporal se vierte de modo natural como 'en aquel día', conservando su valor de referencia escatológica o decisiva.
- source_word: יִהְיֶה
  english_pob_choice: there will be
  chosen_spanish: habrá
  alternatives_spanish:
  - existirá
  - sucederá
  lexicon: HALOT
  rationale: El verbo existencial היה con sujeto nominal se traduce con naturalidad por 'habrá' en español.
- source_word: רַעַשׁ גָּדוֹל
  english_pob_choice: a great earthquake
  chosen_spanish: un gran terremoto
  alternatives_spanish:
  - un gran temblor
  - un gran sacudimiento
  lexicon: HALOT
  rationale: רַעַשׁ puede abarcar 'temblor', 'sacudimiento' o 'terremoto'. Dado el contexto geográfico y la versión inglesa auditada, 'terremoto' es la opción más clara y idiomática en español, sin negar la amplitud del término hebreo.
- source_word: עַל אַדְמַת יִשְׂרָאֵל
  english_pob_choice: upon the land of Israel
  chosen_spanish: sobre la tierra de Israel
  alternatives_spanish:
  - sobre el suelo de Israel
  - en la tierra de Israel
  lexicon: HALOT
  rationale: אַדְמָה es 'tierra/terreno/suelo'. 'Tierra de Israel' es la forma más natural y bíblicamente comprensible en español, y עַל se mantiene como 'sobre' para conservar la imagen espacial del texto.
theological_decisions:
- issue: Lenguaje emocional divino sin atenuación
  english_pob_reading: my jealousy ... the fire of my wrath
  chosen_spanish_reading: mi celos ... el fuego de mi ira
  alternative_spanish_readings:
  - mi celo ... el fuego de mi furor
  - mi celo ... el fuego de mi ira
  rationale: El hebreo presenta el hablar divino con lenguaje afectivo fuerte. La traducción conserva esa intensidad sin suavizarla a una mera descripción impersonal de juicio. La nota de 'celos/celo' preserva la tensión léxica sin resolverla artificialmente.
  doctrine_reference: Translation philosophy §3
- issue: Voz divina en primera persona sin añadir un marcador externo
  english_pob_reading: Retain first-person divine speech without adding 'the LORD said'
  chosen_spanish_reading: Conservar la primera persona divina sin añadir un marcador de habla
  alternative_spanish_readings:
  - 'Yahvé dijo: ...'
  - 'Dice Yahvé: ...'
  rationale: El versículo continúa la voz divina del contexto inmediato. Añadir un encabezado explícito no está requerido por el hebreo de este versículo y debilitaría la continuidad del discurso.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: El texto en inglés auditado fue revisado y quedó sin cambios en el último pase; por eso la versión española sigue de cerca sus decisiones léxicas y su valoración de רַעַשׁ como 'earthquake', conservando la apertura semántica mediante la nota.
  spanish_consistency_notes:
  - Se usa 'Yahvé' como nombre divino en la política general del proyecto, pero en este versículo el hebreo está en primera persona y no requiere inserción del nombre.
  - Se conserva la metáfora de 'fuego' para אֵשׁ y no se la sustituye por una explicación abstracta.
  - '''Terremoto'' se mantiene como equivalente principal de רַעַשׁ, con la alternativa implícita preservada en la nota.'
  - La puntuación reproduce el tono solemne y la secuencia causal-asertiva del hebreo.
