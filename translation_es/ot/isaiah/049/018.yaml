review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura general del hebreo, mantiene Yahvé correctamente y conserva la metáfora nupcial de adornarse con los reunidos. Sin embargo, falla en dos puntos importantes de alineación: (1) los perfectos נִקְבְּצוּ / בָאוּ se vuelven pretéritos españoles (''se han reunido; vinieron''), lo que rompe la vividez descriptiva del llamado a mirar y descoordina la escena; ''se reúnen; vienen a ti'' o equivalente refleja mejor el cuadro profético. (2) La nota [a] está mal anclada: en el inglés la alternativa corresponde a ''an ornament'', pero en español [a] aparece sobre ''Vivo yo''. Además, ''como una novia'' suena menos preciso que ''como una esposa'' o ''como una desposada'' para el hebreo כַּכַּלָּה en este contexto de adorno nupcial.'
  spanish_quality_summary: El texto es comprensible, pero 'todos ellos se han reunido; vinieron a ti' suena temporalmente irregular y menos natural que una secuencia presente. 'a todos ellos ciertamente te los pondrás' es entendible, aunque algo cargado; una formulación más fluida mantiene mejor la dignidad literaria. También conviene reubicar la nota al sintagma 'como un adorno[a]'.
  glossary_alignment: Buena alineación con la terminología del proyecto en Yahvé. No hay otros términos doctrinales sensibles en disputa. La elección 'novia' no es incorrecta en sentido amplio, pero para כַּלָּה en un símil de adorno ritual resulta más fiel y eclesial 'esposa' o 'desposada'.
  issues:
  - severity: high
    issue: Los verbos de reunión/llegada están en tiempos españoles poco fieles al cuadro profético inmediato.
    rationale: El hebreo presenta una escena vívida tras los imperativos 'alza... y mira'; 'se han reunido; vinieron' introduce una mezcla de perfecto y pretérito que suena torpe y debilita la simultaneidad visual. 'todos ellos se reúnen; vienen a ti' preserva mejor el sentido.
  - severity: high
    issue: La nota [a] está anclada en el lugar equivocado.
    rationale: La nota explica el valor léxico de עֲדִי ('adorno/joyería'), por lo que debe aparecer en 'como un adorno[a]', no en 'Vivo yo[a]'.
  - severity: medium
    issue: '''como una novia'' es menos preciso para כַּכַּלָּה en este contexto.'
    rationale: Aunque 'novia' puede entenderse, el hebreo evoca a la mujer en calidad nupcial adornada. 'como una esposa' o 'como una desposada' suena más digno y se ajusta mejor al registro bíblico.
  - severity: low
    issue: La construcción 'a todos ellos ciertamente te los pondrás' es algo pesada.
    rationale: Puede simplificarse a 'todos ellos te los pondrás' sin pérdida de totalidad ni de fuerza, mejorando la legibilidad.
  revised_spanish_text: 'Alza tus ojos alrededor y mira: todos ellos se reúnen; vienen a ti. Vivo yo, declara Yahvé, que todos ellos te los pondrás como un adorno[a] y te los atarás como una esposa.'
  revised_footnotes:
  - marker: a
    text: O "como joyería"; el término hebreo se refiere a adorno o joyas.
    reason: lexical_alternative
  revision_rationale: Se corrigieron los tiempos verbales para reflejar mejor la escena profética vívida del hebreo, se reubicó la nota al término que realmente comenta (עֲדִי), se pulió la fluidez del objeto repetido y se ajustó כַּכַּלָּה a 'como una esposa' para un registro más fiel y digno en español. Se mantuvo Yahvé conforme a la política del proyecto.
