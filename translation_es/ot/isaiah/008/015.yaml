revisions:
- from: Y muchos entre ellos tropezarán[a]; caerán y serán quebrantados; serán atrapados en la trampa y apresados.
  to: Y muchos entre ellos tropezarán[a]; caerán y serán quebrantados; serán atrapados y capturados.
  rationale: Se corrige una expansión innecesaria en la segunda mitad del versículo para ceñirse mejor al hebreo y a la auditoría inglesa, conservando la secuencia breve y concreta de imágenes de juicio. También se ajusta la nota al pie para reflejar con precisión la alternativa documentada por el POB inglés, con pronombre singular referido a la piedra/trampa del contexto.
