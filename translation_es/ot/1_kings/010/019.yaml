    text: 'Literalmente: «el lugar de sentarse».'
    reason: lexical_alternative
  revision_rationale: Se corrigió el anclaje de la nota [a] para que corresponda al elemento superior redondeado, no a 'seis escalones'. También se mejoró la precisión léxica con 'apoyabrazos' para יָדֹת y la naturalidad del español con 'asiento' en el texto principal, preservando el literal en nota. 'Escalones' sustituye a 'gradas' por mayor naturalidad en este contexto.
