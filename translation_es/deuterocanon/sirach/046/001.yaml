  yaml_path: translation/deuterocanon/sirach/046/001.yaml
  text: Joshua son of Nun was a mighty warrior[a], Moses’ attendant in prophecy[b]; he was appointed in his days to be a great salvation for his chosen ones.
  footnotes:
