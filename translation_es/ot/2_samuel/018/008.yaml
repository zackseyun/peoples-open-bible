  text: וַ/תְּהִי שָׁ֧ם הַ/מִּלְחָמָ֛ה נפצית עַל פְּנֵ֣י כָל הָ/אָ֑רֶץ וַ/יֶּ֤רֶב הַ/יַּ֨עַר֙ לֶ/אֱכֹ֣ל בָּ/עָ֔ם מֵ/אֲשֶׁ֥ר אָכְלָ֛ה הַ/חֶ֖רֶב בַּ/יּ֥וֹם הַ/הֽוּא־־־׃
