base_translation:
  language: en
  yaml_path: translation/ot/nehemiah/002/007.yaml
  text: Then I said to the king[a], “If it pleases the king, let letters be given to me for the governors Beyond the River[c][b], so that they may let me pass through until I come to Judah.”
  footnotes:
