translation:
  language: es
  text: Porque Yahvé había cerrado por completo todo vientre en la familia de Abimelec a causa de Sara[a], la esposa de Abraham.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «había cerrado seguramente» o «había cerrado del todo». El hebreo usa un infinitivo absoluto con el verbo finito para dar énfasis.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  - Porque entonces
  lexicon: HALOT
  rationale: Introduces la explicación causal del versículo anterior; en español, «porque» expresa con naturalidad esa relación de fundamento.
- source_word: עָצֹר עָצַר
  english_pob_choice: had completely closed
  chosen_spanish: había cerrado por completo
  alternatives_spanish:
  - había cerrado seguramente
  - había cerrado del todo
  - había restringido por completo
  lexicon: HALOT
  rationale: La combinación infinitivo absoluto + verbo finito intensifica la acción; «había cerrado por completo» conserva ese énfasis sin volverlo forzado en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se usa el nombre divino en su forma española establecida por el proyecto, preservando el Tetragrámaton como nombre propio y no como título.
- source_word: בְּעַד כָּל רֶחֶם
  english_pob_choice: every womb
  chosen_spanish: todo vientre
  alternatives_spanish:
  - cada vientre
  - toda matriz
  lexicon: HALOT
  rationale: «Vientre» mantiene la imagen corporal concreta del hebreo y funciona de modo natural en español; «todo» conserva el alcance colectivo.
- source_word: לְבֵית אֲבִימֶלֶךְ
  english_pob_choice: in Abimelech’s household
  chosen_spanish: en la casa de Abimelec
  alternatives_spanish:
  - en la casa de Abimelec
  - en la familia de Abimelec
  - en el hogar de Abimelec
  lexicon: HALOT
  rationale: «Casa» traduce el ámbito doméstico/patrimonial del hebreo; «en la casa de Abimelec» es claro y fiel al uso bíblico.
- source_word: עַל דְּבַר
  english_pob_choice: because of
  chosen_spanish: a causa de
  alternatives_spanish:
  - por
  - por motivo de
  - debido a
  lexicon: HALOT
  rationale: El sintagma introduce la causa de la acción judicial; «a causa de» reproduce bien el valor causal sin añadir matices extra.
- source_word: שָׂרָה אֵשֶׁת אַבְרָהָם
  english_pob_choice: Sarah, Abraham’s wife
  chosen_spanish: Sara, la esposa de Abraham
  alternatives_spanish:
  - Sara, mujer de Abraham
  - Sara, la mujer de Abraham
  lexicon: HALOT
  rationale: La construcción de relación posesiva se expresa de forma natural con «la esposa de Abraham», manteniendo el vínculo identificador central en la narración.
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: El texto hebreo usa directamente el nombre divino; se conserva como nombre propio en español, conforme a la política del proyecto y sin sustituirlo por un título enmascarador.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Collective bodily expression רֶחֶם
  english_pob_reading: every womb
  chosen_spanish_reading: todo vientre
  alternative_spanish_readings:
  - toda matriz
  - cada vientre
  rationale: Se preserva la concreción del hebreo sin abstraerlo a «esterilidad»; el texto habla del cierre de vientres, no solo del resultado.
  doctrine_reference: Lexical consistency — preserve concrete bodily imagery where the source does so
translation_notes:
  revision_awareness: Se revisó el tramo con el control de consistencia más reciente y no se requerían cambios sustanciales; la única corrección necesaria fue anclar la nota alternativa al marcador presente en el texto español.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de acuerdo con la terminología base del proyecto.
  - «Casa de Abimelec» conserva el valor de ámbito doméstico/patrimonial del hebreo.
  - «Esposa de Abraham» evita una paráfrasis más libre y sigue la relación identificadora del texto fuente.
  - Se conserva la imaginería corporal con «vientre» en vez de abstraer el término.
