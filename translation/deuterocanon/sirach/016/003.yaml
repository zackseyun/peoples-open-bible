theological_decisions:
- issue: Implicit object of 'does what is pleasing'
  chosen_reading: Leave the object implicit rather than adding 'to God' in the main text.
  alternative_readings:
  - one who does God's will is better than a thousand
  - one righteous person is better than a thousand
  rationale: The Hebrew phrase עֹשֶׂה רָצוֹן suggests doing what is acceptable or according to will, likely with divine reference in wisdom context, but the text does not explicitly state 'God.' To avoid importing an unstated object, the main text keeps the phrase general while preserving the likely theological force.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Value judgment about childlessness versus many wicked children
  chosen_reading: Retain the stark comparison without softening it.
  alternative_readings:
  - better to die without children than to have ungodly children
  - better childless death than many wicked sons
  rationale: The verse makes a blunt wisdom claim prioritizing righteousness over numerous descendants. The translation preserves that tension and does not mitigate it for modern sensibilities.
  doctrine_reference: Translation philosophy §§1, 3, 6
