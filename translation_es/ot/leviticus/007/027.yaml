translation:
  language: es
  text: Toda persona[a] que coma cualquier sangre, esa persona será cortada[b] de entre su pueblo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «alma». En hebreo, nephesh aquí designa al individuo concreto.
    reason: lexical_alternative
  - marker: b
    text: La expresión «será cortada» es una fórmula pactual/judicial estable; puede implicar exclusión de la comunidad o juicio divino, pero el hebreo no especifica el modo exacto.
    reason: alternative_reading
lexical_decisions:
- source_word: נֶפֶשׁ
  english_pob_choice: person
  chosen_spanish: persona
  alternatives_spanish:
  - alma
  - vida
  - ser
  lexicon: HALOT
  rationale: En material legal, נֶפֶשׁ suele referirse al individuo concreto, no al “alma” en sentido inmortal. “Persona” conserva el valor jurídico y la referencia individual de manera natural en español.
- source_word: תֹּאכַל
  english_pob_choice: eats
  chosen_spanish: coma
  alternatives_spanish:
  - come
  - comiere
  lexicon: HALOT
  rationale: El imperfecto hebreo en esta cláusula relativa expresa un caso general. En español legal, el subjuntivo presente “coma” comunica bien la condición general sin endurecer el tiempo verbal.
- source_word: כָּל דָּם
  english_pob_choice: any blood
  chosen_spanish: sangre alguna
  alternatives_spanish:
  - toda sangre
  - cualquier sangre
  - sangre de cualquier clase
  lexicon: HALOT
  rationale: La combinación con כָּל no apunta a una suma total de “toda sangre”, sino a sangre en cualquier caso o forma. “Sangre alguna” preserva el matiz distributivo en español idiomático.
- source_word: וְנִכְרְתָה
  english_pob_choice: shall be cut off
  chosen_spanish: será cortada
  alternatives_spanish:
  - será excluida
  - será apartada
  - será eliminada
  lexicon: HALOT
  rationale: Se conserva la fórmula sancionadora tradicional con el verbo “cortar” para no resolver la ambigüedad del hebreo. “Será cortada” mantiene la imagen jurídica sin especificar si implica muerte, exclusión o juicio divino.
- source_word: הַנֶּפֶשׁ הַהִוא
  english_pob_choice: that person
  chosen_spanish: esa persona
  alternatives_spanish:
  - esa alma
  - esa vida
  - aquel individuo
  lexicon: HALOT
  rationale: La repetición enfática del sustantivo se resume naturalmente con “esa persona”, que refleja la referencia legal al mismo sujeto infractor.
- source_word: מֵעַמֶּיהָ
  english_pob_choice: from his people
  chosen_spanish: de entre su pueblo
  alternatives_spanish:
  - de entre sus gentes
  - de su pueblo
  - de entre su comunidad
  lexicon: HALOT
  rationale: El sufijo femenino de hebreo concuerda con נֶפֶשׁ, pero el valor es genérico. “De entre su pueblo” reproduce la fórmula comunitaria y mantiene la ambigüedad de si la sanción es exclusión, separación o juicio.
theological_decisions:
- issue: Alcance de la sanción de כרת
  english_pob_reading: Retain the formal expression 'shall be cut off' without specifying death, excommunication, or divine judgment.
  chosen_spanish_reading: Conservar la fórmula “será cortada” sin determinar si implica muerte, exclusión de la comunidad o juicio divino.
  alternative_spanish_readings:
  - será ejecutada
  - será expulsada de la comunidad
  - será destruida por Dios
  rationale: El hebreo es deliberadamente conciso y deja abierta la naturaleza exacta de la sanción. La traducción española debe preservar esa tensión, no resolverla por anticipado.
  doctrine_reference: Preservar la tensión interpretativa del texto legal sin imponer una lectura dogmática.
translation_notes:
  revision_awareness: El texto sigue de cerca la lectura auditada en inglés POB y mantiene sin resolver la ambigüedad lexical y teológica de נֶפֶשׁ y כרת, sin introducir aclaraciones que el hebreo no exprese. No se reportan revisiones posteriores que alteren esta forma.
  spanish_consistency_notes:
  - Se usa “persona” para נֶפֶשׁ conforme al uso legal del hebreo, evitando “alma” en el texto principal.
  - Se mantiene “será cortada” para כרת como fórmula estable de sanción, sin precisar la modalidad.
  - “De entre su pueblo” reproduce la fórmula comunitaria sin reinterpretarla como mera expulsión.
  - Los marcadores de nota [a] y [b] aparecen en el texto exactamente donde corresponden.
