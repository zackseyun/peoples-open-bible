translation:
  language: es
  text: 'Sucedió en los días de Ahasuero[a] —este es el Ahasuero que reinó desde India hasta Cus[b], sobre ciento veintisiete provincias—:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Jerjes», si el nombre se entiende como el rey persa históricamente identificado y no como una transliteración directa del hebreo.
    reason: alternative_reading
  - marker: b
    text: «Cus» es el antiguo nombre regional; algunas traducciones lo vierten como «Etiopía».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: Now it happened
  chosen_spanish: Y aconteció
  alternatives_spanish:
  - Y sucedió
  - Y ocurrió
  lexicon: HALOT
  rationale: La forma narrativa hebrea introduce el relato de modo seco y convencional; «aconteció» conserva ese tono sin sonar arcaica, y «Y» mantiene la continuidad narrativa del hebreo.
- source_word: בִּימֵי
  english_pob_choice: in the days of
  chosen_spanish: en los días de
  alternatives_spanish:
  - durante el tiempo de
  lexicon: HALOT
  rationale: Es una locución temporal estable en español bíblico y refleja de cerca la expresión hebrea sin forzarla.
- source_word: אֲחַשְׁוֵרוֹשׁ
  english_pob_choice: Ahasuerus
  chosen_spanish: Ahasuero
  alternatives_spanish:
  - Jerjes
  lexicon: HALOT
  rationale: Se conserva la transliteración tradicional del nombre hebreo. «Jerjes» sería una identificación histórica interpretativa, no una rendición directa del forma hebrea.
- source_word: ה֣וּא אֲחַשְׁוֵר֗וֹשׁ
  english_pob_choice: the Ahasuerus
  chosen_spanish: el mismo Ahasuero
  alternatives_spanish:
  - ese Ahasuero
  - Ahasuero mismo
  lexicon: HALOT
  rationale: La repetición con pronombre funciona de modo identificador y enfático; «el mismo Ahasuero» comunica esa especificación en español con naturalidad.
- source_word: הַמֹּלֵךְ
  english_pob_choice: who reigned
  chosen_spanish: que reinaba
  alternatives_spanish:
  - que gobernaba
  - el que reinaba
  lexicon: HALOT
  rationale: El participio hebreo caracteriza al rey por su condición de gobernante en curso; «reinaba» conserva el valor descriptivo y temporal.
- source_word: מֵהֹדּוּ וְעַד כּוּשׁ
  english_pob_choice: from India to Cush
  chosen_spanish: desde India hasta Cus
  alternatives_spanish:
  - desde India hasta Etiopía
  - desde Hodu hasta Cus
  lexicon: HALOT
  rationale: «India» sigue la decisión inglesa documentada para הֹדּוּ; «Cus» preserva el nombre antiguo כּוּשׁ sin sustituirlo por una equivalencia moderna que puede oscurecer el referente histórico.
- source_word: שֶׁבַע וְעֶשְׂרִים וּמֵאָה
  english_pob_choice: one hundred twenty-seven
  chosen_spanish: ciento veintisiete
  alternatives_spanish:
  - ciento veintisiete en número
  - '127'
  lexicon: HALOT
  rationale: Es la forma numérica natural en español y corresponde al orden idiomático del valor hebreo.
- source_word: מְדִינָה
  english_pob_choice: provinces
  chosen_spanish: provincias
  alternatives_spanish:
  - distritos
  - regiones administrativas
  lexicon: HALOT
  rationale: En el contexto imperial persa, «provincias» es el equivalente más claro y establecido en español, igual que en la decisión inglesa auditada.
theological_decisions:
- issue: Nombre divino no presente en el verso
  english_pob_reading: No theological term requiring special handling appears in this verse.
  chosen_spanish_reading: No aparece un término teológico que requiera tratamiento especial en este versículo.
  rationale: El versículo es puramente narrativo e histórico; no introduce cuestiones doctrinales específicas de traducción.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: Se siguió el pasaje hebreo WLC y el registro auditado en inglés. No hubo revisiones aplicadas en la versión inglesa más reciente, y el consenso de revisión fue de alta concordancia; por eso la versión española mantiene la estructura narrativa y las decisiones léxicas principales sin introducir interpretaciones nuevas.
  spanish_consistency_notes:
  - Se mantuvo «Ahasuero» como transliteración tradicional uniforme del nombre propio.
  - Se preservó «Cus» para כּוּשׁ, en paralelo con la decisión inglesa de conservar el nombre geográfico antiguo.
  - Se eligió «provincias» para מְדִינָה por consistencia con el uso imperial persa y la auditoría inglesa.
  - La puntuación con coma y guiones no se usó para imitar mecánicamente el inglés; se adaptó a la sintaxis natural del español.
