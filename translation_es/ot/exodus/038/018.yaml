    text: O «cortina» para la entrada del atrio.
    reason: lexical_alternative
  - marker: b
    text: Hebreo «azul, púrpura y carmesí»; el texto nombra materiales o tintes textiles, por lo que en español no es necesario añadir «hilo».
    reason: lexical_alternative
  - marker: c
    text: O «cinco codos de alto, por anchura», una expresión dimensional hebrea que probablemente indica que la pantalla igualaba la altura de las colgaduras del atrio.
    reason: alternative_reading
  revision_rationale: Se corrige el anclaje de la nota b para que corresponda a la serie cromática, se añade la nota c exigida por la dificultad textual conservada en el POB inglés, y se ajusta «cortinas» a «colgaduras» para reflejar mejor קַלְעֵי הֶחָצֵר y mantener la distinción con מָסַךְ. El resto del texto puede conservarse.
