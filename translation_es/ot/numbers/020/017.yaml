translation:
  language: es
  text: Te rogamos que nos dejes pasar por tu tierra[a]. No pasaremos por campo ni por viña, ni beberemos agua de un pozo. Iremos por el camino del rey[b]; no nos desviaremos a la derecha ni a la izquierda hasta haber pasado tu frontera.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «el camino del rey» o «la calzada del rey».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «tu frontera»; la frase implica pasar más allá del límite de tu territorio.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נַעְבְּרָה נָּא
  english_pob_choice: Please let us pass
  chosen_spanish: Te rogamos que nos dejes pasar
  alternatives_spanish:
  - Por favor, déjanos pasar
  - Te pedimos que nos dejes pasar
  lexicon: HALOT
  rationale: El cohortativo con נָא expresa una petición cortés. En español, «Te rogamos» conserva la súplica respetuosa; «dejes pasar» mantiene el valor de tránsito de עבר sin volverlo mecánico.
- source_word: בְאַרְצֶךָ
  english_pob_choice: through your land
  chosen_spanish: por tu tierra
  alternatives_spanish:
  - en tu tierra
  - por tu país
  lexicon: HALOT
  rationale: Con עבר, la preposición puede indicar movimiento a través de un territorio. «Por tu tierra» es natural en español y conserva el sentido territorial de אֶרֶץ sin endurecerlo como «país».
- source_word: לֹא נַעֲבֹר בְּשָׂדֶה וּבְכֶרֶם
  english_pob_choice: We will not pass through field or vineyard
  chosen_spanish: No pasaremos por campo ni por viña
  alternatives_spanish:
  - No pasaremos por ningún campo ni viñedo
  - No cruzaremos campos ni viñas
  lexicon: HALOT
  rationale: Los sustantivos singulares funcionan genéricamente. «Campo ni viña» reproduce esa genericidad en un español fluido y evita añadir pluralidad no presente en el hebreo.
- source_word: וְלֹא נִשְׁתֶּה מֵי בְאֵר
  english_pob_choice: and we will not drink water from a well
  chosen_spanish: ni beberemos agua de un pozo
  alternatives_spanish:
  - ni beberemos agua del pozo
  - ni beberemos agua de un manantial
  lexicon: HALOT
  rationale: מֵי בְאֵר es literalmente «agua de pozo». «Agua de un pozo» conserva el sustantivo sin forzar un calco pesado; el artículo indefinido refleja el hebreo genérico.
- source_word: דֶּרֶךְ הַמֶּלֶךְ
  english_pob_choice: the king’s road
  chosen_spanish: el camino del rey
  alternatives_spanish:
  - la vía del rey
  - el camino real
  lexicon: HALOT
  rationale: La expresión es «camino/vía del rey». «Camino del rey» mantiene la estructura posesiva y resulta más transparente que «camino real», que en español puede sonar a título honorífico o a una ruta histórica específica.
- source_word: נֵלֵךְ
  english_pob_choice: We will go by
  chosen_spanish: Iremos por
  alternatives_spanish:
  - Seguiremos por
  - Caminaremos por
  lexicon: HALOT
  rationale: הלך describe desplazamiento por una ruta establecida. «Iremos por» es breve y natural, y conserva la idea de tránsito por el camino señalado.
- source_word: לֹא נִטֶּה יָמִין וּשְׂמֹאול
  english_pob_choice: we will not turn to the right or to the left
  chosen_spanish: no nos desviaremos a la derecha ni a la izquierda
  alternatives_spanish:
  - no giraremos a la derecha ni a la izquierda
  - no nos apartaremos ni a derecha ni a izquierda
  lexicon: HALOT
  rationale: Es un idiomático de no apartarse del trayecto. «Desviaremos» comunica bien la fidelidad al camino y evita una literalidad rígida.
- source_word: עַד אֲשֶׁר נַעֲבֹר גְּבוּלֶךָ
  english_pob_choice: until we have passed through your border
  chosen_spanish: hasta haber pasado tu frontera
  alternatives_spanish:
  - hasta que hayamos pasado tu frontera
  - hasta cruzar tu límite
  lexicon: HALOT
  rationale: גְּבוּל puede significar «frontera», «límite» o «territorio». «Frontera» conserva la imagen de un borde territorial; la elección de «haber pasado» mantiene el eco de עבר y la culminación del trayecto.
translation_notes:
  revision_awareness: El pasaje presenta un alto acuerdo con el texto base y la auditoría inglesa; no se detectaron revisiones aplicadas en el registro reciente. La principal decisión fue mantener la fuerza cortés del ruego inicial, y resolver דֶּרֶךְ הַמֶּלֶךְ con una forma española transparente sin perder la posible lectura alternativa tradicional.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se tradujo עבר de manera consistente con un matiz de tránsito/paso, preservando su repetición en el verso.
  - «Tierra» y «frontera» se diferenciaron para reflejar אֶרֶץ y גְּבוּל sin colapsar ambos en un solo término.
  - Se evitó «SEÑOR» y «camino real» por tratarse de decisiones no requeridas por el hebreo y potencialmente ambiguas en español.
