id: 1SA.22.8
reference: 1 Samuel 22:8
source:
  edition: WLC
  text: כִּי֩ קְשַׁרְתֶּ֨ם כֻּלְּ/כֶ֜ם עָלַ֗/י וְ/אֵין גֹּלֶ֤ה אֶת אָזְנִ/י֙ בִּ/כְרָת בְּנִ֣/י עִם בֶּן יִשַׁ֔י וְ/אֵין חֹלֶ֥ה מִ/כֶּ֛ם עָלַ֖/י וְ/גֹלֶ֣ה אֶת אָזְנִ֑/י כִּ֣י הֵקִים֩ בְּנִ֨/י אֶת עַבְדִּ֥/י עָלַ֛/י לְ/אֹרֵ֖ב כַּ/יּ֥וֹם הַ/זֶּֽה־־־־־־־־׃ס
translation:
  text: For all of you have conspired against me[a], and no one informs me when my son makes a covenant with the son of Jesse, and none of you is grieved for me or informs me that my son has stirred up my servant against me to lie in wait[d][c][b], as at this day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'uncovers my ear,' an idiom meaning 'informs me' or 'reveals it to me.'
    reason: lexical_alternative
  - marker: b
    text: Or 'none of you is sorry for me' / 'none of you cares about me.'
    reason: lexical_alternative
  - marker: c
    text: '''The son of Jesse'' refers to David; Saul uses the patronymic rather than David''s name.'
    reason: cultural_note
  - marker: d
    text: Or 'has raised up my servant against me for an ambush.'
    reason: lexical_alternative
lexical_decisions:
- source_word: קְשַׁרְתֶּם
  chosen: have conspired
  alternatives:
  - have plotted
  - have bound yourselves together
  lexicon: HALOT
  rationale: קשר in this context denotes conspiracy or treasonous plotting against Saul, not merely a neutral alliance. 'Have conspired' captures the hostile force of the accusation.
- source_word: גֹּלֶה אֶת אָזְנִי
  chosen: informs me
  alternatives:
  - uncovers my ear
  - tells me
  lexicon: HALOT
  rationale: The idiom 'uncover the ear' means to disclose information. 'Informs me' is natural English while preserving the sense of revelation.
- source_word: בִּכְרָת
  chosen: when ... makes
  alternatives:
  - at the making of
  - in cutting
  lexicon: HALOT
  rationale: 'The infinitive construct with ב marks the circumstance/time: ''when my son makes a covenant.'' Rendering the idiom smoothly in English is preferable to a wooden ''in cutting''.'
- source_word: בְּנִי עִם בֶּן יִשַׁי
  chosen: my son makes a covenant with the son of Jesse
  alternatives:
  - my son covenants with the son of Jesse
  lexicon: HALOT
  rationale: Saul refers to Jonathan and to David by patronymic. 'The son of Jesse' preserves Saul's distancing, dismissive way of speaking about David.
- source_word: חֹלֶה ... עָלַי
  chosen: is grieved for me
  alternatives:
  - is sorry for me
  - has concern for me
  - is sick over me
  lexicon: HALOT
  rationale: The participle from חלה here expresses sympathetic concern or distress on Saul's behalf, not literal illness. 'Is grieved for me' conveys emotional concern in idiomatic English.
- source_word: הֵקִים
  chosen: has stirred up
  alternatives:
  - has raised up
  - has set up
  lexicon: HALOT
  rationale: In context Saul alleges that Jonathan has incited Saul's servant David against him. 'Has stirred up' best reflects hostile instigation.
- source_word: עַבְדִּי
  chosen: my servant
  alternatives:
  - my slave
  lexicon: HALOT
  rationale: Although עבד can denote slave or servant, here Saul speaks of David as his royal subordinate/court servant rather than emphasizing chattel status. 'My servant' fits the political relationship.
- source_word: לְאֹרֵב
  chosen: to lie in wait
  alternatives:
  - as an ambusher
  - for an ambush
  lexicon: HALOT
  rationale: The infinitive/participle from ארב conveys ambush or lying in wait. The verbal English phrase is the most natural fit after 'has stirred up my servant against me.'
- source_word: כַּיּוֹם הַזֶּה
  chosen: as at this day
  alternatives:
  - as is the case today
  - as on this day
  lexicon: HALOT
  rationale: This idiom points to the present state of affairs. 'As at this day' preserves the formal rhetorical tone of Saul's speech while remaining intelligible.
