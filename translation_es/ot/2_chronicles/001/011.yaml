translation:
  language: es
  text: 'Y Dios dijo a Salomón: «Porque esto estaba en tu corazón, y no pediste riqueza, posesiones ni honor, ni la vida de los que te odian, ni tampoco pediste muchos días[a], sino que pediste para ti sabiduría y conocimiento, para que juzgaras a mi pueblo, del cual te he hecho rey»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'larga vida', por 'muchos días'.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: HALOT
  rationale: El hebreo usa אֱלֹהִים, no el nombre divino; por eso se conserva 'Dios' y no una máscara como 'SEÑOR' o 'Yahvé'.
- source_word: יַעַן אֲשֶׁר
  english_pob_choice: Because
  chosen_spanish: Porque
  alternatives_spanish:
  - Puesto que
  - Ya que
  lexicon: HALOT
  rationale: Introduce la razón de la respuesta divina con una causal natural en español, sin perder la fuerza explicativa del hebreo.
- source_word: הָיְתָה זֹאת עִם לְבָבֶךָ
  english_pob_choice: this was in your heart
  chosen_spanish: esto estaba en tu corazón
  alternatives_spanish:
  - esto estaba con tu corazón
  - esto era tu intención
  lexicon: HALOT
  rationale: Se mantiene la imagen interna del corazón como sede de intención o deseo, sin volverla más interpretativa de lo que permite el texto.
- source_word: שָׁאַלְתָּ
  english_pob_choice: ask
  chosen_spanish: pediste
  alternatives_spanish:
  - solicitaste
  - pediste para ti
  lexicon: HALOT
  rationale: '''Pedir'' es el verbo natural en español para la repetición del hebreo שָׁאַל; evita un tono técnico innecesario.'
- source_word: עֹשֶׁר
  english_pob_choice: wealth
  chosen_spanish: riqueza
  alternatives_spanish:
  - riquezas
  lexicon: HALOT
  rationale: '''Riqueza'' comunica bien el sustantivo abstracto en español y encaja con la lista de bienes no solicitados.'
- source_word: נְכָסִים
  english_pob_choice: possessions
  chosen_spanish: posesiones
  alternatives_spanish:
  - bienes
  - propiedades
  lexicon: HALOT
  rationale: Se diferencia de 'riqueza' con un término concreto y ampliamente comprensible.
- source_word: כָבוֹד
  english_pob_choice: honor
  chosen_spanish: honor
  alternatives_spanish:
  - gloria
  lexicon: HALOT
  rationale: En este contexto real, el término apunta a prestigio y estima; 'honor' mantiene esa fuerza con claridad.
- source_word: נֶפֶשׁ שֹׂנְאֶיךָ
  english_pob_choice: the life of those who hate you
  chosen_spanish: la vida de los que te odian
  alternatives_spanish:
  - la vida de tus enemigos
  - la vida de quienes te aborrecen
  lexicon: HALOT
  rationale: '''נֶפֶשׁ'' aquí se refiere a la vida de personas concretas; se conserva la relación participial ''los que te odian'' que sigue de cerca el hebreo.'
- source_word: יָמִים רַבִּים
  english_pob_choice: many days
  chosen_spanish: muchos días
  alternatives_spanish:
  - larga vida
  - muchos años
  lexicon: HALOT
  rationale: Se mantiene la literalidad de la expresión hebrea, que el audit trail inglés también preserva en el texto principal.
- source_word: חָכְמָה
  english_pob_choice: wisdom
  chosen_spanish: sabiduría
  alternatives_spanish:
  - prudencia
  lexicon: HALOT
  rationale: La equivalencia más estable y directa en español es 'sabiduría'.
- source_word: וּמַדָּע
  english_pob_choice: knowledge
  chosen_spanish: conocimiento
  alternatives_spanish:
  - entendimiento
  lexicon: HALOT
  rationale: Se conserva la distinción respecto de חָכְמָה con 'conocimiento', que no diluye el par conceptual.
- source_word: לְךָ
  english_pob_choice: for yourself
  chosen_spanish: para ti
  alternatives_spanish:
  - para ti mismo
  - para tu propio beneficio
  lexicon: HALOT
  rationale: El dativo refleja que la sabiduría y el conocimiento eran para su propia investidura; en español basta con 'para ti' para marcar el destinatario.
- source_word: אֲשֶׁר תִּשְׁפּוֹט
  english_pob_choice: that you might judge
  chosen_spanish: para que juzgaras
  alternatives_spanish:
  - para que gobernaras
  - con el fin de que juzgaras
  lexicon: HALOT
  rationale: '''Juzgar'' preserva el verbo hebreo y el contexto de gobierno; la subordinada final expresa el propósito en español con naturalidad.'
- source_word: עַמִּי
  english_pob_choice: my people
  chosen_spanish: mi pueblo
  alternatives_spanish:
  - mi nación
  lexicon: HALOT
  rationale: Traducción directa y estable del posesivo divino en el contexto del rey delegado por Dios.
- source_word: הִמְלַכְתִּיךָ עָלָיו
  english_pob_choice: I have made you king over
  chosen_spanish: te he hecho rey sobre
  alternatives_spanish:
  - te he coronado sobre
  - te he establecido como rey sobre
  lexicon: HALOT
  rationale: La forma causativa de מלך se expresa con precisión mediante 'hacer rey'; 'sobre' conserva la relación de autoridad.
theological_decisions:
- issue: Identidad del hablante divino
  english_pob_reading: God said
  chosen_spanish_reading: Y Dios dijo
  alternative_spanish_readings:
  - Y Yahvé dijo
  rationale: El hebreo dice אֱלֹהִים, no YHWH; por eso se mantiene 'Dios' y no el nombre divino ocultado por tradición.
  doctrine_reference: 'DOCTRINE.md: original-language primacy; YHWH must be represented only where it appears in the source.'
translation_notes:
  revision_awareness: La versión inglesa revisada ajustó las conjunciones para mayor naturalidad ('nor did you ask', 'that you might judge'). La redacción española ya incorpora esa relación coordinada con 'ni... ni tampoco...' y una final 'para que juzgaras', sin necesidad de nota textual adicional.
  spanish_consistency_notes:
  - Se mantuvo la distinción entre 'riqueza' y 'posesiones' para reflejar עֹשֶׁר / נְכָסִים.
  - Se conservó 'honor' y no 'gloria' por el contexto real y la lista de bienes.
  - Se eligió 'conocimiento' para מַדָּע para no fusionarlo con 'sabiduría'.
  - No se introdujo 'Yahvé' porque el verso usa אֱלֹהִים.
  - Se tradujo 'juzgar' en vez de 'gobernar' para respetar el verbo hebreo, aunque el contexto sea real.
