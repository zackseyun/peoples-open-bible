review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el arameo y el rastro de auditoría en casi todo: conserva el valor causal de לָקֳבֵל, la entrada de la reina al salón del banquete, el doble verbo de habla, la fórmula cortesana al rey, los ''pensamientos'' como sujeto del temor, y el ''semblante'' que no debe cambiar. Sin embargo, la nota a marca una alternativa no respaldada por la auditoría inglesa: ''ante las palabras'' no corresponde bien al valor causal/ocasional preferido y desplaza el sentido hacia presencia o inmediatez espacial/temporal. Además, la nota b fue movida desde el problema léxico de ''semblante/brightnesses/change'' hacia alternativas de ''te aterroricen'', perdiendo la razón documentada principal.'
  spanish_quality_summary: 'El español es claro, digno y natural. ''Sala del banquete'', ''la reina habló y dijo'', ''tus pensamientos te aterroricen'' y ''tu semblante'' son legibles y apropiados. Conviene un pequeño ajuste estilístico en el vocativo: ''¡Oh rey, vive para siempre!'' o ''¡Rey, vive para siempre!'' ambos funcionan; el actual es aceptable. La corrección necesaria es sobre todo de notas, no del texto base.'
  glossary_alignment: 'No hay conflictos con la terminología teológica del proyecto. El vocabulario principal está bien alineado con las decisiones léxicas del POB: ''nobles'', ''semblante'', ''cambie''. La excepción problemática es la nota a, que introduce una alternativa española (''ante'') no alineada con la decisión inglesa documentada (''Because of'' con alternativas ''in response to'' o ''before'').'
  issues:
  - severity: medium
    issue: La nota [a] ofrece 'ante las palabras...' como alternativa.
    rationale: La auditoría inglesa documenta como alternativas 'in response to' y 'before', mientras que la elección principal es causal. 'Ante' en español no reproduce bien ni el valor causal ni de respuesta, y puede sugerir mera presencia o reacción espacial.
  - severity: medium
    issue: La nota [b] comenta el verbo 'te aterroricen' en lugar del sintagma 'tu semblante cambie'.
    rationale: La nota del POB preserva la alternativa literal relacionada con 'brightnesses/countenance' y el cambio de apariencia facial. El borrador español perdió esa justificación léxica central y trasladó la nota a un punto menos necesario, ya que 'te aterroricen' ya sigue la decisión principal auditada.
  revised_spanish_text: 'A causa de las palabras del rey y de sus nobles, la reina entró en la sala del banquete. La reina habló y dijo: «¡Rey, vive para siempre! No dejes que tus pensamientos te aterroricen, ni que cambie tu semblante[a]».'
  revised_footnotes:
  - marker: a
    text: Lit. «tus resplandores no cambien», un modismo que se refiere a la apariencia del rostro; compárese la expresión semejante en este capítulo para un rostro cuyo color cambia por miedo.
    reason: lexical_alternative
  revision_rationale: 'Se aprueba el texto base con una reparación menor: se elimina la nota causal inadecuada y se restituye una nota léxica en el lugar documentado por la auditoría, sobre ''semblante'' / ''resplandores'' / ''cambie''. No hace falta cambiar la redacción principal del versículo salvo anclar correctamente la nota.'
