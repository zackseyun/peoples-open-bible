translation:
  language: es
  text: 'Abraham le dijo[a]: «Ten cuidado de no llevar a mi hijo de vuelta allí».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «llevar a mi hijo de regreso allí». El verbo hebreo es causativo: «causar que regrese» o «hacer regresar».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: said
  chosen_spanish: le dijo
  alternatives_spanish:
  - dijo
  - le habló
  lexicon: HALOT
  rationale: El wayyiqtol narrativo de אמר se expresa naturalmente en español con el pasado simple. Añadir el dativo indirecto 'le' refleja con claridad la referencia a la persona a quien Abraham se dirige, sin recargar el texto.
- source_word: אֵלָיו
  english_pob_choice: to him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  lexicon: HALOT
  rationale: El sufijo pronominal de 3ms marca complemento indirecto. En español, el clítico 'le' comunica mejor la relación directa del discurso narrativo que repetir 'a él' dentro de la cita.
- source_word: הִשָּׁמֶר לְךָ
  english_pob_choice: Be careful
  chosen_spanish: Ten cuidado
  alternatives_spanish:
  - Cuídate
  - Guárdate
  - Ten precaución
  lexicon: HALOT
  rationale: El imperativo nifal con dativo ético tiene fuerza exhortativa y preventiva. 'Ten cuidado' transmite bien la advertencia idiomática en español moderno sin perder el matiz de vigilancia personal.
- source_word: פֶּן
  english_pob_choice: that ... not
  chosen_spanish: de no
  alternatives_spanish:
  - para que no
  - no sea que
  lexicon: HALOT
  rationale: פֶּן introduce una cláusula negativa de prevención. En español, 'de no' integrado en 'Ten cuidado de no...' reproduce el valor de advertencia de manera natural y fiel al contexto.
- source_word: תָּשִׁיב
  english_pob_choice: take ... back
  chosen_spanish: llevar de vuelta
  alternatives_spanish:
  - devolver
  - hacer regresar
  - traer de vuelta
  lexicon: HALOT
  rationale: 'El hiphil de שוב es causativo: ''hacer volver / causar regresar''. En este contexto de viaje, ''llevar de vuelta'' expresa la acción causativa de retorno sin sugerir una devolución abstracta de objeto. Mantiene la tensión lexical frente a alternativas como ''devolver'' o ''traer de vuelta''.'
- source_word: אֶת־בְּנִי
  english_pob_choice: my son
  chosen_spanish: mi hijo
  alternatives_spanish:
  - mi hijo varón
  - mi muchacho
  lexicon: HALOT
  rationale: אֶת marca el objeto directo y בְּנִי, con sufijo de 1cs, es literalmente 'mi hijo'. 'Mi hijo' es la forma más transparente y natural en español.
- source_word: שָׁמָּה
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  - hasta allí
  lexicon: HALOT
  rationale: El adverbio direccional puede verterse como 'allí' o 'hasta allí'. En la cita, 'hasta allí' conserva el matiz direccional del hebreo y encaja con el verbo de movimiento.
translation_notes:
  revision_awareness: La versión española sigue el sentido y la estructura del hebreo con el apoyo del audit trail inglés. Se conserva la advertencia preventiva y se explicita en nota la alternativa causal del hiphil de שוב, que el inglés POB resolvió como 'take ... back'.
  spanish_consistency_notes:
  - Se mantiene 'Abraham' como nombre propio sin transliteración adicional.
  - Se usa 'mi hijo' para reflejar el sufijo posesivo hebreo y la naturalidad del español.
  - La cita directa conserva un tono sobrio y bíblico, pero con sintaxis contemporánea.
  - '''Allí'' en la nota se reserva como alternativa breve; en el texto principal se prefirió ''hasta allí'' por su fuerza direccional.'
