translation:
  language: es
  text: al que dividió el Mar de Juncos en partes[a], porque su amor fiel permanece para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Tradicionalmente, «Mar Rojo». El hebreo dice «Mar de Juncos».
    reason: alternative_reading
lexical_decisions:
- source_word: לְ/גֹזֵר
  english_pob_choice: to him who divided
  chosen_spanish: al que dividió
  alternatives_spanish:
  - al que cortó
  - al que separó
  lexicon: HALOT
  rationale: 'El participio con ל introductorio en la letanía del salmo presenta al destinatario del elogio: «al que...». «Dividió» reproduce bien el valor de גזר en este contexto exódico y suena natural en español sin perder la imagen de separación violenta o decisiva.'
- source_word: יַם סוּף
  english_pob_choice: the Sea of Reeds
  chosen_spanish: Mar de Juncos
  alternatives_spanish:
  - Mar Rojo
  lexicon: HALOT
  rationale: Sigo la primacía del hebreo y traduzco el nombre comúnmente como «Mar de Juncos», que conserva el sentido literal de יַם סוּף. «Mar Rojo» queda como tradición conocida, pero no es la forma principal del texto aquí.
- source_word: לִ/גְזָרִים
  english_pob_choice: into parts
  chosen_spanish: en partes
  alternatives_spanish:
  - en divisiones
  - en trozos
  lexicon: HALOT
  rationale: גְזָרִים indica porciones o secciones separadas. «En partes» mantiene la imagen de un mar abierto en segmentos distinguibles y resulta idiomático en español contemporáneo.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: En el refrán de Salmo 136, כִּי introduce el fundamento de la alabanza. «Porque» comunica esa relación causal de forma clara y natural en español.
- source_word: לְ/עוֹלָם
  english_pob_choice: endures forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - eternamente
  - por siempre
  lexicon: HALOT
  rationale: El hebreo es una expresión adverbial de duración perpetua. En español, en esta fórmula refranaria, «para siempre» conserva la fuerza temporal sin añadir un verbo que no está en el hebreo.
- source_word: חַסְדּוֹ
  english_pob_choice: his steadfast love
  chosen_spanish: su misericordia
  alternatives_spanish:
  - su amor leal
  - su amor constante
  - su fidelidad amorosa
  lexicon: HALOT
  rationale: חסד abarca lealtad, bondad y amor pactal. Dado que el POB inglés opta por una solución con peso afectivo y pactal, «misericordia» es una opción española tradicional y comprensible; aun así, las alternativas se conservan porque «misericordia» puede ser más estrecha que el campo semántico completo de חסד.
theological_decisions:
- issue: Cómo expresar el nombre geográfico y la alusión al éxodo sin imponer la tradición posterior como lectura principal.
  english_pob_reading: the Sea of Reeds, with a note acknowledging the traditional 'Red Sea.'
  chosen_spanish_reading: Mar de Juncos, con nota que reconoce la lectura tradicional «Mar Rojo».
  alternative_spanish_readings:
  - Mar Rojo
  - Mar de los Juncos
  rationale: La decisión sigue la primacía del hebreo יַם סוּף y preserva la alusión al éxodo sin ocultarla tras la tradición eclesial. La nota mantiene la lectura tradicional conocida por los lectores.
  doctrine_reference: Éxodo 14; uso de nombres geográficos en traducción bíblica
- issue: Cómo traducir el refrán חסדו לְעוֹלָם con un término español que no borre su peso pactal.
  english_pob_reading: for his steadfast love endures forever
  chosen_spanish_reading: porque para siempre es su misericordia
  alternative_spanish_readings:
  - porque para siempre es su amor leal
  - porque su misericordia es eterna
  rationale: El refrán del Salmo 136 es teológicamente compacto y formula la razón de la alabanza. «Misericordia» es el equivalente español más establecido para el clamor litúrgico del חסד divino; se reconoce, no obstante, que «amor leal» o «amor constante» expresan con mayor precisión la dimensión de fidelidad pactal.
  doctrine_reference: Salmo 136; חסד como amor leal/covenantal
translation_notes:
  revision_awareness: 'El texto inglés auditado ya fue revisado y quedó sin cambios, con acuerdo alto entre revisores. La presente versión española sigue ese estado estable: conserva la lectura primaria «Sea of Reeds» mediante «Mar de Juncos», mantiene el refrán como fórmula de duración perpetua y refleja la nota tradicional sobre «Mar Rojo».'
  spanish_consistency_notes:
  - 'Se mantiene la preposición elíptica y la estructura de letanía: «al que... porque...».'
  - Se prefiere «Mar de Juncos» para respetar la primacía del hebreo, con nota tradicional para lectores habituados a «Mar Rojo».
  - «Para siempre» se usa como equivalente refranario de לְעוֹלָם en esta cláusula.
  - «Misericordia» es comprensible y litúrgicamente reconocible en español, aunque en notas se reconoce el alcance más amplio de חסד.
