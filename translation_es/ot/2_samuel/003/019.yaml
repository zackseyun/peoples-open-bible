revisions:
- from: Abner también habló al oído de Benjamín[a], y también fue Abner a hablar al oído de David en Hebrón[b] todo lo que parecía bueno a los ojos de Israel y a los ojos de toda la casa de Benjamín.
  to: Abner también habló ante Benjamín[a], y Abner también fue a hablar con David en Hebrón todo lo que parecía bueno a los ojos de Israel y a los ojos de toda la casa de Benjamín[b].
  rationale: Se reemplazó 'al oído de' por expresiones españolas que comunican correctamente el modismo hebreo sin introducir la idea de susurro o secreto. También se movió la nota de lectura alternativa para anclarla a la cláusula que realmente comenta. Se preservaron la estructura paralela, la repetición 'a los ojos de', y 'casa de Benjamín'.
