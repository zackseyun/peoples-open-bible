  yaml_path: translation/deuterocanon/2_maccabees/008/029.yaml
  text: After doing these things[a], and making a common prayer of supplication[b], they begged the merciful Lord to be fully reconciled to his slaves.
  footnotes:
  - marker: a
    text: Or 'his servants.' The Greek word is δοῦλοις, which can be rendered either way depending on context; here the translation keeps the stronger sense of belonging and dependence.
    reason: lexical_alternative
  - marker: b
    text: Or 'to be reconciled completely' or 'to be reconciled at last.' The phrase εἰς τέλος can intensify the reconciliation or mark it as brought to completion.
    reason: alternative_reading
