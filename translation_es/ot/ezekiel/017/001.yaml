translation:
  language: es
  text: 'La palabra de Yahvé vino a mí[a], diciendo:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Y aconteció que la palabra de Yahvé vino a mí, diciendo»'
