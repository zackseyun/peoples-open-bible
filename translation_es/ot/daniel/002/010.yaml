base_translation:
  language: en
  yaml_path: translation/ot/daniel/002/010.yaml
  text: The Chaldeans answered before the king and said[a], “There is not a man on earth who can make known the king’s matter, because no great and powerful king has asked such a thing of any diviner-priest, enchanter[d][c][b], or Chaldean.”
  footnotes:
  - marker: a
    text: Or “the astrologers.” The Aramaic term “Chaldeans” can refer either to the ethnic group or to a class of Babylonian wise men in the royal court.
    reason: lexical_alternative
  - marker: b
    text: “Man” here is a representative singular meaning any human being.
    reason: lexical_alternative
  - marker: c
    text: Or “the king’s word” or “the king’s demand.”
    reason: lexical_alternative
  - marker: d
    text: Traditional renderings include “magician” for “diviner-priest.” The exact distinctions among these classes of Babylonian specialists are not fully certain.
    reason: cultural_note
