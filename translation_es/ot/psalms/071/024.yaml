review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: continuidad aditiva («También»), imagen concreta («mi lengua»), duración («todo el día»), alabanza verbal («hablará de»), y la vergüenza/deshonra de los adversarios. Sin embargo, no sigue la decisión léxica principal auditada para צִדְקָתֶךָ, que en el POB inglés se mantiene en el texto principal como «your righteousness», con «justice» solo como alternativa en nota. En español, «tu justicia» estrecha el campo semántico hacia lo jurídico y no preserva tan bien la amplitud de rectitud/vindicación del término en este contexto.'
  spanish_quality_summary: El español es claro y natural. «También mi lengua hablará de… todo el día» es plenamente legible. La segunda mitad también fluye bien, aunque «los que buscan mi mal» suena algo menos natural y más ambiguo que una formulación como «los que buscan hacerme daño» o «los que buscan mi daño». Aun así, el problema principal es terminológico, no de fluidez.
  glossary_alignment: Se alinea en general con las convenciones del proyecto, salvo en la decisión para צִדְקָתֶךָ. Dado que el audit trail inglés escogió «righteousness» en texto principal y reservó «justice» para nota, el español debería reflejar esa prioridad con «tu rectitud» en el texto principal y «tu justicia» como alternativa en nota. Esto preserva mejor la amplitud semántica documentada y la rationale teológica del POB.
  issues:
  - severity: high
    issue: צִדְקָתֶךָ se tradujo en el texto principal como «tu justicia» en vez de una opción equivalente a «your righteousness».
    rationale: El POB inglés documenta explícitamente «your righteousness» como lectura principal y «your justice» como alternativa. «Justicia» en español tiende a focalizar el aspecto judicial; «rectitud» preserva mejor el valor más amplio del término hebreo en este salmo, dejando «justicia» en nota como alternativa.
  - severity: medium
    issue: La nota al pie repite «tu justicia» como alternativa del texto principal.
    rationale: Una nota de alternativa léxica debe ofrecer una opción distinta de la lectura del texto principal. Si el texto principal se corrige a «tu rectitud», la nota puede conservar «tu justicia» con la explicación ya dada.
  - severity: low
    issue: «Los que buscan mi mal» puede resultar algo menos idiomático o más ambiguo en español contemporáneo.
    rationale: Aunque es comprensible y cercano al hebreo, en español amplio «buscar mi mal» puede sonar más abstracto. No obstante, no impide la comprensión y puede mantenerse si se prioriza concisión y cercanía formal.
  revised_spanish_text: También mi lengua hablará de tu rectitud[a] todo el día, porque han sido avergonzados los que buscan mi mal; han quedado deshonrados.
