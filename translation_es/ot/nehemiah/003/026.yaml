translation:
  language: es
  text: Los servidores del templo habitaban en el Ofel[a], hasta quedar frente a la Puerta del Agua hacia el oriente y la torre saliente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo נְתִינִים (Nethinim), un grupo reconocido de servidores del templo.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַנְּתִינִים
  english_pob_choice: the temple servants
  chosen_spanish: los servidores del templo
  alternatives_spanish:
  - los netinim
  - los dados
  lexicon: HALOT
  rationale: נְתִינִים designa una clase reconocida de personal del templo. En español, «servidores del templo» conserva la función cultual con claridad; «netinim» puede reservarse como transliteración técnica, pero aquí sería menos transparente para lectura pública.
- source_word: הָיוּ יֹשְׁבִים
  english_pob_choice: were living
  chosen_spanish: habitaban
  alternatives_spanish:
  - vivían
  - moraban
  - estaban viviendo
  lexicon: HALOT
  rationale: La construcción היה + participio expresa residencia continua. «Habitaban» comunica bien ese estado durativo en español bíblico moderno, sin sonar tan coloquial como «vivían» ni tan arcaico como «moraban».
- source_word: בָּעֹפֶל
  english_pob_choice: on the Ophel
  chosen_spanish: en el Ofel
  alternatives_spanish:
  - sobre el Ofel
  - en Ophel
  lexicon: HALOT
  rationale: Aquí עֹפֶל funciona como topónimo o designación topográfica de Jerusalén. Se mantiene transliterado como «Ofel» para preservar el nombre propio; la preposición «en» expresa mejor la localización que «sobre» en español, aunque el área sea elevada.
- source_word: עַד נֶגֶד
  english_pob_choice: as far as opposite
  chosen_spanish: hasta frente a
  alternatives_spanish:
  - hasta en frente de
  - hasta lo opuesto a
  - hasta el lado de enfrente de
  lexicon: HALOT
  rationale: La combinación marca extensión límite y relación espacial de oposición/frente a. «Hasta frente a» conserva ambas ideas con naturalidad en español y evita sobreinterpretar la construcción.
- source_word: שַׁעַר הַמַּיִם
  english_pob_choice: the Water Gate
  chosen_spanish: la Puerta del Agua
  alternatives_spanish:
  - la puerta de las aguas
  - la Puerta de las Aguas
  lexicon: HALOT
  rationale: Es un nombre de puerta urbana. «Puerta del Agua» sigue el patrón de nombre propio y coincide con el valor idiomático de la designación en español bíblico.
- source_word: לַמִּזְרָח
  english_pob_choice: toward the east
  chosen_spanish: hacia el oriente
  alternatives_spanish:
  - al oriente
  - hacia el este
  lexicon: HALOT
  rationale: La dirección se expresa de manera natural con «hacia el oriente». Se prefiere «oriente» por su registro bíblico y su buena inteligibilidad, sin convertirlo en fórmula arcaizante.
- source_word: הַמִּגְדָּל הַיּוֹצֵא
  english_pob_choice: the projecting tower
  chosen_spanish: la torre saliente
  alternatives_spanish:
  - la torre proyectada
  - la torre que sobresale
  - la torre protruyente
  lexicon: HALOT
  rationale: יֹצֵא describe algo que sale o sobresale. «Torre saliente» conserva la imagen arquitectónica con concisión y evita un giro demasiado explicativo.
theological_decisions:
- issue: Identidad del grupo נְתִינִים
  english_pob_reading: a recognized class of temple servants
  chosen_spanish_reading: una clase reconocida de servidores del templo
  alternative_spanish_readings:
  - los netinim
  - los dados al templo
  rationale: 'No hay conflicto doctrinal, pero sí una decisión terminológica: traducir la función en vez de transliterar el nombre étnico-gremial. En una edición pública en español, «servidores del templo» comunica mejor el sentido sin perder el carácter especializado del grupo.'
  doctrine_reference: Nehemías 3:26; cf. uso histórico de los Nethinim en el culto del templo
translation_notes:
  revision_awareness: 'La redacción sigue la revisión inglesa más reciente al conservar un único complemento direccional y unir de forma natural la clausula final: «hacia el oriente, y la torre saliente». También se evitó duplicar artículos en la última coordinación, manteniendo la fluidez del español.'
  spanish_consistency_notes:
  - Se usa «Yahvé» en esta edición cuando corresponda, pero en este versículo no aparece el Tetragrámaton.
  - Se prefirió «servidores del templo» en vez de una transliteración pura para facilitar la lectura pública, manteniendo la nota técnica.
  - «Ofel» se translitera como topónimo y se mantiene con mayúscula inicial.
  - «Oriente» se emplea por claridad y por su registro bíblico, sin sustituir el valor direccional.
  - «Torre saliente» conserva el matiz de una estructura que sobresale, acorde con el hebreo יֹצֵא.
