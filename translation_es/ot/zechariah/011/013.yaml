base_translation:
  language: en
  yaml_path: translation/ot/zechariah/011/013.yaml
  text: Then Yahweh said to me[a], “Throw it to the potter—the magnificent price at which I was valued by them.” So I took the thirty pieces of silver and threw it into the house of Yahweh[b], to the potter.
  footnotes:
  - marker: a
    text: Hebrew 'the potter.' Some interpreters propose 'the treasury' here because of the difficult context and the New Testament's use of this passage, but the Masoretic Text reads 'potter' in both places.
    reason: alternative_reading
  - marker: b
    text: 'Or ''the magnificent price,'' likely ironic: the phrase mocks the insultingly low valuation of thirty pieces of silver.'
    reason: lexical_alternative
