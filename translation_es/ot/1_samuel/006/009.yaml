  language: en
  yaml_path: translation/ot/1_samuel/006/009.yaml
  text: 'And watch: if it goes up by the way of its territory to Beth-shemesh[a], then he is the one who has done this great harm to us; but if not, then we will know that it was not his hand that struck us[b]; it happened to us by chance.'
  footnotes:
