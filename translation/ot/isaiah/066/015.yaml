id: ISA.66.15
reference: Isaiah 66:15
source:
  edition: WLC
  text: כִּֽי הִנֵּ֤ה יְהוָה֙ בָּ/אֵ֣שׁ יָב֔וֹא וְ/כַ/סּוּפָ֖ה מַרְכְּבֹתָ֑י/ו לְ/הָשִׁ֤יב בְּ/חֵמָה֙ אַפּ֔/וֹ וְ/גַעֲרָת֖/וֹ בְּ/לַהֲבֵי אֵֽשׁ־־׃
translation:
  text: For look[a], Yahweh will come in fire, and his chariots like the whirlwind[c][b], to repay his anger in fury and his rebuke with flames of fire.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with fire'; the Hebrew preposition can express accompaniment as well as sphere.
    reason: lexical_alternative
  - marker: b
    text: Or 'to render back his anger in wrath'; the Hebrew verb can mean 'return' or 'repay' in a judicial sense.
    reason: lexical_alternative
  - marker: c
    text: Or 'like a storm' or 'like the tempest.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - For behold
  lexicon: HALOT
  rationale: Introduces the ground or explanation for the preceding statement; 'For' fits the discourse flow better than a more emphatic standalone rendering.
- source_word: הִנֵּה
  chosen: look
  alternatives:
  - behold
  - see
  lexicon: HALOT
  rationale: Marks vivid attention-getting deixis. 'Look' preserves the force in readable modern English better than the archaic 'behold'.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the doctrinal default for the divine name, preserving the traditional small-caps covenantal rendering in standard English form.
- source_word: בָּאֵשׁ
  chosen: in fire
  alternatives:
  - with fire
  - as fire
  lexicon: HALOT
  rationale: The preposition ב can be rendered variously here. 'In fire' is a close and natural rendering that preserves the imagery without over-interpreting whether fire is accompaniment, sphere, or manifestation.
- source_word: יָבוֹא
  chosen: will come
  alternatives:
  - comes
  - is coming
  lexicon: HALOT
  rationale: Imperfect verb in prophetic context is well rendered as future, expressing the announced coming judgment.
- source_word: וְכַסּוּפָה
  chosen: and ... like the whirlwind
  alternatives:
  - and like a storm
  - and like the tempest
  lexicon: HALOT
  rationale: סוּפָה denotes a violent storm or whirlwind. 'Whirlwind' preserves the vivid, forceful image common in prophetic judgment language.
- source_word: מַרְכְּבֹתָיו
  chosen: his chariots
  alternatives:
  - his chariot-host
  - his war chariots
  lexicon: HALOT
  rationale: Plural noun with 3ms suffix. The straightforward 'his chariots' best matches the Hebrew and keeps the martial imagery.
- source_word: לְהָשִׁיב
  chosen: to repay
  alternatives:
  - to return
  - to bring back
  - to render
  lexicon: HALOT
  rationale: In this context שׁוּב in the Hiphil means to turn back or render back, idiomatically 'repay' or 'render.' 'Repay' fits the judicial context of divine judgment.
- source_word: בְּחֵמָה
  chosen: in fury
  alternatives:
  - with wrath
  - in wrath
  - with fury
  lexicon: HALOT
  rationale: חֵמָה denotes burning wrath or fury. 'In fury' pairs naturally with the preceding infinitive phrase and preserves the emotional intensity.
- source_word: אַפּוֹ
  chosen: his anger
  alternatives:
  - his nose
  - his wrath
  lexicon: HALOT
  rationale: Though literally tied to 'nose' idiomatically, in context it clearly means anger/wrath. 'His anger' is the most transparent modern rendering.
- source_word: וְגַעֲרָתוֹ
  chosen: and his rebuke
  alternatives:
  - and his reproof
  - and his threatening
  lexicon: HALOT
  rationale: גְּעָרָה commonly denotes a rebuke, often forceful or judicial. 'Rebuke' preserves both verbal and authoritative force.
- source_word: בְּלַהֲבֵי אֵשׁ
  chosen: in flames of fire
  alternatives:
  - with fiery flames
  - in blazing fire
  lexicon: HALOT
  rationale: Literally 'in flames of fire.' This keeps the Hebrew image and parallelism with the earlier 'in fire' while sounding natural in English.
