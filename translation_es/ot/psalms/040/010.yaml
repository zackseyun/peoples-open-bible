review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: proclamación pública de צֶדֶק, mención de la gran asamblea, negación de contener los labios, y apelación directa a Yahvé como testigo. Sin embargo, falta la nota léxica correspondiente a «no he refrenado mis labios», que el rastro inglés preserva como alternativa significativa, y «tú lo sabes» introduce un objeto explícito («lo») no presente en el hebreo.'
  spanish_quality_summary: El español es claro, natural y digno. «He aquí» funciona, aunque es algo más formal; sigue siendo aceptable en poesía. «No he refrenado mis labios» es comprensible, pero conviene añadir la alternativa «no he contenido mis labios» o «no he retenido mis labios» en nota por fidelidad al audit trail. «Yahvé, tú sabes» suena más ceñido al original que «tú lo sabes».
  glossary_alignment: 'Se alinea bien con la terminología del proyecto: יְהוָה → «Yahvé» correctamente; צֶדֶק → «justicia» con nota alternativa apropiada; se preserva «labios» en vez de aplanar la imagen. No hay conflictos doctrinales mayores.'
  issues:
  - severity: medium
    issue: La cláusula final añade «lo» en «tú lo sabes».
    rationale: El hebreo solo dice «tú sabes». Aunque en español «lo sabes» puede sonar idiomático, añade un objeto no expreso en el original y no es necesario para la claridad.
  - severity: medium
    issue: Falta la nota alternativa para לֹא אֶכְלָא / «no he refrenado».
    rationale: El English POB preserva una alternativa léxica significativa («I have not held back my lips»). La revisión española debe conservar esa alternativa relevante, especialmente porque el matiz de contener/retener es parte del registro auditado.
  - severity: low
    issue: La nota de «justicia» usa «rectitud» en vez de «justicia» como alternativa principal del inglés.
    rationale: No es incorrecto, pero el rastro inglés preserva específicamente la tensión «righteousness/justice». En español, «justicia» ya está en texto; mantener «rectitud» como nota sigue siendo válido, así que esto no exige más que confirmar la decisión.
  revised_spanish_text: He proclamado justicia[a] en la gran asamblea; he aquí, no he refrenado mis labios[b]; Yahvé, tú sabes.
