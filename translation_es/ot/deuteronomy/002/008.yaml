translation:
  language: es
  text: Así pasamos de nuestros hermanos[a], los hijos de Esaú, que habitan en Seír, apartándonos del camino del Arabá, de Elat y de Ezión-geber[b]; y nos volvimos y pasamos por el camino del desierto de Moab.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «de junto a nuestros hermanos». El hebreo literalmente dice: «de nuestros hermanos, los hijos de Esaú».'
    reason: alternative_reading
  - marker: b
    text: O «desde el camino del Arabá». «Arabá» designa la región del valle de rift al sur del mar Muerto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַנַּעֲבֹר
  english_pob_choice: we passed
  chosen_spanish: pasamos
  alternatives_spanish:
  - íbamos
  - cruzamos
  - seguimos
  lexicon: HALOT
  rationale: El hebreo indica un avance de viaje; en español, «pasamos» comunica bien el movimiento continuo sin introducir la idea de cruzar un obstáculo o cambiar de lugar abruptamente.
- source_word: מֵאֵת
  english_pob_choice: on from
  chosen_spanish: de
  alternatives_spanish:
  - de junto a
  - apartándonos de
  lexicon: HALOT
  rationale: La preposición con este verbo y objeto personal expresa desplazamiento desde o al pasar junto a ellos. En español, la combinación «pasamos de nuestros hermanos» mantiene la idea de continuar el recorrido después de ellos; se refuerza en la segunda cláusula con «apartándonos» para conservar el matiz direccional.
- source_word: אַחֵינוּ בְנֵי עֵשָׂו
  english_pob_choice: our brothers, the sons of Esau
  chosen_spanish: nuestros hermanos, los hijos de Esaú
  alternatives_spanish:
  - nuestros parientes, los descendientes de Esaú
  - nuestros hermanos, los descendientes de Esaú
  lexicon: HALOT
  rationale: Se conserva el lenguaje de parentesco del hebreo, importante para la relación Israel-Edom. «Hijos de Esaú» reproduce con fidelidad la forma textual y evita suavizarla en una paráfrasis etnográfica.
- source_word: הַיֹּשְׁבִים בְּשֵׂעִיר
  english_pob_choice: who live in Seir
  chosen_spanish: que habitan en Seír
  alternatives_spanish:
  - que viven en Seír
  - que moran en Seír
  lexicon: HALOT
  rationale: «Habitan» mantiene el sentido de residencia asentada del participio hebreo y suena natural y digno en español bíblico contemporáneo.
- source_word: מִדֶּרֶךְ הָעֲרָבָה
  english_pob_choice: away from the way of the Arabah
  chosen_spanish: apartándonos del camino del Arabá
  alternatives_spanish:
  - apartándonos de la vía del Arabá
  - alejándonos del camino del Arabá
  lexicon: HALOT
  rationale: Se traduce derek como «camino» para conservar la repetición interna del verso. «Arabá» se mantiene como topónimo/región, en vez de explicitarlo como una llanura o depresión geográfica, porque el texto fuente lo trata como designación fija.
- source_word: מֵאֵילַת
  english_pob_choice: from Elath
  chosen_spanish: de Elat
  alternatives_spanish:
  - de Elat
  - desde Elat
  lexicon: HALOT
  rationale: Se adopta la transliteración habitual en español «Elat», equivalente a la forma inglesa «Elath». La preposición «de» reproduce el movimiento de salida del lugar dentro de la cadena de rutas.
- source_word: וּמֵעֶצְיֹן גָּבֶר
  english_pob_choice: from Ezion-geber
  chosen_spanish: de Ezión-geber
  alternatives_spanish:
  - de Ezión Geber
  - desde Ezión-geber
  lexicon: HALOT
  rationale: Se conserva el topónimo con la guionización tradicional en español bíblico para reflejar el nombre compuesto y facilitar la identificación geográfica.
- source_word: וַנֵּפֶן
  english_pob_choice: we turned
  chosen_spanish: nos volvimos
  alternatives_spanish:
  - nos desviamos
  - cambiamos de rumbo
  lexicon: HALOT
  rationale: El hebreo señala un cambio de dirección. «Nos volvimos» conserva la idea de giro del viaje y suena natural en español narrativo bíblico.
- source_word: וַנַּעֲבֹר דֶּרֶךְ מִדְבַּר מוֹאָב
  english_pob_choice: passed by the way of the wilderness of Moab
  chosen_spanish: y pasamos por el camino del desierto de Moab
  alternatives_spanish:
  - y pasamos por la ruta del desierto de Moab
  - y avanzamos por el camino del desierto de Moab
  lexicon: HALOT
  rationale: Se mantiene «camino» para la repetición de derek y se traduce מִדְבָּר como «desierto», el equivalente más directo y público en español. «Pasamos por» refleja el recorrido sin añadir más de lo que el hebreo dice.
theological_decisions:
- issue: Lenguaje de parentesco para Edom/Israel
  english_pob_reading: our brothers, the sons of Esau
  chosen_spanish_reading: nuestros hermanos, los hijos de Esaú
  alternative_spanish_readings:
  - nuestros parientes, los descendientes de Esaú
  - nuestros hermanos, los descendientes de Esaú
  rationale: Se preserva la relación fraterna explícita del hebreo y del POB en inglés. Esto mantiene la carga histórico-covenantal del pasaje y evita diluir el vínculo en un término más genérico.
  doctrine_reference: Fidelidad semántica al texto fuente; preservación de relaciones pactuales e históricas en la traducción
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del POB inglés, que prefirió «way» en lugar de «route» para mantener la repetición de derek. En español se conservó esa repetición con «camino» en ambas cláusulas, y se mantuvo la estructura narrativa de movimiento: pasar, apartarse, volverse y volver a pasar.'
  spanish_consistency_notes:
  - Se usa «Yahvé» cuando corresponda en otros versículos; aquí no aparece el Tetragrámaton.
  - «Mesías/Cristo» no aplica en este verso.
  - Se mantiene la transliteración «Arabá» para la región, mientras que los topónimos se adaptan de forma estándar al español bíblico.
  - «Habitan» y «nos volvimos» ofrecen un registro bíblico claro sin arcaísmo excesivo.
