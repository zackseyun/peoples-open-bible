    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בָ/הָר
  english_pob_choice: In the hill country
  chosen_spanish: En la región montañosa
  alternatives_spanish:
  - Y en la región montañosa
  - En la serranía
  - En la zona montañosa
  lexicon: HALOT
  rationale: La forma hebrea significa literalmente ‘y en la montaña / región montañosa’. En español, ‘región montañosa’ comunica bien el sentido geográfico colectivo sin forzar un calco. Se omite la coordinación inicial para mantener el flujo natural de una lista de localidades, como en el criterio de la POB en inglés.
- source_word: שָׁמִיר
  english_pob_choice: Shamir
  chosen_spanish: Shamir
  alternatives_spanish:
  - Samir
  lexicon: Nombre propio topográfico
  rationale: Es un topónimo; se conserva la transliteración breve y reconocible. No hay base suficiente en este versículo para una adaptación distinta.
- source_word: וְ/יַתִּיר
  english_pob_choice: Jattir
  chosen_spanish: Jattir
  alternatives_spanish:
  - Yattir
  lexicon: Nombre propio topográfico
  rationale: Nombre propio de lugar. Se mantiene la forma ya usada en la tradición de la POB en inglés, con posibilidad de una transliteración más fonética, pero sin necesidad de cambiarla en español.
- source_word: וְ/שׂוֹכֹה
  english_pob_choice: Socoh
  chosen_spanish: Soco
  alternatives_spanish:
  - Socoh
  - Sokoh
  lexicon: Nombre propio topográfico
  rationale: Topónimo transliterado. En español, ‘Soco’ ofrece una forma breve y publicable, mientras que ‘Socoh’ conserva más de cerca la grafía inglesa. Dado que el hebreo termina con consonante gutural débil y el uso castellano suele simplificar la transliteración, ‘Soco’ es una opción natural y clara.
translation_notes:
  revision_awareness: El texto fuente y el audit trail inglés están en alto acuerdo; no se registran revisiones aplicadas ni cambios textuales necesarios. La elección española sigue la misma decisión de no traducir mecánicamente la lista toponímica y de mantener el valor geográfico de בָהָר.
  spanish_consistency_notes:
  - Se conserva el orden de la enumeración y la economía del original.
  - La conjunción inicial hebrea se refleja solo en nota, siguiendo el tratamiento de la POB en inglés.
  - Los nombres propios se mantienen transliterados y sin castellanizar más allá de lo necesario para la lectura.
  - La preposición ‘en’ se integra de forma natural en español para expresar el valor locativo del hebreo.
