translation:
  language: es
  text: Y él estará en pie y pastoreará[a] en la fuerza de Yahvé, en la majestad del nombre de Yahvé su Dios. Y ellos habitarán seguros[b], porque ahora[c] él será grande hasta los confines de la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'apacentará'. El verbo hebreo puede traducirse literalmente como 'apacentar' o 'pastorear'; aquí se eligió 'pastoreará' para conservar la imagen del pastor-rey.
    reason: lexical_alternative
  - marker: b
    text: O 'habitarán en seguridad'. El hebreo literalmente dice 'habitarán' o 'se sentarán', con la seguridad implícita por el contexto.
    reason: lexical_alternative
  - marker: c
    text: Hebreo 'ahora'; algunas traducciones lo vierten 'entonces' para suavizar la secuencia profética, pero el adverbio hebreo es 'ahora'.
    reason: alternative_reading
lexical_decisions:
- source_word: וְעָמַד
  english_pob_choice: And he will stand
  chosen_spanish: Y se mantendrá en pie
  alternatives_spanish:
  - Y estará en pie
  - Y se pondrá en pie
  lexicon: HALOT
  rationale: El verbo עמד conserva la imagen concreta de permanecer o tomar posición. 'Se mantendrá en pie' comunica esa firmeza en español sin convertirlo en una paráfrasis más abstracta.
- source_word: וְרָעָה
  english_pob_choice: and shepherd
  chosen_spanish: y pastoreará
  alternatives_spanish:
  - y apacentará
  - y guiará como pastor
  lexicon: HALOT
  rationale: רעה en este contexto regio-pastoral puede expresar pastorear. 'Pastoreará' mantiene la imagen de pastor y evita reducir el sentido a 'alimentar'.
- source_word: בְּעֹז יְהוָה
  english_pob_choice: in the strength of Yahweh
  chosen_spanish: con el poder de Yahvé
  alternatives_spanish:
  - en la fuerza de Yahvé
  - por el poder de Yahvé
  lexicon: HALOT
  rationale: עֹז denota fuerza o poder. Aunque el inglés usa 'in', en español 'con el poder de' comunica bien el ámbito/instrumento sin sonar forzado. Se mantiene Yahvé para el Tetragrámaton según la terminología POB.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino como 'Yahvé', siguiendo la directriz del proyecto y la transliteración del Tetragrámaton.
- source_word: בִּגְאוֹן שֵׁם יְהוָה אֱלֹהָיו
  english_pob_choice: in the majesty of the name of Yahweh his God
  chosen_spanish: con la majestad del nombre de Yahvé su Dios
  alternatives_spanish:
  - en la majestad del nombre de Yahvé su Dios
  - con la grandeza del nombre de Yahvé su Dios
  lexicon: HALOT
  rationale: גאון puede ser majestad, exaltación o grandeza. 'Majestad' es natural y digno en español. Se conserva la cadena posesiva 'su Dios' sin suavizar la tensión teológica presente en el hebreo.
- source_word: וְיָשָׁבוּ
  english_pob_choice: And they will dwell secure
  chosen_spanish: Y ellos habitarán seguros
  alternatives_spanish:
  - Y ellos vivirán seguros
  - Y ellos morarán seguros
  lexicon: HALOT
  rationale: ישב significa habitar, morar o permanecer; el contexto aporta la seguridad implícita. 'Habitarán seguros' mantiene cercanía léxica y claridad idiomática.
- source_word: כִּי עַתָּה
  english_pob_choice: for now
  chosen_spanish: porque ahora
  alternatives_spanish:
  - pues ahora
  - ya que ahora
  lexicon: HALOT
  rationale: Se preserva el valor temporal de עתה como 'ahora'. 'Porque' expresa la relación causal de כי sin ocultar la inmediatez del adverbio.
- source_word: יִגְדַּל
  english_pob_choice: he will be great
  chosen_spanish: él será grande
  alternatives_spanish:
  - él crecerá en grandeza
  - él será engrandecido
  lexicon: HALOT
  rationale: גדל aquí expresa grandeza. 'Será grande' es directo y fiel, sin introducir una idea de desarrollo gradual que el hebreo no exige.
- source_word: עַד אַפְסֵי אָרֶץ
  english_pob_choice: to the ends of the earth
  chosen_spanish: hasta los confines de la tierra
  alternatives_spanish:
  - hasta los extremos de la tierra
  - hasta los fines de la tierra
  lexicon: HALOT
  rationale: El modismo denota los límites o extremidades de la tierra. 'Confinес' es idiomático en español bíblico y mantiene la amplitud del hebreo.
theological_decisions:
- issue: Referente de los verbos y pronombres singulares
  english_pob_reading: The subject is the coming ruler from the preceding context, rendered simply as 'he' without importing an explicit messianic title into this verse.
  chosen_spanish_reading: Se mantiene el pronombre implícito/expreso 'él' sin introducir 'Mesías' ni 'rey' en el versículo.
  alternative_spanish_readings:
  - El Mesías
  - Ese rey futuro
  rationale: El hebreo usa verbos y pronombres de tercera persona singular sin nombrar explícitamente al personaje. En español se conserva esa misma reserva, dejando que el contexto literario identifique al gobernante prometido.
  doctrine_reference: Preservar la tensión teológica sin resolverla por traducción; primacía del texto original.
- issue: Traducción de אֱלֹהָיו ('his God')
  english_pob_reading: '''his God'' retained as written'
  chosen_spanish_reading: '''su Dios'' se conserva tal como está expresado'
  alternative_spanish_readings:
  - su Dios, el Señor
  - su Dios y Señor
  rationale: El hebreo dice literalmente 'su Dios'. Mantener esa relación posesiva respeta el texto fuente y evita normalizar una posible tensión cristológica o literaria.
  doctrine_reference: Primacía del idioma original; no suavizar tensiones doctrinales mediante la traducción.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto hebreo y la auditoría inglesa: mantiene el sujeto singular implícito, el matiz pastoral de רעה, la relación posesiva ''su Dios'', y el adverbio temporal ''ahora'' de כִּי עַתָּה. No se aplicaron revisiones posteriores al borrador inglés que alteren la lectura.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma consistente para el Tetragrámaton.
  - '''Pastoreará'' se eligió por cercanía semántica y estilo bíblico comprensible.'
  - '''Habitarán seguros'' preserva la literalidad con una naturalidad aceptable en español.'
  - No se introduce 'Cristo' ni 'Mesías' para respetar la reserva del texto fuente.
  - La puntuación sigue un ritmo poético-propético natural en español.
