base_translation:
  language: en
  yaml_path: translation/ot/job/033/006.yaml
  text: Look[a], I am toward God as you are[b]; I too was formed from clay.
  footnotes:
  - marker: a
    text: Hebrew literally, 'I am like your mouth to God.' This may mean 'your mouthpiece/spokesman before God,' 'according to your wish before God,' or possibly 'your equal before God.'
    reason: alternative_reading
  - marker: b
    text: Or 'I too was formed from clay.' The Hebrew verb evokes being pinched off or shaped from clay.
    reason: lexical_alternative
