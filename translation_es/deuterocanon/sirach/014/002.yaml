translation:
  language: es
  text: Bienaventurado el hombre cuya alma[a] no lo ha reprochado, y cuya esperanza no ha cesado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo del primer hemistiquio es difícil en el testimonio cairo; el paralelo griego dice ‘cuya alma no lo ha condenado’, lo que guía la traducción. También puede entenderse ‘no lo ha reprochado’ o ‘no lo ha avergonzado’.
    reason: textual_variant
lexical_decisions:
- source_word: אַשְׁרֵי
  english_pob_choice: Blessed is
  chosen_spanish: Bienaventurado
  alternatives_spanish:
  - Feliz
  - Dichoso
  lexicon: HALOT
  rationale: Se conserva el tono sapiencial y de bienaventuranza del hebreo. ‘Bienaventurado’ suena más solemne y bíblico que ‘Feliz’, sin volverlo arcaico en exceso.
- source_word: אִישׁ
  english_pob_choice: the man
  chosen_spanish: el hombre
  alternatives_spanish:
  - la persona
  - un hombre
  lexicon: HALOT
  rationale: El sustantivo hebreo es masculino singular; ‘el hombre’ refleja fielmente la forma del texto y mantiene el valor representativo sapiencial.
- source_word: לֹא חִסַּדְתּוֹ נַפְשׁוֹ
  english_pob_choice: whose soul has not reproached him
  chosen_spanish: cuya alma no lo ha reprochado
  alternatives_spanish:
  - cuya alma no lo ha condenado
  - cuya alma no lo ha avergonzado
  lexicon: HALOT
  rationale: La tradición de lectura en el expediente muestra tensión textual; el hebreo disponible es difícil, y la paralela griega apoya una idea de reprobación/juicio interior. En español, ‘reprochado’ conserva esa fricción sin imponer una lectura más fuerte que la atestiguada.
- source_word: וְלֹא שָׁבְתָה
  english_pob_choice: has not ceased
  chosen_spanish: no ha cesado
  alternatives_spanish:
  - no ha fallado
  - no ha llegado a su fin
  lexicon: HALOT
  rationale: ‘Cesado’ reproduce bien el valor de cesar/detenerse de שׁבת en este contexto y es natural en español.
- source_word: תּוֹחַלְתּוֹ
  english_pob_choice: hope
  chosen_spanish: esperanza
  alternatives_spanish:
  - expectación
  lexicon: HALOT
  rationale: ‘Esperanza’ es la equivalencia más natural en español y corresponde tanto al hebreo como al paralelo griego ἐλπίς.
theological_decisions:
- issue: Tensión textual entre el hebreo difícil y el paralelo griego en la primera cláusula
  english_pob_reading: Translate the first colon as 'whose soul has not reproached him,' guided by the Hebrew witness but clarified by the Greek parallel.
  chosen_spanish_reading: cuya alma no lo ha reprochado
  alternative_spanish_readings:
  - cuya alma no lo ha condenado
  - cuya alma no lo ha avergonzado
  rationale: Se mantiene la ambigüedad honesta del testimonio hebreo, pero se deja que el paralelo griego estabilice el sentido general. ‘Reprochado’ permite reflejar tanto la idea de juicio interior como la posible cercanía a ‘condenado’ sin borrar la tensión documental.
  doctrine_reference: 'PHILOSOPHY.md: traducir Sirácida desde el hebreo donde subsiste, usando el paralelo griego como insumo cuando está presente; preservar la ambigüedad honestamente.'
translation_notes:
  revision_awareness: 'El borrador inglés del expediente pasó de ‘has not condemned him’ a ‘has not reproached him’ para ajustarse más de cerca al hebreo, conservando el sentido formal. La versión española sigue esa misma decisión: evita una lectura excesivamente fuerte y mantiene una formulación compatible con la tensión textual documentada.'
  spanish_consistency_notes:
  - Se conserva ‘alma’ para נֶפֶשׁ/נַפְשׁוֹ, en vez de suavizarlo a ‘conciencia’, porque el expediente no justifica sustituir el término fuente.
  - ‘Esperanza’ se mantiene para תּוֹחַלְתּוֹ por claridad y por la correspondencia con ἐλπίς.
  - No se usa ‘SEÑOR’ ni lenguaje de nombre divino, porque este versículo no contiene el tetragrámaton ni κύριος.
