id: COL.2.20
reference: Colossians 2:20
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Εἰ ἀπεθάνετε σὺν Χριστῷ ἀπὸ τῶν στοιχείων τοῦ κόσμου, τί ὡς ζῶντες ἐν κόσμῳ δογματίζεσθε·
base_translation:
  language: en
  yaml_path: translation/nt/colossians/002/020.yaml
  text: 'If you died with the Messiah from the elemental principles of the world, why, as if living in the world, are you submitting yourselves to decrees:'
translation:
  language: ko
  text: 여러분이 메시아와 함께 세상의 초보적 원리[a]에서 떠나 죽었다면, 어찌하여 아직 세상에 사는 자처럼 규례들에 자신을 매이게 하십니까?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「세상의 영적 권세들」, 「세상의 기초 원리들」. 2:8 각주 참조.
    reason: alternative_reading
lexical_decisions:
- source_word: Εἰ ἀπεθάνετε σὺν Χριστῷ
  english_pob_choice: If you died with the Messiah
  chosen_korean: 여러분이 메시아와 함께 ... 죽었다면
  alternatives_korean:
  - 여러분이 그리스도와 함께 죽었다면
  lexicon: BDAG
  rationale: 조건 εἰ + 부정과거. Χριστός는 칭호 「메시아」.
- source_word: ἀπὸ τῶν στοιχείων τοῦ κόσμου
  english_pob_choice: from the elemental principles of the world
  chosen_korean: 세상의 초보적 원리에서 떠나
  alternatives_korean:
  - 세상의 영적 권세들에서
  - 세상의 기초 원리들에서
  lexicon: BDAG
  rationale: 분리의 ἀπό를 「~에서 떠나」로 살린다. 2:8과 어휘적 일관성.
- source_word: τί ὡς ζῶντες ἐν κόσμῳ
  english_pob_choice: why, as if living in the world
  chosen_korean: 어찌하여 아직 세상에 사는 자처럼
  alternatives_korean:
  - 왜 세상에 사는 듯이
  - 어찌하여 세상에 살고 있는 것처럼
  lexicon: BDAG
  rationale: τί는 수사적 「어찌하여」. ὡς + 분사를 「~처럼」으로 옮긴다. 「아직」을 추가하여 한국어 자연성과 대조 강화.
- source_word: δογματίζεσθε
  english_pob_choice: are you submitting yourselves to decrees
  chosen_korean: 규례들에 자신을 매이게 하십니까
  alternatives_korean:
  - 규례들에 복종하십니까
  - 규례에 매이게 됩니까
  lexicon: BDAG
  rationale: 중간/수동의 「자신을 ~에 매이게 하다」 어감을 「자신을 매이게 하십니까」로 살린다.
