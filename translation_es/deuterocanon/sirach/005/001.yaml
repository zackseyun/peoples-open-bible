review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido básico del hebreo y del control griego: una advertencia contra apoyarse en la riqueza y contra reclamar poder propio. Sin embargo, las notas no reflejan con precisión la nota inglesa auditada: la nota a introduce una explicación no documentada (''fijarse en ellas como seguridad'') y la nota b debe conservar mejor la literalidad hebrea y el matiz alternativo griego de autosuficiencia. Además, el anclaje de notas puede simplificarse para evitar sobreanotar.'
  spanish_quality_summary: El español principal es claro, natural y digno. 'No te apoyes en tus riquezas' y 'Tengo poder' son legibles y fieles. No obstante, conviene ajustar la puntuación de las notas y su redacción para mayor precisión filológica. El texto principal no requiere cambio sustancial.
  glossary_alignment: 'No hay términos del glosario mayor en juego como Yahvé/Mesías. Las decisiones léxicas principales son adecuadas: חֵילֶךָ como ''riquezas'' encaja con χρήματα; תִּשָּׁעֵן como ''te apoyes'' es aceptable en español; la segunda cláusula mantiene el reclamo de poder propio sin sobreinterpretar. La única mejora necesaria es alinear la nota con la racionalidad lexical documentada.'
  issues:
  - severity: medium
    issue: La nota [a] añade una explicación no presente en la auditoría inglesa.
    rationale: La nota inglesa dice que el hebreo es literalmente 'there is to the power of my hand' y que el griego refleja autosuficiencia; no documenta que μὴ ἔπεχε signifique 'fijarse en ellas como seguridad'. Esa expansión puede confundir el foco de la nota.
  - severity: medium
    issue: La sobreanotación divide en dos notas lo que en la auditoría inglesa está preservado como una sola nota principal de lectura alternativa.
    rationale: El inglés solo conserva una nota en 'wealth' que explica la cláusula difícil siguiente. En español puede mantenerse una sola nota para reducir ruido y reflejar mejor el expediente auditado.
  - severity: low
    issue: La nota [b] puede expresarse con mayor fidelidad y mejor español.
    rationale: '''hay para la fuerza de mi mano'' suena algo torpe; es mejor ''hay poder en mi mano'' o indicar claramente que es una literalidad aproximada, seguida del sentido griego de autosuficiencia.'
  revised_spanish_text: 'No te apoyes en tus riquezas[a], ni digas: «Tengo poder».'
  revised_footnotes:
  - marker: a
    text: Hebreo literalmente, «hay poder en mi mano»; el paralelo griego refleja el sentido «soy autosuficiente» o «me basta».
    reason: alternative_reading
  revision_rationale: 'Se conserva el texto principal porque es fiel y natural en español. Se revisan las notas para ajustarlas al expediente inglés: una sola nota anclada en el primer miembro, con mejor literalidad hebrea y con el valor alternativo griego de autosuficiencia, sin añadir explicación no documentada.'
