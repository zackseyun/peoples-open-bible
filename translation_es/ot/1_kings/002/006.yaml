translation:
  language: es
  text: Actúa conforme a tu sabiduría, y no dejes[a] que su cabeza canosa baje en paz al Seol[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no hagas que su cabeza canosa baje en paz al Seol».'
    reason: lexical_alternative
  - marker: b
    text: «Seol» es el término hebreo para el reino de los muertos; alternativamente, «la tumba».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָשִׂיתָ
  english_pob_choice: Act
  chosen_spanish: Actúa
  alternatives_spanish:
  - Haz
  - Procede
  lexicon: HALOT
  rationale: El hebreo עשה es amplio y aquí funciona como una instrucción práctica. «Actúa» conserva el tono imperativo sin volver la frase excesivamente literal o pesada en español.
- source_word: כְחָכְמָתֶךָ
  english_pob_choice: according to your wisdom
  chosen_spanish: conforme a tu sabiduría
  alternatives_spanish:
  - según tu sabiduría
  - como tu sabiduría te dicte
  lexicon: HALOT
  rationale: La preposición כ comunica conformidad o correspondencia. «Conforme a tu sabiduría» reproduce bien esa relación y suena natural en español bíblico contemporáneo.
- source_word: וְלֹא תוֹרֵד
  english_pob_choice: do not let ... go down
  chosen_spanish: no dejes que ... baje
  alternatives_spanish:
  - no hagas que ... descienda
  - no permitas que ... baje
  lexicon: HALOT
  rationale: El hifil de ירד es causativo. En español, «no dejes que ... baje» mantiene esa causatividad de modo idiomático, sin perder el vínculo con el verbo de descenso.
- source_word: שֵׂיבָתוֹ
  english_pob_choice: his gray head
  chosen_spanish: su cabeza canosa
  alternatives_spanish:
  - su cabeza encanecida
  - su vejez
  lexicon: HALOT
  rationale: La expresión hebrea alude al cabello canoso/vejez mediante una imagen corporal. «Su cabeza canosa» conserva la imaginería y comunica el sentido sin caer en una calca extraña.
- source_word: בְּשָׁלֹם
  english_pob_choice: in peace
  chosen_spanish: en paz
  alternatives_spanish:
  - pacíficamente
  - sin disturbio
  lexicon: HALOT
  rationale: שָׁלוֹם aquí expresa una condición de paz o final sin perturbación. «En paz» es la correspondencia más directa y natural en español.
- source_word: שְׁאֹל
  english_pob_choice: Sheol
  chosen_spanish: Seol
  alternatives_spanish:
  - el sepulcro
  - el reino de los muertos
  lexicon: HALOT
  rationale: Se conserva el término técnico hebreo como «Seol» para no reducirlo prematuramente a «sepulcro» ni diluir su trasfondo. La transliteración permite mantener la carga conceptual del original.
theological_decisions:
- issue: Tratamiento de שְׁאֹל
  english_pob_reading: Sheol as the Hebrew term for the realm of the dead; alternatively, 'the grave.'
  chosen_spanish_reading: Seol como término hebreo para el reino de los muertos; alternativamente, 'la tumba' o 'el sepulcro'.
  alternative_spanish_readings:
  - la tumba
  - el sepulcro
  - el reino de los muertos
  rationale: La versión en español conserva la transliteración para evitar una reducción interpretativa. Dado que el texto habla del destino de muerte de Joab, «Seol» mantiene la ambigüedad y el peso teológico del término hebreo mejor que una equivalencia única.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: El paquete inglés muestra acuerdo alto y sin revisiones aplicadas; la redacción española sigue esa lectura estable, preservando la causatividad de ירד y la transliteración de שְׁאֹל sin introducir cambios doctrinales o textuales.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» cuando el hebreo lo requiera en otros pasajes; aquí no aparece el nombre divino.
  - Se usa «Seol» como transliteración consistente del término hebreo שְׁאֹל.
  - Se conserva un imperativo natural en español («Actúa») para reflejar la fuerza exhortativa del hebreo.
  - La imagen de «cabeza canosa» se prioriza sobre una abstracción como «vejez» para respetar el figurativismo del original.
