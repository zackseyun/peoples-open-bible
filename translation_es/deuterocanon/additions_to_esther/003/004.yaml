translation:
  language: es
  text: Y eres Señor de todos[a], y no hay nadie que se te oponga, oh Señor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más formalmente, «no hay quien se ponga contra ti, Señor».
    reason: lexical_alternative
lexical_decisions:
- source_word: κύριος
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Maestro
  lexicon: BDAG
  rationale: En este contexto de oración, el término funciona como título divino y vocativo; «Señor» es el equivalente español natural y reverente. «Maestro» debilitaría la fuerza teológica y no refleja el uso devocional del texto.
- source_word: πάντων
  english_pob_choice: of all
  chosen_spanish: de todos
  alternatives_spanish:
  - sobre todo
  - de todo
  lexicon: LSJ
  rationale: El genitivo plural expresa dominio total; «de todos» sigue de cerca la construcción griega y suena idiomático en español. «Sobre todo» podría sugerir un matiz distinto de soberanía, más interpretativo.
- source_word: οὐκ ἔστιν ὃς
  english_pob_choice: there is no one who
  chosen_spanish: no hay nadie que
  alternatives_spanish:
  - no existe quien
  - nadie
  lexicon: BDAG
  rationale: La estructura negativa con relativo se reproduce bien con «no hay nadie que», que conserva la apertura de posibilidad negada por el griego sin volverla más libre de lo necesario.
- source_word: ἀντιτάξεται
  english_pob_choice: will oppose
  chosen_spanish: se oponga
  alternatives_spanish:
  - se ponga contra ti
  - resista
  - se enfrente
  lexicon: BDAG
  rationale: Aunque el inglés usa futuro, el español suena más natural aquí con presente de subjuntivo en una relativa negativa dependiente de «no hay nadie que». «Se oponga» mantiene la idea de colocarse en oposición; «resista» es posible pero algo más amplio.
- source_word: σοι
  english_pob_choice: you
  chosen_spanish: se te
  alternatives_spanish:
  - contra ti
  - a ti
  lexicon: BDAG
  rationale: 'En español, el verbo pronominal «oponerse» exige complemento indirecto con dativo: «se te oponga». Así se evita sobrecargar el griego con una preposición adicional inexistente en el original.'
- source_word: τῷ κυρίῳ
  english_pob_choice: O Lord
  chosen_spanish: oh Señor
  alternatives_spanish:
  - Señor
  - oh Maestro
  lexicon: BDAG
  rationale: Aunque formalmente es dativo con artículo, en este contexto de alabanza funciona como vocativo. «Oh Señor» preserva el tono de dirección directa que el audit trail inglés documenta.
theological_decisions:
- issue: Repetición de κύριος como título divino y vocativo
  english_pob_reading: Lord ... O Lord
  chosen_spanish_reading: Señor ... oh Señor
  alternative_spanish_readings:
  - Señor ... el Señor
  rationale: El griego repite κύριος; la segunda forma con artículo puede funcionar como vocativo en estilo de oración. Traducir ambas como vocativos mantiene la fuerza devocional y evita que la segunda lectura suene meramente nominal o impersonal.
  doctrine_reference: 'DOCTRINE.md: κύριος → Señor; conservar el sentido de oración y la dirección a Dios sin añadir doctrina ajena al texto'
translation_notes:
  revision_awareness: El pasaje fue evaluado como de alta concordancia y sin revisiones pendientes en el audit trail inglés; la presente redacción sigue esa línea, ajustando únicamente la sintaxis para que el español suene natural sin perder el paralelismo del griego.
  spanish_consistency_notes:
  - Se usa «Señor» para κύριος conforme al criterio de la colección.
  - Se conserva la oposición con valor general mediante una relativa negativa.
  - El vocativo final se marca con «oh» para reflejar la lectura devocional del segundo κύριος.
  - No se introduce «Cristo», «SEÑOR» ni glosas doctrinales ajenas al versículo.
