translation:
  language: es
  text: Entonces Benaía, hijo de Joiadá, subió[a], lo atacó y le dio muerte; y fue sepultado junto a su casa[b], en el desierto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cayó sobre él y lo mató». El hebreo usa dos verbos, uno para la agresión y otro para la muerte, y el texto principal los conserva distintos.
    reason: lexical_alternative
  - marker: b
    text: «Junto a su casa» puede referirse más ampliamente a su propiedad o heredad familiar en el desierto.
    reason: cultural_note
lexical_decisions:
- source_word: וַיַּעַל
  english_pob_choice: went up
  chosen_spanish: subió
  alternatives_spanish:
  - fue
  - ascendió
  - subió contra
  lexicon: HALOT
  rationale: עלה conserva el sentido básico de moverse hacia arriba o ir; en español, «subió» mantiene la narración breve y natural sin añadir una confrontación que el hebreo no expresa de forma explícita en el verbo mismo.
- source_word: וַיִּפְגַּע בּוֹ
  english_pob_choice: struck him down
  chosen_spanish: lo hirió
  alternatives_spanish:
  - cayó sobre él
  - lo atacó
  - lo golpeó
  lexicon: HALOT
  rationale: פגע con ב puede expresar encuentro hostil o agresión. Dado que el siguiente verbo ya dice que lo mató, «lo hirió» preserva la acción violenta del primer verbo sin fundirla con la ejecución final.
- source_word: וַיְמִתֵהוּ
  english_pob_choice: put him to death
  chosen_spanish: lo mató
  alternatives_spanish:
  - lo hizo morir
  - lo dio muerte
  - lo ejecutó
  lexicon: HALOT
  rationale: El hifil de מות es causativo. En español, «lo mató» comunica con claridad el resultado letal y mantiene la distinción narrativa respecto del verbo anterior, aunque «lo ejecutó» sería más interpretativo.
- source_word: וַיִּקָּבֵר
  english_pob_choice: he was buried
  chosen_spanish: fue sepultado
  alternatives_spanish:
  - fue enterrado
  - y fue sepultado
  lexicon: HALOT
  rationale: El nifal es pasivo. «Fue sepultado» es una forma digna y natural en español bíblico contemporáneo, equivalente a «he was buried».
- source_word: בְּבֵיתוֹ
  english_pob_choice: at his house
  chosen_spanish: en su casa
  alternatives_spanish:
  - en su propiedad
  - en su hacienda
  - en su casa paterna
  lexicon: HALOT
  rationale: בַּיִת puede significar casa, hogar, casa o estate familiar. «En su casa» conserva la ambigüedad útil del hebreo sin estrechar indebidamente el lugar físico de la sepultura.
- source_word: בַּמִּדְבָּר
  english_pob_choice: in the wilderness
  chosen_spanish: en el desierto
  alternatives_spanish:
  - en el desierto / en la estepa
  - en el yermo
  - en la tierra despoblada
  lexicon: HALOT
  rationale: מִדְבָּר puede abarcar desierto, estepa o zona semidespoblada. Aquí «en el desierto» es la opción más clara para lectores hispanohablantes y armoniza con la referencia geográfica del relato.
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y coincide con el audit trail inglés en la distinción entre el primer golpe/agresión y la muerte, además de mantener la ambigüedad cultural de «su casa» como posible propiedad o heredad funeraria.
  spanish_consistency_notes:
  - Se usa «Benaía» y «Joyada» como formas españolas naturales de los nombres hebreos.
  - Se evita «SEÑOR» porque el versículo no contiene el Tetragrámaton.
  - Se conserva una sintaxis narrativa breve y directa, acorde con el hebreo consecutivo.
  - «Desierto» se mantiene por inteligibilidad, aunque el hebreo puede abarcar una zona más amplia de yermo o estepa.
