translation:
  language: es
  text: 'Otra vez midió mil[a], y me hizo pasar por el agua: agua hasta las rodillas. Otra vez midió mil[b], y me hizo pasar por agua hasta la cintura.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «mil»; la unidad «codos» se toma del contexto del versículo anterior.
    reason: cross_reference
  - marker: b
    text: O, «agua hasta los lomos».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּמָד
  english_pob_choice: he measured
  chosen_spanish: midió
  alternatives_spanish:
  - mide
  - midió de nuevo
  lexicon: HALOT
  rationale: El verbo wayyiqtol de מדד expresa la acción de medir en la visión. «Midió» es la equivalencia directa y natural en español; el contexto de repetición queda claro por «Otra vez».
- source_word: אֶלֶף
  english_pob_choice: a thousand
  chosen_spanish: mil
  alternatives_spanish:
  - mil codos
  - un millar
  lexicon: HALOT
  rationale: El hebreo dice literalmente «mil». Como el contexto inmediato ya estableció la unidad de medida como codos, se conserva el valor literal en el texto principal y se deja la aclaración contextual en nota.
- source_word: וַיַּעֲבִרֵנִי
  english_pob_choice: led me through
  chosen_spanish: me hizo pasar
  alternatives_spanish:
  - me condujo
  - me llevó a pasar
  - me llevó a través
  lexicon: HALOT
  rationale: 'El hiphil de עבר con sufijo de primera persona indica causación: hizo que el profeta pasara. «Me hizo pasar» mantiene bien esa fuerza causativa sin sonar forzado en español.'
- source_word: בַמַּיִם
  english_pob_choice: through the water
  chosen_spanish: por el agua
  alternatives_spanish:
  - a través del agua
  - en el agua
  lexicon: HALOT
  rationale: Con el verbo causativo de movimiento, la frase expresa tránsito por el agua, no solo ubicación. «Por el agua» comunica el desplazamiento de forma natural en español.
- source_word: מַיִם בִּרְכָּיִם
  english_pob_choice: water up to the knees
  chosen_spanish: agua hasta las rodillas
  alternatives_spanish:
  - agua a la altura de las rodillas
  - agua hasta las rodillas
  lexicon: HALOT
  rationale: La construcción hebrea con sustantivo + parte del cuerpo indica nivel del agua. «Agua hasta las rodillas» es clara, fiel y plenamente idiomática en español.
- source_word: מֵי מָתְנָיִם
  english_pob_choice: water up to the waist
  chosen_spanish: agua hasta la cintura
  alternatives_spanish:
  - agua hasta los lomos
  - agua hasta los lomos de la cintura
  lexicon: HALOT
  rationale: מָתְנַיִם puede referirse a la cintura o los lomos. Dado el español moderno y legible, «cintura» reproduce bien el nivel corporal y mantiene la imagen. Se preserva la alternativa más literal en el registro de decisión.
translation_notes:
  revision_awareness: El pasaje y la lectura inglesa muestran acuerdo alto y no requieren revisión sustantiva; se preserva la repetición enfática del hebreo y la ambigüedad medible de אֶלֶף mediante nota de contexto.
  spanish_consistency_notes:
  - Se usa «mil» de forma literal en el cuerpo, con aclaración contextual en nota para no perder la tensión entre literalidad y unidad implícita.
  - Se mantiene la repetición de «Otra vez» para reflejar וַיָּמָד ... וַיָּמָד.
  - «Me hizo pasar» conserva el valor causativo del hiphil mejor que un simple «me llevó».
  - Se prefiere «cintura» como español moderno, dejando «lomos» como alternativa lexical en nota.
