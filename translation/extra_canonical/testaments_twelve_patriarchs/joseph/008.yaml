  text: (VII:6-8 continued.) 6. *Καὶ λέγει³⁷ πρὸς με· *Ἰδοὺ οὖν³⁸ ἀγαπᾷς με· *τοῦτό μοι ἀρκεῖτω· μόνον ἀντιποιῆσαι³⁹ *τῆς ζωῆς μου⁴⁰ ⌜καὶ *τῶν τέκνων⁴¹ μου, *καὶ ἔχω⁴² προσδοκίαν ἀπολαῦσαι⁴³ ⌜καὶ⁴⁴ τῆς ἐπιθυμίας μου. 7. *Οὐκ ἔγνω δὲ αὐτὴ⁴⁵ ὅτι διὰ τὸν⁴⁶ Κύριόν⁴⁷ μου εἶπον οὕτως ἐγώ⁴⁸, καὶ οὐχὶ⁴⁹ δι᾽ αὐτήν. 8. Ἐὰν γάρ τις *ὑποπέσῃ πάθει⁵⁰ ἐπιθυμίας⁵¹ καὶ *δουλωθῇ αὐτῷ⁵² ὡς κἀκείνη, κἂν ἀγαθόν⁵³ τι ἀκούσῃ⁵⁴ εἰς *ἐκεῖνο τὸ⁵⁵ πάθος⁵⁶ *ἐκλαμβάνει αὐτὸ⁵⁷ πρὸς *τὴν πονηρὰν ἐπιθυμίαν⁵⁸. VIII. Λέγω οὖν¹, τέκνα μου², ὅτι ὥρα *ἦν ὡσεὶ³ ἕκτη ὅτε³ ἐξῆλθεν ἀπ᾽ ἐμοῦ⁴. *Καὶ κλίνας γόνυ⁵ πρὸς Κύριον ὅλην τὴν ἡμέραν καὶ ὅλην τὴν νύκτα⁶, πρὸς⁷ ὄρθρον ἀνέστην, δακρύων⁸ καὶ αἰτῶν⁹ λύτρωσιν *ἐξ αὐτῆς¹⁰. 2. Τέλος¹¹ βίᾳ ἐπελαμβάνετό¹² μου τῶν ἱματίων, μετὰ βίας ἐφελκομένη με εἰς συνουσίαν¹³. 3. Ὡς ⌜οὖν⌉¹⁴ εἶδον¹⁵ ὅτι μαινομένη¹⁶ κρατεῖ μου τὸν χιτῶνα, καταλείψας αὐτὸν [καὶ ἐκτιναξάμενος] ἔφυγον γυμνός¹⁷. 4. *Ἐκείνη δὲ¹⁸ ⌜κρατήσασα τοῦτον¹⁹ ἐσυκοφάντησέ με· καὶ ἐλθὼν ὁ ἀνὴρ αὐτῆς ἔβαλέ με εἰς φυλακὴν ἐν τῷ αὐτοῦ οἴκῳ²⁰, καὶ τῇ ἑξῆς *μαστιγώσας ἐξέπεμψέ²¹ με εἰς *τὴν τοῦ Φαραὼ εἰρκτήν²². 5. *Καὶ ὡς²³ ἤμην ἐν τοῖς δεσμοῖς²⁴, ἡ Αἰγυπτία συνείχετο²⁵ ἀπὸ τῆς λύπης· ἐλθοῦσα δὲ ἐπηκροᾶτό μου πῶς ηὐχαρίστουν τῷ Κυρίῳ καὶ ὕμνουν ἐν οἴκῳ *τοῦ σκότους²⁶, καὶ ἔχαιρον ἐν *ἱλαρᾷ φωνῇ²⁷ δοξάζων τὸν Θεόν μου, ὅτι διὰ προφάσεως ἀπηλλάγην²⁸ τῆς Αἰγυπτίας.
