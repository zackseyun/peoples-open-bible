  from: Only the land of the priests alone
  to: Only the land of the priests
  rationale: The draft translates both the Hebrew particle רַק ('only') and the emphatic word לְבַדָּם ('alone'), resulting in the redundant English phrase 'Only... alone'. While the Hebrew is emphatic, this direct mapping is poor English style. Removing 'alone' resolves the redundancy while 'Only' sufficiently marks the clause as the exception to the rule.
- timestamp: '2026-04-21T01:17:48Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/ot/genesis/047/026.json
