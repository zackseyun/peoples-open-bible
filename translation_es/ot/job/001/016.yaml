translation:
  language: es
  text: 'Todavía estaba hablando este[a], cuando vino otro y dijo: «El fuego de Dios cayó del cielo y quemó las ovejas y a los servidores, y los consumió; y solo yo he escapado para informarte».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Mientras este aún hablaba». El hebreo conserva un referente deíctico muy vivo, y la frase puede hacerse más literal.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ע֣וֹד זֶ֣ה מְדַבֵּ֗ר
  english_pob_choice: While this one was still speaking
  chosen_spanish: Todavía estaba hablando este[a]
  alternatives_spanish:
  - Mientras este aún hablaba
  - Aún estaba hablando este
  lexicon: HALOT
  rationale: עוֹד + participio expresa continuidad; en español, «todavía» conserva bien la idea de acción en curso. El orden «este» mantiene el referente vago del mensajero, como en el hebreo y en el inglés POB.
- source_word: וְזֶה בָּא
  english_pob_choice: another came
  chosen_spanish: vino otro
  alternatives_spanish:
  - y vino otro
  - y otro llegó
  lexicon: HALOT
  rationale: El hebreo literalmente dice «y este vino», pero en español «vino otro» comunica de modo natural la sucesión rápida de mensajeros sin perder el sentido de reemplazo narrativo.
- source_word: אֵשׁ אֱלֹהִים
  english_pob_choice: The fire of God
  chosen_spanish: El fuego de Dios
  alternatives_spanish:
  - Fuego de Dios
  - el fuego que vino de Dios
  - un fuego de Dios
  lexicon: HALOT
  rationale: 'Se conserva la construcción atributiva del hebreo. «El fuego de Dios» mantiene la ambigüedad auditada por el POB: puede describir un fuego percibido como procedente de Dios sin resolver en el texto principal si se trata de rayo, fuego enviado o una expresión idiomática.'
- source_word: נָֽפְלָה מִן הַ/שָּׁמַ֔יִם
  english_pob_choice: fell from heaven
  chosen_spanish: cayó del cielo
  alternatives_spanish:
  - cayó de los cielos
  - se precipitó del cielo
  lexicon: HALOT
  rationale: «Cayó del cielo» reproduce con naturalidad la imagen de origen celeste. «Cielo» es el equivalente español más idiomático para הַשָּׁמַיִם en este contexto narrativo.
- source_word: וַ/תִּבְעַ֥ר
  english_pob_choice: burned up
  chosen_spanish: ardió contra
  alternatives_spanish:
  - se encendió
  - quemó
  - estalló y ardió
  lexicon: HALOT
  rationale: בער describe la acción del fuego en desarrollo. «Ardió contra» intenta conservar el matiz relacional y no cerrar demasiado pronto la secuencia verbal, que luego continúa con «los consumió».
- source_word: בַּ/צֹּ֛אן
  english_pob_choice: the sheep
  chosen_spanish: las ovejas
  alternatives_spanish:
  - el ganado menor
  - el rebaño
  lexicon: HALOT
  rationale: En el contexto inmediato de Job 1, צאן apunta concretamente a ovejas; por eso se traduce con el término más directo y claro para el lector español.
- source_word: וּ/בַ/נְּעָרִ֖ים
  english_pob_choice: the servants
  chosen_spanish: los siervos
  alternatives_spanish:
  - los jóvenes
  - los muchachos
  - los servidores
  lexicon: HALOT
  rationale: El POB inglés revisó «young men» a «servants» por el contexto. En español, «siervos» mantiene la función laboral implícita sin perder la resonancia de dependencia personal, y evita imponer un matiz etario que el contexto no exige.
- source_word: וַ/תֹּאכְלֵ֑/ם
  english_pob_choice: consumed them
  chosen_spanish: los consumió
  alternatives_spanish:
  - los devoró
  - los abrasó
  - los destruyó
  lexicon: HALOT
  rationale: אכל en este uso figurado para fuego se rinde naturalmente como «consumir». La forma verbal española conserva la imagen de destrucción total que culmina la frase.
- source_word: וָ/אִמָּ֨לְטָ֧/ה רַק אֲנִ֛י לְ/בַדִּ֖/י
  english_pob_choice: I alone have escaped
  chosen_spanish: y solo yo he escapado
  alternatives_spanish:
  - y únicamente yo escapé
  - y yo solo he escapado
  lexicon: HALOT
  rationale: La construcción enfática de exclusividad se expresa bien con «solo yo». El perfecto compuesto «he escapado» funciona naturalmente en el discurso reportado de un mensajero que acaba de llegar.
- source_word: לְ/הַגִּ֥יד לָֽ/ךְ
  english_pob_choice: to tell you
  chosen_spanish: para darte noticia
  alternatives_spanish:
  - para informarte
  - para contártelo
  - para decírtelo
  lexicon: HALOT
  rationale: El infinitivo final marca propósito. «Darte noticia» conserva el valor de informe urgente y suena más natural en español narrativo que una fórmula demasiado administrativa.
theological_decisions:
- issue: Cómo traducir אֵשׁ אֱלֹהִים sin resolver su procedencia ni su mecanismo
  english_pob_reading: Rendered 'The fire of God' in the main text, preserving the messenger's expression without specifying mechanism or theological causation.
  chosen_spanish_reading: «El fuego de Dios» en el texto principal, sin decidir si fue rayo, fuego enviado o una expresión idiomática.
  alternative_spanish_readings:
  - «El fuego de Dios» = «el fuego de Dios» con nota sobre posible rayo
  - «un fuego de Dios»
  - «fuego enviado por Dios»
  rationale: El contexto narrativo presenta una atribución del mensajero que no debe ser sobreinterpretada en la traducción. Mantener la formulación abierta preserva la tensión teológica documentada por el POB entre la descripción del mensajero y la causalidad última del relato.
  doctrine_reference: 'Job 1:16; Translation philosophy §3: preservar la tensión teológica sin resolverla en exceso.'
translation_notes:
  revision_awareness: 'Se siguió el expediente revisado del POB inglés, pero no de manera mecánica: se mantuvo la apertura semántica de «Fire of God» en español y se prefirió una solución más natural para el cierre del verso («para darte noticia») sin perder el sentido de urgencia del mensajero. También se ajustó «servants» a «siervos» por claridad contextual y por la resonancia bíblica común del término, sin borrar la función servil implícita en נְעָרִים.'
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלֹהִים y «cielo» para הַשָּׁמַיִם según el uso narrativo del pasaje.
  - «Siervos» se usa aquí como equivalente funcional-contextual de נְעָרִים, en línea con la revisión inglesa que privilegia el rol sobre la edad.
  - La secuencia verbal intenta conservar el encadenamiento rápido de los informes sin volverla más explicativa de lo que permite el hebreo.
