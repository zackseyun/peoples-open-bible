translation:
  language: es
  text: Pero cuando oyeron el avance de Nicanor y el ataque de los gentiles[a], se echaron polvo sobre sí mismos y suplicaron al que había establecido a su pueblo para siempre, y que siempre acude en ayuda de su propia porción[c] con manifestación[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las naciones». El término griego puede significar «naciones» en general, pero en este contexto se refiere a pueblos no judíos opuestos a los judíos.
    reason: lexical_alternative
  - marker: b
    text: O «de manera visible» o «abiertamente». La frase griega sugiere ayuda acompañada por una acción divina manifiesta.
    reason: alternative_reading
  - marker: c
    text: «Su propia porción» también puede traducirse «su propia herencia», preservando el sentido pactual del pueblo de Dios como posesión asignada.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀκούσαντες
  english_pob_choice: when they heard
  chosen_spanish: cuando oyeron
  alternatives_spanish:
  - al oír
  - habiendo oído
  lexicon: LSJ
  rationale: El participio aoristo introduce la circunstancia temporal de la acción principal. «Cuando oyeron» preserva esa relación temporal en español de manera natural.
- source_word: ἔφοδον
  english_pob_choice: advance
  chosen_spanish: avance
  alternatives_spanish:
  - asalto
  - ataque
  - embestida
  lexicon: LSJ
  rationale: El término describe un movimiento hostil o un avance de tropas. «Avance» distingue este sustantivo del siguiente ἐπίθεσιν y evita repetir la misma idea con «ataque».
- source_word: ἐπίθεσιν
  english_pob_choice: attack
  chosen_spanish: ataque
  alternatives_spanish:
  - asalto
  - arremetida
  lexicon: LSJ
  rationale: Es el término militar más directo para ἐπίθεσις. Mantiene la pareja semántica con ἔφοδον sin perder claridad.
- source_word: τῶν ἐθνῶν
  english_pob_choice: the Gentiles
  chosen_spanish: las naciones
  alternatives_spanish:
  - los gentiles
  - los pueblos
  lexicon: LSJ
  rationale: En español, «las naciones» conserva el valor léxico amplio de ἔθνη. La nota aclara que aquí se refiere a pueblos no judíos hostiles, preservando la tensión entre sentido literal y contexto covenantal.
- source_word: καταπασάμενοι γῆν
  english_pob_choice: they sprinkled dust upon themselves
  chosen_spanish: se echaron polvo sobre sí
  alternatives_spanish:
  - se cubrieron de polvo
  - se arrojaron tierra encima
  lexicon: LSJ
  rationale: La imagen idiomática expresa duelo y súplica. «Se echaron polvo sobre sí» sigue de cerca el gesto griego y resulta idiomático en español.
- source_word: ἐλιτάνευσαν
  english_pob_choice: implored
  chosen_spanish: suplicaron
  alternatives_spanish:
  - imploraron
  - rogaron
  lexicon: LSJ
  rationale: El verbo indica petición ferviente. «Suplicaron» comunica bien la intensidad de la oración sin sonar excesivamente arcaico.
- source_word: τὸν ἄχρι αἰῶνος συστήσαντα τὸν αὐτοῦ λαόν
  english_pob_choice: the one who had established his people forever
  chosen_spanish: al que había establecido a su pueblo para siempre
  alternatives_spanish:
  - al que había constituido a su pueblo para siempre
  - al que había establecido a su pueblo por los siglos
  lexicon: LSJ
  rationale: συνίστημι aquí se entiende como establecer/constituir. «Para siempre» refleja ἄχρι αἰῶνος y conserva el sentido pactual de permanencia sin forzar una fórmula litúrgica.
- source_word: ἀεὶ δὲ ... ἀντιλαμβανόμενον
  english_pob_choice: who always comes to the aid
  chosen_spanish: que siempre acude en ayuda
  alternatives_spanish:
  - que siempre sostiene
  - que siempre se pone a ayudar
  lexicon: LSJ
  rationale: ἀντιλαμβάνομαι puede significar ayudar o salir en socorro. «Acude en ayuda» transmite el valor dinámico y constante del participio presente.
- source_word: μετʼ ἐπιφανείας
  english_pob_choice: with manifestation
  chosen_spanish: con manifestación
  alternatives_spanish:
  - de manera visible
  - con intervención visible
  - abiertamente
  lexicon: LSJ
  rationale: La frase sugiere una ayuda acompañada de acción divina manifiesta. «Con manifestación» se mantiene cercano al griego y preserva la ambigüedad teológica sin resolverla.
- source_word: τῆς ἑαυτοῦ μερίδος
  english_pob_choice: his own portion
  chosen_spanish: su propia porción
  alternatives_spanish:
  - su propia herencia
  - su propio lote
  lexicon: LSJ
  rationale: μερίς puede ser porción, parte o herencia. «Su propia porción» conserva la imagen de posesión asignada y su resonancia pactual.
theological_decisions:
- issue: Cómo rendir τῶν ἐθνῶν en un contexto judío de oposición militar
  english_pob_reading: the Gentiles
  chosen_spanish_reading: las naciones
  alternative_spanish_readings:
  - los gentiles
  - los extranjeros
  rationale: «Las naciones» mantiene el valor léxico de ἔθνη sin importar una categoría eclesiástica. La nota permite recuperar el contraste judío/no judío cuando el contexto lo exige.
  doctrine_reference: Primacía del texto original; preservar matiz contextual sin borrar la referencia étnico-religiosa
- issue: Cómo expresar μετʼ ἐπιφανείας sin cerrar la ambigüedad del griego
  english_pob_reading: with manifestation
  chosen_spanish_reading: con manifestación
  alternative_spanish_readings:
  - de manera visible
  - con intervención visible
  - abiertamente
  rationale: La expresión apunta a una ayuda divina patente, pero no exige una terminología técnica. «Con manifestación» conserva la tensión entre ayuda visible y aparición divina.
  doctrine_reference: Preservar la tensión teológica en vez de resolverla
- issue: Cómo traducir τῆς ἑαυτοῦ μερίδος manteniendo el lenguaje de posesión pactual
  english_pob_reading: his own portion
  chosen_spanish_reading: su propia porción
  alternative_spanish_readings:
  - su propia herencia
  - su posesión
  rationale: «Porción» conserva el eco de adjudicación o asignación, útil para el sentido de pueblo como propiedad de Dios. «Herencia» sería válida, pero desplaza algo más el matiz de lote/porción.
  doctrine_reference: Lenguaje de pueblo poseído por Dios; mantener la imagen pactual
translation_notes:
  revision_awareness: 'El borrador sigue la revisión auditada del inglés POB: mantiene la secuencia temporal del participio inicial, separa ἔφοδον y ἐπίθεσιν con dos términos distintos en español, conserva la imagen de polvo sobre sí con una formulación natural, y reordena la cláusula final para que suene idiomática sin perder el valor de μετʼ ἐπιφανείας.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo requiera explícitamente; aquí no aparece el nombre divino.
  - Se mantiene «Mesías/Cristo» fuera de este versículo; no aplica.
  - «Las naciones» conserva el doble plano de significado con nota explicativa, en armonía con la política del proyecto para ἔθνη.
  - «Con manifestación» queda deliberadamente abierto para respetar la ambigüedad del griego y la nota del audit trail inglés.
  - «Porción» se conserva como término pactual y no se reemplaza por un equivalente más interpretativo como «herencia» en el texto principal.
