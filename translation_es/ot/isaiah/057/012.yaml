translation:
  language: es
  text: Yo mismo declararé tu rectitud[a] y tus obras, pero no te beneficiarán[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tu justicia»; el hebreo צדקה puede abarcar ambos matices según el contexto.
    reason: lexical_alternative
  - marker: b
    text: O «no te ayudarán». El verbo hebreo puede significar «beneficiar, aprovechar, ayudar».
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲנִי
  english_pob_choice: I myself
  chosen_spanish: Yo mismo
  alternatives_spanish:
  - Yo
  - Yo mismo seré quien
  lexicon: HALOT
  rationale: El pronombre independiente es enfático; «yo mismo» conserva esa fuerza mejor que un simple «yo».
- source_word: אַגִּיד
  english_pob_choice: will declare
  chosen_spanish: declararé
  alternatives_spanish:
  - diré
  - anunciaré
  - manifestaré
  lexicon: HALOT
  rationale: El piel/hiphil de נגד se expresa naturalmente en español como «declarar»; en futuro mantiene el valor de acción futura del verbo.
- source_word: צִדְקָתֵךְ
  english_pob_choice: your righteousness
  chosen_spanish: tu justicia
  alternatives_spanish:
  - tu rectitud
  - tu justicia/righteousness
  - tus actos justos
  lexicon: HALOT
  rationale: צדקה puede ser «justicia» o «rectitud». Dado que el contexto asocia este término con «tus obras», «justicia» es una alternativa válida y de lectura natural en español, sin perder la tensión del reproche implícito.
- source_word: וְאֶת מַעֲשַׂיִךְ
  english_pob_choice: and your works
  chosen_spanish: y tus obras
  alternatives_spanish:
  - y tus hechos
  - y tus actos
  - y lo que has hecho
  lexicon: HALOT
  rationale: מַעֲשִׂים designa obras/hechos; «obras» conserva el paralelo léxico con la línea anterior y el posible matiz evaluativo del pasaje.
- source_word: וְלֹא יוֹעִילוּךְ
  english_pob_choice: but they will not profit you
  chosen_spanish: pero no te aprovecharán
  alternatives_spanish:
  - y no te aprovecharán
  - pero no te beneficiarán
  - pero no te servirán de nada
  lexicon: HALOT
  rationale: יועיל puede significar «aprovechar, beneficiar, ayudar». «Aprovecharán» es idiomático en español y conserva la idea de utilidad sin forzar un glosado interpretativo.
theological_decisions:
- issue: Renderización de צדקה en un contexto posiblemente irónico o acusatorio
  english_pob_reading: Retained as 'your righteousness' without scare quotes or interpretive expansion, allowing the context to convey irony/exposure.
  chosen_spanish_reading: «tu justicia» sin comillas ni ampliación interpretativa
  alternative_spanish_readings:
  - «tu righteousness» no es posible en español
  - «tu supuesta justicia»
  - «tus actos de justicia»
  rationale: Se preserva la tensión del texto sin introducir una explicación que no está en el hebreo. La ambigüedad entre justicia/rectitud se deja viva, aunque aquí «justicia» funciona bien en español.
  doctrine_reference: Principio de primacía del texto original; preservar tensión teológica sin resolverla artificialmente.
translation_notes:
  revision_awareness: 'El borrador sigue el estado revisado como estable: el texto hebreo y el audit trail inglés coinciden en alto grado; no se requieren cambios adicionales respecto del control más reciente.'
  spanish_consistency_notes:
  - Se mantiene «tus obras» para el paralelismo con «tu justicia», evitando una paráfrasis explicativa.
  - Se usó «aprovecharán» para reflejar el valor semántico de יועיל sin perder naturalidad en español.
  - La puntuación reproduce una estructura contrastiva equivalente al inglés auditado.
