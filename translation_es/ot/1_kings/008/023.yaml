translation:
  language: es
  text: 'Y dijo: “Oh Yahvé, Dios de Israel, no hay Dios como tú en el cielo arriba y en la tierra abajo[a], que guardas el pacto y el amor fiel[b] para con tus siervos que andan delante de ti con todo su corazón.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en los cielos arriba y en la tierra abajo». El hebreo expresa un merismo de alcance total.
    reason: lexical_alternative
  - marker: b
    text: Hebreo hesed, que a menudo denota lealtad de pacto, amor fiel o amor constante.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמַר
  english_pob_choice: And he said
  chosen_spanish: Y dijo
  alternatives_spanish:
  - Entonces dijo
  lexicon: HALOT
  rationale: La forma narrativa waw-consecutiva se vierte naturalmente con una coordinación simple en español. 'Y dijo' conserva la secuencia del relato sin añadir matiz temporal o discursivo no explicitado por el hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el valor del nombre propio divino y la convención del proyecto para יְהוָה: ''Yahvé''. Se evita sustituirlo por un título impersonal, y ''Jehová'' no se adopta por no ser la forma preferida en la política terminológica del proyecto.'
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: God of Israel
  chosen_spanish: Dios de Israel
  alternatives_spanish:
  - el Dios de Israel
  - Dios, el Dios de Israel
  lexicon: HALOT
  rationale: La construcción en genitivo se expresa de manera idiomática como 'Dios de Israel'. Es la forma más clara y fiel para la invocación directa.
- source_word: אֵין כָּמוֹךָ אֱלֹהִים
  english_pob_choice: there is no God like you
  chosen_spanish: no hay Dios como tú
  alternatives_spanish:
  - no hay ninguno como tú entre los dioses
  - no existe dios como tú
  lexicon: HALOT
  rationale: En el contexto de dirigirse a Yahvé, 'Dios' funciona con valor singular y personal. 'No hay Dios como tú' conserva la incomparabilidad sin forzar una paráfrasis más extensa.
- source_word: בַּשָּׁמַיִם מִמַּעַל וְעַל הָאָרֶץ מִתָּחַת
  english_pob_choice: in heaven above or on earth beneath
  chosen_spanish: en los cielos arriba ni en la tierra abajo
  alternatives_spanish:
  - en el cielo arriba y en la tierra abajo
  - en los cielos de lo alto y en la tierra de abajo
  lexicon: HALOT
  rationale: El hebreo presenta un merismo de totalidad cósmica. Se mantiene con 'cielos arriba... tierra abajo'. 'Cielos' preserva mejor el plural hebreo que un singular único, y 'ni' reproduce en español la fuerza coordinada negativa de la comparación global.
- source_word: שֹׁמֵר הַבְּרִית
  english_pob_choice: keeping the covenant
  chosen_spanish: que guardas el pacto
  alternatives_spanish:
  - que mantienes el pacto
  - que preservas el pacto
  lexicon: HALOT
  rationale: El participio describe la acción habitual de Yahvé. 'Guardar el pacto' es un equivalente estable y bíblicamente transparente en español para שׁמר + בְּרִית, sin debilitar el compromiso relacional.
- source_word: וְהַחֶסֶד
  english_pob_choice: the steadfast love
  chosen_spanish: y la fidelidad
  alternatives_spanish:
  - y el amor constante
  - y la misericordia fiel
  - y la lealtad amorosa
  lexicon: HALOT
  rationale: El inglés POB destaca la tensión de חֶסֶד como fidelidad amorosa de pacto. En español, 'fidelidad' comunica con claridad la lealtad pactal; se la mantiene junto al pacto para no diluir el contenido relacional. Se evita 'misericordia' por estrechar indebidamente el término.
- source_word: לַעֲבָדֶיךָ
  english_pob_choice: for your servants
  chosen_spanish: para con tus siervos
  alternatives_spanish:
  - para tus siervos
  - a favor de tus siervos
  lexicon: HALOT
  rationale: Aquí 'siervos' conserva el registro bíblico de subordinación leal y evita la dureza que 'esclavos' tendría en español para este contexto de oración. 'Para con' expresa adecuadamente el alcance relacional de la acción divina.
- source_word: הַהֹלְכִים לְפָנֶיךָ
  english_pob_choice: who walk before you
  chosen_spanish: que andan delante de ti
  alternatives_spanish:
  - que caminan delante de ti
  - que viven en tu presencia
  lexicon: HALOT
  rationale: Se conserva el modismo hebreo de conducta delante de Dios. 'Andan delante de ti' es claro y natural en español bíblico contemporáneo, sin convertir el tropo en una paráfrasis abstracta.
- source_word: בְּכָל לִבָּם
  english_pob_choice: with all their heart
  chosen_spanish: con todo su corazón
  alternatives_spanish:
  - de todo corazón
  - con todo el corazón
  lexicon: HALOT
  rationale: '''Corazón'' mantiene el centro semítico de la voluntad, afecto e ինտención interior. La forma singular distributiva ''su corazón'' es idiomática en español y refleja bien el hebreo colectivo.'
theological_decisions:
- issue: Tratamiento del Tetragrámaton en español
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto dirige una invocación al Dios del pacto con su nombre propio. 'Yahvé' preserva esa identificación personal y evita la sustitución por un título. Se alinea con la política del proyecto para יְהוָה.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de חֶסֶד en paralelo con el pacto
  english_pob_reading: steadfast love
  chosen_spanish_reading: la fidelidad
  alternative_spanish_readings:
  - el amor constante
  - la lealtad amorosa
  - la misericordia
  rationale: En el paralelismo con 'el pacto', חֶסֶד no debe reducirse a mera emoción ni a un acto aislado de misericordia. 'Fidelidad' comunica de forma clara la lealtad perseverante y el compromiso de pacto que el versículo atribuye a Yahvé.
  doctrine_reference: DOCTRINE.md Translation philosophy §5 (consistency of key terms, documented exception if needed)
- issue: Alcance de la comparación cósmica
  english_pob_reading: in heaven above or on earth beneath
  chosen_spanish_reading: en los cielos arriba ni en la tierra abajo
  alternative_spanish_readings:
  - en el cielo arriba y en la tierra abajo
  - en los cielos de lo alto y en la tierra de abajo
  rationale: El hebreo formula una merismación de totalidad. En español, 'cielos... tierra' conserva mejor el plural hebreo y la amplitud universal que una simplificación a 'cielo' singular.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy — preserve source imagery where not misleading'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión final del inglés POB, que solo ajustó mayúsculas y puntuación sin cambiar el sentido. Por eso la versión española mantiene la estructura base del texto auditado, con adaptación idiomática al español y sin añadir interpretaciones no sustentadas por el hebreo.
  spanish_consistency_notes:
  - Se conserva 'Yahvé' para יְהוָה conforme al estándar del proyecto.
  - Se mantiene 'pacto' para הַבְּרִית y 'fidelidad' para הַחֶסֶד en coherencia contextual con la relación de pacto.
  - '''Siervos'' se usa en sentido relacional bíblico, no como sustituto automático de ''esclavos'' en todos los contextos.'
  - La comparación cósmica se expresa con 'cielos' y 'tierra' para reflejar el merismo hebreo sin perder naturalidad en español.
