base_translation:
  language: en
  yaml_path: translation/ot/deuteronomy/003/014.yaml
  text: Jair son of Manasseh took all the region of Argob[a], as far as the border of the Geshurites and the Maacathites, and he called them, that is, Bashan, Havvoth-jair[b], to this day.
  footnotes:
  - marker: a
    text: Or more literally, 'and he called them after his own name, Bashan, Havvoth-jair.' The Hebrew syntax is compressed and may be understood slightly differently.
    reason: alternative_reading
  - marker: b
    text: Havvoth-jair likely means 'the villages of Jair' or 'the tent-settlements of Jair.'
    reason: lexical_alternative
