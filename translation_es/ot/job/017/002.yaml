translation:
  language: es
  text: Ciertamente, los burladores están conmigo[a], y mi ojo se queda fijo en su provocación[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los engañadores». El hebreo puede referirse tanto a personas burlonas como a personas engañosas.
    reason: lexical_alternative
  - marker: b
    text: O «su rebelión» o «su amargura». La expresión hebrea es difícil y puede señalar conducta provocadora, rebelde o amarga.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם לֹא
  english_pob_choice: Surely
  chosen_spanish: Ciertamente
  alternatives_spanish:
  - Sin duda
  - Verdaderamente
  - Si no
  lexicon: HALOT
  rationale: La expresión hebrea funciona aquí de manera enfática y no condicional. «Ciertamente» transmite bien el valor asseverativo en un español natural y digno, sin perder la fuerza retórica del original.
- source_word: הֲתֻלִים
  english_pob_choice: mockers
  chosen_spanish: los burladores
  alternatives_spanish:
  - los engañadores
  - los que se burlan
  - los mofadores
  lexicon: HALOT
  rationale: El término puede abarcar personas que se mofan o ridiculizan. «Burladores» conserva el matiz de desprecio verbal y se ajusta mejor al contexto de Job que «engañadores», aunque esa posibilidad léxica existe.
- source_word: עִמָּדִי
  english_pob_choice: are with me
  chosen_spanish: están conmigo
  alternatives_spanish:
  - están junto a mí
  - están a mi lado
  lexicon: HALOT
  rationale: La preposición con sufijo de primera persona indica compañía o presencia cercana. «Están conmigo» es la forma más directa y natural en español.
- source_word: וּבְהַמְּרוֹתָם
  english_pob_choice: on their provocation
  chosen_spanish: sobre su provocación
  alternatives_spanish:
  - sobre su rebelión
  - sobre su amargura
  - en medio de su provocación
  lexicon: HALOT
  rationale: La forma derivada de מרה puede apuntar a conducta provocadora, rebelde o amarga. «Provocación» mantiene la dificultad semántica sin cerrar prematuramente el sentido hacia «rebelión»; el singular abstracto en español refleja el objeto de la frase, como en la traducción inglesa auditada.
- source_word: תָּלַן
  english_pob_choice: lodges
  chosen_spanish: pasa la noche
  alternatives_spanish:
  - permanece
  - se posa
  - se queda
  lexicon: HALOT
  rationale: 'El verbo significa literalmente «alojarse / pasar la noche». Aplicado al ojo, la imagen es metafórica: permanece fijado durante la noche. «Pasa la noche» conserva esa imagen verbal mejor que un simple «permanece».'
- source_word: עֵינִי
  english_pob_choice: my eye
  chosen_spanish: mi ojo
  alternatives_spanish:
  - mis ojos
  lexicon: HALOT
  rationale: El hebreo usa singular; el español también puede conservarlo sin forzar la frase. Mantener «mi ojo» preserva la imagen idiomática de un ojo que vela o se queda mirando.
translation_notes:
  revision_awareness: El pasaje muestra alta concordancia con el audit trail inglés; no se introdujeron revisiones sustantivas. Se mantuvo la tensión léxica de הֲתֻלִים y de וּבְהַמְּרוֹתָם mediante notas alternativas, sin suavizarla hacia una sola interpretación cerrada.
  spanish_consistency_notes:
  - Se siguió el valor asseverativo de אִם לֹא con una afirmación enfática en español.
  - Se conservó la imagen corporal singular de «mi ojo», coherente con el hebreo.
  - Se evitó sustituir «provocación» por un término eclesiástico o doctrinalmente cargado; el hebreo presenta una ambigüedad real que se deja visible.
