review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador acierta en la estructura principal del versículo y en varias decisiones léxicas clave: פִּיחַ = «hollín», הַכִּבְשָׁן = «horno», לִפְנֵי פַרְעֹה = «delante de Faraón», y la dirección ascendente de הַשָּׁמָיְמָה. Sin embargo, falla de manera importante en la descripción de la plaga cutánea. שְׁחִין אֲבַעְבֻּעֹת פֹּרֵחַ se refleja en el POB inglés como «boils with blisters breaking out»; el español «una llaga de úlceras que brotaba» cambia número, imagen y tipo de lesión, y sobreinterpreta el hebreo con «úlceras».'
  spanish_quality_summary: El texto es generalmente legible, pero «se convirtió en una llaga de úlceras que brotaba» suena poco natural y médicamente confuso en español. Una formulación como «se convirtió en llagas con ampollas que brotaban» o «en forúnculos con ampollas» comunica mejor el hebreo y suena más idiomática. También conviene mantener la concordancia plural con la erupción descrita.
  glossary_alignment: 'No hay conflicto con términos del glosario mayor como Yahvé/Mesías. Las decisiones para «hollín», «horno», «delante de Faraón» y «hacia el cielo» son compatibles con la línea del proyecto. El principal desajuste es frente al razonamiento léxico documentado para שְׁחִין / אֲבַעְבֻּעֹת / פֹּרֵחַ: el borrador abandona «boils with blisters breaking out» en favor de una paráfrasis menos fiel.'
  issues:
  - severity: high
    issue: La afección cutánea está mal representada como «una llaga de úlceras».
    rationale: שְׁחִין es pluralizable en sentido colectivo como «llagas/forúnculos/boils», y אֲבַעְבֻּעֹת se refiere a ampollas o pústulas, no a «úlceras». La redacción actual cambia la imagen del hebreo y del POB auditado.
  - severity: medium
    issue: La concordancia singular «una llaga ... que brotaba» debilita la idea de erupción múltiple.
    rationale: El hebreo presenta una erupción de lesiones con ampollas que van brotando; en español, el singular hace más torpe y menos natural la descripción.
  - severity: low
    issue: La nota [b] no corresponde al motivo de la nota inglesa y puede inducir a confusión.
    rationale: La nota inglesa marcada b en el expediente habla de «on man and on beast», no de «toward the sky». Aunque una nota sobre «hacia el cielo» no es errónea, aquí no preserva el rastro auditado más pertinente. Como no es necesaria en español, puede omitirse.
  revised_spanish_text: Así que tomaron el hollín[a] del horno y se pusieron delante de Faraón, y Moisés lo arrojó hacia el cielo, y se convirtió en llagas con ampollas que brotaban sobre el hombre y sobre la bestia.
  revised_footnotes:
  - marker: a
    text: O «ceniza del horno». El hebreo sugiere más específicamente hollín o polvo negro fino, no ceniza genérica.
    reason: lexical_alternative
  revision_rationale: 'Se corrige la descripción de la plaga para reflejar con mayor fidelidad שְׁחִין אֲבַעְבֻּעֹת פֹּרֵחַ y el razonamiento del POB inglés: «llagas con ampollas que brotaban» mantiene la imagen de lesiones eruptivas sin introducir el concepto más específico y menos fiel de «úlceras». Se elimina la nota [b] por no ser necesaria y por no corresponder al foco del aparato inglés en este expediente. El resto del versículo puede conservarse con ajustes mínimos.'
