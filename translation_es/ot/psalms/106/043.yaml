review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura general del hebreo: repetición de la liberación divina, contraste adversativo, rebelión del pueblo y consecuencia ligada a su iniquidad. Sin embargo, dos puntos importantes no preservan bien el expediente POB: «fueron humillados» desplaza מוך hacia una humillación externa o moral, cuando el sentido documentado es más bien ser abatidos, reducidos o llevados a la ruina; y la nota [a] introduce una alternativa para יַצִּילֵם que no corresponde a las notas inglesas conservadas para este verso, mientras faltan las alternativas documentadas para «en su consejo» y «fueron llevados a lo bajo / se hundieron».'
  spanish_quality_summary: El español es claro y legible, pero «en su consejo» suena algo rígido y potencialmente ambiguo de forma poco natural en español actual. «Según sus propios planes» o «en sus propios planes» sería más idiomático, pero como el inglés POB retiene la cercanía formal de «in their counsel», conviene una solución que conserve la ambigüedad sin sonar forzada, como «en sus planes» con nota. «Fueron humillados» también suena interpretativo más que descriptivo. Una revisión a «fueron abatidos» mejora fidelidad y naturalidad.
  glossary_alignment: No hay conflictos con términos proyectuales mayores como Yahvé, Mesías, Espíritu, etc. «Iniquidad» está bien alineado con la decisión teológica. El principal desajuste léxico es מוך -> «humillados», que no sigue la racionalidad documentada de ‘brought low / sank down / wasted away’.
  issues:
  - severity: medium
    issue: «fueron humillados» para וַיָּמֹכּוּ
    rationale: El hebreo y la auditoría inglesa apuntan a abatimiento, reducción o hundimiento, no primariamente a humillación. «Humillados» añade un matiz de vergüenza o acto humillante no exigido por la fuente.
  - severity: medium
    issue: Las notas al pie no siguen las alternativas preservadas en el expediente inglés
    rationale: La nota [a] del borrador comenta «los libró», pero las notas inglesas para este verso se refieren a «rebelled in their counsel/plan» y «were brought low / sank down / wasted away». Esa información debería preservarse también en español.
  - severity: low
    issue: «en su consejo» es correcto pero poco idiomático en español contemporáneo
    rationale: Aunque cercano al hebreo, puede sonar opaco. Conviene mantener la cercanía formal pero apoyar con nota léxica que abra «plan / propósito».
  revised_spanish_text: Muchas veces los libró, pero se rebelaron en sus planes[a] y fueron abatidos[b] por su iniquidad.
  revised_footnotes:
