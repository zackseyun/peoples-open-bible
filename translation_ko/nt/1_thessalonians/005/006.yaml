id: 1TH.5.6
reference: 1 Thessalonians 5:6
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ἄρα οὖν μὴ καθεύδωμεν ⸀ὡς οἱ λοιποί, ἀλλὰ γρηγορῶμεν καὶ νήφωμεν.
base_translation:
  language: en
  yaml_path: translation/nt/1_thessalonians/005/006.yaml
  text: So then[a], let us not sleep as the rest do[b], but let us stay awake and be sober.
  footnotes:
  - marker: a
    text: Or 'be watchful' for 'stay awake.' The Greek verb can emphasize wakefulness or vigilance.
    reason: lexical_alternative
  - marker: b
    text: Or 'be self-controlled' or 'be clearheaded' for 'be sober.' The Greek verb carries the sense of sobriety and, by extension, mental alertness and restraint.
    reason: lexical_alternative
translation:
  language: ko
  text: 그러므로 우리는 다른 사람들처럼 자지 말고, 깨어 있고[a] 정신을 차립시다[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「깨어 경계함」. 헬라어 동사는 깨어 있음·경계함을 강조할 수 있다.
    reason: lexical_alternative
  - marker: b
    text: 또는 「자제하다」, 「맑은 정신을 유지하다」. 헬라어 동사는 술 깸의 의미에서 마음의 깨어 있음·자제로 확장된다.
    reason: lexical_alternative
lexical_decisions:
- source_word: μὴ καθεύδωμεν
  english_pob_choice: let us not sleep
  chosen_korean: 자지 말고
  alternatives_korean:
  - 잠들지 말고
  - 잠자지 말고
  lexicon: BDAG
  rationale: καθεύδω의 비유적 「영적 잠」. 「자다」가 한국어로 가장 자연스러우며 비유적 어감을 보존한다.
- source_word: γρηγορῶμεν
  english_pob_choice: stay awake
  chosen_korean: 깨어 있고
  alternatives_korean:
  - 깨어 경계하고
  - 깨어 있어 살피고
  lexicon: BDAG
  rationale: γρηγορέω의 「깨어 있음」 기본 의미.
- source_word: νήφωμεν
  english_pob_choice: be sober
  chosen_korean: 정신을 차립시다
  alternatives_korean:
  - 맑은 정신을 유지합시다
  - 자제합시다
  lexicon: BDAG
  rationale: νήφω의 본래 「술 깬 상태」가 비유적으로 「맑은 정신·자제」로 확장된다. 「정신을 차리다」가 한국어로 자연스럽다.
