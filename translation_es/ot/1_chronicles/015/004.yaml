translation:
  language: es
  text: Y David reunió a los hijos de Aarón y a los levitas.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיֶּאֱסֹף
  english_pob_choice: gathered
  chosen_spanish: reunió
  alternatives_spanish:
  - juntó
  - agrupó
  lexicon: HALOT
  rationale: El verbo hebreo אסף en esta forma narrativa expresa reunir personas. En español, «reunió» suena natural y transmite la acción de convocar o poner juntos a los grupos mencionados, sin perder el sentido de colección humana del contexto.
- source_word: דָּוִיד
  english_pob_choice: David
  chosen_spanish: David
  lexicon: nombre propio
  rationale: Nombre propio estándar en español.
- source_word: בְּנֵי אַהֲרֹן
  english_pob_choice: the sons of Aaron
  chosen_spanish: los hijos de Aarón
  alternatives_spanish:
  - los descendientes de Aarón
  - los hijos de Aarón
  lexicon: HALOT
  rationale: Se conserva la estructura genealógica literal del hebreo. «Hijos» mantiene la forma filial del original mejor que una neutralización como «descendientes», y es comprensible en español bíblico actual.
- source_word: הַלְוִיִּם
  english_pob_choice: the Levites
  chosen_spanish: los levitas
  alternatives_spanish:
  - los descendientes de Leví
  lexicon: HALOT
  rationale: El término designa al grupo levítico como categoría cultual conocida; «levitas» es el equivalente natural y preciso en español.
- source_word: אֶת ... וְאֶת
  english_pob_choice: '[not separately translated; marked direct objects as coordinated objects]'
  chosen_spanish: '[no se traduce aparte; se expresa con coordinación normal]'
  alternatives_spanish:
  - a los hijos de Aarón y a los levitas
  lexicon: gramática hebrea
  rationale: La partícula אֵת marca el objeto directo definido y no tiene equivalente directo en español. Su función se refleja mediante la coordinación natural en la frase española.
translation_notes:
  revision_awareness: El texto hebreo y la traducción inglesa auditada están en acuerdo alto; no se observaron revisiones aplicadas ni variantes textuales que requieran nota.
  spanish_consistency_notes:
