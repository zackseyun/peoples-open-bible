review_pass:
  verdict: revise
  source_alignment_summary: El borrador transmite correctamente la exhortación a dar gracias a Yahvé, su bondad y la duración perpetua de su חֶסֶד. Sin embargo, la cláusula final «porque para siempre es su amor fiel» suena invertida y menos natural en español bíblico moderno; además, la nota [a] no refleja una alternativa sino una explicación innecesaria, mientras que falta una nota para preservar la alternativa teológica documentada sobre חֶסֶד.
  spanish_quality_summary: '«Den gracias a Yahvé, porque es bueno» es claro y fiel. La última frase necesita ajuste para naturalidad y dignidad: «su amor fiel es para siempre» mejora mucho, pero «su amor fiel permanece para siempre» o «su amor fiel dura para siempre» comunica mejor el valor durativo que el inglés POB explicitó. Conviene también anclar la nota léxica al término חֶסֶד, no al nombre divino.'
  glossary_alignment: Se alinea bien con «Yahvé» para יהוה y con «bueno» para טוֹב. «Amor fiel» es aceptable para חֶסֶד en español, aunque requiere nota para conservar la alternativa «fidelidad al pacto» / «amor de pacto». La nota actual [a] sobre Yahvé no es necesaria y desplaza la nota verdaderamente útil.
  issues:
  - severity: medium
    issue: Orden y expresión poco natural en la cláusula final
    rationale: «porque para siempre es su amor fiel» es comprensible, pero suena forzado. El hebreo afirma la permanencia de חַסְדּוֹ; en español natural conviene expresarlo con «permanece para siempre» o estructura equivalente.
  - severity: medium
    issue: Las notas no preservan la alternativa principal documentada para חֶסֶד
    rationale: El English POB registra una nota sobre el matiz de amor leal/pactual. La versión española debería conservar esa alternativa en una nota anclada a «amor fiel», no dedicar una nota al hecho de que el hebreo dice «a Yahvé».
  - severity: low
    issue: Nota [a] innecesaria sobre «a Yahvé»
    rationale: No añade información crítica al lector y no corresponde a una ambigüedad real del texto español. Además, el proyecto ya establece «Yahvé» como forma principal.
  revised_spanish_text: Den gracias a Yahvé, porque es bueno, porque su amor fiel[a] permanece para siempre.
  revised_footnotes:
  - marker: a
    text: O «su fidelidad al pacto permanece para siempre». El hebreo חֶסֶד incluye el sentido de amor leal y pactual.
    reason: lexical_alternative
  revision_rationale: Se eliminó la nota innecesaria sobre «Yahvé», se reubicó la nota al término teológicamente cargado חֶסֶד, y se reformuló la cláusula final con «permanece para siempre» para reflejar con español natural el sentido durativo que el hebreo afirma y que el English POB explicitó.
