translation:
  language: es
  text: Además[a], si dos se acuestan juntos, se mantienen abrigados; pero ¿cómo puede calentarse uno solo?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «están calientes»; la expresión hebrea indica literalmente que el calor es para ellos.
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּם
  english_pob_choice: Again
  chosen_spanish: Otra vez
  alternatives_spanish:
  - También
  - Además
  lexicon: HALOT
  rationale: El hebreo añade un enunciado más dentro de la secuencia sapiencial. «Otra vez» conserva el valor aditivo/reiterativo sin introducir una tonalidad excesivamente formal o mecánica en español.
- source_word: אִם
  english_pob_choice: if
  chosen_spanish: si
  alternatives_spanish:
  - cuando
  lexicon: HALOT
  rationale: La cláusula es condicional o situacional. «Si» reproduce de forma directa la estructura hebrea.
- source_word: יִשְׁכְּבוּ
  english_pob_choice: lie down
  chosen_spanish: se acuestan
  alternatives_spanish:
  - se echan
  - se ponen a dormir
  lexicon: HALOT
  rationale: El verbo indica la acción de acostarse o recostarse; en español «se acuestan» transmite bien el acto físico y sugiere sin forzarlo el contexto de dormir o descansar.
- source_word: שְׁנַיִם
  english_pob_choice: two
  chosen_spanish: dos
  alternatives_spanish:
  - dos personas
  lexicon: HALOT
  rationale: El numeral funciona sustantivamente. En español basta «dos» porque el contexto ya especifica a qué se refiere.
- source_word: וְחַם לָהֶם
  english_pob_choice: they keep warm
  chosen_spanish: se mantienen calientes
  alternatives_spanish:
  - están calientes
  - hay calor para ellos
  lexicon: HALOT
  rationale: La expresión hebrea comunica el resultado de tener calor para ellos. «Se mantienen calientes» expresa de manera natural ese efecto práctico sin perder el sentido básico.
- source_word: וּלְאֶחָד
  english_pob_choice: but how can one
  chosen_spanish: pero ... uno solo
  alternatives_spanish:
  - y para uno
  - pero para uno
  lexicon: HALOT
  rationale: El hebreo contrapone al par con un singular aislado. El español requiere explicitar el contraste con «pero» para que la pregunta retórica funcione con claridad.
- source_word: אֵיךְ
  english_pob_choice: how can
  chosen_spanish: ¿cómo puede
  alternatives_spanish:
  - ¿cómo
  lexicon: HALOT
  rationale: En pregunta retórica, «¿cómo puede...?» comunica de modo natural la imposibilidad o dificultad práctica que expresa el hebreo.
- source_word: יֵחָם
  english_pob_choice: keep warm
  chosen_spanish: calentarse
  alternatives_spanish:
  - mantenerse caliente
  - entrar en calor
  lexicon: HALOT
  rationale: El verbo expresa llegar a estar o permanecer caliente. Aquí «calentarse» preserva la idea verbal y encaja bien con la construcción interrogativa.
- source_word: לְבַד implied by context
  english_pob_choice: alone
  chosen_spanish: solo
  alternatives_spanish:
  - a solas
  - en soledad
  lexicon: HALOT
  rationale: Aunque no aparece una palabra independiente equivalente en el hebreo, el contraste exige una precisión contextual mínima. «Solo» hace explícita la soledad implícita sin añadir más de lo requerido.
translation_notes:
  revision_awareness: El audit trail en inglés no muestra revisiones aplicadas ni cambios pendientes; la versión actual fue confirmada como adecuada y en alto acuerdo.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se evitó «SEÑOR» y también «Cristo», porque no corresponden al contenido de este texto.
  - Se conservó la imagen física de calor/temperatura, sin moralizar ni alegorizar el dicho sapiencial.
