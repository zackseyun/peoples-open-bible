  is not explicit, hence the [a] note. Lines 2–5 clearly match a known Thunder pair:
  "I am the hearing ... I am the speech ..." with ⲉⲧϣⲏⲡ ⲛϩⲱⲃ ⲛⲓⲙ ≈ "accessible to
  all" and ⲉⲧⲉⲙⲁⲩ ϣⲁⲙⲁϩⲧⲉ ⲙⲙⲟϥ ≈ "that no one can grasp it." The trailing ⲁⲛⲟⲕ ⲡⲉ
  at the end likely starts the next self-identification and is not expanded here to
  avoid inventing content.'
