revisions:
- from: Yo soy el Dios de Betel[a], donde ungiste una piedra con aceite y donde me hiciste un voto. Ahora levántate, sal de esta tierra[b] y vuelve a la tierra de tu nacimiento.
  to: Yo soy el Dios de Betel[b], donde ungiste un pilar y donde me hiciste un voto[a]. Ahora levántate, sal de esta tierra y vuelve a la tierra de tu nacimiento.
  rationale: Se corrigen los anclajes de las notas para que coincidan con su contenido. Se reemplaza «piedra con aceite» por «pilar» para seguir más de cerca מַצֵּבָה y evitar añadir un detalle no explícito en el versículo. Se conserva un español natural y digno, manteniendo «me hiciste un voto» con nota explicativa sobre la construcción hebrea enfática.
