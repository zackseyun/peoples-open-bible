translation:
  language: es
  text: Pero a la tribu de Leví Moisés no le dio herencia; Yahvé[a], el Dios de Israel, es su herencia, tal como les habló.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «porción» para traducir נַחֲלָה en las dos apariciones de este versículo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/לְ/שֵׁבֶט
  english_pob_choice: But to the tribe of
  chosen_spanish: Pero a la tribu de
  alternatives_spanish:
  - Y a la tribu de
  - Mas a la tribu de
  lexicon: HALOT
  rationale: La conjunción con la preposición introduce contraste con las reparticiones tribales anteriores; en español, "Pero a la tribu de" reproduce bien ese giro contrastivo sin forzar el orden hebreo.
- source_word: הַלֵּוִי
  english_pob_choice: Levi
  chosen_spanish: Leví
  alternatives_spanish:
  - el levita
  - la tribu levítica
  lexicon: HALOT
  rationale: Con "tribu" el referente es la entidad tribal, por lo que el nombre propio "Leví" es la opción natural y fiel en español.
- source_word: לֹא נָתַן מֹשֶׁה
  english_pob_choice: Moses gave no
  chosen_spanish: Moisés no dio
  alternatives_spanish:
  - Moisés no había dado
  - Moisés no entregó
  lexicon: HALOT
  rationale: El hebreo expresa una acción pasada simple con negación. "No dio" conserva esa forma y es idiomático con el sustantivo siguiente.
- source_word: נַחֲלָה
  english_pob_choice: inheritance
  chosen_spanish: herencia
  alternatives_spanish:
  - porción
  - reparto
  - heredad
  lexicon: HALOT
  rationale: En este contexto de reparto de tierra, "herencia" comunica bien el valor de נַחֲלָה. En español, "herencia" mantiene tanto la idea de asignación como la carga covenantal del término.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue la convención del proyecto para el Tetragrámaton: "Yahvé" en el texto principal, en vez de una sustitución por título como "el SEÑOR".'
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - el Dios de Israel
  - Dios de Israel
  lexicon: HALOT
  rationale: La construcción posesiva se expresa de manera directa y natural en español con "el Dios de Israel", preservando la identificación pactual.
- source_word: הוּא נַחֲלָתָם
  english_pob_choice: is their inheritance
  chosen_spanish: es su herencia
  alternatives_spanish:
  - es su porción
  - él es su herencia
  lexicon: HALOT
  rationale: El hebreo identifica a Yahvé como la herencia de ellos; en español, "es su herencia" conserva la predicación sin añadir innecesariamente un pronombre explícito. Se conserva "herencia" para mantener la coherencia léxica con la primera ocurrencia de נַחֲלָה.
- source_word: כַּאֲשֶׁר דִּבֶּר לָהֶם
  english_pob_choice: just as he spoke to them
  chosen_spanish: tal como les habló
  alternatives_spanish:
  - como les habló
  - justo como les habló
  - tal como les había hablado
  lexicon: HALOT
  rationale: דִּבֶּר se refiere a hablar/decir; "les habló" mantiene la cercanía al hebreo. "Tal como" preserva el valor comparativo de la cláusula sin introducir una paráfrasis más interpretativa.
theological_decisions:
- issue: Nombre divino יְהוָה en español
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: 'El texto hebreo usa el Nombre propio divino, no un título. El español mantiene la decisión auditada del POB de no ocultarlo bajo una sustitución reverencial, y usa la forma establecida del proyecto: "Yahvé".'
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sentido teológico de 'su herencia' aplicado a Yahvé
  english_pob_reading: Retain the metaphor/theological claim that the LORD himself is their inheritance
  chosen_spanish_reading: Conservar que Yahvé mismo es la herencia de Leví
  alternative_spanish_readings:
  - Yahvé es su porción
  - Yahvé es lo que heredan
  rationale: El hebreo afirma explícitamente que Yahvé es la herencia de la tribu, no solo que reciben beneficios sacerdotales. La traducción conserva esa afirmación sin suavizarla, porque forma parte del sentido teológico del versículo.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3 and #5'
translation_notes:
  revision_awareness: El contexto auditado muestra alta concordancia y ninguna revisión aplicada en la última pasada. La versión española sigue directamente la lectura hebrea, preserva la repetición de נַחֲלָה con una sola raíz española consistente, y mantiene la decisión documental de traducir el Nombre divino como Yahvé.
  spanish_consistency_notes:
  - 'Se conserva la misma raíz léxica para נַחֲלָה en ambos casos: "herencia".'
  - Se mantiene la forma "Yahvé" conforme a la terminología del proyecto.
  - '"Leví" se usa como nombre tribal, no como designación de oficio.'
  - La puntuación española separa bien la cláusula principal y la apposición explicativa.
