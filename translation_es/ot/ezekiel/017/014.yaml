revisions:
- from: para que llegara a ser un reino bajo[a], sin elevarse a sí mismo, sino guardando su pacto para mantenerse.
  to: para que llegara a ser un reino bajo, sin exaltarse, sino guardando su alianza[a] para mantenerse firme.
  rationale: Se revisa principalmente בְּרִיתוֹ para alinear el español con la decisión documentada del POB de conservar el término principal equivalente a 'covenant' y relegar 'treaty' a nota; 'alianza' en español mantiene mejor esa gravedad lexical que 'pacto' en este contexto. También se mejora la naturalidad con 'sin exaltarse' para la autoexaltación reflexiva del hitpael, y 'para mantenerse firme' para reflejar mejor la imagen de עמד sin alejarse del sentido fuente. No se requiere adjudicación adicional.
