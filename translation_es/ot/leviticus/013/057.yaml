revisions:
- from: 'Pero si vuelve a aparecer en la prenda[a], o en la urdimbre, o en la trama, o en cualquier objeto de cuero, es una erupción[b] que se extiende; la quemarás en el fuego: quemarás lo que tenga la lesión dentro de él.'
  to: Pero si vuelve a aparecer en la prenda[a], o en la urdimbre, o en la trama, o en cualquier objeto de cuero, es una erupción que se extiende; quemarás en el fuego aquello que tenga la lesión[b] en él.
  rationale: 'Se corrige la sintaxis para reflejar mejor el hebreo: un solo mandato de quemar seguido por la identificación del objeto afectado. Se elimina la duplicación verbal, se mejora la naturalidad de la cláusula relativa, y se reubica la nota técnica sobre נגע al término español que realmente lo traduce (''lesión'').'
  reviewer_model: gpt-5.4
