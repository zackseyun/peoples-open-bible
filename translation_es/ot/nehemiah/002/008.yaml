translation:
  language: es
  text: y una carta para Asaf[a], el guardián del bosque del rey, para que me diera madera para hacer vigas para las puertas de la fortaleza[b] que pertenece a la casa[c], y para el muro de la ciudad, y para la casa en la que entraré. Y el rey me dio, conforme a la buena mano de mi Dios sobre mí[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el parque del rey» o «el huerto del rey»; el hebreo pardes designa un recinto arbolado o reserva real.
    reason: lexical_alternative
  - marker: b
    text: O «las puertas de la ciudadela».
    reason: lexical_alternative
  - marker: c
    text: Literalmente «la casa»; aquí probablemente se refiere al templo.
    reason: lexical_alternative
  - marker: d
    text: 'Expresión idiomática: literalmente, «conforme a la buena mano de mi Dios sobre mí», una forma de decir que Dios le concedió favor y ayuda providencial.'
    reason: cultural_note
lexical_decisions:
- source_word: אִגֶּרֶת
  english_pob_choice: a letter
  chosen_spanish: una carta
  alternatives_spanish:
  - un escrito
  - un documento
  lexicon: HALOT
  rationale: אִגֶּרֶת designa una carta o escrito oficial. En español, «carta» es natural y conserva el sentido de petición formal en el contexto de Nehemías ante el rey.
- source_word: שֹׁמֵר הַפַּרְדֵּס
  english_pob_choice: the keeper of the king’s forest
  chosen_spanish: el guardián del bosque del rey
  alternatives_spanish:
  - el guardián del parque del rey
  - el guardián del huerto del rey
  lexicon: HALOT
  rationale: פַּרְדֵּס puede referirse a un bosque, parque o recinto arbolado real. Dado que se pide madera para construcción, «bosque del rey» comunica bien la función del lugar. «Guardián» mantiene la idea de encargado/custodio.
- source_word: עֵצִים
  english_pob_choice: timber
  chosen_spanish: madera
  alternatives_spanish:
  - leña
  - árboles
  lexicon: HALOT
  rationale: En el contexto de construcción, עֵצִים se entiende como madera utilizable para obras. «Madera» es la opción más natural en español y suficientemente específica para el pasaje.
- source_word: לְקָרוֹת
  english_pob_choice: to make beams
  chosen_spanish: hacer vigas
  alternatives_spanish:
  - poner vigas
  - techumbrar
  lexicon: HALOT
  rationale: El infinitivo de קרה se asocia con poner o hacer vigas. «Hacer vigas» transmite con claridad el propósito constructivo sin sonar forzado.
- source_word: שַׁעֲרֵי הַבִּירָה
  english_pob_choice: the gates of the fortress
  chosen_spanish: las puertas de la fortaleza
  alternatives_spanish:
  - las puertas de la ciudadela
  - las puertas del alcázar
  lexicon: HALOT
  rationale: בִּירָה refiere a una estructura fortificada o ciudadela. En español, «fortaleza» es claro y digno. «Puertas» sigue el uso bíblico frecuente para city gates y evita una traducción demasiado técnica.
- source_word: אֲשֶׁר לַבַּיִת
  english_pob_choice: that belongs to the house
  chosen_spanish: que corresponde a la casa
  alternatives_spanish:
  - que pertenece a la casa
  - del templo
  lexicon: HALOT
  rationale: La expresión es literalmente «que es para la casa». Como POB deja abierto el referente, «casa» conserva la ambigüedad controlada. «Corresponde a» suena idiomático en español sin fijar indebidamente «templo» en el texto principal.
- source_word: חוֹמַת הָעִיר
  english_pob_choice: the wall of the city
  chosen_spanish: el muro de la ciudad
  alternatives_spanish:
  - la muralla de la ciudad
  - el muro urbano
  lexicon: HALOT
  rationale: «Muro» sigue de cerca la cadena constructa hebrea y funciona bien en español. «Muralla» también sería posible, pero «muro» preserva mejor la correspondencia léxica en este contexto.
- source_word: הַבַּיִת אֲשֶׁר אָבוֹא אֵלָיו
  english_pob_choice: the house that I will enter
  chosen_spanish: la casa en la que entraré
  alternatives_spanish:
  - la casa a la que entraré
  - la casa donde entraré
  lexicon: HALOT
  rationale: El hebreo dice literalmente que entrará a esa casa. «En la que entraré» conserva el movimiento hacia el interior sin añadir más de lo necesario. Se mantiene «casa» como en el hebreo, sin identificarla explícitamente como templo en el texto principal.
- source_word: וַיִּתֶּן לִי הַמֶּלֶךְ
  english_pob_choice: the king gave to me
  chosen_spanish: el rey me la dio
  alternatives_spanish:
  - el rey me lo dio
  - el rey me dio
  lexicon: HALOT
  rationale: El hebreo omite el objeto directo, pero el contexto incluye la carta y los suministros solicitados. «Me la dio» resume de manera fluida la concesión real, tomando la carta como objeto implícito principal. La traducción mantiene la brevedad del original y la claridad en español.
- source_word: כְּיַד אֱלֹהַי הַטּוֹבָה עָלָי
  english_pob_choice: according to the good hand of my God upon me
  chosen_spanish: conforme a la buena mano de mi Dios sobre mí
  alternatives_spanish:
  - según la buena mano de mi Dios sobre mí
  - porque la buena mano de mi Dios estaba sobre mí
  lexicon: HALOT
  rationale: Se conserva la imagen idiomática de la «mano» para reflejar la providencia activa de Dios en Esdras-Nehemías. «Conforme a» mantiene cercanía con כְּ y evita reducir la frase a una explicación abstracta. «Buena mano» sigue la valoración positiva del hebreo.
theological_decisions:
- issue: La ‘buena mano’ de Dios como idiomático de providencia
  english_pob_reading: Retain the anthropomorphic idiom rather than flattening it to a purely abstract statement of favor.
  chosen_spanish_reading: Conservar la imagen de la mano de Dios, en vez de reemplazarla por una mera fórmula de favor o ayuda.
  alternative_spanish_readings:
  - porque Dios me favoreció
  - porque Dios me ayudaba
  rationale: En Esdras-Nehemías, la expresión subraya la intervención providencial de Dios. Mantener «la buena mano de mi Dios sobre mí» preserva tanto la imagen como su carga teológica, sin explicitar más de lo que el texto dice.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Ambigüedad de ‘la casa’
  english_pob_reading: Literally 'the house'; here likely referring to the temple.
  chosen_spanish_reading: Conservar «la casa» en el texto principal, sin resolverla de manera dogmática.
  alternative_spanish_readings:
  - el templo
  - la casa del templo
  rationale: El hebreo usa simplemente «casa». Dado que el contexto probablemente apunta al templo, pero no lo nombra explícitamente, conviene respetar la tensión textual. Una nota puede aclarar la posible referencia sin cerrar la ambigüedad en el cuerpo del texto.
  doctrine_reference: Translation philosophy §2, §5
translation_notes:
  revision_awareness: 'La versión española toma en cuenta la revisión más reciente del audit trail: se evita añadir un objeto explícito inexistente en «el rey me la dio», se mantiene la expresión idiomática de la mano de Dios, y se refleja la ambigüedad de «la casa» sin resolverla indebidamente en el texto principal. También se conserva un equivalente cercano a ‘fortress that belongs to the house’ mediante «la fortaleza que corresponde a la casa».'
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino cuando aparezca; aquí no ocurre.
  - Se prefiere «casa» en el cuerpo del texto para respetar el hebreo, dejando la posible referencia a «templo» en nota.
  - 'Se conserva el paralelismo de construcciones: puertas/fortaleza, muro de la ciudad y casa.'
  - La frase final mantiene el tono providencial sin reemplazar la metáfora por una paráfrasis abstracta.
