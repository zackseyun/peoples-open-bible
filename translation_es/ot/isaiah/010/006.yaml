review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura general y la mayor parte del sentido: ''nación impía'', ''pueblo de mi ira'', el envío/comisionamiento divino y la imagen final de ser hollados como lodo/cieno de las calles. Sin embargo, hay dos desalineaciones importantes con la evidencia fuente y el rastro POB en inglés: (1) אֲצַוֶּנּוּ significa ''le mando / le ordeno'', no ''lo mando'', ya que el pronombre es objeto indirecto del verbo ''mandar/ordenar''; y (2) la nota [b] está anclada en ''mando'' pero en realidad corresponde al doblete hebreo ''לשלל שלל ולבז בז''. Además, el inglés auditado preserva una nota sobre el referente singular/plural de ''to make them'', y el español actual no la refleja pese a que el texto ''lo convierta'' introduce una decisión interpretativa relevante.'
  spanish_quality_summary: El español es generalmente claro y digno, pero 'lo mando' suena ambiguo en español moderno porque puede entenderse como 'yo lo envío/dirijo' más que 'le doy una orden'. 'Para que quite botín' es comprensible, aunque algo débil frente a la fuerza de saqueo del hebreo. 'Un pisoteo' es aceptable, pero mejora con una construcción más natural dentro de la frase. También conviene reubicar y completar las notas para que el lector vea dónde cae la literalidad hebrea y dónde está la cuestión del pronombre colectivo.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. 'Impía', 'ira', 'pueblo', 'nación' y el lenguaje directo del juicio divino están bien alineados. La revisión propuesta mantiene el registro bíblico natural en español y sigue la justificación léxica documentada.
  issues:
  - severity: high
    issue: '''lo mando'' traduce de forma inexacta אֲצַוֶּנּוּ'
    rationale: El hebreo expresa 'le mando / le ordeno' al agente comisionado. En español, 'lo mando' normalmente toma objeto directo y puede confundirse con 'lo envío' o 'lo dirijo'. 'Le ordeno' preserva mejor el sentido de צוה y la relación sintáctica.
  - severity: high
    issue: La nota [b] está anclada al lugar equivocado
    rationale: La nota explica la expresión intensificadora 'para saquear botín y para despojar despojo', pero aparece sobre 'lo mando'. Debe anclarse en la secuencia de saqueo/despojo.
  - severity: medium
    issue: Falta una nota sobre el pronombre singular colectivo en 'lo convierta'
    rationale: El POB inglés preserva la alternativa de que el sufijo masculino singular se refiere a la nación/pueblo como colectivo. Dado que el español opta por singular, conviene documentarlo para no ocultar la tensión del texto.
  - severity: low
    issue: '''quite botín'' es menos preciso y vigoroso que el campo semántico de saqueo'
    rationale: Aunque no es erróneo, 'saquee botín' o 'se apodere del botín' reflejan mejor la violencia de לשלול שלל.
  revised_spanish_text: Contra una nación impía[a] lo envío, y contra el pueblo de mi ira le ordeno, para saquear botín[b] y arrebatar despojo, y convertirlo[c] en pisoteo, como el lodo de las calles.
  revised_footnotes:
