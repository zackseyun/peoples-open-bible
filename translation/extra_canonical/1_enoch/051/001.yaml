theological_decisions:
- issue: Rendering of ሲኦል in an apocalyptic resurrection context
  chosen_reading: Sheol
  alternative_readings:
  - the grave
  - the underworld
  rationale: The verse distinguishes the earth and Sheol as two repositories that will yield up the dead. 'Sheol' preserves
    that conceptual world without importing later doctrinal associations of 'hell.'
  doctrine_reference: Preserve theological tension rather than resolve it; original-language primacy over translation tradition.
