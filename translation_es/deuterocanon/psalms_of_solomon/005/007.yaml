translation:
  language: es
  text: Cuando estemos afligidos[a], clamaremos por ayuda, y tú no rechazarás nuestra súplica[b], porque tú eres nuestro Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «En nuestra aflicción, clamaremos a ti por ayuda».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «nuestra petición» o «nuestra plegaria».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν τῷ θλίβεσθαι ἡμᾶς
  english_pob_choice: When we are afflicted
  chosen_spanish: Cuando estemos afligidos
  alternatives_spanish:
  - En nuestra aflicción
  - Cuando estemos oprimidos
  - Mientras estemos en angustia
  lexicon: BDAG
  rationale: El infinitivo articular con ἐν expresa tiempo; en español, 'cuando' reproduce con naturalidad ese valor temporal. 'Afligidos' conserva el peso de θλίβεσθαι sin concretarlo indebidamente como persecución o solo como pena interior.
- source_word: ἐπικαλεσόμεθα εἰς βοήθειαν
  english_pob_choice: we will call for help
  chosen_spanish: clamaremos por ayuda
  alternatives_spanish:
  - llamaremos por ayuda
  - invocaremos ayuda
  - clamaremos a ti por ayuda
  lexicon: BDAG
  rationale: El griego combina la idea de invocar/llamar con el complemento 'para ayuda'. 'Clamaremos por ayuda' expresa bien el tono de súplica en español bíblico sin volverlo mecánico ni demasiado técnico.
- source_word: οὐκ ἀποστρέψῃ
  english_pob_choice: you will not turn away
  chosen_spanish: no rechazarás
  alternatives_spanish:
  - no apartarás
  - no volverás la espalda a
  - no apartarás de ti
  lexicon: BDAG
  rationale: Aunque el verbo significa literalmente 'volver aparte/alejar', en este contexto de petición la idea comunicativa es no desatender ni apartar la súplica. 'Rechazarás' preserva la respuesta personal negada y suena natural en español; la imagen de alejamiento queda implícita en la negativa a atender.
- source_word: τὴν δέησιν ἡμῶν
  english_pob_choice: our plea
  chosen_spanish: nuestra súplica
  alternatives_spanish:
  - nuestra petición
  - nuestra plegaria
  - nuestro ruego
  lexicon: BDAG
  rationale: δέησις denota una petición urgente y sentida. 'Súplica' conserva esa intensidad y mantiene el registro reverente del pasaje mejor que 'plea', que en español sería menos idiomático.
- source_word: ὅτι σὺ ὁ θεὸς ἡμῶν εἶ
  english_pob_choice: for you are our God
  chosen_spanish: porque tú eres nuestro Dios
  alternatives_spanish:
  - pues tú eres nuestro Dios
  - ya que tú eres nuestro Dios
  lexicon: BDAG
  rationale: ὅτι introduce la base de confianza. 'Porque' expresa de forma clara y directa esa razón en español, sin perder el sentido causal del griego. 'Dios' traduce θεός de manera estándar y fiel.
translation_notes:
  revision_awareness: La versión inglesa POB mantuvo el valor temporal de ἐν τῷ θλίβεσθαι con una construcción natural ('When we are afflicted') y explicó en nota la alternativa más literal ('In our affliction'). También optó por 'plea' para δέησις, con nota de alternativas cercanas. La redacción española sigue esa misma lectura principal, conserva el motivo causal de ὅτι y evita endurecer el verbo final con un rechazo absoluto que no esté exigido por el griego.
  spanish_consistency_notes:
  - Se mantiene 'Dios' para θεός, sin sustituir por un vocativo litúrgico.
  - Se conserva un registro bíblico natural y actual, sin caer en calcos rígidos del inglés.
  - Las notas reproducen las alternativas lexically relevantes que el POB inglés documentó para el lector español.
