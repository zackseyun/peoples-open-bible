translation:
  language: es
  text: Pero el rey prevalece sobre ellos y gobierna sobre ellos, y es dueño de ellos, y todo lo que les diga, lo obedecerán.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὁ δὲ βασιλεὺς
  english_pob_choice: But the king
  chosen_spanish: Pero el rey
  alternatives_spanish:
  - Y el rey
  - Ahora bien, el rey
  lexicon: LSJ
  rationale: δέ introduce contraste con lo anterior; «Pero» conserva ese matiz adversativo de manera natural en español.
- source_word: ὑπερισχύει
  english_pob_choice: prevails over
  chosen_spanish: prevalece sobre
  alternatives_spanish:
  - es más fuerte que
  - lleva la ventaja sobre
  lexicon: LSJ
  rationale: El verbo expresa sobresalir en fuerza o imponerse; «prevalece sobre» reproduce bien esa idea sin forzar el español.
- source_word: κυριεύει αὐτῶν
  english_pob_choice: rules over them
  chosen_spanish: domina sobre ellos
  alternatives_spanish:
  - rige sobre ellos
  - ejerce dominio sobre ellos
  lexicon: LSJ
  rationale: κυριεύω aquí expresa ejercer señorío o dominio. «Domina sobre ellos» mantiene la idea de gobierno con fuerza suficiente para distinguirla de δεσπόζει.
- source_word: δεσπόζει αὐτῶν
  english_pob_choice: is master over them
  chosen_spanish: es señor de ellos
  alternatives_spanish:
  - es dueño de ellos
  - ejerce absoluta autoridad sobre ellos
  lexicon: LSJ
  rationale: δεσπόζω es más fuerte que κυριεύω y sugiere autoridad plena o maestría. «Es señor de ellos» conserva esa intensificación, aunque en español no repite exactamente la misma imagen que en el verbo anterior.
- source_word: πᾶν ὃ ἐὰν εἴπῃ αὐτοῖς
  english_pob_choice: whatever he says to them
  chosen_spanish: todo lo que les diga
  alternatives_spanish:
  - cuanto les diga
  - cualquier cosa que les diga
  lexicon: LSJ
  rationale: 'La construcción expresa indefinición general: cualquier cosa que pudiera decirles. «Todo lo que les diga» es idiomático y fiel.'
- source_word: ἐνακούσουσιν
  english_pob_choice: they will obey
  chosen_spanish: lo obedecerán
  alternatives_spanish:
  - le harán caso
  - lo escucharán
  lexicon: LSJ
  rationale: En contexto de autoridad real, el sentido es obediencia más que simple oír. «Lo obedecerán» transmite con precisión el valor del verbo.
translation_notes:
  revision_awareness: La versión inglesa revisada eliminó el pronombre redundante antes de «is master». En español se refleja con una construcción directa («es señor de ellos») sin añadir pronombre innecesario.
  spanish_consistency_notes:
  - Se mantuvo «rey» para βασιλεύς sin glosa adicional, porque el contexto es monárquico y el término es transparente en español.
  - Se prefirieron verbos de dominio distintos para reproducir la gradación semántica entre κυριεύει y δεσπόζει.
  - Se evitó «Señor» con mayúscula para no introducir una lectura teológica no presente en el griego; aquí δεσπόζει describe autoridad real, no el título divino.
