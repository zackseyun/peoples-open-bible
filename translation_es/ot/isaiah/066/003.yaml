  to: El que sacrifica un buey es como el que mata a un hombre; el que sacrifica un cordero, como el que quiebra el cuello de un perro; el que ofrece una ofrenda de grano, como el que ofrece sangre de cerdo; el que hace una ofrenda memorial de incienso, como el que bendice la maldad[a]. También ellos han escogido sus propios caminos, y su alma se complace en sus abominaciones[b].
