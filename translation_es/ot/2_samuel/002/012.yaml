revisions:
- from: Entonces Abner hijo de Ner[a], y los esclavos de Is-bóset hijo de Saúl, salieron de Mahanaim hacia Gabaón.
  to: Entonces Abner hijo de Ner[a] y los siervos de Is-bóset hijo de Saúl salieron de Mahanaim hacia Gabaón.
  rationale: Se cambia «esclavos» por «siervos» para ajustarse mejor al hebreo עַבְדֵי y, sobre todo, a la decisión lexical auditada en inglés («servants»), que evita imponer la idea más fuerte de esclavitud. También se pule la puntuación y la redacción de la nota para un español más natural, sin alterar el contenido textual ni la referencia a la variante de Crónicas.
