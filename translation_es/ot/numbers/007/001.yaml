translation:
  language: es
  text: Y sucedió el día en que Moisés terminó de levantar el tabernáculo[a], que lo ungió y lo consagró, junto con todos sus objetos, y el altar con todos sus utensilios; los ungió y los consagró.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O bien, «cuando Moisés terminó de levantar el tabernáculo». La expresión temporal hebrea también puede traducirse de esta manera más idiomática.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And it happened
  chosen_spanish: Y aconteció
  alternatives_spanish:
  - Y sucedió
  - Y ocurrió
  lexicon: HALOT
  rationale: La forma narrativa wayyiqtol introduce un nuevo episodio. «Aconteció» conserva ese valor de apertura formal sin sonar arcaico en español.
- source_word: בְּיוֹם כַּלּוֹת
  english_pob_choice: on the day ... finished
  chosen_spanish: el día en que ... terminó de
  alternatives_spanish:
  - cuando ... terminó de
  - el día de ... terminar
  lexicon: HALOT
  rationale: La construcción temporal se expresa de modo natural en español con «el día en que ... terminó de», manteniendo la relación temporal sin perder la idiomaticidad del hebreo.
- source_word: לְהָקִים
  english_pob_choice: setting up
  chosen_spanish: levantar
  alternatives_spanish:
  - erigir
  - montar
  - establecer
  lexicon: HALOT
  rationale: En el contexto del santuario portátil, הקים en hifil describe la acción física de levantar/erigir la tienda. «Levantar» es claro y fiel, y evita una abstracción excesiva.
- source_word: הַמִּשְׁכָּן
  english_pob_choice: the tabernacle
  chosen_spanish: el tabernáculo
  alternatives_spanish:
  - la morada
  - el santuario de tienda
  lexicon: HALOT
  rationale: «Tabernáculo» es el equivalente tradicional y preciso para el משכן en este contexto cultual del desierto.
- source_word: וַיִּמְשַׁח
  english_pob_choice: he anointed
  chosen_spanish: lo ungió
  alternatives_spanish:
  - lo aceitó con óleo
  - lo consagró por unción
  lexicon: HALOT
  rationale: משח tiene el sentido ritual de ungir con aceite. «Ungió» preserva el acto cultual sin introducir una paráfrasis interpretativa.
- source_word: וַיְקַדֵּשׁ
  english_pob_choice: consecrated
  chosen_spanish: lo consagró
  alternatives_spanish:
  - lo santificó
  - lo hizo santo
  lexicon: HALOT
  rationale: En este contexto, קדש no apunta a transformación moral sino a dedicación ritual. «Consagró» reproduce bien ese valor cultual en español.
- source_word: כָּל כֵּלָיו
  english_pob_choice: all its furnishings
  chosen_spanish: todos sus utensilios
  alternatives_spanish:
  - todos sus muebles
  - todos sus enseres
  - todos sus objetos
  lexicon: HALOT
  rationale: כֵּלִים abarca los objetos/implementos del santuario. «Utensilios» funciona en español bíblico para los elementos de uso cultual; en la primera ocurrencia mantiene una traducción amplia y concreta.
- source_word: הַמִּזְבֵּחַ
  english_pob_choice: the altar
  chosen_spanish: el altar
  alternatives_spanish:
  - el altar sacrificial
  lexicon: HALOT
  rationale: מזבח se traduce de forma directa y estándar como «altar».
- source_word: כָּל כֵּלָיו
  english_pob_choice: all its utensils
  chosen_spanish: todos sus utensilios
  alternatives_spanish:
  - todos sus instrumentos
  - todos sus enseres
  lexicon: HALOT
  rationale: La segunda ocurrencia refiere específicamente a los implementos del altar, por lo que se mantiene «utensilios» para reflejar esa concreción contextual.
- source_word: וַיִּמְשָׁחֵם ... וַיְקַדֵּשׁ אֹתָם
  english_pob_choice: he anointed them and consecrated them
  chosen_spanish: los ungió y los consagró
  alternatives_spanish:
  - los ungió y los santificó
  - los consagró por unción y los santificó
  lexicon: HALOT
  rationale: Los sufijos plurales resumen el altar y sus utensilios. Se conserva la repetición verbal del hebreo con la misma pareja «ungió/consagró», respetando el paralelo del texto fuente.
theological_decisions:
- issue: Lenguaje de santidad cultual
  english_pob_reading: consecrated
  chosen_spanish_reading: consagró
  alternative_spanish_readings:
  - santificó
  - hizo santo
  rationale: La escena trata de la dedicación ritual de objetos del santuario, no de santificación moral. «Consagró» preserva el sentido de apartar algo para uso santo sin confundirlo con una transformación ética.
  doctrine_reference: Translation philosophy §6; consistency with cultic holiness terminology
- issue: Tratamiento de la duplicación verbal al final del versículo
  english_pob_reading: he anointed them and consecrated them
  chosen_spanish_reading: los ungió y los consagró
  alternative_spanish_readings:
  - los ungió y los santificó
  rationale: La repetición final funciona como resumen de la acción aplicada al conjunto de objetos mencionados. Mantener el paralelismo verbal evita suavizar una estructura marcada del hebreo.
  doctrine_reference: Translation philosophy §5; discourse-level fidelity
translation_notes:
  revision_awareness: 'Coincide con el contexto inglés auditado: se mantiene la elección de «tabernáculo», «ungió» y «consagró», y se refleja la alternativa temporal documentada sin introducir cambios doctrinales ni terminológicos no respaldados por el texto fuente.'
  spanish_consistency_notes:
  - Se usa «tabernáculo» de manera uniforme para מִשְׁכָּן.
  - Se conserva «ungió / consagró» como par cultual consistente con el inglés POB.
  - «Utensilios» traduce כֵּלִים en ambas ocurrencias, diferenciando solo por contexto sintáctico, no por léxico artificial.
  - Se mantiene el inicio narrativo con «Y aconteció» para reflejar la función discursiva del wayyiqtol.
