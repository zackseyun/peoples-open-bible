translation:
  language: es
  text: Y acercándose al poste de la cama que estaba a la cabecera de Holofernes, tomó de allí su espada[a],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Griego ἀκινάκης se refiere con más precisión a una espada corta o daga de tipo oriental; aquí se traduce «espada» por claridad en español.
    reason: lexical_alternative
lexical_decisions:
- source_word: προσελθοῦσα
  english_pob_choice: approaching
  chosen_spanish: acercándose
  alternatives_spanish:
  - después de acercarse
  - aproximándose
  - al acercarse
  lexicon: LSJ
  rationale: El participio aoristo indica una acción previa o concomitante respecto del verbo principal. «Acercándose» mantiene la secuencia narrativa sin añadir una relación temporal más fuerte que la del griego.
- source_word: τῷ κανόνι τῆς κλίνης
  english_pob_choice: bedpost
  chosen_spanish: al soporte de la cama
  alternatives_spanish:
  - al poste de la cama
  - al barrote de la cama
  - al marco de la cama
  lexicon: LSJ
  rationale: κανών designa aquí una pieza estructural de la cama; en español, «soporte de la cama» conserva la función física sin forzar un equivalente técnico incierto. Se evita «poste» porque puede sugerir una forma más concreta de la que el contexto no exige.
- source_word: κλίνης
  english_pob_choice: bed
  chosen_spanish: de la cama
  alternatives_spanish:
  - del lecho
  lexicon: LSJ
  rationale: La escena narrativa pide el término común «cama», claro y natural en español moderno. «Lecho» sería posible, pero más literario y menos directo.
- source_word: πρὸς κεφαλῆς
  english_pob_choice: at Holofernes’s head
  chosen_spanish: a la cabecera de Holofernes
  alternatives_spanish:
  - junto a la cabeza de Holofernes
  - cerca de la cabeza de Holofernes
  lexicon: LSJ
  rationale: La relación espacial se expresa de manera natural con «a la cabecera de». «Cabecera» preserva la ubicación en el extremo de la cama sin perder inteligibilidad.
- source_word: καθεῖλε
  english_pob_choice: took down
  chosen_spanish: le quitó de allí
  alternatives_spanish:
  - lo bajó
  - lo tomó de allí
  - lo retiró
  lexicon: LSJ
  rationale: El verbo sugiere retirar o bajar algo de su lugar. «Le quitó de allí» comunica la acción concreta en español corriente y deja abierto que el objeto estaba apoyado o colgado en el soporte.
- source_word: τὸν ἀκινάκην
  english_pob_choice: sword
  chosen_spanish: su espada
  alternatives_spanish:
  - su daga
  - su espada corta
  - su acínaces
  lexicon: LSJ
  rationale: ἀκινάκης designa una espada corta o daga de tipo oriental. El texto principal usa «espada» por claridad en español, manteniendo el matiz específico en la nota textual. «Daga» o «espada corta» son alternativas posibles, pero cambian el registro o la imagen para el lector común.
- source_word: ἀπʼ αὐτοῦ
  english_pob_choice: from it
  chosen_spanish: de allí
  alternatives_spanish:
  - de él
  - de eso
  - desde allí
  lexicon: LSJ
  rationale: La frase retoma el soporte mencionado y señala el lugar desde el cual se retira el arma. «De allí» conserva la referencia espacial de manera natural en español.
translation_notes:
  revision_awareness: 'El griego ofrece una secuencia simple: al acercarse al soporte de la cama situado junto a la cabecera de Holofernes, ella retira de allí el ἀκινάκης. La versión española sigue la lectura del audit trail inglés, pero evita depender mecánicamente de «bedpost», ya que κανών admite una pieza estructural de la cama sin obligar a un poste específico. También conserva la tensión lexical de ἀκινάκης mediante nota, como hizo el texto inglés con «sword».'
  spanish_consistency_notes:
  - Se mantiene «Holofernes» como nombre propio y se usa «cabecera» para πρὸς κεφαλῆς, evitando una construcción menos natural en español.
  - Se conservan los elementos narrativos en el mismo orden general del griego, sin añadir información sobre el modo en que el arma estaba sujeta.
  - «Espada» en el texto principal responde al criterio de inteligibilidad pública; la nota preserva la precisión del término griego.
