translation:
  language: es
  text: Sino que al lugar que Yahvé su Dios escogerá de entre todas sus tribus para poner allí su nombre[a], para su morada, ustedes buscarán, y allí irán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'para poner allí su nombre para su morada'; el hebreo de esta cláusula es compacto, y las traducciones difieren en si enfatiza la morada de Dios, el lugar como su morada, o ambas cosas.
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי אִם
  english_pob_choice: But
  chosen_spanish: Sino
  alternatives_spanish:
  - Pero
  - Más bien
  - Sino más bien
  lexicon: HALOT
  rationale: En este contexto contrastivo, tras la prohibición implícita del lugar múltiple de culto, la frase introduce la alternativa positiva. En español, 'sino' expresa mejor la corrección contrastiva que 'pero'.
- source_word: הַמָּקוֹם
  english_pob_choice: the place
  chosen_spanish: el lugar
  alternatives_spanish:
  - el sitio
  lexicon: HALOT
  rationale: '''Lugar'' es natural en español y conserva la concreción del hebreo sin añadir especificación innecesaria.'
- source_word: יִבְחַר
  english_pob_choice: will choose
  chosen_spanish: escogerá
  alternatives_spanish:
  - elegirá
  - optará por
  lexicon: HALOT
  rationale: El imperfecto apunta a una elección futura. 'Escogerá' es claro y adecuado para un registro bíblico moderno.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el criterio del POB para el Nombre divino: transliteración ''Yahvé'' en lugar de sustituir por un título.'
- source_word: אֱלֹהֵיכֶם
  english_pob_choice: your God
  chosen_spanish: su Dios
  alternatives_spanish:
  - el Dios de ustedes
  - su Dios
  lexicon: HALOT
  rationale: El hebreo con sujeto singular y sufijo de segunda persona plural se vierte naturalmente como 'su Dios' en español reverente, manteniendo la relación de pacto sin forzar la repetición de 'de ustedes'.
- source_word: מִכָּל שִׁבְטֵיכֶם
  english_pob_choice: from all your tribes
  chosen_spanish: de entre todas sus tribus
  alternatives_spanish:
  - de todas sus tribus
  - de entre todas las tribus de ustedes
  lexicon: HALOT
  rationale: '''De entre'' comunica mejor la selección interna dentro del conjunto tribal que un simple ''de''.'
- source_word: לָשׂוּם אֶת־שְׁמוֹ שָׁם
  english_pob_choice: to put his name there
  chosen_spanish: para poner allí su nombre
  alternatives_spanish:
  - para establecer allí su nombre
  - para colocar allí su nombre
  lexicon: HALOT
  rationale: '''Poner allí su nombre'' sigue de cerca el idiomático hebreo y conserva la noción de la presencia autorizada de Dios sin resolverla excesivamente.'
- source_word: לְשִׁכְנוֹ
  english_pob_choice: for his dwelling
  chosen_spanish: para su morada
  alternatives_spanish:
  - para su habitación
  - para que él habite allí
  lexicon: HALOT
  rationale: La construcción compacta del hebreo admite una lectura locativa o final. 'Para su morada' preserva la ambigüedad teológica señalada por el POB sin añadir un verbo interpretativo.
- source_word: תִדְרְשׁוּ
  english_pob_choice: you shall seek
  chosen_spanish: ustedes lo buscarán
  alternatives_spanish:
  - lo buscarán
  - ustedes lo consultarán
  - ustedes lo indagarán
  lexicon: HALOT
  rationale: '''Buscar'' transmite bien la acción de buscar el lugar correcto de adoración. Se explicita el objeto con ''lo'' para un español natural.'
- source_word: וּבָאתָ שָׁמָּה
  english_pob_choice: and there you shall go
  chosen_spanish: y allí irán
  alternatives_spanish:
  - y allá irán
  - y allí vendrán
  lexicon: HALOT
  rationale: '''Irán'' es la opción más natural en español para el movimiento hacia un destino. Se conserva ''allí'' para reflejar ''shammah''.'
theological_decisions:
- issue: Nombre divino y lugar de culto autorizado
  english_pob_reading: Yahweh ... to put his name there, for his dwelling
  chosen_spanish_reading: Yahvé ... para poner allí su nombre, para su morada
  alternative_spanish_readings:
  - Yahvé ... para poner allí su nombre, como su morada
  - Yahvé ... para poner allí su nombre y su morada
  rationale: Se mantiene la tensión del hebreo entre el lugar del Nombre y la morada divina sin convertirla en una afirmación dogmática más específica de lo que exige el verso. La preposición 'para' conserva la compactación de לְשִׁכְנוֹ sin forzar 'hacer' o 'establecer'.
  doctrine_reference: 'DOCTRINE.md: YHWH default rendering; preserve theological tension rather than resolve it'
- issue: Relación entre 'nombre' y 'morada'
  english_pob_reading: to put his name there, for his dwelling
  chosen_spanish_reading: para poner allí su nombre[a], para su morada
  alternative_spanish_readings:
  - para poner allí su nombre y para su morada
  - para poner allí su nombre, donde habita
  rationale: 'La colocación de la nota permite preservar la alternativa de lectura documentada por el POB: el hebreo es compacto y puede entenderse como que enfatiza el nombre, la morada, o ambos. En español se mantiene la misma tensión sin resolverla de modo unilateral.'
  doctrine_reference: 'DOCTRINE.md: preserve documented lexical/theological tension'
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del POB que prefirió 'for his dwelling' en lugar de 'to make his dwelling there'. En español se refleja esa compactación con 'para su morada', sin añadir un verbo interpretativo. También se conserva la lectura contrastiva de כִּי אִם con 'Sino' y el movimiento final con 'irán'.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma consistente para el Tetragrámaton.
  - Se mantiene 'morada' para לְשִׁכְנוֹ, evitando resolver prematuramente la relación entre lugar y presencia divina.
  - Se conserva el tono bíblico moderno con 'ustedes' y verbo futuro, sin caer en arcaísmos innecesarios.
  - La nota [a] aparece anclada exactamente en el texto donde corresponde.
