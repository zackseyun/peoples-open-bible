translation:
  language: es
  text: Mi alma espera al Señor más que los centinelas por la mañana[a], más que los centinelas por la mañana.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Mi alma es para el Señor más que los centinelas por la mañana». El hebreo omite un verbo explícito aquí; «espera» se suministra por el contexto del salmo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נַפְשִׁי
  english_pob_choice: My soul
  chosen_spanish: Mi alma
  alternatives_spanish:
  - Yo
  - mi vida
  - mi ser interior
  lexicon: HALOT
  rationale: נֶפֶשׁ con sufijo de 1.ª persona expresa aquí la persona en su anhelo y dependencia. «Mi alma» conserva el valor poético y espiritual del hebreo sin reducirlo a un simple «yo».
- source_word: לַאדֹנָי
  english_pob_choice: for the Lord
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - para el Señor
  - para mi Señor
  - hacia Yahvé
  lexicon: HALOT
  rationale: La preposición ל con este verbo/imágenes de espera expresa dirección o relación hacia quien se aguarda. En el texto hebreo el referente es el Dios de Israel; por la convención del proyecto se traduce el nombre divino como «Yahvé» y se evita la máscara de «SEÑOR».
- source_word: מִשֹּׁמְרִים
  english_pob_choice: more than watchmen
  chosen_spanish: más que los centinelas
  alternatives_spanish:
  - más que los guardias
  - más que los que velan
  lexicon: HALOT
  rationale: 'מן delante del participio expresa comparación: «más que». «Centinelas» comunica bien la imagen poética de quienes velan de noche esperando el amanecer.'
- source_word: לַבֹּקֶר
  english_pob_choice: for the morning
  chosen_spanish: por la mañana
  alternatives_spanish:
  - para la mañana
  - para el amanecer
  - al amanecer
  lexicon: HALOT
  rationale: בֹּקֶר significa «mañana». En español, «por la mañana» resulta natural y conserva la escena de espera hasta el inicio del día.
- source_word: שֹׁמְרִים לַבֹּקֶר
  english_pob_choice: watchmen for the morning
  chosen_spanish: los centinelas por la mañana
  alternatives_spanish:
  - los que velan por la mañana
  - los centinelas para la mañana
  lexicon: HALOT
  rationale: La repetición hebrea se mantiene para conservar el énfasis poético. «Centinelas» evita suavizar la imagen y reproduce la insistencia del original.
theological_decisions:
- issue: Tratamiento de אֲדֹנָי como referencia divina
  english_pob_reading: for the Lord
  chosen_spanish_reading: a Yahvé
  alternative_spanish_readings:
  - para el Señor
  - para mi Señor
  rationale: En este salmo la referencia es a Dios; no se trata de un simple título de cortesía humana. Usar «Yahvé» mantiene visible el nombre divino según el estándar del proyecto y evita la neutralización litúrgica.
  doctrine_reference: 'DOCTRINE.md Contested terms: divine name rendering; project default for יהוה'
- issue: Verbo implícito en el hemistiquio
  english_pob_reading: My soul waits for the Lord
  chosen_spanish_reading: Mi alma espera a Yahvé
  alternative_spanish_readings:
  - Mi alma es para Yahvé
  - Mi alma anhela a Yahvé
  rationale: El hebreo omite un verbo explícito; la lectura contextual suministra la idea de espera. «Espera» es la opción más directa y auditivamente fiel al paralelismo del versículo.
  doctrine_reference: Poetic ellipsis and supplied verbs in Psalm translation practice
translation_notes:
  revision_awareness: 'El texto sigue el hebreo masorético tal como aparece en WLC y concuerda con el audit trail inglés: se preserva la repetición final, la comparación con los centinelas y la elipsis verbal resuelta por contexto. No hay revisiones posteriores que alteren la decisión de traducción.'
  spanish_consistency_notes:
  - Se usa «Yahvé» conforme al estándar del proyecto para יהוה/אֲדֹנָי cuando el referente es el Dios de Israel.
  - Se conserva la repetición «más que los centinelas por la mañana» para no suavizar el paralelismo intensificador.
  - «Mi alma» mantiene el tono poético y evita una simplificación excesiva a «yo».
