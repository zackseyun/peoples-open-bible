    rationale: El marcador aparece en «diciendo[b]», pero la nota ofrece la alternativa «ciertamente podrás comer», que pertenece a la cláusula final אָכֹל תֹּאכֵל, no a לֵאמֹר.
  - severity: low
    issue: Coma innecesaria tras «jardín».
    rationale: «De todo árbol del jardín, ciertamente podrás comer» suena más forzado en español. Sin coma, la oración fluye mejor sin pérdida de fidelidad.
  - severity: low
