base_translation:
  language: en
  yaml_path: translation/ot/leviticus/014/017.yaml
  text: And from the rest of the oil that is on his palm[a], the priest shall put some on the lobe of the right ear of the one being cleansed, and on the thumb of his right hand, and on the big toe of his right foot[b], on top of the blood of the guilt offering.
  footnotes:
  - marker: a
    text: Or 'the tip of the right ear.' The Hebrew term refers to the outer extremity of the ear; 'lobe' is the clearest modern rendering in this ritual context.
    reason: lexical_alternative
  - marker: b
    text: Or 'upon the blood of the guilt offering.' The sense is that the oil is applied at the same spot already marked by the blood.
    reason: lexical_alternative
