  spanish_quality_summary: El español es claro y natural. Requiere un ajuste léxico menor para evitar una imagen menos precisa («cavó una tumba»). La nota al pie también debe estar en español, no dejar una alternativa en inglés («Lest perhaps he too die»).
  glossary_alignment: 'No hay términos del glosario mayor en juego. La elección principal a corregir es τάφον: mejor «una sepultura» para concordar con «cavó» y con la justificación léxica del POB inglés.'
