base_translation:
  language: en
  yaml_path: translation/ot/leviticus/019/020.yaml
  text: If a man lies with a woman and has an emission of semen[a], and she is a slave woman designated for a man, but she has not been redeemed or given her freedom, there shall be an inquiry; they shall not be put to death[b], because she had not been freed.
  footnotes:
  - marker: a
    text: Or 'betrothed to a man' or 'pledged to a man.' The Hebrew likely indicates that the slave woman is assigned or promised to a man, though her legal status is not that of a fully free wife.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew term rendered 'inquiry' is rare and uncertain; it may also mean 'punishment' or 'compensation.'
    reason: lexical_alternative
