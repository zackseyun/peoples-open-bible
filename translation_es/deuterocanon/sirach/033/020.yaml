  source_alignment_summary: El borrador sigue bien el griego en la lista relacional (hijo, esposa, hermano, amigo), en la advertencia de no conceder ἐξουσία sobre uno mismo durante la vida, y en la referencia amplia de χρήματα como bienes/posesiones. Sin embargo, la cláusula final δέῃ περὶ αὐτῶν no queda bien reflejada por 'pedir por ellos', que en español suena poco natural y no comunica claramente la idea de tener que pedirlos de vuelta o suplicar por ellos tras haberlos entregado.
  spanish_quality_summary: 'El español es claro y mayormente natural, pero hay dos puntos mejorables: 1) ''no les des autoridad sobre ti'' funciona, aunque el singular distributivo suena algo más limpio en español bíblico-sapiencial; 2) ''pedir por ellos'' es idiomáticamente débil y ambiguo. Una leve revisión produce una lectura más natural y más fiel al sentido práctico del griego.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'Esposa' para γυναικί y 'bienes' para χρήματα están bien justificadas. La revisión propuesta mantiene estas decisiones y solo ajusta la expresión final para reflejar mejor el matiz de dependencia posterior implícito en δέῃ περὶ αὐτῶν.
  issues:
