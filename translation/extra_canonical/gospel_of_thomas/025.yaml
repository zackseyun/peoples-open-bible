translation:
  text: Jesus said[a], Love your brother as your soul[e][d][c][b]; guard him as the
    pupil of your eye.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ‘Soul’ translates ψυχή (ⲯⲩⲭⲏ), which can also mean ‘life’ or ‘self.’
    reason: lexical_alternative
  - marker: b
    text: The manuscript line shows ⲙ̄ⲙⲟϥ (direct object ‘him’), while the normalized
      form has ⲛⲛⲧⲟϥ (‘for him’). Either way, the sense is ‘guard/protect him.’
    reason: textual_variant
  - marker: c
    text: ‘Pupil of your eye’ is literal; later idiom ‘apple of your eye’ is traditional
      in English but not required by the Coptic lexeme ⲡⲉⲗⲟⲩ.
    reason: lexical_alternative
  - marker: d
    text: 'Compare the Hebrew Bible motif: Deut 32:10; Ps 17:8; Prov 7:2 (LXX).'
    reason: cross_reference
  - marker: e
    text: The comparative is written ⲛ̄ⲑⲉ in the manuscript but normalized as ⲛⲡϩⲉ;
      both mean ‘as/like’ in Sahidic/Lycopolitan usage.
    reason: dialect_note
lexical_decisions:
- source_word: ⲡⲉϫⲉⲓⲏⲥⲟⲩⲥ
  chosen: Jesus said
  alternatives:
  - He said
  lexicon: Crum; Layton (reporting verb ⲡⲉϫⲉ + subject)
  rationale: Standard Coptic reporting formula ⲡⲉϫⲉ + proper name; rendered with concise
    English narrative tag.
- source_word: ⲙⲉ
  chosen: love
  alternatives:
  - be fond of
  - desire
  lexicon: Crum s.v. ⲙⲉ
  rationale: In Thomas’s ethical sayings ⲙⲉ commonly means ‘love’; here with personal
    object ⲡⲉⲕⲥⲟⲛ fits ‘love’ rather than ‘desire’.
- source_word: ⲥⲟⲛ
  chosen: brother
  alternatives:
  - kinsman
  - fellow
  lexicon: Crum s.v. ⲥⲟⲛ
  rationale: Basic sense is ‘brother’; Thomas characteristically uses fraternal language
    rather than ‘neighbor’.
- source_word: ⲛ̄ⲑⲉ / ⲛⲡϩⲉ
  chosen: as
  alternatives:
  - like
  lexicon: Crum s.v. ⲑⲉ; Layton (comparative particle)
  rationale: Manuscript shows ⲛ̄ⲑⲉ; Dilley normalizes to ⲛⲡϩⲉ. Both function as the
    comparative ‘as/like’; ‘as’ fits the taut parallelism.
- source_word: ⲯⲩⲭⲏ
  chosen: soul
  alternatives:
  - life
  - self
  lexicon: Greek loanword ψυχή; Crum (loanwords)
  rationale: ψυχή in Coptic can mean ‘soul’ or ‘life’; ‘soul’ preserves the sharper
    Thomasine diction; ‘life/self’ are viable nuances.
- source_word: ⲉⲓⲣⲉ ⲧⲏⲣⲉ(ⲓ)
  chosen: guard
  alternatives:
  - keep
  - protect
  lexicon: Crum s.v. ⲧⲏⲣⲉ ‘keep, guard’ (with periphrastic ⲉⲓⲣⲉ)
  rationale: Periphrastic ‘do-keep’ with a personal object naturally conveys ‘guard/protect’.
    ‘Guard’ maintains terseness.
- source_word: ⲡⲉⲗⲟⲩ
  chosen: pupil
  alternatives:
  - apple (of the eye)
  lexicon: Crum s.v. ⲗⲟⲩ ‘pupil (of the eye)’
  rationale: Literal referent is the eye’s pupil; ‘apple of the eye’ is a later idiomatic
    rendering not present in the Coptic lexeme.
- source_word: ⲃⲁⲗ
  chosen: eye
  alternatives:
  - eyeball
  - eye (organ)
  lexicon: Crum s.v. ⲃⲁⲗ
  rationale: Basic anatomical term ‘eye’; simple ‘eye’ suffices.
textual_note: 'No lacunae are indicated for this saying in Dilley 2025. Orthography
  shows Lycopolitan/Sahidic fluctuation in the comparative marker: the manuscript
  has ⲛ̄ⲑⲉ (‘as/like’), while the normalized lemma reads ⲛⲡϩⲉ. The periphrastic construction
  ⲉⲓⲣⲉ ⲧⲏⲣⲉ is written with a pronominal object marker as ⲙ̄ⲙⲟϥ in the line-level
  print, whereas the normalized form presents ⲛⲛⲧⲟϥ; both yield a transitive sense
  ‘guard him/for him’ and do not alter the translation. There is also article variation
  in the tradition represented here: the line-level print has ⲛ̄ⲧⲉⲗⲟⲩ (with feminine
  article) while the normalized lemma reads ⲛⲡⲉⲗⲟⲩ (masculine); the semantics ‘the
  pupil’ remain the same. Greek loanword ⲯⲩⲭⲏ appears as expected; no restorations
  are marked.'
