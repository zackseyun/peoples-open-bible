translation:
  language: es
  text: 'Y Moab dijo a los ancianos de Madián: «Ahora esta multitud lamerá[a] todo lo que nos rodea, como lame el buey la hierba del campo[b]». Balac hijo de Sipor era rey de Moab en aquel tiempo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «devorará». El verbo hebreo es literalmente «lamer», y el texto principal conserva esa imagen.
    reason: lexical_alternative
  - marker: b
    text: O «la vegetación verde del campo». El hebreo se refiere más ampliamente a la vegetación verde.
    reason: lexical_alternative
lexical_decisions:
- source_word: מוֹאָב
  english_pob_choice: Moab
  chosen_spanish: Moab
  alternatives_spanish:
  - Mab
  lexicon: HALOT
  rationale: Se conserva el nombre nacional/político personificado como sujeto que habla, tal como en el contexto narrativo.
- source_word: זִקְנֵי מִדְיָן
  english_pob_choice: the elders of Midian
  chosen_spanish: los ancianos de Madián
  alternatives_spanish:
  - los ancianos de Midian
  - los mayores de Madián
  lexicon: HALOT
  rationale: זִקְנֵי es «ancianos» en sentido de líderes; «de Madián» expresa el constructo de pertenencia con claridad natural en español.
- source_word: עַתָּה
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Ahora mismo
  - Pues ahora
  lexicon: HALOT
  rationale: Marca urgencia y avance discursivo; «Ahora» es la opción directa y idiomática en español.
- source_word: יְלַחֲכוּ
  english_pob_choice: will lick up
  chosen_spanish: lamerá
  alternatives_spanish:
  - lamerán
  - devorará
  - devorarán
  lexicon: HALOT
  rationale: Se preserva el verbo literal de la imagen, como en el POB inglés, para no borrar la metáfora de «lamer» reforzada por el símil siguiente.
- source_word: הַקָּהָל
  english_pob_choice: this multitude
  chosen_spanish: esta multitud
  alternatives_spanish:
  - esta asamblea
  - esta muchedumbre
  lexicon: HALOT
  rationale: El contexto habla de un grupo numeroso e inmediato amenazante; «multitud» reproduce bien la lectura revisada del POB inglés y evita connotaciones eclesiales de «congregación».
- source_word: אֶת כָּל סְבִיבֹתֵינוּ
  english_pob_choice: all that is around us
  chosen_spanish: todo lo que nos rodea
  alternatives_spanish:
  - todas nuestras cercanías
  - todo nuestro alrededor
  lexicon: HALOT
  rationale: 'Expresa con naturalidad el valor colectivo de סביבתינו: todo lo circundante, no solo un espacio abstracto.'
- source_word: כִּלְחֹךְ הַשּׁוֹר
  english_pob_choice: as the ox licks up
  chosen_spanish: como lame el buey
  alternatives_spanish:
  - como lame el toro
  - así como lame el buey
  lexicon: HALOT
  rationale: El hebreo compara con el buey/ganado bovino; «buey» mantiene la imagen campesina y la repetición del verbo lamer.
- source_word: יֶרֶק הַשָּׂדֶה
  english_pob_choice: the grass of the field
  chosen_spanish: la hierba del campo
  alternatives_spanish:
  - el pasto del campo
  - la vegetación del campo
  lexicon: HALOT
  rationale: Sigue la revisión inglesa que prefirió la naturalidad de «grass»; en español, «hierba del campo» comunica la vegetación verde que es devorada.
- source_word: וּבָלָק בֶּן צִפּוֹר
  english_pob_choice: Now Balak son of Zippor
  chosen_spanish: Balac hijo de Sipor
  alternatives_spanish:
  - Y Balac hijo de Sipor
  - Ahora Balac hijo de Sipor
  lexicon: HALOT
  rationale: Se adopta la forma española habitual de los nombres propios bíblicos, manteniendo la filiación literal «hijo de».
- source_word: מֶלֶךְ לְמוֹאָב
  english_pob_choice: was king of Moab
  chosen_spanish: era rey de Moab
  alternatives_spanish:
  - fue rey de Moab
  - reinaba en Moab
  lexicon: HALOT
  rationale: El verbo copulativo en imperfecto hebreo funciona como trasfondo narrativo; «era rey» reproduce bien el estado en ese momento.
- source_word: בָּעֵת הַהִוא
  english_pob_choice: at that time
  chosen_spanish: en aquel tiempo
  alternatives_spanish:
  - en ese tiempo
  - entonces
  lexicon: HALOT
  rationale: Fórmula temporal natural y reverente, sin añadir matices no presentes en el hebreo.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que prefirió «multitud» para הַקָּהָל y «grass» para יֶרֶק הַשָּׂדֶה. La versión española sigue esas decisiones en su propio registro natural, sin traducir mecánicamente la redacción inglesa anterior.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando aparece el nombre divino; este versículo no lo contiene.
  - Se usa «buey» para reflejar el paralelismo con la escena agrícola y conservar la imagen del original.
  - Se evita «congregación» para הַקָּהָל, porque aquí el sentido es de grupo numeroso amenazante, no un término litúrgico.
