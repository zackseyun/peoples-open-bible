review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo primario: נוֹגֵעַ como sujeto proverbial general, בְּזֶפֶת como «brea», לֵץ como «burlón», y יִלְמַד דַּרְכּוֹ como «aprenderá su camino», con nota adecuada para el paralelo griego. La única desalineación relevante está en «se le pegará la mano», que en español suena incompleto/extraño sin explicitar que se pega a la brea, mientras el inglés POB añadió explícitamente «to it» por la misma razón idiomática.'
  spanish_quality_summary: 'El español es claro y mayormente natural, pero «El que toca brea se le pegará la mano» resulta poco idiomático. Una ligera reparación como «se le pegará la mano a ella» o mejor «tendrá la mano pegada a ella»/«la mano se le pegará a ella» aclara el referente y evita tropiezo sintáctico. También conviene una nota griega más natural en español: «tiene trato con» funciona mejor que «tiene comunión con» en este proverbio sapiencial.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Burlón» representa bien לֵץ en contexto sapiencial, y la nota conserva correctamente la alternativa griega «soberbio».
  issues:
  - severity: medium
    issue: La frase «se le pegará la mano» es poco idiomática e incompleta en español.
    rationale: El hebreo implica el objeto por contexto, pero en español la construcción necesita aclarar a qué se pega la mano. El propio POB inglés añadió «to it» por esta razón. Sin esa aclaración, la línea suena defectuosa.
  - severity: low
    issue: La nota al pie usa «tiene comunión con», que suena demasiado eclesiástico para este contexto proverbial.
    rationale: El griego κοινωνῶν aquí expresa asociación o trato, no necesariamente comunión en sentido religioso. «Tiene trato con» o «se asocia con» comunica mejor el matiz en español general.
  revised_spanish_text: El que toca brea[a] tendrá la mano pegada a ella, y el que se junta con un burlón aprenderá su camino.
  revised_footnotes:
  - marker: a
    text: 'Paralelo griego: «El que toca brea será contaminado, y el que tiene trato con un soberbio llegará a ser como él». El testimonio hebreo, en cambio, dice «un burlón» y «aprenderá su camino».'
    reason: alternative_reading
  revision_rationale: Se ajusta solo la primera cláusula para que el español exprese con naturalidad la adhesión concreta implícita en תִּדְבַּק יָדוֹ, manteniendo el sentido hebreo primario y la aclaración idiomática ya documentada por el POB inglés. También se pule la nota para reflejar mejor κοινωνῶν en español natural.
