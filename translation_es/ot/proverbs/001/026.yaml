translation:
  language: es
  text: Yo también me reiré de su calamidad; me burlaré cuando venga su terror[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su terror» o «lo que temen». El término hebreo puede referirse tanto al terror mismo como al hecho temido que llega.
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּם
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - incluso
  - además
  lexicon: HALOT
  rationale: La partícula añade a la respuesta previa de Sabiduría; «también» conserva esa suma/enlace sin forzar un matiz distinto.
- source_word: אֲנִי
  english_pob_choice: I
  chosen_spanish: yo
  alternatives_spanish:
  - yo mismo
  lexicon: HALOT
  rationale: El pronombre explícito se mantiene para el énfasis del hebreo; en español suena natural y conserva la primera persona enfática.
- source_word: בְּאֵידְכֶם
  english_pob_choice: at your calamity
  chosen_spanish: de su calamidad
  alternatives_spanish:
  - en su calamidad
  - ante su calamidad
  - en su ruina
  lexicon: HALOT
  rationale: אֵיד denota calamidad, desastre o ruina. Aquí el posesivo se ajusta al español como «su» en referencia a los destinatarios del discurso; «calamidad» conserva la gravedad y el registro. La preposición ב se vierte de modo idiomático en la construcción verbal «reírse de».
- source_word: אֶשְׂחָק
  english_pob_choice: will laugh
  chosen_spanish: me reiré
  alternatives_spanish:
  - reiré
  - soltaré la risa
  lexicon: HALOT
  rationale: El qal de שׂחק se traduce con el verbo común «reírse»; el clítico reflexivo es la forma natural en español para esta construcción.
- source_word: אֶלְעַג
  english_pob_choice: will mock
  chosen_spanish: me burlaré
  alternatives_spanish:
  - me mofaré
  - me escarneceré
  lexicon: HALOT
  rationale: לעג implica burla, escarnio o mofa. «Burlarme» es claro, moderno y conserva el paralelismo con «reírme» sin suavizar la fuerza del hebreo.
- source_word: בְּבֹא
  english_pob_choice: when ... comes
  chosen_spanish: cuando venga
  alternatives_spanish:
  - al venir
  - cuando llegue
  lexicon: HALOT
  rationale: La construcción temporal con ב + infinitivo de בוא se expresa naturalmente como «cuando venga», preservando la relación temporal del original.
- source_word: פַחְדְּכֶם
  english_pob_choice: your dread
  chosen_spanish: su terror
  alternatives_spanish:
  - su miedo
  - lo que temen
  - su pavor
  lexicon: HALOT
  rationale: פחד puede designar miedo/terror o el evento temido. Dado el paralelo con «calamidad» y el movimiento de «venir», «terror» mantiene la ambigüedad entre emoción y acontecimiento temible. El posesivo se ajusta al contexto plural con referencia de tercera persona en español.
theological_decisions:
- issue: Tono de la Sabiduría personificada ante la negativa de los necios
  english_pob_reading: Render the verbs straightforwardly as 'laugh' and 'mock' without softening them into mere irony or satisfaction.
  chosen_spanish_reading: «me reiré» y «me burlaré» se mantienen sin suavizar la severidad de la respuesta.
  alternative_spanish_readings:
  - sonreiré
  - mostraré desprecio
  - me alegraré
  rationale: El hebreo usa verbos fuertes de risa y burla en un contexto judicial de sabiduría. Traducirlos de modo directo preserva la tensión retórica y advertencia del verso, sin convertirla en mera ironía ni en un gozo explícito no atestiguado por el texto.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: La versión española sigue el estado revisado más reciente del texto fuente en inglés POB, que no introdujo cambios y fue confirmado con acuerdo alto en la revisión cruzada.
  spanish_consistency_notes:
  - Se mantiene «calamidad» para אֵיד y «terror» para פחד, preservando la distinción léxica del hebreo.
  - La primera persona explícita se conserva en ambas cláusulas para reflejar el énfasis del original.
  - El marcado de nota al pie [a] se coloca solo en «calamidad», donde la ambigüedad léxica del hebreo afecta la interpretación global de la cláusula.
