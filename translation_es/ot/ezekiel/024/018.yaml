  glossary_alignment: No hay términos teológicos del glosario mayor en juego. «mi esposa», «murió» y «me había sido mandado» están bien alineados con el proyecto. La nota al pie está bien motivada y puede conservarse con leve ajuste para reflejar la redacción revisada.
