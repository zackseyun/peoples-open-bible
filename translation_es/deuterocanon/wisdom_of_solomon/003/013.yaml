translation:
  language: es
  text: Porque dichosa es la estéril[a], la sin mancha, que no conoció lecho[b] en transgresión; tendrá fruto en la visitación de las almas[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la mujer estéril». El griego usa un adjetivo sustantivado que señala a una mujer incapaz de tener hijos.
    reason: lexical_alternative
  - marker: b
    text: O «lecho matrimonial» o, de forma más explícita, «relaciones sexuales». El griego usa «lecho» como eufemismo de unión sexual.
    reason: lexical_alternative
  - marker: c
    text: La expresión puede referirse a la futura intervención o revisión de Dios respecto de las almas humanas; por eso puede implicar vindicación o juicio.
    reason: alternative_reading
lexical_decisions:
- source_word: μακαρία
  english_pob_choice: blessed
  chosen_spanish: dichosa
  alternatives_spanish:
  - bendita
  - feliz
  lexicon: BDAG
  rationale: «Dichosa» comunica la valoración positiva elevada de «blessed» sin sonoridad eclesiástica excesiva; «bendita» sería posible, pero en español puede sonar más formularia o litúrgica.
- source_word: στεῖρα
  english_pob_choice: barren woman
  chosen_spanish: la estéril
  alternatives_spanish:
  - la mujer estéril
  - la mujer sin hijos
  lexicon: LSJ
  rationale: El griego describe a una mujer incapaz de tener hijos. En español, «la estéril» es natural y conserva la fuerza nominal del original; el artículo hace claro el referente femenino.
- source_word: ἀμίαντος
  english_pob_choice: undefiled
  chosen_spanish: la inmaculada
  alternatives_spanish:
  - la sin mancha
  - la pura
  lexicon: BDAG
  rationale: «Inmaculada» comunica bien la idea de ausencia de contaminación moral o ritual. «Sin mancha» también es posible, pero puede sonar menos idiomática en una frase nominal breve.
- source_word: ἔγνω
  english_pob_choice: has not known
  chosen_spanish: no conoció
  alternatives_spanish:
  - no ha conocido
  - no tuvo
  lexicon: BDAG
  rationale: Se mantiene el eufemismo bíblico de «conocer» para relaciones sexuales, preservando la textura del griego y evitando una explicitación innecesaria.
- source_word: κοίτην
  english_pob_choice: a bed
  chosen_spanish: lecho
  alternatives_spanish:
  - cama
  - lecho matrimonial
  lexicon: LSJ
  rationale: «Lecho» conserva el valor metafórico de «bed» con dignidad literaria en español. «Lecho matrimonial» explicita demasiado; «cama» suena demasiado doméstico.
- source_word: ἐν παραπτώματι
  english_pob_choice: in transgression
  chosen_spanish: en transgresión
  alternatives_spanish:
  - en delito
  - en pecado
  lexicon: BDAG
  rationale: «En transgresión» sigue de cerca el griego y mantiene la categoría moral sin concretarla más de lo que el texto permite.
- source_word: ἕξει καρπὸν
  english_pob_choice: she will have fruit
  chosen_spanish: tendrá fruto
  alternatives_spanish:
  - dará fruto
  - recibirá fruto
  lexicon: BDAG
  rationale: «Tendrá fruto» reproduce el giro literal y conserva la inversión retórica para una mujer estéril. «Dará fruto» suena más natural, pero desplaza ligeramente el matiz de posesión del original.
- source_word: ἐν ἐπισκοπῇ
  english_pob_choice: at the visitation
  chosen_spanish: en la visita
  alternatives_spanish:
  - en la visitación
  - en el tiempo de la visita
  lexicon: BDAG
  rationale: «Visita» en español es más natural que «visitación» y puede retener la ambigüedad entre intervención favorable y revisión judicial. Se evita cerrar el sentido demasiado pronto.
- source_word: ψυχῶν
  english_pob_choice: of souls
  chosen_spanish: de las almas
  alternatives_spanish:
  - de las vidas
  - de las personas
  lexicon: BDAG
  rationale: «Almas» corresponde directamente a «souls» y mantiene el registro antropológico y escatológico del libro.
theological_decisions:
- issue: Sentido de «la visita de las almas»
  english_pob_reading: A future divine visitation/reckoning concerning human souls, left somewhat open between vindication and judgment.
  chosen_spanish_reading: Una visita futura de Dios respecto de las almas humanas, dejando abierta la tensión entre vindicación y juicio.
  alternative_spanish_readings:
  - el día del juicio
  - el tiempo de la misericordiosa visita de Dios
  rationale: El contexto de Sabiduría 3 apunta al destino de los justos y a la intervención futura de Dios; el español debe conservar la ambigüedad del griego sin resolverla artificialmente.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
translation_notes:
  revision_awareness: La versión española sigue el texto griego de Swete 1909 y el expediente auditado en inglés. No se adoptaron cambios de revisión recientes; la lectura se mantiene estable con la misma tensión semántica preservada en el inglés POB.
  spanish_consistency_notes:
  - Se mantiene «Dios» implícito en la nota teológica, pero no se añade al texto principal porque el griego usa una construcción nominal abierta.
  - Se usa «almas» para ψυχῶν, coherente con el registro de Sabiduría y con la elección inglesa «souls».
  - Se evita «SEÑOR» porque este versículo no contiene el nombre divino en el texto fuente.
  - La puntuación y el orden de las cláusulas buscan conservar el paralelismo y la cadencia del griego sin calco rígido.
