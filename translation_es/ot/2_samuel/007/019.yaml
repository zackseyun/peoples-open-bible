translation:
  language: es
  text: Y aun esto era poca cosa ante tus ojos, Señor Yahvé; también has hablado de la casa[a] de tu siervo para mucho tiempo en adelante[b], y esta es la ley[c] del hombre, Señor Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo «casa», que también puede significar hogar, casa dinástica o linaje.
    reason: lexical_alternative
  - marker: b
    text: 'O: «para el futuro distante». La frase se refiere a lo que queda muy adelante en el tiempo.'
    reason: lexical_alternative
  - marker: c
    text: El hebreo de la cláusula final es difícil. También puede entenderse como «esta es la instrucción del hombre», «esta es la ley/costumbre del hombre» o «este es el estatuto para la humanidad».
    reason: alternative_reading
lexical_decisions:
- source_word: וַתִּקְטַן
  english_pob_choice: was too small
  chosen_spanish: era poco
  alternatives_spanish:
  - era demasiado pequeño
  - era una cosa pequeña
  lexicon: HALOT
  rationale: El hebreo expresa que algo resultó pequeño o insuficiente. «Era poco» conserva la idea idiomática sin forzar una paráfrasis excesiva y suena natural en español bíblico moderno.
- source_word: בְּעֵינֶיךָ
  english_pob_choice: in your eyes
  chosen_spanish: ante tus ojos
  alternatives_spanish:
  - a tus ojos
  - en tus ojos
  lexicon: HALOT
  rationale: Se preserva la metáfora hebrea de evaluación o valoración. «Ante tus ojos» es idiomático en español y mantiene la imagen de juicio divino.
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: Lord GOD
  chosen_spanish: Señor Yahvé
  alternatives_spanish:
  - Señor Dios
  - Señor Yahvé
  lexicon: HALOT
  rationale: Se mantiene la distinción del título compuesto sin recurrir a «SEÑOR» como máscara. En español, «Señor Yahvé» conserva el valor de אֲדֹנָי junto con el nombre divino YHWH, conforme al criterio del proyecto.
- source_word: וַתְּדַבֵּר גַּם אֶל
  english_pob_choice: you have also spoken about
  chosen_spanish: también has hablado de
  alternatives_spanish:
  - también has hablado acerca de
  - también has hablado sobre
  lexicon: HALOT
  rationale: El verbo con אֶל admite matiz de contenido o referencia. «Hablado de» es más natural y formal en español, y sigue la revisión inglesa que prefirió «of».
- source_word: בֵּית עַבְדְּךָ
  english_pob_choice: your servant’s house
  chosen_spanish: la casa de tu siervo
  alternatives_spanish:
  - la casa de tu esclavo
  - la casa de tu siervo; tu linaje
  lexicon: HALOT
  rationale: «Casa» se mantiene literalmente porque puede significar hogar, casa dinástica o linaje. En español, «casa de tu siervo» preserva la metáfora sin resolverla prematuramente; la posible noción dinástica queda implícita.
- source_word: לְמֵרָחוֹק
  english_pob_choice: for a long time to come
  chosen_spanish: para largo tiempo
  alternatives_spanish:
  - para el futuro distante
  - para mucho tiempo en adelante
  lexicon: HALOT
  rationale: La expresión hebrea apunta a una distancia temporal. «Para largo tiempo» comunica esa prolongación futura de manera clara y sobria.
- source_word: וְזֹאת תּוֹרַת הָאָדָם
  english_pob_choice: and this is the law of man
  chosen_spanish: y esta es la instrucción del hombre
  alternatives_spanish:
  - y esta es la ley del hombre
  - y esta es la norma del hombre
  - y esta es la instrucción para el hombre
  lexicon: HALOT
  rationale: Se conserva la dificultad del final. «תּוֹרָה» puede ser ley, instrucción o norma; «instrucción» mantiene amplitud semántica sin cerrar la ambigüedad. «Del hombre» refleja el singular hebreo הָאָדָם, siguiendo la decisión inglesa de sostener «man» en la lectura principal.
theological_decisions:
- issue: Tono del título divino compuesto אֲדֹנָי יְהוִה
  english_pob_reading: Lord GOD
  chosen_spanish_reading: Señor Yahvé
  alternative_spanish_readings:
  - Señor Dios
  - Señor Yahvé
  rationale: La decisión evita la sustitución litúrgica tradicional de YHWH por «SEÑOR», porque el proyecto exige transparencia del nombre divino. En un compuesto con אֲדֹנָי, «Señor Yahvé» mantiene la diferencia entre el título de soberanía y el nombre propio sin perder reverencia.
  doctrine_reference: Default terminology for יהוה / YHWH; translation philosophy §3
- issue: La cláusula difícil וְזֹאת תּוֹרַת הָאָדָם
  english_pob_reading: and this is the law of man
  chosen_spanish_reading: y esta es la instrucción del hombre
  alternative_spanish_readings:
  - y esta es la ley del hombre
  - y esta es la instrucción para el hombre
  - y esta es la norma del hombre
  rationale: Se preserva la tensión textual en vez de resolverla con una paráfrasis doctrinal. «Instrucción» reproduce el campo semántico de תּוֹרָה, mientras «del hombre» mantiene la ambigüedad del hebreo respecto de si se trata de una disposición humana, una norma para la humanidad o una observación sobre el hombre.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it); contested term אָדָם
translation_notes:
  revision_awareness: 'La redacción española sigue la revisión inglesa más reciente en dos puntos: usa una preposición simple y formal en la segunda cláusula («hablado de») y adopta una expresión más directa para la frase final, manteniendo la ambigüedad del hebreo en lugar de cerrarla con una interpretación doctrinal.'
  spanish_consistency_notes:
  - Se emplea «Yahvé» para YHWH conforme al estándar del proyecto, incluso dentro del título compuesto con אֲדֹנָי.
  - Se conserva «casa» en vez de sustituirla por «linaje» en el texto principal; la posible lectura dinástica queda sin resolver en el cuerpo.
  - «Instrucción» se usa para תּוֹרָה por fidelidad semántica y para preservar la tensión interpretativa.
  - «Hombre» se mantiene en la nota y en la lectura principal como reflejo del singular hebreo הָאָדָם.
