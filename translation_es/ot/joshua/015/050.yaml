lexical_decisions:
- source_word: עֲנָב
  english_pob_choice: Anab
  chosen_spanish: Anab
  alternatives_spanish:
  - Aneb
  lexicon: nombre propio toponímico
  rationale: Se trata de un nombre de lugar en una lista de localidades de Judá; por tanto, se translitera, no se traduce. 'Anab' conserva la forma convencional y es transparente para lectores bíblicos en español.
- source_word: אֶשְׁתְּמֹה
  english_pob_choice: Eshtemoh
  chosen_spanish: Eshtemoh
  alternatives_spanish:
  - Eshtemoa
  - Eshtemoa
  lexicon: nombre propio toponímico
  rationale: También es un topónimo. Se mantiene la transliteración como nombre propio; 'Eshtemoh' sigue de cerca la forma consonántica reflejada en la decisión inglesa auditada, sin imponer una castellanización innecesaria.
- source_word: עָנִים
  english_pob_choice: Anim
  chosen_spanish: Anim
  alternatives_spanish:
  - Anim
  lexicon: nombre propio toponímico
  rationale: Aunque la forma hebrea puede parecer plural, aquí funciona como nombre de lugar. Se conserva la transliteración 'Anim' sin intentar verter el morfema como sustantivo común.
- source_word: וְ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - e
  lexicon: conjunción coordinante
  rationale: La partícula une una serie simple de nombres. En español, 'y' es la coordinación natural; 'e' no es necesaria aquí porque las palabras siguientes no exigen ajuste fonético.
translation_notes:
  revision_awareness: El paquete fuente y la auditoría inglesa indican acuerdo alto y sin revisiones aplicadas; por ello, el español sigue la misma decisión de transliterar los tres topónimos sin notas críticas adicionales.
  spanish_consistency_notes:
  - Se mantuvo el orden de la lista del hebreo y de la traducción inglesa auditada.
  - No se añadieron artículos ni verbos, porque el versículo es una simple enumeración de nombres propios.
  - Se preservó la transliteración uniforme de topónimos para mantener consistencia con el POB en inglés.
