theological_decisions:
- issue: Interpretation of גָזֵל בְּעוֹלָה
  chosen_reading: robbery with burnt offering
  alternative_readings:
  - robbery in burnt offering
  - robbery for burnt offering
  - robbery with wrongdoing
  rationale: The phrase is syntactically compressed and has been understood in several ways. The chosen rendering stays close to the Masoretic wording and preserves the prophetic critique of combining injustice with worship. It avoids importing a smoother interpretive expansion not explicit in the Hebrew.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Force of פְעֻלָּתָם
  chosen_reading: their recompense
  alternative_readings:
  - their reward
  - their wage
  - their work
  rationale: The context is divine vindication and covenant blessing for Zion's people, so the noun is best taken as what God grants them justly. This avoids reducing the phrase to mere 'work' while preserving the semantic range in a footnote-worthy alternative list.
  doctrine_reference: Translation philosophy §§1, 5
