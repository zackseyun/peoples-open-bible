  to: Yahvé[a] puso en confusión a Sisara, a todos los carros[b] y a todo el ejército[c], delante de Barac, por la espada[d]. Entonces Sisara bajó del carro y huyó a pie.
  rationale: Se corrigió el posesivo añadido («sus carros» → «los carros») para ajustarse mejor al hebreo y al rastro inglés revisado, se añadió la nota léxica faltante para לְפִי חֶרֶב, y se mejoró la naturalidad de «de encima del carro» a «del carro» sin pérdida de sentido.
