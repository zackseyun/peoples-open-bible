translation:
  language: es
  text: 'La declaración de Yahvé[a], que reúne a los desterrados de Israel: todavía reuniré a otros a él,[b] además de los ya reunidos a él.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo dice אֲדֹנָי יְהוָה, literalmente «Señor YHWH». Conforme a la norma del proyecto, el nombre divino se expresa en el texto principal como «Yahvé», en lugar de ocultarlo con una convención como «SEÑOR» o crear la secuencia poco natural «Señor Yahvé».
    reason: lexical_alternative
  - marker: b
    text: 'El hebreo usa sufijos singulares. Algunos entienden el sentido colectivamente y traducen en plural: «a ellos» y «a los ya reunidos a ellos». La lectura principal conserva el singular para mantener la forma del hebreo.'
    reason: alternative_reading
lexical_decisions:
- source_word: נְאֻם
  english_pob_choice: The declaration of
  chosen_spanish: La declaración de
  alternatives_spanish:
  - Declara
  - La palabra de
  lexicon: HALOT
  rationale: Conserva el sustantivo solemne de anuncio oracular sin volverlo una paráfrasis verbal. En español, «La declaración de» suena natural y mantiene el tono formal del pronunciamiento divino.
- source_word: אֲדֹנָי יְהוָה
  english_pob_choice: the Lord GOD
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor Yahvé
  - el Señor Dios
  - el Soberano Yahvé
  lexicon: HALOT
  rationale: El hebreo une Adonay con el nombre propio divino. Dado el estándar del proyecto, se expresa el nombre en forma directa como «Yahvé», evitando el enmascaramiento «SEÑOR» y evitando la redundancia «Señor Yahvé» en el texto principal. La solemnidad del título queda suficientemente marcada por el contexto de pronunciamiento.
- source_word: מְקַבֵּץ
  english_pob_choice: who gathers
  chosen_spanish: que reúne
  alternatives_spanish:
  - que está reuniendo
  - que junta
  lexicon: HALOT
  rationale: El participio describe al sujeto divino como el que reúne. «Reúne» es natural en español y mantiene el valor atributivo sin convertirlo innecesariamente en una perífrasis.
- source_word: נִדְחֵי יִשְׂרָאֵל
  english_pob_choice: the outcasts of Israel
  chosen_spanish: los desterrados de Israel
  alternatives_spanish:
  - los expulsados de Israel
  - los dispersos de Israel
  - los exiliados de Israel
  lexicon: HALOT
  rationale: El término hebreo expresa a quienes han sido echados lejos o apartados. «Desterrados» conserva la fuerza de exclusión/exilio y resulta más preciso que «dispersos», que suaviza demasiado el matiz.
- source_word: עוֹד
  english_pob_choice: still more
  chosen_spanish: todavía
  alternatives_spanish:
  - aún más
  - todavía más
  - además
  lexicon: HALOT
  rationale: Aquí el adverbio añade la idea de continuación y aumento. «Todavía» funciona en español como intensificador de continuidad, y en combinación con «más» implícito en el verbo de reunir preserva el sentido aditivo del hebreo sin sobrecargar la frase.
- source_word: אֲקַבֵּץ
  english_pob_choice: I will gather
  chosen_spanish: reuniré
  alternatives_spanish:
  - juntaré
  - voy a reunir
  - reuniré aún
  lexicon: HALOT
  rationale: El imperfecto en discurso divino expresa promesa futura. «Reuniré» es la forma más directa y digna en español, equivalente al compromiso profético del texto.
- source_word: עָלָיו
  english_pob_choice: to him
  chosen_spanish: a él
  alternatives_spanish:
  - sobre él
  - a ellos
  lexicon: HALOT
  rationale: La forma sufijada es singular. Se conserva la referencia singular colectiva con «a él», sin resolverla prematuramente como plural. Esto mantiene la tensión textual entre singular gramatical y referente colectivo.
- source_word: לְנִקְבָּצָיו
  english_pob_choice: besides those already gathered to him
  chosen_spanish: además de los ya reunidos para él
  alternatives_spanish:
  - además de sus reunidos
  - además de los que ya se han reunido para él
  - en adición a los ya reunidos para él
  lexicon: HALOT
  rationale: La frase marca adición a un grupo ya reunido y conserva el sufijo singular. «Los ya reunidos para él» reproduce la idea resultativa del participio pasivo y el sentido complementario de לְ con naturalidad en español.
theological_decisions:
- issue: Forma de rendir el nombre divino YHWH en Isaías 56:8
  english_pob_reading: the Lord GOD / Yahweh in the divine title
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  - el Señor Yahvé
  - el Señor Dios
  rationale: El paquete fuente y la norma del proyecto indican que יהוה debe aparecer como «Yahvé» en el texto principal. Esto preserva el nombre del pacto y evita la convención de ocultarlo con un equivalente funcional.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה YHWH → Yahvé'
- issue: Referencia de los sufijos singulares en עָלָיו / לְנִקְבָּצָיו
  english_pob_reading: singular collective reference to Israel ('to him')
  chosen_spanish_reading: referencia singular colectiva a Israel («a él» / «para él» )
  alternative_spanish_readings:
  - plural suavizado («a ellos» / «para ellos» )
  - referencia a Sion o la tierra
  rationale: 'Se conserva la tensión observada en el texto hebreo: el sujeto colectivo Israel recibe sufijos singulares. Mantenerlo así evita resolver interpretaciones debatidas que el audit trail inglés decidió preservar.'
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: El último pase de revisión indicó que no se requerían cambios; esta versión mantiene esa línea y traslada fielmente las decisiones auditadas al español, con especial atención al nombre divino y a los sufijos singulares colectivos.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יהוה, conforme al estándar del proyecto.
  - «Desterrados» conserva el matiz de exclusión/exilio mejor que «dispersos».
  - Se mantuvo la tensión gramatical de los sufijos singulares sin pluralizarlos en el texto principal.
  - La puntuación reproduce la estructura oracular con dos segmentos separados por dos puntos.
