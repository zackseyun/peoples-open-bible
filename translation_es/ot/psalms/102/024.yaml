review_pass:
  verdict: revise
  source_alignment_summary: 'El hebreo fuente presenta una tensión real: עִנָּה בַדֶּרֶךְ כחו קִצַּר יָמָי = ''afligió/debilitó su fuerza en el camino; acortó mis días''. El rastro auditado en inglés documenta correctamente esa tensión y la conserva en sus notas, aunque hay una revisión aplicada que cambió el texto principal a ''my strength'' con una justificación que contradice la propia morfología y las decisiones léxicas/teológicas previas. La propuesta española sigue esa revisión errónea y además su nota a dice que el hebreo ''puede leerse literalmente'' como «su fuerza», cuando en realidad eso es lo que el texto hebreo dado sí dice. Por tanto, el borrador no preserva fielmente la evidencia fuente ni la racionalidad documentada más sólida.'
  spanish_quality_summary: 'El español es claro y natural, con buen registro bíblico moderno: «Afligió ... en el camino; acortó mis días». Sin embargo, la fidelidad debe corregirse en «mi fuerza» → «su fuerza», y la nota textual debe reformularse para no invertir la relación entre texto principal y alternativa contextual. La estructura y puntuación son adecuadas.'
  glossary_alignment: No hay conflictos con la terminología global del proyecto. Las decisiones «afligió», «en el camino» y «mis días» son adecuadas. El problema está en כחו, donde debe mantenerse «su fuerza» en el texto principal y consignar «mi fuerza» como alternativa contextual en nota, conforme a la morfología hebrea y al principio de no resolver tensiones textuales en silencio.
  issues:
  - severity: high
    issue: El texto principal traduce כחו como «mi fuerza» en lugar de «su fuerza».
    rationale: La forma hebrea dada lleva sufijo de tercera persona masculina singular. Traducirla como primera persona no sigue la evidencia fuente inmediata.
  - severity: high
    issue: La nota [a] invierte el estado de la evidencia textual.
    rationale: Dice que el hebreo 'puede leerse literalmente' como «su fuerza», cuando esa es precisamente la lectura literal del texto suministrado; «mi fuerza» es la alternativa interpretativa/contextual.
  - severity: medium
    issue: Las decisiones metaexplicativas españolas dependen de una revisión inglesa inconsistente con el paquete fuente.
    rationale: El registro inglés contiene una revisión aplicada que contradice tanto la morfología como las decisiones léxicas y teológicas documentadas. La revisión española no debe seguir mecánicamente esa inconsistencia.
  revised_spanish_text: Afligió su fuerza[a] en el camino[b]; acortó mis días.
  revised_footnotes:
  - marker: a
    text: El hebreo dice literalmente «su fuerza»; muchos entienden «mi fuerza» a la luz del contexto circundante en primera persona.
    reason: alternative_reading
  - marker: b
    text: 'O: «en el curso de la vida»; literalmente, «en el camino».'
    reason: lexical_alternative
  revision_rationale: Se corrige «mi fuerza» a «su fuerza» para reflejar la morfología hebrea dada (sufijo de tercera persona) y se ajusta la nota para presentar «mi fuerza» como alternativa contextual, no como lectura literal. Esto preserva la tensión textual documentada sin sacrificar la claridad del español.
