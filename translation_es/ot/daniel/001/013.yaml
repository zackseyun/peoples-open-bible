translation:
  language: es
  text: Entonces, que se vea ante ti nuestro aspecto y el aspecto de los jóvenes que están comiendo la comida del rey[a]; y conforme a lo que veas, trata a tus siervos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la porción del rey» o «las delicias del rey». El término hebreo se refiere a provisiones reales.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיֵרָאוּ
  english_pob_choice: let ... be seen
  chosen_spanish: que se vean
  alternatives_spanish:
  - que sean vistos
  - que se examinen
  lexicon: HALOT
  rationale: 'El nifal jussivo expresa aquí una petición pasiva: Daniel pide que se observe su condición al final de la prueba. «Que se vean» conserva la imagen de visibilidad sin añadir una evaluación explícita que no está en el hebreo.'
- source_word: לְפָנֶיךָ
  english_pob_choice: before you
  chosen_spanish: delante de ti
  alternatives_spanish:
  - en tu presencia
  - ante ti
  lexicon: HALOT
  rationale: La expresión idiomática indica la presencia del funcionario. «Delante de ti» es natural en español y mantiene la relación directa sin volver el estilo demasiado solemne o arcaico.
- source_word: מַרְאֵינוּ
  english_pob_choice: our appearance
  chosen_spanish: nuestro aspecto
  alternatives_spanish:
  - nuestra apariencia
  - nuestro semblante
  lexicon: HALOT
  rationale: מַרְאֶה se refiere a la apariencia visible. «Aspecto» comunica bien la idea en español contemporáneo y evita un término demasiado técnico o rígido.
- source_word: וּמַרְאֵה הַיְלָדִים
  english_pob_choice: and the appearance of the youths
  chosen_spanish: y el aspecto de los jóvenes
  alternatives_spanish:
  - y la apariencia de los jóvenes
  - y el aspecto de los muchachos
  lexicon: HALOT
  rationale: יְלָדִים puede referirse a jóvenes en un contexto de formación cortesana. «Jóvenes» conserva ese matiz mejor que «niños» y es más fiel al contexto que un término infantil.
- source_word: הָאֹכְלִים
  english_pob_choice: who are eating
  chosen_spanish: que están comiendo
  alternatives_spanish:
  - que comen
  - comiendo
  lexicon: HALOT
  rationale: El participio indica una acción en curso o habitual. «Que están comiendo» mantiene ese valor progresivo de forma clara y natural en español.
- source_word: פַּתְבַּג הַמֶּלֶךְ
  english_pob_choice: the king’s food
  chosen_spanish: la comida del rey
  alternatives_spanish:
  - la porción del rey
  - las delicias del rey
  - la comida real
  lexicon: HALOT
  rationale: פַּתְבַּג es un préstamo persa para provisiones/comida selecta de la corte. «La comida del rey» es clara y directa; evita sobreinterpretar el término como «delicias» y mantiene el sentido de provisiones reales.
- source_word: וְכַאֲשֶׁר תִּרְאֶה
  english_pob_choice: according to what you see
  chosen_spanish: y conforme a lo que veas
  alternatives_spanish:
  - y según lo que veas
  - y como veas
  lexicon: HALOT
  rationale: La cláusula liga la acción futura con la observación del oficial. «Conforme a lo que veas» refleja bien la norma derivada de la inspección y suena natural en español.
- source_word: עֲשֵׂה עִם עֲבָדֶיךָ
  english_pob_choice: deal with your servants
  chosen_spanish: trata a tus siervos
  alternatives_spanish:
  - obra con tus siervos
  - haz con tus siervos
  - trata con tus siervos
  lexicon: HALOT
  rationale: עֲשֵׂה עִם significa ‘actuar/tratar con’. En este contexto de cortesía ante un funcionario, «siervos» comunica deferencia y servicio personal sin imponer la carga social de «esclavos».
theological_decisions:
- issue: Rendering of עֲבָדֶיךָ in deferential court speech
  english_pob_reading: your servants
  chosen_spanish_reading: tus siervos
  alternative_spanish_readings:
  - tus esclavos
  - tus servidores
  rationale: Aquí el término funciona como lenguaje deferente ante una autoridad, no como una afirmación doctrinal o social sobre esclavitud. «Siervos» preserva la cortesía y la relación de servicio sin introducir una connotación más fuerte de servidumbre forzada que el contexto no enfatiza.
  doctrine_reference: DOCTRINE.md Translation philosophy §1; términos de servicio según contexto
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el hebreo y la última revisión inglesa: se conservó la idea de ser vistos delante del funcionario, no una inspección interpretativa añadida. También se mantuvo la alternativa léxica documentada para פַּתְבַּג mediante nota, como en el expediente inglés.'
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Se prefirió «siervos» por la cortesía del discurso, coherente con el tratamiento contextual de עבד en esta serie.
  - «Jóvenes» mantiene el matiz de formación cortesana de יְלָדִים sin infantilizar a los personajes.
  - La nota sobre la comida real preserva la tensión léxica del hebreo entre ‘comida’, ‘porción’ y ‘delicias’.
