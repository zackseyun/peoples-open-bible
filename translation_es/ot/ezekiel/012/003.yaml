review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del hebreo y conserva elementos clave como «hijo de hombre», la repetición de «delante de sus ojos» y «Quizá vean». Sin embargo, debilita dos elecciones léxicas importantes del original y del audit trail inglés: גלה se reduce a «sal/saldrás», perdiendo el sentido explícito de ir al destierro, y כְּלֵי גוֹלָה se vierte como «útiles», término menos natural y menos preciso que un equivalente como «equipaje» o «enseres».'
  spanish_quality_summary: El español es claro, pero «hazte útiles para el exilio» suena poco idiomático en registro bíblico natural. Además, la repetición de «sal/saldrás» no comunica por sí sola el acto simbólico de exilio tan claramente como el original. Un ajuste menor mejora fidelidad y legibilidad sin volver el texto rígido.
  glossary_alignment: 'No hay conflicto con los términos troncales del proyecto. «hijo de hombre» y «casa rebelde» están bien alineados. La principal cuestión es de fidelidad léxica contextual: גלה debe reflejar destierro/exilio, y כְּלֵי גוֹלָה pide una expresión española más natural que «útiles».'
  issues:
  - severity: high
    issue: גלה se traduce como «sal/saldrás» en ambas ocurrencias
    rationale: El hebreo repite explícitamente el verbo de ir al destierro/exilio. «Salir» expresa movimiento, pero borra el componente semántico central del acto-signo. El audit trail inglés mantuvo deliberadamente «go into exile» en ambas cláusulas.
  - severity: medium
    issue: «hazte útiles para el exilio» es poco natural y semánticamente débil para כְּלֵי גוֹלָה
    rationale: «Útiles» en español puede sonar instrumental o doméstico y no evoca con claridad las pertenencias de un desterrado. El hebreo apunta a objetos/pertenencias que uno lleva al exilio; «equipaje para el exilio» o «enseres para el exilio» comunica mejor eso.
  - severity: low
    issue: La nota [a] ofrece «prepárate para el exilio», que desplaza el objeto hacia la persona
    rationale: Como alternativa de nota, esa opción puede inducir una lectura del verbo sin reflejar el sintagma nominal כְּלֵי גוֹלָה. Conviene conservar alternativas centradas en pertenencias/enseres.
  revised_spanish_text: Y tú, hijo de hombre, prepárate[a] equipaje para el exilio, y ve al destierro de día delante de sus ojos. Irás al destierro de tu lugar a otro lugar delante de sus ojos. Quizá vean[b], pues son una casa rebelde.
  revised_footnotes:
