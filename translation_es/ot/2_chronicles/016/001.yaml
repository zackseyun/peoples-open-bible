base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/016/001.yaml
  text: In the thirty-sixth year of Asa’s reign[a], Baasha king of Israel went up against Judah and built up Ramah, so as not to allow anyone to go out or come in to Asa king of Judah.
