    issue: «escarlata» omite el sustantivo textil implícito en ושני תולעת
    rationale: El hebreo y la decisión inglesa apuntan a un material/textil sacerdotal, no solo a un color. En español, «y escarlata» queda elíptico y menos fiel que «y hilo escarlata».
  - severity: medium
    issue: La nota sobre «pectoral de juicio» no preserva la justificación documentada del POB
    rationale: El rastro inglés incluyó una nota de referencia cruzada para explicar que «breastpiece of judgment» retoma la terminología sacerdotal de Éxodo. Esa dimensión puede y debe conservarse en español.
  - severity: low
