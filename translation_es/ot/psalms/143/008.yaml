translation:
  language: es
  text: Hazme oír por la mañana tu amor fiel[a], porque en ti confío. Dame a conocer el camino que debo seguir[b], porque a ti levanto mi alma[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Hazme oír tu amor fiel por la mañana».'
    reason: alternative_reading
  - marker: b
    text: 'O: «Dame a conocer el camino en que debo andar»; literalmente, «el camino que iré».'
    reason: alternative_reading
  - marker: c
    text: «Levantar el alma» es una expresión hebrea de confiarse a Dios o de dirigir hacia él toda la vida interior.
    reason: cultural_note
lexical_decisions:
- source_word: הַשְׁמִיעֵנִי
  english_pob_choice: Let me hear
  chosen_spanish: Hazme oír
  alternatives_spanish:
  - Permíteme oír
  - Déjame oír
  lexicon: HALOT
  rationale: El hiphil de שׁמע con sufijo de primera persona pide literalmente 'hazme oír'. 'Hazme oír' conserva la fuerza causal y suena natural en español devocional.
- source_word: בַבֹּקֶר
  english_pob_choice: in the morning
  chosen_spanish: por la mañana
  alternatives_spanish:
  - en la mañana
  - cada mañana
  lexicon: HALOT
  rationale: La expresión temporal marca el momento en que se pide escuchar el favor divino. 'Por la mañana' es idiomático en español y evita sugerir una sola fecha límite o una repetición no explicitada.
- source_word: חַסְדֶּךָ
  english_pob_choice: your steadfast love
  chosen_spanish: tu amor fiel
  alternatives_spanish:
  - tu amor constante
  - tu misericordia
  - tu amor leal
  lexicon: HALOT
  rationale: חסד expresa amor leal, de pacto, no solo afecto ni mera misericordia. 'Amor fiel' comunica bien esa lealtad afectiva y pactal en español contemporáneo.
- source_word: בְךָ בָטָחְתִּי
  english_pob_choice: in you I trust
  chosen_spanish: en ti confío
  alternatives_spanish:
  - en ti he confiado
  - yo confío en ti
  lexicon: HALOT
  rationale: El perfecto hebreo puede expresar una confianza estable. El presente 'confío' comunica mejor la postura actual del salmista en una oración directa.
- source_word: הוֹדִיעֵנִי
  english_pob_choice: Make known to me
  chosen_spanish: Hazme saber
  alternatives_spanish:
  - Enséñame
  - Dame a conocer
  lexicon: HALOT
  rationale: El hiphil de ידע significa 'dar a conocer' o 'hacer saber'. 'Hazme saber' mantiene la cercanía semántica sin sonar rígido en español.
- source_word: דֶּרֶךְ
  english_pob_choice: the way
  chosen_spanish: el camino
  alternatives_spanish:
  - la senda
  - la manera
  lexicon: HALOT
  rationale: En un contexto de guía, דרך puede ser ruta literal y también curso de vida. 'Camino' es claro y conserva ambas posibilidades sin perder la imagen.
- source_word: זוּ
  english_pob_choice: I should
  chosen_spanish: por el cual debo ir
  alternatives_spanish:
  - que debo seguir
  - que he de andar
  lexicon: HALOT
  rationale: La relativa hebrea es literalmente 'el camino que iré'. En español, 'por el cual debo ir' transmite la orientación pedida y el matiz de guía necesaria, sin volverla mecánica.
- source_word: אֵלֵךְ
  english_pob_choice: go
  chosen_spanish: ir
  alternatives_spanish:
  - andar
  - caminar
  lexicon: HALOT
  rationale: הלך es el verbo común 'ir/andar'. 'Ir' funciona naturalmente con 'camino' y mantiene la sencillez del verso.
- source_word: אֵלֶיךָ
  english_pob_choice: to you
  chosen_spanish: a ti
  alternatives_spanish:
  - hacia ti
  lexicon: HALOT
  rationale: La preposición indica dirección hacia Dios. 'A ti' es la forma natural en español para esta dirección personal.
- source_word: נָשָׂאתִי נַפְשִׁי
  english_pob_choice: I lift up my soul
  chosen_spanish: levanto mi alma
  alternatives_spanish:
  - alzo mi alma
  - elevo mi vida
  lexicon: HALOT
  rationale: Se conserva la metáfora hebrea de dirigir hacia Dios la vida interior. 'Levanto mi alma' mantiene el giro figurado y su resonancia devocional, sin reducirlo a una paráfrasis como 'me entrego'.
theological_decisions:
- issue: Sentido de חסד aplicado a Yahvé
  english_pob_reading: your steadfast love
  chosen_spanish_reading: tu amor fiel
  alternative_spanish_readings:
  - tu misericordia
  - tu amor leal
  - tu amor constante
  rationale: El texto apela al amor comprometido y fiable de Dios como base de la petición. 'Amor fiel' preserva la dimensión relacional y de lealtad pactal sin caer en una fórmula arcaica o en una reducción a mera compasión.
  doctrine_reference: Translation philosophy §1, §6
- issue: Mantenimiento de la metáfora de נָשָׂאתִי נַפְשִׁי
  english_pob_reading: for to you I lift up my soul
  chosen_spanish_reading: porque a ti levanto mi alma
  alternative_spanish_readings:
  - porque a ti entrego mi alma
  - porque hacia ti dirijo mi vida interior
  rationale: Se conserva la imagen hebrea de orientación total hacia Dios. Esto respeta la tensión poética y devocional del hebreo en lugar de neutralizarla con una explicación interpretativa.
  doctrine_reference: Translation philosophy §3, §6
translation_notes:
  revision_awareness: 'La versión española sigue de cerca el audit trail inglés sin depender mecánicamente de él: mantiene el valor causal de הַשְׁמִיעֵנִי, la temporalidad de בַּבֹּקֶר, el peso pactal de חֶסֶד, la metáfora de נָשָׂאתִי נַפְשִׁי y la petición de guía de דֶּרֶךְ + זוּ + אֵלֵךְ. No se aplicaron revisiones posteriores al borrador inglés; el estado de revisión más reciente indicó que no había cambios necesarios.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera explícitamente; en este versículo no aparece el Tetragrámaton.
  - Se evita «Señor» como sustituto de Yahvé porque el hebreo aquí no lo exige.
  - «Camino» mantiene tanto la imagen literal como la metafórica de dirección de vida.
  - «Levanto mi alma» conserva la metáfora hebrea sin suavizarla en una paráfrasis doctrinal.
