translation:
  language: es
  text: Y Antíoco acampó contra Dora[c], y con él estaban doce miríadas[a] de hombres de guerra y ocho mil de caballería[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O bien, «ciento veinte mil hombres de guerra». El griego dice «doce miríadas», usando la unidad antigua «miríada» para diez mil.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, el griego dice «ocho mil caballo»; aquí se entiende como tropa montada o caballería.
    reason: lexical_alternative
  - marker: c
    text: El nombre del lugar aparece aquí en griego como «Dora»; algunas tradiciones usan «Dor».
    reason: alternative_reading
lexical_decisions:
- source_word: παρενέβαλεν
  english_pob_choice: encamped against
  chosen_spanish: acampó contra
  alternatives_spanish:
  - acam­pó frente a
  - puso su campamento contra
  - se instaló en campaña contra
  lexicon: LSJ
  rationale: El verbo griego indica una acción militar de acampar o poner el campamento en posición hostil. «Acampó contra» conserva ese sentido bélico sin introducir más movimiento del que el texto da.
- source_word: Δῶρα
  english_pob_choice: Dora
  chosen_spanish: Dora
  alternatives_spanish:
  - Dor
  lexicon: LSJ
  rationale: La forma griega atestiguada es Δῶρα; en español puede transliterarse como «Dora». Mantengo la forma más directa del testimonio griego, como en el audit trail inglés.
- source_word: δώδεκα μυριάδες
  english_pob_choice: twelve myriads
  chosen_spanish: doce myriadas
  alternatives_spanish:
  - ciento veinte mil
  lexicon: LSJ
  rationale: «Myriada» conserva en español la unidad antigua de diez mil y refleja de modo transparente la expresión griega, evitando convertirla silenciosamente en una cifra moderna.
- source_word: ἀνδρῶν πολεμιστῶν
  english_pob_choice: fighting men
  chosen_spanish: hombres de guerra
  alternatives_spanish:
  - guerreros
  - hombres combatientes
  - soldados
  lexicon: LSJ
  rationale: La frase griega designa varones combatientes. «Hombres de guerra» es una equivalencia sobria y comprensible que preserva el matiz militar y masculino.
- source_word: ὀκτακισχίλια
  english_pob_choice: eight thousand
  chosen_spanish: ocho mil
  alternatives_spanish:
  - ocho mil fuertes
  lexicon: LSJ
  rationale: Número directo, sin expansión interpretativa.
- source_word: ἵππος
  english_pob_choice: cavalry
  chosen_spanish: caballería
  alternatives_spanish:
  - hombres de a caballo
  - caballería montada
  lexicon: LSJ
  rationale: Aunque literalmente puede significar «caballo», aquí funciona colectivamente como tropa montada. «Caballería» expresa con naturalidad ese valor militar colectivo en español.
translation_notes:
  revision_awareness: La versión inglesa revisada ajustó el orden de la segunda cláusula para mayor naturalidad y mantuvo «myriads» y «cavalry» para reflejar el griego. La propuesta española sigue esa misma decisión auditada, preservando la estructura coordinada y la transparencia numérica.
  spanish_consistency_notes:
  - Se mantiene «Y» al inicio por correspondencia directa con la coordinación narrativa del original.
  - Se usa «Dora» en lugar de «Dor» por apoyo directo del griego Δῶρα.
  - «Caballería» traduce el colectivo militar de ἵππος, evitando una traducción literal que sonaría extraña en español.
  - «Myriadas» se conserva como término transparente; si la serie editorial prefiriera modernizar la cifra, la alternativa documentada es «ciento veinte mil».
