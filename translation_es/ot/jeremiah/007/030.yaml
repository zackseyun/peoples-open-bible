translation:
  language: es
  text: Porque los hijos de Judá han hecho lo malo ante mis ojos, declara Yahvé. Han puesto sus abominaciones en la casa que lleva mi nombre[b][c], para contaminarla.
  philosophy: optimal-equivalence
  footnotes:
  - marker: b
    text: Es decir, el templo de Jerusalén.
    reason: cultural_note
  - marker: c
    text: 'Literalmente: «la casa sobre la cual es llamado mi nombre».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Porque
  lexicon: HALOT
  rationale: Introduce la razón o base de la acusación anterior. En español, «Porque» conserva el valor causal y suena natural al inicio de la oración.
- source_word: בְנֵי יְהוּדָה
  english_pob_choice: the sons of Judah
  chosen_spanish: los hijos de Judá
  alternatives_spanish:
  - los hijos de Judá
  - la gente de Judá
  lexicon: HALOT
  rationale: Mantiene la expresión de parentesco del hebreo sin suavizarla a «la gente». «Hijos de Judá» conserva la forma y sigue siendo inteligible en español.
- source_word: הָרַע
  english_pob_choice: what is evil
  chosen_spanish: lo malo
  alternatives_spanish:
  - el mal
  - lo que es malo
  lexicon: HALOT
  rationale: El sustantivo/adjetivo sustantivado con artículo pide una forma neutra en español. «Lo malo» preserva la categoría moral sin forzar una nominalización más pesada.
- source_word: בְּעֵינַי
  english_pob_choice: in my sight
  chosen_spanish: ante mis ojos
  alternatives_spanish:
  - a mis ojos
  - en mi opinión
  lexicon: HALOT
  rationale: La imagen hebrea evalúa desde la perspectiva divina. «Ante mis ojos» reproduce bien el giro idiomático y la evaluación personal de Yahvé.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - dice Yahvé
  - afirma Yahvé
  lexicon: HALOT
  rationale: Se conserva el nombre divino como «Yahvé» conforme al criterio del proyecto. «Declara» refleja la fórmula profética solemne de נְאֻם.
- source_word: שִׁקּוּצֵיהֶם
  english_pob_choice: their abominations
  chosen_spanish: sus abominaciones
  alternatives_spanish:
  - sus cosas detestables
  - sus ídolos
  lexicon: HALOT
  rationale: Sigue de cerca la revisión más reciente del POB inglés. «Abominaciones» preserva el valor cultual y moral fuerte del término sin restringirlo únicamente a «ídolos».
- source_word: בַּבַּיִת
  english_pob_choice: in the house
  chosen_spanish: en la casa
  alternatives_spanish:
  - en el templo
  - en la casa sagrada
  lexicon: HALOT
  rationale: Traduce literalmente el sustantivo «casa». En este contexto alude al templo, pero el texto hebreo dice «casa» y conviene mantener esa forma para que la frase relativa la identifique.
- source_word: אֲשֶׁר נִקְרָא שְׁמִי עָלָיו
  english_pob_choice: that is called by my name
  chosen_spanish: que lleva mi nombre
  alternatives_spanish:
  - sobre la cual es invocado mi nombre
  - que es llamada por mi nombre
  lexicon: HALOT
  rationale: «Llevar mi nombre» transmite en español el sentido relacional de la expresión hebrea sin perder naturalidad. Mantiene la idea de pertenencia/identificación con Yahvé.
- source_word: לְטַמְּאוֹ
  english_pob_choice: to defile it
  chosen_spanish: para contaminarla
  alternatives_spanish:
  - para profanarla
  - para hacerla impura
  lexicon: HALOT
  rationale: El infinitivo expresa finalidad o resultado. «Contaminarla» comunica la profanación ritual y moral en español moderno, mientras que «profanarla» sería una alternativa válida pero menos cercana al matiz de impureza ritual.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa explícitamente el Tetragrámaton. Siguiendo la norma del proyecto, se translitera como «Yahvé» en vez de sustituirlo por un título. Esto preserva el nombre propio del pacto y evita enmascararlo.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Alcance de שִׁקּוּצֵיהֶם
  english_pob_reading: their abominations
  chosen_spanish_reading: sus abominaciones
  alternative_spanish_readings:
  - sus ídolos
  - sus cosas abominables
  rationale: El término hebreo puede referirse a objetos cultuales aborrecibles, probablemente incluyendo ídolos, pero sin reducirse necesariamente a ellos. «Abominaciones» mantiene esa amplitud y conserva la tensión lexical.
  doctrine_reference: HALOT שִׁקּוּץ; contexto de contaminación del templo
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del POB inglés, que decidió preferir «abominations» para שִׁקּוּצֵיהֶם, y el texto español refleja esa decisión con «abominaciones». También se conservó el nombre divino como «Yahvé», de acuerdo con la doctrina del proyecto, y se mantuvo la metáfora de la «casa» con nota explicativa.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה, no «SEÑOR».
  - «Casa» se mantiene en el texto principal y se aclara como el templo en la nota cultural.
  - La frase idiomática «lleva mi nombre» conserva el valor relacional del hebreo sin calcar innecesariamente la construcción inglesa.
  - Se eligió un español neutral y publicable, con tono profético solemne pero natural.
