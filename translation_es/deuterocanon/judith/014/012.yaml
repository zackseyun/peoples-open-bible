    text: 'Griego literalmente: «comandantes de mil»; la expresión conserva el valor numérico del compuesto χιλιάρχους.'
    reason: lexical_alternative
  revision_rationale: Se hace una reparación menor para evitar una ambigüedad de sujeto en español y mejorar la fluidez narrativa, sin apartarse del sentido del griego ni del audit trail inglés. También se ajusta «líderes» a «jefes» por naturalidad contextual.
