  spanish_quality_summary: El texto es comprensible, pero puede sonar más natural y digno en español con 'ordenó por escrito darles'. Además, 'salario' en singular reduce un poco el matiz más amplio de ὀψώνια; 'pagos' permite mejor el sentido de remuneración sin excluir del todo provisiones. 'Asignaciones' es posible, pero 'porciones asignadas' comunica más claramente el valor de κλήρους como partes o porciones concedidas.
  glossary_alignment: 'No hay términos teológicos de proyecto en juego. Las decisiones léxicas principales requieren mejor alineación con la documentación inglesa: conviene conservar en notas las alternativas para κλήρους (''suertes''/''partes'') y ὀψώνια (''paga''/''raciones'').'
  issues:
