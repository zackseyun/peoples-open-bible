translation:
  language: es
  text: Cántico de las subidas[a]. Miren[b], bendigan a Yahvé, todos ustedes, siervos de Yahvé, los que están de pie en la casa de Yahvé durante la noche[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: “Cántico de las subidas” traduce el título hebreo tradicional de esta colección de salmos.
    reason: cultural_note
  - marker: b
    text: “Miren” reproduce el valor de llamada de atención de הִנֵּה; también podría traducirse “Vean” o “He aquí”.
    reason: lexical_alternative
  - marker: c
    text: “Casa de Yahvé” se refiere aquí al santuario del templo.
    reason: cultural_note
lexical_decisions:
- source_word: שִׁיר הַמַּעֲלוֹת
  english_pob_choice: A Song of Ascents.
  chosen_spanish: Cántico de las subidas.
  alternatives_spanish:
  - Canción de las subidas.
  - Cántico de ascenso.
  lexicon: N/A
  rationale: La expresión es el título técnico tradicional de este grupo de salmos. “Subidas” conserva el sustantivo plural del hebreo y evita interpretar de más; “cántico” es un equivalente natural de שִׁיר y mantiene el tono litúrgico.
- source_word: הִנֵּה
  english_pob_choice: Behold
  chosen_spanish: Miren
  alternatives_spanish:
  - He aquí
  - Vean
  lexicon: N/A
  rationale: El POB inglés opta por una exhortación visual de apertura. En español, “Miren” comunica bien el valor de llamada de atención sin sonar arcaico.
- source_word: בָּרֲכוּ
  english_pob_choice: bless
  chosen_spanish: bendigan
  alternatives_spanish:
  - alaben
  - bendecid
  lexicon: N/A
  rationale: El hebreo pide una acción dirigida a Yahvé. “Bendigan” reproduce mejor el verbo de la raíz ברך y conserva la relación reverente del llamado.
- source_word: יְהוָה
  english_pob_choice: LORD
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  lexicon: N/A
  rationale: 'Se sigue el estándar del proyecto: el tetragrámaton se vierte como “Yahvé”, sin sustituirlo por una máscara litúrgica.'
- source_word: כָּל עַבְדֵי יְהוָה
  english_pob_choice: all you servants of the LORD
  chosen_spanish: todos ustedes, siervos de Yahvé
  alternatives_spanish:
  - todos los siervos de Yahvé
  - todos ustedes, esclavos de Yahvé
  lexicon: N/A
  rationale: El POB inglés usa “servants”, no “slaves”; por eso aquí se mantiene “siervos”. El vocativo plural con “ustedes” hace natural el mandato en español.
- source_word: הָעֹמְדִים
  english_pob_choice: who stand
  chosen_spanish: los que se quedan
  alternatives_spanish:
  - los que están de pie
  - los que sirven
  lexicon: N/A
  rationale: Aunque literalmente es “los que están de pie”, en este contexto la frase describe permanencia y servicio en un lugar santo por la noche. “Los que se quedan” transmite esa continuidad sin perder el sentido de estar presentes.
- source_word: בְּבֵית יְהוָה
  english_pob_choice: in the house of the LORD
  chosen_spanish: en la casa de Yahvé
  alternatives_spanish:
  - en la casa del Yahvé
  - en el templo de Yahvé
  lexicon: N/A
  rationale: Se conserva “casa de Yahvé” porque el texto fuente usa esa expresión. No se sustituye por “templo” en el cuerpo, ya que el POB inglés dejó la imagen abierta; la precisión cultural puede explicarse en nota.
- source_word: בַּלֵּילוֹת
  english_pob_choice: by night
  chosen_spanish: durante la noche
  alternatives_spanish:
  - de noche
  - por las noches
  lexicon: N/A
  rationale: La preposición española “durante” expresa bien la duración temporal del hebreo sin introducir matiz extra.
theological_decisions:
- issue: Uso del nombre divino del tetragrámaton
  english_pob_reading: LORD
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  rationale: El proyecto requiere reflejar el nombre divino en español con “Yahvé”. Esto evita la ocultación del nombre y sigue la política de traducción directa desde la fuente original.
  doctrine_reference: Exodo 3:15; política terminológica del POB
- issue: Función del vocativo "servants of the LORD"
  english_pob_reading: servants
  chosen_spanish_reading: siervos
  alternative_spanish_readings:
  - esclavos
  - ministros
  rationale: No hay base en este versículo para un término más fuerte que “siervos”; “esclavos” sería excesivo aquí y “ministros” introduce un oficio no presente en el hebreo.
  doctrine_reference: Salmo 134:1; coherencia léxica del POB
- issue: '"House of the LORD" como referencia cultual'
  english_pob_reading: house of the LORD refers to the temple sanctuary
  chosen_spanish_reading: casa de Yahvé
  alternative_spanish_readings:
  - templo de Yahvé
  - santuario de Yahvé
  rationale: El hebreo dice literalmente “casa”. El POB inglés señala el referente cultual; en español se mantiene la metáfora y se puede aclarar en nota sin reemplazarla en el cuerpo.
  doctrine_reference: 1 Reyes 8; uso bíblico de בַּיִת para el santuario
translation_notes:
  revision_awareness: 'La revisión del inglés corrigió una omisión grave: el texto no debía detenerse en el título, sino incluir toda la exhortación del versículo. Este borrador sigue el texto hebreo completo, conserva el título y traduce la línea exhortativa completa con sus complementos.'
  spanish_consistency_notes:
  - Se mantiene “Yahvé” para el tetragrámaton, de manera uniforme en todo el versículo.
  - Se conserva la distinción entre el título del salmo y el cuerpo del versículo con puntuación clara.
  - Las notas se usan solo donde ayudan a explicar una alternativa o un referente cultural sin alterar el texto principal.
