base_translation:
  language: en
  yaml_path: translation/ot/1_kings/020/031.yaml
  text: And his servants said to him[a], “Please behold, we have heard that the kings of the house of Israel are merciful kings. Please let us put sackcloth on our waists and ropes on our heads, and let us go out to the king of Israel[b]; perhaps he will let you live.”
  footnotes:
  - marker: a
    text: Or, “perhaps he will spare your life.”
    reason: lexical_alternative
  - marker: b
    text: “Ropes on our heads” likely signifies a public gesture of surrender or submission.
    reason: cultural_note
