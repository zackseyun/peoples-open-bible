translation:
  language: es
  text: ¡Puertas, levanten sus cabezas! Y sean alzadas, puertas antiguas[a], para que entre el Rey de gloria.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «puertas eternas». La expresión hebrea puede denotar puertas de antigua existencia o de duración perpetua.
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׂאוּ
  english_pob_choice: Lift up
  chosen_spanish: ¡Levantad!
  alternatives_spanish:
  - ¡Alzad!
  - ¡Elevad!
  lexicon: HALOT
  rationale: El imperativo plural pide un verbo vivo y directo. «Levantad» conserva el impulso poético de la orden y funciona bien en español bíblico moderno.
- source_word: שְׁעָרִים
  english_pob_choice: gates
  chosen_spanish: puertas
  alternatives_spanish:
  - portones
  - entradas
  lexicon: HALOT
  rationale: En español, «puertas» comunica con naturalidad la imagen paralela a «ventanas/entradas» y mantiene el tono poético. «Portones» sería más específico, pero menos neutro.
- source_word: רָאשֵׁיכֶם
  english_pob_choice: your heads
  chosen_spanish: vuestras cabezas
  alternatives_spanish:
  - vuestros remates
  - vuestras partes superiores
  lexicon: HALOT
  rationale: Se preserva la personificación del hebreo. «Cabezas» es más fiel que una paráfrasis arquitectónica y mantiene la imagen corporal aplicada a las puertas.
- source_word: וְהִנָּשְׂאוּ
  english_pob_choice: be lifted up
  chosen_spanish: ¡Alzaos!
  alternatives_spanish:
  - ¡Seáis levantadas!
  - ¡Sed alzadas!
  lexicon: HALOT
  rationale: El nifal pide un matiz pasivo/reflexivo. «Alzaos» en español reproduce bien la elevación y mantiene el paralelismo con el primer imperativo.
- source_word: פִּתְחֵי עוֹלָם
  english_pob_choice: ancient doors
  chosen_spanish: puertas eternas
  alternatives_spanish:
  - puertas antiguas
  - puertas de antiguo tiempo
  lexicon: HALOT
  rationale: El inglés POB dejó documentada la alternativa «everlasting doors». En español, «eternas» conserva esa ambigüedad entre antigüedad perdurable y duración perpetua; por eso se ancla con nota.
- source_word: וְיָבֹא
  english_pob_choice: that ... may come in
  chosen_spanish: y entrará
  alternatives_spanish:
  - para que entre
  - y que entre
  lexicon: HALOT
  rationale: El valor consecutivo/final del hebreo puede expresarse con futuro simple en español sin perder la finalidad narrativa del verso. «Entrará» suena más natural y solemne que una subordinada pesada.
- source_word: מֶלֶךְ הַכָּבוֹד
  english_pob_choice: the King of glory
  chosen_spanish: el Rey de gloria
  alternatives_spanish:
  - el Rey glorioso
  - el Rey de majestad
  lexicon: HALOT
  rationale: Se conserva el título casi literalmente. «Gloria» mantiene la fórmula doxológica del original y la equivalencia con el inglés auditado.
theological_decisions:
- issue: Tratamiento de פִּתְחֵי עוֹלָם / open-ended lexical tension
  english_pob_reading: ancient doors, with footnote preserving 'everlasting doors' as a viable alternative
  chosen_spanish_reading: puertas eternas, con nota que permite entender también 'puertas antiguas' o de duración perpetua
  alternative_spanish_readings:
  - puertas antiguas
  - puertas de duración perpetua
  rationale: El hebreo admite tanto antigüedad remota como permanencia continua. El español «eternas» retiene esa tensión y evita cerrar prematuramente el sentido. La nota preserva la alternativa lexical relevante.
  doctrine_reference: 'Lexical audit: HALOT; translation philosophy on preserving documented ambiguity'
- issue: Personificación de las puertas y su efecto litúrgico
  english_pob_reading: Retain the direct address to gates and doors as poetic personification
  chosen_spanish_reading: Mantener la apostrofe directa a las puertas como personificación poética
  alternative_spanish_readings:
  - reinterpretar como una simple invitación a abrir las puertas
  rationale: El hebreo habla a las puertas como si tuvieran cabezas. La traducción conserva esa figura para no diluir la fuerza litúrgica ni introducir interpretación secundaria.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el trazado auditado del POB en inglés: imperativos poéticos directos, preservación de la personificación y mantenimiento de la ambigüedad documentada en פִּתְחֵי עוֹלָם mediante nota.'
  spanish_consistency_notes:
  - Se prefirió «Yahvé» solo cuando el texto lo requiera; aquí no aparece el Tetragrámaton.
  - «Rey de gloria» se mantiene como título literal y solemne, coherente con el audit trail inglés.
  - La puntuación con signos de exclamación dobles ayuda a reflejar el tono exhortativo del hebreo sin añadir contenido interpretativo.
