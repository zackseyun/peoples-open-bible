translation:
  language: es
  text: Porque tu iniquidad[a] enseña tu boca, y escoges la lengua de los astutos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'tu culpa'; hebreo עָוֹן puede denotar iniquidad, culpa o carga de culpa según el contexto.
    reason: lexical_alternative
  - marker: b
    text: O 'la lengua de los taimados' o 'el lenguaje de los sagaces'.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  - Porque
  lexicon: HALOT
  rationale: En español, 'Porque' reproduce bien la relación explicativa del hebreo y del inglés POB en el flujo argumentativo de Elifaz. 'Pues' también sería posible, pero 'Porque' resulta más claro y directo en un registro bíblico moderno.
- source_word: יְאַלֵּף
  english_pob_choice: teaches
  chosen_spanish: enseña
  alternatives_spanish:
  - instruye
  - adiestra
  lexicon: HALOT
  rationale: El piel de אלף aquí significa enseñar o entrenar. 'Enseña' mantiene la personificación de la iniquidad como agente que forma el habla, con naturalidad en español.
- source_word: עֲוֺנְךָ
  english_pob_choice: your iniquity
  chosen_spanish: tu iniquidad
  alternatives_spanish:
  - tu culpa
  - tu maldad
  - tu pecado
  lexicon: HALOT
  rationale: '''Iniquidad'' preserva el peso moral del término y sigue de cerca la opción del POB inglés. ''Culpa'' estrecha demasiado el sentido a responsabilidad jurídica o subjetiva; ''pecado'' y ''maldad'' suavizan o generalizan la carga ética.'
- source_word: פִיךָ
  english_pob_choice: your mouth
  chosen_spanish: tu boca
  alternatives_spanish:
  - tu habla
  - tu hablar
  lexicon: HALOT
  rationale: '''Boca'' conserva la imagen corporal del hebreo y el paralelismo poético con ''lengua'' en el segundo colon. Aunque ''habla'' sería idiomático, perdería esa imaginería.'
- source_word: וְתִבְחַר
  english_pob_choice: and you choose
  chosen_spanish: y tú escoges
  alternatives_spanish:
  - y eliges
  - y prefieres
  lexicon: HALOT
  rationale: '''Escoges'' corresponde bien a בחר y mantiene el tono de acusación directa. Se añadió el pronombre explícito ''tú'' para claridad y énfasis en español, sin cambiar el sentido.'
- source_word: לְשׁוֹן
  english_pob_choice: the tongue
  chosen_spanish: la lengua
  alternatives_spanish:
  - la lengua hablada
  - el lenguaje
  lexicon: HALOT
  rationale: '''Lengua'' es el equivalente más natural del órgano de habla y conserva el paralelismo con ''boca''. ''Lenguaje'' introduciría una abstracción que el hebreo no exige.'
- source_word: עֲרוּמִים
  english_pob_choice: the crafty
  chosen_spanish: los astutos
  alternatives_spanish:
  - los cautelosos
  - los sagaces
  - los taimados
  lexicon: HALOT
  rationale: El contexto acusatorio favorece un sentido negativo o al menos sospechoso. 'Astutos' puede ser positivo o negativo en español, pero aquí el plural con artículo definido mantiene la idea de un modo de hablar hábil y manipulador sin forzar un adjetivo más interpretativo que el hebreo. Se deja constancia de la ambigüedad léxica del término.
theological_decisions:
- issue: Matiz moral de עָוֹן en una acusación directa
  english_pob_reading: Rendered as 'iniquity' rather than 'guilt' or 'sin.'
  chosen_spanish_reading: '''Iniquidad'' en lugar de ''culpa'' o ''pecado''.'
  alternative_spanish_readings:
  - '''tu culpa'' enseña a tu boca'
  - '''tu pecado'' enseña a tu boca'
  rationale: La línea acusa a Job de una perversidad moral que da forma a su habla. 'Iniquidad' conserva esa fuerza ética y evita reducir el término a culpa legal o a una categoría más general como 'pecado'.
  doctrine_reference: 'Translation philosophy §5: consistency of key terms, or documented exception.'
- issue: Valor de עֲרוּמִים en el segundo hemistiquio
  english_pob_reading: '''the crafty'' with note: ''the cunning'' / ''the shrewd.'''
  chosen_spanish_reading: '''los astutos'' con nota de alternativa.'
  alternative_spanish_readings:
  - '''los taimados'''
  - '''los sagaces'''
  - '''los cautelosos'''
  rationale: El contexto de acusación exige que la destreza verbal se perciba como moralmente sospechosa. 'Astutos' permite conservar la ambigüedad básica del hebreo y al mismo tiempo sonará negativamente en este contexto, sin imponer demasiado interpretación extra.
  doctrine_reference: 'Translation philosophy §5: lexical consistency and documented exception.'
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios respecto del borrador previo y que el cotejo final mostró alto acuerdo (1.0), así que este borrador español sigue de cerca la lectura estable del texto fuente y de la auditoría inglesa.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' no porque aparezca en este versículo, sino por la norma general del proyecto; aquí no se requiere ninguna forma divina explícita.
  - Se conservaron las imágenes corporales 'boca' y 'lengua' para respetar el paralelismo poético del hebreo.
  - Se evitó 'siervo' o vocabulario eclesiástico no pertinente; el texto es acusatorio y sapiencial, no cultual.
  - Se prefirió un registro bíblico moderno y claro, evitando un calco mecánico del inglés pero sin añadir paráfrasis.
