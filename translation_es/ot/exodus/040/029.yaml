    issue: מִשְׁכַּן אֹהֶל מוֹעֵד se vertió como aposición ('el tabernáculo, la tienda de reunión')
    rationale: 'La revisión auditada del English POB cambió a ''the tabernacle of the tent of meeting'' para reflejar mejor la relación constructa y evitar una lectura appositiva. El español debería seguir ese ajuste: ''el tabernáculo de la tienda de reunión''.'
  - severity: medium
