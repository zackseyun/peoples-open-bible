id: 1TI.2.5
reference: 1 Timothy 2:5
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: εἷς γὰρ θεός, εἷς καὶ μεσίτης θεοῦ καὶ ἀνθρώπων ἄνθρωπος Χριστὸς Ἰησοῦς,
base_translation:
  language: en
  yaml_path: translation/nt/1_timothy/002/005.yaml
  text: For there is one God[a], and one mediator between God and men, the man Messiah Jesus[c][b],
  footnotes:
  - marker: a
    text: Or 'between God and human beings.' The Greek ἀνθρώπων is a generic term for humanity; 'men' is retained here to preserve the lexical link with 'the man' later in the verse.
    reason: lexical_alternative
  - marker: b
    text: Or 'Christ Jesus.' Greek Χριστός is rendered 'Messiah' here because it functions as a title.
    reason: alternative_reading
  - marker: c
    text: Or 'the man Messiah Jesus'.
    reason: previous_rendering
translation:
  language: ko
  text: 하나님은 한 분이시며, 하나님과 사람 사이의 중보자도 한 분이시니, 곧 사람이신 메시아[a] 예수십니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「그리스도」. 본 번역은 칭호의 무게를 살려 「메시아」로 옮긴다.
    reason: alternative_reading
lexical_decisions:
- source_word: εἷς γὰρ θεός
  english_pob_choice: For there is one God
  chosen_korean: 하나님은 한 분이시며
  alternatives_korean:
  - 하나님은 한 분뿐이시며
  - 한 분 하나님이 계시며
  lexicon: BDAG
  rationale: εἷς의 유일성을 「한 분」으로 명시한다. 신적 호칭에는 존칭형 「~이시며」 사용.
- source_word: μεσίτης
  english_pob_choice: mediator
  chosen_korean: 중보자
  alternatives_korean:
  - 중재자
  lexicon: BDAG
  rationale: 한국 신학 정립 어휘 「중보자」.
- source_word: θεοῦ καὶ ἀνθρώπων
  english_pob_choice: between God and men
  chosen_korean: 하나님과 사람 사이
  alternatives_korean:
  - 하나님과 인류 사이
  - 하나님과 사람들 사이
  lexicon: BDAG
  rationale: ἀνθρώπων은 일반 인류. 단수 「사람」으로 옮겨 절 후반 ἄνθρωπος(사람이신)와 어휘 연결을 명시적으로 유지한다.
- source_word: ἄνθρωπος Χριστὸς Ἰησοῦς
  english_pob_choice: the man Messiah Jesus
  chosen_korean: 사람이신 메시아 예수
  alternatives_korean:
  - 그 사람 메시아 예수
  - 인간 메시아 예수
  lexicon: BDAG
  rationale: ἄνθρωπος의 직역 「사람」을 보존해 5절의 핵심 강조(하나님과 사람 사이를 중보하는 「사람이신」 메시아)를 살린다. 「인간」은 추상적 어감이 강하다.
theological_decisions:
- issue: 2:5 핵심 기독론 본문 — 한 하나님, 한 중보자, 사람이신 메시아 예수
  chosen_reading: 「하나님은 한 분이시며, 하나님과 사람 사이의 중보자도 한 분이시니, 곧 사람이신 메시아 예수십니다.」
  alternative_readings:
  - 「한 하나님이 계시며, 한 중보자가 계시니, 곧 사람 그리스도 예수십니다.」
  - 「하나님도 한 분이시고 중보자도 한 분이시니, 곧 인간이신 메시아 예수십니다.」
  rationale: 본 절은 초대 교회의 핵심 신앙 고백 본문이다. εἷς의 두 차례 출현(한 하나님 / 한 중보자)을 한국어 「한 분」 반복으로 보존하여 유일성의 평행을 살린다. ἄνθρωπος를 「사람이신」으로 직역하여, 하나님과 사람 사이를 중재하시는 분이 「사람」이라는 강조(성육신의 핵심)를 손상시키지 않는다. Χριστός는 칭호로 「메시아」.
  doctrine_reference: 'DOCTRINE.md: preserve theological tension; Translate titles; original-language primacy'
