  spanish_quality_summary: El español es claro y legible, pero «Así he mostrado» suena algo calcado y menos natural como marcador discursivo conclusivo. «Tormentos más grandes» también resulta poco idiomático en este contexto; «mayores tormentos» mejora la dignidad y la naturalidad sin perder precisión.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Pasiones» para πάθη es correcto y preserva la decisión antropológica del POB. El contraste «los hombres ... una mujer» también está bien conservado.
  issues:
  - severity: medium
    issue: Marcador discursivo «Así he mostrado» poco natural para ἀπέδειξα οὖν
    rationale: Aunque comprensible, «Así he mostrado» suena forzado en español. El griego introduce una conclusión inferencial; «Así que he demostrado» o «Por tanto, he demostrado» transmite mejor el valor retórico y suena más idiomático.
  - severity: low
    issue: «los tormentos más grandes» es menos idiomático que «los mayores tormentos»
    rationale: μεγίστων expresa superlativo de magnitud/severidad. En español culto y natural, «los mayores tormentos» comunica mejor esa idea en un contexto de sufrimiento martirial.
  - severity: low
    issue: La nota al pie en «pasiones» no corresponde al lugar de la alternativa léxica documentada
    rationale: La nota inglesa sobre alternativas corresponde a ὑπερεφρόνησεν / la cláusula sobre los tormentos, no a πάθη. En español, si se conserva la nota, debe anclarse en «despreció» o en la frase pertinente.
  revised_spanish_text: Así que he demostrado que no solo los hombres dominaron las pasiones, sino que también una mujer despreció[a] los mayores tormentos.
  revised_footnotes:
