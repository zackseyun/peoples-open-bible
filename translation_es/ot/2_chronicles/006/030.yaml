translation:
  language: es
  text: entonces que oigas desde los cielos[a], el lugar de tu morada, y perdones, y des a cada hombre[b] conforme a todos sus caminos, cuyo corazón tú conoces, porque solo tú conoces el corazón de los hijos del hombre[c]—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «desde el cielo». El hebreo dice literalmente «desde los cielos».
    reason: lexical_alternative
  - marker: b
    text: O «a cada persona». El hebreo usa el singular representativo «hombre» con sentido distributivo.
    reason: lexical_alternative
  - marker: c
    text: O «los hijos de la humanidad». La expresión hebrea es literalmente «los hijos del hombre», un término representativo para los seres humanos.
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּשְׁמַע
  english_pob_choice: may you hear
  chosen_spanish: oye
  alternatives_spanish:
  - que oigas
  - puedas oír
  - escucha
  lexicon: HALOT
  rationale: En el contexto de la oración de Salomón, el verbo funciona con fuerza peticional. En español, «oye» mantiene esa apelación directa y natural sin introducir un paraphraseo excesivo.
- source_word: מִן הַשָּׁמַיִם
  english_pob_choice: from heaven
  chosen_spanish: desde los cielos
  alternatives_spanish:
  - desde el cielo
  - desde los cielos
  lexicon: HALOT
  rationale: El hebreo usa el plural «cielos». «Desde los cielos» conserva mejor la forma original que singularizarlo, aunque sigue siendo idiomático en español.
- source_word: מְכֹון שִׁבְתֶּךָ
  english_pob_choice: the place of your dwelling
  chosen_spanish: el lugar de tu morada
  alternatives_spanish:
  - tu morada
  - el lugar establecido de tu morada
  lexicon: HALOT
  rationale: מְכוֹן apunta a un lugar fijo o establecido. «El lugar de tu morada» conserva el valor locativo y el tono reverente del hebreo.
- source_word: וְסָלַחְתָּ
  english_pob_choice: and forgive
  chosen_spanish: y perdona
  alternatives_spanish:
  - y perdonarás
  - y perdonar
  lexicon: HALOT
  rationale: La secuencia continúa la súplica. «Perdona» transmite bien el sentido de petición en español, más natural que un futuro o una perífrasis.
- source_word: וְנָתַתָּה
  english_pob_choice: and give
  chosen_spanish: y da
  alternatives_spanish:
  - y concedas
  - y retribuyas
  - y des
  lexicon: HALOT
  rationale: Aunque el verbo básico es «dar», aquí tiene sentido judicial/distributivo. «Da» mantiene la forma del hebreo y deja que el complemento «a cada hombre conforme a todos sus caminos» precise la idea.
- source_word: לָאִישׁ
  english_pob_choice: to each man
  chosen_spanish: a cada hombre
  alternatives_spanish:
  - a cada persona
  - a cada uno
  lexicon: HALOT
  rationale: El singular masculino hebreo es distributivo y representativo. Se conserva «hombre» por fidelidad al vocabulario de la fuente y a la política de precisión de género del proyecto.
- source_word: כְּכָל דְּרָכָיו
  english_pob_choice: according to all his ways
  chosen_spanish: conforme a todos sus caminos
  alternatives_spanish:
  - según todos sus caminos
  - de acuerdo con todos sus caminos
  - conforme a toda su conducta
  lexicon: HALOT
  rationale: «Caminos» es un modismo hebreo para conducta o manera de vida. «Conforme a todos sus caminos» conserva la metáfora sin perder claridad.
- source_word: אֲשֶׁר תֵּדַע אֶת לְבָבוֹ
  english_pob_choice: whose heart you know
  chosen_spanish: cuyo corazón tú conoces
  alternatives_spanish:
  - cuya mente tú conoces
  - del cual conoces el corazón
  lexicon: HALOT
  rationale: La relativa modifica a «cada hombre». «Cuyo corazón tú conoces» refleja el hebreo de forma compacta y clara, manteniendo el énfasis en el conocimiento divino del interior humano.
- source_word: לְבָב
  english_pob_choice: heart
  chosen_spanish: corazón
  alternatives_spanish:
  - interior
  - mente
  - corazón
  lexicon: HALOT
  rationale: En hebreo, לֵבָב abarca pensamiento, voluntad e ինտención. «Corazón» es el equivalente bíblico más estable en español y conserva el peso teológico del término.
- source_word: כִּי אַתָּה לְבַדְּךָ יָדַעְתָּ
  english_pob_choice: for you alone know
  chosen_spanish: porque solo tú conoces
  alternatives_spanish:
  - porque tú solo conoces
  - pues solo tú has conocido
  lexicon: HALOT
  rationale: La cláusula da la razón de la petición anterior. «Solo tú conoces» expresa con naturalidad la exclusividad de לְבַדְּךָ y el valor perfectivo del verbo en contexto.
- source_word: בְּנֵי הָאָדָם
  english_pob_choice: the sons of man
  chosen_spanish: los hijos del hombre
  alternatives_spanish:
  - los hijos de la humanidad
  - la humanidad
  - los seres humanos
  lexicon: HALOT
  rationale: Se conserva la expresión representativa masculina del hebreo, tal como la POB en inglés la mantiene. «Los hijos del hombre» es más fiel a la forma de la fuente que neutralizarla sin apoyo contextual suficiente.
theological_decisions:
- issue: Expresión antropológica de בְּנֵי הָאָדָם
  english_pob_reading: the sons of man
  chosen_spanish_reading: los hijos del hombre
  alternative_spanish_readings:
  - la humanidad
  - los seres humanos
  - los hijos de la humanidad
  rationale: El hebreo usa una fórmula representativa masculina para hablar de los humanos en general. Mantener la estructura evita borrar la tensión lexical documentada; una nota aclara el alcance inclusivo.
  doctrine_reference: 'DOCTRINE.md §Translation philosophy 4; términos disputados: אָדָם → hombre / humanidad (según contexto)'
- issue: Modo peticional de los verbos en la oración
  english_pob_reading: may you hear ... and forgive, and give
  chosen_spanish_reading: oye ... y perdona, y da
  alternative_spanish_readings:
  - que oigas ... y perdones, y des
  - puedas oír ... y perdonar, y dar
  rationale: Aunque la forma hebrea es imperfecta, en la plegaria opera como ruego. En español, el imperativo súplica preserva mejor la función oracional y la cadencia de la petición.
  doctrine_reference: DOCTRINE.md §Oración y modos verbales; equivalencia funcional en textos litúrgicos
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto hebreo y coincide con la revisión reciente de alta concordancia: no se identifican cambios necesarios respecto del audit trail inglés, salvo ajustes naturales al español para la función peticional y la conservación de la metáfora de «caminos» y de la expresión representativa «los hijos del hombre».'
  spanish_consistency_notes:
  - Se mantiene «cielos» en plural para reflejar el hebreo, aunque en español «cielo» sería idiomático; la nota cubre la alternativa.
  - Se conserva «hombre»/«hijos del hombre» por fidelidad al masculino representativo del hebreo y al criterio de precisión lexical del proyecto.
  - «Corazón» traduce לֵבָב consistentemente como sede del interior humano, sin sustituirlo por «mente» o «interior» salvo en nota.
  - La puntuación y el orden siguen la sintaxis de la súplica sin añadir elementos ajenos al source packet.
