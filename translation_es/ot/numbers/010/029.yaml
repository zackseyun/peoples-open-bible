  to: 'Y dijo Moisés a Hobab hijo de Reuel el madianita[a], suegro de Moisés: «Nos estamos poniendo en camino hacia el lugar del que Yahvé dijo: “Se lo daré a ustedes”. Ven con nosotros, y te haremos bien, porque Yahvé ha hablado bien acerca de Israel».'
