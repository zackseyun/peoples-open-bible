- from: No seas como un aventador[a] para todo viento, ni camines por el camino de la tormenta.
  to: No seas un aventador a todo viento[a], ni camines por la senda de la tormenta[b].
  rationale: Se corrige el anclaje de notas para que la incertidumbre de שִׁבֹּלֶת recaiga sobre «tormenta», se añade la variante griega exigida por el audit trail inglés, y se mejora la fidelidad formal eliminando «como» y ajustando «para todo viento» a «a todo viento».
