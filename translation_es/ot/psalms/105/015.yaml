translation:
  language: es
  text: No toquen a mis ungidos[a], ni hagan daño a mis profetas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: ''mis ungidos''. El término está relacionado con ''Mesías'', pero aquí está en plural y se refiere a personas apartadas por Dios, no específicamente al Mesías singular.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּגְּעוּ
  english_pob_choice: touch
  chosen_spanish: toquen
  alternatives_spanish:
  - toquen
  - hagan contacto con
  - toquen físicamente
  lexicon: HALOT
  rationale: נגע puede significar 'tocar', 'alcanzar' o 'herir'. En este mandato negativo, 'toquen' conserva el sentido directo y la fuerza idiomática del verbo sin añadir explícitamente la idea de violencia, que en el verso queda implicada por el paralelismo con la segunda cláusula.
- source_word: בִּמְשִׁיחָי
  english_pob_choice: my anointed ones
  chosen_spanish: mis ungidos
  alternatives_spanish:
  - mis ungidos
  - mis ungidos de Dios
  - mis mesías
  lexicon: HALOT
  rationale: מָשִׁיחַ designa a un 'ungido'. En español, 'ungidos' comunica el sentido léxico y evita importar la carga cristológica exclusiva de 'Mesías' o 'Cristo', ya que aquí el plural con sufijo posesivo se refiere a personas apartadas por Dios.
- source_word: לִנְבִיאַי
  english_pob_choice: my prophets
  chosen_spanish: mis profetas
  alternatives_spanish:
  - mis profetas
  lexicon: HALOT
  rationale: נָבִיא significa 'profeta'. La forma plural con sufijo de primera persona se vierte naturalmente como 'mis profetas'.
- source_word: תָּרֵעוּ
  english_pob_choice: do harm
  chosen_spanish: hagan daño
  alternatives_spanish:
  - hagan daño
  - actúen mal contra
  - perjudiquen
  lexicon: HALOT
  rationale: רעע en esta prohibición expresa hacer mal o causar daño. 'Hagan daño' es una solución natural en español y preserva el paralelismo con la primera prohibición.
- source_word: אַל
  english_pob_choice: Do not
  chosen_spanish: 'No'
  alternatives_spanish:
  - 'No'
  - No deben
  - No vayan a
  lexicon: HALOT
  rationale: אַל con la forma verbal expresa prohibición. En español, 'No' es la forma más breve y natural para este paralelismo poético.
theological_decisions:
- issue: Cómo rendir מְשִׁיחַ en un contexto plural no mesiánico singular
  english_pob_reading: anointed ones
  chosen_spanish_reading: ungidos
  alternative_spanish_readings:
  - mesías
  - ungidos de Dios
  rationale: Siguiendo la lógica del POB inglés, el término se traduce por su sentido léxico, no por la forma litúrgica fijada de 'Mesías'. El plural hebreo y el contexto histórico indican personas consagradas por Dios, no el título singular escatológico.
  doctrine_reference: 'DOCTRINE.md: traducir títulos por su sentido; reservar transliteraciones o formas tradicionales cuando el contexto lo exija.'
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto hebreo y coincide con el audit trail inglés: conserva el paralelismo prohibitivo, mantiene el valor plural de מְשִׁיחַ y no introduce una lectura cristológica donde el hebreo no la exige.'
  spanish_consistency_notes:
  - Se evita 'Cristo' porque aquí el hebreo usa un plural posesivo de 'ungido' y el POB inglés documenta explícitamente que no se trata del Mesías singular.
  - '''No toquen'' conserva el imperativo prohibitivo breve y natural en español bíblico contemporáneo.'
  - '''Hagan daño'' mantiene la segunda cláusula en un registro claro y equivalente, sin intensificar indebidamente el verbo hebreo.'
