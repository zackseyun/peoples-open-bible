translation:
  language: es
  text: Y haré de todos mis montes un camino[a], y mis calzadas[b] serán levantadas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para un camino» o «como camino». El hebreo puede subrayar tanto el resultado («hacer de... un camino») como el propósito («destinar para un camino»).
    reason: lexical_alternative
  - marker: b
    text: O «mis caminos serán levantados». El término hebreo puede referirse a una vía construida o a una calzada elevada.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשַׂמְתִּי
  english_pob_choice: And I will make
  chosen_spanish: Y haré
  alternatives_spanish:
  - Y pondré
  - Y estableceré
  lexicon: HALOT
  rationale: 'שׂים puede significar ''poner'', ''establecer'' o ''hacer''. En este contexto, con לַדָּרֶךְ, la idea principal es de transformación: los montes llegan a ser un camino transitable. ''Haré'' comunica bien ese cambio sin perder naturalidad en español.'
- source_word: כָל
  english_pob_choice: all
  chosen_spanish: todos
  alternatives_spanish:
  - cada uno de
  - entero(s)
  lexicon: HALOT
  rationale: El valor colectivo/distributivo de כָל se expresa de forma natural con 'todos' en español, manteniendo el paralelismo poético.
- source_word: הָרַי
  english_pob_choice: my mountains
  chosen_spanish: mis montes
  alternatives_spanish:
  - mis montañas
  - mis alturas
  lexicon: HALOT
  rationale: הַר puede referirse a 'monte' o 'montaña'. 'Montes' conserva el referente concreto y funciona bien en un registro bíblico actual. 'Montañas' sería también posible, pero 'montes' suena más cercano al lenguaje profético español.
- source_word: לַדָּרֶךְ
  english_pob_choice: into a road
  chosen_spanish: un camino
  alternatives_spanish:
  - para un camino
  - como camino
  lexicon: HALOT
  rationale: La preposición ל con este verbo puede marcar resultado o finalidad. En español, 'hacer de... un camino' conserva la ambigüedad de resultado/purpose mejor que una única paráfrasis causal, y 'camino' es un equivalente natural de דֶּרֶךְ.
- source_word: וּמְסִלֹּתַי
  english_pob_choice: and my highways
  chosen_spanish: mis calzadas
  alternatives_spanish:
  - mis caminos altos
  - mis carreteras
  lexicon: HALOT
  rationale: מְסִלָּה sugiere una vía construida, a menudo elevada o allanada. 'Calzadas' recoge bien esa idea en español culto sin perder el matiz de obra preparada, aunque 'caminos altos' podría explicitar la elevación.
- source_word: יְרֻמוּן
  english_pob_choice: will be raised up
  chosen_spanish: serán levantadas
  alternatives_spanish:
  - serán alzadas
  - se elevarán
  lexicon: HALOT
  rationale: El verbo expresa elevación/levantamiento del camino. 'Serán levantadas' mantiene la imagen física de una vía elevada o acondicionada, en línea con la auditable decisión inglesa de no espiritualizar el término.
theological_decisions:
- issue: Imágenes topográficas de restauración
  english_pob_reading: Retain the concrete image of God transforming terrain for the return of his people rather than making the line explicitly metaphorical in translation.
  chosen_spanish_reading: Conservar la imagen concreta de que Yahvé transforma el terreno en beneficio de su pueblo, sin resolver si la referencia es sólo literal o también figurada.
  alternative_spanish_readings:
  - Dios elimina obstáculos espirituales
  - Dios prepara un camino literal para el retorno del exilio
  rationale: El hebreo usa imagen física de caminos y montes para comunicar restauración. La traducción española debe preservar esa tensión, sin convertirla en una explicación alegórica ni reducirla a una sola lectura histórica.
  doctrine_reference: 'Translation philosophy §3: Preservar la tensión teológica en lugar de resolverla.'
translation_notes:
  revision_awareness: 'Coincide con la última pasada de revisión: no se requieren cambios respecto del registro auditado en inglés. Se preserva la imagen física del texto hebreo y la ambigüedad resultado/propósito de לַדָּרֶךְ.'
  spanish_consistency_notes:
  - Se mantiene Yahvé para el nombre divino, conforme a los criterios del proyecto.
  - Se traduce דֶּרֶךְ con 'camino' y מְסִלָּה con 'calzadas' para distinguir la vía general de la vía construida/elevada.
  - '''Serán levantadas'' conserva la pasiva del hebreo sin introducir una glosa interpretativa.'
  - Las notas a y b reflejan alternativas léxicas reales del hebreo y no añaden información doctrinal ajena al versículo.
