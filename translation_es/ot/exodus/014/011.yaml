revisions:
- from: 'Y dijeron a Moisés[a]: «¿Fue porque no había sepulcros en Egipto que nos tomaste para morir en el desierto? ¿Qué es esto que nos has hecho al sacarnos de Egipto?»'
  to: 'Y dijeron a Moisés[a]: «¿Fue porque no había sepulcros en Egipto que nos llevaste para morir en el desierto? ¿Qué es esto que nos has hecho al sacarnos de Egipto?»'
  rationale: 'Se hace una reparación menor de estilo y fidelidad funcional: «nos llevaste» comunica mejor en español el traslado implícito en לְקַחְתָּנוּ, evita una frase rígida («nos tomaste») y mantiene la distinción con לְהוֹצִיאָנוּ, que sigue traduciéndose como «sacarnos». No se requieren cambios doctrinales ni estructurales adicionales.'
