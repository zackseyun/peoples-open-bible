review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura básica del hebreo: partícula de atención, constitución de ''él'' como testigo, y doble función de liderazgo respecto de los pueblos. Sin embargo, omite una nota importante del rastro inglés sobre el referente ambiguo de ''lo'', y ''¡Mira!'' suena demasiado coloquial para el tono profético de הֵן.'
  spanish_quality_summary: El texto es comprensible y bastante natural, pero '¡Mira!' resulta menos digno que el estilo objetivo del proyecto. 'Jefe' también suena algo coloquial/administrativo; 'líder' o 'caudillo' serían opciones, pero 'líder' es la más clara y broadly church-readable. La sintaxis general funciona bien.
  glossary_alignment: No hay conflictos con la terminología principal del proyecto. 'Testigo' para עֵד y 'pueblos' para לְאֻמִּים están bien. La revisión propuesta mantiene la ambigüedad del pronombre y añade la nota interpretativa ya documentada en inglés.
  issues:
  - severity: medium
    issue: Registro de הֵן como '¡Mira!'
    rationale: Aunque semánticamente posible, '¡Mira!' en español neutro contemporáneo suena más coloquial e imperativo al lector que el valor discursivo profético de הֵן. 'He aquí' preserva mejor el énfasis solemne y es suficientemente inteligible en contexto bíblico.
  - severity: medium
    issue: Falta la nota sobre el referente ambiguo de 'lo'
    rationale: El expediente inglés conserva expresamente la ambigüedad davídica/mesiánica del sufijo/pronombre. El español también debe preservarla en nota, ya que la forma 'Lo he puesto' puede llevar al lector a preguntarse por el referente.
  - severity: low
    issue: '''jefe'' para נָגִיד suena algo coloquial'
    rationale: '''Jefe'' comunica autoridad, pero en español eclesial amplio puede sonar menos digno o más cotidiano que el registro del pasaje. ''Líder'' mantiene la amplitud semántica de נָגִיד y armoniza mejor con ''comandante''.'
  revised_spanish_text: He aquí[a], lo he puesto por testigo a los pueblos[b][c], líder y comandante para los pueblos.
