    text: O «ley» o «instrucción» para «Torá».
    reason: lexical_alternative
  revision_rationale: La revisión corrige el verbo inicial para reflejar mejor la peregrinación hacia Sion («Vendrán») y ajusta la cita a una construcción final natural en español («para que nos enseñe ... y caminemos»), que preserva mejor el valor de propósito/resultado del hebreo y la auditoría inglesa. Se mantienen la terminología del proyecto («Yahvé», «Torá») y las decisiones léxicas acertadas del borrador.
