translation:
  language: es
  text: Simei, hijo de Gera, el benjamita de Bajurim, se apresuró y descendió con los hombres de Judá[a] para salir al encuentro del rey David.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo dice literalmente «con el hombre de Judá»; aquí se entiende colectivamente como «con los hombres de Judá».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְמַהֵר
  english_pob_choice: hurried
  chosen_spanish: se apresuró
  alternatives_spanish:
  - se dio prisa
  - apresuró el paso
  lexicon: HALOT
  rationale: El verbo expresa prisa o urgencia. En español, 'se apresuró' conserva el movimiento rápido con un registro natural y digno, equivalente al 'hurried' auditado en inglés.
- source_word: שִׁמְעִי בֶן־גֵּרָא
  english_pob_choice: Shimei son of Gera
  chosen_spanish: Simei hijo de Gera
  alternatives_spanish:
  - Simei, hijo de Gera
  lexicon: Transliteración estándar del nombre propio
  rationale: Se conserva el nombre propio con transliteración y la relación patronímica con 'hijo de', siguiendo la estructura hebrea y el criterio POB de no sustituir nombres por formas eclesiásticas tradicionales.
- source_word: בֶּן הַיְמִינִי
  english_pob_choice: the Benjaminite
  chosen_spanish: el benjamita
  alternatives_spanish:
  - el benjaminita
  - de la tribu de Benjamín
  lexicon: HALOT
  rationale: Aquí el término funciona como gentilicio tribal, no como segundo patronímico. 'Benjamita' es breve, natural y conserva la referencia a Benjamín sin forzar una perífrasis más larga.
- source_word: אֲשֶׁר מִבַּחוּרִים
  english_pob_choice: from Bahurim
  chosen_spanish: de Baju­rím
  alternatives_spanish:
  - procedente de Baju­rím
  - que era de Baju­rím
  lexicon: HALOT
  rationale: La cláusula relativa identifica el lugar de origen. En español se resuelve de forma appositiva con 'de Bahurim/Bajurím', evitando añadir una relativa explicativa innecesaria.
- source_word: וַיֵּרֶד
  english_pob_choice: went down
  chosen_spanish: descendió
  alternatives_spanish:
  - bajó
  - se encaminó cuesta abajo
  lexicon: HALOT
  rationale: El verbo hebreo conserva un sentido espacial concreto. 'Descendió' mantiene ese valor topográfico mejor que una simple equivalencia genérica como 'fue' o 'se dirigió'.
- source_word: עִם אִישׁ יְהוּדָה
  english_pob_choice: with the men of Judah
  chosen_spanish: con los hombres de Judá
  alternatives_spanish:
  - con el hombre de Judá
  - con la gente de Judá
  lexicon: HALOT
  rationale: Aunque el hebreo tiene singular formal, el contexto colectivo exige un plural idiomático en español. Se conserva el sentido documentado por el audit trail inglés, que entiende la expresión colectivamente.
- source_word: לִקְרַאת
  english_pob_choice: to meet
  chosen_spanish: para salir al encuentro
  alternatives_spanish:
  - para encontrarse con
  - para ir al encuentro de
  lexicon: HALOT
  rationale: La idea es de desplazamiento orientado a un encuentro. 'Para salir al encuentro' expresa con precisión esa direccionalidad y suena natural en español bíblico moderno.
- source_word: הַמֶּלֶךְ דָּוִד
  english_pob_choice: King David
  chosen_spanish: el rey David
  alternatives_spanish:
  - el rey, David
  - David el rey
  lexicon: Uso nominal/titular
  rationale: Se conserva el título real unido al nombre propio en el orden natural del español, equivalente al inglés auditado y fiel al hebreo.
translation_notes:
  revision_awareness: El texto sigue de cerca el acuerdo alto del dossier inglés y no introduce cambios de sentido; la principal adaptación es la naturalización española de la dirección verbal y de la expresión colectiva hebrea.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para el nombre divino en este proyecto cuando aparezca; aquí no aparece.
  - Se prefirió 'benjamita' como gentilicio tribal coherente con el valor contextual del hebreo.
  - '''Con los hombres de Judá'' mantiene la lectura colectiva documentada en el audit trail inglés.'
  - No se añadió puntuación interpretativa adicional fuera de la necesaria para la fluidez del español.
