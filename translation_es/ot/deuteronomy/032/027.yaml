translation:
  language: es
  text: 'Si no fuera porque temí la provocación del enemigo[a], no sea que sus adversarios entiendan mal[b], no sea que digan: «Nuestra mano es exaltada[c], y Yahvé no ha hecho todo esto».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Si no fuera porque temí la provocación del enemigo»; también puede expresarse: «si no fuera porque temí la insolencia del enemigo».'
    reason: lexical_alternative
  - marker: b
    text: El verbo hebreo que aquí se traduce «entiendan mal» es difícil; también puede significar «malinterpreten», «juzguen mal» o «no disciernan» la verdadera causa de la ruina de Israel.
    reason: lexical_alternative
  - marker: c
    text: 'Lit.: «Nuestra mano es alta».'
    reason: lexical_alternative
lexical_decisions:
- source_word: לוּלֵי
  english_pob_choice: Were it not that
  chosen_spanish: Si no fuera por
  alternatives_spanish:
  - Si no fuera que
  - De no ser por
  lexicon: HALOT
  rationale: La construcción española expresa bien la fuerza exceptiva/condicional del hebreo y suena natural en registro bíblico actual, conservando la dependencia lógica del resto del verso.
- source_word: כַּעַס
  english_pob_choice: the provocation
  chosen_spanish: la provocación
  alternatives_spanish:
  - la irritación
  - la ira
  lexicon: HALOT
  rationale: En este contexto el sustantivo se relaciona con algo que podría provocar o servir de motivo de burla del enemigo. «Provocación» preserva ese matiz mejor que «ira», que podría desplazar el foco al estado emocional.
- source_word: אוֹיֵב
  english_pob_choice: the enemy
  chosen_spanish: el enemigo
  alternatives_spanish:
  - un enemigo
  - el adversario
  lexicon: HALOT
  rationale: El singular colectivo funciona de modo natural en español y refleja el hebreo genérico sin necesidad de especificarlo como plural.
- source_word: אָגוּר
  english_pob_choice: I feared
  chosen_spanish: tuve temor
  alternatives_spanish:
  - temí
  - me preocupé
  lexicon: HALOT
  rationale: «Tuve temor» mantiene la primera persona y la fuerza del verbo sin sonar torpe en español. Conserva el antropopatismo del texto y el motivo de contención divina.
- source_word: פֶּן
  english_pob_choice: lest
  chosen_spanish: para que no
  alternatives_spanish:
  - no sea que
  - lest
  lexicon: HALOT
  rationale: En español contemporáneo «para que no» comunica con claridad la cláusula preventiva repetida del hebreo, sin perder la relación de prevención del resultado temido.
- source_word: יְנַכְּרוּ
  english_pob_choice: should misunderstand
  chosen_spanish: entiendan mal
  alternatives_spanish:
  - interpreten mal
  - no disciernan bien
  - malinterpreten
  lexicon: HALOT
  rationale: El verbo es difícil; la POB inglesa opta por una idea de mala comprensión. En español, «entiendan mal» es fiel, breve y conserva la ambigüedad interpretativa sin decidir más de lo que el contexto permite.
- source_word: צָרֵימוֹ
  english_pob_choice: their adversaries
  chosen_spanish: sus adversarios
  alternatives_spanish:
  - sus enemigos
  - los adversarios de ellos
  lexicon: HALOT
  rationale: «Adversarios» refleja la hostilidad del término y evita repetir «enemigo» de modo monótono; además corresponde al plural contextual del verbo siguiente.
- source_word: יָדֵינוּ רָמָה
  english_pob_choice: Our hand is exalted
  chosen_spanish: Nuestra mano se ha exaltado
  alternatives_spanish:
  - Nuestra mano es alta
  - Nuestra mano ha prevalecido
  lexicon: HALOT
  rationale: La imagen literal de la mano «alta/exaltada» se conserva con un giro español comprensible. Se mantiene la metáfora de triunfo y autoexaltación que el inglés también preserva.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto para el Tetragrámaton: transliteración del nombre divino en vez de sustitución por un título. «Yahvé» es la forma establecida en el texto español principal.'
- source_word: פָּעַל כָּל זֹאת
  english_pob_choice: has not done all this
  chosen_spanish: no ha hecho todo esto
  alternatives_spanish:
  - no ha realizado todo esto
  - no ha obrado todo esto
  lexicon: HALOT
  rationale: «Hacer» reproduce con fidelidad el verbo de acción y resulta idiomático en español. Conserva la negación del falso reclamo del enemigo sobre el origen de la calamidad.
theological_decisions:
- issue: Antropopatismo en «tuve temor / feared»
  english_pob_reading: Retain 'I feared' literally
  chosen_spanish_reading: Mantener «tuve temor» de manera literal y transparente
  alternative_spanish_readings:
  - me preocupé
  - me contuve por consideración a
  rationale: El hebreo atribuye al hablante una reacción expresada con el verbo de temer. En español conviene conservarla para no suavizar indebidamente la afirmación; el contexto impide leerla como debilidad divina.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 3, 6
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el Señor
  rationale: La traducción sigue la política del proyecto para el Tetragrámaton, preservando el nombre propio divino en lugar de sustituirlo por un título. Esto mantiene la transparencia con el texto fuente.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión más reciente del inglés POB que ajustó la apertura a «Were it not that» por una fórmula más natural y precisa; por eso el español usa «Si no fuera por». También se respetó la decisión de mantener el verbo de temor de forma transparente y la nota sobre la dificultad del verbo יְנַכְּרוּ.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme al estándar del proyecto para יְהוָה.
  - Se conserva la metáfora de la mano exaltada sin sustituirla por una interpretación explicativa.
  - Se evita usar «SEÑOR» como máscara del nombre divino.
  - El tono es bíblico contemporáneo, sin arcaísmos innecesarios.
