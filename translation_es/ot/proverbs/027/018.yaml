revisions:
- from: El que cuida una higuera comerá su fruto[b][a], y el que vela sobre su señor será honrado.
  to: El que cuida una higuera comerá su fruto[a], y el que cuida a su amo[b] será honrado.
  rationale: Se reemplaza «vela sobre su señor» por «cuida a su amo» para reflejar mejor el referente humano de אֲדֹנָיו y evitar una resonancia divina no requerida. «Cuida» mantiene además el paralelismo semántico con el primer hemistiquio. Se corrige la nota b para eliminar el residuo no español y para ofrecer una alternativa real y útil conforme al expediente inglés.
