    text: 'O: «si algo ha sido juzgado como para ser presentado al rey». El griego está comprimido, y la traducción se ha alisado para expresar el sentido probable.'
    reason: lexical_alternative
  revision_rationale: 'Se mantiene el sentido y la estructura del original y de la auditoría inglesa, pero se reemplazan dos giros rígidos por español más natural: «investigar estos asuntos» refleja mejor περὶ τούτων en contexto, y «para que podamos actuar como corresponde» comunica con claridad el valor práctico de ἵνʼ ἔχωμεν ὡς καθήκει ἡμῖν. La nota [a] se conserva sin cambios porque sigue documentando adecuadamente la compresión del griego.'
