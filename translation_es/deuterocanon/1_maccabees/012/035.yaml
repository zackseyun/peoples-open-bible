translation:
  language: es
  text: Y Jonatán volvió y reunió a los ancianos del pueblo, y tomó consejo con ellos para edificar fortalezas en Judea,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐπέστρεψεν
  english_pob_choice: returned
  chosen_spanish: volvió
  alternatives_spanish:
  - regresó
  - volvió atrás
  lexicon: LSJ
  rationale: El aoristo de ἐπιστρέφω aquí indica un regreso físico a un lugar previo. «Volvió» es natural en español y conserva el movimiento de retorno sin introducir matices de arrepentimiento.
- source_word: ἐξεκκλησίασεν
  english_pob_choice: assembled
  chosen_spanish: reunió
  alternatives_spanish:
  - convocó
  - juntó
  lexicon: LSJ
  rationale: El verbo expresa la acción de convocar o reunir a un grupo. «Reunió» comunica bien la idea de congregar a los ancianos en un acto formal sin sonar técnico en exceso.
- source_word: πρεσβυτέρους τοῦ λαοῦ
  english_pob_choice: elders of the people
  chosen_spanish: los ancianos del pueblo
  alternatives_spanish:
  - los ancianos del pueblo
  - los líderes del pueblo
  - los mayores del pueblo
  lexicon: LSJ
  rationale: En este contexto político-comunitario, πρεσβύτεροι designa a líderes reconocidos, no solo a personas de más edad. «Ancianos» preserva el sentido institucional tradicional en español.
- source_word: ἐβουλεύσατο μετ’ αὐτῶν
  english_pob_choice: he took counsel with them
  chosen_spanish: tomó consejo con ellos
  alternatives_spanish:
  - consultó con ellos
  - deliberó con ellos
  lexicon: LSJ
  rationale: La forma media sugiere deliberación conjunta. «Tomó consejo con ellos» reproduce la tonalidad formal del consejo sin reducirla a una simple consulta.
- source_word: οἰκοδομῆσαι
  english_pob_choice: to build
  chosen_spanish: edificar
  alternatives_spanish:
  - construir
  - levantar
  lexicon: LSJ
  rationale: Aunque «construir» es posible, «edificar» conserva un registro digno y bíblico en español, adecuado para obras defensivas y para la prosa deuterocanónica.
- source_word: ὀχυρώματα
  english_pob_choice: fortresses
  chosen_spanish: fortalezas
  alternatives_spanish:
  - fortificaciones
  - plazas fuertes
  - bastiones
  lexicon: LSJ
  rationale: El término denota estructuras defensivas fortificadas. «Fortalezas» comunica de manera clara y natural la realidad material de las obras proyectadas.
- source_word: ἐν τῇ Ἰουδαίᾳ
  english_pob_choice: in Judea
  chosen_spanish: en Judea
  alternatives_spanish:
  - en Judea
  - en la Judea
  lexicon: LSJ
  rationale: La forma geográfica estándar en español es «Judea». Mantiene la referencia regional del texto sin alteraciones.
translation_notes:
  revision_awareness: El texto griego y la auditoría inglesa presentan acuerdo alto y no registran revisiones aplicadas; por eso la traducción española sigue de cerca la estructura del original sin introducir variantes textuales ni notas críticas.
  spanish_consistency_notes:
  - Se mantiene el nombre propio «Jonatán» en la forma habitual del español bíblico.
  - Se conserva un orden sintáctico sobrio y fiel al original griego, con leves ajustes para fluidez natural en español.
  - «Ancianos» se usa en sentido de liderazgo comunitario, no como simple referencia etaria.
