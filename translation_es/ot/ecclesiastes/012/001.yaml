translation:
  language: es
  text: 'Y recuerda a tu Creador[a] en los días de tu juventud, antes de que vengan los días malos y lleguen los años de los cuales dirás: “No tengo placer en ellos”.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo tiene una forma plural, literalmente “tus creadores”; aquí se entiende como un título singular para Dios: “tu Creador”.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּזְכֹר
  english_pob_choice: And remember
  chosen_spanish: Y recuerda
  alternatives_spanish:
  - Recuerda
  - Así que recuerda
  lexicon: HALOT
  rationale: El imperativo qal 2ms de זכר pide una exhortación directa. En español, “Y” conserva el enlace discursivo del hebreo sin volver la frase pesada, y “recuerda” mantiene el valor exhortativo natural.
- source_word: אֶת בּוֹרְאֶיךָ
  english_pob_choice: your Creator
  chosen_spanish: tu Creador
  alternatives_spanish:
  - tus creadores
  lexicon: HALOT
  rationale: Aunque la forma hebrea es morfológicamente plural, el contexto sapiencial monoteísta apunta a Dios como referente singular. “Tu Creador” comunica ese sentido en español; la alternativa plural se documenta por la tensión léxica real.
- source_word: בִּימֵי בְּחוּרֹתֶיךָ
  english_pob_choice: in the days of your youth
  chosen_spanish: en los días de tu juventud
  alternatives_spanish:
  - durante tu juventud
  - en los días de tu mocedad
  lexicon: HALOT
  rationale: La construcción expresa el tiempo de vigor juvenil. “En los días de tu juventud” es idiomática, cercana al hebreo y claramente inteligible en español.
- source_word: עַד אֲשֶׁר לֹא יָבֹאוּ
  english_pob_choice: before ... come
  chosen_spanish: antes de que vengan
  alternatives_spanish:
  - hasta que no vengan
  lexicon: HALOT
  rationale: El giro hebreo marca un límite anterior a un evento indeseable. “Antes de que vengan” expresa bien esa advertencia sin el forzamiento de una traducción literal de la partícula.
- source_word: יְמֵי הָרָעָה
  english_pob_choice: the evil days
  chosen_spanish: los días del mal
  alternatives_spanish:
  - los días malos
  - los días de calamidad
  - los días de adversidad
  lexicon: HALOT
  rationale: רָעָה puede abarcar mal, adversidad o aflicción. “Los días del mal” preserva la dureza del hebreo y deja abierta la carga semántica de desgracia/aflicción que el contexto desarrolla.
- source_word: וְהִגִּיעוּ שָׁנִים
  english_pob_choice: and the years arrive
  chosen_spanish: y lleguen los años
  alternatives_spanish:
  - y arriben los años
  - y vengan los años
  lexicon: HALOT
  rationale: El verbo en hifil comunica alcanzar o llegar. En español, “lleguen los años” es natural y mantiene la imagen de los años que sobrevienen.
- source_word: אֲשֶׁר תֹּאמַר
  english_pob_choice: of which you will say
  chosen_spanish: de los cuales dirás
  alternatives_spanish:
  - cuando dirás acerca de ellos
  - sobre los cuales dirás
  lexicon: HALOT
  rationale: La cláusula relativa modifica a “años”. “De los cuales dirás” suena natural en español y conserva la referencia prospectiva sin añadir paráfrasis innecesaria.
- source_word: אֵין לִי בָהֶם חֵפֶץ
  english_pob_choice: I have no pleasure in them
  chosen_spanish: No tengo en ellos ningún placer
  alternatives_spanish:
  - No me agradan en absoluto
  - No hallo en ellos deleite
  - No tengo en ellos deleite
  lexicon: HALOT
  rationale: חֵפֶץ denota placer, deleite o satisfacción. “No tengo en ellos ningún placer” reproduce de cerca el sentido y la evaluación personal del hablante, con un español claro y publicable.
theological_decisions:
- issue: Número de בּוֹרְאֶיךָ ('tu Creador/creadores')
  english_pob_reading: 'Singular: ''your Creator'''
  chosen_spanish_reading: 'Singular: ''tu Creador'''
  alternative_spanish_readings:
  - 'Plural morfológico: ''tus creadores'''
  rationale: Aunque el hebreo presenta una forma plural, el contexto de sabiduría y la teología monoteísta señalan a Dios como referente singular. Mantener el singular en español evita sugerir una pluralidad de creadores que el pasaje no enseña, sin ocultar la tensión morfológica documentada.
  doctrine_reference: Afirmaciones monoteístas; filosofía de traducción del POB
- issue: Valor de יְמֵי הָרָעָה
  english_pob_reading: the evil days
  chosen_spanish_reading: los días del mal
  alternative_spanish_readings:
  - los días malos
  - los días de aflicción
  - los días de adversidad
  rationale: La expresión puede referirse tanto a maldad como a desgracia/aflicción en el marco de la vejez. “Los días del mal” conserva la aspereza del hebreo y no reduce prematuramente el alcance semántico a una sola explicación interpretativa.
  doctrine_reference: Lectura contextual de sabiduría; consistencia léxica
translation_notes:
  revision_awareness: La versión inglesa auditada no muestra revisiones aplicadas y el control cruzado informa alta concordancia; por ello, la propuesta española sigue de cerca esa lectura estable sin introducir cambios interpretativos adicionales.
  spanish_consistency_notes:
  - Se mantuvo “Creador” en singular por coherencia con el enfoque monoteísta documentado.
  - Se prefirió “días del mal” para conservar la fuerza del hebreo y la equivalencia con la decisión inglesa “evil days”.
  - Se usó “No tengo en ellos ningún placer” para reflejar el valor afectivo de חֵפֶץ con un español claro y formal.
  - No se empleó “SEÑOR” para el nombre divino, ya que aquí el término fuente es el participio nominal “tu Creador”, no un sustituto de יהוה.
