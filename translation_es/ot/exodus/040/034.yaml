translation:
  language: es
  text: Entonces la nube cubrió la tienda de reunión, y la gloria de Yahvé[a] llenó el tabernáculo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: יְהוָה, el nombre divino revelado a Israel.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְכַס
  english_pob_choice: covered
  chosen_spanish: cubrió
  alternatives_spanish:
  - cubrió por completo
  - envolvió
  lexicon: HALOT
  rationale: כסה expresa la acción concreta de cubrir. «Cubrió» conserva el avance narrativo del waw consecutivo y suena natural en español, manteniendo la imagen de la nube sobre el santuario.
- source_word: הֶעָנָן
  english_pob_choice: the cloud
  chosen_spanish: la nube
  alternatives_spanish:
  - la nube
  - la nube divina
  lexicon: HALOT
  rationale: El sustantivo está con artículo definido y alude a la nube conocida del relato del éxodo. En español, «la nube» conserva esa referencia sin añadir explicación innecesaria.
- source_word: אֹהֶל מוֹעֵד
  english_pob_choice: the tent of meeting
  chosen_spanish: la tienda de reunión
  alternatives_spanish:
  - la tienda del encuentro
  - la tienda de reunión
  lexicon: HALOT
  rationale: El hebreo nombra la tienda cultual destinada al encuentro. «Tienda de reunión» refleja con fidelidad la función del término técnico y evita una paráfrasis más interpretativa.
- source_word: כְבוֹד יְהוָה
  english_pob_choice: the glory of Yahweh
  chosen_spanish: la gloria de Yahvé
  alternatives_spanish:
  - la gloria de Yahvé
  - la gloria de Yahveh
  lexicon: HALOT
  rationale: כָּבוֹד denota la gloria manifiesta, presencia resplandeciente de Dios. «Gloria de Yahvé» sigue el valor del nombre divino en el texto fuente y conserva el paralelismo con el inglés POB.
- source_word: מָלֵא
  english_pob_choice: filled
  chosen_spanish: llenó
  alternatives_spanish:
  - llenó
  - colmó
  lexicon: HALOT
  rationale: En este contexto, מלא indica que la gloria ocupó plenamente el tabernáculo. «Llenó» es la equivalencia española más directa y clara.
- source_word: הַמִּשְׁכָּן
  english_pob_choice: the tabernacle
  chosen_spanish: el tabernáculo
  alternatives_spanish:
  - el tabernáculo
  - el santuario portátil
  lexicon: HALOT
  rationale: מִשְׁכָּן es el término técnico para la estructura sagrada. «Tabernáculo» es el equivalente tradicional y preciso en español.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - Yahveh
  - el SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton. Siguiendo la terminología española del proyecto, se mantiene el nombre propio «Yahvé» en lugar de sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'Coincide con el sentido del texto hebreo y con la decisión auditada del POB inglés, pero adapta la forma del nombre divino al estándar español del proyecto: Yahvé en el texto principal. No se introducen ampliaciones ni se suaviza el lenguaje cultual.'
  spanish_consistency_notes:
  - Se conserva el orden natural del español sin perder el paralelismo semántico del hebreo.
  - «Tienda de reunión» y «tabernáculo» mantienen la terminología cultual técnica.
  - La nota al pie marca el nombre divino sin ocultarlo ni sustituirlo por un título.
