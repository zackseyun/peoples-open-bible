translation:
  language: es
  text: dejando el tratamiento exacto de cada asunto al autor[a], y procurando seguir las líneas generales del epítome.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «procurando avanzar según las líneas del epítome». El griego es muy condensado, y ἀτονοῦντες puede resaltar el esfuerzo o la tensión implicados en la labor de abreviar.
    reason: lexical_alternative
lexical_decisions:
- source_word: διακριβοῦν
  english_pob_choice: the exact treatment
  chosen_spanish: el tratamiento exacto
  alternatives_spanish:
  - el tratamiento preciso
  - la exposición exacta
  - el desarrollo minucioso
  lexicon: LSJ
  rationale: El infinitivo sustantivado expresa el acto de tratar o exponer con precisión; en español, «tratamiento exacto» conserva la idea de exactitud literaria sin volverse demasiado técnico o forzado.
- source_word: περὶ ἑκάστων
  english_pob_choice: of each matter
  chosen_spanish: de cada asunto
  alternatives_spanish:
  - de cada cosa
  - de cada punto
  - de cada detalle
  lexicon: LSJ
  rationale: La frase es distributiva y alude a los distintos elementos del contenido. «Asunto» funciona con naturalidad en español y mantiene el alcance general del griego.
- source_word: τῷ συγγραφεῖ παραχωρήσαντες
  english_pob_choice: leaving ... to the author
  chosen_spanish: dejando ... al autor
  alternatives_spanish:
  - cediendo ... al autor
  - reservando ... al autor
  - concediendo ... al autor
  lexicon: LSJ
  rationale: παραχωρέω aquí tiene el valor de ceder o dejar a otro una esfera propia. «Dejando al autor» reproduce bien la relación de deferencia literaria indicada por el griego.
- source_word: ἐπιπορεύεσθαι
  english_pob_choice: to follow
  chosen_spanish: seguir
  alternatives_spanish:
  - avanzar tras
  - ir siguiendo
  - proceder
  lexicon: LSJ
  rationale: Con los «trazos» como imagen guía, el verbo expresa el acto de ir por una pauta. «Seguir» comunica la metáfora con claridad y naturalidad en español.
- source_word: τοῖς ὑπογραμμοῖς
  english_pob_choice: the outlines
  chosen_spanish: los trazos
  alternatives_spanish:
  - los contornos
  - las líneas guía
  - el bosquejo
  lexicon: LSJ
  rationale: ὑπογραμμός puede referirse a líneas de guía, bosquejo o contorno. «Trazos» conserva la imagen de líneas esquemáticas que se siguen en una obra resumida.
- source_word: τῆς ἐπιτομῆς
  english_pob_choice: of the epitome
  chosen_spanish: del epitome
  alternatives_spanish:
  - del resumen
  - de la abreviación
  - del compendio
  lexicon: LSJ
  rationale: «Epitome» es el término técnico que corresponde al género literario presentado por la obra; conservarlo evita perder el autoentendimiento del texto.
- source_word: ἀτονοῦντες
  english_pob_choice: taking care
  chosen_spanish: procurando
  alternatives_spanish:
  - esforzándonos
  - trabajando con empeño
  - tomando cuidado
  lexicon: LSJ
  rationale: El participio sugiere esfuerzo o tensión al realizar la tarea de abreviar. «Procurando» transmite una atención deliberada y encaja bien con la construcción española.
theological_decisions:
- issue: Naturaleza de la auto-descripción literaria del autor del compendio
  english_pob_reading: The sentence describes the epitomizer's careful task, without theological content.
  chosen_spanish_reading: La oración se entiende como una auto-descripción literaria del compendiador, sin cargarla de contenido doctrinal.
  alternative_spanish_readings:
  - La frase podría leerse como una afirmación de humildad metodológica del autor.
  - También podría entenderse como una nota sobre la limitación inherente a toda epitome.
  rationale: No hay una afirmación doctrinal directa; conviene mantener el carácter literario y metodológico del pasaje tal como lo refleja el griego y el contexto del prólogo.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: La redacción sigue de cerca la revisión inglesa más reciente, que suavizó la segunda ocurrencia de «while» y prefirió «taking care» para ἀτονοῦντες. En español se reflejó esa lectura con «procurando», manteniendo el matiz de atención diligente sin perder la posible idea de esfuerzo implícita en el participio griego.
  spanish_consistency_notes:
  - Se conserva «epitome» como término técnico literario, coherente con el contexto del libro.
  - «Autor» se usa para συγγραφεύς por el contexto de composición histórica/literaria, no como sustituto teológico.
  - No se introdujo puntuación que altere la estructura participial del original; la cláusula conserva el paralelismo entre la concesión del tratamiento exacto y la disposición a seguir el esquema resumido.
