lexical_decisions:
- source_word: σημεῖον
  english_pob_choice: mark
  chosen_spanish: marca
  alternatives_spanish:
  - señal
  - signo
  lexicon: BDAG
  rationale: La imagen es la de una marca colocada sobre la frente; «marca» preserva el valor identificador y concreto mejor que «señal» o «signo» en este contexto.
- source_word: ἀπωλείας
  english_pob_choice: of destruction
  chosen_spanish: de destrucción
  alternatives_spanish:
  - de ruina
  - de perdición
  lexicon: BDAG
  rationale: El genitivo califica la marca como perteneciente a destrucción; «destrucción» es claro y mantiene el peso del término sin arcaísmo.
- source_word: ἐπὶ
  english_pob_choice: upon
  chosen_spanish: sobre
  alternatives_spanish:
  - en
  lexicon: BDAG
  rationale: Con «el/la frente», la preposición expresa ubicación; «sobre» es la opción natural en español y conserva la imagen espacial.
- source_word: μετώπου
  english_pob_choice: foreheads
  chosen_spanish: frentes
  alternatives_spanish:
  - frente
  lexicon: BDAG
  rationale: El griego usa un singular distributivo referido a cada uno; el plural español «frentes» comunica de modo natural la distribución sobre cada persona.
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión inglesa que preserva la equivalencia entre el σημεῖον de los justos y el de los impíos; aquí se conserva el paralelismo con una traducción igualmente concreta («marca») y se evita una paráfrasis explicativa.
  spanish_consistency_notes:
  - Se mantuvo un registro sobrio y bíblico, con vocabulario directo.
  - La frase es breve y paralela al griego, sin añadir sujeto ni verbo innecesarios.
  - El marcador de nota [a] aparece exactamente junto a «marca» para sostener la alternativa léxica.
