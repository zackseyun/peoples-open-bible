  - severity: low
    issue: Sintaxis de ‘se lo he declarado a ustedes’
    rationale: Es comprensible, pero algo pesada. ‘Les he declarado’ con ‘lo que’ ya expresa de forma suficiente el contenido comunicado, y suena más natural en español bíblico moderno.
  - severity: low
    issue: Puntuación del vocativo
    rationale: Si se mantiene una interjección, requeriría manejo más marcado de puntuación. Es preferible simplificar para evitar ruido estilístico.
