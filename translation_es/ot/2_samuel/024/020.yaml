    rationale: El expediente inglés eligió «his servants» precisamente por ser la opción más directa; «servidores» es comprensible, pero algo más amplio e interpretativo.
  - severity: medium
    issue: «pasando junto a él» puede restringir demasiado עֹבְרִים עָלָיו
    rationale: La formulación española sugiere más claramente un paso lateral o de sobrepaso. El material auditado preserva una ambigüedad de movimiento en relación con Araunah, por lo que «pasando ante él» o similar refleja mejor el alcance sin imponer «acercándose».
  revised_spanish_text: Araunah se asomó y vio al rey y a sus siervos pasando ante él[a]. Entonces Araunah salió y se inclinó ante el rey con el rostro en tierra.
  revised_footnotes:
