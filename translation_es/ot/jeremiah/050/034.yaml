  language: en
  yaml_path: translation/ot/jeremiah/050/034.yaml
  text: Their Redeemer is strong[a]; Yahweh of Armies is his name. He will surely plead their case[d][c][b], so that he may give rest to the earth and bring unrest to the inhabitants of Babylon.
  footnotes:
  - marker: a
    text: Or 'their kinsman-redeemer is strong.' The Hebrew term carries familial-legal overtones of one who redeems or vindicates a relative.
    reason: lexical_alternative
  - marker: b
    text: 'Traditional rendering: ''the LORD of Hosts.'''
    reason: lexical_alternative
  - marker: c
    text: Or 'He will surely contend for their cause.' The Hebrew uses a legal-dispute term repeated for emphasis.
    reason: lexical_alternative
  - marker: d
    text: '''The earth'' may also be rendered ''the land.'''
    reason: alternative_reading
