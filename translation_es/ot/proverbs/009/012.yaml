translation:
  language: es
  text: Si eres sabio, eres sabio para ti mismo; si te burlas, tú solo cargarás con ello[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «tú solo soportarás las consecuencias». El hebreo simplemente dice «cargarás/llevarás», dejando implícita la carga.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Cuando
  lexicon: HALOT
  rationale: La partícula introduce una condición; «Si» conserva mejor la fuerza condicional del hebreo que «cuando».
- source_word: חָכַמְתָּ ... חָכַמְתָּ לָּךְ
  english_pob_choice: you are wise, you are wise for yourself
  chosen_spanish: eres sabio, eres sabio para ti mismo
  alternatives_spanish:
  - llegas a ser sabio, llegas a ser sabio para tu propio bien
  - si eres sabio, eres sabio en tu propio beneficio
  lexicon: HALOT
  rationale: Se preserva la repetición de חכם para dar énfasis. «Eres sabio» comunica naturalmente el sentido resultativo del proverbio; «para ti mismo» refleja לָךְ como beneficio personal.
- source_word: וְלַצְתָּ
  english_pob_choice: if you scoff
  chosen_spanish: si eres escarnecedor
  alternatives_spanish:
  - si te burlas
  - si desprecias
  lexicon: HALOT
  rationale: לוץ en Proverbios designa la actitud del escarnecedor, no solo un acto aislado de burla. «Escarnecedor» conserva el tono sapiencial y el rasgo de carácter.
- source_word: לְבַדְּךָ
  english_pob_choice: you alone
  chosen_spanish: tú solo
  alternatives_spanish:
  - solo tú
  - por ti solo
  lexicon: HALOT
  rationale: La idea es de soledad/responsabilidad exclusiva. «Tú solo» mantiene el énfasis personal y suena natural en español.
- source_word: תִשָּׂא
  english_pob_choice: will bear it
  chosen_spanish: lo soportarás
  alternatives_spanish:
  - lo llevarás
  - cargarás con ello
  - soportarás las consecuencias
  lexicon: HALOT
  rationale: נשא aquí tiene el sentido de llevar/cargar un peso o responsabilidad implícita. «Lo soportarás» es una forma natural en español que deja implícito el peso, como en el hebreo.
translation_notes:
  revision_awareness: El texto hebreo y la POB inglesa coinciden en una sentencia condicional y proverbial sin variantes textuales relevantes; la versión española sigue esa línea y conserva la repetición enfática de «sabio».
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto hebreo contiene el nombre divino; aquí no aparece.
  - Se evita «Cristo» y terminología cristológica porque no corresponde al verso.
  - Se mantiene un registro sapiencial sobrio y directo, sin añadir explicaciones interpretativas al cuerpo principal.
