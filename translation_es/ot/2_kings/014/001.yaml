translation:
  language: es
  text: En el segundo año de Joás hijo de Joacaz, rey de Israel, Amasías hijo de Joás llegó a ser rey de Judá.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בִּ/שְׁנַ֣ת שְׁתַּ֔יִם
  english_pob_choice: In the second year of
  chosen_spanish: En el segundo año de
  alternatives_spanish:
  - En el año dos de
  - En el año segundo de
  lexicon: HALOT
  rationale: La fórmula cronológica regnal en hebreo usa literalmente ‘en el año dos’, pero en español la forma natural y fiel es el ordinal ‘segundo’. Mantiene el valor temporal sin sonar mecánica.
- source_word: לְ/יוֹאָ֥שׁ
  english_pob_choice: of Joash
  chosen_spanish: de Joás
  alternatives_spanish:
  - a Joás
  - perteneciente a Joás
  lexicon: HALOT
  rationale: En fórmulas de reinado, ל marca al rey cuyo año de reinado se cuenta. En español corresponde naturalmente con ‘de’, no con un dativo literal.
- source_word: בֶּן יוֹאָחָ֖ז
  english_pob_choice: son of Jehoahaz
  chosen_spanish: hijo de Joacaz
  alternatives_spanish:
  - hijo de Jehoacaz
  lexicon: HALOT
  rationale: Se conserva la relación patronímica. ‘Joacaz’ es una transliteración española estable y más eufónica; ‘Jehoacaz’ queda como alternativa posible, pero no es la forma más natural en español.
- source_word: מֶ֣לֶךְ יִשְׂרָאֵ֑ל
  english_pob_choice: king of Israel
  chosen_spanish: rey de Israel
  alternatives_spanish:
  - rey sobre Israel
  lexicon: HALOT
  rationale: La cadena constructa indica título y reino. ‘Rey de Israel’ expresa de forma directa y estándar la relación de dominio/identidad política.
- source_word: מָלַ֛ךְ
  english_pob_choice: became king
  chosen_spanish: llegó a ser rey
  alternatives_spanish:
  - comenzó a reinar
  - reinó
  lexicon: HALOT
  rationale: El verbo marca acceso al trono. ‘Llegó a ser rey’ conserva el sentido eventivo de entronización mejor que un simple ‘reinó’, y suena natural en español bíblico contemporáneo.
- source_word: אֲמַצְיָ֥הוּ
  english_pob_choice: Amaziah
  chosen_spanish: Amasías
  alternatives_spanish:
  - Amazías
  lexicon: HALOT
  rationale: Se adopta la forma española tradicional y reconocible del nombre propio, sin perder la identidad del personaje.
- source_word: בֶן יוֹאָ֖שׁ
  english_pob_choice: son of Joash
  chosen_spanish: hijo de Joás
  alternatives_spanish:
  - hijo de Joas
  lexicon: HALOT
  rationale: Se preserva el patronímico con la forma española estable ‘Joás’.
- source_word: מֶ֥לֶךְ יְהוּדָֽה
  english_pob_choice: king of Judah
  chosen_spanish: rey de Judá
  alternatives_spanish:
  - rey sobre Judá
  lexicon: HALOT
  rationale: El título final identifica el reino de Amasías. En español, ‘rey de Judá’ es la manera más clara y fiel de reflejar la relación de gobierno.
translation_notes:
  revision_awareness: El texto inglés ya mostraba alta concordancia con el hebreo y no requería revisiones. La redacción española sigue la misma estructura regnal sin añadir ni omitir elementos.
  spanish_consistency_notes:
  - Se mantiene ‘rey’ como título dinástico y ‘llegó a ser rey’ para el acceso al trono.
  - Se usa ‘Joás/Joacaz/Judá/Israel’ con ortografía española consistente.
  - No se introduce ‘Mesías’, ‘Cristo’ ni terminología teológica ajena al versículo.
  - La puntuación sigue la sintaxis española con una sola oración declarativa.
