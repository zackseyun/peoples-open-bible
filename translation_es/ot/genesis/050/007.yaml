translation:
  language: es
  text: José subió[a] para enterrar a su padre, y con él subieron todos los siervos de Faraón, los ancianos de su casa real, y todos los ancianos de la tierra de Egipto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo ‘subió’ refleja la manera habitual de describir el viaje desde Egipto hacia Canaán.
    reason: cultural_note
lexical_decisions:
- source_word: וַיַּעַל
  english_pob_choice: went up
  chosen_spanish: subió
  alternatives_spanish:
  - fue
  - ascendió
  - subió
  lexicon: HALOT
  rationale: El hebreo עָלָה conserva el matiz espacial de ‘subir’. En español, ‘subió’ es natural y transmite la idiomática geográfica del viaje desde Egipto hacia Canaán sin perder el valor literal.
- source_word: לִקְבֹּר
  english_pob_choice: to bury
  chosen_spanish: enterrar
  alternatives_spanish:
  - sepultar
  - dar sepultura
  lexicon: HALOT
  rationale: קָבַר significa de manera directa ‘enterrar’. ‘Enterrar’ es claro, moderno y fiel; ‘sepultar’ sería posible pero algo más solemne.
- source_word: אָבִיו
  english_pob_choice: his father
  chosen_spanish: a su padre
  alternatives_spanish:
  - a su propio padre
  - a su padre
  lexicon: HALOT
  rationale: El sufijo posesivo se refleja de forma simple con ‘su’. El español requiere la preposición ‘a’ con objeto personal directo.
- source_word: וַיַּעֲלוּ אִתּוֹ
  english_pob_choice: with him went up
  chosen_spanish: con él subieron
  alternatives_spanish:
  - subieron con él
  - acompañándolo subieron
  lexicon: HALOT
  rationale: Se conserva la repetición de ‘subir’ para reflejar el paralelo verbal del hebreo. El orden español se ajusta para sonar natural sin perder el eco narrativo.
- source_word: כָּל עַבְדֵי פַרְעֹה
  english_pob_choice: all Pharaoh’s servants
  chosen_spanish: todos los siervos de Faraón
  alternatives_spanish:
  - todos los servidores de Faraón
  - todos los esclavos de Faraón
  lexicon: HALOT
  rationale: עֶבֶד puede abarcar ‘siervo’ o ‘esclavo’. Aquí, por el contexto de corte real y la decisión inglesa de ‘servants’, ‘siervos’ comunica servicio al rey sin forzar ‘esclavos’, que sería demasiado específico en español.
- source_word: זִקְנֵי בֵיתוֹ
  english_pob_choice: the elders of his household
  chosen_spanish: los ancianos de su casa
  alternatives_spanish:
  - los ancianos de su casa
  - los ancianos de su casa real
  - los ancianos de su hogar
  lexicon: HALOT
  rationale: זִקְנֵי mantiene el sentido de ‘ancianos’. ‘Casa’ refleja la acepción de בית como casa/entorno doméstico o corte, y preserva el vínculo con la formulación hebrea mejor que ‘hogar’.
- source_word: וְכֹל זִקְנֵי אֶרֶץ מִצְרָיִם
  english_pob_choice: and all the elders of the land of Egypt
  chosen_spanish: y todos los ancianos de la tierra de Egipto
  alternatives_spanish:
  - y todos los ancianos de Egipto
  - y todos los ancianos del país de Egipto
  lexicon: HALOT
  rationale: Se conserva ‘tierra’ para reflejar אֶרֶץ de manera más completa que ‘Egipto’ solo. ‘Tierra de Egipto’ mantiene el alcance geográfico y la dignidad del hebreo.
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo masorético y coincide sustancialmente con el audit trail inglés; no se detectaron revisiones aplicadas en la base de control, por lo que se mantuvo la repetición verbal y la nota cultural sobre ‘subió’.
  spanish_consistency_notes:
  - Se mantuvo ‘Faraón’ como forma estable en español para el nombre/título del gobernante egipcio.
  - Se prefirió ‘tierra de Egipto’ para conservar el alcance de אֶרֶץ sin introducir una paráfrasis interpretativa.
  - La repetición de ‘subió’ en ambas cláusulas reproduce el énfasis narrativo del hebreo y del POB inglés.
