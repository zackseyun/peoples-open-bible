  yaml_path: translation/ot/judges/013/012.yaml
  text: Then Manoah said[a], “Now let your words come true[c][b]. What will be the rule for the boy and for his work?”
  footnotes:
  - marker: a
    text: Or “when your words come true.” The Hebrew clause may be heard either as a wish (“let your words come true”) or as a temporal assumption (“when your words come true”).
    reason: alternative_reading
  - marker: b
    text: “The rule for the boy” could also be rendered “the custom,” “the ordinance,” or “the manner of life” for the boy.
    reason: lexical_alternative
  - marker: c
    text: Or “and what he is to do.” The Hebrew literally reads “and his work.”
    reason: lexical_alternative
