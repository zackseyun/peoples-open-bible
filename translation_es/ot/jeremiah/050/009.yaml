translation:
  language: es
  text: Porque, he aquí, yo incito y hago subir contra Babilonia una asamblea de grandes naciones desde la tierra del norte. Se dispondrán contra ella; desde allí será capturada. Sus flechas son como las de un guerrero hábil[a]; ninguna vuelve vacía[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Sus flechas son como un guerrero hábil que no vuelve vacío». El hebreo comprime la comparación, y la relación exacta entre «flechas» y «guerrero hábil» puede expresarse de manera más literal.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «desde allí», probablemente refiriéndose al lugar desde donde las naciones atacantes se ponen en formación contra Babilonia.'
    reason: cultural_note
lexical_decisions:
- source_word: מֵעִיר
  english_pob_choice: stirring up
  chosen_spanish: despierto
  alternatives_spanish:
  - alboroto
  - incito
  lexicon: HALOT
  rationale: El hifil de עור expresa causar que algo se levante o entre en acción. En español, «despierto» comunica la iniciativa divina de manera natural y directa; «incito» sería posible, pero suena más interpretativo.
- source_word: וּמַעֲלֶה
  english_pob_choice: bringing
  chosen_spanish: hago subir
  alternatives_spanish:
  - hago venir
  - traigo
  lexicon: HALOT
  rationale: El hifil de עלה conserva la idea de hacer subir o traer hacia una campaña contra un lugar. «Hago subir» mantiene mejor la imagen espacial y militar del hebreo.
- source_word: קְהַל גּוֹיִם גְּדֹלִים
  english_pob_choice: an assembly of great nations
  chosen_spanish: una asamblea de grandes naciones
  alternatives_spanish:
  - una coalición de naciones poderosas
  - un gran conjunto de naciones
  lexicon: HALOT
  rationale: «קהל» es un cuerpo reunido; «asamblea» es el equivalente más directo. «Grandes naciones» preserva la duplicación del hebreo y evita sustituirla por una interpretación más libre como «poderosas».
- source_word: מֵאֶרֶץ צָפוֹן
  english_pob_choice: from the land of the north
  chosen_spanish: desde la tierra del norte
  alternatives_spanish:
  - desde un país del norte
  - desde el norte
  lexicon: HALOT
  rationale: La expresión profética es geográfica y fija. «Tierra del norte» sigue de cerca la forma hebrea y es clara en español.
- source_word: וְעָרְכוּ לָהּ
  english_pob_choice: They will array themselves against her
  chosen_spanish: Se dispondrán contra ella
  alternatives_spanish:
  - se ordenarán contra ella
  - se alinearán en batalla contra ella
  lexicon: HALOT
  rationale: En contexto militar, ערך significa disponer u ordenar en formación. «Se dispondrán contra ella» es natural en español y conserva la idea de ponerse en orden de combate.
- source_word: מִשָּׁם
  english_pob_choice: from there
  chosen_spanish: desde allí
  alternatives_spanish:
  - de allí
  - desde ese lugar
  lexicon: HALOT
  rationale: El adverbio remite al lugar donde se presenta el ejército atacante. «Desde allí» es claro y mantiene la referencia espacial sin explicitar más de lo que el texto dice.
- source_word: תִּלָּכֵד
  english_pob_choice: she will be captured
  chosen_spanish: será capturada
  alternatives_spanish:
  - será tomada
  - caerá en captura
  lexicon: HALOT
  rationale: El niphal de לכד expresa ser apresada o capturada. «Será capturada» conserva bien el sentido militar pasivo.
- source_word: חִצָּיו
  english_pob_choice: Their arrows
  chosen_spanish: Sus flechas
  alternatives_spanish:
  - Las flechas de ellos
  - Sus saetas
  lexicon: HALOT
  rationale: El sufijo plural puede referirse al cuerpo atacante tomado colectivamente. «Sus flechas» funciona en español y mantiene la relación con el grupo plural sin forzar un antecedente singular.
- source_word: כְּגִבּוֹר מַשְׁכִּיל
  english_pob_choice: like those of a skilled warrior
  chosen_spanish: como las de un guerrero hábil
  alternatives_spanish:
  - como las de un guerrero entendido
  - como las de un guerrero experto
  lexicon: HALOT
  rationale: La comparación hebrea está comprimida. En español, «guerrero hábil» comunica la pericia implicada por מַשְׂכִּיל sin perder la fuerza de la imagen. «Como las de» hace explícita la relación con las flechas, como en la POB inglesa.
- source_word: לֹא יָשׁוּב רֵיקָם
  english_pob_choice: none returns empty-handed
  chosen_spanish: no volverá vacío
  alternatives_spanish:
  - no regresará sin resultado
  - no volverá con las manos vacías
  lexicon: HALOT
  rationale: La frase puede entenderse literalmente como «no volver vacío». En español, «no volverá vacío» mantiene la brevedad del hebreo y deja abierta la imagen de retorno sin fracaso; «con las manos vacías» sería más idiomático, pero añade una concreción no explícita.
theological_decisions:
- issue: Agencia divina en la invasión contra Babilonia
  english_pob_reading: The LORD sovereignly stirs up and brings the nations against Babylon.
  chosen_spanish_reading: Yahvé es quien despierta y hace subir a las naciones contra Babilonia.
  alternative_spanish_readings:
  - El texto solo predice la invasión sin resaltar la agencia divina.
  - Las naciones actúan por cuenta propia sin énfasis causal en Yahvé.
  rationale: La primera persona con dos causativos en el hebreo hace explícita la acción soberana de Dios. Por eso el español debe conservar «yo despierto y hago subir» y no diluirlo en una mera predicción neutral.
  doctrine_reference: Providencia y soberanía divina en la historia (cf. Jer 50:9)
translation_notes:
  revision_awareness: El auditorio inglés revisó «Its arrows» a «Their arrows» para concordar con el sujeto plural «an assembly of great nations». En español se mantuvo el plural posesivo «Sus flechas», que ya permite esa concordancia y evita introducir un antecedente singular no justificado. También se conservó la literalidad dinámica de la comparación comprimida y la cláusula final para no perder la ambigüedad controlada del hebreo.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino, conforme al estándar del proyecto.
  - «Babilonia» se mantiene como topónimo histórico estándar.
  - «Guerrero hábil» preserva el campo semántico de מַשְׂכִּיל sin convertirlo en una mera etiqueta de éxito o sabiduría.
