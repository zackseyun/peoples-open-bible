    reason: lexical_alternative
  revision_rationale: Se corrigió el anclaje de la nota para que corresponda a «lloró sobre él», se mejoró la naturalidad de חָלָה con «había enfermado», se evitó el calco duro «descendió a él» con «descendió hacia él», y se ajustó פָּרָשָׁיו a «sus jinetes» para seguir más de cerca el hebreo y la POB inglesa auditada.
