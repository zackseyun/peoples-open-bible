- from: Mira[a], también nuestras ciudades y los que habitan en ellas son tus esclavos; ven y trátalas como te parezca bueno a tus ojos.
  to: Mira[a], también nuestras ciudades y los que habitan en ellas son tus esclavos; ven y haz con ellas como bien te parezca a tus ojos.
  rationale: Se conserva la decisión correcta 'esclavos' para δοῦλοί. Se ajusta ἀπάντησον a una formulación más abarcadora y natural en español ('haz con ellas') que evita limitar indebidamente el objeto a las ciudades como entidades tratadas físicamente y refleja mejor el sentido de disponer de ellas en contexto de rendición. También se aligera la cláusula final para mejorar fluidez sin perder el modismo cercano al original.
