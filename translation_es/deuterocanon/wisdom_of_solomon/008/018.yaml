base_translation:
  language: en
  yaml_path: translation/deuterocanon/wisdom_of_solomon/008/018.yaml
  text: And in her friendship there is good delight[a], and in the labors of her hands, unfailing wealth, and in companionship with her, prudence, and honor in sharing her words[c][b]. I went about seeking how I might take her to myself.
  footnotes:
  - marker: a
    text: Or 'in training together with her conversation/association, prudence.' The Greek compresses ideas of shared discipline and close association in a way that is difficult to mirror neatly in English.
    reason: lexical_alternative
  - marker: b
    text: Or 'good repute' instead of 'honor' for the Greek term denoting favorable public esteem.
    reason: lexical_alternative
  - marker: c
    text: '''Take her to myself'' may also be rendered ''acquire her for myself''; the wording preserves the personal appropriation of personified Wisdom without making the image explicitly marital.'
    reason: lexical_alternative
