    reason: alternative_reading
  - marker: c
    text: La expresión puede referirse al tributo o exacción opresiva impuesta por un soberano imperial y sus gobernantes.
    reason: cultural_note
  revision_rationale: Se quitó la nota teológica añadida sobre «los reuniré» para respetar la neutralidad léxica que el POB conserva en el texto y evitar una glosa no representada como nota en el audit trail. Se mantuvo «paguen entre las naciones» como reparación mínima, apoyado por la nota léxica existente. Se mejoró la fluidez de la cláusula final con «a causa de», y se añadió la nota cultural correspondiente al posible sentido de tributo/exacción imperial en «la carga del rey y los príncipes».
