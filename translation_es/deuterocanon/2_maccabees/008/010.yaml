    rationale: El inglés auditado ofrece como literal «the tribute to the king, for the Romans». La nota española actual es válida, pero puede alinearse mejor si menciona explícitamente «el tributo al rey, para los romanos» como alternativa más literal.
  revised_spanish_text: Pero Nicanor se comprometió a pagar al rey el tributo debido a los romanos[a], por valor de dos mil talentos[b], de la cautividad de los judíos.
