translation:
  language: es
  text: Y al volver, me lavé[a] y comí mi pan[b] con tristeza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego dice simplemente «me lavé». En este contexto probablemente se trata de un lavado relacionado con la impureza por un cadáver; la tradición semítica paralela hace más explícito ese trasfondo.
    reason: cultural_note
  - marker: b
    text: O «mi comida». El griego dice literalmente «mi pan», que también puede referirse de manera más general al alimento o la comida.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπιστρέψας
  english_pob_choice: when I returned
  chosen_spanish: al volver
  alternatives_spanish:
  - cuando regresé
  - después de volver
  - volviendo atrás
  lexicon: BDAG
  rationale: El participio aoristo antecede a los verbos principales y expresa acción previa. «Al volver» comunica bien la secuencia temporal en español sin añadir información inexistente ni sonar forzado.
- source_word: ἐλουσάμην
  english_pob_choice: I washed myself
  chosen_spanish: me lavé
  alternatives_spanish:
  - me bañé
  - me hice un lavado
  - me purifiqué
  lexicon: BDAG
  rationale: El griego medio indica lavado de sí mismo. «Me lavé» es fiel y natural; mantiene abierta la posibilidad de un trasfondo de pureza sin explicitarlo en el texto principal.
- source_word: ἤσθιον
  english_pob_choice: ate
  chosen_spanish: comí
  alternatives_spanish:
  - estaba comiendo
  - tomé alimento
  lexicon: BDAG
  rationale: Aunque el imperfecto puede sugerir acción continua, en la narración española fluye mejor como pasado simple. «Comí» transmite el hecho de comer sin sobrecargar el aspecto.
- source_word: τὸν ἄρτον μου
  english_pob_choice: my bread
  chosen_spanish: mi pan
  alternatives_spanish:
  - mi alimento
  - mi comida
  - mi comida diaria
  lexicon: BDAG
  rationale: «Pan» conserva la literalidad de ἄρτος y el valor metonímico de comida. En español es comprensible y mantiene la concreción del original mejor que una generalización prematura.
- source_word: ἐν λύπῃ
  english_pob_choice: in sorrow
  chosen_spanish: con tristeza
  alternatives_spanish:
  - en dolor
  - con pesar
  - en aflicción
  lexicon: BDAG
  rationale: λύπη denota tristeza, dolor o aflicción. «Con tristeza» suena natural en español y preserva el matiz afectivo del contexto de duelo; evita cargar el texto con una interpretación más técnica.
theological_decisions:
- issue: Si explicitar la impureza ritual del lavado
  english_pob_reading: Kept as 'I washed myself' without adding 'for purification' to the main text.
  chosen_spanish_reading: Se mantiene «me lavé» sin añadir «para purificarme» ni una glosa ritual en el texto principal.
  alternative_spanish_readings:
  - me purifiqué
  - me lavé para purificarme
  - me hice una ablución ritual
  rationale: El contexto amplio y la tradición paralela sugieren un trasfondo de impureza por contacto con cadáver; sin embargo, el griego solo dice que se lavó. La traducción española conserva esa sobriedad y deja la explicación contextual para una nota.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'Se corrigió el fallo anterior anclando explícitamente los marcadores de nota en el texto español: [a] junto a «volver» y [b] junto a «me lavé». La redacción principal sigue el griego y el expediente auditado en inglés, sin añadir explicación ritual al cuerpo del versículo.'
  spanish_consistency_notes:
  - «Y al volver[a]» reproduce el valor temporal del participio aoristo.
  - «me lavé[b]» conserva la literalidad del verbo medio y permite la lectura de lavado relacionado con impureza sin imponerla.
  - «mi pan» mantiene la metáfora concreta de ἄρτος.
  - «con tristeza» refleja λύπη en un español natural y reverente.
