translation:
  language: es
  text: Y celebraron la dedicación del altar durante ocho días, y ofrecieron holocaustos con alegría, y sacrificaron un sacrificio[a] de paz y de alabanza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «un sacrificio de salvación» o «de bienestar»; el griego dice literalmente «un sacrificio de salvación/bienestar y de alabanza».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐποίησαν
  english_pob_choice: they celebrated
  chosen_spanish: celebraron
  alternatives_spanish:
  - hicieron
  - realizaron
  - guardaron
  lexicon: BDAG
  rationale: En este contexto cultual, el verbo no se limita a 'hacer', sino que expresa la observancia o celebración del acto de dedicación. 'Celebraron' comunica el sentido eventivo de manera natural en español sin perder la referencia al acto litúrgico.
- source_word: ἐγκαινισμὸν
  english_pob_choice: dedication
  chosen_spanish: dedicación
  alternatives_spanish:
  - consagración
  - inauguración
  - fiesta de dedicación
  lexicon: LSJ
  rationale: El sustantivo designa la dedicación o rededicación de un objeto sagrado. 'Dedicación' es la equivalencia más directa y clara para el altar.
- source_word: θυσιαστηρίου
  english_pob_choice: of the altar
  chosen_spanish: del altar
  alternatives_spanish:
  - del altar sacrificial
  lexicon: LSJ
  rationale: El término es el de 'altar' en sentido cultual. En español, el genitivo simple 'del altar' es suficiente y fiel al contexto.
- source_word: ἡμέρας ὀκτώ
  english_pob_choice: for eight days
  chosen_spanish: durante ocho días
  alternatives_spanish:
  - por ocho días
  - por ocho jornadas
  lexicon: BDAG
  rationale: El acusativo expresa duración. 'Durante ocho días' comunica esa extensión temporal de forma idiomática en español.
- source_word: προσήνεγκαν
  english_pob_choice: they offered
  chosen_spanish: ofrecieron
  alternatives_spanish:
  - presentaron
  - trajeron
  - ofrecieron en sacrificio
  lexicon: BDAG
  rationale: En contexto sacrificial, el verbo significa ofrecer. 'Ofrecieron' es claro y mantiene el paralelo cultual con el verbo siguiente.
- source_word: ὁλοκαυτώματα
  english_pob_choice: whole burnt offerings
  chosen_spanish: holocaustos
  alternatives_spanish:
  - holocaustos enteros
  - ofrendas totalmente quemadas
  - holocausto
  lexicon: LSJ
  rationale: El término indica ofrendas consumidas por completo por el fuego. 'Holocaustos' preserva la correspondencia léxica y cultual, aunque sea menos común en el uso moderno; evita diluir el sentido técnico del sacrificio.
- source_word: μετʼ εὐφροσύνης
  english_pob_choice: with gladness
  chosen_spanish: con alegría
  alternatives_spanish:
  - con gozo
  - con regocijo
  lexicon: BDAG
  rationale: La frase expresa la alegría acompañante de la celebración. 'Con alegría' es natural, digna y suficientemente amplia para el matiz de júbilo.
- source_word: ἔθυσαν
  english_pob_choice: they sacrificed
  chosen_spanish: sacrificaron
  alternatives_spanish:
  - ofrecieron
  - inmolaron
  lexicon: BDAG
  rationale: Se conserva la distinción entre 'ofrecer' y 'sacrificar' que aparece en el griego. 'Sacrificaron' refleja el acto ritual explícito.
- source_word: θυσίαν σωτηρίου
  english_pob_choice: a sacrifice of peace offerings
  chosen_spanish: una víctima de paz[a]
  alternatives_spanish:
  - un sacrificio de paz
  - una víctima de salvación
  - una ofrenda de bienestar
  lexicon: LSJ
  rationale: El griego presenta θυσίαν con el genitivo σωτηρίου, cuyo ámbito sacrificial puede referirse a una ofrenda de paz/bienestar. En español, 'víctima de paz' conserva el valor sacrificial sin identificarla mecánicamente con una categoría posterior o con una traducción explicativa demasiado amplia. Se deja constancia de la alternativa sacrificial en la nota.
- source_word: αἰνέσεως
  english_pob_choice: and praise
  chosen_spanish: y de alabanza
  alternatives_spanish:
  - y de acción de gracias
  - y de elogio
  lexicon: LSJ
  rationale: El genitivo coordina la caracterización de la víctima/sacrificio. 'De alabanza' reproduce el contenido semántico de αἴνεσις de manera directa y cultualmente apropiada.
theological_decisions:
- issue: Valor de σωτηρίου en θυσίαν σωτηρίου
  english_pob_reading: a sacrifice of peace offerings
  chosen_spanish_reading: una víctima de paz
  alternative_spanish_readings:
  - un sacrificio de paz
  - una víctima de salvación
  - una ofrenda de bienestar
  rationale: El audit trail en inglés pasó de 'deliverance' a 'peace offerings' por revisión, señalando que el término se usa en un contexto sacrificial y no simplemente como 'salvación' en sentido abstracto. Para el español, 'víctima de paz' conserva la carga ritual y deja visible la conexión con la categoría sacrificial, sin forzar una explicación interpretativa que borre la tensión lexical del griego.
  doctrine_reference: Translation philosophy §1, Primacía del original y preservación de tensión lexical
- issue: Elección de 'holocaustos' para ὁλοκαυτώματα
  english_pob_reading: whole burnt offerings
  chosen_spanish_reading: holocaustos
  alternative_spanish_readings:
  - ofrendas totalmente quemadas
  - holocaustos enteros
  rationale: El término griego indica ofrendas consumidas enteramente por el fuego. 'Holocaustos' mantiene esa precisión cultual en español y conserva la distinción entre este tipo de ofrenda y otras ofrendas sacrificiales.
  doctrine_reference: Translation philosophy §6, Lenguaje moderno digno sin aplanar lo cultual
translation_notes:
  revision_awareness: 'El contexto inglés muestra una revisión importante en torno a σωτηρίου: primero se tradujo como ''deliverance'' y luego se ajustó a ''peace offerings'' por lectura sacrificial. La propuesta española evita elegir exclusivamente entre una paráfrasis de salvación y una categoría técnica cerrada; mantiene visible la ambigüedad cultual con ''víctima de paz'' y la nota alternativa. El resto de la línea sigue de cerca la estructura del griego y el registro culto del POB.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' no aplica en este versículo.
  - Se conserva un registro bíblico contemporáneo y digno, evitando arcaísmos innecesarios.
  - '''Holocaustos'' se mantiene como término técnico cultual, coherente con el valor de ὁλοκαυτώματα.'
  - '''Alabanza'' se usa como equivalente directo de αἴνεσις, sin sustituirlo por ''acción de gracias'' salvo en nota alternativa.'
