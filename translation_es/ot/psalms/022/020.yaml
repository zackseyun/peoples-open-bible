translation:
  language: es
  text: Pero tú[a], Yahvé, no estés lejos; tú, mi fuerza[b], apresúrate a ayudarme.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O bien, «no estés lejos»
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «mi fuerza»; algunos también lo han entendido como «mi ayuda» o, menos probablemente aquí, en un sentido literal relacionado con una cierva.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אַתָּה
  english_pob_choice: But you
  chosen_spanish: Pero tú
  alternatives_spanish:
  - Y tú
  - Mas tú
  - Y en cuanto a ti
  lexicon: HALOT
  rationale: La partícula conjuntiva más el pronombre independiente introduce contraste con la situación anterior; en español, «Pero tú» expresa de forma natural esa oposición sin perder la fuerza enfática del pronombre.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El texto hebreo usa directamente el Nombre divino. Según la norma del proyecto, se vierte como «Yahvé» en el texto principal para preservar el nombre propio del pacto y no sustituirlo por un título.
- source_word: אַל תִּרְחָק
  english_pob_choice: do not be far away
  chosen_spanish: no estés lejos
  alternatives_spanish:
  - no te alejes
  - no estés distante
  - no estés lejos de mí
  lexicon: HALOT
  rationale: La forma negativa expresa una petición urgente de cercanía; «no estés lejos» es idiomático en español y conserva el sentido de distancia espacial/relacional del hebreo.
- source_word: אֱיָלוּתִי
  english_pob_choice: my strength
  chosen_spanish: mi fuerza
  alternatives_spanish:
  - mi ayuda
  - mi poder
  - mi fortaleza
  lexicon: HALOT
  rationale: El audit trail inglés entiende el término de manera figurada como «my strength». En español, «mi fuerza» reproduce esa lectura metafórica sin forzar la imagen concreta de «ayuda», que aparece ya en la siguiente frase.
- source_word: לְעֶזְרָתִי
  english_pob_choice: to help me
  chosen_spanish: en ayudarme
  alternatives_spanish:
  - para ayudarme
  - a mi ayuda
  - para mi ayuda
  lexicon: HALOT
  rationale: La expresión preposicional apunta a la finalidad de la súplica. «En ayudarme» mantiene naturalidad en español y comunica con claridad el llamado urgente a la intervención divina.
- source_word: חוּשָׁה
  english_pob_choice: hurry
  chosen_spanish: date prisa
  alternatives_spanish:
  - apresúrate
  - ven pronto
  - hazte pronto
  lexicon: HALOT
  rationale: El imperativo pide acción urgente. «Date prisa» es una equivalencia clara y digna en español contemporáneo, equivalente al «hurry» del texto auditado.
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: La base hebrea presenta el Tetragramatón de forma directa; siguiendo la convención del proyecto, se traduce con el nombre propio divino «Yahvé», no con una sustitución titulada.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'El pasaje coincide con el estado de revisión más reciente: no se registran cambios aplicados y el control cruzado indicó alto acuerdo sin objeciones.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el Nombre divino conforme al estándar del proyecto.
  - Se conserva la metáfora de fuerza en «mi fuerza» para no borrar la tensión lexical documentada.
  - La sintaxis española busca naturalidad sin alejarse del valor imperativo y apelativo del hebreo.
