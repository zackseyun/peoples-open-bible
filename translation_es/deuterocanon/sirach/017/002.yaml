translation:
  language: es
  text: Les dio un número fijo de días y un tiempo señalado[b][a], y les dio autoridad sobre las cosas que hay sobre ella.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «las cosas sobre ella»; el pronombre probablemente remite a la tierra mencionada en el versículo anterior.
    reason: cross_reference
  - marker: b
    text: 'O: «un tiempo fijado».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἡμέρας ἀριθμοῦ
  english_pob_choice: a fixed number of days
  chosen_spanish: un número fijo de días
  alternatives_spanish:
  - días contados
  - días por número
  lexicon: LSJ
  rationale: La construcción genitiva expresa días limitados y contados; «un número fijo de días» reproduce bien la idea de duración determinada sin forzar un calco extraño en español.
- source_word: καιρόν
  english_pob_choice: a set time
  chosen_spanish: un tiempo señalado
  alternatives_spanish:
  - un tiempo fijado
  - un tiempo appointed
  lexicon: LSJ
  rationale: Aquí καιρός indica un período asignado o establecido, no simplemente tiempo abstracto. «Tiempo señalado» es natural en español y conserva la noción de cita o asignación.
- source_word: ἐξουσίαν
  english_pob_choice: authority
  chosen_spanish: autoridad
  alternatives_spanish:
  - dominio
  - poder
  lexicon: BDAG
  rationale: ἐξουσία alude a autoridad delegada o derecho de gobernar. «Autoridad» conserva esa fuerza sin convertirla indebidamente en mera capacidad o en dominio absoluto.
- source_word: τῶν ἐπ᾿ αὐτῆς
  english_pob_choice: the things on it
  chosen_spanish: las cosas que hay en ella
  alternatives_spanish:
  - lo que hay sobre ella
  - las cosas sobre ella
  - todo lo que hay en ella
  lexicon: LSJ
  rationale: El pronombre femenino αὐτῆς remite con naturalidad a la tierra del versículo anterior, pero aquí está elidido. «Las cosas que hay en ella» mantiene la referencia implícita sin añadir de más ni perder la elipsis griega.
theological_decisions:
- issue: Alcance de la autoridad humana sobre la creación
  english_pob_reading: humanity is granted authority over the things on the earth
  chosen_spanish_reading: la humanidad recibe autoridad sobre las cosas que hay en la tierra
  alternative_spanish_readings:
  - la humanidad recibe autoridad sobre la tierra misma
  - la humanidad recibe poder sobre la vida terrenal en general
  rationale: El contexto de la creación sugiere mayordomía humana sobre las criaturas y realidades terrestres, no posesión absoluta del planeta. La traducción preserva la amplitud y la tensión del griego sin resolverla en exceso.
  doctrine_reference: Preservar la tensión del texto original; primacía del lenguaje fuente sobre la tradición de traducción.
translation_notes:
  revision_awareness: No hubo revisiones aplicadas en el expediente más reciente; se conserva la lectura estable con adaptación española natural y fiel al griego.
  spanish_consistency_notes:
  - Se mantiene «autoridad» para ἐξουσία, en coherencia con el valor de derecho/delegación de poder.
  - «Tiempo señalado» evita la rigidez de un calco y conserva el sentido de período asignado.
  - La elipsis de αὐτῆς se respeta con una nota aclaratoria sin expandir indebidamente el texto principal.
  - El registro es digno y moderno, apto para lectura eclesial amplia.
