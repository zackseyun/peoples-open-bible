- from: El pueblo se quedó a distancia[a], y Moisés se acercó a la espesa oscuridad donde estaba Dios.
  to: El pueblo se mantuvo a cierta distancia[a], y Moisés se acercó a la espesa oscuridad donde estaba Dios.
