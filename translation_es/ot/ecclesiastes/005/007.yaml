translation:
  language: es
  text: Si ves la opresión de los pobres[a] y el robo[b] de justicia y rectitud en la provincia, no te asombres del asunto; porque uno de rango alto está vigilado por otro más alto[c], y hay otros más altos sobre ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «extorsión de los pobres». Los términos hebreos pueden enfatizar tanto la opresión general como la confiscación explotadora.
    reason: lexical_alternative
  - marker: b
    text: O «el despojo de la justicia y la rectitud».
    reason: lexical_alternative
  - marker: c
    text: 'El hebreo dice literalmente: «porque uno alto vigila sobre otro alto, y altos están sobre ellos», lo que puede referirse a niveles de funcionarios humanos y también puede implicar supervisión divina última.'
    reason: alternative_reading
lexical_decisions:
- source_word: עֹשֶׁק
  english_pob_choice: oppression
  chosen_spanish: opresión
  alternatives_spanish:
  - extorsión
  - opresión
  lexicon: HALOT
  rationale: En este contexto social, el término abarca abuso explotador y presión injusta. «Opresión» es el equivalente natural y amplio en español sin estrechar indebidamente el sentido.
- source_word: רָשׁ
  english_pob_choice: the poor
  chosen_spanish: los pobres
  alternatives_spanish:
  - los necesitados
  - los desposeídos
  lexicon: HALOT
  rationale: El sustantivo/adjetivo designa a una clase social empobrecida; «los pobres» conserva esa referencia colectiva de forma idiomática.
- source_word: גֵזֶל
  english_pob_choice: robbery
  chosen_spanish: robo
  alternatives_spanish:
  - pillaje
  - despojo
  - violenta sustracción
  lexicon: HALOT
  rationale: Aquí la idea es el despojo indebido de lo que corresponde por derecho. «Robo» comunica bien la fuerza del término en español moderno, aunque el contexto jurídico también podría sugerir «despojo».
- source_word: מִשְׁפָּט
  english_pob_choice: justice
  chosen_spanish: justicia
  alternatives_spanish:
  - juicio
  - derecho legal
  lexicon: HALOT
  rationale: En la esfera administrativa y social del verso, el término apunta a la justicia debida, no solo a una sentencia aislada. «Justicia» mantiene ese valor legal.
- source_word: צֶדֶק
  english_pob_choice: righteousness
  chosen_spanish: rectitud
  alternatives_spanish:
  - justicia
  - equidad
  lexicon: HALOT
  rationale: Emparejado con מִשְׁפָּט, el término amplía el campo de la justicia al orden moral correcto. «Rectitud» preserva mejor la dimensión ética en español que repetir «justicia».
- source_word: מְדִינָה
  english_pob_choice: province
  chosen_spanish: provincia
  alternatives_spanish:
  - distrito
  - región
  - estado
  lexicon: HALOT
  rationale: El vocablo suele referirse a una división administrativa. «Provincia» encaja con el trasfondo burocrático que sugiere el versículo.
- source_word: תִּתְמַהּ
  english_pob_choice: do not be astonished
  chosen_spanish: no te asombres
  alternatives_spanish:
  - no te maravilles
  - no te sorprendas
  - no te espantes
  lexicon: HALOT
  rationale: El verbo expresa asombro o extrañeza ante lo visto. «No te asombres» es natural y conserva la reacción prohibida.
- source_word: הַחֵפֶץ
  english_pob_choice: the matter
  chosen_spanish: el asunto
  alternatives_spanish:
  - la cosa
  - el hecho
  - el acontecimiento
  lexicon: HALOT
  rationale: Aunque el sustantivo puede significar «deseo» o «deleite», aquí claramente se refiere a la situación observada. «El asunto» es idiomático y preciso en español.
- source_word: גָבֹהַּ מֵעַל גָּבֹהַ
  english_pob_choice: one high official is watched by one higher
  chosen_spanish: un alto está vigilado por otro más alto
  alternatives_spanish:
  - un alto está vigilado por otro superior
  - un alto oficial es vigilado por uno más alto
  lexicon: HALOT
  rationale: La repetición de «alto» funciona sustantivada para personas de rango elevado. En español, «vigilado» reproduce de manera natural la relación de supervisión indicada por שֹׁמֵר sin añadir una burocratización excesiva.
- source_word: שֹׁמֵר
  english_pob_choice: is watched
  chosen_spanish: está vigilado
  alternatives_spanish:
  - está custodiado
  - es vigilado
  - lo vigila
  lexicon: HALOT
  rationale: El participio expresa vigilancia/guarda. «Está vigilado» refleja la relación pasiva entre los dos niveles de autoridad y mantiene la imagen de supervisión.
- source_word: וּגְבֹהִים עֲלֵיהֶם
  english_pob_choice: and there are higher ones over them
  chosen_spanish: y hay otros más altos sobre ellos
  alternatives_spanish:
  - y hay más altos sobre ellos
  - y hay superiores sobre ellos
  lexicon: HALOT
  rationale: El plural continúa la cadena jerárquica. «Otros más altos» preserva la escalada del hebreo sin introducir «oficiales» donde el texto no los nombra explícitamente.
theological_decisions:
- issue: Si el final del versículo debe explicitar a Dios como vigilante supremo
  english_pob_reading: Keep the wording at the level of hierarchical 'higher ones' without inserting 'God' into the translation.
  chosen_spanish_reading: Mantener el lenguaje de jerarquía («otros más altos») sin insertar «Dios» en el texto principal.
  alternative_spanish_readings:
  - y hay otros más altos sobre ellos, es decir, Dios
  - y hay otros más altos sobre ellos, bajo la vigilancia de Dios
  rationale: El hebreo habla de una serie de «altos» que se vigilan unos a otros; el punto teológico puede ser implícito, pero no está explicitado. La traducción conserva esa ambigüedad textual en lugar de resolverla en la línea principal.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica en vez de resolverla.'
translation_notes:
  revision_awareness: La formulación española sigue la revisión más reciente del inglés POB, que redujo la explicitación interpretativa en la cadena jerárquica y dejó el versículo en términos de supervisión sucesiva. Se evitó introducir «oficial» o «Dios» en el texto principal para mantener la correspondencia con el hebreo y la ambigüedad teológica documentada.
  spanish_consistency_notes:
  - Se usa «Yahvé» por defecto solo cuando el texto lo requiera explícitamente; este versículo no contiene el nombre divino.
  - «Justicia» y «rectitud» se mantienen como pareja para מִשְׁפָּט / צֶדֶק, siguiendo la diferenciación semántica del inglés POB.
  - «Província» se traduce como «provincia» por su valor administrativo.
  - La puntuación reproduce el flujo del hebreo con una sola oración principal y cláusula causal final.
