translation:
  language: es
  text: y todos los hijos del cautiverio[a], porque se habían purificado. Porque todos los levitas juntos se habían purificado, todos ellos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los hijos del exilio»; de manera más idiomática, «los exiliados».'
    reason: lexical_alternative
  - marker: b
    text: 'El griego aquí es algo fragmentario en sentido y parece continuar en la cláusula siguiente; también puede entenderse: «habían sido purificados».'
    reason: textual_variant
lexical_decisions:
- source_word: υἱοὶ τῆς αἰχμαλωσίας
  english_pob_choice: sons of the captivity
  chosen_spanish: los hijos del cautiverio
  alternatives_spanish:
  - los hijos del exilio
  - los exiliados
  lexicon: LSJ
  rationale: Conservo la imagen idiomática del griego y su tono comunitario postexílico. «Cautiverio» refleja αἰχμαλωσία con más fuerza literal que una simplificación a «exilio», pero «exiliados» queda como alternativa más idiomática en español.
- source_word: ἡγνίσθησαν
  english_pob_choice: had purified themselves
  chosen_spanish: se habían purificado
  alternatives_spanish:
  - habían sido purificados
  - se habían consagrado
  - se habían limpiado ritualmente
  lexicon: LSJ
  rationale: El verbo se usa aquí en sentido cultual de purificación ritual. La forma media/pasiva del griego permite una lectura reflexiva; en español «se habían purificado» preserva esa agencia comunitaria sin perder el matiz ritual.
- source_word: λευεῖται
  english_pob_choice: Levites
  chosen_spanish: los levitas
  alternatives_spanish:
  - levitas
  - los sacerdotes levitas
  lexicon: LSJ
  rationale: «Levitas» es el equivalente natural en español para el nombre del grupo. Mantengo el artículo por la sintaxis española y por la referencia colectiva del griego.
- source_word: ἅμα πάντες
  english_pob_choice: all together
  chosen_spanish: todos, juntos
  alternatives_spanish:
  - todos en conjunto
  - todos a la vez
  lexicon: LSJ
  rationale: La expresión intensifica simultáneamente totalidad y unidad. «Juntos» conserva el valor adverbial de ἅμα, y la repetición de «todos» refleja el énfasis del griego sin volverlo pesado.
theological_decisions:
- issue: Purificación ritual versus santificación moral
  english_pob_reading: had purified themselves
  chosen_spanish_reading: se habían purificado
  alternative_spanish_readings:
  - habían sido purificados
  - se habían santificado
  rationale: El contexto es de preparación cultual, no de renovación moral abstracta. «Purificado» mantiene el acto ritual y evita sustituir la idea por un lenguaje más teológico pero menos preciso en este versículo.
  doctrine_reference: Translation philosophy §§1, 5
translation_notes:
  revision_awareness: La revisión inglesa más reciente movió el adverbio para reflejar mejor πάντες οἱ λευεῖται ἅμα, preservando la repetición de «all». En español seguí ese ajuste con «todos los levitas, juntos» y conservé la duplicación de «todos» al final para mantener la intensidad distributiva del griego.
  spanish_consistency_notes:
  - Usé «Yahvé» no porque aparezca en este versículo, sino como norma del proyecto para el Tetragrámaton cuando corresponda.
  - Mantuve el registro cultual con «purificado» en lugar de «limpiado» o «santificado» para no borrar la tensión lexical del verbo griego.
  - La repetición de «todos» se conserva por fidelidad al énfasis de πάντες, aunque en español resulte ligeramente enfática.
