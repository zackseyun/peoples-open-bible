translation:
  language: es
  text: El número total de los jefes de las casas paternas[a], de los guerreros valientes[b], fue dos mil seiscientos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: "jefes de las casas ancestrales". El hebreo usa un idiomatismo social que se refiere a unidades familiares o de clan, no solo a padres biológicos.'
    reason: lexical_alternative
  - marker: b
    text: 'También: "hombres valerosos" o "valerosos combatientes". La expresión hebrea destaca fuerza y coraje militar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּל מִסְפַּר
  english_pob_choice: The total number
  chosen_spanish: El número total
  alternatives_spanish:
  - El total
  - La totalidad del número
  lexicon: HALOT
  rationale: La combinación hebrea expresa el total cuantitativo. En español, "el número total" mantiene de manera natural esa fuerza administrativa y censal sin añadir interpretación.
- source_word: רָאשֵׁי
  english_pob_choice: heads
  chosen_spanish: jefes
  alternatives_spanish:
  - cabezas
  - líderes
  - jefes principales
  lexicon: HALOT
  rationale: Aunque "heads" es literal en inglés, en español "jefes" comunica mejor la función de liderazgo de forma natural y respetuosa del idiomático hebreo de encabezamiento de grupos familiares.
- source_word: הָאָבוֹת
  english_pob_choice: the fathers’ houses
  chosen_spanish: las casas paternas
  alternatives_spanish:
  - las casas de los padres
  - las casas ancestrales
  - los clanes familiares
  lexicon: HALOT
  rationale: El hebreo alude a unidades claniles o familiares. "Casas paternas" conserva la imagen idiomática y evita reducirla a padres individuales; es una fórmula transparente en español bíblico.
- source_word: לְגִבּוֹרֵי חָיִל
  english_pob_choice: of the mighty men of valor
  chosen_spanish: de los hombres valerosos
  alternatives_spanish:
  - de los valientes guerreros
  - de los hombres poderosos
  - de los guerreros de valor
  lexicon: HALOT
  rationale: La construcción liga a los jefes con el grupo militar contado. En español, "hombres valerosos" transmite el sentido de גִּבּוֹרֵי חָיִל sin forzar una calca como "mighty men de valor", y preserva el matiz de fortaleza/valor bélico.
- source_word: גִּבּוֹרֵי
  english_pob_choice: mighty men
  chosen_spanish: hombres valerosos
  alternatives_spanish:
  - mujeres valerosas
  - guerreros valientes
  - hombres poderosos
  lexicon: HALOT
  rationale: El término designa guerreros o combatientes fuertes. "Hombres valerosos" conserva la referencia masculina y el valor militar con un español fluido.
- source_word: חָיִל
  english_pob_choice: valor
  chosen_spanish: valerosos
  alternatives_spanish:
  - valentía
  - fuerza
  - coraje
  lexicon: HALOT
  rationale: En este contexto militar, חָיִל expresa fuerza/valor. En español, el adjetivo "valerosos" integra de forma natural ese campo semántico sin perder la intensidad bélica.
- source_word: אַלְפַּיִם וְשֵׁשׁ מֵאוֹת
  english_pob_choice: two thousand six hundred
  chosen_spanish: dos mil seiscientos
  alternatives_spanish:
  - '2.600'
  - 2,600
  lexicon: HALOT
  rationale: Se conserva el número cardinal en forma plena, acorde con el estilo narrativo bíblico en español.
translation_notes:
  revision_awareness: La redacción española sigue el ajuste del texto inglés revisado, que prefirió una relación genitiva más precisa entre los jefes de las casas paternas y el grupo militar. Por eso se mantiene una estructura nominal compacta y se evita una preposición interpretativa que sugiera finalidad.
  spanish_consistency_notes:
  - Se mantuvo una sintaxis sobria y administrativa acorde con Crónicas.
  - '"Casas paternas" conserva la convención bíblica para la unidad familiar/clánica.'
  - '"Hombres valerosos" equilibra literalidad y naturalidad, evitando una calca rígida de "hombres poderosos de valor".'
  - El número se escribe con palabras para armonizar con la prosa bíblica en español.
