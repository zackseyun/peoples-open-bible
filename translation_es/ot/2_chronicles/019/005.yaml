translation:
  language: es
  text: Y nombró jueces en el país[a], en todas las ciudades fortificadas de Judá, ciudad por ciudad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por toda la tierra».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲמֵד
  english_pob_choice: appointed
  chosen_spanish: estableció
  alternatives_spanish:
  - designó
  - nombró
  - puso
  lexicon: HALOT
  rationale: El Hifil de עמד aquí expresa poner o establecer a personas en un cargo. En español, "estableció" comunica bien la acción administrativa sin forzar un calco como "hizo estar de pie".
- source_word: שֹׁפְטִים
  english_pob_choice: judges
  chosen_spanish: jueces
  alternatives_spanish:
  - magistrados
  - tribunales
  lexicon: HALOT
  rationale: El sustantivo se refiere a funcionarios judiciales. "Jueces" es el equivalente directo y más preciso en español.
- source_word: בָּאָרֶץ
  english_pob_choice: in the land
  chosen_spanish: en la tierra
  alternatives_spanish:
  - en el país
  - a lo largo de la tierra
  - por toda la tierra
  lexicon: HALOT
  rationale: La frase ubica el nombramiento dentro del territorio de Judá. "En la tierra" conserva la referencia territorial sin añadir explícitamente una expansión distributiva que ya aporta el contexto siguiente.
- source_word: בְּכָל עָרֵי יְהוּדָה
  english_pob_choice: in all the cities of Judah
  chosen_spanish: en todas las ciudades de Judá
  alternatives_spanish:
  - por todas las ciudades de Judá
  - en todas las urbes de Judá
  lexicon: HALOT
  rationale: La construcción preposicional y el cuantificador total se reflejan de manera directa. "Ciudades" es el término natural y fiel para ערים en este contexto.
- source_word: הַבְּצֻרוֹת
  english_pob_choice: fortified
  chosen_spanish: fortificadas
  alternatives_spanish:
  - amuralladas
  - fortes
  lexicon: HALOT
  rationale: El adjetivo describe ciudades defensivamente preparadas. "Fortificadas" mantiene el valor semántico sin introducir una imagen más específica que el hebreo no exige.
- source_word: לְעִיר וָעִיר
  english_pob_choice: city by city
  chosen_spanish: ciudad por ciudad
  alternatives_spanish:
  - para cada ciudad
  - en cada ciudad
  lexicon: HALOT
  rationale: El hebreo usa un distributivo repetido; "ciudad por ciudad" preserva ese ritmo y la idea de asignación individual a cada ciudad.
translation_notes:
  revision_awareness: El texto inglés auditado se mantiene sin cambios sustanciales; la presente propuesta sigue la lectura establecida y conserva la alternativa distributiva de בָּאָרֶץ en nota.
  spanish_consistency_notes:
  - Se conserva "Yahvé" como norma general del proyecto, pero este versículo no contiene el Tetragrámaton.
  - '"Jueces" se usa en sentido funcional/judicial, no como título eclesiástico.'
  - La secuencia "en la tierra... en todas las ciudades... ciudad por ciudad" reproduce la progresión del hebreo sin añadir inferencias.
  - La nota al pie refleja la alternativa espacial/distributiva documentada en el aparato inglés.
