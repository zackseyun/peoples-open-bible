translation:
  language: es
  text: Entonces un viento salió de Yahvé[a] e hizo venir codornices del mar, y las dejó caer junto al campamento, como a una jornada de camino de este lado y como a una jornada de camino del otro lado, alrededor del campamento, y como a dos codos sobre la superficie de la tierra[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «un espíritu salió de Yahvé»; aquí el contexto favorece claramente «viento», porque es lo que trae las codornices del mar.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «como a dos codos sobre la faz de la tierra». La cláusula puede describir la altura a la que estaban extendidas o volaban las codornices, más que su profundidad sobre el suelo.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְר֜וּחַ
  english_pob_choice: a wind
  chosen_spanish: un viento
  alternatives_spanish:
  - un espíritu
  - un aliento
  lexicon: HALOT
  rationale: רוּחַ puede significar ‘viento’, ‘aliento’ o ‘espíritu’. Como el contexto describe un agente físico que transporta codornices desde el mar, ‘viento’ es la opción más fiel y natural en español.
- source_word: נָסַע מֵאֵת יְהוָה
  english_pob_choice: went out from the LORD
  chosen_spanish: salió de Yahvé
  alternatives_spanish:
  - partió de Yahvé
  - salió de parte de Yahvé
  lexicon: HALOT
  rationale: El hebreo expresa movimiento procedente de Yahvé. ‘Salió de Yahvé’ conserva la procedencia divina sin añadir una explicación causal más específica que la del texto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: convención POB
  rationale: El Tetragrámaton se vierte como ‘Yahvé’ para preservar el nombre propio divino, conforme al criterio base del proyecto.
- source_word: וַיָּגָז שַׂלְוִים
  english_pob_choice: drove quail in
  chosen_spanish: hizo entrar codornices
  alternatives_spanish:
  - trajo codornices
  - empujó codornices hacia adentro
  - arremolinó codornices
  lexicon: HALOT
  rationale: El verbo raro en este contexto describe el movimiento de las codornices hacia el campamento por medio del viento. ‘Hizo entrar codornices’ comunica el resultado y mantiene la relación con el viento sin forzar una imagen demasiado técnica.
- source_word: מִן הַיָּם
  english_pob_choice: from the sea
  chosen_spanish: desde el mar
  alternatives_spanish:
  - del mar
  - desde el litoral
  lexicon: HALOT
  rationale: La procedencia geográfica es directa; ‘desde el mar’ reproduce bien el sentido espacial y la secuencia del hebreo.
- source_word: וַיִּטֹּשׁ עַל הַמַּחֲנֶה
  english_pob_choice: and let them fall beside the camp
  chosen_spanish: y las dejó caer junto al campamento
  alternatives_spanish:
  - y las esparció junto al campamento
  - y las echó sobre el campamento
  - y las dejó junto al campamento
  lexicon: HALOT
  rationale: El verbo puede implicar tender, soltar o arrojar. ‘Las dejó caer’ comunica el efecto observable en español con naturalidad y evita la impresión de que cayeron literalmente sobre las tiendas.
- source_word: כְּדֶרֶךְ יוֹם כֹּה וּכְדֶרֶךְ יוֹם כֹּה
  english_pob_choice: about a day’s journey on this side and a day’s journey on that side
  chosen_spanish: como a una jornada de camino de este lado y como a una jornada de camino del otro lado
  alternatives_spanish:
  - como a una jornada de camino aquí y una jornada de camino allí
  - como a una jornada de camino en cada dirección
  lexicon: HALOT
  rationale: La duplicación hebrea marca extensión a ambos lados del campamento. ‘De este lado... del otro lado’ conserva la estructura repetitiva y la referencia espacial.
- source_word: סְבִיבוֹת הַמַּחֲנֶה
  english_pob_choice: all around the camp
  chosen_spanish: alrededor de todo el campamento
  alternatives_spanish:
  - alrededor del campamento
  - en torno al campamento
  lexicon: HALOT
  rationale: La expresión resume la distribución total. ‘Alrededor de todo el campamento’ mantiene el valor comprehensivo del plural y su fuerza global.
- source_word: וּכְאַמָּתַיִם
  english_pob_choice: about two cubits
  chosen_spanish: como a dos codos
  alternatives_spanish:
  - aproximadamente dos codos
  - como a unos tres pies
  lexicon: HALOT
  rationale: Se conserva la medida antigua para transparencia formal; el ‘como a’ refleja el valor aproximado del prefijo כ.
- source_word: עַל פְּנֵי הָאָרֶץ
  english_pob_choice: above the surface of the ground
  chosen_spanish: sobre la superficie de la tierra
  alternatives_spanish:
  - sobre la faz de la tierra
  - sobre el suelo
  lexicon: HALOT
  rationale: La frase hebrea es literalmente ‘sobre la faz de la tierra’. ‘Sobre la superficie de la tierra’ es una forma clara y fiel en español, sin resolver de antemano si describe altura, cobertura o disposición.
theological_decisions:
- issue: La agencia del viento procedente de Yahvé
  english_pob_reading: The verse describes a wind sent by the LORD as the means by which quail are brought.
  chosen_spanish_reading: El versículo describe un viento que procede de Yahvé y, por ese medio, llegan las codornices.
  alternative_spanish_readings:
  - Yahvé envió directamente las codornices por medio de un viento
  - un espíritu salió de Yahvé
  rationale: El hebreo mantiene juntos el origen divino y el medio natural. La traducción preserva esa tensión sin explicarla en exceso ni neutralizarla.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica en vez de resolverla'
- issue: Posible lectura de רוּחַ como ‘espíritu’
  english_pob_reading: Or 'a spirit went out from the LORD'; here the context strongly favors 'wind' because it carries the quail from the sea.
  chosen_spanish_reading: La nota reconoce ‘espíritu’ como alternativa lexical, pero el texto principal usa ‘viento’.
  alternative_spanish_readings:
  - un espíritu salió de Yahvé
  - un soplo salió de Yahvé
  rationale: La ambigüedad de רוּחַ debe permanecer visible porque existe en el hebreo; sin embargo, el contexto narrativo favorece claramente ‘viento’.
  doctrine_reference: HALOT; coherencia contextual del relato
translation_notes:
  revision_awareness: 'Revisión más reciente: sin cambios necesarios; acuerdo alto con la auditoría inglesa y sin observaciones textuales que alteren la traducción propuesta.'
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ para el Tetragrámaton, conforme al criterio base del proyecto.
  - Se conserva ‘codornices’ para שַׂלְוִים y no se sustituye por un término más general.
  - La medida ‘codos’ se deja explícita por transparencia formal; la equivalencia moderna queda implícita en la nota.
  - ‘Sobre la superficie de la tierra’ evita decidir indebidamente entre altura, cobertura o profundidad.
  - La puntuación y el uso de comas siguen el ritmo de la oración hebrea y de la versión inglesa auditada.
