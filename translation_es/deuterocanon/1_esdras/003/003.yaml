  text: And they ate and drank[a], and when they were filled, they departed. But Darius the king went into his bedchamber and slept[b], and then awoke.
  footnotes:
  - marker: a
    text: Or 'having had their fill.' The Greek participle ἐμπλησθέντες refers concretely to being full after eating and drinking.
    reason: lexical_alternative
  - marker: b
    text: Or 'withdrew.' The verb ἀνέλυσαν here likely means the company broke up and went away after the meal.
    reason: lexical_alternative
