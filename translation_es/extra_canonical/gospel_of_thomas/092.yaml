translation:
  language: es
  text: 'Jesús dijo[a]: «Busquen, y encontrarán. Pero las cosas[b] por las que me preguntaron[d] en aquellos días, que no les dije aquel día[b], ahora estoy dispuesto a decírselas[c], y ustedes no las buscan[e]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La construcción relativa copta puede entenderse en singular («lo que») o en plural («las cosas que»). El contexto y las referencias pronominales posteriores favorecen el plural; por eso se traduce en plural.
    reason: textual_variant
  - marker: b
    text: La secuencia copta subraya el contraste entre «aquellos días» y «aquel día»; por eso se conserva explícitamente la repetición temporal en español.
    reason: source_note
  - marker: c
    text: La construcción copta ⲉϩⲛⲁ + infinitivo expresa disposición o intención; también podría traducirse «estoy a punto de decírselas».
    reason: lexical_alternative
  - marker: d
    text: El objeto de la pregunta está marcado como materia («por/sobre las cosas preguntadas»), no solo como destinatario; por eso se preserva esa relación en la frase.
    reason: source_note
  - marker: e
    text: 'También es posible ordenar la frase así: «Pero las cosas por las que me preguntaron en aquellos días, que no les dije aquel día, ahora estoy dispuesto a decírselas, y ustedes no las buscan».'
    reason: previous_rendering
lexical_decisions:
- source_word: ϣⲓⲛⲉ
  english_pob_choice: seek
  chosen_spanish: busquen
  alternatives_spanish:
  - busquen con empeño
  - busquen
  lexicon: Crum; Layton
  rationale: El imperativo de búsqueda activa se conserva mejor con «buscar». En plural, «busquen» mantiene el tono sentencioso y breve del dicho.
- source_word: ϭⲓⲛⲉ
  english_pob_choice: find
  chosen_spanish: encontrarán
  alternatives_spanish:
  - hallarán
  - encontrarán
  lexicon: Crum; Layton
  rationale: «Encontrar» es el correlato natural de «buscar» en español y reproduce el par proverbial sin elevar el registro innecesariamente.
- source_word: ⲁⲗⲗⲁ
  english_pob_choice: but
  chosen_spanish: pero
  alternatives_spanish:
  - pero
  - sin embargo
  lexicon: Loan from Greek
  rationale: «Pero» expresa la oposición abrupta con máxima naturalidad en español y preserva la transición contrastiva del original.
- source_word: ⲡⲉⲧⲉⲣⲉ… / ⲛⲉⲧⲁ…
  english_pob_choice: the things that
  chosen_spanish: las cosas acerca de las cuales
  alternatives_spanish:
  - las cosas que
  - aquello acerca de lo cual
  lexicon: Layton (relative converter usage)
  rationale: El contexto plural favorece un referente plural. «Acerca de las cuales» refleja la preposición copt. del asunto preguntado y evita aplanar el matiz de «about them».
- source_word: ϫⲛⲟⲩⲉⲓ
  english_pob_choice: asked
  chosen_spanish: me preguntaron
  alternatives_spanish:
  - me consultaron
  - me inquirieron
  lexicon: Crum; Lambdin
  rationale: «Preguntar» es el equivalente más directo para ϫⲛⲟⲩⲉⲓ. El objeto indirecto «me» respeta la relación verbal indicada por el audit trail.
- source_word: ⲉⲣⲟⲟⲩ
  english_pob_choice: about them
  chosen_spanish: acerca de las cuales
  alternatives_spanish:
  - sobre las cuales
  - respecto de las cuales
  lexicon: Crum
  rationale: La preposición copta marca el tema o materia de la pregunta; en español, «acerca de» conserva ese valor sin sonar arcaico.
- source_word: ⲛⲛⲓϩⲟⲟⲩ / ⲉⲛⲧⲟⲟⲩ ⲛⲡⲓϩⲟⲟⲩ
  english_pob_choice: in those days
  chosen_spanish: en aquellos días
  alternatives_spanish:
  - en esos días
  - en aquellos días
  lexicon: Crum
  rationale: La deíxis temporal se expresa de forma idiomática con «aquellos días», que además mantiene el contraste con «ahora».
- source_word: ⲉⲙ̄ⲡⲓϫⲟⲟⲩ
  english_pob_choice: I did not tell
  chosen_spanish: no les dije
  alternatives_spanish:
  - no se los dije
  - no les dije
  lexicon: Crum; Lambdin
  rationale: «Decirles» reproduce el valor dativo del destinatario. La forma simple mantiene fluidez y fidelidad al doble complemento.
- source_word: ⲉϩⲛⲁ + infinitive
  english_pob_choice: I am willing to tell
  chosen_spanish: estoy dispuesto a decírselas
  alternatives_spanish:
  - quiero decírselas
  - estoy por decírselas
  lexicon: Layton; Lambdin
  rationale: La perífrasis expresa disposición o intención. «Estoy dispuesto a» conserva la prontitud voluntaria documentada por el audit trail y evita forzar una inminencia más fuerte de la que exige el copto.
- source_word: ⲙⲙⲁⲩ
  english_pob_choice: then
  chosen_spanish: aquel día
  alternatives_spanish:
  - entonces
  - aquel día
  lexicon: Crum
  rationale: Aunque la forma puede funcionar temporalmente como «entonces», el contexto y la revisión señalan que aquí forma parte de la expresión «aquel día», que preserva la repetición retórica de «días» y «día».
- source_word: ⲛⲥⲁⲛⲧⲟⲟⲩ / ⲛⲥⲱⲟⲩ
  english_pob_choice: them
  chosen_spanish: las están buscando
  alternatives_spanish:
  - las buscan
  - están buscándolas
  lexicon: Crum
  rationale: El objeto de búsqueda se retoma con pronombre femenino plural porque el antecedente español natural es «las cosas». «Están buscando» mantiene el aspecto progresivo del presente copto/inglés en esta cláusula negativa.
translation_notes:
  revision_awareness: Se incorporó la observación del control de calidad sobre la repetición temporal «en aquellos días / aquel día», y se conservó la relación de asunto en «me preguntaron acerca de» para no aplanar el valor de ⲉⲣⲟⲟⲩ. También se mantuvo la disposición/intención de ⲉϩⲛⲁ sin forzar una inminencia mayor de la que exige el copto.
  spanish_consistency_notes:
  - Se usa «Jesús» para el sujeto divino/histórico, conforme al estándar del proyecto.
  - Se mantiene «buscar/encontrar» como par proverbial, con registro bíblico sobrio y moderno.
  - Se evita «SEÑOR» o terminología eclesiástica ajena al texto, porque este dicho no contiene un nombre divino ni título cristológico adicional.
  - La puntuación intenta reflejar la estructura contrastiva del original con punto y coma antes de la cláusula de transición temporal.
