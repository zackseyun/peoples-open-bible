review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el griego y el rastro POB en casi todos los puntos: invocación a Dios como juez justo, avance contra los asesinos, ataque nocturno al puerto y a las naves, y muerte de los que huyeron allí. La nota alternativa sobre συμφυγόντας también preserva correctamente la posibilidad de ''refugiarse''. La principal desviación está en ἐξεκέντησεν: el griego expresa ''atravesó/pasó con arma punzante'', mientras que «acuchilló» introduce un instrumento más específico del que el texto no da. Además, «llamando a Dios» es comprensible, pero «invocando a Dios» refleja mejor el valor religioso de ἐπικαλεσάμενος en español bíblico-natural.'
  spanish_quality_summary: El texto es claro y natural en español general eclesial. Sin embargo, «se presentó contra» suena algo rígido en este contexto y «acuchilló» resulta más coloquial y más específico de lo necesario. Un ajuste menor mejora fidelidad y registro sin perder fluidez.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto: «Dios» está bien; no aparecen Yahvé/Mesías/u otros términos sensibles. La decisión teológica «Dios, el juez justo» es adecuada y conserva la tensión del pasaje. Se recomienda «invocando a Dios» por mejor correspondencia lexical con ἐπικαλεσάμενος y «atravesó» para ἐξεκέντησεν.'
  issues:
  - severity: medium
    issue: «acuchilló» para ἐξεκέντησεν es demasiado específico
    rationale: El griego indica herir atravesando con arma punzante, pero no especifica cuchillo. «Acuchilló» puede restringir indebidamente la imagen; «atravesó» o «los atravesó» preserva mejor el sentido.
  - severity: low
    issue: «llamando a Dios» es menos idiomático para una invocación religiosa
    rationale: Aunque entendible, en español bíblico-natural «invocando a Dios» comunica mejor una apelación solemne dirigida a Dios antes de actuar.
  - severity: low
    issue: «se presentó contra» suena algo poco natural en contexto militar
    rationale: Una opción como «fue contra» o «avanzó contra» fluye mejor en español sin alterar el sentido de movimiento hostil.
  revised_spanish_text: E invocando a Dios[a], el juez justo, fue contra los asesinos de sus hermanos; de noche incendió el puerto y quemó los barcos, y atravesó a los que habían huido allí.
  revised_footnotes:
  - marker: a
    text: O «los que se habían refugiado allí». El participio griego puede subrayar que huyeron a un lugar de refugio.
    reason: lexical_alternative
  revision_rationale: 'Revisión menor para afinar la fidelidad léxica y el registro español: «invocando» refleja mejor la apelación religiosa a Dios; «fue contra» suena más natural que «se presentó contra»; y «atravesó» evita especificar indebidamente un cuchillo, preservando mejor el valor de ἐξεκέντησεν.'
