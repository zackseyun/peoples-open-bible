translation:
  language: es
  text: Y todo Israel[a], con sus ancianos, oficiales y jueces, estaba de este lado y de aquel lado del arca, frente a los sacerdotes levitas llevando el arca del pacto de Yahvé, tanto el forastero residente[b] como el nativo por igual. La mitad de ellos estaba delante del monte Gerizim y la otra mitad delante del monte Ebal, tal como Moisés, siervo de Yahvé, había mandado al principio[c], para bendecir al pueblo de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "todo el Israel". La expresión hebrea tiene sentido colectivo y puede leerse como "la totalidad de Israel".'
    reason: lexical_alternative
  - marker: b
    text: 'O: "el residente extranjero" o "el extranjero residente". La frase traduce la categoría del גֵּר, que indica a alguien no nativo pero integrado en la comunidad.'
    reason: lexical_alternative
  - marker: c
    text: Hebreo "al principio"; la frase puede significar "como primer acto" o referirse al mandato anterior de Moisés acerca de la bendición.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכָל יִשְׂרָאֵל
  english_pob_choice: And all Israel
  chosen_spanish: Y todo Israel
  alternatives_spanish:
  - Y todo el Israel
  - Y la totalidad de Israel
  lexicon: HALOT
  rationale: La expresión designa al pueblo como colectividad. En español, 'todo Israel' conserva la fuerza corporativa natural sin introducir una perífrasis innecesaria.
- source_word: וּזְקֵנָיו
  english_pob_choice: with its elders
  chosen_spanish: con sus ancianos
  alternatives_spanish:
  - con sus mayores
  - con sus ancianos propios
  lexicon: HALOT
  rationale: El sufijo posesivo remite a Israel como sujeto colectivo; 'sus ancianos' comunica esa pertenencia y mantiene el paralelismo con los otros grupos mencionados.
- source_word: וְשֹׁטְרִים
  english_pob_choice: officers
  chosen_spanish: oficiales
  alternatives_spanish:
  - inspectores
  - alguaciles
  lexicon: HALOT
  rationale: En este contexto administrativo y judicial, 'oficiales' es claro en español y evita una connotación policial moderna que sería demasiado restrictiva.
- source_word: וְשֹׁפְטָיו
  english_pob_choice: judges
  chosen_spanish: jueces
  alternatives_spanish:
  - magistrados
  lexicon: HALOT
  rationale: La forma denota líderes con función judicial; 'jueces' es la correspondencia directa y más transparente.
- source_word: עֹמְדִים
  english_pob_choice: was standing
  chosen_spanish: estaba
  alternatives_spanish:
  - estaban
  - se hallaba
  lexicon: HALOT
  rationale: El participio describe la postura del pueblo en conjunto. En español, el singular colectivo 'todo Israel' permite 'estaba' sin perder el sentido distributivo.
- source_word: מִזֶּה וּמִזֶּה לָאָרוֹן
  english_pob_choice: on this side and on that side of the ark
  chosen_spanish: de este lado y de aquel lado del arca
  alternatives_spanish:
  - a un lado y al otro del arca
  - a ambos lados del arca
  lexicon: HALOT
  rationale: La repetición hebrea se conserva en una forma espacial natural en español; 'de este lado y de aquel lado' reproduce el paralelismo sin sonar forzado.
- source_word: נֶגֶד
  english_pob_choice: opposite
  chosen_spanish: frente a
  alternatives_spanish:
  - opuesto a
  - en frente de
  lexicon: HALOT
  rationale: '''Frente a'' comunica la posición ceremonial y visual ante el arca y los sacerdotes; en español es más fluido que un calco rígido.'
- source_word: הַכֹּהֲנִים הַלְוִיִּם
  english_pob_choice: the Levitical priests
  chosen_spanish: los sacerdotes levitas
  alternatives_spanish:
  - los sacerdotes de Levi
  - los levitas sacerdotes
  lexicon: HALOT
  rationale: La apposición hebrea se expresa de manera natural en español como 'sacerdotes levitas', manteniendo que se trata de sacerdotes pertenecientes a Leví.
- source_word: נֹשְׂאֵי אֲרוֹן בְּרִית יְהוָה
  english_pob_choice: carrying the ark of the covenant of Yahweh
  chosen_spanish: que llevaban el arca del pacto de Yahvé
  alternatives_spanish:
  - que portaban el arca del pacto de Yahvé
  - llevando el arca del pacto de Yahvé
  lexicon: HALOT
  rationale: El participio se traduce con una relativa explícita para claridad. 'Llevaban' es preciso y directo; 'arca del pacto' preserva la fórmula convencional del texto fuente.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Tetragramatón: transliteración del nombre divino, no sustitución por un título. ''Yahvé'' es la forma adoptada en el texto principal español.'
- source_word: כַּגֵּר כָּאֶזְרָח
  english_pob_choice: both the sojourner and the native-born alike
  chosen_spanish: tanto el forastero residente como el nativo por igual
  alternatives_spanish:
  - tanto el residente extranjero como el nativo por igual
  - tanto el extranjero residente como el nacido en la tierra
  lexicon: HALOT
  rationale: '''Forastero residente'' conserva la categoría social/covenantal del גֵּר sin borrar su condición de no nativo; ''por igual'' expresa la inclusión sin jerarquía de ambos grupos.'
- source_word: חֶצְיוֹ ... וְהַחֶצְיוֹ
  english_pob_choice: Half of them ... and half of them
  chosen_spanish: La mitad de ellos ... la otra mitad
  alternatives_spanish:
  - La mitad ... y la otra mitad
  - Una mitad ... y la otra mitad
  lexicon: HALOT
  rationale: El referente son los grupos del pueblo; 'de ellos' evita ambigüedad en español y conserva la división simétrica del hebreo.
- source_word: אֶל מוּל
  english_pob_choice: in front of
  chosen_spanish: delante de
  alternatives_spanish:
  - frente a
  - ante
  lexicon: HALOT
  rationale: En la relación con los montes, 'delante de' conserva la orientación espacial de manera sobria y natural.
- source_word: הַר גְּרִזִים ... הַר עֵיבָל
  english_pob_choice: Mount Gerizim ... Mount Ebal
  chosen_spanish: el monte Gerizim ... el monte Ebal
  alternatives_spanish:
  - monte Gerizim ... monte Ebal
  lexicon: HALOT
  rationale: Se mantiene la transliteración de los topónimos con el artículo castellano usual para montes singulares.
- source_word: כַּאֲשֶׁר צִוָּה
  english_pob_choice: just as ... had commanded
  chosen_spanish: tal como ... había mandado
  alternatives_spanish:
  - tal como ... había ordenado
  - como ... había mandado
  lexicon: HALOT
  rationale: '''Tal como'' reproduce la conformidad del hebreo; ''había mandado'' conserva el matiz normativo de צוה.'
- source_word: מֹשֶׁה עֶבֶד יְהוָה
  english_pob_choice: Moses the servant of Yahweh
  chosen_spanish: Moisés, siervo de Yahvé
  alternatives_spanish:
  - Moisés, el siervo de Yahvé
  - Moisés, esclavo de Yahvé
  lexicon: HALOT
  rationale: Aquí 'siervo' es la fórmula honorífica estable y fiel al contexto; 'esclavo' sería demasiado fuerte para esta designación fija de Moisés.
- source_word: לְבָרֵךְ
  english_pob_choice: to bless
  chosen_spanish: para bendecir
  alternatives_spanish:
  - para dar bendición a
  - para bendecir a
  lexicon: HALOT
  rationale: El infinitivo expresa finalidad. 'Bendecir' es el verbo normal en español para ברך en este contexto ceremonial.
- source_word: בָּרִאשֹׁנָה
  english_pob_choice: at the first
  chosen_spanish: al principio
  alternatives_spanish:
  - primero
  - en primer lugar
  - como acto primero
  lexicon: HALOT
  rationale: La frase hebrea es algo ambigua; 'al principio' preserva la posibilidad de referirse al comienzo de la acción o al mandato previo sin forzar una interpretación.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  - Yahveh
  rationale: El texto hebreo usa el Tetragramatón de forma explícita. Siguiendo la norma del proyecto, se translitera el nombre divino en lugar de sustituirlo por un título, preservando la referencia personal y pactal.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Inclusión de גֵּר y אֶזְרָח
  english_pob_reading: the sojourner and the native-born alike
  chosen_spanish_reading: el forastero residente ... el nativo por igual
  alternative_spanish_readings:
  - el extranjero residente ... el nativo
  - el forastero y el nacido en la tierra
  rationale: La línea subraya una inclusión simétrica en la asamblea. 'Forastero residente' conserva la tensión entre extranjería y permanencia; 'por igual' evita convertir la frase en una clasificación jerárquica.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §6
translation_notes:
  revision_awareness: La redacción española sigue la última revisión inglesa, que ajustó el participio a una estructura más directa ('carrying'). Por eso se prefirió 'que llevaban' en lugar de una perífrasis más pesada. También se preservó la ambigüedad de בָּרִאשֹׁנָה con 'al principio', en paralelo al audit trail inglés.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יְהוָה, conforme a la convención del proyecto.
  - Se usa 'arca del pacto' como fórmula estable y transparente.
  - Se conserva la simetría espacial ('de este lado y de aquel lado', 'la mitad ... la otra mitad') para reflejar el hebreo.
  - '''Forastero residente'' se emplea de manera consistente para גֵּר, evitando ''extranjero'' sin matiz comunitario.'
  - '''Siervo'' se reserva para עֶבֶד en el título fijo de Moisés, no para un uso servil literal.'
