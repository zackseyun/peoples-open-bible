revisions:
- from: Siéntate en silencio[a], y entra en tinieblas, hija de los caldeos; porque ya no seguirán llamándote dueña[b] de reinos.
  to: Siéntate en silencio y entra en tinieblas, hija de los caldeos; porque ya no te llamarán dueña[a] de reinos.
  rationale: Se elimina la nota impropia sobre «en silencio», se simplifica la cláusula final a «ya no te llamarán» para reflejar mejor el hebreo y el inglés POB, y se conserva la nota léxica pertinente en «dueña[a]», alineada con la alternativa inglesa 'lady of kingdoms'.
