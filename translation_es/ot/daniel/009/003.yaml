review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura principal del hebreo: el giro intencional de Daniel hacia Dios, la finalidad expresada por el infinitivo, y la serie de prácticas de humillación. También mantiene correctamente el doble título אֲדֹנָי הָאֱלֹהִים como «Señor Dios», sin introducir «Yahvé» donde no aparece. Sin embargo, «para buscar oración y súplicas» suena poco natural en español y no comunica con claridad la finalidad de la acción; además, la nota [b] no corresponde al término elegido en el texto, porque el texto ya usa «súplicas» y la nota propone otra vez «súplicas».'
  spanish_quality_summary: La redacción es mayormente digna y legible, pero necesita un ajuste menor para lograr español natural y fiel. «Volví mi rostro» es aceptable, aunque «volví mi rostro hacia» mejora la idiomaticidad. El problema principal es «para buscar oración y súplicas», que en español suena forzado; «para buscar con oración y súplicas» expresa mejor la función instrumental/circunstancial sin alejarse demasiado del hebreo ni del rastro de auditoría. También conviene usar «cenizas» en plural por naturalidad en esta expresión fija. La nota [b] debe corregirse para ofrecer una alternativa real, por ejemplo «ruegos».
  glossary_alignment: 'Alineación buena en términos clave: «Señor Dios» para אֲדֹנָי הָאֱלֹהִים es correcta; no hay YHWH aquí. «Oración» para תְּפִלָּה y «cilicio» para שַׂק son apropiados. «Súplicas» para תַחֲנוּנִים es válida, aunque la alternativa en nota debe ser distinta. No hay conflicto relevante con la terminología doctrinal del proyecto.'
  issues:
  - severity: medium
    issue: «para buscar oración y súplicas» es español poco natural y semánticamente opaco
    rationale: Aunque intenta seguir de cerca la revisión inglesa, en español «buscar oración» no comunica bien la finalidad. Añadir «con» produce una frase clara y sigue representando la búsqueda por medio de oración y súplicas.
  - severity: medium
    issue: La nota [b] no ofrece una alternativa real al texto
    rationale: 'El texto principal ya dice «súplicas», pero la nota dice «O: “súplicas”», lo que la vuelve inútil. Debe ofrecer una alternativa distinta, como «ruegos».'
  - severity: low
    issue: «ceniza» singular suena menos idiomático en esta tríada penitencial
    rationale: En español bíblico y general, «cilicio y cenizas» es la colocación más natural para este contexto ritual.
  revised_spanish_text: Así que volví mi rostro hacia el Señor Dios[a], para buscar con oración y súplicas[b], con ayuno, cilicio y cenizas.
