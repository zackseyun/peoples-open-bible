review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite correctamente la secuencia narrativa, la imposibilidad de beber, la causa de la amargura y la explicación etiológica del nombre. Sin embargo, hay dos ajustes necesarios para mayor fidelidad y naturalidad: «Mará» debería mantenerse como «Marah» para respetar la transliteración del topónimo usada en el expediente fuente, y «se le puso por nombre» es menos natural que una pasiva refleja simple para la construcción impersonal hebrea.'
  spanish_quality_summary: El texto es claro y legible, con buen español general. «Entonces llegaron… pero no pudieron…» funciona bien. No obstante, «Mará» introduce una hispanización no exigida por el proyecto y debilita la consistencia con el expediente auditado; además, la nota «amarga» puede sonar demasiado feminizada por concordancia española, mientras que la explicación léxica se entiende mejor con el valor general «amargo». «Se le puso por nombre» es comprensible, pero «fue llamado» o «se llamó» resulta más limpio y digno.
  glossary_alignment: 'No hay términos teológicos mayores en juego. El principal asunto terminológico es el topónimo מָרָה: conviene conservar «Marah» en el texto principal, como en el English POB, y explicar en nota la semejanza con el hebreo para «amargo».'
  issues:
  - severity: medium
    issue: El topónimo aparece como «Mará» en lugar de «Marah».
    rationale: El expediente fuente translitera el nombre como «Marah» y basa en ello el juego de palabras con «bitter». Cambiar a «Mará» no mejora decisivamente la comprensión y rompe la alineación con el audit trail y la política de transliteración de nombres propios en este caso.
  - severity: low
    issue: La nota dice «para “amarga”» en lugar de una formulación más léxicamente general.
    rationale: La conexión etimológica es con la raíz/voz hebrea para «amargo/bitter», no específicamente con el femenino singular español exigido por «agua». Una nota más neutral evita que la gramática española distorsione la explicación lexical.
  - severity: low
    issue: «Se le puso por nombre» suena algo pesado.
    rationale: Aunque fiel en sentido, una pasiva más directa como «fue llamado» representa bien la construcción impersonal hebrea y suena más natural en español bíblico moderno.
  revised_spanish_text: Entonces llegaron a Marah[a], pero no pudieron beber el agua de Marah, porque era amarga. Por eso fue llamado Marah.
  revised_footnotes:
  - marker: a
    text: Marah suena parecido a la palabra hebrea para «amargo».
    reason: lexical_alternative
  revision_rationale: Se ajusta el topónimo a «Marah» para conservar la transliteración documentada y el vínculo con el juego de palabras del hebreo. También se simplifica la cláusula de nombramiento con una pasiva natural en español y se afina la nota para reflejar mejor la explicación léxica sin forzar la concordancia de género española.
