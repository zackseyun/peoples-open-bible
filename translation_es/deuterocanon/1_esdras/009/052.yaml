translation:
  language: es
  text: Porque el día es santo para Yahvé[a], y no se entristezcan; porque Yahvé los glorificará.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El paralelo hebreo de Nehemías 8:10 difiere aquí y dice aproximadamente: «porque el gozo de Yahvé es vuestra fuerza». El griego de 1 Esdras, en cambio, dice: «porque Yahvé los glorificará».'
    reason: alternative_reading
lexical_decisions:
- source_word: ἁγία
  english_pob_choice: holy
  chosen_spanish: santo
  alternatives_spanish:
  - sagrado
  - consagrado
  lexicon: BDAG / uso bíblico
  rationale: En español, 'santo' comunica de manera natural la idea de consagrado, apartado para Dios, y corresponde bien al griego ἁγία y al paralelo hebreo קָדֹשׁ. 'Sagrado' sería posible, pero suena menos bíblico y menos directo aquí.
- source_word: ἡ ἡμέρα
  english_pob_choice: the day
  chosen_spanish: el día
  alternatives_spanish:
  - este día
  lexicon: BDAG
  rationale: La frase es simple y directa; 'el día' reproduce sin sobreinterpretación el sintagma nominal griego.
- source_word: τῷ κυρίῳ
  english_pob_choice: to the Lord
  chosen_spanish: para Yahvé
  alternatives_spanish:
  - del Señor
  - al Señor
  lexicon: BDAG / doctrina del nombre divino
  rationale: Aunque el inglés auditado usa 'Lord', el proyecto español pide 'Yahvé' para יהוה. El dativo griego expresa dedicación o pertenencia; 'para Yahvé' conserva esa relación de consagración en español con buena naturalidad. Se evita 'SEÑOR' como máscara.
- source_word: μὴ λυπεῖσθε
  english_pob_choice: do not be grieved
  chosen_spanish: no os entristezcáis
  alternatives_spanish:
  - no os aflijáis
  - no tengáis tristeza
  lexicon: BDAG
  rationale: λυπέω aquí expresa aflicción/pena real. 'No os entristezcáis' conserva el peso emocional sin sonar artificial. 'No os aflijáis' también sería válido, pero 'entristecerse' es más claro en español actual.
- source_word: δοξάσει
  english_pob_choice: will glorify
  chosen_spanish: glorificará
  alternatives_spanish:
  - honrará
  - os dará gloria
  lexicon: BDAG
  rationale: El verbo pertenece al campo de la gloria/honor. 'Glorificará' sigue de cerca el griego y mantiene la tensión del texto frente al paralelo hebreo, que no debe armonizarse en la traducción principal.
- source_word: ὑμᾶς
  english_pob_choice: you
  chosen_spanish: os
  alternatives_spanish:
  - a vosotros
  - les
  lexicon: BDAG
  rationale: El objeto plural de segunda persona se expresa naturalmente con 'os' en el registro bíblico español, manteniendo claridad y pluralidad.
theological_decisions:
- issue: Tratamiento del nombre divino en τῷ κυρίῳ
  english_pob_reading: Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  rationale: La política española del proyecto establece 'Yahvé' para el nombre divino. Aunque el griego dice κύριος, el contexto del AT y la tradición textual apuntan al nombre divino subyacente; por eso se traduce con el nombre propio, no con una máscara reverencial.
  doctrine_reference: 'DOCTRINE.md Contested terms: divine name rendering'
- issue: Diferencia con el paralelo hebreo de Nehemías 8:10
  english_pob_reading: 'Translate the Greek clause as written: ''the Lord will glorify you'''
  chosen_spanish_reading: 'Traducir el griego tal como está: ''Yahvé os glorificará'''
  alternative_spanish_readings:
  - 'armonizar con el paralelo hebreo: ''porque el gozo de Yahvé es vuestra fuerza'''
  rationale: 1 Esdras se traduce desde el griego de Swete como texto base. El paralelo hebreo sirve de control, pero no sustituye la lección griega cuando diverge. Aquí el verbo δοξάσει exige 'glorificará', no una armonización con 'fuerza'.
  doctrine_reference: 'PHILOSOPHY.md: Greek source priority for deuterocanonical books; Hebrew parallels are cross-checks'
translation_notes:
  revision_awareness: El texto griego base coincide plenamente con el audit trail inglés y no requiere ajustes. La única decisión sensible es la diferencia con el paralelo hebreo de Nehemías 8:10, que se mantiene como nota en lugar de armonizar el versículo.
  spanish_consistency_notes:
  - Se usó 'Yahvé' de forma consistente para el nombre divino, conforme al proyecto español.
  - Se evitó 'Señor' en el texto principal para no introducir la convención de máscara no requerida por la política española.
  - '''Glorificará'' conserva el verbo del griego y evita conflar con el paralelo hebreo de Nehemías.'
