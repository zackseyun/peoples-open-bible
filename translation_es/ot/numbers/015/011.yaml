    rationale: Aunque intentan reflejar הָאֶחָד, en español resultan toscas. «Para un toro» y «para un carnero» transmiten la aplicación singular de la norma con mejor legibilidad y sin pérdida relevante de sentido.
  - severity: medium
    issue: Las notas al pie sobre שֶׂה están duplicadas
    rationale: Las dos notas dicen esencialmente lo mismo. El inglés POB preserva una sola nota léxica; en español debe mantenerse una sola nota para evitar redundancia editorial.
  - severity: medium
    issue: La marca [a] está anclada a «toro» pero la nota trata sobre שֶׂה / «cordero»
    rationale: La ancla debe aparecer en el término al que explica la nota para que el aparato crítico sea exacto y usable.
