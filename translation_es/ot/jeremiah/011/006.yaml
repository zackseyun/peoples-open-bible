base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/011/006.yaml
  text: 'And Yahweh said to me[a], “Proclaim all these words in the cities of Judah and in the streets of Jerusalem[b], saying: Hear the words of this covenant and do them.”'
  footnotes:
  - marker: a
    text: Or 'in the squares of Jerusalem'; the Hebrew refers to public open places within the city.
    reason: lexical_alternative
  - marker: b
    text: '''Hear'' could also be rendered ''listen to.'' Some translations interpret it as ''obey,'' but the next clause already states the call to action explicitly: ''and do them.'''
    reason: lexical_alternative
