translation:
  language: es
  text: Que nuestros hijos varones sean como plantas bien crecidas en su juventud[a], y nuestras hijas como columnas de esquina talladas conforme al diseño de un palacio[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'como plantas crecidas'.
    reason: previous_rendering
  - marker: b
    text: O 'templo'; el hebreo puede referirse a un palacio, a un templo o a un gran salón.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲשֶׁר
  english_pob_choice: May
  chosen_spanish: ¡Ojalá que
  alternatives_spanish:
  - Que
  - May
  lexicon: HALOT
  rationale: El hebreo introduce aquí un deseo o bendición, no solo una relativa. En español, «¡Ojalá que» comunica con naturalidad el valor optativo sin perder el tono orante.
- source_word: בָּנֵינוּ
  english_pob_choice: our sons
  chosen_spanish: nuestros hijos
  alternatives_spanish:
  - nuestros hijos varones
  - nuestros varones
  lexicon: HALOT
  rationale: El hebreo dice literalmente «nuestros hijos/nuestros varones», y el paralelismo con «nuestras hijas» permite en español una forma natural y clara. «Hijos» aquí conserva el referente masculino general del paralelismo poético sin resultar forzado.
- source_word: כִּנְטִעִים
  english_pob_choice: like plants
  chosen_spanish: como plantas
  alternatives_spanish:
  - como plantíos
  - como brotes
  lexicon: HALOT
  rationale: La imagen es agrícola y de crecimiento plantado. «Plantas» reproduce bien la comparación sin estrecharla a árboles o retoños.
- source_word: מְגֻדָּלִים
  english_pob_choice: well-grown
  chosen_spanish: bien crecidas
  alternatives_spanish:
  - crecidas
  - bien desarrolladas
  - hechas grandes
  lexicon: HALOT
  rationale: El participio pasivo expresa haber sido hechas crecer o haber prosperado. «Bien crecidas» conserva la idea de madurez lograda y suena natural en español poético.
- source_word: בִּנְעוּרֵיהֶם
  english_pob_choice: in their youth
  chosen_spanish: en su juventud
  alternatives_spanish:
  - desde su juventud
  - en sus años jóvenes
  lexicon: HALOT
  rationale: La frase temporal ubica el florecimiento en la etapa juvenil. En español, «en su juventud» es idiomático y mantiene el valor temporal del hebreo.
- source_word: בְּנוֹתֵינוּ
  english_pob_choice: our daughters
  chosen_spanish: nuestras hijas
  alternatives_spanish:
  - nuestras muchachas
  lexicon: HALOT
  rationale: El sustantivo designa específicamente hijas; «hijas» es el equivalente directo y conserva el paralelismo exacto con la primera mitad del verso.
- source_word: כְזָוִיּוֹת
  english_pob_choice: like corner pillars
  chosen_spanish: como columnas de esquina
  alternatives_spanish:
  - como pilares de esquina
  - como columnas angulares
  - como pilares angulares
  lexicon: HALOT
  rationale: La imagen arquitectónica apunta a soportes de esquina, de presencia prominente. «Columnas de esquina» preserva el sentido espacial y la función ornamental/estructural sin introducir una precisión técnica no requerida.
- source_word: מְחֻטָּבוֹת
  english_pob_choice: carved
  chosen_spanish: labradas
  alternatives_spanish:
  - talladas
  - esculpidas
  - cinceladas
  lexicon: HALOT
  rationale: El participio pasivo comunica algo trabajado por corte o talla. «Labradas» es un término español digno y flexible para una imagen de ornamentación arquitectónica.
- source_word: תַּבְנִית
  english_pob_choice: in the pattern of
  chosen_spanish: según el modelo de
  alternatives_spanish:
  - con el diseño de
  - con la forma de
  - a semejanza de
  lexicon: HALOT
  rationale: El término indica forma, patrón o diseño. «Según el modelo de» expresa la idea de conformidad con un patrón arquitectónico de manera clara y sobria.
- source_word: הֵיכָל
  english_pob_choice: a palace
  chosen_spanish: un palacio
  alternatives_spanish:
  - un templo
  - un gran salón
  lexicon: HALOT
  rationale: El término puede significar palacio o templo. En este contexto de prosperidad doméstica y social, «palacio» comunica mejor la grandeza arquitectónica sin imponer un matiz cultual que el hebreo no exige aquí.
theological_decisions:
- issue: Alcance de la imagen de הֵיכָל en la comparación de las hijas
  english_pob_reading: non-cultic 'palace' imagery
  chosen_spanish_reading: imagen no cultual de «palacio»
  alternative_spanish_readings:
  - imagen cultual de «templo»
  rationale: El verso describe prosperidad familiar con imágenes paralelas de crecimiento y belleza arquitectónica. Mantener «palacio» evita cargar el texto con una referencia al culto que no es necesaria en el contexto inmediato, aunque la acepción «templo» siga siendo posible léxicamente.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'Se siguió el último pase de revisión del audit trail: se mantuvo el orden natural del complemento temporal («en su juventud») y la elección de «modelo»/«palacio» en un registro más cercano al hebreo, pero en español se optó por una formulación más fluida («según el modelo de un palacio»). También se integró la resolución optativa del arranque del verso mediante una construcción exhortativa idiomática.'
  spanish_consistency_notes:
  - Se usó un registro bíblico moderno y digno, evitando calcos como «plantas crecidas» si sonaban forzados.
  - Se preservó la metáfora arquitectónica de las hijas sin sustituirla por una equivalencia más interpretativa.
  - Se mantuvo «palacio» como opción principal y se señaló la alternativa «templo» en nota, siguiendo la ambigüedad documentada del hebreo.
  - Se escogió «hijos» para una lectura natural del paralelismo, pero la nota reconoce que el hebreo usa un término masculino específico.
  - La puntuación y el orden sintáctico siguen el flujo poético del hebreo con un arranque optativo claro en español.
