translation:
  language: es
  text: Mira, en esto no tienes razón; te responderé, porque Dios es mayor que el hombre[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «que un mortal». El hebreo אֱנוֹשׁ suele resaltar la fragilidad humana.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֶן
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira bien
  - Observa
  - Fíjate
  lexicon: HALOT
  rationale: La partícula introduce atención enfática. «Mira» comunica el llamado discursivo de forma natural y digna en español, conservando el énfasis del original sin sonar arcaica.
- source_word: זֹאת
  english_pob_choice: in this
  chosen_spanish: en esto
  alternatives_spanish:
  - en esta cosa
  - en este asunto
  - esto
  lexicon: HALOT
  rationale: El demostrativo apunta al asunto en discusión. «En esto» mantiene la referencia al tema inmediato y suena idiomático en español.
- source_word: לֹא צָדַקְתָּ
  english_pob_choice: you are not right
  chosen_spanish: no estás en lo correcto
  alternatives_spanish:
  - no tienes razón
  - no estás justo
  - no has sido justo
  lexicon: HALOT
  rationale: Aquí צדק expresa estar en lo correcto dentro de una disputa, no justicia moral general. «No estás en lo correcto» preserva ese valor forense/argumentativo mejor que «justo» o «righteous».
- source_word: אֶעֱנֶךָּ
  english_pob_choice: I will answer you
  chosen_spanish: yo te responderé
  alternatives_spanish:
  - te responderé
  - yo te contestaré
  lexicon: HALOT
  rationale: El imperfecto con sufijo expresa respuesta futura. «Responderé» es claro y formal; el pronombre explícito «yo» refleja el énfasis del hablante y el flujo discursivo.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  - porque es que
  lexicon: HALOT
  rationale: La conjunción introduce la razón de la respuesta. «Porque» reproduce directamente la relación causal indicada en el texto y evita una puntuación que diluya esa conexión.
- source_word: יִרְבֶּה
  english_pob_choice: is greater
  chosen_spanish: es mayor
  alternatives_spanish:
  - es más grande
  - supera en grandeza
  - es superior
  lexicon: HALOT
  rationale: El verbo, con el comparativo, expresa superioridad relativa. «Es mayor» es la equivalencia comparativa más natural y fiel en español.
- source_word: אֱלֹהַ
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  - Dios Todopoderoso
  lexicon: HALOT
  rationale: El título divino se traduce de forma directa como «Dios», que es el equivalente estándar y claro en español.
- source_word: מֵאֱנוֹשׁ
  english_pob_choice: than man
  chosen_spanish: que el hombre
  alternatives_spanish:
  - que un mortal
  - que el ser humano
  - que la humanidad
  lexicon: HALOT
  rationale: El comparativo מן con אֱנוֹשׁ contrasta a Dios con el ser humano frágil. «Que el hombre» preserva el singular genérico del hebreo y la forma comparativa natural en español; «mortal» queda como alternativa válida por el matiz de fragilidad humana.
theological_decisions:
- issue: Valor de אֱנוֹשׁ como contraste entre Dios y la fragilidad humana
  english_pob_reading: man / a mortal
  chosen_spanish_reading: el hombre
  alternative_spanish_readings:
  - un mortal
  - el ser humano
  - la humanidad
  rationale: El hebreo usa un singular genérico que contrasta la grandeza divina con la limitación humana. «El hombre» conserva esa forma y el paralelismo directo del versículo; se evita suavizarlo innecesariamente con una abstracción más neutra.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del inglés POB que cambió la puntuación y dejó 'for' para reflejar mejor כִּי como introducción causal. En español se optó por 'porque' para conservar esa misma relación causal sin depender de una puntuación explicativa menos natural.
  spanish_consistency_notes:
  - Se mantuvo «Dios» para אֱלוֹהַ, conforme al estándar del proyecto.
  - Se eligió «el hombre» para אֱנוֹשׁ para conservar el contraste singular genérico y la fuerza del paralelismo.
  - Se evitó «SEÑOR» y cualquier sustitución litúrgica no apoyada por el hebreo de este versículo.
  - La puntuación separa las dos proposiciones conforme al flujo argumentativo del hebreo y a la revisión inglesa auditada.
