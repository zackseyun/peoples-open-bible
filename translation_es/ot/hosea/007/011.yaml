translation:
  language: es
  text: Efraín se ha vuelto como una paloma boba, sin entendimiento[a]; llaman a Egipto, se van a Asiria.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «sin corazón»; en hebreo es un modismo que significa sin entendimiento o sin discernimiento.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: has become
  chosen_spanish: se ha vuelto
  alternatives_spanish:
  - se hizo
  - ha llegado a ser
  lexicon: HALOT
  rationale: El hebreo con waw consecutiva introduce un estado resultante. En español, «se ha vuelto» comunica bien ese cambio de condición con valor presente, de modo natural y sin perder el matiz aspectual.
- source_word: אֶפְרַיִם
  english_pob_choice: Ephraim
  chosen_spanish: Efraín
  alternatives_spanish:
  - Israel
  lexicon: HALOT
  rationale: Se conserva el nombre propio tal como aparece en el texto hebreo. Aunque funciona metonímicamente para el reino del norte, la referencia explícita es «Efraín», no una glosa interpretativa.
- source_word: כְּיוֹנָה
  english_pob_choice: like a dove
  chosen_spanish: como una paloma
  alternatives_spanish:
  - como una dove
  lexicon: HALOT
  rationale: «Paloma» es el equivalente natural y bíblico en español para יוֹנָה en este símil; mantiene la imagen sin forzar un calco.
- source_word: פוֹתָה
  english_pob_choice: silly
  chosen_spanish: boba
  alternatives_spanish:
  - simple
  - ingenua
  - fácil de engañar
  lexicon: HALOT
  rationale: El término hebreo expresa ingenuidad o facilidad para ser engañado. «Boba» conserva el tono profético de reprensión con un registro comprensible en español, sin intensificar demasiado hacia «estúpida» ni suavizarlo demasiado con «simple».
- source_word: אֵין לֵב
  english_pob_choice: without sense
  chosen_spanish: sin entendimiento
  alternatives_spanish:
  - sin corazón
  - sin sentido
  - insensata
  lexicon: HALOT
  rationale: Literalmente es «no hay corazón», pero en hebreo «corazón» designa entendimiento o juicio. «Sin entendimiento» comunica el sentido idiomático con claridad y evita que el lector lo reduzca solo a afecto o emoción.
- source_word: מִצְרַיִם
  english_pob_choice: Egypt
  chosen_spanish: Egipto
  lexicon: HALOT
  rationale: Nombre geográfico estándar en español.
- source_word: קָרָאוּ
  english_pob_choice: they call to
  chosen_spanish: llaman a
  alternatives_spanish:
  - claman a
  - acuden a
  lexicon: HALOT
  rationale: El verbo indica recurrir a Egipto en busca de ayuda o alianza. «Llaman a» conserva brevedad y cercanía al hebreo, sin imponer un matiz devocional que no está explícito en el contexto.
- source_word: אַשּׁוּר
  english_pob_choice: Assyria
  chosen_spanish: Asiria
  alternatives_spanish:
  - Asur
  lexicon: HALOT
  rationale: En este contexto geopolítico, «Asiria» es la forma clara y establecida en español. «Asur» reflejaría más de cerca la forma hebrea, pero resultaría menos transparente para el lector general.
- source_word: הָלָכוּ
  english_pob_choice: they go
  chosen_spanish: se van
  alternatives_spanish:
  - van
  - han ido
  lexicon: HALOT
  rationale: El verbo describe movimiento hacia Asiria en una escena profética vivida. «Se van» reproduce bien la dinámica presente/iterativa del hebreo y suena natural en español.
theological_decisions:
- issue: Sentido de אֵין לֵב como acusación de falta de discernimiento
  english_pob_reading: without sense; literally, 'without heart,' an idiom meaning without understanding or sense.
  chosen_spanish_reading: sin entendimiento; literalmente, «sin corazón», un modismo de falta de discernimiento.
  alternative_spanish_readings:
  - sin corazón
  - sin sentido
  - insensata
  rationale: Se preserva el sentido idiomático principal y, si se desea, la nota puede explicar que «corazón» en hebreo puede referirse al centro de la comprensión y el juicio. Así se evita perder la tensión entre literalidad y modismo.
  doctrine_reference: Lexical idiom and semantic domain of לֵב in Hebrew anthropology.
- issue: Referente corporativo de Efraín
  english_pob_reading: Ephraim is retained as the named entity, implicitly representing the northern kingdom.
  chosen_spanish_reading: Efraín se mantiene como nombre propio, con referencia implícita al reino del norte.
  alternative_spanish_readings:
  - Israel
  - el reino del norte
  rationale: No se sustituye el nombre por una interpretación explicativa en el texto principal. La identificación corporativa queda sugerida por el contexto profético, respetando la forma del original.
  doctrine_reference: 'Translation philosophy: names retained where the source names them; interpretation kept out of main text when not required.'
translation_notes:
  revision_awareness: Se siguió el cierre de revisión más reciente, con acuerdo alto y sin cambios necesarios; la redacción española se ajusta al mismo sentido base sin introducir reinterpretaciones.
  spanish_consistency_notes:
  - Se mantuvo el nombre propio «Efraín» en lugar de «Israel», conforme al hebreo y al criterio POB de preservar nombres cuando el texto los usa explícitamente.
  - «Asiria» se eligió por claridad geopolítica en español, equivalente al uso inglés auditado.
  - La nota al pie conserva la tensión entre la imagen literal «sin corazón» y el sentido idiomático de falta de entendimiento.
  - El registro es bíblico y contemporáneo, evitando calcos innecesarios como «corazón» en el cuerpo principal donde sonaría menos natural en español.
