revisions:
- from: Reúnan al pueblo[a] —los hombres, las mujeres, los niños pequeños y el forastero que está dentro de tus puertas[b]— para que oigan, y para que aprendan, y teman a Yahvé su Dios[c], y cuiden de poner por obra todas las palabras de esta ley[d].
  to: 'Reúnan al pueblo: los hombres, las mujeres, los niños pequeños y el forastero[a] que está dentro de sus ciudades[b], para que oigan, y para que aprendan y teman a Yahvé su Dios[c], y cuiden de poner por obra todas las palabras de esta ley[d].'
  rationale: Se corrige el anclaje de la nota [a] para que recaiga sobre 'forastero', se armoniza la referencia de segunda persona con una formulación natural en español ('sus ciudades' / 'su Dios') y se mantiene el resto del contenido porque ya refleja fielmente el hebreo, las decisiones léxicas de la POB y la terminología doctrinal del proyecto.
