    text: 'O: «Déjenla al desnudo, déjenla al desnudo»; «Arrásenla, arrásenla»; «Rásenla, rásenla». El hebreo expresa la idea de dejar la ciudad completamente expuesta, con el sentido contextual de destruirla por completo.'
    reason: lexical_alternative
  revision_rationale: Se corrige «de los hijos de Edom» a «contra los hijos de Edom» para preservar el valor adversativo documentado en el análisis fuente. Se reemplaza «Arrasadla» por «Déjala al descubierto» para reflejar mejor el matiz léxico de עָרוּ, dejando las opciones más interpretativas de destrucción total en nota. También se simplifica el inicio a «Recuerda» como imperativo natural y directo en español.
