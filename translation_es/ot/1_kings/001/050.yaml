translation:
  language: es
  text: Y Adonías temió[a] a Salomón, se levantó, se fue y se aferró a los cuernos del altar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Tomar los cuernos del altar era un gesto de buscar asilo o misericordia en el santuario.
    reason: cultural_note
lexical_decisions:
- source_word: יָרֵא
  english_pob_choice: feared
  chosen_spanish: temió
  alternatives_spanish:
  - tuvo miedo
  - fue atemorizado
  lexicon: HALOT
  rationale: El hebreo expresa el estado de temor de Adonías en relación con Salomón. «Temió» conserva el registro narrativo y la relación directa con el objeto del temor sin agregar una explicación causal que el texto no formula explícitamente.
- source_word: מִפְּנֵי
  english_pob_choice: because of
  chosen_spanish: a
  alternatives_spanish:
  - por causa de
  - ante
  lexicon: HALOT
  rationale: En español, con un verbo de temor, la preposición simple «a» comunica de manera natural el objeto del temor («temió a Salomón»). Esto evita sobreinterpretar la expresión hebrea y mantiene la relación semántica básica.
- source_word: וַיָּקָם
  english_pob_choice: he arose
  chosen_spanish: se levantó
  alternatives_spanish:
  - se puso de pie
  - se alzó
  lexicon: HALOT
  rationale: Es un verbo narrativo corriente. «Se levantó» preserva la secuencia del relato y suena natural en español contemporáneo sin perder el tono formal.
- source_word: וַיֵּלֶךְ
  english_pob_choice: went
  chosen_spanish: se fue
  alternatives_spanish:
  - fue
  - partió
  lexicon: HALOT
  rationale: El movimiento narrativo se expresa de forma idiomática en español con «se fue». Mantiene la progresión de acción sin cargar un matiz interpretativo adicional.
- source_word: וַיַּחֲזֵק
  english_pob_choice: took hold of
  chosen_spanish: agarró
  alternatives_spanish:
  - tomó
  - se aferró a
  - se sujetó de
  lexicon: HALOT
  rationale: En el contexto de asirse de los cuernos del altar, «agarró» comunica con claridad el acto físico. No se expande a «buscar refugio» en el texto principal, porque el hebreo describe primero la acción concreta.
- source_word: קַרְנוֹת
  english_pob_choice: horns
  chosen_spanish: los cuernos
  alternatives_spanish:
  - las esquinas
  - las astas
  lexicon: HALOT
  rationale: 'El término cultual tiene en español una equivalencia estable y literal: «cuernos». Preserva la imaginería del altar sin reinterpretarla.'
- source_word: הַמִּזְבֵּחַ
  english_pob_choice: the altar
  chosen_spanish: del altar
  alternatives_spanish:
  - del sacrificio
  - del ara
  lexicon: HALOT
  rationale: «Altar» es el equivalente directo y estándar para מזבח en contexto cultual. «Del altar» encaja con la construcción posesiva del español y conserva la referencia litúrgica.
- source_word: וַאֲדֹנִיָּהוּ
  english_pob_choice: And Adonijah
  chosen_spanish: Y Adonías
  alternatives_spanish:
  - Entonces Adonías
  lexicon: standard transliteration
  rationale: Se conserva el nombre propio con la forma española usual «Adonías». El prefijo narrativo וַ se vierte con «Y» para mantener la secuencia del relato bíblico.
theological_decisions:
- issue: El gesto de asirse de los cuernos del altar como petición de asilo o misericordia
  english_pob_reading: Rendered the action literally as taking hold of the horns of the altar without explicating its legal or symbolic significance in the main text.
  chosen_spanish_reading: Se mantiene la acción literal («agarró los cuernos del altar») sin explicitar en el cuerpo del texto que se trata de una búsqueda de refugio o misericordia.
  alternative_spanish_readings:
  - se refugió en el altar
  - buscó asilo en el altar
  rationale: El hebreo describe la acción física; la función de asilo está implícita por el contexto cultural, pero no está verbalizada. La nota permite conservar esa tensión sin convertir la explicación en parte del versículo.
  doctrine_reference: 'Translation philosophy: Never paraphrase beyond what the source text warrants; preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La revisión inglesa reciente prefirió una traducción más directa de יָרֵא y de מִפְּנֵי, pasando de una paráfrasis causal («was afraid because of Solomon») a una formulación más literal y natural («feared Solomon»). La presente versión sigue esa orientación al mantener una relación directa de temor entre Adonías y Salomón, sin añadir causa explicativa en el cuerpo del texto.
  spanish_consistency_notes:
  - Se usó «Yahvé» por defecto en el proyecto, pero este versículo no contiene el nombre divino.
  - Se mantuvo «altar» y no «ara», por ser el término más claro y estándar para el contexto sacrificial.
  - La nota cultural se dejó fuera del texto principal para respetar la literalidad del gesto cultual.
