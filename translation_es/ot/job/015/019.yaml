translation:
  language: es
  text: Solo a ellos les fue dada la tierra[a], y ningún extranjero pasó entre ellos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la tierra» en sentido amplio, es decir, «la tierra» o «el mundo»; el hebreo אֶרֶץ puede tener cualquiera de esos sentidos, pero aquí el contexto favorece «tierra» como territorio dado a un pueblo en particular.
    reason: lexical_alternative
  - marker: b
    text: O «ningún forastero pasó por en medio de ellos».
    reason: lexical_alternative
lexical_decisions:
- source_word: לָהֶם
  english_pob_choice: to them
  chosen_spanish: a ellos
  alternatives_spanish:
  - para ellos
  - les
  lexicon: HALOT
  rationale: El ל prefijado marca destinatario/beneficiario. En español, «a ellos» expresa con naturalidad ese complemento indirecto y conserva la relación de dádiva.
- source_word: לְבַדָּם
  english_pob_choice: alone
  chosen_spanish: solos
  alternatives_spanish:
  - solamente
  - exclusivamente
  - por sí solos
  lexicon: HALOT
  rationale: La expresión intensifica exclusividad. «Solos» mantiene la idea de exclusividad de manera breve y poética sin añadir matices ajenos.
- source_word: נִתְּנָה
  english_pob_choice: was given
  chosen_spanish: fue dada
  alternatives_spanish:
  - les fue dada
  - fue concedida
  lexicon: HALOT
  rationale: El nifal pasivo de נתן se refleja mejor con una pasiva en español. «Fue dada» sigue de cerca la fuerza pasiva del hebreo.
- source_word: הָאָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  - la tierra/territorio
  lexicon: HALOT
  rationale: Aunque אֶרֶץ puede significar «tierra» o «país/territorio», aquí el contraste con la exclusión de extraños favorece una referencia territorial. «La tierra» permite esa amplitud en español sin forzar una opción geográfica demasiado estrecha.
- source_word: עָבַר
  english_pob_choice: passed
  chosen_spanish: pasó
  alternatives_spanish:
  - pasó por
  - atravesó
  lexicon: HALOT
  rationale: עבר suele significar «pasar». En combinación con בְּתוֹכָם, «pasó» evita redundancia y conserva el movimiento simple del original.
- source_word: זָר
  english_pob_choice: stranger
  chosen_spanish: extranjero
  alternatives_spanish:
  - forastero
  - foráneo
  - extraño
  lexicon: HALOT
  rationale: זָר designa a quien es ajeno al grupo. «Extranjero» comunica esa alteridad social en español moderno; «forastero» y «foráneo» quedan como alternativas posibles.
- source_word: בְּתוֹכָם
  english_pob_choice: among them
  chosen_spanish: entre ellos
  alternatives_spanish:
  - en medio de ellos
  - en su interior
  lexicon: HALOT
  rationale: La frase significa «en medio de ellos». «Entre ellos» suena natural en español y conserva el sentido comunitario de presencia dentro del grupo.
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior: cada nota al pie ahora está anclada explícitamente en el texto principal con sus marcadores correspondientes [a] y [b]. No se introdujeron notas sin anclaje.'
  spanish_consistency_notes:
  - Se mantuvo una sintaxis breve y poética acorde con el paralelismo hebreo.
  - Se prefirió «la tierra» para conservar la flexibilidad semántica de אֶרֶץ sin perder el matiz territorial del contexto.
  - «Extranjero» reproduce la idea de ajeno al grupo sin cargar innecesariamente con un etnonimo específico.
