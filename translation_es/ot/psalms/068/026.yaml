translation:
  language: es
  text: Los cantores iban delante[a], los músicos detrás, en medio de jóvenes[b] tocando panderos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «precedían»; el hebreo puede leerse como orden de marcha en la procesión.'
    reason: lexical_alternative
  - marker: b
    text: El hebreo עֲלָמוֹת se refiere a mujeres jóvenes; algunas versiones lo traducen «doncellas» o «vírgenes».
    reason: lexical_alternative
lexical_decisions:
- source_word: קִדְּמוּ
  english_pob_choice: went before
  chosen_spanish: iban delante
  alternatives_spanish:
  - iban al frente
  - precedían
  lexicon: HALOT
  rationale: El verbo en piel perfecto plural comunica marcha al frente de una procesión. «Iban delante» conserva el orden procesional de forma natural en español y evita el tono más rígido de «precedían».
- source_word: שָׁרִים
  english_pob_choice: the singers
  chosen_spanish: los cantores
  alternatives_spanish:
  - los cantores
  - los cantantes
  - los cantores y cantoras
  lexicon: HALOT
  rationale: La raíz se entiende como «cantar», no como «príncipes». «Cantores» suena digno y bíblico en español y mantiene el paralelo con «músicos».
- source_word: אַחַר
  english_pob_choice: after
  chosen_spanish: detrás
  alternatives_spanish:
  - después de
  - tras
  lexicon: HALOT
  rationale: Aquí indica posición/secuencia en la procesión. «Detrás» expresa mejor la ubicación física que «después de».
- source_word: נֹגְנִים
  english_pob_choice: the musicians
  chosen_spanish: los músicos
  alternatives_spanish:
  - los instrumentistas
  - los que tocaban
  lexicon: HALOT
  rationale: El término denota quienes tocan instrumentos. «Músicos» es la equivalencia clara y natural en español, manteniendo el paralelismo con «cantores».
- source_word: בְּתוֹךְ
  english_pob_choice: in the midst of
  chosen_spanish: en medio de
  alternatives_spanish:
  - entre
  - en medio de ellos
  lexicon: HALOT
  rationale: Conserva la imagen espacial de la escena procesional. «En medio de» reproduce bien el valor locativo del hebreo.
- source_word: עֲלָמוֹת
  english_pob_choice: young women
  chosen_spanish: doncellas
  alternatives_spanish:
  - jóvenes mujeres
  - muchachas
  - vírgenes
  lexicon: HALOT
  rationale: El hebreo apunta a mujeres jóvenes en edad de casarse. «Doncella» es un término digno y bíblico en español; evita tanto la arcaización excesiva como la posible sobreespecificación de «vírgenes».
- source_word: תּוֹפֵפֽוֹת
  english_pob_choice: beating tambourines
  chosen_spanish: que tocaban panderos
  alternatives_spanish:
  - que golpeaban panderos
  - tocando panderos
  - que tañían panderos
  lexicon: HALOT
  rationale: La acción es percutir un instrumento de marco. «Tocaban panderos» transmite la imagen con claridad natural en español; «golpeaban» sería más literal pero menos idiomático, y «pandero» comunica el instrumento tradicionalmente.
translation_notes:
  revision_awareness: El audit trail inglés mantiene el sentido procesional y la ambigüedad lexical de עֲלָמוֹת; la versión española sigue esa línea con equivalencias naturales y conserva la alternativa principal en nota.
  spanish_consistency_notes:
  - Se evita «SEÑOR» y otras fórmulas de sustitución porque el versículo no contiene el Tetragrámaton.
  - Se mantiene el paralelismo poético de dos grupos de varones seguidos por mujeres con panderos, sin añadir elementos no presentes en el hebreo.
  - «Pandero» se elige por claridad bíblica y lectura natural en español; no se introduce un término técnico innecesario.
