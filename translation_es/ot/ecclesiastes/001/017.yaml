translation:
  language: es
  text: Y puse mi corazón[a] en conocer la sabiduría, y en conocer la locura y la necedad; llegué a saber que también esto es un afán tras el viento[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «di mi corazón»; el hebreo expresa dedicar la atención y la resolución interior.
    reason: lexical_alternative
  - marker: b
    text: O «una persecución del viento»; tradicionalmente, «vexación de espíritu».
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֶתְּנָה לִבִּי
  english_pob_choice: I set my heart
  chosen_spanish: puse mi corazón
  alternatives_spanish:
  - apliqué mi mente
  - di mi corazón
  lexicon: HALOT
  rationale: El hebreo usa un modismo de orientación interior, no solo de emoción. «Puse mi corazón» conserva la imagen idiomática y comunica la decisión de dedicar la atención a una investigación.
- source_word: לָדַעַת
  english_pob_choice: to know
  chosen_spanish: en conocer
  alternatives_spanish:
  - para saber
  - para conocer
  lexicon: HALOT
  rationale: Conservar el infinitivo verbal mantiene el paralelismo del verso y la repetición enfática de «conocer» en español, sin volverlo demasiado explicativo.
- source_word: חָכְמָה
  english_pob_choice: wisdom
  chosen_spanish: la sabiduría
  alternatives_spanish:
  - la prudencia
  - la sensatez
  lexicon: HALOT
  rationale: «Sabiduría» es el equivalente natural y bíblicamente estable para חָכְמָה en Eclesiastés.
- source_word: וְדַעַת הוֹלֵלוֹת
  english_pob_choice: and to know madness
  chosen_spanish: y en conocer la locura
  alternatives_spanish:
  - y en conocer la demencia
  - y en conocer la insensatez
  lexicon: HALOT
  rationale: «הוֹלֵלוֹת» expresa irracionalidad o locura; «locura» transmite mejor esa fuerza que un simple «error». Se mantiene la coordinación verbal del hebreo.
- source_word: וְשִׂכְל֑וּת
  english_pob_choice: and folly
  chosen_spanish: y la necedad
  alternatives_spanish:
  - y la folly
  - y la insensatez
  lexicon: HALOT
  rationale: Aunque el inglés POB usó «folly», en español «necedad» es un término natural de literatura sapiencial y conserva la oposición a la sabiduría sin repetir exactamente «locura».
- source_word: יָדַעְתִּי
  english_pob_choice: I came to know
  chosen_spanish: comprendí
  alternatives_spanish:
  - llegué a saber
  - supe
  lexicon: HALOT
  rationale: El perfecto marca una conclusión obtenida por experiencia/indagación. «Comprendí» comunica ese hallazgo conclusivo en español con fluidez.
- source_word: שֶׁגַּם זֶה הוּא
  english_pob_choice: that this too is
  chosen_spanish: que también esto es
  alternatives_spanish:
  - que esto también es
  - que aun esto es
  lexicon: HALOT
  rationale: Reproduce el valor conclusivo y aditivo de גַּם en un español natural, manteniendo el énfasis de «también esto».
- source_word: רַעְיוֹן רוּחַ
  english_pob_choice: a chasing after wind
  chosen_spanish: un afán tras el viento
  alternatives_spanish:
  - una persecución del viento
  - un afanarse tras el viento
  - un afán de viento
  lexicon: HALOT
  rationale: La expresión hebrea es figurada y denota búsqueda vana o esfuerzo inútil. «Afán tras el viento» mantiene la metáfora del movimiento infructuoso y suena natural en español.
theological_decisions:
- issue: Sentido de רַעְיוֹן רוּחַ en Eclesiastés
  english_pob_reading: a chasing after wind; traditionally, 'vexation of spirit.'
  chosen_spanish_reading: un afán tras el viento
  alternative_spanish_readings:
  - una persecución del viento
  - vexación de espíritu
  rationale: Se conserva la imagen concreta del hebreo y del POB inglés, evitando la tradicional «vexación de espíritu», que oscurece la metáfora y puede sugerir una lectura doctrinal distinta de la intención sapiencial.
  doctrine_reference: Eclesiastés 1:17; sabiduría sapiencial sobre la vanidad/futilidad humana
translation_notes:
  revision_awareness: El borrador sigue la última pasada sin cambios sustantivos del audit trail inglés y conserva el paralelismo del verso, con una decisión léxica española para distinguir «locura» y «necedad» sin borrar la metáfora final.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el nombre divino; aquí no aplica.
  - «Sabiduría» se mantiene como término sapiencial estable.
  - Se evita «SEÑOR» porque el verso no contiene יהוה.
  - 'La dupla «locura / necedad» intenta reflejar dos términos distintos del hebreo: הוֹלֵלוֹת y שִׂכְלוּת.'
  - «Viento» se conserva como imagen literal de רוּחַ en la frase idiomática final.
