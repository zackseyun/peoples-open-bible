translation:
  language: es
  text: Pero Jehosabeat tomó a Joás, hijo de Ocozías, y lo sustrajo[a] de entre los hijos del rey a quienes estaban matando, y puso a Joás y a su nodriza en el dormitorio[b]. Así, Jehosabeat, hija del rey Joram, esposa del sacerdote Joiadá, lo escondió de Atalía, porque ella era hermana de Ocozías, y Atalía no lo mató[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''lo robó''; el verbo hebreo conserva la fuerza de ''robar'' en una acción hecha en secreto.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: ''en la habitación de las camas''; es decir, un dormitorio o alcoba.'
    reason: lexical_alternative
  - marker: c
    text: 'El sujeto implícito final probablemente es Atalía: Jehosabeat escondió a Joás de Atalía, de modo que Atalía no lo mató.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַתִּקַּח
  english_pob_choice: took
  chosen_spanish: tomó
  alternatives_spanish:
  - agarró
  - recibió
  lexicon: HALOT
  rationale: לקח es el verbo básico de ‘tomar’; ‘tomó’ conserva el valor narrativo directo sin introducir una interpretación como ‘rescató’.
- source_word: בַּת הַמֶּלֶךְ
  english_pob_choice: the king’s daughter
  chosen_spanish: la hija del rey
  alternatives_spanish:
  - la hija real
  - la hija del monarca
  lexicon: HALOT
  rationale: El constructo se expresa de forma natural en español como ‘la hija del rey’, preservando la relación dinástica.
- source_word: וַתִּגְנֹב אֹתוֹ
  english_pob_choice: stole him away
  chosen_spanish: lo robó
  alternatives_spanish:
  - lo sustrajo en secreto
  - lo arrebató
  lexicon: HALOT
  rationale: גנב significa ‘robar’; aunque el contexto implica extracción clandestina, ‘lo robó’ conserva la fuerza léxica sin explicitar más de lo que el hebreo dice.
- source_word: מִתּוֹךְ בְּנֵי הַמֶּלֶךְ הַמּוּמָתִים
  english_pob_choice: from among the king’s sons who were being put to death
  chosen_spanish: de entre los hijos del rey que estaban siendo muertos
  alternatives_spanish:
  - de entre los hijos del rey que iban a ser muertos
  - de entre los hijos del rey condenados a muerte
  lexicon: HALOT
  rationale: El participio pasivo de מות se refiere al grupo en proceso de ejecución; ‘estaban siendo muertos’ refleja esa inmediatez y conserva la dureza del texto.
- source_word: מֵינִקְתּוֹ
  english_pob_choice: his nurse
  chosen_spanish: su nodriza
  alternatives_spanish:
  - su niñera
  - la mujer que lo amamantaba
  lexicon: HALOT
  rationale: מיןקת designa a la mujer que amamanta al niño; ‘nodriza’ es preciso y más específico que ‘niñera’.
- source_word: בַּחֲדַר הַמִּטּוֹת
  english_pob_choice: in the bedroom
  chosen_spanish: en la alcoba
  alternatives_spanish:
  - en el dormitorio
  - en la cámara de las camas
  lexicon: HALOT
  rationale: La expresión literal es ‘la habitación de las camas’; ‘alcoba’ comunica bien el sentido de una habitación para dormir sin sonar demasiado moderna ni demasiado literal.
- source_word: וַתַּסְתִּירֵהוּ
  english_pob_choice: hid him
  chosen_spanish: lo escondió
  alternatives_spanish:
  - lo ocultó
  - lo cubrió
  lexicon: HALOT
  rationale: סתר significa ‘ocultar/esconder’; ‘lo escondió’ es natural en español y conserva la acción secreta.
- source_word: אֵשֶׁת יְהוֹיָדָע הַכֹּהֵן
  english_pob_choice: the wife of Jehoiada the priest
  chosen_spanish: esposa del sacerdote Joiadá
  alternatives_spanish:
  - mujer del sacerdote Joiadá
  - la mujer de Joiadá, el sacerdote
  lexicon: HALOT
  rationale: Se mantiene la apposición identificadora; ‘esposa’ funciona bien como equivalente de אֵשֶׁת en este contexto genealógico.
- source_word: מִפְּנֵי עֲתַלְיָהוּ
  english_pob_choice: from Athaliah
  chosen_spanish: de Atalía
  alternatives_spanish:
  - frente a Atalía
  - de la presencia de Atalía
  lexicon: HALOT
  rationale: מִפְּנֵי puede implicar ‘de delante de / de la presencia de’; aquí el sentido idiomático es evitar su alcance, por lo que ‘de Atalía’ transmite bien la relación.
- source_word: וְלֹא הֱמִיתָתְהוּ
  english_pob_choice: and she did not put him to death
  chosen_spanish: y ella no le dio muerte
  alternatives_spanish:
  - y no lo mató
  - y no lo puso a muerte
  lexicon: HALOT
  rationale: ‘Dar muerte’ mantiene el registro más formal y empareja con el campo semántico de מות; se conserva la tensión de sujeto implícito que, por contexto, apunta a Atalía.
theological_decisions:
- issue: Sujeto implícito del verbo final וְלֹא הֱמִיתָתְהוּ
  english_pob_reading: 'Athaliah is the implied subject: ''and she did not put him to death'' refers to Athaliah.'
  chosen_spanish_reading: ‘y ella no le dio muerte’ se entiende como referido a Atalía, no a Jehoshabeat.
  alternative_spanish_readings:
  - ‘y ella no le dio muerte’ con Jehoshabeat como sujeto
  - ‘y Atalía no le dio muerte’ explicitando el sujeto
  rationale: El contexto inmediato (‘lo escondió de Atalía’) favorece leer a Atalía como el sujeto implícito del último verbo. La traducción conserva esa ambigüedad sintáctica pero la resuelve por sentido, sin borrar la tensión del hebreo.
  doctrine_reference: Contexto sintáctico y narrativo del versículo; cf. 2 Crónicas 22:11
- issue: Valor de וַתִּגְנֹב אֹתוֹ
  english_pob_reading: stole him away
  chosen_spanish_reading: lo robó
  alternative_spanish_readings:
  - lo sustrajo en secreto
  - lo escondió
  rationale: El hebreo usa el verbo ordinario ‘robar’; aunque la acción es protectora, la traducción no debe diluir la dureza léxica. ‘Lo robó’ mantiene esa fuerza y deja al contexto narrativo aportar la valoración positiva.
  doctrine_reference: HALOT, גנב; conservación de la carga verbal del texto
translation_notes:
  revision_awareness: 'Se siguió el último pass indicado como unchanged; no se aplicaron revisiones posteriores. Se mantuvieron las tensiones documentadas: el matiz fuerte de גנב, la literalidad de la cámara de las camas y el sujeto implícito del verbo final.'
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ solo cuando aparece el nombre divino explícito; aquí no aplica.
  - 'Se mantuvieron los nombres propios en forma española coherente: Jehoshabeat, Joás, Ocozías, Joiadá, Atalía, Joram.'
  - Se prefirió ‘dar muerte’ para conservar el registro formal y la repetición semántica con el campo de מות.
  - No se añadió explicación interpretativa al texto principal más allá de la necesaria para la sintaxis española.
