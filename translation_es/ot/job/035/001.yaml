  spanish_consistency_notes:
  - Se mantiene la fórmula narrativa breve y directa, adecuada para una sección introductoria.
  - Se evita ‘contestó’ porque, aunque posible, ‘respondió’ conserva mejor el tono bíblico y la correspondencia con el patrón hebreo.
  - No se introduce ‘SEÑOR’, ‘Cristo’ ni otros equivalentes no presentes en el versículo.
