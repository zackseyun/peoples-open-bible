translation:
  language: es
  text: Solomón tenía una viña en Baal-hamón[a]; dio la viña a los guardianes[b]. Cada hombre debía traer mil piezas de plata[c] por su fruto[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Topónimo transliterado. El hebreo se refiere a un lugar llamado Baal-hamón; no se traduce el nombre.
    reason: source_note
  - marker: b
    text: '"Guardianes" traduce de forma amplia נֹטְרִים: quienes vigilan, custodian o cuidan la viña.'
    reason: lexical_alternative
  - marker: c
    text: Literalmente, "mil plata"; el hebreo no especifica la unidad de plata.
    reason: cultural_note
  - marker: d
    text: También puede entenderse "de su fruto" o "con su fruto". El sufijo en "su fruto" puede referirse a la viña o, distributivamente, al fruto de cada guardián.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֶּרֶם
  english_pob_choice: vineyard
  chosen_spanish: viña
  alternatives_spanish:
  - viñedo
  - vid
  lexicon: HALOT
  rationale: El hebreo designa una plantación de vides; en español, "viña" es el equivalente natural y fiel para el cultivo completo. "Viñedo" también es posible, pero "viña" mantiene mejor el tono poético y tradicional sin dejar de ser claro.
- source_word: הָיָה לִשְׁלֹמֹה
  english_pob_choice: Solomon had
  chosen_spanish: Solomón tenía
  alternatives_spanish:
  - Solomón había
  - pertenecía a Solomón
  lexicon: HALOT
  rationale: La construcción hebrea expresa posesión de forma idiomática. "Tenía" reproduce bien esa relación en español y evita una literalidad pesada como "había para Solomón".
- source_word: בְּבַעַל הָמוֹן
  english_pob_choice: at Baal-hamon
  chosen_spanish: en Baal-hamón
  alternatives_spanish:
  - en Baal-hamon
  - en el lugar llamado Baal-hamón
  lexicon: HALOT
  rationale: Se conserva el nombre propio transliterado. "En" es la preposición locativa más natural en español para un topónimo.
- source_word: נָתַן אֶת־הַכֶּרֶם לַנֹּטְרִים
  english_pob_choice: he gave the vineyard to keepers
  chosen_spanish: dio la viña a los guardianes
  alternatives_spanish:
  - dio la viña a los cuidadores
  - entregó la viña a los guardianes
  - encomendó la viña a los guardianes
  lexicon: HALOT
  rationale: El POB inglés optó por "gave" para seguir de cerca נָתַן. En español, "dio" conserva esa correspondencia directa. "Guardianes" reproduce el matiz de vigilancia de נֹטְרִים; "cuidadores" suaviza más el término, pero pierde algo de la idea de custodia.
- source_word: לַנֹּטְרִים
  english_pob_choice: to keepers
  chosen_spanish: a los guardianes
  alternatives_spanish:
  - a los cuidadores
  - a los vigilantes
  - a los guardas
  lexicon: HALOT
  rationale: נֹטְרִים puede abarcar guardar, vigilar y custodiar. En este contexto de viña y administración, "guardianes" comunica la función de protección y manejo sin restringirla demasiado a un oficio técnico.
- source_word: אִישׁ
  english_pob_choice: Each man
  chosen_spanish: Cada hombre
  alternatives_spanish:
  - Cada uno
  - Cada persona
  lexicon: HALOT
  rationale: Se conserva el singular distributivo. "Hombre" mantiene la forma concreta del hebreo, como hace el POB inglés, aunque el sentido sea distributivo y no excluyente.
- source_word: יָבִא
  english_pob_choice: was to bring
  chosen_spanish: debía traer
  alternatives_spanish:
  - había de traer
  - traería
  - deberá traer
  lexicon: HALOT
  rationale: El imperfecto expresa obligación o expectativa en el arreglo económico. "Debía traer" transmite adecuadamente esa fuerza normativa sin endurecerla como mandato legal explícito.
- source_word: בְּפִרְיוֹ
  english_pob_choice: for its fruit
  chosen_spanish: por su fruto
  alternatives_spanish:
  - de su fruto
  - con su fruto
  - a causa de su fruto
  lexicon: HALOT
  rationale: El sufijo puede referirse a la viña y la preposición tiene un matiz relacional respecto del rendimiento. "Por su fruto" es natural en español para indicar pago o compensación en relación con la producción; se preserva la tensión de si el referente es la viña o, distributivamente, el fruto de cada uno.
- source_word: אֶלֶף כָּסֶף
  english_pob_choice: a thousand pieces of silver
  chosen_spanish: mil piezas de plata
  alternatives_spanish:
  - mil de plata
  - mil monedas de plata
  - mil siclos de plata
  lexicon: HALOT
  rationale: El hebreo dice literalmente "mil plata"; no nombra una unidad. "Piezas de plata" sigue la solución del POB inglés y evita introducir "siclos", que no está explícito en el texto.
translation_notes:
  revision_awareness: Se siguió el texto hebreo base y el auditorial inglés POB, incluyendo la revisión que cambió "entrusted" por "gave" para reflejar más de cerca נָתַן. Se mantuvo la ambigüedad del sustantivo y del sufijo posesivo en "su fruto", como en el aparato inglés.
  spanish_consistency_notes:
  - Se usó "viña" para כֶּרֶם de manera uniforme, por ser más natural en español bíblico y plenamente fiel al cultivo de vid.
  - Se evitó "SEÑOR" u otras sustituciones no pertinentes; no hay nombre divino en este versículo.
  - Se mantuvo la transliteración de Baal-hamón como topónimo propio.
  - '"Plata" se dejó sin unidad explícita, en paralelo al hebreo y al POB inglés, que no añade "siclos".'
