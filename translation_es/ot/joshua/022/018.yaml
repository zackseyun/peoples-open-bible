revisions:
- from: Y ustedes se están apartando hoy de seguir[a] a Yahvé[b]; y si hoy se rebelan contra Yahvé, mañana él se enojará con toda la congregación de Israel.
  to: Y ustedes se están apartando hoy de seguir a Yahvé[a]; y si hoy se rebelan contra Yahvé, mañana él se enojará con toda la congregación de Israel[b].
  rationale: 'La revisión conserva el texto principal casi intacto porque es fiel y legible, pero corrige las notas para alinearlas con la evidencia fuente y el rastro POB: se reemplaza una nota editorial por notas léxicas/contextuales útiles, se mejora la explicación del modismo hebreo, y se añade la aclaración del sujeto implícito en ‘se enojará’.'
