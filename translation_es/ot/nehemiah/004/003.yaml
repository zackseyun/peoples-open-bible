translation:
  language: es
  text: Así que oramos a nuestro Dios y apostamos una guardia[a] contra ellos día y noche, a causa de ellos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «apostamos vigilancia contra ellos».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «de delante de ellos»; aquí significa «a causa de ellos» o «por causa de ellos».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַנִּתְפַּלֵּל
  english_pob_choice: we prayed
  chosen_spanish: oramos
  alternatives_spanish:
  - rezamos
  - pedimos en oración
  lexicon: HALOT
  rationale: El hitpael de פלל se expresa naturalmente como «orar». «Oramos» comunica la acción directa sin añadir intensidad que el verbo no explicita. «Rezamos» es posible, pero puede sonar más marcado regionalmente.
- source_word: אֶל אֱלֹהֵינוּ
  english_pob_choice: to our God
  chosen_spanish: a nuestro Dios
  alternatives_spanish:
  - a Dios
  - a nuestro Dios
  lexicon: HALOT
  rationale: La preposición אֶל se refleja con «a» en español. Se conserva el sufijo de primera persona plural en «nuestro Dios», manteniendo la relación pactual que señala el texto.
- source_word: וַנַּעֲמִיד
  english_pob_choice: we stationed
  chosen_spanish: pusimos
  alternatives_spanish:
  - colocamos
  - establecimos
  - apostamos
  lexicon: HALOT
  rationale: El hiphil de עמד aquí implica poner o colocar en posición. En español, «pusimos una guardia» es natural y conserva la idea de acción deliberada de establecer vigilancia. «Apostamos» sería más militar, pero menos general.
- source_word: מִשְׁמָר
  english_pob_choice: a guard
  chosen_spanish: una guardia
  alternatives_spanish:
  - un puesto de guardia
  - una vigilancia
  - un guardia
  lexicon: HALOT
  rationale: מִשְׁמָר puede denotar guardia, vigilancia o puesto de guardia. «Una guardia» funciona bien en español moderno para la función colectiva de vigilancia. Se evita «un guardia» porque el hebreo no exige un individuo.
- source_word: עֲלֵיהֶם
  english_pob_choice: against them
  chosen_spanish: contra ellos
  alternatives_spanish:
  - sobre ellos
  - en contra de ellos
  lexicon: HALOT
  rationale: Aunque עַל puede significar «sobre», en este contexto hostil el sentido idiomático es oposición/protección frente a enemigos. «Contra ellos» preserva ese matiz en español.
- source_word: יוֹמָם וָלַיְלָה
  english_pob_choice: day and night
  chosen_spanish: día y noche
  alternatives_spanish:
  - de día y de noche
  - día tras día y noche tras noche
  lexicon: HALOT
  rationale: Es un merismo de continuidad. «Día y noche» es la equivalencia española más natural y reconocible.
- source_word: מִפְּנֵיהֶם
  english_pob_choice: because of them
  chosen_spanish: por causa de ellos
  alternatives_spanish:
  - a causa de ellos
  - por ellos
  - por temor de ellos
  lexicon: HALOT
  rationale: Literalmente es «desde delante de ellos / de su presencia», pero aquí funciona causalmente. «Por causa de ellos» conserva el valor de motivo sin precisar innecesariamente si la motivación fue miedo o mera necesidad defensiva.
theological_decisions:
- issue: La coexistencia de oración y defensa práctica
  english_pob_reading: Both prayer and practical defense are stated without privileging one over the other.
  chosen_spanish_reading: La oración a Dios y la vigilancia práctica aparecen juntas, sin resolver la tensión entre confianza en Dios y responsabilidad humana.
  alternative_spanish_readings:
  - Solo resaltar la oración
  - Solo resaltar la preparación defensiva
  rationale: 'El hebreo presenta dos acciones coordinadas: oraron y colocaron una guardia. La redacción española mantiene ambas sin jerarquizarlas, preservando la tensión teológica y narrativa del pasaje.'
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: La versión en inglés de la POB fue revisada y quedó sin cambios en su última pasada; esta propuesta española sigue el mismo juicio auditado, sin introducir intensificación devocional ni reinterpretar el valor causal de מִפְּנֵיהֶם.
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלֹהים y «oramos» para el verbo de plegaria, coherente con el estándar POB.
  - Se conserva una equivalencia funcional para la imagen militar/vigilancia sin sobreespecificar el sujeto de la guardia.
  - Se evita «SEÑOR» para el nombre divino porque aquí el hebreo usa אֱלֹהֵינוּ ('nuestro Dios').
