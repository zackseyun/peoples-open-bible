translation:
  language: es
  text: Al sonido del grito de tus pilotos[a], las tierras de pastoreo[b] temblarán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘tus remeros’ o ‘tus marineros’. El hebreo puede referirse más específicamente a los que manejan los remos o, más ampliamente, a los hombres de mar de la nave.
    reason: lexical_alternative
  - marker: b
    text: O ‘las tierras abiertas’ o ‘los terrenos comunales’. El hebreo se refiere a terrenos abiertos alrededor de un asentamiento, no al sentido moderno de ‘suburbios’.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְקוֹל
  english_pob_choice: At the sound of
  chosen_spanish: Al sonido de
  alternatives_spanish:
  - A la voz de
  - Al ruido de
  lexicon: HALOT
  rationale: לְקוֹל expresa la circunstancia desencadenante por medio de ‘sonido/voz/ruido’; en español ‘Al sonido de’ conserva bien el valor causal-temporal natural del hebreo.
- source_word: זַעֲקַת
  english_pob_choice: the cry of
  chosen_spanish: el grito de
  alternatives_spanish:
  - el clamor de
  - la exclamación de
  lexicon: HALOT
  rationale: זעק denota un grito o clamor, a menudo de dolor o angustia. ‘Grito’ reproduce con claridad ese tono de aflicción sin sobreespecificar.
- source_word: חֹבְלָיִךְ
  english_pob_choice: your pilots
  chosen_spanish: tus pilotos
  alternatives_spanish:
  - tus marineros
  - tus remeros
  lexicon: HALOT
  rationale: El término puede referirse a quienes manejan la nave o conducen el barco; el ajuste reciente del POB inglés favorece ‘pilots’ por precisión léxica. En español, ‘pilotos’ comunica mejor esa función directiva náutica que ‘marineros’.
- source_word: יִרְעֲשׁוּ
  english_pob_choice: will quake
  chosen_spanish: temblarán
  alternatives_spanish:
  - se estremecerán
  - se sacudirán
  lexicon: HALOT
  rationale: רעש expresa sacudirse, temblar o estremecerse. ‘Temblarán’ conserva el movimiento físico y la fuerza poética del juicio.
- source_word: מִגְרֹשׁוֹת
  english_pob_choice: the pasturelands
  chosen_spanish: los pastizales
  alternatives_spanish:
  - las tierras abiertas
  - los terrenos comunales
  - los suburbios
  lexicon: HALOT
  rationale: מִגְרָשׁ se refiere a terrenos abiertos u ಹೊರ along settlement, no al sentido moderno de ‘suburbios’. ‘Pastizales’ sigue la decisión inglesa de ‘pasturelands’ y comunica bien la idea de tierras abiertas alrededor del asentamiento.
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del POB inglés, que sustituyó ‘sailors’ por ‘pilots’ para חֹבְלָיִךְ, y conserva la imagen poética de los terrenos abiertos/pasturelands como parte del juicio sobre Tiro.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ por defecto solo cuando aparezca el nombre divino; este verso no lo contiene.
  - Se evita ‘suburbios’ por su carga urbana moderna ajena a מִגְרֹשׁוֹת.
  - ‘Pilotos’ se usa aquí en sentido náutico/directivo, no aeronáutico.
