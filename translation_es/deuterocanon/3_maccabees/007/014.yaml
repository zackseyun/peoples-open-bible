translation:
  language: es
  text: Ellos mismos también mataban en el camino a cualquier compatriota de los contaminados que se les cruzara, y le daban muerte con escarnio público[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con castigos ejemplares» o «exponiéndolo públicamente como advertencia». El griego μετὰ παραδειγματισμῶν puede subrayar la humillación pública o la función de escarmiento en el modo de darle muerte.
    reason: lexical_alternative
lexical_decisions:
- source_word: αὐτοὶ τε
  english_pob_choice: They themselves also
  chosen_spanish: Ellos mismos también
  alternatives_spanish:
  - Y ellos mismos también
  - Ellos también por su parte
  lexicon: LSJ
  rationale: El pronombre enfático αὐτοί más la partícula conectiva τε exige en español una construcción que preserve tanto el énfasis personal como la fuerza aditiva. 'Ellos mismos también' es la solución más natural y reproduce ambos valores sin hipérbole.
- source_word: τὸν ἐμπεσόντα
  english_pob_choice: who had fallen in with them
  chosen_spanish: que se les cruzara
  alternatives_spanish:
  - que se encontrara con ellos
  - que cayera entre ellos
  - que diera con ellos en el camino
  lexicon: LSJ
  rationale: ἐμπίπτω aquí denota un encuentro incidental mientras se viaja. 'Que se les cruzara' captura en español moderno ese encuentro fortuito en la ruta; el subjuntivo imperfecto encaja con el imperfecto griego ἀπέκτεννον y el carácter iterativo de la acción. 'Que se encontrara con ellos' es la alternativa más literal pero levemente menos idiomática.
- source_word: τῶν μεμιαμμένων
  english_pob_choice: of the defiled people
  chosen_spanish: de los contaminados
  alternatives_spanish:
  - de los mancillados
  - de los profanados
  - de los impuros
  lexicon: LSJ
  rationale: El participio perfecto de μιαίνω designa a quienes han quedado ritual o moralmente manchados —en el contexto de 3 Macabeos, judíos que apostataron o comprometieron su identidad. 'Contaminados' es el término más claro y moderno en español neutro. 'Mancillados' es más preciso en matiz pero algo arcaico; 'profanados' tendería en español a referirse a objetos sagrados más que a personas. Se prefiere 'contaminados' por legibilidad, reservando 'mancillados' como alternativa en nota si se requiere mayor precisión ritual.
- source_word: ὁμοεθνῆ
  english_pob_choice: compatriot
  chosen_spanish: compatriota
  alternatives_spanish:
  - conciudadano
  - correligionario
  - miembro del mismo pueblo
  lexicon: LSJ
  rationale: ὁμοεθνής indica la pertenencia al mismo pueblo/nación. 'Compatriota' es conciso, de registro neutro en español de América Latina, y conserva la idea de identidad nacional sin carga religiosa innecesaria. El acusativo singular griego es genérico-distributivo, lo que justifica el singular en español ('cualquier compatriota').
- source_word: κατὰ τὴν ὁδὸν
  english_pob_choice: along the road
  chosen_spanish: en el camino
  alternatives_spanish:
  - por el camino
  - a lo largo del camino
  lexicon: LSJ
  rationale: La preposición κατά con acusativo expresa el ámbito o la extensión del recorrido. 'En el camino' es la forma más idiomática en español para situar una acción que ocurre durante un trayecto; 'por el camino' es igualmente válido pero levemente más ambiguo.
- source_word: ἀπέκτεννον
  english_pob_choice: killed
  chosen_spanish: mataban
  alternatives_spanish:
  - daban muerte
  - asesinaban
  - ejecutaban
  lexicon: LSJ
  rationale: El imperfecto ἀπέκτεννον sugiere acción repetida o iterativa (cada vez que encontraban a uno lo mataban). El imperfecto español 'mataban' reproduce ese valor aspectual con naturalidad. Se reserva 'ejecutaban' para traducir ἀνήρουν en la segunda cláusula, evitando la repetición léxica que existiría si se usase el mismo verbo para ambos griegos.
- source_word: μετὰ παραδειγματισμῶν
  english_pob_choice: with public disgrace
  chosen_spanish: con escarnio público
  alternatives_spanish:
  - con deshonra pública
  - con oprobio público
  - con castigos ejemplares
  - exponiéndolos públicamente
  lexicon: LSJ
  rationale: παραδειγματισμός (de παραδειγματίζω) denota el acto de exponer a alguien como ejemplo público, con la connotación de vergüenza y advertencia. La revisión del POB en inglés prefirió 'public disgrace' sobre 'as examples', subrayando el elemento de deshonra pública. En español, 'escarnio público' captura tanto la burla/humillación como su carácter público y ejemplarizante, con resonancias jurídicas y morales propias del contexto helenístico. 'Oprobio público' es más formal; 'deshonra pública' es más llano. Se conservan las alternativas en nota [a].
- source_word: ἀνήρουν
  english_pob_choice: put them to death
  chosen_spanish: los ejecutaban
  alternatives_spanish:
  - los aniquilaban
  - los eliminaban
  - los daban muerte
  lexicon: LSJ
  rationale: ἀναιρέω (imperfecto ἀνήρουν) puede significar matar, quitar de en medio, eliminar. Para evitar la repetición con 'mataban' (ἀπέκτεννον), se elige 'los ejecutaban', que aporta el matiz de una muerte impuesta por agentes con cierta autoridad —adecuado al contexto— y también es el verbo más ligado al escarnio/público de la frase anterior.
translation_notes:
  revision_awareness: La revisión del POB en inglés (2026-04-23, azure-gpt-5.4) modificó la cláusula final de «they did away with them as examples» a «they put them to death with public disgrace», al estimar que παραδειγματισμῶν enfatiza la deshonra pública más que el mero sentido de "ejemplo". El español «con escarnio público» sigue ese dictamen revisado, preservando no obstante las alternativas («castigos ejemplares», «exponiéndolos públicamente») en la nota [a], conforme a la tensión lexical documentada tanto en el original inglés como en el griego subyacente.
  spanish_consistency_notes:
  - Este versículo no contiene teónimos (YHWH, Dios) ni cristología; no aplican los valores predeterminados de terminología divina.
  - Se emplea 'compatriota' para ὁμοεθνῆ, término de registro neutro apropiado para el español de América Latina.
  - Los dos verbos griegos en imperfecto (ἀπέκτεννον, ἀνήρουν) se vierten como imperfectos españoles ('mataban', 'los ejecutaban'), preservando el aspecto iterativo sin marcarlo explícitamente.
  - El singular genérico-distributivo τὸν ἐμπεσόντα / ὁμοεθνῆ se resuelve en español con 'cualquier compatriota … que se les cruzara', construcción que combina el artículo indefinido generalizador con el relativo en subjuntivo, solución idiomática y precisa.
  - No aparecen términos del glosario σάρξ, δικαιοσύνη, χάρις, δοῦλος, πνεῦμα ni μετάνοια; no se activan sus valores predeterminados.
