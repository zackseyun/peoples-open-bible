translation:
  language: es
  text: Porque él es arrojado a una red por sus propios pies[a], y anda sobre una malla[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «por sus pies». El hebreo puede entenderse como «por medio de sus pies» o «con sus pies»; la formulación elegida resalta el matiz de autoimplicación en la trampa.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «sobre un entramado» o «sobre una red tejida». שְׂבָכָה denota una red o tejido de malla; «malla» preserva la imagen sin equiparar el término a la primera «red».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Porque entonces
  lexicon: HALOT
  rationale: Introduce la explicación del contexto inmediato. «Porque» conserva la conexión causal/discursiva sin volver la frase artificial en español.
- source_word: שֻׁלַּח
  english_pob_choice: is cast
  chosen_spanish: es arrojado
  alternatives_spanish:
  - es lanzado
  - es echado
  - es enviado
  lexicon: HALOT
  rationale: El pasivo sugiere ser impulsado o precipitado hacia una trampa. «Arrojado» conserva la fuerza del pasivo y la imagen de caída/impulso que el contexto exige.
- source_word: בְּרֶשֶׁת
  english_pob_choice: into a net
  chosen_spanish: en una red
  alternatives_spanish:
  - dentro de una red
  - en una trampa de red
  lexicon: HALOT
  rationale: La preposición con el pasivo puede leerse direccionalmente, pero en español «en una red» es natural y mantiene la imagen del instrumento de captura.
- source_word: בְּרַגְלָיו
  english_pob_choice: by his own feet
  chosen_spanish: por sus propios pies
  alternatives_spanish:
  - con sus pies
  - por sus pies
  lexicon: HALOT
  rationale: La expresión indica el medio por el cual cae en la trampa, con un matiz de autoimplicación. «Por sus propios pies» conserva ese sentido y refleja el énfasis de «his own».
- source_word: וְעַל
  english_pob_choice: and ... on
  chosen_spanish: y ... sobre
  alternatives_spanish:
  - y ... encima de
  - y ... en
  lexicon: HALOT
  rationale: La segunda imagen es paralela y requiere una relación espacial simple y formal. «Sobre» reproduce bien el valor preposicional sin forzar la sintaxis.
- source_word: שְׂבָכָה
  english_pob_choice: a mesh
  chosen_spanish: una malla
  alternatives_spanish:
  - una red tejida
  - un entramado
  - una red
  lexicon: HALOT
  rationale: El término designa una red o entramado tejido. «Malla» conserva la idea de tejido/trama y distingue esta imagen de la «red» anterior.
- source_word: יִתְהַלָּךְ
  english_pob_choice: he walks
  chosen_spanish: anda
  alternatives_spanish:
  - camina
  - va andando
  - se pasea
  lexicon: HALOT
  rationale: El hitpael aquí expresa movimiento continuo o iterativo. «Anda» es natural, breve y suficientemente amplio para reflejar ese desplazamiento sin añadir matices ajenos.
translation_notes:
  revision_awareness: El borrador sigue el ajuste más reciente del POB inglés, que pasó de «sent» a «cast» para el pasivo de שֻׁלַּח y de «onto» a «on» para la segunda imagen. En español se reflejó esa fuerza con «arrojado» y una relación espacial simple con «sobre».
  spanish_consistency_notes:
  - Se mantuvo «red» para רֶשֶׁת y «malla» para שְׂבָכָה para respetar la distinción léxica del original y del POB inglés.
  - No se usó terminología eclesiástica tradicional que oscurezca la imaginería de trampa y tejido.
  - El orden y la puntuación siguen de cerca la paralelismo hebreo sin sonar calcados.
