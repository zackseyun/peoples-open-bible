review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: Yahvé ejecuta venganza sobre las naciones en ira y furor, y preserva correctamente la nota sobre שׁמע como escuchar/obedecer/atender. Sin embargo, la expresión principal «haré venganza» no es español natural ni reproduce bien el modismo hebreo עשה + נקם en este contexto; conviene explicitar el valor idiomático como «ejecutaré venganza».'
  spanish_quality_summary: El texto es mayormente claro y digno, pero «Y haré venganza» suena forzado y poco idiomático en español bíblico contemporáneo. «Ejecutaré venganza» mantiene el tono judicial-profético y mejora la legibilidad. El resto —«en ira y furor», «sobre las naciones», «no han escuchado»— es aceptable y fiel. La nota al pie está bien formulada.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Venganza», «ira», «furor», «naciones» y «escuchado» respetan las decisiones léxicas documentadas. La única corrección necesaria es idiomática y de fuerza semántica para עשה + נקם.
  issues:
  - severity: medium
    issue: «Y haré venganza» es una construcción poco natural en español
    rationale: 'Aunque refleja literalmente עשה, en hebreo la combinación עשה + נקם es idiomática: significa ejecutar o llevar a cabo venganza. En español, «hacer venganza» no suena natural ni comunica con claridad la fuerza judicial del original.'
  - severity: low
    issue: La decisión léxica para וְעָשִׂיתִי subexplica el valor idiomático en español
    rationale: La justificación afirma que «haré» basta por contexto, pero en español el sustantivo «venganza» no sostiene por sí solo el modismo con suficiente naturalidad. «Ejecutaré» refleja mejor tanto la fuente como la decisión del POB inglés.
  revised_spanish_text: Y ejecutaré venganza en ira y furor sobre las naciones que no han escuchado[a].
  revised_footnotes:
  - marker: a
    text: O «no han obedecido» o «no han atendido». El verbo hebreo puede significar tanto oír como responder con obediencia.
    reason: lexical_alternative
