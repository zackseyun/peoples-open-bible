    rationale: Aunque comunica una ofrenda no animal, 'vegetal' es demasiado amplio y menos técnico que el sentido sacerdotal específico de cereal/grano. 'La ofrenda de cereal' preserva mejor el valor cultual y se alinea con el English POB.
