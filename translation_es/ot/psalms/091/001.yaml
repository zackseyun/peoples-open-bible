translation:
  language: es
  text: El que habita[a] en el refugio[b] del Altísimo se alojará[c] en la sombra del Omnipotente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «quien habita». El hebreo está en masculino singular gramatical, pero puede entenderse con valor representativo.
    reason: lexical_alternative
  - marker: b
    text: O «en el lugar secreto del Altísimo».
    reason: lexical_alternative
  - marker: c
    text: O «morará», «permanecerá» o «pasará la noche». El verbo hebreo sugiere alojarse por la noche y, por extensión, permanecer.
    reason: lexical_alternative
lexical_decisions:
- source_word: יֹשֵׁב
  english_pob_choice: He who dwells
  chosen_spanish: El que habita
  alternatives_spanish:
  - El que mora
  - Quien habita
  - Aquel que habita
  lexicon: HALOT
  rationale: El participio funciona como sustantivo y describe a una persona caracterizada por una residencia continua. «Habita» comunica mejor esa permanencia que un calco como «se sienta». En español, «el que» mantiene bien el valor representativo del singular masculino sin sonar forzado.
- source_word: בְּסֵתֶר
  english_pob_choice: in the shelter
  chosen_spanish: en el refugio
  alternatives_spanish:
  - en el escondite
  - en el lugar secreto
  - en la cobertura
  lexicon: HALOT
  rationale: סֵתֶר denota un lugar oculto o protegido. «Refugio» expresa protección y amparo de manera natural en español moderno. Frente a «lugar secreto», evita una lectura demasiado esotérica y conserva el matiz de resguardo.
- source_word: עֶלְיוֹן
  english_pob_choice: the Most High
  chosen_spanish: el Altísimo
  alternatives_spanish:
  - el Supremo
  - el Muy Alto
  lexicon: HALOT
  rationale: Es un título divino establecido. «El Altísimo» es la forma natural y fiel en español bíblico para preservar el sentido de exaltación sin perder inteligibilidad.
- source_word: בְּצֵל
  english_pob_choice: in the shadow
  chosen_spanish: en la sombra
  alternatives_spanish:
  - bajo la sombra
  - en el amparo
  lexicon: HALOT
  rationale: La preposición es simple «en» y el sustantivo es «sombra». «En la sombra» sigue de cerca la imagen hebrea y mantiene el paralelismo poético con una expresión directa en español.
- source_word: שַׁדַּי
  english_pob_choice: the Almighty
  chosen_spanish: el Omnipotente
  alternatives_spanish:
  - Shaddai
  - el Todopoderoso
  lexicon: HALOT
  rationale: El POB inglés traduce el título en vez de transliterarlo. «Omnipotente» comunica el valor titulado de שַׁדַּי y su fuerza divina. Se evita «Shaddai» por no ser la opción de traducción preferida y por ser menos transparente para el lector hispanohablante.
- source_word: יִתְלוֹנָן
  english_pob_choice: will lodge
  chosen_spanish: morará
  alternatives_spanish:
  - pasará la noche
  - habitará
  - se alojará
  lexicon: HALOT
  rationale: El verbo לון incluye la idea de alojarse o pasar la noche y, por extensión, permanecer. «Morará» comunica el permanecer continuo y funciona bien con el paralelismo poético; «se alojará» sería más concreto pero menos natural en este contexto.
theological_decisions:
- issue: Tratamiento del participante masculino singular con valor representativo
  english_pob_reading: He who dwells
  chosen_spanish_reading: El que habita
  alternative_spanish_readings:
  - Quien habita
  - Aquel que habita
  rationale: El hebreo usa un participio masculino singular con fuerza representativa. «El que» preserva esa forma sin neutralizar el género gramatical y sigue siendo idiomático en español. No se opta por una paráfrasis inclusiva que borre la señal formal del original.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Renderización del título divino שַׁדַּי
  english_pob_reading: the Almighty
  chosen_spanish_reading: el Omnipotente
  alternative_spanish_readings:
  - el Todopoderoso
  - Shaddai
  rationale: Siguiendo la filosofía del proyecto, los títulos divinos se traducen cuando el sentido es claro y estable. «Omnipotente» mantiene la función titulante y el contenido semántico de poder absoluto, sin convertir el término en nombre propio transliterado.
  doctrine_reference: DOCTRINE.md §Translation philosophy 2
translation_notes:
  revision_awareness: La revisión más reciente indicó que no hacía falta ningún cambio; esta propuesta mantiene ese consenso alto y conserva las decisiones principales del audit trail inglés con equivalencias naturales en español.
  spanish_consistency_notes:
  - Se mantiene «Altísimo» para עֶלְיוֹן, consistente con el uso bíblico español del título divino.
  - Se usa «Omnipotente» para שַׁדַּי como traducción titulante, en línea con la preferencia del POB inglés por traducir el título.
  - «Habita» y «morará» conservan el paralelismo semántico entre residencia continua y alojamiento/permanencia.
  - Los marcadores de nota aparecen anclados solo donde hay alternativa real en el texto.
