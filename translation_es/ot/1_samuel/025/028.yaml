review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien la estructura del hebreo y preserva correctamente «Yahvé», el sentido de súplica en שָׂא נָא, la metáfora dinástica de «casa», y la dimensión moral de וְרָעָה. Sin embargo, «pecado» para פשע atenúa el matiz de «transgresión» que el English POB documenta como elección principal, y «en todos tus días» suena menos idiomático que «todos tus días».
  spanish_quality_summary: 'El español es claro y digno, pero tiene pequeños puntos mejorables de naturalidad y precisión: «hará ciertamente» suena algo forzado frente a «ciertamente hará» o «sin duda hará»; «pelea las batallas de Yahvé» es comprensible pero menos elevado que «libra las batallas de Yahvé»; y «en todos tus días» resulta algo rígido. La frase necesita solo una reparación menor, no una reescritura mayor.'
  glossary_alignment: 'Buena alineación con la terminología del proyecto: יְהוָה -> «Yahvé» correctamente; אֲמָתֶךָ -> «tu sierva» preserva el género y el tono; בַּיִת נֶאֱמָן -> «una casa duradera» mantiene la metáfora dinástica. La principal desviación es לְפֶשַׁע, donde conviene volver a «transgresión» en el texto principal y dejar «pecado» como alternativa posible, en línea con la auditoría inglesa.'
  issues:
  - severity: medium
    issue: «pecado» para פשע en el texto principal
    rationale: El hebreo פשע y la decisión auditada en inglés favorecen «transgresión» por su mayor precisión léxica y gravedad moral. «Pecado» es posible, pero reduce un matiz importante que el rastro de auditoría quiso conservar.
  - severity: low
    issue: «hará ciertamente» suena menos natural en español
    rationale: Aunque comunica bien el énfasis del infinitivo absoluto, el orden «ciertamente hará» fluye mejor en español formal y sigue siendo fiel al hebreo.
  - severity: low
    issue: «pelea las batallas de Yahvé» es algo coloquial
    rationale: «Libra las batallas de Yahvé» encaja mejor con el registro bíblico-digno sin apartarse del sentido de נִלְחָם.
  - severity: low
    issue: «en todos tus días» es menos idiomático
    rationale: La expresión hebrea significa «todos tus días»/«durante todos tus días». En español bíblico-natural, «todos tus días» suena más limpio.
  revised_spanish_text: Por favor, perdona la transgresión[a] de tu sierva, porque Yahvé ciertamente hará a mi señor una casa duradera, pues mi señor libra las batallas de Yahvé, y no se hallará maldad en ti todos tus días.
  revised_footnotes:
  - marker: a
    text: O «pecado» o «rebelión». El hebreo פשע puede abarcar transgresión grave o rebelión; aquí «transgresión» conserva mejor la seriedad moral del término en esta súplica personal.
    reason: lexical_alternative
  revision_rationale: 'Se ajusta פשע a «transgresión» para alinearlo con la decisión léxica auditada y preservar mejor su fuerza. También se suavizan pequeños puntos de estilo en español: «ciertamente hará» mejora la fluidez, «libra las batallas» eleva el registro, y «todos tus días» expresa el modismo de manera más natural.'
