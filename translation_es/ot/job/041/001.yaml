review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien el sentido general del hebreo: una afirmación enfática seguida de una pregunta retórica sobre quedar abatido al ver a Leviatán. Sin embargo, «se frustra» para נִכְזָבָה debilita el matiz de ''resultar falsa/engañosa'' que el POB inglés documenta como central. Además, conviene reflejar mejor la nota alternativa del verbo sin introducir «se decepciona», que en español suena semánticamente desplazado para ''esperanza''.'
  spanish_quality_summary: 'El español es claro y natural, pero «¡Mira!» suena algo coloquial para el tono elevado de poesía sapiencial; «He aquí» o «Mira» sin exclamación serían más dignos. También hay un pequeño detalle de estilo: tras la interjección inicial, no conviene capitalizar «Su» en medio del verso. La segunda hemistiquia está bien resuelta y es muy legible.'
  glossary_alignment: No hay términos doctrinales del glosario principal en juego. Las decisiones léxicas relevantes son en general sólidas, excepto נִכְזָבָה, donde «resulta falsa» se alinea mejor con la auditoría inglesa que «se frustra».
  issues:
  - severity: medium
    issue: נִכְזָבָה se tradujo como «se frustra»
    rationale: El hebreo, según la auditoría inglesa, enfatiza que la esperanza 'resulta falsa/engañosa' o 'proves false'. «Se frustra» comunica incumplimiento, pero pierde el matiz de falsedad o desengaño objetivo.
  - severity: low
    issue: «¡Mira!» es algo coloquial para הֵן
    rationale: Aunque no es incorrecto, el registro de Job favorece una opción más elevada y bíblica como «He aquí», que además preserva bien la fuerza atencional del hebreo y coincide con la nota alternativa ya contemplada.
  - severity: low
    issue: Capitalización de «Su» tras la exclamación inicial
    rationale: En español no corresponde mayúscula interna después de «¡Mira!» o «He aquí,» dentro de la misma oración poética.
  revised_spanish_text: He aquí[a], su esperanza resulta falsa[b]; ¿acaso no queda uno abatido con solo verlo?
