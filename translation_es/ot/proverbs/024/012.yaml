translation:
  language: es
  text: 'Si dices[a]: «Mira, no sabíamos esto», ¿no entenderá el que pesa los corazones[b], y el que guarda tu alma[c] no sabrá, y no retribuirá al hombre[d] según su obra[e]?'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no conocíamos esto».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «el que pesa los corazones», imagen de Dios examinando los motivos internos.'
    reason: cultural_note
  - marker: c
    text: 'O: «el que guarda tu vida». Hebreo nephesh puede significar «alma», «vida» o «ser», según el contexto.'
    reason: lexical_alternative
  - marker: d
    text: 'Hebreo: «al hombre», usado aquí en sentido genérico para un ser humano.'
    reason: lexical_alternative
  - marker: e
    text: 'O: «según lo que ha hecho».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי תֹאמַר
  english_pob_choice: If you say
  chosen_spanish: Si dices
  alternatives_spanish:
  - Si llegaras a decir
  - Cuando digas
  lexicon: HALOT
  rationale: La cláusula introduce una situación hipotética. En español, «Si dices» conserva el valor condicional sin volverla mecánica ni excesivamente literaria.
- source_word: הֵן
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira bien
  - Fíjate
  lexicon: HALOT
  rationale: La interjección introduce la cita del pretexto. «Mira» preserva la fuerza deíctica y resulta natural en español contemporáneo.
- source_word: לֹא יָדַעְנוּ זֶה
  english_pob_choice: we did not know this
  chosen_spanish: no sabíamos esto
  alternatives_spanish:
  - no conocíamos esto
  - no sabíamos nada de esto
  lexicon: HALOT
  rationale: Mantiene la primera persona plural y el objeto directo «esto». La forma imperfectiva en español transmite la afirmación de ignorancia en la excusa sin añadir matices no presentes.
- source_word: תֹכֵן לִבּוֹת
  english_pob_choice: he who weighs hearts
  chosen_spanish: el que pesa los corazones
  alternatives_spanish:
  - el que examina los corazones
  - el que valora los corazones
  lexicon: HALOT
  rationale: «Pesa» conserva la imagen metafórica de evaluar con justicia. «Corazones» mantiene el antropologismo hebreo de לִבּוֹת sin sustituirlo por «mentes».
- source_word: יָבִין
  english_pob_choice: understand
  chosen_spanish: entenderá
  alternatives_spanish:
  - discernirá
  - percibirá
  lexicon: HALOT
  rationale: 'En la pregunta retórica, el futuro en español comunica bien la expectativa de respuesta afirmativa: el juez divino ciertamente entiende.'
- source_word: וְנֹצֵר נַפְשְׁךָ
  english_pob_choice: and he who keeps your soul
  chosen_spanish: y el que guarda tu alma
  alternatives_spanish:
  - y el que guarda tu vida
  - y el que protege tu alma
  lexicon: HALOT
  rationale: «Guarda» refleja נצר como custodiar/proteger. «Alma» preserva la amplitud de נֶפֶשׁ, que en este contexto no debe reducirse solo a vida biológica.
- source_word: יֵדָע
  english_pob_choice: know
  chosen_spanish: ¿… no sabrá?
  alternatives_spanish:
  - ¿… no conocerá?
  - ¿… no tomará nota?
  lexicon: HALOT
  rationale: El verbo ידע se mantiene con «sabrá», que corresponde a la idea de conocimiento pleno y responde al antecedente de ignorancia del humano.
- source_word: וְהֵשִׁיב
  english_pob_choice: will he not repay
  chosen_spanish: y no devolverá
  alternatives_spanish:
  - y no retribuirá
  - y no recompensará
  lexicon: HALOT
  rationale: La Hifil de שוב en contexto judicial expresa retribución. «Devolverá» retiene la idea básica de correspondencia y evita imponer un término más técnico que el hebreo no obliga a usar.
- source_word: לְאָדָם
  english_pob_choice: a man
  chosen_spanish: al hombre
  alternatives_spanish:
  - a una persona
  - al ser humano
  lexicon: HALOT
  rationale: El singular genérico se conserva con «el hombre» / «al hombre». En español, el artículo definido puede funcionar genéricamente sin perder la referencia representativa del hebreo.
- source_word: כְּפָעֳלוֹ
  english_pob_choice: according to his work
  chosen_spanish: según su obra
  alternatives_spanish:
  - conforme a su trabajo
  - de acuerdo con lo que ha hecho
  lexicon: HALOT
  rationale: «Obra» traduce פָעַל en su sentido de acto/resultado moral. Es más natural en español bíblico que «trabajo» y conserva la proporción retributiva del texto.
theological_decisions:
- issue: Antropología de נֶפֶשׁ
  english_pob_reading: your soul
  chosen_spanish_reading: tu alma
  alternative_spanish_readings:
  - tu vida
  - tú mismo
  rationale: La traducción mantiene la amplitud semántica de נֶפֶשׁ sin reducirla a lo biológico. «Alma» permite conservar el paralelismo con el conocimiento íntimo de Dios y su vigilancia sobre la persona completa.
  doctrine_reference: Translation philosophy §1, §6
- issue: Imagen de Dios que pesa los corazones
  english_pob_reading: he who weighs hearts
  chosen_spanish_reading: el que pesa los corazones
  alternative_spanish_readings:
  - el que examina los corazones
  - el que discierne los corazones
  rationale: La imagen de evaluación interior es importante y no debe diluirse. «Pesa» conserva la metáfora de la balanza moral y sugiere discernimiento justo del motivo humano.
  doctrine_reference: Translation philosophy §2; wisdom literature imagery
- issue: Singular genérico de אָדָם
  english_pob_reading: a man
  chosen_spanish_reading: al hombre
  alternative_spanish_readings:
  - a la persona
  - al ser humano
  rationale: Se conserva el singular representativo del hebreo sin convertirlo en un plural abstracto. En español, el genérico «el hombre» sigue siendo inteligible y fuente-cercano.
  doctrine_reference: Translation philosophy §4; contested terms table for אָדָם
translation_notes:
  revision_awareness: El borrador sigue de cerca el paquete fuente hebreo y el audit trail en inglés. Se mantuvo la estructura condicional, la imagen de pesar/pesar los corazones, el paralelo de guardar el alma y la retribución según la obra, sin introducir interpretaciones más allá de lo documentado. No se observaron revisiones aplicadas en el rastro inglés, y el consenso de revisión fue de alta concordancia.
  spanish_consistency_notes:
  - Se usó «alma» para נֶפֶשׁ en coherencia con la decisión inglesa documentada, aunque se mantiene nota de alternativa semántica.
  - Se prefirió «pesa los corazones» para conservar la metáfora de evaluación moral.
  - Se tradujo פָעַל como «obra», no como «trabajo», por naturalidad bíblica en español y para preservar el sentido retributivo.
  - Se mantuvo el singular genérico «el hombre» conforme al audit trail y a la forma hebrea.
  - Los marcadores de nota se colocaron en los puntos donde la traducción presenta alternativas reales o una nota cultural necesaria.
