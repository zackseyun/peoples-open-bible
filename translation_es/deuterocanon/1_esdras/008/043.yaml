- from: Y de entre los sacerdotes y de entre los levitas no hallé allí[a].
  to: Y de entre los sacerdotes y de entre los levitas no hallé a nadie allí[a].
  rationale: Se añadió «a nadie» para expresar en español de manera natural el objeto implícito de οὐχ εὗρον y para alinearse con la decisión auditada del POB inglés («I found no one there»). El resto del versículo y la nota textual se mantienen, pues reflejan correctamente la primacía del griego sobre el paralelo MT no alineado.
