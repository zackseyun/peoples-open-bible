translation:
  language: es
  text: 'Y el faraón dijo a sus hermanos[a]: «¿Cuál es la ocupación de ustedes?». Y ellos dijeron al faraón: «Tus siervos son pastores de rebaños[b], tanto nosotros como nuestros padres».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Cuál es su trabajo?»'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «pastores de rebaños»; es decir, personas que cuidan ovejas y cabras.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַה מַּעֲשֵיכֶם
  english_pob_choice: What is your occupation?
  chosen_spanish: ¿Cuál es su ocupación?
  alternatives_spanish:
  - ¿Cuál es su trabajo?
  - ¿A qué se dedican?
  lexicon: HALOT
  rationale: מַעֲשֶׂה puede significar trabajo, actividad u ocupación. En esta escena cortesana, la pregunta de Faraón apunta al oficio o medio de vida, y «ocupación» comunica bien ese sentido en español sin ampliar más de lo que el hebreo permite.
- source_word: רֹעֵה צֹאן
  english_pob_choice: shepherds of flocks
  chosen_spanish: pastores de rebaños
  alternatives_spanish:
  - pastores de ovejas
  - cuidadores de ganado menor
  lexicon: HALOT
  rationale: La construcción participial describe una actividad profesional de pastoreo de צֹאן, es decir, rebaños de animales pequeños, especialmente ovejas y cabras. «Pastores de rebaños» conserva la imagen y el valor ocupacional del hebreo; «pastores de ovejas» sería más específico pero menos amplio.
- source_word: עֲבָדֶיךָ
  english_pob_choice: Your servants
  chosen_spanish: Tus siervos
  alternatives_spanish:
  - Tus servidores
  - Tus esclavos
  lexicon: HALOT
  rationale: En el trato directo con Faraón, עבד funciona como fórmula deferente de autodesignación. «Siervos» mantiene la reverencia formal y evita introducir la dureza de «esclavos», que aquí no es el foco contextual.
- source_word: גַּם אֲנַחְנוּ גַּם אֲבוֹתֵינוּ
  english_pob_choice: both we and our fathers
  chosen_spanish: tanto nosotros como nuestros padres
  alternatives_spanish:
  - nosotros también, igual que nuestros padres
  - así nosotros como nuestros padres
  lexicon: HALOT
  rationale: La repetición de גַּם enfatiza continuidad generacional. «Tanto nosotros como nuestros padres» reproduce esa correlación de manera natural en español y conserva el paralelismo sin sobreexplicar.
- source_word: אֶל אֶחָיו
  english_pob_choice: to his brothers
  chosen_spanish: a sus hermanos
  alternatives_spanish:
  - a sus hermanos, es decir, los hermanos de José
  lexicon: HALOT
  rationale: El sufijo pronominal se refiere contextualmente a José. En español basta «a sus hermanos»; el referente queda claro por el contexto inmediato sin necesidad de añadir el nombre en el texto principal.
translation_notes:
  revision_awareness: No se documentaron revisiones posteriores ni cambios textuales en el expediente inglés; la redacción española sigue de cerca el hebreo y conserva el matiz vocacional de la pregunta de Faraón, así como la fórmula respetuosa de autodesignación.
  spanish_consistency_notes:
  - Se mantuvo «Faraón» como nombre propio tradicional ya asentado en español.
  - Se usó «siervos» para עֲבָדֶיךָ por razones de contexto cortesano, en coherencia con el expediente inglés.
  - Se evitó «SEÑOR» u otras sustituciones de nombre divino porque este versículo no contiene el Tetragrámaton.
  - «Pastores de rebaños» refleja la estructura del hebreo con una nota que aclara el alcance de צֹאן.
