revisions:
- from: Y sobre la compañía[a] de la tribu de los hijos de Manasés estaba Gamaliel, hijo de Pedasur.
  to: Y el jefe de la compañía[a] de la tribu de los hijos de Manasés era Gamaliel, hijo de Pedahsur.
  rationale: Se ajusta la fórmula inicial para un español más natural que siga expresando la función de autoridad implicada por וְעַל en este contexto repetitivo de Números, y se corrige la transliteración del nombre final para reflejar mejor el nombre hebreo documentado como una sola unidad propia. La nota léxica se conserva con redacción idiomática en español.
