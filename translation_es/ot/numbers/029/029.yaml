translation:
  language: es
  text: 'Y en el sexto día: ocho toros, dos carneros y catorce corderos machos de un año, sin defecto.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וּ/בַ/יּוֹם
  english_pob_choice: And on the ... day
  chosen_spanish: Y en el ... día
  alternatives_spanish:
  - Y en el día
  lexicon: HALOT
  rationale: La secuencia ritual en español se expresa de forma natural con «Y en el sexto día». Mantiene la coordinación y la referencia temporal del hebreo sin añadir elementos innecesarios.
- source_word: הַשִּׁשִּׁי
  english_pob_choice: sixth
  chosen_spanish: sexto
  alternatives_spanish:
  - el día sexto
  lexicon: HALOT
  rationale: Es un ordinal que modifica «día»; «sexto» es la forma más natural y fiel en español.
- source_word: פָּרִים
  english_pob_choice: bulls
  chosen_spanish: toros
  alternatives_spanish:
  - bueyes
  - toros jóvenes
  lexicon: HALOT
  rationale: En contexto sacrificial, el término designa ganado macho ofrecido como sacrificio. «Toros» comunica bien el referente en español y evita una lectura demasiado zoológica de «bueyes».
- source_word: אֵילִם
  english_pob_choice: rams
  chosen_spanish: carneros
  alternatives_spanish:
  - rams
  - ovejas machos
  lexicon: HALOT
  rationale: «Carneros» es el equivalente español claro para el macho adulto de la oveja en contexto sacrificial.
- source_word: כְּבָשִׂים
  english_pob_choice: male lambs
  chosen_spanish: corderos machos
  alternatives_spanish:
  - corderos
  - borregos
  lexicon: HALOT
  rationale: La expresión hebrea se refiere a corderos; se explicita el rasgo masculino porque el texto lo marca y porque el contexto de ofrenda requiere precisión.
- source_word: בְּנֵי שָׁנָה
  english_pob_choice: a year old
  chosen_spanish: de un año
  alternatives_spanish:
  - de un año de edad
  - en su primer año
  lexicon: HALOT
  rationale: La locución hebrea indica animales de un año. «De un año» es natural y fiel, sin sobreexplicar el giro hebreo.
- source_word: אַרְבָּעָה עָשָׂר
  english_pob_choice: fourteen
  chosen_spanish: catorce
  alternatives_spanish:
  - '14'
  lexicon: HALOT
  rationale: Número cardinal simple; se traduce con la forma escrita por tratarse de texto bíblico en estilo publicable.
- source_word: תְּמִימִם
  english_pob_choice: without blemish
  chosen_spanish: sin defecto
  alternatives_spanish:
  - sin mancha
  - perfectos
  lexicon: HALOT
  rationale: En legislación sacrificial, el término describe animales sin defecto físico. «Sin defecto» preserva el valor cultual sin cargar una connotación moral ajena al contexto.
theological_decisions:
- issue: Lenguaje sacrificial de animales “sin defecto”
  english_pob_reading: without blemish
  chosen_spanish_reading: sin defecto
  alternative_spanish_readings:
  - sin mancha
  - perfectos
  rationale: El hebreo tiene una exigencia cultual, no ética en sentido humano. «Sin defecto» conserva la precisión legal y evita suavizar o moralizar el término.
  doctrine_reference: Levítico 22:20-21; Éxodo 12:5
translation_notes:
  revision_awareness: La revisión más reciente indica alta concordancia y sin cambios necesarios; este borrador sigue de cerca la lectura auditada del inglés POB y el hebreo base, sin introducir variantes textuales.
  spanish_consistency_notes:
  - 'Se mantiene el orden enumerativo del hebreo y del POB inglés: día ordinal, conteo de toros, carneros y corderos.'
  - Se usa terminología cultual clara y consistente con el contexto de ofrendas.
  - No se añaden notas al pie porque el versículo no presenta variantes textuales ni ambigüedades que el español requiera marcar aquí.
