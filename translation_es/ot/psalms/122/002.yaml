translation:
  language: es
  text: Nuestros pies están[a] dentro de tus puertas, oh Jerusalén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «Nuestros pies estaban en tus puertas, Jerusalén». El hebreo usa un participio con הָיוּ, que también puede traducirse de manera más formal con pasado.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עֹמְדוֹת הָיוּ
  english_pob_choice: are standing
  chosen_spanish: están
  alternatives_spanish:
  - han estado
  - estaban
  lexicon: HALOT
  rationale: El hebreo usa un participio con היה para una expresión verbal de estado presente o llegada reciente. En español, 'están' comunica de manera natural la postura/resultante actual sin forzar un perifrástico más pesado.
- source_word: רַגְלֵינוּ
  english_pob_choice: our feet
  chosen_spanish: nuestros pies
  alternatives_spanish:
  - los pies de nosotros
  lexicon: HALOT
  rationale: La imagen corporal y colectiva se conserva de forma directa con el posesivo plural 'nuestros pies', que es natural en español y fiel al hebreo.
- source_word: בִּשְׁעָרַיִךְ
  english_pob_choice: within your gates
  chosen_spanish: en tus puertas
  alternatives_spanish:
  - dentro de tus puertas
  - dentro de tus portones
  lexicon: HALOT
  rationale: שער puede referirse tanto a 'puertas' como a la zona de acceso/entrada de la ciudad. 'En tus puertas' mantiene la imagen literal y resulta claro en español; no se añadió 'dentro de' porque el hebreo admite la lectura más simple de ubicación en las puertas de la ciudad.
- source_word: יְרוּשָׁלִָם
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  lexicon: HALOT
  rationale: Nombre propio transliterado según uso bíblico estándar en español.
theological_decisions:
- issue: La preposición hebrea ב en שערים puede sugerir ubicación en la zona de acceso más que mera posesión de puertas.
  english_pob_reading: within your gates
  chosen_spanish_reading: en tus puertas
  alternative_spanish_readings:
  - dentro de tus puertas
  - en tus portones
  rationale: La POB inglesa optó por 'within' para explicitar la idea de llegada. En español, 'en tus puertas' conserva la imagen y evita sobreinterpretar la preposición; la fuerza de arribo ya queda implícita en el contexto de peregrinación.
  doctrine_reference: Salmo 122:2
translation_notes:
  revision_awareness: La auditoría inglesa revisó 'have been standing' a 'are standing' para un efecto más natural. La versión española sigue esa decisión con un presente simple ('están'), que comunica el estado actual sin añadir un verbo auxiliar innecesario.
  spanish_consistency_notes:
  - Se mantuvo 'Jerusalén' como nombre propio estándar.
  - Se evitó 'SEÑOR' o fórmulas litúrgicas ajenas porque el versículo no contiene el Tetragrámaton.
  - '''Puertas'' preserva el término bíblico amplio para שער; no se sustituyó por ''portones'' en el texto principal porque ese matiz no es obligatorio aquí.'
