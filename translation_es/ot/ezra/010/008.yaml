  rationale: 'Se revisa יָחֳרַם para reflejar la decisión final auditada del POB inglés (''forfeited'') con un español natural y claro: ''todos sus bienes serán confiscados''. La nota conserva la alternativa técnica de חרם/ban para no perder la carga léxica del hebreo. También se mejora ''todo su bien'' a ''todos sus bienes'' por naturalidad y precisión contextual.'
