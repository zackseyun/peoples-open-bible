translation:
  language: es
  text: 'Un oráculo[a] acerca de Arabia: En el bosque[b] en Arabia pasarán la noche, oh caravanas[c] de Dedanitas.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Una carga acerca de Arabia»; מַשָּׂא también puede traducirse «carga» o «pronunciamiento» en encabezamientos proféticos.
    reason: lexical_alternative
  - marker: b
    text: O «En la espesura en Arabia». El hebreo יַעַר normalmente significa «bosque/monte arbolado», pero en este contexto puede referirse a matorral o vegetación rala.
    reason: cultural_note
  - marker: c
    text: Hebreo אֹרְחוֹת puede significar literalmente «caminos/vías», pero aquí probablemente se refiere a compañías viajeras, es decir, caravanas.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַשָּׂא
  english_pob_choice: An oracle
  chosen_spanish: Un oráculo
  alternatives_spanish:
  - Una carga
  - Un pronunciamiento
  lexicon: HALOT
  rationale: En encabezamientos proféticos, מַשָּׂא introduce una declaración profética; «oráculo» reproduce esa función de manera natural en español y evita la literalidad opaca de «carga».
- source_word: בַּעְרָב
  english_pob_choice: concerning Arabia
  chosen_spanish: acerca de Arabia
  alternatives_spanish:
  - en Arabia
  - contra Arabia
  lexicon: HALOT
  rationale: Con מַשָּׂא, la preposición se entiende mejor como indicación del tema del oráculo. «Acerca de» conserva el alcance general sin forzar una lectura hostil.
- source_word: בַּיַּעַר
  english_pob_choice: In the forest
  chosen_spanish: En el bosque
  alternatives_spanish:
  - En la espesura
  - En el matorral
  lexicon: HALOT
  rationale: יַעַר normalmente significa «bosque/monte arbolado». «Bosque» es la equivalencia más directa y clara en español, manteniendo la imagen sin sobreinterpretar el terreno.
- source_word: בַּעְרַב
  english_pob_choice: in Arabia
  chosen_spanish: de Arabia
  alternatives_spanish:
  - en Arabia
  - en el desierto
  lexicon: HALOT
  rationale: Aquí el término vuelve a leerse como el nombre geográfico, en paralelo con el encabezado y con la referencia a los dedanitas. «De Arabia» ajusta con naturalidad la frase nominal española «el bosque de Arabia».
- source_word: תָּלִינוּ
  english_pob_choice: you will spend the night
  chosen_spanish: pasarán la noche
  alternatives_spanish:
  - se alojarán
  - se quedarán a pasar la noche
  lexicon: HALOT
  rationale: De לין, «pasar la noche / alojarse». En español, «pasarán la noche» es natural y conserva el matiz temporal del verbo.
- source_word: אֹרְחוֹת
  english_pob_choice: caravans
  chosen_spanish: caravanas
  alternatives_spanish:
  - grupos viajeros
  - caminos
  lexicon: HALOT
  rationale: Aunque literalmente puede significar «caminos», aquí designa metonímicamente compañías viajeras. «Caravanas» transmite bien el contexto comercial y nómada del árabe.
- source_word: דְּדָנִים
  english_pob_choice: of Dedanites
  chosen_spanish: dedanitas
  alternatives_spanish:
  - de Dedán
  - oh dedanitas
  lexicon: HALOT
  rationale: La forma denota al pueblo asociado con Dedán. «Dedanitas» hace explícito el sentido étnico y encaja con «caravanas de dedanitas».
theological_decisions:
- issue: Valor del encabezado מַשָּׂא
  english_pob_reading: An oracle
  chosen_spanish_reading: Un oráculo
  alternative_spanish_readings:
  - Una carga
  - Un pronunciamiento
  rationale: 'No hay una tensión doctrinal aquí, pero sí una decisión de género literario: «oráculo» preserva el carácter técnico-profético del título sin cargarlo con la metáfora de «carga» que en español resulta menos transparente.'
  doctrine_reference: Profecía/retórica profética del Antiguo Testamento
- issue: Dirección semántica de la preposición con Arabia
  english_pob_reading: concerning Arabia
  chosen_spanish_reading: acerca de Arabia
  alternative_spanish_readings:
  - en Arabia
  - contra Arabia
  rationale: La preposición hebrea se deja con amplitud temática. Elegir «acerca de» evita imponer una hostilidad que el hebreo por sí solo no exige en el encabezado.
  doctrine_reference: Lectura contextual de profecía y juicio
- issue: Sentido de אֹרְחוֹת
  english_pob_reading: caravans
  chosen_spanish_reading: caravanas
  alternative_spanish_readings:
  - caminos
  - grupos viajeros
  rationale: La imagen apunta a un colectivo viajero, no a «caminos» literales. «Caravanas» conserva la concreción histórica y cultural del escenario.
  doctrine_reference: Contexto histórico-geográfico de Isaías
translation_notes:
  revision_awareness: La versión española sigue de cerca el audit trail inglés y no introduce cambios de sentido respecto del último pase revisado, que quedó marcado como sin cambios. Se conserva la triple tensión interpretativa en el encabezado, en יַעַר y en אֹרְחוֹת, trasladándola a notas españolas sin perder legibilidad.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se usa «oráculo» para מַשָּׂא, de acuerdo con la decisión inglesa auditable.
  - Se prefirió «dedanitas» para explicitar el etnónimo; «de Dedán» quedó como alternativa en nota.
  - La puntuación y el orden sintáctico se ajustan al español, pero cada decisión léxica refleja la evidencia hebrea y el audit trail inglés.
