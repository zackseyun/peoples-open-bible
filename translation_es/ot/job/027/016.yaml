translation:
  language: es
  text: Aunque amontone plata como polvo y prepare ropa como barro[a][b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Si amontona plata como polvo y prepara ropa como barro». La partícula hebrea אִם puede leerse condicionalmente («si») o concesivamente («aunque»); aquí se adopta el valor concesivo porque encaja mejor con el flujo del argumento.'
    reason: alternative_reading
  - marker: b
    text: 'O: «vestiduras» para «ropa».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  english_pob_choice: Though
  chosen_spanish: Aunque
  alternatives_spanish:
  - Si
  lexicon: HALOT
  rationale: En este paralelismo poético, la partícula introduce un matiz concesivo, no una condición simple. «Aunque» reproduce mejor ese valor en español y conserva el sentido de concesión del argumento.
- source_word: יִצְבֹּר
  english_pob_choice: he heaps up
  chosen_spanish: amontone
  alternatives_spanish:
  - junte
  - acumule
  lexicon: HALOT
  rationale: El verbo expresa la idea de acumular o amontonar en forma concreta. «Amontone» conserva la imagen de apilar en abundancia, adecuada al contraste con «polvo».
- source_word: כֶּעָפָר
  english_pob_choice: like dust
  chosen_spanish: como polvo
  alternatives_spanish:
  - como polvo del suelo
  - como arena
  lexicon: HALOT
  rationale: La comparación señala una abundancia tan grande como algo común y disperso. «Como polvo» es natural en español y mantiene la hipérbole.
- source_word: כָּסֶף
  english_pob_choice: silver
  chosen_spanish: plata
  alternatives_spanish:
  - dinero
  lexicon: HALOT
  rationale: El hebreo nombra literalmente el metal, que en poesía puede funcionar como dinero. «Plata» conserva la concreción del original y el paralelismo poético.
- source_word: וְכַחֹמֶר
  english_pob_choice: and ... like clay
  chosen_spanish: y ... como barro
  alternatives_spanish:
  - y ... como arcilla
  - y ... como lodo
  lexicon: HALOT
  rationale: חֹמֶר puede referirse a arcilla, barro o material terroso. «Barro» funciona bien en español y comunica la idea de algo común, moldeable y abundante, sin perder la imagen.
- source_word: יָכִין
  english_pob_choice: prepares
  chosen_spanish: prepare
  alternatives_spanish:
  - disponga
  - aliste
  lexicon: HALOT
  rationale: El hiphil de כון expresa poner en disposición o preparar. «Prepare» conserva la acción intencional y es compatible con el objeto «vestidos».
- source_word: מַלְבּוּשׁ
  english_pob_choice: clothing
  chosen_spanish: vestidos
  alternatives_spanish:
  - ropa
  - vestiduras
  lexicon: HALOT
  rationale: El sustantivo designa ropa o vestimenta de manera colectiva. «Vestidos» mantiene la imagen concreta y permite la alternativa léxica señalada por el POB inglés.
translation_notes:
  revision_awareness: 'El pasaje coincide con la revisión más reciente: no se requieren cambios textuales respecto del inglés auditado; se mantiene el mismo sentido concesivo y la misma imaginería concreta de acumulación.'
  spanish_consistency_notes:
