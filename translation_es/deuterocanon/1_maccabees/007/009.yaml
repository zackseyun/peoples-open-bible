revisions:
- from: Y lo envió junto con Alcimo, el impío[a], y le establecieron el sacerdocio[b], y le ordenó ejecutar venganza contra los hijos de Israel.
  to: Y lo envió a él y a Alcimo, el impío, y le establecieron el sacerdocio[a], y le ordenó ejecutar venganza contra los hijos de Israel.[b]
  rationale: Se corrige la primera cláusula para reflejar con mayor fidelidad la coordinación griega de dos objetos directos («a él y a Alcimo») en lugar de la paráfrasis «junto con». Se elimina la nota redundante sobre «el impío» y se conserva la nota útil sobre «el sacerdocio». Además, se añade una nota sobre «contra/entre los hijos de Israel» para preservar la alternativa documentada en el POB inglés respecto a ἐν.
