translation:
  language: es
  text: Entonces Esdras el sacerdote trajo la ley[a] ante la asamblea, hombres y mujeres, y todos los que podían entender lo que oían[b], el primer día del séptimo mes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la Torá». El hebreo puede referirse al cuerpo normativo mosaico; aquí se traduce «la ley» por claridad y por el uso contextual del pasaje.
    reason: lexical_alternative
  - marker: b
    text: O «todos los que podían comprender al oír», es decir, todos los capaces de captar el sentido de la lectura.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבִיא
  english_pob_choice: Then ... brought
  chosen_spanish: Entonces ... trajo
  alternatives_spanish:
  - Y ... trajo
  - Así ... trajo
  lexicon: HALOT
  rationale: El waw consecutivo avanza la narración; «Entonces» conserva la secuencia narrativa sin volverla pesada, y «trajo» expresa el traslado/introducción del texto ante el pueblo.
- source_word: הַכֹּהֵן
  english_pob_choice: the priest
  chosen_spanish: el sacerdote
  alternatives_spanish:
  - el sacerdote
  - el presbítero
  lexicon: HALOT
  rationale: El hebreo lo presenta como título de oficio aplicado a Esdras. «Sacerdote» es el equivalente directo y claro en español; «presbítero» introduciría un matiz eclesial no presente en el hebreo.
- source_word: הַתּוֹרָה
  english_pob_choice: the law
  chosen_spanish: la ley
  alternatives_spanish:
  - la instrucción
  - la Torá
  lexicon: HALOT
  rationale: En este contexto se trata del corpus normativo mosaico leído públicamente. «Ley» refleja bien ese peso covenantal y es transparente para lectores generales; «instrucción» sería demasiado amplio y «Torá» menos explícito.
- source_word: לִפְנֵי הַקָּהָל
  english_pob_choice: before the assembly
  chosen_spanish: ante la asamblea
  alternatives_spanish:
  - en presencia de la asamblea
  - delante de la asamblea
  lexicon: HALOT
  rationale: «Ante la asamblea» conserva el carácter público y formal del acto. «Asamblea» evita cargar el pasaje con un sentido estrictamente eclesial que el hebreo no exige.
- source_word: מֵאִישׁ וְעַד אִשָּׁה
  english_pob_choice: both men and women
  chosen_spanish: de hombre a mujer
  alternatives_spanish:
  - tanto hombres como mujeres
  - de varón a mujer
  lexicon: HALOT
  rationale: Se preserva la expresión distributiva del hebreo y su amplitud inclusiva. La forma literal en español mantiene la tensión documental del original; una paráfrasis como «tanto hombres como mujeres» suavizaría esa huella lexical.
- source_word: וְכֹל מֵבִין לִשְׁמֹעַ
  english_pob_choice: and all who could understand what they heard
  chosen_spanish: y todos los que podían entender lo que oían
  alternatives_spanish:
  - y todos los que entendían al oír
  - y todos los capaces de comprender por medio del oído
  lexicon: HALOT
  rationale: La frase apunta a comprensión auditiva, no solo a oír físicamente. «Lo que oían» hace natural el español y mantiene el sentido de comprensión del acto de lectura pública.
- source_word: בְּיוֹם אֶחָד לַחֹדֶשׁ הַשְּׁבִיעִי
  english_pob_choice: on the first day of the seventh month
  chosen_spanish: el primer día del séptimo mes
  alternatives_spanish:
  - en el día primero del séptimo mes
  - el día uno del séptimo mes
  lexicon: HALOT
  rationale: Es la manera idiomática y precisa en español de expresar la fecha hebrea; mantiene el valor calendárico sin perder naturalidad.
theological_decisions:
- issue: Alcance del público convocado
  english_pob_reading: both men and women
  chosen_spanish_reading: de hombre a mujer
  alternative_spanish_readings:
  - tanto hombres como mujeres
  - hombres y mujeres
  rationale: El hebreo usa términos singulares para marcar el alcance total de la asamblea. Se conserva esa huella literal en español para no neutralizar la forma del original, aunque el sentido sea inclusivo y total.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Traducción de תּוֹרָה en contexto de lectura pública
  english_pob_reading: the law
  chosen_spanish_reading: la ley
  alternative_spanish_readings:
  - la Torá
  - la instrucción
  rationale: No hay controversia doctrinal directa, pero el término tiene peso de pacto y norma. «La ley» comunica mejor, en español, la lectura pública del texto mosaico y su autoridad normativa.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §6
translation_notes:
  revision_awareness: La revisión inglesa reciente suavizó la expresión “from man to woman” a “both men and women” por naturalidad; en español se mantuvo la forma más cercana al hebreo («de hombre a mujer») para conservar la huella distributiva del original, con nota alternativa que explicita el sentido inclusivo. El resto del versículo sigue de cerca la lectura aprobada y su adaptación idiomática.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como terminología de proyecto solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se usó «ley» para תּוֹרָה por coherencia con el contexto de lectura pública mosaica.
  - Se preservó la comprensión auditiva en la cláusula final sin reducirla a simple audición.
  - La puntuación sigue norma española y conserva la estructura narrativa del hebreo con claridad publicable.
