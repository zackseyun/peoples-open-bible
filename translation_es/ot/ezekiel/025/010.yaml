    issue: «a los pueblos del oriente» puede sobresegmentar el colectivo hebreo
    rationale: בני קדם es una expresión etnogeográfica colectiva. «Pueblos» en plural puede sugerir varios pueblos distintos más marcadamente que el original. «La gente del oriente» o «el pueblo del oriente» refleja mejor el colectivo sin literalizar «hijos».
  - severity: low
    issue: «y la daré» es gramatical pero algo tieso por el pronombre
    rationale: El hebreo tiene sufijo femenino singular referido al territorio del contexto previo. En español, «y la entregaré» o mantener «y la daré» son posibles; aquí basta conservarlo si se quiere cercanía formal. No es error, solo ligera aspereza estilística.
