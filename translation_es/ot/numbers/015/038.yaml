translation:
  language: es
  text: Habla a los hijos de Israel y diles que se hagan para sí borlas[a] en las esquinas de sus vestidos, por todas sus generaciones, y que pongan en la borla de cada esquina un cordón azul[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «flecos» para «borlas» (hebreo צִיצִת).
    reason: lexical_alternative
  - marker: b
    text: El hebreo תְּכֵלֶת se refiere a un tinte o color azul, a veces descrito como azul púrpura, usado en materiales sagrados de Israel.
    reason: cultural_note
lexical_decisions:
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Israel
  lexicon: HALOT
  rationale: Conservo la imagen de parentesco del hebreo, que es literal y transparente. En español, «los hijos de Israel» comunica mejor la forma del original que «los israelitas», aunque esta última sea más idiomática.
- source_word: וְעָשׂוּ לָהֶם
  english_pob_choice: to make tassels for themselves
  chosen_spanish: que se hagan para sí
  alternatives_spanish:
  - que hagan para sí
  - que se hagan a sí mismos
  lexicon: HALOT
  rationale: La construcción verbal expresa finalidad/mandato. «Para sí» conserva לָהֶם, indicando posesión y uso por parte de Israel, sin sobreexplicar.
- source_word: צִיצִת
  english_pob_choice: tassels
  chosen_spanish: borlas
  alternatives_spanish:
  - franjas
  - flecos
  lexicon: HALOT
  rationale: «צִיצִת» nombra el adorno colgante ritual. «Borlas» es un equivalente natural en español que mantiene la idea de pieza colgante; «flecos» puede sugerir una franja suelta más que un objeto distintivo.
- source_word: עַל כַּנְפֵי בִגְדֵיהֶם
  english_pob_choice: on the corners of their garments
  chosen_spanish: en los bordes de sus vestidos
  alternatives_spanish:
  - en las esquinas de sus vestidos
  - en las puntas de sus vestidos
  lexicon: HALOT
  rationale: כָּנָף literalmente es «ala», pero en prendas significa borde/extremo/corner. «Bordes» es claro y natural en español; «esquinas» suena geométrico, y «alas» sería demasiado literal e improbable.
- source_word: לְדֹרֹתָם
  english_pob_choice: throughout their generations
  chosen_spanish: por todas sus generaciones
  alternatives_spanish:
  - a través de sus generaciones
  - de generación en generación
  lexicon: HALOT
  rationale: La fórmula expresa continuidad transgeneracional. «Por todas sus generaciones» conserva el alcance duradero con un giro fluido en español.
- source_word: עַל צִיצִת הַכָּנָף
  english_pob_choice: on the tassel of each corner
  chosen_spanish: en la borla de cada borde
  alternatives_spanish:
  - sobre la borla de cada borde
  - en la borla del borde
  lexicon: HALOT
  rationale: 'El singular hebreo es distributivo: cada borde recibe su propia borla. «Cada borde» refleja ese valor distributivo y evita perder la relación entre prenda y adorno.'
- source_word: פְּתִיל
  english_pob_choice: a cord
  chosen_spanish: un cordón
  alternatives_spanish:
  - un hilo
  - una cuerda
  lexicon: HALOT
  rationale: פְּתִיל designa algo trenzado o torcido, más robusto que un simple hilo. «Cordón» es la opción más equilibrada para español.
- source_word: תְּכֵלֶת
  english_pob_choice: blue
  chosen_spanish: azul
  alternatives_spanish:
  - azul púrpura
  - violeta
  lexicon: HALOT
  rationale: El término denota el colorante sagrado de tono azul/azul púrpura. Mantengo «azul» en el texto principal por inteligibilidad, con la ambigüedad cromática preservada en nota.
translation_notes:
  revision_awareness: 'La redacción española sigue de cerca la revisión inglesa más reciente, que reordenó la cláusula final para reflejar mejor el hebreo: primero el cordón de azul y luego su colocación sobre la borla de cada borde. Aquí se reproduce esa relación sintáctica de manera natural en español, sin alterar el sentido.'
  spanish_consistency_notes:
  - Se evitó «SEÑOR» porque este versículo no contiene el Tetragrámaton.
  - Se conservó el valor distributivo del singular hebreo «la borla de cada borde».
  - «Borlas» se eligió como término principal; la alternativa «flecos» queda documentada en nota.
  - «Azul» es el término base, con aclaración de la gama cromática en la nota.
  - No se introdujo terminología eclesiástica ajena al mandato ritual del texto.
