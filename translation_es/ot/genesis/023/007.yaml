translation:
  language: es
  text: Entonces Abraham se levantó y se inclinó ante el pueblo de aquella tierra[a], los hijos de Heth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O "los hititas". Hebreo: "los hijos de Heth".'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקָם
  english_pob_choice: Then Abraham rose
  chosen_spanish: Entonces Abraham se levantó
  alternatives_spanish:
  - Y Abraham se levantó
  - Abraham se puso de pie
  lexicon: HALOT
  rationale: El verbo de movimiento narrativo קום se expresa naturalmente en español como 'se levantó'. 'Entonces' conserva la secuencia narrativa del waw consecutivo sin sonar mecánico.
- source_word: וַיִּשְׁתַּחוּ
  english_pob_choice: bowed down
  chosen_spanish: se inclinó
  alternatives_spanish:
  - se postró
  - se inclinó profundamente
  lexicon: HALOT
  rationale: El verbo שׁחה indica una reverencia física. 'Se inclinó' mantiene el gesto de respeto sin forzar la idea de postración total, que sería más fuerte que lo pedido por el contexto.
- source_word: לְעַם הָאָרֶץ
  english_pob_choice: to the people of the land
  chosen_spanish: ante el pueblo de la tierra
  alternatives_spanish:
  - al pueblo de la tierra
  - frente al pueblo de la tierra
  lexicon: HALOT
  rationale: Aunque el hebreo usa לְ, en español la relación de homenaje se expresa con naturalidad mediante 'ante'. 'Pueblo de la tierra' conserva la estructura literal del hebreo para los habitantes locales.
- source_word: לִבְנֵי חֵת
  english_pob_choice: the sons of Heth
  chosen_spanish: los hijos de Heth
  alternatives_spanish:
  - los descendientes de Heth
  - los hititas
  lexicon: HALOT
  rationale: Se mantiene la designación genealógica literal del hebreo. 'Hijos de Heth' es más transparente para el texto fuente que el etnónimo contextual 'hititas'.
- source_word: חֵת
  english_pob_choice: Heth
  chosen_spanish: Heth
  alternatives_spanish:
  - Hitita
  lexicon: HALOT
  rationale: Nombre propio transliterado para conservar la referencia genealógica del texto hebreo.
theological_decisions:
- issue: Gesto de reverencia ante los habitantes locales
  english_pob_reading: bowed down to the people of the land, to the sons of Heth
  chosen_spanish_reading: se inclinó ante el pueblo de la tierra, ante los hijos de Heth
  alternative_spanish_readings:
  - se postró ante el pueblo de la tierra
  - se inclinó delante de los hititas
  rationale: El texto describe una reverencia respetuosa, no una afirmación doctrinal; la traducción evita intensificar indebidamente el gesto a 'postrarse' y preserva el carácter social del acto.
  doctrine_reference: Ninguna; decisión de registro y fuerza aspectual del gesto
- issue: Designación étnica/genealógica
  english_pob_reading: the sons of Heth
  chosen_spanish_reading: los hijos de Heth
  alternative_spanish_readings:
  - los hititas
  - los descendientes de Heth
  rationale: Se mantiene la forma genealógica del hebreo porque el inglés POB optó por una traducción literal y señaló el etnónimo alternativo en nota. Esto preserva la tensión entre designación familiar y etnónima.
  doctrine_reference: Ninguna; decisión onomástica y etnográfica
translation_notes:
  revision_awareness: La redacción inglesa revisada cambió 'before' por 'to' para reflejar más directamente la preposición hebrea y repitió la relación preposicional ante 'the sons of Heth'. En español, esa estructura se refleja de forma natural con 'ante... ante...'; no se traslada de manera rígida la preposición 'a', porque 'ante' comunica mejor la reverencia y conserva la doble referencia del hebreo.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto cuando aparezca el nombre divino; aquí no aparece.
  - '''Hijos de Heth'' se conserva literalmente para ser coherente con la decisión inglesa de mantener la forma genealógica en el texto principal.'
  - '''Se inclinó'' evita sobrerrepresentar la intensidad corporal de ''se postró'' sin perder el sentido de homenaje.'
