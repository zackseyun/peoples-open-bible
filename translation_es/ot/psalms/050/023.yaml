source:
  edition: WLC
  text: זֹבֵ֥חַ תּוֹדָ֗ה יְֽכַ֫בְּדָ֥/נְנִי וְ/שָׂ֥ם דֶּ֑רֶךְ אַ֝רְאֶ֗/נּוּ בְּ/יֵ֣שַׁע אֱלֹהִֽים׃
base_translation:
  language: en
  yaml_path: translation/ot/psalms/050/023.yaml
  text: Whoever offers a sacrifice of thanksgiving honors me[c][b][a], and to the one who orders his way I will show the salvation of God.
  footnotes:
  - marker: a
    text: Or 'thank offering.' The Hebrew תּוֹדָה refers to thanksgiving expressed in sacrificial form.
    reason: lexical_alternative
  - marker: b
    text: Or 'and orders his conduct' or 'and prepares the way.' The Hebrew expression is compact and may be understood as rightly ordering one's life.
    reason: alternative_reading
  - marker: c
    text: Or 'God’s deliverance' or 'God’s victory.'
    reason: lexical_alternative
