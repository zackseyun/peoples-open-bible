translation:
  language: es
  text: Se oye una voz sobre las alturas peladas[a], llanto y súplicas de misericordia de parte de los hijos de Israel, porque han torcido[b] su camino; han olvidado a Yahvé[c] su Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «sobre las alturas desnudas»; hebreo: «sobre las alturas peladas o sin árboles».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «han pervertido» o «han retorcido» su camino.'
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: YHWH; el nombre divino se vierte como «Yahvé».'
    reason: alternative_reading
lexical_decisions:
- source_word: ק֚וֹל
  english_pob_choice: A voice
  chosen_spanish: Una voz / se oye una voz
  alternatives_spanish:
  - Un sonido
  - Un clamor
  lexicon: HALOT
  rationale: קול puede significar voz, sonido o clamor. Con נִשְׁמָע, el español natural es «se oye una voz», que mantiene la entrada vívida y la pasiva de «is heard» sin volverla abstracta.
- source_word: עַל שְׁפָיִ֣ים
  english_pob_choice: on the bare heights
  chosen_spanish: en las alturas desoladas
  alternatives_spanish:
  - en las alturas peladas
  - sobre las alturas desnudas
  lexicon: HALOT
  rationale: שׁפיים designa alturas expuestas, peladas o sin árboles. «Desoladas» comunica la desnudez y el carácter abandonado del lugar en un español más natural que un calco rígido.
- source_word: נִשְׁמָ֔ע
  english_pob_choice: is heard
  chosen_spanish: se oye
  alternatives_spanish:
  - es escuchada
  - se escucha
  lexicon: HALOT
  rationale: El nifal de שמע admite un pasivo; «se oye» es idiomático en español y conserva la idea de una voz audible que llega desde el escenario descrito.
- source_word: בְּכִ֥י
  english_pob_choice: weeping
  chosen_spanish: llanto
  alternatives_spanish:
  - llorando
  - sollozo
  lexicon: HALOT
  rationale: בכי es un sustantivo, «llanto». «Llanto» funciona bien en aposición con «una voz» y mantiene la densidad emotiva del texto.
- source_word: תַחֲנוּנֵ֖י
  english_pob_choice: pleas for mercy
  chosen_spanish: súplicas de misericordia
  alternatives_spanish:
  - ruegos de misericordia
  - plegarias implorantes
  lexicon: HALOT
  rationale: תחנונים son ruegos fervientes en busca de favor o misericordia. «Súplicas de misericordia» preserva el sentido penitencial y evita un tecnicismo excesivo.
- source_word: בְּנֵ֣י יִשְׂרָאֵ֑ל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los hijos varones de Israel
  - el pueblo de Israel
  lexicon: HALOT
  rationale: El hebreo es masculino plural. En español, «los hijos de Israel» mantiene la forma plural masculina y sigue siendo inteligible; se conserva la tensión de género del original sin neutralizarla en el texto principal.
- source_word: הֶעֱוּוּ
  english_pob_choice: have made their way crooked
  chosen_spanish: han torcido
  alternatives_spanish:
  - han pervertido
  - han retorcido
  lexicon: HALOT
  rationale: El hifil de עוה expresa hacer torcido o desviado. «Han torcido su camino» conserva la metáfora concreta y su fuerza moral.
- source_word: דַּרְכָּ֔/ם
  english_pob_choice: their way
  chosen_spanish: su camino
  alternatives_spanish:
  - su senda
  - su conducta
  lexicon: HALOT
  rationale: דרך puede ser camino literal o curso de vida. «Su camino» mantiene la imagen hebrea y deja que el contexto moral determine el sentido.
- source_word: שָׁכְח֖וּ
  english_pob_choice: have forgotten
  chosen_spanish: han olvidado
  alternatives_spanish:
  - olvidaron
  lexicon: HALOT
  rationale: El perfecto hebreo se refleja bien con el perfecto compuesto español, que vincula la acción pasada con la situación presente de infidelidad.
- source_word: יְהֹוָ֥ה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto para יהוה: «Yahvé». Esto preserva el nombre divino en vez de ocultarlo bajo un título genérico.'
- source_word: אֱלֹהֵיהֶֽם
  english_pob_choice: their God
  chosen_spanish: su Dios
  alternatives_spanish:
  - su Dios propio
  - el Dios de ellos
  lexicon: HALOT
  rationale: La relación de pacto se expresa con claridad en «su Dios», que reproduce el sufijo posesivo y la gravedad de haberlo olvidado.
theological_decisions:
- issue: Nombre divino יהוה / YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. En español del proyecto, la forma establecida es «Yahvé», que mantiene visible el nombre del pacto sin sustituirlo por una máscara litúrgica.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Género de בְּנֵי יִשְׂרָאֵל
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - el pueblo de Israel
  - los hijos de Israel
  rationale: El hebreo conserva plural masculino. «Los hijos de Israel» reproduce esa forma y deja notar la tensión de género, en línea con la política de exactitud gramatical del proyecto.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: 'La redacción española sigue la última revisión inglesa: mantiene la apposición natural entre «voz», «llanto» y «súplicas», hace explícita la procedencia en «de los hijos de Israel», y conserva el nombre divino como «Yahvé» en lugar de un título genérico.'
  spanish_consistency_notes:
  - Se preserva el paralelo entre «llanto» y «súplicas» como dos miembros coordinados que describen la voz.
  - «Su camino» mantiene la metáfora de דרך sin convertirla en una abstracción moral.
  - Se mantiene la forma plural masculina «los hijos de Israel» por fidelidad morfológica.
  - La puntuación separa las cláusulas como en el hebreo, con punto y coma antes de la razón causal final.
