  to: Y Jacob llamó al lugar Peniel[a], porque he visto a Dios[b] cara a cara, y mi vida[c] ha sido librada.
  rationale: Se reemplaza el calco poco natural «llamó el nombre del lugar» por «llamó al lugar», que sigue siendo fiel al sentido de nombrar. También se reubican las notas para anclarlas exactamente a «Dios» y «mi vida», conforme a su contenido.
