translation:
  language: es
  text: Allí los impíos cesan su agitación[a], y allí descansan los exhaustos de fuerza[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘turbulencia’, ‘ira’ o ‘inquietud’ para ‘agitación’.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, ‘los exhaustos de fuerza’, es decir, los que están agotados de fuerzas.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁם
  english_pob_choice: There / and there
  chosen_spanish: Allí / y allí
  alternatives_spanish:
  - En aquel lugar
  - Allá
  lexicon: HALOT
  rationale: El adverbio locativo se conserva con el repetido ‘allí’ para mantener el paralelismo poético y la referencia al lugar del descanso descrito en el versículo.
- source_word: רְשָׁעִים
  english_pob_choice: the wicked
  chosen_spanish: los impíos
  alternatives_spanish:
  - los malvados
  - los culpables
  lexicon: HALOT
  rationale: Como sustantivo colectivo moral, ‘impíos’ comunica la categoría ética con buena naturalidad en español bíblico contemporáneo, sin añadir matices ajenos.
- source_word: חָדְלוּ
  english_pob_choice: cease
  chosen_spanish: cesan
  alternatives_spanish:
  - cesaron
  - dejan de
  lexicon: HALOT
  rationale: El valor léxico es ‘cesar, parar’. Se usa presente gnómico en español, como en el inglés POB, para expresar una verdad general del poema.
- source_word: רֹגֶז
  english_pob_choice: turmoil
  chosen_spanish: turbulencia
  alternatives_spanish:
  - agitación
  - inquietud
  - furor
  lexicon: HALOT
  rationale: El término puede abarcar agitación, sobresalto o disturbio. ‘Turbulencia’ mantiene la idea de inquietud tumultuosa sin reducirla solo a ira emocional.
- source_word: יָנוּחוּ
  english_pob_choice: find rest
  chosen_spanish: descansan
  alternatives_spanish:
  - hallan descanso
  - reposan
  lexicon: HALOT
  rationale: El verbo נוח expresa reposo o asentarse. ‘Descansan’ es la opción más directa y natural en español, preservando la idea de reposo efectivo.
- source_word: יְגִיעֵי כֹחַ
  english_pob_choice: those weary in strength
  chosen_spanish: los exhaustos de fuerza
  alternatives_spanish:
  - los cansados de fuerza
  - los fatigados en su vigor
  - los agotados de fortaleza
  lexicon: HALOT
  rationale: La construcción literal ‘los cansados de fuerza’ suena extraña en español; ‘exhaustos de fuerza’ conserva la relación explícita con ‘fuerza’ y el sentido idiomático de agotamiento total.
translation_notes:
  revision_awareness: No se aplicaron revisiones posteriores al texto fuente; la concordancia con el audit trail inglés es alta y no hay cambios pendientes relevantes.
  spanish_consistency_notes:
  - Se conserva el paralelismo con dos veces ‘allí’.
  - Se evita ‘SEÑOR’ porque el verso no contiene el nombre divino.
  - ‘Impíos’ y ‘exhaustos de fuerza’ preservan el registro bíblico sin caer en arcaísmo excesivo.
  - Las notas mantienen las alternativas léxicas documentadas por el POB inglés y aclaran la expresión idiomática hebrea.
