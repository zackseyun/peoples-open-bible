translation:
  language: es
  text: Lo traerá a los hijos de Aarón, los sacerdotes, y de allí tomará un puñado de su flor de harina y algo de su aceite, con todo su incienso. Luego el sacerdote quemará su porción memorial sobre el altar, ofrenda de alimento[a], aroma agradable para Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ofrenda por fuego» o «ofrenda hecha por fuego» para «ofrenda de alimento».
    reason: lexical_alternative
lexical_decisions:
- source_word: וֶהֱבִיאָהּ
  english_pob_choice: He shall bring it
  chosen_spanish: Lo traerá
  alternatives_spanish:
  - Lo presentará
  - Lo llevará
  lexicon: HALOT
  rationale: El hebreo hiphil de בוא expresa hacer que la ofrenda llegue al lugar destinado. En español, «lo traerá» conserva el movimiento ritual sin sobrecargar con una explicación.
- source_word: בְּנֵי אַהֲרֹן הַכֹּהֲנִים
  english_pob_choice: Aaron’s sons, the priests
  chosen_spanish: los hijos de Aarón, los sacerdotes
  alternatives_spanish:
  - los hijos sacerdotales de Aarón
  - los hijos de Aarón, que son los sacerdotes
  lexicon: HALOT
  rationale: Se mantiene la apposición que identifica a los oficiales del culto. «Hijos de Aarón» preserva el parentesco y «los sacerdotes» aclara su función.
- source_word: וְקָמַץ
  english_pob_choice: he shall take ... a handful
  chosen_spanish: tomará un puñado
  alternatives_spanish:
  - recogerá un puñado
  - tomará con la mano un puñado
  lexicon: HALOT
  rationale: El verbo describe tomar con la mano una porción cerrando la mano. «Tomará un puñado» suena natural y conserva el sentido técnico.
- source_word: מְלֹא קֻמְצוֹ
  english_pob_choice: a handful
  chosen_spanish: un puñado
  alternatives_spanish:
  - la plenitud de su puño
  - su puñado lleno
  lexicon: HALOT
  rationale: La expresión idiomática equivale a una medida tomada con la mano. «Un puñado» es la correspondencia más clara y fiel en español.
- source_word: מִסָּלְתָּהּ
  english_pob_choice: of its fine flour
  chosen_spanish: de su flor de harina
  alternatives_spanish:
  - de su harina fina
  - de su harina selecta
  lexicon: HALOT
  rationale: סֹלֶת designa harina refinada apta para ofrendas. En español bíblico y moderno, «flor de harina» comunica bien la calidad cultual sin perder naturalidad.
- source_word: וּמִשַּׁמְנָהּ
  english_pob_choice: and some of its oil
  chosen_spanish: y algo de su aceite
  alternatives_spanish:
  - y parte de su aceite
  - y de su aceite
  lexicon: HALOT
  rationale: La preposición מן indica que se toma una porción del aceite junto con la harina. «Algo de su aceite» expresa esa porción sin implicar totalidad.
- source_word: עַל כָּל לְבֹנָתָהּ
  english_pob_choice: with all of its frankincense
  chosen_spanish: con todo su incienso
  alternatives_spanish:
  - junto con todo su incienso
  - con todo el incienso
  lexicon: HALOT
  rationale: Se conserva la totalidad de la porción de incienso y la relación de acompañamiento. «Incienso» es la equivalencia más directa y ampliamente entendible.
- source_word: וְהִקְטִיר
  english_pob_choice: shall burn
  chosen_spanish: hará subir
  alternatives_spanish:
  - quemará
  - hará arder
  lexicon: HALOT
  rationale: En el lenguaje sacrificial hebreo, קטר puede referirse a hacer ascender humo por combustión. «Haré subir» preserva la imagen ritual del humo elevado, sin perder inteligibilidad.
- source_word: אַזְכָּרָתָהּ
  english_pob_choice: its memorial portion
  chosen_spanish: su porción memorial
  alternatives_spanish:
  - su porción de memorial
  - su ofrenda memorial
  lexicon: HALOT
  rationale: Se mantiene el término técnico sacrificial con la misma tensión semántica que en el inglés POB. «Porción memorial» evita interpretar de más y conserva el valor representativo del acto.
- source_word: הַמִּזְבֵּחָה
  english_pob_choice: on the altar
  chosen_spanish: sobre el altar
  alternatives_spanish:
  - en el altar
  - al altar
  lexicon: HALOT
  rationale: El sufijo direccional indica el lugar de la acción cultual. «Sobre el altar» refleja el acto de colocar allí la porción para ser consumida por el fuego.
- source_word: אִשֵּׁה
  english_pob_choice: a food offering
  chosen_spanish: como ofrenda encendida
  alternatives_spanish:
  - como ofrenda por fuego
  - como ofrenda hecha por fuego
  lexicon: HALOT
  rationale: El inglés POB opta por una traducción funcional que no borra el fuego del rito. En español, «ofrenda encendida» conserva el sentido sacrificial y evita un calco poco natural.
- source_word: רֵיחַ נִיחֹחַ
  english_pob_choice: a pleasing aroma
  chosen_spanish: aroma agradable
  alternatives_spanish:
  - aroma placentero
  - aroma que agrada
  lexicon: HALOT
  rationale: Es el giro sacrificial establecido que comunica aceptación divina. «Aroma agradable» mantiene la metáfora sin volverla demasiado interpretativa.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: para Yahvé
  alternatives_spanish:
  - a Yahvé
  - para el Yahvé
  lexicon: HALOT
  rationale: Se sigue el criterio proyectivo de la POB en español para el Tetragrámaton. «Para Yahvé» es natural en español y mantiene el nombre del pacto sin máscara litúrgica.
theological_decisions:
- issue: Tratamiento del Tetragrámaton יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El audit trail inglés explicita el nombre divino como Yahweh. En español, la forma estándar del proyecto para ese mismo nombre es «Yahvé», preservando la referencia personal del pacto y evitando la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido sacrificial de אִשֵּׁה
  english_pob_reading: food offering
  chosen_spanish_reading: ofrenda encendida
  alternative_spanish_readings:
  - ofrenda por fuego
  - ofrenda hecha por fuego
  rationale: El POB inglés opta por una equivalencia funcional que comunica la ofrenda consumida por fuego. En español, «ofrenda encendida» conserva ese valor ritual y resulta más idiomática que un calco rígido.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 6
translation_notes:
  revision_awareness: La redacción inglesa más reciente cambió «from it» por «from there» para reflejar con mayor precisión el hebreo מִשָּׁם; por eso el español usa «de allí». También se conservó la decisión revisada de entender la porción del aceite como una cantidad tomada de ella, no como la totalidad.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como equivalente de יהוה, conforme al criterio del proyecto en español.
  - Se eligió «porción memorial» para אַזְכָּרָה, evitando diluir el término técnico en una paráfrasis.
  - «Flor de harina» conserva el registro cultual tradicional de סֹלֶת sin perder claridad contemporánea.
  - «De allí» refleja explícitamente מִשָּׁם, siguiendo la revisión inglesa reciente.
  - «Ofrenda encendida» preserva el contenido de אִשֵּׁה sin depender de la fórmula tradicional inglesa «food offering».
