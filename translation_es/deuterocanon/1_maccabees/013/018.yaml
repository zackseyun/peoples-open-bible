translation:
  language: es
  text: 'diciendo[a]: «Porque no le envié la plata y los sirvientes[b], pereció[c]»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Diciendo» traduce el participio griego introductorio de la cita; también podría expresarse como «y decían», pero aquí se preserva mejor la forma participial.
    reason: lexical_alternative
  - marker: b
    text: El griego τὰ παιδάρια también puede significar «los muchachos», «los jóvenes» o «los asistentes». En este contexto se eligió «los sirvientes» por la función que probablemente cumple el término, sin negar esa amplitud.
    reason: lexical_alternative
  - marker: c
    text: El griego ἀπώλετο admite varios matices, como «pereció», «fue destruido» o «se perdió». Aquí se eligió «pereció» por reflejar bien el sentido de destrucción sin precisar más de lo que la cláusula expresa.
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγοντες
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - diciendo así
  - y decían
  lexicon: LSJ
  rationale: Participio introductorio de la cita. «Diciendo» conserva la relación directa con la frase citada sin añadir matices que el griego no exige.
- source_word: Ὅτι
  english_pob_choice: Because
  chosen_spanish: Porque
  alternatives_spanish:
  - que
  - pues
  lexicon: LSJ
  rationale: Aquí introduce la explicación causal dentro de la cita. «Porque» reproduce bien ese valor causal en español.
- source_word: οὐκ ἀπέστειλα
  english_pob_choice: I did not send
  chosen_spanish: no le envié
  alternatives_spanish:
  - no le mandé
  - no le remití
  lexicon: LSJ
  rationale: El aoristo se vierte naturalmente como pasado simple en español. «Envié» mantiene la idea de remitir algo a alguien y suena más claro que una traducción más literal pero menos idiomática.
- source_word: τὸ ἀργύριον
  english_pob_choice: the silver
  chosen_spanish: la plata
  alternatives_spanish:
  - el dinero
  - la plata en efectivo
  lexicon: LSJ
  rationale: Aunque ἀργύριον puede funcionar como «dinero», la referencia concreta a metal precioso se conserva mejor con «plata», que además sigue siendo comprensible en español moderno.
- source_word: τὰ παιδάρια
  english_pob_choice: the servants
  chosen_spanish: los servidores
  alternatives_spanish:
  - los sirvientes
  - los muchachos
  - los jóvenes
  lexicon: LSJ
  rationale: El término puede designar muchachos, jóvenes o jóvenes sirvientes/ayudantes. Dado el contexto y el ajuste auditado del inglés a «servants», «servidores» preserva la función de asistentes sin cargar una lectura demasiado literal de edad.
- source_word: ἀπώλετο
  english_pob_choice: he perished
  chosen_spanish: él pereció
  alternatives_spanish:
  - se perdió
  - fue destruido
  - murió
  lexicon: LSJ
  rationale: La forma puede expresar perecer, ser destruido o perderse. «Pereció» sigue de cerca la decisión auditada del inglés y conserva la fuerza de ruina/muerte sin concretar más de lo que el griego permite.
translation_notes:
  revision_awareness: La revisión inglesa cambió «boys» por «servants» y «was ruined» por «perished». Esta versión española sigue esa última decisión auditada en ambos puntos, pero elige «servidores» como equivalente natural de παιδάρια en este contexto, manteniendo la nota de ambigüedad léxica.
  spanish_consistency_notes:
  - Se mantiene el estilo de cita directa con introducción participial.
  - «Plata» reproduce el valor concreto de ἀργύριον sin perder inteligibilidad.
  - «Servidores» evita una lectura infantilizante de παιδάρια y conserva la posible función de ayudantes.
  - «Pereció» refleja la gravedad de ἀπώλετο y armoniza con la revisión auditada del inglés.
