translation:
  language: es
  text: Aquel hombre solía subir de su ciudad año tras año para adorar y sacrificar a Yahvé de los Ejércitos[a] en Silo. Y allí estaban los dos hijos de Elí, Ofni y Finees, como sacerdotes de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más tradicionalmente, «el SEÑOR de los Ejércitos».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָלָה
  english_pob_choice: used to go up
  chosen_spanish: subía
  alternatives_spanish:
  - iba
  - solía subir
  lexicon: HALOT
  rationale: El hebreo expresa acción habitual en pasado. «Subía» conserva el sentido literal de עלה y comunica la costumbre recurrente con naturalidad en español.
- source_word: הָאִישׁ הַהוּא
  english_pob_choice: that man
  chosen_spanish: ese hombre
  alternatives_spanish:
  - el hombre
  - aquel hombre
  lexicon: HALOT
  rationale: El demostrativo marca referencia ya introducida. «Ese hombre» preserva esa deixis anafórica sin sonar forzado en español.
- source_word: מֵעִירוֹ
  english_pob_choice: from his city
  chosen_spanish: de su ciudad
  alternatives_spanish:
  - de su pueblo
  - de su villa
  lexicon: HALOT
  rationale: עִיר puede ser «ciudad» o «pueblo», pero el término base es más directo como «ciudad». No hay presión contextual suficiente para suavizarlo.
- source_word: מִיָּמִים יָמִימָה
  english_pob_choice: year after year
  chosen_spanish: año tras año
  alternatives_spanish:
  - cada año
  - de año en año
  lexicon: HALOT
  rationale: El modismo indica repetición anual. «Año tras año» reproduce bien la recurrencia y mantiene un registro claro y natural.
- source_word: לְהִשְׁתַּחֲוֺת
  english_pob_choice: to worship
  chosen_spanish: adorar
  alternatives_spanish:
  - postrarse
  - rendir culto
  lexicon: HALOT
  rationale: Aunque el verbo incluye la idea física de postrarse, en este contexto cultual ante Yahvé la acción se entiende como adoración. «Adorar» comunica el acto sin perder el trasfondo de reverencia.
- source_word: וְלִזְבֹּחַ
  english_pob_choice: to sacrifice
  chosen_spanish: sacrificar
  alternatives_spanish:
  - ofrecer sacrificios
  - inmolar
  lexicon: HALOT
  rationale: El verbo refiere la ofrenda sacrificial. «Sacrificar» es breve y fiel al uso cultual del pasaje.
- source_word: לַיהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Según la terminología POB, el Tetragrámaton se rinde como «Yahvé». Se evita el ocultamiento con un título sustitutivo.
- source_word: צְבָאוֹת
  english_pob_choice: of Armies
  chosen_spanish: de los Ejércitos
  alternatives_spanish:
  - de los Ejércitos celestiales
  - de los Ejércitos de guerra
  lexicon: HALOT
  rationale: La expresión hebrea remite literalmente a «ejércitos/huestes». «De los Ejércitos» refleja el valor léxico de forma transparente y concorde con la línea del proyecto.
- source_word: בְּשִׁלֹה
  english_pob_choice: at Shiloh
  chosen_spanish: en Silo
  alternatives_spanish:
  - en Siló
  - en Shiloh
  lexicon: HALOT
  rationale: El topónimo se adapta a la forma usual en español bíblico, «Silo», que es clara y reconocible para lectores de habla hispana.
- source_word: וְשָׁם
  english_pob_choice: were there
  chosen_spanish: y allí estaban
  alternatives_spanish:
  - y allí se hallaban
  - y allí se encontraban
  lexicon: HALOT
  rationale: El hebreo presenta una frase locativa; en español se requiere un verbo copulativo explícito. «Allí estaban» conserva la simple localización.
- source_word: שְׁנֵי בְנֵי עֵלִי
  english_pob_choice: the two sons of Eli
  chosen_spanish: los dos hijos de Elí
  alternatives_spanish:
  - los dos hijos de Eli
  - los hijos de Elí, los dos
  lexicon: HALOT
  rationale: Se conserva el orden y el énfasis en el par. Los nombres propios se adaptan a la ortografía bíblica usual en español.
- source_word: חָפְנִי וּפִנְחָס
  english_pob_choice: Hophni and Phinehas
  chosen_spanish: Ofni y Finees
  alternatives_spanish:
  - Hofní y Finees
  - Hofni y Fines
  lexicon: HALOT
  rationale: Los nombres propios se transliteran conforme a formas castellanas corrientes y legibles. «Ofni» y «Finees» son equivalentes reconocibles para el lector bíblico hispanohablante.
- source_word: כֹהֲנִים לַיהוָה
  english_pob_choice: as priests of the LORD
  chosen_spanish: como sacerdotes de Yahvé
  alternatives_spanish:
  - sacerdotes de Yahvé
  - como sacerdotes para Yahvé
  lexicon: HALOT
  rationale: La construcción identifica su función en relación con Yahvé. «Como sacerdotes de Yahvé» preserva la relación cultual sin introducir una formulación más interpretativa.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto fuente usa directamente el Tetragrámaton. En la política POB española, la forma principal es «Yahvé», que conserva el nombre del pacto en lugar de sustituirlo por un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Renderización de יְהוָה צְבָאוֹת
  english_pob_reading: Yahweh of Armies
  chosen_spanish_reading: Yahvé de los Ejércitos
  alternative_spanish_readings:
  - Yahvé de los Ejércitos celestiales
  - el SEÑOR de los Ejércitos
  rationale: Se traduce צְבָאוֹת de manera transparente como «de los Ejércitos», manteniendo el valor léxico de huestes/armadas y evitando la forma eclesiástica tradicional que oculta la composición del título.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 6
translation_notes:
  revision_awareness: 'Sin cambios respecto al sentido del hebreo base y en plena conformidad con la auditoría inglesa: acción habitual, topónimo en Silo, y título divino traducido de forma transparente.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה en todo el versículo.
  - Se conserva el valor habitual del imperfecto narrativo mediante «subía».
  - Los nombres propios se presentan en formas españolas legibles y estándar.
  - No se añade nota al pie porque no hay alternativa textual necesaria en este versículo y la decisión sobre YHWH ya queda explicada en la tabla de decisiones.
