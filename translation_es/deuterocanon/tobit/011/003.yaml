translation:
  language: es
  text: Corramos delante de tu esposa y preparemos la casa[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego dice literalmente «tu esposa». El texto sigue ese testimonio explícito, aunque el lector podría esperar otra referencia familiar por el desarrollo narrativo general.
    reason: alternative_reading
lexical_decisions:
- source_word: προδράμωμεν
  english_pob_choice: Let us run on ahead
  chosen_spanish: Corramos adelante
  alternatives_spanish:
  - Vamos adelante
  - Apresurémonos adelante
  lexicon: LSJ
  rationale: El subjuntivo exhortativo pide una forma inclusiva con valor imperativo suave. «Corramos» conserva la imagen dinámica del movimiento rápido mejor que un simple «vamos», aunque el español no necesita reproducir de forma rígida el verbo inglés.
- source_word: ἔμπροσθεν
  english_pob_choice: on ahead
  chosen_spanish: adelante
  alternatives_spanish:
  - delante
  - por delante
  lexicon: LSJ
  rationale: Como adverbio de dirección, «adelante» expresa bien la idea de ir delante en español natural. Evita el calco «antes» y mantiene la relación espacial con el verbo de movimiento.
- source_word: τῆς γυναικός σου
  english_pob_choice: your wife
  chosen_spanish: tu esposa
  alternatives_spanish:
  - tu mujer
  - tu esposa
  lexicon: BDAG
  rationale: El contexto relacional hace que γυνή signifique «esposa» y no meramente «mujer». «Esposa» es claro y digno en español; «mujer» podría sonar ambiguo o menos preciso en este contexto.
- source_word: ἑτοιμάσωμεν
  english_pob_choice: prepare
  chosen_spanish: preparemos
  alternatives_spanish:
  - pongamos listo
  - hagamos los preparativos
  lexicon: LSJ
  rationale: 'El paralelismo exhortativo con el primer verbo se conserva con un subjuntivo inclusivo: «preparemos». Es una equivalencia natural de «prepare» sin perder la formalidad narrativa.'
- source_word: τὴν οἰκίαν
  english_pob_choice: the house
  chosen_spanish: la casa
  alternatives_spanish:
  - el hogar
  - la vivienda
  lexicon: LSJ
  rationale: οἰκία puede referirse a casa o casa/hogar; aquí el contexto inmediato de ir delante para disponer el lugar favorece el sentido físico de «casa». «Casa» es la opción más directa y fiel.
translation_notes:
  revision_awareness: Base text checked against the Swete LXX Greek for Tobit 11:3; the English POB rendering and its audit note confirm that the extant Greek witness reads «your wife», so the Spanish follows the Greek source rather than any contextual expectation from the wider story. No further revisions were indicated in the audit trail.
  spanish_consistency_notes:
  - Se mantuvo el registro inclusivo plural («Corramos», «preparemos») para reflejar el hortatorio griego.
  - «Casa» se usó de manera concreta, no como «hogar», porque el contexto describe la preparación del lugar físico.
  - Se evitó «SEÑOR» o terminología teológica ajena al verso; no aparece ningún nombre divino en el texto fuente.
