translation:
  language: es
  text: Y he aquí[a], siete espigas delgadas, abrasadas por el viento del oriente, brotaban tras ellas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «quemadas por el viento del oriente».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִנֵּה
  english_pob_choice: And behold
  chosen_spanish: Y he aquí
  alternatives_spanish:
  - Y mira
  - Entonces, he aquí
  lexicon: HALOT
  rationale: Conserva el marcador narrativo súbito y vívido. «He aquí» mantiene el tono de aparición inesperada sin volver la frase rígida; añadir «Y» refleja el arranque enlazado del hebreo.
- source_word: שֶׁבַע
  english_pob_choice: seven
  chosen_spanish: siete
  alternatives_spanish:
  - siete
  lexicon: HALOT
  rationale: Cardinal directo y sin ambigüedad.
- source_word: שִׁבֳּלִים
  english_pob_choice: ears of grain
  chosen_spanish: espigas
  alternatives_spanish:
  - espigas de grano
  - gavillas
  lexicon: HALOT
  rationale: En español, «espigas» comunica de forma natural la imagen agrícola. «Espigas de grano» sería más explícito pero más pesado; «gavillas» no corresponde bien al referente.
- source_word: דַּקּוֹת
  english_pob_choice: thin
  chosen_spanish: delgadas
  alternatives_spanish:
  - finas
  - raquíticas
  lexicon: HALOT
  rationale: «Delgadas» conserva la idea de poca plenitud o escasez en una imagen visual clara. «Finas» es posible, pero puede sonar menos expresivo; «raquíticas» añade demasiado juicio interpretativo.
- source_word: וּשְׁדוּפֹת קָדִים
  english_pob_choice: scorched by the east wind
  chosen_spanish: quemadas por el viento del oriente
  alternatives_spanish:
  - abrasadas por el viento del oriente
  - azotadas por el viento del oriente
  lexicon: HALOT
  rationale: «Quemadas» transmite bien el efecto de calor/desecación del participio. «Viento del oriente» mantiene el referente geográfico sin sustituirlo por una explicación; «abrasadas» es posible, pero menos simple. No se neutraliza a «viento» porque el hebreo distingue explícitamente el viento oriental.
- source_word: צֹמְח֖וֹת
  english_pob_choice: were sprouting up
  chosen_spanish: brotaban
  alternatives_spanish:
  - estaban brotando
  - crecían
  lexicon: HALOT
  rationale: El participio en escena pide un imperfecto progresivo o descriptivo. «Brotaban» es natural en español y conserva la vividez. «Estaban brotando» es más analítico; «crecían» pierde la imagen puntual del brote.
- source_word: אַחֲרֵיהֶן
  english_pob_choice: after them
  chosen_spanish: después de ellas
  alternatives_spanish:
  - tras ellas
  - detrás de ellas
  lexicon: HALOT
  rationale: Refiere a las espigas anteriores y funciona bien en español como secuencia en el sueño. «Tras ellas» sería más compacto, pero «después de ellas» resulta más transparente en lectura pública.
translation_notes:
  revision_awareness: La versión española sigue de cerca la redacción inglesa auditada, pero vuelve a la imagen agrícola natural del hebreo con «espigas» y conserva el valor descriptivo del participio con un imperfecto narrativo («brotaban»). La revisión inglesa añadió «up»; en español ese matiz queda implícito en «brotaban».
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto hebreo contiene el nombre divino; este versículo no lo contiene.
  - Se mantiene la imagen concreta del «viento del oriente» sin suavizarla, porque el hebreo usa קָדִים de forma explícita.
  - No se introduce «Mesías», «Cristo» ni terminología doctrinal ajena al versículo.
  - La nota al pie preserva la alternativa lexical principal reflejada en el audit trail inglés.
