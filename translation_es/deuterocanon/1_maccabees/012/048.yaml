  to: Pero cuando Jonatán entró en Ptolemaida, los hombres de Ptolemaida cerraron las puertas y lo apresaron, y mataron a espada a todos los que habían entrado con él.
  rationale: Se ajusta únicamente la expresión de los acompañantes para reflejar mejor el sentido contextual del participio griego dentro de la escena de entrada a la ciudad. El resto del versículo es fiel, claro y natural en español.
