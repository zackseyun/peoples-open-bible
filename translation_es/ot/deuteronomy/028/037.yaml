base_translation:
  language: en
  yaml_path: translation/ot/deuteronomy/028/037.yaml
  text: And you shall become an object of horror[a], a proverb[c][b], and a taunt among all the peoples where Yahweh will drive you.
  footnotes:
  - marker: a
    text: Or 'an astonishment.' The Hebrew term can denote something so devastated or appalling that it causes horror or astonishment.
    reason: lexical_alternative
  - marker: b
    text: Or 'a byword' for both 'a proverb' and 'a taunt'; the Hebrew uses two related but distinct terms for public derision.
    reason: lexical_alternative
  - marker: c
    text: Or 'where the LORD will lead you.' The verb can mean 'lead' or 'drive'; here 'drive' reflects the coercive sense of exile in the curse context.
    reason: lexical_alternative
