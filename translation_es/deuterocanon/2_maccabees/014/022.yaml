translation:
  language: es
  text: Judas apostó hombres armados, listos en lugares estratégicos, no fuera que de parte de los enemigos surgiera de repente una traición; y tuvieron la conversación adecuada[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «conferenciaron apropiadamente». El griego τὴν ἁρμόζουσαν ἐποίησαν κοινολογίαν es algo idiomático y alude a una discusión o conferencia mutua adecuada a la ocasión.
    reason: lexical_alternative
lexical_decisions:
- source_word: διέταξεν
  english_pob_choice: stationed
  chosen_spanish: apostó
  alternatives_spanish:
  - dispuso
  - colocó
  - estacionó
  lexicon: LSJ
  rationale: En contexto militar, el verbo indica disponer o colocar fuerzas en un lugar determinado, no solo dar una orden. «Apostó» expresa esa colocación táctica en español de manera natural y fiel.
- source_word: ἐνόπλους
  english_pob_choice: armed men
  chosen_spanish: hombres armados
  alternatives_spanish:
  - soldados armados
  - personas armadas
  lexicon: LSJ
  rationale: El griego designa personas armadas; «hombres armados» conserva la fuerza lexical sin volver el término más específico de lo que el texto exige.
- source_word: ἑτοίμους
  english_pob_choice: ready
  chosen_spanish: listos
  alternatives_spanish:
  - preparados
  lexicon: LSJ
  rationale: La idea es de disposición para actuar. «Listos» es la equivalencia más natural y directa en español moderno.
- source_word: ἐν τοῖς ἐπικαίροις τόποις
  english_pob_choice: in strategic places
  chosen_spanish: en lugares estratégicos
  alternatives_spanish:
  - en lugares oportunos
  - en puntos críticos
  lexicon: LSJ
  rationale: El contexto militar favorece el sentido de posiciones ventajosas o tácticas. «Lugares estratégicos» comunica bien esa idea sin perder claridad.
- source_word: μή ποτε
  english_pob_choice: lest
  chosen_spanish: no fuera que
  alternatives_spanish:
  - para que no
  - por si acaso no
  lexicon: LSJ
  rationale: La cláusula expresa prevención ante un posible peligro. «No fuera que» reproduce ese matiz de cautela con tono adecuado en español.
- source_word: ἐκ τῶν πολεμίων
  english_pob_choice: from the enemies
  chosen_spanish: de parte de los enemigos
  alternatives_spanish:
  - por parte de los enemigos
  - de los enemigos
  lexicon: LSJ
  rationale: La preposición marca origen o procedencia de la acción temida. «De parte de» mantiene ese valor sin sonar excesivamente literal.
- source_word: ἐφνιδίως
  english_pob_choice: suddenly
  chosen_spanish: de repente
  alternatives_spanish:
  - súbitamente
  - inesperadamente
  lexicon: LSJ
  rationale: El adverbio señala irrupción súbita; «de repente» es natural en español y conserva el impacto temporal.
- source_word: κακουργία
  english_pob_choice: treachery
  chosen_spanish: traición
  alternatives_spanish:
  - malicia
  - mala acción
  - engaño hostil
  lexicon: LSJ
  rationale: En este entorno de posible ataque hostil, el término apunta a una acción desleal o pérfida. «Traición» es la opción española más fuerte y contextual.
- source_word: γένηται
  english_pob_choice: should arise
  chosen_spanish: surgiera
  alternatives_spanish:
  - ocurriera
  - se produjera
  lexicon: LSJ
  rationale: Con un sustantivo de evento como sujeto, el verbo expresa aparición o irrupción. «Surgiera» conserva esa noción de brotar/manifestarse.
- source_word: τὴν ἁρμόζουσαν
  english_pob_choice: the fitting
  chosen_spanish: la conveniente
  alternatives_spanish:
  - la apropiada
  - la adecuada
  - la pertinente
  lexicon: LSJ
  rationale: El participio adjetival indica lo que corresponde a la situación. «Conveniente» preserva el valor de adecuación y encaja con «conferencia» en español.
- source_word: ἐποίησαν κοινολογίαν
  english_pob_choice: held the conference
  chosen_spanish: celebraron la conferencia
  alternatives_spanish:
  - tuvieron la conferencia
  - conferenciaron
  - mantuvieron una discusión
  lexicon: LSJ
  rationale: La expresión idiomática sugiere una deliberación o conferencia mutua. «Celebraron la conferencia» mantiene el tono formal y respeta la lectura de reunión/conferencia acordada en el POB inglés.
translation_notes:
  revision_awareness: 'El texto griego y el contexto del audit trail inglés muestran un encuadre militar con una frase idiomática final. La traducción española conserva ese doble nivel: preparación táctica y deliberación formal, sin suavizar κακουργία ni forzar un equivalente eclesiástico para κοινολογία.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; aquí no aparece.
  - Se mantiene un registro formal pero claro, evitando arcaísmos innecesarios.
  - «Traición» se eligió por el contexto hostil, no como traducción genérica de maldad.
  - La nota al pie conserva la ambigüedad idiomática de la última cláusula, como en el audit trail inglés.
