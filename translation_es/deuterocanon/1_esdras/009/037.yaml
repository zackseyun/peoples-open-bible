translation:
  language: es
  text: Y los sacerdotes y los levitas y los de Israel vivieron en Jerusalén y en la región, en la luna nueva del séptimo mes, y los hijos de Israel estaban en sus asentamientos.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: κατῴκησαν
  english_pob_choice: lived
  chosen_spanish: vivieron
  alternatives_spanish:
  - habitaron
  - moraron
  - se establecieron
  lexicon: BDAG
  rationale: El aoristo de κατοικέω expresa residencia o habitación. «Vivieron» suena natural en español moderno y conserva la idea básica de residir sin introducir matices más marcados como «establecieron».
- source_word: οἱ ἐκ τοῦ Ἰσραήλ
  english_pob_choice: those from Israel
  chosen_spanish: los que eran de Israel
  alternatives_spanish:
  - los de Israel
  - los que provenían de Israel
  - los israelitas
  lexicon: BDAG
  rationale: La frase distingue a este grupo de sacerdotes y levitas. «Los que eran de Israel» preserva la construcción y la distinción sin forzar una identificación interpretativa excesiva.
- source_word: ἐν Ἰερουσαλὴμ καὶ ἐν τῇ χώρᾳ
  english_pob_choice: in Jerusalem and in the country
  chosen_spanish: en Jerusalén y en el campo
  alternatives_spanish:
  - en Jerusalén y en la tierra
  - en Jerusalén y en la región
  - en Jerusalén y en el territorio
  lexicon: BDAG
  rationale: Aquí χώρα contrasta Jerusalén con el ámbito no urbano. «El campo» comunica esa oposición de manera natural en español, aunque «territorio» o «región» también podrían reflejar el término.
- source_word: τῇ νουμηνίᾳ τοῦ ἑβδόμου μηνός
  english_pob_choice: at the new moon of the seventh month
  chosen_spanish: en la luna nueva del séptimo mes
  alternatives_spanish:
  - en la nueva luna del séptimo mes
  - al comienzo del séptimo mes
  - en el novilunio del séptimo mes
  lexicon: LSJ
  rationale: νουμηνία designa la luna nueva o el día de novilunio. «Luna nueva» es la forma más clara y bíblica en español actual; «novilunio» sería más técnico pero menos accesible.
- source_word: οἱ υἱοὶ Ἰσραήλ
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los hijos de Israel
  - los israelitas
  - los hijos de Jacob
  lexicon: BDAG
  rationale: Se conserva la expresión familiar y pactal del griego. «Hijos de Israel» mantiene la literalidad y la distinción respecto de «los que eran de Israel».
- source_word: κατοικίαις
  english_pob_choice: settlements
  chosen_spanish: sus asentamientos
  alternatives_spanish:
  - sus moradas
  - sus poblados
  - sus viviendas
  lexicon: LSJ
  rationale: κατοικία puede referirse a lugar de habitación o asentamiento. «Asentamientos» refleja el sentido colectivo y geográfico mejor que «casas» o «viviendas».
theological_decisions:
- issue: Relación con el paralelo hebreo aproximado en Nehemías
  english_pob_reading: Translate the Greek sequence as given, including the reference to the new moon of the seventh month, while allowing the Hebrew parallel to confirm the broader setting of Israelites gathered in their inhabited places.
  chosen_spanish_reading: Traducir la secuencia griega tal como está, incluyendo la referencia a la luna nueva del séptimo mes, sin armonizarla con el paralelo de Nehemías.
  alternative_spanish_readings:
  - Ajustar el versículo al paralelo de Nehemías sobre la asamblea ante la Puerta del Agua
  - Reformularlo para acercarlo más al relato hebreo
  rationale: La fuente primaria para 1 Esdras aquí es el griego. El paralelo hebreo sirve de comprobación, pero no debe reemplazar la redacción preservada en el texto griego. Por eso se conserva la mención a la luna nueva y a la residencia en Jerusalén/campo.
  doctrine_reference: 'PHILOSOPHY.md: WLC MT parallels for 1 Esdras; Translation philosophy #1'
translation_notes:
  revision_awareness: 'Ajusté la sintaxis para reflejar el flujo de una sola oración en griego: la mención temporal («en la luna nueva del séptimo mes») queda unida a la cláusula anterior. También mantuve la distinción entre «los que eran de Israel» y «los hijos de Israel», tal como en el texto fuente y en el audit trail inglés.'
  spanish_consistency_notes:
  - Usé «Yahvé» solo cuando aparezca el nombre divino explícito; aquí no aplica.
  - Mantuve «hijos de Israel» para conservar la fórmula pactal literal y no sustituirla por una generalización.
  - Elegí «luna nueva» en lugar de «novilunio» por claridad y registro bíblico moderado.
  - Evité «SEÑOR» y otras armonizaciones con el paralelo hebreo, porque el pasaje griego no contiene el nombre divino ni una referencia a la asamblea de Nehemías.
