translation:
  language: es
  text: Y te daré, a ti y a tu descendencia después de ti, la tierra donde has residido como extranjero[a]—toda la tierra de Canaán—como posesión perpetua[b], y seré su Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'la tierra de tus estancias como forastero'.
    reason: lexical_alternative
  - marker: b
    text: O 'para posesión perpetua'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָתַתִּי
  english_pob_choice: And I will give
  chosen_spanish: Y te daré
  alternatives_spanish:
  - Y daré
  - Y yo te daré
  lexicon: HALOT
  rationale: El hebreo expresa una promesa futura en contexto pactual; en español, el futuro simple comunica bien esa promesa. Se mantiene el destinatario directo con 'te'.
- source_word: לְךָ
  english_pob_choice: to you
  chosen_spanish: te
  alternatives_spanish:
  - a ti
  lexicon: HALOT
  rationale: El dativo hebreo se vierte de manera natural con el complemento pronominal directo indirecto en español. 'Te' conserva la referencia personal a Abram.
- source_word: וּלְזַרְעֲךָ אַחֲרֶיךָ
  english_pob_choice: and to your offspring after you
  chosen_spanish: y a tu descendencia después de ti
  alternatives_spanish:
  - y a tu simiente después de ti
  - y a tus descendientes después de ti
  lexicon: HALOT
  rationale: '''זרע'' es colectivo; ''descendencia'' conserva el sentido colectivo sin pluralizarlo excesivamente. ''Después de ti'' preserva la sucesión genealógica explícita.'
- source_word: אֶרֶץ מְגֻרֶיךָ
  english_pob_choice: the land of your sojournings
  chosen_spanish: la tierra de tus peregrinaciones
  alternatives_spanish:
  - la tierra de tu peregrinar
  - la tierra donde habitas como extranjero
  - la tierra de tu residencia foránea
  lexicon: HALOT
  rationale: '''מגור'' alude a residencia como forastero/foráneo. ''Peregrinaciones'' conserva la idea de estancia no asentada y resulta idiomática en español bíblico sin borrar la tensión de extranjero residente.'
- source_word: אֵת כָּל אֶרֶץ כְּנַעַן
  english_pob_choice: all the land of Canaan
  chosen_spanish: toda la tierra de Canaán
  alternatives_spanish:
  - toda la tierra de Canaan
  - todo el territorio de Canaán
  lexicon: HALOT
  rationale: '''כָּל'' enfatiza totalidad; ''toda la tierra de Canaán'' es natural y fiel. Se usa ''tierra'' para mantener la fórmula territorial bíblica.'
- source_word: לַאֲחֻזַּת עוֹלָם
  english_pob_choice: as an everlasting possession
  chosen_spanish: como posesión perpetua
  alternatives_spanish:
  - como posesión eterna
  - como heredad perpetua
  - para posesión perpetua
  lexicon: HALOT
  rationale: '''אֲחֻזָּה'' es una posesión/tenencia de tierra; ''posesión perpetua'' preserva la fuerza jurídica y territorial. ''Perpetua'' comunica mejor que ''eterna'' la permanencia pactal de la cláusula.'
- source_word: וְהָיִיתִי לָהֶם לֵאלֹהִים
  english_pob_choice: and I will be their God
  chosen_spanish: y seré su Dios
  alternatives_spanish:
  - y yo seré su Dios
  - y seré Dios para ellos
  lexicon: HALOT
  rationale: La fórmula pactual se expresa con naturalidad en español como 'seré su Dios'. Mantiene la relación de pacto sin introducir un matiz ajeno al hebreo.
theological_decisions:
- issue: Fórmula de pacto 'seré su Dios'
  english_pob_reading: and I will be their God
  chosen_spanish_reading: y seré su Dios
  alternative_spanish_readings:
  - y seré Dios para ellos
  - y yo seré su Dios
  rationale: El hebreo formula una relación pactual, no un cambio ontológico en Dios. 'Seré su Dios' conserva la resonancia bíblica y la claridad doctrinal sin suavizar el vínculo de pertenencia.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'El borrador sigue de cerca la lectura inglesa auditada, pero ajusta la sintaxis al español natural y conserva las dos tensiones léxicas principales: מְגוּרִים como estancia foránea y עוֹלָם/אֲחֻזָּה como permanencia de posesión territorial. No se detectaron revisiones posteriores en el expediente que alteren esta línea.'
  spanish_consistency_notes:
  - Se prefirió 'descendencia' para זֶרַע por consistencia con usos bíblicos españoles donde el término es colectivo.
  - Se mantuvo 'tierra' para אֶרֶץ por la fórmula territorial del pacto y su claridad eclesial.
  - '''Peregrinaciones'' conserva el valor de residencia no permanente y evita borrar el matiz de extranjero residente.'
  - '''Posesión perpetua'' refleja tanto el derecho de tenencia como la duración indefinida del pacto.'
