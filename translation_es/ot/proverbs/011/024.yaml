translation:
  language: es
  text: Hay quien reparte, pero aumenta aún más; y quien retiene más de lo justo[a], pero solo a la pobreza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O también: «y quien retiene lo que es justo». La frase hebrea מִיֹּשֶׁר es difícil; puede significar retener más allá de lo debido, o retener lo que la equidad exige.'
    reason: alternative_reading
lexical_decisions:
- source_word: יֵשׁ
  english_pob_choice: There is one who
  chosen_spanish: Hay quien
  alternatives_spanish:
  - Hay una persona que
  - Existe quien
  lexicon: HALOT
  rationale: La forma introduce un caso general o tipo de persona. En español, 'Hay quien' expresa con naturalidad ese valor proverbial sin forzar una referencia individual.
- source_word: מְפַזֵּר
  english_pob_choice: scatters
  chosen_spanish: reparte
  alternatives_spanish:
  - dispersa
  - derrama
  lexicon: HALOT
  rationale: Aunque el verbo hebreo es literalmente 'dispersar', en este contexto sapiencial apunta a una generosidad abierta. 'Reparte' conserva la idea de dar ampliamente sin perder la orientación ética del proverbio.
- source_word: וְנוֹסָף עוֹד
  english_pob_choice: yet gains still more
  chosen_spanish: y le es añadido más
  alternatives_spanish:
  - y aumenta todavía más
  - y recibe aún más
  lexicon: HALOT
  rationale: נוסף expresa incremento o adición. 'Le es añadido más' mantiene la pasiva de resultado y el carácter paradójico del proverbio, sin convertirlo en una paráfrasis demasiado libre.
- source_word: וְחוֹשֵׂךְ
  english_pob_choice: and one who withholds
  chosen_spanish: y quien retiene
  alternatives_spanish:
  - y quien se guarda
  - y quien escatima
  lexicon: HALOT
  rationale: El verbo significa retener o guardar de vuelta. 'Retiene' es la opción más directa y neutral para el contraste con 'reparte'.
- source_word: מִיֹּשֶׁר
  english_pob_choice: more than is right
  chosen_spanish: más de lo justo
  alternatives_spanish:
  - más de lo recto
  - más de lo debido
  - de lo que es justo
  lexicon: HALOT
  rationale: La expresión hebrea es difícil y, en este contexto, indica retener más allá de la conveniencia o justicia debida. 'Más de lo justo' comunica bien esa tensión sin fijar un matiz excesivamente técnico.
- source_word: אַךְ
  english_pob_choice: but only
  chosen_spanish: pero solo
  alternatives_spanish:
  - solo
  - sin más que
  lexicon: HALOT
  rationale: אַךְ marca restricción y resultado limitado. 'Pero solo' reproduce esa limitación y el contraste irónico del proverbio.
- source_word: לְמַחְסוֹר
  english_pob_choice: to poverty
  chosen_spanish: para la escasez
  alternatives_spanish:
  - para la pobreza
  - hacia la carencia
  - a la necesidad
  lexicon: HALOT
  rationale: מַחְסוֹר denota falta o carencia. 'Escasez' conserva el campo semántico de insuficiencia sin sobredeterminarlo como pobreza crónica en todos los casos.
translation_notes:
  revision_awareness: 'El texto español sigue el pasaje hebreo directo y refleja el ajuste reciente del POB en la segunda mitad: la idea no es ''retener lo justo'', sino ''retener más de lo justo'' o más allá de la conveniencia debida. Se ha preferido una formulación idiomática en español que preserve esa tensión sin suavizarla.'
  spanish_consistency_notes:
  - Se usó 'Yahvé' no porque aparezca en este versículo, sino como norma general del proyecto cuando el texto hebreo contiene el nombre divino.
  - Se evitó 'Cristo', 'SEÑOR' y otras sustituciones no presentes en el versículo.
  - '''Hay quien'' mantiene el valor proverbial impersonal del hebreo.'
  - '''Más de lo justo'' y la nota al pie conservan la ambigüedad lexical de מִיֹּשֶׁר en línea con el audit trail inglés.'
