translation:
  language: es
  text: 'Entonces Ozías y los gobernantes le dijeron: «Ve en paz, y que Yahvé Dios vaya delante de ti para la venganza[a] contra nuestros enemigos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para la vindicación contra nuestros enemigos» / «para vengarse de nuestros enemigos». El término griego puede denotar acción punitiva o vindicación; aquí el contexto bélico favorece «venganza».
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὀζίας
  english_pob_choice: Uzziah
  chosen_spanish: Ozías
  alternatives_spanish:
  - Uzías
  lexicon: transliteración estándar
  rationale: El nombre propio griego Ὀζίας se refleja en español con la forma más cercana a la transliteración, Ozías. Mantiene la relación con el inglés auditado Uzziah sin imponer una forma eclesiástica distinta.
- source_word: οἱ ἄρχοντες
  english_pob_choice: the rulers
  chosen_spanish: los gobernantes
  alternatives_spanish:
  - los jefes
  - los magistrados
  - los dirigentes
  lexicon: BDAG
  rationale: ἄρχοντες denota personas con autoridad. ‘Gobernantes’ conserva el valor de autoridad oficial sin concretarlo indebidamente en una función civil específica.
- source_word: Πορεύου
  english_pob_choice: Go
  chosen_spanish: Vete
  alternatives_spanish:
  - Ve
  - Prosigue
  - Marcha
  lexicon: BDAG
  rationale: El imperativo expresa partida. ‘Vete’ es natural en español y conserva la fuerza directa del mandato sin añadir matices innecesarios.
- source_word: εἰς εἰρήνην
  english_pob_choice: in peace
  chosen_spanish: en paz
  alternatives_spanish:
  - con paz
  - safamente
  lexicon: BDAG
  rationale: La expresión funciona como fórmula de despedida y bendición. ‘En paz’ es el equivalente idiomático más claro en español y preserva el sentido formulístico.
- source_word: Κύριος ὁ θεός
  english_pob_choice: the Lord God
  chosen_spanish: Yahvé, Dios
  alternatives_spanish:
  - el Señor Dios
  - el Señor, Dios
  lexicon: BDAG / nombre divino
  rationale: Se adopta ‘Yahvé’ para Κύριος cuando el contexto de la LXX refleja el nombre divino, conforme al criterio del proyecto. ‘Dios’ conserva ὁ θεός. La coma explicita el título doble sin ocultar el nombre divino detrás de ‘Señor’.
- source_word: ἔμπροσθέν σου
  english_pob_choice: go before you
  chosen_spanish: vaya delante de ti
  alternatives_spanish:
  - esté delante de ti
  - te preceda
  lexicon: BDAG
  rationale: La expresión indica precedencia y guía/protección divina. ‘Vaya delante de ti’ mantiene la imagen espacial y hace explícito el movimiento implícito, como en el inglés auditado.
- source_word: εἰς ἐκδίκησιν
  english_pob_choice: for vengeance
  chosen_spanish: para la venganza
  alternatives_spanish:
  - para vengar
  - para vindicación
  - para justicia
  lexicon: BDAG
  rationale: En este contexto bélico, ἐκδίκησις conserva fuerza punitiva. ‘Venganza’ sigue el juicio del inglés POB y evita suavizar el término a ‘vindicación’ o ‘justicia’.
- source_word: τῶν ἐχθρῶν ἡμῶν
  english_pob_choice: on our enemies
  chosen_spanish: de nuestros enemigos
  alternatives_spanish:
  - contra nuestros enemigos
  - sobre nuestros enemigos
  lexicon: BDAG
  rationale: El genitivo depende de ἐκδίκησις. En español, ‘de nuestros enemigos’ conserva la relación nominal sin forzar una preposición que altere la estructura del sustantivo. El contexto deja claro que la acción recae sobre los enemigos.
theological_decisions:
- issue: Tratamiento de κύριος en una cita de la Septuaginta
  english_pob_reading: the Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  - el Señor Dios
  rationale: El texto griego de la LXX usa Κύριος ὁ θεός, y el proyecto pide ‘Yahvé’ cuando el griego de la Escritura griega remite al nombre divino. Así se evita el masking convencional con ‘SEÑOR’ y se mantiene la trazabilidad al nombre del pacto.
  doctrine_reference: 'DOCTRINE.md Contested terms: יהוה / YHWH → Yahvé'
- issue: Fuerza de ἐκδίκησις en contexto de guerra y liberación
  english_pob_reading: vengeance
  chosen_spanish_reading: venganza
  alternative_spanish_readings:
  - vindicación
  - justicia
  rationale: El contexto es una exhortación de salida en paz con expectativa de acción divina contra enemigos. ‘Venganza’ preserva la intensidad retributiva del término y evita una lectura demasiado abstracta o atenuada.
  doctrine_reference: 'DOCTRINE.md Contested terms: δικαιοσύνη / ἐκδίκησις como justicia/vindicación según contexto'
- issue: Relación entre ‘go before you’ y protección divina
  english_pob_reading: go before you
  chosen_spanish_reading: vaya delante de ti
  alternative_spanish_readings:
  - esté delante de ti
  - te preceda
  rationale: 'La imagen no es meramente estática: el Señor Dios precede a la destinataria en su camino. ‘Vaya delante de ti’ preserva la metáfora de guía y protección sin sobreinterpretarla.'
  doctrine_reference: Guía divina implícita en el verbo de movimiento y el marcador espacial ἔμπροσθεν
translation_notes:
  revision_awareness: Se siguió la última revisión inglesa que prefirió una relación más natural entre εἰς ἐκδίκησιν y el objeto de la acción, manteniendo el sentido formal. En español se decidió conservar la fuerza de ἐκδίκησις con ‘venganza’ y expresar la relación con ‘de nuestros enemigos’, sin perder el trasfondo bélico ni introducir una paráfrasis libre.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ conforme al estándar del proyecto para el nombre divino en textos basados en la LXX.
  - Se evita ‘Señor’ como sustituto automático de Κύριος, pero sí se conserva ‘Dios’ para ὁ θεός.
  - Se mantiene un registro reverente y moderno, con sintaxis directa y sin arcaísmos innecesarios.
  - El marcador de nota [a] queda anclado en ‘venganza’ para preservar la alternativa semántica documentada.
