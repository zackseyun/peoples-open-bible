translation:
  language: es
  text: 'Él dijo[a]: «He sido muy celoso por Yahvé, el Dios de los ejércitos, porque los hijos de Israel[b] han abandonado tu pacto, han derribado tus altares y han matado a tus profetas a espada. Solo yo he quedado, y buscan mi vida para quitármela».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «He sido extremadamente celoso por Yahvé». El hebreo usa un infinitivo absoluto con un verbo finito para intensificar la afirmación.
    reason: lexical_alternative
  - marker: b
    text: Hebreo «los hijos de Israel»; muchas traducciones lo expresan más idiomáticamente como «los israelitas».
    reason: lexical_alternative
lexical_decisions:
- source_word: קַנֹּא קִנֵּאתִי
  english_pob_choice: I have been very zealous
  chosen_spanish: He sido muy celoso
  alternatives_spanish:
  - He sido extremadamente celoso
  - He sido muy zealous
  lexicon: HALOT
  rationale: El hebreo usa infinitivo absoluto con verbo finito para intensificar la afirmación. En español, «muy celoso» comunica la intensidad de manera natural y conserva la idea de celo ardiente por la fidelidad al pacto. «Celoso» aquí no se entiende como envidia romántica, sino como fervor leal.
- source_word: לַיהוָה
  english_pob_choice: for Yahweh
  chosen_spanish: para Yahvé
  alternatives_spanish:
  - para el SEÑOR
  - para Yahvé
  lexicon: HALOT
  rationale: La preposición ל expresa dirección u objeto del celo. Según el criterio del proyecto, יהוה se vierte «Yahvé» en el texto principal, manteniendo el nombre divino sin el convencional enmascaramiento «SEÑOR».
- source_word: אֱלֹהֵי צְבָאוֹת
  english_pob_choice: the God of hosts
  chosen_spanish: el Dios de los ejércitos
  alternatives_spanish:
  - el Dios de los ejércitos celestiales
  - el Dios de los ejércitos
  lexicon: HALOT
  rationale: «צבאות» puede abarcar ejércitos celestiales y terrenales. «Los ejércitos» conserva la amplitud del título y su fuerza tradicional sin sobreespecificar.
- source_word: עָזְבוּ בְרִיתְךָ
  english_pob_choice: have forsaken your covenant
  chosen_spanish: han abandonado tu pacto
  alternatives_spanish:
  - han dejado tu pacto
  - han forsaken tu pacto
  lexicon: HALOT
  rationale: עזב admite «abandonar», «dejar» o «forsake». «Abandonado» transmite la gravedad del quiebre del pacto en español actual.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - el pueblo de Israel
  lexicon: HALOT
  rationale: La forma hebrea es literalmente «hijos de Israel». Se mantiene esa expresión para conservar el etnónimo y el matiz de filiación corporativa, sin pasar a un equivalente más idiomático que atenúe la forma original.
- source_word: מִזְבְּחֹתֶיךָ הָרָסוּ
  english_pob_choice: torn down your altars
  chosen_spanish: han derribado tus altares
  alternatives_spanish:
  - han demolido tus altares
  - han destruido tus altares
  lexicon: HALOT
  rationale: הרס significa derribar, demoler. «Derribado» es natural en español y preserva la imagen concreta de la acción.
- source_word: נְבִיאֶיךָ הָרְגוּ בֶחָרֶב
  english_pob_choice: killed your prophets with the sword
  chosen_spanish: han matado a tus profetas a espada
  alternatives_spanish:
  - han asesinado a tus profetas con la espada
  - han dado muerte a tus profetas a espada
  lexicon: HALOT
  rationale: La expresión hebrea es directa e instrumental. «A espada» es la forma española estable para conservar la concreción violenta del medio de muerte.
- source_word: וָאִוָּתֵר אֲנִי לְבַדִּי
  english_pob_choice: I alone am left
  chosen_spanish: Yo solo he quedado
  alternatives_spanish:
  - Yo solo quedo
  - Yo, solo yo, he quedado
  lexicon: HALOT
  rationale: La frase enfatiza aislamiento. «Yo solo he quedado» conserva la restricción enfática de אני לבדי y suena natural en español bíblico moderno.
- source_word: וַיְבַקְשׁוּ אֶת נַפְשִׁי
  english_pob_choice: they seek my life
  chosen_spanish: buscan mi vida
  alternatives_spanish:
  - buscan mi alma
  - buscan quitarme la vida
  lexicon: HALOT
  rationale: נפש en este modismo refiere a la vida, no principalmente al alma inmaterial. «Buscan mi vida» conserva el valor idiomático y permite el desarrollo final «para quitármela».
- source_word: לְקַחְתָּהּ
  english_pob_choice: to take it
  chosen_spanish: para quitármela
  alternatives_spanish:
  - para tomarla
  - para arrebatarla
  lexicon: HALOT
  rationale: El sufijo femenino retoma a נפשי. En español, «quitármela» explica con claridad la finalidad homicida implícita en «tomarla».
theological_decisions:
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Yahweh
  rationale: La pauta del proyecto exige usar «Yahvé» como forma principal del Tetragrámaton en español, preservando el nombre del pacto y evitando el reemplazo litúrgico por «SEÑOR».
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Título divino אֱלֹהֵי צְבָאוֹת
  english_pob_reading: the God of hosts
  chosen_spanish_reading: el Dios de los ejércitos
  alternative_spanish_readings:
  - el Dios de los ejércitos celestiales
  - el Dios de las huestes
  rationale: Se conserva el título tradicional sin restringirlo artificialmente. «Ejércitos» mantiene la amplitud semántica de צבאות y su densidad teológica.
  doctrine_reference: HALOT, צְבָאוֹת
- issue: בְּנֵי יִשְׂרָאֵל
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - el pueblo de Israel
  rationale: Se preserva la forma masculina y genealógica del hebreo, importante para la identidad corporativa y el enlace con la lengua fuente.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: El borrador sigue de cerca el estado final del audit trail inglés, sin introducir revisiones nuevas ni desplazar las decisiones aprobadas. Se adapta el texto a español natural, manteniendo el nombre divino «Yahvé», el título «Dios de los ejércitos», el etnónimo «hijos de Israel» y el modismo «buscar mi vida» con aclaración en nota.
  spanish_consistency_notes:
  - Se mantiene la puntuación bíblica con comillas angulares y dos puntos coherentes con español editorial.
  - Se conserva la intensidad del hebreo sin añadir énfasis no sustentado.
  - No se sustituye «Yahvé» por equivalentes litúrgicos.
  - «A espada» reproduce la concreción instrumental del hebreo.
  - La nota [b] aclara el modismo sin cambiar el texto principal.
