revisions:
- from: 'Habla a Aarón y a sus hijos[a], diciendo: “Así bendecirán a los hijos de Israel. Diles,”'
  to: 'Habla a Aarón y a sus hijos[a], diciendo: «Así bendecirán a los hijos de Israel. Les dirán:»'
  rationale: 'Se ajusta la formulación para reflejar mejor la instrucción dirigida a Aarón y a sus hijos dentro de la cita: «Así bendecirán… Les dirán» preserva la fuerza prescriptiva del hebreo y mejora la cohesión en español. También se normalizan las comillas y los dos puntos finales para introducir con naturalidad las palabras del versículo siguiente.'
