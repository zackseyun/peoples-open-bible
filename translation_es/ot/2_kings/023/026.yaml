source:
  edition: WLC
  text: אַ֣ךְ לֹֽא שָׁ֣ב יְהוָ֗ה מֵ/חֲר֤וֹן אַפּ/וֹ֙ הַ/גָּד֔וֹל אֲשֶׁר חָרָ֥ה אַפּ֖/וֹ בִּֽ/יהוּדָ֑ה עַ֚ל כָּל הַ/כְּעָסִ֔ים אֲשֶׁ֥ר הִכְעִיס֖/וֹ מְנַשֶּֽׁה׀־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/2_kings/023/026.yaml
  text: Yet Yahweh did not turn from the fierceness of his great anger[a], with which his anger burned against Judah[b], because of all the provocations with which Manasseh had provoked him.
  footnotes:
  - marker: a
    text: Or 'from his great burning anger'; the Hebrew literally speaks of the 'burning of his nose/anger,' an idiom for intense anger.
    reason: lexical_alternative
  - marker: b
    text: Or 'in Judah'; English commonly says anger burned 'against' someone, though the Hebrew preposition is literally 'in.'
    reason: lexical_alternative
  ai_draft:
    model_id: gpt-5.4
    model_version: gpt-5.4-2026-03-05
