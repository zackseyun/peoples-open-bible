translation:
  language: es
  text: Porque nos enseña el dominio propio, de modo que podamos dominar todos los placeres y deseos, y a practicar la fortaleza, para soportar voluntariamente todo dolor;
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: σωφροσύνην
  english_pob_choice: self-control
  chosen_spanish: dominio propio
  alternatives_spanish:
  - autocontrol
  - templanza
  lexicon: LSJ
  rationale: En este contexto ético, el término apunta a la capacidad de gobernarse a sí mismo. 'Dominio propio' expresa bien la idea de autocontrol sin sonar demasiado técnico, y evita la posible restricción de 'templanza' a un registro más clásico o eclesiástico.
- source_word: ἐκδιδάσκει
  english_pob_choice: teaches
  chosen_spanish: nos enseña
  alternatives_spanish:
  - nos instruye
  - nos forma
  lexicon: LSJ
  rationale: El verbo indica que la virtud actúa como maestra o instructora. 'Nos enseña' es natural en español y conserva la relación directa entre la virtud y los efectos que siguen.
- source_word: κρατεῖν
  english_pob_choice: master
  chosen_spanish: dominar
  alternatives_spanish:
  - controlar
  - vencer
  lexicon: LSJ
  rationale: El verbo implica ejercer dominio sobre algo. 'Dominar' conserva mejor esa fuerza activa que un simple 'controlar', y mantiene la relación con 'placeres y deseos'.
- source_word: ἡδονῶν
  english_pob_choice: pleasures
  chosen_spanish: los placeres
  alternatives_spanish:
  - los deleites
  - las satisfacciones
  lexicon: LSJ
  rationale: El sustantivo designa placeres en general; 'los placeres' es la forma más directa y amplia en español, sin añadir una restricción sensual que el griego no exige.
- source_word: ἐπιθυμιῶν
  english_pob_choice: desires
  chosen_spanish: deseos
  alternatives_spanish:
  - apetitos
  - ansias
  lexicon: LSJ
  rationale: Aquí el término puede ser moralmente neutro o negativo, pero el contexto lo agrupa con placeres de modo general. 'Deseos' preserva esa amplitud sin introducir una lectura más específica como 'lujurias'.
- source_word: ἀνδρείαν
  english_pob_choice: courage
  chosen_spanish: la valentía
  alternatives_spanish:
  - el coraje
  - la fortaleza
  lexicon: LSJ
  rationale: En la ética helenística, la virtud se refiere a la disposición firme frente al sufrimiento. 'Valentía' comunica bien esa virtud en español actual y mantiene la resonancia de acción firme ante el dolor.
- source_word: ἐξασκεῖν
  english_pob_choice: practice
  chosen_spanish: practiquemos
  alternatives_spanish:
  - ejercitemos
  - cultivemos
  lexicon: LSJ
  rationale: El verbo expresa ejercicio o cultivo activo de una virtud. 'Practiquemos' refleja adecuadamente la idea de formación continuada en un estilo natural de exhortación.
- source_word: πόνον
  english_pob_choice: pain
  chosen_spanish: dolor
  alternatives_spanish:
  - sufrimiento
  - penalidad
  lexicon: LSJ
  rationale: En este marco martirial, el término abarca el sufrimiento soportado. 'Dolor' es breve y directo, y funciona bien con 'todo' y el verbo 'soportar'.
- source_word: ἑκουσίως
  english_pob_choice: willingly
  chosen_spanish: voluntariamente
  alternatives_spanish:
  - de buen grado
  - de propia voluntad
  lexicon: LSJ
  rationale: El adverbio enfatiza la aceptación libre del sufrimiento. 'Voluntariamente' preserva con precisión ese matiz de elección consciente.
- source_word: ὑπομένειν
  english_pob_choice: endure
  chosen_spanish: soportemos
  alternatives_spanish:
  - perseveremos bajo
  - aguantemos
  lexicon: LSJ
  rationale: El verbo significa permanecer bajo, resistir o soportar. 'Soportemos' comunica la resistencia sostenida ante el sufrimiento y se ajusta bien a la construcción final.
theological_decisions:
- issue: Cómo rendir las virtudes éticas griegas en un contexto de martirio y formación moral
  english_pob_reading: Translate the virtues with standard English ethical terms ('self-control,' 'courage') rather than more literal but less idiomatic forms.
  chosen_spanish_reading: Traducir con términos éticos estándar en español ('dominio propio,' 'valentía') en vez de calcos más rígidos o formas arcaizantes.
  alternative_spanish_readings:
  - '''templanza'' para σωφροσύνην y ''fortaleza'' para ἀνδρείαν'
  - '''autocontrol'' y ''coraje'''
  rationale: El pasaje presenta una instrucción moral racional. En español, 'dominio propio' y 'valentía' transmiten el contenido virtud-ético de forma clara y digna, sin cargar el texto con términos más técnicos, arcaicos o marcadamente masculinizados.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §§5–6'
translation_notes:
  revision_awareness: El texto griego presenta una secuencia con dos cláusulas de propósito introducidas por ὥστε + infinitivo; la redacción española conserva esa estructura con 'para que' y mantiene el paralelismo entre dominar placeres/deseos y soportar dolor voluntariamente. La decisión más sensible es ἀνδρείαν, que en este contexto se entiende como virtud de valentía/coraje, no como 'virilidad' literal.
  spanish_consistency_notes:
  - Se mantuvo un registro sobrio y eclesiásticamente legible, evitando términos demasiado técnicos.
  - Se evitó 'Cristo', 'Señor' o vocabulario teológico no presente en el versículo.
  - '''Dominio propio'' se eligió por claridad moderna y afinidad con el sentido de σωφροσύνην.'
