translation:
  language: es
  text: 'Entonces Yahvé dijo a Moisés: «Extiende tu mano sobre el mar, para que las aguas vuelvan[a] sobre los egipcios, sobre sus carros y sobre sus jinetes».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y las aguas volverán sobre los egipcios». El verbo hebreo puede traducirse más literalmente como futuro simple, pero aquí probablemente expresa el resultado buscado por la acción de Moisés.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El texto fuente usa el nombre propio divino, no un título. En español se mantiene la transliteración reverente «Yahvé» para preservar el nombre del pacto, siguiendo el criterio del POB en inglés y evitando la sustitución por un equivalente tradicional.
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Y dijo
  lexicon: HALOT
  rationale: La forma narrativa con waw consecutiva avanza la acción. «Entonces» comunica bien la progresión temporal en español sin perder el valor secuencial del hebreo.
- source_word: נְטֵה
  english_pob_choice: Stretch out
  chosen_spanish: Extiende
  alternatives_spanish:
  - Tiende
  - Alarga
  lexicon: HALOT
  rationale: El imperativo pide un movimiento físico de la mano hacia afuera sobre el mar. «Extiende» es idiomático y fiel al gesto pedido.
- source_word: יָדְךָ
  english_pob_choice: your hand
  chosen_spanish: tu mano
  alternatives_spanish:
  - la mano
  lexicon: HALOT
  rationale: Corresponde directamente al sustantivo con sufijo de segunda persona singular. No requiere ampliación ni paráfrasis.
- source_word: עַל הַיָּם
  english_pob_choice: over the sea
  chosen_spanish: sobre el mar
  alternatives_spanish:
  - sobre el mar
  - encima del mar
  - hacia el mar
  lexicon: HALOT
  rationale: «Sobre» expresa bien la relación espacial de la mano extendida por encima del agua, y «mar» mantiene el referente natural del hebreo en contexto narrativo.
- source_word: הַמַּיִם
  english_pob_choice: the waters
  chosen_spanish: las aguas
  alternatives_spanish:
  - el agua
  lexicon: HALOT
  rationale: El hebreo plural se refleja mejor con «las aguas», que conserva el tono elevado y la imagen de masas de agua en movimiento.
- source_word: וְיָשֻׁבוּ
  english_pob_choice: so that ... may return
  chosen_spanish: para que ... vuelvan
  alternatives_spanish:
  - y ... volverán
  - y ... regresen
  lexicon: HALOT
  rationale: Después del mandato, el verbo expresa resultado/intención. «Para que ... vuelvan» conserva ese matiz final sin convertirlo meramente en futuro narrativo.
- source_word: עַל מִצְרַיִם
  english_pob_choice: over the Egyptians
  chosen_spanish: sobre los egipcios
  alternatives_spanish:
  - contra los egipcios
  - encima de los egipcios
  lexicon: HALOT
  rationale: «Sobre» preserva la imagen de las aguas volviendo y cubriendo al pueblo egipcio. «Egipcios» mantiene el referente colectivo del nombre propio en plural contextual.
- source_word: עַל רִכְבּוֹ
  english_pob_choice: over their chariots
  chosen_spanish: sobre sus carros
  alternatives_spanish:
  - sobre sus carros de guerra
  - sobre sus carruajes
  lexicon: HALOT
  rationale: El término hebreo se refiere a carros de guerra; en español bíblico «carros» es la forma más directa y natural. Se conserva el posesivo plural contextual por el referente colectivo de «Mitzráyim».},{
- source_word: וְעַל פָּרָשָׁיו
  english_pob_choice: and over their horsemen
  chosen_spanish: y sobre sus jinetes
  alternatives_spanish:
  - y sobre sus caballeros
  - y sobre su caballería
  lexicon: HALOT
  rationale: פָּרָשִׁים son montados/jinetes. «Jinetes» es el equivalente más transparente y directo; evita tecnicismos militares menos naturales en español.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se conserva el nombre personal de Dios tal como aparece en el hebreo, en vez de sustituirlo por un título. «Yahvé» es la forma adoptada para el texto principal en español y mantiene la decisión doctrinal del POB.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Valor resultativo de וְיָשֻׁבוּ
  english_pob_reading: so that ... may return
  chosen_spanish_reading: para que ... vuelvan
  alternative_spanish_readings:
  - y ... volverán
  - y ... regresen
  rationale: La secuencia hebrea tras el imperativo expresa el efecto buscado por la acción de Moisés. «Para que» deja visible la intención/resulta-do sin borrar la posibilidad de una lectura más simple de futuro.
  doctrine_reference: 'POB audit trail: lexical alternative for resultative/future nuance'
- issue: Sufijos singulares con referente colectivo
  english_pob_reading: their chariots / their horsemen
  chosen_spanish_reading: sus carros / sus jinetes
  alternative_spanish_readings:
  - sus carros / sus jinetes
  - sus carros de guerra / su caballería
  rationale: Aunque el hebreo presenta sufijos singulares, el referente colectivo es Israel/Egipto como entidad plural en contexto narrativo. En español, el posesivo plural natural evita una traducción extraña y conserva el sentido colectivo.
  doctrine_reference: Hebrew collective reference in narrative context
translation_notes:
  revision_awareness: Se revisó el audit trail inglés y no se detectaron cambios aplicados en la última pasada; el presente borrador sigue la lectura aprobada (high_agreement) y conserva la alternativa resultativa/futura del verbo como nota.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como forma principal del nombre divino, coherente con el estándar del proyecto.
  - «Las aguas» conserva el plural hebreo sin forzar un singular genérico.
  - «Carros» y «jinetes» reflejan el lenguaje bíblico natural en español y mantienen la imaginería militar del pasaje.
  - La nota textual/lexical se ancla solo en el punto donde aparece la ambigüedad resultativa del verbo hebreo.
