    text: O «y a los amorreos que habitaban en la tierra».
    reason: lexical_alternative
  revision_rationale: Se recomienda una reparación menor para ajustar el gentilicio a un sentido colectivo más natural y mejor alineado con la decisión auditada en inglés, sin cambiar el significado general del versículo ni la terminología teológica del proyecto.
