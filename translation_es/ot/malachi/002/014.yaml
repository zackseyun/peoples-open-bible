    reason: lexical_alternative
  - marker: b
    text: 'O: «tu esposa de pacto» o «la esposa de tu pacto».'
    reason: lexical_alternative
  revision_rationale: Se corrige la sintaxis española de la cláusula de infidelidad («a quien le has sido infiel») y se reubican las notas para que expliquen las expresiones correctas. Se mantiene «Yahvé», el matiz jurídico de «ha sido testigo», la imagen «la esposa de tu juventud» y el énfasis covenantal de «pacto».
