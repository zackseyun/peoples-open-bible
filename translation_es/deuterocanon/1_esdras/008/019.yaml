  to: Y yo, el rey Artajerjes, he dado órdenes a los tesoreros de Siria y de Fenicia, para que todo lo que Esdras, el sacerdote y lector de la ley de Dios Altísimo, les pida[a], se lo entreguen cuidadosamente, hasta cien talentos de plata.
