revisions:
- from: 'Saúl arrojó la lanza y dijo: «Heriré[a] a David y al muro». Pero David se apartó de él dos veces.'
  to: 'Saúl arrojó la lanza y dijo: «Heriré[a] a David y al muro». Pero David esquivó y se apartó de él dos veces.'
  rationale: 'Se mantiene la excelente correspondencia de «arrojó la lanza» y de la frase difícil «Heriré a David y al muro», junto con su nota aclaratoria. Solo se ajusta el verbo final para expresar mejor la acción de evasión en contexto: «esquivó y se apartó de él» comunica más fielmente que David evitó el lanzamiento de Saúl, sin alejarse demasiado del hebreo ni añadir interpretación doctrinal.'
