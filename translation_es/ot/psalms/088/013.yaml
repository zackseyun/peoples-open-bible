translation:
  language: es
  text: ¿Se conocerá en la oscuridad tu maravilla, o tu rectitud[a] en la tierra del olvido[b]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tu justicia».
    reason: lexical_alternative
  - marker: b
    text: «La tierra del olvido» es una expresión poética para el ámbito de los muertos.
    reason: cultural_note
lexical_decisions:
- source_word: הֲ/יִוָּדַ֣ע
  english_pob_choice: Is ... made known
  chosen_spanish: ¿Se conocerá
  alternatives_spanish:
  - ¿Será conocida
  - ¿Se dará a conocer
  lexicon: HALOT
  rationale: El nifal imperfecto en una pregunta retórica permite una forma pasiva en español. «Se conocerá» conserva la pasividad y la fuerza interrogativa sin cargar más de lo que el hebreo exige.
- source_word: בַּ/חֹ֣שֶׁךְ
  english_pob_choice: in the darkness
  chosen_spanish: en la oscuridad
  alternatives_spanish:
  - en tinieblas
  - en la oscuridad
  lexicon: HALOT
  rationale: La preposición con artículo pide un sustantivo definido. «Oscuridad» comunica bien el campo semántico y evita sonar demasiado arcaico; aquí mantiene también el matiz poético del ámbito de muerte.
- source_word: פִּלְאֶ֑/ךָ
  english_pob_choice: your wonder
  chosen_spanish: tu maravilla
  alternatives_spanish:
  - tu prodigio
  - tus maravillas
  - tu obra maravillosa
  lexicon: HALOT
  rationale: 'El singular con sufijo 2ms se refleja mejor con un singular español: «maravilla». Conserva la idea de algo admirable/hecho portentoso sin pluralizar indebidamente.'
- source_word: וְ֝/צִדְקָתְ/ךָ֗
  english_pob_choice: or your righteousness
  chosen_spanish: tu justicia
  alternatives_spanish:
  - tu rectitud
  - tu justicia
  - tu justicia/rrectitud
  lexicon: HALOT
  rationale: En este contexto poético, «צדקה» admite «justicia» o «rectitud». Se eligió «justicia» por ser la alternativa contextual preservada por la POB inglesa y por sonar natural en paralelo con la acción divina.
- source_word: בְּ/אֶ֣רֶץ
  english_pob_choice: in the land
  chosen_spanish: en la tierra
  alternatives_spanish:
  - en la tierra
  - en el país
  lexicon: HALOT
  rationale: Aunque literalmente puede ser «tierra» o «país», el giro fijo «la tierra de...» funciona naturalmente en español para una esfera/ámbito metafórico.
- source_word: נְשִׁיָּֽה
  english_pob_choice: forgetfulness
  chosen_spanish: olvido
  alternatives_spanish:
  - olvido
  - olvidanza
  lexicon: HALOT
  rationale: El sustantivo expresa olvido/forgetfulness. «Olvido» es más idiomático y sigue la imagen poética del lugar donde todo queda fuera de la memoria.
theological_decisions:
- issue: Valor de צדקה en paralelo poético con la acción y el carácter de Dios
  english_pob_reading: righteousness
  chosen_spanish_reading: justicia
  alternative_spanish_readings:
  - rectitud
  rationale: La POB inglesa conserva «righteousness» en el texto y anota «justice» como alternativa. En español, «justicia» comunica mejor la alternativa contextual y mantiene la tensión semántica sin forzar una sola lectura moralista.
  doctrine_reference: 'DOCTRINE.md Contested terms: δικαιοσύνη / righteousness | justice'
translation_notes:
  revision_awareness: 'Se corrigió la validación anterior anclando explícitamente las notas con [a] y [b] dentro del texto español. La formulación principal sigue el hebreo y la auditoría inglesa: pregunta retórica, pasivo medio en español, singular para פִּלְאֶךָ, y «tierra del olvido» como giro poético.'
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico claro y natural en español.
  - Se evitó «SEÑOR» porque el verso no contiene el tetragrámaton.
  - Se preservó la paralelidad retórica de dos preguntas.
  - Las notas quedan ancladas únicamente donde aparece la ambigüedad léxica o cultural.
