base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/048/002.yaml
  text: 'There is no more praise for Moab[a]. In Heshbon they have devised evil against her: ‘Come, let us cut her off from being a nation.’ You too, Madmen, will be silenced[b]; the sword will go after you.'
  footnotes:
  - marker: a
    text: Heshbon and 'they have devised' echo one another in Hebrew, creating a wordplay between the city name and the verb for planning.
    reason: lexical_alternative
  - marker: b
    text: Madmen is likely a place-name. The Hebrew also sounds like 'be silent' or 'be brought to silence,' reinforcing the judgment through wordplay.
    reason: cultural_note
