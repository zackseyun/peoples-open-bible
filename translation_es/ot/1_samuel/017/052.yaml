    text: Hebrew 'as far as the entrance to the valley.' The phrase is textually and syntactically difficult; some understand it as a place name or render it more literally but less clearly.
    reason: textual_variant
  - marker: b
    text: Or 'raised a war cry.'
    reason: lexical_alternative
