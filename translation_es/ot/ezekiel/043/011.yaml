base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/043/011.yaml
  text: And if they are ashamed of all that they have done[a], make known to them the design of the house, its arrangement, its exits, its entrances, all its forms, all its statutes, and all its laws; and write it before their eyes[b], so that they may keep its whole design and all its statutes and do them.
  footnotes:
