  text: 'as free people, and not using freedom as a cover for evil, but as slaves of God.'
translation:
  language: ko
  text: '자유로운 자로서 행동하되, 그 자유를 악을 가리는 덮개로 삼지 말고, 하나님의 종으로서 행동하십시오.[a]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '「종」(δοῦλος)은 매인 자, 곧 주인에게 전적으로 속한 자를 가리킨다. 여기서는 부정적 매임이 아니라 하나님께 속함의 영광스러운 정체성을 가리킨다.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐλεύθεροι
  english_pob_choice: free people
  chosen_korean: 자유로운 자
  alternatives_korean:
  - 자유인
  - 해방된 자
  lexicon: BDAG
  rationale: 평이한 한국어 「자유로운 자」로 옮긴다.
- source_word: ἐπικάλυμμα τῆς κακίας
  english_pob_choice: a cover for evil
  chosen_korean: 악을 가리는 덮개
  alternatives_korean:
