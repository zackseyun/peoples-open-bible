translation:
  language: es
  text: Él llegó hasta el carnero que tenía dos cuernos, que yo había visto de pie delante del canal[a], y corrió contra él en el furor de su fuerza[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «corriente». El hebreo אוּבָל se refiere a un curso de agua; «canal» se elige aquí porque encaja mejor con el escenario de Daniel 8.
    reason: lexical_alternative
  - marker: b
    text: O «se lanzó contra él en la ira de su fuerza».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא
  english_pob_choice: He came up
  chosen_spanish: se acercó
  alternatives_spanish:
  - vino
  - llegó hasta
  - se acercó hasta
  lexicon: HALOT
  rationale: El hebreo expresa movimiento hacia el objetivo con עַד; en español, «se acercó» comunica con naturalidad la aproximación hostil sin perder el valor direccional.
- source_word: עַד
  english_pob_choice: to / up to
  chosen_spanish: hasta
  alternatives_spanish:
  - a
  - hasta el punto de
  lexicon: HALOT
  rationale: «Hasta» recoge mejor la idea de alcance o llegada al límite del objeto de movimiento.
- source_word: הָאַיִל
  english_pob_choice: the ram
  chosen_spanish: el carnero
  alternatives_spanish:
  - el macho carnero
  - el ram
  lexicon: HALOT
  rationale: En español bíblico y natural, «carnero» comunica el animal macho de manera clara y pública; «ram» no es idiomático en español.
- source_word: בַּעַל הַקְּרָנַיִם
  english_pob_choice: with the two horns
  chosen_spanish: que tenía dos cuernos
  alternatives_spanish:
  - con los dos cuernos
  - poseedor de los dos cuernos
  lexicon: HALOT
  rationale: El hebreo בעל expresa posesión/tenencia; en español, aplicado a un animal, «que tenía» es más natural que una construcción posesiva rígida y conserva el dato de los dos cuernos.
- source_word: אֲשֶׁר רָאִיתִי עֹמֵד
  english_pob_choice: which I had seen standing
  chosen_spanish: que yo había visto de pie
  alternatives_spanish:
  - que había visto de pie
  - al que había visto de pie
  lexicon: HALOT
  rationale: El pluscuamperfecto mantiene la anterioridad de la visión respecto a la acción narrada. «De pie» traduce el participio de modo literal y comprensible en español.
- source_word: לִפְנֵי הָאֻבָל
  english_pob_choice: before the canal
  chosen_spanish: delante del canal
  alternatives_spanish:
  - ante el canal
  - frente al canal
  - delante de la acequia
  lexicon: HALOT
  rationale: «Delante de» reproduce bien la relación espacial de לִפְנֵי. Se mantiene «canal» siguiendo la decisión auditada del inglés POB para אוּבָל en este contexto visionario.
- source_word: וַיָּרָץ אֵלָיו
  english_pob_choice: and ran at him
  chosen_spanish: y corrió contra él
  alternatives_spanish:
  - y corrió hacia él
  - y se abalanzó sobre él
  lexicon: HALOT
  rationale: «Corrió contra él» conserva el carácter agresivo del verbo en esta escena sin alejarse de su sentido básico de correr.
- source_word: בַּחֲמַת כֹּחוֹ
  english_pob_choice: in the fury of his power
  chosen_spanish: con el furor de su fuerza
  alternatives_spanish:
  - en el furor de su poder
  - con la furia de su poder
  - en la ira de su fuerza
  lexicon: HALOT
  rationale: «חֲמָה» puede ser furor/ira/furia; «כֹחַ» es fuerza/poder. «Furor de su fuerza» mantiene ambos sustantivos con un tono bíblico natural en español, evitando perder la intensidad de la expresión.
theological_decisions:
- issue: Conservación de la imagen y del sujeto animal en la visión
  english_pob_reading: the ram with the two horns
  chosen_spanish_reading: el carnero que tenía dos cuernos
  alternative_spanish_readings:
  - el carnero con dos cuernos
  - el carnero de los dos cuernos
  rationale: No hay base para espiritualizar ni identificar el símbolo en el texto mismo; la traducción conserva la imagen visionaria tal como aparece en el hebreo y en el POB inglés.
  doctrine_reference: Principio de lectura literal-visionaria de Daniel 8
- issue: Intensidad bélica de la última cláusula
  english_pob_reading: in the fury of his power
  chosen_spanish_reading: con el furor de su fuerza
  alternative_spanish_readings:
  - en el furor de su fuerza
  - con la furia de su poder
  rationale: La expresión combina ira/furor con fuerza/poder; se evita suavizarla, porque el texto presenta una embestida violenta y enfática.
  doctrine_reference: Respeto al paralelismo semántico del hebreo
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios; este borrador sigue de cerca la decisión auditada del POB inglés y conserva el mismo sentido global sin añadir interpretación.
  spanish_consistency_notes:
  - Se mantiene «canal» para אוּבָל conforme al criterio auditado del POB inglés.
  - Se usa «carnero» para אַיִל, evitando el anglicismo y conservando el referente animal.
  - Se preserva la anterioridad narrativa con «había visto».
  - Se traduce la agresión final con «corrió contra él» para reflejar el movimiento hostil sin exageración interpretativa.
