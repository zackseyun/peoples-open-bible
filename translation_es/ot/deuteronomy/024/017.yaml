revisions:
- from: No pervertirás el derecho del forastero ni del huérfano[a], ni tomarás en prenda la ropa de la viuda.
  to: No torcerás el derecho del extranjero residente[a] ni del huérfano, ni tomarás en prenda la prenda de vestir de la viuda.
  rationale: Se ajusta גֵּר a «extranjero residente» para reflejar mejor la categoría legal protegida en el hebreo y en la auditoría inglesa; se cambia «pervertirás» por «torcerás» para un español más idiomático y fiel al giro jurídico; y se sustituye «ropa» por «prenda de vestir» para conservar el singular concreto de בֶּגֶד sin sobreespecificarlo como manto.
