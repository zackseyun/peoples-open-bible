  yaml_path: translation/ot/exodus/012/037.yaml
  text: And the sons of Israel journeyed from Rameses to Succoth[a], about six hundred thousand men on foot[d][c][b], besides children.
  footnotes:
  - marker: a
    text: Or 'the Israelites.' The Hebrew reads literally 'the sons of Israel.'
    reason: lexical_alternative
  - marker: b
    text: Or 'set out.' The Hebrew verb can denote breaking camp and beginning a journey.
    reason: lexical_alternative
  - marker: c
    text: The phrase 'about six hundred thousand men on foot' counts the men, with children excluded from this number.
    reason: cultural_note
  - marker: d
    text: Or 'besides little ones.' The Hebrew טף refers to children or small dependents.
    reason: lexical_alternative
