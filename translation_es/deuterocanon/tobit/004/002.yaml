translation:
  language: es
  text: 'Y se dijo a sí mismo[a]: «He pedido la muerte; ¿por qué no he de llamar a Tobías, mi hijo, para que lo instruya antes de que yo muera?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La tradición semítica paralela amplía este pensamiento: Tobit llama a Tobías para informarle sobre el dinero depositado con Gabael antes de morir.'
    reason: alternative_reading
lexical_decisions:
- source_word: εἶπεν ἐν ἑαυτῷ
  english_pob_choice: said within himself
  chosen_spanish: dijo dentro de sí
  alternatives_spanish:
  - se dijo a sí mismo
  - pensó
  lexicon: BDAG
  rationale: La expresión griega indica habla interior; en español, «dijo dentro de sí» conserva mejor esa deliberación interna que «pensó», sin volverse artificial.
- source_word: ᾐτησάμην θάνατον
  english_pob_choice: have asked for death
  chosen_spanish: he pedido la muerte
  alternatives_spanish:
  - he solicitado la muerte
  - he pedido morir
  lexicon: BDAG
  rationale: El aoristo mira a una petición previa con relevancia actual; «he pedido la muerte» mantiene ese valor perfecto y evita interpretar el verbo como «rogar» sin base directa.
- source_word: τί οὐ καλῶ
  english_pob_choice: why should I not call
  chosen_spanish: ¿por qué no he de llamar?
  alternatives_spanish:
  - ¿por qué no llamo?
  - ¿por qué no llamar?
  lexicon: BDAG
  rationale: Es una fórmula deliberativa, no una simple pregunta informativa. «¿Por qué no he de llamar?» reproduce bien el tono de autoexhortación en español.
- source_word: Τωβείαν τὸν υἱόν μου
  english_pob_choice: Tobiah my son
  chosen_spanish: Tobías, mi hijo
  alternatives_spanish:
  - Tobías, mi hijo
  - Tobit, mi hijo
  lexicon: Greek proper name tradition
  rationale: 'Se usa la forma castellana habitual del nombre propio. El posesivo se coloca en aposición natural en español: «Tobías, mi hijo».'
- source_word: ὑποδείξω
  english_pob_choice: instruct
  chosen_spanish: le instruya
  alternatives_spanish:
  - le muestre
  - le dé a conocer
  lexicon: BDAG
  rationale: El verbo puede significar mostrar, indicar o instruir. En este contexto de un padre que llama a su hijo antes de morir, «instruya» transmite mejor la idea de orientación/enseñanza que un mero «mostrar».
- source_word: πρὶν ἀποθανεῖν με
  english_pob_choice: before I die
  chosen_spanish: antes de morir
  alternatives_spanish:
  - antes de que muera
  - antes de mi muerte
  lexicon: BDAG
  rationale: La cláusula temporal es directa; «antes de morir» es natural y fiel al griego, sin añadir matices innecesarios.
theological_decisions:
- issue: Valor de la tradición semítica paralela para ὑποδείξω
  english_pob_reading: Render the clause generally as Tobit calling his son in order to instruct him before death, without importing the specific content about the deposited money into the main text.
  chosen_spanish_reading: Se mantiene la referencia general a que lo instruya antes de morir, sin introducir en el texto principal el detalle del dinero depositado.
  alternative_spanish_readings:
  - «para decirle sobre el dinero antes de morir»
  - «para avisarle del dinero antes de morir»
  rationale: La fuente griega principal solo dice que Tobit llamará a su hijo para instruirlo. La tradición semítica paralela aclara el contenido, pero no debe desplazar el texto base en la línea principal; ese matiz puede registrarse como nota.
  doctrine_reference: 'PHILOSOPHY.md: primacía de la fuente original principal; las fuentes paralelas informan la traducción sin sustituir al testigo base.'
translation_notes:
  revision_awareness: Se corrigió el problema previo asegurando que el marcador de nota [a] aparezca en el texto español exactamente donde corresponde.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» u otras sustituciones innecesarias; no hay nombres divinos en este versículo.
  - «Tobías» mantiene la forma castellana transparente del nombre propio.
  - «instruya» conserva la fuerza comunicativa de ὑποδείξω sin importar contenido extra al cuerpo principal.
