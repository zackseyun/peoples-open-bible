translation:
  language: es
  text: 'Pero son miserables[a], y sus esperanzas están entre los muertos, los que llamaron dioses a las obras de manos humanas: oro y plata, producto de destreza, y imágenes de animales, o una piedra inútil[b], obra de una mano antigua.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «sus esperanzas están en cosas muertas» o «sus esperanzas están con los muertos». La frase griega es breve y puede sugerir tanto ídolos sin vida como el vacío asociado con la muerte.'
    reason: alternative_reading
  - marker: b
    text: La expresión «obra de una mano antigua» puede entenderse como una piedra idolátrica tallada hace mucho tiempo, subrayando a la vez su antigüedad y su origen meramente humano.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ταλαιπώροι
  english_pob_choice: miserable
  chosen_spanish: miserables
  alternatives_spanish:
  - desdichados
  - miserables / desgraciados
  lexicon: LSJ
  rationale: «Miserables» comunica en español actual la idea de desgracia y estado lamentable sin caer en un arcaísmo. Mantiene el tono acusatorio del griego y coincide con la opción inglesa más natural y fuerte.
- source_word: ἐν νεκροῖς αἱ ἐλπίδες αὐτῶν
  english_pob_choice: their hopes are among the dead
  chosen_spanish: sus esperanzas están entre los muertos
  alternatives_spanish:
  - sus esperanzas están en cosas muertas
  - sus esperanzas están con los muertos
  lexicon: LSJ
  rationale: La frase griega es breve y algo ambigua; «entre los muertos» conserva la imagen y la tensión sin resolver si se trata de realidades muertas, de los muertos mismos, o del ámbito de la muerte.
- source_word: οἵτινες ἐκάλεσαν θεοὺς
  english_pob_choice: who called gods
  chosen_spanish: los que llamaron dioses a
  alternatives_spanish:
  - los que nombraron dioses
  - los que consideraron dioses
  lexicon: LSJ
  rationale: En español hace falta completar el objeto implícito. «Llamaron dioses a» conserva la fuerza verbal directa de ἐκάλεσαν y prepara la enumeración que define a esos supuestos dioses.
- source_word: ἔργα χειρῶν ἀνθρώπων
  english_pob_choice: the works of human hands
  chosen_spanish: las obras de manos humanas
  alternatives_spanish:
  - las obras de manos de hombres
  - cosas hechas por manos humanas
  lexicon: LSJ
  rationale: «Manos humanas» mantiene el modismo bíblico y evita restringir ἀνθρώπων a varones. «Obras» funciona bien en español y refleja ἔργα.
- source_word: τέχνης ἐμμελέτημα
  english_pob_choice: the product of skill
  chosen_spanish: producto de habilidad
  alternatives_spanish:
  - obra de arte
  - fruto de destreza
  - producto de arte aprendido
  lexicon: LSJ
  rationale: La expresión apunta a algo cuidadosamente trabajado por pericia artesanal. «Producto de habilidad» conserva el carácter técnico sin estetizar demasiado ni agregar matices no seguros.
- source_word: ἀπεικάσματα ζώων
  english_pob_choice: images of animals
  chosen_spanish: imágenes de animales
  alternatives_spanish:
  - representaciones de animales
  - semejanzas de animales
  lexicon: LSJ
  rationale: «Imágenes de animales» es claro y natural en español, y conserva la referencia a figuras idolátricas con forma animal.
- source_word: λίθον ἄχρηστον
  english_pob_choice: a useless stone
  chosen_spanish: una piedra inútil
  alternatives_spanish:
  - una piedra sin provecho
  - una piedra vana
  lexicon: LSJ
  rationale: Ἄχρηστος significa literalmente «sin utilidad». «Piedra inútil» reproduce de forma directa la descalificación polémica del texto.
- source_word: χειρὸς ἔργον ἀρχαίας
  english_pob_choice: the work of an ancient hand
  chosen_spanish: obra de una mano antigua
  alternatives_spanish:
  - obra de una mano de antaño
  - obra hecha hace mucho
  lexicon: LSJ
  rationale: La construcción griega es compacta y sugiere antigüedad, no necesariamente un artesano anciano. «Mano antigua» conserva esa densidad y el matiz de procedencia remota.
theological_decisions:
- issue: Ambigüedad de «entre los muertos»
  english_pob_reading: Retain the metaphor broadly, without specifying whether 'the dead' refers primarily to lifeless idols or to the realm of the dead.
  chosen_spanish_reading: Mantener la imagen sin resolver si alude principalmente a ídolos sin vida o al ámbito de la muerte.
  alternative_spanish_readings:
  - sus esperanzas están en cosas muertas
  - sus esperanzas están con los muertos
  rationale: El griego permite una denuncia deliberadamente dura y ambigua. La traducción conserva esa tensión para no estrechar el alcance teológico de la crítica a la idolatría.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve it
- issue: Matiz de «manos humanas»
  english_pob_reading: Use 'human hands' rather than 'men's hands'.
  chosen_spanish_reading: Usar «manos humanas» en lugar de una formulación masculina.
  alternative_spanish_readings:
  - manos de hombres
  rationale: ἀνθρώπων es genérico para seres humanos. «Humanas» preserva la referencia inclusiva sin debilitar el ataque a la fabricación de ídolos.
  doctrine_reference: DOCTRINE.md §4 Gender-accurate over gender-neutral
translation_notes:
  revision_awareness: La versión española sigue de cerca el texto griego y la audición inglesa; no se hicieron revisiones posteriores al último pase, y se preserva la ambigüedad central de ἐν νεκροῖς sin domesticarla.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el hebreo subyacente exige el nombre divino; este versículo no lo contiene.
  - «Dios/dioses» se mantiene conforme al contraste del texto, sin normalizarlo a un singular doctrinal.
  - Se conserva el lenguaje de ídolos hechos por manos humanas con terminología transparente y no eclesiástica.
  - No se introduce una cita litúrgica tradicional donde el griego no la exige.
