translation:
  text: And when all had marveled at his steadfast courage[a], the guards led in the second after the first in age, and after fitting iron claws onto his hands[c][b], they bound him to the instruments and the catapult.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the next oldest after the first.' The Greek identifies the brother by age order.
    reason: lexical_alternative
  - marker: b
    text: '''Iron hands ... with sharp claws'' likely refers to iron torture devices fitted with sharp nail-like projections.'
    reason: cultural_note
  - marker: c
    text: Or possibly 'the rack' or another mechanical torture engine; the Greek literally reads 'catapult.'
    reason: lexical_alternative
lexical_decisions:
- source_word: θαυμασάντων
  chosen: had marveled
  alternatives:
  - were astonished
  - wondered
  lexicon: LSJ
  rationale: Aorist participle with genitive absolute; 'had marveled' captures the completed reaction preceding the main action without overstating emotional shock.
- source_word: καρτεροψυχίαν
  chosen: steadfast courage
  alternatives:
  - fortitude
  - endurance of spirit
  - bravery
  lexicon: LSJ
  rationale: The compound denotes firmness or endurance of soul/spirit under suffering. 'Steadfast courage' preserves both inner resolve and bravery in readable English.
- source_word: δορυφόροι
  chosen: guards
  alternatives:
  - bodyguards
  - spearmen
  lexicon: LSJ
  rationale: Literally 'spear-bearers,' often functioning as royal guards or execution attendants. 'Guards' fits the narrative role without forcing a too-literal military image into English.
- source_word: τὸν καθʼ ἡλικίαν τοῦ προτέρου δεύτερον
  chosen: the second after the first in age
  alternatives:
  - the one second in age after the former
  - the next oldest after the first
  lexicon: LSJ
  rationale: The phrase identifies the brother by birth order/age rank. 'The second after the first in age' stays close to the Greek while remaining intelligible.
- source_word: σιδηρᾶς ... χεῖρας
  chosen: iron hands
  alternatives:
  - iron claws
  - iron gauntlets
  lexicon: LSJ
  rationale: χείρας is literally 'hands.' Because the following phrase mentions sharp claws/nails, the text seems to describe iron implements shaped like hands or gripping devices. Retaining 'iron hands' keeps the imagery anchored to the Greek, while the rationale notes the likely torture-device sense.
- source_word: ὀξέσι τοῖς ὄνυξιν
  chosen: with sharp claws
  alternatives:
  - with sharp nails
  - with sharp talons
  lexicon: LSJ
  rationale: ὄνυξ can mean nail, claw, or talon. In a torture context, 'sharp claws' best conveys pointed hooked projections attached to the iron device.
- source_word: ὀργάνοις
  chosen: the instruments
  alternatives:
  - the implements
  - the torture devices
  lexicon: LSJ
  rationale: A general term for tools/instruments. Given the immediate context of torture, 'the instruments' is sufficiently literal while allowing the context to specify their grim function.
- source_word: καταπέλτῃ
  chosen: the catapult
  alternatives:
  - the rack
  - the engine
  lexicon: LSJ
  rationale: The Greek word ordinarily denotes a military engine/catapult. In this martyrdom context it likely refers to a mechanical torture apparatus. Because the source text explicitly says καταπέλτῃ, the main text preserves 'catapult,' while the unusual sense is worth noting as a lexical alternative.
- source_word: προσεδήσαν
  chosen: they bound him
  alternatives:
  - they fastened him
  - they tied him down
  lexicon: LSJ
  rationale: The verb means to bind or fasten to something. 'Bound him' is direct and idiomatic.
