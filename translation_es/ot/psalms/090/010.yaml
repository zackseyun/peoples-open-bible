  text: יְמֵֽי שְׁנוֹתֵ֨י/נוּ בָ/הֶ֥ם שִׁבְעִ֪ים שָׁנָ֡ה וְ/אִ֤ם בִּ/גְבוּרֹ֨ת שְׁמ֘וֹנִ֤ים שָׁנָ֗ה וְ֭/רָהְבָּ/ם עָמָ֣ל וָ/אָ֑וֶן כִּי גָ֥ז חִ֝֗ישׁ וַ/נָּעֻֽפָ/ה־׀־׃
base_translation:
  language: en
  yaml_path: translation/ot/psalms/090/010.yaml
  text: The days of our years are seventy years[a], or if by strength, eighty years; yet their pride is toil and trouble, for it is soon gone[b], and we fly away.
  footnotes:
