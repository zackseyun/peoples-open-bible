translation:
  language: es
  text: 'Y David dijo a Saúl[a]: «¿Por qué escuchas las palabras de un hombre, diciendo: “Mira[b], David busca tu daño”?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «las palabras de un hombre / palabras humanas». El singular hebreo a veces puede tener un sentido humano más general, pero aquí se conserva el singular para reflejar la forma y la posible referencia a un acusador individual.
    reason: lexical_alternative
  - marker: b
    text: O, «David busca tu mal». El hebreo puede expresarse más literalmente con «mal», pero «tu daño» comunica con mayor naturalidad en español la acusación de perjuicio.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And ... said
  chosen_spanish: Y ... dijo
  alternatives_spanish:
  - Entonces ... dijo
  - Así que ... dijo
  lexicon: HALOT
  rationale: El waw consecutivo avanza la narración. En español, «Y ... dijo» conserva esa continuidad sin forzar una interpretación más fuerte de la secuencia.
- source_word: לְשָׁאוּל
  english_pob_choice: to Saul
  chosen_spanish: a Saúl
  alternatives_spanish:
  - a Shaúl
  lexicon: HALOT
  rationale: Se mantiene el nombre tradicional y reconocible en español, conservando el destinatario del discurso marcado por la preposición hebrea ל.
- source_word: לָמָּה
  english_pob_choice: Why
  chosen_spanish: ¿Por qué...?
  alternatives_spanish:
  - ¿Para qué razón...?
  lexicon: HALOT
  rationale: La interrogativa directa se expresa de forma natural en español como «¿Por qué?», sin perder el valor de reproche de la pregunta.
- source_word: תִשְׁמַע
  english_pob_choice: do you listen
  chosen_spanish: escuchas
  alternatives_spanish:
  - oyes
  - prestas atención
  lexicon: HALOT
  rationale: שמע aquí implica atender o hacer caso; «escuchas» comunica mejor esa idea que un simple «oyes».
- source_word: אֶת דִּבְרֵי אָדָם
  english_pob_choice: the words of a man
  chosen_spanish: las palabras de un hombre
  alternatives_spanish:
  - las palabras de la gente
  - las palabras humanas
  lexicon: HALOT
  rationale: Se conserva la singularidad de אָדָם como forma indefinida y probable alusión a un acusador concreto o tipificado. En español, «un hombre» refleja mejor esa forma que una pluralización genérica.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - que dice
  - al decir
  lexicon: HALOT
  rationale: El infinitivo introduce el contenido citado; «diciendo» reproduce de manera directa y natural esa función en español.
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira, pues
  - He aquí
  lexicon: HALOT
  rationale: Es un apelativo de atención. «Mira» suena natural en español moderno y conserva el gesto deíctico del hebreo.
- source_word: מְבַקֵּשׁ
  english_pob_choice: seeks
  chosen_spanish: busca
  alternatives_spanish:
  - está buscando
  - procura
  lexicon: HALOT
  rationale: El participio expresa acción característica o en curso. «Busca» funciona bien en español bíblico contemporáneo y evita una construcción excesivamente perifrástica.
- source_word: רָעָתֶךָ
  english_pob_choice: your harm
  chosen_spanish: tu mal
  alternatives_spanish:
  - tu daño
  - hacerte daño
  lexicon: HALOT
  rationale: רָעָה puede abarcar mal, daño o perjuicio. «Tu mal» mantiene la fuerza nominal del hebreo y deja abierta la tensión entre mal moral y daño sufrido, sin suavizarla demasiado.
theological_decisions:
- issue: Valor de אָדָם en singular frente a una generalización colectiva
  english_pob_reading: the words of a man
  chosen_spanish_reading: las palabras de un hombre
  alternative_spanish_readings:
  - las palabras de los hombres
  - las palabras de la gente
  rationale: El hebreo usa un singular indefinido. En español, traducirlo como singular preserva la forma y la posible referencia a un acusador particular, en lugar de diluirla en un colectivo.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4; Contested terms table for אָדָם
- issue: La frase רָעָתֶךָ y su campo semántico
  english_pob_reading: your harm
  chosen_spanish_reading: tu mal
  alternative_spanish_readings:
  - tu daño
  - el mal contra ti
  rationale: «Tu mal» conserva la ambigüedad entre mal, perjuicio o daño presente en el hebreo. Evita imponer una lectura moralizante exclusiva cuando el contexto inmediato es la acusación de hostilidad contra David.
  doctrine_reference: HALOT; English POB lexical decision for רָעָה
translation_notes:
  revision_awareness: La auditoría inglesa revisó una lectura inicial más explícita («a man who says») y la ajustó a una estructura más fiel al plural de «the words of men» y al infinitivo «saying». En español, la formulación adoptada mantiene la singularidad de אָדָם según la pauta lexical documentada, pero conserva la introducción de la cita con «diciendo» para reflejar לֵאמֹר. También se siguió la revisión que prefiere un presente simple («busca») frente a una perífrasis, por fluidez y registro formal.
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma predeterminada para el nombre divino cuando aparezca; aquí no es pertinente.
  - Se mantiene «Saúl» como nombre tradicional ampliamente inteligible en español.
  - «Hombre» traduce אָדָם de forma singular e indefinida, en línea con la decisión lexical documentada.
  - «Mal» conserva el campo semántico amplio de רָעָה; se evita reemplazarlo por una paráfrasis más explicativa.
  - La puntuación con comillas angulares y la colocación del inciso «diciendo» conservan la estructura de discurso directo del hebreo.
