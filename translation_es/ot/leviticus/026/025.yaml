source:
  edition: WLC
  text: וְ/הֵבֵאתִ֨י עֲלֵי/כֶ֜ם חֶ֗רֶב נֹקֶ֨מֶת֙ נְקַם בְּרִ֔ית וְ/נֶאֱסַפְתֶּ֖ם אֶל עָרֵי/כֶ֑ם וְ/שִׁלַּ֤חְתִּי דֶ֨בֶר֙ בְּ/ת֣וֹכְ/כֶ֔ם וְ/נִתַּתֶּ֖ם בְּ/יַד אוֹיֵֽב־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/leviticus/026/025.yaml
  text: And I will bring against you a sword executing the vengeance of the covenant[a], and you will be gathered into your cities. Then I will send pestilence among you, and you will be given into the hand of the enemy.
  footnotes:
  - marker: a
    text: Or 'executing covenant vengeance,' 'taking vengeance for the covenant,' or more smoothly 'avenging the covenant.' The Hebrew is literally 'a sword avenging the vengeance of the covenant,' an emphatic expression linking the sword to covenant judgment.
