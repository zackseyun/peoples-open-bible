translation:
  language: es
  text: Por eso[a], señor soberano, no desatiendas su palabra, sino guárdala en tu corazón, porque es verdadera; pues nuestro pueblo[b] no recibe castigo, ni la espada prevalece contra ellos, a menos que pequen contra su Dios[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Por tanto». El griego introduce una conclusión inferida del contexto anterior.'
    reason: alternative_reading
  - marker: b
    text: 'O: «nuestra nación». Griego γένος puede referirse al pueblo como grupo étnico-histórico; en español «pueblo» es más natural y menos ambiguo que «raza».'
    reason: lexical_alternative
  - marker: c
    text: 'Lit.: «si no pecan contra su Dios». La frase expresa la única condición bajo la cual les sobreviene castigo o la espada prevalece contra ellos.'
    reason: theological_note
lexical_decisions:
- source_word: διό
  english_pob_choice: Therefore
  chosen_spanish: Por eso
  alternatives_spanish:
  - Por tanto
  - Así que
  lexicon: LSJ
  rationale: Introduce una conclusión inferida del contexto anterior. 'Por eso' conserva la relación lógica con un español natural y solemne.
- source_word: δέσποτα κύριε
  english_pob_choice: master lord
  chosen_spanish: señor soberano
  alternatives_spanish:
  - soberano señor
  - señor maestro
  lexicon: LSJ
  rationale: El griego acumula dos vocativos de autoridad. 'Señor soberano' mantiene la duplicación sin sonar forzado en español y evita reducirlos a un solo título.
- source_word: μὴ παρέλθῃς τὸν λόγον αὐτοῦ
  english_pob_choice: do not disregard his word
  chosen_spanish: no desatiendas su palabra
  alternatives_spanish:
  - no pases por alto su palabra
  - no ignores su palabra
  lexicon: LSJ
  rationale: παρέρχομαι con λόγον expresa pasar de largo, ignorar o desatender. 'Desatender' conserva el valor de negligencia/omisión sin volverlo demasiado literal.
- source_word: κατάθου αὐτὸν ἐν τῇ καρδίᾳ σου
  english_pob_choice: lay it up in your heart
  chosen_spanish: consérvala en tu corazón
  alternatives_spanish:
  - guárdala en tu corazón
  - ponla en tu corazón
  lexicon: LSJ
  rationale: 'La imagen es idiomática: recibir y retener interiormente. ''Conservarla en tu corazón'' mantiene la metáfora y sugiere custodia interior, con español natural.'
- source_word: ἀληθής
  english_pob_choice: 'true'
  chosen_spanish: verdadera
  alternatives_spanish:
  - cierta
  - fiel
  lexicon: LSJ
  rationale: Se refiere a la 'palabra' implícita; en español concuerda con 'palabra' y preserva el juicio de verdad del original.
- source_word: ἐκδικάται
  english_pob_choice: is avenged
  chosen_spanish: no es vengado
  alternatives_spanish:
  - no recibe venganza
  - no se ejecuta justicia sobre
  lexicon: LSJ
  rationale: El pasivo de ἐκδικάται admite el matiz de 'ser vengado / recibir venganza'. Aunque suena menos común, 'no es vengado' reproduce mejor la relación semántica señalada por la tradición de la POB que una neutralización a 'es castigado'.
- source_word: τὸ γένος ἡμῶν
  english_pob_choice: our people
  chosen_spanish: nuestro pueblo
  alternatives_spanish:
  - nuestra nación
  - nuestra gente
  lexicon: LSJ
  rationale: γένος puede designar linaje, pueblo o nación. 'Nuestro pueblo' refleja la referencia colectiva sin las connotaciones modernas de 'raza' y sin forzar un tecnicismo político.
- source_word: κατισχύει ῥομφαία ἐπʼ αὐτούς
  english_pob_choice: does the sword prevail against them
  chosen_spanish: la espada prevalece contra ellos
  alternatives_spanish:
  - la espada los domina
  - la espada triunfa sobre ellos
  lexicon: LSJ
  rationale: κατισχύω significa imponerse, prevalecer o dominar. 'Prevalece contra ellos' conserva el contraste con la condición final del versículo y mantiene la imagen bélica.
- source_word: ἐὰν μὴ ἁμάρτωσιν εἰς τὸν θεὸν αὐτῶν
  english_pob_choice: unless they sin against their God
  chosen_spanish: a menos que pequen contra su Dios
  alternatives_spanish:
  - si no pecan contra su Dios
  - a menos que se aparten de su Dios
  lexicon: LSJ
  rationale: 'ἁμαρτάνω aquí conserva fuerza moral y teológica: pecado contra Dios. ''Pecar contra su Dios'' es directo y fiel a la condición exclusiva del texto.'
theological_decisions:
- issue: Vocativo doble dirigido a Holofernes
  english_pob_reading: master lord
  chosen_spanish_reading: señor soberano
  alternative_spanish_readings:
  - soberano señor
  - señor maestro
  rationale: El griego presenta dos títulos, no uno solo. En español se mantiene la doble honra sin fusionarla en un único tratamiento devocional o eclesial. 'Señor soberano' refleja autoridad humana en el contexto narrativo.
  doctrine_reference: 'DOCTRINE.md: Translate titles; preserve source distinctions.'
- issue: Condición teológica para que el pueblo no sea vencido
  english_pob_reading: unless they sin against their God
  chosen_spanish_reading: a menos que pequen contra su Dios
  alternative_spanish_readings:
  - si no pecan contra su Dios
  - a menos que se aparten de su Dios
  rationale: La frase preserva que la victoria militar o la derrota no se explican mecánicamente, sino en relación con la fidelidad o infidelidad a Dios. No se suaviza la tensión del texto.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El audit trail inglés pasó por una corrección de 'nation' a 'people' para γένος y mantuvo ἐκδικάται con el sentido de venganza/retribución en lugar de un simple castigo. La redacción española sigue esa revisión y evita una neutralización interpretativa; además conserva la condición final como cláusula restrictiva, sin suavizarla a una generalidad moral.
  spanish_consistency_notes:
  - Se usa 'Yahvé' como norma cuando aparezca el nombre divino explícito; aquí solo aparece 'Dios'.
  - '''señor soberano'' mantiene el doble vocativo del griego sin convertirlo en una fórmula litúrgica estándar.'
  - '''nuestro pueblo'' sigue el valor colectivo de γένος y evita el falso amigo ''raza''.'
  - '''no es vengado'' conserva la fuerza de ἐκδικάται con el matiz del audit trail, aunque sea una expresión menos común en español.'
  - '''a menos que pequen contra su Dios'' preserva la estructura condicional exclusiva del original.'
