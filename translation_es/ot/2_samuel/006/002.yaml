review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la secuencia narrativa principal y mantiene decisiones clave como «Yahvé» y «de los Ejércitos», además de conservar «se levantó y fue» y el topónimo «Baalé-judá» con nota alternativa. Sin embargo, en la fórmula de nombramiento del arca se aparta del sentido preferido del POB inglés: el hebreo comprimido אֲשֶׁר נִקְרָא שֵׁם se auditó como «which is called by the Name», no como «sobre la cual es invocado el Nombre». Esa redacción española desplaza la idea desde una fórmula nominal/covenantal hacia una fórmula de invocación cultual. También «para subir de allí el arca» suena menos fiel al hifil transitivo contextual que «para hacer subir / traer de allí el arca».'
  spanish_quality_summary: 'El español es generalmente claro y digno, pero hay dos puntos mejorables: «para subir de allí el arca» suena poco natural en español bíblico actual, y la puntuación con dos puntos después de «Nombre» resulta algo explicativa. Una redacción como «para traer de allí el arca de Dios, que es llamada por el Nombre, el nombre de Yahvé de los Ejércitos» conserva mejor la solemnidad y fluye con mayor naturalidad. Además, las notas b/c/d del borrador están desalineadas con los puntos realmente debatidos y contienen redundancia innecesaria.'
  glossary_alignment: Alinea bien con la terminología del proyecto en «Yahvé», «Dios» y «querubines». «de los Ejércitos» es aceptable como equivalente documentado de צְבָאוֹת. La principal desalineación terminológica está en convertir la fórmula de «ser llamado por el Nombre» en «ser invocado», lo cual no sigue la decisión lexical ni teológica auditada.
  issues:
  - severity: high
    issue: La fórmula «sobre la cual es invocado el Nombre» no preserva la decisión fuente «which is called by the Name».
    rationale: El hebreo נִקְרָא שֵׁם, aunque comprimido, fue auditado por POB como una fórmula de nombramiento/asociación con el Nombre. «Es invocado» cambia el eje semántico hacia acción litúrgica de invocar y se aleja del sentido preferido.
  - severity: medium
    issue: «para subir de allí el arca» es poco natural y debilita la transitividad del hifil לְהַעֲלוֹת.
    rationale: En español, «subir el arca» puede entenderse, pero aquí «traer de allí» o «hacer subir de allí» representa mejor la acción de trasladarla y suena más idiomático.
  - severity: medium
    issue: Las notas b, c y d están mal distribuidas y parcialmente redundantes.
    rationale: La nota de alternativa sobre «sentado sobre los querubines» debería anclarse a la frase de entronización; la nota tradicional «SEÑOR de los ejércitos» corresponde a la expresión completa del nombre divino/título; y una nota que repite exactamente «el nombre de Yahvé de los Ejércitos» no añade información.
  revised_spanish_text: David se levantó y fue[a], con todo el pueblo que estaba con él, desde Baalé-judá para traer de allí el arca de Dios, que es llamada por el Nombre, el nombre de Yahvé de los Ejércitos[c][b], que está entronizado sobre los querubines[d].
  revised_footnotes:
