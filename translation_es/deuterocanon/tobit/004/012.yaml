base_translation:
  language: en
  yaml_path: translation/deuterocanon/tobit/004/012.yaml
  text: Guard yourself[a], child, from all sexual immorality, and first take a wife from the offspring of your fathers. Do not take a foreign woman who is not from the tribe of your father, because we are sons of the prophets. Remember, child, Noah, Abraham, Isaac, and Jacob, our fathers from of old, that they all took wives from among their brothers, and they were blessed in their children[b], and their offspring will inherit the land.
  footnotes:
  - marker: a
    text: Or, 'we are descendants of the prophets.' The Greek reads literally, 'sons of the prophets.'
    reason: alternative_reading
  - marker: b
    text: That is, from among their close kin or clan, not their literal brothers.
    reason: lexical_alternative
