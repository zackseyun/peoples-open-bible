revisions:
- from: Si su ofrenda es un holocausto[a] del ganado vacuno, ofrecerá un macho sin defecto. Lo ofrecerá a la entrada de la tienda de reunión, para que sea aceptado[b] delante de Yahvé.
  to: Si su ofrenda es un holocausto del ganado vacuno, ofrecerá un macho sin defecto. Lo ofrecerá a la entrada de la tienda de reunión, para que sea aceptado[a] delante de Yahvé.
  rationale: La traducción principal se mantiene porque es fiel, natural y alineada con las decisiones léxicas y teológicas auditadas. Se elimina la nota sobre 'holocausto' por no estar sustentada como nota publicada en el POB inglés de este versículo, y se conserva solo la nota necesaria sobre לִרְצֹנוֹ, que sí preserva una ambigüedad interpretativa documentada.
  reviewer_model: gpt-5.4
