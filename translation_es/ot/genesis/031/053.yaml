translation:
  language: es
  text: Que el Dios de Abraham y el dios de Nacor[a], el dios de su antepasado, juzgue entre nosotros. Y Jacob juró por el Temor de su padre Isaac[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el Dios de Abraham y el Dios de Nacor, el Dios de su antepasado». El hebreo puede leerse como una sola deidad referida a lo largo de toda la frase; la traducción principal conserva la ambigüedad.'
    reason: alternative_reading
  - marker: b
    text: «El Temor de su padre Isaac» es un título inusual para Dios, usando literalmente el sustantivo «temor» o «pavor» como designación divina.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱלֹהֵי אַבְרָהָם
  english_pob_choice: the God of Abraham
  chosen_spanish: el Dios de Abraham
  alternatives_spanish:
  - el dios de Abraham
  - Dios de Abraham
  lexicon: HALOT
  rationale: En español, el sintagma funciona naturalmente con artículo y nombre propio para expresar el Dios de pacto de Abraham. Se capitaliza 'Dios' porque aquí el referente es el Dios verdadero de Abraham, como en la lectura inglesa principal.
- source_word: וֵאלֹהֵי נָחוֹר
  english_pob_choice: and the god of Nahor
  chosen_spanish: y el dios de Nacor
  alternatives_spanish:
  - y el Dios de Nacor
  - y los dioses de Nacor
  lexicon: HALOT
  rationale: 'Se mantiene ''dios'' en minúscula para preservar la tensión textual que el audit trail inglés conserva: la invocación de Labán no se armoniza de antemano con la confesión de Jacob. ''Nacor'' sigue la forma española usual del nombre propio.'
- source_word: אֱלֹהֵי אֲבִיהֶם
  english_pob_choice: the god of their father
  chosen_spanish: el dios de su padre
  alternatives_spanish:
  - el Dios de su padre
  - los dioses de su padre
  lexicon: HALOT
  rationale: Se conserva la minúscula y la ambigüedad del original, ya que la frase resume o reitera la invocación anterior. En español, 'su padre' refleja correctamente el poseedor plural sin sobreexplicar la referencia.
- source_word: יִשְׁפְּטוּ
  english_pob_choice: may ... judge
  chosen_spanish: juzgue
  alternatives_spanish:
  - juzguen
  - que juzgue
  - que juzguen
  lexicon: HALOT
  rationale: Aunque el hebreo lleva plural, la construcción española fluye mejor como desiderativa singular referida al sujeto compuesto; el sentido de invocación/juramento queda claro en 'Que ... juzgue'. Se evita una pluralidad pesada que oscurezca la formulación ritual.
- source_word: בֵינֵינוּ
  english_pob_choice: between us
  chosen_spanish: entre nosotros
  alternatives_spanish:
  - entre mí y ti
  lexicon: HALOT
  rationale: La expresión recíproca se vierte de manera idiomática y sobria. 'Entre nosotros' conserva el valor de disputa bilateral sin añadir elementos que el texto no explicita.
- source_word: וַיִּשָּׁבַע
  english_pob_choice: And ... swore
  chosen_spanish: Jacob juró
  alternatives_spanish:
  - Y Jacob juró
  - Entonces Jacob juró
  lexicon: HALOT
  rationale: Se conserva el valor narrativo simple del waw consecutivo con pasado español directo. El sujeto explícito ayuda a evitar ambigüedad en la segunda cláusula.
- source_word: בְּפַחַד
  english_pob_choice: by the Fear of
  chosen_spanish: por el Temor de
  alternatives_spanish:
  - por el miedo de
  - por el Temor
  lexicon: HALOT
  rationale: Se preserva el título divino inusual con 'Temor' en mayúscula, siguiendo la decisión inglesa de mantener el sustantivo literal como designación reverente de Dios. 'Por' reproduce la fórmula juramentaria sin suavizarla.
- source_word: אָבִיו יִצְחָק
  english_pob_choice: his father Isaac
  chosen_spanish: su padre Isaac
  alternatives_spanish:
  - su padre, Isaac
  - de su padre Isaac
  lexicon: HALOT
  rationale: La aposición se integra de forma natural en español. 'Su padre Isaac' identifica al referente del título sin añadir puntuación innecesaria.
theological_decisions:
- issue: Si uniformar la referencia divina de Labán/Nacor con mayúsculas en español
  english_pob_reading: 'Different English capitalization is used: ''the God of Abraham'' but ''the god of Nahor, the god of their father.'''
  chosen_spanish_reading: Se usa 'el Dios de Abraham' pero 'el dios de Nacor, el dios de su padre'.
  alternative_spanish_readings:
  - el Dios de Abraham y el Dios de Nacor, el Dios de su padre
  - el dios de Abraham y el dios de Nacor, el dios de su padre
  rationale: 'Se conserva la tensión teológica del hebreo y del POB inglés: la sintaxis permite o bien una misma deidad entendida por todos, o bien una invocación más amplia/familiar que Jacob no comparte en los mismos términos. No se resuelve artificialmente la ambigüedad con mayúsculas uniformes.'
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica en lugar de resolverla.'
- issue: Cómo traducir בְּפַחַד אָבִיו יִצְחָק
  english_pob_reading: '''by the Fear of his father Isaac'''
  chosen_spanish_reading: '''por el Temor de su padre Isaac'''
  alternative_spanish_readings:
  - por el Dios temido por su padre Isaac
  - por el Tremor/Awe de su padre Isaac
  rationale: '''Temor'' mantiene la rareza del título divino y evita explicarlo en exceso. La capitalización señala que no se trata de una emoción ordinaria, sino de una designación reverente de Dios; así se preserva la fuerza lexical y teológica del hebreo.'
  doctrine_reference: Translation philosophy §1 y §3.
translation_notes:
  revision_awareness: 'La redacción sigue la última revisión inglesa, que mantuvo la lectura de ambigüedad teológica y corrigió solo la puntuación fluida en la cláusula central. La versión española refleja esa misma economía: conserva la diferencia entre ''Dios'' y ''dios'' donde el POB inglés la preserva, y mantiene el título raro ''Temor'' sin parafrasearlo.'
  spanish_consistency_notes:
  - 'Se mantiene la capitalización diferenciada: ''Dios'' para Abraham y ''dios'' para Nacor/su padre, por coherencia con el audit trail inglés.'
  - Se prefiere 'Nacor' como forma española del nombre propio.
  - Se usa 'entre nosotros' como equivalente natural de בֵינֵינוּ.
  - El título 'Temor' va con mayúscula para indicar designación divina, no emoción humana.
  - La puntuación busca ser publicable y sobria, sin sobrecargar la frase con guiones o incisos.
