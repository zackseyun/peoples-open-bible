translation:
  text: 'Jesus said[a], “The Reign of the Father is like a merchant. He had a consignment
    of goods, and he found a pearl. The merchant was prudent: he sold the consignment
    and bought the one pearl for himself. You too, seek his treasure that does not
    fail, that endures—the place where no moth comes in to eat it[e][d][c][b], and
    no worm destroys.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'He sold the consignment: lit. “he gave the consignment out.” In the buy/sell
      context this idiom denotes selling or otherwise liquidating the goods.'
    reason: lexical_alternative
  - marker: b
    text: 'Seek for yourselves: the Coptic has an explicit reflexive (ϩⲱⲱⲛⲧⲱⲧⲛ), emphasizing
      personal appropriation.'
    reason: cultural_note
  - marker: c
    text: 'His treasure: Dilley notes an orthographic issue at this point (ⲛⲥⲁⲡⲉ{ϥ}ⲉ/ϩⲟ),
      normalized as ⲛⲥⲁⲡⲉϥⲁϩⲟ. The translation follows the normalized reading.'
    reason: lacuna_or_restoration
  - marker: d
    text: 'Where no moth…nor worm: Thomas has ‘worm’ (ⲡϥⲛⲧ), not ‘rust’ as in some
      Synoptic parallels; the image is of organic decay rather than corrosion.'
    reason: cross_reference
  - marker: e
    text: Or 'You too, seek for yourselves his treasure'.
    reason: previous_rendering
lexical_decisions:
- source_word: ⲡⲙⲛⲧⲣⲣⲟ ⲛⲡⲉⲓⲱⲧ
  chosen: the Reign of the Father
  alternatives:
  - the kingdom of the Father
  - the kingship of the Father
  lexicon: Layton; Crum (s.v. ⲣⲣⲟ)
  rationale: ⲙⲛⲧⲣⲣⲟ denotes royal rule/reign more than a territorial realm; “Reign”
    reflects the abstract nuance while remaining familiar.
- source_word: ⲣⲱⲙⲉ ⲛϣⲱⲧ
  chosen: merchant
  alternatives:
  - trader
  - dealer
  lexicon: Crum (s.v. ϣⲱⲧ)
  rationale: ϣⲱⲧ is ‘trade, business’; “man of trade” idiomatically means merchant.
- source_word: ⲫⲟⲣⲧⲓⲟⲛ
  chosen: consignment (of goods)
  alternatives:
  - cargo
  - load of merchandise
  lexicon: Greek loan (φορτίον) as used in Coptic; cf. Layton notes
  rationale: Commercial context suggests a load/consignment of goods; “consignment”
    keeps the mercantile sense.
- source_word: ⲙⲁⲣⲅⲁⲣⲓⲧⲏⲥ
  chosen: pearl
  alternatives: []
  lexicon: Greek loan μαργαρίτης
  rationale: Standard rendering of the Greek loanword.
- source_word: ⲡϣⲱⲧ (substantival)
  chosen: the merchant
  alternatives: []
  lexicon: Crum (s.v. ϣⲱⲧ)
  rationale: Reuses the trade noun to refer back to the merchant just mentioned; translated
    as a definite subject.
- source_word: ⲥⲁⲃⲉ
  chosen: prudent
  alternatives:
  - wise
  - sensible
  lexicon: Crum (s.v. ⲥⲁⲃⲉ)
  rationale: Connotes practical wisdom/shrewdness in a commercial setting; “prudent”
    fits the context.
- source_word: ϯ … ⲉⲃⲟⲗ (ϯⲡⲫⲟⲣⲧⲓⲟⲛ ⲉⲃⲟⲗ)
  chosen: sold (the consignment)
  alternatives:
  - gave away/disposed of the consignment
  lexicon: Crum (s.v. ϯ) for ‘give’; idiomatic choice supported by context; Layton
    (syntax)
  rationale: Literal ‘gave … out’; in a buy/sell frame this functions as disposing
    of goods for value—‘sold’ is the natural English equivalent.
- source_word: ⲧⲱⲟⲩ
  chosen: bought
  alternatives: []
  lexicon: Crum (s.v. ⲧⲱⲟⲩ)
  rationale: Standard verb for buying/purchasing.
- source_word: ⲟⲩⲱⲧ (with ⲡⲓⲙⲁⲣⲅⲁⲣⲓⲧⲏⲥ)
  chosen: the one pearl
  alternatives:
  - a single pearl
  lexicon: Layton (numerals)
  rationale: Definite article plus ‘one’ yields ‘the one [pearl]’ emphasizing singularity.
- source_word: ϩⲱⲱⲛⲧⲱⲧⲛ
  chosen: for yourselves
  alternatives:
  - yourselves (reflexive emphasis)
  lexicon: Lambdin (pronouns/reflexive)
  rationale: Reflexive plural intensifier; ‘for yourselves’ captures the sense.
- source_word: ⲁϩⲟ (ⲡⲉϥⲁϩⲟ)
  chosen: his treasure
  alternatives:
  - his wealth
  - his riches
  lexicon: Crum (s.v. ⲁϩⲟ)
  rationale: Commonly ‘wealth, treasure’; context of seeking a lasting store aligns
    with ‘treasure’.
- source_word: ⲱϫⲛ (with negative relative)
  chosen: fail
  alternatives:
  - be exhausted
  - give out
  lexicon: Crum (s.v. ⲱϫⲛ)
  rationale: Negative relative clause frames ‘that does not fail’; matches the idiom
    ‘unfailing treasure’.
- source_word: ⲙⲟⲟⲩⲛ ⲉⲃⲟⲗ
  chosen: endures
  alternatives:
  - remains
  - lasts
  lexicon: Crum (s.v. ⲙⲟⲟⲩⲛ)
  rationale: 'Positive counterpart: the treasure ‘remains/endures’; ‘endures’ pairs
    well with ‘does not fail’.'
- source_word: ϫⲟⲟⲗⲉⲥ
  chosen: moth
  alternatives: []
  lexicon: Crum (s.v. ϫⲟⲟⲗⲉⲥ)
  rationale: Standard Sahidic/Lycopolitan term for ‘moth’.
- source_word: ⲡϥⲛⲧ
  chosen: worm
  alternatives: []
  lexicon: Crum (s.v. ⲫⲛⲧ)
  rationale: Common word for ‘worm’.
- source_word: ⲧⲁⲕⲟ
  chosen: destroys
  alternatives:
  - devours
  - corrodes
  lexicon: Crum (s.v. ⲧⲁⲕⲟ)
  rationale: Meaning ‘ruin, spoil, eat up’; ‘destroys’ fits with moth/worm imagery.
textual_note: 'Dialect: Sahidic with Lycopolitan features. Notably, the insect term
  appears as ϫⲟⲟⲗⲉⲥ (‘moth’), a form consistent with non-standard Sahidic orthography.
  The construction ⲣⲱⲙⲉ ⲛϣⲱⲧ (‘man of trade’) and the substantival ⲡϣⲱⲧ (‘the merchant’)
  reflect Coptic idiom. Dilley’s printed text shows an orthographic/reader’s note
  at ⲛⲥⲁⲡⲉ{ϥ}ⲉ/ϩⲟ, normalized as ⲛⲥⲁⲡⲉϥⲁϩⲟ (“his treasure”); this draft follows the
  normalization. No lacunae in this saying as printed by Dilley. The ‘is like’ formula
  is conveyed by ⲉⲣⲉ…ⲛⲧⲟⲛ (here normalized as ⲉⲣⲉⲛⲧⲟⲥⲧⲟⲛⲧⲛ), a Coptic way of expressing
  comparison.'
