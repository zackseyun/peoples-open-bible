revisions:
- from: para volver atrás el plan impío contra ellos, y rescatarlos con una magnífica manifestación de la muerte que estaba pronta[a] a sus pies.
  to: para hacer retroceder el plan impío contra ellos y rescatarlos, con una magnífica manifestación[a], de la muerte que ya estaba lista a sus pies.
  rationale: Se reordenó la frase para que «con una magnífica manifestación» modifique claramente a «rescatarlos» y «de la muerte» exprese sin ambigüedad el peligro del cual fueron librados. También se ajustó «pronta» a «ya estaba lista» para una lectura más natural en español, manteniendo la idea de inminencia de παρὰ πόδας ἐν ἑτοίμῳ. «Hacer retroceder» refleja bien μεταστρέψαι y suena más idiomático aquí que «volver atrás» aplicado a un plan.
