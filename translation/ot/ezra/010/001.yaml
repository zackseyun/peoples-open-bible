id: EZR.10.1
reference: Ezra 10:1
source:
  edition: WLC
  text: וּ/כְ/הִתְפַּלֵּ֤ל עֶזְרָא֙ וּ/כְ֨/הִתְוַדֹּת֔/וֹ בֹּכֶה֙ וּ/מִתְנַפֵּ֔ל לִ/פְנֵ֖י בֵּ֣ית הָ/אֱלֹהִ֑ים נִקְבְּצוּ֩ אֵלָ֨י/ו מִ/יִּשְׂרָאֵ֜ל קָהָ֣ל רַב מְאֹ֗ד אֲנָשִׁ֤ים וְ/נָשִׁים֙ וִֽ/ילָדִ֔ים כִּֽי בָכ֥וּ הָ/עָ֖ם הַרְבֵּה בֶֽכֶה־־־׃ס
translation:
  text: Now while Ezra was praying and making confession[a], weeping and falling down before the house of God, a very large assembly from Israel gathered to him—men, women, and children—for the people wept bitterly.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'for the people wept with much weeping.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּכְהִתְפַּלֵּל
  chosen: while ... was praying
  alternatives:
  - as ... prayed
  - when ... prayed
  lexicon: HALOT
  rationale: The prefixed וּכְ marks contemporaneous action ('and/now as, while'). The hitpael of פלל here denotes prayer. 'While ... was praying' captures the ongoing background action naturally in English.
- source_word: וּכְהִתְוַדֹּתוֹ
  chosen: and making confession
  alternatives:
  - and confessing
  - and while he confessed
  lexicon: HALOT
  rationale: The hitpael of ידה in this stem means to confess. The infinitive with pronominal suffix refers to Ezra's act of confession. 'Making confession' preserves the formal, penitential sense better than the flatter 'admitting'.
- source_word: בֹּכֶה
  chosen: weeping
  alternatives:
  - crying
  lexicon: HALOT
  rationale: The participle describes Ezra's continuing action. 'Weeping' fits the solemn register and pairs well with the following participle.
- source_word: וּמִתְנַפֵּל
  chosen: and falling down
  alternatives:
  - and prostrating himself
  - and throwing himself down
  lexicon: HALOT
  rationale: The hitpael/reflexive nuance of נפל here indicates Ezra casting himself down in supplication. 'Falling down' is idiomatic and faithful without over-specifying full prostration, which the text does not explicitly state.
- source_word: לִפְנֵי בֵּית הָאֱלֹהִים
  chosen: before the house of God
  alternatives:
  - before God's house
  - in front of the house of God
  lexicon: HALOT
  rationale: בית האלהים is the temple. 'House of God' preserves the Hebrew expression and its reverent tone better than substituting 'temple' here.
- source_word: נִקְבְּצוּ אֵלָיו
  chosen: gathered to him
  alternatives:
  - assembled to him
  - gathered around him
  lexicon: HALOT
  rationale: The niphal of קבץ means to gather/assemble. 'Gathered to him' is a close rendering of the preposition אֶל while remaining readable; 'around him' is interpretive.
- source_word: מִיִּשְׂרָאֵל
  chosen: from Israel
  alternatives:
  - out of Israel
  - from among Israel
  lexicon: HALOT
  rationale: This denotes members of the Israelite community. 'From Israel' is concise and natural; the following appositional phrase clarifies the composition of the assembly.
- source_word: קָהָל רַב מְאֹד
  chosen: a very large assembly
  alternatives:
  - an exceedingly great assembly
  - a very great congregation
  lexicon: HALOT
  rationale: קהל is an assembled gathering. 'Assembly' is contextually apt and avoids importing later ecclesial connotations of 'congregation.' רַב מְאֹד intensifies size, rendered naturally as 'very large'.
- source_word: אֲנָשִׁים וְנָשִׁים וִילָדִים
  chosen: men, women, and children
  alternatives:
  - men and women and children
  lexicon: HALOT
  rationale: The triad is explicit and should be preserved. This is gender-accurate and reflects the full composition of the gathered people.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: Here כִּי introduces the reason the crowd gathered. 'For' preserves the explanatory connection in a literary but still readable way.
- source_word: בָכוּ הָעָם
  chosen: the people wept
  alternatives:
  - the people were weeping
  lexicon: HALOT
  rationale: The qatal verb presents the people's weeping as the explanatory fact. Simple past works well in English narrative.
- source_word: הַרְבֵּה בֶכֶה
  chosen: bitterly
  alternatives:
  - greatly
  - with much weeping
  - abundantly with weeping
  lexicon: HALOT
  rationale: The Hebrew combines an adverbial intensifier with the noun 'weeping' for emphasis. 'Bitterly' conveys intense lament in idiomatic English. A more literal 'with much weeping' is possible but less natural in the sentence.
