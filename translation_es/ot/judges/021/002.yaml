    issue: Discordancia de número en los verbos del sujeto colectivo
    rationale: El texto español dice «el pueblo vino ... y se quedó ... y alzaron», mezclando singular y plural para el mismo sujeto. El hebreo usa הָעָם como sujeto colectivo pero luego verbos en plural en la narración; en español conviene reflejar eso de manera consistente para evitar tropiezo sintáctico.
  - severity: low
