  rationale: Se hicieron reparaciones menores para mejorar la naturalidad del español y alinear mejor el topónimo con la auditoría del POB. 'Habitaba' preserva el sentido durativo de יוֹשֵׁב de manera más idiomática que 'estaba habitando'. También se normalizó la forma del topónimo a 'Beer-lahai-roi' para mantener la continuidad con la documentación fuente y la nota de referencia cruzada. Se omitió 'Ahora' por innecesario en español.
