  to: Pero cuando los hijos de Israel[a] oyeron esto, todos juntos cayeron sobre ellos y siguieron golpeándolos hasta Choba. Del mismo modo, también llegaron los de Jerusalén y los de toda la región montañosa, porque les habían anunciado lo que había ocurrido en el campamento de sus enemigos; y los de Galaad y los de Galilea los rebasaron[b] con una gran matanza[c], hasta que pasaron Damasco y sus fronteras.
