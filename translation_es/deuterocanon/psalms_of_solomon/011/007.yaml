translation:
  language: es
  text: Dios hizo brotar para ellos todo árbol fragante[a], para que Israel atravesara en la visitación de la gloria de su Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en el cuidado de la gloria de su Dios».
    reason: lexical_alternative
lexical_decisions:
- source_word: πᾶν
  english_pob_choice: every
  chosen_spanish: todo
  alternatives_spanish:
  - cada
  - todo y cada
  lexicon: LSJ
  rationale: 'Con ξύλον en singular, πᾶν tiene valor distributivo: no se trata de un solo árbol, sino de la totalidad de los árboles del tipo descrito. En español, «todo árbol fragante» comunica bien esa inclusión general sin forzar una construcción artificial.'
- source_word: ξύλον
  english_pob_choice: tree
  chosen_spanish: árbol
  alternatives_spanish:
  - madera
  - leño
  lexicon: LSJ
  rationale: El contexto de brotar/hacer surgir y el modificador de fragancia apuntan a vegetación viva, no a madera como material. «Árbol» preserva la imagen botánica.
- source_word: εὐωδίας
  english_pob_choice: fragrant
  chosen_spanish: fragante
  alternatives_spanish:
  - de fragancia
  - aromático
  - de buen olor
  lexicon: LSJ
  rationale: 'La idea es adjetival: algo que despide aroma agradable. «Fragante» es natural en español y mantiene el sentido sin añadir matices ajenos.'
- source_word: ἀνέτειλεν
  english_pob_choice: made spring up
  chosen_spanish: hizo brotar
  alternatives_spanish:
  - hizo surgir
  - hizo crecer
  - hizo levantarse
  lexicon: LSJ
  rationale: El verbo describe el crecimiento o surgimiento de plantas. «Hizo brotar» conserva la agencia divina y la imagen vegetal, y funciona mejor en español que una calca más literal.
- source_word: παρέλθῃ
  english_pob_choice: might pass through
  chosen_spanish: pasara
  alternatives_spanish:
  - pasara por
  - atravesara
  - pasara a través de
  lexicon: LSJ
  rationale: El inglés POB explicita el movimiento mediante «pass through». En español, el contexto ya sugiere ese trayecto; «pasara» mantiene la fluidez y deja la relación espacial implícita sin perder la idea de tránsito.
- source_word: ἐπισκοπῇ
  english_pob_choice: visitation
  chosen_spanish: visitación
  alternatives_spanish:
  - cuidado
  - supervisión
  - vigilancia
  lexicon: LSJ
  rationale: El POB inglés prefirió «visitation» para preservar el tono teológico elevado. «Visitación» conserva esa resonancia en español y evita reducir el término a una mera administración o control.
- source_word: δόξης
  english_pob_choice: glory
  chosen_spanish: gloria
  alternatives_spanish:
  - esplendor
  - majestad
  lexicon: LSJ
  rationale: «Gloria» es el equivalente bíblico usual y encaja con el genitivo teológico de la frase.
theological_decisions:
- issue: Sentido de ἐν ἐπισκοπῇ δόξης θεοῦ αὐτῶν
  english_pob_reading: Israel might pass through in the visitation of the glory of their God.
  chosen_spanish_reading: Israel pasara en la visitación de la gloria de su Dios.
  alternative_spanish_readings:
  - Israel pasara bajo el cuidado de la gloria de su Dios
  - Israel atravesara la supervisión de la gloria de su Dios
  - Israel pasara en la gloriosa visitación de su Dios
  rationale: 'La expresión admite varios matices de ἐπισκοπή: visitación, cuidado, supervisión. Siguiendo la lectura auditada del POB, se conserva «visitación» para no diluir la acción divina activa y su tono reverente. «De su Dios» mantiene el referente posesivo del griego y evita imponer una formulación más litúrgica que el texto no exige.'
  doctrine_reference: ἐπισκοπή en sentido de visita/atención divina; cf. uso bíblico de visitación y cuidado providente.
translation_notes:
  revision_awareness: El texto inglés auditado no muestra cambios de revisión y el control cruzado reporta alta concordancia; por eso la redacción española sigue de cerca la lectura establecida, manteniendo la decisión clave sobre ἐπισκοπῇ como «visitación».
  spanish_consistency_notes:
  - Se usó «Dios» y no «Señor» porque el griego tiene ὁ θεός y θεοῦ αὐτῶν.
  - Se prefirió «visitación» para conservar la tensión semántica de ἐπισκοπή que el POB documenta, dejando la alternativa en nota.
  - «Todo árbol fragante» evita una literalidad pesada y conserva el valor distributivo de πᾶν.
  - El posesivo «su Dios» refleja θεοῦ αὐτῶν y mantiene la referencia al pueblo de Israel.
