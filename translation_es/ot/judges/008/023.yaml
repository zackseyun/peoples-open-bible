translation:
  language: es
  text: 'Pero Gedeón les dijo[a]: «Yo no gobernaré sobre ustedes, ni mi hijo gobernará sobre ustedes; Yahvé gobernará sobre ustedes».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y Gedeón les dijo». La conjunción hebrea puede traducirse simplemente como coordinación narrativa, pero aquí «Pero» resalta mejor el contraste con la petición del versículo anterior.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: But ... said
  chosen_spanish: Pero ... les dijo
  alternatives_spanish:
  - Y ... les dijo
  - Entonces ... les dijo
  lexicon: HALOT
  rationale: La conjunción narrativa hebrea admite coordinación simple, pero en este contexto la respuesta de Gedeón contradice la petición anterior; por eso 'Pero' comunica mejor el contraste, sin perder el valor básico de introducción del discurso con 'dijo'.
- source_word: אֲלֵהֶם
  english_pob_choice: to them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  - a los hombres
  lexicon: HALOT
  rationale: El dativo pronominal se expresa de forma natural en español con el clítico 'les', que conserva el destinatario del habla sin añadir precisión no contenida en el hebreo.
- source_word: גִּדְעוֹן
  english_pob_choice: Gideon
  chosen_spanish: Gedeón
  alternatives_spanish:
  - Gideón
  lexicon: HALOT
  rationale: Se usa la forma española bíblica establecida 'Gedeón', plenamente reconocible y adecuada para lectura eclesial en español.
- source_word: לֹא אֶמְשֹׁל אֲנִי בָּכֶם
  english_pob_choice: I will not rule over you
  chosen_spanish: Yo no reinaré sobre ustedes
  alternatives_spanish:
  - No gobernaré sobre ustedes
  - No dominaré sobre ustedes
  lexicon: HALOT
  rationale: El verbo מָשַׁל puede traducirse 'reinar', 'gobernar' o 'regir'. Aquí, por el contraste con el gobierno de Yahvé y el trasfondo de rechazo a una autoridad de tipo real, 'reinar' comunica bien la fuerza política del término en español sin imponer más de lo que el hebreo dice. Se conserva el pronombre explícito 'Yo' para reflejar el énfasis del hebreo.
- source_word: וְלֹא יִמְשֹׁל בְּנִי בָּכֶם
  english_pob_choice: and my son will not rule over you
  chosen_spanish: ni mi hijo reinará sobre ustedes
  alternatives_spanish:
  - y mi hijo no reinará sobre ustedes
  - ni mi hijo gobernará sobre ustedes
  lexicon: HALOT
  rationale: La coordinación negativa se expresa idiomáticamente con 'ni', que mantiene la paralelidad del hebreo y refuerza la continuidad del rechazo. 'Mi hijo' conserva el singular y la posible implicación dinástica sin explicitarla más allá del texto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: 'Se sigue la convención del proyecto para el Nombre divino: ''Yahvé''. Esto preserva la referencia al Tetragrámaton y evita la sustitución por un título.'
- source_word: יְהוָה יִמְשֹׁל בָּכֶם
  english_pob_choice: Yahweh will rule over you
  chosen_spanish: Yahvé reinará sobre ustedes
  alternatives_spanish:
  - Yahvé gobernará sobre ustedes
  - Yahvé regirá sobre ustedes
  lexicon: HALOT
  rationale: 'Se mantiene el mismo campo semántico de מָשַׁל que en las cláusulas anteriores para conservar la repetición retórica: ni Gedeón ni su hijo reinarán; Yahvé sí. ''Reinará'' preserva el contraste sin diluir la tensión política y teológica del verso.'
theological_decisions:
- issue: La relación entre rechazo humano de autoridad y la realeza divina
  english_pob_reading: Gideon rejects personal and dynastic rule and attributes rightful rule to the LORD.
  chosen_spanish_reading: Gedeón rechaza ejercer una autoridad real sobre el pueblo y afirma que el gobierno legítimo pertenece a Yahvé.
  alternative_spanish_readings:
  - Gedeón rechaza únicamente el título de rey, pero no toda forma de mando efectivo.
  - Gedeón solo se distancia de la realeza formal, sin excluir una influencia política de facto.
  rationale: El hebreo repite el mismo verbo para Gedeón, su hijo y Yahvé, de modo que el verso contrapone autoridad humana y autoridad divina sin usar el sustantivo 'rey'. La traducción debe conservar esa tensión y no resolverla introduciendo una categoría más precisa que la del texto.
  doctrine_reference: Preservar la tensión léxica y teológica del texto; no imponer una lectura doctrinal más cerrada que el hebreo.
translation_notes:
  revision_awareness: Esta versión sigue de cerca el texto hebreo y el audit trail inglés, conservando la repetición de מָשַׁל mediante 'reinar' para las tres cláusulas y manteniendo el contraste narrativo con 'Pero'. No se registraron revisiones posteriores en el expediente inglés, y el resumen de control indica acuerdo alto sin cambios pendientes.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para el Nombre divino, conforme a la terminología estándar del proyecto.
  - Se conserva el mismo verbo 'reinar' para las tres ocurrencias de מָשַׁל a fin de preservar la repetición retórica.
  - Se emplea 'Gedeón' como forma española bíblica usual.
  - La segunda cláusula negativa se expresa con 'ni' para mantener paralelismo natural en español.
