translation:
  language: es
  text: Porque los caballos de Faraón entraron en el mar con sus carros y con sus jinetes[a], y Yahvé hizo volver las aguas del mar sobre ellos[b]; pero los hijos de Israel caminaron sobre tierra seca por en medio del mar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «el caballo de Faraón»; el singular puede funcionar colectivamente para la fuerza montada y los carros de Faraón.'
    reason: lexical_alternative
  - marker: b
    text: O «y los hijos de Israel»; la conjunción hebrea es simplemente «y». «Pero» en el texto principal hace explícito el contraste.
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la relación explicativa con el canto anterior de manera natural en español, conservando el valor conectivo de causa o fundamento.
- source_word: בָא
  english_pob_choice: went into
  chosen_spanish: entraron
  alternatives_spanish:
  - fueron al
  - ingresaron en
  lexicon: HALOT
  rationale: Con בַיָּם, el movimiento es de ingreso al mar; 'entraron' mantiene el sentido y resulta idiomático en español.
- source_word: סוּס פַּרְעֹה
  english_pob_choice: Pharaoh’s horses
  chosen_spanish: los caballos de Faraón
  alternatives_spanish:
  - el caballo de Faraón
  - los caballos del Faraón
  lexicon: HALOT
  rationale: El singular hebreo puede funcionar colectivamente, como refleja la revisión inglesa; en español el plural comunica mejor la fuerza de caballería sin perder el valor colectivo del conjunto.
- source_word: בְּרִכְבּוֹ
  english_pob_choice: with his chariots
  chosen_spanish: con sus carros
  alternatives_spanish:
  - con su carro
  - con su carro de guerra
  lexicon: HALOT
  rationale: רכב puede designar el carro o la fuerza de carros; 'carros' es la forma más directa y natural para el contexto militar.
- source_word: וּבְפָרָשָׁיו
  english_pob_choice: with his horsemen
  chosen_spanish: con sus jinetes
  alternatives_spanish:
  - con sus cabalgadores
  - con su caballería
  lexicon: HALOT
  rationale: פָרָשִׁים son combatientes montados; 'jinetes' conserva el componente humano y montado sin volverlo demasiado técnico.
- source_word: וַיָּשֶׁב יְהוָה
  english_pob_choice: and Yahweh brought back
  chosen_spanish: Yahvé hizo volver
  alternatives_spanish:
  - Yahvé devolvió
  - Yahvé volvió
  lexicon: HALOT
  rationale: El hiphil de שוב es causativo; 'hizo volver' preserva la agencia divina de manera clara en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto para el nombre divino, manteniendo la forma auditada 'Yahweh' en la base inglesa y su equivalente español 'Yahvé'.
- source_word: עֲלֵהֶם
  english_pob_choice: over them
  chosen_spanish: sobre ellos
  alternatives_spanish:
  - encima de ellos
  - contra ellos
  lexicon: HALOT
  rationale: Con las aguas que regresan, 'sobre ellos' expresa el movimiento físico de cobertura e inundación.
- source_word: אֶת מֵי הַיָּם
  english_pob_choice: the waters of the sea
  chosen_spanish: las aguas del mar
  alternatives_spanish:
  - las aguas del mar
  - el agua del mar
  lexicon: HALOT
  rationale: La construcción hebrea se conserva con un genitivo natural en español y mantiene el plural de 'aguas' del texto fuente.
- source_word: וּבְנֵי יִשְׂרָאֵל
  english_pob_choice: but the sons of Israel
  chosen_spanish: pero los hijos de Israel
  alternatives_spanish:
  - y los hijos de Israel
  - pero los israelitas
  lexicon: HALOT
  rationale: Se mantiene la formulación formal 'hijos de Israel'. 'Pero' reproduce en español el contraste explícito que la versión inglesa añadió por claridad, aunque el hebreo solo lleva 'y'.
- source_word: הָלְכוּ
  english_pob_choice: walked
  chosen_spanish: anduvieron
  alternatives_spanish:
  - caminaron
  - iban
  lexicon: HALOT
  rationale: '''Anduvieron'' conserva el verbo ordinario y la idea de avance tranquilo, en contraste con la destrucción del ejército egipcio.'
- source_word: בַיַּבָּשָׁה
  english_pob_choice: on dry ground
  chosen_spanish: en seco
  alternatives_spanish:
  - sobre tierra seca
  - en tierra seca
  lexicon: HALOT
  rationale: '''En seco'' es breve y natural en español para la condición del lecho marino; preserva la idea de suelo seco sin añadir matices innecesarios.'
- source_word: בְּתוֹךְ הַיָּם
  english_pob_choice: through the midst of the sea
  chosen_spanish: por en medio del mar
  alternatives_spanish:
  - en medio del mar
  - a través del mar
  lexicon: HALOT
  rationale: La frase hebrea conserva la imagen espacial de pasar por el centro del mar; 'por en medio' reproduce el movimiento y la ubicación con claridad en español.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrammatón. La línea del proyecto evita enmascararlo con un título; 'Yahvé' mantiene el nombre del pacto según la convención española del POB.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Conjunción final antes de 'los hijos de Israel'
  english_pob_reading: but the sons of Israel
  chosen_spanish_reading: pero los hijos de Israel
  alternative_spanish_readings:
  - y los hijos de Israel
  rationale: El hebreo tiene simplemente una conjunción coordinante, pero el contraste narrativo es fuerte y la tradición POB lo hace explícito en inglés. En español, 'pero' comunica ese contraste sin alterar el contenido.
  doctrine_reference: English audit trail / applied revisions
- issue: Singular colectivo de סוּס פַּרְעֹה
  english_pob_reading: Pharaoh’s horses
  chosen_spanish_reading: los caballos de Faraón
  alternative_spanish_readings:
  - el caballo de Faraón
  - la caballería de Faraón
  rationale: La forma hebrea singular puede ser colectiva y referir la fuerza montada de Faraón. El plural español evita una lectura demasiado literal y mantiene la referencia al conjunto militar.
  doctrine_reference: English lexical decisions / applied revisions
translation_notes:
  revision_awareness: La revisión inglesa reciente corrigió 'horse' por 'horses' para reflejar el singular colectivo hebreo. La redacción española adopta desde el inicio una forma plural natural ('los caballos de Faraón') y conserva la lectura causativa de וַיָּשֶׁב con 'hizo volver'.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para el nombre divino, conforme al estándar del proyecto.
  - '''Hijos de Israel'' conserva la formulación formal del hebreo y del audit trail inglés.'
  - '''Carros'' y ''jinetes'' reflejan la fuerza militar montada sin introducir terminología eclesiástica ajena al texto.'
  - '''En seco'' y ''por en medio del mar'' preservan el contraste visual del pasaje con español natural.'
