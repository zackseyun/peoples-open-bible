  to: 'Y Acab dijo a Abdías: «Ve por la tierra a todos los manantiales de agua y a todos los wadis[a]. Quizá encontremos pasto y mantengamos vivos al caballo y al mulo, para no tener que destruir[b] nada del ganado».'
  rationale: Se corrige «Ahab» a «Acab» por uso bíblico español; se alinea la cláusula final con la decisión auditada inglesa vigente evitando «parte del ganado»; se mejora levemente la naturalidad de «hallaremos» a «encontremos»; y se repara la nota b, eliminando el anglicismo y aclarando el sentido literal e idiomático.
