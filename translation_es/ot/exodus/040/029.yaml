translation:
  language: es
  text: Y puso el altar del holocausto[a] a la entrada del tabernáculo de la tienda de reunión, y ofreció sobre él el holocausto[a] y la ofrenda de cereal, tal como Yahvé había mandado a Moisés.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Holocausto: ofrenda completamente quemada; aquí traduce el hebreo עֹלָה, no el uso moderno de la palabra.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִזְבַּח הָעֹלָה
  english_pob_choice: the altar of burnt offering
  chosen_spanish: el altar del holocausto[a]
  alternatives_spanish:
  - el altar para el holocausto
  - el altar del sacrificio quemado
  lexicon: HALOT
  rationale: Conservé el valor cultual específico de עֹלָה como sacrificio totalmente consumido. 'Holocausto' es un término bíblico tradicional y fiel al referente del altar, aunque su uso moderno exige una nota aclaratoria sobre el matiz sacrificial.
- source_word: שָׂם
  english_pob_choice: set
  chosen_spanish: puso
  alternatives_spanish:
  - colocó
  - estableció
  lexicon: HALOT
  rationale: En este contexto narrativo de instalación de mobiliario sagrado, 'puso' comunica de manera natural la acción de ubicar el altar sin perder la sencillez del hebreo.
- source_word: פֶּתַח
  english_pob_choice: at the entrance to
  chosen_spanish: a la entrada de
  alternatives_spanish:
  - en la entrada de
  - junto a la entrada de
  lexicon: HALOT
  rationale: '''פֶּתַח'' refiere a la apertura o acceso; ''a la entrada de'' mantiene el sentido espacial y suena natural en español.'
- source_word: מִשְׁכַּן אֹהֶל מוֹעֵד
  english_pob_choice: the tabernacle of the tent of meeting
  chosen_spanish: el tabernáculo, la tienda de reunión
  alternatives_spanish:
  - el tabernáculo de la tienda de reunión
  - la morada, la tienda de reunión
  lexicon: HALOT
  rationale: El hebreo acumula designaciones sagradas emparentadas. Opté por conservar ambas en español con coma explicativa, porque una fusión rígida ('el tabernáculo de la tienda de reunión') puede sonar menos natural y borra el carácter de doble denominación que el hebreo deja visible.
- source_word: וַיַּעַל עָלָיו
  english_pob_choice: and offered on it
  chosen_spanish: y ofreció sobre él
  alternatives_spanish:
  - y lo hizo subir sobre él
  - y levantó sobre él
  lexicon: HALOT
  rationale: En lenguaje sacrificial, עָלָה funciona idiomáticamente como 'ofrecer/elevar' una ofrenda. 'Ofreció sobre él' comunica el acto cultual sin forzar una traducción mecánica.
- source_word: הָעֹלָה
  english_pob_choice: the burnt offering
  chosen_spanish: el holocausto[a]
  alternatives_spanish:
  - la ofrenda quemada
  - el sacrificio íntegro
  lexicon: HALOT
  rationale: Mantengo el mismo término cultual que en מִזְבַּח הָעֹלָה para conservar coherencia léxica. La repetición refuerza que se trata del mismo tipo de ofrenda y no de un concepto distinto.
- source_word: הַמִּנְחָה
  english_pob_choice: the grain offering
  chosen_spanish: la ofrenda vegetal
  alternatives_spanish:
  - la ofrenda de cereal
  - la ofrenda de grano
  lexicon: HALOT
  rationale: '''מִנְחָה'' en contexto sacerdotal designa la ofrenda no animal de cereal/producto vegetal. ''Ofrenda vegetal'' evita un calco demasiado técnico y conserva la diferencia frente al holocausto.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: Sigo el criterio del proyecto de verter el Tetragrámaton como 'Yahvé' en el texto principal español para preservar el nombre divino revelado, en lugar de sustituirlo por un título.
- source_word: אֶת מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: a Moisés
  alternatives_spanish:
  - a Moisés
  - Moisés
  lexicon: HALOT
  rationale: El marcador de objeto directo no se reproduce; en español basta el complemento 'a Moisés'. Mantiene la referencia personal sin sobrecargar la sintaxis.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: La fuente hebrea usa el nombre propio del pacto, no un título genérico. Traduzco con 'Yahvé' para mantener la distinción teológica y la transparencia auditada del texto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sacrificial terminology for עֹלָה
  english_pob_reading: burnt offering
  chosen_spanish_reading: holocausto
  alternative_spanish_readings:
  - ofrenda quemada
  - sacrificio totalmente consumido
  rationale: Aunque 'holocausto' tiene asociaciones históricas modernas, en la literatura bíblica española sigue siendo el equivalente tradicional más reconocible para עֹלָה y conserva el sentido de ofrenda totalmente subida/quemada.
  doctrine_reference: Lexical policy for cultic terms; see project defaults for sacrificial vocabulary
- issue: Rendering of מִנְחָה
  english_pob_reading: grain offering
  chosen_spanish_reading: ofrenda vegetal
  alternative_spanish_readings:
  - ofrenda de cereal
  - ofrenda de grano
  rationale: El contexto sacerdotal excluye la idea general de 'regalo' y apunta a una ofrenda no sangrienta asociada con productos del campo. 'Ofrenda vegetal' comunica esa distinción sin introducir un tecnicismo innecesario.
  doctrine_reference: Lexical policy for priestly offerings
translation_notes:
  revision_awareness: El inglés POB pasó de una redacción con comas que podía leerse como aposición a 'the tabernacle of the tent of meeting'. En español mantengo la doble designación ('el tabernáculo, la tienda de reunión') porque el hebreo conserva ambos nombres y esta solución evita una fusión rígida, sin perder transparencia textual. No hay notas de variante textual; el testimonio base es estable.
  spanish_consistency_notes:
  - Mantengo 'Yahvé' para יהוה de forma consistente con el criterio del proyecto.
  - Conservo un mismo término para עֹלָה en el altar y en la ofrenda ('holocausto') para evitar confusión terminológica.
  - Uso 'ofrenda vegetal' para מִנְחָה, diferenciándola del holocausto y preservando el contraste cultual.
  - '''Tienda de reunión'' traduce אֹהֶל מוֹעֵד de manera estable y litúrgicamente comprensible.'
