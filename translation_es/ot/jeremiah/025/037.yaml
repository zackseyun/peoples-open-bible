translation:
  language: es
  text: Y las pasturas tranquilas[a] quedan asoladas por la ardiente ira de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las pasturas de paz»; el hebreo es más literalmente «pasturas de paz».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָדַמּוּ
  english_pob_choice: are laid waste
  chosen_spanish: serán devastadas
  alternatives_spanish:
  - quedarán asoladas
  - serán arruinadas
  - serán destruidas
  lexicon: HALOT
  rationale: 'El nifal de דמם aquí expresa el resultado de una acción de juicio: desolación. En español, «serán devastadas» comunica bien el estado causado sin perder el sentido pasivo/resultativo que el inglés POB captó con «are laid waste».'
- source_word: נְאוֹת
  english_pob_choice: pastures
  chosen_spanish: pasturas
  alternatives_spanish:
  - praderas
  - pastos
  - lugares de pastoreo
  lexicon: HALOT
  rationale: En Jeremías, el término se refiere a lugares de pastoreo o campos de pasto. «Pasturas» es natural en español bíblico y conserva la referencia pastoral más específicamente que un término más general como «praderas».
- source_word: הַשָּׁלוֹם
  english_pob_choice: peaceful
  chosen_spanish: pacíficas
  alternatives_spanish:
  - de paz
  - tranquilas
  - seguras
  lexicon: HALOT
  rationale: La construcción hebrea equivale literalmente a «pasturas de paz». En español, «pasturas pacíficas» mantiene la cualidad de paz/seguridad sin forzar una expresión demasiado literal o poco idiomática.
- source_word: מִפְּנֵי
  english_pob_choice: because of
  chosen_spanish: por
  alternatives_spanish:
  - a causa de
  - debido a
  - por causa de
  lexicon: HALOT
  rationale: Aquí la preposición es causal. «Por» transmite de manera sobria y natural la causa del desastre; también preserva la relación causal que el inglés POB explicitó con «because of».
- source_word: חֲרוֹן אַף
  english_pob_choice: burning anger
  chosen_spanish: la ardiente ira
  alternatives_spanish:
  - el ardor de la ira
  - la ira ardiente
  - el furor ardiente
  lexicon: HALOT
  rationale: La expresión idiomática combina el calor/ardor con la nariz/ira para denotar furia intensa. «La ardiente ira» conserva la imagen de intensidad térmica mejor que «ira» sola o «furor» como equivalente más general.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino propio, no un título sustituto. «Yahvé» es la forma establecida en el proyecto para יְהוָה y preserva el referente covenantal del texto.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El hebreo usa directamente el Tetragrámaton. En coherencia con la política del proyecto, se conserva el nombre propio de Dios en lugar de sustituirlo por un título litúrgico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: El contexto inglés de auditoría no requirió cambios en la última revisión; se conserva la lectura de juicio devastador para וְנָדַמּוּ, la imagen pastoral de נְאוֹת, la causalidad de מִפְּנֵי y el nombre divino Yahweh/Yahvé sin sustitución por título.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» de forma consistente con el estándar del proyecto para יְהוָה.
  - «Pasturas» traduce el término pastoral con claridad y evita una carga eclesiástica ajena al hebreo.
  - La nota al pie conserva la alternativa más literal «pasturas de paz» sin imponerla en el cuerpo del texto.
  - No se añadió «SEÑOR» para no enmascarar el nombre divino según la política del proyecto.
