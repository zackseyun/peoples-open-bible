translation:
  language: es
  text: El estandarte del campamento de Dan estará al norte por sus divisiones[a]; y el jefe de los hijos de Dan será Ahiezer hijo de Ammishaddai.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «según sus divisiones»; también puede entenderse «por sus huestes».
    reason: lexical_alternative
lexical_decisions:
- source_word: דֶּגֶל
  english_pob_choice: banner
  chosen_spanish: estandarte
  alternatives_spanish:
  - bandera
  - pendón
  lexicon: HALOT
  rationale: En el contexto de organización tribal del campamento, «estandarte» comunica bien la idea de una insignia o insignia militar bajo la cual se dispone la tribu. «Bandera» sería posible, pero puede sonar más moderna y menos específica del orden campamental; «pendón» es más literaria pero menos natural.
- source_word: מַחֲנֵה
  english_pob_choice: camp
  chosen_spanish: campamento
  alternatives_spanish:
  - campamento
  - campamento militar
  lexicon: HALOT
  rationale: «Campamento» expresa con claridad la estructura organizada de Israel en Números 2. Evita la rigidez de un calco y mantiene el sentido colectivo de la disposición tribal.
- source_word: צָפֹנָה
  english_pob_choice: on the north
  chosen_spanish: al norte
  alternatives_spanish:
  - hacia el norte
  - en el norte
  lexicon: HALOT
  rationale: La forma direccional indica ubicación/orientación. «Al norte» es la opción más natural en español y conserva la referencia espacial sin sobreexplicar.
- source_word: לְצִבְאֹתָם
  english_pob_choice: by their divisions
  chosen_spanish: por sus divisiones
  alternatives_spanish:
  - según sus divisiones
  - por sus ejércitos
  - por sus huestes
  lexicon: HALOT
  rationale: «צָבָא» aquí apunta a agrupaciones ordenadas y organizadas dentro de la tribu. «Por sus divisiones» preserva el matiz organizativo y evita términos demasiado arcaicos o bélicos en español.
- source_word: וְנָשִׂיא
  english_pob_choice: and the leader
  chosen_spanish: y el jefe
  alternatives_spanish:
  - y el líder
  - y el príncipe
  lexicon: HALOT
  rationale: En el contexto tribal-administrativo, נָשִׂיא es el representante principal de la tribu. «Jefe» es claro y fiel; «líder» es aceptable pero menos concreto, y «príncipe» puede sugerir monarquía.
- source_word: לִבְנֵי דָן
  english_pob_choice: of the sons of Dan
  chosen_spanish: de los hijos de Dan
  alternatives_spanish:
  - de los hijos de Dan
  - de los descendientes de Dan
  - del pueblo de Dan
  lexicon: HALOT
  rationale: Se conserva la designación tribal formal y el plural masculino del hebreo. «Hijos» refleja mejor la fórmula bíblica que «descendientes» o «pueblo», que suavizarían el término.
- source_word: אֲחִיעֶזֶר
  english_pob_choice: Ahiezer
  chosen_spanish: Ahiezer
  alternatives_spanish:
  - Ahiézer
  lexicon: HALOT
  rationale: Nombre propio transliterado de forma reconocible en español, manteniendo continuidad con el texto fuente.
- source_word: בֶּן עַמִּישַׁדָּי
  english_pob_choice: son of Ammishaddai
  chosen_spanish: hijo de Ammisaddai
  alternatives_spanish:
  - hijo de Ammishaddai
  lexicon: HALOT
  rationale: La construcción patronímica se vierte de modo directo. Se conserva el nombre propio mediante transliteración, y «hijo de» reproduce la relación genealógica sin añadir interpretación.
theological_decisions:
- issue: Designación tribal masculina בְנֵי / לִבְנֵי
  english_pob_reading: sons of Dan
  chosen_spanish_reading: los hijos de Dan
  alternative_spanish_readings:
  - las personas de Dan
  - los descendientes de Dan
  rationale: Se mantiene la forma masculina explícita del hebreo, que aquí funciona como designación tribal formal. No se adopta una versión más inclusiva porque la fuente no la exige y el registro genealógico/administrativo la hace más exacta.
  doctrine_reference: DOCTRINE.md § Translation philosophy, point 4
- issue: Sentido de נָשִׂיא en contexto de tribus
  english_pob_reading: the leader
  chosen_spanish_reading: el jefe
  alternative_spanish_readings:
  - el líder
  - el príncipe
  rationale: El término no describe monarquía sino una función de representación tribal. «Jefe» conserva autoridad y evita introducir una connotación histórica impropia en español.
  doctrine_reference: HALOT / contexto de Números 2
translation_notes:
  revision_awareness: 'La redacción inglesa revisada eliminó la coma tras «north» para hacer más natural la frase. En español se siguió el mismo criterio: no se añadió pausa innecesaria entre la orientación y la frase preposicional, manteniendo la fluidez sin alterar el contenido.'
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando aparece el nombre divino; este versículo no lo contiene.
  - Se mantuvo la terminología tribal formal («hijos de Dan») por coherencia con el registro administrativo de Números 2.
  - Los nombres propios se transliteraron sin adaptar a grafías eclesiásticas tradicionales adicionales.
  - «Estandarte» y «campamento» son términos consistentes con otras disposiciones de batalla/orden tribal y evitan el calco de «banner».
