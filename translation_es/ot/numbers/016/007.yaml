translation:
  language: es
  text: y pongan fuego en ellos, y coloquen incienso sobre ellos delante de Yahvé mañana. Entonces el hombre a quien Yahvé escoja, ese es el santo. ¡Han ido demasiado lejos[a], hijos de Leví!
