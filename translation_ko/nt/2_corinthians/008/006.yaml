id: 2CO.8.6
reference: '2 Corinthians 8:6'
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: εἰς τὸ παρακαλέσαι ἡμᾶς Τίτον ἵνα καθὼς προενήρξατο οὕτως καὶ ἐπιτελέσῃ εἰς ὑμᾶς καὶ τὴν χάριν ταύτην·
base_translation:
  language: en
  yaml_path: translation/nt/2_corinthians/008/006.yaml
  text: So we urged Titus that[a], just as he had previously begun, he should also complete among you this act of grace.
translation:
  language: ko
  text: 그래서 우리는 디도가 전에 시작한 것처럼 여러분 가운데서도 이 은혜로운 일[a]을 완성하도록 그를 권면하였습니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「이 은혜」, 「이 은혜로운 사역」. 8장에서 χάρις는 예루살렘 헌금이라는 구체적 사역을 가리키는 기술 용어로도 쓰인다.
    reason: lexical_alternative
lexical_decisions:
- source_word: χάριν
  english_pob_choice: act of grace
  chosen_korean: 은혜로운 일
  lexicon: BDAG
  rationale: 여기서 χάρις는 예루살렘 헌금이라는 구체적 사역을 가리킨다. 「은혜로운 일」이 신학적 깊이를 유지하면서 구체적 사역임을 동시에 드러낸다.
  alternatives_korean:
  - 은혜
  - 은혜로운 사역
  - 선물
- source_word: παρακαλέσαι
  english_pob_choice: urged
  chosen_korean: 권면하였습니다
  lexicon: BDAG
  rationale: 여기서 παρακαλέω는 디도에게 사역을 맡기는 권유의 의미. 「권면」이 사역 위임의 무게를 담는다.
  alternatives_korean:
  - 부탁하였습니다
  - 간청하였습니다
- source_word: Τίτον
  english_pob_choice: Titus
  chosen_korean: 디도
  lexicon: BDAG
  rationale: 한국어 성경 전통에 정착된 「디도」를 사용한다.
  alternatives_korean:
  - 티투스
