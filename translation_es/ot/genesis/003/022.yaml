translation:
  language: es
  text: 'Entonces Yahvé Dios dijo[a]: «He aquí, el hombre ha llegado a ser como uno de nosotros, conociendo el bien y el mal. Y ahora, no sea que extienda su mano y también tome del árbol de la vida, y coma, y viva para siempre—»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como uno de nosotros». El plural hebreo «nosotros» se conserva; los intérpretes lo entienden de diversas maneras, entre ellas como lenguaje de la corte divina, plural de deliberación o indicio de pluralidad intra-divina.
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino propio mediante transliteración reverente y transparente, en lugar de sustituirlo por un título. 'Yahvé' es el equivalente funcional elegido para el español del proyecto.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: HALOT
  rationale: En aposición con el nombre divino, 'Dios' comunica con claridad el sustantivo hebreo sin forzar una perífrasis innecesaria.
- source_word: הֵן
  english_pob_choice: Behold
  chosen_spanish: Mira
  alternatives_spanish:
  - He aquí
  - Mira, pues
  lexicon: HALOT
  rationale: '''Mira'' conserva la fuerza deíctica e introductoria en español actual con tono solemne pero natural. ''He aquí'' sería más tradicional, pero menos ágil para lectura pública moderna.'
- source_word: הָאָדָם
  english_pob_choice: the man
  chosen_spanish: el hombre
  alternatives_spanish:
  - el ser humano
  - el humano
  lexicon: HALOT
  rationale: Aquí el referente es el individuo masculino ya introducido en el relato, no la humanidad en abstracto. 'El hombre' mantiene precisión contextual y corresponde a la elección auditada en inglés.
- source_word: הָיָה
  english_pob_choice: has become
  chosen_spanish: ha llegado a ser
  alternatives_spanish:
  - se ha vuelto
  - ha devenido
  lexicon: HALOT
  rationale: La forma perfecta expresa un estado resultante después del acto narrado. 'Ha llegado a ser' comunica bien ese valor sin sonar excesivamente literal o arcaico.
- source_word: כְּאַחַד מִמֶּנּוּ
  english_pob_choice: like one of us
  chosen_spanish: como uno de nosotros
  alternatives_spanish:
  - como uno de nosotros mismos
  - como uno entre nosotros
  lexicon: HALOT
  rationale: Se conserva el plural 'nosotros' para no resolver la tensión interpretativa del hebreo. 'Como uno de nosotros' es la forma más directa y fiel en español.
- source_word: לָדַעַת טוֹב וָרָע
  english_pob_choice: knowing good and evil
  chosen_spanish: conociendo el bien y el mal
  alternatives_spanish:
  - para conocer el bien y el mal
  - con conocimiento del bien y del mal
  lexicon: HALOT
  rationale: El participio gerundivo español transmite bien el resultado/estado de conocimiento que sigue a 'ha llegado a ser'. 'Bien y mal' se expresa de manera natural y mantiene el binomio moral del hebreo.
- source_word: וְעַתָּה
  english_pob_choice: And now
  chosen_spanish: Y ahora
  alternatives_spanish:
  - Ahora
  - Y bien
  lexicon: HALOT
  rationale: Conserva la progresión discursiva y la urgencia de la nueva cláusula en español.
- source_word: פֶּן
  english_pob_choice: lest
  chosen_spanish: no sea que
  alternatives_spanish:
  - para que no
  - de modo que no
  lexicon: HALOT
  rationale: '''No sea que'' es la equivalencia española más natural para una cláusula preventiva y mantiene el matiz de advertencia implícita.'
- source_word: יִשְׁלַח יָדוֹ
  english_pob_choice: he reach out his hand
  chosen_spanish: extienda su mano
  alternatives_spanish:
  - alargue su mano
  - tienda su mano
  lexicon: HALOT
  rationale: En español, 'extender su mano' reproduce la imagen concreta de la acción y suena idiomático. 'Mano' es la elección natural para יָד en este contexto.
- source_word: גַּם
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - incluso
  - además
  lexicon: HALOT
  rationale: '''También'' conserva la fuerza aditiva de גַּם de manera fluida dentro de la oración española.'
- source_word: מֵעֵץ הַחַיִּים
  english_pob_choice: from the tree of life
  chosen_spanish: del árbol de la vida
  alternatives_spanish:
  - del árbol de vida
  lexicon: HALOT
  rationale: La construcción fijada en español bíblico es 'árbol de la vida'; mantiene transparencia semántica y reconocimiento lector.
- source_word: וְאָכַל
  english_pob_choice: and eat
  chosen_spanish: coma
  alternatives_spanish:
  - y coma
  - y comer
  lexicon: HALOT
  rationale: Se usa la tercera persona subjuntiva/volitiva española para reflejar la secuencia temida dentro de la cláusula preventiva introducida por פֶּן.
- source_word: וָחַי לְעֹלָם
  english_pob_choice: and live forever
  chosen_spanish: y viva para siempre
  alternatives_spanish:
  - y viva eternamente
  - y viva por siempre
  lexicon: HALOT
  rationale: '''Para siempre'' reproduce de forma natural la noción de perpetuidad de לְעֹלָם en español. ''Viva'' mantiene la dependencia verbal dentro de la advertencia.'
theological_decisions:
- issue: Plural pronoun in 'como uno de nosotros'
  english_pob_reading: Retain the plural 'us' without interpretive expansion.
  chosen_spanish_reading: Conservar 'nosotros' sin resolver la referencia en la traducción principal.
  alternative_spanish_readings:
  - como uno de la corte celestial
  - como uno de la divinidad
  - como uno de nosotros mismos
  rationale: El hebreo usa claramente la primera persona plural. La traducción debe preservar esa tensión interpretativa en vez de explicarla o neutralizarla en el texto principal.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: Cláusula final abrupta
  english_pob_reading: Preserve the broken-off sense with a dash after 'live forever—'.
  chosen_spanish_reading: Mantener el corte abrupto con raya final tras 'para siempre—'.
  alternative_spanish_readings:
  - cerrar la oración con punto
  - suavizar con una coma y continuar implícitamente
  rationale: El hebreo deja la cláusula suspendida; la raya española comunica esa interrupción sin añadir contenido no presente en el original.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
translation_notes:
  revision_awareness: 'La versión española sigue de cerca la decisión auditada en inglés: nombre divino propio, preservación del plural ''nosotros'', cláusula preventiva con ''no sea que'' y cierre abrupto con raya final. No se detectaron revisiones posteriores que exijan ajuste.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' para יְהוָה, conforme al criterio del proyecto, y 'Dios' para אֱלֹהִים en aposición.
  - '''Árbol de la vida'' se mantiene como sintagma establecido y transparente para el español bíblico.'
  - Se prefieren formas naturales en español ('mira', 'no sea que', 'extienda su mano') sin perder la correspondencia semántica con el hebreo.
