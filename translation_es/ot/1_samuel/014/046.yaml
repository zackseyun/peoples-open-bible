translation:
  language: es
  text: Entonces Saúl dejó de perseguir a los filisteos[a], y los filisteos fueron a su propio lugar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Entonces Saúl se retiró de seguir tras los filisteos». El hebreo dice literalmente: «subió de detrás de los filisteos», un giro idiomático que indica el fin de la persecución.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַל
  english_pob_choice: went up
  chosen_spanish: subió
  alternatives_spanish:
  - subió
  - se retiró
  - cesó
  lexicon: HALOT
  rationale: עלה significa literalmente ‘subir’. En este contexto militar, unido a מֵאַחֲרֵי, describe el fin de la persecución. ‘Subió’ conserva el verbo hebreo; ‘se retiró’ y ‘cesó’ explicitan más la idea, pero con menor cercanía formal al texto.
- source_word: מֵאַחֲרֵי
  english_pob_choice: from pursuing
  chosen_spanish: de perseguir
  alternatives_spanish:
  - de ir tras
  - de seguir tras
  - de perseguir
  lexicon: HALOT
  rationale: אַחֲרֵי con prefijo מִן expresa literalmente ‘de detrás de / de después de’. En contexto bélico, el sentido idiomático es el de abandonar la persecución. ‘De perseguir’ comunica ese valor sin añadir una paráfrasis excesiva.
- source_word: פְּלִשְׁתִּים
  english_pob_choice: the Philistines
  chosen_spanish: los filisteos
  alternatives_spanish:
  - los filisteos
  lexicon: HALOT
  rationale: Nombre étnico habitual en español bíblico; ‘filisteos’ es la equivalencia natural y clara para פְּלִשְׁתִּים.
- source_word: הָלְכוּ
  english_pob_choice: went
  chosen_spanish: fueron
  alternatives_spanish:
  - fueron
  - se fueron
  - partieron
  lexicon: HALOT
  rationale: הלך es el verbo común ‘ir/caminar’. ‘Fueron’ es la forma más directa y sobria en español. ‘Se fueron’ o ‘partieron’ agregan matices no exigidos por el hebreo.
- source_word: לִמְקוֹמָם
  english_pob_choice: to their own place
  chosen_spanish: a su propio lugar
  alternatives_spanish:
  - a su lugar
  - a su propio lugar
  - a su territorio
  lexicon: HALOT
  rationale: מָקוֹם significa ‘lugar’; el sufijo de 3ª plural se vierte con ‘su’. ‘Propio’ refleja el énfasis posesivo que la versión inglesa expresó con ‘own’. ‘Territorio’ sería más interpretativo que el hebreo.
translation_notes:
  revision_awareness: 'Se mantiene la lectura y la valoración del audit trail en inglés: el hebreo usa un giro idiomático (‘subió de después/detrás de’) que señala el cese de la persecución, y el resto del versículo es descriptivo sin tensión textual relevante. No se introducen revisiones nuevas respecto del pase inglés.'
  spanish_consistency_notes:
  - Se conserva ‘Yahvé’ como norma del proyecto cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se evita ‘SEÑOR’ y otras sustituciones no pertinentes aquí.
  - ‘Los filisteos’ mantiene el nombre étnico de forma estándar y comprensible.
  - La elección de ‘subió’ preserva la literalidad hebrea, mientras la nota aclara el valor idiomático para evitar una lectura mecánica.
