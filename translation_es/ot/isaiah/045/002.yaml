translation:
  language: es
  text: Yo mismo iré delante de ti[a], y allanaré los lugares ásperos; romperé en pedazos las puertas de bronce y cortaré las barras de hierro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «y allanaré los terrenos ásperos»; la frase hebrea es difícil textualmente y léxicamente, y algunas traducciones la vierten más específicamente como «montañas» o «alturas».
    reason: alternative_reading
lexical_decisions:
- source_word: אֲנִי
  english_pob_choice: I myself
  chosen_spanish: Yo mismo
  alternatives_spanish:
  - yo
  - yo mismo
  lexicon: WLC / énfasis pronominal
  rationale: El pronombre explícito hebreo añade énfasis personal. «Yo mismo» preserva esa fuerza en español sin introducir contenido ajeno al texto.
- source_word: לְפָנֶיךָ
  english_pob_choice: before you
  chosen_spanish: delante de ti
  alternatives_spanish:
  - antes de ti
  - en frente de ti
  lexicon: HALOT
  rationale: La expresión espacial idiomática se comunica de forma natural con «delante de ti», manteniendo la idea de ir en anticipación o al frente.
- source_word: אֵלֵךְ
  english_pob_choice: I will go
  chosen_spanish: iré
  alternatives_spanish:
  - voy a ir
  - yo iré
  lexicon: HALOT
  rationale: En contexto profético de promesa, el imperfecto se vierte con futuro. «Iré» suena natural y conserva la dirección de la acción.
- source_word: וַהֲדוּרִים אושר
  english_pob_choice: and I will level the rough places
  chosen_spanish: allanaré los lugares ásperos
  alternatives_spanish:
  - nivelaré los terrenos ásperos
  - haré llanos los lugares escabrosos
  - allanaré las alturas
  lexicon: HALOT
  rationale: La frase hebrea es difícil y admite varias posibilidades. «Allanaré» conserva el valor causativo; «lugares ásperos» refleja la amplitud semántica sin fijar indebidamente «montañas» o «alturas».
- source_word: דַּלְת֤וֹת נְחוּשָׁה֙
  english_pob_choice: doors of bronze
  chosen_spanish: puertas de bronce
  alternatives_spanish:
  - portones de bronce
  - puertas de cobre
  - puertas broncíneas
  lexicon: HALOT
  rationale: Aunque דלתות puede ser literalmente «puertas», en español «puertas de bronce» conserva la imagen sin forzar un tecnicismo. «Bronce» es la equivalencia habitual de נְחוּשָׁה en este contexto.
- source_word: אֲשַׁבֵּר
  english_pob_choice: I will break in pieces
  chosen_spanish: romperé en pedazos
  alternatives_spanish:
  - quebrantaré
  - aplastaré
  - destruiré
  lexicon: HALOT
  rationale: El piel intensifica la acción más allá de «romper» simple. «Romperé en pedazos» transmite esa fuerza de manera clara y fiel.
- source_word: בְרִיחֵי בַרְזֶל
  english_pob_choice: bars of iron
  chosen_spanish: las barras de hierro
  alternatives_spanish:
  - los cerrojos de hierro
  - las barras de fierro
  - los pasadores de hierro
  lexicon: HALOT
  rationale: בריח puede significar barra o cerrojo. «Barras de hierro» es natural en español y mantiene el paralelo con «puertas de bronce» sin sobreespecificar el mecanismo.
- source_word: אֲגַדֵּעַ
  english_pob_choice: I will cut through
  chosen_spanish: cortaré
  alternatives_spanish:
  - cortaré a través de
  - troncharé
  - seccionaré
  lexicon: HALOT
  rationale: El verbo comunica un corte decisivo de las barras. En español, «cortaré» es suficiente y fluido; el contexto ya aporta la idea de atravesar o remover.
theological_decisions:
- issue: Énfasis personal de Yahvé en su acción protectora/guía
  english_pob_reading: I myself will go before you
  chosen_spanish_reading: Yo mismo iré delante de ti
  alternative_spanish_readings:
  - Iré delante de ti
  - Yo iré delante de ti
  rationale: Se conserva el énfasis explícito del pronombre hebreo sin convertirlo en una paráfrasis devocional. La promesa de Yahvé de ir al frente mantiene su carga de protección y dirección.
  doctrine_reference: Isaías 45:2; promesa divina de guía y apertura del camino
translation_notes:
  revision_awareness: 'La base inglesa está en filosofía optimal-equivalence y fue revisada sin cambios (latest pass: unchanged; high_agreement). La versión española conserva esa decisión: mantiene el énfasis de «I myself», traduce la frase difícil con una opción amplia y natural («allanaré los lugares ásperos»), y refleja los objetos de metal con términos directos y transparentes.'
  spanish_consistency_notes:
  - Se usa «Yahvé» en el texto bíblico según la convención del proyecto, pero este versículo no contiene el tetragrámaton explícito en la cadena dada; por eso no se introduce aquí.
  - «Bronce» se mantiene por ser el equivalente estándar de נְחוּשָׁה en este contexto; no se reemplaza por «cobre».
  - La nota a pie [a] se ancla en «delante de ti» para señalar que la dificultad interpretativa afecta a la secuencia completa de la acción de ir delante y allanar el camino.
