translation:
  language: es
  text: Tus ojos verán cosas extrañas[a], y tu corazón hablará cosas perversas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mujeres extrañas». El hebreo זָרוֹת puede, en algunos contextos, referirse a mujeres foráneas o ilícitas; aquí también puede entenderse más ampliamente como cosas extrañas o percepciones distorsionadas producidas por la embriaguez.
    reason: alternative_reading
  - marker: b
    text: O «cosas torcidas» o «cosas retorcidas». El hebreo תַּהְפֻּכוֹת alude a lo deformado o perverso, especialmente en el habla.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֵינֶיךָ
  english_pob_choice: your eyes
  chosen_spanish: tus ojos
  alternatives_spanish:
  - tu ojo
  lexicon: HALOT
  rationale: El hebreo tiene forma dual/plural con sufijo de 2ms; en español, el plural natural 'ojos' comunica con claridad el referente sin perder fidelidad.
- source_word: יִרְאוּ
  english_pob_choice: will see
  chosen_spanish: verán
  alternatives_spanish:
  - verán a
  lexicon: HALOT
  rationale: El imperfecto verbal en este contexto de advertencia expresa resultado futuro; 'verán' mantiene ese valor de consecuencia.
- source_word: זָרוֹת
  english_pob_choice: strange things
  chosen_spanish: cosas extrañas
  alternatives_spanish:
  - mujeres extrañas
  - extrañas
  - cosas ajenas
  lexicon: HALOT
  rationale: La forma femenina plural puede aludir a 'mujeres extrañas' en ciertos contextos, pero aquí el contexto de embriaguez favorece una percepción distorsionada. 'Cosas extrañas' preserva esa amplitud sin decidir demasiado.
- source_word: וְלִבְּךָ
  english_pob_choice: and your heart
  chosen_spanish: y tu corazón
  alternatives_spanish:
  - y tu mente
  lexicon: HALOT
  rationale: '''Corazón'' conserva la antropología hebrea del interior humano. ''Mente'' sería más interpretativo y perdería transparencia respecto al original.'
- source_word: יְדַבֵּר
  english_pob_choice: will speak
  chosen_spanish: hablará
  alternatives_spanish:
  - dirá
  - pronunciará
  lexicon: HALOT
  rationale: El piel imperfecto indica acción futura o resultante; 'hablará' es la equivalencia más natural y general en español.
- source_word: תַּהְפֻּכֽוֹת
  english_pob_choice: perverse things
  chosen_spanish: perversidades
  alternatives_spanish:
  - cosas torcidas
  - cosas perversas
  - deformidades
  lexicon: HALOT
  rationale: El sustantivo designa lo torcido, trastornado o perverso, especialmente en el habla. 'Perversidades' conserva el peso moral y verbal mejor que una descripción puramente física.
theological_decisions:
- issue: Si 'זָרוֹת' debe entenderse como mujeres extrañas o como percepciones distorsionadas por la embriaguez
  english_pob_reading: '''strange things'' with a footnote allowing ''strange women'' as an alternative in some contexts'
  chosen_spanish_reading: '''cosas extrañas'' con nota de posibilidad alternativa'
  alternative_spanish_readings:
  - mujeres extrañas
  - cosas ajenas
  rationale: La evidencia del versículo, junto con el marco inmediato sobre embriaguez, favorece una lectura amplia de visiones distorsionadas. La nota preserva la tensión léxica documentada sin cerrarla artificialmente.
  doctrine_reference: Proverbios 23:29-35; HALOT sobre זָר
- issue: Si 'תַּהְפֻּכֽוֹת' debe sonar principalmente moral o descriptivo
  english_pob_reading: '''perverse things'' with an alternative ''twisted things'' or ''crooked things'''
  chosen_spanish_reading: '''perversidades'''
  alternative_spanish_readings:
  - cosas torcidas
  - cosas retorcidas
  - cosas perversas
  rationale: En este contexto el texto no solo describe alteración mental sino habla corrompida. 'Perversidades' conserva la carga ética que el hebreo y el POB inglés documentan.
  doctrine_reference: Proverbios 2:12; 6:12; 8:13
translation_notes:
  revision_awareness: La revisión más reciente indicó que no había cambios necesarios; esta versión sigue de cerca el audit trail inglés y conserva las alternativas documentadas sin amplificar ni reducir el alcance semántico.
  spanish_consistency_notes:
  - Se mantiene 'tus ojos' y 'tu corazón' con tratamiento singular de segunda persona en español para reflejar el sufijo hebreo.
  - Se evita 'SEÑOR' porque el versículo no contiene el Tetragrámaton.
  - '''Corazón'' se conserva por transparencia antropológica hebrea; no se sustituye por ''mente''.'
  - '''Perversidades'' mantiene el tono moral del término hebreo y su paralelo con el habla corrupta.'
