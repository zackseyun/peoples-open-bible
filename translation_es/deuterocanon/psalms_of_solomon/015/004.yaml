  glossary_alignment: No hay términos del glosario mayor en disputa en este versículo. La decisión de mantener «el hombre» para ἄνθρωπος como singular genérico es defendible en este registro, y «dar gracias» para ἐξομολογήσασθαι sigue correctamente la decisión léxica documentada en el POB inglés. «A tu nombre» preserva bien el dativo y el modismo bíblico.
