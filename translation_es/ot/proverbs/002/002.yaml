- from: haciendo atento[a] tu oído a la sabiduría, inclinando tu corazón al entendimiento,
  to: poniendo atento tu oído a la sabiduría, inclinando tu corazón al entendimiento,[a]
  rationale: Se reemplaza 'haciendo atento' por 'poniendo atento' para mejorar la naturalidad y legibilidad en español sin perder la fuerza causativa ni la imagen concreta del hebreo. Se mantiene el resto del verso y la nota léxica del POB inglés. La nota se ancla explícitamente en 'entendimiento' conforme a la disciplina de notas.
