translation:
  language: es
  text: Y aplastaré[a] a sus adversarios delante de él, y heriré[b] a los que lo odian.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de delante de él», más literalmente, preservando el modismo hebreo de quitar a los enemigos de su presencia.
    reason: lexical_alternative
  - marker: b
    text: O «golpearé» o «abatiré»; el verbo hebreo puede denotar un golpe fuerte en juicio o en batalla.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכַתּוֹתִי
  english_pob_choice: And I will crush
  chosen_spanish: Y yo aplastaré
  alternatives_spanish:
  - Y yo destruiré
  - Y yo quebrantaré
  - Y yo trituraré
  lexicon: HALOT
  rationale: כתת comunica una acción fuerte de golpear y deshacer. "Aplastaré" conserva la fuerza marcial de "crush" en español natural, sin suavizarla a un mero "derrotar".
- source_word: מִפָּנָיו
  english_pob_choice: before him
  chosen_spanish: delante de él
  alternatives_spanish:
  - de delante de él
  - de su presencia
  lexicon: HALOT
  rationale: 'La imagen hebrea es idiomática: sacar a los enemigos de delante del rey. "Delante de él" reproduce bien el valor espacial y relacional sin sonar rígido.'
- source_word: צָרָיו
  english_pob_choice: his adversaries
  chosen_spanish: sus adversarios
  alternatives_spanish:
  - sus enemigos
  - sus enemigos hostiles
  - sus opositores
  lexicon: HALOT
  rationale: '"Adversarios" mantiene el matiz de oposición activa y evita repetir exactamente "los que lo odian" del segundo hemistiquio.'
- source_word: וּמְשַׂנְאָיו
  english_pob_choice: those who hate him
  chosen_spanish: los que lo odian
  alternatives_spanish:
  - los que le odian
  - sus odiadores
  - los que le tienen odio
  lexicon: HALOT
  rationale: El participio expresa acción o rasgo continuo de odio. "Los que lo odian" conserva esa fuerza verbal en un español claro y digno.
- source_word: אֶגּוֹף
  english_pob_choice: strike down
  chosen_spanish: derribaré
  alternatives_spanish:
  - golpearé
  - heriré
  - aplastaré
  lexicon: HALOT
  rationale: נגף puede ser golpear, herir o derribar en contexto de juicio o batalla. "Derribaré" comunica derrota decisiva y complementa bien el primer verbo sin repetirlo de forma mecánica.
theological_decisions:
- issue: Lenguaje de guerrero divino en la promesa davídica
  english_pob_reading: Retain strong martial imagery as Yahweh's direct action on behalf of the king without softening it into generic protection.
  chosen_spanish_reading: Mantener la imagen militar fuerte como acción directa de Yahvé en favor del rey, sin convertirla en una protección genérica.
  alternative_spanish_readings:
  - Suavizarla como "venceré" o "pondré en fuga"
  - Reexpresarla de modo menos bélico
  rationale: El hebreo presenta verbos enérgicos de derrota y golpe. En español conviene conservar esa densidad imagística para no borrar la tensión teológica y literaria del texto.
  doctrine_reference: Principio de primacía del original; conservar la imaginería y la tensión teológica del texto fuente.
translation_notes:
  revision_awareness: El borrador sigue de cerca el paquete fuente hebreo y el rastro de auditoría en inglés. Se preserva la duplicación poética de dos verbos fuertes y la distinción entre «adversarios» y «los que lo odian», sin introducir suavizaciones interpretativas no justificadas por el texto.
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma estándar del nombre divino en el proyecto.
  - Se mantiene un registro bíblico moderno y digno, evitando arcaísmos innecesarios.
  - Se conserva la distinción semántica entre oposición activa («adversarios») y odio personal («los que lo odian»).
