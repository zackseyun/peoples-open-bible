id: TIT.1.15
reference: Titus 1:15
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ⸀πάντα καθαρὰ τοῖς καθαροῖς· τοῖς δὲ μεμιαμμένοις καὶ ἀπίστοις οὐδὲν καθαρόν, ἀλλὰ μεμίανται αὐτῶν καὶ ὁ νοῦς καὶ ἡ συνείδησις.
base_translation:
  language: en
  yaml_path: translation/nt/titus/001/015.yaml
  text: All things are pure to the pure; but to those who are defiled and unbelieving[a], nothing is pure. Instead, both their mind and their conscience are defiled.
  footnotes:
  - marker: a
    text: Or 'clean' throughout the verse; the Greek term can carry both ritual and moral overtones.
    reason: lexical_alternative
translation:
  language: ko
  text: 정결한[a] 자들에게는 모든 것이 정결합니다. 그러나 더럽혀지고 믿지 않는 자들에게는 정결한 것이 하나도 없고, 도리어 그들의 마음과 양심이 다 더럽혀져 있습니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「깨끗한」. 헬라어 καθαρός는 의식적 정결과 도덕적 순결의 두 어감을 함께 지닌다.
    reason: lexical_alternative
lexical_decisions:
- source_word: πάντα καθαρὰ τοῖς καθαροῖς
  english_pob_choice: All things are pure to the pure
  chosen_korean: 정결한 자들에게는 모든 것이 정결합니다
  alternatives_korean:
  - 깨끗한 자들에게는 모든 것이 깨끗합니다
  - 정한 자들에게는 모든 것이 정합니다
  lexicon: BDAG
  rationale: καθαρός는 의식적(레위기적) 정결과 도덕적 순결의 이중 의미. 본문 흐름이 음식 정결 논쟁(유대인의 규례)을 배경으로 함을 고려해 「정결」을 택한다. 각주로 「깨끗한」을 둔다.
- source_word: μεμιαμμένοις καὶ ἀπίστοις
  english_pob_choice: those who are defiled and unbelieving
  chosen_korean: 더럽혀지고 믿지 않는 자들
  alternatives_korean:
  - 오염되고 믿지 않는 자들
  - 부정해지고 불신하는 자들
  lexicon: BDAG
  rationale: μιαίνω 완료 수동(이미 더럽혀진 상태)을 「더럽혀지고」로 살린다. ἄπιστος는 「믿지 않는」.
- source_word: μεμίανται ... ὁ νοῦς καὶ ἡ συνείδησις
  english_pob_choice: their mind and their conscience are defiled
  chosen_korean: 마음과 양심이 다 더럽혀져 있습니다
  alternatives_korean:
  - 정신과 양심이 더럽혀져 있습니다
  - 생각과 양심이 오염되어 있습니다
  lexicon: BDAG
  rationale: νοῦς는 사고·이해의 능력. 「마음」이 한국어에서 자연스러우며, 양심과 짝지어 인격 전체의 부패를 드러낸다. 두 단어를 묶어 「다」로 강조한다.
