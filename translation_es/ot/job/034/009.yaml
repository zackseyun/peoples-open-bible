translation:
  language: es
  text: 'Porque él ha dicho[a]: «Un hombre no gana nada al deleitarse en Dios».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Un hombre no gana nada cuando Dios se deleita en él», o «Un hombre no gana nada al buscar el favor de Dios». La frase hebrea es compacta y permite más de una interpretación.'
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Puesto que
  lexicon: HALOT
  rationale: Introduce la razón o fundamento de la acusación de Eliú. «Porque» conserva el flujo argumentativo y es natural en español.
- source_word: אָמַר
  english_pob_choice: he has said
  chosen_spanish: ha dicho
  alternatives_spanish:
  - dijo
  lexicon: HALOT
  rationale: El perfecto compuesto en español comunica una afirmación ya hecha con relevancia actual en el argumento, como en el inglés auditado.
- source_word: לֹא יִסְכָּן
  english_pob_choice: gains nothing
  chosen_spanish: no gana nada
  alternatives_spanish:
  - no se beneficia
  - no aprovecha
  lexicon: HALOT
  rationale: El verbo expresa provecho, beneficio o ganancia. «No gana nada» mantiene la idea de ventaja sin forzar una explicación interpretativa.
- source_word: גָּבֶר
  english_pob_choice: A man
  chosen_spanish: Un hombre
  alternatives_spanish:
  - Una persona
  - Un ser humano
  lexicon: HALOT
  rationale: El sustantivo masculino funciona con valor genérico. «Un hombre» conserva esa forma gramatical y la referencia representativa.
- source_word: בִּרְצֹתוֹ
  english_pob_choice: by delighting himself
  chosen_spanish: al deleitarse
  alternatives_spanish:
  - al complacerse
  - al buscar su deleite
  lexicon: HALOT
  rationale: La forma compacta hebrea permite la idea de tomar placer o deleitarse. En español, «al deleitarse» reproduce bien la acción reflexiva implícita sin añadir contenido no asegurado por el hebreo.
- source_word: עִם אֱלֹהִים
  english_pob_choice: with God
  chosen_spanish: con Dios
  alternatives_spanish:
  - en relación con Dios
  - ante Dios
  lexicon: HALOT
  rationale: «Con Dios» conserva el valor básico de עִם y sigue de cerca la relación expresada en el hebreo, sin resolver de antemano la ambigüedad del sintagma.
theological_decisions:
- issue: Ambigüedad de בִּרְצֹתוֹ עִם אֱלֹהִים
  english_pob_reading: the verse states that a man gains nothing by delighting himself with God / taking pleasure in God
  chosen_spanish_reading: la frase se traduce de modo que un hombre no gana nada al deleitarse con Dios
  alternative_spanish_readings:
  - un hombre no gana nada cuando Dios se deleita en él
  - un hombre no gana nada al buscar el favor de Dios
  rationale: El hebreo es compacto y admite más de una lectura. La redacción principal sigue la lectura que toma el sujeto implícito como el hombre, pero no elimina las alternativas documentadas por la POB inglesa.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: No se registraron revisiones posteriores; el estado de alta concordancia se mantiene y no se requirieron cambios en el análisis base.
  spanish_consistency_notes:
  - Se usa «Dios» como equivalente de אֱלֹהִים, sin marcar ocultación del nombre divino porque el texto hebreo aquí no contiene el tetragrámaton.
  - Se conserva «hombre» para גָּבֶר por su valor genérico masculino, acorde con la decisión auditada en inglés.
  - La nota a pie de página preserva la ambigüedad lexical y teológica del sintagma hebreo sin cerrarla en una sola lectura.
