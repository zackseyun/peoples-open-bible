base_translation:
  language: en
  yaml_path: translation/ot/nehemiah/007/071.yaml
  text: And what the rest of the people gave was twenty thousand gold darics[a], two thousand minas of silver[c][b], and sixty-seven priests’ tunics.
  footnotes:
  - marker: a
    text: Or 'the remnant of the people gave.' Here 'the rest of the people' is chosen because the phrase functions administratively to distinguish the remaining populace from previously listed donors, not to make a theological point about a faithful remnant.
    reason: lexical_alternative
  - marker: b
    text: A daric was a Persian gold coin.
    reason: cultural_note
  - marker: c
    text: A mina was an ancient unit of weight, and by extension of monetary value.
    reason: cultural_note
