translation:
  language: es
  text: Con viento de oriente tú destrozas las naves de Tarsis[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O posiblemente, ‘naves que van a Tarsis’ o ‘naves de Tarsis’, una expresión que puede designar naves mercantes de alta mar asociadas con Tarsis.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּ/רוּחַ
  english_pob_choice: With ... wind
  chosen_spanish: Con ... viento
  alternatives_spanish:
  - Por ... viento
  - Mediante ... viento
  lexicon: HALOT
  rationale: רוּחַ aquí denota ‘viento’, no ‘espíritu’ ni ‘aliento’, por su combinación con קָדִים y la imagen marítima. En español, ‘con’ comunica de manera natural el medio o instrumento, sin forzar la sintaxis ni perder el valor instrumental del prefijo ב.
- source_word: קָדִים
  english_pob_choice: east
  chosen_spanish: de oriente
  alternatives_spanish:
  - oriental
  - del este
  lexicon: HALOT
  rationale: La expresión señala el viento del oriente. ‘De oriente’ es idiomático en español bíblico y conserva la referencia direccional sin agregar innecesariamente la palabra ‘viento’ dos veces.
- source_word: תְּשַׁבֵּר
  english_pob_choice: you shatter
  chosen_spanish: tú destrozas
  alternatives_spanish:
  - tú quiebras
  - tú rompes
  - tú haces pedazos
  lexicon: HALOT
  rationale: El piel de שבר expresa una acción intensiva y violenta. ‘Destrozas’ comunica mejor ese valor enfático que un simple ‘rompes’, y mantiene la dirección directa a Dios.
- source_word: אֳנִיּוֹת
  english_pob_choice: the ships
  chosen_spanish: las naves
  alternatives_spanish:
  - los barcos
  - los navíos
  - las embarcaciones
  lexicon: HALOT
  rationale: ‘Naves’ es un equivalente digno y natural para la poesía bíblica en español. Aunque ‘ships’ puede renderizarse como ‘barcos’, ‘naves’ conserva mejor el registro elevado del verso.
- source_word: תַּרְשִׁישׁ
  english_pob_choice: Tarshish
  chosen_spanish: Tarsis
  alternatives_spanish:
  - Tarshish
  lexicon: HALOT
  rationale: Como nombre propio, se translitera según uso bíblico en español. ‘Tarsis’ es la forma habitual en la tradición castellana y sigue siendo reconocible; el sentido de asociación mercante o de navegación queda explicado en la nota textual.
theological_decisions:
- issue: Addressee of the second-person verb
  english_pob_reading: Direct address to God ('you shatter')
  chosen_spanish_reading: Dirección directa a Dios ('tú destrozas')
  alternative_spanish_readings:
  - Enunciado impersonal ('se destrozan')
  - Referencia general a una fuerza natural
  rationale: El verbo hebreo está en segunda persona masculina singular y continúa la oración dirigida a Dios en el contexto del salmo. Mantener el ‘tú’ preserva la fuerza poética y el hilo de la alabanza sin suavizar la personificación divina.
  doctrine_reference: Salmo 48:8; continuidad del discurso en el salmo
- issue: Sentido de ‘ships of Tarshish’
  english_pob_reading: '''ships bound for Tarshish'' or ''Tarshish ships,'' a phrase that can denote seagoing merchant ships associated with Tarshish.'
  chosen_spanish_reading: ‘naves de Tarsis’ con posible valor de naves mercantes o de larga navegación asociadas con Tarsis
  alternative_spanish_readings:
  - ‘naves que van a Tarsis’
  - ‘naves tarshis’
  rationale: El hebreo permite tanto un genitivo de destino como un genitivo de asociación/tipo. El texto principal conserva la expresión tradicional sin decidir de más; la nota mantiene abierta la tensión semántica documentada por la POB inglesa.
  doctrine_reference: Uso poético y léxico de תַּרְשִׁישׁ
translation_notes:
  revision_awareness: La versión española se ajusta al pasaje hebreo y al auditorio poético del salmo. Se corrigió la validación anterior asegurando que la nota de alternativa esté anclada explícitamente en el texto mediante [a]. No se introdujeron cambios sustanciales respecto del sentido auditado por la POB inglesa.
  spanish_consistency_notes:
  - Se mantiene ‘Tarsis’ como forma española del nombre propio, coherente con el registro bíblico en español.
  - ‘Con viento de oriente’ conserva el valor instrumental del hebreo sin sobrecargar la frase.
  - ‘Destrozas’ refleja el matiz intensivo del piel de שבר sin perder legibilidad.
  - ‘Naves’ mantiene el tono poético y marítimo del verso.
