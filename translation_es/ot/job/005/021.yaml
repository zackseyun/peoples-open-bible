translation:
  language: es
  text: Del azote de la lengua[a] serás escondido, y no temerás la destrucción[b] cuando venga.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «el azote de la lengua», una metáfora de habla abusiva o difamatoria.'
    reason: lexical_alternative
  - marker: b
    text: También puede traducirse «devastación» o «ruina» en lugar de «destrucción».
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּשׁוֹט
  english_pob_choice: from the lash
  chosen_spanish: en el azote
  alternatives_spanish:
  - del azote
  - bajo el azote
  - ante el azote
  lexicon: HALOT
  rationale: שׁוֹט denota literalmente un látigo/azote. En español, "azote" conserva la imagen de golpe o castigo verbal sin sonar tan mecánico como "látigo" en esta construcción metafórica.
- source_word: לָשׁוֹן
  english_pob_choice: the tongue
  chosen_spanish: la lengua
  alternatives_spanish:
  - la lengua
  - la habla
  - el habla
  lexicon: HALOT
  rationale: Aunque el inglés POB preserva "the tongue", en español "la lengua" comunica la misma metonimia para el habla ofensiva de forma natural y reverente.
- source_word: תֵּחָבֵא
  english_pob_choice: you will be hidden
  chosen_spanish: te esconderás
  alternatives_spanish:
  - serás escondido
  - serás ocultado
  - te ocultarás
  lexicon: HALOT
  rationale: El nifal de חבא expresa ser ocultado/escondido. "Te esconderás" conserva la idea de quedar fuera del daño y suena natural en español bíblico moderno; la pasiva también sería posible, pero menos fluida.
- source_word: וְלֹא תִירָא
  english_pob_choice: and you will not fear
  chosen_spanish: y no temerás
  alternatives_spanish:
  - y no tendrás temor
  - y no tendrás miedo
  lexicon: HALOT
  rationale: 'La negación del imperfecto se vierte de manera directa con futuro: "no temerás". Mantiene el tono de promesa predictiva del hebreo.'
- source_word: מִשֹּׁד
  english_pob_choice: destruction
  chosen_spanish: la destrucción
  alternatives_spanish:
  - la devastación
  - la ruina
  lexicon: HALOT
  rationale: '"Destrucción" refleja bien שֹׁד como ruina violenta o desastre; las alternativas son posibles, pero esta es la más amplia y clara en español.'
- source_word: כִּי יָבֹוא
  english_pob_choice: when it comes
  chosen_spanish: cuando venga
  alternatives_spanish:
  - cuando llegue
  - al venir
  - cuando llegue el momento
  lexicon: HALOT
  rationale: Aquí כִּי es temporal. "Cuando venga" conserva el valor condicional-temporal del hebreo y suena natural en español.
translation_notes:
  revision_awareness: Se revisó el verso para asegurar que cada nota al pie tenga su marca visible en el texto. La redacción sigue de cerca el hebreo y el audit trail inglés, evitando una paráfrasis excesiva.
  spanish_consistency_notes:
  - Se mantuvo la imagen metafórica del "azote" asociado con la lengua, en paralelo al inglés POB.
  - Se prefirió "lengua" en lugar de "habla" para conservar la metonimia hebrea.
  - Se usó futuro predictivo en dos verbos para reflejar el tono de promesa del hebreo.
  - Las marcas de nota [a] y [b] aparecen exactamente donde corresponden en el texto principal.
