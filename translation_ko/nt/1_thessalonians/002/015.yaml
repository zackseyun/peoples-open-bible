id: 1TH.2.15
reference: 1 Thessalonians 2:15
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: τῶν καὶ τὸν κύριον ἀποκτεινάντων Ἰησοῦν καὶ ⸀τοὺς προφήτας καὶ ἡμᾶς ἐκδιωξάντων, καὶ θεῷ μὴ ἀρεσκόντων, καὶ πᾶσιν ἀνθρώποις ἐναντίων,
base_translation:
  language: en
  yaml_path: translation/nt/1_thessalonians/002/015.yaml
  text: who also killed the Lord Jesus and the prophets[a], and drove us out, and are not pleasing to God, and are hostile to all people[c][b],
  footnotes:
  - marker: a
    text: Or 'put to death the Lord Jesus.'
    reason: lexical_alternative
  - marker: b
    text: That is, they 'drove us out' or 'expelled us'; the verb is more specific than the broader idea of persecution.
    reason: lexical_alternative
  - marker: c
    text: This description grammatically continues the group identified in the previous verse; it should not be read as a blanket statement about all Jewish people in every time and place.
    reason: cultural_note
translation:
  language: ko
  text: 그들은 주 예수와 예언자들을 죽이고[a] 또 우리를 쫓아낸 자들[b]이며, 하나님을 기쁘시게 하지 못하고 모든 사람을 대적합니다[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「주 예수를 죽음에 넘긴 자들」.
    reason: lexical_alternative
  - marker: b
    text: 헬라어 동사는 「쫓아내다·추방하다」로, 일반적 「박해」보다 구체적이다.
    reason: lexical_alternative
  - marker: c
    text: 이 묘사는 문법적으로 앞 절에서 가리킨 박해 집단을 이어 가리키며, 모든 시대의 유대 민족 전체에 대한 포괄적 진술로 읽혀서는 안 된다.
    reason: cultural_note
lexical_decisions:
- source_word: τῶν ... ἀποκτεινάντων
  english_pob_choice: who ... killed
  chosen_korean: 그들은 ... 죽이고
  alternatives_korean:
  - ~한 자들 곧
  lexicon: BDAG
  rationale: 14절의 「유대인들」을 받는 분사 절. 한국어 합쇼체 흐름에서는 새 문장으로 시작하고 「그들은 ... 자들이며」로 묶는다.
- source_word: ἐκδιωξάντων
  english_pob_choice: drove us out
  chosen_korean: 쫓아낸 자들
  alternatives_korean:
  - 추방한 자들
  - 박해해 내쫓은 자들
  lexicon: BDAG
  rationale: ἐκδιώκω의 「쫓아내다」 의미를 「쫓아내다」로 옮긴다. 일반적 「박해」가 아닌 구체적 추방 행위.
- source_word: θεῷ μὴ ἀρεσκόντων
  english_pob_choice: are not pleasing to God
  chosen_korean: 하나님을 기쁘시게 하지 못하고
  alternatives_korean:
  - 하나님께 기쁨이 되지 못하고
  lexicon: BDAG
  rationale: 한국어 합쇼체 일관성. 「기쁘시게」 경어를 살린다.
- source_word: πᾶσιν ἀνθρώποις ἐναντίων
  english_pob_choice: are hostile to all people
  chosen_korean: 모든 사람을 대적합니다
  alternatives_korean:
  - 모든 사람에게 적대적입니다
  - 만인을 대적하는 자들입니다
  lexicon: BDAG
  rationale: ἐναντίος의 「대적·적대」 의미. 「대적하다」가 정형화되어 있다. 합쇼체 종결로 마무리.
