translation:
  language: es
  text: guiándolos por las profundidades[a] como un caballo por campo abierto; no tropezaron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por las aguas profundas». El hebreo dice «por las profundidades», evocando el cruce del éxodo.
    reason: lexical_alternative
lexical_decisions:
- source_word: מוֹלִיכָם
  english_pob_choice: leading them
  chosen_spanish: guiándolos
  alternatives_spanish:
  - llevándolos
  - conduciéndolos
  lexicon: HALOT
  rationale: El participio hifil de הלך expresa acción continua de hacer avanzar/conducir. «Guiándolos» conserva el valor participial y suena natural en español, sin perder la idea de conducción activa.
- source_word: בַּתְּהֹמוֹת
  english_pob_choice: through the depths
  chosen_spanish: por las profundidades
  alternatives_spanish:
  - a través de las profundidades
  - por los abismos
  - por las aguas profundas
  lexicon: HALOT
  rationale: «Profundidades» comunica היטב תְּהֹמוֹת y mantiene la amplitud del término sin forzar «mar» o «aguas» de manera explícita; el contexto del éxodo puede aportar la alusión.
- source_word: כַּסּוּס
  english_pob_choice: like a horse
  chosen_spanish: como un caballo
  alternatives_spanish:
  - como el caballo
  - como caballos
  lexicon: HALOT
  rationale: 'El singular comparativo se mantiene de forma natural en español con artículo indefinido: «como un caballo».'
- source_word: בַּמִּדְבָּר
  english_pob_choice: in the wilderness
  chosen_spanish: en el desierto
  alternatives_spanish:
  - en el desierto/ermas
  - en la estepa
  - en la tierra despoblada
  lexicon: HALOT
  rationale: «Desierto» es una equivalencia bíblica clara y fluida para מִדְבָּר en este símil; conserva la imagen de terreno abierto y de éxodo.
- source_word: יִכָּשֵׁלוּ
  english_pob_choice: they did not stumble
  chosen_spanish: no tropezaron
  alternatives_spanish:
  - no se tambalearon
  - no vacilaron
  - no tropezaban
  lexicon: HALOT
  rationale: El nifal de כשל significa «tropezar, tambalearse, fallar». «No tropezaron» reproduce bien la acción concreta y la negación directa del hebreo, sin añadir una cláusula de resultado.
theological_decisions:
- issue: Alusión al éxodo en las «profundidades»
  english_pob_reading: Render תְּהֹמוֹת as 'the depths' without over-interpreting it as a proper name or explicitly inserting 'sea.'
  chosen_spanish_reading: Traducir בַּתְּהֹמוֹת como «por las profundidades» sin insertar «mar» o «aguas» en el texto principal.
  alternative_spanish_readings:
  - por el mar
  - por las aguas profundas
  - por los abismos
  rationale: La palabra hebrea es más amplia que un término técnico para «mar». Mantener «profundidades» preserva la imagen y deja que el contexto del éxodo la complete, como en el texto inglés auditado.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: La revisión auditada corrigió el inglés de una cláusula de resultado a una afirmación directa («they did not stumble»). La versión española sigue esa decisión con «no tropezaron», sin introducir una finalidad explícita.
  spanish_consistency_notes:
  - Se mantuvo el símil en una sola oración breve, acorde con el paralelismo hebreo.
  - «Yahvé» no aparece aquí porque el versículo no contiene el Tetragrámaton; la referencia divina está implícita por el contexto inmediato, no por un lexema directo.
  - «Profundidades» conserva la ambigüedad controlada del hebreo y evita precisar innecesariamente el referente acuático.
