revisions:
- from: Mi alma está satisfecha como con grasa y riqueza[a], y mi boca te alaba con labios de cantos de júbilo[b].
  to: Mi alma está satisfecha como con grasa y abundancia[a], y mi boca te alaba con labios de cantos de júbilo[b].
  rationale: Se ajusta solo la primera imagen léxica para que el español preserve mejor la metáfora de saciedad alimentaria del hebreo sin introducir la connotación material de «riqueza». Se conserva la estructura del borrador, el presente poético y la explicitación contextual de «te». También se mejora levemente la alternativa de la nota a para mayor naturalidad en español.
