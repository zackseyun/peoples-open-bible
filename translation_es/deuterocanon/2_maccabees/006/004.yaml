translation:
  language: es
  text: Porque el santuario[a] estaba lleno de depravación y de fiestas desenfrenadas por parte de los gentiles, que insolentemente se divertían con prostitutas, acercándose a mujeres en los recintos sagrados[b], y aun introduciendo en su interior cosas impropias.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «templo». «Santuario» preserva mejor el sentido de espacio sagrado profanado en este contexto.
    reason: lexical_alternative
  - marker: b
    text: La expresión sugiere conducta sexual impropia en los espacios sagrados, aunque el griego es menos explícito que «teniendo relaciones con mujeres».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἱερὸν
  english_pob_choice: sanctuary
  chosen_spanish: santuario
  alternatives_spanish:
  - templo
  - lugar santo
  lexicon: LSJ
  rationale: «ἱερὸν» designa aquí el espacio sagrado del templo de Jerusalén profanado por conductas impuras. «Santuario» conserva el sentido cultual y funciona bien en español sin reducirlo a una sola parte arquitectónica.
- source_word: ἀσωτίας
  english_pob_choice: debauchery
  chosen_spanish: desenfreno
  alternatives_spanish:
  - libertinaje
  - depravación
  - disolución
  lexicon: LSJ
  rationale: El término expresa exceso moral desordenado. «Desenfreno» comunica bien la pérdida de freno ético y tiene un registro natural en español bíblico moderno.
- source_word: κώμων
  english_pob_choice: revelry
  chosen_spanish: desenfrenadas fiestas
  alternatives_spanish:
  - juerga
  - orgía
  - carcajadas y banquetes desenfrenados
  lexicon: LSJ
  rationale: El plural apunta a celebraciones tumultuosas y licenciosas. Opté por una expresión que conserve la idea de fiesta ruidosa e inmoral sin introducir un matiz más específico que el griego no exige.
- source_word: ἐθνῶν
  english_pob_choice: Gentiles
  chosen_spanish: los gentiles
  alternatives_spanish:
  - las naciones
  - los paganos
  lexicon: LSJ
  rationale: En este contexto judío, el contraste con el santuario es étnico-religioso. «Gentiles» es la correspondencia más precisa y evita cargar el texto con una valoración adicional.
- source_word: θρασυνόντων
  english_pob_choice: boldly sporting
  chosen_spanish: atrevidamente retozando
  alternatives_spanish:
  - comportándose insolentemente
  - osadamente divirtiéndose
  lexicon: LSJ
  rationale: El participio expresa audacia descarada. «Retozando» recoge la idea de conducta licenciosa y «atrevidamente» preserva el tono de insolencia con un español fluido.
- source_word: ἑταίρων
  english_pob_choice: prostitutes
  chosen_spanish: prostitutas
  alternatives_spanish:
  - cortesanas
  - compañeras
  lexicon: LSJ
  rationale: En este contexto, ἑταίρων apunta fuertemente a mujeres de compañía sexual; «prostitutas» es la opción más directa y coherente con la profanación descrita.
- source_word: ἐν τοῖς ἱεροῖς
  english_pob_choice: in the sacred precincts
  chosen_spanish: en los recintos sagrados
  alternatives_spanish:
  - en los lugares santos
  - en los patios del templo
  lexicon: LSJ
  rationale: El plural sugiere áreas sagradas del templo más que una sola cámara. «Recintos sagrados» mantiene esa amplitud espacial sin especificar de más.
- source_word: τερβόλων γυναιξὶ πλησιαζόντων
  english_pob_choice: approaching women
  chosen_spanish: acercándose a mujeres
  alternatives_spanish:
  - teniendo relaciones con mujeres
  - consintiendo con mujeres
  lexicon: LSJ
  rationale: El verbo conserva literalmente la idea de acercarse, aunque el contexto sugiere impropiedad sexual. «Acercándose a mujeres» respeta el grado de explicitud del griego y deja la implicación al contexto.
- source_word: τὰ μὴ καθήκοντα
  english_pob_choice: things that were not proper
  chosen_spanish: cosas que no eran convenientes
  alternatives_spanish:
  - cosas impropias
  - cosas no debidas
  - cosas que no convenían
  lexicon: LSJ
  rationale: La frase es amplia y no define con exactitud la naturaleza de lo introducido. «No eran convenientes» conserva la vaguedad deliberada del original sin estrecharlo a una categoría legal más fuerte que la del texto.
- source_word: ἔνδον εἰσφερόντων
  english_pob_choice: bringing inside
  chosen_spanish: introduciendo dentro
  alternatives_spanish:
  - metiendo adentro
  - llevando al interior
  lexicon: LSJ
  rationale: La idea central es la de llevar cosas al espacio interior sagrado. «Introduciendo dentro» mantiene la espacialidad y el tono formal del pasaje.
theological_decisions:
- issue: Cómo reflejar ἐθνῶν en un contexto de profanación cultual judía
  english_pob_reading: Gentiles
  chosen_spanish_reading: gentiles
  alternative_spanish_readings:
  - naciones
  - paganos
  rationale: El contraste del pasaje es entre el espacio santo y personas no judías que lo profanan. «Gentiles» preserva ese contraste sin añadir una censura que el término por sí solo no exige.
  doctrine_reference: Translation philosophy §1, §6
- issue: Grado de explicitud en πλησιαζόντων γυναιξί
  english_pob_reading: approaching women
  chosen_spanish_reading: acercándose a mujeres
  alternative_spanish_readings:
  - teniendo relaciones con mujeres
  - cometiendo actos sexuales con mujeres
  rationale: El contexto indica conducta sexual impropia, pero la expresión griega es menos explícita que un verbo sexual directo. La traducción principal conserva ese nivel de ambigüedad para no resolver más de lo que el texto dice.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: He tenido en cuenta la última revisión inglesa, que reemplazó «carousing» por «sporting» para acercarse más al matiz de conducta licenciosa. En español, «retozando» y «desenfrenadas fiestas» conservan ese matiz de acción desenfadada y sexualmente inapropiada sin volver el texto más explícito que el griego.
  spanish_consistency_notes:
  - Usé «gentiles» como equivalente constante de ἐθνῶν en contexto judío.
  - Elegí «santuario» para ἱερὸν, en línea con el uso POB de preservar el espacio sagrado.
  - Mantuve «acercándose a mujeres» para respetar la formulación menos explícita del participio griego.
  - «Cosas que no eran convenientes» conserva la amplitud del original sin precisar indebidamente la clase de profanación.
