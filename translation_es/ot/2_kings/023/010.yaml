revisions:
- from: Y contaminó Topet[a], que está en el Valle de Ben-hinom, para que ningún hombre[b] hiciera pasar por el fuego a su hijo o a su hija para Molec[c].
  to: Y él hizo impuro a Topet, que está en el Valle de Ben-hinom, para que ningún hombre[b] hiciera pasar por el fuego[a] a su hijo o a su hija a Molec[c].
  rationale: 'Se ajusta el texto para seguir más de cerca las decisiones documentadas del POB inglés y mejorar la naturalidad en español: ''hizo impuro'' refleja mejor טמא en contexto cultual que ''contaminó''; ''a Molec'' sigue la lectura principal ''to Molech''; y se restaura la nota cultural indispensable sobre el modismo ''hacer pasar por el fuego''. También se reorganizan las notas para que cada una corresponda claramente a su punto de anclaje en el texto.'
  reviewer_model: gpt-5.4
