review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del hebreo: conserva ''su Dios'', mantiene los dos verbos pedagógicos para וְיִסְּרוֹ / יוֹרֶנּוּ, y preserva la alternativa adverbial en nota. Sin embargo, ''en justicia'' suena poco natural en este contexto agrícola y en español puede sugerir una esfera ética/jurídica más que ''regla correcta/procedimiento debido'', que es precisamente la tensión semántica documentada en la auditoría inglesa.'
  spanish_quality_summary: El español es claro, pero 'Porque su Dios le instruye en justicia' resulta algo rígido y menos idiomático para lectores hispanos. 'Para lo correcto' o 'según lo debido' comunicaría mejor el valor práctico de לַמִּשְׁפָּט sin perder dignidad. La nota actual es útil, pero conviene alinear el texto principal con una expresión española más natural y dejar 'en justicia' como posibilidad semántica implícita, no como redacción principal forzada.
  glossary_alignment: 'No hay conflicto con los términos troncales del proyecto. ''Dios'' está bien para אֱלֹהָיו. No aparecen Yahvé/Mesías/etc. La decisión clave es contextual: לַמִּשְׁפָּט no exige el glosado habitual ''justicia'' si en español eso degrada la legibilidad y oscurece el sentido procedimental reconocido por la propia nota del POB.'
  issues:
  - severity: medium
    issue: La expresión 'en justicia' es poco natural en español en este contexto agrícola.
    rationale: Aunque la revisión inglesa volvió a una forma más literal, el hebreo לַמִּשְׁפָּט aquí admite con fuerza el sentido de 'según la regla correcta / apropiadamente'. En español, 'instruir en justicia' suele leerse como formación moral, no como enseñanza del método adecuado de cultivo.
  - severity: low
    issue: La nota alternativa está bien, pero el texto principal y la nota quedan tensionados de manera innecesaria.
    rationale: Si el cuerpo dice 'en justicia' y la nota explica que probablemente significa 'apropiadamente' o 'conforme al debido orden', el lector español recibe una frase principal menos clara que su propia nota aclaratoria.
  revised_spanish_text: Porque su Dios le instruye para lo correcto[a]; le enseña.
  revised_footnotes:
  - marker: a
    text: 'O: «Porque se le instruye en justicia»; o «Porque se le instruye apropiadamente». El hebreo לַמִּשְׁפָּט puede referirse a justicia/juicio, pero en este contexto también permite un sentido más adverbial o procedimental: «apropiadamente» o «conforme al debido orden».'
    reason: lexical_alternative
  revision_rationale: Se ajusta לַמִּשְׁפָּט a una formulación española más natural en contexto ('para lo correcto'), que preserva la idea de regla o procedimiento debido sin introducir una lectura moralizante poco idiomática. La nota conserva explícitamente la alternativa más literal 'en justicia' y el valor adverbial documentado en la auditoría inglesa.
