translation:
  language: es
  text: Él ciertamente saldrá llorando[a], llevando la semilla para sembrar; ciertamente entrará con gritos de alegría[b], llevando sus gavillas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «va por su camino llorando, llevando la bolsa de semilla»; la frase hebrea traducida aquí como «la semilla para sembrar» es difícil, y algunos la entienden de manera más concreta como una bolsa o provisión de semilla.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «con canto» o «con regocijo»; el término hebreo denota un grito o una expresión resonante de alegría.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָלוֹךְ יֵלֵךְ
  english_pob_choice: he surely goes out
  chosen_spanish: ciertamente saldrá
  alternatives_spanish:
  - saldrá sin falta
  - saldrá ciertamente
  - irá saliendo
  lexicon: HALOT
  rationale: La combinación de infinitivo absoluto + imperfecto intensifica la acción. En español, "ciertamente" comunica bien la fuerza enfática sin caer en una repetición forzada. "Saldrá" armoniza con el contraste posterior de "volverá" y conserva el movimiento agrícola hacia afuera.
- source_word: וּבָכֹה
  english_pob_choice: weeping
  chosen_spanish: llorando
  alternatives_spanish:
  - y llorando
  - mientras lloraba
  - en llanto
  lexicon: HALOT
  rationale: El valor adverbial del participio/infinitivo se expresa naturalmente en español con gerundio. "Llorando" mantiene la imagen del acto continuo y evita sobrerreformular el hebreo.
- source_word: נֹשֵׂא מֶשֶׁךְ הַזָּרַע
  english_pob_choice: carrying the seed for sowing
  chosen_spanish: llevando la semilla para sembrar
  alternatives_spanish:
  - llevando una bolsa de semilla
  - llevando la provisión de semilla
  - llevando la semilla de siembra
  lexicon: HALOT
  rationale: La expresión hebrea es difícil. La POB inglesa evita comprometerse con una concreción discutida y toma el sentido contextual de semilla destinada a la siembra. "La semilla para sembrar" conserva esa cautela y no introduce una bolsa u otro objeto no explicitado por el texto.
- source_word: בֹּא יָבֹא
  english_pob_choice: he will surely come in
  chosen_spanish: ciertamente volverá
  alternatives_spanish:
  - ciertamente entrará
  - volverá sin falta
  - vendrá con certeza
  lexicon: HALOT
  rationale: El hebreo repite la idea verbal para intensificarla. En español, "ciertamente volverá" expresa esa certeza y mantiene el paralelismo con el salir inicial. Se eligió "volverá" porque el contexto agrícola sugiere regreso desde el campo.
- source_word: בְרִנָּה
  english_pob_choice: with joyful shouting
  chosen_spanish: con gritos de alegría
  alternatives_spanish:
  - con canto alegre
  - con júbilo
  - con exclamaciones de alegría
  lexicon: HALOT
  rationale: La POB inglesa preserva el matiz audible y expresivo de רִנָּה. "Gritos de alegría" comunica ese clamor jubiloso mejor que "canto" o "rejojo", que pueden sonar más suaves de lo que el término hebreo permite.
- source_word: אֲלֻמֹּתָיו
  english_pob_choice: his sheaves
  chosen_spanish: sus gavillas
  alternatives_spanish:
  - sus manojos de grano
  - sus haces
  - sus gavillas de cereal
  lexicon: HALOT
  rationale: El sustantivo designa gavillas cosechadas. "Gavillas" es el equivalente agrícola preciso y natural en español; mantiene la imagen de la cosecha sin diluirla en una expresión más general.
theological_decisions:
- issue: Intensificación verbal por infinitivo absoluto + imperfecto
  english_pob_reading: '"surely" marks the emphatic force rather than a separate semantic item.'
  chosen_spanish_reading: '"ciertamente" traduce la fuerza enfática sin añadir una idea nueva.'
  alternative_spanish_readings:
  - '"sin falta"'
  - repetición verbal más literal
  rationale: El hebreo usa una construcción enfática, no un mero adverbio de modo. En español, un adverbio como "ciertamente" transmite la certeza/intensidad de manera idiomática y conserva el peso retórico del verso.
  doctrine_reference: Poética bíblica; equivalencia funcional de construcciones enfáticas
- issue: Sentido de בְרִנָּה como expresión audible de gozo
  english_pob_reading: '"joyful shouting" preserves the cry/ringing expression of joy.'
  chosen_spanish_reading: '"gritos de alegría" preserva el carácter audible y festivo.'
  alternative_spanish_readings:
  - '"con canto"'
  - '"con júbilo"'
  rationale: La POB inglesa advierte que el término denota un clamor o expresión resonante de gozo. En español, "gritos de alegría" retiene ese matiz sonoro mejor que un abstracto "júbilo", que puede sonar interior y menos expresivo.
  doctrine_reference: Poética hebrea; léxico de celebración comunitaria
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios, con alta concordancia entre los controles. Se mantuvo la solución de la POB inglesa para el segmento difícil מֶשֶׁךְ הַזָּרַע, evitando concretizaciones no atestiguadas, y se preservó el matiz audible de רִנָּה mediante una fórmula española natural.
  spanish_consistency_notes:
  - Se mantuvo "Yahvé" como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se eligió "gavillas" para אֲלֻמֹּתָיו por precisión agrícola y coherencia con el paralelismo del campo y la cosecha.
  - '"Llorando" y "gritos de alegría" conservan el paralelismo emocional y sonoro del verso.'
  - No se introdujo "Mesías", "Cristo" ni vocabulario doctrinal ajeno al contenido poético del versículo.
