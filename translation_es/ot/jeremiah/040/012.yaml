translation:
  language: es
  text: Entonces todos los judeanos[a] regresaron de todos los lugares donde habían sido expulsados[b], y llegaron a la tierra de Judá, a Gedalías en Mizpá, y recogieron vino y fruto de verano[c] en muy gran abundancia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «judíos». El hebreo puede designar al pueblo de Judá y, por extensión, a los judíos; aquí «judeanos» destaca mejor el marco histórico.
    reason: lexical_alternative
  - marker: b
    text: O «donde habían sido desterrados» o «dispersados». El verbo hebreo admite el sentido de ser echados fuera, desterrados o dispersados.
    reason: lexical_alternative
  - marker: c
    text: «Fruto de verano» alude a productos estacionales recogidos al final del verano o en tiempo de cosecha.
    reason: cultural_note
lexical_decisions:
- source_word: וַיָּשֻׁבוּ
  english_pob_choice: returned
  chosen_spanish: regresaron
  alternatives_spanish:
  - volvieron
  - retornaron
  lexicon: HALOT
  rationale: El verbo hebreo שוב expresa un regreso físico en secuencia narrativa. «Regresaron» suena natural en español moderno y conserva el sentido de volver a un lugar previo.
- source_word: כָל הַיְהוּדִים
  english_pob_choice: all the Judeans
  chosen_spanish: todos los judeanos
  alternatives_spanish:
  - todos los judíos
  lexicon: HALOT
  rationale: En este contexto histórico posdestrucción, el término señala a la gente de Judá. «Judeanos» preserva mejor el valor histórico-geográfico que «judíos», aunque esta última sigue siendo una alternativa posible.
- source_word: מִכָּל הַמְּקֹמוֹת
  english_pob_choice: from all the places
  chosen_spanish: de todos los lugares
  alternatives_spanish:
  - de todos los sitios
  lexicon: HALOT
  rationale: Es una frase locativa directa; «de todos los lugares» es claro, natural y fiel al hebreo.
- source_word: אֲשֶׁר נִדְּחוּ שָׁם
  english_pob_choice: where they had been driven
  chosen_spanish: donde habían sido dispersados
  alternatives_spanish:
  - donde habían sido expulsados
  - donde habían sido desterrados
  lexicon: HALOT
  rationale: נדח en nifal puede abarcar la idea de ser echados fuera o dispersados. «Dispersados» mantiene el matiz de desplazamiento forzado sin cargar demasiado una sola opción; el inglés POB ya documenta la alternativa «banished/scattered».
- source_word: וַיָּבֹאוּ אֶרֶץ יְהוּדָה
  english_pob_choice: they came to the land of Judah
  chosen_spanish: y llegaron a la tierra de Judá
  alternatives_spanish:
  - y entraron en la tierra de Judá
  - y vinieron a la tierra de Judá
  lexicon: HALOT
  rationale: בוא indica llegada o entrada. «Llegaron a» es idiomático en español y conserva el movimiento hacia el territorio.
- source_word: אֶל גְּדַלְיָהוּ הַמִּצְפָּתָה
  english_pob_choice: to Gedaliah at Mizpah
  chosen_spanish: a Gedalías en Mizpá
  alternatives_spanish:
  - junto a Gedalías en Mizpá
  - ante Gedalías en Mizpá
  lexicon: HALOT
  rationale: La frase sitúa a Gedalías en Mizpá; «en Mizpá» comunica con claridad la localización. «A» conserva la dirección del hebreo hacia él.
- source_word: וַיַּאַסְפ֛וּ
  english_pob_choice: gathered
  chosen_spanish: recogieron
  alternatives_spanish:
  - juntaron
  - acumularon
  lexicon: HALOT
  rationale: אסף tiene el sentido de recoger/juntar. Dado el objeto concreto (vino y fruto de verano), «recogieron» refleja bien la acción de reunir la cosecha.
- source_word: יַ֥יִן
  english_pob_choice: wine
  chosen_spanish: vino
  alternatives_spanish:
  - vino fermentado
  lexicon: HALOT
  rationale: Equivalencia directa y transparente para יין.
- source_word: וָקַיִץ
  english_pob_choice: summer fruit
  chosen_spanish: fruto de verano
  alternatives_spanish:
  - fruta de verano
  - productos de verano
  lexicon: HALOT
  rationale: קיץ se refiere al producto estacional de verano. «Fruto de verano» conserva la literalidad y sigue siendo comprensible en español; la nota aclara el sentido cultural de la cosecha.
- source_word: הַרְבֵּה מְאֹד
  english_pob_choice: a very great abundance
  chosen_spanish: en gran abundancia
  alternatives_spanish:
  - muchísimo
  - con abundancia muy grande
  lexicon: HALOT
  rationale: La intensificación hebrea requiere una expresión natural en español. «En gran abundancia» mantiene el valor cuantitativo; el adverbio «muy» queda implícito en la fuerza de la frase, pero la nota refleja que el hebreo es enfático.
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada para reflejar con más fuerza la intensificación de הַרְבֵּה מְאֹד mediante 'very great abundance'. La redacción española intenta conservar ese énfasis con 'en gran abundancia' y una nota explicativa sobre la fuerza intensiva del hebreo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el tetragrámaton por norma del proyecto, aunque este versículo no lo contiene.
  - Se usa «judeanos» para conservar el matiz histórico de Judá en contexto posexílico.
  - «Mizpá» se translitera de forma estable y sin adaptar el topónimo.
  - No se introduce terminología eclesiástica ajena al pasaje; la traducción permanece descriptiva y narrativa.
