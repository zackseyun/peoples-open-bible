review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura causal y el contraste del griego: οὐκ ἐν ζήλῳ ... ἀλλʼ ἐν ἐπιθυμίᾳ ψυχῆς. ''No actuaron'' reproduce adecuadamente ἐποίησαν en este contexto, ''celo'' preserva bien ζήλῳ, y ''el deseo de su alma'' mantiene la decisión auditada de conservar ψυχῆς con su peso semítico y registro salmódico.'
  spanish_quality_summary: 'El texto principal es claro y digno, pero la puntuación de la nota [a] es incorrecta: la alternativa literal debe corresponder a la segunda mitad de la cláusula griega, no empezar con ''sino'' tras ''más literalmente''. Además, conviene pulir levemente la redacción para que la nota no sugiera una coordinación inexistente. El resto del español es natural y legible.'
  glossary_alignment: No hay términos del glosario mayor en juego. 'Celo' para ζήλῳ y 'alma' para ψυχῆς están alineados con la justificación léxica documentada. 'Deseo' para ἐπιθυμίᾳ también corresponde bien al audit trail y evita intensificaciones indebidas.
  issues:
  - severity: medium
    issue: La nota [a] está mal formulada en español.
    rationale: 'El inglés dice: ''Or, more literally, "but in desire of soul" or "but in the desire of their soul."'' En español, ''O, más literalmente: «sino en deseo de alma»...'' mezcla la conjunción adversativa dentro de una glosa suelta y suena sintácticamente defectuoso. La nota debe presentar solo las alternativas fraseológicas pertinentes.'
  - severity: low
    issue: La decisión léxica sobre ψυχῆς cita erróneamente la elección inglesa previa.
    rationale: 'En el registro se afirma ''english_pob_choice: their own desire'' cuando la versión auditada final es ''the desire of their soul''. No obliga a cambiar el texto principal, pero muestra una desalineación documental menor.'
  revised_spanish_text: Porque no actuaron por celo[a], sino por el deseo de su alma[b],
  revised_footnotes:
  - marker: a
    text: 'O, más literalmente en toda la frase: «sino en deseo de alma» o «sino en el deseo de su alma».'
    reason: lexical_alternative
  - marker: b
    text: O, «por su propio deseo».
    reason: previous_rendering
  revision_rationale: Se mantiene el texto principal porque es fiel al griego y al audit trail inglés. Solo se corrige la nota [a] para que la alternativa literal quede expresada con español natural y precisión sintáctica, y se ajusta la razón de la nota [b] para reflejar que era una redacción previa preservada como alternativa.
