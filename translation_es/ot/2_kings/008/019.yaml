translation:
  language: es
  text: Sin embargo, Yahvé no quiso destruir a Judá, por amor de David, su siervo, tal como le había dicho[a] que le daría una lámpara para sus hijos[b] todos sus días.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «le había prometido». El hebreo dice literalmente «le había dicho», pero en este contexto de pacto esa palabra funciona como promesa.
    reason: lexical_alternative
  - marker: b
    text: «Lámpara» mantiene la imagen real/dinástica del hebreo para la continuidad de la línea de David; no se explicita en el texto principal como «dinastía» o «linaje».
    reason: theological_note
lexical_decisions:
- source_word: וְלֹא
  english_pob_choice: Yet ... not
  chosen_spanish: Sin embargo ... no
  alternatives_spanish:
  - Y no ...
  - Pero ... no
  lexicon: HALOT
  rationale: La conjunción con negación introduce contraste con el contexto de juicio anterior. «Sin embargo» conserva el giro adversativo sin sonar rígido en español.
- source_word: אָבָה
  english_pob_choice: was not willing
  chosen_spanish: no quiso
  alternatives_spanish:
  - no estuvo dispuesto
  - no consintió
  - no habría querido
  lexicon: HALOT
  rationale: El verbo expresa voluntad o disposición, no mera incapacidad. «No quiso» comunica bien esa intención divina en español natural y fiel.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Tetragrámaton: «Yahvé» preserva el nombre divino personal en lugar de sustituirlo por un título.'
- source_word: לְהַשְׁחִית
  english_pob_choice: to destroy
  chosen_spanish: destruir
  alternatives_spanish:
  - arruinar
  - aniquilar
  - llevar a la ruina
  lexicon: HALOT
  rationale: El infinitivo causativo de השחית aquí apunta a destrucción judicial. «Destruir» es claro y suficientemente fuerte en español.
- source_word: יְהוּדָה
  english_pob_choice: Judah
  chosen_spanish: Judá
  lexicon: HALOT
  rationale: Nombre propio del reino/pueblo, mantenido de forma estándar en español bíblico.
- source_word: לְמַעַן
  english_pob_choice: for the sake of
  chosen_spanish: por amor de
  alternatives_spanish:
  - por causa de
  - en atención a
  - a favor de
  lexicon: HALOT
  rationale: La preposición expresa consideración/motivo benevolente hacia David. «Por amor de» comunica bien la idea de favor concedido por consideración a David.
- source_word: דָּוִד עַבְדּוֹ
  english_pob_choice: David his servant
  chosen_spanish: David, su esclavo
  alternatives_spanish:
  - David, su siervo
  - David, su servidor
  lexicon: HALOT
  rationale: Se conserva la fuerza lexical de עֶבֶד con «esclavo», coherente con la política del proyecto cuando el inglés POB opta por la fuerza de «slave». El posesivo «su» se refiere a Yahvé.
- source_word: כַּאֲשֶׁר אָמַר לוֹ
  english_pob_choice: just as he had said to him
  chosen_spanish: tal como le había dicho
  alternatives_spanish:
  - justo como le había hablado
  - como le había prometido
  lexicon: HALOT
  rationale: «Dicho» reproduce con sobriedad אָמַר; se evita introducir «prometido» en el texto principal porque ese matiz está en la implicación contextual, no en la forma verbal misma.
- source_word: לָתֵת לוֹ
  english_pob_choice: that he would give him
  chosen_spanish: que le daría
  alternatives_spanish:
  - para darle
  - que le iba a dar
  lexicon: HALOT
  rationale: El infinitivo constructo con prefijo se vuelve naturalmente una subordinada en español. «Le daría» refleja la promesa futura contenida en el discurso.
- source_word: נִיר
  english_pob_choice: a lamp
  chosen_spanish: una lámpara
  alternatives_spanish:
  - una luz
  - una lámpara encendida
  lexicon: HALOT
  rationale: Se mantiene la imagen concreta de la dinastía davídica. «Lámpara» es la equivalencia más directa y conserva la metáfora real sin interpretarla en el texto principal.
- source_word: לְבָנָיו
  english_pob_choice: for his sons
  chosen_spanish: para sus hijos
  alternatives_spanish:
  - para sus hijos varones
  - para sus descendientes
  - para sus hijos
  lexicon: HALOT
  rationale: La revisión inglesa prefirió «for his sons» frente a una lectura más interpretativa. En español, «hijos» reproduce el parentesco referido por el posesivo y funciona naturalmente; el sentido dinástico queda sugerido por el contexto y por «lámpara».
- source_word: כָּל הַיָּמִים
  english_pob_choice: all the days
  chosen_spanish: todos los días
  alternatives_spanish:
  - siempre
  - por todos los días
  - para siempre
  lexicon: HALOT
  rationale: La expresión hebrea es literal. «Todos los días» preserva la formulación idiomática sin sobreinterpretarla como «para siempre».
theological_decisions:
- issue: Tetragrámaton en el texto principal
  english_pob_reading: the LORD
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Aunque el flujo auditado inglés usa «the LORD» por convención, la política española del proyecto pide transliterar el nombre divino como «Yahvé». Esto mantiene la transparencia del nombre personal revelado en el hebreo.
  doctrine_reference: 'Contested terms: יְהוָה YHWH'
- issue: 'Imagen de la promesa davídica: נִיר'
  english_pob_reading: a lamp
  chosen_spanish_reading: una lámpara
  alternative_spanish_readings:
  - una luz
  - una dinastía
  rationale: Se conserva la metáfora concreta en lugar de explicitarla como «dinastía». Eso respeta la intertextualidad con la promesa davídica y deja visible la imagen bíblica.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: עֶבֶד aplicado a David
  english_pob_reading: his servant
  chosen_spanish_reading: su esclavo
  alternative_spanish_readings:
  - su siervo
  - su servidor
  rationale: Dado que el proyecto indica usar «esclavo» cuando la fuerza léxica de δοῦλος/עֶבֶד debe preservarse, se mantiene el valor de dependencia y pertenencia, sin suavizarlo con el más eclesiástico «siervo».
  doctrine_reference: Project-level Spanish terminology defaults
translation_notes:
  revision_awareness: 'La redacción sigue la última revisión auditada del inglés en el punto crítico de לְבָנָיו: se refleja la preferencia por una relación más directa con «for his sons» y se evita la interpretación más libre «through his sons». También se conserva la decisión de mantener la metáfora de «lamp/lámpara» y el contraste adversativo inicial.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente con la terminología del proyecto para el Tetragrámaton.
  - Se usa «lámpara» para נִיר, manteniendo la imagen concreta y la continuidad con la línea davídica.
  - Se conserva «esclavo» para עֶבֶד conforme a la política de fuerza léxica, en lugar de suavizar a «siervo».
  - 'La sintaxis española evita calcos excesivos y conserva la estructura semántica del hebreo: negación divina, motivo davídico, cita de promesa y duración idiomática.'
