base_translation:
  language: en
  yaml_path: translation/deuterocanon/psalms_of_solomon/017/019.yaml
  text: They wandered in wildernesses[a], that their lives might be saved from evil, and in the eyes of the sojourning community[d][c][b], a life saved from among them was precious.
  footnotes:
