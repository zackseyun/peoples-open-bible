revisions:
- from: Han edificado los lugares altos de Tófet[a], que está en el valle de Ben-hinom, para quemar a sus hijos y a sus hijas en el fuego[b]—algo que yo no mandé, ni me subió al corazón[c].
  to: Han edificado los lugares altos de Tófet[a], que está en el valle de Ben-hinom, para quemar a sus hijos y a sus hijas en el fuego—algo que yo no mandé, ni subió a mi corazón[b].
  rationale: 'Se ajustó únicamente la cláusula final para lograr un español natural y fiel: ''ni subió a mi corazón'' conserva la imagen hebrea del corazón mejor que ''ni me subió al corazón''. También se eliminó una nota redundante sobre ''en el fuego'' y se pulió la redacción de la nota sobre ''Tófet''. No se requieren cambios doctrinales ni textuales mayores.'
