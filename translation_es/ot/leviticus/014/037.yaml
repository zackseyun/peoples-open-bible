review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido general del hebreo y del POB inglés: inspección sacerdotal, afección en las paredes, depresiones verdosas o rojizas, y criterio visual de hundimiento respecto de la pared. Sin embargo, la frase final «su apariencia es más baja que la pared» suena poco natural en español y no expresa con suficiente claridad el valor contextual de שָׁפָל מִן הַקִּיר, que en este contexto describe una apariencia hundida o más profunda que la superficie de la pared.'
  spanish_quality_summary: 'El español es mayormente claro y digno, pero presenta una torpeza importante en «su apariencia es más baja que la pared», que resulta extraña idiomáticamente. Además, el pronombre singular «su» después de «depresiones» puede percibirse como discordante o ambiguo; «su aspecto» funciona, pero conviene volver al plural posesivo para mayor fluidez: «su aspecto es más profundo que la pared» o equivalente. El resto del versículo es legible y fiel.'
  glossary_alignment: 'La terminología clave está en línea con las decisiones auditadas: נגע → «infección», שְׁקַעֲרוּרֹת → «depresiones», יְרַקְרַקֹּת/אֲדַמְדַּמֹּת → «verdosas/rojizas». No hay conflictos con el glosario maestro del proyecto. La principal mejora necesaria es contextual y estilística en la última cláusula, no terminológica.'
  issues:
  - severity: medium
    issue: La cláusula «su apariencia es más baja que la pared» es poco idiomática en español.
    rationale: Aunque refleja la literalidad de «más bajo que la pared», en español no se dice normalmente que una apariencia sea «más baja» que una pared. El sentido contextual, ya documentado por el POB inglés, es que las depresiones se ven hundidas/recesas por debajo de la superficie.
  - severity: medium
    issue: El singular «su apariencia» tras «depresiones» puede sentirse menos natural que una formulación plural o colectiva mejor integrada.
    rationale: El hebreo tiene «su apariencia» con referente plural femenino, pero en español la construcción queda más fluida con «su aspecto» y una redacción que explique el hundimiento de manera natural sin perder fidelidad.
  revised_spanish_text: Él examinará la infección[a], y si la infección en las paredes de la casa consiste en depresiones verdosas o rojizas, y su aspecto es más profundo que la pared[b],
  revised_footnotes:
  - marker: a
    text: O «depresiones» por «zonas hundidas».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «más bajo que la pared»; es decir, con apariencia de estar hundido por debajo de la superficie de la pared.
    reason: lexical_alternative
  revision_rationale: Se conserva la estructura y la terminología principal del borrador, pero se reemplaza «su apariencia es más baja que la pared» por «su aspecto es más profundo que la pared» para expresar en español natural el criterio visual de hundimiento que el contexto exige. También se ajusta levemente la nota para mantener la conexión con la literalidad hebrea y la explicación contextual.
