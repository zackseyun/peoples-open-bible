base_translation:
  language: en
  yaml_path: translation/ot/genesis/047/017.yaml
  text: So they brought their livestock to Joseph[a], and Joseph gave them bread in exchange for the horses, the flocks, the herds, and the donkeys[b]; and he provided for them with bread in exchange for all their livestock during that year.
  footnotes:
  - marker: a
    text: Or, more literally, 'and he led them with bread.' The Hebrew verb can mean 'lead, guide, manage,' but here likely refers to sustaining or supplying them through the famine.
    reason: lexical_alternative
  - marker: b
    text: Or 'in exchange for all their livestock'.
    reason: previous_rendering
