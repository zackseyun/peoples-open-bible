translation:
  language: es
  text: y el Mar[a], y los doce bueyes debajo del Mar;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el depósito, y los doce bueyes debajo del depósito». El hebreo usa «Mar» para el gran reservorio de agua.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַיָּם
  english_pob_choice: Sea
  chosen_spanish: Mar
  alternatives_spanish:
  - basín
  - vasija
  - Sea
  lexicon: HALOT
  rationale: En este contexto de mobiliario del templo, el término hebreo designa el gran depósito de agua de metal fundido. En español, «Mar» conserva la imagen literal y la función de objeto nombrado, mientras que «basín» o «vasija» explicitarían demasiado. Se evita «Sea» porque en español no funciona con naturalidad como nombre común de este objeto.
- source_word: הָאֶחָד
  english_pob_choice: the one
  chosen_spanish: el uno
  alternatives_spanish:
  - uno
  - el único
  lexicon: HALOT
  rationale: La expresión marcada con artículo distingue este recipiente singular dentro del inventario. «El uno» reproduce la definitud y el valor enumerativo sin convertirlo en «el único», que añadiría una idea no exigida por el hebreo.
- source_word: הַבָּקָר
  english_pob_choice: oxen
  chosen_spanish: bueyes
  alternatives_spanish:
  - toros
  - ganado
  lexicon: HALOT
  rationale: En el contexto arquitectónico, se trata de figuras o soportes bovinos. «Bueyes» es natural en español y mantiene la precisión sin sobrecargar el sexo del animal como haría «toros»; «ganado» sería demasiado general.
- source_word: שְׁנֵים עָשָׂר
  english_pob_choice: twelve
  chosen_spanish: doce
  alternatives_spanish:
  - doce
  lexicon: HALOT
  rationale: Número cardinal directo; no requiere expansión ni ajuste idiomático.
- source_word: תַּחַת
  english_pob_choice: under
  chosen_spanish: debajo de
  alternatives_spanish:
  - bajo
  - under
  lexicon: HALOT
  rationale: La preposición indica ubicación física de soporte. «Debajo de» expresa con claridad la relación espacial en un español natural y digno.
- source_word: וְאֶת
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - e
  lexicon: HALOT
  rationale: El hebreo repite la conjunción y la marca de objeto; en español se conserva la coordinación con «y». «E» no es necesaria porque la siguiente palabra comienza con consonante.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto hebreo y el audit trail inglés: conserva la conjunción inicial repetida, refleja el valor inventarial de «el uno», y mantiene el término técnico del gran reservorio sin eliminar la tensión léxica entre la imagen literal («Mar») y una glosa explicativa («depósito»).'
  spanish_consistency_notes:
  - Se usó «Mar» con mayúscula para reproducir el objeto nombrado del pasaje, de modo análogo al inglés POB «Sea».
  - Se evitó introducir «SEÑOR» u այլ terminología teológica ajena al versículo, porque el texto es puramente inventarial.
  - «Bueyes» mantiene la imagen bovina del soporte sin precisar indebidamente sexo o especie más allá del hebreo.
