id: PHP.3.11
reference: Philippians 3:11
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: εἴ πως καταντήσω εἰς τὴν ἐξανάστασιν ⸂τὴν ἐκ⸃ νεκρῶν.
base_translation:
  language: en
  yaml_path: translation/nt/philippians/003/011.yaml
  text: if somehow I may attain to the resurrection from the dead[a].
  footnotes:
  - marker: a
    text: Or more literally, 'the out-resurrection from among the dead.'
    reason: lexical_alternative
translation:
  language: ko
  text: 어떻게 해서든 죽은 자들 가운데서 일어나는 부활[a]에 이르려는 것입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 더 문자적으로는 「죽은 자들 가운데서의 일어나-부활」. 헬라어 ἐξανάστασις는 흔한 ἀνάστασις보다 강조형이며 「가운데서 일어남」을 부각한다.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἴ πως
  english_pob_choice: if somehow
  chosen_korean: 어떻게 해서든
  alternatives_korean:
  - 어떻게 해서라도
  - 혹시라도
  lexicon: BDAG
  rationale: 약속에 대한 의심이 아니라, 방법의 겸손한 미정을 표현한다. 「어떻게 해서든」이 그 함의를 자연스럽게 담는다.
- source_word: καταντήσω
  english_pob_choice: I may attain
  chosen_korean: 이르려는 것입니다
  alternatives_korean:
  - 다다르려는 것입니다
  - 도달하려는 것입니다
  lexicon: BDAG
  rationale: εἴ πως 다음의 아오리스트 가정법은 종말론적 목표에 다다름을 함의한다. 「이르다」가 영적 도달과 자연스럽게 어울리며, 「다다르다」는 다소 일상적이다.
- source_word: εἰς
  english_pob_choice: to
  chosen_korean: ~에
  alternatives_korean:
  - ~에까지
  - ~을 향하여
  lexicon: BDAG
  rationale: 「이르다」와 결합하는 자연스러운 한국어 「~에」.
- source_word: ἐξανάστασιν
  english_pob_choice: the resurrection
  chosen_korean: 일어나는 부활
  alternatives_korean:
  - 부활
  - 「밖으로」 일어남
  lexicon: BDAG
  rationale: 흔한 ἀνάστασις가 아닌 강조형 ἐξανάστασις. 본문은 「일어나는 부활」로 ἐξ-의 강조 함의를 살리고, 문자적 신조어는 각주에 둔다.
- source_word: τὴν ἐκ νεκρῶν
  english_pob_choice: from the dead
  chosen_korean: 죽은 자들 가운데서
  alternatives_korean:
  - 죽은 자들로부터
  - 죽은 자들 가운데서부터
  lexicon: BDAG
  rationale: ἐκ νεκρῶν는 「죽은 자들의 무리에서」의 함의가 강하다. 「가운데서」가 그 뉘앙스를 자연스럽게 살리며, 한국 성서 전통과도 일치한다.
theological_decisions:
- issue: ἐξανάστασις를 ἀνάστασις와 구별하여 신학적 차이(특별 부활)를 함의하는가
  chosen_reading: 본문은 「죽은 자들 가운데서 일어나는 부활」로 옮긴다.
  alternative_readings:
  - 「죽은 자들로부터의 별도 부활」
  - 「밖으로 일어남」
  rationale: 본 절은 분명히 죽은 자들 가운데서의 부활을 가리킨다. 그러나 강조형 ἐξανάστασις는 한국어 신조어를 요구하지 않으므로, 본문은 자연스러운 「일어나는 부활」로 풀고 강조 가능성은 각주에 둔다. 신학적 긴장을 과도하게 해소하지 않는다.
  doctrine_reference: 'Preserve theological tension rather than resolve it.'
