    text: Or 'with lies.' The Hebrew noun can be rendered 'falsehood' or more concretely 'lies.'
    reason: lexical_alternative
  - marker: b
    text: Or 'that he might live' / 'and live.' The Hebrew can be read more literally this way.
    reason: alternative_reading
