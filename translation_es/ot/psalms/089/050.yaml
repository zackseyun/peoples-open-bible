translation:
  language: es
  text: ¿Dónde están tus actos de amor leal[a] de antaño, Señor, que juraste a David en tu fidelidad[b]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tus antiguas misericordias» o «tus antiguos actos de amor leal». El hebreo tiene una forma plural, literalmente «tus amores leales de antaño».
    reason: lexical_alternative
  - marker: b
    text: O «por tu fidelidad». La frase puede expresar el modo o la base del juramento.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַיֵּה
  english_pob_choice: Where are
  chosen_spanish: ¿Dónde están
  alternatives_spanish:
  - ¿Dónde está
  - ¿En dónde están
  lexicon: HALOT
  rationale: La forma interrogativa pide una pregunta de localización/existencia. En español, el plural de la frase siguiente («actos») hace natural el plural verbal «están».
- source_word: חֲסָדֶיךָ
  english_pob_choice: your former acts of steadfast love
  chosen_spanish: tus actos de amor leal
  alternatives_spanish:
  - tus antiguas misericordias
  - tus antiguos actos de amor fiel
  - tus antiguas bondades
  lexicon: HALOT
  rationale: חֶסֶד expresa amor leal de pacto, bondad comprometida y fidelidad misericordiosa. En español, «amor leal» comunica ese campo semántico sin perder el matiz relacional; «actos» ayuda a reflejar el plural hebreo de acciones concretas.
- source_word: הָרִאשֹׁנִים
  english_pob_choice: former
  chosen_spanish: de antes
  alternatives_spanish:
  - primeros
  - antiguos
  - anteriores
  lexicon: HALOT
  rationale: En este lamento, el contraste es con la situación presente. «De antes» suena natural en español y conserva la referencia temporal al pasado sin endurecerla en un calco.
- source_word: אֲדֹנָי
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - mi Señor
  lexicon: HALOT
  rationale: Aquí el hebreo usa el título divino en vocativo. «Señor» es la equivalencia natural y reverente en español; «mi Señor» sería posible, pero no es necesario en esta invocación.
- source_word: נִשְׁבַּעְתָּ
  english_pob_choice: you swore
  chosen_spanish: juraste
  alternatives_spanish:
  - has jurado
  - hiciste juramento
  lexicon: HALOT
  rationale: El perfecto hebreo remite al juramento previo de Dios a David. «Juraste» es la forma más directa y solemne en español.
- source_word: לְדָוִד
  english_pob_choice: to David
  chosen_spanish: a David
  alternatives_spanish:
  - para David
  lexicon: HALOT
  rationale: La preposición marca el destinatario del juramento. «A David» es la equivalencia más clara y natural.
- source_word: בֶּאֱמוּנָתֶךָ
  english_pob_choice: in your faithfulness
  chosen_spanish: en tu fidelidad
  alternatives_spanish:
  - por tu fidelidad
  - según tu fidelidad
  - en tu verdad
  lexicon: HALOT
  rationale: אֱמוּנָה denota firmeza, fiabilidad y fidelidad. «Fidelidad» preserva bien el sentido pactal y la preposición «en» mantiene la ambigüedad respetando que puede indicar esfera o base del juramento.
theological_decisions:
- issue: Renderización de חֶסֶד en contexto de lamento pactal
  english_pob_reading: steadfast love
  chosen_spanish_reading: amor leal
  alternative_spanish_readings:
  - misericordia
  - amor constante
  - bondad leal
  rationale: El salmo apela a la lealtad de pacto de Yahvé. «Amor leal» evita reducir חֶסֶד solo a emoción o solo a clemencia y conserva la tensión entre amor, lealtad y compromiso pactal.
  doctrine_reference: Translation philosophy §6; consistency of key terms §5
- issue: Cómo reflejar el plural hebreo de חֲסָדֶיךָ
  english_pob_reading: acts of steadfast love
  chosen_spanish_reading: actos de amor leal
  alternative_spanish_readings:
  - misericordias
  - amor(es) leal(es)
  - actos de misericordia
  rationale: El plural hebreo apunta a manifestaciones concretas de fidelidad de Yahvé. «Actos de amor leal» comunica esa pluralidad sin forzar un plural poco idiomático como «amores leales».
  doctrine_reference: 'Translation philosophy: optimal equivalence; original-language primacy §1'
- issue: Valor de בֶּאֱמוּנָתֶךָ
  english_pob_reading: in your faithfulness / by your faithfulness
  chosen_spanish_reading: en tu fidelidad
  alternative_spanish_readings:
  - por tu fidelidad
  - con tu fidelidad
  rationale: La frase puede expresar modo, base o esfera del juramento. «En tu fidelidad» preserva esa amplitud y evita cerrar indebidamente la relación sintáctica.
  doctrine_reference: HALOT; Translation philosophy §2
translation_notes:
  revision_awareness: Se revisó el equilibrio entre la fuerza pactal de חֶסֶד y la naturalidad del español. Se optó por una solución que conserva el plural hebreo mediante «actos» y mantiene abierta la relación sintáctica de בֶּאֱמוּנָתֶךָ con «en tu fidelidad», en línea con el control de alta concordancia del audit trail inglés.
  spanish_consistency_notes:
  - Se usó «Yahvé» para el nombre divino solo cuando corresponde; aquí el vocativo es אֲדֹנָי, por lo que se tradujo «Señor».
  - Se mantuvo «fidelidad» para אֱמוּנָה, coherente con el término de pacto y fiabilidad divina en otros pasajes.
  - Se prefirió una construcción interrogativa y verbal natural en español sin perder el paralelismo con el hebreo.
