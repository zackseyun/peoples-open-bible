translation:
  language: es
  text: Sean muchos los que están en paz contigo, pero tu confidente[a], uno de entre mil.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: ''tus consejeros'' o ''tus asesores'' (οἱ δὲ σύμβουλοί σου), mientras que el hebreo dice literalmente ''el poseedor de tu secreto/consejo'', lo cual apoya el sentido más íntimo de ''confidente''.'
    reason: alternative_reading
lexical_decisions:
- source_word: אַנְשֵׁי שְׁלוֹמְךָ / οἱ εἰρηνεύοντές σοι
  english_pob_choice: those at peace with you
  chosen_spanish: los que están en paz contigo
  alternatives_spanish:
  - tus amigos
  - los hombres de tu paz
  - los que viven en paz contigo
  lexicon: HALOT; LXX οἱ εἰρηνεύοντές σοι
  rationale: La expresión hebrea literalmente significa personas de tu paz, y el griego confirma la idea relacional de estar en paz contigo. En español, 'los que están en paz contigo' conserva mejor el matiz de relación pacífica que 'amigos', sin perder naturalidad.
- source_word: יִהְיוּ רַבִּים
  english_pob_choice: be many
  chosen_spanish: Sean muchos
  alternatives_spanish:
  - Sean numerosos
  - Abunden
  lexicon: HALOT
  rationale: El hebreo expresa un deseo o exhortación. 'Sean muchos' reproduce bien ese valor jussivo y suena natural en español moderno.
- source_word: וּבַעַל סוֹדְךָ
  english_pob_choice: your confidant
  chosen_spanish: tu confidente
  alternatives_spanish:
  - el que comparte tu consejo
  - tu consejero íntimo
  - tu amigo de confianza
  lexicon: HALOT
  rationale: בעל סוד señala a quien tiene acceso a tu secreto o consejo íntimo. 'Confidente' comunica esa relación de confianza y cercanía personal mejor que 'consejero', que podría sonar más técnico y menos íntimo.
- source_word: אֶחַד מֵאָלֶף
  english_pob_choice: one out of a thousand
  chosen_spanish: uno entre mil
  alternatives_spanish:
  - uno de cada mil
  - uno de entre mil
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y expresa rareza extrema. 'Uno entre mil' es una formulación idiomática clara en español y mantiene la fuerza cuantitativa del original.
theological_decisions:
- issue: Tensión entre el hebreo íntimo ('בעל סוד') y el griego más explícito ('counselors/advisers')
  english_pob_reading: 'Greek: ''your counselors'' or ''your advisers'' ... Hebrew reads ''the possessor of your secret/counsel,'' supporting the more intimate sense ''confidant.'''
  chosen_spanish_reading: Se mantiene 'tu confidente' como lectura principal, con la nota de que el griego también puede entenderse como 'consejeros' o 'asesores'.
  alternative_spanish_readings:
  - tus consejeros
  - tus asesores
  - tu consejero íntimo
  rationale: La política del proyecto da primacía al hebreo conservado en Sirácides cuando existe, pero exige usar el griego como control real. Aquí ambos testigos coinciden en la rareza del acceso íntimo y del consejo valioso; el hebreo, sin embargo, añade la idea de secreto/confianza, por lo que 'confidente' conserva mejor la tensión documental que una simple normalización a 'consejero'.
  doctrine_reference: 'PHILOSOPHY.md: Hebrew Sirach is primary where it survives; Translation philosophy §1 original-language primacy'
translation_notes:
  revision_awareness: El pasaje coincide plenamente con la última revisión, que no requirió cambios. Se preserva la lectura hebrea primaria con la comprobación del paralelo griego, y no se introducen nuevas interpretaciones doctrinales.
  spanish_consistency_notes:
  - Se mantiene 'confidente' para בעל סוד, en línea con la decisión inglesa de preservar la intimidad del término.
  - '''Uno entre mil'' conserva la idiomaticidad y la rareza extrema del hebreo.'
  - La nota al pie refleja la variante semántica del hebreo y el griego sin desautorizar el texto principal.
