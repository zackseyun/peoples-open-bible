id: 1PE.1.6
reference: 1 Peter 1:6
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ἐν ᾧ ἀγαλλιᾶσθε, ὀλίγον ἄρτι εἰ δέον λυπηθέντες ἐν ποικίλοις πειρασμοῖς,
base_translation:
  language: en
  yaml_path: translation/nt/1_peter/001/006.yaml
  text: 'In this you rejoice, though now for a little while, if necessary, you have been grieved by various trials,'
translation:
  language: ko
  text: '이로 말미암아 여러분이 크게 기뻐합니다. 지금은 잠시 동안, 필요하다면, 여러 가지 시험들로 슬픔을 당했을지라도 그러합니다.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐν ᾧ
  english_pob_choice: In this
  chosen_korean: 이로 말미암아
  alternatives_korean:
  - 이 가운데
  - 그 안에서
  lexicon: BDAG
  rationale: 앞 절들 전체(구원·유업·보호)를 가리키는 지시로 보아 「이로 말미암아」가 자연스럽다. 「그 안에서」는 시간적 「때에」로도 읽힐 수 있어 모호하다.
- source_word: ἀγαλλιᾶσθε
  english_pob_choice: you rejoice
  chosen_korean: 크게 기뻐합니다
  alternatives_korean:
  - 즐거워합니다
  - 환희합니다
  lexicon: BDAG
  rationale: ἀγαλλιάομαι는 종말적·종교적 환희의 강한 어휘이므로 단순 「기뻐하다」보다 「크게 기뻐하다」가 적합하다.
- source_word: ὀλίγον ἄρτι
  english_pob_choice: now for a little while
  chosen_korean: 지금은 잠시 동안
  alternatives_korean:
  - 잠깐 동안 지금
  lexicon: BDAG
  rationale: 시간 부사구 두 개를 한국어 어순에 맞게 「지금은 잠시 동안」으로 결합한다.
- source_word: εἰ δέον
  english_pob_choice: if necessary
  chosen_korean: 필요하다면
  alternatives_korean:
  - 부득이하다면
  - 필요할 경우
  lexicon: BDAG
  rationale: 가정·임의를 나타내는 조건절을 평이하게 「필요하다면」으로 옮긴다.
- source_word: λυπηθέντες
  english_pob_choice: have been grieved
  chosen_korean: 슬픔을 당했을지라도
  alternatives_korean:
  - 근심하게 되었더라도
  lexicon: BDAG
  rationale: 부정 과거 수동분사. 「당했다」로 수동성을 살리고, 양보 어미 「~을지라도」로 ἀγαλλιᾶσθε와의 역접 관계를 드러낸다.
- source_word: ποικίλοις πειρασμοῖς
  english_pob_choice: various trials
  chosen_korean: 여러 가지 시험들
  alternatives_korean:
  - 갖가지 시련
  - 다양한 시련
  lexicon: BDAG
  rationale: πειρασμός는 「시험」으로 옮기되, 4:12와의 일관성을 위해 「시험」을 유지한다. 「시련」도 무방하나 한국 성서 전통상 「시험」이 우세하다.
