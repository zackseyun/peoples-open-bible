lexical_decisions:
- source_word: δικαιοσύνη
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  - justicia
  lexicon: BDAG
  rationale: El griego puede abarcar tanto la cualidad moral como la idea de justicia. Dado que el texto breve y sentencioso de Sabiduría permite conservar la amplitud semántica, 'justicia' comunica con naturalidad el valor ético y jurídico del término en español, mientras que la nota preserva la alternativa 'rectitud' como matiz posible.
- source_word: γάρ
  english_pob_choice: for
  chosen_spanish: Porque
  alternatives_spanish:
  - pues
  - porque
  - ya que
  lexicon: BDAG
  rationale: La partícula introduce la razón o fundamento de la afirmación anterior. 'Porque' funciona bien en español bíblico contemporáneo y mantiene el enlace lógico conciso.
- source_word: ἀθάνατος
  english_pob_choice: immortal
  chosen_spanish: inmortal
  alternatives_spanish:
  - imperecedera
  - no sujeta a muerte
  lexicon: BDAG
  rationale: '''Inmortal'' es el equivalente natural y directo en español para expresar que no está sujeta a muerte. Mantiene el tono proverbial del verso.'
- source_word: ἐστιν
  english_pob_choice: is
  chosen_spanish: es
  alternatives_spanish:
  - está
  lexicon: BDAG
  rationale: La cópula simple se expresa normalmente con 'es' en español; no requiere ampliación.
theological_decisions:
- issue: δικαιοσύνη y la alternativa justicia/righteousness
  english_pob_reading: righteousness
  chosen_spanish_reading: justicia
  alternative_spanish_readings:
  - rectitud
  - justicia
  rationale: Aunque el POB inglés eligió 'righteousness' como forma principal, en español 'justicia' es el término más idiomático para conservar el campo semántico de δικαιοσύνη. La nota preserva la alternativa 'rectitud' para no perder el matiz moral si se lee en clave más ética que forense.
  doctrine_reference: 'DOCTRINE.md — contested terms: δικαιοσύνη has overlapping moral/legal force; preserve alternative where relevant'
