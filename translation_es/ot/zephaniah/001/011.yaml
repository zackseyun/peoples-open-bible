base_translation:
  language: en
  yaml_path: translation/ot/zephaniah/001/011.yaml
  text: Wail[a], inhabitants of the Mortar, for all the merchant people are destroyed[b]; all who weigh out silver are cut off.
  footnotes:
  - marker: a
    text: Hebrew Maktesh, literally 'mortar'; likely the name of a market district in Jerusalem, perhaps so called because of its hollow shape or bustling trade.
    reason: alternative_reading
  - marker: b
    text: Or 'all the people of Canaan.' Here 'Canaan' is likely used in the sense of 'merchant(s),' a known Hebrew usage in commercial contexts.
    reason: lexical_alternative
