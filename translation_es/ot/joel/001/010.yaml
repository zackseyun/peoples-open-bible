  to: El campo está devastado; la tierra está de duelo[a], porque el grano está devastado, el mosto se ha secado y el aceite ha faltado[b].
  rationale: Se ajusta אָבְלָה a «está de duelo» para conservar mejor el matiz de luto personificado, y se reemplaza «ha desfallecido» por «ha faltado» para expresar de manera natural en español el fracaso o la carencia del aceite, preservando en nota la alternativa léxica vinculada a יִצְהָר y אֻמְלַל.
