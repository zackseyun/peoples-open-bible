- from: El rey hizo que la plata fuera tan común como las piedras en Jerusalén[a], y que los cedros fueran tan abundantes como los sicómoros en la llanura.
  to: El rey hizo que la plata fuera tan común como las piedras en Jerusalén, y que los cedros fueran tan abundantes como los sicómoros en las tierras bajas[a].
  rationale: Se movió la nota al sintagma que realmente traduce שְׁפֵלָה y se ajustó «la llanura» a «las tierras bajas» para reflejar mejor la región geográfica aludida, conservando el sentido del texto fuente y la intención de la nota inglesa.
