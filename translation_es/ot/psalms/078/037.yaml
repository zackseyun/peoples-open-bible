translation:
  language: es
  text: Su corazón no fue firme[a] con él, y no fueron fieles a su pacto[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «Su corazón no fue estable con él».
    reason: lexical_alternative
  - marker: b
    text: Lit., «no fueron fieles en su pacto»; el español idiomático aquí suele decir «fieles a su pacto».
    reason: lexical_alternative
lexical_decisions:
- source_word: לִבָּם
  english_pob_choice: their heart
  chosen_spanish: su corazón
  alternatives_spanish:
  - sus corazones
  - su interior
  - su mente
  lexicon: HALOT
  rationale: El sustantivo לב/לבב puede funcionar de manera colectiva para la disposición interior del pueblo. En español, el singular posesivo "su corazón" conserva bien esa fuerza colectiva y evita una traducción innecesariamente plural o explicativa.
- source_word: נָכוֹן
  english_pob_choice: steadfast
  chosen_spanish: fue firme
  alternatives_spanish:
  - estuvo firme
  - fue estable
  - fue constante
  lexicon: HALOT
  rationale: El contexto describe la falta de solidez o fidelidad del corazón ante Dios. "Firme" comunica con naturalidad esa idea de estabilidad relacional sin perder la tensión lexical entre firme/estable/correcto.
- source_word: עִמּוֹ
  english_pob_choice: with him
  chosen_spanish: con él
  alternatives_spanish:
  - ante él
  - hacia él
  lexicon: HALOT
  rationale: La preposición עִם expresa compañía o alineación relacional. "Con él" es la forma más directa y natural en español para mantener esa relación sin añadir matices no presentes en el hebreo.
- source_word: נֶאֶמְנוּ
  english_pob_choice: were not faithful
  chosen_spanish: no fueron fieles
  alternatives_spanish:
  - no permanecieron fieles
  - no fueron leales
  - no se mantuvieron firmes
  lexicon: HALOT
  rationale: El nifal de אמן aquí apunta a fidelidad o confiabilidad dentro del marco del pacto. "No fueron fieles" reproduce esa fuerza covenantal de manera idiomática y transparente en español.
- source_word: בִּבְרִיתוֹ
  english_pob_choice: to his covenant
  chosen_spanish: a su pacto
  alternatives_spanish:
  - en su pacto
  - con su pacto
  lexicon: HALOT
  rationale: Aunque la preposición hebrea es ב, el giro español natural con "fiel" es "a su pacto". "Pacto" preserva el valor covenantal de ברית y evita el peso confesional de alternativas más tradicionales sin base contextual adicional.
theological_decisions:
- issue: Fidelidad de pacto frente a creencia intelectual
  english_pob_reading: The verse describes Israel's lack of covenant loyalty rather than making a narrower statement about intellectual belief.
  chosen_spanish_reading: El versículo describe la falta de lealtad al pacto y la inestabilidad interior del pueblo, no una afirmación sobre mera opinión o aceptación mental.
  alternative_spanish_readings:
  - Podría leerse como una falta de constancia en el pacto.
  - 'Podría expresarse más literalmente: no fueron firmes en su pacto.'
  rationale: El paralelismo entre el corazón no firme y la infidelidad al pacto muestra una dimensión relacional y moral. Mantener "fieles" y "pacto" conserva ese énfasis sin introducir categorías doctrinales ajenas al texto.
  doctrine_reference: Translation philosophy §3, §5
translation_notes:
  revision_awareness: Se revisó la concordancia con el hebreo y con el audit trail inglés. Se evitó una calca de la preposición בִּבְרִיתוֹ y se conservó el paralelismo semántico entre la firmeza del corazón y la fidelidad al pacto. La redacción final integra ambas notas alternativas con anclajes visibles en el texto.
  spanish_consistency_notes:
  - Se usa «Dios»/«Yahvé» según corresponda; aquí el referente pronominal «él» sigue el contexto inmediato de Dios.
  - «Pacto» se mantiene como término técnico para ברית, consistente con el registro bíblico y la audición lexical del POB.
  - La forma singular «su corazón» conserva el sentido colectivo hebreo sin perder naturalidad en español.
