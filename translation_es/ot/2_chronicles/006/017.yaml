translation:
  language: es
  text: Ahora, Yahvé, Dios de Israel, sea confirmada tu palabra[a] que hablaste a tu siervo David.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «se establezca tu promesa» o «tu palabra resulte verdadera».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Y ahora
  lexicon: HALOT
  rationale: Marca transicional temporal y discursiva. En español, 'Ahora' fluye con naturalidad en una oración petitoria sin añadir un matiz innecesario.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino del Tetragrámaton como 'Yahvé', según la política del proyecto para el texto principal; 'Jehová' es una variante tradicional pero menos alineada con la transliteración preferida.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: God of Israel
  chosen_spanish: Dios de Israel
  lexicon: HALOT
  rationale: Construcción posesiva/covenantal directa y transparente. 'Dios de Israel' comunica con claridad la identificación pactal sin sobreexplicar.
- source_word: יֵאָמֵן
  english_pob_choice: be confirmed
  chosen_spanish: confirma
  alternatives_spanish:
  - sea confirmado
  - quede confirmado
  - se establezca
  lexicon: HALOT
  rationale: El nifal de אמן expresa que la palabra sea hecha firme/validada. En español, el imperativo petitorio 'confirma' reproduce bien el valor de súplica sin perder la idea de firmeza o validación. Se preserva así la tensión entre 'confirmación' y 'establecimiento'.
- source_word: דְּבָרְךָ
  english_pob_choice: your word
  chosen_spanish: tu palabra
  alternatives_spanish:
  - tu promesa
  lexicon: HALOT
  rationale: Se mantiene 'palabra' para respetar el término hebreo y dejar que el contexto del versículo muestre que se trata de la palabra prometida a David. 'Promesa' es posible, pero interpreta más de lo que el sustantivo dice.
- source_word: אֲשֶׁר דִּבַּרְתָּ
  english_pob_choice: that you spoke
  chosen_spanish: que has hablado
  alternatives_spanish:
  - que hablaste
  - que dijiste
  lexicon: HALOT
  rationale: '''Has hablado'' conserva la relación verbal con ''palabra'' y suena natural en español. El perfecto compuesto funciona bien como palabra dada con vigencia presente en la plegaria.'
- source_word: לְעַבְדְּךָ
  english_pob_choice: to your servant
  chosen_spanish: a tu siervo
  alternatives_spanish:
  - a tu esclavo
  - para tu siervo
  lexicon: HALOT
  rationale: En este contexto real-covenantal, 'siervo' es el equivalente español más natural y fiel para עבד. 'Esclavo' sería demasiado fuerte y no refleja bien la dignidad del destinatario en la súplica.
- source_word: לְדָוִיד
  english_pob_choice: David
  chosen_spanish: David
  lexicon: HALOT
  rationale: Nombre propio conservado según convención estándar.
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  rationale: La línea editorial del proyecto exige preservar el nombre divino, no sustituirlo por un título. 'Yahvé' mantiene la referencia al Tetragrámaton en español y evita la máscara litúrgica 'SEÑOR'.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: How to render יֵאָמֵן in a prayer context
  english_pob_reading: be confirmed
  chosen_spanish_reading: confirma
  alternative_spanish_readings:
  - sea confirmado
  - se establezca
  - quede confirmado
  rationale: El hebreo presenta una súplica para que la palabra divina resulte firme y cumplida. 'Confirma' comunica esa petición de manera idiomática en español y conserva la fuerza performativa de la oración.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §1, §5'
- issue: Whether דְּבָרְךָ should be made explicit as 'promesa'
  english_pob_reading: your word
  chosen_spanish_reading: tu palabra
  alternative_spanish_readings:
  - tu promesa
  rationale: Se prefiere 'tu palabra' para no resolver de antemano una equivalencia interpretativa. El versículo mismo, por su referencia a lo dicho a David, aporta el sentido promesal sin necesidad de sustituir el sustantivo hebreo.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §1, §5'
translation_notes:
  revision_awareness: 'Coincide con la última revisión aprobada: no se requirieron cambios sustantivos respecto del análisis anterior. Se mantuvo la equivalencia óptima del inglés auditado, ajustada a un español natural y fiel al hebreo.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' consistentemente para יְהוָה, conforme a la política del proyecto.
  - '''Siervo'' se conserva en el registro real-covenantal de la petición; no se reemplaza por ''esclavo'' porque el contexto no lo exige.'
  - '''Palabra'' se mantiene frente a ''promesa'' para preservar la tensión lexical documentada entre el sustantivo hebreo y su cumplimiento implícito.'
