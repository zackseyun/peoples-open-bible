  rationale: Se corrige únicamente la expresión «te dará a luz un hijo» por «te dará un hijo» para lograr un español natural y fiel al sentido del hebreo. Se conserva el resto, incluyendo la fuerza correctiva de «No, sino que», la fórmula de nombramiento y el lenguaje de pacto.
