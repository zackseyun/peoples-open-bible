translation:
  language: es
  text: Porque el júbilo de los impíos es breve[a], y el gozo del impío dura solo un momento.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el gozo del hipócrita dura solo un momento». El hebreo חָנֵף puede significar «hipócrita», pero aquí «impío» refleja mejor el sentido más amplio de una persona irreligiosa o sin temor de Dios en Job.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  - Pues que
  lexicon: HALOT
  rationale: En este contexto introduce la explicación o fundamento de la afirmación anterior; «Porque» conserva bien ese valor causal/explanatorio en español natural.
- source_word: רִנְנַת
  english_pob_choice: rejoicing
  chosen_spanish: júbilo
  alternatives_spanish:
  - regocijo
  - gozo
  - clamor de alegría
  lexicon: HALOT
  rationale: El sustantivo denota una expresión de alegría; «júbilo» es idiomático en español y mantiene el matiz de exuberancia sin volver la frase demasiado literal.
- source_word: רְשָׁעִים
  english_pob_choice: the wicked
  chosen_spanish: los impíos
  alternatives_spanish:
  - los malvados
  - los malhechores
  - los injustos
  lexicon: HALOT
  rationale: «Impíos» reproduce el valor moral-religioso de רְשָׁעִים en literatura sapiencial de forma natural y elevada en español.
- source_word: מִקָּרוֹב
  english_pob_choice: is brief
  chosen_spanish: es breve
  alternatives_spanish:
  - es corto
  - dura poco
  - es de corta duración
  lexicon: HALOT
  rationale: Aquí la expresión hebrea es idiomática y comunica brevedad temporal, no proximidad espacial; «es breve» refleja bien esa fuerza.
- source_word: וְשִׂמְחַת
  english_pob_choice: and the joy of
  chosen_spanish: y el gozo de
  alternatives_spanish:
  - y la alegría de
  - y el júbilo de
  lexicon: HALOT
  rationale: La construcción en paralelo pide un término coordinado con el primero; «gozo» mantiene el tono poético y evita repetir exactamente la misma raíz léxica.
- source_word: חָנֵף
  english_pob_choice: the godless
  chosen_spanish: sin Dios
  alternatives_spanish:
  - impío
  - hipócrita
  - profano
  lexicon: HALOT
  rationale: El audit trail indica que en Job el término suele ir más allá de «hipócrita» y apunta a una persona irreligiosa. «Sin Dios» preserva esa amplitud y la tensión lexical entre la lectura tradicional y la contextual.
- source_word: עֲדֵי רָגַע
  english_pob_choice: lasts only a moment
  chosen_spanish: dura solo un momento
  alternatives_spanish:
  - perdura apenas un instante
  - dura apenas un momento
  - se extiende solo por un instante
  lexicon: HALOT
  rationale: La preposición y el sustantivo juntos expresan límite temporal mínimo; «dura solo un momento» traduce con claridad la brevedad extrema del final.
theological_decisions:
- issue: 'Sentido de חָנֵף en Job: «hipócrita» vs. «sin Dios»/«impío»'
  english_pob_reading: Though often rendered 'hypocrite' in older translations, in Job the term commonly carries the broader sense of irreligious or godless person rather than merely one who pretends piety. 'The godless' best fits the semantic range and parallelism with 'the wicked'.
  chosen_spanish_reading: En el texto principal se refleja como «sin Dios», con nota alternativa para «hipócrita» implícita en el uso histórico.
  alternative_spanish_readings:
  - el hipócrita
  - el impío
  - el profano
  rationale: La decisión mantiene la amplitud semántica señalada por el audit trail y evita reducir indebidamente el término a mera simulación religiosa. «Sin Dios» comunica bien la irreligiosidad de fondo y preserva el paralelismo con «los impíos».
  doctrine_reference: Job 20:5; lexical note on חָנֵף in Job
- issue: Valor temporal de מִקָּרוֹב
  english_pob_reading: is brief
  chosen_spanish_reading: es breve
  alternative_spanish_readings:
  - está cerca
  - es de corta duración
  - es breve de tiempo
  rationale: El hebreo no describe proximidad espacial sino brevedad temporal. La traducción elegida evita una lectura engañosa y conserva la fuerza sapiencial del verso.
  doctrine_reference: Job 20:5
translation_notes:
  revision_awareness: 'Se siguió el estado más reciente sin cambios sustanciales: el análisis crítico coincide en alto grado con la lectura inglesa aprobada y no hubo revisiones aplicadas. La formulación española conserva la brevedad poética y la tensión léxica principal en חָנֵף.'
  spanish_consistency_notes:
  - Se usó «Dios» y no un sustituto reverencial, conforme a la terminología del proyecto.
  - Se eligió «impíos» para רְשָׁעִים y «sin Dios» para חָנֵף para mantener el paralelo sin fusionar ambos términos.
  - '«Breve» y «dura solo un momento» reflejan dos miembros poéticos distintos: la cualidad general y la duración específica.'
  - Se evitó «SEÑOR» porque no aparece el Tetragrámaton ni una cita directa del nombre divino en este versículo.
