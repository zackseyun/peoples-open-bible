translation:
  language: es
  text: Yahvé hirió a los cusitas[a] ante Asa y ante Judá, y los cusitas huyeron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los etíopes». El etnónimo hebreo es «cusitas».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּגֹּף
  english_pob_choice: struck down
  chosen_spanish: derrotó
  alternatives_spanish:
  - hirió
  - golpeó
  - venció
  lexicon: HALOT
  rationale: En un informe militar, נָגַף expresa la acción efectiva de Dios contra un enemigo. «Derrotó» comunica el resultado bélico de manera natural en español y evita un calco demasiado físico o arcaizante, aunque pierde algo de la imagen de «golpear».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'El hebreo usa el nombre propio divino יְהוָה, no un título. Siguiendo el criterio del proyecto, se mantiene la transliteración del nombre en español: «Yahvé», preservando el valor onomástico y evitando la sustitución por un título.'
- source_word: הַכּוּשִׁים
  english_pob_choice: the Cushites
  chosen_spanish: los cusitas
  alternatives_spanish:
  - los etíopes
  - los cushitas
  lexicon: HALOT
  rationale: «Cusitas» reproduce más directamente el etnónimo hebreo כּוּשִׁים y conserva la referencia histórica del texto. «Etíopes» es una equivalencia tradicional, pero introduce una identificación geográfica más interpretativa.
- source_word: לִפְנֵי
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - ante
  - en presencia de
  lexicon: HALOT
  rationale: 'En este contexto de batalla, לִפְנֵי tiene sentido espacial y narrativo: «delante de» suena natural en español y mantiene la idea de confrontación frontal.'
- source_word: אָסָא
  english_pob_choice: Asa
  chosen_spanish: Asa
  lexicon: transliteration
  rationale: Nombre propio estándar en español bíblico; no requiere adaptación.
- source_word: יְהוּדָה
  english_pob_choice: Judah
  chosen_spanish: Judá
  alternatives_spanish:
  - Judah
  lexicon: transliteration
  rationale: 'Se mantiene la forma española usual del nombre del reino/pueblo: «Judá».'
- source_word: וַיָּנֻסוּ
  english_pob_choice: fled
  chosen_spanish: huyeron
  alternatives_spanish:
  - fueron puestos en fuga
  - escaparon
  lexicon: HALOT
  rationale: נוּס significa huir o ponerse en fuga. «Huyeron» es la opción más directa y natural en narrativa española, conservando el movimiento de retirada bajo derrota.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo emplea el Tetragrámaton. La política del proyecto pide mantener el nombre propio en la forma «Yahvé», lo que preserva la lectura teológica y filológica sin sustituirla por un título litúrgico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Identificación de הַכּוּשִׁים
  english_pob_reading: the Cushites
  chosen_spanish_reading: los cusitas
  alternative_spanish_readings:
  - los etíopes
  - los cushitas
  rationale: 'La decisión sigue el audit trail inglés: el etnónimo hebreo se conserva de forma más directa. En español, «cusitas» evita una lectura anacrónica o demasiado geográfica de «etíopes», aunque esta siga siendo una posible asociación histórica.'
  doctrine_reference: Lexical/theological consistency for ethnonyms
translation_notes:
  revision_awareness: La revisión más reciente del inglés no introdujo cambios; el texto quedó confirmado como estable. La versión española sigue esa lectura alta de concordancia y mantiene sin ampliar el alcance semántico del original.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para יְהוָה, conforme a la terminología del proyecto.
  - «Cusitas» conserva el etnónimo y evita reemplazarlo automáticamente por un gentilicio tradicional distinto.
  - La preposición «delante de» reproduce el valor narrativo de לִפְנֵי en un contexto bélico sin añadir explicaciones.
  - «Huyeron» conserva la simplicidad verbal del cierre narrativo y su sentido de derrota y fuga.
