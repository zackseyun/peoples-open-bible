translation:
  language: es
  text: Ahora bien, todos los demás estaban en la cena.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «estaban allí para la comida» o «estaban en la comida». El griego es breve y funciona como una transición contextual.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ μὲν οὖν ἄλλοι πάντες
  english_pob_choice: all the others
  chosen_spanish: todos los demás
  alternatives_spanish:
  - todos los otros
  - el resto
  lexicon: LSJ
  rationale: La combinación de ἄλλοι con πάντες expresa al grupo restante en su totalidad. En español, 'todos los demás' conserva esa amplitud sin sonar forzado y mantiene el valor inclusivo del original.
- source_word: μὲν οὖν
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Pues
  - Entonces
  - Ahora bien
  lexicon: LSJ
  rationale: La partícula en este contexto es transicional y marca continuidad discursiva más que inferencia fuerte. 'Ahora' funciona como equivalente natural y breve en español.
- source_word: ἐπὶ τὸ δεῖπνον
  english_pob_choice: at the dinner
  chosen_spanish: en la cena
  alternatives_spanish:
  - para la cena
  - en el banquete
  - en la comida
  lexicon: LSJ
  rationale: δεῖπνον nombra la comida principal; con ἐπί + acusativo aquí, el sentido es estar presente en o para la comida. 'En la cena' preserva la situación concreta y evita un giro demasiado interpretativo.
- source_word: ἦσαν
  english_pob_choice: were
  chosen_spanish: estaban
  alternatives_spanish:
  - eran
  - se hallaban
  lexicon: LSJ
  rationale: El imperfecto de εἰμί se expresa de manera directa con 'estaban'. Es una solución natural en español que conserva la simple referencia a estado o presencia sin añadir más de lo que dice el griego.
translation_notes:
  revision_awareness: El texto griego es muy breve y el audit trail inglés no introduce cambios sustanciales; se mantiene la lectura de transición contextual y la equivalencia óptima sin ampliar indebidamente el verbo de estado.
  spanish_consistency_notes:
  - Se prefirió 'cena' para δεῖπνον siguiendo el valor contextual de comida principal, en línea con el audit trail inglés.
  - Se evitó traducir μὲν οὖν con una inferencia fuerte como 'por lo tanto', porque el griego aquí solo marca transición.
  - La nota al pie preserva las alternativas de presencia/ubicación que el inglés documenta para ἐπὶ τὸ δεῖπνον.
