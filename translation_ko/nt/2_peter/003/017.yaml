source:
  edition: SBLGNT
  text: ὑμεῖς οὖν, ἀγαπητοί, προγινώσκοντες φυλάσσεσθε ἵνα μὴ τῇ τῶν ἀθέσμων πλάνῃ συναπαχθέντες ἐκπέσητε τοῦ ἰδίου στηριγμοῦ,
base_translation:
  language: en
  yaml_path: translation/nt/2_peter/003/017.yaml
  text: Therefore[a], you, beloved, knowing this beforehand, guard yourselves so that, being carried away by the error of the lawless[b], you may not fall from your own stability.
  footnotes:
  - marker: a
    text: Or 'your own steadfastness.' The Greek στηριγμός can denote firmness, stability, or steadfastness.
    reason: lexical_alternative
  - marker: b
    text: '''Fall from'' could also be rendered ''fall away from,'' but the main text avoids making the warning more theologically specific than the Greek requires.'
    reason: alternative_reading
translation:
  language: ko
  text: 그러므로 사랑하는 자들이여, 여러분은 이것을 미리 알고 있으니, 무법한 자들의 미혹에 함께 휩쓸려 여러분 자신의 굳건함에서 떨어지지 않도록 스스로 지키십시오.
  philosophy: optimal-equivalence
