translation:
  language: es
  text: Entre los Treinta, él era en verdad honrado, pero no llegó a los Tres[a]; y David lo puso sobre su guardia personal[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no llegó a los Tres». El hebreo dice literalmente «no vino a los Tres», donde «venir a» funciona idiomáticamente para alcanzar su rango.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «sobre su guardia» o «sobre los que estaban bajo su mando». El término hebreo puede abarcar más ampliamente una guardia o una unidad bajo la autoridad de David.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִן הַשְּׁלוֹשִׁים
  english_pob_choice: Among the Thirty
  chosen_spanish: Entre los Treinta
  alternatives_spanish:
  - Más que los Treinta
  - De entre los Treinta
  lexicon: HALOT
  rationale: El מִן partitivo/comparativo expresa pertenencia o ubicación dentro de un grupo distinguido. «Entre los Treinta» conserva esa relación de rango de manera natural en español y refleja el paralelismo con «los Tres».
- source_word: הִנּוֹ
  english_pob_choice: indeed
  chosen_spanish: en verdad
  alternatives_spanish:
  - ciertamente
  - de hecho
  lexicon: HALOT
  rationale: La partícula añade énfasis. «En verdad» comunica ese realce sin sonar arcaico ni introducir una escena visual que el hebreo no exige.
- source_word: נִכְבָּד
  english_pob_choice: honored
  chosen_spanish: honrado
  alternatives_spanish:
  - estimado
  - glorioso
  lexicon: HALOT
  rationale: El nifal de כבד señala ser tenido en honra o peso social. «Honrado» preserva el matiz de prestigio dentro del contexto militar.
- source_word: וְאֶל הַשְּׁלוֹשָׁה לֹא בָא
  english_pob_choice: but he did not attain to the Three
  chosen_spanish: pero no llegó a los Tres
  alternatives_spanish:
  - pero no alcanzó a los Tres
  - pero no llegó hasta los Tres
  lexicon: HALOT
  rationale: בוא con אֶל aquí expresa alcanzar una posición o rango, no simple movimiento físico. «Llegó a» mantiene esa idea de alcanzar estatus, y el sufijo «a» en la nota explica la alternativa idiomática más literal.
- source_word: הַשְּׁלוֹשָׁה
  english_pob_choice: the Three
  chosen_spanish: los Tres
  alternatives_spanish:
  - los tres principales
  - la élite de tres
  lexicon: HALOT
  rationale: La referencia es a la triada de guerreros de élite conocida en el contexto narrativo. «Los Tres» respeta la forma de grupo titular sin añadir interpretación no explicitada.
- source_word: וַיְשִׂימֵהוּ
  english_pob_choice: and David appointed him
  chosen_spanish: y David lo puso
  alternatives_spanish:
  - y David lo nombró
  - y David lo estableció
  lexicon: HALOT
  rationale: שׂים puede ser 'poner/colocar', y en contexto administrativo-militar también 'nombrar'. «Lo puso» mantiene el valor básico y deja que la frase siguiente especifique la función; la nota puede aclarar el sentido de asignación.
- source_word: עַל מִשְׁמַעְתּוֹ
  english_pob_choice: over his bodyguard
  chosen_spanish: sobre su guardia personal
  alternatives_spanish:
  - sobre su guardia
  - sobre los que estaban bajo su mando
  lexicon: HALOT
  rationale: מִשְׁמַעַת puede referirse a un cuerpo bajo mando o a una guardia. En este contexto de organización militar davídica, «guardia personal» es una solución española clara para un grupo de protección/servicio bajo la autoridad del rey.
translation_notes:
  revision_awareness: La revisión más reciente quedó sin cambios (gpt-5.4, 2026-04-23T10:03:46Z). El borrador mantiene la lectura de estatus/rango para «no llegó a los Tres» y la ambigüedad controlada de מִשְׁמַעַת mediante «guardia personal», en línea con el auditorial inglés POB.
  spanish_consistency_notes:
  - Se conserva «Yahvé» por defecto, pero este versículo no contiene el nombre divino.
  - «Los Treinta» y «los Tres» se escriben con mayúscula por tratarse de designaciones grupales específicas.
  - Se evita «siervo» o vocabulario eclesial no motivado por el hebreo; el ámbito es militar.
  - «Puso sobre» se mantiene idiomático y compatible con la idea de asignación/nombramiento en el contexto.
  - No se introduce «Cristo» ni otra terminología no presente en el texto fuente.
