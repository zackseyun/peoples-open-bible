- from: No consideres a tu sierva como una mujer vil[a], porque por la abundancia de mi queja[b] y de mi vexación he hablado hasta ahora.
  to: No consideres a tu sierva como una mujer vil[a], porque por la abundancia de mi queja[b] y de mi aflicción he hablado hasta ahora.
  rationale: Se conserva la estructura y las decisiones principales del borrador, pero se sustituye «vexación» por «aflicción» para reflejar con mayor fidelidad y naturalidad en español la angustia interior del contexto. También se normaliza la redacción de la nota b.
