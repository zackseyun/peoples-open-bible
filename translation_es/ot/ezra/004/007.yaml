translation:
  language: es
  text: Y en los días[a] de Artajerjes, Bislam, Mitrídates, Tabeel y el resto de sus asociados[b] escribieron a Artajerjes, rey de Persia. El texto de la carta fue escrito en arameo y traducido del arameo[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «durante el reinado de». La expresión hebrea es temporal y puede funcionar simplemente como marco narrativo, no necesariamente como fórmula técnica de reinado.
    reason: alternative_reading
  - marker: b
    text: O «y el resto de los asociados de él» o «y el resto de sus asociados». El hebreo tiene un sufijo singular formal, pero el referente puede entenderse colectivamente.
    reason: lexical_alternative
  - marker: c
    text: O «El documento fue escrito en escritura aramea y traducido al arameo». La redacción hebrea/aramea es difícil, y los intérpretes difieren sobre si la distinción es entre escritura y lengua o entre redacción y traducción.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבִימֵי
  english_pob_choice: And in the days of
  chosen_spanish: Y en los días de
  alternatives_spanish:
  - Y durante el reinado de
  - Ahora, en los días de
  lexicon: HALOT
  rationale: La expresión temporal mantiene el enlace narrativo y en español suena natural como fórmula histórica sin añadir una precisión regnal que el hebreo no exige aquí.
- source_word: אַרְתַּחְשַׁשְׂתָּא
  english_pob_choice: Artaxerxes
  chosen_spanish: Artajerjes
  alternatives_spanish:
  - Artajerjes
  lexicon: HALOT
  rationale: Se translitera el nombre propio con la forma usual en español bíblico culto y legible.
- source_word: כָּתַב
  english_pob_choice: wrote
  chosen_spanish: escribieron
  alternatives_spanish:
  - escribió
  - redactaron
  lexicon: HALOT
  rationale: El verbo פשוט significa ‘escribir’. En español conviene el plural por la serie de sujetos coordinados, sin introducir el contenido específico de la carta.
- source_word: בִּשְׁלָם מִתְרְדָת טָבְאֵל
  english_pob_choice: Bishlam, Mithredath, Tabeel
  chosen_spanish: Bislam, Mitrídates, Tabeel
  alternatives_spanish:
  - Bislam, Mitredat, Tabeel
  lexicon: HALOT
  rationale: Se conservan los nombres propios con transliteración española estable. ‘Mitrídates’ es la forma más reconocible en español para מִתְרְדָת.
- source_word: וּשְׁאָר כנותו
  english_pob_choice: and the rest of his associates
  chosen_spanish: y el resto de sus asociados
  alternatives_spanish:
  - y el resto de sus compañeros
  - y el resto de sus colegas
  lexicon: HALOT
  rationale: כנותו se entiende como personas asociadas/compañeros. ‘Asociados’ mantiene el sentido relacional sin forzar una lectura más estrecha.
- source_word: עַל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - contra
  - con respecto a
  lexicon: HALOT
  rationale: En este contexto administrativo, la preposición funciona como destinatario del escrito; ‘a’ conserva la direccionalidad sin introducir una hostilidad que el versículo por sí solo no especifica.
- source_word: מֶלֶךְ פָּרָס
  english_pob_choice: king of Persia
  chosen_spanish: rey de Persia
  alternatives_spanish:
  - el rey de Persia
  lexicon: HALOT
  rationale: Se mantiene la identificación real en apposición, con español natural y directo.
- source_word: וּכְתָב הַנִּשְׁתְּוָן
  english_pob_choice: The text of the letter
  chosen_spanish: El texto de la carta
  alternatives_spanish:
  - El documento
  - La copia de la carta
  lexicon: HALOT
  rationale: כְתָב y נִשְׁתְּוָן apuntan a un escrito/documento. ‘Texto de la carta’ comunica bien el referente sin resolver de más la relación exacta entre carta y copia.
- source_word: כָּתוּב אֲרָמִית
  english_pob_choice: was written in Aramaic
  chosen_spanish: fue escrito en arameo
  alternatives_spanish:
  - fue escrito en la escritura aramea
  - fue escrito en lengua aramea
  lexicon: HALOT
  rationale: La lectura más natural y amplia es de lengua de composición. Se evita especificar ‘escritura’ porque el hebreo permite la ambigüedad.
- source_word: וּמְתֻרְגָּם אֲרָמִית
  english_pob_choice: translated from Aramaic
  chosen_spanish: traducido del arameo
  alternatives_spanish:
  - interpretado del arameo
  - vertido del arameo
  lexicon: HALOT
  rationale: 'Se conserva la decisión revisada en el audit trail: ‘del arameo’ refleja mejor el sentido natural del pasaje y mantiene abierta la dificultad de si se distingue entre escritura y lengua o entre redacción y traducción.'
theological_decisions:
- issue: Ambigüedad entre ‘arameo’ como lengua y como escritura en la cláusula final
  english_pob_reading: The text of the letter was written in Aramaic and translated from Aramaic.
  chosen_spanish_reading: El texto de la carta fue escrito en arameo y traducido del arameo.
  alternative_spanish_readings:
  - El texto de la carta fue escrito en la escritura aramea y traducido al arameo.
  - El documento fue escrito en arameo y traducido en arameo.
  rationale: El hebreo es difícil y admite más de una lectura. La traducción principal sigue la revisión inglesa más reciente y conserva la ambigüedad sin forzar una solución técnica que el texto no asegura.
  doctrine_reference: No aplica; decisión de crítica/filología textual y no doctrinal.
- issue: Valor del sufijo singular en ‘sus asociados’
  english_pob_reading: his associates
  chosen_spanish_reading: sus asociados
  alternative_spanish_readings:
  - sus asociados
  - sus compañeros
  rationale: El inglés auditado retiene el singular formal (‘his’) aunque el referente pueda ser colectivo. En español, ‘sus’ mantiene esa posibilidad colectiva sin decidir indebidamente la referencia exacta.
  doctrine_reference: No aplica; cuestión pronominal y referencial.
translation_notes:
  revision_awareness: 'Se respetó la revisión más reciente del audit trail inglés: la cláusula final se rinde como «traducido del arameo», no «traducido en arameo». También se mantuvo la lectura cauta de ‘la carta/texto’ sin añadir un objeto explícito que el versículo no nombra.'
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ solo cuando aparezca el Tetragrámaton; aquí no aplica.
  - Se mantuvo ‘Artajerjes’ como transliteración española estable del nombre propio.
  - ‘Arameo’ se usa como lengua de la redacción/traducción, preservando la ambigüedad del hebreo.
  - ‘Asociados’ traduce el valor relacional de כנותו sin desplazarlo hacia una formulación eclesiástica o más técnica.
