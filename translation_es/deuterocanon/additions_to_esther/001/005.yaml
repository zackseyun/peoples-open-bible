translation:
  language: es
  text: Y he aquí[a], dos grandes dragones salieron al frente, ambos listos para pelear; y de ellos[b] surgió un gran ruido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ambos listos para forcejear»; el verbo griego puede indicar lucha cuerpo a cuerpo o combate cerrado.
    reason: lexical_alternative
  - marker: b
    text: O «una gran voz/grito surgió de ellos»; el griego permite «voz», pero «ruido» evita insinuar habla articulada.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδοὺ
  english_pob_choice: behold
  chosen_spanish: Y he aquí
  alternatives_spanish:
  - miren
  - vean
  lexicon: BDAG
  rationale: «He aquí» preserva el tono vívido y visionario de la partícula en un relato de visión. Se antepone «Y» para respetar la continuidad narrativa natural en español.
- source_word: δράκοντες
  english_pob_choice: dragons
  chosen_spanish: dragones
  alternatives_spanish:
  - serpientes
  - monstruos
  lexicon: LSJ
  rationale: «Dragones» conserva la imaginería apocalíptica y simbólica del griego. «Serpientes» o «monstruos» reducirían o alterarían esa fuerza visual.
- source_word: μεγάλοι
  english_pob_choice: great
  chosen_spanish: grandes
  alternatives_spanish:
  - largos
  - enormes
  lexicon: BDAG
  rationale: «Grandes» puede expresar tamaño y también la cualidad portentosa del símbolo, como en el inglés POB. «Enormes» desplazaría demasiado el énfasis hacia lo físico.
- source_word: ἕτοιμοι
  english_pob_choice: ready
  chosen_spanish: listos
  alternatives_spanish:
  - preparados
  - dispuestos
  lexicon: BDAG
  rationale: «Listos» es una forma natural y clara para expresar estado de preparación. «Preparados» también sería posible, pero suena algo más marcada o técnica en este contexto.
- source_word: προῆλθον
  english_pob_choice: came forward
  chosen_spanish: salieron al frente
  alternatives_spanish:
  - avanzaron
  - se adelantaron
  lexicon: BDAG
  rationale: «Salieron al frente» comunica la idea de salir a la vista y entrar en confrontación de manera idiomática en español, sin cargar el texto con un matiz militar excesivo. Mantiene la noción de movimiento hacia delante del verbo griego.
- source_word: ἀμφότεροι
  english_pob_choice: both
  chosen_spanish: ambos
  alternatives_spanish:
  - los dos
  - los dos juntos
  lexicon: BDAG
  rationale: «Ambos» reproduce directamente el valor dual inclusivo del término griego y suena natural en español.
- source_word: παλαίειν
  english_pob_choice: to fight
  chosen_spanish: pelear
  alternatives_spanish:
  - luchar
  - forcejear
  lexicon: LSJ
  rationale: «Pelear» comunica el enfrentamiento hostil de forma clara y moderna. En nota se preserva la alternativa más específica de «forcejear»/«luchar» con la idea de lucha cuerpo a cuerpo o combate cerrado.
- source_word: φωνὴ μεγάλη
  english_pob_choice: a great sound
  chosen_spanish: un gran ruido
  alternatives_spanish:
  - una gran voz
  - un gran grito
  - un fuerte ruido
  lexicon: BDAG
  rationale: «Ruido» evita imponer la idea de habla articulada. «Gran» conserva la correspondencia con μεγάλη, siguiendo la revisión del inglés POB que prefirió una equivalencia más cercana al adjetivo griego.
- source_word: αὐτῶν
  english_pob_choice: from them
  chosen_spanish: de ellos
  alternatives_spanish:
  - desde ellos
  - procedente de ellos
  lexicon: BDAG
  rationale: 'Con ἐγένετο y φωνή, el genitivo se expresa de modo natural en español como origen: «de ellos». Mantiene la relación de procedencia sin sonar forzado.'
theological_decisions:
- issue: Naturaleza simbólica de los dragones en la visión
  english_pob_reading: Render the imagery straightforwardly as 'dragons' without allegorical interpretation in the main text.
  chosen_spanish_reading: Traducir la imagen como «dragones» sin identificarla alegóricamente en el texto principal.
  alternative_spanish_readings:
  - Interpretar los dragones como reinos o personajes históricos
  - suavizar la imagen con «serpientes» o «monstruos»
  rationale: El versículo presenta una imagen onírica o visionaria, pero no ofrece aquí su explicación. La traducción debe conservar la imagen y no resolver la tensión interpretativa que el propio texto deja abierta.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés POB, que ajustó ‘a loud sound’ a ‘a great sound’ para corresponder más estrechamente con μεγάλη sin perder naturalidad. Por eso el español usa «gran ruido» y no una reformulación interpretativa.
  spanish_consistency_notes:
  - Se mantiene «Y he aquí» como fórmula visionaria estable.
  - «Dragones» conserva el término técnico-imaginativo del POB, sin domesticarlo a «serpientes».
  - Se evitó «SEÑOR» u otras sustituciones porque no aparece aquí el Tetragrámaton ni un equivalente directo.
  - Se preserva la tensión entre «voz» y «ruido» en la nota, ya que φωνή puede abarcar ambos sentidos.
