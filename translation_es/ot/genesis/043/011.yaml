base_translation:
  language: en
  yaml_path: translation/ot/genesis/043/011.yaml
  text: 'Then Israel their father said to them[a], “If it must be so, then do this: take some of the choice products of the land in your containers, and carry down to the man a gift—a little balm and a little honey, gum and myrrh[c][b], pistachio nuts and almonds.”'
  footnotes:
  - marker: a
    text: Or 'some of the best produce of the land.' The Hebrew expression refers broadly to select products of the land, not only fruit.
    reason: lexical_alternative
  - marker: b
    text: '''Honey'' may in some contexts refer to a sweet syrup rather than bee honey.'
    reason: lexical_alternative
  - marker: c
    text: The identification of the Hebrew terms rendered 'gum' and 'myrrh' is uncertain; alternatives include various aromatic resins such as tragacanth gum or ladanum.
    reason: lexical_alternative
