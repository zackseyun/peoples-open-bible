translation:
  language: es
  text: Pues escribes contra mí cosas amargas y me haces heredar las iniquidades de mi juventud[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «decretas cosas amargas contra mí»; el hebreo literalmente dice «escribes cosas amargas contra mí».
    reason: lexical_alternative
  - marker: b
    text: O «me haces cargar con la culpa» o «con el castigo» de las iniquidades de mi juventud. La palabra hebrea puede denotar iniquidad, culpa o su consecuencia.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Porque sí
  lexicon: HALOT
  rationale: Aquí introduce la explicación o motivo de la queja de Job; «porque» conserva el valor causal/inferencial de כִּי y funciona con naturalidad en español.
- source_word: תִכְתֹּב עָלַי
  english_pob_choice: you write ... against me
  chosen_spanish: escribes contra mí
  alternatives_spanish:
  - escribes sobre mí
  - decretas contra mí
  - registras contra mí
  lexicon: HALOT
  rationale: Se mantiene la metáfora de «escribir» sin convertirla del todo en «decretar». La preposición hebrea עַל en este contexto tiene matiz adversativo, por eso «contra mí» comunica bien la dirección hostil sin perder el verbo literal.
- source_word: מְרֹר֑וֹת
  english_pob_choice: bitter things
  chosen_spanish: cosas amargas
  alternatives_spanish:
  - amarguras
  - cosas de amargura
  - palabras amargas
  lexicon: HALOT
  rationale: El plural femenino sugiere «cosas / asuntos amargos»; «cosas amargas» conserva esa amplitud y evita estrechar el sentido a solo palabras, decretos o sufrimientos.
- source_word: וְתוֹרִישֵׁנִי
  english_pob_choice: and make me inherit
  chosen_spanish: y me haces heredar
  alternatives_spanish:
  - y me haces poseer
  - y me asignas como herencia
  - y me causas a heredar
  lexicon: HALOT
  rationale: 'El verbo en hiphil es causativo: «hacer heredar / hacer poseer». «Me haces heredar» preserva la fuerza causativa y suena natural en español.'
- source_word: עֲוֺנוֹת
  english_pob_choice: the iniquities
  chosen_spanish: las iniquidades
  alternatives_spanish:
  - los pecados
  - la culpa
  - las consecuencias de las iniquidades
  lexicon: HALOT
  rationale: «Iniquidades» mantiene la cercanía léxica con el hebreo עָוֹן y deja abierta la tensión documentada entre pecado, culpa y consecuencia, sin resolverla prematuramente.
- source_word: נְעוּרַי
  english_pob_choice: of my youth
  chosen_spanish: de mi juventud
  alternatives_spanish:
  - desde mi juventud
  - de mis años jóvenes
  lexicon: HALOT
  rationale: La construcción posesiva se expresa de forma directa con «de mi juventud», que es clara y fiel al hebreo.
theological_decisions:
- issue: Sentido de עֲוֺנוֹת en el contexto de Job 13:26
  english_pob_reading: moral wrongs from Job's youth, with implied burden of guilt/consequence
  chosen_spanish_reading: malas acciones de la juventud de Job, con posible carga de culpa o consecuencia
  alternative_spanish_readings:
  - las penas por los pecados de mi juventud
  - la culpa de mi juventud
  - las consecuencias de mis iniquidades juveniles
  rationale: El hebreo puede abarcar iniquidad, culpa o castigo/consecuencia. La versión principal conserva «iniquidades» para no reducir el alcance, mientras que el contexto permite oír la carga de culpa o de sus efectos.
  doctrine_reference: Preservar la tensión semántica del original sin forzar una sola lectura doctrinal o pastoral.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el audit trail inglés de alta concordancia y no introduce revisiones sustantivas: conserva la metáfora de «escribir», mantiene la amplitud semántica de מְרֹרוֹת y עֲוֺנוֹת, y refleja la causalidad de כִּי y la fuerza causativa de וְתוֹרִישֵׁנִי.'
  spanish_consistency_notes:
  - Se usa «Yahvé» por norma del proyecto solo cuando el texto lo requiere; este versículo no contiene el nombre divino explícito.
  - Se mantiene «iniquidades» en vez de «pecados» o «culpa» para respetar la ambigüedad lexical documentada.
  - «Contra mí» reproduce el valor adversativo de עַל sin sobreinterpretar el movimiento físico de la preposición.
  - El tono es bíblico y digno, pero en español contemporáneo claro, evitando calcos innecesarios.
