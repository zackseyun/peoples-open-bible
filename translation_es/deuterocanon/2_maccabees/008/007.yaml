translation:
  language: es
  text: Especialmente tomaba las noches como aliadas[a] para tales ataques, y la noticia[b] de su valor se difundía por todas partes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La imagen griega es literalmente «tomaba las noches como συνεργούς»; se conserva la metáfora de las noches funcionando como colaboradoras en las incursiones nocturnas.
    reason: lexical_alternative
  - marker: b
    text: La expresión griega «ἡ ἁλὴ τῆς εὐανδρείας αὐτοῦ» es poco común; el sentido probable es el de una noticia, reporte o renombre de su valor que se iba propagando.
    reason: textual_variant
lexical_decisions:
- source_word: μάλιστα
  english_pob_choice: especially
  chosen_spanish: Especialmente
  alternatives_spanish:
  - sobre todo
  - particularmente
  lexicon: LSJ
  rationale: El adverbio intensifica la acción; «Especialmente» conserva el énfasis de manera natural en español moderno.
- source_word: τὰς νύκτας
  english_pob_choice: the nights
  chosen_spanish: las noches
  alternatives_spanish:
  - la noche
  - durante la noche
  - la noche misma
  lexicon: LSJ
  rationale: Conservar el sustantivo plural mantiene la imagen metafórica del griego, donde las noches son tratadas como objeto tomado para la acción.
- source_word: πρὸς τὰς τοιαύτας ἐπιβολάς
  english_pob_choice: for such attacks
  chosen_spanish: para tales ataques
  alternatives_spanish:
  - para tales asaltos
  - para tales incursiones
  - para tales empresas
  lexicon: LSJ
  rationale: «Ataques» comunica con claridad el sentido bélico sin volver técnico el pasaje; «tales» reproduce la referencia a acciones de ese tipo.
- source_word: συνεργούς
  english_pob_choice: as allies
  chosen_spanish: como aliadas
  alternatives_spanish:
  - como ayudantes
  - como compañeras
  - como auxiliares
  lexicon: LSJ
  rationale: 'La relación es metafórica: las noches funcionan como colaboradoras en la acción militar. «Aliadas» preserva la fuerza figurada mejor que una versión más plana como «ayudantes».'
- source_word: ἐλάμβανεν
  english_pob_choice: took
  chosen_spanish: tomaba
  alternatives_spanish:
  - tomaba para sí
  - empleaba
  - usaba
  lexicon: LSJ
  rationale: El verbo básico es «tomar/recibir»; en español, «tomaba ... como aliadas» conserva la imagen sin añadir interpretación ajena.
- source_word: ἡ ἁλὴ τῆς εὐανδρείας αὐτοῦ
  english_pob_choice: the report of his valor
  chosen_spanish: el informe de su valor
  alternatives_spanish:
  - la fama de su valor
  - la noticia de su valor
  - la reputación de su valor
  lexicon: LSJ
  rationale: La expresión griega es inusual y parece referirse a un rumor o reportación que circula. «Informe» sigue la idea de un reporte que se difunde, manteniendo la rareza del original sin imponer una lectura más interpretativa que «fama».
- source_word: διηχεῖτο πανταχῇ
  english_pob_choice: spread everywhere
  chosen_spanish: se difundía por todas partes
  alternatives_spanish:
  - resonaba por todas partes
  - se extendía por todas partes
  - circulaba por todas partes
  lexicon: LSJ
  rationale: El verbo sugiere propagación amplia; «se difundía por todas partes» expresa bien la expansión del reporte y evita una traducción demasiado literal de un efecto acústico.
translation_notes:
  revision_awareness: El texto español sigue la lectura del griego de Swete (1909) y refleja la auditoría inglesa que mantiene la metáfora de «las noches» y entiende la frase final como un reporte/renombre que se difunde. Se optó por una equivalencia óptima que preserva la imagen y la rareza del original sin forzar una paráfrasis excesiva.
  spanish_consistency_notes:
  - Se usó «valor» para εὐανδρία, coherente con un campo de valentía/coraje militar y más natural que una calca de «manliness».
  - Se mantuvo el plural «las noches» para respetar el objeto directo del griego y la metáfora militar.
  - «Se difundía por todas partes» refleja el carácter amplio y continuo del verbo sin sobrecargarlo con tecnicismos.
  - No se introdujo terminología eclesiástica ajena al pasaje; el registro es narrativo y bélico, acorde con el contexto de 2 Macabeos.
