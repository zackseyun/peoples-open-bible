revisions:
- from: Entonces fueron a Hilcías el sumo sacerdote y entregaron el dinero que había sido traído a la casa de Dios[a], que los levitas, los guardianes del umbral, habían reunido de manos de Manasés y de Efraín, y de todo el remanente de Israel, y de todo Judá y Benjamín, y de los habitantes de Jerusalén.
  to: Entonces llegaron a Hilcías, el sumo sacerdote, y entregaron el dinero que habían llevado a la casa de Dios, el cual los levitas, los guardianes del umbral[a], habían reunido de manos de Manasés y Efraín, y de todo el remanente de Israel, y de todo Judá y Benjamín, y de los habitantes de Jerusalén.
  rationale: Se corrige el anclaje obligatorio de la nota para que coincida con la frase a la que realmente pertenece. Además, se suaviza el español con «llegaron a» y «habían llevado», manteniendo plenamente el sentido del hebreo y las decisiones documentadas del POB inglés.
