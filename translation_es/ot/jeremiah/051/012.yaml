  - severity: medium
    issue: Falta una nota para la cláusula final «lo que habló contra los habitantes de Babilonia».
    rationale: 'El inglés POB conserva una nota importante: el hebreo dice literalmente «habló a los habitantes de Babilonia», y «contra» es una resolución contextual de juicio. Esa decisión también debe quedar documentada en español.'
  - severity: low
