translation:
  language: es
  text: 'Todos mis huesos[a] dirán: «Oh Yahvé, ¿quién como tú, que libras al afligido de uno más fuerte que él[b], y al afligido y al necesitado de su despojador?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Todos mis huesos», una expresión corporal vívida para decir que el hablante entero se une en testimonio o alabanza.'
    reason: cultural_note
  - marker: b
    text: 'O: «de uno demasiado fuerte para él».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל עַצְמוֹתַי
  english_pob_choice: All my bones
  chosen_spanish: Todos mis huesos
  alternatives_spanish:
  - Todo mi ser
  - Todo lo que hay en mí
  lexicon: HALOT
  rationale: Conservo la imagen corporal hebrea sin convertirla en paráfrasis. En español, «todos mis huesos» comunica el giro vívido de totalidad personal y mantiene la correspondencia con el audit trail inglés.
- source_word: תֹּאמַרְנָה
  english_pob_choice: will say
  chosen_spanish: dirán
  alternatives_spanish:
  - dirá
  - proclamarán
  lexicon: HALOT
  rationale: El plural concuerda con «todos mis huesos». «Dirán» reproduce el futuro simple sin añadir énfasis no exigido por el verbo.
- source_word: יְהוָה
  english_pob_choice: O Yahweh
  chosen_spanish: Oh Yahvé
  alternatives_spanish:
  - Yahvé
  - SEÑOR
  lexicon: HALOT
  rationale: Se mantiene el nombre divino como «Yahvé», conforme al criterio del proyecto, en lugar de sustituirlo por un título.
- source_word: מִי כָמוֹךָ
  english_pob_choice: who is like you
  chosen_spanish: ¿quién como tú?
  alternatives_spanish:
  - ¿quién es como tú?
  - ¿quién se te compara?
  lexicon: HALOT
  rationale: La fórmula comparativa hebrea se expresa de modo natural en español con la pregunta elíptica. Conserva la incomparabilidad sin sobreexplicarla.
- source_word: מַצִּיל
  english_pob_choice: delivering
  chosen_spanish: que libras
  alternatives_spanish:
  - que rescatas
  - que salvas
  lexicon: HALOT
  rationale: «Libras» expresa la acción de rescatar con un tono bíblico claro en español y mantiene el participio activo aplicado a Yahvé.
- source_word: עָנִי
  english_pob_choice: the afflicted
  chosen_spanish: al afligido
  alternatives_spanish:
  - al pobre
  - al oprimido
  lexicon: HALOT
  rationale: Sigo la revisión inglesa más reciente que prefirió «afflicted» para עָנִי, porque aquí el contexto destaca la condición de vulnerabilidad/opresión más que la pobreza económica estricta.
- source_word: מֵחָזָק מִמֶּנּוּ
  english_pob_choice: from one stronger than he
  chosen_spanish: de uno más fuerte que él
  alternatives_spanish:
  - de uno demasiado fuerte para él
  - de uno más fuerte que ese
  lexicon: HALOT
  rationale: «Más fuerte que él» conserva la comparación explícita del hebreo sin decidir de antemano si significa «más fuerte» o «demasiado fuerte». La ambigüedad se preserva con fidelidad.
- source_word: וְעָנִי וְאֶבְיוֹן
  english_pob_choice: and the afflicted and needy
  chosen_spanish: y al afligido y al necesitado
  alternatives_spanish:
  - y al pobre y necesitado
  - y al afligido y menesteroso
  lexicon: HALOT
  rationale: Mantengo la repetición de עָנִי como «afligido» siguiendo el ajuste revisado del inglés POB, y traduzco אֶבְיוֹן como «necesitado», un equivalente claro y digno en español.
- source_word: מִגֹּזְלוֹ
  english_pob_choice: from the one who robs him
  chosen_spanish: de su despojador
  alternatives_spanish:
  - del que lo roba
  - del que lo despoja
  lexicon: HALOT
  rationale: «Despojador» refleja bien el participio hebreo como agente habitual de robo/despojo. Es más compacto que una perífrasis y mantiene la fuerza del agente.
theological_decisions:
- issue: Nombre divino YHWH
  english_pob_reading: O Yahweh
  chosen_spanish_reading: Oh Yahvé
  alternative_spanish_readings:
  - Yahvé
  - SEÑOR
  rationale: El verso usa el Tetragrama directamente, por lo que se conserva el nombre propio divino. No se sustituye por «SEÑOR» porque el proyecto prioriza la transparencia del nombre revelado.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Valor de עָנִי en el paralelismo
  english_pob_reading: the afflicted
  chosen_spanish_reading: el afligido
  alternative_spanish_readings:
  - el pobre
  - el oprimido
  rationale: Sigo la revisión auditada que corrigió «poor» a «afflicted» para captar la amplitud semántica de עָנִי en un contexto de aflicción y opresión. Así se evita restringir el sentido a pobreza material.
  doctrine_reference: 'Revisión aplicada 2026-04-23: change summary for PSA.35.10'
translation_notes:
  revision_awareness: Se incorporó la revisión más reciente del audit trail que cambió el sentido de עָנִי de «poor» a «afflicted» en ambas ocurrencias. También se conservó la decisión estable de traducir יְהוָה como «Yahvé» y se mantuvo la imagen corporal de «all my bones».
  spanish_consistency_notes:
  - Se mantuvo la repetición de עָנִי con la misma solución española («afligido») en ambos lugares para preservar el paralelismo.
  - «necesitado» se reservó para אֶבְיוֹן, diferenciándolo de עָנִי.
  - 'Se eligió un tono bíblico contemporáneo y claro: «libras», «despojador», «Yahvé».'
  - Las comillas y la puntuación siguen el uso español; la nota a pie de versículo se ancla en «dirán» y la alternativa lexical en «más fuerte que él».
