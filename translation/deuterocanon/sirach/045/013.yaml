theological_decisions:
- issue: Restriction of the high-priestly garments to Aaron's line
  chosen_reading: 'The verse states hereditary exclusivity: no outsider may wear these garments; they belong only to Aaron''s sons and descendants.'
  alternative_readings:
  - The difficult Hebrew clause could be read more narrowly as a statement of trust or confirmation given to Aaron and his sons rather than an explicit exception clause.
  rationale: This is not a later doctrinal import but the plain contextual sense of the verse in both the surrounding passage and the Greek parallel. Because the Hebrew witness is somewhat compressed/difficult at this point, the Greek helps clarify the inherited priestly restriction without adding a new theological claim.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language primacy with Greek parallel used as actual input for Sirach where Hebrew is difficult.
