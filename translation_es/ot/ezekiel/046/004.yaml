revisions:
- from: Y el holocausto que el príncipe presenta a Yahvé en el día de sábado será de seis corderos sin defecto y un carnero sin defecto[a].
  to: Y el holocausto que el príncipe presenta a Yahvé en el día de reposo será de seis corderos sin defecto y un carnero sin defecto[a].
  rationale: Se corrige una formulación española poco natural («en el día de sábado») por una expresión bíblica clara y ampliamente inteligible («en el día de reposo»). También se repara la nota al pie para que preserve la alternativa léxica real documentada por el POB inglés y explique mejor el sentido literal del verbo sacrificial. No se requieren cambios doctrinales ni estructurales mayores.
  reviewer_model: gpt-5.4
