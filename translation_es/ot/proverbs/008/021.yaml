translation:
  language: es
  text: para dar bienes[a] en herencia a los que me aman, y para llenar sus tesoros.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «para hacer que los que me aman hereden sustancia»; el hebreo יֵשׁ también puede entenderse como «sustancia», «posesiones» o «bienes».'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְהַנְחִיל
  english_pob_choice: to endow
  chosen_spanish: para heredar
  alternatives_spanish:
  - para causar que hereden
  - para legar
  - para dotar
  lexicon: HALOT
  rationale: El hiphil de נחל expresa hacer heredar o dar en posesión. En español, «para heredar» conserva el valor de finalidad del infinitivo hebreo y sugiere la transmisión de bienes sin volver la frase pesada o poco natural. «Dotar» sería más libre; «causar que hereden» más literal pero menos idiomático.
- source_word: אֹהֲבַי
  english_pob_choice: those who love me
  chosen_spanish: a los que me aman
  alternatives_spanish:
  - a mis amantes
  - a mis amigos que me aman
  lexicon: HALOT
  rationale: El participio con sufijo de 1cs designa a las personas caracterizadas por amar a la Sabiduría. «A los que me aman» es la forma más natural y fiel en español, evitando la posible ambigüedad o carga afectiva de «mis amantes».
- source_word: יֵשׁ
  english_pob_choice: wealth
  chosen_spanish: bienes
  alternatives_spanish:
  - riquezas
  - sustancia
  - posesiones
  lexicon: HALOT
  rationale: En este contexto sapiencial, יֵשׁ apunta a realidad poseída, bienes o riqueza concreta. «Bienes» comunica esa idea de modo claro y sobrio en español, sin forzar una lectura doctrinal ni caer en el arcaísmo ambiguo de «sustancia».
- source_word: וְאֹצְרֹתֵיהֶם
  english_pob_choice: their treasuries
  chosen_spanish: sus tesoros
  alternatives_spanish:
  - sus almacenes
  - sus depósitos
  - sus tesorerías
  lexicon: HALOT
  rationale: El sustantivo de אוֹצָר designa depósitos o lugares donde se guarda riqueza. «Sus tesoros» mantiene la imagen concreta y funciona bien en el paralelismo poético con los «bienes» concedidos.
- source_word: אֲמַלֵּא
  english_pob_choice: to fill
  chosen_spanish: para llenar
  alternatives_spanish:
  - y llenar
  - lleno
  - para colmar
  lexicon: HALOT
  rationale: El piel de מלא es «llenar». En este verso, la secuencia con el infinitivo final expresa propósito; por eso «para llenar» reproduce bien la estructura hebrea y su fluidez poética en español.
theological_decisions:
- issue: Naturaleza de la promesa de Sabiduría
  english_pob_reading: Render the terms in their plain sense as material/substantial prosperity imagery without importing a prosperity-theology claim.
  chosen_spanish_reading: Conservar la imagen de bienes y tesoros concretos, sin convertir el verso en una promesa doctrinal general de prosperidad para los creyentes.
  alternative_spanish_readings:
  - a los que me aman con riquezas espirituales
  - para heredar verdadera riqueza
  rationale: El paralelismo de יֵשׁ con «tesoros» favorece una imagen concreta de posesión. La traducción española mantiene esa fuerza imagética, pero evita expandirla teológicamente más allá del proverbio.
  doctrine_reference: Principios de traducción 1, 3 y 6
translation_notes:
  revision_awareness: El texto sigue de cerca la lectura de la POB inglesa con equivalencia óptima. No hay revisiones aplicadas en el expediente más reciente; se conserva la decisión de entender יֵשׁ como riqueza/sustancia concreta dentro de la imaginería sapiencial, sin sobreteologizarla.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el hebreo nombra explícitamente el nombre divino; este verso no lo hace.
  - Se evita «Cristo» y lenguaje litúrgico tradicional porque el pasaje es sapiencial y no contiene terminología mesiánica.
  - «Bienes» y «tesoros» conservan el paralelismo semántico sin perder la imagen material del hebreo.
  - La nota de pie de página mantiene la alternativa lexical documentada para יֵשׁ sin duplicar marcadores.
