  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. ''Jerusalén'', ''lengua'', ''paladar'' y el tratamiento directo de la ciudad están bien encaminados. La principal desviación no es terminológica sino de traducción: la autoimprecación debe expresarse en español con ''Que...'' en lugar de conservar ''May''.'
