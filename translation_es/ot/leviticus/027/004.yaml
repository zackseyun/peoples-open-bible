  rationale: Se reemplaza «una mujer» por «hembra» para reflejar fielmente נְקֵבָה como clasificación por sexo en este contexto legal, sin estrecharlo a mujer adulta. También se corrige la nota alternativa para que sea español natural y coherente con la alternativa auditada en inglés.
