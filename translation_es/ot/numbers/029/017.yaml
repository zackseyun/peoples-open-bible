translation:
  language: es
  text: 'Y al segundo día: doce toros del ganado[a], dos carneros y catorce corderos de un año, sin defecto,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «doce toros, hijos del ganado».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בַ/יּוֹם
  english_pob_choice: And on the ... day
  chosen_spanish: Y al ... día
  alternatives_spanish:
  - Y en el ... día
  - Y para el ... día
  lexicon: HALOT
  rationale: La secuencia ritual enlista las ofrendas día por día; 'Y al segundo día' conserva la continuidad coordinada del hebreo y su valor temporal natural en español.
- source_word: הַ/שֵּׁנִי
  english_pob_choice: second
  chosen_spanish: segundo
  alternatives_spanish:
  - el segundo
  lexicon: HALOT
  rationale: Adjetivo ordinal directo; en español concuerda con 'día' y mantiene la simplicidad del inventario sacrificial.
- source_word: פָּרִים
  english_pob_choice: bulls
  chosen_spanish: toros
  alternatives_spanish:
  - bueyes
  - novillos
  lexicon: HALOT
  rationale: En contexto sacrificial designa bovinos machos ofrecidos como holocausto. 'Toros' comunica con claridad el tipo de animal sin añadir juventud explícita que el hebreo no expresa aquí por sí solo.
- source_word: בְּנֵי בָקָר
  english_pob_choice: from the herd
  chosen_spanish: del ganado
  alternatives_spanish:
  - de la vacada
  - de la res
  lexicon: HALOT
  rationale: La expresión hebrea literal ('hijos del ganado') clasifica a los animales como bovinos de cría. 'Del ganado' preserva esa función clasificatoria en español natural y fiel.
- source_word: שְׁנֵים עָשָׂר
  english_pob_choice: twelve
  chosen_spanish: doce
  lexicon: HALOT
  rationale: Número cardinal simple que modifica 'toros'.
- source_word: אֵילִם
  english_pob_choice: rams
  chosen_spanish: carneros
  alternatives_spanish:
  - rams
  lexicon: HALOT
  rationale: En español bíblico 'carneros' es el equivalente natural de 'rams' y conserva el valor sacrificial del término.
- source_word: שְׁנָיִם
  english_pob_choice: two
  chosen_spanish: dos
  lexicon: HALOT
  rationale: Número cardinal simple que modifica 'carneros'.
- source_word: כְּבָשִׂים
  english_pob_choice: lambs
  chosen_spanish: corderos
  alternatives_spanish:
  - corderos machos
  - ovejas jóvenes
  lexicon: HALOT
  rationale: En este inventario sacrificial, 'corderos' es el equivalente claro y natural para el lector español; el contexto de edad en la frase siguiente mantiene la precisión zoológica.
- source_word: בְּנֵי שָׁנָה
  english_pob_choice: one-year-old
  chosen_spanish: de un año
  alternatives_spanish:
  - de un año de edad
  - en su primer año
  lexicon: HALOT
  rationale: La expresión hebrea idiomática señala la edad de los animales. 'De un año' es idiomático en español y mantiene la información sin sobrecargar la frase.
- source_word: אַרְבָּעָה עָשָׂר
  english_pob_choice: fourteen
  chosen_spanish: catorce
  lexicon: HALOT
  rationale: Número cardinal simple que modifica 'corderos'.
- source_word: תְּמִימִם
  english_pob_choice: without blemish
  chosen_spanish: sin defecto
  alternatives_spanish:
  - sin mancha
  - sin tacha
  - sin defecto alguno
  lexicon: HALOT
  rationale: En lenguaje sacrificial, el término denota animales sin imperfección ritual o física. 'Sin defecto' expresa bien esa exigencia cultual en español moderno y evita una traducción demasiado estrecha o moralizante.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y concuerda con el audit trail inglés sin depender mecánicamente de él. Mantiene la lista ritual, la secuencia temporal y la terminología sacrificial, con una nota para conservar la literalidad clasificada de בְּנֵי בָקָר.
  spanish_consistency_notes:
  - Se emplea 'sin defecto' para תְּמִימִם, consistente con el uso cultual de animales aptos para ofrenda.
  - Se prefiere 'corderos' en contexto sacrificial, mientras la edad se aclara con 'de un año' para preservar la precisión.
  - La nota [a] conserva la literalidad del hebreo sin entorpecer la fluidez del texto principal.
