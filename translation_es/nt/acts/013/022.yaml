    text: Or, more traditionally, “a man after my own heart.” The Greek more literally says “according to my heart.”
    reason: lexical_alternative
  - marker: b
    text: Greek “all my wills,” with the noun in the plural; many English translations smooth this to “all my will.”
    reason: lexical_alternative
