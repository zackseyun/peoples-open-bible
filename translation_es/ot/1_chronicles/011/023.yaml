base_translation:
  language: en
  yaml_path: translation/ot/1_chronicles/011/023.yaml
  text: And he struck down the Egyptian[a], a man five cubits tall. In the Egyptian’s hand was a spear like a weaver’s beam, and he went down to him with a staff, snatched the spear from the Egyptian’s hand[c][b], and killed him with his own spear.
  footnotes:
  - marker: a
    text: Or, 'a man of great stature, five cubits tall.' The Hebrew phrase literally reads 'a man of measure.'
    reason: lexical_alternative
  - marker: b
    text: A cubit was an ancient unit of length roughly equivalent to the distance from the elbow to the fingertips.
    reason: cultural_note
  - marker: c
    text: Or, 'with a club' or 'with a rod' for 'with a staff.'
    reason: lexical_alternative
