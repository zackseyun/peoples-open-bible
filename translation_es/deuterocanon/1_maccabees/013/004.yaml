translation:
  language: es
  text: Por esta razón todos mis hermanos perecieron por el bien de Israel, y yo solo quedé.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: τούτου χάριν
  english_pob_choice: For this reason
  chosen_spanish: Por esta razón
  alternatives_spanish:
  - Por esto
  - Por causa de esto
  lexicon: LSJ
  rationale: La locución causal se vierte de manera natural en español con 'Por esta razón', manteniendo la relación explícita de causa sin añadir interpretación.
- source_word: ἀπώλοντο
  english_pob_choice: perished
  chosen_spanish: perecieron
  alternatives_spanish:
  - fueron destruidos
  - murieron
  lexicon: LSJ
  rationale: '''Perecieron'' conserva el sentido de ruina o muerte del aoristo, en línea con la revisión inglesa que prefirió ''perished'' frente a una formulación más fuerte como ''were destroyed''.'
- source_word: οἱ ἀδελφοί μου πάντες
  english_pob_choice: all my brothers
  chosen_spanish: todos mis hermanos
  alternatives_spanish:
  - mis hermanos todos
  - todos los hermanos míos
  lexicon: LSJ
  rationale: Se mantiene la totalidad enfática de πάντες con una frase española natural; 'hermanos' conserva el sentido literal de los varones de la familia en contexto.
- source_word: χάριν τοῦ Ἰσραήλ
  english_pob_choice: for the sake of Israel
  chosen_spanish: por causa de Israel
  alternatives_spanish:
  - por el bien de Israel
  - por amor a Israel
  lexicon: LSJ
  rationale: '''Por causa de Israel'' comunica el valor causal y de propósito de χάριν con genitivo. Se evita ''a favor de'' o ''en nombre de'' por introducir matices no exigidos por el griego.'
- source_word: κατελείφθην
  english_pob_choice: was left
  chosen_spanish: quedé
  alternatives_spanish:
  - fui dejado
  - permanecí
  lexicon: LSJ
  rationale: En español, 'quedé' expresa con naturalidad el resultado pasivo de haber sido dejado como el único sobreviviente, sin necesidad de una pasiva más pesada.
- source_word: ἐγὼ μόνος
  english_pob_choice: I alone
  chosen_spanish: yo solo
  alternatives_spanish:
  - yo únicamente
  - yo por mi parte, solo
  lexicon: LSJ
  rationale: La combinación 'yo solo' reproduce el énfasis de ἐγὼ μόνος de forma idiomática y clara en español.
translation_notes:
  revision_awareness: La base inglesa más reciente cambió 'were destroyed' a 'perished'; el español sigue esa revisión con 'perecieron', manteniendo el tono sobrio y el alcance semántico del griego. No se introdujeron notas porque el verso no presenta una variante textual o teológica que requiera aclaración adicional en español.
  spanish_consistency_notes:
  - Se conserva un registro sobrio y bíblico sin arcaísmos innecesarios.
  - '''Israel'' se mantiene como nombre propio sin glosa adicional.'
  - La primera persona singular enfatizada ('yo solo') corresponde bien al griego con orden natural en español.
