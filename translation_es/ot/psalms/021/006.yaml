review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del hebreo: cláusula enfática inicial (''Grande es''), ''su gloria'', la referencia a la salvación/liberación divina, y la concesión de esplendor y majestad al rey. También preserva correctamente las alternativas léxicas para בִּישׁוּעָתֶךָ. Sin embargo, la frase final ''tú le das esplendor y majestad sobre él'' no representa bien תְּשַׁוֶּה עָלָיו en español natural: duplica el complemento indirecto y el locativo de forma torpe, cuando el sentido es ''pones/confieres sobre él'' o, idiomáticamente, ''le confieres''.'
  spanish_quality_summary: 'El español es mayormente claro y digno, pero presenta dos problemas de legibilidad. Primero, las notas están ancladas al revés: [a] aparece en ''gloria'' aunque explica ''salvación'', y [b] aparece en ''por'' aunque la nota b del inglés también acompaña ''salvation''. Segundo, ''tú le das esplendor y majestad sobre él'' suena poco natural en español bíblico contemporáneo. ''Tú le confieres esplendor y majestad'' o ''pones sobre él esplendor y majestad'' es más fiel y fluido.'
  glossary_alignment: No hay conflicto con la terminología base del proyecto. 'Salvación' para יְשׁוּעָה, 'gloria' para כָּבוֹד, 'esplendor' y 'majestad' para הוֹד / הָדָר son apropiados. El ajuste necesario es estilístico y de anclaje de notas, no terminológico.
  issues:
  - severity: medium
    issue: Las notas al pie están ancladas en lugares incorrectos.
    rationale: La nota sobre el sentido de 'salvación' está marcada en 'gloria', y la nota sobre la preposición está marcada en 'por'. En el modelo inglés, ambas notas acompañan la expresión de salvación; en español deben anclarse allí para evitar confusión.
  - severity: medium
    issue: La frase 'tú le das esplendor y majestad sobre él' es poco natural y semánticamente torpe.
    rationale: El hebreo expresa la idea de poner/conferir algo sobre alguien. En español, combinar 'le das' con 'sobre él' resulta redundante y suena forzado. 'Le confieres esplendor y majestad' preserva mejor el sentido de concesión real.
  revised_spanish_text: Grande es su gloria por tu salvación[a][b]; tú le confieres esplendor y majestad.
  revised_footnotes:
  - marker: a
    text: «Salvación» también puede entenderse aquí como «liberación» o, en este contexto real, «victoria».
    reason: lexical_alternative
  - marker: b
    text: La preposición hebrea puede expresar medio o esfera; por eso también podría leerse «mediante tu salvación» o «en tu salvación».
    reason: lexical_alternative
  revision_rationale: Se corrigieron los anclajes de las notas para que ambas expliquen 'tu salvación', como en el rastro de auditoría inglés. También se reemplazó 'tú le das ... sobre él' por 'tú le confieres ...', que expresa naturalmente en español el sentido de conferir/poner sobre alguien honor real, sin añadir torpeza sintáctica. Se mantuvo 'por tu salvación' como una opción aceptable para el valor instrumental amplio de ב, con alternativas preservadas en nota.
