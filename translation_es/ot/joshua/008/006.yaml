review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido del hebreo y del POB inglés: salida de los hombres de Hai en persecución, propósito de apartarlos de la ciudad, razón expresada por «porque dirán», referencia retrospectiva a la retirada anterior, y cierre con la huida planificada de Israel. Sin embargo, «después de nosotros» suena menos natural y menos idiomático en contexto militar que «tras nosotros», y el punto y coma antes de «y huiremos» puede simplificarse con coma para un flujo más natural en español bíblico moderno.'
  spanish_quality_summary: La redacción es clara y digna, pero puede pulirse para sonar más natural en español eclesial contemporáneo. «Tras nosotros» funciona mejor que «después de nosotros» en una escena de persecución. El resto del verso es legible y fiel. Las notas son útiles; la nota léxica conviene ajustar para reflejar mejor el contraste entre «alejar» y «atraer fuera», evitando la frase algo extraña «tirar hacia fuera».
  glossary_alignment: No hay términos del glosario maestro especialmente controvertidos en este versículo. El borrador mantiene bien el registro militar con «huir». No hay conflictos con Yahvé/Mesías/etc. La decisión «alejado» respeta la racionalidad léxica del POB frente a una opción más interpretativa.
  issues:
  - severity: medium
    issue: «después de nosotros» en contexto de persecución
    rationale: Aunque comprensible, suena menos idiomático en español que «tras nosotros» cuando un enemigo sale persiguiendo a otro. «Tras nosotros» conserva mejor el valor espacial y militar de אַחֲרֵינוּ.
  - severity: low
    issue: Puntuación antes de «y huiremos»
    rationale: El punto y coma no es incorrecto, pero una coma mantiene mejor el flujo de la cita y el paralelismo narrativo en español moderno.
  - severity: low
    issue: Redacción de la nota léxica a
    rationale: «Tirar hacia fuera» es poco natural en español. Conviene explicar que el verbo hebreo significa apartar o sacar/arrastrar fuera, sin introducir una formulación extraña.
  revised_spanish_text: 'Y saldrán tras nosotros hasta que los hayamos alejado de la ciudad[a], porque dirán[b]: «Huyen delante de nosotros, como la primera vez», y huiremos delante de ellos.'
  revised_footnotes:
  - marker: a
    text: O, de manera más interpretativa, «hasta que los hayamos atraído fuera de la ciudad». El verbo hebreo significa apartar, sacar o arrastrar fuera; «alejado» preserva el sentido básico sin hacer explícita de más la táctica.
    reason: lexical_alternative
  - marker: b
    text: «Como la primera vez» alude a la retirada anterior de Israel ante Hai (véase Josué 7:4–5).
    reason: cross_reference
  revision_rationale: Se hizo una reparación menor para mejorar la naturalidad del español y afinar la nota léxica, sin cambiar el sentido del original ni las decisiones del POB inglés. «Tras nosotros» expresa mejor la persecución; la puntuación se suavizó; y la nota a quedó más idiomática y precisa.
