translation:
  language: es
  text: Restaúranos[a], Dios de nuestra salvación, y aparta tu ira de nosotros.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Vuélvenos». El verbo hebreo puede significar más literalmente «hacer volver».
    reason: lexical_alternative
lexical_decisions:
- source_word: שׁוּבֵנוּ
  english_pob_choice: Restore us
  chosen_spanish: Restáuranos
  alternatives_spanish:
  - Vuélvenos
  - Haznos volver
  lexicon: HALOT
  rationale: El verbo hebreo en piel/causativo expresa ‘hacer volver’ o ‘restaurar’. En español, ‘Restáuranos’ conserva la iniciativa divina y la fuerza de petición renovadora que el contexto pide, sin reducirlo solo a conversión moral. ‘Haznos volver’ sería más literal, pero menos natural y menos compacto para el estilo de publicación.
- source_word: אֱלֹהֵי יִשְׁעֵנוּ
  english_pob_choice: God of our salvation
  chosen_spanish: Dios de nuestra salvación
  alternatives_spanish:
  - Dios de nuestra liberación
  - nuestro Dios salvador
  lexicon: HALOT
  rationale: La construcción en genitivo se preserva con ‘de nuestra salvación’. ‘Salvación’ mantiene el peso teológico del sustantivo hebreo mejor que ‘liberación’, aunque esta última sea posible. Se evita rehacer la frase como adjetivo para no perder la forma constructiva del original.
- source_word: וְהָפֵר
  english_pob_choice: put away
  chosen_spanish: aparta
  alternatives_spanish:
  - anula
  - retira
  - haz cesar
  lexicon: HALOT
  rationale: El verbo puede significar quebrar, anular o frustrar. Con ‘tu ira’ como objeto, en español ‘aparta’ expresa con naturalidad la idea de quitar de encima o remover, manteniendo el imperativo sin sonar técnico. ‘Anula’ es más abstracto y ‘haz cesar’ más explicativo de lo que el hebreo exige.
- source_word: כַּעַסְךָ
  english_pob_choice: your anger
  chosen_spanish: tu ira
  alternatives_spanish:
  - tu enojo
  - tu indignación
  lexicon: HALOT
  rationale: ‘Ira’ conserva el registro bíblico y la intensidad del término sin volverse coloquial. ‘Enojo’ suaviza demasiado el tono; ‘indignación’ es posible, pero menos natural en esta plegaria dirigida a Dios.
- source_word: עִמָּנוּ
  english_pob_choice: from us
  chosen_spanish: de nosotros
  alternatives_spanish:
  - de en medio de nosotros
  - de sobre nosotros
  lexicon: HALOT
  rationale: Aunque la preposición básica puede ser ‘con’, aquí el contexto verbal de apartar/remover exige en español una relación de alejamiento. ‘De nosotros’ comunica la retirada del enojo sin introducir explícitamente una lectura interpretativa más fuerte que el hebreo.
theological_decisions:
- issue: Si el verbo inicial debe leerse como simple arrepentimiento humano o como restauración/cambio de estado producido por Dios
  english_pob_reading: Restore us
  chosen_spanish_reading: Restáuranos
  alternative_spanish_readings:
  - Vuélvenos
  - Conviértenos
  rationale: La petición en el salmo se orienta a la reanudación del favor y la comunión del pacto tras la ira divina. ‘Restáuranos’ deja clara la iniciativa de Dios y mantiene abierta la tensión entre retorno moral y renovación del pueblo, sin limitarla a una sola dimensión.
  doctrine_reference: Translation philosophy §3, §6
translation_notes:
  revision_awareness: 'Se mantiene el acuerdo alto del control previo: no hubo revisiones sustanciales en el pasaje inglés de referencia, y la decisión principal sigue siendo la equivalencia óptima de שׁוּבֵנוּ como petición de restauración divina.'
  spanish_consistency_notes:
  - Se mantiene el tratamiento de Yahvé por defecto en la serie, pero en este versículo el hebreo usa אֱלֹהִים, por lo que corresponde «Dios».
  - Se evitó «SEÑOR» o «Yahvé» porque no aparece el tetragrámaton en este texto.
  - La nota de alternativa conserva la tensión lexical entre «restaurar» y «hacer volver», como en el registro inglés.
  - ‘Ira’ se eligió para mantener el tono solemne y bíblico, coherente con el campo semántico de כַּעַס.
  - La puntuación sigue la sintaxis poética del hebreo con una cláusula imperativa principal y una segunda petición coordinada.
