    issue: La nota [b] está anclada en la frase equivocada.
    rationale: La nota explica la alternativa «en Arbactis» para ἐν Ἀρβάκτοις, pero en el borrador aparece sobre «todo lo que tenían». Esto desajusta la evidencia fuente y la trazabilidad del audit trail.
  - severity: medium
    issue: «Y tomó a ellos» es una construcción poco idiomática en español.
    rationale: Aunque calca el orden del inglés, en español suena forzado. «Y los tomó» conserva el sentido de παρέλαβεν sin introducir una paráfrasis.
  - severity: low
    issue: «desde Galilea / desde Arbactis» es menos natural que «de Galilea / de Arbactis» en este contexto narrativo.
    rationale: Ambas opciones son posibles, pero «de» es la forma más fluida y normal para origen con verbos de recoger/trasladar en español bíblico narrativo.
