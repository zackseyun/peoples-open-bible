base_translation:
  language: en
  yaml_path: translation/ot/zechariah/004/006.yaml
  text: 'Then he answered and said to me[a], “This is the word of Yahweh to Zerubbabel: ‘Not by might, nor by power[b], but by my Spirit,’ says Yahweh of Armies.”'
  footnotes:
  - marker: a
    text: Or “Not by army and not by power,” since the Hebrew word for “might” can also refer to military force.
    reason: lexical_alternative
  - marker: b
    text: 'Traditional rendering: “the LORD of hosts.”'
    reason: lexical_alternative
