translation:
  language: es
  text: 'Siguen diciendo a los que me desprecian[a]: «Yahvé ha hablado: Tendrán paz[b]»; y a todo el que anda en la obstinación de su propio corazón, les dicen: «No vendrá sobre ustedes ninguna desgracia[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «a mis despreciadores» o «a los que me desprecian y me rechazan». El hebreo dice literalmente «a los que me desprecian».'
    reason: lexical_alternative
  - marker: b
    text: «Paz» también puede incluir la idea de bienestar o prosperidad.
    reason: lexical_alternative
  - marker: c
    text: 'O: «ningún mal». Aquí «mal» se refiere a calamidad o desastre, no a maldad moral.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֹמְרִים אָמוֹר
  english_pob_choice: They keep saying
  chosen_spanish: Ellos siguen diciendo
  alternatives_spanish:
  - Ellos dicen continuamente
  - Siguen diciendo
  lexicon: HALOT
  rationale: La combinación de participio más infinitivo absoluto expresa repetición e insistencia. «Siguen diciendo» conserva ese valor iterativo en español natural sin volverlo mecánico.
- source_word: לִמְנַאֲצַי
  english_pob_choice: to those who despise me
  chosen_spanish: a los que me desprecian
  alternatives_spanish:
  - a mis despreciadores
  - a los que me desprecian y me desprecian
  lexicon: HALOT
  rationale: El participio de נאץ con sufijo de primera persona apunta a quienes desprecian al propio Yahvé. «Me desprecian» mantiene el ataque personal y resulta más claro que una nominalización pesada.
- source_word: דִּבֶּר יְהוָה
  english_pob_choice: The LORD has spoken
  chosen_spanish: Yahvé ha hablado
  alternatives_spanish:
  - Yahvé habló
  - Yahvé dice
  lexicon: HALOT
  rationale: El perfecto con sujeto divino funciona como fórmula profética de autoridad ya pronunciada. Se usa «Yahvé» según la terminología del proyecto, no una sustitución por título.
- source_word: שָׁלוֹם
  english_pob_choice: peace
  chosen_spanish: paz
  alternatives_spanish:
  - bienestar
  - prosperidad
  lexicon: HALOT
  rationale: En este contexto profético, שָׁלוֹם anuncia seguridad y bienestar; «paz» es la forma breve y normal en español, y conserva el eco bíblico del término.
- source_word: יִהְיֶה לָכֶם
  english_pob_choice: you will have
  chosen_spanish: Tendrán
  alternatives_spanish:
  - Habrá para ustedes
  - Les tocará
  lexicon: HALOT
  rationale: 'Se adapta la construcción existencial hebrea a un futuro idiomático español: «Tendrán paz» en vez de una estructura más literal y menos natural.'
- source_word: וְכֹל הֹלֵךְ
  english_pob_choice: and to everyone who walks
  chosen_spanish: y a todo el que anda
  alternatives_spanish:
  - y a todo el que camina
  - y a cualquiera que anda
  lexicon: HALOT
  rationale: «Andar» reproduce bien la metáfora ética de conducta continua, común en español bíblico y comprensible hoy.
- source_word: בִּשְׁרִרוּת לִבּוֹ
  english_pob_choice: in the stubbornness of his own heart
  chosen_spanish: en la obstinación de su propio corazón
  alternatives_spanish:
  - en la terquedad de su corazón
  - según la dureza de su corazón
  lexicon: HALOT
  rationale: שְׁרִרוּת expresa obstinación o terquedad; «obstinación» mantiene esa fuerza. «Su propio corazón» conserva el matiz reflexivo del hebreo.
- source_word: אָמְרוּ
  english_pob_choice: they say
  chosen_spanish: le dicen
  alternatives_spanish:
  - dicen
  - han dicho
  lexicon: HALOT
  rationale: En la segunda cola, el verbo retoma el habla de los falsos profetas hacia otra clase de destinatarios. «Le dicen» mantiene el paralelismo discursivo y la inmediatez del presente contextual.
- source_word: לֹא תָבוֹא עֲלֵיכֶם רָעָה
  english_pob_choice: No disaster will come upon you
  chosen_spanish: No vendrá sobre ustedes ninguna desgracia
  alternatives_spanish:
  - No vendrá sobre ustedes ningún mal
  - Ninguna calamidad vendrá sobre ustedes
  lexicon: HALOT
  rationale: En este contexto profético, רָעָה significa calamidad o desastre, no mal moral. «Desgracia» comunica bien esa idea en español; «vendrá sobre ustedes» reproduce la preposición hebrea עַל.
theological_decisions:
- issue: Referente de «me» en «los que me desprecian»
  english_pob_reading: The 'me' refers to the LORD, not Jeremiah.
  chosen_spanish_reading: «Me» se entiende como Yahvé, no como Jeremías.
  alternative_spanish_readings:
  - «Me» podría leerse como Jeremías
  rationale: El contexto inmediato presenta la fórmula «Yahvé ha hablado», de modo que el rechazo se dirige al propio Dios en boca del profeta. Se conserva el pronombre de primera persona para no borrar la tensión interpretativa del hebreo.
  doctrine_reference: Contexto profético de Jeremías 23; discurso directo de Yahvé en denuncia de falsos profetas
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y coincide sustancialmente con el auditorial inglés; se ajustó principalmente la fluidez española, manteniendo la fuerza iterativa de los verbos de decir, el valor profético de שָׁלוֹם y el sentido de רָעָה como calamidad.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יהוה conforme a la política del proyecto.
  - Se conserva la metáfora ética de «andar» para הֹלֵךְ.
  - «Desgracia» traduce רָעָה en sentido de calamidad, no de mal moral.
  - La alternancia entre «me desprecian» y «Yahvé ha hablado» preserva el referente divino del pronombre sin explicitarlo en el texto principal.
