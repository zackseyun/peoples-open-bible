translation:
  language: es
  text: 'Y José les dijo: «¿Qué es este hecho que han cometido? ¿No sabían que un hombre como yo en verdad practica la adivinación[a]?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ciertamente adivina», «seguramente practica la adivinación» o «puede ciertamente descubrir tales cosas». El hebreo usa una forma intensificada del verbo de la raíz de adivinación.
    reason: lexical_alternative
lexical_decisions:
- source_word: מָה הַמַּעֲשֶׂה הַזֶּה
  english_pob_choice: What is this deed
  chosen_spanish: ¿Qué es este acto
  alternatives_spanish:
  - ¿Qué es esta cosa
  - ¿Qué es esta acción
  lexicon: HALOT
  rationale: מַעֲשֶׂה puede ser ‘acto’, ‘hecho’ o ‘obra’. ‘Acto’ conserva el peso acusatorio de la frase y suena natural en español, sin volverla demasiado abstracta con ‘cosa’.
- source_word: עֲשִׂיתֶם
  english_pob_choice: you have done
  chosen_spanish: ustedes han hecho
  alternatives_spanish:
  - ustedes hicieron
  lexicon: HALOT
  rationale: El perfecto en el discurso directo se expresa con naturalidad en español con presente perfecto, manteniendo la relevancia inmediata de la acusación.
- source_word: הֲלוֹא יְדַעְתֶּם
  english_pob_choice: Did you not know
  chosen_spanish: ¿No sabían
  alternatives_spanish:
  - ¿No supieron
  - ¿No se dieron cuenta
  lexicon: HALOT
  rationale: La pregunta con negación espera una respuesta afirmativa. ‘¿No sabían?’ conserva la fuerza retórica sin sobreparafrasear.
- source_word: נַחֵשׁ יְנַחֵשׁ
  english_pob_choice: indeed practices divination
  chosen_spanish: en verdad practica adivinación
  alternatives_spanish:
  - ciertamente adivina
  - seguramente practica adivinación
  - ciertamente usa adivinación
  lexicon: HALOT
  rationale: La repetición intensifica el verbo. En español, ‘practica adivinación’ comunica el sentido de forma clara y digna, preservando la tensión textual sin resolver si la afirmación describe práctica real o habla estratégica de José.
- source_word: אִישׁ אֲשֶׁר כָּמֹנִי
  english_pob_choice: a man like me
  chosen_spanish: un hombre como yo
  alternatives_spanish:
  - un hombre semejante a mí
  - alguien como yo
  lexicon: HALOT
  rationale: ‘Un hombre como yo’ reproduce de manera directa la singularidad masculina del hebreo y resulta idiomático en español.
- source_word: יוֹסֵף
  english_pob_choice: Joseph
  chosen_spanish: José
  alternatives_spanish:
  - Joseph
  lexicon: Onomástica bíblica española estándar
  rationale: En español bíblico, el nombre propio se traduce convencionalmente como ‘José’.
theological_decisions:
- issue: La afirmación de José sobre la adivinación
  english_pob_reading: 'Render the statement directly as part of Joseph''s speech: ''a man like me indeed practices divination'''
  chosen_spanish_reading: 'Traducirla de manera directa como parte del habla de José: «un hombre como yo en verdad practica adivinación»'
  alternative_spanish_readings:
  - «un hombre como yo ciertamente adivina»
  - «un hombre como yo puede ciertamente descubrir estas cosas»
  - «un hombre como yo seguramente sabe por adivinación»
  rationale: El hebreo usa explícitamente la raíz נחש en forma intensificada. La traducción debe reflejar la declaración sin suavizarla ni decidir por anticipado si José realmente practicaba adivinación o si estaba hablando dentro de su personaje egipcio. Se conserva así la tensión narrativa y teológica.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: Se revisó la redacción para reflejar la intensificación hebrea de נַחֵשׁ יְנַחֵשׁ con una afirmación directa en español, evitando tanto el mero valor de posibilidad como una atenuación interpretativa.
  spanish_consistency_notes:
  - Se emplea ‘José’ como forma bíblica española estándar del nombre propio.
  - Se preserva ‘adivinación’ para נחש, en lugar de reemplazarlo por un término más genérico como ‘descubrir’, porque el texto hebreo es explícito.
  - Se usa ‘ustedes’ para la segunda persona plural, con registro claro y contemporáneo.
  - El marcador [a] aparece en el texto exactamente donde corresponde a la nota léxica.
