    rationale: El inglés auditado conserva 'will send' como alternativa. En español, 'mandará' normalmente significa 'dará una orden', no 'enviará'. La alternativa correcta es 'enviará'; 'extiende' puede mantenerse como opción interpretativa.
  - severity: low
    issue: La nota a usa 'bastón' donde 'vara' o 'cetro' son más naturales en registro bíblico.
    rationale: No es incorrecto, pero 'bastón' puede sonar más cotidiano y menos adecuado para un contexto regio. Aun así, como alternativa léxica secundaria no impide la comprensión.
