translation:
  language: es
  text: Cuando yo sanaba a Israel[a], se descubre la iniquidad de Efraín y las maldades de Samaria; porque practican la falsedad.[b] Entra un ladrón; una banda saquea fuera.[c]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Cuando yo había sanado a Israel» o «Mientras yo sanaba a Israel».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «porque obran engaño».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «una banda de salteadores saquea fuera».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּרָפְאִי
  english_pob_choice: When I would heal
  chosen_spanish: Cuando yo quisiera sanar
  alternatives_spanish:
  - Cuando yo sanaba
  - Mientras yo sanaba
  - Cuando yo sanara
  lexicon: HALOT
  rationale: El כ temporal con la forma verbal marca el momento circunstancial de la acción divina de sanar. En español, «Cuando yo quisiera sanar» conserva bien el valor prospectivo/intencional que la POB inglesa captó con «would heal», sin perder la referencia a una acción en curso o propuesta por Dios.
- source_word: לְיִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: a Israel
  alternatives_spanish:
  - para Israel
  - de Israel
  lexicon: HALOT
  rationale: Se mantiene el nombre propio sin transliteración alterada. El dativo/beneﬁciario se expresa naturalmente con «a Israel» en español.
- source_word: וְנִגְלָה
  english_pob_choice: is uncovered
  chosen_spanish: se descubre
  alternatives_spanish:
  - se revela
  - queda descubierto
  lexicon: HALOT
  rationale: El nifal de גלה sugiere exposición de algo oculto. «Se descubre» conserva la imagen de una culpa puesta al descubierto, equivalente al valor metafórico de «uncovered».
- source_word: עֲוֺן
  english_pob_choice: iniquity
  chosen_spanish: iniquidad
  alternatives_spanish:
  - culpa
  - maldad
  - pecado
  lexicon: HALOT
  rationale: «Iniquidad» mantiene el peso moral y pactual del término mejor que un «pecado» más general. También refleja de cerca la elección inglesa.
- source_word: אֶפְרַיִם
  english_pob_choice: Ephraim
  chosen_spanish: Efraín
  alternatives_spanish:
  - Efraím
  lexicon: HALOT
  rationale: Se usa la forma española establecida del nombre propio bíblico. En Oseas conserva además su valor metonímico para el reino del norte.
- source_word: וְרָעוֹת
  english_pob_choice: the evils
  chosen_spanish: las maldades
  alternatives_spanish:
  - los males
  - las evilidades
  - las obras malas
  lexicon: HALOT
  rationale: El plural de רעה aquí apunta a acciones moralmente malas. «Maldades» comunica el plural concreto sin forzar una formulación demasiado abstracta.
- source_word: שֹׁמְרוֹן
  english_pob_choice: Samaria
  chosen_spanish: Samaria
  alternatives_spanish:
  - Samaría
  lexicon: HALOT
  rationale: Se conserva el nombre tradicional español de la capital, que funciona metonímicamente por sus habitantes y su régimen.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introducción causal natural en español. Aquí expresa la razón por la cual se descubre la iniquidad y las maldades.
- source_word: פָעֲלוּ שָׁקֶר
  english_pob_choice: they practice falsehood
  chosen_spanish: practican la falsedad
  alternatives_spanish:
  - obran falsamente
  - practican el engaño
  - trabajan el engaño
  lexicon: HALOT
  rationale: El verbo «hacer/obrar» con שקר expresa conducta habitual. «Practican la falsedad» conserva el matiz de actividad sostenida y mantiene un registro bíblico claro en español.
- source_word: וְגַנָּב יָבֹוא
  english_pob_choice: A thief comes in
  chosen_spanish: Entra un ladrón
  alternatives_spanish:
  - Viene un ladrón
  - Se mete un ladrón
  - Un ladrón entra
  lexicon: HALOT
  rationale: El hebreo presenta un singular genérico. «Entra un ladrón» es breve y natural, y preserva la imagen de intrusión sin añadir más de lo que el texto exige.
- source_word: פָּשַׁט גְּדוּד בַּחוּץ
  english_pob_choice: a band raids outside
  chosen_spanish: una banda saquea afuera
  alternatives_spanish:
  - una banda de salteadores saquea afuera
  - una tropa invade afuera
  - un grupo de asaltantes merodea afuera
  lexicon: HALOT
  rationale: פָּשַׁט con גדוד evoca incursión/razzia de un grupo armado. «Saquea» mantiene la idea de despojo y asalto, mientras «afuera» conserva el contraste espacial con el ladrón que entra en casa.
theological_decisions:
- issue: Marco temporal de la sanidad divina frente a la culpa expuesta
  english_pob_reading: The verse presents God's intended or ongoing act of healing Israel as the moment when Ephraim's guilt is exposed.
  chosen_spanish_reading: El versículo presenta la acción divina de sanar a Israel como el momento en que se pone al descubierto la culpa de Efraín.
  alternative_spanish_readings:
  - Dios sanaba a Israel y entonces se descubría la culpa de Efraín.
  - Cuando Dios sana a Israel, queda expuesta la culpa de Efraín.
  rationale: 'El hebreo permite leer la cláusula temporal como circunstancia de una acción de sanidad en curso o intentada. Se conserva la tensión: la restauración no oculta el pecado, sino que lo saca a la luz. La redacción española mantiene esa relación sin resolverla en exceso.'
  doctrine_reference: Exégesis contextual de Oseas; no implica una disputa doctrinal específica.
translation_notes:
  revision_awareness: La base inglesa revisó «evil deeds» a «evils» y suavizó la cola final a «a band raids outside». La versión española sigue esa revisión manteniendo correspondencia más cercana con el plural hebreo en «maldades» y una clausula final breve y natural con «una banda saquea afuera».
  spanish_consistency_notes:
  - Se conserva «Yahvé» solo cuando el texto lo requiera explícitamente; este versículo no lo contiene.
  - «Efraín» y «Samaria» se mantienen como nombres propios metonímicos, sin explicitar el reino del norte para no añadir glosa al texto principal.
  - «Falsedad» se usa para שָׁקֶר de modo uniforme con la POB inglesa, evitando alternar con «engaño» en el cuerpo del versículo.
  - 'La sintaxis mantiene el paralelismo de dos acciones breves: intrusión del ladrón y saqueo exterior, sin expandir el segundo miembro.'
