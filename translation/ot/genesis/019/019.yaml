  chosen_reading: steadfast love
  alternative_readings:
  - kindness
  - mercy
  - covenant loyalty
  rationale: The verse highlights gracious, loyal benevolence shown in preserving Lot's life. 'Steadfast love' preserves the covenantal and theological depth of חסד without overstating a technical covenant formula in this immediate context.
