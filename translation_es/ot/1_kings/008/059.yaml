base_translation:
  language: en
  yaml_path: translation/ot/1_kings/008/059.yaml
  text: And may these words of mine[a], with which I have pleaded before Yahweh, be near Yahweh our God day and night, that he may uphold the cause of his servant and the cause of his people Israel, as each day requires[c][b],
