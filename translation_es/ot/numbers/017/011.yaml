review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia básica del hebreo: mandato de tomar el incensario, poner fuego del altar, añadir incienso, ir con urgencia a la congregación, hacer expiación, y la razón dada por la salida de la ira desde la presencia de Yahvé y el inicio de la plaga. Sin embargo, hay dos desajustes relevantes con la línea auditable del POB y con la naturalidad fiel del español: «de sobre el altar» suena forzado frente a «del altar», y «haz expiación por ellos» se aparta innecesariamente de la decisión teológica documentada «make atonement», mejor representada en español como «haz expiación por ellos» o «haz expiación por ellos» solo si se justificara; pero aquí el proyecto pide preservar la racionalidad documentada y la formulación más estable en español bíblico es «haz expiación por ellos» o mejor «haz expiación por ellos»? Aun así, el problema principal es que el borrador introduce una nota b sobre «ira» que no corresponde a la nota inglesa, mientras
    omite la nota documentada sobre «de delante de Yahvé / de su presencia».'
  spanish_quality_summary: El texto es generalmente claro y digno, pero «fuego de sobre el altar» no es idiomático en español neutral; «fuego del altar» o «fuego tomado del altar» lee mejor sin pérdida de sentido. «Ve rápidamente» es entendible, aunque «ve pronto» o «ve de prisa» podrían sonar más naturales; no es un error. «Haz expiación por ellos» es comprensible, pero en español bíblico y eclesial «haz expiación» es aceptable; aun así, la consistencia con la decisión inglesa sobre atonement conviene señalarla. La puntuación y el registro general son buenos.
  glossary_alignment: 'Se respeta correctamente Yahvé para יְהוָה, incienso para קְטֹרֶת, congregación para הָעֵדָה y plaga para הַנָּגֶף. El mayor ajuste de glosario/documentación está en la nota: el inglés conserva una nota para «from before Yahweh», no para «wrath». También conviene alinear mejor la frase del fuego con la revisión inglesa final («from the altar»).'
  issues:
  - severity: medium
    issue: «de sobre el altar» suena poco natural en español
    rationale: Aunque intenta conservar מֵעַל, la revisión inglesa ya optó por una formulación más natural («from the altar»). En español, «del altar» preserva el sentido sin calco extraño.
  - severity: medium
    issue: La nota [b] está anclada en «ira» en vez de en «de delante de Yahvé»
    rationale: La pista auditada inglesa documenta la literalidad de מִלִּפְנֵי יְהוָה (‘from before Yahweh’), no una aclaración sobre «wrath». La nota española debería seguir esa justificación.
  - severity: low
    issue: La alternativa «brasero» para הַמַּחְתָּה es menos precisa que «incensario», pero aceptable como nota
    rationale: No requiere cambio, pero conviene mantenerla solo como alternativa léxica, no como preferencia principal.
  revised_spanish_text: 'Entonces Moisés dijo a Aarón[a]: «Toma el incensario, y pon en él fuego del altar, y pon incienso sobre él, y ve rápidamente a la congregación y haz expiación por ellos, porque la ira ha salido de delante de Yahvé[b]; la plaga ha comenzado».'
  revised_footnotes:
  - marker: a
    text: O «el brasero».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «de delante de Yahvé», es decir, de su presencia.
    reason: lexical_alternative
  revision_rationale: Se ajusta «de sobre el altar» a «del altar» para un español más natural y en línea con la revisión inglesa auditada. Se conserva el resto de la estructura. La nota b se mueve desde «ira» a «de delante de Yahvé» para reflejar correctamente la decisión léxica documentada sobre מִלִּפְנֵי יְהוָה. No se requiere adjudicación adicional.
