id: 2SA.14.2
reference: 2 Samuel 14:2
source:
  edition: WLC
  text: וַ/יִּשְׁלַ֤ח יוֹאָב֙ תְּק֔וֹעָ/ה וַ/יִּקַּ֥ח מִ/שָּׁ֖ם אִשָּׁ֣ה חֲכָמָ֑ה וַ/יֹּ֣אמֶר אֵ֠לֶי/הָ הִֽתְאַבְּלִי נָ֞א וְ/לִבְשִׁי נָ֣א בִגְדֵי אֵ֗בֶל וְ/אַל תָּס֨וּכִי֙ שֶׁ֔מֶן וְ/הָיִ֕ית כְּ/אִשָּׁ֗ה זֶ֚ה יָמִ֣ים רַבִּ֔ים מִתְאַבֶּ֖לֶת עַל מֵֽת־־־־־׃
translation:
  text: So Joab sent to Tekoa and took from there a wise woman[a], and he said to her, “Please pretend to be mourning, and please put on mourning clothes, and do not anoint yourself with oil[d][c][b], but be like a woman who has been mourning for the dead many days.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “Please mourn” / “Please act as a mourner.” The Hebrew verb means “mourn,” but the narrative context shows Joab is instructing her to assume mourning as part of a planned presentation.
    reason: lexical_alternative
  - marker: b
    text: Literally, “garments of mourning.”
    reason: lexical_alternative
  - marker: c
    text: Abstaining from oil was a customary sign of grief rather than normal grooming and festivity.
    reason: cultural_note
  - marker: d
    text: Literally, “like a woman mourning over the dead many days.”
    reason: lexical_alternative
lexical_decisions:
- source_word: תְּקוֹעָה
  chosen: Tekoa
  alternatives:
  - Tekoah
  lexicon: HALOT
  rationale: 'Place name transliterated per translation philosophy: names are transliterated rather than translated. ''Tekoa'' is the standard English form.'
- source_word: אִשָּׁה חֲכָמָה
  chosen: a wise woman
  alternatives:
  - a skillful woman
  - a shrewd woman
  lexicon: HALOT
  rationale: חֲכָמָה can denote wisdom, skill, or shrewdness depending on context. Here Joab recruits a woman capable of delivering a persuasive staged appeal, so 'wise woman' preserves the Hebrew wording while allowing the broader sense to be inferred from context.
- source_word: הִתְאַבְּלִי נָא
  chosen: Please pretend to be in mourning
  alternatives:
  - Please mourn
  - Please act as a mourner
  lexicon: HALOT
  rationale: The hitpael of אבל means to mourn, but in this narrative Joab is instructing the woman to assume the appearance and role of a mourner for a planned performance. 'Pretend to be in mourning' makes explicit the pragmatic force in context without departing from the sense of the verb.
- source_word: וְלִבְשִׁי נָא בִגְדֵי אֵבֶל
  chosen: and please put on mourning clothes
  alternatives:
  - and please wear garments of mourning
  - and dress in mourning garments
  lexicon: HALOT
  rationale: בִגְדֵי אֵבֶל is an idiomatic expression for clothing associated with mourning. 'Mourning clothes' is natural modern English and preserves the cultural sense.
- source_word: וְאַל תָּסוּכִי שֶׁמֶן
  chosen: and do not anoint yourself with oil
  alternatives:
  - and do not put oil on yourself
  lexicon: HALOT
  rationale: סוך with שֶׁמֶן refers to applying oil to the body as normal grooming or refreshment. 'Anoint yourself with oil' is the standard rendering and fits the mourning context, where abstaining from oil signals grief.
- source_word: וְהָיִית כְּאִשָּׁה
  chosen: but be like a woman
  alternatives:
  - and be like a woman
  lexicon: HALOT
  rationale: The clause continues Joab's instructions regarding demeanor. Rendering with 'but' captures the contrast with normal grooming practices in English, though the Hebrew conjunction is simply waw.
- source_word: זֶה יָמִים רַבִּים
  chosen: many days
  alternatives:
  - for many days
  - these many days
  - a long time
  lexicon: HALOT
  rationale: The phrase literally includes 'this' plus 'many days,' an idiom indicating an extended duration. 'Many days' is concise and natural; the sense of duration is completed by the following participle.
- source_word: מִתְאַבֶּלֶת עַל מֵת
  chosen: who has been mourning for the dead
  alternatives:
  - mourning over a dead person
  - mourning for someone dead
  lexicon: HALOT
  rationale: The participle describes an ongoing state. 'Has been mourning' conveys the durative force in idiomatic English. עַל מֵת is rendered generically as 'for the dead,' matching the Hebrew's indefinite singular used in a class sense.
