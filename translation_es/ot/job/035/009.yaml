translation:
  language: es
  text: A causa de la multitud de opresiones, claman[a]; piden ayuda a causa del brazo[b] de los poderosos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La preposición hebrea puede entenderse también más literalmente como «desde»; aquí, sin embargo, el contexto favorece un valor causal: claman porque sufren opresión.'
    reason: lexical_alternative
  - marker: b
    text: «Brazo» es una imagen hebrea de fuerza o poder.
    reason: cultural_note
lexical_decisions:
- source_word: מֵרֹב
  english_pob_choice: Because of the multitude of
  chosen_spanish: A causa de la multitud de
  alternatives_spanish:
  - Por la abundancia de
  - Debido a la multitud de
  lexicon: HALOT
  rationale: La preposición מִן con רֹב expresa aquí causa u origen. «A causa de la multitud de» conserva esa fuerza causal en un español natural y fiel al valor del hebreo.
- source_word: עֲשׁוּקִים
  english_pob_choice: oppressions
  chosen_spanish: opresiones
  alternatives_spanish:
  - actos de opresión
  - extorsiones
  lexicon: HALOT
  rationale: La forma plural participial denota acciones o situaciones de opresión. «Opresiones» mantiene el sustantivo abstracto y el paralelismo con los verbos de clamor.
- source_word: יַזְעִיקוּ
  english_pob_choice: they cry out
  chosen_spanish: claman
  alternatives_spanish:
  - gritan
  - dan alarido
  lexicon: HALOT
  rationale: El hiphil de זעק puede expresar levantar un clamor. «Claman» es un verbo digno y natural que conserva el sentido de protesta angustiada sin añadir matices no presentes.
- source_word: יְשַׁוְּעוּ
  english_pob_choice: they call for help
  chosen_spanish: piden ayuda
  alternatives_spanish:
  - claman por ayuda
  - suplican
  lexicon: HALOT
  rationale: שוע en piel expresa ruego o petición de auxilio. «Piden ayuda» distingue este segundo verbo del primero y preserva el paralelismo con una formulación clara en español.
- source_word: מִזְּרֹעַ
  english_pob_choice: because of the arm of
  chosen_spanish: a causa del brazo de
  alternatives_spanish:
  - desde el brazo de
  - por el brazo de
  lexicon: HALOT
  rationale: זְרוֹעַ es literalmente «brazo» y aquí funciona como imagen de poder o fuerza. Se conserva la metáfora con «brazo» y se mantiene la relación causal del prefijo/preposición con «a causa de».
- source_word: רַבִּים
  english_pob_choice: the mighty
  chosen_spanish: los poderosos
  alternatives_spanish:
  - los grandes
  - los muchos
  - los hombres poderosos
  lexicon: HALOT
  rationale: En este contexto רַבִּים no apunta a cantidad, sino a personas de poder. «Los poderosos» comunica bien la fuerza social implícita en el hebreo y en la imagen del «brazo».
theological_decisions:
- issue: La imagen hebrea del «brazo» como símbolo de poder
  english_pob_reading: Arm is a Hebrew image for strength or power.
  chosen_spanish_reading: «Brazo» se conserva como imagen hebrea de fuerza o poder.
  alternative_spanish_readings:
  - «Brazo» podría explicarse como fuerza o poder.
  - «Brazo» es un modo hebreo de hablar de la potencia de alguien.
  rationale: Se mantiene la metáfora para no aplanar la imagen original. En español, «brazo» sigue siendo comprensible y permite captar el paralelismo con los «poderosos» sin perder la figuración bíblica.
  doctrine_reference: Imágenes bíblicas del poder humano; uso metafórico del lenguaje corporal en el AT
translation_notes:
  revision_awareness: La versión española sigue de cerca el texto hebreo y el audit trail en inglés. Se mantiene la doble estructura causal («A causa de... / a causa de...») y la metáfora del «brazo»; no se suaviza «opresiones» ni se sustituye por una formulación menos concreta. No se detectaron revisiones previas que exigieran ajuste.
  spanish_consistency_notes:
  - Se usa «Yahvé» por defecto cuando aparezca el nombre divino, conforme a la pauta del proyecto.
  - Se preserva la metáfora corporal «brazo» en vez de reemplazarla por una abstracción, para mantener el color semítico del verso.
  - «Piden ayuda» se eligió para diferenciar claramente el segundo verbo del primero y respetar el paralelismo del hebreo.
