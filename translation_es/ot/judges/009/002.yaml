  source_alignment_summary: 'El borrador refleja bien la estructura retórica del hebreo: ruego inicial, apelación pública, comparación entre setenta hombres y un solo hombre, y cierre con el idiomático de parentesco. Sin embargo, dos elecciones debilitan la fidelidad contextual: «a oídos de» suena menos natural que el valor público de בְּאָזְנֵי, y sobre todo «los señores de Siquem» no sigue la decisión auditada de בַּעֲלֵי שְׁכֶם como hombres principales/líderes cívicos; en español puede sugerir rango feudal o cortesía social más que autoridad local.'
  spanish_quality_summary: El español es generalmente claro, pero «hablen a oídos de» resulta algo forzado, y «hueso y carne de ustedes» es menos idiomático que «su hueso y su carne» para conservar la imagen hebrea con dignidad. «Acuérdense» es comprensible, pero «recuerden» encaja mejor en registro bíblico neutral y ampliamente legible.
  glossary_alignment: 'No hay conflicto con terminología mayor del proyecto. La principal desviación es semántica/contextual: «señores» frente a la preferencia auditada «líderes» para בַּעֲלֵי שְׁכֶם. El resto —«Jerubaal», «setenta hombres», «un solo hombre», y el idiomático de parentesco con nota— está bien alineado.'
  issues:
  - severity: medium
    issue: «los señores de Siquem» para בַּעֲלֵי שְׁכֶם
    rationale: Aunque lexicálmente posible, en español moderno eclesial «señores» sugiere nobleza, trato de cortesía o señorío feudal. El contexto y el audit trail apuntan a hombres influyentes o autoridades cívicas; «líderes» comunica eso con más precisión y claridad.
  - severity: medium
    issue: «hablen a oídos de» para בְּאָזְנֵי
    rationale: La locución es entendible pero suena menos natural en español que «hablen para que oigan» o «hablen ante». El hebreo expresa dirigirse públicamente para ser escuchados; conviene una formulación más idiomática.
  - severity: low
    issue: «hueso y carne de ustedes»
    rationale: Preserva el contenido, pero la posesión pospuesta suena algo dura. «Su hueso y su carne» conserva mejor el hebraísmo en español digno y legible.
  - severity: low
    issue: «acuérdense» en registro
    rationale: No es incorrecto, pero «recuerden» ofrece un registro más neutral y literario para una edición bíblica ampliamente eclesial.
