    unchanged: false
    changes_summary: Changed 'sent a proclamation' to 'made a proclamation' for more natural and accurate rendering of the idiom 'caused a voice/proclamation to pass'.
translation:
  language: es
  text: 'En el primer año de Ciro, rey de Persia, para que se cumpliera la palabra de Yahvé por boca de Jeremías, Yahvé despertó el espíritu de Ciro, rey de Persia, e hizo pregonar[a] por todo su reino, y también por escrito, diciendo:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Pregonar» intenta reflejar la idea hebrea de «hacer pasar una voz/proclamación»; también podría entenderse como «hacer una proclamación pública».
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בִ/שְׁנַ֣ת אַחַ֗ת
  english_pob_choice: Now in the first year
  chosen_spanish: En el primer año
  alternatives_spanish:
  - Ahora, en el primer año
  - Y en el primer año
  lexicon: HALOT
  rationale: Es una fórmula temporal de arranque narrativo; en español, «En el primer año» conserva la datación sin añadir una partícula que suene demasiado interpretativa.
- source_word: לְ/כ֨וֹרֶשׁ֙ מֶ֣לֶךְ פָּרַ֔ס
  english_pob_choice: of Cyrus king of Persia
  chosen_spanish: de Ciro, rey de Persia
  alternatives_spanish:
  - de Ciro rey de Persia
  - de Ciro, el rey de Persia
  lexicon: HALOT
  rationale: Se mantiene la estructura de genitivo con aposición real; el nombre propio se translitera como «Ciro» y el título se traduce con naturalidad.
- source_word: לִ/כְל֥וֹת
  english_pob_choice: so that ... might be fulfilled
  chosen_spanish: para que se cumpliera
  alternatives_spanish:
  - para completar
  - para llevar a término
  lexicon: HALOT
  rationale: En contexto profético, el infinitivo expresa finalidad ligada al cumplimiento de la palabra; «se cumpliera» preserva esa fuerza sin volverla mecánica.
- source_word: דְּבַר יְהוָ֖ה
  english_pob_choice: the word of Yahweh
  chosen_spanish: la palabra de Yahvé
  alternatives_spanish:
  - el mensaje de Yahvé
  lexicon: HALOT
  rationale: «Palabra» conserva el peso profético y la formulación bíblica; se usa el nombre divino conforme al criterio del proyecto.
- source_word: בְּ/פִ֣י יִרְמְיָ֑הוּ
  english_pob_choice: by the mouth of Jeremiah
  chosen_spanish: por boca de Jeremías
  alternatives_spanish:
  - por medio de Jeremías
  - por la boca de Jeremías
  lexicon: HALOT
  rationale: La imagen hebrea de mediación profética se conserva de forma idiomática en español con «por boca de», que suena natural y fiel.
- source_word: הֵעִ֣יר
  english_pob_choice: stirred up
  chosen_spanish: despertó
  alternatives_spanish:
  - incitó
  - movió
  lexicon: HALOT
  rationale: El verbo expresa un despertar/estimular interior; «despertó» mantiene la idea de impulso divino sin cargarla innecesariamente con matices negativos.
- source_word: אֶת ר֨וּחַ֙ כּ֣וֹרֶשׁ
  english_pob_choice: the spirit of Cyrus
  chosen_spanish: el espíritu de Ciro
  alternatives_spanish:
  - la mente de Ciro
  - el ánimo de Ciro
  lexicon: HALOT
  rationale: «Espíritu» preserva la forma léxica רוּחַ y sugiere la disposición interior movida por Yahvé, sin reducirla solo a psicología.
- source_word: וַ/יַּֽעֲבֶר קוֹל֙
  english_pob_choice: he made a proclamation
  chosen_spanish: hizo pregonar
  alternatives_spanish:
  - hizo una proclamación
  - mandó publicar
  lexicon: HALOT
  rationale: La construcción hebrea de «hacer pasar una voz» se refleja con un verbo castellano que expresa anuncio público; «pregonar» mantiene el carácter oficial y oral.
- source_word: בְּ/כָל מַלְכוּת֔/וֹ
  english_pob_choice: throughout all his kingdom
  chosen_spanish: por todo su reino
  alternatives_spanish:
  - en todo su reino
  - a través de todo su reino
  lexicon: HALOT
  rationale: La preposición distributiva se vierte con una locución natural que comunica alcance total dentro del dominio de Ciro.
- source_word: וְ/גַם בְּ/מִכְתָּ֖ב
  english_pob_choice: and also in writing
  chosen_spanish: y también por escrito
  alternatives_spanish:
  - y también en un escrito
  - y también en carta
  lexicon: HALOT
  rationale: מִכְתָּב indica forma escrita; «por escrito» contrasta bien con la proclamación oral y no restringe innecesariamente el medio.
- source_word: לֵ/אמֹֽר
  english_pob_choice: 'saying:'
  chosen_spanish: 'diciendo:'
  alternatives_spanish:
  - 'así:'
  - 'en estos términos:'
  lexicon: HALOT
  rationale: Es la introducción estándar al discurso directo; «diciendo:» mantiene la transición inmediata al contenido citado.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa explícitamente el Tetragrámaton; conforme al criterio del proyecto, se conserva el nombre divino en forma transliterada y no se sustituye por un título enmascarado.
  doctrine_reference: 'DOCTRINE.md: יְהוָה / YHWH'
- issue: Relación entre la palabra de Yahvé y la mediación profética
  english_pob_reading: the word of Yahweh by the mouth of Jeremiah
  chosen_spanish_reading: la palabra de Yahvé por boca de Jeremías
  alternative_spanish_readings:
  - la palabra de Yahvé mediante Jeremías
  - la palabra de Yahvé dicha por Jeremías
  rationale: 'Se conserva la imagen de mediación oral del hebreo בְּפִי, porque forma parte del peso teológico del versículo: la palabra divina llega por medio del profeta, no solo «a través de» él en sentido abstracto.'
  doctrine_reference: 'DOCTRINE.md: profecía y mediación de la palabra'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión auditada que prefirió una formulación más natural para la idiomática hebrea de וַיַּעֲבֶר קוֹל, evitando un calco como «envió una proclamación» y optando por un anuncio público verbalmente activo. También se respetó la decisión establecida de traducir יְהוָה como Yahvé y de mantener la mediación profética con «por boca de Jeremías».
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera uniforme para יְהוָה.
  - Se mantiene «Ciro» como transliteración fija del nombre propio.
  - «Espíritu» se escribe en minúscula porque se refiere al interior/disposición de Ciro, no al Espíritu Santo.
  - La frase «por escrito» conserva el paralelo con la proclamación oral sin sobreespecificar el género documental.
