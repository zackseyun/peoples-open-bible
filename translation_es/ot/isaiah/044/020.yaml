  glossary_alignment: No hay conflictos con la terminología del proyecto. No aparecen nombres divinos ni términos cristológicos. La decisión antropológica sobre נֶפֶשׁ como «a sí mismo» está bien alineada con la POB inglesa y con la rationale documentada.
