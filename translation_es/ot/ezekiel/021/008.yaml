translation:
  language: es
  text: 'Y dirás a la tierra de Israel: «Así dice Yahvé: He aquí, estoy contra ti, y sacaré mi espada de su vaina, y cortaré de ti tanto al justo como al impío[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «al justo y al impío». El hebreo nombra explícitamente ambos grupos, subrayando el alcance total del juicio anunciado.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַדְמַת יִשְׂרָאֵל
  english_pob_choice: the land of Israel
  chosen_spanish: la tierra de Israel
  alternatives_spanish:
  - el suelo de Israel
  - el territorio de Israel
  lexicon: HALOT
  rationale: אַדְמָה puede referirse a tierra, suelo o territorio; en un discurso profético dirigido al país personificado, «la tierra de Israel» es natural en español y conserva el valor territorial del hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se preserva el nombre divino propio del Tetragrámaton. «Yahvé» sigue el criterio del proyecto y evita sustituir el nombre por un título.
- source_word: הִנְנִי אֵלַיִךְ
  english_pob_choice: Behold, I am against you
  chosen_spanish: He aquí, estoy contra ti
  alternatives_spanish:
  - Mira, estoy contra ti
  - Aquí estoy contra ti
  lexicon: HALOT
  rationale: La fórmula hebrea expresa presencia enfática y oposición. «He aquí» mantiene el valor deíctico y «estoy contra ti» conserva el sentido adversativo.
- source_word: וְהוֹצֵאתִי
  english_pob_choice: I will draw
  chosen_spanish: sacaré
  alternatives_spanish:
  - extraeré
  - desenvainaré
  lexicon: HALOT
  rationale: El verbo significa literalmente «hacer salir»; en este contexto con «espada» y «vaina», «sacaré» comunica bien la acción sin perder la imagen concreta.
- source_word: חַרְבִּי
  english_pob_choice: my sword
  chosen_spanish: mi espada
  alternatives_spanish:
  - mi espada de guerra
  lexicon: HALOT
  rationale: Correspondencia directa del posesivo hebreo. La espada es imagen del juicio divino.
- source_word: מִתַּעְרָהּ
  english_pob_choice: from its sheath
  chosen_spanish: de su vaina
  alternatives_spanish:
  - de su funda
  - de su cinto
  lexicon: HALOT
  rationale: תַּעַר designa la vaina o funda de una espada; «vaina» es la opción más natural y precisa en español.
- source_word: וְהִכְרַתִּי
  english_pob_choice: and cut off
  chosen_spanish: y cortaré
  alternatives_spanish:
  - y extirparé
  - y destruiré
  lexicon: HALOT
  rationale: El hiphil de כרת conserva fuerza concreta de «cortar». En español, «cortaré» mantiene esa imagen; «extirparé» o «destruiré» suavizarían o generalizarían la figura.
- source_word: מִמֵּךְ
  english_pob_choice: from you
  chosen_spanish: de ti
  alternatives_spanish:
  - de en medio de ti
  - entre ti
  lexicon: HALOT
  rationale: La tierra está personificada en femenino singular; «de ti» es la forma natural y fiel de reproducir el sufijo pronominal.
- source_word: צַדִּיק וְרָשָׁע
  english_pob_choice: both righteous and wicked
  chosen_spanish: al justo y al impío
  alternatives_spanish:
  - al justo y al malvado
  - al justo y al pecador
  lexicon: HALOT
  rationale: La pareja hebrea nombra explícitamente ambas categorías. «Justo» e «impío» preservan la antítesis moral con un registro bíblico claro en español.
theological_decisions:
- issue: Alcance del juicio sobre «el justo y el impío»
  english_pob_reading: The verse states that the coming sword-judgment will affect both righteous and wicked within the land, without explaining here how this relates to broader biblical themes of individual justice.
  chosen_spanish_reading: El versículo afirma que la espada venidera alcanzará tanto al justo como al impío dentro de la tierra, sin resolver aquí cómo se relaciona esto con la justicia individual de Dios en el resto de la Escritura.
  alternative_spanish_readings:
  - El texto podría entenderse de modo corporativo o retórico, sin negar la distinción entre justos e impíos ante Dios.
  rationale: Se conserva la tensión explícita del hebreo y del audit trail inglés. No se atenúa el impacto de nombrar a ambos grupos, ni se resuelve la dificultad teológica por paráfrasis.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La traducción sigue el pasaje hebreo masorético y coincide con el audit trail inglés en el sentido global, preservando el lenguaje concreto de la espada, la vaina y la antítesis «justo/impío». No se registran revisiones posteriores que alteren la decisión base.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el Nombre divino conforme al estándar del proyecto.
  - «La tierra de Israel» se usa de manera idiomática en español y armoniza con la personificación femenina del hebreo mediante «de ti».
  - Se conserva el paralelismo moral con «al justo y al impío» sin suavizar la fuerza judicial del texto.
  - El orden y la puntuación buscan una lectura pública fluida sin añadir contenido interpretativo.
