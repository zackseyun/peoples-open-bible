translation:
  language: es
  text: 'Los egipcios los persiguieron y los alcanzaron mientras estaban acampados junto al mar: todos los caballos y carros[a] de Faraón, sus jinetes y su ejército, junto a Pi-hajirot, frente a Baal-zefón.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit. «caballo de carro» o, colectivamente, «caballería de Faraón». El hebreo usa una expresión comprimida que puede referirse al conjunto de caballos y carros como unidad militar.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּרְדְּפוּ
  english_pob_choice: pursued
  chosen_spanish: persiguieron
  alternatives_spanish:
  - los siguieron
  - los dieron caza
  lexicon: HALOT
  rationale: רדף expresa persecución activa en un contexto militar. «Persiguieron» reproduce bien la acción narrativa y evita un coloquialismo excesivo.
- source_word: מִצְרַיִם
  english_pob_choice: The Egyptians
  chosen_spanish: los egipcios
  alternatives_spanish:
  - Egipto
  lexicon: HALOT
  rationale: 'La forma verbal exige un sujeto personal/plural: no es el país como territorio sino los habitantes o fuerzas de Egipto.'
- source_word: וַיַּשִּׂיגוּ
  english_pob_choice: overtook
  chosen_spanish: los alcanzaron
  alternatives_spanish:
  - los alcanzaron y dieron alcance a
  - los sobrepasaron
  lexicon: HALOT
  rationale: נשׂג indica alcanzar o dar alcance. «Los alcanzaron» conserva la fuerza narrativa sin sobrecargar el español.
- source_word: חֹנִים
  english_pob_choice: as they were camped
  chosen_spanish: mientras estaban acampados
  alternatives_spanish:
  - mientras acampaban
  - cuando estaban acampados
  lexicon: HALOT
  rationale: El participio describe la condición en la que fueron alcanzados. «Mientras estaban acampados» expresa la circunstancia con claridad y naturalidad.
- source_word: עַל הַיָּם
  english_pob_choice: by the sea
  chosen_spanish: junto al mar
  alternatives_spanish:
  - junto al mar
  - al lado del mar
  lexicon: HALOT
  rationale: עַל aquí es locativo. «Junto al mar» es una equivalencia idiomática en español para la ubicación cercana al agua.
- source_word: כָּל סוּס רֶכֶב פַּרְעֹה
  english_pob_choice: all Pharaoh’s horses and chariots
  chosen_spanish: todos los caballos y carros[a] de Faraón
  alternatives_spanish:
  - todos los caballos y carros de Faraón
  - todo el caballaje y los carros de Faraón
  lexicon: HALOT
  rationale: El hebreo es compacto y colectivo. Se conserva el totalizador «todos» y se traduce la secuencia como una lista militar natural en español. La nota marca la posible lectura distributiva o de conjunto del sintagma.
- source_word: וּפָרָשָׁיו
  english_pob_choice: his horsemen
  chosen_spanish: sus jinetes
  alternatives_spanish:
  - sus hombres de a caballo
  - su caballería
  lexicon: HALOT
  rationale: פָּרָשִׁים son tropas montadas. «Jinetes» mantiene la imagen concreta y es más transparente que «caballería».
- source_word: וְחֵילוֹ
  english_pob_choice: and his army
  chosen_spanish: y su ejército
  alternatives_spanish:
  - y su fuerza
  - y sus tropas
  lexicon: HALOT
  rationale: חֵיל en contexto bélico denota fuerza militar. «Ejército» comunica con claridad el conjunto de tropas.
- source_word: עַל פִּי הַחִירֹת
  english_pob_choice: by Pi-hahiroth
  chosen_spanish: junto a Pi-hajirot
  alternatives_spanish:
  - cerca de Pi-hajirot
  - por Pi-hajirot
  lexicon: HALOT
  rationale: Se conserva el topónimo con transliteración española y la relación locativa de עַל פִּי como proximidad al lugar nombrado.
- source_word: לִפְנֵי בַּעַל צְפֹן
  english_pob_choice: before Baal-zephon
  chosen_spanish: frente a Baal-zefón
  alternatives_spanish:
  - delante de Baal-zefón
  - enfrente de Baal-zefón
  lexicon: HALOT
  rationale: לִפְנֵי en contexto espacial puede significar «frente a» u «opuesto a». «Frente a» es natural en español y conserva la relación topográfica.
translation_notes:
  revision_awareness: 'Se corrigió la omisión de la marca de nota al pie: el marcador [a] ahora aparece en el texto español exactamente en el sintagma correspondiente. También se ajustó la sintaxis para que la frase fluya de manera natural en español sin perder la secuencia militar del hebreo.'
  spanish_consistency_notes:
  - Se preserva «Yahvé» cuando aparezca el tetragrámaton; este versículo no lo contiene.
  - Se usó «Faraón» como forma estable en español bíblico y no como nombre propio traducido.
  - «Baal-zefón» y «Pi-hajirot» se transliteran de manera coherente para lectura pública en español.
  - La puntuación con dos puntos introduce la enumeración explicativa del contingente egipcio sin añadir contenido no presente en el hebreo.
