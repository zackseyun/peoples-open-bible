translation:
  language: es
  text: Si me olvido de ti, Jerusalén, que mi mano derecha olvide[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más explícitamente: «que mi mano derecha olvide su destreza». El hebreo es elíptico, y este sentido más completo se infiere del contexto y se refleja en algunas traducciones.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Cuando
  - En caso de que
  lexicon: HALOT
  rationale: El hebreo abre con una condición sencilla y directa en una fórmula de auto-maldición juramentada. En español, «si» conserva con naturalidad ese valor condicional sin forzar un matiz temporal o hipotético innecesario.
- source_word: אֶשְׁכָּחֵךְ
  english_pob_choice: I forget you
  chosen_spanish: me olvido de ti
  alternatives_spanish:
  - yo te olvide
  - si te olvido
  lexicon: HALOT
  rationale: El verbo שׁכח en primera persona singular con sufijo femenino singular se dirige a Jerusalén en segunda persona. «Me olvido de ti» comunica de forma idiomática la relación verbal y mantiene el paralelismo con el texto hebreo, aunque en español la forma más natural requiere la construcción pronominal.
- source_word: יְרוּשָׁלִָם
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  alternatives_spanish:
  - Yerushalén
  lexicon: HALOT
  rationale: Se mantiene el nombre propio tradicional e inteligible en español bíblico, equivalente directo de la transliteración inglesa del POB.
- source_word: תִּשְׁכַּח
  english_pob_choice: may ... forget
  chosen_spanish: que ... se olvide
  alternatives_spanish:
  - que ... olvide
  - que ... me olvide
  lexicon: HALOT
  rationale: El imperfecto 3fs se entiende aquí en sentido jussivo dentro de una auto-imprecación. En español, «que ... se olvide» conserva esa fuerza deseativa/imprecatoria sin añadir un objeto explícito que no está en el hebreo.
- source_word: יְמִינִי
  english_pob_choice: my right hand
  chosen_spanish: mi mano derecha
  alternatives_spanish:
  - mi diestra
  - mi mano diestra
  lexicon: HALOT
  rationale: «Mi mano derecha» es la expresión más clara y natural en español para יָמִין en este contexto. Conserva la imagen concreta del miembro usado para ejecutar y recordar, sin introducir una glosa interpretativa en el texto principal.
theological_decisions:
- issue: Terseness and elliptical force of the second colon
  english_pob_reading: may my right hand forget
  chosen_spanish_reading: que mi mano derecha se olvide
  alternative_spanish_readings:
  - que mi mano derecha olvide su destreza
  - que mi mano derecha se olvide de su habilidad
  - que mi mano derecha sea olvidada
  rationale: El hebreo es elíptico y no explicita el objeto de «olvidar». La lectura principal mantiene esa tersura para no importar una aclaración no dicha en el texto. La posible idea de «su destreza» queda reservada como alternativa interpretativa, como en el audit trail inglés.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: No se registran revisiones aplicadas; el pasaje permanece estable en la última pasada de revisión, con acuerdo moderado y solo observaciones menores.
  spanish_consistency_notes:
  - Se usa «Jerusalén» como nombre propio habitual en español bíblico, sin necesidad de transliteración.
  - Se mantiene la imagen concreta de «mano derecha» en vez de una glosa como «destreza» en el texto principal, siguiendo la cautela del audit trail.
  - La puntuación refleja una auto-maldición condicional con paralelismo poético en dos miembros.
