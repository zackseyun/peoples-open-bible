  - severity: medium
    issue: ‘cosa santísima’ suena poco natural
    rationale: La expresión transmite la idea, pero en español actual y eclesial suena forzada. El hebreo clasifica la ofrenda como ‘sumamente santa’; ‘es santísima’ conserva mejor la dignidad y claridad.
