  glossary_alignment: 'No hay conflicto con la terminología principal del proyecto: אֱלֹהִים está bien como «Dios». No aparecen términos como Yahvé, Mesías, esclavo, etc. La principal cuestión lexical es נִבְנוּ: conviene priorizar una solución española natural con nota que conserve «son edificados/establecidos» como trasfondo.'
