- from: Y la cabeza de Efraín es Samaria[a], y la cabeza de Samaria es el hijo de Remalías. Si ustedes no creen[b], de cierto no serán establecidos.
  to: Y la cabeza de Efraín es Samaria, y la cabeza de Samaria es el hijo de Remalías. Si ustedes no creen[a], ciertamente no quedarán firmes[b].
  rationale: Se corrige el lugar de la nota sobre el juego verbal para que ancle en el verbo pertinente y se reemplaza una frase demasiado calcada por una formulación española más natural que sigue siendo fiel al hebreo y al análisis del POB. La revisión conserva el paralelismo, la terminología propia y la fuerza retórica del juego de palabras entre creer y quedar firme.
