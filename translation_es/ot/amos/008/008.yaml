translation:
  language: es
  text: Por causa de esto[a], ¿no temblará la tierra y se lamentará todo el que habita en ella? Toda ella subirá como el Nilo[b]; será impulsada y descenderá como el Nilo de Egipto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'la tierra' en sentido más amplio, es decir, 'el mundo'. El hebreo אֶרֶץ puede referirse tanto a la tierra/territorio como a la tierra en sentido general; aquí se prefiere el sentido local porque el versículo se centra en el territorio juzgado y sus habitantes.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: ''como el Nilo ... como el Nilo de Egipto''. La imagen alude a la crecida y al descenso anual del Nilo, usada aquí como figura de una conmoción que lo invade todo.'
    reason: cultural_note
lexical_decisions:
- source_word: הַעַל זֹאת
  english_pob_choice: Because of this
  chosen_spanish: Por causa de esto
  alternatives_spanish:
  - A causa de esto
  - Por esto
  - Debido a esto
  lexicon: HALOT
  rationale: Expresa con naturalidad en español el valor causal de עַל con el demostrativo. Mantiene el enlace lógico de juicio sin volverlo más interpretativo de lo que permite el hebreo.
- source_word: תִרְגַּז
  english_pob_choice: will ... tremble
  chosen_spanish: temblará
  alternatives_spanish:
  - se estremecerá
  - se sacudirá
  - temblará
  lexicon: HALOT
  rationale: Con 'la tierra' como sujeto, 'temblará' transmite bien la conmoción física y judicial del verbo. Es natural en español y conserva la imagen de inestabilidad.
- source_word: הָאָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  - la tierra
  - el territorio
  lexicon: HALOT
  rationale: En este contexto profético, 'la tierra' permite el matiz local y también el sentido amplio posible de אֶרֶץ. 'Territorio' sería más explicativo y 'país' demasiado moderno/estrecho.
- source_word: וְאָבַל
  english_pob_choice: and ... mourn
  chosen_spanish: se lamentará
  alternatives_spanish:
  - guardará duelo
  - llorará
  - se lamentará
  lexicon: HALOT
  rationale: '''אָבַל'' denota duelo o lamento; ''se lamentará'' conserva ese campo semántico y encaja con el paralelismo del versículo sin introducir una emoción específica no indicada.'
- source_word: כָּל יוֹשֵׁב בָּהּ
  english_pob_choice: every one who dwells in it
  chosen_spanish: todo el que habita en ella
  alternatives_spanish:
  - cada uno que habita en ella
  - todos los que habitan en ella
  - todo el que mora en ella
  lexicon: HALOT
  rationale: Preserva el valor distributivo de כָּל y el participio sustantivado יוֹשֵׁב. 'Habita' es claro y digno en español, y 'en ella' mantiene la referencia a la tierra.
- source_word: וְעָלְתָה כָאֹר כֻּלָּהּ
  english_pob_choice: All of it will rise like the Nile
  chosen_spanish: Toda ella subirá como el Nilo
  alternatives_spanish:
  - Subirá toda como el Nilo
  - Toda ella se levantará como el Nilo
  - El todo de ella subirá como el Nilo
  lexicon: HALOT
  rationale: '''Toda ella'' refleja כֻּלָּהּ y evita una paráfrasis excesiva. ''Subirá'' conserva la imagen de ascenso del río; ''como el Nilo'' sigue la identificación del POB con el referente egipcio.'
- source_word: וְנִגְרְשָׁה
  english_pob_choice: it will be driven along
  chosen_spanish: será arrastrada
  alternatives_spanish:
  - será impulsada
  - será llevada
  - será empujada
  lexicon: HALOT
  rationale: El nifal de גרשׁ aquí se usa en la imagen de aguas movidas con fuerza. 'Arrastrada' comunica esa acción externa y violenta mejor que una expresión más abstracta, manteniendo la tensión del símil.
- source_word: וְנשקה
  english_pob_choice: and sink
  chosen_spanish: y se hundirá
  alternatives_spanish:
  - y se abatirá
  - y descenderá
  - y se hundirá
  lexicon: HALOT
  rationale: En paralelo con el ascenso del Nilo, 'se hundirá' transmite la fase de receso o descenso con una imagen corporal y acuática comprensible en español. Es suficientemente cercana al sentido sin fijarlo en un tecnicismo.
- source_word: כִּיאוֹר מִצְרָיִם
  english_pob_choice: like the Nile of Egypt
  chosen_spanish: como el Nilo de Egipto
  alternatives_spanish:
  - como el río de Egipto
  - como el Nilo egipcio
  - como el Nilo de Egipto
  lexicon: HALOT
  rationale: La referencia es al Nilo, no sólo a un 'río' genérico. 'De Egipto' conserva la construcción hebrea y la aclaración geográfica del POB, útil para el lector hispanohablante.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB en inglés, que ajustó el verbo final de 'be tossed about' a 'be driven along'. En español se reflejó esa precisión con 'será arrastrada', manteniendo la secuencia imagética de ascenso, arrastre y hundimiento.
  spanish_consistency_notes:
  - Se usó 'Yahvé' sólo cuando el hebreo lo requiera; este versículo no contiene el tetragrámaton.
  - Se prefirió 'la tierra' para אֶרֶץ conforme al enfoque local del pasaje, en coherencia con la nota de la base inglesa.
  - '''Nilo'' se mantuvo sin sustituir por ''río'' para conservar la imagen cultural específica del símil.'
  - No se introdujo terminología eclesiástica adicional; el versículo conserva un registro profético directo y sobrio.
