base_translation:
  language: en
  yaml_path: translation/ot/2_kings/002/009.yaml
  text: And when they had crossed over[a], Elijah said to Elisha, “Ask what I should do for you before I am taken from you.” And Elisha said, “Please[b], let a double portion of your spirit be upon me.”
  footnotes:
  - marker: a
    text: Or, “let two shares of your spirit come to me.” The Hebrew idiom means “a double portion,” likely echoing the firstborn’s inheritance share.
    reason: lexical_alternative
  - marker: b
    text: “Your spirit” refers to the spirit associated with Elijah’s prophetic ministry; some understand this as a request for twice Elijah’s prophetic power.
    reason: alternative_reading
