translation:
  language: es
  text: Sobre el candelabro puro dispondrá las lámparas delante de Yahvé continuamente.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: עַל
  english_pob_choice: 'On'
  chosen_spanish: Sobre
  alternatives_spanish:
  - En
  - Encima de
  lexicon: HALOT
  rationale: En este contexto cultual, עַל indica la relación posicional de las lámparas con el candelabro. «Sobre» comunica con naturalidad esa ubicación sin volver la frase pesada.
- source_word: הַמְּנֹרָה
  english_pob_choice: the lampstand
  chosen_spanish: el candelabro
  alternatives_spanish:
  - la menorá
  - el soporte de las lámparas
  lexicon: HALOT
  rationale: מְנוֹרָה designa el objeto cultual específico. «Candelabro» expresa su función en español de forma clara y reverente; se evita transliterar «menorá» en el texto principal porque aquí el término describe un objeto litúrgico reconocible por su uso.
- source_word: הַטְּהֹרָה
  english_pob_choice: pure
  chosen_spanish: puro
  alternatives_spanish:
  - limpio
  - ritualmente puro
  lexicon: HALOT
  rationale: טָהוֹר en contexto sacerdotal tiene fuerza ritual. «Puro» conserva la concisión del hebreo y la lectura cultual sin añadir explicación interpretativa al cuerpo del texto.
- source_word: יַעֲרֹךְ
  english_pob_choice: he shall arrange
  chosen_spanish: arreglará
  alternatives_spanish:
  - pondrá en orden
  - dispondrá
  lexicon: HALOT
  rationale: ערך aquí se refiere a disponer o colocar en orden las lámparas. «Arreglará» mantiene el sentido de ordenamiento y funciona de manera natural en español bíblico moderno.
- source_word: הַנֵּרוֹת
  english_pob_choice: the lamps
  chosen_spanish: las lámparas
  alternatives_spanish:
  - las luces
  - los candiles
  lexicon: HALOT
  rationale: נֵרוֹת es el plural de los elementos de iluminación del candelabro. «Lámparas» es la correspondencia directa y evita una paráfrasis.
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - en presencia de Yahvé
  - ante Yahvé
  lexicon: HALOT
  rationale: לִפְנֵי es la expresión cultual habitual de estar ante/presentarse delante de. «Delante de Yahvé» preserva la referencia espacial y ceremonial, y usa el nombre divino según el estándar del proyecto.
- source_word: תָּמִיד
  english_pob_choice: continually
  chosen_spanish: continuamente
  alternatives_spanish:
  - sin cesar
  - de continuo
  lexicon: HALOT
  rationale: תָּמִיד indica regularidad continua en el servicio sacerdotal. «Continuamente» comunica esa constancia sin expandir el verso.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton. Conforme al estándar del proyecto, se translitera como «Yahvé» en español para preservar el nombre personal divino en vez de sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: Se corrigió la validación anterior eliminando la nota al pie no anclada; la traducción ahora no incluye marcas de nota, porque no son necesarias para este verso bajo la solución española adoptada.
  spanish_consistency_notes:
  - Se mantuvo un registro formal y culto, evitando arcaísmos innecesarios.
  - «Yahvé» se usa de manera consistente para יְהוָה según la política del proyecto.
  - «Candelabro» traduce el objeto cultual sin transliteración, en línea con la claridad requerida en español.
  - No se añadieron notas al pie porque el texto español no necesita una alternativa textual explícita para este verso.
