translation:
  language: es
  text: Y pondrá su mano sobre la cabeza de la ofrenda por el pecado, y degollará la víctima de la ofrenda por el pecado en el lugar del holocausto[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ofrenda de purificación». El término hebreo חטאת puede referirse a la ofrenda asociada con el pecado y con la purificación.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְסָמַךְ
  english_pob_choice: And he shall lay
  chosen_spanish: Y pondrá
  alternatives_spanish:
  - y apoyará
  - y extenderá la mano sobre
  lexicon: HALOT
  rationale: En este contexto ritual, סמך expresa colocar o poner la mano sobre la víctima. En español, «poner» comunica con naturalidad el acto prescrito sin perder la fuerza física del gesto.
- source_word: יָדוֹ
  english_pob_choice: his hand
  chosen_spanish: su mano
  alternatives_spanish:
  - sus manos
  lexicon: HALOT
  rationale: El hebreo es singular con sufijo de tercera persona masculina singular; por eso se conserva el singular «su mano».
- source_word: עַל רֹאשׁ
  english_pob_choice: on the head of
  chosen_spanish: sobre la cabeza de
  alternatives_spanish:
  - en la cabeza de
  - encima de la cabeza de
  lexicon: HALOT
  rationale: La preposición עַל se expresa de forma natural con «sobre» en español, manteniendo la localización ritual exacta del gesto.
- source_word: הַחַטָּאת
  english_pob_choice: the sin offering
  chosen_spanish: la ofrenda por el pecado
  alternatives_spanish:
  - la ofrenda de purificación
  - el sacrificio por el pecado
  lexicon: HALOT
  rationale: Se evita «ofrenda por el pecado» como mera calca inglesa y se opta por una forma española clara y reverente. Esta frase conserva la ambigüedad documentada de חטאת entre el pecado y la ofrenda asociada, sin imponer de antemano una sola interpretación ritual.
- source_word: וְשָׁחַט
  english_pob_choice: and slaughter
  chosen_spanish: y degollará
  alternatives_spanish:
  - y sacrificará
  - y matará
  lexicon: HALOT
  rationale: שחט es el término técnico de degollar animales para sacrificio. «Degollar» mantiene esa precisión sacrificial mejor que el más general «matar».
- source_word: בִּמְקוֹם
  english_pob_choice: in the place of
  chosen_spanish: en el lugar de
  alternatives_spanish:
  - en el sitio de
  - en el lugar donde
  lexicon: HALOT
  rationale: La frase indica un lugar designado para la acción. «En el lugar de» reproduce con fidelidad la relación espacial y normativa del hebreo.
- source_word: הָעֹלָה
  english_pob_choice: the burnt offering
  chosen_spanish: el holocausto
  alternatives_spanish:
  - la ofrenda quemada
  - la ofrenda ascendente
  lexicon: HALOT
  rationale: Se conserva «holocausto» como equivalente cultual tradicional en español para עֹלָה, dado que en la POB inglesa se identifica como burnt offering y el término español estabilizado transmite adecuadamente el sacrificio completamente consumido.
theological_decisions:
- issue: Traducción de חטאת en contexto sacrificial
  english_pob_reading: sin offering
  chosen_spanish_reading: ofrenda por el pecado
  alternative_spanish_readings:
  - ofrenda de purificación
  - sacrificio por el pecado
  rationale: La POB inglesa mantiene la lectura tradicional «sin offering» y añade la nota de que el término puede referirse también a la ofrenda de purificación. En español se preserva esa tensión con una forma que no excluye la relación con el pecado, y el texto permite la misma alternativa semántica en la nota.
  doctrine_reference: Translation philosophy §1, §5
- issue: Forma verbal hebrea en contexto legal-ritual
  english_pob_reading: shall lay ... and slaughter
  chosen_spanish_reading: pondrá ... y degollará
  alternative_spanish_readings:
  - puso ... y degolló
  - deberá poner ... y degollar
  rationale: Aunque el hebreo usa una forma verbal narrativa, en la instrucción ritual española conviene un futuro normativo. «Pondrá» y «degollará» comunican correctamente la fuerza prescriptiva del pasaje sin volverlo excesivamente arcaico.
  doctrine_reference: Translation philosophy §6
translation_notes:
  revision_awareness: 'Se siguió el rastro de revisión más reciente sin cambios necesarios: el texto base muestra alta concordancia con el análisis fuente-por-fuente y no se documentan revisiones aplicadas. La redacción española se ajusta al mismo nivel de certeza y deja visible la alternativa léxica principal en la nota.'
  spanish_consistency_notes:
  - Se mantiene la terminología cultual con referencia explícita a la ofrenda, evitando sustituirla por vocabulario eclesiástico ajeno al rito levítico.
  - Se conserva el singular de la mano, conforme al hebreo.
  - «Holocausto» se usa como equivalente cultual de עֹלָה, coherente con la tradición bíblica en español y con el audit trail inglés.
  - El orden sintáctico español sigue una cadencia bíblica clara, pero sin depender mecánicamente del inglés.
