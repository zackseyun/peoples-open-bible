review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura general del hebreo y preserva adecuadamente «Yahvé» y el matiz forense de וְאִשָּׁפְטָה. Sin embargo, se aparta del sentido contextual documentado en dos puntos importantes: אִתְּכֶם y וְאֶת אֲבוֹתֵיכֶם se dejaron como «con ustedes / con sus padres», cuando tanto el contexto como la auditoría POB establecen un valor benefactivo («por / a favor de»). Además, falta en español una nota que preserve la alternativa documentada para el verbo forense, y la nota [b] quedó anclada en «pónganse de pie» aunque en el POB inglés la nota asociada explica «righteous acts».'
  spanish_quality_summary: El español es claro y digno, pero «obras justas de Yahvé, que hizo con ustedes y con sus padres» suena menos natural y menos preciso que una formulación benefactiva. «Actos justos» o «obras justas» son posibles; «actos justos» encaja mejor con la nota explicativa sobre hechos históricos de justicia pactal. También conviene ajustar la distribución de notas para que correspondan a los puntos significativos del original y del rastro de auditoría.
  glossary_alignment: Alinea bien con la política del proyecto en «Yahvé». No hay conflictos con otros términos de glosario. Sí hay desalineación con la decisión léxica auditada para אִתְּכֶם / וְאֶת אֲבוֹתֵיכֶם, donde el español debe reflejar el sentido contextual benefactivo, no una reproducción literal de la preposición que debilita el significado. Asimismo, conviene mantener explícita en nota la amplitud forense de שפט.
  issues:
  - severity: high
    issue: «que hizo con ustedes y con sus padres» no preserva el sentido contextual benefactivo del hebreo en este contexto.
    rationale: La auditoría inglesa documenta que, aunque la preposición es literalmente «con», aquí significa que Yahvé actuó en favor del pueblo y de sus padres. En español, «hizo con ustedes» suena torpe y puede insinuar mera compañía, no beneficio.
  - severity: medium
    issue: La nota [b] está anclada en el imperativo «pónganse de pie», pero el POB inglés usa esa nota para explicar «righteous acts».
    rationale: La disciplina del proyecto pide preservar alternativas y notas significativas del rastro auditado. La explicación cultural/teológica de צִדְקוֹת יְהוָה debe acompañar esa frase en español, no el mandato de ponerse de pie.
  - severity: medium
    issue: Falta una nota en español para el matiz alternativo de «contenderé con ustedes».
    rationale: El POB inglés conserva en nota alternativas como «los juzgaré», «razonaré con ustedes» o «déjenme presentar mi causa». Dado que «contender» puede sonar estrecho en español, conviene preservar en nota el abanico forense documentado.
  - severity: low
    issue: «Obras justas de Yahvé» es aceptable, pero «actos justos de Yahvé» suena más idiomático en este contexto histórico-jurídico.
    rationale: La frase se refiere a hechos concretos en la historia de Israel, no a obras en sentido amplio. «Actos» comunica mejor la idea de acciones judiciales/covenantales sin alterar el contenido.
  revised_spanish_text: Ahora pues, pónganse de pie, y contenderé[a] con ustedes delante de Yahvé acerca de todos los actos justos[b] de Yahvé, que hizo por ustedes y por sus padres.
  revised_footnotes:
  - marker: a
    text: O «los juzgaré», «razonaré con ustedes» o «permítanme presentar mi caso contra ustedes». El hebreo tiene un sentido forense de entrar en una causa delante de Yahvé.
    reason: lexical_alternative
  - marker: b
    text: «Actos justos» se refiere a las obras de Yahvé que manifiestan su justicia y su fidelidad al pacto en favor de su pueblo.
    reason: cultural_note
  revision_rationale: 'Se ajusta la preposición final a «por ustedes y por sus padres» para reflejar el sentido benefactivo contextual documentado por la auditoría POB y evitar una frase española poco natural. Se reubican y corrigen las notas para que preserven los dos elementos significativos del rastro inglés: el matiz forense de שפט y la explicación de צִדְקוֹת יְהוָה. También se mejora la naturalidad con «actos justos», manteniendo la conexión léxica con «justicia».'
