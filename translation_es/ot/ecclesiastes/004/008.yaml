translation:
  language: es
  text: 'Hay un hombre[a], y no tiene segundo; no tiene ni hijo ni hermano, y no hay fin de todo su trabajo. Sus ojos tampoco quedan satisfechos con la riqueza: «¿Y para quién trabajo y me privo de lo bueno?» También esto es vanidad[b] y una empresa desdichada.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Hay uno solo» o «hay uno, sin otro».'
    reason: alternative_reading
  - marker: b
    text: El hebreo traducido «vanidad» también puede sugerir «vapor» o «futilidad».
    reason: lexical_alternative
lexical_decisions:
- source_word: יֵשׁ אֶחָד
  english_pob_choice: There is one man
  chosen_spanish: Hay un hombre[a]
  alternatives_spanish:
  - Hay uno solo[a]
  - Hay una persona sola[a]
  lexicon: HALOT
  rationale: ‘Hay’ reproduce la existencia afirmada por יֵשׁ. ‘Un hombre’ conserva el singular masculino representativo elegido en el POB inglés. La nota [a] permite la alternativa idiomática de ‘uno solo’ sin perder la fuerza de soledad implícita.
- source_word: וְאֵין שֵׁנִי
  english_pob_choice: and he has no second
  chosen_spanish: y no tiene segundo
  alternatives_spanish:
  - y no hay otro para él
  - y está solo
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente ‘no hay segundo’. ‘No tiene segundo’ preserva la imagen y la estructura breve del original, como hace el POB inglés, sin suavizarla demasiado.
- source_word: גַּם בֵּן וָאָח אֵין לוֹ
  english_pob_choice: he has neither son nor brother
  chosen_spanish: no tiene ni hijo ni hermano
  alternatives_spanish:
  - tampoco tiene hijo ni hermano
  - no le queda ni hijo ni hermano
  lexicon: HALOT
  rationale: ‘Ni... ni...’ expresa bien la negación coordinada. ‘Hijo’ y ‘hermano’ se mantienen de forma literal, sin generalizar a ‘familia’.
- source_word: וְאֵין קֵץ לְכָל עֲמָלוֹ
  english_pob_choice: and there is no end to all his labor
  chosen_spanish: y no hay fin a todo su trabajo
  alternatives_spanish:
  - y no hay fin a todo su labor
  - y no termina todo su afán
  lexicon: HALOT
  rationale: ‘Trabajo’ comunica de manera natural עָמָל en español, aunque ‘labor’ o ‘afán’ son alternativas posibles. Se evita una paráfrasis excesiva y se conserva el sentido de actividad continua y pesada.
- source_word: גַּם עֵינָיו לֹא תִשְׂבַּע עֹשֶׁר
  english_pob_choice: His eyes also are not satisfied with wealth
  chosen_spanish: Sus ojos[b] tampoco se sacian de riqueza
  alternatives_spanish:
  - Sus ojos también no se sacian de riqueza
  - Ni sus ojos se sacian de riquezas
  lexicon: HALOT
  rationale: ‘Tampoco’ expresa bien el valor aditivo-adversativo de גַּם en contexto. ‘Se sacian de riqueza’ reproduce el idioma hebreo de saciedad con una formulación natural en español. Se añade [b] para señalar que ‘ojos’ puede funcionar como metonimia del deseo o apetito personal.
- source_word: וּלְמִי אֲנִי עָמֵל
  english_pob_choice: For whom am I laboring
  chosen_spanish: ¿Y para quién trabajo
  alternatives_spanish:
  - ¿Y para quién me afano
  - ¿Y para quién laboro
  lexicon: HALOT
  rationale: La pregunta directa se conserva. ‘Trabajo’ mantiene conexión léxica con עֲמָלוֹ en la cláusula anterior y suena natural en español, sin perder el matiz de esfuerzo sostenido.
- source_word: וּמְחַסֵּר אֶת נַפְשִׁי מִטּוֹבָה
  english_pob_choice: and depriving myself of good
  chosen_spanish: y me privo de lo bueno
  alternatives_spanish:
  - y me privo de bien
  - y privo a mi ser de lo bueno
  lexicon: HALOT
  rationale: 'El hebreo dice literalmente ‘hago faltar a mi nefesh de lo bueno’. Siguiendo el POB inglés, se evita ‘alma’ y se traduce por una forma reflexiva natural: ‘me privo’, que conserva el sentido de autonegación sin introducir una antropología técnica.'
- source_word: גַּם זֶה הֶבֶל
  english_pob_choice: This too is vanity
  chosen_spanish: También esto es vanidad[c]
  alternatives_spanish:
  - Esto también es vapor[c]
  - También esto es futileza[c]
  lexicon: HALOT
  rationale: ‘Vanidad’ conserva la terminología temática de Eclesiastés y la red conceptual del POB inglés. La nota [c] preserva la alternativa semántica de ‘vapor’ o ‘futilidad’ que el hebreo puede sugerir.
- source_word: וְעִנְיַן רָע הוּא
  english_pob_choice: and an unhappy business
  chosen_spanish: y un asunto malo
  alternatives_spanish:
  - y un negocio miserable
  - y una tarea penosa
  - y un asunto desgraciado
  lexicon: HALOT
  rationale: ‘Asunto’ corresponde bien a עִנְיָן como ocupación o asunto en Qohelet. ‘Malo’ refleja רָע de forma directa y más transparente que una paráfrasis como ‘desdichado’ o ‘miserable’.
theological_decisions:
- issue: Sentido antropológico de נַפְשִׁי
  english_pob_reading: myself
  chosen_spanish_reading: me / me privo
  alternative_spanish_readings:
  - mi alma
  - mi vida
  - mi ser
  rationale: En este contexto sapiencial, נֶפֶשׁ funciona como el yo entero. La versión española evita ‘alma’ para no imponer una división técnico-doctrinal que el pasaje no exige, y sigue la decisión del POB inglés de usar una formulación reflexiva.
  doctrine_reference: Translation philosophy §1, §6
- issue: Valor de הֶבֶל en Eclesiastés
  english_pob_reading: vanity
  chosen_spanish_reading: vanidad
  alternative_spanish_readings:
  - vapor
  - futilidad
  rationale: ‘Vanidad’ mantiene la palabra-programa del libro y su red temática tradicional, sin abandonar del todo la imagen de transitoriedad que el hebreo sugiere.
  doctrine_reference: Translation philosophy §5
- issue: Relación entre גַּם y la cláusula sobre los ojos
  english_pob_reading: His eyes also are not satisfied with wealth
  chosen_spanish_reading: Sus ojos tampoco se sacian de riqueza
  alternative_spanish_readings:
  - Sus ojos también no se sacian de riqueza
  - Ni sus ojos se sacian de riquezas
  rationale: ‘Tampoco’ expresa en español la acumulación negativa del hebreo con buena naturalidad. No se introduce una contraposición fuerte que el texto no exige.
  doctrine_reference: Translation philosophy §3, §4
translation_notes:
  revision_awareness: 'La redacción sigue la última revisión inglesa en varios puntos: evita introducir un contraste fuerte al inicio de la segunda mitad, conserva la pregunta directa sin añadir ‘dice’, y refleja el cierre como un juicio breve y pesimista. Se tomó en cuenta también que el POB inglés prefirió ‘also’/‘tampoco’ en la cláusula de los ojos y ‘unhappy business’ para עִנְיַן רָע.'
  spanish_consistency_notes:
  - Se mantuvo ‘vanidad’ como término programático coherente con Eclesiastés en el resto del proyecto.
  - Se evitó ‘alma’ para נֶפֶשׁ, siguiendo la pauta del POB y preservando el sentido de persona entera.
  - ‘Trabajo’ se usó de forma consistente para עָמָל, mientras que ‘me privo’ refleja el verbo causativo de חסר de manera natural en español.
  - Los marcadores [a], [b] y [c] aparecen exactamente en el texto principal y corresponden a notas realmente ancladas.
