theological_decisions:
- issue: Force of the ἵνα clause in Jesus' citation/allusion to Isaiah 6
  chosen_reading: Rendered as 'so that' and left textually tense, preserving the possibility of both divine judicial purpose and stated result without softening the wording.
  alternative_readings:
  - '''with the result that'' to emphasize result'
  - '''because'' or other softened renderings that reduce purposive force'
  rationale: The verse participates in a longstanding theological discussion about parables, revelation, and judgment. The Greek ἵνα normally carries purpose/result force, and the translation should preserve that tension rather than resolve it toward either a purely deterministic or purely descriptive reading.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
