translation:
  language: es
  text: Cántico de ascensos[b]. Desde las profundidades he clamado a ti[a], Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Desde las profundidades clamé a ti, Yahvé». El verbo hebreo puede entenderse como un pasado simple; el texto principal usa una forma compuesta para preservar la inmediatez de la oración del salmo.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «Cántico de ascensos», el título tradicional para este grupo de salmos.'
    reason: cultural_note
lexical_decisions:
- source_word: שִׁיר הַמַּעֲלֹות
  english_pob_choice: A Song of Ascents
  chosen_spanish: Cántico de ascensos[a]
  alternatives_spanish:
  - Cántico de las subidas
  - Canción de ascensos
  - Cántico de peregrinación
  lexicon: שִׁיר / מַעֲלָה
  rationale: El título tradicional del grupo salmódico se vierte de modo transparente como 'Cántico de ascensos', manteniendo el valor técnico del hebreo sin sustituirlo por una paráfrasis devocional. 'Ascensos' conserva la relación con מַעֲלֹות y evita imponer una interpretación única.
- source_word: מִמַּעֲמַקִּים
  english_pob_choice: Out of the depths
  chosen_spanish: Desde las profundidades
  alternatives_spanish:
  - Desde lo profundo
  - Desde las honduras
  - Desde el abismo
  lexicon: מַעֲמַקִּים
  rationale: '''Profundidades'' reproduce con naturalidad el plural intensivo hebreo y mantiene la imagen espacial/poética. ''Desde'' refleja el origen marcado por מִן, sin cargar el texto con un calco rígido.'
- source_word: קְרָאתִיךָ
  english_pob_choice: I have called to you
  chosen_spanish: he clamado a ti
  alternatives_spanish:
  - te he llamado
  - he invocado
  - he gritado a ti
  lexicon: קרא
  rationale: El verbo hebreo admite 'llamar' e 'invocar', pero el contexto de angustia del salmo y la revisión inglesa que reforzó el tono urgente favorecen 'clamar'. 'A ti' conserva el complemento explícito del hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Yahweh
  lexicon: יהוה
  rationale: Se mantiene el nombre divino en la forma editorial estándar del proyecto, 'Yahvé', en lugar de sustituirlo por un título en mayúsculas. Esto sigue la política terminológica indicada y preserva la referencia explícita al Tetragrámaton.
theological_decisions:
- issue: Título salmódico tradicional
  english_pob_reading: A Song of Ascents
  chosen_spanish_reading: Cántico de ascensos
  alternative_spanish_readings:
  - Cántico de peregrinación
  - Canto de subidas
  rationale: No hay indicio de que el título deba armonizarse con una tradición litúrgica posterior; por eso se conserva su carácter de encabezado técnico. La elección mantiene la conexión con el hebreo sin añadir explicación interpretativa al cuerpo del texto.
  doctrine_reference: Salmos 120–134, título grupal tradicional
- issue: Tono verbal de la súplica
  english_pob_reading: I have called to you
  chosen_spanish_reading: he clamado a ti
  alternative_spanish_readings:
  - he llamado a ti
  - clamo a ti
  rationale: La revisión inglesa conservó el pasado perfecto para la forma verbal, pero reconoció la urgencia del lamento. En español, 'he clamado' conserva el aspecto completivo y 'clamar' expresa mejor la intensidad orante que 'llamar'.
  doctrine_reference: Poética hebrea de lamentación y oración
- issue: Nombre divino
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahweh
  rationale: Se evita la sustitución por un título genérico para no ocultar el nombre propio del texto fuente. La forma 'Yahvé' es la convención editorial del proyecto para el Tetragrámaton.
  doctrine_reference: Tetragrámaton / YHWH
translation_notes:
  revision_awareness: 'La revisión inglesa final completó el texto omitido del versículo y fijó ''Yahweh'' para el nombre divino. La versión española sigue esa decisión, pero adapta ''I have called to you'' a un español más natural y expresivo del lamento: ''he clamado a ti''.'
  spanish_consistency_notes:
  - Se conserva la forma editorial 'Yahvé' de manera uniforme para יהוה.
  - Se mantiene el registro poético y sobrio, evitando un español litúrgico arcaizante.
  - El encabezado se presenta como título del salmo, no como parte del discurso oracional.
