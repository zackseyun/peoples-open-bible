translation:
  language: es
  text: 'Y para la tribu de los hijos de Dan[a], un jefe: Bukki hijo de Yoglí.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «los hijos de Dan».'
