translation:
  language: es
  text: Y si es de sesenta años o más[a], si es varón, tu tasación será de quince siclos; y para la hembra, diez siclos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «a la edad de sesenta años o más».'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִבֶּן שִׁשִּׁים שָׁנָה וָמַעְלָה
  english_pob_choice: from sixty years old and upward
  chosen_spanish: de sesenta años o más
  alternatives_spanish:
  - a partir de los sesenta años
  - desde los sesenta años y en adelante
  lexicon: HALOT
  rationale: La expresión hebrea fija un umbral de edad que comienza en los sesenta y continúa por encima de esa edad. En español, «de sesenta años o más» comunica con naturalidad ese rango sin perder el valor formal del hebreo.
- source_word: זָכָר
  english_pob_choice: male
  chosen_spanish: varón
  alternatives_spanish:
  - macho
  - masculino
  lexicon: HALOT
  rationale: En este contexto de valuación legal, el hebreo distingue sexo biológico. «Varón» mantiene ese contraste con «hembra» y es más digno y natural en español bíblico que «macho».
- source_word: עֶרְכְּךָ
  english_pob_choice: your valuation
  chosen_spanish: tu valoración
  alternatives_spanish:
  - tu valuación
  - tu estimación
  lexicon: HALOT
  rationale: El término es técnico en Levítico 27 para la tasación votiva. «Valoración» conserva el sustantivo técnico en español y refleja bien el sentido jurídico-ritual del hebreo.
- source_word: חֲמִשָּׁה עָשָׂר שָׁקֶל
  english_pob_choice: fifteen shekels
  chosen_spanish: quince siclos
  alternatives_spanish:
  - quince ciclos
  - quince monedas de plata
  lexicon: HALOT
  rationale: El número y la unidad se traducen de forma directa. «Siclo» es la forma tradicional y clara en español para la unidad de peso/cálculo monetario bíblica.
- source_word: לַנְּקֵבָה
  english_pob_choice: for the female
  chosen_spanish: para la hembra
  alternatives_spanish:
  - para la mujer
  - y para la hembra
  lexicon: HALOT
  rationale: 'El paralelo con זָכָר favorece un par biológico consistente: «varón / hembra». Aunque «mujer» es posible, aquí «hembra» preserva mejor la simetría lexical del hebreo y la precisión del contexto legal.'
- source_word: עֲשָׂרָה שְׁקָלִים
  english_pob_choice: ten shekels
  chosen_spanish: diez siclos
  alternatives_spanish:
  - diez ciclos
  - diez monedas de plata
  lexicon: HALOT
  rationale: Se mantiene la misma unidad traducida antes en el versículo para coherencia terminológica y fidelidad al texto hebreo.
translation_notes:
  revision_awareness: El inglés POB pasó por una corrección para hacer más natural la referencia a la persona valuada y luego volvió a una redacción más formal del umbral de edad. La versión española sigue ese segundo paso, conservando la estructura legal del hebreo y el registro formal, sin depender de una paráfrasis más libre.
  spanish_consistency_notes:
  - Se conserva «siclos» en ambas cifras para mantener uniformidad en la unidad de medida.
  - Se usa «varón / hembra» para mantener el paralelismo del hebreo זָכָר / נְקֵבָה y la precisión sexual del contexto.
  - «Valoración» se mantiene como término técnico de Levítico 27; no se sustituye por una formulación más general.
