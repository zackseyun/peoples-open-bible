translation:
  language: es
  text: Se apoderó de sus torres fortificadas[a][b][c] y del muro de Jerusalén,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Capturó sus bastiones»'
    reason: previous_rendering
  - marker: b
    text: «Sus» se refiere a Jerusalén, tratada como figura femenina en el estilo poético circundante.
    reason: cultural_note
  - marker: c
    text: El raro término griego puede entenderse también como «bastiones», «ciudadelas» o «rampartes».
    reason: lexical_alternative
lexical_decisions:
- source_word: κατελάβετο
  english_pob_choice: seized
  chosen_spanish: tomó posesión de
  alternatives_spanish:
  - se apoderó de
  - capturó
  - ocupó
  lexicon: LSJ
  rationale: En este contexto de avance sobre fortificaciones, el griego puede expresar tanto toma violenta como toma de control. Como el audit trail inglés revisó 'occupied' y luego volvió a 'seized' por cercanía léxica, en español 'tomó posesión de' conserva la idea de control efectivo sin forzar una imagen más bélica de la que el contexto inmediato exige.
- source_word: τὰς πυργοβάρεις
  english_pob_choice: fortified towers
  chosen_spanish: torres fortificadas
  alternatives_spanish:
  - bastiones
  - ciudadelas
  - rampartes
  lexicon: Suda; LSJ
  rationale: El término es raro y denota una obra defensiva relacionada con torres o fortificaciones. 'Torres fortificadas' es claro en español, mantiene la imagen arquitectónica y evita 'bastiones', que puede sonar más técnico o anacrónico en español moderno.
- source_word: αὐτῆς
  english_pob_choice: her
  chosen_spanish: sus
  alternatives_spanish:
  - de ella
  - de Jerusalén
  - su
  lexicon: LSJ
  rationale: El pronombre femenino refiere a Jerusalén personificada como ciudad. En español, 'sus' comunica esa posesión femenina de forma natural sin perder la personificación.
- source_word: τὸ τεῖχος Ἰερουσαλήμ
  english_pob_choice: the wall of Jerusalem
  chosen_spanish: del muro de Jerusalén
  alternatives_spanish:
  - de la muralla de Jerusalén
  - del muro de Jerusalén
  lexicon: LSJ
  rationale: El griego singular colectivo τὸ τεῖχος se rinde de forma directa con 'muro'. 'Muralla' también sería posible, pero 'muro' preserva con más literalidad la imagen singular del original.
translation_notes:
  revision_awareness: 'El inglés POB pasó por una revisión importante en el verbo principal: de ''captured'' a ''occupied'' y luego de nuevo a ''seized''. La presente versión española busca ser fiel a esa tensión: conserva la idea de toma de control, pero la expresa con ''tomó posesión de'' para no imponer una lectura más violenta que el contexto histórico-literario inmediato.'
  spanish_consistency_notes:
  - Se mantiene 'Jerusalén' como figura femenina implícita en el posesivo 'sus', conforme al audit trail inglés.
  - '''Torres fortificadas'' traduce el matiz defensivo del término raro sin introducir vocabulario eclesiástico o medieval ajeno al pasaje.'
  - El singular 'muro' refleja el singular griego τὸ τεῖχος y evita pluralizar indebidamente.
