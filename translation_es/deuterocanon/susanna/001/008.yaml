lexical_decisions:
- source_word: καὶ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - y luego
  - y entonces
  lexicon: BDAG
  rationale: La conjunción coordinante griega se mantiene como enlace narrativo simple. En español, «y» reproduce con naturalidad la continuidad con lo anterior sin añadir matiz temporal no explicitado por el texto.
- source_word: ἐπιθυμήσαντες
  english_pob_choice: desired
  chosen_spanish: habiéndola deseado
  alternatives_spanish:
  - y la desearon
  - y la codiciaron
  - y, al desearla
  lexicon: BDAG
  rationale: El participio aoristo expresa una acción previa o concomitante al verbo principal del contexto. «Habiéndola deseado» conserva esa función participial y evita imponer de entrada una traducción más interpretativa como «codiciaron», aunque el contexto sí apunta a un deseo desordenado.
- source_word: αὐτῆς
  english_pob_choice: her
  chosen_spanish: la
  alternatives_spanish:
  - a ella
  - de ella
  lexicon: BDAG
  rationale: El pronombre genitivo femenino singular refiere a Susana. En español, al incorporarlo al verbo pronominalizado del participio, «habiéndola deseado» mantiene la referencia directa y fluida sin perder el antecedente femenino.
theological_decisions:
- issue: Tono moral del deseo expresado por ἐπιθυμέω en este contexto
  english_pob_reading: 'and they desired her, with footnote: ''Or, more explicitly in context, and they lusted after her.'''
  chosen_spanish_reading: y, habiéndola deseado,[a]
  alternative_spanish_readings:
  - y la codiciaron
  - y la deseaban desordenadamente
  rationale: La evidencia léxica permite un verbo relativamente neutral en la forma, mientras que el contexto narrativo revela el carácter ilícito del deseo. Por eso se conserva una traducción sobria en el cuerpo y se reserva la explicitación moral en nota, evitando adelantar más interpretación que la que el griego exige por sí solo.
  doctrine_reference: N/A
- issue: Representación del participio aoristo en una línea narrativa breve
  english_pob_reading: and they desired her
  chosen_spanish_reading: y, habiéndola deseado
  alternative_spanish_readings:
  - y la desearon
  - y después la desearon
  rationale: El griego presenta un participio que funciona de manera adverbial. El español puede reflejar esa relación con una estructura participial compuesta, que suena natural y preserva la secuencia del acto antes de la acción implícita posterior del relato.
  doctrine_reference: N/A
