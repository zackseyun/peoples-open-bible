translation:
  language: es
  text: Y pasará por ella[a], angustiado y hambriento; y cuando tenga hambre, se enfurecerá y maldecirá a su rey y a su Dios, y se volverá hacia arriba.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «mirará hacia arriba». El hebreo dice literalmente «se volverá hacia arriba»; probablemente describe al afligido alzando el rostro hacia el cielo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָבַר בָּהּ
  english_pob_choice: And he will pass through it
  chosen_spanish: Y pasará por ella
  alternatives_spanish:
  - Y él pasará por ella
  - Y atravesará la tierra
  lexicon: HALOT
  rationale: El verbo עבר con la preposición ב y el sufijo femenino singular indica pasar por ella; en español, 'pasará por ella' conserva el movimiento atravesando algo ya mencionado. Se mantiene el singular masculino del hebreo, pero sin añadir un pronombre explícito innecesario.
- source_word: נִקְשֶׁה
  english_pob_choice: hard-pressed
  chosen_spanish: afligido
  alternatives_spanish:
  - oprimido
  - apremiado
  - en gran angustia
  lexicon: HALOT
  rationale: La forma comunica estar en aprieto o bajo presión extrema. 'Afligido' es natural en español bíblico moderno y conserva el tono de sufrimiento sin precisar indebidamente la clase exacta de presión.
- source_word: וְרָעֵב
  english_pob_choice: and hungry
  chosen_spanish: y hambriento
  alternatives_spanish:
  - y con hambre
  - y famélico
  lexicon: HALOT
  rationale: 'El adjetivo es directo: hambre. ''Hambriento'' es claro, digno y fiel al sentido básico; ''famélico'' sería más fuerte de lo que el hebreo exige.'
- source_word: וְהָיָה כִּי יִרְעַב
  english_pob_choice: and when he is hungry
  chosen_spanish: y cuando tenga hambre
  alternatives_spanish:
  - y cuando esté hambriento
  - y sucederá que cuando tenga hambre
  lexicon: HALOT
  rationale: La construcción narrativa introduce la circunstancia siguiente. 'Cuando tenga hambre' reproduce bien el valor temporal de כי y suena natural en español.
- source_word: וְהִתְקַצַּף
  english_pob_choice: he will become enraged
  chosen_spanish: se enfurecerá
  alternatives_spanish:
  - se irritará
  - arderá en ira
  - se pondrá furioso
  lexicon: HALOT
  rationale: El hitpael expresa entrar en un estado de ira. 'Se enfurecerá' conserva la inceptividad y el aumento de la ira mejor que un simple 'se enojará'.
- source_word: וְקִלֵּל
  english_pob_choice: and curse
  chosen_spanish: y maldecirá
  alternatives_spanish:
  - y blasfemará
  - y proferirá maldiciones contra
  lexicon: HALOT
  rationale: קלל en este contexto es 'maldecir'. 'Maldecirá' es la correspondencia más directa y evita suavizar la dureza del texto.
- source_word: בְּמַלְכּוֹ
  english_pob_choice: his king
  chosen_spanish: a su rey
  alternatives_spanish:
  - contra su rey
  - por su rey
  lexicon: HALOT
  rationale: Con קלל, el objeto de la maldición puede expresarse naturalmente en español con 'a'. Aunque la preposición hebrea es ב, aquí funciona como marca del destinatario de la maldición; 'a su rey' mantiene la relación sin sonar forzado.
- source_word: וּבֵאלֹהָיו
  english_pob_choice: and his God
  chosen_spanish: y a su Dios
  alternatives_spanish:
  - y a sus dioses
  - y a su dios
  lexicon: HALOT
  rationale: Se conserva el singular 'Dios', como en el audit trail inglés, porque el texto no obliga a leer plural ni identifica otra deidad explícitamente. En español, 'su Dios' mantiene la tensión teológica sin resolverla.
- source_word: וּפָנָה לְמָעְלָה
  english_pob_choice: and he will turn upward
  chosen_spanish: y volverá la mirada hacia arriba
  alternatives_spanish:
  - y se volverá hacia arriba
  - y mirará hacia arriba
  lexicon: HALOT
  rationale: פנה + למעלה expresa un giro o vuelta hacia arriba. En español, 'volver la mirada hacia arriba' hace natural el gesto implícito y conserva la dirección sin añadir 'rostro' que el hebreo no menciona.
theological_decisions:
- issue: Sujeto singular representativo
  english_pob_reading: Use singular 'he' throughout
  chosen_spanish_reading: Mantener el singular verbal sin forzar un sujeto explícito
  alternative_spanish_readings:
  - usar 'él' de manera reiterada
  - usar 'uno' o 'quien' para generalizar
  rationale: El hebreo usa formas masculinas singulares de manera consistente. En español se conserva esa concordancia por fidelidad gramatical, pero se evita sobrecargar el verso con pronombres innecesarios.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Identidad de 'su Dios'
  english_pob_reading: Render singular as 'his God' without specifying whether the speaker is apostate, pagan, or covenant member
  chosen_spanish_reading: Traducir 'su Dios' sin especificar si se trata de Yahvé o de otro dios
  alternative_spanish_readings:
  - '''sus dioses'''
  - '''su Dios, es decir, Yahvé'''
  rationale: El hebreo conserva ambigüedad teológica y no nombra aquí a Yahvé por el tetragrámaton. La versión española mantiene esa tensión textual en vez de resolverla prematuramente.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: Dirección del gesto final
  english_pob_reading: and he will turn upward
  chosen_spanish_reading: y volverá la mirada hacia arriba
  alternative_spanish_readings:
  - y se elevará la cabeza
  - y mirará hacia arriba
  rationale: El texto sólo dice que se vuelve hacia arriba. 'Volverá la mirada hacia arriba' comunica bien el movimiento sin introducir una glosa interpretativa más fuerte que el hebreo.
  doctrine_reference: DOCTRINE.md §Translation philosophy 2
translation_notes:
  revision_awareness: Se tuvo en cuenta la última revisión inglesa que eliminó 'his face' y dejó simplemente 'turn upward'. Por eso la línea española evita añadir 'rostro' y traduce el gesto de manera sobria como 'volverá la mirada hacia arriba', manteniendo la apertura interpretativa del original.
  spanish_consistency_notes:
  - Se conserva 'Dios' en singular, en paralelo con la decisión inglesa de no pluralizar ni especificar más de lo que dice el hebreo.
  - Se evita 'SEÑOR' para el nombre divino porque este versículo no contiene el tetragrámaton; el contexto inmediato mantiene la ambigüedad de 'su Dios'.
  - El registro es bíblico moderno y sobrio, sin calcos excesivamente literales que oscurezcan el español.
