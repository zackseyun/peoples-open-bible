revisions:
- from: Antes de que se acostaran[a], los hombres de la ciudad, los hombres de Sodoma, rodearon la casa, desde el joven hasta el viejo[b], todo el pueblo desde cada extremo[c].
  to: Antes de que se acostaran, los hombres de la ciudad, los hombres de Sodoma, rodearon la casa[a], desde jóvenes hasta viejos[b], todo el pueblo de todos los rincones[c].
  rationale: Se ajusta el español para reflejar con mayor naturalidad el modismo hebreo final y el merismo de edades, sin alterar el contenido ni la distinción fuente entre 'hombres' y 'todo el pueblo'. También se mejora la nota léxica sobre נָסַבּוּ con una alternativa española más precisa.
