translation:
  language: es
  text: Pero si quedan pocos años hasta el Año del Jubileo[a], entonces hará cuentas con él; conforme a sus años, devolverá el monto de su redención.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el precio de su redención». La expresión hebrea se refiere al monto que debe pagarse por su liberación, no a la redención en sentido abstracto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מְעַט
  english_pob_choice: few
  chosen_spanish: pocos
  alternatives_spanish:
  - unos pocos
  - poco
  lexicon: HALOT
  rationale: En el contexto de años restantes, 'pocos' expresa la cantidad de manera natural y fiel al valor cuantitativo del hebreo.
- source_word: נִשְׁאַר בַּשָּׁנִים
  english_pob_choice: years remain
  chosen_spanish: quedan ... años
  alternatives_spanish:
  - restan ... años
  - permanecen ... años
  lexicon: HALOT
  rationale: El nifal de שׁאר comunica lo que queda o permanece; en español, 'quedan años' transmite con claridad la idea temporal sin sonar forzado.
- source_word: שְׁנַת הַיֹּבֵל
  english_pob_choice: the Year of Jubilee
  chosen_spanish: el Año del Jubileo
  alternatives_spanish:
  - el año del jubileo
  lexicon: HALOT
  rationale: Se conserva la designación institucional establecida de Levítico 25; la mayúscula marca el nombre formal de la institución, no una ampliación doctrinal.
- source_word: וְחִשַּׁב לוֹ
  english_pob_choice: he shall calculate with him
  chosen_spanish: hará cuentas con él
  alternatives_spanish:
  - calculará con él
  - hará el cálculo con él
  lexicon: HALOT
  rationale: חשב aquí es un cálculo económico-jurídico. 'Hará cuentas con él' reproduce la relación interpersonal del procedimiento de rescate y suena idiomático en español.
- source_word: כְּפִי שָׁנָיו
  english_pob_choice: according to his years
  chosen_spanish: conforme a sus años
  alternatives_spanish:
  - según sus años
  - en proporción a sus años
  lexicon: HALOT
  rationale: כפי expresa conformidad o proporción. 'Conforme a sus años' mantiene la fórmula legal y conserva la proporcionalidad del texto.
- source_word: יָשִׁיב אֶת גְּאֻלָּתוֹ
  english_pob_choice: he shall repay the amount for his redemption
  chosen_spanish: devolverá el monto de su rescate
  alternatives_spanish:
  - restituirá el precio de su rescate
  - pagará de nuevo su rescate
  lexicon: HALOT
  rationale: El hiphil de שוב aquí implica devolver o restituir; גאֻלה en este contexto es el precio/monto de rescate. 'Monto de su rescate' preserva el sentido económico sin volverlo abstracto.
theological_decisions:
- issue: Naturaleza de גְּאֻלָּה en contexto legal-económico
  english_pob_reading: the amount for his redemption / his redemption price
  chosen_spanish_reading: el monto de su rescate
  alternative_spanish_readings:
  - el precio de su rescate
  - su rescate
  rationale: El contexto trata de una suma concreta que debe devolverse según los años restantes; por eso se evita 'rescatar' en sentido abstracto y se explicita la dimensión monetaria implícita en el término.
  doctrine_reference: Levítico 25:47-55; especialmente 25:52
- issue: Tratamiento del Jubileo como institución
  english_pob_reading: the Year of Jubilee
  chosen_spanish_reading: el Año del Jubileo
  alternative_spanish_readings:
  - el año jubilar
  rationale: La referencia no describe un año cualquiera, sino una institución pactal específica; se conserva el nombre tradicional e institucional sin sustituirlo por una paráfrasis.
  doctrine_reference: Levítico 25:8-17
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que añadió 'the amount for' para aclarar que גְּאֻלָּה aquí designa una suma económica concreta. La versión española refleja esa aclaración con 'el monto de su rescate', manteniendo la relación legal y el tono sobrio del original.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se usa 'rescate' para גְּאֻלָּה en sentido monetario, coherente con el registro legal de Levítico 25.
  - Se conserva 'Año del Jubileo' como término institucional estable en el bloque legal.
  - La construcción 'hacer cuentas con él' preserva el matiz relacional de חשב לו sin sonar demasiado técnico en español.
