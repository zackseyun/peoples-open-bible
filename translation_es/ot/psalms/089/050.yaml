    reason: lexical_alternative
  - marker: b
    text: O «por tu fidelidad». La frase puede expresar el modo o la base del juramento.
    reason: lexical_alternative
  revision_rationale: Se revisa para corregir la ubicación de la nota [b], que debe ir en «en tu fidelidad», y para mejorar la dignidad y naturalidad poética de «de antes» a «de antaño». Se mantiene «Señor» para אֲדֹנָי, «amor leal» para חֶסֶד en contexto pactal y «actos» para reflejar el plural hebreo de forma idiomática.
