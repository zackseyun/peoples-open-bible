translation:
  language: es
  text: 'Y aconteció que la palabra de Yahvé vino a mí por segunda vez, diciendo: «¿Qué ves?». Y yo dije: «Veo una olla hirviente[a], y su rostro viene del norte[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una olla soplada»; el participio hebreo puede sugerir una olla avivada por el fuego o soplada hasta hervir.
    reason: lexical_alternative
  - marker: b
    text: Lit. «su rostro [está] desde la cara del norte». La expresión probablemente alude a la parte expuesta o a la abertura de la olla orientada con referencia al norte.
    reason: alternative_reading
lexical_decisions:
- source_word: דְבַר יְהוָה
  english_pob_choice: the word of Yahweh
  chosen_spanish: la palabra de Yahvé
  alternatives_spanish:
  - el mensaje de Yahvé
  lexicon: HALOT
  rationale: Se conserva la fórmula profética estable con «palabra», que refleja mejor דָּבָר en este contexto y mantiene la cadencia bíblica. Se usa «Yahvé» según el criterio del proyecto para el nombre divino.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el equivalente proyectual para el Tetragrámaton, evitando el sustituto tradicional de máscara en favor de una forma transliterada auditable.
- source_word: שֵׁנִית
  english_pob_choice: a second time
  chosen_spanish: por segunda vez
  alternatives_spanish:
  - de nuevo
  - otra vez
  lexicon: HALOT
  rationale: La expresión indica secuencia explícita; «por segunda vez» es más preciso que un simple «de nuevo» y conserva el valor ordinal.
- source_word: מָה אַתָּה רֹאֶה
  english_pob_choice: What do you see?
  chosen_spanish: ¿Qué ves?
  alternatives_spanish:
  - ¿Qué estás viendo?
  lexicon: HALOT
  rationale: En discurso directo, el español natural usa presente simple. Se mantiene la pregunta breve y literal sin añadir matices no presentes en el hebreo.
- source_word: סִיר
  english_pob_choice: pot
  chosen_spanish: olla
  alternatives_spanish:
  - cazuela
  - caldero
  lexicon: HALOT
  rationale: «Olla» comunica bien en español moderno un recipiente de cocción sin el tono excesivamente arcaico de «caldero». Aunque el inglés optó por «pot», en español «olla» es más idiomática y sigue siendo suficientemente general.
- source_word: נָפוּחַ
  english_pob_choice: boiling
  chosen_spanish: hirviente
  alternatives_spanish:
  - que hierve
  - en ebullición
  - soplada
  lexicon: HALOT
  rationale: El participio sugiere una olla avivada por el fuego o soplada hasta hervir. «Hirviente» conserva la imagen dinámica y evita resolver demasiado el mecanismo. Se documenta la alternativa literal «soplada» sin incorporarla al texto principal.
- source_word: וּפָנָיו
  english_pob_choice: its face
  chosen_spanish: su rostro
  alternatives_spanish:
  - su frente
  - su faz
  - su abertura
  lexicon: HALOT
  rationale: Se mantiene el valor básico de פָּנִים con «rostro», que en español bíblico es natural y conserva la metáfora. Se evita «abertura» porque interpretaría de más la imagen en el texto principal.
- source_word: מִפְּנֵי צָפוֹנָה
  english_pob_choice: from the north
  chosen_spanish: hacia el norte
  alternatives_spanish:
  - desde el norte
  - de frente al norte
  - desde la dirección del norte
  lexicon: HALOT
  rationale: La construcción hebrea es imagística y ambigua. En español se opta por «hacia el norte» para preservar la orientación visual de la visión sin cerrar prematuramente la relación exacta entre la olla y el punto cardinal. Se conserva la tensión interpretativa, coherente con el contexto inmediato.
theological_decisions:
- issue: Nombre divino en la fórmula profética
  english_pob_reading: the word of Yahweh
  chosen_spanish_reading: la palabra de Yahvé
  alternative_spanish_readings:
  - la palabra del Señor
  rationale: Se mantiene la transliteración «Yahvé» conforme al criterio doctrinal del proyecto y para no ocultar el nombre propio detrás de un título genérico. La fórmula profética se preserva de manera reconocible en español.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Dirección y geometría de la visión de la olla
  english_pob_reading: its face is from the north
  chosen_spanish_reading: su rostro está hacia el norte
  alternative_spanish_readings:
  - su rostro está desde el norte
  - su rostro está frente al norte
  rationale: El hebreo mantiene una expresión visual difícil. La redacción elegida conserva la referencia al norte sin resolver mecánicamente la orientación exacta de la olla. Esto respeta la tensión interpretativa y deja que el verso siguiente explique el simbolismo.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: La redacción española sigue la última revisión inglesa al simplificar la relación espacial a una forma natural y suficientemente literal, manteniendo la expresión formal «su rostro» y evitando cerrar la ambigüedad de la visión. Se incorporó la decisión proyectual de traducir YHWH como «Yahvé».
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como forma consistente para el nombre divino.
  - Se prefirió «olla» por naturalidad en español, aunque el inglés usa «pot»; la opción sigue siendo semánticamente amplia.
  - «Rostro» conserva la imagen hebrea de פָּנִים y evita una paráfrasis interpretativa excesiva.
  - La frase final quedó deliberadamente abierta para no resolver la orientación de la visión más allá de lo que el verso exige.
