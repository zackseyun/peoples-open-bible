id: ISA.36.6
reference: Isaiah 36:6
source:
  edition: WLC
  text: הִנֵּ֣ה בָטַ֡חְתָּ עַל מִשְׁעֶנֶת֩ הַ/קָּנֶ֨ה הָ/רָצ֤וּץ הַ/זֶּה֙ עַל מִצְרַ֔יִם אֲשֶׁ֨ר יִסָּמֵ֥ךְ אִישׁ֙ עָלָ֔י/ו וּ/בָ֥א בְ/כַפּ֖/וֹ וּ/נְקָבָ֑/הּ כֵּ֚ן פַּרְעֹ֣ה מֶֽלֶךְ מִצְרַ֔יִם לְ/כָֽל הַ/בֹּטְחִ֖ים עָלָֽי/ו־־־־׃
translation:
  text: Look[a], you are trusting in Egypt, that broken reed of a staff, which, if a man leans on it, goes into his hand and pierces it. So is Pharaoh king of Egypt to all who trust in him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'a man'; the singular masculine is used representatively here.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Introduces the statement with attention-getting force. 'Look' is natural modern English and preserves the deictic emphasis better than the more archaic 'Behold.'
- source_word: בָטַחְתָּ
  chosen: you are trusting
  alternatives:
  - you trust
  - you have trusted
  lexicon: HALOT
  rationale: The perfect here addresses the present stance of reliance; English present progressive conveys the ongoing political trust in context without woodenly preserving Hebrew aspect.
- source_word: מִשְׁעֶנֶת
  chosen: staff
  alternatives:
  - support
  - walking stick
  lexicon: HALOT
  rationale: In construct with 'reed,' the image is of something used for support. 'Staff' is idiomatic in English for the metaphor and fits the following description of leaning on it.
- source_word: הַקָּנֶה הָרָצוּץ
  chosen: that broken reed
  alternatives:
  - that crushed reed
  - that splintered reed
  lexicon: HALOT
  rationale: רָצוּץ denotes something crushed or broken. 'Broken reed' is the established and clear metaphor in English and matches the image of unreliable support.
- source_word: עַל מִצְרַיִם
  chosen: in Egypt
  alternatives:
  - on Egypt
  - upon Egypt
  lexicon: HALOT
  rationale: Although the preposition is literally 'on/upon,' with בטח English idiom requires 'trust in.' The phrase identifies Egypt as the referent of the metaphorical staff.
- source_word: אֲשֶׁר יִסָּמֵךְ אִישׁ עָלָיו
  chosen: which, if a man leans on it
  alternatives:
  - on which a man leans
  - which a man would lean on
  lexicon: HALOT
  rationale: The relative clause describes the hypothetical use of the reed. Rendering with 'if' makes the conditional sense explicit and natural in English.
- source_word: אִישׁ
  chosen: a man
  alternatives:
  - someone
  - a person
  lexicon: HALOT
  rationale: Per gender-accurate policy, the masculine singular is retained as 'a man' where it functions generically in a representative illustration.
- source_word: וּבָא בְכַפּוֹ
  chosen: goes into his hand
  alternatives:
  - enters his palm
  - comes into his hand
  lexicon: HALOT
  rationale: Describes the reed penetrating the hand of the one leaning on it. 'Goes into his hand' is vivid and straightforward English.
- source_word: וּנְקָבָהּ
  chosen: and pierces it
  alternatives:
  - and punctures it
  - and wounds it
  lexicon: HALOT
  rationale: The suffix refers back to the hand. 'Pierces it' preserves the concrete injury implied by the verb better than the more general 'wounds it.'
- source_word: כֵּן
  chosen: So is
  alternatives:
  - Thus is
  - In the same way is
  lexicon: HALOT
  rationale: Marks the comparison between the reed image and Pharaoh. 'So is' is concise and idiomatic.
- source_word: פַּרְעֹה מֶלֶךְ מִצְרַיִם
  chosen: Pharaoh king of Egypt
  alternatives:
  - Pharaoh, the king of Egypt
  lexicon: HALOT
  rationale: A direct appositional rendering preserves the Hebrew compactness while remaining clear.
- source_word: לְכָל הַבֹּטְחִים עָלָיו
  chosen: to all who trust in him
  alternatives:
  - for all who trust in him
  - to everyone trusting in him
  lexicon: HALOT
  rationale: Expresses Pharaoh's character toward all who rely on him. 'Trust in him' keeps consistency with the earlier בטח rendering.
