translation:
  language: es
  text: los oficiales de Judá y los oficiales de Jerusalén[a], los funcionarios de la corte y los sacerdotes, y todos los del pueblo de la tierra que pasaron entre las mitades del becerro—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «eunucos». El término hebreo puede referirse tanto a eunucos literales como a funcionarios de la corte.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׂרֵי
  english_pob_choice: officials
  chosen_spanish: oficiales
  alternatives_spanish:
  - príncipes
  - líderes
  lexicon: HALOT
  rationale: שַׂר designa gobernantes o altos funcionarios. «Oficiales» funciona de manera natural en español moderno y evita el tono arcaizante de «príncipes», manteniendo el registro administrativo del contexto.
- source_word: יְהוּדָה
  english_pob_choice: Judah
  chosen_spanish: Judá
  lexicon: HALOT
  rationale: Nombre propio bíblico estándar en español.
- source_word: יְרוּשָׁלִַם
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  lexicon: HALOT
  rationale: Forma española estándar del nombre de la ciudad.
- source_word: הַסָּרִסִים
  english_pob_choice: court officials
  chosen_spanish: los funcionarios de la corte
  alternatives_spanish:
  - los eunucos
  - los funcionarios reales
  lexicon: HALOT
  rationale: סָרִיס puede referirse a eunucos literales o a cargos de palacio/corte. Dado que la lista enumera grupos sociales vinculados al acto de pacto, «funcionarios de la corte» comunica la función probable sin cerrar indebidamente la ambigüedad.
- source_word: הַכֹּהֲנִים
  english_pob_choice: the priests
  chosen_spanish: los sacerdotes
  lexicon: HALOT
  rationale: Equivalente normal y claro de כֹּהֲנִים en español bíblico.
- source_word: כֹל עַם הָאָרֶץ
  english_pob_choice: all the people of the land
  chosen_spanish: todo el pueblo de la tierra
  alternatives_spanish:
  - toda la gente de la tierra
  - todo el pueblo del país
  lexicon: HALOT
  rationale: Preserva el modismo social y su alcance colectivo sin añadir interpretaciones como «común».
- source_word: הָעֹבְרִים
  english_pob_choice: who passed
  chosen_spanish: que pasaron
  alternatives_spanish:
  - que estaban pasando
  - que cruzaron
  lexicon: HALOT
  rationale: El participio se refiere a quienes realizaron el rito del pacto; «que pasaron» es una relativa natural y fiel al sentido retrospectivo.
- source_word: בֵּין
  english_pob_choice: between
  chosen_spanish: entre
  alternatives_spanish:
  - por en medio de
  lexicon: HALOT
  rationale: Preposición directa y estándar en la fórmula del rito de pacto.
- source_word: בִּתְרֵי
  english_pob_choice: the pieces of
  chosen_spanish: las mitades de
  alternatives_spanish:
  - las piezas de
  - los trozos de
  lexicon: HALOT
  rationale: בֶּתֶר alude a algo dividido en partes; en este contexto de sacrificio, «mitades» reproduce con precisión la imagen de un animal partido en dos.
- source_word: הָעֵגֶל
  english_pob_choice: the calf
  chosen_spanish: la becerra
  alternatives_spanish:
  - el becerro
  - el ternero
  lexicon: HALOT
  rationale: עֵגֶל puede significar becerro/calf. Como el contexto inmediato habla de un animal sacrificado y partido en dos, «becerra» mantiene una forma natural en español para el referente animal sin sobrecargar el pasaje.
theological_decisions:
- issue: Ambigüedad de סָרִסִים
  english_pob_reading: main text reads 'court officials' with a footnote preserving 'eunuchs' as a lexical alternative
  chosen_spanish_reading: texto principal con «funcionarios de la corte» y nota «eunucos» como alternativa léxica
  alternative_spanish_readings:
  - los eunucos
  - los funcionarios reales
  rationale: La palabra hebrea admite ambos valores. El contexto de la lista social favorece una lectura administrativa, pero no elimina la posibilidad literal. La nota conserva la tensión interpretativa sin imponer una solución única.
  doctrine_reference: Translation philosophy §3 (preserve lexical/theological tension where genuine)
- issue: Identidad de הָעָם הָאָרֶץ en el contexto del pacto
  english_pob_reading: all the people of the land
  chosen_spanish_reading: todo el pueblo de la tierra
  alternative_spanish_readings:
  - todo el pueblo del país
  - toda la gente de la tierra
  rationale: Se mantiene el valor colectivo del hebreo sin domesticarlo a una categoría sociológica moderna más específica de lo que el texto ofrece.
  doctrine_reference: Lexical conservatism in social-historical terms
translation_notes:
  revision_awareness: 'Concordancia alta con el audit trail inglés: se mantiene la lista social, la ambigüedad de סָרִיסִים mediante nota, y la fórmula del rito de pacto con un español natural y publicable. No se observaron revisiones aplicadas en el paquete fuente.'
  spanish_consistency_notes:
  - Se usó «Yahvé» según la terminología del proyecto no aplicable en este versículo, por lo que no aparece en el texto.
  - Se evitó «SEÑOR» y se conservaron nombres propios bíblicos estándar en español.
  - «Mitades» reproduce la partición ritual del animal; no se optó por «piezas» para evitar perder la imagen de una división en dos en el contexto inmediato.
  - El orden de la lista refleja el hebreo y el inglés auditado, con ritmo natural en español.
