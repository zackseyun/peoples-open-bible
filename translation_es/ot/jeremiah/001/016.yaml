translation:
  language: es
  text: Y pronunciaré mis juicios contra ellos por toda su maldad[a], porque me abandonaron, quemaron incienso a otros dioses[b], y se postraron ante las obras de sus propias manos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y hablaré mis juicios contra ellos acerca de toda su maldad». El hebreo dice literalmente «hablaré», pero aquí probablemente tiene el sentido formal de pronunciar juicio.'
    reason: lexical_alternative
  - marker: b
    text: «Las obras de sus propias manos» se refiere a ídolos fabricados por ellos mismos.
    reason: cultural_note
lexical_decisions:
- source_word: וְדִבַּרְתִּי
  english_pob_choice: I will pronounce
  chosen_spanish: hablaré
  alternatives_spanish:
  - pronunciaré
  - declararé
  lexicon: HALOT
  rationale: El verbo דבר en este contexto profético-jurídico puede expresar una proclamación formal. En español, «hablaré» mantiene la base verbal sin sonar forzado; el matiz judicial queda reforzado por «mis juicios».
- source_word: מִשְׁפָּטַי
  english_pob_choice: my judgments
  chosen_spanish: mis juicios
  alternatives_spanish:
  - mis sentencias
  - mi justicia
  lexicon: HALOT
  rationale: מִשְׁפָּט tiene aquí sentido forense de decisiones o juicios. «Mis juicios» conserva mejor el campo legal que «mi justicia», que sería más amplio y menos preciso.
- source_word: אוֹתָם
  english_pob_choice: against them
  chosen_spanish: contra ellos
  alternatives_spanish:
  - sobre ellos
  - a ellos
  lexicon: HALOT
  rationale: Aunque el hebreo lleva objeto directo con pronombre, el español natural en este giro judicial es «contra ellos». Expresa el carácter adversativo de la declaración.
- source_word: עַל כָּל רָעָתָם
  english_pob_choice: for all their evil
  chosen_spanish: por toda su maldad
  alternatives_spanish:
  - a causa de toda su maldad
  - por toda su maldad y malicia
  lexicon: HALOT
  rationale: עַל marca aquí base o causa. «Por toda su maldad» es natural en español y conserva la relación causal sin diluir el juicio. «Maldad» preserva el alcance moral general de רָעָה.
- source_word: אֲשֶׁר
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - ya que
  - puesto que
  lexicon: HALOT
  rationale: El relativo introduce la explicación de la acusación; «porque» hace explícita la causalidad en español, como en la auditoría inglesa.
- source_word: עֲזָבוּנִי
  english_pob_choice: they have forsaken me
  chosen_spanish: me abandonaron
  alternatives_spanish:
  - me han abandonado
  - me dejaron
  lexicon: HALOT
  rationale: El hebreo expresa ruptura relacional y de pacto. «Abandonaron» comunica esa gravedad de forma clara y natural; «me dejaron» sería demasiado débil.
- source_word: וַיְקַטְּרוּ
  english_pob_choice: burned incense
  chosen_spanish: quemaron incienso
  alternatives_spanish:
  - ofrecieron incienso
  - hicieron humear incienso
  lexicon: HALOT
  rationale: En contextos idólatras, קטר se refiere a quemar incienso u ofrendas humeantes. «Quemaron incienso» es la equivalencia estándar y comprensible.
- source_word: לֵאלֹהִים אֲחֵרִים
  english_pob_choice: to other gods
  chosen_spanish: a otros dioses
  alternatives_spanish:
  - para otros dioses
  - a dioses ajenos
  lexicon: HALOT
  rationale: La dirección dativa se expresa naturalmente con «a». «Otros dioses» conserva el lenguaje polémico del pacto sin suavizarlo.
- source_word: וַיִּשְׁתַּחֲוּוּ
  english_pob_choice: bowed down
  chosen_spanish: se postraron
  alternatives_spanish:
  - se inclinaron
  - adoraron
  lexicon: HALOT
  rationale: El verbo denota postración física. «Se postraron» preserva el gesto corporal y evita convertirlo demasiado pronto en una abstracción como «adoraron».
- source_word: לְמַעֲשֵׂי יְדֵיהֶם
  english_pob_choice: to the works of their own hands
  chosen_spanish: ante la obra de sus propias manos
  alternatives_spanish:
  - a la obra de sus manos
  - ante las obras de sus manos
  lexicon: HALOT
  rationale: La expresión idiomática alude a ídolos fabricados por ellos mismos. «La obra de sus propias manos» conserva la ironía profética; «ante» refleja bien el acto de postración en español, aunque el hebreo lleve la preposición לְ.
theological_decisions:
- issue: Naturaleza del acto divino en וְדִבַּרְתִּי מִשְׁפָּטַי
  english_pob_reading: God is announcing judicial sentences against Judah, not merely speaking generally about justice.
  chosen_spanish_reading: Dios anuncia juicios judiciales contra Judá, no simplemente habla en términos generales sobre justicia.
  alternative_spanish_readings:
  - Dios hablará de sus ordenanzas con ellos
  - Dios ejecutará sus juicios sin énfasis en el anuncio verbal
  rationale: El paralelo con la auditoría inglesa y el contexto profético indican una proclamación formal de juicio. «Hablaré mis juicios» mantiene la base verbal de דבר y a la vez el sentido forense de מִשְׁפָּטַי.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 5
- issue: Representación de los actos idólatras concretos
  english_pob_reading: 'The verse lists concrete covenant violations: forsaking the LORD, burning incense to other gods, and bowing to handmade idols.'
  chosen_spanish_reading: 'El versículo enumera violaciones concretas del pacto: abandonarlo, quemar incienso a otros dioses y postrarse ante ídolos hechos por sus manos.'
  alternative_spanish_readings:
  - una sola mención general de idolatría
  - adorar ídolos
  rationale: Se preservan los actos específicos del hebreo para no aplanar la acusación. La formulación española conserva la secuencia y la carga teológica del reproche profético.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 5
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no hubo cambios aplicados en el último pase, y el consenso de revisión fue de alta concordancia.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera del versículo porque el hebreo de este versículo usa el sufijo pronominal y no nombra explícitamente el tetragrámaton.
  - Se prefirió «mis juicios» frente a «mi justicia» para conservar el matiz forense de מִשְׁפָּטַי.
  - «Quemaron incienso» conserva el valor idólatra específico de קטר en este contexto.
  - «Se postraron» preserva el gesto físico antes de la interpretación cultual.
  - La nota de la obra de las manos explica el sentido idolátrico sin introducir vocabulario ajeno al texto.
