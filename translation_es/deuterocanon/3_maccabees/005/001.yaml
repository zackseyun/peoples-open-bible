translation:
  language: es
  text: Entonces[a], mandó llamar a Hermón, que estaba a cargo de los elefantes, lleno de grave ira y de furor completamente implacable[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La línea griega de la fuente se interrumpe en «ἀμετά-». La traducción refleja el sentido más probable a partir del texto visible y del contexto inmediato: que su ira no cedía o no se dejaba cambiar.'
    reason: textual_variant
  - marker: b
    text: O «inalterable», si el adjetivo final se entiende de manera más literal a partir de la forma visible truncada, en vez de más idiomáticamente en el contexto como «implacable».
    reason: lexical_alternative
lexical_decisions:
