theological_decisions:
- issue: Textual difficulty and possible irregularity in the list
  english_pob_reading: The translation preserves the Hebrew wording as transmitted rather than emending it.
  chosen_spanish_reading: La traducción preserva el hebreo tal como ha sido transmitido, sin corregirlo ni reconstruir la lista.
  alternative_spanish_readings:
  - Algunos intérpretes podrían entender una reconstrucción textual y leer a Jonatán como uno de los hijos de Jasén.
  - Una paráfrasis más fluida podría suavizar la dificultad, pero eso ocultaría la irregularidad textual.
  rationale: 'El hebreo es muy breve y difícil; el testimonio inglés del POB opta por no emendar. En español se mantiene la misma decisión: no se resuelve artificialmente la tensión textual, para respetar la base transmitida y la auditoría existente.'
