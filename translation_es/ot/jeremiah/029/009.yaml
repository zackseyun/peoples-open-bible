review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: causalidad («Porque»), falsedad de la profecía, destinatarios («a ustedes»), falsa autorización («en mi nombre») y negación divina de envío. Sin embargo, «no los he enviado» introduce un perfecto compuesto menos ceñido al valor sencillo de לֹא שְׁלַחְתִּים que «no los envié», y la fórmula final debe conservar con claridad el oráculo profético de Yahvé.'
  spanish_quality_summary: 'El español es claro y legible. «Porque profetizan falsamente a ustedes» suena aceptable, aunque algo más natural y fluido en español bíblico moderno es «Porque les profetizan falsamente en mi nombre». El principal ajuste necesario es verbal: «no los envié» suena más directo, natural y fiel al hebreo que «no los he enviado».'
  glossary_alignment: 'Se alinea bien con la terminología del proyecto: יְהוָה → «Yahvé» correctamente; בִּשְׁמִי → «en mi nombre» preservado; no hay conflictos con otros términos doctrinales. No se requieren notas nuevas, ya que el español no introduce ambigüedad significativa aquí.'
  issues:
  - severity: medium
    issue: Tiempo verbal en «no los he enviado»
    rationale: 'El hebreo לֹא שְׁלַחְתִּים se vierte más naturalmente y con mayor precisión en este contexto profético como pretérito simple: «no los envié». El perfecto compuesto puede sugerir una relevancia aspectual no marcada en el original.'
  - severity: low
    issue: Orden y naturalidad de «profetizan falsamente a ustedes»
    rationale: Aunque comprensible, en español suena más idiomático «les profetizan falsamente» o «profetizan falsamente para ustedes». Dado que לָכֶם es dativo de destinatario, «les» expresa mejor la función sin pérdida de sentido.
  revised_spanish_text: Porque les profetizan falsamente en mi nombre; no los envié, declara Yahvé.
  revision_rationale: Se ajusta el dativo a la forma más natural en español («les») y se reemplaza «no los he enviado» por «no los envié» para reflejar con mayor fidelidad y naturalidad la negación divina de autorización en el hebreo. No hacen falta notas adicionales.
