translation:
  language: es
  text: Bendito eres[a], Señor, Dios de nuestros padres, y alabado y altamente exaltado por siempre; y bendito es tu santo nombre de gloria, y sobremanera alabado y altamente exaltado por todos los siglos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, con un orden más explícito en español, «Bendito eres tú». El griego usa una construcción predicativa directa de bendición, y el texto principal la expresa con un español más natural.
    reason: lexical_alternative
lexical_decisions:
- source_word: Εὐλογητὸς
  english_pob_choice: Blessed are you
  chosen_spanish: Bendito eres tú
  alternatives_spanish:
  - Bendito seas tú
  - Bendito eres
  lexicon: LSJ
  rationale: La fórmula griega es una predicación directa de bendición en segunda persona; en español, «Bendito eres tú» conserva el адресo doxológico sin volverlo un imperativo artificial.
- source_word: Κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Dueño
  - Maestro
  lexicon: LSJ
  rationale: «Señor» es el equivalente reverencial normal de κύριος en invocación directa y mantiene el registro bíblico sin perder claridad.
- source_word: ὁ θεὸς τῶν πατέρων ἡμῶν
  english_pob_choice: the God of our fathers
  chosen_spanish: Dios de nuestros padres
  alternatives_spanish:
  - Dios de nuestros antepasados
  lexicon: LSJ
  rationale: Se conserva la fórmula covenantal y familiar del griego. «Padres» refleja el plural masculino del original y coincide con el valor tradicional de la expresión bíblica.
- source_word: αἰνετὸς
  english_pob_choice: praised
  chosen_spanish: alabado
  alternatives_spanish:
  - digno de alabanza
  - loado
  lexicon: LSJ
  rationale: «Alabado» reproduce bien el predicado adjetival de una doxología y suena natural en español litúrgico contemporáneo.
- source_word: ὑπερυψούμενος
  english_pob_choice: highly exalted
  chosen_spanish: altamente exaltado
  alternatives_spanish:
  - exaltado sobre toda medida
  - sumamente exaltado
  lexicon: LSJ
  rationale: El compuesto intensivo se rinde con «altamente exaltado», conservando el sentido de elevación superlativa sin añadir interpretación ajena.
- source_word: εἰς τοὺς αἰῶνας
  english_pob_choice: forever
  chosen_spanish: por siempre
  alternatives_spanish:
  - para siempre
  - por los siglos
  lexicon: LSJ
  rationale: «Por siempre» transmite duración continua con naturalidad en español y corresponde al valor idiomático que el inglés POB resuelve con «forever».
- source_word: τὸ ὄνομα τῆς δόξης σου τὸ ἅγιον
  english_pob_choice: your holy name of glory
  chosen_spanish: tu santo nombre de gloria
  alternatives_spanish:
  - el santo nombre de tu gloria
  - tu santo y glorioso nombre
  lexicon: LSJ
  rationale: 'Se conserva la estructura compacta del griego: «nombre de gloria» refleja la relación genitiva sin separar demasiado los elementos, y «santo» califica directamente el nombre.'
- source_word: ὑπεραινετὸν
  english_pob_choice: exceedingly praised
  chosen_spanish: sobremanera alabado
  alternatives_spanish:
  - excesivamente alabado
  - sumamente alabado
  lexicon: LSJ
  rationale: El prefijo ὑπερ- pide un intensificador fuerte; «sobremanera» suena natural y conserva la exageración laudatoria del original.
- source_word: εἰς ἅπαντας τοὺς αἰῶνας
  english_pob_choice: through all the ages
  chosen_spanish: por todos los siglos
  alternatives_spanish:
  - a través de todos los siglos
  - por todas las edades
  lexicon: LSJ
  rationale: La adición de ἅπαντας («todos») se refleja explícitamente con «por todos los siglos», fórmula idiomática y más plena que un simple «para siempre».
theological_decisions:
- issue: Tensión entre la fórmula de bendición directa y un giro imperativo tradicional
  english_pob_reading: Blessed are you, Lord, the God of our fathers
  chosen_spanish_reading: Bendito eres tú, Señor, Dios de nuestros padres
  alternative_spanish_readings:
  - Bendito seas tú, Señor, Dios de nuestros padres
  - Bendito eres, Señor, Dios de nuestros padres
  rationale: El griego es una afirmación predicativa dirigida a Dios, no una oración optativa en español. La forma escogida mantiene el carácter de alabanza directa y evita suavizar la sintaxis del original.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
- issue: Mantener la fórmula bíblica de 'padres' sin reemplazarla por un término más general
  english_pob_reading: the God of our fathers
  chosen_spanish_reading: Dios de nuestros padres
  alternative_spanish_readings:
  - Dios de nuestros antepasados
  rationale: La expresión conserva el lenguaje de pacto y herencia de la tradición bíblica. No se sustituye por una paráfrasis más neutra porque el griego emplea un plural masculino explícito.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Cómo reflejar la acumulación intensiva de alabanza sin volverla plana
  english_pob_reading: praised and highly exalted forever; ... exceedingly praised and highly exalted through all the ages
  chosen_spanish_reading: alabado y altamente exaltado por siempre; ... sobremanera alabado y altamente exaltado por todos los siglos
  alternative_spanish_readings:
  - digno de alabanza y altamente exaltado por siempre
  - exaltado y alabado por los siglos de los siglos
  rationale: El texto griego acumula participios y adjetivos intensivos; en español se preserva esa reiteración con dos pares distintos de intensificación para no borrar el matiz entre αἰνετὸς y ὑπεραινετὸν.
  doctrine_reference: DOCTRINE.md §Translation philosophy 2, 7
translation_notes:
  revision_awareness: Se siguió de cerca el pasaje griego normalizado del testimonio Swete 1909 y se tuvo en cuenta la revisión inglesa más reciente, especialmente la decisión de mantener la relación genitiva compacta en la frase del nombre («name of glory»). En español se conservó esa compactación con «nombre de gloria» y se reflejó la doble intensificación final con «sobremanera» y «por todos los siglos».
  spanish_consistency_notes:
  - Se usa «Yahvé» para el tetragrámaton cuando aparezca; aquí el texto griego tiene Κύριε, por eso se traduce «Señor».
  - Se mantiene «padres» para τῶν πατέρων conforme al valor bíblico-covenantal del original.
  - Se distingue entre «alabado» y «altamente exaltado» para no perder la duplicación intensiva del griego.
  - La nota al pie solo marca la alternativa relevante de la predicación inicial y no introduce variantes innecesarias.
