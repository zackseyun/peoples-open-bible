revisions:
- from: Porque yo desalojaré a las naciones de delante de ti y ensancharé tu límite, y nadie codiciará tu tierra[a] cuando subas para ver el rostro[b] de Yahvé tu Dios tres veces en el año[c].
  to: Porque yo expulsaré naciones de delante de ti y ensancharé tu frontera, y ningún hombre[a] codiciará tu tierra cuando subas para presentarte ante[b] Yahvé tu Dios tres veces en el año[c].
  rationale: 'La revisión corrige la alineación con el hebreo y con el audit trail inglés: restituye el sentido idiomático principal de לֵרָאוֹת אֶת־פְּנֵי en el texto principal, conserva la forma masculina representativa de אִישׁ con nota aclaratoria, mejora la naturalidad territorial con «frontera», y reubica las notas en sus anclajes correctos.'
  reviewer_model: gpt-5.4
