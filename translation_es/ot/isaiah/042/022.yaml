    reason: lexical_alternative
  revision_rationale: 'Se conserva la estructura y el sentido del borrador, pero se mejora la naturalidad española y la precisión pragmática en dos puntos: «casas de confinamiento» preserva la imagen concreta del hebreo mejor que el calco duro «casas de prisión», y «¡Devuelve!» representa de forma más natural el imperativo הָשַׁב que el técnico «¡Restituyan!». La nota léxica sobre בַּחוּרִים se mantiene sin cambios porque refleja correctamente la incertidumbre del término.'
