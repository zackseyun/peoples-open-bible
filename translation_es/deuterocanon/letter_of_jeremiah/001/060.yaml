translation:
  language: es
  text: Asimismo, cuando aparece el relámpago, se ve claramente; y de la misma manera el viento sopla en toda región.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὡσαύτως
  english_pob_choice: Likewise
  chosen_spanish: Asimismo
  alternatives_spanish:
  - De igual modo
  - Del mismo modo
  lexicon: LSJ
  rationale: Introduce la comparación de manera natural en español y conserva el valor correlativo de la partícula griega.
- source_word: ἀστραπή
  english_pob_choice: lightning
  chosen_spanish: el relámpago
  alternatives_spanish:
  - la luz del relámpago
  - el rayo
  lexicon: LSJ
  rationale: ἀστραπή puede designar el relámpago o fulgor visible; 'relámpago' es natural y preciso en español para el fenómeno luminoso.
- source_word: ὅταν ἐπιφάνῃ
  english_pob_choice: when lightning appears
  chosen_spanish: cuando aparece
  alternatives_spanish:
  - cuando se hace visible
  - cuando relampaguea
  lexicon: LSJ
  rationale: ἐπιφαίνῃ expresa aparecer o hacerse visible. En español, 'cuando aparece' mantiene la referencia al hecho de volverse visible sin añadir más de lo que el griego dice.
- source_word: εὔοπτός ἐστιν
  english_pob_choice: it is clearly seen
  chosen_spanish: se ve claramente
  alternatives_spanish:
  - es claramente visible
  - se ve con claridad
  lexicon: LSJ
  rationale: εὔοπτος significa fácilmente visible o claramente visto; 'se ve claramente' conserva la idea de visibilidad evidente con buena fluidez española.
- source_word: τὸ δʼ αὐτό
  english_pob_choice: and in the same way
  chosen_spanish: y de la misma manera
  alternatives_spanish:
  - y lo mismo
  - y asimismo
  lexicon: LSJ
  rationale: La expresión retoma la analogía. 'De la misma manera' expresa bien la repetición comparativa en español sin forzar un calco.
- source_word: πνεῦμα
  english_pob_choice: wind
  chosen_spanish: el viento
  alternatives_spanish:
  - el espíritu
  - el aliento
  lexicon: LSJ
  rationale: En este contexto de fenómenos naturales y con el verbo 'sopla', πνεῦμα se refiere al viento, no al espíritu.
- source_word: ἐν πάσῃ χώρᾳ
  english_pob_choice: in every land
  chosen_spanish: en toda tierra
  alternatives_spanish:
  - en toda región
  - en toda la tierra
  lexicon: LSJ
  rationale: χώρα puede significar tierra, región o país. 'En toda tierra' conserva el alcance universal y suena natural en español bíblico moderno.
- source_word: πνεῖ
  english_pob_choice: blows
  chosen_spanish: sopla
  alternatives_spanish:
  - sopla el viento
  - está soplando
  lexicon: LSJ
  rationale: πνεῖ es el verbo común para el viento que sopla; 'sopla' es el equivalente idiomático más claro en español.
theological_decisions:
- issue: Sentido de πνεῦμα en un contexto de fenómenos naturales
  english_pob_reading: wind
  chosen_spanish_reading: el viento
  alternative_spanish_readings:
  - el espíritu
  - el aliento
  rationale: El pasaje enumera fenómenos observables para mostrar su evidencia visible. El contexto inmediato de 'sopla' y 'en toda tierra' favorece de manera decisiva el sentido meteorológico.
  doctrine_reference: 'DOCTRINE.md: preservar la tensión léxica y decidir según el contexto original sin importar sentidos teológicos ajenos al pasaje.'
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior eliminando la nota [a] para que no haya marcadores huérfanos; el texto español queda sin notas porque la lectura contextual de πνεῦμα como 'viento' es suficientemente clara en esta sección.
  spanish_consistency_notes:
  - Se mantuvo un español moderno y digno, evitando el calco excesivo.
  - '''Yahvé'' no aplica en este versículo.'
  - 'Se conservó la analogía estructural del griego: fenómeno visible del relámpago y fenómeno universal del viento.'
  - '''Tierra'' se eligió para χώρα por su amplitud semántica y registro bíblico natural.'
