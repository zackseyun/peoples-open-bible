translation:
  language: es
  text: Saúl llegó a la ciudad de Amalec y se apostó en el wadi[a][b][c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tendió una emboscada en el wadi»; el verbo hebreo aquí es difícil y también se ha entendido como «contendió» o «se esforzó», pero el contexto favorece un sentido de emboscada.
    reason: lexical_alternative
  - marker: b
    text: «Wadi» designa un cauce o lecho de arroyo que puede estar seco salvo en la temporada de lluvias.
    reason: cultural_note
  - marker: c
    text: O «la ciudad de los amalecitas».
    reason: alternative_reading
lexical_decisions:
- source_word: וַיָּבֹא
  english_pob_choice: came
  chosen_spanish: llegó
  alternatives_spanish:
  - vino
  - fue
  - arribó
  lexicon: HALOT
  rationale: El verbo בוא admite dirección según el punto de vista. En español, «llegó» comunica con naturalidad el avance narrativo hacia el objetivo sin forzar un calco de movimiento.
- source_word: עַד
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hasta
  - al
  - hacia
  lexicon: HALOT
  rationale: Con un verbo de movimiento, el español pide una construcción natural de destino; «a» mantiene la idea de llegada sin añadir énfasis innecesario.
- source_word: עִיר עֲמָלֵק
  english_pob_choice: the city of Amalek
  chosen_spanish: la ciudad de Amalec
  alternatives_spanish:
  - la ciudad de los amalecitas
  - la ciudad de Amalec
  lexicon: HALOT
  rationale: Se conserva el sintagma constructo de forma transparente. «Amalec» funciona bien como designación eponímica del grupo, mientras que «de los amalecitas» explicita el referente pero interpreta más el texto.
- source_word: וַיָּרֶב
  english_pob_choice: lay in wait
  chosen_spanish: se apostó
  alternatives_spanish:
  - tendió una emboscada
  - se puso al acecho
  - contendió
  lexicon: HALOT
  rationale: El hebreo es difícil y admite lecturas como «contendió» o «se esforzó», pero el contexto militar favorece un sentido de emboscada. «Se apostó» es idiomático en español y conserva la idea táctica sin afirmar más de lo que el hebreo garantiza.
- source_word: בַּנָּחַל
  english_pob_choice: in the wadi
  chosen_spanish: en el wadi
  alternatives_spanish:
  - en el cauce seco
  - en la quebrada
  - en el barranco
  lexicon: HALOT
  rationale: Se conserva «wadi» por precisión geográfica, siguiendo la decisión auditada en inglés. Las alternativas españolas son explicativas, pero menos exactas o menos consistentes con la terminología POB.
translation_notes:
  revision_awareness: La versión inglesa revisada permanece sin cambios; el consenso de revisión es alto (0.95) con observaciones menores, por lo que la redacción española sigue de cerca la decisión auditada de lectura militar/emboscada y conserva las alternativas documentadas del verbo y del topónimo.
  spanish_consistency_notes:
  - Se mantiene «Amalec» como forma del topónimo/eponimia, coherente con el texto fuente y con la transparencia terminológica del proyecto.
  - Se conserva «wadi» sin sustituirlo por un término más genérico, para no perder precisión geográfica.
  - La opción verbal «se apostó» evita la lectura demasiado interpretativa de «emboscó» en el texto principal, pero la nota recoge explícitamente esa posibilidad, respetando la tensión léxica documentada.
