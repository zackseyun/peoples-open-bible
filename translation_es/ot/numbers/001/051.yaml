revisions:
- from: Cuando el tabernáculo esté[a] por ponerse en marcha, los levitas lo desmontarán; y cuando el tabernáculo esté por acampar, los levitas lo levantarán. Y el extraño[b] que se acerque será muerto.
  to: Cuando el tabernáculo esté[a] por salir, los levitas lo desmontarán; y cuando el tabernáculo esté por acampar, los levitas lo instalarán. Y el forastero[b] que se acerque será puesto a muerte.
  rationale: Se ajusta «extraño» a «forastero» para evitar ambigüedad y acercarse mejor al sentido de alguien ajeno/no autorizado en contexto cultual, preservando la alternativa explicativa en nota. Se cambia «será muerto» por «será puesto a muerte» para expresar de manera idiomática la pasiva judicial de יוּמָת. También se aligera la primera cláusula y se mejora la precisión práctica de la segunda con «lo instalarán».
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:31:32Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura temporal del hebreo, mantiene correctamente «tabernáculo», «levitas» y el contraste entre desmontar/instalar. Sin embargo, dos elecciones no preservan del todo la intención auditada: «el extraño» en español tiende a leerse como ‘desconocido/raro’ o ‘extranjero’ más que como persona no autorizada, y «será muerto» suena poco natural en español moderno y es menos claro que una pasiva judicial idiomática.'
  spanish_quality_summary: La redacción es generalmente clara y digna, pero «esté[a] por ponerse en marcha» resulta algo recargado, «lo levantarán» puede sugerir solo alzar en vez de instalar, y «será muerto» es duro/forzado. Una formulación más natural y fiel sería «cuando el tabernáculo esté por salir», «lo instalarán» o «lo levantarán» según contexto, y especialmente «será condenado a muerte» o «será puesto a muerte». Para conservar la fuerza del hophal sin añadir un agente, «será puesto a muerte» funciona mejor.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. La principal cuestión léxica es זָר: conviene evitar «extraño» y usar «forastero[a]» con nota explicativa, o mejor aún una formulación principal que explicite la no autorización. Dado el rastro inglés, «el forastero[a]» con nota que incluya «persona no autorizada» preserva la alternativa documentada y mejora la legibilidad.'
  issues:
  - severity: medium
    issue: «el extraño» para וְהַזָּר
    rationale: En español bíblico y general puede malentenderse como ‘raro’ o ‘desconocido’, y no comunica con suficiente claridad la exclusión cultual auditada en el inglés POB.
  - severity: medium
    issue: «será muerto» para יוּמָת
    rationale: Aunque intenta reflejar la pasiva judicial, es poco idiomático en español moderno. «Será puesto a muerte» expresa mejor la muerte infligida sin perder solemnidad.
  - severity: low
    issue: «esté por ponerse en marcha» y «lo levantarán»
    rationale: La primera frase es pesada; la segunda puede ser algo menos precisa que «lo instalarán» en contexto de armar el tabernáculo. Son mejoras de estilo/fidelidad práctica más que errores graves.
  revised_spanish_text: Cuando el tabernáculo esté[a] por salir, los levitas lo desmontarán; y cuando el tabernáculo esté por acampar, los levitas lo instalarán. Y el forastero[b] que se acerque será puesto a muerte.
