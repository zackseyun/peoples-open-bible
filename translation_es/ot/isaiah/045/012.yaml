translation:
  language: es
  text: Yo hice la tierra, y sobre ella creé al hombre[a]; mis manos extendieron los cielos, y mandé a toda su multitud.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'humanidad' o 'género humano'. El hebreo אָדָם aquí es un singular colectivo para la raza humana.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָֽנֹכִי
  english_pob_choice: I
  chosen_spanish: Yo
  alternatives_spanish:
  - Yo mismo
  lexicon: HALOT
  rationale: El pronombre enfático inicial se preserva de forma natural en español con 'Yo' al comienzo de la cláusula. 'Yo mismo' añadiría énfasis no explicitado por el hebreo.
- source_word: עָשִׂיתִי
  english_pob_choice: made
  chosen_spanish: hice
  alternatives_spanish:
  - hice
  - formé
  lexicon: HALOT
  rationale: En contexto de creación, עשה puede traducirse como 'hacer'. 'Hice' conserva el paralelo con 'creé' sin forzar un calco rígido.
- source_word: אֶרֶץ
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra
  - el mundo
  lexicon: HALOT
  rationale: En paralelo con 'los cielos', el sentido cósmico es claro. En español, 'la tierra' es la correspondencia más natural y fiel; 'el mundo' desplaza el matiz al orden humano.
- source_word: וְאָדָם
  english_pob_choice: man
  chosen_spanish: al hombre
  alternatives_spanish:
  - a la humanidad
  - al ser humano
  lexicon: HALOT
  rationale: Se mantiene el singular representativo del hebreo. 'Al hombre' preserva la forma masculina singular y su valor colectivo implícito, sin neutralizar el término.
- source_word: עָלֶיהָ
  english_pob_choice: upon it
  chosen_spanish: sobre ella
  alternatives_spanish:
  - sobre ella
  - en ella
  lexicon: HALOT
  rationale: El sufijo femenino retoma 'la tierra'. 'Sobre ella' reproduce el valor espacial de על con un español claro y digno.
- source_word: בָרָאתִי
  english_pob_choice: created
  chosen_spanish: creé
  alternatives_spanish:
  - creé
  - formé
  lexicon: HALOT
  rationale: ברא se distingue de עשה y aquí conviene una traducción directa con 'creé', reservando la acción creadora divina con su verbo propio.
- source_word: יָדַי
  english_pob_choice: my hands
  chosen_spanish: mis manos
  alternatives_spanish:
  - mis manos
  lexicon: HALOT
  rationale: La revisión inglesa eliminó 'own' porque no está explícito en el texto; en español basta 'mis manos', que expresa el sujeto posesivo sin añadir énfasis extratextual.
- source_word: נָטוּ
  english_pob_choice: stretched out
  chosen_spanish: extendieron
  alternatives_spanish:
  - extendieron
  - desplegaron
  lexicon: HALOT
  rationale: '''Extendieron'' comunica el gesto poético de desplegar los cielos sin sonar arcaico. ''Desplegaron'' es posible, pero menos directo aquí.'
- source_word: שָׁמַיִם
  english_pob_choice: the heavens
  chosen_spanish: los cielos
  alternatives_spanish:
  - los cielos
  - el cielo
  lexicon: HALOT
  rationale: El plural hebreo tiene alcance cósmico; 'los cielos' conserva mejor ese valor que 'el cielo', que en español suele sonar singular y más limitado.
- source_word: וְכָל צְבָאָם
  english_pob_choice: all their host
  chosen_spanish: todo su ejército
  alternatives_spanish:
  - todo su ejército
  - todo su ejército celestial
  - toda su multitud
  lexicon: HALOT
  rationale: '''צָבָא'' puede referirse al conjunto ordenado de los cielos. ''Ejército'' mantiene la imagen de multitud organizada; en español se puede entender como el conjunto celestial sin perder fuerza poética. Se evita ''hueste'' por estilo y claridad, aunque es una alternativa tradicional.'
- source_word: צִוֵּיתִי
  english_pob_choice: I commanded
  chosen_spanish: mandé
  alternatives_spanish:
  - mandé
  - ordené
  lexicon: HALOT
  rationale: '''Mandé'' es un equivalente directo y natural en español. ''Ordené'' también sería posible, pero ''mandar'' conserva mejor el tono de soberanía divina en una formulación breve.'
theological_decisions:
- issue: אָדָם como singular colectivo
  english_pob_reading: man
  chosen_spanish_reading: al hombre
  alternative_spanish_readings:
  - a la humanidad
  - al ser humano
  rationale: El hebreo usa un singular masculino que funciona de manera colectiva para la raza humana. Se conserva esa forma para respetar la textura del original, y el valor inclusivo queda implícito en el sustantivo colectivo del versículo.
  doctrine_reference: 'DOCTRINE.md: ''Gender-accurate over gender-neutral'' y tabla de términos controvertidos para אָדָם'
- issue: Distinción entre עשה y ברא
  english_pob_reading: made / created
  chosen_spanish_reading: hice / creé
  alternative_spanish_readings:
  - hice / formé
  - formé / creé
  rationale: Se mantiene la diferencia verbal del hebreo. עשה se vierte con 'hice' y ברא con 'creé' para no borrar la distinción lexical-teológica entre hacer y crear.
  doctrine_reference: Poética de la creación en Isaías 45:12; principio POB de distinguir verbos fuente cuando aportan contraste semántico
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del audit trail, que retiró un énfasis no explícito en 'own' y conservó la estructura base del versículo. En español se reflejó esa cautela evitando añadir énfasis extra al posesivo y manteniendo el contraste entre 'hice' y 'creé'.
  spanish_consistency_notes:
  - Se usa 'Dios' implícito mediante la primera persona divina sin añadir un sujeto nominal inexistente en el hebreo.
  - Se evita 'SEÑOR' porque el texto hebreo no contiene el Tetragrámaton aquí.
  - '''los cielos'' conserva el plural hebreo de שָׁמַיִם.'
  - '''ejército'' se emplea para צָבָא en sentido cósmico; no se interpreta militarmente en exceso.'
  - La nota de אָדָם se ancla en la forma traducida 'hombre' para preservar la alternativa inclusiva sin cambiar el cuerpo del texto.
