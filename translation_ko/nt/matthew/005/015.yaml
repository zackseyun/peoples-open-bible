source:
  edition: SBLGNT
  text: οὐδὲ καίουσιν λύχνον καὶ τιθέασιν αὐτὸν ὑπὸ τὸν μόδιον ἀλλ’ ἐπὶ τὴν λυχνίαν, καὶ λάμπει πᾶσιν τοῖς ἐν τῇ οἰκίᾳ.
base_translation:
  language: en
  yaml_path: translation/nt/matthew/005/015.yaml
  text: Nor do people light a lamp and put it under a basket[a], but on a lampstand[b], and it gives light to everyone in the house.
  footnotes:
  - marker: a
    text: Or 'under a measuring basket'; traditionally 'under a bushel.' The Greek μόδιος refers to a dry measure and, by extension, its container.
    reason: lexical_alternative
  - marker: b
    text: Or 'and it shines for everyone in the house.'
    reason: lexical_alternative
translation:
  language: ko
  text: 또한 사람들이 등불을 켜서 됫박 아래에 두지 않고 등잔대 위에 둡니다. 그러면 그것이 집 안에 있는 모든 사람에게 빛을 비춥니다.
  philosophy: optimal-equivalence
