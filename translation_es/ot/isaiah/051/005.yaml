review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura general del hebreo: cercanía de צדק, salida de la salvación, plural «brazos», juicio sobre los pueblos, y paralelismo entre esperar/esperar con esperanza. Sin embargo, dos elecciones no preservan adecuadamente el audit trail: «las costas» estrecha más que «the coastlands»/אִיִּים, y «por mi brazo esperarán con esperanza» no representa bien וְאֶל זְרֹעִי יְיַחֵלוּן, donde el sentido es orientación/esperanza puesta en el brazo, no causa instrumental «por». Además, el inglés POB preserva explícitamente la alternancia «brazos»/«brazo» con nota, y esa nota falta en español.'
  spanish_quality_summary: La frase final «esperarán con esperanza» suena forzada y tautológica en español. «Las costas» es legible pero menos preciso que «las costas lejanas» o «las costas distantes»; mejor aún, «las costas lejanas» mantiene la idea de regiones marítimas remotas sin reducirla a simple litoral. «Pondrán su esperanza en mi brazo» suena natural, conserva el paralelismo semántico con el primer verbo y evita la sintaxis poco idiomática de «por mi brazo».
  glossary_alignment: No hay conflicto con los términos de proyecto mayores. «Mi justicia» para צִדְקִי es defendible por el contexto judicial, con nota de alternativa «rectitud/vindicación». Se preserva correctamente la metáfora corporal «brazos/brazo». Conviene añadir la nota sobre plural/singular de זרוע, porque el POB inglés la documentó como decisión lexical significativa.
  issues:
  - severity: medium
    issue: Falta la nota sobre «mis brazos» / «mi brazo».
    rationale: El audit trail inglés conserva explícitamente la diferencia morfológica entre plural al inicio y singular al final. Esa información significativa debe preservarse también en español.
  - severity: medium
    issue: «Las costas» no refleja con suficiente amplitud אִיִּים.
    rationale: En Isaías el término suele referirse a regiones marítimas lejanas/costas distantes, no simplemente a costas en general. «Las costas lejanas» mantiene mejor el campo semántico y la nota puede conservar «las islas».
  - severity: high
    issue: «Y por mi brazo esperarán con esperanza» distorsiona la relación sintáctica y suena antinatural.
    rationale: וְאֶל זְרֹעִי expresa dirección/objeto de la esperanza («hacia/en mi brazo»), no medio instrumental «por». Además, «esperarán con esperanza» es una repetición poco idiomática. «En mi brazo pondrán su esperanza» o «en mi brazo esperarán» transmite mejor el hebreo y el estilo natural del español.
