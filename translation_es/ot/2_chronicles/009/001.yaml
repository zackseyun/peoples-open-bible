translation:
  language: es
  text: La reina de Sabá oyó la fama[a] de Salomón, y vino a Jerusalén para poner a prueba a Salomón con acertijos[b], con una gran comitiva, y camellos que llevaban especias, oro en abundancia y piedras preciosas. Cuando llegó a Salomón, habló con él acerca de todo lo que estaba en su corazón[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la noticia acerca de Salomón». «Fama» aquí expresa la información difundida sobre él, no mera celebridad.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «con preguntas difíciles».'
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: «todo lo que estaba en su corazón», un modismo para el conjunto de sus pensamientos, inquietudes y preguntas.'
    reason: cultural_note
lexical_decisions:
- source_word: שֵׁמַע
  english_pob_choice: fame
  chosen_spanish: fama
  alternatives_spanish:
  - noticia
  - reputación
  lexicon: HALOT
  rationale: En este contexto, שֵׁמַע no es un simple sonido sino la noticia difundida acerca de Salomón. 'Fama' conserva el valor idiomático y natural en español, de modo semejante a la decisión inglesa de 'fame'.
- source_word: לְנַסּוֹת
  english_pob_choice: to test
  chosen_spanish: para probar
  alternatives_spanish:
  - para testar
  - para poner a prueba
  lexicon: HALOT
  rationale: El verbo expresa someter a Salomón a una prueba intelectual. 'Probar' es una equivalencia clara y natural en español; 'poner a prueba' también sería posible, pero es más largo.
- source_word: בְחִידוֹת
  english_pob_choice: with riddles
  chosen_spanish: con acertijos
  alternatives_spanish:
  - con adivinanzas
  - con enigmas
  lexicon: HALOT
  rationale: חִידוֹת alude a acertijos, dichos enigmáticos o problemas ingeniosos. 'Acertijos' comunica bien la concreción léxica del hebreo y mantiene la fuerza del término inglés 'riddles'.
- source_word: בִּירוּשָׁלִַם
  english_pob_choice: to Jerusalem
  chosen_spanish: a Jerusalén
  alternatives_spanish:
  - en Jerusalén
  lexicon: HALOT
  rationale: Aunque la preposición hebrea es 'en/at', con el verbo de movimiento en español se expresa naturalmente destino con 'a Jerusalén'.
- source_word: בְּחַיִל כָּבֵד מְאֹד
  english_pob_choice: with a very great retinue
  chosen_spanish: con una caravana muy grande
  alternatives_spanish:
  - con una gran comitiva
  - con un séquito muy grande
  lexicon: HALOT
  rationale: En este contexto de viaje, חַיִל describe un acompañamiento imponente. 'Caravana' comunica bien el conjunto viajero con camellos y bienes; 'comitiva' o 'séquito' son alternativas posibles, pero 'caravana' enlaza mejor con el resto del versículo.
- source_word: בְּשָׂמִים
  english_pob_choice: spices
  chosen_spanish: especias
  alternatives_spanish:
  - aromas
  - perfumes
  lexicon: HALOT
  rationale: El plural denota sustancias aromáticas/condimentos valiosos. 'Especias' es el equivalente más accesible y estándar en este contexto real de regalos.
- source_word: לָרֹב
  english_pob_choice: in abundance
  chosen_spanish: en abundancia
  alternatives_spanish:
  - en gran cantidad
  - abundantemente
  lexicon: HALOT
  rationale: La expresión modifica al oro e indica cantidad excepcional. 'En abundancia' reproduce bien esa idea sin sobrecargar la sintaxis.
- source_word: אֶבֶן יְקָרָה
  english_pob_choice: precious stones
  chosen_spanish: piedras preciosas
  alternatives_spanish:
  - gemas preciosas
  - piedra preciosa
  lexicon: HALOT
  rationale: Aunque la forma hebrea es singular, funciona colectivamente dentro de una lista de bienes de lujo. 'Piedras preciosas' expresa naturalmente el sentido colectivo en español.
- source_word: וַתְּדַבֵּר עִמּוֹ
  english_pob_choice: she spoke with him
  chosen_spanish: habló con él
  alternatives_spanish:
  - conversó con él
  - habló con él y
  lexicon: HALOT
  rationale: דבר con עִם sugiere intercambio verbal. 'Habló con él' preserva esa reciprocidad de forma sobria y idiomática.
- source_word: אֵת כָּל אֲשֶׁר הָיָה עִם לְבָבָהּ
  english_pob_choice: about all that was in her heart
  chosen_spanish: acerca de todo lo que estaba en su corazón
  alternatives_spanish:
  - acerca de todo lo que tenía en el corazón
  - sobre todo lo que llevaba en el corazón
  lexicon: HALOT
  rationale: La frase es un modismo hebreo para el contenido completo de pensamientos, inquietudes y preguntas. 'En su corazón' conserva la antropología bíblica; 'acerca de' refleja que el intercambio versó sobre ese contenido.
theological_decisions:
- issue: Sentido de la expresión idiomática 'en su corazón'
  english_pob_reading: Hebrew 'all that was in her heart,' an idiom for the full range of her thoughts and concerns.
  chosen_spanish_reading: '''todo lo que estaba en su corazón'' como modismo para sus pensamientos, inquietudes y preguntas'
  alternative_spanish_readings:
  - '''todo lo que tenía en el corazón'''
  - '''todo lo que pasaba por su mente'''
  rationale: No se reduce el modismo a mera cognición abstracta ni se sustituye por una paráfrasis psicológica. La imagen bíblica del 'corazón' se conserva, manteniendo la tensión antropológica del hebreo.
  doctrine_reference: Antropología bíblica; uso idiomático del corazón como centro de pensamiento y voluntad
translation_notes:
  revision_awareness: 'La versión inglesa auditada se mantiene sustancialmente estable (pass latest_revision_pass: unchanged). Se siguió su lectura óptima-equivalente de שֵׁמַע como ''fame'', לְנַסּוֹת como ''to test'', בְחִידוֹת como ''with riddles'', y el modismo final como contenido interior del corazón. No hubo revisiones aplicadas en el historial proporcionado.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto fuente lo requiera; en este versículo no aparece.
  - Se prefirió 'Mesías/Cristo' según contexto, pero aquí no aplica.
  - '''Especias'' y ''piedras preciosas'' mantienen el registro de dones reales y bienes de lujo.'
  - '''Acertijos'' conserva el matiz de desafío intelectual sin explicar más de lo que el hebreo exige.'
  - La puntuación sigue el español moderno y el orden de frases busca legibilidad sin perder el paralelismo del original.
