lexical_decisions:
- source_word: בְּנֵי
  english_pob_choice: the sons of
  chosen_spanish: los hijos de
  alternatives_spanish:
  - los descendientes de
  - los hijos
  lexicon: HALOT
  rationale: En contextos genealógicos o de registro, בְּנֵי puede introducir una línea familiar o clan. En español, «los hijos de» conserva la relación directa y el valor genealógico del hebreo, sin añadir una paráfrasis excesiva.
- source_word: זַכָּי
  english_pob_choice: Zakkai
  chosen_spanish: Zakkai
  alternatives_spanish:
  - Zaccai
  lexicon: HALOT
  rationale: Se conserva la transliteración del nombre propio siguiendo el inglés POB y reflejando de cerca las consonantes hebreas, con la doble k representada en español como en la forma auditada.
- source_word: שְׁבַע מֵאוֹת
  english_pob_choice: seven hundred
  chosen_spanish: setecientos
  alternatives_spanish:
  - siete cientos
  lexicon: HALOT
  rationale: La construcción cardinal hebrea se vierte en el número compuesto natural del español. «Setecientos» mantiene con precisión el total indicado por el texto fuente.
- source_word: וְשִׁשִּׁים
  english_pob_choice: and sixty
  chosen_spanish: sesenta
  alternatives_spanish:
  - y sesenta
  lexicon: HALOT
  rationale: El hebreo suma el último componente al total. En español, el cardinal compuesto ya expresa la suma de forma idiomática; por eso se usa «setecientos sesenta» en lugar de conservar un «y» redundante.
