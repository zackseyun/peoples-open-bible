translation:
  language: es
  text: La sabiduría irá a su encuentro como una madre[a], y lo recibirá como la esposa de su juventud.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: "como una mujer de virginidad"; es decir, como una esposa joven o una novia virginal.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְקִדְּמַתְהוּ / ὑπαντήσεται αὐτῷ
  english_pob_choice: will meet him
  chosen_spanish: se le adelantará
  alternatives_spanish:
  - lo encontrará
  - saldrá a recibirlo
  - lo recibirá al salir a su encuentro
  lexicon: HALOT; LXX ὑπαντάω
  rationale: El hebreo expresa la iniciativa de ir al encuentro, y el griego confirma ese matiz. En español, "se le adelantará" conserva la idea de precedencia activa y suena natural en un registro literario.
- source_word: כָאֵם / ὡς μήτηρ
  english_pob_choice: like a mother
  chosen_spanish: como una madre
  alternatives_spanish:
  - como madre
  - igual que una madre
  lexicon: HALOT; μήτηρ
  rationale: La comparación es directa y no requiere paráfrasis. "Como una madre" mantiene el símil explícito y el tono poético del hebreo y del griego.
- source_word: וּכְאֵשֶׁת נְעוּרִים / γυνὴ παρθενείας
  english_pob_choice: like the wife of his youth
  chosen_spanish: como la esposa de su juventud
  alternatives_spanish:
  - como la mujer de su juventud
  - como la esposa de sus años jóvenes
  - como una esposa virginal
  lexicon: HALOT; γυνὴ παρθενείας
  rationale: El hebreo idiomático habla de la esposa asociada con la juventud, y el inglés POB preserva ese sentido en la línea principal. En español, "esposa de su juventud" refleja bien la expresión y sigue siendo inteligible. La nota recoge la resonancia del griego con virginidad o novia joven sin imponerla al texto principal.
- source_word: תְּקַבְּלֶנּוּ / προσδέξεται αὐτόν
  english_pob_choice: receive him
  chosen_spanish: lo recibirá
  alternatives_spanish:
  - lo acogerá
  - lo aceptará
  - lo dará la bienvenida
  lexicon: HALOT; προσδέχομαι
  rationale: '"Recibir" es el equivalente más directo y formal para קבל / προσδέχομαι. En español, "lo recibirá" mantiene el paralelo con el primer hemistiquio y conserva la sencillez del verso.'
- source_word: personificación de la Sabiduría
  english_pob_choice: She will meet him... receive him...
  chosen_spanish: La sabiduría se le adelantará... y lo recibirá...
  alternatives_spanish:
  - Ella se le adelantará... y lo recibirá...
  - La Sabiduría se le adelantará...
  lexicon: contexto poético del hebreo; formas verbales femeninas
  rationale: El verso presenta a la Sabiduría como figura femenina personificada. En español, usar "La sabiduría" evita una lectura abstracta o impersonal y conserva la imaginería maternal y nupcial del original.
theological_decisions:
- issue: Personificación femenina de la Sabiduría
  english_pob_reading: 'Retain feminine personal imagery: ''She will meet... receive...'''
  chosen_spanish_reading: La sabiduría se le adelantará... y lo recibirá...
  alternative_spanish_readings:
  - Ella se le adelantará... y lo recibirá...
  - La sabiduría irá a su encuentro...
  rationale: El hebreo usa formas femeninas y el verso atribuye a la Sabiduría acciones humanas y relacionales. Mantener la personificación es fiel al texto y evita desactivar la teología poética del pasaje.
  doctrine_reference: Sabiduría personificada en literatura sapiencial; cf. Prov 8; Sir 15
- issue: Nuance de "esposa de su juventud" frente al griego "mujer de virginidad"
  english_pob_reading: 'Main text follows the Hebrew: ''wife of his youth'''
  chosen_spanish_reading: esposa de su juventud, con nota sobre la posible lectura griega de una joven virgen o novia virginal
  alternative_spanish_readings:
  - esposa en su virginidad
  - novia virginal
  - mujer de su juventud
  rationale: Dado que el hebreo está preservado y es la base principal para esta estrofa, la traducción principal debe seguir su idiomatismo. La nota preserva la tensión textual con el griego sin fusionar indebidamente ambas tradiciones.
  doctrine_reference: Primacía del hebreo donde está atestiguado; política textual POB para Sirácida
translation_notes:
  revision_awareness: Esta versión sigue la primacía del hebreo conservado en Kahana, a la vez que toma en cuenta el paralelo griego de Swete. La redacción española reproduce el paralelismo poético y mantiene la tensión entre la lectura hebrea idiomática ('esposa de su juventud') y la matización griega ('mujer de virginidad') sin resolverla artificialmente.
  spanish_consistency_notes:
  - Se mantiene "Sabiduría" con mayúscula inicial por tratarse de una personificación reconocible dentro del discurso sapiencial.
  - '"Se le adelantará" refleja iniciativa y encuentro, evitando un calco rígido de ''meet'' y respetando la dirección del hebreo.'
  - '"Esposa de su juventud" conserva la primacía del hebreo y evita reemplazarlo por una formulación litúrgica más tradicional sin base textual.'
  - La nota al pie usa un marcador único y enlaza explícitamente con la lectura alternativa del griego.
