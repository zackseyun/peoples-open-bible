  to: 'De estos pueden comer: la langosta según su especie[a], y la langosta calva según su especie, y el grillo según su especie, y el saltamontes según su especie.'
  rationale: 'Se corrigió la gramática española («la langosta»), se reemplazó la partitiva literal por una formulación natural («De estos pueden comer»), y se alineó הַסָּלְעָם con la estrategia auditada del POB inglés: traducción tradicional principal con nota de incertidumbre, en vez de transliteración. También se eliminó el pronombre explícito «ustedes» para mejorar la fluidez.'
