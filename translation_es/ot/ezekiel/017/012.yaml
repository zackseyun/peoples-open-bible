  to: 'Di ahora a la casa rebelde[a]: «¿No saben qué significan estas cosas[b]?». Di: «He aquí, el rey de Babilonia vino a Jerusalén, tomó a su rey y a sus oficiales[c], y los llevó a Babilonia».'
