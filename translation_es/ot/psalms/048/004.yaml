translation:
  language: es
  text: Dios es conocido en sus ciudadelas[a] como un baluarte[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en sus palacios». El hebreo puede referirse a residencias grandiosas o a estructuras fortificadas; aquí el contexto de seguridad de la ciudad favorece «ciudadelas».
    reason: lexical_alternative
  - marker: b
    text: O «como refugio» o «como fortaleza». La palabra hebrea denota un lugar seguro y elevado de protección.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - dioses
  - dios
  lexicon: HALOT
  rationale: En este contexto salmódico, אֱלֹהִים funciona como título singular del Dios de Israel; en español, 'Dios' es la forma natural y fiel.
- source_word: בְּאַרְמְנוֹתֶיהָ
  english_pob_choice: in her citadels
  chosen_spanish: en sus ciudadelas
  alternatives_spanish:
  - en sus palacios
  - en sus fortificaciones
  - en sus fortalezas
  lexicon: HALOT
  rationale: אַרְמְנוֹת puede abarcar residencias palaciales o estructuras fortificadas. Dado el contexto de Sion como ciudad protegida, 'ciudadelas' conserva el matiz de grandeza y defensa mejor que 'palacios'.
- source_word: נוֹדַע
  english_pob_choice: is known
  chosen_spanish: es conocido
  alternatives_spanish:
  - ha sido dado a conocer
  - se da a conocer
  lexicon: HALOT
  rationale: El nifal de ידע tiene aquí valor estativo/pasivo; 'es conocido' reproduce con sobriedad la forma verbal sin añadir reflexividad que el hebreo no exige explícitamente.
- source_word: לְמִשְׂגָּב
  english_pob_choice: as a stronghold
  chosen_spanish: como un baluarte
  alternatives_spanish:
  - como refugio
  - como fortaleza
  - como altura segura
  lexicon: HALOT
  rationale: מִשְׂגָּב designa un lugar alto y seguro, con fuerza defensiva. 'Baluarte' comunica bien la imagen de protección y solidez en español, sin perder el sentido de refugio elevado.
theological_decisions:
- issue: Referente del posesivo femenino en 'sus ciudadelas'
  english_pob_reading: The suffix refers to Zion/the city celebrated in the psalm.
  chosen_spanish_reading: El sufijo se entiende de Sion/la ciudad personificada en el salmo.
  alternative_spanish_readings:
  - podría referirse de modo más general a la tierra o al pueblo
  rationale: El contexto inmediato de Salmo 48 centra la alabanza en Sion y la ciudad de Dios; por eso el posesivo femenino se conserva como referencia a la ciudad personificada.
  doctrine_reference: Contexto literario de Salmo 48; personificación de Sion
translation_notes:
  revision_awareness: Coincide con la auditoría inglesa de alta concordancia; se mantiene la lectura principal sin cambios sustantivos, preservando el paralelo entre el ámbito urbano protegido y la imagen de resguardo.
  spanish_consistency_notes:
  - Se conserva 'Dios' para אֱלֹהִים según el uso singular teológico habitual en este contexto.
  - '''Ciudadelas'' y ''baluarte'' mantienen el campo semántico defensivo señalado por la auditoría inglesa.'
  - Se evita 'SEÑOR' porque el hebreo aquí no contiene el tetragrámaton sino אֱלֹהִים.
  - La puntuación refleja una línea poética breve y directa, apta para publicación.
