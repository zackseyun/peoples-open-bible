base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/018/020.yaml
  text: Should evil be repaid for good? For they have dug a pit for my life[a]. Remember that I stood before you to speak good on their behalf[b], to turn your wrath away from them.
  footnotes:
  - marker: a
    text: Or 'for my soul.' Here the Hebrew word often means 'life' or 'self' in contexts of mortal danger.
    reason: lexical_alternative
  - marker: b
    text: Or 'to speak for their good' or 'to speak well concerning them.' The sense is Jeremiah's intercession on their behalf before God.
    reason: lexical_alternative
