  to: Y ahora, tú eres Dios, y nosotros somos tu pueblo, a quien amaste. Mira y ten compasión, oh Dios de Israel, porque somos tuyos; y no retires de nosotros tu misericordia, para que no vengan contra nosotros.
  rationale: Se ajusta únicamente la última cláusula para reflejar mejor el valor amplio de ἐπιθῶνται y alinearla con la decisión auditada 'lest they come against us', sin introducir una interpretación más fuerte como 'ataquen' ni una imagen menos precisa como 'se alcen'.
