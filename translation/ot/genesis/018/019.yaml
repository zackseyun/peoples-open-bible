theological_decisions:
- issue: Whether ידע in this verse should be rendered with elective force ('chosen') or relational cognition ('known')
  chosen_reading: I have known him
  alternative_readings:
  - I have chosen him
  rationale: The context certainly includes divine favor and purpose, but the lexical form itself is 'know.' Rendering it as 'chosen' risks resolving an interpretive/theological implication in the main text rather than translating the word directly. The alternative is preserved in a footnote because it is a longstanding and contextually plausible interpretation.
  doctrine_reference: Translation philosophy §1, §3
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'Contested terms: יְהוָה YHWH'
