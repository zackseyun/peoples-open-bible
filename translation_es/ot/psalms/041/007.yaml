base_translation:
  language: en
  yaml_path: translation/ot/psalms/041/007.yaml
  text: And if he comes to see me[a], he speaks falsehood; his heart gathers wickedness to itself; when he goes out to the street[c][b], he speaks it.
  footnotes:
  - marker: a
    text: Hebrew 'to see'; the object 'me' is implied by context and supplied for natural English.
    reason: lexical_alternative
  - marker: b
    text: Or 'he speaks vanity / deceit.' The Hebrew term can carry the sense of emptiness as well as falsehood.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'outside.' Rendered 'to the street' to express the public setting implied by going out and speaking.
    reason: lexical_alternative
