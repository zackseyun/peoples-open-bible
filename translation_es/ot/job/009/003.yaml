    text: Or 'If he wished to dispute with him' or 'If he desired to litigate with him.' The Hebrew verb for 'contend' can carry legal-dispute nuance.
    reason: lexical_alternative
  - marker: b
    text: Literally 'he would not/could not answer him one from a thousand'; the sense is that he could not answer even once in a thousand times.
    reason: lexical_alternative
