translation:
  language: es
  text: las vestiduras de tejido elaborado para ministrar en el santuario[a], las vestiduras sagradas para Aarón el sacerdote, y las vestiduras de sus hijos para ejercer el sacerdocio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'las vestiduras de servicio'; el hebreo probablemente se refiere a textiles especialmente hechos para el ministerio en el santuario.
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּגְדֵי
  english_pob_choice: garments
  chosen_spanish: vestiduras
  alternatives_spanish:
  - ropas
  - prendas
  lexicon: HALOT
  rationale: En este contexto cultual, 'vestiduras' comunica mejor el carácter formal y ritual de las prendas que 'ropas' o 'prendas', sin introducir terminología eclesiástica posterior.
- source_word: הַשְּׂרָד
  english_pob_choice: woven
  chosen_spanish: de labor
  alternatives_spanish:
  - tejidas
  - de tejido fino
  - de servicio
  lexicon: HALOT
  rationale: El término hebreo apunta a vestiduras especialmente hechas para el uso sagrado; 'de labor' conserva la idea de confección especializada y evita fijar indebidamente el tipo de técnica textil. La nota explica la alternativa lexical del inglés POB.
- source_word: לְשָׁרֵת
  english_pob_choice: for ministering
  chosen_spanish: para ministrar
  alternatives_spanish:
  - para servir
  - para desempeñar el ministerio
  lexicon: HALOT
  rationale: '''Ministrar'' preserva el matiz cultual y formal del verbo sin reducirlo a un servicio genérico. En español, esta forma sigue siendo clara y reverente.'
- source_word: בַּקֹּדֶשׁ
  english_pob_choice: in the sanctuary
  chosen_spanish: en el santuario
  alternatives_spanish:
  - en el lugar santo
  - en lo santo
  lexicon: HALOT
  rationale: Aquí קֹדֶשׁ señala la esfera sagrada del tabernáculo; 'santuario' es la opción española más transparente y natural para ese ámbito cultual.
- source_word: בִּגְדֵי הַקֹּדֶשׁ
  english_pob_choice: the holy garments
  chosen_spanish: las vestiduras sagradas
  alternatives_spanish:
  - las vestiduras santas
  - las vestiduras del santuario
  lexicon: HALOT
  rationale: '''Sagradas'' reproduce bien el valor de קֹדֶשׁ y evita una traducción demasiado literal que sonaríа extraña en español.'
- source_word: לְאַהֲרֹן הַכֹּהֵן
  english_pob_choice: for Aaron the priest
  chosen_spanish: para Aarón el sacerdote
  alternatives_spanish:
  - para Aarón, el sacerdote
  - para Aarón, el sumo sacerdote
  lexicon: HALOT
  rationale: '''Sacerdote'' reproduce el título funcional sin añadir ''sumo'', que no está en el hebreo. Se conserva la apposición simple del original.'
- source_word: בִּגְדֵי בָנָיו
  english_pob_choice: the garments of his sons
  chosen_spanish: las vestiduras de sus hijos
  alternatives_spanish:
  - las vestiduras de sus hijos varones
  - las vestiduras de los hijos de él
  lexicon: HALOT
  rationale: La construcción posesiva se mantiene de forma clara y natural en español, siguiendo de cerca el hebreo.
- source_word: לְכַהֵן
  english_pob_choice: for serving as priests
  chosen_spanish: para ejercer el sacerdocio
  alternatives_spanish:
  - para servir como sacerdotes
  - para oficiar como sacerdotes
  lexicon: HALOT
  rationale: El verbo denominativo de כֹּהֵן expresa la función sacerdotal. 'Ejercer el sacerdocio' preserva el valor vocacional e institucional sin forzar un calco verbal poco natural.
theological_decisions:
- issue: Distinción entre las vestiduras de labor y las vestiduras sagradas
  english_pob_reading: Treat the first phrase as a distinct class of specially woven garments used in sanctuary service, followed by the more specific holy garments for Aaron and his sons.
  chosen_spanish_reading: 'Mantener dos grupos diferenciados: primero, vestiduras de labor para el servicio del santuario; luego, vestiduras sagradas para Aarón y para sus hijos.'
  alternative_spanish_readings:
  - Tratar ambas expresiones como casi sinónimas y unirlas en una sola idea de 'vestiduras de servicio'
  - Traducir la primera frase de modo tradicional como 'vestiduras de ministerio'
  rationale: La repetición hebrea parece deliberada y conviene no borrarla. El español conserva esa distinción sin sobreinterpretar si las dos expresiones son idénticas o si señalan una diferencia funcional.
  doctrine_reference: Éxodo 39:41; comparación interna con el vocabulario sacerdotal y del tabernáculo en Éxodo 28–39
- issue: Uso de 'sacerdote' y 'sacerdocio' en lugar de formularios eclesiásticos más cargados
  english_pob_reading: The English POB avoids later ecclesiastical terminology like 'vestments' and keeps the priestly office explicit.
  chosen_spanish_reading: Usar 'sacerdote' y 'ejercer el sacerdocio' para mantener el oficio cultual del texto, sin introducir un lenguaje litúrgico posterior innecesario.
  alternative_spanish_readings:
  - '''oficiar'''
  - '''ministrar como sacerdotes'''
  - '''vestiduras litúrgicas'''
  rationale: El versículo describe funciones sacerdotales del tabernáculo, no una categoría eclesiástica posterior. 'Ejercer el sacerdocio' comunica la función con precisión y claridad.
  doctrine_reference: Exodus 39:41 in context of priestly vestments and tabernacle service
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo, tomando como apoyo el desglose auditado del inglés POB para distinguir entre la expresión difícil בִּגְדֵי הַשְּׂרָד y la frase más específica בִּגְדֵי הַקֹּדֶשׁ. Se evitó traducir mecánicamente desde el inglés cuando el español exigía una solución más natural ('ejercer el sacerdocio', 'vestiduras de labor').
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como norma del proyecto solo cuando aparece el nombre divino; este versículo no lo contiene.
  - '''Santuario'' se usa para בַּקֹּדֶשׁ siguiendo el valor cultual del término y la práctica del proyecto.'
  - No se usó 'Cristo', 'SEÑOR' ni terminología litúrgica posterior.
  - La nota al pie marca la alternativa lexical principal sin duplicar información en el texto principal.
