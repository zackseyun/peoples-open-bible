lexical_decisions:
- source_word: מֶלֶךְ
  english_pob_choice: king
  chosen_spanish: rey
  alternatives_spanish:
  - el rey
  lexicon: HALOT
  rationale: En la enumeración de reyes derrotados, el sustantivo se traduce de forma directa como «rey». En español, el artículo se omite en la primera mención nominal del listado cuando la estructura ya funciona como encabezado enumerativo; sin embargo, la repetición del patrón en la línea se conserva con claridad.
- source_word: יְרִיחוֹ
  english_pob_choice: Jericho
  chosen_spanish: Jericó
  alternatives_spanish:
  - Jericó
  lexicon: HALOT
  rationale: Nombre propio estándar en español bíblico y de uso general.
- source_word: אֶחָד
  english_pob_choice: one
  chosen_spanish: uno
  alternatives_spanish:
  - un rey
  - uno solo
  lexicon: HALOT
  rationale: 'Aquí funciona como cierre enumerativo del catálogo: «uno». En español, «uno» conserva la brevedad y el tono de recuento del hebreo sin expandir innecesariamente a «un rey».'
- source_word: הָעַי
  english_pob_choice: Ai
  chosen_spanish: Hai
  alternatives_spanish:
  - Ai
  lexicon: HALOT
  rationale: Se conserva la forma toponímica habitual en español bíblico. El artículo hebreo no se reproduce como artículo español porque el uso propio del nombre no lo requiere.
- source_word: אֲשֶׁר
  english_pob_choice: which
  chosen_spanish: que
  alternatives_spanish:
  - el cual
  - la cual
  lexicon: HALOT
  rationale: La cláusula relativa sobre un lugar se expresa naturalmente con «que» en español, manteniendo la relación modificadora sin sobrecargar el estilo.
- source_word: מִצַּד
  english_pob_choice: beside
  chosen_spanish: junto a
  alternatives_spanish:
  - al lado de
  - junto de
  - a la vera de
  lexicon: HALOT
  rationale: La expresión denota proximidad o ubicación adyacente. «Junto a» comunica bien esa relación espacial en español, de manera natural y fiel al valor locativo.
- source_word: בֵּית אֵל
  english_pob_choice: Bethel
  chosen_spanish: Betel
  alternatives_spanish:
  - Betel
  lexicon: HALOT
  rationale: Forma española estable del topónimo bíblico. Se mantiene la transliteración tradicional en español.
theological_decisions:
- issue: Repetición enumerativa de «uno» en un catálogo de reyes vencidos
  english_pob_reading: one; ... one
  chosen_spanish_reading: uno; ... uno
  alternative_spanish_readings:
  - un rey; ... un rey
  - uno; ... un rey
  rationale: El hebreo presenta un patrón de recuento breve y formular. Se conserva la repetición escueta para no expandir el texto más allá de lo que la lista requiere y para mantener visible la función numérica del verso.
  doctrine_reference: Ninguna; decisión de forma y sintaxis del recuento
- issue: Relación espacial de Hai respecto de Betel
  english_pob_reading: which is beside Bethel
  chosen_spanish_reading: que está junto a Betel
  alternative_spanish_readings:
  - que está al lado de Betel
  - que está cerca de Betel
  rationale: La frase indica ubicación adyacente, no simple cercanía vaga. «Junto a» preserva la fuerza locativa del hebreo y la claridad geográfica del pasaje.
  doctrine_reference: Ninguna; decisión geográfica/lexical
translation_notes:
  revision_awareness: El pasaje está en alto acuerdo con el control inglés y no requiere revisión sustantiva. Se mantuvo el formato enumerativo breve y se ajustó la toponimia a uso español estándar.
  spanish_consistency_notes:
  - Se prefirió «Betel» y «Jericó» como formas españolas habituales de los topónimos.
  - Se mantuvo «uno» como cierre enumerativo, coherente con la lista de reyes derrotados en el contexto inmediato.
  - Se evitó introducir artículos innecesarios que alteraran el carácter de recuento del hebreo.
