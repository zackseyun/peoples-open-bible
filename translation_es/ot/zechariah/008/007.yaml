    issue: «Yahvé de los ejércitos» estrecha צְבָאוֹת más de lo documentado
    rationale: La decisión inglesa auditada escogió «of hosts» precisamente para no reducir el título a ejércitos militares. En español, «de las huestes» conserva mejor la amplitud tradicional e inteligible del título divino.
  revised_spanish_text: 'Así dice Yahvé de las huestes: He aquí, yo salvaré[a] a mi pueblo de la tierra del oriente y de la tierra de la puesta del sol[b].'
