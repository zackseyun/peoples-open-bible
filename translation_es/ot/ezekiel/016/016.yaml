translation:
  language: es
  text: Tomaste parte de tus vestidos y te hiciste lugares altos multicolores[a], y te prostituiste sobre ellos; cosas así no debían venir[b], ni debían ser.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'lugares altos remendados', 'lugares altos variegados' o 'santuarios multicolores'. El adjetivo hebreo es difícil y probablemente alude al aspecto decorado producido por las prendas.
    reason: lexical_alternative
  - marker: b
    text: La cláusula final es un hebreo difícil. También puede entenderse como 'cosas así no debían suceder', o más literalmente, 'no debían venir, ni debían ser'.
    reason: alternative_reading
lexical_decisions:
- source_word: וַתִּקְחִי
  english_pob_choice: You took
  chosen_spanish: Tomaste
  alternatives_spanish:
  - Y tomaste
  - Tomaste para ti
  lexicon: HALOT
  rationale: La forma wayyiqtol 2fs se expresa naturalmente en pasado narrativo español. Se omite la conjunción inicial para mayor fluidez, sin perder la secuencia narrativa.
- source_word: מִבְּגָדַיִךְ
  english_pob_choice: some of your garments
  chosen_spanish: parte de tus vestidos
  alternatives_spanish:
  - de tus vestidos
  - algunos de tus vestidos
  lexicon: HALOT
  rationale: El hebreo מִן aporta valor partitivo. 'Parte de' conserva esa idea de tomar una porción de las prendas sin sonar rígido en español.
- source_word: וַתַּעֲשִׂי לָךְ
  english_pob_choice: made for yourself
  chosen_spanish: te hiciste para ti
  alternatives_spanish:
  - hiciste para ti
  - te los hiciste
  lexicon: HALOT
  rationale: La construcción beneficia/reflexiva se mantiene con 'te hiciste para ti', que resulta idiomático y conserva la referencia a uso propio.
- source_word: בָּמוֹת
  english_pob_choice: high places
  chosen_spanish: altos lugares
  alternatives_spanish:
  - lugares altos
  - lugares de culto
  lexicon: HALOT
  rationale: Se preserva el término cultual sin sustituirlo por un vocablo interpretativo más estrecho. 'Altos lugares' comunica la referencia a sitios de culto ilegítimos.
- source_word: טְלֻאוֹת
  english_pob_choice: colorful
  chosen_spanish: multicolores
  alternatives_spanish:
  - de colores
  - pintados
  lexicon: HALOT
  rationale: El adjetivo hebreo apunta a algo remendado, moteado o de apariencia variada/decorada. 'Multicolores' es una solución natural en español que conserva la impresión visual sin reducirla a 'remendados'.
- source_word: וַתִּזְנִי
  english_pob_choice: you prostituted yourself
  chosen_spanish: te prostituiste
  alternatives_spanish:
  - te entregaste a la prostitución
  - fornicaste
  lexicon: HALOT
  rationale: Se mantiene la metáfora sexual explícita de la infidelidad de pacto, como en el POB inglés. 'Te prostituiste' conserva la fuerza retórica sin suavizar el reproche.
- source_word: עֲלֵיהֶם
  english_pob_choice: on them
  chosen_spanish: sobre ellos
  alternatives_spanish:
  - encima de ellos
  - sobre eso
  lexicon: HALOT
  rationale: La preposición עַל se conserva de modo directo. En español, 'sobre ellos' mantiene la imagen física y la referencia a los altos lugares.
- source_word: לֹא בָאוֹת וְלֹא יִהְיֶה
  english_pob_choice: such things should not come, nor should they be
  chosen_spanish: cosas así no debían venir, ni debían ser
  alternatives_spanish:
  - eso no debía venir, ni ser
  - cosas así no deben venir, ni deben ser
  lexicon: HALOT
  rationale: La cláusula final es sintácticamente difícil. Se conserva la tensión del hebreo con una formulación sobria que refleja el carácter impropio/aberrante de 'venir' y 'ser' sin sobreexplicar el sentido.
theological_decisions:
- issue: Metáfora sexual profética para la idolatría
  english_pob_reading: Retain the explicit prostitution language as a metaphor for covenant unfaithfulness
  chosen_spanish_reading: Conservar el lenguaje explícito de prostitución como metáfora de la infidelidad de pacto
  alternative_spanish_readings:
  - suavizar a 'fuiste infiel'
  - reemplazar por 'te apartaste'
  rationale: Ezequiel usa deliberadamente una imagen provocadora para denunciar la idolatría. Suavizarla debilitaría la fuerza profética y ocultaría parte del efecto retórico del texto.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB inglés, que prefirió 'should not come, nor should they be' frente a una paráfrasis más interpretativa. Por eso el español conserva una formulación breve y cercana al giro hebreo, sin expandirla a 'suceder' o 'ocurrir'.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se conserva el lenguaje de 'prostituirte' para mantener la tensión profética ya documentada en el POB inglés.
  - '''Altos lugares'' se usa como equivalente funcional de בָּמוֹת; la adición de ''multicolores'' refleja la dificultad léxica de טְלֻאוֹת sin borrar el matiz visual.'
  - La cláusula final se traduce de forma contenida para no resolver indebidamente el hebreo difícil.
