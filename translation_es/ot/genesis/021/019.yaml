translation:
  language: es
  text: Entonces Dios abrió sus ojos, y ella vio un pozo de agua. Fue y llenó el odre[a] con agua, y dio de beber al muchacho.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la bolsa de cuero». El término hebreo designa un recipiente de cuero para transportar líquidos.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּפְקַח
  english_pob_choice: opened
  chosen_spanish: abrió
  alternatives_spanish:
  - descorrió
  - le abrió
  lexicon: HALOT
  rationale: פקח se usa de abrir ojos; «abrió» conserva el gesto concreto del hebreo y permite la percepción resultante sin explicarla de más.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  - el Altísimo
  lexicon: HALOT
  rationale: En este contexto אֱלֹהִים refiere al Dios singular de la narración, así que en español corresponde «Dios».
- source_word: עֵינֶיהָ
  english_pob_choice: her eyes
  chosen_spanish: sus ojos
  alternatives_spanish:
  - los ojos de ella
  lexicon: HALOT
  rationale: Mantiene el plural hebreo de manera natural en español. El posesivo refleja bien el objeto directo del verbo «abrir».
- source_word: וַתֵּרֶא
  english_pob_choice: she saw
  chosen_spanish: vio
  alternatives_spanish:
  - miró y vio
  - percibió
  lexicon: HALOT
  rationale: ראה se traduce de forma directa como «ver»; aquí «vio» sigue con naturalidad la secuencia narrativa tras la apertura de los ojos.
- source_word: בְּאֵר מָיִם
  english_pob_choice: a well of water
  chosen_spanish: un pozo de agua
  alternatives_spanish:
  - un pozo
  - un pozo con agua
  lexicon: HALOT
  rationale: La construcción hebrea es literalmente «pozo de agua». «Un pozo de agua» preserva la forma del original y evita reducirlo a un pozo genérico.
- source_word: וַתְּמַלֵּא
  english_pob_choice: filled
  chosen_spanish: llenó
  alternatives_spanish:
  - llenó de nuevo
  - colmó
  lexicon: HALOT
  rationale: מלא se traduce con el verbo directo «llenó», sin añadir matices que el texto no exige.
- source_word: הַחֵמֶת
  english_pob_choice: the skin
  chosen_spanish: el odre
  alternatives_spanish:
  - la bolsa de cuero
  - el recipiente de cuero
  lexicon: HALOT
  rationale: חֵמֶת designa un recipiente de cuero para líquidos. «Odre» es un equivalente español natural y bastante preciso, más claro que «la piel» en español.
- source_word: מַיִם
  english_pob_choice: with water
  chosen_spanish: con agua
  alternatives_spanish:
  - de agua
  lexicon: HALOT
  rationale: En español, con «llenó» la manera más natural es «con agua»; reproduce el contenido del hebreo sin forzar la sintaxis.
- source_word: וַתַּשְׁקְ
  english_pob_choice: gave the boy a drink
  chosen_spanish: dio de beber
  alternatives_spanish:
  - hizo beber
  - le dio agua
  lexicon: HALOT
  rationale: El causativo de שׁקה se expresa naturalmente con «dar de beber». La construcción evita exceso de explicitación y conserva la acción de hacer beber.
- source_word: הַנַּעַר
  english_pob_choice: the boy
  chosen_spanish: al muchacho
  alternatives_spanish:
  - al niño
  - al joven
  lexicon: HALOT
  rationale: נַעַר aquí se refiere al hijo de Agar; «muchacho» es claro, digno y menos infantilizante que «niño», manteniendo el registro narrativo.
theological_decisions:
- issue: La apertura de los ojos de Agar como acción divina o como mera percepción de algo ya visible
  english_pob_reading: 'Literal divine action: ''God opened her eyes'''
  chosen_spanish_reading: 'Acción divina literal: «Dios abrió sus ojos»'
  alternative_spanish_readings:
  - Dios le permitió notar el pozo
  - Dios le hizo ver el pozo
  rationale: El hebreo atribuye explícitamente la acción a Dios con el idiomismo de abrir los ojos. La redacción española conserva esa afirmación sin resolverla en una simple toma de conciencia.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: El estado de revisión más reciente coincide en alta concordancia y no introduce cambios. Se mantiene la decisión previa de conservar la acción divina explícita y la alternativa léxica para הַחֵמֶת como nota.
  spanish_consistency_notes:
  - Se usa «Dios» para אֱלֹהִים en singular narrativo.
  - Se conserva «pozo de agua» para reflejar la construcción hebrea sin convertirla en una paráfrasis.
  - «Odre» evita una traducción demasiado literal e ininteligible de חֵמֶת, manteniendo una nota para la alternativa.
  - «Muchacho» mantiene un registro narrativo natural para נַעַר en este contexto.
