base_translation:
  language: en
  yaml_path: translation/ot/jonah/004/005.yaml
  text: Then Jonah went out from the city and sat east of the city[b][a]. There he made himself a shelter and sat under it in the shade until he would see what would happen in the city.
  footnotes:
