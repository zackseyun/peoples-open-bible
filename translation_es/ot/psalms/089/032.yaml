    text: 'O: «violan mis estatutos». El verbo hebreo puede denotar profanar o tratar como común; «profanan» preserva la fuerza más intensa.'
    reason: lexical_alternative
  revision_rationale: Se conserva intacto el texto bíblico porque es fiel al hebreo y al POB en inglés. Solo se corrige la nota al pie para eliminar la mezcla de idiomas y expresar con español natural la alternativa léxica documentada.
