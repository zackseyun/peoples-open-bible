translation:
  language: es
  text: 'Entonces Daniel, cuyo nombre era Beltsasar, quedó consternado[a] por como una hora[b], y sus pensamientos lo aterraban. El rey respondió y dijo: «Beltsasar, no dejes que el sueño o su interpretación te aterren». Beltsasar respondió y dijo: «Mi señor, que el sueño sea para los que te odian y su interpretación para tus enemigos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «quedó atónito» o «quedó estupefacto». El verbo arameo puede indicar quedar impactado hasta el silencio; aquí el contexto favorece consternación emocional.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «por una hora».
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱדַיִן
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - En ese momento
  lexicon: HALOT
  rationale: Marcador discursivo arameo que introduce la acción siguiente. «Entonces» conserva la secuencia narrativa con naturalidad en español.
- source_word: דָּנִיֵּאל דִּי שְׁמֵהּ בֵּלְטְשַׁאצַּר
  english_pob_choice: Daniel, whose name was Belteshazzar
  chosen_spanish: Daniel, cuyo nombre era Beltsasar
  alternatives_spanish:
  - Daniel, que se llamaba Beltsasar
  - Daniel, quien tenía por nombre Beltsasar
  lexicon: HALOT
  rationale: La construcción relativa identifica a Daniel por su nombre babilónico en el contexto de la corte. «Cuyo nombre era» reproduce bien la apposición explicativa sin forzar el español.
- source_word: אֶשְׁתּוֹמַם
  english_pob_choice: was appalled
  chosen_spanish: quedó atónito
  alternatives_spanish:
  - quedó asombrado
  - quedó sobrecogido
  - quedó estupefacto
  lexicon: HALOT
  rationale: El verbo arameo puede expresar quedar aturdido o en silencio por impacto emocional. En este contexto, «quedó atónito» comunica el desconcierto y la conmoción sin volverlo excesivamente libre.
- source_word: כְּשָׁעָה חֲדָה
  english_pob_choice: for about an hour
  chosen_spanish: por cerca de una hora
  alternatives_spanish:
  - durante aproximadamente una hora
  - por una hora
  lexicon: HALOT
  rationale: Literalmente «por una hora». «Por cerca de una hora» mantiene la duración aproximada y evita una rigidez innecesaria.
- source_word: וְרַעְיֹנֹהִי
  english_pob_choice: and his thoughts
  chosen_spanish: sus pensamientos
  alternatives_spanish:
  - sus reflexiones
  - sus razonamientos
  lexicon: HALOT
  rationale: El sustantivo se refiere a pensamientos o reflexiones mentales. «Sus pensamientos» es la equivalencia más clara y natural.
- source_word: יְבַהֲלֻנֵּהּ
  english_pob_choice: terrified him
  chosen_spanish: lo llenaban de angustia
  alternatives_spanish:
  - lo aterraban
  - lo perturbaban
  - lo asustaban
  lexicon: HALOT
  rationale: El verbo expresa causar temor o alarma. Aquí el contexto muestra un efecto interno sostenido; «lo llenaban de angustia» conserva la fuerza emocional sin sonar redundante en español con «atónito».
- source_word: עָנֵה מַלְכָּא וְאָמַר
  english_pob_choice: The king answered and said
  chosen_spanish: El rey respondió y dijo
  alternatives_spanish:
  - El rey contestó y dijo
  - El rey dijo
  lexicon: HALOT
  rationale: Fórmula semítica de habla. Se mantiene la doble expresión para reflejar el patrón del original sin volverlo pesado.
- source_word: חֶלְמָא וּפִשְׁרֵא אַל יְבַהֲלָךְ
  english_pob_choice: do not let the dream or its interpretation terrify you
  chosen_spanish: no dejes que el sueño ni su interpretación te angustien
  alternatives_spanish:
  - no permitas que el sueño o su interpretación te aterren
  - que el sueño ni su interpretación no te angustien
  lexicon: HALOT
  rationale: 'El verbo causativo pide una expresión natural en español: «no dejes que... te angustien». Se conserva la coordinación entre sueño e interpretación y la relación causal del original.'
- source_word: מרא/י
  english_pob_choice: My lord
  chosen_spanish: Mi señor
  alternatives_spanish:
  - Señor mío
  - Mi amo
  - Señor
  lexicon: HALOT
  rationale: Es un tratamiento respetuoso hacia el rey en un contexto cortesano, no un título divino. «Mi señor» preserva deferencia y es idiomático en español bíblico contemporáneo.
- source_word: ל/שנאי/ך
  english_pob_choice: for those who hate you
  chosen_spanish: para los que te odian
  alternatives_spanish:
  - para tus odiadores
  - para quienes te odian
  lexicon: HALOT
  rationale: La preposición lamed aquí expresa aplicación o referencia. «Para los que te odian» reproduce de forma clara la referencia a los destinatarios deseados del sueño.
- source_word: וּפִשְׁרֵהּ
  english_pob_choice: its interpretation
  chosen_spanish: su interpretación
  alternatives_spanish:
  - su explicación
  - su sentido
  lexicon: HALOT
  rationale: El término se refiere a la interpretación de un sueño, no a un sentido abstracto. «Su interpretación» mantiene el contexto onírico.
- source_word: ל/ערי/ך
  english_pob_choice: for your enemies
  chosen_spanish: para tus enemigos
  alternatives_spanish:
  - para tus adversarios
  - para tus rivales
  lexicon: HALOT
  rationale: El sustantivo denota enemigos o adversarios. «Tus enemigos» es la opción más directa y transparente.
theological_decisions:
- issue: Tratamiento del nombre divino o títulos divinos
  english_pob_reading: No aparece יהוה ni un título divino en este versículo; el texto contiene un honorífico humano hacia el rey.
  chosen_spanish_reading: No se introduce ninguna referencia divina; «mi señor» se entiende como tratamiento cortesano.
  alternative_spanish_readings:
  - Mi Señor
  - Señor
  rationale: El contexto es una audiencia real humana. Traducir como título divino sería un error de registro y de sentido.
  doctrine_reference: Jerarquía semántica del original; no aplica la convención Yahvé/SEÑOR aquí.
translation_notes:
  revision_awareness: 'Se siguió el sentido del arameo y el audit trail inglés: se mantuvo la secuencia narrativa, la fórmula de habla semítica y la fuerza emocional de los verbos, ajustando el español para fluidez sin perder la tensión léxica.'
  spanish_consistency_notes:
  - Se conserva «Beltsasar» como forma española coherente del nombre arameo transmitido en el contexto.
  - Se evita «SEÑOR» como convención de reemplazo porque aquí מרא/י es un honorífico humano, no el nombre divino.
  - «Interpretación» se mantiene para פשר, en línea con el contexto de sueño y su explicación.
  - «Pensamientos» se usa para רעיוני, evitando una paráfrasis más amplia que diluya el matiz mental del término.
