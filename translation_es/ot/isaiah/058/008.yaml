revisions:
- from: Entonces tu luz despuntará[a] como el alba, y tu sanidad brotará pronto; tu justicia[b] irá delante de ti, y la gloria de Yahvé será tu retaguardia[c].
  to: Entonces tu luz despuntará como el alba, y tu sanidad[a] brotará pronto; tu rectitud[b] irá delante de ti, y la gloria de Yahvé será tu retaguardia[c].
  rationale: Se revisa para alinear el español con la decisión lexical auditada del POB sobre צִדְקֶךָ, usando «rectitud» en el texto principal y dejando «justicia» como alternativa. También se corrige el anclaje de la nota [a] para que recaiga sobre «sanidad», y se ajusta la nota [c] para explicar de forma coherente la tensión entre la interpretación idiomática «retaguardia» y la literalidad del verbo hebreo, además de distinguir la tradición de enmascarar el nombre divino.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:29:21Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura del hebreo: la luz que irrumpe como el alba, la sanidad que brota con prontitud, la justicia/rectitud que va delante, y la gloria de Yahvé como protección por detrás. Sin embargo, no sigue del todo la decisión auditada del POB para צִדְקֶךָ, donde el inglés fijó ''your righteousness'' y dejó ''justice'' solo como alternativa. Además, la nota [a] está mal anclada: la alternativa pertenece a «sanidad», no a «despuntará». La nota [c] también debe evitar presentar como ''tradicionalmente'' la misma redacción del texto principal; debe explicar que la forma tradicional en inglés usó ''the LORD'' y que el verbo hebreo significa literalmente reunir/recoger desde atrás.'
  spanish_quality_summary: El español es claro y digno, con buen ritmo bíblico. «Despuntará como el alba» y «brotará pronto» leen bien. No obstante, «tu justicia» estrecha o desplaza el matiz más amplio de צדק en esta línea personificada; «tu rectitud» o «tu justicia» son posibles en español, pero para seguir la decisión documentada del POB conviene «tu rectitud» en texto principal y dejar «justicia» como alternativa. También hace falta corregir la ubicación de la nota [a].
  glossary_alignment: 'Alineación general buena: יְהוָה se traduce correctamente como «Yahvé»; כבוד como «gloria»; אֲרֻכָה como «sanidad» es aceptable. El principal desajuste terminológico es צִדְקֶךָ: el POB auditado prefirió ''righteousness'', no ''justice'', por lo que en español conviene una opción que preserve mejor ese campo semántico amplio, como «rectitud», dejando «justicia» y «vindicación» en nota.'
  issues:
  - severity: medium
    issue: צִדְקֶךָ se tradujo en el texto principal como «tu justicia»
    rationale: La auditoría inglesa escogió 'your righteousness' y preservó 'justice' como alternativa. En español, «tu justicia» inclina la lectura hacia lo social/judicial y no refleja tan bien la decisión documentada de mantener el sentido moral-covenantal más amplio.
  - severity: medium
    issue: La nota [a] está anclada a «despuntará» en vez de a «sanidad»
    rationale: La nota explica alternativas para אֲרֻכָתְךָ ('tu sanidad'), no para יִבָּקַע ('despuntará'). El anclaje actual confunde qué palabra se está aclarando.
  - severity: low
    issue: La nota [c] está formulada de manera imprecisa frente al texto principal
    rationale: 'Dice «Tradicionalmente: “la gloria de Yahvé será tu retaguardia”», que es exactamente la redacción principal salvo mínimos detalles, por lo que no funciona como contraste. Debe explicar mejor la literalidad de יַאַסְפֶךָ y, si se menciona tradición, distinguir la convención de ocultar el nombre divino en otras versiones.'
  revised_spanish_text: Entonces tu luz despuntará como el alba, y tu sanidad[a] brotará pronto; tu rectitud[b] irá delante de ti, y la gloria de Yahvé será tu retaguardia[c].
  revised_footnotes:
  - marker: a
    text: O «tu recuperación» o «tu restauración» para «tu sanidad».
    reason: lexical_alternative
  - marker: b
    text: O «tu justicia» o «tu vindicación» para «tu rectitud».
    reason: lexical_alternative
  - marker: c
    text: Tradicionalmente, «la gloria del SEÑOR será tu retaguardia». El verbo hebreo puede entenderse más literalmente como «te recogerá por detrás» o «te reunirá desde atrás».
    reason: alternative_reading
  revision_rationale: Se revisa para alinear el español con la decisión lexical auditada del POB sobre צִדְקֶךָ, usando «rectitud» en el texto principal y dejando «justicia» como alternativa. También se corrige el anclaje de la nota [a] para que recaiga sobre «sanidad», y se ajusta la nota [c] para explicar de forma coherente la tensión entre la interpretación idiomática «retaguardia» y la literalidad del verbo hebreo, además de distinguir la tradición de enmascarar el nombre divino.
