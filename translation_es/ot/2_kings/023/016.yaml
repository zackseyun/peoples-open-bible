base_translation:
  language: en
  yaml_path: translation/ot/2_kings/023/016.yaml
  text: Then Josiah turned and saw the tombs that were there on the mountain[a], and he sent and took the bones from the tombs and burned them on the altar and defiled it, according to the word of Yahweh that the man of God proclaimed[b], who proclaimed these things.
  footnotes:
  - marker: a
    text: Or 'the graves.' The Hebrew term can refer to burial places generally, not only constructed tombs.
    reason: lexical_alternative
  - marker: b
    text: Or 'cried out' / 'called out.' The Hebrew verb can emphasize a loud public proclamation.
    reason: lexical_alternative
