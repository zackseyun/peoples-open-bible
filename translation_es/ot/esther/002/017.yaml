    reason: lexical_alternative
  - marker: c
    text: «Vírgenes» traduce un término hebreo más específico que «mujeres» al comienzo del versículo; se conserva la distinción.
    reason: lexical_alternative
  revision_rationale: Se conserva el sentido del original, pero se corrige la puntuación para que la segunda comparación se lea con naturalidad y se añade la nota sobre la distinción hebrea entre «mujeres» y «vírgenes», ya documentada en el POB inglés.
