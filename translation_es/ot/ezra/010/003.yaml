translation:
  language: es
  text: Así que ahora hagamos un pacto con nuestro Dios para despedir a todas las mujeres[a] y a lo que ha nacido de ellas[b], conforme al consejo de mi señor[c] y de los que tiemblan ante el mandamiento de nuestro Dios; y que se haga conforme a la ley[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "esposas". El contexto trata de esposas extranjeras tomadas en matrimonio.'
    reason: lexical_alternative
  - marker: b
    text: 'O: "los hijos nacidos de ellas" o "su descendencia".'
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: "mi señor"; probablemente se refiere a Esdras, no a Dios.'
    reason: alternative_reading
  - marker: d
    text: 'O: "conforme a la Torá".'
    reason: lexical_alternative
lexical_decisions:
- source_word: נִכְרָת בְּרִית
  english_pob_choice: let us make a covenant
  chosen_spanish: hagamos un pacto
  alternatives_spanish:
  - hagamos un convenio
  - cortemos un pacto
  lexicon: HALOT
  rationale: El hebreo expresa literalmente la idea de 'cortar un pacto', pero en español 'hacer un pacto' comunica con naturalidad el valor idiomático y mantiene el tono cohesivo de la propuesta cohortativa.
- source_word: לֵאלֹהֵינוּ
  english_pob_choice: with our God
  chosen_spanish: con nuestro Dios
  alternatives_spanish:
  - ante nuestro Dios
  - para con nuestro Dios
  lexicon: HALOT
  rationale: Con כרת ברית, la preposición ל marca la parte comprometida del pacto; en español 'con nuestro Dios' expresa mejor la relación pactal que una traducción más literal como 'a nuestro Dios'.
- source_word: לְהוֹצִיא
  english_pob_choice: to send away
  chosen_spanish: para despedir
  alternatives_spanish:
  - para enviar lejos
  - para apartar
  lexicon: HALOT
  rationale: En este contexto matrimonial, 'despedir' comunica la acción de separar o enviar lejos a las mujeres sin endurecer innecesariamente el español ni perder el sentido de remoción.
- source_word: כָל נָשִׁים
  english_pob_choice: all the women
  chosen_spanish: todas las mujeres
  alternatives_spanish:
  - todas las esposas
  - todas las mujeres casadas
  lexicon: HALOT
  rationale: Se conserva la forma del hebreo, 'mujeres', porque el texto fuente usa נָשִׁים; el contexto inmediato ya aclara que se trata de esposas extranjeras, de modo que la literalidad aquí no oscurece el sentido.
- source_word: וְהַנּוֹלָד מֵהֶם
  english_pob_choice: and what has been born from them
  chosen_spanish: y a lo que ha nacido de ellas
  alternatives_spanish:
  - y a los hijos nacidos de ellas
  - y a su descendencia
  lexicon: HALOT
  rationale: Se mantiene la expresión colectiva y algo abierta del participio hebreo. 'Lo que ha nacido' evita sobreespecificar y refleja mejor la construcción que una traducción más interpretativa.
- source_word: בַּעֲצַת
  english_pob_choice: according to the counsel of
  chosen_spanish: conforme al consejo de
  alternatives_spanish:
  - según el consejo de
  - de acuerdo con el consejo de
  lexicon: HALOT
  rationale: '''Conforme al consejo de'' reproduce con precisión la idea de conformidad a una deliberación o consejo, y funciona bien en español jurídico-narrativo.'
- source_word: אֲדֹנָי
  english_pob_choice: my lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - mi señor
  - el maestro
  lexicon: HALOT
  rationale: Aunque la forma hebrea puede leerse como un tratamiento humano de respeto, la evidencia del expediente revisado del POB en inglés favorece aquí 'the Lord'. En español, 'el Señor' preserva esa lectura y evita una ambigüedad innecesaria en la línea del consejo autorizado.
- source_word: וְהַחֲרֵדִים בְּמִצְוַת אֱלֹהֵינוּ
  english_pob_choice: and of those who tremble at the commandment of our God
  chosen_spanish: y de los que tiemblan ante el mandamiento de nuestro Dios
  alternatives_spanish:
  - y de los que temen el mandamiento de nuestro Dios
  - y de los reverentes ante el mandamiento de nuestro Dios
  lexicon: HALOT
  rationale: '''Tiemblan'' conserva la fuerza de חרד, que implica temor reverente y no solo obediencia. Se mantiene ''mandamiento'' en singular, como en el hebreo, aunque con sentido colectivo.'
- source_word: וְכַתּוֹרָה יֵעָשֶׂה
  english_pob_choice: and let it be done according to the law
  chosen_spanish: y que se haga conforme a la ley
  alternatives_spanish:
  - y que se haga conforme a la Torá
  - y hágase conforme a la ley
  lexicon: HALOT
  rationale: '''Ley'' es la opción más accesible y fiel al contexto legal-covenantal; ''Torá'' se mantiene como alternativa posible, pero no es necesaria en el texto principal para comunicar el sentido.'
theological_decisions:
- issue: Referencia de אֲדֹנָי
  english_pob_reading: human 'my lord' / in revised context 'the Lord' rather than the divine name placeholder
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - mi señor
  rationale: El expediente inglés muestra una revisión textual/interpretativa que favorece 'the Lord'. En el español se adopta esa lectura para que la frase de consejo tenga coherencia narrativa y no se perciba como un tratamiento humano discordante dentro de la cláusula.
  doctrine_reference: Ezra 10:3; decisión basada en el audit trail del POB y el contexto narrativo inmediato
- issue: Valor de נִכְרָת בְּרִית
  english_pob_reading: make a covenant
  chosen_spanish_reading: hagamos un pacto
  alternative_spanish_readings:
  - cortemos un pacto
  - hagamos un convenio
  rationale: Se conserva el acto pactal como decisión comunitaria solemne sin diluir su peso teológico en un mero acuerdo administrativo.
  doctrine_reference: Teología del pacto en el contexto postexílico (Esdras 10:3)
- issue: Lectura colectiva de וְהַנּוֹלָד מֵהֶם
  english_pob_reading: what has been born from them / their offspring
  chosen_spanish_reading: a lo que ha nacido de ellas
  alternative_spanish_readings:
  - a sus hijos
  - a su descendencia
  rationale: La forma española mantiene la ambigüedad controlada del hebreo, evitando forzar una precisión que el texto no explicita completamente.
  doctrine_reference: Fidelidad semántica al hebreo en construcciones colectivas
translation_notes:
  revision_awareness: 'El expediente inglés muestra una revisión importante sobre אֲדֹנָי: una primera forma lo entendió como tratamiento humano (''my lord''), pero la última revisión publicada del POB en inglés cambió a ''the Lord''. Esta versión española sigue esa lectura revisada y mantiene el resto de la cláusula en correspondencia estrecha con el hebreo y el audit trail.'
  spanish_consistency_notes:
  - Se mantiene 'pacto' para כרת ברית, acorde con el uso bíblico y con el registro de la obra.
  - '''Dios'' se reserva para אֱלֹהִים, y ''el Señor'' se usa aquí solo por la decisión textual/contextual asociada a אֲדֹנָי.'
  - '''ley'' traduce תּוֹרָה en el texto principal; ''Torá'' queda como alternativa anotada.'
  - Se conserva la estructura coordinada del hebreo sin añadir explicaciones interpretativas dentro del versículo.
