translation:
  language: es
  text: El hombre comió el pan de los poderosos[a]; les envió provisiones hasta quedar satisfechos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el pan de los ángeles». El hebreo dice más literalmente «el pan de los poderosos» o «de los seres poderosos».
    reason: alternative_reading
lexical_decisions:
- source_word: לֶחֶם
  english_pob_choice: bread
  chosen_spanish: pan
  alternatives_spanish:
  - alimento
  - comida
  lexicon: HALOT
  rationale: «לֶחֶם» designa de manera básica pan; en español, «pan» conserva la imagen concreta y poética del hebreo mejor que un término más general como «alimento».
- source_word: אַבִּירִים
  english_pob_choice: the mighty
  chosen_spanish: los poderosos
  alternatives_spanish:
  - los ángeles
  - los poderosos ones
  - los nobles
  lexicon: HALOT
  rationale: El hebreo apunta más directamente a seres «fuertes/poderosos» que a «ángeles». «Los poderosos» mantiene la tensión interpretativa documentada por la tradición sin introducir una equivalencia más interpretativa que el texto base.
- source_word: אָכַל
  english_pob_choice: ate
  chosen_spanish: comió
  alternatives_spanish:
  - ha comido
  lexicon: HALOT
  rationale: El perfecto hebreo funciona naturalmente como pasado simple en español en este contexto poético.
- source_word: אִישׁ
  english_pob_choice: Man
  chosen_spanish: El hombre
  alternatives_spanish:
  - Cada hombre
  - La gente
  - La humanidad
  lexicon: HALOT
  rationale: El singular hebreo tiene valor genérico o representativo. «El hombre» conserva esa forma y el tono proverbial/poético sin diluir el sujeto en un plural.
- source_word: צֵידָה
  english_pob_choice: provisions
  chosen_spanish: provisiones
  alternatives_spanish:
  - alimentos
  - víveres
  - sustento
  lexicon: HALOT
  rationale: «צֵידָה» se refiere a comida o suministro provisto para una necesidad; «provisiones» mantiene la idea de suministro adecuado y distingue esta cláusula del «pan» anterior.
- source_word: שָׁלַח
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - despachó
  lexicon: HALOT
  rationale: El verbo significa simplemente «enviar». «Envió» es la correspondencia más directa y natural en español.
- source_word: לָהֶם
  english_pob_choice: them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  lexicon: HALOT
  rationale: El dativo hebreo se expresa con naturalidad en español mediante el pronombre átono «les» después de «envió».
- source_word: לָשֹׂבַע
  english_pob_choice: to the full
  chosen_spanish: hasta saciarse
  alternatives_spanish:
  - en abundancia
  - al pleno
  - hasta la plenitud
  lexicon: HALOT
  rationale: La frase comunica llenura/satisfacción. «Hasta saciarse» expresa bien la idea de suficiencia completa en español moderno, sin perder el matiz de abundancia.
theological_decisions:
- issue: Sentido de אַבִּירִים en la expresión del pan
  english_pob_reading: Render literally as 'the mighty' in the main text; traditional footnote mentions 'angels.'
  chosen_spanish_reading: Mantener «los poderosos» en el texto principal y anotar la lectura tradicional «ángeles».
  alternative_spanish_readings:
  - los ángeles
  - los seres poderosos
  - los nobles
  rationale: La base hebrea no exige «ángeles»; esa lectura procede de interpretación antigua asociada al contexto del maná. Para respetar la primacía del texto original, el texto principal conserva la referencia más directa y la nota preserva la opción tradicional.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'El texto base inglés y la revisión más reciente coinciden: no hubo cambios aplicados en la pasada más reciente, y el acuerdo de revisión fue alto. La versión española sigue esa lectura estable, manteniendo la tensión entre el sentido más literal del hebreo y la interpretación tradicional en la nota.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma cuando aparezca el nombre divino; en este versículo no aparece.
  - Se conserva el registro poético y sobrio, con sintaxis natural para español bíblico contemporáneo.
  - «Los poderosos» evita cerrar indebidamente la ambigüedad de אַבִּירִים y deja visible la alternativa tradicional en nota.
