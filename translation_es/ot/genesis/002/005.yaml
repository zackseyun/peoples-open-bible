translation:
  language: es
  text: Ahora bien, todavía no había en la tierra arbusto del campo[a], ni había brotado aún planta del campo, porque Yahvé Dios no había hecho llover sobre la tierra[b], y no había hombre para trabajar el suelo[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «matorral del campo» para «arbusto del campo».
    reason: lexical_alternative
  - marker: b
    text: El hebreo dice «Yahvé Dios».
    reason: alternative_reading
  - marker: c
    text: O «no había ser humano para cultivar la tierra».
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׂיחַ הַשָּׂדֶה
  english_pob_choice: shrub of the field
  chosen_spanish: arbusto del campo
  alternatives_spanish:
  - matorral del campo
  - arbusto silvestre del campo
  lexicon: HALOT
  rationale: שִׂיחַ designa un arbusto o matorral, no una planta genérica. «Arbusto del campo» conserva la distinción léxica frente a עֵשֶׂב en la cláusula siguiente y suena natural en español.
- source_word: טֶרֶם יִהְיֶה בָאָרֶץ
  english_pob_choice: was yet on the earth
  chosen_spanish: no había todavía... en la tierra
  alternatives_spanish:
  - aún no existía en la tierra
  - todavía no estaba sobre la tierra
  lexicon: HALOT
  rationale: טֶרֶם indica una inexistencia previa o un «todavía no». En español, la negación existencial transmite bien ese valor y mantiene el matiz de presencia en la tierra.
- source_word: עֵשֶׂב הַשָּׂדֶה
  english_pob_choice: plant of the field
  chosen_spanish: planta del campo
  alternatives_spanish:
  - hierba del campo
  - vegetación del campo
  lexicon: HALOT
  rationale: עֵשֶׂב puede abarcar vegetación herbácea en general. «Planta» es más amplio que «hierba» y mantiene el contraste con «arbusto» sin precisar más de lo que el hebreo exige.
- source_word: טֶרֶם יִצְמָח
  english_pob_choice: had yet sprung up
  chosen_spanish: había aún...
  alternatives_spanish:
  - había aún brotado
  - había aún salido
  lexicon: HALOT
  rationale: צמח expresa brotar o crecer. La construcción española con «había aún» en paralelo con la cláusula anterior comunica el estado previo de no aparición sin forzar un tecnicismo botánico.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Aquí כִּי introduce la causa de la ausencia de vegetación. «Porque» es el conector causal más claro y natural en español.
- source_word: הִמְטִיר
  english_pob_choice: had not caused it to rain
  chosen_spanish: no había hecho llover
  alternatives_spanish:
  - no había enviado lluvia
  - no había mandado llover
  lexicon: HALOT
  rationale: La forma causativa de מטר expresa que Dios hizo caer la lluvia. «Hacer llover» preserva esa causatividad de modo idiomático en español.
- source_word: יְהוָה אֱלֹהִים
  english_pob_choice: the LORD God
  chosen_spanish: Yahvé Dios
  alternatives_spanish:
  - el SEÑOR Dios
  - Yahveh Dios
  lexicon: HALOT
  rationale: El texto hebreo tiene explícitamente el nombre divino יְהוָה junto con אֱלֹהִים. Conforme al criterio del proyecto, se mantiene «Yahvé» en el texto principal para no ocultar el nombre propio.
- source_word: וְאָדָם אַיִן
  english_pob_choice: there was no man
  chosen_spanish: no había hombre
  alternatives_spanish:
  - no había humano
  - no había persona
  lexicon: HALOT
  rationale: Aquí אָדָם funciona como singular representativo de la humanidad, pero en el contexto inmediato designa al trabajador humano ausente. «Hombre» conserva el singular representativo y la fuerza contextual.
- source_word: לַעֲבֹד אֶת הָאֲדָמָה
  english_pob_choice: to work the ground
  chosen_spanish: para trabajar la tierra
  alternatives_spanish:
  - para cultivar el suelo
  - para labrar la tierra
  lexicon: HALOT
  rationale: עבד en este contexto significa trabajar o cultivar. «Trabajar la tierra» es claro y amplio en español; «tierra» refleja bien אֲדָמָה como suelo cultivable sin introducir una técnica agrícola más precisa de la que el hebreo da.
- source_word: הָאָרֶץ / הָאֲדָמָה
  english_pob_choice: earth / ground
  chosen_spanish: tierra / tierra
  alternatives_spanish:
  - mundo / suelo
  - tierra / suelo
  lexicon: HALOT
  rationale: El hebreo distingue entre אֶרֶץ y אֲדָמָה, pero en español, dentro de esta breve cláusula, «tierra» funciona para ambos con suficiente claridad y evita una duplicación forzada. La repetición también ayuda a mantener el paralelismo del versículo.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: El hebreo usa el Tetragrama de manera explícita. Conforme al criterio del proyecto, el nombre del pacto se traduce como «Yahvé» y no se enmascara como «SEÑOR».
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Rendering of אָדָם in context
  english_pob_reading: man
  chosen_spanish_reading: hombre
  alternative_spanish_readings:
  - humano
  - persona
  rationale: En este contexto se trata del ser humano singular que faltaba para trabajar la tierra. «Hombre» conserva el valor representativo singular sin diluir el referente contextual.
  doctrine_reference: 'DOCTRINE.md Contested terms: אָדָם adam; Translation philosophy §4'
translation_notes:
  revision_awareness: El contexto inglés muestra acuerdo alto y sin revisiones aplicadas en el último pase; por eso la versión española sigue de cerca las decisiones léxicas auditadas, preservando las distinciones clave entre שִׂיחַ y עֵשֶׂב, entre יְהוָה אֱלֹהִים y la referencia general a Dios, y entre אֶרֶץ y אֲדָמָה.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה según la terminología del proyecto.
  - Se conserva la distinción entre «arbusto» y «planta» para reflejar שִׂיחַ y עֵשֶׂב.
  - Se usa «tierra» de forma consistente para אֶרֶץ y אֲדָמָה en esta oración, priorizando fluidez natural en español.
  - Se usa «hombre» para אָדָם en sentido representativo singular, conforme al contexto inmediato.
