translation:
  language: es
  text: por lo cual la justicia divina ha perseguido y perseguirá al maldito[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el contaminado» o «el abominable»; el término griego es raro y transmite una fuerte condena moral-religiosa.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑπὲρ ὧν
  english_pob_choice: for which
  chosen_spanish: porque a causa de esto
  alternatives_spanish:
  - por lo cual
  - por estas cosas
  - a causa de las cuales
  lexicon: LSJ
  rationale: La construcción introduce la causa o base del juicio divino. En español, «porque a causa de esto» comunica con claridad la relación causal sin forzar una traducción demasiado literal de la preposición + relativo griegos.
- source_word: ἡ θεία δίκη
  english_pob_choice: divine justice
  chosen_spanish: la justicia divina
  alternatives_spanish:
  - el juicio divino
  - la venganza divina
  - el castigo divino
  lexicon: LSJ
  rationale: «δίκη» puede abarcar justicia, retribución o castigo. «Justicia divina» conserva la amplitud del término y la tensión entre principio judicial y acto retributivo, como en el inglés POB.
- source_word: μετῆλθεν
  english_pob_choice: has pursued
  chosen_spanish: ha perseguido
  alternatives_spanish:
  - ha ido tras
  - ha seguido
  - ha castigado
  lexicon: LSJ
  rationale: El verbo expresa ir tras alguien con fuerza hostil o punitiva. «Ha perseguido» reproduce bien esa idea en español y mantiene el paralelismo con el futuro siguiente.
- source_word: καὶ μετελεύσεται
  english_pob_choice: and will pursue
  chosen_spanish: y perseguirá
  alternatives_spanish:
  - y irá tras
  - y alcanzará
  - y castigará
  lexicon: LSJ
  rationale: Se conserva la repetición retórica del mismo campo verbal del perfecto/aoristo previo. «Perseguirá» mantiene la continuidad léxica y la expectativa de retribución continua.
- source_word: τὸν ἀλιόστορα
  english_pob_choice: the accursed one
  chosen_spanish: al maldito
  alternatives_spanish:
  - al contaminado
  - al abominable
  - al maldecido
  lexicon: LSJ
  rationale: El término es raro y fuertemente despectivo; parece señalar a alguien bajo maldición o con fuerte condena moral-religiosa. «Maldito» es natural en español y conserva la fuerza de condena. Se evita estrecharlo indebidamente a una sola noción como «contaminado».
theological_decisions:
- issue: Cómo traducir δίκη en un contexto de retribución divina
  english_pob_reading: divine justice
  chosen_spanish_reading: justicia divina
  alternative_spanish_readings:
  - venganza divina
  - castigo divino
  - juicio divino
  rationale: El pasaje presenta la acción retributiva de Dios sin obligar a reducirla a venganza solamente. «Justicia divina» preserva la tensión entre justicia como principio y la sanción como acto de respuesta.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El texto griego recibido coincide sustancialmente con el audit trail inglés; no se requieren revisiones textuales adicionales. Se conservó la repetición verbal y la ambigüedad moral del término raro ἀλιόστορα, evitando una especificación excesiva.
  spanish_consistency_notes:
  - Se usó «Yahvé» no porque aparezca aquí un tetragrámaton, sino porque la política del proyecto privilegia esa forma cuando el nombre divino hebreo está en juego; en este verso el griego emplea θεία, por lo que la traducción correcta es «la justicia divina».
  - Se mantuvo un registro digno y bíblico, pero con sintaxis española natural; no se calcó la estructura griega de manera rígida.
  - La nota de pie preserva la alternativa léxica porque el inglés POB también documenta la rareza y la amplitud semántica del término final.
