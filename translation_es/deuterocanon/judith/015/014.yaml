translation:
  language: es
  text: Y toda mujer de Israel acudió corriendo a verla[a], y la bendijeron, y le hicieron una danza de entre ellas mismas; y ella tomó tirsos en sus manos y se los dio a las mujeres que estaban con ella[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “todas las mujeres de Israel acudieron corriendo a verla”. El griego usa un singular colectivo (“toda mujer de Israel”).'
    reason: lexical_alternative
  - marker: b
    text: Los “tirsos” son bastones o varas festivas, asociados en el uso griego con procesiones celebrativas.
    reason: cultural_note
lexical_decisions:
- source_word: συνέδραμεν
  english_pob_choice: ran together
  chosen_spanish: corrió a verla
  alternatives_spanish:
  - acudió corriendo a verla
  - corrieron juntas a verla
  lexicon: LSJ
  rationale: El griego expresa convergencia rápida y colectiva. En español, “corrió a verla” comunica la rapidez con naturalidad; el sentido colectivo queda en “toda mujer de Israel” y en el contexto inmediato.
- source_word: πᾶσα γυνὴ Ἰσραὴλ
  english_pob_choice: every woman of Israel
  chosen_spanish: toda mujer de Israel
  alternatives_spanish:
  - todas las mujeres de Israel
  - cada mujer de Israel
  lexicon: LSJ
  rationale: La construcción singular colectiva se conserva mejor con “toda mujer de Israel”, que refleja el griego sin forzar un plural explicativo.
- source_word: τοῦ ἰδεῖν αὐτήν
  english_pob_choice: to see her
  chosen_spanish: a verla
  alternatives_spanish:
  - para verla
  - a fin de verla
  lexicon: LSJ
  rationale: El infinitivo articular de propósito se expresa de forma natural en español con “a verla”, sin perder la finalidad del movimiento.
- source_word: εὐλόγησαν
  english_pob_choice: blessed
  chosen_spanish: la bendijeron
  alternatives_spanish:
  - la alabaron
  - hablaron bien de ella
  lexicon: LSJ
  rationale: “Bendijeron” preserva el verbo honorífico-religioso del griego y evita reducirlo a mera alabanza verbal.
- source_word: ἐποίησαν αὐτῇ χορὸν
  english_pob_choice: made a dance for her
  chosen_spanish: hicieron para ella una danza
  alternatives_spanish:
  - formaron una danza para ella
  - le hicieron un coro
  lexicon: LSJ
  rationale: “Danza” comunica bien χορός en este contexto festivo sin introducir la idea de “coro” musical, que sería menos precisa.
- source_word: ἐξ αὐτῶν
  english_pob_choice: from among themselves
  chosen_spanish: entre ellas mismas
  alternatives_spanish:
  - de entre ellas
  - de su propio grupo
  lexicon: LSJ
  rationale: La frase expresa que el grupo de danza estaba compuesto por las mismas mujeres. “Entre ellas mismas” reproduce esa idea reflexiva de manera idiomática.
- source_word: θύρσους
  english_pob_choice: thyrsi
  chosen_spanish: tirsos
  alternatives_spanish:
  - báculos festivos
  - varas festivas
  lexicon: LSJ
  rationale: “Tirsos” es el equivalente español habitual para θύρσοι y conserva la referencia cultural específica del objeto festivo ritual.
- source_word: ταῖς γυναιξὶν ταῖς μετʼ αὐτῆς
  english_pob_choice: the women with her
  chosen_spanish: a las mujeres que estaban con ella
  alternatives_spanish:
  - a las mujeres que iban con ella
  - a sus acompañantes mujeres
  lexicon: LSJ
  rationale: La frase señala a las mujeres acompañantes de Judith; la formulación en español mantiene la relación directa sin añadir matices ajenos.
theological_decisions:
- issue: El verbo εὐλόγησαν en un contexto celebrativo puede oírse como bendición honorífica o como alabanza.
  english_pob_reading: blessed her
  chosen_spanish_reading: la bendijeron
  alternative_spanish_readings:
  - la alabaron
  - hablaron bien de ella
  rationale: Se mantiene el valor de bendecir porque es el paralelo más cercano al griego y conserva la resonancia religiosa del acto comunitario.
  doctrine_reference: Uso bíblico de ευλογέω / bendecir en contextos de honor y reconocimiento.
translation_notes:
  revision_awareness: Se conservó la lectura del griego de Swete y el tratamiento del inglés POB para συνέδραμεν, πᾶσα γυνὴ Ἰσραήλ, εὐλόγησαν y θύρσους. No se aplicaron revisiones previas adicionales; se mantuvo la decisión cultural sobre θύρσοι y la nota sobre el singular colectivo.
  spanish_consistency_notes:
  - Se usó “Yahvé” solo cuando no aplica; este verso no contiene el tetragrámaton.
  - Se mantuvo “bendijeron” para εὐλόγησαν en vez de “alabaron”, por consistencia con el valor honorífico-religioso del verbo.
  - “Tirsos” conserva el término técnico con nota explicativa, en línea con la práctica POB de no diluir objetos culturales específicos.
