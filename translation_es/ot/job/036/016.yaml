translation:
  language: es
  text: Ciertamente[a], él te atrajo de la boca de la angustia[b] a un lugar espacioso, sin estrechez debajo de él[c], y lo dispuesto en tu mesa estaba lleno de abundancia[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y también», «Además» o «Aun». La partícula hebrea introduce y enfatiza la afirmación.'
    reason: lexical_alternative
  - marker: b
    text: 'Alternativamente: «de las fauces de la aflicción» o «de la boca de la estrechez». El hebreo combina la imagen de angustia con constricción, en contraste con el siguiente «lugar espacioso».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «un lugar espacioso, sin restricción debajo de él». La frase hebrea es difícil y describe un lugar sin constricción.'
    reason: lexical_alternative
  - marker: d
    text: 'Hebreo: «lleno de grasa»; es decir, lleno de abundancia rica o de comida abundante.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאַף
  english_pob_choice: Indeed
  chosen_spanish: ¡Sí,
  alternatives_spanish:
  - Además,
  - Ciertamente,
  - Y aun
  lexicon: HALOT
  rationale: La partícula intensiva/aditiva se expresa de manera natural con una afirmación enfática en español. 'Sí' conserva el impulso confirmatorio sin sobrecargar la línea.
- source_word: הֲסִיתְךָ
  english_pob_choice: he lured you
  chosen_spanish: te sacó
  alternatives_spanish:
  - te atrajo
  - te sedujo
  - te incitó
  lexicon: HALOT
  rationale: El verbo hebreo puede abarcar idea de atraer o sacar con impulso. En este contexto poético de salida de la angustia hacia amplitud, 'te sacó' comunica el movimiento resultante sin añadir una connotación moral negativa. Se deja la referencia implícita al sujeto, como en el hebreo.
- source_word: מִפִּי צָר
  english_pob_choice: out of the mouth of distress
  chosen_spanish: de la boca de la angustia
  alternatives_spanish:
  - de la boca de la aflicción
  - de las fauces de la angustia
  - de la boca de la opresión
  lexicon: HALOT
  rationale: Se conserva la imagen corporal de 'boca' y el sentido de צר como aflicción/estrechez. 'Angustia' es un equivalente natural en español y mantiene el contraste con 'lugar espacioso'.
- source_word: רַחַב
  english_pob_choice: a broad place
  chosen_spanish: un lugar espacioso
  alternatives_spanish:
  - un lugar ancho
  - un espacio amplio
  - un sitio espacioso
  lexicon: HALOT
  rationale: El sustantivo/adjetivo hebreo expresa amplitud espacial. 'Lugar espacioso' suena natural en español y conserva la metáfora de amplitud sin perder claridad.
- source_word: לֹא מוּצָק תַּחְתֶּיהָ
  english_pob_choice: with no constraint beneath it
  chosen_spanish: sin restricción debajo de él
  alternatives_spanish:
  - sin estrechez debajo de él
  - sin constricción bajo él
  - donde no hay opresión debajo de él
  lexicon: HALOT
  rationale: La frase es difícil y parece reforzar la idea de ausencia de estrechez o presión. 'Restricción' refleja la noción de limitación/compresión y permite una lectura clara en español, manteniendo la imagen espacial.
- source_word: וְנַחַת
  english_pob_choice: the setting of your table
  chosen_spanish: la disposición de tu mesa
  alternatives_spanish:
  - la puesta de tu mesa
  - el arreglo de tu mesa
  - lo preparado sobre tu mesa
  lexicon: HALOT
  rationale: El sustantivo es raro y en este contexto probablemente se refiere a lo dispuesto/establecido para la mesa. 'Disposición' conserva la idea de colocación/ordenamiento y se ajusta mejor al giro hebreo que una explicación más libre.
- source_word: שֻׁלְחָנְךָ
  english_pob_choice: your table
  chosen_spanish: tu mesa
  alternatives_spanish:
  - tu mesa
  - la mesa tuya
  lexicon: HALOT
  rationale: Correspondencia directa y transparente con el hebreo.
- source_word: מָלֵא דָשֶׁן
  english_pob_choice: was full of richness
  chosen_spanish: estaba llena de riqueza
  alternatives_spanish:
  - estaba llena de gordura
  - estaba llena de abundancia
  - estaba llena de grasura
  lexicon: HALOT
  rationale: דשן literalmente remite a gordura/rica abundancia. 'Riqueza' conserva el campo semántico de abundancia rica y suena más natural en español que 'gordura' en este contexto, aunque la relación con alimentos abundantes queda implícita.
theological_decisions:
- issue: Sujeto implícito de הֲסִיתְךָ
  english_pob_reading: Retain the Hebrew pronoun 'he' without explicitly supplying 'God' in the main text.
  chosen_spanish_reading: Conservar un sujeto implícito en la traducción principal, sin añadir 'Dios' en el cuerpo del versículo.
  alternative_spanish_readings:
  - Dios te sacó...
  - Él te sacó...
  rationale: El hebreo presenta un verbo en tercera persona singular sin un sustantivo expreso. El contexto apunta a Dios, pero añadirlo en la línea principal excede la forma del texto. La redacción española mantiene la ambigüedad controlada y respeta la sintaxis de la fuente.
  doctrine_reference: Translation philosophy §1, §3
- issue: Metáfora de estrechez versus amplitud
  english_pob_reading: Preserve the spatial metaphors ('mouth,' 'broad place') rather than flatten them into abstract explanation.
  chosen_spanish_reading: Conservar la imagen de la 'boca de la angustia' y del 'lugar espacioso'.
  alternative_spanish_readings:
  - te libró de la angustia y te dio libertad
  - te sacó del problema a una vida mejor
  rationale: La fuerza poética depende del contraste entre compresión y amplitud. La traducción española conserva ese paralelismo sin convertirlo en paráfrasis abstracta.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del inglés POB en la cláusula final, que prefiere 'the setting of your table' frente a una paráfrasis más interpretativa. En español se refleja con 'la disposición de tu mesa'.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' solo cuando el contexto exige nombrarlo explícitamente; aquí el sujeto permanece implícito conforme al hebreo y al audit trail inglés.
  - Se preservó la imaginería espacial ('boca', 'lugar espacioso', 'debajo de él') para no desactivar la tensión poética del versículo.
  - '''Riqueza'' se eligió como equivalente natural de דשן, evitando tanto el arcaísmo como la pérdida de la idea de abundancia rica.'
