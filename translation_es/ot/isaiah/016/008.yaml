translation:
  language: es
  text: Porque los campos de Hesbón languidecen, y también la vid de Sibmá. Los señores de las naciones han derribado sus vides escogidas[a]; llegaron hasta Jazer, vagaron por el desierto; sus sarmientos se extendieron[b] y cruzaron el mar[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus sarmientos» para «sus vides escogidas» (שְׂרוּקֶיהָ); el hebreo puede enfatizar el material de vid selecto o las ramas/brotes de la vid.
    reason: lexical_alternative
  - marker: b
    text: O «sus ramas se extendieron»; el hebreo detrás de «se extendieron» es difícil y puede entenderse de más de una manera.
    reason: lexical_alternative
  - marker: c
    text: «El mar» puede referirse específicamente al Mar Muerto en la geografía regional.
    reason: cultural_note
lexical_decisions:
- source_word: שַׁדְמוֹת
  english_pob_choice: fields
  chosen_spanish: campos
  alternatives_spanish:
  - campos cultivados
  - tierras de cultivo
  lexicon: HALOT
  rationale: El hebreo se refiere a tierra agrícola cultivada. «Campos» es natural en español y conserva el paralelo poético con la vid de Sibmá sin volver más específico de lo que el término exige.
- source_word: אֻמְלָל
  english_pob_choice: languish
  chosen_spanish: languidecen
  alternatives_spanish:
  - se marchitan
  - se debilitan
  lexicon: HALOT
  rationale: El verbo comunica una condición de debilidad, secamiento o languidez. «Languidecen» mantiene el tono poético y deja abierta la imagen vegetal sin fijarla solo en el sentido físico de marchitarse.
- source_word: גֶּפֶן שִׂבְמָה
  english_pob_choice: the vine of Sibmah
  chosen_spanish: la vid de Sibmá
  alternatives_spanish:
  - la parra de Sibmá
  - los viñedos de Sibmá
  lexicon: HALOT
  rationale: El singular hebreo funciona de modo poético y colectivo. «La vid de Sibmá» conserva mejor esa imagen que «viñedos», que la aplastaría al plural.
- source_word: בַּעֲלֵי גוֹיִם
  english_pob_choice: the lords of the nations
  chosen_spanish: los señores de las naciones
  alternatives_spanish:
  - los gobernantes de las naciones
  - los dueños de las naciones
  lexicon: HALOT
  rationale: בַּעֲלֵי expresa idea de dueños, amos o gobernantes. «Señores» conserva el registro elevado del poema y comunica bien la referencia a conquistadores extranjeros.
- source_word: הָלְמוּ
  english_pob_choice: have struck down
  chosen_spanish: han derribado
  alternatives_spanish:
  - han golpeado
  - han herido
  lexicon: HALOT
  rationale: En este contexto de devastación, el verbo de golpear se expresa bien como acción que derriba. «Han derribado» es idiomático en español y mantiene el sentido destructivo.
- source_word: שְׂרוּקֶיהָ
  english_pob_choice: its choice vines
  chosen_spanish: sus vides escogidas
  alternatives_spanish:
  - sus vides selectas
  - sus ramas escogidas
  - sus sarmientos escogidos
  lexicon: HALOT
  rationale: La forma apunta a material de vid de buena calidad o selecto. «Vides escogidas» conserva esa cualidad y evita reducirla de antemano a una sola parte de la planta.
- source_word: עַד יַעְזֵר נָגָעוּ
  english_pob_choice: they reached as far as Jazer
  chosen_spanish: llegaron hasta Jazer
  alternatives_spanish:
  - se extendieron hasta Jazer
  - alcanzaron Jazer
  lexicon: HALOT
  rationale: La imagen es de extensión geográfica de la vid; no de la agresión de las naciones. «Llegaron hasta Jazer» reproduce de forma natural esa extensión.
- source_word: תָּעוּ מִדְבָּר
  english_pob_choice: they wandered into the wilderness
  chosen_spanish: vagaron por el desierto
  alternatives_spanish:
  - se perdieron en el desierto
  - anduvieron por el desierto
  lexicon: HALOT
  rationale: El verbo significa vagar o extraviarse. En poesía de vides extendidas, «vagaron por el desierto» conserva la personificación sin endurecer la imagen.
- source_word: שְׁלֻחוֹתֶיהָ
  english_pob_choice: its shoots
  chosen_spanish: sus sarmientos
  alternatives_spanish:
  - sus brotes
  - sus renuevos
  - sus ramas
  lexicon: HALOT
  rationale: El sustantivo denota algo «enviado» hacia afuera, por eso puede referir a brotes o sarmientos. «Sarmientos» es una opción vitícola clara en español y funciona bien con la continuidad de la imagen de la vid.
- source_word: נִטְּשׁוּ
  english_pob_choice: spread out
  chosen_spanish: se extendieron
  alternatives_spanish:
  - se esparcieron
  - fueron extendidos
  lexicon: HALOT
  rationale: En este contexto poético, el verbo describe la expansión de los brotes. «Se extendieron» expresa el movimiento con naturalidad en español y deja intacta la imagen de crecimiento amplio.
- source_word: עָבְרוּ יָם
  english_pob_choice: crossed the sea
  chosen_spanish: cruzaron el mar
  alternatives_spanish:
  - pasaron el mar
  - cruzaron el mar de forma literal
  lexicon: HALOT
  rationale: La frase hebrea es directa. «Mar» conserva el término amplio del texto; la posible referencia concreta al Mar Muerto queda en nota, no en el cuerpo del versículo.
theological_decisions:
- issue: Posible referencia específica de "el mar"
  english_pob_reading: The sea may refer specifically to the Dead Sea in the regional geography.
  chosen_spanish_reading: «El mar» se mantiene general en el texto; la posible referencia al Mar Muerto queda como nota, no como aclaración en el cuerpo.
  alternative_spanish_readings:
  - «el Mar Muerto» en el texto principal
  - «el mar», con nota geográfica
  rationale: El hebreo dice simplemente «mar». Traducirlo como «Mar Muerto» haría explícita una identificación interpretativa que el texto no formula. Por eso se conserva la ambigüedad en el versículo y se documenta como posibilidad.
  doctrine_reference: Criterio de fidelidad textual y prudencia exegética
translation_notes:
  revision_awareness: 'La base inglesa POB ya había mantenido una solución poética y ambigua para el hebreo difícil, con notas para «choice vines», «spread out» y la posible referencia geográfica de «the sea». Esta versión española conserva esas mismas tensiones en lugar de resolverlas de manera excesiva: mantiene el paralelismo agrícola, el movimiento figurado de la vid y la referencia abierta a «el mar».'
  spanish_consistency_notes:
  - Se usa «Yahvé» en otros contextos del proyecto, pero este versículo no contiene el nombre divino.
  - Se conserva la imagen de la vid con léxico vitícola («vid», «sarmientos») para no diluir la metáfora.
  - Se mantiene el registro poético elevado sin arcaísmos innecesarios.
  - Las notas usan marcadores únicos y aparecen ancladas en el texto principal.
