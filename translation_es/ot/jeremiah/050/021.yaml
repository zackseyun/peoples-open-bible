base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/050/021.yaml
  text: Go up against the land of Merathaim[a], against it, and against the inhabitants of Pekod. Put them to the sword and devote them to destruction after them, declares Yahweh[c][b], and do all that I have commanded you.
  footnotes:
  - marker: a
    text: Merathaim is likely a symbolic name for Babylon, sounding like 'double rebellion' or possibly 'double bitterness.'
    reason: lexical_alternative
  - marker: b
    text: Pekod is a place or people name; it may also echo the Hebrew root meaning 'punishment' or 'visitation.'
    reason: lexical_alternative
  - marker: c
    text: Or 'put them under the ban'; the Hebrew refers to devoting something to destruction.
    reason: lexical_alternative
