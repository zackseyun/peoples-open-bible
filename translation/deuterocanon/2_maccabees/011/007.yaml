translation:
  text: But Maccabeus himself[a], taking up arms first, urged the others, risking danger along with him, to come to the aid of their brothers[b]; and together they also rushed out eagerly.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'sharing the danger with him.'
    reason: lexical_alternative
  - marker: b
    text: '''Brothers'' here likely refers to their fellow Jews or kinsmen.'
    reason: cultural_note
lexical_decisions:
- source_word: αὐτὸς δὲ πρῶτος ὁ Μακκαβαῖος
  chosen: But Maccabeus himself ... first
  alternatives:
  - But Judas Maccabeus himself first
  - Maccabeus himself was the first
  lexicon: LSJ
  rationale: αὐτός adds emphasis ('himself'), while πρῶτος marks his leading initiative. The Greek names him by epithet/title ὁ Μακκαβαῖος; 'Maccabeus' is a standard English transliteration. 'But' renders δέ as a mild narrative transition.
- source_word: ἀναλαβὼν τὰ ὅπλα
  chosen: taking up arms
  alternatives:
  - having taken up the weapons
  - taking up the weapons
  lexicon: LSJ
  rationale: The participle ἀναλαβών with τὰ ὅπλα idiomatically means arming oneself / taking up arms. 'Arms' is more natural English than the more literal 'weapons' here while preserving the military sense.
- source_word: προετρέψατο τοὺς ἄλλους
  chosen: urged the others
  alternatives:
  - encouraged the others
  - exhorted the others
  lexicon: LSJ
  rationale: προτρέπω commonly means urge on, encourage, exhort. 'Urged' best fits the immediate military context without sounding overly formal.
- source_word: ἅμα αὐτῷ διακινδυνεύοντας
  chosen: risking danger along with him
  alternatives:
  - sharing the danger with him
  - venturing into danger with him
  - taking the risk with him
  lexicon: LSJ
  rationale: The participle describes the others as joining him in peril. 'Risking danger' preserves the verbal force of διακινδυνεύω, and 'along with him' renders ἅμα αὐτῷ clearly.
- source_word: ἐπιβοηθεῖν τοῖς ἀδελφοῖς αὐτῶν
  chosen: to come to the aid of their brothers
  alternatives:
  - to help their brothers
  - to bring aid to their brothers
  lexicon: LSJ
  rationale: ἐπιβοηθέω has the sense of coming to someone's aid, especially in urgent need. 'Brothers' is retained per gender-accurate philosophy and fits the military-national context better than a neutral substitute.
- source_word: ὁμοῦ δὲ καὶ προθύμως ἐξώρμησαν
  chosen: and together they also rushed out eagerly
  alternatives:
  - and together they set out eagerly
  - and at once they all charged out eagerly
  lexicon: LSJ
  rationale: ὁμοῦ conveys together/in a body; προθύμως means eagerly/willingly; ἐξορμάω is to rush out or sally forth. 'Rushed out eagerly' captures the energetic movement without overinterpreting as a formal military 'charge'.
