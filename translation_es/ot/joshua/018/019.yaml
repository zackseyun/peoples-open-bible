    text: 'Hebreo: «lengua del Mar Salado», una expresión geográfica para una ensenada o saliente con forma de lengua.'
    reason: lexical_alternative
  - marker: b
    text: O «Mar Muerto»; el texto hebreo dice «Mar Salado».
    reason: alternative_reading
  revision_rationale: Se ajusta כֶּתֶף a 'ladera' para mayor naturalidad geográfica en español, se reubica correctamente la nota sobre 'Mar Muerto' al término 'Mar Salado', y se pule la clausula final a 'límite meridional' para mejor español sin alterar el sentido fuente.
