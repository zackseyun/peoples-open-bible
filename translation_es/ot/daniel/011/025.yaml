translation:
  language: es
  text: Él avivará su poder y su corazón contra el rey del Sur con un gran ejército, y el rey del Sur entrará en batalla con un ejército muy grande y poderoso, pero no prevalecerá[a], porque tramarán intrigas contra él[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no se mantendrá firme» / «no podrá sostenerse». El hebreo literalmente dice: «no estará en pie» o «no se mantendrá» (לֹא יַעֲמֹד).'
    reason: lexical_alternative
  - marker: b
    text: 'O: «maquinarán contra él». El hebreo usa una expresión cognada, literalmente «pensarán pensamientos contra él».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיָעֵר
  english_pob_choice: he will stir up
  chosen_spanish: despertará
  alternatives_spanish:
  - suscitará
  - agitará
  lexicon: HALOT
  rationale: El Hifil de עור expresa la idea de despertar, incitar o movilizar. «Despertará» comunica la activación de su energía y voluntad sin perder naturalidad en español.
- source_word: כֹּחוֹ
  english_pob_choice: his power
  chosen_spanish: su poder
  alternatives_spanish:
  - su fuerza
  - su capacidad
  lexicon: HALOT
  rationale: כֹּחַ puede referirse a fuerza o poder. «Poder» mantiene el alcance militar y operativo del término en este contexto.
- source_word: וּלְבָבוֹ
  english_pob_choice: and his heart
  chosen_spanish: y su corazón
  alternatives_spanish:
  - y su ánimo
  - y su mente
  lexicon: HALOT
  rationale: לֵב / לֵבָב designa el centro interior de decisión, resolución o valor. «Corazón» preserva la imagen hebrea y deja ver la disposición interna.
- source_word: עַל מֶלֶךְ הַנֶּגֶב
  english_pob_choice: against the king of the South
  chosen_spanish: contra el rey del Sur
  alternatives_spanish:
  - contra el rey del Negev
  - contra el rey meridional
  lexicon: HALOT
  rationale: En Daniel 11, נֶגֶב funciona como designación geopolítica. «Sur» es la forma más clara y contextual en español, equivalente al inglés POB.
- source_word: בְּחַיִל גָּדוֹל
  english_pob_choice: with a great army
  chosen_spanish: con un gran ejército
  alternatives_spanish:
  - con una gran hueste
  - con grandes fuerzas
  lexicon: HALOT
  rationale: חַיִל en contexto militar denota ejército o fuerzas armadas. «Ejército» es el equivalente español más directo y natural.
- source_word: יִתְגָּרֶה לַמִּלְחָמָה
  english_pob_choice: will engage in battle
  chosen_spanish: se empeñará en la guerra
  alternatives_spanish:
  - entrará en batalla
  - se lanzará a la guerra
  lexicon: HALOT
  rationale: El hitpael de גרה expresa implicarse o provocarse a sí mismo para el conflicto. «Se empeñará en la guerra» conserva la idea de involucrarse decididamente en el combate.
- source_word: בְּחַיִל גָּדוֹל וְעָצוּם עַד מְאֹד
  english_pob_choice: with a very great and mighty army
  chosen_spanish: con un ejército muy grande y poderoso
  alternatives_spanish:
  - con una hueste muy grande y muy fuerte
  - con un ejército enormemente poderoso
  lexicon: HALOT
  rationale: 'La expresión acumula tamaño e intensidad: גָּדוֹל + עָצוּם + עַד מְאֹד. «Muy grande y poderoso» refleja ambas cualidades sin redundancia excesiva en español.'
- source_word: וְלֹא יַעֲמֹד
  english_pob_choice: but he will not stand
  chosen_spanish: pero no permanecerá
  alternatives_spanish:
  - pero no resistirá
  - pero no se mantendrá en pie
  lexicon: HALOT
  rationale: Aunque literalmente dice «no estará de pie», en español «permanecerá» conserva el valor idiomático de subsistir o mantenerse firme. Se mantiene la tensión entre literalidad e inteligibilidad, como en el POB inglés.
- source_word: יַחְשְׁבוּ עָלָיו מַחֲשָׁבוֹת
  english_pob_choice: they will devise schemes against him
  chosen_spanish: contra él tramarán planes
  alternatives_spanish:
  - contra él tramarán maquinaciones
  - contra él idearán planes
  lexicon: HALOT
  rationale: La construcción cognada «pensarán pensamientos» tiene el sentido de planear hostilmente. «Tramarán planes» comunica la intriga sin borrar la repetición semítica subyacente.
translation_notes:
  revision_awareness: 'La versión sigue de cerca el texto hebreo de Daniel 11:25 y el audit trail inglés: conserva la secuencia de acciones, la intensificación del ejército y la lectura idiomática de «no permanecerá», manteniendo en español una naturalidad publicable sin borrar la literalidad subyacente.'
  spanish_consistency_notes:
  - Se usó «rey del Sur» para mantener la designación geopolítica estable de Daniel 11.
  - Se eligió «ejército» para חַיִל por claridad militar; la nota mantiene la alternativa «hueste» como posibilidad legítima.
  - La frase final conserva el paralelismo semítico de acciones hostiles, aunque en español se naturalizó como «tramarán planes».
