translation:
  language: es
  text: para abatir la arrogancia del dragón con deshonra[a][b][c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «abatir la soberbia del dragón con deshonra».'
    reason: lexical_alternative
  - marker: b
    text: El «dragón» probablemente alude en sentido figurado al gobernante o poder hostil del contexto, pero aquí se conserva la imagen griega en el texto principal.
