translation:
  language: es
  text: 'Yahvé dijo a Josué: «Levántate. ¿Por qué estás postrado[a] rostro en tierra[b]?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O simplemente: «¿Por qué estás rostro en tierra?». El hebreo incluye un «esto» enfático (לָמָּה זֶּה), que en español normalmente se suaviza para conservar naturalidad.'
    reason: lexical_alternative
  - marker: b
    text: Lit. «sobre tu rostro». Expresa la postura de postración con el rostro hacia el suelo.
    reason: lexical_note
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino propio del Tetragrama, siguiendo la política POB de no sustituirlo por un título. En español, “Yahvé” es la forma estable y reverente que mejor corresponde a “Yahweh” en el registro bíblico.
- source_word: וַיֹּאמֶר
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - habló
  lexicon: HALOT
  rationale: El verbo narrativo normal de אמר se expresa naturalmente como “dijo” en español, sin añadir matices no presentes en el hebreo.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - para
  lexicon: HALOT
  rationale: La preposición de dirección para introducir el destinatario se rinde con la preposición española simple “a”.
- source_word: יְהוֹשֻׁעַ
  english_pob_choice: Joshua
  chosen_spanish: Josué
  alternatives_spanish:
  - Yehoshúa
  lexicon: HALOT
  rationale: Se usa el nombre bíblico español convencional “Josué”, inteligible y estándar en lectura eclesial, sin perder la referencia al personaje.
- source_word: קֻם
  english_pob_choice: Get up
  chosen_spanish: Levántate
  alternatives_spanish:
  - Ponte de pie
  - Levantate
  lexicon: HALOT
  rationale: El imperativo de קום aquí funciona como una orden para salir de la postración. “Levántate” comunica con naturalidad esa acción en español.
- source_word: לָךְ
  english_pob_choice: —
  chosen_spanish: —
  alternatives_spanish:
  - para ti
  - por ti
  lexicon: HALOT
  rationale: El elemento pronominal con el imperativo es idiomático y no requiere traslado explícito en español; añadirlo oscurecería la fluidez sin aportar sentido claro.
- source_word: לָמָּה זֶּה
  english_pob_choice: Why are you falling
  chosen_spanish: ¿Por qué estás…?
  alternatives_spanish:
  - ¿Por qué es esto?
  - ¿Por qué entonces?
  lexicon: HALOT
  rationale: El hebreo incluye el énfasis de זֶּה (“esto”), pero el español más natural en este contexto es una pregunta directa. Se conserva el valor discursivo sin forzar una construcción poco idiomática.
- source_word: נֹפֵל
  english_pob_choice: are falling
  chosen_spanish: cayendo
  alternatives_spanish:
  - caes
  - estás postrado
  lexicon: HALOT
  rationale: El participio describe a Josué en un estado/acción visible. “Cayendo” mantiene la imagen progresiva de la postura de postración, aunque en español también puede entenderse el sentido de estar postrado.
- source_word: עַל פָּנֶיךָ
  english_pob_choice: on your face
  chosen_spanish: sobre tu rostro
  alternatives_spanish:
  - sobre tu cara
  - de bruces
  lexicon: HALOT
  rationale: Se conserva la imagen hebrea de prostración. “Rostro” eleva el registro y evita la crudeza de “cara”, manteniendo el valor corporal del modismo sin domesticarlo excesivamente.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: La POB en inglés opta por transliterar el Tetragrama. En español, “Yahvé” preserva el nombre personal del pacto y evita la sustitución tradicional por un título, en coherencia con la política doctrinal del proyecto.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Tratamiento del énfasis de לָמָּה זֶּה
  english_pob_reading: Why are you falling on your face?
  chosen_spanish_reading: ¿Por qué estás cayendo sobre tu rostro?
  alternative_spanish_readings:
  - ¿Por qué es esto que estás cayendo sobre tu rostro?
  - ¿Por qué entonces estás cayendo sobre tu rostro?
  rationale: El hebreo añade un refuerzo enfático con זֶּה. En español, la pregunta breve y directa transmite la reprensión sin introducir una estructura artificial. Se evita borrar la tensión retórica, pero tampoco se crea un giro poco natural.
  doctrine_reference: Principio POB de equivalencia óptima y preservación de énfasis discursivo
translation_notes:
  revision_awareness: 'La base inglesa revisó una lectura anterior más literal y luego simplificó a una pregunta más natural: “Why are you falling on your face?”. Esta versión española sigue esa línea de claridad, pero conserva el nombre divino como “Yahvé” y mantiene la imagen hebrea de postración sin sobreexplicar el énfasis de לָמָּה זֶּה.'
  spanish_consistency_notes:
  - Se mantuvo “Yahvé” para יְהוָה, conforme a la terminología POB en español.
  - Se eligió “Josué” como forma española estándar del nombre propio.
  - Se conservó la imagen corporal de postración con “sobre tu rostro”, en vez de reemplazarla por una paráfrasis interpretativa.
  - El discurso directo respeta el tono de reprensión breve del hebreo y de la versión inglesa revisada.
