base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/032/015.yaml
  text: 'For thus says Yahweh of hosts[a], the God of Israel: Houses and fields and vineyards will again be bought in this land.'
  footnotes:
  - marker: a
    text: Or, 'will again buy houses and fields and vineyards in this land.' The Hebrew verb is Niphal and may be taken less strictly as a middle or passive-like form, but 'will be bought' best preserves the form here.
