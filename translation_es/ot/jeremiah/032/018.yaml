translation:
  language: es
  text: mostrando amor leal[a] a millares, y retribuyendo la iniquidad de los padres en el regazo de sus hijos después de ellos—el gran Dios, el poderoso, Yahvé de los ejércitos[b], es su nombre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a miles de generaciones» a la luz de pasajes de pacto semejantes; el hebreo aquí dice simplemente «a miles».
    reason: lexical_alternative
  - marker: b
    text: O «Yahvé de las huestes».
    reason: lexical_alternative
lexical_decisions:
- source_word: עֹשֶׂה
  english_pob_choice: showing
  chosen_spanish: mostrando
  alternatives_spanish:
  - haciendo
  - obrando
  lexicon: HALOT
  rationale: El participio describe a Dios de manera continua; «mostrando» conserva ese valor descriptivo y suena natural en español con חֶסֶד.
- source_word: חֶסֶד
  english_pob_choice: steadfast love
  chosen_spanish: amor firme
  alternatives_spanish:
  - amor constante
  - misericordia fiel
  - bondad leal
  lexicon: HALOT
  rationale: «Amor firme» intenta conservar la fuerza relacional y pactal de חֶסֶד sin volverlo una glosa larga; evita reducirlo solo a «bondad» o solo a «misericordia».
- source_word: לַאֲלָפִים
  english_pob_choice: to thousands
  chosen_spanish: a millares
  alternatives_spanish:
  - a miles
  - a millares de generaciones
  lexicon: HALOT
  rationale: El hebreo dice simplemente «a miles / a millares»; se mantiene la expresión breve y no se introduce «generaciones» porque el texto aquí no lo dice explícitamente.
- source_word: וּמְשַׁלֵּם
  english_pob_choice: and repaying
  chosen_spanish: y pagando
  alternatives_spanish:
  - y retribuyendo
  - y recompensando
  lexicon: HALOT
  rationale: «Pagando» comunica el sentido de retribución del participio sin perder fluidez. En contexto judicial, mantiene la idea de devolver lo debido.
- source_word: עֲוֺן
  english_pob_choice: iniquity
  chosen_spanish: la iniquidad
  alternatives_spanish:
  - la culpa
  - el pecado
  lexicon: HALOT
  rationale: «Iniquidad» preserva el peso moral del sustantivo y deja abierta la relación entre culpa y consecuencia, como en el texto fuente.
- source_word: אָבוֹת
  english_pob_choice: fathers
  chosen_spanish: los padres
  alternatives_spanish:
  - los antepasados
  - los progenitores
  lexicon: HALOT
  rationale: Aunque el hebreo es masculino plural, en español «padres» reproduce el paralelismo natural con «hijos» y es la opción más transparente para lectores actuales.
- source_word: אֶל חֵיק
  english_pob_choice: into the lap
  chosen_spanish: en el regazo
  alternatives_spanish:
  - en el seno
  - en el pecho
  lexicon: HALOT
  rationale: «Regazo» conserva la imagen de algo puesto sobre el cuerpo o la esfera de pertenencia inmediata; es más natural que un calco como «en el lap».
- source_word: בְּנֵיהֶם אַחֲרֵיהֶם
  english_pob_choice: of their children after them
  chosen_spanish: de sus hijos después de ellos
  alternatives_spanish:
  - de sus hijos tras ellos
  - de sus descendientes después de ellos
  lexicon: HALOT
  rationale: Se conserva la relación generacional y la secuencia temporal explícita; «hijos» mantiene el paralelismo con «padres».
- source_word: הָאֵל
  english_pob_choice: God
  chosen_spanish: el Dios
  alternatives_spanish:
  - Dios
  - el Poderoso
  lexicon: HALOT
  rationale: Aquí funciona como título nominal dentro de una cadena de atributos; «el Dios» refleja mejor la estructura hebrea que una simple repetición de «Dios» aislada.
- source_word: הַגָּדוֹל
  english_pob_choice: great
  chosen_spanish: grande
  alternatives_spanish:
  - grandioso
  - majestuoso
  lexicon: HALOT
  rationale: «Grande» es la correspondencia directa y digna del adjetivo, sin añadir matices que el hebreo no exige.
- source_word: הַגִּבּוֹר
  english_pob_choice: mighty
  chosen_spanish: el Poderoso
  alternatives_spanish:
  - el Fuerte
  - el Valiente
  lexicon: HALOT
  rationale: «El Poderoso» recoge la idea de fuerza divina con un tono solemne en español; conserva el valor titular del hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - el SEÑOR
  lexicon: HALOT
  rationale: Se usa la forma terminada en vocal abierta habitual en este proyecto para el nombre divino, manteniendo la transliteración del Tetragrámaton.
- source_word: צְבָאוֹת
  english_pob_choice: of Armies
  chosen_spanish: de los Ejércitos
  alternatives_spanish:
  - de los ejércitos
  - de las huestes
  lexicon: HALOT
  rationale: «Ejércitos» comunica con claridad el título divino y preserva la fuerza militar/ soberana del término sin recurrir al arcaísmo de «huestes».
- source_word: שְׁמוֹ
  english_pob_choice: is his name
  chosen_spanish: es su nombre
  alternatives_spanish:
  - su nombre es
  - es el nombre de él
  lexicon: HALOT
  rationale: La cláusula nominal hebrea se vuelve naturalmente en español con «es su nombre», conservando el cierre solemne de autoidentificación.
theological_decisions:
- issue: Recompensa intergeneracional de la iniquidad
  english_pob_reading: Retain the text's statement that God repays the iniquity of fathers into the lap of their children after them, without softening or systematizing it.
  chosen_spanish_reading: Mantener que Dios paga la iniquidad de los padres en el regazo de sus hijos después de ellos, sin diluir el alcance del enunciado.
  alternative_spanish_readings:
  - Interpretarlo solo como consecuencias sociales del pecado de los padres
  - Suavizarlo para evitar la tensión con textos sobre responsabilidad individual
  rationale: La cláusula hebrea afirma una dimensión real de retribución intergeneracional. La traducción conserva esa tensión y no intenta armonizarla artificialmente con otros pasajes.
  doctrine_reference: 'Principio del proyecto: preservar la tensión teológica en vez de resolverla de antemano; cf. Ezequiel 18.'
- issue: Título divino צְבָאוֹת
  english_pob_reading: Translate as 'Yahweh of Armies' in the main text.
  chosen_spanish_reading: Traducirlo como «Yahvé de los Ejércitos» en el cuerpo principal.
  alternative_spanish_readings:
  - Yahvé de las huestes
  - Yahvé de los ejércitos
  rationale: «Ejércitos» es transparente para el lector moderno y conserva el carácter soberano y militar del título; se evita el arcaísmo de «huestes».
  doctrine_reference: Norma terminológica del proyecto para יְהוָה y צְבָאוֹת.
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente del texto fuente en lo esencial: no hubo cambios en la sustancia del versículo, y la traducción mantiene las decisiones léxicas y teológicas auditadas en el inglés POB.'
  spanish_consistency_notes:
  - 'Se mantuvo el paralelismo de participios: «mostrando... y pagando».'
  - Se preservó la imagen espacial de חֵיק con «regazo» para no perder el valor metafórico.
  - Se eligió «Yahvé» conforme a la norma del proyecto para el Tetragrámaton.
  - «Ejércitos» se usa como título divino transparente y no como glosa interpretativa.
  - Se conservó «padres / hijos» para reflejar la forma masculina plural del hebreo y el paralelismo del verso.
