translation:
  language: es
  text: Toma en tu mano piedras grandes y escóndelas en el mortero[a], en el pavimento de ladrillo[b] que está a la entrada de la casa de Faraón en Tafnes, ante los ojos de los hombres judíos[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'entiérralas' para 'escóndelas'; el verbo hebreo puede denotar ocultar algo al colocarlo en la tierra o dentro de una estructura.
    reason: lexical_alternative
  - marker: b
    text: O 'obra de ladrillo', 'terraza de ladrillo' o quizá 'horno de ladrillos'; el término hebreo es raro y su sentido arquitectónico preciso es incierto.
    reason: lexical_alternative
  - marker: c
    text: O 'hombres judeanos'. El adjetivo hebreo puede referirse a judíos/judeanos en sentido étnico o más específicamente a personas de Judá.
    reason: lexical_alternative
lexical_decisions:
- source_word: קַח
  english_pob_choice: Take
  chosen_spanish: Toma
  alternatives_spanish:
  - Toma para ti
  - Agarra
  lexicon: HALOT
  rationale: El imperativo de לקח pide una orden directa y natural en español. 'Toma' es breve, claro y suficientemente literal sin sonar artificial.
- source_word: בְּיָדְךָ
  english_pob_choice: in your hand
  chosen_spanish: en tu mano
  alternatives_spanish:
  - con tu mano
  - en tus manos
  lexicon: HALOT
  rationale: El singular hebreo se refleja con 'mano' en singular. En español, 'en tu mano' conserva la idea de portar físicamente las piedras.
- source_word: אֲבָנִים גְּדֹלוֹת
  english_pob_choice: large stones
  chosen_spanish: piedras grandes
  alternatives_spanish:
  - piedras enormes
  - grandes piedras
  lexicon: HALOT
  rationale: '''Piedras grandes'' expresa de manera natural el tamaño sin añadir matiz retórico innecesario.'
- source_word: וּטְמַנְתָּם
  english_pob_choice: hide them
  chosen_spanish: escóndelas
  alternatives_spanish:
  - entiérralas
  - ocúltalas
  lexicon: HALOT
  rationale: טמן puede implicar esconder mediante colocación en tierra o en una estructura. 'Escóndelas' preserva el sentido amplio que el inglés auditó como 'hide them'; 'entiérralas' sería más específico de lo que exige el verbo.
- source_word: בַּמֶּלֶט
  english_pob_choice: in the mortar
  chosen_spanish: en el mortero
  alternatives_spanish:
  - en el barro
  - en la argamasa
  lexicon: HALOT
  rationale: '''Mortero'' es la opción más probable en este contexto constructivo y mantiene la referencia a un material de obra sin modernizarla excesivamente.'
- source_word: בַּמַּלְבֵּן
  english_pob_choice: in the brick pavement
  chosen_spanish: en el pavimento de ladrillo
  alternatives_spanish:
  - en el ladrillado
  - en la obra de ladrillo
  - en la terraza de ladrillo
  lexicon: HALOT
  rationale: El término es raro y su sentido arquitectónico es incierto. Se mantiene la opción de una superficie o estructura de ladrillo, y 'pavimento de ladrillo' conserva la decisión del inglés sin comprometerse con una reconstrucción más específica.
- source_word: אֲשֶׁר בְּפֶתַח בֵּית פַּרְעֹה
  english_pob_choice: that is at the entrance of Pharaoh’s house
  chosen_spanish: que está a la entrada de la casa de Faraón
  alternatives_spanish:
  - que está en la puerta del palacio de Faraón
  - que está en el umbral de la casa de Faraón
  lexicon: HALOT
  rationale: '''Entrada'' reproduce פתח de forma natural, y ''casa de Faraón'' mantiene la literalidad de בֵּית פַּרְעֹה sin imponer ''palacio''.'
- source_word: בְּתַחְפַּנְחֵס
  english_pob_choice: in Tahpanhes
  chosen_spanish: en Tafnes
  alternatives_spanish:
  - en Tahpanhes
  lexicon: HALOT
  rationale: Se prefiere la forma castellana tradicional 'Tafnes', común en español bíblico y fácilmente reconocible, aunque la transliteración más cercana al hebreo sería 'Tahpanhes'.
- source_word: לְעֵינֵי
  english_pob_choice: before the eyes of
  chosen_spanish: a los ojos de
  alternatives_spanish:
  - en presencia de
  - delante de
  lexicon: HALOT
  rationale: La expresión idiomática hebrea enfatiza visibilidad pública. 'A los ojos de' conserva esa vividez mejor que una simple preposición espacial.
- source_word: אֲנָשִׁים יְהוּדִים
  english_pob_choice: the Jewish men
  chosen_spanish: los hombres judíos
  alternatives_spanish:
  - los hombres de Judá
  - los hombres judeanos
  lexicon: HALOT
  rationale: La combinación mantiene explícito el sustantivo masculino plural y el adjetivo de pertenencia. 'Judíos' es claro en español moderno y puede abarcar la referencia étnica/histórica del grupo.
translation_notes:
  revision_awareness: La traducción sigue de cerca el texto hebreo y el audit trail en inglés. No se introdujeron revisiones posteriores ni cambios de sentido; se mantuvo la tensión lexical en טמן y en el término arquitectónico raro מַלְבֵּן, además de la ambigüedad de יְהוּדִים.
  spanish_consistency_notes:
  - Se usa 'Yahvé' en este proyecto cuando aparece el nombre divino, pero aquí el versículo nombra a Faraón y no requiere esa decisión.
  - Se mantuvo un registro sobrio y literal, evitando 'señor' o 'rey' donde el hebreo no los usa.
  - Se conservó el matiz visible de 'a los ojos de' para לְעֵינֵי.
  - Se eligió una forma castellana reconocible de topónimo ('Tafnes') sin perder la correspondencia con el hebreo.
