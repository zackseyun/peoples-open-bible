revisions:
- from: 'Entonces el rey dijo a los corredores[a], los que estaban alrededor de él: «Giren y maten a los sacerdotes de Yahvé, porque también su mano está con David[b], y porque sabían que él estaba huyendo y no me lo dieron a conocer». Pero los siervos del rey no quisieron extender su mano para herir a los sacerdotes de Yahvé.'
  to: 'Entonces el rey dijo a los corredores que estaban alrededor de él: «Giren y maten a los sacerdotes de Yahvé, porque también su mano está con David[a], y porque sabían que él estaba huyendo y no me lo dieron a conocer[b]». Pero los siervos del rey no quisieron extender la mano para atacar a los sacerdotes de Yahvé.'
  rationale: La revisión corrige el aparato crítico para que las notas coincidan con las decisiones léxicas documentadas en el audit trail inglés, añade la nota faltante sobre 'descubrir el oído', y suaviza la sintaxis inicial para un español más natural. También ajusta 'para herir' a 'para atacar' para reflejar mejor el valor violento de פגע en este contexto sin sobreinterpretarlo.
