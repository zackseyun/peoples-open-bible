translation:
  language: es
  text: Sean avergonzados y lleguen a su fin[a] los que son hostiles a mi vida[b]; vístanse de oprobio y vergüenza los que buscan mi mal.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sean consumidos» o «perezcan» para «lleguen a su fin».
    reason: lexical_alternative
  - marker: b
    text: O «mi alma»; aquí el hebreo suele referirse a la vida o al yo de la persona, no específicamente al alma inmaterial.
    reason: lexical_alternative
lexical_decisions:
- source_word: יֵבֹשׁוּ
  english_pob_choice: be put to shame
  chosen_spanish: sean avergonzados
  alternatives_spanish:
  - se avergüencen
  - sean puestos en vergüenza
  - queden avergonzados
  lexicon: HALOT
  rationale: El hebreo expresa un deseo/imprecación en forma verbal; «sean avergonzados» conserva el valor pasivo/resultativo y suena natural en español bíblico actual.
- source_word: יִכְלוּ
  english_pob_choice: come to an end
  chosen_spanish: perezcan
  alternatives_spanish:
  - sean consumidos
  - lleguen a su fin
  - se acaben
  lexicon: HALOT
  rationale: La POB inglesa retiene la amplitud de כלה; en español «perezcan» mantiene la fuerza de ruina/terminación en el paralelismo, sin volverlo meramente descriptivo.
- source_word: שֹׂטְנֵי נַפְשִׁי
  english_pob_choice: those who are hostile to my life
  chosen_spanish: los que son hostiles a mi vida
  alternatives_spanish:
  - mis adversarios
  - los que se oponen a mí
  - los que hostigan mi vida
  lexicon: HALOT
  rationale: «Hostiles» reproduce el valor adversarial de שׂטן; «mi vida» sigue la decisión auditada de entender נֶפֶשׁ aquí como vida/yo, no como «alma» en sentido inmaterial.
- source_word: יַעֲטוּ
  english_pob_choice: be clothed with
  chosen_spanish: vístanse de
  alternatives_spanish:
  - cúbranse de
  - envuélvanse en
  - se cubran de
  lexicon: HALOT
  rationale: La metáfora de vestirse se conserva de forma idiomática en español y funciona bien con los sustantivos abstractos que siguen.
- source_word: חֶרְפָּה
  english_pob_choice: reproach
  chosen_spanish: oprobio
  alternatives_spanish:
  - reproche
  - afrenta
  - escarnio
  lexicon: HALOT
  rationale: «Oprobio» preserva mejor la vergüenza pública y social que la mera idea de reproche personal.
- source_word: וּכְלִמָּה
  english_pob_choice: and disgrace
  chosen_spanish: y vergüenza
  alternatives_spanish:
  - y humillación
  - y deshonra
  - y oprobio
  lexicon: HALOT
  rationale: Se distingue de חֶרְפָּה para reflejar el intensificador semántico del paralelismo y evitar una repetición innecesaria en español.
- source_word: מְבַקְשֵׁי רָעָתִי
  english_pob_choice: those who seek my harm
  chosen_spanish: los que buscan mi mal
  alternatives_spanish:
  - los que buscan mi daño
  - los que procuran mi maldad
  - los que buscan hacerme daño
  lexicon: HALOT
  rationale: «Mi mal» es una forma breve y bíblicamente natural en español para expresar la intención hostil de רָעָה, manteniendo el paralelismo con el miembro anterior.
theological_decisions:
- issue: Fuerza imprecatoria de los imperfectos
  english_pob_reading: Render the verbs as a prayer-wish with 'Let those...,' not as simple future prediction.
  chosen_spanish_reading: 'Usar una forma desiderativa/jussiva en español: «Sean avergonzados y perezcan…; vístanse…»'
  alternative_spanish_readings:
  - Serán avergonzados y perecerán…
  - Que sean avergonzados y perezcan…
  rationale: El contexto poético es una súplica imprecatoria, no una mera predicción. El subjuntivo exhortativo en español comunica mejor esa orientación hacia Dios y conserva la tensión del texto fuente.
  doctrine_reference: 'Poética bíblica: jussivo/imprecatorio sin suavizar el tono del salmo.'
translation_notes:
  revision_awareness: 'El borrador sigue el pasaje hebreo y coincide sustancialmente con la auditoría inglesa: mantiene el valor imprecatorio, distingue los dos términos de vergüenza y conserva נֶפֶשׁ como «vida» en este contexto. No se detectaron revisiones posteriores que alteren la lectura base.'
  spanish_consistency_notes:
  - Se usa «Yahvé» en esta tradición cuando corresponda, pero este versículo no contiene el nombre divino.
  - «Hostiles» y «los que buscan mi mal» mantienen la simetría de dos grupos distintos.
  - «Oprobio»/«vergüenza» evita colapsar חֶרְפָּה y כְלִמָּה en un solo término.
