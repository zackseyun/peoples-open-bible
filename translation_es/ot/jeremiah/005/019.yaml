translation:
  language: es
  text: 'Y cuando digan[a]: «¿Por qué Yahvé nuestro Dios nos ha hecho todas estas cosas?», entonces les dirás: «Así como ustedes me abandonaron y sirvieron a dioses extranjeros en su tierra, así servirán a extranjeros en una tierra que no es de ustedes».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «servirán a forasteros» / «servirán a extraños»; el hebreo זָרִים aquí designa personas extranjeras, en contraste con «dioses extranjeros» antes en el versículo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה כִּי
  english_pob_choice: And when
  chosen_spanish: Y cuando
  alternatives_spanish:
  - Y sucederá que cuando
  - Y será que cuando
  lexicon: HALOT
  rationale: La fórmula introduce una contingencia futura; «Y cuando» conserva la relación temporal sin volver la frase pesada en español.
- source_word: תַּחַת מֶה
  english_pob_choice: Why
  chosen_spanish: ¿Por qué?
  alternatives_spanish:
  - ¿Por causa de qué?
  - ¿Con qué motivo?
  lexicon: HALOT
  rationale: La expresión es idiomática y pide causa; en español «¿Por qué?» es la equivalencia natural y clara.
- source_word: עָשָׂה ... אֶת כָּל אֵלֶּה
  english_pob_choice: done all these things
  chosen_spanish: ha hecho ... todas estas cosas
  alternatives_spanish:
  - ha hecho ... todo esto
  - ha realizado ... todas estas cosas
  lexicon: HALOT
  rationale: «Todas estas cosas» preserva el plural demostrativo y la referencia concreta a los actos de juicio mencionados en el contexto.
- source_word: יְהֹוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el nombre divino: «Yahvé» en el texto principal, evitando el sustituto «SEÑOR».'
- source_word: אֱלֹהֵינוּ
  english_pob_choice: our God
  chosen_spanish: nuestro Dios
  alternatives_spanish:
  - Dios nuestro
  - nuestro Dios y Dios
  lexicon: HALOT
  rationale: Refleja de forma directa la relación de pacto implícita en el poseído plural.
- source_word: וְאָמַרְתָּ אֲלֵיהֶם
  english_pob_choice: then you shall say to them
  chosen_spanish: entonces les dirás
  alternatives_spanish:
  - y les dirás
  - luego les dirás
  lexicon: HALOT
  rationale: «Entonces» mantiene la secuencia del mandato profético en un español fluido.
- source_word: כַּאֲשֶׁר
  english_pob_choice: Just as
  chosen_spanish: Así como
  alternatives_spanish:
  - Tal como
  - Del mismo modo que
  lexicon: HALOT
  rationale: La comparación correlativa con כֵּן queda bien expresada por «Así como ... así ...».
- source_word: עֲזַבְתֶּם אוֹתִי
  english_pob_choice: you have forsaken me
  chosen_spanish: me abandonaron
  alternatives_spanish:
  - me dejaron
  - me desecharon
  lexicon: HALOT
  rationale: «Abandonar» comunica bien la ruptura relacional y del pacto; «me abandonaron» conserva el tono profético sin sonar arcaico.
- source_word: וַתַּעַבְדוּ
  english_pob_choice: served
  chosen_spanish: sirvieron
  alternatives_spanish:
  - adoraron
  - se hicieron esclavos de
  lexicon: HALOT
  rationale: En este contexto el verbo admite el sentido de servicio religioso; «sirvieron» permite mantener el paralelismo con el servicio futuro a extranjeros.
- source_word: אֱלֹהֵי נֵכָר
  english_pob_choice: foreign gods
  chosen_spanish: dioses extranjeros
  alternatives_spanish:
  - dioses extraños
  - dioses de otros pueblos
  lexicon: HALOT
  rationale: «Extranjeros» expresa el valor de lo ajeno/foráneo y evita la ambigüedad negativa que podría tener «extraños».
- source_word: בְּאַרְצְכֶם
  english_pob_choice: in your land
  chosen_spanish: en su tierra
  alternatives_spanish:
  - en su país
  - en su propia tierra
  lexicon: HALOT
  rationale: El contexto profético se dirige a los oyentes como grupo; «su tierra» suena natural en español y conserva la referencia territorial del pacto.
- source_word: כֵּן
  english_pob_choice: so
  chosen_spanish: así
  alternatives_spanish:
  - de igual modo
  - por eso
  lexicon: HALOT
  rationale: Cierra la correlación comparativa iniciada por «Así como». «Así» mantiene la simetría retórica.
- source_word: תַּעַבְדוּ זָרִים
  english_pob_choice: you shall serve foreigners
  chosen_spanish: servirán a extranjeros
  alternatives_spanish:
  - servirán a forasteros
  - servirán a personas extranjeras
  lexicon: HALOT
  rationale: 'Se conserva la distinción hecha en la nota inglesa: aquí no son «dioses» sino personas extranjeras; «extranjeros» lo expresa con claridad.'
- source_word: בְּאֶרֶץ לֹא לָכֶם
  english_pob_choice: in a land not yours
  chosen_spanish: en una tierra que no es de ustedes
  alternatives_spanish:
  - en una tierra que no les pertenece
  - en tierra ajena
  lexicon: HALOT
  rationale: La frase mantiene el contraste posesivo con «su tierra» y evita suavizar el exilio implícito.
theological_decisions:
- issue: Nombre divino יְהֹוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  - SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton directamente; el proyecto español pide «Yahvé» como forma principal, preservando el nombre del pacto sin ocultarlo tras un título.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Valor de עָבַד con objetos divinos y humanos
  english_pob_reading: served
  chosen_spanish_reading: sirvieron
  alternative_spanish_readings:
  - adoraron
  - fueron esclavos de
  rationale: El contexto enlaza el servicio a dioses extranjeros con el servicio forzado a extranjeros. «Sirvieron» mantiene la amplitud semántica y la simetría del verso sin decidir prematuramente entre culto y servidumbre física.
  doctrine_reference: HALOT; contexto literario de Jeremías 5:19
- issue: זָרִים / נֵכָר como contraste semántico
  english_pob_reading: foreigners / foreign gods
  chosen_spanish_reading: dioses extranjeros / extranjeros
  alternative_spanish_readings:
  - dioses extraños / extraños
  - dioses de otros pueblos / forasteros
  rationale: 'Se conserva la tensión documental: primero se trata de deidades ajenas, luego de personas extranjeras. La distinción ayuda a no nivelar los dos usos hebreos distintos.'
  doctrine_reference: Nota léxica del inglés POB para זָרִים
translation_notes:
  revision_awareness: Se siguió el pasaje de revisión más reciente sin cambios sustanciales; la redacción española incorpora el criterio auditado para el nombre divino y conserva la distinción léxica entre «dioses extranjeros» y «extranjeros».
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera uniforme para יְהוָה, conforme al criterio del proyecto.
  - Se mantuvo «dioses extranjeros» para אֱלֹהֵי נֵכָר y «extranjeros» para זָרִים, respetando la diferencia semántica documentada.
  - Se prefirió un español natural y digno, sin perder el paralelismo condicional «Así como ... así ...».
