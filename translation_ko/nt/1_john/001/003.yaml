source:
  edition: SBLGNT
  text: ὃ ἑωράκαμεν καὶ ἀκηκόαμεν ἀπαγγέλλομεν ⸀καὶ ὑμῖν, ἵνα καὶ ὑμεῖς κοινωνίαν ἔχητε μεθ’ ἡμῶν· καὶ ἡ κοινωνία δὲ ἡ ἡμετέρα μετὰ τοῦ πατρὸς καὶ μετὰ τοῦ υἱοῦ αὐτοῦ Ἰησοῦ Χριστοῦ·
base_translation:
  language: en
  yaml_path: translation/nt/1_john/001/003.yaml
  text: What we have seen and heard we also proclaim to you[a], so that you too may have fellowship with us; and indeed our fellowship is with the Father and with his Son[b], Jesus Messiah.
  footnotes:
  - marker: a
    text: Or 'Jesus Christ.' The Greek title Χριστός can be rendered 'Christ' or translated 'Messiah'; here it is rendered 'Messiah' to preserve its meaning as a title.
    reason: alternative_reading
  - marker: b
    text: '''Fellowship'' may also be rendered ''communion,'' ''sharing,'' or ''participation,'' emphasizing shared life and relationship.'
    reason: lexical_alternative
translation:
  language: ko
  text: 우리가 보고 들은 것을 여러분에게도 선포하는 것은 여러분도 우리와 교제를 누리게 하려 함입니다. 그리고 진정 우리의 교제는 아버지와 그분의 아들 예수 메시아[a]와 함께 누리는 교제입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「예수 그리스도」. Χριστός를 칭호로 옮기는 본 번역의 원칙에 따라 「메시아」로 번역한다.
    reason: lexical_alternative
lexical_decisions:
- source_word: κοινωνίαν
  english_pob_choice: fellowship
  chosen_korean: 교제
  alternatives_korean:
