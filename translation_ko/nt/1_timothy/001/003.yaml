id: 1TI.1.3
reference: 1 Timothy 1:3
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Καθὼς παρεκάλεσά σε προσμεῖναι ἐν Ἐφέσῳ, πορευόμενος εἰς Μακεδονίαν, ἵνα παραγγείλῃς τισὶν μὴ ἑτεροδιδασκαλεῖν
base_translation:
  language: en
  yaml_path: translation/nt/1_timothy/001/003.yaml
  text: Just as I urged you to remain in Ephesus when I was going into Macedonia[a], so that you might instruct certain people not to teach different doctrine,
  footnotes:
  - marker: a
    text: Or 'command certain people not to teach other doctrine.'
    reason: lexical_alternative
translation:
  language: ko
  text: 내가 마케도니아로 가면서 어떤 사람들이 다른 가르침을 전하지 못하도록 그대에게 명하여 에베소에 머물러 있게 한 그대로—[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「어떤 사람들에게 다른 교훈을 가르치지 말라고 명령하도록」. 헬라어 παραγγέλλω는 권위적 명령의 어감을 지닌다.
    reason: lexical_alternative
lexical_decisions:
- source_word: Καθὼς
  english_pob_choice: Just as
  chosen_korean: 그대로
  alternatives_korean:
  - 처럼
  - 같이
  lexicon: BDAG
  rationale: 앞선 권면을 재상기시키는 비교·재진술 부사. 한국어로는 문장 끝에 「~한 그대로」로 옮겨 연결의 미완결 어감을 살린다(3-4절은 본래 미완성 문장).
- source_word: παρεκάλεσά
  english_pob_choice: urged
  chosen_korean: 명하여 ~ 있게 한
  alternatives_korean:
  - 권하여
  - 간곡히 부탁하여
  lexicon: BDAG
  rationale: παρακαλέω는 권면·간청에서 사도적 명령까지 폭이 넓다. 본문은 사도가 동역자에게 사역 위치를 지정하는 문맥이므로 「명하여」 정도의 무게가 적절하다. 영어 POB의 「urged」를 따라 강한 권면의 무게를 살린다.
- source_word: προσμεῖναι ἐν Ἐφέσῳ
  english_pob_choice: to remain in Ephesus
  chosen_korean: 에베소에 머물러 있게
  alternatives_korean:
  - 에베소에 남아 있도록
  lexicon: BDAG
  rationale: 부정사를 한국어 종속절로 자연스럽게 옮긴다. 지명은 한국 교회 정립 표기 「에베소」 사용.
- source_word: πορευόμενος εἰς Μακεδονίαν
  english_pob_choice: when I was going into Macedonia
  chosen_korean: 마케도니아로 가면서
  alternatives_korean:
  - 마케도니아로 가는 길에
  - 내가 마케도니아로 떠날 때
  lexicon: BDAG
  rationale: 분사 구문을 한국어 부사절로 옮긴다. 외래어 표기법 「마케도니아」를 사용한다(전통 표기 「마게도냐」 대신 현대 표기).
- source_word: παραγγείλῃς
  english_pob_choice: you might instruct
  chosen_korean: 명하여 ~ 못하도록
  alternatives_korean:
  - 지시하여 ~ 못하도록
  - 단단히 일러서
  lexicon: BDAG
  rationale: παραγγέλλω는 권위적 명령의 어감이 강하다. 영어 POB는 가독성을 위해 「instruct」를 선택했으나, 본문 문맥(거짓 교사 교정)에서는 한국어로 「명하여」가 무게를 잘 살린다.
- source_word: τισὶν
  english_pob_choice: certain people
  chosen_korean: 어떤 사람들
  alternatives_korean:
  - 어떤 자들
  lexicon: BDAG
  rationale: 특정한 그러나 익명의 대상을 가리키는 부정대명사를 자연스럽게 「어떤 사람들」로 옮긴다.
- source_word: ἑτεροδιδασκαλεῖν
  english_pob_choice: to teach different doctrine
  chosen_korean: 다른 가르침을 전하다
  alternatives_korean:
  - 다른 교훈을 가르치다
  - 거짓 교훈을 가르치다
  lexicon: BDAG
  rationale: 합성어의 본의(「다르게 가르치다」)를 살리되, 평가어 「거짓」을 본문에 미리 부과하지 않는다. 「가르침」/「교훈」 모두 가능; 본 절은 διδασκαλία(가르침/교훈) 용례 분포를 위해 「가르침」을 택한다.
