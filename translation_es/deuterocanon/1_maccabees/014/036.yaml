translation:
  language: es
  text: Y en sus días prosperó en sus manos para quitar a las naciones de su tierra, y a los de la ciudad de David en Jerusalén, que se habían hecho para sí una ciudadela[a], desde la cual salían y contaminaban el área alrededor del santuario, y causaban gran daño a su pureza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la Acra», la ciudadela fortificada de Jerusalén.
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐοδώθη
  english_pob_choice: it prospered
  chosen_spanish: prosperó
  alternatives_spanish:
  - tuvo éxito
  - le fue bien
  lexicon: LSJ
  rationale: En español, «prosperó» conserva la idea de éxito efectivo sin forzar un sujeto personal donde el griego usa una forma impersonal/pasiva con valor de resultado.
- source_word: ἐν ταῖς χερσὶν αὐτοῦ
  english_pob_choice: in his hands
  chosen_spanish: en sus manos
  alternatives_spanish:
  - bajo su control
  - por medio de él
  lexicon: LSJ
  rationale: La imagen de agencia se mantiene con la expresión literal «en sus manos», que es natural en español y auditable respecto del giro griego.
- source_word: τοῦ ἐξαρθῆναι
  english_pob_choice: to remove
  chosen_spanish: para quitar
  alternatives_spanish:
  - para expulsar
  - para arrancar
  lexicon: LSJ
  rationale: «Quitar» permite abarcar tanto la expulsión como la remoción sin añadir violencia o especificidad que el contexto inmediato no exige.
- source_word: τὰ ἔθνη
  english_pob_choice: the nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - los gentiles
  - las naciones extranjeras
  lexicon: LSJ
  rationale: Se conserva el sentido básico de «naciones», más transparente que «gentiles» y más cercano al valor léxico del griego.
- source_word: χώρα
  english_pob_choice: land
  chosen_spanish: tierra
  alternatives_spanish:
  - país
  - territorio
  lexicon: LSJ
  rationale: «Tierra» es la equivalencia más natural y amplia en español para el territorio del que son removidas las naciones.
- source_word: ἄκραν
  english_pob_choice: a citadel
  chosen_spanish: una acrópolis
  alternatives_spanish:
  - una ciudadela
  - una fortaleza
  lexicon: LSJ
  rationale: Para el contexto macabeo, el término puede aludir a la conocida Acra de Jerusalén. «Acrópolis» conserva el carácter de fortificación elevada y permite anclar la nota alternativa al nombre histórico sin imponerlo en el texto principal.
- source_word: ἐμίανον
  english_pob_choice: defile
  chosen_spanish: contaminaban
  alternatives_spanish:
  - profanaban
  - ensuciaban ritualmente
  lexicon: LSJ
  rationale: En el entorno del santuario, el verbo apunta a contaminación ritual; «contaminaban» comunica esa carga cultual en español sin perder claridad.
- source_word: κύκλῳ τῶν ἁγίων
  english_pob_choice: the area around the sanctuary
  chosen_spanish: el área alrededor del santuario
  alternatives_spanish:
  - el entorno de las cosas santas
  - el alrededor de lo santo
  lexicon: LSJ
  rationale: Se conserva el marco cultual del pasaje. «Santuario» traduce bien el referente sagrado y «área alrededor» expresa el valor locativo de manera comprensible.
- source_word: πληγὴν μεγάλην
  english_pob_choice: great damage
  chosen_spanish: gran daño
  alternatives_spanish:
  - un gran golpe
  - una gran herida
  lexicon: LSJ
  rationale: La expresión es metafórica; «gran daño» transmite el efecto serio sobre la pureza sin introducir una metáfora corporal que en español podría sonar excesiva.
- source_word: ἁγνείᾳ
  english_pob_choice: its purity
  chosen_spanish: su pureza
  alternatives_spanish:
  - su limpieza ritual
  - su pureza ritual
  lexicon: LSJ
  rationale: «Pureza» conserva el campo semántico de ἁγνεία. El posesivo se deja abierto en español, como en el griego, para referir la pureza del ámbito sagrado implicado.
theological_decisions:
- issue: Lenguaje cultual de contaminación y pureza
  english_pob_reading: Render defilement and purity language in explicitly cultic terms ('defile,' 'sanctuary,' 'purity').
  chosen_spanish_reading: Mantener el registro cultual con «contaminaban», «santuario» y «pureza».
  alternative_spanish_readings:
  - usar lenguaje más general como «corrompían» y «lugar sagrado»
  - suavizar «pureza» a «estado sagrado»
  rationale: El griego presenta una contaminación ritual vinculada al espacio santo. El español debe conservar esa teología del templo y no diluirla en lenguaje moral genérico.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: La redacción sigue el texto griego y la línea final revisada del POB en inglés, especialmente al omitir cualquier adición no apoyada por el griego. Se conservó la estructura de éxito/agencia («prosperó en sus manos») y la secuencia cultual de contaminación y pureza, con ajuste natural de español.
  spanish_consistency_notes:
  - Se usa «Yahvé» cuando el texto lo requiera en otros registros del proyecto; aquí no aparece el nombre divino.
  - «Santuario» y «pureza» se mantienen como términos cultuales coherentes con el pasaje y con el audit trail inglés.
  - «Acrópolis» se eligió en el texto principal para reflejar la fortificación; la nota conserva la opción histórica «la Acra» sin imponerla como traducción principal.
