translation:
  language: es
  text: 'Entonces el rey escribió en respuesta a Ratimo, el registrador[a] de las denuncias, y a Beeltetmo, y a Samelio, el escriba, y al resto de sus asociados, que habitaban en Samaria, Siria y Fenicia[b], lo siguiente:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el secretario de las denuncias» para «el registrador de las denuncias»; la expresión griega es administrativa e idiomática.
    reason: lexical_alternative
  - marker: b
    text: El griego nombra a los destinatarios como residentes en Samaria, Siria y Fenicia; la tradición paralela en Esdras presenta nombres y formulación distintos. Esta traducción sigue el testimonio griego de 1 Esdras y usa el paralelo solo como control.
    reason: textual_variant
lexical_decisions:
- source_word: ἀντέγραψεν
  english_pob_choice: wrote back
  chosen_spanish: escribió en respuesta
  alternatives_spanish:
  - respondió por escrito
  - escribió de vuelta
  lexicon: BDAG
  rationale: El verbo compuesto expresa una respuesta escrita; «escribió en respuesta» conserva el valor epistolar sin sonar torpe en español.
- source_word: Ῥαθύμῳ
  english_pob_choice: Rathymus
  chosen_spanish: Ratimo
  alternatives_spanish:
  - Ratimus
  - Rehum
  lexicon: transliteración del griego
  rationale: Se sigue la forma griega del nombre en 1 Esdras, sin armonizarlo con el paralelo arameo de Esdras. La adaptación española mantiene la referencia al nombre griego con pronunciación natural.
- source_word: τῷ γράφοντι τὰ προσπίπτοντα
  english_pob_choice: the recorder of the complaints
  chosen_spanish: el escribiente de las denuncias
  alternatives_spanish:
  - el registrador de las denuncias
  - el secretario de los informes
  - el escriba de lo presentado
  lexicon: BDAG
  rationale: La expresión administrativa sugiere a quien registra lo que se presenta o denuncia. «Escribiente de las denuncias» conserva el sentido funcional y la posible carga de quejas/acusaciones, sin imponer «chanciller».
- source_word: Βεελτέθμῳ
  english_pob_choice: Beeltethmus
  chosen_spanish: Beeltetmo
  alternatives_spanish:
  - Beeltétmo
  lexicon: transliteración del griego
  rationale: Se translitera el nombre tal como aparece en el testimonio griego, con adaptación ortográfica mínima al español.
- source_word: Σαμελλίῳ γραμματεῖ
  english_pob_choice: Samellius the scribe
  chosen_spanish: Samelio, el escriba
  alternatives_spanish:
  - Samelio, el secretario
  lexicon: BDAG
  rationale: γραμματεύς en este contexto administrativo puede ser «escriba» o «secretario». Se prefiere «escriba» por ser directo, reconocido y fiel al valor del término.
- source_word: τοῖς λοιποῖς τοῖς συντασσομένοις
  english_pob_choice: the rest of their associates
  chosen_spanish: el resto de sus asociados
  alternatives_spanish:
  - los demás colaboradores
  - el resto de los que estaban asociados con ellos
  - los restantes oficiales
  lexicon: BDAG
  rationale: El participio indica quienes están ordenados/asociados con los nombrados. «Asociados» es suficientemente amplio para no precisar más allá del griego.
- source_word: οἰκοῦσιν
  english_pob_choice: who lived
  chosen_spanish: que habitaban
  alternatives_spanish:
  - que vivían
  - que residían
  lexicon: BDAG
  rationale: El participio describe ubicación habitual; «habitaban» suena natural y conserva el matiz de residencia estable.
- source_word: ἐν Σαμαρείᾳ καὶ Συρίᾳ καὶ Φοινίκῃ
  english_pob_choice: in Samaria and Syria and Phoenicia
  chosen_spanish: en Samaria, Siria y Fenicia
  alternatives_spanish:
  - en Samaria y en Siria y en Fenicia
  lexicon: BDAG
  rationale: Se preserva la lista geográfica completa del griego, sin armonizar con el paralelo hebreo/arameo más breve.
- source_word: τὰ ὑπογεγραμμένα
  english_pob_choice: as follows
  chosen_spanish: lo siguiente
  alternatives_spanish:
  - como sigue
  - las cosas escritas abajo
  lexicon: BDAG
  rationale: Fórmula epistolar introductoria; «lo siguiente» es idiomático y fiel a la función del griego.
theological_decisions:
- issue: Tratamiento del testimonio griego frente al paralelo arameo/hebreo de Esdras
  english_pob_reading: This translation follows the Greek witness of 1 Esdras while using the parallel as a control.
  chosen_spanish_reading: La traducción sigue el testimonio griego de 1 Esdras, usando el paralelo como control, sin armonizar nombres ni redacción.
  alternative_spanish_readings:
  - Armonizar con el paralelo de Esdras
  - Preferir la tradición aramea para los nombres
  rationale: En este versículo la forma de 1 Esdras es claramente griega y distinta del paralelo. Mantenerla evita borrar una variante textual documentada.
  doctrine_reference: Crítica textual y prioridad del testimonio base
- issue: Alcance de τὰ προσπίπτοντα
  english_pob_reading: the recorder of the complaints
  chosen_spanish_reading: el escribiente de las denuncias
  alternative_spanish_readings:
  - el escribiente de los asuntos presentados
  - el registrador de las quejas
  rationale: 'El griego puede referirse a asuntos que «caen delante» de la autoridad: denuncias, quejas o asuntos presentados. «Denuncias» conserva la posible tensión administrativa sin reducirlo a un solo matiz demasiado estrecho.'
  doctrine_reference: Ninguna; decisión léxico-administrativa
- issue: Lista territorial explícita
  english_pob_reading: in Samaria and Syria and Phoenicia
  chosen_spanish_reading: en Samaria, Siria y Fenicia
  alternative_spanish_readings:
  - en Samaria y Siria y Fenicia
  - en Samaria, en Siria y en Fenicia
  rationale: La secuencia triple forma parte del testimonio griego y debe quedar visible en español. No se debe abreviar ni fundir con el paralelo de Esdras.
  doctrine_reference: Crítica textual y fidelidad al texto base
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del POB inglés que afinó τὰ προσπίπτοντα como «the complaints»; en español se reflejó con «denuncias» para conservar el matiz de asuntos presentados/quejados ante la autoridad sin forzar una equivalencia única. También se preservó la decisión revisada de leer la expresión como una función administrativa, no como un título técnico moderno.
  spanish_consistency_notes:
  - Se usa «Yahvé» por defecto cuando el texto lo requiera; en este versículo no aparece el nombre divino.
  - Se prefiere transliteración adaptada de nombres propios griegos sin armonizarlos con el paralelo de Esdras.
  - Se mantiene la terminología administrativa con «escriba»/«escribiente» según la función sugerida por el contexto.
  - Se conserva la lista geográfica completa del griego, con puntuación española natural.
