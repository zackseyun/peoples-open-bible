  from: him, and to our God
  to: him; and to our God
  rationale: 'The Hebrew structure presents two parallel objects for the verb ''return'': ''to the LORD'' and ''to our God,'' each followed by a resulting promise. The current English rendering, using a comma, slightly obscures this parallelism by making ''and to our God'' feel like an add-on to the compassion clause. Using a semicolon would create a stronger grammatical break, better reflecting the parallel structure of the source text where ''return... to our God'' is paired with the reason ''for he will abundantly pardon.'''
