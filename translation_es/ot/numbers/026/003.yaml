translation:
  language: es
  text: 'Moisés y Eleazar el sacerdote les hablaron en las llanuras de Moab, junto al Jordán, en Jericó[a], diciendo:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «junto al Jordán, frente a Jericó».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְדַבֵּר
  english_pob_choice: spoke
  chosen_spanish: les hablaron
  alternatives_spanish:
  - hablaron
  - dijeron
  lexicon: HALOT
  rationale: El verbo hebreo introduce discurso directo. En español, 'les hablaron' conserva el acto de dirigir la palabra y mantiene bien el enlace natural con 'diciendo' sin sonar mecánico.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  alternatives_spanish:
  - Moisés
  lexicon: Nombre propio estándar
  rationale: Transliteración española habitual del nombre propio hebreo, plenamente reconocible en lectura bíblica.
- source_word: וְאֶלְעָזָר
  english_pob_choice: and Eleazar
  chosen_spanish: y Eleazar
  alternatives_spanish:
  - y Eleazar
  lexicon: Nombre propio estándar
  rationale: Se conserva la coordinación simple entre los dos sujetos con el nombre propio españolizado de forma estándar.
- source_word: הַכֹּהֵן
  english_pob_choice: the priest
  chosen_spanish: el sacerdote
  alternatives_spanish:
  - el sacerdote
  - el sacerdote principal
  lexicon: HALOT
  rationale: '''הַכֹּהֵן'' designa el oficio con artículo definido. En español, ''el sacerdote'' reproduce esa apposición sin añadir ''sumo'' o ''principal'', que el hebreo no explicita.'
- source_word: אֹתָם
  english_pob_choice: to them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  lexicon: HALOT
  rationale: El complemento objeto indirecto se expresa de modo natural en español con clítico dativo 'les' después de 'hablaron'.
- source_word: בְּעַרְבֹת מוֹאָב
  english_pob_choice: in the plains of Moab
  chosen_spanish: en las llanuras de Moab
  alternatives_spanish:
  - en las llanuras de Moab
  - en las estepas de Moab
  lexicon: HALOT
  rationale: '''Llanuras'' comunica con naturalidad el sentido topográfico de עַרְבֹת y es más idiomático para español bíblico que ''estepas''.'
- source_word: עַל יַרְדֵּן יְרֵחוֹ
  english_pob_choice: by the Jordan at Jericho
  chosen_spanish: junto al Jordán, frente a Jericó
  alternatives_spanish:
  - junto al Jordán, frente a Jericó
  - junto al Jordán, al otro lado de Jericó
  - junto al Jordán, cerca de Jericó
  lexicon: HALOT
  rationale: '''עַל'' en esta fórmula geográfica puede indicar cercanía u orientación relativa. ''Frente a Jericó'' preserva la relación espacial que la nota inglesa también deja abierta, mientras ''junto al Jordán'' mantiene la ubicación inmediata.'
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - diciendo
  - para decir
  lexicon: HALOT
  rationale: El infinitivo constructo introduce la cita siguiente; 'diciendo' reproduce de forma natural la estructura discursiva en español.
translation_notes:
  revision_awareness: 'La versión española sigue el mismo estado textual de alta concordancia indicado por el control cruzado: no hay revisiones aplicadas ni cambios pendientes respecto del texto fuente base.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto cuando corresponda; este versículo no contiene el tetragrámaton.
  - Se conserva la distinción entre ubicación general ('en las llanuras de Moab') y relación espacial específica ('junto al Jordán, frente a Jericó').
  - Se evita añadir títulos eclesiásticos no presentes en el hebreo, como 'sumo sacerdote'.
