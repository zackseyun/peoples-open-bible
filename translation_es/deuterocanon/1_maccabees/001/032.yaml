translation:
  language: es
  text: Y tomaron cautivas a las mujeres y a los niños; y tomaron el ganado como botín[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «tomaron posesión del ganado» o «lo heredaron». El verbo griego normalmente tiene el sentido de recibir una posesión, pero aquí, en un contexto de conquista, funciona con el sentido de tomar los animales como botín.
    reason: lexical_alternative
lexical_decisions:
- source_word: ᾐχμαλώτευσεν
  english_pob_choice: took ... captive
  chosen_spanish: capturaron
  alternatives_spanish:
  - llevaron cautivos
  - tomaron cautivos
  lexicon: LSJ
  rationale: El verbo griego expresa tomar prisioneros de guerra o llevar a cautiverio. En español, «capturaron» comunica con naturalidad el acto coercitivo, pero la nota conserva el matiz de cautiverio que el inglés POB destacó con «took ... captive».
- source_word: τὰς γυναῖκας
  english_pob_choice: the women
  chosen_spanish: las mujeres
  alternatives_spanish:
  - las esposas
  lexicon: LSJ
  rationale: En este contexto de víctimas junto con los niños, el sustantivo debe entenderse de forma general como «mujeres», no como «esposas».
- source_word: τὰ τέκνα
  english_pob_choice: the children
  chosen_spanish: los niños
  alternatives_spanish:
  - los hijos
  - la descendencia
  lexicon: LSJ
  rationale: τέκνα designa a los hijos o niños en sentido amplio. «Los niños» es la equivalencia más clara y natural en español para este listado de víctimas.
- source_word: τὰ κτήνη
  english_pob_choice: the livestock
  chosen_spanish: el ganado
  alternatives_spanish:
  - los animales domésticos
  - las reses
  lexicon: LSJ
  rationale: κτήνη se refiere a animales de propiedad o domésticos, no a «bestias» en sentido genérico. «Ganado» expresa bien esa categoría en español bíblico contemporáneo.
- source_word: ἐκληρονόμησαν
  english_pob_choice: took the livestock as plunder
  chosen_spanish: tomaron ... como botín
  alternatives_spanish:
  - se apropiaron de ... como botín
  - lo tomaron en posesión
  lexicon: LSJ
  rationale: Aunque literalmente el verbo se relaciona con heredar u obtener posesión, en este contexto bélico significa tomar para sí como botín. «Tomaron ... como botín» conserva el sentido contextual sin falsear la raíz léxica.
translation_notes:
  revision_awareness: 'La versión española sigue la revisión inglesa más reciente, que prefirió una redacción más directa y formal con «took ... captive» / «took ... as plunder». Por eso se evita una paráfrasis fuerte y se conserva el paralelismo de dos acciones: capturar a las personas y tomar el ganado como botín.'
  spanish_consistency_notes:
  - Se mantiene «ganado» para κτήνη en este pasaje, por ser más natural que «bestias» y más preciso que «cattle».
  - Se evita «esposas» para γυναῖκας porque el contexto no restringe el término a mujeres casadas.
  - La estructura con punto y coma refleja bien la coordinación de dos cláusulas griegas unidas por καί.
