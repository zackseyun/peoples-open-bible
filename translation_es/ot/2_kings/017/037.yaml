    text: Or 'the decrees ... the ordinances ... the instruction ... the command.' The Hebrew uses a cluster of covenant-law terms with overlapping but distinct legal nuance.
    reason: lexical_alternative
  - marker: b
    text: Or 'you shall be careful to do.' The Hebrew expression combines keeping/observing with doing.
    reason: lexical_alternative
  - marker: c
    text: '''Fear'' here carries the sense of reverential allegiance or worshipful dread toward deities.'
    reason: lexical_alternative
