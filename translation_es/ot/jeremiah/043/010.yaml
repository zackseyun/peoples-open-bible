    text: O «su pabellón», «su tienda real» o quizá otro término para un cubrimiento extendido por un rey.
    reason: lexical_alternative
  revision_rationale: Se cambia 'mi esclavo' por 'mi siervo' para seguir la decisión contextual y teológica auditada del POB sobre עַבְדִּי. Se mejora la naturalidad con 'sobre estas piedras'. Se usa 'dosel' como equivalente principal de שפרורו y se conservan en nota las alternativas documentadas debido a la rareza e incertidumbre del término.
