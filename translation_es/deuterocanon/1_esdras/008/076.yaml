    text: '''La casa de Yahvé'' se refiere al templo.'
    reason: cultural_note
  - marker: c
    text: O 'en el tiempo de nuestra servidumbre' / 'mientras servíamos'. El grupo léxico de δουλεία se repite en las dos cláusulas.
    reason: alternative_reading
  revision_rationale: Se corrige 'nuestro Señor' a 'Yahvé' para ajustarse a la terminología obligatoria del proyecto cuando κύριος representa el nombre divino en contexto veterotestamentario. También se mejora levemente la naturalidad del español reordenando 'revelar una lámpara para nosotros' a 'revelar para nosotros una lámpara', sin alterar el significado ni la imaginería fuente. Se actualiza la nota b para que coincida con el texto revisado.
