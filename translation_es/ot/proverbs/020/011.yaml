  source_alignment_summary: 'El borrador sigue bien el sentido general del hebreo y del POB inglés: el joven queda manifiesto por su conducta, y la segunda mitad evalúa si su obrar es puro y recto. También conserva correctamente la nota alternativa para el matiz pasivo de יִתְנַכֶּר.'
