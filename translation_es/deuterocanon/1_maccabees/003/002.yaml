translation:
  language: es
  text: Y todos sus hermanos le ayudaban, y todos los que se habían unido a su padre[a], y combatían la guerra de Israel con alegría[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los que se habían adherido a su padre», es decir, los que se habían alineado con Matatías.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «combatían la guerra de Israel con gozo». El griego dice más literalmente: «combatían la guerra de Israel con alegría».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐβοήθουν
  english_pob_choice: helped
  chosen_spanish: le ayudaban
  alternatives_spanish:
  - le ayudaron
  - estaban ayudándole
  - acudían en su ayuda
  lexicon: BDAG
  rationale: El imperfecto griego expresa acción continua o de apoyo. «Le ayudaban» conserva bien ese valor progresivo en español, sin endurecerlo a un pasado puntual.
- source_word: πάντες οἱ ἀδελφοὶ αὐτοῦ
  english_pob_choice: all his brothers
  chosen_spanish: todos sus hermanos
  alternatives_spanish:
  - todos los hermanos de él
  lexicon: BDAG
  rationale: La referencia es familiar y directa. «Sus hermanos» es natural en español y mantiene el sentido preciso del griego.
- source_word: ὅσοι ἐκολλήθησαν τῷ πατρὶ αὐτοῦ
  english_pob_choice: who had joined themselves to his father
  chosen_spanish: los que se habían unido a su padre
  alternatives_spanish:
  - los que se habían adherido a su padre
  - los que se habían pegado a su padre
  - los que se habían aliado con su padre
  lexicon: BDAG
  rationale: κολλάω tiene la idea de adherirse o unirse estrechamente. «Se habían unido a su padre» conserva la adhesión personal y permite la posible nota explicativa sin cargar el texto principal con una paráfrasis interpretativa.
- source_word: ἐπολέμουν τὸν πόλεμον
  english_pob_choice: fought the war
  chosen_spanish: combatían la guerra
  alternatives_spanish:
  - peleaban la guerra
  - luchaban la guerra
  - hacían la guerra
  lexicon: BDAG
  rationale: El griego usa una construcción cognada que literalmente dice «combatían la guerra». En español, «combatían la guerra» conserva esa forma y el matiz de acción continua. No se sustituye por una expresión más abstracta como «luchaban por Israel» en el texto principal.
- source_word: Ἰσραήλ
  english_pob_choice: Israel
  chosen_spanish: de Israel
  alternatives_spanish:
  - por Israel
  - de parte de Israel
  lexicon: BDAG
  rationale: El genitivo puede leerse como guerra perteneciente a Israel o emprendida en su nombre. «De Israel» mantiene la relación nominal sin resolverla interpretativamente en el texto principal.
- source_word: μετʼ εὐφροσύνης
  english_pob_choice: with gladness
  chosen_spanish: con alegría
  alternatives_spanish:
  - con gozo
  - alegremente
  - con regocijo
  lexicon: BDAG
  rationale: εὐφροσύνη abarca alegría, gozo y regocijo. «Con alegría» es claro, natural y suficientemente cercano a «with gladness».
theological_decisions:
- issue: Valor de 'la guerra de Israel'
  english_pob_reading: A concrete military struggle undertaken on Israel's behalf, rendered without expanding it into a theological slogan.
  chosen_spanish_reading: Una lucha militar concreta asociada con Israel, sin convertirla en un lema teológico ni suavizarla a una idea vaga.
  alternative_spanish_readings:
  - la batalla por Israel
  - la guerra de Israel
  - combatían por Israel
  rationale: El griego presenta el conflicto de manera concreta; la traducción no debe ampliarlo doctrinalmente ni reducirlo a una expresión genérica. Se mantiene la tensión del texto tal como está, con una relación nominal que puede explicarse en nota.
  doctrine_reference: Principio de transparencia y de no resolver tensiones léxicas o históricas que el texto no resuelve por sí mismo.
translation_notes:
  revision_awareness: 'El inglés auditado ya había estabilizado la lectura con leve discusión léxica: ἐβοήθουν como acción continua, κολλάω como adhesión/lealtad, ἐπολέμουν τὸν πόλεμον como construcción cognada conservada, e εὐφροσύνη como ''gladness''. No se reportaron revisiones posteriores que alteraran el sentido; la versión española sigue ese estado estable y preserva las dos notas alternativas donde el inglés POB también las documentó.'
  spanish_consistency_notes:
  - Se mantiene 'Israel' como nombre propio sin sustituirlo por formulaciones eclesiales o doctrinales.
  - Se conserva la relación directa de parentesco y lealtad del griego sin añadir información ajena.
  - El registro es bíblico y sobrio, con español natural pero suficientemente literal para la auditoría.
  - Las notas siguen la distinción entre alternativa lexical y matiz textual sin duplicar marcadores.
