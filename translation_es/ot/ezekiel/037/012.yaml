  to: 'Por tanto, profetiza y diles: «Así dice el Señor Dios, Yahvé: He aquí, yo abro sus sepulcros y los haré subir[a] de sus sepulcros, pueblo mío[b], y los llevaré a la tierra de Israel»'
  rationale: 'Se corrigen cuatro puntos: la nota [a] ahora coincide con la alternativa léxica documentada en el POB inglés; הִנֵּה אֲנִי se expresa con mayor solemnidad; el título compuesto אֲדֹנָי יְהוִה se aclara en español manteniendo ''Yahvé''; y el movimiento final hacia la tierra de Israel se vuelve más natural y fiel con ''los llevaré a''.'
