base_translation:
  language: en
  yaml_path: translation/ot/2_samuel/014/007.yaml
  text: And behold[a], the whole family has risen up against your servant and said, ‘Give up the one who struck his brother, so that we may put him to death for the life of his brother whom he killed; and we will destroy the heir also.’ Thus they would quench my remaining ember[b], leaving my husband neither name nor remnant on the face of the earth.
  footnotes:
  - marker: a
    text: Or 'my last coal.' The Hebrew uses the image of a remaining live coal/ember for the last surviving hope of a family line.
    reason: lexical_alternative
  - marker: b
    text: '''Name nor remnant'' refers to preserving a man''s memory and surviving line, not merely his reputation.'
    reason: cultural_note
