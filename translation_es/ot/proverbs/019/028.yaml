translation:
  language: es
  text: Un testigo vil[a] se burla de la justicia[b], y la boca de los impíos traga la maldad[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Un testigo de Belial se burla de la justicia». Aquí בְּלִיַּעַל se entiende como sustantivo o adjetivo común que expresa vileza o bajeza moral, no como nombre propio.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «se mofa de la sentencia» o «desprecia la justicia».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «la boca de los impíos engulle el mal» o «la falsedad».'
    reason: lexical_alternative
lexical_decisions:
- source_word: עֵד
  english_pob_choice: witness
  chosen_spanish: testigo
  alternatives_spanish:
  - testificador
  lexicon: HALOT
  rationale: En contexto forense/proverbial, עֵד designa a una persona que testifica. «Testigo» es el equivalente natural en español y conserva el marco judicial del paralelismo con מִשְׁפָּט.
- source_word: בְּלִיַּעַל
  english_pob_choice: worthless
  chosen_spanish: inútil
  alternatives_spanish:
  - vil
  - inservible
  - de Belial
  lexicon: HALOT
  rationale: El POB inglés tomó בְּלִיַּעַל como adjetivo/común, no como nombre propio. «Inútil» comunica la idea de inutilidad/maldad moral sin introducir la figura posterior de «Belial».
- source_word: יָלִיץ
  english_pob_choice: mocks
  chosen_spanish: se burla de
  alternatives_spanish:
  - se mofa de
  - se escarnece de
  - desprecia
  lexicon: HALOT
  rationale: El verbo en este contexto expresa trato desdeñoso hacia la justicia. «Se burla de» reproduce bien el matiz de menosprecio activo y es natural en español.
- source_word: מִשְׁפָּט
  english_pob_choice: justice
  chosen_spanish: la justicia
  alternatives_spanish:
  - el juicio
  - la sentencia
  - el derecho
  lexicon: HALOT
  rationale: Aquí el campo semántico es judicial y ético. «La justicia» conserva ese alcance sin reducirlo solo a una sentencia puntual.
- source_word: פִי
  english_pob_choice: the mouth of
  chosen_spanish: la boca de
  alternatives_spanish:
  - la lengua de
  - la palabra de
  lexicon: HALOT
  rationale: Se mantiene la metáfora corporal hebrea. «La boca de» preserva el paralelismo y la fuerza imagística del proverbio.
- source_word: רְשָׁעִים
  english_pob_choice: the wicked
  chosen_spanish: los impíos
  alternatives_spanish:
  - los malvados
  - los perversos
  - los injustos
  lexicon: HALOT
  rationale: El término sustantivado describe a personas moralmente perversas. «Los impíos» es una forma bíblica clara y digna en español, sin perder el sentido moral.
- source_word: יְבַלַּע
  english_pob_choice: swallows
  chosen_spanish: traga
  alternatives_spanish:
  - devora
  - engulle
  - se traga
  lexicon: HALOT
  rationale: El verbo conserva la metáfora de ingerir algo. «Traga» es breve y idiomático; mantiene la imagen de apropiarse/consumir lo que es dañino.
- source_word: אָוֶן
  english_pob_choice: iniquity
  chosen_spanish: la maldad
  alternatives_spanish:
  - la iniquidad
  - el mal
  - la perversidad
  lexicon: HALOT
  rationale: אָוֶן puede abarcar maldad, perversidad o daño moral. En español, «maldad» comunica con claridad la idea sin sonar demasiado abstracta; «iniquidad» quedaría más técnico y menos natural aquí.
translation_notes:
  revision_awareness: La versión inglesa auditada no mostró cambios en la última pasada; se mantiene el sentido base con equivalencias españolas que conservan el paralelismo legal y la metáfora de ingestión.
  spanish_consistency_notes:
  - Se preservó el paralelismo entre el testigo y la boca mediante vocabulario concreto y simétrico.
  - Se evitó traducir בְּלִיַּעַל como nombre propio para no introducir una lectura no documentada por el POB inglés.
  - «Impíos» mantiene registro bíblico natural en español y corresponde bien al plural sustantivado hebreo.
  - La imagen de «tragar» se conservó para no suavizar la fuerza metafórica de יְבַלַּע.
