translation:
  text: '1 And the Lord said to me[a], “This city will be delivered up for a time, and the people will be led away into captivity, but the world will not be forgotten.


    2 Or do you think that this is the city of which I said, ''On my hands I have engraved you''?


    3 For it is not that which is by the hands of men; it is that which will be revealed, which was prepared beforehand from the time I resolved to make Paradise, and I showed it to Adam before he sinned.


    4 But when he transgressed the commandment, it was taken away from him, just as Paradise also was.


    5 And after these things I showed it to my servant Abraham by night, between the pieces of the sacrifice.


    6 And again I also showed it to Moses on Mount Sinai[b][c][d][e][f], when I showed him the pattern of the tabernacle and all its vessels.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The rebuke’s subordinate wording is textually rough in the Ceriani OCR at this point. The sense is clear from the Syriac trajectory and control witnesses: Baruch must not identify the presently visible city with the city in its ultimate divine form.'
    reason: textual_variant
    anchor_ref: '4:2'
  - marker: f
    text: The contrast is between the city now seen in history and a city already prepared by God before its disclosure.
    reason: cross_reference
    anchor_ref: '4:3'
  - marker: e
    text: The final clause is completed from the immediate continuation of the chapter’s sentence across the page edge, with control-witness support.
    reason: textual_variant
    anchor_ref: '4:6'
  - marker: d
    text: Or 'Or are you so foolish that you think this is that city?'.
    reason: previous_rendering
  - marker: c
    text: Or 'It is not this building that is now in your midst'.
    reason: previous_rendering
  - marker: b
    text: Or 'and the people will be led away into captivity for a time'.
    reason: previous_rendering
lexical_decisions:
- source_word: ܡܫܬܠܡܐ
  chosen: will be delivered up
  alternatives:
  - will be handed over
  - will be given over
  lexicon: Payne Smith
  rationale: The verb signals temporary surrender to judgment rather than annihilation. “Delivered up” preserves that juridical-apocalyptic force.
- source_word: ܡܬܕܒܪ ܫܒܝܐ
  chosen: will be led away into captivity
  alternatives:
  - will be carried off captive
  - will be conducted in exile
  lexicon: Payne Smith
  rationale: The phrase is more concrete than a general ‘chastened’; it depicts the people being carried into exile.
- source_word: ܥܠܡܐ ܠܐ ܡܬܬܢܫܐ
  chosen: the world will not be forgotten
  alternatives:
  - the age will not be forgotten
  - the world will not be abandoned to oblivion
  lexicon: Payne Smith
  rationale: The line answers Baruch’s fear of cosmic collapse. “Forgotten” keeps the Syriac image without over-expanding it.
- source_word: ܡܕܝܢܬܐ
  chosen: city
  alternatives:
  - Jerusalem
  - Zion
  lexicon: Payne Smith
  rationale: The text itself says ‘city’; retaining it lets the theological identification emerge from context rather than being forced into the main line.
- source_word: ܐܬܟܢ ܡܢܩܕܡ
  chosen: was prepared beforehand
  alternatives:
  - was made ready beforehand
  - was established in advance
  lexicon: Payne Smith
  rationale: This preserves the motif of a pre-prepared heavenly/eschatological reality known to God before its historical disclosure.
- source_word: ܦܪܕܝܣܐ
  chosen: Paradise
  alternatives:
  - garden
  lexicon: Payne Smith
  rationale: ‘Paradise’ fits the apocalyptic register and matches the interwoven Adamic symbolism better than the flatter ‘garden.’
- source_word: ܒܝܢܬ ܦܓܪ̈ܐ ܕܕܒܚܐ
  chosen: between the pieces of the sacrifice
  alternatives:
  - between the divided victims
  - among the parts of the offering
  lexicon: Payne Smith
  rationale: This wording preserves the covenantal allusion to Abraham’s night vision without paraphrasing it away.
