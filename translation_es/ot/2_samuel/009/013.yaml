translation:
  language: es
  text: Y Mefiboset vivía en Jerusalén[a], porque siempre comía a la mesa del rey. Y estaba cojo de ambos pies[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Porque siempre comía a la mesa del rey».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «cojo de sus dos pies».'
    reason: lexical_alternative
lexical_decisions:
- source_word: יֹשֵׁב
  english_pob_choice: lived
  chosen_spanish: vivía
  alternatives_spanish:
  - habitaba
  - residía
  - estaba viviendo
  lexicon: HALOT
  rationale: El participio en este contexto narrativo con un lugar propio expresa residencia habitual. "Vivía" conserva el valor idiomático sin sonar forzado en español.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  - for
  lexicon: HALOT
  rationale: Aquí introduce la razón de que Mefiboset viviera en Jerusalén. "Porque" expresa claramente la relación causal en español actual.
- source_word: שֻׁלְחַן הַמֶּלֶךְ
  english_pob_choice: the king’s table
  chosen_spanish: la mesa del rey
  alternatives_spanish:
  - la mesa del rey
  - la mesa real
  - la mesa del monarca
  lexicon: HALOT
  rationale: La construcción hebrea se refiere a la mesa como lugar de provisión y comunión de la casa real. "La mesa del rey" conserva el valor idiomático y la referencia concreta.
- source_word: תָּמִיד
  english_pob_choice: always
  chosen_spanish: siempre
  alternatives_spanish:
  - constantemente
  - siempre de manera regular
  - continuamente
  lexicon: HALOT
  rationale: El adverbio indica continuidad o regularidad habitual. "Siempre" es la forma natural en español para ese uso repetido.
- source_word: אֹכֵל
  english_pob_choice: ate
  chosen_spanish: comía
  alternatives_spanish:
  - comía regularmente
  - solía comer
  - comía habitualmente
  lexicon: HALOT
  rationale: El participio expresa acción habitual. En español, el imperfecto "comía" comunica mejor la costumbre pasada que un pretérito puntual.
- source_word: פִסֵּחַ
  english_pob_choice: lame
  chosen_spanish: cojo
  alternatives_spanish:
  - cojo
  - rengo
  - lisiado
  lexicon: HALOT
  rationale: El hebreo describe lameness en ambos pies. "Cojo" es un equivalente directo y entendible en español moderno, sin perder la referencia física.
- source_word: שְׁתֵּי רַגְלָיו
  english_pob_choice: both his feet
  chosen_spanish: ambos pies
  alternatives_spanish:
  - los dos pies
  - sus dos pies
  - ambas piernas
  lexicon: HALOT
  rationale: El hebreo dice literalmente "sus dos pies". En español, "ambos pies" suena natural y mantiene la precisión anatómica.
- source_word: וְהוּא
  english_pob_choice: Now he was
  chosen_spanish: Ahora bien, estaba
  alternatives_spanish:
  - Y él estaba
  - Y era
  - Además, estaba
  lexicon: HALOT
  rationale: El waw introduce una observación concluyente. "Ahora bien" conserva el valor discursivo de transición sin añadir contenido ajeno al texto.
translation_notes:
  revision_awareness: 'El texto hebreo y el audit trail inglés coinciden en una lectura estable: residencia en Jerusalén, causa expresada por כִּי, y descripción final de la discapacidad con valor habitual. No se detectan revisiones sustantivas aplicadas en el registro fuente; la redacción española mantiene ese mismo perfil de alta concordancia.'
  spanish_consistency_notes:
  - Se mantiene "Mefiboset" como adaptación estándar del nombre propio en español, sin añadir vocalización no atestiguada en el texto fuente.
  - Se prefirió "mesa del rey" en vez de un giro más literal como "mesa del monarca" para conservar la idiomaticidad y la referencia de privilegio real.
  - '"Cojo" se emplea como equivalente semántico directo de פִסֵּחַ; no se suaviza a un término más genérico que borre la tensión física del hebreo.'
  - El imperfecto "comía" refleja acción habitual pasada, alineada con el participio hebreo y con la lectura inglesa de costumbre repetida.
