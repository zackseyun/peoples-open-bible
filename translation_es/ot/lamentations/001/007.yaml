  - severity: medium
    issue: “que habían sido desde los días antiguos” es español poco natural para אֲשֶׁר הָיוּ מִימֵי קֶדֶם.
    rationale: La idea es “que tenía desde tiempos antiguos / desde días de antaño”. La formulación actual suena calcada y opaca.
  - severity: low
    issue: “en mano del enemigo” suena menos idiomático que “en manos del enemigo” o “en poder del enemigo”.
    rationale: Aunque el singular refleja el modismo hebreo, en español bíblico corriente el plural o “en poder de” suena más natural sin pérdida semántica.
