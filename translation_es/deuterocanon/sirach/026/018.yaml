review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y las imágenes del griego: λύχνος como «lámpara», ἐκλάμπων como brillo activo, ἐπὶ λυχνίας ἁγίας como ubicación sobre un soporte consagrado, y κάλλος προσώπου como paralelo poético. La principal debilidad está en «edad firme», que suena poco idiomático en español y no comunica con claridad el valor de ἐπὶ ἡλικίᾳ στασίμῃ como edad/madurez asentada o estable. También «candelabro» puede sugerir velas más que un soporte de lámpara, aunque sigue siendo defendible en registro bíblico.'
  spanish_quality_summary: El texto es legible y digno, pero «edad firme» resulta forzado y poco natural. Una formulación como «en una edad estable[a]» preserva mejor el sentido de estabilidad/asentamiento sin perder concisión. «Candelabro santo» es comprensible, aunque algo menos preciso que «soporte» o «lampadario»; no obstante, por claridad e inteligibilidad eclesial amplia, puede mantenerse.
  glossary_alignment: No hay términos del glosario mayor en juego salvo la fidelidad a imágenes concretas. «Lámpara» y «rostro» concuerdan bien con la política del proyecto. No hay conflicto teológico. La nota léxica debe conservar la alternativa explicativa sobre la idiomaticidad de ἐπὶ ἡλικίᾳ στασίμῃ.
  issues:
  - severity: medium
    issue: «Edad firme» suena poco idiomático en español.
    rationale: Aunque intenta reflejar στασίμῃ como estabilidad, la combinación no es natural ni clara para lector general. «Edad estable» o «madurez asentada» comunican mejor el sentido documentado.
  - severity: low
    issue: «Candelabro» no es el equivalente más preciso para λυχνία.
    rationale: Puede evocar un soporte para velas; sin embargo, en español bíblico sigue siendo una opción aceptable para un soporte de lámpara. No exige cambio si se prioriza fluidez.
  revised_spanish_text: Una lámpara que resplandece sobre un candelabro santo, y la belleza del rostro en una edad estable[a].
