translation:
  language: es
  text: Y cuando el rey despertó, tomaron la carta[a] y se la dieron, y la leyó[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el escrito» o «el documento» para el griego γράμμα.
    reason: lexical_alternative
  - marker: b
    text: El verbo griego puede significar simplemente «leyó» o, en algunos contextos, «leyó en voz alta»; el texto mismo no especifica aquí que fuera en voz alta.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξηγέρθη
  english_pob_choice: when the king awoke
  chosen_spanish: cuando el rey despertó
  alternatives_spanish:
  - cuando el rey fue despertado
  - cuando el rey se levantó
  lexicon: LSJ
  rationale: El aoristo pasivo ἐξηγέρθη puede funcionar en sentido intransitivo como “despertar” o “levantarse”. En este contexto narrativo, “despertó” reproduce con naturalidad la escena sin forzar una pasiva artificial en español.
- source_word: λαβόντες
  english_pob_choice: they took
  chosen_spanish: tomaron
  alternatives_spanish:
  - habiendo tomado
  - al tomar
  lexicon: LSJ
  rationale: El participio se integra de manera natural en español como una acción consecutiva. “Tomaron” conserva la secuencia narrativa y evita una construcción demasiado pesada.
- source_word: τὸ γράμμα
  english_pob_choice: the letter
  chosen_spanish: la carta
  alternatives_spanish:
  - el escrito
  - el documento
  lexicon: LSJ
  rationale: γράμμα aquí designa una comunicación escrita presentada al rey. “Carta” es la equivalencia más natural en español y mantiene el sentido de un escrito formal sin añadir precisión no explícita.
- source_word: ἔδωκαν αὐτῷ
  english_pob_choice: gave it to him
  chosen_spanish: se la dieron
  alternatives_spanish:
  - le dieron la carta
  - la entregaron a él
  lexicon: LSJ
  rationale: El pronombre átono doble en español expresa con claridad el objeto directo femenino (“la”) y el indirecto (“se/le”) de forma idiomática. “Se la dieron” fluye mejor que una repetición nominal.
- source_word: ἀνέγνω
  english_pob_choice: he read it
  chosen_spanish: la leyó
  alternatives_spanish:
  - la leyó en voz alta
  - la leyó
  lexicon: LSJ
  rationale: El verbo puede significar “leer” o “leer en voz alta”, pero el griego no especifica la oralidad. “La leyó” es fiel y no introduce el matiz de lectura pública sin base textual.
translation_notes:
  revision_awareness: El texto griego y la auditoría inglesa presentan concordancia alta; la única decisión estilística principal en español fue escoger una forma natural para ἐξηγέρθη y evitar especificar lectura en voz alta donde el griego no lo hace. No se reportan revisiones aplicadas en el expediente.
  spanish_consistency_notes:
  - Se mantuvo un registro narrativo sobrio y directo, adecuado para POB.
  - Se evitó «SEÑOR» y otra terminología no pertinente al pasaje.
  - «Carta» se usa en sentido de documento escrito de corte, sin ampliar el contenido del término griego.
