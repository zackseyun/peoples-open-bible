translation:
  language: es
  text: En cuanto a mí, he aquí[a] que estoy residiendo en Mizpa para presentarme ante[b] los caldeos[c] que vienen a nosotros. Pero ustedes, recojan vino, fruta de verano y aceite; pónganlos en sus recipientes, y habiten en las ciudades que han tomado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede expresarse como "estoy aquí" o "aquí estoy": fórmula hebrea de auto-presentación enfática.'
    reason: lexical_alternative
  - marker: b
    text: '"Presentarme ante" también puede implicar atenderlos o representarlos en una función oficial.'
    reason: lexical_alternative
  - marker: c
    text: O "los babilonios", por "los caldeos".
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנְנִי
  english_pob_choice: behold, I am
  chosen_spanish: estoy aquí
  alternatives_spanish:
  - he aquí que estoy
  - mira, aquí estoy
  lexicon: HALOT
  rationale: La fórmula hebrea de auto-presentación exige una expresión natural en español. "Estoy aquí" conserva la presencia inmediata sin forzar un calco como "he aquí" en la sintaxis principal; el matiz enfático queda reforzado por el contexto.
- source_word: יֹשֵׁב
  english_pob_choice: staying
  chosen_spanish: residiendo
  alternatives_spanish:
  - quedándome
  - permaneciendo
  - viviendo
  lexicon: HALOT
  rationale: En este contexto el participio indica permanencia/residencia en Mizpa, no postura física. "Residiendo" comunica con precisión la permanencia local y el tono administrativo del pasaje.
- source_word: לַעֲמֹד לִפְנֵי
  english_pob_choice: to stand before
  chosen_spanish: para estar delante de
  alternatives_spanish:
  - para servir delante de
  - para atender delante de
  - para representar delante de
  lexicon: HALOT
  rationale: La expresión hebrea conserva una imagen idiomática de comparecer ante una autoridad. "Estar delante de" mantiene esa imagen y permite el sentido de servicio o representación sin añadirlo explícitamente al texto principal.
- source_word: הַכַּשְׂדִּים
  english_pob_choice: the Chaldeans
  chosen_spanish: los caldeos
  alternatives_spanish:
  - los babilonios
  lexicon: HALOT
  rationale: Se mantiene el etnónimo directo del hebreo. "Caldeos" conserva la referencia histórica y la distinción léxica documentada; "babilonios" queda como alternativa interpretativa conocida.
- source_word: אִסְפוּ
  english_pob_choice: gather
  chosen_spanish: recojan
  alternatives_spanish:
  - junten
  - reúnan
  - cojan
  lexicon: HALOT
  rationale: El imperativo pide reunir los productos. "Recojan" es natural en español y suficientemente amplio para abarcar los tres elementos enumerados.
- source_word: קַיִץ
  english_pob_choice: summer fruit
  chosen_spanish: fruta de verano
  alternatives_spanish:
  - frutos de verano
  - fruta estival
  - productos de verano
  lexicon: HALOT
  rationale: La expresión hebrea se refiere al fruto maduro de la estación seca/verano, sin precisar una especie. "Fruta de verano" conserva el sentido temporal y evita restringir indebidamente la referencia.
- source_word: שִׂימוּ בִּכְלֵיכֶם
  english_pob_choice: put them in your containers
  chosen_spanish: pónganlos en sus recipientes
  alternatives_spanish:
  - guárdenlos en sus vasijas
  - colóquenlos en sus vasijas
  - metanlos en sus contenedores
  lexicon: HALOT
  rationale: כְּלִי es un término amplio para vasijas/recipientes. "Recipientes" ofrece un español claro y neutro, sin imponer una forma específica del objeto.
- source_word: וּשְׁבוּ
  english_pob_choice: dwell
  chosen_spanish: habiten
  alternatives_spanish:
  - vivan
  - residan
  - permanezcan
  lexicon: HALOT
  rationale: Aquí ישב expresa residencia estable en las ciudades. "Habiten" conserva el registro digno del mandato y corresponde mejor al tono del pasaje que un simple "vivan".
- source_word: תְּפַשְׂתֶּם
  english_pob_choice: have taken
  chosen_spanish: han tomado
  alternatives_spanish:
  - han ocupado
  - han capturado
  - han conquistado
  lexicon: HALOT
  rationale: El verbo indica posesión/obtención de las ciudades. "Han tomado" sigue la opción inglesa y evita cargar el texto con una violencia o una connotación militar más fuerte que la requerida por el hebreo.
translation_notes:
  revision_awareness: La versión española sigue el último estado revisado del POB inglés, pero vuelve al matiz enfático de הִנְנִי mediante una formulación natural en español y mantiene el registro formal de los imperativos y del verbo de residencia. Se preserva la referencia directa a "los caldeos" y el sentido amplio de "recipientes" y "fruta de verano" sin sobreespecificación.
  spanish_consistency_notes:
  - Se mantuvo "caldeos" como equivalente directo de הַכַּשְׂדִּים, coherente con el paquete fuente y la alternativa inglesa documentada.
  - '"Habiten" conserva el registro bíblico sin caer en arcaísmo excesivo.'
  - No se añadió nota sobre "estar delante de" porque el matiz administrativo queda suficientemente contenido en el texto y no se documentó como tensión doctrinal.
