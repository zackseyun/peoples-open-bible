  spanish_quality_summary: El español es natural, claro y digno. «Restáuranos» y «haz resplandecer tu rostro» son fluidos y apropiados para registro bíblico contemporáneo. La puntuación y el ritmo de súplica están bien logrados.
  glossary_alignment: 'Cumple con la terminología del proyecto: אֱלֹהִים -> «Dios»; פָּנֶיךָ preservado literalmente como «tu rostro»; salvación expresada como «seremos salvos». Aunque el inglés usa «of hosts», «de los ejércitos» es defendible en español y está justificado por la nota y la decisión léxica. No hay conflicto con los defaults principales del proyecto.'
  issues:
