translation:
  language: es
  text: 'Entonces dije[a]: «Señor Yahvé, por favor, cesa[b]. ¿Cómo podrá Jacob mantenerse en pie? Porque es pequeño».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Señor Yahvé» (אֲדֹנָי יְהוִה), título compuesto que combina «Señor» con el nombre divino Yahvé.'
    reason: lexical_alternative
  - marker: b
    text: 'O «detente»; también puede entenderse como una súplica resumida: «¿quién levantará a Jacob?» o «¿cómo podrá Jacob mantenerse en pie?». El hebreo es breve y admite estas matizaciones.'
    reason: alternative_reading
lexical_decisions:
- source_word: וָאֹמַר
  english_pob_choice: Then I said
  chosen_spanish: Entonces dije
  alternatives_spanish:
  - Y dije
  - Y entonces dije
  lexicon: HALOT
  rationale: La waw consecutiva marca avance narrativo; «Entonces dije» conserva la secuencia natural en español sin añadir contenido.
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: Lord GOD
  chosen_spanish: Yahvé, Señor
  alternatives_spanish:
  - Señor Yahvé
  - Señor Dios
  lexicon: HALOT
  rationale: El hebreo combina el título אֲדֹנָי con el nombre divino יְהוִה. En español, «Yahvé, Señor» preserva ambos elementos sin recurrir a la convención de ocultar el nombre ni producir una repetición extraña como «Señor Yahvé» en lectura directa.
- source_word: חֲדַל נָא
  english_pob_choice: please cease
  chosen_spanish: por favor, deja
  alternatives_spanish:
  - por favor, cesa
  - te ruego, cesa
  lexicon: HALOT
  rationale: חֲדַל expresa una petición de detener/cesar, y נָא añade cortesía o ruego. «Por favor, deja» comunica la súplica de modo natural en español; «cesa» sería más formal pero menos idiomático aquí.
- source_word: מִי יָקוּם
  english_pob_choice: How can Jacob stand?
  chosen_spanish: ¿Cómo podrá estar en pie Jacob?
  alternatives_spanish:
  - ¿Quién podrá ponerse en pie Jacob?
  - ¿Quién podrá resistir Jacob?
  lexicon: HALOT
  rationale: La pregunta es retórica y apunta a la capacidad de resistir/ mantenerse firme. «Estar en pie» conserva la imagen corporal del hebreo y funciona bien en español bíblico.
- source_word: יַעֲקֹב
  english_pob_choice: Jacob
  chosen_spanish: Jacob
  alternatives_spanish:
  - Israel
  lexicon: HALOT
  rationale: El texto hebreo nombra a Jacob explícitamente; se mantiene el nombre propio, aunque funcione como designación del pueblo.
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la razón de la súplica. «Porque» expresa de manera directa la fuerza explicativa del hebreo.
- source_word: קָטֹן הוּא
  english_pob_choice: he is small
  chosen_spanish: es pequeño
  alternatives_spanish:
  - es pequeño de talla
  - es débil
  lexicon: HALOT
  rationale: קָטֹן denota pequeñez/littleness. «Es pequeño» mantiene la metáfora y evita interpretar prematuramente como debilidad.
theological_decisions:
- issue: Tratamiento del nombre divino en אֲדֹנָי יְהוִה
  english_pob_reading: Lord GOD
  chosen_spanish_reading: Yahvé, Señor
  alternative_spanish_readings:
  - Señor Yahvé
  - Señor Dios
  rationale: La POB inglesa usa una convención para evitar «Lord LORD» y señalar la combinación del título con el nombre divino. En español, «Yahvé, Señor» mantiene la referencia explícita al nombre revelado y conserva la tensión del compuesto sin máscara litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: La revisión inglesa más reciente sustituyó «stop» por «cease» para un registro más formal y más cercano a חֲדַל נָא. El español sigue esa intención general con una fórmula cortés y breve, pero evita el calco duro de «cesa» en el cuerpo principal.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוִה conforme al criterio del proyecto.
  - Se conserva «Jacob» en lugar de «Israel» para respetar el nombre del texto fuente.
  - La imagen de «estar en pie» reproduce la metáfora física del hebreo y evita una paráfrasis interpretativa excesiva.
