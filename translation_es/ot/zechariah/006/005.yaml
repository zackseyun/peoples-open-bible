translation:
  language: es
  text: 'Entonces el ángel respondió y me dijo: «Estos son los cuatro vientos[a] del cielo, que salen de estar delante del Señor de toda la tierra».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los cuatro espíritus del cielo». La palabra hebrea puede significar tanto «vientos» como «espíritus».
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּעַן
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió y dijo
  lexicon: HALOT
  rationale: ענה introduce una respuesta en discurso directo. En español, «respondió» reproduce bien la fórmula narrativa sin añadir más contenido que el hebreo.
- source_word: הַמַּלְאָךְ
  english_pob_choice: the angel
  chosen_spanish: el ángel
  alternatives_spanish:
  - el mensajero
  lexicon: HALOT
  rationale: En este contexto visionario se trata del ser celestial intérprete; «ángel» es el equivalente natural y ya reconocido en español bíblico.
- source_word: וַיֹּאמֶר אֵלַי
  english_pob_choice: said to me
  chosen_spanish: me dijo
  alternatives_spanish:
  - me habló
  - me contestó
  lexicon: HALOT
  rationale: La fórmula hebrea de habla directa admite en español «me dijo» con claridad y fidelidad, sin perder la relación explícita con el destinatario.
- source_word: אֵלֶּה
  english_pob_choice: these are
  chosen_spanish: Estas son
  alternatives_spanish:
  - Estas
  - Son estas
  lexicon: HALOT
  rationale: El hebreo identifica lo visto; en español se requiere la cópula para una cláusula natural y transparente.
- source_word: אַרְבַּע רֻחוֹת
  english_pob_choice: the four winds
  chosen_spanish: las cuatro vientos
  alternatives_spanish:
  - las cuatro espíritus
  - las cuatro corrientes
  lexicon: HALOT
  rationale: רֻחוֹת puede significar «vientos» o «espíritus». En la imagen apocalíptica y con el movimiento de salida, «vientos» es la lectura primaria; se conserva la tensión semántica con nota.
- source_word: הַשָּׁמַיִם
  english_pob_choice: of heaven
  chosen_spanish: del cielo
  alternatives_spanish:
  - de los cielos
  lexicon: HALOT
  rationale: En español bíblico actual, «del cielo» es natural y conserva el valor colectivo/trascendente de השמים en este contexto.
- source_word: יוֹצְאוֹת
  english_pob_choice: going out
  chosen_spanish: que salen
  alternatives_spanish:
  - saliendo
  - que van saliendo
  lexicon: HALOT
  rationale: El participio expresa movimiento en curso; «que salen» transmite ese aspecto de manera idiomática en español.
- source_word: מֵהִתְיַצֵּב
  english_pob_choice: from standing before
  chosen_spanish: de estar en pie
  alternatives_spanish:
  - de presentarse
  - de estar de pie
  lexicon: HALOT
  rationale: The hitpael of יצב indica ponerse o permanecer en posición de atención. «De estar en pie» conserva la imagen básica y evita interpretar más de lo que el hebreo dice.
- source_word: עַל
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - ante
  - en presencia de
  lexicon: HALOT
  rationale: Con התייצב, על expresa la posición de un subordinado frente a un superior. «Delante de» es claro y cercano al sentido relacional del original.
- source_word: אֲדוֹן
  english_pob_choice: Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el dueño
  - el soberano
  lexicon: HALOT
  rationale: Aquí אֲדוֹן es un título de soberanía divina. En español bíblico, «el Señor» comunica esa dignidad de forma reconocible; se mantiene junto al referente explícito «de toda la tierra».
- source_word: כָּל הָאָרֶץ
  english_pob_choice: of all the earth
  chosen_spanish: de toda la tierra
  alternatives_spanish:
  - de toda la creación
  - de toda la tierra
  lexicon: HALOT
  rationale: La visión tiene alcance universal. «Toda la tierra» conserva ese alcance sin reducirlo a una sola región.
theological_decisions:
- issue: Sentido de רֻחוֹת entre «vientos» y «espíritus»
  english_pob_reading: winds, with footnote preserving the alternative spirits reading
  chosen_spanish_reading: vientos, con nota que preserva la lectura «espíritus»
  alternative_spanish_readings:
  - espíritus
  - fuerzas
  rationale: El contexto visual y dinámico favorece «vientos», pero el hebreo permite genuinamente la alternativa «espíritus». Se conserva la tensión en una nota en vez de resolverla unilateralmente.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
- issue: Traducción del título divino אֲדוֹן כָּל הָאָרֶץ
  english_pob_reading: the Lord of all the earth
  chosen_spanish_reading: el Señor de toda la tierra
  alternative_spanish_readings:
  - el Dueño de toda la tierra
  - el Soberano de toda la tierra
  rationale: El título expresa autoridad universal. «Señor» mantiene el uso reverente y tradicional para un título divino, sin ocultar la soberanía sobre toda la tierra.
  doctrine_reference: Project terminology defaults for divine titles
translation_notes:
  revision_awareness: 'El borrador sigue la última revisión del POB en inglés: se mantuvo la estructura «que salen de estar en pie delante de» para reflejar con mayor cercanía מֵהִתְיַצֵּב y evitar expansiones interpretativas como «presentarse». También se preservó la nota alternativa sobre רֻחוֹת, porque el texto hebreo admite la doble lectura «vientos/espíritus».'
  spanish_consistency_notes:
  - Se usa «ángel» para הַמַּלְאָךְ conforme al contexto visionario.
  - Se conserva «Señor» para אֲדוֹן como título divino y «toda la tierra» para el alcance universal.
  - La fórmula «me dijo» mantiene la transparencia del discurso directo sin añadir matices ajenos al hebreo.
  - La nota [a] reproduce la tensión lexical principal; la nota [b] queda anclada en la palabra «vientos» para explicitar la alternativa semántica en español.
