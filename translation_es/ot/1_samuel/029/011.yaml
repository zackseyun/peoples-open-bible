base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/029/011.yaml
  text: So David rose early[a], he and his men, to go in the morning to return to the land of the Philistines[b]. And the Philistines went up to Jezreel.
  footnotes:
  - marker: a
    text: Or 'to go in the morning and return to the land of the Philistines.' The Hebrew infinitives can be rendered more formally.
    reason: lexical_alternative
  - marker: b
    text: '''Went up'' reflects the Hebrew idiom for movement to a place, often with topographical or military nuance; alternatively, ''marched up to Jezreel.'''
    reason: lexical_alternative
