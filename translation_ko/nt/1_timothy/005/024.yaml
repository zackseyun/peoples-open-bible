id: 1TI.5.24
reference: 1 Timothy 5:24
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Τινῶν ἀνθρώπων αἱ ἁμαρτίαι πρόδηλοί εἰσιν, προάγουσαι εἰς κρίσιν, τισὶν δὲ καὶ ἐπακολουθοῦσιν·
base_translation:
  language: en
  yaml_path: translation/nt/1_timothy/005/024.yaml
  text: The sins of some people are obvious[a], going before them to judgment[b], but for others they follow after.
  footnotes:
  - marker: a
    text: Or 'The sins of some people are evident, going before them to judgment.'
    reason: lexical_alternative
  - marker: b
    text: '''Judgment'' may refer to present evaluation in context, though the wording can also carry a broader sense of divine judgment.'
    reason: alternative_reading
translation:
  language: ko
  text: 어떤 사람들의 죄는 드러나 있어[a] 그들을 앞서 심판[b]으로 나아가지만, 다른 사람들의 죄는 뒤따라옵니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「어떤 사람들의 죄는 분명하여, 그들보다 먼저 심판에 들어간다」.
    reason: lexical_alternative
  - marker: b
    text: 「심판」은 본 문맥에서 현재의 평가를 가리킬 수도 있으나, 본 어구는 보다 폭넓게 신적 심판의 어감도 가질 수 있다.
    reason: alternative_reading
lexical_decisions:
- source_word: πρόδηλοί εἰσιν
  english_pob_choice: are obvious
  chosen_korean: 드러나 있어
  alternatives_korean:
  - 분명히 드러나
  - 명백하여
  lexicon: BDAG
  rationale: πρόδηλος의 「앞서 드러난·명백한」.
- source_word: προάγουσαι εἰς κρίσιν
  english_pob_choice: going before them to judgment
  chosen_korean: 그들을 앞서 심판으로 나아가지만
  alternatives_korean:
  - 심판을 향해 앞서가지만
  - 그들보다 먼저 심판에 도달하지만
  lexicon: BDAG
  rationale: προάγω의 「앞서 감」을 「앞서 ~ 나아가다」로.
- source_word: τισὶν δὲ καὶ ἐπακολουθοῦσιν
  english_pob_choice: for others they follow after
  chosen_korean: 다른 사람들의 죄는 뒤따라옵니다
  alternatives_korean:
  - 어떤 자들의 죄는 뒤늦게 드러납니다
  lexicon: BDAG
  rationale: ἐπακολουθέω의 「뒤따라감」을 살린다.
