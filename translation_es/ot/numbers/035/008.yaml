  yaml_path: translation/ot/numbers/035/008.yaml
  text: And the cities that you give from the possession of the sons of Israel—from the many you shall increase[a], and from the few you shall diminish. Each one, according to his inheritance that he inherits[b], shall give some of his cities to the Levites.
  footnotes:
