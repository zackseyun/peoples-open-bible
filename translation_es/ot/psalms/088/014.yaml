revisions:
- from: Pero yo[a], Yahvé, a ti he clamado; por la mañana mi oración te sale al encuentro.
  to: Pero yo, Yahvé, a ti clamo; por la mañana mi oración viene delante de ti[a].
  rationale: Se corrige el anclaje de la nota para que corresponda al verbo final, se reemplaza «te sale al encuentro» por «viene delante de ti» para reflejar mejor la imagen del hebreo y la decisión auditada en inglés, y se mejora la puntuación del vocativo. También se usa «clamo» para armonizar con el valor poético-presente adoptado por el POB inglés y sonar más natural que «he clamado» en este contexto.
