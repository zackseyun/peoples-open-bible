translation:
  language: es
  text: Y el rey Antíoco atravesaba las regiones altas[a], y oyó que en Elymais, en Persia, había una ciudad famosa por su riqueza, plata y oro;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las regiones superiores». El griego mantiene una referencia geográfica general a las zonas de arriba o del interior, sin precisar más.
    reason: lexical_alternative
lexical_decisions:
- source_word: διεπορεύετο
  english_pob_choice: was traveling through
  chosen_spanish: iba atravesando
  alternatives_spanish:
  - estaba viajando por
  - iba pasando por
  - atravesaba
  lexicon: LSJ
  rationale: El imperfecto griego expresa acción en curso. «Iba atravesando» conserva el matiz durativo y el movimiento a través de un territorio, con un español natural y no demasiado literal.
- source_word: τὰς ἐπάνω χώρας
  english_pob_choice: the upper regions
  chosen_spanish: las regiones altas
  alternatives_spanish:
  - las regiones superiores
  - las regiones de arriba
  - las tierras altas
  lexicon: LSJ
  rationale: «χώρας» puede ser regiones o tierras; «ἐπάνω» aporta la idea de altura/parte superior. «Regiones altas» mantiene la referencia espacial sin forzar una identificación geográfica más precisa que la del griego.
- source_word: Ἐλυμαΐς
  english_pob_choice: Elymais
  chosen_spanish: Elymais
  alternatives_spanish:
  - Elimaida
  - Elamais
  lexicon: LSJ
  rationale: Se conserva el nombre propio transliterado, siguiendo el uso estándar y la práctica del proyecto.
- source_word: ἐν τῇ Περσίδι
  english_pob_choice: in Persia
  chosen_spanish: en Persia
  alternatives_spanish:
  - en Persis
  - en la región persa
  lexicon: LSJ
  rationale: El griego puede entenderse como la región/provincia persa. «Persia» es claro para el lector español y corresponde al sentido geográfico general adoptado por la POB inglesa.
- source_word: πόλις ἔνδοξος
  english_pob_choice: a city renowned
  chosen_spanish: una ciudad famosa
  alternatives_spanish:
  - una ciudad renombrada
  - una ciudad ilustre
  - una ciudad célebre
  lexicon: LSJ
  rationale: «ἔνδοξος» señala notoriedad o renombre. «Famosa» comunica bien esa idea sin cargarla con una noción de gloria moral que el contexto no exige.
- source_word: πλούτῳ, ἀργυρίῳ, καὶ χρυσίῳ
  english_pob_choice: for wealth, silver, and gold
  chosen_spanish: por su riqueza, su plata y su oro
  alternatives_spanish:
  - por riquezas, plata y oro
  - por su riqueza, plata y oro
  lexicon: LSJ
  rationale: Los dativos enumeran el respecto en que la ciudad era célebre. En español, «por su riqueza, su plata y su oro» reproduce el énfasis acumulativo y hace explícito el valor posesivo implícito en la construcción.
translation_notes:
  revision_awareness: La versión española sigue el estado revisado de la POB inglesa sin cambios sustantivos reportados; se mantiene la decisión lexical principal de traducir el imperfecto con un valor durativo, conservar Elymais como nombre propio y reflejar la alternativa geográfica entre «Persia» y «Persis» mediante nota.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se conserva la transliteración de nombres propios cuando el griego presenta un topónimo específico sin equivalente español establecido.
  - Se evita «Cristo»/«Mesías» por no ser pertinentes al pasaje.
  - La puntuación con coma antes de la cláusula final sigue el flujo narrativo del original griego.
