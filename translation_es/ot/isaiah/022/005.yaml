revisions:
- from: Porque es día de tumulto, de atropello y de confusión, de parte de Yahvé, el Señor de los Ejércitos, en el Valle de la Visión[a], derribo de muro y clamor hacia el monte[b].
  to: Porque es un día de tumulto, de pisoteo y de confusión, de parte del Señor Yahvé de los Ejércitos[a], en el Valle de la Visión, derribo[b] del muro y clamor hacia el monte[c].
  rationale: Se revisa para preservar explícitamente ambos elementos de la fórmula divina hebrea (אֲדֹנָי + יְהוָה), corregir la ubicación y cobertura de las notas conforme al audit trail inglés, y mejorar la precisión léxica y la naturalidad del español con «un día de», «pisoteo» y «del muro».
  reviewer_model: gpt-5.4
