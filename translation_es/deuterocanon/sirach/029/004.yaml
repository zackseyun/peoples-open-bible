translation:
  language: es
  text: Muchos han considerado un préstamo como una ganancia inesperada[a], y han causado problemas a los que les ayudaron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «como un hallazgo» o «como algo encontrado», es decir, como si el dinero prestado fuera una ganancia inesperada y no algo que deba devolverse.
    reason: lexical_alternative
lexical_decisions:
- source_word: πολλοὶ
  english_pob_choice: Many
  chosen_spanish: Muchos
  alternatives_spanish:
  - Mucha gente
  - Numerosas personas
  lexicon: LSJ
  rationale: El griego introduce un sujeto indefinido plural. «Muchos» es natural, breve y conserva el alcance general sin añadir matices ajenos.
- source_word: ὡς εὕρεμα
  english_pob_choice: as a windfall
  chosen_spanish: como una ganancia inesperada
  alternatives_spanish:
  - como un hallazgo
  - como algo encontrado
  - como un golpe de suerte
  lexicon: LSJ
  rationale: εὕρεμα significa algo hallado o encontrado, pero en el contexto de un préstamo la idea es tratarlo como ganancia no merecida. «Ganancia inesperada» comunica ese valor sin forzar una expresión demasiado coloquial.
- source_word: ἐνόμισαν
  english_pob_choice: have regarded
  chosen_spanish: han considerado
  alternatives_spanish:
  - han pensado
  - han estimado
  - han juzgado
  lexicon: LSJ
  rationale: νομίζω aquí expresa la idea de considerar o estimar. El perfecto compuesto español ayuda a dar una fuerza proverbial o general, adecuada al estilo sapiencial.
- source_word: δάνος
  english_pob_choice: a loan
  chosen_spanish: un préstamo
  alternatives_spanish:
  - una deuda
  - una suma prestada
  lexicon: LSJ
  rationale: δάνος designa el préstamo mismo, no solo la condición de deuda. «Préstamo» es la equivalencia más directa y clara en español.
- source_word: παρέσχον πόνον
  english_pob_choice: have caused trouble
  chosen_spanish: han causado aflicción
  alternatives_spanish:
  - han causado trouble
  - han causado dolor
  - han provocado sufrimiento
  lexicon: LSJ
  rationale: La expresión significa literalmente «proporcionaron dolor/trabajo». En español, «aflicción» preserva el peso negativo del efecto sobre los ayudadores sin sonar mecánico.
- source_word: τοῖς βοηθήσασιν αὐτοῖς
  english_pob_choice: for those who helped them
  chosen_spanish: a los que les ayudaron
  alternatives_spanish:
  - a los que vinieron en su ayuda
  - a sus benefactores
  lexicon: LSJ
  rationale: El participio se refiere a quienes prestaron ayuda. «Les ayudaron» es directo y fiel; evita introducir un término social más específico que el griego no exige.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el griego de Swete 1909 y conserva la tensión léxica principal del verso: un préstamo tratado como ganancia hallada, seguido del perjuicio causado a quienes ayudaron. La redacción española mantiene el tono sapiencial general y la equivalencia óptima ya reflejada en el audit trail inglés.'
  spanish_consistency_notes:
  - Se mantiene «préstamo» para δάνος, coherente con el valor concreto del término.
  - «Ganancia inesperada» recoge el matiz de εὕρεμα sin convertirlo en interpretación excesiva.
  - Se usa «aflicción» para πόνον como alternativa natural a «trouble» en español bíblico contemporáneo.
  - No se introduce una categoría doctrinal; el verso es sapiencial y ético, no confesional.
