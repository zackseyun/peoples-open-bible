translation:
  language: es
  text: Todo mal es pequeño[a] comparado con el mal de una mujer; que la suerte de un pecador caiga sobre ella[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Todo mal es leve frente al mal de una mujer». El hebreo y el griego expresan una comparación, y puede formularse de más de una manera natural en español.'
    reason: lexical_alternative
  - marker: b
    text: La cláusula final puede entenderse como imprecación («que la suerte de un pecador caiga sobre ella») más que como una simple predicción futura («la suerte de un pecador caerá sobre ella»). El paralelo griego apoya ese matiz.
    reason: alternative_reading
lexical_decisions:
- source_word: מְעַט / μικρὰ
  english_pob_choice: small
  chosen_spanish: pequeño
  alternatives_spanish:
  - leve
  - poco
  lexicon: HALOT / LXX μικρός
  rationale: El sentido comparativo es de inferioridad o insignificancia. «Pequeño» funciona de forma natural en español con la construcción comparativa y conserva la dureza proverbial del hebreo y del griego.
- source_word: רָעָה / κακία
  english_pob_choice: evil
  chosen_spanish: mal
  alternatives_spanish:
  - maldad
  - maldad moral
  - daño
  lexicon: HALOT / LSJ
  rationale: Aquí el término abarca maldad y daño grave. «Mal» mantiene la amplitud semántica y la fuerza sentenciosa del original sin restringirlo solo a una noción moral abstracta.
- source_word: כְרָעַת / πρὸς κακίαν
  english_pob_choice: compared with the evil of
  chosen_spanish: comparado con el mal de
  alternatives_spanish:
  - en comparación con el mal de
  - frente al mal de
  lexicon: HALOT / BDAG
  rationale: La preposición comparativa pide una expresión explícita en español. «Comparado con» comunica la relación de contraste de la sentencia y evita una traducción demasiado literal pero poco natural.
- source_word: אִשָּׁה / γυναικός
  english_pob_choice: a woman
  chosen_spanish: una mujer
  alternatives_spanish:
  - una esposa
  - la mujer
  lexicon: HALOT / LSJ
  rationale: El singular indeterminado se conserva en español como «una mujer». No hay base textual para «esposa», y el proverbio usa una generalización singular, no un plural.
- source_word: גוֹרַל / κλῆρος
  english_pob_choice: lot
  chosen_spanish: suerte
  alternatives_spanish:
  - lote
  - porción
  - destino
  lexicon: HALOT / LSJ
  rationale: En español, «suerte» puede reproducir la idea de una porción asignada que recae sobre alguien. Aunque «lote» sería más literal, suena menos natural en este contexto sapiencial. Se mantiene la imagen de algo que le toca a una persona.
- source_word: חוֹטֵא / ἁμαρτωλοῦ
  english_pob_choice: a sinner
  chosen_spanish: un pecador
  alternatives_spanish:
  - el pecador
  - una persona pecadora
  lexicon: HALOT / LSJ
  rationale: El participio sustantivado designa a una persona caracterizada por el pecado. «Un pecador» preserva la forma genérica singular y el paralelo con el griego.
- source_word: יִפּוֹל עָלֶיהָ / ἐπιπέσοι αὐτῇ
  english_pob_choice: may ... fall upon her
  chosen_spanish: caiga sobre ella
  alternatives_spanish:
  - caiga sobre ella, ojalá
  - pueda caer sobre ella
  - caerá sobre ella
  lexicon: HALOT / LSJ
  rationale: El hebreo yiqtol y el optativo griego admiten valor desiderativo/imprecatorio. En español, «que ... caiga» expresa ese matiz con naturalidad y evita reducirlo a una simple profecía futura.
theological_decisions:
- issue: Tono imprecatorio del último miembro
  english_pob_reading: The final clause may be heard as an imprecation rather than a simple prediction.
  chosen_spanish_reading: «que la suerte de un pecador caiga sobre ella» como deseo/imprecación
  alternative_spanish_readings:
  - «la suerte de un pecador caerá sobre ella» como futuro
  - «pueda caer sobre ella la suerte de un pecador»
  rationale: El optativo griego y la modalidad hebrea favorecen una lectura volitiva o imprecatoria. El español con «que» transmite mejor esa fuerza que un futuro simple.
  doctrine_reference: Sirach 25:19; audit trail English footnote b
- issue: Mantenimiento de la comparación intensiva
  english_pob_reading: Any evil is small compared with the evil of a woman.
  chosen_spanish_reading: «Todo mal es pequeño comparado con el mal de una mujer»
  alternative_spanish_readings:
  - «Cualquier mal es poco comparado con el mal de una mujer»
  - «Todo mal es leve frente al mal de una mujer»
  rationale: La comparación se conserva sin suavizar la aspereza del proverbio. «Todo mal» refleja el alcance totalizante de πᾶσα/מְעַט ... רָעָה dentro de la sentencia sapiencial.
  doctrine_reference: Sirach 25:19; audit trail English footnote a
translation_notes:
  revision_awareness: El texto sigue de cerca el consenso alto de la fuente hebrea y del paralelo griego; no se aplicaron revisiones posteriores al pasaje en el expediente auditado.
  spanish_consistency_notes:
  - Se usa «mal» para רָעָה/κακία en sentido amplio de maldad o mal grave.
  - Se mantiene «mujer» en singular, sin neutralizar ni convertir en plural.
  - Se conserva la imagen de «suerte» para גוֹרַל/κλῆρος, con el matiz de porción asignada.
  - La última cláusula se formula como desiderativa/imprecatoria para reflejar el hebreo y el optativo griego.
  - La puntuación separa con punto y coma las dos mitades, acorde con el ritmo proverbial del original.
