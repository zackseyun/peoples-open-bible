translation:
  language: es
  text: Y de ella presentará uno de cada ofrenda como una contribución[a] a Yahvé; pertenecerá al sacerdote que rocía[b] la sangre de las ofrendas de paz[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como una ofrenda elevada a Yahvé». El término hebreo se refiere a una porción apartada para Dios y asignada al sacerdote.
    reason: lexical_alternative
  - marker: b
    text: O «que salpica» o «que esparce» la sangre de las ofrendas de paz.
    reason: lexical_alternative
  - marker: c
    text: «Ofrendas de paz» también puede traducirse «ofrendas de comunión» o «ofrendas de bienestar».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִקְרִיב
  english_pob_choice: he shall present
  chosen_spanish: presentará
  alternatives_spanish:
  - ofrecerá
  - hará subir
  - traerá
  lexicon: HALOT
  rationale: El hiphil de קרב expresa acercar/presentar una ofrenda. «Presentará» conserva el acto cultual sin introducir un matiz más técnico o más interpretativo que el hebreo.
- source_word: מִמֶּנּוּ
  english_pob_choice: from it
  chosen_spanish: de él
  alternatives_spanish:
  - de ello
  - de ella
  - de eso
  lexicon: HALOT
  rationale: El sufijo pronominal remite al conjunto de la ofrenda de comunión mencionada antes. En español, «de él» es una forma natural para referirse al conjunto sacrificial como unidad concreta, sin forzar el género más allá del contexto.
- source_word: אֶחָד
  english_pob_choice: one
  chosen_spanish: uno
  alternatives_spanish:
  - una porción
  - un solo elemento
  lexicon: HALOT
  rationale: El hebreo dice simplemente «uno»; el objeto queda implícito por el contexto. «Uno» preserva esa concisión.
- source_word: מִכָּל קָרְבָּן
  english_pob_choice: from each offering
  chosen_spanish: de cada ofrenda
  alternatives_spanish:
  - de toda ofrenda
  - de cada sacrificio
  lexicon: HALOT
  rationale: 'La distribución es clara: una parte de cada ofrenda. «De cada ofrenda» comunica bien el sentido distributivo del hebreo sin añadir información.'
- source_word: תְּרוּמָה
  english_pob_choice: as a contribution
  chosen_spanish: como una contribución
  alternatives_spanish:
  - como una ofrenda elevada
  - como una ofrenda apartada
  - como una ofrenda alzada
  lexicon: HALOT
  rationale: תְּרוּמָה designa una porción apartada para Yahvé y asignada al sacerdote. «Contribución» es claro y publicable en español moderno; las alternativas más literales son posibles, pero menos transparentes para lectores no especializados.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - para Yahvé
  - a YHWH
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto para el nombre divino: Yahvé. La preposición «a» refleja bien el movimiento de dedicación del lamed en este contexto.'
- source_word: לַכֹּהֵן
  english_pob_choice: to the priest
  chosen_spanish: al sacerdote
  alternatives_spanish:
  - para el sacerdote
  - al presbítero
  lexicon: HALOT
  rationale: El destinatario legal de la porción es el sacerdote. «Al sacerdote» es la forma natural y fiel en español.
- source_word: הַזֹּרֵק
  english_pob_choice: who sprinkles
  chosen_spanish: que rocía
  alternatives_spanish:
  - que esparce
  - que salpica
  - que derrama
  lexicon: HALOT
  rationale: El participio describe la acción ritual con la sangre. Tras el ajuste revisionado del inglés POB hacia «sprinkles», «rocía» expresa mejor el uso cultual que «lanza/arroja» y mantiene naturalidad en español.
- source_word: אֶת דַּם הַשְּׁלָמִים
  english_pob_choice: the blood of the peace offerings
  chosen_spanish: la sangre de los sacrificios de comunión
  alternatives_spanish:
  - la sangre de las ofrendas de paz
  - la sangre de los sacrificios de bienestar
  - la sangre de las ofrendas de comunión
  lexicon: HALOT
  rationale: 'שְׁלָמִים admite varias equivalencias: paz, comunión, bienestar. Para español, «sacrificios de comunión» comunica con mayor claridad la idea relacional y mantiene la categoría sacrificial; se conserva la tensión lexical frente al término tradicional «ofrendas de paz».'
- source_word: ל֥וֹ יִהְיֶה
  english_pob_choice: it shall belong to
  chosen_spanish: pertenecerá
  alternatives_spanish:
  - será suyo
  - le corresponderá
  - será para él
  lexicon: HALOT
  rationale: El idiomatismo expresa asignación legal/posesoria. «Pertenecerá» transmite con claridad la adjudicación al sacerdote.
theological_decisions:
- issue: Nombre divino YHWH
  english_pob_reading: to Yahweh
  chosen_spanish_reading: a Yahvé
  alternative_spanish_readings:
  - para Yahvé
  - a YHWH
  rationale: Se mantiene la política del proyecto de no ocultar el nombre divino con una sustitución reverencial. «Yahvé» es la forma española establecida en este marco.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → Yahvé'
- issue: Traducción de שְׁלָמִים
  english_pob_reading: peace offerings
  chosen_spanish_reading: sacrificios de comunión
  alternative_spanish_readings:
  - ofrendas de paz
  - sacrificios de bienestar
  - ofrendas de comunión
  rationale: El término admite varias soluciones. «Sacrificios de comunión» evita una traducción demasiado automática de «peace» como mera ausencia de guerra y comunica mejor la dimensión cultual-relacional del hebreo. Se conserva la tensión interpretativa sin borrar la categoría tradicional.
  doctrine_reference: HALOT / POB lexical note on שְׁלָמִים
- issue: Destino de la porción
  english_pob_reading: it shall belong to the priest
  chosen_spanish_reading: pertenecerá al sacerdote
  alternative_spanish_readings:
  - será del sacerdote
  - le corresponderá al sacerdote
  rationale: El hebreo establece una asignación legal. «Pertenecerá» expresa propiedad/entrega sin ampliar el sentido más allá del texto.
  doctrine_reference: Contexto legal-sacrificial de Levítico 7
- issue: Acción ritual sobre la sangre
  english_pob_reading: who sprinkles the blood
  chosen_spanish_reading: que rocía la sangre
  alternative_spanish_readings:
  - que salpica la sangre
  - que esparce la sangre
  rationale: Se preserva el matiz ritual y se sigue la revisión inglesa que corrigió «throws» a «sprinkles». «Rociar» es más preciso y natural en español litúrgico.
  doctrine_reference: Revisión auditada del POB en Lev 7:14
translation_notes:
  revision_awareness: El contexto inglés del POB fue revisado en la cláusula final de 'throws the blood' a 'sprinkles the blood' por mayor precisión ritual; la versión española refleja esa revisión con 'rocía'. También se preserva la nota lexical del sustantivo שְׁלָמִים, donde el inglés mantiene 'peace offerings' pero reconoce alternativas equivalentes; en español se optó por 'sacrificios de comunión' y se documentan las variantes tradicionales y semánticas. La referencia a Yahvé sigue la política del proyecto para YHWH.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para el nombre divino, conforme al estándar del proyecto.
  - Se evita 'SEÑOR' como sustitución reverencial en el cuerpo del texto.
  - Se usa 'sacerdote' para כֹּהֵן y no un equivalente eclesiástico posterior.
  - La preposición y el orden de la frase buscan claridad en español sin perder el paralelismo legal del hebreo.
  - Las notas a, b, c están ancladas en el texto y respetan el orden de decisiones lexicográficas relevantes.
