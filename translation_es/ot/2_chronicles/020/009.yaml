translation:
  language: es
  text: 'Si viene sobre nosotros un desastre: espada, juicio, peste o hambruna, nos pondremos en pie delante de esta casa y delante de ti, porque tu nombre está en esta casa[a], y clamaremos a ti desde nuestra angustia, y tú oirás y salvarás.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O bien, «tu nombre está sobre esta casa», es decir, esta casa lleva tu nombre.
    reason: lexical_alternative
lexical_decisions:
- source_word: רָעָה
  english_pob_choice: disaster
  chosen_spanish: mal
  alternatives_spanish:
  - desastre
  - calamidad
  lexicon: HALOT
  rationale: En este contexto el sustantivo designa una calamidad que sobreviene, no mal moral. «Mal» mantiene brevedad y amplitud semántica en español, aunque «desastre» también sería posible.
- source_word: חֶרֶב
  english_pob_choice: sword
  chosen_spanish: espada
  alternatives_spanish:
  - guerra
  lexicon: HALOT
  rationale: Se conserva el referente concreto, como en la lista hebrea de calamidades. «Espada» preserva la imagen de violencia bélica sin abstraerla a «guerra».
- source_word: שְׁפוֹט
  english_pob_choice: judgment
  chosen_spanish: juicio
  alternatives_spanish:
  - castigo
  - actos de juicio
  lexicon: HALOT
  rationale: El hebreo funciona aquí como sustantivo en la enumeración de males. «Juicio» reproduce la forma breve y puede incluir la idea de juicio punitivo, sin resolver la tensión entre acto judicial y castigo.
- source_word: דֶבֶר
  english_pob_choice: pestilence
  chosen_spanish: peste
  alternatives_spanish:
  - pestilencia
  - plaga
  lexicon: HALOT
  rationale: «Peste» comunica una aflicción epidémica y suena natural en español contemporáneo; «pestilencia» preservaría más el registro bíblico, pero es menos usual.
- source_word: רָעָב
  english_pob_choice: famine
  chosen_spanish: hambre
  alternatives_spanish:
  - hambre generalizada
  - escasez
  lexicon: HALOT
  rationale: Aunque «hambre» es más amplio, aquí el contexto apunta a una carencia colectiva severa; se mantiene el sentido de escasez extrema sin volver la frase demasiado técnica.
- source_word: נַעַמְדָה
  english_pob_choice: we will stand
  chosen_spanish: nos pondríamos en pie
  alternatives_spanish:
  - nos pondremos en pie
  - nos mantendremos en pie
  lexicon: HALOT
  rationale: El cohortativo expresa una acción asumida en la situación hipotética. «Nos pondríamos en pie» conserva ese matiz condicional y suena natural en español.
- source_word: לִפְנֵי הַבַּיִת הַזֶּה
  english_pob_choice: before this house
  chosen_spanish: delante de esta casa
  alternatives_spanish:
  - frente a esta casa
  - ante esta casa
  lexicon: HALOT
  rationale: «Casa» sigue el hebreo y evita traducir interpretativamente como «templo». «Delante de» reproduce bien el valor espacial y ritual de la expresión.
- source_word: וּלְפָנֶיךָ
  english_pob_choice: and before you
  chosen_spanish: y delante de ti
  alternatives_spanish:
  - y ante ti
  - y en tu presencia
  lexicon: HALOT
  rationale: Se mantiene el paralelismo con la cláusula anterior y la dirección personal de la oración a Dios.
- source_word: כִּי שִׁמְךָ בַּבַּיִת הַזֶּה
  english_pob_choice: for your name is in this house
  chosen_spanish: porque tu nombre está en esta casa
  alternatives_spanish:
  - porque tu nombre está sobre esta casa
  - porque esta casa lleva tu nombre
  lexicon: HALOT
  rationale: La opción principal conserva el idiom hebreo sin explicarlo en el cuerpo del texto. En español, «está en esta casa» mantiene la afirmación de presencia/posesión asociada al nombre divino.
- source_word: וְנִזְעַק
  english_pob_choice: and we will cry out
  chosen_spanish: clamaremos
  alternatives_spanish:
  - clamaremos a ti
  - gritaremos
  lexicon: HALOT
  rationale: «Clamar» expresa una súplica urgente y bíblica, más adecuada que un simple «llamar». Se integró en la forma verbal natural del español.
- source_word: מִצָּרָתֵנוּ
  english_pob_choice: from our distress
  chosen_spanish: desde nuestra angustia
  alternatives_spanish:
  - en nuestra angustia
  - a causa de nuestra angustia
  lexicon: HALOT
  rationale: «Desde» reproduce bien la idea de origen o punto de partida de la súplica. «Angustia» da un tono más existencial y fluido en español, sin perder la aflicción concreta.
- source_word: וְתִשְׁמַע
  english_pob_choice: and you will hear
  chosen_spanish: y tú oirás
  alternatives_spanish:
  - y escucharás
  - y atenderás
  lexicon: HALOT
  rationale: «Oír» mantiene la correspondencia verbal simple del hebreo. En este contexto, el verbo implica atender la petición.
- source_word: וְתוֹשִׁיעַ
  english_pob_choice: and save
  chosen_spanish: y salvarás
  alternatives_spanish:
  - y librarás
  - y rescatarás
  lexicon: HALOT
  rationale: «Salvar» preserva la amplitud teológica del verbo, sin limitarlo a una sola forma de liberación.
theological_decisions:
- issue: Fórmula del nombre divino en relación con la casa
  english_pob_reading: 'Retain the Hebrew idiom in the main text: ''your name is in this house.'''
  chosen_spanish_reading: 'Conservar el idioma hebreo en el texto principal: «tu nombre está en esta casa».'
  alternative_spanish_readings:
  - tu nombre está sobre esta casa
  - esta casa lleva tu nombre
  rationale: La frase conserva la tensión entre presencia, pertenencia y consagración sin resolverla en una paráfrasis explicativa. En español, «está en esta casa» mantiene la literalidad suficiente y la ambigüedad teológica del hebreo.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior eliminando el marcador de nota que no aparecía en el texto. No se requieren notas al pie para esta redacción porque la alternativa lexical-teológica principal puede mantenerse en la formulación base sin anchura textual adicional.
  spanish_consistency_notes:
  - Se mantuvo «casa» para בית y no «templo», siguiendo el criterio del POB en inglés.
  - Se usó «Yahvé» no porque aparezca explícitamente aquí, sino como término de proyecto cuando corresponda; en este versículo el texto hebreo usa pronombres y referencia implícita a Dios.
  - Se prefirió una sintaxis española natural sin perder la serie de calamidades ni el paralelismo de la oración.
