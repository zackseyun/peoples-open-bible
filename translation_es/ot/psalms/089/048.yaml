translation:
  language: es
  text: Acuérdate de cuán breve es mi vida. ¿Para qué, en vano,[a] has creado a todos los hijos del hombre?[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para qué vanidad» / «para qué futilidad». El hebreo tiene una expresión muy concisa que puede expresar vanidad, vacío o futility; «en vano» busca comunicar ese sentido con naturalidad en español.
    reason: lexical_alternative
  - marker: b
    text: O «a toda la humanidad» / «a todos los seres humanos». El hebreo dice literalmente «a todos los hijos del hombre».
    reason: lexical_alternative
lexical_decisions:
- source_word: זְכָר
  english_pob_choice: Remember
  chosen_spanish: Acuérdate
  alternatives_spanish:
  - Recuerda
  - Ten presente
  lexicon: HALOT
  rationale: Es un imperativo directo dirigido a Dios; en español, «acuérdate» conserva el tono de súplica y la forma verbal natural del ruego.
- source_word: מֶה חָלֶד
  english_pob_choice: how short my lifetime is
  chosen_spanish: cuán breve es mi vida
  alternatives_spanish:
  - qué corta es mi vida
  - cuán fugaz es mi vida
  - cuál es la medida de mi vida
  lexicon: HALOT
  rationale: חָלֶד se refiere al lapso o duración de la vida; el valor exclamativo/interrogativo de מֶה se expresa con naturalidad en español como «cuán breve», conservando el lamento por la brevedad de la vida.
- source_word: עַל מַה
  english_pob_choice: For what
  chosen_spanish: ¿Para qué
  alternatives_spanish:
  - ¿Por qué
  - ¿Con qué propósito
  lexicon: HALOT
  rationale: La pregunta introduce la razón o propósito retórico de la creación; «¿Para qué» preserva mejor la fuerza final/purposiva que un simple «¿por qué».
- source_word: שָּׁוְא
  english_pob_choice: vanity
  chosen_spanish: vanidad
  alternatives_spanish:
  - vacío
  - futilidad
  - en vano
  lexicon: HALOT
  rationale: שָׁוְא puede denotar vacío, futilidad o vanidad. «Vanidad» mantiene el registro poético y la tensión semántica del término en un contexto de lamentación.
- source_word: בָּרָאתָ
  english_pob_choice: you have created
  chosen_spanish: has creado
  alternatives_spanish:
  - creaste
  - has hecho
  lexicon: HALOT
  rationale: El perfecto segunda persona con Dios como sujeto se traduce naturalmente con el presente perfecto español, que enlaza la acción creadora con la queja presente.
- source_word: כָל בְּנֵי אָדָם
  english_pob_choice: all the sons of man
  chosen_spanish: a todos los hijos del hombre
  alternatives_spanish:
  - a toda la humanidad
  - a todos los seres humanos
  - a todos los hijos de Adán
  lexicon: HALOT
  rationale: La frase hebrea es literalmente masculina y genérica. Se conserva el giro idiomático para reflejar el paralelismo y la forma del original, dejando alternativas inclusivas como posible aclaración.
theological_decisions:
- issue: Referencia humana genérica en בְּנֵי אָדָם
  english_pob_reading: all the sons of man
  chosen_spanish_reading: a todos los hijos del hombre
  alternative_spanish_readings:
  - a toda la humanidad
  - a todos los seres humanos
  rationale: El hebreo usa una expresión masculina genérica para referirse a seres humanos. La traducción principal conserva la forma idiomática del original por fidelidad textual, mientras que las alternativas aclaran el sentido inclusivo sin borrar la huella formal del hebreo.
  doctrine_reference: 'DOCTRINE.md §Translation philosophy 4; Contested terms: אָדָם'
translation_notes:
  revision_awareness: La redacción sigue la revisión que aclaró la fuerza interrogativa de עַל מַה; en español se resuelve con «¿Para qué has creado…?» para evitar una lectura declarativa. No se añadió material interpretativo más allá de la brevedad explícita de חָלֶד y del giro idiomático de בְּנֵי אָדָם.
  spanish_consistency_notes:
  - Se conserva «Dios» implícito en el verbo dirigido a Yahvé mediante el imperativo de segunda persona.
  - Se mantiene el tono poético y lamentativo con vocabulario actual pero digno.
  - «Hijos del hombre» reproduce la forma masculina genérica del hebreo sin neutralizarla en el texto principal.
