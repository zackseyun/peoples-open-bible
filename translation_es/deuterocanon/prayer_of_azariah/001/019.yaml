translation:
  language: es
  text: No nos avergüences[a], sino muéstranos misericordia según tu clemencia[b] y según la abundancia de tu misericordia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «nos deshonres» o «nos cubras de vergüenza».
    reason: lexical_alternative
  - marker: b
    text: O «gentileza», «indulgencia» o «benignidad» para ἐπιείκεια.
    reason: lexical_alternative
lexical_decisions:
- source_word: καταισχύνῃς
  english_pob_choice: put us to shame
  chosen_spanish: avergüences
  alternatives_spanish:
  - nos deshonres
  - nos cubras de vergüenza
  - nos humilles
  lexicon: BDAG
  rationale: El verbo griego expresa la idea de avergonzar o deshonrar. En español, «avergüences» conserva el ruego directo y es natural en una oración; «deshonres» sería correcto, pero menos idiomático en este contexto súplica.
- source_word: ποίησον μεθʼ ἡμῶν ἔλεος
  english_pob_choice: show us mercy
  chosen_spanish: haznos misericordia
  alternatives_spanish:
  - muéstranos misericordia
  - trátanos con misericordia
  - haznos gracia
  lexicon: LEH
  rationale: La expresión griega es literalmente «haz misericordia con nosotros». «Haznos misericordia» mantiene la fuerza verbal de ποιέω y refleja más de cerca el giro original que una formulación más lisa como «muéstranos misericordia».
- source_word: ἐπιείκειάν
  english_pob_choice: gentleness
  chosen_spanish: clemencia
  alternatives_spanish:
  - gentileza
  - mansedumbre
  - indulgencia
  lexicon: BDAG
  rationale: ἐπιείκεια abarca clemencia, benignidad o lenidad. En español, «clemencia» preserva mejor el matiz de trato benigno o indulgente de Dios que «gentileza», que sonaría demasiado interpersonal y débil en este contexto de súplica.
- source_word: πλῆθος
  english_pob_choice: abundance
  chosen_spanish: abundancia
  alternatives_spanish:
  - multitud
  - grandeza
  - plenitud
  lexicon: LEH
  rationale: El sustantivo expresa abundancia cuantitativa. «Abundancia» es la equivalencia más natural en español y mantiene el énfasis en la sobreabundancia de la misericordia divina.
- source_word: ἐλέους
  english_pob_choice: mercy
  chosen_spanish: misericordia
  alternatives_spanish:
  - compasión
  - piedad
  - bondad
  lexicon: BDAG
  rationale: En este contexto penitencial, «misericordia» reproduce bien el campo semántico de ἔλεος y conserva el lenguaje devocional sin perder precisión.
theological_decisions:
- issue: Distinguir ἐπιείκεια de ἔλεος en la petición
  english_pob_reading: '''gentleness'' and ''mercy'' are kept distinct rather than collapsing both into mercy-language'
  chosen_spanish_reading: «clemencia» y «misericordia» se mantienen distintas
  alternative_spanish_readings:
  - «gentileza» y «misericordia»
  - «indulgencia» y «misericordia»
  - fusionarlas como «misericordia» en ambos miembros
  rationale: 'El griego usa dos términos relacionados pero no idénticos. Mantenerlos diferenciados preserva la textura retórica de la oración: se apela tanto a la disposición benigna de Dios como a la abundancia de su misericordia.'
  doctrine_reference: DOCTRINE.md § Translation philosophy 5
translation_notes:
  revision_awareness: El audit trail inglés revisó la primera redacción de "deal with us in mercy" a "show us mercy" por naturalidad. En español, «haznos misericordia» conserva mejor la literalidad verbal de ποίησον μεθʼ ἡμῶν ἔλεος sin perder fluidez, por lo que no depende de la reformulación inglesa más suave.
  spanish_consistency_notes:
  - Se mantiene «misericordia» para ἔλεος de forma consistente con el uso devocional y penitencial.
  - Se evita «SEÑOR» o términos de sustitución no presentes en el griego.
  - Se conserva la distinción semántica entre la cualidad divina de ἐπιείκεια y la misericordia abundante de ἔλεος.
  - La puntuación sigue el paralelismo del griego con una cláusula negativa seguida de dos peticiones paralelas.
