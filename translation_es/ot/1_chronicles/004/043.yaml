translation:
  language: es
  text: Y derribaron al remanente[a] de los sobrevivientes de Amalec, y habitaron[b] allí hasta el día de hoy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Alternativa posible: «el remanente que había escapado de Amalec» o «de los amalecitas». El hebreo combina dos términos casi sinónimos para subrayar a los que quedaron tras la destrucción.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «y se establecieron allí hasta el día de hoy». El verbo puede expresar tanto vivir como asentarse en un lugar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּכּוּ
  english_pob_choice: they struck down
  chosen_spanish: derrotaron
  alternatives_spanish:
  - hirieron
  - golpearon
  - mataron
  lexicon: HALOT
  rationale: El verbo hebreo נכה en esta forma narrativa puede expresar un golpe o una derrota militar. En español, «derrotaron» comunica el resultado bélico sin añadir explícitamente la idea de muerte más allá de lo que el contexto permite.
- source_word: שְׁאֵרִית הַפְּלֵטָה
  english_pob_choice: the remnant of the survivors
  chosen_spanish: el remanente de los sobrevivientes
  alternatives_spanish:
  - el remanente de los escapados
  - el resto de los que habían escapado
  - el remanente de los sobrevivientes
  lexicon: HALOT
  rationale: 'Se conservan ambos sustantivos cercanos del hebreo para mantener el énfasis acumulativo: no solo un «remanente», sino los «sobrevivientes» o escapados que quedaron tras la devastación.'
- source_word: לַעֲמָלֵק
  english_pob_choice: of Amalek
  chosen_spanish: de Amalec
  alternatives_spanish:
  - de los amalecitas
  - perteneciente a Amalec
  lexicon: HALOT
  rationale: El hebreo nombra a Amalec como entidad/pueblo; «de Amalec» es la forma más cercana y evita una expansión interpretativa innecesaria, aunque «amalecitas» sería posible en español.
- source_word: וַיֵּשְׁבוּ
  english_pob_choice: they lived / they settled
  chosen_spanish: habitaron
  alternatives_spanish:
  - vivieron
  - se establecieron
  - dieron residencia
  lexicon: HALOT
  rationale: ישב puede significar vivir, habitar o establecerse. «Habitaron» es más solemne y conserva la idea de permanencia en un lugar, sin forzar una lectura técnica de colonización o asentamiento.
- source_word: עַד הַיּוֹם הַזֶּה
  english_pob_choice: to this day
  chosen_spanish: hasta el día de hoy
  alternatives_spanish:
  - hasta hoy
  - hasta este día
  lexicon: HALOT
  rationale: Es la equivalencia idiomática normal en español para la fórmula narrativa hebrea, manteniendo el valor temporal continuo desde la perspectiva del narrador.
translation_notes:
  revision_awareness: La redacción sigue de cerca el hebreo narrativo וַיַּכּוּ / וַיֵּשְׁבוּ y conserva la duplicación semántica de שְׁאֵרִית הַפְּלֵטָה. Se toma en cuenta la revisión inglesa que prefirió el pretérito simple («lived») frente al perfecto, por lo que en español se usa un pasado simple natural y no un presente perfecto.
  spanish_consistency_notes:
  - Se evita «SEÑOR» porque el texto no contiene el tetragrámaton ni una cita explícita del nombre divino.
  - «Amalec» se mantiene como nombre propio, no como «amalecitas», en el cuerpo principal, para reflejar la forma breve del hebreo.
  - «Habitaron» conserva un matiz más formal que «vivieron», adecuado para una narración histórica bíblica.
  - No se introduce una lectura de aniquilación total; el hebreo solo dice que fueron derrotados, no especifica el alcance exacto de la muerte.
