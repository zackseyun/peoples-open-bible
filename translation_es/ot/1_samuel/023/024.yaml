base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/023/024.yaml
  text: They arose and went to Ziph ahead of Saul[a]. Now David and his men were in the wilderness of Maon, in the Arabah[b], to the south of the Jeshimon.
  footnotes:
  - marker: a
    text: Or 'to the right of the Jeshimon'; the Hebrew expression literally uses 'right hand/right side,' which in geographic usage can mean 'south.'
    reason: lexical_alternative
  - marker: b
    text: '''The Jeshimon'' may also be understood as ''the wasteland'' or ''the desert,'' but here it likely functions as a place name.'
    reason: lexical_alternative
