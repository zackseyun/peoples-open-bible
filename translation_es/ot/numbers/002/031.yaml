review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien el sentido básico del hebreo: total de los contados del campamento de Dan, cifra exacta, y orden de marcha al final según sus enseñas. Sin embargo, varias elecciones españolas no son las más fieles ni naturales: «contabilizados» suena administrativo y menos propio de un censo bíblico que «censados»; «para el campamento de Dan» es menos idiomático que «del campamento de Dan»; «al último» es poco natural en español general para orden de marcha, donde «al final» o «en último lugar» refleja mejor לָאַחֲרֹנָה; y «por sus estandartes» expresa causa o medio más que orden/distribución, mientras que «según sus estandartes» reproduce mejor לְדִגְלֵיהֶם en este contexto.'
  spanish_quality_summary: La redacción es comprensible, pero tiene giros poco naturales para un español bíblico claro y digno. «Todos los contabilizados» y «Saldrán al último por sus estandartes» suenan forzados. La revisión propuesta mejora fluidez, registro y precisión semántica sin apartarse del texto fuente.
  glossary_alignment: No hay términos teológicos mayores en juego. La revisión respeta la transliteración «Dan» y mantiene «estandartes» para דגל, en línea con la justificación del POB; además, conserva la cifra exacta y evita añadir «hombres». Se añade la nota léxica alternativa sobre «bajo sus banderas», ya presente en el rastro inglés.
  issues:
  - severity: medium
    issue: «los contabilizados»
    rationale: Aunque posible, suena técnico-administrativo y menos natural que «los censados» para הַפְּקֻדִים en un resumen censal bíblico.
  - severity: medium
    issue: «para el campamento de Dan»
    rationale: En español, la relación de pertenencia/resumen censal se expresa con más naturalidad como «del campamento de Dan».
  - severity: medium
    issue: «al último»
    rationale: Es una formulación poco idiomática en español general; «al final» o «en último lugar» comunica mejor el orden de marcha indicado por לָאַחֲרֹנָה.
  - severity: medium
    issue: «por sus estandartes»
    rationale: «Por» puede sugerir medio o causa; «según sus estandartes» refleja mejor la organización por enseñas tribales. Además, conviene conservar la alternativa léxica del inglés en nota.
  revised_spanish_text: Todos los censados del campamento de Dan fueron 157,600. Saldrán al final según sus estandartes[a].
  revised_footnotes:
  - marker: a
    text: O «bajo sus banderas». El término hebreo se refiere a los estandartes tribales o a las agrupaciones organizadas en torno a ellos en la disposición del campamento de Israel.
    reason: lexical_alternative
  revision_rationale: 'Se ajustó el español para mayor naturalidad y fidelidad contextual: «censados» refleja mejor el participio pasivo en un contexto de censo; «del campamento» suena más idiomático; «al final» expresa con claridad el orden de marcha; y «según sus estandartes» conserva mejor la relación organizativa del hebreo. Se añadió la nota alternativa correspondiente al inglés auditado.'
