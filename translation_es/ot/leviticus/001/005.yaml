translation:
  language: es
  text: Y él degollará el toro[a] delante de Yahvé, y los hijos de Aarón, los sacerdotes, presentarán la sangre y rociarán[b] la sangre sobre el altar, por todos lados, que está a la entrada de la tienda de reunión.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «hijo del ganado», una expresión idiomática para un bovino; aquí, «toro».
    reason: lexical_alternative
  - marker: b
    text: O «arrojarán la sangre» o, más tradicionalmente, «aspersarán la sangre». El verbo hebreo denota lanzar o aplicar ritualmente la sangre.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשָׁחַט
  english_pob_choice: he shall slaughter
  chosen_spanish: degollará
  alternatives_spanish:
  - sacrificará
  - matará ritualmentee
  lexicon: HALOT
  rationale: En este contexto ritual, el hebreo indica la matanza sacrificial del animal. «Degollar» preserva la precisión sacrificial mejor que «matar», que es demasiado general, y suena más natural que una calca técnica en español.
- source_word: בֶּן הַבָּקָר
  english_pob_choice: bull
  chosen_spanish: toro
  alternatives_spanish:
  - buey
  - res
  lexicon: HALOT
  rationale: La expresión hebrea literalmente es un idiomático «hijo del ganado». En español, «toro» comunica de forma clara y digna el animal sacrificial. Aunque el registro inglés actual usa «bull», el español puede usar «toro» sin perder la referencia bovina del contexto.
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - ante Yahvé
  - en presencia de Yahvé
  lexicon: HALOT
  rationale: Se conserva el nombre divino como «Yahvé» según la norma del proyecto. «Delante de» reproduce bien la localización ritual y mantiene el valor espacial del hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
  rationale: La decisión doctrinal del proyecto exige transliterar el Nombre divino como «Yahvé», no sustituirlo por un título encubridor. Esto preserva la identidad del nombre de pacto del texto fuente.
- source_word: וְהִקְרִיבוּ
  english_pob_choice: shall present
  chosen_spanish: presentarán
  alternatives_spanish:
  - ofrecerán
  - acercarán
  lexicon: HALOT
  rationale: El verbo hiphil de קרב aquí describe el acto sacerdotal de acercar/presentar la sangre para el rito. «Presentarán» conserva la función concreta de la acción sin cargarla con el sentido más amplio de «ofrecer».
- source_word: בְּנֵי אַהֲרֹן הַכֹּהֲנִים
  english_pob_choice: Aaron’s sons, the priests
  chosen_spanish: los hijos de Aarón, los sacerdotes
  alternatives_spanish:
  - los hijos sacerdotales de Aarón
  - los sacerdotes, hijos de Aarón
  lexicon: HALOT
  rationale: 'Se mantiene la doble identificación: filiación y oficio. En español, la aposición «los sacerdotes» aclara que no se trata del oferente sino del personal sacerdotal encargado de la sangre.'
- source_word: הַדָּם
  english_pob_choice: the blood
  chosen_spanish: la sangre
  alternatives_spanish:
  - sangre
  lexicon: HALOT
  rationale: Se conserva el artículo definido porque el texto alude a la sangre específica del animal sacrificado, elemento central del rito.
- source_word: וְזָרְקוּ
  english_pob_choice: shall sprinkle
  chosen_spanish: rociarán
  alternatives_spanish:
  - asperjarán
  - echarán
  lexicon: HALOT
  rationale: Aunque el verbo hebreo sugiere lanzar/tossing, la revisión inglesa preferida usa «sprinkle» por naturalidad cultual. En español, «rociarán» es el equivalente culto y comprensible, y preserva la aplicación ritual de la sangre sin introducir una imagen demasiado violenta o mecánica.
- source_word: עַל הַמִּזְבֵּחַ סָבִיב
  english_pob_choice: on the altar all around
  chosen_spanish: sobre el altar alrededor
  alternatives_spanish:
  - alrededor del altar
  - en torno al altar
  lexicon: HALOT
  rationale: «Sobre el altar alrededor» refleja la colocación de la sangre en la superficie/surcos del altar y la distribución circundante. Se evita «contra el altar» porque el español puede sonar menos natural aquí y el texto revisado del inglés ya optó por una formulación más estándar.
- source_word: אֲשֶׁר פֶּתַח אֹהֶל מוֹעֵד
  english_pob_choice: which is at the entrance of the tent of meeting
  chosen_spanish: el cual está a la entrada de la tienda de reunión
  alternatives_spanish:
  - que está a la entrada de la tienda de reunión
  - la cual está a la entrada de la tienda de reunión
  lexicon: HALOT
  rationale: Se preserva la identificación locativa del altar con una relativa fluida en español. «Tienda de reunión» traduce de forma directa אֹהֶל מוֹעֵד sin sustituirlo por «tabernáculo», que introduce asociaciones menos transparentes.
- source_word: אֹהֶל מוֹעֵד
  english_pob_choice: the tent of meeting
  chosen_spanish: la tienda de reunión
  alternatives_spanish:
  - el tabernáculo
  - la tienda del encuentro
  lexicon: HALOT
  rationale: Se prefiere la traducción transparente y tradicionalmente auditable «tienda de reunión». En español mantiene el sentido de un lugar designado para el encuentro sin desplazar el matiz literal del hebreo.
theological_decisions:
- issue: Renderizar el nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: La política del proyecto para el Tetragrama exige su representación explícita. «Yahvé» conserva el nombre de pacto y evita la sustitución por un título, manteniendo la transparencia frente al texto hebreo.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: El inglés auditado pasó por una revisión que prefirió «bull» en lugar de «young bull» y «sprinkle the blood on the altar all around» en lugar de una formulación más literal con «throw against». La redacción española sigue esa línea revisada, pero conserva la transparencia del Nombre divino como Yahvé y la identificación sacerdotal de los hijos de Aarón. Se evitó calcar de forma rígida el orden inglés, priorizando una sintaxis española natural sin abandonar el detalle ritual del hebreo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» según la convención del proyecto para יְהוָה.
  - Se usa «tienda de reunión» de forma coherente con אֹהֶל מוֹעֵד.
  - Se eligió «rociarán» para armonizar con la revisión inglesa y con el uso cultual comprensible en español.
  - Se conservó la doble referencia «los hijos de Aarón, los sacerdotes» para no perder el oficio sacerdotal.
  - La nota a pie de página en «toro» explica la alternativa literal y ritual del hebreo.
