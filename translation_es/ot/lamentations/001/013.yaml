review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la secuencia verbal y las imágenes del hebreo: «Desde lo alto», «envió fuego», «tendió una red para mis pies», «me hizo volver atrás» y «desolada ... todo el día» reflejan fielmente el texto fuente y el rastro de auditoría inglés. La principal debilidad está en la nota [a]: en inglés la alternativa documentada es para el verbo hebreo («it subdued them»), pero en español la nota actual ofrece «prevaleció sobre ellos», que no funciona como verdadera alternativa léxica porque es casi equivalente a la línea principal y no preserva mejor las opciones de dominar/subyugar/vencer. Además, el anclaje [a] está colocado tras «fuego», cuando la nota corresponde al verbo «prevaleció».'
  spanish_quality_summary: El español es claro, digno y legible. «Desde lo alto» y «me dejó desolada, desfallecida todo el día» suenan naturales. Sin embargo, conviene mover [a] al verbo relevante y ajustar su contenido. También prefiero «en mis huesos» frente a «a mis huesos» por mayor naturalidad y mejor correspondencia con בְ en este contexto poético; «a mis huesos» no es incorrecto, pero suena menos idiomático. El resto está bien logrado.
  glossary_alignment: No hay conflictos con los términos de proyecto. No aparecen Yahvé, Mesías, Espíritu, etc. Las decisiones léxicas principales son coherentes con el POB inglés. La excepción necesaria es corregir la nota alternativa de רדה para que refleje de verdad el campo semántico documentado.
  issues:
  - severity: medium
    issue: La nota [a] está anclada en «fuego» pero explica el verbo וַיִּרְדֶּנָּה («prevaleció/subyugó/dominó»).
    rationale: El marcador debe aparecer en la palabra o frase relevante. Tal como está, induce a pensar que la nota comenta «fuego» en vez de la acción del fuego sobre los huesos.
  - severity: medium
    issue: El contenido de la nota [a] no preserva bien la alternativa léxica documentada.
    rationale: «O “y prevaleció sobre ellos”» es demasiado cercana a «prevaleció contra ellos» y no comunica las opciones de «subyugar/dominar/vencer» presentes en la auditoría inglesa y en HALOT.
  - severity: low
    issue: «Envió fuego a mis huesos» suena menos natural que «envió fuego en mis huesos».
    rationale: Aunque «a mis huesos» intenta expresar penetración, en español bíblico natural «en mis huesos» transmite mejor la imagen de fuego actuando dentro de ellos sin forzar la sintaxis.
  revised_spanish_text: Desde lo alto envió fuego en mis huesos, y prevaleció[a] contra ellos; tendió una red para mis pies; me hizo volver atrás; me dejó desolada[b], desfallecida todo el día.
  revised_footnotes:
