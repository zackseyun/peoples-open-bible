review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja correctamente la estructura del hebreo: introducción tribal seguida de dos ciudades, cada una con su correspondiente מִגְרָשֶׁיהָ. Sin embargo, los topónimos españoles no siguen bien la evidencia ni el rastro auditado del POB: קִשְׁיוֹן se acerca más a ''Kisión/Kishion'' que a ''Quisién'', y דָּבְרַת, dado que el POB auditado fijó ''Daberath'' en inglés, conviene conservar en español una forma alineada y reconocible como ''Daberat/Daberath'', explicando la variante. La nota léxica sobre מִגְרָשׁ es básicamente adecuada.'
  spanish_quality_summary: El texto es legible, pero 'Quisién' suena poco natural y poco reconocible como topónimo bíblico. 'Tierras de pasto' es comprensible y digna, aunque podría sonar algo técnica; no obstante, es aceptable por su claridad y por corresponder al sentido de terreno abierto/pastizal adscrito a la ciudad. La frase completa lee bien en español bíblico moderno.
  glossary_alignment: 'No hay términos teológicos sensibles en este versículo. ''Isacar'' es una forma española común y adecuada. La principal desalineación está en la transliteración de los topónimos: se debe acercar קִשְׁיוֹן al MT y mantener la documentación de variantes; además, la nota de Daberat debe explicar la relación con ''Daberath'' de forma más precisa para el lector español.'
  issues:
  - severity: high
    issue: '''Quisién'' no representa fielmente קִשְׁיוֹן ni la decisión auditada ''Kishion''.'
    rationale: La forma propuesta altera demasiado el topónimo y lo vuelve poco reconocible. En español, 'Kisión' conserva mejor la vocalización y la cercanía al MT, a la vez que permite documentar 'Kishón/Kishion' como variantes.
  - severity: medium
    issue: La nota sobre Daberat presenta 'Daberath' como variante solo inglesa, sin vincularla claramente a la decisión auditada del POB.
    rationale: El rastro auditado fijó 'Daberath' en la traducción inglesa final. La nota española debe explicar que 'Daberat' reproduce el hebreo דָּבְרַת y que 'Daberath' es una variante de transliteración/tradición presente en algunas versiones.
  - severity: low
    issue: La nota de 'tierras de pasto' podría ser más precisa sobre el sentido de terreno abierto asociado a la ciudad.
    rationale: La explicación actual es aceptable, pero conviene conservar el matiz de 'terreno abierto' o 'pastizales' pertenecientes a la ciudad, como en la decisión léxica auditada.
