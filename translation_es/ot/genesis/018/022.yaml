translation:
  language: es
  text: Entonces los hombres se volvieron de allí y fueron hacia Sodoma[a], pero Abraham todavía estaba ante Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Algunos testigos antiguos leen: «y Yahvé todavía estaba ante Abraham». El Texto Masorético dice: «y Abraham todavía estaba ante Yahvé».'
    reason: textual_variant
lexical_decisions:
- source_word: וַיִּפְנוּ
  english_pob_choice: turned
  chosen_spanish: se volvieron
  alternatives_spanish:
  - se apartaron
  - giraron
  - se dieron vuelta
  lexicon: HALOT
  rationale: El verbo פנה en este contexto narra un cambio de dirección desde el lugar. «Se volvieron» comunica el movimiento natural en español sin añadir una interpretación excesiva.
- source_word: מִשָּׁם
  english_pob_choice: from there
  chosen_spanish: de allí
  alternatives_spanish:
  - desde allí
  - de ese lugar
  lexicon: HALOT
  rationale: Es un adverbio locativo simple; «de allí» es idiomático y conserva la referencia espacial inmediata.
- source_word: הָאֲנָשִׁים
  english_pob_choice: the men
  chosen_spanish: los hombres
  alternatives_spanish:
  - los varones
  - los visitantes
  lexicon: HALOT
  rationale: El hebreo dice literalmente «los hombres». En español, «los hombres» mantiene el nivel superficial del relato sin importar una identificación interpretativa en el texto principal.
- source_word: וַיֵּלְכּוּ
  english_pob_choice: went
  chosen_spanish: fueron
  alternatives_spanish:
  - iban
  - partieron
  lexicon: HALOT
  rationale: הלך expresa ir o caminar. «Fueron» suena natural en narrativa bíblica en español y mantiene la idea de desplazamiento.
- source_word: סְדֹמָה
  english_pob_choice: toward Sodom
  chosen_spanish: hacia Sodoma
  alternatives_spanish:
  - a Sodoma
  - rumbo a Sodoma
  lexicon: HALOT
  rationale: La ה direccional se refleja bien con «hacia», que conserva el matiz de movimiento orientado a un destino.
- source_word: עוֹדֶנּוּ
  english_pob_choice: still
  chosen_spanish: todavía
  alternatives_spanish:
  - aún
  - seguía
  lexicon: HALOT
  rationale: El adverbio con sufijo expresa continuidad. «Todavía» reproduce con claridad que Abraham permanecía en esa postura.
- source_word: עֹמֵד
  english_pob_choice: stood
  chosen_spanish: estaba de pie
  alternatives_spanish:
  - permanecía de pie
  - seguía de pie
  lexicon: HALOT
  rationale: El participio describe una postura continua. «Estaba de pie» comunica esa permanencia de manera natural en español, sin convertirlo en un mero pasado puntual.
- source_word: לִפְנֵי
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - en presencia de
  - ante
  lexicon: HALOT
  rationale: La preposición puede indicar tanto posición espacial como presencia relacional. «Delante de» conserva ambos aspectos y suena claro en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue la convención española del proyecto para el Tetragrámaton: «Yahvé». Preserva el nombre propio divino sin sustituirlo por un título.'
theological_decisions:
- issue: Forma textual del último miembro de la cláusula
  english_pob_reading: before the LORD / note that some ancient witnesses read 'and the LORD still stood before Abraham'
  chosen_spanish_reading: Abraham todavía estaba de pie delante de Yahvé
  alternative_spanish_readings:
  - Yahvé todavía estaba de pie delante de Abraham
  rationale: La base hebrea masorética dice que Abraham estaba delante de Yahvé. Se conserva esa lectura en el texto principal y se deja constancia de la variante antigua atestiguada por la POB en la nota.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #3; name-rendering policy for יְהוָה'
- issue: Renderizado del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa el Nombre divino, no un título. «Yahvé» mantiene la distinción entre nombre propio y designación reverencial, coherente con la política del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se registran cambios posteriores y el cotejo indica alto acuerdo con el texto fuente y la nota de variante textual.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para יְהוָה conforme a la terminología del proyecto.
  - «Delante de» conserva la fuerza espacial y relacional de לִפְנֵי sin sobreactualizar la escena.
  - La nota de variante textual se ancla en la forma del último miembro de la cláusula, como en el audit trail inglés.
