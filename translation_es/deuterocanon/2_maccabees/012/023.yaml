translation:
  language: es
  text: Pero Judas llevó adelante la persecución con más vigor y, derribando a los malvados, destruyó a unos tres mil[a] hombres.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «tres miríadas de hombres» (literalmente, treinta mil). La lectura transmitida es difícil en el contexto; muchos la entienden aquí con el sentido de tres mil.'
    reason: textual_variant
lexical_decisions:
- source_word: ἐποίει ... τὸν διωγμόν
  english_pob_choice: pressed the pursuit
  chosen_spanish: hizo más enérgica la persecución
  alternatives_spanish:
  - perseguía con más fuerza
  - apretó la persecución
  - continuó la persecución con mayor empeño
  lexicon: LSJ
  rationale: El giro griego expresa una persecución intensificada; en español, 'hizo más enérgica la persecución' conserva el aumento de intensidad sin sonar forzado ni literalista.
- source_word: εὐτονώτερον
  english_pob_choice: more vigorously
  chosen_spanish: más enérgica
  alternatives_spanish:
  - más vigorosamente
  - con mayor fuerza
  - más intensamente
  lexicon: LSJ
  rationale: El comparativo comunica mayor energía o fuerza. 'Más enérgica' suena natural en español y mantiene el matiz de incremento de intensidad.
- source_word: συνετίνων
  english_pob_choice: striking down
  chosen_spanish: derribando
  alternatives_spanish:
  - golpeando
  - abatendo
  - derribándolos
  lexicon: LSJ
  rationale: En contexto bélico, el participio denota acción violenta contra enemigos. 'Derribando' transmite el golpe o abatimiento sin especificar arma ni técnica.
- source_word: τοὺς ἀλιτηρίους
  english_pob_choice: the wretches
  chosen_spanish: los malvados
  alternatives_spanish:
  - los desdichados
  - los impíos
  - los criminales
  lexicon: LSJ
  rationale: ἀλιτήριοι es un calificativo fuertemente peyorativo. 'Los malvados' preserva la valoración moral del narrador en un registro claro y publicable.
- source_word: διέφθειρεν
  english_pob_choice: he destroyed
  chosen_spanish: destruyó
  alternatives_spanish:
  - mató
  - aniquiló
  - arruinó
  lexicon: LSJ
  rationale: El verbo admite el sentido de destruir o matar en relato militar. 'Destruyó' retiene la amplitud semántica que usa la POB inglesa.
- source_word: εἰς μυριάδας τρεῖς ἀνδρῶν
  english_pob_choice: as many as three thousand men
  chosen_spanish: a unos tres mil hombres
  alternatives_spanish:
  - a unos treinta mil hombres
  - hasta tres mil hombres
  - a la cifra de tres mil hombres
  lexicon: LSJ
  rationale: 'La forma transmitida es difícil: literalmente apunta a ''tres miríadas de hombres'' (treinta mil), pero el contexto narrativo y la decisión POB inglesa favorecen el sentido probable de tres mil. El español sigue ese juicio, dejando visible la aproximación con ''unos''.'
translation_notes:
  revision_awareness: 'La versión inglesa POB permanece sin cambios en la revisión más reciente, y el punto principal sigue siendo la dificultad textual de la cifra final. La redacción española mantiene ese mismo juicio interpretativo: el texto principal adopta el sentido probable de ''unos tres mil hombres'' y la nota conserva la alternativa literal de ''treinta mil''.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se preserva el tono narrativo militar sin introducir vocabulario eclesiástico ajeno al griego.
  - La cifra final queda expresada como aproximación, coherente con la decisión crítica de la POB inglesa.
