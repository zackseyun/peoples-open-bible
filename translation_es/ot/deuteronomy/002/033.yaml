translation:
  language: es
  text: Y Yahvé nuestro Dios nos lo entregó[a], y lo abatimos, junto con sus hijos[b] y todo su pueblo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente, «delante de nosotros»; aquí la expresión significa que Yahvé lo entregó al poder de Israel.
    reason: lexical_alternative
  - marker: b
    text: El hebreo consonántico dice «su hijo»; muchos lo entienden colectivamente como «sus hijos» en este contexto.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּתְּנֵהוּ
  english_pob_choice: gave him over
  chosen_spanish: lo entregó
  alternatives_spanish:
  - lo dio
  - lo entregó en nuestras manos
  lexicon: HALOT
  rationale: En contexto de guerra, נתן con objeto personal y לְפָנֵינוּ expresa ceder al enemigo al poder del pueblo. «Lo entregó» conserva la idea de entrega y evita una formulación demasiado literal que sonaría dura o forzada en español; la nota aclara el sentido idiomático.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El tetragrámaton se vierte con el nombre propio divino, no con una sustitución titular. «Yahvé» sigue el criterio POB en español y preserva el nombre del pacto.
- source_word: אֱלֹהֵינוּ
  english_pob_choice: our God
  chosen_spanish: nuestro Dios
  alternatives_spanish:
  - el Dios nuestro
  lexicon: HALOT
  rationale: La forma con sufijo posesivo de primera persona plural se refleja naturalmente como «nuestro Dios», manteniendo la referencia al Dios de Israel.
- source_word: לְפָנֵינוּ
  english_pob_choice: to us
  chosen_spanish: delante de nosotros
  alternatives_spanish:
  - ante nosotros
  - en nuestra presencia
  - en nuestras manos
  lexicon: HALOT
  rationale: La expresión hebrea significa literalmente «delante de nosotros», y en este marco militar comunica que el enemigo fue puesto a disposición de Israel. «Delante de nosotros» conserva la imagen de la fuente; el marcador explica el valor idiomático.
- source_word: וַנַּךְ
  english_pob_choice: we struck him down
  chosen_spanish: lo derrotamos
  alternatives_spanish:
  - lo golpeamos
  - lo abatimos
  lexicon: HALOT
  rationale: נכה en relato bélico puede implicar una derrota decisiva. En español, «derrotamos» comunica el resultado militar de forma natural; «abatimos» o «golpeamos» pueden sonar menos claros o más literales. Se conserva el matiz de victoria sin exceder el texto.
- source_word: אֹתוֹ
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  lexicon: HALOT
  rationale: El pronombre directo masculino singular se traduce de forma idiomática con el clítico «lo» en español.
- source_word: בנו
  english_pob_choice: his sons
  chosen_spanish: sus hijos
  alternatives_spanish:
  - su hijo
  - sus descendientes
  lexicon: HALOT
  rationale: El texto consonántico permite singular, pero el sentido contextual es colectivo. «Sus hijos» sigue la lectura plural tradicional y resulta natural en español.
- source_word: כָּל עַמּוֹ
  english_pob_choice: all his people
  chosen_spanish: todo su pueblo
  alternatives_spanish:
  - toda su gente
  - todo su ejército
  lexicon: HALOT
  rationale: עַם suele significar «pueblo». En este informe militar, «todo su pueblo» reproduce con fidelidad el alcance colectivo sin restringirlo indebidamente a «ejército».
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se preserva el nombre propio revelado de Dios en lugar de una sustitución litúrgica. «Yahvé» es la forma coherente con la política terminológica del proyecto en español y mantiene la transparencia respecto del hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH'
- issue: Sentido de לְפָנֵינוּ con נתן en contexto militar
  english_pob_reading: gave him over to us
  chosen_spanish_reading: lo entregó delante de nosotros
  alternative_spanish_readings:
  - lo entregó en nuestras manos
  - lo puso en nuestro poder
  - nos lo entregó
  rationale: La frase no describe mera localización espacial, sino entrega efectiva del enemigo al control de Israel. «Delante de nosotros» conserva la literalidad hebrea sin borrar el valor idiomático, que queda aclarado por la nota.
  doctrine_reference: 'DOCTRINE.md: Translating Hebrew battle idioms'
- issue: Tratamiento de בנו en el contexto
  english_pob_reading: his sons
  chosen_spanish_reading: sus hijos
  alternative_spanish_readings:
  - su hijo
  rationale: Aunque el consonántico puede leerse singular, el contexto bélico y la tradición interpretativa favorecen un valor colectivo. El plural español evita un choque semántico innecesario y refleja la lectura que la POB ya documentó.
  doctrine_reference: 'DOCTRINE.md: Textual variants and contextual plurals'
translation_notes:
  revision_awareness: La redacción sigue el sentido auditado de la POB en inglés, pero ajusta la primera cláusula al orden más natural del español («Y Yahvé nuestro Dios lo entregó delante de nosotros») y mantiene la imagen hebrea con una nota explicativa. También se conserva la decisión contextual sobre el plural de בנו, documentada como variante textual/lectura alternativa. No se añade material doctrinal ajeno al verso.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para el Tetragrámaton.
  - Se prefiere «lo entregó» / «lo derrotamos» para un registro bíblico moderno pero claro.
  - «Sus hijos» mantiene la lectura colectiva sin forzar singularidad.
  - «Todo su pueblo» conserva el alcance total de עַם en contexto bélico.
