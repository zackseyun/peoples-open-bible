    rationale: La nota [b] está anclada solo en 'sol' aunque el contraste real afecta a toda la frase 'delante de mí / en mi presencia'. La nota [c] repite información ya explicada por la propia traducción.
  revised_spanish_text: Su descendencia[a] permanecerá para siempre, y su trono será como el sol delante de mí[b].
