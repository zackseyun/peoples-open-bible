    issue: Las notas al pie b y c no siguen bien la distribución del audit trail inglés.
    rationale: La nota inglesa sobre 'fed them to the full' corresponde al verbo de saciar/alimentar; la nota sobre 'thronged/crowded into' corresponde a יִתְגֹּדָדוּ. En el borrador, la nota c comenta 'casa de prostituta', que no es donde está la principal alternativa léxica documentada.
  - severity: medium
    issue: '''Una casa de prostituta'' es poco idiomático en español.'
    rationale: Aunque formalmente cercano al hebreo, en español suena elíptico o tosco. 'La casa de una prostituta' conserva la imagen sin perder naturalidad y coincide con una alternativa ya documentada.
  - severity: low
    issue: '''Se amontonaron en'' puede mejorarse a una expresión con matiz de aglomerarse hacia/adentro.'
    rationale: El hebreo y el audit trail inglés resaltan reunirse en masa o apiñarse hacia ese lugar. 'Se agolparon en' o 'se apiñaron en' transmite mejor ese movimiento colectivo.
  revised_spanish_text: ¿Cómo podría perdonarte por esto? Tus hijos me han abandonado y han jurado por los que no son dioses[a]. Cuando yo los sacié[b], cometieron adulterio y se agolparon en la casa de una prostituta[c].
