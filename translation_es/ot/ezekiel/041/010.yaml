- from: Y entre las cámaras había un ancho de veinte codos alrededor de la casa[a], alrededor.
  to: Y entre las cámaras había un espacio de veinte codos de ancho alrededor del templo[a], alrededor.
  rationale: Se revisa «la casa» a «el templo» para reflejar correctamente el referente contextual de לַבַּיִת en Ezequiel 40–48 y alinearse con la decisión auditada del POB. También se cambia «había un ancho» por «había un espacio de veinte codos de ancho» para lograr un español más natural sin perder la noción de medida espacial del hebreo. Se conserva la nota sobre la triple repetición de «alrededor».
