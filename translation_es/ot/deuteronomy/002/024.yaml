base_translation:
  language: en
  yaml_path: translation/ot/deuteronomy/002/024.yaml
  text: Rise up[a], set out, and cross over the Arnon Valley. See, I have given into your hand Sihon king of Heshbon, the Amorite, and his land. Begin to take possession of it[c][b], and engage him in battle.
  footnotes:
  - marker: a
    text: Or 'the Wadi Arnon' or 'the Arnon Brook'; the Hebrew נחל can refer to a wadi, streambed, or valley.
    reason: lexical_alternative
  - marker: b
    text: Or 'Begin to possess it.' The verb can also carry the sense 'dispossess,' but here the immediate object is Sihon's land.
    reason: lexical_alternative
  - marker: c
    text: Or 'contend with him in war' or 'provoke him to war.'
    reason: lexical_alternative
