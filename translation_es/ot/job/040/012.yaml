translation:
  language: es
  text: Mira a todo el que es soberbio[a], y humíllalo; y pisotea a los impíos donde están.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en su lugar».
    reason: lexical_alternative
lexical_decisions:
- source_word: רְאֵה
  english_pob_choice: Look on
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira a
  - Considera
  lexicon: HALOT
  rationale: El imperativo de ראה dirigido a Job pide fijar la atención. En español, «Mira» transmite la orden con naturalidad y sin debilitar la fuerza del llamado a observar al soberbio como objeto del juicio.
- source_word: כָל גֵּאֶה
  english_pob_choice: everyone who is proud
  chosen_spanish: todo el que es soberbio
  alternatives_spanish:
  - todo soberbio
  - todo el orgulloso
  lexicon: HALOT
  rationale: El sustantivo/adjetivo usado de modo sustantivado designa a la clase de personas soberbias. «Todo el que es soberbio» conserva el sentido distributivo y suena claro en español moderno.
- source_word: הַכְנִיעֵהוּ
  english_pob_choice: humble him
  chosen_spanish: humíllalo
  alternatives_spanish:
  - bájalo
  - somételo
  lexicon: HALOT
  rationale: El hifil de כנע con sufijo masculino singular expresa causar que alguien sea abatido o rebajado. «Humíllalo» mantiene el contraste orgullo/humillación y es idiomático en español.
- source_word: וַהֲדֹךְ
  english_pob_choice: and tread down
  chosen_spanish: pisotea
  alternatives_spanish:
  - aplasta
  - derriba
  lexicon: HALOT
  rationale: El verbo expresa un acto violento y decisivo de abatimiento. «Pisotea» conserva la imagen corporal y la dureza del juicio sin exceder la fuerza del hebreo.
- source_word: רְשָׁעִים
  english_pob_choice: the wicked
  chosen_spanish: los impíos
  alternatives_spanish:
  - los malvados
  - los malhechores
  lexicon: HALOT
  rationale: «Impíos» es una equivalencia bíblica natural para רשעים y preserva la categoría moral-religiosa del texto.
- source_word: תַּחְתָּם
  english_pob_choice: where they stand
  chosen_spanish: donde están
  alternatives_spanish:
  - en su lugar
  - en su sitio
  lexicon: HALOT
  rationale: La expresión con תחת y sufijo puede significar «en su lugar / donde están». «Donde están» reproduce bien la referencia locativa inmediata y evita una literalidad extraña en español.
theological_decisions:
- issue: El alcance del mandato divino a Job
  english_pob_reading: Render as a divine challenge describing acts of judgment without implying Job actually possesses God's authority.
  chosen_spanish_reading: Traducirlo como un desafío divino que describe actos de juicio, sin sugerir que Job posea realmente la autoridad de Dios.
  alternative_spanish_readings:
  - Como una orden hipotética que subraya la incapacidad de Job
  - Como una concesión literal de autoridad para ejecutar juicio
  rationale: El contexto presenta a Dios desafiando a Job con acciones propias del gobierno divino. La traducción debe conservar el imperativo y la tensión teológica sin resolverla a favor de una comisión literal a Job.
  doctrine_reference: Conservar la tensión teológica del pasaje.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que prefirió «tread down» frente a «crush», por lo que se eligió un verbo español con fuerza física de pisoteo/abatimiento en lugar de uno más general. También se mantuvo la alternativa locativa de תחתם, reflejada en la nota.
  spanish_consistency_notes:
  - Se mantiene un español bíblico claro y contemporáneo, sin sustituir términos de fuerza judicial por eufemismos.
  - «Impíos» se usa de manera consistente para רשעים en registro bíblico.
  - La nota [a] se ancla en «donde están», reflejando la ambigüedad locativa del hebreo.
