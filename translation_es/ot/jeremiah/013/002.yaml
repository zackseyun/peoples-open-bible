  - severity: medium
    issue: «lo puse sobre mi cintura» es poco idiomático en contexto de vestirse
    rationale: El hebreo dice literalmente «puse sobre mis lomos/mi cintura», pero en español natural, cuando uno se viste una prenda de este tipo, lo normal es «me la puse en la cintura» o «me la ceñí a la cintura». Esto preserva el sentido sin calco torpe.
  - severity: low
