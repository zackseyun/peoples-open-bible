translation:
  language: es
  text: Grande es nuestro Señor, y abundante en poder; su entendimiento es sin número[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «su entendimiento no tiene número», «está más allá de todo número» o «es innumerable».'
    reason: lexical_alternative
lexical_decisions:
- source_word: גָּדוֹל
  english_pob_choice: Great
  chosen_spanish: Grande
  alternatives_spanish:
  - Grande es
  - Grande es nuestro Señor
  lexicon: HALOT
  rationale: Se conserva el predicado inicial y el tono doxológico del hebreo, con una construcción natural en español. 'Grande' reproduce el valor calificativo sin añadir paráfrasis.
- source_word: אֲדֹנֵינוּ
  english_pob_choice: our Lord
  chosen_spanish: nuestro Señor
  alternatives_spanish:
  - nuestro amo
  - nuestro soberano
  lexicon: HALOT
  rationale: '''Señor'' es el equivalente reverencial más natural en español para el título relacional אֲדֹן con sufijo posesivo. Se mantiene el posesivo ''nuestro'' para reflejar el sufijo plural.'
- source_word: וְרַב
  english_pob_choice: and abundant
  chosen_spanish: y abundante
  alternatives_spanish:
  - y grande
  - y poderoso
  lexicon: HALOT
  rationale: '''Abundante'' transmite la idea de amplitud o gran medida presente en רַב y evita una repetición plana de ''grande''. En español, ''abundante en poder'' suena natural y fiel al paralelismo.'
- source_word: כֹּחַ
  english_pob_choice: power
  chosen_spanish: poder
  alternatives_spanish:
  - fuerza
  - muestra de poder
  lexicon: HALOT
  rationale: '''Poder'' es la opción más idiomática en español para la capacidad o fuerza eficaz atribuida a Dios en este contexto de alabanza.'
- source_word: לִתְבוּנָתוֹ
  english_pob_choice: his understanding
  chosen_spanish: su entendimiento
  alternatives_spanish:
  - su discernimiento
  - su inteligencia
  lexicon: HALOT
  rationale: '''Entendimiento'' corresponde de manera directa a תְּבוּנָה y mantiene el campo semántico de comprensión/discernimiento sin exagerar hacia ''inteligencia'' moderna. El posesivo se conserva.'
- source_word: אֵין מִסְפָּר
  english_pob_choice: is beyond number
  chosen_spanish: es sin número
  alternatives_spanish:
  - es innumerable
  - no tiene número
  lexicon: HALOT
  rationale: El hebreo idiomático expresa imposibilidad de contar. 'Sin número' es una solución breve y fiel, cercana al valor literal y suficientemente natural en español bíblico contemporáneo.
theological_decisions:
- issue: Título relacional para אֲדוֹנֵינוּ en un salmo de alabanza
  english_pob_reading: our Lord
  chosen_spanish_reading: nuestro Señor
  alternative_spanish_readings:
  - nuestro amo
  rationale: El texto usa un título, no el nombre divino YHWH. 'Señor' conserva el valor de señorío y la relación posesiva sin desplazarlo al convento de 'SEÑOR' como máscara del nombre divino. No se usa 'amo' porque en español actual suena socialmente más duro y menos acorde con la alabanza.
  doctrine_reference: 'DOCTRINE.md: traducir títulos; transcribir nombres; manejo diferenciado de YHWH frente a títulos como אֲדֹן.'
- issue: Valor de אֵין מִסְפָּר aplicado al entendimiento divino
  english_pob_reading: his understanding is beyond number
  chosen_spanish_reading: su entendimiento es sin número
  alternative_spanish_readings:
  - su entendimiento es innumerable
  - su entendimiento no tiene número
  rationale: Se conserva la imagen hebrea de lo incontable sin forzar una abstracción doctrinal. 'Sin número' mantiene la tensión poética entre comprensión divina y lenguaje de conteo.
  doctrine_reference: Salmos 147:5; comparación con la nota inglesa 'without number / innumerable'.
translation_notes:
  revision_awareness: El pasaje mostró acuerdo mayoritario con la lectura inglesa auditada y no requirió cambios de fondo; la única tensión relevante fue la expresión idiomática final אֵין מִסְפָּר, conservada en español con una formulación breve y natural. No hubo revisiones previas aplicadas en el expediente base.
  spanish_consistency_notes:
  - Se mantuvo 'Señor' para אֲדֹנֵינוּ, no 'SEÑOR', porque el hebreo aquí usa el título אֲדֹן con sufijo, no el nombre YHWH.
  - Se evitó 'Cristo' porque el texto no contiene משיח/Χριστός ni un uso litúrgico fijo que lo exija.
  - '''Poder'' y ''entendimiento'' siguen de cerca el par semántico fuerza/capacidad y comprensión/discernimiento del hebreo.'
  - La nota al pie cubre la alternativa lexical principal del cierre, preservando la ambigüedad poética del hebreo.
