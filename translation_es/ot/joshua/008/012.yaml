    issue: La nota [b] está anclada a 'emboscada' pero la evidencia inglesa la ancla a la frase geográfica 'west of the city'.
    rationale: 'El English POB documenta explícitamente una nota cultural sobre מִיָּם לָעִיר: literalmente ''from the sea of the city'', con ''sea'' usado idiomáticamente para ''west''. La nota española actual introduce una explicación nueva sobre אֹרֵב que no corresponde a la nota auditada principal.'
  - severity: low
    issue: '''Los puso en emboscada'' suena algo rígido en español.'
    rationale: Aunque es comprensible y cercano al hebreo, 'los puso en una emboscada' es más natural y mantiene el mismo valor semántico sin sobreinterpretar el texto.
  revised_spanish_text: Y tomó[a] alrededor de cinco mil hombres y los puso en una emboscada entre Betel y Hai, al occidente[b] de la ciudad.
  revised_footnotes:
