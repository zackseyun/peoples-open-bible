translation:
  language: es
  text: Y forma en la rectitud[a], para que uno actúe con equidad en todos los asuntos de conducta, y enseña piedad, para que uno adore solamente al Dios que verdaderamente existe[b] con debida majestad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘justicia’. El griego δικαιοσύνη puede denotar rectitud moral o justicia; aquí el texto principal usa ‘rectitud’ para reflejar mejor el contexto de formación ética.
    reason: lexical_alternative
  - marker: b
    text: O ‘solamente al Dios verdadero’. El griego literalmente resalta ‘al Dios que es’, en contraste con los dioses falsos.
    reason: alternative_reading
lexical_decisions:
- source_word: δικαιοσύνην
  english_pob_choice: righteousness
  chosen_spanish: la justicia
  alternatives_spanish:
  - la rectitud
  - la justicia recta
  lexicon: BDAG
  rationale: El griego δικαιοσύνη puede abarcar justicia o rectitud moral. En español, 'justicia' mantiene la amplitud ética del pasaje y conserva la alternativa documentada en el aparato inglés; aquí se evita 'rectitud' como única opción porque el contexto incluye formación moral general y trato justo.
- source_word: παιδεύει
  english_pob_choice: trains
  chosen_spanish: disciplina
  alternatives_spanish:
  - forma
  - educa
  - instruye
  lexicon: BDAG
  rationale: παιδεύω expresa formación correctiva y educativa, no solo enseñanza escolar. 'Disciplina' reproduce mejor en español la idea de moldear el carácter mediante formación moral.
- source_word: διὰ πάντων τῶν ἠθῶν
  english_pob_choice: in all matters of conduct
  chosen_spanish: en todos los asuntos de conducta
  alternatives_spanish:
  - en toda conducta
  - en todas las áreas de la conducta
  - en todos los hábitos
  lexicon: LSJ
  rationale: ἤθη se refiere a hábitos, modo de vivir o conducta. 'Asuntos de conducta' comunica el alcance integral sin sonar forzado y mantiene la referencia práctica del contexto.
- source_word: ἰσονομεῖν
  english_pob_choice: be fair
  chosen_spanish: sea justo
  alternatives_spanish:
  - sea imparcial
  - trate con equidad
  - viva con equidad
  lexicon: LSJ
  rationale: El verbo alude a igualdad en el trato o bajo la ley. Dado el paralelismo con 'todos los asuntos de conducta', 'sea justo' funciona de forma natural en español y conserva la fuerza ética del término, sin diluirlo en una generalidad demasiado suave.
- source_word: εὐσεβείαν
  english_pob_choice: piety
  chosen_spanish: piedad
  alternatives_spanish:
  - devoción
  - religiosidad
  - temor reverente
  lexicon: BDAG
  rationale: εὐσέβεια denota reverencia devota hacia Dios. 'Piedad' es el equivalente español más estable y digno, y mantiene el registro teológico del pasaje.
- source_word: σέβειν
  english_pob_choice: worship
  chosen_spanish: adore
  alternatives_spanish:
  - venere
  - reverencie
  - rinda culto a
  lexicon: BDAG
  rationale: Con el objeto explícito 'al Dios que verdaderamente existe', el verbo expresa acto religioso. 'Adore' transmite bien la dedicación cultual y es idiomático en español bíblico actual.
- source_word: μόνον τὸν ὄντα θεόν
  english_pob_choice: only the God who truly exists
  chosen_spanish: solamente al Dios que verdaderamente existe
  alternatives_spanish:
  - solamente al Dios verdadero
  - solo al Dios que es
  - solamente al único Dios que existe
  lexicon: LSJ
  rationale: La construcción griega enfatiza al Dios que 'es', en contraste con dioses falsos. 'Que verdaderamente existe' preserva ese matiz ontológico sin volverlo excesivamente literal o abstracto en español.
- source_word: μεγαλοπρεπῶς
  english_pob_choice: with due majesty
  chosen_spanish: con majestad debida
  alternatives_spanish:
  - con debida majestad
  - con magnificencia
  - de manera majestuosa
  lexicon: LSJ
  rationale: El adverbio indica un modo digno de la grandeza divina. 'Con majestad debida' conserva la idea de una adoración apropiada a su esplendor y suena natural en español formal.
theological_decisions:
- issue: δικαιοσύνη como justicia o rectitud moral
  english_pob_reading: righteousness, with 'justice' preserved as an alternative
  chosen_spanish_reading: la justicia
  alternative_spanish_readings:
  - la rectitud
  rationale: El pasaje forma el carácter ético y también alude al trato justo en la conducta. En español, 'justicia' recoge tanto la virtud moral como la dimensión relacional/legal; por eso se la mantiene en el texto, dejando 'rectitud' como matiz posible pero no principal.
  doctrine_reference: 'DOCTRINE.md Contested terms: δικαιοσύνη → righteousness; alternatives preserved where relevant'
- issue: μόνον τὸν ὄντα θεόν y la afirmación del Dios real frente a falsos dioses
  english_pob_reading: only the God who truly exists
  chosen_spanish_reading: solamente al Dios que verdaderamente existe
  alternative_spanish_readings:
  - solamente al Dios verdadero
  - solo al Dios que es
  rationale: La frase griega no solo identifica al único Dios, sino que lo contrapone implícitamente a los ídolos o dioses no reales. La versión española conserva esa tensión ontológica sin convertirla en una glosa doctrinal más amplia que el texto.
  doctrine_reference: Translation philosophy §1 original-language primacy; §3 preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: La redacción española sigue el último pase de revisión del audit trail, que ajustó el sentido de ἰσονομεῖν hacia una formulación más natural en la conducta y afinó μόνον τὸν ὄντα θεόν hacia una referencia al Dios que verdaderamente existe. La versión final procura conservar ese equilibrio entre naturalidad española y precisión del griego.
  spanish_consistency_notes:
  - Se mantiene el registro bíblico-formal, sin sustituir el lenguaje teológico por términos meramente devocionales.
  - '''Dios'' se usa para θεόν conforme al estándar del proyecto.'
  - '''Piedad'' conserva el valor de εὐσέβεια como devoción reverente, no simple religiosidad externa.'
  - Las notas al pie preservan la tensión semántica importante entre justicia/rectitud y entre el Dios existente/verdadero.
