translation:
  language: es
  text: Entonces ella se levantó y se fue[a], y se quitó el velo de sobre ella[b] y se vistió con las ropas de su viudez.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'partió'.
    reason: lexical_alternative
  - marker: b
    text: O 'quitó su velo ... y se puso sus ropas de viuda'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתָּקָם
  english_pob_choice: she arose
  chosen_spanish: se levantó
  alternatives_spanish:
  - se alzó
  - se puso de pie
  lexicon: HALOT
  rationale: El wayyiqtol de קום marca avance narrativo; en español, 'se levantó' es natural y conserva el movimiento secuencial sin rebajar el registro.
- source_word: וַתֵּלֶךְ
  english_pob_choice: went away
  chosen_spanish: se fue
  alternatives_spanish:
  - partió
  - se marchó
  lexicon: HALOT
  rationale: הלך indica aquí salida del lugar en la secuencia narrativa; 'se fue' comunica claramente que ella dejó el sitio con idiomaticidad en español.
- source_word: וַתָּסַר
  english_pob_choice: removed
  chosen_spanish: quitó
  alternatives_spanish:
  - se quitó
  - retiró
  lexicon: HALOT
  rationale: סור expresa apartar o quitar algo de encima de sí; 'quitó' mantiene la acción concreta de retirar el velo. Se evita 'se quitó' porque el objeto es el velo, no necesariamente una acción reflexiva literal en el español de este contexto.
- source_word: צְעִיפָהּ
  english_pob_choice: her veil
  chosen_spanish: su velo
  alternatives_spanish:
  - su mantilla
  - su cubierta
  lexicon: HALOT
  rationale: צָעִיף designa un cubrimiento o velo, posiblemente facial o de cabeza. 'Velo' es la equivalencia más directa y acorde con el contexto inmediato de su disfraz.
- source_word: מֵעָלֶיהָ
  english_pob_choice: from upon her
  chosen_spanish: de sobre ella
  alternatives_spanish:
  - de encima de ella
  - de sobre sí
  lexicon: HALOT
  rationale: Se conserva la imagen hebrea de retirar algo 'de sobre' la persona. En español, 'de sobre ella' suena más fiel y legible que una paraphrase simplificada, y evita perder la nota espacial del original.
- source_word: וַתִּלְבַּשׁ
  english_pob_choice: put on
  chosen_spanish: se vistió con
  alternatives_spanish:
  - se puso
  - vistió
  lexicon: HALOT
  rationale: לבש puede ser 'vestirse' o 'ponerse' ropa. 'Se vistió con' mantiene el acto de colocarse una indumentaria y funciona bien con el complemento siguiente.
- source_word: בִּגְדֵי אַלְמְנוּתָהּ
  english_pob_choice: the garments of her widowhood
  chosen_spanish: las prendas de su viudez
  alternatives_spanish:
  - las ropas de su viudez
  - las prendas de viuda
  lexicon: HALOT
  rationale: La construcción genitiva se refiere a la vestimenta asociada con su estado de viudez. 'Prendas de su viudez' conserva el valor formal del hebreo y la relación entre estado y vestuario.
theological_decisions:
- issue: Valor narrativo de la secuencia de acciones
  english_pob_reading: The verse narrates a sequence of concrete actions without adding interpretation.
  chosen_spanish_reading: 'La traducción mantiene la cadena de acciones visibles: levantarse, irse, quitar el velo y vestirse.'
  alternative_spanish_readings:
  - Entonces ella se levantó, partió, se quitó el velo y se vistió
  - Entonces ella se levantó y se marchó, retirando su velo
  rationale: 'No hay tensión doctrinal especial, pero sí una tensión estilística: el hebreo acumula verbos en secuencia. La versión española conserva esa sucesión sin explicarla ni psicologizarla.'
  doctrine_reference: Narrative fidelity / lexical transparency
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto hebreo, pero ajusta el orden y la preposición para que el español sea natural. Se tomó en cuenta el audit trail inglés: ''went away'' se resolvió como ''se fue'', y ''from upon her'' se preservó como ''de sobre ella'' para no perder la imagen espacial del original.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto, aunque este versículo no lo requiere.
  - '''Velo'' se usa para צְעִיף por su valor contextual inmediato; no se sustituye por términos eclesiales más tardíos.'
  - '''Prendas de su viudez'' conserva el tono formal del constructo hebreo y evita una domesticación excesiva.'
  - Los marcadores de nota [a] y [b] aparecen exactamente en el texto y corresponden a alternativas léxicas reales.
