  glossary_alignment: 'Buena alineación general con la terminología del proyecto: יְהוָה → «Yahvé» correctamente; קרא בשם → «invocar el nombre de» es apropiado; וְאָסַף + הַמְּצֹרָע se refleja bien con «curará al leproso», en línea con la revisión inglesa final que entiende como objeto a la persona afectada, aunque «sanará» también sería válido. No hay conflicto doctrinal relevante.'
