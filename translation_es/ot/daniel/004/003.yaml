    issue: Inicio 'Y por mí' poco idiomático en español
    rationale: Aunque reproduce formalmente וּמִנִּי, en español suena forzado. La decisión inglesa 'And by me' representa procedencia administrativa; 'Por orden mía' o 'Y por orden mía' comunica mejor ese valor en español bíblico-natural.
  - severity: low
    issue: '''delante de mí'' es correcto pero menos elegante que ''ante mí'' en este contexto'
    rationale: Ambas opciones son fieles a קָדָמַי, pero 'ante mí' encaja mejor con el registro de corte y evita una frase algo pesada tras 'traer'.
  revised_spanish_text: Y por orden mía se emitió un decreto para traer ante mí a todos los sabios de Babilonia[a], para que me dieran a conocer la interpretación del sueño.
