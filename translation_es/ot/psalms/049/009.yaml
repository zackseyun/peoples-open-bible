translation:
  language: es
  text: Porque el rescate de su vida[b] es costoso, y cesa para siempre[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «y cesa para siempre»; la cláusula hebrea es condensada y puede significar que el intento de rescate falla de manera permanente o debe abandonarse para siempre.'
    reason: alternative_reading
  - marker: b
    text: «Vida» también puede verterse «alma»; נפש suele referirse a la persona viviente o a la vida, no solo al alma inmaterial.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיֵקַר
  english_pob_choice: is costly
  chosen_spanish: es costoso
  alternatives_spanish:
  - es valioso
  - es demasiado costoso
  lexicon: HALOT
  rationale: El verbo יקר expresa valor/precio alto. «Es costoso» conserva el sentido económico del rescate y resulta natural en español; «es valioso» puede suavizar demasiado la idea de precio, y «demasiado costoso» añade énfasis no explícito.
- source_word: פִּדְיוֹן
  english_pob_choice: ransom
  chosen_spanish: rescate
  alternatives_spanish:
  - precio de rescate
  - redención
  lexicon: HALOT
  rationale: En este contexto el sustantivo designa el precio pagado para liberar a alguien. «Rescate» comunica bien la transacción y mantiene el paralelo con la imposibilidad de salvar la vida; «redención» es más amplio y puede sonar más teológico que económico.
- source_word: נַפְשָׁם
  english_pob_choice: their life
  chosen_spanish: su vida
  alternatives_spanish:
  - su alma
  - sus vidas
  lexicon: HALOT
  rationale: נפש aquí se refiere a la vida o persona viviente, no necesariamente a «alma» en sentido espiritual. En español, «su vida» evita introducir una antropología ajena al contexto; el singular posesivo colectivo refleja adecuadamente el hebreo.
- source_word: וְחָדַל
  english_pob_choice: it ceases forever
  chosen_spanish: cesa
  alternatives_spanish:
  - se acaba
  - deja de ser posible
  - cesa para siempre
  lexicon: HALOT
  rationale: El verbo tiene la idea de cesar, fallar o llegar a su fin. «Cesa» conserva la literalidad básica y, junto con el complemento temporal, deja visible la dificultad sintáctica del hebreo sin expandirla en exceso.
- source_word: לְעוֹלָם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por siempre
  - jamás
  lexicon: HALOT
  rationale: La frase adverbial expresa duración indefinida/perpetua. «Para siempre» es la opción más natural y mantiene la fuerza de permanencia; «jamás» sería más idiomático en algunas construcciones, pero aquí puede sonar más interpretativo.
theological_decisions:
- issue: Sentido de נַפְשָׁם en un contexto de muerte y rescate
  english_pob_reading: life
  chosen_spanish_reading: vida
  alternative_spanish_readings:
  - alma
  rationale: El salmo trata de la imposibilidad de rescatar a una persona de la muerte. Traducir con «vida» evita proyectar una lectura dualista que el hebreo no exige y mantiene el foco en la existencia humana concreta.
  doctrine_reference: Translation philosophy §1, §3
- issue: Interpretación de la cláusula comprimida וְחָדַל לְעוֹלָם
  english_pob_reading: it ceases forever
  chosen_spanish_reading: cesa para siempre
  alternative_spanish_readings:
  - deja de ser posible para siempre
  - se abandona para siempre
  - no puede durar
  rationale: La construcción hebrea es elíptica y admite más de una lectura. «Cesa para siempre» preserva el valor literal de חדל y comunica la imposibilidad permanente del rescate sin sobreinterpretar el mecanismo exacto de la frase.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: La redacción sigue de cerca la revisión más literal del expediente inglés, que prefirió «it ceases forever» frente a una expansión interpretativa. En español se mantuvo esa literalidad en la cláusula final, pero con una sintaxis natural y publicada que no oscurece el sentido económico del rescate.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - «Rescate» se eligió por su fuerza transaccional; no se sustituyó por «redención» para no debilitar el matiz económico del término hebreo.
  - La cláusula final conserva la ambigüedad del hebreo mediante una traducción sobria y una nota alternativa, en vez de resolverla excesivamente en el texto principal.
