    issue: «el pacto» suena menos natural que «la alianza» para בְּרִית en español bíblico
    rationale: La fuente exige covenant, no necesariamente un calco contractual. En español eclesial amplio, «alianza» comunica mejor el concepto bíblico y mantiene dignidad y legibilidad.
  - severity: medium
    issue: «Mira hacia el pacto» es una formulación algo forzada
    rationale: הַבֵּט לַ־ expresa dirigir la atención favorablemente; en español, «mira la alianza» suena más natural que una construcción espacial literal con «hacia».
  - severity: medium
    issue: La nota b no corresponde bien al contraste auditado
    rationale: El texto principal ya dice «tierra» y la nota ofrece otra vez «tierra» frente a «territorio». El inglés auditado distingue «land» y «earth»; la nota española debe reflejar una alternativa real y clara.
  - severity: low
    issue: La nota c repite la opción principal como alternativa
    rationale: Si el texto principal usa «guaridas de violencia», la nota no debería presentarlo también como alternativa; conviene ofrecer «moradas» o «habitaciones/habitáculos» como opciones reales.
