translation:
  language: es
  text: Así Yahvé salvó a Ezequías y a los habitantes de Jerusalén de la mano de Senaquerib, rey de Asiria, y de la mano de todos[a], y los guió por todos lados[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y de la mano de todos». El hebreo deja sin expresar el objeto de «todos», probablemente refiriéndose a otros enemigos o poderes hostiles.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «y los llevó por todos lados»; algunos entienden la frase en un sentido más amplio, como protección o seguridad por todas partes.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיּוֹשַׁע / saved
  english_pob_choice: saved
  chosen_spanish: salvó
  alternatives_spanish:
  - liberó
  - dio victoria a
  lexicon: HALOT
  rationale: El verbo ישׁע expresa rescate o liberación. «Salvó» conserva bien en español la acción divina de rescatar y su peso teológico, sin especificar más de lo que el hebreo requiere.
- source_word: יְהוָה / Yahweh
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre propio divino en su forma recomendada para este proyecto, «Yahvé», en lugar de sustituirlo por un título. Esto preserva el Tetragrámaton del texto hebreo.
- source_word: יֹשְׁבֵי יְרוּשָׁלִַם / the inhabitants of Jerusalem
  english_pob_choice: the inhabitants of Jerusalem
  chosen_spanish: los habitantes de Jerusalén
  alternatives_spanish:
  - los residentes de Jerusalén
  - los que habitaban en Jerusalén
  lexicon: HALOT
  rationale: La construcción participial hebrea significa literalmente quienes habitan Jerusalén. «Habitantes» es formal, natural en español y fiel al valor sustantivado del participio.
- source_word: מִיַּד / from the hand of
  english_pob_choice: from the hand of
  chosen_spanish: de la mano de
  alternatives_spanish:
  - del poder de
  - de
  lexicon: HALOT
  rationale: Se conserva la imagen idiomática hebrea de «mano» para expresar poder o control. En español «de la mano de» es comprensible y mantiene la metáfora fuente.
- source_word: וּמִיַּד כֹּל / and from the hand of all others
  english_pob_choice: and from the hand of all others
  chosen_spanish: y de la mano de todos
  alternatives_spanish:
  - y de la mano de todos los demás
  - y de la mano de todos los enemigos
  lexicon: HALOT
  rationale: כֹּל es elíptico y no nombra explícitamente el objeto; por eso se traduce de manera amplia como «todos», dejando abierta la referencia implícita a otros poderes hostiles sin añadir un sustantivo que el hebreo no da.
- source_word: וַיְנַהֲלֵם / and he guided them
  english_pob_choice: and he guided them
  chosen_spanish: y los guió
  alternatives_spanish:
  - y los condujo
  - y los llevó
  lexicon: HALOT
  rationale: נהל significa conducir o guiar. «Guió» reproduce ese sentido básico con claridad y evita convertir la frase en una paráfrasis más interpretativa.
- source_word: מִסָּבִיב / on every side
  english_pob_choice: on every side
  chosen_spanish: en derredor
  alternatives_spanish:
  - por todos lados
  - por todas partes
  lexicon: HALOT
  rationale: La forma adverbial expresa extensión envolvente. «En derredor» mantiene la idea de alrededor/rodeando y suena digno en un registro bíblico español sin perder inteligibilidad.
theological_decisions:
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. Siguiendo la política del proyecto, se conserva el nombre divino en vez de una sustitución titulada, para reflejar el nombre personal del pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de וּמִיַּד כֹּל
  english_pob_reading: and from the hand of all others
  chosen_spanish_reading: y de la mano de todos
  alternative_spanish_readings:
  - y de la mano de todos los demás
  - y de la mano de todos los enemigos
  rationale: El hebreo omite el complemento del pronombre colectivo. Se conserva esa indeterminación en español para no resolver prematuramente la referencia, manteniendo la tensión lexical documentada en el audit trail.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: preserve theological tension rather than resolve it'
- issue: Sentido de וַיְנַהֲלֵם מִסָּבִיב
  english_pob_reading: and he guided them on every side
  chosen_spanish_reading: y los guió en derredor
  alternative_spanish_readings:
  - y los condujo por todos lados
  - y los hizo descansar por todos lados
  rationale: Se preserva el valor léxico básico de נהל como guiar/conducir, sin convertir la expresión en una paráfrasis como «hizo descansar», que iría más allá del verbo y cerraría una ambigüedad interpretativa.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'El pasaje muestra alto grado de acuerdo en la revisión más reciente y no presenta cambios aplicados. La redacción española sigue el sentido hebreo directo y conserva las dos zonas de ambigüedad ya documentadas en el audit trail inglés: el objeto elíptico de כֹּל y la amplitud semántica de נהל con מִסָּבִיב.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יהוה.
  - Se mantiene «mano» en la locución idiomática para conservar la imagen hebrea.
  - «Guió» conserva el sentido central de נהל sin introducir «descanso» en el texto principal.
  - La puntuación y el orden responden a un español bíblico moderno, claro y publicable.
