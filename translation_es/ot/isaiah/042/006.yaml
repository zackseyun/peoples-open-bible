base_translation:
  language: en
  yaml_path: translation/ot/isaiah/042/006.yaml
  text: I am Yahweh[a]; I have called you in righteousness, and I will take hold of your hand; I will keep you and give you as a covenant for the people[c][b], as a light for the nations.
  footnotes:
