translation:
  language: es
  text: Y acontecerá en los postreros días[a] que el monte de la casa de Yahvé será establecido como el principal de los montes[b], y será exaltado sobre las colinas, y pueblos fluirán[c] hacia él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en los últimos días» o «en días venideros».
    reason: alternative_reading
  - marker: b
    text: 'Hebreo: «en la cabeza de los montes»; la expresión puede denotar prominencia suprema, no solo ubicación física.'
    reason: lexical_alternative
  - marker: c
    text: El verbo pinta a los pueblos «fluyendo» como un arroyo hacia el monte.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: And it will happen
  chosen_spanish: Y acontecerá
  alternatives_spanish:
  - Y sucederá
  - Y será
  lexicon: HALOT
  rationale: La forma verbal introduce un acontecimiento futuro profético; «acontecerá» mantiene el valor eventivo con un tono natural y digno en español.
- source_word: בְּאַחֲרִית הַיָּמִים
  english_pob_choice: in the latter days
  chosen_spanish: en los postreros días
  alternatives_spanish:
  - en los últimos días
  - en días venideros
  lexicon: HALOT
  rationale: «Postreros días» conserva el registro profético y la amplitud escatológica sin fijar de antemano un marco doctrinal más estrecho.
- source_word: הַר בֵּית יְהוָה
  english_pob_choice: the mountain of the house of Yahweh
  chosen_spanish: el monte de la casa de Yahvé
  alternatives_spanish:
  - el monte de la casa de Yahweh
  - el monte de la casa del Yahvé
  lexicon: HALOT
  rationale: «Monte» refleja el hebreo הַר y «casa de Yahvé» conserva la construcción nominal del original y el nombre divino según la política del proyecto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el término estándar del proyecto para el nombre divino, manteniendo transparencia respecto del hebreo.
- source_word: נָכוֹן
  english_pob_choice: established
  chosen_spanish: será establecido
  alternatives_spanish:
  - quedará firme
  - será afirmado
  lexicon: HALOT
  rationale: «Establecido» comunica firmeza, fijación y permanencia; funciona bien con la imagen del monte exaltado.
- source_word: בְּרֹאשׁ הֶהָרִים
  english_pob_choice: as the chief of the mountains
  chosen_spanish: como cabeza de los montes
  alternatives_spanish:
  - en la cumbre de los montes
  - como lo más alto de los montes
  - como principal entre los montes
  lexicon: HALOT
  rationale: «Cabeza» conserva la metáfora de rango/prominencia del hebreo, sin reducirla a una mera ubicación física.
- source_word: וְנִשָּׂא הוּא מִגְּבָעוֹת
  english_pob_choice: and it will be lifted up above the hills
  chosen_spanish: y será exaltado sobre las colinas
  alternatives_spanish:
  - y será levantado sobre las colinas
  - y será alzado por encima de las colinas
  lexicon: HALOT
  rationale: «Exaltado» preserva la elevación honorífica y espacial del verbo, sin decidir si la imagen es literal, simbólica o ambas.
- source_word: וְנָהֲרוּ
  english_pob_choice: will stream
  chosen_spanish: fluirán
  alternatives_spanish:
  - acudirán en tropel
  - vendrán como arroyo
  - se precipitarán
  lexicon: HALOT
  rationale: El verbo hebreo sugiere movimiento como de corriente; «fluirán» conserva la metáfora de manera clara y fiel.
- source_word: עַמִּים
  english_pob_choice: peoples
  chosen_spanish: pueblos
  alternatives_spanish:
  - naciones
  - gentes
  lexicon: HALOT
  rationale: «Pueblos» mantiene la pluralidad étnica y humana del hebreo mejor que «naciones», que puede sonar demasiado político o estatal.
- source_word: עָלָיו
  english_pob_choice: to it
  chosen_spanish: hacia él
  alternatives_spanish:
  - a él
  - sobre él
  lexicon: HALOT
  rationale: Aunque el referente es el monte, el español fluye mejor con «hacia él» para el movimiento ascendente implícito; se mantiene la referencia pronominal sin sobrecargar la sintaxis.
theological_decisions:
- issue: Expresión profética del tiempo final
  english_pob_reading: in the latter days
  chosen_spanish_reading: en los postreros días
  alternative_spanish_readings:
  - en los últimos días
  - en días venideros
  rationale: La frase conserva la apertura escatológica del hebreo sin imponer un sistema doctrinal específico; deja intacta la tensión profética del texto.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
- issue: Naturaleza de la exaltación del monte
  english_pob_reading: The language is rendered as both spatial and honorific exaltation without deciding between literal topographical change and symbolic supremacy.
  chosen_spanish_reading: La traducción mantiene la exaltación espacial y honorífica sin decidir entre elevación topográfica literal o supremacía simbólica.
  alternative_spanish_readings:
  - elevación literal estricta
  - primacía puramente metafórica
  rationale: El hebreo permite más de una lectura; el español debe conservar esa amplitud sin cerrar prematuramente el sentido.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: No se registraron revisiones aplicadas en el expediente más reciente; el pasaje fue revisado y quedó sin cambios, con alta concordancia entre verificaciones.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme al estándar del proyecto para el nombre divino.
  - 'Se conserva el paralelismo del original con dos miembros de exaltación: «cabeza de los montes» / «exaltado sobre las colinas».'
  - «Pueblos» y «fluirán» preservan la universalidad y la imagen acuática del verbo hebreo.
  - La puntuación y el orden sintáctico buscan una lectura pública natural sin perder la estructura profética del hebreo.
