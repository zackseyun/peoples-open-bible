  text: יָרֹ֣נּוּ וְ/יִשְׂמְחוּ֮ חֲפֵצֵ֪י צִ֫דְקִ֥/י וְ/יֹאמְר֣וּ תָ֭מִיד יִגְדַּ֣ל יְהוָ֑ה הֶ֝/חָפֵ֗ץ שְׁל֣וֹם עַבְדּֽ/וֹ׃
base_translation:
  language: en
  yaml_path: translation/ot/psalms/035/027.yaml
  text: Let those who delight in my vindication shout for joy and be glad[a]; let them say continually, “May Yahweh be magnified[b], who delights in the peace of his servant.”
  footnotes:
  - marker: a
    text: Or “my righteousness” or “my justice.” The Hebrew term can denote righteousness in a moral or legal sense; here it likely refers to the psalmist’s vindication.
    reason: lexical_alternative
  - marker: b
    text: “Peace” can also mean “well-being” or “prosperity.”
    reason: lexical_alternative
