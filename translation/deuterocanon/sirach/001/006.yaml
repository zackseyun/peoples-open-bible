translation:
  text: One alone is fearsome[b][a], God ruling over all her storehouses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The extant Cairo Geniza Hebrew line supplied here is a major mismatch for this verse ('One alone is fearsome, God ruling over all her storehouses' or similar). Because the Hebrew witness does not align with Sirach 1:6 in the Greek tradition, the main translation follows the Greek text.
    reason: textual_variant
  - marker: b
    text: Or 'her devices' / 'her strategies' for 'her subtleties'; the Greek term can denote clever workings, though here without a clearly negative sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: ῥίζα / [Hebrew witness diverges]
  chosen: root
  alternatives:
  - source
  - foundation
  lexicon: LSJ
  rationale: The extant Hebrew in Zone 1 is a major mismatch and does not correspond to the Greek parallel for this verse. Since the project policy for Sirach is to translate from Hebrew where it survives, but to use the Greek where the Hebrew is missing or uncertain, the Greek ῥίζα is taken as the operative source here. 'Root' is the plain lexical sense and preserves the metaphor.
- source_word: σοφίας
  chosen: wisdom
  lexicon: LSJ
  rationale: Standard rendering for σοφία; no contextual reason to vary.
- source_word: τίνι ἀπεκαλύφθη
  chosen: has been revealed to whom
  alternatives:
  - was disclosed to whom
  - was uncovered to whom
  lexicon: LSJ
  rationale: The passive of ἀποκαλύπτω naturally means 'be revealed/disclosed.' In English idiom the clause is best rendered 'To whom has ... been revealed?' while preserving the passive sense.
- source_word: πανουργεύματα αὐτῆς
  chosen: her subtleties
  alternatives:
  - her devices
  - her strategies
  - her workings
  lexicon: LSJ
  rationale: πανουργεύματα can carry a negative sense ('tricks, knaveries') in some contexts, but here with wisdom as the subject it more likely denotes her intricate operations or cleverness. 'Subtleties' preserves complexity without importing moral suspicion.
- source_word: τίς ἔγνω
  chosen: who has known
  alternatives:
  - who knew
  - who has understood
  lexicon: LSJ
  rationale: Aorist ἔγνω can be rendered as simple past or English perfect in a gnomic question. 'Has known' fits the timeless rhetorical force in context.
