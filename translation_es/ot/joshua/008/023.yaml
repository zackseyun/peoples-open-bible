translation:
  language: es
  text: Pero ellos capturaron vivo al rey de Hai[a] y lo llevaron a Josué.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y capturaron vivo al rey de Hai y lo llevaron a Josué».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אֶת
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Mas
  lexicon: HALOT
  rationale: La conjunción introduce una nueva acción en secuencia y, en el contexto inmediato, conserva el leve matiz de contraste que el inglés POB expresó con 'But'. En español, 'Pero' fluye de manera natural sin perder la continuidad narrativa.
- source_word: מֶלֶךְ הָעַי
  english_pob_choice: the king of Ai
  chosen_spanish: el rey de Hai
  alternatives_spanish:
  - el rey de Ai
  - Hai, su rey
  lexicon: HALOT
  rationale: Se conserva el título con la preposición posesiva natural en español. Se translitera el topónimo como 'Hai' para mantener una forma española estable y legible, sin alterar el referente geográfico.
- source_word: תָּפְשׂוּ
  english_pob_choice: captured
  chosen_spanish: capturaron
  alternatives_spanish:
  - aprisionaron
  - se apoderaron de
  lexicon: HALOT
  rationale: En contexto militar, el verbo expresa la acción de prender o tomar como prisionero; 'capturaron' comunica con claridad y sin añadir matices no presentes en el hebreo.
- source_word: חָי
  english_pob_choice: alive
  chosen_spanish: vivo
  alternatives_spanish:
  - con vida
  - vivo aún
  lexicon: HALOT
  rationale: El adjetivo predicativo indica que el rey fue tomado sin ser muerto. 'Vivo' es la equivalencia directa y natural en español.
- source_word: וַיַּקְרִבוּ אֹתוֹ אֶל יְהוֹשֻׁעַ
  english_pob_choice: brought him to Joshua
  chosen_spanish: lo llevaron a Josué
  alternatives_spanish:
  - lo presentaron a Josué
  - lo llevaron cerca de Josué
  lexicon: HALOT
  rationale: El hebreo usa קרב con אֶל para marcar dirección hacia Josué. El inglés POB simplifica a 'brought him to Joshua' por naturalidad; en español, 'lo llevaron a Josué' conserva esa direccionalidad sin forzar una perífrasis menos idiomática. Se evita 'presentaron' porque añade una connotación judicial no explícita.
translation_notes:
  revision_awareness: 'La versión inglesa auditada pasó de ''brought him near to Joshua'' a ''brought him to Joshua'' por naturalidad, manteniendo el sentido hebreo. La redacción española sigue esa decisión: preserva la dirección del verbo hebreo sin sobrecargar el verso con una redundancia espacial artificial.'
  spanish_consistency_notes:
  - Se mantiene 'Josué' como forma española del nombre propio.
  - Se usa 'Hai' como transliteración consistente del topónimo עַי en esta nota, acorde con una forma española legible.
  - El orden narrativo y la voz verbal se ajustan al español bíblico moderno sin introducir arcaísmos ni explicaciones ajenas al texto.
