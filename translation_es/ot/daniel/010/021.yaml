revisions:
- from: Pero yo te diré lo que está consignado en la escritura de la verdad[a]. Y no hay nadie que se mantenga firme conmigo contra estas cosas, sino Miguel[b], vuestro príncipe.
  to: Pero yo te diré lo que está consignado en la escritura de la verdad[a]. Y no hay nadie que se mantenga firme conmigo contra estos, sino Miguel[b], su príncipe.
  rationale: 'Se hicieron dos ajustes menores: (1) ''vuestro príncipe'' se cambió a ''su príncipe'' para cumplir con el español neutral latinoamericano solicitado, sin perder el valor de segunda persona plural del hebreo; (2) ''contra estas cosas'' se simplificó a ''contra estos'' para conservar mejor la apertura del referente hebreo y sonar más natural en español, ajustando la nota en consecuencia.'
