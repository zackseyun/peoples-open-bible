translation:
  language: es
  text: 'Y capturamos todas sus ciudades en aquel tiempo; no hubo ninguna ciudad que no tomáramos de ellos: sesenta ciudades[a], todo el territorio de Argob, el reino de Og en Basán.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «de ellos», probablemente referido a la gente o las fuerzas de Og, no solo a Og mismo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַנִּלְכֹּד
  english_pob_choice: captured
  chosen_spanish: capturamos
  alternatives_spanish:
  - tomamos por conquista
  - apresamos
  lexicon: HALOT
  rationale: El verbo לכד en contexto bélico expresa captura o toma militar. «Capturamos» conserva el sentido de conquista sin perder naturalidad en español.
- source_word: כָּל עָרָיו
  english_pob_choice: all his cities
  chosen_spanish: todas sus ciudades
  alternatives_spanish:
  - todas sus poblaciones
  - todas sus villas
  lexicon: HALOT
  rationale: עיר puede ser «ciudad» o «población», pero la forma plural con sufijo posesivo se expresa de manera clara y estándar como «sus ciudades», manteniendo el referente a Og.
- source_word: בָּעֵת הַהִוא
  english_pob_choice: at that time
  chosen_spanish: en aquel tiempo
  alternatives_spanish:
  - entonces
  - en ese tiempo
  lexicon: HALOT
  rationale: Es una fórmula temporal fija; «en aquel tiempo» es natural, solemne y fiel al valor deíctico del hebreo.
- source_word: לֹא הָיְתָה קִרְיָה אֲשֶׁר לֹא לָקַחְנוּ מֵאִתָּם
  english_pob_choice: there was not a city that we did not take from them
  chosen_spanish: no hubo ninguna ciudad que no tomáramos de ellos
  alternatives_spanish:
  - no quedó ninguna ciudad que no tomáramos de ellos
  - no había ciudad que no tomáramos de ellos
  lexicon: HALOT
  rationale: La doble negación hebrea se refleja con una estructura equivalente en español. «Tomáramos de ellos» conserva el sentido de לקח con מן en lenguaje de conquista, sin suavizar la fuerza del original.
- source_word: מֵאִתָּם
  english_pob_choice: from them
  chosen_spanish: de ellos
  alternatives_spanish:
  - de su gente
  - de sus manos
  lexicon: HALOT
  rationale: El plural del sufijo se mantiene como plural español. «De ellos» evita reducir indebidamente el referente a Og solo, como señala la auditoría inglesa.
- source_word: שִׁשִּׁים עִיר
  english_pob_choice: sixty cities
  chosen_spanish: sesenta ciudades
  alternatives_spanish:
  - sesenta poblaciones
  lexicon: HALOT
  rationale: La construcción numeral + sustantivo es directa. «Ciudades» mantiene coherencia con el resto del versículo.
- source_word: כָּל חֶבֶל אַרְגֹּב
  english_pob_choice: all the region of Argob
  chosen_spanish: todo el territorio de Argob
  alternatives_spanish:
  - toda la región de Argob
  - todo el distrito de Argob
  lexicon: HALOT
  rationale: חבל aquí designa una circunscripción o territorio. «Territorio» es claro y suficientemente amplio para el español bíblico contemporáneo.
- source_word: מַמְלֶכֶת עוֹג בַּבָּשָׁן
  english_pob_choice: the kingdom of Og in Bashan
  chosen_spanish: el reino de Og en Basán
  alternatives_spanish:
  - el reino de Og, en Basán
  lexicon: HALOT
  rationale: La cadena constructa se vierte con naturalidad como «el reino de Og en Basán», manteniendo la relación posesiva y locativa del hebreo.
translation_notes:
  revision_awareness: 'El texto español sigue de cerca la estructura del hebreo y el juicio auditado del POB inglés: captura militar, doble negación, plural de «de ellos» y «territorio» para חֶבֶל, sin introducir glosas no sustentadas.'
  spanish_consistency_notes:
  - Se conserva «Basán» como forma tradicional castellana ampliamente reconocible.
  - Se eligió «capturamos» para reflejar el acto militar y evitar la neutralización de לכד.
  - Se mantuvo el plural en «de ellos» para respetar el sufijo hebreo y la nota auditada del inglés.
  - No se introdujo puntuación interpretativa adicional aparte de la pausa de enumeración y la nota al pie.
