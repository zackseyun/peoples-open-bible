id: HOS.10.6
reference: Hosea 10:6
source:
  edition: WLC
  text: גַּם אוֹת/וֹ֙ לְ/אַשּׁ֣וּר יוּבָ֔ל מִנְחָ֖ה לְ/מֶ֣לֶךְ יָרֵ֑ב בָּשְׁנָה֙ אֶפְרַ֣יִם יִקָּ֔ח וְ/יֵב֥וֹשׁ יִשְׂרָאֵ֖ל מֵ/עֲצָתֽ/וֹ־׃
translation:
  text: Even it will be carried to Assyria as tribute for King Yareb[a]; Ephraim will receive shame[b], and Israel will be ashamed of its counsel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'King Yareb.' The name may instead be understood as a title such as 'the avenging king' or 'the contending king.'
    reason: alternative_reading
  - marker: b
    text: Or 'because of his counsel' / 'because of its plan.' The Hebrew may refer to Israel's own policy or counsel.
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּם
  chosen: Even
  alternatives:
  - also
  lexicon: HALOT
  rationale: 'Fronted particle adds emphasis: not only the people, but even the calf/idol just mentioned in context. ''Even'' captures the emphatic force better than a flat ''also.'''
- source_word: אוֹתוֹ
  chosen: it
  alternatives:
  - him
  lexicon: HALOT
  rationale: The pronoun refers back to the calf/idol of Beth-aven in the immediate context, an inanimate object in English idiom, so 'it' is preferable.
- source_word: לְאַשּׁוּר
  chosen: to Assyria
  alternatives:
  - for Assyria
  lexicon: HALOT
  rationale: With יובל ('will be brought/carried'), the preposition marks destination. 'To Assyria' is the most natural English rendering.
- source_word: יוּבָל
  chosen: will be carried
  alternatives:
  - will be brought
  - will be led
  lexicon: HALOT
  rationale: Hophal of יבל denotes being brought/carried along. Because the object is the idol, 'carried' fits better than 'led' and preserves the passive sense.
- source_word: מִנְחָה
  chosen: as tribute
  alternatives:
  - gift
  - offering
  - present
  lexicon: HALOT
  rationale: In this political context involving Assyria and a king, מִנְחָה most likely denotes tribute presented to a superior ruler rather than a cultic offering.
- source_word: לְמֶלֶךְ יָרֵב
  chosen: for King Yareb
  alternatives:
  - to King Yareb
  - for the avenging king
  - for the great king
  lexicon: HALOT
  rationale: The phrase is traditionally taken as a royal name/title in Hosea (cf. 5:13). Since יָרֵב is morphologically name-like here and personal names are transliterated by project philosophy, 'King Yareb' is retained in the main text, while interpretive alternatives are preserved in a footnote.
- source_word: בָּשְׁנָה
  chosen: will receive shame
  alternatives:
  - will take shame
  - will carry disgrace
  lexicon: HALOT
  rationale: The noun means 'shame/disgrace.' With לקח, the idiom is that Ephraim 'takes' or 'receives' shame. 'Receive shame' is idiomatic modern English while preserving the sense.
- source_word: יִקָּח
  chosen: will receive
  alternatives:
  - will take
  lexicon: HALOT
  rationale: English idiom with an abstract object ('shame') favors 'receive' over the more wooden 'take.'
- source_word: וְיֵבֹשׁ
  chosen: will be ashamed
  alternatives:
  - will be put to shame
  lexicon: HALOT
  rationale: Qal of בוש can mean feel shame or be put to shame. Here, in parallel with Ephraim's receiving shame, 'will be ashamed' preserves the straightforward verbal sense without over-interpreting agency.
- source_word: מֵעֲצָתוֹ
  chosen: of his counsel
  alternatives:
  - because of his counsel
  - of its counsel
  - because of its plan
  lexicon: HALOT
  rationale: 'The preposition מן after בוש can mark cause/source: ashamed because of one''s counsel/plan. ''Of his counsel'' is concise and preserves the Hebrew construction. The suffix likely refers corporately to Ephraim/Israel or to its policy; English keeps the singular as in the Hebrew.'
