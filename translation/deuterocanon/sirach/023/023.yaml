  text: πρῶτον μὲν γὰρ ἐν νόμῳ Ὑψίστου ἠπείθησεν, καὶ δεύτερον εἰς ἄνδρα ἑαυτῆς ἐπλημμέλησεν· καὶ τὸ τρίτον ἐν πορνείᾳ ἐμοιχεύθη, ἐξ ἀλλοτρίου ἀνδρὸς τέκνα παρέστησεν.
