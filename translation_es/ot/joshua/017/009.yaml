translation:
  language: es
  text: Entonces el límite descendió hasta el arroyo de Caná[a], al sur del arroyo. Estas ciudades pertenecían a Efraín, entre las ciudades de Manasés[b], y el límite de Manasés estaba al norte del arroyo, y su extremo estaba en el mar[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «wadi de Caná». El hebreo נחל puede referirse a un cauce estacional, una quebrada o un arroyo.
    reason: lexical_alternative
  - marker: b
    text: Es decir, Efraín tenía ciudades situadas dentro del territorio asignado a Manasés.
    reason: cultural_note
  - marker: c
    text: Aquí «el mar» se refiere al mar Mediterráneo.
    reason: cultural_note
lexical_decisions:
- source_word: וְיָרַד
  english_pob_choice: Then ... went down
  chosen_spanish: Entonces ... descendió
  alternatives_spanish:
  - Y ... bajó
  - Luego ... descendió
  lexicon: HALOT
  rationale: En descripciones de fronteras, ירד expresa el trazado que baja en dirección o altitud. «Descendió» conserva la imagen direccional; «Entonces» reproduce el valor secuencial de la waw sin sonar redundante en español.
- source_word: הַגְּבוּל
  english_pob_choice: the border
  chosen_spanish: el límite
  alternatives_spanish:
  - la frontera
  - el borde
  lexicon: HALOT
  rationale: En textos de reparto territorial, גבול se refiere a la línea o extensión que delimita un territorio. «Límite» es natural en español bíblico contemporáneo y evita la connotación moderna de frontera política entre estados.
- source_word: נַחַל קָנָה
  english_pob_choice: the Brook of Kanah
  chosen_spanish: el arroyo de Cana
  alternatives_spanish:
  - el torrente de Cana
  - el wadi de Cana
  lexicon: HALOT
  rationale: נחל puede designar cauce estacional, quebrada o arroyo. «Arroyo» comunica bien el curso de agua en español; se conserva el nombre propio transliterado como Cana para no perder la referencia geográfica.
- source_word: נֶגְבָּה לַנַּחַל
  english_pob_choice: south of the brook
  chosen_spanish: al sur del arroyo
  alternatives_spanish:
  - al sur del torrente
  - al lado sur del arroyo
  lexicon: HALOT
  rationale: La revisión inglesa corrigió la idea de movimiento por una ubicación relativa. «Al sur del arroyo» refleja con precisión la posición sin sugerir desplazamiento hacia él.
- source_word: עָרִים הָאֵלֶּה לְאֶפְרַיִם
  english_pob_choice: These cities belonged to Ephraim
  chosen_spanish: Estas ciudades pertenecían a Efraín
  alternatives_spanish:
  - Estas ciudades eran de Efraín
  - Estas ciudades correspondían a Efraín
  lexicon: HALOT
  rationale: La cláusula sin verbo expresa asignación/posesión territorial. «Pertenecían a» comunica bien el sentido de heredad asignada sin forzar una formulación más interpretativa.
- source_word: בְּתוֹךְ עָרֵי מְנַשֶּׁה
  english_pob_choice: among the cities of Manasseh
  chosen_spanish: entre las ciudades de Manasés
  alternatives_spanish:
  - dentro de las ciudades de Manasés
  - en medio de las ciudades de Manasés
  lexicon: HALOT
  rationale: בתוך señala inclusión/enclave. «Entre» expresa de modo natural que había ciudades de Efraín situadas dentro del conjunto territorial de Manasés, manteniendo la tensión territorial.
- source_word: וּגְבוּל מְנַשֶּׁה מִצְּפוֹן לַנַּחַל
  english_pob_choice: and the border of Manasseh was on the north side of the brook
  chosen_spanish: y el límite de Manasés estaba al norte del arroyo
  alternatives_spanish:
  - y el límite de Manasés quedaba al norte del arroyo
  - y el límite de Manasés estaba en el lado norte del arroyo
  lexicon: HALOT
  rationale: מִצְּפוֹן indica localización en el lado norte. «Al norte del arroyo» es idiomático y fiel; conserva la relación espacial sin añadir un matiz direccional no explícito.
- source_word: וַיְהִי תֹצְאֹתָיו הַיָּמָּה
  english_pob_choice: and its end was at the sea
  chosen_spanish: y su extremo llegaba hasta el mar
  alternatives_spanish:
  - y sus salidas llegaban hasta el mar
  - y su término estaba en el mar
  lexicon: HALOT
  rationale: תוצאות en fórmulas de límites indica el punto terminal o las salidas del trazado. «Extremo» preserva esa idea en español; «llegaba hasta» expresa el alcance final. «Mar» sigue la referencia geográfica tradicional al Mediterráneo.
translation_notes:
  revision_awareness: 'Se incorporó la corrección de la revisión inglesa que cambió una idea de movimiento («southward to the brook») por una relación espacial estática («south of the brook»). También se mantuvo la tensión territorial del texto: ciudades de Efraín dentro del territorio de Manasés, con su límite al norte del arroyo y su término hacia el mar.'
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto lo requiera; este versículo no contiene el tetragrámaton ni κύριος.
  - Se mantuvo «Manasés» y «Efraín» como nombres propios bíblicos estándar en español.
  - Se prefirió «arroyo» para נחל por claridad y fluidez, dejando la alternativa «wadi» en nota por ser más técnica pero menos natural para lectura pública.
