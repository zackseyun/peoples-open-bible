id: JHN.17.9
reference: 'John 17:9'
language:
  code: ko
  name: Korean
  variant: '표준어 / modern formal-polite (합쇼체)'
source:
  edition: SBLGNT
  text: ἐγὼ περὶ αὐτῶν ἐρωτῶ· οὐ περὶ τοῦ κόσμου ἐρωτῶ ἀλλὰ περὶ ὧν δέδωκάς μοι, ὅτι σοί εἰσιν,
base_translation:
  language: en
  yaml_path: translation/nt/john/017/009.yaml
  text: I am asking on their behalf[a]. I am not asking on behalf of the world, but on behalf of those whom you have given me[b], because they are yours.
  footnotes:
  - marker: a
    text: Or 'for them' instead of 'concerning them'; the Greek preposition can carry either sense in this context.
    reason: lexical_alternative
  - marker: b
    text: Or 'I pray'; the Greek verb more literally means 'I ask' or 'I request.'
    reason: lexical_alternative
translation:
  language: ko
  text: 나는 그들을 위해 구합니다. 세상을 위해 구하는 것이 아니라, 아버지께서 내게 주신 사람들을 위해 구합니다. 그들은 아버지의 것이기 때문입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「그들에 관하여」. 헬라어 전치사는 본 문맥에서 두 가지 의미를 가질 수 있다.
    reason: lexical_alternative
  - marker: b
    text: 또는 「내가 기도합니다」. 헬라어 동사는 문자적으로 「내가 묻다·청하다」.
    reason: lexical_alternative
