translation:
  language: es
  text: 'Entonces Gedeón vio que era el ángel[a] de Yahvé, y Gedeón dijo: «¡Ah, Señor Dios! Porque he visto al ángel de Yahvé cara a cara».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mensajero». El hebreo מַלְאַךְ puede significar «ángel» o «mensajero».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּרְא
  english_pob_choice: Then ... saw
  chosen_spanish: Entonces ... comprendió
  alternatives_spanish:
  - Entonces ... vio
  - Y ... reconoció
  lexicon: HALOT
  rationale: 'El verbo ראה aquí incluye percepción con reconocimiento: Gedeón entiende quién es el ser que tiene delante. En español, «comprendió» comunica esa realización sin perder el avance narrativo marcado por וַ.'
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - cuando
  - pues
  lexicon: HALOT
  rationale: 'Introduce el contenido de la percepción de Gedeón: comprendió que era el ángel de Yahvé. «Que» es la forma natural y fiel en español.'
- source_word: מַלְאַךְ יְהוָה
  english_pob_choice: the angel of Yahweh
  chosen_spanish: el ángel de Yahvé
  alternatives_spanish:
  - el mensajero de Yahvé
  lexicon: HALOT
  rationale: מַלְאַךְ puede significar «ángel» o «mensajero». En este contexto narrativo, el ser aparece como un enviado sobrenatural; «ángel» preserva bien la lectura recibida sin borrar la posibilidad léxica de «mensajero», que se anota en nota.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino en su forma tradicional para el español de este proyecto, sin sustituirlo por una máscara como «SEÑOR».
- source_word: הוּא
  english_pob_choice: he was
  chosen_spanish: era
  alternatives_spanish:
  - era él
  - se trataba de él
  lexicon: HALOT
  rationale: El pronombre identifica al personaje ya presente en la escena. En español, «era» transmite la cópula necesaria para la identificación.
- source_word: אֲהָהּ
  english_pob_choice: Ah
  chosen_spanish: ¡Ah!
  alternatives_spanish:
  - ¡Ay!
  - ¡Oh no!
  lexicon: HALOT
  rationale: Expresa alarma o desconcierto. «¡Ah!» es breve, solemne y no demasiado coloquial.
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: Lord GOD
  chosen_spanish: Señor Dios
  alternatives_spanish:
  - Señor Yahvé
  - mi Señor, Yahvé
  lexicon: HALOT
  rationale: El hebreo combina una forma de tratamiento reverente con el nombre divino. En español, «Señor Dios» comunica la doble referencia con naturalidad; se evita una repetición artificial y se mantiene la reverencia del original.
- source_word: כִּי עַל כֵּן
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: La frase introduce la causa del temor de Gedeón. «Porque» conserva la fuerza explicativa del original en un español fluido.
- source_word: רָאִיתִי
  english_pob_choice: I have seen
  chosen_spanish: he visto
  alternatives_spanish:
  - vi
  - he contemplado
  lexicon: HALOT
  rationale: El perfecto hebreo expresa un hecho recién ocurrido con efecto presente. «He visto» lo reproduce de manera natural en español.
- source_word: פָּנִים אֶל פָּנִים
  english_pob_choice: face to face
  chosen_spanish: cara a cara
  alternatives_spanish:
  - frente a frente
  - en persona
  lexicon: HALOT
  rationale: Es un modismo hebreo para un encuentro directo. «Cara a cara» es el equivalente español más estable y transparente.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  rationale: El texto hebreo emplea el Tetragrámaton de forma directa. Se mantiene el nombre propio divino en español como «Yahvé», conforme a la práctica de este proyecto.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Interpretación de מַלְאַךְ יְהוָה
  english_pob_reading: the angel of Yahweh
  chosen_spanish_reading: el ángel de Yahvé
  alternative_spanish_readings:
  - el mensajero de Yahvé
  rationale: La escena presenta al enviado divino sin resolver de manera simplista su identidad teológica. «Ángel» respeta la lectura narrativa principal y conserva la tensión documentada entre mensajero y ser celestial.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'Coincide con la última revisión auditada: no se registran cambios necesarios en el contenido base, y la traducción española conserva la misma decisión central sobre el nombre divino y la ambigüedad de מַלְאַךְ.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para יְהוָה.
  - «Señor Dios» reproduce con naturalidad אֲדֹנָי יְהוִה sin forzar «Señor Yahvé».
  - «Cara a cara» conserva el modismo hebreo פָּנִים אֶל פָּנִים.
  - Se usa «comprendió» para reflejar la percepción reconocida en el contexto narrativo, sin perder el avance verbal de וַיַּרְא.
