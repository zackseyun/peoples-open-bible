revisions:
- from: El forastero que está entre ustedes subirá[a] cada vez más sobre ustedes, y ustedes descenderán cada vez más.
  to: El extranjero[a] que está entre ti subirá más y más por encima de ti, y tú bajarás más y más.
  rationale: Se ajusta הַגֵּר a 'extranjero' para alinearlo mejor con la decisión documentada del POB y con un español más claro. Se reemplaza la nota sobre 'subirá' por una nota léxica sobre גֵּר, siguiendo la lógica del audit trail inglés. También se restituye mejor la repetición intensiva y el contraste vertical del hebreo con 'más y más por encima de ti' / 'más y más', y se conserva la segunda persona singular del original.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:01:03Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del hebreo: el גֵּר que está dentro de la comunidad de Israel asciende por encima de Israel, mientras Israel desciende. También conserva la estructura de reversión de estatus propia del contexto de maldición del pacto. Sin embargo, el uso de la nota en ''subirá[a]'' introduce una alternativa innecesaria y el giro ''cada vez más'' en ambas mitades debilita la simetría vertical explícita de מַעְלָה מַּעְלָה / מַטָּה מָּטָּה.'
  spanish_quality_summary: El español es claro y legible, pero puede mejorarse para preservar mejor la imagen contrastiva del original. 'El forastero' es aceptable, aunque en este contexto 'el extranjero' suena más natural y ampliamente comprensible en español bíblico actual. 'Cada vez más' sin 'arriba/abajo' deja demasiado implícita la imaginería espacial que el hebreo enfatiza con repetición. Una redacción más fiel y natural sería 'subirá más y más por encima de ti, y tú bajarás más y más'.
  glossary_alignment: No hay términos del glosario mayor en juego como Yahvé o Mesías. Para הַגֵּר, el inglés POB documenta 'the foreigner' con alternativas 'sojourner' y 'resident alien'. En español, 'el extranjero' alinea mejor con esa decisión que 'el forastero', que puede sugerir más bien alguien de paso. Además, el hebreo usa segunda persona singular ('sobre ti', 'tú bajarás'); aunque el referente es colectivo, conservar el singular mejora la fidelidad formal y sigue siendo plenamente natural en español bíblico.
  issues:
  - severity: medium
    issue: הַגֵּר se vertió como 'el forastero'
    rationale: '''Forastero'' no es imposible, pero ''extranjero'' comunica mejor a un no nativo que reside entre Israel, en línea con la decisión inglesa ''the foreigner'' y con uso bíblico español más transparente.'
  - severity: medium
    issue: La duplicación מַעְלָה מַּעְלָה / מַטָּה מָּטָּה quedó reducida a 'cada vez más'
    rationale: Aunque expresa progresión, no conserva suficientemente el contraste espacial explícito de 'más y más arriba' / 'más y más abajo' o equivalente. El paralelismo hebreo pide una correspondencia más marcada.
  - severity: low
    issue: La nota [a] está anclada en 'subirá' y comenta una alternativa menor innecesaria
    rationale: La nota inglesa preserva alternativas para גֵּר, no para יַעֲלֶה עָלֶיךָ. En español es más útil conservar la nota léxica sobre 'extranjero'/'forastero'/'residente extranjero' que crear una nota nueva sobre 'por encima de'.
  - severity: low
    issue: Se cambió la segunda persona singular a plural ('ustedes')
    rationale: 'Es comprensible por el referente colectivo, pero el hebreo usa singular. En este versículo el singular puede mantenerse con naturalidad: ''entre ti... por encima de ti... tú bajarás''.'
  revised_spanish_text: El extranjero[a] que está entre ti subirá más y más por encima de ti, y tú bajarás más y más.
  revised_footnotes:
  - marker: a
    text: O 'el forastero' o 'el residente extranjero'. El hebreo גֵּר se refiere a un no nativo que vive entre Israel.
    reason: lexical_alternative
  revision_rationale: Se ajusta הַגֵּר a 'extranjero' para alinearlo mejor con la decisión documentada del POB y con un español más claro. Se reemplaza la nota sobre 'subirá' por una nota léxica sobre גֵּר, siguiendo la lógica del audit trail inglés. También se restituye mejor la repetición intensiva y el contraste vertical del hebreo con 'más y más por encima de ti' / 'más y más', y se conserva la segunda persona singular del original.
