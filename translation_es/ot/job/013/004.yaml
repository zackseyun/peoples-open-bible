translation:
  language: es
  text: Pero ustedes son embadurnadores de mentira[a]; todos ustedes son médicos inútiles[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «enlucidores de mentira» o «forjadores de mentiras». El verbo hebreo sugiere untar, cubrir o recubrir con una capa, preservando la imagen de tapar la realidad con falsedad.
    reason: lexical_alternative
  - marker: b
    text: O «médicos de ningún valor». La expresión hebrea los presenta como sanadores inútiles; una opción menos probable la relaciona con «ídolo», pero aquí ese sentido no encaja tan bien.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאוּלָם
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Mas
  - Sin embargo
  - No obstante
  lexicon: HALOT
  rationale: Marca un contraste adversativo fuerte con lo anterior; «Pero» es natural en español moderno y conserva la oposición directa.
- source_word: אַתֶּם
  english_pob_choice: you
  chosen_spanish: ustedes
  alternatives_spanish:
  - vosotros
  - ustedes todos
  lexicon: HALOT
  rationale: El hebreo plural marca que Job se dirige a varios interlocutores; «ustedes» expresa ese plural de forma natural y neutral en español.
- source_word: טֹפְלֵי
  english_pob_choice: plasterers of
  chosen_spanish: enlucidores de
  alternatives_spanish:
  - embadurnadores de
  - recubridores de
  - manchadores de
  lexicon: HALOT
  rationale: El verbo hebreo evoca la acción concreta de cubrir o untar una superficie. «Enlucidores de» conserva la imagen manual de cubrir con una capa, que funciona bien para el sarcasmo de Job sin borrar la metáfora.
- source_word: שָׁקֶר
  english_pob_choice: lies
  chosen_spanish: mentiras
  alternatives_spanish:
  - falsedad
  - engaño
  lexicon: HALOT
  rationale: El sustantivo puede ser colectivo; en español pluraliza con naturalidad después de un agente plural. «Mentiras» transmite el contenido falso que cubren.
- source_word: רֹפְאֵי
  english_pob_choice: physicians
  chosen_spanish: médicos
  alternatives_spanish:
  - sanadores
  - curanderos
  lexicon: HALOT
  rationale: Mantiene la figura profesional usada irónicamente por el contexto. «Médicos» suena más idiomático que «sanadores» y conserva el contraste retórico.
- source_word: אֱלִל
  english_pob_choice: worthless
  chosen_spanish: inútiles
  alternatives_spanish:
  - sin valor
  - inservibles
  - vanos
  lexicon: HALOT
  rationale: En este emparejamiento, el término describe a los supuestos médicos como incapaces de ayudar. «Inútiles» comunica bien la idea funcional de falta de valor sin introducir otra connotación innecesaria.
- source_word: כֻּלְּכֶם
  english_pob_choice: all of you
  chosen_spanish: todos ustedes
  alternatives_spanish:
  - todos
  - cada uno de ustedes
  lexicon: HALOT
  rationale: Reproduce el cierre enfático que incluye a todo el grupo de interlocutores; «todos ustedes» es claro y mantiene el golpe retórico final.
theological_decisions:
- issue: Término depreciativo אֱלִל aplicado a los consejeros
  english_pob_reading: worthless physicians
  chosen_spanish_reading: médicos inútiles
  alternative_spanish_readings:
  - médicos sin valor
  - médicos vanos
  - médicos de nada
  rationale: No se optó por «ídolos» porque aquí el contexto inmediato describe incapacidad y nulidad, no culto idolátrico. La traducción conserva la tensión semántica de inutilidad/insustancialidad sin forzar una lectura teológica ajena al verso.
  doctrine_reference: Job 13:4; HALOT on אֱלִל
- issue: Metáfora verbal טֹפְלֵי como cobertura engañosa
  english_pob_reading: plasterers of lies
  chosen_spanish_reading: enlucidores de mentiras
  alternative_spanish_readings:
  - embadurnadores de mentiras
  - recubridores de mentiras
  - forjadores de mentiras
  rationale: Se preserva la imagen concreta de cubrir una superficie con material, porque el reproche de Job acusa a sus amigos de tapar la realidad con falsedad. «Enlucidores» mantiene el gesto físico y evita diluir la metáfora en un término demasiado abstracto.
  doctrine_reference: Job 13:4; lexical imagery in טפל
translation_notes:
  revision_awareness: 'Coincide con el último estado revisado del audit trail inglés: no hubo cambios aplicados y el consenso de revisión es de alta concordancia. La presente redacción española sigue esa lectura sin introducir una reinterpretación nueva.'
  spanish_consistency_notes:
  - Se mantuvo el contraste adversativo inicial con una forma breve y natural en español.
  - Se conservó la metáfora concreta de cubrir/enlucir para טֹפְלֵי, en lugar de neutralizarla con un verbo abstracto.
  - Se tradujo אֱלִל en sentido de inutilidad, no como «ídolo», siguiendo la decisión inglesa y el contexto de reproche profesional.
  - Se usó el plural explícito «ustedes / todos ustedes» para reflejar el hebreo plural y el golpe final del verso.
