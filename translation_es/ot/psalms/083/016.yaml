revisions:
- from: Así, persíguelos con tu tormenta[a], y aterrorízalos con tu tempestad.
  to: Persíguelos con tu tormenta,[a] y aterrorízalos con tu tempestad.
  rationale: Se hace una reparación menor para mejorar la naturalidad y legibilidad en español, manteniendo plenamente el sentido hebreo y la fuerza imprecatoria. También se ajusta la nota para reflejar mejor las alternativas documentadas en la auditoría inglesa.
