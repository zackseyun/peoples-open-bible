base_translation:
  language: en
  yaml_path: translation/ot/2_kings/017/004.yaml
  text: Then the king of Assyria discovered a conspiracy in Hoshea[a], because he had sent messengers to So king of Egypt and had not sent up tribute to the king of Assyria, as year by year[d][c][b]. So the king of Assyria confined him and bound him in prison.
  footnotes:
  - marker: a
    text: Or 'found treason in Hoshea.' The Hebrew says literally 'found conspiracy in Hoshea,' an idiom for detecting disloyal plotting in him.
    reason: lexical_alternative
  - marker: b
    text: '''So'' is a transliteration of the Hebrew name. The historical identity of this Egyptian king is uncertain.'
    reason: cultural_note
  - marker: c
    text: Or 'had not brought up tribute' or more dynamically 'had not paid tribute.'
    reason: lexical_alternative
  - marker: d
    text: 'The Hebrew distinguishes two actions: the king of Assyria first detained or confined Hoshea, then bound him in prison.'
    reason: lexical_alternative
