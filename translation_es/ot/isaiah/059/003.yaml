base_translation:
  language: en
  yaml_path: translation/ot/isaiah/059/003.yaml
  text: For your hands are defiled with blood[a], and your fingers with iniquity; your lips have spoken falsehood[c][b], your tongue mutters injustice.
  footnotes:
  - marker: a
    text: Or 'your hands' instead of 'your palms'; the Hebrew more specifically refers to the palms of the hands.
    reason: lexical_alternative
  - marker: b
    text: Or 'stained with blood.' The Hebrew verb conveys defilement or pollution, not merely physical discoloration.
    reason: lexical_alternative
  - marker: c
    text: Or 'utters injustice.' The Hebrew verb can mean 'mutter,' 'murmur,' or more generally 'utter.'
    reason: lexical_alternative
