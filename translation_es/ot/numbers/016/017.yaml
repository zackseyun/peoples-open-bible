translation:
  language: es
  text: 'Y tome cada uno su incensario[a], y pongan incienso sobre ellos, y presenten delante de Yahvé[b] cada uno su incensario: doscientos cincuenta incensarios; y tú y Aarón, cada uno su incensario.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Incensario» traduce el recipiente para brasas e incienso; también puede entenderse como «brasero ritual».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: יהוה. Tradicionalmente se vierte «el SEÑOR»; aquí se conserva el nombre divino como «Yahvé».'
    reason: alternative_reading
lexical_decisions:
- source_word: וּקְחוּ
  english_pob_choice: And let each man take
  chosen_spanish: Y tomen cada uno
  alternatives_spanish:
  - Y tomen
  - Entonces tomen
  lexicon: HALOT
  rationale: El imperativo plural hebreo se dirige al grupo entero, pero el distributivo siguiente pide en español una construcción que reparta la acción sobre cada individuo. «Tomen cada uno» conserva el valor colectivo y distributivo sin añadir elementos no presentes.
- source_word: אִישׁ
  english_pob_choice: each man
  chosen_spanish: cada uno
  alternatives_spanish:
  - cada hombre
  - cada persona
  lexicon: HALOT
  rationale: Aquí אִישׁ funciona distributivamente con el posesivo singular posterior. «Cada uno» es natural en español y mantiene la fuerza distributiva sin forzar el género en exceso; el contexto ya indica los varones implicados.
- source_word: מַחְתָּתוֹ / מַחְתֹּת
  english_pob_choice: firepan / firepans
  chosen_spanish: incensario / incensarios
  alternatives_spanish:
  - braserillo / braserillos
  - censario / censarios
  lexicon: HALOT
  rationale: El objeto es el recipiente para las brasas y el incienso en el rito. «Incensario» es el término bíblico y litúrgicamente inteligible en español; aunque «brasero» o «brasero para incienso» serían más descriptivos, aquí el uso técnico resulta más fiel y claro.
- source_word: וּנְתַתֶּם עֲלֵיהֶם קְטֹרֶת
  english_pob_choice: and put incense on them
  chosen_spanish: y pongan incienso sobre él
  alternatives_spanish:
  - y pongan incienso en ellos
  - y coloquen incienso sobre ellos
  lexicon: HALOT
  rationale: El hebreo usa עַל («sobre») con el plural implícito del objeto ritual. En español, al referirse al incensario como recipiente concreto, «sobre él» comunica de forma natural el acto de poner el incienso sobre las brasas contenidas allí. Se conserva la relación espacial sin diluirla en una paráfrasis.
- source_word: קְטֹרֶת
  english_pob_choice: incense
  chosen_spanish: incienso
  alternatives_spanish:
  - perfume quemado
  - fragancia para quemar
  lexicon: HALOT
  rationale: Es el término usual para la sustancia ritual quemada; «incienso» es la correspondencia directa y estándar.
- source_word: וְהִקְרַבְתֶּם
  english_pob_choice: and bring
  chosen_spanish: y presenten
  alternatives_spanish:
  - y acerquen
  - y traigan
  lexicon: HALOT
  rationale: En contexto cultual, קרב en hiphil tiene el matiz de traer/presentar ante la presencia divina. «Presenten» preserva el valor ritual de acercamiento formal mejor que un simple «traigan».
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - en presencia de Yahvé
  - ante Yahvé
  lexicon: HALOT
  rationale: Se mantiene la convención POB de traducir el Tetragrámaton como «Yahvé». «Delante de» reproduce el idiomático לִפְנֵי sin sobrerrefinarlo; «ante» sería igualmente posible, pero «delante de» conserva una cadencia más cercana al hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - Jehová
  lexicon: HALOT
  rationale: La política terminológica del proyecto pide «Yahvé» para יהוה. Es la forma de nombre divino preferida para el texto principal, en lugar de una sustitución por título.
- source_word: חֲמִשִּׁים וּמָאתַיִם מַחְתֹּת
  english_pob_choice: two hundred and fifty firepans
  chosen_spanish: doscientos cincuenta incensarios
  alternatives_spanish:
  - 250 incensarios
  - doscientos cincuenta incensarios de incienso
  lexicon: HALOT
  rationale: Se conserva el número cardinal completo en estilo narrativo y el sustantivo ya establecido. No se añade «de incienso» porque el contexto inmediato ya identifica el objeto ritual.
- source_word: וְאַתָּה וְאַהֲרֹן אִישׁ מַחְתָּתוֹ
  english_pob_choice: and you and Aaron, each his firepan
  chosen_spanish: y tú y Aarón, cada uno su incensario
  alternatives_spanish:
  - y tú y Aarón, cada uno con su incensario
  - y tú y Aarón, cada uno con su incensario
  lexicon: HALOT
  rationale: La frase final añade a Moisés y Aarón al mismo patrón distributivo. «Cada uno su incensario» reproduce la concisión hebrea y la simetría del inglés auditado, sin introducir una preposición que el hebreo no exige.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton de forma explícita. Conforme a la doctrina terminológica del proyecto, se preserva el nombre propio divino en español como «Yahvé», no como una sustitución por título eclesiástico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: La versión española sigue de cerca la revisión final del inglés auditado, especialmente el orden de «presenten delante de Yahvé cada uno su incensario», y mantiene el paralelismo distributivo de la frase final. Se respetó la decisión teológica de usar el nombre divino explícito en lugar de una sustitución reverencial.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» de forma consistente para יהוה.
  - Se eligió «incensario» para el objeto ritual en todo el versículo, evitando alternar con «brasero» para no debilitar la correspondencia léxica.
  - La construcción distributiva «cada uno» se repite para reflejar el hebreo אִישׁ con posesivo singular.
  - 'El orden verbal sigue el patrón del original: tomar, poner incienso, presentar delante de Yahvé, y luego la especificación numérica y la mención de Moisés y Aarón.'
