translation:
  language: es
  text: Así que los hijos de Rubén, los hijos de Gad y la media tribu de Manasés volvieron y partieron de los hijos de Israel[a], desde Silo, que está en la tierra de Canaán, para ir a la tierra de Galaad, a la tierra de su posesión, que habían llegado a poseer[b] por mandato de Yahvé por medio de Moisés.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «De los hijos de Israel» conserva la formulación hebrea; también puede entenderse simplemente «de los israelitas».
    reason: lexical_alternative
  - marker: b
    text: O «de la cual habían tomado posesión». El hebreo puede enfatizar tanto el hecho de haber recibido/poseído la tierra como el de haber tomado posesión de ella.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי רְאוּבֵן / בְּנֵי גָד / חֲצִי שֵׁבֶט הַמְנַשֶּׁה
  english_pob_choice: the sons of Reuben and the sons of Gad and the half-tribe of Manasseh
  chosen_spanish: los hijos de Rubén, los hijos de Gad y la media tribu de Manasés
  alternatives_spanish:
  - los descendientes de Rubén, los descendientes de Gad y la media tribu de Manasés
  - los rubenitas, los gaditas y la media tribu de Manasés
  lexicon: HALOT
  rationale: Conservo la estructura genealógica del hebreo con «hijos de»/«hijos de» para reflejar el constructo, pero en español «media tribu» suena más natural y fiel que un calco pesado. «Manasés» mantiene el nombre propio bíblico estándar.
- source_word: וַיָּשֻׁבוּ
  english_pob_choice: returned
  chosen_spanish: volvieron
  alternatives_spanish:
  - regresaron
  - volvieron de regreso
  lexicon: HALOT
  rationale: El verbo שוב expresa volver o regresar. «Volvieron» preserva el movimiento de retorno con un español fluido y no añade matices que el hebreo no exige.
- source_word: וַיֵּלְכוּ
  english_pob_choice: departed
  chosen_spanish: se alejaron
  alternatives_spanish:
  - partieron
  - se fueron
  lexicon: HALOT
  rationale: La secuencia hebrea mantiene dos verbos de movimiento. En español, «se alejaron» conserva la idea de apartarse del grupo israelita sin repetir mecánicamente «volver y partir» de modo redundante.
- source_word: מֵאֵת בְּנֵי יִשְׂרָאֵל
  english_pob_choice: from the sons of Israel
  chosen_spanish: de los hijos de Israel
  alternatives_spanish:
  - de los israelitas
  - entre los hijos de Israel
  lexicon: HALOT
  rationale: Mantengo la fórmula hebrea «hijos de Israel» porque el POB inglés la preserva por transparencia. En español es inteligible y conserva el registro bíblico.
- source_word: מִשִּׁלֹה אֲשֶׁר בְּאֶרֶץ כְּנָעַן
  english_pob_choice: from Shiloh, which is in the land of Canaan
  chosen_spanish: desde Silo, que está en la tierra de Canaán
  alternatives_spanish:
  - desde Silo, en la tierra de Canaán
  - desde Silo, que está en Canaán
  lexicon: HALOT
  rationale: «Desde» refleja el punto de partida y «que está en» preserva la cláusula relativa de identificación geográfica. «Tierra de Canaán» mantiene el término territorial del hebreo.
- source_word: לָלֶכֶת
  english_pob_choice: to go
  chosen_spanish: para ir
  alternatives_spanish:
  - a ir
  - con el fin de ir
  lexicon: HALOT
  rationale: El infinitivo con ל expresa propósito. En español, «para ir» comunica la finalidad con naturalidad y sin sobrecargar la frase.
- source_word: אֶל אֶרֶץ הַגִּלְעָד
  english_pob_choice: to the land of Gilead
  chosen_spanish: a la tierra de Galaad
  alternatives_spanish:
  - a Galaad
  - a la región de Galaad
  lexicon: HALOT
  rationale: «Tierra de Galaad» conserva el énfasis territorial de אֶרֶץ. «Galaad» sigue la forma hispánica usual del topónimo.
- source_word: אֶל אֶרֶץ אֲחֻזָּתָם
  english_pob_choice: to the land of their possession
  chosen_spanish: a la tierra de su posesión
  alternatives_spanish:
  - a la tierra de su heredad
  - a su tierra de posesión
  lexicon: HALOT
  rationale: אֲחֻזָּה expresa un derecho de tenencia o posesión territorial. «Posesión» mantiene la fuerza legal y pactal mejor que una simple «tierra propia».
- source_word: אֲשֶׁר נֹאחֲזוּ בָהּ
  english_pob_choice: which they had taken possession of
  chosen_spanish: la cual habían tomado posesión de
  alternatives_spanish:
  - que habían poseído
  - en la que habían tomado posesión
  lexicon: HALOT
  rationale: El hebreo permite tanto la idea de recibir/poseer como la de tomar posesión. Conservo la opción más cercana al audit trail inglés y la marco como posible ambigüedad léxica en nota.
- source_word: עַל פִּי יְהוָה
  english_pob_choice: by the command of Yahweh
  chosen_spanish: por mandato de Yahvé
  alternatives_spanish:
  - según la palabra de Yahvé
  - por orden de Yahvé
  lexicon: HALOT
  rationale: «Por mandato de Yahvé» expresa bien el idiomático עַל־פִּי como decisión autorizada. Sigo el criterio del proyecto de usar «Yahvé» para el nombre divino.
- source_word: בְּיַד מֹשֶׁה
  english_pob_choice: through Moses
  chosen_spanish: por medio de Moisés
  alternatives_spanish:
  - por la mano de Moisés
  - mediante Moisés
  lexicon: HALOT
  rationale: «Por medio de» conserva la mediación instrumental del hebreo sin la literalidad extraña de «por la mano de». Moisés aparece como mediador del mandato divino.
theological_decisions:
- issue: Render del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo contiene el Tetragrámaton. Conforme a la terminología del proyecto, se traduce con el nombre propio «Yahvé», evitando el ocultamiento devocional del nombre.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Relación de autoridad entre Yahvé y Moisés
  english_pob_reading: by the command of Yahweh through Moses
  chosen_spanish_reading: por mandato de Yahvé por medio de Moisés
  alternative_spanish_readings:
  - según el mandato de Yahvé mediante Moisés
  - por orden de Yahvé a través de Moisés
  rationale: La frase hebrea combina la fuente de autoridad divina con la mediación mosaica. Mantengo ambas capas para no diluir la procedencia del mandato ni convertir a Moisés en origen autónomo.
  doctrine_reference: DOCTRINE.md Mediation and prophetic authority
- issue: Posesión hereditaria de la tierra
  english_pob_reading: the land of their possession, which they had taken possession of
  chosen_spanish_reading: la tierra de su posesión, la cual habían tomado posesión de
  alternative_spanish_readings:
  - la tierra de su heredad, que habían heredado
  - la tierra que poseían
  rationale: El hebreo insiste en el estatuto territorial-jurídico de la tierra. Conservo la repetición de «posesión» para no borrar la tensión entre heredad recibida y posesión efectivamente adquirida.
  doctrine_reference: DOCTRINE.md Land inheritance and covenant allotment
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del inglés POB, que prefirió un verbo de salida distinto de «went» para evitar redundancia con el infinitivo de propósito, y ajustó la última cláusula a una forma más cercana al valor léxico de אחז. En español se refleja esa misma sensibilidad con una combinación de retorno + alejamiento y con una fórmula posesiva que mantiene el doble matiz jurídico de la tierra.
  spanish_consistency_notes:
  - Uso «Yahvé» para יְהוָה conforme al estándar del proyecto.
  - Conservo «hijos de Israel» por transparencia, aunque «israelitas» sería una alternativa más idiomática.
  - Mantengo la repetición de «tierra / posesión» porque el hebreo subraya el estatus territorial.
  - Evito «Cristo» y otras terminologías no pertinentes.
  - La puntuación y el orden siguen un español bíblico moderno, sin calcos innecesarios.
