translation:
  language: es
  text: Cantad alabanzas a Yahvé, ustedes, sus fieles[a], y dad gracias al recuerdo[b] de su santidad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus santos» o «sus piadosos» para «sus fieles».
    reason: lexical_alternative
  - marker: b
    text: O «la memoria» o «el memorial»; también puede entenderse «al mencionar» su santidad.
    reason: lexical_alternative
lexical_decisions:
- source_word: זַמְּרוּ
  english_pob_choice: Sing praise
  chosen_spanish: Cantad alabanzas
  alternatives_spanish:
  - Cantad
  - Haced música de alabanza
  lexicon: HALOT
  rationale: El piel imperativo plural expresa acción de alabar con canto o música. «Cantad alabanzas» conserva el matiz doxológico y suena natural en español bíblico contemporáneo.
- source_word: לַיהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  lexicon: HALOT
  rationale: Siguiendo el criterio del proyecto para יהוה, se conserva el nombre divino como «Yahvé» en vez de sustituirlo por un título. Es más transparente con la fuente hebrea.
- source_word: חֲסִידָיו
  english_pob_choice: you his faithful ones
  chosen_spanish: sus fieles
  alternatives_spanish:
  - sus santos
  - sus piadosos
  - sus leales
  lexicon: HALOT
  rationale: חסיד describe a quienes muestran lealtad pactual y piedad. «Sus fieles» mantiene el sentido relacional y ético sin restringirlo a un uso eclesiástico de «santos».
- source_word: וְהוֹדוּ
  english_pob_choice: and give thanks
  chosen_spanish: y dad gracias
  alternatives_spanish:
  - y agradeced
  - y alabad
  lexicon: HALOT
  rationale: En contextos de alabanza, ידה en hiphil funciona como «dar gracias» u ofrecer agradecimiento. En español, esta opción encaja con el paralelismo del verso.
- source_word: לְזֵכֶר
  english_pob_choice: to the remembrance of
  chosen_spanish: a la memoria de
  alternatives_spanish:
  - para el recuerdo de
  - al recordar
  lexicon: HALOT
  rationale: לְ con זֵכֶר conserva la idea de dirigir el agradecimiento hacia el recuerdo o memorial. «A la memoria de» refleja el sustantivo sin forzar una paráfrasis verbal.
- source_word: קָדְשׁוֹ
  english_pob_choice: his holiness
  chosen_spanish: su santidad
  alternatives_spanish:
  - su carácter santo
  - su ser santo
  lexicon: HALOT
  rationale: קדש con sufijo posesivo se entiende de forma más natural en español como «su santidad», que expresa la cualidad santa de Dios en un registro digno y fiel al hebreo poético.
theological_decisions:
- issue: Rendering of the divine name יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton directamente. La norma del proyecto es preservarlo como «Yahvé», evitando el reemplazo por un título genérico y manteniendo la transparencia textual.
  doctrine_reference: 'DOCTRINE.md Contested terms: יהוה YHWH'
- issue: Vocative force of חֲסִידָיו
  english_pob_reading: you his faithful ones
  chosen_spanish_reading: ustedes sus fieles
  alternative_spanish_readings:
  - sus fieles
  - oh sus fieles
  rationale: La revisión inglesa aclaró que se trata de un vocativo. En español, «ustedes sus fieles» hace explícito el llamado directo y evita leerlo como un complemento no vocativo.
  doctrine_reference: Hebrew imperative/vocative syntax in Psalms 30:5
translation_notes:
  revision_awareness: 'Se tuvo en cuenta que la revisión inglesa más reciente ajustó la relación con לְ en «to the remembrance of» y aclaró el valor vocativo de חֲסִידָיו. La presente propuesta conserva esa estructura: un imperativo inicial, un llamado directo al grupo y una segunda cláusula preposicional que vincula el agradecimiento con la memoria de la santidad divina.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יהוה conforme al criterio del proyecto.
  - Se usa «fieles» para חֲסִידִים/חֲסִידָיו, evitando «santos» como opción predeterminada.
  - «Dar gracias» se conserva para ידה en contexto de alabanza.
  - «Santidad» traduce el sustantivo abstracto קדש con sufijo, sin añadir «nombre» que no aparece en hebreo.
