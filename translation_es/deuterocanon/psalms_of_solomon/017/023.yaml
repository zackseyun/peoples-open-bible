  yaml_path: translation/deuterocanon/psalms_of_solomon/017/023.yaml
  text: Look[a], O Lord, and raise up for them their king, the son of David, at the time you chose, O God[e][d][c][b], for him to reign over Israel your servant.
  footnotes:
  - marker: a
    text: Or “the son of David.” The Greek can be heard with stronger messianic force.
    reason: lexical_alternative
  - marker: b
    text: Literally “the time you saw, O God”; this may imply the time God has chosen or determined.
    reason: alternative_reading
  - marker: c
    text: Or “your child” for “your servant.”
    reason: lexical_alternative
  - marker: d
    text: Or 'a son of David'.
    reason: previous_rendering
  - marker: e
    text: Or 'you saw'.
    reason: previous_rendering
