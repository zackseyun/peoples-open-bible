translation:
  language: es
  text: 'Entonces Safán, el escriba[a], informó al rey, diciendo: «Hilkías, el sacerdote, me ha dado un libro[b]»; y Safán leyó en él delante del rey.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el secretario». El hebreo סֹפֵר puede designar un escriba real u oficial de la corte.
    reason: lexical_alternative
  - marker: b
    text: O «rollo». El hebreo סֵפֶר puede referirse de manera amplia a un escrito, libro o documento; en esta época, con frecuencia se trataba físicamente de un rollo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּגֵּד
  english_pob_choice: told
  chosen_spanish: informó
  alternatives_spanish:
  - dijo
  - reportó
  lexicon: HALOT
  rationale: נגד en hifil comunica aquí una comunicación formal a una autoridad; «informó» conserva ese matiz sin sonar rígido. «Dijo» sería más general y perdería algo de la relación oficial entre el escriba y el rey.
- source_word: הַסּוֹפֵר
  english_pob_choice: the scribe
  chosen_spanish: el escriba
  alternatives_spanish:
  - el secretario
  lexicon: HALOT
  rationale: «Escriba» mantiene la forma léxica y el trasfondo administrativo/cortesano del hebreo. «Secretario» aclara la función, pero desplaza el término histórico y puede sonar más moderno de lo deseable.
- source_word: סֵפֶר
  english_pob_choice: a book
  chosen_spanish: un libro[b]
  alternatives_spanish:
  - un rollo
  - un documento
  lexicon: HALOT
  rationale: El hebreo ספר es amplio y puede referirse a un escrito, libro o rollo. Se conserva «libro» como equivalente general, con nota para mantener la alternativa textual y material que el POB inglés documenta.
- source_word: נָתַן לִי
  english_pob_choice: has given me
  chosen_spanish: me ha dado
  alternatives_spanish:
  - me dio
  lexicon: HALOT
  rationale: 'El perfecto compuesto español reproduce bien la relevancia inmediata del acto: el libro está ya en posesión de Safán. «Me dio» también es posible, pero el compuesto refleja mejor el valor actual del resultado.'
- source_word: חִלְקִיָּהוּ הַכֹּהֵן
  english_pob_choice: Hilkiah the priest
  chosen_spanish: Hilkías, el sacerdote
  alternatives_spanish:
  - Hilkías el sacerdote
  lexicon: HALOT
  rationale: Se translitera el nombre propio y se traduce el título. «Sacerdote» es el equivalente directo de כֹּהֵן y evita una formulación eclesiástica más cargada como «sacerdocio» u otras variantes.
- source_word: וַיִּקְרָא ב֥וֹ
  english_pob_choice: read from it
  chosen_spanish: lo leyó
  alternatives_spanish:
  - leyó de él
  - leyó en él
  lexicon: HALOT
  rationale: En español, «leer de ello» suena poco natural; el objeto directo con «lo» comunica que Safán leyó el contenido del escrito. La relación partitiva de בּוֹ queda suficientemente implícita por el contexto de un documento escrito.
- source_word: לִפְנֵי הַמֶּלֶךְ
  english_pob_choice: before the king
  chosen_spanish: delante del rey
  alternatives_spanish:
  - en presencia del rey
  lexicon: HALOT
  rationale: «Delante del rey» es una equivalencia formal y clara para לִפְנֵי. «En presencia del rey» también es válida, pero «delante» conserva mejor la imagen espacial del hebreo.
theological_decisions:
- issue: 'Naturaleza del escrito: libro o rollo'
  english_pob_reading: Or “a scroll.” The Hebrew word can refer broadly to a written document or book; the physical form in this period was often a scroll.
  chosen_spanish_reading: «libro» con nota que reconoce también «rollo» como alternativa posible
  alternative_spanish_readings:
  - «rollo»
  - «documento escrito»
  rationale: No hay necesidad de fijar una forma material única donde el hebreo es amplio. La nota mantiene la tensión lexical documentada por el POB inglés y evita borrar la posibilidad histórica de un rollo.
  doctrine_reference: Principios de traducción lexical y evidencia textual (sin carga doctrinal)
translation_notes:
  revision_awareness: 'El texto sigue de cerca el auditable English POB sin cambios revisionarios en el sentido dado: no hay revisiones aplicadas en el antecedente, y el pasaje mantiene el mismo contenido semántico base con equivalencias naturales en español.'
  spanish_consistency_notes:
  - Se conserva la transliteración de nombres propios y la traducción de títulos (escriba, sacerdote, rey).
  - Se mantiene «Yahvé» como norma general del proyecto, pero en este versículo no aparece el nombre divino.
  - Se evita una traducción eclesiástica que sustituya el registro cortesano/administrativo del hebreo.
  - La frase final usa pasado simple narrativo con naturalidad española, mientras la cita interna conserva perfecto compuesto para el acto de entrega ya vigente en el contexto.
