revisions:
- from: 'Él que construye sus aposentos altos en los cielos[a], y ha asentado su bóveda sobre la tierra[b]; el que llama a las aguas del mar y las derrama sobre la superficie de la tierra: Yahvé es su nombre.'
  to: El que construye sus aposentos altos en los cielos[a], y funda su bóveda sobre la tierra[b]; el que llama a las aguas del mar y las derrama sobre la superficie de la tierra, Yahvé es su nombre.
  rationale: Se corrige «Él que» a «El que» por español natural y fiel al participio sustantivado hebreo. Se cambia «ha asentado» por «funda» para reflejar mejor יסד en la imagen creadora/cósmica. Se ajusta la puntuación final para un cierre más natural y solemne en español sin alterar el sentido.
