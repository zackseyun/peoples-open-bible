translation:
  language: es
  text: Cuando la asna vio al ángel de Yahvé[a] de pie en el camino, con su espada desenvainada en la mano, se apartó del camino y entró en el campo. Entonces Balaam golpeó a la asna para hacerla volver al camino.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mensajero de Yahvé».
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאָתוֹן
  english_pob_choice: the donkey
  chosen_spanish: la asna
  alternatives_spanish:
  - la burra
  - la hembra de asno
  lexicon: HALOT
  rationale: אָתוֹן designa una hembra de asno. En español, «asna» comunica con precisión el sexo del animal sin sonar excesivamente explicativo; además mantiene la referencia femenina necesaria para el cierre del verso.
- source_word: מַלְאַךְ יְהוָה
  english_pob_choice: the angel of Yahweh
  chosen_spanish: el ángel de Yahvé
  alternatives_spanish:
  - el mensajero de Yahvé
  - el ángel del SEÑOR
  lexicon: HALOT
  rationale: מַלְאַךְ puede significar «mensajero» o «ángel». En este contexto narrativo, con espada desenvainada y presencia sobrenatural, «ángel» es la equivalencia más natural. Se conserva «Yahvé» para יְהוָה conforme al criterio del proyecto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El tetragrámaton se vierte como «Yahvé» según la terminología base del proyecto en español. Esto preserva el nombre propio divino en lugar de sustituirlo por un título.
- source_word: נִצָּב
  english_pob_choice: standing
  chosen_spanish: de pie
  alternatives_spanish:
  - erguido
  - plantado
  lexicon: HALOT
  rationale: El participio describe la postura del mensajero divino en el camino. «De pie» es natural en español y conserva la imagen directa de presencia obstaculizadora.
- source_word: בַּדֶּרֶךְ
  english_pob_choice: in the road
  chosen_spanish: en el camino
  alternatives_spanish:
  - en la vía
  - sobre el camino
  lexicon: HALOT
  rationale: Aquí el hebreo ubica al ángel dentro del trayecto, bloqueándolo. «En el camino» es más natural que un calco como «en la carretera» y mantiene la idea de obstáculo.
- source_word: וְחַרְבּוֹ שְׁלוּפָה בְיָדוֹ
  english_pob_choice: with his sword drawn in his hand
  chosen_spanish: con su espada desenvainada en la mano
  alternatives_spanish:
  - con su espada sacada en la mano
  - con la espada desenvainada en su mano
  lexicon: HALOT
  rationale: שְׁלוּפָה indica una espada desenvainada/extraída. «Desenvainada» es el término preciso y digno en español bíblico; «en la mano» conserva la relación sintáctica del original.
- source_word: וַתֵּט
  english_pob_choice: turned aside
  chosen_spanish: se apartó
  alternatives_spanish:
  - se desvió
  - giró hacia un lado
  lexicon: HALOT
  rationale: נָטָה en esta escena expresa desviarse del trayecto. «Se apartó» comunica el cambio de dirección sin introducir una connotación demasiado técnica.
- source_word: מִן הַדֶּרֶךְ
  english_pob_choice: from the road
  chosen_spanish: del camino
  alternatives_spanish:
  - fuera del camino
  - desde el camino
  lexicon: HALOT
  rationale: La preposición marca salida del trayecto. «Del camino» fluye bien en español y conserva la separación respecto de la ruta principal.
- source_word: וַתֵּלֶךְ בַּשָּׂדֶה
  english_pob_choice: went into the field
  chosen_spanish: entró en el campo
  alternatives_spanish:
  - fue al campo
  - se fue al campo
  lexicon: HALOT
  rationale: שָׂדֶה puede ser «campo» u «open country». «Entró en el campo» refleja el movimiento resultante y suena natural en español narrativo.
- source_word: וַיַּךְ
  english_pob_choice: struck
  chosen_spanish: golpeó
  alternatives_spanish:
  - pegó
  - azotó
  lexicon: HALOT
  rationale: נכה es un verbo amplio para golpear/azotar. «Golpeó» mantiene la fuerza del acto sin añadir la repetición o severidad específica que el hebreo no explicita.
- source_word: לְהַטֹּתָהּ הַדָּרֶךְ
  english_pob_choice: to turn her back to the road
  chosen_spanish: para hacerla volver al camino
  alternatives_spanish:
  - para devolverla al camino
  - para volverla al camino
  lexicon: HALOT
  rationale: El infinitivo causativo de נָטָה expresa causar que la asna se desvíe o sea llevada de nuevo hacia la ruta. «Hacerla volver al camino» explicita el valor causativo en español sin forzar la imagen.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el tetragrámaton. Conforme a la terminología del proyecto, se preserva el nombre propio divino como «Yahvé» y no se lo sustituye por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'Coincide con el audit trail inglés: se mantiene el sentido narrativo de la escena, la distinción femenina de הָאָתוֹן y la opción doctrinal por Yahvé. No se detectaron revisiones aplicadas en el texto fuente inglés; esta versión sigue la lectura aprobada sin cambios sustanciales.'
  spanish_consistency_notes:
  - Se conserva «Yahvé» de manera consistente para יְהוָה.
  - «Asna» mantiene la referencia femenina del animal y evita perder el matiz de género que importa al final del versículo.
  - «Se apartó del camino» y «hacerla volver al camino» reflejan la secuencia direccional del hebreo sin añadir acciones no presentes.
