  yaml_path: translation/ot/deuteronomy/024/015.yaml
  text: You shall give him his wages on the same day[a], and the sun shall not go down on it, because he is poor and depends on it, lest he cry out against you to Yahweh, and there be sin in you.
  footnotes:
