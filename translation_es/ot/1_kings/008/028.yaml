review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: petición a Yahvé para que atienda la oración, la súplica, el clamor y la oración que su siervo eleva hoy. Mantiene correctamente «Yahvé», «tu siervo», «mi Dios», «clamar/oración» y el valor de propósito en «para oír». Sin embargo, hay dos desajustes importantes: (1) «vuelve tu rostro a» añade «rostro», ausente en el hebreo; la imagen de פנה puede conservarse sin introducir ese sustantivo. (2) «está haciendo» no representa fielmente מִתְפַּלֵּל, que significa «está orando / está rezando», no «hacer» una oración.'
  spanish_quality_summary: El español es generalmente claro y digno, pero «vuelve tu rostro a» suena algo calcado y «está haciendo» resulta poco natural y semánticamente débil en contexto bíblico. Una redacción como «vuelve tu atención a» o «vuélvete hacia» mejora la naturalidad; y «está orando» preserva mejor el participio hebreo con español idiomático.
  glossary_alignment: 'Buena alineación global con la terminología del proyecto: «Yahvé», «Dios», «siervo», «oración», «clamor». La nota sobre «súplica de favor» está bien. La nota [b] está mal anclada: en el inglés corresponde a «the cry / הָרִנָּה», no a «my God». En español debe anclarse en «clamor», no en «mi Dios».'
  issues:
  - severity: high
    issue: «está haciendo» para מִתְפַּלֵּל
    rationale: El verbo hebreo significa «orar»; «hacer» una oración es una perífrasis menos fiel y menos natural aquí. Debe decir «está orando» o equivalente.
  - severity: medium
    issue: «vuelve tu rostro a» añade un elemento no presente
    rationale: פנה expresa volverse/dirigirse/atender, pero el sustantivo «rostro» no aparece en el texto. Esto introduce una imagen extra innecesaria.
  - severity: medium
    issue: La nota [b] está anclada en el lugar equivocado
    rationale: El contenido de la nota explica הָרִנָּה («clamor / grito fuerte»), pero el marcador aparece tras «mi Dios». Debe colocarse junto a «clamor».
  revised_spanish_text: Sin embargo, vuelve tu atención a la oración de tu siervo y a su súplica de favor[a], Yahvé mi Dios, para oír el clamor[b] y la oración que tu siervo está orando delante de ti hoy.
  revised_footnotes:
