translation:
  language: es
  text: 'Después de eso, Moisés y Aarón entraron y le dijeron a Faraón: «Así dice Yahvé[a], el Dios de Israel: Deja ir a mi pueblo, para que celebren una fiesta para mí[b] en el desierto».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «YHWH»; alternativamente, «Yahweh».'
    reason: alternative_reading
  - marker: b
    text: O «guarden un festival para mí» o «celebren un festival para mí»; el verbo hebreo se refiere a observar una fiesta o festival.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאַחַר
  english_pob_choice: Afterward
  chosen_spanish: Después de eso
  alternatives_spanish:
  - Luego
  - Más tarde
  lexicon: HALOT
  rationale: Es un marcador temporal narrativo; «Después de eso» preserva la secuencia sin añadir duración ni matiz causal.
- source_word: בָּאוּ
  english_pob_choice: went in
  chosen_spanish: fueron a hablar
  alternatives_spanish:
  - entraron
  - se presentaron
  lexicon: HALOT
  rationale: En el contexto de comparecer ante Faraón, el sentido es presentarse ante él para hablar; en español, «fueron a hablar» comunica esa acción de manera natural sin perder la idea de acercamiento formal.
- source_word: וַיֹּאמְרוּ אֶל־פַּרְעֹה
  english_pob_choice: said to Pharaoh
  chosen_spanish: le dijeron
  alternatives_spanish:
  - hablaron a Faraón
  - dijeron a Faraón
  lexicon: HALOT
  rationale: La fórmula narrativa de habla se expresa de forma idiomática con «le dijeron», manteniendo el destinatario explícito en el contexto inmediato.
- source_word: כֹּה אָמַר
  english_pob_choice: Thus says
  chosen_spanish: Así dice
  alternatives_spanish:
  - Esto dice
  - Así ha dicho
  lexicon: HALOT
  rationale: Conserva el tono solemne de la fórmula profética y el tiempo presente performativo que marca autoridad.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto para el Tetragrámaton: en el texto principal se usa «Yahvé», preservando el nombre divino en vez de sustituirlo por un título.'
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - el Dios de los israelitas
  - el Dios que es de Israel
  lexicon: HALOT
  rationale: La construcción de genitivo se conserva con la fórmula transparente y bíblicamente establecida «el Dios de Israel».
- source_word: שַׁלַּח אֶת־עַמִּי
  english_pob_choice: Let my people go
  chosen_spanish: Deja ir a mi pueblo
  alternatives_spanish:
  - Envía a mi pueblo
  - Libera a mi pueblo
  lexicon: HALOT
  rationale: El imperativo tiene fuerza de liberar/despachar; «Deja ir» mantiene el mandato directo y evita reducirlo a una sola paráfrasis legal o cultual.
- source_word: וְיָחֹגּוּ לִי
  english_pob_choice: so that they may hold a feast to me
  chosen_spanish: para que me celebren una fiesta
  alternatives_spanish:
  - para que hagan una fiesta para mí
  - para que celebren un festival para mí
  lexicon: HALOT
  rationale: חגג refiere a una celebración festiva/cultual; «me celebren una fiesta» conserva esa carga sin forzar una locución demasiado técnica en español.
- source_word: בַּמִּדְבָּר
  english_pob_choice: in the wilderness
  chosen_spanish: en el desierto
  alternatives_spanish:
  - en el desierto / en la estepa
  lexicon: HALOT
  rationale: Aunque «wilderness» puede traducirse por «desierto» o «despoblado», en español «en el desierto» es claro y funcional para el lector moderno; se evita una nota innecesaria en el texto principal.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton directamente. Conforme a la línea del POB, se conserva el nombre propio divino en español con «Yahvé», en vez de sustituirlo por un título tradicional.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Función de la orden «שַׁלַּח אֶת־עַמִּי»
  english_pob_reading: Let my people go
  chosen_spanish_reading: Deja ir a mi pueblo
  alternative_spanish_readings:
  - Libera a mi pueblo
  - Envía a mi pueblo
  rationale: La frase combina mandato de permitir la salida con la fuerza narrativa de liberación. «Deja ir» conserva la ambivalencia sin endurecerla a un solo matiz.
  doctrine_reference: Exodus 5:1 context of divine command to Pharaoh
translation_notes:
  revision_awareness: 'El contexto auditado en inglés no requirió cambios sustanciales: se mantuvieron la secuencia narrativa, la fórmula profética, el nombre divino como nombre propio y la nota lexical sobre la orden a Faraón. La principal adaptación al español fue decidir entre una formulación idiomática de «went in» y una más literal; se optó por una equivalencia natural que preserva el valor de comparecencia ante el rey.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» conforme al estándar del proyecto para יְהוָה.
  - Se evitó «Señor» para no ocultar el nombre divino ni mezclarlo con un título.
  - «Desierto» se usa aquí en el sentido bíblico de מִדְבָּר, equivalente funcional a «wilderness».
  - La nota sobre «Deja ir a mi pueblo» preserva la alternativa lexical documentada sin sobrecargar el texto principal.
