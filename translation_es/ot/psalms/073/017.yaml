translation:
  language: es
  text: hasta que entré en los santuarios[a] de Dios; entonces entendí su fin[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘el santuario de Dios’. El hebreo tiene una forma plural, ‘santuarios’, que puede referirse en conjunto a los recintos santos de Dios.
    reason: lexical_alternative
  - marker: b
    text: O ‘su último fin’ o ‘su desenlace’. El hebreo apunta a su destino final o desenlace definitivo.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַד
  english_pob_choice: until
  chosen_spanish: hasta que
  alternatives_spanish:
  - mientras
  - hasta
  lexicon: HALOT
  rationale: En español, ‘hasta que’ transmite mejor el límite temporal que introduce el giro decisivo de la reflexión del salmista.
- source_word: אָבוֹא
  english_pob_choice: I entered
  chosen_spanish: entré
  alternatives_spanish:
  - vine
  - fui
  - entraba
  lexicon: HALOT
  rationale: Aunque la forma hebrea es imperfecta, aquí el contexto marca un ingreso puntual; el pretérito ‘entré’ preserva ese momento decisivo.
- source_word: מִקְדְּשֵׁי אֵל
  english_pob_choice: the sanctuaries of God
  chosen_spanish: los santuarios de Dios
  alternatives_spanish:
  - el santuario de Dios
  - los lugares santos de Dios
  - el recinto sagrado de Dios
  lexicon: HALOT
  rationale: Se conserva el plural hebreo מִקְדְּשֵׁי con ‘santuarios’, como en la POB inglesa, para no borrar la forma plural ni suavizarla prematuramente al singular.
- source_word: אֵל
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Poderoso
  lexicon: HALOT
  rationale: Aquí אֵל funciona como designación divina general; ‘Dios’ es la equivalencia natural y fiel en español.
- source_word: אָבִינָה
  english_pob_choice: then I understood
  chosen_spanish: entonces entendí
  alternatives_spanish:
  - comprendí entonces
  - discerní entonces
  - llegué a entender
  lexicon: HALOT
  rationale: ‘Entendí’ expresa con claridad la percepción alcanzada después del ingreso al espacio sagrado; ‘entonces’ refleja la secuencia marcada por el contexto.
- source_word: לְאַחֲרִיתָם
  english_pob_choice: their end
  chosen_spanish: su fin
  alternatives_spanish:
  - su último destino
  - su desenlace
  - su resultado final
  lexicon: HALOT
  rationale: אַחֲרִית apunta al desenlace final o destino último; ‘su fin’ es conciso, natural y conserva el peso de la conclusión moral del versículo.
theological_decisions:
- issue: Preservar el plural hebreo מִקְדְּשֵׁי frente al singular tradicional
  english_pob_reading: the sanctuaries of God
  chosen_spanish_reading: los santuarios de Dios
  alternative_spanish_readings:
  - el santuario de Dios
  rationale: Siguiendo la primacía del texto hebreo, se mantiene el plural en la línea principal, sin armonizarlo al singular devocional tradicional.
  doctrine_reference: Translation philosophy §1, §5
- issue: Interpretación de לְאַחֲרִיתָם como destino final
  english_pob_reading: their end
  chosen_spanish_reading: su fin
  alternative_spanish_readings:
  - su último destino
  - su desenlace
  rationale: La frase no describe solo un final temporal, sino el desenlace definitivo de los impíos; ‘su fin’ conserva esa tensión sin explicitar más de lo que el hebreo exige.
  doctrine_reference: HALOT; Translation philosophy §2
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que cada nota con marcador aparezca anclada en el texto español. La nota [a] está colocada directamente sobre ‘santuarios’ y la nota [b] sobre ‘fin’.
  spanish_consistency_notes:
  - Se mantuvo ‘Dios’ para אֵל y no ‘Señor’, conforme al valor léxico del término en este contexto.
  - Se evitó la singularización de מִקְדְּשֵׁי para preservar la pluralidad del hebreo, coherente con la POB inglesa.
  - ‘Hasta que’ reproduce mejor la función temporal de עַד que un simple ‘hasta’.
  - El orden ‘entonces entendí’ conserva el giro narrativo/argumentativo del versículo en español natural.
