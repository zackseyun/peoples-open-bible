    text: 'O: «cada uno directamente hacia adelante» o «cada hombre recto delante de sí».'
    reason: lexical_alternative
  revision_rationale: La revisión corrige calcos poco naturales y un error verbal, mientras preserva las decisiones léxicas clave de la auditoría inglesa. 'Dé un toque prolongado' expresa el modismo de בִּמְשֹׁךְ; 'sonido de la trompeta' distingue bien שׁוֹפָר; 'caerá en su lugar' evita un español defectuoso y mantiene en nota la imagen hebrea de desplome vertical; y 'directamente hacia adelante' transmite la fuerza distributiva de נֶגְדּוֹ con claridad.
