    text: Or 'make expiation for'; in this cultic context the Hebrew verb כפר can emphasize the removal of impurity as well as atonement.
    reason: lexical_alternative
  - marker: b
    text: '''People of the assembly'' may also be rendered ''people of the congregation.'''
    reason: lexical_alternative
