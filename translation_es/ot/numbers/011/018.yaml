  text: וְ/אֶל הָ/עָ֨ם תֹּאמַ֜ר הִתְקַדְּשׁ֣וּ לְ/מָחָר֮ וַ/אֲכַלְתֶּ֣ם בָּשָׂר֒ כִּ֡י בְּכִיתֶם֩ בְּ/אָזְנֵ֨י יְהוָ֜ה לֵ/אמֹ֗ר מִ֤י יַאֲכִלֵ֨/נוּ֙ בָּשָׂ֔ר כִּי ט֥וֹב לָ֖/נוּ בְּ/מִצְרָ֑יִם וְ/נָתַ֨ן יְהוָ֥ה לָ/כֶ֛ם בָּשָׂ֖ר וַ/אֲכַלְתֶּֽם־־׃
base_translation:
  language: en
  yaml_path: translation/ot/numbers/011/018.yaml
  text: And to the people you shall say[a], ‘Consecrate yourselves for tomorrow, and you shall eat meat, because you have wept in the hearing of Yahweh, saying, “Who will give us meat to eat? For it was good for us in Egypt.” And Yahweh will give you meat, and you shall eat.”
