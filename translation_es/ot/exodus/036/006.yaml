    text: Or, “they made an announcement in the camp.” The Hebrew idiom is literally “they caused a voice to pass.”
    reason: lexical_alternative
  - marker: b
    text: “Contribution of the sanctuary” may also be rendered “holy contribution” or “offering for the sanctuary.”
    reason: lexical_alternative
