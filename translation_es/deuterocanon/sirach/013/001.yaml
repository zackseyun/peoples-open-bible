translation:
  language: es
  text: El que toca brea[a] tendrá la mano pegada a ella, y el que se junta con un burlón aprenderá su camino.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: «El que toca brea será contaminado, y el que tiene trato con un soberbio llegará a ser como él». El testimonio hebreo, en cambio, dice «un burlón» y «aprenderá su camino».'
    reason: alternative_reading
lexical_decisions:
- source_word: נוֹגֵעַ
  english_pob_choice: Whoever touches
  chosen_spanish: El que toca
  alternatives_spanish:
  - Quien toca
  - El que está tocando
  lexicon: HALOT
  rationale: El participio hebreo expresa una acción general y proverbial. «El que toca» conserva la fuerza genérica y suena natural en español.
- source_word: בְּזֶפֶת
  english_pob_choice: pitch
  chosen_spanish: brea
  alternatives_spanish:
  - pez
  - asfalto
  - brea negra
  lexicon: HALOT
  rationale: El hebreo se refiere a una sustancia negra y pegajosa. «Brea» comunica bien esa imagen en español y mantiene el efecto proverbial de algo que se adhiere.
- source_word: תִּדְבַּק יָדוֹ
  english_pob_choice: will have his hand stick to it
  chosen_spanish: se le pegará la mano
  alternatives_spanish:
  - su mano se adherirá
  - su mano quedará pegada
  lexicon: HALOT
  rationale: El hebreo dice literalmente que «su mano se pegará/adhirirá». En español, «se le pegará la mano» conserva la imagen concreta sin volverla abstracta.
- source_word: וְחוֹבֵר
  english_pob_choice: and whoever associates with
  chosen_spanish: y el que se junta con
  alternatives_spanish:
  - y el que se asocia con
  - y el que se acompaña de
  lexicon: HALOT
  rationale: El verbo expresa unirse o asociarse con alguien. «Se junta con» es natural en español y preserva la idea relacional sin suavizarla demasiado.
- source_word: לֵץ
  english_pob_choice: a scoffer
  chosen_spanish: un burlón
  alternatives_spanish:
  - un escarnecedor
  - un mofador
  - un arrogante
  lexicon: HALOT
  rationale: Aunque la versión griega paralela dice «soberbio», el testimonio hebreo apunta a לֵץ, término sapiencial para alguien que se burla o escarnece. «Burlón» comunica esa clase de persona en español de forma clara.
- source_word: יִלְמַד דַּרְכּוֹ
  english_pob_choice: will learn his way
  chosen_spanish: aprenderá su camino
  alternatives_spanish:
  - aprenderá su manera de vivir
  - aprenderá sus caminos
  - acabará imitándolo
  lexicon: HALOT
  rationale: El hebreo dice explícitamente «aprenderá su camino». «Aprenderá su camino» sigue de cerca el original y evita sustituirlo por la interpretación griega «llegará a ser como él».
theological_decisions:
- issue: Prioridad del testimonio hebreo frente al paralelo griego
  english_pob_reading: Follow the extant Hebrew wording as primary, while checking the Greek as a consistency control.
  chosen_spanish_reading: Seguir el hebreo disponible como base principal, y registrar el matiz griego en nota.
  alternative_spanish_readings:
  - «El que toca brea será contaminado, y el que se relaciona con un soberbio se le parecerá»
  - «El que toca brea se contaminará, y el que se junta con un soberbio llegará a ser como él»
  rationale: En Sirácides, cuando el hebreo está preservado, la política del proyecto da prioridad a ese testimonio. Aquí el hebreo presenta una imagen de adherencia y aprendizaje del camino del burlón, mientras que el griego desarrolla la idea como contaminación y asimilación al soberbio. La traducción principal sigue el hebreo y conserva la alternativa del griego en nota para no borrar la tensión documental.
  doctrine_reference: 'PHILOSOPHY.md: traducir desde el hebreo cuando se conserva; DOCTRINE.md: preservar alternativas significativas en notas sin resolverlas en silencio.'
translation_notes:
  revision_awareness: 'El borrador sigue el pasaje hebreo conservado en Kahana como texto principal, con control de consistencia del paralelo griego de Swete. La lectura griega se conserva solo en nota porque modifica el matiz: de adherencia/aprendizaje a contaminación/parecido al soberbio.'
  spanish_consistency_notes:
  - «Brea» se usa por su naturalidad y por mantener la imagen de sustancia pegajosa; no se emplea «SEÑOR» ni terminología ajena al verso.
  - «Burlón» refleja לֵץ en un registro sapiencial comprensible para lectores de español latinoamericano.
  - Se mantuvo el futuro simple («se le pegará», «aprenderá») para reproducir el valor proverbial del hebreo.
