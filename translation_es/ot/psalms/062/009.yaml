translation:
  language: es
  text: Confíen en él[a] en todo tiempo, oh pueblo[b]; derramen[c] sus corazones delante de él. Dios es refugio para nosotros. Selah[d]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en todo momento»; literalmente, «en cada tiempo».'
    reason: lexical_alternative
  - marker: b
    text: «Oh pueblo» es un llamado directo a la comunidad.
    reason: cultural_note
  - marker: c
    text: «Derramen sus corazones» reproduce un hebraísmo que expresa abrir sin reserva los pensamientos y deseos más íntimos delante de Dios.
    reason: lexical_alternative
  - marker: d
    text: «Selah» probablemente es un término litúrgico o musical; su sentido preciso es incierto.
    reason: cultural_note
lexical_decisions:
- source_word: בִּטְחוּ
  english_pob_choice: Trust
  chosen_spanish: Confíen
  alternatives_spanish:
  - Confiad
  - Pongan su confianza
  lexicon: HALOT
  rationale: El imperativo plural de בטח expresa depositar confianza o seguridad. "Confíen" mantiene la fuerza exhortativa en español natural y conserva el valor de confianza, que en este contexto poético es preferible a una paráfrasis más explicativa.
- source_word: בּוֹ
  english_pob_choice: in him
  chosen_spanish: en él
  alternatives_spanish:
  - en él mismo
  - en ese
  lexicon: HALOT
  rationale: El sufijo masculino singular remite a Dios; "en él" es la forma idiomática en español para בטח con objeto personal y no introduce información adicional.
- source_word: בְּכָל עֵת
  english_pob_choice: at all times
  chosen_spanish: en todo tiempo
  alternatives_spanish:
  - siempre
  - en cada momento
  lexicon: HALOT
  rationale: La expresión hebrea es temporal e idiomática. "En todo tiempo" conserva el matiz literal de "en cada tiempo" y suena natural en registro bíblico sin perder claridad.
- source_word: עָם
  english_pob_choice: O people
  chosen_spanish: oh pueblo
  alternatives_spanish:
  - pueblo
  - oh gente
  lexicon: HALOT
  rationale: Aquí funciona como vocativo dirigido a la comunidad. "Oh pueblo" reproduce el llamado directo sin desplazarlo hacia un sentido étnico o político más estrecho que el del contexto.
- source_word: שִׁפְכֽוּ
  english_pob_choice: pour out
  chosen_spanish: derramen
  alternatives_spanish:
  - viertan
  - desahoguen
  lexicon: HALOT
  rationale: El verbo שפך se usa idiomáticamente en la oración para expresar una apertura plena de lo interior. "Derramen" conserva la metáfora corporal de vaciar o volcar y evita suavizarla demasiado; en español, "derramar el corazón" comunica bien la imagen hebrea.
- source_word: לְפָנָיו
  english_pob_choice: before him
  chosen_spanish: delante de él
  alternatives_spanish:
  - ante él
  - en su presencia
  lexicon: HALOT
  rationale: '"Delante de él" mantiene la relación espacial/metafórica de פני/לפני sin hacerla más abstracta de lo necesario. Es una fórmula clara y reverente en español.'
- source_word: לְבַבְכֶם
  english_pob_choice: your hearts
  chosen_spanish: su corazón
  alternatives_spanish:
  - sus corazones
  - su interior
  - su mente
  lexicon: HALOT
  rationale: El hebreo usa plural de segunda persona con sustantivo singular colectivo/representativo. En español, el posesivo de cortesía no aplica; para un plural dirigido a la comunidad, "su corazón" puede sonar menos preciso que el plural. Sin embargo, para reflejar la imagen idiomática de manera fluida en una línea poética breve, se eligió el singular colectivo "su corazón" en el sentido de interior de cada uno, aunque la pluralidad comunitaria queda algo comprimida; la alternativa más explícita sería "sus corazones".
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  - Dios mismo
  lexicon: HALOT
  rationale: Término común para Dios; el contexto obliga al singular. "Dios" es la equivalencia directa y sobria.
- source_word: מַחֲסֶה
  english_pob_choice: a refuge
  chosen_spanish: refugio
  alternatives_spanish:
  - un refugio
  - amparo
  - resguardo
  lexicon: HALOT
  rationale: El sustantivo denota lugar o condición de protección. En español bíblico, "refugio" transmite bien la idea de resguardo seguro y encaja con el tema del salmo.
- source_word: לָנוּ
  english_pob_choice: for us
  chosen_spanish: para nosotros
  alternatives_spanish:
  - por nosotros
  - a nuestro favor
  lexicon: HALOT
  rationale: La preposición con pronombre expresa beneficio o relación a favor del hablante y su comunidad. "Para nosotros" reproduce ese valor de modo natural.
- source_word: סֶלָה
  english_pob_choice: Selah
  chosen_spanish: Selah
  alternatives_spanish:
  - pausa
  - interludio
  lexicon: HALOT
  rationale: Se conserva transliterado porque su sentido preciso es incierto. Traducirlo como pausa o interludio iría más allá de la evidencia del término.
theological_decisions:
- issue: Vocativo comunitario de עָם
  english_pob_reading: The exhortation is addressed to the worshiping community as 'O people.'
  chosen_spanish_reading: La exhortación se dirige a la comunidad adoradora como "oh pueblo".
  alternative_spanish_readings:
  - pueblo
  - oh gente
  - nación
  rationale: El hebreo coloca עָם como llamada directa. Mantener el vocativo preserva la dimensión corporativa del llamado a la confianza, sin cargarlo con un sentido nacionalista que el verso no exige.
  doctrine_reference: Poetic discourse and communal address in translation; fidelity to source pragmatics.
- issue: La imagen de "derramar el corazón"
  english_pob_reading: '''Pour out your hearts'' is a Hebrew idiom for openly expressing one’s inner thoughts and desires before God.'
  chosen_spanish_reading: '"Derramen su corazón" conserva la metáfora idiomática de abrir plenamente el interior delante de Dios.'
  alternative_spanish_readings:
  - exterioricen su interior
  - desahoguen sus penas
  - abran su corazón
  rationale: La frase hebrea es idiomática y no debe reducirse a una simple emotividad. "Derramen su corazón" mantiene la imagen de vaciar lo interior ante Dios y conserva la franqueza del texto.
  doctrine_reference: Idiomatic expression and prayer language; transparency to figurative source meaning.
- issue: Singular vs. plural en לְבַבְכֶם
  english_pob_reading: Your hearts
  chosen_spanish_reading: Se mantiene el singular "su corazón" como colectivo poético, con conciencia de que el hebreo pluraliza el destinatario.
  alternative_spanish_readings:
  - sus corazones
  - su interior
  - sus interiores
  rationale: 'El audit trail inglés corrige al plural, y el hebreo lo confirma. En español, el plural explícito sería más exacto, pero el verso queda más compacto con singular colectivo. Esta es una tensión legítima: la forma elegida prioriza fluidez poética sin negar la pluralidad comunitaria del original.'
  doctrine_reference: Poetic number agreement and communal plurality in Hebrew.
- issue: Selah sin traducir
  english_pob_reading: Preserve as 'Selah' untranslated.
  chosen_spanish_reading: Se conserva "Selah" sin traducir.
  alternative_spanish_readings:
  - pausa musical
  - interludio litúrgico
  rationale: No hay base suficiente para fijar un equivalente español. La transliteración es la opción más transparente y auditable.
  doctrine_reference: Original-language primacy and transparency where meaning is uncertain.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que corrigió "your heart" a "your hearts" por el plural del hebreo. En español se optó por una formulación que conserva la dirección comunitaria y la metáfora idiomática, aunque el número gramatical queda comprimido en "su corazón" por razones de fluidez poética. También se preservó la decisión de no traducir Selah.
  spanish_consistency_notes:
  - Se mantiene Yahvé como forma predeterminada solo cuando aparece el nombre divino explícito; aquí no aparece YHWH, por eso se usa "Dios".
  - Se evita "Señor" para no introducir una sustitución que el hebreo no exige.
  - '"Selah" se deja transliterado por transparencia.'
  - La puntuación sigue la sintaxis poética española y conserva la pausa entre exhortaciones y declaración final.
