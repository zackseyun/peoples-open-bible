  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura hebrea: כִּי = «Porque», gesto de juramento con «alzo mi mano», dirección ascendente, y continuación performativa con «y digo». Sin embargo, «Como vivo para siempre» en español no suena como fórmula natural de juramento y deja la cita incompleta frente al hebreo/POB, donde la fuerza es de autojuramento divino. Conviene explicitar esa fuerza sin añadir intensificación indebida.'
  spanish_quality_summary: El español es claro y digno, pero la frase citada resulta algo poco idiomática. «Como vivo para siempre» en español puede sonar truncado o depender de una apódosis ausente. «¡Vivo yo para siempre!» reproduce mejor la solemnidad y es más natural en registro bíblico moderno. También conviene ajustar la nota para que la alternativa sea realmente distinta de la redacción principal y explique la decisión con precisión.
  glossary_alignment: No hay términos del glosario principal en conflicto. La revisión mantiene registro bíblico natural y preserva la fórmula de juramento sin paraphrasear. No se requiere decisión especial sobre Yahvé/Mesías/etc. en este versículo.
  issues:
  - severity: medium
    issue: La fórmula «Como vivo para siempre» suena poco natural en español como juramento autónomo.
    rationale: Aunque intenta seguir de cerca el inglés «As I live forever», en español «como...» normalmente introduce comparación o condición, y sin una cláusula principal posterior puede percibirse truncado. El hebreo expresa un autojuramento solemne, que en español se comunica mejor con una fórmula exclamativa/declarativa como «¡Vivo yo para siempre!».
  - severity: low
    issue: La nota al pie no ofrece una alternativa útilmente diferenciada.
    rationale: La nota repite esencialmente la misma redacción principal y no aclara bien la opción más formal/literal frente a la principal. Debe explicar la tensión entre literalidad y fuerza de juramento en español.
