translation:
  language: es
  text: 'Entonces Moisés dijo a Yahvé[a]: «¿Por qué has tratado mal a tu siervo? ¿Y por qué no he hallado favor ante tus ojos[b], como para poner sobre mí la carga de todo este pueblo[c]?».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Por qué has hecho mal a tu siervo?». El hebreo expresa literalmente «hacer mal», mostrando la queja de Moisés.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «hallar favor ante tus ojos», un modismo para recibir aceptación o benevolencia.'
    reason: cultural_note
  - marker: c
    text: 'Hebreo: «todo este pueblo», con «pueblo» en singular colectivo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Tetragrámaton: transliterar el nombre divino. ''Yahvé'' conserva el nombre personal de Dios revelado a Israel, en lugar de sustituirlo por un título.'
- source_word: הֲרֵעֹתָ
  english_pob_choice: have you treated your servant badly
  chosen_spanish: has tratado mal
  alternatives_spanish:
  - has hecho mal a
  - has hecho el mal a
  - has afligido
  lexicon: HALOT
  rationale: El verbo en hifil expresa causar mal o daño. 'Has tratado mal' comunica la queja de Moisés en español natural sin sugerir innecesariamente una acusación moral abstracta contra Dios.
- source_word: לְעַבְדֶּךָ
  english_pob_choice: your servant
  chosen_spanish: tu siervo
  alternatives_spanish:
  - tu esclavo
  lexicon: HALOT
  rationale: Aquí el término funciona como autodenominación reverente ante Dios. En español, 'siervo' comunica deferencia mejor que 'esclavo', aunque el valor léxico básico de עבד puede ser más fuerte en otros contextos.
- source_word: מָצָתִי חֵן בְּעֵינֶיךָ
  english_pob_choice: have I not found favor in your eyes
  chosen_spanish: no he hallado favor ante tus ojos
  alternatives_spanish:
  - no he encontrado gracia ante tus ojos
  - no he hallado gracia en tus ojos
  lexicon: HALOT
  rationale: Se mantiene el modismo hebreo de haber hallado favor ante los ojos de alguien. 'Ante tus ojos' es una forma idiomática y entendible en español, y preserva la imagen relacional del hebreo.
- source_word: לָשׂוּם
  english_pob_choice: that you have laid
  chosen_spanish: para que pongas
  alternatives_spanish:
  - para poner
  - al poner
  lexicon: HALOT
  rationale: El infinitivo con לָ puede expresar propósito o resultado. En español, 'para que pongas' integra con naturalidad la relación causal de la queja y conserva la acción directa de colocar la carga.
- source_word: מַשָּׂא
  english_pob_choice: the burden
  chosen_spanish: la carga
  alternatives_spanish:
  - el peso
  - la responsabilidad
  lexicon: HALOT
  rationale: '''Carga'' reproduce bien la metáfora de algo pesado impuesto sobre alguien. También mantiene el paralelismo con la queja de Moisés sobre el peso del pueblo.'
- source_word: כָּל הָעָם הַזֶּה
  english_pob_choice: all this people
  chosen_spanish: todo este pueblo
  alternatives_spanish:
  - todo este pueblo aquí
  - todo este pueblo entero
  lexicon: HALOT
  rationale: El hebreo usa 'pueblo' en singular colectivo. 'Todo este pueblo' conserva ese valor colectivo de forma natural en español.
- source_word: עָלַי
  english_pob_choice: on me
  chosen_spanish: sobre mí
  alternatives_spanish:
  - encima de mí
  - a mí
  lexicon: HALOT
  rationale: '''Sobre mí'' mantiene la metáfora de una carga depositada encima de una persona y encaja con ''carga'' en español.'
theological_decisions:
- issue: Cómo reflejar la queja de משה sobre la acción de Dios en הֲרֵעֹתָ
  english_pob_reading: have you treated your servant badly
  chosen_spanish_reading: has tratado mal a tu siervo
  alternative_spanish_readings:
  - ¿por qué has hecho mal a tu siervo?
  - ¿por qué has causado daño a tu siervo?
  rationale: Se evita una formulación demasiado literal que podría sonar como una afirmación doctrinal más fuerte de lo que el texto exige. La frase española transmite la lamentación de Moisés y conserva la tensión del pasaje sin suavizarla ni exagerarla.
  doctrine_reference: 'Principio de traducción: preservar el sentido de la queja humana dirigida a Dios sin introducir inferencias teológicas no demandadas por el hebreo.'
- issue: Uso de un modismo para חֵן בְּעֵינֶיךָ
  english_pob_reading: found favor in your eyes
  chosen_spanish_reading: he hallado favor ante tus ojos
  alternative_spanish_readings:
  - he hallado gracia ante tus ojos
  - he encontrado favor en tus ojos
  rationale: La expresión conserva la imagen bíblica de evaluación/favor relacional. 'Favor' evita una sustitución interpretativa innecesaria, y 'ante tus ojos' mantiene el color idiomático del hebreo.
  doctrine_reference: 'Principio de transparencia semántica: conservar el modismo donde el español lo permite sin perder claridad.'
translation_notes:
  revision_awareness: 'El borrador sigue de cerca la última revisión inglesa: mantiene la naturalidad de ''tratado mal'' en lugar de una redacción más áspera, conserva el modismo de ''favor en tus ojos'' con un equivalente español transparente, y refleja el colectivo singular de ''pueblo''. No se introdujeron cambios doctrinales adicionales más allá de la terminología estándar del proyecto para el nombre divino.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' para יְהוָה según la terminología base del proyecto.
  - Se prefirió 'siervo' para לְעַבְדֶּךָ por el contexto reverente ante Dios.
  - Se mantuvo 'favor' y no 'gracia' para חֵן porque el modismo apunta a aceptación o benevolencia en el contexto.
  - '''Pueblo'' se conserva en singular colectivo para reflejar el hebreo.'
  - La sintaxis española busca ser publicable y natural, sin perder la queja retórica del original.
