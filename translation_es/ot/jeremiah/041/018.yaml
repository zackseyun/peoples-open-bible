translation:
  language: es
  text: a causa de los caldeos[a], porque tenían miedo de ellos, porque Ismael hijo de Netanías había herido de muerte[b] a Gedalías hijo de Ahicam, a quien el rey de Babilonia había puesto a cargo del país[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los babilonios» por «los caldeos».
    reason: lexical_alternative
  - marker: b
    text: O «había matado»; el verbo hebreo es literalmente «había golpeado» y aquí está en un contexto mortal.
    reason: lexical_alternative
  - marker: c
    text: O «había nombrado sobre el país» / «había puesto sobre la tierra»; la expresión hebrea puede tener el matiz de nombrar o poner al frente del territorio.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִפְּנֵי
  english_pob_choice: because of
  chosen_spanish: a causa de
  alternatives_spanish:
  - por causa de
  - debido a
  lexicon: HALOT
  rationale: La expresión con פָּנִים funciona aquí como causa, no como ubicación espacial. En español, «a causa de» comunica bien la razón de la huida y evita una calca incómoda.
- source_word: הַכַּשְׂדִּים
  english_pob_choice: the Chaldeans
  chosen_spanish: los caldeos
  alternatives_spanish:
  - los babilonios
  lexicon: HALOT
  rationale: Se conserva el etnónimo bíblico «caldeos», alineado con la elección formal del POB en inglés. «Babilonios» es viable contextual­mente, pero borra la forma hebrea distintiva.
- source_word: יָרְאוּ
  english_pob_choice: were afraid
  chosen_spanish: tenían miedo
  alternatives_spanish:
  - estaban asustados
  - temían
  lexicon: HALOT
  rationale: El verbo expresa miedo real; «tenían miedo» suena natural en español y mantiene el sentido de estado emocional. «Temían» sería más breve, pero menos idiomático aquí.
- source_word: מִפְּנֵיהֶם
  english_pob_choice: of them
  chosen_spanish: de ellos
  alternatives_spanish:
  - por ellos
  - ante ellos
  lexicon: HALOT
  rationale: Con «tener miedo», el complemento más natural en español es «de ellos». Se conserva la referencia causal implícita sin repetir artificialmente la preposición hebrea.
- source_word: הִכָּה
  english_pob_choice: had struck down
  chosen_spanish: había derribado
  alternatives_spanish:
  - había golpeado
  - había matado
  lexicon: HALOT
  rationale: El hebreo literalmente dice «golpear/derribar», y el contexto es mortal. «Había derribado» conserva la imagen verbal sin reducirla de entrada al resultado, como hace la traducción inglesa con «struck down».
- source_word: יִשְׁמָעֵאל בֶּן נְתַנְיָה
  english_pob_choice: Ishmael son of Nethaniah
  chosen_spanish: Ismael hijo de Netanías
  alternatives_spanish:
  - Ismael, hijo de Netanías
  lexicon: HALOT
  rationale: Se transliteran los nombres propios y se vierte la relación filial de manera directa y sobria, conforme al estilo del proyecto.
- source_word: אֶת גְּדַלְיָהוּ בֶּן אֲחִיקָם
  english_pob_choice: Gedaliah son of Ahikam
  chosen_spanish: a Gedalías hijo de Ahicam
  alternatives_spanish:
  - a Gedalías, hijo de Ahicam
  lexicon: HALOT
  rationale: Se omite la marca de objeto directo en español y se conserva la filiación de forma transparente. La forma «Gedalías» sigue la transliteración bíblica usual en español.
- source_word: אֲשֶׁר הִפְקִיד
  english_pob_choice: whom ... had appointed
  chosen_spanish: a quien ... había puesto
  alternatives_spanish:
  - a quien ... había nombrado
  - a quien ... había designado
  lexicon: HALOT
  rationale: הפקיד puede significar nombrar, poner en cargo o confiar una responsabilidad. «Había puesto» es fiel al rango semántico y suena natural en español; además deja abierta la idea de encargo administrativo.
- source_word: מֶלֶךְ בָּבֶל
  english_pob_choice: the king of Babylon
  chosen_spanish: el rey de Babilonia
  alternatives_spanish:
  - el rey babilonio
  lexicon: HALOT
  rationale: La construcción posesiva se vierte de modo directo y estándar en español. «Rey de Babilonia» mantiene la claridad política y territorial del hebreo.
- source_word: בָּאָרֶץ
  english_pob_choice: over the land
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - sobre el país
  - en la tierra
  lexicon: HALOT
  rationale: 'Con el verbo de nombramiento, la frase tiene sentido administrativo: Gedalías fue puesto con autoridad sobre la tierra. «Tierra» preserva el amplio valor de אֶרֶץ y permite esa lectura.'
theological_decisions:
- issue: La identidad de «los caldeos» frente a «los babilonios»
  english_pob_reading: the Chaldeans; lexical note allows 'the Babylonians'
  chosen_spanish_reading: los caldeos
  alternative_spanish_readings:
  - los babilonios
  rationale: Se mantiene el etnónimo del texto hebreo, como hace el POB inglés, para no neutralizar la referencia histórica y literaria. La alternativa «babilonios» se reconoce solo como opción contextual, no como sustituto por defecto.
  doctrine_reference: Uso histórico-literario del texto; no implica diferencia doctrinal.
- issue: Valor del verbo הִכָּה en un contexto de muerte
  english_pob_reading: had struck down; footnote notes 'had killed' as alternative
  chosen_spanish_reading: había derribado
  alternative_spanish_readings:
  - había matado
  - había golpeado
  rationale: Se conserva la violencia verbal del hebreo sin traducirla prematuramente solo por el resultado. Esto refleja la tensión documentada entre la forma literal «golpear» y el contexto letal.
  doctrine_reference: Semántica verbal y narrativa histórica; sin implicación doctrinal.
- issue: Sentido administrativo de הִפְקִיד / בָּאָרֶץ
  english_pob_reading: had appointed ... over the land
  chosen_spanish_reading: había puesto ... sobre la tierra
  alternative_spanish_readings:
  - había nombrado ... sobre la tierra
  - había puesto ... en la tierra
  rationale: El contexto gubernamental favorece una lectura de encargo o autoridad. «Sobre la tierra» preserva la relación de gobierno implícita en el hebreo y evita reducir la frase a mera localización.
  doctrine_reference: Gobierno civil en el relato histórico; sin implicación doctrinal.
translation_notes:
  revision_awareness: Se siguió el pasaje hebreo WLC y se armonizó con el audit trail inglés sin copiarlo mecánicamente. La versión inglesa fue revisada y quedó sin cambios; el control cruzado reporta alta concordancia. En español se preservó la secuencia causal doble («a causa de... porque... porque...»), el etnónimo «caldeos», el verbo violento en sentido contextual y la idea administrativa de autoridad sobre la tierra.
  spanish_consistency_notes:
  - Se mantuvo «Gedalías» y «Ahicam» para nombres propios bíblicos en la forma habitual en español.
  - Se usó «tierra» para אֶרֶץ en sentido territorial amplio, no como simple suelo.
  - Se evitó «SEÑOR» o equivalentes de ocultamiento porque el verso no contiene el nombre divino.
  - El tono es sobrio y narrativo, adecuado para prosa histórica bíblica.
