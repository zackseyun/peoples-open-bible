translation:
  language: es
  text: Pero, después de un tiempo muy breve[a], Lisias, el guardián[b] del rey, pariente y administrador de los asuntos, tomando muy a mal lo sucedido[c],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «después de un poco de tiempo, en verdad un intervalo brevísimo». La expresión griega está comprimida de manera enfática.'
    reason: lexical_alternative
  - marker: b
    text: «Guardián» también puede entenderse como «regente» o «administrador», según el grado de formalidad que se le atribuya al cargo de Lisias.
    reason: alternative_reading
  - marker: c
    text: La oración continúa en el versículo siguiente; este versículo termina, como en el griego, con una cláusula participial inconclusa.
    reason: cross_reference
lexical_decisions:
- source_word: Μετʼ ὀλίγον δὲ παντελῶς χρονίσκον
  english_pob_choice: after a very short time
  chosen_spanish: después de un tiempo muy breve
  alternatives_spanish:
  - después de un poco de tiempo
  - después de un intervalo brevísimo
  lexicon: LSJ
  rationale: La expresión griega combina Μετʼ ὀλίγον (“después de un poco”) con χρονίσκον, diminutivo intensificado por παντελῶς. «Un tiempo muy breve» transmite la brevedad enfática sin sonar artificial en español.
- source_word: παντελῶς
  english_pob_choice: very
  chosen_spanish: muy
  alternatives_spanish:
  - enteramente
  - del todo
  - completamente
  lexicon: LSJ
  rationale: Aquí παντελῶς intensifica la idea de brevedad de χρονίσκον; «muy» conserva la fuerza adverbial de modo natural en español.
- source_word: ἐπίτροπος
  english_pob_choice: guardian
  chosen_spanish: guardián
  alternatives_spanish:
  - regente
  - administrador
  - supervisor
  lexicon: LSJ
  rationale: En contexto real, ἐπίτροπος puede designar a alguien encargado de tutela o regencia. «Guardián» mantiene el sentido básico de custodia/encargo sin imponer un título político más técnico que el griego no exige aquí.
- source_word: συγγενής
  english_pob_choice: kinsman
  chosen_spanish: pariente
  alternatives_spanish:
  - consanguíneo
  - familiar
  lexicon: LSJ
  rationale: El término señala relación familiar. «Pariente» es claro y natural en español, y conserva el valor relacional del original.
- source_word: ἐπὶ τῶν πραγμάτων
  english_pob_choice: administrator of affairs
  chosen_spanish: administrador de los asuntos
  alternatives_spanish:
  - encargado de los asuntos
  - ministro principal
  - administrador de los asuntos del reino
  lexicon: LSJ
  rationale: El giro idiomático apunta a responsabilidad sobre asuntos de Estado. «Administrador de los asuntos» sigue de cerca el griego y evita fijar un título técnico no explicitado.
- source_word: λίαν βαρέως φέρων
  english_pob_choice: taking the events very hard
  chosen_spanish: llevando muy a mal
  alternatives_spanish:
  - tomando muy a mal
  - estando muy afligido por
  - sintiendo gran pesar por
  lexicon: LSJ
  rationale: La expresión φέρειν βαρέως significa tomar algo mal, resentirlo o afligirse por ello. «Llevando muy a mal» conserva el matiz idiomático y el tono emocional.
- source_word: ἐπὶ τοῖς γεγονόσι
  english_pob_choice: the events
  chosen_spanish: lo sucedido
  alternatives_spanish:
  - los acontecimientos
  - las cosas que habían ocurrido
  - lo que había pasado
  lexicon: LSJ
  rationale: El participio perfecto sustantivado remite a hechos ya ocurridos. «Lo sucedido» es conciso, natural y mantiene la referencia narrativa sin sobreespecificar.
translation_notes:
  revision_awareness: El texto griego y el registro inglés POB muestran alta concordancia; se mantuvo la estructura incompleta del versículo y se preservaron las ambigüedades sobre ἐπίτροπος y la compresión temporal de Μετʼ ὀλίγον δὲ παντελῶς χρονίσκον.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» por defecto solo cuando el texto lo requiera; aquí no aparece.
  - Se prefirió «guardián» para ἐπίτροπος siguiendo la opción POB y dejando abierta la alternativa de regente/administrador en nota.
  - Se conservó el final inconcluso del versículo para respetar la sintaxis del original.
