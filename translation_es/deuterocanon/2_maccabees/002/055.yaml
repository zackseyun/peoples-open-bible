translation:
  language: es
  text: mientras dejamos el tratamiento detallado de cada asunto al autor[a], y nos esforzamos por seguir las líneas generales del epítome.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «investigar con precisión cada punto ... proceder según el bosquejo del epítome». El griego usa términos literarios que describen la diferencia entre una obra completa y su abreviación.'
    reason: lexical_alternative
lexical_decisions:
- source_word: διακριβοῦν
  english_pob_choice: the detailed treatment
  chosen_spanish: el tratamiento detallado
  alternatives_spanish:
  - examinar con precisión
  - tratar con precisión
  - la exposición detallada
  lexicon: LSJ
  rationale: El infinitivo sustantivado expresa aquí la labor de exponer con precisión cada asunto dentro de una obra amplia. En español, «tratamiento detallado» conserva el matiz de minuciosidad y el carácter literario del trabajo, sin reducirlo solo a «investigación».
- source_word: περὶ ἑκάστων
  english_pob_choice: of each matter
  chosen_spanish: de cada asunto
  alternatives_spanish:
  - sobre cada cosa
  - acerca de cada punto
  - de cada materia
  lexicon: LSJ
  rationale: ἑκάστων es distributivo y se refiere a los diversos asuntos tratados en la obra mayor. «Asunto» resulta natural en español y mantiene la referencia a cada elemento particular.
- source_word: τῷ συγγραφεῖ
  english_pob_choice: to the author
  chosen_spanish: al autor
  alternatives_spanish:
  - al escritor
  - al historiador
  lexicon: LSJ
  rationale: συγγραφεύς designa al compositor de la obra original extensa. «Autor» es la equivalencia moderna más clara y preserva la oposición literaria con el epitomador.
- source_word: παραχωρήσαντες
  english_pob_choice: leaving
  chosen_spanish: dejamos
  alternatives_spanish:
  - cediendo
  - confiando
  - encomendando
  lexicon: LSJ
  rationale: El participio indica ceder a otro la tarea de tratar plenamente esos detalles. «Dejamos» reproduce de forma idiomática la idea de reservar esa labor para el autor.
- source_word: ἐπιπορεύεσθαι
  english_pob_choice: to follow
  chosen_spanish: seguir
  alternatives_spanish:
  - proceder por
  - ir tras
  - avanzar siguiendo
  lexicon: LSJ
  rationale: Con τοῖς ὑπογραμμοῖς, el verbo describe avanzar siguiendo una guía o trazado. «Seguir» comunica con claridad la acción de atenerse al esquema del resumen.
- source_word: ὑπογραμμοῖς
  english_pob_choice: the outlines
  chosen_spanish: los trazos
  alternatives_spanish:
  - las líneas guía
  - el esquema
  - los contornos
  lexicon: LSJ
  rationale: En este contexto literario, ὑπογραμμοί son líneas guía o un bosquejo. «Trazos» conserva la metáfora visual de un esbozo sin sonar demasiado técnico o redundante en español.
- source_word: τῆς ἐπιτομῆς
  english_pob_choice: of the epitome
  chosen_spanish: del epítome
  alternatives_spanish:
  - de la abreviación
  - del resumen
  - de la condensación
  lexicon: LSJ
  rationale: ἐπιτομή es un término técnico de obra abreviada. «Epítome» preserva el carácter literario y técnico del original, como en el inglés POB.
- source_word: σπουδάζοντες
  english_pob_choice: taking pains
  chosen_spanish: nos esforzamos
  alternatives_spanish:
  - poniendo diligencia
  - trabajando con empeño
  - esmerándonos
  lexicon: LSJ
  rationale: El participio expresa diligencia y cuidado, no solo deseo. «Nos esforzamos» refleja ese empeño activo de quienes producen la obra abreviada.
translation_notes:
  revision_awareness: La redacción sigue de cerca el griego de Swete y el análisis auditado en inglés. Se conservó la distinción literaria entre la obra extensa del autor y el epítome, evitando suavizar ἐπιτομή a un simple «resumen» en el texto principal.
  spanish_consistency_notes:
  - Se usó «epítome» de forma técnica y consistente con el contexto literario.
  - Se mantuvo la primera persona plural implícita del participio σπουδάζοντες en español («nos esforzamos»), acorde con el sujeto editorial del pasaje.
  - No se introdujeron términos teológicos ajenos al versículo; la solución busca precisión literaria y claridad natural en español.
