  text: עֵ֕קֶב אֲשֶׁר שָׁמַ֥ע אַבְרָהָ֖ם בְּ/קֹלִ֑/י וַ/יִּשְׁמֹר֙ מִשְׁמַרְתִּ֔/י מִצְוֺתַ֖/י חֻקּוֹתַ֥/י וְ/תוֹרֹתָֽ/י־׃
