    text: 'O: «culpa». El hebreo עָוֹן puede significar «iniquidad», «culpa» o, por extensión, la consecuencia de la culpa. Hebreo: «Peor»; compárese la expresión más completa «Baal-peor» en pasajes relacionados.'
    reason: lexical_alternative_and_cross_reference
  revision_rationale: Se corrigió el problema principal reubicando la información sobre «Peor/Baal-peor» a una nota anclada correctamente en «Peor», en vez de anclarla erróneamente en «Yahvé». También se mejoró «hubo una plaga» a «vino una plaga» para reflejar mejor el sentido del hebreo y sonar más natural en español. Se simplificaron las notas para alinearse mejor con el rastro POB sin perder información relevante.
