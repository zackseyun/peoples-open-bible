base_translation:
  language: en
  yaml_path: translation/ot/ezra/007/009.yaml
  text: For on the first day of the first month he laid the foundation for the journey up from Babylon[a], and on the first day of the fifth month he came to Jerusalem[b], according to the good hand of his God upon him.
  footnotes:
  - marker: a
    text: Or, 'because the good hand of his God was upon him.' The Hebrew idiom can express divine favor as the reason for Ezra's successful arrival.
    reason: alternative_reading
  - marker: b
    text: Literally, 'the ascent from Babylon,' a conventional way of speaking about the journey up to Jerusalem.
    reason: lexical_alternative
