translation:
  language: es
  text: Y también los siervos de Hiram[a] y los siervos de Salomón, que trajeron oro de Ofir, trajeron madera de algum[b] y piedras preciosas[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunas tradiciones traducen este nombre como «Huram» en Crónicas; aquí se representa la forma hebrea como «Hiram».
    reason: alternative_reading
  - marker: b
    text: O «madera de almug»; la especie exacta indicada por el término hebreo es incierta.
    reason: lexical_alternative
  - marker: c
    text: Hebreo «piedra preciosa», singular en forma, probablemente usado aquí con sentido colectivo para «piedras preciosas».
    reason: lexical_alternative
lexical_decisions:
- source_word: עַבְדֵי
  english_pob_choice: servants
  chosen_spanish: esclavos
  alternatives_spanish:
  - siervos
  - servidores
  lexicon: HALOT
  rationale: En este contexto real y administrativo, el término hebreo עבד puede referirse a personas al servicio de un rey. Sin embargo, siguiendo la decisión POB de conservar la fuerza lexical donde el inglés usó 'servants' solo por naturalidad contextual, en español 'esclavos' mantiene la relación de pertenencia/servicio sin suavizarla indebidamente. 'Siervos' sería más eclesiástico y menos preciso aquí.
- source_word: חירם
  english_pob_choice: Hiram
  chosen_spanish: Hiram
  alternatives_spanish:
  - Huram
  lexicon: transliteración tradicional
  rationale: El texto hebreo presenta la forma consonántica que el POB representa como 'Hiram'. Se mantiene esa forma, ya que la alternativa 'Huram' pertenece a otras tradiciones textuales o de traducción.
- source_word: שְׁלֹמֹה
  english_pob_choice: Solomon
  chosen_spanish: Salomón
  alternatives_spanish:
  - Solomón
  lexicon: uso bíblico español
  rationale: Nombre propio bíblico establecido en español. 'Salomón' es la forma natural y tradicional, sin alterar el referente.
- source_word: אֲשֶׁר הֵבִיאוּ זָהָב מֵאוֹפִיר
  english_pob_choice: who brought gold from Ophir
  chosen_spanish: que trajeron oro de Ofir
  alternatives_spanish:
  - que habían traído oro de Ofir
  - que importaron oro de Ofir
  lexicon: HALOT
  rationale: Se conserva el relativo y el pasado simple, que en español funciona con naturalidad. 'Importaron' añadiría matiz comercial no exigido por el hebreo.
- source_word: אוֹפִיר
  english_pob_choice: Ophir
  chosen_spanish: Ofir
  alternatives_spanish:
  - Ofir
  lexicon: nombre propio geográfico
  rationale: Se translitera el nombre de lugar según el uso bíblico español más extendido, 'Ofir'.
- source_word: עֲצֵי אַלְגּוּמִּים
  english_pob_choice: algum wood
  chosen_spanish: madera de algumes
  alternatives_spanish:
  - madera de almug
  - madera de algum
  - madera de algon
  lexicon: HALOT
  rationale: Se conserva el término raro del hebreo con una adaptación española legible. Dado que la identificación botánica es incierta, no se traduce por una especie moderna. La forma plural hebrea de 'árboles/madera' se vierte naturalmente como 'madera de ...'.
- source_word: וְאֶבֶן יְקָרָה
  english_pob_choice: precious stones
  chosen_spanish: piedras preciosas
  alternatives_spanish:
  - piedra preciosa
  - piedras costosas
  lexicon: HALOT
  rationale: Aunque el hebreo está en singular formal, el sentido colectivo se expresa mejor en español con el plural 'piedras preciosas', como en la tradición POB inglesa. Es la forma más natural para una lista de cargamento.
theological_decisions:
- issue: Valor de עבד en contexto cortesano
  english_pob_reading: servants
  chosen_spanish_reading: esclavos
  alternative_spanish_readings:
  - siervos
  - servidores
  rationale: 'No hay una afirmación doctrinal directa, pero sí una tensión lexical importante: el hebreo puede abarcar servicio cortesano y dependencia fuerte. El español ''esclavos'' conserva la fuerza del término sin eufemizarlo, manteniendo auditable la decisión y evitando una lectura demasiado suavizada.'
  doctrine_reference: Lexical/theological nuance in royal service terminology
translation_notes:
  revision_awareness: Se ha mantenido la estructura breve del hebreo, el paralelismo entre los dos grupos de esclavos y la lista final de bienes. No se introdujeron ampliaciones explicativas, y se conservó la incertidumbre léxica del término de la madera mediante nota.
  spanish_consistency_notes:
  - Se usa 'Ofir' como forma bíblica española estándar para el nombre del lugar.
  - Se conserva 'Hiram' en lugar de 'Huram' por correspondencia con la forma hebrea de este versículo.
  - La elección de 'esclavos' sigue la intención de no suavizar עבד cuando el contexto permite una lectura fuerte.
  - '''Piedras preciosas'' expresa adecuadamente el singular hebreo colectivo en español.'
