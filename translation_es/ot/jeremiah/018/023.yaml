revisions:
- from: Pero tú, Yahvé, sabes todos sus consejos contra mí para muerte. No cubras su iniquidad, y no borres su pecado de delante de ti. Hagan tropezar ante ti; en el tiempo de tu ira, actúa contra ellos.
  to: Pero tú[a], Yahvé, sabes todos sus consejos contra mí, para matarme. No cubras su iniquidad[b], y no borres su pecado de delante de ti. Que tropiecen[c] delante de ti; en el tiempo de tu ira, actúa contra ellos.
  rationale: Se corrige un error de sentido importante en la cláusula jussiva, reemplazando 'Hagan tropezar ante ti' por 'Que tropiecen delante de ti'. También se mejora la naturalidad de 'contra mí para muerte' a 'contra mí, para matarme', conservando la literalidad hebrea en nota. Se añaden las notas léxicas que el rastro inglés preserva y que ayudan a mantener la justificación traductológica en español.
