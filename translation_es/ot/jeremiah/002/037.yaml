translation:
  language: es
  text: También de este saldrás con las manos sobre tu cabeza[a], porque Yahvé ha rechazado a aquellos en quienes confías[c][b], y no prosperarás por medio de ellos[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de esto»; el demostrativo probablemente se refiere al poder extranjero recién mencionado, a saber, Egipto.
    reason: alternative_reading
  - marker: b
    text: «Con las manos sobre tu cabeza» es un gesto de duelo, vergüenza o derrota.
    reason: cultural_note
  - marker: c
    text: O «tus objetos de confianza». El hebreo dice literalmente «tus confianzas/seguridades».
    reason: lexical_alternative
  - marker: d
    text: O «no tendrás éxito con ellos».
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּם
  english_pob_choice: too
  chosen_spanish: También
  alternatives_spanish:
  - además
  - incluso
  lexicon: HALOT
  rationale: 'Expresa la idea de continuidad/escalada que el contexto exige: no solo de una situación anterior, sino también de esta otra.'
- source_word: מֵאֵת זֶה
  english_pob_choice: from this one
  chosen_spanish: de esto
  alternatives_spanish:
  - de esta
  - de éste
  - de este mismo
  lexicon: HALOT
  rationale: La forma hebrea es demostrativa y en contexto apunta al poder extranjero mencionado antes; «de esto» conserva la referencia sin forzar una especificación que el hebreo no dice explícitamente.
- source_word: תֵּצְאִי
  english_pob_choice: you will go out
  chosen_spanish: saldrás
  alternatives_spanish:
  - irás fuera
  - partirás
  - te irás
  lexicon: HALOT
  rationale: «Salir» comunica con naturalidad la idea de dejar una situación o dependencia en vergüenza; mantiene el futuro simple del hebreo.
- source_word: וְיָדַיִךְ עַל רֹאשֵׁךְ
  english_pob_choice: with your hands on your head
  chosen_spanish: con las manos sobre tu cabeza
  alternatives_spanish:
  - y tus manos sobre tu cabeza
  - con las manos en tu cabeza
  lexicon: HALOT
  rationale: Conserva la imagen idiomática de duelo, vergüenza o derrota. «Sobre tu cabeza» refleja mejor עַל que «en tu cabeza».
- source_word: מָאַס
  english_pob_choice: has rejected
  chosen_spanish: ha rechazado
  alternatives_spanish:
  - ha despreciado
  - ha desechado
  - ha rehusado
  lexicon: HALOT
  rationale: '«Rechazado» encaja bien con el marco pactual y político: Yahvé repudia aquello en lo que Judá confía.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se sigue el estándar del proyecto para el nombre divino, manteniendo el nombre propio del pacto en vez de una sustitución funcional.
- source_word: בְּמִבְטַחַיִךְ
  english_pob_choice: those in whom you trust
  chosen_spanish: tus objetos de confianza
  alternatives_spanish:
  - aquellos en quienes confías
  - tus confiados
  - tus confianzas
  lexicon: HALOT
  rationale: El hebreo es literalmente plural de «confianzas/seguridades». «Objetos de confianza» preserva la fuerza lexical y evita reducirlo solo a personas, aunque el contexto apunte concretamente a potencias extranjeras.
- source_word: תַצְלִיחִי לָהֶם
  english_pob_choice: you will not prosper through them
  chosen_spanish: no prosperarás por medio de ellos
  alternatives_spanish:
  - no tendrás éxito con ellos
  - no prosperarás con ellos
  - no saldrás bien por ellos
  lexicon: HALOT
  rationale: «Prosperar» traduce bien הצליח en este contexto; «por medio de ellos» mantiene la relación instrumental indicada por לָהֶם sin sonar demasiado literal en español.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se conserva el nombre del pacto revelado en el texto hebreo. El proyecto evita la sustitución convencional por «SEÑOR» para no ocultar el Tetragrámaton.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: La frase בְּמִבְטַחַיִךְ
  english_pob_reading: those in whom you trust / your objects of trust
  chosen_spanish_reading: tus objetos de confianza
  alternative_spanish_readings:
  - aquellos en quienes confías
  - tus confianzas
  - tus seguridades
  rationale: El hebreo pluraliza la idea de confianza y puede referirse concretamente a aliados/poderes extranjeros. La opción elegida conserva la ambigüedad lexical sin perder inteligibilidad; el contexto sugiere a quiénes alude.
  doctrine_reference: HALOT; contexto de juicio sobre alianzas humanas en Jeremías
- issue: Gesto de manos sobre la cabeza
  english_pob_reading: gesture of grief, shame, or defeat
  chosen_spanish_reading: gesto de duelo, vergüenza o derrota
  alternative_spanish_readings:
  - gesto de luto, humillación o derrota
  - señal de vergüenza o desolación
  rationale: La imagen corporal no debe espiritualizarse; en el contexto profético expresa humillación pública y derrota.
  doctrine_reference: Uso idiomático semítico en contextos de lamento y cautiverio
translation_notes:
  revision_awareness: 'La revisión más reciente no introdujo cambios: el estado final indica alta concordancia y ningún ajuste necesario. Se mantiene la lectura de la edición base y su audit trail sin modificaciones sustantivas.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה.
  - Se conserva el paralelismo entre salida, gesto corporal de vergüenza y rechazo divino.
  - «Prosperar» se mantiene como traducción de הצליח, con valor de éxito/resultados favorables en contexto.
  - La ambigüedad de מִבְטַחַיִךְ se preserva con una nota alternativa, sin fijarla indebidamente a un solo referente.
