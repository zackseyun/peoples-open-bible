id: PHP.2.29
reference: Philippians 2:29
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: προσδέχεσθε οὖν αὐτὸν ἐν κυρίῳ μετὰ πάσης χαρᾶς, καὶ τοὺς τοιούτους ἐντίμους ἔχετε,
base_translation:
  language: en
  yaml_path: translation/nt/philippians/002/029.yaml
  text: 'So welcome him in the Lord with all joy, and hold people like him in honor.'
translation:
  language: ko
  text: 그러므로 그를 주 안에서 온갖 기쁨으로 영접하고, 그와 같은 사람들[a]을 존귀히 여기십시오.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「이와 같은 사람들」. 헬라어는 남성 복수 형용사 형태로 사용된다.
    reason: lexical_alternative
lexical_decisions:
- source_word: προσδέχεσθε
  english_pob_choice: welcome
  chosen_korean: 영접하다
  alternatives_korean:
  - 맞이하다
  - 받아들이다
  lexicon: BDAG
  rationale: 단순 수용이 아닌 따뜻한 환영. 한국 교회 전통의 「영접하다」가 바울의 목회적 어조를 자연스럽게 담는다.
- source_word: οὖν
  english_pob_choice: So
  chosen_korean: 그러므로
  alternatives_korean:
  - 그러니
  - 따라서
  lexicon: BDAG
  rationale: 추론적 연결을 한국어 「그러므로」로 자연스럽게 보존한다.
- source_word: ἐν κυρίῳ
  english_pob_choice: in the Lord
  chosen_korean: 주 안에서
  alternatives_korean:
  - 주께 속한 자로
  - 주와 연합하여
  lexicon: BDAG
  rationale: 바울의 정형 구문을 그대로 보존한다.
- source_word: μετὰ πάσης χαρᾶς
  english_pob_choice: with all joy
  chosen_korean: 온갖 기쁨으로
  alternatives_korean:
  - 모든 기쁨으로
  - 충만한 기쁨으로
  lexicon: BDAG
  rationale: πᾶς의 충만한 강조를 「온갖」으로 자연스럽게 담는다.
- source_word: τοὺς τοιούτους
  english_pob_choice: people like him
  chosen_korean: 그와 같은 사람들
  alternatives_korean:
  - 그러한 사람들
  - 이와 같은 사람들
  lexicon: BDAG
  rationale: 에바브로디도를 구체적 본보기로 한 「그러한 부류의 사람들」을 가리킨다. 「그와 같은 사람들」이 대표적 의미를 자연스럽게 담는다.
- source_word: ἐντίμους ἔχετε
  english_pob_choice: hold people like him in honor
  chosen_korean: 존귀히 여기다
  alternatives_korean:
  - 귀하게 여기다
  - 존경할 만한 자로 대하다
  lexicon: BDAG
  rationale: 그러한 자들을 존귀히 여기거나 대하는 의미를 한국어로 자연스럽고 매끄럽게 담는다.
