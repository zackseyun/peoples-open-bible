translation:
  language: es
  text: Cuando llegaron a la era de Atad[a], que está al otro lado del Jordán[b], lamentaron allí con un lamento muy grande y grave[c], y él guardó siete días de duelo por su padre[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Atad puede reflejar un nombre relacionado con 'espino' o 'zarza', pero aquí funciona como nombre de lugar.
    reason: lexical_alternative
  - marker: b
    text: O 'más allá del Jordán' o 'del otro lado del Jordán'.
    reason: alternative_reading
  - marker: c
    text: 'Hebreo: ''un lamento grande y muy pesado'', un giro que expresa duelo intenso.'
    reason: cultural_note
  - marker: d
    text: El verbo está en singular; probablemente se refiere de manera específica a José.
    reason: alternative_reading
lexical_decisions:
- source_word: גֹּרֶן
  english_pob_choice: threshing floor
  chosen_spanish: era
  alternatives_spanish:
  - era de trillar
  - lugar de trilla
  lexicon: HALOT
  rationale: El hebreo designa un sitio agrícola para trillar; en español bíblico natural, 'era' comunica bien ese espacio sin sonar mecánico. Mantiene el valor locativo de la expresión.
- source_word: הָאָטָד
  english_pob_choice: Atad
  chosen_spanish: Atad
  alternatives_spanish:
  - el bramble
  - el espino
  - zarza
  lexicon: HALOT
  rationale: En el contexto de un topónimo compuesto, se conserva 'Atad' como nombre propio. El sentido léxico de la raíz puede indicarse aparte sin perder la función toponímica.
- source_word: בְּעֵבֶר הַיַּרְדֵּן
  english_pob_choice: beyond the Jordan
  chosen_spanish: al otro lado del Jordán
  alternatives_spanish:
  - más allá del Jordán
  - del otro lado del Jordán
  lexicon: HALOT
  rationale: La locución hebrea señala la región del lado opuesto del río según el punto de referencia. 'Al otro lado del Jordán' es natural en español y conserva la ambigüedad direccional del original.
- source_word: וַיִּסְפְּדוּ
  english_pob_choice: they lamented
  chosen_spanish: hicieron una gran lamentación
  alternatives_spanish:
  - lamentaron
  - guardaron duelo
  - hicieron duelo
  lexicon: HALOT
  rationale: El verbo expresa un lamento funerario formal. En español, 'hacer lamentación' preserva el registro colectivo y ceremonial; 'lamentaron' sería posible, pero menos explícito sobre el carácter ritual.
- source_word: מִסְפֵּד גָּדוֹל וְכָבֵד מְאֹד
  english_pob_choice: a very great and grievous lamentation
  chosen_spanish: una gran lamentación, muy grave
  alternatives_spanish:
  - una lamentación muy grande y pesada
  - un duelo muy grande y grave
  - una lamentación grande y muy pesada
  lexicon: HALOT
  rationale: '''Grande'' y ''grave'' reproducen la acumulación intensiva del hebreo sin forzar un calco de ''pesada'', que en español suena menos natural aquí. ''Muy grave'' conserva la fuerza de כָבֵד como severidad/intensidad.'
- source_word: וַיַּעַשׂ לְאָבִיו אֵבֶל
  english_pob_choice: he observed seven days of mourning for his father
  chosen_spanish: él guardó siete días de duelo por su padre
  alternatives_spanish:
  - él observó siete días de duelo por su padre
  - él hizo duelo por su padre durante siete días
  - guardó duelo por su padre durante siete días
  lexicon: HALOT
  rationale: La construcción idiomática con עשה + אֵבֶל se expresa naturalmente en español con 'guardar duelo'. Esto mantiene el sentido de observancia formal del período fúnebre sin una literalidad extraña.
- source_word: שִׁבְעַת יָמִים
  english_pob_choice: seven days
  chosen_spanish: siete días
  alternatives_spanish:
  - durante siete días
  - por siete días
  lexicon: HALOT
  rationale: La duración se vierte de manera directa y natural en español. El contexto ya aporta la idea de período de duelo, así que no hace falta sobreexplicarla en el texto principal.
theological_decisions:
- issue: Cambio de sujeto de plural a singular en וַיַּעַשׂ
  english_pob_reading: 'The subject is Joseph individually: ''he observed mourning for his father seven days.'''
  chosen_spanish_reading: 'Se conserva el singular: ''él guardó siete días de duelo por su padre.'''
  alternative_spanish_readings:
  - hicieron duelo por su padre durante siete días
  - ellos guardaron duelo por su padre durante siete días
  rationale: El hebreo pasa de verbos plurales ('llegaron', 'hicieron lamentación') a un verbo singular ('hizo/guardó'). Mantener el singular respeta la forma masorética y la observación del audit trail inglés, que identifica a José como sujeto probable.
  doctrine_reference: Observación textual y sintáctica; sin implicación doctrinal
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del inglés, que prefirió una formulación más natural para la intensidad de כָבֵד y reordenó la clausula final. En español, esto se reflejó con 'muy grave' y con 'guardó siete días de duelo por su padre', manteniendo el mismo contenido y la misma tensión sintáctica del hebreo.
  spanish_consistency_notes:
  - Se usó 'Yordán' como 'Jordán' por convención ortográfica española.
  - Se prefirió 'duelo' para אֵבֶל porque en español comunica mejor el período formal de lamento funerario.
  - Se mantuvo 'Atad' como topónimo y no se lo tradujo en el cuerpo principal.
  - La puntuación separa con coma la intensificación final para reflejar el doble adjetivo hebreo sin volverlo pesado en español.
