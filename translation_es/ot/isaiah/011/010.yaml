review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura principal del hebreo: la fórmula temporal profética («en aquel día»), la metáfora «la raíz de Isaí», la imagen de נֵס como señal/estandarte para los pueblos, el movimiento de las naciones hacia esa figura, y la cláusula final sobre su reposo/lugar de reposo. También mantiene adecuadamente las alternativas léxicas en notas para נֵס, יִדְרֹשׁוּ y מְנֻחָתוֹ.'
  spanish_quality_summary: 'El texto es mayormente claro y digno, pero presenta dos problemas de legibilidad y precisión editorial: la nota [a] está mal anclada en «Isaí» cuando corresponde a «estandarte», y «será gloria» suena menos natural en español que «será glorioso», especialmente dado que el POB inglés ya revisó en esa dirección por naturalidad. Además, conviene suavizar la puntuación del inciso con raya española cerrada.'
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Isaí», «pueblos», «naciones» y «gloria/glorioso» son compatibles con las decisiones auditadas. No intervienen términos de la lista prioritaria como Yahvé, Mesías, Cristo, etc.
  issues:
  - severity: high
    issue: La nota [a] está colocada sobre «Isaí» en lugar de sobre «estandarte».
    rationale: La nota explica נֵס («estandarte / señal»), no שֹׁרֶשׁ יִשַׁי. Tal como está, el anclaje induce a error sobre qué término recibe la alternativa léxica.
  - severity: medium
    issue: «Su lugar de reposo será gloria» es fiel al sustantivo hebreo, pero suena rígido y poco idiomático en español.
    rationale: El inglés POB auditado ya ajustó «will be glory» a «will be glorious» por naturalidad. En español, «será glorioso» preserva adecuadamente כָבוֹד como cualidad sin forzar una construcción nominal menos natural.
  - severity: low
    issue: La raya del inciso debería cerrarse según convención tipográfica española.
    rationale: «—a él buscarán las naciones…» pide raya de cierre antes de la conjunción siguiente para una presentación más pulida y natural.
  revised_spanish_text: Y en aquel día la raíz de Isaí, que está en pie como estandarte[a] para los pueblos—a él buscarán las naciones[b]—, y su lugar de reposo será glorioso[c].
  revised_footnotes:
  - marker: a
    text: O «como señal para los pueblos»; נֵס designa un estandarte o señal elevada de reunión.
    reason: lexical_alternative
  - marker: b
    text: O «las naciones inquirirán de él» o «lo consultarán».
    reason: lexical_alternative
  - marker: c
    text: O «su reposo será glorioso» / «su lugar de reposo será glorioso».
    reason: alternative_reading
  revision_rationale: Se corrige el anclaje de la nota de נֵס para que recaiga sobre «estandarte», se mejora la naturalidad del español con «será glorioso» en línea con la revisión inglesa auditada, y se pule la puntuación del inciso sin alterar el sentido fuente.
