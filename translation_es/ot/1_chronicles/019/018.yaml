review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo y el rastro POB en lo esencial: Aram como nombre, la huida ante Israel, las cifras de Crónicas, la distinción entre la tropa de carros y la infantería, y la muerte de Shofac/Shophach. Sin embargo, hay un problema formal importante con las notas: el marcador [a] se usa en el texto para anclar la variante textual de todo el primer miembro, pero vuelve a aparecer también sobre «guerreros de carro», mientras que la nota [b] de variante de nombre está anclada al lugar equivocado al final de «ejército» y no al nombre propio. Eso rompe la disciplina requerida de notas y crea confusión sobre qué explica cada nota.'
  spanish_quality_summary: El español es generalmente claro y digno. «Guerreros de carro» suena algo rígido, pero es defendible y refleja la decisión inglesa de evitar limitarse a conductores; «combatientes de carro» suena un poco más natural en español. «Delante de Israel» es aceptable, aunque «ante Israel» sería algo más idiomático. La mayor necesidad de revisión es técnica y de legibilidad en la colocación y unicidad de notas.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. Se conserva «Aram» en vez de «Siria». No hay términos teológicos sensibles aquí. La transliteración «Shofac» es aceptable en español, y la variante «Shobac/Shobach» debe permanecer en nota. La diferencia inglesa entre «killed» y «put ... to death» se mantiene con «mató» y «dio muerte a».
  issues:
  - severity: high
    issue: El marcador [a] está reutilizado para dos anclajes distintos en el mismo versículo.
    rationale: Las instrucciones exigen marcadores únicos por nota y que cada nota tenga su ancla exacta en el texto. Aquí [a] aparece tras «Israel» y también tras «carro», pero solo hay una nota [a].
  - severity: medium
    issue: La nota de variante de nombre [b] está anclada a «ejército» en vez de al nombre «Shofac».
    rationale: La nota explica la forma alternativa del nombre propio en Samuel, por lo que debe ir anclada al nombre para claridad y fidelidad editorial.
  - severity: low
    issue: «Guerreros de carro» es comprensible pero algo tieso en español.
    rationale: «Combatientes de carro» o «guerreros de los carros» puede sonar más natural, manteniendo la idea de tropa/cuerpo de carros sin reducirla a conductores.
  revised_spanish_text: Y Aram huyó delante de Israel[a], y David mató de Aram a siete mil combatientes de carro y a cuarenta mil hombres de a pie, y dio muerte a Shofac[b], el comandante del ejército.
  revised_footnotes:
  - marker: a
    text: 'El pasaje paralelo de 2 Samuel 10:18 dice: «setecientos carros y cuarenta mil jinetes». Crónicas aquí lee «siete mil combatientes de carro y cuarenta mil hombres de a pie».'
    reason: textual_variant
  - marker: b
    text: En el relato paralelo de 2 Samuel 10:16, 18, el nombre aparece como Shobac/Shobach.
    reason: alternative_reading
  revision_rationale: 'Se corrigió la colocación y unicidad de los marcadores de nota para cumplir la disciplina editorial: [a] queda como nota de variante textual anclada al segmento pertinente, y [b] se mueve al nombre Shofac, que es lo que la nota explica. También se suavizó «guerreros de carro» a «combatientes de carro» para una lectura más natural en español sin perder la decisión léxica del POB.'
