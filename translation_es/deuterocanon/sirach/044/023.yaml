translation:
  language: es
  text: Lo estableció con una bendición[a], y le dio su herencia; lo colocó entre las tribus, para dividirlas en doce porciones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo «dividir doce» es una expresión comprimida; el paralelo griego lo dice con más claridad: «entre las tribus las dividió en doce», lo que apoya el sentido «en doce porciones».'
    reason: alternative_reading
lexical_decisions:
- source_word: ויכוננהו / κατέπαυσεν
  english_pob_choice: He established him
  chosen_spanish: Lo estableció
  alternatives_spanish:
  - Lo confirmó
  - Lo hizo firme
  lexicon: HALOT; LXX κατεπαύσεν/καθίστημι en contexto poético
  rationale: El hebreo expresa la acción de asentar o establecer firmemente. En español, «lo estableció» conserva la fuerza resultativa sin sonar forzado. «Confirmó» sería posible, pero pierde el matiz de fundar o fijar.
- source_word: בברכה / ἐν εὐλογίαις αὐτοῦ
  english_pob_choice: with a blessing
  chosen_spanish: con una bendición
  alternatives_spanish:
  - con bendiciones
  - por medio de una bendición
  lexicon: HALOT; LSJ
  rationale: La construcción instrumental se comunica de modo natural con «con». El singular mantiene la unidad del acto de bendecir en el hebreo, aunque el griego pluraliza «bendiciones».
- source_word: נחלתו / κληρονομίᾳ
  english_pob_choice: his inheritance
  chosen_spanish: su herencia
  alternatives_spanish:
  - su heredad
  - su posesión heredada
  lexicon: HALOT; BDAG/LSJ κληρονομία
  rationale: «Herencia» es el equivalente más claro y bíblicamente reconocible para נחלה y κληρονομία. «Heredad» también sería posible, pero suena más arcaizante en español actual.
- source_word: ויציבהו / διέστειλεν μερίδας αὐτοῦ
  english_pob_choice: he stationed him among the tribes
  chosen_spanish: lo colocó entre las tribus
  alternatives_spanish:
  - lo puso entre las tribus
  - lo estableció entre las tribus
  lexicon: HALOT; LXX διέστειλεν
  rationale: El hebreo y el griego no solo hablan de ubicación, sino de una colocación ordenadora en relación con las tribus. «Lo colocó entre las tribus» refleja la revisión inglesa y evita introducir «sobre» sin apoyo directo en el texto base.
- source_word: לחלק שנים עשר / ἐν φυλαῖς ἐμέρισεν δέκα δύο
  english_pob_choice: to divide them into twelve portions
  chosen_spanish: para dividirlas en doce partes
  alternatives_spanish:
  - para repartirlas en doce porciones
  - como doce divisiones
  lexicon: HALOT; LXX φυλαῖς / μερίδας
  rationale: La frase hebrea es comprimida, y el griego explicita la división en relación con las tribus. «Doce partes» conserva la idea de reparto sin sobreinterpretar; «porciones» o «divisiones» también son posibles, pero «partes» es más llano en español.
theological_decisions:
- issue: Referente de los pronombres masculinos singulares
  english_pob_reading: The pronouns refer to Jacob/Israel, continuing the subject matter from the Greek parallel and the surrounding context.
  chosen_spanish_reading: Los pronombres se entienden de Jacob/Israel, implícito en el sujeto del contexto inmediato.
  alternative_spanish_readings:
  - Pueden leerse de modo más general como el patriarca receptor de la bendición sin nombrarlo explícitamente en el hebreo.
  - Podrían dejarse deliberadamente elípticos sin precisar el referente.
  rationale: El hebreo es elíptico, mientras que el griego menciona explícitamente a Jacob y la distribución tribal apunta a Israel. La redacción española conserva la referencia sin añadir el nombre al texto, para no borrar la tensión textual entre ambas tradiciones.
  doctrine_reference: Preservar la tensión textual sin resolverla artificialmente
- issue: Relación entre bendición e herencia
  english_pob_reading: He established him with a blessing, and gave him his inheritance.
  chosen_spanish_reading: La bendición aparece como medio o acompañamiento de la concesión de la herencia.
  alternative_spanish_readings:
  - La bendición modifica solo el modo de la acción sin implicar mediación.
  - La bendición y la herencia son dos actos separados sin relación causal.
  rationale: Tanto el hebreo como el griego enlazan la bendición con la herencia de manera estrecha. En español, «con una bendición» preserva esa relación sin convertirla en una explicación doctrinal adicional.
  doctrine_reference: Leer según la economía poética del texto, no como formulación sistemática
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente del audit trail inglés, que ajusta la segunda cláusula para reflejar con mayor precisión el hebreo comprimido y el apoyo aclaratorio del griego. La versión española adopta esa orientación: mantiene el orden de la bendición y la herencia, y traduce la clausula tribal de forma más natural que una glosa literal.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se prefirió «herencia» por coherencia con נחלה/κληρονομία y con el registro bíblico en español.
  - Se evitó «Cristo» porque no hay lenguaje mesiánico en el pasaje.
  - Se mantuvo un tono sobrio y publicable, con una sola nota para la ambigüedad de la última cola del verso.
