theological_decisions:
- issue: Meaning of τεταγμένοι in relation to divine appointment and human response
  chosen_reading: had been appointed for eternal life
  alternative_readings:
  - had been disposed toward eternal life
  - had been set in order for eternal life
  rationale: The passive participle of τάσσω in this context most straightforwardly indicates appointment/designation rather than merely inward disposition. This translation preserves the grammatical force of the passive without expanding into a full doctrinal statement about predestination beyond what the verse itself says. Because the phrase is debated across Christian traditions, alternatives are preserved in a footnote rather than excluded silently.
  doctrine_reference: Affirmations; Translation philosophy §3 (Preserve theological tension rather than resolve it)
