translation:
  language: es
  text: 'Así dice el Señor Dios: El día que descendió a Seol[a], hice que hubiera duelo; cubrí el abismo por causa de él, y contuve sus ríos, y las muchas aguas quedaron detenidas. Oscurecí el Líbano por causa de él[b], y todos los árboles del campo desfallecieron por causa de él[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “el sepulcro” o “el reino de los muertos”. ‘Seol’ nombra en hebreo el ámbito subterráneo de los muertos y se deja transliterado para no restringir el sentido.
    reason: lexical_alternative
  - marker: b
    text: O “hice que el Líbano se oscureciera por causa de él”. El verbo hebreo puede expresar causar tinieblas o penumbra, en consonancia con la imaginería de duelo del verso.
    reason: lexical_alternative
  - marker: c
    text: O “se desmayaron por causa de él”.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: el Señor Yahvé
  alternatives_spanish:
  - el Señor Dios
  - el Señor Yahveh
  lexicon: HALOT
  rationale: El hebreo combina el título אֲדֹנָי con el nombre divino יְהוִה. En español, 'Señor Yahvé' preserva ambos elementos sin crear la repetición artificial que produciría 'Señor SEÑOR' o una sustitución por 'SEÑOR'.
- source_word: בְּיוֹם רִדְתּוֹ שְׁאוֹלָה
  english_pob_choice: On the day he went down to Sheol
  chosen_spanish: En el día que descendió a Seol
  alternatives_spanish:
  - El día de su descenso a Seol
  - Cuando descendió a Seol
  lexicon: HALOT
  rationale: Se mantiene 'Seol' transliterado para conservar el concepto hebreo del reino de los muertos sin reducirlo a 'sepulcro' ni cargarlo con asociaciones posteriores de 'infierno'.
- source_word: הֶאֱבַלְתִּי
  english_pob_choice: I caused mourning
  chosen_spanish: yo hice duelo
  alternatives_spanish:
  - yo causé duelo
  - yo hice que hubiera duelo
  lexicon: HALOT
  rationale: El valor causativo del hifil se expresa de forma natural en español con 'hacer duelo'. 'Causé duelo' suena menos idiomático; 'hice duelo' comunica la acción causativa con dignidad y concisión.
- source_word: כִּסֵּתִי עָלָיו אֶת תְּהוֹם
  english_pob_choice: I covered the deep because of him
  chosen_spanish: cubrí el abismo por causa de él
  alternatives_spanish:
  - cubrí el abismo a causa de él
  - cubría el abismo por él
  lexicon: HALOT
  rationale: '''Tehóm'' se vierte como ''abismo'' para conservar la imagen de las aguas primordiales/profundas. La preposición עַל se entiende causalmente, por lo que ''por causa de él'' mantiene el sentido idiomático observado en el POB inglés.'
- source_word: וָאֶמְנַע נַהֲרוֹתֶיהָ
  english_pob_choice: and I restrained its rivers
  chosen_spanish: e hice que se detuvieran sus ríos
  alternatives_spanish:
  - y detuve sus ríos
  - y contuve sus ríos
  lexicon: HALOT
  rationale: מנע expresa restricción/retención. 'Hice que se detuvieran' conserva el efecto causativo y suena natural en español, manteniendo el vínculo con las aguas del abismo.
- source_word: וַיִּכָּלְאוּ מַיִם רַבִּים
  english_pob_choice: and the many waters were stopped
  chosen_spanish: y las muchas aguas quedaron detenidas
  alternatives_spanish:
  - y las muchas aguas fueron retenidas
  - y se cerraron las muchas aguas
  lexicon: HALOT
  rationale: El pasivo/niphal comunica que las aguas quedaron impedidas o cerradas. 'Quedaron detenidas' preserva la imagen de suspensión sin introducir una interpretación ajena.
- source_word: וָאַקְדִּר עָלָיו לְבָנוֹן
  english_pob_choice: I made Lebanon grow dark because of him
  chosen_spanish: Por causa de él oscurecí el Líbano
  alternatives_spanish:
  - Por causa de él hice oscurecer el Líbano
  - Oscurecí el Líbano por causa de él
  lexicon: HALOT
  rationale: קדר en hifil expresa causar oscuridad o luto. 'Oscurecí el Líbano' conserva la imagen y en español permite una lectura poética equivalente; el orden inicial 'Por causa de él' mantiene el valor causal del hebreo y del POB.
- source_word: וְכָל עֲצֵי הַשָּׂדֶה
  english_pob_choice: and all the trees of the field
  chosen_spanish: y todos los árboles del campo
  alternatives_spanish:
  - y cada árbol del campo
  lexicon: HALOT
  rationale: Se mantiene el colectivo imagístico del hebreo y del inglés POB sin explicitar más allá del texto.
- source_word: עָלָיו עֻלְפֶּה
  english_pob_choice: fainted because of him
  chosen_spanish: desfallecieron por causa de él
  alternatives_spanish:
  - swooned because of him
  - se desmayaron por causa de él
  lexicon: HALOT
  rationale: עֻלְפֶּה comunica languidez o desfallecimiento. 'Desfallecieron' conserva el matiz de debilidad poética mejor que un simple 'se desmayaron', y corresponde al campo semántico de duelo y abatimiento.
theological_decisions:
- issue: Renderizado de Seol
  english_pob_reading: Sheol
  chosen_spanish_reading: Seol
  alternative_spanish_readings:
  - sepulcro
  - el reino de los muertos
  - infierno
  rationale: Se conserva el término técnico hebreo para no estrechar el sentido a una tumba física ni desplazarlo a nociones posteriores de condenación; así se respeta el mundo conceptual del profeta.
  doctrine_reference: Translation philosophy §1, §3
- issue: Lenguaje de duelo cósmico
  english_pob_reading: Retained as poetic-cosmic judgment language without over-allegorizing
  chosen_spanish_reading: Mantenido como lenguaje poético de duelo y juicio, sin convertirlo en paráfrasis explicativa
  alternative_spanish_readings:
  - lectura puramente literal de catástrofe ambiental
  - explicación alegórica completa en el texto principal
  rationale: La personificación del abismo, el Líbano y los árboles forma parte del oráculo. La traducción preserva esa imaginería sin apagarla ni explicarla de más.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve what the source text says without importing interpretation'
translation_notes:
  revision_awareness: Se siguió el pasaje hebreo de WLC y el rastro de auditoría en inglés POB; no hay revisiones aplicadas en el registro fuente y se mantuvo la lectura aprobada de alta concordancia, con ajuste natural al español para el valor causativo y el paralelismo poético.
  spanish_consistency_notes:
  - Se usa 'Seol' de forma transliterada para mantener consistencia con el término técnico hebreo.
  - Se mantiene 'Yahvé' según el estándar del proyecto para יהוה.
  - Se evita 'SEÑOR' como máscara del nombre divino, excepto en el título compuesto 'el Señor Yahvé' que preserva ambos elementos.
  - '''Abismo'', ''Líbano'' y ''árboles del campo'' conservan el simbolismo del original sin reinterpretación doctrinal.'
  - Se prefirió 'desfallecieron' en el texto principal para un registro poético-natural; la nota recoge la alternativa 'se desmayaron'.
