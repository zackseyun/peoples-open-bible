id: GEN.18.31
reference: Genesis 18:31
source:
  edition: WLC
  text: וַ/יֹּ֗אמֶר הִנֵּֽה נָ֤א הוֹאַ֨לְתִּי֙ לְ/דַבֵּ֣ר אֶל אֲדֹנָ֔/י אוּלַ֛י יִמָּצְא֥וּ/ן שָׁ֖ם עֶשְׂרִ֑ים וַ/יֹּ֨אמֶר֙ לֹ֣א אַשְׁחִ֔ית בַּ/עֲב֖וּר הָֽ/עֶשְׂרִֽים־־׃
translation:
  text: Then he said[a], “See now, I have undertaken to speak to my Lord. Perhaps twenty will be found there.” And he said[b], “I will not destroy it for the sake of the twenty.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “I have presumed to speak to my Lord.”
    reason: lexical_alternative
  - marker: b
    text: Or 'Please, see,'.
    reason: previous_rendering
lexical_decisions:
- source_word: הִנֵּה נָא
  chosen: Please, see
  alternatives:
  - Please behold
  - Look, please
  - Please
  lexicon: HALOT
  rationale: The combination is a polite attention-getting expression. 'Please, see' preserves both particles without sounding overly archaic; 'behold' would be too formal for the project's readable modern English aim.
- source_word: הוֹאַלְתִּי
  chosen: I have ventured
  alternatives:
  - I have undertaken
  - I have presumed
  - I have begun
  lexicon: HALOT
  rationale: In this context of Abraham's deferential speech, the verb conveys daring or taking the liberty to speak. 'I have ventured' captures the humility and risk better than the flatter 'begun' or the harsher 'presumed'.
- source_word: לְדַבֵּר אֶל אֲדֹנָי
  chosen: to speak to my Lord
  alternatives:
  - to speak to my lord
  - to address my Lord
  lexicon: HALOT
  rationale: The phrase is straightforward. 'Speak to' is the most direct rendering. אֲדֹנָי here refers to the divine interlocutor in the narrative, so 'my Lord' is capitalized as a title rather than rendered as a mere human 'lord'.
- source_word: אוּלַי
  chosen: Perhaps
  alternatives:
  - Maybe
  - Suppose
  lexicon: HALOT
  rationale: '''Perhaps'' best matches the tentative, respectful tone of Abraham''s intercession.'
- source_word: יִמָּצְאוּן שָׁם עֶשְׂרִים
  chosen: twenty will be found there
  alternatives:
  - there will be found twenty there
  - twenty are found there
  lexicon: HALOT
  rationale: The Niphal of מצא is naturally passive here. 'Will be found there' is idiomatic English and preserves the passive sense.
- source_word: לֹא אַשְׁחִית
  chosen: I will not destroy it
  alternatives:
  - I will not destroy
  - I will not ruin it
  lexicon: HALOT
  rationale: The verb שׁחת in the Hiphil here refers to destroying the city/region under discussion. English idiom benefits from supplying 'it' as the understood object, referring back to Sodom/the place under consideration.
- source_word: בַּעֲבוּר
  chosen: for the sake of
  alternatives:
  - because of
  - on account of
  lexicon: HALOT
  rationale: '''For the sake of'' best conveys the intercessory logic: the twenty righteous would be the reason for sparing the place.'
- source_word: הָעֶשְׂרִים
  chosen: the twenty
  alternatives:
  - twenty
  lexicon: HALOT
  rationale: The Hebrew includes the article. English can retain it naturally in the closing clause, highlighting the specific number under discussion.
