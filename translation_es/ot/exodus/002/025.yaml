revisions:
- from: Dios vio a los hijos de Israel[a], y Dios se dio por enterado[b].
  to: Dios vio a los hijos de Israel[a], y Dios supo[b].
  rationale: Se reemplaza «se dio por enterado» por «supo» para conservar la tersura y la tensión teológica del hebreo וידע sin introducir un modismo coloquial ni una interpretación demasiado estrecha. Se corrige la nota a para que ofrezca una alternativa real y preserve la literalidad documentada. Se ajusta la nota b para reflejar con más precisión la literalidad hebrea y mantener como alternativas las expansiones interpretativas ya presentes en la auditoría inglesa.
