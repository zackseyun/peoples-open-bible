translation:
  language: es
  text: Cuando se calientan[a], se desvanecen; cuando hace calor[b], se secan en su lugar[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se extinguen» para ambos verbos de desaparición/secado; la imagen hebrea mezcla el desaparecer con el apagarse.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «en su calor»; también puede traducirse «en el calor».
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: «de su lugar»; esto puede referirse más específicamente al cauce o canal en el contexto.'
    reason: cultural_note
lexical_decisions:
- source_word: בְּעֵת
  english_pob_choice: When
  chosen_spanish: Cuando
  alternatives_spanish:
  - Al tiempo que
  - En el tiempo en que
  lexicon: HALOT
  rationale: La partícula temporal introduce una cláusula de tiempo; «Cuando» es la equivalencia natural en español y conserva la relación temporal sin rigidez.
- source_word: יְזֹרְבוּ
  english_pob_choice: they are warmed
  chosen_spanish: se calientan
  alternatives_spanish:
  - se calientan
  - se ponen cálidos
  - son calentados
  lexicon: HALOT
  rationale: El verbo raro expresa volverse caliente o calentarse. En español, «se calientan» reproduce bien el proceso y mantiene la imagen sin forzar una pasiva artificial.
- source_word: נִצְמָתוּ
  english_pob_choice: they vanish
  chosen_spanish: se desvanecen
  alternatives_spanish:
  - desaparecen
  - se extinguen
  - se esfuman
  lexicon: HALOT
  rationale: El nifal comunica acabar, desaparecer o quedar destruido. «Se desvanecen» conserva la idea de desaparición progresiva y encaja con el paralelismo poético.
- source_word: בְּחֻמּוֹ
  english_pob_choice: when it is hot
  chosen_spanish: cuando hace calor
  alternatives_spanish:
  - en su calor
  - en el calor
  - cuando está caliente
  lexicon: HALOT
  rationale: La forma literalmente dice «en su/his calor», pero el contexto natural es ambiental. «Cuando hace calor» expresa la condición climática con claridad y evita una ambigüedad impropia en español.
- source_word: נִדְעֲכ֥וּ
  english_pob_choice: they dry up
  chosen_spanish: se secan
  alternatives_spanish:
  - se agotan
  - se extinguen
  - se resecan
  lexicon: HALOT
  rationale: En un contexto de corrientes estacionales, el verbo se entiende concretamente como secarse. «Se secan» comunica la imagen hídrica con más precisión que una traducción orientada al fuego como «se extinguen».
- source_word: מִמְּקוֹמָם
  english_pob_choice: from their place
  chosen_spanish: de su lugar
  alternatives_spanish:
  - de su sitio
  - de su cauce
  - de su canal
  lexicon: HALOT
  rationale: «Lugar» es la correspondencia formal directa. «De su lugar» mantiene la formulación amplia del hebreo; «cauce/canal» sería una interpretación más específica que el texto no obliga a adoptar.
translation_notes:
  revision_awareness: El pasaje coincide en alto grado con el audit trail inglés (puntuación, paralelismo y doble imagen de calentarse/secarse). Se conservó la ambigüedad del hebreo en la primera mitad y se optó por una segunda mitad más natural en español, sin introducir una interpretación que no esté respaldada por el contexto. No se aplicaron revisiones posteriores.
  spanish_consistency_notes:
  - Se mantuvo «Dios/Yahvé» fuera del versículo porque no aparece en el texto.
  - Se evitó «SEÑOR» y otras sustituciones litúrgicas ajenas al hebreo aquí.
  - 'La secuencia verbal conserva el paralelismo poético: calentarse / desvanecerse; hacer calor / secarse y desaparecer.'
  - El pronombre posesivo singular en «su calor» sigue la ambigüedad del hebreo, aunque el sentido contextual sea impersonal.
