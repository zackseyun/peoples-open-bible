translation:
  language: es
  text: Así hará expiación[c] por[a] el santuario, a causa de las impurezas de los hijos de Israel[b] y de sus transgresiones, por todos sus pecados; y así hará también por la tienda de reunión, que habita con ellos en medio de sus impurezas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por el lugar santo». En este contexto ritual, הַקֹּדֶשׁ puede referirse al santuario o al lugar santo.
    reason: lexical_alternative
  - marker: b
    text: O «los israelitas» para «los hijos de Israel».
    reason: lexical_alternative
  - marker: c
    text: «Hará expiación» también puede expresarse como «purgará» o «limpiará» en este contexto del Día de la Expiación, ya que el rito trata tanto con la impureza como con el pecado.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכִפֶּר
  english_pob_choice: he shall make atonement
  chosen_spanish: hará expiación
  alternatives_spanish:
  - hará atonamiento
  - purificará
  lexicon: HALOT
  rationale: כפר en este contexto levítico describe la acción ritual que trata con culpa e impureza. «Hará expiación» conserva el valor cultual-teológico clásico y es natural en español bíblico; «purificará» o «limpiará» reducirían el alcance del rito, y «atonamiento» suena poco idiomático.
- source_word: הַקֹּדֶשׁ
  english_pob_choice: the sanctuary
  chosen_spanish: el santuario
  alternatives_spanish:
  - el lugar santo
  - el lugar santísimo
  lexicon: HALOT
  rationale: Aquí הַקֹּדֶשׁ se refiere al ámbito sagrado del santuario en el contexto ritual, no a una abstracción de santidad. «Santuario» comunica bien esa realidad en español moderno y evita restringirlo indebidamente a un solo compartimento.
- source_word: מִטֻּמְאֹת
  english_pob_choice: because of the uncleannesses
  chosen_spanish: a causa de las impurezas
  alternatives_spanish:
  - por las impurezas
  - a causa de las inmundicias
  lexicon: HALOT
  rationale: La preposición מִן expresa aquí motivo o causa de la expiación. «A causa de» refleja esa relación con claridad. «Impurezas» preserva el campo ritual; «inmundicias» sería más antiguo y menos neutral.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Se mantiene la forma masculina plural del hebreo. «Hijos de Israel» es fiel, transparente y consistente con la decisión inglesa de conservar la referencia corporativa sin neutralizarla.
- source_word: וּמִפִּשְׁעֵיהֶם
  english_pob_choice: and because of their transgressions
  chosen_spanish: y de sus transgresiones
  alternatives_spanish:
  - y de sus rebeliones
  - y de sus ofensas
  lexicon: HALOT
  rationale: פשע connota transgresión grave, incluso rebelión. «Transgresiones» conserva la seriedad moral sin añadir una intensificación que el contexto no exija necesariamente; el paralelismo con los demás términos favorece esta solución.
- source_word: לְכָל חַטֹּאתָם
  english_pob_choice: for all their sins
  chosen_spanish: por todos sus pecados
  alternatives_spanish:
  - por todos sus delitos
  - con respecto a todos sus pecados
  lexicon: HALOT
  rationale: חטאות aquí se entiende naturalmente como «pecados», no como «sacrificios por el pecado». «Por todos sus pecados» mantiene el sentido global del paralelismo con impurezas y transgresiones. Se usa «pecados» en lugar de un singular abstracto para conservar la pluralidad hebrea en español fluido.
- source_word: וְכֵן יַעֲשֶׂה
  english_pob_choice: and so he shall do
  chosen_spanish: y así hará también
  alternatives_spanish:
  - y del mismo modo hará
  - y así lo hará
  lexicon: HALOT
  rationale: La expresión introduce una acción ritual paralela. «Y así hará también» conserva la fuerza procedimental y evita un calco excesivo; el «también» queda ligado al complemento siguiente, mostrando la correspondencia con la segunda acción.
- source_word: לְאֹהֶל מוֹעֵד
  english_pob_choice: for the tent of meeting
  chosen_spanish: por la tienda de reunión
  alternatives_spanish:
  - para la tienda de reunión
  - por el tabernáculo
  lexicon: HALOT
  rationale: Se prefiere «tienda de reunión» porque reproduce el nombre hebreo de manera directa y transparente. «Tabernáculo» sería tradicional, pero menos auditable como correspondencia del sintagma original.
- source_word: הַשֹּׁכֵן אִתָּם
  english_pob_choice: that dwells with them
  chosen_spanish: que habita con ellos
  alternatives_spanish:
  - que mora con ellos
  - que reside con ellos
  lexicon: HALOT
  rationale: שׁכן conserva la idea de habitar/residir. «Habita con ellos» mantiene la cercanía relacional y la referencia a la presencia divina asociada a la tienda de reunión, sin forzar una paráfrasis.
- source_word: בְּתוֹךְ טֻמְאֹתָם
  english_pob_choice: in the midst of their uncleannesses
  chosen_spanish: en medio de sus impurezas
  alternatives_spanish:
  - entre sus impurezas
  - en medio de sus inmundicias
  lexicon: HALOT
  rationale: La frase subraya la presencia del santuario entre un pueblo ritualmente impuro. «En medio de» preserva la metáfora espacial; «impurezas» conserva el registro ritual y es más natural que una pluralidad abstracta pesada en español.
theological_decisions:
- issue: Alcance de כפר en el rito del Día de la Expiación
  english_pob_reading: Render with 'make atonement' rather than a narrower purification-only gloss
  chosen_spanish_reading: «Hará expiación» en lugar de una glosa limitada a «purificará»
  alternative_spanish_readings:
  - purificará
  - limpiará
  rationale: El versículo une impureza y pecado en relación con el santuario. «Hará expiación» conserva el valor cultual completo del acto sin reducirlo a una sola faceta purificadora. En español, «expiación» permite mantener la tensión entre culpa e impureza que el contexto requiere.
  doctrine_reference: Translation philosophy §1, §5
- issue: Forma masculina plural de בְּנֵי יִשְׂרָאֵל
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - el pueblo de Israel
  rationale: Se conserva la forma del hebreo, que es gramaticalmente masculina y corporativa. La elección no pretende excluir, sino reflejar con fidelidad la formulación fuente y su valor auditivo en el texto ritual.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: 'No se registraron revisiones posteriores que alteren la lectura de este versículo; el último pase indicó alta concordancia y ningún cambio necesario. La redacción española sigue el mismo punto de decisión del inglés POB: mantener la terminología cultual («expiación», «santuario», «tienda de reunión») y la pluralidad ritual de «impurezas/pecados».'
  spanish_consistency_notes:
  - Se conserva «tienda de reunión» para אֹהֶל מוֹעֵד, coherente con la terminología auditada del POB en español.
  - Se mantiene la pluralidad de «impurezas» y «pecados» para reflejar los plurales hebreos, evitando singularizaciones innecesarias.
  - «Hijos de Israel» sigue la decisión de preservar la forma masculina plural del original sin neutralización.
  - La nota sobre הַקֹּדֶשׁ se ancla en el sustantivo «santuario», que es el equivalente usado en el texto principal.
