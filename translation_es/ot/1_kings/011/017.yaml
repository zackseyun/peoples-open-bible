  glossary_alignment: No hay conflicto con la terminología base del proyecto. 'Siervos' es aceptable para עַבְדֵי en este contexto narrativo. No aparecen términos teológicos sensibles. La transliteración 'Hadad' y 'Egipto' están bien.
