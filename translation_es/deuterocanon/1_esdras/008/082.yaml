translation:
  language: es
  text: y no tomen sus hijas para sus hijos[a], y no busquen paz con ellos todos sus días, para que, habiéndose fortalecido, coman los bienes de la tierra y la hereden.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, con mayor amplitud a la luz del paralelo hebreo: «no busquen su paz ni su prosperidad para siempre».'
    reason: alternative_reading
lexical_decisions:
- source_word: λάβητε
  english_pob_choice: take
  chosen_spanish: toméis
  alternatives_spanish:
  - caséis con
  - toméis en matrimonio
  lexicon: BDAG
  rationale: El griego dice literalmente ‘tomar’; en este contexto matrimonial, ‘toméis sus hijas para vuestros hijos’ conserva la forma del original y sigue siendo natural en español, sin introducir una paráfrasis más explícita que el texto no exige.
- source_word: θυγατέρας αὐτῶν ... τοῖς υἱοῖς ὑμῶν
  english_pob_choice: their daughters for your sons
  chosen_spanish: sus hijas para vuestros hijos
  alternatives_spanish:
  - las hijas de ellos para vuestros hijos
  - sus hijas para sus hijos
  lexicon: BDAG
  rationale: Mantengo la relación posesiva y el contraste entre ‘sus’ y ‘vuestros’ que está en el griego. ‘Para vuestros hijos’ reproduce la dirección del objeto dativo sin sobreexplicar el tipo de unión.
- source_word: ζητήσετε
  english_pob_choice: seek
  chosen_spanish: busquéis
  alternatives_spanish:
  - procuréis
  - tratéis de buscar
  lexicon: BDAG
  rationale: ‘Buscar’ es el equivalente directo y conserva el alcance amplio de la prohibición. En español, ‘buscar paz’ resulta claro y no fuerza una lectura más técnica de la que ofrece el griego.
- source_word: εἰρηνεῦσαι τὰ πρὸς αὐτούς
  english_pob_choice: peace with them
  chosen_spanish: paz con ellos
  alternatives_spanish:
  - su paz y prosperidad
  - su bienestar
  - estar en paz con ellos
  lexicon: BDAG
  rationale: La expresión griega es condensada. ‘Paz con ellos’ reproduce esa concisión y deja espacio a la nota para la lectura más plena sugerida por el paralelo hebreo, sin borrar la tensión lexical entre paz, bienestar y relación favorable.
- source_word: τὸν ἅπαντα χρόνον
  english_pob_choice: all your days
  chosen_spanish: durante todo el tiempo
  alternatives_spanish:
  - todos vuestros días
  - para siempre
  lexicon: BDAG
  rationale: ‘Durante todo el tiempo’ comunica el valor continuo e ininterrumpido de la prohibición. Evita convertir la frase en una fórmula idiomática más concreta que el griego no impone.
- source_word: ἵνα ἰσχύσαντες
  english_pob_choice: having become strong
  chosen_spanish: habiéndoos fortalecido
  alternatives_spanish:
  - cuando os hayáis fortalecido
  - habiendo cobrado fuerza
  lexicon: BDAG
  rationale: La forma participial queda bien reflejada con ‘habiéndoos fortalecido’, que conserva el valor anterior o concomitante del participio y su matiz de hacerse fuertes o prevalecer.
- source_word: φάγητε τὰ ἀγαθὰ τῆς γῆς
  english_pob_choice: you may eat the good things of the land
  chosen_spanish: comáis los bienes de la tierra
  alternatives_spanish:
  - comáis lo bueno de la tierra
  - disfrutéis de los bienes de la tierra
  - comáis el fruto de la tierra
  lexicon: BDAG
  rationale: ‘Los bienes de la tierra’ conserva el sustantivo amplio ἀγαθά y evita restringirlo sólo a productos agrícolas. En español suena más natural y abarcador que ‘las buenas cosas’ sin perder el sentido de prosperidad y sustento.
- source_word: κατακληρονομήσητε
  english_pob_choice: inherit it
  chosen_spanish: la heredéis
  alternatives_spanish:
  - la poseáis como herencia
  - la recibáis en herencia
  lexicon: BDAG
  rationale: ‘Heredéis’ mantiene el campo semántico de la herencia y deja implícito el objeto, la tierra, como en el griego. Es breve, bíblico y fiel al carácter pactal del verbo compuesto.
theological_decisions:
- issue: Relación con el paralelo hebreo de Esdras 9:12, que amplía la idea de ‘buscar paz’ hacia paz o prosperidad/bienestar
  english_pob_reading: Translate the extant Greek directly while allowing the Hebrew parallel to clarify the idiom behind 'seek peace with them.'
  chosen_spanish_reading: Traducir directamente el griego con ‘paz con ellos’ y conservar en nota la posibilidad más plena de ‘paz o prosperidad/bienestar’.
  alternative_spanish_readings:
  - ‘no busquéis su paz ni su prosperidad’
  - ‘no busquéis llevaros bien con ellos’
  rationale: El texto griego es la base primaria, pero el paralelo hebreo ayuda a entender la amplitud del veto. La redacción principal no resuelve esa tensión expandiendo demasiado el verso; la nota preserva la lectura alternativa sin ocultar el matiz histórico-lingüístico.
  doctrine_reference: 'PHILOSOPHY.md: usar paralelos hebreos para iluminar el griego sin desplazarlo; DOCTRINE.md: preservar tensiones textuales relevantes'
- issue: Alcance temporal de τὸν ἅπαντα χρόνον
  english_pob_reading: all your days
  chosen_spanish_reading: durante todo el tiempo
  alternative_spanish_readings:
  - todos vuestros días
  - para siempre
  rationale: La frase apunta a una prohibición prolongada e integral. ‘Durante todo el tiempo’ evita introducir una expresión demasiado idiomática o absoluta si el lector percibiera una carga filosófica más fuerte que la del griego.
  doctrine_reference: 'PHILOSOPHY.md: equivalencia óptima con control del alcance semántico; DOCTRINE.md: no eliminar la fuerza exhortativa del texto'
translation_notes:
  revision_awareness: Se atendió la revisión más reciente del audit trail respecto de τὸν ἅπαντα χρόνον. En español se optó por una solución que expresa continuidad sin imponer una fórmula más idiomática que pudiera desplazar la fuerza del griego. También se corrigió el anclaje de la nota para que el marcador [a] aparezca exactamente en el texto principal.
  spanish_consistency_notes:
  - Se conserva ‘Yahvé’ sólo cuando el texto lo requiera explícitamente; este versículo no lo contiene.
  - ‘Paz con ellos’ mantiene la ambigüedad útil entre paz relacional y bienestar, sin añadir ‘prosperidad’ al cuerpo principal.
  - ‘Bienes de la tierra’ evita reducir ἀγαθά a mera producción agrícola.
  - La forma verbal ‘habiéndoos fortalecido’ respeta el participio griego y el movimiento lógico hacia el resultado final.
