id: JHN.7.53
reference: John 7:53
source:
  edition: robinson-pierpont-2005-byzantine
  text: Καὶ ἐπορεύθη ἕκαστος εἰς τὸν οἶκον αὐτοῦ.
  language: Greek
translation:
  text: And[a] each went to his own home.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: This verse begins the story of the woman caught in adultery (John 7:53–8:11).
      The entire passage is absent from the earliest Greek manuscripts (including
      3rd-century papyri and the 4th-century Sinaiticus and Vaticanus) as well as
      early Coptic and Syriac translations. It is present in the 5th-century Codex
      Bezae, the Latin tradition, and the later Byzantine majority tradition. In some
      manuscripts, the story floats to different positions (such as after John 21:25
      or Luke 21:38)—clear evidence of an originally independent oral tradition incorporated
      into the textual stream. It is preserved here due to its theological and pastoral
      belovedness across 1500 years of Christian reading.
    reason: textual_critical
lexical_decisions:
- source_word: πορεύομαι
  chosen: went
  alternatives:
  - departed
  - proceeded
  lexicon: BDAG
  rationale: The verb indicates movement or travel; in the context of a dispersed
    gathering, 'went' is the most natural English rendering for ἐπορεύθη.
- source_word: ἕκαστος
  chosen: each
  alternatives:
  - everyone
  - each one
  lexicon: BDAG
  rationale: A singular pronoun emphasizing the individual dispersal of the crowd
    or council.
- source_word: οἶκος
  chosen: home
  alternatives:
  - house
  - household
  lexicon: BDAG
  rationale: While literally 'house', the phrase 'εἰς τὸν οἶκον αὐτοῦ' is the standard
    Greek idiom for returning 'home'.
