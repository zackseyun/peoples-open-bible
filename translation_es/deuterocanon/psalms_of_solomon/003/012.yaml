translation:
  language: es
  text: Añadió pecados sobre pecados a su vida.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: προσεθήκεν
  english_pob_choice: added
  chosen_spanish: añadió
  alternatives_spanish:
  - sumó
  - agregó
  lexicon: BDAG
  rationale: Aoristo de προστίθημι en sentido de añadir. «Añadió» conserva el valor verbal básico y el movimiento acumulativo sin sobreexplicar.
- source_word: ἁμαρτίας ἐφʼ ἁμαρτίαις
  english_pob_choice: sins upon sins
  chosen_spanish: pecados sobre pecados
  alternatives_spanish:
  - pecado sobre pecado
  - pecados encima de pecados
  lexicon: BDAG
  rationale: El griego usa plural para intensificar la acumulación; por eso se mantiene el plural en español. «Sobre» comunica la imagen de apilamiento y preserva el paralelismo repetido del original.
- source_word: τῇ ζωῇ αὐτοῦ
  english_pob_choice: in his life
  chosen_spanish: a su vida
  alternatives_spanish:
  - en su vida
  - durante su vida
  lexicon: BDAG
  rationale: El dativo aquí funciona naturalmente como el término al que se añade la acumulación; en español, «a su vida» conserva mejor esa relación directa que una paráfrasis temporal o meramente locativa.
translation_notes:
  revision_awareness: Se siguió la revisión aprobada que insiste en conservar el plural de ἁμαρτίας ἐφʼ ἁμαρτίαις y en reflejar el valor dativo de τῇ ζωῇ αὐτοῦ como complemento de destino/relación, evitando la singularización previa.
  spanish_consistency_notes:
  - Se mantuvo el plural «pecados» para no perder la intensificación deliberada del texto griego.
  - Se evitó el término «SEÑOR» u otras equivalencias no presentes en este versículo.
  - El ritmo breve y directo corresponde al carácter sentencioso del fragmento.
