translation:
  language: es
  text: 'Así dice el Señor Yahvé a Tiro: ¿No temblarán las costas[a] al sonido de tu caída, cuando giman los heridos[b], cuando se lleve a cabo la matanza en medio de ti?'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «islas». El término hebreo puede designar islas o, de forma más amplia, costas y regiones marítimas.
    reason: lexical_alternative
  - marker: b
    text: O «los muertos» o «los caídos». El hebreo puede referirse al herido, al herido de muerte o al caído; aquí «los heridos» armoniza mejor con el gemido.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: Yahvé, el Señor
  alternatives_spanish:
  - el Señor Yahvé
  - el Señor Dios
  lexicon: HALOT
  rationale: 'En español, la combinación conserva los dos títulos divinos: el nombre propio Yahvé y el título אדני como «el Señor». No se usa «SEÑOR» como máscara, porque el proyecto pide reflejar directamente el nombre divino. «Yahvé, el Señor» reproduce la fuerza del compuesto sin redundancia impropia.'
- source_word: לְצוֹר
  english_pob_choice: to Tyre
  chosen_spanish: a Tiro
  alternatives_spanish:
  - contra Tiro
  - para Tiro
  lexicon: HALOT
  rationale: Tiro es el nombre propio de la ciudad; en este contexto profético, la preposición española natural para el destinatario del oráculo es «a».
- source_word: הֲלֹא
  english_pob_choice: Will not
  chosen_spanish: ¿No
  alternatives_spanish:
  - ¿Acaso no
  - ¿No es verdad que
  lexicon: HALOT
  rationale: La partícula abre una pregunta retórica que espera afirmación; «¿No» conserva esa fuerza interrogativa de modo natural en español.
- source_word: מִקּוֹל
  english_pob_choice: at the sound of
  chosen_spanish: al sonido de
  alternatives_spanish:
  - a causa del sonido de
  - por el sonido de
  lexicon: HALOT
  rationale: La preposición con «voz/sonido» expresa el disparador de la reacción. «Al sonido de» suena idiomático en español y mantiene la relación causal/ocasional.
- source_word: מַפַּלְתֵּךְ
  english_pob_choice: your fall
  chosen_spanish: tu caída
  alternatives_spanish:
  - tu derrumbe
  - tu ruina
  lexicon: HALOT
  rationale: «Caída» traduce con fidelidad el sustantivo y preserva la imagen profética breve y directa. «Ruina» es posible, pero desplaza un poco la imagen física.
- source_word: בֶּאֱנֹק חָלָל
  english_pob_choice: when the wounded groan
  chosen_spanish: cuando giman los heridos
  alternatives_spanish:
  - cuando giman los muertos y heridos
  - cuando giman los atravesados
  lexicon: HALOT
  rationale: El contexto une el gemido con la condición de חָלָל; «los heridos» mantiene el campo semántico de daño corporal y evita la tensión de hacer «gimir» a quienes ya están muertos, aunque la palabra hebrea puede abarcar también al caído o muerto.
- source_word: בֵּהָרֵג הֶרֶג
  english_pob_choice: when the slaughter is carried out
  chosen_spanish: cuando la matanza se haga
  alternatives_spanish:
  - cuando se ejecute la matanza
  - cuando ocurra la matanza
  lexicon: HALOT
  rationale: La construcción intensiva hebrea pide una expresión fuerte. «La matanza» refleja el sustantivo repetido y «se haga» mantiene la idea de ejecución/realización del acto sin alargar innecesariamente la frase.
- source_word: בְּתוֹכֵךְ
  english_pob_choice: in your midst
  chosen_spanish: en medio de ti
  alternatives_spanish:
  - dentro de ti
  - en tu interior
  lexicon: HALOT
  rationale: Dirigido a una ciudad personificada en femenino singular, «en medio de ti» es una equivalencia natural y estable en español bíblico para hechos que ocurren dentro de la ciudad.
- source_word: יִרְעֲשׁוּ
  english_pob_choice: quake
  chosen_spanish: temblarán
  alternatives_spanish:
  - se estremecerán
  - se sacudirán
  lexicon: HALOT
  rationale: El verbo expresa sacudida o estremecimiento. «Temblarán» es claro y transmite la conmoción física y emocional que el texto describe.
- source_word: הָאִיִּים
  english_pob_choice: the coastlands
  chosen_spanish: las costas
  alternatives_spanish:
  - las islas
  - las regiones marítimas
  lexicon: HALOT
  rationale: En literatura profética, אִיִּים puede referirse a zonas costeras o marítimas, no sólo a islas. «Las costas» recoge el alcance geográfico amplio y funciona bien en español contemporáneo.
theological_decisions:
- issue: Cómo representar el nombre divino en el título compuesto אֲדֹנָי יְהוִה
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: Yahvé, el Señor
  alternative_spanish_readings:
  - el Señor Yahvé
  - Yahvé el Señor
  rationale: El texto hebreo combina el título de soberanía con el nombre propio divino. En español, «Yahvé, el Señor» preserva ambos elementos sin ocultar el Tetragrama y evita la convención de reemplazarlo por una forma de sigla o versalitas. La coma ayuda a leer dos apelativos coordinados.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
- issue: Sentido de חָלָל en relación con el gemido
  english_pob_reading: the wounded groan
  chosen_spanish_reading: giman los heridos
  alternative_spanish_readings:
  - giman los muertos
  - giman los caídos
  rationale: Aunque חָלָל puede abarcar al herido, al herido de muerte o al caído, el contexto del gemido favorece «heridos». Esa opción conserva la tensión semántica sin afirmar de modo innecesario que ya están muertos.
  doctrine_reference: HALOT s.v. חָלָל; contexto inmediato de Ez 26:15
- issue: Relación entre la «matanza» y su ejecución en medio de Tiro
  english_pob_reading: the slaughter is carried out in your midst
  chosen_spanish_reading: la matanza se haga en medio de ti
  alternative_spanish_readings:
  - se ejecute la matanza en medio de ti
  - ocurra la matanza en medio de ti
  rationale: La construcción intensiva hebrea subraya la violencia del acto. «Se haga» mantiene la pasividad impersonal y la idea de ejecución efectiva, sin suavizar el contenido judicial/bélico del pasaje.
  doctrine_reference: HALOT s.v. הרג; figura intensiva con cognado
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión aplicada al inglés POB que añadió el artículo definido en «the slaughter»; por eso se refleja explícitamente «la matanza» en español. También se respetó la decisión auditable de traducir יְהוָה por un nombre divino explícito, en vez de la convención inglesa de «LORD/GOD».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה conforme al criterio del proyecto.
  - Se evita «SEÑOR» en mayúsculas como sustituto encubridor del nombre divino.
  - «Tiro» sigue el nombre propio castellano habitual para la ciudad fenicia.
  - La imagen de «las costas» conserva el rango semántico amplio de הָאִיִּים sin fijarlo sólo en «islas».
  - La estructura verbal en español busca una cadencia profética natural sin perder la secuencia de pregunta retórica y cláusulas temporales.
