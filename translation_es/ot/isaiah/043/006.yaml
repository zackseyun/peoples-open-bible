  text: אֹמַ֤ר לַ/צָּפוֹן֙ תֵּ֔נִי וּ/לְ/תֵימָ֖ן אַל תִּכְלָ֑אִי הָבִ֤יאִי בָנַ/י֙ מֵ/רָח֔וֹק וּ/בְנוֹתַ֖/י מִ/קְצֵ֥ה הָ/אָֽרֶץ־׃
base_translation:
  language: en
  yaml_path: translation/ot/isaiah/043/006.yaml
  text: I will say to the north[a], ‘Give them up,’ and to the south, ‘Do not hold them back.’ Bring my sons from far away[b], and my daughters from the end of the earth.
  footnotes:
