review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido general del griego y del POB inglés: Judith se levanta de una postura de postración, llama a Abra y baja al lugar donde solía retirarse en sábados y fiestas. Sin embargo, hay una pequeña tensión entre el texto y la propia decisión léxica documentada para εἰς τὸν οἶκον: el griego indica movimiento hacia el interior de la casa, y el español usa «descendió a la casa» en vez de una formulación más claramente ingresiva.'
  spanish_quality_summary: El español es claro, digno y mayormente natural. «Se levantó de su postración», «llamó a su criada Abra» y «durante los días de sus sábados» funcionan bien. No obstante, «descendió a la casa» suena algo menos idiomático y menos preciso que «bajó a la casa» o «descendió a la casa donde…»; además, para reflejar εἰς conviene marcar mejor la entrada al interior. «Fiestas» es legible, aunque «festividades» también sería posible; no requiere cambio.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. No aparecen términos sensibles como Yahvé, Mesías, espíritu, etc. Las decisiones «postración», «criada», «sábados» y «fiestas» concuerdan con el rastro léxico auditado. La nota [b] preserva correctamente el plural de «sábados».
  issues:
  - severity: medium
    issue: εἰς τὸν οἶκον no queda plenamente reflejado en «descendió a la casa».
    rationale: El propio expediente léxico reconoce que εἰς con acusativo indica movimiento hacia dentro de la casa, no meramente hacia ella. En español, una formulación como «bajó a la casa donde…» o «entró en la casa» expresa mejor ese matiz, aunque debe conservarse también el valor de κατέβη ('bajó/descendió').
  - severity: low
    issue: Leve desajuste entre «descendió» y la elección inglesa «went down».
    rationale: «Descendió» es válido y digno, pero «bajó» suena más natural en español narrativo moderno y mantiene bien el movimiento espacial sin elevar innecesariamente el registro.
  revised_spanish_text: Y se levantó de su postración[a] y llamó a su criada Abra, y bajó a la casa donde se alojaba durante los días de sus sábados y durante sus fiestas[b].
  revised_footnotes:
  - marker: a
    text: O «de su caída». El griego puede significar una caída, pero aquí probablemente alude a la postura postrada de Judith en oración o duelo.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «durante los días de sus sábados». El plural puede reflejar una observancia repetida, no solo un sábado singular.
    reason: cultural_note
  revision_rationale: Se ajusta «descendió» a «bajó» para un español más natural y se simplifica «en la cual» a «donde». La revisión mantiene el contenido del borrador pero refleja mejor el movimiento narrativo y evita una formulación algo rígida. Aunque el griego εἰς sugiere entrada al interior, «bajó a la casa donde se alojaba» mejora el conjunto sin sobrecargar la frase.
