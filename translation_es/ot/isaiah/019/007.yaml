translation:
  language: es
  text: Los juncos junto al Nilo[a], junto a la orilla del Nilo, y todo lo sembrado[b] por el Nilo[c] se secará, será arrastrado, y no será más.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘los lugares desnudos / praderas junto al Nilo’. El hebreo עָרוֹת es incierto en este contexto; se traduce como ‘juncos’ porque las frases vecinas sugieren vegetación ribereña.
    reason: lexical_alternative
  - marker: b
    text: O ‘todo lo que se siembra por el Nilo’.
    reason: lexical_alternative
  - marker: c
    text: El hebreo יְאֹר puede significar ‘río’ o ‘canal’, pero en este contexto de Egipto se refiere al Nilo.
    reason: cultural_note
lexical_decisions:
- source_word: עָרוֹת
  english_pob_choice: the reeds
  chosen_spanish: los juncos
  alternatives_spanish:
  - las cañas
  - la vegetación ribereña
  - los juncos de la ribera
  lexicon: HALOT
  rationale: El hebreo es incierto en este contexto. Siguiendo el juicio inglés de que se trata de vegetación de la ribera del río, 'juncos' comunica una planta acuática/ribereña natural en español sin forzar una interpretación abstracta como 'lugares pelados'.
- source_word: יְאֹר
  english_pob_choice: the Nile
  chosen_spanish: el Nilo
  alternatives_spanish:
  - el río
  - el canal
  lexicon: HALOT
  rationale: En este oráculo sobre Egipto, el término refiere al sistema del Nilo, no a un río genérico. 'El Nilo' hace explícito el referente geográfico que el contexto exige.
- source_word: עַל פִּי יְאֹר
  english_pob_choice: along the bank of the Nile
  chosen_spanish: junto a la orilla del Nilo
  alternatives_spanish:
  - al borde del Nilo
  - en la boca del Nilo
  - a la orilla del Nilo
  lexicon: HALOT
  rationale: פֶּה literalmente es 'boca', pero en un modismo espacial con un curso de agua apunta al borde o margen. 'Junto a la orilla del Nilo' preserva el sentido topográfico y suena natural en español.
- source_word: מִזְרַע יְאֹר
  english_pob_choice: every sown field of the Nile
  chosen_spanish: todo lo sembrado por el Nilo
  alternatives_spanish:
  - todo campo sembrado por el Nilo
  - todo lo que se siembra junto al Nilo
  - toda siembra del Nilo
  lexicon: HALOT
  rationale: מִזְרַע puede significar semilla o aquello que está sembrado. El paralelismo con la devastación agrícola favorece una referencia a la producción cultivada; 'todo lo sembrado por el Nilo' conserva esa amplitud y evita estrechar indebidamente el sustantivo.
- source_word: יִיבַשׁ
  english_pob_choice: will dry up
  chosen_spanish: se secará
  alternatives_spanish:
  - se agostará
  - se marchitará
  lexicon: HALOT
  rationale: La idea básica es quedar seco. 'Se secará' es directo y sirve tanto para vegetación como para tierras cultivadas en el contexto del colapso del Nilo.
- source_word: נִדַּף
  english_pob_choice: be driven away
  chosen_spanish: será arrastrado
  alternatives_spanish:
  - será llevado
  - será dispersado
  - será barrido
  lexicon: HALOT
  rationale: La forma pasiva expresa ser llevado o desplazado por una fuerza externa. 'Será arrastrado' mantiene esa sensación de remoción violenta y se adapta bien al encadenamiento con 'se secará'.
- source_word: וְאֵינֶנּוּ
  english_pob_choice: and be no more
  chosen_spanish: y no será más
  alternatives_spanish:
  - y ya no existirá
  - y desaparecerá
  lexicon: HALOT
  rationale: El modismo expresa ausencia o cesación total. 'Y no será más' conserva la fuerza final e idiomática del hebreo sin añadir una paráfrasis interpretativa.
translation_notes:
  revision_awareness: Coincide con el pasaje base y con el audit trail inglés; no se aplicaron revisiones posteriores. Se mantuvo la ambigüedad léxica donde el hebreo la exige, pero se eligió un español natural y públicamente legible.
  spanish_consistency_notes:
  - Se mantuvo 'Nilo' de forma consistente para יְאֹר en este contexto egipcio.
  - Se evitó 'SEÑOR' o equivalentes porque no aparece el tetragrámaton en este verso.
  - '''Se secará'' y ''será arrastrado'' conservan la secuencia verbal de deterioro total antes de la desaparición final.'
  - Las notas al pie respetan la ambigüedad reconocida por el texto fuente y por la POB inglesa.
