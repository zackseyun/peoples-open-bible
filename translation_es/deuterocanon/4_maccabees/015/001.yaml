translation:
  language: es
  text: ¡Oh, razón[a], tirana sobre las pasiones, más anhelada que los hijos, y la devoción a Dios[b] para una madre que los hijos!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego es muy comprimido y retóricamente abrupto. La apertura también puede traducirse: «Oh, razón, tirana sobre las pasiones», entendiendo de otra manera la sintaxis de «de los hijos» en la línea.'
    reason: alternative_reading
  - marker: b
    text: 'O: «la devoción a Dios es más deseable para una madre que los hijos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: λογισμέ
  english_pob_choice: reason
  chosen_spanish: razonamiento
  alternatives_spanish:
  - razón
  - juicio racional
  lexicon: LSJ
  rationale: λογισμός en este contexto de 4 Macabeos apunta a la facultad racional que gobierna y domina; «razonamiento» mantiene ese matiz activo mejor que el sustantivo más estático «razón», y conserva el tono exclamativo dirigido a una potencia interior.
- source_word: τύραννε
  english_pob_choice: tyrant over
  chosen_spanish: tirano de
  alternatives_spanish:
  - señor de
  - ruler de
  lexicon: LSJ
  rationale: τύραννος conserva su fuerza metafórica de dominio severo. En español, «tirano de» reproduce con naturalidad la imagen de gobierno opresivo sobre las pasiones sin suavizarla a «señor» o «dueño».
- source_word: παθῶν
  english_pob_choice: passions
  chosen_spanish: las pasiones
  alternatives_spanish:
  - los deseos
  - las emociones
  - los sufrimientos
  lexicon: LSJ
  rationale: En 4 Macabeos, πάθη es vocabulario filosófico-moral sobre impulsos desordenados. «Las pasiones» es el equivalente más fiel y reconocible en español religioso y ético.
- source_word: ποθεινοτέρα
  english_pob_choice: more longed-for
  chosen_spanish: más anhelado
  alternatives_spanish:
  - más deseable
  - más querido
  - más apetecido
  lexicon: LSJ
  rationale: El comparativo expresa mayor deseo o anhelo. «Más anhelado» conserva esa carga afectiva con una formulación natural en español; «más deseable» sería más neutro y perdería algo de intensidad.
- source_word: εὐσέβεια
  english_pob_choice: godliness
  chosen_spanish: la piedad
  alternatives_spanish:
  - la devoción
  - la reverencia
  - la piedad hacia Dios
  lexicon: LSJ
  rationale: Aunque «piedad» puede sonar más tradicional, aquí recoge bien la devoción leal a Dios y a su ley en contexto judío martirial. Se evita expandir a «hacia Dios» porque el verso ya deja esa relación implícita en el marco literario.
- source_word: μητρὶ τέκνων
  english_pob_choice: to a mother ... than children
  chosen_spanish: para una madre ... que los hijos
  alternatives_spanish:
  - a una madre ... que los hijos
  - para la madre ... que los hijos
  - a una madre ... más que los hijos
  lexicon: LSJ
  rationale: 'El dativo permite una relación de valoración: la piedad es más deseable para una madre que los hijos. «Para una madre» suena natural en español y preserva la comparación sin resolver en exceso la sintaxis comprimida del griego.'
- source_word: τέκνων
  english_pob_choice: children
  chosen_spanish: los hijos
  alternatives_spanish:
  - los niños
  - la descendencia
  - los hijos y las hijas
  lexicon: LSJ
  rationale: τέκνα es un término amplio para hijos/descendencia. «Los hijos» funciona bien en español bíblico y refleja el valor relacional del texto, sin introducir una precisión que el griego no exige.
theological_decisions:
- issue: Cómo renderizar εὐσέβεια en un contexto judío de martirio
  english_pob_reading: godliness
  chosen_spanish_reading: la piedad
  alternative_spanish_readings:
  - la devoción
  - la reverencia
  - la piedad hacia Dios
  rationale: El verso contrapone el apego maternal a los hijos con la fidelidad a Dios. «La piedad» mantiene la carga religiosa y moral sin imponer un tecnicismo posterior; en este contexto, la palabra española sigue siendo comprensible y reverente.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 6
- issue: Cómo conservar la sintaxis abrupta y comprimida del original
  english_pob_reading: Retain the vivid but somewhat abrupt imagery rather than smoothing into paraphrase
  chosen_spanish_reading: Conservar la exclamación y la compresión del griego, sin reordenar en una frase explicativa
  alternative_spanish_readings:
  - ¡Oh, razón, tirana de las pasiones, más deseable que los hijos, y piedad más deseable para una madre que los hijos!
  - ¡Oh, razón, señor de las pasiones, más anhelada que los hijos, y piedad para una madre más que los hijos!
  rationale: El griego es altamente condensado y retórico; por eso la traducción española debe dejar cierta aspereza y no convertir el verso en una explicación fluida. La puntuación mantiene el impulso de la invocación y la comparación.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 3
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión más reciente del inglés POB, que corrigió λογισμός a «reason» y eliminó la asociación indebida de τέκνων con «passions». La redacción española evita repetir ese error sintáctico y refleja la comparación final del verso sin añadir elementos interpretativos no sustentados por el griego.
  spanish_consistency_notes:
  - Se usa «piedad» como equivalente de εὐσέβεια, coherente con el valor devocional del término en 4 Macabeos.
  - Se mantiene «las pasiones» para πάθη, en continuidad con la terminología filosófico-moral del libro.
  - Se preserva la exclamación inicial con «¡Oh,» para reflejar el vocativo griego.
  - Los marcadores de nota se anclan en los puntos donde la sintaxis o el léxico admiten alternativas reales en español.
