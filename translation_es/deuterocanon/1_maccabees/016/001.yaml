translation:
  language: es
  text: Y Juan subió desde Gazara y le informó a Simón, su padre, lo que Cendebeo estaba haciendo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «lo que Cendebeo estaba realizando» o «lo que Cendebeo estaba llevando a cabo». El verbo griego admite la idea de acción continua o de ejecución de un plan.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνέβη
  english_pob_choice: came up
  chosen_spanish: subió
  alternatives_spanish:
  - vino subiendo
  - ascendió
  lexicon: BDAG
  rationale: El verbo griego expresa movimiento ascendente o hacia arriba. En español, «subió» comunica ese sentido de manera natural y directa, sin perder la referencia direccional del original.
- source_word: Γαζάρων
  english_pob_choice: Gazara
  chosen_spanish: Gazara
  alternatives_spanish:
  - Gezer
  - Gazara(s)
  lexicon: LSJ
  rationale: Se conserva la forma helenizada del topónimo, como refleja el texto griego de 1 Macabeos, en lugar de sustituirla por la forma hebrea equivalente.
- source_word: ἀπήγγειλεν
  english_pob_choice: reported
  chosen_spanish: le informó
  alternatives_spanish:
  - le reportó
  - le anunció
  - le comunicó
  lexicon: BDAG
  rationale: El verbo indica transmitir un informe o noticia. «Le informó» mantiene el carácter formal de reporte y suena natural en español contemporáneo.
- source_word: Σίμωνι τῷ πατρὶ αὐτοῦ
  english_pob_choice: to Simon his father
  chosen_spanish: a Simón, su padre
  alternatives_spanish:
  - a Simón, su padre biológico
  - a Simón, el padre de él
  lexicon: Syntactic context
  rationale: La aposición en griego se expresa con claridad en español como «su padre». Se evita una perífrasis torpe y se conserva la identificación relacional sin añadir matices inexistentes.
- source_word: συνετέλει
  english_pob_choice: was doing
  chosen_spanish: estaba haciendo
  alternatives_spanish:
  - estaba realizando
  - estaba llevando a cabo
  - estaba cumpliendo
  lexicon: BDAG
  rationale: El imperfecto señala una acción en curso. La revisión inglesa prefirió «was doing» por naturalidad y amplitud de sentido; en español, «estaba haciendo» reproduce bien esa continuidad sin estrechar indebidamente el campo semántico.
- source_word: Κενδεβαῖος
  english_pob_choice: Cendebeus
  chosen_spanish: Cendebeo
  alternatives_spanish:
  - Kendebeo
  - Cendebeo
  lexicon: LSJ
  rationale: Se adopta una transliteración española habitual del nombre propio, manteniendo visible la forma griega y adaptándola a la ortografía del español.
translation_notes:
  revision_awareness: El audit trail inglés pasó de «was accomplishing» a «was doing» para suavizar el valor de συνετέλει sin perder el aspecto imperfectivo. La versión española sigue esa revisión con una solución igualmente natural, «estaba haciendo», que conserva la continuidad de la acción y deja abierta la amplitud semántica del verbo griego.
  spanish_consistency_notes:
  - Se mantiene «Y» al inicio por coordinación narrativa directa, como en el griego.
  - Se conserva el nombre divino ausente en este verso; no aplica la terminología Yahvé/Dios.
  - La puntuación separa la aposición «Simón, su padre» para facilitar la lectura sin alterar la relación sintáctica.
  - El pie de nota marca la ambigüedad verbal documentada en el aparato inglés y la traslada a opciones españolas equivalentes.
