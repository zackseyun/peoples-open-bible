  text: וַ/יֹּ֣אמֶר אֲלֵי/הֶ֗ם נָחָשׁ֙ הָ/עַמּוֹנִ֔י בְּ/זֹאת֙ אֶכְרֹ֣ת לָ/כֶ֔ם בִּ/נְק֥וֹר לָ/כֶ֖ם כָּל עֵ֣ין יָמִ֑ין וְ/שַׂמְתִּ֥י/הָ חֶרְפָּ֖ה עַל כָּל יִשְׂרָאֵֽל־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/011/002.yaml
  text: 'Nahash the Ammonite said to them[a], “On this condition I will make a treaty with you: by gouging out every right eye of yours[b], I will make it a disgrace upon all Israel.”'
  footnotes:
