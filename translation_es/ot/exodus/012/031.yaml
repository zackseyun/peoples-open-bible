  spanish_quality_summary: El español es claro, digno y mayormente natural. «Levántense, salgan de en medio de mi pueblo… y vayan, sirvan a Yahvé» funciona bien. La principal falla de legibilidad/fidelidad es «lo llamó», que suena gramaticalmente incorrecto frente a dos destinatarios explícitos en el texto fuente. Conviene explicitar «mandó llamar a Moisés y a Aarón» o «llamó a Moisés y a Aarón».
  glossary_alignment: 'Buena alineación con la terminología del proyecto: יְהוָה se vierte como «Yahvé», עִבְדוּ como «sirvan», y «hijos de Israel» preserva el giro fuente. No hay conflicto doctrinal. La nota sobre «de noche / por la noche» es aceptable y no introduce ambigüedad nueva.'
