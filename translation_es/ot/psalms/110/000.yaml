  text: לְ/דָוִ֗ד מִ֫זְמ֥וֹר נְאֻ֤ם יְהוָ֨ה לַֽ/אדֹנִ֗/י שֵׁ֥ב לִֽ/ימִינִ֑/י עַד אָשִׁ֥ית אֹ֝יְבֶ֗י/ךָ הֲדֹ֣ם לְ/רַגְלֶֽי/ךָ׀־׃
base_translation:
  language: en
  yaml_path: translation/ot/psalms/110/000.yaml
  text: Of David[a]. A psalm. Yahweh says to my Lord[c][b], “Sit at my right hand until I make your enemies a footstool for your feet.”
  footnotes:
  - marker: a
    text: Or 'The LORD declares to my lord.' The Hebrew noun introducing the speech can carry the sense of a solemn declaration or oracle.
    reason: lexical_alternative
  - marker: b
    text: Hebrew distinguishes 'the LORD' (YHWH) from 'my lord' (adoni).
    reason: lexical_alternative
  - marker: c
    text: Many English versions read 'for your feet'; some render the idiom more interpretively as 'under your feet.'
    reason: lexical_alternative
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:36:28Z'
    unchanged: false
    changes_summary: 'Completed the verse by adding the omitted main clause and direct speech from the source: ''Yahweh says to my Lord, “Sit at my right hand until I make your enemies a footstool for your feet.”'' Preserved ''Yahweh'' for the divine name and ''Lord'' for adoni.'
translation:
  language: es
  text: 'De David. Un salmo. Yahvé declara[a] a mi señor[b]: «Siéntate a mi derecha, hasta que ponga a tus enemigos como estrado[c] para tus pies».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Yahvé dice a mi señor». El sustantivo hebreo que introduce las palabras puede llevar el sentido de una declaración u oráculo solemne.'
    reason: lexical_alternative
  - marker: b
    text: El hebreo distingue entre el nombre divino «Yahvé» (YHWH) y la expresión «mi señor» (adoni).
    reason: lexical_alternative
  - marker: c
    text: También puede entenderse de forma más interpretativa como «bajo tus pies»; el hebreo usa una imagen idiomática de sometimiento.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְדָוִד
  english_pob_choice: Of David
  chosen_spanish: De David
  alternatives_spanish:
  - Para David
  - Perteneciente a David
  lexicon: לְ + nombre propio
  rationale: El hebreo con לְ puede marcar autoría o dedicación; en español, «De David» conserva la ambigüedad tradicional del encabezado sin forzarla.
- source_word: מִזְמוֹר
  english_pob_choice: A psalm
  chosen_spanish: Un salmo
  alternatives_spanish:
  - Salmo
  - Canto
  lexicon: מִזְמוֹר
  rationale: «Salmo» es el equivalente directo y natural en español para el género del texto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - El SEÑOR
  lexicon: יהוה
  rationale: Se mantiene el nombre divino explícito como «Yahvé», conforme a la convención del proyecto y al valor del hebreo original.
- source_word: לַאדֹנִי
  english_pob_choice: my Lord
  chosen_spanish: mi Señor
  alternatives_spanish:
  - mi señor
  - mi soberano
  lexicon: אדני
  rationale: «Mi Señor» conserva la distinción con Yahvé y reproduce el tratamiento reverencial del poseedor; en español mayúscula es la forma más clara y respetuosa.
- source_word: הֲדֹם לְרַגְלֶיךָ
  english_pob_choice: a footstool for your feet
  chosen_spanish: por estrado de tus pies
  alternatives_spanish:
  - por banquillo para tus pies
  - por escabel de tus pies
  - bajo tus pies
  lexicon: הֲדֹם + רגל
  rationale: «Estrado de tus pies» sigue la imagen idiomática del hebreo y del POB inglés, sin convertirla en una paráfrasis más interpretativa.
theological_decisions:
- issue: Distinción entre el nombre divino y el título de respeto del destinatario
  english_pob_reading: Yahweh says to my Lord
  chosen_spanish_reading: Yahvé dice a mi Señor
  alternative_spanish_readings:
  - Yahvé dice a mi señor
  - El SEÑOR dice a mi señor
  rationale: La redacción española preserva la diferencia entre יהוה y אדני, importante en el salmo y en su recepción bíblica posterior. La mayúscula en «Señor» ayuda a mostrar que no se trata de un señor cualquiera.
  doctrine_reference: Distinción entre el nombre propio de Dios y el título mesiánico/reverencial del destinatario
- issue: Imagen de humillación/enemigos sometidos
  english_pob_reading: make your enemies a footstool for your feet
  chosen_spanish_reading: ponga a tus enemigos por estrado de tus pies
  alternative_spanish_readings:
  - ponga a tus enemigos bajo tus pies
  - haga de tus enemigos un escabel para tus pies
  rationale: «Por estrado de tus pies» conserva la metáfora concreta del hebreo y evita reinterpretar prematuramente la imagen como mera derrota abstracta.
  doctrine_reference: Lenguaje poético de sometimiento real, no necesariamente literalista
translation_notes:
  revision_awareness: 'El texto fuente y el audit trail inglés muestran que el encabezado hebreo debía completarse con la cláusula principal: «Yahweh says to my Lord, “Sit at my right hand until I make your enemies a footstool for your feet.”» La versión española incorpora esa cláusula completa y conserva la distinción lexical y teológica entre יהוה y אדני.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יהוה y «Señor» para אדני, siguiendo el estándar del proyecto.
  - Se traduce el género literario como «Un salmo» para un español natural y fiel.
  - La puntuación y comillas angulares siguen la norma española y preservan la direct speech del original.
  - Se evita reemplazar la imagen poética por una explicación interpretativa, salvo la nota opcional sobre la alternativa «bajo tus pies».
