translation:
  language: es
  text: Un hombre que se desvía del camino del entendimiento descansará en la asamblea de los muertos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las sombras»; hebreo רְפָאִים (Refaím), término usado en la literatura sapiencial para los muertos o difuntos.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָדָם
  english_pob_choice: A man
  chosen_spanish: Un hombre
  alternatives_spanish:
  - Una persona
  - La humanidad
  lexicon: HALOT
  rationale: El hebreo usa un sustantivo singular masculino con fuerza proverbial y representativa. «Un hombre» conserva ese valor genérico-singular en español, sin volver la sentencia demasiado abstracta.
- source_word: תּוֹעֶה
  english_pob_choice: who wanders
  chosen_spanish: que se desvía
  alternatives_spanish:
  - que anda errante
  - que se aparta
  - que anda extraviado
  lexicon: HALOT
  rationale: El participio describe a alguien en estado de desviación del camino. «Se desvía» reproduce bien la imagen del camino y sugiere un apartarse continuo, con naturalidad en español.
- source_word: מִדֶּרֶךְ
  english_pob_choice: from the way
  chosen_spanish: del camino
  alternatives_spanish:
  - de la senda
  - de la ruta
  lexicon: HALOT
  rationale: En Proverbios, «camino» preserva el término sapiencial para el curso de vida o conducta. Es la opción más fiel y natural en español.
- source_word: הַשְׂכֵּל
  english_pob_choice: of understanding
  chosen_spanish: del entendimiento
  alternatives_spanish:
  - de la prudencia
  - de la sabiduría
  - del discernimiento
  lexicon: HALOT
  rationale: El sustantivo apunta a comprensión perspicaz o prudente. «Entendimiento» mantiene el registro sapiencial y evita reducir el matiz a una sola cualidad técnica.
- source_word: בִּקְהַל
  english_pob_choice: in the assembly
  chosen_spanish: en la asamblea
  alternatives_spanish:
  - en la congregación
  - entre la compañía
  lexicon: HALOT
  rationale: קהל designa un grupo reunido. «Asamblea» conserva el sentido corporativo sin cargar el texto con un matiz eclesiástico más específico que el hebreo.
- source_word: רְפָאִים
  english_pob_choice: the dead
  chosen_spanish: de los muertos
  alternatives_spanish:
  - de las sombras
  - de los difuntos
  - de los Refaítas
  lexicon: HALOT
  rationale: En este dicho sapiencial, רְפָאִים se refiere a los muertos en el ámbito del Seol. «Los muertos» comunica la idea con claridad; «sombras» queda como alternativa más literal y de matiz subterráneo.
- source_word: יָנוּחַ
  english_pob_choice: will come to rest
  chosen_spanish: descansará
  alternatives_spanish:
  - reposará
  - quedará en reposo
  - se asentará
  lexicon: HALOT
  rationale: 'El verbo expresa reposo o asentarse. Aquí, por el contexto, el “descanso” es irónico y final: acabar entre los muertos. «Descansará» es breve, natural y suficientemente fiel al resultado verbal.'
theological_decisions:
- issue: Sentido de רְפָאִים en un dicho sapiencial
  english_pob_reading: the dead
  chosen_spanish_reading: los muertos
  alternative_spanish_readings:
  - las sombras
  - los Refaítas
  - los difuntos
  rationale: La advertencia no apunta a una etnia antigua sino al destino de la persona que abandona el camino del entendimiento. Traducirlo como «los muertos» hace explícito el sentido del contexto; la nota conserva la alternativa más literal «sombras» y el término hebreo como trasfondo léxico.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: 'El texto base en inglés sigue la lectura confirmada del hebreo: un proverbio en paralelo simple, sin revisiones textuales relevantes en el pasaje. La decisión principal en español fue mantener el término sapiencial «camino» y resolver רְפָאִים con una traducción clara en el cuerpo del texto, dejando la alternativa más literal en nota.'
  spanish_consistency_notes:
  - Se mantuvo el singular proverbial («Un hombre») para conservar el valor representativo del hebreo.
  - Se evitó «congregación» para no introducir de forma innecesaria un tono eclesial.
  - «Descansará» recoge el valor verbal de reposo, pero el contexto lo vuelve una conclusión ominosa, no de paz.
  - La nota usa «sombras» como alternativa literal coherente con el audit trail inglés.
