  source_alignment_summary: El borrador conserva bien la estructura causal doble de כִּי ... כִּי, el movimiento a Judá y Jerusalén, y la exclusión de los levitas del servicio sacerdotal. También acierta al usar «Yahvé» para יהוה. Sin embargo, la cláusula final «los habían rechazado de servir como sacerdotes para Yahvé» suena poco natural en español y no refleja de la mejor manera la fuerza de מן + infinitivo de כהן, que aquí expresa exclusión/impedimento del ejercicio sacerdotal.
  spanish_quality_summary: El texto es mayormente claro y digno, pero «rechazado de servir» es una construcción poco idiomática. «Excluido de servir como sacerdotes para Yahvé» o «les impidieron servir...» sería más natural. Además, en este contexto cultual «ministros como sacerdotes» no es necesario; «servir como sacerdotes» es suficientemente claro. El resto del verso lee bien en español eclesial general.
  glossary_alignment: 'Buena alineación general con el glosario del proyecto: יהוה → «Yahvé» correctamente; אֲחֻזָּתָם → «sus posesiones» aceptable; מִגְרְשֵׁיהֶם → «sus tierras de pasto» defendible y apoyado por nota. La principal mejora es ajustar הִזְנִיחָם מִכַּהֵן a una formulación española más fiel y natural: «los habían excluido de servir como sacerdotes para Yahvé».'
  issues:
  - severity: medium
    issue: 'Construcción no idiomática: «los habían rechazado de servir»'
    rationale: En español estándar esta combinación resulta forzada. El hebreo expresa exclusión del ejercicio sacerdotal; «los habían excluido de servir como sacerdotes» comunica mejor tanto el sentido como la naturalidad.
  - severity: low
    issue: La nota b ya preserva una alternativa mejor que el texto principal
    rationale: La alternativa en la nota («los habían excluido de ministrar...») refleja mejor el hebreo que el texto principal actual, lo que indica que el principal debería ajustarse para no dejar la mejor opción relegada a nota.
