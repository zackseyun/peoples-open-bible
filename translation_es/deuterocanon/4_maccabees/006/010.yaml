translation:
  language: es
  text: Y como un noble atleta[a], aunque era golpeado, el anciano iba derrotando a los que lo torturaban.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «tal como un bravo atleta, mientras era golpeado, seguía venciendo a quienes lo torturaban».'
    reason: lexical_alternative
lexical_decisions:
- source_word: καθάπερ
  english_pob_choice: like
  chosen_spanish: como
  alternatives_spanish:
  - tal como
  - así como
  lexicon: LSJ
  rationale: Introduce una comparación directa y natural en español, manteniendo el valor de símil sin añadir explicación interpretativa.
- source_word: γενναῖος
  english_pob_choice: noble
  chosen_spanish: noble
  alternatives_spanish:
  - valiente
  - bravo
  lexicon: LSJ
  rationale: Conserva el tono elevado y moral del griego, no solo la idea de valentía física.
- source_word: ἀθλητής
  english_pob_choice: athlete
  chosen_spanish: atleta
  alternatives_spanish:
  - competidor
  - campeón
  lexicon: LSJ
  rationale: Mantiene la imagen atlética literal del texto, importante para la metáfora de victoria en el martirio.
- source_word: τυπτόμενος
  english_pob_choice: though being beaten
  chosen_spanish: aunque era golpeado
  alternatives_spanish:
  - mientras era golpeado
  - aunque estaba siendo golpeado
  lexicon: LSJ
  rationale: La forma participial expresa acción en curso con matiz concesivo; en español, "aunque" comunica bien el contraste con la victoria.
- source_word: ἐνίκα
  english_pob_choice: was defeating
  chosen_spanish: iba derrotando
  alternatives_spanish:
  - vencía
  - seguía venciendo
  lexicon: LSJ
  rationale: El imperfecto sugiere acción continua o repetida; "iba derrotando" preserva ese aspecto durativo y el lenguaje de combate.
- source_word: τοὺς βασανίζοντας
  english_pob_choice: those who were torturing him
  chosen_spanish: a los que lo torturaban
  alternatives_spanish:
  - a sus torturadores
  - a quienes lo atormentaban
  lexicon: LSJ
  rationale: '"Torturaban" refleja el contexto martirial y el verbo griego; se conserva la referencia personal implícita sin sobreexpansión.'
- source_word: ὁ γέρων
  english_pob_choice: the old man
  chosen_spanish: el anciano
  alternatives_spanish:
  - el viejo
  - el hombre anciano
  lexicon: LSJ
  rationale: '"Anciano" es natural y digno en español, y conserva la referencia a la edad sin introducir matiz de oficio como "el anciano" en sentido de cargo eclesial.'
theological_decisions:
- issue: Metáfora del martirio como victoria atlética
  english_pob_reading: Retain the athletic metaphor directly ('noble athlete' and 'was defeating')
  chosen_spanish_reading: Conservar la metáfora atlética de manera directa ('noble atleta' e 'iba derrotando')
  alternative_spanish_readings:
  - Interpretar de forma más libre como 'resistía heroicamente y vencía a sus verdugos'
  rationale: El verso presenta explícitamente el sufrimiento como competencia y victoria; la traducción conserva esa imagen para no diluir la intención retórica y filosófica del autor.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source meaning without paraphrase.'
translation_notes:
  revision_awareness: 'El texto sigue de cerca el griego de Swete 1909 y coincide con el análisis auditado en inglés: simile con καθάπερ, matiz moral de γενναῖος, metáfora atlética de ἀθλητής, acción concesiva de τυπτόμενος, imperfecto durativo de ἐνίκα y el grupo personal de τοὺς βασανίζοντας. No se detectaron revisiones adicionales en el pase más reciente.'
  spanish_consistency_notes:
  - Se usó "Yahvé" solo donde el texto lo requiera; aquí no aparece.
  - Se preservó el registro elevado con vocabulario claro y no arcaizante.
  - '"Atleta" mantiene el campo semántico del griego y la comparación no se espiritualiza ni se explica en exceso.'
  - '"Torturaban" refleja mejor βασανίζοντας que alternativas más suaves como "atormentaban" en este contexto martirial.'
