translation:
  language: es
  text: Dios es para nosotros un Dios de salvaciones[a], y a Yahvé el Señor le pertenecen las vías de escape de la muerte[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «de liberaciones». El plural hebreo puede enfatizar actos de rescate repetidos o múltiples.'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «salidas» u «vías de salida»; aquí el sentido es maneras de escapar de la muerte.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאֵל
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  - el Poderoso
  lexicon: HALOT
  rationale: El hebreo con artículo definido identifica al Dios verdadero de forma específica. En español, 'Dios' es la forma natural y fiel; repetir 'el Dios' suena innecesario, y 'el Poderoso' añade un matiz que el contexto no exige.
- source_word: לָנוּ
  english_pob_choice: to us
  chosen_spanish: para nosotros
  alternatives_spanish:
  - a nosotros
  - por nosotros
  lexicon: HALOT
  rationale: La preposición expresa relación/beneficio. 'Para nosotros' comunica bien la idea de beneficio y suena natural en español en esta construcción predicativa.
- source_word: אֵל
  english_pob_choice: a God
  chosen_spanish: un Dios
  alternatives_spanish:
  - Dios
  - el Dios
  lexicon: HALOT
  rationale: 'Se conserva la repetición nominal del hebreo: ''Dios es para nosotros un Dios...''. ''Un Dios'' refleja el predicado nominal sin diluir el énfasis. No implica politeísmo, sino la construcción hebrea.'
- source_word: לְמוֹשָׁעוֹת
  english_pob_choice: of salvations
  chosen_spanish: de salvaciones
  alternatives_spanish:
  - de liberaciones
  - que salva
  lexicon: HALOT
  rationale: El plural hebreo es significativo y conviene preservarlo. 'Salvaciones' es marcado en español, pero transmite la multiplicidad de rescates; 'liberaciones' es una alternativa idiomática válida.
- source_word: וְלֵיהוָה אֲדֹנָי
  english_pob_choice: and to the Lord GOD
  chosen_spanish: y a Yahvé el Señor
  alternatives_spanish:
  - y al Señor Yahvé
  - y al Señor Dios
  lexicon: HALOT
  rationale: Se conserva Yahvé para יהוה conforme al criterio del proyecto, y se traduce אֲדֹנָי como 'el Señor'. La combinación 'Yahvé el Señor' distingue ambos elementos sin recurrir a la convención de ocultar el nombre divino.
- source_word: לַמָּוֶת
  english_pob_choice: from death
  chosen_spanish: de la muerte
  alternatives_spanish:
  - de muerte
  - desde la muerte
  lexicon: HALOT
  rationale: Aunque la preposición hebrea es ל, en esta construcción idiomática con תּוֹצָאוֹת la relación es la de procedencia o escape respecto de la muerte. 'De la muerte' es la forma más clara y fiel en español.
- source_word: תּוֹצָאוֹת
  english_pob_choice: escapes
  chosen_spanish: las salidas
  alternatives_spanish:
  - las escapatorias
  - los recursos de escape
  - las salidas de escape
  lexicon: HALOT
  rationale: El sustantivo significa literalmente 'salidas' o 'salidas hacia afuera'. En contexto, son las vías de escape de la muerte. 'Salidas' mantiene el sentido básico y la imagen del hebreo, mientras la nota aclara la fuerza idiomática.
theological_decisions:
- issue: Cómo renderizar el nombre divino יהוה junto con אֲדֹנָי
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: Yahvé el Señor
  alternative_spanish_readings:
  - Yahvé Señor
  - el Señor Yahvé
  rationale: El texto hebreo combina el nombre propio de Dios con el título אֲדֹנָי. En español, 'Yahvé el Señor' preserva ambos componentes sin la convención de sustitución por 'SEÑOR'.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
- issue: Preservación del plural 'salvaciones'
  english_pob_reading: a God of salvations
  chosen_spanish_reading: un Dios de salvaciones
  alternative_spanish_readings:
  - un Dios de liberaciones
  - un Dios que salva
  rationale: El plural hebreo puede señalar rescates repetidos o múltiples. Mantenerlo evita suavizar una posible intensificación del texto y respeta la decisión auditada de la POB inglesa.
  doctrine_reference: HALOT on plural nouns with semantic emphasis
translation_notes:
  revision_awareness: La versión inglesa más reciente mantuvo la redacción sin cambios tras revisión; el punto principal de atención fue la combinación del nombre divino con el título אֲדֹנָי y el valor del plural de לְמוֹשָׁעוֹת / תּוֹצָאוֹת. La propuesta española conserva ambos rasgos y explicita la metáfora de 'salidas' con nota.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para יהוה conforme a la política del proyecto.
  - Se mantiene 'Señor' para אֲדֹנָי como título, distinguiéndolo del nombre divino.
  - Se conserva el plural 'salvaciones' en el cuerpo, con alternativa en nota.
  - Se evita 'SEÑOR' como máscara tipográfica, siguiendo la instrucción del proyecto.
  - La sintaxis busca ser bíblica pero natural en español, sin calco rígido del inglés.
