  text: 하나님의 영에 의해 인도함을 받는 사람은 누구든지 그들이 하나님의 아들입니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: πνεύματι θεοῦ
  english_pob_choice: the Spirit of God
  chosen_korean: 하나님의 영
  lexicon: BDAG
  rationale: 8:9 일관.
- source_word: ἄγονται
  english_pob_choice: are led
  chosen_korean: 인도함을 받는
  lexicon: BDAG
  rationale: 수동 현재.
- source_word: υἱοί ... θεοῦ
  english_pob_choice: sons of God
  chosen_korean: 하나님의 아들
  alternatives_korean:
  - 하나님의 자녀
  lexicon: BDAG
  rationale: 본 절은 양자됨(8:15)과 상속자(8:17) 신학의 토대이므로 「아들」 직역 유지 — 1세기 유산 상속의 법적 위상을 보존.
theological_decisions:
- issue: υἱοί를 「아들」로 직역 vs 「자녀」로 포괄적 번역
  chosen_reading: 「하나님의 아들」 직역
  alternative_readings:
  - 「하나님의 자녀」(포용적)
  rationale: υἱοθεσία(양자됨, 8:15, 23) — 1세기 그리스-로마 법에서 「아들」은 상속자 신분의 법적 지위를 의미한다. 「자녀」로 옮기면 그 법적 무게가 약화된다. 8:14-17은 양자됨 → 상속자 논증이므로 「아들」 보존. 다만 8:16의 τέκνα는 「자녀」로 구분.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy; preserve legal/theological weight'
