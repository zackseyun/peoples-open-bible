translation:
  language: es
  text: 'Y muchos de los que duermen en el polvo de la tierra despertarán[a]: estos para vida eterna, y aquellos para oprobios[b], para desprecio eterno[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «multitudes de los que duermen en el polvo de la tierra». El hebreo dice «muchos», no explícitamente «todos».
    reason: alternative_reading
  - marker: b
    text: O «para vergüenza» en lugar de «para oprobios».
    reason: lexical_alternative
  - marker: c
    text: O «para aborrecimiento eterno». Compárese Isaías 66:24, donde aparece una idea relacionada en un contexto de juicio.
    reason: cross_reference
lexical_decisions:
- source_word: רַבִּים
  english_pob_choice: many
  chosen_spanish: muchos
  alternatives_spanish:
  - multitudes
  lexicon: HALOT
  rationale: «Muchos» conserva el sentido directo del hebreo y no expande el alcance a «todos». En español, «multitudes» es posible, pero añade un matiz colectivo que no está explícito en el texto.
- source_word: מִיְּשֵׁנֵי
  english_pob_choice: of those sleeping
  chosen_spanish: de los que duermen
  alternatives_spanish:
  - de los que están durmiendo
  - de los dormidos
  lexicon: HALOT
  rationale: La forma participial mantiene la metáfora de la muerte como sueño. «De los que duermen» es natural en español y conserva esa imagen sin explicarla de más.
- source_word: אַדְמַת עָפָר
  english_pob_choice: the dust of the earth
  chosen_spanish: el polvo de la tierra
  alternatives_spanish:
  - el suelo polvoriento
  - la tierra polvorienta
  lexicon: HALOT
  rationale: «Polvo de la tierra» reproduce bien la imagen hebrea de mortalidad y sepultura. En español suena más fluido que una versión más literal como «suelo de polvo».
- source_word: יָקִיצוּ
  english_pob_choice: will awake
  chosen_spanish: despertarán
  alternatives_spanish:
  - despertarán del sueño
  - se levantarán
  lexicon: HALOT
  rationale: «Despertarán» conserva el paralelismo con «duermen» y expresa la reanimación/resurrección sin introducir otro verbo distinto como «levantarse».
- source_word: אֵלֶּה
  english_pob_choice: these
  chosen_spanish: unos
  alternatives_spanish:
  - estos
  - algunos
  lexicon: HALOT
  rationale: El hebreo contrapone literalmente «estos» y «aquellos/otros». En español, «unos... y otros...» comunica de forma natural el contraste distributivo sin perder la distinción del original.
- source_word: לְחַיֵּי עוֹלָם
  english_pob_choice: to everlasting life
  chosen_spanish: para vida eterna
  alternatives_spanish:
  - para vida perdurable
  - para vida para siempre
  lexicon: HALOT
  rationale: «Vida eterna» es la equivalencia más estable y clara en español para una vida de duración sin fin. «Eterna» comunica el valor de עוֹלָם con naturalidad y precisión.
- source_word: חֲרָפוֹת
  english_pob_choice: reproaches
  chosen_spanish: oprobios
  alternatives_spanish:
  - reproches
  - afrentas
  lexicon: HALOT
  rationale: «Oprobios» preserva el plural y el campo semántico de vergüenza pública, reproche y deshonra. En español bíblico, «reproches» puede sonar más débil; «afrentas» es posible, pero menos exacto al matiz de deshonra.
- source_word: דִרְאוֹן
  english_pob_choice: contempt
  chosen_spanish: desprecio
  alternatives_spanish:
  - contempto
  - aborrecimiento
  lexicon: HALOT
  rationale: El sustantivo raro דִרְאוֹן expresa rechazo/repulsión duradera. «Desprecio» funciona de manera clara en español y mantiene la dureza del juicio; «aborrecimiento» se reserva mejor como alternativa interpretativa cercana al valor tradicional de «abhorrence».
- source_word: עוֹלָם
  english_pob_choice: everlasting
  chosen_spanish: eterno
  alternatives_spanish:
  - perpetuo
  - para siempre
  lexicon: HALOT
  rationale: «Eterno» corresponde bien al valor de duración indefinida de עוֹלָם y permite mantener el paralelismo con «vida eterna» y «desprecio eterno».
theological_decisions:
- issue: Alcance del sujeto en "many"
  english_pob_reading: Translate רַבִּים as 'many' without expanding it to 'all.'
  chosen_spanish_reading: Traducir רַבִּים como «muchos» sin ampliar a «todos».
  alternative_spanish_readings:
  - «multitudes» para enfatizar gran número
  - «todos» como lectura interpretativa
  rationale: El hebreo dice explícitamente «muchos». La traducción debe preservar esa tensión y no resolverla en español como si el texto afirmara de manera directa la totalidad.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
- issue: Naturaleza del destino negativo
  english_pob_reading: Render the second outcome as 'to reproaches, to everlasting contempt.'
  chosen_spanish_reading: Renderizar el segundo destino como «para oprobios, para eterno desprecio».
  alternative_spanish_readings:
  - «para vergüenza y desprecio eterno»
  - «para afrentas y aborrecimiento eterno»
  rationale: El hebreo usa dos términos distintos, uno plural y otro singular, y conviene preservarlos como dos elementos del resultado negativo. «Oprobios» y «desprecio» retienen esa doblez sin aplanarla en una sola idea.
  doctrine_reference: Translation philosophy §1 and §3
translation_notes:
  revision_awareness: La redacción sigue el pasaje hebreo de WLC y el criterio auditado de la POB inglesa, manteniendo «muchos» frente a una expansión a «todos», conservando la metáfora de sueño/despertar y distinguiendo los dos términos del destino negativo. No se detectaron revisiones aplicadas en el pass más reciente; la versión permanece estable.
  spanish_consistency_notes:
  - Se usa «vida eterna» para לְחַיֵּי עוֹלָם y «eterno» para עוֹלָם en la clausula final, manteniendo el paralelismo.
  - «Oprobios» y «desprecio» conservan dos términos diferentes del hebreo para el juicio negativo.
  - Se evita «Cristo», «Señor» u այլ terminología no presente en el texto.
  - La puntuación con dos puntos reproduce adecuadamente la estructura contrastiva del versículo en español.
