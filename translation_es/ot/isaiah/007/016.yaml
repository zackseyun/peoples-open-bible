review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien la estructura principal del hebreo: la cláusula temporal previa al discernimiento del muchacho, el contraste moral entre malo/bueno, y el futuro pasivo sobre la tierra. Sin embargo, omite una nota léxica importante preservada por el POB inglés sobre קָץ מִפְּנֵי, donde el verbo puede implicar no solo temor sino una repulsión/aversión teñida de temor. También ''tú tienes temor'' es más débil y menos idiomático que una formulación verbal directa.'
  spanish_quality_summary: El español es claro y legible, pero 'tú tienes temor' suena algo forzado en registro bíblico-natural. 'Temes' o 'te llenan de temor' sería más fluido. Además, conviene conservar la nota de alternativa léxica para la cláusula relativa, como hace el rastro de auditoría inglés.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. 'el muchacho', 'lo malo', 'lo bueno', 'la tierra' y 'será abandonada' son aceptables. La revisión propuesta mejora la fidelidad contextual de קָץ sin alterar decisiones teológicas ni terminológicas mayores.
  issues:
  - severity: medium
    issue: Falta la nota léxica correspondiente a קָץ מִפְּנֵי
    rationale: El POB inglés conserva explícitamente la ambigüedad entre repulsión y temor en esta cláusula. El español debería preservarla también, porque es una decisión significativa de fuente.
  - severity: medium
    issue: '''tú tienes temor'' es menos idiomático y algo más débil que el sentido contextual'
    rationale: Aunque comunica miedo, no suena tan natural ni tan directo como 'temes', y puede diluir el matiz de temor intenso documentado en la auditoría inglesa.
  revised_spanish_text: Porque antes de que el muchacho sepa rechazar lo malo y escoger lo bueno, la tierra ante cuyos dos reyes temes[b] será abandonada[a].
  revised_footnotes:
  - marker: a
    text: O ‘será dejada’, o ‘quedará desierta’. El pasivo hebreo puede indicar que la tierra quede abandonada o vacía.
    reason: lexical_alternative
  - marker: b
    text: O ‘cuyos dos reyes aborreces por temor’ / ‘ante cuyos dos reyes estás lleno de espanto’. El verbo hebreo puede llevar un sentido de repulsión que en este contexto probablemente refleja temor ante los dos reyes.
    reason: lexical_alternative
  revision_rationale: Se ajusta la cláusula relativa a un español más natural ('temes') y se restaura la nota léxica significativa sobre קָץ מִפְּנֵי, preservando la misma tensión semántica documentada en el POB inglés. El resto del verso puede mantenerse.
