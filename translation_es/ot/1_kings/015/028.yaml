translation:
  language: es
  text: Baasá le dio muerte en el tercer año de Asa, rey de Judá[a], y reinó en su lugar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lo mató». El verbo hebreo es causativo («causó su muerte»), por lo que «le dio muerte» conserva más literalmente ese matiz.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְמִתֵהוּ
  english_pob_choice: put him to death
  chosen_spanish: lo hizo morir
  alternatives_spanish:
  - lo mató
  - lo dio muerte
  lexicon: HALOT
  rationale: El hebreo usa un hifil causativo de מות, por lo que conviene conservar la causatividad. «Lo hizo morir» mantiene ese valor más literalmente que «lo mató», y suena natural en español.
- source_word: בַעְשָׁא
  english_pob_choice: Baasha
  chosen_spanish: Baasá
  alternatives_spanish:
  - Baasa
  - Baashá
  lexicon: Transliteración bíblica estándar
  rationale: Se translitera el nombre propio al español, manteniendo la pronunciación aproximada y la forma reconocible en lectura bíblica.
- source_word: בִּשְׁנַת שָׁלֹשׁ
  english_pob_choice: in the third year
  chosen_spanish: en el tercer año
  alternatives_spanish:
  - durante el tercer año
  lexicon: HALOT
  rationale: La construcción temporal con ב indica marco cronológico; «en el tercer año» reproduce con claridad la fórmula regnal.
- source_word: לְאָסָא מֶלֶךְ יְהוּדָה
  english_pob_choice: of Asa king of Judah
  chosen_spanish: de Asa, rey de Judá
  alternatives_spanish:
  - de Asa, el rey de Judá
  lexicon: HALOT
  rationale: El ל en estas fórmulas señala el punto de referencia cronológica/regnal. En español, «de Asa, rey de Judá» conserva la relación sin añadir una paráfrasis innecesaria.
- source_word: וַיִּמְלֹךְ
  english_pob_choice: and he reigned
  chosen_spanish: y reinó
  alternatives_spanish:
  - y comenzó a reinar
  - y se hizo rey
  lexicon: HALOT
  rationale: El wayyiqtol de מלך en este contexto de sucesión dinástica se expresa naturalmente como «reinó». Mantiene la sobriedad narrativa del hebreo.
- source_word: תַּחְתָּיו
  english_pob_choice: in his place
  chosen_spanish: en su lugar
  alternatives_spanish:
  - en su puesto
  - en lugar de él
  lexicon: HALOT
  rationale: תחת con sufijo expresa sustitución o sucesión. «En su lugar» es la opción más natural en español para una sucesión real y preserva la idea de reemplazo.
theological_decisions:
- issue: Valor causativo del verbo hebreo de muerte
  english_pob_reading: put him to death
  chosen_spanish_reading: lo hizo morir
  alternative_spanish_readings:
  - lo mató
  - lo dio muerte
  rationale: No hay una tensión doctrinal, pero sí una decisión lexical con peso narrativo. Se preserva el matiz causativo del hifil sin perder fluidez en español.
  doctrine_reference: None
translation_notes:
  revision_awareness: La revisión inglesa eliminó el sujeto explícito innecesario en la segunda cláusula («and reigned in his place»). En español también se omite el sujeto explícito, usando simplemente «y reinó en su lugar», lo que sigue con naturalidad la sintaxis hebrea y la lectura revisada del POB.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general, pero este versículo no contiene el tetragrámaton.
  - Se conserva la transliteración de nombres propios y títulos regios con español natural.
  - «Reinó en su lugar» refleja la sucesión sin introducir explicaciones adicionales.
