translation:
  language: es
  text: En el séptimo mes, Ismael hijo de Netanías, hijo de Elisama, de linaje real[b] y uno de los altos oficiales del rey[c], vino con diez hombres a Gedalías hijo de Ahicam, en Mizpa, y comieron allí pan[a] juntos en Mizpa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: ‘comieron pan’, un modismo para compartir una comida.'
    reason: lexical_alternative
  - marker: b
    text: O ‘de descendencia real’ para ‘de linaje real’.
    reason: lexical_alternative
  - marker: c
    text: O ‘uno de los nobles del rey’ para ‘uno de los altos oficiales del rey’.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: Now
  chosen_spanish: En
  alternatives_spanish:
  - Y aconteció
  - Y sucedió
  lexicon: HALOT
  rationale: La fórmula narrativa de transición funciona en español de manera más natural con una construcción temporal directa al iniciar la escena. ‘En’ deja la cronología explícita sin forzar un giro arcaico.
- source_word: בַּחֹדֶשׁ הַשְּׁבִיעִי
  english_pob_choice: in the seventh month
  chosen_spanish: en el séptimo mes
  alternatives_spanish:
  - durante el séptimo mes
  lexicon: HALOT
  rationale: Es una expresión temporal directa y debe mantenerse con claridad cronológica.
- source_word: מִזֶּרַע הַמְּלוּכָה
  english_pob_choice: of the royal line
  chosen_spanish: de linaje real
  alternatives_spanish:
  - de la línea real
  - de descendencia real
  - de la estirpe real
  lexicon: HALOT
  rationale: זֶרַע aquí señala descendencia/linaje, no semilla literal. ‘Linaje real’ conserva la idea dinástica de modo natural en español.
- source_word: וְרַבֵּי הַמֶּלֶךְ
  english_pob_choice: and one of the chief officers of the king
  chosen_spanish: y uno de los altos oficiales del rey
  alternatives_spanish:
  - y uno de los nobles del rey
  - y uno de los principales del rey
  - y uno de los jefes del rey
  lexicon: HALOT
  rationale: El hebreo usa una forma plural colectiva/representativa aplicada a Ismael. ‘Altos oficiales del rey’ reproduce el rango sin sonar forzado en español, y mantiene el matiz de oficialidad cortesana.
- source_word: וַעֲשָׂרָה אֲנָשִׁים אִתּוֹ
  english_pob_choice: with ten men
  chosen_spanish: con diez hombres
  alternatives_spanish:
  - acompañado de diez hombres
  - y diez hombres con él
  lexicon: HALOT
  rationale: La revisión inglesa eliminó la redundancia de ‘with him’; en español también basta ‘con diez hombres’ para expresar acompañamiento de forma idiomática y fiel.
- source_word: אֶל גְּדַלְיָהוּ ... הַמִּצְפָּתָה
  english_pob_choice: to Gedaliah son of Ahikam at Mizpah
  chosen_spanish: a Gedalías hijo de Ahicam, en Mizpa
  alternatives_spanish:
  - hasta Gedalías hijo de Ahicam, en Mizpa
  - a Gedalías hijo de Ahicam, en Mizpá
  lexicon: HALOT
  rationale: La preposición direccional hacia la persona y el lugar se expresa naturalmente con ‘a ... en’. Se conserva el topónimo como nombre propio sin transliterarlo innecesariamente con tilde.
- source_word: וַיֹּאכְלוּ שָׁם לֶחֶם יַחְדָּו
  english_pob_choice: and they ate bread there together
  chosen_spanish: y comieron allí pan juntos
  alternatives_spanish:
  - y comieron allí juntos
  - y comieron allí un pan compartido
  lexicon: HALOT
  rationale: Se mantiene ‘pan’ porque está explícito en el hebreo y el POB inglés lo preserva, pero en español ‘comer pan’ puede sonar menos natural que el calco inglés. ‘Juntos’ expresa la acción comunitaria sin borrar el objeto lexical presente.
- source_word: בַּמִּצְפָּה
  english_pob_choice: in Mizpah
  chosen_spanish: en Mizpa
  alternatives_spanish:
  - en Mizpá
  - en Mizpah
  lexicon: HALOT
  rationale: El lugar se conserva con una forma española estable y readable. La repetición final del topónimo se mantiene porque también está en el hebreo y enfatiza el lugar de la comida.
theological_decisions:
- issue: 'Alcance de זֶרַע הַמְּלוּכָה: descendencia real vs. ‘simiente real’'
  english_pob_reading: of the royal line / Or 'of royal seed'
  chosen_spanish_reading: de linaje real
  alternative_spanish_readings:
  - de simiente real
  - de la estirpe real
  - de descendencia real
  rationale: El POB inglés documenta la alternativa literal ‘royal seed’ pero prefiere la lectura dinástica. En español, ‘linaje real’ conserva la tensión entre descendencia concreta y pertenencia a la casa real sin recurrir a un literalismo extraño.
  doctrine_reference: N/A
- issue: 'Título cortesano וְרַבֵּי הַמֶּלֶךְ: plural de honor/rango aplicado a un individuo'
  english_pob_reading: and one of the chief officers of the king / Or 'one of the king's nobles'
  chosen_spanish_reading: y uno de los altos oficiales del rey
  alternative_spanish_readings:
  - y uno de los nobles del rey
  - y uno de los principales del rey
  rationale: Se preserva el dato social-político del texto sin convertirlo en una categoría eclesiástica o moral. El singular español refleja que la construcción hebrea describe a Ismael como miembro de ese grupo.
  doctrine_reference: N/A
- issue: Idiomatismo de ‘comer pan’ y su relación con la hospitalidad narrativa
  english_pob_reading: and they ate bread there together / Hebrew 'ate bread,' an idiom for sharing a meal.
  chosen_spanish_reading: y comieron allí pan juntos
  alternative_spanish_readings:
  - y comieron allí juntos
  - y compartieron allí una comida
  rationale: La expresión hebrea tiene un valor idiomático de compartir comida, pero ‘pan’ está explícito en el texto. La redacción española conserva el sustantivo y deja claro el sentido relacional de la escena.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: Tomé en cuenta la revisión inglesa más reciente, que eliminó el redundante ‘with him’ después de ‘with ten men’. En español también se evitó esa redundancia mediante ‘con diez hombres’. Además, se preservó el segundo ‘en Mizpa’ porque el hebreo repite el topónimo al final.
  spanish_consistency_notes:
  - Se usa ‘Gedalías’ y ‘Mizpa’ de forma consistente en toda la línea.
  - Se mantiene ‘pan’ para reflejar el léxico explícito del hebreo, aunque el sentido sea idiomático.
  - Se eligió ‘linaje real’ como equivalente natural y transparente de la descendencia regia.
  - ‘Altos oficiales del rey’ comunica rango sin introducir terminología eclesial ni modernizar en exceso el oficio cortesano.
