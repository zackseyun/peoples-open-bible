translation:
  language: es
  text: Con tu sabiduría y con tu entendimiento te hiciste riquezas[a], y pusiste oro y plata en tus tesorerías.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «te hiciste fuerza o poder para ti»; la palabra hebrea puede denotar riqueza, fuerza o recursos, pero aquí la mención de oro, plata y tesorerías favorece «riquezas».
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּחָכְמָתְךָ
  english_pob_choice: By your wisdom
  chosen_spanish: Con tu sabiduría
  alternatives_spanish:
  - Por tu sabiduría
  - Mediante tu sabiduría
  lexicon: HALOT
  rationale: El ב instrumental pide un valor de medio. En español, «con tu sabiduría» expresa ese medio de manera natural y fiel, sin introducir una causalidad más fuerte que el hebreo.
- source_word: וּבִתְבוּנָתְךָ
  english_pob_choice: and by your understanding
  chosen_spanish: y con tu entendimiento
  alternatives_spanish:
  - y con tu inteligencia
  - y con tu discernimiento
  lexicon: HALOT
  rationale: תְּבוּנָה abarca entendimiento, discernimiento o insight. «Entendimiento» preserva el paralelismo con «sabiduría» y evita una sobreespecificación interpretativa.
- source_word: עָשִׂיתָ לְּךָ חָיִל
  english_pob_choice: you made wealth for yourself
  chosen_spanish: te hiciste riquezas
  alternatives_spanish:
  - te hiciste riqueza
  - te hiciste poder
  - te hiciste fuerza
  lexicon: HALOT
  rationale: חָיִל puede significar fuerza, poder, recursos o riqueza. El contexto inmediato de oro, plata y tesoros favorece la lectura económica; en español, «te hiciste riquezas» mantiene el sentido material y el vínculo verbal de עשה sin sonar forzado.
- source_word: וַתַּעַשׂ
  english_pob_choice: you put
  chosen_spanish: metiste
  alternatives_spanish:
  - pusiste
  - guardaste
  - acumulaste
  lexicon: HALOT
  rationale: Aunque el verbo básico es «hacer», aquí el contexto de oro, plata y tesoros exige una expresión idiomática en español para el depósito de metales preciosos. «Metiste» comunica la acción resultante de acumular y almacenar dentro de los tesoros.
- source_word: זָהָב וָכֶסֶף
  english_pob_choice: gold and silver
  chosen_spanish: oro y plata
  alternatives_spanish:
  - oro y plata fina
  lexicon: HALOT
  rationale: Es la equivalencia literal estándar y funciona como par merístico de riqueza preciosa.
- source_word: בְּאוֹצְרוֹתֶיךָ
  english_pob_choice: into your treasuries
  chosen_spanish: en tus tesoros
  alternatives_spanish:
  - en tus almacenes
  - en tus depósitos
  lexicon: HALOT
  rationale: אוֹצָר designa un lugar de almacenamiento de bienes valiosos. «Tesoros» conserva la idea de depósito de riqueza y es natural en español bíblico contemporáneo.
theological_decisions:
- issue: Sentido de חָיִל en el verso
  english_pob_reading: material wealth, with the broader range of strength/power noted in a footnote
  chosen_spanish_reading: riquezas materiales, con nota de que el hebreo también puede significar fuerza, poder o recursos
  alternative_spanish_readings:
  - fuerza
  - poder
  - recursos
  rationale: El contexto inmediato menciona oro, plata y tesoros, así que la lectura principal debe ser económica. La nota preserva la tensión semántica del hebreo sin borrar los otros valores posibles.
  doctrine_reference: Lexical semantics; no doctrinal claim beyond the text
- issue: Relación entre la sabiduría humana del rey y la prosperidad descrita
  english_pob_reading: the verse attributes accumulation to wisdom and understanding without endorsing righteousness
  chosen_spanish_reading: la prosperidad se atribuye a sabiduría y entendimiento humanos, sin implicar aprobación moral
  alternative_spanish_readings:
  - la prosperidad viene de sabiduría
  - la prosperidad proviene de entendimiento
  rationale: El contexto de la profecía es una acusación/taunt contra el rey de Tiro. La redacción española debe conservar el tono descriptivo e irónico del texto, no convertirlo en elogio espiritual.
  doctrine_reference: Contexto profético en Ezequiel 28
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés sin cambios de sentido: se mantuvo la lectura principal de חָיִל como riqueza por el contexto inmediato, y se preservó en nota la tensión semántica de fuerza/poder/recursos. No se detectaron revisiones aplicadas en el pasaje base.'
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto lo requiera; este verso no contiene el Tetragrámaton.
  - Se mantuvo un español sobrio y bíblico contemporáneo, evitando calcos innecesarios como «por medio de» donde «con» reproduce mejor el instrumental hebreo.
  - «Tesoros» se usó para אוֹצָרוֹת por su naturalidad y por conservar el campo semántico de almacenamiento de bienes preciosos.
