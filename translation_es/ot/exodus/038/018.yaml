translation:
  language: es
  text: Y la pantalla[a] para la puerta del atrio era obra de un bordador, en azul, púrpura y carmesí[b], y lino fino torcido, de veinte codos de largo y de cinco codos de alto[c], correspondiente en anchura a las colgaduras del atrio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cortina» para la entrada del atrio.
    reason: lexical_alternative
  - marker: b
    text: Hebreo «azul, púrpura y carmesí»; el texto nombra materiales o tintes textiles, por lo que en español no es necesario añadir «hilo».
    reason: lexical_alternative
  - marker: c
    text: O «cinco codos de alto, por anchura», una expresión dimensional hebrea que probablemente indica que la pantalla igualaba la altura de las colgaduras del atrio.
    reason: alternative_reading
lexical_decisions:
- source_word: מָסַךְ
  english_pob_choice: screen
  chosen_spanish: pantalla
  alternatives_spanish:
  - cortina
  - cobertura
  lexicon: HALOT
  rationale: En el contexto del tabernáculo, el término designa una barrera textil de entrada. «Pantalla» conserva la función de separador/entrada y distingue esta pieza de las «cortinas» del atrio.
- source_word: שַׁעַר
  english_pob_choice: gate
  chosen_spanish: puerta
  alternatives_spanish:
  - entrada
  - portal
  lexicon: HALOT
  rationale: En español, «puerta del atrio» comunica con naturalidad la abertura de acceso. «Puerta» funciona aquí como equivalente espacial de la entrada/gateway del recinto.
- source_word: הֶחָצֵר
  english_pob_choice: courtyard
  chosen_spanish: atrio
  alternatives_spanish:
  - patio
  - patio exterior
  lexicon: HALOT
  rationale: «Atrio» es el término tradicional y claro para el espacio cercado del tabernáculo; evita la ambigüedad de «patio» en un registro cultual.
- source_word: מַעֲשֵׂה רֹקֵם
  english_pob_choice: the work of an embroiderer
  chosen_spanish: obra de un bordador
  alternatives_spanish:
  - trabajo bordado
  - obra de bordado
  lexicon: HALOT
  rationale: La construcción hebrea describe la labor de un artesano textil especializado. «Obra de un bordador» conserva el agente artesanal que el inglés POB destacó.
- source_word: תְּכֵלֶת
  english_pob_choice: blue
  chosen_spanish: azul
  alternatives_spanish:
  - azul teñido
  - azul violáceo
  lexicon: HALOT
  rationale: Se trata del color/material azul del tejido. «Azul» es la forma más natural en español y mantiene la lista cromática sin añadir explicación no requerida por el texto.
- source_word: אַרְגָּמָן
  english_pob_choice: purple
  chosen_spanish: púrpura
  alternatives_spanish:
  - morado
  - violeta
  lexicon: HALOT
  rationale: «Púrpura» preserva el valor tradicional del tinte de lujo en la serie de textiles del tabernáculo.
- source_word: תּוֹלַעַת שָׁנִי
  english_pob_choice: scarlet yarn
  chosen_spanish: carmesí
  alternatives_spanish:
  - escarlata
  - hilo carmesí
  lexicon: HALOT
  rationale: El hebreo nombra material teñido de rojo intenso. En español, «carmesí» transmite bien el color sin forzar la inserción de «hilo»; el contexto textil ya está explícito en la frase.
- source_word: שֵׁשׁ מָשְׁזָר
  english_pob_choice: fine twined linen
  chosen_spanish: lino fino torcido
  alternatives_spanish:
  - lino fino retorcido
  - lino fino trenzado
  lexicon: HALOT
  rationale: La frase hebrea apunta a lino de alta calidad, retorcido/hilado finamente. «Lino fino torcido» mantiene el sentido del material y el procedimiento sin depender de una fórmula inglesa fija.
- source_word: עֶשְׂרִים אַמָּה אֹרֶךְ
  english_pob_choice: twenty cubits long
  chosen_spanish: de veinte codos de largo
  alternatives_spanish:
  - veinte codos de longitud
  - con una longitud de veinte codos
  lexicon: HALOT
  rationale: Se conserva la unidad antigua «codos» y la fórmula dimensional natural en español.
- source_word: קוֹמָה
  english_pob_choice: high
  chosen_spanish: de alto
  alternatives_spanish:
  - de altura
  - alto
  lexicon: HALOT
  rationale: En medidas, «de alto» es la expresión española más idiomática y fiel a la dimensión vertical.
- source_word: בְּרֹחַב
  english_pob_choice: in width
  chosen_spanish: en anchura
  alternatives_spanish:
  - en ancho
  - de ancho
  lexicon: HALOT
  rationale: La preposición hebrea se conserva con «en anchura» para reflejar la relación dimensional del texto, tal como el audit trail inglés preserva la expresión de correspondencia.
- source_word: לְעֻמַּת
  english_pob_choice: corresponding to
  chosen_spanish: correspondiente a
  alternatives_spanish:
  - en correspondencia con
  - en proporción a
  lexicon: HALOT
  rationale: La relación de ajuste/comparación se expresa de forma directa y natural en español.
- source_word: קַלְעֵי הֶחָצֵר
  english_pob_choice: the hangings of the courtyard
  chosen_spanish: las cortinas del atrio
  alternatives_spanish:
  - las colgaduras del atrio
  - los lienzos del atrio
  lexicon: HALOT
  rationale: «Cortinas» es comprensible en español para la pieza textil del recinto; aquí se mantiene la referencia al conjunto perimetral del atrio.
theological_decisions:
- issue: Cómo traducir el final dimensional hebreo de modo fiel sin oscurecer la relación entre la altura y la anchura de la pieza
  english_pob_reading: five cubits high, corresponding in width to the hangings of the courtyard
  chosen_spanish_reading: de cinco codos de alto, correspondiente en anchura a las cortinas del atrio
  alternative_spanish_readings:
  - de cinco codos de alto y en anchura correspondiente a las cortinas del atrio
  - de cinco codos de alto, en correspondencia con las cortinas del atrio
  rationale: El hebreo usa una expresión comparativa que indica ajuste o correspondencia. La redacción elegida mantiene ese vínculo sin introducir una paráfrasis interpretativa excesiva.
  doctrine_reference: Exodo 38:18; cf. descripciones del tabernáculo en Exodo 26–27
translation_notes:
  revision_awareness: 'La versión inglesa revisada ajustó la frase final para reflejar mejor la construcción hebrea: «five cubits high, corresponding in width to the hangings of the courtyard». La traducción española conserva esa corrección con «de cinco codos de alto, correspondiente en anchura a las cortinas del atrio», evitando una lectura torcida del segmento dimensional.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma preferente en el proyecto, pero este versículo no contiene el nombre divino.
  - Se ha preferido «atrio» para הֶחָצֵר por consistencia con el vocabulario cultual del tabernáculo.
  - «Cortinas» se usa para קַלְעֵי en el sentido arquitectónico/textil del recinto, no como cortinaje interior doméstico.
  - La serie de colores se mantiene sin glosas en el cuerpo, y la nota [b] aclara la relación entre los tintes y el tejido.
