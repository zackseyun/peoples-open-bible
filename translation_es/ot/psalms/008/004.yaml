    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: When
  chosen_spanish: Cuando
  alternatives_spanish:
  - Porque
  - Pues
  lexicon: HALOT
  rationale: En este contexto poético, כִּי introduce la circunstancia que da pie a la reflexión del salmista. «Cuando» mantiene el flujo hacia la pregunta implícita del siguiente versículo mejor que una causalidad explícita, y es natural en español.
- source_word: אֶרְאֶה
  english_pob_choice: I look at
  chosen_spanish: miro
  alternatives_spanish:
  - veo
  - contemplo
  lexicon: HALOT
  rationale: El verbo expresa el acto de observar. «Miro» conserva la experiencia inmediata y resulta idiomático en español moderno; «veo» es más neutro y «contemplo» eleva el registro, pero añade un matiz más interpretativo.
- source_word: שָׁמֶיךָ
  english_pob_choice: your heavens
  chosen_spanish: tus cielos
  alternatives_spanish:
  - tu cielo
  - los cielos tuyos
  lexicon: HALOT
  rationale: Se mantiene el plural hebreo en sentido cósmico. «Cielos» preserva la amplitud y el tono elevado del salmo mejor que reducirlo a «cielo» en singular.
- source_word: מַעֲשֵׂי אֶצְבְּעֹתֶיךָ
  english_pob_choice: the work of your fingers
  chosen_spanish: la obra de tus dedos
  alternatives_spanish:
  - la obra de tus dedos manos
  - el trabajo de tus dedos
  - lo que han hecho tus dedos
  lexicon: HALOT
  rationale: Se conserva la imagen antropomórfica de los «dedos» como en el inglés POB, sin suavizarla. «Obra» funciona naturalmente como sustantivo colectivo y evita una calca pesada.
- source_word: יָרֵחַ וְכוֹכָבִים
  english_pob_choice: the moon and the stars
  chosen_spanish: la luna y las estrellas
  alternatives_spanish:
  - luna y estrellas
  - el mes y las estrellas
  lexicon: HALOT
  rationale: La referencia a los astros concretos es clara. Se añade el artículo para naturalidad en español y porque el hebreo los particulariza dentro del panorama celeste.
- source_word: אֲשֶׁר
  english_pob_choice: which
  chosen_spanish: que
  alternatives_spanish:
  - el cual
  - las cuales
  lexicon: HALOT
  rationale: En español, «que» es el relativo más natural y fiel al registro poético sin volverse arcaico.
- source_word: כּוֹנָנְתָּה
  english_pob_choice: you have set in place
  chosen_spanish: has puesto en su lugar
  alternatives_spanish:
  - has establecido
  - has fijado
  - has fundado
  lexicon: HALOT
  rationale: כּוֹנָנְתָּה comunica establecer/afirmar/poner firmemente. «Has puesto en su lugar» expresa la idea de ordenar y colocar los astros de forma natural en español, conservando la fuerza concreta del verbo.
theological_decisions:
- issue: Imágenes antropomórficas de la creación divina
  english_pob_reading: Retain 'your fingers' literally
  chosen_spanish_reading: Conservar «tus dedos» literalmente
  alternative_spanish_readings:
  - tu mano
  - tu obra
  - tu actividad creadora
  rationale: El hebreo usa intencionalmente una imagen antropomórfica. Mantener «tus dedos» respeta la fuerza poética y la cercanía de la acción creadora, sin convertirla en una expresión más abstracta que borre la tensión del original.
  doctrine_reference: Principio de primacía del texto fuente; preservar la imagen salvo necesidad contextual.
translation_notes:
  revision_awareness: El contexto auditado muestra alta concordancia y sin revisiones aplicadas; se mantiene la solución del inglés POB para כִּי como circunstancial, mientras que en español se elige una formulación natural equivalente («Cuando»).
  spanish_consistency_notes:
  - Se mantiene el trato reverencial de segunda persona singular («tus», «has») conforme al hebreo.
  - Se conserva el plural cósmico «cielos» para שָׁמֶיךָ.
  - La secuencia conserva la estructura poética del original sin añadir interpretación doctrinal.
  - El relativo «que» evita rigidez sintáctica y permanece fiel al enlace hebreo.
