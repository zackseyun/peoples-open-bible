translation:
  language: es
  text: 'Cántico de las subidas. Los que confían en Yahvé son como el monte Sion: no será movido[a]; permanece para siempre.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más idiomáticamente: «no será sacudido».'
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁיר הַמַּעֲלוֹת
  english_pob_choice: A Song of Ascents
  chosen_spanish: Cántico de ascenso
  alternatives_spanish:
  - Cántico de ascensiones
  - Canción de ascenso
  lexicon: שִׁיר; מַעֲלָה
  rationale: El hebreo es el encabezado litúrgico tradicional del grupo de Salmos 120–134. «Cántico de ascenso» conserva el sentido del título sin forzar una interpretación más interpretativa que el original. «Canción» suena menos solemne; «ascensiones» suena más extraño en español.
- source_word: הַבֹּטְחִים
  english_pob_choice: Those who trust
  chosen_spanish: los que confían
  alternatives_spanish:
  - los que ponen su confianza
  - los que se apoyan
  lexicon: בָּטַח
  rationale: «Confiar» expresa con claridad la confianza estable y personal del verbo hebreo. Mantiene el plural participial con naturalidad en español.
- source_word: בַּיהוָה
  english_pob_choice: in Yahweh
  chosen_spanish: en Yahvé
  alternatives_spanish:
  - en Yahveh
  - en el SEÑOR
  lexicon: יהוה
  rationale: Se sigue el término POB «Yahvé» para el nombre divino, conforme a la política del proyecto y al texto hebreo. «SEÑOR» ocultaría el nombre propio y no corresponde al criterio pedido.
- source_word: כְּהַר צִיּוֹן
  english_pob_choice: are like Mount Zion
  chosen_spanish: son como el monte Sion
  alternatives_spanish:
  - son como el monte de Sion
  - se asemejan al monte Sion
  lexicon: כְּ + הַר צִיּוֹן
  rationale: La comparación hebrea se conserva de forma directa. «Monte Sion» es una forma bíblica clara y ampliamente inteligible; «de Sion» añade una preposición no necesaria.
- source_word: לֹא יִמּוֹט
  english_pob_choice: it will not be shaken
  chosen_spanish: no será sacudido
  alternatives_spanish:
  - no será movido
  - no vacilará
  lexicon: מוֹט
  rationale: El hebreo usa pasivo/impersonal de inestabilidad física o figurada. «No será sacudido» comunica bien la imagen sin perder la fuerza del original. «No será movido» es más formal, pero en español puede sonar menos natural; «no vacilará» desplaza el campo semántico.
- source_word: לְעוֹלָם יֵשֵׁב
  english_pob_choice: it abides forever
  chosen_spanish: permanece para siempre
  alternatives_spanish:
  - habita para siempre
  - se sienta para siempre
  lexicon: יָשַׁב; לְעוֹלָם
  rationale: «Permanece para siempre» transmite el estado duradero exigido por el contexto y evita una literalidad extraña con «sentarse». «Habita» sería posible, pero en español puede sugerir residencia más que permanencia estable.
theological_decisions:
- issue: Nombre divino explícito frente a una sustitución reverencial
  english_pob_reading: Those who trust in Yahweh
  chosen_spanish_reading: Los que confían en Yahvé
  alternative_spanish_readings:
  - Los que confían en el Señor
  - Los que confían en Dios
  rationale: El hebreo contiene יהוה y el proyecto pide reproducirlo como «Yahvé» en el texto principal. Sustituirlo por «Señor» borraría un rasgo textual importante.
  doctrine_reference: Tetragrammaton / divine name policy
- issue: Valor de la comparación y de la permanencia de Sion
  english_pob_reading: 'are like Mount Zion: it will not be shaken; it abides forever'
  chosen_spanish_reading: 'son como el monte Sion: no será sacudido; permanece para siempre'
  alternative_spanish_readings:
  - son como el monte Sion, que no será sacudido y permanece para siempre
  - son como el monte Sion, el cual no será sacudido y permanece para siempre
  rationale: La comparación se deja abierta tal como en el hebreo, con la estabilidad de Sion como imagen de la firmeza de quienes confían en Yahvé. Se mantiene la tensión poética entre similitud e inmovilidad duradera.
  doctrine_reference: Poetic simile and covenantal stability
translation_notes:
  revision_awareness: 'Tomé en cuenta la revisión más reciente que completó el texto más allá del encabezamiento y ajustó la sintaxis de la comparación. El español sigue esa estructura: encabezado, comparación con «como», y dos afirmaciones consecutivas de firmeza y permanencia.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estándar del nombre divino en el texto principal.
  - Se evita «Señor» como sustituto automático del Tetragrámaton.
  - «Monte Sion» conserva el nombre bíblico establecido y la imagen poética del hebreo.
  - La puntuación reproduce la secuencia comparativa del original sin sobreexplicar la relación entre sujeto e imagen.
