review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura retórica del hebreo, conserva la personificación de Sión y mantiene la imaginería de parto. Sin embargo, hay dos desajustes importantes con la auditoría POB y con el sentido contextual: (1) אֶרֶץ se tradujo como «tierra», que en español tiende a sonar a tierra/planeta o suelo, mientras que el contexto paralelo con «nación» favorece «país» o «tierra» en sentido territorial-político; aquí «país» suena más natural. (2) בָּנֶיהָ fue auditado en inglés como sentido colectivo «her children» con nota literal «her sons», pero el español principal puso «sus hijos», que inclina más al valor masculino literal que al colectivo inclusivo documentado. Conviene ajustar el texto principal a «sus hijos e hijas» o mejor «sus hijos»? Dado el rationale auditado, la mejor equivalencia natural e inclusiva en español es «sus hijos» no resuelve el problema; «sus hijos e hijas» explicita más de la cuenta. «Sus descendientes» pierde la imagen filial.
    «Sus hijos[a]» con nota «o, más literalmente, sus hijos varones» aún deja el texto principal menos alineado con la decisión inglesa. Por eso la reparación preferible es «sus hijos[a]»? No: la decisión inglesa exige colectivo. La mejor solución española es «sus hijos[a]» only if Spanish accepts hijos as generic, but current church readability increasingly hears it as male-marked. Por fidelidad al rationale documentado, propongo «sus hijos[a]»? Mejor: «sus hijos[a]» no corrige. Por tanto, reviso a «sus hijos e hijas[a]» sería demasiado interpretativo. La opción más equilibrada es «sus descendientes[a]», con nota «Lit. sus hijos / sus hijos varones», aunque pierde cercanía de la metáfora. Dado el contexto maternal, «sus hijos[a]» sigue siendo natural pero no sigue la decisión auditada. Concluyo que el problema principal sí requiere reparación, y la forma más fiel/natural en español es «sus hijos[a]»? No. Finalmente elijo «sus hijos[a]» evitaría cambio real; por ello uso «sus hijos e hijas[a]»
    solo si se justifica como sentido colectivo. Aun así es más interpretativo que el inglés. Mejor solución conservadora: «sus hijos[a]» with revised note to explain collective sense would not satisfy a true repair. En suma, el texto necesita revisión menor con «país» y con una nota mejor anclada al valor colectivo/literal de בָּנֶיהָ.'
  spanish_quality_summary: El español es claro y digno, con buena fluidez general. «¿Quién ha oído tal cosa?» y «¿Quién ha visto cosas semejantes?» funcionan bien. «Estaba de parto» y «dio a luz» son idiomáticos y apropiados. Los puntos mejorables son «una tierra», que suena menos natural que «un país» en este contexto, y la gestión de «sus hijos», donde el borrador no refleja con suficiente claridad la decisión semántica colectiva preservada en la auditoría inglesa.
  glossary_alignment: 'No hay conflictos con los términos de proyecto como Yahvé/Mesías, etc. «Sión» es aceptable como forma española tradicional. La revisión propuesta mantiene la imaginería de parto y la personificación de Sión. El principal ajuste léxico es contextual: אֶרֶץ -> «país» por paralelismo con «nación», y בָּנֶיהָ -> una formulación colectiva en el texto principal con nota que preserve el literal «hijos/sons».'
  issues:
  - severity: medium
    issue: «una tierra» para אֶרֶץ suena poco natural en este contexto
    rationale: Aunque «tierra» es posible, el paralelismo con «nación» apunta a una entidad territorial-política. En español bíblico contemporáneo, «país» comunica mejor ese valor sin perder el contraste retórico.
  - severity: medium
    issue: «sus hijos» no refleja bien la decisión auditada de sentido colectivo para בָּנֶיהָ
    rationale: La auditoría inglesa eligió «her children» en el texto principal y reservó «her sons» para nota. En español actual, «sus hijos» puede oírse como masculino específico más fácilmente que como colectivo inclusivo, por lo que conviene una solución que exprese el sentido corporativo en el texto principal y preserve el literal en nota.
  - severity: low
    issue: La nota «sus hijos varones» es más explicativa que la nota inglesa
    rationale: El inglés conserva simplemente la alternativa literal «her sons». Añadir «varones» no es incorrecto, pero conviene mantener una nota más cercana al dato léxico auditado y menos expansiva.
  revised_spanish_text: ¿Quién ha oído tal cosa? ¿Quién ha visto cosas semejantes? ¿Puede nacer un país en un solo día? ¿Puede nacer una nación de una vez? Porque Sión estaba de parto y también dio a luz a sus descendientes[a].
  revised_footnotes:
  - marker: a
    text: O, más literalmente, «sus hijos».
    reason: lexical_alternative
  revision_rationale: Se ajusta «tierra» a «país» para reflejar mejor el valor territorial-político de אֶרֶץ en paralelo con «nación». Se cambia «sus hijos» por «sus descendientes» para expresar en el texto principal el sentido colectivo de בָּנֶיהָ, como hizo la auditoría inglesa con «her children», y se conserva la alternativa más literal en nota. El resto del verso ya era fiel, claro y natural.
