translation:
  language: es
  text: En el año de la muerte del rey Uzías, vi al Señor sentado sobre un trono, alto y levantado, y el borde[a] de su manto llenaba el templo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «su cola» o «la orla de su manto».'
    reason: lexical_alternative
  - marker: b
    text: Hebreo hekal puede significar «palacio» o «templo»; aquí «templo» encaja con la visión del santuario celestial.
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּשְׁנַת מוֹת
  english_pob_choice: In the year of ... death
  chosen_spanish: En el año de la muerte de ...
  alternatives_spanish:
  - En el año en que ... murió
  - En el año de la muerte de ...
  lexicon: HALOT
  rationale: El hebreo usa una construcción temporal nominal que marca el momento de la visión. En español, «En el año de la muerte de...» conserva bien la relación constructa y suena natural sin añadir explicaciones.
- source_word: הַמֶּלֶךְ עֻזִּיָּהוּ
  english_pob_choice: King Uzziah
  chosen_spanish: el rey Uzías
  alternatives_spanish:
  - el rey Uzzías
  - el rey Uzías, quien reinaba
  lexicon: HALOT
  rationale: El título y el nombre propio se mantienen de forma directa. «Uzías» es la forma usual y clara en español bíblico moderno.
- source_word: וָאֶרְאֶה
  english_pob_choice: I saw
  chosen_spanish: vi
  alternatives_spanish:
  - y vi
  - entonces vi
  lexicon: HALOT
  rationale: El wayyiqtol narra la experiencia del profeta en pasado simple. En español, el conector no es necesario para la fluidez y «vi» comunica la acción de modo directo.
- source_word: אֶת אֲדֹנָי
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Maestro
  - el Señor
  lexicon: HALOT
  rationale: Aquí אֲדֹנָי funciona como título divino, no como nombre del pacto. En español, «el Señor» expresa esa dignidad reverente y preserva la lectura visionaria del texto.
- source_word: יֹשֵׁב
  english_pob_choice: seated
  chosen_spanish: sentado
  alternatives_spanish:
  - sentado
  - entronizado
  lexicon: HALOT
  rationale: El participio describe la postura del Señor en el trono. «Sentado» es la forma más natural; «entronizado» explicita la imagen, pero va más allá de la forma verbal.
- source_word: עַל כִּסֵּא
  english_pob_choice: on a throne
  chosen_spanish: sobre un trono
  alternatives_spanish:
  - en un trono
  - sobre un trono
  lexicon: HALOT
  rationale: La imagen de entronización se conserva con «sobre un trono», que suena natural en español y mantiene la idea de elevación y dominio.
- source_word: רָם וְנִשָּׂא
  english_pob_choice: high and lifted up
  chosen_spanish: alto y exaltado
  alternatives_spanish:
  - alto y levantado
  - elevado y exaltado
  lexicon: HALOT
  rationale: La pareja hebrea expresa altura e intensificación de honor. «Alto y exaltado» mantiene la doble fuerza semántica; «levantado» podría sonar menos idiomático en español moderno.
- source_word: שׁוּלָיו
  english_pob_choice: the hem of his robe
  chosen_spanish: el borde de su manto
  alternatives_spanish:
  - el dobladillo de su manto
  - la orla de su manto
  - el borde de su manto
  lexicon: HALOT
  rationale: שׁוּלַיִם alude al extremo o borde de una prenda. «Borde de su manto» es claro y respetuoso del concreto visual; «orla» o «dobladillo» serían posibles, pero menos transparentes para lectores amplios.
- source_word: מְלֵאִים אֶת הַהֵיכָל
  english_pob_choice: filled the temple
  chosen_spanish: llenaba el templo
  alternatives_spanish:
  - llenaba el templo
  - llenaba el palacio
  - estaba llenando el templo
  lexicon: HALOT
  rationale: Aunque el inglés POB usa una construcción de pasado simple, el hebreo presenta un participio plural que describe el estado/resultante continuo del borde del manto. «Llenaba» refleja mejor ese valor aspectual y mantiene la escena visionaria. «Templo» sigue la decisión auditada para הֵיכָל en este contexto.
theological_decisions:
- issue: Título divino אֲדֹנָי en una visión del trono
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - el Maestro
  - Señor
  rationale: El término hebreo es un título divino, no el Tetragrámaton. «El Señor» conserva la reverencia y la identificación divina sin introducir «Yahvé», que no está escrito aquí.
  doctrine_reference: 'Contested terms: אֲדֹנָי / Lord; Translation philosophy §2'
- issue: Sentido de הֵיכָל en la visión de Isaías
  english_pob_reading: the temple
  chosen_spanish_reading: el templo
  alternative_spanish_readings:
  - el palacio
  - el templo
  rationale: En la escena de visión celestial, «templo» comunica mejor el ámbito santuario. La resonancia de palacio sigue implícita por el trono, pero no domina la escena.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo masorético y el audit trail inglés. Se mantiene la lectura consensuada para אֲדֹנָי como título divino y para הֵיכָל como «templo». No se introducen revisiones textuales adicionales, y la única tensión estilística relevante es el valor aspectual de מְלֵאִים, resuelta en español con el imperfecto «llenaba» para reflejar mejor la escena continua.
  spanish_consistency_notes:
  - Se usa «Señor» para אֲדֹנָי, en línea con el tratamiento doctrinal de títulos divinos no equivalentes al Tetragrámaton.
  - Se conserva «templo» para הֵיכָל, evitando «palacio» porque el contexto visionario y cultual lo favorece.
  - «Exaltado» traduce la intensificación de רָם וְנִשָּׂא sin perder la duplicación enfática del hebreo.
  - Se prefiere «manto» y «borde» por claridad contemporánea; «orla»/«dobladillo» quedan como alternativas válidas pero menos transparentes.
