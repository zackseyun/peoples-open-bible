revisions:
- from: Además, Yahvé tu Dios enviará la avispa[a] entre ellos, hasta que perezcan incluso los que queden y los que se escondan de delante de ti.
  to: Además, Yahvé tu Dios enviará el avispón[a] entre ellos, hasta que perezcan incluso los que queden y los que se escondan de delante de ti.
  rationale: Se revisa únicamente el referente de הַצִּרְעָה de «la avispa» a «el avispón» para reflejar con mayor precisión la decisión léxica documentada en el POB inglés («the hornet»). Se conserva la estructura, el tono, el nombre divino y la nota sobre la posible lectura figurada.
