translation:
  language: es
  text: 'Entonces le dijo al redentor[a]: “Noemí, la que ha vuelto de los campos de Moab[b], está vendiendo[c] la porción del campo que pertenecía a nuestro hermano Elimelec.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “la parcela de tierra”.
    reason: lexical_alternative
  - marker: b
    text: Hebreo “de los campos de Moab”, un modismo para la tierra o la campiña de Moab.
    reason: cultural_note
  - marker: c
    text: O “ha vendido”; la forma hebrea puede entenderse como acción completada, pero aquí se vierte como presente dentro de la negociación legal en curso.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then he said
  chosen_spanish: Entonces le dijo
  alternatives_spanish:
  - Y le dijo
  - Luego le dijo
  lexicon: HALOT
  rationale: La waw consecutiva marca avance narrativo; “Entonces” conserva la secuencia con naturalidad en español. Se mantiene el destinatario explícito con “le dijo”.
- source_word: לַגֹּאֵל
  english_pob_choice: to the redeemer
  chosen_spanish: al redentor
  alternatives_spanish:
  - al redentor familiar
  - al rescatador
  lexicon: HALOT
  rationale: גֹּאֵל tiene el sentido técnico de pariente con obligación legal de rescate. “Redentor” es breve y refleja el valor funcional del término; “familiar” se deja implícito por el contexto narrativo.
- source_word: חֶלְקַת הַשָּׂדֶה
  english_pob_choice: the portion of the field
  chosen_spanish: la porción del campo
  alternatives_spanish:
  - la parcela del terreno
  - el pedazo del campo
  lexicon: HALOT
  rationale: חֶלְקָה designa una porción o parcela. “Porción del campo” sigue de cerca el hebreo y suena natural en español.
- source_word: אֲשֶׁר לְאָחִינוּ לֶאֱלִימֶלֶךְ
  english_pob_choice: that belonged to our brother Elimelech
  chosen_spanish: que pertenecía a nuestro hermano Elimelec
  alternatives_spanish:
  - que era de nuestro hermano Elimelec
  - que fue de nuestro hermano Elimelec
  lexicon: HALOT
  rationale: La construcción con ל expresa posesión o pertenencia. “Pertenecía a” conserva el sentido posesivo sin forzar una forma más jurídica que el hebreo no exige aquí.
- source_word: מָכְרָה
  english_pob_choice: is selling
  chosen_spanish: está vendiendo
  alternatives_spanish:
  - ha vendido
  - vendió
  lexicon: HALOT
  rationale: Aunque la forma hebrea puede entenderse como acción completada, en el diálogo legal se presenta como asunto en curso. “Está vendiendo” reproduce bien esa vivacidad procesal que el POB inglés documenta.
- source_word: הַשָּׁבָה
  english_pob_choice: who has returned
  chosen_spanish: la que ha vuelto
  alternatives_spanish:
  - la que volvió
  - la retornada
  lexicon: HALOT
  rationale: El participio describe a Noemí por su regreso ya realizado y todavía relevante. “La que ha vuelto” es idiomático y fiel.
- source_word: מִשְּׂדֵה מוֹאָב
  english_pob_choice: from the fields of Moab
  chosen_spanish: de los campos de Moab
  alternatives_spanish:
  - de la tierra de Moab
  - del país de Moab
  lexicon: HALOT
  rationale: El hebreo dice literalmente “de los campos de Moab”, un modismo para el territorio o la campiña de Moab. Se conserva la imagen concreta, como en el POB inglés.
translation_notes:
  revision_awareness: 'Se sigue de cerca el audit trail inglés, sin depender mecánicamente de él: se conserva la imagen hebrea de “campos de Moab”, la tensión aspectual de מָכְרָה en el contexto legal, y la fuerza relacional/legal de גֹּאֵל. No se detectan revisiones posteriores relevantes; el estado de revisión indica alta concordancia.'
  spanish_consistency_notes:
  - Se usa “Yahvé” solo cuando corresponda al tetragrámaton; en este versículo no aparece.
  - “Redentor” se mantiene para גֹּאֵל conforme al valor legal-familiar del término en este contexto.
  - “Noemí” y “Elimelec” siguen la forma habitual española de los nombres propios bíblicos.
  - Se conserva la imagen concreta “campos de Moab” en vez de suavizarla a una generalización geográfica.
