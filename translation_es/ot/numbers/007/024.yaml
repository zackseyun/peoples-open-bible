    issue: «Al tercer día» puede introducir una lectura temporal distinta de la del hebreo narrativo.
    rationale: En español, «al tercer día» frecuentemente se entiende como ‘cuando se cumplieron tres días’ o ‘después de dos días previos’, mientras que aquí la fórmula enumera el día correspondiente de las ofrendas. «El tercer día» expresa mejor la secuencia narrativa sin ambigüedad.
