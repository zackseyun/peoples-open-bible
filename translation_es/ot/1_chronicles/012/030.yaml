translation:
  language: es
  text: Y de los hijos de Benjamín[a], hermanos de Saúl, tres mil[b]; hasta entonces la mayoría de ellos habían estado vigilando la casa de Saúl.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «parientes de Saúl». El hebreo «hermanos» puede extenderse más allá de hermanos literales para designar un grupo de parentesco más amplio.
    reason: lexical_alternative
  - marker: b
    text: «La casa de Saúl» puede referirse a su casa o entorno familiar, o a los intereses más amplios de su línea real.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמִן
  english_pob_choice: And from
  chosen_spanish: Y de
  alternatives_spanish:
  - De
  lexicon: HALOT
  rationale: Conserva la suma a la lista tribal y la relación de procedencia, sin sobrecargar el español con una repetición innecesaria de la conjunción cuando el contexto ya es coordinado.
- source_word: בְּנֵי בִנְיָמִן
  english_pob_choice: the sons of Benjamin
  chosen_spanish: los hijos de Benjamín
  alternatives_spanish:
  - los benjaminitas
  - la gente de Benjamín
  lexicon: HALOT
  rationale: Mantiene la construcción genealógica tribal del hebreo. ‘Hijos de Benjamín’ refleja mejor la forma מקור/constructa que un etnónimo más libre.
- source_word: אֲחֵי שָׁאוּל
  english_pob_choice: Saul’s brothers
  chosen_spanish: hermanos de Saúl
  alternatives_spanish:
  - parientes de Saúl
  - familiares de Saúl
  lexicon: HALOT
  rationale: ‘Hermanos’ es la equivalencia más directa del hebreo, pero en español puede entenderse en sentido amplio de parentesco tribal; por eso se conserva la literalidad y se documenta la amplitud semántica en nota.
- source_word: שְׁלֹשֶׁת אֲלָפִים
  english_pob_choice: three thousand
  chosen_spanish: tres mil
  lexicon: HALOT
  rationale: Equivalente numérico directo, sin necesidad de expansión.
- source_word: וְעַד הֵנָּה
  english_pob_choice: until then
  chosen_spanish: hasta entonces
  alternatives_spanish:
  - hasta ese tiempo
  - hasta ahora
  lexicon: HALOT
  rationale: En el marco histórico narrativo, la expresión se refiere al período previo mencionado en el contexto, no al presente del lector. ‘Hasta entonces’ suena natural y conserva el valor temporal retrospectivo.
- source_word: מַרְבִּיתָם
  english_pob_choice: most of them
  chosen_spanish: la mayoría de ellos
  alternatives_spanish:
  - la mayor parte de ellos
  - la mayoría
  lexicon: HALOT
  rationale: ‘Mayoría’ reproduce con claridad la idea de la parte mayor del grupo. Se prefiere la forma con complemento explícito para evitar ambigüedad en español.
- source_word: שֹׁמְרִים
  english_pob_choice: had been keeping watch
  chosen_spanish: había estado guardando la vigilancia
  alternatives_spanish:
  - había estado haciendo guardia
  - había estado vigilando
  lexicon: HALOT
  rationale: Se conserva el valor durativo anterior al punto de referencia mediante pluscuamperfecto. ‘Guardar la vigilancia’ suena un poco más formal, pero mantiene el matiz de custodia/guardia del participio.
- source_word: מִשְׁמֶרֶת
  english_pob_choice: watch
  chosen_spanish: la vigilancia
  alternatives_spanish:
  - la guardia
  - el encargo de guardia
  lexicon: HALOT
  rationale: En combinación con שׁמר, el sustantivo expresa el deber o función de custodiar. ‘Vigilancia’ es un español claro que conserva el campo semántico de custodia sin forzar una imagen demasiado militar.
- source_word: בֵּית שָׁאוּל
  english_pob_choice: the house of Saul
  chosen_spanish: la casa de Saúl
  alternatives_spanish:
  - el linaje de Saúl
  - la familia de Saúl
  - la casa/linaje de Saúl
  lexicon: HALOT
  rationale: ‘Casa’ preserva la amplitud del hebreo, que puede abarcar casa, casa real, casa dinástica o intereses asociados. Se evita estrechar el sentido a ‘dinastía’ en el texto principal.
translation_notes:
  revision_awareness: Se siguió el sentido histórico y la estructura acumulativa del original hebreo, en línea con la revisión inglesa que mantiene la amplitud de ‘brothers’ y de ‘house of Saul’ mediante notas. No se detectaron revisiones posteriores que obligaran a cambiar el español base.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ como forma predeterminada del proyecto solo cuando aparezca el Tetragrámaton; este versículo no lo contiene.
  - Se preserva ‘casa de Saúl’ para mantener la amplitud semántica hebrea de בֵּית.
  - ‘Hermanos’ se mantiene en el texto principal y su posible sentido ampliado se aclara en nota, evitando sustituirlo por un término más interpretativo.
