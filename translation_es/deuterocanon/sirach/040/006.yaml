    reason: textual_variant
  - marker: b
    text: 'El testimonio hebreo continúa en algunas divisiones de línea con redacción adicional sobre una visión del alma; el paralelo griego amplía la idea con «en sueños, como en día de guardia». La traducción principal sigue el sentido compartido más claro: el reposo es breve y el terror interior vuelve pronto.'
    reason: alternative_reading
  revision_rationale: 'La revisión devuelve el texto principal a la decisión fuente del POB inglés: descanso breve e inútil, seguido por terror interior y huida ante un perseguidor. También corrige el español para que sea natural y legible, preservando las variantes griegas y las dificultades textuales en notas, no en el cuerpo del versículo.'
