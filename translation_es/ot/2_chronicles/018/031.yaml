translation:
  language: es
  text: 'Y sucedió que, cuando los comandantes de los carros vieron a Josafat, dijeron: «Es el rey de Israel»[a]. Entonces se volvieron contra él para luchar, pero Josafat clamó, y Yahvé lo ayudó, y Dios los apartó de él[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Él es el rey de Israel».
    reason: alternative_reading
  - marker: b
    text: O «Dios los desvió de él». El verbo hebreo puede significar apartar o mover a alguien lejos de un objetivo.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׂרֵי הָרֶכֶב
  english_pob_choice: the commanders of the chariots
  chosen_spanish: los comandantes de los carros
  alternatives_spanish:
  - los capitanes de los carros
  - los comandantes de los carros de guerra
  lexicon: HALOT
  rationale: שָׂרֵי designa dirigentes o jefes militares; הָרֶכֶב especifica la fuerza de carros. «Comandantes» preserva el sentido militar claro y contemporáneo en español, y «carros» comunica el vehículo bélico sin forzar una terminología más técnica de lo que exige el hebreo.
- source_word: מֶלֶךְ יִשְׂרָאֵל הוּא
  english_pob_choice: It is the king of Israel
  chosen_spanish: Es el rey de Israel
  alternatives_spanish:
  - Él es el rey de Israel
  - Es el rey de Israel, él
  lexicon: HALOT
  rationale: La cláusula nominal identifica al supuesto objetivo. En español, «Es el rey de Israel» mantiene la identificación directa y natural en discurso citado; no es necesario explicitar el pronombre sujeto.
- source_word: וַיָּסֹבּוּ עָלָיו
  english_pob_choice: they turned against him
  chosen_spanish: se volvieron contra él
  alternatives_spanish:
  - lo rodearon
  - se dirigieron contra él
  lexicon: HALOT
  rationale: סבב puede implicar girar, rodear o volverse hacia un objetivo. En este contexto de combate, «se volvieron contra él» conserva la idea de redirección hostil sin afirmar más de lo que el hebreo exige.
- source_word: לְהִלָּחֵם
  english_pob_choice: to fight
  chosen_spanish: para luchar
  alternatives_spanish:
  - para pelear
  - para combatir
  lexicon: HALOT
  rationale: El infinitivo expresa finalidad. «Luchar» es un equivalente directo y natural en español; no añade el matiz más formal de «combatir» ni el más coloquial de «pelear».
- source_word: וַיִּזְעַק
  english_pob_choice: cried out
  chosen_spanish: clamó
  alternatives_spanish:
  - gritó
  - clamó pidiendo ayuda
  lexicon: HALOT
  rationale: זעק denota un clamor intenso, a menudo en angustia. «Clamó» conserva ese valor fuerte en un registro bíblico claro y digno; no se especifica el destinatario porque el hebreo tampoco lo dice explícitamente aquí.
- source_word: וַיהוָה עֲזָרוֹ
  english_pob_choice: the LORD helped him
  chosen_spanish: Yahvé lo ayudó
  alternatives_spanish:
  - Yahvé vino en su ayuda
  - Yahvé lo socorrió
  lexicon: HALOT
  rationale: El texto hebreo nombra directamente a יהוה; por la terminología del proyecto se conserva «Yahvé» en el cuerpo del texto. עזר se rinde con el verbo simple «ayudar», que es la correspondencia más directa y transparenta la acción divina.
- source_word: וַיְסִיתֵם אֱלֹהִים מִמֶּנּוּ
  english_pob_choice: God drew them away from him
  chosen_spanish: Dios los apartó de él
  alternatives_spanish:
  - Dios los desvió de él
  - Dios los retiró de él
  - Dios los apartó de su lado
  lexicon: HALOT
  rationale: El hiphil de סות aquí indica mover o desviar a alguien de un objetivo. «Apartó de él» comunica bien el resultado en español y mantiene la agencia divina sin cargar la frase con una connotación moral de «incitar» que no corresponde necesariamente al contexto militar.
theological_decisions:
- issue: Representación de יהוה en el mismo versículo con אֱלֹהִים
  english_pob_reading: Yahweh ... God
  chosen_spanish_reading: Yahvé ... Dios
  alternative_spanish_readings:
  - Yahvé ... Dios
  - el SEÑOR ... Dios
  rationale: El hebreo distingue el nombre del pacto, יהוה, de אֱלֹהִים. La versión española conserva esa distinción con «Yahvé» y «Dios», evitando la máscara litúrgica «SEÑOR» y manteniendo visible la diferencia léxica del original.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Si el clamor de Josafat debe explicitarse como oración dirigida a Yahvé
  english_pob_reading: Jehoshaphat cried out
  chosen_spanish_reading: Josafat clamó
  alternative_spanish_readings:
  - Josafat clamó a Yahvé
  - Josafat clamó pidiendo ayuda
  rationale: El hebreo no explicita el destinatario del clamor en esta cláusula. Por fidelidad textual, la traducción no añade un complemento que el verso no expresa; la ayuda de Yahvé aparece en la cláusula siguiente.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and ''Never: Import doctrinal claims the text does not make.'''
translation_notes:
  revision_awareness: La redacción sigue de cerca el consenso del audit trail inglés y conserva las decisiones estables de la última revisión, sin cambios sustantivos respecto del sentido verbal y teológico del versículo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יהוה y «Dios» para אֱלֹהִים, en coherencia con la terminología del proyecto.
  - «Comandantes» y «carros» sostienen el campo militar sin recurrir a un arcaísmo innecesario.
  - «Clamó» preserva la intensidad del verbo זעק sin añadir destinatario explícito.
  - La nota b recoge la alternativa semántica relevante de סות sin alterar el texto principal.
