  text: בַּ/יּ֣וֹם הַ/ה֔וּא אָקִ֛ים אֶת סֻכַּ֥ת דָּוִ֖יד הַ/נֹּפֶ֑לֶת וְ/גָדַרְתִּ֣י אֶת פִּרְצֵי/הֶ֗ן וַ/הֲרִֽסֹתָי/ו֙ אָקִ֔ים וּ/בְנִיתִ֖י/הָ כִּ/ימֵ֥י עוֹלָֽם־־׃
base_translation:
  language: en
  yaml_path: translation/ot/amos/009/011.yaml
  text: In that day I will raise up the fallen shelter of David[a], and I will wall up its breaches[c][b], and I will raise up its ruins and rebuild it as in the days of old.
  footnotes:
  - marker: a
    text: Or 'booth of David'; traditionally, 'tabernacle of David.' The Hebrew image is of a temporary shelter, used here metaphorically for David's fallen house or dynasty.
    reason: lexical_alternative
  - marker: b
    text: Or 'close up its breaches' or 'repair its gaps.'
    reason: lexical_alternative
  - marker: c
    text: '''As in the days of old'' refers to former days or ancient times, not necessarily to eternity in an abstract sense.'
    reason: lexical_alternative
