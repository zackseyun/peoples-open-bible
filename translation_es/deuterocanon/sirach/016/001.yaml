translation:
  language: es
  text: No desees la apariencia de jóvenes vanos[a], ni te alegres con hijos de injusticia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «No desees una multitud de hijos inútiles, ni te alegres con hijos impíos». El testimonio hebreo, en cambio, habla de la apariencia exterior de jóvenes vanos.'
    reason: textual_variant
lexical_decisions:
- source_word: אַל תִּתְאַוֶּה
  english_pob_choice: Do not desire
  chosen_spanish: No desees
  alternatives_spanish:
  - No codicies
  - No anheles
  - No quieras
  lexicon: HALOT
  rationale: La forma prohibitiva expresa un deseo voluntario; 'desear' comunica bien esa fuerza en español sin subir el tono a 'codiciar' ni hacerla más débil con 'querer'.
- source_word: תֹּאַר
  english_pob_choice: the appearance
  chosen_spanish: la apariencia
  alternatives_spanish:
  - la forma
  - el aspecto
  - la belleza
  lexicon: HALOT
  rationale: La revisión inglesa corrigió la adición interpretativa de 'handsome' y dejó simplemente 'appearance'; 'apariencia' refleja esa decisión y evita sobreespecificar el rasgo físico.
- source_word: נַעֲרֵי שָׁוְא
  english_pob_choice: worthless youths
  chosen_spanish: jóvenes inútiles
  alternatives_spanish:
  - jóvenes vanos
  - jóvenes vacíos
  - jóvenes sin valor
  lexicon: HALOT
  rationale: '''Shav'' no apunta solo a ''vanidad'' sino a vacuidad o inutilidad práctica/moral; ''inútiles'' capta ese campo semántico de manera natural en español, manteniendo el tono sapiencial.'
- source_word: וְאַל תִּשְׂמַח
  english_pob_choice: and do not rejoice
  chosen_spanish: ni te alegres
  alternatives_spanish:
  - ni te regocijes
  - ni te goces
  - ni te contentes
  lexicon: HALOT
  rationale: '''Alegrarse'' reproduce la prohibición emocional del paralelismo hebreo y es más natural que una forma demasiado literal como ''regocijarse''.'
- source_word: בִּבְנֵי עַוְלָה
  english_pob_choice: in sons of unrighteousness
  chosen_spanish: en hijos de injusticia
  alternatives_spanish:
  - en hijos de maldad
  - en hijos de iniquidad
  - en hijos de injusticia y violencia
  lexicon: HALOT
  rationale: Se conserva 'hijos' para seguir de cerca el hebreo y se traduce עַוְלָה por 'injusticia', que mantiene el valor moral-jurídico sin reducirlo a mera 'maldad'.
- source_word: Μὴ ἐπιθύμει τέκνων πλῆθος ἀχρήστων
  english_pob_choice: not adopted in main text
  chosen_spanish: No desees la multitud de hijos inútiles
  alternatives_spanish:
  - No codicies una multitud de hijos inútiles
  - No anheles muchos hijos inútiles
  lexicon: BDAG
  rationale: La lectura griega transmite una variante textual real y debe quedar documentada; no se adopta en el texto principal porque el hebreo conservado gobierna esta unidad cuando está disponible.
theological_decisions:
- issue: Base textual en Sirácida cuando hebreo y griego divergen
  english_pob_reading: Follow the extant Hebrew as main text while preserving the Greek alternative in a footnote
  chosen_spanish_reading: Seguir el hebreo conservado en el texto principal y dejar la variante griega en nota
  alternative_spanish_readings:
  - Seguir el griego en el texto principal
  - Fusionar hebreo y griego en una sola paráfrasis
  rationale: La política del proyecto da primacía al hebreo donde existe. Aquí la discrepancia es sustancial, así que la traducción principal sigue el hebreo y la forma griega se documenta como variante textual sin ocultarla.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where Sirach Hebrew survives; preserve source uncertainty honestly'
translation_notes:
  revision_awareness: La nota al pie se ajusta para quedar anclada explícitamente en el texto español; además, la redacción principal sigue la revisión más reciente del expediente, que eliminó la especificación interpretativa 'handsome' y dejó solo 'appearance'.
  spanish_consistency_notes:
  - Se mantiene el tono sapiencial breve y prohibitivo del hebreo.
  - '''Hijos de injusticia'' conserva el paralelismo semítico sin sustituirlo por una fórmula eclesiástica tradicional.'
  - La nota textual preserva la tensión hebreo/griego en vez de armonizarla silenciosamente.
