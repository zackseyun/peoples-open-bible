  yaml_path: translation/deuterocanon/psalms_of_solomon/010/001.yaml
  text: Blessed is the man whom the Lord remembered with rebuke[a], and who was turned away from an evil way by a scourge, to be cleansed from sin[e][d][c][b], so that it might not increase.
  footnotes:
  - marker: a
    text: Or 'with reproof' for 'with rebuke.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'was encircled'; the sense is that he was constrained or fenced off from an evil way.
    reason: lexical_alternative
  - marker: c
    text: The final clause may also be understood as 'so as not to increase [sin]' or 'so that he might not multiply it.'
    reason: alternative_reading
  - marker: d
    text: Or 'was hemmed in from'.
    reason: previous_rendering
  - marker: e
    text: Or 'by a scourge'.
    reason: previous_rendering
