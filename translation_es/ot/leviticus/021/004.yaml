translation:
  language: es
  text: No se contaminará como esposo[a] entre su pueblo, y así se profanará.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «como jefe entre su pueblo»; el hebreo de esta cláusula es difícil, y algunos la entienden más generalmente como una prohibición de contaminarse en un papel socialmente prominente, o simplemente como «no se contaminará entre su pueblo, y así se profanará», no específicamente como esposo.'
    reason: alternative_reading
lexical_decisions:
- source_word: יִטַּמָּא
  english_pob_choice: defile himself
  chosen_spanish: contaminarse
  alternatives_spanish:
  - hacerse impuro
  - profanarse
  lexicon: HALOT
  rationale: El verbo hebreo expresa impureza ritual en el contexto sacerdotal. En español, «contaminarse» comunica esa idea de quedar ritualmente afectado sin introducir una glosa interpretativa excesiva; «hacerse impuro» es más literal pero menos idiomático, y «profanarse» se reserva para el segundo miembro, donde el hebreo usa חלל.
- source_word: בַּעַל
  english_pob_choice: husband
  chosen_spanish: esposo
  alternatives_spanish:
  - marido
  - jefe
  - señor
  lexicon: HALOT
  rationale: Sigo la lectura principal del POB inglés, que entiende בַּעַל en sentido relacional de «husband». «Esposo» es el equivalente natural y digno en español; «marido» es posible pero menos sobrio, mientras que «jefe» o «señor» reflejan una alternativa interpretativa preservada en la nota.
- source_word: בְּעַמָּיו
  english_pob_choice: among his people
  chosen_spanish: entre su pueblo
  alternatives_spanish:
  - entre su gente
  - entre sus parientes
  lexicon: HALOT
  rationale: El hebreo dice literalmente «entre su pueblo». Mantengo esa formulación en español para conservar la ambigüedad contextual entre pueblo, clan y parentesco, tal como lo hace el texto base.
- source_word: לְהֵחַלּוֹ
  english_pob_choice: and so profane himself
  chosen_spanish: ni se profanará
  alternatives_spanish:
  - y así se profanará
  - para profanarse
  - y se hará común
  lexicon: HALOT
  rationale: La secuencia hebrea expresa resultado o propósito respecto de la santidad sacerdotal. «Profanarse» preserva la terminología de santidad mejor que una paráfrasis como «hacerse común»; la coordinación negativa con «ni» hace natural el segundo miembro en español y mantiene el sentido consecutivo del hebreo.
theological_decisions:
- issue: Interpretación de la cláusula difícil בַּעַל בְּעַמָּיו
  english_pob_reading: The verse forbids a priest from defiling himself for his wife, expressed as 'as a husband among his people.'
  chosen_spanish_reading: El versículo prohíbe que el sacerdote se contamine por su esposa, expresado como «como esposo entre su pueblo».
  alternative_spanish_readings:
  - como jefe entre su pueblo
  - entre su pueblo, para no profanarse
  rationale: La hebreo es compacta y admite varias lecturas. Con base en el audit trail inglés, conservo la lectura principal de «esposo», porque encaja con el valor relacional más natural de בַּעַל y con el contexto de las excepciones por parentesco. A la vez, la nota preserva la alternativa de entenderlo como una persona prominente o como una construcción más general sobre la profanación, sin resolver artificialmente la tensión.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'El pasaje muestra alta concordancia con la revisión más reciente del POB inglés: se mantiene la lectura principal «husband/esposo» y la nota conserva la ambigüedad reconocida por el audit trail. No se introducen cambios textuales sustantivos respecto del análisis base.'
  spanish_consistency_notes:
  - Se usa «contaminarse» para יִטַּמָּא y «profanarse» para לְהֵחַלּוֹ, preservando la distinción entre impureza ritual y profanación de lo santo.
  - Se traduce בַּעַל como «esposo» en el texto principal, pero se deja abierta la lectura alternativa de rango social en la nota.
  - «Entre su pueblo» conserva la literalidad de בְּעַמָּיו y permite que el contexto determine el matiz de parentesco o pertenencia comunitaria.
