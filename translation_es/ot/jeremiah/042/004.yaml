translation:
  language: es
  text: 'Entonces Jeremías el profeta les dijo: «He oído. He aquí, estoy orando a Yahvé su Dios conforme a sus palabras[a], y todo lo que Yahvé les responda, se lo diré. No les retendré ninguna palabra[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «conforme a sus palabras»; es decir, de acuerdo con lo que ustedes pidieron.'
    reason: lexical_alternative
  - marker: b
    text: 'O «No les retendré nada». Hebreo: «No les retendré ninguna palabra».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Luego ... dijo
  lexicon: HALOT
  rationale: El waw consecutivo introduce avance narrativo; «Entonces» mantiene la secuencia con un giro natural en español.
- source_word: יִרְמְיָהוּ הַנָּבִיא
  english_pob_choice: Jeremiah the prophet
  chosen_spanish: Jeremías el profeta
  alternatives_spanish:
  - el profeta Jeremías
  - Jeremías, el profeta
  lexicon: HALOT
  rationale: Se conserva el nombre propio con el título explícito, sin añadir comas innecesarias.
- source_word: שָׁמַעְתִּי
  english_pob_choice: I have heard
  chosen_spanish: He oído
  alternatives_spanish:
  - He escuchado
  - Oí
  lexicon: HALOT
  rationale: El perfecto expresa recepción efectiva de la petición; «He oído» suena natural y comunica respuesta inmediata.
- source_word: הִנְנִי
  english_pob_choice: Behold
  chosen_spanish: He aquí
  alternatives_spanish:
  - Miren
  - Miren, aquí estoy
  lexicon: HALOT
  rationale: Como marcador discursivo, «He aquí» conserva el tono solemne sin ser excesivamente arcaico.
- source_word: מִתְפַּלֵּל
  english_pob_choice: I am praying
  chosen_spanish: estoy orando
  alternatives_spanish:
  - estoy orando ahora
  - voy a orar
  lexicon: HALOT
  rationale: El participio con הִנְנִי indica acción en curso o inmediata; «estoy orando» lo refleja bien en español.
- source_word: אֶל יְהוָה אֱלֹהֵי/כֶם
  english_pob_choice: to Yahweh your God
  chosen_spanish: a Yahvé su Dios
  alternatives_spanish:
  - a Yahvé, su Dios
  - al Señor su Dios
  lexicon: HALOT
  rationale: YHWH se rinde como «Yahvé» según la terminología del proyecto; el posesivo plural se expresa con «su» en un trato respetuoso y natural en español, manteniendo la referencia colectiva.
- source_word: כְּ/דִבְרֵי/כֶם
  english_pob_choice: according to your words
  chosen_spanish: conforme a sus palabras
  alternatives_spanish:
  - según sus palabras
  - de acuerdo con sus palabras
  lexicon: HALOT
  rationale: La frase hebrea alude a lo que pidieron o dijeron; «conforme a sus palabras» conserva esa relación verbal sin sobreexplicar.
- source_word: יַעֲנֶה ... אֶתְכֶם
  english_pob_choice: answers you
  chosen_spanish: responda ... a ustedes
  alternatives_spanish:
  - les responda
  - les dé respuesta
  lexicon: HALOT
  rationale: ענה con objeto pronominal transmite respuesta dirigida a ellos; en español, «responda a ustedes» preserva el sentido relacional del verbo.
- source_word: וְהָיָה כָּל הַדָּבָר אֲשֶׁר
  english_pob_choice: and whatever ...
  chosen_spanish: y todo lo que ...
  alternatives_spanish:
  - y cualquier cosa que ...
  - y cualquier palabra que ...
  lexicon: HALOT
  rationale: La construcción introduce una cláusula general de totalidad; «todo lo que» es la forma más natural y fiel en español.
- source_word: אַגִּיד לָכֶם
  english_pob_choice: I will tell you
  chosen_spanish: se lo diré
  alternatives_spanish:
  - les diré
  - se lo declararé
  lexicon: HALOT
  rationale: La combinación del complemento indirecto plural y el objeto implícito se expresa de modo idiomático con pronombres clíticos.
- source_word: לֹא אֶמְנַע מִכֶּם דָּבָר
  english_pob_choice: I will not withhold a word from you
  chosen_spanish: No retendré de ustedes palabra alguna
  alternatives_spanish:
  - No les ocultaré nada
  - No les retendré palabra alguna
  lexicon: HALOT
  rationale: מנע significa «retener/impedir/privar de»; «palabra alguna» conserva דָּבָר y el énfasis en no omitir nada del mensaje.
theological_decisions:
- issue: Representación del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el Señor
  rationale: El texto hebreo usa directamente el Tetragrámaton; la convención del proyecto en español es «Yahvé», preservando el nombre propio del pacto en lugar de ocultarlo bajo un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה YHWH → Yahvé'
- issue: Valor de «מִתְפַּלֵּל» en un marco de respuesta inmediata
  english_pob_reading: I am praying
  chosen_spanish_reading: estoy orando
  alternative_spanish_readings:
  - oraré
  - estoy suplicando
  rationale: El participio junto con הִנְנִי señala acción inmediata/en curso; «estoy orando» evita volverlo futuro y conserva el aspecto progresivo.
  doctrine_reference: Heurística aspectual del participio con הִנְנִי en narrativa profética
- issue: Alcance de «דָּבָר» en las dos cláusulas finales
  english_pob_reading: word
  chosen_spanish_reading: palabra
  alternative_spanish_readings:
  - mensaje
  - asunto
  rationale: Se mantiene «palabra» para reflejar el paralelo entre la respuesta de Yahvé y el compromiso de Jeremías de no omitir nada del contenido recibido.
  doctrine_reference: Consistencia léxica de דָּבָר como palabra/mensaje en contexto profético
translation_notes:
  revision_awareness: 'El audit trail inglés muestra una revisión desde «Look» a «Behold» por registro y una segunda corrección que elimina «word» de la primera cláusula («whatever the LORD answers you») mientras conserva «a word» al final. La versión española refleja esa línea final: mantiene la totalidad de la respuesta divina con «todo lo que Yahvé les responda» y conserva explícitamente דָּבָר en «palabra alguna» para no diluir el énfasis de completitud. También sigue la decisión doctrinal del proyecto de traducir יהוה como «Yahvé».'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יהוה conforme al estándar del proyecto.
  - «He aquí» preserva el tono solemne de הִנְנִי sin caer en un giro demasiado arcaico.
  - «Conforme a sus palabras» queda anclado por la nota para evitar que se lea como mera fórmula vacía.
  - Se usa «palabra alguna» para conservar el eco de דָּבָר y el contraste con «todo lo que».
