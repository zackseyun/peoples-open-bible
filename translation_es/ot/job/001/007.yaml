translation:
  language: es
  text: 'Entonces Yahvé dijo al Adversario[a]: «¿De dónde vienes?» Y el Adversario respondió a Yahvé y dijo: «De recorrer la tierra y de andar por ella».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «el Satan». El término aquí lleva artículo definido y funciona como título: «el Adversario».'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: El Tetragrámaton se traslada como el nombre propio divino, no como un título enmascarado. 'Yahvé' mantiene la decisión del POB inglés de preservar el nombre personal de Dios y es el equivalente español más reconocido en este proyecto.
- source_word: הַשָּׂטָן
  english_pob_choice: the Adversary
  chosen_spanish: el Adversario
  alternatives_spanish:
  - el Satanás
  - el acusador
  - Satanás
  lexicon: HALOT
  rationale: Con el artículo definido, el hebreo funciona como designación/título. 'Adversario' conserva el valor funcional y evita imponer un nombre propio posterior; además, es más natural en español que 'el Satanás'.
- source_word: מֵאַיִן תָּבֹא
  english_pob_choice: Where have you come from?
  chosen_spanish: ¿De dónde vienes?
  alternatives_spanish:
  - ¿De dónde has venido?
  - ¿De dónde llegas?
  lexicon: HALOT
  rationale: La pregunta pide origen o procedencia. En español, la forma presente '¿De dónde vienes?' reproduce bien la escena dialogal y la cercanía del hebreo sin sonar forzada.
- source_word: וַיַּעַן
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió
  lexicon: HALOT
  rationale: '''Respondió'' mantiene el registro narrativo formal y el paralelo bíblico habitual. En español conserva el ritmo de diálogo sin añadir matiz emocional no presente en el hebreo.'
- source_word: מִשּׁוּט
  english_pob_choice: from roaming on
  chosen_spanish: de andar recorriendo
  alternatives_spanish:
  - de andar vagando
  - de recorrer
  lexicon: HALOT
  rationale: El infinitivo indica movimiento repetido o itinerante. 'Andar recorriendo' intenta reflejar esa acción continua de manera natural en español, sin reducirla a un simple desplazamiento.
- source_word: בָּאָרֶץ
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra
  - el mundo
  lexicon: HALOT
  rationale: En este contexto cósmico, 'la tierra' conserva el alcance global del hebreo y coincide con el uso del POB inglés. 'El mundo' sería más interpretativo.
- source_word: וּמֵהִתְהַלֵּךְ בָּהּ
  english_pob_choice: and from walking about on it
  chosen_spanish: y de pasearme por ella
  alternatives_spanish:
  - y de andar por ella
  - y de ir de aquí para allá en ella
  lexicon: HALOT
  rationale: El hitpael sugiere movimiento repetido o deambular. 'Pasearme por ella' comunica bien ese ir y venir en español moderno; conserva el valor iterativo sin militarizarlo ni volverlo demasiado literal.
theological_decisions:
- issue: 'Naturaleza del término הַשָּׂטָן: nombre propio vs. título/rol'
  english_pob_reading: 'title/role: ''the Adversary'''
  chosen_spanish_reading: 'título/rol: ''el Adversario'''
  alternative_spanish_readings:
  - 'nombre propio: ''Satanás'''
  - 'transliteración más formal: ''el Satanás'''
  rationale: La presencia del artículo en hebreo apoya leerlo como título o función, no como nombre propio. 'El Adversario' preserva esa tensión y evita importar una lectura posterior no obligada por el texto.
  doctrine_reference: Principio de primacía del texto original; preservación de la designación con artículo donde el hebreo la usa.
translation_notes:
  revision_awareness: 'La redacción sigue el último ajuste del POB inglés para mantener el paralelismo espacial: ''on the earth'' / ''on it''. Por eso se prefirió en español ''en la tierra'' / ''por ella'' con una preposición y locución naturales, sin volver a una formulación más rígida que sonaría menos idiomática. También se conservó la decisión revisada de no traducir el término como nombre propio.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יְהוָה en todo el texto.
  - Se usa 'el Adversario' para הַשָּׂטָן, en continuidad con el POB inglés.
  - '''La tierra'' conserva el sentido cósmico de הארץ.'
  - '''Pasearme por ella'' intenta reflejar la iteración del hitpael sin introducir una imagen no presente en el hebreo.'
