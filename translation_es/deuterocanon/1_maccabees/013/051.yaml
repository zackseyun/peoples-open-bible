translation:
  language: es
  text: Y entró en ella el día veintitrés del segundo mes, en el año ciento setenta y uno, con alabanza y palmas, y con cítaras[a], címbalos, liras[b], himnos y cantos, porque un gran enemigo había sido aplastado de en medio de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «liras» para κινύραις; el nombre del instrumento antiguo no se identifica con total seguridad en español moderno.
    reason: lexical_alternative
  - marker: b
    text: O «salterios» para νάβλαις; el griego nombra un instrumento de cuerda específico, pero su equivalencia exacta en español no es completamente segura.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰσῆλθεν
  english_pob_choice: entered
  chosen_spanish: entró
  alternatives_spanish:
  - ingresó
  - entró en
  lexicon: LSJ
  rationale: El aoristo pide un pasado simple. «Entró» es natural y formal en español; mantengo la referencia espacial con «en ella».
- source_word: εἰς αὐτήν
  english_pob_choice: it
  chosen_spanish: en ella
  alternatives_spanish:
  - en eso
  - en la ciudad
  lexicon: LSJ
  rationale: El pronombre apunta a la ciudad o fortaleza ya mencionada en el contexto. «En ella» conserva la referencia sin añadir identificación explícita que el verso no da.
- source_word: τῇ τρίτῃ καὶ εἰκάδι
  english_pob_choice: on the twenty-third day
  chosen_spanish: el día veintitrés
  alternatives_spanish:
  - el día tercero y veintitrés
  - el veintitrés
  lexicon: LSJ
  rationale: La forma griega es una expresión calendárica fija; en español se expresa de modo natural como «el día veintitrés».
- source_word: τοῦ δευτέρου μηνός
  english_pob_choice: of the second month
  chosen_spanish: del segundo mes
  alternatives_spanish:
  - en el segundo mes
  lexicon: LSJ
  rationale: 'La relación genitiva se vierte con la preposición natural en español de fechas: «del segundo mes».'
- source_word: ἔτους ἑνὸς καὶ ἑβδομηκοστοῦ καὶ ἑκατοστοῦ
  english_pob_choice: in the one hundred seventy-first year
  chosen_spanish: en el año ciento setenta y uno
  alternatives_spanish:
  - en el año ciento setenta y primero
  - del año ciento setenta y uno
  lexicon: LSJ
  rationale: La numeración seléucida se conserva con exactitud. «Año ciento setenta y uno» es claro y fiel.
- source_word: μετὰ αἰνέσεως
  english_pob_choice: with praise
  chosen_spanish: con alabanza
  alternatives_spanish:
  - con praise
  - con acción de gracias
  lexicon: LSJ
  rationale: αἴνεσις expresa alabanza/laudación. «Alabanza» conserva el sentido amplio celebrativo-religioso sin restringirlo a agradecimiento.
- source_word: βαΐων
  english_pob_choice: palm branches
  chosen_spanish: palmas
  alternatives_spanish:
  - ramas de palma
  - hojas de palma
  lexicon: LSJ
  rationale: El término alude a palmas usadas en celebración. «Palmas» es breve y natural en español; la alternativa más explícita queda implícita por el contexto de fiesta.
- source_word: κινύραις
  english_pob_choice: harps
  chosen_spanish: cítaras
  alternatives_spanish:
  - arpas
  - liras
  lexicon: LSJ
  rationale: El instrumento griego es una cuerda pulsada cuya identificación exacta no es segura. En español, «cítaras» es un equivalente histórico adecuado y más cercano al campo instrumental que «arpa»; se mantiene la incertidumbre relativa mediante alternativas.
- source_word: κυμβάλοις
  english_pob_choice: cymbals
  chosen_spanish: címbalos
  alternatives_spanish:
  - címbalos
  lexicon: LSJ
  rationale: Correspondencia directa y transparente para el instrumento de percusión.
- source_word: νάβλαις
  english_pob_choice: lyres
  chosen_spanish: liras
  alternatives_spanish:
  - salterios
  - arpas
  lexicon: LSJ
  rationale: La revisión inglesa optó por «lyres» para especificar mejor νάβλαις. En español, «liras» comunica esa familia instrumental con naturalidad y sin el arcaísmo de «salterios».
- source_word: ὕμνοις
  english_pob_choice: hymns
  chosen_spanish: himnos
  alternatives_spanish:
  - cánticos de alabanza
  lexicon: LSJ
  rationale: «Himnos» conserva el registro litúrgico y celebrativo del griego y coincide bien con el paralelismo del pasaje.
- source_word: ᾠδαῖς
  english_pob_choice: songs
  chosen_spanish: cantos
  alternatives_spanish:
  - canciones
  - odas
  lexicon: LSJ
  rationale: «Cantos» es una traducción natural y digna para ᾠδαῖς, evitando el matiz moderno e informal de «canciones».
- source_word: συνετρίβη
  english_pob_choice: had been crushed
  chosen_spanish: había sido quebrantado
  alternatives_spanish:
  - había sido aplastado
  - había sido destruido
  lexicon: LSJ
  rationale: El verbo denota ruptura decisiva o derrota aplastante. «Quebrantado» conserva la imagen de ser roto/derribado y funciona bien en español bíblico moderno.
- source_word: ἐχθρὸς μέγας
  english_pob_choice: a great enemy
  chosen_spanish: un gran enemigo
  alternatives_spanish:
  - un poderoso enemigo
  - un gran adversario
  lexicon: LSJ
  rationale: La traducción directa mantiene tanto la oposición hostil como la magnitud del peligro.
- source_word: ἐξ Ἰσραήλ
  english_pob_choice: out of Israel
  chosen_spanish: de Israel
  alternatives_spanish:
  - de en medio de Israel
  - fuera de Israel
  lexicon: LSJ
  rationale: El sentido es expulsión o eliminación de entre Israel. En español, «de Israel» conserva la relación sin forzar una frase más pesada; el contexto comunica la salida/expulsión.
theological_decisions:
- issue: Matiz celebrativo del versículo
  english_pob_reading: Render the procession in straightforward celebratory and musical terms without importing later liturgical or messianic overtones.
  chosen_spanish_reading: Mantener el tono de celebración pública y musical sin añadir sentidos litúrgicos posteriores que el griego no exige.
  alternative_spanish_readings:
  - Usar «acción de gracias» en lugar de «alabanza»
  - Introducir lenguaje más cultual como «salmos»
  rationale: El texto describe júbilo por la derrota de un enemigo. La versión española conserva esa celebración con términos directos y evita expandir el pasaje hacia lecturas posteriores no requeridas por el original.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Identificación de los instrumentos
  english_pob_reading: Use accessible modern categories where exact identification is uncertain, while preserving alternatives in footnotes if needed.
  chosen_spanish_reading: Usar equivalentes españoles comprensibles para los instrumentos nombrados, sin fingir una certeza arqueológica que el original no ofrece.
  alternative_spanish_readings:
  - Traducir todos los términos con equivalentes más clásicos y específicos
  - Generalizar más con «instrumentos de cuerda»
  rationale: Los nombres instrumentales son concretos, pero su equivalencia exacta no siempre es segura. «Cítaras» y «liras» preservan el carácter musical específico y readable para el lector español.
  doctrine_reference: Translation philosophy §§5, 6
translation_notes:
  revision_awareness: La revisión inglesa más reciente sustituyó una traducción genérica de νάβλαις por «lyres», buscando una especificación instrumental más natural. En español se siguió esa revisión con «liras», manteniendo una opción comprensible y más específica que un genérico como «instrumentos de cuerda».
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma estándar del proyecto cuando aparezca el nombre divino, pero este versículo no lo contiene.
  - Se mantiene el tono bíblico moderno y digno, evitando arcaísmos innecesarios.
  - Los términos musicales se han alineado con la revisión inglesa más reciente para reflejar mejor el paralelismo del pasaje.
