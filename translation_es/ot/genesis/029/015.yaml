- from: 'Entonces Labán dijo a Jacob[a]: «Porque eres mi pariente, ¿vas a servirme de balde? Dime qué salario[b] tendrás».'
  to: 'Entonces Labán dijo a Jacob[a]: «Porque eres mi pariente, ¿vas a trabajar para mí de balde? Dime cuál será tu salario».'
  rationale: Se ajusta «servirme» a «trabajar para mí» para reflejar mejor עבד en un contexto de remuneración. Se cambia «qué salario tendrás» por «cuál será tu salario» para expresar con español natural la petición de fijar la paga. Se conserva la nota sobre «mi hermano»/«pariente» y se elimina la nota sobre «salario» por innecesaria. No se requiere adjudicación adicional.
