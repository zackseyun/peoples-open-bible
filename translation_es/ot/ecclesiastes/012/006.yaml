    issue: «la copa de oro» para גֻּלַּת הַזָּהָב
    rationale: El inglés auditado eligió «golden bowl» y la rationale descarta sobreespecificar función. En español, «copa» sugiere vaso para beber y desplaza la imagen de recipiente/cuenco. «Cuenco de oro» o «tazón de oro» preserva mejor el referente.
  - severity: high
    issue: «junto al pozo» para אֶל הַבּוֹר
    rationale: La decisión inglesa conserva «pit» en el texto principal por su sentido léxico más amplio y su resonancia de muerte, dejando «well/cistern» en nota. El español cierra la imagen a una lectura hídrica y pierde el matiz más sombrío. «junto a la fosa» o similar refleja mejor la elección auditada.
  - severity: high
    issue: Nota d defectuosa
    rationale: Dice «O «cisterna» o «pozo» en lugar de «pozo»», lo cual es circular y no informa. Debe contrastar una opción principal distinta, por ejemplo «fosa», con las alternativas «cisterna» o «pozo».
  - severity: low
    issue: Nota a usa alternativas algo alejadas del rastro inglés
    rationale: «Sea apartado» no corresponde tan bien a «is severed/removed/loosed» como «sea cortado» o «sea arrancado/separado». Conviene ajustar para reflejar mejor la incertidumbre documentada sin introducir un matiz interpretativo distinto.
  - severity: low
    issue: Nota b cambia la alternativa auditada
    rationale: El inglés preserva específicamente «pitcher» como alternativa a «jar». En español, «vasija» es demasiado genérico; «cántaro» representa mejor la alternativa contextual de recipiente para sacar agua.
