translation:
  language: es
  text: Y cuando esto sucedió, se encendió una llama; y cuando la luz del altar resplandeció[a], fue consumida[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cuando la luz del altar brilló en respuesta». El verbo griego puede expresar un resplandor o un brillo correspondiente.
    reason: lexical_alternative
  - marker: b
    text: El griego dice simplemente «fue consumida» sin nombrar el sujeto. La traducción entiende que se refiere a la llama; también podría entenderse del combustible o, según el contexto más amplio, del líquido derramado.
    reason: alternative_reading
lexical_decisions:
- source_word: ὡς δὲ τοῦτο ἐγενήθη
  english_pob_choice: And when this happened
  chosen_spanish: Y cuando esto sucedió
  alternatives_spanish:
  - Y cuando esto ocurrió
  - Y al suceder esto
  lexicon: LSJ
  rationale: La cláusula temporal griega introduce la secuencia narrativa sin exigir mayor intensidad que el simple hecho de ocurrir. «Sucedió» conserva el registro sobrio y natural del relato, y «cuando» refleja bien el valor temporal del griego.
- source_word: φλὸξ
  english_pob_choice: a flame
  chosen_spanish: una llama
  alternatives_spanish:
  - una flama
  - un fuego
  lexicon: LSJ
  rationale: φλόξ designa una llama o resplandor de fuego. «Llama» es una equivalencia clara y digna en español, y mantiene el singular del griego. Se evita «fuego» por ser más amplio y menos preciso aquí.
- source_word: ἀνήφθη
  english_pob_choice: was kindled
  chosen_spanish: se encendió
  alternatives_spanish:
  - fue encendida
  - ardió
  lexicon: LSJ
  rationale: El pasivo aoristo expresa que la llama fue prendida/encendida. En español, «se encendió» transmite con naturalidad el inicio de la combustión sin perder la voz pasiva-reflexiva del evento.
- source_word: τοῦ δὲ ἀπὸ τοῦ θυσιαστηρίου
  english_pob_choice: from the altar
  chosen_spanish: del altar
  alternatives_spanish:
  - desde el altar
  - procedente del altar
  lexicon: LSJ
  rationale: θυσιαστήριον es «altar». La preposición queda suficientemente expresada con «del altar» en español, y el contexto hace claro que la luz proviene de allí.
- source_word: ἀντιλάμψαντος φωτός
  english_pob_choice: when the light from the altar shone forth
  chosen_spanish: cuando la luz del altar resplandeció
  alternatives_spanish:
  - cuando la luz del altar brilló en respuesta
  - cuando la luz del altar relució
  lexicon: LSJ
  rationale: ἀντιλάμπω puede indicar brillar, resplandecer o resplandecer en respuesta/reciprocidad. «Resplandeció» comunica bien la aparición luminosa y evita una traducción demasiado marcada como «flasheó» o «brilló en respuesta», que sonarían forzadas en español.
- source_word: ἐδαπανήθη
  english_pob_choice: it was consumed
  chosen_spanish: fue consumida
  alternatives_spanish:
  - se consumió
  - fue gastada
  lexicon: LSJ
  rationale: δαπανάω en pasivo significa ser consumido, agotado o gastado. En este contexto de fuego, «fue consumida» mantiene la ambigüedad del griego sobre el sujeto implícito y suena natural en español.
theological_decisions:
- issue: Referente implícito de «ἐδαπανήθη» en la cláusula final
  english_pob_reading: The implied referent is the previously mentioned flame, while alternative contextual referents are possible.
  chosen_spanish_reading: El referente implícito más cercano es la llama mencionada antes; sin embargo, el griego permite otras posibilidades contextuales.
  alternative_spanish_readings:
  - Fue consumida la llama
  - Fue consumido el combustible o la ofrenda
  - Se consumió el líquido derramado
  rationale: El griego no nombra explícitamente el sujeto de la pasiva final. La cercanía sintáctica favorece la llama como referente, pero la tradición de lectura admite otras interpretaciones a partir del contexto amplio. Se conserva esa tensión en lugar de resolverla de forma dogmática.
  doctrine_reference: Preservar la tensión exegética sin forzar el referente implícito.
translation_notes:
  revision_awareness: La redacción sigue la última revisión del audit trail inglés, que prefirió «shone forth» sobre «flashed back» y eliminó el contraste «but». En español se reflejó esa decisión con una coordinación simple («y») y con «resplandeció», una solución natural que mantiene la idea de irradiación sin introducir una relación adversativa no sustentada por el griego.
  spanish_consistency_notes:
  - Se mantiene «altar» para θυσιαστήριον, en coherencia con el uso técnico bíblico.
  - Se evita «SEÑOR» o términos de máscara, porque el versículo no contiene el nombre divino.
  - La pasiva final se conserva ambigua en el texto principal para respetar el griego y el audit trail inglés.
