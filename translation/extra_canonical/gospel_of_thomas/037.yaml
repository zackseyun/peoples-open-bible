translation:
  text: His disciples said, "When[a] will you be revealed[f] to us, and when will
    we see you?" Jesus said, "When you strip naked without being ashamed,[b] and you
    put your clothes under your feet like[e] little children,[c] and trample on them,
    then[d] you will see the Son of the Living One,[g] and you will not be afraid."
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Coptic idiom ⲁϣ ⲛϩⲟⲟⲩ (‘what day?’) functions as ‘when?’
    reason: cultural_note
  - marker: b
    text: 'ⲕⲱⲕ + ⲁϩⲏⲩ + negated ϣⲓⲡⲉ: literally ‘strip [and be] naked, [and] not be
      ashamed.’'
    reason: lexical_alternative
  - marker: c
    text: 'Double diminutive ⲡⲓⲕⲟⲩⲓ ⲛϣⲏⲣⲉ ϣⲏⲙ intensifies ‘smallness’: ‘little children.’'
    reason: cultural_note
  - marker: d
    text: NHAM02.39 lb 34 shows bracketed restoration ⲧⲟⲧ[ⲉ] [ⲧⲉⲧⲛ̄]ⲁⲛⲁⲩ (‘then [you
      will] see’). Dilley normalizes to ⲛⲛⲧⲟⲟⲩ ⲧⲟⲧⲉ ⲛⲧⲱⲧⲛⲛⲁⲛⲁⲩ.
    reason: lacuna_or_restoration
  - marker: e
    text: Comparative particle varies as ⲛⲑⲉ/ⲛⲡϩⲉ (‘as/like’) in the witnesses; translated
      simply ‘like.’
    reason: dialect_note
  - marker: f
    text: POxy 655 preserves the opening ‘when you take off your clothes and are not
      ashamed’, aligning with the Coptic ⲉⲣϣⲁⲛ ⲛⲧⲱⲧⲛ ⲕⲱⲕⲛ ⲧⲱⲧⲛ ⲁϩⲏⲩ ⲙⲡⲉⲛⲧⲱⲧⲛ ϣⲓⲡⲉ.
    reason: cross_reference
  - marker: g
    text: ‘Son of the Living One’ renders ⲡϣⲏⲣⲉ ⲛⲡⲉⲧⲉⲣⲉⲱⲛϩ; a title with Semitic flavor.
      Not smoothed to ‘living God’ to retain Thomas’s diction.
    reason: cultural_note
lexical_decisions:
- source_word: ⲁϣ ⲛϩⲟⲟⲩ
  chosen: when (lit. what day)
  alternatives:
  - on what day
  - at what time
  lexicon: Crum (s.v. ϩⲟⲟⲩ)
  rationale: Idiomatic interrogative using ‘what day’ to mean ‘when’ in Sahidic; rendering
    as ‘when’ preserves sense concisely.
- source_word: ⲟⲩⲱⲛϩ ⲉⲃⲟⲗ
  chosen: be revealed
  alternatives:
  - be manifested
  - appear
  lexicon: Crum (s.v. ⲟⲩⲱⲛϩ)
  rationale: With ⲉⲃⲟⲗ, the verb commonly means ‘come to light/be revealed’; ‘be revealed’
    reflects Thomas’s revelatory tone.
- source_word: ⲁⲛⲁⲩ
  chosen: see
  alternatives:
  - behold
  - look upon
  lexicon: Crum (s.v. ⲛⲁⲩ)
  rationale: Plain ‘see’ matches the disciples’ request and the promise; avoiding
    elevated ‘behold’ keeps Thomas’s terseness.
- source_word: ⲕⲱⲕ (ⲕⲱⲕⲛ ⲧⲱⲧⲛ)
  chosen: strip
  alternatives:
  - take off (clothes)
  - undress
  lexicon: Crum (s.v. ⲕⲱⲕ)
  rationale: Verb means to strip/undress; paired with ⲁϩⲏⲩ it yields ‘strip naked,’
    preserving the stark imagery.
- source_word: ⲁϩⲏⲩ
  chosen: naked
  alternatives:
  - bare
  lexicon: Crum (s.v. ⲁϩⲏⲩ)
  rationale: Standard term for physical nakedness; rendering ‘naked’ keeps the deliberate
    shock of the saying.
- source_word: ϣⲓⲡⲉ
  chosen: be ashamed
  alternatives:
  - feel shame
  lexicon: Crum (s.v. ϣⲓⲡⲉ)
  rationale: Common verb for ‘to be ashamed’; ‘without being ashamed’ mirrors Coptic
    negative construction.
- source_word: ϥⲓ
  chosen: take
  alternatives:
  - pick up
  - carry off
  lexicon: Crum (s.v. ϥⲓ)
  rationale: Basic verb of taking/picking up; ‘take’ is concise and fits the sequence
    of actions.
- source_word: ⲥⲧⲏⲛ (ⲡⲉⲧⲛϣⲧⲏⲛ)
  chosen: clothes
  alternatives:
  - garments
  lexicon: Crum (s.v. ⲥⲧⲏⲛ)
  rationale: Plural sense ‘clothes/garments’; ‘clothes’ is idiomatic modern English.
- source_word: ⲕⲱⲛⲧⲟⲟⲩ
  chosen: put (place)
  alternatives:
  - set
  - lay
  lexicon: Crum (s.v. ⲕⲱⲛⲧⲟⲟⲩ)
  rationale: Verb of placing/setting; ‘put’ keeps the action sequence brisk.
- source_word: ϩⲁ ⲡⲉⲥⲏⲧ
  chosen: under your feet
  alternatives:
  - beneath your feet
  lexicon: Crum (s.v. ϩⲁ; ⲥⲏⲧ)
  rationale: Idiomatic prepositional phrase; context implies the possessive ‘your’
    though not repeated after ⲥⲏⲧ.
- source_word: ⲛⲑⲉ / ⲛⲡϩⲉ
  chosen: like / as
  alternatives:
  - in the manner of
  lexicon: Layton, Grammar §236
  rationale: Comparative particle ‘as/like’; manuscript shows orthographic variation
    (ⲛⲑⲉ vs ⲛⲡϩⲉ). ‘Like’ is natural here.
- source_word: ϫⲟⲡϫⲡ
  chosen: trample (tread on)
  alternatives:
  - tread down
  - step on
  lexicon: Crum (s.v. ϫⲟⲡϫⲡ)
  rationale: Reduplicated verb indicating repeated treading; ‘trample’ captures intensity.
- source_word: ⲡⲓⲕⲟⲩⲓ ⲛϣⲏⲣⲉ ϣⲏⲙ
  chosen: the little children
  alternatives:
  - the very small children
  - the little ones
  lexicon: Crum (s.v. ⲕⲟⲩⲓ; ϣⲏⲣⲉ; ϣⲏⲙ)
  rationale: Double diminutive emphasizes smallness; ‘little children’ is compact
    yet signals diminutive force.
- source_word: ⲡϣⲏⲣⲉ ⲛⲡⲉⲧⲉⲣⲉⲱⲛϩ
  chosen: the Son of the Living One
  alternatives:
  - the Son of the Living
  lexicon: Crum (s.v. ϣⲏⲣⲉ; ⲱⲛϩ)
  rationale: Genitive construction retained to preserve Thomas’s title; capitalizing
    ‘Living One’ signals titular use.
- source_word: ⲣϩⲟⲧⲉ
  chosen: be afraid
  alternatives:
  - fear
  lexicon: Crum (s.v. ϩⲟⲧⲉ)
  rationale: Verb ‘fear, be afraid’; rendering as ‘you will not be afraid’ tracks
    negative future sense.
textual_note: 'Dialect: Sahidic with Lycopolitan features. A comparative particle
  appears as ⲛⲑⲉ in the diplomatic line and as ⲛⲡϩⲉ in Dilley’s normalization—an orthographic/dialectal
  variant meaning ‘as/like’. Syntax: ⲉⲣϣⲁⲛ_ introduces the protasis (‘when you…’),
  governing the sequence of cohortative future-like second-person forms. Orthography/restoration:
  At NHAM02.39 lb 34 the diplomatic text shows brackets around ⲧⲟⲧ[ⲉ] [ⲧⲉⲧⲛ̄]ⲁⲛⲁⲩ;
  Dilley normalizes to ⲛⲛⲧⲟⲟⲩ ⲧⲟⲧⲉ ⲛⲧⲱⲧⲛⲛⲁⲛⲁⲩ (‘then you will see’). The comparative
  clause ‘like the little children’ includes a double diminutive (ⲡⲓⲕⲟⲩⲓ ⲛϣⲏⲣⲉ ϣⲏⲙ).
  No other lacunae affect sense in this saying.'
