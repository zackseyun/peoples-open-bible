translation:
  language: es
  text: Allí Judá vio a la hija de un hombre cananeo, cuyo nombre era Súa[a], y la tomó y se unió a ella[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo dice literalmente: «y su nombre era Súa», refiriéndose al hombre cananeo, no a la hija.'
    reason: lexical_alternative
  - marker: b
    text: «Se unió a ella» reproduce un eufemismo hebreo para indicar relaciones sexuales.
    reason: cultural_note
lexical_decisions:
- source_word: וַיַּרְא
  english_pob_choice: saw
  chosen_spanish: vio
  alternatives_spanish:
  - observó
  - notó
  lexicon: HALOT
  rationale: ראה en la secuencia narrativa con waw consecutiva se rinde de manera natural como «vio»; es directo y no añade matiz interpretativo.
- source_word: שָׁם
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - en ese lugar
  lexicon: HALOT
  rationale: Adverbio de lugar; «allí» es la equivalencia breve y natural en español narrativo.
- source_word: בַּת אִישׁ כְּנַעֲנִי
  english_pob_choice: the daughter of a Canaanite man
  chosen_spanish: la hija de un hombre cananeo
  alternatives_spanish:
  - la hija de un cananeo
  - la hija de un hombre de Canaán
  lexicon: HALOT
  rationale: 'Se conserva la cadena constructa de manera transparente: hija de un hombre cananeo. «Cananeo» mantiene el adjetivo étnico del hebreo sin forzar una paráfrasis.'
- source_word: וּשְׁמוֹ שׁוּעַ
  english_pob_choice: whose name was Shua
  chosen_spanish: cuyo nombre era Súa
  alternatives_spanish:
  - y su nombre era Súa
  - llamado Súa
  lexicon: HALOT
  rationale: El hebreo se refiere al nombre del padre de la muchacha, no al de ella. «Cuyo nombre era» refleja bien la relación posesiva, y «Súa» es la forma española habitual del nombre propio.
- source_word: וַיִּקָּחֶהָ
  english_pob_choice: he took her
  chosen_spanish: la tomó
  alternatives_spanish:
  - la tomó por esposa
  - se casó con ella
  lexicon: HALOT
  rationale: לקח con una mujer puede implicar matrimonio, pero el verbo por sí solo significa «tomar». Se evita importar más de lo que el texto dice en este punto.
- source_word: וַיָּבֹא אֵלֶיהָ
  english_pob_choice: went in to her
  chosen_spanish: se llegó a ella
  alternatives_spanish:
  - tuvo relaciones con ella
  - se unió a ella
  lexicon: HALOT
  rationale: La expresión hebrea es un eufemismo idiomático para relaciones sexuales. «Se llegó a ella» preserva el registro bíblico y la fuerza idiomática sin volverlo demasiado explícito.
theological_decisions:
- issue: Término implícito de relación sexual en el cierre del versículo
  english_pob_reading: '''Went in to her'' is a Hebrew idiom for sexual relations.'
  chosen_spanish_reading: '''Se llegó a ella'' conserva el eufemismo idiomático para relaciones sexuales.'
  alternative_spanish_readings:
  - tuvo relaciones con ella
  - yació con ella
  rationale: 'La decisión sigue el audit trail inglés: no se debe explicar ni suavizar el hebreo más allá de lo que el texto permite. El español mantiene un equivalente idiomático comprensible y reverente.'
  doctrine_reference: Génesis 38:2; uso idiomático hebreo de בוא אֶל
- issue: Identidad del portador del nombre Súa
  english_pob_reading: whose name was Shua, referring to the Canaanite man, not the daughter.
  chosen_spanish_reading: cuyo nombre era Súa, referido al hombre cananeo y no a la hija.
  alternative_spanish_readings:
  - llamado Súa
  - de nombre Súa
  rationale: Se preserva la aclaración auditada de que el nombre corresponde al hombre cananeo. Esto evita una lectura errónea del sintagma hebreo.
  doctrine_reference: Génesis 38:2; relación sintáctica del constructo hebreo
translation_notes:
  revision_awareness: Se siguió el último estado auditado del inglés POB, que уточó/ajustó la relación de 'whose name was Shua' para hacer explícito que el nombre corresponde al hombre cananeo. La redacción española conserva esa precisión y mantiene el equivalente idiomático del cierre del versículo sin intensificarlo ni explicitarlo en exceso.
  spanish_consistency_notes:
  - Se usó «Yahvé» en otros contextos según la política del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se prefirió «cananeo» como adjetivo étnico transparente frente a soluciones más interpretativas.
  - El nombre propio se castellanizó como «Súa», forma natural en español bíblico contemporáneo.
  - La construcción «la tomó» evita sobretraducir el verbo לקח como matrimonio explícito.
