translation:
  language: es
  text: 'Mira la tierra de los Caldeos: este es el pueblo que no era[a]; Asiria la destinó para criaturas del desierto[b]. Levantaron sus torres de asedio[c], dejaron al descubierto sus palacios[d], la hicieron una ruina.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «este pueblo no existía», o «este pueblo no tenía importancia». La cláusula hebrea es breve y difícil.'
    reason: alternative_reading
  - marker: b
    text: 'O: «Asur la destinó para moradores del desierto». El hebreo puede referirse a criaturas salvajes del desierto o a habitantes del desierto.'
    reason: lexical_alternative
  - marker: c
    text: El término hebreo detrás de «torres de asedio» es incierto; algunos lo traducen «torres de vigilancia» o «fortalezas».
    reason: textual_variant
  - marker: d
    text: 'O: «desnudaron sus palacios» o «dejaron al descubierto sus palacios».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵן
  english_pob_choice: Look at
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira, pues
  - He aquí
  - Fíjate
  lexicon: HALOT
  rationale: La partícula introduce atención directa; «Mira» conserva el llamado deíctico en un español natural y digno.
- source_word: אֶרֶץ כַּשְׂדִּים
  english_pob_choice: the land of the Chaldeans
  chosen_spanish: la tierra de los caldeos
  alternatives_spanish:
  - la tierra de Caldea
  - el país de los caldeos
  lexicon: HALOT
  rationale: «Tierra de los caldeos» sigue de cerca el hebreo y mantiene el valor etnogeográfico sin forzar una forma más interpretativa.
- source_word: זֶה הָעָם לֹא הָיָה
  english_pob_choice: this is the people that was not
  chosen_spanish: este es el pueblo que no era
  alternatives_spanish:
  - este es el pueblo que no existía
  - este pueblo no era nada
  - este es el pueblo que no fue
  lexicon: HALOT
  rationale: La cláusula es breve y difícil. «Que no era» conserva la aspereza y la ambigüedad del hebreo sin resolver demasiado el sentido.
- source_word: אַשּׁוּר
  english_pob_choice: Assyria
  chosen_spanish: Asiria
  alternatives_spanish:
  - Assur
  lexicon: HALOT
  rationale: Aquí se trata del poder/nación asiria; «Asiria» es la forma española estándar y clara.
- source_word: לְצִיִּים
  english_pob_choice: for desert creatures
  chosen_spanish: para criaturas del desierto
  alternatives_spanish:
  - para moradores del desierto
  - para bestias del desierto
  - para nómadas del desierto
  lexicon: HALOT
  rationale: El término puede referirse a seres del desierto, animales o habitantes; «criaturas del desierto» preserva la ambigüedad y la imagen de desolación.
- source_word: הֵקִימוּ בחיניו
  english_pob_choice: They set up their siege towers
  chosen_spanish: Levantaron sus torres de asedio
  alternatives_spanish:
  - Levantaron sus torres de vigilancia
  - Erigieron sus fortines
  - Levantaron sus torres
  lexicon: HALOT
  rationale: La lectura del término es difícil; en contexto bélico, «torres de asedio» refleja bien la función probable y mantiene la cautela del texto auditado.
- source_word: עֹרְרוּ אַרְמְנוֹתֶיהָ
  english_pob_choice: they stripped her palaces bare
  chosen_spanish: dejaron al descubierto sus palacios
  alternatives_spanish:
  - desnudaron sus palacios
  - arrasaron sus palacios
  - dejaron vacíos sus palacios
  lexicon: HALOT
  rationale: El verbo aquí puede entenderse como «dejar al descubierto / despojar»; esta opción conserva la idea de despojo sin añadir una destrucción no explícita.
- source_word: שָׂמָהּ לְמַפֵּלָה
  english_pob_choice: they made her a ruin
  chosen_spanish: la hicieron una ruina
  alternatives_spanish:
  - la hicieron ruina
  - la convirtieron en ruina
  - la dejaron en ruinas
  lexicon: HALOT
  rationale: La frase expresa convertirla en ruina; «la hicieron una ruina» reproduce el resultado final de manera clara y fiel.
translation_notes:
  revision_awareness: La redacción sigue el ajuste del POB inglés que prefirió «appointed it for desert creatures» frente a «founded it», porque el verbo aquí comunica designación/destinación en contexto. También conserva la estructura abrupta de la cláusula קשה «this is the people that was not», sin resolverla de manera excesiva.
  spanish_consistency_notes:
  - Se mantiene «Asiria» para אַשּׁוּר por tratarse del imperio/nación, no de un antropónimo.
  - Se usa «ruina» para מַפֵּלָה en continuidad con el valor de derrumbe/final de destrucción.
  - Se preserva una traducción sobria y no explicativa en el núcleo oscuro del versículo, acorde con el audit trail inglés.
