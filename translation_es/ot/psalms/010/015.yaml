translation:
  language: es
  text: Quebranta el brazo del malvado y del hombre perverso[a]; busca su maldad hasta que no halles ninguna.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el malvado y el hombre perverso». El hebreo permite leer el segundo descriptor como un sustantivo/adjetivo paralelo, por lo que el verso también puede entenderse con dos miembros personales en lugar de uno solo con doble calificación.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁבֹר
  english_pob_choice: Break
  chosen_spanish: Quebranta
  alternatives_spanish:
  - Rompe
  - Destruye
  - Quiebra
  lexicon: HALOT
  rationale: Es un imperativo dirigido a Dios. «Quebranta» comunica con fuerza la acción de romper y suena natural en español bíblico sin suavizar la petición.
- source_word: זְר֣וֹעַ
  english_pob_choice: arm
  chosen_spanish: brazo
  alternatives_spanish:
  - brazo
  - fuerza
  - poder
  lexicon: HALOT
  rationale: La imagen corporal debe conservarse. «Brazo» es el equivalente español más natural y mantiene la metáfora de poder o capacidad de daño.
- source_word: רָשָׁע
  english_pob_choice: the wicked
  chosen_spanish: el malvado
  alternatives_spanish:
  - el impío
  - el perverso
  - el culpable
  lexicon: HALOT
  rationale: Como sustantivo adjetival singular, «el malvado» preserva la referencia a una persona concreta y resulta claro en español.
- source_word: וָרָע
  english_pob_choice: and evil man
  chosen_spanish: y del hombre perverso
  alternatives_spanish:
  - y del malvado
  - y del perverso
  - y del hombre malo
  lexicon: HALOT
  rationale: El hebreo permite leer un segundo descriptor paralelo. En español, «hombre perverso» conserva esa duplicación sin reducirla a un mero sinónimo invisible; la preposición «del» mantiene la coordinación natural con el primer miembro.
- source_word: תִּדְרוֹשׁ
  english_pob_choice: seek out
  chosen_spanish: busca
  alternatives_spanish:
  - busca
  - investiga
  - requiere
  lexicon: HALOT
  rationale: En contexto forense, el verbo expresa indagar o buscar con propósito judicial. «Busca» es breve y fiel; el complemento siguiente conserva la idea de examen hasta dejar nada sin hallar.
- source_word: רִשְׁע֥וֹ
  english_pob_choice: his wickedness
  chosen_spanish: su maldad
  alternatives_spanish:
  - su maldad
  - su perversidad
  - su culpa
  lexicon: HALOT
  rationale: «Maldad» transmite el sustantivo abstracto de acción/estado contrario a Dios. Es idiomático y evita cargar demasiado una lectura técnica que el contexto no exige explícitamente.
- source_word: בַל
  english_pob_choice: until ... none
  chosen_spanish: hasta que no
  alternatives_spanish:
  - hasta que no
  - para que no
  - de modo que no
  lexicon: HALOT
  rationale: La partícula negativa con el verbo siguiente expresa el resultado deseado de una búsqueda/jucio completo. «Hasta que no» reproduce esa culminación en español natural, aunque la negación se apoya en la frase final.
- source_word: תִּמְצָא
  english_pob_choice: you find
  chosen_spanish: halles
  alternatives_spanish:
  - encuentres
  - halles
  - descubras
  lexicon: HALOT
  rationale: Segunda persona singular dirigida a Dios. «Halles» mantiene el matiz de encontrar tras una búsqueda y suena más sobrio que «encuentres» en este registro.
theological_decisions:
- issue: La metáfora del «brazo» del malvado
  english_pob_reading: Preserve the concrete image 'arm' in the main text
  chosen_spanish_reading: Conservar la imagen concreta «brazo» en el texto principal
  alternative_spanish_readings:
  - Traducir de forma abstracta como «fuerza» o «poder»
  rationale: El salmo pide que Dios inutilice la capacidad de opresión del malvado. Mantener la imagen corporal conserva la poesía hebrea y permite que el lector infiera la fuerza o el poder implicados.
  doctrine_reference: Translation philosophy §1, §6
- issue: Cómo entender el final de בַל תִּמְצָא
  english_pob_reading: '''until you find none'''
  chosen_spanish_reading: «hasta que no halles nada»
  alternative_spanish_readings:
  - «para que no halles nada»
  - «cuando busques, no encontrarás»
  - «hasta que no quede nada por hallar»
  rationale: 'La cláusula expresa el resultado deseado de la búsqueda judicial de Dios: que la maldad quede tan plenamente tratada que no se encuentre nada. «Hasta que no halles nada» conserva la fuerza peticional y la idea de búsqueda exhaustiva sin introducir más interpretación de la necesaria.'
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: 'La redacción sigue el pasaje hebreo de WLC con atención al paralelismo: primero una imagen corporal concreta («brazo»), luego dos expresiones de persona malvada en paralelo, y finalmente una búsqueda judicial de la maldad. Frente al auditorio inglés, se optó por un español más natural que conserve la misma tensión lexical: no se abstrajo «brazo» como «poder», ni se suavizó תדרשׁ con una mera idea de castigo. Se mantiene la clausula final como resultado de una búsqueda exhaustiva, no como simple negación aislada.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiere explícitamente; este versículo no lo incluye.
  - Se prefirió «maldad» para רִשְׁעוֹ por consistencia con el campo semántico de culpa/impiedad en contextos judiciales.
  - «Quebranta» conserva el tono peticionario y poético sin volverse arcaizante.
  - Se evitó «SEÑOR» y se mantuvo un registro bíblico transparente y auditable.
