theological_decisions:
- issue: Interpretation of κόσμος ὑπέρμαχος ... δικαίων
  chosen_reading: the created order actively supports and defends the righteous
  alternative_readings:
  - the universe is an ally of the righteous
  - the world is a champion of the righteous
  rationale: The verse personifies the world/creation as siding with the righteous in the plague narrative. The translation preserves the personification without over-systematizing it into a doctrinal statement about nature. 'Fights on behalf of' keeps the martial force of ὑπέρμαχος.
  doctrine_reference: Preserve theological tension rather than resolve it.
