translation:
  language: es
  text: ¡Oh madre, que con tus siete hijos derribaste la violencia del tirano, y anulaste sus malos designios, y mostraste la nobleza de la fe[a]!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el valor de la fe» o «la fidelidad»; la frase griega puede destacar tanto la nobleza mostrada por la fe como la firmeza noble de la devoción fiel.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὦ μήτηρ
  english_pob_choice: O mother
  chosen_spanish: ¡Oh madre!
  alternatives_spanish:
  - Madre
  - ¡Madre!
  lexicon: LSJ
  rationale: Conserva el vocativo exclamativo y el tono retórico elevado del griego sin volverlo innecesariamente arcaico.
- source_word: σὺν ἑπτὰ παισίν
  english_pob_choice: with your seven children
  chosen_spanish: con tus siete hijos
  alternatives_spanish:
  - con tus siete niños
  - con siete hijos
  lexicon: LSJ
  rationale: παῖς puede significar hijo o niño; aquí el contexto de la madre y sus siete descendientes masculinos favorece 'hijos'. 'Tus' es natural en español por el vocativo materno implícito.
- source_word: καταλύσασα
  english_pob_choice: brought down
  chosen_spanish: derribaste
  alternatives_spanish:
  - derrocaste
  - destruiste
  - echaste abajo
  lexicon: LSJ
  rationale: El verbo expresa derribar o hacer caer con fuerza; 'derribaste' comunica bien la acción contra el poder del tirano en un español claro y dinámico.
- source_word: τὴν τοῦ τυράννου βίαν
  english_pob_choice: the tyrant’s violence
  chosen_spanish: la violencia del tirano
  alternatives_spanish:
  - la fuerza del tirano
  - la brutalidad del tirano
  lexicon: LSJ
  rationale: βία significa fuerza violenta, coerción u opresión; 'violencia' preserva ese matiz y mantiene la oposición moral del contexto.
- source_word: ἀκυρώσασα
  english_pob_choice: nullified
  chosen_spanish: anulaste
  alternatives_spanish:
  - invalidaste
  - frustraste
  - cancelaste
  lexicon: LSJ
  rationale: El verbo significa dejar sin efecto o volver nulo; 'anulaste' expresa bien esa idea jurídica/efectiva en español.
- source_word: τὰς κακὰς ἐπινοίας αὐτοῦ
  english_pob_choice: his evil schemes
  chosen_spanish: sus malos designios
  alternatives_spanish:
  - sus malvados planes
  - sus perversos designios
  - sus malos planes
  lexicon: LSJ
  rationale: ἐπινοία denota plan, intento o designio. 'Designios' conserva un registro elevado acorde con el texto; 'malos' refleja κακάς sin sobrecargar el término.
- source_word: ἐπιδείξασα
  english_pob_choice: displayed
  chosen_spanish: mostraste
  alternatives_spanish:
  - manifestaste
  - demostraste
  - mostraste públicamente
  lexicon: LSJ
  rationale: El participio significa mostrar o exhibir; 'mostraste' es la forma más natural en español y conserva el sentido ejemplar y público.
- source_word: τὴν τῆς πίστεως γενναιότητα
  english_pob_choice: the nobility of faith
  chosen_spanish: la nobleza de la fe
  alternatives_spanish:
  - el valor de la fe
  - la valentía de la fe
  - la fidelidad noble
  lexicon: LSJ
  rationale: γενναιότης puede implicar nobleza, gallardía o valor. Se conserva 'nobleza' para reflejar el término base, y 'de la fe' sigue la lectura principal del POB inglés.
theological_decisions:
- issue: Sentido de πίστις
  english_pob_reading: faith
  chosen_spanish_reading: fe
  alternative_spanish_readings:
  - fidelidad
  - confianza
  rationale: La lectura principal del POB inglés es 'faith'. En este contexto de resistencia piadosa bajo persecución, 'fe' es la opción más directa y doctrinalmente transparente; 'fidelidad' sigue siendo posible, pero no se impone como lectura principal.
  doctrine_reference: 'DOCTRINE.md: Contested terms — πίστις → faith'
- issue: Matiz de γενναιότης
  english_pob_reading: the nobility of faith / the courage of faith / faithfulness
  chosen_spanish_reading: la nobleza de la fe
  alternative_spanish_readings:
  - el valor de la fe
  - la valentía de la fe
  - la fidelidad de la fe
  rationale: 'El griego admite una gama semántica entre nobleza, coraje y firmeza. El español principal mantiene la misma tensión que el POB inglés: una virtud noble mostrada por la fe, sin reducirla solo a ''valor'' ni a ''fidelidad''.'
  doctrine_reference: LSJ γενναιότης; English POB footnote a
translation_notes:
  revision_awareness: El auditorio inglés muestra alta concordancia con el griego y no registra cambios aplicados; esta versión española sigue de cerca las decisiones léxicas auditadas, conservando la ambigüedad significativa de γενναιότης/πίστις en una nota y evitando ampliar el sentido más allá del texto fuente.
  spanish_consistency_notes:
  - Se mantiene el vocativo con exclamación inicial para reflejar Ὦ.
  - Se usa 'hijos' en lugar de 'niños' o 'niños varones' porque el contexto histórico narrativo identifica a los siete hijos de la madre, sin necesidad de sobreespecificar.
  - '''Violencia'', ''anulaste'' y ''designios'' preservan un registro elevado y coherente con la retórica encomiástica del pasaje.'
  - La nota [a] se ancla en 'fe' para conservar la alternativa semántica documentada en el POB inglés.
