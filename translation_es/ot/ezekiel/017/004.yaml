translation:
  language: es
  text: Arrancó la punta de sus tiernos brotes y la llevó a la tierra de Canaán[a]; la puso en una ciudad de mercaderes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a una tierra de mercaderes»; «Canaán» puede tener aquí un sentido comercial, sobre todo por la frase paralela «ciudad de mercaderes».
    reason: lexical_alternative
lexical_decisions:
- source_word: רֹאשׁ
  english_pob_choice: topmost
  chosen_spanish: punta
  alternatives_spanish:
  - cima
  - parte más alta
  - extremo superior
  lexicon: HALOT
  rationale: En este contexto de brotes jóvenes, el término apunta a la parte superior o culminante del crecimiento. «Punta» comunica con naturalidad la imagen botánica sin sobrecargar el verso.
- source_word: יְנִיקוֹתָיו
  english_pob_choice: its young shoots
  chosen_spanish: sus tiernos brotes
  alternatives_spanish:
  - sus brotes jóvenes
  - sus retoños tiernos
  - sus vástagos
  lexicon: HALOT
  rationale: La raíz sugiere crecimiento tierno y reciente, con matiz de nutrición/lactancia, pero en el ámbito arbóreo la referencia es metafórica. «Tiernos brotes» conserva la imagen y la delicadeza del término.
- source_word: קָטָף
  english_pob_choice: plucked off
  chosen_spanish: arrancó
  alternatives_spanish:
  - desgajó
  - cortó
  - desprendió
  lexicon: HALOT
  rationale: El verbo expresa una acción enérgica de quitar o arrancar. «Arrancó» transmite bien la fuerza del gesto y sigue la metáfora vegetal.
- source_word: וַיְבִיאֵהוּ
  english_pob_choice: brought it
  chosen_spanish: la llevó
  alternatives_spanish:
  - la trajo
  - lo llevó
  - lo trajo
  lexicon: HALOT
  rationale: El sufijo retoma el brote como objeto metafórico; en español «la» concuerda con «punta» y mantiene la fluidez narrativa del movimiento.
- source_word: אֶרֶץ כְּנַעַן
  english_pob_choice: the land of Canaan
  chosen_spanish: la tierra de Canaán
  alternatives_spanish:
  - el país de Canaán
  - la tierra cananea
  lexicon: HALOT
  rationale: Se mantiene el nombre propio y la construcción natural en español. Aunque el contexto admite un matiz comercial, la forma visible «Canaán» preserva ese juego sin forzarlo en el texto principal.
- source_word: בְּעִיר רֹכְלִים
  english_pob_choice: in a city of merchants
  chosen_spanish: en una ciudad de mercaderes
  alternatives_spanish:
  - en una ciudad de comerciantes
  - en una ciudad mercantil
  lexicon: HALOT
  rationale: רֹכְלִים designa comerciantes/mercaderes. «Mercaderes» mantiene el paralelismo con el potencial sentido comercial de Canaán y suena más bíblico sin ser arcaico.
- source_word: שָׂמוֹ
  english_pob_choice: he set it
  chosen_spanish: la plantó
  alternatives_spanish:
  - la puso
  - la colocó
  - la estableció
  lexicon: HALOT
  rationale: Aunque el verbo básico es «poner/colocar», en el marco de un brote llevado para crecer la idea resultante es la de implantar/plantar. «La plantó» expresa la finalidad del acto con claridad en español.
theological_decisions:
- issue: Sentido posible de אֶרֶץ כְּנַעַן con matiz comercial
  english_pob_reading: '''Canaan'' can carry a commercial sense here, especially in light of the parallel phrase ''city of merchants.'''
  chosen_spanish_reading: Se conserva «la tierra de Canaán» en el texto, con una nota que reconoce el posible matiz comercial.
  alternative_spanish_readings:
  - la tierra de mercaderes
  - una tierra mercantil
  - la tierra de Canaán, es decir, tierra de comercio
  rationale: El hebreo permite una resonancia entre «Canaán» y el entorno de comercio, pero el propio nombre geográfico no debe desaparecer del texto principal. La nota recoge la alternativa sin imponerla como única lectura.
  doctrine_reference: Lexicografía y contexto poético-profético del texto
- issue: Referencia pronominal del objeto llevado y plantado
  english_pob_reading: it refers back to the shoot/topmost growth as a metaphorical object
  chosen_spanish_reading: Se traduce con pronombres femeninos por concordar con «punta» en español, aunque la imagen subyacente sigue siendo el brote/brote superior.
  alternative_spanish_readings:
  - lo llevó... lo plantó
  - lo llevó... lo puso
  - la llevó... la estableció
  rationale: El hebreo usa un sufijo que retoma el objeto vegetal sin marcar género. En español, la concordancia con «punta» hace más natural la frase; la nota deja visible que el referente metafórico es el brote.
  doctrine_reference: Gramática y metáfora vegetal del pasaje
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que fijó «the land of Canaan» y se preservó el nombre propio en español. También se respetó el paralelismo interno del verso entre la tierra de Canaán y la ciudad de mercaderes, sin diluir el posible juego léxico del hebreo.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto solo cuando aparezca el Tetragrámaton; este verso no lo contiene.
  - Se eligió un español moderno y bíblico, evitando calcos como «topmost» o «set it» que sonarían forzados.
  - La metáfora vegetal se conservó con «brotes» y «arrancó/plantó», sin convertir el verso en una paráfrasis interpretativa.
