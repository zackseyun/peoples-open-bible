translation:
  language: es
  text: el que me levanta a la gloria y lleva a los soberbios a la destrucción perpetua en deshonra[a][b], porque no lo conocieron[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «destrucción eterna»; más literalmente, «destrucción de la era».
    reason: lexical_alternative
  - marker: b
    text: O «en deshonor».
    reason: lexical_alternative
  - marker: c
    text: O «no lo reconocieron» o «no lo reconocieron como tal».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνιστῶν
  english_pob_choice: raises
  chosen_spanish: levanta
  alternatives_spanish:
  - alza
  - eleva
  - levanta de nuevo
  lexicon: BDAG
  rationale: El participio expresa acción de levantar o hacer subir. «Levanta» conserva el movimiento ascendente y funciona naturalmente en español sin cargar de más la idea honorífica.
- source_word: εἰς δόξαν
  english_pob_choice: to glory
  chosen_spanish: para gloria
  alternatives_spanish:
  - a gloria
  - hacia gloria
  - en gloria
  lexicon: BDAG
  rationale: La preposición εἰς indica meta o resultado. «Para gloria» comunica bien esa dirección final en español y evita una rigidez poco natural.
- source_word: κομίζων
  english_pob_choice: brings
  chosen_spanish: lleva
  alternatives_spanish:
  - trae
  - conduce
  - transporta
  lexicon: BDAG
  rationale: Aunque el inglés auditado usa «brings», el griego aquí puede funcionar como traer/llevar hacia un destino. «Lleva» mantiene la idea de conducir a un resultado sin añadir la paráfrasis de «poner a dormir» que fue rechazada en la revisión.
- source_word: ὑπερηφάνους
  english_pob_choice: the proud
  chosen_spanish: los soberbios
  alternatives_spanish:
  - los orgullosos
  - los arrogantes
  lexicon: BDAG
  rationale: «Soberbios» expresa con precisión el matiz moral de altivez y resulta idiomático en español bíblico contemporáneo.
- source_word: ἀπωλίαν αἰῶνος
  english_pob_choice: everlasting destruction
  chosen_spanish: la destrucción perpetua
  alternatives_spanish:
  - la destrucción eterna
  - la destrucción del siglo
  - la destrucción del tiempo
  lexicon: BDAG
  rationale: La combinación griega puede expresar destrucción duradera o de duración indefinida. «Perpetua» mantiene el valor de duración continua sin forzar una teoría temporal ajena al texto; se conserva la tensión entre un sentido más literal y uno más interpretativo en la nota.
- source_word: ἐν ἀτιμίᾳ
  english_pob_choice: in disgrace
  chosen_spanish: en deshonra
  alternatives_spanish:
  - en vergüenza
  - en deshonor
  - en oprobio
  lexicon: BDAG
  rationale: La expresión griega apunta a humillación pública y pérdida de honor. «En deshonra» es clara y respetuosa del matiz social del término.
- source_word: ἔγνωσαν
  english_pob_choice: did not know
  chosen_spanish: no lo conocieron
  alternatives_spanish:
  - no lo reconocieron
  - no lo reconocieron ni lo admitieron
  - no lo aceptaron
  lexicon: BDAG
  rationale: El verbo puede incluir conocimiento relacional, reconocimiento o aceptación. «No lo conocieron» es amplio y preserva esa ambigüedad semántica, tal como el audit trail inglés la deja abierta.
translation_notes:
  revision_awareness: La revisión más reciente corrigió una paráfrasis previa que entendía κομίζων como «poner a dormir»; el texto griego auditado aquí favorece un verbo de llevar/conducir. Por eso el español usa «lleva» y evita cualquier imagen idiomática de sueño. También se tuvo en cuenta la aparente tensión del paquete entre κομίζων y una nota de revisión sobre una lectura alternativa, sin introducir emendaciones no sustentadas en el texto base proporcionado.
  spanish_consistency_notes:
  - Se conserva «Dios/Yahvé» fuera de este versículo porque aquí no aparece el nombre divino; el pronombre implícito se refleja con «lo».
  - Se traduce εἰς δόξαν con una meta positiva («para gloria») y no con una equivalencia litúrgica fija, para mantener la dirección resultativa del griego.
  - La frase final se deja en singular («no lo conocieron») siguiendo el griego, aunque el contexto de la revisión en inglés oscila entre singular y plural; el referente aquí se entiende como el objeto señalado por αὐτόν.
