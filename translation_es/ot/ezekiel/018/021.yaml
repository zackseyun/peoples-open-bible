translation:
  language: es
  text: Pero si el impío se aparta[a] de todos sus pecados que ha cometido, y guarda todos mis estatutos, y hace lo que es justo y recto, ciertamente vivirá; no morirá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se arrepiente»; el verbo hebreo literalmente significa «volver/retornar» y aquí describe apartarse del pecado.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָרָשָׁע
  english_pob_choice: But if the wicked
  chosen_spanish: Pero si el impío
  alternatives_spanish:
  - Pero si el malvado
  - Y el impío
  lexicon: HALOT
  rationale: «Rָשָׁע» describe a un individuo caracterizado por su impiedad. «Impío» conserva el valor sustantivo y moral sin añadir un calco innecesario. Se mantiene la marca de contraste con «Pero» para reflejar el inicio discursivo del versículo.
- source_word: יָשׁוּב
  english_pob_choice: turns from / turns back
  chosen_spanish: se aparta
  alternatives_spanish:
  - vuelve
  - se vuelve
  lexicon: HALOT
  rationale: El verbo hebreo שׁוּב expresa la imagen concreta de volverse/retornarse. En este contexto con «de todos sus pecados» la idea es apartarse de ellos; «se aparta» comunica el movimiento sin forzar el tecnicismo «arrepentirse».
- source_word: מִכָּל חטאתו
  english_pob_choice: from all his sins
  chosen_spanish: de todos sus pecados
  alternatives_spanish:
  - de todos sus pecados cometidos
  - de toda su culpa
  lexicon: HALOT
  rationale: El hebreo es distributivo y se refiere a actos pecaminosos concretos. «Pecados» es el equivalente más natural y preciso en español; «culpa» sería más abstracto y menos fiel al plural implícito.
- source_word: אֲשֶׁר עָשָׂה
  english_pob_choice: that he has committed
  chosen_spanish: que ha cometido
  alternatives_spanish:
  - que hizo
  - que ha hecho
  lexicon: HALOT
  rationale: Aunque עָשָׂה literalmente significa «hacer», con «pecados» en español el verbo idiomático es «cometer». El perfecto mantiene la relación con el acto ya realizado.
- source_word: וְשָׁמַר
  english_pob_choice: and keeps
  chosen_spanish: y guarda
  alternatives_spanish:
  - y observa
  - y cumple
  lexicon: HALOT
  rationale: שׁמר con estatutos implica custodiar/observar fielmente. «Guardar» es un equivalente bíblico claro y más cercano a la carga de fidelidad normativa que «cumplir» en este contexto.
- source_word: חֻקּוֹתַי
  english_pob_choice: my statutes
  chosen_spanish: mis estatutos
  alternatives_spanish:
  - mis decretos
  - mis ordenanzas
  lexicon: HALOT
  rationale: «Estatutos» preserva la distinción legal-covenantal de חֻקִּים y coincide con el valor habitual del término sin confundirlo con otros mandatos.
- source_word: וְעָשָׂה מִשְׁפָּט וּצְדָקָה
  english_pob_choice: and does what is just and right
  chosen_spanish: y hace lo que es justo y recto
  alternatives_spanish:
  - y practica justicia y rectitud
  - y hace justicia y rectitud
  lexicon: HALOT
  rationale: La combinación hebrea une dos sustantivos éticos fuertes. En español, «lo que es justo y recto» conserva ambos términos con naturalidad y evita reducir la expresión a una formulación más abstracta.
- source_word: מִשְׁפָּט
  english_pob_choice: just
  chosen_spanish: justo
  alternatives_spanish:
  - justicia
  - juicio
  lexicon: HALOT
  rationale: En este marco ético, el adjetivo «justo» expresa bien el valor de מִשְׁפָּט sin la posible ambigüedad de «juicio». Al estar integrado en la frase verbal, mantiene fluidez y fidelidad.
- source_word: צְדָקָה
  english_pob_choice: right
  chosen_spanish: recto
  alternatives_spanish:
  - rectitud
  - justo
  lexicon: HALOT
  rationale: צְדָקָה puede rendirse como «justicia» o «rectitud», pero aquí «recto» permite distinguirlo de «justo» y conservar la pareja hebrea de modo transparente en español.
- source_word: חָיֹה יִחְיֶה
  english_pob_choice: he shall surely live
  chosen_spanish: ciertamente vivirá
  alternatives_spanish:
  - vivirá ciertamente
  - vivirá de veras
  lexicon: HALOT
  rationale: La construcción infinitivo absoluto + imperfecto intensifica la afirmación. «Ciertamente vivirá» comunica bien la fuerza enfática sin sobrecargar el verso con una perífrasis artificial.
- source_word: לֹא יָמוּת
  english_pob_choice: he shall not die
  chosen_spanish: no morirá
  alternatives_spanish:
  - no morirá en absoluto
  - no habrá de morir
  lexicon: HALOT
  rationale: La negación es directa y solemne. «No morirá» conserva el paralelismo con la promesa anterior de vida y evita añadir matices no explícitos en el hebreo.
theological_decisions:
- issue: Cómo rendir שׁוּב en un contexto moral y profético
  english_pob_reading: turns from / turns back
  chosen_spanish_reading: se aparta
  alternative_spanish_readings:
  - se vuelve
  - se arrepiente
  rationale: El versículo enfatiza el cambio de dirección respecto del pecado. «Se aparta» mantiene la metáfora concreta del giro sin imponer de entrada la formulación teológica «se arrepiente», aunque esa lectura sigue siendo posible.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Cómo entender la promesa de vida en חָיֹה יִחְיֶה
  english_pob_reading: he shall surely live
  chosen_spanish_reading: ciertamente vivirá
  alternative_spanish_readings:
  - vivirá seguramente
  - seguirá con vida
  rationale: La expresión hebrea queda amplia y no se reduce a una sola esfera (física, pactual o escatológica). «Ciertamente vivirá» preserva esa amplitud y la fuerza enfática del original.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: 'La traducción sigue de cerca el cierre editorial más reciente del audit trail: conserva la idea de «turns from» con una formulación española natural, evita un sustantivo genérico como «persona» para הָרָשָׁע, y mantiene la pareja ética del hebreo sin desdoblarla en términos ajenos al verso. También se corrigió la anclación de la nota para que aparezca explícitamente en el texto.'
  spanish_consistency_notes:
  - Se usa «impío» para הָרָשָׁע conforme a la preferencia de mantener el valor sustantivo moral.
  - «Estatutos» se reserva para חֻקּוֹתַי como término legal-covenantal estándar.
  - La pareja «justo y recto» conserva la distinción entre מִשְׁפָּט y צְדָקָה sin recurrir a una paráfrasis extensa.
  - La nota [a] está anclada correctamente en «se aparta[a]» para reflejar la alternativa lexical documentada.
