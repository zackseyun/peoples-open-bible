base_translation:
  language: en
  yaml_path: translation/ot/1_chronicles/011/010.yaml
  text: Now these were the chiefs of the mighty men who belonged to David[a], who strengthened themselves with him in his kingdom, together with all Israel, to make him king[b], according to the word of Yahweh concerning Israel.
  footnotes:
  - marker: a
    text: Or, 'who strengthened themselves with him' or 'who supported him strongly.' The Hebrew expression can be rendered more literally, but here likely refers to rallying to David in support of his kingship.
    reason: lexical_alternative
  - marker: b
    text: Or, 'according to the word of the LORD over Israel.' The Hebrew more literally reads 'upon Israel,' but in this construction likely means 'concerning Israel.'
    reason: lexical_alternative
