  to: Ella se levantó y se postró con el rostro en tierra, y dijo:[a] «He aquí, tu esclava[b] es una sierva para lavar los pies de los siervos de mi señor».[c]
  rationale: Se ajustó la frase de reverencia a un español más natural y más fiel a la idea de postración profunda, y se corrigió עַבְדֵי de «esclavos» a «siervos» para seguir la decisión contextual documentada en la POB inglesa. Se mantuvo la distinción entre «tu esclava» y «una sierva» porque preserva la variación hebrea de autohumillación sin sonar excesivamente artificial en español.
  reviewer_model: gpt-5.4
