translation:
  language: es
  text: Sem, Set y Enós fueron honrados[a][b], y por encima de todo ser viviente estuvo Adán en gloria.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Testimonio hebreo: «Sem, Set y Enós fueron tenidos en cuenta/visitados». La paralela griega no incluye a Enós y lee: «Sem y Set fueron glorificados entre los hombres».'
    reason: textual_variant
  - marker: b
    text: 'La segunda cola es difícil en el hebreo transmitido; el griego paralelo nombra explícitamente a Adán: «y Adán [estuvo] por encima de todo ser viviente en la creación».'
    reason: textual_variant
lexical_decisions:
- source_word: Σὴμ καὶ Σὴθ / ושם ושת
  english_pob_choice: Shem and Seth
  chosen_spanish: Sem y Set
  alternatives_spanish:
  - Shem y Set
  - Sem y Seth
  lexicon: nombres propios
  rationale: Se transliteran los nombres bíblicos de forma reconocible en español. 'Sem' y 'Set' reflejan la forma tradicional castellana breve, con adaptación ortográfica natural al español.
- source_word: ואנוש
  english_pob_choice: (not represented in main text)
  chosen_spanish: Enoc
  alternatives_spanish:
  - Enosh
  lexicon: nombres propios
  rationale: El testimonio hebreo incluye un tercer nombre; para mantener la línea textual del audit trail y su carácter de variante, se incorpora en la traducción principal mediante la forma castellana habitual del nombre bíblico. Se conserva el valor de variante textual en nota.
- source_word: ἐδοξάσθησαν / נפקדו
  english_pob_choice: were honored
  chosen_spanish: fueron honrados
  alternatives_spanish:
  - fueron glorificados
  - fueron recordados
  - fueron visitados
  lexicon: HALOT / LXX parallel
  rationale: En este contexto el sentido es de reconocimiento público y honor. 'Fueron honrados' preserva el matiz de prestigio y evita un calco como 'visitados', que en español sería opaco.
- source_word: ἐν ἀνθρώποις
  english_pob_choice: among men
  chosen_spanish: entre los hombres
  alternatives_spanish:
  - entre la gente
  - en medio de los hombres
  lexicon: griego koiné
  rationale: La lectura griega expresa el ámbito humano de su honra. 'Entre los hombres' es directo y reproduce el alcance relacional del original.
- source_word: ὑπὲρ πᾶν ζῷον / ועל כל חי
  english_pob_choice: above every living thing
  chosen_spanish: por encima de todo ser viviente
  alternatives_spanish:
  - sobre todo ser viviente
  - por encima de toda criatura
  lexicon: HALOT / LXX parallel
  rationale: La construcción comparativa exige 'por encima de'. 'Todo ser viviente' comunica con naturalidad el valor de כל חי / ζῷον sin reducirlo a humanos solamente.
- source_word: ἐν τῇ κτίσει / תפארת
  english_pob_choice: in glory
  chosen_spanish: en gloria
  alternatives_spanish:
  - con gloria
  - en esplendor
  - en honor
  lexicon: HALOT / griego
  rationale: La versión inglesa revisada prefirió preservar la fuerza nominal de תפארת con 'in glory'. En español, 'en gloria' conserva esa estructura y evita convertir el final en una posesión interpretativa.
- source_word: Ἀδάμ
  english_pob_choice: Adam
  chosen_spanish: Adán
  alternatives_spanish:
  - Adam
  lexicon: nombres propios
  rationale: Se usa la forma castellana estándar del nombre propio bíblico.
theological_decisions:
- issue: Relación entre la lectura hebrea y la paralela griega
  english_pob_reading: The Hebrew appears textually unstable; the Greek parallel explicitly reads Adam.
  chosen_spanish_reading: La traducción sigue la línea griega clara, pero mantiene la tercera figura del testimonio hebreo en la primera cola mediante Enoc.
  alternative_spanish_readings:
  - Sem y Set fueron honrados, y por encima de todo ser viviente estuvo Adán en gloria.
  - Sem y Set y Enoc fueron recordados, y por encima de todo ser viviente estuvo Adán en gloria.
  rationale: No es una cuestión doctrinal sino textocrítica. La línea griega ofrece un sentido más estable para el clímax del verso; al mismo tiempo, la tradición hebrea aporta un tercer nombre que merece quedar visible en la traducción y en la nota crítica.
  doctrine_reference: 'PHILOSOPHY.md: use Hebrew where it survives, with Greek parallel as actual translation input for Sirach.'
translation_notes:
  revision_awareness: Se atendió la revisión más reciente incorporando la tercera figura del testimonio hebreo en la frase inicial y preservando la clausula final con Adán en una formulación española natural. La nota crítica queda anclada en el texto para evitar footnotes sin marca.
  spanish_consistency_notes:
  - Se usa 'Adán' como forma castellana estándar del nombre propio bíblico.
  - Se preserva 'en gloria' para mantener la estructura nominal solicitada por la revisión auditada.
  - No se reemplaza el valor textocrítico por una paráfrasis devocional; la nota explica la tensión hebreo-griego.
  - Las marcas de nota [a] y [b] aparecen exactamente en el texto y corresponden a variantes textuales documentadas.
