translation:
  language: es
  text: Es un lamento[a], y las hijas[b] de las naciones se lamentarán sobre ella. Se lamentarán sobre Egipto y sobre toda su multitud, declara el Señor Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «endecha» o «lamentación»; el hebreo קִינָה puede designar un canto fúnebre o un lamento.
    reason: lexical_alternative
  - marker: b
    text: O «las mujeres de las naciones»; literalmente «las hijas de las naciones».
    reason: lexical_alternative
lexical_decisions:
- source_word: קִינָה
  english_pob_choice: lamentation
  chosen_spanish: lamento
  alternatives_spanish:
  - endecha
  - canto fúnebre
  - lamentación
  lexicon: HALOT
  rationale: קִינָה denota un canto fúnebre o lamento. En español, «lamento» es natural y conserva el tono sobrio; «lamentación» también es posible, pero puede sonar más abstracta o eclesiástica. «Endecha» y «canto fúnebre» son más específicos, pero menos fluidos aquí.
- source_word: בְּנוֹת הַגּוֹיִם
  english_pob_choice: the daughters of the nations
  chosen_spanish: las hijas de las naciones
  alternatives_spanish:
  - las mujeres de las naciones
  - las hijas de los pueblos
  lexicon: HALOT
  rationale: La imagen literal se conserva con «hijas». En español, «hijas de las naciones» mantiene la metáfora del hebreo y la posible referencia a mujeres dolientes sin sustituirla por una explicación interpretativa.
- source_word: תְּקוֹנֵנָּה
  english_pob_choice: will lament
  chosen_spanish: se lamentarán
  alternatives_spanish:
  - clamarán en duelo
  - entonarán un lamento
  - llorarán
  lexicon: HALOT
  rationale: El verbo expresa la acción futura de lamentar o entonar un duelo. «Se lamentarán» es idiomático y conserva el paralelismo con el sustantivo inicial קִינָה.
- source_word: עַל
  english_pob_choice: over
  chosen_spanish: sobre
  alternatives_spanish:
  - por
  - acerca de
  lexicon: HALOT
  rationale: En contexto de duelo, «sobre» reproduce bien el valor relacional del hebreo y la formulación tradicional de lamento en español.
- source_word: מִצְרַיִם
  english_pob_choice: Egypt
  chosen_spanish: Egipto
  alternatives_spanish:
  - la tierra de Egipto
  lexicon: HALOT
  rationale: Nombre propio estándar en español.
- source_word: כָּל הֲמוֹנָהּ
  english_pob_choice: all her multitude
  chosen_spanish: toda su multitud
  alternatives_spanish:
  - toda su muchedumbre
  - todo su gentío
  - toda su turba
  lexicon: HALOT
  rationale: הָמוֹן puede indicar multitud, masa o muchedumbre. «Multitud» mantiene la amplitud semántica y evita estrechar indebidamente el sentido hacia lo militar o lo despectivo.
- source_word: נְאֻם אֲדֹנָי יְהוִה
  english_pob_choice: declares the Lord GOD
  chosen_spanish: dice el Señor Yahvé
  alternatives_spanish:
  - declara el Señor Yahvé
  - oráculo del Señor Yahvé
  - dice el Señor DIOS
  lexicon: HALOT
  rationale: La fórmula profética נְאֻם se vierte de forma sobria como «dice». YHWH se traduce según el criterio del proyecto como «Yahvé», no como un enmascaramiento tipográfico. Dado que אֲדֹנָי precede al nombre divino, «Señor Yahvé» preserva la distinción sin duplicación artificial.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה en la fórmula profética
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: Señor Yahvé
  alternative_spanish_readings:
  - Señor DIOS
  - Señor Dios
  - Yahvé
  rationale: El packet fuente y la doctrina del proyecto piden representar el Tetragrámaton como «Yahvé». En la fórmula אֲדֹנָי יְהוִה, traducir literalmente ambos elementos como «Señor Yahvé» conserva la doble referencia del hebreo sin ocultar el nombre divino ni producir una repetición extraña.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de בְּנוֹת הַגּוֹיִם
  english_pob_reading: the daughters of the nations
  chosen_spanish_reading: las hijas de las naciones
  alternative_spanish_readings:
  - las mujeres de las naciones
  - las mujeres de los pueblos
  rationale: Mantener «hijas» respeta la imagen hebrea. No se reemplaza por «mujeres» en el texto principal porque el hebreo conserva una formulación figurada que puede incluir a las plañideras sin explicitarlo.
  doctrine_reference: Principio de transparencia léxica y respeto a la imagen original
translation_notes:
  revision_awareness: 'Se revisó el contexto auditado en inglés y el resultado de control cruzado; aunque hubo observaciones de revisión, la elección final mantiene la terminología del proyecto (Yahvé) y conserva las dos tensiones léxicas principales: קִינָה como lamento/endecha y בְּנוֹת הַגּוֹיִם como imagen literal de hijas de las naciones.'
  spanish_consistency_notes:
  - Se usó «Yahvé» conforme al estándar del proyecto para יהוה.
  - Se mantuvo «Señor» para אֲדֹנָי, evitando una adaptación litúrgica como «SEÑOR».
  - «Multitud» se mantuvo sin especificar fuerza militar para no reducir הֲמוֹנָהּ.
  - La sintaxis sigue el paralelismo del hebreo con dos miembros de lamento.
  - Se conservaron notas alternativas donde el español abre una ambigüedad legítima en el término de duelo.
