lexical_decisions:
- source_word: ⲕⲟⲩⲓ
  english_pob_choice: little ones
  chosen_spanish: pequeños
  alternatives_spanish:
  - niños
  - pequeñitos
  - pequeños
  lexicon: Crum, s.v. ⲕⲟⲩⲓ
  rationale: En español, “pequeños” conserva la pequeñez sin imponer de inmediato “infantes” o “niños”, que estrecharían demasiado el alcance. Dado que el contexto inmediato habla de lactancia, el término sigue siendo suficientemente concreto y natural.
- source_word: ϫⲓⲉⲣⲱⲧⲉ
  english_pob_choice: being suckled
  chosen_spanish: estaban siendo amamantados
  alternatives_spanish:
  - estaban siendo lactados
  - eran amamantados
  - estaban siendo alimentados al pecho
  lexicon: Crum, s.v. ϫⲓⲉⲣⲱⲧⲉ
  rationale: La forma pasiva progresiva pide una traducción explícita de acción en curso. “Amamantados” es claro y digno en español; “lactados” suena técnico y menos natural para lectura pública.
- source_word: ⲙⲛⲧⲣⲣⲟ
  english_pob_choice: Kingdom
  chosen_spanish: Reino
  alternatives_spanish:
  - reinado
  - realeza
  - kingship
  lexicon: Crum, s.v. ⲙⲛⲧⲣⲣⲟ; Lambdin, Introduction to Sahidic Coptic
  rationale: Aunque el sustantivo copto es abstracto y puede sugerir reinado o realeza, el español “Reino” mantiene la idiomaticidad de Thomas y la noción de ámbito de entrada. Se conserva la mayúscula por tratamiento titular.
- source_word: ⲧⲛ̄ⲛⲁⲃⲱⲕ / ⲛⲁⲃⲱⲕ
  english_pob_choice: we may enter
  chosen_spanish: entremos / entrarán
  alternatives_spanish:
  - entraremos
  - podamos entrar
  - han de entrar
  lexicon: Lambdin (futuro modal con ⲛⲁ + infinitivo); Crum, s.v. ⲃⲱⲕ
  rationale: En la pregunta de los discípulos, el español natural exige interrogativa directa con futuro de acción (“entraremos”) o subjuntivo modal (“entremos”). Opté por “entraremos” para mantener la fuerza interrogativa sin añadir una perífrasis más explicativa; en la declaración de Jesús, “han de entrar” refleja la expectativa futura del copto.
- source_word: ⲡⲥⲛⲁⲩ ⲟⲩⲁ
  english_pob_choice: make the two one
  chosen_spanish: hagan de los dos uno
  alternatives_spanish:
  - hagan uno a los dos
  - unifiquen los dos
  - hagan los dos uno
  lexicon: Layton, Coptic Grammar; Crum, s.vv. ⲥⲛⲁⲩ, ⲟⲩⲁ
  rationale: “Hagan de los dos uno” conserva el valor resultativo del copto y su compacta paradoja. Es más idiomático en español que un calco rígido, pero sigue muy cerca de la formulación tradicional de Thomas.
- source_word: ⲛϩⲟⲩⲛ / ⲛⲃⲟⲗ
  english_pob_choice: inner / outer
  chosen_spanish: lo de dentro / lo de fuera
  alternatives_spanish:
  - interior / exterior
  - adentro / afuera
  - lo interior / lo exterior
  lexicon: Crum, s.vv. ϩⲟⲩⲛ, ⲃⲟⲗ
  rationale: “Lo de dentro” y “lo de fuera” preservan el paralelismo y evitan sustantivaciones demasiado abstractas. Además, suenan naturales en castellano y conservan la extrañeza deliberada del dicho.
- source_word: ⲡϩⲉ / ⲡⲡⲉ
  english_pob_choice: upper / lower
  chosen_spanish: lo de arriba / lo de abajo
  alternatives_spanish:
  - arriba / abajo
  - lo alto / lo bajo
  - el cielo / la tierra
  lexicon: Crum, s.vv. ⲡϩⲉ, ⲡⲡⲉ
  rationale: La revisión auditada descartó leer aquí “back/front”; el copto sostiene una sola polaridad espacial. En español, “lo de arriba / lo de abajo” mantiene la simetría sin forzar una equivalencia cosmológica no explícita en este testimonio.
- source_word: ⲡϩⲟⲟⲩⲧ
  english_pob_choice: male
  chosen_spanish: varón
  alternatives_spanish:
  - macho
  - hombre
  - masculino
  lexicon: Crum, s.v. ⲡϩⲟⲟⲩⲧ
  rationale: “Varón” es el equivalente más sobrio para el polo sexual masculino en este enunciado. Evita la sobrecarga social de “hombre” y mantiene el contraste con “mujer”.
- source_word: ⲥϩⲓⲙⲉ
  english_pob_choice: female
  chosen_spanish: mujer
  alternatives_spanish:
  - hembra
  - femenina
  - fémina
  lexicon: Crum, s.v. ⲥϩⲓⲙⲉ
  rationale: Aquí el español más natural y digno es “mujer”, especialmente en la pareja fija “varón y mujer”. Aunque “female” podría pedirse como “hembra”, eso sonarían deshumanizante en español bíblico-litúrgico; el contraste se mantiene por la simetría con “varón”.
- source_word: ϩⲓⲕⲱⲛ
  english_pob_choice: image
  chosen_spanish: imagen
  alternatives_spanish:
  - icono
  - semejanza
  - figura
  lexicon: Crum, s.v. ϩⲓⲕⲱⲛ
  rationale: “Imagen” es transparente y fiel al préstamo griego, y funciona bien en la serie de sustituciones corporales. “Icono” sería demasiado técnico y “semejanza” desplazaría el término.
theological_decisions:
- issue: Lenguaje del Reino como ámbito de entrada
  english_pob_reading: The POB preserves 'Kingdom' for ⲙⲛⲧⲣⲣⲟ, noting the abstract sense of kingship/reign while keeping the familiar term.
  chosen_spanish_reading: Se conserva “Reino” como término de entrada, sin convertirlo en “reinado” o “realeza” en el texto principal.
  alternative_spanish_readings:
  - reinado
  - realeza
  - señorío
  rationale: En español, “Reino” es el equivalente más reconocible y litúrgicamente legible. Las alternativas pueden reflejar mejor la abstracción del copto, pero sonarían demasiado interpretativas para una redacción fuente-auditable.
  doctrine_reference: Nota lexical, no doctrinal; evita imponer una eclesiología o escatología particular al dicho.
- issue: Antítesis corporal y sexual final
  english_pob_reading: 'The POB renders the final series as a sequence of in-place-of substitutions leading to a state of non-differentiation: male not male and female not female.'
  chosen_spanish_reading: Se mantiene la serie con “varón” y “mujer” y la cláusula “de modo que el varón no sea varón y la mujer no sea mujer”.
  alternative_spanish_readings:
  - de manera que el varón no sea varón y la mujer no sea mujer
  - para que el varón no sea varón y la mujer no sea mujer
  - de suerte que el varón no sea varón y la mujer no sea mujer
  rationale: El español debe conservar la tensión del dicho sin suavizarla en categorías psicológicas o simbólicas. “Varón/mujer” mantiene el paralelismo sexual del copto y la paradoja del enunciado.
  doctrine_reference: No doctrinaliza una antropología; simplemente refleja la forma del dicho en Thomas y su contraste retórico.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente: se rechazó la lectura errónea de una pareja “back/front” y se mantuvo la estructura copta con una sola oposición espacial. También se corrigió la sintaxis del dicho de los discípulos para reflejar la cláusula circumstancial de ''siendo pequeños'' en lugar de introducir un verbo de ''llegar a ser''.'
  spanish_consistency_notes:
  - Se normaliza la voz de Jesús con comillas españolas y se preserva la progresión condicional temporal mediante “Cuando… y cuando…”.
  - Se usa mayúscula en “Reino” por tratarse del término técnico/escatológico recurrente del dicho.
  - Las series paralelas (“lo de dentro / lo de fuera”, “lo de arriba / lo de abajo”, “varón / mujer”) se mantuvieron con ritmo balanceado para reflejar la estructura enumerativa del copto.
  - No se introdujeron elementos ausentes del copto, como “atrás/frente” o un lenguaje doctrinal ajeno a Thomas.
