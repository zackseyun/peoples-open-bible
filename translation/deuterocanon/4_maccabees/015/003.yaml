theological_decisions:
- issue: Meaning of κατὰ θεόν in relation to salvation and piety
  chosen_reading: Render literally as 'according to God' without resolving whether it means 'in accordance with God's will/standard' or a similar nuance.
  alternative_readings:
  - in accordance with God
  - as God wills
  - in God's sight
  rationale: The phrase is not a standard doctrinal formula here and can modify the saving efficacy of piety in a God-directed or God-approved sense. Preserving the tension fits the project's philosophy of not over-resolving ambiguity.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve it
