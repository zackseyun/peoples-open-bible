translation:
  language: es
  text: Y toda la tierra[a] vino al bosque, y había miel sobre la superficie del campo.[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente, «toda la tierra vino al bosque»; la expresión probablemente tiene un sentido colectivo, es decir, «toda la gente del país» o «del lugar».
    reason: lexical_alternative
  - marker: b
    text: O «sobre la faz del campo». El modismo hebreo puede referirse a miel tendida sobre la superficie visible del suelo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/כָל הָ/אָ֖רֶץ
  english_pob_choice: all the land
  chosen_spanish: todo el territorio
  alternatives_spanish:
  - toda la tierra
  - todo el país
  - toda la gente del territorio
  lexicon: HALOT
  rationale: El hebreo dice literalmente «toda la tierra/land», pero en este contexto funciona de manera colectiva o territorial. En español, «todo el territorio» conserva el alcance amplio sin forzar una lectura de personas que el texto hebreo no explicita aquí.
- source_word: בָּ֣אוּ
  english_pob_choice: came into
  chosen_spanish: entró
  alternatives_spanish:
  - vino a
  - entraron
  - fue a
  lexicon: HALOT
  rationale: El verbo בוא con una expresión direccional suena naturalmente en español como «entró/entraron». Como el sujeto hebreo es colectivo, «entró» mantiene el sentido global sin introducir una formulación demasiado perifrástica.
- source_word: בַ/יָּ֑עַר
  english_pob_choice: the forest
  chosen_spanish: el bosque
  alternatives_spanish:
  - la selva
  - el monte
  lexicon: HALOT
  rationale: יַעַר designa un área boscosa. «Bosque» es la opción clara y estándar en español, más neutral que «selva» y más precisa que «monte» en este contexto.
- source_word: וַ/יְהִ֥י
  english_pob_choice: there was
  chosen_spanish: había
  alternatives_spanish:
  - y había
  - y existía
  lexicon: HALOT
  rationale: Aquí היה introduce la presencia de algo en la escena. En español, «había» expresa con naturalidad la existencia de la miel, sin perder la fuerza descriptiva del hebreo.
- source_word: דְבַ֖שׁ
  english_pob_choice: honey
  chosen_spanish: miel
  alternatives_spanish:
  - miel silvestre
  lexicon: HALOT
  rationale: דבש significa ordinariamente «miel». El contexto del bosque puede sugerir miel silvestre, pero el hebreo no la especifica; por eso se conserva el término general.
- source_word: עַל פְּנֵ֥י הַ/שָּׂדֶֽה
  english_pob_choice: on the surface of the field
  chosen_spanish: sobre la superficie del campo
  alternatives_spanish:
  - sobre la faz del campo
  - sobre la tierra abierta
  - sobre el campo
  lexicon: HALOT
  rationale: La expresión עַל־פְּנֵי conserva la imagen de algo extendido sobre la superficie visible. «Superficie del campo» sigue de cerca el hebreo y evita suavizar la metáfora espacial.
translation_notes:
  revision_awareness: 'El borrador sigue la revisión más reciente del POB en inglés, que volvió al sentido más cercano del hebreo: mantiene una formulación colectiva/territorial para וְכָל הָאָרֶץ, usa un verbo direccional simple para בוא, traduce שדה como «campo» y conserva la imagen de miel sobre la superficie visible. No se adoptó la paráfrasis «la gente del territorio», porque el registro español puede preservar mejor la literalidad colectiva sin añadir un sujeto explícito que el hebreo no pone aquí.'
  spanish_consistency_notes:
  - Se mantuvo un español neutro y sobrio, apto para lectura eclesial amplia.
  - Se evitó «Señor» u otras sustituciones irrelevantes, ya que no hay nombre divino en el versículo.
  - «Territorio» se eligió para preservar el alcance colectivo del hebreo sin añadir una explicitación antropológica ajena al texto.
  - Se conservó «campo» en la imagen final para seguir la revisión inglesa más cercana al hebreo y mantener la relación con la construcción preposicional.
  - No se añadieron notas de pie porque el texto español quedó suficientemente transparente sin introducir ambigüedad nueva.
