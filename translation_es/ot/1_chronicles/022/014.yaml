  to: He aquí[a], en mi aflicción he preparado para la casa de Yahvé cien mil talentos de oro, y un millón[b] de talentos de plata; para el bronce y para el hierro no hay peso, porque había en abundancia. He preparado madera y piedras, y tú puedes añadirles[c].
