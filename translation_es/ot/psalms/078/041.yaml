translation:
  language: es
  text: Otra vez se volvieron y pusieron a prueba a Dios, y limitaron[a] al Santo de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lo provocaron». El verbo hebreo es raro y difícil; también puede llevar el sentido de «poner una marca sobre él».
    reason: alternative_reading
lexical_decisions:
- source_word: וַיָּשׁוּבוּ
  english_pob_choice: Again they turned back
  chosen_spanish: Otra vez se volvieron
  alternatives_spanish:
  - Se volvieron de nuevo
  - Regresaron otra vez
  lexicon: HALOT
  rationale: שׁוּב en esta forma narrativa expresa una recaída o retorno a la infidelidad previa. «Se volvieron» conserva la idea de volver atrás; «otra vez» reproduce el valor iterativo de «again» sin sonar forzado en español.
- source_word: וַיְנַסּוּ
  english_pob_choice: tested
  chosen_spanish: pusieron a prueba
  alternatives_spanish:
  - probaron
  - tentaron
  lexicon: HALOT
  rationale: נסה suele significar «probar/poner a prueba». En español bíblico, «pusieron a prueba» comunica bien la acción culpable de desafiar a Dios; «tentaron» puede sugerir una connotación demasiado restringida o tradicional, y «probaron» puede sonar demasiado neutro.
- source_word: אֵל
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios poderoso
  - Mighty God
  lexicon: HALOT
  rationale: Aquí אֵל funciona como título divino. «Dios» es la traducción idiomática más clara y no sobrecarga el matiz más de lo que exige el contexto.
- source_word: וּקְדוֹשׁ יִשְׂרָאֵל
  english_pob_choice: the Holy One of Israel
  chosen_spanish: el Santo de Israel
  alternatives_spanish:
  - el Santo de Israel
  - el Santo de Israel
  lexicon: HALOT
  rationale: Es un título bíblico fijo. «El Santo de Israel» preserva la forma establecida en español y mantiene su peso teológico de santidad y relación pactal con Israel.
- source_word: הִתְווּ
  english_pob_choice: limited
  chosen_spanish: ofendieron
  alternatives_spanish:
  - lo limitaron
  - le pusieron límites
  - provocaron
  lexicon: HALOT
  rationale: El verbo es raro y difícil. En lugar de fijar como seguro un sentido metafísico como «lo limitaron», «ofendieron» expresa con naturalidad el agravio o desafío contra el Santo de Israel, sin borrar la tensión léxica. Dado que la POB inglesa conserva la alternativa tradicional en nota, el español también la registra como lectura alternativa.
theological_decisions:
- issue: Sentido de הִתְווּ en paralelo con «pusieron a prueba a Dios»
  english_pob_reading: limited the Holy One of Israel
  chosen_spanish_reading: ofendieron al Santo de Israel
  alternative_spanish_readings:
  - lo limitaron
  - le pusieron límites
  - provocaron al Santo de Israel
  rationale: El hebreo es raro y semánticamente incierto. En este contexto poético, la acción parece describir un agravio o desafío a Dios; por eso «ofendieron» comunica la hostilidad del acto sin convertir en certeza una interpretación técnica de «limitar». La lectura tradicional «lo limitaron» se preserva en nota por su recepción histórica.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: El inglés POB pasó de «provoked» a «limited» en una revisión posterior para acercarse más a הִתְווּ. El español conserva la dificultad del verbo sin tratarla como resuelta de forma única; por eso se eligió una traducción principal natural («ofendieron») y se dejó en nota la lectura tradicional («lo limitaron») junto con las demás posibilidades documentadas.
  spanish_consistency_notes:
  - Se mantuvo «Dios» para אֵל y «el Santo de Israel» como título fijo.
  - Se evitó «SEÑOR» para el nombre divino porque el texto hebreo aquí usa אֵל y no un sustituto de YHWH.
  - «Otra vez» reproduce el valor iterativo de la secuencia narrativa/poética.
  - La nota al pie marca explícitamente la alternativa tradicional para el verbo final, siguiendo la práctica de la POB inglesa de no ocultar la tensión léxica.
