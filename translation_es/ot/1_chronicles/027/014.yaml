translation:
  language: es
  text: Para el mes duodécimo[a], Benaía el piratonita, de entre los hijos de Efraín; y sobre su división estaban veinticuatro mil.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'de Efraín'. El hebreo dice literalmente 'de los hijos de Efraín', lo que indica descendencia o pertenencia tribal.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַשְׁתֵּי עָשָׂר לְעַשְׁתֵּי עָשָׂר הַחֹדֶשׁ
  english_pob_choice: For the twelfth month
  chosen_spanish: Para el mes duodécimo
  alternatives_spanish:
  - Para el mes doce
  - Para el duodécimo mes
  lexicon: HALOT
  rationale: El hebreo usa una construcción ordinal idiomática para introducir el turno militar del mes. En español, 'mes duodécimo' conserva la referencia al mes y refleja la forma ordinal del original sin volverla torpe.
- source_word: בְּנָיָה
  english_pob_choice: Benaiah
  chosen_spanish: Benaía
  alternatives_spanish:
  - Benaiah
  lexicon: Convención onomástica bíblica
  rationale: Se translitera el nombre propio en forma española habitual, manteniendo reconocimiento lector y lectura natural.
- source_word: הַפִּרְעָתוֹנִי
  english_pob_choice: the Pirathonite
  chosen_spanish: el piratonita
  alternatives_spanish:
  - el hombre de Piratón
  - el piratoneo
  lexicon: HALOT
  rationale: El gentilicio hebreo se vierte como gentilicio español derivado del topónimo, preservando la identidad geográfica sin añadir explicación innecesaria en el texto principal.
- source_word: מִן בְּנֵי אֶפְרָיִם
  english_pob_choice: from the sons of Ephraim
  chosen_spanish: de entre los hijos de Efraín
  alternatives_spanish:
  - de Efraín
  - de los hijos de Efraín
  lexicon: HALOT
  rationale: '''Hijos de Efraín'' reproduce con fidelidad la expresión hebrea y mantiene su sabor tribal/genealógico. ''De entre'' ayuda a que en español la relación partitiva suene natural y no implique filiación inmediata.'
- source_word: וְעַל מַחֲלֻקְתּוֹ
  english_pob_choice: and over his division were
  chosen_spanish: y sobre su división había
  alternatives_spanish:
  - y sobre su división estaban
  - y en su división había
  lexicon: HALOT
  rationale: '''מַחֲלֻקְתּוֹ'' en este contexto denota el destacamento o turno militar asignado. ''Sobre su división había'' conserva la estructura de supervisión/adscripción del hebreo y suena natural en español.'
- source_word: עֶשְׂרִים וְאַרְבָּעָה אָלֶף
  english_pob_choice: twenty-four thousand
  chosen_spanish: veinticuatro mil
  alternatives_spanish:
  - 24 mil
  lexicon: HALOT
  rationale: Número cardinal directo y sin matiz especial; se expresa con la forma usual en español bíblico.
translation_notes:
  revision_awareness: El pasaje fue revisado en el ciclo anterior sin cambios sustanciales; el contexto auditado mantiene la misma estructura y sentido, por lo que no se incorporan variantes textuales nuevas.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' solo cuando aparece el tetragrámaton; este versículo no lo contiene.
  - Se usa 'Benaía' como forma española del nombre propio, consistente con un registro bíblico moderno y legible.
  - Se conserva el gentilicio en forma derivada ('piratonita') para seguir la función del hebreo sin ampliar el texto.
  - La relación tribal de 'hijos de Efraín' se deja explícita en la nota, siguiendo el audit trail inglés.
