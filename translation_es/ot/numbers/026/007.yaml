translation:
  language: es
  text: Estas son las familias de los rubenitas, y los censados[a] de entre ellos fueron cuarenta y tres mil setecientos treinta.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los registrados de entre ellos» / «los que fueron contados de entre ellos». El hebreo se refiere a los que fueron contados en el censo.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִשְׁפְּחֹת
  english_pob_choice: clans
  chosen_spanish: familias
  alternatives_spanish:
  - clanes
  lexicon: HALOT
  rationale: En el contexto censal de Números, el hebreo se refiere a subdivisiones tribales. En español, «familias» comunica esa unidad de parentesco de forma natural y sin sobrecargar el texto con un término sociológico menos común como «clanes».
- source_word: הָרֻאוּבֵנִי
  english_pob_choice: the Reubenites
  chosen_spanish: los rubenitas
  alternatives_spanish:
  - los descendientes de Rubén
  - la tribu de Rubén
  lexicon: HALOT
  rationale: El gentilicio tribal en español se expresa de manera directa como «rubenitas». Mantiene el valor colectivo del hebreo y corresponde al uso nominal del inglés POB.
- source_word: פְקֻדֵיהֶם
  english_pob_choice: those numbered from them
  chosen_spanish: los registrados de ellos
  alternatives_spanish:
  - los contados de ellos
  - los que fueron contados de entre ellos
  - los censados de entre ellos
  lexicon: HALOT
  rationale: El sustantivo deriva de פקד en contexto censal. «Registrados» conserva la idea de censo sin añadir explícitamente «hombres», que el hebreo aquí no repite. «De ellos» refleja el sufijo pronominal.
- source_word: וַיִּהְיוּ
  english_pob_choice: were
  chosen_spanish: fueron
  alternatives_spanish:
  - llegaron a ser
  - resultaron ser
  lexicon: HALOT
  rationale: En una fórmula numérica, el español natural usa «fueron» para expresar el total alcanzado. Es una equivalencia funcional directa al copulativo inglés y al hebreo narrativo.
- source_word: שְׁלֹשָׁה וְאַרְבָּעִים אֶלֶף וּשְׁבַע מֵאוֹת וּשְׁלֹשִׁים
  english_pob_choice: forty-three thousand seven hundred thirty
  chosen_spanish: cuarenta y tres mil setecientos treinta
  alternatives_spanish:
  - '43.730'
  - cuarenta y tres mil, setecientos treinta
  lexicon: HALOT
  rationale: Se mantiene el número en palabras, siguiendo el estilo enumerativo del texto hebreo y del inglés POB, con sintaxis numérica natural en español.
translation_notes:
  revision_awareness: El texto base en inglés y el control de revisión coinciden plenamente; no se requieren cambios sustantivos. La redacción española sigue el mismo contenido y la misma decisión léxica central sobre פקד en contexto de censo.
  spanish_consistency_notes:
  - Se conserva el tono sobrio y enumerativo propio de una lista censal.
  - Se evita «SEÑOR» u այլ sustitución innecesaria; el verso no contiene el nombre divino.
  - «Rubenitas» mantiene la forma tribal estándar y legible en español.
  - La nota al pie preserva la tensión léxica de פקד sin introducir una interpretación más específica que el hebreo.
