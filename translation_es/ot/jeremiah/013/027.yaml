translation:
  language: es
  text: Tus adulterios, tus relinchos lujuriosos[a], la depravación de tu prostitución[b] en las colinas del campo—he visto tus abominaciones. ¡Ay de ti, Jerusalén! No serás limpiada[c]. ¿Hasta cuándo todavía?[d]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La imagen de 'relinchos' recuerda el símil equino del deseo sexual usado en Jeremías (cf. 5:8).
    reason: cross_reference
  - marker: b
    text: 'O: ''la lascivia de tu prostitución''. El hebreo une términos de depravación/lascivia y prostitución.'
    reason: lexical_alternative
  - marker: c
    text: 'La construcción puede entenderse de forma pasiva o resultativa: ''No serás limpiada'' / ''No quedarás limpia''.'
    reason: alternative_reading
  - marker: d
    text: 'Hebreo elíptico: literalmente, ''¿después de cuándo todavía?''; es decir, ''¿hasta cuándo todavía?'' o ''¿hasta cuándo más?''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נִאֻפַיִךְ
  english_pob_choice: your adulteries
  chosen_spanish: tus adulterios
  alternatives_spanish:
  - tus actos de adulterio
  - tus adulterios cometidos
  lexicon: HALOT
  rationale: נאף nombra actos de adulterio; el plural en español preserva la forma plural del hebreo y el reproche profético dirigido a Jerusalén.
- source_word: וּמִצְהֲלוֹתַיִךְ
  english_pob_choice: your lustful neighings
  chosen_spanish: tus relinchos lujuriosos
  alternatives_spanish:
  - tus relinchos sensuales
  - tus relinchos desenfrenados
  lexicon: HALOT
  rationale: El término evoca el sonido de un caballo en clave metafórica. 'Relinchos lujuriosos' mantiene la imagen viva y el matiz sexual sin suavizarla.
- source_word: זִמַּת זְנוּתֵךְ
  english_pob_choice: the depravity of your prostitution
  chosen_spanish: la depravación de tu prostitución
  alternatives_spanish:
  - la inmoralidad de tu prostitución
  - la perversidad de tu prostitución
  lexicon: HALOT
  rationale: זִמָּה intensifica la idea de corrupción o perversidad y, junto con זְנוּת, conserva la fuerza moral y sexual del hebreo sin recurrir a un arcaísmo innecesario.
- source_word: עַל גְּבָעוֹת בַּשָּׂדֶה
  english_pob_choice: on the hills in the field
  chosen_spanish: en las colinas del campo
  alternatives_spanish:
  - sobre las colinas del campo
  - en los montes del campo
  lexicon: HALOT
  rationale: La expresión topográfica se conserva de manera natural en español y mantiene el trasfondo de actividad ilícita/idólatra en lugares altos y abiertos.
- source_word: רָאִיתִי
  english_pob_choice: I have seen
  chosen_spanish: he visto
  alternatives_spanish:
  - vi
  - lo he visto
  lexicon: HALOT
  rationale: El perfecto hebreo se expresa bien con perfecto compuesto en español para dar vigencia acusatoria a la declaración divina.
- source_word: שִׁקּוּצָיִךְ
  english_pob_choice: your abominations
  chosen_spanish: tus abominaciones
  alternatives_spanish:
  - tus cosas abominables
  - tus detestaciones
  lexicon: HALOT
  rationale: '''Abominaciones'' es el equivalente profético habitual para שִׁקּוּץ y conserva connotaciones cultuales e idólatras.'
- source_word: אוֹי לָךְ
  english_pob_choice: Woe to you
  chosen_spanish: ¡Ay de ti!
  alternatives_spanish:
  - ¡Ay de ti, ciudad!
  - ¡Desdichada de ti!
  lexicon: HALOT
  rationale: Es la fórmula profética de lamento y juicio; '¡Ay de ti!' es la equivalencia natural y solemne en español.
- source_word: לֹא תִטְהֲרִי
  english_pob_choice: You will not be made clean
  chosen_spanish: No serás limpiada
  alternatives_spanish:
  - No serás purificada
  - No quedarás limpia
  lexicon: HALOT
  rationale: Se preserva el valor pasivo/causativo del nifal de טהר. 'Limpiada' comunica bien en español la noción de ser hecha limpia/pura, acorde con el contexto ritual y moral.
- source_word: אַחֲרֵי מָתַי עוֹד
  english_pob_choice: How much longer will it be?
  chosen_spanish: ¿Hasta cuándo aún?
  alternatives_spanish:
  - ¿Hasta cuándo será esto todavía?
  - ¿Hasta cuándo más?
  lexicon: HALOT
  rationale: La frase hebrea es elíptica; en español la pregunta breve conserva el tono de lamentación y la sensación de demora indefinida.
theological_decisions:
- issue: Imaginería sexual como metáfora de infidelidad del pacto e idolatría
  english_pob_reading: Retain the concrete sexual imagery in the main text.
  chosen_spanish_reading: Mantener la imaginería sexual concreta ('adulterios', 'relinchos lujuriosos', 'prostitución') en el texto principal.
  alternative_spanish_readings:
  - Suavizar a 'infidelidades' o 'conductas inmorales'
  rationale: Jeremías usa deliberadamente un lenguaje impactante para describir la infidelidad del pacto y la idolatría; atenuarlo debilitaría la carga profética del pasaje.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Sentido de לֹא תִטְהֲרִי
  english_pob_reading: You will not be made clean.
  chosen_spanish_reading: No serás limpiada.
  alternative_spanish_readings:
  - ¿No serás limpiada?
  - No quedarás limpia.
  rationale: El hebreo permite una lectura de juicio más directa en el contexto de la acusación y la exclamación final. En español se evita resolverlo como pregunta para reflejar mejor la revisión auditada del inglés POB.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: La versión inglesa más reciente revisó el cierre de la pregunta para reflejar mejor el hebreo. En español se optó por una formulación breve y profética ('¿Hasta cuándo aún?') y se mantuvo la afirmación negativa en el v. final ('No serás limpiada') para alinearse con esa lectura revisada, sin borrar la tensión entre juicio y apelación presente en el hebreo y en el audit trail.
  spanish_consistency_notes:
  - Se preserva 'Yahvé' cuando aparezca el tetragrámaton; aquí no se presenta en el verso.
  - '''Justicia/rectitud'', ''gracia'', ''espíritu'' y otros términos estándar del proyecto se mantienen según contexto; no aplican de forma directa en este versículo.'
  - Se conserva el registro profético solemne sin arcaísmos innecesarios, pero sin suavizar el lenguaje sexual o judicial.
