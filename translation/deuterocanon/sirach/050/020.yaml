translation:
  text: Then he came down and lifted up his hands over all the assembly of Israel[a], to give the blessing of Yahweh with his lips[b], and to glory in the name of Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''and the blessing of the LORD on/with his lips''; the Greek parallel makes the sense explicit: ''to give blessing ... from his lips.'' The English follows that fuller sense.'
    reason: alternative_reading
  - marker: b
    text: Or 'to boast in the name of the LORD.' The verb can carry the sense of exulting or taking pride, and the Greek parallel supports this nuance.
    reason: lexical_alternative
lexical_decisions:
- source_word: יָרַד
  chosen: came down
  alternatives:
  - went down
  - descended
  lexicon: HALOT
  rationale: The verb denotes downward movement. 'Came down' is natural English in narrative context and fits the priest descending after the rite; it is slightly more idiomatic than 'descended' while remaining close to the Hebrew.
- source_word: וְנָשָׂא יָדָיו
  chosen: and lifted up his hands
  alternatives:
  - and raised his hands
  lexicon: HALOT
  rationale: The idiom literally means lifting/raising the hands, a conventional gesture for blessing or prayer. 'Lifted up his hands' preserves the formal gesture and echoes biblical style without sounding archaic.
- source_word: קְהַל יִשְׂרָאֵל
  chosen: the assembly of Israel
  alternatives:
  - the congregation of Israel
  - the gathered community of Israel
  lexicon: HALOT
  rationale: קהל is a formal gathered body. 'Assembly' is clear modern English and preserves the public, liturgical sense better than the more church-coded 'congregation' in this context.
- source_word: וּבִרְכַּת יְהֹוָה
  chosen: to give the blessing of the LORD
  alternatives:
  - and the blessing of the LORD was on his lips
  - to pronounce the LORD's blessing
  lexicon: HALOT
  rationale: 'The Hebrew phrase is verbless as transmitted, but the Greek parallel explicitly supplies purpose (''to give blessing''). Because the prompt requires using the Greek as actual translation input, the English reflects the likely sense: he raised his hands in order to pronounce the LORD''s blessing. ''Blessing of the LORD'' can mean either blessing from the LORD or blessing directed in the LORD''s name; the following phrase favors a priestly pronouncement associated with the divine name.'
- source_word: בִּשְׂפָתָיו
  chosen: with his lips
  alternatives:
  - from his lips
  - on his lips
  lexicon: HALOT
  rationale: The preposition beth here is rendered instrumentally/locatively in idiomatic English. 'With his lips' keeps the concrete bodily expression of spoken blessing.
- source_word: וּבְשֵׁם יְהֹוָה
  chosen: in the name of the LORD
  alternatives:
  - by the name of the LORD
  - with the name of the LORD
  lexicon: HALOT
  rationale: Standard rendering for invoking or acting under the authority of the divine name. DOCTRINE.md specifies יְהוָה as 'the LORD'.
- source_word: הִתְפָּאֵר
  chosen: to glory
  alternatives:
  - to boast
  - to exult
  - to take pride
  lexicon: HALOT
  rationale: The hitpael of פאר can denote glorifying oneself, exulting, or taking pride. The Greek parallel has καυχᾶσθαι ('to boast/glory'). 'To glory' preserves the elevated liturgical tone and avoids the negative connotation 'boast' can carry in modern English.
