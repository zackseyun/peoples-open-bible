translation:
  language: es
  text: Y ella envió a su criada[a], la que estaba encargada de todos sus bienes, y mandó llamar a Jabrís y a Jarmís, los ancianos de su ciudad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sirvienta» o «asistente femenina». El griego ἅβρα denota una asistente femenina.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποστείλασα
  english_pob_choice: she sent
  chosen_spanish: envió
  alternatives_spanish:
  - habiendo enviado
  - mandó
  lexicon: LSJ
  rationale: El participio aoristo antecede al verbo principal; en español, «envió ... y llamó» expresa con naturalidad la secuencia narrativa sin forzar una subordinación participial poco idiomática.
- source_word: ἅβραν
  english_pob_choice: maid
  chosen_spanish: criada
  alternatives_spanish:
  - sirvienta
  - doncella
  - sierva
  lexicon: LSJ
  rationale: El término griego designa una asistente femenina del ámbito doméstico. «Criada» conserva bien ese sentido relacional y resulta natural en español bíblico; «sirvienta» es posible, pero algo más genérico; «doncella» suena menos precisa; «sierva» podría sugerir un matiz social más amplio que el contexto inmediato no exige.
- source_word: τὴν ἐφεστῶσαν πᾶσιν τοῖς ὑπάρχουσιν αὐτῆς
  english_pob_choice: who was in charge of all that belonged to her
  chosen_spanish: la que estaba encargada de todos sus bienes
  alternatives_spanish:
  - la que supervisaba todas sus posesiones
  - la que estaba puesta sobre todo lo que tenía
  - la administradora de todos sus bienes
  lexicon: LSJ
  rationale: ἐφεστῶσαν indica a alguien puesto/a sobre algo, con sentido de supervisión o administración. «Estaba encargada de todos sus bienes» transmite el papel de administradora doméstica y respeta τοῖς ὑπάρχουσιν αὐτῆς como pertenencias/bienes sin añadir un matiz jurídico excesivo.
- source_word: ἐκάλεσεν
  english_pob_choice: summoned
  chosen_spanish: llamó
  alternatives_spanish:
  - convocó
  - mandó llamar
  - citó
  lexicon: LSJ
  rationale: En español, el objeto directo son los ancianos y el contexto ya implica una acción de hacerlos venir; «llamó» es suficientemente formal y fiel, y evita sobrecargar el texto con una palabra más técnica de lo que requiere el pasaje.
- source_word: Χαβρεὶν καὶ Χαρμεῖν
  english_pob_choice: Chabris and Charmis
  chosen_spanish: Cabrín y Carmín
  alternatives_spanish:
  - Jabrín y Jarmín
  - Chabrín y Charmín
  lexicon: transliteración griega
  rationale: Son nombres propios griegos y deben transliterarse. Se adopta una forma española audible y publicable que preserve la cercanía fonética al griego, sin convertirlos en traducciones ni latinizar innecesariamente la escritura.
- source_word: τοὺς πρεσβυτέρους τῆς πόλεως αὐτῆς
  english_pob_choice: the elders of her city
  chosen_spanish: los ancianos de su ciudad
  alternatives_spanish:
  - los presbíteros de su ciudad
  - los ancianos de la ciudad
  - los notables de su ciudad
  lexicon: LSJ
  rationale: πρεσβύτεροι aquí designa ancianos con función cívica, no solo hombres de más edad. «Ancianos de su ciudad» conserva el valor social y comunitario del término sin imponer el tecnicismo eclesial «presbíteros», que sería anacrónico en este contexto.
theological_decisions:
- issue: Función cívica de los πρεσβύτεροι
  english_pob_reading: the elders of her city
  chosen_spanish_reading: los ancianos de su ciudad
  alternative_spanish_readings:
  - los presbíteros de su ciudad
  - los notables de su ciudad
  rationale: El pasaje presenta a dos autoridades locales convocadas por Judith. «Ancianos» mantiene la dimensión de liderazgo comunitario sin trasladar el término al vocabulario eclesiástico posterior, que podría oscurecer el sentido histórico del relato.
  doctrine_reference: Orden social y liderazgo cívico en literatura deuterocanónica; no implica oficio eclesial neotestamentario.
- issue: Naturaleza de ἅβρα como asistente femenina
  english_pob_reading: maid / female attendant
  chosen_spanish_reading: criada
  alternative_spanish_readings:
  - sirvienta
  - doncella
  rationale: No hay indicio de carga doctrinal; la decisión afecta la claridad social del relato. «Criada» comunica la relación doméstica y la subordinación funcional de la asistente sin introducir connotaciones afectivas o nobiliarias no atestiguadas.
  doctrine_reference: Ninguna; decisión léxico-social.
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés presentan alta concordancia y no requieren revisiones textuales. La principal decisión en español es mantener el orden narrativo del aoristo participial con una construcción natural («envió ... y llamó») y conservar los nombres propios como transliteraciones españolas audibles.
  spanish_consistency_notes:
  - Se mantiene «su ciudad» para αὐτῆς, evitando neutralizar el posesivo.
  - Se usa «ancianos» para πρεσβυτέρους por consistencia con el valor cívico del término en contexto narrativo.
  - La nota al pie se ancla en «criada» para conservar la alternativa léxica documentada en el audit trail.
