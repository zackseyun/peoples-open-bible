translation:
  language: es
  text: Y Tobit dejó de dar gracias[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de confesar», si ἐξομολογούμενος se entiende en sentido penitencial; aquí el contexto favorece la acción de gracias o la alabanza.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐπαύσατο
  english_pob_choice: ceased
  chosen_spanish: cesó
  alternatives_spanish:
  - terminó
  - dejó de
  - se detuvo
  lexicon: BDAG
  rationale: El aoristo medio de παύω expresa que la acción llegó a su fin. «Cesó» mantiene un registro digno y cercano al valor de «ceased», sin perder la idea de conclusión puntual.
- source_word: ἐξομολογούμενος
  english_pob_choice: giving thanks
  chosen_spanish: dar gracias
  alternatives_spanish:
  - confesar
  - dar alabanza
  - alabar
  lexicon: BDAG
  rationale: En este contexto oracional de Tobit 14, el participio encaja mejor con una acción de gratitud o alabanza, no con confesión penitencial. «Dar gracias» refleja bien la lectura elegida por la POB inglesa y su matiz de acción devocional.
- source_word: Τωβείτ
  english_pob_choice: Tobit
  chosen_spanish: Tobit
  alternatives_spanish:
  - Tobías
  lexicon: Convención onomástica bíblica
  rationale: Se conserva la forma establecida «Tobit» para el nombre propio griego Τωβείτ, en armonía con la tradición de esta obra y con la forma ya usada en la POB inglesa.
theological_decisions:
- issue: Sentido de ἐξομολογούμενος en un contexto de oración final
  english_pob_reading: thanksgiving/praise rather than penitential confession
  chosen_spanish_reading: acción de gracias o alabanza, no confesión de pecados
  alternative_spanish_readings:
  - confesándose
  - confesando
  rationale: El contexto inmediato es el cierre doxológico de Tobit. Traducirlo como gratitud preserva ese marco de adoración y evita imponer una lectura penitencial que el griego aquí no exige.
  doctrine_reference: 'DOCTRINE.md: primacía del idioma original; conservar tensiones teológicas cuando el contexto no resuelve de forma definitiva'
translation_notes:
  revision_awareness: La POB inglesa revisó la frase desde «stopped giving praise» a «ceased giving thanks» para acercarse más a ἐπαύσατο y ἐξομολογούμενος. La versión española sigue esa última decisión, pero conserva la posibilidad alternativa de una lectura penitencial en nota.
  spanish_consistency_notes:
  - Se mantiene el orden simple de la cláusula con «Y... cesó de...», adecuado al griego breve y paratáctico.
  - «Dar gracias» se usa como equivalente natural de la lectura devocional del participio, sin convertirlo en una paráfrasis más amplia.
  - No se sustituye el nombre propio por una forma castellanizada distinta, para conservar la continuidad con la tradición textual de Tobit.
