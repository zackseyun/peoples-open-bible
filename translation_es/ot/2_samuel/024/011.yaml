translation:
  language: es
  text: Cuando David se levantó por la mañana[a], la palabra de Yahvé había llegado a Gad el profeta, vidente de David, diciendo,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «la palabra de Yahvé fue a Gad».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקָם
  english_pob_choice: arose
  chosen_spanish: se levantó
  alternatives_spanish:
  - se puso de pie
  - se alzó
  lexicon: HALOT
  rationale: El verbo de movimiento narrativo señala la siguiente acción en la secuencia. En español, «se levantó» es natural y solemne, y comunica la idea de ponerse en pie o empezar la jornada sin forzar un calco.
- source_word: בַּבֹּקֶר
  english_pob_choice: in the morning
  chosen_spanish: por la mañana
  alternatives_spanish:
  - en la mañana
  - esa mañana
  lexicon: HALOT
  rationale: La expresión temporal marca el momento en que David se levantó. «Por la mañana» suena idiomático en español y conserva el valor temporal general sin añadir precisión no exigida por el hebreo.
- source_word: וּדְבַר יְהוָה
  english_pob_choice: the word of Yahweh
  chosen_spanish: la palabra de Yahvé
  alternatives_spanish:
  - la palabra de Yahweh
  - el mensaje de Yahvé
  lexicon: HALOT
  rationale: Se mantiene «palabra» para conservar la fórmula profética formal y su peso revelatorio. Se usa «Yahvé» según el estándar terminológico del proyecto para יְהוָה.
- source_word: הָיָה אֶל
  english_pob_choice: had come to
  chosen_spanish: había venido a
  alternatives_spanish:
  - vino a
  - era para
  lexicon: HALOT
  rationale: En contexto profético, la construcción idiomática indica que la palabra divina ya había alcanzado a Gad. «Había venido a» conserva bien el matiz de llegada/comunicación y refleja la lectura temporal del audit trail en español natural.
- source_word: גָּד
  english_pob_choice: Gad
  chosen_spanish: Gad
  alternatives_spanish:
  - Gád
  lexicon: HALOT
  rationale: Nombre propio transliterado de forma estándar y reconocible en español bíblico.
- source_word: הַנָּבִיא
  english_pob_choice: the prophet
  chosen_spanish: el profeta
  alternatives_spanish:
  - el vidente
  - el profeta/vidente
  lexicon: HALOT
  rationale: נָבִיא es el término usual para «profeta»; se conserva el título de oficio de forma directa e inteligible.
- source_word: חֹזֵה דָוִד
  english_pob_choice: David’s seer
  chosen_spanish: vidente de David
  alternatives_spanish:
  - el vidente de David
  - el que veía para David
  lexicon: HALOT
  rationale: חֹזֶה se diferencia de נָבִיא y conviene distinguirlo con «vidente», que en español bíblico refleja su función de percepción/revelación. El genitivo se expresa como «de David», siguiendo la relación posesiva del hebreo.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo,
  alternatives_spanish:
  - para decir,
  lexicon: HALOT
  rationale: Fórmula narrativa estándar que introduce el discurso directo; «diciendo» mantiene continuidad estilística con el texto bíblico.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: El paquete fuente identifica explícitamente el Tetragrámaton en hebreo. Conforme al estándar terminológico del proyecto, se traduce con el nombre propio «Yahvé» y no con un sustituto litúrgico como «SEÑOR», para conservar la transparencia textual y el valor del nombre del pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'El audit trail inglés no requirió revisión posterior: el resumen de revisión indica que no hubo cambios y que el veredicto fue de alta concordancia. La redacción española sigue esa lectura estable, manteniendo la secuencia narrativa, la fórmula profética y la doble designación de Gad sin introducir ampliaciones.'
  spanish_consistency_notes:
  - Se conserva la distinción entre «profeta» y «vidente» para reflejar los dos sustantivos hebreos distintos.
  - Se mantiene «Yahvé» conforme a la terminología proyectual para יְהוָה.
  - La puntuación reproduce la continuidad narrativa de un versículo introductorio que culmina en una cláusula de habla indirecta.
