- from: Y os consolarán cuando veáis sus caminos y sus obras[a]; y sabréis que no hice sin causa todo lo que hice en ella[b][c], declara el Señor Yahvé.
  to: Y los consolarán cuando vean sus caminos y sus obras[a]; y sabrán que no hice sin causa todo lo que hice en ella[b][c], declara el Señor Yahvé.
