  yaml_path: translation/deuterocanon/3_maccabees/003/023.yaml
  text: Not only have they rejected the dishonorable civic order[a], but they also detest, both in speech and in silence, the few among them who are genuinely well-disposed toward us, and at every turn, with the most impious intent[c][b], they rush to bring our affairs to ruin.
  footnotes:
