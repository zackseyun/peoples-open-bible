translation:
  language: es
  text: Y se reunieron con él todos los que estaban perturbando a su pueblo, y tomaron control de la tierra de Judá, y asestaron un gran golpe en Israel[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «entre Israel». La expresión griega ἐν Ἰσραήλ puede indicar el ámbito dentro del pueblo de Israel, no solo una referencia geográfica.
    reason: lexical_alternative
lexical_decisions:
- source_word: συνήχθησαν πρὸς αὐτόν
  english_pob_choice: gathered to him
  chosen_spanish: se reunieron con él
  alternatives_spanish:
  - se juntaron con él
  - se congregaron con él
  lexicon: LSJ
  rationale: El pasivo con πρός + acusativo expresa aproximación y asociación con él. En español, «se reunieron con él» conserva la idea de alineación colectiva sin introducir un matiz militar o de alistamiento que el griego no exige.
- source_word: πάντες οἱ ταράσσοντες
  english_pob_choice: all those who were troubling
  chosen_spanish: todos los que estaban perturbando
  alternatives_spanish:
  - todos los que perturbaban
  - todos los alborotadores
  lexicon: LSJ
  rationale: ταράσσω comunica causar turbación o disturbio. «Estaban perturbando» mantiene el valor verbal y evita convertir el participio en una etiqueta nominal más interpretativa.
- source_word: τὸν λαὸν αὐτῶν
  english_pob_choice: their people
  chosen_spanish: a su pueblo
  alternatives_spanish:
  - a su gente
  - a su nación
  lexicon: LSJ
  rationale: El posesivo αὐτῶν debe quedar reflejado. «Pueblo» es la opción más natural para λαός y preserva el sentido colectivo sin cargarlo con una precisión política que el texto no requiere.
- source_word: κατεκράτησαν
  english_pob_choice: gained control of
  chosen_spanish: ganaron control de
  alternatives_spanish:
  - tomaron control de
  - se apoderaron de
  lexicon: LSJ
  rationale: κρατέω con κατά puede expresar dominio efectivo o toma de control. «Ganaron control de» reproduce bien esa idea sin cerrar el sentido a una posesión jurídica permanente.
- source_word: γῆν Ἰούδα
  english_pob_choice: the land of Judah
  chosen_spanish: la tierra de Judá
  alternatives_spanish:
  - el país de Judá
  - el territorio de Judá
  lexicon: LSJ
  rationale: γῆ puede significar tierra o territorio. «La tierra de Judá» conserva el referente concreto y sigue de cerca la relación territorial del griego.
- source_word: ἐποίησαν πληγὴν μεγάλην
  english_pob_choice: they inflicted a great blow
  chosen_spanish: causaron una gran herida
  alternatives_spanish:
  - infirieron un gran golpe
  - ocasionaron una gran calamidad
  lexicon: LSJ
  rationale: πληγή significa literalmente golpe o herida, y por extensión calamidad. «Causaron una gran herida» conserva la imagen de daño sufrido sin restringirla indebidamente a una sola interpretación como matanza o golpe militar.
- source_word: ἐν Ἰσραήλ
  english_pob_choice: in Israel
  chosen_spanish: en Israel
  alternatives_spanish:
  - entre Israel
  - entre el pueblo de Israel
  lexicon: LSJ
  rationale: ἐν es aquí el equivalente más directo a «en». La frase puede señalar el ámbito dentro del pueblo de Israel; el español mantiene esa amplitud sin precisar más de lo que el griego permite.
translation_notes:
  revision_awareness: Se corrigió la edición anterior para anclar la nota [a] en el texto español y evitar un marcador huérfano. No se modificó el sentido básico del versículo, solo la formulación y la puntuación para hacer visible la alternativa semántica del griego.
  spanish_consistency_notes:
  - Se mantuvo el paralelismo narrativo de la oración griega con tres cláusulas coordinadas.
  - «Pueblo» se usó de forma consistente para λαός.
  - Se evitó «Mesías», «Cristo» u այլ terminología no presente en el pasaje.
  - La nota [a] está colocada en el sintagma final «en Israel[a]» para corresponder al valor alternativo de ἐν Ἰσραήλ.
