base_translation:
  language: en
  yaml_path: translation/ot/zechariah/012/003.yaml
  text: And on that day I will make Jerusalem a heavy stone for all the peoples[a]. All who lift it will surely injure themselves[c][b], and all the nations of the earth will gather against her.
  footnotes:
  - marker: a
    text: Or 'a burdensome stone for all the peoples.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'will surely be cut/gashed,' an intensified Hebrew expression for severe self-injury.
    reason: lexical_alternative
  - marker: c
    text: Or 'all the nations of the land,' if 'land' is taken in a more local sense.
    reason: alternative_reading
