translation:
  language: es
  text: Entonces di la orden[a], y ellos purificaron[b] las cámaras; y yo volví a poner allí los utensilios de la casa de Dios, con la ofrenda de grano y el franquincienso.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Entonces dije» o «Entonces mandé». El hebreo dice simplemente «dije», pero en contexto introduce una orden que fue ejecutada.'
    reason: lexical_alternative
  - marker: b
    text: «Purificaron» también puede traducirse «limpiaron», reflejando tanto el sentido ritual como el físico del verbo hebreo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֹמְרָה
  english_pob_choice: Then I gave the order
  chosen_spanish: Entonces di la orden
  alternatives_spanish:
  - Entonces dije
  - Entonces mandé
  lexicon: HALOT
  rationale: El hebreo dice literalmente «y dije», pero en el contexto inmediato Nehemías emite una instrucción que se ejecuta. «Di la orden» preserva esa fuerza directiva en español sin alejarse del verbo מקור.
- source_word: וַיְטַהֲרוּ
  english_pob_choice: they cleansed
  chosen_spanish: purificaron
  alternatives_spanish:
  - limpiaron
  - ritualizaron la limpieza
  lexicon: HALOT
  rationale: טהר puede tener sentido ritual y también de limpieza física. «Purificaron» mantiene mejor el matiz cultual del pasaje que «limpiaron», y evita restringirlo a una higiene meramente material.
- source_word: הַלְּשָׁכוֹת
  english_pob_choice: the chambers
  chosen_spanish: las cámaras
  alternatives_spanish:
  - los aposentos
  - las salas
  lexicon: HALOT
  rationale: En contexto del templo, לשכות son espacios internos o dependencias. «Cámaras» conserva el registro bíblico-formal y el sentido arquitectónico del término.
- source_word: וָאָשִׁיבָה שָּׁם
  english_pob_choice: and I brought back there
  chosen_spanish: y yo volví a poner allí
  alternatives_spanish:
  - y restablecí allí
  - y devolví allí
  lexicon: HALOT
  rationale: El causativo de שוב expresa el retorno/restauración de objetos a su lugar. «Volví a poner allí» mantiene la idea concreta de reubicar los utensilios en el sitio debido, sin forzar un verbo más abstracto.
- source_word: כְּלֵי בֵּית הָאֱלֹהִים
  english_pob_choice: the vessels of the house of God
  chosen_spanish: los utensilios de la casa de Dios
  alternatives_spanish:
  - los vasos de la casa de Dios
  - los objetos de la casa de Dios
  lexicon: HALOT
  rationale: כְּלִים es un término amplio para implementos/utensilios/vajilla ritual. «Utensilios» funciona bien en español general y conserva la amplitud del hebreo; «casa de Dios» mantiene la expresión del original en vez de sustituirla por «templo».
- source_word: אֶת הַמִּנְחָה
  english_pob_choice: with the grain offering
  chosen_spanish: con la ofrenda de grano
  alternatives_spanish:
  - con la ofrenda vegetal
  - con la oblación
  lexicon: HALOT
  rationale: מִנְחָה en contexto cultual apunta a una ofrenda de cereal/grano. «Ofrenda de grano» es clara y fiel; se prefirió «con» para reflejar la adición conjunta que aparece en la lectura inglesa y en el flujo del hebreo.
- source_word: וְהַלְּבוֹנָה
  english_pob_choice: and the frankincense
  chosen_spanish: y el incienso
  alternatives_spanish:
  - y el olíbano
  - y el frankincense
  lexicon: HALOT
  rationale: לְבוֹנָה designa específicamente el aromático usado en el culto, tradicionalmente llamado «incienso» en español bíblico. Aunque «frankincense» sería más técnico, «incienso» es el equivalente natural y comprensible en español para este contexto ritual.
translation_notes:
  revision_awareness: 'El pasaje presenta alta concordancia con el audit trail inglés; no se registran revisiones aplicadas en la pasada más reciente, y la presente propuesta conserva las decisiones léxicas clave: el valor directivo de אמר, el matiz ritual de טהר, la terminología cultual de לשכות, כלי, מנחה y לבונה.'
  spanish_consistency_notes:
  - Se mantuvo «casa de Dios» como eco del hebreo y del POB inglés, en lugar de sustituirlo por «templo».
  - Se evitó «SEÑOR» para el nombre divino porque aquí aparece אֱלֹהִים, que corresponde a «Dios».
  - 'La secuencia verbal en español respeta la narrativa: orden → purificación → restitución de los objetos.'
  - Se usó un registro bíblico sobrio y moderno, sin depender de la fraseología tradicional de Reina-Valera cuando ésta oscurece el valor léxico del hebreo.
