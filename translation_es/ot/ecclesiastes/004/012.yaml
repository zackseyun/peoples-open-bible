revisions:
- from: Y si uno prevalece contra uno, dos se le opondrán; y la cuerda[a] de tres dobleces no se rompe pronto.
  to: Y si alguien domina a uno, dos se pondrán contra él; y una cuerda[a] triple no se rompe pronto.
  rationale: Se corrige la cláusula inicial para reflejar con claridad que un tercero puede dominar a una sola persona, según el sentido contextual y la auditoría inglesa. Se cambia «la cuerda» por «una cuerda» para un español proverbial más natural. Se usa «triple» como equivalente idiomático de «threefold», manteniendo en nota la alternativa más concreta «de tres hebras». No se requiere adjudicación adicional.
