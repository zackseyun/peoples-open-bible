revisions:
- from: Tú has verdaderamente golpeado a Edom, y tu corazón se ha enaltecido. [a]Gloríate[b] en eso, y quédate en casa. ¿Por qué te provocarías a hacer el mal, de modo que caerías tú y Judá contigo?[c]
  to: Tú ciertamente has golpeado a Edom, y tu corazón se ha enaltecido[a]. Sé honrado[b], y quédate en casa. ¿Por qué provocarías una desgracia, de modo que caigas tú y Judá contigo?
  rationale: Se corrigió el sentido principal de בְּרָעָה a «desgracia», que expresa calamidad y no mal moral. Se reemplazó la formulación poco natural «te provocarías» por «provocarías» en una pregunta retórica más idiomática. Se alineó הִכָּבֵד con la revisión auditada mediante «Sé honrado», conservando «Gloríate en eso» como alternativa en nota. También se movió correctamente el marcador de la nota sobre «tu corazón se ha enaltecido» y se eliminó la nota innecesaria final.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:50:10Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura general del hebreo: victoria sobre Edom, corazón enaltecido, exhortación a quedarse en casa y advertencia de caída para el rey y Judá. Sin embargo, dos elecciones importantes se apartan del sentido auditado: הִכָּבֵד fue revisado en la POB inglesa a un valor más formal como «be honored», y sobre todo בְּרָעָה en este contexto significa calamidad/desastre, no «hacer el mal».'
  spanish_quality_summary: El español es en general claro, pero «¿por qué te provocarías a hacer el mal?» suena poco natural y además cambia el sentido hacia mal moral. «[a]Gloríate[b] en eso» es comprensible, pero el anclaje de nota [a] está mal ubicado porque corresponde a la cláusula del corazón, no a «Gloríate». También conviene evitar una nota redundante en «y Judá contigo», ya que no preserva una alternativa léxica real del inglés sino solo comenta el sentido.
  glossary_alignment: 'No hay términos del glosario mayor en disputa aquí. Los puntos léxicos clave son: conservar la imaginería de «tu corazón te ha levantado / se ha enaltecido»; traducir הִכָּבֵד de manera no sobreinterpretativa; y verter בְּרָעָה como «desgracia/desastre/calamidad», no como «mal» moral.'
  issues:
  - severity: high
    issue: בְּרָעָה fue traducido como «a hacer el mal»
    rationale: El hebreo aquí señala una calamidad o desastre resultante de provocar conflicto, no una acción moral mala. Esto altera el sentido central de la advertencia.
  - severity: medium
    issue: תִתְגָּרֶה fue vertido como «te provocarías»
    rationale: En español esa forma reflexiva suena extraña y no comunica bien «meterse en pleito / provocar desastre / buscarse problemas».
  - severity: medium
    issue: הִכָּבֵד se tradujo «Gloríate en eso» pese a la revisión auditada a «Be honored»
    rationale: «Gloríate» es defendible, pero la auditoría inglesa decidió una opción más formal y menos interpretativa. El español debería acercarse a «recibe honra / date por honrado / sé honrado» según naturalidad.
  - severity: medium
    issue: La nota [a] está anclada en el lugar equivocado
    rationale: La nota explica «tu corazón se ha enaltecido», pero el marcador aparece antes de «Gloríate».
  - severity: low
    issue: La nota [c] es innecesaria
    rationale: No añade una alternativa textual ni resuelve una ambigüedad nueva en español; solo comenta el sentido ya claro en el texto.
