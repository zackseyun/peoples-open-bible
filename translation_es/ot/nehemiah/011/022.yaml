  yaml_path: translation/ot/nehemiah/011/022.yaml
  text: And the overseer of the Levites in Jerusalem was Uzzi son of Bani[a], son of Hashabiah, son of Mattaniah, son of Mica, from the sons of Asaph, the singers, over the work of the house of God.
