  to: Mientras aún hablaba y oraba, confesando mi pecado y el pecado de mi pueblo, Israel, y presentando mi súplica[a] ante Yahvé, mi Dios, acerca del monte santo de mi Dios[b].
  rationale: Se movió la nota [a] al sintagma correcto ('mi súplica') porque la nota comenta תחנה y el modismo 'hacer caer ... delante de'. También se ajustó ligeramente la puntuación de 'mi pueblo, Israel' para mejorar la naturalidad en español sin cambiar el sentido ni la relación appositiva del hebreo.
