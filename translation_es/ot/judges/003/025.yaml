translation:
  language: es
  text: Y esperaron hasta sentirse avergonzados[a]; y he aquí, él no abría las puertas del aposento alto[b]. Entonces tomaron la llave y las abrieron, y he aquí, su amo[c] había caído a tierra, muerto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «hasta quedar avergonzados». El hebreo puede expresar vergüenza o bochorno social; aquí señala la incomodidad de seguir esperando.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «cuarto alto» o «habitación alta». El término hebreo designa un espacio superior; «aposento alto» conserva esa idea con un giro bíblico inteligible.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «su señor». Aquí la palabra se refiere al superior humano, Eglón.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּחִילוּ
  english_pob_choice: they waited
  chosen_spanish: esperaron
  alternatives_spanish:
  - se quedaron esperando
  - tardaron en irse
  lexicon: HALOT
  rationale: El contexto narrativo describe a los criados permaneciendo afuera mientras aguardan; «esperaron» comunica con naturalidad esa acción continua sin añadir matices de demora intencional.
- source_word: עַד בּוֹשׁ
  english_pob_choice: until they were ashamed
  chosen_spanish: hasta sentirse avergonzados
  alternatives_spanish:
  - hasta avergonzarse
  - hasta quedar avergonzados
  lexicon: HALOT
  rationale: El hebreo expresa una vergüenza o incomodidad social progresiva. «Sentirse avergonzados» conserva la tensión del grupo sin convertirla en un juicio moral más fuerte de lo que el texto exige.
- source_word: דַּלְתּוֹת הָעֲלִיָּה
  english_pob_choice: the doors of the upper room
  chosen_spanish: las puertas del aposento alto
  alternatives_spanish:
  - las puertas del cuarto alto
  - las puertas del piso alto
  lexicon: HALOT
  rationale: «Aposento alto» mantiene la referencia a una habitación elevada/arriba con un giro bíblico comprensible en español, y evita la torpeza de calcos demasiado literales.
- source_word: אֲדֹנֵיהֶם
  english_pob_choice: their master
  chosen_spanish: su señor
  alternatives_spanish:
  - su amo
  - su dueño
  lexicon: HALOT
  rationale: Aquí el término designa al superior humano de los criados, no al título divino. «Señor» refleja la relación de autoridad personal; «amo» sería más duro y menos natural en este contexto narrativo.
- source_word: נֹפֵל אַרְצָה
  english_pob_choice: had fallen to the ground
  chosen_spanish: había caído a tierra
  alternatives_spanish:
  - había caído al suelo
  - yacía en tierra
  lexicon: HALOT
  rationale: La expresión hebrea marca el estado hallado al abrirse la puerta. «Había caído a tierra» sigue de cerca el movimiento y resulta plenamente idiomática en español.
- source_word: מֵת
  english_pob_choice: dead
  chosen_spanish: muerto
  alternatives_spanish:
  - sin vida
  - ya muerto
  lexicon: HALOT
  rationale: Adjetivo predicativo simple y directo, adecuado para el hallazgo final y fiel al hebreo.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y el audit trail inglés, conservando la doble señal narrativa de וְהִנֵּה con «y he aquí», el valor progresivo de la espera y la identificación final del señor humano hallado muerto. Se evitó «SEÑOR» por tratarse de אֲדֹנֵיהֶם referido a Eglón, no al nombre divino.
  spanish_consistency_notes:
  - Se mantuvo el estilo narrativo bíblico con marcadores como «y he aquí» para reproducir la vivacidad del hebreo.
  - «Aposento alto» se eligió como equivalente natural de עֲלִיָּה, coherente con español bíblico contemporáneo.
  - «Señor» se usa aquí como término de autoridad humana; no implica lenguaje teológico divino en este versículo.
