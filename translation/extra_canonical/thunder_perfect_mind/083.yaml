translation:
  text: 'I am the division and the stripping[a].

    I am the dwelling[c].

    And I am the robbery; I am

    the one who sees what comes

    down to me.

    I am the flight of the release[d][b][a][d][c][b].

    I am I.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ⲡⲡⲱⲧⲣ is taken as ‘inside/interior’ by antithesis with ⲡⲕⲱⲗⲉⲃⲟⲗ (‘outside’).
      Some have proposed ‘first,’ but the parallel favors spatial sense.
    reason: lexical_alternative
  - marker: b
    text: ⲡⲕⲱⲗⲉⲃⲟⲗ and ⲡⲕⲱⲗ are related; both point to ‘outside/outer/far(-away).’
      I render consistently as ‘outside’ to keep the parallel tight.
    reason: lexical_alternative
  - marker: c
    text: ⲧⲙⲟⲛⲏ is a Greek loan (μονή), ‘dwelling/abode.’
    reason: cultural_note
  - marker: d
    text: The clause could alternatively read ‘the All has gone forth (from me)’ if
      the underlying is ⲙⲡⲧⲟⲟⲩ ⲉⲃⲟⲗ; the OCR here may conflate ⲧ with ⲕ and omit ⲟⲟ.
    reason: textual_variant
