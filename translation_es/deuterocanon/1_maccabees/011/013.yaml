translation:
  language: es
  text: 'Y Ptolomeo entró en Antioquía y se puso la corona de Asia, y se puso sobre la cabeza dos coronas[a]: la de Asia y la de Egipto.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «dos diademas». El griego usa el mismo término real dos veces: primero para «la corona de Asia» y luego para «dos coronas», las de Asia y Egipto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰσῆλθεν
  english_pob_choice: entered
  chosen_spanish: entró
  alternatives_spanish:
  - entró en
  - ingresó en
  - entró a
  lexicon: LSJ
  rationale: El aoristo narrativo de movimiento se vierte con un verbo natural y directo en español. «Entró» conserva la acción concreta sin añadir explicación.
- source_word: Πτολεμαῖος
  english_pob_choice: Ptolemy
  chosen_spanish: Ptolomeo
  alternatives_spanish:
  - Tolomeo
  lexicon: uso histórico bíblico / diccionarios generales
  rationale: En español bíblico e histórico, «Ptolomeo» es la forma más reconocible y mantiene la referencia propia del personaje helenístico.
- source_word: περιέθετο
  english_pob_choice: put on
  chosen_spanish: se puso
  alternatives_spanish:
  - se colocó
  - se ciñó
  - se puso sobre sí
  lexicon: LSJ
  rationale: El verbo medio expresa el acto de colocarse un distintivo real. «Se puso» es natural en español y conserva la imagen concreta de vestirse con la insignia.
- source_word: διάδημα
  english_pob_choice: crown
  chosen_spanish: corona
  alternatives_spanish:
  - diadema
  - cetro
  lexicon: LSJ
  rationale: El término designa una insignia real de la cabeza. «Corona» comunica mejor al lector moderno la función regia; «diadema» sería más técnico, pero menos claro.
- source_word: τῆς Ἀσίας
  english_pob_choice: of Asia
  chosen_spanish: de Asia
  alternatives_spanish:
  - de la Asia
  - del Asia
  lexicon: LSJ
  rationale: El genitivo simple se mantiene sin expansión interpretativa. «De Asia» preserva la forma geográfica-política del texto griego.
- source_word: δύο διαδήματα
  english_pob_choice: two crowns
  chosen_spanish: dos coronas
  alternatives_spanish:
  - dos diademas
  lexicon: LSJ
  rationale: El griego repite el sustantivo real para enfatizar el gesto inusual. «Dos coronas» es idiomático y claro, sin perder la repetición significativa.
- source_word: περὶ τὴν κεφαλὴν αὐτοῦ
  english_pob_choice: on his head
  chosen_spanish: sobre su cabeza
  alternatives_spanish:
  - alrededor de su cabeza
  - en su cabeza
  lexicon: LSJ
  rationale: Aunque περὶ puede ser «alrededor de», aquí con la imagen de insignias regias sobre la cabeza, «sobre su cabeza» suena natural y conserva el sentido.
theological_decisions:
- issue: Simbolismo político de las dos coronas
  english_pob_reading: Translate concretely as the physical act of putting on two crowns
  chosen_spanish_reading: Traducir de manera concreta el gesto físico de ponerse dos coronas
  alternative_spanish_readings:
  - Interpretar el gesto como una afirmación explícita de dominio sobre Asia y Egipto
  - Explicitar en el texto principal su pretensión política
  rationale: El griego presenta el acto visible; la implicación política se deriva del símbolo sin necesidad de añadirla al versículo. Esto preserva la transparencia y evita sobreinterpretación.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Valor de «diadema» frente a «corona»
  english_pob_reading: The Greek uses the same royal term twice, first for 'the crown of Asia,' then for 'two crowns'
  chosen_spanish_reading: Mantener la reiteración con «corona» para ambas ocurrencias y conservar la claridad
  alternative_spanish_readings:
  - Usar «diadema» en ambas ocurrencias
  - Alternar «corona» y «diadema»
  rationale: En español, «corona» comunica mejor la insignia real y permite reflejar la repetición del sustantivo sin oscurecer el sentido. «Diadema» sería más técnico, pero menos transparente para lectura pública.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: El contexto de revisión en inglés no introdujo cambios sustantivos; la lectura base permanece estable y la traducción española sigue de cerca la economía del griego, manteniendo la imagen regia concreta y la repetición léxica relevante.
  spanish_consistency_notes:
  - Se usó «Ptolomeo» como forma española estándar del nombre propio helenístico.
  - Se mantuvo «corona» como equivalente de διάδημα por claridad pública, con nota para la alternativa técnica «diadema».
  - Se preservó la secuencia narrativa simple del griego sin ampliar el sentido político en el cuerpo principal.
  - La puntuación con dos puntos ayuda a reflejar la segunda cláusula explicativa sin alterar la sintaxis básica.
