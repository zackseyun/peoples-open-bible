revisions:
- from: Y miré[a], y no había hombre; entre estos no había consejero, para que, cuando yo les preguntara[b], respondieran una palabra.
  to: Y miré[a], pero no había hombre; entre estos no había consejero, de modo que, cuando les preguntara[b], respondieran una palabra.
  rationale: Se ajusta el conector a «pero» para reflejar mejor el contraste retórico del contexto y se reemplaza la construcción forzada «para que, cuando yo les preguntara» por «de modo que, cuando les preguntara», que suena más natural en español y mantiene la idea de que no había nadie entre ellos capaz de responder al ser interrogado. Se conserva «hombre», «entre estos», «consejero» y «una palabra» por fidelidad al hebreo y a las decisiones léxicas documentadas.
