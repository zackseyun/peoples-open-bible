translation:
  language: es
  text: 'El rey dijo[a]: «Apártate; quédate aquí». Entonces se apartó y se quedó allí de pie.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Vuélvete a un lado; quédate aquí». El verbo hebreo puede referirse a volverse en general, pero en este contexto probablemente indica moverse a un lado para dejar paso al siguiente mensajero.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - habló
  lexicon: HALOT
  rationale: Es la forma narrativa normal para introducir discurso directo y preserva el valor simple de אמר sin añadir matices innecesarios.
- source_word: הַמֶּלֶךְ
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - el monarca
  lexicon: HALOT
  rationale: Mantiene la referencia definida y natural en español para el personaje ya identificado por el contexto.
- source_word: סֹב
  english_pob_choice: Turn aside
  chosen_spanish: aparta
  alternatives_spanish:
  - apártate
  - da un paso al lado
  - vuélvete aparte
  lexicon: HALOT
  rationale: En este mandato, el sentido práctico es ceder espacio o moverse a un lado; 'aparta' conserva el movimiento lateral sin forzar una imagen más específica que el hebreo no exige.
- source_word: הִתְיַצֵּב
  english_pob_choice: stand
  chosen_spanish: ponte aquí
  alternatives_spanish:
  - te colocas aquí
  - haz alto aquí
  - preséntate aquí
  lexicon: HALOT
  rationale: El hitpael de יצב expresa colocarse o ponerse en posición. En español, 'ponte aquí' comunica la instrucción de situarse en un lugar preciso de manera breve y natural.
- source_word: כֹּה
  english_pob_choice: here
  chosen_spanish: aquí
  alternatives_spanish:
  - acá
  - en este lugar
  lexicon: HALOT
  rationale: En este contexto adverbial señala ubicación concreta, por eso 'aquí' reproduce bien la indicación espacial del rey.
- source_word: וַיִּסֹּב
  english_pob_choice: he turned aside
  chosen_spanish: se apartó
  alternatives_spanish:
  - se volvió aparte
  - dio un paso al lado
  lexicon: HALOT
  rationale: Conserva la relación léxica con סֹב y expresa la ejecución del mandato con una solución idiomática en español.
- source_word: וַיַּעֲמֹד
  english_pob_choice: stood
  chosen_spanish: se quedó de pie
  alternatives_spanish:
  - estuvo de pie
  - quedó de pie
  lexicon: HALOT
  rationale: '''Se quedó de pie'' refleja que permaneció erguido en el lugar señalado, con una naturalidad mayor que una repetición mecánica de ''estuvo de pie''.'
translation_notes:
  revision_awareness: Coincide con el audit trail inglés en el sentido básico de un mandato de moverse a un lado y quedarse en un lugar señalado; se conserva la alternativa semántica de סֹב en nota, sin ampliar el texto principal más allá de lo que el hebreo permite.
  spanish_consistency_notes:
  - 'Se mantiene el paralelismo mandato-cumplimiento: ''aparta; ponte aquí'' / ''se apartó y se quedó de pie''.'
  - Se evita 'Señor' u otra terminología teológica no pertinente; el sujeto es simplemente 'el rey'.
  - El marcador [a] está anclado en 'dijo' para señalar la alternativa de traducción del imperativo hebreo en la nota.
