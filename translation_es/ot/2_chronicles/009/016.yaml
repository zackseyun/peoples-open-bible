    issue: «subían sobre cada escudo» es poco natural en español
    rationale: Aunque intenta seguir literalmente «went onto», en español moderno esa construcción resulta extraña para metal aplicado a un objeto. «se aplicaban a cada escudo» conserva el sentido distributivo y material con mejor legibilidad.
