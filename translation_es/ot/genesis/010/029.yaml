  rationale: El hebreo repite את como partícula de objeto directo ante cada nombre; en español no se expresa. La lista se conserva con coordinación natural sin añadir una relación que el hebreo no marque aquí.
- source_word: אוֹפִ֥ר
  english_pob_choice: Ophir
  chosen_spanish: Ofir
  alternatives_spanish:
  - Ophir
  lexicon: HALOT
