  text: And Judith stood beside his bed and said in her heart[a], “Lord, God of all power, look upon the works of my hands at this hour[b], for the exaltation of Jerusalem.”
  footnotes:
  - marker: a
    text: Or “said to herself.” The Greek literally says “said in her heart,” a biblical idiom for inward speech or prayer.
    reason: lexical_alternative
  - marker: b
    text: Or “for Jerusalem’s elevation” or “for the lifting up of Jerusalem.” The Greek expression speaks of Jerusalem being raised up or exalted.
    reason: alternative_reading
