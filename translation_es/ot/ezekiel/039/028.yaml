translation:
  language: es
  text: Entonces sabrán que yo soy Yahvé, su Dios[a], cuando los exilié entre las naciones y luego los reuní en su propia tierra, y ya no dejé allí a ninguno de ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el SEÑOR, su Dios».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיָדְעוּ
  english_pob_choice: Then they will know
  chosen_spanish: Entonces sabrán
  alternatives_spanish:
  - Y sabrán
  - Y conocerán
  lexicon: HALOT
  rationale: El verbo ידע expresa ‘saber/conocer’. ‘Entonces’ comunica bien la consecuencia discursiva del acto de Dios sin añadir contenido ajeno. ‘Sabrán’ es natural y fiel; ‘conocerán’ sería posible, pero menos idiomático en este contexto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino propio según la política del proyecto. ‘Yahvé’ preserva el Tetragrámaton sin sustituirlo por un título.
- source_word: אֱלֹהֵיהֶם
  english_pob_choice: their God
  chosen_spanish: su Dios
  alternatives_spanish:
  - el Dios de ellos
  - su propio Dios
  lexicon: HALOT
  rationale: La forma constructa con sufijo se expresa de manera natural en español como ‘su Dios’. Es fiel al valor relacional sin forzar una construcción más pesada.
- source_word: בְּהַגְלוֹתִי אֹתָם אֶל־הַגּוֹיִם
  english_pob_choice: when I exiled them among the nations
  chosen_spanish: cuando los exilié entre las naciones
  alternatives_spanish:
  - cuando los llevé al exilio entre las naciones
  - al exiliarlos entre las naciones
  - cuando los envié al exilio entre las naciones
  lexicon: HALOT
  rationale: El infinitivo constructo con sufijo expresa la acción causal de Dios respecto del exilio. ‘Exilié’ conserva la fuerza directa y evita una paráfrasis excesiva. ‘Entre las naciones’ refleja bien el uso contextual de הַגּוֹיִם como dispersión entre pueblos extranjeros.
- source_word: הַגּוֹיִם
  english_pob_choice: the nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - los pueblos
  - los gentiles
  lexicon: HALOT
  rationale: En Ezequiel se trata de las naciones extranjeras en general. ‘Las naciones’ es el equivalente más claro y sobrio; ‘los gentiles’ introduciría un contraste teológico no requerido aquí.
- source_word: וְכִנַּסְתִּים
  english_pob_choice: and then gathered them
  chosen_spanish: y luego los reuní
  alternatives_spanish:
  - y los reuní
  - y los congregué
  - y los junté
  lexicon: HALOT
  rationale: כנס significa ‘reunir, congregar, recoger’. ‘Reuní’ es la opción más idiomática en español para el contexto de restauración. ‘Luego’ conserva la secuencia marcada en el texto fuente y en la lectura auditada en inglés.
- source_word: עַל אַדְמָתָם
  english_pob_choice: to their own land
  chosen_spanish: en su propia tierra
  alternatives_spanish:
  - a su tierra
  - sobre su tierra
  - en la tierra que era de ellos
  lexicon: HALOT
  rationale: אַדְמָה aquí designa la tierra/territorio. ‘En su propia tierra’ comunica de forma natural la pertenencia implícita, equivalente al inglés auditado ‘their own land’. ‘En’ evita una imagen espacial extraña que ‘sobre’ podría sugerir en español.
- source_word: וְלֹא אוֹתִיר עוֹד מֵהֶם שָׁם
  english_pob_choice: and I left none of them there any longer
  chosen_spanish: y no dejé allí ninguno de ellos por más tiempo
  alternatives_spanish:
  - y no dejaré allí a ninguno de ellos nunca más
  - y no dejaré allí a ninguno de ellos por más tiempo
  - y ya no dejé allí a ninguno de ellos
  lexicon: HALOT
  rationale: 'הותיר en causativo expresa ‘dejar, dejar restante’. El perfecto hebreo se refleja en pasado: ‘dejé’. ‘Allí’ conserva el referente locativo del texto; ‘por más tiempo’ corresponde a עוֹד y transmite la idea de continuación cesada.'
theological_decisions:
- issue: Referente de ‘allí’ / שָׁם
  english_pob_reading: ‘There’ refers to the nations/the place of exile, not the land of Israel.
  chosen_spanish_reading: ‘Allí’ se refiere al lugar del exilio, es decir, entre las naciones, no a la tierra de Israel.
  alternative_spanish_readings:
  - ‘Allí’ como referencia general sin antecedente explícito
  rationale: El contraste inmediato entre exilio entre las naciones y reunión en la tierra propia indica que el lugar negado por ‘allí’ es el ámbito del exilio. La traducción mantiene esa referencia sin suavizarla.
  doctrine_reference: Ezequiel 39:28; contexto inmediato de restauración nacional y retorno del exilio
- issue: Nombre divino en contexto de habla de Yahvé
  english_pob_reading: Yahweh their God
  chosen_spanish_reading: Yahvé, su Dios
  alternative_spanish_readings:
  - el SEÑOR, su Dios
  - Yahvé, el Dios de ellos
  rationale: Se conserva el nombre propio divino como forma auditable y consistente con la política del proyecto. La frase resultante sigue siendo natural en español y mantiene la relación de pacto.
  doctrine_reference: Uso del Tetragrámaton en la serie POB; fidelidad al nombre revelado
- issue: Valor temporal de la secuencia verbal
  english_pob_reading: when I exiled them ... and then gathered them ... and I left none ...
  chosen_spanish_reading: cuando los exilié ... y luego los reuní ... y no dejé ...
  alternative_spanish_readings:
  - cuando los exilie ... y luego los reúna ... y no dejaré ...
  rationale: El hebreo presenta la secuencia verbal de forma narrativa/profética; el español en pasado preserva mejor la coordinación auditada por la revisión inglesa, evitando una mezcla de futuros que desdibuje el paralelo del texto.
  doctrine_reference: Aspecto verbal del hebreo profético en Ezequiel
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada desde una forma en futuro (‘I will leave’) a un pasado (‘I left’) para concordar con la secuencia verbal hebrea; también se ajustó la expresión espacial de ‘onto’ a ‘to’ por naturalidad. En español se reflejó esa secuencia con pasado narrativo (‘exilié’, ‘reuní’, ‘dejé’) y se optó por ‘en su propia tierra’ como equivalente natural de la localización de restauración.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ en lugar de una sustitución por título litúrgico.
  - ‘las naciones’ se usa para הַגּוֹיִם, no ‘gentiles’, por contexto de exilio nacional.
  - Se eligió un pasado narrativo coherente con la forma verbal hebrea y con la revisión auditada en inglés.
  - ‘su propia tierra’/‘su propia tierra’ se expresa como pertenencia territorial natural en español, sin introducir connotaciones ajenas.
  - La nota a pie de página ofrece la alternativa lexical preservada por el POB inglés respecto al nombre divino.
