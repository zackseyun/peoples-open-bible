revisions:
- from: Y el resto a lo largo de la extensión[a], en correspondencia con la ofrenda santa, será de diez mil al oriente y de diez mil al occidente; estará en correspondencia con la ofrenda santa[b], y su producto será para alimento de los trabajadores de la ciudad.
  to: Y el resto, a lo largo de la longitud, en correspondencia con la contribución santa, será de diez mil al oriente y de diez mil al occidente[a]; estará en correspondencia con la contribución santa, y su producto será para alimento[b] de los trabajadores de la ciudad.
  rationale: Se corrige el anclaje de la nota sobre יָמָּה para que aparezca en «occidente», se reemplaza «ofrenda santa» por «contribución santa» para reflejar mejor תְּרוּמַת הַקֹּדֶשׁ en contexto territorial, y se ajusta «extensión» a «longitud» para acercarse más al valor espacial de בָּאֹרֶךְ sin perder legibilidad.
