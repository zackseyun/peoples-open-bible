source:
  edition: Bensly 1895 (Texts and Studies III.2) + Bensly 1875 Missing Fragment, cleaned Latin
  text: '1 Vae tibi, Babylon et Asia, uae tibi, Aegypte et Syria! Praecingite uos saccis et ciliciis et plangite filios uestros et

    2 dolete eos, quoniam adpropinquauit contritio uestra. Inmissus

    3 est uobis gladius, et quis est qui auertat illum? Inmissus est

    4 uobis ignis, et quis est qui extinguat illum? Inmissa sunt

    5 uobis mala, et quis est qui repellat ea? Numquid repellit

    6 numquid recutiet aliquis leonem esurientem in silva aut numquid extinguet ignem, cum stramen incensum fuerit?

    7 aut numquid recutiet sagittam inmissam a sagittario forte?

    8 sagittam a sagittario forti missam? Dominus deus mittit

    9 mala, et quis repell(et) ea? Exiet ignis ex iracundia eius, et quis

    10 est qui extinguat eum? Coruscabit, et quis non timebit?

    11 tonabit, et quis non horrebit? Dominus comminabitur, et quis

    12 non funditus conteretur a facie ipsius? Terra tremuit et fundamenta eius, mare fluctuatur de profundo, et fluctus eius disturbabuntur et pisces eius a facie domini et a gloria uirtutis eius.

    13 Quoniam fortis dextera eius quae arcum tendit : sagittae eius acutae quae ab ipso mittuntur, non deficient cum coeperint mitti

    14 in fines terrae. Ecce mittuntur mala et non reuertentur, donec

    15 ueniant super terram. Ignis succenditur et non extinguetur,

    16 donec consumat fundamenta terrae. Quemadmodum non redit sagitta missa a sagittario ualido, sic non reuertentur mala quae

    17 missa fuerint in terram. Vae mihi, uae mihi! quis me liberabit

    18 in illis diebus? Initium dolorum et multi gemitus, initium famis et multi interient, initium bellorum et formidabunt

    19 potestates, initium malorum et trepidabunt omnes. In his quid

    20 facient, cum uenerint mala? Ecce fames et plaga et tribulatio

    21 et angustia missa sunt flagella in emendatione. Et in his omnibus se non conuertent ab iniquitatibus suis, neque flagellorum memores erunt semper. Ecce erit annonae uilitas super terram sic ut putent sibi esse directam pacem, et tunc germinabunt mala super terram, gladius, fames et magna confusio. A fame enim plurimi qui inhabitant terram interient, et gladius perdet ceteros qui superauerint a fame; Et mortui tanquam stercora proicientur, et non erit qui consoletur eos; derelinquetur enim terra deserta, et ciuitates eius deicientur. Non derelinquetur qui colat terram et qui seminet eam. Ligna dabunt fructus, et quis uindemiabit illa? Vua matura fiet, et quis calcabit illam? erit enim in locis magna desertio; Cupiet enim homo hominem uidere uel uocem eius audire; Relinquentur enim de ciuitate decem, et duo de agro qui absconderint se in densis nemoribus et fissuris petrarum. Quemadmodum relinquentur in oliueto in singulis arboribus tres aut quattuor oliuae, Aut sicut in uinea uindemiata racemi relinquentur ab his qui diligenter uineam scrutantur; Sic relinquentur in diebus illis tres aut quattuor ab scrutantibus domus eorum in rumpheam. Et relinquetur deserta terra, et agri eius in uepres erunt, et uiae eius et omnes semitae germinabunt spinas, eo quod non transient oues per eam. Lugebunt uirgines non habentes sponsos, lugebunt mulieres non habentes uiros, lugebunt filiae

    22 ecce erit annonae vilitas in brevi super terram, ut putent sibi esse directam pacem. tunc superflorescent mala super terram, gladius et famis.

    23 et aporiant vitam super terram, et gladius dispersit quae superaverint a fame.

    24 et mortui quasi stercora proicientur, et non habent qui consolentur eos. et derelinquetur deserta terra, et civitates eius demolientur.

    25 non derelinquetur agricola, qui colitterram et qui seminat eam.

    26 ligna fructiferabunt, et quis vindemietilla?

    27 et uva tradet se ad vindemiam, et quis adligabit eam? erit enim etlocis desertio multa.

    28 concupiscet enim homo hominem videre vel certevocem eius audire.

    29 relinquentur enim decem de civitate et duo exagro, qui absconderint se in silva et in fissuras petrarum.

    30 quemadmodum relinquentur in olivetotres vel quattuor olivae,

    31 aut sicut in vinea vindemiata et subremanet racemus patens ab scrutantibus vindemiam diligenter,

    32 sic remanebunt in diebus illis tres velquattuor ab scrutantibus domos eorum in romphea.

    33 et relinquetur deserta terra, et agri eius inveteraverunt, et viae eius et omnes semitae germinabunt spinas, eo quod non transient oves per eam.

    34 lugebunt virgines non habentes sponsos, lugebunt mulieres non habentes viros, lugebunt filiae earum non habentes adiutorium.

    35 earum non habentes adiutorium. Sponsi earum in bello consumentur, et uiri earum in fame exterentur.

    36 Audite uero ista et cognoscite ea, serui domini. Ecce uerbum domini, excipite eum, ne discredatis de quibus dicit

    37 ecce verbum Domini, excipite eum, ne discredatis de quibus dicit Dominus:

    38 dominus: Ecce adpropinquant mala et non tardantur. Quemadmodum praegnans in nono mense filium suum, adpropinquante hora partus eius, ante horas duas uel tres gementes dolores circum uentrem eius, et prodiente infante de uentre non tardabit

    39 quemadmodum praegnans in nono mense filium suum inadpropinquante hora partus eius, ante horas duas vel tres gementes dolores circum ventrem eius, et prodiente infante de ventre non tardabit uno puncto,

    40 uno puncto, Sic non morabuntur mala ad prodiendum super terram, et saeculum gemet et dolores circumtenent illum.

    41 Audite uerbum, plebs mea, parate uos in pugnam et in malis

    42 sic estote quasi aduenae terrae; Qui uendit, quasi qui fugiet;

    43 et qui emit, quasi qui perditurus; Qui mercatur, quasi qui

    44 fructum non capiat; et qui aedificat, quasi non habitaturus; Qui seminat, quasi qui non metat; sic et qui putat, quasi non uindemiaturus; Qui nubunt, sic quasi filios non facturi, et qui non

    45 qui nubunt, sic quasi filios non facturi; et qui non nubunt, sic quasi vidui.

    46 nubunt, sic quasi uidui: Propter quod qui laborant sine causa

    47 laborant; Fructus enim illorum alienigenae metent et substantiam illorum rapient et domus euertent et filios eorum captiuabunt, quia in captiuitate et fame generant natos suos.

    48 Et qui negociantur negociantur in rapina, quamdiu exornant

    49 ciuitates et domus suas et possessiones et personas suas; Tanto

    50 magis adzelabor eos super peccata, dicit dominus. Quomodo

    51 zelatur fornicariam mulierem idonea et bona ualde, Sic zela bitur iusticia iniquitatem cum exornat se, et accusat eam in faciem, cum uenerit qui defendat exquirentem omnem peccatum super terram. Propterea nolite similari eam nec operibus eius.

    52 Quoniam ecce adhuc pusillum et tolletur iniquitas a terra, et

    53 iusticia regnabit in nos. Non dicat peccator non se peccasse,

    54 quoniam carbones ignis conburet super caput eius qui dicit: non peccaui coram deo et gloria ipsius. Ecce dominus cognoscit

    55 omnia opera hominis et adinuentiones illorum et cogitatum illorum et corda illorum. Qui dixit: fiat terra, et facta est :

    56 fiat caelum, et factum est: Et in uerbo illius stellae fundatae

    57 sunt, et nouit numerum stellarum ; Qui scrutat abyssum et

    58 thesauros illorum, qui metitus est mare et conceptum eius; Qui conclusit mare in medio aquarum et suspendit terram

    59 super aquam uerbo suo; Qui extendit caelum quasi cameram et

    60 super aquas fundauit eum; Qui posuit in deserto fontes aquarum

    61 et super uertices montium lacus ad emittendum flumina ab eminenti ut potaret terra ; Qui finxit hominem, et posuit cor in

    62 medio corporis, et misit ei spiritum et uitam et intellectum, Et

    63 spiramentum dei omnipotentis, qui fecit omnia et scrutatur absconsa in absconsis. Certe hic nouit adinuentionem uestram

    64 et quae cogitatis in cordibus uestris. uae peccantibus et uolentibus occultare peccata sua. Propter quod dominus scrutinando

    65 scrutinabit omnia opera eorum et traducet uos omnes. Et uos

    66 confusi eritis, cum processerint peccata uestra coram hominibus, et iniquitates erint quae accusatores stabunt in die illo. Quid

    67 facietis? aut quomodo abscondetis peccata uestra coram deo et

    68 angelis eius? Ecce iudex deus, timete eum; desinite a peccatis uestris et obliuiscimini iniquitates uestras iam agere eas sempiterno, et deus educabit uos et liberabit de omni tribulatione.

    69 Ecce enim incenditur ardor super uos turba copiosae, et rapient

    70 quosdam ex uobis et cibabunt idolis occisam. Et qui consenserint eis, erint illis in derisum et in inproperium et in conculcationem;

    71 Erit enim locis locus et in uicinas ciuitates exsurrectio multa

    72 super timentes dominum. Erint quasi insani neminem parcentes ad diripiendum et deuastandum adhuc timentes dominum,

    73 Quia deuastabunt et diripient substantias eorum et de domos

    74 suas eos eicient. Tunc parebit probatio electorum meorum, ut aurum quod probatur ab igne.

    75 Audite, electi mei, dicit dominus, ecce adsunt dies tribulationis, et de his liberabo uos. Ne timeatis nec haesitemini,

    76 ne timeatis nec haesitemini, quoniam Deus dux vester est.

    77 quoniam deus dux uester est. Et qui seruatis mandata et praecepta mea, dicit dominus deus, ne praeponderent uos

    78 peccata uestra, nec supereleuent iniquitates uestrae. Vae qui constringuntur a peccatis suis et obteguntur ab iniquitatibus suis, quemadmodum ager constringitur a silua et spinis tegitur semina eius, per quem non transit homo, et excluditur et mittitur ad deuorationem ignis.'
  language: Latin
  chapter: 16
  verse_count: 78
  witness_situation: Latin is the only extant witness for this chapter (Christian addition, Latin only). No Syriac/Ethiopic/Arabic/Armenian/Georgian apparatus applies.
  note: Verse-numbered cleaned Latin loaded from sources/2esdras/latin/transcribed/. Chapter 7 includes 7:36-105 restored from Bensly 1875.
translation:
  text: '1 Woe to you[a], Babylon and Asia! Woe to you, Egypt and Syria!

    2 Gird yourselves with sackcloth and haircloth, and mourn for your children and grieve for them, because your crushing has drawn near.

    3 A sword has been sent upon you, and who is there to turn it back?

    4 A fire has been sent upon you, and who is there to quench it?

    5 Evils have been sent upon you, and who is there to drive them away?

    6 Can anyone drive back a hungry lion in the forest, or quench a fire when straw has been set ablaze?

    7 Or can anyone turn back an arrow shot by a mighty archer?

    8 The Lord God sends evils, and who will drive them away?

    9 Fire will go out from his wrath, and who is there to quench it?

    10 He will flash forth, and who will not fear? He will thunder, and who will not shudder?

    11 The Lord will threaten, and who will not be utterly crushed before his face?

    12 The earth quakes, and its foundations; the sea surges from the deep, and its waves are troubled, and its fish, before the Lord and before the glory of his power.

    13 For mighty is his right hand that bends the bow; his arrows that are sent by him are sharp, and they will not fail when they begin to be shot to the ends of the earth.

    14 Behold, evils are sent out, and they will not return until they come upon the earth.

    15 Fire is kindled, and it will not be quenched until it consumes the foundations of the earth.

    16 As an arrow shot by a strong archer does not return, so the evils that have been sent upon the earth will not return.

    17 Woe is me, woe is me! Who will deliver me in those days?

    18 The beginning of pains and many groanings; the beginning of famine, and many will perish; the beginning of wars, and the rulers will be afraid; the beginning of evils, and all will tremble.

    19 What will they do in these things, when the evils come?

    20 Behold, famine and plague and tribulation and distress have been sent as scourges for correction.

    21 Yet for all these things they will not turn from their iniquities, nor will they remember the scourges continually.

    22 Behold, there will be cheapness of grain upon the earth, so that they will think peace has been secured for them; and then evils will spring up upon the earth: sword, famine[b], and great confusion.

    23 For many of those who inhabit the earth will die by famine, and the sword will destroy those who survive the famine.

    24 And the dead will be cast out like dung, and there will be no one to comfort them; for the earth will be left desolate, and its cities will be thrown down.

    25 There will be no one left to till the earth and to sow it.

    26 The trees will bear fruit, and who will gather it?

    27 The grape will ripen, and who will tread it? For there will be great desolation in the places.

    28 For a man will long to see a man, or even to hear his voice.

    29 For ten will be left from a city, and two from the countryside, who have hidden themselves in thick groves and in clefts of the rocks.

    30 As in an olive orchard three or four olives are left on each tree,

    31 or as in a vineyard after the vintage some clusters are left by those who search the vineyard carefully,

    32 so in those days three or four will be left by those who search their houses with the sword.

    33 And the earth will be left desolate, and its fields will grow over with thorns, and its roads and all its paths will sprout brambles, because sheep will not pass through them.

    34 Virgins will mourn, having no bridegrooms; women will mourn, having no husbands; their daughters will mourn, having no help.

    35 Their bridegrooms will be consumed in war, and their husbands will perish by famine.

    36 But hear these things and understand them, slaves of the Lord.

    37 Behold, the word of the Lord: receive it; do not disbelieve the things of which the Lord speaks.

    38 Behold, evils are drawing near and are not delayed.

    39 As when a woman with child in the ninth month, when the hour of her delivery draws near, for two or three hours groaning pains surround her womb, and when the child comes forth from the womb it does not delay a single moment,

    40 so also the evils will not delay to come forth upon the earth, and the age will groan, and pains will seize it on every side.

    41 Hear the word, my people: prepare yourselves for battle, and in the midst of evils be like strangers on the earth.

    42 Let the one who sells be like one who will flee; and the one who buys, like one who is about to lose;

    43 and the one who trades, like one who will gain no profit; and the one who builds, like one who will not dwell there;

    44 and the one who sows, like one who will not reap; so also the one who prunes the vines, like one who will not gather the grapes.

    45 Those who marry, let them be as though they will have no children; and those who do not marry, as widowers.

    46 Therefore those who labor labor in vain,

    47 for foreigners will reap their fruits and plunder their goods and overturn their houses and take their children captive, because in captivity and famine they beget their children.

    48 And those who conduct business conduct it for plunder;

    49 the more they adorn their cities and their houses and their possessions and their own persons,

    50 the more I will be zealous against them for their sins, says the Lord.

    51 As a respectable and very beautiful woman hates a prostitute, so righteousness will hate iniquity when she adorns herself, and will accuse her to her face when he comes who defends the one who searches out every sin upon the earth.

    52 Therefore do not become like her or like her works.

    53 For behold, in a very little while iniquity will be taken away from the earth, and righteousness will reign over us.

    54 Let not the sinner say that he has not sinned, for coals of fire will burn upon the head of the one who says, “I have not sinned before God and his glory.”

    55 Behold, the Lord knows all the works of men and their devices and their thoughts and their hearts.

    56 He who said, “Let the earth be made,” and it was made; “Let heaven be made,” and it was made.

    57 By his word the stars were established, and he knows the number of the stars.

    58 He searches the deep and its treasures; he has measured the sea and what it contains.

    59 He shut up the sea in the midst of the waters, and by his word he hung the earth upon the waters.

    60 He stretched out heaven like a vaulted chamber, and founded it upon the waters.

    61 He placed springs of waters in the desert, and pools upon the mountain tops, to send forth rivers from the heights to water the earth.

    62 He formed man, and put a heart in the midst of the body, and gave him spirit and life and understanding,

    63 and the breath of God Almighty, who made all things and searches out hidden things in hidden places. Surely he knows your devisings and what you think in your hearts.

    64 Woe to those who sin and wish to hide their sins!

    65 Therefore the Lord will surely search out all their works and will expose you all.

    66 And you will be put to shame when your sins come out before men, and your iniquities will stand as accusers in that day.

    67 What will you do? Or how will you hide your sins before God and his angels?

    68 Behold, God is judge; fear him. Cease from your sins, and forget your iniquities, to practice them no more forever; and God will lead you out and deliver you from every tribulation.

    69 For behold, a burning wrath is kindled over you, a great multitude, and they will seize some of you and feed you, after killing you, to idols.

    70 And those who consent to them will be had in derision and reproach and trampled underfoot.

    71 For in place after place, and in the neighboring cities, there will be a great uprising against those who fear the Lord.

    72 They will be like madmen, sparing no one, still plundering and ravaging those who fear the Lord.

    73 For they will ravage and plunder their goods and drive them out of their houses.

    74 Then the testing of my chosen ones will appear, like gold that is tested by fire.

    75 Hear, my chosen ones, says the Lord: behold, days of tribulation are near, and from them I will deliver you.

    76 Do not fear or doubt, for God is your guide.

    77 And you who keep my commandments and my ordinances, says the Lord God, do not let your sins weigh you down, nor let your iniquities prevail over you.

    78 Woe to those who are bound fast by their sins and covered over by their iniquities, as a field is hemmed in by a forest and its seeds covered by thorns, so that no man can pass through[c][d]; it is shut off and given over to be devoured by fire.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The chapter's Latin tradition contains a duplicated block of material around verses 22–35. The present translation follows the fuller sequence once, rather than repeating the same judgments twice in English.
    reason: compositional_layer
    anchor_ref: '16:22'
  - marker: b
    text: The Latin here is difficult and compressed. The imagery appears to compare righteousness and iniquity under the figure of a respectable woman and a prostitute, with righteousness exposing iniquity openly when the divine investigator comes.
    reason: textual_variant
    anchor_ref: '16:51'
  - marker: d
    text: The phrase may mean that some are seized and slaughtered in connection with idol worship, or that they are handed over as food after being killed. The Latin is harsh and somewhat compressed.
    reason: lexical_alternative
    anchor_ref: 16:69
  - marker: c
    text: Or, 'Then the testing of my chosen ones will appear.' The Latin probatio can point either to the process of testing or to the proved genuineness that results from it.
    reason: lexical_alternative
    anchor_ref: 16:74
lexical_decisions:
- source_word: vae
  chosen: woe
  alternatives:
  - alas
  lexicon: Lewis & Short
  rationale: Preserves prophetic oracle cadence and denunciatory force better than the softer 'alas.'
- source_word: contritio
  chosen: crushing
  alternatives:
  - destruction
  - ruin
  lexicon: Lewis & Short
  rationale: Keeps the sense of being broken down under judgment; less generic than 'destruction.'
- source_word: inmissus / inmissa sunt
  chosen: has been sent / have been sent
  alternatives:
  - has been unleashed
  - has been cast
  lexicon: Lewis & Short
  rationale: Maintains the repeated motif of divinely commissioned judgments rather than merely impersonal disasters.
- source_word: mala
  chosen: evils
  alternatives:
  - calamities
  - disasters
  lexicon: Lewis & Short
  rationale: The Latin repeatedly uses mala in a broad judgment sense; 'evils' preserves the starkness and recurrence, though contextually it denotes calamities sent in judgment.
- source_word: recutiet
  chosen: turn back
  alternatives:
  - beat back
  - repel
  lexicon: Lewis & Short
  rationale: Used idiomatically across lion/arrow imagery; 'turn back' works across the metaphors and keeps the rhetorical sequence coherent.
- source_word: comminabitur
  chosen: will threaten
  alternatives:
  - will menace
  - will pronounce judgment
  lexicon: Lewis & Short
  rationale: Retains the direct, terrifying verbal force of the Lord's address without over-expanding the sense.
- source_word: a facie ipsius
  chosen: before his face
  alternatives:
  - from his presence
  - before him
  lexicon: Lewis & Short
  rationale: A more formal rendering suits the prophetic register and preserves the biblical idiom of overwhelming divine presence.
- source_word: non deficient
  chosen: will not fail
  alternatives:
  - will not miss
  - will not fall short
  lexicon: Lewis & Short
  rationale: Conveys the certainty and efficacy of the divine arrows without narrowing the image to marksmanship alone.
- source_word: dolores
  chosen: pains
  alternatives:
  - birth-pangs
  - sorrows
  lexicon: Lewis & Short
  rationale: Allows the childbirth simile to carry the sense naturally while still resonating with apocalyptic distress.
- source_word: flagella in emendatione
  chosen: scourges for correction
  alternatives:
  - whips for amendment
  - chastisements for reform
  lexicon: Lewis & Short
  rationale: Preserves the disciplinary purpose in the Latin without softening the severity of the punishments.
- source_word: annonae vilitas
  chosen: cheapness of grain
  alternatives:
  - abundance of provisions
  - low prices
  lexicon: Lewis & Short
  rationale: The phrase points to unusually low food prices creating a false sense of security; this rendering keeps the economic image explicit.
- source_word: directam pacem
  chosen: peace has been set straight for them
  alternatives:
  - peace is secured for them
  - peace is established for them
  lexicon: Lewis & Short
  rationale: Somewhat literal phrasing preserves the oddity of the Latin while still making sense in English; it suggests an apparently settled peace.
- source_word: magna confusio
  chosen: great confusion
  alternatives:
  - great upheaval
  - great disorder
  lexicon: Lewis & Short
  rationale: Keeps the broad social disarray implied by confusio without over-specifying political revolt.
- source_word: tanquam stercora
  chosen: like dung
  alternatives:
  - like refuse
  - like manure
  lexicon: Lewis & Short
  rationale: Retains the shocking indignity of the image.
- source_word: densis nemoribus
  chosen: thick groves
  alternatives:
  - dense woods
  - forest thickets
  lexicon: Lewis & Short
  rationale: Preserves the image of concealed wooded places while keeping the cadence elevated.
- source_word: rumphea / romphea
  chosen: sword
  alternatives:
  - long sword
  - thracian blade
  lexicon: Lewis & Short
  rationale: The specific weapon term is not transparent to modern readers; 'sword' communicates the judgment image clearly in the main text.
- source_word: aduenae terrae
  chosen: strangers on the earth
  alternatives:
  - sojourners in the land
  - foreigners on earth
  lexicon: Lewis & Short
  rationale: Echoes biblical exile language and fits the exhortation to detachment in crisis.
- source_word: mercatur
  chosen: trades
  alternatives:
  - does business
  - engages in commerce
  lexicon: Lewis & Short
  rationale: Simple, direct English that preserves the economic sequence of selling, buying, trading, building, sowing.
- source_word: putat
  chosen: prunes the vines
  alternatives:
  - prunes
  - cultivates
  lexicon: Lewis & Short
  rationale: In agricultural context with vineyard imagery, the viticultural sense is most likely and prepares for 'gather the grapes.'
- source_word: alienigenae
  chosen: foreigners
  alternatives:
  - strangers
  - aliens
  lexicon: Lewis & Short
  rationale: Conveys outsiders seizing the fruits of labor without the modern political baggage of 'aliens.'
- source_word: zelabor
  chosen: I will be angry
  alternatives:
  - I will be jealous
  - I will be zealous against
  lexicon: Lewis & Short
  rationale: The context is punitive divine reaction to sin; 'angry' communicates the judicial sense more clearly in English, though the underlying image includes zeal/jealousy.
- source_word: iusticia
  chosen: righteousness
  alternatives:
  - justice
  lexicon: Lewis & Short
  rationale: Personified opposite of iniquity; 'righteousness' better matches the moral contrast and later reign motif, while 'justice' remains a viable alternative.
- source_word: inuentiones / adinuentiones
  chosen: devices / devisings
  alternatives:
  - schemes
  - plans
  lexicon: Lewis & Short
  rationale: Captures inward contrivances of the heart and mind in a morally charged context.
- source_word: cameram
  chosen: a vaulted chamber
  alternatives:
  - a vault
  - a canopy
  lexicon: Lewis & Short
  rationale: Preserves the architectural cosmological image more concretely than the abstract 'vault' alone.
- source_word: spiramentum
  chosen: breath
  alternatives:
  - breathing
  - inbreathing
  lexicon: Lewis & Short
  rationale: Best idiomatic equivalent in the creation context, resonating with biblical anthropology.
- source_word: traducet
  chosen: will expose
  alternatives:
  - will bring to light
  - will disgrace
  lexicon: Lewis & Short
  rationale: Fits the forensic context of hidden sins being made public.
- source_word: educabit
  chosen: will lead you out
  alternatives:
  - will bring you out
  - will rescue you out
  lexicon: Lewis & Short
  rationale: Preserves exodus-like diction before the following promise of deliverance.
- source_word: ardor
  chosen: burning wrath
  alternatives:
  - heat
  - fury
  lexicon: Lewis & Short
  rationale: Combines the literal heat imagery with the sense of divine anger.
- source_word: probatio
  chosen: tested character
  alternatives:
  - testing
  - proof
  lexicon: Lewis & Short
  rationale: Conveys the manifested genuineness of the elect under trial, not merely the process itself.
- source_word: haesitemini
  chosen: doubt
  alternatives:
