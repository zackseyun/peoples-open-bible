translation:
  language: es
  text: Proclamen su gloria entre las naciones, sus obras maravillosas[a] entre todos los pueblos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'sus maravillas'.
    reason: lexical_alternative
lexical_decisions:
- source_word: סַפְּרוּ
  english_pob_choice: Declare
  chosen_spanish: Proclamen
  alternatives_spanish:
  - Declaren
  - Cuenten
  - Anuncien
  lexicon: HALOT
  rationale: El imperativo plural piel de ספר pide una proclamación pública y verbal. «Proclamen» conserva el tono exhortativo y solemne mejor que un «cuenten» más conversacional, y evita un calco demasiado rígido de «declare».
- source_word: בַגּוֹיִם
  english_pob_choice: among the nations
  chosen_spanish: entre las naciones
  alternatives_spanish:
  - entre los gentiles
  - en medio de las naciones
  lexicon: HALOT
  rationale: גּוֹיִם aquí conserva su sentido amplio de pueblos/naciones. «Entre» reproduce bien la idea de anunciar en su ámbito, y «naciones» mantiene el alcance universal del versículo sin cargarlo con el matiz técnico de «gentiles».
- source_word: כְּבוֹדוֹ
  english_pob_choice: his glory
  chosen_spanish: su gloria
  alternatives_spanish:
  - su honra
  - su esplendor
  lexicon: HALOT
  rationale: כָּבוֹד en contextos de alabanza se vierte de manera más natural y teológicamente estable como «gloria». «Su gloria» preserva el referente divino implícito en el sufijo pronominal.
- source_word: בְּכָל הָעַמִּים
  english_pob_choice: among all the peoples
  chosen_spanish: entre todos los pueblos
  alternatives_spanish:
  - entre todos los pueblos de la tierra
  - a todos los pueblos
  lexicon: HALOT
  rationale: עַמִּים se distingue de גּוֹיִם por su matiz de «pueblos». «Entre todos los pueblos» conserva el paralelismo poético y evita igualar artificialmente los dos cola.
- source_word: נִפְלְאוֹתָיו
  english_pob_choice: his wondrous deeds
  chosen_spanish: sus maravillas
  alternatives_spanish:
  - sus obras maravillosas
  - sus actos portentosos
  lexicon: HALOT
  rationale: La raíz פלא puede referirse tanto a «hechos maravillosos» como a «maravillas» en sí. En español, «sus maravillas» es breve y fiel al rango semántico del hebreo; mantiene abierta la tensión entre el acto y su carácter admirable, como hace el inglés POB con sus notas alternativas.
theological_decisions:
- issue: Alcance universal de la proclamación
  english_pob_reading: The verse commands proclamation of the LORD's glory and acts to all nations/peoples universally.
  chosen_spanish_reading: El versículo manda proclamar su gloria y sus maravillas de manera universal, entre las naciones y entre todos los pueblos.
  alternative_spanish_readings:
  - Un mandato limitado principalmente a Israel y sus vecinos
  - Una referencia meramente interna al culto de Israel
  rationale: La pareja paralela גּוֹיִם / עַמִּים enfatiza amplitud internacional. La traducción conserva esa extensión universal sin añadir formulaciones misionales posteriores que no están explícitas en el hebreo.
  doctrine_reference: 'DOCTRINE.md §Translation philosophy: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior: no se incluyen notas al pie sin anclaje en el texto, y por eso no hay marcador [a] en la traducción.'
  spanish_consistency_notes:
  - Se mantuvo el paralelismo poético entre «entre las naciones» y «entre todos los pueblos».
  - Se evitó «SEÑOR» para preservar el referente del texto fuente, que aquí aparece por sufijo pronominal en tercera persona.
  - Se eligió un léxico digno y moderno, apto para lectura eclesial sin sonar arcaico.
