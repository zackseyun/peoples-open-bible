review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido general del griego: una súplica a Dios para derrotar a los enemigos y una exhortación para que quienes conocen su nombre lo alaben. Sin embargo, «Hiérelos» no preserva plenamente la fuerza de κατάβαλε (''derriba/abate/hazlos caer, derrotar decisivamente''), ya que en español puede significar solo ''lesionar'' sin implicar derrota. Además, conviene ajustar «con la espada» a «por la espada» para reflejar mejor el instrumental del griego y la decisión auditada en inglés.'
  spanish_quality_summary: El español es claro, natural y de registro eclesial legible. La sintaxis funciona bien y «con himnos» suena idiomático. El único problema relevante de estilo y fidelidad es el verbo inicial, que debilita el tono militar y la petición decisiva del original.
  glossary_alignment: No hay conflictos con la terminología base del proyecto en este versículo. «Dios» no necesita explicitarse. «Nombre» y «himnos» están bien. La decisión pronominal implícita dirigida a Dios se conserva adecuadamente.
  issues:
  - severity: medium
    issue: «Hiérelos» debilita κατάβαλε
    rationale: κατάβαλε en este contexto militar e imperativo de oración pide abatir o derribar decisivamente, no solo herir. «Hiérelos» puede permitir que sigan en pie y por eso no preserva bien la fuerza del original ni la decisión inglesa «Strike them down».
  - severity: low
    issue: «con la espada» podría mejorarse a «por la espada»
    rationale: Aunque «con la espada» es posible en español, el audit trail inglés revisó precisamente a «by the sword» para reflejar mejor el instrumental. «Por la espada» suena natural y recoge mejor ese matiz en esta construcción.
  revised_spanish_text: Abátelos por la espada de los que te aman, y que todos los que conocen tu nombre te alaben con himnos.
  revision_rationale: Se reemplaza «Hiérelos» por «Abátelos» para reflejar la derrota decisiva expresada por κατάβαλε en contexto militar y oracional. Se ajusta «con la espada» a «por la espada» para alinearse mejor con el instrumental griego y con la revisión documentada en el audit trail inglés. El resto del versículo es fiel, claro y natural en español.
