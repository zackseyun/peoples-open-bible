review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia ritual del hebreo: la finalización de los días, el inicio ''desde el octavo día en adelante'', la acción sacerdotal en el altar, y la aceptación del pueblo por parte de Dios. Sin embargo, hay dos desajustes relevantes con el sentido auditado y la documentación: (1) la nota [a] está anclada a ''cumplido'' pero su contenido corresponde a שַׁלְמֵיכֶם (''ofrendas de paz/comunión''); debe moverse a esa expresión. (2) ''harán sobre el altar'' es posible como calco del hebreo, pero no preserva tan claramente en español el sentido sacrificial específico que la auditoría inglesa justificó como ''shall offer''; ''ofrecerán en/sobre el altar'' comunica mejor el valor cultual sin perder fidelidad. Además, la fórmula final es mejor como ''declara el Señor Yahvé'' sin problema doctrinal, aunque ''el Señor, Yahvé'' sería demasiado interpretativo.'
  spanish_quality_summary: El español es mayormente claro y digno, pero presenta un problema técnico importante de legibilidad editorial por la nota mal ubicada. También 'harán sobre el altar' suena más rígido y menos natural que 'ofrecerán sobre el altar' o 'ofrecerán en el altar' en registro bíblico actual. El resto del versículo fluye bien; 'holocaustos', 'ofrendas de paz' y 'yo los aceptaré' son adecuados.
  glossary_alignment: 'Buena alineación general con la terminología del proyecto: יְהוָה se preserva como ''Yahvé''; עוֹלָה como ''holocaustos''; שְׁלָמִים como ''ofrendas de paz'' con alternativa ''ofrendas de comunión'' en nota. La principal corrección es hacer que la nota léxica se aplique a שַׁלְמֵיכֶם y no a וִיכַלּוּ. También conviene seguir la decisión inglesa para יַעֲשׂוּ en contexto sacrificial con ''ofrecerán'' en lugar de ''harán''.'
  issues:
  - severity: high
    issue: La nota [a] está anclada al lugar equivocado.
    rationale: En el texto español, [a] aparece tras 'se hayan cumplido', pero la nota dice 'O ‘sus ofrendas de comunión’', lo cual corresponde a שַׁלְמֵיכֶם ('sus ofrendas de paz'). Esto crea una incoherencia editorial y semántica.
  - severity: medium
    issue: '''Harán sobre el altar'' suena demasiado literal y menos preciso que ''ofrecerán''.'
    rationale: Aunque יַעֲשׂוּ literalmente puede ser 'harán', en contexto sacrificial con ofrendas sobre el altar la auditoría inglesa justificó 'shall offer'. En español, 'ofrecerán' preserva mejor el sentido cultual y mejora la legibilidad.
  - severity: low
    issue: La preposición con altar puede optimizarse.
    rationale: '''Sobre el altar'' es aceptable, pero con ''ofrecerán'' muchos lectores perciben más natural ''en el altar''. No obstante, ''sobre el altar'' sigue siendo defendible y cercano al hebreo עַל.'
  revised_spanish_text: Cuando los días se hayan cumplido, entonces, desde el octavo día en adelante, los sacerdotes ofrecerán sobre el altar sus holocaustos y sus ofrendas de paz[a], y yo los aceptaré, declara el Señor Yahvé.
  revised_footnotes:
  - marker: a
    text: O ‘sus ofrendas de comunión’.
    reason: lexical_alternative
  revision_rationale: Se corrige la ubicación de la nota para que corresponda a שַׁלְמֵיכֶם, y se cambia 'harán' por 'ofrecerán' para reflejar con más claridad el valor sacrificial de יַעֲשׂוּ en español natural y fiel. Se mantiene 'Señor Yahvé' conforme a la política del proyecto sobre el nombre divino.
