id: MIC.4.8
reference: Micah 4:8
source:
  edition: WLC
  text: וְ/אַתָּ֣ה מִגְדַּל עֵ֗דֶר עֹ֛פֶל בַּת צִיּ֖וֹן עָדֶ֣י/ךָ תֵּאתֶ֑ה וּ/בָאָ֗ה הַ/מֶּמְשָׁלָה֙ הָ/רִ֣אשֹׁנָ֔ה מַמְלֶ֖כֶת לְ/בַ֥ת יְרוּשָׁלִָֽם־־־׃
translation:
  text: And you[a], tower of the flock, hill of daughter Zion—to you it will come, yes, the former dominion will come[c][b], the kingdom of the daughter of Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Migdal-eder' (a place name); also possibly 'watchtower of the flock.'
    reason: alternative_reading
  - marker: b
    text: Or 'Ophel of daughter Zion,' taking 'Ophel' as a place name rather than the common noun 'hill.'
    reason: alternative_reading
  - marker: c
    text: '''The former dominion'' likely refers to the restoration of Jerusalem''s earlier royal rule.'
    reason: cross_reference
lexical_decisions:
- source_word: מִגְדַּל עֵדֶר
  chosen: tower of the flock
  alternatives:
  - Migdal-eder
  - watchtower of the flock
  lexicon: HALOT
  rationale: A construct phrase meaning literally 'tower of flock/herd.' The common noun sense fits the prophetic imagery best in the main text. Because the phrase may also function as a place name known from Gen 35:21, the transliterated alternative is preserved in a footnote rather than adopted in the main text.
- source_word: עֹפֶל
  chosen: hill
  alternatives:
  - stronghold
  - Ophel
  - mound
  lexicon: HALOT
  rationale: The noun can denote a raised hill/mound and in Jerusalem contexts can function as the place name Ophel. Here, paired appositionally with 'daughter Zion,' a topographical title is likely. 'Hill' is clear modern English; the place-name alternative is worth preserving in a footnote.
- source_word: בַּת צִיּוֹן
  chosen: daughter Zion
  alternatives:
  - Daughter Zion
  lexicon: HALOT
  rationale: A standard prophetic personification for Zion/Jerusalem. Retaining 'daughter' preserves the metaphor and gendered imagery of the Hebrew rather than flattening it to simply 'Zion'.
- source_word: עָדֶיךָ
  chosen: to you
  alternatives:
  - as far as you
  - unto you
  lexicon: HALOT
  rationale: The preposition עַד with pronominal suffix can mean 'up to, as far as, unto.' In this restoration context, idiomatic English is best expressed as 'to you it will come,' while preserving the directional sense.
- source_word: תֵּאתֶה
  chosen: it will come
  alternatives:
  - she will come
  lexicon: HALOT
  rationale: The verb is 3fs, agreeing with an implied feminine subject, most naturally the coming rule/dominion. English commonly uses impersonal 'it' for such an abstract subject; this avoids awkwardness while preserving the sense.
- source_word: הַמֶּמְשָׁלָה הָרִאשֹׁנָה
  chosen: the former dominion
  alternatives:
  - the first dominion
  - the earlier rule
  lexicon: HALOT
  rationale: ממשלה denotes rule/dominion; הראשונה here is best taken temporally as 'former/earlier' rather than ordinal 'first.' The phrase points to the restoration of an earlier royal order.
- source_word: מַמְלֶכֶת
  chosen: the kingdom
  alternatives:
  - royal rule
  - kingship
  lexicon: HALOT
  rationale: The noun denotes kingdom/royal dominion. 'The kingdom' is the most natural rendering in apposition to 'the former dominion' and keeps the political-restorative force.
- source_word: לְבַת יְרוּשָׁלִָם
  chosen: for the daughter of Jerusalem
  alternatives:
  - to the daughter of Jerusalem
  - for Daughter Jerusalem
  lexicon: HALOT
  rationale: The preposition ל can indicate direction or advantage. 'For' works well with 'the kingdom' in English ('the kingdom for the daughter of Jerusalem') and preserves the personified city imagery.
