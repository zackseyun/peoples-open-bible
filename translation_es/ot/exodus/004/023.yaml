translation:
  language: es
  text: 'Y te dije[a]: «Deja ir a mi hijo, para que me sirva», pero te rehusaste a dejarlo ir. Mira[b], yo estoy por matar a tu hijo, tu primogénito».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «suelta a mi hijo» / «libera a mi hijo»; para שׁלח, expresión frecuente en Éxodo para la liberación de Israel.
    reason: lexical_alternative
  - marker: b
    text: 'O «He aquí»; el participio con esta partícula puede expresar acción futura inminente: «estoy por matar».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֹמַר
  english_pob_choice: And I said
  chosen_spanish: Y dije
  alternatives_spanish:
  - Entonces dije
  lexicon: HALOT
  rationale: La forma narrativa wayyiqtol introduce la cita directa en secuencia. En español, «Y dije» conserva la relación con el discurso anterior sin recargar el verso.
- source_word: אֵלֶיךָ
  english_pob_choice: to you
  chosen_spanish: a ti
  alternatives_spanish:
  - a usted
  lexicon: HALOT
  rationale: El hebreo usa segunda persona masculina singular. «A ti» conserva la referencia directa a Faraón y el tono de confrontación del pasaje.
- source_word: שַׁלַּח
  english_pob_choice: Let my son go
  chosen_spanish: Deja ir
  alternatives_spanish:
  - Suéltalo
  - Permite que vaya
  lexicon: HALOT
  rationale: En este contexto, שׁלח funciona como fórmula de liberación/salida en Éxodo. «Deja ir» comunica bien el mandato y el matiz de permitir la salida sin perder naturalidad en español.
- source_word: אֶת־בְּנִי
  english_pob_choice: my son
  chosen_spanish: a mi hijo
  alternatives_spanish:
  - a mi hijo varón
  - a mi hijo, mi hijo
  lexicon: HALOT
  rationale: Se mantiene el singular filial, importante para la metáfora de Israel como hijo de Yahvé en el contexto inmediato. «Hijo» es la forma más clara y fiel en español.
- source_word: וְיַעַבְדֵנִי
  english_pob_choice: so that he may serve me
  chosen_spanish: para que me sirva
  alternatives_spanish:
  - y me sirva
  - para que me adore
  lexicon: HALOT
  rationale: עבד tiene un rango que incluye servicio leal y, en ciertos contextos, culto. «Me sirva» preserva el sentido amplio sin reducirlo solo a adoración litúrgica.
- source_word: וַתְּמָאֵן
  english_pob_choice: but you refused
  chosen_spanish: pero te rehusaste
  alternatives_spanish:
  - y te negaste
  - pero te negaste
  lexicon: HALOT
  rationale: מאן expresa rechazo o negativa. «Te rehusaste» conserva bien el tono de resistencia deliberada; el contraste adversativo lo da «pero».
- source_word: לְשַׁלְּחוֹ
  english_pob_choice: to let him go
  chosen_spanish: a dejarlo ir
  alternatives_spanish:
  - a soltarlo
  - a enviarlo fuera
  lexicon: HALOT
  rationale: El infinitivo retoma el verbo anterior y apunta al acto de permitir la salida. «Dejarlo ir» es la forma más natural en español y conserva la relación con la primera cláusula.
- source_word: הִנֵּה
  english_pob_choice: Behold
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira bien
  - He aquí
  lexicon: HALOT
  rationale: La partícula introduce una घोषणा solemne e inminente. «Mira» comunica esa advertencia con solemnidad suficiente en español contemporáneo; se evita «He aquí» por su mayor arcaísmo.
- source_word: הֹרֵג
  english_pob_choice: I am about to kill
  chosen_spanish: yo estoy por matar
  alternatives_spanish:
  - voy a matar
  - mataré
  lexicon: HALOT
  rationale: El participio con הִנֵּה expresa una acción inminente. «Estoy por matar» conserva esa inmediatez sin forzar una simple forma futura.
- source_word: אֶת־בִּנְךָ
  english_pob_choice: your son
  chosen_spanish: a tu hijo
  alternatives_spanish:
  - a tu primogénito
  lexicon: HALOT
  rationale: El hebreo mantiene el paralelo con «mi hijo» y luego especifica quién es. «A tu hijo» reproduce esa correspondencia directa antes de la aclaración final.
- source_word: בְּכֹרֶךָ
  english_pob_choice: your firstborn
  chosen_spanish: tu primogénito
  alternatives_spanish:
  - tu hijo primogénito
  - tu mayor
  lexicon: HALOT
  rationale: בכור designa al primogénito. «Primogénito» es el término bíblico y claro en español, y conserva la fuerza judicial y simbólica del contraste sonoro y temático.
theological_decisions:
- issue: Metáfora filial corporativa de Israel
  english_pob_reading: Retain the singular filial metaphor as 'my son' rather than pluralizing to 'my people' or 'my children.'
  chosen_spanish_reading: Mantener «mi hijo» en singular, no pluralizar ni suavizar a «mi pueblo» o «mis hijos».
  alternative_spanish_readings:
  - mi pueblo
  - mis hijos
  - mi hijo Israel
  rationale: El contexto inmediato sostiene la imagen de Israel como hijo de Yahvé, y el verso depende de esa correspondencia con el hijo de Faraón. Conservar el singular preserva la retórica y la tensión teológica del juicio.
  doctrine_reference: Éxodo 4:22-23; Oseas 11:1 (trasfondo filial de Israel)
- issue: Sentido de עבד aplicado a Yahvé
  english_pob_reading: Render as 'serve me' in the main text.
  chosen_spanish_reading: Traducir como «me sirva» en vez de restringirlo a «me adore».
  alternative_spanish_readings:
  - me adore
  - me rinda culto
  rationale: El verbo puede incluir adoración, pero en Éxodo abarca servicio de pacto y obediencia. «Servir» preserva el campo semántico amplio sin estrechar indebidamente el mandato.
  doctrine_reference: Éxodo 3:12; 8:1; 9:1
translation_notes:
  revision_awareness: La redacción sigue la lectura revisada del audit trail inglés, que prefirió una fórmula más natural para שׁלח («let ... go») y mantuvo una advertencia solemne para הִנֵּה. También conserva la fuerza de inminencia del participio hebreo en la cláusula final.
  spanish_consistency_notes:
  - Se mantiene «hijo» / «primogénito» de manera consistente para respetar el paralelismo sonoro y teológico del verso.
  - Se evitó «SEÑOR» por ser un texto donde el nombre divino está implícito en la voz directa de Yahvé; la línea no requiere ocultamiento del nombre.
  - Se eligió un registro moderno pero sobrio, adecuado para lectura pública e iglesia, sin depender de fórmulas arcaizantes.
