translation:
  language: es
  text: ¡Miren![a] el arca del pacto, el Señor de toda la tierra, está cruzando delante de ustedes en el Jordán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hacia el Jordán». El hebreo puede traducirse más literalmente «en el Jordán», pero también puede entenderse con sentido direccional en este contexto de cruce.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: ¡Mira!
  alternatives_spanish:
  - Miren
  - Vean
  - Mira
  lexicon: HALOT
  rationale: La partícula introduce atención inmediata. «¡Mira!» conserva el impacto directo del hebreo y su registro natural en español moderno; el imperativo singular funciona aquí como exclamación exhortativa sin volver el texto arcaico.
- source_word: אֲרוֹן הַבְּרִית
  english_pob_choice: the ark of the covenant
  chosen_spanish: el arca del pacto
  alternatives_spanish:
  - el arca de la alianza
  - el arca del convenio
  lexicon: HALOT
  rationale: «Arca del pacto» reproduce la relación constructa de forma transparente y coincide con el uso bíblico más estable en español. «Alianza» es posible, pero «pacto» conserva mejor el enlace terminológico con la tradición de la obra.
- source_word: אֲדוֹן כָּל הָאָרֶץ
  english_pob_choice: the Lord of all the earth
  chosen_spanish: el Señor de toda la tierra
  alternatives_spanish:
  - el Dueño de toda la tierra
  - el Amo de toda la tierra
  lexicon: HALOT
  rationale: En este título soberano, «Señor» comunica dignidad, autoridad universal y registro bíblico natural en español. «Dueño» o «Amo» son posibles lexemáticamente, pero suenan menos aptos para un título divino en lectura pública.
- source_word: עֹבֵר
  english_pob_choice: is crossing
  chosen_spanish: va cruzando
  alternatives_spanish:
  - está cruzando
  - cruza
  lexicon: HALOT
  rationale: El participio expresa acción en curso o en avance. «Va cruzando» mantiene esa progresión dinámica en español y evita que el presente simple suene demasiado gnómico o estático.
- source_word: לִפְנֵיכֶם
  english_pob_choice: ahead of you
  chosen_spanish: delante de ustedes
  alternatives_spanish:
  - ante ustedes
  - al frente de ustedes
  lexicon: HALOT
  rationale: La expresión señala precedencia y guía. «Delante de ustedes» es natural en español y conserva la idea direccional sin cargarla con un matiz más formal de «ante».
- source_word: בַּיַּרְדֵּן
  english_pob_choice: in the Jordan
  chosen_spanish: en el Jordán
  alternatives_spanish:
  - dentro del Jordán
  - en el río Jordán
  lexicon: HALOT
  rationale: El hebreo admite una traducción más literal con «en». Dado que la POB inglesa, tras revisión, prefirió «in the Jordan» frente a «into the Jordan», el español sigue esa lectura con «en el Jordán», dejando abierta la imagen del cruce sin añadir direccionalidad no explicitada por el texto final.
theological_decisions:
- issue: 'Título de soberanía divina: אֲדוֹן כָּל הָאָרֶץ'
  english_pob_reading: the Lord of all the earth
  chosen_spanish_reading: el Señor de toda la tierra
  alternative_spanish_readings:
  - el Dueño de toda la tierra
  - el Amo de toda la tierra
  rationale: Se preserva la afirmación de soberanía universal sin rebajarla a un término más cotidiano que podría sonar posesivo o administrativo. «Señor» mantiene el peso teológico del título y su resonancia bíblica.
  doctrine_reference: 'DOCTRINE.md: traducir títulos; preservar el valor teológico del señorío divino.'
translation_notes:
  revision_awareness: 'La revisión inglesa más reciente ajustó la puntuación para reflejar la apposición («the ark of the covenant, the Lord of all the earth») y cambió la dirección de «into the Jordan» a «in the Jordan». La versión española reproduce esa apposición con comas y sigue la opción final más cercana al hebreo: «en el Jordán».'
  spanish_consistency_notes:
  - Se mantiene «Señor» para el título divino de soberanía, coherente con la terminología bíblica española del proyecto.
  - «Arca del pacto» conserva la forma estable y transparente del constructo hebreo.
  - El plural «ustedes» evita ambigüedad de número y funciona para el público general en español latinoamericano.
  - La nota al pie conserva la alternativa textual/semántica relevante sin introducir una paráfrasis más libre.
