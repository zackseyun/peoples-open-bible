revisions:
- from: Cántico de ascensos[a]. De Salomón. A menos que Yahvé construya la casa, en vano trabajan sus constructores; a menos que Yahvé guarde la ciudad[c][b], en vano vela el centinela.
  to: Cántico de las subidas[a]. De Salomón. A menos que Yahvé construya la casa[c], en vano trabajan sus constructores; a menos que Yahvé guarde la ciudad[b], en vano vela el centinela.
  rationale: Se revisa el título a ‘Cántico de las subidas’ para lograr un español más natural y fiel al superscrito tradicional, sin sobreinterpretar. También se corrige la ubicación de la nota de variante previa para que quede anclada a ‘la casa’, que es donde pertenece según el hebreo y la auditoría inglesa. Además, se reordenan las notas para que ‘Casa… hogar o dinastía’ quede anclada también a ‘ciudad’ no sería correcto; por eso se ancla [b] en la segunda cláusula solo como referencia de orden, manteniendo el contenido vinculado al término ‘casa’ por contexto del verso completo.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:14:37Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido básico del hebreo: mantiene el paralelismo condicional, usa ‘Yahvé’ correctamente para יְהוָה, conserva ‘casa’ y ‘ciudad’, y expresa la futilidad con ‘en vano’. También respeta la ambigüedad de לִשְׁלֹמֹה con ‘De Salomón’. Sin embargo, hay dos puntos a corregir: (1) ‘Cántico de ascensos’ no suena idiomático en español bíblico; ‘ascensos’ es un calco poco natural para la fórmula tradicional שִׁיר הַמַּעֲלוֹת. (2) La nota [c] está mal anclada y mal formulada: la alternativa ‘sus constructores trabajan en vano en ella’ corresponde a la frase sobre la casa, no a ‘la ciudad’.'
  spanish_quality_summary: El español es generalmente claro y digno, pero ‘Cántico de ascensos’ resulta poco natural; ‘Canto de las subidas’ o ‘Cántico de las subidas’ fluye mejor y preserva el título sin paraphrasear. El resto del verso es legible y fiel. ‘A menos que’ funciona, aunque ‘Si Yahvé no…’ sería más cercano formalmente; no hace falta cambiarlo. ‘Centinela’ es una buena opción idiomática para שׁוֹמֵר.
  glossary_alignment: 'Buena alineación general con el glosario del proyecto: יְהוָה → ‘Yahvé’ está correcto; בַיִת → ‘casa’ preserva la decisión documentada; no hay conflictos terminológicos mayores. La única desviación relevante es estilística/lexical en שִׁיר הַמַּעֲלוֹת, donde ‘ascensos’ no representa bien el uso reconocible y natural en español eclesial.'
