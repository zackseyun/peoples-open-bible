translation:
  language: es
  text: 'y todas las ciudades de la meseta[a], y todo el reino de Sijón, rey de los amorreos, que reinó en Hesbón, a quien Moisés derribó[a él]—a él y a los jefes de Madián: Eví, Requem, Zur, Hur y Reba, los príncipes de Sijón[c][b], que habitaban en la tierra.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las ciudades de la llanura» o «las ciudades del altiplano».
    reason: lexical_alternative
  - marker: b
    text: Hebreo «hirió/golpeó»; en este contexto militar, la expresión implica una derrota decisiva.
    reason: lexical_alternative
  - marker: c
    text: 'El hebreo usa dos términos distintos de rango: «jefes de Madián» (נְשִׂיאֵי) y «príncipes de Sijón» (נְסִיכֵי).'
    reason: lexical_alternative
lexical_decisions:
- source_word: עָרֵי הַמִּישֹׁר
  english_pob_choice: the cities of the plateau
  chosen_spanish: las ciudades de la meseta
  alternatives_spanish:
  - las ciudades de la llanura
  - las ciudades de la meseta alta
  - las ciudades del llano
  lexicon: HALOT
  rationale: מִישׁוֹר designa una zona nivelada o llana de Transjordania. «Meseta» comunica bien la idea topográfica en español y mantiene una opción cercana al valor espacial del hebreo sin volverla demasiado genérica.
- source_word: מַמְלְכוּת סִיחוֹן
  english_pob_choice: the kingdom of Sihon
  chosen_spanish: el reino de Sijón
  alternatives_spanish:
  - el dominio real de Sijón
  - el reino de Sehón
  lexicon: HALOT
  rationale: מַמְלְכוּת se expresa de manera directa como «reino». Se conserva el nombre propio con transliteración estándar española del hebreo, «Sijón».
- source_word: מֶלֶךְ הָאֱמֹרִי
  english_pob_choice: king of the Amorites
  chosen_spanish: rey de los amorreos
  alternatives_spanish:
  - rey amorreo
  - rey de los amorritas
  lexicon: HALOT
  rationale: La construcción posesiva del hebreo se refleja con «rey de los amorreos», forma clara y natural en español bíblico contemporáneo.
- source_word: אֲשֶׁר מָלַךְ בְּחֶשְׁבּוֹן
  english_pob_choice: who reigned in Heshbon
  chosen_spanish: que reinó en Hesbón
  alternatives_spanish:
  - que gobernó en Hesbón
  - que era rey en Hesbón
  lexicon: HALOT
  rationale: מָלַךְ refiere específicamente al acto de reinar; por eso se conserva «reinó» en vez del más amplio «gobernó». Se translitera el topónimo como «Hesbón».
- source_word: אֲשֶׁר הִכָּה מֹשֶׁה אֹתוֹ
  english_pob_choice: whom Moses struck down—him
  chosen_spanish: a quien Moisés hirió—a él
  alternatives_spanish:
  - a quien Moisés derrotó—a él
  - a quien Moisés golpeó—a él
  lexicon: HALOT
  rationale: נכה en contexto militar puede significar golpear o derrotar decisivamente. «Hirió» conserva la fuerza de un ataque real y permite mantener el pronombre resumptivo «a él» para transparentar la estructura hebrea.
- source_word: נְשִׂיאֵי מִדְיָן
  english_pob_choice: the chiefs of Midian
  chosen_spanish: los jefes de Madián
  alternatives_spanish:
  - los príncipes de Madián
  - los dirigentes de Madián
  lexicon: HALOT
  rationale: נָשִׂיא admite varias equivalencias. Aquí «jefes» comunica liderazgo sin confundirse con el segundo término de rango distinto que sigue, y es más natural para el lector español que «príncipes» en este primer grupo.
- source_word: אֱוִי וְאֶת רֶקֶם וְאֶת צוּר וְאֶת חוּר וְאֶת רֶבַע
  english_pob_choice: Evi, Rekem, Zur, Hur, and Reba
  chosen_spanish: Eví, Requem, Zur, Hur y Reba
  alternatives_spanish:
  - Evi, Rekem, Zur, Hur y Reba
  lexicon: HALOT
  rationale: Los nombres propios se transliteran. Se prefiere «Eví» y «Requem» para reflejar la adaptación hispana de la vocalización y facilitar la lectura en español.
- source_word: נְסִיכֵי סִיחוֹן
  english_pob_choice: the princes of Sihon
  chosen_spanish: los príncipes de Sijón
  alternatives_spanish:
  - los caudillos de Sijón
  - los jefes de Sijón
  lexicon: HALOT
  rationale: נְסִיכֵי se distingue de נְשִׂיאֵי. Aquí «príncipes» mantiene esa diferencia léxica y sigue de cerca el valor de rango del hebreo, tal como lo marca el audit trail inglés.
- source_word: יֹשְׁבֵי הָאָרֶץ
  english_pob_choice: who lived in the land
  chosen_spanish: que habitaban en la tierra
  alternatives_spanish:
  - que vivían en la tierra
  - habitantes de la tierra
  lexicon: HALOT
  rationale: El participio expresa residencia/inhabitación. «Habitaban» conserva un tono bíblico natural en español y refleja mejor la idea de asentamiento que un simple «vivían».
translation_notes:
  revision_awareness: 'No se requirieron revisiones recientes adicionales: la redacción se mantiene alineada con el audit trail inglés de alta concordancia y conserva las distinciones léxicas importantes del hebreo.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención general del proyecto, pero este versículo no contiene el tetragrámaton.
  - 'Se transliteran consistentemente los nombres propios: Sijón, Hesbón, Madián, Eví, Requem, Zur, Hur y Reba.'
  - 'Se preserva la distinción entre los dos vocablos de autoridad: «jefes» para נְשִׂיאֵי y «príncipes» para נְסִיכֵי.'
  - «Hirió» conserva la fuerza militar del hebreo sin borrar la idea de derrota decisiva; la nota explica la equivalencia contextual.
