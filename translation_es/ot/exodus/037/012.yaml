    issue: La medida «de un codo de ancho» traduce incorrectamente טֹפַח.
    rationale: טֹפַח es «palmo/anchura de una mano», no «codo». Cambia sustancialmente la dimensión del objeto y contradice tanto la evidencia hebrea como la auditoría inglesa.
  - severity: medium
    issue: El verbo «puso» en la segunda cláusula no refleja bien ויעשׂ.
    rationale: El hebreo repite «hizo». Aunque «puso» podría inferirse por contexto, introduce una matización no expresada y reduce la correspondencia formal innecesariamente.
  - severity: medium
    issue: «Reborde» no es la mejor opción principal para זֵר.
    rationale: La auditoría inglesa justifica «molding» como remate ornamental. En español, «moldura» comunica mejor esa idea arquitectónica/decorativa que «reborde», que suena más genérico.
