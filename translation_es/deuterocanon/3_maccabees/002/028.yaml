base_translation:
  language: en
  yaml_path: translation/deuterocanon/3_maccabees/002/028.yaml
  text: Let no one who does not sacrifice enter their sanctuaries[a], but let all the Jews be subjected to registration and slave status[c][b], and let those who object be taken by force and put to death.
  footnotes:
  - marker: a
    text: Or 'their sanctuaries' or 'their holy things'; the Greek τὰ ἱερά can refer to sacred places as well as sacred rites/things.
    reason: lexical_alternative
  - marker: b
    text: '''Registration'' may refer more specifically to enrollment for state control or taxation.'
    reason: cultural_note
  - marker: c
    text: Literally, 'remove from living'—that is, put to death.
    reason: lexical_alternative
