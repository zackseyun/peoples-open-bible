revisions:
- from: Ahora bien, Jonatán y Ahimaaz estaban en En-rogel[a], y una sierva[b] iba y les avisaba; y ellos iban y avisaban al rey David, porque no podían ser vistos al entrar en la ciudad.
  to: Jonatán y Ahimaaz estaban en En-rógel[a], y una sirvienta[b] iba y les avisaba; y ellos iban y avisaban al rey David, porque no podían ser vistos al entrar en la ciudad.
  rationale: 'Se hicieron ajustes menores para mejorar la precisión léxica y la naturalidad del español: se omitió «Ahora bien» por innecesario, se cambió «sierva» por «sirvienta» para reflejar mejor la función de שִׁפְחָה en contexto, y se corrigió la nota [a] para representar con más exactitud la literalidad del participio hebreo.'
  reviewer_model: gpt-5.4
