review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja correctamente la estructura y el sentido básico del hebreo: fórmula profética con Yahvé, anuncio inminente, entrega de Faraón Hofra a sus enemigos, y comparación con la entrega previa de Sedequías a Nabucodrezar. También conserva bien la repetición de בְּיַד y la doble caracterización final de Nabucodrezar como enemigo y perseguidor de la vida de Sedequías. Sin embargo, hay dos puntos mejorables: (1) «en mano de» suena menos natural en español que «en manos de» y no requiere perder la imaginería idiomática; (2) la cláusula final usa «buscaba» en imperfecto, pero el hebreo participial en apposición queda mejor con presente relativo, «busca», para conservar el paralelismo con «el que busca su vida» antes en el versículo y la viveza del original.'
  spanish_quality_summary: El texto es mayormente claro y digno, pero «en mano de» resulta algo forzado en español contemporáneo aun en registro bíblico; «en manos de» mantiene la imagen y mejora la legibilidad. «He aquí» es aceptable en estilo bíblico, y «Así dice Yahvé» funciona bien. La puntuación y el orden son adecuados. Hay un carácter espurio («घोषणा») en la justificación léxica del archivo, pero no afecta el texto traducido.
  glossary_alignment: 'Se alinea bien con los términos del proyecto: יְהוָה → «Yahvé» correctamente; nombres propios preservados en forma cercana al hebreo («Hofra», «Nabucodrezar») con nota para la forma convencional española «Nabucodonosor». No hay conflicto teológico relevante. La elección de «entrego» para נֹתֵן es defendible en español; la principal corrección es idiomática en «en manos de».'
  issues:
  - severity: medium
    issue: «en mano de» suena poco natural en español
    rationale: Aunque reproduce literalmente בְּיַד, el español bíblico y general prefiere «en manos de» para expresar entrega al poder de alguien. Conserva la imaginería sin sonar calcado.
  - severity: low
    issue: «el que buscaba su vida» debilita la viveza del participio hebreo
    rationale: El hebreo usa un participio singular en apposición a «su enemigo». En español, «el que busca su vida» preserva mejor el valor caracterizador y el paralelismo con «los que buscan su vida» anterior.
  revised_spanish_text: 'Así dice Yahvé: He aquí, yo entrego al faraón Hofra, rey de Egipto, en manos de sus enemigos y en manos de los que buscan su vida, así como entregué a Sedequías, rey de Judá, en manos de Nabucodrezar[a], rey de Babilonia, su enemigo y el que busca su vida.'
  revised_footnotes:
