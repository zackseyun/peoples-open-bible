  glossary_alignment: No hay conflictos con la terminología principal del proyecto. La elección 'oscuridad profunda' para צַלְמָוֶת es defendible y alineada con el POB. No aparecen términos sensibles como Yahvé/Mesías. La consistencia léxica interna debe mantenerse en ambas ocurrencias.
