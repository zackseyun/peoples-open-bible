translation:
  language: es
  text: Pero pregunta, por favor, a los animales, y te enseñarán; y a las aves de los cielos[a], y te lo dirán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las aves del cielo». El hebreo dice literalmente «las aves de los cielos».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאוּלָם
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Mas
  - Sin embargo
  lexicon: HALOT
  rationale: El hebreo introduce un giro contrastivo. «Pero» es la adversativa natural y breve en español actual; conserva el contraste sin volver la frase pesada.
- source_word: שְׁאַל נָא
  english_pob_choice: ask ... please
  chosen_spanish: pregunta, por favor
  alternatives_spanish:
  - pregunta ahora
  - haz la pregunta, por favor
  lexicon: HALOT
  rationale: שְׁאַל es imperativo de «preguntar»; נָא añade ruego/atenuación, no principalmente valor temporal. «Por favor» transmite bien esa fuerza pragmática en español.
- source_word: בְהֵמוֹת
  english_pob_choice: the animals
  chosen_spanish: los animales
  alternatives_spanish:
  - las bestias
  - el ganado
  lexicon: HALOT
  rationale: Aquí el término abarca animales terrestres en general, no específicamente ganado. «Animales» es claro, natural y mantiene el paralelo con las aves.
- source_word: וְתֹרֶךָּ
  english_pob_choice: and they will teach you
  chosen_spanish: y ellos te enseñarán
  alternatives_spanish:
  - y te instruirán
  - y te enseñará
  lexicon: HALOT
  rationale: La forma verbal procede de ירה en hifil, con el sentido de enseñar/instruir. Aunque el hebreo tiene concordancia singular colectiva, en español el sustantivo plural «animales» pide plural verbal.
- source_word: וְעוֹף הַשָּׁמַיִם
  english_pob_choice: and the birds of the heavens
  chosen_spanish: y a las aves de los cielos
  alternatives_spanish:
  - y a las aves del cielo
  - y a las aves del cielo/firmamento
  lexicon: HALOT
  rationale: עוֹף denota aves/seres voladores; «aves» es el equivalente español más natural. Se conserva la imagen elevada de הַשָּׁמַיִם con «los cielos», manteniendo la metáfora poética del hebreo.
- source_word: וְיַגֶּד לָךְ
  english_pob_choice: and they will tell you
  chosen_spanish: y ellas te lo dirán
  alternatives_spanish:
  - y te lo contarán
  - y te declararán
  lexicon: HALOT
  rationale: נגד en hifil significa decir, declarar, dar a conocer. Con sujeto colectivo femenino plural («aves»), el español idiomático es «ellas te lo dirán».
translation_notes:
  revision_awareness: 'Se siguió el sentido del hebreo y el audit trail inglés sin depender mecánicamente de la redacción inglesa. Se mantuvo la estructura paralela: imperativo + ruego, luego dos miembros coordinados con sujeto colectivo plural implícito.'
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto fuente lo exige; en este versículo no aparece el nombre divino.
  - Se mantuvo «los cielos» para reflejar el genitivo hebreo, con nota alternativa para «el cielo» por si se prefiere una formulación más singular en español.
  - Se evitó «bestias» porque en español puede sonar más restringido o arcaizante que el alcance general de בְהֵמוֹת en este contexto.
