translation:
  language: es
  text: Así que él huyó con todo lo que era suyo[a], y se levantó, cruzó el Río, y dirigió su rostro hacia la región montañosa de Galaad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cruzó el Éufrates»; el hebreo dice simplemente «el Río», probablemente refiriéndose al Éufrates.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּבְרַח
  english_pob_choice: fled
  chosen_spanish: huyó
  alternatives_spanish:
  - escapó
  - se alejó huyendo
  lexicon: HALOT
  rationale: ברח expresa huida; en español, «huyó» reproduce con naturalidad la acción de salir precipitadamente bajo presión sin añadir matices innecesarios.
- source_word: וְכָל אֲשֶׁר לוֹ
  english_pob_choice: with all that was his
  chosen_spanish: con todo lo que era suyo
  alternatives_spanish:
  - con todo lo que tenía
  - con todo lo que le pertenecía
  lexicon: HALOT
  rationale: La expresión hebrea abarca posesiones y dependientes pertenecientes a Jacob. «Lo que era suyo» conserva amplitud semántica y evita restringirlo solo a bienes materiales.
- source_word: וַיָּקָם
  english_pob_choice: he arose
  chosen_spanish: se levantó
  alternatives_spanish:
  - se puso en pie
  - se alzó
  lexicon: HALOT
  rationale: קום en secuencia narrativa marca un nuevo movimiento; «se levantó» es el equivalente español más natural y suficientemente formal.
- source_word: וַיַּעֲבֹר אֶת־הַנָּהָר
  english_pob_choice: crossed the River
  chosen_spanish: cruzó el Río
  alternatives_spanish:
  - cruzó el río
  - pasó el Río
  - pasó el río
  lexicon: HALOT
  rationale: El hebreo dice literalmente «el río»; la mayúscula en «Río» sigue la decisión POB de tratarlo como designación probable del Éufrates sin sustituirlo por el nombre propio en el texto principal.
- source_word: הַנָּהָר
  english_pob_choice: the River
  chosen_spanish: el Río
  alternatives_spanish:
  - el río
  - el Éufrates
  lexicon: HALOT
  rationale: Se conserva la expresión hebrea con artículo. La identificación con el Éufrates queda mejor como alternativa textual que como sustitución directa en el cuerpo del verso.
- source_word: וַיָּשֶׂם אֶת־פָּנָיו
  english_pob_choice: set his face toward
  chosen_spanish: puso su rostro hacia
  alternatives_spanish:
  - dirigió su rostro hacia
  - se encaminó hacia
  lexicon: HALOT
  rationale: La frase es idiomática y literalmente habla de orientar el rostro. «Puso su rostro hacia» mantiene el giro hebreo y su sentido deliberado, sin reducirlo a un simple 'ir hacia'.
- source_word: הַר הַגִּלְעָד
  english_pob_choice: the hill country of Gilead
  chosen_spanish: la región montañosa de Galaad
  alternatives_spanish:
  - el monte de Galaad
  - las montañas de Galaad
  lexicon: HALOT
  rationale: הַר puede funcionar en sentido regional, no solo como una cumbre singular. «Región montañosa» evita un falso singular y refleja la lectura geográfica adoptada por la POB en inglés.
theological_decisions:
- issue: Identificación de «el Río»
  english_pob_reading: Hebrew simply says 'the River,' likely referring to the Euphrates.
  chosen_spanish_reading: «el Río» en el texto principal, con la identificación probable al Éufrates reservada a la nota.
  alternative_spanish_readings:
  - el Éufrates
  - el río
  rationale: El hebreo no nombra explícitamente al Éufrates; mantener «el Río» preserva la forma del original y la leve indeterminación histórica. La nota informa la probable referencia sin convertirla en afirmación del texto base.
  doctrine_reference: Principio de transparencia textual y prudencia exegética en topónimos implícitos
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios y el cruce de control mostró acuerdo alto (1.0); por tanto, el borrador mantiene la solución estable del audit trail inglés sin nuevas intervenciones textuales.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general de la serie, aunque este versículo no lo contiene.
  - Se conserva «el Río» con mayúscula para reflejar la designación hebrea y la decisión auditada de la POB en inglés.
  - «Galaad» sigue la forma española habitual de Gilead en contexto bíblico.
  - La puntuación reproduce una sola secuencia narrativa sin insertar pausas interpretativas adicionales.
