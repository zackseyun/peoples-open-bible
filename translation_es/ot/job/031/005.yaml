translation:
  language: es
  text: Si he andado con falsedad[a], y mi pie se ha apresurado hacia el engaño[b]—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Andar» reproduce el hebreo idiomático para la conducta o el modo de vida, no solo el acto físico de caminar.
    reason: cultural_note
  - marker: b
    text: 'También puede entenderse: «y mi pie se ha apresurado tras el engaño», porque la preposición hebrea permite un matiz direccional (“hacia/tras”).'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Si acaso
  - Si de veras
  lexicon: HALOT
  rationale: La cláusula condicional hebrea se refleja de manera directa con «Si», sin añadir énfasis que el texto no expresa explícitamente.
- source_word: הָלַכְתִּי
  english_pob_choice: I have walked
  chosen_spanish: he andado
  alternatives_spanish:
  - he caminado
  - he vivido
  lexicon: HALOT
  rationale: הלך funciona aquí como idiomático de conducta o proceder. «He andado» conserva la metáfora de caminar y su sentido de manera de vida, en un español natural y digno.
- source_word: עִם
  english_pob_choice: with
  chosen_spanish: con
  alternatives_spanish:
  - en compañía de
  - junto con
  lexicon: HALOT
  rationale: La preposición básica de asociación se traduce con «con», manteniendo la relación moral entre el hablante y la falsedad.
- source_word: שָׁוְא
  english_pob_choice: falsehood
  chosen_spanish: falsedad
  alternatives_spanish:
  - vanidad
  - vacío
  - mentira
  lexicon: HALOT
  rationale: En paralelo con מִרְמָה («engaño»), el término apunta al sentido ético de falsedad, no solo a vaciedad abstracta. «Falsedad» conserva ese campo semántico sin perder la fuerza moral.
- source_word: וַתַּחַשׁ
  english_pob_choice: has hastened
  chosen_spanish: se ha apresurado
  alternatives_spanish:
  - ha apresurado
  - se ha dado prisa
  - ha corrido
  lexicon: HALOT
  rationale: El verbo de prisa/hastío se expresa con un giro natural en español. La forma pronominal ayuda a conservar la idea de movimiento rápido del pie sin forzar la sintaxis.
- source_word: עַל
  english_pob_choice: to
  chosen_spanish: hacia
  alternatives_spanish:
  - a
  - contra
  - sobre
  lexicon: HALOT
  rationale: Con verbos de movimiento, עַל puede marcar dirección. «Hacia» refleja bien la orientación del pie hacia el engaño y preserva la alternativa direccional documentada en la nota inglesa.
- source_word: מִרְמָה
  english_pob_choice: deceit
  chosen_spanish: el engaño
  alternatives_spanish:
  - el fraude
  - la treta
  - la decepción
  lexicon: HALOT
  rationale: מִרְמָה designa conducta engañosa o fraudulenta. «Engaño» es amplio, idiomático y coherente con la pareja «falsedad/engaño» en español.
- source_word: רַגְלִי
  english_pob_choice: my foot
  chosen_spanish: mi pie
  alternatives_spanish:
  - mis pies
  lexicon: HALOT
  rationale: El hebreo es singular; mantener «mi pie» conserva la personificación singular del miembro que se apresura hacia el mal. No se pluraliza para no borrar ese detalle poético.
translation_notes:
  revision_awareness: El audit trail inglés mantiene la lectura principal «falsehood / deceit» y conserva una nota léxica sobre la preposición direccional de עַל. La versión española sigue esa misma estructura, trasladando la metáfora de caminar y la personificación del pie sin suavizarlas.
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma del proyecto solo cuando aparece el nombre divino; aquí no aplica.
  - Se prefirió «falsedad» y «engaño» para mantener el paralelismo moral del verso, evitando términos demasiado abstractos como «vanidad».
  - Se conservó el singular «mi pie» para respetar el hebreo y la imagen poética.
  - El guion largo final refleja que el verso queda abierto en la sección citada, como en el texto fuente.
