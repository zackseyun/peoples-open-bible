  to: Y recuerda que fuiste esclavo en la tierra de Egipto[a]; por eso yo te mando hacer esto.
  rationale: 'Se hizo una reparación menor para mejorar la fidelidad estilística y la legibilidad en español: «te mando» expresa adecuadamente el mandato presente de מְצַוְּךָ sin la pesadez de «te estoy mandando», y «esto» evita el calco poco natural «esta cosa» mientras la nota conserva la literalidad hebrea y las alternativas auditadas. También se reubicó la nota al sintagma relevante en el texto revisado.'
