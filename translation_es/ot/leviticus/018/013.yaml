translation:
  language: es
  text: No descubrirás la desnudez de la hermana de tu madre[a][b], porque es pariente cercana de tu madre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más dinámica: «No tendrás relaciones sexuales con la hermana de tu madre». El hebreo dice literalmente: «No descubrirás la desnudez de la hermana de tu madre».'
    reason: lexical_alternative
  - marker: b
    text: «Pariente cercana» traduce el hebreo שְׁאֵר, un término de parentesco que alude a consanguinidad cercana.
    reason: cultural_note
lexical_decisions:
- source_word: עֶרְוַת
  english_pob_choice: the nakedness of
  chosen_spanish: la desnudez de
  alternatives_spanish:
  - la vergüenza de
  - las partes íntimas de
  lexicon: HALOT
  rationale: En este mandato legal, עֶרְוָה funciona como un eufemismo jurídico para relaciones sexuales prohibidas. En español, «desnudez de» conserva el idiomatismo sin suavizarlo ni explicitar de más el acto sexual.
- source_word: תְגַלֵּה
  english_pob_choice: you shall not uncover
  chosen_spanish: No descubrirás
  alternatives_spanish:
  - No debes descubrir
  - No tendrás relaciones sexuales con
  lexicon: HALOT
  rationale: El verbo hebreo mantiene la fórmula legal tradicional de «descubrir» en relación con la desnudez. «No descubrirás» preserva esa forma fija y su registro jurídico.
- source_word: אֲחוֹת אִמְּךָ
  english_pob_choice: your mother's sister
  chosen_spanish: la hermana de tu madre
  alternatives_spanish:
  - tu tía materna
  - la hermana de tu madre
  lexicon: HALOT
  rationale: La construcción hebrea nombra literalmente el parentesco. «La hermana de tu madre» es fiel y clara en español; «tu tía materna» sería más idiomática, pero menos cercana al orden del original.
- source_word: שְׁאֵר
  english_pob_choice: close relative
  chosen_spanish: parienta cercana
  alternatives_spanish:
  - pariente cercano
  - consanguínea cercana
  - de tu misma sangre
  lexicon: HALOT
  rationale: שְׁאֵר expresa parentesco de sangre cercano, no solo afinidad social. «Parienta cercana» transmite el valor de consanguinidad del término con naturalidad en español; se evita «simplemente pariente» por ser demasiado débil y «de tu misma sangre» por ser más interpretativo.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Aquí introduce la razón del precepto; «porque» comunica la causalidad de modo directo y natural en español.
- source_word: הִוא
  english_pob_choice: she is
  chosen_spanish: es
  alternatives_spanish:
  - ella es
  - se trata de
  lexicon: HALOT
  rationale: El pronombre hebreo queda sobreentendido en español por la concordancia verbal. «Es» evita redundancia y conserva la concisión del motivo legal.
theological_decisions:
- issue: Mantener el eufemismo legal de Levítico 18 sin convertirlo en una paráfrasis explícita
  english_pob_reading: Retain the idiom 'uncover the nakedness of' in the main text
  chosen_spanish_reading: Conservar «descubrir la desnudez de» en el texto principal
  alternative_spanish_readings:
  - «tener relaciones sexuales con»
  - «acostarte con»
  rationale: El hebreo usa una fórmula legal repetida en Levítico 18. Mantener el eufemismo preserva la unidad literaria del capítulo y evita aplanar el lenguaje jurídico en una explicación moderna.
  doctrine_reference: Consistencia terminológica y respeto al registro legal del texto bíblico.
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y el criterio auditado de la POB en inglés. Se mantiene el eufemismo legal «descubrir la desnudez de» y se explica en nota la alternativa dinámica. También se conserva el valor de parentesco cercano de שְׁאֵר sin reemplazarlo por una expresión más general.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el tetragrámaton en todo el proyecto cuando aparezca; este versículo no lo contiene.
  - Se prefiere el registro jurídico «No descubrirás» para conservar la fórmula legal de Levítico 18.
  - «Parienta cercana» mantiene el matiz de parentesco consanguíneo que en español podría perderse con solo «pariente».
