translation:
  language: es
  text: Y la tierra no pudo sostenerlos para habitar juntos[a], porque sus posesiones eran tan grandes que no podían habitar juntos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘la tierra no los soportó’. El hebreo usa de forma idiomática un verbo de ‘llevar/cargar’ para decir que la tierra no podía sostener a ambos grupos.
    reason: lexical_alternative
lexical_decisions:
- source_word: נָשָׂא
  english_pob_choice: could not support
  chosen_spanish: no pudo sostenerlos
  alternatives_spanish:
  - no pudo llevarlos
  - no pudo soportarlos
  - no pudo cargarlos
  lexicon: HALOT
  rationale: El hebreo usa un verbo de ‘llevar/cargar/soportar’ con ‘la tierra’ como sujeto; en español, ‘sostenerlos’ comunica con naturalidad la idea de que la tierra no podía mantener a ambos grupos sin perder la imagen de soporte implícita.
- source_word: הָאָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  - el territorio
  lexicon: HALOT
  rationale: En este contexto narrativo se refiere a la extensión de tierra disponible para los dos clanes, no a la tierra como planeta. ‘La tierra’ es natural y fiel al sentido local.
- source_word: לָשֶׁבֶת
  english_pob_choice: dwelling / living
  chosen_spanish: para habitar
  alternatives_spanish:
  - para vivir
  - para morar
  - para asentarse
  lexicon: HALOT
  rationale: El infinitivo de ישׁב expresa habitar/residir. ‘Habitar’ mantiene un registro digno y conserva mejor la repetición formal del hebreo que ‘vivir’.
- source_word: יַחְדָּו
  english_pob_choice: together
  chosen_spanish: juntos
  alternatives_spanish:
  - juntamente
  - en conjunto
  - el uno con el otro
  lexicon: HALOT
  rationale: ‘Juntos’ es la equivalencia más natural en español y reproduce la repetición enfática del adverbio hebreo.
- source_word: רְכוּשָׁם
  english_pob_choice: their possessions
  chosen_spanish: sus posesiones
  alternatives_spanish:
  - sus bienes
  - su propiedad
  - sus haciendas
  lexicon: HALOT
  rationale: El sustantivo alude a los bienes adquiridos en sentido amplio. ‘Posesiones’ preserva esa amplitud sin restringirlo a ganado u otra categoría específica.
- source_word: רָב
  english_pob_choice: so great
  chosen_spanish: muy grandes
  alternatives_spanish:
  - tan grandes
  - abundantes
  - muchos
  lexicon: HALOT
  rationale: Con un sustantivo colectivo como ‘posesiones’, el español prefiere una expresión de abundancia. ‘Muy grandes’ refleja la intensidad sin forzar una traducción numérica literal.
- source_word: יָכְלוּ
  english_pob_choice: they could not
  chosen_spanish: no podían
  alternatives_spanish:
  - no pudieron
  - no eran capaces de
  - no les era posible
  lexicon: HALOT
  rationale: El verbo expresa incapacidad. ‘No podían’ mantiene el valor modal del hebreo y permite una sintaxis fluida en la segunda cláusula.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés POB, que prefirió una forma más formal y cercana a la repetición hebrea de לָשֶׁבֶת ... יַחְדָּו. Por eso se emplea ‘habitar juntos’ en ambas cláusulas, manteniendo la paralelismo y evitando una paráfrasis excesiva.
  spanish_consistency_notes:
  - Se preservó la repetición de la idea de ‘juntos’ en ambas cláusulas, como en el hebreo.
  - Se evitó ‘SEÑOR’ u otras sustituciones, porque este versículo no contiene el nombre divino.
  - ‘Posesiones’ se eligió por amplitud semántica, siguiendo el alcance del hebreo רְכוּשָׁם.
  - El registro busca ser digno y publicable, sin caer en calcos duros ni en lenguaje eclesiástico tradicional innecesario.
