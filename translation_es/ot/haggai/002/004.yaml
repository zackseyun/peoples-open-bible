translation:
  language: es
  text: Pero ahora, esfuérzate, Zorobabel, declara Yahvé; y esfuérzate, Josué hijo de Jozadac, el sumo sacerdote; y esfuércense, todo el pueblo de la tierra, declara Yahvé; y trabajen, porque yo estoy con ustedes, declara Yahvé de los ejércitos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más tradicionalmente, 'Yahvé de las huestes'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: But now
  chosen_spanish: Pero ahora
  alternatives_spanish:
  - Y ahora
  - Ahora
  lexicon: HALOT
  rationale: La partícula introduce un giro exhortativo desde el desánimo previo; en español, 'Pero ahora' conserva bien el matiz adversativo y suena natural en el registro profético.
- source_word: חֲזַק / וַחֲזַק / וַחֲזַק
  english_pob_choice: be strong
  chosen_spanish: esfuérzate / esfuércense
  alternatives_spanish:
  - sé fuerte / sean fuertes
  - cobra ánimo / cobren ánimo
  - sé valiente / sean valientes
  lexicon: HALOT
  rationale: La raíz חזק pide una exhortación de fortaleza/coraje. 'Esfuérzate' transmite con naturalidad la llamada a la acción perseverante, y permite mantener la repetición retórica en singular y plural. Se evitó reducirlo solo a un estado interior como 'cobrar ánimo'.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - dice Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: Se conserva la fórmula profética solemne sin volverla demasiado libre. 'Declara Yahvé' mantiene el tono formal y la equivalencia con la pauta inglesa del POB.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: Se sigue el valor nominal del Tetragrámaton según la política del proyecto. 'Yahvé' es la forma principal en español del POB, en lugar de la sustitución tradicional por 'SEÑOR'.
- source_word: בֶּן
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - descendiente de
  lexicon: HALOT
  rationale: En la identificación genealógica, 'hijo de' es la correspondencia directa, clara y plenamente idiomática en español.
- source_word: הַכֹּהֵן הַגָּדוֹל
  english_pob_choice: the high priest
  chosen_spanish: el sumo sacerdote
  alternatives_spanish:
  - el gran sacerdote
  - el sacerdote principal
  lexicon: HALOT
  rationale: '''Sumo sacerdote'' es el equivalente consagrado en español para el cargo cultual, y comunica con precisión la función sin sonar forzado.'
- source_word: כָּל עַם הָאָרֶץ
  english_pob_choice: all the people of the land
  chosen_spanish: todos los habitantes de la tierra
  alternatives_spanish:
  - todo el pueblo de la tierra
  - todo el pueblo de la tierra/país
  - todo el pueblo del país
  lexicon: HALOT
  rationale: En este contexto pos-exílico, הָאָרֶץ puede referirse a la tierra/país local, no al globo terráqueo. 'Habitantes de la tierra' evita una lectura universalizante y mantiene un español natural; se prefirió 'habitantes' para expresar el conjunto sin alargar innecesariamente la frase.
- source_word: וַעֲשׂוּ
  english_pob_choice: and work
  chosen_spanish: y trabajen
  alternatives_spanish:
  - y hagan
  - y actúen
  - y pónganse a trabajar
  lexicon: HALOT
  rationale: El mandato va unido al contexto inmediato de la reconstrucción del templo. 'Trabajen' comunica el llamado a ponerse manos a la obra sin volverse coloquial ni demasiado genérico.
- source_word: כִּי אֲנִי אִתְּכֶם
  english_pob_choice: for I am with you
  chosen_spanish: porque yo estoy con ustedes
  alternatives_spanish:
  - pues yo estoy con ustedes
  - porque estoy con ustedes
  lexicon: HALOT
  rationale: La razón de la exhortación es la presencia divina. 'Porque yo estoy con ustedes' conserva el vínculo causal y la promesa de compañía covenantal con español claro.
- source_word: יְהוָה צְבָאוֹת
  english_pob_choice: the LORD of Armies
  chosen_spanish: Yahvé de los Ejércitos
  alternatives_spanish:
  - Yahvé de los ejércitos
  - Yahvé de las huestes
  lexicon: HALOT
  rationale: Se traduce el título por sentido, siguiendo el audit trail inglés. 'Ejércitos' hace transparente el valor de צְבָאוֹת en español y mantiene la dignidad del título.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  rationale: El verso usa directamente el Tetragrámaton. Siguiendo la política del proyecto, no se sustituye por 'SEÑOR'; se conserva el nombre del pacto en forma española establecida.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Rendering of the title יְהוָה צְבָאוֹת
  english_pob_reading: Yahweh of Armies
  chosen_spanish_reading: Yahvé de los Ejércitos
  alternative_spanish_readings:
  - Yahvé de los ejércitos
  - Yahvé de las huestes
  rationale: La decisión sigue la línea del POB de traducir el título en vez de ocultarlo tras una fórmula tradicional no transparente. 'Ejércitos' transmite el sentido militar/plural de צְבָאוֹת y mantiene el registro bíblico.
  doctrine_reference: DOCTRINE.md Translation philosophy §2 (Translate titles; transliterate names)
- issue: Plural address in 'all the people of the land'
  english_pob_reading: all the people of the land
  chosen_spanish_reading: todos los habitantes de la tierra
  alternative_spanish_readings:
  - todo el pueblo de la tierra
  - todos los habitantes del país
  rationale: El hebreo puede designar a la comunidad local pos-exílica. 'Habitantes' preserva el referente colectivo sin forzar una lectura cosmológica; la decisión evita ambigüedad en español sin alterar el alcance del mandato.
  doctrine_reference: HALOT; context histórico-literario de Hageo
- issue: Force of the command וַעֲשׂוּ
  english_pob_reading: and work
  chosen_spanish_reading: y trabajen
  alternative_spanish_readings:
  - y hagan
  - y actúen
  - y pónganse a trabajar
  rationale: No se trata de una exhortación vaga a 'hacer algo', sino de un llamado concreto a la obra. 'Trabajen' conserva el carácter imperativo y la relación inmediata con la reconstrucción.
  doctrine_reference: Contexto de Hageo 2:4
translation_notes:
  revision_awareness: El pasaje muestra alta concordancia con el audit trail inglés y no requiere revisión sustantiva. El principal ajuste español es la elección de un imperativo natural ('esfuérzate/esfuércense') que conserve la repetición retórica del hebreo sin perder claridad.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' para יְהוָה, conforme a la política del proyecto.
  - Se tradujo יְהוָה צְבָאוֹת como 'Yahvé de los Ejércitos', dejando una nota para la alternativa tradicional.
  - Se conservó la repetición del imperativo con variación singular/plural para reflejar el hebreo.
  - '''Habitantes de la tierra'' se emplea en sentido local/contextual, no universal.'
  - '''Trabajen'' se eligió por su valor concreto en el contexto de reconstrucción.'
