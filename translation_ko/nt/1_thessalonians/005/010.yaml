  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: τοῦ ἀποθανόντος ⸀περὶ ἡμῶν ἵνα εἴτε γρηγορῶμεν εἴτε καθεύδωμεν ἅμα σὺν αὐτῷ ζήσωμεν.
base_translation:
  language: en
  yaml_path: translation/nt/1_thessalonians/005/010.yaml
  text: who died for us[a], so that whether we are awake or asleep, we may live together with him.
  footnotes:
  - marker: a
    text: Or 'whether we are watchful or asleep.' The phrase may echo the exhortation to vigilance in the surrounding context, though here it likely refers to whether believers are alive or have died.
    reason: alternative_reading
translation:
  language: ko
  text: 곧 우리를 위하여 죽으신 분이시니, 우리가 깨어 있든지 잠들어 있든지[a] 그분과 함께 살게 하시려는 것입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「우리가 깨어 경계하든지 잠자든지」. 본 구절은 직전 문맥의 깨어 있으라는 권면을 반향할 수도 있으나, 본 문맥에서는 신자들이 살아 있든 이미 죽었든을 가리킬 가능성이 크다.
    reason: alternative_reading
lexical_decisions:
- source_word: τοῦ ἀποθανόντος περὶ ἡμῶν
  english_pob_choice: who died for us
  chosen_korean: 우리를 위하여 죽으신 분
  alternatives_korean:
  - 우리를 위해 돌아가신 분
  - 우리를 위해 죽음을 당하신 분
  lexicon: BDAG
  rationale: 경어 「죽으신」으로 합쇼체를 유지한다.
- source_word: εἴτε γρηγορῶμεν εἴτε καθεύδωμεν
  english_pob_choice: whether we are awake or asleep
  chosen_korean: 우리가 깨어 있든지 잠들어 있든지
  alternatives_korean:
  - 우리가 살아 있든지 죽었든지
  - 우리가 깨어 경계하든지 자든지
  lexicon: BDAG
  rationale: 4:13-17의 「잠든 자들」(죽은 신자들) 비유와 본 문맥의 「깨어 있으라」(영적 깨어 있음) 권면이 동시에 울리는 의도적 다층 표현. 본문 어휘를 보존하고 두 해석을 각주로 살린다.
