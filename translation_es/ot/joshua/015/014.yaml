translation:
  language: es
  text: 'Caleb expulsó de allí a los tres hijos de Anac: Sesai, Ahimán y Talmai[a], los nacidos de Anac[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «desposeyó de allí a los tres hijos de Anac». El verbo hebreo puede enfatizar tomar posesión al expulsar a los ocupantes anteriores.
    reason: lexical_alternative
  - marker: b
    text: Hebreo «hijos de Anac» ... «nacidos de Anac». El versículo usa dos expresiones genealógicas relacionadas para el mismo grupo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּרֶשׁ
  english_pob_choice: drove out
  chosen_spanish: expulsó
  alternatives_spanish:
  - desposeyó
  - echó fuera
  - hizo salir
  lexicon: HALOT
  rationale: El hebreo en esta forma verbal puede enfatizar quitar posesión por la fuerza o desalojar a los ocupantes. En español, «expulsó» comunica con naturalidad la acción de sacar a alguien de un territorio sin perder el matiz de desalojo en contexto de conquista. «Desposeyó» es más técnico y menos idiomático aquí.
- source_word: מִשָּׁם
  english_pob_choice: from there
  chosen_spanish: de allí
  alternatives_spanish:
  - desde allí
  - de ese lugar
  lexicon: HALOT
  rationale: La expresión locativa es directa; «de allí» suena natural y conserva la referencia espacial sin añadir sentido.
- source_word: שְׁלוֹשָׁה בְּנֵי הָעֲנָק
  english_pob_choice: the three sons of Anak
  chosen_spanish: a los tres hijos de Anac
  alternatives_spanish:
  - a los tres hijos de Anak
  - a los tres descendientes de Anac
  - a los tres anaceos
  lexicon: HALOT
  rationale: Se mantiene la estructura filial del hebreo con «hijos de Anac», que es transparente y fiel. Se usa «Anac» como transliteración habitual en español bíblico para el nombre propio.
- source_word: שֵׁשַׁי
  english_pob_choice: Sheshai
  chosen_spanish: Sesai
  alternatives_spanish:
  - Sesai
  - Shesai
  lexicon: HALOT
  rationale: Se translitera el nombre propio al español con una forma clara y readable. «Sesai» refleja bien la secuencia consonántica para lectores hispanohablantes y evita una grafía demasiado anglicada.
- source_word: אֲחִימַן
  english_pob_choice: Ahiman
  chosen_spanish: Ahimán
  alternatives_spanish:
  - Ajimán
  - Ahiman
  lexicon: HALOT
  rationale: Se conserva el nombre propio con acentuación española para facilitar la lectura y marcar el acento prosódico de forma natural.
- source_word: תַּלְמַי
  english_pob_choice: Talmai
  chosen_spanish: Talmai
  alternatives_spanish:
  - Talmay
  - Talmai
  lexicon: HALOT
  rationale: Nombre propio transliterado de forma estable y comprensible en español, sin necesidad de adaptación adicional.
- source_word: יְלִידֵי הָעֲנָק
  english_pob_choice: the children of Anak
  chosen_spanish: los hijos de Anac
  alternatives_spanish:
  - los nacidos de Anac
  - la descendencia de Anac
  - los hijos de Anak
  lexicon: HALOT
  rationale: El hebreo literalmente expresa «los nacidos de». Dado que la primera cláusula ya dice «los hijos de Anac», el español puede repetir la misma fórmula para preservar la correspondencia formal y el paralelismo genealógico, tal como la revisión inglesa prefirió «the children of Anak» para mantener el registro formal.
translation_notes:
  revision_awareness: 'La redacción sigue el pasaje hebreo con el mismo paralelismo genealógico que la revisión inglesa final: primero «los tres hijos de Anac» y luego «los hijos de Anac» para יְלִידֵי הָעֲנָק, sin suavizar la repetición semítica.'
  spanish_consistency_notes:
  - Se mantiene «Anac» de manera consistente para el nombre העֲנָק.
  - Se evita «Cristo/Señor» u otra terminología ajena al texto, ya que el versículo no la requiere.
  - La traducción conserva un registro bíblico sobrio y directo, apto para lectura pública.
