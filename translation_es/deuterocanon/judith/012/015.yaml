translation:
  language: es
  text: Y después de desvestirse[a], se adornó con sus vestidos y con todo su adorno femenino; y su esclava se acercó y le tendió en el suelo, frente a Holofernes, los vellones[b] que había recibido de Bagoas para su uso diario[c], para que pudiera reclinarse sobre ellos al comer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «después de cambiarse de ropa» o, más literalmente, «después de separarse». El participio griego es inusual y el contexto sugiere preparación mediante la remoción de la vestimenta previa antes de adornarse.
    reason: lexical_alternative
  - marker: b
    text: O «pieles» o «pieles de oveja». El término griego puede referirse a vellones o cubiertas semejantes usadas como lecho o asiento improvisado.
    reason: lexical_alternative
  - marker: c
    text: Es decir, para su uso habitual de cada día; la escena supone la costumbre antigua de comer reclinada.
    reason: cultural_note
lexical_decisions:
- source_word: διαστασᾶσα
  english_pob_choice: after disrobing
  chosen_spanish: después de desvestirse
  alternatives_spanish:
  - después de cambiarse de ropa
  - después de separarse
  lexicon: LSJ
  rationale: El participio es inusual y el contexto describe preparación previa para vestirse de nuevo. En español, «desvestirse» comunica con claridad esa acción preparatoria sin perder la secuencia narrativa.
- source_word: ἐκοσμήθη
  english_pob_choice: she adorned herself
  chosen_spanish: se adornó
  alternatives_spanish:
  - se vistió
  - se arregló
  lexicon: LSJ
  rationale: El verbo expresa ornamento y arreglo deliberado, no solo vestirse. «Se adornó» conserva mejor el matiz de embellecimiento presente en el griego.
- source_word: ἱματισμῷ
  english_pob_choice: garments
  chosen_spanish: vestidos
  alternatives_spanish:
  - ropa
  - vestiduras
  lexicon: LSJ
  rationale: Aquí el sustantivo colectivo se refiere a la ropa puesta para presentarse; «vestidos» resulta natural y dignificado en español, sin forzar singularidad.
- source_word: κόσμῳ
  english_pob_choice: feminine adornment
  chosen_spanish: adorno femenino
  alternatives_spanish:
  - adornos femeninos
  - ornamentos femeninos
  lexicon: LSJ
  rationale: κόσμος denota adorno, arreglo o ornamento. «Adorno femenino» preserva el sentido de accesorios o arreglos propios de una mujer, sin restringirlo solo a joyas.
- source_word: δούλη
  english_pob_choice: female slave
  chosen_spanish: esclava
  alternatives_spanish:
  - sierva
  - sirvienta
  lexicon: LSJ
  rationale: Se mantiene la fuerza léxica de δοῦλος/δούλη según la política del proyecto. «Esclava» conserva el estatus de dependencia servil que el texto griego señala explícitamente.
- source_word: ἔστρωσεν
  english_pob_choice: spread out
  chosen_spanish: le tendió
  alternatives_spanish:
  - le extendió
  - preparó
  lexicon: LSJ
  rationale: En este contexto de preparar el lugar para comer/reclinarse, «le tendió» comunica de forma natural la acción de disponer el material en el suelo.
- source_word: χαμαί
  english_pob_choice: on the ground
  chosen_spanish: en el suelo
  alternatives_spanish:
  - en la tierra
  - en el piso
  lexicon: LSJ
  rationale: El adverbio indica ubicación a ras del suelo. «En el suelo» es claro y neutro para lectores modernos.
- source_word: κώδια
  english_pob_choice: fleeces
  chosen_spanish: vellones
  alternatives_spanish:
  - pieles
  - pieles de oveja
  lexicon: LSJ
  rationale: κώδια designa vellones o pieles usadas como cobertura. «Vellones» preserva la referencia al material lanar sin añadir precisión innecesaria.
- source_word: παρὰ Βαγώου
  english_pob_choice: from Bagoas
  chosen_spanish: de Bagoas
  alternatives_spanish:
  - por Bagoas
  - procedentes de Bagoas
  lexicon: LSJ
  rationale: παρά con genitivo expresa procedencia. «De Bagoas» es la forma más directa y natural en español.
- source_word: εἰς τὴν καθημερινὴν δίαιταν αὐτῆς
  english_pob_choice: for her daily use
  chosen_spanish: para su uso diario
  alternatives_spanish:
  - para su régimen diario
  - para su vida cotidiana
  lexicon: LSJ
  rationale: δίαιτα puede significar régimen, modo de vida o uso habitual. En este contexto práctico, «uso diario» refleja bien la finalidad sin sonar rebuscado.
- source_word: κατακλινομένην
  english_pob_choice: recline
  chosen_spanish: reclinarse
  alternatives_spanish:
  - echarse
  - tumbarse
  lexicon: LSJ
  rationale: La acción alude a la postura antigua de comer reclinada. «Reclinarse» preserva ese trasfondo cultural mejor que «sentarse» o «echarse».
theological_decisions:
- issue: Mantenimiento de la esclavitud explícita en δούλη
  english_pob_reading: female slave
  chosen_spanish_reading: esclava
  alternative_spanish_readings:
  - sirvienta
  - sierva
  rationale: Se conserva la designación servil porque el griego usa una forma de δοῦλος con fuerza de dependencia real. No se suaviza a términos más domésticos sin base textual.
  doctrine_reference: Política terminológica POB para δοῦλος/δούλη
- issue: Postura de comer reclinada
  english_pob_reading: so that she might recline on them while eating
  chosen_spanish_reading: para que pudiera reclinarse sobre ellos al comer
  alternative_spanish_readings:
  - para que pudiera sentarse a comer sobre ellos
  - para comer sobre ellos
  rationale: El griego describe la costumbre antigua de comer recostado. Mantener «reclinarse» conserva el trasfondo cultural y evita modernizar la escena de forma indebida.
  doctrine_reference: Cultural custom in Second Temple/ancient banquet settings
translation_notes:
  revision_awareness: La redacción sigue la lectura final inglesa que restauró «female slave» frente a la revisión que había suavizado el término a «female servant». También refleja la preferencia revisada por un registro más formal («disrobing» → «desvestirse» se resuelve aquí como «después de desvestirse») y mantiene el orden y el contenido completos del griego. Se ha evitado traducir mecánicamente desde el inglés cuando el griego exigía matices propios, especialmente en διαστασᾶσα, δούλη, κώδια y κατακλινομένην.
  spanish_consistency_notes:
  - Se usa «esclava» para δούλη conforme a la política terminológica del proyecto y al audit trail inglés.
  - Se traduce κόσμος como «adorno» en lugar de «joyas» para no restringir indebidamente el campo semántico.
  - Se conserva la escena de comida reclinada con un verbo natural en español («reclinarse»).
  - Se evita «SEÑOR» u otras sustituciones irrelevantes porque el texto no contiene el nombre divino.
