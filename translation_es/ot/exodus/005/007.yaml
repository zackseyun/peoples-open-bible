translation:
  language: es
  text: No sigan dando paja al pueblo para hacer ladrillos, como antes[a]; que vayan ellos y recojan paja para sí mismos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «como ayer y anteayer», un modismo que significa «como antes» o «anteriormente».
    reason: lexical_alternative
lexical_decisions:
- source_word: תֹאסִפוּן
  english_pob_choice: shall no longer
  chosen_spanish: No volverán a dar
  alternatives_spanish:
  - No seguirán dando
  - No darán más
  lexicon: HALOT
  rationale: La forma negativa con יסף expresa cese de una práctica continua. En español, «no volverán a dar» comunica bien la interrupción de una provisión ya establecida, sin perder el matiz de continuidad previa.
- source_word: לָתֵת
  english_pob_choice: give
  chosen_spanish: dar
  alternatives_spanish:
  - proveer
  - entregar
  lexicon: HALOT
  rationale: נתן es el verbo común «dar». «Dar» mantiene la relación semántica directa con la fuente hebrea y funciona con naturalidad en castellano.
- source_word: תֶּבֶן
  english_pob_choice: straw
  chosen_spanish: paja
  alternatives_spanish:
  - rastrojo
  - paja de cereal
  lexicon: HALOT
  rationale: El material de construcción en contexto de ladrillos se expresa naturalmente como «paja» en español bíblico y moderno. «Paja» preserva la imagen concreta del hebreo.
- source_word: לָעָם
  english_pob_choice: to the people
  chosen_spanish: al pueblo
  alternatives_spanish:
  - a la gente
  - a los trabajadores
  lexicon: HALOT
  rationale: עם significa literalmente «pueblo». «Al pueblo» refleja el texto sin restringir el referente más de lo que hace el hebreo.
- source_word: לִלְבֹּן הַלְּבֵנִים
  english_pob_choice: for making bricks
  chosen_spanish: para hacer ladrillos
  alternatives_spanish:
  - para la fabricación de ladrillos
  - para labrar ladrillos
  lexicon: HALOT
  rationale: El infinitivo con objeto expresa finalidad. «Para hacer ladrillos» es idiomático y fiel al propósito indicado en hebreo.
- source_word: כִּתְמוֹל שִׁלְשֹׁם
  english_pob_choice: as before
  chosen_spanish: como antes
  alternatives_spanish:
  - como ayer y anteayer
  - como antes mismo
  lexicon: HALOT
  rationale: El hebreo es literalmente un modismo temporal que significa «como antes» / «como anteriormente». La frase española reproduce el sentido natural y permite conservar la nota explicativa.
- source_word: הֵם יֵלְכוּ
  english_pob_choice: let them go
  chosen_spanish: que vayan ellos
  alternatives_spanish:
  - déjenlos ir
  - que se vayan
  lexicon: HALOT
  rationale: El pronombre independiente con imperfecto funciona como mandato. «Que vayan ellos» conserva el valor directivo y el énfasis sobre el sujeto.
- source_word: וְקֹשְׁשׁוּ
  english_pob_choice: and gather
  chosen_spanish: y recojan
  alternatives_spanish:
  - y junten
  - y reúnan
  lexicon: HALOT
  rationale: קשש implica recoger o juntar material disperso. «Recojan» es claro en español y refleja bien la acción concreta de ir a buscar paja.
- source_word: לָהֶם
  english_pob_choice: for themselves
  chosen_spanish: para sí mismos
  alternatives_spanish:
  - por su cuenta
  - para ellos mismos
  lexicon: HALOT
  rationale: El dativo indica adquisición por su propia cuenta. «Para sí mismos» expresa de forma natural la idea de que deben conseguirla ellos mismos.
translation_notes:
  revision_awareness: 'La versión española sigue de cerca el audit trail inglés: conserva la negación de cese («shall no longer»), el modismo temporal explicado en nota, y el mandato final con sujeto explícito para reflejar el énfasis del hebreo. No hay revisiones aplicadas en el paquete fuente; el pasaje presenta alta concordancia entre la traducción inglesa auditada y el hebreo masorético.'
  spanish_consistency_notes:
  - Se usa «paja» de manera consistente para תֶּבֶן.
  - «Al pueblo» preserva el sustantivo colectivo sin restringirlo a una categoría interpretativa añadida.
  - «Como antes» se mantiene en el cuerpo del texto y la nota explica el hebraísmo temporal.
  - El mandato final se formula con «que vayan ellos» para reflejar el valor jussivo del hebreo.
