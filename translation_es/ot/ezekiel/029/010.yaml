base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/029/010.yaml
  text: Therefore[a], behold, I am against you and against your Nile channels, and I will make the land of Egypt ruins, a desolation laid waste, from Migdol to Syene[c][b], as far as the border of Cush.
  footnotes:
  - marker: a
    text: Or 'your rivers'; the Hebrew term in Egyptian contexts often refers specifically to the Nile and its branches or canals.
    reason: lexical_alternative
  - marker: b
    text: Syene is the ancient city near modern Aswan, marking Egypt's southern extent.
    reason: cultural_note
  - marker: c
    text: Cush refers to the region south of Egypt, often associated with Nubia rather than the boundaries of the modern state of Ethiopia.
    reason: cultural_note
