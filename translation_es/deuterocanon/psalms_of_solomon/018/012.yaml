translation:
  language: es
  text: el que dispuso los luminares en su recorrido[a] para los tiempos señalados de las estaciones[b], de día en día; y no se han apartado[c] de la trayectoria que les mandó seguir.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en procesión» para «en su recorrido».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «para tiempos señalados de horas»; la frase probablemente alude a un orden temporal fijo.
    reason: lexical_alternative
  - marker: c
    text: O «no se apartaron».
    reason: alternative_reading
lexical_decisions:
- source_word: διατάξας
  english_pob_choice: appointed
  chosen_spanish: dispuso
  alternatives_spanish:
  - apuntó
  - ordenó
  - designó
  lexicon: BDAG/LSJ
  rationale: «Dispuso» conserva la idea de ordenar con intención y establecer una disposición fija, sin sonar tan jurídico como «ordenó» ni tan administrativo como «designó».
- source_word: φωστῆρας
  english_pob_choice: the luminaries
  chosen_spanish: los luminares
  alternatives_spanish:
  - las luces
  - los astros luminosos
  - los cuerpos celestes
  lexicon: LSJ
  rationale: «Luminares» mantiene el registro elevado y poético del término para los astros que dan luz, evitando la banalidad de «luces».
- source_word: ἐν πορείᾳ
  english_pob_choice: in their course
  chosen_spanish: en su curso
  alternatives_spanish:
  - en su procesión
  - en su movimiento
  - en su órbita
  lexicon: LSJ
  rationale: «En su curso» expresa el movimiento ordenado y regular sin introducir un tecnicismo moderno como «órbita».
- source_word: καιροὺς ὡρῶν
  english_pob_choice: the appointed times of the seasons
  chosen_spanish: los tiempos señalados de las estaciones
  alternatives_spanish:
  - los tiempos fijados de las horas
  - los tiempos oportunos de las estaciones
  - los momentos establecidos de las horas
  lexicon: LSJ
  rationale: La frase griega combina καιροί y ὡρῶν en un giro temporal algo denso. «Tiempos señalados de las estaciones» conserva la idea de tiempos establecidos y la referencia a ciclos temporales, siguiendo la revisión inglesa que favorece «seasons» frente a «hours».
- source_word: ἀφʼ ἡμερῶν εἰς ἡμέρας
  english_pob_choice: from day to day
  chosen_spanish: de día en día
  alternatives_spanish:
  - día tras día
  - de un día a otro
  lexicon: LSJ
  rationale: «De día en día» es idiomático en español bíblico y refleja la repetición continua del giro griego.
- source_word: παρέβησαν
  english_pob_choice: have not departed
  chosen_spanish: no se han apartado
  alternatives_spanish:
  - no han desviado
  - no han traspasado
  - no han salido
  lexicon: BDAG
  rationale: Aunque literalmente puede significar «pasar al otro lado» o «transgredir», en este contexto de trayectoria celeste la idea espacial de desviación es la más natural; el perfecto español sigue la revisión inglesa y su valor resultativo continuo.
- source_word: ὁδοῦ
  english_pob_choice: the path
  chosen_spanish: el camino
  alternatives_spanish:
  - la senda
  - la vía
  - el recorrido
  lexicon: BDAG
  rationale: «Camino» es la opción más clara en español para el paralelo con la imagen del curso de los astros y mantiene la fuerza directiva de la metáfora.
- source_word: ἐνετείλατο
  english_pob_choice: he commanded
  chosen_spanish: les mandó
  alternatives_spanish:
  - les ordenó
  - les dio mandato
  - les impartió la orden
  lexicon: BDAG
  rationale: «Mandó» preserva la autoridad del verbo sin sonar excesivamente técnico; el dativo pronominal «les» explicita el destinatario del mandato.
theological_decisions:
- issue: Valor continuo de la obediencia de los luminares
  english_pob_reading: they have not departed from the path that he commanded them
  chosen_spanish_reading: no se han apartado del camino que él les mandó
  alternative_spanish_readings:
  - no se apartaron del camino que él les mandó
  - no se desvían del camino que él les mandó
  rationale: 'Se mantiene el perfecto compuesto español para reflejar la revisión inglesa y el valor resultativo/continuo del aoristo en este contexto: el hecho ocurrido en el pasado permanece vigente en su obediencia actual.'
  doctrine_reference: Creación y providencia divina; Sal 148:6 como paralelo de la obediencia cósmica
- issue: Cómo renderizar ὡρῶν dentro del sintagma temporal
  english_pob_reading: the appointed times of the seasons
  chosen_spanish_reading: los tiempos señalados de las estaciones
  alternative_spanish_readings:
  - los tiempos señalados de las horas
  - los tiempos fijos de las estaciones
  - los momentos establecidos de las estaciones
  rationale: La revisión inglesa ya opta por «seasons» para reflejar mejor el contexto astronómico. En español, «estaciones» comunica el orden de ciclos temporales sin forzar el extraño «horas»; «señalados» conserva la noción de tiempos fijados o determinados.
  doctrine_reference: Orden creado, regularidad de los astros, y señales de tiempos (Gn 1:14)
translation_notes:
  revision_awareness: 'La revisión inglesa más reciente cambió «hours» por «seasons» para ὡρῶν y ajustó la cláusula final a «have not departed». La presente traducción sigue esas decisiones: usa «estaciones» para el marco temporal y el perfecto compuesto «no se han apartado» para conservar el valor continuo/resultativo del aoristo en el contexto.'
  spanish_consistency_notes:
  - Se mantiene «luminares» para φωστῆρας por consistencia con el registro poético-cósmico.
  - Se evita «SEÑOR» y «Cristo» porque el texto no los contiene.
  - «Camino» se usa como equivalente de ὁδοῦ, coherente con el paralelo de «curso».
  - 'El orden de los miembros reproduce la progresión del griego: disposición, curso, tiempos, regularidad continua, y obediencia al mandato.'
