translation:
  language: es
  text: Y Jacobo robó el corazón de[a] Labán el arameo[b], al no decirle que huía.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit., «robó el corazón de». Es un hebraísmo que aquí comunica actuar a escondidas o tomar por sorpresa, más que una referencia al corazón como asiento emocional.
    reason: lexical_alternative
  - marker: b
    text: «Arameo» traduce con más precisión el etnónimo hebreo que la forma tradicional «sirio».
    reason: source_note
lexical_decisions:
- source_word: וַיִּגְנֹב / גנב
  english_pob_choice: stole the heart of
  chosen_spanish: robó el corazón de
  alternatives_spanish:
  - engañó a
  - sorprendió a
  lexicon: HALOT
  rationale: El hebreo usa la expresión idiomática «robar el corazón de»; en español, «robó el corazón de» conserva la imagen verbal sin forzar una traducción explicativa que borre el giro original. Aunque puede sonar inusual, la POB en inglés retuvo la literalidad idiomática en la revisión final.
- source_word: לָבָן הָאֲרַמִּי
  english_pob_choice: Laban the Aramean
  chosen_spanish: Labán el arameo
  alternatives_spanish:
  - Labán el sirio
  lexicon: HALOT
  rationale: «Arameo» reproduce con mayor precisión el etnónimo hebreo que la forma tradicional «sirio». Mantiene la referencia étnica/geográfica del texto fuente.
- source_word: עַל בְּלִי הִגִּיד לוֹ
  english_pob_choice: by not telling him
  chosen_spanish: al no decirle
  alternatives_spanish:
  - sin decirle
  - porque no le dijo
  lexicon: HALOT
  rationale: La construcción causal/instrumental se expresa naturalmente en español con «al no decirle», que preserva el sentido de medio o circunstancia por la cual Jacob actuó así.
- source_word: כִּי בֹרֵחַ הוּא
  english_pob_choice: that he was fleeing
  chosen_spanish: que huía
  alternatives_spanish:
  - que estaba huyendo
  - que escapaba
  lexicon: HALOT
  rationale: «Huía» conserva el valor verbal y la inmediatez del participio hebreo. Es más sobrio y fiel que opciones más coloquiales como «escapaba».
translation_notes:
  revision_awareness: La revisión inglesa pasó de «deceived» a la expresión más literal «stole the heart of», manteniendo la explicación de la acción mediante «by not telling him that he was fleeing». La propuesta española sigue esa decisión revisada y conserva el carácter idiomático del hebreo sin reducirlo a una paráfrasis abstracta.
  spanish_consistency_notes:
  - Se mantiene «Y Jacob» por la fórmula narrativa del hebreo con waw consecutiva, sin añadir matices no presentes en el texto.
  - No se usa «SEÑOR» ni terminología teológica ajena al versículo.
  - «Huía» se eligió para reflejar el participio hebreo como acción en curso o inminente.
  - Se evita «engañó» en el texto principal para no perder la imagen idiomática que la POB final preservó en inglés.
