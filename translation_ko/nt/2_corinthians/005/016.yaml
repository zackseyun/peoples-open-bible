  - marker: a
    text: Or 'from a human point of view' or 'by worldly standards' for 'according to the flesh.'
    reason: lexical_alternative
  - marker: b
    text: Greek 'Christon'; traditionally 'Christ.' Here rendered 'the Messiah' to preserve the title's meaning.
    reason: lexical_alternative
