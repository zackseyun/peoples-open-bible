translation:
  language: es
  text: Porque ellos han sido enteramente dados[a] a mí de entre los hijos de Israel; en lugar de todo el que abre la matriz, el primogénito de todos los hijos de Israel[b][c], los he tomado para mí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «seguramente dados a mí» o «completamente dados a mí»; el hebreo repite «dados» para dar énfasis.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «todo el que abre la matriz», un giro idiomático para el primogénito.'
    reason: lexical_alternative
  - marker: c
    text: O «el pueblo de Israel» o «los israelitas»; el hebreo dice literalmente «los hijos de Israel».
    reason: lexical_alternative
lexical_decisions:
- source_word: נְתֻנִים נְתֻנִים
  english_pob_choice: wholly given
  chosen_spanish: completamente dados
  alternatives_spanish:
  - totalmente dados
  - enteramente dados
  - dados por completo
  lexicon: HALOT
  rationale: La repetición hebrea intensifica la idea de entrega total. En español, «completamente dados» conserva esa fuerza enfática sin sonar torpe ni demasiado literal.
- source_word: לִי
  english_pob_choice: to me
  chosen_spanish: a mí
  alternatives_spanish:
  - para mí
  lexicon: HALOT
  rationale: Aquí el dativo expresa dedicación y pertenencia. «A mí» mantiene la construcción verbal natural en español con «dados a mí».
- source_word: מִתּוֹךְ בְּנֵי יִשְׂרָאֵל
  english_pob_choice: from among the sons of Israel
  chosen_spanish: de entre los hijos de Israel
  alternatives_spanish:
  - de entre el pueblo de Israel
  - de entre los israelitas
  lexicon: HALOT
  rationale: «De entre» reproduce la idea de selección desde dentro de un grupo. Se conserva «hijos de Israel» para reflejar con fidelidad la expresión hebrea masculina y corporativa.
- source_word: תַּחַת
  english_pob_choice: in place of
  chosen_spanish: en lugar de
  alternatives_spanish:
  - en vez de
  - en intercambio por
  lexicon: HALOT
  rationale: 'El valor es sustitutivo: los levitas son tomados como sustitutos de los primogénitos. «En lugar de» es la opción más clara y formal en español.'
- source_word: פִּטְרַת כָּל רֶחֶם
  english_pob_choice: everyone who opens the womb
  chosen_spanish: todo el que abre la matriz
  alternatives_spanish:
  - todo el que abre el vientre
  - cada uno que abre la matriz
  lexicon: HALOT
  rationale: Se conserva la imagen idiomática hebrea en español. «Matriz» refleja el registro bíblico y hace visible el giro idiomático que designa al primogénito.
- source_word: בְּכוֹר כֹּל מִבְּנֵי יִשְׂרָאֵל
  english_pob_choice: the firstborn of all the sons of Israel
  chosen_spanish: el primogénito de todos los hijos de Israel
  alternatives_spanish:
  - el primogénito de todos los hijos de Israel
  - todos los primogénitos de los hijos de Israel
  lexicon: HALOT
  rationale: «Primogénito» explicita el sentido idiomático ya insinuado por «abre la matriz». Se mantiene la relación sintáctica con «hijos de Israel» y el alcance colectivo del grupo.
- source_word: לָקַחְתִּי אֹתָם לִי
  english_pob_choice: I have taken them for myself
  chosen_spanish: los he tomado para mí
  alternatives_spanish:
  - los tomé para mí
  - los he tomado a mí
  lexicon: HALOT
  rationale: El perfecto hebreo se vierte con perfecto compuesto en español para expresar una acción ya efectuada con vigencia actual. «Para mí» comunica apropiación y destino.
theological_decisions:
- issue: Expresión masculina corporativa בְּנֵי יִשְׂרָאֵל
  english_pob_reading: sons of Israel
  chosen_spanish_reading: hijos de Israel
  alternative_spanish_readings:
  - pueblo de Israel
  - israelitas
  rationale: Se preserva la forma masculina del hebreo, siguiendo la política de fidelidad lexical y evitando neutralizar el término sin necesidad textual.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Lectura sustitutiva de תַּחַת en relación con los primogénitos
  english_pob_reading: in place of
  chosen_spanish_reading: en lugar de
  alternative_spanish_readings:
  - en vez de
  - en intercambio por
  rationale: 'El contexto requiere sustitución representativa: los levitas son tomados en lugar de los primogénitos. La traducción evita diluir esa relación jurídica y cultual.'
  doctrine_reference: Numbers 8:16; HALOT תַּחַת
translation_notes:
  revision_awareness: 'La revisión más reciente no introdujo cambios: el texto fuente y la lectura inglesa permanecen estables, con solo observaciones menores sobre alternativas léxicas. La versión española mantiene esa estabilidad y conserva las tensiones idiomáticas importantes del hebreo sin suavizarlas en exceso.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como término por defecto cuando el Tetragrámaton aparezca; en este versículo no se presenta.
  - Se conserva el paralelismo entre la repetición enfática de «dados» y la expresión sustitutiva «en lugar de».
  - Se usa un registro bíblico claro y contemporáneo, evitando arcaísmos innecesarios pero preservando la imaginería hebrea.
