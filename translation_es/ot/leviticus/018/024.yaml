review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido hebreo general: prohibición reflexiva de contaminarse/hacerse impuro, explicación causal, impureza de las naciones y expulsión delante de Israel. Sin embargo, la nota alternativa en español no preserva el campo léxico de טמא, porque «defrauden» es un error semántico grave; además, en el texto principal «porque por todas estas cosas» es menos natural que «pues por todas ellas» o similar, aunque no cambia el sentido.'
  spanish_quality_summary: 'El texto principal es mayormente claro y digno, pero puede mejorarse en naturalidad y fluidez. «No se hagan impuros» es fiel aunque algo menos idiomático que «No se vuelvan impuros» o «No se contaminen»; dado el énfasis del proyecto en preservar la categoría levítica, «No se hagan impuros» es aceptable. La principal deficiencia está en la nota al pie: contiene «defrauden», que no corresponde al hebreo ni al inglés auditado.'
  glossary_alignment: No hay términos del glosario mayor en juego como Yahvé/Mesías. La decisión de mantener «impuro» alinea bien con la rationale teológica inglesa sobre impureza ritual-moral. «Las naciones» y «expulso de delante de ustedes» también concuerdan con el expediente inglés.
  issues:
  - severity: high
    issue: La nota al pie usa «defrauden» como alternativa.
    rationale: «Defrauden» no corresponde en absoluto a טמא ni a la nota inglesa («defile yourselves / were defiled»). Introduce un significado de engaño o fraude ajeno al texto fuente.
  - severity: medium
    issue: La frase «porque por todas estas cosas» suena pesada en español.
    rationale: Aunque es semánticamente correcta, la repetición inmediata «porque por» resulta poco fluida. Una leve mejora estilística puede conservar el paralelismo del hebreo con mejor legibilidad.
  revised_spanish_text: No se hagan impuros[a] con ninguna de estas cosas, pues por todas estas cosas se hicieron impuras las naciones que yo expulso de delante de ustedes.
  revised_footnotes:
  - marker: a
    text: 'O: «No se contaminen con ninguna de estas cosas ... las naciones ... quedaron impuras» o «fueron contaminadas».'
    reason: lexical_alternative
  revision_rationale: Se conserva el texto base casi intacto porque refleja bien el hebreo y la línea del POB sobre impureza. Se corrige la nota al pie para que preserve alternativas léxicas reales de טמא en vez de un error semántico grave («defrauden»). También se suaviza ligeramente la conexión explicativa con «pues», que suena más natural en español sin alterar el sentido de כִּי.
