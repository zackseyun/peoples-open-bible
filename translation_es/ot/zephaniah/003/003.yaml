translation:
  language: es
  text: Sus oficiales dentro de ella son leones rugientes; sus jueces son lobos vespertinos que no dejan nada para la mañana[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «no dejan un hueso hasta la mañana». El modismo hebreo presenta una consumición total y voraz.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׂרֶיהָ
  english_pob_choice: her officials
  chosen_spanish: sus oficiales
  alternatives_spanish:
  - sus príncipes
  - sus gobernantes
  lexicon: HALOT
  rationale: שַׂר puede referirse a príncipe, jefe, gobernador u oficial. En este contexto de denuncia de liderazgo corrupto, «oficiales» comunica autoridad civil sin imponer una lectura monárquica específica.
- source_word: בקרבה
  english_pob_choice: within her
  chosen_spanish: dentro de ella
  alternatives_spanish:
  - en medio de ella
  - en su interior
  lexicon: HALOT
  rationale: La expresión señala la ubicación interna de esos líderes. «Dentro de ella» conserva la imagen de corrupción operando en el seno de la ciudad y suena natural en español.
- source_word: אריות שאגים
  english_pob_choice: are roaring lions
  chosen_spanish: son leones rugientes
  alternatives_spanish:
  - son leones que rugen
  - son leones bramadores
  lexicon: HALOT
  rationale: El participio expresa una cualidad activa y depredadora. «Leones rugientes» mantiene el carácter amenazante y el paralelismo nominal del hebreo.
- source_word: שֹׁפְטֶיהָ
  english_pob_choice: her judges
  chosen_spanish: sus jueces
  alternatives_spanish:
  - sus magistrados
  lexicon: HALOT
  rationale: El término designa autoridades judiciales; «jueces» es la correspondencia más directa y transparente.
- source_word: זאבי ערב
  english_pob_choice: evening wolves
  chosen_spanish: lobos vespertinos
  alternatives_spanish:
  - lobos de la tarde
  - lobos del anochecer
  lexicon: HALOT
  rationale: La construcción literalmente es «lobos de la tarde/noche». «Vespertinos» conserva la imagen de animales que salen al caer la tarde y mantiene el tono poético sin volverlo torpe.
- source_word: לא גרמו לבקר
  english_pob_choice: they leave nothing for the morning
  chosen_spanish: no dejan nada para la mañana
  alternatives_spanish:
  - no dejan un hueso para la mañana
  - no roen hueso hasta la mañana
  lexicon: HALOT
  rationale: El giro hebreo es idiomático y sugiere consumo total. «No dejan nada para la mañana» comunica esa fuerza en español moderno, preservando el sentido de devastación total sin introducir una imagen demasiado literal en el texto principal.
translation_notes:
  revision_awareness: Se sigue la lectura revisada del inglés POB que une la cláusula final a «lobos vespertinos» mediante una relativa; en español se resolvió con «que» para mantener la referencia clara y natural.
  spanish_consistency_notes:
  - Se mantiene «sus» para reflejar el posesivo femenino singular del hebreo.
  - 'Se prefirió un paralelo sintáctico sencillo: sujeto + cópula + predicativo, en línea con el hebreo nominal.'
  - No se añadió una nota sobre «hueso» en el texto principal porque el español fluido exigía una equivalencia dinámica; la alternativa literal queda documentada en la nota y las decisiones léxicas.
