translation:
  language: es
  text: Mientras la ciudad santa estaba habitada en completa paz, y las leyes se observaban muy bien[a] por causa de Onias, el sumo sacerdote,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O también: «de la mejor manera»; el adverbio griego κάλλιστα puede significar «muy bien» o expresar el superlativo, «de la mejor manera».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Τῆς ἁγίας πόλεως
  english_pob_choice: the holy city
  chosen_spanish: la ciudad santa
  alternatives_spanish:
  - la ciudad sagrada
  lexicon: LSJ
  rationale: ἁγίας califica directamente a πόλεως; en español, «ciudad santa» reproduce con naturalidad el valor religioso del adjetivo sin añadir solemnidad innecesaria.
- source_word: κατοικουμένης
  english_pob_choice: was inhabited
  chosen_spanish: estaba habitada
  alternatives_spanish:
  - era habitada
  - estaba poblada
  lexicon: LSJ
  rationale: El participio genitivo absoluto expresa el estado de la ciudad; «estaba habitada» conserva ese matiz estático y suena natural en español.
- source_word: μετὰ πάσης εἰρήνης
  english_pob_choice: in complete peace
  chosen_spanish: en completa paz
  alternatives_spanish:
  - en plena paz
  - con toda paz
  lexicon: LSJ
  rationale: La expresión es idiomática y totalizante; «en completa paz» transmite bien el alcance de πάσης sin forzar una construcción ajena al español.
- source_word: τῶν νόμων
  english_pob_choice: the laws
  chosen_spanish: las leyes
  alternatives_spanish:
  - la Ley
  lexicon: LSJ
  rationale: El plural debe mantenerse en español, pues el griego se refiere a las normas/ordenanzas judías en conjunto, no a una abstracción singular.
- source_word: κάλλιστα
  english_pob_choice: in the best way
  chosen_spanish: de la mejor manera
  alternatives_spanish:
  - muy bien
  - excelentemente
  lexicon: LSJ
  rationale: El superlativo adverbial pide un equivalente que conserve la fuerza de grado; «de la mejor manera» es formal y claro en español.
- source_word: συντηρουμένων
  english_pob_choice: were being observed
  chosen_spanish: eran observadas
  alternatives_spanish:
  - se cumplían
  - se guardaban
  - eran mantenidas
  lexicon: LSJ
  rationale: En el contexto de leyes, «observar» es la opción más natural y precisa para συντηρουμένων; la voz pasiva se conserva con «eran observadas».
- source_word: διὰ τὴν Ὀνίου τοῦ ἀρχιερέως
  english_pob_choice: because of Onias the high priest
  chosen_spanish: por causa de Onias, el sumo sacerdote
  alternatives_spanish:
  - a causa de Onias, el sumo sacerdote
  - debido a Onias, el sumo sacerdote
  lexicon: LSJ
  rationale: διά con acusativo expresa causalidad; «por causa de» refleja bien esa relación. Se conserva el nombre transliterado «Onias» y el título «sumo sacerdote».
theological_decisions:
- issue: Valor causal de διά con Onias
  english_pob_reading: The city's peace and the observance of the laws are presented as occurring because of Onias the high priest.
  chosen_spanish_reading: La paz de la ciudad y la observancia de las leyes se presentan como resultado de la acción/gestión de Onias, el sumo sacerdote.
  alternative_spanish_readings:
  - por medio de Onias, el sumo sacerdote
  - a través de Onias, el sumo sacerdote
  rationale: El griego favorece una relación causal más que meramente instrumental. «Por causa de» evita añadir una teología no explicitada y mantiene el elogio narrativo de la figura de Onias.
  doctrine_reference: 'Translation philosophy: primacía del idioma original; mantener el sentido causal sin importar una lectura doctrinal ajena al texto.'
translation_notes:
  revision_awareness: La versión inglesa revisó «kept» por «observed» para sonar más natural con συντηρουμένων en contexto legal; la redacción española sigue esa revisión y conserva la pasiva, la causalidad de διά y el plural de νόμων.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» cuando corresponda al tetragrámaton; aquí no aparece.
  - Se prefiere «sumo sacerdote» por ser el equivalente natural y estable para ἀρχιερεύς.
  - «Ley/leyes» se distingue según el número del original; aquí el plural es significativo.
  - Se conserva la estructura de participio absoluto mediante una subordinada temporal en español.
  - El nombre propio se translitera como «Onias» conforme al criterio POB para nombres.
