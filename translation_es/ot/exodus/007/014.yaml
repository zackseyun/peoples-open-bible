translation:
  language: es
  text: 'Entonces Yahvé dijo a Moisés[a]: «Faraón tiene el corazón pesado; se niega a dejar ir al pueblo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «El corazón de Faraón está duro». El adjetivo hebreo significa literalmente «pesado», una metáfora de obstinación o falta de respuesta.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Yahvé dijo
  lexicon: HALOT
  rationale: La forma waw-consecutiva avanza la narración; «Entonces» conserva el orden discursivo natural en español sin perder la secuencia del evento.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se mantiene el nombre divino revelado en el texto original mediante la transliteración estable del proyecto, en lugar de sustituirlo por un título.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  alternatives_spanish:
  - Moisés
  lexicon: HALOT
  rationale: Nombre propio estándar en español bíblico.
- source_word: כָּבֵד
  english_pob_choice: is heavy
  chosen_spanish: está pesado
  alternatives_spanish:
  - está duro
  - está obstinado
  - está insensible
  lexicon: HALOT
  rationale: «Pesado» conserva la metáfora concreta del hebreo. «Está pesado» resulta natural en español y mantiene la imagen sin resolverla prematuramente como «duro» u otra interpretación explicativa.
- source_word: לֵב פַּרְעֹה
  english_pob_choice: Pharaoh’s heart
  chosen_spanish: el corazón de Faraón
  alternatives_spanish:
  - el corazón de Faraón
  lexicon: HALOT
  rationale: La construcción posesiva se vierte de forma idiomática en español, preservando la referencia al órgano/centro interior sin alterar el sentido.
- source_word: מֵאֵן
  english_pob_choice: he refuses
  chosen_spanish: se niega
  alternatives_spanish:
  - rehúsa
  - se rehúsa
  lexicon: HALOT
  rationale: El participio expresa una disposición persistente de rechazo; «se niega» comunica bien esa actitud continua en español contemporáneo.
- source_word: לְשַׁלַּח
  english_pob_choice: to let ... go
  chosen_spanish: dejar ir
  alternatives_spanish:
  - soltar
  - despedir
  - enviar lejos
  lexicon: HALOT
  rationale: En Éxodo el verbo expresa permitir la salida de Israel; «dejar ir» es la equivalencia idiomática más clara y fiel en español.
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - el pueblo de Israel
  lexicon: HALOT
  rationale: El hebreo dice simplemente «el pueblo»; se evita añadir una especificación no explícita en este versículo.
theological_decisions:
- issue: Mantener la metáfora de la dureza sin resolverla en un equivalente interpretativo
  english_pob_reading: Pharaoh’s heart is heavy
  chosen_spanish_reading: El corazón de Faraón está pesado
  alternative_spanish_readings:
  - El corazón de Faraón está duro
  - El corazón de Faraón está obstinado
  rationale: La POB inglesa preserva «heavy» para respetar el término hebreo y no mezclar este versículo con otros textos de endurecimiento que usan vocabulario distinto. El español conserva esa misma tensión mediante «pesado».
  doctrine_reference: Primacía del idioma fuente; preservar la tensión léxica y teológica entre pasajes de endurecimiento.
translation_notes:
  revision_awareness: Sin revisiones aplicadas en el paquete inglés; la propuesta española sigue de cerca la lectura auditada, manteniendo la metáfora de «pesado» y la secuencia narrativa natural en español.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el tetragrámaton, conforme al criterio del proyecto.
  - Se prefiere «el pueblo» sin añadir «de Israel», porque el hebreo no lo explicita.
  - Se evita «duro» en el texto principal para no borrar la metáfora concreta de כָּבֵד.
