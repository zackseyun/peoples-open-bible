translation:
  language: es
  text: Entonces llegaron a Marah[a], pero no pudieron beber el agua de Marah, porque era amarga. Por eso fue llamado Marah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Marah suena parecido a la palabra hebrea para «amargo».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹאוּ
  english_pob_choice: Then they came
  chosen_spanish: Entonces llegaron
  alternatives_spanish:
  - Y llegaron
  - Así llegaron
  lexicon: HALOT
  rationale: El wayyiqtol introduce avance narrativo; «Entonces llegaron» conserva la sucesión temporal de manera natural en español.
- source_word: מָרָתָה
  english_pob_choice: to Marah
  chosen_spanish: a Mará
  alternatives_spanish:
  - a Marah
  - hasta Mará
  lexicon: HALOT
  rationale: Es un nombre propio de lugar. Se translitera como «Mará» para reflejar la vocalización española del topónimo y mantener la conexión con el juego de palabras con מר.
- source_word: וְלֹא יָכְלוּ
  english_pob_choice: but they could not
  chosen_spanish: pero no pudieron
  alternatives_spanish:
  - y no pudieron
  - mas no pudieron
  lexicon: HALOT
  rationale: El valor discursivo es contrastivo entre la llegada y la imposibilidad de beber; «pero» expresa bien ese contraste en español.
- source_word: לִשְׁתֹּת מַיִם
  english_pob_choice: drink the water
  chosen_spanish: beber el agua
  alternatives_spanish:
  - tomar el agua
  - beber agua
  lexicon: HALOT
  rationale: En español, con este contexto específico, el artículo definido comunica el agua presente en ese lugar; «beber» mantiene el sentido literal.
- source_word: מִמָּרָה
  english_pob_choice: from Marah
  chosen_spanish: de Mará
  alternatives_spanish:
  - desde Mará
  - de ese lugar, Mará
  lexicon: HALOT
  rationale: La preposición מן marca origen; «de Mará» conserva la relación de procedencia del agua respecto del lugar.
- source_word: כִּי מָרִים הֵם
  english_pob_choice: because it was bitter
  chosen_spanish: porque era amarga
  alternatives_spanish:
  - porque eran amargas
  - pues eran amargas
  lexicon: HALOT
  rationale: El hebreo usa un predicado plural que probablemente concuerda con «aguas» implícito, pero en español la masa nominal «agua» suena naturalmente singular; «era amarga» mantiene claridad sin ocultar la tensión gramatical de fondo.
- source_word: עַל כֵּן
  english_pob_choice: Therefore
  chosen_spanish: Por eso
  alternatives_spanish:
  - Por tanto
  - Así que
  lexicon: HALOT
  rationale: Expresa la conclusión etiológica que introduce el nombre del lugar.
- source_word: קָרָא שְׁמָהּ מָרָה
  english_pob_choice: it was named Marah
  chosen_spanish: se le puso por nombre Mará
  alternatives_spanish:
  - lo llamaron Mará
  - se llamó Mará
  lexicon: HALOT
  rationale: El hebreo presenta una construcción impersonal de nombramiento; la pasiva refleja española es natural y preserva el sentido sin añadir un sujeto no expresado.
- source_word: מָרָה / מָרִים
  english_pob_choice: Marah / bitter
  chosen_spanish: Mará / amarga
  alternatives_spanish:
  - Mará / amargo
  - Mará / amargas
  lexicon: HALOT
  rationale: Se mantiene el nombre propio transliterado y se traduce el adjetivo con el femenino singular para concordar con «agua», preservando el juego de palabras con el significado de «amarga».
translation_notes:
  revision_awareness: Se siguió de cerca el texto hebreo, manteniendo el movimiento narrativo, el contraste entre llegada e incapacidad, la etiología del nombre y el juego de palabras Mará/«amarga». La versión inglesa de auditoría coincide sustancialmente; la principal adaptación fue hacer natural en español la concordancia de «agua» como singular sin perder el plural implícito del hebreo.
  spanish_consistency_notes:
  - Se prefirió «Mará» como transliteración uniforme del topónimo en el texto y en la nota.
  - Se mantuvo «amarga» en singular para la fluidez del español, aunque el hebreo sugiere un plural subyacente relacionado con «aguas».
  - La puntuación conserva una secuencia narrativa simple y pública, apta para lectura litúrgica o devocional.
