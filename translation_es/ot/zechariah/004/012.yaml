base_translation:
  language: en
  yaml_path: translation/ot/zechariah/004/012.yaml
  text: Then I answered a second time and said to him[a], “What are these two olive branches that are beside the two golden pipes[c][b], which pour out the gold from themselves?”
  footnotes:
  - marker: a
    text: Or 'these two clusters/sprays of the olive trees'; the Hebrew term is unusual here and may refer to fruit-bearing olive shoots rather than larger branches.
    reason: lexical_alternative
  - marker: b
    text: Or 'the two pipes of gold' or 'the two golden tubes.'
    reason: lexical_alternative
  - marker: c
    text: Likely referring to 'golden oil'; Hebrew literally says 'the gold.'
    reason: lexical_alternative
