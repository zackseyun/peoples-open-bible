translation:
  language: es
  text: Y el remanente de la casa de Judá que haya sobrevivido volverá a echar raíces hacia abajo y dará fruto hacia arriba[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "el remanente que escapó de la casa de Judá que queda".
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיָסְפָה
  english_pob_choice: will again
  chosen_spanish: volverá
  alternatives_spanish:
  - hará de nuevo
  - seguirá
  lexicon: HALOT
  rationale: El hebreo expresa adición o continuidad de acción; en español, "volverá" comunica de manera natural la idea de que esta acción se repetirá o se reanudará, sin caer en el calco "añadirá".
- source_word: פְּלֵיטַת
  english_pob_choice: the surviving remnant
  chosen_spanish: el remanente sobreviviente
  alternatives_spanish:
  - el remanente escapado
  - los sobrevivientes
  lexicon: HALOT
  rationale: פְּלֵיטָה combina la idea de escape/supervivencia con un sentido colectivo. "Remanente sobreviviente" conserva ambas nociones en una forma natural para el español.
- source_word: בֵּית יְהוּדָה
  english_pob_choice: the house of Judah
  chosen_spanish: la casa de Judá
  alternatives_spanish:
  - Judá
  - la casa de Judá
  lexicon: HALOT
  rationale: Se mantiene la expresión de parentesco/pueblo o entidad nacional del hebreo. "Casa de Judá" preserva el valor covenantal e identitario mejor que reducirlo a solo "Judá".
- source_word: הַנִּשְׁאָרָה
  english_pob_choice: surviving
  chosen_spanish: sobreviviente
  alternatives_spanish:
  - que queda
  - restante
  lexicon: HALOT
  rationale: El participio matiza al remanente como lo que ha quedado después de la destrucción. "Sobreviviente" conserva esa cualidad sin repetir de forma pesada la idea de remanente.
- source_word: שֹׁרֶשׁ
  english_pob_choice: take root
  chosen_spanish: echar raíz
  alternatives_spanish:
  - arraigarse
  - echar raíces
  lexicon: HALOT
  rationale: Aunque el sustantivo es literalmente "raíz", el español expresa mejor la imagen con un verbo idiomático. "Echar raíz" mantiene la metáfora agrícola y sugiere establecimiento firme.
- source_word: לְמָטָּה
  english_pob_choice: downward
  chosen_spanish: hacia abajo
  alternatives_spanish:
  - abajo
  - hacia el suelo
  lexicon: HALOT
  rationale: La dirección vertical debe conservarse para equilibrar el contraste con "hacia arriba". "Hacia abajo" es claro y fiel al paralelismo poético.
- source_word: וְעָשָׂה
  english_pob_choice: and bear
  chosen_spanish: y dará
  alternatives_spanish:
  - y producirá
  - y llevará
  lexicon: HALOT
  rationale: Con "fruto" como objeto, el verbo español natural es "dar" en el sentido de producir. Mantiene la imagen bíblica sin forzar una construcción extraña.
- source_word: פְרִי
  english_pob_choice: fruit
  chosen_spanish: fruto
  alternatives_spanish:
  - fruta
  - producción
  lexicon: HALOT
  rationale: Se conserva la metáfora agrícola literal del hebreo. "Fruto" permite además la resonancia bíblica de prosperidad o resultado visible.
- source_word: לְמָעְלָה
  english_pob_choice: upward
  chosen_spanish: hacia arriba
  alternatives_spanish:
  - arriba
  - por encima
  lexicon: HALOT
  rationale: Equilibra el par poético con "hacia abajo" y conserva el contraste espacial del texto hebreo.
theological_decisions:
- issue: Imagen agrícola de restauración y estabilidad
  english_pob_reading: Retain the agricultural metaphor of rooting downward and bearing fruit upward as a picture of Judah's renewed stability and flourishing.
  chosen_spanish_reading: Conservar la metáfora agrícola de echar raíz hacia abajo y dar fruto hacia arriba como imagen de restauración y firmeza renovada de Judá.
  alternative_spanish_readings:
  - Interpretar de forma más dinámica como "quedará firmemente establecido y prosperará"
  rationale: El hebreo usa imágenes concretas de agricultura y dirección espacial. En español, la metáfora sigue siendo clara y poderosa; no es necesario despojarla de su imaginería para hacer explícito el sentido.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: El control de revisión indica alta concordancia con el texto fuente y con la decisión inglesa; no se requieren ajustes adicionales respecto de la metáfora o del valor léxico de los términos clave.
  spanish_consistency_notes:
  - Se mantuvo "Yahvé" solo cuando aparezca el nombre divino; en este versículo no aparece, así que no interviene.
  - '"Casa de Judá" conserva la expresión nacional/covenantal del hebreo.'
  - Se preservó la metáfora de raíz y fruto para evitar una paráfrasis abstracta que debilite el paralelismo poético.
  - La nota al pie refleja la alternativa léxica relevante preservada por la tradición auditada en inglés.
