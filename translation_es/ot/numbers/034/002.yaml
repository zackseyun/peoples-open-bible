  to: 'Ordena a los hijos de Israel y diles: «Cuando entren en la tierra de Canaán[a], esta es la tierra que les tocará[b] como herencia: la tierra de Canaán según sus límites».'
  rationale: 'Se reubican y corrigen las notas para alinearlas con la auditoría inglesa y con el hebreo: la nota sobre la literalidad de «hijos de Israel» se ancla en «Canaán» como en el modelo inglés, y la nota sobre el modismo de asignación se ancla en «les tocará». También se mejora «en herencia» a «como herencia» para reflejar mejor בְּנַחֲלָה, y «fronteras» a «límites» para una delimitación territorial más natural y precisa en español bíblico moderno.'
