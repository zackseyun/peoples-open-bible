lexical_decisions:
- source_word: וְ/יַיִן
  english_pob_choice: wine
  chosen_spanish: vino
  alternatives_spanish:
  - vino fermentado
  lexicon: HALOT
  rationale: יַיִן designa vino; en español, «vino» es la equivalencia natural y fiel. No hace falta explicitar «fermentado» porque el término ya lo comunica en el uso normal.
- source_word: לֹא יִשְׁתּוּ
  english_pob_choice: No priest shall drink
  chosen_spanish: Ningún sacerdote beberá
  alternatives_spanish:
  - No beberá vino ningún sacerdote
  - Todo sacerdote no beberá
  lexicon: HALOT
  rationale: La prohibición se expresa con naturalidad en español mediante una construcción universal negativa. «Beberá» reproduce el valor prescriptivo del imperfecto en este contexto legal.
- source_word: כָּל כֹּהֵן
  english_pob_choice: No priest
  chosen_spanish: Ningún sacerdote
  alternatives_spanish:
  - Todo sacerdote
  - Cada sacerdote
  lexicon: HALOT
  rationale: כָּל כֹּהֵן tiene alcance universal; en español, «ningún sacerdote» preserva mejor la fuerza prohibitiva que una calca como «todo sacerdote».
- source_word: בְּ/בוֹאָם
  english_pob_choice: when entering
  chosen_spanish: al entrar
  alternatives_spanish:
  - cuando entren
  - cuando entre
  lexicon: HALOT
  rationale: El infinitivo constructo con sufijo plural expresa la circunstancia temporal de la acción; «al entrar» es una forma idiomática y precisa en español.
- source_word: אֶל הֶחָצֵר הַפְּנִימִית
  english_pob_choice: the inner court
  chosen_spanish: en el atrio interior
  alternatives_spanish:
  - al atrio interior
  - en el patio interior
  lexicon: HALOT
  rationale: חָצֵר en contexto de templo puede rendirse como «atrio» o «patio». «Atrio interior» conserva el valor arquitectónico cultual y suena más natural en español bíblico contemporáneo que «patio».
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el hebreo y armoniza con el audit trail inglés: se preserva la prohibición universal, el valor temporal de «al entrar» y la designación arquitectónica del espacio interior del templo. Se evita una traducción mecánica que altere la fluidez del español o debilite el alcance legal del mandato.'
  spanish_consistency_notes:
  - Se mantiene «sacerdote» para כֹּהֵן, sin introducir terminología eclesiástica ajena al contexto del templo.
  - Se usa «atrio interior» para conservar la imagen espacial del santuario sin sobretraducir.
  - La negación universal se expresa con «Ningún sacerdote» para reflejar adecuadamente el hebreo y el inglés auditado.
