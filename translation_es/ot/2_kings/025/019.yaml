translation:
  language: es
  text: Y de la ciudad tomó un[a] oficial, que estaba a cargo de los hombres de guerra, y a cinco hombres de entre los que veían[b] el rostro del rey, que fueron hallados en la ciudad, y al escriba, el comandante del ejército, que alistaba[c] al pueblo de la tierra, y a sesenta hombres del pueblo de la tierra que fueron hallados en la ciudad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'eunuco'; el término hebreo puede designar tanto a un eunuco literal como a un oficial real.
    reason: lexical_alternative
  - marker: b
    text: '''Los que veían el rostro del rey'' es un modismo hebreo para quienes tenían acceso directo al rey, probablemente asistentes reales o cortesanos.'
    reason: cultural_note
  - marker: c
    text: O 'reunía' o 'reclutaba' al pueblo de la tierra.
    reason: lexical_alternative
lexical_decisions:
- source_word: סָרִיס
  english_pob_choice: official
  chosen_spanish: oficial
  alternatives_spanish:
  - eunuco
  - oficial de la corte
  lexicon: HALOT
  rationale: El inglés POB ajustó la lectura desde 'court official' a 'official' para no imponer un matiz de corte más específico del que exige el hebreo. En español, 'oficial' conserva esa amplitud. 'Eunuco' queda como alternativa léxica posible, pero no se adopta como texto principal porque el contexto administrativo-militar no obliga a afirmar esa condición física.
- source_word: פָקִיד עַל אַנְשֵׁי הַמִּלְחָמָה
  english_pob_choice: appointed over the men of war
  chosen_spanish: que estaba puesto sobre los hombres de guerra
  alternatives_spanish:
  - encargado de los hombres de guerra
  - puesto al frente de los soldados
  - nombrado sobre los hombres de guerra
  lexicon: HALOT
  rationale: '''Puesto sobre'' refleja bien פָקִיד como alguien designado en una función de responsabilidad. ''Hombres de guerra'' conserva el registro militar del hebreo y sigue de cerca la decisión inglesa.'
- source_word: מֵרֹאֵי פְנֵי הַמֶּלֶךְ
  english_pob_choice: from those who saw the king’s face
  chosen_spanish: de entre los que veían el rostro del rey
  alternatives_spanish:
  - de entre los que estaban en la presencia del rey
  - de entre los que tenían acceso al rey
  - de entre los que veían el rostro del rey
  lexicon: HALOT
  rationale: Se preserva la imagen hebrea literal 'veían el rostro del rey' para mantener la expresión idiomática y su posible sentido de acceso directo a la presencia real. En español, 'rostro' comunica la idiomática sin perder transparencia.
- source_word: הַסֹּפֵר שַׂר הַצָּבָא
  english_pob_choice: the scribe, the commander of the army
  chosen_spanish: al escriba, el comandante del ejército
  alternatives_spanish:
  - al escriba, el jefe del ejército
  - al secretario, el comandante del ejército
  - al escriba militar
  lexicon: HALOT
  rationale: 'Se mantiene la aposición visible como en el inglés POB: primero ''el escriba'' y luego ''el comandante del ejército''. ''Escriba'' conserva el oficio administrativo, y ''comandante del ejército'' expresa con claridad שַׂר הַצָּבָא sin diluir el vínculo sintáctico.'
- source_word: הַמַּצְבִּא אֶת עַם הָאָרֶץ
  english_pob_choice: who mustered the people of the land
  chosen_spanish: que pasaba revista al pueblo de la tierra
  alternatives_spanish:
  - que reunía al pueblo de la tierra
  - que alistaba al pueblo de la tierra
  - que reclutaba al pueblo de la tierra
  lexicon: HALOT
  rationale: '''Pasaba revista'' expresa en español el sentido administrativo-militar de מַצְבִּא sin forzar ''reclutaba'', que sería más interpretativo. Se conserva el matiz de movilización/registro que dejó el inglés con ''mustered''.'
- source_word: עַם הָאָרֶץ
  english_pob_choice: the people of the land
  chosen_spanish: el pueblo de la tierra
  alternatives_spanish:
  - la gente del país
  - el pueblo de la tierra
  lexicon: HALOT
  rationale: Se traduce de manera literal para mantener la expresión técnica y su posible carga social en el contexto histórico. 'Pueblo de la tierra' reproduce la fórmula y evita estrecharla prematuramente a 'la gente del país'.
- source_word: נִמְצְאוּ / הַנִּמְצְאִים
  english_pob_choice: were found
  chosen_spanish: fueron hallados
  alternatives_spanish:
  - fueron encontrados
  - se hallaban
  - que estaban en la ciudad
  lexicon: HALOT
  rationale: '''Fueron hallados'' mantiene el pasivo narrativo del hebreo y es idiomático en español bíblico contemporáneo. También deja claro que se trata de personas localizadas en la ciudad tras los acontecimientos.'
- source_word: לָקַח
  english_pob_choice: he took
  chosen_spanish: tomó
  alternatives_spanish:
  - se llevó
  - apresó
  - tomó y se llevó
  lexicon: HALOT
  rationale: '''Tomó'' sigue el valor básico del verbo sin añadir una intensidad que el hebreo no especifica. En contexto, implica captura o traslado, pero el texto mismo solo dice ''tomó''.'
theological_decisions:
- issue: Relación entre literalidad idiomática y comprensión de la corte real
  english_pob_reading: '''Those who saw the king’s face'' is kept quite literally, with a note explaining the idiom as direct access to the king.'
  chosen_spanish_reading: Se conserva literalmente 'los que veían el rostro del rey', con la misma apertura interpretativa.
  alternative_spanish_readings:
  - los que estaban en la presencia del rey
  - los cortesanos del rey
  - los de acceso al rey
  rationale: 'No hay una afirmación doctrinal aquí, pero sí una tensión hermenéutica: traducir el hebreo de manera idiomática podría ocultar la imagen original, mientras que una paráfrasis eliminaría la transparencia. La solución mantiene la metáfora y permite una nota explicativa.'
  doctrine_reference: Principio de transparencia textual y respeto por el idiomatismo original; sin afirmación doctrinal específica.
- issue: Posible sentido de סָרִיס en contexto administrativo-militar
  english_pob_reading: The English audit trail leaves 'official' in the main text and notes the alternative 'eunuch'.
  chosen_spanish_reading: Se deja 'oficial' en el texto principal y se preserva 'eunuco' como alternativa léxica.
  alternative_spanish_readings:
  - eunuco
  - oficial de la corte
  rationale: La evidencia disponible no obliga a decidir por una condición física. Mantener 'oficial' evita sobreinterpretación, mientras la nota conserva la tensión lexical documentada.
  doctrine_reference: Cautela exegética ante vocablos polisémicos; no se define una doctrina.
translation_notes:
  revision_awareness: El rastro de revisión en inglés cambió 'court official' por 'official' para ajustar más de cerca סָרִיס. La versión española sigue esa revisión y evita introducir 'de la corte' en el texto principal. También conserva el esquema sintáctico y los términos administrativos/militares sin ampliar el sentido más allá del hebreo.
  spanish_consistency_notes:
  - 'Se mantiene una terminología estable para cargos y funciones: ''oficial'', ''escriba'', ''comandante del ejército'', ''pueblo de la tierra''.'
  - '''Rostro del rey'' se conserva como idiomatismo transparente, sin reemplazarlo por una paráfrasis que borre la imagen original.'
  - '''Fueron hallados'' y ''tomó'' respetan el pasivo y el verbo básico del hebreo sin intensificar innecesariamente la acción.'
  - Se evita 'SEÑOR' porque no aparece el tetragrámaton en este versículo.
  - No se usa 'Cristo', 'Mesías' ni vocabulario teológico añadido, porque el verso es puramente narrativo-administrativo.
