translation:
  language: es
  text: Los hijos de Israel[a] guardarán el sábado, para observar[b] el sábado a lo largo de sus generaciones, como un pacto eterno[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los israelitas» o «los hijos de Israel». El hebreo dice literalmente «los hijos de Israel».
    reason: lexical_alternative
  - marker: b
    text: Literalmente «hacer el sábado»; es decir, observarlo o guardarlo.
    reason: lexical_alternative
  - marker: c
    text: O «un pacto perpetuo» o «un pacto para siempre».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשָׁמְרוּ
  english_pob_choice: shall keep
  chosen_spanish: guardarán
  alternatives_spanish:
  - observarán
  - mantendrán
  - guardarán y observarán
  lexicon: HALOT
  rationale: שׁמר expresa guardar, custodiar u observar. En español, «guardarán» conserva el sentido de mantener fielmente una orden o práctica pactal, con un tono natural y digno. El matiz de observancia queda reforzado por la frase siguiente.
- source_word: בְנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Jacob
  lexicon: HALOT
  rationale: El hebreo dice literalmente «los hijos de Israel». Se mantiene la expresión familiar y corporativa sin neutralizarla con «israelitas», porque el texto fuente es explícito y el audit trail inglés también preserva esa forma.
- source_word: הַשַּׁבָּת
  english_pob_choice: the Sabbath
  chosen_spanish: el sábado
  alternatives_spanish:
  - el shabat
  - el día de reposo
  lexicon: HALOT
  rationale: Aunque «Sabbath» suele verterse como «el sábado», aquí el referente es la institución señal del pacto. «Sábado» es comprensible y bíblicamente reconocible en español, sin introducir una perífrasis adicional.
- source_word: לַעֲשׂוֹת אֶת הַשַּׁבָּת
  english_pob_choice: to observe the Sabbath
  chosen_spanish: para observar el sábado
  alternatives_spanish:
  - para hacer el sábado
  - para guardar el sábado
  lexicon: HALOT
  rationale: La construcción hebrea «hacer el sábado» es idiomática y no natural en español. Siguiendo el sentido reconocido en el audit trail, «observar» transmite la idea de practicar/guardar el sábado sin perder la relación con el mandamiento.
- source_word: לְדֹרֹתָם
  english_pob_choice: throughout their generations
  chosen_spanish: a lo largo de sus generaciones
  alternatives_spanish:
  - por sus generaciones
  - de generación en generación
  lexicon: HALOT
  rationale: La frase señala continuidad intergeneracional. «A lo largo de sus generaciones» preserva esa duración histórica y suena natural en español contemporáneo.
- source_word: בְּרִית עוֹלָם
  english_pob_choice: as an everlasting covenant
  chosen_spanish: como un pacto eterno
  alternatives_spanish:
  - como un pacto perpetuo
  - como un pacto para siempre
  lexicon: HALOT
  rationale: בְּרִית es «pacto» y עוֹלָם expresa duración sin fin o indefinida en este contexto. «Pacto eterno» mantiene el peso covenantal y la duración, evitando diluir el término técnico con una explicación demasiado amplia.
theological_decisions:
- issue: Expresión corporativa y género gramatical de בְנֵי יִשְׂרָאֵל
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - el pueblo de Israel
  rationale: Se conserva la forma masculina familiar del hebreo, como en el inglés auditado. Aunque refiere al pueblo en conjunto, el texto usa una designación filial específica; no se sustituye por un ethnónimo neutral sin necesidad textual.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Valor durativo y pactal de בְּרִית עוֹלָם
  english_pob_reading: everlasting covenant
  chosen_spanish_reading: pacto eterno
  alternative_spanish_readings:
  - pacto perpetuo
  - pacto para siempre
  rationale: La frase debe retener su sentido de pacto duradero sin cargar el verso con conclusiones doctrinales ajenas al enunciado. «Eterno» comunica continuidad absoluta o indefinida en el marco pactal.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el acuerdo alto del audit trail inglés: conserva la expresión filial «hijos de Israel», resuelve el idiomatismo «hacer el sábado» con «observar», y mantiene la fuerza durativa de בְּרִית עוֹלָם como «pacto eterno». No se registran revisiones previas en el paquete fuente, así que no se aplicaron cambios editoriales adicionales.'
  spanish_consistency_notes:
  - Se usa «sábado» para הַשַּׁבָּת por ser la forma más estable y publicable en español; en contexto legal-cultual funciona como equivalente de «Sabbath».
  - Se evita «SEÑOR» u otros sustitutos porque este versículo no contiene el nombre divino.
  - «Pacto» se mantiene como término técnico coherente con el resto del proyecto para בְּרִית.
  - 'La sintaxis española ordena naturalmente la relación final: guardar/observar el sábado, a lo largo de sus generaciones, como pacto eterno.'
