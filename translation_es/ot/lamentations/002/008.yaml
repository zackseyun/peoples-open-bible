  text: חָשַׁ֨ב יְהוָ֤ה לְ/הַשְׁחִית֙ חוֹמַ֣ת בַּת צִיּ֔וֹן נָ֣טָה קָ֔ו לֹא הֵשִׁ֥יב יָד֖/וֹ מִ/בַּלֵּ֑עַ וַ/יַּֽאֲבֶל חֵ֥ל וְ/חוֹמָ֖ה יַחְדָּ֥ו אֻמְלָֽלוּ׀־־־׃ס
base_translation:
  language: en
  yaml_path: translation/ot/lamentations/002/008.yaml
  text: Yahweh determined to destroy the wall of daughter Zion[a]; he stretched out a measuring line; he did not hold back his hand from swallowing up, and he made rampart and wall mourn[b]; together they languish.
  footnotes:
  - marker: a
    text: Or 'the wall of the daughter of Zion.' The Hebrew personifies Zion/Jerusalem as a daughter.
    reason: lexical_alternative
  - marker: b
    text: Or 'he did not turn back his hand from consuming.' The Hebrew literally says 'from swallowing up,' a vivid image of total destruction.
    reason: lexical_alternative
