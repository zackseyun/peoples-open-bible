revisions:
- from: 'Y los hijos de Caleb, hijo de Jefténe: Iru[a], Elá y Naam; y los hijos de Elá: Quenaz.'
  to: 'Y los hijos de Caleb, hijo de Jefone: Iru[a], Elah y Naam; y los hijos de Elah: Kenaz.'
  rationale: 'Se conserva la estructura y el sentido del hebreo, pero se corrigen nombres propios para mayor fidelidad y legibilidad: ‘Jefone’ sustituye al problemático ‘Jefténe’; ‘Elah’ mantiene la forma transliterada del nombre sin acento añadido; ‘Kenaz’ sigue la forma auditada por la POB y evita una adaptación no documentada. La nota sobre ‘hijos/descendientes’ se mantiene, actualizando solo el nombre corregido.'
