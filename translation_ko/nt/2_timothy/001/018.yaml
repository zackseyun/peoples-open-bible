  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: δῴη αὐτῷ ὁ κύριος εὑρεῖν ἔλεος παρὰ κυρίου ἐν ἐκείνῃ τῇ ἡμέρᾳ— καὶ ὅσα ἐν Ἐφέσῳ διηκόνησεν, βέλτιον σὺ γινώσκεις.
base_translation:
  language: en
  yaml_path: translation/nt/2_timothy/001/018.yaml
  text: May the Lord grant him to find mercy from the Lord on that day—and you know better how much he served in Ephesus.
translation:
  language: ko
  text: 주께서 그 날[a]에 그가 주께로부터 자비를 얻게 해 주시기를 빕니다. 그가 에베소에서 얼마나 섬겼는지는 그대가 더 잘 알고 있습니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 「그 날」은 신약에서 하나님의 최종 심판과 신원의 날을 가리키는 정형 표현이다.
    reason: lexical_alternative
lexical_decisions:
- source_word: δῴη αὐτῷ ὁ κύριος εὑρεῖν ἔλεος
  english_pob_choice: May the Lord grant him to find mercy
  chosen_korean: 주께서 그가 자비를 얻게 해 주시기를 빕니다
  alternatives_korean:
  - 주께서 그에게 자비를 얻도록 허락하시기를 빕니다
  - 주께서 그가 긍휼을 얻게 하시기를 원합니다
  lexicon: BDAG
  rationale: δῴη + εὑρεῖν의 「자비를 얻도록 허락하소서」를 한국어 자연스러운 사역 구문 「얻게 해 주시기를 빕니다」로 옮긴다.
- source_word: παρὰ κυρίου
  english_pob_choice: from the Lord
  chosen_korean: 주께로부터
  alternatives_korean:
  - 주께
  - 주에게서
  lexicon: BDAG
  rationale: παρά + 속격은 원천을 가리킨다. 본 절에서 첫 「주」(κύριος, 그리스도)와 둘째 「주」(κύριος, 아버지 하나님)가 같은 단어이나 다른 인격을 가리킬 수 있는 가능성이 학자들 사이에 논의된다. 한국어 「주」로 통일하되, 두 번째는 「주께로부터」로 출처를 표시한다.
- source_word: βέλτιον σὺ γινώσκεις
  english_pob_choice: you know better
  chosen_korean: 그대가 더 잘 알고 있습니다
  alternatives_korean:
  - 그대가 더 잘 압니다
  lexicon: BDAG
  rationale: 비교급 βέλτιον의 「더 잘」을 자연스러운 한국어 어순으로 옮긴다.
