  text: לָ/כֵ֗ן כֹּ֤ה אָמַר֙ אֲדֹנָ֣/י יְהוִ֔ה יַ֚עַן שָׁכַ֣חַתְּ אוֹתִ֔/י וַ/תַּשְׁלִ֥יכִי אוֹתִ֖/י אַחֲרֵ֣י גַוֵּ֑/ךְ וְ/גַם אַ֛תְּ שְׂאִ֥י זִמָּתֵ֖/ךְ וְ/אֶת תַּזְנוּתָֽיִ/ךְ־־׃ס
