theological_decisions:
- issue: Subject of the singular verbs in the first cola
  chosen_reading: Retained the singular pronoun 'he' without identifying the referent in the verse itself.
  alternative_readings:
  - the LORD
  - the Messianic ruler
  - Zion/Jerusalem personified
  rationale: The immediate literary context points back to the exalted Zion setting and, in 4:1–2, to the LORD's instruction/judgment mediated from Zion. Because the verse itself uses an unexpressed singular subject, the translation preserves the pronoun rather than importing a more explicit theological identification not stated in this line.
  doctrine_reference: Preserve theological tension rather than resolve it.
