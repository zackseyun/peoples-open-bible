translation:
  language: es
  text: Que juzgue a los pobres del pueblo[a], salve a los hijos del necesitado y aplaste al opresor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Él juzgará a los pobres del pueblo, salvará a los hijos del necesitado y aplastará al opresor». Los imperfectos hebreos pueden leerse como futuro o como oración/deseo en este contexto.'
    reason: alternative_reading
lexical_decisions:
- source_word: יִשְׁפֹּט
  english_pob_choice: may he judge
  chosen_spanish: Que juzgue
  alternatives_spanish:
  - Él juzgará
  - Que vindique
  lexicon: HALOT
  rationale: 'El imperfecto qal de שׁפט admite valor futuro o volitivo. En este salmo de petición por el rey, el matiz deseativo se conserva mejor en español con una forma exhortativa/jusiva: «Que juzgue». Mantiene el sentido judicial sin estrecharlo a «vindique», que sería más específico de lo que el verbo exige.'
- source_word: עֲנִיֵּי עָם
  english_pob_choice: the poor of the people
  chosen_spanish: los pobres del pueblo
  alternatives_spanish:
  - los afligidos del pueblo
  - los humildes entre el pueblo
  lexicon: HALOT
  rationale: עֲנִיִּים puede abarcar pobres, afligidos u oprimidos. En paralelo con «los hijos del necesitado», el rasgo socioeconómico domina. «Del pueblo» conserva la relación constructa y suena natural en español.
- source_word: יוֹשִׁיעַ
  english_pob_choice: save
  chosen_spanish: salve
  alternatives_spanish:
  - libre
  - rescate
  lexicon: HALOT
  rationale: El hifil de ישׁע significa salvar o librar. «Salve» permite mantener en español el tono volitivo paralelo a «Que juzgue», sin perder la idea fuerte de rescate.
- source_word: לִבְנֵי אֶבְיוֹן
  english_pob_choice: the children of the needy
  chosen_spanish: a los hijos del necesitado
  alternatives_spanish:
  - a los hijos del pobre
  - a los hijos de los necesitados
  lexicon: HALOT
  rationale: בני puede ser literal «hijos» y en colectivo incluye descendencia sin restringirse a varones. אֶבְיוֹן designa al necesitado/pobre; aquí «del necesitado» conserva el singular colectivo del hebreo y el contraste con «pobres» del hemistiquio anterior.
- source_word: וִידַכֵּא
  english_pob_choice: and crush
  chosen_spanish: y aplaste
  alternatives_spanish:
  - y quebrante
  - y quebrará
  lexicon: HALOT
  rationale: דכא expresa aplastar o quebrar con fuerza. «Aplaste» preserva la imagen vigorosa de juicio contra el explotador y encaja con la lectura peticionaria del verso.
- source_word: עוֹשֵׁק
  english_pob_choice: the oppressor
  chosen_spanish: al opresor
  alternatives_spanish:
  - al extorsionador
  - al que oprime
  lexicon: HALOT
  rationale: El participio de עשׁק denota al que oprime o explota de manera habitual. «Opresor» es la forma natural y precisa en español para este agente.
theological_decisions:
- issue: Valor verbal del conjunto de imperfectos
  english_pob_reading: May he judge... save... crush...
  chosen_spanish_reading: Que juzgue... salve... aplaste...
  alternative_spanish_readings:
  - Él juzgará... salvará... aplastará...
  rationale: El contexto del Salmo 72 es una súplica/benedicción por el rey, por lo que conviene reflejar el matiz volitivo de los imperfectos hebreos. La forma exhortativa en español preserva la tensión entre promesa y petición sin forzar una profecía simple.
  doctrine_reference: Translation philosophy §3 (preservar la tensión en lugar de resolverla)
translation_notes:
  revision_awareness: La revisión más reciente indicó alto acuerdo y ningún cambio necesario; se mantiene la solución peticionaria con léxico cercano al hebreo y al audit trail en inglés.
  spanish_consistency_notes:
  - Se mantiene «pobres» para עֲנִיֵּי עָם y «necesitado» para אֶבְיוֹן, respetando la distinción semántica del paralelismo.
  - Se usa «opresor» para עוֹשֵׁק y no «siervo» u otra palabra eclesiástica, siguiendo la fuerza lexical del participio.
  - La nota explica la alternativa futura sin eliminar el matiz de oración que el POB inglés documentó.
