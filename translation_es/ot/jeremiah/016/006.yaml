translation:
  language: es
  text: Tanto los grandes como los pequeños morirán en esta tierra[a]. No serán sepultados, ni nadie hará duelo[b] por ellos, ni nadie se hará cortes, ni se rapará por ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Es decir, no se les dará sepultura ni se realizarán por ellos las prácticas acostumbradas de duelo, como hacerse cortes o raparse.
    reason: cultural_note
  - marker: b
    text: 'O: «ni se lamentará por ellos». El hebreo usa un verbo plural indefinido.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמֵתוּ
  english_pob_choice: will die
  chosen_spanish: morirán
  alternatives_spanish:
  - van a morir
  - perecerán
  lexicon: HALOT
  rationale: El verbo מות se traduce de manera directa y futurizada en el contexto profético. «Morirán» conserva la fuerza simple y no añade matices interpretativos.
- source_word: גְדֹלִים וּקְטַנִּים
  english_pob_choice: both great and small
  chosen_spanish: los grandes como los pequeños
  alternatives_spanish:
  - grandes y pequeños
  - tanto los grandes como los pequeños
  lexicon: HALOT
  rationale: La pareja funciona como merismo para abarcar a todos los rangos sociales o edades. En español, «los grandes como los pequeños» suena natural y mantiene el alcance inclusivo.
- source_word: בָּאָרֶץ הַזֹּאת
  english_pob_choice: in this land
  chosen_spanish: en esta tierra
  alternatives_spanish:
  - en este país
  - en esta tierra misma
  lexicon: HALOT
  rationale: «Tierra» conserva mejor el valor bíblico de אֶרֶץ en Jeremías que «país», y mantiene la resonancia geográfica y pactal del texto.
- source_word: לֹא יִקָּבֵרוּ
  english_pob_choice: will not be buried
  chosen_spanish: no serán sepultados
  alternatives_spanish:
  - no serán enterrados
  lexicon: HALOT
  rationale: El niphal de קבר expresa pasivamente la ausencia de sepultura. «Sepultados» es formal y bíblicamente adecuado en español.
- source_word: וְלֹא יִסְפְּדוּ לָהֶם
  english_pob_choice: and no one will mourn for them
  chosen_spanish: ni nadie hará duelo por ellos
  alternatives_spanish:
  - ni los lamentarán
  - ni harán lamentación por ellos
  lexicon: HALOT
  rationale: El hebreo usa un verbo en plural indefinido; en español, «nadie hará duelo» preserva la idea de ausencia de rito funerario sin forzar una traducción mecánica. «Hacer duelo» recoge el acto de lamentación pública.
- source_word: וְלֹא יִתְגֹּדַד
  english_pob_choice: or cut himself
  chosen_spanish: ni se haga cortes en el cuerpo
  alternatives_spanish:
  - ni se corte
  - ni se haga heridas
  lexicon: HALOT
  rationale: El hitgoded alude a laceraciones rituales de duelo. En español, una formulación reflexiva más explícita evita ambigüedad y conserva el carácter corporal y ritual de la práctica.
- source_word: וְלֹא יִקָּרֵחַ לָהֶם
  english_pob_choice: or make himself bald for them
  chosen_spanish: ni se rapará la cabeza por ellos
  alternatives_spanish:
  - ni se hará calvo por ellos
  - ni se quitará el cabello por ellos
  lexicon: HALOT
  rationale: La forma deriva de קרח y señala la práctica de raparse o despojarse del cabello como luto. «Rapará la cabeza» es claro en español y comunica la costumbre funeraria.
theological_decisions:
- issue: Conservar las prácticas funerarias concretas como señal de juicio, no generalizarlas a simple tristeza
  english_pob_reading: The verse lists concrete absent mourning practices such as self-laceration and shaving the head bald.
  chosen_spanish_reading: El versículo nombra actos concretos de luto —cortes en el cuerpo y rapado de la cabeza— que no se realizarán por los muertos.
  alternative_spanish_readings:
  - No habrá ritos de duelo
  - No se expresará el dolor por ellos
  rationale: La lista hebrea no describe solo emoción interna, sino signos externos y corporales de duelo. Mantenerlos en español evita suavizar el juicio y respeta la densidad cultural del texto.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Reflejar el sujeto indefinido del verbo de duelo sin perder naturalidad en español
  english_pob_reading: The Hebrew uses an indefinite plural verb.
  chosen_spanish_reading: «Nadie hará duelo por ellos» expresa adecuadamente el sujeto indefinido.
  alternative_spanish_readings:
  - «No los llorarán»
  - «No harán duelo por ellos»
  rationale: El hebreo no exige un sujeto específico; el castellano puede expresar esa indefinición con «nadie». Así se preserva el matiz sin perder fluidez.
  doctrine_reference: HALOT; translation note on indefinite plural
- issue: Mantener la referencia territorial de אֶרֶץ sin atenuarla
  english_pob_reading: in this land
  chosen_spanish_reading: en esta tierra
  alternative_spanish_readings:
  - en este país
  rationale: «Tierra» comunica mejor el trasfondo teológico y geográfico de Jeremías y evita modernizar innecesariamente el término.
  doctrine_reference: Jeremiah covenant geography
translation_notes:
  revision_awareness: La redacción sigue de cerca la última revisión inglesa, que prefirió «make himself bald» para reflejar más directamente el verbo hebreo de hacerse calvo en señal de duelo. En español se trasladó esa decisión con «se rapará la cabeza», una forma natural y fiel que conserva el carácter ritual de la acción. También se mantuvo la estructura acumulativa del versículo y la ausencia de suavización del lenguaje corporal.
  spanish_consistency_notes:
  - Se usó «Yahvé» no corresponde en este versículo porque no aparece el Tetragrámaton.
  - Se prefirió «tierra» para אֶרֶץ en coherencia con el uso bíblico de Jeremías.
  - «Hacer duelo» se emplea para ספד con valor de lamentación funeraria pública.
  - La cláusula final se formuló como acto de raparse la cabeza, para reflejar la costumbre de duelo sin añadir paráfrasis teológica.
