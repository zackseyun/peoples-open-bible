translation:
  language: es
  text: Entonces envió allí caballos, carros y un gran ejército; vinieron de noche y cercaron la ciudad.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיִּשְׁלַח
  english_pob_choice: he sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - despachó
  lexicon: HALOT
  rationale: El wayyiqtol narra una acción secuencial. «Envió» expresa el sentido básico de שׁלח con naturalidad en español y mantiene el tono narrativo.
- source_word: שָׁמָּה
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - allá
  - a ese lugar
  lexicon: HALOT
  rationale: Es un adverbio direccional que remite al lugar indicado por el contexto inmediato. «Allí» es breve y idiomático.
- source_word: סוּסִים
  english_pob_choice: horses
  chosen_spanish: caballos
  alternatives_spanish:
  - jinetes
  - caballería
  lexicon: HALOT
  rationale: El hebreo dice literalmente «caballos». Aunque el contexto es militar, la referencia concreta a los animales se conserva mejor así que con «caballería» o «jinetes».
- source_word: וְרֶכֶב
  english_pob_choice: and chariots
  chosen_spanish: carros
  alternatives_spanish:
  - carros de guerra
  - carros y carros de combate
  lexicon: HALOT
  rationale: רֶכֶב puede referirse a carros o fuerza de carros. «Carros» conserva la imagen concreta y concuerda con el uso bíblico militar sin sobreespecificar.
- source_word: וְחַיִל כָּבֵד
  english_pob_choice: and a great army
  chosen_spanish: y un gran ejército
  alternatives_spanish:
  - y una gran fuerza
  - y una fuerza pesada
  lexicon: HALOT
  rationale: חַיִל en contexto militar denota tropa/ejército, y כָּבֵד literalmente es «pesado» pero idiomáticamente intensifica la magnitud. «Gran ejército» comunica ese valor idiomático de forma clara en español.
- source_word: וַיָּבֹאוּ לַיְלָה
  english_pob_choice: they came by night
  chosen_spanish: vinieron de noche
  alternatives_spanish:
  - llegaron de noche
  - vinieron en la noche
  lexicon: HALOT
  rationale: La frase indica llegada nocturna; «de noche» es natural en español y conserva la idea de sigilo implícita en el contexto.
- source_word: וַיַּקִּפוּ עַל הָעִיר
  english_pob_choice: surrounded the city
  chosen_spanish: cercaron la ciudad
  alternatives_spanish:
  - rodearon la ciudad
  - la sitiaron
  lexicon: HALOT
  rationale: El verbo expresa rodear/ceñir alrededor. «Cercaron» conserva la imagen militar de un cerco y evita convertirlo en una interpretación demasiado técnica como «sitiaron».
translation_notes:
  revision_awareness: 'La redacción sigue de cerca la lectura final inglesa («great army») y mantiene la imaginería militar concreta del hebreo: caballos, carros y un gran ejército, con llegada nocturna y cerco de la ciudad. No se añadió nota de variante porque el español «gran ejército» ya refleja adecuadamente el valor idiomático de חַיִל כָּבֵד.'
  spanish_consistency_notes:
  - Se usó «Yahvé» como forma predeterminada del nombre divino cuando corresponda en este proyecto, pero este versículo no contiene el tetragrámaton.
  - 'Se prefirieron términos militares concretos y de registro bíblico comprensible: caballos, carros, ejército, cercaron.'
  - Se evitó «SEÑOR» y se mantuvo una sintaxis española fluida sin perder la secuencia narrativa del hebreo.
