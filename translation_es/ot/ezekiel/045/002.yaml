    text: O «santuario». El hebreo קֹדֶשׁ aquí puede designar el área sagrada de manera más general, no solo el edificio del santuario.
    reason: lexical_alternative
  - marker: b
    text: O «terreno de pasto» o «terreno común» para el área abierta que rodea el lugar (מִגְרָשׁ).
    reason: lexical_alternative
  revision_rationale: Se conserva el contenido del borrador porque es fiel al hebreo y al expediente inglés, pero se corrige el anclaje de la nota [b] para que explique el sustantivo מִגְרָשׁ («terreno libre») en vez de la expresión adverbial «todo alrededor». También se ordena la nota [a] junto a «lugar santo», que es donde introduce su alternativa léxica directa.
