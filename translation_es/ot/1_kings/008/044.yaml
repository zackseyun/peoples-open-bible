translation:
  language: es
  text: Cuando tu pueblo salga a la guerra contra su enemigo, por el camino que tú los envíes, y oren a Yahvé hacia la ciudad[a] que tú has escogido y hacia la casa que he edificado para tu nombre[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «de cara a la ciudad». El hebreo dice literalmente «el camino/la dirección de la ciudad», expresando orientación en la oración.'
    reason: lexical_alternative
  - marker: b
    text: Es decir, el templo; el hebreo dice «la casa».
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: When
  chosen_spanish: Cuando
  alternatives_spanish:
  - Si
  - Porque
  lexicon: HALOT
  rationale: En este contexto de plegaria condicional, כִּי introduce una circunstancia futura, por lo que 'Cuando' transmite mejor el giro que 'Porque' y mantiene el flujo de la petición.
- source_word: יֵצֵא
  english_pob_choice: go out
  chosen_spanish: salga
  alternatives_spanish:
  - salga a
  - marche
  - salga en campaña
  lexicon: HALOT
  rationale: El verbo hebreo es literalmente 'salir'; en español, 'salga' conserva esa imagen y funciona de manera natural en un contexto militar.
- source_word: עַמְּךָ
  english_pob_choice: your people
  chosen_spanish: tu pueblo
  alternatives_spanish:
  - tu gente
  - tu pueblo de
  lexicon: HALOT
  rationale: '''Pueblo'' reproduce el sustantivo colectivo del hebreo y la relación de pertenencia pactal expresada por el sufijo de segunda persona.'
- source_word: לַמִּלְחָמָה
  english_pob_choice: to battle
  chosen_spanish: a la guerra
  alternatives_spanish:
  - a la batalla
  - para la guerra
  lexicon: HALOT
  rationale: מִלְחָמָה puede referirse a guerra o batalla; aquí 'a la guerra' es natural en español y conserva la amplitud del término.
- source_word: עַל אֹיְבֹו
  english_pob_choice: against their enemy
  chosen_spanish: contra su enemigo
  alternatives_spanish:
  - contra el enemigo
  - contra sus enemigos
  lexicon: HALOT
  rationale: El hebreo lleva sufijo singular; en español se mantiene singular ('su enemigo') sin forzar el colectivo, y 'contra' expresa bien la oposición militar.
- source_word: בַּדֶּרֶךְ אֲשֶׁר תִּשְׁלָחֵם
  english_pob_choice: by the way you send them
  chosen_spanish: por el camino que tú los envíes
  alternatives_spanish:
  - en el camino que tú los envíes
  - por la ruta que tú los mandes
  - mirando hacia la ciudad
  lexicon: HALOT
  rationale: דֶּרֶךְ significa literalmente 'camino'; 'por el camino que tú los envíes' preserva la metáfora y la idea de comisión divina. Se evita 'ruta' por su tono más moderno y 'mandes' por menos precisión sobre envío.
- source_word: וְהִתְפַּלְלוּ אֶל יְהוָה
  english_pob_choice: and they pray to Yahweh
  chosen_spanish: y oren a Yahvé
  alternatives_spanish:
  - y rueguen a Yahvé
  - y oren a Yahweh
  lexicon: HALOT
  rationale: El verbo reflexivo indica oración dirigida a Dios; 'oren' es la forma natural y reverente. Se usa 'Yahvé' conforme al criterio del proyecto para יהוה.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue la convención española del proyecto: transliterar el Nombre divino como ''Yahvé'', preservando el nombre personal de Dios en lugar de sustituirlo por un título.'
- source_word: דֶּרֶךְ הָעִיר
  english_pob_choice: toward the city
  chosen_spanish: mirando hacia la ciudad
  alternatives_spanish:
  - hacia la ciudad
  - en dirección a la ciudad
  - de cara a la ciudad
  lexicon: HALOT
  rationale: La secuencia hebrea expresa orientación espacial en la oración. 'Mirando hacia' comunica esa dirección de manera clara en español y preserva la idea de orientación hacia el lugar escogido.
- source_word: הָעִיר אֲשֶׁר בָּחַרְתָּ בָּהּ
  english_pob_choice: the city that you have chosen
  chosen_spanish: la ciudad que tú has escogido
  alternatives_spanish:
  - la ciudad que has elegido
  - la ciudad que tú elegiste
  lexicon: HALOT
  rationale: בָּחַרְתָּ indica una acción ya realizada con relevancia presente; 'has escogido' suena natural y fiel, y 'escogido' conserva el registro bíblico sin sonar arcaico.
- source_word: וְהַבַּיִת
  english_pob_choice: and the house
  chosen_spanish: y hacia la casa
  alternatives_spanish:
  - y la casa
  - y el templo
  lexicon: HALOT
  rationale: Aunque el referente es el templo, el hebreo dice literalmente 'la casa'. Se conserva 'casa' para respetar la dicción del texto y, por contexto, la referencia al templo permanece transparente.
- source_word: אֲשֶׁר בָּנִתִי לִשְׁמֶךָ
  english_pob_choice: that I have built for your name
  chosen_spanish: que he edificado para tu nombre
  alternatives_spanish:
  - que he construido para tu nombre
  - que he levantado para tu nombre
  lexicon: HALOT
  rationale: '''Edificado'' mantiene el tono solemne y el valor arquitectónico de בָּנִתִי. ''Para tu nombre'' conserva la expresión bíblica que vincula el templo con la presencia y reputación de Dios.'
theological_decisions:
- issue: Tratamiento del Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El texto hebreo usa explícitamente el Tetragrámaton. Se traduce como 'Yahvé' según la convención del proyecto, manteniendo el Nombre propio en español y evitando la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido direccional de דֶּרֶךְ הָעִיר
  english_pob_reading: toward the city
  chosen_spanish_reading: mirando hacia la ciudad
  alternative_spanish_readings:
  - hacia la ciudad
  - en dirección a la ciudad
  - frente a la ciudad
  rationale: La frase hebrea no solo indica ubicación, sino orientación en la oración. 'Mirando hacia' mantiene esa intención devocional sin añadir contenido ajeno.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
- issue: Referencia de הַבַּיִת
  english_pob_reading: the house
  chosen_spanish_reading: la casa
  alternative_spanish_readings:
  - el templo
  rationale: Aunque el referente contextual es el templo, el hebreo emplea 'casa'. Se conserva el término literal para no borrar la metáfora canónica 'casa para tu nombre'.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
translation_notes:
  revision_awareness: El borrador sigue de cerca el paquete fuente hebreo y el registro de auditoría en inglés. Se conserva la tensión lexical de דֶּרֶךְ (camino/orientación) y el literal «casa» para הַבַּיִת, mientras se adapta la sintaxis al español sin mecanicismo. No se detectaron revisiones aplicadas en el registro inglés; el texto español refleja ese estado estable.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente con la terminología del proyecto para יהוה.
  - Se mantiene «casa» en lugar de «templo» en el texto principal, con nota explicativa para no perder la dicción hebrea.
  - Se emplea un verbo de oración en subjuntivo narrativo ('oren') adecuado al contexto de petición.
  - La frase direccional se traduce con una imagen comprensible en español sin eliminar la posibilidad alternativa preservada en nota.
