  to: Así que me levanté de noche, yo, con unos pocos hombres conmigo, y no había dicho a nadie[a] lo que mi Dios estaba poniendo en mi corazón[b] para hacer por Jerusalén. Y no había animal[c] conmigo, sino el animal sobre el que yo cabalgaba.
