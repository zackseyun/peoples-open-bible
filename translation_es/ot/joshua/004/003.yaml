translation:
  language: es
  text: 'y ordénales, diciendo: «Tomen para ustedes de aquí, de en medio del Jordán, del lugar donde los pies de los sacerdotes estaban firmemente plantados[a], doce piedras, y pásenlas con ustedes y colóquenlas en el lugar de alojamiento[b] donde pasarán la noche».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «del sitio donde los pies de los sacerdotes estaban plantados firmemente».'
    reason: lexical_alternative
  - marker: b
    text: «Lugar de alojamiento» se refiere al sitio donde Israel pasaría la noche después del cruce, no necesariamente a un asentamiento permanente.
    reason: cultural_note
lexical_decisions:
- source_word: וְצַוּוּ
  english_pob_choice: and command
  chosen_spanish: y mándales
  alternatives_spanish:
  - y ordénales
  - y dales la orden
  lexicon: HALOT
  rationale: El verbo tiene fuerza de mandato directo. En español, “mándales” conserva la autoridad sin sonar excesivamente burocrático; evita debilitar el imperativo con “instruyan”. El contexto muestra que Joshua debe transmitir una orden precisa.
- source_word: שְׂאוּ
  english_pob_choice: Take up
  chosen_spanish: Tomen
  alternatives_spanish:
  - Levanten
  - Tomen consigo
  lexicon: HALOT
  rationale: Aquí el sentido es tomar o alzar piedras desde el lecho del río. “Tomen” es natural en español y mantiene la acción de recoger; “levanten” sería más físico pero menos idiomático como primer paso de la secuencia.
- source_word: לָכֶם
  english_pob_choice: for yourselves
  chosen_spanish: para ustedes
  alternatives_spanish:
  - para sí mismos
  - para ustedes mismos
  lexicon: HALOT
  rationale: La partícula añade implicación personal sin exigir posesión privada. “Para ustedes” transmite bien la orientación del mandato en español sin sobrecargarlo.
- source_word: מִזֶּה מִתּוֹךְ הַיַּרְדֵּן
  english_pob_choice: from here, from the midst of the Jordan
  chosen_spanish: de aquí, de en medio del Jordán
  alternatives_spanish:
  - de este lugar, de en medio del Jordán
  - de aquí, del centro del Jordán
  lexicon: HALOT
  rationale: 'Se conserva la doble localización del hebreo: “de aquí” y “de en medio del Jordán”. Esto refleja que las piedras debían tomarse precisamente del sitio actual de paso, no de una referencia genérica.'
- source_word: מִמַּצַּב רַגְלֵי הַכֹּהֲנִים
  english_pob_choice: from the place where the priests’ feet stood firm
  chosen_spanish: del lugar donde los pies de los sacerdotes estuvieron firmes
  alternatives_spanish:
  - del lugar donde se afirmaron los pies de los sacerdotes
  - del puesto donde los pies de los sacerdotes quedaron firmes
  lexicon: HALOT
  rationale: מַצָּב tiene la idea de puesto o estación, y הָכִין añade firmeza/establecimiento. “Estuvieron firmes” comunica bien la estabilidad de los pies en el lecho del Jordán y conserva la relación entre el lugar y la postura de los sacerdotes.
- source_word: הָכִין
  english_pob_choice: stood firm
  chosen_spanish: estuvieron firmes
  alternatives_spanish:
  - quedaron firmes
  - estuvieron establecidos
  lexicon: HALOT
  rationale: La forma hiphil funciona con matiz de firmeza establecida. En español, “estuvieron firmes” expresa la estabilidad requerida sin volverlo demasiado técnico o artificial.
- source_word: שְׁתֵּים עֶשְׂרֵה אֲבָנִים
  english_pob_choice: twelve stones
  chosen_spanish: doce piedras
  alternatives_spanish:
  - doce piedras de memorial
  - doce piedras
  lexicon: HALOT
  rationale: Se mantiene el sintagma simple del hebreo. “Piedras” es el término natural en español; no se añade “de memorial” porque esa función se desarrolla en el contexto inmediato, no en esta cláusula.
- source_word: וְהַעֲבַרְתֶּם
  english_pob_choice: and carry them over
  chosen_spanish: y pásenlas con ustedes
  alternatives_spanish:
  - y llévenlas consigo
  - y háganlas pasar con ustedes
  lexicon: HALOT
  rationale: El verbo causativo de עבר comunica hacer pasar algo al otro lado. “Pásenlas con ustedes” preserva la idea de traslado junto con el grupo, mientras suena natural en español.
- source_word: עִמָּכֶם
  english_pob_choice: with you
  chosen_spanish: con ustedes
  alternatives_spanish:
  - con vosotros
  - junto con ustedes
  lexicon: HALOT
  rationale: Simple acompañamiento; “con ustedes” es la forma neutra y fluida en español de América Latina.
- source_word: וְהִנַּחְתֶּם
  english_pob_choice: and set them down
  chosen_spanish: y colóquenlas
  alternatives_spanish:
  - y deposítenlas
  - y pónganlas
  lexicon: HALOT
  rationale: El verbo expresa depositar/colocar. “Colóquenlas” conserva el acto de poner las piedras en su sitio sin el registro pesado de “depositenlas”.
- source_word: בַּמָּלון
  english_pob_choice: at the lodging place
  chosen_spanish: en el lugar de alojamiento
  alternatives_spanish:
  - en la posada
  - en el campamento
  - en el lugar donde se alojarán
  lexicon: HALOT
  rationale: מָלוֹן es un sitio de pernocta, no necesariamente una posada fija. “Lugar de alojamiento” mantiene la precisión y evita identificarlo indebidamente con una posada comercial o con un campamento militar.
- source_word: אֲשֶׁר תָּלִינוּ בּוֹ הַלָּיְלָה
  english_pob_choice: where you will spend the night
  chosen_spanish: donde pasarán la noche
  alternatives_spanish:
  - donde se alojarán esa noche
  - en el cual pasarán la noche
  lexicon: HALOT
  rationale: El hebreo explica el alojamiento como el lugar en que dormirán esa noche. “Pasar la noche” es una forma natural y precisa en español, manteniendo el sentido temporal sin añadir elementos.
translation_notes:
  revision_awareness: El texto español sigue el sentido del hebreo y el rastro de auditoría en inglés, manteniendo la secuencia imperativa, la doble localización (“de aquí, de en medio del Jordán”) y el matiz de pernocta de מָלוֹן sin convertirlo en “campamento” o “posada” fija. No se detectaron revisiones aplicadas en el expediente inglés; se conserva el acuerdo alto del control cruzado.
  spanish_consistency_notes:
  - Se usa “Jordán” como nombre propio del río y “pies de los sacerdotes” para reflejar la imagen concreta del hebreo.
  - Se mantiene el imperativo plural con tratamiento de ustedes, coherente con el público meta y con el mandato dirigido al grupo.
  - No se traduce por “SEÑOR” ni hay términos divinos en este versículo; no aplica decisión teológica sobre el Nombre.
  - “Piedras” y no “rocas” sigue de cerca אֲבָנִים y su función memorial posterior en el contexto inmediato.
