review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido básico del hebreo: Cam, identificado como padre de Canaán, vio la desnudez de su padre y se lo dijo a sus dos hermanos fuera. También preserva correctamente la tensión interpretativa de עֶרְוַת אָבִיו mediante una nota.'
  spanish_quality_summary: La redacción es clara y natural, pero «se lo contó» introduce en español un objeto pronominal algo ambiguo y menos ceñido al hebreo, que solo dice «contó/told». Además, «afuera» es entendible, pero «fuera» encaja mejor con el registro moderno-digno y con el contraste espacial del relato. Conviene también alinear el texto principal con la nota, que presenta «la desnudez de su padre» como la forma más literal.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. El nombre «Cam» es aceptable por convención bíblica española. La decisión de mantener «la desnudez de su padre» respeta la racionalidad léxica y teológica documentada.
  issues:
  - severity: medium
    issue: «se lo contó» añade un pronombre objeto no explícito en el hebreo
    rationale: וַיַּגֵּד לִשְׁנֵי אֶחָיו significa simplemente «y contó/dijo a sus dos hermanos». En español, «se lo contó» sugiere un «lo» resumido e introduce una formulación un poco más interpretativa que «se lo dijo» o «lo contó», cuando el inglés auditado prefirió la sencillez de «told».
  - severity: low
    issue: «afuera» puede rebajarse ligeramente de registro
    rationale: Aunque correcto, «fuera» suena algo más sobrio y literario en este contexto bíblico, sin perder naturalidad panhispánica.
  - severity: low
    issue: Falta el artículo en «padre de Canaán»
    rationale: «Cam, el padre de Canaán» reproduce con más naturalidad en español la aposición definida del hebreo y del inglés auditado.
  revised_spanish_text: Y Cam[a], el padre de Canaán, vio la desnudez de su padre y se lo dijo a sus dos hermanos fuera.
  revised_footnotes:
  - marker: a
    text: O, más literalmente, «la desnudez de su padre». En algunos contextos del Antiguo Testamento, esta expresión puede funcionar como eufemismo sexual; aquí la traducción conserva la redacción literal y deja abierta esa cuestión interpretativa.
    reason: lexical_alternative
  revision_rationale: 'Se hacen ajustes menores para ceñirse mejor al hebreo y al rastro de auditoría en inglés: se añade «el» en la aposición, se sustituye «se lo contó» por «se lo dijo» para evitar una expansión más interpretativa, y se cambia «afuera» por «fuera» para un registro más digno y bíblicamente fluido. La nota se mantiene porque preserva correctamente la alternativa literal y la tensión interpretativa.'
