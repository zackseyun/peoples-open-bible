translation:
  language: es
  text: 'Y Moisés les mandó, diciendo: «Al final de cada período de siete años[a], en el tiempo señalado del año de liberación[b], en la fiesta de las Cabañas[c],»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «al cabo de siete años». El hebreo puede leerse de manera más formal, pero el contexto del ciclo sabático recurrente favorece «cada período de siete años».'
    reason: lexical_alternative
  - marker: b
    text: «Año de liberación» traduce el término hebreo del séptimo año de remisión; tradicionalmente, «año sabático».
    reason: lexical_alternative
  - marker: c
    text: Tradicionalmente, «Fiesta de los Tabernáculos».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְצַו
  english_pob_choice: commanded
  chosen_spanish: ordenó
  alternatives_spanish:
  - mandó
  - dio orden
  lexicon: HALOT
  rationale: צוה expresa una orden directa; ‘ordenó’ conserva la fuerza imperativa en español moderno y digno. ‘Mandó’ también es posible, pero puede sonar más coloquial o más duro según el contexto.
- source_word: אוֹתָם
  english_pob_choice: them
  chosen_spanish: les
  alternatives_spanish:
  - los
  - a ellos
  lexicon: Hebrew grammar
  rationale: El objeto directo plural masculino se refiere al grupo mencionado por el contexto. En español, ‘les’ funciona bien con el dativo de interés/objeto verbal en una construcción natural con ‘ordenó’.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - así
  lexicon: Hebrew grammar
  rationale: Es la fórmula quotativa estándar; ‘diciendo’ reproduce el enlace introductorio sin añadir contenido.
- source_word: מִקֵּץ שֶׁבַע שָׁנִים
  english_pob_choice: at the end of every seven years
  chosen_spanish: Al final de cada siete años
  alternatives_spanish:
  - Al cabo de siete años
  - Al término de cada siete años
  lexicon: HALOT
  rationale: El hebreo admite una lectura de ciclo recurrente. ‘Cada siete años’ sigue la decisión auditada en inglés y expresa mejor la recurrencia legal que una simple referencia a un solo lapso.
- source_word: בְּמוֹעֵד
  english_pob_choice: at the appointed time
  chosen_spanish: en el tiempo señalado
  alternatives_spanish:
  - en la fecha señalada
  - en el tiempo appointed
  lexicon: HALOT
  rationale: מוֹעֵד es un tiempo fijado o señalado. ‘Tiempo señalado’ mantiene el valor de cita/ocasión establecida sin forzar una terminología litúrgica.
- source_word: שְׁנַת הַשְּׁמִטָּה
  english_pob_choice: the year of release
  chosen_spanish: del año de liberación
  alternatives_spanish:
  - del año de remisión
  - del año sabático
  lexicon: HALOT
  rationale: שמיטה alude a la liberación/remisión del séptimo año. ‘Liberación’ conserva el núcleo semántico de release. Se evita ‘sabático’ porque es más tradicional que lexical, aunque puede usarse como alternativa interpretativa.
- source_word: בְּחַג הַסֻּכּוֹת
  english_pob_choice: at the Feast of Booths
  chosen_spanish: en la fiesta de las Cabañas
  alternatives_spanish:
  - en la Fiesta de los Tabernáculos
  - en la fiesta de las tiendas
  lexicon: HALOT
  rationale: סֻכּוֹת significa literalmente ‘cabañas/booths’. ‘Cabañas’ preserva la imagen hebrea con naturalidad en español. ‘Tabernáculos’ es tradicional, pero menos transparente; se deja como alternativa.
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente al reflejar la relación constructa de «año de liberación» y mantiene la lectura cíclica de «cada siete años», junto con la decisión de traducir el festivo como «Booths»/«Cabañas» de forma transparente.
  spanish_consistency_notes:
  - Se mantiene «Moisés» con acento español estándar.
  - Se usa «Yahvé» solo cuando el texto fuente lo requiera; aquí no aparece.
  - La frase final queda en suspensión con coma, siguiendo el corte del versículo en el paquete fuente.
  - Se conserva la literalidad controlada de los nombres festivos para apoyar la transparencia del POB.
