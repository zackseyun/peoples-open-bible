translation:
  language: es
  text: Todo lo que es de la tierra vuelve a la tierra[a], y lo que viene de lo alto vuelve a lo alto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego dice: «y de las aguas vuelve al mar».'
    reason: alternative_reading
lexical_decisions:
- source_word: כל
  english_pob_choice: Everything
  chosen_spanish: Todo lo que
  alternatives_spanish:
  - Todo
  - Todas las cosas
  - Todo ser
  lexicon: HALOT
  rationale: El hebreo es inclusivo y no se limita a personas. «Todo lo que» conserva el alcance general y suena natural en español, sin restringir indebidamente el referente.
- source_word: מארץ אל ארץ
  english_pob_choice: from the earth returns to the earth
  chosen_spanish: de la tierra vuelve a la tierra
  alternatives_spanish:
  - de la tierra regresa a la tierra
  - de la tierra vuelve al polvo
  - de la tierra retorna a la tierra
  lexicon: HALOT
  rationale: La expresión marca origen y destino en un movimiento de retorno. «Vuelve» reproduce el valor de שוב con claridad idiomática en español, y «tierra» preserva el paralelismo léxico del hebreo.
- source_word: ישוב
  english_pob_choice: returns
  chosen_spanish: vuelve
  alternatives_spanish:
  - retorna
  - regresa
  - se vuelve
  lexicon: HALOT
  rationale: שוב comunica la idea de volver/retornar. En español, «vuelve» es breve, natural y mantiene el sentido de retorno cíclico sin añadir matices innecesarios.
- source_word: ואשר
  english_pob_choice: and what
  chosen_spanish: y lo que
  alternatives_spanish:
  - y quien
  - y aquello que
  - y lo cual
  lexicon: HALOT
  rationale: La partícula relativa funciona aquí de manera no personal y amplia. «Lo que» conserva la amplitud cósmica del verso y evita reducirlo a personas.
- source_word: ממרום אל מרום
  english_pob_choice: from above to what is above
  chosen_spanish: de lo alto, a lo que es de lo alto
  alternatives_spanish:
  - del alto al alto
  - del cielo al cielo
  - de lo elevado a lo elevado
  lexicon: HALOT
  rationale: מרום nombra altura/exaltación/lo alto. Se evita fijar «cielo» porque el hebreo es más elíptico y la tradición hebrea primaría en este pasaje conserva una formulación vertical pero sobria. La repetición se mantiene para respetar la tensión semántica del original.
theological_decisions:
- issue: Divergencia entre el hebreo conservado y el paralelo griego en la segunda cola
  english_pob_reading: 'Translate the Hebrew second colon as primary: ''and what is from above to what is above.'' Greek reads, ''and from the waters it returns to the sea.'''
  chosen_spanish_reading: 'Traducir como texto principal el hebreo conservado: «y lo que es de lo alto, a lo que es de lo alto».'
  alternative_spanish_readings:
  - y desde las aguas vuelve al mar
  - y de las aguas regresa al mar
  rationale: La política del POB para Sirácides da prioridad al hebreo donde se conserva. El hebreo aquí es conciso y algo enigmático, pero debe mantenerse como lectura principal. La tradición griega se preserva en nota como variante significativa, no como texto base.
  doctrine_reference: 'PHILOSOPHY.md: traducir Sirach desde el hebreo donde sobrevive; usar el paralelo griego como testimonio alternativo real.'
translation_notes:
  revision_awareness: 'Sin cambios respecto al pase de revisión más reciente: el texto conserva la prioridad del hebreo y registra la variante griega en nota, en armonía con el estado de alta concordancia del expediente.'
  spanish_consistency_notes:
  - Se usa «tierra» en ambos miembros para reproducir el paralelismo hebreo, sin sustituirlo por «polvo», porque el texto fuente habla de tierra.
  - 'Se evita «SEÑOR» u otra máscara reverencial: no aparece el nombre divino en este versículo.'
  - Se mantiene una cadencia sobria y publicable, con repetición sintáctica equivalente al hebreo y sin ampliar el contenido más allá de la evidencia textual.
