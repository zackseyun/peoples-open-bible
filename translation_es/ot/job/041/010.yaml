translation:
  language: es
  text: Sus estornudos hacen brillar luz[a], y sus ojos son como los párpados del alba[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Sus estornudos destellan luz». El verbo hebreo es causativo («hacer que la luz brille»), y la frase es muy poética.'
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «los párpados del alba», imagen poética hebrea para la primera luz del día que se abre.
    reason: cultural_note
lexical_decisions:
- source_word: עֲטִישֹׁתָיו
  english_pob_choice: his sneezings
  chosen_spanish: sus estornudos
  alternatives_spanish:
  - sus estornudadas
  - sus resuellos
  lexicon: HALOT
  rationale: El sustantivo alude a estornudos; en español, «estornudos» es la forma directa y natural. «Sus estornudos» mantiene el plural del hebreo y evita introducir una imagen menos precisa.
- source_word: תָּהֶל
  english_pob_choice: flash forth
  chosen_spanish: despiden
  alternatives_spanish:
  - hacen brillar
  - irradian
  - destellan
  lexicon: HALOT
  rationale: 'El verbo es causativo: hace salir o brillar la luz. «Despiden» comunica bien el efecto visible en español y conserva el movimiento poético sin sobreexplicar.'
- source_word: א֑וֹר
  english_pob_choice: light
  chosen_spanish: luz
  alternatives_spanish:
  - claridad
  - brillo
  lexicon: HALOT
  rationale: «Luz» es la correspondencia más directa y transparente para אוֹר. Mantiene la imagen simple del texto.
- source_word: וְעֵינָיו
  english_pob_choice: and his eyes
  chosen_spanish: y sus ojos
  alternatives_spanish:
  - y sus ojos
  lexicon: HALOT
  rationale: Traducción directa del sintagma con sufijo de tercera persona masculina singular.
- source_word: כְּעַפְעַפֵּי
  english_pob_choice: like the eyelids of
  chosen_spanish: como los párpados del
  alternatives_spanish:
  - como los ojos del
  - como el abrir del
  lexicon: HALOT
  rationale: עפעפים nombra literalmente los párpados. Se conserva la imagen corporal del hebreo en vez de reemplazarla por una paráfrasis interpretativa.
- source_word: שָׁחַר
  english_pob_choice: dawn
  chosen_spanish: alba
  alternatives_spanish:
  - aurora
  - amanecer
  - dawn
  lexicon: HALOT
  rationale: «Alba» es natural y poético en español para שָׁחַר, y mantiene la referencia al primer resplandor del día.
translation_notes:
  revision_awareness: El texto sigue de cerca el paquete fuente hebreo y la decisión inglesa de preservar la imagen poética literal, especialmente en «párpados del alba», sin perder la naturalidad del español. No se detectaron revisiones aplicadas en el registro inglés más reciente.
  spanish_consistency_notes:
  - Se mantiene «alba» para שָׁחַר por claridad poética y consistencia con un registro bíblico moderno.
  - Se preserva la metáfora concreta de los «párpados» en lugar de interpretarla como «primeros rayos» o «claridad» en el cuerpo principal.
