translation:
  language: es
  text: Pone fin a las tinieblas, y explora todo límite, las piedras de la penumbra y de la profunda oscuridad[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más tradicionalmente: «la piedra de la oscuridad y la sombra de muerte».'
    reason: lexical_alternative
lexical_decisions:
- source_word: קֵץ
  english_pob_choice: an end
  chosen_spanish: pone término
  alternatives_spanish:
  - pone fin
  - establece un límite
  lexicon: HALOT
  rationale: קֵץ expresa el límite o fin de algo. «Pone término» conserva la idea concreta de fijar un fin y suena natural con שָׂם en español.
- source_word: שָׂם
  english_pob_choice: sets
  chosen_spanish: pone
  alternatives_spanish:
  - establece
  - fija
  lexicon: HALOT
  rationale: שָׂם es un verbo básico de poner/colocar. «Pone» mantiene la sencillez y la fuerza directa del hebreo.
- source_word: לַחֹשֶׁךְ
  english_pob_choice: to darkness
  chosen_spanish: a la oscuridad
  alternatives_spanish:
  - a las tinieblas
  - para la oscuridad
  lexicon: HALOT
  rationale: El ל introductorio marca el objeto indirecto de la acción. En español, «pone término a la oscuridad» reproduce bien esa relación sin sonar forzado.
- source_word: וּלְכָל תַּכְלִית
  english_pob_choice: to every limit
  chosen_spanish: hasta el último límite
  alternatives_spanish:
  - a todo límite
  - a cada límite
  lexicon: HALOT
  rationale: תַּכְלִית aquí apunta a límite/extremo. «Hasta el último límite» comunica la exhaustividad del verbo חקר en un español fluido y mantiene la intensificación del verso.
- source_word: הוּא חוֹקֵר
  english_pob_choice: he searches out
  chosen_spanish: rastrea
  alternatives_spanish:
  - explora
  - escudriña
  lexicon: HALOT
  rationale: חוֹקֵר implica buscar con minuciosidad. «Rastrea» conserva el matiz de indagación exhaustiva y encaja con la imagen minera del contexto.
- source_word: אֶבֶן
  english_pob_choice: the stones of
  chosen_spanish: las piedras de
  alternatives_spanish:
  - la piedra de
  - las rocas de
  lexicon: HALOT
  rationale: Aunque la forma es singular, el contexto admite un sentido colectivo. «Las piedras de» hace natural en español la imagen de las materias minerales bajo tierra.
- source_word: אֹפֶל
  english_pob_choice: gloom
  chosen_spanish: la oscuridad profunda
  alternatives_spanish:
  - la negrura
  - la penumbra espesa
  lexicon: HALOT
  rationale: אֹפֶל es más intenso que חֹשֶׁךְ. «Oscuridad profunda» diferencia este término del anterior y conserva la intensificación semántica.
- source_word: וְצַלְמָוֶת
  english_pob_choice: deep darkness
  chosen_spanish: sombra de muerte
  alternatives_spanish:
  - oscuridad de muerte
  - tinieblas de muerte
  lexicon: HALOT
  rationale: En la tradición bíblica española, צַלְמָוֶת suele conocerse como «sombra de muerte». Aquí se mantiene esa lectura tradicional, que el POB inglés preserva en nota, para no borrar la tensión léxica entre la imagen contextual y la fórmula heredada.
theological_decisions:
- issue: Valor de צַלְמָוֶת en un contexto de minería subterránea
  english_pob_reading: deep darkness, with a footnoted traditional alternative shadow of death
  chosen_spanish_reading: sombra de muerte en el texto, con la comprensión contextual de oscuridad profunda implícita en la nota
  alternative_spanish_readings:
  - oscuridad profunda
  - tinieblas de muerte
  rationale: El contexto apunta a oscuridad subterránea, pero la expresión tradicional española conserva una resonancia bíblica importante. Siguiendo el criterio del POB, se preserva la tensión entre el sentido contextual y la forma heredada mediante nota.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del POB inglés al evitar un giro redundante equivalente a «a every limit» y al mantener una frase fluida y precisa en español. También se respetó la decisión de no diluir la imagen minera del versículo.
  spanish_consistency_notes:
  - Se usó «oscuridad» para חֹשֶׁךְ y «oscuridad profunda» para אֹפֶל para distinguir ambos términos.
  - Se mantuvo «sombra de muerte» como alternativa tradicional asociada a צַלְמָוֶת, con anclaje en nota, para reflejar la tensión léxica documentada.
  - Se prefirió vocabulario moderno y claro, sin recurrir a fórmulas eclesiásticas que oculten la imaginería concreta del hebreo.
