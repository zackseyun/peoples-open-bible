  - «Señor» se usa para κύριος humano siguiendo el contexto; no se desambiguó como título divino.
  - Se respetó la cadena militar-cortesana con vocabulario sobrio y directo.
  - No se añadieron notas al pie porque el pasaje no presenta variantes textuales ni alternativas necesarias para la lectura española.
