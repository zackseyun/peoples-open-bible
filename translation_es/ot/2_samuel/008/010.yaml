base_translation:
  language: en
  yaml_path: translation/ot/2_samuel/008/010.yaml
  text: Then Toi sent Joram his son to King David to ask about his welfare and to bless him because he had fought against Hadadezer and struck him down[a], for Hadadezer had been at war with Toi; and in his hand were articles of silver, articles of gold[b], and articles of bronze.
  footnotes:
  - marker: a
    text: Or, more smoothly, 'for Hadadezer had been at war with Toi.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'in his hand were'—that is, he carried these items with him.
    reason: lexical_alternative
