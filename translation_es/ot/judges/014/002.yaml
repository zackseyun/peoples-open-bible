revisions:
- from: 'Entonces subió y se lo contó a su padre y a su madre, y les dijo: «He visto una mujer en Timnat[a], de las hijas de los filisteos. Así que ahora, tomenla para mí por mujer».'
  to: 'Entonces subió y se lo contó a su padre y a su madre, y dijo: «Vi una mujer en Timnat, de las hijas[a] de los filisteos. Ahora, tómenla para mí como esposa».'
  rationale: Se corrigió el anclaje de la nota para que recaiga sobre la frase que realmente explica; se ajustó «les dijo» a «dijo» para reflejar mejor el hebreo; se cambió «He visto» por «Vi» por mejor correspondencia narrativa; se corrigió la ortografía de «tómenla»; y se suavizó la formulación final a un español más natural sin perder el sentido matrimonial del original.
