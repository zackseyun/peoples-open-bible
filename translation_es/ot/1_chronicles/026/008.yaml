  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura del hebreo: procedencia del linaje de Obed-edom, enumeración de ellos/sus hijos/sus hermanos, cualificación para el servicio y total de sesenta y dos. Sin embargo, «de los hijos de Obed-edom» suena algo rígido en español y «hombres de capacidad con fuerza» resulta poco natural para expresar אִישׁ חַיִל בַּכֹּחַ. Una leve mejora puede preservar mejor el sentido de aptitud y fortaleza para el servicio.'
  spanish_quality_summary: El texto es mayormente claro y fiel, pero la combinación «hombres de capacidad con fuerza» suena calcada y menos idiomática en español eclesial natural. «Hombres capaces y fuertes para el servicio» comunica mejor la idea sin perder precisión. También conviene usar raya o punto y coma con buena fluidez; la puntuación actual es aceptable.
  glossary_alignment: No hay términos del glosario mayor en juego. «Obed-edom» está bien conservado. «Hermanos» mantiene correctamente אחים, con nota alternativa adecuada para un sentido más amplio de parentesco.
  issues:
  - severity: medium
    issue: «hombres de capacidad con fuerza» suena poco idiomático
    rationale: Aunque reproduce de cerca el inglés auditado, en español la secuencia resulta forzada. El hebreo combina capacidad/valía y fuerza; una formulación como «hombres capaces y fuertes» preserva ambos elementos con mejor legibilidad.
  - severity: low
    issue: «de los hijos de Obed-edom» es correcto pero algo tieso
    rationale: Es fiel a מִבְּנֵי, pero «procedían de los hijos de Obed-edom» o mantener la forma actual son ambas viables. No requiere cambio obligatorio si se prioriza cercanía formal.
  revised_spanish_text: 'Todos éstos eran de los hijos de Obed-edom: ellos, sus hijos y sus hermanos[a], hombres capaces y fuertes para el servicio; sesenta y dos pertenecientes a Obed-edom.'
  revised_footnotes:
