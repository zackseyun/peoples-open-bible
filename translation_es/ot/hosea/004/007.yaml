lexical_decisions:
- source_word: כְּרֻבָּם
  english_pob_choice: The more they increased
  chosen_spanish: Cuanto más se multiplicaron
  alternatives_spanish:
  - A medida que se multiplicaban
  - Cuanto más crecían en número
  - Mientras más se aumentaban
  lexicon: HALOT
  rationale: 'El hebreo expresa una correlación proporcional: al aumentar ellos, también aumentó el pecado. En español, «Cuanto más se multiplicaron» reproduce de forma natural esa relación comparativa sin perder el valor cuantitativo del verbo.'
- source_word: כֵּן
  english_pob_choice: the more
  chosen_spanish: más
  alternatives_spanish:
  - así
  - de la misma manera
  - tanto más
  lexicon: HALOT
  rationale: En la construcción correlativa, כֵּן responde a כְּרֻבָּם y refuerza la correspondencia. En español, «más» completa la estructura idiomática «Cuanto más..., más...».
- source_word: חָטְאוּ לִי
  english_pob_choice: they sinned against me
  chosen_spanish: pecaron contra mí
  alternatives_spanish:
  - pecaron para conmigo
  - pecaron frente a mí
  - pecaron contra mí
  lexicon: HALOT
  rationale: El verbo חטא con ל señala pecado dirigido contra alguien. «Contra mí» conserva la dirección del agravio y expresa con claridad la ofensa contra Dios.
- source_word: כְּבוֹדָם
  english_pob_choice: their glory
  chosen_spanish: su gloria
  alternatives_spanish:
  - su honor
  - su honra
  - su dignidad
  lexicon: HALOT
  rationale: «Gloria» mantiene el peso semántico del hebreo כָּבוֹד y preserva la ambigüedad intencional del texto sobre el referente exacto de ese honor elevado.
- source_word: בְּקָלוֹן
  english_pob_choice: into disgrace
  chosen_spanish: por vergüenza
  alternatives_spanish:
  - en vergüenza
  - en deshonra
  - por deshonra
  lexicon: HALOT
  rationale: קָלוֹן denota vergüenza o deshonra. En español, con el verbo de cambio, «por vergüenza» comunica el paso de un estado a otro de manera natural y fiel; «deshonra» sería una alternativa válida, pero menos directa aquí.
- source_word: אָמִיר
  english_pob_choice: I will change
  chosen_spanish: cambiaré
  alternatives_spanish:
  - intercambiaré
  - volveré
  - transformaré
  lexicon: HALOT
  rationale: El valor verbal indica cambio/exchange. «Cambiaré» es claro y mantiene la primera persona divina explícita, sin resolver de manera innecesaria si el matiz es de cambio o intercambio.
theological_decisions:
- issue: Referencia de «su gloria»
  english_pob_reading: left as 'their glory' without interpretive expansion
  chosen_spanish_reading: dejado como «su gloria» sin expansión interpretativa
  alternative_spanish_readings:
  - su gloria sacerdotal
  - su honra
  - su prestigio
  rationale: 'El hebreo no especifica el referente exacto de la gloria. Mantener «su gloria» preserva la tensión textual: lo que fue su honor/exaltación será convertido en vergüenza, sin imponer una identificación que el verso no declara.'
  doctrine_reference: Preservar la tensión exegética sin sobreinterpretar el texto.
translation_notes:
  revision_awareness: Se siguió de cerca la lectura auditada del inglés POB, manteniendo la correlación proporcional del hebreo y la ambigüedad deliberada de «su gloria». No se introdujeron expansiones doctrinales ni se debilitó el contraste entre gloria y vergüenza.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto fuente lo requiera; aquí el versículo habla en primera persona divina con לִי, por lo que se conserva «mí».
  - Se prefirió «pecaron contra mí» para reflejar la dirección del agravio con ל.
  - Se mantuvo el paralelismo comparativo con la doble estructura «Cuanto más..., más...» típica en español bíblico claro y moderno.
