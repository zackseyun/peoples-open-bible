    issue: '''celosía'' traduce erróneamente קִנְאָה'
    rationale: En español 'celosía' no significa 'jealousy' sino un elemento arquitectónico. Cambia el sentido del proverbio y hace ininteligible la advertencia sobre una pasión humana destructiva.
  - severity: medium
    issue: Inconsistencia entre el texto principal y la nota
    rationale: La nota explica la alternativa 'envidia' para 'celos', pero el texto principal dice 'celosía'. Eso evidencia un desajuste editorial que debe corregirse para que nota y texto se correspondan.
  revised_spanish_text: La ira es cruel[a], y el enojo es un torrente, pero ¿quién podrá mantenerse en pie delante de los celos?
