translation:
  language: es
  text: Ciertamente esto vino sobre Judá por mandato de Yahvé[a], para quitarlos de delante de su rostro, por los pecados de Manasés, conforme a todo lo que había hecho.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «de su presencia».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַךְ
  english_pob_choice: Surely
  chosen_spanish: Ciertamente
  alternatives_spanish:
  - Solo
  - en verdad
  - ciertamente
  lexicon: HALOT
  rationale: אַךְ aquí funciona como partícula enfática, no restrictiva. En español, «Ciertamente» conserva el tono de afirmación solemne sin introducir una limitación que el contexto no exige.
- source_word: עַל פִּי
  english_pob_choice: at the command of
  chosen_spanish: por mandato de
  alternatives_spanish:
  - según la palabra de
  - por la boca de
  - por orden de
  lexicon: HALOT
  rationale: La expresión idiomática apunta a acción conforme a la palabra/mandato de alguien. «Por mandato de» es natural en español y conserva la agencia divina que el texto atribuye al juicio.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto para el nombre divino. «Yahvé» mantiene la referencia directa al Tetragrámaton sin sustituirla por una convención litúrgica de máscara.
- source_word: הָיְתָה בִּיהוּדָה
  english_pob_choice: came upon Judah
  chosen_spanish: vino sobre Judá
  alternatives_spanish:
  - aconteció en Judá
  - estuvo en Judá
  lexicon: HALOT
  rationale: El hebreo es elíptico y describe el juicio que recae sobre Judá. «Vino sobre Judá» expresa con naturalidad esa llegada del juicio sin perder la fuerza del giro hebreo.
- source_word: לְהָסִיר
  english_pob_choice: to remove
  chosen_spanish: para quitar
  alternatives_spanish:
  - para remover
  - para apartar
  - para eliminar
  lexicon: HALOT
  rationale: El infinitivo causativo comunica la acción de expulsar o quitar. «Para quitar» es claro en español y se ajusta al efecto del juicio descrito.
- source_word: מֵעַל פָּנָיו
  english_pob_choice: from before his face
  chosen_spanish: de delante de su rostro
  alternatives_spanish:
  - de su presencia
  - de delante de él
  lexicon: HALOT
  rationale: Se conserva la imagen concreta de la expulsión «de delante de su rostro», que refleja mejor el antropomorfismo hebreo que una abstracción como «de su presencia». «Rostro» mantiene la correspondencia con פָּנִים.
- source_word: בְּחַטֹּאת
  english_pob_choice: because of the sins of
  chosen_spanish: por los pecados de
  alternatives_spanish:
  - a causa de los pecados de
  - debido a los pecados de
  - por el pecado de
  lexicon: HALOT
  rationale: La forma puede leerse causalmente en conjunto. «Por los pecados de» comunica la causa del juicio de manera natural en español y preserva el plural colectivo sugerido por el hebreo.
- source_word: מְנַשֶּׁה
  english_pob_choice: Manasseh
  chosen_spanish: Manasés
  alternatives_spanish:
  - Manasés
  lexicon: HALOT
  rationale: Nombre propio bíblico en su forma española habitual.
- source_word: כְּכֹל אֲשֶׁר עָשָׂה
  english_pob_choice: according to all that he had done
  chosen_spanish: conforme a todo lo que había hecho
  alternatives_spanish:
  - según todo lo que había hecho
  - como todo lo que había hecho
  lexicon: HALOT
  rationale: «Conforme a» refleja la idea de correspondencia o medida del hebreo כְּכֹל, y conserva mejor la proporcionalidad entre la acción de Manasés y el juicio que recae sobre Judá.
theological_decisions:
- issue: Relación entre el juicio y la culpa de Manasés
  english_pob_reading: The verse refers to the judgment coming upon Judah and the people being removed from the LORD's presence.
  chosen_spanish_reading: El versículo presenta el juicio que vino sobre Judá como consecuencia de los pecados de Manasés, con la idea de ser quitados de delante del rostro de Yahvé.
  alternative_spanish_readings:
  - Esto vino sobre Judá... para quitarlo de su presencia
  - Esto ocurrió en Judá...
  rationale: El hebreo vincula causalmente el juicio con los pecados de Manasés. La traducción española mantiene esa relación y no suaviza la dimensión de expulsión de la presencia divina.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Lenguaje de la presencia divina
  english_pob_reading: Retain the concrete expression 'from before his face' in the main text.
  chosen_spanish_reading: Mantener «de delante de su rostro» en el texto principal.
  alternative_spanish_readings:
  - de su presencia
  - de delante de él
  rationale: Se conserva la imaginería concreta del hebreo, que tiene peso teológico al expresar alejamiento de la presencia divina. La alternativa más idiomática queda documentada en nota.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'Coincide con el último pase de revisión: no se requieren cambios respecto al texto fuente y la concordancia de revisión fue alta, con acuerdo completo en el control cruzado.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma coherente con el estándar del proyecto para el nombre divino.
  - Se preserva la expresión concreta de presencia divina con «de delante de su rostro», evitando una sustitución total por «presencia».
  - Se mantiene un registro bíblico claro y publicable, sin calco excesivo del inglés ni paráfrasis no sustentadas por el hebreo.
