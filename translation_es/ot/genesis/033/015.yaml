translation:
  language: es
  text: 'Entonces Esaú dijo[a]: «Por favor, permíteme dejar contigo a algunos de los hombres que están conmigo». Pero él dijo: «¿Para qué esto? Que halle favor ante los ojos de mi señor».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «permíteme apostarte» o «permíteme poner en su lugar» contigo a algunos de los hombres que están conmigo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַצִּיגָה
  english_pob_choice: let me leave
  chosen_spanish: deja que ponga
  alternatives_spanish:
  - deja que deje
  - deja que coloque
  - deja que deje contigo
  lexicon: HALOT
  rationale: 'El cohortativo de יצג expresa una propuesta volitiva: “poner/colocar” a alguien en cierto lugar o situación. En español, “deja que ponga” conserva mejor esa iniciativa que una traducción demasiado interpretativa, y permite la idea de dejar un grupo con Jacob sin perder el matiz literal.'
- source_word: נָּא
  english_pob_choice: Please
  chosen_spanish: Por favor
  alternatives_spanish:
  - te ruego
  - ahora
  lexicon: HALOT
  rationale: נא suaviza la petición. “Por favor” es la equivalencia natural y digna en español moderno; “te ruego” sería más elevado y “ahora” sugeriría tiempo, no cortesía.
- source_word: עִמְּךָ
  english_pob_choice: with you
  chosen_spanish: contigo
  alternatives_spanish:
  - conmigo
  - a tu lado
  lexicon: HALOT
  rationale: El sentido es de acompañamiento o permanencia junto a Jacob. “Contigo” es la forma normal y transparente en español para esta relación espacial-social.
- source_word: מִן הָעָם אֲשֶׁר אִתִּי
  english_pob_choice: some of the people who are with me
  chosen_spanish: a algunos de los hombres que están conmigo
  alternatives_spanish:
  - a algunos de mi gente que están conmigo
  - a parte de la gente que está conmigo
  lexicon: HALOT
  rationale: 'El מן es partitivo: no todo el grupo, sino una parte. “A algunos de los hombres que están conmigo” refleja ese subset y mantiene el matiz concreto del séquito de Esaú; “hombres” traduce de forma natural הָעָם en este contexto militar o de acompañamiento.'
- source_word: לָמָּה זֶּה
  english_pob_choice: Why this?
  chosen_spanish: ¿Para qué esto?
  alternatives_spanish:
  - ¿Por qué esto?
  - ¿Para qué?
  - ¿Por qué razón esto?
  lexicon: HALOT
  rationale: La expresión hebrea es elíptica y sirve para cuestionar la necesidad de la oferta. “¿Para qué esto?” preserva la concisión del original y su tono de rechazo educado sin expandir innecesariamente la frase.
- source_word: אֶמְצָא חֵן
  english_pob_choice: Let me find favor
  chosen_spanish: Que halle favor
  alternatives_spanish:
  - Permíteme hallar favor
  - Que yo halle favor
  lexicon: HALOT
  rationale: מצא חן es un modismo fijo para recibir favor. En español, “que halle favor” mantiene la forma optativa/expresiva del hebreo y su carácter de petición o deseo, evitando convertirlo en una simple afirmación futura.
- source_word: בְּעֵינֵי
  english_pob_choice: in the sight of
  chosen_spanish: ante los ojos de
  alternatives_spanish:
  - en la presencia de
  - a la vista de
  lexicon: HALOT
  rationale: La imagen hebrea habla de evaluación o estima. “Ante los ojos de” conserva de modo transparente la metáfora, y encaja bien con el equivalente auditado en inglés “in the sight of”.
- source_word: אֲדֹנִי
  english_pob_choice: my lord
  chosen_spanish: mi señor
  alternatives_spanish:
  - mi señoría
  - señor
  lexicon: HALOT
  rationale: Aquí es un tratamiento deferente de Jacob a Esaú, no un título divino. “Mi señor” preserva la relación jerárquica y la cortesía del original mejor que “señor” sin posesivo, que en español podría sonar más genérico.
theological_decisions:
- issue: Tratamiento deferente de אֲדֹנִי frente a un posible título divino
  english_pob_reading: my lord
  chosen_spanish_reading: mi señor
  alternative_spanish_readings:
  - Señor
  - mi maestro
  rationale: El contexto muestra que Jacob habla a Esaú. Por tanto, no hay base para capitalizar ni para usar el término reservado para Yahvé. “Mi señor” conserva la deferencia social sin confundir el referente.
  doctrine_reference: Distinción contextual entre nombre divino y tratamiento honorífico
- issue: Elipsis y tono en לָמָּה זֶּה
  english_pob_reading: Why this?
  chosen_spanish_reading: ¿Para qué esto?
  alternative_spanish_readings:
  - ¿Por qué esto?
  - ¿Para qué?
  rationale: La frase expresa una objeción cortés, no una pregunta informativa. La traducción elegida mantiene la reserva y la brevedad del hebreo sin cargar el texto de interpretación adicional.
  doctrine_reference: Principio de correspondencia discursiva y prudencia exegética
translation_notes:
  revision_awareness: Se tuvo en cuenta el pasaje revisado del inglés POB, especialmente la preferencia por una pregunta más literal y breve en לָמָּה זֶּה (“Why this?”) y la formulación idiomática de בְּעֵינֵי. La versión española busca conservar esa concisión y el tono cortés de la escena, sin abandonar la transparencia semántica del hebreo.
  spanish_consistency_notes:
  - Se mantiene 'Esaú' y 'Jacob' implícito por contexto, sin introducir nombres adicionales innecesarios.
  - No se usó 'SEÑOR' en mayúsculas porque אֲדֹנִי aquí no remite al nombre divino.
  - El marcador de nota a está anclado en 'ponga' para reflejar la alternativa lexical del cohortativo de יצג.
  - La elección de 'favor' preserva el modismo חֵן sin convertirlo en 'gracia' teológica.
  - '''Ante los ojos de'' conserva la imagen hebrea y su valor relacional de evaluación.'
