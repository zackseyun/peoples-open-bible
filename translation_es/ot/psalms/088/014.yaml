translation:
  language: es
  text: Pero yo, Yahvé, a ti clamo; por la mañana mi oración viene delante de ti[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mi oración va delante de ti». El verbo hebreo puede llevar el sentido de venir delante, encontrarse con alguien o preceder.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲנִי
  english_pob_choice: But as for me
  chosen_spanish: Pero yo
  alternatives_spanish:
  - Mas yo
  - Y yo
  lexicon: HALOT
  rationale: La partícula adversativa más el pronombre independiente expresan contraste enfático. En español, «Pero yo» conserva ese énfasis de manera natural y digna.
- source_word: אֵלֶיךָ
  english_pob_choice: to you
  chosen_spanish: a ti
  alternatives_spanish:
  - hacia ti
  - para ti
  lexicon: HALOT
  rationale: La preposición indica dirección del clamor hacia Yahvé. «A ti» es la opción más natural y directa en español.
- source_word: יְהוָה
  english_pob_choice: O Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - oh Yahvé
  - Yahveh
  lexicon: HALOT
  rationale: Se mantiene el nombre divino como transliteración de YHWH, conforme al criterio del proyecto. En español, «Yahvé» es la forma principal más reconocible y reverente.
- source_word: שִׁוַּעְתִּי
  english_pob_choice: I cry out
  chosen_spanish: he clamado
  alternatives_spanish:
  - clamo
  - he gritado pidiendo ayuda
  - he alzado mi clamor
  lexicon: HALOT
  rationale: El verbo expresa un clamor de auxilio. El perfecto español «he clamado» conserva el valor de acción realizada y la intensidad de la súplica sin caer en una paráfrasis excesiva.
- source_word: וּבַבֹּקֶר
  english_pob_choice: in the morning
  chosen_spanish: por la mañana
  alternatives_spanish:
  - en la mañana
  - mañana
  lexicon: HALOT
  rationale: «Por la mañana» es la forma idiomática y clara en español para el marco temporal matutino.
- source_word: תְּפִלָּתִי
  english_pob_choice: my prayer
  chosen_spanish: mi oración
  alternatives_spanish:
  - mi plegaria
  - mi súplica
  lexicon: HALOT
  rationale: El sustantivo se traduce de manera directa como «oración», término amplio y natural en español bíblico contemporáneo.
- source_word: תְקַדְּמֶךָּ
  english_pob_choice: comes before you
  chosen_spanish: te sale al encuentro
  alternatives_spanish:
  - te precede
  - va delante de ti
  - llega a ti
  lexicon: HALOT
  rationale: La forma hiphil de קדם puede expresar venir delante, preceder o salir al encuentro. Con «mi oración» como sujeto, «te sale al encuentro» comunica bien la imagen sin perder la ambigüedad semántica documentada por el inglés auditado.
theological_decisions:
- issue: Tratamiento del nombre divino YHWH
  english_pob_reading: Yahweh / O Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  - Yahveh
  rationale: El hebreo usa el Tetragrámaton directamente, por lo que se preserva el nombre propio de Dios en vez de sustituirlo por un título. «Yahvé» es la forma establecida en el español del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH'
translation_notes:
  revision_awareness: El texto sigue el nivel de acuerdo alto del audit trail inglés y no introduce cambios sustanciales respecto de la lectura base; la principal decisión abierta es la flexión idiomática de תְקַדְּמֶךָּ, que en español puede expresarse como «te sale al encuentro» o «va delante de ti».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה, conforme al estándar del proyecto.
  - Se traduce el clamor verbal con un perfecto español natural («he clamado») para conservar la fuerza de la súplica.
  - La nota a pie de página marca la alternativa semántica del verbo final sin duplicar notas ni sobreexplicar el verso.
