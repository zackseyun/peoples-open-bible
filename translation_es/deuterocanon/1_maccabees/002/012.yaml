revisions:
- from: Y he aquí[a], nuestros lugares santos, nuestra belleza y nuestra gloria han sido asolados[b], y las naciones los han profanado.
  to: Y he aquí[a], nuestras cosas sagradas, nuestra belleza y nuestra gloria han sido asoladas, y las naciones las han profanado[b].
  rationale: 'La revisión corrige la principal desviación frente al griego y al POB inglés: τὰ ἅγια ἡμῶν se vierte de manera amplia como ‘nuestras cosas sagradas’ en vez de ‘nuestros lugares santos’. Así se preserva el plural neutro colectivo sin imponer un referente espacial. También se ajustan las notas para que reflejen mejor las alternativas documentadas y se ancla la nota [b] al verbo ‘han profanado’, en línea con ἐβεβήλωσαν.'
