translation:
  language: es
  text: Joab y Abisai persiguieron a Abner, y el sol se puso; y llegaron hasta la colina de Amá, que está frente a[a] Gía, en el camino al desierto de Gabaón[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «delante de Gía»; la expresión hebrea puede denotar una posición delante de un lugar o frente a él.
    reason: lexical_alternative
  - marker: b
    text: O «por el camino al desierto de Gabaón»; el hebreo puede enfatizar la ruta más que solo la dirección.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּרְדְּפוּ
  english_pob_choice: pursued
  chosen_spanish: persiguieron
  alternatives_spanish:
  - fueron en persecución de
  - siguieron persiguiendo
  lexicon: HALOT
  rationale: רדף en contexto narrativo-militar expresa persecución hostil. «Persiguieron» comunica la acción con naturalidad en español sin debilitarla.
- source_word: אַחֲרֵי
  english_pob_choice: pursued Abner
  chosen_spanish: a Abner
  alternatives_spanish:
  - tras Abner
  - después de Abner
  lexicon: HALOT
  rationale: 'En español, el complemento verbal incorpora mejor la relación de seguimiento: «persiguieron a Abner» conserva el sentido del hebreo sin forzar un calco.'
- source_word: וְהַשֶּׁמֶשׁ בָּאָה
  english_pob_choice: the sun went down
  chosen_spanish: el sol se puso
  alternatives_spanish:
  - el sol descendió
  - el sol cayó
  lexicon: HALOT
  rationale: El hebreo dice literalmente que «el sol vino», un modismo para el atardecer. «Se puso» es la equivalencia natural y fiel en español.
- source_word: וְהֵמָּה בָּאוּ
  english_pob_choice: and they came
  chosen_spanish: y llegaron
  alternatives_spanish:
  - y vinieron
  - y fueron llegando
  lexicon: HALOT
  rationale: El pronombre enfático plural se integra naturalmente en el verbo español. «Llegaron» mantiene el avance narrativo y el punto de llegada.
- source_word: עַד
  english_pob_choice: as far as
  chosen_spanish: hasta
  alternatives_spanish:
  - hasta llegar a
  - a
  lexicon: HALOT
  rationale: Con un lugar, עַד marca límite de desplazamiento. «Hasta» reproduce bien el alcance alcanzado.
- source_word: גִּבְעַת אַמָּה
  english_pob_choice: the hill of Ammah
  chosen_spanish: la colina de Amá
  alternatives_spanish:
  - la colina de Ammah
  - el monte de Amá
  lexicon: HALOT
  rationale: El constructo con nombre propio se vierte de manera transparente. Se conserva el topónimo, adaptado a una forma española de transliteración legible.
- source_word: אֲשֶׁר עַל פְּנֵי גִיחַ
  english_pob_choice: which is opposite Giah
  chosen_spanish: que está frente a Gía
  alternatives_spanish:
  - que está opuesta a Gía
  - que está antes de Gía
  lexicon: HALOT
  rationale: עַל־פְּנֵי puede denotar estar enfrente u opuesto. «Frente a» mantiene la relación espacial sin especificar más de lo que el hebreo garantiza.
- source_word: דֶּרֶךְ מִדְבַּר גִּבְעוֹן
  english_pob_choice: on the way to the wilderness of Gibeon
  chosen_spanish: en el camino al desierto de Gabaón
  alternatives_spanish:
  - por el camino del desierto de Gabaón
  - hacia el desierto de Gabaón
  lexicon: HALOT
  rationale: דֶּרֶךְ puede significar camino o ruta. «En el camino al desierto de Gabaón» conserva la orientación del trayecto sin sobreinterpretar la preposición.
- source_word: גִּיחַ / גִּבְעוֹן / אַבְנֵר / יוֹאָב / אֲבִישַׁי / אַמָּה
  english_pob_choice: Giah / Gibeon / Abner / Joab / Abishai / Ammah
  chosen_spanish: Gía / Gabaón / Abner / Joab / Abisai / Amá
  alternatives_spanish:
  - Giah / Gibeon / Abner / Joab / Abishai / Ammah
  lexicon: HALOT
  rationale: Los nombres propios se transliteran con convenios españoles habituales para lectura eclesial, manteniendo la identificabilidad del texto.
translation_notes:
  revision_awareness: La revisión inglesa más reciente indica que no hubo cambios posteriores y el estado de concordancia fue alto (0,95), con observaciones menores. La presente propuesta conserva la lectura óptima del POB inglés y solo adapta la formulación a español natural, manteniendo las dos ambigüedades geográficas relevantes en nota.
  spanish_consistency_notes:
  - Se mantuvo el verbo de persecución como acción militar hostil, en línea con el valor narrativo de רדף.
  - «El sol se puso» traduce el modismo hebreo sin perder la referencia temporal.
  - Se respetó la relación espacial de עַל־פְּנֵי con «frente a», dejando la alternativa en nota.
  - «Desierto de Gabaón» sigue el uso toponímico español habitual para גִּבְעוֹן, sin alterar la geografía del pasaje.
  - Los nombres propios se trataron de forma coherente y legible para una edición bíblica en español.
