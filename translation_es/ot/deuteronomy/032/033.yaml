translation:
  language: es
  text: Su vino es veneno de serpientes[a], ponzoña cruel de cobras[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Serpientes» también podría traducirse, en otros contextos, por «dragones»; aquí el paralelismo con otras serpientes venenosas favorece un sentido serpentino.
    reason: lexical_alternative
  - marker: b
    text: O «ponzoña de áspides»; el hebreo nombra una serpiente venenosa tradicionalmente traducida como «áspid» o «víbora».
    reason: lexical_alternative
lexical_decisions:
- source_word: חֲמַת
  english_pob_choice: venom
  chosen_spanish: veneno
  alternatives_spanish:
  - ponzoña
  - veneno
  lexicon: HALOT
  rationale: En esta construcción poética con imaginería de serpientes, el término expresa la sustancia tóxica que mata; en español, «veneno» comunica con naturalidad ese valor y mantiene la fuerza metafórica del verso.
- source_word: תַּנִּינִם
  english_pob_choice: serpents
  chosen_spanish: serpientes
  alternatives_spanish:
  - dragones
  - monstruos marinos
  lexicon: HALOT
  rationale: Aunque el término puede aludir a criaturas monstruosas o marinas en otros contextos, aquí el paralelismo con פְּתָנִים y la referencia al veneno favorecen claramente el sentido de animales serpentinos. «Serpientes» conserva esa imagen de manera directa en español.
- source_word: יֵינָם
  english_pob_choice: their wine
  chosen_spanish: su vino
  alternatives_spanish:
  - el vino de ellos
  - su mosto
  lexicon: HALOT
  rationale: La construcción posesiva es directa; el sentido metafórico del hebreo se conserva con «su vino», sin añadir explicación que exceda el texto.
- source_word: וְרֹאשׁ
  english_pob_choice: poison
  chosen_spanish: ponzoña
  alternatives_spanish:
  - veneno
  - amargura
  lexicon: HALOT
  rationale: Aquí רֹאשׁ no funciona como «cabeza», sino como sustancia amarga o tóxica. «Ponzoña» evita la repetición exacta de «veneno» y mantiene el tono poético y arcaizante moderado que el versículo admite.
- source_word: פְּתָנִים
  english_pob_choice: cobras
  chosen_spanish: cobras
  alternatives_spanish:
  - víboras
  - áspides
  - serpientes
  lexicon: HALOT
  rationale: El término designa una serpiente venenosa. «Cobras» es una equivalencia moderna plausible que comunica con claridad la peligrosidad y preserva el paralelismo con el primer hemistiquio.
- source_word: אַכְזָר
  english_pob_choice: cruel
  chosen_spanish: cruel
  alternatives_spanish:
  - despiadada
  - feroz
  lexicon: HALOT
  rationale: El adjetivo describe la ponzoña como dañina y despiadada. «Cruel» reproduce bien la personificación del hebreo y coincide con la decisión inglesa.
translation_notes:
  revision_awareness: El texto inglés auditado mantiene la lectura serpiente/veneno y no introduce revisiones textuales ni cambios de sentido. La presente versión española sigue esa misma línea, conservando el paralelismo poético y la distinción entre חֲמַת y רֹאשׁ mediante «veneno» y «ponzoña».
  spanish_consistency_notes:
  - Se mantuvo «su vino» para יֵינָם sin explicitar el sujeto colectivo porque el hebreo ya lo presupone.
  - Se evitó «SEÑOR» u այլ masking terminology porque el versículo no contiene el nombre divino.
  - Se prefirió «cobras» por claridad moderna, aunque «áspides» o «víboras» serían alternativas posibles en un registro más tradicional.
