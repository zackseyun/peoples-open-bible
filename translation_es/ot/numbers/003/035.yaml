review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del hebreo y del POB inglés: identifica a Zuriel como jefe del grupo merarita y ubica su campamento al norte del tabernáculo. Sin embargo, hay dos desajustes relevantes: (1) לְמִשְׁפְּחֹת en este contexto censal/organizativo se representa mejor como ''clanes'' que como ''familias'', en línea con la decisión auditada; (2) יַחֲנוּ expresa disposición prescrita, y en español ''acamparán'' suena más predictivo que directivo, por lo que conviene ''debían acampar'' o equivalente.'
  spanish_quality_summary: 'El español es claro y digno, pero puede afinarse para sonar más natural y más preciso: ''casa paterna'' funciona en registro bíblico con nota explicativa; ''al lado norte'' es comprensible, pero ''en el lado norte'' o ''en el costado norte'' suena más idiomático para ubicación fija. La secuencia de notas en el texto y en el listado es válida, aunque conviene anclar primero la nota léxica en ''jefe'' y luego la cultural en ''casa paterna'' para mejor correspondencia local.'
  glossary_alignment: No hay términos teológicos de proyecto en juego. La elección 'jefe' para נָשִׂיא concuerda con la auditoría; 'tabernáculo' para מִשְׁכָּן también. La principal divergencia terminológica es 'familias' frente a la preferencia documentada por 'clanes' en Números.
  issues:
  - severity: medium
    issue: '''familias'' para לְמִשְׁפְּחֹת debilita el matiz organizativo de clan'
    rationale: La auditoría inglesa justifica 'clans' en este contexto censal. En español, 'clanes' es suficientemente claro y preserva mejor la estructura tribal que 'familias'.
  - severity: medium
    issue: '''Acamparán'' no refleja tan bien el valor prescriptivo de יַחֲנוּ'
    rationale: El imperfecto aquí describe la disposición asignada del campamento. 'Debían acampar' comunica mejor la instrucción/ordenanza que un futuro simple potencialmente predictivo.
  - severity: low
    issue: '''al lado norte del tabernáculo'' es menos idiomático que una formulación locativa más natural'
    rationale: Para ubicación fija en español suena mejor 'en el lado norte del tabernáculo' o 'en el costado norte del tabernáculo'.
  - severity: low
    issue: La colocación de las notas puede mejorarse para corresponder más directamente con sus anclajes
    rationale: La nota sobre נָשִׂיא debería anclarse en 'jefe' y la nota cultural en 'casa paterna', manteniendo el orden secuencial normal en el texto.
  revised_spanish_text: Y el jefe[a] de la casa paterna[b] de los clanes de Merari era Zuriel hijo de Abihail. Debían acampar en el lado norte del tabernáculo.
  revised_footnotes:
  - marker: a
    text: También puede entenderse como 'líder' o 'príncipe' para נָשִׂיא; aquí se prefiere 'jefe' en este contexto organizativo.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, 'casa paterna', un término de parentesco para una unidad doméstica o de clan.
    reason: cultural_note
  revision_rationale: 'La revisión ajusta el texto al valor organizativo del hebreo y a la auditoría del POB: ''clanes'' preserva mejor מִשְׁפָּחוֹת en Números; ''debían acampar'' comunica la disposición prescrita de יַחֲנוּ; ''en el lado norte'' mejora la naturalidad locativa en español. También se reordenan las notas para que sus marcadores sigan el punto exacto de anclaje en el texto.'
