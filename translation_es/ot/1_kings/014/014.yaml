translation:
  language: es
  text: Yahvé levantará para sí un rey sobre Israel, que cortará de raíz la casa de Jeroboam este día[a]. Pero, ¿qué? Aun ahora.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El final hebreo es abrupto y difícil: literalmente, «y ¿qué? aun ahora». Algunos lo entienden como una exclamación que subraya la inmediatez del juicio, por ejemplo: «¿pero qué? ¡aun ahora!» o «¿y qué más? ya ahora».'
    reason: alternative_reading
lexical_decisions:
- source_word: וְהֵקִים
  english_pob_choice: will raise up
  chosen_spanish: levantará
  alternatives_spanish:
  - alzará
  - levantará en pie
  - establecerá
  lexicon: HALOT
  rationale: El verbo causativo de קום conserva en español la idea de hacer surgir o poner en función a alguien; «levantará» comunica bien la iniciativa divina sin forzar un matiz técnico de entronización.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se mantiene el nombre propio divino según la convención del proyecto. «Yahvé» preserva el Tetragrámaton sin sustituirlo por un título.
- source_word: לּוֹ
  english_pob_choice: for himself
  chosen_spanish: para sí
  alternatives_spanish:
  - para él
  - para su propio beneficio
  lexicon: HALOT
  rationale: El sufijo pronominal remite naturalmente al sujeto, y en español «para sí» refleja ese valor reflexivo/posesivo sin añadir explicaciones.
- source_word: מֶלֶךְ עַל יִשְׂרָאֵל
  english_pob_choice: a king over Israel
  chosen_spanish: un rey sobre Israel
  alternatives_spanish:
  - un rey para Israel
  - un rey que gobernará a Israel
  lexicon: HALOT
  rationale: «Sobre Israel» conserva la preposición de dominio político de עַל y evita suavizar la imagen de realeza.
- source_word: יַכְרִית
  english_pob_choice: who will cut off
  chosen_spanish: exterminará
  alternatives_spanish:
  - cortará de raíz
  - destruirá
  - eliminará
  lexicon: HALOT
  rationale: Aunque «cortar off» es literal, en español «exterminará» transmite con fuerza el sentido de juicio total sobre la casa dinástica. Se conserva el tono de sentencia, evitando una expresión demasiado ambigua para el lector hispano.
- source_word: בֵּית יָרָבְעָם
  english_pob_choice: the house of Jeroboam
  chosen_spanish: la casa de Jeroboam
  alternatives_spanish:
  - la dinastía de Jeroboam
  - el linaje de Jeroboam
  lexicon: HALOT
  rationale: «Casa» es el término dinástico bíblico estándar y reproduce el campo semántico del hebreo sin interpretarlo como «dinastía».
- source_word: זֶה הַיּוֹם
  english_pob_choice: this day
  chosen_spanish: este día
  alternatives_spanish:
  - hoy
  - en este mismo día
  lexicon: HALOT
  rationale: La formulación literal mantiene visible la expresión hebrea y su énfasis temporal inmediato.
- source_word: וּמֶה גַּם עָתָּה
  english_pob_choice: But what? Even now.
  chosen_spanish: Pero, ¿qué? Aun ahora.
  alternatives_spanish:
  - ¿Y qué? Aun ahora.
  - Pero ¿qué más? Aun ahora.
  - ¿Pero qué, ahora mismo?
  lexicon: HALOT
  rationale: El final hebreo es abrupto y elíptico. Se conserva esa dificultad en español sin resolverla mediante una paráfrasis; «Pero, ¿qué?» reproduce la interjección cortante y «Aun ahora» mantiene la inmediatez de גַּם עָתָּה.
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton. En español se sigue la convención del proyecto de transliterarlo como «Yahvé» para preservar el nombre revelado, no una sustitución titular.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH'
- issue: Tratamiento del cierre abrupto וּמֶה גַּם עָתָּה
  english_pob_reading: Preserve the Hebrew abruptness rather than resolve it into a smoother interpretive paraphrase.
  chosen_spanish_reading: Preservar la abrupta elipsis hebrea sin aclararla en exceso.
  alternative_spanish_readings:
  - Pero, ¿qué? Aun ahora.
  - ¿Y qué? Aun ahora.
  - ¿Pero qué más? Aun ahora.
  rationale: La frase final es sintácticamente difícil y no conviene domesticarla. La traducción mantiene la tensión y la apertura interpretativa del hebreo, conforme a la filosofía de equivalencia óptima del proyecto.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy #3'
translation_notes:
  revision_awareness: La redacción española sigue la revisión más reciente del audit trail al preferir un inicio adversativo en el cierre («Pero, ¿qué? Aun ahora») y al mantener la dificultad del hebreo final sin expandirla interpretativamente. También conserva la decisión documental de traducir יהוה como Yahvé y de reflejar la casa dinástica de Jeroboam con «la casa de Jeroboam».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יהוה conforme a la terminología del proyecto.
  - Se usa «casa» para el linaje real, sin sustituirlo por «dinastía» en el texto principal.
  - Se conserva «este día» para respetar la literalidad y la fuerza temporal del hebreo.
  - La puntuación con coma e interrogación en el cierre busca reflejar la brusquedad sintáctica del original sin resolverla.
