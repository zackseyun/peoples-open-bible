translation:
  language: es
  text: Porque he aquí, vienen días —declara Yahvé— en que restauraré la suerte[a] de mi pueblo Israel y Judá, dice Yahvé, y los haré volver a la tierra que di a sus padres, y la poseerán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión hebrea שׁוּב שְׁבוּת puede significar tanto “restaurar la suerte” como, más literalmente, “restaurar la cautividad” o “hacer volver a los cautivos” de mi pueblo Israel y Judá. Aquí se traduce en el sentido amplio de restauración, porque la cláusula siguiente ya aclara el retorno a la tierra.
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Pues que
  lexicon: HALOT
  rationale: Conserva la fuerza conectiva causal o explicativa del hebreo al inicio del dicho profético, con español natural y sobrio.
- source_word: הִנֵּה
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - mira
  - véase
  lexicon: HALOT
  rationale: La POB inglesa revisada prefirió un registro más formal; en español, 'he aquí' preserva la atención e inmediatez del deíctico profético sin sonar coloquial.
- source_word: יָמִים בָּאִים
  english_pob_choice: days are coming
  chosen_spanish: vienen días
  alternatives_spanish:
  - se acercan días
  - están por venir días
  lexicon: HALOT
  rationale: Mantiene el giro profético futuro con una formulación natural en español; el hebreo usa un participio de movimiento con valor inminente.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - dice Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: Se conserva el nombre divino YHWH como 'Yahvé' según la política del proyecto y el valor solemne de la fórmula profética como declaración formal.
- source_word: וְשַׁבְתִּי אֶת שְׁבוּת
  english_pob_choice: I will restore the fortunes
  chosen_spanish: restauraré el bienestar
  alternatives_spanish:
  - restauraré la suerte
  - restauraré la cautividad
  lexicon: HALOT
  rationale: La POB inglesa opta por el sentido idiomático de restauración integral, no solo exilio. 'Bienestar' comunica la reversión de la desgracia sin reducirla a regreso físico.
- source_word: עַמִּי
  english_pob_choice: my people
  chosen_spanish: mi pueblo
  alternatives_spanish:
  - mi gente
  lexicon: HALOT
  rationale: Equivale de forma directa al posesivo covenantal del hebreo y suena natural en español bíblico contemporáneo.
- source_word: יִשְׂרָאֵל וִיהוּדָה
  english_pob_choice: Israel and Judah
  chosen_spanish: Israel y Judá
  lexicon: HALOT
  rationale: Se mantienen los dos referentes históricos explícitos del texto, importantes para la restauración dual.
- source_word: אָמַר יְהוָה
  english_pob_choice: says Yahweh
  chosen_spanish: dice Yahvé
  alternatives_spanish:
  - declara Yahvé
  lexicon: HALOT
  rationale: Conserva la segunda fórmula de habla divina sin forzar una variación innecesaria de registro; 'dice' funciona de manera natural y fiel aquí.
- source_word: וַהֲשִׁבֹתִים
  english_pob_choice: I will bring them back
  chosen_spanish: los haré volver
  alternatives_spanish:
  - los traeré de vuelta
  - los haré regresar
  lexicon: HALOT
  rationale: El hiphil de שוב expresa causar el retorno. 'Los haré volver' comunica mejor la acción causativa que un simple 'volverán'.
- source_word: אֶל הָאָרֶץ
  english_pob_choice: to the land
  chosen_spanish: a la tierra
  alternatives_spanish:
  - a la tierra prometida
  - a la tierra
  lexicon: HALOT
  rationale: '''Tierra'' reproduce el término territorial-covenantal del hebreo, y es más sobrio que ''país'' en este contexto.'
- source_word: אֲשֶׁר נָתַתִּי לַאֲבוֹתָם
  english_pob_choice: that I gave to their fathers
  chosen_spanish: que di a sus padres
  alternatives_spanish:
  - que di a sus antepasados
  lexicon: HALOT
  rationale: Se conserva el masculino plural del hebreo y el vínculo patriarcal/covenantal con una expresión clara y estándar en español bíblico.
- source_word: וִירֵשׁוּהָ
  english_pob_choice: they will possess it
  chosen_spanish: la poseerán
  alternatives_spanish:
  - la heredarán
  - tomarán posesión de ella
  lexicon: HALOT
  rationale: '''Poseerán'' mantiene la concreción del verbo ירשׁ en el contexto de asentamiento estable en la tierra, sin introducir una idea exclusivamente jurídica de herencia.'
theological_decisions:
- issue: Sentido del idiomático וְשַׁבְתִּי אֶת־שְׁבוּת
  english_pob_reading: I will restore the fortunes
  chosen_spanish_reading: restauraré el bienestar
  alternative_spanish_readings:
  - restauraré la cautividad
  - traeré de vuelta a los cautivos
  rationale: El hebreo puede señalar tanto regreso del exilio como restauración integral tras la calamidad. Dado que la cláusula siguiente ya explicita el retorno a la tierra, el español puede expresar primero la reversión de la desgracia con un término amplio.
  doctrine_reference: Translation philosophy §3, §5
- issue: Uso del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo contiene el Tetragrama directamente. La política del proyecto exige conservar el nombre divino en español como 'Yahvé', evitando la sustitución litúrgica por 'SEÑOR'.
  doctrine_reference: 'Contested terms: יְהוָה YHWH'
- issue: Referencia a la posesión de la tierra
  english_pob_reading: they will possess it
  chosen_spanish_reading: la poseerán
  alternative_spanish_readings:
  - la heredarán
  - tomarán posesión de ella
  rationale: El cierre no solo promete retorno sino asentamiento y dominio estable sobre la tierra dada a los padres. 'Poseerán' conserva ese resultado sin sobrecargar el español.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del paquete en inglés, que cambió 'look' por 'behold' para reflejar mejor הִנֵּה. En español se resolvió con 'he aquí', que conserva el tono formal y la deixis profética. También se integró la decisión estable del audit trail de mantener el nombre divino como Yahvé y de traducir el idiomático וְשַׁבְתִּי אֶת־שְׁבוּת en sentido amplio, no literalista.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' para יְהוָה conforme al estándar del proyecto.
  - Se prefirió 'tierra' para אֶל הָאָרֶץ en vez de 'país', por el contexto pactal.
  - '''Restauraré el bienestar'' refleja la restauración integral indicada por el hebreo y la nota inglesa.'
  - Se usó 'mi pueblo' para עַמִּי, con posesivo directo y tono bíblico natural.
  - 'Se conservó la estructura profética con dos fórmulas divinas distintas: ''declara Yahvé'' y ''dice Yahvé''.'
