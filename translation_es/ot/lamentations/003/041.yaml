    rationale: Aunque לְבָבֵנוּ es formalmente singular con sufijo 1cp, el propio POB auditado eligió el plural distributivo. En español bíblico natural, «levantemos nuestros corazones» expresa mejor la pluralidad de los participantes sin traicionar el hebreo.
  - severity: medium
    issue: «en los cielos» es menos natural aquí que «en el cielo»
    rationale: בַּשָּׁמַיִם puede mantenerse como plural, pero en esta fórmula de oración dirigida a Dios la expresión idiomática española más clara y ampliamente comprensible es «en el cielo», en línea con la decisión inglesa auditada «in heaven».
  - severity: low
