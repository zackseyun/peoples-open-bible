    rationale: El hebreo וּכְעֵת מוּתָהּ indica 'y/alrededor del tiempo de su muerte'. 'Cuando se acercó el momento de su muerte' introduce una idea de aproximación progresiva que no está explícita en el original.
  - severity: medium
