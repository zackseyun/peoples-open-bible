translation:
  language: es
  text: 'Entonces el espíritu[a] se adelantó y se puso delante de Yahvé, y dijo: «Yo lo induciré[b]». Y Yahvé le dijo: «¿Por qué medio?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un espíritu». El hebreo tiene «el espíritu», probablemente refiriéndose a un ser espiritual concreto del consejo celestial, no necesariamente al Espíritu Santo.
    reason: alternative_reading
  - marker: b
    text: O «lo persuadiré» o «lo engañaré». El verbo puede denotar inducir, persuadir o engañar; el modo exacto se aclara en el versículo siguiente.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָרוּחַ
  english_pob_choice: the spirit
  chosen_spanish: el espíritu
  alternatives_spanish:
  - el Espíritu
  - un espíritu
  lexicon: HALOT
  rationale: El hebreo lleva artículo definido, así que en español conviene reflejar una referencia concreta. «El espíritu» preserva la especificidad del ser espiritual del consejo celestial sin sugerir automáticamente al Espíritu Santo, que el contexto no exige. «Un espíritu» debilita esa referencia definida.
- source_word: וַיֵּצֵא
  english_pob_choice: came forward
  chosen_spanish: salió
  alternatives_spanish:
  - se adelantó
  - vino hacia adelante
  lexicon: HALOT
  rationale: El verbo básico es «salir». En esta escena de corte celestial, la acción implica presentarse ante Yahvé; en español, «salió» mantiene la fuerza narrativa y evita añadir más interpretación que la necesaria. «Se adelantó» sería más interpretativo.
- source_word: וַיַּעֲמֹד לִפְנֵי
  english_pob_choice: stood before
  chosen_spanish: se puso delante de
  alternatives_spanish:
  - estuvo delante de
  - se presentó ante
  lexicon: HALOT
  rationale: La construcción expresa estar en presencia de una autoridad. «Se puso delante de» suena natural en español y conserva la imagen de comparecer ante Yahvé. «Se presentó ante» sería aceptable, pero añade un matiz más formal que el hebreo no exige.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto de transliterar el nombre divino como «Yahvé», preservando el Tetragrámaton en lugar de sustituirlo por un título.
- source_word: אֲפַתֶּנּוּ
  english_pob_choice: I will entice him
  chosen_spanish: lo induciré
  alternatives_spanish:
  - lo seduciré
  - lo persuadiré
  - lo engañaré
  lexicon: HALOT
  rationale: El pi‘el de פתה puede abarcar inducir, persuadir o seducir. En este contexto judicial, «lo induciré» comunica que se le llevará a actuar sin decidir de antemano el mecanismo exacto. «Lo engañaré» es demasiado fuerte para esta línea aislada; la precisión se desarrolla en el versículo siguiente.
- source_word: בַּמָּה
  english_pob_choice: By what means?
  chosen_spanish: ¿Por qué medio?
  alternatives_spanish:
  - ¿Cómo?
  - ¿De qué manera?
  lexicon: HALOT
  rationale: La pregunta pide el modo o instrumento de acción. «¿Por qué medio?» es formal, claro y encaja con el escenario del consejo celestial. «¿Cómo?» sería correcto pero más general.
theological_decisions:
- issue: Identidad de הָרוּחַ en el consejo celestial
  english_pob_reading: a particular spirit-being, rendered 'the spirit,' not the Holy Spirit
  chosen_spanish_reading: un espíritu/persona espiritual concreta, no el Espíritu Santo
  alternative_spanish_readings:
  - el Espíritu Santo
  - un espíritu indefinido
  rationale: La escena presenta a un miembro del consejo celestial que comparece ante Yahvé. Traducir «el Espíritu» con mayúscula podría sugerir indebidamente al Espíritu Santo; traducirlo como «un espíritu» borra la definición del texto hebreo. El español conserva la tensión con «el espíritu» y una nota que explica la posibilidad de leer «un espíritu».
  doctrine_reference: Preservar la tensión textual y no resolverla por tradición doctrinal; primacía del hebreo sobre la costumbre eclesiástica.
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se requieren cambios respecto del texto auditado en inglés.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme al criterio del proyecto para יְהוָה.
  - Se usa «espíritu» en minúscula porque el contexto no identifica al Espíritu Santo.
  - «Inducir» conserva la amplitud semántica de פתה sin cerrar prematuramente el sentido a «engañar».
  - La pregunta final se vierte como modo/medio para reflejar el interrogativo hebreo בַּמָּה.
