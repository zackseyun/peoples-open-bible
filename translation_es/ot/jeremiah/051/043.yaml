translation:
  language: es
  text: Sus ciudades se han vuelto una desolación[a], una tierra seca y un desierto[b], una tierra donde no habita nadie[c], y por donde no pasa ningún hijo de hombre[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'sus ciudades'; el hebreo usa un sufijo femenino singular, reflejando a Babilonia personificada como mujer.
    reason: lexical_alternative
  - marker: b
    text: O 'una tierra árida y una estepa'.
    reason: lexical_alternative
  - marker: c
    text: El hebreo dice 'ningún hombre' y 'ningún hijo de hombre'; son expresiones genéricas para habitantes y viajeros humanos.
    reason: lexical_alternative
lexical_decisions:
- source_word: עָרֶיהָ
  english_pob_choice: her cities
  chosen_spanish: sus ciudades
  alternatives_spanish:
  - sus ciudades, de ella
  - las ciudades de ella
  lexicon: HALOT
  rationale: El sufijo femenino singular se conserva de forma natural en español con 'sus', manteniendo la personificación de Babilonia sin forzar un posesivo literal como 'de ella'.
- source_word: לְשַׁמָּה
  english_pob_choice: a desolation
  chosen_spanish: una desolación
  alternatives_spanish:
  - una devastación
  - un espanto
  lexicon: HALOT
  rationale: '''Desolación'' reproduce bien el sustantivo de resultado y encaja con el juicio del contexto; las alternativas tienden a intensificar o desplazar el matiz.'
- source_word: אֶרֶץ צִיָּה
  english_pob_choice: a dry land
  chosen_spanish: una tierra seca
  alternatives_spanish:
  - una tierra árida
  - una tierra reseca
  lexicon: HALOT
  rationale: '''Seca'' comunica la idea de aridez de manera clara y natural en español; ''árida'' es posible, pero algo más técnica.'
- source_word: וַעֲרָבָה
  english_pob_choice: and a desert
  chosen_spanish: y un desierto
  alternatives_spanish:
  - y una estepa
  - y un yermo
  lexicon: HALOT
  rationale: '''Desierto'' es la correspondencia más accesible en contexto; ''estepa'' sería más técnico y ''yermo'' se superpone con ''desolación''.'
- source_word: אֶרֶץ לֹא יֵשֵׁב בָּהֵן כָּל אִישׁ
  english_pob_choice: a land where no one lives
  chosen_spanish: una tierra donde no habita nadie
  alternatives_spanish:
  - una tierra donde no vive nadie
  - una tierra en la que nadie mora
  lexicon: HALOT
  rationale: '''Habita'' mantiene un tono digno y bíblico sin caer en arcaísmo excesivo; conserva el sentido de ausencia total de moradores.'
- source_word: וְלֹא יַעֲבֹר בָּהֵן
  english_pob_choice: and through which no son of man passes
  chosen_spanish: y por donde no pasa ningún hijo de hombre
  alternatives_spanish:
  - y por donde no transita ningún ser humano
  - y por donde no cruza ningún hombre
  lexicon: HALOT
  rationale: '''Pasar por'' conserva la noción de tránsito del verbo עבר; ''ningún hijo de hombre'' mantiene la forma literal del hebreo para el cierre solemne del versículo.'
- source_word: בֶּן אָדָם
  english_pob_choice: son of man
  chosen_spanish: hijo de hombre
  alternatives_spanish:
  - ser humano
  - hombre
  lexicon: HALOT
  rationale: En español, 'hijo de hombre' sigue de cerca la estructura idiomática del hebreo y preserva el paralelismo formal documentado por la POB inglesa.
- source_word: הָיוּ
  english_pob_choice: have become
  chosen_spanish: se han vuelto
  alternatives_spanish:
  - han llegado a ser
  - se han convertido
  lexicon: HALOT
  rationale: '''Se han vuelto'' expresa el cambio de estado resultante de forma natural y suficientemente fiel al perfecto hebreo en este contexto.'
theological_decisions:
- issue: Personificación de Babilonia por el sufijo femenino singular
  english_pob_reading: The Hebrew uses a feminine singular suffix, reflecting Babylon personified as a woman.
  chosen_spanish_reading: Se conserva la personificación con 'sus ciudades' sin neutralizarla.
  alternative_spanish_readings:
  - sus ciudades de ella
  - las ciudades de Babilonia
  rationale: El español permite reflejar la personificación sin explicitarla de manera pesada. 'Sus ciudades' mantiene el vínculo pronominal del hebreo y evita perder el rasgo literario-teológico de Babilonia como mujer personificada.
  doctrine_reference: No doctrinal issue; literary-theological personification in prophetic judgment oracle.
- issue: Valor genérico de אִישׁ / בֶּן אָדָם
  english_pob_reading: Hebrew 'no man' and 'no son of man'; these are generic expressions for human inhabitants and travelers.
  chosen_spanish_reading: '''nadie'' para la inhabitación y ''ningún hijo de hombre'' para el tránsito.'
  alternative_spanish_readings:
  - ninguna persona
  - ningún ser humano
  rationale: La primera cláusula pide naturalidad en español; 'nadie' comunica el universal negativo. En la segunda se conserva la expresión formal 'hijo de hombre' porque el cierre del verso tiene una fuerza idiomática deliberada que conviene no nivelar.
  doctrine_reference: No doctrinal issue; generic anthropological language in Hebrew poetry.
translation_notes:
  revision_awareness: 'Esta redacción sigue de cerca el texto hebreo y la auditoría inglesa: conserva la personificación de Babilonia, reproduce la cadena de desolación con dos términos de paisaje árido, y mantiene la clausura idiomática ''hijo de hombre'' en español. También incorpora la revisión inglesa que suavizó la primera cláusula genérica para hacerla más natural, aquí reflejada con ''nadie''.'
  spanish_consistency_notes:
  - Se usa 'Dios' / 'Yahvé' según las convenciones del proyecto, aunque este versículo no las requiere explícitamente.
  - Se evita 'SEÑOR' porque el verso no contiene el Tetragrámaton.
  - '''Desolación'' se emplea como sustantivo de resultado, coherente con el uso profético del juicio.'
  - Se conserva un registro bíblico sobrio y publicable, sin calcar la sintaxis inglesa más allá de lo necesario.
