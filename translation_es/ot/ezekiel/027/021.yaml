review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del hebreo: Arabia/Arabia, los príncipes de Kedar, la relación comercial con Tiro y la lista de ganado. También preserva adecuadamente la nota sobre la ambigüedad de עֲרַב y la explicación idiomática de סֹחֲרֵי יָדֵךְ. Sin embargo, ''Cedar'' no es la mejor forma para קֵדָר según la propia pauta del proyecto y el uso bíblico español más reconocible; ''Quedar'' es más fiel y claro. Además, ''en estos'' suena poco natural en español para animales listados; ''con ellos'' o ''en ellos'' sería más idiomático, y aquí conviene ''con ellos'' para expresar los bienes con que comerciaban.'
  spanish_quality_summary: 'El texto es mayormente legible y digno, pero tiene dos detalles mejorables: ''Cedar'' puede resultar menos reconocible que ''Quedar'' en español bíblico, y ''en estos comerciaban contigo'' suena algo calcado e incómodo. ''Con ellos comerciaban contigo'' mejora la naturalidad sin apartarse del sentido. El resto del verso está bien formulado.'
  glossary_alignment: 'No hay términos teológicos sensibles en este versículo. ''Arabia'', ''príncipes'', ''comerciantes'', ''corderos'', ''carneros'' y ''machos cabríos'' están alineados con el análisis léxico. La principal desalineación es el nombre propio קֵדָר: debe preferirse ''Quedar'' frente a ''Cedar'' para una transliteración española más estándar y transparente.'
  issues:
