translation:
  language: es
  text: 'Y le dijo: «En verdad te digo[a]: hoy estarás conmigo en el paraíso».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, menos probable: «En verdad te digo hoy, estarás conmigo en el paraíso». El texto griego no tenía puntuación moderna; esta alternativa toma «hoy» con «te digo» y no con «estarás».'
    reason: alternative_reading
lexical_decisions:
- source_word: Ἀμήν
  english_pob_choice: Truly
  chosen_spanish: En verdad
  alternatives_spanish:
  - Amén
  - Ciertamente
  lexicon: BDAG
  rationale: En las palabras de Jesús, ἀμήν introduce una afirmación solemne y autoritativa. «En verdad» comunica esa fuerza en español actual sin reducirlo a una mera transliteración litúrgica.
- source_word: σοι λέγω
  english_pob_choice: I tell you
  chosen_spanish: te digo
  alternatives_spanish:
  - te digo a ti
  - yo te digo
  lexicon: BDAG
  rationale: La fórmula discursiva se expresa de manera natural y directa en español con «te digo», manteniendo la relación personal del dicho y su tono de declaración solemne.
- source_word: σήμερον
  english_pob_choice: today
  chosen_spanish: hoy
  alternatives_spanish:
  - hoy (si se toma con «te digo»)
  lexicon: BDAG
  rationale: '«Hoy» se conserva en la posición más natural del español junto con la promesa futura, siguiendo la lectura principal del audit trail: que modifica «estarás» y no el acto de decir. La alternativa interpretativa queda documentada en nota por la ausencia de puntuación en el griego.'
- source_word: μετ’ ἐμοῦ
  english_pob_choice: with me
  chosen_spanish: conmigo
  alternatives_spanish:
  - conmigo mismo
  lexicon: BDAG
  rationale: «Conmigo» expresa de forma transparente la comunión personal indicada por la preposición con genitivo y preserva el matiz relacional del griego.
- source_word: ἔσῃ
  english_pob_choice: you will be
  chosen_spanish: estarás
  alternatives_spanish:
  - serás
  lexicon: BDAG
  rationale: En español, el futuro de εἰμί en este contexto se comunica de manera más natural con «estarás», que expresa estado o localización junto a Jesús en el lugar prometido.
- source_word: παραδείσῳ
  english_pob_choice: paradise
  chosen_spanish: el paraíso
  alternatives_spanish:
  - paraíso
  - el jardín
  lexicon: BDAG
  rationale: «Paraíso» es el equivalente establecido para παράδεισος en este contexto escatológico. Se mantiene en minúscula como nombre común del lugar bienaventurado, no como nombre propio.
theological_decisions:
- issue: Colocación de «hoy» en una declaración con puntuación interpretativa y consecuencias doctrinales
  english_pob_reading: Attach 'today' to 'you will be with me in paradise'
  chosen_spanish_reading: «hoy» modifica «estarás», no «te digo»
  alternative_spanish_readings:
  - «Hoy» modifica «te digo»
  rationale: 'El griego carece de puntuación moderna, así que la ubicación de «hoy» es interpretativa. La lectura principal sigue la sintaxis más natural y el sentido corriente de la promesa: la presencia con Jesús en el paraíso ocurre ese mismo día. La alternativa se preserva en nota para no borrar la tensión histórica y exegética del pasaje.'
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it; document contested interpretive questions and preserve alternatives in footnotes.'
translation_notes:
  revision_awareness: Coincide con el último pase de revisión del audit trail, que no requirió cambios. La redacción española mantiene la lectura principal documentada y conserva la alternativa interpretativa en nota, conforme al consenso alto del control cruzado.
  spanish_consistency_notes:
  - Se mantiene «paraíso» como término técnico ya establecido para παράδεισος.
  - Se evita «SEÑOR» o sustitución litúrgica no presente en el verso.
  - «En verdad» conserva el valor solemne de Ἀμήν sin transliterarlo.
  - La puntuación española sigue la decisión interpretativa principal, con la variante explicada en nota.
