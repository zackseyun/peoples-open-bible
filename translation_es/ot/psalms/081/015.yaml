revisions:
- from: Dentro de poco[a] someteré a sus enemigos, y volveré mi mano contra sus adversarios[b].
  to: Dentro de poco[a] sometería a sus enemigos, y volvería mi mano contra sus adversarios[b].
  rationale: 'Se cambia el futuro simple a condicional simple para preservar la fuerza contextual documentada por el POB inglés: Dios describe lo que habría hecho por Israel si hubiera escuchado. Se mantiene ''Dentro de poco'' como buena representación de כִּמְעַט, y se conserva el modismo de la mano con español natural. También se limpia el estilo de la nota b sin alterar su contenido esencial.'
