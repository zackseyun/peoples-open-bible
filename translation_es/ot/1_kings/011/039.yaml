  source_alignment_summary: 'El borrador refleja bien el hebreo: וַאעַנֶּה se transmite adecuadamente como «afligiré», זֶרַע דָּוִד como colectivo «la descendencia de David», לְמַעַן זֹאת como causa, y la cláusula final limita la duración del juicio. Sin embargo, la nota al pie está mal anclada y formula como alternativa la misma expresión ya usada en el texto español.'
  spanish_quality_summary: 'El español principal es claro, natural y digno. «Y afligiré la descendencia de David por causa de esto, pero no para siempre» lee bien en español eclesial contemporáneo. El único problema real es editorial: la marca [a] está colocada sobre «afligiré» cuando la nota corresponde a «no para siempre», y la nota debería reflejar la alternativa literal hebrea sin duplicar innecesariamente la redacción del texto principal.'
  glossary_alignment: No hay conflicto con la terminología base del proyecto. Las decisiones «afligiré», «la descendencia de David» y «no para siempre» son coherentes con el audit trail inglés y con buen español. No se requieren ajustes terminológicos mayores.
  issues:
