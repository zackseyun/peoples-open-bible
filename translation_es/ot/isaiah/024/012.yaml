translation:
  language: es
  text: Queda desolación en la ciudad[a], y la puerta es derribada hasta quedar en ruinas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Queda ruina en la ciudad, y la puerta es derribada hasta quedar en ruinas». El hebreo usa dos sustantivos cercanos (שַׁמָּה y שְׁאִיָּה); el texto principal los distingue con una leve diferencia de matiz.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נִשְׁאַ֥ר
  english_pob_choice: is left
  chosen_spanish: queda
  alternatives_spanish:
  - permanece
  - queda detrás
  lexicon: HALOT
  rationale: El nifal de שׁאר expresa lo que queda o permanece tras una devastación. «Queda» reproduce bien la pasividad del hebreo y suena natural en español bíblico contemporáneo.
- source_word: בָּעִיר
  english_pob_choice: in the city
  chosen_spanish: en la ciudad
  alternatives_spanish:
  - en la urbe
  - dentro de la ciudad
  lexicon: HALOT
  rationale: עִיר significa normalmente «ciudad». La preposición local se vierte de forma directa y clara como «en la ciudad».
- source_word: שַׁמָּה
  english_pob_choice: Desolation
  chosen_spanish: Desolación
  alternatives_spanish:
  - destrucción
  - ruina
  - desierto
  lexicon: HALOT
  rationale: 'שַׁמָּה nombra devastación o desolación. En español conviene mantenerlo como sustantivo sujeto: «Desolación queda en la ciudad», siguiendo la fuerza nominal del hebreo.'
- source_word: וּשְׁאִיָּה
  english_pob_choice: into ruins
  chosen_spanish: en ruina
  alternatives_spanish:
  - a ruina
  - en desolación
  - en ruinas
  lexicon: HALOT
  rationale: שְׁאִיָּה es un cercano sinónimo de devastación/ruina. En español, «en ruina» conserva el matiz resultativo sin forzar una paráfrasis más libre.
- source_word: יֻכַּת
  english_pob_choice: is struck down
  chosen_spanish: es derribada
  alternatives_spanish:
  - es golpeada
  - es abatida
  - es abatida por completo
  lexicon: HALOT
  rationale: El hophal de כתת comunica ser golpeado/quebrantado. «Es derribada» preserva la violencia pasiva y encaja con «puerta» en un registro idiomático.
- source_word: שָׁעַר
  english_pob_choice: the gate
  chosen_spanish: la puerta
  alternatives_spanish:
  - la puerta de la ciudad
  - el portón
  lexicon: HALOT
  rationale: שַׁעַר puede ser «puerta» o «puerta/portón de la ciudad». Dado que el verso ya menciona «la ciudad», «la puerta» resulta suficiente y natural en español.
translation_notes:
  revision_awareness: Se siguió el tono formal del texto inglés revisado («struck down to ruin») y se evitó una paráfrasis excesiva; se conservó la repetición semántica de devastación/ruina como rasgo del hebreo, explicándola en nota.
  spanish_consistency_notes:
  - Se mantuvo «ciudad» para עִיר y «puerta» para שַׁעַר, en coherencia con el léxico bíblico básico.
  - Se eligió «Desolación» como sujeto nominal para reflejar la construcción hebrea impersonal sin forzar una reescritura sintáctica.
  - «En ruina» conserva el valor resultativo de וּשְׁאִיָּה sin introducir un giro interpretativo adicional.
