  source_alignment_summary: 'El borrador refleja bien el sentido general del griego: lo planeado por Dios queda listo, hay una respuesta de disponibilidad, los caminos de Dios están preparados y su juicio se relaciona con la πρόγνωσις. Sin embargo, la nota al pie está mal anclada: el marcador [a] aparece en «dispuesto», pero la nota explica «tu juicio está en conocimiento previo». Eso desalineaa la evidencia fuente y la auditoría inglesa.'
