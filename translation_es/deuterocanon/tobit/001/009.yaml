base_translation:
  language: en
  yaml_path: translation/deuterocanon/tobit/001/009.yaml
  text: And when I became a man[a], I took Anna as my wife from the seed of our ancestral family[b], and by her I fathered Tobiah.
  footnotes:
  - marker: a
    text: Or, more smoothly, 'from the lineage of our father's family.' The Greek literally says 'from the seed of our father's family,' emphasizing descent within the paternal line.
    reason: lexical_alternative
  - marker: b
    text: Traditional English often has 'Tobias' here; the Greek name is rendered more directly as 'Tobiah.'
    reason: alternative_reading
