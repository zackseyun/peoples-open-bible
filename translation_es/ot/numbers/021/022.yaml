    issue: «Déjame pasar por tu tierra» suena algo coloquial para una petición diplomática.
    rationale: El cohortativo hebreo expresa una solicitud respetuosa. «Permíteme pasar por tu tierra» conserva mejor ese matiz en español bíblico moderno y digno.
  - severity: medium
    issue: «No nos apartaremos ni a campo ni a viña» es poco idiomático y algo forzado.
    rationale: Aunque intenta reflejar el hebreo, en español la combinación con «apartarse ... a» no suena natural. «No nos desviaremos hacia campo ni viña» preserva mejor la imagen de desviarse del camino hacia terrenos cultivados.
