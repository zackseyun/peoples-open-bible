revisions:
- from: ¿Acaso, en verdad, Dios habitará sobre la tierra? Mira[a], los cielos, aun los cielos de los cielos, no te pueden contener[b]; ¡cuánto menos esta casa[c] que yo he edificado!
  to: Porque, ¿de veras Dios habitará sobre la tierra? He aquí[a], los cielos, aun los cielos más altos, no pueden contenerte[b]; ¡cuánto menos esta casa[c] que yo he edificado!
  rationale: La revisión restaura el conectivo inicial de כִּי con 'Porque', mejora la naturalidad de la pregunta retórica con '¿de veras...?', eleva el registro de הִנֵּה con 'He aquí', y alinea el texto principal con la decisión auditada de expresar el modismo como 'los cielos más altos', dejando la forma literal en nota. También se afina la nota alternativa de 'contener' con una opción más adecuada en español.
  reviewer_model: gpt-5.4
