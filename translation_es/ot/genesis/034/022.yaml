- from: 'Solo con esta condición los hombres se pondrán de acuerdo con nosotros[a], para habitar con nosotros y llegar a ser un solo pueblo: que todo varón entre nosotros sea circuncidado, como ellos están circuncidados.'
  to: 'Solo con esta condición los hombres nos aceptarán[a], para habitar con nosotros y llegar a ser un solo pueblo: que todo varón entre nosotros sea circuncidado, así como ellos están circuncidados.'
  rationale: Se ajusta יֵאֹתוּ a una expresión española más fiel al sentido de consentimiento/aceptación y se corrige la nota para que preserve alternativas reales documentadas por la auditoría inglesa. También se mejora ligeramente la naturalidad de la cláusula comparativa final sin alterar el significado.
