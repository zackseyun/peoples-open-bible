review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el hebreo y el rastro de auditoría en casi todos los puntos: «Oración de David», «Yahvé», «una causa justa», «atiende a mi clamor» y «presta oído a mi oración» son fieles y naturales. La única desviación significativa está en la puntuación/sintaxis final: en hebreo בְּלֹא שִׂפְתֵי מִרְמָה modifica «mi oración» como complemento integrado («mi oración de labios sin engaño / procedente de labios sin engaño»), mientras que la coma en español separa «de labios sin engaño» de manera algo colgante y menos natural.'
  spanish_quality_summary: El español es claro, digno y ampliamente legible. Sin embargo, la coma antes de «de labios sin engaño» produce una lectura algo trabada y menos idiomática. Conviene integrarlo mejor con «mi oración» mediante «que sale de labios sin engaño», que aclara la relación sintáctica y preserva el sentido.
  glossary_alignment: 'Buena alineación con la terminología del proyecto: יהוה → «Yahvé» correctamente; צֶדֶק → «una causa justa» respeta la decisión forense; no hay conflictos con la glosa doctrinal. La nota al pie sobre שִׁמְעָה es aceptable en español, aunque el inglés preserva específicamente la alternativa vinculada a צֶדֶק. Sería mejor trasladar la nota al término «causa justa» para reflejar el audit trail fuente.'
  issues:
  - severity: medium
    issue: 'La frase final está puntuadamente desligada: «mi oración, de labios sin engaño».'
    rationale: El hebreo presenta «from lips without deceit» como descriptor de la oración y de su procedencia. En español, la coma deja un sintagma nominal suelto. Una reformulación como «mi oración que sale de labios sin engaño» o «mi oración, que sale de labios sin engaño» comunica mejor la sintaxis y suena más natural.
  - severity: low
    issue: La nota al pie se ancla en «Escucha» en lugar de reflejar la alternativa documentada para צֶדֶק.
    rationale: El rastro inglés conserva una nota textual importante sobre «Hear righteousness / what is right». Aunque la nota española actual no es errónea, no preserva la misma alternativa significativa del audit trail. Conviene mover la nota a «causa justa» y explicar «O «oye lo que es justo» / «justicia»».
  revised_spanish_text: Oración de David. Escucha, Yahvé, una causa justa[a]; atiende a mi clamor; presta oído a mi oración que sale de labios sin engaño.
