theological_decisions:
- issue: Nature of Jesus' statement about faith and prayer-like speech
  chosen_reading: Render the saying straightforwardly as a conditional promise tied to believing without importing later doctrinal qualifiers into the main text.
  alternative_readings:
  - Interpret as hyperbole only
  - Interpret as an absolute blank-check promise
  rationale: The verse itself presents a vivid, hyperbolic image about faith and does not explicitly articulate later theological constraints or systems. The translation preserves the force of the saying without softening it into mere metaphor or expanding it into an unqualified doctrinal formula.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Generic masculine αὐτοῦ / αὐτῷ
  chosen_reading: Use 'his' and 'him' in the main text.
  alternative_readings:
  - their / them
  rationale: The Greek is grammatically masculine singular with representative generic force. Per doctrine, gender-accurate rendering is preferred over gender-neutral smoothing.
  doctrine_reference: Gender-accurate over gender-neutral.
