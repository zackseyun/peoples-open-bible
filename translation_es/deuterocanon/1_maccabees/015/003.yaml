base_translation:
  language: en
  yaml_path: translation/deuterocanon/1_maccabees/015/003.yaml
  text: Since certain pestilent men seized control of the kingdom of our fathers[a], and I want to reclaim the kingdom so that I may restore it as it was before, I have enlisted a multitude of forces and equipped warships[c][b];
  footnotes:
  - marker: a
    text: Or 'certain plagues seized the kingdom of our fathers'; the Greek uses λοιμοί, literally 'plagues/pestilences,' metaphorically for harmful people.
    reason: lexical_alternative
  - marker: b
    text: Or 'I have recruited many troops' or possibly 'I have levied a body of foreign/hired forces'; the verb can carry a military recruitment nuance.
    reason: lexical_alternative
  - marker: c
    text: '''Equipped warships'' may also be rendered ''prepared'' or ''built warships,'' since the Greek verb can cover making ready as well as constructing.'
    reason: lexical_alternative
