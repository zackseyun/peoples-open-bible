translation:
  language: es
  text: Ahora Rebeca tenía un hermano, y su nombre era Labán; y Labán corrió afuera hacia el hombre[a], junto al manantial.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «al hombre, al manantial». El hebreo repite la preposición «a/hacia» antes de «el hombre» y «el manantial»; en español se expresa con más naturalidad como ubicación: «junto al manantial».'
    reason: previous_rendering
lexical_decisions:
- source_word: וּ/לְ/רִבְקָ֥ה
  english_pob_choice: Now Rebekah had
  chosen_spanish: Ahora Rebeca tenía
  alternatives_spanish:
  - Y Rebeca tenía
  - Ahora para Rebeca había
  lexicon: HALOT
  rationale: La construcción hebrea introduce posesión/existencia de manera idiomática. En español, «tenía» expresa naturalmente la relación posesiva sin forzar una estructura extraña; «Ahora» mantiene el enlace discursivo de waw sin hacerlo mecánico.
- source_word: אָ֖ח
  english_pob_choice: a brother
  chosen_spanish: un hermano
  alternatives_spanish:
  - hermano
  lexicon: HALOT
  rationale: El sustantivo común designa aquí al hermano de Rebeca. Se conserva el artículo indefinido porque es la primera mención en la cláusula y suena natural en español.
- source_word: וּ/שְׁמ֣/וֹ
  english_pob_choice: and his name was
  chosen_spanish: y su nombre era
  alternatives_spanish:
  - y su nombre era llamado
  lexicon: HALOT
  rationale: La fórmula nominal hebrea se expresa con naturalidad en español mediante el verbo copulativo «era»; «su nombre» conserva la estructura relacional sin añadir información.
- source_word: לָבָ֑ן
  english_pob_choice: Laban
  chosen_spanish: Labán
  alternatives_spanish:
  - Laban
  lexicon: Nombre propio
  rationale: 'Se translitera al uso español habitual con acento gráfico: Labán.'
- source_word: וַ/יָּ֨רָץ
  english_pob_choice: ran
  chosen_spanish: corrió
  alternatives_spanish:
  - salió corriendo
  - apresuró su paso
  lexicon: HALOT
  rationale: El sentido básico del verbo es correr. Se evita añadir «salió» al verbo mismo porque la salida ya se expresa por la frase siguiente; así se conserva la fuerza narrativa.
- source_word: אֶל הָ/אִ֛ישׁ
  english_pob_choice: to the man
  chosen_spanish: hacia el hombre
  alternatives_spanish:
  - al hombre
  - hacia el hombre,
  lexicon: HALOT
  rationale: אֶל indica movimiento dirigido a una persona. «Hacia el hombre» conserva el valor direccional y mantiene el sustantivo genérico del hebreo, como en la POB inglesa.
- source_word: הַ/ח֖וּצָ/ה
  english_pob_choice: outside
  chosen_spanish: fuera
  alternatives_spanish:
  - afuera
  - al exterior
  lexicon: HALOT
  rationale: La forma direccional señala movimiento al exterior. «Fuera» funciona de modo natural en español con el verbo de movimiento y preserva el matiz espacial.
- source_word: אֶל הָ/עָֽיִן
  english_pob_choice: by the spring
  chosen_spanish: junto a la fuente
  alternatives_spanish:
  - junto al manantial
  - junto a la fuente
  lexicon: HALOT
  rationale: 'עַיִן designa más propiamente una fuente/spring que un pozo. «Fuente» comunica el valor de manantial de forma clara en español; «junto a» refleja la relación locativa que la revisión inglesa resolvió con «by». '
theological_decisions:
- issue: Mantenimiento del nombre divino y títulos cristológicos
  english_pob_reading: No aplica directamente en este versículo
  chosen_spanish_reading: No aparece aquí ningún término para Yahvé, Dios ni Mesías/Cristo.
  alternative_spanish_readings:
  - —
  rationale: El versículo solo contiene una referencia narrativa a Rebeca, Labán y el hombre. No se introduce terminología teológica que requiera decisión doctrinal especial.
  doctrine_reference: No aplica
- issue: Valor del sustantivo genérico הָאִישׁ
  english_pob_reading: the man
  chosen_spanish_reading: el hombre
  alternative_spanish_readings:
  - el varón
  rationale: Se conserva el sustantivo genérico del hebreo sin identificarlo explícitamente en el texto, siguiendo la prudencia del POB inglés y dejando la identificación contextual para el lector.
  doctrine_reference: Narrativa patriarcal; precisión referencial sin expansión interpretativa
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que añadió el matiz locativo de הַחוּצָה y prefirió una relación espacial más natural en la frase final. Por eso el español incluye «fuera» y «junto a la fuente», sin convertir la segunda preposición en una paráfrasis libre.
  spanish_consistency_notes:
  - Se usa «Labán» con acento gráfico, conforme al uso español.
  - Se emplea «fuente» para עַיִן por su valor de manantial/spring, manteniendo la distinción frente a בְּאֵר 'pozo'.
  - La combinación «corrió hacia el hombre, fuera» preserva tanto el movimiento como la salida al exterior, aun cuando resulte ligeramente marcada; se priorizó la correspondencia con el hebreo.
  - No se sustituyó «el hombre» por una identificación explícita, para respetar el sustantivo genérico del texto base.
