lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: And now
  chosen_spanish: Y ahora
  alternatives_spanish:
  - Ahora
  - Y ahora, pues
  lexicon: HALOT
  rationale: Conserva la transición discursiva inmediata de וְעַתָּה con una forma natural en español. El enlace con la exhortación siguiente se mantiene sin sobretraducir.
- source_word: שִׂימוּ נָא לְבַבְכֶם
  english_pob_choice: please set your heart
  chosen_spanish: por favor, pongan su corazón
  alternatives_spanish:
  - consideren
  - presten atención
  - tengan en cuenta
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'pongan su corazón'. Se conserva la imagen idiomática de atención y reflexión. 'Por favor' refleja נָא como ruego cortés.
- source_word: מִן הַיּוֹם הַזֶּה וָמָעְלָה
  english_pob_choice: from today onward
  chosen_spanish: desde hoy en adelante
  alternatives_spanish:
  - desde este día en adelante
  - desde hoy hacia adelante
  lexicon: HALOT
  rationale: Expresión temporal idiomática que señala un punto de partida y extensión futura. 'En adelante' comunica bien la direccionalidad del hebreo sin calco duro.
- source_word: מִטֶּרֶם
  english_pob_choice: before
  chosen_spanish: antes de que
  alternatives_spanish:
  - antes de
  - previo a que
  lexicon: HALOT
  rationale: Marca anterioridad respecto del evento de construcción. La subordinación con subjuntivo es la opción más natural en español para esta cláusula temporal.
- source_word: שׂוּם אֶבֶן אֶל אֶבֶן
  english_pob_choice: one stone was placed upon another
  chosen_spanish: se pusiera una piedra sobre otra
  alternatives_spanish:
  - se colocara una piedra sobre otra
  - se asentara una piedra sobre otra
  lexicon: HALOT
  rationale: El hebreo describe el acto de construcción de manera idiomática. La imagen de 'una piedra sobre otra' preserva el sentido sin forzar un calco mecánico.
- source_word: בְּהֵיכַל
  english_pob_choice: in the temple
  chosen_spanish: en el templo
  alternatives_spanish:
  - en el santuario
  - en la casa
  lexicon: HALOT
  rationale: En este contexto profético, הֵיכָל se refiere al edificio del templo. 'Templo' es la equivalencia precisa y natural en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
  rationale: Se sigue el estándar del proyecto para el nombre divino, preservando el nombre propio del pacto en lugar de sustituirlo por un título.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  rationale: El texto hebreo emplea explícitamente el Tetragrámaton. La forma 'Yahvé' mantiene el nombre divino en una ortografía española comprensible y acorde con el estándar del proyecto.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: Se tomó en cuenta la auditoría inglesa y su nota lexical sobre שִׂימוּ נָא לְבַבְכֶם. No hubo pasajes revisados en la última pasada, pero el control cruzado marcó observaciones mayores; por eso se mantuvo la imagen hebrea y se evitó normalizarla a un simple 'consideren'.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para יְהוָה conforme al estándar español del proyecto.
  - Se mantiene 'corazón' para לֵב / לְבַב en la metáfora hebrea de atención interior.
  - '''Desde hoy en adelante'' conserva el valor aspectual de avance temporal.'
  - La cláusula final queda abierta porque el versículo continúa la sintaxis hacia el contexto inmediato.
