translation:
  language: es
  text: 'Los hombres de Betel y de Ai: doscientos veintitrés.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: אַנְשֵׁי
  english_pob_choice: The men of
  chosen_spanish: Los hombres de
  alternatives_spanish:
  - La gente de
  - Los habitantes de
  lexicon: HALOT
  rationale: El sustantivo en construcción plural de אִישׁ indica aquí a los varones asociados con estos lugares en un registro censal. "Los hombres de" conserva ese valor masculino y el tono de lista administrativa sin ampliar indebidamente a "gente" o "habitantes".
- source_word: בֵית אֵל
  english_pob_choice: Bethel
  chosen_spanish: Betel
  alternatives_spanish:
  - Bet-el
  lexicon: HALOT
  rationale: Nombre propio de lugar. En español bíblico es natural y fiel transcribirlo como "Betel", manteniendo la identificación geográfica sin traducir el compuesto hebreo.
- source_word: וְהָעָי
  english_pob_choice: and Ai
  chosen_spanish: y de Ai
  alternatives_spanish:
  - y Ai
  - y de la ciudad de Ai
  lexicon: HALOT
  rationale: 'El hebreo lleva artículo con el topónimo, pero en español el nombre establecido es "Ai". Se añade "de" para conservar la coordinación nominal entre los dos lugares y evitar una lectura extraña en español: "de Betel y de Ai".'
- source_word: מָאתַיִם עֶשְׂרִים וּשְׁלֹשָׁה
  english_pob_choice: two hundred twenty-three
  chosen_spanish: doscientos veintitrés
  alternatives_spanish:
  - doscientos y veintitrés
  lexicon: HALOT
  rationale: Cardinal simple. "Doscientos veintitrés" es la forma normal en español moderno y conserva exactamente el valor numérico del texto.
translation_notes:
  revision_awareness: La versión inglesa auditada no introduce notas ni variantes; el texto hebreo también es directo y estable. No se documentan tensiones textuales o teológicas adicionales para este versículo enumerativo.
  spanish_consistency_notes:
  - Se mantiene el registro de lista censal propio de Esdras 2 sin añadir explicaciones interpretativas.
  - Se usa "Betel" como forma española establecida para בֵית אֵל.
  - Se preserva el valor enumerativo exacto del hebreo en el número final.
