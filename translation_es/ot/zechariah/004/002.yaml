translation:
  language: es
  text: 'Y me dijo: «¿Qué ves?». Y yo dije: «Veo, y he aquí, un candelero[a] todo de oro, con su copa encima, y siete lámparas sobre él, y siete y siete conductos[b] para las lámparas que están arriba de él».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «candelabro»; el hebreo מְנוֹרָה designa el soporte de lámparas del santuario.
    reason: lexical_alternative
  - marker: b
    text: O «tubos», «caños» o «canales» para las lámparas.
    reason: lexical_alternative
lexical_decisions:
- source_word: מְנוֹרַת זָהָב
  english_pob_choice: a lampstand all of gold
  chosen_spanish: un candelabro todo de oro
  alternatives_spanish:
  - un candelabro de oro
  - un candelabro completamente de oro
  lexicon: HALOT
  rationale: מְנוֹרָה nombra el objeto del santuario; en español, 'candelabro' comunica con claridad la imagen del soporte de lámparas sin perder el referente cultual. 'Todo de oro' conserva el énfasis de כֻּלָּהּ, mejor que solo 'de oro'.
- source_word: רָאִיתִי
  english_pob_choice: I see
  chosen_spanish: Veo
  alternatives_spanish:
  - He visto
  - Estoy viendo
  lexicon: HALOT
  rationale: En el contexto de visión profética, el perfecto funciona como reporte inmediato de percepción. 'Veo' mantiene la vivacidad narrativa que la POB inglesa preserva con 'I see'.
- source_word: וְהִנֵּה
  english_pob_choice: and behold
  chosen_spanish: y he aquí
  alternatives_spanish:
  - y mira
  - y he aquí
  lexicon: HALOT
  rationale: '''Y he aquí'' reproduce la fuerza deíctica y la solemnidad visionaria de הִנֵּה, sin volver el español artificial.'
- source_word: גֻלָּהּ
  english_pob_choice: its bowl
  chosen_spanish: su copa
  alternatives_spanish:
  - su cuenco
  - su copa
  - su cuenco superior
  lexicon: HALOT
  rationale: El término designa un recipiente redondeado en la parte superior del candelabro; 'copa' es natural en español bíblico y suficientemente preciso. 'Cuenco' es posible, pero 'copa' encaja mejor con el objeto descrito.
- source_word: עַל רֹאשָׁהּ
  english_pob_choice: on top of it
  chosen_spanish: encima de él
  alternatives_spanish:
  - sobre él
  - en su parte superior
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente 'sobre su cabeza'; 'encima de él' conserva la relación espacial con un español fluido y claro.
- source_word: שִׁבְעָה נֵרֹתֶיהָ עָלֶיהָ
  english_pob_choice: seven lamps on it
  chosen_spanish: siete lámparas sobre él
  alternatives_spanish:
  - siete lámparas en él
  - siete lámparas sobre su copa
  lexicon: HALOT
  rationale: '''Sobre él'' refleja la ubicación de las lámparas respecto del candelabro y mantiene la correspondencia con el texto fuente.'
- source_word: שִׁבְעָה וְשִׁבְעָה
  english_pob_choice: seven and seven
  chosen_spanish: siete y siete
  alternatives_spanish:
  - siete cada uno
  - siete por siete
  lexicon: HALOT
  rationale: Se conserva la repetición literal para dejar visible la forma distributiva/enfática del hebreo, tal como hace la POB inglesa.
- source_word: מֽוּצָק֔וֹת
  english_pob_choice: pipes
  chosen_spanish: conductos
  alternatives_spanish:
  - tubos
  - caños
  - conductos
  lexicon: HALOT
  rationale: '''מֽוּצָק֔וֹת'' apunta a piezas por las que se conduce el suministro hacia las lámparas. ''Conductos'' es un término comprensible, neutro y suficientemente técnico sin fijar indebidamente la forma física.'
- source_word: לַנֵּרוֹת אֲשֶׁר עַל רֹאשָׁהּ
  english_pob_choice: for the lamps that are on top of it
  chosen_spanish: para las lámparas que están en la parte superior de él
  alternatives_spanish:
  - para las lámparas que están sobre él
  - para las lámparas que están encima de él
  lexicon: HALOT
  rationale: La frase identifica el destino de los conductos y sitúa las lámparas en la parte superior del candelabro. 'En la parte superior de él' evita ambigüedad referencial y preserva el sentido locativo.
translation_notes:
  revision_awareness: La versión inglesa revisada cambió 'spouts' por 'pipes' por considerarlo más natural y exacto para los canales que alimentan las lámparas. La redacción española sigue esa revisión con 'conductos', manteniendo abierta la posibilidad de otras soluciones léxicas sin perder la imagen técnica.
  spanish_consistency_notes:
  - Se usa 'Yahvé' en otros pasajes del proyecto cuando corresponde el nombre divino; aquí no aparece el Tetragrámaton.
  - Se mantiene 'candelabro' en el cuerpo principal por ser el equivalente más claro y reconocido para מְנוֹרָה, con nota alternativa 'candelero'.
  - Se conserva la repetición 'siete y siete' para reflejar el hebreo literal y la decisión auditada de la POB inglesa.
  - No se introduce lenguaje doctrinal adicional; la imagen permanece descriptiva y visionaria.
