  text: עַל כֵּ֗ן אָלָה֙ אָ֣כְלָה אֶ֔רֶץ וַֽ/יֶּאְשְׁמ֖וּ יֹ֣שְׁבֵי בָ֑/הּ עַל כֵּ֗ן חָרוּ֙ יֹ֣שְׁבֵי אֶ֔רֶץ וְ/נִשְׁאַ֥ר אֱנ֖וֹשׁ מִזְעָֽר־־׃
base_translation:
  language: en
  yaml_path: translation/ot/isaiah/024/006.yaml
  text: Therefore a curse has devoured the earth[a], and those who dwell in it bear their guilt; therefore the inhabitants of the earth are scorched[c][b], and few men are left.
  footnotes:
  - marker: a
    text: Or 'an oath has consumed the earth'; the Hebrew word can mean 'oath' or 'curse,' but in this context of violated covenant and resulting judgment, 'curse' best fits.
    reason: lexical_alternative
  - marker: b
    text: Or 'the land' / 'the inhabitants of the land' if taken in a more localized sense; here it is rendered 'earth' because the chapter's scope appears universal.
    reason: alternative_reading
  - marker: c
    text: Hebrew 'men' (collective), that is, human beings; the term emphasizes mortal humanity.
    reason: lexical_alternative
