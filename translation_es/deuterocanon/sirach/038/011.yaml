translation:
  language: es
  text: Presenta una ofrenda memorial de aroma suave[b][a], y enriquece la ofrenda dispuesta con lo mejor de tus bienes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: ''Presenta una ofrenda memorial agradable, y enriquece la ofrenda dispuesta con las alas de tu riqueza''. La expresión ''con las alas de tu riqueza'' es idiomática y probablemente significa dar de lo más escogido o de la mayor abundancia de tus bienes.'
    reason: lexical_alternative
  - marker: b
    text: 'El griego paralelo dice: ''Da fragancia y memorial de flor de harina, y haz rica la ofrenda, como quien no existe''—con una frase final sustancialmente diferente. Aquí se sigue el testimonio hebreo, usando el griego como control para el sentido sacrificial.'
    reason: alternative_reading
lexical_decisions:
- source_word: δὸς / הגש
  english_pob_choice: Present
  chosen_spanish: Presenta
  alternatives_spanish:
  - Trae
  - Ofrece
  - Acerca
  lexicon: HALOT; LXX εἰσφέρω/δίδωμι en contexto cultual
  rationale: En contexto sacrificial, el imperativo pide llevar o presentar una ofrenda. 'Presenta' suena natural en español y conserva la fuerza cultual sin volverlo demasiado coloquial.
- source_word: εὐωδίαν / ניחוח
  english_pob_choice: soothing aroma
  chosen_spanish: aroma suave
  alternatives_spanish:
  - aroma agradable
  - fragancia suave
  - olor grato
  lexicon: LSJ; HALOT
  rationale: La frase griega expresa fragancia/aroma, mientras que el hebreo habla de aceptabilidad aromática. 'Aroma suave' comunica el valor olfativo y la idea de algo grato sin sobrecargar el verso con una explicación.
- source_word: μνημόσυνον / אזכרה
  english_pob_choice: memorial offering
  chosen_spanish: ofrenda memorial
  alternatives_spanish:
  - ofrenda de recuerdo
  - ofrenda para memoria
  - porción memorial
  lexicon: LSJ; HALOT
  rationale: '''Memorial'' preserva el lenguaje cultual y la relación con μνημόσυνον/אזכרה. En español, ''ofrenda memorial'' es claro y mantiene el carácter sacrificial que el inglés auditado también conservó.'
- source_word: σεμιδάλεως / (hebreo implícito de ofrenda cereal)
  english_pob_choice: memorial offering of soothing aroma
  chosen_spanish: ofrenda memorial de aroma suave
  alternatives_spanish:
  - ofrenda memorial de flor de harina
  - memorial de harina fina
  - ofrenda de harina refinada
  lexicon: LSJ; contextual sacrificial terminology
  rationale: El texto griego especifica 'de flor de harina', pero el hebreo transmitido es más general. Como el audit trail inglés siguió la línea hebrea y trató el griego como testimonio de control, el español conserva la generalidad de la ofrenda memorial sin añadir un detalle que no está firme en el hebreo base.
- source_word: λίπανον προσφοράν / ודשן ערוך
  english_pob_choice: enrich the arranged offering
  chosen_spanish: enriquece la ofrenda preparada
  alternatives_spanish:
  - engorda la ofrenda dispuesta
  - haz rica la ofrenda arreglada
  - enriquece la ofrenda dispuesta
  lexicon: HALOT; LSJ
  rationale: El hebreo y el griego convergen en la idea de hacer abundante o rica la ofrenda; 'preparada' reproduce el valor de ערוך ('puesta en orden / dispuesta') con un español más natural que 'arreglada' en este contexto ritual.
- source_word: ὡς μὴ ὑπάρχων / בכנפי הוניך
  english_pob_choice: with the best of your wealth
  chosen_spanish: con lo mejor de tus bienes
  alternatives_spanish:
  - con la abundancia de tus bienes
  - con la flor de tus bienes
  - de la plenitud de tus bienes
  lexicon: HALOT; idiomática
  rationale: El hebreo literal habla de 'las alas de tus bienes', un modismo para la parte extrema o mejor; el griego ofrece otra línea textual distinta. 'Con lo mejor de tus bienes' expresa con fidelidad la idea idiomática documentada por el audit trail inglés sin forzar un hebraísmo opaco.
theological_decisions:
- issue: Mantener el lenguaje sacrificial en una exhortación sapiencial
  english_pob_reading: Retain explicit sacrificial language ('memorial offering') rather than generalizing to prayer or piety.
  chosen_spanish_reading: Conservar 'ofrenda memorial' y 'ofrenda preparada' en lugar de espiritualizar el verso.
  alternative_spanish_readings:
  - Reducirlo a 'memorial'
  - Convertirlo en una exhortación general sobre piedad
  rationale: Tanto el hebreo como el griego usan vocabulario de ofrenda. El español mantiene esa textura teológica porque el verso habla realmente en categorías cúlticas y no solo en términos devocionales generales.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 3, 6
- issue: Relación entre el hebreo base y la variante griega al final del versículo
  english_pob_reading: The Hebrew witness is followed here, with the Greek used as a consistency check for the sacrificial sense.
  chosen_spanish_reading: Seguir el sentido del hebreo testimoniado y usar el griego como control semántico, sin importar su frase final discordante.
  alternative_spanish_readings:
  - Seguir la finalización griega 'como si no existieras'
  - Harmonizar ambas lecturas en una paráfrasis
  rationale: 'La tradición auditada del POB favorece el hebreo aquí, mientras reconoce la divergencia final del griego. En español se preserva esa decisión: no se introduce la frase griega porque no está apoyada por el testimonio hebreo base usado en el registro.'
  doctrine_reference: DOCTRINE.md Translation philosophy §§2, 5
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del audit trail inglés, que afinó 'soothing aroma' y reemplazó una formulación más áspera para la parte media del verso. El español adopta esa línea revisada al preferir 'aroma suave' y 'ofrenda preparada', manteniendo la base hebrea y señalando la divergencia del final en nota.
  spanish_consistency_notes:
  - Se usa 'ofrenda' para mantener la textura cultual del pasaje, no 'tributo' ni 'don'.
  - '''Memorial'' se conserva como término técnico, evitando reemplazarlo por ''recuerdo'' por ser demasiado genérico.'
  - '''Bienes'' traduce הון con naturalidad en español y evita tanto ''posesiones'' como ''riqueza'' por ser más ambiguos aquí.'
  - No se incorporó 'flor de harina' al texto principal porque la base hebrea auditada no la explicita, aunque el griego sí la sugiere.
