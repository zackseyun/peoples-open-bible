review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el griego: ἓν ἐκ τῶν τεσσάρων ζῴων = «uno de los cuatro seres vivientes», ἔδωκεν = «dio», τοῖς ἑπτὰ ἀγγέλοις = «a los siete ángeles», γεμούσας τοῦ θυμοῦ τοῦ θεοῦ = «llenas de la ira de Dios», y τοῦ ζῶντος εἰς τοὺς αἰῶνας τῶν αἰώνων = «que vive por los siglos de los siglos». La única desviación significativa está en la nota a: repite la lectura principal «copas de oro» como si fuera alternativa, en vez de reflejar las alternativas auditadas («viales», «tazones/basijas») y la explicación de φιάλη como recipiente semejante a un cuenco/copa.'
  spanish_quality_summary: El español principal es claro, natural y digno. «Seres vivientes», «copas de oro», «ira de Dios» y «por los siglos de los siglos» son plenamente legibles en registro bíblico moderno. La nota b es innecesariamente débil porque convierte en alternativa exacta la misma idea ya presente en el texto («llenas» / «llenas de»), pero no daña el sentido. La corrección necesaria es sobre todo de precisión en las notas.
  glossary_alignment: 'No hay conflicto con la terminología del proyecto: θεοῦ = «Dios», θυμοῦ = «ira», y no hay términos como Yahvé/Mesías que requieran ajuste. «Seres vivientes» concuerda con la decisión documentada para ζῷον en Apocalipsis. «Copas» es aceptable para φιάλας, con alternativas en nota.'
  issues:
  - severity: medium
    issue: La nota [a] no preserva correctamente las alternativas léxicas documentadas para φιάλη.
    rationale: La nota dice «O “copas de oro”, “viales de oro” o “tazones de oro”», pero «copas de oro» no es alternativa sino la lectura principal. Debe listar alternativas reales y explicar el valor de recipiente tipo cuenco/copa.
  - severity: low
    issue: La nota [b] es poco útil y formula como alternativa algo prácticamente idéntico al texto principal.
    rationale: El texto ya dice «llenas de». Decir «O “llenas de”» no añade información relevante; conviene reemplazarla por una alternativa real como «colmadas de» o eliminarla.
  revised_spanish_text: Y uno de los cuatro seres vivientes dio a los siete ángeles siete copas de oro[a], llenas[b] de la ira de Dios, que vive por los siglos de los siglos[c].
  revised_footnotes:
  - marker: a
    text: O «siete viales de oro» o «siete tazones de oro»; el término griego denota una vasija semejante a un cuenco o una copa.
    reason: lexical_alternative
  - marker: b
    text: O «colmadas de»; el participio griego expresa que las copas están llenas.
    reason: lexical_alternative
  - marker: c
    text: Literalmente, «a los siglos de los siglos».
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal, que es fiel y natural, pero se corrigen las notas para reflejar con precisión las alternativas léxicas auditadas y evitar una nota redundante en [b].
