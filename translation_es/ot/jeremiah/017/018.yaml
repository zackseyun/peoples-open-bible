translation:
  language: es
  text: Sean avergonzados mis perseguidores[a], pero yo no sea avergonzado; queden consternados ellos, pero yo no quede consternado. Trae sobre ellos un día de desastre[b][c], y rómpelos con doble quebranto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los que me persiguen». El hebreo literalmente significa «los que me persiguen».
    reason: lexical_alternative
  - marker: b
    text: O «un día de calamidad». La frase se refiere a un día de juicio o ruina, no a mal moral.
    reason: lexical_alternative
  - marker: c
    text: Literalmente, «rómpelos con un doble quebranto».
    reason: lexical_alternative
lexical_decisions:
- source_word: יֵבֹשׁוּ / אֵבֹשָׁה
  english_pob_choice: be put to shame
  chosen_spanish: sean avergonzados / no sea avergonzado
  alternatives_spanish:
  - se avergüencen / yo no me avergüence
  - sean puestos en vergüenza / yo no sea puesto en vergüenza
  lexicon: HALOT
  rationale: בושׁ puede expresar vergüenza, deshonra o confusión. En español, la forma pasiva "ser avergonzado" conserva la fuerza pública de la humillación y mantiene el paralelo con el ruego del hablante.
- source_word: רֹדְפַי
  english_pob_choice: my pursuers
  chosen_spanish: mis perseguidores
  alternatives_spanish:
  - mis perseguidores en pos de mí
  - los que me persiguen
  lexicon: HALOT
  rationale: El hebreo significa literalmente "los que me persiguen". "Mis perseguidores" mantiene la imagen concreta y permite una lectura más amplia que no limita innecesariamente el término al ámbito penal o religioso.
- source_word: יֵחַתּוּ / אֵחַתָּה
  english_pob_choice: be dismayed
  chosen_spanish: sean aterrados / yo no sea aterrado
  alternatives_spanish:
  - sean consternados / yo no sea consternado
  - sean quebrantados / yo no sea quebrantado
  lexicon: HALOT
  rationale: חתת en nifal puede expresar quedar consternado, desanimado o aterrorizado. "Aterrados" comunica bien la caída emocional y el colapso interior sin volverlo una mera fractura física.
- source_word: הָבִיא
  english_pob_choice: Bring upon them
  chosen_spanish: Trae sobre ellos
  alternatives_spanish:
  - Haz venir sobre ellos
  - Lanza sobre ellos
  lexicon: HALOT
  rationale: El hiphil de בוא con על expresa hacer venir algo sobre alguien. "Trae sobre ellos" es natural en español y conserva la dirección de la súplica a Dios.
- source_word: יוֹם רָעָה
  english_pob_choice: a day of disaster
  chosen_spanish: un día de desastre
  alternatives_spanish:
  - un día de calamidad
  - un día de ruina
  lexicon: HALOT
  rationale: Aquí רָעָה no apunta a mal moral, sino a calamidad, ruina o juicio. "Desastre" transmite el carácter de juicio y quebranto en español actual.
- source_word: מִשְׁנֶה
  english_pob_choice: double
  chosen_spanish: doble
  alternatives_spanish:
  - en doble medida
  - con duplicación
  lexicon: HALOT
  rationale: מִשְׁנֶה intensifica el sustantivo siguiente con la idea de duplicidad. "Doble" es la forma más concisa y fiel en español.
- source_word: שִׁבָּרוֹן
  english_pob_choice: destruction
  chosen_spanish: quebranto
  alternatives_spanish:
  - destrucción
  - ruina
  - quebradura
  lexicon: HALOT
  rationale: El sustantivo deriva de la idea de quebrar. En español, "quebranto" conserva el campo semántico de ruptura y dolor, aunque "destrucción" también sería posible; se elige para reflejar el eco con el verbo siguiente.
- source_word: שָׁבְרֵם
  english_pob_choice: shatter them
  chosen_spanish: rómpelos
  alternatives_spanish:
  - quiébralos
  - destrúyelos
  lexicon: HALOT
  rationale: שׁבר significa literalmente "romper". "Rómpelos" preserva la metáfora física y la repetición léxica con שִׁבָּרוֹן, evitando suavizar la imagen de juicio.
theological_decisions:
- issue: Petición imprecatoria de juicio
  english_pob_reading: Render the verse as Jeremiah's direct prayer for divine judgment on his enemies without softening its force.
  chosen_spanish_reading: Presentar el versículo como una oración directa de Jeremías pidiendo juicio divino sobre sus enemigos, sin atenuar su intensidad.
  alternative_spanish_readings:
  - Convertirlo en un deseo general de vindicación
  - Suavizarlo como mera advertencia profética
  rationale: El hebreo usa jussivos e imperativos dirigidos a Dios. La traducción debe conservar la tensión teológica de una oración profética que busca vindicación personal y justicia divina, no resolverla ni suavizarla.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el texto sigue el mismo acuerdo alto del control cruzado, sin modificaciones pendientes.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma por defecto para el nombre divino cuando aparezca en el contexto inmediato; en este versículo no aparece.
  - Se conserva la distinción entre vergüenza pública y desánimo/terror interno con verbos distintos para cada par paralelo.
  - «Mis perseguidores» preserva la imagen verbal concreta del hebreo y evita restringir el sentido a un tecnicismo.
  - La cadencia paralela del hebreo se refleja con dos cláusulas negativas repetidas y un cierre con imagen intensiva de quebranto.
