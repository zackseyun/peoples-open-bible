translation:
  language: es
  text: Abrió la roca[a], y las aguas brotaron; fluyeron por los lugares secos como un río.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «fluyeron por los lugares secos, un río». El hebreo puede leerse más literalmente sin el «como», pero en español probablemente se entiende mejor como una comparación.'
    reason: lexical_alternative
lexical_decisions:
- source_word: פָּתַח
  english_pob_choice: opened
  chosen_spanish: abrió
  alternatives_spanish:
  - abrió de par en par
  - abrió violentamente
  lexicon: HALOT
  rationale: El verbo básico significa abrir. En español, «abrió» preserva la imagen sin añadir fuerza que el hebreo no exige.
- source_word: צוּר
  english_pob_choice: the rock
  chosen_spanish: la peña
  alternatives_spanish:
  - la roca
  - el peñasco
  lexicon: HALOT
  rationale: El contexto alude a la roca del desierto. «Peña» mantiene el referente pétreo y suena natural en español bíblico sin volverlo demasiado técnico.
- source_word: וַיָּזֻבוּ
  english_pob_choice: gushed out
  chosen_spanish: brotaron
  alternatives_spanish:
  - manaron
  - salieron a raudales
  lexicon: HALOT
  rationale: El verbo comunica salida abundante y repentina de agua. «Brotaron» conserva esa fuerza con buena naturalidad en español.
- source_word: מָיִם
  english_pob_choice: water
  chosen_spanish: las aguas
  alternatives_spanish:
  - agua
  lexicon: HALOT
  rationale: Aunque en inglés POB se usa singular mass-noun, el hebreo verbal plural y la revisión auditada favorecen tratarlo como plural colectivo. «Las aguas» permite concordancia con el verbo siguiente y mantiene el sentido.
- source_word: הָלְכוּ
  english_pob_choice: they flowed
  chosen_spanish: pasaron
  alternatives_spanish:
  - fluyeron
  - iban
  lexicon: HALOT
  rationale: Literalmente es «fueron/anduvieron», pero en este contexto se refiere al recorrido del agua. «Pasaron» evita un calco duro y expresa el movimiento a través de los lugares secos.
- source_word: בַּצִּיּוֹת
  english_pob_choice: through the dry places
  chosen_spanish: por los parajes secos
  alternatives_spanish:
  - por los desiertos
  - en los lugares áridos
  lexicon: HALOT
  rationale: El término describe zonas secas o áridas. «Parajes secos» es amplio y fiel, sin restringir innecesariamente a «desiertos».
- source_word: נָהָר
  english_pob_choice: like a river
  chosen_spanish: como un río
  alternatives_spanish:
  - cual río
  lexicon: HALOT
  rationale: La última palabra funciona comparativamente en el contexto poético. «Como un río» expresa con claridad la abundancia y mantiene la imagen retórica.
theological_decisions:
- issue: Provisión divina en la tradición del éxodo
  english_pob_reading: A historical-poetic description of God causing water to come from the rock for Israel.
  chosen_spanish_reading: Una descripción histórica y poética de la provisión de Dios al hacer salir agua de la peña para Israel.
  alternative_spanish_readings:
  - Una metáfora general de provisión divina
  rationale: El salmo rememora la historia de Israel, no solo una imagen abstracta. La redacción española conserva el evento histórico y su fuerza teológica implícita.
  doctrine_reference: Éxodo 17:6; Números 20:11; Salmo 78:15-16
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión auditada del inglés POB, especialmente el cambio de «it flowed» a «they flowed» para concordar con el plural implícito de «las aguas». Esa decisión se reflejó en español con plural explícito y verbo en plural.
  spanish_consistency_notes:
  - Se mantuvo un tono bíblico claro y contemporáneo, evitando el calco de «fueron» en favor de una expresión natural.
  - «Peña» se eligió como equivalente reverente y comprensible de צוּר, coherente con el contexto de provisión en el desierto.
  - La comparación final se resolvió con «como un río» para no oscurecer el valor poético del hebreo.
