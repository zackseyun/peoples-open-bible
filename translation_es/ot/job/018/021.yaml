    rationale: 'El inglés preserva una alternativa de estructura: «Or ''the place of him who does not know God.''» En español, la nota actual «O ‘el lugar de quien no conoce a Dios’» no señala claramente una variante frente al texto principal y queda casi redundante. Debe reflejar una alternativa real de formulación.'
  - severity: low
