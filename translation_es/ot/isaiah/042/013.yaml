base_translation:
  language: en
  yaml_path: translation/ot/isaiah/042/013.yaml
  text: Yahweh goes out like a mighty warrior[a]; like a man of war he stirs up zeal. He shouts, yes, he raises a battle cry[c][b]; over his enemies he shows himself mighty.
  footnotes:
  - marker: a
    text: Or 'he arouses jealousy' for 'he stirs up zeal.' The Hebrew קִנְאָה can denote either zeal or jealousy, especially in covenantal contexts.
    reason: lexical_alternative
  - marker: b
    text: Or 'against his enemies he prevails.' The final clause may be rendered more dynamically to emphasize victory.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'like a man of wars'; that is, a warrior experienced in battle.
    reason: cultural_note
