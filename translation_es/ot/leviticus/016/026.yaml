translation:
  language: es
  text: El que envía el macho cabrío a Azazel[a] lavará su ropa y bañará su cuerpo en agua, y después podrá entrar en el campamento.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para Azazel»; el término hebreo es disputado. Puede entenderse como un nombre o designación propia, o interpretarse de modo más funcional como referido a la remoción o al llamado «chivo expiatorio».
    reason: alternative_reading
lexical_decisions:
- source_word: וְהַמְשַׁלֵּחַ
  english_pob_choice: The one who sends ... away
  chosen_spanish: El que envía...
  alternatives_spanish:
  - El que despacha...
  - La persona que envía...
  lexicon: HALOT
  rationale: El participio con artículo funciona como sustantivo; en español, 'el que envía' conserva la referencia a la persona encargada de la acción sin forzar una forma verbal finita.
- source_word: הַשָּׂעִיר
  english_pob_choice: the goat
  chosen_spanish: el macho cabrío
  alternatives_spanish:
  - el cabrito
  - el chivo
  lexicon: HALOT
  rationale: En el contexto ritual, 'macho cabrío' expresa mejor el valor específico del término que el genérico 'goat' o un simple 'chivo', y mantiene la referencia sacrificial.
- source_word: לַעֲזָאזֵל
  english_pob_choice: to Azazel
  chosen_spanish: a Azazel
  alternatives_spanish:
  - para Azazel
  - para la remoción
  lexicon: HALOT
  rationale: Se translitera el término como designación propia para preservar la ambigüedad lexical y teológica documentada en el texto fuente, en vez de resolverla interpretativamente.
- source_word: יְכַבֵּס בְּגָדָיו
  english_pob_choice: shall wash his clothes
  chosen_spanish: lavará sus vestidos
  alternatives_spanish:
  - deberá lavar sus vestidos
  - lavará sus ropas
  lexicon: HALOT
  rationale: La expresión ritual se vierte de forma directa y formal. 'Vestidos' es un equivalente bíblico natural en español y conserva el paralelismo legal.
- source_word: וְרָחַץ אֶת בְּשָׂרֹו בַּמָּיִם
  english_pob_choice: and bathe his body in water
  chosen_spanish: y lavará su cuerpo en agua
  alternatives_spanish:
  - y se bañará en agua
  - y lavará su carne en agua
  lexicon: HALOT
  rationale: '''Cuerpo'' comunica con claridad el acto de purificación ritual en español moderno; ''carne'' sería más literal pero menos natural aquí, y ''bañarse'' podría sonar menos formal/legal.'
- source_word: וְאַחֲרֵי כֵן
  english_pob_choice: and afterward
  chosen_spanish: y después
  alternatives_spanish:
  - y luego
  - y después de eso
  lexicon: HALOT
  rationale: '''Y después'' es una secuencia temporal breve y natural, adecuada para el estilo legal del versículo.'
- source_word: יָבֹא אֶל הַמַּחֲנֶה
  english_pob_choice: he may come into the camp
  chosen_spanish: podrá entrar en el campamento
  alternatives_spanish:
  - podrá venir al campamento
  - podrá entrar al campamento
  lexicon: HALOT
  rationale: El imperfecto final expresa permiso/reentrada después de la purificación. 'Podrá entrar' capta ese valor mejor que un mandato simple; 'campamento' es el equivalente normal de הַמַּחֲנֶה.
theological_decisions:
- issue: Sentido de לַעֲזָאזֵל en el rito del Día de la Expiación
  english_pob_reading: 'Treat as a proper designation and transliterate: ''to Azazel'''
  chosen_spanish_reading: 'Transliterar: ''a Azazel'''
  alternative_spanish_readings:
  - para Azazel
  - para la remoción
  - al chivo expiatorio
  rationale: El hebreo es disputado y el texto no lo explica. Mantener la transliteración preserva la tensión documental sin imponer una interpretación demonológica, funcional o tipológica en el texto principal.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'El texto español sigue de cerca la decisión auditada de la POB inglesa: participio sustantivado, transliteración de עֲזָאזֵל, y el imperfecto final con valor de permiso tras la purificación. No se detectaron revisiones posteriores que alteren la lectura de trabajo.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' como norma general solo cuando el texto hebreo lo requiera explícitamente; en este versículo no aparece el Tetragrámaton.
  - '''Macho cabrío'' mantiene la especificidad sacrificial del hebreo sin introducir explicación adicional.'
  - '''Campamento'' conserva el marco ritual del desierto y evita una modernización no sustentada.'
