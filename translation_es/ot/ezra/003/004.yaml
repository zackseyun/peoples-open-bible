translation:
  language: es
  text: Celebraron la Fiesta de las Cabañas[a] como está escrito, y ofrecieron los holocaustos día por día, conforme al número, de acuerdo con la norma, como requería cada día.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, de manera más tradicional, «Fiesta de los Tabernáculos». El hebreo dice literalmente «Cabañas».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲשׂוּ
  english_pob_choice: They kept
  chosen_spanish: Celebraron
  alternatives_spanish:
  - obedecieron
  - observaron
  - guardaron
  lexicon: HALOT
  rationale: En contexto festivo/cultual, עשה con un objeto como חַג no significa simplemente 'hacer', sino celebrar/observar la fiesta. 'Celebraron' comunica naturalmente el sentido ritual y mantiene la acción comunitaria.
- source_word: חַג הַסֻּכּוֹת
  english_pob_choice: the Festival of Booths
  chosen_spanish: la Fiesta de las Cabañas
  alternatives_spanish:
  - la Fiesta de los Tabernáculos
  - la Fiesta de las Tiendas
  - la Fiesta de las Enramadas
  lexicon: HALOT
  rationale: '''סֻכּוֹת'' literalmente es ''cabañas/booths''. Se conserva la imagen hebrea en español con ''Cabañas'', coherente con la decisión inglesa de evitar el término tradicionalizante ''Tabernáculos'' como equivalencia principal.'
- source_word: כַּכָּתוּב
  english_pob_choice: as it is written
  chosen_spanish: como está escrito
  alternatives_spanish:
  - según está escrito
  - tal como está escrito
  lexicon: HALOT
  rationale: Fórmula idiomática de conformidad con una prescripción escrita. 'Como está escrito' es natural y conserva la autoridad textual implícita.
- source_word: וְעֹלַת
  english_pob_choice: and offered the ... burnt offerings
  chosen_spanish: y ofrecieron los holocaustos
  alternatives_spanish:
  - y ofrecieron el holocausto
  - y presentaron los holocaustos
  lexicon: HALOT
  rationale: עֹלָה es el sacrificio totalmente quemado; en español bíblico 'holocausto' expresa bien ese sentido cultual. Se usa plural porque la construcción distributiva del versículo abarca ofrendas repetidas en el marco de los días sucesivos.
- source_word: יוֹם בְּיוֹם
  english_pob_choice: day by day
  chosen_spanish: día por día
  alternatives_spanish:
  - diariamente
  - cada día
  lexicon: HALOT
  rationale: Se preserva la repetición distributiva del hebreo con una expresión rítmica y transparente. 'Día por día' refleja mejor la secuencia insistente que un adverbio más compacto.
- source_word: בְּמִסְפָּר
  english_pob_choice: by number
  chosen_spanish: según el número
  alternatives_spanish:
  - en número
  - de acuerdo con el número
  lexicon: HALOT
  rationale: 'La idea es cuantitativa y regulada: las ofrendas se presentaban en la cantidad prescrita. ''Según el número'' es comprensible y conserva la referencia al conteo determinado.'
- source_word: כְּמִשְׁפַּט
  english_pob_choice: according to the ordinance
  chosen_spanish: conforme al estatuto
  alternatives_spanish:
  - según el mandato
  - de acuerdo con la norma
  lexicon: HALOT
  rationale: מִשְׁפָּט aquí tiene sentido normativo/cultual. 'Estatuto' evita la ambigüedad de 'juicio' y mantiene el matiz de reglamentación prescrita.
- source_word: דְּבַר יוֹם בְּיוֹמוֹ
  english_pob_choice: as each day required
  chosen_spanish: según lo que correspondía a cada día
  alternatives_spanish:
  - según el requerimiento de cada día
  - como requería cada día
  lexicon: HALOT
  rationale: El hebreo expresa la porción o requisito propio de cada jornada. En español, una construcción más literal sonaría forzada; esta opción conserva la idea de lo debido/prescrito para cada día sin perder precisión.
theological_decisions:
- issue: Nombre de la festividad סֻכּוֹת
  english_pob_reading: Festival of Booths, with a footnote noting the more traditional 'Tabernacles'
  chosen_spanish_reading: Fiesta de las Cabañas, con nota sobre la alternativa tradicional 'Fiesta de los Tabernáculos'
  alternative_spanish_readings:
  - Fiesta de los Tabernáculos
  - Fiesta de las Enramadas
  rationale: Se prioriza la transparencia al hebreo, manteniendo la imagen concreta de 'booths/cabañas'. La alternativa tradicional se conserva en nota para lectores familiarizados con el nombre eclesial más usual.
  doctrine_reference: Levítico 23:34-43; Deuteronomio 16:13-15
- issue: Sentido de las ofrendas sacrificiales
  english_pob_reading: burnt offerings day by day by number, according to the ordinance
  chosen_spanish_reading: ofrecieron los holocaustos día por día, según el número, conforme al estatuto
  alternative_spanish_readings:
  - ofrecieron las ofrendas quemadas cada día, según el número, conforme al mandato
  rationale: Se conserva el lenguaje sacrificial técnico. 'Holocaustos' refleja el sentido de עֹלָה como ofrenda completamente quemada, sin diluir el registro cultual del texto.
  doctrine_reference: Éxodo 29; Levítico 1; Números 28-29
translation_notes:
  revision_awareness: 'La redacción sigue el pasaje hebreo con alta concordancia respecto al audit trail inglés: mantiene la estructura festiva + conformidad escritural + ofrenda diaria regulada, y preserva la tensión terminológica de סֻכּוֹת mediante una equivalencia transparente con nota alternativa tradicional. También evita traducir mecánicamente el inglés en el tramo final, optando por una formulación española natural que conserva la fuerza distributiva de יוֹם בְּיוֹם y la idea normativa de כְּמִשְׁפַּט דְּבַר י֥וֹם בְּיוֹמוֹ.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto lo requiere; este versículo no contiene el tetragrámaton.
  - '''Holocaustos'' se mantiene por coherencia cultual, no como término moderno de tragedia humana.'
  - La nota al pie preserva la alternativa tradicional sin reemplazar la traducción principal.
  - '''Fiesta'' se prefiere aquí sobre ''Festival'' por naturalidad en español bíblico y para mantener un registro digno pero fluido.'
