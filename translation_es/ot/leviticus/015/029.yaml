review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el hebreo y el rastro inglés: mantiene la secuencia legal temporal, el matiz reflexivo de לָהּ con «para sí», las dos opciones de aves, y la doble meta del movimiento hacia el sacerdote y hacia la entrada de la tienda de reunión. Sin embargo, «los traerá» es menos preciso que «los llevará»/«los llevará…» desde la perspectiva deíctica del hebreo אֶל; además, la nota al pie está mal anclada y su contenido no corresponde al lugar de variación.'
  spanish_quality_summary: El español es generalmente claro y digno. «Tórtolas» y «sacerdote» son adecuados; «tienda de reunión» es una solución comprensible. «Pichones» es entendible, pero en registro bíblico más amplio y neutral «pichones de paloma» o «pichones» puede variar regionalmente; aquí puede mantenerse por brevedad. La principal reparación necesaria es de precisión verbal y de disciplina de nota al pie.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. No aparecen Yahvé, Mesías/Cristo, Espíritu, etc. «Sacerdote» y «tienda de reunión» están alineados con uso bíblico natural. La decisión sobre «pichones» es aceptable aunque algo menos estable panhispánicamente que «pichones de paloma» o «palominos».
  issues:
  - severity: medium
    issue: «los traerá» para וְהֵבִיאָה אֹתָם
    rationale: El hebreo expresa llevar los animales hacia el sacerdote/entrada. En español, «traer» introduce una orientación deíctica hacia el hablante que no está en el original; «llevará» es más neutral y fiel.
  - severity: high
    issue: La nota [a] está colocada en «pichones» pero comenta la repetición de la preposición antes de «la entrada»
    rationale: La disciplina de notas exige que el marcador aparezca en la palabra o frase pertinente. Aquí la nota debe anclarse en «la entrada de la tienda de reunión», no en «pichones».
  - severity: low
    issue: Redacción mejorable de la nota al pie
    rationale: 'La nota empieza con comillas y una mayúscula innecesaria y puede formularse con más claridad en español: la alternativa es «a la entrada…» frente a una opción más locativa como «en la entrada…» o explicación de la repetición de אֶל.'
  revised_spanish_text: Y al octavo día tomará para sí dos tórtolas o dos pichones, y los llevará al sacerdote, a la entrada[a] de la tienda de reunión.
  revised_footnotes:
  - marker: a
    text: O «a la entrada de la tienda de reunión». El hebreo repite la preposición «a» antes de «la entrada», lo que también puede reflejarse de manera más formal.
    reason: lexical_alternative
  revision_rationale: Se corrige «traerá» a «llevará» por mayor fidelidad al movimiento dirigido del hebreo y se reubica la nota al pie en la frase pertinente para cumplir la disciplina de anclaje. Se mantiene el resto del texto porque preserva bien el sentido fuente y la terminología.
