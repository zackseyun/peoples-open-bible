translation:
  language: es
  text: El Espíritu de Dios vino sobre Azarías, hijo de Oded[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «estuvo sobre Azarías, hijo de Oded».'
