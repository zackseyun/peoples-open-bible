id: 1KI.17.15
reference: 1 Kings 17:15
source:
  edition: WLC
  text: וַ/תֵּ֥לֶךְ וַ/תַּעֲשֶׂ֖ה כִּ/דְבַ֣ר אֵלִיָּ֑הוּ וַ/תֹּ֧אכַל הוא ו/היא וּ/בֵיתָ֖/הּ יָמִֽים־׃
translation:
  text: So she went and did according to the word of Elijah[a], and she ate—he and she and her household—for many days.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'and she ate, he and she and her household, days.' The Hebrew uses a singular verb followed by an explicit list of those who ate.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֵּלֶךְ
  chosen: So she went
  alternatives:
  - And she went
  lexicon: HALOT
  rationale: Wayyiqtol of הלך advances the narrative. 'So she went' gives natural English sequence while preserving the action.
- source_word: וַתַּעֲשֶׂה
  chosen: and did
  alternatives:
  - and acted
  - and made
  lexicon: HALOT
  rationale: עשה here refers broadly to carrying out Elijah's instruction, not specifically 'made' in the narrow sense. 'Did' best matches the idiom with the following phrase.
- source_word: כִּדְבַר אֵלִיָּהוּ
  chosen: according to the word of Elijah
  alternatives:
  - according to Elijah's word
  - as Elijah said
  lexicon: HALOT
  rationale: דבר in this construction means spoken instruction or command. 'According to the word of Elijah' is slightly more formal but transparent and close to the Hebrew.
- source_word: וַתֹּאכַל
  chosen: and she ate
  alternatives:
  - and they ate
  lexicon: HALOT
  rationale: The verb is 3fs, formally referring to the widow. The following pronouns expand the participants. Retaining the singular verb reflects the Hebrew syntax better than smoothing to a plural main verb.
- source_word: הוּא וְהִיא וּבֵיתָהּ
  chosen: he and she and her household
  alternatives:
  - she and he and her household
  - Elijah and she and her household
  lexicon: HALOT
  rationale: 'The Hebrew explicitly lists the participants after the singular verb: ''he and she and her house(hold).'' ''He'' most naturally refers to Elijah from context. The order is preserved rather than rearranged for English style.'
- source_word: בֵּיתָהּ
  chosen: her household
  alternatives:
  - her house
  - her family
  lexicon: HALOT
  rationale: בַּיִת can mean physical house or household/family. In an eating context, 'household' best conveys the people belonging to her domestic unit.
- source_word: יָמִים
  chosen: for many days
  alternatives:
  - for days
  - for some time
  lexicon: HALOT
  rationale: The plural 'days' used adverbially often means an extended period. In idiomatic English, 'for many days' communicates duration more naturally than the bare 'days' while staying within the semantic range.
