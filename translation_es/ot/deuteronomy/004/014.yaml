translation:
  language: es
  text: Y Yahvé me mandó en aquel tiempo enseñarles estatutos y juicios[a], para que los pongan por obra en la tierra a la que van a cruzar para tomar posesión de ella[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «decretos y ordenanzas» para «estatutos y juicios».
    reason: lexical_alternative
  - marker: b
    text: O «para heredarla» para «para tomar posesión de ella».
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino del Tetragrama, según la política del proyecto. 'Yahvé' es la forma estable en español para el nombre revelado, y evita la sustitución por un título genérico.
- source_word: צִוָּה
  english_pob_choice: commanded
  chosen_spanish: mandó
  alternatives_spanish:
  - ordenó
  - encargó
  lexicon: HALOT
  rationale: El verbo expresa una orden con autoridad. 'Mandó' comunica bien el acto de mandamiento en español moderno y mantiene el tono legal-covenantal del contexto.
- source_word: לְלַמֵּד
  english_pob_choice: to teach
  chosen_spanish: enseñar
  alternatives_spanish:
  - instruir
  - explicar
  lexicon: HALOT
  rationale: '''Enseñar'' es el equivalente natural de la comisión pedagógica del infinitivo. Mantiene el sentido de impartir contenido normativo a Israel sin añadir matices no presentes.'
- source_word: חֻקִּים
  english_pob_choice: statutes
  chosen_spanish: estatutos
  alternatives_spanish:
  - decretos
  - ordenanzas
  lexicon: HALOT
  rationale: '''Estatutos'' es el término jurídico tradicional y suficientemente preciso en español para חֻקִּים. Conserva la idea de disposiciones fijadas.'
- source_word: מִשְׁפָּטִים
  english_pob_choice: judgments
  chosen_spanish: juicios
  alternatives_spanish:
  - ordenanzas
  - leyes
  - fallos
  lexicon: HALOT
  rationale: Se conserva la tensión del hebreo con un término que refleja el campo semántico de decisiones/mandatos legales. 'Juicios' es menos idiomático que 'ordenanzas', pero preserva mejor la correspondencia con la opción inglesa 'judgments' y la distinción del par hebreo.
- source_word: לַעֲשֹׂתְכֶם אֹתָם
  english_pob_choice: so that you might do them
  chosen_spanish: para que los pusieran por obra
  alternatives_spanish:
  - para que los hicieran
  - para que los observaran
  - a fin de ponerlos por obra
  lexicon: HALOT
  rationale: La construcción expresa propósito. 'Poner por obra' es un español bíblico comprensible que mantiene la idea de ejecución práctica de las normas, sin suavizar el verbo hebreo.
- source_word: בָּאָרֶץ
  english_pob_choice: in the land
  chosen_spanish: en la tierra
  alternatives_spanish:
  - en el país
  - en la tierra prometida
  lexicon: HALOT
  rationale: '''Tierra'' conserva el término covenantal-geográfico de Deuteronomio. ''País'' resultaría menos bíblico; ''tierra prometida'' añade una aclaración no presente en el hebreo.'
- source_word: עֹבְרִים שָׁמָּה
  english_pob_choice: you are crossing over
  chosen_spanish: van cruzando
  alternatives_spanish:
  - están cruzando
  - están pasando
  - van pasando
  lexicon: HALOT
  rationale: El participio expresa un movimiento en curso hacia el destino. 'Van cruzando' conserva la imagen de atravesar hacia la tierra, enlazada con el motivo de cruzar al otro lado.
- source_word: לְרִשְׁתָּהּ
  english_pob_choice: to possess
  chosen_spanish: para tomar posesión de ella
  alternatives_spanish:
  - para poseerla
  - para heredarla
  - para ocuparla
  lexicon: HALOT
  rationale: '''Tomar posesión de ella'' expresa con claridad la idea de entrar y asumir la posesión de la tierra. Mantiene el matiz legal de la posesión sin reducirlo a mero ''tener''.'
- source_word: וְאֹתִי
  english_pob_choice: And me
  chosen_spanish: Y me
  alternatives_spanish:
  - Y a mí
  - En cuanto a mí
  lexicon: HALOT
  rationale: El objeto adelantado se refleja con un inicio enfático breve. En español, la cláusula se integra de manera natural al comenzar con 'Y me...' antes del verbo.
theological_decisions:
- issue: Nombre divino יְהוָה en el texto español
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se mantiene el nombre propio divino conforme a la política del proyecto y al criterio auditado en inglés. 'Yahvé' preserva la referencia directa al Tetragrama sin ocultarlo bajo un sustituto.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Par legal חֻקִּים וּמִשְׁפָּטִים
  english_pob_reading: statutes and judgments
  chosen_spanish_reading: estatutos y juicios
  alternative_spanish_readings:
  - decretos y ordenanzas
  - estatutos y ordenanzas
  - estatutos y leyes
  rationale: Se conserva el par conceptual del hebreo sin normalizarlo hacia una sola categoría. 'Juicios' es menos común en español, pero ayuda a no borrar la diferencia entre los dos términos legales.
  doctrine_reference: Lexical theology of covenant law in Deuteronomy
- issue: Final purpose clause לְרִשְׁתָּהּ
  english_pob_reading: to possess
  chosen_spanish_reading: para tomar posesión de ella
  alternative_spanish_readings:
  - para poseerla
  - para heredarla
  rationale: La tierra es objeto de entrada y ocupación legítima, no mera abstracción. 'Tomar posesión de ella' expresa bien ese acto sin imponer la lectura de 'heredar' cuando el contexto inmediato enfatiza posesión.
  doctrine_reference: Covenant land inheritance language in Deuteronomy
translation_notes:
  revision_awareness: El cotejo de revisión indica alta conformidad y ningún cambio necesario en la pasada más reciente; esta versión sigue la decisión inglesa auditada de mantener el par legal distintivo y el sentido de posesión de la tierra sin expansión interpretativa.
  spanish_consistency_notes:
  - Se mantiene Yahvé de forma consistente para יְהוָה.
  - Se evita 'SEÑOR' como sustituto no auditado.
  - '''Tierra'' conserva el valor técnico-covenantal de ארץ.'
  - '''Poner por obra'' y ''tomar posesión'' buscan español natural sin perder el contenido legal y narrativo.'
  - Las notas al pie preservan las alternativas documentadas en el auditorio inglés.
