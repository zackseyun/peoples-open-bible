translation:
  language: es
  text: 'Y dijo: «Les ocultaré mi rostro; veré cuál será su fin, porque son una generación perversa[a], hijos en quienes no hay fidelidad[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una generación torcida». El hebreo dice literalmente «una generación de perversidades/cosas torcidas»; la formulación española sigue la revisión aprobada por su naturalidad y precisión.
    reason: lexical_alternative
  - marker: b
    text: O «hijos en quienes no hay confiabilidad» o «no hay lealtad».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And he said
  chosen_spanish: Y dijo
  alternatives_spanish:
  - Y él dijo
  - Entonces dijo
  lexicon: WLC
  rationale: El hebreo introduce una continuación narrativa simple; en español, «Y dijo» conserva la secuencia sin añadir énfasis innecesario. Se omite «él» por ser implícito en el contexto.
- source_word: אַסְתִּירָה פָנַי מֵהֶם
  english_pob_choice: I will hide my face from them
  chosen_spanish: Ocultaré mi rostro de ellos
  alternatives_spanish:
  - Esconderé mi rostro de ellos
  - Ocultaré mi cara de ellos
  lexicon: HALOT
  rationale: Se preserva la imagen de «rostro» para mantener el valor idiomático y teológico del hebreo, sin suavizarlo a una mera ausencia. «Ocultaré» funciona como futuro voluntativo en español y reproduce bien el matiz deliberado del verbo.
- source_word: אֶרְאֶה מָה אַחֲרִיתָם
  english_pob_choice: I will see what their end will be
  chosen_spanish: veré cuál será su fin
  alternatives_spanish:
  - veré qué será de ellos
  - veré cuál será su resultado
  lexicon: HALOT
  rationale: «אַחֲרִית» puede ser fin, desenlace o resultado. «Su fin» es breve, solemne y fiel al tono del pasaje; «cuál será» hace natural la cláusula en español.
- source_word: דּוֹר תַּהְפֻּכֹת
  english_pob_choice: a perverse generation
  chosen_spanish: una generación perversa
  alternatives_spanish:
  - una generación de perversidades
  - una generación torcida
  - una generación de perversión
  lexicon: HALOT
  rationale: Aunque el inglés de audit trail discutió la posibilidad más literal «generation of perversions», la revisión aprobada volvió a «perverse generation» por naturalidad y precisión. En español, «generación perversa» preserva esa misma evaluación moral sin forzar una construcción nominal menos idiomática.
- source_word: בָּנִים
  english_pob_choice: children
  chosen_spanish: hijos
  alternatives_spanish:
  - niños
  - descendientes
  lexicon: HALOT
  rationale: Aquí el término funciona como referencia colectiva a los descendientes del pueblo. «Hijos» mantiene la relación filial del hebreo y la correspondencia con la línea anterior.
- source_word: לֹא אֵמֻן בָּם
  english_pob_choice: in whom there is no faithfulness
  chosen_spanish: en quienes no hay fidelidad
  alternatives_spanish:
  - en quienes no hay confiabilidad
  - en quienes no hay lealtad
  lexicon: HALOT
  rationale: «אֵמֻן» expresa confiabilidad/fidelidad en sentido relacional y pactal. «Fidelidad» es la forma más clara y natural en español, y conserva la tensión moral del juicio.
theological_decisions:
- issue: Mantenimiento del idiomatismo de «rostro» divino
  english_pob_reading: Retain 'I will hide my face from them' as a covenantal idiom of withdrawn favor/presence
  chosen_spanish_reading: Conservar «Ocultaré mi rostro de ellos» como un modismo de retirada de favor/presencia
  alternative_spanish_readings:
  - Me apartaré de ellos
  - Los abandonaré
  rationale: El hebreo usa una imagen antropomórfica con peso pactual; traducirla de manera directa preserva la tensión teológica y evita reducirla a una simple reacción emocional o distancia genérica.
  doctrine_reference: Éxodo 33:20; Deuteronomio 31:17-18; traducción con preservación de imágenes bíblicas y tensión teológica.
- issue: Valor pactal de la ausencia de fidelidad
  english_pob_reading: faithfulness
  chosen_spanish_reading: fidelidad
  alternative_spanish_readings:
  - firmeza
  - confiabilidad
  rationale: El juicio no denuncia solo incredulidad abstracta, sino falta de fiabilidad relacional y pactual. «Fidelidad» comunica mejor ese campo semántico en español bíblico contemporáneo.
  doctrine_reference: Deuteronomio 7:9; 32:4; consistencia léxica en el lenguaje de alianza.
translation_notes:
  revision_awareness: 'Se incorporó la revisión del audit trail que prefirió «a perverse generation» frente a una traducción más literal como «a generation of perversions», y se mantuvo la conservación del modismo «hide my face» por su peso pactual. El español sigue esa decisión: «generación perversa» y «Ocultaré mi rostro» mantienen naturalidad e ինտención teológica sin diluir el hebreo.'
  spanish_consistency_notes:
  - Se usa «rostro» para פָנַי de manera consistente con el valor idiomático del hebreo.
  - Se evita «SEÑOR» porque el versículo no contiene el Tetragrámaton.
  - «Fidelidad» traduce אֵמֻן en sentido relacional/pactual, coherente con el resto del proyecto.
  - La puntuación y el estilo siguen una prosa bíblica moderna y publicable en español.
