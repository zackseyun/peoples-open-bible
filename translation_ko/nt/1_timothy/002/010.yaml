id: 1TI.2.10
reference: 1 Timothy 2:10
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ἀλλ’ ὃ πρέπει γυναιξὶν ἐπαγγελλομέναις θεοσέβειαν, δι’ ἔργων ἀγαθῶν.
base_translation:
  language: en
  yaml_path: translation/nt/1_timothy/002/010.yaml
  text: 'but with what is proper for women professing godliness: good works[a][b][c].'
  footnotes:
  - marker: a
    text: Or 'what is fitting' or 'what is appropriate.'
    reason: lexical_alternative
  - marker: b
    text: Or 'devotion to God.'
    reason: lexical_alternative
  - marker: c
    text: Literally 'through good works'; here the sense is that good works are the fitting adornment.
    reason: lexical_alternative
translation:
  language: ko
  text: 도리어 하나님을 경외함[b]을 고백하는 여자들에게 합당한[a] 것, 곧 선한 행실[c]로 꾸미십시오.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「적합한」 「알맞은」.
    reason: lexical_alternative
  - marker: b
    text: 또는 「하나님께 대한 헌신」. θεοσέβεια는 「하나님을 경배·경외함」.
    reason: lexical_alternative
  - marker: c
    text: 직역하면 「선한 일들을 통하여」. 본 문맥에서는 선한 행실이 합당한 단장임을 가리킨다.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὃ πρέπει
  english_pob_choice: what is proper
  chosen_korean: 합당한
  alternatives_korean:
  - 적합한
  - 어울리는
  lexicon: BDAG
  rationale: πρέπω는 「적절·어울림」의 가치 판단. 「합당한」이 자연스럽다.
- source_word: ἐπαγγελλομέναις θεοσέβειαν
  english_pob_choice: professing godliness
  chosen_korean: 하나님을 경외함을 고백하는
  alternatives_korean:
  - 하나님께 대한 헌신을 표방하는
  - 경건을 자처하는
  lexicon: BDAG
  rationale: θεοσέβεια는 1:9 ἀσέβεσι(경건치 않은)와 동일 어근의 적극형. 「하나님을 경외함」으로 직접 표현해 본문의 신앙 고백적 어감을 살린다.
- source_word: δι’ ἔργων ἀγαθῶν
  english_pob_choice: good works
  chosen_korean: 선한 행실로 꾸미십시오
  alternatives_korean:
  - 선한 일을 통해
  - 좋은 행위로
  lexicon: BDAG
  rationale: 9절의 「꾸미지 말고」(κοσμεῖν)와 짝을 이루어 「선한 행실로 꾸미십시오」가 본문의 대조 구조(외적 치장 vs. 내적 행실)를 명시한다.
