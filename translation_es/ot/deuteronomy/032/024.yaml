translation:
  language: es
  text: Agotados por la hambruna[a], consumidos por la plaga y la destrucción amarga; enviaré contra ellos los colmillos de las bestias[b], con el veneno de los que se arrastran por el polvo[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hambre»; el hebreo puede referirse a una devastación por falta de alimento en un contexto de juicio.
    reason: lexical_alternative
  - marker: b
    text: O «dientes de las bestias».
    reason: lexical_alternative
  - marker: c
    text: O «serpientes del polvo»; la expresión hebrea es más amplia y abarca criaturas que se arrastran por el suelo.
    reason: lexical_alternative
lexical_decisions:
- source_word: מְזֵי
  english_pob_choice: wasted by
  chosen_spanish: Exhaustos[a] por
  alternatives_spanish:
  - consumidos por
  - debilitados por
  - agotados por
  lexicon: HALOT
  rationale: La forma expresa quedar físicamente arruinados o consumidos. «Exhaustos» conserva la idea de desgaste severo en español moderno sin forzar una imagen médica más precisa de la que el hebreo garantiza.
- source_word: רָעָב
  english_pob_choice: famine
  chosen_spanish: hambre
  alternatives_spanish:
  - hambruna
  - famine
  lexicon: HALOT
  rationale: En este contexto poético de juicio, el hebreo puede referirse tanto a hambre como a hambruna. Se eligió «hambre» para mantener naturalidad en español y evitar introducir una especificación más técnica que el verso no obliga a fijar aquí.
- source_word: לְחֻמֵי
  english_pob_choice: consumed by
  chosen_spanish: consumidos por
  alternatives_spanish:
  - devorados por
  - comidos por
  - devastados por
  lexicon: HALOT
  rationale: La idea verbal es de ser comidos/consumidos. «Consumidos por» reproduce bien el sentido destructivo y mantiene el paralelismo con el primer hemistiquio.
- source_word: רֶשֶׁף
  english_pob_choice: plague
  chosen_spanish: plaga
  alternatives_spanish:
  - peste
  - fiebre ardiente
  - Reshef
  lexicon: HALOT
  rationale: El término puede designar pestilencia o fiebre ardiente, y también puede resonar con un nombre divino antiguo. «Plaga» conserva el valor común y deja abierta la posible resonancia sin imponer una lectura mitológica.
- source_word: קֶטֶב
  english_pob_choice: bitter destruction
  chosen_spanish: destrucción amarga
  alternatives_spanish:
  - destrucción cruel
  - pestilencia amarga
  - ruina amarga
  lexicon: HALOT
  rationale: El sustantivo transmite una fuerza destructiva mortal; «destrucción amarga» preserva la intensidad de מְרִירִי sin duplicar «plaga» y sigue de cerca la revisión auditada del inglés POB.
- source_word: שֶׁן
  english_pob_choice: fangs
  chosen_spanish: colmillos
  alternatives_spanish:
  - dientes
  - colmillos afilados
  lexicon: HALOT
  rationale: Aunque literalmente es «diente/dientes», en el contexto de animales peligrosos «colmillos» comunica mejor la amenaza predatoria en español.
- source_word: בְּהֵמוֹת
  english_pob_choice: beasts
  chosen_spanish: bestias
  alternatives_spanish:
  - animales
  - fieras
  - bestias salvajes
  lexicon: HALOT
  rationale: «Bestias» conserva el sentido amplio de animales peligrosos y la fuerza poética del hebreo.
- source_word: אֲשַׁלַּח בָּם
  english_pob_choice: I will send against them
  chosen_spanish: enviaré contra ellos
  alternatives_spanish:
  - soltaré sobre ellos
  - mandaré sobre ellos
  - enviaré sobre ellos
  lexicon: HALOT
  rationale: La expresión idiomática de juicio se traduce de forma directa y natural como una acción hostil dirigida contra el pueblo.
- source_word: חֲמַת
  english_pob_choice: venom
  chosen_spanish: veneno
  alternatives_spanish:
  - ponzoña
  - veneno mortal
  - ira
  lexicon: HALOT
  rationale: Con criaturas que se arrastran, el término apunta a la sustancia venenosa. «Veneno» es claro, preciso y comunicativo en español.
- source_word: זֹחֲלֵי עָפָר
  english_pob_choice: things that crawl in the dust
  chosen_spanish: los que se arrastran por el polvo[c]
  alternatives_spanish:
  - las criaturas que se arrastran por el polvo
  - serpientes del polvo
  - reptiles del polvo
  lexicon: HALOT
  rationale: La expresión es amplia y no debe estrecharse innecesariamente a «serpientes». «Los que se arrastran por el polvo» conserva la amplitud referencial y la imagen hebrea.
theological_decisions:
- issue: Posible trasfondo divino de רֶשֶׁף
  english_pob_reading: Render as a common noun ('plague') rather than a proper name.
  chosen_spanish_reading: Traducir como «plaga» y no como nombre propio.
  alternative_spanish_readings:
  - Reshef
  - Resheph
  - Peste-personificada
  rationale: El verso enumera calamidades de pacto; no exige convertir el término en un nombre propio. La traducción común mantiene la función poética inmediata y respeta la tensión histórica sin introducir una afirmación adicional.
  doctrine_reference: 'Translation philosophy §1: primacía del texto original; §3: preservar tensiones reales sin resolverlas artificialmente.'
translation_notes:
  revision_awareness: La versión española sigue la revisión auditada del inglés POB que cambió «bitter pestilence» por «bitter destruction» para diferenciar mejor קֶטֶב de רֶשֶׁף. También preserva la amplitud de «things that crawl in the dust» sin reducirla innecesariamente a serpientes.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma por defecto solo cuando aparezca el Tetragrámaton; este versículo no lo contiene.
  - Se usa un registro bíblico moderno y sobrio, evitando arcaísmos innecesarios.
  - Se preserva la distinción entre plaga/pestilencia y destrucción para reflejar la separación lexical del hebreo.
  - Las notas al pie respetan la ambigüedad documental sin resolverla de manera excesiva.
