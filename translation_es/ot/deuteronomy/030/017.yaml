- from: Pero si tu corazón se desvía, y no escuchas, y eres arrastrado[a], y te postras ante otros dioses y los sirves,
  to: Pero si tu corazón se desvía, y no escuchas, y eres apartado[a], y te postras ante otros dioses y les sirves,
  rationale: Se ajusta וְנִדַּחְתָּ a «eres apartado» para expresar con más naturalidad en español la idea pasiva de ser desviado de la fidelidad. La nota al pie se corrige para reflejar alternativas léxicas compatibles con el audit trail inglés sin introducir voluntariedad no marcada en el hebreo. También se cambia «los sirves» por «les sirves» por mayor naturalidad idiomática.
