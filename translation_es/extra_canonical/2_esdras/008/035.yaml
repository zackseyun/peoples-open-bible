translation:
  language: es
  text: Porque en verdad no hay nadie entre los nacidos que no haya obrado impíamente[a], y entre los que confiesan, nadie que no haya pecado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «entre los que te confiesan»; la nota del POB inglés conserva esta alternativa heredada, pero aquí no se adopta como lectura principal.'
    reason: alternative_reading
lexical_decisions:
- source_word: in veritate
  english_pob_choice: truly
  chosen_spanish: en verdad
  alternatives_spanish:
  - ciertamente
  - de veras
  lexicon: Latin in veritate
  rationale: Conserva el valor enfático de la afirmación sin sonar artificial; «en verdad» es natural en español bíblico y reproduce el matiz adverbial del latín.
- source_word: genitis
  english_pob_choice: those born
  chosen_spanish: los nacidos
  alternatives_spanish:
  - los engendrados
  - los que nacen
  lexicon: Latin genitis
  rationale: «Los nacidos» sigue de cerca el sustantivo participial latino y mantiene el paralelismo con el segundo miembro de la frase.
- source_word: impie gessit
  english_pob_choice: acted impiously
  chosen_spanish: ha obrado impíamente
  alternatives_spanish:
  - ha actuado impíamente
  - ha obrado con impiedad
  lexicon: Latin impie gessit
  rationale: «Obrar impíamente» conserva el sentido moral-religioso del latín y evita suavizar el lenguaje a solo «pecar»; el adverbio en español refleja mejor la forma verbal original.
- source_word: confitentibus
  english_pob_choice: those who confess
  chosen_spanish: los que confiesan
  alternatives_spanish:
  - los que reconocen
  - los que profesan
  lexicon: Latin confitentibus
  rationale: Se conserva la lectura latina transmitida en el texto base. En español, «confiesan» reproduce directamente el participio y sugiere confesión/profesión sin añadir un objeto explícito.
- source_word: deliquit
  english_pob_choice: sinned
  chosen_spanish: ha pecado
  alternatives_spanish:
  - ha delinquido
  - ha faltado
  lexicon: Latin deliquit
  rationale: «Pecar» es la equivalencia española más clara para el acto moral negativo del latín; «ha pecado» mantiene la intensidad universal del enunciado.
theological_decisions:
- issue: Universalidad del pecado humano
  english_pob_reading: there is no one among those born who has not acted impiously, and among those who confess, no one who has not sinned
  chosen_spanish_reading: no hay nadie entre los nacidos que no haya obrado impíamente, y entre los que confiesan, nadie que no haya pecado
  alternative_spanish_readings:
  - no existe nadie entre los nacidos...
  - nadie de los nacidos...
  rationale: La formulación española conserva la afirmación universal sin atenuarla. El paralelismo entre «los nacidos» y «los que confiesan» se mantiene porque el texto latino presenta dos grupos coordinados bajo la misma negación universal.
  doctrine_reference: Antropología bíblica; universalidad del pecado
- issue: Lectura de 'confitentibus'
  english_pob_reading: those who confess
  chosen_spanish_reading: los que confiesan
  alternative_spanish_readings:
  - los que existen
  - los que están
  rationale: Se sigue el latín transmitido y la lectura auditada del POB inglés revisado, que optó por 'those who confess'. No se traslada la emendación de 'those who exist' al español porque el texto base de esta tarea es el latín limpio proporcionado, no una reconstrucción crítica alternativa.
  doctrine_reference: Crítica textual; fidelidad al testimonio base
translation_notes:
  revision_awareness: La revisión auditada corrigió una emendación anterior que entendía 'confitentibus' como 'those who exist'; sin embargo, el paquete de fuente de esta tarea presenta el latín 'confitentibus', por lo que la traducción española sigue esa lectura y conserva el paralelismo formal del texto recibido. También se mantuvo el adverbio de énfasis con una expresión española natural ('en verdad') para no debilitar el tono sentencioso.
  spanish_consistency_notes:
  - Se usó «impíamente» para conservar el adverbio moral del latín y no reducirlo solo a «pecó».
  - Se eligió «los nacidos» y «los que confiesan» para reflejar el paralelismo del original.
  - No se introdujo «SEÑOR» ni otras convenciones de ocultamiento del nombre divino, ya que este verso no las requiere.
  - La puntuación con coma antes de la segunda cláusula reproduce el paralelismo retórico del latín.
