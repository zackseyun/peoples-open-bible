theological_decisions:
- issue: Identification of the historical/biblical allusion
  chosen_reading: The verse alludes to Pharaoh pursuing Israel at the sea, but the translation leaves the allusion implicit rather than inserting names not present in the Greek.
  alternative_readings:
  - Explicitly supplying 'Pharaoh' or 'Israel' in the main text
  rationale: The Greek uses pronouns and participles without naming the figures here. To preserve source fidelity, the translation keeps the implicit reference and lets the context carry the allusion.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation tradition; Never import doctrinal claims the text does not make.'
- issue: Rendering of divine sovereignty language
  chosen_reading: the one who rules over all creation
  alternative_readings:
  - the sovereign over all creation
  rationale: The phrase is a doxological description of God. The chosen rendering preserves the theological weight of universal dominion while remaining readable modern English.
  doctrine_reference: 'Translation philosophy: Readable modern English, not archaic or academic.'
