translation:
  language: es
  text: Busquen a Yahvé[a] mientras pueda ser hallado; llámenlo mientras está cerca.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «mientras pueda ser hallado».'
    reason: lexical_alternative
lexical_decisions:
- source_word: דִּרְשׁוּ
  english_pob_choice: Seek
  chosen_spanish: Busquen
  alternatives_spanish:
  - Buscad
  - Busquen tras
  - Inquieran de
  lexicon: HALOT
  rationale: דרש en imperativo exhorta a una búsqueda activa de Dios. En español, «buscar» conserva el llamado imperativo y resulta natural y reverente sin añadir matices ajenos al hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: El texto hebreo usa el nombre propio divino. Según la terminología del proyecto, se mantiene su transliteración en español como «Yahvé», evitando la sustitución por un título.
- source_word: בְּהִמָּצְאוֹ
  english_pob_choice: while he may be found
  chosen_spanish: mientras pueda ser hallado
  alternatives_spanish:
  - cuando sea hallado
  - mientras es hallado
  - mientras sea posible hallarlo
  lexicon: HALOT
  rationale: La construcción temporal comunica urgencia de oportunidad. «Mientras pueda ser hallado» refleja bien esa temporalidad y conserva la posibilidad idiomática que el inglés auditado expresó con «may be found».
- source_word: קְרָאֻהוּ
  english_pob_choice: call on him
  chosen_spanish: llámenlo
  alternatives_spanish:
  - invóquenlo
  - llamen a él
  - clamen a él
  lexicon: HALOT
  rationale: קרא con objeto personal aquí tiene sentido religioso de invocar o llamar a Dios. «Llámenlo» es natural en español y permite que el contexto oracional dé el sentido de invocación sin endurecer el estilo.
- source_word: בִּהְיוֹתוֹ
  english_pob_choice: while he is
  chosen_spanish: mientras está
  alternatives_spanish:
  - cuando está
  - mientras sea
  - cuando se encuentre
  lexicon: HALOT
  rationale: La forma temporal con היה pide una cláusula paralela a la anterior. «Mientras está» mantiene esa paralelidad y la urgencia del llamado.
- source_word: קָרוֹב
  english_pob_choice: near
  chosen_spanish: cerca
  alternatives_spanish:
  - próximo
  - al alcance
  - cercano
  lexicon: HALOT
  rationale: קרוב significa cercanía espacial o relacional. «Cerca» es la opción más directa y idiomática en español, manteniendo el paralelismo poético del versículo.
theological_decisions:
- issue: Representación del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: Se conserva el nombre propio del pacto y no un sustituto titular. En español bíblico del proyecto, «Yahvé» expresa esa decisión de forma clara y publicable.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: El control de revisión indica high_agreement y sin cambios aplicados; por tanto, este borrador sigue de cerca la lectura auditada del inglés POB y no introduce ajustes textuales adicionales.
  spanish_consistency_notes:
  - 'Se mantiene el paralelismo de dos exhortaciones temporales: buscar/llamar mientras dura la oportunidad.'
  - Se evita «SEÑOR» para no ocultar el nombre divino explícito del hebreo.
  - «Llámenlo» conserva el registro exhortativo plural y suena natural en español contemporáneo.
  - La nota textual preserva la alternativa temporal ya documentada en el inglés auditado.
