translation:
  language: es
  text: Y cuando llegó el día, Elcaná sacrificó y dio[a] porciones a Penina su esposa, y a todos sus hijos e hijas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «daba porciones»; la forma hebrea puede leerse como pasado simple, pero el contexto puede sugerir una acción habitual en la comida sacrificial recurrente.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי הַיּוֹם
  english_pob_choice: when the day came
  chosen_spanish: cuando llegó el día
  alternatives_spanish:
  - y aconteció en el día
  - cuando vino el día
  lexicon: HALOT
  rationale: La fórmula hebrea funciona como marco temporal narrativo. «Cuando llegó el día» conserva ese valor y suena natural en español sin perder la estructura de inicio de escena.
- source_word: וַיִּזְבַּח
  english_pob_choice: sacrificed
  chosen_spanish: sacrificó
  alternatives_spanish:
  - ofreció sacrificio
  - inmoló
  lexicon: HALOT
  rationale: El verbo apunta al acto sacrificial en contexto cultual. «Sacrificó» es breve, fiel y suficientemente preciso en español.
- source_word: וְנָתַן
  english_pob_choice: and gave
  chosen_spanish: dio
  alternatives_spanish:
  - y dio
  - entregó
  lexicon: HALOT
  rationale: El audit trail inglés optó por pasado simple para reflejar la secuencia narrativa. En español, «dio» mantiene ese valor sin introducir una lectura habitual que el texto hebreo no exige aquí.
- source_word: לִפְנִנָּה אִשְׁתּוֹ
  english_pob_choice: to Peninnah his wife
  chosen_spanish: a Penina, su esposa
  alternatives_spanish:
  - a su esposa Penina
  - a Penina, su mujer
  lexicon: HALOT
  rationale: Se conserva el nombre propio y la relación posesiva. «Esposa» es más neutro y actual que «mujer» en registro bíblico español, sin cambiar la referencia.
- source_word: וּלְכָל בָּנֶיהָ וּבְנוֹתֶיהָ
  english_pob_choice: and to all her sons and daughters
  chosen_spanish: y a todos sus hijos e hijas
  alternatives_spanish:
  - y a todos sus hijos, e hijas
  - y a toda su descendencia, varones y mujeres
  lexicon: HALOT
  rationale: El hebreo nombra explícitamente hijos e hijas; el español conserva esa especificidad en vez de resumirla con «hijos» o «niños». La repetición de «todos» sigue el alcance inclusivo del original.
- source_word: מָנוֹת
  english_pob_choice: portions
  chosen_spanish: porciones
  alternatives_spanish:
  - raciones
  - partes
  - porciones del sacrificio
  lexicon: HALOT
  rationale: «Porciones» reproduce con claridad la idea de reparto asignado. En este versículo el contexto sacrificial ya está establecido por «sacrificó», por lo que no es necesario expandir el sentido.
theological_decisions:
- issue: Lectura verbal de וְנָתַן en contexto narrativo
  english_pob_reading: and gave / he gave
  chosen_spanish_reading: dio
  alternative_spanish_readings:
  - daba
  - daría
  rationale: La revisión inglesa eliminó la paráfrasis habitual «would give» y prefirió pasado simple. El español sigue esa decisión para no forzar un valor habitual que el hebreo aquí no necesita expresar explícitamente.
  doctrine_reference: No doctrinal; decisión de aspecto verbal y flujo narrativo.
translation_notes:
  revision_awareness: Se incorporó la revisión inglesa más reciente, que simplificó la frase para reflejar la secuencia narrativa con verbos en pasado simple y eliminar la paráfrasis habitual. El español evita introducir una habitualidad explícita y conserva el reparto de porciones en forma directa.
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma general del proyecto solo cuando aparezca el tetragrámaton; en este versículo no aparece.
  - Se mantuvo el nombre propio en forma española habitual «Penina» y «Elcana», consistente con transliteración bíblica estándar.
  - Se evitó «siervo» u otra terminología no pertinente; el texto trata de una acción sacrificial y de reparto.
  - 'Se preservó la coordinación simple del hebreo con dos verbos principales: «sacrificó y dio».'
