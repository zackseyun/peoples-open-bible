review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido global del hebreo y el rastro de auditoría inglés: mantiene el contraste adversativo, la fuerza enfática de עָשֹׂה נַעֲשֶׂה, el título idolátrico ‘Reina del Cielo’, la referencia a incienso y libaciones, la práctica pasada en Judá/Jerusalén y la secuencia de bienestar material seguida de ausencia de calamidad. Sin embargo, ‘todo lo que salió de nuestra boca’ pierde el matiz más concreto de ‘cada palabra/toda palabra’, y ‘jefes’ debilita el valor administrativo de שָׂרִים frente al inglés auditado ‘officials’.'
  spanish_quality_summary: El español es claro y natural, pero requiere pequeños ajustes de precisión y registro. ‘Haremos todo lo que salió de nuestra boca’ suena algo más coloquial e indefinido que ‘cumpliremos toda palabra...’ o ‘haremos toda palabra...’. Además, ‘jefes’ es menos exacto y algo más informal que ‘oficiales’ o ‘funcionarios’. El resto fluye bien y es apropiado para un estilo bíblico moderno y digno.
  glossary_alignment: No hay conflicto con las directrices terminológicas mayores. No aparece Yahvé en este versículo. ‘Reina del Cielo’ es aceptable y está bien justificada. ‘Libaciones’ concuerda con el tecnicismo cultual. La corrección principal es alinear mejor שָׂרֵינוּ con ‘oficiales’ según la decisión inglesa auditada.
  issues:
  - severity: medium
    issue: ‘todo lo que salió de nuestra boca’ diluye el valor de כָּל הַדָּבָר
    rationale: El hebreo y la auditoría inglesa preservan la expresión más concreta ‘every word’. En español, ‘todo lo que salió de nuestra boca’ es comprensible pero menos nítido y algo más parafrástico.
  - severity: medium
    issue: ‘jefes’ para שָׂרֵינוּ es menos preciso que ‘oficiales’
    rationale: La decisión inglesa documentó ‘officials’ por el marco gubernamental. ‘Jefes’ suena más genérico y puede perder el matiz político-administrativo.
  - severity: low
    issue: La nota [a] no es necesaria como está formulada
    rationale: ‘Reina de los Cielos’ es posible, pero el inglés auditado no exige nota aquí; la nota útil preservada en el rastro inglés corresponde a la saciedad con pan, no al título.
  - severity: low
    issue: Falta una nota para la alternativa literal de וַנִּשְׂבַּע לֶחֶם
    rationale: El rastro inglés conserva la alternativa literal ‘we were satisfied with bread / we were filled with bread’. Como el español usa una formulación idiomática (‘teníamos pan en abundancia’), conviene preservar esa alternativa en nota.
  revised_spanish_text: 'Pero ciertamente haremos toda palabra que salió de nuestra boca: ofrecer incienso a la Reina del Cielo y derramarle libaciones, como hicimos nosotros, nuestros padres, nuestros reyes y nuestros oficiales, en las ciudades de Judá y en las calles de Jerusalén; entonces teníamos pan en abundancia[a], estábamos bien[b] y no vimos calamidad.'
  revised_footnotes:
