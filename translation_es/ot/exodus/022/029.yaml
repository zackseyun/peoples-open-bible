translation:
  language: es
  text: 'Harás lo mismo con tu buey y con tu rebaño: siete días[b] permanecerá con su madre[a]; al octavo día me lo darás.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «estará con su madre». El hebreo dice literalmente: «estará con su madre»; «permanecerá» hace más explícito el sentido durativo en este contexto.'
    reason: lexical_alternative
  - marker: b
    text: La orden continúa el contexto anterior sobre las ofrendas de los primogénitos; el hebreo no repite «primogénito» en este versículo.
    reason: cross_reference
lexical_decisions:
- source_word: כֵּן
  english_pob_choice: the same
  chosen_spanish: lo mismo
  alternatives_spanish:
  - así
  - de la misma manera
  lexicon: HALOT
  rationale: כֵּן enlaza esta instrucción con el mandato previo; en español, «lo mismo» conserva mejor la relación de continuidad que un mero «así» y evita añadir contenido no expresado.
- source_word: תַּעֲשֶׂה
  english_pob_choice: you shall do
  chosen_spanish: harás
  alternatives_spanish:
  - deberás hacer
  - tú harás
  lexicon: HALOT
  rationale: El hebreo usa una forma verbal de mandato legal. «Harás» mantiene la fuerza instructiva con un español natural y breve.
- source_word: לְשֹׁרְךָ
  english_pob_choice: with your ox
  chosen_spanish: con tu buey
  alternatives_spanish:
  - con tu ox
  - para tu buey
  lexicon: HALOT
  rationale: שור es el bovino doméstico; «buey» es comprensible y bíblicamente estable en español. El prefijo ל aquí marca relación respecto al animal, por eso se traduce con «con» en paralelo con la siguiente cláusula.
- source_word: לְצֹאנְךָ
  english_pob_choice: with your flock
  chosen_spanish: con tu rebaño
  alternatives_spanish:
  - con tu ganado menor
  - con tus ovejas y cabras
  lexicon: HALOT
  rationale: צאן es un colectivo de ganado menor. «Rebaño» conserva el sentido colectivo sin forzar la especificación a ovejas y cabras, que el hebreo no explicita aquí.
- source_word: שִׁבְעַת יָמִים
  english_pob_choice: seven days
  chosen_spanish: siete días
  alternatives_spanish:
  - por siete días
  - durante siete días
  lexicon: HALOT
  rationale: La expresión marca duración. En español, colocar «siete días» antes del verbo reproduce bien el valor durativo sin necesidad de una preposición añadida.
- source_word: יִהְיֶה עִם אִמּוֹ
  english_pob_choice: it shall remain with its mother
  chosen_spanish: estará con su madre
  alternatives_spanish:
  - permanecerá con su madre
  - se quedará con su madre
  lexicon: HALOT
  rationale: Literalmente es «estará con su madre». Aunque la POB inglesa explicita «remain» por el matiz durativo, en español «estará con su madre» ya comunica la permanencia requerida sin sobrecargar el verbo.
- source_word: בַּיּוֹם הַשְּׁמִינִי
  english_pob_choice: on the eighth day
  chosen_spanish: al octavo día
  alternatives_spanish:
  - en el octavo día
  - el octavo día
  lexicon: HALOT
  rationale: La locución temporal hebrea se expresa naturalmente en español con «al octavo día», que suena idiomático y conserva la referencia puntual.
- source_word: תִּתְּנוֹ לִי
  english_pob_choice: you shall give it to me
  chosen_spanish: me lo darás
  alternatives_spanish:
  - me lo entregarás
  - me lo presentarás
  lexicon: HALOT
  rationale: נתן con sufijo pronominal y ל expresa entrega directa. «Me lo darás» es natural en español y mantiene el mandato sin añadir el matiz cultual de «presentarás».
theological_decisions:
- issue: Relación con la instrucción previa sobre las primicias/primogénitos
  english_pob_reading: The verse is rendered as a command concerning the owner's ox and flock in continuity with the preceding firstborn-offering instruction, without expanding the text to explain sacrificial theology.
  chosen_spanish_reading: La frase se traduce como una instrucción en continuidad con el mandato anterior, sin insertar «primogénito» en este versículo.
  alternative_spanish_readings:
  - Añadir explícitamente «primogénito» para mayor claridad contextual.
  - Interpretar el versículo como una ley independiente sobre todo animal recién nacido.
  rationale: El hebreo de este versículo omite el término «primogénito» porque ya está presente en el contexto inmediato. La traducción debe respetar esa economía textual y no ampliar el contenido del verso más allá de lo que dice.
  doctrine_reference: Principio de primacía del texto original; evitar paráfrasis expansivas.
translation_notes:
  revision_awareness: El texto base del audit trail en inglés se mantuvo sin revisiones sustantivas; la versión española sigue la misma decisión de no expandir el contexto con «primogénito» dentro del versículo, pero lo explica en nota para claridad auditables.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino cuando aparezca en el contexto cercano del pasaje, conforme a la terminología del proyecto.
  - Se usa «buey» para שׁוֹר y «rebaño» para צֹאן, conservando el valor colectivo y no especificando más de lo que exige el hebreo.
  - Se evita «presentar» en el cuerpo del texto porque el hebreo solo dice «darás»; cualquier matiz cultual queda para la nota contextual.
  - La puntuación con dos puntos introduce correctamente la explicación temporal y la secuencia final en español moderno.
