  text: וְ/יֹאמַ֣ר אָ֭דָם אַךְ פְּרִ֣י לַ/צַּדִּ֑יק אַ֥ךְ יֵשׁ אֱ֝לֹהִ֗ים שֹׁפְטִ֥ים בָּ/אָֽרֶץ־־׃
base_translation:
  language: en
  yaml_path: translation/ot/psalms/058/012.yaml
  text: And people will say[a], “Surely there is fruit for the righteous[b]; surely there is a God who judges on the earth.”
  footnotes:
  - marker: a
    text: Or, more literally, “Surely fruit is for the righteous”; that is, the righteous truly receive an outcome or reward.
    reason: lexical_alternative
  - marker: b
    text: Hebrew has a plural participle, literally “God/judges” or “God judging ones.” Many understand this as referring to the one true God with plural morphology; others take it less likely as “gods who judge.”
    reason: alternative_reading
