revisions:
- from: 'Tú dijiste[a]: «Seré señora para siempre», hasta que no pusiste estas cosas[b] en tu corazón; no recordaste su fin[c].'
  to: 'Dijiste[a]: «Seré dueña para siempre», de modo que no tomaste estas cosas[a][b] a pecho; no recordaste el fin de ella[c].'
  rationale: Se corrige el valor de עַד לֹא a una relación resultativa («de modo que»), conforme a la auditoría POB y al contexto. Se reemplaza la construcción poco natural «hasta que no pusiste... en tu corazón» por «no tomaste... a pecho», que expresa con claridad el modismo hebreo. Se adopta «dueña» para reflejar mejor el matiz de dominio de גְבָרֶת. También se ajustan las notas para que correspondan exactamente al texto revisado y ofrezcan alternativas reales.
