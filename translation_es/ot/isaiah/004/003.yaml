translation:
  language: es
  text: 'Y sucederá que el que quede en Sion y el que quede en Jerusalén será llamado santo: todo el que esté inscrito para vida[a][b] en Jerusalén.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «todo el que esté escrito entre los vivos en Jerusalén».'
    reason: lexical_alternative
  - marker: b
    text: La expresión «inscrito para vida» puede aludir a un registro oficial de quienes quedaron con vida y también evoca el motivo bíblico más amplio del libro de la vida.
    reason: cross_reference
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: And it shall be that
  chosen_spanish: Y sucederá que
  alternatives_spanish:
  - Y será que
  - Y acontecerá que
  lexicon: HALOT
  rationale: La fórmula hebrea introduce una secuencia profética futura; «sucederá que» mantiene ese valor introductorio con español natural y formal.
- source_word: הַנִּשְׁאָר
  english_pob_choice: he who remains
  chosen_spanish: el que quede
  alternatives_spanish:
  - el que permanece
  - el sobreviviente
  lexicon: HALOT
  rationale: El participio niphal expresa al que queda como remanente. «El que quede» conserva la referencia personal singular y la idea de resto sin volverlo demasiado interpretativo.
- source_word: בְּצִיּוֹן
  english_pob_choice: in Zion
  chosen_spanish: en Sion
  alternatives_spanish:
  - en Zion
  lexicon: HALOT
  rationale: Se mantiene el nombre geográfico-teológico tradicional en español bíblico, con la forma usual «Sion».
- source_word: וְהַנּוֹתָר
  english_pob_choice: he who is left
  chosen_spanish: el que sea dejado
  alternatives_spanish:
  - el que queda
  - el que permanece
  lexicon: HALOT
  rationale: La raíz יתר/נותר pide un segundo miembro paralelo para el remanente. «Sea dejado» conserva pasividad y paralelismo con la primera cláusula.
- source_word: בִּירוּשָׁלִַם
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  alternatives_spanish:
  - en la ciudad de Jerusalén
  lexicon: HALOT
  rationale: Topónimo directo y plenamente transparente.
- source_word: קָדוֹשׁ
  english_pob_choice: holy
  chosen_spanish: santo
  alternatives_spanish:
  - consagrado
  - sagrado
  lexicon: HALOT
  rationale: «Santo» es el equivalente bíblico más natural en español para el estado de consagración/categoría religiosa que se predica del remanente.
- source_word: יֵאָמֶר לוֹ
  english_pob_choice: will be called
  chosen_spanish: será llamado
  alternatives_spanish:
  - se le dirá
  - será declarado
  lexicon: HALOT
  rationale: 'El niphal de אמר con לֹו se vierte de forma idiomática como designación: «será llamado», preservando el predicado «santo».'
- source_word: כָּל
  english_pob_choice: everyone
  chosen_spanish: todo el que
  alternatives_spanish:
  - cada uno que
  - quienquiera que
  lexicon: HALOT
  rationale: En español, la construcción relativa expresa mejor el valor genérico singular que el simple «todos».
- source_word: הַכָּתוּב
  english_pob_choice: who is recorded
  chosen_spanish: esté registrado
  alternatives_spanish:
  - esté escrito
  - esté inscrito
  - esté anotado
  lexicon: HALOT
  rationale: El participio pasivo de כתב alude a inscripción en un registro. «Registrado» comunica una lista oficial sin perder la imagen de lo escrito.
- source_word: לַחַיִּים
  english_pob_choice: for life
  chosen_spanish: para vida
  alternatives_spanish:
  - entre los vivos
  - para vivir
  lexicon: HALOT
  rationale: Se conserva la concisión hebrea y la ambigüedad teológica entre un registro de vida y la preservación para seguir vivo.
- source_word: בִּירוּשָׁלִָם
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  alternatives_spanish:
  - en la Jerusalén
  lexicon: HALOT
  rationale: Se mantiene el segundo complemento locativo tal como aparece en el hebreo, sin suavizar la repetición.
theological_decisions:
- issue: Si el versículo habla solo de supervivientes históricos o también de un remanente santificado y registrado para vida
  english_pob_reading: 'The main text preserves both dimensions: those who remain are survivors, and they ''will be called holy'' as those recorded for life.'
  chosen_spanish_reading: 'El texto principal conserva ambas dimensiones: los que quedan son sobrevivientes/remanente, y «será llamado santo» se aplica a todos los registrados para vida.'
  alternative_spanish_readings:
  - 'Una lectura solo histórica: los sobrevivientes después del juicio'
  - 'Una lectura más explícitamente doctrinal: inscritos en el libro de la vida'
  rationale: El hebreo une permanencia remanente, santidad y escritura/registro. La traducción española no debe resolver la tensión reduciéndola a mera supervivencia ni a una formulación dogmática posterior.
  doctrine_reference: Preservar la tensión teológica del texto.
translation_notes:
  revision_awareness: Se siguió el ajuste del control de revisión que prefirió una referencia singular formal («el que») para los participios hebreos. El español mantiene ese valor singular genérico sin convertirlo en plural colectivo.
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma del proyecto solo cuando el texto lo requiera; en este versículo no aparece el Tetragrámaton.
  - Se prefirió «Sion» y «Jerusalén» como topónimos establecidos en español bíblico.
  - «Santo» conserva el valor de consagración/categoría religiosa, sin introducir glosa doctrinal en el cuerpo principal.
  - La repetición locativa final se mantuvo por fidelidad al hebreo.
  - Los marcadores de nota [a][b] están anclados en la frase «santo» y en la cláusula final para conservar la alternativa léxica y la nota de resonancia intertextual.
