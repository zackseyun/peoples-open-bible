translation:
  language: es
  text: 'Y cuando repartan la tierra como herencia[a], apartarán una contribución para Yahvé, una porción santa de la tierra: veinticinco mil codos de longitud y diez mil de anchura[b]. Será santa dentro de todo su límite circundante.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'asignen la tierra por sorteo como herencia'.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: ''veinticinco mil de longitud y diez mil de anchura''; ''codos'' está implícito por el contexto de medida y se añade para claridad.'
    reason: cultural_note
lexical_decisions:
- source_word: וּבְהַפִּילְכֶם
  english_pob_choice: when you divide
  chosen_spanish: cuando distribuyan
  alternatives_spanish:
  - cuando repartan
  - cuando asignen por sorteo
  - cuando echen suertes al repartir
  lexicon: HALOT
  rationale: El contexto es el reparto territorial de la tierra; en español, 'distribuyan' comunica con naturalidad la acción de repartir porciones sin perder el sentido de asignación. 'Asignen por sorteo' sería más específico de lo que el verso exige por sí solo.
- source_word: בְּנַחֲלָה
  english_pob_choice: as an inheritance
  chosen_spanish: como herencia
  alternatives_spanish:
  - como posesión heredada
  - como posesión
  lexicon: HALOT
  rationale: נַחֲלָה conserva el matiz de posesión recibida por herencia dentro del marco de la tierra prometida. 'Como herencia' es la equivalencia más directa y comprensible.
- source_word: תָּרִימוּ תְרוּמָה
  english_pob_choice: you shall set apart a contribution
  chosen_spanish: apartarán una porción
  alternatives_spanish:
  - levantarán una contribución
  - presentarán una ofrenda
  - separarán una contribución
  lexicon: HALOT
  rationale: La combinación verbal expresa dedicar/separar una porción consagrada. En español, 'apartarán una porción' transmite bien la acción y evita importar un término litúrgico más técnico que podría sonar ajeno en este contexto de medida territorial.
- source_word: לַיהוָה
  english_pob_choice: to the LORD
  chosen_spanish: para Yahvé
  alternatives_spanish:
  - a Yahvé
  - para el SEÑOR
  lexicon: HALOT
  rationale: La directriz del proyecto requiere 'Yahvé' para יהוה. 'Para' conserva la idea de dedicación o destino de la porción al nombre divino.
- source_word: קֹדֶשׁ מִן הָאָרֶץ
  english_pob_choice: a holy portion from the land
  chosen_spanish: una porción santa de la tierra
  alternatives_spanish:
  - un territorio santo de la tierra
  - una parte santa de la tierra
  lexicon: HALOT
  rationale: קֹדֶשׁ funciona aquí como sustantivo/atributo de consagración aplicado a la porción territorial. 'Porción santa' respeta la construcción sin sobreinterpretar como 'distrito' ni diluir la santidad en una idea meramente administrativa.
- source_word: אֹרֶךְ חֲמִשָּׁה וְעֶשְׂרִים אֶלֶף אֹרֶךְ
  english_pob_choice: twenty-five thousand cubits in length
  chosen_spanish: veinticinco mil de longitud
  alternatives_spanish:
  - veinticinco mil codos de longitud
  - una longitud de veinticinco mil
  lexicon: HALOT
  rationale: El hebreo repite 'longitud' con estilo de medida. El POB inglés suplió 'cubits' por el contexto; en español también puede inferirse, pero aquí se mantiene la sobriedad del texto base y se deja la unidad implícita para no sobrecargar el verso.
- source_word: וְרֹחַב עֲשָׂרָה אָלֶף
  english_pob_choice: and ten thousand in width
  chosen_spanish: y diez mil de anchura
  alternatives_spanish:
  - y una anchura de diez mil
  - y diez mil de ancho
  lexicon: HALOT
  rationale: Es una equivalencia directa y natural para la dimensión horizontal. 'Anchura' mantiene el paralelismo con 'longitud'.
- source_word: קֹדֶשׁ הוּא
  english_pob_choice: It shall be holy
  chosen_spanish: Será santa
  alternatives_spanish:
  - Es santa
  - Será sagrada
  lexicon: HALOT
  rationale: El predicado de santidad recae sobre la porción. 'Será santa' conserva el tono legal-instructivo y el acuerdo natural con 'porción' en español.
- source_word: בְכָל גְּבוּלָהּ סָבִיב
  english_pob_choice: within all its surrounding boundary
  chosen_spanish: en todo su contorno
  alternatives_spanish:
  - dentro de todo su límite alrededor
  - en todo su borde alrededor
  lexicon: HALOT
  rationale: La frase describe la extensión completa del perímetro. 'En todo su contorno' es idiomático, claro y mantiene la idea de totalidad alrededor del terreno.
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: La política terminológica del proyecto exige 'Yahvé' como forma principal para יהוה. Se evita 'el SEÑOR' porque oscurece el nombre propio en un pasaje donde el texto hebreo lo presenta explícitamente.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Unidad de medida implícita en la extensión
  english_pob_reading: cubits are implied by the measurement context and supplied for clarity
  chosen_spanish_reading: codos implícitos por el contexto de medida, sin explicitarlos en el texto principal
  alternative_spanish_readings:
  - veinticinco mil codos de longitud y diez mil de anchura
  - veinticinco mil codos de largo y diez mil de ancho
  rationale: El inglés audita que 'cubits' está implícito por el contexto. En español, dado que el verso ya es compacto y el contexto visionario es claro, se puede mantener la implicación en el texto principal; la precisión métrica se documenta en nota si se necesita en otra capa editorial.
  doctrine_reference: 'POB editorial practice: context-implied measures'
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior anclando la nota [a] directamente sobre la frase de medida en el texto español. También se alineó la terminología con la política del proyecto: Yahvé para יהוה, y una formulación natural para תְרוּמָה en contexto de reparto territorial.'
  spanish_consistency_notes:
  - Se evitó 'SEÑOR' en favor de 'Yahvé' para mantener consistencia con la norma terminológica del proyecto.
  - '''Porción santa'' conserva el valor de קֹדֶשׁ sin convertirlo en un término administrativo ajeno al hebreo.'
  - La nota [a] está anclada en el texto principal para cumplir la validación de marcadores.
  - Se mantuvo 'contorno' como equivalente de סָבִיב para expresar la totalidad del perímetro.
