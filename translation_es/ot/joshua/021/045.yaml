revisions:
- from: No cayó ninguna palabra de todo[a] la buena palabra que Yahvé había hablado a la casa de Israel; todo se cumplió.
  to: No cayó ni una sola palabra de toda la buena palabra que Yahvé había hablado a la casa de Israel[a]; todo se cumplió.
  rationale: Se corrige un error gramatical ('de todo la' -> 'de toda la'), se mejora la naturalidad española con 'ni una sola', y se ajusta la nota alternativa para que 'promesa' vaya con 'había prometido', preservando la distinción entre texto principal ('palabra') y alternativa interpretativa ('promesa'). No hace falta adjudicación adicional.
