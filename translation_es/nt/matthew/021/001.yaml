translation:
  language: es
  text: Y cuando se acercaron a Jerusalén y llegaron a Betfagé[a], al Monte de los Olivos, entonces Jesús envió a dos discípulos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «se aproximaron a Jerusalén y llegaron a Betfagé, al Monte de los Olivos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤγγισαν
  english_pob_choice: came near
  chosen_spanish: se acercaron
  alternatives_spanish:
  - se aproximaron
  - se allegaron
  lexicon: BDAG
  rationale: El verbo griego indica acercamiento espacial. «Se acercaron» es natural en español y conserva el movimiento hacia Jerusalén sin sobrecargar el registro.
- source_word: Ἱεροσόλυμα
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  alternatives_spanish:
  - Jerusalem
  lexicon: BDAG
  rationale: Nombre propio bíblico estándar en español.
- source_word: ἦλθον
  english_pob_choice: came
  chosen_spanish: llegaron
  alternatives_spanish:
  - vinieron
  - fueron
  lexicon: BDAG
  rationale: Para distinguir este segundo verbo de ἤγγισαν, «llegaron» comunica que alcanzaron Betfagé y suena idiomático en español.
- source_word: Βηθφαγὴ
  english_pob_choice: Bethphage
  chosen_spanish: Betfagé
  alternatives_spanish:
  - Bethfagé
  lexicon: BDAG
  rationale: Topónimo transliterado según uso bíblico habitual en español, con adaptación ortográfica natural.
- source_word: εἰς τὸ Ὄρος τῶν Ἐλαιῶν
  english_pob_choice: to the Mount of Olives
  chosen_spanish: al Monte de los Olivos
  alternatives_spanish:
  - al monte de los Olivos
  - hacia el Monte de los Olivos
  lexicon: BDAG
  rationale: Aunque εἰς suele significar «a/para/into», aquí funciona de referencia geográfica. «Al Monte de los Olivos» refleja el movimiento/ubicación en español sin imponer la idea de entrar físicamente en el monte.
- source_word: τότε
  english_pob_choice: then
  chosen_spanish: entonces
  alternatives_spanish:
  - luego
  - en ese momento
  lexicon: BDAG
  rationale: Marca la transición narrativa de forma breve y natural.
- source_word: ἀπέστειλεν
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - despachó
  lexicon: BDAG
  rationale: «Envió» es el equivalente directo y normal en un contexto narrativo de comisión.
- source_word: δύο μαθητὰς
  english_pob_choice: two disciples
  chosen_spanish: a dos discípulos
  alternatives_spanish:
  - dos discípulos
  lexicon: BDAG
  rationale: Con el verbo «enviar», el objeto directo personal en español suele llevar la preposición «a»; mantiene con claridad la relación gramatical y el sentido del griego.
theological_decisions:
- issue: Alcance espacial de εἰς con el Monte de los Olivos
  english_pob_reading: Use a locative/route sense that says 'to the Mount of Olives' rather than implying entry into the mountain itself.
  chosen_spanish_reading: «al Monte de los Olivos» como referencia de llegada/ubicación.
  alternative_spanish_readings:
  - «a el Monte de los Olivos»
  - «en el Monte de los Olivos»
  rationale: El griego usa εἰς con un referente geográfico para situar el desplazamiento. En español, «al» comunica destino o referencia espacial sin forzar una imagen de penetración física en el monte.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés POB, que prefirió mantener la estructura repetida de los verbos de movimiento y traducir εἰς de manera más precisa como dirección/lugar de llegada. La versión española sigue esa decisión con «se acercaron» y «llegaron», y conserva la referencia geográfica con «al Monte de los Olivos».
  spanish_consistency_notes:
  - Se mantiene «Jesús» para Ἰησοῦς según el estándar del proyecto.
  - «Betfagé» sigue la transliteración española estable del topónimo.
  - Se usa «Monte de los Olivos» con mayúsculas por ser nombre geográfico bíblico convencional.
  - La preposición «a» en «envió a dos discípulos» es idiomática en español y no añade contenido doctrinal.
