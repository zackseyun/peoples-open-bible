base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/019/009.yaml
  text: And an evil spirit from Yahweh came upon Saul while he was sitting in his house with his spear in his hand[b][a], and David was playing the lyre with his hand.
  footnotes:
  - marker: a
    text: Or 'a harmful spirit from the LORD.' The Hebrew adjective can mean 'evil' or 'harmful/distressing.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'with hand.' The verse does not explicitly name the instrument here, though the broader context indicates David was playing music for Saul.
    reason: lexical_alternative
