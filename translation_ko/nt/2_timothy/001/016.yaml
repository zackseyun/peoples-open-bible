id: 2TI.1.16
reference: 2 Timothy 1:16
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: δῴη ἔλεος ὁ κύριος τῷ Ὀνησιφόρου οἴκῳ, ὅτι πολλάκις με ἀνέψυξεν, καὶ τὴν ἅλυσίν μου οὐκ ἐπαισχύνθη·
base_translation:
  language: en
  yaml_path: translation/nt/2_timothy/001/016.yaml
  text: May the Lord grant mercy to the household of Onesiphorus, because he often refreshed me and was not ashamed of my chain.
translation:
  language: ko
  text: 주께서 오네시보로의 집에 자비를 베풀어 주시기를 빕니다. 그가 자주 나를 새 힘으로 일으켜 주었고, 나의 쇠사슬[a]을 부끄러워하지 않았기 때문입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 직역하면 「나의 쇠사슬」. 바울의 수감을 가리키는 표현이다.
    reason: lexical_alternative
lexical_decisions:
- source_word: δῴη ἔλεος ὁ κύριος
  english_pob_choice: May the Lord grant mercy
  chosen_korean: 주께서 자비를 베풀어 주시기를 빕니다
  alternatives_korean:
  - 주께서 긍휼을 베푸시기를 빕니다
  - 주께서 자비를 주시기를 원합니다
  lexicon: BDAG
  rationale: 가정법 δῴη의 소망 의미를 한국어 「~기를 빕니다」로 옮긴다. ἔλεος는 1:2와 동일하게 「자비」로 통일한다.
- source_word: ἀνέψυξεν
  english_pob_choice: refreshed me
  chosen_korean: 나를 새 힘으로 일으켜 주었고
  alternatives_korean:
  - 나를 격려해 주었고
  - 나에게 안식을 주었고
  - 나를 시원하게 해 주었고
  lexicon: BDAG
  rationale: ἀναψύχω는 「다시 숨쉬게 함·새 힘을 줌」을 뜻하는 강한 표현. 단순한 「위로」보다 회복의 무게가 있다. 「새 힘으로 일으켜 주다」가 그 회복의 이미지를 살린다.
- source_word: τὴν ἅλυσίν μου οὐκ ἐπαισχύνθη
  english_pob_choice: was not ashamed of my chain
  chosen_korean: 나의 쇠사슬을 부끄러워하지 않았기 때문입니다
  alternatives_korean:
  - 나의 갇힘을 부끄러워하지 않았기 때문입니다
  - 내가 매인 것을 부끄러워하지 않았기 때문입니다
  lexicon: BDAG
  rationale: ἅλυσις의 구체적 「쇠사슬」 이미지를 보존한다. 8절의 「주의 죄수」와 짝을 이루는 수감·고난의 무게를 살린다.
