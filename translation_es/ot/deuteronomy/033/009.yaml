translation:
  language: es
  text: 'el que dijo de su padre y de su madre: «No lo he visto»[a], y no reconoció a sus hermanos ni conoció a sus hijos varones; porque guardaron tu palabra y custodiaron tu pacto.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Más literalmente: «No lo he visto». Aquí el sentido puede ser «no lo he considerado» o «no he tomado nota de él» en el contexto de lealtad al pacto por encima de los lazos familiares.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאֹמֵר
  english_pob_choice: who said
  chosen_spanish: el que dijo
  alternatives_spanish:
  - quien dijo
  - el que decía
  lexicon: HALOT
  rationale: El participio sustantivado funciona como una cláusula relativa. «El que dijo» mantiene la referencia personal y es natural en español bíblico actual sin suavizar la construcción.
- source_word: לְאָבִיו וּלְאִמּוֹ
  english_pob_choice: of his father and his mother
  chosen_spanish: de su padre y de su madre
  alternatives_spanish:
  - a su padre y a su madre
  - respecto de su padre y de su madre
  lexicon: HALOT
  rationale: Con אמר, la preposición ל puede introducir a la persona acerca de quien se habla. «De» en español expresa bien esa referencia sin forzar un valor puramente direccional.
- source_word: לֹא רְאִיתִיו
  english_pob_choice: I have not seen him
  chosen_spanish: No lo he visto
  alternatives_spanish:
  - No lo he considerado
  - No he tomado nota de él
  lexicon: HALOT
  rationale: La revisión inglesa volvió a «seen» para acercarse al verbo ראה. En español, «No lo he visto» conserva esa cercanía. El contexto de lealtad de pacto deja abierta la posible fuerza idiomática de no tomarlo en cuenta, pero no se explicita en el texto principal.
- source_word: הִכִּיר
  english_pob_choice: acknowledge
  chosen_spanish: reconoció
  alternatives_spanish:
  - lo reconoció
  - lo admitió
  lexicon: HALOT
  rationale: El hifil de נכר expresa reconocimiento relacional. «Reconoció» comunica bien la negativa a dar reconocimiento familiar.
- source_word: אֶחָיו
  english_pob_choice: his brothers
  chosen_spanish: sus hermanos
  alternatives_spanish:
  - sus hermanos varones
  - sus parientes
  lexicon: HALOT
  rationale: Se preserva el masculino plural específico del hebreo. En español, «sus hermanos» es claro y fiel.
- source_word: בָּנָיו
  english_pob_choice: his sons
  chosen_spanish: sus hijos
  alternatives_spanish:
  - sus hijos varones
  - sus descendientes
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «sus hijos/ hijos varones» en forma masculina, en español «sus hijos» puede sonar más natural. Se mantiene la especificidad filial sin perder legibilidad. Se conserva la tensión con «hijos» en sentido masculino en el marco patriarcal del hebreo.
- source_word: יָדָע
  english_pob_choice: know
  chosen_spanish: conoció
  alternatives_spanish:
  - supo de
  - reconoció
  lexicon: HALOT
  rationale: En paralelismo con «reconoció», «conoció» refleja la negativa a reconocer relacionalmente. Es más idiomático en español que un simple «no supo».
- source_word: שָׁמְרוּ
  english_pob_choice: kept
  chosen_spanish: guardaron
  alternatives_spanish:
  - cumplieron
  - observaron
  lexicon: HALOT
  rationale: «Guardar» reproduce bien el lenguaje de pacto y conserva la correspondencia con el siguiente verbo de custodia.
- source_word: אִמְרָתֶךָ
  english_pob_choice: your word
  chosen_spanish: tu palabra
  alternatives_spanish:
  - tu dicho
  - tu mandato
  lexicon: HALOT
  rationale: אִמְרָה puede ser «palabra» o «dicho». «Tu palabra» es el equivalente bíblico más natural y amplio, sin restringirla a una orden puntual.
- source_word: בְּרִיתְךָ
  english_pob_choice: your covenant
  chosen_spanish: tu pacto
  alternatives_spanish:
  - tu alianza
  - tu convenio
  lexicon: HALOT
  rationale: «Pacto» es el término bíblico estándar en español para ברית y mantiene el peso teológico del vínculo de alianza.
- source_word: יִנְצֹרוּ
  english_pob_choice: guarded
  chosen_spanish: custodiarán
  alternatives_spanish:
  - guardan
  - velarán por
  lexicon: HALOT
  rationale: נצר tiene la idea de guardar/custodiar con vigilancia. «Custodiarán» diferencia este verbo de שׁמר («guardaron») y preserva el paralelismo lexical del hebreo.
theological_decisions:
- issue: Pronombres singular/plural en la bendición de Leví
  english_pob_reading: The verse speaks corporately of Levi/the Levites, using singular forms in the relative clauses and plural verbs in the rationale.
  chosen_spanish_reading: La frase principal conserva el singular representativo («el que dijo... no lo he visto»), y la motivación final pasa al plural («guardaron... custodiarán»).
  alternative_spanish_readings:
  - 'suavizar todo al plural: «los que dijeron... no los he visto»'
  - resolverlo como un solo individuo
  rationale: El hebreo alterna entre singular y plural, y esa tensión no debe borrarse. El español mantiene el singular representativo y el plural corporativo para reflejar que la bendición habla de Leví como tribu mediante un representante.
  doctrine_reference: Translation philosophy §3; preservar la tensión teológica y literaria sin resolverla artificialmente
translation_notes:
  revision_awareness: La revisión inglesa más reciente corrigió el verbo principal de «regarded» a «seen» para ajustarlo mejor a ראה. La versión española sigue esa revisión con «No lo he visto», pero mantiene en la nota la alternativa idiomática de «no lo he considerado / no he tomado nota de él» porque el contexto de lealtad de pacto todavía sugiere esa posible fuerza semántica.
  spanish_consistency_notes:
  - Se usa «Dios/pacto/palabra» con terminología bíblica estándar y consistente.
  - Se preserva el contraste verbal entre «guardaron» y «custodiarán» para no aplanar שׁמר / נצר.
  - Se evita «SEÑOR» porque el versículo contiene lenguaje de segunda persona del pacto, no una sustitución del nombre divino.
