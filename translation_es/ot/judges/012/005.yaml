review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo y el rastro de auditoría inglés en la mayor parte: «capturó», «vados», «contra Efraín», «los fugitivos de Efraín», la pregunta identitaria y la nota léxica para מַעְבְּרוֹת están bien encaminados. Sin embargo, «Y cuando» debilita el valor iterativo de וְהָיָה כִּי, y «Y si él respondía» añade un «Y» innecesario y usa un imperfecto más remoto donde el procedimiento narrativo en español se expresa mejor con «si decía» o «si respondía».'
  spanish_quality_summary: El español es claro y legible, pero mezcla una transliteración inglesa del topónimo («Gilead») en vez del uso bíblico normal en español («Galaad»). Además, «cuando» no comunica tan bien la repetición como «siempre que» o «cada vez que». Hay un pequeño ajuste de fluidez en la cláusula final.
  glossary_alignment: 'No hay términos teológicos mayores en juego. Sí hay un problema de convención bíblica/legibilidad: el nombre גִּלְעָד debe verterse como «Galaad» en español eclesial legible, no «Gilead». «Efraín», «efraimita» y «vados» están alineados con el proyecto y con el sentido fuente.'
  issues:
  - severity: medium
    issue: Uso de «Gilead» en lugar de «Galaad».
    rationale: Aunque es reconocible, «Gilead» es forma inglesa; para una Biblia en español neutral y ampliamente legible corresponde «Galaad», que además es la forma establecida para גלעד.
  - severity: medium
    issue: «Y cuando» no preserva suficientemente el valor iterativo de וְהָיָה כִּי.
    rationale: El hebreo introduce una situación repetida/costumbrista; el inglés auditado eligió «whenever». En español, «siempre que» comunica mejor esa iteración que «cuando».
  - severity: low
    issue: «Y si él respondía» es menos natural que una formulación más directa.
    rationale: La secuencia procedimental queda más limpia con «si decía» o «si respondía», sin el «Y» inicial, y se mantiene mejor la lógica condicional del hebreo en contexto.
