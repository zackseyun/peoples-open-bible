  text: Partieron de Tahat y acamparon en Terah.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיִּסְעוּ
  english_pob_choice: They set out
  chosen_spanish: Partieron
  alternatives_spanish:
  - Se pusieron en camino
  - Salieron
  lexicon: HALOT
  rationale: En las listas de itinerario del desierto, נסע indica levantar campamento y avanzar al siguiente punto. «Partieron» expresa con naturalidad ese movimiento secuencial sin perder el sentido de salida del lugar anterior.
- source_word: מִתָּחַת
  english_pob_choice: from Tahath
  chosen_spanish: de Tahat
  alternatives_spanish:
  - desde Tahat
  lexicon: HALOT
  rationale: La preposición מִן se expresa normalmente en español con «de» o «desde». Aquí «de» reproduce bien la relación de procedencia en una nota itineraria, y el nombre propio se translitera como «Tahat».
- source_word: וַיַּחֲנוּ
  english_pob_choice: and camped
  chosen_spanish: acamparon
  alternatives_spanish:
  - y acamparon
  - y levantaron campamento
  lexicon: HALOT
  rationale: חנה en este contexto significa instalar el campamento. «Acamparon» es la forma española más clara y digna para esa acción; conserva el valor narrativo del itinerario.
- source_word: בְּתָרַח
  english_pob_choice: at Terah
  chosen_spanish: en Teraj
  alternatives_spanish:
  - en Terah
  - junto a Teraj
  lexicon: HALOT
  rationale: La preposición בְּ con topónimos de asentamiento puede funcionar locativamente como «en». Se usa «Teraj» para el nombre propio en transliteración española coherente con la pronunciación hebrea, en lugar de la forma bíblica tradicional «Terah».
translation_notes:
  revision_awareness: El texto hebreo y la auditoría inglesa presentan alta concordancia; no hay variantes textuales ni revisiones aplicadas que requieran nota.
