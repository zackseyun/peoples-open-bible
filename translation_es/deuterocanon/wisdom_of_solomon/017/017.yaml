review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador transmite bien la estructura básica del griego: una serie de oficios seguida por la idea de ser alcanzado y permanecer bajo una necesidad ineludible. Sin embargo, hay pequeños problemas de fidelidad y naturalidad: «ya fuera que alguien fuese» suena innecesariamente enrevesado para εἴ τε γὰρ, «trabajador que laboraba» es redundante, y el espacio en «una vez [a] sorprendido» incumple el anclaje normal. Además, la nota actual desplaza levemente el sentido hacia «tomado por sorpresa» en vez de conservar la alternativa auditada entre «apresado» y «alcanzado/alcanzado por la necesidad».'
  spanish_quality_summary: El español es entendible y digno, pero puede mejorarse con un flujo más natural y menos redundante. «Porque, si alguien era agricultor, o pastor, o trabajador en el desierto» lee mejor que la formulación actual. «Permanecía bajo la necesidad inescapable» refleja mejor el imperfecto ἔμενεν que «quedaba bajo».
  glossary_alignment: 'No hay conflictos con la terminología doctrinal del proyecto. Los oficios están bien vertidos como «agricultor» y «pastor». La decisión clave es léxica: conviene ajustar προλημφθεὶς a «apresado» en el texto principal, con nota que preserve la alternativa «alcanzado/sobrevenido».'
  issues:
  - severity: medium
    issue: La apertura «Porque, ya fuera que alguien fuese» es poco natural y sobrerrepresenta la construcción griega.
    rationale: εἴ τε γὰρ introduce una explicación condicional/distributiva, pero en español bíblico natural basta «Porque, si alguien era...» para preservar el sentido sin rigidez artificial.
  - severity: low
    issue: «trabajador que laboraba» es redundante.
    rationale: La frase repite innecesariamente la idea de trabajar. El griego expresa un trabajador de faenas en soledad/desierto; «trabajador en el desierto» o «trabajador que hacía faenas en el desierto» es más limpio.
  - severity: medium
    issue: La nota sobre προλημφθεὶς no refleja con precisión la alternativa auditada.
    rationale: La auditoría inglesa contrasta «once seized» con «once overtaken», no principalmente «tomado por sorpresa». Conviene preservar esa gama semántica en español.
  - severity: low
    issue: «quedaba bajo» es menos preciso que «permanecía bajo» para ἔμενεν.
    rationale: El imperfecto describe estado continuado, no solo resultado; «permanecía» o «seguía» lo expresa mejor.
  - severity: low
    issue: El marcador de nota tiene espaciado incorrecto en «una vez [a] sorprendido».
    rationale: 'El anclaje debe ir pegado a la palabra o frase pertinente: «una vez apresado[a]» o equivalente.'
  revised_spanish_text: Porque, si alguien era agricultor, o pastor, o trabajador en el desierto, una vez apresado[a], permanecía bajo la necesidad inescapable.
  revised_footnotes:
  - marker: a
    text: O «una vez alcanzado, permanecía bajo una compulsión inevitable». El participio griego y el sustantivo pueden expresar tanto la imagen de ser apresado como la de ser alcanzado por la necesidad.
    reason: lexical_alternative
  revision_rationale: 'Se hizo una reparación menor para mejorar fidelidad y legibilidad: se simplificó la apertura condicional, se eliminó la redundancia en la tercera ocupación, se ajustó προλημφθεὶς a «apresado» con una nota que preserva la alternativa auditada de «alcanzado», y se cambió «quedaba» por «permanecía» para reflejar mejor el imperfecto.'
