translation:
  language: es
  text: Por causa de tu palabra[a] y conforme a tu corazón[b], has hecho toda esta grandeza[c], para hacérselo saber a tu siervo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a causa de tu palabra» o «por causa de tu promesa».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «conforme a tu corazón»; es decir, conforme a tu intención o voluntad.'
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo en singular: «toda esta grandeza»; algunas traducciones dicen «estas cosas grandes».'
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּעֲבוּר
  english_pob_choice: Because of
  chosen_spanish: Porque de
  alternatives_spanish:
  - A causa de
  - Por causa de
  - Debido a
  lexicon: HALOT
  rationale: El hebreo expresa causa o fundamento. «Porque de» conserva la causalidad del enunciado y enlaza bien con «tu palabra» sin volver la frase pesada o demasiado explicativa.
- source_word: דְּבָרְךָ
  english_pob_choice: your word
  chosen_spanish: tu palabra
  alternatives_spanish:
  - tu promesa
  - lo que dijiste
  lexicon: HALOT
  rationale: דבר puede ser «palabra», «asunto» o «promesa». Aquí, «tu palabra» preserva la amplitud léxica del hebreo y deja que el contexto davídico-covenantal sugiera la fuerza de promesa sin imponerla como única lectura.
- source_word: וּכְלִבְּךָ
  english_pob_choice: according to your heart
  chosen_spanish: conforme a tu corazón
  alternatives_spanish:
  - conforme a tu voluntad
  - según tu deseo
  lexicon: HALOT
  rationale: Se conserva la metáfora hebrea de «corazón» para la intención interna de Dios, en vez de sustituirla por una abstracción. «Conforme a» comunica la correspondencia normativa del texto.
- source_word: עָשִׂיתָ
  english_pob_choice: you have done
  chosen_spanish: has hecho
  alternatives_spanish:
  - hiciste
  - has actuado
  lexicon: HALOT
  rationale: El perfecto hebreo se expresa naturalmente con el presente perfecto en español, manteniendo el hecho consumado con relevancia actual en la oración de David.
- source_word: אֵת כָּל הַגְּדוּלָּה הַזֹּאת
  english_pob_choice: all this greatness
  chosen_spanish: toda esta grandeza
  alternatives_spanish:
  - todo este gran hecho
  - todas estas cosas grandes
  lexicon: HALOT
  rationale: Se preserva el singular abstracto hebreo «la grandeza» en lugar de pluralizarlo, porque el texto reúne la acción divina en un solo despliegue de grandeza.
- source_word: לְהוֹדִיעַ
  english_pob_choice: to make ... know
  chosen_spanish: para darla a conocer
  alternatives_spanish:
  - para hacer conocer
  - para hacer saber
  lexicon: HALOT
  rationale: El hiphil de ידע es causativo. «Dar a conocer» conserva ese valor causal de manera natural en español y evita una construcción torpe con «hacer saberla».
- source_word: עַבְדֶּךָ
  english_pob_choice: your servant
  chosen_spanish: tu siervo
  alternatives_spanish:
  - tu esclavo
  lexicon: HALOT
  rationale: En el lenguaje de oración real, «siervo» es la forma idiomática y reverente en español para la autodenominación de David ante Dios. Aunque el sentido base de עבד incluye servidumbre/esclavitud, aquí el título relacional es el más fiel al registro.
theological_decisions:
- issue: Referencia de «tu palabra» en contexto de pacto
  english_pob_reading: Rendered broadly as 'your word' rather than the more interpretive 'your promise.'
  chosen_spanish_reading: «tu palabra»
  alternative_spanish_readings:
  - «tu promesa»
  - «lo que dijiste»
  rationale: Se mantiene la formulación más cercana al hebreo y menos interpretativa. En el contexto del pacto con David, el lector puede captar la dimensión de promesa sin que la traducción la reduzca a una sola categoría.
  doctrine_reference: Translation philosophy §1, §3
- issue: Lenguaje antropomórfico en «tu corazón»
  english_pob_reading: Retained the anthropomorphic expression 'according to your heart.'
  chosen_spanish_reading: «conforme a tu corazón»
  alternative_spanish_readings:
  - «conforme a tu voluntad»
  - «según tu deseo»
  rationale: Se conserva la imagen bíblica de corazón como sede de intención o voluntad. Esto respeta el lenguaje del texto y evita sustituirlo por una glosa abstracta que borre la metáfora.
  doctrine_reference: Translation philosophy §3
- issue: Singular de «la grandeza»
  english_pob_reading: Hebrew singular, 'all this greatness'; some translations render 'these great things.'
  chosen_spanish_reading: «toda esta grandeza»
  alternative_spanish_readings:
  - «todas estas cosas grandes»
  - «todos estos grandes hechos»
  rationale: El singular abstracto se conserva para reflejar la forma hebrea y la unidad del acto divino. El español admite esta formulación con claridad y dignidad.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: No se detectaron cambios necesarios respecto del último pasaje revisado; se conserva la equivalencia óptima con atención al hebreo singular de «la grandeza» y al valor causativo de לְהוֹדִיעַ.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma por defecto cuando aparezca el Tetragrámaton; en este versículo no aparece.
  - Se conserva la metáfora de «corazón» para לב, siguiendo el antecedente auditado en inglés.
  - Se usa «siervo» para עבד en contexto de oración reverente, conforme al criterio POB documentado.
  - Se preserva el singular abstracto «grandeza» en lugar de pluralizarlo.
  - La nota de pie de página para la posibilidad de «promesa» se ancla en la palabra «palabra» para reflejar la ambigüedad léxica del hebreo.
