revisions:
- from: Importaron de Egipto un carro por seiscientas piezas de plata[a], y un caballo por ciento cincuenta[b]; y así los exportaron a todos los reyes de los hititas y a los reyes de Aram.
  to: Importaron de Egipto un carro por seiscientos siclos de plata[a], y un caballo por ciento cincuenta; y así los exportaron a todos los reyes de los hititas y a los reyes de Aram[b].
  rationale: 'Se reemplaza «piezas de plata» por «siclos de plata» para reflejar con mayor fidelidad la unidad de valor implícita y evitar una lectura monetaria anacrónica o imprecisa. Se eliminó la nota poco necesaria sobre «ciento cincuenta» y se añadieron las dos alternativas más importantes del expediente inglés: la literalidad de los verbos de movimiento y la equivalencia tradicional «Siria» para «Aram». El resto del verso puede mantenerse como español claro y fiel.'
