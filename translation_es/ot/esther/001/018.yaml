  text: וְֽ/הַ/יּ֨וֹם הַ/זֶּ֜ה תֹּאמַ֣רְנָה שָׂר֣וֹת פָּֽרַס וּ/מָדַ֗י אֲשֶׁ֤ר שָֽׁמְעוּ֙ אֶת דְּבַ֣ר הַ/מַּלְכָּ֔ה לְ/כֹ֖ל שָׂרֵ֣י הַ/מֶּ֑לֶךְ וּ/כְ/דַ֖י בִּזָּי֥וֹן וָ/קָֽצֶף׀־־׃
base_translation:
  language: en
  yaml_path: translation/ot/esther/001/018.yaml
  text: And today the noblewomen of Persia and Media who have heard the queen’s word will say the same to all the king’s officials[c][b][a], and there will be enough contempt and wrath.
  footnotes:
  - marker: a
    text: Or 'the princesses of Persia and Media.' The Hebrew term refers to high-ranking women; 'noblewomen' is chosen to avoid implying they were necessarily royal daughters.
    reason: lexical_alternative
  - marker: b
    text: Or 'what the queen said' / 'the matter of the queen.' The Hebrew 'word' can refer either to her statement or to the reported affair concerning her.
    reason: lexical_alternative
  - marker: c
    text: The final clause is elliptical in Hebrew, literally something like 'and enough contempt and wrath.' The translation supplies 'there will be' for clear English sense.
    reason: lexical_alternative
