translation:
  language: es
  text: 'Así dice Yahvé: Refrena tu voz para que no llore[a] y tus ojos de derramar lágrimas, porque hay recompensa para tu trabajo, declara Yahvé[b], y ellos volverán de la tierra del enemigo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Retén tu voz del llanto». Lit. «tu voz del llanto».'
    reason: lexical_alternative
  - marker: b
    text: El sujeto implícito de «ellos volverán» son los hijos de Raquel, es decir, los exiliados mencionados en el contexto circundante.
    reason: cross_reference
lexical_decisions:
- source_word: כֹּה אָמַר יְהוָה
  english_pob_choice: Thus says Yahweh
  chosen_spanish: Así dice Yahvé
  alternatives_spanish:
  - Esto es lo que dice Yahvé
  - Así ha dicho Yahvé
  lexicon: HALOT
  rationale: La fórmula profética se conserva de manera directa y solemne en español. «Así dice» reproduce bien el valor introductorio de כֹּה אָמַר sin volverlo rígido; «Yahvé» sigue el criterio del proyecto para el nombre divino.
- source_word: מִנְעִי
  english_pob_choice: Restrain
  chosen_spanish: Contén
  alternatives_spanish:
  - Refrena
  - Retén
  lexicon: HALOT
  rationale: El imperativo femenino singular se dirige a la personificación de Raquel. «Contén» es natural en español y mantiene la fuerza exhortativa de מנע sin suavizarla.
- source_word: קוֹלֵךְ מִבֶּכִי
  english_pob_choice: your voice from weeping
  chosen_spanish: tu voz del llanto
  alternatives_spanish:
  - tu voz de llorar
  - tu voz del llorar
  lexicon: HALOT
  rationale: Se preserva la imagen concreta de «voz» más «llanto». «Llanto» funciona bien en español bíblico y conserva el matiz lamentoso de בֶּכִי mejor que un simple «llorar».
- source_word: וְעֵינַיִךְ מִדִּמְעָה
  english_pob_choice: and your eyes from tears
  chosen_spanish: y tus ojos de las lágrimas
  alternatives_spanish:
  - y tus ojos del llanto
  - y tus ojos de derramar lágrimas
  lexicon: HALOT
  rationale: La frase paralela mantiene el lenguaje corporal y la correspondencia con el hebreo. «Lágrimas» traduce de modo directo דִּמְעָה y suena natural en español.
- source_word: כִּי יֵשׁ שָׂכָר
  english_pob_choice: for there is a reward
  chosen_spanish: porque hay recompensa
  alternatives_spanish:
  - porque hay galardón
  - pues hay pago
  lexicon: HALOT
  rationale: «Recompensa» conserva el sentido de שָׂכָר como retribución/promesa de retribución y evita restringirlo a un pago comercial. Mantiene el paralelismo con la promesa divina.
- source_word: לִפְעֻלָּתֵךְ
  english_pob_choice: for your work
  chosen_spanish: para tu trabajo
  alternatives_spanish:
  - por tu labor
  - por tu obra
  lexicon: HALOT
  rationale: פְעֻלָּה puede referirse a trabajo, labor u obra. «Trabajo» es claro y amplio en español moderno, sin perder la referencia a lo realizado por la destinataria.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - dice Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: La fórmula profética se vierte con un verbo solemne y idiomático. «Declara» preserva la seriedad de נְאֻם sin cargar la frase con una traducción demasiado técnica.
- source_word: וְשָׁבוּ
  english_pob_choice: and they will return
  chosen_spanish: y ellos volverán
  alternatives_spanish:
  - y volverán
  - y regresarán
  lexicon: HALOT
  rationale: Se conserva el sujeto implícito plural del hebreo con «ellos», tal como hace el audit trail inglés. «Volverán» es una opción natural y sobria para el movimiento de regreso del exilio.
- source_word: מֵאֶרֶץ אוֹיֵב
  english_pob_choice: from the land of the enemy
  chosen_spanish: de la tierra del enemigo
  alternatives_spanish:
  - desde la tierra del enemigo
  - de la tierra enemiga
  lexicon: HALOT
  rationale: «Tierra del enemigo» reproduce la construcción hebrea y el contexto de destierro. Se evita una paráfrasis más libre para conservar la imagen geográfica y hostil del original.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton, y el proyecto pide «Yahvé» como forma principal en español. Se conserva así el nombre pactual sin la sustitución convencional por «SEÑOR».
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Implicit subject of וְשָׁבוּ
  english_pob_reading: they will return
  chosen_spanish_reading: ellos volverán
  alternative_spanish_readings:
  - volverán
  - volverán los hijos de Raquel
  - volverán los desterrados
  rationale: El hebreo deja el sujeto en plural implícito. «Ellos» mantiene la tersura del original y evita sobreespecificar en el cuerpo del verso un referente que el contexto circundante identifica.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #3'
translation_notes:
  revision_awareness: El último pase de revisión no modificó el texto; el acuerdo cruzado fue alto y el contenido quedó sin cambios necesarios. Esta versión española sigue de cerca el paquete fuente hebreo y el criterio auditado del POB en inglés.
  spanish_consistency_notes:
  - Se conserva «Yahvé» de forma uniforme para יְהוָה.
  - Se mantiene la imagen concreta de «voz», «llanto» y «lágrimas» sin reducirla a una simple exhortación genérica a dejar de llorar.
  - «Recompensa» y «trabajo» reflejan שָׂכָר y פְעֻלָּה sin introducir matices ajenos al texto.
  - La forma plural implícita del verbo final se explicita con «ellos», coherente con el audit trail inglés y el contexto narrativo.
