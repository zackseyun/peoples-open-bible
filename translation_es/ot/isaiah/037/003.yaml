revisions:
- from: 'Y ellos le dijeron: «Así dice Ezequías: Este día es día de angustia, reprensión y afrenta; porque los hijos han llegado hasta el alumbramiento[b], y no hay fuerza para dar a luz».'
  to: 'Y le dijeron: «Así dice Ezequías: Este día es día de angustia, reprensión y afrenta[a]; porque los niños han llegado al momento de nacer[b], y no hay fuerza para dar a luz».'
  rationale: Se revisa para alinear mejor el español con la decisión léxica auditada sobre בָנִים en contexto de parto, mejorar la naturalidad de la imagen en español y restaurar la nota alternativa [a] preservada en el POB inglés. Los demás elementos del verso son sustancialmente fieles y no requieren cambios mayores.
