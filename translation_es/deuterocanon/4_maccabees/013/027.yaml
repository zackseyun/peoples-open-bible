review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido general del griego: las fuerzas de naturaleza, costumbre y virtud intensifican los vínculos fraternos; los hermanos restantes soportan la escena por causa de la piedad; contemplan a sus hermanos siendo torturados hasta la muerte y como objetos de compasión. Sin embargo, hay dos desajustes de fidelidad/matiz: (1) «resistieron» inclina el verbo ἀνέσχοντο hacia oposición activa más que hacia aguante o soportar bajo tensión; (2) «que estaban siendo dignos de compasión» no refleja bien el participio pasivo κατοικτιζομένους y suena poco idiomático. También la nota [a] está mal anclada, porque no corresponde a «igualmente» sino a «los lazos de la fraternidad».'
  spanish_quality_summary: 'El español es generalmente claro y digno, pero presenta dos giros poco naturales: «estaban uniendo para ellos» suena calcado, y «estaban siendo dignos de compasión» resulta torpe. Una leve reestructuración mejora mucho la fluidez sin perder compresión formal. Además, la ubicación de la nota [a] debe corregirse para cumplir la disciplina de anclaje exacto.'
  glossary_alignment: 'La terminología clave está mayormente alineada con el proyecto: «piedad» para εὐσέβεια es correcta; «hermanos / fraternidad» preserva bien ἀδελφοί / ἀδελφότης; no hay conflictos con los términos doctrinales por defecto del proyecto. La principal mejora léxica es preferir «soportaron» o «aguantaron» frente a «resistieron», y una formulación pasiva más natural para κατοικτιζομένους, como «compadecidos» o «dignos de compasión» pero sin el artificio «estaban siendo».'
  issues:
  - severity: medium
    issue: La nota [a] está colocada en «igualmente», pero su contenido explica τὰ τῆς ἀδελφότητος φίλτρα.
    rationale: Las notas deben anclarse exactamente en la palabra o frase pertinente del texto español. Aquí el contenido de la nota trata de «los lazos de la fraternidad», no de «igualmente».
  - severity: medium
    issue: «Resistieron» para ἀνέσχοντο no es la mejor opción en este contexto.
    rationale: El griego apunta a soportar/aguantar con firmeza una carga emocional por causa de la piedad, no tanto a oponerse activamente. «Soportaron» refleja mejor el valor contextual y el inglés auditado «endured».
  - severity: medium
    issue: «Que estaban siendo dignos de compasión» es una construcción poco idiomática y semánticamente imprecisa para κατοικτιζομένους.
    rationale: 'El participio es pasivo: ‘siendo compadecidos’ / ‘objeto de compasión’. La redacción actual mezcla pasividad con una perífrasis antinatural. Conviene una solución más natural en español.'
  - severity: low
    issue: «Estaban uniendo para ellos» suena calcado del griego/inglés.
    rationale: Una formulación como «estaban estrechando para ellos» o «iban reuniendo para ellos» comunica mejor la causalidad convergente de συναξόντων y mejora la naturalidad del español sin perder fidelidad.
