review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la secuencia del hebreo: advertencia preventiva, engaño/seducción del corazón, apartarse, servir a otros dioses y postrarse ante ellos. También preserva la nota léxica sobre יִפְתֶּה. Sin embargo, «no sea que» con el subjuntivo «se aparten/sirvan/se postren» suena menos natural tras «Cuídense» y debilita la progresión verbal directa que en español se expresa mejor con futuro de subjuntivo funcionalizado por la construcción o con presente indicativo coordinado. Además, «sea seducido» es posible, pero en este contexto pactal «sea engañado» refleja mejor la elección principal de la POB inglesa, dejando «seducido» como alternativa en nota.'
  spanish_quality_summary: El texto es claro y digno, pero requiere un ajuste menor para mayor naturalidad y fidelidad al énfasis principal documentado. «Tengan cuidado, no sea que su corazón sea engañado y ustedes se aparten, sirvan a otros dioses y se postren ante ellos[a].» fluye mejor en español neutral y evita la cadena repetitiva de comas con subjuntivos exhortativos ambiguos.
  glossary_alignment: 'No hay conflicto con la terminología del proyecto: no aparece Yahvé en el hebreo de este versículo; «otros dioses», «corazón» y «se postren» están bien alineados. La decisión principal a ajustar es יִפְתֶּה: conviene usar «sea engañado» en el texto y conservar «sea seducido» como alternativa léxica en nota, en línea con la auditoría inglesa.'
  issues:
  - severity: medium
    issue: La elección principal «sea seducido» no refleja del todo la decisión principal de la POB inglesa.
    rationale: La auditoría inglesa eligió «be deceived» como traducción principal y reservó «be enticed» como alternativa en nota. El español puede preservar mejor esa relación con «sea engañado» en el texto y «sea seducido» en la nota.
  - severity: low
    issue: La secuencia verbal «y se aparten, y sirvan..., y se postren...» tras «no sea que» suena algo forzada en español.
    rationale: Aunque es comprensible, la coordinación repetida con subjuntivo produce una cadencia menos natural. Una leve reestructuración mantiene el sentido sin paráfrasis y mejora la legibilidad.
  revised_spanish_text: Tengan cuidado, no sea que su corazón sea engañado y ustedes se aparten, sirvan a otros dioses y se postren ante ellos[a].
  revised_footnotes:
  - marker: a
    text: O «sea seducido». El verbo hebreo puede tener el sentido de ser persuadido, seducido o engañado.
    reason: lexical_alternative
  revision_rationale: Se ajusta la traducción principal de יִפְתֶּה a «sea engañado» para alinearla con la decisión principal documentada en la POB inglesa, manteniendo «sea seducido» como alternativa en nota. También se suaviza la sintaxis inicial con «Tengan cuidado» y se elimina la repetición innecesaria de conjunciones para lograr un español más natural sin perder la progresión del hebreo.
