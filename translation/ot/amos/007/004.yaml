id: AMO.7.4
reference: Amos 7:4
source:
  edition: WLC
  text: כֹּ֤ה הִרְאַ֨/נִי֙ אֲדֹנָ֣/י יְהוִ֔ה וְ/הִנֵּ֥ה קֹרֵ֛א לָ/רִ֥ב בָּ/אֵ֖שׁ אֲדֹנָ֣/י יְהוִ֑ה וַ/תֹּ֨אכַל֙ אֶת תְּה֣וֹם רַבָּ֔ה וְ/אָכְלָ֖ה אֶת הַ/חֵֽלֶק־־׃
translation:
  text: 'This is what the Lord GOD showed me: behold[a], the Lord GOD was calling for a judgment by fire[b], and it consumed the great deep and was consuming the land.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a lawsuit by fire' or 'to contend by fire'; the Hebrew לָרִב carries judicial overtones of dispute or legal contention.
    reason: lexical_alternative
  - marker: b
    text: Or 'the portion,' likely referring to the land or allotted territory.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּה
  chosen: This is what
  alternatives:
  - Thus
  - Like this
  lexicon: HALOT
  rationale: Introduces the visionary report idiomatically. 'This is what' is natural modern English while preserving the demonstrative force.
- source_word: הִרְאַנִי
  chosen: showed me
  alternatives:
  - caused me to see
  lexicon: HALOT
  rationale: The Hiphil of ראה here introduces a prophetic vision. 'Showed me' is standard and clear in English.
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - Lord YHWH
  - the Lord Yahweh
  lexicon: HALOT
  rationale: Following the doctrine default, יְהוָה is rendered 'the LORD'; in the compound title אֲדֹנָי יְהוִה, standard English convention is 'the Lord GOD' to avoid 'Lord LORD' while preserving both divine titles.
- source_word: וְהִנֵּה
  chosen: behold
  alternatives:
  - look
  - and behold
  lexicon: HALOT
  rationale: Marks the vividness of the vision. 'Behold' preserves the deictic force and prophetic tone better than a flatter alternative.
- source_word: קֹרֵא
  chosen: was calling for
  alternatives:
  - called for
  - summoned
  lexicon: HALOT
  rationale: The participle conveys ongoing or imminent action within the vision. 'Was calling for' reflects that aspect naturally.
- source_word: לָרִב
  chosen: a judgment
  alternatives:
  - a lawsuit
  - a contention
  - to contend
  lexicon: HALOT
  rationale: ריב can denote legal contention or covenant lawsuit. Here, with fire as the instrument, 'a judgment' best conveys the judicial sense in idiomatic English without over-specifying courtroom imagery.
- source_word: בָּאֵשׁ
  chosen: by fire
  alternatives:
  - with fire
  - through fire
  lexicon: HALOT
  rationale: Expresses the means or instrument of the judgment. 'By fire' is concise and natural.
- source_word: וַתֹּאכַל
  chosen: it consumed
  alternatives:
  - and it devoured
  - and it ate up
  lexicon: HALOT
  rationale: The feminine verb refers to the fire. 'Consumed' fits judgment imagery in English better than the more literal 'ate up.'
- source_word: תְּהוֹם רַבָּה
  chosen: the great deep
  alternatives:
  - the vast deep
  - the great abyss
  lexicon: HALOT
  rationale: A standard biblical expression for the primeval or subterranean waters. 'The great deep' preserves the traditional and lexical sense without importing later speculative meanings.
- source_word: וְאָכְלָה
  chosen: and was consuming
  alternatives:
  - and consumed
  - and devoured
  lexicon: HALOT
  rationale: The form can be read as continuing/resultative in sequence after the prior verb. Rendering it progressively captures the vision's unfolding action.
- source_word: הַחֵלֶק
  chosen: the land
  alternatives:
  - the portion
  - the territory
  - the allotment
  lexicon: HALOT
  rationale: חלק literally means 'portion' or 'share,' but in this context likely refers to the land/territory allotted, especially in a judgment vision affecting creation and inheritance. 'The land' communicates the sense clearly in English while avoiding an opaque literalism.
