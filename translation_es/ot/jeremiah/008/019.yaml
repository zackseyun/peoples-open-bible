translation:
  language: es
  text: '¡Mira, el clamor[a] de la hija de mi pueblo desde una tierra lejana[b]: «¿No está Yahvé en Sión? ¿No está su Rey en ella?». ¿Por qué me provocaron a ira con sus imágenes talladas, con ídolos extranjeros[c]?'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Más literalmente: «la voz del clamor de la hija de mi pueblo».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «desde una tierra de lejuras / distancias», es decir, desde muy lejos.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «vanidades extranjeras». La expresión hebrea se burla de los ídolos como vacíos e inútiles.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: ¡Mira!
  alternatives_spanish:
  - ¡Mira!
  - ¡Atiende!
  - ¡He aquí!
  lexicon: HALOT
  rationale: Es una interjección deíctica que introduce algo urgente. «¡Mira!» conserva la inmediatez natural del inglés POB sin caer en un calco arcaizante.
- source_word: קוֹל שַׁוְעַת
  english_pob_choice: the cry
  chosen_spanish: la voz del clamor
  alternatives_spanish:
  - el clamor
  - la voz del clamor
  - el sonido del clamor
  lexicon: HALOT
  rationale: La cadena hebrea es literalmente «voz/sonido del clamor». En español, «la voz del clamor» mantiene la estructura y la intensidad, sin perder naturalidad.
- source_word: בַּת עַמִּי
  english_pob_choice: the daughter of my people
  chosen_spanish: la hija de mi pueblo
  alternatives_spanish:
  - la hija de mi pueblo
  - mi pueblo querido
  - la hija de mi gente
  lexicon: HALOT
  rationale: Se conserva la metáfora poética/familiar, porque el texto no la explica ni la reemplaza. «Pueblo» comunica mejor la referencia colectiva que «gente».
- source_word: מֵאֶרֶץ מַרְחַקִּים
  english_pob_choice: from a distant land
  chosen_spanish: desde una tierra lejana
  alternatives_spanish:
  - desde una tierra lejana
  - desde una tierra muy distante
  - de una tierra lejana
  lexicon: HALOT
  rationale: La pluralidad hebrea expresa lejanía intensa. «Desde una tierra lejana» es idiomático en español y conserva la idea de exilio o distancia extrema.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahvé
  lexicon: HALOT
  rationale: Se sigue el estándar del proyecto para el nombre divino, manteniendo el Tetragrámaton visible en español en lugar de ocultarlo con una sustitución reverencial.
- source_word: אֵין בְּצִיּוֹן
  english_pob_choice: is ... not in Zion
  chosen_spanish: ¿No está Yahvé en Sión?
  alternatives_spanish:
  - ¿No está Yahvé en Sión?
  - ¿No hay en Sión...?
  lexicon: HALOT
  rationale: La construcción existencial negativa se vierte como pregunta directa e idiomática en español, como en el POB inglés.
- source_word: אִם מַלְכָּהּ אֵין בָהּ
  english_pob_choice: Is her King not in her?
  chosen_spanish: ¿No está su rey en ella?
  alternatives_spanish:
  - ¿No está su rey en ella?
  - ¿No está su Rey en ella?
  - ¿No hay rey en ella?
  lexicon: HALOT
  rationale: Se conserva el paralelismo y el referente real. Se deja «rey» en minúscula porque en español el contexto ya lo identifica y el título puede leerse sin forzar una capitalización interpretativa.
- source_word: הִכְעִסוּנִי
  english_pob_choice: have they provoked me to anger
  chosen_spanish: me irritaron
  alternatives_spanish:
  - me irritaron
  - me provocaron a ira
  - me provocaron a enojo
  lexicon: HALOT
  rationale: El hiphil expresa causación/intensificación; en español, «me irritaron» comunica el efecto de provocar ira sin sonar forzado. Se evita un giro demasiado técnico o arcaico.
- source_word: בִּפְסִלֵיהֶם
  english_pob_choice: with their carved images
  chosen_spanish: con sus imágenes talladas
  alternatives_spanish:
  - con sus imágenes talladas
  - con sus ídolos tallados
  - con sus esculturas
  lexicon: HALOT
  rationale: פָּסִיל designa imágenes esculpidas; «imágenes talladas» preserva la concreción material y el matiz de idolatría que el POB inglés quiso mantener.
- source_word: בְּהַבְלֵי נֵכָר
  english_pob_choice: with foreign idols
  chosen_spanish: con vanidades extranjeras
  alternatives_spanish:
  - con vanidades extranjeras
  - con ídolos extranjeros
  - con vaciedades extranjeras
  lexicon: HALOT
  rationale: 'Se mantiene la tensión lexical: הבל es literalmente vacío/vanidad, y נֵכָר señala lo extranjero. «Vanidades extranjeras» conserva el sarcasmo profético que el inglés POB documentó, sin borrar el componente idolátrico.'
theological_decisions:
- issue: Nombre divino YHWH en el texto
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  rationale: El hebreo usa explícitamente el Tetragrámaton; se conserva el nombre propio del pacto en español, conforme al estándar del proyecto y sin la sustitución por un título genérico.
  doctrine_reference: 'DOCTRINE.md: יְהוָה/YHWH → Yahvé'
- issue: Referente de «su rey» en Sión
  english_pob_reading: Capitalized 'King' as referring to the LORD
  chosen_spanish_reading: «su rey» entendido como referencia a Yahvé
  alternative_spanish_readings:
  - «su rey»
  - «su Rey»
  rationale: El paralelismo con «Yahvé» muestra que el rey es el gobernante divino de Sión. En español se puede mantener minúscula sin perder el referente, evitando imponer una convención tipográfica no necesaria.
  doctrine_reference: Jeremías 8:19; paralelismo poético sobre la realeza de Yahvé
translation_notes:
  revision_awareness: 'Consulta del audit trail inglés: no se hicieron cambios de revisión posteriores; el consenso de revisión fue alto y el texto inglés quedó sin cambios. La versión española sigue la misma línea interpretativa: conservar el paralelismo entre Yahvé y su rey, y mantener la ambigüedad sarcástica de בְּהַבְלֵי נֵכָר con una nota alternativa.'
  spanish_consistency_notes:
  - Se usa «Yahvé» conforme al estándar del proyecto.
  - Se conserva la metáfora «la hija de mi pueblo» en vez de paraphrasearla.
  - «Vanidades extranjeras» mantiene la doble carga de vacío/extrañeza del hebreo.
  - La puntuación reproduce el arranque enfático con guion largo, en línea con el inglés POB.
