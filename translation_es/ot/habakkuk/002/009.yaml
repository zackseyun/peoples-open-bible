  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido del hebreo: denuncia profética («¡Ay de!»), lucro obtenido de manera inicua para la propia casa, la imagen metafórica del nido en lo alto y la finalidad de escapar de la calamidad. También mantiene correctamente «casa» y «nido», en línea con el expediente POB. La única desviación relevante es estilístico-lexical: «acumula» añade un matiz de acumulación no explicitado por בֹּצֵעַ, que se refiere más ampliamente a obtener/ganar por lucro injusto.'
  spanish_quality_summary: El español es claro y digno, pero puede afinarse. «Obtiene ganancia injusta» o «consigue ganancia injusta» se ajusta mejor al hebreo que «acumula». Además, la nota a contiene un anglicismo sin traducir («wrongdoing»), impropio de una edición española. «Escaparse» es comprensible, pero «escapar» suena un poco más sobrio en registro bíblico; sin embargo, no es imprescindible si se conserva la fluidez.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Casa», «nido» y «calamidad» concuerdan con las decisiones documentadas. La elección «ganancia injusta» es aceptable dentro de las alternativas registradas para בֶּצַע רָע, pero conviene quitar el matiz extra de «acumula».
  issues:
  - severity: medium
    issue: «acumula ganancia injusta» sobretraduce בֹּצֵעַ
    rationale: El participio hebreo describe adquirir/obtener lucro injusto, no necesariamente acumularlo. «Acumula» añade un matiz aspectual no exigido por la fuente ni por el POB inglés.
  - severity: medium
    issue: La nota [a] contiene el anglicismo «wrongdoing»
    rationale: La nota debe estar plenamente en español. Esto afecta la calidad editorial y la legibilidad, aunque no el sentido principal del versículo.
  - severity: low
    issue: «escaparse» es algo más coloquial que «escapar»
    rationale: No es incorrecto, pero «escapar» mantiene mejor el tono sobrio y digno pedido para el español meta.
