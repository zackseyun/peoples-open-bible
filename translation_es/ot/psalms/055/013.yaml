translation:
  language: es
  text: Pues no es un enemigo el que me insulta[a]—entonces lo soportaría; no es el que me odia el que se ha engrandecido[b] contra mí—entonces me ocultaría de él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «me insulta» traduce el hebreo con una opción natural; también puede entenderse como «me reprocha» o «me vitupera», porque el verbo expresa afrenta verbal despectiva.
    reason: lexical_alternative
  - marker: b
    text: «se ha engrandecido» refleja el hebreo literalmente; la idea puede ser también «se ha magnificado» o «ha actuado con arrogancia» contra mí.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la explicación del lamento. En español, «Porque» mantiene la conexión causal/discursiva sin sonar forzado en poesía.
- source_word: אוֹיֵב
  english_pob_choice: enemy
  chosen_spanish: enemigo
  alternatives_spanish:
  - adversario
  - f enemigo
  lexicon: HALOT
  rationale: «enemigo» es el equivalente natural y claro para un oponente hostil personal.
- source_word: יְחָרְפֵנִי
  english_pob_choice: taunts me
  chosen_spanish: me insulta
  alternatives_spanish:
  - me reprocha
  - me vitupera
  - me ridiculiza
  lexicon: HALOT
  rationale: El verbo implica afrenta verbal despectiva. «Me insulta» comunica bien la agresión verbal en español moderno; se conserva la nota alternativa en la nota a para la posible fuerza de reproche o escarnio.
- source_word: וְאֶשָּׂא
  english_pob_choice: then I could bear it
  chosen_spanish: entonces lo soportaría
  alternatives_spanish:
  - entonces lo aguantaría
  - entonces lo podría تحمل
  lexicon: HALOT
  rationale: נשא aquí tiene sentido idiomático de soportar/endurar. La forma condicional «lo soportaría» refleja el carácter contrafactual del contexto.
- source_word: מְשַׂנְאִי
  english_pob_choice: one who hates me
  chosen_spanish: uno que me odia
  alternatives_spanish:
  - mi enemigo
  - el que me odia
  lexicon: HALOT
  rationale: El participio describe a una persona marcada por odio hostil. «Uno que me odia» preserva la relación personal sin introducir matices no explicitados.
- source_word: עָלַי
  english_pob_choice: against me
  chosen_spanish: contra mí
  alternatives_spanish:
  - sobre mí
  - en mi contra
  lexicon: HALOT
  rationale: Con el verbo siguiente, la preposición expresa oposición hostil. «Contra mí» es la equivalencia idiomática directa en español.
- source_word: הִגְדִּיל
  english_pob_choice: has magnified himself
  chosen_spanish: se ha engrandecido
  alternatives_spanish:
  - se ha magnificado
  - se ha hecho grande
  - se ha exaltado
  lexicon: HALOT
  rationale: El hiphil de גדל expresa auto-agrandamiento o arrogancia. «Se ha engrandecido» conserva la imagen verbal y la fuerza de autoexaltación sin sonar artificial.
- source_word: וְאֶסָּתֵר
  english_pob_choice: then I could hide
  chosen_spanish: entonces me ocultaría
  alternatives_spanish:
  - entonces me escondería
  - entonces me podría ocultar
  lexicon: HALOT
  rationale: El nifal expresa ocultarse/esconderse a sí mismo. «Me ocultaría» mantiene la forma contrafactual y un registro digno.
- source_word: מִמֶּנּוּ
  english_pob_choice: from him
  chosen_spanish: de él
  alternatives_spanish:
  - de su presencia
  - lejos de él
  lexicon: HALOT
  rationale: «de él» es natural en español y preserva la relación pronominal sin añadir interpretación. En contexto poético, también puede implicar distancia o separación.
translation_notes:
  revision_awareness: 'La versión inglesa revisada cambió «has exalted himself» por «has magnified himself» para reflejar con más precisión הִגְדִּיל. La traducción española sigue esa decisión con «se ha engrandecido», conservando la imagen de auto-agrandamiento/arrogancia. También se mantuvo la estructura condicional contrafactual del paralelismo: si fuera un enemigo/odioso, podría soportarlo/ocultarme.'
  spanish_consistency_notes:
  - Se usó «Yahvé» como forma estable del proyecto cuando no aparece en este versículo.
  - Se evitó «SEÑOR» porque el texto hebreo aquí no contiene el Tetragrámaton.
  - «enemigo / uno que me odia» conserva el paralelismo hostil del hebreo.
  - «me insulta» y «se ha engrandecido» mantienen la tensión lexical sin suavizar el tono despectivo o arrogante.
