    rationale: En español latinoamericano, «sus» puede referirse tanto a Job como a los amigos. El hebreo marca claramente segunda persona plural, así que debe aclararse como «las palabras de ustedes» o equivalente.
  - severity: low
    issue: Alternativa de nota «ha arreglado palabras» poco natural
    rationale: Aunque refleja parcialmente el valor léxico de עָרַךְ, en español bíblico natural suena mecánico. Es mejor destacar «ha ordenado» o «ha dispuesto» como alternativas más inteligibles.
