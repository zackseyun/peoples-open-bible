translation:
  language: es
  text: 'Y Abraham dijo a su siervo, el mayor de su casa, que gobernaba sobre todo lo que le pertenecía[b]: «Te ruego que pongas tu mano debajo de mi muslo[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Poner la mano debajo del muslo era un antiguo gesto de juramento, probablemente señal de un compromiso solemne de pacto.
    reason: cultural_note
  - marker: b
    text: 'O, de manera más idiomática: «que estaba a cargo de todo lo que tenía».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And ... said
  chosen_spanish: Y ... dijo
  alternatives_spanish:
  - Entonces ... dijo
  lexicon: HALOT
  rationale: El waw consecutivo narrativo se refleja naturalmente con «Y» en español, manteniendo el flujo narrativo sin añadir matiz temporal no explícito.
- source_word: עַבְדּוֹ
  english_pob_choice: his servant
  chosen_spanish: su esclavo
  alternatives_spanish:
  - su siervo
  - su servidor
  lexicon: HALOT
  rationale: El hebreo עבד admite la gama esclavo/siervo, pero aquí el POB inglés dejó la fuerza léxica abierta sin suavizarla a 'slave' por razones de contexto. En español, «esclavo» conserva mejor la fuerza del término; el contexto de mayordomía doméstica se expresa con lo que sigue.
- source_word: זְקַן בֵּיתוֹ
  english_pob_choice: the oldest of his household
  chosen_spanish: el mayor de su casa
  alternatives_spanish:
  - el más viejo de su casa
  - el anciano de su casa
  - el mayor de su servidumbre
  lexicon: HALOT
  rationale: La expresión funciona appositivamente para indicar senioridad/estatus dentro de la casa de Abraham. «El mayor de su casa» comunica esa prioridad de rango en español sin forzar una precisión biológica que el contexto no exige.
- source_word: הַמֹּשֵׁל בְּכָל אֲשֶׁר ל֑וֹ
  english_pob_choice: who ruled over all that belonged to him
  chosen_spanish: que gobernaba sobre todo lo que era suyo
  alternatives_spanish:
  - que estaba a cargo de todo lo que tenía
  - que regía sobre todo lo que poseía
  - que gobernaba sobre todas sus posesiones
  lexicon: HALOT
  rationale: מֹשֵׁל expresa ejercicio de gobierno/autoridad. «Gobernaba sobre» conserva esa idea, y «todo lo que era suyo» reproduce de forma idiomática la posesión implícita en אֲשֶׁר לוֹ.
- source_word: שִׂים נָא
  english_pob_choice: Please put
  chosen_spanish: Te ruego que pongas
  alternatives_spanish:
  - Por favor, pon
  - Te pido que pongas
  lexicon: HALOT
  rationale: La partícula נָא marca súplica o ruego respetuoso. En español, «Te ruego que» transmite mejor la solemnidad de la petición que un simple «por favor».
- source_word: יָדְךָ
  english_pob_choice: your hand
  chosen_spanish: tu mano
  alternatives_spanish:
  - la mano tuya
  lexicon: HALOT
  rationale: Correspondencia literal y natural.
- source_word: תַּחַת יְרֵכִי
  english_pob_choice: under my thigh
  chosen_spanish: debajo de mi muslo
  alternatives_spanish:
  - bajo mi muslo
  lexicon: HALOT
  rationale: Se conserva la literalidad del gesto juramentario. «Muslo» es el equivalente claro y digno en español; la explicación cultural se deja en nota.
theological_decisions:
- issue: Gestualidad juramentaria de poner la mano debajo del muslo
  english_pob_reading: Placing the hand under the thigh was an ancient oath-taking gesture, likely signaling solemn covenantal commitment.
  chosen_spanish_reading: Se conserva el gesto literal como fórmula antigua de juramento, sin explicarlo en el texto principal.
  alternative_spanish_readings:
  - poner la mano bajo la cadera
  - hacer un juramento solemne
  - tomar un compromiso de pacto
  rationale: El texto hebreo es culturalmente específico y no pide una paráfrasis. Mantener la literalidad respeta el dato histórico y permite una nota explicativa sin borrar la tensión cultural del pasaje.
  doctrine_reference: Génesis 24:2; práctica juramentaria antigua
translation_notes:
  revision_awareness: Se siguió la revisión inglesa más reciente al preferir una expresión natural para זְקַן בֵּיתוֹ equivalente a «the oldest of his household». También se respetó la decisión inglesa de mantener la literalidad de תַּחַת יְרֵכִי y de explicar su sentido cultural en nota, así como la formulación de autoridad para הַמֹּשֵׁל.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se prefirió «esclavo» para עבד por consistencia léxica cuando el contexto presenta una relación de servidumbre dependiente dentro de la casa.
  - «Muslo» se conserva como término literal y digno; la nota evita una reinterpretación eufemística del gesto.
  - La puntuación y comillas siguen el uso español; el colon introduce el discurso directo de forma natural.
