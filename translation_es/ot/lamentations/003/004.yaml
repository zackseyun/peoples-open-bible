- from: Él ha consumido[a] mi carne y mi piel; ha quebrado mis huesos.
  to: Él ha desgastado[a] mi carne y mi piel; ha quebrado mis huesos.
  rationale: Se ajusta בִּלָּה al sentido principal documentado de desgaste corporal («has worn away») y se conserva «ha consumido» como alternativa léxica secundaria. El resto del verso ya era fiel al hebreo, idiomático en español y coherente con la auditoría inglesa.
