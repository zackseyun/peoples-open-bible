translation:
  language: es
  text: Así, David reinó sobre todo Israel, y administraba justicia y rectitud[a] a todo su pueblo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «juicio y rectitud». El par hebreo combina la justicia legal con la rectitud moral al describir el gobierno de David.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּמְלֹךְ
  english_pob_choice: reigned
  chosen_spanish: reinó
  alternatives_spanish:
  - fue rey
  - gobernó
  lexicon: HALOT
  rationale: El wayyiqtol de מלך expresa el ejercicio real del poder; en español, «reinó» es natural y conserva la referencia a la función regia sin añadir matices no presentes.
- source_word: עַל כָּל יִשְׂרָאֵל
  english_pob_choice: over all Israel
  chosen_spanish: sobre todo Israel
  alternatives_spanish:
  - sobre todo el Israel
  - sobre la totalidad de Israel
  lexicon: HALOT
  rationale: La preposición עַל con מלך marca la esfera o ámbito del reinado. «Sobre todo Israel» reproduce bien esa relación y suena fluido en español.
- source_word: וַיְהִי עֹשֶׂה
  english_pob_choice: and he administered
  chosen_spanish: y administró
  alternatives_spanish:
  - y estaba haciendo
  - y ejercía
  lexicon: HALOT
  rationale: La construcción היה + participio indica acción habitual o continua; en contexto real-administrativo, «administró» comunica el sentido de gobierno ejercido de manera sostenida.
- source_word: מִשְׁפָּט
  english_pob_choice: justice
  chosen_spanish: justicia
  alternatives_spanish:
  - juicio
  - sentencia
  lexicon: HALOT
  rationale: En este contexto de gobierno real, מִשְׁפָּט se refiere al orden legal justo. «Justicia» mantiene esa fuerza y evita el tono más restrictivo de «juicio».
- source_word: וּצְדָקָה
  english_pob_choice: righteousness
  chosen_spanish: rectitud
  alternatives_spanish:
  - justicia
  - justeza
  lexicon: HALOT
  rationale: La pareja מִשְׁפָּט / צְדָקָה distingue justicia legal y rectitud moral. «Rectitud» preserva esa segunda vertiente sin repetir «justicia» y sin perder la idea de obrar correctamente.
- source_word: לְכָל עַמּוֹ
  english_pob_choice: to all his people
  chosen_spanish: a todo su pueblo
  alternatives_spanish:
  - para todo su pueblo
  - a todo el pueblo
  lexicon: HALOT
  rationale: El ל indica el destinatario o beneficiario de su administración. «A todo su pueblo» refleja bien esa dirección y conserva el sufijo posesivo de 3ms en עַמּוֹ.
theological_decisions:
- issue: La pareja legal-moral מִשְׁפָּט וּצְדָקָה
  english_pob_reading: justice and righteousness
  chosen_spanish_reading: justicia y rectitud
  alternative_spanish_readings:
  - justicia y justicia
  - juicio y rectitud
  - justicia y justicia moral
  rationale: El hebreo presenta dos términos relacionados pero no idénticos. Mantener «justicia y rectitud» conserva la tensión entre orden legal correcto y conducta moral correcta, en vez de fusionarlos en una sola idea.
  doctrine_reference: Translation philosophy §5 (Consistency of key terms, or documented exception)
translation_notes:
  revision_awareness: La redacción sigue de cerca el estado revisado del inglés POB, especialmente el cambio de «for» a «to» en la relación con el pueblo. Para el español se eligió «a todo su pueblo», que refleja de manera natural el valor beneficiario/direccional del hebreo לְ.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general, pero este versículo no lo requiere.
  - Se preservó la distinción entre «justicia» y «rectitud» para no aplanar la pareja hebrea.
  - Se evitó «SEÑOR» y «Cristo» porque no corresponden al contenido del versículo.
  - El estilo es formal y bíblico, pero con sintaxis española natural.
