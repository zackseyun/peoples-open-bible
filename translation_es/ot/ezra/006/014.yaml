translation:
  language: es
  text: Y los ancianos de los judíos estaban construyendo y prosperando[a] por medio de la profecía de Hageo el profeta y de Zacarías hijo de Iddo. Terminaron por decreto del Dios de Israel y por decreto de Ciro, de Darío y de Artajerjes, rey de Persia[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Prosperando» también puede entenderse como «teniendo éxito» o «avanzando».
    reason: lexical_alternative
  - marker: b
    text: La mención coloca primero el decreto del Dios de Israel y luego los decretos de Ciro, Darío y Artajerjes.
    reason: theological_note
lexical_decisions:
- source_word: שָׂבֵי יְהוּדָיֵא
  english_pob_choice: the elders of the Jews
  chosen_spanish: los ancianos de los judíos
  alternatives_spanish:
  - los ancianos de Judá
  - los líderes antiguos de los judíos
  lexicon: HALOT
  rationale: Conserva la designación social de liderazgo y la referencia étnica sin convertirla innecesariamente en un gentilicio geográfico distinto. «Ancianos» es la equivalencia natural de «elders».
- source_word: בָּנַיִן
  english_pob_choice: were building
  chosen_spanish: estaban construyendo
  alternatives_spanish:
  - estaban edificando
  - construían
  lexicon: HALOT
  rationale: El participio arameo expresa acción en curso; el imperfecto perifrástico español mantiene bien ese valor progresivo sin añadir la idea de «reconstruir» que no está explícita en el verbo.
- source_word: וּמַצְלְחִין
  english_pob_choice: and prospering
  chosen_spanish: y prosperando
  alternatives_spanish:
  - y teniendo éxito
  - y avanzando
  lexicon: HALOT
  rationale: «Prosperar» conserva la fuerza de éxito y buen curso del trabajo; evita reducirlo a mera eficiencia o avance técnico.
- source_word: בִּנְבוּאַת
  english_pob_choice: through the prophecy of
  chosen_spanish: por la profecía de
  alternatives_spanish:
  - por medio de la profecía de
  - a través de la profecía de
  lexicon: HALOT
  rationale: La preposición marca medio/instrumento. «Por la profecía de» es natural en español y mantiene que la acción fue mediada por el mensaje profético.
- source_word: חַגַּי נביא/ה
  english_pob_choice: Haggai the prophet
  chosen_spanish: Hageo el profeta
  alternatives_spanish:
  - Hageo, el profeta
  lexicon: HALOT
  rationale: Nombre bíblico estándar en español; se conserva el apposicional «el profeta» sin expansión.
- source_word: וּזְכַרְיָה בַּר עִדּוֹא
  english_pob_choice: Zechariah son of Iddo
  chosen_spanish: Zacarías hijo de Idó
  alternatives_spanish:
  - Zacarías, hijo de Idó
  lexicon: HALOT
  rationale: «bar» equivale a «hijo de»; la forma con nombre bíblico español mantiene fluidez y fidelidad.
- source_word: וְשַׁכְלִלוּ
  english_pob_choice: finished by / finished building
  chosen_spanish: Terminaron
  alternatives_spanish:
  - lo terminaron
  - lo completaron
  - lo llevaron a término
  lexicon: HALOT
  rationale: Siguiendo la revisión auditada, no se añade «construcción» porque no está explícita aquí. «Terminaron» recoge el valor de завершение/completitud del verbo.
- source_word: מִן טַעַם אֱלָהּ יִשְׂרָאֵל
  english_pob_choice: by the decree of the God of Israel
  chosen_spanish: por decreto del Dios de Israel
  alternatives_spanish:
  - según el decreto del Dios de Israel
  - por la orden del Dios de Israel
  lexicon: HALOT
  rationale: «טעם» en arameo imperial puede significar decreto/mandato oficial. «Por decreto» reproduce esa fuerza jurídica y respeta la formulación del audit trail.
- source_word: וּמִטְּעֵם כּוֹרֶשׁ וְדָרְיָוֶשׁ וְאַרְתַּחְשַׁשְׂתְּא
  english_pob_choice: and by the decree of Cyrus and Darius and Artaxerxes
  chosen_spanish: y por decreto de Ciro, de Darío y de Artajerjes
  alternatives_spanish:
  - y por la orden de Ciro, de Darío y de Artajerjes
  - y según el decreto de Ciro, Darío y Artajerjes
  lexicon: HALOT
  rationale: Mantiene la repetición del sustantivo jurídico sin sobrecargar la frase. La coordinación española conserva la lista de reyes persas y el paralelismo con el decreto divino.
- source_word: מֶלֶךְ פָּרָס
  english_pob_choice: king of Persia
  chosen_spanish: rey de Persia
  alternatives_spanish:
  - el rey de Persia
  lexicon: HALOT
  rationale: Título real directo y natural en español; se conserva como aposición final al último rey nombrado.
theological_decisions:
- issue: Relación entre el decreto divino y los decretos imperiales
  english_pob_reading: The verse attributes the completion both to God's decree and to the decrees of Persian kings, with God's decree named first.
  chosen_spanish_reading: El texto atribuye la terminación tanto al decreto de Dios como a los decretos de los reyes persas, nombrando primero el decreto de Dios.
  alternative_spanish_readings:
  - Los decretos de los reyes persas son solo subordinados al decreto divino.
  - Los decretos humanos y el decreto divino se presentan como explicaciones paralelas.
  rationale: La traducción conserva la tensión textual sin resolverla. No reduce los decretos persas a simple fórmula vacía ni borra la prioridad del decreto de Dios.
  doctrine_reference: Preservar la tensión teológica del texto sin armonización excesiva.
translation_notes:
  revision_awareness: Se incorporó la revisión auditada que eliminó la inserción no explícita de «construcción» después de «terminaron». También se mantuvo la lectura que preserva el paralelismo entre el decreto divino y los decretos reales.
  spanish_consistency_notes:
  - Se usó «Dios» para אֱלָהּ y «rey de Persia» para מֶלֶךְ פָּרָס, manteniendo el orden y la fuerza jurídica del pasaje.
  - «Hageo» y «Zacarías» siguen los nombres bíblicos estándar en español, con el título profético conservado.
  - No se introdujo «reconstruyeron» porque el hebreo/arameo aquí dice solo «construían»; la culminación se expresa con «terminaron».
