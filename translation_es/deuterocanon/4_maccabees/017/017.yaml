translation:
  language: es
  text: Ciertamente, el tirano mismo y todo su consejo se maravillaron de su perseverancia, por la cual ahora están de pie ante el trono divino[a] y viven la era bienaventurada[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'junto al trono divino'. El verbo griego y la construcción con dativo pueden entenderse como presencia ante el trono o como una posición próxima a él.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, 'la era bienaventurada'; en el contexto, probablemente alude a un estado eterno bienaventurado.
    reason: lexical_alternative
lexical_decisions:
- source_word: Αὐτός γέ τοι
  english_pob_choice: Indeed, ... himself
  chosen_spanish: Sí, el tirano mismo
  alternatives_spanish:
  - Ciertamente, el tirano mismo
  - En verdad, el tirano mismo
  lexicon: LSJ
  rationale: La partícula enfática se expresa naturalmente con 'Sí' y 'mismo' conserva el énfasis sobre la persona del tirano, sin recargar el estilo español.
- source_word: ὁ τύραννος
  english_pob_choice: the tyrant
  chosen_spanish: el tirano
  alternatives_spanish:
  - el rey
  - el gobernante
  lexicon: LSJ
  rationale: '''Tirano'' reproduce la caracterización hostil del texto y evita suavizar el juicio político-moral presente en el contexto.'
- source_word: συνέδριον
  english_pob_choice: council
  chosen_spanish: consejo
  alternatives_spanish:
  - asamblea
  - tribunal
  lexicon: LSJ
  rationale: '''Consejo'' es claro, formal y suficientemente amplio para el cuerpo gobernante aludido por el griego.'
- source_word: ἐξεθαύμασαν
  english_pob_choice: marveled
  chosen_spanish: admiraron
  alternatives_spanish:
  - quedaron maravillados
  - se asombraron
  lexicon: LSJ
  rationale: En español, 'admiraron' puede expresar fuerte asombro reverente o impactado; evita la sensación demasiado coloquial de 'maravillarse' en este contexto solemne.
- source_word: ὑπομονήν
  english_pob_choice: endurance
  chosen_spanish: perseverancia
  alternatives_spanish:
  - resistencia
  - paciente perseverancia
  lexicon: LSJ
  rationale: En el contexto martirial, ὑπομονή implica constancia bajo sufrimiento; 'perseverancia' comunica esa firmeza moral de forma natural en español.
- source_word: διʼ ἣν
  english_pob_choice: because of which
  chosen_spanish: por la cual
  alternatives_spanish:
  - a causa de la cual
  - por eso
  lexicon: LSJ
  rationale: La relación causal se conserva con una construcción breve y transparente que remite al sustantivo anterior.
- source_word: τῷ θείῳ ... θρόνῳ
  english_pob_choice: the divine throne
  chosen_spanish: el trono divino
  alternatives_spanish:
  - el trono de Dios
  - el trono celestial
  lexicon: LSJ
  rationale: '''Divino'' sigue de cerca el adjetivo θείῳ y evita introducir una especificación mayor que la del griego.'
- source_word: παρεστήκασιν
  english_pob_choice: stand before
  chosen_spanish: están de pie ante
  alternatives_spanish:
  - están presentes ante
  - se hallan ante
  lexicon: LSJ
  rationale: La forma perfecta expresa un estado presente de estar en presencia del trono; 'están de pie ante' conserva la postura y la relación espacial sin forzar una lectura doctrinal adicional.
- source_word: τὸν μακάριον ... αἰῶνα
  english_pob_choice: the blessed age
  chosen_spanish: la edad bienaventurada
  alternatives_spanish:
  - la era bienaventurada
  - la bienaventuranza eterna
  lexicon: LSJ
  rationale: '''Edad'' reproduce el valor de αἰῶνα y ''bienaventurada'' mantiene el matiz positivo y elevado; se evita resolver el término directamente como ''eternidad''.'
- source_word: βιοῦσιν
  english_pob_choice: live
  chosen_spanish: viven
  alternatives_spanish:
  - disfrutan
  - gozan de
  lexicon: LSJ
  rationale: '''Viven'' es el equivalente directo y se ajusta a la formulación elevada del cierre.'
theological_decisions:
- issue: Estado de los mártires tras la muerte
  english_pob_reading: They now stand before the divine throne and live the blessed age.
  chosen_spanish_reading: Ahora están de pie ante el trono divino y viven la edad bienaventurada.
  alternative_spanish_readings:
  - están ante el trono divino y viven la edad bienaventurada
  - viven la bienaventuranza eterna
  rationale: Se conserva el lenguaje presente y la imaginería de exaltación posterior a la muerte sin sistematizarla en categorías doctrinales posteriores. La frase española mantiene la tensión del original entre presencia ante el trono y vida bienaventurada.
  doctrine_reference: Preservar la tensión teológica sin resolverla más allá del texto.
translation_notes:
  revision_awareness: La redacción sigue el texto griego de 4 Macabeos 17:17 y toma en cuenta el audit trail inglés, especialmente la revisión que prefirió 'before the divine throne' para παρεστήκασιν. Se mantuvo la tensión entre la imagen espacial de presencia ante el trono y la idea de vida bienaventurada sin convertirla en una paráfrasis doctrinal.
  spanish_consistency_notes:
  - Se conservó 'divino' para θείῳ, en línea con el griego y la preferencia por no sustituirlo directamente por una formulación más explícita.
  - '''Perseverancia'' traduce ὑπομονή con fuerza martirial y evita diluir el valor ético del término.'
  - '''Edad bienaventurada'' preserva αἰῶνα sin imponer ''eternidad'' en el texto principal.'
  - La puntuación y el orden sintáctico buscan un español publicable sin perder el paralelismo del original.
