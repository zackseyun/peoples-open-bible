id: PHP.2.19
reference: Philippians 2:19
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Ἐλπίζω δὲ ἐν κυρίῳ Ἰησοῦ Τιμόθεον ταχέως πέμψαι ὑμῖν, ἵνα κἀγὼ εὐψυχῶ γνοὺς τὰ περὶ ὑμῶν.
base_translation:
  language: en
  yaml_path: translation/nt/philippians/002/019.yaml
  text: 'But I hope in the Lord Jesus to send Timothy to you soon, so that I too may be encouraged when I learn the things concerning you.'
translation:
  language: ko
  text: 그러나 나는 주 예수 안에서, 디모데를 여러분에게 곧 보내기를 바랍니다. 그래야 나도 여러분에 관한 일들[a]을 알게 되어 격려를 받을 수 있기 때문입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「여러분이 어떻게 지내는지」. 헬라어 τὰ περὶ ὑμῶν은 빌립보 성도의 형편을 가리키는 관용 표현이다.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐλπίζω
  english_pob_choice: I hope
  chosen_korean: 바라다
  alternatives_korean:
  - 소망하다
  - 기대하다
  lexicon: BDAG
  rationale: 현재 직설법. 바울의 현재 기대를 「바라다」로 자연스럽게 옮긴다.
- source_word: δὲ
  english_pob_choice: But
  chosen_korean: 그러나
  alternatives_korean:
  - 이제
  - 그리고
  lexicon: BDAG
  rationale: 약한 전환을 표시한다. 「그러나」가 앞 단락과의 담론적 전환을 자연스럽게 보존한다.
- source_word: ἐν κυρίῳ Ἰησοῦ
  english_pob_choice: in the Lord Jesus
  chosen_korean: 주 예수 안에서
  alternatives_korean:
  - 주 예수를 통해
  - 주 예수께 의지하여
  lexicon: BDAG
  rationale: ἐν의 관계적 의미를 그대로 보존한다. κύριος는 글로사리 기본형 「주」.
- source_word: Τιμόθεον
  english_pob_choice: Timothy
  chosen_korean: 디모데
  rationale: 한국 성서 전통에서 굳어진 인명 표기를 따른다.
- source_word: ταχέως
  english_pob_choice: soon
  chosen_korean: 곧
  alternatives_korean:
  - 속히
  - 머지않아
  lexicon: BDAG
  rationale: 시간적 가까움을 표시. 「곧」이 자연스럽다.
- source_word: πέμψαι
  english_pob_choice: to send
  chosen_korean: 보내다
  alternatives_korean:
  - 파견하다
  lexicon: BDAG
  rationale: 부정과거 부정사. 「보내다」가 합쇼체에 자연스럽다.
- source_word: ὑμῖν
  english_pob_choice: to you
  chosen_korean: 여러분에게
  alternatives_korean:
  - 여러분을 위해
  lexicon: BDAG
  rationale: 여격을 한국어 간접목적어 「여러분에게」로 옮긴다.
- source_word: ἵνα
  english_pob_choice: so that
  chosen_korean: 그래야 ~ 때문
  alternatives_korean:
  - ~하도록
  lexicon: BDAG
  rationale: 목적을 분명히 표시한다. 한국어로 자연스러운 결과 구문으로 옮긴다.
- source_word: κἀγὼ
  english_pob_choice: I too
  chosen_korean: 나도
  alternatives_korean:
  - 나 또한
  - 나 역시
  lexicon: BDAG
  rationale: 합성 형태로 강조. 「나도」가 자연스럽고 그 강조를 살린다.
- source_word: εὐψυχῶ
  english_pob_choice: may be encouraged
  chosen_korean: 격려를 받다
  alternatives_korean:
  - 마음에 힘을 얻다
  - 위로받다
  lexicon: BDAG
  rationale: 「기운을 얻다」의 의미. 「격려를 받다」가 한국어로 자연스럽다.
- source_word: γνοὺς
  english_pob_choice: when I learn
  chosen_korean: 알게 되어
  alternatives_korean:
  - 알고 나서
  - 알게 되었을 때
  lexicon: BDAG
  rationale: 부정과거 분사를 한국어 시간 종속 표현 「~하게 되어」로 자연스럽게 옮긴다.
- source_word: τὰ περὶ ὑμῶν
  english_pob_choice: the things concerning you
  chosen_korean: 여러분에 관한 일들
  alternatives_korean:
  - 여러분의 형편
  - 여러분이 어떻게 지내는지
  lexicon: BDAG
  rationale: 영어 POB의 직역적 결정을 따른다. 「여러분에 관한 일들」이 헬라어 구문을 가장 가깝게 보존한다.
theological_decisions:
- issue: ἐν κυρίῳ Ἰησοῦ 구절에서 κύριος를 옮기는 법
  chosen_reading: 주
  alternative_readings:
  - 주인
  rationale: DOCTRINE.md 지침에 따라 κύριος는 신약 기독론적 칭호로 「주」가 기본형이다. 본 절에서 이탈해야 할 이유가 없다.
  doctrine_reference: 'Contested terms: κύριος → Lord'
