  text: ἐγενόμην τοῖς ⸀ἀσθενέσιν ἀσθενής, ἵνα τοὺς ἀσθενεῖς κερδήσω· τοῖς πᾶσιν ⸀γέγονα πάντα, ἵνα πάντως τινὰς σώσω.
base_translation:
  language: en
  yaml_path: translation/nt/1_corinthians/009/022.yaml
  text: To the weak I became weak[a], so that I might win the weak. I have become all things to all people[b], so that by all means I might save some.
  footnotes:
  - marker: a
    text: Or 'the weak in conscience'; in 1 Corinthians this expression can refer specifically to those whose consciences are vulnerable.
    reason: lexical_alternative
  - marker: b
    text: Or 'in every way' or 'at all costs'; the phrase means using every possible means in pursuit of the goal.
    reason: lexical_alternative
