translation:
  language: es
  text: Meonotai fue padre de Ofrá, y Seraías fue padre de Joab, padre de Ge-harasim[a][b], porque ellos eran artesanos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Ge-harasim probablemente significa «Valle de los Artesanos». El hebreo lo conserva como nombre de lugar, mientras que la cláusula siguiente explica el nombre.
    reason: lexical_alternative
  - marker: b
    text: O «fundador de Ge-harasim». La expresión «padre de» puede indicar fundador o cabeza ancestral en contextos genealógicos.
    reason: alternative_reading
lexical_decisions:
- source_word: מְעוֹנֹתַי
  english_pob_choice: Meonothai
  chosen_spanish: Meonotai
  alternatives_spanish:
  - Meonotay
  lexicon: HALOT
  rationale: Nombre propio; se translitera, conservando la forma nominal sin traducirla.
- source_word: הוֹלִיד
  english_pob_choice: fathered
  chosen_spanish: fue padre de
  alternatives_spanish:
  - engendró
  - engendró a
  lexicon: HALOT
  rationale: En registro genealógico, el verbo expresa descendencia directa. «Fue padre de» mantiene la relación genealógica con naturalidad en español, sin perder el valor de paternidad del hebreo.
- source_word: עָפְרָה
  english_pob_choice: Ophrah
  chosen_spanish: Ofrá
  alternatives_spanish:
  - Ofra
  lexicon: HALOT
  rationale: Nombre propio; en español se adapta mínimamente la transliteración para fluidez y lectura eclesial, manteniendo la identificación del nombre.
- source_word: שְׂרָיָה
  english_pob_choice: Seraiah
  chosen_spanish: Seraías
  alternatives_spanish:
  - Seraia
  lexicon: HALOT
  rationale: Nombre propio; se sigue la transliteración habitual en español bíblico, conservando la forma reconocible del nombre.
- source_word: יוֹאָב
  english_pob_choice: Joab
  chosen_spanish: Joab
  alternatives_spanish:
  - Yoab
  lexicon: HALOT
  rationale: Nombre propio ya asentado en español bíblico; se conserva la forma tradicional inteligible.
- source_word: אֲבִי
  english_pob_choice: the father of
  chosen_spanish: padre de
  alternatives_spanish:
  - antepasado de
  - fundador de
  lexicon: HALOT
  rationale: La construcción hebrea puede señalar padre inmediato o cabeza/fundador. En el texto principal se conserva la fórmula literal «padre de», y el contexto permite la lectura de fundador sin imponerla.
- source_word: גֵּיא
  english_pob_choice: Ge-
  chosen_spanish: Valle de
  alternatives_spanish:
  - Ge-
  lexicon: HALOT
  rationale: El hebreo forma un topónimo con «gai/valle». En español, «Valle de» comunica el valor léxico del elemento geográfico sin ocultar que se trata de un nombre de lugar.
- source_word: חֲרָשִׁים
  english_pob_choice: harashim
  chosen_spanish: los Artesanos
  alternatives_spanish:
  - los Carpinteros
  - los Artífices
  lexicon: HALOT
  rationale: El sustantivo común significa personas hábiles en oficio manual; «artesanos» es amplio y evita restringir indebidamente a un solo gremio. Se capitaliza dentro del topónimo por tratarse de nombre propio en español.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la explicación del nombre. «Porque» expresa con claridad la relación causal/explicativa en español.
- source_word: חֲרָשִׁים
  english_pob_choice: craftsmen
  chosen_spanish: artesanos
  alternatives_spanish:
  - artífices
  - obreros especializados
  lexicon: HALOT
  rationale: En la cláusula explicativa, el término describe a las personas asociadas con el lugar; «artesanos» preserva el sentido general de trabajadores especializados.
- source_word: הָיוּ
  english_pob_choice: they were
  chosen_spanish: eran
  alternatives_spanish:
  - estaban
  lexicon: HALOT
  rationale: Copulativo simple; «eran» es la forma natural para explicar la identificación del grupo y su relación con el topónimo.
translation_notes:
  revision_awareness: El pasaje coincide con el audit trail inglés en la lectura genealógica y en la explicación toponímica; no se registran revisiones aplicadas en el flujo inglés, y la versión española sigue esa misma decisión sin añadir conjeturas.
  spanish_consistency_notes:
  - Se mantiene el registro genealógico con «fue padre de» para conservar el hebraísmo sin sonar arcaico.
  - «Valle de los Artesanos» refleja el sentido explicativo del topónimo, mientras que la nota permite la alternativa más transliterada.
  - Se evita «SEÑOR» o terminología litúrgica ajena al pasaje; no hay teología explícita en este versículo.
  - La capitalización de «Artesanos» en el topónimo busca claridad editorial, no altera el valor léxico de חֲרָשִׁים en la cláusula explicativa.
