translation:
  language: es
  text: Así Josué hizo como Moisés le había dicho,[a] para combatir contra Amalec; y Moisés, Aarón y Hur subieron a la cima de la colina.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo «Amalec»; puede referirse al pueblo descendiente de Amalec, es decir, a los amalecitas.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  english_pob_choice: did
  chosen_spanish: hizo
  alternatives_spanish:
  - actuó
  - cumplió
  lexicon: HALOT
  rationale: El verbo עשה aquí expresa la ejecución de una instrucción previa. En español, «hizo» comunica con naturalidad que Josué llevó a cabo lo mandado, sin añadir matices interpretativos.
- source_word: כַּאֲשֶׁר
  english_pob_choice: as
  chosen_spanish: conforme a lo que
  alternatives_spanish:
  - como
  - según
  lexicon: HALOT
  rationale: La relación es de conformidad con la indicación de Moisés. «Conforme a lo que» mantiene esa idea de correspondencia sin sonar forzada en español.
- source_word: אָמַר לוֹ
  english_pob_choice: had told him
  chosen_spanish: le había dicho
  alternatives_spanish:
  - le había ordenado
  - le había hablado
  lexicon: HALOT
  rationale: El hebreo literalmente dice «había dicho a él», y el contexto inmediato muestra que se trata de una instrucción. «Le había dicho» conserva el dato textual y deja que el contexto provea el valor imperativo, sin convertirlo explícitamente en «ordenado».
- source_word: לְהִלָּחֵם
  english_pob_choice: to fight
  chosen_spanish: para combatir
  alternatives_spanish:
  - para pelear
  - para luchar
  lexicon: HALOT
  rationale: El infinitivo expresa el propósito de ir a enfrentarse militarmente. «Combatir» transmite bien ese uso bélico en español y suena digno en un registro bíblico contemporáneo.
- source_word: בַּעֲמָלֵק
  english_pob_choice: against Amalek
  chosen_spanish: contra Amalec
  alternatives_spanish:
  - contra Amalec, el pueblo
  - contra los amalecitas
  lexicon: HALOT
  rationale: Se conserva el nombre propio tal como aparece en el hebreo. La preposición con לְהִלָּחֵם exige sentido hostil, por eso «contra». No se amplía a «amalecitas» porque el texto nombra a Amalec, no la forma gentilicia.
- source_word: עָלוּ
  english_pob_choice: went up
  chosen_spanish: subieron
  alternatives_spanish:
  - ascendieron
  - subieron hacia arriba
  lexicon: HALOT
  rationale: עלה indica movimiento ascendente. «Subieron» es la forma natural y fiel en español.
- source_word: רֹאשׁ הַגִּבְעָה
  english_pob_choice: the top of the hill
  chosen_spanish: la cima de la colina
  alternatives_spanish:
  - la cima del monte
  - la parte alta de la colina
  lexicon: HALOT
  rationale: La expresión literal es «la cabeza de la colina», un hebraísmo que designa su parte superior. «La cima de la colina» conserva la imagen espacial y es idiomática en español.
- source_word: יְהוֹשֻׁעַ
  english_pob_choice: Joshua
  chosen_spanish: Josué
  alternatives_spanish:
  - Josué
  lexicon: Convención onomástica bíblica
  rationale: Nombre propio bíblico establecido en español.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  alternatives_spanish:
  - Moisés
  lexicon: Convención onomástica bíblica
  rationale: Nombre propio bíblico establecido en español.
- source_word: אַהֲרֹן
  english_pob_choice: Aaron
  chosen_spanish: Aarón
  alternatives_spanish:
  - Aarón
  lexicon: Convención onomástica bíblica
  rationale: Nombre propio bíblico establecido en español.
- source_word: חוּר
  english_pob_choice: Hur
  chosen_spanish: Hur
  alternatives_spanish:
  - Hur
  lexicon: Convención onomástica bíblica
  rationale: Nombre propio bíblico establecido en español.
translation_notes:
  revision_awareness: La redacción española sigue de cerca el texto hebreo y el recorrido auditado en inglés. Se mantuvo la lectura narrativa simple de la acción de Josué y de la subida de Moisés, Aarón y Hur, sin introducir explicaciones no presentes en el versículo. No fue necesario aplicar revisiones recientes al sentido de la frase.
  spanish_consistency_notes:
  - Se preserva el nombre divino fuera de este versículo según la terminología del proyecto, pero aquí no aparece.
  - «Amalec» se mantiene como nombre propio, con nota para la posible referencia colectiva.
  - «Cima de la colina» refleja el hebraísmo sin calcarlo literalmente.
  - Los nombres propios siguen las convenciones estándar del español bíblico.
