  text: Περὶ δὲ τῆς ἡμέρας ἐκείνης καὶ ὥρας οὐδεὶς οἶδεν, οὐδὲ οἱ ἄγγελοι τῶν οὐρανῶν ⸂οὐδὲ ὁ υἱός⸃, εἰ μὴ ὁ ⸀πατὴρ μόνος.
base_translation:
  language: en
  yaml_path: translation/nt/matthew/024/036.yaml
  text: But concerning that day and hour[a], no one knows—not even the angels of heaven, nor the Son—except the Father alone.
  footnotes:
  - marker: a
    text: Some manuscripts omit 'nor the Son.' The main text follows the SBLGNT reading.
