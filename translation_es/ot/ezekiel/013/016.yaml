review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido del hebreo: ''los profetas de Israel'', el participio atributivo ''que profetizan'', el contenido sobre Jerusalén, la visión de paz y el contraste ''cuando no hay paz''. También preserva la nota léxica sobre שָׁלוֹם. Sin embargo, la expresión ''ven para ella'' suena poco natural en español para חֹזִים לָהּ y conviene ajustarla sin perder el matiz dativo. Además, la fórmula divina ''Yahvé Dios'' es comprensible, pero en español bíblico resulta más natural y fiel a la composición אֲדֹנָי יְהוִה como ''el Señor Yahvé'', preservando tanto el título como el nombre divino según la política del proyecto.'
  spanish_quality_summary: 'El texto es mayormente claro y digno, pero presenta dos problemas de naturalidad: ''ven para ella una visión'' es torpe en español, y ''declara Yahvé Dios'' suena menos idiomático que una fórmula como ''declara el Señor Yahvé''. Un ajuste menor mejora notablemente la legibilidad sin apartarse del hebreo ni de la terminología del proyecto.'
  glossary_alignment: Se mantiene correctamente 'Yahvé' para יהוה y 'paz' para שָׁלוֹם con nota alternativa. No hay conflicto con otros términos del glosario. La principal corrección es representar mejor אֲדֹנָי יְהוִה en español con 'el Señor Yahvé', en vez de reasignar אֲדֹנָי a 'Dios'.
  issues:
  - severity: medium
    issue: La frase 'y que ven para ella una visión' es poco idiomática en español.
    rationale: Aunque intenta conservar el dativo de לָהּ, en español esa construcción suena forzada. 'Y tienen para ella una visión' o 'y ven para ella' no es natural; 'y que ven sobre ella una visión' cambia el matiz. 'Y que tienen para ella una visión de paz' conserva el sentido general y mejora la fluidez.
  - severity: medium
    issue: La fórmula 'declara Yahvé Dios' no representa de la manera más natural ni más precisa אֲדֹנָי יְהוִה en español.
    rationale: El proyecto exige conservar יהוה como 'Yahvé', pero aquí אֲדֹנָי no equivale a 'Dios'. 'El Señor Yahvé' preserva ambos componentes del título y evita una reasignación léxica innecesaria.
  revised_spanish_text: los profetas de Israel que profetizan acerca de Jerusalén y que tienen para ella una visión de paz[a], cuando no hay paz, declara el Señor Yahvé.
  revised_footnotes:
  - marker: a
    text: O «una visión de bienestar»; שָׁלוֹם puede abarcar paz, plenitud y bienestar.
    reason: lexical_alternative
  revision_rationale: Se revisa la expresión verbal de חזה + לָהּ para lograr un español más natural sin perder el sentido de una visión presentada en favor de Jerusalén, y se ajusta אֲדֹנָי יְהוִה a 'el Señor Yahvé' para preservar explícitamente tanto el título como el nombre divino según la política del proyecto. La nota sobre שָׁלוֹם se mantiene porque está bien justificada y útil para el lector.
