base_translation:
  language: en
  yaml_path: translation/ot/leviticus/020/006.yaml
  text: And the person who turns to the mediums and to the spiritists[a], to prostitute himself after them[c][b], I will set my face against that person and cut him off from among his people.
  footnotes:
  - marker: a
    text: Or 'those with familiar spirits' for 'mediums'; the Hebrew term refers to practitioners who consult the dead or spirits.
    reason: lexical_alternative
  - marker: b
    text: Or 'to play the prostitute after them,' a metaphor for covenantal unfaithfulness through illicit spiritual practice.
    reason: lexical_alternative
  - marker: c
    text: '''Cut off'' is a standard legal formula; the text does not specify here the exact mode of judgment.'
    reason: alternative_reading
