translation:
  language: es
  text: Y Judith le dijo a su esclava que estuviera fuera de su alcoba[a] y vigilara su salida, como en los días anteriores; pues dijo que saldría para su oración[b]. Y habló a Bagoas según estas palabras.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'cámara de dormir' para 'alcoba'.
    reason: lexical_alternative
  - marker: b
    text: La frase 'como en los días anteriores' refleja la costumbre establecida de Judith de salir a orar; más literalmente, 'como día tras día'.
    reason: lexical_alternative
lexical_decisions:
- source_word: δούλῃ
  english_pob_choice: female slave
  chosen_spanish: esclava
  alternatives_spanish:
  - sierva
  - criada
  - sirvienta
  lexicon: LSJ
  rationale: δούλῃ es el dativo singular de δοῦλος en femenino. El audit trail inglés eligió 'female slave' por el peso de la condición de servidumbre vinculada en el contexto narrativo; por eso 'esclava' conserva esa fuerza mejor que 'sierva' o 'criada'.
- source_word: κοιτῶνος
  english_pob_choice: sleeping chamber
  chosen_spanish: alcoba
  alternatives_spanish:
  - cámara de dormir
  - dormitorio
  - habitación
  lexicon: LSJ
  rationale: κοιτῶνος designa una estancia para dormir. 'Alcoba' comunica bien el sentido en español natural y mantiene la referencia espacial sin añadir matices innecesarios.
- source_word: στῆναι ... καὶ ἐπιτηρεῖν
  english_pob_choice: to stand ... and watch
  chosen_spanish: que se quedara ... y vigilara
  alternatives_spanish:
  - que estuviera ... y observase
  - que permaneciera ... y velara
  lexicon: LSJ
  rationale: El infinitivo aoristo στῆναι da la orden de colocarse/ponerse de pie fuera, y ἐπιτηρεῖν implica vigilar atentamente. En español, 'quedara' expresa bien la permanencia en el lugar indicado, y 'vigilara' conserva la idea de observación atenta.
- source_word: τὴν ἔξοδον αὐτῆς
  english_pob_choice: her going out
  chosen_spanish: su salida
  alternatives_spanish:
  - su salir
  - su salida al exterior
  - su partida
  lexicon: LSJ
  rationale: ἔξοδος aquí se refiere a la acción de salir de Judith. 'Su salida' es natural en español y evita la extrañeza de un calco como 'su ir afuera'.
- source_word: καθάπερ καθʼ ἡμέρας
  english_pob_choice: as on previous days
  chosen_spanish: como en los días anteriores
  alternatives_spanish:
  - como cada día
  - como día tras día
  lexicon: LSJ
  rationale: La frase indica una costumbre ya establecida. 'Como en los días anteriores' reproduce esa continuidad y evita una formulación demasiado rígida.
- source_word: ἐξελεύσεσθαι
  english_pob_choice: she would go out
  chosen_spanish: saldría
  alternatives_spanish:
  - iba a salir
  - habría de salir
  lexicon: LSJ
  rationale: El infinitivo futuro depende de ἔφη y expresa discurso referido. 'Saldría' es la forma más natural y fiel en español para ese valor de futuro en el reporte.
- source_word: προσευχὴν
  english_pob_choice: prayer
  chosen_spanish: oración
  alternatives_spanish:
  - plegaria
  - rezar
  lexicon: LSJ
  rationale: προσευχὴ denota oración dirigida a Dios. 'Oración' es el equivalente más transparente y digno en español; se evita 'rezar' porque su registro puede sonar más estrecho o confensional.
- source_word: κατὰ τὰ ῥήματα ταῦτα
  english_pob_choice: according to these words
  chosen_spanish: según estas palabras
  alternatives_spanish:
  - de acuerdo con estas palabras
  - conforme a estas palabras
  lexicon: LSJ
  rationale: La frase significa que habló de conformidad con lo dicho. 'Según estas palabras' es una traducción directa y fluida que preserva la dependencia del enunciado previo.
theological_decisions:
- issue: La referencia a la salida para orar no debe perder la finalidad religiosa del acto
  english_pob_reading: she would go out for her prayer
  chosen_spanish_reading: saldría para su oración
  alternative_spanish_readings:
  - saldría a orar
  - saldría para orar
  rationale: El griego ἐπὶ τὴν προσευχὴν αὐτῆς apunta a la finalidad/orientación de la salida. 'Para su oración' conserva el sustantivo del original y mantiene visible la práctica devocional de Judith.
  doctrine_reference: Uso contextual de προσευχή; no implica formulación doctrinal específica.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del POB inglés, que prefirió 'according to these words' y simplificó la comparación temporal a 'as on previous days'. La redacción española sigue esa dirección con 'según estas palabras' y 'como en los días anteriores'.
  spanish_consistency_notes:
  - Se mantuvo 'esclava' para δούλῃ, conforme a la preferencia POB por preservar la fuerza de la servidumbre cuando es narrativamente relevante.
  - '''Yahvé'' no aparece en este versículo, por lo que no se requiere decisión sobre el nombre divino.'
  - Se usó 'oración' para προσευχὴ, evitando 'rezar' para conservar un registro bíblico más amplio y neutral.
