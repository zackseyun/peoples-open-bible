base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/041/009.yaml
  text: The width of the wall that belonged to the side chambers on the outside was five cubits[a], and what was left was the place of the side chambers that belonged to the house.
  footnotes:
  - marker: a
    text: 'Hebrew is difficult: the final clause may also be understood as ''and what was left free was the side-chamber structure belonging to the house'' or similar. The verse describes the layout around the temple building.'
