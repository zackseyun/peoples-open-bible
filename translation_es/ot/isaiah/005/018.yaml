translation:
  language: es
  text: ¡Ay de los que arrastran la iniquidad con cuerdas de mentira[a], y el pecado con sogas de carro[b]!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «con cuerdas de vacío» o «con cuerdas de vanidad». El hebreo שָׁוְא puede denotar vacío, vanidad o mentira.'
    reason: lexical_alternative
  - marker: b
    text: La imagen también puede sugerir que atraen sobre sí mismos culpa o castigo, no solo que arrastran el pecado.
    reason: alternative_reading
lexical_decisions:
- source_word: הוֹי
  english_pob_choice: Woe
  chosen_spanish: ¡Ay!
  alternatives_spanish:
  - ¡Ay de!
  - ¡Ay! de
  lexicon: HALOT
  rationale: En español, ¡Ay! conserva el tono profético de denuncia o lamentación. Se evita un calco rígido y se mantiene la fuerza oracular de la interjección.
- source_word: מֹשְׁכֵי
  english_pob_choice: those who drag
  chosen_spanish: los que arrastran
  alternatives_spanish:
  - los que tiran de
  - los que jalan
  lexicon: HALOT
  rationale: El participio describe una acción continua y deliberada. «Arrastran» conserva la imagen violenta y encaja con cuerdas y sogas mejor que un verbo más neutro.
- source_word: עָוֹן
  english_pob_choice: iniquity
  chosen_spanish: iniquidad
  alternatives_spanish:
  - culpa
  - maldad
  - pecado
  lexicon: HALOT
  rationale: «Iniquidad» preserva el peso moral del término y mantiene la distinción respecto de חַטָּאָה, que se traduce después como «pecado».
- source_word: בְּחַבְלֵי הַשָּׁוְא
  english_pob_choice: with cords of falsehood
  chosen_spanish: con cuerdas de falsedad
  alternatives_spanish:
  - con cuerdas de vacío
  - con cuerdas de vanidad
  - con cuerdas de mentira
  lexicon: HALOT
  rationale: La revisión inglesa favorece «falsehood» para שָׁוְא, y en español «falsedad» reproduce bien ese sentido sin perder la amplitud semántica de vacío/vanidad que queda implícita en el trasfondo hebreo.
- source_word: וְכַעֲבֹתוֹת
  english_pob_choice: and ... with cart ropes
  chosen_spanish: y ... con sogas de carro
  alternatives_spanish:
  - y ... con cuerdas de carro
  - y ... como con sogas de carro
  lexicon: HALOT
  rationale: כ aquí funciona comparativamente en el hebreo, pero en español el giro más natural y fiel al efecto visual es «con sogas de carro», que deja la imagen de carga pesada sin introducir una comparación innecesaria.
- source_word: הָעֲגָלָה
  english_pob_choice: cart
  chosen_spanish: carro
  alternatives_spanish:
  - carreta
  - carro de carga
  lexicon: HALOT
  rationale: «Carro» es claro, sobrio y suficientemente amplio para el objeto de carga del texto. «Carreta» suena más regional y «carro de carga» explicita demasiado.
- source_word: חַטָּאָה
  english_pob_choice: sin
  chosen_spanish: pecado
  alternatives_spanish:
  - culpa
  - pecaminosidad
  - falta
  lexicon: HALOT
  rationale: Se conserva el paralelismo con «iniquidad» mediante «pecado», distinguiendo ambos términos hebreos sin perder la conexión semántica entre acción y carga moral.
theological_decisions:
- issue: Relación metafórica entre el pecado y la carga arrastrada
  english_pob_reading: The verse depicts people actively hauling their guilt and sin along, emphasizing deliberate attachment to evil.
  chosen_spanish_reading: El verso presenta a personas que siguen cargando y arrastrando su propia iniquidad y pecado, resaltando su apego deliberado al mal.
  alternative_spanish_readings:
  - El verso podría sugerir que atraen sobre sí mismos culpa o castigo mediante la falsedad.
  rationale: La imagen inmediata del hebreo es la de arrastrar dos realidades morales con cuerdas y sogas; por eso la redacción española preserva ese gesto concreto. Al mismo tiempo, la posibilidad de leer consecuencia o culpa queda sin eliminar, porque עָוֹן puede abarcar ese matiz.
  doctrine_reference: 'Translation philosophy §3: conservar la tensión teológica en lugar de resolverla'
- issue: Valor semántico de שָׁוְא
  english_pob_reading: cords of falsehood
  chosen_spanish_reading: cuerdas de falsedad
  alternative_spanish_readings:
  - cuerdas de vacío
  - cuerdas de vanidad
  - cuerdas de mentira
  rationale: La historia textual y la revisión del POB favorecen «falsehood» frente a «emptiness» en este contexto. «Falsedad» suena natural en español y no reduce indebidamente el alcance del término hebreo.
  doctrine_reference: Revisión aplicada 2026-04-23; decisión lexical auditada
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB, que sustituyó «emptiness» por «falsehood» para שָׁוְא y eliminó la comparación explícita «as» en la segunda mitad para acercarse más al hebreo y mejorar la naturalidad. La versión española conserva esos ajustes y refleja la tensión entre iniquidad/culpa y pecado como carga arrastrada.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero en este versículo no aparece el tetragrámaton.
  - Se usan «iniquidad» y «pecado» de manera diferenciada para reflejar עָוֹן y חַטָּאָה.
  - Se evita «siervo» porque el hebreo no contiene δοῦλος ni un equivalente de servicio; aquí la imagen es de carga y arrastre.
  - Se conserva un registro profético solemne, sin arcaísmos innecesarios.
