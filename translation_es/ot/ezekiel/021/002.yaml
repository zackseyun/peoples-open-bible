translation:
  language: es
  text: Hijo de hombre, pon tu rostro hacia el sur[a], y predica[b] hacia el sur, y profetiza contra el bosque del campo en el Neguev[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo usa tres términos relacionados para el sur en secuencia: «Temán/sur», «darom/sur» y «Neguev». La repetición intensifica el enfoque del oráculo sobre la tierra del sur.'
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «haz gotear» o «derrama». El hebreo usa una metáfora para el habla profética.
    reason: lexical_alternative
  - marker: c
    text: O «contra el bosque del campo en el sur». La frase hebrea es poco común y conserva una imagen deliberadamente extraña.
    reason: alternative_reading
lexical_decisions:
- source_word: בֶּן אָדָם
  english_pob_choice: Son of man
  chosen_spanish: Hijo de hombre
  alternatives_spanish:
  - Ser humano
  - Mortal
  lexicon: HALOT
  rationale: Conserva el giro profético fijo de Ezequiel y mantiene el paralelismo formal con el hebreo. En español, «Hijo de hombre» es comprensible y evita neutralizar el singular masculino documentado por el hebreo y por la POB inglesa.
- source_word: שִׂים פָּנֶיךָ
  english_pob_choice: set your face
  chosen_spanish: pon tu rostro
  alternatives_spanish:
  - dirige tu rostro
  - vuelve tu rostro
  lexicon: HALOT
  rationale: Es una equivalencia idiomática natural en español para la resolución deliberada de una orientación. «Pon tu rostro» conserva la imagen corporal del hebreo sin sonar forzado.
- source_word: דֶּרֶךְ תֵּימָנָה
  english_pob_choice: toward the south
  chosen_spanish: hacia el sur
  alternatives_spanish:
  - al sur
  - surward
  lexicon: HALOT
  rationale: Aquí תימנה funciona direccionalmente junto con דרך, y la POB inglesa la entiende como orientación al sur. «Hacia el sur» conserva el sentido direccional sin introducir una identificación geográfica innecesaria.
- source_word: וְהַטֵּף
  english_pob_choice: preach
  chosen_spanish: derrama palabras
  alternatives_spanish:
  - predica
  - haz gotear palabras
  - habla
  lexicon: HALOT
  rationale: El verbo hebreo significa literalmente «gotear/derramar», y la POB inglesa preserva la metáfora profética con la nota correspondiente. En español, «derrama palabras» mantiene la imagen sin recurrir a «predica», que sería más interpretativo y menos transparente al hebreo.
- source_word: אֶל דָּרוֹם
  english_pob_choice: toward the south
  chosen_spanish: hacia el sur
  alternatives_spanish:
  - contra el sur
  - al sur
  lexicon: HALOT
  rationale: La preposición אֶל es direccional aquí, como muestra la revisión inglesa que eliminó el matiz de oposición en esta cláusula. Por eso se traduce de forma congruente como dirección, no como hostilidad explícita.
- source_word: וְהִנָּבֵא
  english_pob_choice: prophesy
  chosen_spanish: profetiza
  alternatives_spanish:
  - habla proféticamente
  - anuncia como profeta
  lexicon: HALOT
  rationale: Es el equivalente directo y natural en español para la forma profética de נבא. Conserva el tono de comisión oracular.
- source_word: אֶל יַעַר הַשָּׂדֶה נֶגֶב
  english_pob_choice: against the forest of the field in the Negeb
  chosen_spanish: contra el bosque del campo en el Neguev
  alternatives_spanish:
  - hacia el bosque del campo en el Neguev
  - contra el bosque de la llanura en el sur
  lexicon: HALOT
  rationale: La POB inglesa conserva la imagen poco común «forest of the field» y trata נגב como región específica, transliterada como Negeb. En español, «bosque del campo» mantiene la rareza del hebreo, y «Neguev» preserva la distinción regional sin reducirla a un simple «sur».
- source_word: נֶגֶב
  english_pob_choice: Negeb
  chosen_spanish: Neguev
  alternatives_spanish:
  - sur
  - surland
  lexicon: HALOT
  rationale: Se translitera para mantener la referencia geográfica y el juego de palabras con los otros términos del sur. Esto sigue la decisión de la POB inglesa de no aplastar las tres menciones del ámbito meridional en una sola palabra española.
theological_decisions:
- issue: Tríada de términos meridionales y su fuerza retórica
  english_pob_reading: 'Hebrew uses three related southern terms in sequence: ''Teman/south,'' ''darom/south,'' and ''Negeb.'' The repetition intensifies the oracle''s focus on the southern land.'
  chosen_spanish_reading: 'El hebreo usa tres términos relacionados para el sur en secuencia: «sur», «sur», y «Neguev». La repetición intensifica el foco del oráculo sobre la tierra meridional.'
  alternative_spanish_readings:
  - Solo al sur
  - al sur, al sur y al sur
  rationale: La traducción conserva la acumulación retórica en lugar de nivelarla. Aunque dos de los términos se vuelven «sur» para claridad, la tercera forma se distingue con la transliteración regional, de modo que no se pierde la intensificación del pasaje.
  doctrine_reference: No aplica; decisión de estilo y retórica profética.
translation_notes:
  revision_awareness: 'La POB inglesa revisó este versículo para hacer direccional ''toward the south'' en la cláusula de ''preach'' y reservar el matiz adversativo para ''prophesy against'' en la cláusula final. La versión española sigue esa distinción: ''hacia el sur'' con ''derrama palabras'' y ''profetiza contra'' en el cierre. También conserva la triple referencia meridional mediante ''sur'' y la transliteración ''Neguev''.'
  spanish_consistency_notes:
  - Se usa «Hijo de hombre» para mantener el patrón profético de Ezequiel y la correspondencia con la POB inglesa.
  - Se evita «SEÑOR» u otras convenciones no pertinentes, porque el versículo no contiene el nombre divino.
  - Se mantiene «Neguev» como transliteración regional para no diluir la referencia geográfica ni la repetición retórica.
  - Se conserva la metáfora verbal de וְהַטֵּף en forma más transparente que una simple paráfrasis como «predica».
