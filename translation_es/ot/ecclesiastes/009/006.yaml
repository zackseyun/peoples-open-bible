revisions:
- from: Su amor[a], su odio y su celos[?] ya han perecido, y no tienen ya para siempre parte en nada de lo que se hace bajo el sol.
  to: Su amor, su odio y sus celos[a] ya han perecido, y ya no tienen parte para siempre en nada de lo que se hace bajo el sol.
  rationale: Se corrige el posesivo con «celos» a la forma gramatical española correcta («sus celos»), se mueve la nota al término realmente debatido léxicamente, y se alisa el orden de la segunda cláusula para un español más natural, manteniendo el sentido del hebreo y la decisión teológica del POB inglés. No se requiere adjudicación adicional.
