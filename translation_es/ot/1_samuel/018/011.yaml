translation:
  language: es
  text: 'Saúl arrojó la lanza y dijo: «Heriré[a] a David y al muro». Pero David esquivó y se apartó de él dos veces.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «Heriré a David y al muro», es decir, golpearlo contra el muro con la lanza.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיָּטֶל
  english_pob_choice: hurled
  chosen_spanish: arrojó
  alternatives_spanish:
  - lanzó
  - tiró
  - arrojó con violencia
  lexicon: HALOT
  rationale: El verbo expresa el acto de lanzar/arrojar. «Arrojó» comunica bien la acción violenta de Saúl con la lanza, sin sonar tan coloquial como «tiró» ni añadir más de lo que el hebreo exige.
- source_word: הַחֲנִית
  english_pob_choice: the spear
  chosen_spanish: la lanza
  alternatives_spanish:
  - la jabalina
  - la lanza arrojadiza
  lexicon: HALOT
  rationale: «Lanza» es un equivalente natural y amplio en español para חֲנִית. «Jabalina» sería posible, pero suena más técnico y puede restringir innecesariamente el objeto.
- source_word: אַכֶּה
  english_pob_choice: I will strike
  chosen_spanish: Heriré
  alternatives_spanish:
  - Golpearé
  - Daré un golpe a
  - Acosaré
  lexicon: HALOT
  rationale: El verbo básico es «golpear/herir». En este contexto de un ataque con lanza, «Heriré» mantiene el sentido de daño físico sin imponer la interpretación más específica de «clavar» o «fijar».
- source_word: בְדָוִד וּבַקִּיר
  english_pob_choice: David and the wall
  chosen_spanish: a David y al muro
  alternatives_spanish:
  - a David y al muro
  - contra David y el muro
  - a David contra el muro
  lexicon: HALOT
  rationale: La construcción hebrea presenta a David y al muro como los dos términos del impacto previsto. «A David y al muro» conserva esa relación sin convertirla en una paráfrasis interpretativa demasiado fuerte.
- source_word: וַיִּסֹּב
  english_pob_choice: dodged away
  chosen_spanish: se apartó
  alternatives_spanish:
  - se desvió
  - se apartó de
  - se retiró
  lexicon: HALOT
  rationale: El verbo literalmente puede indicar apartarse o desviarse. «Se apartó» comunica de forma natural la evasión del ataque sin añadir un matiz demasiado moderno o deportivo como «esquivó».
- source_word: מִפָּנָיו
  english_pob_choice: from him
  chosen_spanish: de él
  alternatives_spanish:
  - de su presencia
  - de delante de él
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «de su rostro/presencia», en español narrativo «de él» es la forma más natural y conserva el sentido de evasión frente a Saúl.
- source_word: פַּעֲמָיִם
  english_pob_choice: twice
  chosen_spanish: dos veces
  alternatives_spanish:
  - dos ocasiones
  - por dos veces
  lexicon: HALOT
  rationale: Es la equivalencia idiomática directa y clara en español.
theological_decisions:
- issue: 'Ajuste del verbo de ataque: «Heriré» frente a una lectura más interpretativa como «clavar/fijar»'
  english_pob_reading: The English audit trail first used 'I will pin David to the wall' but the latest revision moved back to 'I will strike David and the wall' to stay closer to the Hebrew wording.
  chosen_spanish_reading: «Heriré a David y al muro»
  alternative_spanish_readings:
  - «Clavaré a David al muro»
  - «Fijaré a David al muro»
  - «Golpearé a David y al muro»
  rationale: La revisión inglesa favorece una formulación menos expansiva y más pegada al hebreo. En español, «Heriré» conserva el acto violento de la intención de Saúl sin convertir el resultado implícito en una interpretación explícita.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'La revisión inglesa reciente corrigió una interpretación más explícita (''pin David to the wall'') para acercarse a la redacción hebrea (''strike David and the wall''). La presente versión española sigue esa misma cautela: mantiene el lenguaje directo del ataque y evita expandir el resultado más allá del texto base.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para el tetragrámaton según la norma del proyecto, aunque en este versículo no aparece.
  - Se evita «SEÑOR» o fórmulas devocionales tradicionales porque el texto no lo exige.
  - «Lanza» se prefiere a «jabalina» por amplitud semántica y naturalidad en español bíblico narrativo.
  - La frase final preserva la repetición de «dos veces», como en el hebreo.
