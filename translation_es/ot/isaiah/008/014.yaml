review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura básica del hebreo: santuario / piedra-roca de tropiezo / lazo-trampa, y mantiene el singular representativo en «el habitante de Jerusalén». Sin embargo, hay un problema importante de anclaje de notas: la nota [a] está colocada sobre «santuario», pero su contenido explica אֶבֶן נֶגֶף, no לְמִקְדָּשׁ. Además, la nota [b] está anclada en «las dos casas de Israel», pero su contenido trata לְיוֹשֵׁב יְרוּשָׁלַ͏ִם. Eso hace que el aparato no refleje fielmente el rastro de auditoría inglés. También conviene mejorar «roca de ofensa», que suena menos natural en español bíblico general que «roca de tropiezo», especialmente dado que el inglés revisado usó «rock of offense» por razones formales, pero en español «ofensa» desplaza la imagen física de מִכְשׁוֹל.'
  spanish_quality_summary: La redacción es clara y digna, pero las notas están mal ubicadas y generan confusión. «Roca de ofensa» resulta menos idiomático y menos transparente que «roca de tropiezo» para lectores hispanohablantes. «Lazo y trampa» funciona aceptablemente para preservar la pareja léxica. «Y él será» es correcto; no requiere cambio.
  glossary_alignment: No hay conflicto con la glosa base del proyecto. El verso no contiene Yahvé explícito en este segmento, y el pronombre «él» está bien conservado. «Santuario», «Israel», «Jerusalén» y el campo semántico de tropiezo/trampa están en línea general con el POB. La principal desviación está en la justificación léxica de «roca de ofensa», que no representa tan bien מִכְשׁוֹל en español como «roca de tropiezo».
  issues:
  - severity: high
    issue: Las notas al pie están ancladas en palabras equivocadas.
    rationale: La nota [a] explica אֶבֶן נֶגֶף pero aparece en «santuario»; la nota [b] explica «el habitante de Jerusalén» pero aparece en «las dos casas de Israel». Esto rompe la trazabilidad con la evidencia fuente y el audit trail inglés.
  - severity: medium
    issue: «Roca de ofensa» suena poco natural y debilita la imagen de tropiezo de מִכְשׁוֹל.
    rationale: Aunque el inglés auditado usa «rock of offense», la base hebrea מִכְשׁוֹל apunta directamente a tropezar. En español, «ofensa» suele leerse como agravio moral y no como obstáculo físico, por lo que «roca de tropiezo» comunica mejor la metáfora sin perder fidelidad.
  revised_spanish_text: Y él será un santuario, y una piedra de tropiezo[a] y una roca de tropiezo para las dos casas de Israel, un lazo y una trampa para el habitante de Jerusalén[b].
  revised_footnotes:
  - marker: a
    text: O «una piedra contra la cual golpear». El hebreo אֶבֶן נֶגֶף se solapa con el lenguaje bíblico posterior sobre la piedra de tropiezo, pero aquí puede distinguirse de la frase siguiente, que habla más explícitamente de tropezar.
    reason: lexical_alternative
  - marker: b
    text: O «para quienes habitan en Jerusalén». El hebreo usa un participio singular con fuerza colectiva.
    reason: lexical_alternative
  revision_rationale: Se corrigen los anclajes de las notas para que coincidan con las palabras que realmente explican en el texto fuente y en la auditoría inglesa. También se sustituye «roca de ofensa» por «roca de tropiezo» para reflejar mejor מִכְשׁוֹל en español natural y claro, evitando una expresión menos idiomática que puede desviar la imagen física del hebreo.
