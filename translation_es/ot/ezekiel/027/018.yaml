translation:
  language: es
  text: Damasco comerciaba contigo[a], a causa de la abundancia de tus productos, a causa de tu gran riqueza, con vino de Helbón y lana blanca.
  philosophy: optimal-equivalence
  footnotes: &id001
  - marker: a
    text: 'O: «Damasco era tu comerciante... con vino de Helbón y lana brillante».'
    reason: lexical_alternative
lexical_decisions:
- source_word: דַּמֶּשֶׂק
  english_pob_choice: Damascus
  chosen_spanish: Damasco
  alternatives_spanish:
  - Damásco
  lexicon: HALOT
  rationale: Es un nombre propio geográfico; en español se usa la forma tradicional y reconocible Damasco.
- source_word: סֹחַרְתֵּךְ
  english_pob_choice: traded with you
  chosen_spanish: comerciaba contigo
  alternatives_spanish:
  - era tu comerciante
  - negociaba contigo
  - hacía negocios contigo
  lexicon: HALOT
  rationale: La forma verbal con sufijo femenino dirige el discurso a Tiro. 'Comerciaba contigo' conserva la relación bilateral de intercambio y suena natural en español contemporáneo.
- source_word: בְּרֹב מַעֲשַׂיִךְ
  english_pob_choice: because of your many products
  chosen_spanish: a causa de la abundancia de tus productos
  alternatives_spanish:
  - por la abundancia de tus mercancías
  - con tus muchos bienes
  - a causa de tus muchas obras
  lexicon: HALOT
  rationale: En este contexto de catálogo comercial, מַעֲשֶׂה se refiere a productos o bienes producidos para el intercambio. 'Abundancia de tus productos' conserva el valor comercial sin perder la relación con el hebreo.
- source_word: מֵרֹב כָּל הוֹן
  english_pob_choice: because of your abundant wealth
  chosen_spanish: a causa de tu gran riqueza
  alternatives_spanish:
  - a causa de la abundancia de toda riqueza
  - por tu abundancia de riqueza
  - a causa de tu abundante riqueza
  lexicon: HALOT
  rationale: הוֹן significa riqueza/bienes. 'Tu gran riqueza' comunica con claridad la intensificación del hebreo sin caer en una construcción pesada en español.
- source_word: בְּיֵין חֶלְבּוֹן
  english_pob_choice: with wine of Helbon
  chosen_spanish: con vino de Helbón
  alternatives_spanish:
  - con vino de Helbón
  - con vino de Helbon
  lexicon: HALOT
  rationale: Se conserva el topónimo con ortografía española Helbón. La preposición 'de' refleja la relación posesiva/origen del hebreo y sigue el ajuste revisionado del POB en inglés.
- source_word: וְצֶמֶר צָחַר
  english_pob_choice: and white wool
  chosen_spanish: y lana blanca
  alternatives_spanish:
  - y lana brillante
  - y lana resplandeciente
  - y lana clara
  lexicon: HALOT
  rationale: צֶמֶר es 'lana'. צָחַר se entiende aquí como cualidad de blancura/brillo. 'Lana blanca' es la opción más clara y natural en español, y mantiene la función descriptiva del término.
theological_decisions:
- issue: Relación comercial bilateral entre Damasco y Tiro
  english_pob_reading: Damascus traded with you
  chosen_spanish_reading: Damasco comerciaba contigo
  alternative_spanish_readings:
  - Damasco era tu comerciante
  - Damasco hacía negocios contigo
  rationale: El hebreo presenta a Damasco como sujeto comercial en relación directa con Tiro; no introduce una idea doctrinal, pero sí conviene preservar el matiz de intercambio bilateral sin convertirlo en una formulación más rígida de 'trader'.
  doctrine_reference: No aplica; decisión léxica-contextual.
translation_notes:
  revision_awareness: 'Se siguió de cerca el audit trail inglés y su revisión más reciente: ''wine of Helbon'' se reflejó con ''vino de Helbón'', manteniendo la formalidad y el valor relacional del hebreo. Se respetó la lectura comercial del verbo סחר y la interpretación de צָחַר como blanco/brillante en un campo de mercancías.'
  spanish_consistency_notes:
  - Se usó 'Damasco' como topónimo estándar en español.
  - Se mantuvo 'Helbón' con acentuación española y la preposición 'de' para reflejar la relación del hebreo.
  - Se evitó 'SEÑOR' u otras convenciones de ocultamiento, no aplicables al versículo.
  - '''Productos'' y ''riqueza'' siguen el campo semántico mercantil del capítulo.'
  - La nota al pie recoge la alternativa de lectura comercial y la posible asociación de los bienes mencionados.
