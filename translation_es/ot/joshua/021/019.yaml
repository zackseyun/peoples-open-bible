translation:
  language: es
  text: Todas las ciudades de los hijos de Aarón[a], los sacerdotes, eran trece ciudades con sus tierras de pastoreo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y sus tierras de pastoreo». El hebreo une la frase con una simple conjunción; en español puede resumirse como «con sus tierras de pastoreo» o conservarse más literalmente como «y sus tierras de pastoreo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל
  english_pob_choice: All
  chosen_spanish: Todas
  alternatives_spanish:
  - Todas las
  - El total de las
  lexicon: HALOT
  rationale: El hebreo cuantifica la totalidad de las ciudades; en español, 'Todas' reproduce esa suma total de manera natural y concisa.
- source_word: עָרֵי
  english_pob_choice: cities of
  chosen_spanish: ciudades
  alternatives_spanish:
  - poblados
  - aldeas
  lexicon: HALOT
  rationale: עִיר designa un asentamiento habitado; 'ciudades' mantiene la equivalencia usada en la serie de Josué y suena natural en español bíblico moderno.
- source_word: בְנֵי אַהֲרֹן
  english_pob_choice: the sons of Aaron
  chosen_spanish: los hijos de Aarón
  alternatives_spanish:
  - los descendientes de Aarón
  - la casa de Aarón
  lexicon: HALOT
  rationale: Se conserva la expresión filial del hebreo sin interpretarla como 'descendientes', que suaviza la forma original.
- source_word: הַכֹּהֲנִים
  english_pob_choice: the priests
  chosen_spanish: los sacerdotes
  alternatives_spanish:
  - los sacerdotes en ejercicio
  - la clase sacerdotal
  lexicon: HALOT
  rationale: El término appositivo identifica a los hijos de Aarón; 'sacerdotes' es la equivalencia natural en español y preserva la identificación directa.
- source_word: שְׁלֹשׁ עֶשְׂרֵה עָרִים
  english_pob_choice: thirteen cities
  chosen_spanish: trece ciudades
  alternatives_spanish:
  - trece poblados
  - trece urbes
  lexicon: HALOT
  rationale: Número cardinal más sustantivo, sin necesidad de expansión; 'trece ciudades' es la forma más directa y fiel.
- source_word: וּמִגְרְשֵׁיהֶן
  english_pob_choice: with their pasturelands
  chosen_spanish: con sus pastizales
  alternatives_spanish:
  - y sus pastizales
  - con sus tierras de pasto
  - con sus campos de alrededor
  lexicon: HALOT
  rationale: En estos contextos levíticos, מִגְרָשׁ se refiere al terreno abierto/pastoril asociado a la ciudad. 'Pastizales' comunica la función del terreno de modo claro en español; se mantiene 'con' para reflejar la construcción resumida del hebreo, como en el audit trail inglés.
translation_notes:
  revision_awareness: El audit trail inglés presenta un acuerdo alto y no registra revisiones aplicadas; esta versión sigue de cerca la estructura del hebreo y conserva la alternativa sobre la conjunción en una nota, como en el texto inglés.
  spanish_consistency_notes:
  - Se mantiene 'Aarón' con tilde en español y el orden posesivo natural 'los hijos de Aarón'.
  - Se traduce מִגְרְשֵׁיהֶן con un término funcional ('pastizales') para evitar una calca opaca, conservando la referencia al terreno abierto asociado a la ciudad.
  - La frase nominal sin verbo explícito se vierte con 'fueron' para hacer legible el resumen numérico en español sin alterar el sentido.
