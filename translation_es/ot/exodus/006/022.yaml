lexical_decisions:
- source_word: וּ/בְנֵי
  english_pob_choice: And the sons of
  chosen_spanish: Y los hijos de
  alternatives_spanish:
  - Y los hijos de
  - Los hijos de
  lexicon: HALOT
  rationale: En un listado genealógico, בְנֵי se expresa de manera natural y fiel como «hijos de». Mantener la conjunción inicial «Y» conserva la continuidad del registro enumerativo del hebreo y del inglés POB.
- source_word: עֻזִּיאֵל
  english_pob_choice: Uzziel
  chosen_spanish: Uzziel
  alternatives_spanish:
  - Uziel
  lexicon: Nombre propio (transliteración)
  rationale: Nombre propio hebreo que se translitera en lugar de traducirse. Se conserva «Uzziel» para reflejar la forma de base del nombre y su uso común en español bíblico de registro académico o eclesial amplio.
- source_word: מִֽישָׁאֵ֥ל
  english_pob_choice: Mishael
  chosen_spanish: Misael
  alternatives_spanish:
  - Mishael
  lexicon: Nombre propio (transliteración)
  rationale: En español, el nombre se adapta normalmente como «Misael», una forma clara y reconocible. Es una transliteración/normalización ortográfica más natural para lectores hispanohablantes sin alterar el referente propio.
- source_word: וְ/אֶלְצָפָ֖ן
  english_pob_choice: and Elzaphan
  chosen_spanish: Elzafán
  alternatives_spanish:
  - Elzafán
  - Elizafán
  lexicon: Nombre propio (transliteración)
  rationale: El hebreo apunta a una forma con z/ts y la vocalización permite «Elzafán» en español. Se evita una traducción interpretativa; se mantiene el nombre como propio, con adaptación ortográfica española para pronunciación y lectura fluidas.
- source_word: וְ/סִתְרִֽי
  english_pob_choice: and Sithri
  chosen_spanish: Sitrí
  alternatives_spanish:
  - Sitrí
  - Zitrí
  lexicon: Nombre propio (transliteración)
  rationale: Se conserva el nombre propio con transliteración española y acento gráfico para orientar la pronunciación. «Sitrí» refleja bien la forma hebrea y mantiene la distinción del registro onomástico.
translation_notes:
  revision_awareness: El pasaje coincide con el texto hebreo base y el control cruzado informó alta concordancia; no hubo revisiones sustantivas que afecten el español, por lo que se mantiene una solución directa y sobria.
  spanish_consistency_notes:
