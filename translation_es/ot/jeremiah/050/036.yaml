base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/050/036.yaml
  text: A sword is against the diviners[a], and they will become fools; a sword is against her warriors[b], and they will be dismayed.
  footnotes:
  - marker: a
    text: Or 'the liars.' The Hebrew בַּדִּים can refer more broadly to false talkers or deceivers; here 'diviners' is chosen because Jeremiah often targets Babylon's deceptive prognosticators.
    reason: lexical_alternative
  - marker: b
    text: Or 'they will be dismayed.' The Hebrew verb can denote terror or collapse as well as being shattered.
    reason: lexical_alternative
