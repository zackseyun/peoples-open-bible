translation:
  language: es
  text: Pero el hombre vacío de entendimiento ganará entendimiento[a] cuando un pollino de asno salvaje nazca hombre[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «un hombre hueco recibe corazón». La expresión hebrea significa adquirir juicio o entendimiento.
    reason: lexical_alternative
  - marker: b
    text: 'La línea probablemente es irónica: el necio solo llegará a ser sensato cuando un pollino de asno salvaje nazca como hombre.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְ/אִישׁ
  english_pob_choice: man
  chosen_spanish: el hombre
  alternatives_spanish:
  - la persona
  - el ser humano
  lexicon: HALOT
  rationale: אִישׁ es un sustantivo masculino singular que aquí funciona de manera proverbial y genérica. Se conserva ‘el hombre’ para mantener la forma masculina del hebreo y la ironía proverbial del verso.
- source_word: נָבוּב
  english_pob_choice: empty-headed
  chosen_spanish: vacío de entendimiento
  alternatives_spanish:
  - hueco
  - insensato
  - vacío
  lexicon: HALOT
  rationale: El hebreo expresa vaciedad/hueco de manera figurada aplicada a una persona necia. ‘Vacío de entendimiento’ preserva la imagen de vaciedad y la conecta con la falta de juicio sin sonar tan coloquial como ‘cabeza hueca’.
- source_word: יִלָּבֵב
  english_pob_choice: will gain understanding
  chosen_spanish: adquirirá corazón
  alternatives_spanish:
  - ganará entendimiento
  - se pondrá sensato
  - recibirá corazón
  lexicon: HALOT
  rationale: El verbo niphal de לבב literalmente dice ‘recibir corazón’; el idioma apunta a adquirir sentido o entendimiento. Se mantiene la metáfora ‘corazón’ para no borrar la imagen original, con un futuro que refleja el imperfecto hebreo.
- source_word: וְ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Mas
  lexicon: HALOT
  rationale: La conjunción introduce un contraste irónico y proverbial. ‘Pero’ comunica mejor ese valor adversativo en español moderno.
- source_word: עַיִר פֶּרֶא
  english_pob_choice: a wild donkey’s colt
  chosen_spanish: un pollino de asna salvaje
  alternatives_spanish:
  - un potro de asno salvaje
  - el pollino de una asna salvaje
  lexicon: HALOT
  rationale: La construcción denota el joven de una asna salvaje. ‘Pollino’ conserva el matiz de cría joven, y ‘asna salvaje’ refleja el animal del hebreo sin recurrir a ‘asno’ como sustantivo masculino en español donde la imagen femenina del animal es menos natural en esta construcción.
- source_word: אָדָם
  english_pob_choice: man
  chosen_spanish: hombre
  alternatives_spanish:
  - humano
  - ser humano
  lexicon: HALOT
  rationale: Aquí אָדָם es singular y forma parte del remate comparativo ‘nacer hombre’. Se conserva ‘hombre’ para mantener la correspondencia con el hebreo y la fuerza proverbial del contraste.
- source_word: יִוָּלֵד
  english_pob_choice: is born
  chosen_spanish: nazca
  alternatives_spanish:
  - sea nacido
  - es nacido
  - nazca como
  lexicon: HALOT
  rationale: El imperfecto niphal de ילד expresa aquí una acción hipotética dentro de una comparación. En español, el subjuntivo ‘nazca’ comunica mejor la imposibilidad/proverbialidad del giro que un simple indicativo.
theological_decisions:
- issue: Fuerza irónica del proverbio
  english_pob_reading: 'The verse is rendered as an ironic statement of impossibility: an empty-headed man gains understanding only when a wild donkey''s colt is born a man.'
  chosen_spanish_reading: 'El verso queda como una comparación irónica de imposibilidad: el hombre vacío de entendimiento solo ‘adquirirá corazón’ cuando nazca hombre un pollino de asna salvaje.'
  alternative_spanish_readings:
  - 'Una afirmación menos marcada: el hombre vacío de entendimiento adquirirá corazón cuando nazca hombre un pollino de asna salvaje.'
  - 'Una lectura desiderativa: ojalá el hombre vacío de entendimiento adquiera corazón.'
  rationale: El hebreo es breve y difícil, pero el paralelismo sugiere una comparación absurda. El español conserva tanto la imagen como la imposibilidad implícita sin explicarla de más, dejando visible la tensión entre la metáfora literal (‘corazón’) y el sentido idiomático (‘entendimiento’).
  doctrine_reference: 'Translation philosophy #1, #3, #6'
translation_notes:
  revision_awareness: El audit trail inglés mantuvo el futuro (‘will gain’) para reflejar mejor el imperfecto hebreo y sostuvo la lectura irónica de imposibilidad. La redacción española refleja esa revisión con un futuro y conserva la tensión entre la metáfora literal de ‘corazón’ y el sentido idiomático de ‘entendimiento’.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ solo cuando el texto fuente lo requiera explícitamente; este verso no lo contiene.
  - Se preserva el masculino genérico de אִישׁ y אָדָם por fidelidad al hebreo y al paralelo proverbial.
  - ‘Corazón’ se mantiene por la carga semántica hebrea, aunque se aclare su valor de entendimiento en la nota.
  - ‘Asna salvaje’ evita suavizar la imagen zoológica del hebreo y conserva el contraste improbable del dicho.
