    reason: lexical_alternative
  revision_rationale: 'La revisión hace ajustes menores pero importantes de naturalidad y precisión: reemplaza una expresión española poco idiomática por una formulación más fluida que mantiene la imagen hebrea, simplifica el vocativo para evitar arcaísmo innecesario y mejora la alternativa léxica de la nota a con «aliento». No se requieren cambios doctrinales ni una relectura de fondo.'
