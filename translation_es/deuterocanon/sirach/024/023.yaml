translation:
  language: es
  text: Todas estas cosas son el libro del pacto del Altísimo Dios[a], la ley que Moisés ordenó como herencia para las asambleas de Jacob[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Dios Altísimo». El orden griego puede representarse de ambas maneras en español.
    reason: lexical_alternative
  - marker: b
    text: O «las congregaciones de Jacob». Aquí συναγωγαῖς probablemente se refiere a comunidades reunidas de Israel, no necesariamente a la institución posterior de la sinagoga.
    reason: lexical_alternative
lexical_decisions:
- source_word: ταῦτα πάντα
  english_pob_choice: All these things
  chosen_spanish: Todas estas cosas
  alternatives_spanish:
  - Todo esto
  - Todas estas
  lexicon: LSJ
  rationale: El plural neutro griego conserva el valor colectivo del contexto previo. «Todas estas cosas» reproduce mejor esa referencia acumulada que una forma más resumida como «todo esto».
- source_word: βίβλος
  english_pob_choice: book
  chosen_spanish: libro
  alternatives_spanish:
  - rollo
  - documento
  lexicon: LSJ
  rationale: «βίβλος» designa un escrito. «Libro» es la equivalencia natural en español y funciona bien en la expresión «libro del pacto» sin precisar indebidamente el formato material.
- source_word: διαθήκης
  english_pob_choice: covenant
  chosen_spanish: pacto
  alternatives_spanish:
  - testamento
  - alianza
  lexicon: LSJ
  rationale: En este contexto bíblico, el sentido es pactual. «Pacto» mantiene la fuerza teológica y la continuidad con la relación de Dios con su pueblo; «testamento» introduciría una asociación menos precisa.
- source_word: θεοῦ Ὑψίστου
  english_pob_choice: God Most High
  chosen_spanish: Dios Altísimo
  alternatives_spanish:
  - el Dios Altísimo
  - Dios el Altísimo
  lexicon: LSJ
  rationale: El orden griego puede expresarse de manera natural en español como «Dios Altísimo». Conserva la identificación posesiva sin sobrecargar la frase.
- source_word: νόμον
  english_pob_choice: the law
  chosen_spanish: la ley
  alternatives_spanish:
  - una ley
  - la instrucción
  lexicon: LSJ
  rationale: Aquí νόμος se refiere a la ley mosaica ya mencionada. En español, «la ley» es la forma más clara y estable para ese cuerpo normativo.
- source_word: ὃν ἐνετείλατο
  english_pob_choice: that Moses commanded
  chosen_spanish: que Moisés mandó
  alternatives_spanish:
  - que Moisés ordenó
  - que Moisés dio como mandamiento
  lexicon: LSJ
  rationale: «ἐντέλλομαι» significa mandar u ordenar. «Mandó» es directo y fiel, sin añadir matices ajenos al verbo griego.
- source_word: κληρονομίαν
  english_pob_choice: as an inheritance
  chosen_spanish: como herencia
  alternatives_spanish:
  - como heredad
  - en herencia
  lexicon: LSJ
  rationale: 'El acusativo funciona en relación explicativa con «la ley»: ésta se presenta como posesión heredada. «Como herencia» comunica bien esa relación en español contemporáneo.'
- source_word: συναγωγαῖς
  english_pob_choice: assemblies
  chosen_spanish: las asambleas
  alternatives_spanish:
  - las congregaciones
  - los agrupamientos
  lexicon: LSJ
  rationale: En este contexto pre-rabínico, el término apunta a comunidades reunidas, no necesariamente a la institución posterior de la sinagoga. «Asambleas» conserva ese sentido básico sin anacronismo.
- source_word: Ἰακώβ
  english_pob_choice: Jacob
  chosen_spanish: Jacob
  alternatives_spanish:
  - Israel
  lexicon: LSJ
  rationale: El texto griego nombra a Jacob, y debe mantenerse ese nombre propio. El sentido colectivo ya queda claro por el contexto de las asambleas.
theological_decisions:
- issue: διαθήκη en contexto bíblico-covenantal
  english_pob_reading: covenant
  chosen_spanish_reading: pacto
  alternative_spanish_readings:
  - testamento
  - alianza
  rationale: La referencia a Moisés y a Jacob sitúa la frase en el marco de la relación pactal de Dios con su pueblo. «Pacto» preserva esa continuidad teológica y evita la lectura más tardía de «testamento».
  doctrine_reference: 'DOCTRINE.md: primacía del sentido original y precisión teológica en términos de pacto'
- issue: συναγωγαῖς como comunidades reunidas
  english_pob_reading: assemblies
  chosen_spanish_reading: asambleas
  alternative_spanish_readings:
  - congregaciones
  - sinagogas
  rationale: La evidencia del contexto favorece el sentido de grupos reunidos, no el de la institución judía posterior. «Asambleas» mantiene la neutralidad histórica y el alcance comunitario.
  doctrine_reference: 'DOCTRINE.md: evitar anacronismos institucionales en términos históricos'
translation_notes:
  revision_awareness: El texto griego presenta una concordancia alta con el audit trail inglés y no muestra revisiones aplicadas; se mantiene la decisión de traducir διαθήκη como «pacto» y συναγωγαῖς como «asambleas», con notas que preservan las alternativas documentadas.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεοῦ y «Altísimo» con mayúscula inicial por tratarse del título divino.
  - Se usa «Jacob» y no «Israel», siguiendo el nombre propio del griego.
  - «Libro del pacto» conserva el paralelismo bíblico natural en español sin introducir «testamento».
  - No se usa «SEÑOR» como máscara para el nombre divino, porque aquí el texto griego dice θεοῦ Ὑψίστου y no un sustituto del tetragrámaton.
