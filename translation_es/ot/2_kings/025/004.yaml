base_translation:
  language: en
  yaml_path: translation/ot/2_kings/025/004.yaml
  text: Then the city was breached[a], and all the men of war fled by night by the way of the gate between the two walls, which was by the king’s garden, though the Chaldeans were around the city on every side[c][b]; and the king went by the way of the Arabah.
  footnotes:
  - marker: a
    text: Or 'the Babylonians' for 'the Chaldeans.' The Hebrew specifically reads 'Chaldeans.'
    reason: lexical_alternative
  - marker: b
    text: Or 'he went.' The Hebrew leaves the subject implicit; context indicates the king.
    reason: lexical_alternative
  - marker: c
    text: The Arabah is the Jordan rift region southward from the Jordan Valley; traditionally also rendered 'the plain.'
    reason: cultural_note
