translation_notes:
  revision_awareness: The English POB revision removed an added word ('city') from the Jebusite phrase to stay closer to the Hebrew. The Spanish draft follows that revision by rendering only הַיְבוּסִי as «el jebuseo» and does not supply «ciudad». The rest of the verse remains aligned with the latest English audit text and the high-agreement cross-check.
  spanish_consistency_notes:
  - 'Se mantiene la transliteración de topónimos clave: Ben-hinom, Refaim, Hinom y En-rogel.'
  - Se conserva el movimiento repetido «descendía» para reflejar el paralelo verbal del hebreo.
  - Se evita añadir «ciudad» en la frase sobre el jebuseo, en coherencia con la revisión más reciente del POB inglés.
  - Se usa «límite» para גְּבוּל y «costado meridional» para כֶּתֶף, respetando el valor topográfico del pasaje.
