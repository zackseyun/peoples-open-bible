translation:
  language: es
  text: Sus misericordias son vistas[b] por todas sus criaturas, y ha repartido su luz y su alabanza a los hijos del hombre[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a la humanidad» / «a los seres humanos»; el hebreo «a los hijos del hombre» es un modismo para la humanidad.
    reason: lexical_alternative
  - marker: b
    text: 'El paralelo griego en Swete dice algo muy diferente aquí: «¿Quién se acordará de mí desde lo alto?». El texto principal sigue el testimonio hebreo conservado, que es la fuente primaria para este versículo donde está disponible.'
    reason: textual_variant
lexical_decisions:
- source_word: רַחֲמָיו
  english_pob_choice: his mercies
  chosen_spanish: su misericordia
  alternatives_spanish:
  - sus misericordias
  - sus compasiones
  - sus actos de misericordia
  lexicon: HALOT
  rationale: El hebreo plural רחמיו puede expresar actos concretos de misericordia o misericordia en sentido colectivo. En español, el singular colectivo «su misericordia» suena natural y conserva la fuerza teológica sin sonar forzado; las alternativas plurales quedan posibles, pero «misericordia» funciona bien como sustantivo abstracto en este contexto.
- source_word: יֵרָאוּ
  english_pob_choice: are seen
  chosen_spanish: se ve
  alternatives_spanish:
  - son vistas
  - aparecen
  - se manifiestan
  lexicon: HALOT
  rationale: El hebreo permite una lectura pasiva/visible ligada al verbo ver. «Se ve» expresa con naturalidad la manifestación de la misericordia en español, sin añadir una interpretación excesiva. Mantiene la idea de visibilidad presente en la línea hebrea y en el paralelo de la luz.
- source_word: לְכָל בִּרְיוֹתָיו
  english_pob_choice: by all his creatures
  chosen_spanish: por todas sus criaturas
  alternatives_spanish:
  - a todas sus criaturas
  - entre todas sus criaturas
  lexicon: HALOT
  rationale: '«Criaturas» reproduce bien el sentido de seres creados de בריותיו y el giro preposicional español con «por» permite una pasiva natural: «se ve por todas sus criaturas». Aunque el hebreo admite matiz de destinatario, la elección conserva la relación con toda la creación sin paraphrasear.'
- source_word: וְאוֹרוֹ
  english_pob_choice: his light
  chosen_spanish: su luz
  alternatives_spanish:
  - su iluminación
  - su resplandor
  - su claridad
  lexicon: HALOT
  rationale: אור es básicamente «luz». «Su luz» mantiene la imagen original y el paralelismo con «misericordia» y «alabanza» sin cerrar el posible alcance figurado del término.
- source_word: וְשִׁבְחוֹ
  english_pob_choice: his praise
  chosen_spanish: su alabanza
  alternatives_spanish:
  - su gloria
  - su renombre
  - su loor
  lexicon: HALOT
  rationale: שבח significa alabanza o loable dignidad. «Su alabanza» sigue de cerca el hebreo y evita sustituirlo por «gloria», que sería una interpretación más amplia. Además, suena natural en español bíblico contemporáneo.
- source_word: חָלַק
  english_pob_choice: has apportioned
  chosen_spanish: ha repartido
  alternatives_spanish:
  - ha distribuido
  - ha asignado
  - ha compartido
  lexicon: HALOT
  rationale: חלק indica dividir, repartir o distribuir. «Ha repartido» transmite con claridad la acción de asignar a diversos destinatarios y funciona de manera más fluida en español que una calca como «ha apportionado».
- source_word: לִבְנֵי אָדָם
  english_pob_choice: to the sons of man
  chosen_spanish: a los hijos de Adán
  alternatives_spanish:
  - a los hijos del hombre
  - a los seres humanos
  - a la humanidad
  lexicon: HALOT
  rationale: El hebreo בני אדם es un idiomático masculino de alcance representativo para la humanidad. «Hijos de Adán» conserva el giro semítico y la huella masculina del original, mientras que una nota puede aclarar su sentido colectivo. Se evita reemplazarlo por una formulación genérica que borre la forma del hebreo.
theological_decisions:
- issue: Lectura antropológica de בני אדם
  english_pob_reading: the sons of man
  chosen_spanish_reading: los hijos de Adán
  alternative_spanish_readings:
  - la humanidad
  - los seres humanos
  rationale: La lectura hebrea es masculina e idiomática, con valor representativo para toda la humanidad. En español, «los hijos de Adán» conserva tanto la forma como la referencia antropológica sin neutralizar prematuramente el texto. Una nota puede explicitar que el sentido es colectivo.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4; Contested terms אָדָם
- issue: Relación entre misericordia, luz y alabanza
  english_pob_reading: he has apportioned his light and his praise to the sons of man
  chosen_spanish_reading: ha repartido su luz y su alabanza a los hijos de Adán
  alternative_spanish_readings:
  - ha distribuido su luz y su gloria entre la humanidad
  - ha compartido su luz y su alabanza con los seres humanos
  rationale: El hebreo no especifica si «luz» y «alabanza» se refieren a revelación, honor o capacidad de alabar. La traducción conserva esa apertura teológica y no la reduce a una sola interpretación. «Ha repartido» mantiene la idea de distribución sin añadir más contenido doctrinal del necesario.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
translation_notes:
  revision_awareness: Se siguió el texto hebreo de Kahana como fuente principal, con control del paralelo griego de Swete. La versión griega de Sir 16:16 transmite una pregunta muy distinta, pero el aparato auditado del POB ya la trata como variante secundaria frente al hebreo conservado. No se aplicaron cambios adicionales respecto al pase más reciente del proyecto.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como término por defecto en el proyecto cuando aparezca el nombre divino; en este versículo no aparece.
  - Se conserva un registro bíblico moderno y digno, evitando arcaísmos innecesarios.
  - «Criaturas» refleja el valor de seres creados sin introducir una lectura más amplia como «todo ser viviente».
  - Las notas preservan ambigüedades reales del hebreo sin resolverlas de forma interpretativa.
