revisions:
- from: Cuando edificaste tu montículo al comienzo de cada camino y levantaste tu lugar alto en cada plaza, no fuiste como una prostituta[a], en que despreciabas el pago.
  to: Cuando edificaste tu montículo al comienzo de cada camino y levantaste tu lugar alto en cada plaza, no fuiste como una prostituta, porque despreciabas el pago[a].
  rationale: Se hace una reparación menor para mejorar la naturalidad del español y alinear correctamente la nota con la cláusula que explica. «Porque despreciabas el pago» transmite con claridad la ironía contextual del hebreo y prepara bien los versículos siguientes. También se corrige el aparato de notas para que el marcador aparezca en el lugar exacto y la nota tenga función explicativa, no de falsa alternativa léxica.
