translation:
  language: es
  text: 'Y le contarás a tu hijo ese día[a], diciendo: «Es por esto que Yahvé actuó por mí cuando salí de Egipto».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Yahvé hizo esto por mí cuando salí de Egipto». El hebreo puede entenderse con «esto» vinculado ya sea con la razón de la observancia o más directamente con lo que hizo Yahvé.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִגַּדְתָּ
  english_pob_choice: And you shall tell
  chosen_spanish: Y tú contarás
  alternatives_spanish:
  - Y tú declararás
  - Y tú explicarás
  lexicon: HALOT
  rationale: El hifil de נגד expresa dar a conocer, decir o declarar. «Contar» comunica de forma natural la acción de transmitir el relato a un hijo, sin perder el valor de comunicación deliberada del hebreo.
- source_word: לְבִנְךָ
  english_pob_choice: your son
  chosen_spanish: a tu hijo
  alternatives_spanish:
  - a tu niño
  - a tu descendiente
  lexicon: HALOT
  rationale: El hebreo usa un sustantivo masculino singular con preposición indirecta. «A tu hijo» conserva la relación filial directa y respeta el matiz de la instrucción familiar.
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: on that day
  chosen_spanish: en aquel día
  alternatives_spanish:
  - en ese día
  - aquel día
  lexicon: HALOT
  rationale: La expresión temporal demostrativa se rinde de manera natural con «en aquel día», manteniendo la referencia enfática y el valor deíctico del hebreo.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dirás
  - así
  lexicon: HALOT
  rationale: La forma introduce el contenido citado. «Diciendo» conserva la relación formal con el discurso directo y resulta fluido en español bíblico moderno.
- source_word: בַּעֲבוּר זֶה
  english_pob_choice: because of this
  chosen_spanish: por causa de esto
  alternatives_spanish:
  - a causa de esto
  - por esto
  - debido a esto
  lexicon: HALOT
  rationale: La frase señala motivo o base. «Por causa de esto» preserva la fuerza causal y deja abierta la posible relación entre el signo ritual y el acto divino, como en el análisis textual del inglés POB.
- source_word: עָשָׂה יְהוָה לִי
  english_pob_choice: the LORD acted for me
  chosen_spanish: Yahvé actuó para mí
  alternatives_spanish:
  - Yahvé hizo esto por mí
  - Yahvé obró a mi favor
  - Yahvé me favoreció
  lexicon: HALOT
  rationale: 'עָשָׂה es amplio: hacer, actuar, obrar. «Actuó para mí» conserva la amplitud verbal y el sentido de intervención en favor del hablante, sin añadir un objeto no expresado en hebreo.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: Se mantiene el nombre divino como forma estable del proyecto en español. «Yahvé» preserva el Tetragrámaton sin sustituirlo por un título, conforme a la política terminológica del POB.
- source_word: בְּצֵאתִי מִמִּצְרָיִם
  english_pob_choice: when I came out of Egypt
  chosen_spanish: cuando salí de Egipto
  alternatives_spanish:
  - cuando yo salí de Egipto
  - al salir de Egipto
  - cuando me fui de Egipto
  lexicon: HALOT
  rationale: La construcción temporal con infinitivo se expresa con naturalidad como circunstancia de tiempo. «Salí de Egipto» conserva la perspectiva en primera persona y el movimiento de salida.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton; la traducción española mantiene el nombre propio, no una sustitución litúrgica. Esto preserva la identidad pactual del Dios que actúa en el éxodo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Relación causal de בַּעֲבוּר זֶה
  english_pob_reading: because of this
  chosen_spanish_reading: por causa de esto
  alternative_spanish_readings:
  - a causa de esto
  - por esto
  rationale: El hebreo permite una conexión causal que puede referirse al motivo de la observancia o al acto mismo de Yahvé. El español conserva esa tensión sin resolverla de manera prematura.
  doctrine_reference: English POB footnote a / source note
translation_notes:
  revision_awareness: 'Se revisó el contexto auditado en inglés POB y no se introdujeron cambios respecto de la lectura base: se preservó la ambigüedad de בַּעֲבוּר זֶה mediante una formulación causal en español y se mantuvo el nombre divino como Yahvé. La redacción final sigue de cerca la estructura hebrea sin calco rígido.'
  spanish_consistency_notes:
  - Se conserva «Yahvé» como forma española del nombre divino, coherente con el proyecto.
  - «Hijo» se mantiene en masculino singular por fidelidad al hebreo y al expediente auditado.
  - «Por causa de esto» deja abierta la referencia de «esto», como en la nota inglesa.
  - La puntuación con dos puntos introduce el discurso directo con estilo bíblico claro y moderno.
