revisions:
- from: ¿Por qué no perdonas mi transgresión y quitas mi iniquidad? Porque ahora me acostaré en el polvo[a]; me buscarás diligentemente[b], pero ya no existiré.
  to: ¿Y por qué no perdonas mi transgresión[a] y quitas mi iniquidad? Pues ahora me acostaré en el polvo; me buscarás diligentemente[b], pero ya no estaré.
  rationale: Se repara el anclaje y contenido de la nota [a] para alinearlos con la auditoría inglesa y con los modismos hebreos del perdón; se mejora la conexión retórica inicial con '¿Y por qué no...?' y se sustituye 'ya no existiré' por 'ya no estaré' para representar con más naturalidad el idiomatismo hebreo de ausencia/muerte. También se deja 'polvo' sin nota, ya que el texto principal ya preserva correctamente la imagen poética.
