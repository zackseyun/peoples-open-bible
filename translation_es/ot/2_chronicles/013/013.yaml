translation:
  language: es
  text: Pero Jeroboam había hecho rodear la emboscada para venir por detrás de ellos[a], así que estaban delante de Judá[b], y la emboscada estaba detrás de ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'la fuerza emboscada' o 'los hombres en emboscada'. El sustantivo hebreo puede designar la emboscada como táctica o a las tropas apostadas en ella.
    reason: lexical_alternative
  - marker: b
    text: Tradicionalmente se escribe 'Jeroboam'. La forma hebrea del nombre es יָרָבְעָם (Yarobam).
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/יָֽרָבְעָ֗ם
  english_pob_choice: But Jeroboam
  chosen_spanish: Pero Jeroboam
  alternatives_spanish:
  - Y Jeroboam
  - Ahora bien, Jeroboam
  lexicon: HALOT
  rationale: Se conserva el nombre tradicional 'Jeroboam', siguiendo la revisión inglesa más reciente y la práctica española común, para facilitar la identificación histórica. 'Pero' refleja con naturalidad el contraste táctico introducido por la conjunción.
- source_word: הֵסֵב
  english_pob_choice: had brought ... around
  chosen_spanish: había hecho girar ...
  alternatives_spanish:
  - había hecho rodear ...
  - había llevado ... alrededor
  lexicon: HALOT
  rationale: El hifil de סבב expresa hacer que algo gire o se desplace alrededor. 'Había hecho girar' comunica la maniobra militar sin forzar un giro interpretativo adicional.
- source_word: הַמַּאְרָב
  english_pob_choice: the ambush
  chosen_spanish: la emboscada
  alternatives_spanish:
  - la fuerza emboscada
  - los hombres en emboscada
  lexicon: HALOT
  rationale: En español, 'emboscada' puede referir tanto la táctica como el grupo apostado en ella. Como el inglés POB preserva esa misma amplitud, se mantiene el término breve y natural.
- source_word: לָבוֹא מֵאַחֲרֵיהֶם
  english_pob_choice: to come behind them
  chosen_spanish: para que viniera por detrás de ellos
  alternatives_spanish:
  - para llegar por detrás de ellos
  - para venir detrás de ellos
  lexicon: HALOT
  rationale: 'La construcción infinitiva expresa propósito: el movimiento se orienta a colocarse a la retaguardia. ''Por detrás de ellos'' conserva el sentido espacial sin endurecerlo con un giro demasiado literal.'
- source_word: וַיִּהְיוּ לִפְנֵי יְהוּדָה
  english_pob_choice: so they were in front of Judah
  chosen_spanish: de modo que ellos quedaran delante de Judá
  alternatives_spanish:
  - así que estaban delante de Judá
  - de modo que estuvieron delante de Judá
  lexicon: HALOT
  rationale: Se mantiene la orientación espacial de batalla. 'Delante de Judá' corresponde al valor de לִפְנֵי en este contexto militar, y 'quedaran' refleja el resultado posicional.
- source_word: לִפְנֵי
  english_pob_choice: in front of
  chosen_spanish: delante de
  alternatives_spanish:
  - en frente de
  - ante
  lexicon: HALOT
  rationale: Aunque 'antes de' o 'ante' pueden funcionar en otros contextos, aquí el sentido espacial es primario; 'delante de' es claro y natural en español actual.
- source_word: וְ/הַ/מַּאְרָ֖ב
  english_pob_choice: and the ambush
  chosen_spanish: y la emboscada
  alternatives_spanish:
  - y la fuerza en emboscada
  - y los que estaban en emboscada
  lexicon: HALOT
  rationale: Se repite el mismo sustantivo para mantener la consistencia terminológica y la posible ambigüedad entre táctica y tropas emboscadas, tal como en el hebreo y en el inglés auditado.
- source_word: מֵ/אַחֲרֵי/הֶֽם
  english_pob_choice: behind them
  chosen_spanish: detrás de ellos
  alternatives_spanish:
  - a su retaguardia
  - tras ellos
  lexicon: HALOT
  rationale: La expresión fija la posición posterior respecto de Judá. 'Detrás de ellos' es la opción más directa y transparente para el lector español.
theological_decisions:
- issue: Nombre divino ausente en el versículo; mantener lectura histórica y militar sin introducir equivalentes devocionales
  english_pob_reading: The verse is rendered as a tactical narrative without theological substitution.
  chosen_spanish_reading: El versículo se traduce como narración táctica sin sustituciones devocionales.
  alternative_spanish_readings:
  - Introducir un estilo más litúrgico
  - Sustituir con fórmulas devocionales
  rationale: No hay mención explícita de יהוה en este versículo, por lo que no se introduce terminología teológica adicional que el hebreo no exige. La fidelidad se concentra en la descripción del movimiento militar.
  doctrine_reference: Principio de sobriedad textual; no agregar contenido teológico ausente del texto base
translation_notes:
  revision_awareness: 'La revisión inglesa reciente corrigió la forma del nombre a ''Jeroboam'' y afinó ''turned the ambush around'' por ''brought the ambush around''. La presente versión española sigue esa revisión con un español natural: ''había hecho girar la emboscada''.'
  spanish_consistency_notes:
  - Se mantiene 'emboscada' para הַמַּאְרָב en ambos usos, preservando la repetición del hebreo.
  - Se conserva 'delante de' y 'detrás de' como pares espaciales claros y consistentes.
  - Se usa 'Jeroboam' por la tradición española y por coherencia con la última revisión inglesa.
  - El tono es narrativo y sobrio, sin introducir fórmulas eclesiásticas ajenas al pasaje.
