translation:
  language: es
  text: Mi ojo se ha consumido a causa del dolor[a]; ha envejecido a causa de todos mis enemigos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Mi ojo se ha vuelto borroso por la vexación; se ha gastado a causa de todos mis adversarios».'
    reason: lexical_alternative
lexical_decisions:
- source_word: עָשְׁשָׁה
  english_pob_choice: has wasted away
  chosen_spanish: se ha consumido
  alternatives_spanish:
  - se ha desgastado
  - se ha marchitado
  - se ha debilitado
  lexicon: HALOT
  rationale: El verbo expresa deterioro o agotamiento. En español, «se ha consumido» conserva la imagen de desgaste físico del ojo sin reducirla solo a «verse borroso».
- source_word: מִכַּעַס
  english_pob_choice: from grief
  chosen_spanish: a causa de la aflicción
  alternatives_spanish:
  - por la tristeza
  - a causa de la vexación
  - por la indignación
  lexicon: HALOT
  rationale: כַּעַס puede abarcar aflicción, vexación o enojo según el contexto. Aquí el lamento personal favorece una causa emocional de dolor; «aflicción» mantiene amplitud semántica y tono natural en español.
- source_word: עֵינִי
  english_pob_choice: My eye
  chosen_spanish: Mi ojo
  alternatives_spanish:
  - Mis ojos
  lexicon: HALOT
  rationale: El hebreo está en singular con sufijo de primera persona. En español también conviene mantener el singular, porque la imagen poética se centra en el ojo como órgano afectado.
- source_word: עָתְקָה
  english_pob_choice: has grown old
  chosen_spanish: se ha envejecido
  alternatives_spanish:
  - se ha consumido
  - se ha debilitado
  - se ha hecho viejo
  lexicon: HALOT
  rationale: El verbo comunica volverse viejo, gastado o debilitado. «Se ha envejecido» conserva la metáfora de deterioro del ojo y corresponde al paralelismo con el primer hemistiquio.
- source_word: בְּכָל
  english_pob_choice: because of all
  chosen_spanish: por culpa de todos
  alternatives_spanish:
  - a causa de todos
  - por todos
  - ante todos
  lexicon: HALOT
  rationale: La preposición con este contexto indica ocasión o causa vinculada al conjunto de enemigos. «Por culpa de» intensifica la relación causal en español, aunque «a causa de» sigue siendo una alternativa válida.
- source_word: צוֹרְרָי
  english_pob_choice: my enemies
  chosen_spanish: mis enemigos
  alternatives_spanish:
  - mis adversarios
  - los que me hostigan
  lexicon: HALOT
  rationale: El participio describe a quienes actúan hostilmente contra el salmista. «Enemigos» es la equivalencia más natural y suficientemente fuerte en un lamento.
translation_notes:
  revision_awareness: El borrador sigue el texto hebreo consonante/vocalizado de WLC y el audit trail inglés. Mantiene el paralelismo corporal-emocional y conserva la tensión léxica de כַּעַס, donde el español puede oscilar entre aflicción, tristeza, vexación o indignación sin fijar indebidamente un solo matiz.
  spanish_consistency_notes:
  - Se mantuvo el singular «mi ojo» siguiendo el hebreo.
  - Se eligió «aflicción» para כַּעַס como término amplio y digno; la nota conserva la alternativa «vexación».
  - Se tradujo בְּכָל de modo causal con «por culpa de» para reflejar el efecto atribuido a la totalidad de los enemigos.
  - No se usó «SEÑOR» ni terminología cristológica, porque el versículo no contiene esas referencias.
