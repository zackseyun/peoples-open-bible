translation:
  language: es
  text: Y en aquel día la gloria de Jacob se volverá delgada[a], y la gordura de su carne se consumirá[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «será disminuida». El verbo hebreo puede implicar hacerse pequeño, débil o delgado; la traducción principal sigue la imagen corporal del paralelismo.
    reason: lexical_alternative
  - marker: b
    text: O «la riqueza de su cuerpo se volverá enjuta». El hebreo emplea imágenes físicas de gordura y delgadez para describir la pérdida de fuerza y prosperidad de Jacob.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: And ... will
  chosen_spanish: Y ... se hará
  alternatives_spanish:
  - Y sucederá que
  - Y será
  lexicon: HALOT
  rationale: La fórmula hebrea introduce un acontecimiento futuro. En español, "Y ... se hará" mantiene la relación verbal futura y permite unirla con el predicado siguiente sin volverlo excesivamente mecánico.
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: in that day
  chosen_spanish: en aquel día
  alternatives_spanish:
  - en ese día
  - para aquel día
  lexicon: HALOT
  rationale: Es la fórmula profética normal; "en aquel día" conserva el tono idiomático y escatológico del texto.
- source_word: יִדַּל
  english_pob_choice: will become thin
  chosen_spanish: se hará delgada
  alternatives_spanish:
  - se hará pequeña
  - será disminuida
  - se enflaquecerá
  lexicon: HALOT
  rationale: El verbo puede expresar hacerse pequeño, débil o delgado. Dado que la línea paralela usa imagen corporal, "se hará delgada" conserva la metáfora de adelgazamiento que el contexto favorece.
- source_word: כְּבוֹד
  english_pob_choice: glory
  chosen_spanish: la gloria
  alternatives_spanish:
  - el honor
  - el esplendor
  - la riqueza
  lexicon: HALOT
  rationale: '"Gloria" es el término más amplio y natural para el peso, prestigio o prominencia nacional de Jacob; deja abierta la gama semántica sin imponer una sola.'
- source_word: יַעֲקֹב
  english_pob_choice: Jacob
  chosen_spanish: Jacob
  alternatives_spanish:
  - Israel
  - el pueblo de Jacob
  lexicon: HALOT
  rationale: Se conserva el nombre propio del hebreo, como en el texto fuente, sin glosarlo en el cuerpo principal.
- source_word: וּמִשְׁמַן
  english_pob_choice: and the fatness
  chosen_spanish: y la gordura
  alternatives_spanish:
  - y la riqueza
  - y la opulencia
  - y la gordura corporal
  lexicon: HALOT
  rationale: El sustantivo es literalmente "gordura" o "grasa"; aquí se mantiene la imagen física para sostener el paralelismo con el verbo de consumirse.
- source_word: בְּשָׂרוֹ
  english_pob_choice: of his flesh
  chosen_spanish: de su carne
  alternatives_spanish:
  - de su cuerpo
  - de su organismo
  lexicon: HALOT
  rationale: '"Carne" reproduce el término concreto del hebreo y conserva la imagen corporal. No se reemplaza por un abstracto como "cuerpo" para no perder el paralelismo poético.'
- source_word: יֵרָזֶה
  english_pob_choice: will waste away
  chosen_spanish: se consumirá
  alternatives_spanish:
  - se adelgazará
  - se enflaquecerá
  - se volverá delgada
  lexicon: HALOT
  rationale: El verbo significa hacerse delgado/raquítico. "Se consumirá" comunica en español el deterioro físico progresivo y armoniza con la imagen de adelgazamiento del hemistiquio anterior.
theological_decisions:
- issue: Referencia de "Jacob" en un oráculo de juicio
  english_pob_reading: Retain 'Jacob' as the covenantal/national name without substituting an interpretive gloss.
  chosen_spanish_reading: Conservar "Jacob" como nombre pactual/nacional sin sustituirlo por una paráfrasis interpretativa.
  alternative_spanish_readings:
  - Israel
  - el pueblo de Jacob
  rationale: El hebreo nombra a Jacob; preservarlo mantiene la resonancia profética y evita cerrar el referente demasiado pronto. El contexto sugiere al pueblo/nación, pero el texto mismo usa el nombre propio.
  doctrine_reference: Covenantal/national naming in prophetic discourse
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el último estado revisado del POB en inglés: se mantuvo la opción directa para el verbo principal (''become thin'') y se conservó el paralelismo corporal con la línea final, evitando una abstracción como ''disminuida'' que diluiría la imagen.'
  spanish_consistency_notes:
  - Se conserva el patrón profético "en aquel día".
  - '"Gloria" y "gordura" mantienen el registro poético y la imaginería corporal del hebreo.'
  - '"Carne" se usa de modo literal, no como término teológico paulino.'
  - El adjetivo/verbo elegido para יִדַּל y יֵרָזֶה se coordina para preservar el paralelismo semántico de adelgazamiento y consumirse.
