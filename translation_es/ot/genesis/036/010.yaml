review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador preserva correctamente la estructura básica del hebreo: encabezado presentacional, identificación de los dos hijos de Esaú, filiación materna y repetición de «mujer de Esaú» para cada madre. Sin embargo, el cambio de שְׁמוֹת («nombres de») a «genealogías» añade una idea no presente en el texto fuente y debilita la correspondencia con el encabezado nominal hebreo. También hay una desalineación interna entre el texto y las notas: la nota [a] se ancla en «Ada» pero en realidad corresponde a la alternativa para «los hijos de Esaú», y la nota [b] está anclada en «Basemat» aunque comenta la repetición de «mujer de Esaú».'
  spanish_quality_summary: 'El español es generalmente claro y legible, con buen registro bíblico moderno. No obstante, «Estas son las genealogías de los hijos de Esaú» suena menos preciso que «Estos son los nombres de los hijos de Esaú». Además, conviene quitar las comas tras los nombres propios para un estilo genealógico más natural y coherente con el inglés auditado. También debe corregirse la inconsistencia ortográfica entre «Basemat» en las decisiones léxicas y «Basemat»/«Basemat[b]» en el texto: aquí se mantiene «Basemat» como forma española coherente.'
  glossary_alignment: 'No hay términos teológicos mayores en juego. Los nombres propios «Elifaz», «Reuel», «Ada» y «Basemat» son aceptables en español bíblico. La fórmula אֵשֶׁת עֵשָׂו se puede conservar bien como «mujer de Esaú», en línea con la rationale documentada de preservar la repetición. La principal desviación glosarial es semántica: שְׁמוֹת debe reflejar «nombres», no «genealogías».'
  issues:
  - severity: high
    issue: «genealogías» traduce de más el hebreo שְׁמוֹת
    rationale: El texto fuente dice literalmente «estos son los nombres de los hijos de Esaú». «Genealogías» interpreta la función del encabezado pero introduce un concepto diferente al sustantivo hebreo y al inglés auditado.
  - severity: medium
    issue: Los anclajes de las notas al pie no corresponden a su contenido
    rationale: La nota [a] explica una alternativa para «los hijos de Esaú», pero está colocada en «Ada». La nota [b] trata sobre la repetición de «mujer de Esaú», pero está colocada en «Basemat». Los marcadores deben ir en las palabras o frases pertinentes.
  - severity: low
    issue: Puntuación algo pesada en la lista genealógica
    rationale: Las comas tras «Elifaz» y «Reuel» no son necesarias y un estilo más directo («Elifaz hijo de Ada...; Reuel hijo de Basemat...») suena mejor en español bíblico moderno, además de corresponder al ajuste ya documentado en inglés.
  revised_spanish_text: 'Estos son los nombres de los hijos[a] de Esaú: Elifaz hijo de Ada, mujer de Esaú[b]; Reuel hijo de Basemat, mujer de Esaú[b].'
  revised_footnotes:
