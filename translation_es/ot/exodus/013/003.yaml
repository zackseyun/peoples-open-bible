revisions:
- from: 'Entonces Moisés dijo al pueblo[a]: «Recuerden este día en que salieron de Egipto, de la casa de esclavitud, porque Yahvé los sacó de allí[b] con mano fuerte; y no se comerá pan fermentado[c]».'
  to: 'Entonces Moisés dijo al pueblo: «Recuerden este día en que salieron de Egipto, de la casa de esclavitud, porque Yahvé los sacó de allí[a] con mano fuerte; y no se comerá nada fermentado[b]».'
  rationale: Se eliminó la nota [a] original por ser redundante e infundada, se reordenaron las notas para que los marcadores coincidan con anclajes reales, y se cambió «pan fermentado» a «nada fermentado» para reflejar mejor el alcance de חָמֵץ en español sin perder naturalidad.
