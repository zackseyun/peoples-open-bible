  chosen_reading: steadfast love
  alternative_readings:
  - covenant love
  - lovingkindness
  rationale: The term carries covenantal loyalty and mercy. 'Steadfast love' preserves both affection and durability without importing a narrower doctrinal formula. The covenantal nuance is reinforced by the following phrase 'my covenant of peace.'
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented exception)
- issue: Rendering of יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
