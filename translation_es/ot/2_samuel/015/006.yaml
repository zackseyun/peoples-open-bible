revisions:
- from: Absalón hizo esto a todo Israel que venía al rey para juicio[a], y Absalón robaba el corazón[b] de los hombres de Israel.
  to: Absalón hizo esto con todos los de Israel que venían al rey para juicio[a], y Absalón robó los corazones[b] de los hombres de Israel.
  rationale: Se ajustó la relativa para que el español represente naturalmente a las personas que acudían al rey; se cambió «robaba» por «robó» para reflejar mejor la secuencia narrativa; y se hizo distributivo «los corazones» por claridad idiomática y en continuidad con la decisión auditada del POB inglés. Se mantuvo «hombres de Israel» y la metáfora de «robar» por fidelidad léxica y teológica.
