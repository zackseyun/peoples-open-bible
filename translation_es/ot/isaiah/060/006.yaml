base_translation:
  language: en
  yaml_path: translation/ot/isaiah/060/006.yaml
  text: A multitude of camels will cover you[a], the young camels of Midian and Ephah; all of them will come from Sheba. They will carry gold and frankincense[b], and they will proclaim the praises of Yahweh.
  footnotes:
  - marker: a
    text: Or 'the dromedaries of Midian and Ephah.' The Hebrew term refers to young camels.
    reason: lexical_alternative
  - marker: b
    text: Or 'they will announce good news of the praises of the LORD.' The verb can carry the sense of heralding good news.
    reason: lexical_alternative
