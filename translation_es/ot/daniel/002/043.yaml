base_translation:
  language: en
  yaml_path: translation/ot/daniel/002/043.yaml
  text: As you saw the iron mixed with clay[a], they will mix with the seed of men, but they will not hold together, this one with that one[c][b], just as iron does not mix with clay pottery.
  footnotes:
  - marker: a
    text: Or 'with human seed'; many interpreters understand this as 'they will intermarry,' but the Aramaic is more literally 'they will mix themselves with the seed of man.'
    reason: lexical_alternative
  - marker: b
    text: Or 'one with another.'
    reason: lexical_alternative
  - marker: c
    text: The final term can also be rendered 'clay' or 'earthenware.'
    reason: lexical_alternative
