translation:
  language: es
  text: Los traeré a mi monte santo, y los alegraré en mi casa de oración; sus holocaustos y sus sacrificios serán aceptados sobre mi altar, porque mi casa será llamada casa de oración para todos los pueblos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para todas las naciones». El hebreo עַמִּים puede denotar pueblos o naciones; aquí se eligió «pueblos» para conservar el alcance inclusivo del contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַהֲבִיאוֹתִים
  english_pob_choice: I will bring them
  chosen_spanish: los traeré
  alternatives_spanish:
  - los haré venir
  - los llevaré
  lexicon: HALOT
  rationale: El hiphil de בוא expresa acción causativa de Dios sobre el movimiento del pueblo. «Los traeré» es natural en español y conserva la agencia divina sin recargar el matiz causativo.
- source_word: אֶל הַר קָדְשִׁי
  english_pob_choice: to my holy mountain
  chosen_spanish: a mi monte santo
  alternatives_spanish:
  - a mi montaña santa
  - a mi monte sagrado
  lexicon: HALOT
  rationale: «Monte santo» reproduce de modo directo la imaginería de Sión/templo y mantiene el sentido sacral de קֹדֶשׁ. «Monte» resulta más bíblico y idiomático que «montaña» en este contexto.
- source_word: וְשִׂמַּחְתִּים
  english_pob_choice: and I will make them glad
  chosen_spanish: y los alegraré
  alternatives_spanish:
  - y les daré alegría
  - y los haré regocijarse
  lexicon: HALOT
  rationale: El piel de שׂמח tiene fuerza causativa. «Los alegraré» comunica que Dios produce la alegría, con una formulación breve y clara en español.
- source_word: בְּבֵית תְּפִלָּתִי
  english_pob_choice: in my house of prayer
  chosen_spanish: en mi casa de oración
  alternatives_spanish:
  - en mi casa de oración y súplica
  - en mi casa de plegaria
  lexicon: HALOT
  rationale: La construcción hebrea caracteriza el templo como lugar de oración. «Casa de oración» es la traducción más fiel y transparente; evita ampliar el sentido a «culto» o «adoración».
- source_word: עוֹלֹתֵיהֶם
  english_pob_choice: their burnt offerings
  chosen_spanish: sus holocaustos
  alternatives_spanish:
  - sus ofrendas quemadas
  - sus sacrificios completos
  lexicon: HALOT
  rationale: En español bíblico, «holocausto» es el término técnico habitual para עוֹלָה y conserva la especificidad sacrificial que la POB en inglés expresa con «burnt offerings».
- source_word: וְזִבְחֵיהֶם
  english_pob_choice: and their sacrifices
  chosen_spanish: y sus sacrificios
  alternatives_spanish:
  - y sus ofrendas sacrificadas
  - y sus víctimas
  lexicon: HALOT
  rationale: זֶבַח es un término sacrificial amplio. «Sacrificios» mantiene esa amplitud y funciona bien en paralelo con «holocaustos».
- source_word: לְרָצוֹן
  english_pob_choice: will be accepted
  chosen_spanish: serán aceptados
  alternatives_spanish:
  - serán agradables
  - serán recibidos favorablemente
  lexicon: HALOT
  rationale: Con lenguaje sacrificial, רָצוֹן comunica aceptabilidad ante Dios. «Serán aceptados» preserva esa relación pasiva y cultual de forma natural en español.
- source_word: עַל מִזְבְּחִי
  english_pob_choice: on my altar
  chosen_spanish: sobre mi altar
  alternatives_spanish:
  - en mi altar
  - encima de mi altar
  lexicon: HALOT
  rationale: «Sobre mi altar» refleja bien עַל en el contexto de las ofrendas colocadas en el altar. Es claro y mantiene la imagen concreta.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Aquí introduce la razón de la aceptación y de la alegría. «Porque» expresa con claridad la explicación causal en español.
- source_word: בֵיתִי בֵּית תְּפִלָּה
  english_pob_choice: my house will be called a house of prayer
  chosen_spanish: mi casa será llamada casa de oración
  alternatives_spanish:
  - mi casa será llamada una casa de oración
  - mi casa será nombrada casa de oración
  lexicon: HALOT
  rationale: El hebreo repite «casa» para enfatizar. En español, la pasiva «será llamada casa de oración» conserva la declaración y la repetición semítica sin sonar forzada.
- source_word: יִקָּרֵא
  english_pob_choice: will be called
  chosen_spanish: será llamada
  alternatives_spanish:
  - será nombrada
  - será conocida como
  lexicon: HALOT
  rationale: El niphal de קרא aquí significa simplemente «ser llamada». La forma pasiva mantiene la solemnidad declarativa del texto.
- source_word: לְכָל הָעַמִּים
  english_pob_choice: for all peoples
  chosen_spanish: para todos los pueblos
  alternatives_spanish:
  - para todas las naciones
  - para todos los pueblos y naciones
  lexicon: HALOT
  rationale: «Pueblos» preserva el alcance inclusivo de עַמִּים sin restringirlo a estados modernos. «Para» reproduce el valor final/benefactivo de ל en este contexto.
theological_decisions:
- issue: Alcance universal de לְכָל הָעַמִּים
  english_pob_reading: for all peoples
  chosen_spanish_reading: para todos los pueblos
  alternative_spanish_readings:
  - para todas las naciones
  rationale: La profecía afirma la apertura del templo a la adoración de gente de todas las etnias y colectivos. «Pueblos» conserva mejor ese alcance humano-corporativo que «naciones», sin reducirlo a categorías políticas modernas.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior: la nota [a] ahora aparece anclada en el texto («monte santo[a]»). La redacción mantiene la equivalencia óptima y sigue de cerca el hebreo y el registro auditado en inglés.'
  spanish_consistency_notes:
  - «Yahvé» no aparece en este versículo; por eso no se requiere decisión sobre el tetragrámaton.
  - Se usó «holocaustos» como término técnico coherente con el lenguaje sacrificial bíblico y con la correspondencia de עוֹלָה.
  - Se mantuvo la distinción entre «casa de oración» y una formulación más amplia de culto para no diluir la imagen específica del texto.
  - «Pueblos» conserva el plural inclusivo de עַמִּים sin imponer una lectura nacionalista moderna.
