  text: וַ/יִּשְׁלְח֨וּ כָל הַ/שָּׂרִ֜ים אֶל בָּר֗וּךְ אֶת יְהוּדִ֡י בֶּן נְ֠תַנְיָהוּ בֶּן שֶׁלֶמְיָ֣הוּ בֶן כּוּשִׁי֮ לֵ/אמֹר֒ הַ/מְּגִלָּ֗ה אֲשֶׁ֨ר קָרָ֤אתָ בָּ/הּ֙ בְּ/אָזְנֵ֣י הָ/עָ֔ם קָחֶ֥/נָּה בְ/יָדְ/ךָ֖ וָ/לֵ֑ךְ וַ֠/יִּקַּח בָּר֨וּךְ בֶּן נֵרִיָּ֤הוּ אֶת הַ/מְּגִלָּה֙ בְּ/יָד֔/וֹ וַ/יָּבֹ֖א אֲלֵי/הֶֽם־־־־־־־־׃
