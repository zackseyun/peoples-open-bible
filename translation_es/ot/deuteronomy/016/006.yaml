translation:
  language: es
  text: sino solamente en el lugar que Yahvé tu Dios escogerá para hacer habitar allí su nombre[a]; allí sacrificarás la Pascua[b] por la tarde, al ponerse el sol, en el tiempo señalado de tu salida de Egipto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para que su nombre habite allí» o «para poner allí su nombre».
    reason: lexical_alternative
  - marker: b
    text: O «degollarás la Pascua».
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי אִם
  english_pob_choice: but only
  chosen_spanish: sino solamente
  alternatives_spanish:
  - pero solo
  - excepto que
  lexicon: HALOT
  rationale: La expresión introduce una restricción fuerte y exclusiva; en español, «sino solamente» conserva ese valor exceptivo con buena naturalidad.
- source_word: הַמָּקוֹם
  english_pob_choice: the place
  chosen_spanish: el lugar
  alternatives_spanish:
  - el sitio
  - la ubicación
  lexicon: HALOT
  rationale: «Lugar» es el equivalente más directo y natural para מָקוֹם en este contexto de santuario central.
- source_word: יִבְחַר
  english_pob_choice: will choose
  chosen_spanish: escogerá
  alternatives_spanish:
  - elegirá
  - seleccionará
  lexicon: HALOT
  rationale: El futuro legal/promisorio se expresa bien con «escogerá», manteniendo la elección divina futura y no un mero nombramiento abstracto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el estándar del proyecto para el nombre divino, preservando el Tetragrámaton como nombre propio y no como título.
- source_word: לְשַׁכֵּן שְׁמוֹ שָׁם
  english_pob_choice: for his name to dwell
  chosen_spanish: para hacer habitar allí su nombre
  alternatives_spanish:
  - para que su nombre habite allí
  - para poner allí su nombre
  lexicon: HALOT
  rationale: «Hacer habitar allí su nombre» conserva el valor idiomático de שׁכן y la tensión teológica del «nombre» como presencia/manifestación, sin reducirlo a una localización física simple.
- source_word: תִּזְבַּח
  english_pob_choice: you shall sacrifice
  chosen_spanish: sacrificarás
  alternatives_spanish:
  - degollarás
  - matarás en sacrificio
  lexicon: HALOT
  rationale: «Sacrificarás» comunica el sentido cultual de זבח mejor que «degollarás», que sería demasiado literal y menos claro en español.
- source_word: הַפֶּסַח
  english_pob_choice: the Passover
  chosen_spanish: el Pascua
  alternatives_spanish:
  - la Pascua
  - el sacrificio de la Pascua
  - el cordero pascual
  lexicon: HALOT
  rationale: Se opta por mantener el término festivo-cultual vinculado al rito de la Pascua. La forma natural en español es «la Pascua»; aquí el sintagma se integra con el verbo sacrificial del versículo.
- source_word: בָּעָרֶב
  english_pob_choice: in the evening
  chosen_spanish: por la tarde
  alternatives_spanish:
  - en la noche
  - al anochecer
  lexicon: HALOT
  rationale: «Por la tarde» es una solución idiomática amplia en español y puede abarcar el tramo vespertino indicado por el hebreo, sin volverlo demasiado técnico.
- source_word: כְּבֹא הַשֶּׁמֶשׁ
  english_pob_choice: at sunset
  chosen_spanish: al ponerse el sol
  alternatives_spanish:
  - al ocaso
  - a la puesta del sol
  lexicon: HALOT
  rationale: 'La imagen verbal hebrea se conserva con una frase española igualmente dinámica y transparente: «al ponerse el sol».'
- source_word: מוֹעֵד
  english_pob_choice: at the appointed time
  chosen_spanish: en el tiempo señalado
  alternatives_spanish:
  - en el tiempo fijado
  - en la fecha establecida
  lexicon: HALOT
  rationale: «Tiempo señalado» comunica la idea de ocasión/tiempo fijado por cita, manteniendo la fuerza temporal y cultual de מוֹעֵד.
- source_word: צֵאתְךָ מִמִּצְרַיִם
  english_pob_choice: of your coming out from Egypt
  chosen_spanish: de tu salida de Egipto
  alternatives_spanish:
  - de tu partida de Egipto
  - cuando saliste de Egipto
  lexicon: HALOT
  rationale: «Salida» reproduce bien el sustantivo verbal hebreo y su referencia al éxodo sin forzar una paráfrasis más amplia.
theological_decisions:
- issue: El «nombre» de Yahvé en el lugar escogido
  english_pob_reading: the place that Yahweh your God will choose for his name to dwell
  chosen_spanish_reading: el lugar que Yahvé tu Dios escogerá para hacer habitar allí su nombre
  alternative_spanish_readings:
  - el lugar que Yahvé tu Dios escogerá para que su nombre habite allí
  - el lugar que Yahvé tu Dios escogerá para poner allí su nombre
  rationale: La formulación preserva la teología de la centralización del culto sin colapsarla en una localización física de Dios. «Hacer habitar allí su nombre» mantiene la tensión entre presencia covenantal y trascendencia divina.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3; Contested terms table for יְהוָה'
- issue: Sentido cultual de הַפֶּסַח
  english_pob_reading: the Passover
  chosen_spanish_reading: la Pascua
  alternative_spanish_readings:
  - el sacrificio pascual
  - el cordero pascual
  rationale: En este versículo el objeto está en un contexto de sacrificio ritual. «La Pascua» conserva el nombre de la celebración y deja que el verbo «sacrificar» aporte el matiz sacrificial.
  doctrine_reference: Lexical/theological consistency with Passover terminology
translation_notes:
  revision_awareness: El texto inglés auditado pasó de «your coming out from Egypt» a «your departure from Egypt» para mayor naturalidad. La versión española sigue esa decisión con «tu salida de Egipto», que es igualmente natural y mantiene el vínculo literal con צֵאתְךָ. También se mantuvo la preferencia por Yahweh/Yahvé frente a sustitutos tradicionales.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה.
  - Se conserva el lenguaje de «nombre» sin reemplazarlo por una explicación interpretativa.
  - «Pascua» se mantiene como término festivo-cultual, con el verbo «sacrificar» para la dimensión ritual.
  - La combinación «por la tarde, al ponerse el sol» reproduce la doble referencia temporal del hebreo sin redundancia innecesaria.
