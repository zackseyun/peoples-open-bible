base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/028/002.yaml
  text: 'Son of man[a], say to the prince of Tyre, ‘Thus says the Lord GOD: Because your heart is proud, and you say, “I am a god; I sit in the seat of gods in the heart of the seas,” yet you are a man and not a god[b], though you set your heart like the heart of gods.”'
  footnotes:
  - marker: a
    text: Or, “I am God; I sit in the seat of God in the heart of the seas.” Hebrew אֵל / אֱלֹהִים here can be read in a singular sense.
    reason: alternative_reading
  - marker: b
    text: Or, “you set your heart like the heart of God.”
    reason: lexical_alternative
