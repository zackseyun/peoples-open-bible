  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. «Ley» está bien para νομίμου. La principal decisión léxica a ajustar es μιαινεῖς: «mancharás» preserva mejor en español bíblico neutral la idea de deshonrar/hacer impuro sin sonar tan material como «contaminarás» ni tan cultual-específico como «profanarás».'
