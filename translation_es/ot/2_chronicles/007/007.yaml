    reason: lexical_alternative
  - marker: c
    text: O «la grasa de los sacrificios de comunión».
    reason: lexical_alternative
  revision_rationale: 'Se corrige el aparato de notas para que siga la evidencia fuente y el rastro auditado del POB inglés: [b] ahora anota el modismo sacrificial de עָשָׂה y [c] la alternativa de חֶלְבֵי הַשְּׁלָמִים en su primera mención. También se ajusta מִנְחָה a «ofrenda de cereal» para alineación terminológica con ‘grain offering’, y se mejora la naturalidad de «partes grasas» a «porciones grasas».'
