    text: Or 'the Israelites' / 'the people of Israel.' The Hebrew reads literally 'the sons of Israel.'
    reason: lexical_alternative
  - marker: b
    text: Or 'by the hand of a man ready/designated for it.' The Hebrew expression for this man's role is difficult and may emphasize readiness, appointment, or suitability for the occasion.
    reason: lexical_alternative
