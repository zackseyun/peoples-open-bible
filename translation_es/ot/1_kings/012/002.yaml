    text: El hebreo dice simplemente «oyó» sin especificar el objeto; el contexto inmediato sugiere la noticia mencionada en la narración anterior.
    reason: lexical_alternative
  - marker: b
    text: El hebreo dice más literalmente «de delante de» o «de la presencia de» el rey Salomón; aquí se expresa de forma natural en español como huida del rey.
    reason: lexical_alternative
  revision_rationale: 'Se hicieron dos reparaciones menores para mejorar la fidelidad idiomática del español sin perder el sentido fuente ni el razonamiento documentado: ''oyó de ello'' se cambió a ''oyó de eso'', y la formulación demasiado calcada ''de delante del rey Salomón'' se suavizó en el texto principal, conservando su matiz en una nota.'
