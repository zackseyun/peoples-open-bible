translation:
  language: es
  text: Porque se quitó su ropa de viuda para la exaltación de los que sufrían en Israel,[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para la elevación de los que sufrían en Israel». La frase griega εἰς ὕψος está comprimida; «exaltación» conserva la idea de elevación, mientras que «elevación» refleja más de cerca la imagen literal.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξεδύσατο
  english_pob_choice: took off
  chosen_spanish: se quitó
  alternatives_spanish:
  - se despojó de
  - se desprendió de
  lexicon: BDAG
  rationale: El verbo medio expresa que ella misma se quitó una prenda; en español, «se quitó» conserva la acción concreta de desvestirse sin sonar artificial. «Se despojó de» sería más enfático, pero menos natural en este contexto.
- source_word: στολὴν
  english_pob_choice: clothing
  chosen_spanish: vestido
  alternatives_spanish:
  - ropa
  - vestidura
  - prenda
  lexicon: LSJ
  rationale: Aquí no se trata simplemente de ropa genérica, sino de la prenda asociada a su estado de viudez. «Vestido» comunica de forma natural una prenda distintiva, aunque «vestidura» también sería posible con un tono más formal.
- source_word: χηρεύσεως
  english_pob_choice: widow’s
  chosen_spanish: de viudez
  alternatives_spanish:
  - de viuda
  - de viudedad
  - de luto
  lexicon: LSJ
  rationale: El genitivo describe la condición de viudez que caracteriza la prenda. «De viudez» conserva con claridad el valor abstracto del sustantivo griego; «de viuda» sería más idiomático, pero menos preciso respecto de la cualidad o estado.
- source_word: εἰς ὕψος
  english_pob_choice: for the exaltation
  chosen_spanish: para la exaltación
  alternatives_spanish:
  - para el levantamiento
  - para la elevación
  - para el ensalzamiento
  lexicon: LSJ
  rationale: La revisión inglesa optó por «exaltation» para reflejar con mayor formalidad εἰς ὕψος. En español, «exaltación» mantiene esa elevación metafórica y su tono elevado; «levantamiento» preservaría más la imagen física, pero sonaría menos acorde al registro del pasaje.
- source_word: τῶν πονούντων
  english_pob_choice: those who were afflicted
  chosen_spanish: los que sufrían
  alternatives_spanish:
  - los afligidos
  - los que padecían
  - los que estaban afligidos
  lexicon: BDAG
  rationale: El verbo griego puede abarcar sufrimiento, aflicción o penuria. «Los que sufrían» es claro y suficientemente amplio; «afligidos» es más compacto, pero puede sonar más interpretativo en español.
- source_word: ἐν Ἰσραήλ
  english_pob_choice: in Israel
  chosen_spanish: en Israel
  alternatives_spanish:
  - entre Israel
  - dentro de Israel
  lexicon: BDAG
  rationale: La expresión es locativa y corporativa; «en Israel» es la equivalencia directa y natural en español.
translation_notes:
  revision_awareness: El texto español sigue la decisión revisada de la POB inglesa de traducir εἰς ὕψος con un término más formal que «lifting up», manteniendo a la vez la imagen de elevación. También preserva la referencia concreta a la prenda de viudez y el alcance amplio de τῶν πονούντων.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se evitó «Cristo/Mesías» porque no aparece en el pasaje.
  - Se eligió «sufrían» para τῶν πονούντων por ser amplio y natural, sin reducirlo solo a trabajo o dolor físico.
  - La puntuación y el orden favorecen una lectura pública fluida sin añadir contenido ajeno al griego.
