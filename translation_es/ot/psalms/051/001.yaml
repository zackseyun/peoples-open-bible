lexical_decisions:
- source_word: לַמְנַצֵּחַ
  english_pob_choice: For the choirmaster
  chosen_spanish: Para el director[a]
  alternatives_spanish:
  - Para el choirmaster
  - Al director de música
  - Para el maestro de coro
  lexicon: HALOT
  rationale: El término encabeza superscripciones de salmos y señala al responsable musical. En español, "director" comunica con naturalidad la función de guía u organizador sin introducir una lectura más técnica de la necesaria. Se conserva el matiz de destinatario con "Para", equivalente funcional de la ל prefijada.
- source_word: מִזְמוֹר
  english_pob_choice: A psalm
  chosen_spanish: Salmo
  alternatives_spanish:
  - Un salmo
  - Canción
  - Melodía
  lexicon: HALOT
  rationale: '"Salmo" es el género reconocido en español y refleja bien el valor titular del sustantivo hebreo. En una superscripción breve, el artículo puede omitirse para fluidez, sin perder el sentido genérico.'
- source_word: לְדָוִד
  english_pob_choice: of David
  chosen_spanish: de David[b]
  alternatives_spanish:
  - por David
  - para David
  - perteneciente a David
  lexicon: HALOT
  rationale: La preposición ל con un nombre propio en encabezamientos puede indicar autoría, asociación o dedicación. "De David" conserva esa amplitud semántica sin resolverla de manera indebida. La nota explica la tensión interpretativa que el hebreo permite.
theological_decisions:
- issue: Relación exacta de David con el salmo en la superscripción
  english_pob_reading: of David
  chosen_spanish_reading: de David
  alternative_spanish_readings:
  - por David
  - para David
  rationale: El hebreo no obliga a escoger entre autoría, asociación o dedicación. Siguiendo la lectura del POB inglés, la traducción mantiene la ambigüedad con una forma española igualmente amplia. No se fuerza una afirmación doctrinal o histórica más precisa de la que el texto exige.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: El pasaje no presenta revisiones textuales ni variantes relevantes en el paquete fuente; se sigue el WLC y el audit trail inglés con plena concordancia.
  spanish_consistency_notes:
  - Se usa «David» en forma estándar de nombre propio bíblico.
  - Se prefiere «director» sobre «maestro de coro» por naturalidad en español, sin perder la función musical del encabezamiento.
  - Se mantiene la brevedad de una superscripción poética y se evita añadir verbos o artículos innecesarios.
