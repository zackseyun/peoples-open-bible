    reason: lexical_alternative
  - marker: b
    text: O «hasta que sea benigno con nosotros» o «hasta que tenga misericordia de nosotros». El hebreo de חנן admite el matiz de favor/gracia además de misericordia.
    reason: alternative_reading
  revision_rationale: 'Se ajusta el texto principal para reflejar mejor las decisiones auditadas del POB: «siervos/sierva» en vez de «esclavos/esclava» en este contexto comparativo, y «hasta que nos muestre favor» como equivalente principal de חנן, dejando «misericordia» en nota. También se mejora la naturalidad del español con «están puestos en la mano».'
