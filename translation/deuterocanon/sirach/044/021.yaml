  chosen_reading: that nations would be blessed in his offspring
  alternative_readings:
  - that he would bless nations through his offspring
  rationale: The Hebrew infinitive construction could be rendered more actively, but the Greek parallel explicitly supports a passive sense. The passive also preserves the traditional covenantal formulation without forcing a narrower interpretation of agency.
  doctrine_reference: Preserve theological tension rather than resolve it.
