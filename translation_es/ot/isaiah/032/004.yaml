translation:
  language: es
  text: El corazón de los precipitados entenderá el conocimiento[a], y la lengua de los tartamudos se apresurará a hablar claramente[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'los apresurados' en vez de 'los precipitados'. El hebreo describe a personas impulsivas o rápidas para juzgar.
    reason: lexical_alternative
  - marker: b
    text: O 'será pronta para hablar con claridad' o 'hablar distintamente'.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְבַב
  english_pob_choice: heart
  chosen_spanish: corazón
  alternatives_spanish:
  - mente
  - corazón
  lexicon: HALOT
  rationale: La palabra hebrea לֵבָב/לֵב puede referirse al centro interior del pensamiento y del entendimiento, no solo a la emoción. En español, 'corazón' conserva ese antropologismo bíblico y permite que el verbo 'entenderá' exprese el sentido cognitivo del contexto.
- source_word: נִמְהָרִים
  english_pob_choice: the hasty
  chosen_spanish: los apresurados
  alternatives_spanish:
  - los precipitados
  - los impulsivos
  - los apresurados
  lexicon: HALOT
  rationale: El adjetivo describe a quienes son rápidos, impulsivos o precipitados. 'Apresurados' mantiene la idea de prontitud y funciona bien como sustantivo plural en español, sin cargar demasiado hacia una sola matiz interpretativa.
- source_word: יָבִין
  english_pob_choice: will understand
  chosen_spanish: entenderá
  alternatives_spanish:
  - discernirá
  - comprenderá
  lexicon: HALOT
  rationale: El verbo בין significa entender o discernir. 'Entenderá' es la opción más directa y natural en español, y encaja con el paralelismo del verso.
- source_word: לָדַעַת
  english_pob_choice: knowledge
  chosen_spanish: conocimiento
  alternatives_spanish:
  - saber
  - entendimiento
  lexicon: HALOT
  rationale: Aunque formalmente es un infinitivo ('conocer'), aquí funciona como complemento del entendimiento. 'Conocimiento' refleja bien la fuerza cognitiva del hebreo y mantiene la fluidez del español.
- source_word: לְשׁוֹן
  english_pob_choice: tongue
  chosen_spanish: lengua
  alternatives_spanish:
  - lengua
  - habla
  - lenguaje
  lexicon: HALOT
  rationale: '''Lengua'' es el equivalente literal y conserva el paralelismo con ''corazón''. También introduce de forma natural la cláusula sobre el habla.'
- source_word: עִלְּגִים
  english_pob_choice: stammerers
  chosen_spanish: los tartamudos
  alternatives_spanish:
  - los que tartamudean
  - los balbucientes
  lexicon: HALOT
  rationale: El término designa a quienes hablan con dificultad o de manera entrecortada. 'Tartamudos' comunica ese sentido con claridad en español y mantiene el valor concreto de la imagen.
- source_word: תְּמַהֵר
  english_pob_choice: will hasten
  chosen_spanish: se apresurará
  alternatives_spanish:
  - se apresurará
  - se dará prisa
  - se apurará
  lexicon: HALOT
  rationale: El verbo מהר en piel expresa prontitud. 'Se apresurará' sigue de cerca la relación léxica con 'apresurados' y conserva el tono formal del verso, acorde con la revisión inglesa que prefirió 'hasten' sobre 'hurry'.
- source_word: לְדַבֵּר
  english_pob_choice: to speak
  chosen_spanish: a hablar
  alternatives_spanish:
  - a hablar
  - a decir
  lexicon: HALOT
  rationale: דבר en este infinitivo se traduce de manera estándar como 'hablar'. La preposición 'a' expresa naturalmente la finalidad del verbo precedente en español.
- source_word: צָחוֹת
  english_pob_choice: clearly
  chosen_spanish: claramente
  alternatives_spanish:
  - con claridad
  - distintamente
  - claramente
  lexicon: HALOT
  rationale: El término comunica claridad o distinción en el habla. 'Claramente' es la adverbial más natural en español moderno y corresponde bien al contraste con la tartamudez.
translation_notes:
  revision_awareness: La versión inglesa auditada mantuvo 'the hasty' y, tras revisión, prefirió 'will hasten' por un registro más formal. La redacción española refleja esa misma decisión de registro con 'apresurados' y 'se apresurará', sin perder la tensión lexical del hebreo.
  spanish_consistency_notes:
  - He usado 'corazón' para לְבַב conforme al antropologismo bíblico usual en la serie.
  - He preferido 'conocimiento' para לָדַעַת como complemento cognitivo natural en español.
  - He mantenido 'lengua' para לְשׁוֹן por paralelismo poético con 'corazón'.
  - He elegido 'claramente' para צָחוֹת por ser la forma adverbial más natural y fiel al sentido de habla distinta.
