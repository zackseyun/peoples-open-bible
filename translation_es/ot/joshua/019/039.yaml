    text: Or 'This is the inheritance ...' The Hebrew demonstrative with nominal clause can be rendered in either present or past tense in English; the past fits the retrospective summary after the allotment list.
    reason: lexical_alternative
  - marker: b
    text: Lit. 'the sons of Naphtali.' This Hebrew tribal expression denotes the descendants/tribal members of Naphtali.
    reason: lexical_alternative
