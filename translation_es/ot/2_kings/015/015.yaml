  text: Now the rest of the acts of Shallum[a], and the conspiracy that he conspired—behold[c][b], they are written in the Book of the Chronicles of the Kings of Israel.
  footnotes:
  - marker: a
    text: Or 'and his plot that he plotted.' The Hebrew uses a cognate noun-verb construction for emphasis.
    reason: lexical_alternative
  - marker: b
    text: Or 'behold, they are written'; the expression is a formulaic pointer to the royal records.
    reason: lexical_alternative
  - marker: c
    text: That is, the official royal annals/source record cited throughout Kings.
    reason: cultural_note
