translation:
  language: es
  text: El pilar de nube de día y el pilar de fuego de noche no se apartaba de delante del pueblo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «no se movía de delante del pueblo». El verbo hebreo subraya que los pilares permanecían continuamente presentes.
    reason: lexical_alternative
lexical_decisions:
- source_word: יָמִישׁ
  english_pob_choice: did not depart
  chosen_spanish: no se apartaba
  alternatives_spanish:
  - no se retiraba
  - no se alejaba
  - no dejaba de estar
  lexicon: HALOT
  rationale: El verbo expresa el apartarse o moverse lejos de una posición. En español, «no se apartaba» comunica bien la permanencia continua de los pilares sin volver la frase pesada. El imperfecto también refleja la continuidad del hebreo.
- source_word: עַמּוּד
  english_pob_choice: pillar
  chosen_spanish: columna
  alternatives_spanish:
  - pilar
  lexicon: HALOT
  rationale: Aunque «pilar» es posible, «columna» resulta más natural en español para describir esta figura visible y mantiene la idea de una estructura vertical. El contexto narrativo permite esta equivalencia sin perder la imagen.
- source_word: הֶעָנָן
  english_pob_choice: cloud
  chosen_spanish: nube
  alternatives_spanish:
  - nube de nube
  - la nube
  lexicon: HALOT
  rationale: En español, la expresión estable y clara para עָנָן en este contexto es «nube». Se conserva la imagen concreta del fenómeno guía; el artículo se integra naturalmente en la frase.
- source_word: יוֹמָם
  english_pob_choice: by day
  chosen_spanish: durante el día
  alternatives_spanish:
  - de día
  - por el día
  lexicon: HALOT
  rationale: Es una marca temporal adverbial. «Durante el día» expresa bien el contraste con «durante la noche» y suena natural en español bíblico contemporáneo.
- source_word: וְעַמּוּד הָאֵשׁ
  english_pob_choice: and the pillar of fire
  chosen_spanish: y la columna de fuego
  alternatives_spanish:
  - y el pilar de fuego
  lexicon: HALOT
  rationale: Se mantiene el paralelismo con la primera mitad del versículo y la imagen concreta de fuego. «Columna» da unidad estilística con la primera expresión.
- source_word: לָיְלָה
  english_pob_choice: by night
  chosen_spanish: durante la noche
  alternatives_spanish:
  - de noche
  - por la noche
  lexicon: HALOT
  rationale: La forma adverbial temporal pide un equivalente que conserve el paralelo con יוֹמָם. «Durante la noche» es claro y natural en español.
- source_word: לִפְנֵי
  english_pob_choice: from before
  chosen_spanish: de delante de
  alternatives_spanish:
  - de la presencia de
  - ante
  lexicon: HALOT
  rationale: Con el verbo de apartarse, la preposición indica movimiento desde una posición frontal. «De delante de» conserva esa relación espacial con suficiente precisión y sin suavizarla demasiado.
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - el pueblo de Israel
  lexicon: HALOT
  rationale: En este contexto colectivo e identificable, «el pueblo» es una forma natural y digna en español para ישראל como comunidad. Evita la ambigüedad de «la gente» y no añade una especificación que el hebreo no da aquí.
translation_notes:
  revision_awareness: El texto base en inglés dice «did not depart from before the people» y la nota permite también «did not move away from before the people». La versión española conserva esa tensión semántica con «no se apartaba de delante del pueblo», manteniendo la idea de presencia continua.
  spanish_consistency_notes:
  - Se mantiene la imagen paralela «columna de nube / columna de fuego» para reforzar la correspondencia hebrea.
  - Se evita «SEÑOR» o cualquier sustitución teológica no presente en este versículo.
  - El tiempo verbal imperfecto («no se apartaba») refleja continuidad más que una sola acción puntual.
  - La nota al pie preserva la alternativa verbal del audit trail inglés sin duplicar significados innecesariamente.
