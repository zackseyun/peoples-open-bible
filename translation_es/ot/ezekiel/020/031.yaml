translation:
  language: es
  text: Y cuando presentan sus dones[a], cuando hacen pasar a sus hijos por el fuego[b], se contaminan con todos sus ídolos hasta el día de hoy. ¿Y he de ser consultado por ustedes, casa de Israel? Vivo yo, declara el Señor Dios, Yahvé[c], no seré consultado por ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'ofrendas' para 'dones'.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: ''hacer pasar a sus hijos por el fuego'', un modismo para el sacrificio infantil en culto idólatra.'
    reason: cultural_note
  - marker: c
    text: 'El hebreo usa aquí una fórmula de juramento con ''si''; en contexto expresa una negación enfática: ''no seré consultado por ustedes''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבִשְׂאֵת
  english_pob_choice: when you present
  chosen_spanish: cuando presentan
  alternatives_spanish:
  - y al presentar
  - y cuando ofrecen
  lexicon: HALOT
  rationale: נשׂא con מַתְּנֹתֵיכֶם funciona idiomáticamente como ‘presentar/ofrecer’; ‘cuando presentan’ conserva la acción cultual sin sonar mecánico en español.
- source_word: מַתְּנֹתֵיכֶם
  english_pob_choice: your gifts
  chosen_spanish: sus regalos
  alternatives_spanish:
  - sus dones
  - sus ofrendas
  lexicon: HALOT
  rationale: ‘Regalos’ refleja el sentido léxico básico de מתנות y permite que el contexto sacrificial determine la carga cultual; ‘ofrendas’ sería más interpretativo.
- source_word: בְּהַעֲבִיר בְּנֵיכֶם בָּאֵשׁ
  english_pob_choice: when you make your sons pass through the fire
  chosen_spanish: cuando hacen pasar a sus hijos por el fuego
  alternatives_spanish:
  - cuando hacen pasar a sus hijos por el fuego
  - cuando inmolan a sus hijos en el fuego
  lexicon: HALOT
  rationale: Se mantiene la forma idiomática hebrea ‘hacer pasar por el fuego’, que alude al sacrificio infantil. En español ‘hijos’ evita una redundancia extraña con ‘sus hijos’ en el flujo de la frase y sigue siendo fiel al paralelismo del hebreo.
- source_word: אַתֶּם נִטְמְאִים
  english_pob_choice: you defile yourselves
  chosen_spanish: se contaminan
  alternatives_spanish:
  - se definen
  - se vuelven impuros
  lexicon: HALOT
  rationale: El nifal expresa quedar contaminados/impurificados por sus actos; ‘se contaminan’ comunica tanto el resultado como la responsabilidad en español natural. ‘Defilan’ suena más marcado litúrgicamente, pero menos idiomático aquí.
- source_word: לְכָל גִּלּוּלֵיכֶם
  english_pob_choice: with all your idols
  chosen_spanish: con todos sus ídolos
  alternatives_spanish:
  - por todos sus ídolos
  - con todos sus ídolos repugnantes
  lexicon: HALOT
  rationale: גִּלּוּלִים es un término despectivo para ídolos; ‘ídolos’ mantiene el sentido y la dureza del contexto, mientras que ‘con’ refleja el medio/asociación del verbo previo sin sobretraducción.
- source_word: עַד הַיּוֹם
  english_pob_choice: to this day
  chosen_spanish: hasta el día de hoy
  alternatives_spanish:
  - hasta hoy
  - hasta este día
  lexicon: HALOT
  rationale: Equivale naturalmente al hebreo idiomático y mantiene la continuidad temporal con el momento profético.
- source_word: וַאֲנִי אִדָּרֵשׁ לָכֶם
  english_pob_choice: And shall I be inquired of by you
  chosen_spanish: ¿Y he de ser consultado por ustedes?
  alternatives_spanish:
  - ¿Y se me ha de consultar por ustedes?
  - ¿Y he de dejarme consultar por ustedes?
  lexicon: HALOT
  rationale: ‘Ser consultado’/‘consultar’ comunica דרשׁ en el sentido de buscar dirección divina. La forma interrogativa retórica conserva el tono de reproche y anticipa la negación enfática final.
- source_word: בֵּית יִשְׂרָאֵל
  english_pob_choice: O house of Israel
  chosen_spanish: casa de Israel
  alternatives_spanish:
  - casa de Israel
  - oh casa de Israel
  lexicon: HALOT
  rationale: Se mantiene la vocación profética sin añadir una interjección innecesaria; el contexto interrogativo ya marca el llamado.
- source_word: חַי אָנִי
  english_pob_choice: As I live
  chosen_spanish: Vivo yo
  alternatives_spanish:
  - Por mi vida
  - Vivo yo
  lexicon: HALOT
  rationale: Fórmula de juramento divina. ‘Vivo yo’ es solemne, breve y fiel al hebreo, aunque ‘Por mi vida’ sería una equivalencia idiomática posible.
- source_word: נְאֻם אֲדֹנָי יְהוִה
  english_pob_choice: declares the Lord GOD
  chosen_spanish: declara el Señor Yahvé
  alternatives_spanish:
  - declara el Señor DIOS
  - oráculo del Señor Yahvé
  lexicon: HALOT
  rationale: Se traduce יהוה como ‘Yahvé’ conforme al criterio del proyecto, y אֲדֹנָי como ‘Señor’. ‘Declara’ reproduce נְאֻם con naturalidad profética.
- source_word: אִם אִדָּרֵשׁ לָכֶם
  english_pob_choice: I will not be inquired of by you
  chosen_spanish: no seré consultado por ustedes
  alternatives_spanish:
  - ciertamente no seré consultado por ustedes
  - si soy consultado por ustedes
  lexicon: HALOT
  rationale: La fórmula juramentaria con אִם expresa una negación enfática; en español se vierte como negación directa para no oscurecer la fuerza idiomática del hebreo.
theological_decisions:
- issue: Representación del nombre divino en אֲדֹנָי יְהוִה
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor DIOS
  - el Señor Yahweh
  rationale: El texto hebreo conserva explícitamente el Tetragrámaton. La línea del proyecto exige ‘Yahvé’ en lugar del ocultamiento con mayúsculas; se mantiene ‘Señor’ para אֲדֹנָי y ‘Yahvé’ para יְהוִה.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sentido del acto infantil ‘hacer pasar por el fuego’
  english_pob_reading: when you make your sons pass through the fire
  chosen_spanish_reading: cuando hacen pasar a sus hijos por el fuego
  alternative_spanish_readings:
  - cuando hacen pasar a sus hijos por el fuego
  - cuando sacrifican a sus hijos en el fuego
  rationale: Se preserva la idiomática hebrea sin perder la referencia a sacrificio infantil idolátrico. En este verso la tradición auditada del POB ya explicó la alusión mediante nota, por lo que el texto principal puede permanecer sobrio.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #4: Gender-accurate over gender-neutral'
- issue: Negación enfática de la consulta divina en la fórmula de juramento
  english_pob_reading: I will not be inquired of by you
  chosen_spanish_reading: no seré consultado por ustedes
  alternative_spanish_readings:
  - ciertamente no seré consultado por ustedes
  - no permitiré que me consulten
  rationale: El hebreo usa una forma elíptica con ‘si’ que funciona como juramento de negación. La versión española opta por la negación directa, conservando el peso profético sin introducir una construcción artificial.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence'
translation_notes:
  revision_awareness: El texto inglés auditado ya estaba estable y sin cambios en la última pasada; esta versión española sigue ese mismo criterio, conservando la nota cultural sobre el sacrificio infantil y la fuerza juramentaria final, mientras adapta el registro al español bíblico contemporáneo.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ para יְהוִה, conforme a la terminología del proyecto.
  - Se conserva el paralelismo de la pregunta retórica y la negación final.
  - ‘Ídolos’ traduce גִּלּוּלִים con el matiz peyorativo adecuado; no se suaviza a ‘imágenes’ ni se liturgiza a ‘abominaciones’.
  - La formulación ‘hacer pasar por el fuego’ preserva la alusión idiomática sin explicarla dentro del cuerpo del texto.
