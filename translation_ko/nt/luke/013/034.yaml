  text: Ἰερουσαλὴμ Ἰερουσαλήμ, ἡ ἀποκτείνουσα τοὺς προφήτας καὶ λιθοβολοῦσα τοὺς ἀπεσταλμένους πρὸς αὐτήν— ποσάκις ἠθέλησα ἐπισυνάξαι τὰ τέκνα σου ὃν τρόπον ὄρνις τὴν ἑαυτῆς νοσσιὰν ὑπὸ τὰς πτέρυγας, καὶ οὐκ ἠθελήσατε.
base_translation:
  language: en
  yaml_path: translation/nt/luke/013/034.yaml
  text: 'Jerusalem[a], Jerusalem, the one killing the prophets and stoning those sent to her—how often I wanted to gather your children the way a hen gathers her brood under her wings[b], and you were not willing.'
  footnotes:
  - marker: a
    text: 'Or ''who kills ... and stones.'' The Greek uses present participles, portraying Jerusalem by its characteristic treatment of God''s messengers.'
    reason: lexical_alternative
  - marker: b
    text: 'Or ''a bird ... her young.'' The Greek ὄρνις can be more general than ''hen,'' but the maternal image of gathering young under wings makes ''hen'' the most natural rendering here.'
    reason: lexical_alternative
translation:
  language: ko
  text: '「예루살렘아, 예루살렘아, 선지자들을 죽이고 네게 보내심을 받은 자들을 돌로 치는 자여! 암탉이 자기 새끼들을 날개 아래 모으는 것같이 내가 네 자녀를 모으려 한 것이 몇 번이더냐. 그러나 너희가 원치 아니하였다.」'
  philosophy: optimal-equivalence
