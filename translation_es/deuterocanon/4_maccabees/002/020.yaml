translation:
  language: es
  text: Porque, si la razón no pudiera dominar las pasiones, no habría hablado así.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: εἰ μὴ γὰρ
  english_pob_choice: For if ... not
  chosen_spanish: Porque, si ... no
  alternatives_spanish:
  - Pues si ... no
  - Porque, a menos que
  lexicon: LSJ
  rationale: Conserva el valor explicativo de γάρ y la estructura condicional de εἰ μή en un español natural. «Porque, si... no» refleja el enlace argumentativo sin introducir una lectura demasiado idiomática como «a menos que».
- source_word: ἐδύνατο
  english_pob_choice: were able
  chosen_spanish: pudiera
  alternatives_spanish:
  - fuera capaz
  - tuviera poder
  lexicon: LSJ
  rationale: El imperfecto de δύναμαι expresa capacidad en una condición contrafáctica; «pudiera» suena natural en español y preserva la idea de posibilidad/capacidad.
- source_word: τῶν θυμῶν
  english_pob_choice: the passions
  chosen_spanish: las pasiones
  alternatives_spanish:
  - los impulsos
  - las emociones
  - los arrebatos
  lexicon: LSJ
  rationale: En el argumento filosófico de 4 Macabeos, θυμοί no se limita a «ira» sino al campo de los afectos y drives pasionales. «Pasiones» mantiene ese alcance amplio y la terminología conceptual del pasaje.
- source_word: ὁ λογισμός
  english_pob_choice: reason
  chosen_spanish: la razón
  alternatives_spanish:
  - el razonamiento
  - la mente
  - el pensamiento racional
  lexicon: LSJ
  rationale: λoγισμός funciona aquí como facultad racional. «La razón» es la correspondencia más clara y natural en español, sin perder la carga filosófica del término.
- source_word: κρατεῖν
  english_pob_choice: to master
  chosen_spanish: dominar
  alternatives_spanish:
  - controlar
  - vencer
  - señorear sobre
  lexicon: LSJ
  rationale: κρατέω expresa ejercer dominio sobre algo. «Dominar» comunica esa superioridad activa con una fuerza similar a «master» en inglés.
- source_word: οὐκ ἂν εἶπεν
  english_pob_choice: he would not have spoken
  chosen_spanish: no habría hablado
  alternatives_spanish:
  - no habría dicho
  - no hablaría
  lexicon: LSJ
  rationale: La construcción con ἄν y aoristo expresa resultado contrafáctico; «no habría hablado» preserva esa modalidad y evita suavizar el sentido a un simple futuro hipotético.
- source_word: οὕτως
  english_pob_choice: in this way
  chosen_spanish: así
  alternatives_spanish:
  - de esta manera
  - de ese modo
  lexicon: LSJ
  rationale: Retoma la manera del dicho precedente. «Así» es breve, natural y suficientemente preciso en español.
theological_decisions:
- issue: λoγισμός como facultad racional en el marco antropológico-filosófico del libro
  english_pob_reading: reason
  chosen_spanish_reading: la razón
  alternative_spanish_readings:
  - el razonamiento
  - la facultad racional
  rationale: El versículo participa en la tesis de 4 Macabeos sobre la supremacía de la razón sobre las pasiones. «La razón» comunica esa idea central sin tecnicismos innecesarios.
  doctrine_reference: DOCTRINE.md §Translation philosophy 5
- issue: θυμοί como conjunto de pasiones y no solo ira
  english_pob_reading: the passions
  chosen_spanish_reading: las pasiones
  alternative_spanish_readings:
  - los impulsos
  - las iras
  rationale: Aunque θυμός puede significar «ira», aquí el plural en contexto filosófico apunta a fuerzas afectivas más amplias. «Las pasiones» preserva esa amplitud semántica y evita restringir indebidamente el pasaje.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1
translation_notes:
  revision_awareness: El texto inglés reciente permanece sin cambios tras la última revisión; la concordancia general con el griego es alta, con observaciones menores sobre matiz. La versión española sigue la lectura contrafáctica y la terminología filosófica ya fijadas por el audit trail inglés.
  spanish_consistency_notes:
  - Se usa «razón» de forma consistente para λογισμός en clave filosófica.
  - Se usa «pasiones» para θυμοί, evitando reducirlo a «ira».
  - Se mantiene un registro digno y moderno, apto para lectura eclesial amplia.
  - No se añaden notas textuales porque el versículo no presenta variantes relevantes en el paquete provisto.
