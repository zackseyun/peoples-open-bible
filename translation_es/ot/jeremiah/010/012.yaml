base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/010/012.yaml
  text: He made the earth by his power[a]; he established the world by his wisdom[b], and by his understanding he stretched out the heavens.
  footnotes:
  - marker: a
    text: Or 'He makes the earth by his power'; the Hebrew opens with a participle ('making/maker of'), which can be rendered with a present-like force, but here it is expressed as a past finite verb for natural English parallelism.
    reason: lexical_alternative
  - marker: b
    text: '''World'' translates Hebrew tevel, often referring to the inhabited or ordered world.'
    reason: lexical_alternative
