revisions:
- from: Y ahora[a], he aquí, Yahvé ha puesto un espíritu de mentira en la boca de estos profetas tuyos[b], y Yahvé ha hablado desastre contra ti.
  to: Y ahora, he aquí, Yahvé ha puesto un espíritu de mentira[a] en la boca de estos profetas tuyos, y Yahvé ha anunciado desastre[b] contra ti.
  rationale: Se corrigió una construcción poco idiomática en español («ha hablado desastre») por «ha anunciado desastre», que conserva el sentido profético-judicial del hebreo y la decisión teológica del POB sobre רָעָה. También se reubicó la nota [a] para que ancle correctamente en «espíritu de mentira».
