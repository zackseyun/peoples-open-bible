translation:
  language: es
  text: 'Entonces Betsabé se inclinó con el rostro en tierra y se postró ante el rey[a], y dijo: «¡Viva mi señor el rey David por siempre!»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más idiomática: «¡Larga vida a mi señor el rey David!»'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּקֹּד
  english_pob_choice: bowed
  chosen_spanish: se inclinó
  alternatives_spanish:
  - se inclinó profundamente
  - se postró
  lexicon: HALOT
  rationale: קָדַד expresa inclinarse o doblarse en señal de reverencia. En español, «se inclinó» comunica bien el gesto sin duplicar la intensidad del verbo siguiente.
- source_word: בַּת שֶׁבַע אַפַּיִם אֶרֶץ
  english_pob_choice: with her face to the ground
  chosen_spanish: rostro en tierra
  alternatives_spanish:
  - con el rostro en tierra
  - con la cara en tierra
  lexicon: HALOT
  rationale: El hebreo es un modismo corporal de máxima reverencia. «Rostro en tierra» conserva la imagen idiomática de manera natural y breve en español, aunque la variante con artículo puede usarse según el registro.
- source_word: וַתִּשְׁתַּחוּ
  english_pob_choice: prostrated herself
  chosen_spanish: se postró
  alternatives_spanish:
  - se inclinó ante
  - hizo reverencia
  lexicon: HALOT
  rationale: שׁחה aquí indica postración o reverencia extrema. «Se postró» mantiene la fuerza del verbo y distingue este acto del anterior.
- source_word: לַמֶּלֶךְ
  english_pob_choice: before the king
  chosen_spanish: ante el rey
  alternatives_spanish:
  - delante del rey
  - al rey
  lexicon: HALOT
  rationale: Aunque la preposición hebrea puede ser «a», en español el contexto de homenaje se expresa mejor con «ante el rey».
- source_word: יְחִי
  english_pob_choice: May ... live
  chosen_spanish: ¡Viva!
  alternatives_spanish:
  - ¡Que viva!
  - ¡Larga vida a!
  lexicon: HALOT
  rationale: El yiqtol/jusivo funciona como aclamación o deseo. «¡Viva!» reproduce con precisión la fórmula de viva real en español.
- source_word: אֲדֹנִי
  english_pob_choice: my lord
  chosen_spanish: mi señor
  alternatives_spanish:
  - mi señorío
  - mi amo
  lexicon: HALOT
  rationale: En el discurso cortesano del pasaje, אֲדֹנִי es un título de respeto. «Mi señor» es el equivalente natural en español y conserva la deferencia.
- source_word: הַמֶּלֶךְ דָּוִד
  english_pob_choice: King David
  chosen_spanish: el rey David
  alternatives_spanish:
  - el rey, David
  - David el rey
  lexicon: HALOT
  rationale: En español, el orden «el rey David» es claro y digno; además mantiene ambos elementos sin una paráfrasis innecesaria.
- source_word: לְעֹלָם
  english_pob_choice: forever
  chosen_spanish: por siempre
  alternatives_spanish:
  - para siempre
  - eternamente
  lexicon: HALOT
  rationale: עוֹלָם aquí expresa duración indefinida en una aclamación real. «Por siempre» es natural en español y preserva el valor de permanencia del hebreo.
theological_decisions:
- issue: Aclamación real y alcance de לְעֹלָם
  english_pob_reading: Long live ... forever / May ... live forever
  chosen_spanish_reading: ¡Viva ... por siempre!
  alternative_spanish_readings:
  - ¡Que viva ... para siempre!
  - ¡Larga vida ... por siempre!
  rationale: 'No hay una tensión doctrinal, pero sí una decisión de registro: el hebreo es una fórmula de deseo/aclamación, no una afirmación metafísica sobre inmortalidad. «¡Viva ... por siempre!» reproduce esa función performativa en español.'
  doctrine_reference: Uso pragmático del jussivo en fórmulas de aclamación real; cf. 1 Reyes 1:25, 34.
translation_notes:
  revision_awareness: Coincide con el paquete fuente y el audit trail inglés en la estructura del gesto de reverencia, la fórmula de aclamación y el tratamiento cortesano. Se optó por una solución española natural que conserva la duplicación de postración («se inclinó... y se postró») y evita suavizar el hebreo. No se detectaron revisiones pendientes en el contexto inglés.
  spanish_consistency_notes:
  - Se mantiene «Betsabé» para el nombre propio según uso bíblico español estándar.
  - Se usa «Yahvé» solo cuando el texto fuente lo requiera explícitamente; este versículo no contiene el tetragrámaton.
  - «rey David» y «mi señor» conservan el tono cortesano sin introducir términos eclesiásticos posteriores.
  - La nota al pie preserva la alternativa idiomática documentada en el audit trail inglés, adaptada al español.
