  glossary_alignment: No hay conflictos con la terminología doctrinal principal del proyecto. «Sueño» para שֵׁנָה es una buena decisión contextual en español. «Hierba» para חָצִיר también está bien. El único ajuste léxico importante concierne a זְרַמְתָּם, para reflejar mejor el arrastre torrencial sin una construcción española rígida.
