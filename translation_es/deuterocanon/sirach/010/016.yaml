revisions:
- from: Dios borró las huellas de las naciones[a][b], y su raíz hasta la misma tierra.
  to: Dios borró las huellas de las naciones[a][b], y arrancó su raíz hasta lo más hondo del suelo.
  rationale: Se mantiene la imagen hebrea principal («huellas», «Dios», «raíz» en singular colectivo), pero se repara la sintaxis española añadiendo «arrancó» en la segunda cola para expresar con claridad el desarraigo implícito en el contexto y en la documentación léxica. También se cambia «hasta la misma tierra» por «hasta lo más hondo del suelo», que suena más natural en español y refleja mejor la nota sobre קִעֲקָע como fondo o profundidad del terreno sin imponer una lectura excesivamente técnica como «lecho rocoso».
