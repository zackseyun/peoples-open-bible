review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido básico del hebreo: mantiene el plural «mis sábados», el posesivo «mi santuario» y la fórmula final «Yo soy Yahvé». Sin embargo, «respetarán» debilita la fuerza cultual de תִּירָאוּ, que en este contexto apunta más a reverencia/temor reverente que a simple respeto.'
  spanish_quality_summary: El español es claro y legible, pero «Guardarán mis sábados» suena algo menos natural en registro bíblico que «Cumplirán/observarán mis sábados», y sobre todo «respetarán mi santuario» resulta demasiado cotidiano. «Reverenciarán» o «tendrán reverencia por» comunica mejor la dignidad cultual. Conviene también evitar la coma innecesaria antes de «y».
  glossary_alignment: 'Alinea correctamente «Yahvé» para יְהוָה y «santuario» para מִקְדָּשִׁי. «Mis sábados» preserva adecuadamente la pluralidad de שַׁבְּתֹתַי. La principal desalineación terminológica está en תִּירָאוּ: el inglés auditado eligió «revere», y el español debe acercarse más a «reverenciarán» que a «respetarán».'
