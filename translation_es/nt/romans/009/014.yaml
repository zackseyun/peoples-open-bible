translation:
  language: es
  text: ¿Qué, pues, diremos? ¿Hay injusticia[a] con Dios? ¡De ninguna manera![b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «falta de rectitud».
    reason: lexical_alternative
  - marker: b
    text: 'Griego: «¡Que nunca sea así!»; negación muy enfática, también comúnmente rendida «¡De ninguna manera!».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Τί οὖν ἐροῦμεν
  english_pob_choice: What then shall we say?
  chosen_spanish: ¿Qué, pues, diremos?
  alternatives_spanish:
  - ¿Qué, pues, hemos de decir?
  - ¿Qué, pues, diremos entonces?
  lexicon: BDAG
  rationale: La fórmula paulina de transición e inferencia se expresa con un orden natural en español. «Diremos» conserva el valor deliberativo y retórico del futuro, sin volver la frase pesada.
- source_word: ἀδικία
  english_pob_choice: injustice
  chosen_spanish: injusticia
  alternatives_spanish:
  - injusticia / injusticia moral
  - injusticia o maldad
  - injusticia / maldad
  lexicon: BDAG
  rationale: En este contexto la pregunta niega que haya trato injusto de parte de Dios. «Injusticia» comunica mejor el sentido jurídico-moral que «injusticia» en un uso general, y evita introducir «maldad» como si el texto la especificara.
- source_word: παρὰ τῷ θεῷ
  english_pob_choice: with God
  chosen_spanish: con Dios
  alternatives_spanish:
  - de parte de Dios
  - en Dios
  - ante Dios
  lexicon: BDAG
  rationale: La preposición idiomática se vuelve naturalmente «con Dios» en español. Mantiene la brevedad y el valor relacional de la pregunta sin sobreinterpretar.
- source_word: μὴ γένοιτο
  english_pob_choice: Certainly not!
  chosen_spanish: ¡De ninguna manera!
  alternatives_spanish:
  - ¡En ninguna manera!
  - ¡Jamás!
  - ¡De ningún modo!
  lexicon: BDAG
  rationale: La negación enfática paulina requiere una respuesta vigorosa y natural en español. «De ninguna manera» conserva la fuerza de rechazo sin sonar arcaica.
theological_decisions:
- issue: Cómo reflejar la objeción retórica sobre la justicia de Dios sin expandirla doctrinalmente
  english_pob_reading: The verse is translated as a rhetorical denial of any injustice in God, without adding explanatory language about election, reprobation, or divine fairness beyond the Greek text itself.
  chosen_spanish_reading: El versículo presenta una objeción retórica y la rechaza con fuerza, sin añadir explicación sobre elección, reprobación o sistemas teológicos que no aparecen en la frase.
  alternative_spanish_readings:
  - ¿Hay injusticia en Dios?
  - ¿Es Dios injusto?
  rationale: El griego formula la objeción en términos breves y la responde con una negación enfática. La redacción española conserva esa tensión y no resuelve ni amplía el asunto más allá del texto.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'Coincide con la auditoría inglesa: la frase transicional paulina se mantiene breve y retórica; ἀδικία se entiende aquí como injusticia; παρὰ τῷ θεῷ se vierte de modo idiomático; y μὴ γένοιτο se expresa con una negación enfática natural en español. No hay revisiones pendientes en el contexto fuente.'
  spanish_consistency_notes:
  - Se usa «Dios» sin artículos ni perífrasis para conservar la concisión del griego.
  - «Injusticia» se eligió como término principal; la nota preserva la alternativa semántica documentada.
  - La exclamación final mantiene el tono enfático de rechazo total, alineado con el POB en inglés.
  - La puntuación reproduce la secuencia de pregunta retórica + negación enfática del original.
