translation:
  language: es
  text: Señor, tu misericordia reposa[a] sobre las obras de tus manos para siempre[b];
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «tu misericordia está sobre las obras de tus manos para siempre».'
    reason: lexical_alternative
  - marker: b
    text: «Las obras de tus manos» también puede traducirse «tu hechura».
    reason: lexical_alternative
lexical_decisions:
- source_word: Κύριε
  english_pob_choice: Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Señor
  - Oh Señor
  - Soberano
  lexicon: κύριος (vocativo)
  rationale: Aunque el audit trail inglés usa 'Lord' por convención, el proyecto español pide traducir el nombre divino con 'Yahvé' cuando el contexto es una invocación dirigida a Dios. Aquí el vocativo griego funciona como apelación a Dios y no requiere la máscara litúrgica 'Señor'.
- source_word: ἔλεός
  english_pob_choice: mercy
  chosen_spanish: misericordia
  alternatives_spanish:
  - compasión
  - bondad misericordiosa
  - clemencia
  lexicon: ἔλεος
  rationale: '''Misericordia'' es el equivalente natural y teológicamente estable en español para ἔλεος. Conserva la idea de benevolencia compasiva sin suavizarla ni convertirla en un término más genérico.'
- source_word: ἐπὶ
  english_pob_choice: is upon
  chosen_spanish: está sobre
  alternatives_spanish:
  - reposa sobre
  - descansa sobre
  - se extiende sobre
  lexicon: ἐπί
  rationale: La preposición expresa aquí cobertura o extensión sobre un objeto. 'Está sobre' conserva la imagen espacial del griego y sugiere permanencia sin introducir una paráfrasis excesiva.
- source_word: τὰ ἔργα
  english_pob_choice: the works
  chosen_spanish: las obras
  alternatives_spanish:
  - las obras
  - las acciones
  - las cosas hechas
  lexicon: ἔργα
  rationale: '''Obras'' reproduce bien ἔργα en español bíblico y mantiene la correspondencia con la imagen de lo hecho por Dios. Se evita ''hechura'' porque en español podría sonar más cerradamente a ''manufactura'' que al plural concreto del griego.'
- source_word: τῶν χειρῶν σου
  english_pob_choice: of your hands
  chosen_spanish: de tus manos
  alternatives_spanish:
  - de tus manos
  - de tu mano
  - de tu hechura
  lexicon: χείρ
  rationale: La construcción antropomórfica se conserva literalmente como en el griego. 'De tus manos' mantiene la relación posesiva sin resolverla interpretativamente como 'hechura', que sería más explicativa que el original.
- source_word: εἰς τὸν αἰῶνα
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por siempre
  - eternamente
  - para la eternidad
  lexicon: αἰών
  rationale: '''Para siempre'' es la equivalencia española más natural para duración indefinida o sin término. Preserva el valor temporal del sintagma sin forzar un tecnicismo filosófico.'
theological_decisions:
- issue: Cómo traducir Κύριε sin borrar ni la invocación directa ni la referencia divina.
  english_pob_reading: Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  - Oh Yahvé
  rationale: En este verso el griego vocativo apunta a Dios en oración; por la norma del proyecto, el nombre divino no debe enmascararse con 'SEÑOR'. 'Yahvé' comunica claramente la referencia y conserva la dirección devocional del verso.
  doctrine_reference: Nombre divino y transliteración auditada; evitar sustitución litúrgica cuando el texto subyacente remite a YHWH.
- issue: Si ἔργα τῶν χειρῶν σου debe interpretarse como 'creaciones' o mantenerse más literal.
  english_pob_reading: the works of your hands
  chosen_spanish_reading: las obras de tus manos
  alternative_spanish_readings:
  - tu hechura
  - lo que tus manos hicieron
  - tus criaturas
  rationale: El griego no obliga a una expansión a 'creaciones' y la fuerza imagética reside precisamente en la expresión concreta. 'Las obras de tus manos' preserva esa tensión y deja abierto si el foco es creación, providencia o ambas.
  doctrine_reference: Mantener la ambigüedad productiva del texto; no resolver interpretativamente una metáfora bíblica cuando el original no la explicita.
translation_notes:
  revision_awareness: El pasaje muestra acuerdo alto con el audit trail inglés y no registra revisiones aplicadas. La versión española sigue la lectura directa del griego y conserva la misma ambigüedad controlada del original respecto de 'las obras de tus manos'.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' según la política española del proyecto para el nombre divino en contexto vocativo.
  - '''Misericordia'' y ''para siempre'' son equivalentes directos, naturales y consistentes con el registro bíblico en español.'
  - Se conserva la metáfora de 'las obras de tus manos' sin sustituirla por una paráfrasis más interpretativa.
  - Los marcadores de nota [a] y [b] están anclados exactamente en el texto donde corresponde.
