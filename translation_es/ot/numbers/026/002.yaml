translation:
  language: es
  text: Hagan un censo[a] de toda la congregación de los hijos de Israel, de veinte años para arriba[b], por sus casas paternas, todos en Israel que salen a la guerra[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: ''Levanten la cabeza de toda la congregación''. Es un modismo que significa ''hacer un censo'' o ''contar''.'
    reason: lexical_alternative
  - marker: b
    text: O 'a partir de los veinte años'.
    reason: lexical_alternative
  - marker: c
    text: O 'todos los aptos para el servicio militar en Israel'.
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׂאוּ אֶת רֹאשׁ
  english_pob_choice: Take a census
  chosen_spanish: Haz un censo[a]
  alternatives_spanish:
  - Levanta la cabeza
  - Cuenta
  lexicon: HALOT
  rationale: El hebreo usa el modismo literal 'levantar la cabeza' con el sentido de contar. En español, 'hacer un censo' transmite el valor idiomático con claridad y mantiene la función administrativa del mandato.
- source_word: כָּל עֲדַת
  english_pob_choice: the whole congregation
  chosen_spanish: toda la congregación
  alternatives_spanish:
  - toda la comunidad
  - toda la asamblea
  lexicon: HALOT
  rationale: '''Congregación'' conserva el matiz formal y comunitario del sustantivo hebreo en contexto pactal, y suena natural en español bíblico contemporáneo.'
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Jacob
  lexicon: HALOT
  rationale: Se conserva la expresión familiar masculina del hebreo, como en el audit trail inglés, sin neutralizarla indebidamente.
- source_word: מִבֶּן עֶשְׂרִים שָׁנָה וָמַעְלָה
  english_pob_choice: from twenty years old and upward
  chosen_spanish: desde los veinte años de edad y más
  alternatives_spanish:
  - desde los veinte años y arriba
  - a partir de los veinte años
  lexicon: HALOT
  rationale: La frase marca un umbral de edad. 'Y más' refleja 'upward' de manera natural en español y evita una calca rígida.
- source_word: לְבֵית אֲבֹתָם
  english_pob_choice: by their fathers’ houses
  chosen_spanish: por sus casas paternas
  alternatives_spanish:
  - según sus casas paternas
  - por sus casas de sus padres
  lexicon: HALOT
  rationale: '''Casas paternas'' reproduce la organización clánica/paternal del hebreo. ''Por'' refleja el criterio de distribución del censo.'
- source_word: כָּל יֹצֵא צָבָא
  english_pob_choice: everyone in Israel who goes out to war
  chosen_spanish: todos los que en Israel salen a la guerra[c]
  alternatives_spanish:
  - todos los aptos para el servicio militar
  - todos los que salen al ejército
  lexicon: HALOT
  rationale: El hebreo designa a quienes salen al servicio militar. 'Salen a la guerra' es una forma española directa que conserva el sentido funcional sin añadir un sustantivo interpretativo no presente en el texto.
- source_word: צָבָא
  english_pob_choice: war
  chosen_spanish: la guerra
  alternatives_spanish:
  - el ejército
  - el servicio militar
  lexicon: HALOT
  rationale: En esta construcción con 'salir', el sentido bélico es el más natural y el más cercano al valor auditado en inglés.
theological_decisions:
- issue: Expresión masculina del pueblo del pacto en בְּנֵי יִשְׂרָאֵל
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - los hijos de Israel
  rationale: Se mantiene la forma heredada del hebreo y del auditorio inglés, evitando una neutralización que borre la forma filial masculina del original.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Alcance militar de כָּל יֹצֵא צָבָא
  english_pob_reading: everyone in Israel who goes out to war
  chosen_spanish_reading: todos los que en Israel salen a la guerra
  alternative_spanish_readings:
  - todos los aptos para el servicio militar
  - todos los varones aptos para la guerra
  rationale: La frase hebrea define a los que están sujetos al servicio de armas. La traducción conserva la ambigüedad funcional del original sin expandirla más de lo que el texto dice.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
translation_notes:
  revision_awareness: El inglés auditado pasó de 'able to go out to war' a 'goes out to war' para acercarse más al hebreo sin expansión interpretativa. La versión española sigue esa revisión y evita añadir una noción de capacidad separada del verbo.
  spanish_consistency_notes:
  - Se usó 'censo' para el modismo de 'levantar la cabeza', en línea con la decisión inglesa auditada.
  - Se conservó 'hijos de Israel' por coherencia con el patrón POB y con la forma masculina del hebreo.
  - '''Salen a la guerra'' reproduce el valor verbal del hebreo mejor que ''aptos para el servicio militar'', que se deja solo como alternativa en nota.'
  - '''Casas paternas'' mantiene la estructura social del texto y evita sustituciones más modernas que diluyan el patrón genealógico.'
