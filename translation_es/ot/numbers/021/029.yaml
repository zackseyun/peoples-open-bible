review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien el sentido general del hebreo: lamento contra Moab, destrucción del pueblo de Quemos y entrega de hijos e hijas a Sijón. Sin embargo, no preserva fielmente la decisión auditada del POB sobre los sufijos de 3ms, ya que el texto y la nota inglesa favorecen explícitamente la referencia a Quemos (''sus hijos/sus hijas'' = de Quemos), mientras que la justificación española intenta dejar la referencia abierta. Además, la nota [a] introduce una alternativa no respaldada por la nota inglesa ni necesaria por el hebreo.'
  spanish_quality_summary: 'El español es mayormente claro y legible, pero hay detalles mejorables: la repetición de signos de exclamación separados suena menos fluida que una sola oración exclamativa continua; ''a Sijón, rey de los amorreos'' funciona, aunque sin coma refleja mejor la apposición seguida del inglés auditado; y la nota [b] es defectuosa porque repite la misma forma (''Quemos'') en vez de ofrecer una verdadera alternativa. En conjunto, requiere una reparación pequeña.'
  glossary_alignment: 'No hay conflicto con terminología principal del proyecto. ''Quemos'' y ''Sijón'' son aceptables en español. No aparece el nombre divino Yahvé ni otros términos sensibles del glosario. La principal desalineación está en la decisión teológica/lexical sobre los sufijos posesivos: debe seguirse la lectura principal documentada del POB y relegar la lectura ''Moab'' a nota.'
  issues:
  - severity: medium
    issue: La traducción y sus decisiones teológicas dejan ambigua la referencia de 'sus hijos/sus hijas'.
    rationale: El expediente inglés adopta como lectura principal que los sufijos se refieren a Quemos, y la alternativa 'Moab' va en nota. El español no debe neutralizar esa decisión documentada en el texto principal.
  - severity: medium
    issue: La nota [a] no corresponde a la nota inglesa preservada.
    rationale: La nota inglesa documenta una lectura alternativa sobre 'its sons/its daughters' referidos a Moab, no una variante para '¡Ay de ti, Moab!'.
  - severity: low
    issue: La nota [b] es inválida como alternativa léxica.
    rationale: Dice 'O «Quemos»', que repite exactamente la forma del texto y no aporta información útil.
  - severity: low
    issue: La puntuación y el flujo pueden mejorarse.
    rationale: Una sola secuencia exclamativa y la apposición 'Sijón rey de los amorreos' suenan más naturales y se alinean mejor con el audit trail.
  revised_spanish_text: ¡Ay de ti, Moab! ¡Eres destruido, pueblo de Quemos! Él ha dado a sus hijos como fugitivos y a sus hijas en cautiverio a Sijón rey de los amorreos.[a]
  revised_footnotes:
  - marker: a
    text: O «ha dado a sus hijos como fugitivos y a sus hijas en cautiverio», refiriendo los sufijos a Moab en lugar de a Quemos.
    reason: alternative_reading
  revision_rationale: 'Se corrige el texto para reflejar la lectura principal documentada por el POB: los sufijos posesivos se entienden como referidos a Quemos en el texto principal, mientras la lectura alternativa que los refiere a Moab se conserva en nota. Se eliminan las notas defectuosas y se reemplazan por una nota alineada con el expediente inglés. También se pule la puntuación para mejorar naturalidad y coherencia con la apposición final.'
