translation:
  language: es
  text: Por tanto[a], si se deleitan en tronos y cetros, gobernantes de pueblos, honren la sabiduría, para que reinen para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tiranos de pueblos». El término griego puede designar gobernantes en general, aunque en algunos contextos tiene un sentido más negativo.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἥδεσθε
  english_pob_choice: you delight
  chosen_spanish: os deleitáis
  alternatives_spanish:
  - os complacéis
  - os deleitáis en ello
  lexicon: LSJ
  rationale: El verbo expresa placer o deleite; «deleitáis» conserva el tono elevado y la atracción positiva del contexto, sin debilitar la exhortación.
- source_word: θρόνοις
  english_pob_choice: thrones
  chosen_spanish: tronos
  alternatives_spanish:
  - asientos de gobierno
  - sillas de mando
  lexicon: LSJ
  rationale: Se mantiene la imagen política literal del griego. «Tronos» es claro en español y conserva el paralelismo con «cetros».
- source_word: σκήπτροις
  english_pob_choice: scepters
  chosen_spanish: cetros
  alternatives_spanish:
  - bastones reales
  - varas de mando
  lexicon: LSJ
  rationale: El término designa el emblema de autoridad real. «Cetros» es el equivalente natural en español y acompaña bien a «tronos».
- source_word: τύραννοι λαῶν
  english_pob_choice: rulers of peoples
  chosen_spanish: gobernantes de pueblos
  alternatives_spanish:
  - tiranos de pueblos
  - soberanos de naciones
  lexicon: LSJ
  rationale: En griego helenístico, τύραννοι puede funcionar de manera relativamente neutral como gobernantes; por eso se evita imponer «tiranos» en el texto principal. «Gobernantes de pueblos» conserva el sentido de autoridad y refleja el plural λαῶν con fidelidad.
- source_word: τιμήσατε
  english_pob_choice: honor
  chosen_spanish: honrad
  alternatives_spanish:
  - valorad
  - estimulad
  lexicon: LSJ
  rationale: El imperativo pide tributar honor debido. «Honrad» mantiene el mandato directo y el registro solemne.
- source_word: σοφίαν
  english_pob_choice: wisdom
  chosen_spanish: la sabiduría
  alternatives_spanish:
  - sabiduría
  lexicon: LSJ
  rationale: Es la traducción estándar. En Sabiduría de Salomón, el término conserva una resonancia personificada y práctica, que «la sabiduría» deja abierta.
- source_word: εἰς τὸν αἰῶνα
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por los siglos
  - para el siglo
  lexicon: LSJ
  rationale: La expresión idiomática comunica duración continua. «Para siempre» es natural en español y conserva la idea de permanencia.
- source_word: βασιλεύσητε
  english_pob_choice: you may reign
  chosen_spanish: reinéis
  alternatives_spanish:
  - gobernéis como reyes
  - seáis reyes
  lexicon: LSJ
  rationale: El verbo indica reinar o ejercer realeza. «Reinéis» mantiene el matiz de gobierno regio ligado a tronos y cetros.
theological_decisions:
- issue: Valor de τύραννοι en el encabezamiento vocativo
  english_pob_reading: Rendered neutrally as 'rulers of peoples' rather than pejoratively as 'tyrants of peoples.'
  chosen_spanish_reading: Se traduce de manera neutral como «gobernantes de pueblos», no como «tiranos de pueblos» en el cuerpo principal.
  alternative_spanish_readings:
  - tiranos de pueblos
  - soberanos de naciones
  rationale: La exhortación se dirige a quienes están en autoridad y no formula aquí una denuncia explícita. Dado que τύραννοι puede tener valor neutral en griego helenístico, la versión principal evita cargar el texto con una condena no explicitada. La alternativa peyorativa queda documentada en nota.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation tradition; preserve tension where the source allows it.'
