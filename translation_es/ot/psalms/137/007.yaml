revisions:
- from: 'Acuérdate[a], Yahvé, de los hijos de Edom, del día de Jerusalén, de los que decían: «Arrasadla, arrasadla[b], hasta sus cimientos».'
  to: 'Recuerda[a], Yahvé, contra los hijos de Edom el día de Jerusalén, los que decían: «Déjala al descubierto, déjala al descubierto[b], hasta sus cimientos».'
  rationale: Se corrige «de los hijos de Edom» a «contra los hijos de Edom» para preservar el valor adversativo documentado en el análisis fuente. Se reemplaza «Arrasadla» por «Déjala al descubierto» para reflejar mejor el matiz léxico de עָרוּ, dejando las opciones más interpretativas de destrucción total en nota. También se simplifica el inicio a «Recuerda» como imperativo natural y directo en español.
