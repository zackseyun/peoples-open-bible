translation:
  language: es
  text: El miedo y el temblor vienen sobre mí, y el horror[a] me cubre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el terror me cubre» o «el estremecimiento me cubre».
    reason: lexical_alternative
lexical_decisions:
- source_word: יִרְאָה
  english_pob_choice: fear
  chosen_spanish: miedo
  alternatives_spanish:
  - temor
  - pavor
  lexicon: HALOT
  rationale: El sustantivo expresa miedo o temor; en este contexto de angustia intensa, «miedo» comunica de forma natural la primera idea del paralelismo sin elevar innecesariamente el registro.
- source_word: וָרַעַד
  english_pob_choice: and trembling
  chosen_spanish: y el temblor
  alternatives_spanish:
  - y el estremecimiento
  - y el tembloroso estremecimiento
  lexicon: HALOT
  rationale: La palabra denota temblor físico asociado al terror. «Temblor» preserva el sentido corporal y encaja bien con el paralelismo con «miedo».
- source_word: יָבֹא בִי
  english_pob_choice: come upon me
  chosen_spanish: vienen sobre mí
  alternatives_spanish:
  - viene sobre mí
  - me sobrevienen
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente ‘viene en/contra mí’, el español idiomático para una experiencia que sobrecoge es «venir sobre». Se eligió el plural para concordar naturalmente con los dos sustantivos previos, «miedo y temblor».
- source_word: וַתְכַסֵּנִי
  english_pob_choice: and covers me
  chosen_spanish: me cubre
  alternatives_spanish:
  - me envuelve
  - me cubre por completo
  lexicon: HALOT
  rationale: El verbo כסה significa ‘cubrir’. «Me cubre» conserva la metáfora sin interpretarla más dinámicamente como ‘me abruma’.
- source_word: פַּלָּצוּת
  english_pob_choice: horror
  chosen_spanish: el horror
  alternatives_spanish:
  - el terror
  - el espanto
  lexicon: HALOT
  rationale: El sustantivo describe un estado de horror, pavor o estremecimiento. «El horror» mantiene la intensidad y evita duplicar exactamente la gama semántica ya expresada por «miedo y temblor».
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que el marcador de nota [a] aparezca exactamente en el texto español principal.
  spanish_consistency_notes:
