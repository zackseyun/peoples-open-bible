review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja correctamente la estructura y el sentido general del hebreo principal: «Así también» para כֵּן, «seiscientos mil» para שֵׁשׁ מֵאוֹת אֶלֶף, «reunidos» para הַנֶּאֱסָפִים, y «en la arrogancia de su corazón» para בִּזְדוֹן לִבָּם. También preserva bien la decisión de no identificar explícitamente al grupo en el texto principal. Sin embargo, «soldados» debilita un matiz significativo de רַגְלִי/πεζῶν, que especifica soldados de a pie. Ese rasgo fue considerado importante en el rastro inglés y conviene preservarlo en español.'
  spanish_quality_summary: 'El español es claro, natural y digno. La frase fluye bien y evita calcos innecesarios. No obstante, «soldados» resulta algo genérico frente al original; «soldados de a pie» suena natural y conserva mejor la imagen concreta. Las notas son útiles, pero el orden de marcadores no sigue el orden de aparición en el texto: en español, [a] debería corresponder al primer anclaje y [b] al segundo.'
  glossary_alignment: No hay conflictos con la terminología doctrinal principal del proyecto. La principal observación léxica es mantener la fuerza de רַגְלִי/πεζῶν como «soldados de a pie» en vez de solo «soldados». La elección de «arrogancia» para בִּזְדוֹן está bien alineada con la evidencia hebrea y con la justificación auditada; la alternativa griega «dureza de corazón» puede permanecer en nota.
  issues:
  - severity: medium
    issue: «soldados» omite el matiz de «de a pie» presente en רַגְלִי y confirmado por πεζῶν.
    rationale: El original no solo menciona tropas, sino específicamente combatientes a pie. El inglés auditado preserva ese matiz con «foot soldiers»; en español conviene reflejarlo con «soldados de a pie».
  - severity: low
    issue: Los marcadores de nota están invertidos respecto del orden de aparición en el texto.
    rationale: La instrucción del proyecto exige marcadores únicos en orden (a, b, c...). En el borrador, [a] aparece después semánticamente del punto que hoy lleva [b] en la secuencia auditada; conviene reordenarlos para que la primera nota anclada en el texto sea [a] y la segunda [b].
  revised_spanish_text: Así también, seiscientos mil soldados de a pie[a], reunidos en la arrogancia de su corazón[b].
  revised_footnotes:
  - marker: a
    text: Posible alusión a la generación del desierto de Israel; compárese el censo tradicional de Éxodo 12:37 y Números 11:21.
    reason: cross_reference
  - marker: b
    text: O «en la insolencia de su corazón» o «en la presunción de su corazón». El griego paralelo dice literalmente «en la dureza de su corazón».
    reason: lexical_alternative
  revision_rationale: Se reemplaza «soldados» por «soldados de a pie» para conservar el matiz militar concreto del hebreo רַגְלִי y del griego πεζῶν, tal como lo preserva la auditoría inglesa con «foot soldiers». Se mantiene «arrogancia» en el texto principal por fidelidad al hebreo, dejando la variante griega en nota. También se normaliza el orden de los marcadores de nota.
