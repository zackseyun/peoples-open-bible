translation:
  language: es
  text: Y no les ocultaré más mi rostro[b], porque[a] he derramado mi Espíritu sobre la casa de Israel, declara el Señor Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "cuando he derramado mi Espíritu sobre la casa de Israel". El relativo hebreo puede entenderse aquí de manera causal o temporal.'
    reason: alternative_reading
  - marker: b
    text: Literalmente, "mi rostro", un hebraísmo para la presencia favorable o la apertura relacional de Dios.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלֹא ... עוֹד
  english_pob_choice: And I will no longer
  chosen_spanish: Y no ocultaré más
  alternatives_spanish:
  - Y ya no esconderé
  - Y no esconderé más
  lexicon: HALOT
  rationale: La negación con עוֹד expresa cese de una acción previa; en español, 'no ocultaré más' comunica naturalmente la idea de que la ocultación cesará, sin perder el valor aspectual de continuidad terminada.
- source_word: אַסְתִּיר
  english_pob_choice: hide
  chosen_spanish: ocultaré
  alternatives_spanish:
  - esconderé
  - velaré
  lexicon: HALOT
  rationale: El hiphil de סתר significa ocultar/esconder. 'Ocultar' suena un poco más natural y solemne en español bíblico contemporáneo, aunque 'esconderé' sigue siendo una alternativa válida.
- source_word: פָּנַי
  english_pob_choice: my face
  chosen_spanish: mi rostro
  alternatives_spanish:
  - mi cara
  - mi presencia
  lexicon: HALOT
  rationale: Se mantiene la imagen corporal de 'rostro' para conservar la metáfora bíblica de favor/presencia relacional. 'Presencia' sería una glosa interpretativa, por eso queda como alternativa solo implícita.
- source_word: מֵהֶם
  english_pob_choice: from them
  chosen_spanish: de ellos
  alternatives_spanish:
  - de parte de ellos
  - alejado de ellos
  lexicon: HALOT
  rationale: 'La preposición expresa separación: ''de ellos'' es la forma más directa y natural en español, sin añadir matices no presentes en el hebreo.'
- source_word: אֲשֶׁר
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - cuando
  - ya que
  - puesto que
  lexicon: HALOT
  rationale: Sigo la revisión auditada que entiende אֲשֶׁר aquí como causal/explanatoria. 'Porque' preserva esa relación en español de manera clara y pública.
- source_word: שָׁפַכְתִּי
  english_pob_choice: I have poured out
  chosen_spanish: he derramado
  alternatives_spanish:
  - derramé
  - derramaré
  - he vertido
  lexicon: HALOT
  rationale: '''Derramar'' es el verbo bíblico natural para רוח en contextos de efusión divina. El perfecto hebreo queda bien reflejado con el perfecto compuesto español ''he derramado''.'
- source_word: רוּחִי
  english_pob_choice: my Spirit
  chosen_spanish: mi Espíritu
  alternatives_spanish:
  - mi espíritu
  - mi aliento
  - mi viento
  lexicon: HALOT
  rationale: El contexto es de restauración pactual y don divino sobre Israel; por eso se mantiene la mayúscula y el valor personal-teológico de 'mi Espíritu'.
- source_word: עַל
  english_pob_choice: 'on'
  chosen_spanish: sobre
  alternatives_spanish:
  - en
  - encima de
  lexicon: HALOT
  rationale: '''Sobre'' comunica de forma natural la imagen de la efusión del Espíritu sobre un pueblo, sin introducir un sentido excesivamente espacial o mecánico.'
- source_word: בֵּית יִשְׂרָאֵל
  english_pob_choice: the house of Israel
  chosen_spanish: la casa de Israel
  alternatives_spanish:
  - la casa de Israel entera
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Se conserva la expresión de pacto 'casa de Israel', que tiene carga corporativa y histórica en el hebreo.
- source_word: נְאֻם
  english_pob_choice: declares
  chosen_spanish: declara
  alternatives_spanish:
  - dice
  - afirma
  - oráculo de
  lexicon: HALOT
  rationale: '''Declara'' conserva el tono profético solemne de נְאֻם sin volverlo arcaico en exceso.'
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: el Señor Yahvé
  alternatives_spanish:
  - el Señor Dios
  - el Señor Yahvéh
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto para יְהוָה: ''Yahvé''. En el título compuesto, ''el Señor Yahvé'' conserva ambos elementos, evita la máscara ''SEÑOR'' y mantiene la distinción entre אֲדֹנָי y el nombre divino.'
theological_decisions:
- issue: Relación causal de אֲשֶׁר
  english_pob_reading: because I have poured out my Spirit on the house of Israel
  chosen_spanish_reading: porque he derramado mi Espíritu sobre la casa de Israel
  alternative_spanish_readings:
  - cuando he derramado mi Espíritu sobre la casa de Israel
  - al haber derramado mi Espíritu sobre la casa de Israel
  rationale: La evidencia auditada admite una lectura causal además de la temporal. La versión española sigue la lectura causal para hacer explícita la conexión explicativa del versículo sin borrar la posibilidad alternativa.
  doctrine_reference: Ezequiel 39:29; nota textual/audit trail sobre אֲשֶׁר como causal o temporal
- issue: Rostro como idiomática de favor/presencia divina
  english_pob_reading: my face
  chosen_spanish_reading: mi rostro
  alternative_spanish_readings:
  - mi presencia
  - mi faz
  rationale: El hebreo preserva la imagen concreta de 'rostro'. Traducirlo así mantiene la tensión entre literalidad e interpretación, y permite que la nota explique el sentido relacional de favor/no ocultamiento.
  doctrine_reference: Uso idiomático bíblico del rostro de Dios como presencia/favor
- issue: Renderizar יְהוָה en el título final
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Dios
  - el Señor Yavé
  rationale: 'Se aplica el criterio del proyecto: el nombre divino se vierte como ''Yahvé''. En español, ''el Señor Yahvé'' conserva la solemnidad del título compuesto y evita la convención de ocultamiento por mayúsculas.'
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión auditada que cambió la relación de אֲשֶׁר de temporal (“cuando”) a causal/explanatoria (“porque”). También se conservó la decisión del POB inglés de mantener la imagen de “face” con nota, y se adaptó al español con “rostro” para evitar un calco demasiado anglófono.
  spanish_consistency_notes:
  - Se mantiene el registro bíblico público y legible, evitando giros excesivamente arcaicos.
  - '''Yahvé'' se usa de forma consistente para el nombre divino, según la norma del proyecto.'
  - '''Espíritu'' se escribe con mayúscula por su referencia divina; ''rostro'' se deja en minúscula en el texto por ser un sustantivo común dentro del hebraísmo.'
  - La puntuación refleja una sola oración con cláusula causal, en armonía con la lectura auditada del hebreo.
