    rationale: La nota lexical sobre «sus aldeas» debe anclarse a esa expresión; la nota textual sobre Jecabseel debe anclarse al topónimo mismo.
  - severity: low
    issue: La redacción de la nota b incluye comillas iniciales innecesarias.
    rationale: '«Hebreo: “sus hijas”...» es suficiente; las comillas externas y la puntuación actual se sienten poco pulidas.'
