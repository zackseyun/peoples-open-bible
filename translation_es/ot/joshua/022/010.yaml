review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el hebreo y el rastro de auditoría inglés: conserva la llegada a la región del Jordán en Canaán, mantiene las expresiones tribales «los hijos de…», traduce עַל הַיַּרְדֵּן de forma proxémica («junto al Jordán») y preserva la tensión narrativa al describir el altar sin prejuzgar su legitimidad. La única desalineación relevante está en la asignación y anclaje de las notas: en el inglés, [a] corresponde a גְּלִילוֹת («region/districts/borders») y [b] a לְמַרְאֶה («great in appearance»), pero en el texto español actual los marcadores quedaron invertidos respecto de sus contenidos.'
  spanish_quality_summary: 'El español es claro, natural y digno. «Cuando llegaron…» y «construyeron allí un altar» fluyen bien. «Media tribu» es aceptable y común. El único problema práctico es de aparato crítico: la nota [a] está anclada tras «Canaán», aunque su contenido explica «región»/גְּלִילוֹת; y [b] debe anclarse a la descripción visual del altar. También conviene usar raya larga en vez de dos puntos para reflejar mejor la aposición enfática del original y del POB inglés.'
  glossary_alignment: No hay conflicto con la terminología del proyecto. No aparecen Yahvé/Mesías/etc. Las decisiones léxicas principales («región», «los hijos de Rubén», «los hijos de Gad», «media tribu de Manasés», «altar», «junto al Jordán», «grande en apariencia») son coherentes con el hebreo y con el POB inglés.
  issues:
  - severity: medium
    issue: Marcadores de notas anclados al lugar equivocado
    rationale: La nota sobre גְּלִילוֹת debe anclarse en «región», no en «Canaán». La nota sobre «grande en apariencia» debe mantenerse en la frase final. Tal como está, el lector asociará la variante equivocada con la palabra equivocada.
  - severity: low
    issue: Puntuación menos precisa que el modelo auditado
    rationale: El inglés usa raya para introducir la aposición «an altar great in appearance». En español, una raya refleja mejor esa estructura que dos puntos, aunque esto no altera el sentido.
