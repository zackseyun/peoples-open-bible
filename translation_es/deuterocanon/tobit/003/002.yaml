review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el griego en la estructura principal: vocativo a Dios, afirmación de su justicia, paralelismo de obras/caminos, y la cláusula final sobre juzgar con juicio verdadero y justo para siempre. Sin embargo, la nota [a] no preserva fielmente la decisión léxica auditada: presenta ''justo'' como alternativa de sí mismo y añade ''recto'' en vez de reflejar la alternativa inglesa documentada (''just'' frente a ''righteous''), que en español se expresa mejor como ''recto'' o ''justo'' según el texto principal escogido. El texto principal es sustancialmente fiel.'
  spanish_quality_summary: El español es claro, natural y digno. 'Tú eres justo, Yahvé' y 'todas tus obras y todos tus caminos' leen bien. 'Son misericordia y verdad' es algo austero pero aceptable y cercano al griego/POB. 'Y tú juzgas un juicio verdadero y justo para siempre' es comprensible, aunque algo redundante; no obstante, conserva de forma transparente la construcción fuente y no requiere cambio para fidelidad. La reparación necesaria es menor y se limita a la nota al pie.
  glossary_alignment: 'Buena alineación general con la terminología del proyecto: Κύριε se vierte como ''Yahvé'' conforme a la política española; ἀλήθεια como ''verdad''; ἐλεημοσύναι como ''misericordia'' manteniendo la amplitud; κρίσιν ... δικαίαν como ''juicio verdadero y justo''. La única desalineación es la nota sobre Δίκαιος, que debe reflejar correctamente la alternativa léxica en español y no repetir la forma elegida.'
  issues:
  - severity: medium
    issue: La nota [a] es defectuosa
    rationale: Dice 'O “justo”' cuando el texto principal ya usa 'justo', por lo que la alternativa no aporta información real y no preserva adecuadamente la justificación auditada. Debe ofrecer una alternativa distinta y pertinente, por ejemplo 'recto'.
  revised_spanish_text: Tú eres justo[a], Yahvé, y todas tus obras y todos tus caminos son misericordia y verdad, y tú juzgas un juicio verdadero y justo para siempre.
  revised_footnotes:
  - marker: a
    text: O 'recto'. El griego Δίκαιος puede traducirse como 'justo' o 'recto'; aquí se usa 'justo' por ser la forma más natural en esta oración de alabanza.
    reason: lexical_alternative
  revision_rationale: Se mantiene el texto principal porque es fiel al griego, al rastro de auditoría inglés y al estilo español del proyecto. Solo se corrige la nota [a] para que exprese una alternativa léxica real y útil, en vez de repetir la misma palabra del texto.
