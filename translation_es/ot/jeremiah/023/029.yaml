translation:
  language: es
  text: ¿No es mi palabra como fuego —oráculo de Yahvé[a]— y como un martillo que hace pedazos la roca?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «declara Yahvé». La fórmula profética hebrea es literalmente «oráculo de Yahvé» o «expresión de Yahvé».
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲלֹוא
  english_pob_choice: Is not
  chosen_spanish: ¿No es... ?
  alternatives_spanish:
  - ¿Acaso no es... ?
  - ¿No será... ?
  lexicon: HALOT
  rationale: La forma hebrea introduce una pregunta retórica que espera respuesta afirmativa. En español, «¿No es...?» conserva ese valor interrogativo sin suavizarlo demasiado.
- source_word: דְבָרִי
  english_pob_choice: my word
  chosen_spanish: mi palabra
  alternatives_spanish:
  - mis palabras
  - lo que digo
  lexicon: HALOT
  rationale: Se mantiene el singular, porque el hebreo presenta la palabra profética como una fuerza unificada. «Mi palabra» es natural en español y conserva el énfasis en la expresión divina.
- source_word: כָּאֵשׁ
  english_pob_choice: like fire
  chosen_spanish: como fuego
  alternatives_spanish:
  - como fuego ardiente
  - cual fuego
  lexicon: HALOT
  rationale: La comparación es directa; «como fuego» reproduce la metáfora con claridad y buena fluidez en español.
- source_word: נְאֻם יְהוָה
  english_pob_choice: oracle of Yahweh
  chosen_spanish: oráculo de Yahvé
  alternatives_spanish:
  - declaración de Yahvé
  - utterancia de Yahvé
  lexicon: HALOT
  rationale: «Oráculo» preserva el sustantivo profético de נְאֻם, tal como la POB inglesa prefirió «oracle» frente a una paráfrasis verbal. Se conserva «Yahvé» para יְהוָה según la norma del proyecto.
- source_word: וּכְפַטִּישׁ
  english_pob_choice: and like a hammer
  chosen_spanish: y como un martillo
  alternatives_spanish:
  - y como mazo
  - y como un martillo de herrero
  lexicon: HALOT
  rationale: פַטִּישׁ designa un martillo; «martillo» es suficientemente preciso sin sobreespecificar la herramienta. Se conserva la comparación simple del hebreo.
- source_word: יְפֹצֵץ
  english_pob_choice: that shatters
  chosen_spanish: que despedaza
  alternatives_spanish:
  - que quiebra
  - que rompe en pedazos
  - que hace pedazos
  lexicon: HALOT
  rationale: El verbo expresa ruptura violenta. «Despedaza» comunica esa fuerza de manera natural en español y mantiene la imagen de destrucción contundente.
- source_word: סָלַע
  english_pob_choice: rock
  chosen_spanish: la roca
  alternatives_spanish:
  - roca
  - peñasco
  lexicon: HALOT
  rationale: En este contexto, «roca» es una equivalencia clara y precisa para סָלַע. El artículo definido ayuda a la fluidez en español sin alterar la imagen.
theological_decisions:
- issue: Fórmula profética נְאֻם יְהוָה
  english_pob_reading: oracle of Yahweh
  chosen_spanish_reading: oráculo de Yahvé
  alternative_spanish_readings:
  - declaración de Yahvé
  - oráculo del Señor
  rationale: Se mantiene la fuerza nominal de la fórmula profética y el uso del nombre divino Yahvé conforme al criterio del proyecto. No se sustituye por un verbo («declara») para no perder la forma tradicional del hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior eliminando la nota al pie no anclada; el texto español no requiere marcadores de nota para esta sección porque la decisión lexical principal (נְאֻם יְהוָה → oráculo de Yahvé) quedó incorporada directamente en el texto y explicada en las decisiones lexicográficas.
  spanish_consistency_notes:
  - Se conserva el paralelismo «como fuego ... y como un martillo» para reflejar la estructura hebrea.
  - «Yahvé» se usa de forma consistente para יְהוָה, conforme a la norma del proyecto.
  - «Palabra» se mantiene en singular para el valor colectivo-unificado de דְבָרִי en este contexto profético.
