revisions:
- from: 'Mientras ellos se estaban alegrando el corazón[a], he aquí que los hombres de la ciudad, hombres hijos de Belial, rodearon la casa, golpeando la puerta. Y dijeron al hombre, al dueño de la casa, el anciano: «Saca al hombre que ha entrado en tu casa[b], para que lo conozcamos».'
  to: 'Mientras ellos se estaban alegrando el corazón, he aquí que los hombres de la ciudad, hombres despreciables[a], rodearon la casa, golpeando la puerta. Y dijeron al anciano, dueño de la casa: «Saca al hombre que entró en tu casa, para que lo conozcamos[b]».'
  rationale: La revisión corrige el error de anclaje de la nota [a], alinea mejor el texto principal con la decisión léxica documentada del POB para בְנֵי בְלִיַּעַל, mejora la naturalidad del español en la frase narrativa y conserva correctamente el eufemismo sexual con nota explicativa.
