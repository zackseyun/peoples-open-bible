review_pass:
  verdict: revise
  source_alignment_summary: El borrador español sigue el hebreo extante y no el paralelo griego, en línea con la revisión más reciente del rastro inglés. Sin embargo, la nota al pie entra en tensión con el audit trail inglés y la validación textual, porque afirma de forma demasiado fuerte que el hebreo suministrado fue el texto controlado, cuando la documentación inglesa reconoce desajuste/corrupción y usa el griego como paralelo significativo. Además, «sanidad de la lengua» suena poco natural en español bíblico moderno.
  spanish_quality_summary: La frase principal es comprensible, pero «sanidad de la lengua» resulta rígido y algo poco idiomático. «Curación para la lengua» o «remedio para la lengua» leen mejor. También conviene simplificar «Y otra vez» a «Y de nuevo», más natural en este registro. El resto de la sintaxis es clara y sobria.
  glossary_alignment: No hay términos del glosario principal especialmente implicados aquí. «Seres humanos» representa bien מבני אדם. La principal cuestión no es terminológica del glosario, sino fidelidad al estado textual documentado y naturalidad léxica en español.
  issues:
  - severity: medium
    issue: «sanidad de la lengua» suena poco natural
    rationale: Aunque refleja literalmente la estructura, en español neutral moderno «sanidad» en este contexto nominal suena forzado. «Curación para la lengua» conserva el sentido de healing for the tongue y mejora la legibilidad.
  - severity: high
    issue: La nota al pie contradice o simplifica en exceso la incertidumbre textual documentada
    rationale: El audit trail inglés dice que el hebreo parece desajustado o corrupto y por eso sigue el griego paralelo. La nota española actual afirma que el hebreo fue el texto controlado en la revisión más reciente, sin reflejar esa incertidumbre. Debe presentarse honestamente la tensión textual.
  - severity: low
    issue: «Y otra vez» es menos natural que «Y de nuevo»
    rationale: Ambas son posibles, pero «Y de nuevo» suena más fluido y digno en español bíblico moderno.
  revised_spanish_text: Y de nuevo[a], si hay curación para la lengua, no está entre los seres humanos.
