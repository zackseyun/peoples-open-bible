translation:
  language: es
  text: Tú sacaste una vid de Egipto[a][b]; expulsaste naciones y la plantaste.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «hiciste partir una vid de Egipto» o «arrancaste una vid de Egipto». El verbo hebreo puede implicar hacer salir, poner en camino o trasladar/arrancar.'
    reason: alternative_reading
  - marker: b
    text: La «vid» es una metáfora de Israel.
    reason: cross_reference
lexical_decisions:
- source_word: גֶּפֶן
  english_pob_choice: a vine
  chosen_spanish: una vid
  alternatives_spanish:
  - la vid
  - una parra
  lexicon: HALOT
  rationale: El hebreo usa גֶּפֶן para una vid/parra, y aquí funciona como metáfora de Israel. «Una vid» conserva la imagen sin explicitar el referente en el texto principal.
- source_word: מִמִּצְרַיִם
  english_pob_choice: out of Egypt
  chosen_spanish: de Egipto
  alternatives_spanish:
  - desde Egipto
  - fuera de Egipto
  lexicon: HALOT
  rationale: La preposición marca origen o procedencia. En español, «sacaste ... de Egipto» comunica bien ese movimiento desde el lugar de origen sin perder fidelidad.
- source_word: תַּסִּיעַ
  english_pob_choice: you brought
  chosen_spanish: sacaste
  alternatives_spanish:
  - hiciste salir
  - arrancaste
  - pusiste en camino
  lexicon: HALOT
  rationale: El hiphil de נסע puede implicar hacer partir, mover o trasladar. «Sacaste» es una opción natural en español que conserva la idea de traslado desde Egipto y deja abierta la tensión entre llevar, hacer partir o arrancar.
- source_word: תְּגָרֵשׁ
  english_pob_choice: you drove out
  chosen_spanish: expulsaste
  alternatives_spanish:
  - echaste fuera
  - arrojaste
  - desposeíste
  lexicon: HALOT
  rationale: גרש en piel expresa expulsar o echar fuera. «Expulsaste» es claro y mantiene la fuerza de expulsión de las naciones del territorio.
- source_word: גּוֹיִם
  english_pob_choice: nations
  chosen_spanish: naciones
  alternatives_spanish:
  - pueblos
  - gentiles
  lexicon: HALOT
  rationale: En este contexto de conquista y ocupación, «naciones» reproduce con precisión el plural hebreo sin introducir un contraste teológico posterior que «gentiles» podría sugerir.
- source_word: וַתִּטָּעֶהָ
  english_pob_choice: and planted it
  chosen_spanish: y la plantaste
  alternatives_spanish:
  - y la sembraste
  - y la estableciste
  lexicon: HALOT
  rationale: El verbo נטע significa plantar; el sufijo femenino remite a la vid. «La plantaste» conserva la imagen vegetal y el antecedente femenino, sin forzar el español con un pronombre personal más marcadamente personificador.
theological_decisions:
- issue: Metáfora de la vid para Israel
  english_pob_reading: Retain the vine metaphor without explicating 'Israel' in the main text.
  chosen_spanish_reading: Mantener la imagen de la vid sin explicitar «Israel» en el cuerpo principal.
  alternative_spanish_readings:
  - Tú sacaste a Israel de Egipto; expulsaste naciones y los plantaste.
  rationale: El hebreo presenta a Israel mediante la metáfora de la vid. Nombrar explícitamente a Israel en el texto principal sería ya interpretación; la metáfora se entiende por el contexto inmediato y debe preservarse.
  doctrine_reference: Translation philosophy §1, §3
- issue: Pronombre para la vid
  english_pob_reading: Use 'it' rather than 'her' in English.
  chosen_spanish_reading: Usar «la» por concordancia con «vid», no un pronombre personal más personificado.
  alternative_spanish_readings:
  - y la plantaste
  - y la plantaste a ella
  rationale: En español, la concordancia con el sustantivo femenino permite conservar el vínculo con la vid sin introducir un tono innecesariamente personal. La forma simple «la» es fiel y natural.
  doctrine_reference: Translation philosophy §6
translation_notes:
  revision_awareness: No se requirieron revisiones en el pasaje fuente; la lectura se mantiene en alta concordancia con el auditor inglés y con el hebreo masorético.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma por defecto cuando el texto lo requiera, pero este versículo no contiene el nombre divino explícito.
  - Se usa «expulsaste» para גרש, reservando «siervo»/«esclavo» y otros términos técnicos para contextos donde aparezcan explícitamente.
  - La metáfora vegetal se conserva sin glosa interpretativa dentro del texto principal, siguiendo el patrón del inglés auditado.
