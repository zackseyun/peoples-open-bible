translation:
  language: es
  text: El vino es injusto, el rey es injusto, las mujeres son injustas, todos los hijos de los hombres son injustos y todas sus obras son injustas, todas esas cosas[a]. Y no hay verdad en ellos[b], y en su injusticia perecerán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse como «todo eso» o «todo lo de ese tipo» para τὰ τοιαῦτα.
    reason: lexical_alternative
  - marker: b
    text: La expresión «los hijos de los hombres» conserva un giro idiomático griego para la humanidad.
    reason: cultural_note
lexical_decisions:
- source_word: ἄδικος / ἄδικοι / ἄδικα
  english_pob_choice: unjust
  chosen_spanish: injusto / injustas
  alternatives_spanish:
  - inicuo / inicuas
  - injusto / injusta
  - malvado / malvada
  lexicon: BDAG
  rationale: ‘Injusto’ conserva la raíz de ἀδικία/ἄδικος, mantiene el juego léxico con ‘injusticia’ al final del versículo y evita cargar el texto con un sentido más moralizado como ‘malvado’. La concordancia de género y número en español exige ‘injustas’ para ‘las mujeres’, ‘injustos’ para el plural humano, y ‘injusta’ si se entendiera el sustantivo implícito ‘la embriaguez’, pero el griego del versículo personifica explícitamente al vino.
- source_word: οἶνος
  english_pob_choice: wine
  chosen_spanish: el vino
  alternatives_spanish:
  - vino
  - la bebida
  lexicon: BDAG
  rationale: ‘El vino’ es la traducción directa y natural del sustantivo griego, y conserva la personificación del dicho sin añadir explicación interpretativa.
- source_word: βασιλεύς
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - un rey
  lexicon: BDAG
  rationale: El artículo griego se refleja bien con ‘el rey’; en este proverbio funciona como figura representativa general, pero la forma definida debe mantenerse como en el original.
- source_word: γυναῖκες
  english_pob_choice: women
  chosen_spanish: las mujeres
  alternatives_spanish:
  - las esposas
  lexicon: BDAG
  rationale: ‘Mujeres’ corresponde al sustantivo amplio del griego; ‘esposas’ restringiría indebidamente el alcance sin señal contextual.
- source_word: υἱοὶ τῶν ἀνθρώπων
  english_pob_choice: the sons of men
  chosen_spanish: los hijos de los hombres
  alternatives_spanish:
  - los seres humanos
  - los hijos de la humanidad
  lexicon: BDAG
  rationale: Se conserva el giro idiomático y su forma marcada, como hace el POB inglés, en vez de neutralizarlo a ‘seres humanos’. Aunque en español suena menos usual, es transparente y fiel a la fuerza del griego.
- source_word: ἔργα
  english_pob_choice: works
  chosen_spanish: obras
  alternatives_spanish:
  - hechos
  - acciones
  - trabajos
  lexicon: BDAG
  rationale: ‘Obras’ es la forma más natural en español para τὰ ἔργα en este contexto y mantiene amplitud semántica sin volverlo demasiado técnico.
- source_word: τὰ τοιαῦτα
  english_pob_choice: all such things
  chosen_spanish: todas esas cosas
  alternatives_spanish:
  - todas tales cosas
  - todo eso
  - todo lo de ese tipo
  lexicon: BDAG
  rationale: La expresión resume la lista anterior; ‘todas esas cosas’ comunica bien el valor resumptivo y la cualidad de ‘cosas de ese tipo’ sin sonar artificial. El POB inglés preserva la ambigüedad entre resumir la serie y referirse a un conjunto semejante.
- source_word: ἀλήθεια
  english_pob_choice: truth
  chosen_spanish: verdad
  alternatives_spanish:
  - veracidad
  - fidelidad
  lexicon: BDAG
  rationale: ‘Verdad’ es la correspondencia más directa en español y funciona en contraste con la injusticia del pasaje. ‘Veracidad’ estrecharía el sentido hacia la cualidad de hablar, que aquí no se exige.
- source_word: ἀδικίᾳ
  english_pob_choice: injustice
  chosen_spanish: injusticia
  alternatives_spanish:
  - iniquidad
  - falta de justicia
  lexicon: BDAG
  rationale: ‘Injusticia’ preserva el enlace verbal y conceptual con ἄδικος al inicio del versículo. ‘Iniquidad’ sería más tradicional, pero menos transparente y menos consistente con la raíz compartida.
- source_word: ἀπολοῦνται
  english_pob_choice: they will perish
  chosen_spanish: perecerán
  alternatives_spanish:
  - serán destruidos
  - se perderán
  lexicon: BDAG
  rationale: ‘Perecerán’ reproduce bien el futuro de desaparición/ruina sin añadir un agente externo explícito. Es breve, idiomático y fiel al matiz del verbo medio/pasivo.
theological_decisions:
- issue: Género antropológico en υἱοὶ τῶν ἀνθρώπων
  english_pob_reading: the sons of men
  chosen_spanish_reading: los hijos de los hombres
  alternative_spanish_readings:
  - los seres humanos
  - los hijos de la humanidad
  rationale: Se mantiene el giro masculino e idiomático del griego, en línea con la política del POB de conservar expresiones marcadas cuando no hay necesidad textual de neutralizarlas. Esto protege la audibilidad del original y su fuerza proverbial.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: 'El estado de revisión indica acuerdo alto y sin cambios pendientes; por eso esta versión mantiene la decisión léxica principal del POB inglés: ‘unjust’ -> ‘injusto/injustas’, ‘the sons of men’ -> ‘los hijos de los hombres’, y ‘they will perish’ -> ‘perecerán’, sin introducir reinterpretaciones.'
  spanish_consistency_notes:
  - Se mantiene la misma raíz léxica con ‘injusto/injusticia’ para reflejar ἄδικος/ἀδικία.
  - ‘Obras’ se usa de forma consistente para ἔργα en registros bíblicos de español contemporáneo.
  - La enumeración conserva paralelismo y ritmo, evitando suavizar la repetición retórica del griego.
  - La puntuación con coma y punto y coma en español busca reflejar la acumulación del original sin sobreinterpretarlo.
