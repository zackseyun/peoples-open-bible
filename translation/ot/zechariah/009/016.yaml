id: ZEC.9.16
reference: Zechariah 9:16
source:
  edition: WLC
  text: וְֽ/הוֹשִׁיעָ֞/ם יְהוָ֧ה אֱלֹהֵי/הֶ֛ם בַּ/יּ֥וֹם הַ/ה֖וּא כְּ/צֹ֣אן עַמּ֑/וֹ כִּ֚י אַבְנֵי נֵ֔זֶר מִֽתְנוֹסְס֖וֹת עַל אַדְמָתֽ/וֹ־־׃
translation:
  text: And Yahweh their God will save them on that day as the flock of his people[b][a], for they will sparkle like the stones of a crown over his land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'for they will be raised aloft like the stones of a crown over his land.' The Hebrew verb can suggest being lifted up or displayed prominently, not only shining.
    reason: lexical_alternative
  - marker: b
    text: '''Stones of a crown'' may also be rendered ''crown jewels'' or, less likely, ''consecrated stones,'' since the Hebrew term for ''crown'' can carry associations of consecration.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהוֹשִׁיעָם
  chosen: And ... will save them
  alternatives:
  - and he will deliver them
  - and he will give them victory
  lexicon: HALOT
  rationale: Hiphil of ישׁע commonly means to save/deliver. 'Save' is the broadest and most theologically natural English rendering here, preserving both rescue and victory without over-specifying.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name YHWH per DOCTRINE.md.
- source_word: אֱלֹהֵיהֶם
  chosen: their God
  lexicon: HALOT
  rationale: Straightforward construct with pronominal suffix; rendered literally to preserve covenantal relationship.
- source_word: בַּיּוֹם הַהוּא
  chosen: on that day
  alternatives:
  - in that day
  lexicon: HALOT
  rationale: Standard idiomatic rendering of the temporal phrase in prophetic literature; modern English prefers 'on that day.'
- source_word: כְּצֹאן עַמּוֹ
  chosen: as the flock of his people
  alternatives:
  - like the sheep of his people
  - like his people's flock
  lexicon: HALOT
  rationale: The simile compares the saved people to a flock belonging to him. 'Flock' better captures collective force than singular 'sheep' in English while preserving the pastoral image.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the reason or explanatory ground for the preceding statement. 'For' preserves the explanatory connection without over-interpreting.
- source_word: אַבְנֵי נֵזֶר
  chosen: the stones of a crown
  alternatives:
  - crown jewels
  - consecrated stones
  - stones of a diadem
  lexicon: HALOT
  rationale: נֵזֶר can denote a crown/diadem and carries consecration associations, but in this poetic context the image is best preserved as 'stones of a crown.' 'Crown jewels' is idiomatic but slightly interpretive; 'consecrated stones' is possible yet less likely here.
- source_word: מִתְנוֹסְסוֹת
  chosen: will shine like
  alternatives:
  - will sparkle
  - will be raised aloft
  - will gleam
  lexicon: HALOT
  rationale: The reflexive participle from נסס can suggest being displayed conspicuously, like a banner or something lifted up. In context with precious stones, the sense of glittering/displayed brilliance is prominent. 'Will shine like' communicates both visibility and splendor in natural English, while the alternative 'be raised aloft' is preserved in a footnote because the verb may retain an exalted/display nuance.
- source_word: עַל אַדְמָתוֹ
  chosen: over his land
  alternatives:
  - over his soil
  - upon his ground
  lexicon: HALOT
  rationale: אדמה refers to ground/land. 'Land' is the most natural English choice here, especially in a national-restoration context. 'His' most naturally refers to the LORD in the immediate syntax, though the phrase could also be heard as the land belonging to his people under his possession.
