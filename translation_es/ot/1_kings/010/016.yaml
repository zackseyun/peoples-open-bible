  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien la estructura y el sentido general del hebreo: Salomón hizo doscientos escudos grandes de oro batido, y se indica la cantidad de oro por escudo. Sin embargo, falta una nota que preserve la alternativa/literalidad documentada por el POB inglés para שֵׁשׁ מֵאוֹת זָהָב יַעֲלֶה עַל הַצִּנָּה הָאֶחָת, especialmente la omisión explícita de la unidad en hebreo y la formulación literal ''subía sobre el escudo''.'
  spanish_quality_summary: El español es claro y legible. 'El rey Salomón hizo doscientos escudos grandes de oro batido' suena natural y fiel. La cláusula 'seiscientos siclos de oro iban sobre cada escudo' es comprensible, pero 'iban sobre' resulta algo rígido en español; 'se aplicaban a cada escudo' o 'se usaban para cada escudo' sería más idiomático, aunque se perdería parte de la imagen concreta. Puede mantenerse si se acompaña de la nota literal ya documentada. También conviene usar mayúscula inicial en la nota para consistencia editorial.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. 'Siclos' refleja bien la unidad implícita; 'escudos grandes' preserva la distinción de צִנָּה frente al verso siguiente; 'oro batido' es adecuado para זָהָב שָׁחוּט.
  issues:
  - severity: medium
    issue: Falta la nota sobre la literalidad y la unidad implícita en 'seiscientos siclos de oro'.
    rationale: El POB inglés conserva explícitamente que el hebreo dice literalmente 'seiscientos oro subía sobre el un escudo' y que 'siclos' está implícito. Esa decisión léxica significativa debe preservarse también en español.
  - severity: low
    issue: La expresión 'iban sobre cada escudo' suena algo poco idiomática en español.
    rationale: Aunque es defendible por cercanía al hebreo, en español moderno eclesial suena menos natural. No es un error grave, pero conviene suavizarla si se revisa el texto.
  revised_spanish_text: El rey Salomón hizo doscientos escudos grandes[a] de oro batido; seiscientos siclos de oro se aplicaban a cada escudo[b].
  revised_footnotes:
  - marker: a
    text: El término hebreo para «escudo» aquí se refiere a un escudo grande, probablemente distinto de los escudos más pequeños mencionados en el versículo siguiente.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «seiscientos de oro subía sobre el un escudo»; «siclos» está implícito como unidad de peso.
    reason: lexical_alternative
  revision_rationale: Se añade la nota faltante para preservar la alternativa/literalidad documentada por el POB inglés, incluyendo la unidad implícita «siclos». Además, se mejora ligeramente la naturalidad del español cambiando «iban sobre» por «se aplicaban a», mientras la nueva nota conserva la imagen más literal del hebreo.
