translation:
  language: es
  text: Da una porción a siete, y aun a ocho, porque no sabes qué calamidad vendrá sobre la tierra[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sobre el país». El hebreo אֶרֶץ puede significar «tierra» o «país» según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: תֶּן
  english_pob_choice: Give
  chosen_spanish: Da
  alternatives_spanish:
  - Da
  - Entrega
  - Distribuye
  lexicon: HALOT
  rationale: El imperativo qal 2ms de נתן pide una exhortación directa. «Da» es el imperativo natural en español y conserva la brevedad y fuerza del mandato.
- source_word: חֵלֶק
  english_pob_choice: a portion
  chosen_spanish: una porción
  alternatives_spanish:
  - una parte
  - una cuota
  - un reparto
  lexicon: HALOT
  rationale: חֵלֶק designa una porción o parte concreta. «Una porción» preserva la imagen de distribución sin volverla abstracta.
- source_word: לְשִׁבְעָה וְגַם לִשְׁמוֹנָה
  english_pob_choice: to seven, and even to eight
  chosen_spanish: a siete, y aun a ocho
  alternatives_spanish:
  - entre siete, y aun entre ocho
  - para siete, y aun para ocho
  - a siete o aun a ocho
  lexicon: HALOT
  rationale: Se conserva la fórmula numérica hebrea para mantener su valor proverbial y literario. «Y aun a ocho» reproduce la intensificación sin paraphrasear la imagen.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  - porque
  lexicon: HALOT
  rationale: Aquí introduce la razón del mandato. «Porque» es claro y natural en español; mantiene la relación causal del hebreo.
- source_word: לֹא תֵדַע
  english_pob_choice: you do not know
  chosen_spanish: no sabes
  alternatives_spanish:
  - no conoces
  - no puedes saber
  - no sabes
  lexicon: HALOT
  rationale: La negación con imperfecto expresa falta de conocimiento. «No sabes» suena natural en español y mantiene la fuerza directa de la advertencia.
- source_word: מַה יִּהְיֶה
  english_pob_choice: what ... will happen
  chosen_spanish: qué ... vendrá
  alternatives_spanish:
  - qué ... sucederá
  - qué ... ocurrirá
  - qué ... pasará
  lexicon: HALOT
  rationale: El hebreo usa היה con sentido de acontecimiento futuro. «Vendrá» comunica de forma idiomática la llegada de una calamidad sin perder el matiz eventivo.
- source_word: רָעָה
  english_pob_choice: disaster
  chosen_spanish: calamidad
  alternatives_spanish:
  - desastre
  - desgracia
  - infortunio
  lexicon: HALOT
  rationale: En este contexto no se trata de mal moral, sino de una desgracia o aflicción que cae sobre la tierra. «Calamidad» preserva el sentido concreto de adversidad.
- source_word: עַל הָאָרֶץ
  english_pob_choice: on the earth
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - sobre la tierra
  - en la tierra
  - sobre el país
  lexicon: HALOT
  rationale: El hebreo אֶרֶץ puede significar «tierra» o «tierra/país». Dado el alcance amplio del dicho sapiencial, «sobre la tierra» mantiene el sentido general y la nota de la POB preserva la alternativa «land».
theological_decisions:
- issue: Alcance de הָאָרֶץ
  english_pob_reading: earth
  chosen_spanish_reading: la tierra
  alternative_spanish_readings:
  - el país
  - la tierra/país
  rationale: No es una disputa doctrinal, pero sí de alcance semántico. «La tierra» conserva el horizonte amplio del texto sapiencial; la alternativa «país» sería más localizada y se deja como posibilidad léxica.
  doctrine_reference: Ecclesiastes 11:2; nota léxica sobre אֶרֶץ
translation_notes:
  revision_awareness: 'El texto hebreo y el audit trail en inglés muestran un alto grado de acuerdo: se mantiene la estructura proverbial, la fórmula numérica y el valor causal de כי, con la principal decisión abierta en el alcance de אֶרֶץ. No se requieren revisiones adicionales.'
  spanish_consistency_notes:
  - Se mantuvo el registro sapiencial conciso y directo.
  - «Calamidad» refleja el valor no moral de רָעָה en este contexto.
  - La nota al pie preserva la alternativa semántica de אֶרֶץ sin alterar el flujo del texto principal.
