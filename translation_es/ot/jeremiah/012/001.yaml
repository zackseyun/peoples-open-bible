base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/012/001.yaml
  text: 'You are righteous[a], O Yahweh, when I bring a case before you[c][b]; yet I would speak with you about matters of justice: Why does the way of the wicked prosper? Why are all who deal treacherously at ease?'
  footnotes:
  - marker: a
    text: Or, 'though I contend with you'; the Hebrew verb can carry the sense of contending or pleading a legal case.
    reason: alternative_reading
  - marker: b
    text: Hebrew 'judgments' or 'justice'; the plural likely refers to matters or cases concerning justice.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'all the treacherous of treachery,' an intensified expression for those who act very treacherously.
    reason: lexical_alternative
