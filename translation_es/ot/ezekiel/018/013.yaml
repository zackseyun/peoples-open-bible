translation:
  language: es
  text: Presta con interés y toma provecho[a]—¿y vivirá? No vivirá. Ha cometido todas estas abominaciones; ciertamente se le dará muerte[b]; su sangre estará sobre él[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Alternativa: «usura» para נֶשֶׁךְ y «aumento» para תַרְבִּית. El hebreo se refiere al interés o beneficio cobrado en un préstamo, especialmente en contexto explotador.'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «morir, morirá»; la expresión hebrea es enfática y funciona como sentencia de muerte.'
    reason: alternative_reading
  - marker: c
    text: 'Literalmente: «su sangre estará en él»; es un modismo que indica responsabilidad por su propia muerte.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּנֶּשֶׁךְ
  english_pob_choice: at interest
  chosen_spanish: da interés
  alternatives_spanish:
  - presta con interés
  - cobra interés
  - presta a usura
  lexicon: HALOT
  rationale: נֶשֶׁךְ designa interés cobrado en un préstamo, con fuerte carga ética en contextos proféticos. En español, «da interés» conserva la sencillez verbal y evita una formulación demasiado técnica; «a usura» sería más tradicional pero puede sonar más estrecho o arcaico.
- source_word: וְתַרְבִּית
  english_pob_choice: profit
  chosen_spanish: toma provecho
  alternatives_spanish:
  - toma ganancia
  - cobra aumento
  - toma interés
  lexicon: HALOT
  rationale: תַּרְבִּית funciona junto con נֶשֶׁךְ como término paralelo para la ganancia indebida del préstamo. «Provecho» comunica beneficio obtenido, sin borrar la relación semántica con la explotación financiera.
- source_word: וָחָי לֹא יִחְיֶה
  english_pob_choice: and shall he live? He shall not live.
  chosen_spanish: —¿y vivirá? No vivirá.
  alternatives_spanish:
  - —¿y vivirá? No vivirá.
  - —¿acaso vivirá? No vivirá.
  - —¿vivirá? No vivirá.
  lexicon: HALOT
  rationale: La secuencia hebrea mantiene una pregunta retórica seguida de negación enfática. El español reproduce ese choque retórico para no aplanar la fuerza del original.
- source_word: אֵת כָּל הַתּוֹעֵבוֹת הָאֵלֶּה
  english_pob_choice: all these abominations
  chosen_spanish: todas estas abominaciones
  alternatives_spanish:
  - todos estos actos abominables
  - todas estas cosas detestables
  lexicon: HALOT
  rationale: «Abominaciones» preserva el registro profético y la gravedad moral del término תּוֹעֵבֹת, como en la traducción inglesa auditada.
- source_word: מוֹת יוּמָת
  english_pob_choice: he shall surely be put to death
  chosen_spanish: ciertamente se le dará muerte
  alternatives_spanish:
  - será condenado a muerte
  - seguramente morirá
  - será puesto a muerte
  lexicon: HALOT
  rationale: La construcción intensiva expresa una sentencia de muerte. «Se le dará muerte» refleja el valor pasivo/judicial sin introducir más procedimiento del que ofrece el texto.
- source_word: דָּמָיו בּוֹ יִהְיֶה
  english_pob_choice: his blood shall be upon him
  chosen_spanish: su sangre caerá sobre él
  alternatives_spanish:
  - su sangre estará sobre él
  - su culpa de sangre recaerá sobre él
  lexicon: HALOT
  rationale: La imagen idiomática asigna responsabilidad por la propia muerte. «Caerá sobre él» mantiene la idea de carga/culpa sobre la persona en un español natural, sin explicitar en exceso el tecnicismo legal.
theological_decisions:
- issue: Registro judicial y fuerza del veredicto de muerte
  english_pob_reading: Render the clause as a judicial sentence ('he shall surely be put to death') without specifying civil procedure beyond the text.
  chosen_spanish_reading: ciertamente se le dará muerte
  alternative_spanish_readings:
  - será condenado a muerte
  - morirá
  rationale: El hebreo presenta una fórmula enfática de sentencia. La versión española conserva el peso judicial y evita suavizarla en una simple predicción de muerte o añadir detalles procesales no explicitados.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La base inglesa pasó por una revisión que ajustó la última cláusula de «upon himself» a «upon him» para acercarse más al hebreo. La redacción española sigue esa línea más formal y source-nearer, manteniendo el sentido idiomático de responsabilidad personal sin añadir reflexividad no requerida por el texto.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino cuando aparezca; este verso no lo contiene.
  - Se conserva «abominaciones» para תּוֹעֵבוֹת, conforme al registro profético del texto.
  - «Da interés» y «toma provecho» intentan reflejar la pareja léxica del hebreo sin fusionar los dos términos en uno solo.
  - La puntuación reproduce la pregunta retórica y la posterior negación enfática del original.
  - No se introduce «Cristo» ni terminología litúrgica ajena al versículo.
