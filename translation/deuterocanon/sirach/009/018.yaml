translation:
  text: In the hand of craftsmen a work will be praised, and the ruler of a people is wise in his speech.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The extant Cairo Geniza Hebrew for this verse reads a substantially different line: ''And if you come near, you will not incur guilt, lest he take your life.'' The Hebrew and Greek witnesses diverge sharply here.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐν χειρὶ
  chosen: In the hand of
  alternatives:
  - By the hand of
  - In the hands of
  lexicon: LSJ
  rationale: The Hebrew witness for this verse appears to diverge sharply from the Greek and is flagged with major mismatch, so the Greek parallel is used as actual translation input. The singular idiom ἐν χειρὶ is naturally rendered 'in the hand of' in English to preserve the metaphor of agency or control.
- source_word: τεχνιτῶν
  chosen: craftsmen
  alternatives:
  - artisans
  - skilled workers
  lexicon: LSJ
  rationale: τεχνίτης denotes a skilled maker or artisan. 'Craftsmen' preserves the concrete sense and fits the gender-accurate policy better than a flattened abstract term. 'Artisans' is possible, but 'craftsmen' is more natural in this proverb-like line.
- source_word: ἔργον
  chosen: a work
  alternatives:
  - work
  - deed
  - craft
  lexicon: LSJ
  rationale: Here ἔργον refers to the product made by craftsmen, not a moral deed in the abstract. 'A work' keeps the object sense broad without over-specifying the kind of artifact.
- source_word: ἐπαινεθήσεται
  chosen: will be praised
  alternatives:
  - is praised
  - wins praise
  lexicon: LSJ
  rationale: Future passive is straightforwardly represented by 'will be praised.' This preserves the Greek verbal form and the gnomic-proverbial force.
- source_word: ὁ ἡγούμενος
  chosen: the ruler
  alternatives:
  - the leader
  - the governor
  lexicon: LSJ
  rationale: The term denotes one who leads or governs. 'Ruler' fits the public-political context created by 'people' and avoids sounding too informal. 'Leader' is possible but less weighty.
- source_word: λαοῦ
  chosen: of a people
  alternatives:
  - of the people
  - of a nation
  lexicon: LSJ
  rationale: Anarthrous genitive is well represented by 'of a people,' giving the line a general proverbial sense rather than referring to one specific people.
- source_word: σοφὸς
  chosen: is wise
  alternatives:
  - shows wisdom
  - is skillful
  lexicon: LSJ
  rationale: The adjective is predicative and should remain explicit. 'Is wise' is the plain sense and preserves the wisdom-literature register.
- source_word: ἐν λόγῳ αὐτοῦ
  chosen: in his speech
  alternatives:
  - in his word
  - by what he says
  lexicon: LSJ
  rationale: λόγος here most naturally refers to speech or utterance in context. 'In his speech' is idiomatic and preserves the instrumental/situational nuance without paraphrase.
