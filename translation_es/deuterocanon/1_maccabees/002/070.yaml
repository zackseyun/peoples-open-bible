translation:
  language: es
  text: Y murió en el año ciento cuarenta y seis[a], y sus hijos lo sepultaron en los sepulcros de sus antepasados en Modeín, y todo Israel hizo gran duelo por él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Es decir, probablemente el año ciento cuarenta y seis de la era seléucida.
    reason: cultural_note
lexical_decisions:
- source_word: ἀπέθανεν
  english_pob_choice: died
  chosen_spanish: murió
  alternatives_spanish:
  - falleció
  - murió
  lexicon: BDAG
  rationale: El griego expresa la muerte de manera directa. «Murió» es la equivalencia natural, clara y no eufemística en español; mantiene el tono simple del original y del POB inglés.
- source_word: ἐν τῷ ἕκτῳ καὶ τεσσερακοστῷ καὶ ἑκατοστῷ ἔτει
  english_pob_choice: in the one hundred forty-sixth year
  chosen_spanish: en el año ciento cuarenta y seis
  alternatives_spanish:
  - en el año ciento cuarenta y seis
  - en el año ciento cuarenta y seis de la era seleúcida
  lexicon: LSJ
  rationale: La fórmula griega se traduce de forma directa y natural. Se evita añadir «de la era seleúcida» al texto principal, porque el griego no lo explicita, aunque esa sea la probable referencia histórica.
- source_word: ἔθαψαν
  english_pob_choice: buried
  chosen_spanish: sepultaron
  alternatives_spanish:
  - enterraron
  - sepultaron
  lexicon: BDAG
  rationale: «Sepultaron» reproduce con dignidad el verbo de entierro y mantiene un registro bíblico claro en español. «Enterraron» sería igualmente posible, pero algo más coloquial.
- source_word: τάφοις πατέρων αὐτοῦ
  english_pob_choice: the tombs of his fathers
  chosen_spanish: los sepulcros de sus padres
  alternatives_spanish:
  - los sepulcros de sus padres
  - las tumbas de sus padres
  - los sepulcros ancestrales
  lexicon: LSJ
  rationale: «Sepulcros de sus padres» conserva la relación familiar/ancestral del griego sin suavizarla. «Tumbas» sería posible, pero «sepulcros» refleja mejor el tono formal del pasaje.
- source_word: Μωδεείν
  english_pob_choice: Modein
  chosen_spanish: Modeín
  alternatives_spanish:
  - Modein
  - Modín
  lexicon: LSJ
  rationale: Se conserva el nombre propio como transliteración. «Modeín» adapta la acentuación al español y sigue de cerca la forma griega transmitida por el texto.
- source_word: ἐκόψαντο
  english_pob_choice: mourned
  chosen_spanish: lo lloró
  alternatives_spanish:
  - lo lloró
  - lo lamentó
  - se lamentó por él
  lexicon: BDAG
  rationale: El verbo puede implicar duelo ritual, pero el contexto inmediato culmina en una expresión intensiva de lamento colectivo. «Lo lloró» transmite de manera idiomática y sobria el duelo público sin añadir un gesto específico no explicitado.
- source_word: κοπετὸν μέγαν
  english_pob_choice: with great mourning
  chosen_spanish: con gran llanto
  alternatives_spanish:
  - con gran llanto
  - con gran duelo
  - con gran lamentación
  lexicon: LSJ
  rationale: La construcción intensifica el duelo. «Gran llanto» conserva la fuerza emotiva y funciona bien en español, aunque «gran duelo» o «gran lamentación» también serían posibles.
- source_word: πᾶς Ἰσραήλ
  english_pob_choice: all Israel
  chosen_spanish: todo Israel
  alternatives_spanish:
  - todo Israel
  - todo el Israel
  lexicon: BDAG
  rationale: «Todo Israel» es la forma natural para expresar el colectivo completo del pueblo. Mantiene la amplitud inclusiva del griego sin forzar una formulación menos idiomática.
theological_decisions:
- issue: Referencia cronológica implícita
  english_pob_reading: Rendered the date straightforwardly as 'the one hundred forty-sixth year' without specifying the era in the main text.
  chosen_spanish_reading: Se traduce simplemente «en el año ciento cuarenta y seis» sin añadir la era en el texto principal.
  alternative_spanish_readings:
  - en el año ciento cuarenta y seis de la era seleúcida
  rationale: El griego no nombra la era, así que el texto principal debe conservar esa sobriedad. La identificación histórica es probable, pero pertenece mejor a una nota que a la línea de traducción.
  doctrine_reference: Primacía del texto fuente y preservación de la tensión histórica donde el original no explicita más.
translation_notes:
  revision_awareness: 'Coincide con la lectura aprobada del inglés POB y con la revisión más reciente: no se observan cambios necesarios respecto del sentido, la cronología ni el tono funerario del pasaje.'
  spanish_consistency_notes:
  - Se mantiene el nombre propio como «Modeín», en coherencia con una transliteración española legible.
  - Se conserva un registro sobrio y bíblico con «sepultaron» y «sepulcros», evitando un lenguaje demasiado moderno o demasiado arcaico.
  - La nota cronológica se coloca como pie de página para no introducir interpretación histórica en el cuerpo principal.
