translation:
  language: es
  text: para que la tierra más preciosa de todas ante ti reciba una colonia digna de los hijos[a] de Dios[b][c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los hijos e hijas de Dios» o «los hijos/niños de Dios». El griego παίδων puede referirse a hijos o niños en sentido amplio; aquí expresa relación filial con Dios sin especificar sexo.
    reason: lexical_alternative
  - marker: b
    text: O «un asentamiento digno» para «una colonia digna». El griego ἀποικία puede significar una colonia o una población establecida.
    reason: lexical_alternative
  - marker: c
    text: Literalmente, «la tierra más preciosa de todas ante ti».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: LSJ
  rationale: Introduce finalidad de manera natural en español y conserva el valor telico del griego sin volverlo más interpretativo de lo necesario.
- source_word: ἀξίαν
  english_pob_choice: worthy
  chosen_spanish: digna
  alternatives_spanish:
  - merecedora
  - apropiada
  - digna de
  lexicon: LSJ
  rationale: Como modificador de ἀποικίαν, 'digna' transmite adecuación moral/qualitativa con fluidez en español y mantiene la idea de aptitud sin añadir matices ajenos.
- source_word: ἀποικίαν
  english_pob_choice: colony
  chosen_spanish: colonia
  alternatives_spanish:
  - asentamiento
  - población establecida
  lexicon: LSJ
  rationale: '''Colonia'' conserva la imagen concreta de un grupo establecido en una tierra, que es la decisión auditada del POB inglés y corresponde al sentido léxico principal.'
- source_word: δέξηται
  english_pob_choice: might receive
  chosen_spanish: reciba
  alternatives_spanish:
  - pueda recibir
  - llegue a recibir
  lexicon: LSJ
  rationale: El subjuntivo final se vierte naturalmente con 'para que' + subjuntivo. 'Reciba' mantiene sobriedad y la dirección del verbo sin sobreexplicar el modo.
- source_word: θεοῦ παίδων
  english_pob_choice: God's children
  chosen_spanish: los hijos de Dios
  alternatives_spanish:
  - los niños de Dios
  - los hijos/niños de Dios
  - los hijos de Dios
  lexicon: LSJ
  rationale: Aunque el inglés POB eligió un término inclusivo, en español 'hijos de Dios' es la forma más natural y fiel al sustantivo plural sin forzar un giro poco idiomático como 'hijos e hijas'; aquí no se introduce una restricción masculina exclusiva, sino una designación filial convencional del grupo.
- source_word: ἡ ... γῆ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  - la región
  lexicon: LSJ
  rationale: El referente es la tierra concreta prometida/dispensada en el contexto, no la tierra como planeta; 'tierra' es idiomático en español bíblico y preserva el sentido local.
- source_word: ἡ παρὰ σοὶ πασῶν τιμιωτάτη
  english_pob_choice: the land most precious of all in your sight
  chosen_spanish: la más preciosa de todas a tus ojos
  alternatives_spanish:
  - la más valiosa de todas ante ti
  - la más honrada de todas ante ti
  lexicon: LSJ
  rationale: '''A tus ojos'' reproduce bien la evaluación desde la perspectiva divina que expresa παρὰ σοὶ, y el superlativo τιμιωτάτη se vierte con ''la más preciosa'' para conservar la valoración máxima sin rigidizar el sintagma.'
theological_decisions:
- issue: Expresión filial θεοῦ παίδων
  english_pob_reading: God's children
  chosen_spanish_reading: los hijos de Dios
  alternative_spanish_readings:
  - los niños de Dios
  - los hijos/niños de Dios
  rationale: La frase señala pertenencia y relación filial con Dios. En español, 'los hijos de Dios' es una fórmula bíblica plenamente inteligible y evita forzar una solución más marcada o menos natural; no pretende masculinizar el referente, sino reflejar el uso genérico tradicional del plural español en este contexto.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Relación entre 'colonia' y 'asentamiento'
  english_pob_reading: a worthy colony / a worthy settlement
  chosen_spanish_reading: una colonia digna
  alternative_spanish_readings:
  - un asentamiento digno
  - una población establecida digna
  rationale: El POB audita explícitamente la alternativa 'settlement' frente a 'colony'. 'Colonia' conserva la concreción histórica y léxica del término griego ἀποικία sin diluir la imagen de un pueblo implantado en una tierra preparada por Dios.
  doctrine_reference: LSJ; audit trail in English POB notes
- issue: Evaluación divina de la tierra
  english_pob_reading: the land most precious of all in your sight
  chosen_spanish_reading: la tierra, la más preciosa de todas a tus ojos
  alternative_spanish_readings:
  - la tierra, la más honrada de todas ante ti
  - la tierra, la más valiosa de todas a tus ojos
  rationale: La expresión no enseña una doctrina nueva, pero sí una valoración divina explícita. 'A tus ojos' preserva la perspectiva de juicio/estima del original y evita convertir la frase en una simple apreciación humana.
  doctrine_reference: None
translation_notes:
  revision_awareness: 'El texto español sigue de cerca el estado final del POB inglés, que quedó sin cambios en la última revisión y fue marcado con acuerdo alto. Se conservaron las dos tensiones auditadas principales: ἀποικία como «colonia» con alternativa «asentamiento», y la evaluación divina de la tierra expresada literalmente con «a tus ojos/ante ti».'
  spanish_consistency_notes:
  - Se mantuvo el registro bíblico sobrio y moderno, evitando la máscara litúrgica «SEÑOR» porque el versículo no contiene el Tetragrámaton explícito en la forma fuente dada.
  - '''Dios'' se conservó en genitivo de pertenencia (''hijos de Dios'') para reflejar θεοῦ sin perder naturalidad española.'
  - '''Tierra'' se eligió frente a ''mundo'' o ''país'' porque el contexto habla de una tierra concreta preparada para un pueblo.'
  - No se expandió 'colonia' a una glosa en el cuerpo del texto para no desdibujar la decisión lexical auditada; la alternativa queda en nota.
  - El orden sintáctico español se adaptó mínimamente para sonar natural sin añadir elementos interpretativos no presentes en el griego.
