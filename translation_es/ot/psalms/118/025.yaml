translation:
  language: es
  text: ¡Por favor[a], Yahvé, salva[b], por favor! ¡Por favor, Yahvé, concede éxito[c], por favor!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La partícula hebrea אָנָּא expresa una súplica urgente; aquí funciona como ruego enfático.
    reason: lexical_alternative
  - marker: b
    text: Hebreo «salva, por favor», de donde se deriva la expresión litúrgica «Hosanna».
    reason: lexical_alternative
  - marker: c
    text: También puede entenderse como «haz prosperar» o «haz que prospere»; el hebreo pide que Dios cause éxito o haga prosperar.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָנָּא
  english_pob_choice: Please
  chosen_spanish: Por favor
  alternatives_spanish:
  - Ah
  - Te ruego
  - Ruego
  lexicon: HALOT
  rationale: La partícula expresa una súplica urgente; «por favor» transmite el ruego de manera natural en español moderno sin perder el tono de súplica.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: El Tetragrámaton se rinde con el nombre propio «Yahvé», conforme a la terminología del proyecto y para preservar el nombre divino en lugar de sustituirlo por un título.
- source_word: הוֹשִׁיעָה
  english_pob_choice: save
  chosen_spanish: salva
  alternatives_spanish:
  - sálvanos
  - libra
  - da salvación
  lexicon: HALOT
  rationale: El imperativo hifil de ישׁע aquí es una petición directa de rescate/salvación; «salva» mantiene la brevedad y la fuerza del clamor litúrgico.
- source_word: נָּא
  english_pob_choice: please
  chosen_spanish: por favor
  alternatives_spanish:
  - ahora
  - te ruego
  - por favor, te ruego
  lexicon: HALOT
  rationale: La partícula intensifica la súplica y no introduce temporalidad; repetir «por favor» preserva su valor exhortativo de manera comprensible en español.
- source_word: הַצְלִיחָה
  english_pob_choice: grant success
  chosen_spanish: concede éxito
  alternatives_spanish:
  - haz prosperar
  - haz que prospere
  - da prosperidad
  lexicon: HALOT
  rationale: El hifil de צלח pide que Dios cause éxito o prosperidad. «Concede éxito» es idiomático en español y evita restringir el sentido a prosperidad material.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: Se preserva el nombre del pacto como nombre propio, no como título sustitutorio. La forma española «Yahvé» es la opción estándar del proyecto para el Tetragrámaton.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Repetición enfática de la súplica
  english_pob_reading: Please ... please! Please ... please!
  chosen_spanish_reading: Por favor ... por favor. Por favor ... por favor.
  alternative_spanish_readings:
  - Te ruego ... te ruego.
  - Por favor ... ahora.
  rationale: El hebreo repite partículas de súplica; la traducción conserva esa reiteración para no suavizar la intensidad del ruego.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: Original-language primacy over stylistic smoothing'
translation_notes:
  revision_awareness: 'La redacción sigue el último pasaje de revisión del contexto en inglés: se mantiene la repetición directa de las partículas de súplica, sin añadir «ahora» ni un objeto explícito que el hebreo no exige de forma expresa. Se conserva además la decisión auditada de traducir el Tetragrámaton con el nombre propio divino.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma coherente con el estándar del proyecto para יְהוָה.
  - Se evita «SEÑOR» como sustituto del nombre divino.
  - Se mantiene la doble súplica paralela del verso para reflejar la estructura hebrea.
  - «Concede éxito» conserva el campo semántico de prosperar sin introducir un matiz ajeno al contexto.
