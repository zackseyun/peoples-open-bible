translation:
  language: es
  text: Si hay hambruna en la tierra, peste, tizón, añublo, langosta u oruga[a]; si sus enemigos lo sitian en la tierra de sus puertas[b]; cualquier plaga y cualquier enfermedad que haya—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'langosta devoradora' para חָסִיל; el término hebreo se refiere en general a un insecto que devora la cosecha, y la especie exacta es incierta.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, 'en la tierra de sus puertas', donde 'puertas' representa metonímicamente las ciudades o poblaciones de la tierra.
    reason: cultural_note
lexical_decisions:
- source_word: רָעָב
  english_pob_choice: famine
  chosen_spanish: hambre
  alternatives_spanish:
  - hambruna
  - famine
  lexicon: HALOT
  rationale: En listas de calamidades, el hebreo puede abarcar una carencia extrema de alimentos. Opté por 'hambre' para mantener el sentido amplio y natural en español; 'hambruna' sería más técnico, pero menos literal al matiz de necesidad general.
- source_word: דֶּבֶר
  english_pob_choice: plague
  chosen_spanish: peste
  alternatives_spanish:
  - plaga
  - pestilencia
  lexicon: HALOT
  rationale: El término designa una enfermedad epidémica o devastadora. 'Peste' comunica bien la gravedad en español y conserva la fuerza de calamidad sanitaria que el inglés POB expresó con 'plague'.
- source_word: שִׁדָּפוֹן
  english_pob_choice: blight
  chosen_spanish: tizón
  alternatives_spanish:
  - sequía quemante
  - blight
  lexicon: HALOT
  rationale: El hebreo alude a daño destructivo en la cosecha, a menudo por calor o viento abrasador. 'Tizón' es un equivalente agrícola breve y comprensible; mantiene el carácter de daño vegetal sin sobreexplicar.
- source_word: וְיֵרָקוֹן
  english_pob_choice: mildew
  chosen_spanish: añublo
  alternatives_spanish:
  - mildiu
  - palidez
  lexicon: HALOT
  rationale: El término refiere una enfermedad vegetal que produce palidez o amarilleo. 'Añublo' funciona en español como daño de cultivo y guarda la coordinación con 'tizón' en la lista de desastres agrícolas.
- source_word: אַרְבֶּה
  english_pob_choice: locust
  chosen_spanish: langosta
  alternatives_spanish:
  - saltamontes
  lexicon: HALOT
  rationale: En contextos de juicio, el término designa la langosta devastadora. 'Langosta' es el equivalente estándar y más transparente para lectores bíblicos en español.
- source_word: חָסִיל
  english_pob_choice: caterpillar
  chosen_spanish: oruga
  alternatives_spanish:
  - langosta devoradora
  - insecto devorador
  lexicon: HALOT
  rationale: El referente zoológico exacto es incierto; el inglés POB preservó esa tensión con una opción tradicional y nota. En español, 'oruga' mantiene la idea de insecto devorador de cultivos sin fijar indebidamente la especie.
- source_word: כִּי יָצַר לוֹ אֹיְבָיו
  english_pob_choice: if his enemies besiege him
  chosen_spanish: si sus enemigos lo sitian
  alternatives_spanish:
  - si sus enemigos lo acosan
  - si sus enemigos lo estrechan
  lexicon: HALOT
  rationale: El verbo expresa presionar/estrechar militarmente. 'Sitiar' es la opción más precisa en español para el contexto de guerra y conserva la fuerza del asedio implícito en el hebreo y en la traducción inglesa.
- source_word: בְּאֶרֶץ שְׁעָרָיו
  english_pob_choice: in the land of his gates
  chosen_spanish: en la tierra de sus puertas
  alternatives_spanish:
  - en la tierra de sus ciudades
  - en sus poblaciones
  lexicon: HALOT
  rationale: 'Conservo la imagen literal de ''puertas'' para reflejar el hebreo y el audit trail del inglés POB. La expresión es metonímica: ''puertas'' por ciudades o pueblos fortificados.'
- source_word: כָּל נֶגַע
  english_pob_choice: whatever plague
  chosen_spanish: cualquier plaga
  alternatives_spanish:
  - cualquier aflicción
  - cualquier golpe
  lexicon: HALOT
  rationale: נֶגַע es un término amplio para golpe, aflicción o plaga. Aquí el paralelismo con enfermedad favorece 'plaga', manteniendo la amplitud del original.
- source_word: כָל מַחֲלָה
  english_pob_choice: whatever sickness
  chosen_spanish: cualquier enfermedad
  alternatives_spanish:
  - cualquier dolencia
  - cualquier mal
  lexicon: HALOT
  rationale: מַחֲלָה significa enfermedad o dolencia. 'Enfermedad' es el equivalente más directo y claro en español, y encaja con el paralelismo del verso.
translation_notes:
  revision_awareness: El pasaje coincide estrechamente con la versión inglesa auditada; no se documentaron revisiones sustanciales ni cambios de lectura en el expediente proporcionado. La principal labor fue decidir equivalentes españoles para la lista de calamidades y conservar la metonimia de 'puertas'.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' según la norma del proyecto cuando no aparece en este versículo, sin introducir sustituciones innecesarias.
  - Se conservó una estructura condicional acumulativa fiel al hebreo y al inglés POB.
  - Se prefirió una sintaxis natural en español sin perder el orden de las calamidades ni la repetición enfática de 'cualquier'.
  - Los términos agrícolas se ajustaron a español bíblico comprensible, evitando tecnicismos excesivos.
