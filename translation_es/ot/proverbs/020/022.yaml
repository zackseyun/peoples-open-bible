review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido básico del hebreo: prohibición de tomar represalia personal, llamado a esperar en Yahvé y promesa de salvación/liberación. Conserva correctamente el nombre divino «Yahvé» según la política del proyecto y mantiene «salvará» para ישׁע. Sin embargo, la cita «Yo pagaré el mal» no comunica con suficiente claridad el sentido retaliatorio de אֲשַׁלְּמָה רָע; en español suena como pagar por el mal o compensarlo, no devolver mal por mal.'
  spanish_quality_summary: La redacción es clara y digna, pero «Yo pagaré el mal» resulta poco idiomática y potencialmente ambigua en español. «Espera en Yahvé» es aceptable y legible; no obstante, para reflejar mejor el hebreo y armonizar con la nota, conviene una formulación más claramente retaliatoria en la cita directa. Las notas son útiles, pero la nota a debe corregirse para no perpetuar una alternativa poco natural como «pagar de vuelta el mal».
  glossary_alignment: 'Buena alineación general con la terminología del proyecto: יהוה → «Yahvé», ישׁע → «salvará», רָע → «mal». La única desalineación práctica está en אֲשַׁלְּמָה, donde el español debería expresar «devolver/pagar mal por mal» más claramente para preservar la fuerza semántica de represalia documentada en la auditoría inglesa.'
  issues:
  - severity: medium
    issue: «Yo pagaré el mal» es ambiguo en español.
    rationale: Puede entenderse como pagar por el mal, expiarlo o compensarlo, en vez de devolver mal por mal. El hebreo y la auditoría inglesa señalan explícitamente una represalia recíproca.
  - severity: low
    issue: La nota léxica a usa formulaciones poco naturales.
    rationale: «Pagar de vuelta el mal» no suena idiomático en español general. Conviene usar «devolveré el mal» o «pagaré mal por mal».
  revised_spanish_text: 'No digas[a]: «Devolveré mal por mal»; espera[b] en Yahvé, y él te salvará[c].'
