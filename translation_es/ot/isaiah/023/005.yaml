translation:
  language: es
  text: Cuando llegue la noticia[a] a Egipto, se retorcerán ante la noticia de Tiro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «el informe» o «el reporte». El hebreo שֵׁמַע puede significar noticia, informe o reporte; aquí se eligió «noticia» por naturalidad en español y para conservar el paralelismo con la segunda mitad del versículo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּאֲשֶׁר
  english_pob_choice: When
  chosen_spanish: Cuando
  alternatives_spanish:
  - Así como
  - Al tiempo que
  lexicon: HALOT
  rationale: 'La cláusula es temporal: introduce el momento en que ocurre la reacción. «Cuando» comunica mejor ese valor que una comparación más literal.'
- source_word: שֵׁמַע
  english_pob_choice: the report comes
  chosen_spanish: la noticia
  alternatives_spanish:
  - el informe
  - el reporte
  - el rumor
  lexicon: HALOT
  rationale: En español, «noticia» es la opción más natural y digna para transmitir שֵׁמַע como noticia/reportaje oído o recibido. Evita una formulación artificial como «el oír».
- source_word: לְמִצְרָיִם
  english_pob_choice: to Egypt
  chosen_spanish: a Egipto
  alternatives_spanish:
  - para Egipto
  - acerca de Egipto
  lexicon: HALOT
  rationale: El ל marca dirección/destino de la noticia; «a Egipto» conserva ese movimiento hacia el receptor de la noticia.
- source_word: יָחִילוּ
  english_pob_choice: they will writhe
  chosen_spanish: se retorcerán
  alternatives_spanish:
  - estarán con angustia
  - temblarán
  - estarán doloridos
  lexicon: HALOT
  rationale: El verbo expresa agitación física o angustia intensa. «Se retorcerán» mantiene la fuerza corporal del hebreo sin sonar excesivamente literal o médico en español.
- source_word: כְּשֵׁמַע
  english_pob_choice: at the report
  chosen_spanish: al oír la noticia
  alternatives_spanish:
  - ante la noticia
  - al recibir la noticia
  - por la noticia
  lexicon: HALOT
  rationale: El כ introduce la ocasión o desencadenante. En español, «al oír» expresa de modo natural el momento de reacción y refleja el vínculo con la noticia escuchada.
- source_word: צֹר
  english_pob_choice: Tyre
  chosen_spanish: Tiro
  alternatives_spanish:
  - Tiro
  - la ciudad de Tiro
  lexicon: HALOT
  rationale: «Tiro» es el topónimo estándar en español para צֹר, equivalente al inglés «Tyre».
translation_notes:
  revision_awareness: El texto inglés final del POB fue revisado desde «about Tyre» a «of Tyre» para mantener una relación más directa con la construcción hebrea; en español se preserva esa relación mediante «la noticia de Tiro», sin añadir una paráfrasis explicativa.
  spanish_consistency_notes:
  - Se mantiene «Tiro» como forma española estándar del nombre propio.
  - Se traduce el primer שֵׁמַע con «noticia» y se reutiliza en la segunda cola para conservar el paralelismo del hebreo.
  - No se introduce «SEÑOR» ni terminología teológica ajena al versículo.
  - La voz reflexiva «se retorcerán» expresa mejor la reacción colectiva que una pasiva perifrástica en español.
  - La puntuación conserva una sola oración con dos miembros paralelos, acorde al hebreo.
