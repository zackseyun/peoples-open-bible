  glossary_alignment: No hay conflicto con la terminología del proyecto. «Rey del cielo» refleja bien τῷ βασιλεῖ τοῦ οὐρανοῦ; no hay ocurrencias de términos sensibles como Yahvé/Mesías. La decisión de mantener «voto» en vez de «oración» concuerda con la justificación léxica y teológica documentada.
