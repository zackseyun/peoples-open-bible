translation:
  language: es
  text: Y prepárate para la mañana, y por la mañana sube[a] al monte Sinaí y preséntate[b] allí ante mí, en la cima del monte.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ve al monte Sinaí».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «ponte allí ante mí, en la cima del monte».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וֶהְיֵה / וְהְיֵה
  english_pob_choice: be
  chosen_spanish: prepárate
  alternatives_spanish:
  - sé
  - estate listo
  lexicon: HALOT
  rationale: El verbo היה en este contexto funciona como mandato de disposición para la acción siguiente. En español, «prepárate» comunica mejor esa disposición anticipada que un simple «sé», que sonaría demasiado estático.
- source_word: נָכוֹן
  english_pob_choice: ready
  chosen_spanish: listo / preparado
  alternatives_spanish:
  - establecido
  - firmado
  lexicon: HALOT
  rationale: El adjetivo describe estado de preparación. «Prepárate» ya absorbe la idea, pero la nota lexical reconoce que el valor básico es «listo/preparado», no «establecido» en sentido abstracto.
- source_word: לַבֹּקֶר
  english_pob_choice: by the morning
  chosen_spanish: para la mañana
  alternatives_spanish:
  - antes de la mañana
  - al llegar la mañana
  lexicon: HALOT
  rationale: La preposición lamed aquí marca referencia temporal anticipada. «Para la mañana» expresa bien la preparación previa, sin forzar una equivalencia mecánica con el inglés.
- source_word: וְעָלִיתָ
  english_pob_choice: come up
  chosen_spanish: sube
  alternatives_spanish:
  - asciende
  - ve arriba
  lexicon: HALOT
  rationale: עלה en imperativo es naturalmente «subir». En español, «sube» es claro y fiel; no se añade el matiz de dirección del inglés «come up» más allá de lo que exige la escena.
- source_word: בַבֹּקֶר
  english_pob_choice: in the morning
  chosen_spanish: por la mañana
  alternatives_spanish:
  - en la mañana
  - al amanecer
  lexicon: HALOT
  rationale: Se conserva la segunda referencia temporal como un momento en la mañana, diferenciándola de la preparación previa con «para la mañana».
- source_word: אֶל הַר סִינַי
  english_pob_choice: to Mount Sinai
  chosen_spanish: al monte Sinaí
  alternatives_spanish:
  - al monte de Sinaí
  - a la montaña de Sinaí
  lexicon: HALOT
  rationale: El nombre propio se mantiene en forma natural para el español bíblico. «Monte» conserva la imagen topográfica del hebreo.
- source_word: וְנִצַּבְתָּ
  english_pob_choice: present yourself
  chosen_spanish: preséntate
  alternatives_spanish:
  - ponte de pie
  - haz tu aparición
  lexicon: HALOT
  rationale: El nifal de נצב puede significar «ponerse de pie» o «tomar posición», pero en este contexto de comparecencia ante Dios la forma reflexiva «preséntate» comunica el acto de presentarse delante de él sin perder solemnidad.
- source_word: לִי
  english_pob_choice: to me
  chosen_spanish: ante mí
  alternatives_spanish:
  - para mí
  - a mí
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «para mí / a mí», en español la expresión natural en un contexto de comparecencia es «ante mí». Conserva la orientación personal sin volverla extraña.
- source_word: שָׁם
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  - en ese lugar
  lexicon: HALOT
  rationale: Adverbio locativo simple; «allí» es la forma más sobria y adecuada en español.
- source_word: עַל רֹאשׁ הָהָר
  english_pob_choice: on the top of the mountain
  chosen_spanish: en la cima del monte
  alternatives_spanish:
  - sobre la cima del monte
  - en la cumbre del monte
  lexicon: HALOT
  rationale: רֹאשׁ, literalmente «cabeza», se vierte por su sentido topográfico como «cima». «Monte» mantiene el registro bíblico natural en español. Se prefirió «en» a «sobre» por fluidez idiomática.
theological_decisions:
- issue: Orientación de la subida ante la voz divina
  english_pob_reading: come up
  chosen_spanish_reading: sube
  alternative_spanish_readings:
  - ven arriba
  - asciende
  rationale: El hebreo permite tanto «subir» como un verbo con orientación hacia el hablante. En español, «sube» conserva el mandato sin imponer una perspectiva hablante-céntrica que no resulte natural en el texto receptor.
  doctrine_reference: Principio de prioridad del texto fuente y equivalencia óptima con claridad receptiva.
- issue: Valor de comparecencia ante Dios en וְנִצַּבְתָּ לִי
  english_pob_reading: present yourself there to me
  chosen_spanish_reading: preséntate allí ante mí
  alternative_spanish_readings:
  - ponte allí delante de mí
  - preséntate allí para mí
  rationale: La frase describe comparecencia solemne ante la presencia divina. «Ante mí» expresa esa relación sin sustituirla por lenguaje eclesiástico posterior ni por una paráfrasis excesiva.
  doctrine_reference: Reverencia teológica y transparencia lexical frente al hebreo.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el hebreo masorético de Éxodo 34:2 y refleja el mismo doble marco temporal: primero la preparación para la mañana y luego la subida por la mañana. Se conservó la ambigüedad de וְעָלִיתָ como «sube», mientras que la comparecencia de וְנִצַּבְתָּ לִי se tradujo con un verbo reflexivo natural en español.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo exige explícitamente; en este versículo no aparece el tetragrámaton.
  - Se mantiene «Sinaí» como topónimo estándar.
  - «Monte» y «cima» preservan la imagen topográfica de רֹאשׁ הָהָר.
  - Se evita «Señor» porque no corresponde al contenido léxico de este versículo.
