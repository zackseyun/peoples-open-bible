translation:
  language: es
  text: Luz y el sol se alzó[a], y los humildes[b] fueron exaltados y devoraron a los gloriosos[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la claridad del día» para φῶς; la lectura principal conserva la apertura breve y simbólica del griego.
    reason: lexical_alternative
  - marker: b
    text: O «los de condición humilde»; el griego puede aludir tanto a humildad interior como a bajo rango social, y el texto principal preserva la inversión de estatus.
    reason: lexical_alternative
  - marker: c
    text: O «los honrados» o «los nobles»; el griego se refiere a personas tenidas por honorables o renombradas.
    reason: lexical_alternative
lexical_decisions:
- source_word: φῶς
  english_pob_choice: Light
  chosen_spanish: La luz
  alternatives_spanish:
  - Luz
  - La claridad
  lexicon: LSJ
  rationale: φῶς es un sustantivo concreto y simbólico; «la luz» conserva la imagen abierta del texto griego y mantiene el paralelismo con «el sol».
- source_word: ὁ ἥλιος
  english_pob_choice: the sun
  chosen_spanish: el sol
  alternatives_spanish:
  - el astro solar
  - el sol mismo
  lexicon: LSJ
  rationale: Traducción directa y natural del artículo más el sustantivo; no requiere ampliación en español.
- source_word: ἀνέτειλεν
  english_pob_choice: rose
  chosen_spanish: salieron
  alternatives_spanish:
  - salió
  - amaneció
  - se levantó
  lexicon: LSJ
  rationale: El verbo griego expresa la salida/rising de los astros; en español, con sujeto compuesto «la luz y el sol», «salieron» preserva la imagen astronómica sin forzar un giro más interpretativo como «amaneció».
- source_word: οἱ ταπεινοὶ
  english_pob_choice: the lowly
  chosen_spanish: los humildes
  alternatives_spanish:
  - los bajos
  - los de condición humilde
  - los abatidos
  lexicon: LSJ
  rationale: El POB inglés mantiene la tensión entre disposición y estatus social. En español, «los humildes» conserva ambas posibilidades y sigue de cerca la alternativa lexical documentada.
- source_word: ὑψώθησαν
  english_pob_choice: were exalted
  chosen_spanish: fueron exaltados
  alternatives_spanish:
  - fueron levantados
  - fueron enaltecidos
  - fueron elevados
  lexicon: LSJ
  rationale: El pasivo de elevación se rinde con un pasivo equivalente y solemne. «Exaltados» mantiene la reversión de estatus sin introducir una explicación ajena al texto.
- source_word: κατέφαγον
  english_pob_choice: devoured
  chosen_spanish: devoraron
  alternatives_spanish:
  - comieron
  - consumieron
  - se tragaron
  lexicon: LSJ
  rationale: El verbo intensivo y violento pide un equivalente fuerte. «Devoraron» conserva el dramatismo y la metáfora de victoria/completamiento que el griego sugiere.
- source_word: τοὺς ἐνδόξους
  english_pob_choice: the glorious
  chosen_spanish: los gloriosos
  alternatives_spanish:
  - los honrados
  - los nobles
  - los ilustres
  lexicon: LSJ
  rationale: Se conserva la forma adjetival cercana al griego para mantener el contraste abrupto del verso. «Los gloriosos» es menos interpretativo que «los honrados» y reproduce el valor de ἔνδοξος tal como lo entendió la POB inglesa.
theological_decisions:
- issue: Preservación de la imagen de reversión social y triunfo sin explicar el símbolo
  english_pob_reading: 'Preserve the imagery directly: ''Light and the sun rose ... the lowly were exalted and devoured the glorious.'''
  chosen_spanish_reading: 'Conservar directamente la imagen: «La luz y el sol salieron ... los humildes fueron exaltados y devoraron a los gloriosos».'
  alternative_spanish_readings:
  - Interpretarlo como una paráfrasis de liberación y victoria
  - Aclarar explícitamente el cambio de fortuna
  rationale: El griego es altamente condensado e imagístico. La traducción debe mantener la reversión abrupta entre humildes y gloriosos sin convertirla en prosa explicativa.
  doctrine_reference: 'DOCTRINE.md: preservar la tensión teológica y la imaginería del texto sin resolverla por paráfrasis'
translation_notes:
  revision_awareness: La base inglesa fue ajustada de 'lifted up' a 'exalted' para ὑψώθησαν; la presente versión española sigue esa revisión con 'fueron exaltados'. También conserva la estructura breve y visionaria del original, sin suavizar 'devoraron' ni sustituir 'gloriosos' por una paráfrasis más explicativa.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» no aplicable aquí; no hay nombre divino en el versículo.
  - Se usa «humildes» como solución que respeta la ambigüedad social/moral documentada por la POB inglesa.
  - Se evita «siervos» o «oprimidos» porque el griego no exige esas especificaciones.
  - La adjetivación «los gloriosos» sigue la decisión inglesa de preservar el contraste formal con οἱ ταπεινοί.
