review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja en términos generales la estructura y el sentido del hebreo y de la auditoría inglesa: Jair toma toda la región de Argob, hasta la frontera de guesureos y maacateos, y el nombre perdura hasta el presente narrativo. También conserva bien el plural de וַיִּקְרָא אֹתָם («los llamó»). Sin embargo, hay un desajuste importante en la decisión léxica de עַל שְׁמוֹ: el texto principal omite la idea de «según/sobre su propio nombre» y la sustituye por «es decir», que en la auditoría inglesa corresponde más bien a la aclaración interpretativa de אֶת הַבָּשָׁן. Así, el borrador no preserva completamente la compresión sintáctica ni la lógica semántica documentada.'
  spanish_quality_summary: El español es claro y legible, con buen tono bíblico moderno. «Territorio», «frontera» y «hasta hoy» funcionan bien. No obstante, la secuencia «y los llamó, es decir, Basán, Havot-jair» suena algo trabada y desplaza una relación semántica clave. Además, la nota a) tiene comillas y redacción poco pulidas; conviene naturalizar «los llamó por su propio nombre» y mantener la aclaración appositiva sobre Basán sin perder la referencia a «su nombre».
  glossary_alignment: 'No hay conflictos con la terminología teológica principal del proyecto. Los nombres propios están bien manejados en general. La principal corrección requerida es de correspondencia léxica/sintáctica: עַל שְׁמוֹ debe reflejarse como «por/sobre su propio nombre» o equivalente, no como «es decir». Se puede mantener «Havot-jair» como topónimo con nota léxica, aunque la forma inglesa auditada usa «Havvoth-jair»; en español la forma simplificada es aceptable si se explica el sentido en nota.'
  issues:
  - severity: high
    issue: «es decir» se usa para traducir una parte equivocada de la secuencia hebrea
    rationale: En la auditoría inglesa, «that is, Bashan» interpreta אֶת הַבָּשָׁן, mientras que עַל שְׁמוֹ significa «según/sobre su propio nombre». El borrador asigna «es decir» a la decisión léxica de עַל שְׁמוֹ y así pierde la idea de nombrar el lugar por su propio nombre.
  - severity: medium
    issue: La nota a) está redactada de forma poco natural en español
    rationale: «y llamó a ellos, según su propio nombre» suena calcado. Una formulación como «y los llamó por su propio nombre» o «les puso su propio nombre» comunica mejor el hebreo comprimido.
  - severity: low
    issue: La secuencia nominal final puede sonar más natural con puntuación ajustada
    rationale: «y los llamó por su propio nombre, a Basán, Havot-jair» conserva mejor la compresión hebrea y la aclaración appositiva que la versión actual.
  revised_spanish_text: Jair hijo de Manasés tomó todo el territorio de Argob[a], hasta la frontera de los guesureos y de los maacateos, y los llamó por su propio nombre, es decir, Basán, Havot-jair[b], hasta hoy.
  revised_footnotes:
  - marker: a
    text: 'O más literalmente: «y los llamó por su propio nombre, Basán, Havot-jair». La sintaxis hebrea es comprimida y puede entenderse de manera ligeramente distinta.'
    reason: alternative_reading
  - marker: b
    text: Havot-jair probablemente significa «las aldeas de Jair» o «los asentamientos de Jair».
    reason: lexical_alternative
  revision_rationale: Se corrige la omisión del sentido de עַל שְׁמוֹ («por su propio nombre») y se conserva la aclaración interpretativa «es decir, Basán» para reflejar la auditoría inglesa sobre la sintaxis comprimida de אֶת הַבָּשָׁן. También se pule la nota alternativa para que suene natural en español sin perder la observación textual.
