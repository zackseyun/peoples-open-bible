theological_decisions:
- issue: Rendering אֲדֹנָי in Abraham's address
  chosen_reading: my Lord
  alternative_readings:
  - my lord
  rationale: In Genesis 18 the addressee is the divine visitor identified in the broader context with the LORD. Capitalizing 'Lord' reflects title usage in English without importing the covenant name YHWH, which is not the form used in this verse.
  doctrine_reference: 'Contested terms: κύριος/Kyrios → Lord; by analogy titles are translated, and YHWH is reserved for the divine name.'
