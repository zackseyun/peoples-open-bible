    rationale: En español, «cuya» exige un antecedente claro. Aquí el antecedente inmediato es «sacrificios» o «fuego», no el edificio implícito, de modo que la frase resulta confusa y no preserva limpiamente el sentido de οὗ/whereof aplicado a la estructura.
  - severity: medium
