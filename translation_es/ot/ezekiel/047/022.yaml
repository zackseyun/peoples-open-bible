    text: O 'como un nacido de la tierra' o 'como un nativo de nacimiento'.
    reason: lexical_alternative
  revision_rationale: Se ajusta גֵּר a 'extranjeros residentes' para conservar mejor el matiz jurídico-social del hebreo en un contexto de reparto territorial. Se cambia 'han engendrado hijos' por 'han tenido hijos' para seguir la decisión auditada de entender בָנִים de modo genérico en este contexto, manteniendo la alternativa más literal en nota. El resto del texto se conserva por ser fiel, claro y natural.
