  from: he would not taste death in this place
  to: he would not have tasted death
  rationale: 'The Coptic idiom for "taste" is ϫⲓ ϯⲡⲉ (literally "take taste"). The
    draft incorrectly translates the verb ϫⲓ ("take") as "taste", and then misreads
    the noun ϯⲡⲉ ("taste", normalized in the prompt as ⲡⲉⲓⲡⲉ) as a locative "in this
    place". There is no locative here; the text simply says ⲛⲉϥⲛⲁϫⲓ ϯⲡⲉ ⲁⲛ ⲙⲡⲙⲟⲩ ("he
    would not have tasted death"). The past counterfactual apodosis (ⲛⲉ + ⲛⲁ) is also
    better rendered "would not have tasted". | Azure: The rationale is philologically
    sound. In Sahidic Coptic, ϫⲓ ϯⲡⲉ is the idiom "taste," so the phrase is not locative;
    ϯⲡⲉ means "taste," not "this place." Thus the current English "taste death in
    this'
