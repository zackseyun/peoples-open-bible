base_translation:
  language: en
  yaml_path: translation/ot/proverbs/020/019.yaml
  text: One who reveals secrets goes about as a gossip[b][a]; do not associate with one who opens his lips wide.
  footnotes:
  - marker: a
    text: Or, 'goes about gossiping.' The Hebrew רָכִיל can refer to one who spreads damaging reports or gossip.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'with one who opens his lips.' The expression refers to a person who talks too freely or too much.
    reason: lexical_alternative
