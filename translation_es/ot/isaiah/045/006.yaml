translation:
  language: es
  text: para que sepan, desde la salida del sol[a] y desde su puesta, que no hay nadie aparte de mí. Yo soy Yahvé[b], y no hay otro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «desde el oriente hasta el occidente»; literalmente: «desde la salida del sol y desde su puesta».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «YHWH»; tradicionalmente, «el SEÑOR».'
    reason: alternative_reading
lexical_decisions:
- source_word: לְמַעַן
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - con el propósito de que
  lexicon: HALOT
  rationale: La expresión introduce cláusula de propósito; «para que» es natural en español y conserva el valor final del hebreo sin endurecerlo.
- source_word: יֵדְעוּ
  english_pob_choice: they may know
  chosen_spanish: sepan
  alternatives_spanish:
  - conozcan
  - lleguen a saber
  lexicon: HALOT
  rationale: Con לְמַעַן, el imperfecto expresa finalidad. «Sepan» mantiene ese matiz de resultado esperado y suena más idiomático que una perífrasis más larga.
- source_word: מִמִּזְרַח שֶׁמֶשׁ
  english_pob_choice: from the rising of the sun
  chosen_spanish: desde la salida del sol
  alternatives_spanish:
  - desde el amanecer
  - desde el oriente
  lexicon: HALOT
  rationale: Se conserva la imagen solar concreta del hebreo. «Salida del sol» refleja mejor el sustantivo verbal que un simple «este/oriente».
- source_word: וּמִמַּעֲרָבָהּ
  english_pob_choice: and from its setting
  chosen_spanish: y desde su puesta
  alternatives_spanish:
  - y desde el occidente
  - y desde donde se pone
  lexicon: HALOT
  rationale: El sufijo femenino singular remite a «sol»; «su puesta» preserva la referencia pronominal y la simetría poética del original.
- source_word: אֶפֶס בִּלְעָדַי
  english_pob_choice: there is none besides me
  chosen_spanish: no hay nadie fuera de mí
  alternatives_spanish:
  - no hay nada fuera de mí
  - no existe otro fuera de mí
  lexicon: HALOT
  rationale: El hebreo formula exclusividad absoluta. En español, «no hay nadie fuera de mí» comunica bien esa exclusión personal y mantiene la fuerza del enunciado sin forzar una expresión demasiado literal.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
  rationale: Se sigue la convención del proyecto en español para el Tetragrámaton. «Yahvé» preserva el nombre propio divino en vez de ocultarlo con un título genérico.
- source_word: וְאֵין עוֹד
  english_pob_choice: and there is no other
  chosen_spanish: y no hay otro
  alternatives_spanish:
  - y no existe otro
  - y no hay ninguno más
  lexicon: HALOT
  rationale: La fórmula de exclusividad final queda bien en español con «no hay otro», breve y enfática, sin añadir matices ajenos al hebreo.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el Señor
  rationale: El texto hebreo nombra directamente a YHWH. En la norma del proyecto, el español debe conservar el nombre divino en lugar de sustituirlo por un título de ocultamiento.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Alcance universal de la expresión geográfica
  english_pob_reading: from the rising of the sun and from its setting
  chosen_spanish_reading: desde la salida del sol y desde su puesta
  alternative_spanish_readings:
  - desde el oriente hasta el occidente
  - desde el amanecer hasta el ocaso
  rationale: El hebreo usa imaginería solar, no meros puntos cardinales. La traducción española conserva esa imagen y su alcance universal.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §6
- issue: Fórmula de exclusividad monoteísta
  english_pob_reading: there is none besides me ... and there is no other
  chosen_spanish_reading: no hay nadie fuera de mí ... y no hay otro
  alternative_spanish_readings:
  - no hay nada fuera de mí ... y no hay ninguno más
  - nadie existe aparte de mí ... y no existe otro
  rationale: La frase hebrea afirma la unicidad exclusiva de Yahvé. El español mantiene esa afirmación sin añadir formulaciones doctrinales posteriores.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
translation_notes:
  revision_awareness: El borrador sigue el pasaje hebreo directamente y coincide en lo sustancial con el audit trail inglés. Se mantiene la imaginería solar, la cláusula final de exclusividad y la decisión del proyecto de representar YHWH en español como «Yahvé».
  spanish_consistency_notes:
  - Se mantiene un registro bíblico contemporáneo y dignificado, sin calco arcaizante.
  - «Salida del sol / su puesta» preserva el paralelismo poético y la referencia pronominal del hebreo.
  - La exclusividad divina se expresa con una fórmula natural en español que no debilita el absoluto del original.
  - Se evitó «SEÑOR» para no ocultar el nombre propio divino, conforme a la terminología del proyecto.
