base_translation:
  language: en
  yaml_path: translation/ot/nehemiah/010/001.yaml
  text: And because of all this[a], we are making a binding agreement in writing, and on the sealed document are our officials, our Levites[b], and our priests.
  footnotes:
  - marker: a
    text: Or, 'And in all this we are cutting a firm agreement and writing it.' The Hebrew uses covenant-making language literally, 'cutting,' and the noun may be rendered 'firm agreement' or 'faithful pledge.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'on the sealed document' / 'upon the sealed deed.' The Hebrew likely refers to the written agreement as formally sealed.
    reason: lexical_alternative
