review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido del hebreo: Josué se dirige a los dos hombres, identifica a los que habían reconocido la tierra, les ordena entrar en la casa de Rahab, sacar de allí a la mujer y todo lo suyo, y fundamenta la orden en el juramento previo. Sin embargo, «tal como se lo juraron» introduce un objeto implícito no presente en el hebreo y suena menos directo que «tal como le juraron» o «tal como le habían jurado».'
  spanish_quality_summary: El español es claro, natural y digno. «Prostituta» está bien elegido frente a alternativas arcaizantes. «Entren en» y «saquen de allí» son idiomáticos. La única aspereza importante es «se lo juraron», que en este contexto suena innecesariamente pronominal y algo ambigua sobre qué fue exactamente lo jurado.
  glossary_alignment: No hay conflictos con la terminología del proyecto en este versículo. La elección de «prostituta» concuerda con la decisión léxica documentada para זוֹנָה. No aparecen términos sensibles como Yahvé, Mesías, Cristo, esclavo, etc.
  issues:
  - severity: medium
    issue: «tal como se lo juraron» añade un pronombre objeto no explícito
    rationale: El hebreo כַּאֲשֶׁר נִשְׁבַּעְתֶּם לָהּ significa literalmente «tal como le juraron». El «lo» español puede sugerir un contenido específico recuperado del contexto, pero no está léxicamente presente y hace la frase menos limpia.
  - severity: low
    issue: La nota al pie sobre «espiado»/«explorado» es aceptable pero no refleja la alternativa inglesa documentada sobre «la prostituta»
    rationale: La nota española no es errónea; sin embargo, la nota del POB inglés preserva la repetición hebrea «la mujer, la prostituta». En español no es obligatorio trasladarla, pero si se usa nota, conviene alinear mejor la razón documental. Dado que la nota actual no causa error, puede omitirse para mayor limpieza.
  revised_spanish_text: 'Y a los dos hombres que habían espiado la tierra, Josué dijo: «Entren en la casa de la prostituta y saquen de allí a la mujer y todo lo que le pertenece, tal como le juraron».'
  revision_rationale: Se elimina la nota para evitar carga innecesaria y se corrige «se lo juraron» a «le juraron», que refleja con mayor precisión y naturalidad el hebreo לָהּ sin añadir un objeto no expreso. El resto del versículo es fiel al sentido fuente, legible en español y coherente con las decisiones léxicas del POB.
