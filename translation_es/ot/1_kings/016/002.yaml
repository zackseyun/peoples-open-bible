revisions:
- from: Porque te levanté[a] del polvo y te puse como príncipe sobre mi pueblo Israel; y caminaste en el camino de Jeroboam, y hiciste pecar a mi pueblo Israel, provocándome a ira[b] con sus pecados.
  to: Porque te levanté[a] del polvo y te hice gobernante sobre mi pueblo Israel, y caminaste en el camino de Jeroboam, e hiciste pecar a mi pueblo Israel, provocándome a ira[b] por sus pecados.
  rationale: Se reemplazó «príncipe» por «gobernante» para reflejar mejor נָגִיד y la decisión léxica documentada por el POB. Se quitó el punto y coma para seguir más de cerca la coordinación del hebreo. Se mantuvo «te levanté» y el modismo «caminaste en el camino» por fidelidad al original, y se ajustó la frase final a «por sus pecados» para una lectura más natural en español sin perder el matiz instrumental/causal preservado en nota.
