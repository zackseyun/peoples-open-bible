translation:
  language: es
  text: Y llevasteis a Sicut[a] vuestro rey, y a Quiún vuestras imágenes, la estrella de vuestro dios[c][b], que hicieron para ustedes mismos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'vuestro Moloc'; el hebreo dice 'vuestro rey', pero muchos intérpretes entienden aquí una referencia a la deidad Moloc/Móloc, reflejada también en Hechos 7:43.
    reason: alternative_reading
  - marker: b
    text: Sicut y Quiún son nombres raros, probablemente asociados con el culto astral; su identificación precisa es incierta.
    reason: cultural_note
  - marker: c
    text: O posiblemente 'la estrella de vuestros dioses'; el vocalizado masorético favorece el singular 'vuestro dios'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּנְשָׂאתֶם
  english_pob_choice: And you carried
  chosen_spanish: Y llevaréis
  alternatives_spanish:
  - Y habéis llevado
  - Y cargasteis
  lexicon: HALOT
  rationale: El perfecto con waw en contexto profético funciona como acción acusatoria continua o anunciada; en español, el futuro con valor exhortativo/profético mantiene bien el avance del reproche. 'Llevaréis' conserva la idea de transportar objetos de culto sin sonar tan pesado como 'portaréis'.
- source_word: סִכּוּת
  english_pob_choice: Sikkuth
  chosen_spanish: Sicut
  alternatives_spanish:
  - Sikkut
  - Sakkut
  lexicon: HALOT
  rationale: Se trata de un nombre raro y de identificación incierta. Se translitera para no imponer una interpretación especulativa en el texto principal. La adaptación ortográfica 'Sicut' es más natural para el lector español, preservando a la vez el carácter de nombre propio.
- source_word: מַלְכְּכֶם
  english_pob_choice: your king
  chosen_spanish: vuestro rey
  alternatives_spanish:
  - vuestro Molec
  - vuestro gobernante
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'vuestro rey'. Mantener 'rey' respeta la forma masorética y no resuelve en el texto principal la posibilidad interpretativa de Molec/Móloc, que queda documentada aparte.
- source_word: כִּיּוּן
  english_pob_choice: Kiyyun
  chosen_spanish: Quiún
  alternatives_spanish:
  - Kiyyun
  - Quiyún
  lexicon: HALOT
  rationale: Otro nombre raro ligado probablemente al culto astral. La transliteración conserva la incertidumbre del término y evita una paráfrasis interpretativa. 'Quiún' es una forma castellana legible.
- source_word: צַלְמֵיכֶם
  english_pob_choice: your images
  chosen_spanish: vuestros ídolos
  alternatives_spanish:
  - vuestras imágenes
  - vuestras estatuas
  lexicon: HALOT
  rationale: Aunque el hebreo dice propiamente 'imágenes', el contexto idólatra en español hace muy claro el referente si se traduce 'ídolos'. Como 'imagen' puede sonar demasiado neutro en español moderno, se elige 'ídolos' para captar la fuerza condenatoria del pasaje, reconociendo que es una decisión ligeramente más interpretativa que el literal 'imágenes'.
- source_word: כּוֹכַב אֱלֹהֵיכֶם
  english_pob_choice: the star of your god
  chosen_spanish: la estrella de vuestro dios
  alternatives_spanish:
  - la estrella de vuestros dioses
  - la estrella del dios que adorabais
  lexicon: HALOT
  rationale: Se mantiene el singular 'dios' porque el hebreo apunta al singular con sufijo, y la construcción genitiva se traduce de forma directa y comprensible. 'Estrella' preserva la imagen astral sin ampliar innecesariamente la referencia.
- source_word: אֲשֶׁר עֲשִׂיתֶם לָכֶם
  english_pob_choice: which you made for yourselves
  chosen_spanish: que os habíais hecho para vosotros mismos
  alternatives_spanish:
  - que os hicisteis para vosotros
  - que habíais hecho para vuestro propio uso
  lexicon: HALOT
  rationale: La cláusula relativa expresa la fabricación de objetos de culto para uso propio. En español, el pluscuamperfecto reflexivo transmite bien el sentido de acción previa y auto-orientada; se conserva la fuerza reflexiva de לָכֶם con 'para vosotros mismos'.
theological_decisions:
- issue: Si מַלְכְּכֶם debe identificar explícitamente a Molec/Móloc o permanecer como 'vuestro rey'
  english_pob_reading: your king
  chosen_spanish_reading: vuestro rey
  alternative_spanish_readings:
  - vuestro Molec
  - Móloc vuestro rey
  rationale: La base hebrea permite una lectura llana como 'vuestro rey'. Dado que la identificación con Molec es interpretativa y no está escrita explícitamente en el texto consonántico/masorético aquí, la lectura principal conserva la forma más auditable. La alternativa tradicional se entiende como posibilidad, no como decisión del texto principal.
  doctrine_reference: Primacía del texto original; conservar tensiones interpretativas documentadas en lugar de resolverlas sin necesidad.
- issue: Si סִכּוּת y כִּיּוּן deben interpretarse o transliterarse
  english_pob_reading: transliterate both as proper names
  chosen_spanish_reading: transliterar ambos como nombres propios
  alternative_spanish_readings:
  - interpretar סִכּוּת como 'santuario'
  - identificar directamente deidades astrales concretas
  rationale: Ambos términos son raros y de identificación incierta. La transliteración evita introducir certeza léxica o histórica que el hebreo no exige. Esto preserva la tensión histórica y cultual del pasaje sin sobretraducirlo.
  doctrine_reference: Traducir títulos; transliterar nombres; no convertir incertidumbre léxica en afirmación doctrinal o histórica.
translation_notes:
  revision_awareness: 'El borrador sigue la lectura aprobada del audit trail inglés: mantiene ''vuestro rey'' en el texto principal, translitera los nombres raros y conserva el singular de ''vuestro dios''. No se detectaron cambios posteriores aplicados en la fuente.'
  spanish_consistency_notes:
  - Se usa 'vosotros/vuestro' para concordar con el sujeto plural y mantener consistencia interna.
  - Se eligió 'Sicut' y 'Quiún' como formas castellanas legibles de transliteración, sin cambiar la identificación incierta de los nombres.
  - '''Ídolos'' se emplea por claridad contextual; la nota preserva la posibilidad más literal de ''imágenes''.'
  - Las comillas y las notas siguen el patrón del POB en español con marcadores únicos [a], [b], [c].
