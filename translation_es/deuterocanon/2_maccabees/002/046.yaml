review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura del griego: «los asuntos relativos a Judas… y a sus hermanos… y la purificación… y la dedicación…». Conserva adecuadamente el valor amplio de Τὰ … κατὰ, traduce bien ἀδελφούς como «hermanos», y mantiene «dedicación» para ἐγκαινισμόν. Sin embargo, no preserva una alternativa en nota para «dedicación/rededicación», que sí está documentada en el rastro inglés. Además, la forma «Maccabeo» con doble c no es la grafía española normal; debe ser «Macabeo».'
  spanish_quality_summary: 'El texto es legible y de registro adecuado, pero requiere dos ajustes menores: normalizar la grafía española a «Judas Macabeo» y mejorar la naturalidad de «Ahora bien» al inicio de este encabezamiento/resumen, donde «Y en cuanto a» o simplemente «En cuanto a» suena más idiomático. La frase «santuario más grande» es fiel aunque algo rígida; aun así, puede mantenerse por cercanía al griego y al expediente inglés. La nota b actual explica una preferencia inglesa en vez de ofrecer una alternativa útil al lector español; conviene reemplazarla por la nota contextual sobre «rededicación».'
  glossary_alignment: No hay términos del glosario principal en conflicto. «Santuario» para ἱερόν concuerda con la revisión inglesa y con la rationale léxica. «Dedicación» para ἐγκαινισμός debe mantenerse en el texto principal, con nota alternativa «rededicación».
  issues:
  - severity: medium
    issue: 'Grafía no estándar en español: «Maccabeo»'
    rationale: La forma asentada en español es «Macabeo». Mantener la grafía con doble c parece calco del inglés/latín y afecta la naturalidad y la norma ortográfica del texto meta.
  - severity: medium
    issue: Falta la nota léxica sobre «rededicación» para ἐγκαινισμόν
    rationale: El expediente inglés preserva explícitamente esta alternativa contextual. La revisión española debe conservar esa información, especialmente porque el contexto histórico trata de restauración tras profanación.
  - severity: low
    issue: La nota sobre «santuario» está orientada al proceso inglés, no al lector español
    rationale: La nota actual explica que la revisión inglesa prefirió «santuario», pero no aporta una alternativa o aclaración necesaria en español. Las notas deben servir al texto español y al rastro léxico pertinente.
  - severity: low
    issue: «Ahora bien» es menos natural en este encabezamiento acumulativo
    rationale: Dado que el griego introduce una lista temática («las cosas concernientes a…»), «En cuanto a» suena más natural y mantiene el valor discursivo sin forzar el estilo.
