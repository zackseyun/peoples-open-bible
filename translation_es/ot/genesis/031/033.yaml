    issue: «Así que» añade un matiz inferencial no presente en el hebreo.
    rationale: El versículo simplemente encadena acciones narrativas con waw consecutivo. «Así que» puede sugerir conclusión o consecuencia más fuerte que la fuente.
  - severity: medium
    issue: «las dos siervas» no refleja del todo la racional lexical auditada para שׁתי האמהת.
    rationale: El English POB escogió «the two female servants» precisamente para el contexto doméstico y para evitar un término más duro. En español, «las dos sirvientas» transmite mejor esa misma intención contextual que «siervas».
  - severity: low
    issue: El punto y coma antes de «pero no las encontró» es innecesario.
    rationale: Una coma fluye mejor en español moderno para esta coordinación adversativa breve.
