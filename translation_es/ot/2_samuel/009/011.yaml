  text: וַ/יֹּ֤אמֶר צִיבָא֙ אֶל הַ/מֶּ֔לֶךְ כְּ/כֹל֩ אֲשֶׁ֨ר יְצַוֶּ֜ה אֲדֹנִ֤/י הַ/מֶּ֨לֶךְ֙ אֶת עַבְדּ֔/וֹ כֵּ֖ן יַעֲשֶׂ֣ה עַבְדֶּ֑/ךָ וּ/מְפִיבֹ֗שֶׁת אֹכֵל֙ עַל שֻׁלְחָנִ֔/י כְּ/אַחַ֖ד מִ/בְּנֵ֥י הַ/מֶּֽלֶךְ־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/2_samuel/009/011.yaml
  text: Ziba said to the king[a], “According to all that my lord the king commands his servant[b], so your servant will do.” And Mephibosheth ate at my table like one of the king’s sons.
  footnotes:
  - marker: a
    text: 'Hebrew: ''my table.'' Some translations render ''the king’s table'' to smooth the shift in person, but the Masoretic Text preserves the first person, likely reflecting David’s perspective.'
    reason: textual_variant
  - marker: b
    text: Or 'at my table'.
    reason: previous_rendering
