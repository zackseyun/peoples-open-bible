translation:
  language: es
  text: Se unen[a] a sus hermanos, sus nobles y entran en maldición[b] y en juramento, para andar en la ley de Dios, la cual fue dada por mano[c] de Moisés, siervo de Dios, y para guardar y hacer todos los mandamientos de Yahvé nuestro Señor, y sus juicios y sus estatutos[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'se vinculan a sus hermanos, sus nobles'. El modismo hebreo también puede sugerir que se adhieren firmemente a los miembros dirigentes de la comunidad en solidaridad de pacto.
    reason: lexical_alternative
  - marker: b
    text: '''Maldición y juramento'' se refiere a un compromiso de pacto autoimprecatorio: juran obediencia y aceptan las sanciones del pacto si lo quebrantan.'
    reason: cultural_note
  - marker: c
    text: O 'la cual fue dada por medio de Moisés'. Literalmente, 'la cual fue dada por mano de Moisés'.
    reason: lexical_alternative
  - marker: d
    text: '''Juicios'' también puede traducirse ''ordenanzas'' o ''reglas''; ''estatutos'' también puede traducirse ''decretos''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַחֲזִיקִים עַל
  english_pob_choice: join with
  chosen_spanish: se unen
  alternatives_spanish:
  - se vinculan a
  - se adhieren a
  - se sujetan a
  lexicon: HALOT
  rationale: El hebreo expresa adhesión o alineación en solidaridad de pacto. En español, 'se unen' comunica esa incorporación relacional sin sonar rígido ni perder el matiz comunitario.
- source_word: אֲחֵיהֶם
  english_pob_choice: their brothers
  chosen_spanish: sus hermanos
  alternatives_spanish:
  - sus parientes
  - sus hermanos de comunidad
  lexicon: HALOT
  rationale: Se conserva el término de parentesco masculino plural del hebreo. 'Hermanos' refleja con fidelidad el texto y la fórmula comunitaria del pacto.
- source_word: אַדִּירֵיהֶם
  english_pob_choice: their nobles
  chosen_spanish: sus nobles
  alternatives_spanish:
  - sus líderes
  - sus dignatarios
  lexicon: HALOT
  rationale: En este contexto sociopolítico, el término se refiere a personas de rango y prestigio. 'Nobles' es la correspondencia más directa y natural en español.
- source_word: וּבָאִים
  english_pob_choice: enter into
  chosen_spanish: entran en
  alternatives_spanish:
  - entran bajo
  - asumen
  lexicon: HALOT
  rationale: La expresión introduce la asunción de una obligación formal de pacto. 'Entran en' preserva esa idea de ingresar a un compromiso vinculante.
- source_word: בְּאָלָה
  english_pob_choice: a curse
  chosen_spanish: maldición
  alternatives_spanish:
  - una maldición de pacto
  - una imprecación
  lexicon: HALOT
  rationale: El término designa la sanción autoimprecatoria del pacto. 'Maldición' es el equivalente léxico directo y comprensible; el contexto jurídico-covenantal la determina.
- source_word: וּבִשְׁבוּעָה
  english_pob_choice: an oath
  chosen_spanish: juramento
  alternatives_spanish:
  - un juramento solemne
  - una promesa jurada
  lexicon: HALOT
  rationale: שְׁבוּעָה es el acto de jurar. 'Juramento' conserva la fuerza formal del compromiso sin añadir explicaciones no presentes en el versículo.
- source_word: לָלֶכֶת בְּתוֹרַת הָאֱלֹהִים
  english_pob_choice: to walk in the law of God
  chosen_spanish: para andar en la ley de Dios
  alternatives_spanish:
  - para vivir conforme a la ley de Dios
  - para caminar en la ley de Dios
  lexicon: HALOT
  rationale: '''Andar en'' conserva la metáfora bíblica de conducta habitual. ''Ley de Dios'' mantiene el valor legal-covenantal de תּוֹרָה en este pasaje.'
- source_word: אֲשֶׁר נִתְּנָה בְּיַד מֹשֶׁה
  english_pob_choice: which was given by the hand of Moses
  chosen_spanish: la cual fue dada por mano de Moisés
  alternatives_spanish:
  - la cual fue dada por medio de Moisés
  - la cual fue dada por la mano de Moisés
  lexicon: HALOT
  rationale: Se conserva el modismo hebreo 'por mano de' porque expresa mediación sin forzar el español. La forma elegida es natural y transparente.
- source_word: עֶבֶד הָאֱלֹהִים
  english_pob_choice: the servant of God
  chosen_spanish: siervo de Dios
  alternatives_spanish:
  - servidor de Dios
  - esclavo de Dios
  lexicon: HALOT
  rationale: Aquí עֶבֶד funciona como título honorífico de Moisés. 'Siervo de Dios' mantiene la dignidad del cargo y el uso bíblico idiomático en español.
- source_word: וְלִשְׁמֹר וְלַעֲשׂוֹת
  english_pob_choice: to keep and to do
  chosen_spanish: para guardar y hacer
  alternatives_spanish:
  - para observar y cumplir
  - para guardar y ejecutar
  lexicon: HALOT
  rationale: La pareja verbal forma una fórmula de obediencia pactal. 'Guardar y hacer' reproduce con fidelidad la doble idea de atender y poner por obra.
- source_word: כָּל מִצְוֺת
  english_pob_choice: all the commandments
  chosen_spanish: todos los mandamientos
  alternatives_spanish:
  - todos los preceptos
  - todos los mandatos
  lexicon: HALOT
  rationale: '''Mandamientos'' es el equivalente más natural para מִצְוֺת en lenguaje legal-religioso y conserva el plural formal del hebreo.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: Se adopta la forma española convencional del nombre divino revelado en el texto, preservando el Tetragrámaton sin sustituirlo por un título.
- source_word: אֲדֹנֵינוּ
  english_pob_choice: our Lord
  chosen_spanish: nuestro Señor
  alternatives_spanish:
  - nuestro Dueño
  - nuestro Amo
  lexicon: HALOT
  rationale: El sustantivo puede significar 'señor' o 'amo', pero en este contexto de pacto y reverencia 'nuestro Señor' es la opción más idiomática y digna.
- source_word: וּמִשְׁפָּטָיו
  english_pob_choice: his judgments
  chosen_spanish: sus juicios
  alternatives_spanish:
  - sus sentencias
  - sus ordenanzas
  lexicon: HALOT
  rationale: מִשְׁפָּטִים tiene peso jurídico. 'Juicios' conserva el campo legal del término, aunque en español también podría entenderse como 'ordenanzas'.
- source_word: וְחֻקָּיו
  english_pob_choice: his statutes
  chosen_spanish: sus estatutos
  alternatives_spanish:
  - sus decretos
  - sus preceptos
  lexicon: HALOT
  rationale: חֻקִּים suele referirse a disposiciones fijadas. 'Estatutos' conserva la distinción tradicional y el paralelismo con 'mandamientos' y 'juicios'.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El texto hebreo contiene el Tetragrámaton de manera directa. En español, 'Yahvé' preserva el nombre propio divino sin sustituirlo por una perífrasis reverencial.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Valor del compromiso 'maldición y juramento'
  english_pob_reading: a curse and an oath as a self-maledictory covenant pledge
  chosen_spanish_reading: maldición y juramento
  alternative_spanish_readings:
  - maldición de pacto y juramento
  - imprecación y juramento
  rationale: Se conserva la dureza del pacto autoimprecatorio sin explicarlo dentro del texto principal. El par léxico refleja tanto la sanción como la promesa jurada.
  doctrine_reference: DOCTRINE.md Translation philosophy §5; covenant formula note
- issue: Moisés como 'siervo de Dios'
  english_pob_reading: the servant of God
  chosen_spanish_reading: siervo de Dios
  alternative_spanish_readings:
  - siervo del Dios
  - servidor de Dios
  rationale: Aunque el proyecto a veces favorece 'esclavo' para δοῦλος, aquí el título mosaico es honorífico. 'Siervo de Dios' preserva el valor reverencial reconocido en el uso bíblico.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §1 and §5; Contested terms: δοῦλος servant/slave (context-dependent)'
- issue: Función de תּוֹרָה en contexto pactal
  english_pob_reading: law of God
  chosen_spanish_reading: ley de Dios
  alternative_spanish_readings:
  - instrucción de Dios
  - torá de Dios
  rationale: En este contexto de renovación del pacto, תּוֹרָה lleva un matiz legal-normativo fuerte. 'Ley de Dios' preserva esa fuerza en español y encaja con la cláusula de mandamientos, juicios y estatutos.
  doctrine_reference: DOCTRINE.md Translation philosophy §2
translation_notes:
  revision_awareness: 'Se revisó para corregir el problema de validación anterior: solo se incluye una nota con el único marcador [a], y ese marcador aparece exactamente en el texto principal. Además, se mantuvo el nombre divino como Yahvé en coherencia con la política española del proyecto y se preservó el tono de pacto del versículo sin añadir marcadores huérfanos.'
  spanish_consistency_notes:
  - Se mantiene la distinción entre 'mandamientos', 'juicios' y 'estatutos' para reflejar los tres términos hebreos.
  - '''Siervo de Dios'' se usa como título honorífico específico de Moisés, no como neutralización general de עֶבֶד.'
  - El nombre divino se translitera como 'Yahvé' conforme al estándar español del proyecto.
  - La nota al pie [a] queda anclada en 'se unen[a]' y no se añaden otras notas para evitar desajustes de marcadores.
