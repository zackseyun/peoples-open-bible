  text: כִּ֤י אִם תְּכַבְּסִי֙ בַּ/נֶּ֔תֶר וְ/תַרְבִּי לָ֖/ךְ בֹּרִ֑ית נִכְתָּ֤ם עֲוֺנֵ/ךְ֙ לְ/פָנַ֔/י נְאֻ֖ם אֲדֹנָ֥/י יְהוִֽה־־׃
base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/002/022.yaml
  text: For though you wash with natron and use much lye[a], your guilt is stained before me[c][b], declares the Lord YHWH.
