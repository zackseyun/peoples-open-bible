    text: O, 'tomar control del reino de Alejandro' o 'ganar dominio sobre el reino de Alejandro'. El verbo griego puede implicar prevalecer sobre o tomar control.
    reason: lexical_alternative
  revision_rationale: Se revisa para alinear mejor la nota con el verbo griego κατακρατῆσαι y su justificación léxica en el audit trail inglés, y para mejorar ligeramente la naturalidad del español en la comparación numérica. El sentido global del borrador era correcto; los cambios son de precisión editorial y legibilidad.
