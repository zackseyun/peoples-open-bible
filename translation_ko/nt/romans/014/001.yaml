id: ROM.14.1
reference: Romans 14:1
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Τὸν δὲ ἀσθενοῦντα τῇ πίστει προσλαμβάνεσθε, μὴ εἰς διακρίσεις διαλογισμῶν.
base_translation:
  language: en
  yaml_path: translation/nt/romans/014/001.yaml
  text: Now receive the one who is weak in faith, not for disputes over opinions.
translation:
  language: ko
  text: 믿음이 약한 자[a]를 받아들이십시오. 다만 의견을 두고 다투려는 목적으로 그리하지 마십시오.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 헬라어 ἀσθενοῦντα(현재 분사)는 「약한 상태에 있는 자」를 가리킨다. 본문은 약함의 성격을 양심으로 명시하지 않으므로 직역으로 둔다.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀσθενοῦντα τῇ πίστει
  english_pob_choice: the one who is weak in faith
  chosen_korean: 믿음이 약한 자
  alternatives_korean:
  - 신앙이 약한 사람
  - 양심이 약한 자
  lexicon: BDAG
  rationale: 정책 글로사리에 따라 ἀσθενής→「약한 자」. πίστις→「믿음」. 여격은 약함이 미치는 영역을 표시한다.
- source_word: προσλαμβάνεσθε
  english_pob_choice: receive
  chosen_korean: 받아들이다
  alternatives_korean:
  - 영접하다
  - 환영하다
  lexicon: BDAG
  rationale: 중간태 명령. 교제 안으로 받아들이는 의미. 15:7 「서로 받아들이라」와 어휘적으로 연결되도록 「받아들이다」 일관 사용.
- source_word: εἰς διακρίσεις διαλογισμῶν
  english_pob_choice: for disputes over opinions
  chosen_korean: 의견을 두고 다투려는 목적으로
  alternatives_korean:
  - 생각의 시비를 따지려는 의도로
  - 의견 다툼을 위해서
  lexicon: BDAG
  rationale: εἰς의 목적·결과. διάκρισις는 평가적 다툼, διαλογισμός는 내적 추론·의견. 한국어 자연스러움을 위해 「다투려는 목적으로」로 풀어낸다.
theological_decisions:
- issue: 약한 자/강한 자 단락의 어조
  chosen_reading: 「약한 자」를 비하적·도덕적 평가 없이 바울의 어휘 그대로 보존
  alternative_readings:
  - 「믿음이 부족한 자」로 도덕화
  rationale: 본문은 약함을 비판이 아닌 돌봄의 범주로 사용한다. 한국어 번역도 그 조심스러운 어조를 유지한다.
  doctrine_reference: 'DOCTRINE.md: 신학적 긴장을 보존하라; 본문 너머의 판단을 더하지 말 것'
