translation:
  language: es
  text: y las cuatrocientas granadas para las dos celosías[a], dos hileras de granadas para cada celosía, para cubrir los dos cuencos[b] de los capiteles que estaban sobre las columnas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'redes' en lugar de 'celosías'. El término hebreo se refiere a un trabajo ornamental calado en los capiteles.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, 'los dos cuencos de los capiteles'.
    reason: lexical_alternative
lexical_decisions:
- source_word: רִמֹּנִים
  english_pob_choice: pomegranates
  chosen_spanish: granados
  alternatives_spanish:
  - granadas ornamentales
  - granadas
  lexicon: HALOT
  rationale: El sustantivo designa literalmente granados o granadas; en este contexto decorativo de templo, la forma española más natural y fiel es 'granados', que conserva el término concreto sin explicar de más.
- source_word: שְׂבָכוֹת
  english_pob_choice: latticeworks
  chosen_spanish: celosías
  alternatives_spanish:
  - redes
  - enrejados
  lexicon: HALOT
  rationale: El término describe un trabajo ornamental abierto, semejante a una red o enrejado. 'Celosías' comunica bien ese sentido arquitectónico y ornamental en español sin perder la idea de estructura calada.
- source_word: טוּרִים
  english_pob_choice: rows
  chosen_spanish: hileras
  alternatives_spanish:
  - filas
  - líneas
  - tandas
  lexicon: HALOT
  rationale: '''Hileras'' expresa de manera natural la disposición ordenada de los granados y preserva el valor distributivo del hebreo.'
- source_word: לַשְּׂבָכָה הָאֶחָת
  english_pob_choice: for each latticework
  chosen_spanish: para cada celosía
  alternatives_spanish:
  - para la una celosía
  - para una celosía
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente 'para la celosía una', el sentido es distributivo, como en el inglés auditado. 'Para cada celosía' evita una literalidad opaca y refleja correctamente la distribución entre las dos estructuras.
- source_word: לְכַסּוֹת
  english_pob_choice: to cover
  chosen_spanish: para cubrir
  alternatives_spanish:
  - para tapar
  - para recubrir
  lexicon: HALOT
  rationale: El infinitivo marca finalidad. 'Para cubrir' es la equivalencia más directa y natural en español.
- source_word: גֻּלֹּת
  english_pob_choice: bowl-shaped capitals
  chosen_spanish: cuencos
  alternatives_spanish:
  - globos
  - copas
  lexicon: HALOT
  rationale: El hebreo alude a una forma redondeada, de cuenco. En español, 'cuencos' mantiene la imagen material del texto base; la especificación arquitectónica se conserva en 'capiteles'.
- source_word: כֹּתָרֹת
  english_pob_choice: capitals
  chosen_spanish: capiteles
  alternatives_spanish:
  - coronas
  - remates
  lexicon: HALOT
  rationale: En contexto arquitectónico, el término se refiere a los capiteles de las columnas, no a coronas reales. 'Capiteles' es el equivalente técnico preciso en español.
- source_word: עַל פְּנֵי הָעַמּוּדִים
  english_pob_choice: on the tops of the pillars
  chosen_spanish: sobre la parte superior de las columnas
  alternatives_spanish:
  - sobre la cima de las columnas
  - en la parte frontal de las columnas
  - encima de las columnas
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'sobre la faz/frente de las columnas', pero el contexto arquitectónico indica ubicación superior. 'Sobre la parte superior de las columnas' preserva el sentido espacial sin forzar una traducción demasiado técnica o arcaica.
translation_notes:
  revision_awareness: El texto español sigue de cerca el hebreo y el audit trail inglés, manteniendo la enumeración de objetos y la finalidad del infinitivo. Se adopta la equivalencia arquitectónica clara 'celosías' para שְׂבָכוֹת y 'capiteles' para כֹּתָרֹת, sin suavizar la imaginería ornamental. Se conserva la estructura distributiva de 'para cada celosía' y se explicita el valor espacial de la expresión final según la revisión inglesa de alto acuerdo.
  spanish_consistency_notes:
  - Se mantiene 'granados' para רִמֹּנִים en contextos ornamentales, coherente con una traducción concreta y no genérica.
  - '''Celosías'' se usa como término arquitectónico regular para el trabajo calado ornamental equivalente a ''latticeworks''.'
  - '''Capiteles'' se reserva para כֹּתָרֹת en contexto de columnas, evitando ''coronas'' salvo evidencia distinta.'
  - La construcción 'para cada' se emplea para reflejar distribuciones hebreas singulares con valor colectivo o distributivo.
  - No se introduce terminología litúrgica o eclesiástica ajena al contexto del templo.
