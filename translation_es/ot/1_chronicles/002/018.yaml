  - marker: b
    text: 'Hebreo: ''los hijos de ella''. Algunos intérpretes entienden la genealogía de otra manera, pero el Texto Masorético tiene aquí un sufijo femenino singular.'
    reason: lexical_alternative
  revision_rationale: Se hizo una reparación pequeña pero importante para conservar explícitamente el sufijo femenino singular del hebreo en בָנֶיהָ, tal como lo documenta el POB en inglés. 'Los hijos de ella' suena natural y evita que el español neutralice una ambigüedad textual significativa. También se ajustó la nota correspondiente para que coincida exactamente con esa decisión.
