translation:
  language: es
  text: los hombres, las mujeres, los niños pequeños[a], las hijas del rey, y toda persona[b] que Nabuzaradán, el capitán de la guardia[c], había dejado con Gedalías hijo de Ahicam, hijo de Safán, y Jeremías el profeta, y Baruc hijo de Nerías—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo טַף puede referirse a niños pequeños o, de manera más amplia, a dependientes del grupo familiar.
    reason: lexical_alternative
  - marker: b
    text: Hebreo נֶפֶשׁ aquí significa 'persona' o 'vida', no la parte inmaterial del ser humano.
    reason: lexical_alternative
  - marker: c
    text: Hebreo רַב טַבָּחִים es un título oficial neobabilónico; una traducción más literal sería 'jefe de los verdugos' o 'jefe de los ejecutores'.
    reason: cultural_note
lexical_decisions:
- source_word: הַגְּבָרִים
  english_pob_choice: the men
  chosen_spanish: los hombres
  alternatives_spanish:
  - los varones
  - los hombres y muchachos mayores
  lexicon: HALOT
  rationale: גְּבָרִים designa varones/hombres en una lista social contrastada con mujeres y niños. 'Los hombres' es la opción más natural y fiel para español, sin volverla técnica ni restringirla a soldados.
- source_word: הַנָּשִׁים
  english_pob_choice: the women
  chosen_spanish: las mujeres
  alternatives_spanish:
  - las esposas
  lexicon: HALOT
  rationale: נָשִׁים aquí nombra al grupo femenino en general. 'Las mujeres' conserva la amplitud del hebreo; 'esposas' sería demasiado específico.
- source_word: הַטַּף
  english_pob_choice: the little children
  chosen_spanish: los niños pequeños
  alternatives_spanish:
  - los niños
  - los dependientes
  lexicon: HALOT
  rationale: טַף puede abarcar pequeños o dependientes, pero en este listado familiar la referencia a menores de edad es la más probable y la más clara en español. 'Niños pequeños' mantiene la fuerza del diminutivo contextual sin volverlo demasiado técnico.
- source_word: בְּנוֹת הַמֶּלֶךְ
  english_pob_choice: the king’s daughters
  chosen_spanish: las hijas del rey
  alternatives_spanish:
  - las princesas
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'hijas del rey'. Se conserva esa forma porque es más exacta que 'princesas', que interpreta el rango más que traducir el término.
- source_word: כָּל הַנֶּפֶשׁ
  english_pob_choice: every person
  chosen_spanish: toda persona
  alternatives_spanish:
  - toda alma
  - cada uno
  lexicon: HALOT
  rationale: נֶפֶשׁ aquí refiere a persona/vida, no al alma inmaterial. 'Toda persona' reproduce el valor distributivo de כָּל sin introducir un sentido doctrinal ajeno al contexto.
- source_word: הִנִּיחַ
  english_pob_choice: had left
  chosen_spanish: había dejado
  alternatives_spanish:
  - había puesto
  - había confiado
  lexicon: HALOT
  rationale: En contexto, el verbo expresa que Nabuzaradán dejó a estas personas bajo la órbita de Gedalías. 'Había dejado' es el equivalente más directo y sobrio en español.
- source_word: רַב טַבָּחִים
  english_pob_choice: the captain of the guard
  chosen_spanish: el capitán de la guardia
  alternatives_spanish:
  - el jefe de los verdugos
  - el jefe de los ejecutores
  lexicon: HALOT
  rationale: Se conserva el título funcional tradicionalmente entendido como un cargo oficial. 'Capitán de la guardia' es la opción más inteligible en español y evita la literalidad engañosa de 'verdugos' o 'ejecutores'.
- source_word: אֶת גְּדַלְיָהוּ בֶּן אֲחִיקָ֣ם בֶּן שָׁפָ֑ן
  english_pob_choice: with Gedaliah son of Ahikam, son of Shaphan
  chosen_spanish: con Gedalías hijo de Ahicam, hijo de Safán
  alternatives_spanish:
  - bajo Gedalías hijo de Ahicam, hijo de Safán
  - en la custodia de Gedalías hijo de Ahicam, hijo de Safán
  lexicon: HALOT
  rationale: El hebreo usa את con la idea de relación de ubicación/adscripción tras הִנִּיחַ. 'Con Gedalías' sigue de cerca la construcción y deja que el contexto exprese la custodia implícita, como en el texto base inglés.
- source_word: יִרְמְיָהוּ הַנָּבִיא
  english_pob_choice: Jeremiah the prophet
  chosen_spanish: Jeremías el profeta
  alternatives_spanish:
  - Jeremías, el profeta
  lexicon: HALOT
  rationale: Se mantiene el nombre propio y el título explícito. La forma sin coma es natural en español bíblico y evita sobresegmentar el sintagma.
- source_word: בָּרוּךְ בֶּן נֵרִיָּהוּ
  english_pob_choice: Baruch son of Neriah
  chosen_spanish: Baruc hijo de Nerías
  alternatives_spanish:
  - Baruc hijo de Neríasu
  - Baruc, hijo de Nerías
  lexicon: HALOT
  rationale: Los nombres propios se transliteran de manera estable a formas reconocibles en español. 'Hijo de' conserva el patronímico hebreo con claridad y sin añadir comentario.
translation_notes:
  revision_awareness: El texto inglés auditado ya resuelve la principal tensión lexical de טַף ('little children') y de רַב טַבָּחִים ('captain of the guard') sin cambios en la revisión más reciente. La versión española sigue esas mismas decisiones y conserva la aclaración alternativa en notas para mantener trazabilidad y evitar una traducción demasiado técnica o demasiado general.
  spanish_consistency_notes:
  - Se mantiene la secuencia de grupos con artículos definidos y coordinación simple para reflejar la enumeración hebrea.
  - '''Gedalías'' y ''Baruc'' siguen las formas usuales en español bíblico, mientras que ''Ahicam'' y ''Safán'' conservan la transliteración estándar.'
  - No se introduce 'SEÑOR' ni terminología eclesiástica adicional, porque el versículo no contiene el tetragrámaton ni vocabulario teológico que lo requiera.
  - La coma antes de 'y' se omite en el flujo principal para corresponder a una lista narrativa natural en español, manteniendo el cierre con raya larga como en el formato del texto base.
