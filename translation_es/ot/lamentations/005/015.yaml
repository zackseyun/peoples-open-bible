translation:
  language: es
  text: La alegría de nuestro corazón ha cesado; nuestro baile[a] se ha convertido en luto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede traducirse: «nuestra danza se ha convertido en luto».'
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁבַת
  english_pob_choice: has ceased
  chosen_spanish: ha cesado
  alternatives_spanish:
  - ha cesado
  - ha terminado
  - se ha acabado
  lexicon: HALOT
  rationale: El verbo expresa cese o interrupción completa. «Ha cesado» conserva ese valor resultativo y funciona de modo natural en español poético.
- source_word: מְשׂוֹשׂ
  english_pob_choice: joy
  chosen_spanish: alegría
  alternatives_spanish:
  - gozo
  - júbilo
  - regocijo
  lexicon: HALOT
  rationale: El sustantivo denota alegría/exultación. «Alegría» es claro y digno en español, y encaja bien en la construcción poética «de nuestro corazón».
- source_word: לִבֵּנוּ
  english_pob_choice: our heart
  chosen_spanish: nuestro corazón
  alternatives_spanish:
  - nuestros corazones
  lexicon: HALOT
  rationale: El hebreo usa el singular colectivo. Mantener «nuestro corazón» preserva la imagen original sin forzar una pluralización que debilite el efecto poético.
- source_word: נֶהְפַּךְ
  english_pob_choice: has turned
  chosen_spanish: se ha vuelto
  alternatives_spanish:
  - se ha tornado
  - ha sido cambiado
  lexicon: HALOT
  rationale: El nifal expresa un cambio de estado. «Se ha vuelto» transmite esa transformación de forma idiomática en español con el matiz de paso a otra condición.
- source_word: לְאֵבֶל
  english_pob_choice: to mourning
  chosen_spanish: en luto
  alternatives_spanish:
  - en duelo
  - a lamento
  - en tristeza
  lexicon: HALOT
  rationale: אֵבֶל designa luto/mourning asociado a duelo por pérdida. «En luto» mantiene el registro de duelo comunitario y suena natural con «se ha vuelto».
- source_word: מְחֹלֵנוּ
  english_pob_choice: our dancing
  chosen_spanish: nuestro baile
  alternatives_spanish:
  - nuestra danza
  - nuestro danzar
  lexicon: HALOT
  rationale: El término alude a la acción de danzar, a menudo celebratoria. «Baile» comunica la actividad convertida en luto con claridad en español, sin sobreinterpretar el matiz ritual.
translation_notes:
  revision_awareness: 'El texto inglés auditado mantiene una equivalencia óptima y una única nota léxica para el sustantivo inicial; la presente versión conserva la misma estructura semántica: cese de la alegría y transformación del baile en luto. No se detectan revisiones textuales ni tensiones doctrinales en este versículo.'
  spanish_consistency_notes:
  - Se ha mantenido un español poético y sobrio, con sintaxis paralela a la del hebreo.
  - Se preservó la singularidad de «nuestro corazón» para reflejar el singular colectivo del מקור hebreo.
  - «Luto» se prefirió sobre «duelo» para conservar el registro bíblico-poético y la oposición con «alegría».
