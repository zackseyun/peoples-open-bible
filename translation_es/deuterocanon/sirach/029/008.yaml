translation:
  language: es
  text: Pero con el humilde, sé paciente, y no lo hagas esperar[a] al darle limosna.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no lo retrases al darle limosna». El verbo griego puede significar retrasar o alargar el asunto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πλὴν
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - No obstante
  - Sin embargo
  - Pero bien
  lexicon: LSJ
  rationale: Introduce un contraste o corrección respecto de la instrucción precedente. En español, «Pero» conserva bien el valor adversativo breve y natural del griego.
- source_word: ἐπὶ ταπεινῷ
  english_pob_choice: with the humble
  chosen_spanish: con el humilde
  alternatives_spanish:
  - con el humilde de condición
  - con el pobre
  - con el de condición humilde
  lexicon: LSJ
  rationale: ταπεινός puede abarcar la idea de humilde, bajo o socialmente pobre. Dado el contexto de ayuda material y limosna, «el humilde» mantiene la forma breve del original sin perder la referencia a una persona de condición baja.
- source_word: μακροθύμησον
  english_pob_choice: be patient
  chosen_spanish: sé paciente
  alternatives_spanish:
  - ten paciencia
  - sé longánime
  - espera con paciencia
  lexicon: BDAG
  rationale: El imperativo expresa paciencia perseverante o tolerancia. «Sé paciente» es la manera más clara y fiel en español contemporáneo.
- source_word: ἐπʼ ἐλεημοσύνην
  english_pob_choice: for almsgiving
  chosen_spanish: para la limosna
  alternatives_spanish:
  - para la caridad
  - para dar limosna
  - para un acto de limosna
  lexicon: LSJ
  rationale: En griego judío, ἐλεημοσύνη se refiere a la limosna o dádiva caritativa, no solo a una misericordia abstracta. «Limosna» preserva la concreción del acto.
- source_word: μὴ παρελκύσῃς
  english_pob_choice: do not keep him waiting
  chosen_spanish: no lo hagas esperar
  alternatives_spanish:
  - no lo retrases
  - no lo hagas esperar más
  - no lo demores
  lexicon: LSJ
  rationale: El verbo puede significar retrasar, alargar o hacer esperar. Como el objeto es una persona, «no lo hagas esperar» reproduce bien el sentido personal y práctico del mandato.
- source_word: αὐτόν
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  - a esa persona
  - al pobre
  lexicon: BDAG
  rationale: Se conserva el pronombre masculino singular de manera natural en español. El referente es el mismo hombre humilde mencionado antes.
translation_notes:
  revision_awareness: El texto en inglés ya había resuelto ἐλεημοσύνη como «almsgiving» y μὴ παρελκύσῃς como una demora personal («do not keep him waiting»). La versión española mantiene esa lectura concreta, sin suavizarla hacia una abstracción como «misericordia» o «posponer» únicamente.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se prefirió «limosna» para ἐλεημοσύνη por la concreción del contexto.
  - «El humilde» conserva la ambigüedad útil de ταπεινός entre humildad y baja condición social.
  - Se evitó «caridad» porque en español puede sonar más general o moderno que el acto concreto de dar limosna.
