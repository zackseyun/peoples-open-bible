id: HOS.4.13
reference: Hosea 4:13
source:
  edition: WLC
  text: עַל רָאשֵׁ֨י הֶ/הָרִ֜ים יְזַבֵּ֗חוּ וְ/עַל הַ/גְּבָעוֹת֙ יְקַטֵּ֔רוּ תַּ֣חַת אַלּ֧וֹן וְ/לִבְנֶ֛ה וְ/אֵלָ֖ה כִּ֣י ט֣וֹב צִלָּ֑/הּ עַל כֵּ֗ן תִּזְנֶ֨ינָה֙ בְּנ֣וֹתֵי/כֶ֔ם וְ/כַלּוֹתֵי/כֶ֖ם תְּנָאַֽפְנָה־־־׃
translation:
  text: On the tops of the mountains they sacrifice[a], and on the hills they burn incense, under oak and poplar and terebinth, because their shade is good. Therefore your daughters prostitute themselves[c][b], and your daughters-in-law commit adultery.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they burn incense.' The Hebrew verb can refer specifically to burning incense or more broadly to making offerings go up in smoke.
    reason: lexical_alternative
  - marker: b
    text: The tree names are traditionally identified as oak, poplar, and terebinth; exact botanical equivalents are not fully certain.
    reason: cultural_note
  - marker: c
    text: Hosea often uses sexual unfaithfulness as imagery for covenant unfaithfulness; here the wording also plainly describes literal sexual sin.
    reason: cross_reference
lexical_decisions:
- source_word: רָאשֵׁי הֶהָרִים
  chosen: the tops of the mountains
  alternatives:
  - the summits of the mountains
  - the mountain tops
  lexicon: HALOT
  rationale: רָאשֵׁי literally 'heads of' in construct with 'mountains' idiomatically refers to their tops/summits. 'Tops of the mountains' is natural English while preserving the elevated cult-site imagery.
- source_word: יְזַבֵּחוּ
  chosen: they sacrifice
  alternatives:
  - they offer sacrifices
  lexicon: HALOT
  rationale: Piel of זבח denotes sacrificial slaughter/offerings. 'They sacrifice' is concise and sufficiently explicit in context.
- source_word: יְקַטֵּרוּ
  chosen: they burn offerings
  alternatives:
  - they burn incense
  - they make offerings smoke
  lexicon: HALOT
  rationale: קטר in the Piel can refer to burning sacrificial offerings, sometimes incense specifically. Here, in parallel with sacrificing at high places, 'burn offerings' best captures the broader cultic act without narrowing it to incense alone.
- source_word: תַּחַת אַלּוֹן וְלִבְנֶה וְאֵלָה
  chosen: under oak and poplar and terebinth
  alternatives:
  - under an oak, a poplar, and a terebinth
  - under oak, white poplar, and terebinth
  lexicon: HALOT
  rationale: These are tree names associated with shady cult sites. Singular forms are rendered generically in English after 'under.' לִבְנֶה is commonly identified as poplar; אֵלָה as terebinth. Retaining 'terebinth' preserves botanical specificity better than flattening to 'elm' or 'oak.'
- source_word: כִּי טוֹב צִלָּהּ
  chosen: because their shade is good
  alternatives:
  - because its shade is pleasant
  - for their shade is good
  lexicon: HALOT
  rationale: The suffix on 'shade' is feminine singular, likely referring collectively to the tree cover or to the last-mentioned tree as representative. English plural 'their shade' naturally refers to the listed trees together and fits the sense of attractive shady groves.
- source_word: עַל כֵּן
  chosen: Therefore
  alternatives:
  - For this reason
  - So
  lexicon: HALOT
  rationale: Marks consequence. 'Therefore' preserves the prophetic causal connection between the cultic setting and the ensuing sexual immorality/judgment.
- source_word: תִּזְנֶינָה
  chosen: prostitute themselves
  alternatives:
  - play the prostitute
  - commit sexual immorality
  lexicon: HALOT
  rationale: זנה often carries prostitution/whoredom imagery, literal or metaphorical. Here, because the objects are 'your daughters' in parallel with adultery, a sexual sense is foregrounded. 'Prostitute themselves' is idiomatic modern English and preserves the force better than the archaic 'play the harlot.'
- source_word: בְּנוֹתֵיכֶם
  chosen: your daughters
  lexicon: HALOT
  rationale: Straightforward familial term; no reason to generalize or neutralize.
- source_word: וְכַלּוֹתֵיכֶם
  chosen: your daughters-in-law
  alternatives:
  - your brides
  lexicon: HALOT
  rationale: כַּלָּה can mean bride or daughter-in-law; in this familial household context paired with 'your daughters,' 'daughters-in-law' is the more natural and contextually specific sense.
- source_word: תְּנָאַפְנָה
  chosen: commit adultery
  alternatives:
  - are adulterous
  lexicon: HALOT
  rationale: נאף specifically denotes adultery. The verbal rendering 'commit adultery' preserves the active force and distinguishes it from the broader זנה in the previous clause.
