translation:
  language: es
  text: 'Y mira: una mujer salió a su encuentro, vestida como prostituta y astuta de corazón[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «guardada de corazón» o «reservada». El hebreo dice literalmente «guardada de corazón», lo que sugiere intenciones ocultas.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִנֵּה
  english_pob_choice: And look
  chosen_spanish: Y mira
  alternatives_spanish:
  - Y he aquí
  - Y mira bien
  - Y observa
  lexicon: HALOT
  rationale: La partícula introduce una escena con viveza e inmediatez. «Mira» conserva el impulso deíctico de manera natural en español moderno, sin el tono arcaizante de «he aquí».
- source_word: אִשָּׁה
  english_pob_choice: a woman
  chosen_spanish: una mujer
  alternatives_spanish:
  - una esposa
  - una hembra
  lexicon: HALOT
  rationale: El contexto presenta una figura femenina no identificada; «mujer» es el equivalente natural y no fuerza la lectura de «esposa».
- source_word: לִקְרָאתוֹ
  english_pob_choice: came to meet him
  chosen_spanish: salió a su encuentro
  alternatives_spanish:
  - fue a encontrarlo
  - se le acercó
  - vino a encontrarlo
  lexicon: HALOT
  rationale: La construcción expresa movimiento hacia el encuentro. «Salió a su encuentro» comunica bien el acercamiento directo en español y mantiene la idea de encuentro deliberado.
- source_word: שִׁית
  english_pob_choice: dressed like
  chosen_spanish: vestida como
  alternatives_spanish:
  - ataviada como
  - con vestido de
  - con apariencia de
  lexicon: HALOT
  rationale: El sustantivo apunta a vestimenta o atuendo. «Vestida como» es natural y deja claro el rasgo externo sin sobreinterpretar.
- source_word: זוֹנָה
  english_pob_choice: a prostitute
  chosen_spanish: prostituta
  alternatives_spanish:
  - ramera
  - ramera pública
  - mujer prostituta
  lexicon: HALOT
  rationale: «Prostituta» es la equivalencia contemporánea más clara y precisa; evita arcaísmos o crudeza innecesaria.
- source_word: וּנְצֻרַת לֵב
  english_pob_choice: cunning of heart
  chosen_spanish: astuta de corazón
  alternatives_spanish:
  - cuidada de corazón
  - guardada de corazón
  - cautelosa de corazón
  lexicon: HALOT
  rationale: La revisión inglesa prefirió «cunning of heart» por el sentido contextual. En español, «astuta de corazón» mantiene la tensión entre la literalidad de la raíz («guardada/velada») y la implicación contextual de intención oculta, sin borrar la imagen original del corazón.
theological_decisions:
- issue: 'Valor de נְצֻרַת לֵב: literalidad vs. implicación contextual'
  english_pob_reading: cunning of heart
  chosen_spanish_reading: astuta de corazón
  alternative_spanish_readings:
  - guardada de corazón
  - velada de corazón
  - secretiva de corazón
  rationale: El hebreo literalmente sugiere algo «guardado/protegido» respecto del corazón, pero el contexto apunta a intención oculta y conducta engañosa. «Astuta de corazón» conserva el efecto interpretativo sin abandonar del todo el trasfondo metafórico.
  doctrine_reference: Sabiduría proverbial; tensión lexical en el valor figurado del corazón en la literatura sapiencial
translation_notes:
  revision_awareness: La traducción inglesa revisó «guarded of heart» a «cunning of heart» para reflejar mejor el contexto. La versión española sigue esa revisión, pero mantiene el peso de la imagen hebrea mediante «astuta de corazón», una formulación que puede leerse tanto descriptiva como moralmente en el marco sapiencial.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» en el proyecto, pero este versículo no lo contiene.
  - «Mujer» se usa en sentido genérico de adulto femenino, no como «esposa».
  - «Prostituta» sigue el valor léxico directo de זוֹנָה.
  - Se evita «behold»/«he aquí» por registro arcaizante; «mira» preserva la vivacidad del original.
  - La nota al pie conserva la alternativa literal «guardada de corazón» para no borrar la tensión semántica del hebreo.
