translation:
  language: es
  text: Y también se os declara que no se imponga ningún impuesto ni otra carga sobre ninguno de los sacerdotes, levitas, cantores del templo, porteros, siervos del templo o trabajadores de este templo[a], y que nadie tenga autoridad para imponérselo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Trabajadores de este templo» traduce un término para quienes atienden los asuntos o negocios del templo; también podría entenderse como «funcionarios», pero eso puede sonar demasiado restrictivo.
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγεται
  english_pob_choice: it is also declared
  chosen_spanish: se os declara
  alternatives_spanish:
  - se os dice
  - se os da a conocer
  - se os hace saber
  lexicon: BDAG
  rationale: En un contexto de decreto administrativo, el pasivo de λέγω funciona como una comunicación oficial. «Se os declara» conserva ese tono formal mejor que un simple «se os dice».
- source_word: πᾶσι τοῖς ἱερεῦσιν
  english_pob_choice: any of the priests
  chosen_spanish: ninguno de los sacerdotes
  alternatives_spanish:
  - todos los sacerdotes
  - cualquiera de los sacerdotes
  lexicon: BDAG
  rationale: 'La negación siguiente pide español natural: no se impone nada sobre ninguno de ellos. «Ninguno de los sacerdotes» mantiene el alcance universal sin forzar una construcción poco idiomática.'
- source_word: Λευείταις
  english_pob_choice: Levites
  chosen_spanish: levitas
  alternatives_spanish:
  - leuitas
  lexicon: BDAG
  rationale: Es la transliteración estándar y más clara en español bíblico.
- source_word: ἱεροψάλταις
  english_pob_choice: temple singers
  chosen_spanish: cantores del templo
  alternatives_spanish:
  - cantores sagrados
  - cantores del santuario
  lexicon: LSJ
  rationale: «Cantores del templo» conserva el matiz cultual explícito del compuesto sin usar una expresión demasiado rígida o arcaica.
- source_word: θυρωροῖς
  english_pob_choice: gatekeepers
  chosen_spanish: porteros
  alternatives_spanish:
  - guardianes de la puerta
  - doorkeepers
  lexicon: LSJ
  rationale: En español bíblico, «porteros» comunica bien la función de custodiar accesos; mantiene la lista de oficios del templo de forma natural.
- source_word: ἱεροδούλοις
  english_pob_choice: temple servants
  chosen_spanish: siervos del templo
  alternatives_spanish:
  - servidores del templo
  - esclavos del templo
  lexicon: LSJ
  rationale: El inglés POB evita sobreespecificar una condición servil/bondada que el contexto inmediato no enfatiza. En español, «siervos del templo» reproduce esa neutralidad funcional sin perder el matiz de servicio religioso.
- source_word: πραγματικοῖς τοῦ ἱεροῦ
  english_pob_choice: workers of this temple
  chosen_spanish: trabajadores de este templo
  alternatives_spanish:
  - oficiales de este templo
  - funcionarios de este templo
  - los ocupados en los asuntos de este templo
  lexicon: LSJ
  rationale: πραγματικός alude a quienes atienden los asuntos o negocios del templo. «Trabajadores de este templo» sigue la decisión inglesa de no estrechar demasiado el término a un cargo burocrático concreto.
- source_word: μηδεμία φορολογία
  english_pob_choice: no tax
  chosen_spanish: ningún tributo
  alternatives_spanish:
  - ningún impuesto
  - ninguna contribución
  lexicon: LSJ
  rationale: φόρολογία puede abarcar tributo o imposición fiscal. «Tributo» funciona bien en un decreto persa y conserva el matiz administrativo antiguo.
- source_word: μηδὲ ἄλλη ἐπιβουλή
  english_pob_choice: other burden
  chosen_spanish: ni otra carga
  alternatives_spanish:
  - ni otra imposición
  - ni otro gravamen
  - ni otro tributo
  lexicon: LSJ
  rationale: La revisión inglesa prefirió «burden» para no restringir ἐπιβουλή a un segundo impuesto. En español, «carga» reproduce mejor esa amplitud de imposición adicional.
- source_word: γίγνηται
  english_pob_choice: is to be imposed
  chosen_spanish: se imponga
  alternatives_spanish:
  - llegue a imponerse
  - se haga
  lexicon: BDAG
  rationale: El verbo en contexto indica la aplicación efectiva de una carga fiscal o administrativa. «Se imponga» expresa esa fuerza legal con naturalidad.
- source_word: μηδένα ἔχειν ἐξουσίαν ἐπιβαλεῖν τούτοις
  english_pob_choice: no one is to have authority to impose it on them
  chosen_spanish: nadie tenga autoridad para imponérselo a ellos
  alternatives_spanish:
  - nadie tenga autoridad para ponerles esto
  - nadie tenga poder para imponerles eso
  lexicon: BDAG
  rationale: La construcción legal de ἐξουσίαν ἐπιβαλεῖν pide en español una fórmula de autoridad para imponer. El enclítico «-selo» retoma la carga/tributo previamente mencionada sin repetirla torpemente.
theological_decisions:
- issue: ἱεροδούλοις y el grado de servidumbre
  english_pob_reading: temple servants
  chosen_spanish_reading: siervos del templo
  alternative_spanish_readings:
  - esclavos del templo
  - servidores del templo
  rationale: Aunque ἱεροδούλοις puede sugerir una condición servil, el contexto de lista administrativa del templo no obliga a traducirlo como esclavos. Se conserva la tensión semántica con «siervos», que indica servicio dedicado sin afirmar más de lo que el pasaje muestra.
  doctrine_reference: lexical_tension_preservation
- issue: ἐπιβουλή como imposición adicional no necesariamente un 'segundo impuesto'
  english_pob_reading: other burden
  chosen_spanish_reading: ni otra carga
  alternative_spanish_readings:
  - ni otra imposición
  - ni otro gravamen
  rationale: El griego puede denotar una carga o imposición adicional en el marco fiscal del decreto. «Carga» mantiene la amplitud del término y evita reducirlo indebidamente a un impuesto específico.
  doctrine_reference: lexical_tension_preservation
translation_notes:
  revision_awareness: La redacción sigue el texto griego como ancla principal y toma en cuenta la revisión inglesa reciente que cambió «levy» por «burden» para ἄλλη ἐπιβουλή. Por eso se eligió «otra carga» en español, manteniendo la amplitud semántica sin convertirla en un segundo impuesto técnico.
  spanish_consistency_notes:
  - Se usó «Y también» para reflejar la adición coordinada de καὶ ὑμῖν δὲ.
  - «Se os declara» mantiene el registro oficial del decreto.
  - La lista de oficios del templo se tradujo de forma consistente con nombres claros y no eclesiásticos.
  - «Tributo» y «carga» distinguen la imposición fiscal general de la imposición adicional.
  - No se usó «SEÑOR» ni terminología teológica ajena al versículo.
