revisions:
- from: Porque, mira[a], los que están lejos de ti perecerán; destruyes a todos los que te son infieles.
  to: Porque, he aquí[a], los que están lejos de ti perecerán; destruyes a todos los que te son infieles.
  rationale: Se eleva el registro de הִנֵּה con «he aquí», más acorde con el tono poético y con la decisión inglesa «behold». También se ajusta la nota para conservar más estrechamente la alternativa literal documentada, sin perder la explicación de la metáfora de infidelidad espiritual o de pacto.
