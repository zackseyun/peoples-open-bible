translation:
  language: es
  text: Aun viendo la destrucción de sus siete hijos y la intrincada variedad de los tormentos, la noble madre, después de abrazarlos a todos[b], los dejó ir por su fe hacia Dios[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por su confianza en Dios» o «por su fidelidad hacia Dios».
    reason: lexical_alternative
  - marker: b
    text: El verbo también puede significar «saludarlos a todos» o «despedirse de todos».
    reason: lexical_alternative
lexical_decisions:
- source_word: καίπερ
  english_pob_choice: Even while
  chosen_spanish: Aun viendo
  alternatives_spanish:
  - aunque veía
  - si bien veía
  lexicon: LSJ
  rationale: La partícula concesiva introduce una acción que ocurre pese a lo que ella contempla. «Aun viendo» conserva el matiz concesivo y el participio simultáneo de modo natural en español.
- source_word: ἑπτὰ τέκνων
  english_pob_choice: her seven children
  chosen_spanish: sus siete hijos
  alternatives_spanish:
  - sus siete niños
  - sus siete descendientes
  lexicon: LSJ
  rationale: τέκνα puede ser «hijos» o «niños». En este contexto martirial y por el uso del relato, «hijos» es la opción más natural y fiel; el posesivo queda implícito en el referente de la madre.
- source_word: ὁρῶσα
  english_pob_choice: seeing
  chosen_spanish: viendo
  alternatives_spanish:
  - contemplando
  - observando
  lexicon: LSJ
  rationale: El participio presente expresa una acción concomitante. «Viendo» preserva esa simultaneidad sin añadir matiz interpretativo.
- source_word: ἀπώλειαν
  english_pob_choice: destruction
  chosen_spanish: la destrucción
  alternatives_spanish:
  - la ruina
  - la pérdida
  - la muerte
  lexicon: LSJ
  rationale: El sustantivo puede abarcar pérdida, ruina o destrucción. En este contexto de martirio, «destrucción» mantiene la fuerza del griego sin especificar más de lo que el término exige.
- source_word: τὴν τῶν στρεβλῶν πολύπλοκον ποικιλίαν
  english_pob_choice: the intricate variety of the tortures
  chosen_spanish: la variada complejidad de los tormentos
  alternatives_spanish:
  - la intrincada variedad de los tormentos
  - la elaborada diversidad de los tormentos
  - la compleja variedad de las torturas
  lexicon: LSJ
  rationale: στρεβλώ puede referirse a torturas o tormentos. «Tormentos» suena más natural en español y conserva el sentido de sufrimiento extremo; «variada complejidad» recoge πολύπλοκον ποικιλίαν sin volver la frase demasiado mecánica.
- source_word: ἀπάσασα
  english_pob_choice: after embracing them all
  chosen_spanish: después de abrazarlos a todos
  alternatives_spanish:
  - después de saludarlos a todos
  - después de despedirse de todos
  lexicon: LSJ
  rationale: El verbo puede significar abrazar, saludar o despedirse. Dado el contexto afectivo de una madre ante sus hijos, «abrazarlos a todos» expresa bien la carga emocional y mantiene la amplitud semántica del término.
- source_word: ἡ γενναία μήτηρ
  english_pob_choice: the noble mother
  chosen_spanish: la noble madre
  alternatives_spanish:
  - la madre valiente
  - la madre esforzada
  lexicon: LSJ
  rationale: γενναία puede denotar nobleza y valentía. «Noble» conserva la elevación moral del texto y encaja con el tono encomiástico del libro.
- source_word: ἐξελυσεν
  english_pob_choice: let them go
  chosen_spanish: los dejó ir
  alternatives_spanish:
  - los soltó
  - los liberó
  - los dejó partir
  lexicon: LSJ
  rationale: El verbo sugiere soltar o liberar. «Los dejó ir» comunica con claridad que la madre renuncia a retenerlos, sin forzar una paráfrasis más explícita que el griego.
- source_word: διὰ τὴν πρὸς θεὸν πίστιν
  english_pob_choice: because of her faith toward God
  chosen_spanish: por su fe hacia Dios
  alternatives_spanish:
  - a causa de su fe hacia Dios
  - por su confianza en Dios
  - por su fidelidad hacia Dios
  lexicon: LSJ
  rationale: πρὸς con θεόν conserva una dirección relacional que se refleja mejor con «hacia Dios». πίστις se mantiene como «fe» según la terminología doctrinal del proyecto, y διὰ con acusativo se expresa causalmente con «por».
theological_decisions:
- issue: Renderizado de πίστις en un contexto martirial
  english_pob_reading: faith
  chosen_spanish_reading: fe
  alternative_spanish_readings:
  - confianza
  - fidelidad
  rationale: El proyecto fija πίστις como «fe» por defecto. En este pasaje, la constancia de la madre también podría describirse como confianza o fidelidad, pero «fe» mantiene la lectura principal y deja las otras posibilidades como matices secundarios.
  doctrine_reference: 'DOCTRINE.md Contested terms: πίστις → faith'
- issue: Relación de πρὸς θεόν
  english_pob_reading: toward God
  chosen_spanish_reading: hacia Dios
  alternative_spanish_readings:
  - para con Dios
  - ante Dios
  rationale: La preposición griega señala dirección relacional, no mera localización. «Hacia Dios» conserva esa orientación sin convertirla en una fórmula eclesiástica más cerrada que el texto no exige.
  doctrine_reference: Greek syntax of πρὸς + accusative with relational force
translation_notes:
  revision_awareness: Se siguió el pasaje griego de 4 Macabeos 15:24 y se tomó como contexto auditado la traducción inglesa POB, incluyendo sus alternativas para στρεβλῶν, ἀπάσασα y πίστις. Se respetó la revisión inglesa que prefirió una acción secuencial para ἀπάσασα y un verbo más claro para ἐξελυσεν, pero se reexpresó en español con sintaxis natural y sin perder el valor participial ni la causalidad de διὰ τὴν πρὸς θεὸν πίστιν.
  spanish_consistency_notes:
  - Se mantuvo «Dios» para θεός y no se empleó una máscara reverencial.
  - Se prefirió «fe» como traducción principal de πίστις, con alternativas explícitas en nota.
  - «Tormentos» se usó para στρεβλῶν por naturalidad en español, sin borrar el sentido de tortura.
  - No se introdujo terminología eclesiástica no sustentada por el griego.
  - La puntuación refleja una oración compuesta en español moderno y digno.
