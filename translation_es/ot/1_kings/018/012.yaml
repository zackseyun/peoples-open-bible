translation:
  language: es
  text: Y cuando yo me separe de ti, el Espíritu de Yahvé[a] te llevará a donde yo no sepa; entonces, cuando vaya a informarle a Acab y no te encuentre, me matará, aunque tu siervo ha temido a Yahvé desde mi juventud.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el viento de Yahvé te llevará»; el hebreo רוּחַ puede significar «espíritu», «viento» o «soplo», aunque aquí «Espíritu» encaja mejor con el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: And when
  chosen_spanish: Y cuando
  alternatives_spanish:
  - Y sucederá que cuando
  - Y acontecerá que cuando
  lexicon: HALOT
  rationale: El hebreo introduce una situación futura condicional o temporal; en español, «Y cuando» comunica bien ese encadenamiento narrativo sin volverlo pesado.
- source_word: אֵלֵךְ מֵאִתָּךְ
  english_pob_choice: I go away from you
  chosen_spanish: yo me vaya de junto de ti
  alternatives_spanish:
  - me vaya de ti
  - me aparte de ti
  - te deje
  lexicon: HALOT
  rationale: «De junto de ti» conserva la idea relacional y espacial de salir de la presencia de alguien, con un giro natural en español.
- source_word: רוּחַ יְהוָה
  english_pob_choice: the Spirit of Yahweh
  chosen_spanish: el Espíritu de Yahvé
  alternatives_spanish:
  - el espíritu de Yahvé
  - el viento de Yahvé
  - el soplo de Yahvé
  lexicon: HALOT
  rationale: La audiencia/contexto profético favorece «Espíritu» como agencia divina; mantengo la mayúscula por la referencia personal y la forma «Yahvé» por política terminológica del proyecto.
- source_word: יִשָּׂאֲךָ
  english_pob_choice: may carry you
  chosen_spanish: te llevará
  alternatives_spanish:
  - podrá llevarte
  - te puede llevar
  - te arrebatará
  lexicon: HALOT
  rationale: El imperfecto expresa la posibilidad temida dentro de la escena; en español, el futuro simple transmite bien esa eventualidad sin introducir una modalidad ajena al texto.
- source_word: עַל אֲשֶׁר לֹא אֵדָע
  english_pob_choice: where I do not know
  chosen_spanish: donde yo no sé
  alternatives_spanish:
  - a donde yo no sé
  - a un lugar que no sé
  - donde no sé
  lexicon: HALOT
  rationale: El hebreo apunta a un lugar/dirección desconocidos. «Donde yo no sé» sigue la economía del original y evita expandir innecesariamente la frase.
- source_word: וּבָאתִי לְהַגִּיד לְאַחְאָב
  english_pob_choice: Then when I come and tell Ahab
  chosen_spanish: y cuando vaya a informarle a Acab
  alternatives_spanish:
  - y cuando venga a decirle a Acab
  - y cuando vaya a avisarle a Acab
  - y cuando vuelva para decirle a Acab
  lexicon: HALOT
  rationale: «Informarle» comunica היטב el valor de הִגִּיד con el objeto indirecto expreso; «Acab» sigue la forma castellana habitual del nombre propio.
- source_word: וְלֹא יִמְצָאֲךָ
  english_pob_choice: and he does not find you
  chosen_spanish: y no te encuentre
  alternatives_spanish:
  - y no te halle
  - y no te hallare
  - y no podrá encontrarte
  lexicon: HALOT
  rationale: En una secuencia de temor/resultado, el subjuntivo en español es natural y preserva la dependencia de la condición implícita.
- source_word: וַהֲרָגָנִי
  english_pob_choice: he will kill me
  chosen_spanish: me matará
  alternatives_spanish:
  - me matará entonces
  - me dará muerte
  - me asesinará
  lexicon: HALOT
  rationale: «Matará» es directo, claro y suficientemente fuerte para el riesgo expresado por el hablante.
- source_word: וְעַבְדְּךָ
  english_pob_choice: your servant
  chosen_spanish: tu siervo
  alternatives_spanish:
  - tu esclavo
  - tu servidor
  - tu criado
  lexicon: HALOT
  rationale: Aquí la autodenominación deferente de Obadías hacia Elías funciona mejor como «siervo» en español por la fórmula de cortesía, sin implicar necesariamente la categoría jurídica de esclavitud.
- source_word: יָרֵא אֶת יְהוָה
  english_pob_choice: has feared Yahweh
  chosen_spanish: ha temido a Yahvé
  alternatives_spanish:
  - ha reverenciado a Yahvé
  - ha honrado a Yahvé con temor
  - ha temido al Yahvé
  lexicon: HALOT
  rationale: El hebreo expresa temor reverente y continuidad pasada-presente; «ha temido» conserva la fuerza verbal y la trayectoria vital del personaje.
- source_word: מִנְּעֻרָי
  english_pob_choice: from my youth
  chosen_spanish: desde su juventud
  alternatives_spanish:
  - desde mi juventud
  - desde joven
  - desde mi niñez
  lexicon: HALOT
  rationale: En el contexto, el poseedor es Obadías mismo; por concordancia discursiva en el discurso directo, uso «su juventud» manteniendo la referencia al hablante implícita en la cita bíblica castellana.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue la convención del proyecto para el Tetragrama: «Yahvé», no la sustitución litúrgica por «SEÑOR».'
theological_decisions:
- issue: Representación del Tetragrama יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa explícitamente el nombre divino; el proyecto pide transliterarlo como «Yahvé» para preservar el nombre del pacto y evitar una sustitución por título.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sentido de רוּחַ יְהוָה
  english_pob_reading: the Spirit of Yahweh
  chosen_spanish_reading: el Espíritu de Yahvé
  alternative_spanish_readings:
  - el viento de Yahvé
  - el espíritu de Yahvé
  rationale: En este contexto profético, la acción de transportar a Elías apunta mejor a una agencia divina personal; por eso se mantiene «Espíritu» con mayúscula.
  doctrine_reference: HALOT / contexto narrativo-profético
- issue: Valor de עַבְדְּךָ
  english_pob_reading: your servant
  chosen_spanish_reading: tu siervo
  alternative_spanish_readings:
  - tu esclavo
  - tu servidor
  rationale: La autoidentificación de cortesía de Obadías ante Elías no exige el matiz jurídico de esclavitud; «siervo» conserva humildad y deferencia sin sobrecargar el vínculo.
  doctrine_reference: uso pragmático del discurso bíblico
translation_notes:
  revision_awareness: El inglés POB fue revisado de «to somewhere I do not know» a «where I do not know» por mayor cercanía al hebreo; la redacción española ya sigue esa relación más directa con «donde yo no sé», sin añadir una expansión interpretativa.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» en todo el versículo para el Tetragrama.
  - Se usa «Acab» como forma castellana estable del nombre propio.
  - «Espíritu» se capitaliza por referirse a la agencia divina, no a un mero viento.
  - La cita mantiene la secuencia condicional y el tono de temor del hebreo sin convertirlo en paráfrasis libre.
