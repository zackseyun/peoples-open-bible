translation:
  language: es
  text: y en la vid había tres ramas[a]. Mientras brotaba, sus flores brotaron[b], y sus racimos se llenaron de uvas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Ramas» también podría entenderse como «sarmientos», «brotes» o, más específicamente, «zarcillos», según el matiz botánico que se quiera destacar.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo más literal: «y ella, como brotando, su flor subió/salió»; la línea describe el paso rápido de la vid del brotar a la floración.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבַגֶּפֶן
  english_pob_choice: and on the vine
  chosen_spanish: y en la vid
  alternatives_spanish:
  - y sobre la vid
  - y en la viña
  lexicon: HALOT
  rationale: El hebreo presenta la imagen de la vid como soporte del crecimiento. En español, «en la vid» conserva la relación interna/estructural sin sonar forzado; «sobre la vid» enfatiza la superficie, y «viña» desplaza la imagen al lugar plantado más que a la planta misma.
- source_word: שְׁלֹשָׁה שָׂרִיגִם
  english_pob_choice: three branches
  chosen_spanish: tres sarmientos
  alternatives_spanish:
  - tres ramas
  - tres brotes
  - tres zarcillos
  lexicon: HALOT
  rationale: «שָׂרִיגִם» en contexto de vid puede referirse a los brotes/vástagos de la vid. «Sarmientos» es un término español adecuado y más preciso que «ramas»; «brotes» es posible pero algo más genérico, y «zarcillos» sería demasiado técnico y no siempre corresponde a la imagen de crecimiento narrada.
- source_word: כְפֹרַחַת
  english_pob_choice: as it was budding
  chosen_spanish: Mientras brotaba
  alternatives_spanish:
  - como estaba brotando
  - cuando brotaba
  - mientras florecía
  lexicon: HALOT
  rationale: El participio con כ introduce una escena en progreso. «Mientras brotaba» comunica el desarrollo gradual de la vid con naturalidad en español. «Florecía» puede ser válido, pero aquí «brotaba» mantiene la progresión hacia las flores mencionada en el verso.
- source_word: עָלְתָה נִצָּהּ
  english_pob_choice: its blossoms came up
  chosen_spanish: sus flores salieron
  alternatives_spanish:
  - su flor brotó
  - sus flores brotaron
  - su flor salió
  lexicon: HALOT
  rationale: El hebreo literalmente expresa que la floración «subió/salió». «Sus flores salieron» conserva la imagen de emergencia sin añadir información que el texto no da. El plural español refleja el valor colectivo posible del sustantivo.
- source_word: הִבְשִׁילוּ
  english_pob_choice: ripened
  chosen_spanish: maduraron
  alternatives_spanish:
  - se maduraron
  - llegaron a madurar
  - se pusieron maduras
  lexicon: HALOT
  rationale: En español, «maduraron» es la forma más natural y fiel para el proceso de llegar a punto de fruto. Mantiene el avance narrativo del verso sin sobreactuar la imagen.
- source_word: אַשְׁכְּלֹתֶיהָ
  english_pob_choice: its clusters
  chosen_spanish: sus racimos
  alternatives_spanish:
  - sus racimos de uvas
  - sus gavillas
  - sus grupos
  lexicon: HALOT
  rationale: «Racimos» es el término normal para la vid y evita ambigüedad. «Racimos de uvas» es explicativo pero innecesario aquí; «gavillas» no corresponde al campo semántico de la vid.
- source_word: עֲנָבִים
  english_pob_choice: into grapes
  chosen_spanish: en uvas
  alternatives_spanish:
  - a uvas
  - hasta uvas
  - de uvas
  lexicon: HALOT
  rationale: 'La secuencia hebrea expresa el resultado: los racimos maduraron hasta convertirse en uvas. «En uvas» reproduce bien ese sentido resultativo en español y conserva la fluidez del verso.'
translation_notes:
  revision_awareness: 'Se siguió el estado más reciente del audit trail inglés, que no requirió revisiones adicionales y muestra alta concordancia textual. Se conservó la secuencia imagética del hebreo: vid -> brote -> flor -> maduración -> uvas.'
  spanish_consistency_notes:
  - Se usó «vid» para la planta y no «viña», porque el hebreo habla de la planta misma.
  - Se evitó «SEÑOR» y otros términos teológicos porque este versículo no contiene nombres divinos ni títulos teológicos relevantes.
  - Se mantuvo el registro narrativo poético sin expandir el texto con interpretaciones no presentes en el hebreo.
