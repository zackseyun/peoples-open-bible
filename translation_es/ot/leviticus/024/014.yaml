review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del hebreo: sacar al ofensor fuera del campamento, imponer las manos sobre su cabeza por parte de quienes oyeron, y ejecutar la lapidación por toda la congregación. También preserva correctamente הַמְקַלֵּל como «el que maldijo» con nota alternativa. Sin embargo, «lo apedreará» en singular no concuerda con el sujeto plural/colectivo «toda la congregación» y debilita la correspondencia con וְרָגְמוּ ... כָּל הָעֵדָה, que pide una forma plural o una construcción claramente colectiva en español.'
  spanish_quality_summary: El texto es mayormente natural y claro, pero la secuencia verbal mejora mucho con «lo apedreen» en subjuntivo exhortativo, que además coordina mejor con «pongan». También conviene mantener la puntuación de forma fluida y eclesialmente legible. La nota existente es adecuada; falta la nota cultural sobre la imposición de manos que el rastro inglés conservó y que sigue siendo útil en español.
  glossary_alignment: 'Buena alineación general con la terminología del proyecto: no hay ocurrencias de Yahvé/Mesías/etc. relevantes aquí; «congregación» para עֵדָה y «campamento» para מַחֲנֶה son apropiados. «El que maldijo» sigue correctamente la decisión léxica del POB frente a «blasfemador».'
  issues:
  - severity: medium
    issue: Discordancia verbal en «toda la congregación lo apedreará»
    rationale: Con sujeto plural/colectivo y verbo hebreo plural וְרָגְמוּ, la forma singular futura suena impropia en español y menos fiel a la sintaxis/jussivo secuencial del original. «Y toda la congregación lo apedree» o «y que toda la congregación lo apedree» preserva mejor el sentido.
  - severity: medium
    issue: Falta la nota explicativa sobre la imposición de manos
    rationale: El inglés POB conserva una nota cultural/interpretativa sobre el posible sentido de la acción. Dado que el español no crea problema nuevo pero sí debe preservar alternativas significativas ya documentadas, conviene incluirla.
  revised_spanish_text: Saca al que maldijo[a] fuera del campamento, y pongan todos los que oyeron sus manos sobre su cabeza[b], y toda la congregación lo apedree.
  revised_footnotes:
  - marker: a
    text: O, «el blasfemador» / «el que blasfemó». El hebreo se refiere literalmente a «el que maldijo».
    reason: alternative_reading
  - marker: b
    text: La imposición de manos aquí probablemente marca la identificación formal del ofensor por parte de los testigos, aunque algunos también la entienden con un significado simbólico.
    reason: cultural_note
  revision_rationale: 'Se corrige la forma verbal final para reflejar mejor la secuencia exhortativa del hebreo y sonar natural en español: «lo apedree» coordina con «pongan» y evita la discordancia de «lo apedreará». También se añade la nota cultural ya preservada en la auditoría inglesa sobre la imposición de manos. El resto del borrador es fiel y claro, por lo que la revisión es menor.'
