translation:
  language: es
  text: Entonces Rizpa, la hija de Aya, tomó el sayal y lo extendió para sí sobre la roca, desde el comienzo de la cosecha hasta que se derramó agua sobre ellos desde los cielos[a]. Y no permitió que las aves del cielo descansaran sobre ellos de día, ni las fieras del campo de noche.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «hasta que llovió sobre ellos desde el cielo». El hebreo dice más literalmente: «hasta que agua fue derramada sobre ellos desde los cielos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַשַּׂק
  english_pob_choice: sackcloth
  chosen_spanish: sayal
  alternatives_spanish:
  - saco
  - tela de duelo
  lexicon: HALOT
  rationale: En español bíblico, «sayal» comunica bien la tela áspera de duelo asociada al hebreo שַׂק. «Saco» puede sonar más genérico o ambiguo, y «tela de duelo» explicaría demasiado el término.
- source_word: וַתַּטֵּהוּ לָהּ אֶל הַצּוּר
  english_pob_choice: spread it out for herself on the rock
  chosen_spanish: lo extendió para sí sobre la roca
  alternatives_spanish:
  - lo tendió para sí sobre la roca
  - lo extendió para ella en la roca
  lexicon: HALOT
  rationale: «Extendió» refleja היט/נטה en relación con tela; «para sí» conserva el valor dativo de לָהּ. «Sobre la roca» sigue el sentido contextual de אֶל en este pasaje, sin añadir más ubicación que la que da el hebreo.
- source_word: הַצּוּר
  english_pob_choice: the rock
  chosen_spanish: la roca
  alternatives_spanish:
  - el peñasco
  - la peña
  lexicon: HALOT
  rationale: «Roca» es la forma más directa y sobria para צוּר. Mantiene el artículo definido y evita precisar indebidamente el lugar.
- source_word: מִתְּחִלַּת קָצִיר
  english_pob_choice: from the beginning of harvest
  chosen_spanish: desde el comienzo de la cosecha
  alternatives_spanish:
  - desde el principio de la siega
  - desde el inicio de la cosecha
  lexicon: HALOT
  rationale: El hebreo dice literalmente «desde el comienzo de la cosecha/segado» sin nombrar un cultivo específico. «Cosecha» mantiene la generalidad y suena natural en español.
- source_word: עַד נִתַּךְ מַיִם עֲלֵיהֶם מִן הַשָּׁמַיִם
  english_pob_choice: until water was poured on them from the heavens
  chosen_spanish: hasta que se derramó agua sobre ellos desde los cielos
  alternatives_spanish:
  - hasta que el agua fue derramada sobre ellos desde los cielos
  - hasta que cayó agua sobre ellos del cielo
  lexicon: HALOT
  rationale: «Se derramó agua» conserva la imagen de נתך como vertido. «Desde los cielos» mantiene el registro elevado y el plural hebreo de הַשָּׁמַיִם, sin forzar la interpretación a «lluvia» en el texto principal.
- source_word: הַשָּׁמַיִם
  english_pob_choice: the heavens
  chosen_spanish: los cielos
  alternatives_spanish:
  - los cielos
  - el cielo
  lexicon: HALOT
  rationale: «Los cielos» respeta el plural hebreo y el tono elevado de la expresión. En español, «cielos» puede funcionar bien sin perder inteligibilidad.
- source_word: עוֹף הַשָּׁמַיִם
  english_pob_choice: the birds of the sky
  chosen_spanish: las aves del cielo
  alternatives_spanish:
  - las aves de los cielos
  - los pájaros del cielo
  lexicon: HALOT
  rationale: «Aves del cielo» es una expresión natural y digna en español, y conserva el paralelismo con la frase siguiente. «Pájaros» sería más coloquial.
- source_word: לָנוּחַ עֲלֵיהֶם
  english_pob_choice: to rest on them
  chosen_spanish: descansaran sobre ellos
  alternatives_spanish:
  - se posaran sobre ellos
  - se asentaran sobre ellos
  lexicon: HALOT
  rationale: En este contexto, la idea no es solo «reposar», sino posarse/alojarse sobre los cuerpos. «Descansaran sobre ellos» mantiene la lectura amplia del POB inglés y sigue siendo natural en español.
- source_word: חַיַּת הַשָּׂדֶה
  english_pob_choice: the wild animals of the field
  chosen_spanish: las fieras del campo
  alternatives_spanish:
  - los animales salvajes del campo
  - las bestias del campo
  lexicon: HALOT
  rationale: «Fieras del campo» es una expresión bíblica y natural en español para חַיַּת הַשָּׂדֶה. «Bestias» suena más arcaico; «animales salvajes» es correcto pero menos compacto.
- source_word: יוֹמָם ... לָיְלָה
  english_pob_choice: by day ... by night
  chosen_spanish: de día ... de noche
  alternatives_spanish:
  - durante el día ... durante la noche
  - de día ... por la noche
  lexicon: HALOT
  rationale: «De día» y «de noche» mantienen el paralelismo idiomático y la simetría del hebreo. Son claros y sobrios en español.
- source_word: וְלֹא נָתְנָה
  english_pob_choice: she did not allow
  chosen_spanish: no permitió
  alternatives_spanish:
  - no dejó
  - no consintió
  lexicon: HALOT
  rationale: נתן con infinitivo expresa permiso/consentimiento. «No permitió» es la opción más directa y formal en español narrativo.
theological_decisions:
- issue: ¿Traducir הַשָּׁמַיִם como «los cielos» o como «el cielo»?
  english_pob_reading: the heavens
  chosen_spanish_reading: los cielos
  alternative_spanish_readings:
  - el cielo
  rationale: El plural hebreo y el tono elevado favorecen «los cielos». «El cielo» podría sonar más natural en algunos contextos, pero aquí reduciría el matiz del original y la posible imagen de procedencia desde arriba.
  doctrine_reference: Uso bíblico general del plural «cielos» para הַשָּׁמַיִם.
- issue: ¿Explicitar «lluvia» en el texto principal?
  english_pob_reading: The Hebrew more literally says 'until water was poured on them from the heavens.'
  chosen_spanish_reading: hasta que se derramó agua sobre ellos desde los cielos
  alternative_spanish_readings:
  - hasta que llovió sobre ellos desde los cielos
  - hasta que cayó lluvia sobre ellos
  rationale: El hebreo dice literalmente «agua» derramada; «lluvia» es una interpretación plausible pero más específica que el texto. Se conserva la literalidad en el cuerpo y se deja abierta la lectura natural de lluvia en la nota.
  doctrine_reference: Fidelidad lexical al hebreo; no hay implicación doctrinal especial.
translation_notes:
  revision_awareness: Se mantuvo la alta concordancia con el audit trail inglés. La principal decisión fue llevar a español la imagen de «sackcloth» como «sayal» y conservar la literalidad de «agua derramada» sin convertirla en «lluvia» en el texto principal. No se detectaron revisiones previas que requirieran ajuste.
  spanish_consistency_notes:
  - Se mantuvo el registro bíblico sobrio y contemporáneo, evitando tanto arcaísmos innecesarios como paráfrasis expansivas.
  - Se conservó el paralelismo temporal «de día ... de noche».
  - «Cielos» se usó de manera consistente para הַשָּׁמַיִם, en armonía con el plural hebreo y con el audit trail inglés.
