translation:
  language: es
  text: pues si nuestro corazón nos condena[a], Dios es mayor que nuestro corazón[b], y él conoce todas las cosas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «nos reprende» o «halla falta en nosotros».
    reason: lexical_alternative
  - marker: b
    text: «Dios es mayor que nuestro corazón» puede apuntar a su conocimiento más pleno de la verdad sobre nosotros y, por implicación, a su autoridad sobre nuestra autocondenación.
    reason: alternative_reading
lexical_decisions:
- source_word: ὅτι
  english_pob_choice: for
  chosen_spanish: pues
  alternatives_spanish:
  - porque
  - ya que
  lexicon: BDAG
  rationale: El primer ὅτι introduce la base o explicación de lo anterior. En español, «pues» transmite bien ese valor explicativo sin volver la frase rígida ni convertirla en una causal demasiado fuerte.
- source_word: ἐὰν
  english_pob_choice: if
  chosen_spanish: si
  alternatives_spanish:
  - cuando
  - si alguna vez
  lexicon: BDAG
  rationale: Con el subjuntivo presente καταγινώσκῃ, la condición hipotética se conserva naturalmente con «si».
- source_word: καταγινώσκῃ
  english_pob_choice: condemns
  chosen_spanish: nos condena
  alternatives_spanish:
  - nos reprende
  - nos acusa
  - encuentra falta en nosotros
  lexicon: BDAG
  rationale: El verbo expresa saber algo en contra de alguien, con matiz de censura o condena interior. «Nos condena» preserva la fuerza judicial/consciente que el contexto pide, aunque «reprende» o «acusa» seguirían siendo alternativas semánticamente posibles.
- source_word: ἡ καρδία
  english_pob_choice: our heart
  chosen_spanish: nuestro corazón
  alternatives_spanish:
  - nuestra conciencia
  - el corazón dentro de nosotros
  lexicon: BDAG
  rationale: Se mantiene «corazón» porque el texto griego usa καρδία y Juan apela al centro interior de la persona, no a una reinterpretación explícita como «conciencia».
- source_word: μείζων
  english_pob_choice: greater
  chosen_spanish: es mayor
  alternatives_spanish:
  - es más grande
  - es superior
  lexicon: BDAG
  rationale: «Mayor» conserva el comparativo amplio del griego sin limitarlo a un solo ámbito. En español, «es mayor que» suena natural y solemne.
- source_word: τῆς καρδίας ἡμῶν
  english_pob_choice: than our heart
  chosen_spanish: que nuestro corazón
  alternatives_spanish:
  - que el corazón que tenemos
  - que el corazón dentro de nosotros
  lexicon: BDAG
  rationale: La comparación con el genitivo se expresa idiomáticamente en español con «que». Se repite «nuestro corazón» para mantener visible el paralelismo con el griego.
- source_word: γινώσκει πάντα
  english_pob_choice: he knows all things
  chosen_spanish: conoce todas las cosas
  alternatives_spanish:
  - lo conoce todo
  - sabe todas las cosas
  lexicon: BDAG
  rationale: «Conoce» conserva el verbo de conocimiento relacional/cognitivo del griego; «todas las cosas» mantiene la amplitud de πάντα sin reducirla a una paráfrasis más libre.
theological_decisions:
- issue: Alcance de «Dios es mayor que nuestro corazón»
  english_pob_reading: Render the statement without narrowing it to only mercy, only authority, or only omniscience.
  chosen_spanish_reading: 'Traducir la afirmación sin cerrarla a una sola precisión doctrinal: Dios es mayor que nuestro corazón, y conoce todas las cosas.'
  alternative_spanish_readings:
  - Dios es más misericordioso que nuestra conciencia que condena
  - Dios revoca el veredicto de nuestra autocondena
  - Dios conoce la verdad completa más allá de nuestra valoración parcial
  rationale: El griego afirma de forma amplia que Dios es mayor que nuestro corazón, y añade su conocimiento de todas las cosas. Conviene preservar esa amplitud en español y dejar que la segunda cláusula aporte el matiz de conocimiento sin resolver la comparación en una sola explicación.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: No hay revisiones aplicadas en el historial; el estado más reciente indica que el texto quedó sin cambios tras la última pasada, y el cotejo externo muestra alto acuerdo.
  spanish_consistency_notes:
  - Se conservó «corazón» en vez de «conciencia» para respetar el término griego καρδία.
  - Se usó «mayor que» para mantener el comparativo amplio de μείζων sin especificarlo en exceso.
  - Se eligió «conoce todas las cosas» para reflejar el alcance total de πάντα y conservar un registro bíblico natural en español.
  - Se mantuvo un estilo sobrio y publicable, con puntuación española estándar y sintaxis fluida.
