translation:
  language: es
  text: José permaneció en Egipto[a], él y la familia de su padre, y José vivió 110 años.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'habitó en Egipto, él y la casa de su padre'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּשֶׁב
  english_pob_choice: remained
  chosen_spanish: permaneció
  alternatives_spanish:
  - habitó
  - se quedó
  - moró
  lexicon: HALOT
  rationale: ישב puede significar 'sentarse', 'habitar' o 'permanecer'. Aquí se trata de una nota narrativa de residencia continuada en Egipto; 'permaneció' comunica bien la idea sin sonar arcaico ni confundirlo con el verbo de vida de la segunda mitad del versículo. 'Habitó' sería más tradicional, pero menos natural en español actual.
- source_word: בְּמִצְרַיִם
  english_pob_choice: in Egypt
  chosen_spanish: en Egipto
  alternatives_spanish:
  - en la tierra de Egipto
  lexicon: HALOT
  rationale: La locución es locativa directa y se rinde de forma sencilla como 'en Egipto'. No hace falta ampliar a 'la tierra de' porque el hebreo no lo exige aquí.
- source_word: הוּא וּבֵית אָבִיו
  english_pob_choice: he and his father's household
  chosen_spanish: él y la casa de su padre
  alternatives_spanish:
  - él y la familia de su padre
  - él y su casa paterna
  lexicon: HALOT
  rationale: בֵּית אָבִיו conserva el valor de 'casa/household' en sentido familiar y doméstico. 'Casa de su padre' mantiene la imagen semítica y permite que el lector perciba la unidad familiar sin reducirla a 'familia', que sería más interpretativa. 'Casa paterna' sería menos natural en este contexto.
- source_word: וַיְחִי
  english_pob_choice: lived
  chosen_spanish: vivió
  alternatives_spanish:
  - estuvo vivo
  - siguió viviendo
  lexicon: HALOT
  rationale: En expresiones de edad, חיה introduce la duración de la vida. 'Vivió' es el equivalente natural en español y evita duplicar el sentido de residencia ya expresado por וַיֵּשֶׁב.
- source_word: מֵאָה וָעֶשֶׂר שָׁנִים
  english_pob_choice: 110 years
  chosen_spanish: 110 años
  alternatives_spanish:
  - ciento diez años
  lexicon: HALOT
  rationale: La cifra exacta es ciento diez; usar numerales mantiene claridad y coincide con la práctica moderna de lectura fluida. 'Ciento diez años' también sería válido, pero el número en dígitos facilita la lectura sin alterar el sentido.
- source_word: יוֹסֵף
  english_pob_choice: Joseph
  chosen_spanish: José
  alternatives_spanish:
  - José
  lexicon: uso bíblico español estándar
  rationale: El nombre propio se rinde con su forma bíblica española habitual, 'José', que es plenamente reconocible y fiel al referente hebreo.
translation_notes:
  revision_awareness: 'Se mantiene el paralelismo semántico del hebreo: una cláusula de residencia continuada en Egipto, seguida de una cláusula de duración de vida. No se ha suavizado la referencia familiar de ''la casa de su padre'', porque el hebreo usa un sustantivo de ''casa'' con fuerza de household, y la nota alternativa preserva la opción más literal.'
  spanish_consistency_notes:
  - Se distingue 'permaneció' de 'vivió' para no fusionar los dos verbos hebreos distintos.
  - Se conserva 'la casa de su padre' como equivalente transparente de בֵּית אָבִיו, con la alternativa 'habitó' anotada para reflejar el rango léxico.
  - El orden de las cláusulas sigue de cerca el hebreo y la puntuación ayuda a separar la residencia de la declaración de edad.
