translation:
  text: 'Mary said to Jesus[strip naked], "Whom are your disciples like?"


    He said, "They are like little children who have settled in a field that is not
    theirs. When the owners of the field come, they will say, ''Leave our field to
    us.'' They strip naked before them in order to leave it to them and give their
    field to them.


    "Therefore I say: If the master of the house knows that the thief is coming, he
    will keep watch before he comes and will not let him dig into his house of his
    kingdom to carry away his goods.


    "But you, keep watch against the world. Gird yourselves upon your loins with great
    power, so that the robbers will not find a way to come to you. Because the advantage
    you expect will be found.


    "Let there be among you a person of understanding. When the fruit ripened, he
    came quickly, his sickle in his hand; he harvested it. Whoever has ears to hear[advantage][house
    of his kingdom], let him hear."'
  philosophy: formal
  drafter_model: gemini-3.1-pro-preview
  drafter_label: gemini_3_1_pro_thomas_redraft
  drafted_at: '2026-04-22T10:50:46Z'
  footnotes:
  - marker: strip naked
    text: Coptic ⲥⲉⲕⲁⲕⲁϩⲏⲩ. The imagery of stripping naked connects to Thomasine themes
      of returning to a primordial, unashamed state (cf. Saying 37).
    reason: theological_note
  - marker: house of his kingdom
    text: A unique Thomasine phrase (ⲡⲉϥⲏⲉⲓ ⲛ̄ⲧⲉⲧⲉϥ⳿ⲙⲛ̄ⲧⲉⲣⲟ), diverging from the Synoptic
      parallel (Matt 24:43, Luke 12:39) which simply has 'his house.'
    reason: textual_variant
  - marker: advantage
    text: Greek loanword χρεία (chreia), which can mean 'need,' 'necessity,' 'use,'
      or 'advantage.' The exact sense here is debated; it may refer to the necessity
      or advantage of being prepared.
    reason: lexical_alternative
lexical_decisions:
- source_word: ϭⲉⲗⲓⲧ
  chosen: settled
  rationale: Qualitative of ϭⲟⲓⲗⲉ, meaning to sojourn, dwell, or settle.
  lexicon: Crum
  alternatives:
  - living
  - dwelling
  entry: 811a
- source_word: ⲕⲁⲕⲁϩⲏⲩ
  chosen: strip naked
  rationale: Verb/qualitative meaning 'to be naked'. In this context, it describes
    the action of the children taking off their clothes to return the field.
  lexicon: Crum
  alternatives:
  - are naked
  - undress
  entry: 102b
- source_word: ϣⲟϫⲧ
  chosen: dig
  rationale: Infinitive of ϣⲱϫⲧ, meaning to dig or break through (as a thief breaking
    into a house).
  lexicon: Crum
  alternatives:
  - break through
  entry: 609a
- source_word: ⲭⲣⲉⲓⲁ
  chosen: advantage
  rationale: Greek loanword (χρεία) meaning need, necessity, use, or advantage. Here
    it likely refers to the advantage or necessity of being prepared.
  lexicon: BDAG
  alternatives:
  - difficulty
  - need
  entry: χρεία
- source_word: ⲡⲱϩ
  chosen: ripened
  rationale: Means to reach, arrive, or (of fruit) to ripen.
  lexicon: Crum
  alternatives:
  - matured
  entry: 283a
- source_word: ϩⲁⲥ-
  chosen: harvested
  rationale: Pronominal state of ϩⲱⲥ, meaning to reap or harvest.
  lexicon: Crum
  alternatives:
  - reaped
  entry: 712a
theological_decisions:
- issue: Harmonization with Synoptic parallels
  chosen_reading: house of his kingdom
  rationale: Preserved exactly as in Coptic, resisting harmonization to the Synoptic
    'his house' (Matt 24:43). The addition of 'of his kingdom' is a deliberate Thomasine
    theological expansion.
  alternatives_noted:
  - his house
- issue: Translation of ⲥⲉⲕⲁⲕⲁϩⲏⲩ
  chosen_reading: strip naked
  rationale: Preserved literally, as it carries significant theological weight in
    Thomas (stripping off the garments of shame/flesh to enter the kingdom).
  alternatives_noted:
  - undress
drafter_notes: Saying 21 is a composite of several distinct sayings/parables (the
  children in the field, the thief in the night, the exhortation to watchfulness,
  and the harvest). The translation preserves the abrupt transitions and distinctive
  Thomasine vocabulary (e.g., 'house of his kingdom', 'strip naked') without harmonizing
  to the canonical parallels in Matthew, Mark, and Luke.
