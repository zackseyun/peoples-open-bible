    rationale: La nota actual dice «Nabucodre...», lo cual no cumple bien la función explicativa documentada en el English POB. Debe indicarse claramente que la forma hebrea se aproxima más a «Nabucodrezar», mientras que en español se conserva «Nabucodonosor» por tradición y reconocimiento.
  - severity: low
