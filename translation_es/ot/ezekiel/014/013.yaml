  to: Hijo de hombre[a], si una tierra peca contra mí actuando con infidelidad, y yo extiendo mi mano contra ella, y quiebro su provisión de pan[b], y envío hambruna sobre ella, y elimino de ella al hombre y la bestia[c],
  rationale: 'Se corrigen varios calcos para ajustarse mejor al hebreo y a la filosofía POB: se mantiene la fórmula profética con español más natural; se reemplaza ''sustento de pan'' por ''provisión de pan'' y se conserva la imagen literal en nota; se usa ''hambruna'' para רָעָב como calamidad; y se rebaja ''exterminaré'' a ''elimino'' para no sobretraducir כרת. También se añade una nota para el modismo de ''bastón de pan'', siguiendo el patrón del inglés auditado.'
  reviewer_model: gpt-5.4
