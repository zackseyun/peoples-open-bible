base_translation:
  language: en
  yaml_path: translation/deuterocanon/judith/007/002.yaml
  text: And on that day every one of their mighty men broke camp[a]; and their force of fighting men was one hundred seventy thousand foot soldiers and twelve thousand horsemen, besides the baggage and the men on foot among them[b], a very great multitude.
  footnotes:
  - marker: a
    text: The Greek wording after 'besides the baggage train' is syntactically difficult. It likely refers to a very large number of accompanying men on foot associated with the army's baggage and support train, beyond the stated combat totals.
