    rationale: La auditoría inglesa conserva una alternativa equivalente a «with a loud voice exceedingly», explicando que el hebreo intensifica el volumen. En español conviene reflejar esa alternativa de forma más explícita, no solo repetir casi el texto principal.
  revised_spanish_text: Entonces se levantaron los levitas, de los hijos de los coatitas y de los hijos de los coreítas, para alabar a Yahvé, el Dios de Israel, con una voz muy fuerte[a].
