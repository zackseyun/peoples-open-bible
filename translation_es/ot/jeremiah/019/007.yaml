base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/019/007.yaml
  text: And I will frustrate the plan of Judah and Jerusalem in this place[a], and I will make them fall by the sword before their enemies and by the hand of those who seek their life[c][b], and I will give their corpses as food to the birds of the heavens and to the beasts of the earth.
