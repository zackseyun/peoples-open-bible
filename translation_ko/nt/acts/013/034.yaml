id: ACT.13.34
reference: Acts 13:34
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ὅτι δὲ ἀνέστησεν αὐτὸν ἐκ νεκρῶν μηκέτι μέλλοντα ὑποστρέφειν εἰς διαφθοράν, οὕτως εἴρηκεν ὅτι Δώσω ὑμῖν τὰ ὅσια Δαυὶδ τὰ πιστά.
base_translation:
  language: en
  yaml_path: translation/nt/acts/013/034.yaml
  text: 'And that he raised him from the dead, no longer about to return to decay, he has spoken in this way: ‘I will give you the holy and sure blessings of David.’'
  footnotes:
  - marker: a
    text: Or, traditionally, “the sure mercies of David.” The Greek phrase echoes Isaiah 55:3 and refers to the holy, reliable covenant promises associated with David.
    reason: alternative_reading
translation:
  language: ko
  text: 그를 죽은 자들 가운데서 일으키시고 다시는 썩음으로 돌아가지 않게 하실 일에 관하여는, 하나님께서 이렇게 말씀하셨습니다. 「내가 다윗에게 약속한 거룩하고 확실한 복들을 너희에게 주겠다.」
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: τὰ ὅσια Δαυὶδ τὰ πιστά
  english_pob_choice: the holy and sure blessings of David
  chosen_korean: 다윗에게 약속한 거룩하고 확실한 복들
  alternatives_korean:
  - 다윗의 거룩하고 미쁜 복들
  lexicon: BDAG
  rationale: 이사야 55:3(LXX) 인용. ὅσια는 언약적 「거룩한 자비」를 가리키는 다층적 단어로, 한국어 「거룩한 복」으로 옮기되 πιστά의 「확실한」을 병기해 언약 안정성을 살린다.
theological_decisions:
- issue: 사 55:3 LXX 인용 — 다윗 언약의 부활-적용
  chosen_reading: 내가 다윗에게 약속한 거룩하고 확실한 복들을 너희에게 주겠다
  alternative_readings:
  - 내가 다윗의 거룩하고 미쁜 은사를 너희에게 주리라
  rationale: LXX 본문이 다윗 언약의 안정성(πιστά)을 부활하신 메시아에게 적용하는 바울의 미드라쉬적 논증을 보존하기 위해 「약속한」을 보충 추가하고 청자(너희에게)를 명시한다.
  doctrine_reference: 'DOCTRINE.md: OT citation; covenantal stability applied to resurrection'
