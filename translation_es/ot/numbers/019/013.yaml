translation:
  language: es
  text: Todo el que toque a un muerto, el cuerpo de un hombre que haya muerto, y no se purifique, ha contaminado el tabernáculo de Yahvé; esa persona será cortada de Israel. Porque no se roció sobre él el agua de impureza[a], quedará impuro; su impureza sigue sobre él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el agua de purificación». El hebreo dice literalmente «agua de impureza», refiriéndose al agua usada para quitar la impureza causada por un cadáver.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַנֹּגֵעַ
  english_pob_choice: touches
  chosen_spanish: toque
  alternatives_spanish:
  - entre en contacto con
  - toque con la mano
  lexicon: HALOT
  rationale: El participio denota contacto físico. En español, «toque» conserva la relación directa y suena natural en una formulación general e inclusiva con «Todo el que».
- source_word: בְּמֵת
  english_pob_choice: a dead person
  chosen_spanish: a un muerto
  alternatives_spanish:
  - a un cadáver
  - a una persona muerta
  lexicon: HALOT
  rationale: El hebreo dice literalmente «un muerto». «A un muerto» mantiene la brevedad y el valor sustantivo del término, sin perder claridad.
- source_word: בְּנֶפֶשׁ הָאָדָם אֲשֶׁר יָמוּת
  english_pob_choice: the body of a man who has died
  chosen_spanish: el cuerpo de un hombre que haya muerto
  alternatives_spanish:
  - el cadáver de un ser humano que haya muerto
  - el cuerpo de una persona que haya muerto
  lexicon: HALOT
  rationale: נֶפֶשׁ en este contexto de impureza por cadáver se refiere concretamente al cuerpo del muerto. «Cuerpo» expresa esa referencia corpórea; «hombre» refleja אָדָם como singular genérico, como en el audit trail inglés.
- source_word: יִתְחַטָּא
  english_pob_choice: purify himself
  chosen_spanish: se purifique
  alternatives_spanish:
  - se limpie ritualemente
  - se purifique ritualmente
  lexicon: HALOT
  rationale: El hitpael de חטא aquí es purificación ritual, no arrepentimiento moral. «Se purifique» es la forma natural en español y conserva el sentido cultual.
- source_word: מִשְׁכַּן יְהוָה
  english_pob_choice: the tabernacle of Yahweh
  chosen_spanish: el tabernáculo de Yahvé
  alternatives_spanish:
  - la morada de Yahvé
  - el santuario de Yahvé
  lexicon: HALOT
  rationale: מִשְׁכָּן corresponde de manera precisa a «tabernáculo». Se mantiene «Yahvé» como decisión terminológica del proyecto, no la sustitución por un título enmascarado.
- source_word: טִמֵּא
  english_pob_choice: has defiled
  chosen_spanish: ha profanado
  alternatives_spanish:
  - ha contaminado
  - ha hecho impuro
  lexicon: HALOT
  rationale: En relación con el santuario, el valor cultual es el de profanación/contaminación ritual. «Ha profanado» transmite la gravedad del daño al espacio santo; se evita reducirlo solo a «contaminó», que puede sonar demasiado material.
- source_word: וְנִכְרְתָה הַנֶּפֶשׁ הַהִוא
  english_pob_choice: that person shall be cut off
  chosen_spanish: esa persona será eliminada
  alternatives_spanish:
  - esa persona será cortada
  - esa alma será eliminada
  - esa persona será cortada de en medio
  lexicon: HALOT
  rationale: La fórmula hebrea de כרת tiene un peso jurídico-covenantal, pero en español «será eliminada» comunica la sanción sin decidir en exceso entre muerte, exclusión o extirpación. Se preserva así la tensión interpretativa del texto.
- source_word: מִיִּשְׂרָאֵל
  english_pob_choice: from Israel
  chosen_spanish: de Israel
  alternatives_spanish:
  - de en medio de Israel
  - del pueblo de Israel
  lexicon: HALOT
  rationale: «De Israel» reproduce de forma directa la separación del pueblo del pacto; «de en medio de Israel» es posible, pero aquí el español fluye mejor con «será eliminada de Israel».
- source_word: מֵי נִדָּה
  english_pob_choice: the water for impurity
  chosen_spanish: el agua de impureza
  alternatives_spanish:
  - el agua de purificación
  - el agua para impureza
  - el agua de inmundicia
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente «agua de impureza». Se conserva esa forma para ser fieles al dato léxico, aunque en nota se reconoce la alternativa funcional del agua usada para la purificación.
- source_word: זֹרַק עָלָיו
  english_pob_choice: was not sprinkled on him
  chosen_spanish: no fue rociada sobre él
  alternatives_spanish:
  - no fue asperjada sobre él
  - no se le roció
  lexicon: HALOT
  rationale: En este rito la acción es la aspersión del agua. «Rociada» es idiomático en español y mantiene la imagen de aplicación sobre la persona.
- source_word: טָמֵא יִהְיֶה
  english_pob_choice: he shall be unclean
  chosen_spanish: quedará impuro
  alternatives_spanish:
  - será impuro
  - seguirá impuro
  lexicon: HALOT
  rationale: La frase expresa un estado ritual resultante. «Quedará impuro» comunica bien esa condición persistente sin sonar extraña en español.
- source_word: עוֹד טֻמְאָתוֹ בּוֹ
  english_pob_choice: his uncleanness is still on him
  chosen_spanish: su impureza sigue sobre él
  alternatives_spanish:
  - su impureza permanece en él
  - todavía lleva su impureza
  lexicon: HALOT
  rationale: עוֹד indica continuidad; la expresión hebrea sugiere algo que permanece adherido. «Sigue sobre él» conserva la imagen y la idea de persistencia ritual.
theological_decisions:
- issue: Fórmula de sanción כרת
  english_pob_reading: Retain the covenantal formula 'shall be cut off' without specifying death, excommunication, or childlessness.
  chosen_spanish_reading: 'Conservar una formulación abierta: «será eliminada de Israel».'
  alternative_spanish_readings:
  - será cortada de Israel
  - será apartada de Israel
  - será excluida de Israel
  rationale: El hebreo no define aquí el modo exacto del juicio. «Eliminada» preserva la fuerza sancionatoria sin resolver indebidamente una cuestión interpretativa debatida.
  doctrine_reference: Preservar la tensión teológica/jurídica del texto, no cerrarla con una explicación no explicitada por el versículo.
- issue: Valor de אָדָם dentro de la frase intercalada
  english_pob_reading: Use 'man' within the phrase 'the body of a man who has died' while the sentence opens with inclusive 'Everyone.'
  chosen_spanish_reading: Usar «hombre» en «el cuerpo de un hombre que haya muerto», manteniendo «Todo el que» al inicio.
  alternative_spanish_readings:
  - el cuerpo de una persona que haya muerto
  - el cuerpo de un ser humano que haya muerto
  rationale: Así se conserva el singular genérico del hebreo sin perder la inclusividad del destinatario general. La combinación de «Todo el que» y «hombre» refleja bien ambos niveles.
  doctrine_reference: Precisión de género/forma en el hebreo, sin sacrificar la amplitud del mandato.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el paquete fuente y el audit trail inglés: mantiene la fórmula de sanción sin explicarla en exceso, conserva la tensión de מֵי נִדָּה con una nota alternativa, y refleja el valor ritual de טמא/יטהר en español moderno y digno. No se introdujeron ampliaciones interpretativas fuera de lo atestiguado por el hebreo y la decisión inglesa auditada.'
  spanish_consistency_notes:
  - Se usa «Yahvé» conforme al estándar del proyecto para יהוה.
  - Se mantiene «tabernáculo» para מִשְׁכָּן por precisión terminológica.
  - Se traduce el campo cultual de pureza con «impuro / impureza», reservando «profanado» para el daño al santuario.
  - La nota al pie marca solo la alternativa necesaria ligada a la sanción de כרת; no se añade otra nota porque la frase «agua de impureza» ya resulta suficientemente transparente en el texto principal.
