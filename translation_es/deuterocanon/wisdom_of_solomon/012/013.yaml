translation:
  language: es
  text: Porque no hay dios fuera de ti, que cuida de todos[a], para que muestres que no juzgaste injustamente;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que cuida de todo». La construcción griega puede expresarse también de manera más directa como «que cuida de todos»; el alcance de «todos» abarca universalmente, sin limitarse solo a personas o solo a cosas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὔτε γὰρ
  english_pob_choice: For ... no
  chosen_spanish: Porque no
  alternatives_spanish:
  - Pues no
  - Porque no hay
  lexicon: LSJ
  rationale: γάρ da una relación explicativa, bien expresada por «Porque». La negación existencial se vuelve naturalmente «no hay» en español, sin forzar un calco de la partícula οὔτε.
- source_word: θεός
  english_pob_choice: god
  chosen_spanish: dios
  alternatives_spanish:
  - Dios
  lexicon: LSJ
  rationale: El griego usa θεός sin artículo en una fórmula exclusiva. En español, «dios» en minúscula comunica la categoría negada a todos los demás, mientras el contexto identifica al único verdadero destinatario con «ti».
- source_word: πλὴν σοῦ
  english_pob_choice: besides you
  chosen_spanish: fuera de ti
  alternatives_spanish:
  - excepto tú
  - aparte de ti
  - además de ti
  lexicon: LSJ
  rationale: πλήν con genitivo expresa excepción/exclusión. «Fuera de ti» preserva bien la exclusividad en español y suena natural en una afirmación teológica.
- source_word: ᾧ μέλει περὶ πάντων
  english_pob_choice: who cares for all
  chosen_spanish: que te ocupas de todos
  alternatives_spanish:
  - que cuidas de todos
  - que te preocupas por todos
  - cuya solicitud es por todos
  lexicon: LSJ
  rationale: μέλει es una construcción impersonal con matiz de preocupación/solicitud. «Te ocupas de» mantiene la relación personal y la amplitud de πάντων sin sonar rígido; se conserva la idea de cuidado universal, no una abstracción.
- source_word: πάντων
  english_pob_choice: all
  chosen_spanish: de todos
  alternatives_spanish:
  - de todo
  - de todas las cosas
  - de todos y de todo
  lexicon: LSJ
  rationale: El genitivo plural puede abarcar personas o cosas. «De todos» es amplio y natural en español, y deja abierta la extensión universal que el griego sugiere.
- source_word: ἵνα δείξῃς
  english_pob_choice: so that you should show
  chosen_spanish: para que muestres
  alternatives_spanish:
  - para que tú muestres
  - a fin de que muestres
  - para mostrar
  lexicon: LSJ
  rationale: ἵνα con subjuntivo expresa finalidad. «Para que muestres» reproduce esa relación de propósito con naturalidad en español.
- source_word: οὐκ ἀδίκως
  english_pob_choice: did not judge unjustly
  chosen_spanish: no juzgaste injustamente
  alternatives_spanish:
  - no juzgaste mal
  - juzgaste justamente
  lexicon: LSJ
  rationale: La forma griega conserva la negación adverbial. «No juzgaste injustamente» mantiene la estructura y evita convertir el texto en una afirmación positiva que suavice la forma original.
- source_word: ἔκρινας
  english_pob_choice: judge
  chosen_spanish: juzgaste
  alternatives_spanish:
  - sentenciaste
  - emitiste juicio
  - condenaste
  lexicon: LSJ
  rationale: κρίνω se refiere al acto judicial divino. «Juzgaste» es el equivalente más directo y transparente en español.
theological_decisions:
- issue: Cómo reflejar la exclusividad divina de θεός sin borrar la distinción entre categoría y persona
  english_pob_reading: no god besides you
  chosen_spanish_reading: no hay dios fuera de ti
  alternative_spanish_readings:
  - no hay Dios fuera de ti
  - fuera de ti no existe dios alguno
  rationale: La minúscula «dios» preserva la fuerza categorial de la exclusión en el griego, mientras «ti» identifica al único referente verdadero. Se evita capitalizar por tradición cuando la forma del original apunta a una negación de toda divinidad rival.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation tradition'
- issue: Cómo traducir οὐκ ἀδίκως sin convertir la negación en una paráfrasis positiva
  english_pob_reading: you did not judge unjustly
  chosen_spanish_reading: no juzgaste injustamente
  alternative_spanish_readings:
  - juzgaste justamente
  - no fue injusto tu juicio
  rationale: El griego expresa la idea en forma negada; mantenerla así conserva la tensión retórica y evita aplanarla en una fórmula teológica más interpretativa.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: La redacción sigue la revisión que prefirió una formulación más natural y directa para la cláusula de cuidado universal, manteniendo el registro formal y la conexión explicativa del griego. También se conserva la lectura negativa de οὐκ ἀδίκως, en línea con la nota auditada del POB inglés.
  spanish_consistency_notes:
  - Se mantiene «dios» en minúscula para la exclusión categorial, conforme al valor anarthrous del griego.
  - Se usa «Yahvé» solo cuando el texto fuente lo requiera explícitamente; aquí el referente se expresa por el pronombre «ti».
  - 'Se conserva el paralelismo lógico: exclusividad divina, cuidado universal y finalidad de vindicar la justicia del juicio divino.'
  - La nota al pie marca la alternativa de traducción del relativo griego sin introducir una segunda interpretación doctrinal.
