review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido general del griego: no ceder autoridad sobre la propia persona durante la vida, ni transferir los bienes a otro de modo que luego haya arrepentimiento y necesidad de pedirlos de vuelta. Sin embargo, hay dos ajustes importantes. Primero, «en tu vida» suena menos natural y algo ambiguo en español frente al valor temporal de ἐν ζωῇ σου; «mientras vivas» expresa mejor el sentido. Segundo, la nota [a] no corresponde a una alternativa preservada por la auditoría inglesa ni resuelve una ambigüedad creada por el español; además distrae del punto principal. La cláusula final está bien entendida como pedir los bienes de nuevo, aunque conviene usar una construcción española más natural.'
  spanish_quality_summary: El texto es legible y digno, pero «No des autoridad sobre ti, en tu vida» resulta algo rígido. «No des autoridad sobre ti mientras vivas» o «No cedas autoridad sobre ti mientras vivas» fluye mejor. «Al hijo o a la esposa» es comprensible, aunque sin necesidad de nota. «Tengas que pedirlos de nuevo» es correcto; «pedirlos de vuelta» también sería natural, pero no imprescindible. En conjunto, requiere una reparación menor de estilo y de aparato de notas.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Autoridad» para ἐξουσίαν, «bienes» para χρήματα, y «arrepientas» para μεταμεληθείς concuerdan con la auditoría inglesa y con el sentido fuente. No hay términos teológicos sensibles aquí.
  issues:
  - severity: medium
    issue: «en tu vida» no expresa con la mayor claridad el valor temporal de ἐν ζωῇ σου
    rationale: 'El griego marca duración temporal: ‘durante tu vida / mientras vivas’. En español, «en tu vida» puede sonar idiomáticamente como ‘jamás’ o como esfera existencial, no solo tiempo de vida.'
  - severity: medium
    issue: La nota [a] es innecesaria y no está justificada por la auditoría inglesa
    rationale: La nota inglesa trata la cláusula final comprimida, no la lista de relaciones. La nota española introduce una observación gramatical que no preserva una alternativa significativa ni resuelve una ambigüedad relevante.
  - severity: low
    issue: El orden y la puntuación de «sobre ti, en tu vida» suenan algo forzados
    rationale: Mover el complemento temporal a «mientras vivas» mejora la naturalidad sin apartarse del griego.
  revised_spanish_text: No des autoridad sobre ti mientras vivas al hijo o a la esposa, al hermano o al amigo; y no entregues tus bienes a otro, para que no te arrepientas y tengas que pedirlos de nuevo.
  revision_rationale: Se elimina la nota innecesaria y se ajusta ἐν ζωῇ σου a «mientras vivas», que expresa con mayor precisión y naturalidad el sentido temporal del griego. El resto del versículo se mantiene porque representa fielmente la advertencia sapiencial y la interpretación auditada de la cláusula final.
