lexical_decisions:
- source_word: δόξασον
  english_pob_choice: Honor
  chosen_spanish: Honra
  alternatives_spanish:
  - Glorifica
  - Da honor a
  lexicon: LSJ
  rationale: El imperativo de δοξάζω puede expresarse en español con 'honrar' de forma natural y fiel. 'Glorificar' sería más solemne, pero menos idiomático aquí; 'da honor a' es más perifrástico y pesado.
- source_word: χεῖρα
  english_pob_choice: the hand
  chosen_spanish: la mano
  alternatives_spanish:
  - mano
  lexicon: LSJ
  rationale: χείρ significa directamente 'mano'. En español, el artículo definido mantiene la naturalidad de la expresión coordinada con 'el brazo derecho'.
- source_word: βραχίονα
  english_pob_choice: arm
  chosen_spanish: el brazo
  alternatives_spanish:
  - antebrazo
  lexicon: LSJ
  rationale: βραχίων se traduce con claridad como 'brazo'. 'Antebrazo' sería demasiado anatómico y no refleja bien el uso literario-bíblico del término.
- source_word: δεξιόν
  english_pob_choice: right
  chosen_spanish: derecho
  alternatives_spanish:
  - de la derecha
  - a la derecha
  lexicon: LSJ
  rationale: El adjetivo δεξιόν modifica 'brazo' y se vierte naturalmente como 'derecho'. Con ello se conserva la asociación bíblica de la derecha con fuerza o favor sin añadir interpretación.
