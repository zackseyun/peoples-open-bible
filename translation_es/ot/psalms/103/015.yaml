translation:
  language: es
  text: En cuanto al hombre[a], sus días son como la hierba; florece como una flor del campo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «así florece». El verbo hebreo evoca la imagen de una flor que brota o se abre.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱנוֹשׁ
  english_pob_choice: man
  chosen_spanish: el hombre
  alternatives_spanish:
  - mortal
  - ser humano
  - humanidad
  lexicon: HALOT
  rationale: אֱנוֹשׁ conserva el valor genérico de 'hombre' en singular y, en poesía, también sugiere fragilidad humana. 'El hombre' mantiene esa fuerza singular sin volver la frase abstracta como 'humanidad'. El contexto ya comunica la transitoriedad.
- source_word: כֶּחָצִיר
  english_pob_choice: like grass
  chosen_spanish: como la hierba
  alternatives_spanish:
  - como el pasto
  - como la hierba del campo
  lexicon: HALOT
  rationale: El prefijo כ expresa comparación. 'Como la hierba' es natural en español y preserva la imagen breve y perecedera sin añadir precisión no exigida por el hebreo.
- source_word: יָמָיו
  english_pob_choice: his days
  chosen_spanish: sus días
  alternatives_spanish:
  - los días de su vida
  - su vida
  lexicon: HALOT
  rationale: La expresión hebrea alude al lapso vital del hombre. 'Sus días' reproduce de forma directa la construcción y deja intacta la imagen temporal.
- source_word: כְּצִיץ הַשָּׂדֶה
  english_pob_choice: like a flower of the field
  chosen_spanish: como la flor del campo
  alternatives_spanish:
  - como una flor del campo
  - como una flor silvestre
  lexicon: HALOT
  rationale: צִיץ designa una flor o brote floral. 'Flor' es la equivalencia más natural y clara en español; 'del campo' conserva el genitivo y evita imponer 'silvestre', que sería más interpretativo.
- source_word: כֵּן
  english_pob_choice: he
  chosen_spanish: florece
  alternatives_spanish:
  - así florece
  - de esa manera florece
  lexicon: HALOT
  rationale: 'כֵּן introduce el resultado de la comparación. En español, el valor se expresa mejor con un verbo que complete la imagen: ''florece''. Se evita un ''así'' redundante que sonaría menos natural.'
- source_word: יָצִיץ
  english_pob_choice: he flourishes
  chosen_spanish: florece
  alternatives_spanish:
  - brota
  - resplandece
  - se abre
  lexicon: HALOT
  rationale: El verbo hifil de צוץ evoca el acto de brotar o florecer de una planta. 'Florece' reproduce la imagen vegetal y mantiene la idea de un esplendor breve y visible. 'Brota' acerca el matiz de surgimiento, pero 'florece' encaja mejor con la comparación con la flor.
theological_decisions:
- issue: La comparación poética subraya la mortalidad y fragilidad humanas sin convertir el verso en una afirmación doctrinal explícita.
  english_pob_reading: As for man, his days are like grass; he flourishes like a flower of the field.
  chosen_spanish_reading: En cuanto al hombre, sus días son como la hierba; florece como la flor del campo.
  alternative_spanish_readings:
  - El hombre es como la hierba en sus días; florece como flor del campo.
  - En cuanto al hombre, sus días son como el pasto; brota como una flor del campo.
  rationale: 'La versión española conserva la misma tensión poética: la vida humana es breve como la hierba y su esplendor pasa como una flor del campo. No se moraliza ni se explicita más de lo que el hebreo presenta.'
  doctrine_reference: Salmo 103:15; cf. Isaías 40:6-8 sobre la fragilidad humana.
translation_notes:
  revision_awareness: 'El pasaje muestra alta concordancia con el auditor de inglés: se mantiene la comparación doble y el verbo final se vierte de modo natural como ''florece'', respetando el matiz vegetal del hifil hebreo. No se requieren revisiones textuales ni ajustes por variantes.'
  spanish_consistency_notes:
  - Se mantiene 'hierba' en lugar de 'pasto' por ser más amplio y reverente en estilo poético.
  - '''Flor del campo'' conserva la imagen genitiva sin añadir ''silvestre''.'
  - No se usa 'SEÑOR' ni otra sustitución cultual, pues el verso no contiene el Nombre divino.
