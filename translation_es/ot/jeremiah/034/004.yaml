translation:
  language: es
  text: 'Pero escucha la palabra de Yahvé, Sedecías, rey de Judá: Así dice Yahvé respecto de ti: No morirás a espada.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: אַךְ
  english_pob_choice: Yet
  chosen_spanish: Pero
  alternatives_spanish:
  - Sin embargo
  - No obstante
  - Mas
  lexicon: HALOT
  rationale: El hebreo introduce una contraposición o transición atenuada; en español, «Pero» comunica con naturalidad el giro concesivo sin añadir énfasis extra.
- source_word: שְׁמַע
  english_pob_choice: hear
  chosen_spanish: escucha
  alternatives_spanish:
  - oye
  - escucha atentamente
  lexicon: HALOT
  rationale: El imperativo profético pide prestar atención al mensaje divino. «Escucha» conserva la fuerza exhortativa y es idiomático en español bíblico moderno.
- source_word: דְּבַר יְהוָה
  english_pob_choice: the word of Yahweh
  chosen_spanish: la palabra de Yahvé
  alternatives_spanish:
  - el mensaje de Yahvé
  - la palabra del SEÑOR
  lexicon: HALOT
  rationale: «Palabra» mantiene el registro profético y pactal del hebreo. Se conserva «Yahvé» conforme al criterio del proyecto para יהוה.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: El Tetragrámaton se translitera como «Yahvé», no se sustituye por un título, para preservar el nombre divino según la norma del proyecto.
- source_word: צִדְקִיָּהוּ
  english_pob_choice: Zedekiah
  chosen_spanish: Sedequías
  alternatives_spanish:
  - Sedecías
  lexicon: HALOT
  rationale: Se usa la forma castellana asentada del nombre propio, más legible para lectores hispanos que la transliteración estricta.
- source_word: מֶלֶךְ יְהוּדָה
  english_pob_choice: king of Judah
  chosen_spanish: rey de Judá
  alternatives_spanish:
  - monarca de Judá
  lexicon: HALOT
  rationale: La relación de oficio y territorio se expresa de modo directo y natural en español con «rey de Judá».
- source_word: כֹּה אָמַר יְהוָה
  english_pob_choice: Thus says Yahweh
  chosen_spanish: Así dice Yahvé
  alternatives_spanish:
  - Así ha dicho Yahvé
  - Esto dice Yahvé
  lexicon: HALOT
  rationale: La fórmula profética se conserva con la solemnidad y economía del hebreo; «Así dice» reproduce bien el giro oracular.
- source_word: עָלֶיךָ
  english_pob_choice: concerning you
  chosen_spanish: acerca de ti
  alternatives_spanish:
  - sobre ti
  - respecto de ti
  lexicon: HALOT
  rationale: Aquí la preposición introduce el contenido del oráculo dirigido a Sedequías. «Acerca de ti» evita una lectura hostil que el contexto inmediato no exige.
- source_word: לֹא תָמוּת
  english_pob_choice: You shall not die
  chosen_spanish: No morirás
  alternatives_spanish:
  - No vas a morir
  - No perecerás
  lexicon: HALOT
  rationale: La negación del futuro profético se expresa de manera sobria y directa. En español, «No morirás» suena natural y mantiene la solemnidad del anuncio.
- source_word: בֶּחָרֶב
  english_pob_choice: by the sword
  chosen_spanish: a espada
  alternatives_spanish:
  - por la espada
  - mediante la espada
  lexicon: HALOT
  rationale: El hebreo usa la espada como instrumento de muerte. «A espada» es la forma idiomática más natural en español bíblico y conserva la imagen sin explicarla de más.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se preserva el nombre propio divino en transliteración, conforme a la política del proyecto y al valor directo del hebreo, evitando la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Valor de la fórmula profética אָמַר יְהוָה
  english_pob_reading: Thus says Yahweh
  chosen_spanish_reading: Así dice Yahvé
  alternative_spanish_readings:
  - Así ha dicho Yahvé
  - Dice Yahvé
  rationale: La fórmula se mantiene como oráculo solemne y no se reduce a una simple cita narrativa; esto conserva el tono profético del pasaje.
  doctrine_reference: Uso profético estándar en los libros proféticos del AT
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto hebreo WLC y coincide sustancialmente con el audit trail inglés: mantiene la estructura exhortación + fórmula profética + promesa negativa, sin introducir matices adicionales ni suavizar la imagen de «espada».'
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יהוה.
  - Se prefiere «espada»/«a espada» para בֶּחָרֶב por ser el idiomatismo natural del español bíblico.
  - Se opta por «Sedequías» como forma castellana del nombre propio, manteniendo claridad lectora.
