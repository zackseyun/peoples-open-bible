translation:
  language: es
  text: Y hubo una larga guerra[a] entre la casa de Saúl y la casa de David[b], y David se iba fortaleciendo, mientras la casa de Saúl se iba debilitando.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se prolongó». El adjetivo hebreo es literalmente «larga», y aquí se refiere a la duración de la guerra.
    reason: lexical_alternative
  - marker: b
    text: «Casa» puede significar hogar, familia, linaje o casa real; aquí probablemente abarca tanto la dimensión familiar como la política.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתְּהִי
  english_pob_choice: Now ... was
  chosen_spanish: Ahora ... se prolongaba
  alternatives_spanish:
  - Y ... era
  - Entonces ... duraba
  lexicon: HALOT
  rationale: La forma narrativa con waw consecutiva introduce el siguiente tramo del relato. En español, «Ahora» conserva la progresión narrativa sin volver mecánico el hebreo.
- source_word: הַמִּלְחָמָה
  english_pob_choice: the war
  chosen_spanish: la guerra
  alternatives_spanish:
  - el conflicto
  - la lucha
  lexicon: HALOT
  rationale: El sustantivo denota hostilidades abiertas; «guerra» es el equivalente más directo y natural en español.
- source_word: אֲרֻכָּה
  english_pob_choice: was prolonged
  chosen_spanish: se prolongaba
  alternatives_spanish:
  - era larga
  - duraba mucho
  lexicon: HALOT
  rationale: El adjetivo significa literalmente «larga», pero aquí expresa duración. «Se prolongaba» comunica esa duración continua sin perder el valor léxico subyacente.
- source_word: בֵּין בֵּית שָׁאוּל וּבֵין בֵּית דָּוִד
  english_pob_choice: between the house of Saul and the house of David
  chosen_spanish: entre la casa de Saúl y la casa de David
  alternatives_spanish:
  - entre la familia de Saúl y la familia de David
  - entre la dinastía de Saúl y la dinastía de David
  lexicon: HALOT
  rationale: '«Casa» conserva la amplitud del hebreo: puede referirse al hogar/familia y también al linaje o casa real. En este contexto la frase incluye ambas dimensiones.'
- source_word: וְדָוִד הֹלֵךְ וְחָזֵק
  english_pob_choice: David kept growing stronger
  chosen_spanish: David iba fortaleciéndose
  alternatives_spanish:
  - David seguía haciéndose más fuerte
  - David continuaba creciendo en fuerza
  lexicon: HALOT
  rationale: La construcción con הלך más predicado expresa progreso continuo. «Iba fortaleciéndose» reproduce bien ese avance gradual y la comparación implícita con el otro miembro de la frase.
- source_word: וּבֵית שָׁאוּל הֹלְכִים וְדַלִּים
  english_pob_choice: the house of Saul kept growing weaker
  chosen_spanish: la casa de Saúl iba debilitándose
  alternatives_spanish:
  - la casa de Saúl seguía volviéndose más débil
  - la casa de Saúl iba perdiendo fuerzas
  lexicon: HALOT
  rationale: El plural con «casa» funciona colectivamente. «Iba debilitándose» mantiene el paralelismo con David y capta la pérdida progresiva de fuerza o poder.
- source_word: דַלִּים
  english_pob_choice: weaker
  chosen_spanish: debilitándose / más débil
  alternatives_spanish:
  - sin fuerzas
  - pobre
  lexicon: HALOT
  rationale: Aquí el término apunta a disminución de vigor, capacidad y estatus, no a pobreza económica. Por eso se evita «pobres» y se opta por un campo semántico de debilidad.
translation_notes:
  revision_awareness: El texto coincide sustancialmente con la lectura revisada más reciente del inglés POB y conserva su decisión clave sobre la duración de la guerra, el progreso gradual de David y el debilitamiento progresivo de la casa de Saúl. No se detectan cambios textuales relevantes en la revisión auditada.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando aparezca el Tetragrámaton, aunque este versículo no lo contiene.
  - Se conserva «casa» para בית, siguiendo la amplitud semántica de familia/linaje/dinastía reconocida por el POB.
  - Se preserva el paralelismo progresivo con formas perifrásticas («iba fortaleciéndose» / «iba debilitándose») para reflejar la construcción hebrea continua.
