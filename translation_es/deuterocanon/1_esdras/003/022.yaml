translation:
  language: es
  text: Y cuando se levanten del vino[a], no recuerdan lo que hicieron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «del vino». La frase alude a levantarse después de estar bajo los efectos del vino, no necesariamente a una afirmación técnica sobre la sobriedad.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅταν
  english_pob_choice: when
  chosen_spanish: cuando
  alternatives_spanish:
  - siempre que
  - cada vez que
  lexicon: BDAG
  rationale: Introduce una cláusula temporal general. «Cuando» es natural en español y conserva el valor de tiempo indefinido sin sobrecargar el matiz.
- source_word: ἀπὸ τοῦ οἴνου
  english_pob_choice: from the wine
  chosen_spanish: del vino
  alternatives_spanish:
  - del vino en exceso
  - de la bebida
  - de la embriaguez
  lexicon: BDAG
  rationale: Mantiene la imagen concreta del griego («del vino») en vez de interpretar de forma explícita el efecto como embriaguez. El contexto permite entender la alusión a los efectos del vino.
- source_word: ἐγερθῶσιν
  english_pob_choice: they rise
  chosen_spanish: se levanten
  alternatives_spanish:
  - se pongan en pie
  - se despierten
  - se soberen
  lexicon: BDAG
  rationale: La forma verbal expresa levantarse o ponerse en pie. En español, «se levanten» comunica bien la acción sin forzar el sentido hacia «sobrarse» o «despertarse».
- source_word: οὐ μέμνηται
  english_pob_choice: they do not remember
  chosen_spanish: no recuerdan
  alternatives_spanish:
  - no se acuerdan
  - no tienen presente
  lexicon: BDAG
  rationale: El griego presenta una forma singular en el texto de Swete, pero el sentido colectivo es plural. «No recuerdan» sigue la decisión auditada en inglés y suena natural en español.
- source_word: ἃ ἔπραξαν
  english_pob_choice: what they did
  chosen_spanish: lo que hicieron
  alternatives_spanish:
  - las cosas que hicieron
  - lo que han hecho
  lexicon: BDAG
  rationale: Reproduce de forma concisa la cláusula relativa. «Lo que hicieron» es idiomático y fiel al aoristo narrativo del griego.
translation_notes:
  revision_awareness: La revisión más reciente indica sin cambios necesarios; se mantiene la solución auditada en inglés, ajustada al español natural y al mismo grado de literalidad interpretativa.
  spanish_consistency_notes:
  - Se conserva la imagen concreta «del vino» con nota explicativa, como en el aparato inglés.
  - Se evita traducir interpretativamente como «cuando se emborrachen» o «cuando se soberen», para no borrar la tensión léxica del original.
  - Se usa plural en español para reflejar el sentido colectivo de la cláusula, alineado con la decisión inglesa.
  - El registro es sobrio y bíblico sin recurrir a formulaciones arcaizantes innecesarias.
