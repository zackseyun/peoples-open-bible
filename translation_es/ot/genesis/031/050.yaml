translation:
  language: es
  text: Si maltratas a mis hijas[a], o si tomas mujeres además de mis hijas[b]—aunque no haya ningún hombre con nosotros[c]—mira, Dios es testigo entre mí y ti.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «tratas mal».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «tomas otras mujeres además de mis hijas».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «no hay ningún hombre con nosotros»; el sentido es que no hay testigo humano presente.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תְּעַנֶּה
  english_pob_choice: mistreat
  chosen_spanish: maltratas
  alternatives_spanish:
  - afliges
  - oprimes
  - tratas mal
  lexicon: HALOT
  rationale: El piel de ענה aquí expresa causar daño o maltrato en un contexto relacional y matrimonial. «Maltratas» comunica esa idea de forma natural en español y evita la rigidez de «afliges» o la carga más amplia de «oprimes».
- source_word: בְּנֹתַי
  english_pob_choice: my daughters
  chosen_spanish: mis hijas
  alternatives_spanish:
  - mis hijas
  lexicon: HALOT
  rationale: El posesivo es directo y se conserva con claridad. «Hijas» es el equivalente natural y transparente en español; se repite para mantener el énfasis del hebreo.
- source_word: תִּקַּח נָשִׁים עַל בְּנֹתַי
  english_pob_choice: take wives besides my daughters
  chosen_spanish: tomas mujeres además de mis hijas
  alternatives_spanish:
  - tomas otras mujeres además de mis hijas
  - tomas esposas además de mis hijas
  - tomas mujeres en lugar de mis hijas
  lexicon: HALOT
  rationale: La expresión hebrea significa tomar esposas adicionales además de las hijas de Labán, no sustituirlas. «Mujeres» conserva la referencia amplia del término hebreo y «además de» expresa bien el valor aditivo del giro; se evita una formulación demasiado interpretativa.
- source_word: אֵין אִישׁ עִמָּנוּ
  english_pob_choice: though no man is with us
  chosen_spanish: aunque no haya ningún hombre con nosotros
  alternatives_spanish:
  - porque no hay ningún hombre con nosotros
  - no hay ningún hombre con nosotros
  - aunque no haya nadie con nosotros
  lexicon: HALOT
  rationale: La cláusula subraya la ausencia de testigos humanos. «Aunque» recoge mejor el matiz concesivo que el hebreo sugiere en contexto; «hombre» mantiene la correspondencia con אִישׁ, y la nota aclara el sentido humano general.
- source_word: רְאֵה
  english_pob_choice: see
  chosen_spanish: mira
  alternatives_spanish:
  - ve
  - observa
  - fíjate
  lexicon: HALOT
  rationale: Es un imperativo breve que llama la atención sobre la declaración solemne. «Mira» es directo, natural y mantiene la fuerza exhortativa del original.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - Dios
  lexicon: HALOT
  rationale: Aquí אֱלֹהִים se refiere al Dios único invocado como testigo en un marco de pacto; por eso «Dios» es la forma normal y fiel en español.
- source_word: עֵד
  english_pob_choice: witness
  chosen_spanish: testigo
  alternatives_spanish:
  - testigo
  - testimonio
  lexicon: HALOT
  rationale: El predicado nominal presenta a Dios como quien da testimonio entre las partes. «Testigo» es la equivalencia más natural y precisa en español; «testimonio» desplaza el sentido hacia la evidencia en vez de la persona que la da.
- source_word: בֵּינִי וּבֵינֶךָ
  english_pob_choice: between me and you
  chosen_spanish: entre tú y yo
  alternatives_spanish:
  - entre mí y ti
  - entre nosotros dos
  lexicon: HALOT
  rationale: La relación de responsabilidad mutua se expresa de modo idiomático en español con «entre tú y yo». La forma mantiene el valor bilateral del hebreo y su tono de cláusula solemne.
theological_decisions:
- issue: Ausencia de testigos humanos en la advertencia de pacto
  english_pob_reading: though no man is with us
  chosen_spanish_reading: aunque no haya ningún hombre con nosotros
  alternative_spanish_readings:
  - no hay ningún hombre con nosotros
  - aunque no haya nadie con nosotros
  rationale: Se conserva el matiz de que no hay testigo humano presente, sin neutralizar innecesariamente el sustantivo masculino אִישׁ. La nota explica que el sentido es la ausencia de cualquier testigo humano.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Uso de «Dios» como singular en אֱלֹהִים
  english_pob_reading: God is witness
  chosen_spanish_reading: Dios es testigo
  alternative_spanish_readings:
  - Dios es un testigo
  - Dios da testimonio
  rationale: En este contexto de pacto, אֱלֹהִים refiere inequívocamente al Dios único. La construcción copulativa preserva la solemnidad de la fórmula y evita introducir una explicación que el texto no requiere.
  doctrine_reference: DOCTRINE.md §Translation philosophy 2
translation_notes:
  revision_awareness: El contexto de revisión indica alta concordancia y ningún cambio pendiente en el inglés POB; por ello el español sigue de cerca las decisiones auditadas, manteniendo el sentido concesivo de la cláusula final y la fórmula solemne de testimonio sin introducir paráfrasis adicionales.
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלֹהִים en singular cuando el contexto es inequívocamente monoteísta y forense.
  - Se evita «SEÑOR» como máscara para el nombre divino, porque aquí no aparece יהוה sino אֱלֹהִים.
  - «Mis hijas» se repite en ambas cláusulas para conservar la insistencia del hebreo.
  - La nota de pie c se ancla en la cláusula sobre la ausencia de un hombre/humano, donde surge la ambigüedad de traducción.
