review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el hebreo y el rastro de auditoría inglés: mantiene el énfasis de וְאָנֹכִי, conserva literalmente la imagen antropomórfica de «mi rostro», preserva el singular implícito de Israel en «ha hecho / se ha vuelto», y traduce correctamente אֱלֹהִים אֲחֵרִים como «otros dioses». La nota léxica también preserva la alternativa documentada «mi presencia».'
  spanish_quality_summary: La redacción es generalmente clara y digna, pero «esconderé sin falta mi rostro» suena algo forzada en español bíblico natural. Una formulación como «ciertamente esconderé mi rostro» conserva mejor la intensificación hebrea sin introducir un giro coloquial o poco idiomático. El resto del versículo es legible y adecuado.
  glossary_alignment: No hay conflicto con la terminología del proyecto. No aparece el nombre divino en este versículo. «Otros dioses» y «mi rostro» concuerdan con las decisiones léxicas y teológicas auditadas. La nota con «mi presencia» como alternativa está bien alineada.
  issues:
  - severity: medium
    issue: La expresión «esconderé sin falta» no suena plenamente natural ni digna en español bíblico.
    rationale: Aunque intenta reflejar la intensificación del infinitivo absoluto + verbo finito, «sin falta» tiene un matiz algo coloquial y adverbial de promesa/cita cumplida más que de énfasis solemne. «Ciertamente esconderé» o «de veras esconderé» preserva mejor la fuerza verbal en registro escritural.
  - severity: low
    issue: «en aquel día» podría afinarse a «ese día» o mantenerse tal cual según estilo, pero no requiere cambio obligatorio.
    rationale: «En aquel día» es entendible y bíblico; no es error. Sin embargo, el inglés auditado eligió «on that day», y en español moderno «ese día» puede sonar más natural. Aun así, «aquel día» sigue siendo plenamente aceptable.
  revised_spanish_text: Y yo mismo ciertamente esconderé mi rostro[a] en aquel día, por todo el mal que ha hecho, porque se ha vuelto a otros dioses.
  revised_footnotes:
  - marker: a
    text: O «mi presencia»; el hebreo dice literalmente «mi rostro», un modismo para el favor o la presencia divina retirada.
    reason: lexical_alternative
  revision_rationale: Se ajusta únicamente la intensificación verbal para que el español suene más natural y solemne, manteniendo intactas la literalidad de «mi rostro», el singular implícito y la estructura causal del hebreo. No se requieren cambios doctrinales ni textuales de fondo.
