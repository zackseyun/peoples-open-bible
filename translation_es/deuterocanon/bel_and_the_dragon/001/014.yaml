translation:
  language: es
  text: y los consumieron por completo. Y aconteció que[a], cuando aquellos hombres salieron, el rey puso la comida delante de Bel, y Daniel mandó a sus jóvenes sirvientes, y trajeron cenizas y las esparcieron por todo el templo, solo en presencia del rey. Luego, después de salir, cerraron la puerta y la sellaron con el anillo de sellar del rey, y se fueron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con solo el rey presente». La frase griega enfatiza que las cenizas fueron esparcidas ante el rey y no ante un grupo más amplio.
    reason: lexical_alternative
lexical_decisions:
- source_word: διόλου
  english_pob_choice: completely
  chosen_spanish: por completo
  alternatives_spanish:
  - completamente
  - del todo
  lexicon: LSJ
  rationale: Adverbio de totalización; «por completo» conserva la fuerza de totalidad del griego con un español natural y fluido.
- source_word: ἀνήλουν
  english_pob_choice: consumed
  chosen_spanish: los consumieron
  alternatives_spanish:
  - los destruyeron
  - los gastaron
  lexicon: LSJ
  rationale: En contexto de alimento ofrecido a una deidad, el verbo debe expresar que quedó totalmente consumido. «Los consumieron» mantiene la idea de consumo total sin ampliar indebidamente a destrucción genérica.
- source_word: παρέθηκεν
  english_pob_choice: set ... before
  chosen_spanish: puso ... delante de
  alternatives_spanish:
  - colocó ... ante
  - presentó ... ante
  lexicon: LSJ
  rationale: El verbo indica poner algo delante de alguien. «Puso la comida delante de Bel» conserva el gesto ritual de presentación sin caer en un giro demasiado literal o arcaizante.
- source_word: τὰ βρώματα
  english_pob_choice: the food
  chosen_spanish: la comida
  alternatives_spanish:
  - los alimentos
  - las viandas
  lexicon: LSJ
  rationale: «Comida» es el equivalente más natural en español y reproduce bien el sentido de ofrenda alimentaria.
- source_word: παιδαρίοις
  english_pob_choice: young servants
  chosen_spanish: jóvenes servidores
  alternatives_spanish:
  - muchachos
  - jóvenes sirvientes
  lexicon: LSJ
  rationale: El término puede referirse a muchachos o a jóvenes asistentes. «Jóvenes servidores» conserva tanto la juventud como la función de servicio bajo Daniel.
- source_word: τέφραν
  english_pob_choice: ashes
  chosen_spanish: ceniza
  alternatives_spanish:
  - cenizas
  - polvo de ceniza
  lexicon: LSJ
  rationale: Aunque el plural griego puede sonar naturalmente como masa, en español «ceniza» funciona bien como sustantivo colectivo y evita una rigidez innecesaria. «Cenizas» también sería posible, pero «ceniza» suena más idiomático aquí.
- source_word: κατέσποραν
  english_pob_choice: scattered
  chosen_spanish: la esparcieron
  alternatives_spanish:
  - la regaron
  - la sembraron
  lexicon: LSJ
  rationale: El verbo indica distribuir una materia sobre una superficie. «Esparcieron» reproduce bien ese acto y encaja con la ceniza.
- source_word: ναὸν
  english_pob_choice: temple
  chosen_spanish: templo
  alternatives_spanish:
  - santuario
  - recinto sagrado
  lexicon: LSJ
  rationale: «Templo» es el equivalente natural y claro para ναός en este contexto de santuario de Bel.
- source_word: ἐνώπιον τοῦ βασιλέως μόνου
  english_pob_choice: in the presence of the king alone
  chosen_spanish: en presencia del rey solamente
  alternatives_spanish:
  - solo ante el rey
  - con el rey como único testigo
  lexicon: LSJ
  rationale: La frase subraya que el acto se hizo sin otros presentes. «En presencia del rey solamente» conserva esa restricción y la ambigüedad del adverbio respecto de la exclusividad de la audiencia.
- source_word: ἐσφραγίσαντο ἐν τῷ δακτυλίῳ τοῦ βασιλέως
  english_pob_choice: sealed it with the king’s signet ring
  chosen_spanish: la sellaron con el anillo de sello del rey
  alternatives_spanish:
  - la sellaron con el sello del rey
  - la precintaron con el anillo real
  lexicon: LSJ
  rationale: La construcción griega indica sellado oficial mediante el anillo real. «Anillo de sello» explicita la función de sello sin perder la imagen del objeto.
translation_notes:
  revision_awareness: Se ha seguido el ajuste del audit trail que prefiere «commanded» frente a una forma más débil; por eso «mandó» conserva el tono directivo de ἐπέταξεν. También se mantiene la idea de exclusividad de audiencia en la frase sobre la presencia del rey.
  spanish_consistency_notes:
  - Se usa «Bel» para el nombre de la deidad, conforme al texto fuente.
  - Se mantiene «Y aconteció» para reflejar el giro narrativo del original.
  - Se conserva la secuencia verbal del griego sin suavizar la acción ritual ni la clausura oficial de la puerta.
