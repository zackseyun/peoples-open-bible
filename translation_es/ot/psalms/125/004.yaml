translation:
  language: es
  text: Haz bien[a], Yahvé, a los buenos, y a los rectos de corazón[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Trata bien, Yahvé, a los buenos».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «los rectos en sus corazones»; enfatiza la integridad interior.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵיטִיבָה
  english_pob_choice: Do good
  chosen_spanish: Haz el bien
  alternatives_spanish:
  - Haz bien
  - Haz lo bueno
  - Obra bien
  lexicon: HALOT
  rationale: El hifil imperativo de יטב, dirigido a Yahvé, expresa una petición activa de favorecer o hacer el bien. «Haz el bien» conserva la fuerza verbal y suena natural en español sin debilitar el ruego. Aunque «Haz bien» también es posible, puede sonar menos explícito; «Haz el bien» mantiene mejor la relación con la bondad pedida en el verso.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: DOCTRINE.md / HALOT
  rationale: Se conserva el nombre propio divino como «Yahvé», conforme al criterio del proyecto para יהוה. Esto evita la sustitución por un título y mantiene la referencia al nombre del pacto.
- source_word: לַטּוֹבִים
  english_pob_choice: to the good
  chosen_spanish: a los buenos
  alternatives_spanish:
  - a los que son buenos
  - a los justos
  - a los bondadosos
  lexicon: HALOT
  rationale: El adjetivo sustantivado טוֹבִים se vierte como «los buenos» para preservar el vínculo léxico con el verbo inicial «hacer el bien». «Los justos» sería demasiado interpretativo y desplazaría el contraste con el siguiente paralelo, יְשָׁרִים.
- source_word: וְלִישָׁרִים
  english_pob_choice: and to the upright
  chosen_spanish: y a los rectos
  alternatives_spanish:
  - y a los íntegros
  - y a los honestos
  - y a los justos
  lexicon: HALOT
  rationale: יָשָׁר conserva la idea de rectitud moral y de conducta sin torcerse; «rectos» es el equivalente español más directo y bíblicamente claro. Se evita «justos» para no fundir dos matices distintos presentes en el paralelismo.
- source_word: בְּלִבּוֹתָם
  english_pob_choice: in their hearts
  chosen_spanish: de corazón
  alternatives_spanish:
  - en sus corazones
  - en su corazón
  - por dentro
  lexicon: HALOT
  rationale: Aunque el hebreo usa el plural «corazones», el español bíblico natural suele expresar esta interioridad con la construcción «de corazón». Así se conserva el énfasis en la integridad interior sin sonar forzado. La frase completa «rectos de corazón» mantiene la cualidad interna que el audit trail subraya.
theological_decisions:
- issue: Nombre divino en el texto poético
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El hebreo contiene explícitamente el Tetragrama. La traducción lo representa con el nombre propio «Yahvé», en continuidad con la política del proyecto de no ocultar el nombre divino tras una sustitución titulada.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Relación entre «los buenos» y «los rectos de corazón»
  english_pob_reading: the good ... the upright in heart
  chosen_spanish_reading: a los buenos ... a los rectos de corazón
  alternative_spanish_readings:
  - a los que son buenos ... a los rectos en corazón
  - a los justos ... a los rectos de corazón
  rationale: El verso presenta dos descripciones paralelas sin introducir una distinción técnica doctrinal. Se conserva el paralelismo y la tensión entre conducta exterior e integridad interior, sin convertir el texto en una afirmación jurídica más fuerte de la que el hebreo exige.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: preserve source text''s plain sense; do not import doctrinal claims the text does not make'
translation_notes:
  revision_awareness: El inglés de referencia pasó por una revisión que ajustó «in their hearts» a una forma más natural («in heart») sin alterar el sentido. En español, esto se refleja con «de corazón», una fórmula natural y formal que conserva el énfasis en la interioridad que el audit trail considera importante.
  spanish_consistency_notes:
  - Se usó «Yahvé» de manera consistente para יהוה, conforme al criterio del proyecto.
  - Se evitó «justos» para לַטּוֹבִים y וְלִישָׁרִים a fin de no borrar la distinción léxica entre טוֹב y יָשָׁר.
  - La nota de pie sobre «rectos de corazón» preserva la observación del audit trail sobre la interioridad del hebreo.
  - La puntuación sigue el paralelismo poético del verso y mantiene un registro bíblico sobrio y publicable.
