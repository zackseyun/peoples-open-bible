review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido básico del hebreo: una transición temporal/discursiva («Y ahora»), una pregunta retórica sobre esperar/poner esperanza, la invocación a Dios como «Señor», y la afirmación final de que la esperanza del salmista está dirigida a Dios. Sin embargo, la nota léxica puede mejorarse porque en español «esperar» ya cubre tanto wait como hope, y la formulación actual «esperar como esperar con esperanza» suena torpe y poco informativa.'
  spanish_quality_summary: 'El texto principal es natural, claro y digno: «Y ahora, Señor, ¿qué espero? Mi esperanza está en ti.» Funciona bien en español eclesial general. La única reparación necesaria es estilística/explicativa en la nota al pie, para que el contraste semántico sea inteligible en español.'
  glossary_alignment: «Señor» para אֲדֹנָי concuerda con la política del proyecto para títulos divinos. No hay conflicto con la preferencia de «Yahvé», ya que aquí no aparece יהוה sino אֲדֹנָי. «Mi esperanza» para תוחלתי también está bien alineado.
  issues:
  - severity: low
    issue: 'La nota al pie repite «esperar» de manera poco útil: «puede expresar tanto esperar como esperar con esperanza».'
    rationale: Aunque el contenido apunta al valor semántico de קוה, en español esa explicación no aclara bien la alternativa entre esperar y poner la esperanza. Conviene reformularla para reflejar la doble idea de espera y esperanza de forma natural.
  revised_spanish_text: Y ahora[a], Señor, ¿qué espero? Mi esperanza está en ti.
  revised_footnotes:
  - marker: a
    text: 'O, más formalmente: «Y ahora, Señor, ¿qué he esperado? Mi esperanza está en ti». El verbo hebreo קוה puede comunicar tanto la idea de esperar como la de poner la esperanza en algo o alguien.'
    reason: lexical_alternative
  revision_rationale: Se mantiene intacto el texto principal porque es fiel y natural. Solo se revisa la nota al pie para expresar con mejor español el doble matiz léxico de קוה sin redundancia confusa.
