translation:
  language: es
  text: derramar su ira sobre nosotros en el saqueo[a][b]. Y no tardes, oh Dios, en retribuirles sobre sus propias cabezas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con saqueo»; la frase griega es compacta y puede describir un despojo violento.
    reason: lexical_alternative
  - marker: b
