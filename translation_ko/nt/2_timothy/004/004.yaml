  text: and they will turn away their hearing from the truth, and turn aside to myths.
translation:
  language: ko
  text: 진리에서는 귀를 돌려, 꾸며 낸 이야기[a] 쪽으로 빗나갈 것입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「허황한 이야기」, 「전설」. 헬라어 μῦθος는 사실에 근거하지 않은 꾸며 낸 이야기를 가리킨다.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπὸ τῆς ἀληθείας τὴν ἀκοὴν ἀποστρέψουσιν
  english_pob_choice: will turn away their hearing from the truth
  chosen_korean: 진리에서는 귀를 돌려
  alternatives_korean:
  - 진리로부터 귀를 돌려
  - 진리에는 귀를 막고
  lexicon: BDAG
  rationale: 1:15, 3:5의 「돌아서다」(ἀποστρέφω/ἀποτρέπω)와 일관된 어휘 흐름. 「귀를 돌리다」가 자연스럽게 그 외면을 담는다.
- source_word: ἐπὶ τοὺς μύθους ἐκτραπήσονται
  english_pob_choice: turn aside to myths
  chosen_korean: 꾸며 낸 이야기 쪽으로 빗나갈 것입니다
  alternatives_korean:
  - 헛된 이야기로 빠질 것입니다
  - 허황한 이야기로 향할 것입니다
  lexicon: BDAG
  rationale: ἐκτρέπομαι는 「길에서 벗어남·빗나감」. 「빗나가다」가 자연스럽다. μῦθος는 사실 아닌 이야기로, 「꾸며 낸 이야기」가 그 무게를 분명히 담는다.
