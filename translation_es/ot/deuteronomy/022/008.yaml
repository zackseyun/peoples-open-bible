review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura casuística del hebreo: כִּי como «Cuando», el mandato legal con «harás», y la finalidad preventiva. También preserva correctamente la idea de una barrera protectora en el techo mediante «parapeto». Sin embargo, dos elecciones no representan con suficiente naturalidad y precisión el sentido auditado: «poner culpa de sangre» es demasiado calcado para el idiomático דָּמִים en este contexto, y «de él» deja una referencia pronominal poco clara en español.'
  spanish_quality_summary: El texto es legible y digno, pero suena algo rígido en «para que no pongas culpa de sangre». En español bíblico natural conviene expresar la responsabilidad legal como «incurrir en culpa de sangre». Además, el pronombre final «de él» resulta ambiguo porque puede parecer que se refiere a la casa, al techo o incluso a una persona; explicitar «del techo» mejora la claridad sin traicionar la fuente.
  glossary_alignment: No hay conflictos con la terminología principal del proyecto. «Parapeto» concuerda con la decisión inglesa, y la nota con alternativas léxicas es adecuada. La cuestión clave es mantener la fuerza legal de דָּמִים como «culpa de sangre» o equivalente jurídico; se conserva mejor con una formulación española idiomática como «incurrir en culpa de sangre».
  issues:
  - severity: medium
    issue: «para que no pongas culpa de sangre» suena poco natural en español
    rationale: Aunque intenta reflejar el idiomatismo hebreo, en español moderno y eclesial la construcción es forzada. El sentido legal-moral de דָּמִים se comunica mejor con «incurras en culpa de sangre».
  - severity: medium
    issue: «de él» es ambiguo como referente final
    rationale: El sufijo hebreo puede resumirse con «de él», pero en español el pronombre masculino singular no apunta con suficiente claridad al techo. «Del techo» aclara el referente sin añadir contenido ajeno.
  - severity: low
    issue: La nota «guardarraíl» no es la alternativa más natural en contexto arquitectónico doméstico
    rationale: No afecta gravemente la fidelidad, pero «baranda» o «barandilla» son alternativas más claras para lectores generales; aun así, puede mantenerse si se desea conservar cercanía con 'guardrail' del inglés.
  revised_spanish_text: Cuando construyas una casa nueva[a], harás un parapeto para tu techo, para que no incurras en culpa de sangre sobre tu casa, si alguien cae del techo.
  revised_footnotes:
  - marker: a
    text: O «baranda» o «guardarraíl». El hebreo se refiere a una barrera protectora construida alrededor de un techo plano.
    reason: lexical_alternative
  revision_rationale: Se ajusta la expresión de responsabilidad legal para que el español sea natural y fiel al sentido de «bloodguilt», y se explicita el referente final para evitar ambigüedad pronominal. Se conserva «parapeto» y la nota léxica porque reflejan bien la evidencia fuente y la auditoría inglesa.
