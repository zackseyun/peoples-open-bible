translation:
  language: es
  text: En el año decimoctavo de Nabucodonosor, de Jerusalén, 832 personas[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “832 almas”. El hebreo usa נֶפֶשׁ, literalmente “alma”, como término de conteo para personas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּשְׁנַת
  english_pob_choice: In the ... year
  chosen_spanish: En el año ...
  alternatives_spanish:
  - En año ...
  lexicon: HALOT
  rationale: La construcción con ב más שְׁנַת introduce una datación regnal; en español natural se expresa con la preposición 'en' y el sustantivo 'año'.
- source_word: שְׁמוֹנֶה עֶשְׂרֵה
  english_pob_choice: eighteenth
  chosen_spanish: decimoctavo
  alternatives_spanish:
  - dieciocho
  lexicon: HALOT
  rationale: Con 'año' funciona como ordinal, no como cardinal. 'Decimoctavo' conserva el valor regnal y suena normal en español.
- source_word: לִנְבוּכַדְרֶאצַּר
  english_pob_choice: of Nebuchadnezzar
  chosen_spanish: de Nabucodonosor
  alternatives_spanish:
  - para Nabucodonosor
  - perteneciente a Nabucodonosor
  lexicon: HALOT
  rationale: La ל de referencia en esta datación se vierte con 'de' en español, como indicador del año de reinado de Nabucodonosor.
- source_word: מִירוּשָׁלִַם
  english_pob_choice: from Jerusalem
  chosen_spanish: desde Jerusalén
  alternatives_spanish:
  - de Jerusalén
  - en Jerusalén
  lexicon: HALOT
  rationale: El מִן señala el punto de procedencia en este resumen de deportación; 'desde' preserva mejor ese valor de origen que un simple 'de'.
- source_word: נֶפֶשׁ
  english_pob_choice: persons
  chosen_spanish: personas
  alternatives_spanish:
  - almas
  - gentes
  lexicon: HALOT
  rationale: Aunque נֶפֶשׁ puede significar literalmente 'alma', aquí funciona como término de conteo para individuos; 'personas' comunica con claridad el sentido de censo/deportación.
- source_word: שְׁמֹנֶה מֵאוֹת שְׁלֹשִׁים וּשְׁנָיִם
  english_pob_choice: '832'
  chosen_spanish: '832'
  alternatives_spanish:
  - ochocientas treinta y dos
  lexicon: HALOT
  rationale: El hebreo suma 800 + 30 + 2 de manera directa. En una lista estadística, los dígitos son la forma más legible y conservan exactamente el total.
translation_notes:
  revision_awareness: Coincide con el audit trail inglés en la datación regnal, el valor de procedencia de מִן y la decisión de traducir נֶפֶשׁ como término de conteo por 'personas'. No hay revisiones aplicadas en el registro fuente, y la concordancia general es alta.
  spanish_consistency_notes:
  - Se mantiene 'Nabucodonosor' como forma española estándar del nombre propio.
  - Se usa 'desde Jerusalén' para reflejar el origen de los deportados sin añadir información no presente en el hebreo.
  - La nota de pie conserva la alternativa lexical principal que el inglés POB documenta para נֶפֶשׁ.
