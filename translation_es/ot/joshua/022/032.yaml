base_translation:
  language: en
  yaml_path: translation/ot/joshua/022/032.yaml
  text: Then Phinehas son of Eleazar the priest[a], and the leaders, returned from the sons of Reuben and from the sons of Gad, from the land of Gilead to the land of Canaan, to the sons of Israel[b], and brought back word to them.
  footnotes:
  - marker: a
    text: Or, 'and reported the matter to them.' The Hebrew דָּבָר can mean 'word,' 'matter,' or 'report' depending on context.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'to the sons of Israel'; that is, to the Israelites.
    reason: lexical_alternative
