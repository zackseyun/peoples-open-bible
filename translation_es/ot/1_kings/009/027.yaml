translation:
  language: es
  text: Y Hiram envió en la nave a sus siervos[a] con los siervos de Salomón, marinos, hombres que conocían el mar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más idiomática: «marineros, hombres experimentados en el mar».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  english_pob_choice: And ... sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - despachó
  lexicon: HALOT
  rationale: El wayyiqtol narra una acción pasada consecutiva; en español, "envió" expresa con naturalidad ese avance narrativo sin añadir matices ajenos.
- source_word: חִירָם
  english_pob_choice: Hiram
  chosen_spanish: Hiram
  alternatives_spanish:
  - Jiram
  lexicon: Convención onomástica bíblica
  rationale: Se conserva el nombre propio en transliteración estándar en español.
- source_word: בָּאֳנִי
  english_pob_choice: in the ship
  chosen_spanish: en la nave
  alternatives_spanish:
  - en el barco
  - a bordo de la nave
  - por nave
  lexicon: HALOT
  rationale: El prefijo ב con אֳנִי indica localización/instrumento asociado a la embarcación. "En la nave" mantiene la concreción del sustantivo hebreo y resulta publicable en español.
- source_word: אֶת עֲבָדָיו
  english_pob_choice: his servants
  chosen_spanish: a sus siervos
  alternatives_spanish:
  - a sus servidores
  - a sus esclavos
  lexicon: HALOT
  rationale: Aquí עֶבֶד designa personal al servicio de Hiram; en español "siervos" conserva la relación de servicio sin forzar la dureza de "esclavos" en este contexto cortesano y marítimo.
- source_word: אַנְשֵׁי אֳנִיּוֹת
  english_pob_choice: men of ships
  chosen_spanish: marinos
  alternatives_spanish:
  - hombres de nave
  - marineros
  - hombres de barcos
  lexicon: HALOT
  rationale: La expresión hebrea es literal "hombres de naves", pero funciona idiomáticamente como personal marítimo. "Marinos" da una equivalencia natural sin perder el sentido especializado; se conserva la dimensión explicativa con la frase siguiente.
- source_word: יֹדְעֵי הַיָּם
  english_pob_choice: men who knew the sea
  chosen_spanish: hombres que conocían el mar
  alternatives_spanish:
  - conocedores del mar
  - experimentados en el mar
  - expertos en el mar
  lexicon: HALOT
  rationale: 'El participio expresa competencia adquirida: personas familiarizadas con el mar. "Conocían el mar" preserva bien la imagen hebrea y evita una paráfrasis excesiva.'
- source_word: עִם עַבְדֵי שְׁלֹמֹה
  english_pob_choice: with Solomon’s servants
  chosen_spanish: con los siervos de Salomón
  alternatives_spanish:
  - junto con los siervos de Salomón
  lexicon: HALOT
  rationale: Se mantiene la misma palabra para עֲבָדִים en ambas cláusulas. "Con" es la preposición directa de עִם y el genitivo posesivo se expresa de forma natural en español.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el hebreo: conserva la secuencia narrativa, la localización "en la nave" y la doble caracterización marítima. Frente al inglés POB, se optó por una equivalencia española más natural para אַנְשֵׁי אֳנִיּוֹת (''marinos'') sin perder la explicación del texto mediante la apposición siguiente.'
  spanish_consistency_notes:
  - Se conservó "siervos" para עֶבֶד en ambos usos del versículo, conforme al contexto de servicio real.
  - Se evitó "SEÑOR" porque el texto no contiene el tetragrámaton ni una cita del nombre divino.
  - '"Nave" se eligió como equivalente digno y comprensible de אֳנִי; si se prefiriera un registro más cotidiano, "barco" sería posible, pero menos solemne.'
