review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido del hebreo: contraste inicial, no quitar todo el reino, dar una tribu al hijo, y las dos razones paralelas: David y Jerusalén. También conserva adecuadamente el perfecto de «he escogido». Sin embargo, la traducción de עַבְדִּי como «mi esclavo» en este contexto no está respaldada por el propio POB inglés aquí, que traduce «my servant», y en español suena impropia para la relación Yahvé-David en narrativa regia, creando una inferencia social distinta del sentido funcional/covenantal del hebreo.'
  spanish_quality_summary: El español es generalmente claro y natural. «Pero no arrancaré todo el reino; daré una tribu a tu hijo…» fluye bien. La principal dificultad de legibilidad y adecuación eclesial es «David, mi esclavo», que resulta chocante y menos fiel semánticamente en este contexto. «Por amor de» es aceptable y digno, aunque «por consideración a» o «por causa de» serían más modernos; no requiere cambio obligatorio.
  glossary_alignment: No hay términos del glosario principal en conflicto salvo el principio general sobre עֶבֶד/δοῦλος. El default de «esclavo» no debe aplicarse ciegamente a todo עֶבֶד; aquí el contexto y el audit trail inglés favorecen «siervo». «Jerusalén» y «he escogido» están bien alineados. No aparece Yahvé en el versículo.
  issues:
  - severity: high
    issue: «mi esclavo» para עַבְדִּי
    rationale: En 1 Reyes 11:13, aplicado a David en boca de Dios, עֶבֶד funciona como título de relación de servicio/lealtad y estatus ante Dios, no como descripción de esclavitud servil. El POB inglés además eligió «my servant». En español bíblico y eclesial, «mi siervo» preserva mejor el sentido y evita una falsa sobrecarga moderna.
  - severity: low
    issue: Nota al pie de רַק algo rígida
    rationale: '«Solo no arrancaré todo el reino» es comprensible, pero menos natural que «Solo que no arrancaré todo el reino» o «O: “No arrancaré todo el reino, sino solo…”». Aun así, puede mantenerse con un ajuste mínimo para mejor español.'
  revised_spanish_text: Pero no arrancaré todo el reino; daré una tribu a tu hijo[a], por amor de David, mi siervo, y por amor de Jerusalén, que he escogido.
  revised_footnotes:
