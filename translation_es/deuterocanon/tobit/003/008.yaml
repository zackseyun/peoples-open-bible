translation:
  language: es
  text: 'porque había sido dada a siete maridos, y Asmodeo, el demonio malo, los mató antes de que pudieran estar con ella como con una esposa[a]. Y le dijeron: «¿No entiendes que estás sofocando a tus maridos? Ya has tenido siete, y no has obtenido beneficio de ninguno de ellos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «antes de que tuvieran relaciones con ella». El griego expresa la unión conyugal de manera eufemística.'
    reason: lexical_alternative
lexical_decisions:
- source_word: δεδομένη
  english_pob_choice: had been given
  chosen_spanish: había sido dada
  alternatives_spanish:
  - había sido entregada
  - había sido dada en matrimonio
  lexicon: BDAG
  rationale: El perfecto pasivo de δίδωμι señala que ella fue dada a esos maridos; en español, «había sido dada» conserva la pasividad y la referencia al arreglo matrimonial sin añadir más de lo que el griego exige.
- source_word: ἀνδράσιν ἑπτά
  english_pob_choice: to seven husbands
  chosen_spanish: a siete maridos
  alternatives_spanish:
  - a siete hombres
  - a siete esposos
  lexicon: BDAG
  rationale: Aquí ἀνήρ tiene sentido conyugal. «Maridos» comunica mejor la relación matrimonial que «hombres», y evita una formalidad menos natural que «esposos».
- source_word: Ἀσμοδαῖος
  english_pob_choice: Asmodeus
  chosen_spanish: Asmodeo
  alternatives_spanish:
  - Asmodeus
  lexicon: Transliteración tradicional
  rationale: En español es más natural y reconocible la forma «Asmodeo», sin alterar la identidad del nombre propio.
- source_word: τὸ πονηρὸν δαιμόνιον
  english_pob_choice: the evil demon
  chosen_spanish: el demonio malo
  alternatives_spanish:
  - el demonio maligno
  - el espíritu malo
  lexicon: BDAG
  rationale: δαιμόνιον se rinde directamente por «demonio». Se mantiene πονηρόν con «malo» para no suavizar el juicio del texto; «espíritu malo» sería posible, pero diluye la referencia demoníaca explícita.
- source_word: ἀπέκτεινεν
  english_pob_choice: killed
  chosen_spanish: los mató
  alternatives_spanish:
  - los dio muerte
  - los asesinó
  lexicon: BDAG
  rationale: El aoristo narrativo pide un pasado simple directo. «Los mató» es claro y natural, y preserva la contundencia del verbo griego.
- source_word: πρὶν ἢ γενέσθαι αὐτοὺς μετʼ αὐτῆς
  english_pob_choice: before they could be with her
  chosen_spanish: antes de que pudieran estar con ella
  alternatives_spanish:
  - antes de llegar a estar con ella
  - antes de unirse con ella
  lexicon: BDAG
  rationale: La construcción es eufemística y alude a unión conyugal. «Estar con ella» conserva el pudor del griego sin volverlo opaco.
- source_word: ὡς ἐν γυναιξίν
  english_pob_choice: as with a wife
  chosen_spanish: como con una esposa
  alternatives_spanish:
  - como con una mujer
  - como es propio de esposas
  lexicon: BDAG
  rationale: El griego usa un giro comparativo que se refiere a la unión matrimonial. En español, «con una esposa» reproduce bien el sentido conyugal y la forma singular atestiguada por la revisión auditada en inglés.
- source_word: Οὐ συνιεῖς
  english_pob_choice: Do you not understand
  chosen_spanish: ¿No entiendes
  alternatives_spanish:
  - ¿No comprendes?
  - ¿No te das cuenta?
  lexicon: BDAG
  rationale: συνίημι expresa entender o comprender. «¿No entiendes?» mantiene el tono de reproche directo del discurso.
- source_word: ἀποπνίγουσά
  english_pob_choice: you are suffocating
  chosen_spanish: estás sofocando
  alternatives_spanish:
  - estás asfixiando
  - estás ahogando
  lexicon: BDAG
  rationale: La revisión auditada favorece «suffocating»; en español, «sofocando» es natural y cercano al valor de ἀποπνίγω, sin caer en una imagen más extrema que el griego no exige.
- source_word: ἤδη ἑπτὰ ἔσχες
  english_pob_choice: Already you have had seven
  chosen_spanish: Ya has tenido siete
  alternatives_spanish:
  - Ya has tenido siete maridos
  - Ya llevas siete
  lexicon: BDAG
  rationale: El objeto está implícito por el contexto inmediato. «Ya has tenido siete» conserva la tersedad de la frase griega; el lector entiende que se refiere a maridos por lo ya dicho.
- source_word: ἑνὸς αὐτῶν οὐκ ὠνάσθης
  english_pob_choice: you have not benefited from even one of them
  chosen_spanish: y no has obtenido beneficio de ninguno de ellos
  alternatives_spanish:
  - y no te has beneficiado de ni uno de ellos
  - y no has sacado provecho de ninguno de ellos
  lexicon: BDAG
  rationale: ὠνάσθης expresa obtener beneficio o provecho. «No has obtenido beneficio» conserva ese valor sin introducir una interpretación excesiva; «de ninguno de ellos» explicita el antecedente implícito.
theological_decisions:
- issue: Eufemismo de unión conyugal en πρὶν ἢ γενέσθαι αὐτοὺς μετʼ αὐτῆς ὡς ἐν γυναιξίν
  english_pob_reading: Render as a modest but clear reference to marital relations.
  chosen_spanish_reading: «antes de que pudieran estar con ella como con una esposa»
  alternative_spanish_readings:
  - antes de que se unieran con ella
  - antes de que tuvieran relaciones con ella
  rationale: El griego no usa un verbo sexual explícito, sino una fórmula eufemística. La redacción española conserva ese pudor y, a la vez, deja claro que se trata de unión matrimonial, no de mera convivencia.
  doctrine_reference: Principio de equivalencia óptima; fidelidad al eufemismo del texto fuente sin oscurecer su sentido.
- issue: Demonología explícita en τὸ πονηρὸν δαιμόνιον
  english_pob_reading: the evil demon
  chosen_spanish_reading: el demonio malo
  alternative_spanish_readings:
  - el demonio maligno
  - el espíritu malo
  rationale: El texto identifica a Asmodeo con un ser demoníaco concreto. Mantener «demonio» evita diluir esa afirmación en una expresión más ambigua como «espíritu malo».
  doctrine_reference: Lectura narrativa del texto deuterocanónico; la traducción no atenúa la presencia de un agente demoníaco personal.
translation_notes:
  revision_awareness: La redacción sigue el texto griego de Swete 1909 y el audit trail inglés. Se incorporó la revisión final que prefiere una referencia singular idiomática en el símil («como con una esposa») y un verbo más natural para ἀποπνίγω («sofocando»), manteniendo el eufemismo conyugal y la fuerza insultante del discurso.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - «Mesías/Cristo» no aplica en este pasaje.
  - Se usó «maridos» para ἀνδράσιν porque el contexto matrimonial lo exige.
  - «Demonio» se preserva para δαιμόνιον siguiendo la fuerza léxica explícita del griego.
  - La nota al pie acompaña el eufemismo sin duplicar el sentido en el cuerpo principal del texto.
