translation:
  language: es
  text: De David[a]. Hazme justicia, Yahvé, porque yo he andado en mi integridad[b], y en Yahvé he confiado; no resbalaré[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Para David» o «Por David». El hebreo puede indicar autoría, atribución o dedicación.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «en mi rectitud» o «en mi irreprochabilidad». El término hebreo denota integridad, entereza o conducta intachable, sin implicar perfección moral absoluta.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «no vacilaré» o «no tambalearé». La imagen hebrea es la de perder pie o resbalar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְדָוִד
  english_pob_choice: Of David
  chosen_spanish: De David
  alternatives_spanish:
  - Para David
  - Por David
  lexicon: HALOT
  rationale: El prefijo לְ con un nombre personal en los superscritos de los Salmos admite relación, atribución o dedicación. «De David» conserva esa amplitud sin decidir indebidamente entre autoría o asociación.
- source_word: שָׁפְטֵנִי
  english_pob_choice: Vindicate me
  chosen_spanish: Júzgame
  alternatives_spanish:
  - Vindícame
  - Hazme justicia
  lexicon: HALOT
  rationale: El imperativo de שׁפט puede significar «juzgar», pero en este contexto de apelación del salmista por su conducta, la idea forense natural en español es «júzgame», dejando abierta la intención de pedir una sentencia favorable. «Vindícame» sería posible, pero menos inmediato en una traducción de registro bíblico común.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se conserva el nombre divino del Tetragrámaton como «Yahvé», según la terminología base del proyecto en español, en lugar de sustituirlo por un título. Esto mantiene la referencia al nombre personal del pacto.
- source_word: בְּתֻמִּי
  english_pob_choice: in my integrity
  chosen_spanish: en mi integridad
  alternatives_spanish:
  - en mi blamelessness
  - con integridad
  lexicon: HALOT
  rationale: תֹּם/תֻּמָּה expresa integridad, integridad moral o entereza, no perfección sin pecado. «Integridad» preserva el peso ético y la tensión teológica sin exagerar la afirmación del salmista.
- source_word: הָלַכְתִּי
  english_pob_choice: I have walked
  chosen_spanish: he andado
  alternatives_spanish:
  - he vivido
  - me he conducido
  lexicon: HALOT
  rationale: El hebreo usa la metáfora estable de «andar» para el modo de vida. «He andado» conserva el idiomático bíblico en español sin volverlo artificial.
- source_word: וּבַיהוָה
  english_pob_choice: and in Yahweh
  chosen_spanish: y en Yahvé
  alternatives_spanish:
  - y en Yahweh
  lexicon: HALOT
  rationale: Se repite el nombre divino para mantener el énfasis del hebreo y la coherencia terminológica del texto en español.
- source_word: בָּטַחְתִּי
  english_pob_choice: I have trusted
  chosen_spanish: he confiado
  alternatives_spanish:
  - he puesto mi confianza
  - he confiado en él
  lexicon: HALOT
  rationale: בטח expresa confianza o dependencia confiada. «He confiado» es natural en español y preserva la fuerza relacional del verbo.
- source_word: לֹא אֶמְעָד
  english_pob_choice: I will not slip
  chosen_spanish: no resbalaré
  alternatives_spanish:
  - no vacilaré
  - no tropezaré
  - no tambalearé
  lexicon: HALOT
  rationale: El verbo describe la imagen concreta de perder pie o resbalar. «No resbalaré» mantiene la metáfora física y la confianza del cierre del verso.
theological_decisions:
- issue: Forma de traducir el Tetragrámaton יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: El texto hebreo usa directamente el nombre divino. En español, «Yahvé» es la forma adoptada por el proyecto para preservar el nombre del pacto sin recurrir a una sustitución como «Señor».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Alcance de la afirmación de integridad del salmista
  english_pob_reading: integrity rather than sinless perfection
  chosen_spanish_reading: integridad, no perfección sin pecado
  alternative_spanish_readings:
  - blamelessness
  - rectitud absoluta
  rationale: El salmista presenta una apelación judicial/covenantal basada en conducta íntegra, no una declaración de impecabilidad. «Integridad» preserva la tensión teológica y evita resolverla en una afirmación demasiado fuerte.
  doctrine_reference: DOCTRINE.md Translation philosophy §3 Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: Coincide con la última revisión disponible, que no introdujo cambios; el borrador mantiene el acuerdo alto del control cruzado y conserva las decisiones léxicas y teológicas ya auditadas.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para יהוה.
  - «Integridad» evita tanto el moralismo perfeccionista como una atenuación excesiva del hebreo.
  - Se conserva la imagen física de לֹא אֶמְעָד con «no resbalaré» en lugar de una paráfrasis abstracta.
  - La estructura breve y forense del verso se refleja con una sintaxis sobria y publicable en español.
