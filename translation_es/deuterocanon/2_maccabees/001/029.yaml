translation:
  language: es
  text: Planta a tu pueblo en tu lugar santo[a], tal como dijo Moisés.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘Establece a tu pueblo en tu lugar santo’. El verbo griego es literalmente ‘plantar’, con la imagen de un asentamiento firme.
    reason: lexical_alternative
lexical_decisions:
- source_word: καταφύτευσον
  english_pob_choice: Plant
  chosen_spanish: Planta
  alternatives_spanish:
  - Establece
  - Asienta
  lexicon: LSJ
  rationale: El verbo griego es literalmente un imperativo de ‘plantar’; en español, ‘Planta’ conserva la imagen agrícola y la fuerza imperativa. ‘Establece’ o ‘Asienta’ aclaran el sentido de asentamiento seguro, pero atenúan la metáfora original.
- source_word: τὸν λαόν σου
  english_pob_choice: your people
  chosen_spanish: tu pueblo
  alternatives_spanish:
  - tu nación
  - tu gente
  lexicon: LSJ
  rationale: λαός designa al pueblo como colectivo, con matiz comunitario y de pacto. ‘Tu pueblo’ es natural en español y mantiene ese alcance sin nacionalizar indebidamente el término.
- source_word: εἰς τὸν τόπον τὸν ἅγιόν σου
  english_pob_choice: in your holy place
  chosen_spanish: en tu lugar santo
  alternatives_spanish:
  - en tu santo lugar
  - en tu santuario
  - en tu tierra santa
  lexicon: LSJ
  rationale: τόπος es ‘lugar’, y ἅγιος califica ese lugar como santo. ‘Lugar santo’ preserva la amplitud del griego sin forzar ‘santuario’ ni ‘tierra’, que serían más específicos de lo que el texto dice.
- source_word: καθὼς εἶπεν Μωσῆς
  english_pob_choice: just as Moses said
  chosen_spanish: tal como dijo Moisés
  alternatives_spanish:
  - como dijo Moisés
  - justo como dijo Moisés
  lexicon: LSJ
  rationale: καθώς expresa conformidad; ‘tal como’ comunica bien esa idea en español y mantiene el paralelo con la referencia mosaica. ‘Dijo’ reproduce el simple pasado del griego.
theological_decisions:
- issue: Alcance de 'lugar santo'
  english_pob_reading: Kept as the broader 'holy place' without specifying temple, sanctuary, or land.
  chosen_spanish_reading: Se mantiene como 'lugar santo' sin precisar templo, santuario o tierra.
  alternative_spanish_readings:
  - tu santuario
  - tu tierra santa
  - el lugar santo que has designado
  rationale: El griego dice τόπον, ‘lugar’, y no identifica con mayor precisión el referente. ‘Lugar santo’ preserva esa amplitud y evita resolver una tensión geográfica/cultual que el texto no resuelve por sí mismo.
  doctrine_reference: Primacía del texto original; conservar la amplitud semántica cuando el griego no especifica más.
translation_notes:
  revision_awareness: 'La redacción sigue el pasaje griego de 2 Macabeos 1:29 y coincide con el audit trail inglés: se preserva la metáfora de ‘plantar’, el colectivo ‘tu pueblo’ y la amplitud de ‘tu lugar santo’. No se introdujeron cambios de sentido ni especificaciones ajenas al texto.'
  spanish_consistency_notes:
  - Se usa ‘Moisés’ sin artículo, según el uso normal en español y el griego simple.
  - ‘Lugar santo’ mantiene un registro bíblico claro sin sustituir innecesariamente la terminología por ‘santuario’.
  - La nota al pie conserva la alternativa lexical documentada en el audit trail inglés.
