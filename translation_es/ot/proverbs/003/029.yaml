    issue: «confiado» para לָבֶטַח desplaza el foco de seguridad a confianza subjetiva
    rationale: בֶּטַח denota principalmente seguridad, estar a salvo, aunque pueda implicar confianza. Dado que el audit trail inglés fijó «securely / in safety», «seguro» o «en seguridad» preserva mejor el núcleo semántico sin sobreinterpretar la relación psicológica.
  - severity: low
    issue: La nota alternativa puede alinearse mejor con la alternativa inglesa documentada
    rationale: La alternativa inglesa conserva «plot evil ... in safety with you». En español conviene reflejar esa combinación con una formulación más exacta y natural, en vez de repetir un matiz algo distinto del texto principal.
  revised_spanish_text: No maquines daño contra tu prójimo[a] cuando él habita seguro contigo.
