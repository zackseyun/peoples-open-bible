lexical_decisions:
- source_word: ἔρχου κύριε Ἰησοῦ
  english_pob_choice: Come, Lord Jesus
  chosen_korean: 주 예수여, 오시옵소서
  alternatives_korean:
  - 주 예수님, 오십시오
  - 주 예수여, 오소서
  lexicon: BDAG
  rationale: '마라나타(고전 16:22)의 헬라어 형태로, 직접 호격 기도의 절박한 어조를 살리기 위해 합쇼체 안에서도 「오시옵소서」 청유 호소형을 사용한다.'
theological_decisions:
- issue: '22:20 ἔρχου κύριε Ἰησοῦ — 합쇼체 안에서의 직접 호격 기도 어조 보존'
  chosen_reading: '「주 예수여, 오시옵소서.」 (호격 + 「하옵소서」체 청유로 마라나타의 절박함 보존)'
  alternative_readings:
  - '「주 예수님, 오십시오.」(평범한 합쇼체)'
  rationale: '마라나타(μαρανα θα/ἔρχου κύριε)는 초기 교회의 가장 오래된 기도 정식 중 하나로, 직접적이고 절박한 호격 호소이다. 본문 전체가 합쇼체이지만, 이 마지막 기도-호소만은 「오시옵소서」의 청유 호소형으로 옮겨 본문의 호흡과 어조를 보존한다.'
  doctrine_reference: 'DOCTRINE.md: Preserve liturgical register of foundational prayer formulas'
