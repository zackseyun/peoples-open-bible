translation:
  language: es
  text: Con una crueldad peor que Fálaris[a], dijo que ellos debían agradecer el respiro de hoy en el sueño[b]; pero, después de haberlos mantenido con vida hasta el día que se acerca, prepara de la misma manera a los elefantes para la destrucción de los judíos sin ley[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Fálaris fue recordado en la tradición griega como un gobernante notoriamente cruel; la comparación intensifica la brutalidad del rey.
    reason: cultural_note
  - marker: b
    text: 'O: «que consideraran el sueño de hoy como un favor». El modismo griego expresa gratitud u obligación por un beneficio recibido.'
    reason: lexical_alternative
  - marker: c
    text: '«Sin ley» reproduce el insulto hostil del hablante; alternativamente: «ilegales» o «impíos».'
    reason: alternative_reading
lexical_decisions:
- source_word: ὠμότητα
  english_pob_choice: cruelty
  chosen_spanish: crueldad
  alternatives_spanish:
  - brutalidad
  - salvajismo
  lexicon: LSJ
  rationale: ὠμότης expresa dureza cruel; en español, «crueldad» es el equivalente más directo y natural. «Brutalidad» o «salvajismo» son posibles, pero «crueldad» mantiene mejor el registro narrativo sin exceder el tenor del griego.
- source_word: χείρονα Φαλάριδος
  english_pob_choice: worse than Phalaris
  chosen_spanish: peor que la de Fálaris
  alternatives_spanish:
  - más cruel que Fálaris
  - peor que Fálaris
  lexicon: LSJ
  rationale: La comparación con Fálaris funciona como referencia cultural de crueldad extrema. Mantener el nombre propio transliterado conserva la alusión histórica y la fuerza comparativa del original.
- source_word: ἐσχηκὼς
  english_pob_choice: having
  chosen_spanish: Teniendo
  alternatives_spanish:
  - Habiendo tenido
  - Estando caracterizado por
  lexicon: LSJ
  rationale: 'El participio perfecto de ἔχω describe el estado o rasgo del sujeto. En español se integra naturalmente con un gerundio inicial: «Teniendo una crueldad…», sin perder la relación atributiva.'
- source_word: τὸ τῆς σήμερον ὕπνῳ χάριν ἔχειν αὐτούς
  english_pob_choice: they should be grateful for today's respite in sleep
  chosen_spanish: deberían estar agradecidos por el descanso de hoy en el sueño
  alternatives_spanish:
  - deberían considerar el sueño de hoy como un favor
  - deberían agradecer el sueño de hoy
  lexicon: LSJ
  rationale: La expresión χάριν ἔχειν comunica gratitud o deuda por un favor. «Estar agradecidos por el descanso de hoy en el sueño» conserva la idea del favor concedido sin reducirla a mera acción de dormir.
- source_word: συντηρηθέντας
  english_pob_choice: having been kept alive
  chosen_spanish: habiendo sido conservados con vida
  alternatives_spanish:
  - habiendo sido preservados
  - habiendo sido mantenidos
  lexicon: LSJ
  rationale: El pasivo de συντηρέω implica conservación hasta un momento posterior, aquí con sentido de supervivencia para ejecución. «Conservados con vida» expresa ese valor contextual de manera fiel y comprensible.
- source_word: τὴν ὑποτέλλουσαν ἡμέραν
  english_pob_choice: the approaching day
  chosen_spanish: el día que se acerca
  alternatives_spanish:
  - el día que viene
  - el día siguiente
  lexicon: LSJ
  rationale: El participio indica un día que se va acercando. «El día que se acerca» reproduce el matiz progresivo y temporal del griego mejor que una simple fórmula fija.
- source_word: κατὰ τὸ ὅμοιον
  english_pob_choice: in the same way
  chosen_spanish: de la misma manera
  alternatives_spanish:
  - igualmente
  - del mismo modo
  lexicon: LSJ
  rationale: La frase retoma instrucciones ya dadas y exige una correspondencia de procedimiento. «De la misma manera» es natural y mantiene la referencia anafórica.
- source_word: ἑτοίμασον
  english_pob_choice: prepare
  chosen_spanish: prepara
  alternatives_spanish:
  - preparad
  - haz preparar
  lexicon: LSJ
  rationale: Imperativo singular de mandato. «Prepara» conserva el tono de orden directa del texto narrativo.
- source_word: ἐπὶ τὸν ... ἀφανισμόν
  english_pob_choice: for the destruction of
  chosen_spanish: para la destrucción de
  alternatives_spanish:
  - para la aniquilación de
  - para el exterminio de
  lexicon: LSJ
  rationale: ἀφανισμός denota destrucción, desaparición o aniquilación. «Destrucción» es fuerte y sobrio; evita intensificar el término más allá de lo necesario.
- source_word: ἀθεμίτων Ἰουδαίων
  english_pob_choice: the lawless Jews
  chosen_spanish: los judíos impíos
  alternatives_spanish:
  - los judíos sin ley
  - los judíos ilegales
  lexicon: LSJ
  rationale: ἀθέμιτος puede significar contrario a la ley, ilícito o impío. En este contexto hostil, «impíos» reproduce bien el insulto, aunque también puede entenderse como «sin ley»; se prefiere aquí el matiz religioso-moral que el pasaje carga en boca del perseguidor.
theological_decisions:
- issue: Epíteto hostil sobre el pueblo judío
  english_pob_reading: the lawless Jews
  chosen_spanish_reading: los judíos impíos
  alternative_spanish_readings:
  - los judíos sin ley
  - los judíos ilegales
  rationale: El griego presenta un insulto hostil en boca del hablante. Se conserva como invectiva textual, sin suavizarla ni convertirla en una descripción neutral, para respetar la retórica del pasaje y la primacía del idioma original.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve hostile speech as hostile speech.'
translation_notes:
  revision_awareness: 'Se revisó la formulación para privilegiar la correspondencia con el griego de Swete 1909 y la lectura final inglesa: ὠμότης quedó como «crueldad»; χάριν ἔχειν se resolvió como gratitud por un favor recibido; ὑποτέλλουσαν se hizo «el día que se acerca»; y ἀθεμίτων se mantuvo como invectiva hostil, con nota sobre sus posibles matices.'
  spanish_consistency_notes:
  - Se emplea «Yahvé» solo cuando aparezca el nombre divino; en este verso no aplica.
  - Se usó «judíos» como etnónimo histórico del pasaje y se preservó el tono hostil del discurso sin atenuación.
  - Se mantuvo un registro formal y bíblico, pero con sintaxis natural del español moderno.
  - Las notas usan marcadores únicos y cada una aparece anclada en el texto donde corresponde.
