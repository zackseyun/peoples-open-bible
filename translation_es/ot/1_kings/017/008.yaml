    issue: Nota al pie innecesaria e impropiamente clasificada
    rationale: 'La nota «Hebreo: “Yahvé”...» repite exactamente lo que ya aparece en el texto principal español. En el inglés tenía sentido por la divergencia entre «the LORD» y el hebreo; en español no existe esa divergencia, así que la nota no preserva una alternativa significativa y debe eliminarse junto con el marcador [a].'
