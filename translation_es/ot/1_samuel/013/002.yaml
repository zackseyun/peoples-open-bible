translation:
  language: es
  text: Y Saúl escogió para sí tres mil hombres de Israel. Dos mil estaban con Saúl en Micmas y en la región montañosa de Betel[b], y mil estaban con Jonatán en Guibeá de Benjamín. Al resto del pueblo lo despidió[a], cada hombre a su tienda.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cada hombre a su tienda». El hebreo usa un modismo común para despedir a la gente a sus propias moradas.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «y en el monte de Betel». La expresión hebrea puede referirse a la zona montañosa alrededor de Betel o a un área elevada específica cerca de Betel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּבְחַר לוֹ
  english_pob_choice: chose for himself
  chosen_spanish: escogió para sí
  alternatives_spanish:
  - eligió para sí
  - tomó para sí
  lexicon: HALOT
  rationale: בחר expresa elección deliberada; «para sí» conserva el matiz de beneficiario/dativo que el inglés POB preservó con «for himself». «Escogió» suena natural en español y mantiene el acto voluntario de selección.
- source_word: שְׁלֹשֶׁת אֲלָפִים
  english_pob_choice: three thousand
  chosen_spanish: tres mil
  alternatives_spanish:
  - tres millares
  lexicon: HALOT
  rationale: Es una cifra directa; «tres mil» es la forma normal y fiel en español.
- source_word: מִיִּשְׂרָאֵל
  english_pob_choice: from Israel
  chosen_spanish: de Israel
  alternatives_spanish:
  - entre Israel
  - de en medio de Israel
  lexicon: HALOT
  rationale: La preposición marca el grupo fuente del que se seleccionan los hombres. «De Israel» es la equivalencia más natural y transparente.
- source_word: וַיִּהְיוּ עִם שָׁאוּל
  english_pob_choice: were with Saul
  chosen_spanish: estaban con Saúl
  alternatives_spanish:
  - permanecían con Saúl
  - quedaron con Saúl
  lexicon: HALOT
  rationale: La cláusula describe ubicación/adscripción militar. «Estaban con» preserva la simplicidad del hebreo sin añadir un matiz de permanencia no explicitado.
- source_word: בְּמִכְמָשׂ
  english_pob_choice: at Michmash
  chosen_spanish: en Micmas
  alternatives_spanish:
  - en Micmash
  lexicon: HALOT
  rationale: Para un topónimo, el español normalmente usa «en». «Micmas» sigue la transliteración tradicional en español bíblico, sin forzar una adaptación innecesaria.
- source_word: וּבְהַר בֵּית אֵל
  english_pob_choice: and in the hill country of Bethel
  chosen_spanish: y en la región montañosa de Betel
  alternatives_spanish:
  - y en el monte de Betel
  - y en el cerro de Betel
  lexicon: HALOT
  rationale: הַר puede referirse a un monte o a una zona montañosa. La lectura territorial del contexto militar favorece «región montañosa»; se conserva la ambigüedad de fondo sin reducirla a un pico concreto.
- source_word: וְאֶלֶף הָיוּ עִם יוֹנָתָן
  english_pob_choice: and a thousand were with Jonathan
  chosen_spanish: y mil estaban con Jonatán
  alternatives_spanish:
  - y mil quedaron con Jonatán
  lexicon: HALOT
  rationale: Paralelo directo al miembro anterior; se mantiene la estructura y el número sin sobreinterpretar el verbo.
- source_word: בְּגִבְעַת בִּנְיָמִין
  english_pob_choice: at Gibeah of Benjamin
  chosen_spanish: en Guibeá de Benjamín
  alternatives_spanish:
  - en Gueba de Benjamín
  - en Guibea de Benjamín
  lexicon: HALOT
  rationale: La vocalización masorética apoya «Guibeá». «En» es la preposición más natural para ubicación en español, y «de Benjamín» conserva la identificación territorial.
- source_word: וְיֶתֶר הָעָם
  english_pob_choice: The rest of the people
  chosen_spanish: El resto del pueblo
  alternatives_spanish:
  - El remanente del pueblo
  - La gente restante
  lexicon: HALOT
  rationale: יֶתֶר = resto/remainder; הָעָם = pueblo. «Pueblo» es más literal que «troops», aunque el contexto sea militar, y evita introducir una interpretación más específica que el hebreo no exige.
- source_word: שִׁלַּח
  english_pob_choice: he sent away
  chosen_spanish: lo despidió
  alternatives_spanish:
  - lo envió
  - lo mandó fuera
  lexicon: HALOT
  rationale: El verbo indica liberación/dismissal del servicio. «Despidió» comunica mejor que «envió» la idea de dar por terminada la obligación; el objeto se entiende colectivamente por el antecedente «el resto del pueblo».
- source_word: אִישׁ לְאֹהָלָיו
  english_pob_choice: each man to his tent
  chosen_spanish: cada hombre a su tienda
  alternatives_spanish:
  - cada uno a su tienda
  - cada hombre a su casa
  lexicon: HALOT
  rationale: Se conserva el idiomático «a su tienda» porque el hebreo lo dice explícitamente. «Cada hombre» refleja אִישׁ y evita neutralizar el género donde el texto es concreto.
theological_decisions:
- issue: Tratamiento del nombre divino implícito o ausente en un pasaje narrativo militar
  english_pob_reading: No divine-name substitution appears in the verse; the English text is purely narrative.
  chosen_spanish_reading: No se introduce ninguna referencia devocional ni sustitución de nombre divino.
  alternative_spanish_readings:
  - Usar una formulación más religiosa o reverencial
  - Añadir «el Señor» por estilo bíblico
  rationale: El hebreo no contiene el tetragrámaton ni un título divino en este versículo. Por fidelidad textual, la traducción debe permanecer narrativamente sobria y no añadir teología ausente.
  doctrine_reference: Fidelidad textual y principio de no adición; cf. Deuteronomio 4:2
- issue: Sentido militar de הָעָם frente a una posible lectura más genérica de «people»
  english_pob_reading: The rest of the people he sent away
  chosen_spanish_reading: El resto del pueblo lo despidió
  alternative_spanish_readings:
  - El resto de la gente lo despidió
  - El resto de las tropas lo despidió
  rationale: El contexto es militar, pero el hebreo usa הָעָם («el pueblo»). Mantener «pueblo» respeta la base lexical y deja que el contexto haga el trabajo interpretativo sin reemplazar el término por uno más técnico.
  doctrine_reference: Principio de equivalencia basada en el texto fuente; cf. 1 Samuel 13:2
translation_notes:
  revision_awareness: 'He mantenido la lectura estable del texto base sin introducir cambios de revisión, en consonancia con el resumen de revisión más reciente: alta concordancia, sin modificaciones necesarias.'
  spanish_consistency_notes:
  - He usado «Yahvé» solo donde un pasaje lo requiera; en este versículo no aparece ninguna mención al nombre divino.
  - He mantenido «Saúl» y «Jonatán» con la grafía española usual para nombres propios bíblicos.
  - He preferido «escriba/escogió para sí»? No aplica; aquí se conserva la selección militar con un verbo natural y directo.
  - He preservado el orden y paralelismo de las dos unidades numéricas para reflejar la estructura del hebreo.
  - He usado «tienda» para reproducir el idiomático hebreo, evitando reemplazarlo por «casa».
