translation:
  language: es
  text: de Zéraj, el clan de los zeraítas; de Saúl, el clan de los saulitas.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: לְ/זֶרַח
  english_pob_choice: of Zerah
  chosen_spanish: de Zérah
  alternatives_spanish:
  - para Zérah
  - a Zérah
  lexicon: HALOT
  rationale: La preposición ל en esta fórmula censal expresa pertenencia o descendencia genealógica. En español, «de Zérah» comunica mejor esa afiliación que una traducción más literal como «para» o «a», que sonarían extrañas en un listado tribal.
- source_word: מִשְׁפַּחַת
  english_pob_choice: the clan of
  chosen_spanish: el clan de los
  alternatives_spanish:
  - la familia de los
  - el linaje de los
  lexicon: HALOT
  rationale: En contextos censales y tribales, מִשְׁפָּחָה designa una subdivisión de parentesco dentro de la tribu. «Clan» conserva mejor esa estructura social que «familia», y «el clan de los» reproduce bien la fórmula repetitiva del hebreo.
- source_word: הַזַּרְחִי
  english_pob_choice: the Zerahites
  chosen_spanish: zeraítas
  alternatives_spanish:
  - clan zeraíta
  - descendientes de Zérah
  lexicon: HALOT
  rationale: La forma gentilicia indica a los descendientes o pertenecientes a Zérah. «Zeraítas» es un equivalente natural en español para este tipo de patronímico y conserva el valor colectivo del hebreo.
- source_word: לְ/שָׁאוּל
  english_pob_choice: of Shaul
  chosen_spanish: de Saúl
  alternatives_spanish:
  - para Saúl
  - a Saúl
  lexicon: HALOT
  rationale: 'Se mantiene la misma solución que en el primer miembro de la línea: la preposición genealógica ל se vierte con «de» para expresar descendencia o afiliación. «Saúl» es la forma española estándar del nombre propio.'
- source_word: הַשָּׁאוּלִי
  english_pob_choice: the Shaulites
  chosen_spanish: saulitas
  alternatives_spanish:
  - clan saulita
  - descendientes de Saúl
  lexicon: HALOT
  rationale: El gentilicio final se traduce con un sustantivo colectivo español que preserve el paralelismo con «zeraítas». «Saulitas» comunica adecuadamente el grupo descendiente de Saúl y mantiene la brevedad del original.
translation_notes:
  revision_awareness: El texto inglés auditado presenta acuerdo alto y no registra revisiones aplicadas; por eso la versión española sigue de cerca la estructura del hebreo, sin introducir notas textuales ni alternativas doctrinales.
  spanish_consistency_notes:
  - 'Se conserva el paralelismo sintáctico de la fórmula censal: nombre propio + clan + gentilicio.'
  - «Clan» se usa de manera uniforme para מִשְׁפַּחַת, conforme al criterio POB en contextos tribales.
  - 'Se mantiene la transliteración española habitual de los nombres propios bíblicos: Zérah, Saúl.'
