review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del hebreo: «tus flechas», «afiladas», «los pueblos caen», y conserva «del rey» sin armonizarlo. También respeta la elipsis final al no añadir un verbo como «traspasan». Sin embargo, «debajo de ti» suena algo físico y torpe en español bíblico moderno para תַּחְתֶּיךָ; «ante ti» o «bajo ti» comunicaría mejor sometimiento/caída. Además, el sujeto tácito de «están» queda ambiguo en español; conviene repetir «tus flechas» para claridad sin añadir contenido ajeno, especialmente dado que el inglés auditado dejó una nota sobre la compresión poética.'
  spanish_quality_summary: El texto es comprensible, pero «debajo de ti» resulta poco idiomático en esta línea poética, y la cláusula final «están en el corazón…» suena colgante porque el referente de «están» no es inmediato en español. Repetir el sujeto mejora la legibilidad y mantiene la dignidad del registro. «Afiladas» y «los pueblos» están bien.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. Se preserva «el rey» y no se introduce lenguaje mesiánico. Las decisiones léxicas principales son correctas, con ajuste estilístico recomendado para תַּחְתֶּיךָ y para la elipsis final.
  issues:
  - severity: medium
    issue: «debajo de ti» es poco natural en este contexto poético-marcial
    rationale: Aunque literalmente posible para תַּחְתֶּיךָ, en español «debajo de ti» sugiere ubicación física torpe. «Ante ti» expresa mejor la caída de los pueblos frente al rey; alternativamente «bajo ti» también podría servir.
  - severity: medium
    issue: El sujeto de «están» queda ambiguo en la cláusula final
    rationale: El hebreo es elíptico, pero en español la referencia pronominal distante suena más confusa. Repetir «tus flechas» aclara que son ellas las que están en el corazón de los enemigos del rey, sin introducir el verbo interpretativo «traspasan».
  revised_spanish_text: Tus flechas son afiladas[a]; los pueblos caen ante ti; tus flechas están en el corazón de los enemigos del rey.
