revisions:
- from: 'Y dijo Salomón: “Tú has mostrado gran fidelidad del pacto[a] a tu siervo David, mi padre, porque él anduvo delante de ti en fidelidad[b], en justicia y en rectitud de corazón contigo; y le has guardado esta gran fidelidad del pacto[a], y le has dado un hijo sentado en su trono[c], como se ve hoy”.'
  to: 'Y dijo Salomón: «Tú has mostrado gran fidelidad del pacto[a] a tu siervo David, mi padre, porque él anduvo delante de ti en fidelidad[b], en justicia y en rectitud de corazón contigo; y le has conservado esta gran fidelidad del pacto, y le has dado un hijo sentado en su trono[c], como sucede hasta hoy».'
  rationale: Se ajustó 'le has guardado' a 'le has conservado' para que el español refleje de forma más natural la idea de mantener vigente para David ese חֶסֶד. Se mantuvieron las decisiones léxicas principales del audit trail ('fidelidad del pacto', 'en fidelidad', 'rectitud de corazón', 'siervo'). También se simplificó el anclaje de la nota [a] y se refinó la cláusula final a 'como sucede hasta hoy' para un registro más bíblico sin perder la fuerza de confirmación presente.
