  yaml_path: translation/ot/2_chronicles/031/003.yaml
  text: 'The king’s portion from his own possessions was for the burnt offerings: the burnt offerings of the morning and the evening[a], and the burnt offerings for the Sabbaths, the new moons, and the appointed feasts[e][d][c][b], as it is written in the Law of Yahweh.'
