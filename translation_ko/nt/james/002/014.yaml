source:
  edition: SBLGNT
  text: '⸀Τί ὄφελος, ἀδελφοί μου, ἐὰν πίστιν λέγῃ τις ἔχειν ἔργα δὲ μὴ ἔχῃ; μὴ δύναται ἡ πίστις σῶσαι αὐτόν;'
base_translation:
  language: en
  yaml_path: translation/nt/james/002/014.yaml
  text: 'What good is it[a], my brothers[c][b], if someone says he has faith but does not have works? Can that faith save him?'
translation:
  language: ko
  text: '나의 형제 여러분, 누가 자기에게 믿음[a]이 있다고 말하면서 행위[b]가 없다면 무슨 유익이 있겠습니까? 그 믿음이 그를 구원할 수 있겠습니까?'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '헬라어 πίστις. 야고보의 「믿음」은 단순한 동의(同意)가 아니라 삶으로 드러나는 신뢰를 가리킨다.'
    reason: lexical_alternative
  - marker: b
    text: '헬라어 ἔργα. 율법 준수의 공로가 아니라, 믿음이 살아 있음을 드러내는 행함을 가리킨다.'
    reason: lexical_alternative
lexical_decisions:
- source_word: 'πίστις'
  english_pob_choice: 'faith'
  chosen_korean: '믿음'
  alternatives_korean: []
  lexicon: BDAG
  rationale: '표준 등가어. 14-26절 전체에 걸쳐 동일하게 「믿음」을 사용한다.'
- source_word: 'ἔργα'
  english_pob_choice: 'works'
  chosen_korean: '행위'
  alternatives_korean:
  - '행함'
  - '행실'
  lexicon: BDAG
  rationale: '바울 서신과 동일한 어휘를 사용하므로, 동일하게 「행위」로 옮겨 신학적 긴장을 그대로 노출한다.'
theological_decisions:
- issue: '믿음/행위 단락(2:14-26) 전반의 번역 방침'
  chosen_reading: '바울과 같은 어휘로 옮기되 야고보 본문이 말하는 바를 그대로 보존'
  alternative_readings:
  - '바울과의 모순을 피하기 위해 「행함」 등으로 약화'
  rationale: '바울과 야고보의 ἔργα/πίστις 용법은 표면적으로 충돌해 보이나, 두 사람이 서로 다른 적대자를 향해 말한다. 한국어 번역에서 야고보의 「행위」를 「행함」으로 약화시키면 본문의 도전이 사라진다. DOCTRINE.md의 본문 충실 원칙에 따라 두 저자의 같은 어휘를 같은 한국어로 옮긴다.'
  doctrine_reference: 'DOCTRINE.md: Preserve authorial tension; do not harmonize'
