base_translation:
  language: en
  yaml_path: translation/ot/song_of_songs/004/002.yaml
  text: Your teeth are like a flock of shorn ewes that have come up from the washing[a], all of them bearing twins[b], and none among them has lost her young.
  footnotes:
  - marker: a
    text: Or 'and none of them is bereaved.' The Hebrew keeps the sheep image rather than stating directly that no tooth is missing.
    reason: lexical_alternative
  - marker: b
    text: The paired-sheep imagery implies a full, evenly matched set of teeth.
    reason: cultural_note
