id: 2TH.2.8
reference: 2 Thessalonians 2:8
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: καὶ τότε ἀποκαλυφθήσεται ὁ ἄνομος, ὃν ὁ κύριος ⸀Ἰησοῦς ⸀ἀνελεῖ τῷ πνεύματι τοῦ στόματος αὐτοῦ καὶ καταργήσει τῇ ἐπιφανείᾳ τῆς παρουσίας αὐτοῦ,
base_translation:
  language: en
  yaml_path: translation/nt/2_thessalonians/002/008.yaml
  text: And then the lawless one will be revealed[a], whom the Lord Jesus will slay with the breath of his mouth and bring to nothing by the appearance of his coming[b],
translation:
  language: ko
  text: 그리고 그때에 불법의 자가 나타날 것이며, 주 예수께서 자기 입의 숨[a]으로 그를 죽이시고 자기 오심의 나타나심[b]으로 그를 무력하게 하실 것입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「자기 입의 영」. 헬라어 πνεῦμα는 「숨」 또는 「영」을 가리킬 수 있으며, 본 정황에서 「숨」이 더 자연스럽다(사 11:4 LXX 반향).
    reason: lexical_alternative
  - marker: b
    text: 또는 「자기 임재의 현현」. 헬라어 παρουσία는 본 문맥에서 그리스도의 종말론적 오심을 가리킨다.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποκαλυφθήσεται
  english_pob_choice: will be revealed
  chosen_korean: 나타날 것이며
  alternatives_korean:
  - 드러날 것이며
  - 계시될 것이며
  lexicon: BDAG
  rationale: 미래 수동의 「드러남」을 자연스럽게 표현.
- source_word: ὁ ἄνομος
  english_pob_choice: the lawless one
  chosen_korean: 불법의 자
  alternatives_korean:
  - 불법자
  - 무법자
  lexicon: BDAG
  rationale: 형용사적 substantival 「~한 자」를 「불법의 자」로 옮겨 3절 「불법의 사람」과 어휘적 연결을 유지하면서, 본 절의 더 압축된 형태도 보존한다.
- source_word: κύριος Ἰησοῦς
  english_pob_choice: the Lord Jesus
  chosen_korean: 주 예수
  alternatives_korean:
  - 주이신 예수
  lexicon: BDAG
  rationale: 표준 글로서리.
- source_word: ἀνελεῖ
  english_pob_choice: will slay
  chosen_korean: 죽이시고
  alternatives_korean:
  - 멸하시고
  - 처치하시고
  lexicon: BDAG
  rationale: ἀναιρέω는 「죽이다」의 의미. 「죽이시고」가 가장 직접적이고 자연스러우며 본문의 무게를 약화시키지 않는다.
- source_word: τῷ πνεύματι τοῦ στόματος αὐτοῦ
  english_pob_choice: with the breath of his mouth
  chosen_korean: 자기 입의 숨으로
  alternatives_korean:
  - 자기 입의 영으로
  - 자기 입김으로
  lexicon: BDAG
  rationale: 사 11:4 LXX 반향을 살려 「숨」으로 옮긴다. 「영」 가능성은 각주.
- source_word: καταργήσει
  english_pob_choice: bring to nothing
  chosen_korean: 무력하게 하실
  alternatives_korean:
  - 무효하게 하실
  - 없애 버리실
  lexicon: BDAG
  rationale: καταργέω는 「무력화·폐기」의 의미. 「무력하게 하다」가 결정적 무효화를 자연스럽게 표현한다.
- source_word: τῇ ἐπιφανείᾳ τῆς παρουσίας αὐτοῦ
  english_pob_choice: by the appearance of his coming
  chosen_korean: 자기 오심의 나타나심으로
  alternatives_korean:
  - 자기 강림의 현현으로
  - 자기 임재의 나타남으로
  lexicon: BDAG
  rationale: ἐπιφάνεια와 παρουσία 두 명사의 속격 구조를 보존한다. 본 정황의 παρουσία는 「오심」이 자연스러우며, 2:1의 「재림」과는 어조가 다르므로 「오심」으로 차별화한다. 「나타나심」은 ἐπιφάνεια의 가시적 현현을 표현한다.
theological_decisions:
- issue: παρουσία의 한국어 등가어 — 「재림」 vs 「오심」
  chosen_reading: 오심 (2:1에서는 「재림」 채택)
  alternative_readings:
  - 재림
  - 임재
  - 강림
  rationale: 본 절의 「ἐπιφανείᾳ τῆς παρουσίας」(오심의 나타나심) 구조는 두 명사의 결합이므로 「재림의 현현」은 어색하다. 「오심」으로 옮겨 자연성과 의미를 동시에 살린다. 두 단어가 함께 쓰일 때 한국어 자연성을 우선하는 본 번역의 정책이다.
  doctrine_reference: 'KOREAN_PIPELINE Glossary: παρουσία (case-by-case); document choices'
- issue: 그리스도의 승리의 양식
  chosen_reading: 자기 입의 숨으로
  alternative_readings:
  - 자기 입의 영으로
  rationale: 사 11:4 LXX의 예언적 심판 이미지를 반영하는 「숨」이 본 정황에 더 자연스럽다. 「영」은 어휘적으로 가능하므로 각주로 보존.
  doctrine_reference: 'Preserve theological tension'
