translation:
  language: es
  text: Él tiene misericordia de los que aceptan la disciplina[a], y de los que se apresuran a sus juicios[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los que reciben instrucción» para «los que aceptan la disciplina». El griego παιδεία puede significar instrucción, formación o disciplina correctiva.
    reason: lexical_alternative
  - marker: b
    text: O «sus ordenanzas» para «sus juicios». El griego κρίματα puede referirse a juicios, decisiones u ordenanzas.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐλεᾷ
  english_pob_choice: has mercy on
  chosen_spanish: tiene misericordia de
  alternatives_spanish:
  - se compadece de
  - muestra compasión a
  lexicon: LSJ
  rationale: El verbo expresa misericordia o compasión. En español, «tiene misericordia de» es una fórmula natural y fiel que conserva el peso religioso y moral del griego sin volverlo más débil que «se compadece de».
- source_word: τοὺς ἐκδεχομένους
  english_pob_choice: those who accept
  chosen_spanish: los que aceptan
  alternatives_spanish:
  - los que esperan
  - los que reciben
  lexicon: LSJ
  rationale: Aunque ἐκδέχομαι puede significar «esperar» o «recibir», aquí el contexto con παιδείαν favorece la idea de acoger voluntariamente la disciplina. «Los que aceptan» comunica bien esa disposición receptiva en español.
- source_word: παιδείαν
  english_pob_choice: discipline
  chosen_spanish: la disciplina
  alternatives_spanish:
  - la instrucción
  - la formación
  - la corrección
  lexicon: LSJ
  rationale: En literatura sapiencial, παιδεία abarca instrucción, formación y corrección disciplinaria. Se mantiene «disciplina» porque conserva esa dimensión formativa y correctiva que el contexto sugiere, en línea con la elección inglesa.
- source_word: κατασπεύδοντας
  english_pob_choice: eagerly hasten
  chosen_spanish: se apresuran con celo
  alternatives_spanish:
  - se apresuran
  - se dan prisa con fervor
  - se encaminan con diligencia
  lexicon: LSJ
  rationale: El verbo compuesto intensifica la rapidez y añade empeño. «Se apresuran con celo» mantiene el movimiento y la prontitud positiva; se evita una traducción demasiado literal que sonaría áspera en español.
- source_word: ἐπὶ τὰ κρίματα αὐτοῦ
  english_pob_choice: to his judgments
  chosen_spanish: hacia sus juicios
  alternatives_spanish:
  - a sus juicios
  - hacia sus decretos
  - a sus ordenanzas
  lexicon: LSJ
  rationale: κρίματα puede referirse a juicios, decisiones u ordenanzas. Se eligió «juicios» para conservar la amplitud del término y seguir de cerca el valor básico del griego, sin restringirlo a un sentido meramente legal.
theological_decisions:
- issue: Sentido de παιδεία en contexto sapiencial
  english_pob_reading: discipline
  chosen_spanish_reading: disciplina
  alternative_spanish_readings:
  - instrucción
  - formación
  rationale: El texto alaba la actitud de acogida ante la obra formativa y correctiva de Dios. «Disciplina» preserva mejor esa fuerza teológica que «instrucción», aunque esta última siga siendo posible en nota.
  doctrine_reference: Translation philosophy §1, §5
- issue: Alcance de κρίματα αὐτοῦ
  english_pob_reading: his judgments
  chosen_spanish_reading: sus juicios
  alternative_spanish_readings:
  - sus ordenanzas
  - sus decretos
  rationale: El griego puede abarcar actos de juicio, decisiones normativas u ordenanzas. «Sus juicios» mantiene esa amplitud y evita cerrar prematuramente el sentido en una sola categoría jurídica.
  doctrine_reference: Translation philosophy §3, §5
translation_notes:
  revision_awareness: El pasaje presenta alta concordancia con el texto griego y con el audit trail inglés; no se detectaron revisiones sustantivas pendientes. Se mantuvo la distinción entre παιδεία y κρίματα, y se reflejaron en nota las alternativas léxicas documentadas en el expediente inglés.
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino explícito.
  - «Disciplina» se mantuvo consistente con la elección POB inglesa y con el sentido sapiencial del contexto.
  - «Juicios» conserva la amplitud semántica de κρίματα mejor que una equivalencia más estrecha.
