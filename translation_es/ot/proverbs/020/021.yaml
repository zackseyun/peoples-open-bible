translation:
  language: es
  text: Una herencia obtenida con prisa al principio[a] no será bendecida al final.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «obtenida rápidamente al comienzo». El término hebreo puede enfatizar la rapidez, una adquisición prematura o una prisa codiciosa.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נַחֲלָה
  english_pob_choice: inheritance
  chosen_spanish: herencia
  alternatives_spanish:
  - heredad
  - patrimonio
  lexicon: HALOT
  rationale: נַחֲלָה denota una posesión recibida por herencia. En español, 'herencia' comunica con naturalidad esa idea y conserva el campo semántico de bienes transmitidos, sin añadir matices ajenos.
- source_word: מבחלת
  english_pob_choice: gained hastily
  chosen_spanish: obtenida con prisa
  alternatives_spanish:
  - obtenida rápidamente
  - adquirida con precipitación
  - ganada apresuradamente
  lexicon: HALOT
  rationale: La forma transmite rapidez y, posiblemente, una obtención apresurada o codiciosa. 'Obtenida con prisa' preserva esa ambigüedad sin especificar más de lo que el hebreo exige.
- source_word: בָּרִאשֹׁנָה
  english_pob_choice: at first
  chosen_spanish: al principio
  alternatives_spanish:
  - al comienzo
  - inicialmente
  lexicon: HALOT
  rationale: La expresión marca la etapa inicial. 'Al principio' es natural en español y mantiene el contraste proverbial con el desenlace.
- source_word: וְאַחֲרִיתָהּ
  english_pob_choice: in the end
  chosen_spanish: al final
  alternatives_spanish:
  - en su fin
  - en el desenlace
  - a la postre
  lexicon: HALOT
  rationale: La forma con sufijo significa literalmente 'su final/lado postrero'. 'Al final' comunica con claridad el resultado último en estilo proverbial español.
- source_word: לֹא תְבֹרָךְ
  english_pob_choice: will not be blessed
  chosen_spanish: no será bendecida
  alternatives_spanish:
  - no recibirá bendición
  - no prosperará
  lexicon: HALOT
  rationale: El pasivo de ברך expresa una falta de bendición, no solo prosperidad material. 'No será bendecida' conserva el valor teológico amplio del hebreo.
theological_decisions:
- issue: Alcance de la advertencia sobre la herencia obtenida con prisa
  english_pob_reading: The verse states that wealth or inheritance acquired in haste lacks blessing in its final outcome, without specifying the exact mechanism of judgment.
  chosen_spanish_reading: El proverbio afirma que una herencia conseguida con prisa no tiene bendición en su resultado final, sin precisar si el énfasis recae en juicio divino explícito o en las consecuencias prácticas de la precipitación.
  alternative_spanish_readings:
  - La frase señala específicamente castigo divino por la codicia.
  - La frase se limita a consecuencias meramente naturales de actuar con rapidez.
  rationale: La formulación española debe conservar la amplitud sapiencial del hebreo y del POB inglés. 'No será bendecida' mantiene la tensión entre orden moral, favor de Dios y resultado final, sin resolverla en una sola dirección.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'El borrador sigue el audit trail inglés sin depender mecánicamente de él: conserva la imagen proverbial, la ambigüedad de מבחלת y la amplitud teológica de תְבֹרָךְ, con una solución española idiomática y fiel al hebreo.'
  spanish_consistency_notes:
  - Se usa 'herencia' para נַחֲלָה en coherencia con el uso bíblico de posesión recibida.
  - '''Bendecida'' mantiene el pasivo teológico de ברך; no se reduce a ''prosperada''.'
  - La nota al pie se ancla en 'con prisa' para reflejar la alternativa lexical sin duplicar el sentido principal.
