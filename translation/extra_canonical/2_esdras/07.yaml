translation:
  text: '1 And it happened[a], when I had finished speaking these words, that the angel who had been sent to me in the first nights was sent to me again,

    2 and he said to me, “Rise, Ezra, and hear the words that I have come to speak to you.”

    3 And I said, “Speak, my lord.” And he said to me, “The sea is set in a broad place, so that it might be deep and immense.

    4 But its entrance is set in a narrow place, so that it is like a river.

    5 For if someone who wishes to enter should want to see the sea or master it, how will he come into the breadth unless he passes through the narrow place?

    6 Again, another example: a city is built and set in a plain, and it is full of every good thing.

    7 But its entrance is narrow and set on a precipice, so that on the right there is fire and on the left deep water.

    8 And there is only one path laid between them, between the fire and the water, so that the path can hold no more than the footprint of a man.

    9 Now if the city is given to a man for an inheritance, if the heir does not pass through the danger set before him, how will he receive his inheritance?”

    10 And I said, “So it is, lord.” And he said to me, “So also is Israel’s portion.

    11 For because of them I made the age, and when Adam transgressed my ordinances, what had been made was judged.

    12 And the entrances of this age became narrow and sorrowful and laborious, few and evil, full of dangers and burdened with great hardships.

    13 But the entrances of the greater age are broad and secure, and they bear the fruit of immortality.

    14 Therefore, unless those who live enter these narrow and vain things, they cannot receive what has been stored up.

    15 So now why are you disturbed, seeing that you are corruptible? And why are you moved, seeing that you are mortal?

    16 And why have you not taken to heart what is to come[b], rather than what is present?”

    17 Then I answered and said, “O Lord who rules, you have ordained in your law that the righteous will inherit these things, but the ungodly will perish.

    18 Yet the righteous will endure narrow things, hoping for broad ones; for those who have acted ungodly have also endured distress, and have not seen the broad things.”

    19 And he said to me, “You are not a judge over the Lord, nor one wiser than the Most High.

    20 Let many of those now living perish, rather than the law of God that has been set before them be neglected.

    21 For the Lord strictly commanded those who came when they came what they must do to live, and what they must keep so as not to be punished.

    22 But they were not persuaded and contradicted him, and they established for themselves thoughts of vanity,

    23 and set before themselves schemes of sins, and even said that the Most High does not exist, and they did not know his ways.

    24 They despised his law and denied his covenants, and they were not faithful to his statutes and did not perform his works.

    25 Therefore, Ezra, empty things are for the empty, and full things for the full.

    26 For behold, the time will come, and it will happen that the signs I foretold to you will come, and the bride will appear, and the city now hidden will appear, and what is now withdrawn from the earth will be shown.

    27 And everyone who has been delivered from the evils foretold will see my wonders.

    28 For my son Jesus will be revealed with those who are with him, and he will make glad those who remain for four hundred years.

    29 And after these years, my son the Messiah will die, and all who have the breath of man.

    30 And the age will be turned back into the ancient silence for seven days, as in the former beginnings, so that no one is left.

    31 And after seven days, the age that is not yet awake will be awakened, and what is corruptible will die.

    32 And the earth will give back those who sleep in it, and the dust those who dwell in silence in it, and the storehouses will give back the souls entrusted to them.

    33 And the Most High will be revealed upon the seat of judgment, and mercies will pass away, and long-suffering will be gathered up.

    34 But judgment alone will remain, and truth will stand, and faith will grow strong.

    35 And the deed will follow, and the reward will be shown, and righteous acts will awake, and unrighteous acts will not sleep.

    36 Then the pit of torment will appear, and opposite it will be the place of rest; and the furnace of Gehenna will be shown, and opposite it the paradise of delight.

    37 And then the Most High will say to the nations that have been raised, “Look and understand whom you denied, or whom you did not serve, or whose ways you despised.

    38 Look on this side and on that: here are delight and rest, and there are fire and torments.” These are the words he will speak to them on the day of judgment.

    39 That day is such that it has neither sun nor moon nor stars,

    40 neither cloud nor thunder nor lightning, neither wind nor water nor air,

    41 neither darkness nor evening nor morning, neither summer nor spring nor heat nor winter, neither frost nor cold, neither hail nor rain nor dew,

    42 neither noon nor night nor dawn, neither brightness nor splendor nor light, except only the radiance of the glory of the Most High, by which all will begin to see what has been set before them.

    43 For it will last about a week of years.

    44 This is my judgment and its ordinance, and I have shown these things to you alone.”

    45 Then I answered and said, “Lord, and now I say: blessed are those who are now alive and keep what has been ordained by you.

    46 But as for those about whom my prayer was made—who among those now living has not sinned, or what man born has not transgressed your covenant?

    47 And now I see that the joy of the age to come will benefit few, but torments many.

    48 For an evil heart has grown up in us, which has alienated us from these things and led us into corruption, and into the ways of death; it has shown us the paths of perdition and taken us far from life—and this not for a few, but for almost all who have been created.”

    49 And he answered me and said, “Hear me, and I will instruct you, and I will correct you further.

    50 For this reason the Most High did not make one age, but two.

    51 But because you have said that the righteous are not many, but few, while the ungodly are many, hear this:

    52 If you have very few precious stones, you will set them aside according to their number for yourself, but lead and clay are abundant.

    53 And I said, “Lord, how can that be?”

    54 And he said to me, “Not only this, but ask the earth, and it will tell you; court it, and it will declare to you.

    55 Say to it, ‘You produce gold and silver and bronze, and iron also and lead and clay;

    56 but silver is more abundant than gold, and bronze than silver, and iron than bronze, and lead than iron, and clay than lead.’

    57 So judge for yourself which things are precious and desirable: what is abundant, or what is rare in coming to be?”

    58 And I said, “O Lord who rules, what is abundant is cheaper, for what is rarer is more precious.”

    59 And he answered me and said, “Weigh within yourself what you have thought, because the one who has what is difficult rejoices more than the one who has abundance.

    60 So also with the creation promised by me: I will rejoice over the few who are saved, because they are the ones who have now made my glory prevail, and through whom my name is now named.

    61 And I will not grieve over the multitude of those who perish, for they are like vapor, and are compared to flame and smoke; they blazed up, burned hot, and were extinguished.”

    62 And I answered and said, “O earth, what have you brought forth, if understanding has been made from dust, like the rest of creation?

    63 For it would have been better if the dust itself had not been born, so that understanding might not have come from it.

    64 But now understanding grows with us, and because of this we are tormented, because though we know, we perish.

    65 Let the race of man mourn, and let the beasts of the field rejoice; let all who have been born lament, but let the four-footed animals and the cattle be glad.

    66 For it is much better for them than for us, because they do not expect judgment, nor do they know torments or the salvation promised after death.

    67 But what does it profit us that we will be preserved alive, if we are tormented with torment?

    68 For all who have been born are mixed with iniquities, and are full of sins and loaded with transgressions.

    69 And if after death we were not coming into judgment, perhaps it would have gone better for us.”

    70 And he answered me and said, “When the Most High was making the age, and Adam and all who came from him, he first prepared judgment and the things that belong to judgment.

    71 And now understand from your own words, because you said that understanding grows with us.

    72 Therefore those who dwell on the earth will be tormented for this reason, because though they had understanding they committed iniquity, and though they received commandments they did not keep them, and though they obtained the law they dealt deceitfully with what they received.

    73 What then will they have to say in the judgment, or how will they answer in the last times?

    74 For how long a time has the Most High shown long-suffering to those who inhabit the age—not for their sake, but because of the times that he has foreseen!”

    75 And I answered and said, “If I have found favor before you, lord, show your servant this also: after death, or now when each of us gives up his soul, are we kept in rest until those times come in which you will begin to renew the creation, or are we tormented at once?”

    76 And he answered me and said, “I will show you this also; but do not mix yourself with those who have shown contempt, and do not count yourself among those who are tormented.

    77 For you have a store of works laid up with the Most High, but it will not be shown to you until the last times.

    78 Now concerning death, the teaching is this: when the decree has gone forth from the Most High that a man should die, as the spirit departs from the body to return again to him who gave it, first of all it worships the glory of the Most High.

    79 And if it is one of those who have shown contempt and have not kept the way of the Most High, and of those who have despised his law, and of those who hate those who fear him,

    80 such spirits will not enter habitations, but will wander from now on in torments, always grieving and sad,

    81 The first way: because they have despised the law of the Most High.

    82 The second way: because they cannot now make a good repentance so as to live.

    83 The third way: they see the reward laid up for those who have trusted the covenants of the Most High.

    84 The fourth way: they consider the torment laid up for themselves in the last times.

    85 The fifth way: they see the habitations of the others guarded by angels in great silence.

    86 The sixth way: they see how they themselves will pass over into torments.

    87 The seventh way, greater than all the ways mentioned above: they waste away in confusion and are consumed in shame and wither in fears, because they see the glory of the Most High, before whom they sinned while they lived, and before whom they are to be judged in the last times.

    88 But this is the order of those who have kept the ways of the Most High, when they begin to be separated from the corruptible vessel.

    89 In the time when they lived in it, they served the Most High with labor, and every hour they endured danger, so that they might perfectly keep the law of the Lawgiver.

    90 Therefore this is the teaching concerning them:

    91 First, they see with great joy the glory of him who receives them, for they will rest in seven orders.

    92 The first order: because with much struggle they have fought to overcome the evil thought formed with them, so that it might not lead them astray from life into death.

    93 The second order: because they see the perplexity in which the souls of the ungodly wander, and the punishment that awaits them.

    94 The third order: because they see the testimony borne by him who formed them, that while they lived they kept the law that was given in faith.

    95 The fourth order: they understand the rest in which, now gathered in their storehouses, they rest in great silence, guarded by angels, and the glory waiting for them in the last times.

    96 The fifth order: they rejoice that they have now escaped what is corruptible, and how they will inherit what is to come; and they see the narrow and toil-filled way from which they have been delivered, and the broad place which they are about to receive in delight and immortality.

    97 The sixth order: when it is shown to them how their face will begin to shine like the sun, and how they will begin to be made like the light of the stars, being from then on incorruptible.

    98 The seventh order, which is greater than all the orders mentioned above: they will exult with confidence, and be bold without confusion, and rejoice without fear, for they hasten to see the face of him whom they served while living, and from whom they are to receive their glorious reward.

    99 This is the order of the souls of the righteous, as it is now announced; and these are the previously described ways of torment which those who were negligent will suffer from now on.”

    100 And I answered and said, “Then will time be given to the souls, after they have been separated from the bodies, to see what you have told me?”

    101 And he said to me, “They will have freedom for seven days, so that they may see the things of which you have been told, and afterward they will be gathered into their habitations.”

    102 And I answered and said, “If I have found favor before your eyes, show your servant this also: in the day of judgment will the righteous be able to plead for the ungodly or entreat the Most High for them—

    103 fathers for children, or children for parents, brothers for brothers, relatives for neighbors, or faithful ones for those most dear to them?”

    104 And he answered me and said, “Because you have found favor before my eyes, I will show you this also: the day of judgment is a decisive day and displays to all the seal of truth. For just as now a father does not send a son, or a son a father, or a master a slave,

    105 or a friend one most dear, so that he may understand for him, or sleep, or eat, or be healed, so no one will ever then pray for another, but each will bear his own unrighteousnesses or righteousnesses.”

    106 And I answered and said, “How then do we now find that Abraham prayed first for the people of Sodom, and Moses for the fathers who sinned in the wilderness,

    107 and Joshua after him for Israel in the days of Achan, and Samuel in the days of Saul,

    108 and David for the plague, and Solomon for those who would come to the sanctuary,

    109 and Elijah for those who received rain and for the dead man that he might live,

    110 and Hezekiah for the people in the days of Sennacherib, and many for many?

    111 If then now, when corruption has increased and unrighteousness has multiplied, the righteous prayed for the ungodly, why will it not be so then?”

    112 And he answered me and said, “The present age is not the end; glory does not remain in it often. Therefore those who were able prayed for the weak.

    113 For the day of judgment will be the end of this time and the beginning of the future immortal time, in which corruption has passed away,

    114 self-indulgence has been ended, unbelief has been cut off, but righteousness has grown and truth has arisen.

    115 Therefore no one will then be able to show mercy to one who has been condemned in the judgment, nor to cast down one who has conquered.”

    116 And I answered and said, “This is my first and last word: it would have been better not to give the earth to Adam, or else, once it had been given, to restrain him from sinning.

    117 For what does it profit all men to live now in sorrow and, after death, to expect punishment?

    118 O Adam, what have you done? For if you sinned, your fall was not yours alone, but ours also who come from you.

    119 For what does it profit us if an immortal age has been promised to us, but we have done mortal works?

    120 And if everlasting hope has been foretold to us, but we have become utterly vain?

    121 And if habitations of health and safety have been laid up, but we have lived wickedly?

    122 And if the glory of the Most High will begin to shelter those who have lived chastely, but we have walked in the most evil ways?

    123 And if paradise will be shown, whose fruit remains incorruptible, in which there is fullness and healing,

    124 but we will not enter it, because we have lived in disgraceful places?

    125 And if the faces of those who practiced self-control will shine above the stars, but our faces will be blacker than darkness?

    126 For while we lived and committed iniquity, we did not consider what we would have to suffer after death.”

    127 And he answered and said, “This is the meaning of the struggle that the man born on earth must fight:

    128 if he is defeated, he will suffer what you have said; but if he conquers, he will receive what I say.

    129 For this is the way of which Moses spoke to the people while he lived, saying, ‘Choose life for yourself, that you may live.’

    130 But they did not believe him, nor the prophets after him, nor even me, who spoke to them.

    131 Therefore there will be no grief over their destruction, just as there will be joy over those to whom salvation has been persuaded.”

    132 And I answered and said, “I know, lord, that the Most High is now called merciful because he has mercy on those who have not yet come into the age,

    133 and compassionate because he shows compassion to those who turn back to his law,

    134 and long-suffering because he shows long-suffering toward those who have sinned, as toward his own works,

    135 and bountiful because he is willing to give rather than demand,

    136 and rich in mercies because he multiplies mercies more and more for those who are present and those who have passed away and those who are to come.

    137 For if he did not multiply them, the age would not be made alive with those who dwell in it.

    138 And he is a giver, because if he did not give from his goodness, so that those who have committed iniquities might be relieved from their iniquities, not even a ten-thousandth part of mankind could be made alive.

    139 And he is a judge, because if he did not forgive those created by his word and blot out the multitude of offenses[c][d][e][f][g][h][i], perhaps only a very few would be left out of an innumerable multitude.”'
