    issue: Falta la nota cultural equivalente a la nota inglesa sobre יְאֹר.
    rationale: El POB inglés preserva explícitamente que יְאֹר puede significar ‘río’ o ‘canal’, pero aquí se refiere al Nilo. Esa información contextual debe conservarse en español, idealmente con un marcador propio anclado a ‘Nilo’.
  - severity: low
