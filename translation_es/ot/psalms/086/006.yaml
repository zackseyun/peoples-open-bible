revisions:
- from: Inclina tu oído[a], Yahvé, a mi oración, y escucha la voz de mis súplicas por misericordia.
  to: Inclina tu oído[a], Yahvé, a mi oración, y escucha la voz de mis ruegos por misericordia.
  rationale: Se conserva la fidelidad al hebreo y al audit trail inglés, pero se mejora la naturalidad del español cambiando «súplicas por misericordia» por «ruegos por misericordia». También se ajusta la nota para que distinga mejor entre el hebreo literal («mis súplicas») y la explicitación semántica en español.
  reviewer_model: gpt-5.4
