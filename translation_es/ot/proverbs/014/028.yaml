  yaml_path: translation/ot/proverbs/014/028.yaml
  text: In a multitude of people is a king’s splendor[a], but without people, a ruler’s ruin.
  footnotes:
  - marker: a
    text: Or 'terror' or 'dismay' for 'ruin'; the Hebrew term can denote either dread or destructive collapse. The main text chooses 'ruin' because the proverb contrasts the strength a populous nation gives a king with the downfall of a ruler who lacks such a people.
    reason: lexical_alternative
