translation:
  language: es
  text: 'Entonces Josué dijo a todo el pueblo: «Miren, esta piedra será testigo contra nosotros[a], porque ella oyó todas las palabras de Yahvé que él habló con nosotros. Y será testigo contra ustedes, no sea que nieguen a su Dios[c][b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «testigo para nosotros» o «testigo a nosotros»; la preposición hebrea puede entenderse de manera más neutral, pero en contexto el sentido es que la piedra da testimonio contra la infidelidad al pacto.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «oyó»; la piedra está personificada como testigo de las palabras del pacto.'
    reason: cultural_note
  - marker: c
    text: O «traten falsamente con su Dios» o «se muestren falsos para con su Dios».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר יְהוֹשֻׁעַ
  english_pob_choice: And Joshua said
  chosen_spanish: Entonces Josué dijo
  alternatives_spanish:
  - Y Josué dijo
  - Josué habló
  lexicon: HALOT
  rationale: «Entonces» introduce con naturalidad la continuación del relato; «dijo» conserva el verbo simple del hebreo sin añadir matiz interpretativo.
- source_word: אֶל כָּל הָעָם
  english_pob_choice: to all the people
  chosen_spanish: a todo el pueblo
  alternatives_spanish:
  - a toda la gente
  - a todo el pueblo reunido
  lexicon: HALOT
  rationale: «Pueblo» mantiene el sentido colectivo del hebreo y suena más bíblico y preciso que «gente» en este contexto de pacto.
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: Miren
  alternatives_spanish:
  - He aquí
  - Vean
  lexicon: HALOT
  rationale: Se eligió una forma deíctica natural en español que conserva la función de llamar la atención sin arcaísmo excesivo.
- source_word: הָאֶבֶן הַזֹּאת
  english_pob_choice: this stone
  chosen_spanish: esta piedra
  alternatives_spanish:
  - esta piedra
  - este peñasco
  lexicon: HALOT
  rationale: «Piedra» es el equivalente normal de אֶבֶן y evita exagerar el tamaño con «peñasco» o «roca».
- source_word: תִּהְיֶה בָּנוּ לְעֵדָה
  english_pob_choice: will be a witness against us
  chosen_spanish: será entre nosotros un testigo[a]
  alternatives_spanish:
  - será para nosotros un testigo
  - será un testigo contra nosotros
  lexicon: HALOT
  rationale: El hebreo permite una relación más neutral con la preposición, pero el contexto forense-covenantal exige la nota que explique el valor adversativo. «Entre nosotros» conserva la preposición sin fijar demasiado la inferencia en el cuerpo del texto.
- source_word: הִיא שָׁמְעָה
  english_pob_choice: it has heard
  chosen_spanish: ella oyó
  alternatives_spanish:
  - ha oído
  - escuchó
  lexicon: HALOT
  rationale: Se mantiene la personificación del texto. «Oyó» reproduce el valor perfecto del hebreo y encaja con la fórmula testimonial.
- source_word: כָּל אִמְרֵי יְהוָה
  english_pob_choice: all the words of Yahweh
  chosen_spanish: todas las palabras de Yahvé
  alternatives_spanish:
  - todas las declaraciones de Yahvé
  - todas las palabras del SEÑOR
  lexicon: HALOT
  rationale: «Palabras» es la opción idiomática más clara para אִמְרֵי; se mantiene «Yahvé» por el nombre divino según el criterio del proyecto.
- source_word: אֲשֶׁר דִּבֶּר עִמָּנוּ
  english_pob_choice: that he spoke with us
  chosen_spanish: que él habló con nosotros
  alternatives_spanish:
  - que habló con nosotros
  - que nos habló
  lexicon: HALOT
  rationale: «Con nosotros» respeta la preposición עִם y el carácter de diálogo pactal; se explicita «él» para claridad en español.
- source_word: וְהָיְתָה בָכֶם לְעֵדָה
  english_pob_choice: And it will be a witness against you
  chosen_spanish: Y será entre ustedes un testigo
  alternatives_spanish:
  - Y será para ustedes un testigo
  - Y será un testigo contra ustedes
  lexicon: HALOT
  rationale: Se repite «testigo» para conservar la repetición hebrea. La fuerza adversativa queda preservada por el contexto y por la nota asociada al primer membrete.
- source_word: פֶּן תְּכַחֲשׁוּן
  english_pob_choice: lest you deny
  chosen_spanish: para que no nieguen
  alternatives_spanish:
  - no sea que nieguen
  - lest you deny
  lexicon: HALOT
  rationale: «Para que no» expresa con naturalidad la función preventiva de פֶּן en español contemporáneo, sin perder el valor de advertencia.
- source_word: בֵּאלֹהֵיכֶם
  english_pob_choice: your God
  chosen_spanish: a su Dios
  alternatives_spanish:
  - a su Dios
  - contra su Dios
  lexicon: HALOT
  rationale: En español, «negar a alguien» requiere la preposición «a». El posesivo se ajusta al discurso directo dirigido al pueblo, conservando la referencia covenantal.
theological_decisions:
- issue: El valor adversativo de 'testigo' con בָּנוּ / בָכֶם
  english_pob_reading: '''against us'' / ''against you'' captures the covenant-warning force'
  chosen_spanish_reading: «entre nosotros» / «entre ustedes» en el texto, con nota que explica el sentido de testimonio contra la infidelidad del pacto
  alternative_spanish_readings:
  - «contra nosotros» / «contra ustedes»
  - «para nosotros» / «para ustedes»
  rationale: El hebreo admite una relación menos explícita que el inglés. Para no endurecer prematuramente el texto, se deja una formulación más abierta en la línea principal y se conserva la fuerza forense mediante la nota. Esto evita sobreparafrasear mientras se mantiene la advertencia del pasaje.
  doctrine_reference: Principio POB de primacía del original y preservación de tensiones léxicas relevantes.
- issue: Personificación de la piedra que 'oyó' y 'será testigo'
  english_pob_reading: Retain the personified language literally
  chosen_spanish_reading: 'Mantener literalmente la personificación: «ella oyó» y «será un testigo»'
  alternative_spanish_readings:
  - tratar la piedra como mero memorial simbólico
  - suavizar la personificación en español
  rationale: El hebreo presenta la piedra como oyente y testigo; la traducción no debe desactivar ese recurso retórico. La forma elegida permite leer el pasaje como testimonio de pacto sin borrar su lenguaje figurado explícito.
  doctrine_reference: Transparencia al texto fuente; evitar reducción paraprástica.
- issue: Nombre divino en Joshua 24:27
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se sigue el estándar del proyecto para יהוה. El texto hebreo usa el nombre divino, no un sustituto; por eso se conserva «Yahvé» en la línea principal.
  doctrine_reference: Convención editorial POB sobre el Tetragrámaton.
translation_notes:
  revision_awareness: 'La formulación española sigue de cerca el texto hebreo y el criterio POB ya estabilizado en inglés: se conserva la personificación de la piedra, el nombre divino Yahvé y el valor de advertencia del pasaje. A la vez, se ajustó la sintaxis para que suene natural en español y se mantuvo una nota donde el hebreo admite una relación más abierta en la primera cláusula.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para יהוה, conforme al estándar del proyecto.
  - Se conserva «testigo» para עֵדָה y la personificación de la piedra.
  - Se evita «SEÑOR» para no ocultar el nombre divino.
  - Se mantiene un español reverente pero moderno, sin calco excesivo.
  - Las notas distinguen entre la línea principal y la fuerza adversativa contextual del hebreo.
