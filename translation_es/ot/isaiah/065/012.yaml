translation:
  language: es
  text: Y os destinaré a la espada[a], y todos se arrodillarán[b] para la matanza, porque llamé y no respondisteis; hablé y no escuchasteis[c]. Y hicisteis lo malo a mis ojos, y escogisteis lo que no me agradó[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «os nombraré» o «os contaré». El verbo hebreo también permite un juego de palabras con la idea de Destino/Fatalidad en el versículo anterior.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «se inclinarán» o «se agacharán». El verbo hebreo literalmente alude a doblar la rodilla; aquí describe el desplome bajo juicio.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «no oísteis» o, por implicación, «no obedecisteis».'
    reason: lexical_alternative
  - marker: d
    text: 'O: «lo que no quise» / «aquello en lo que no me deleité» / «lo que no tuve por agradable».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמָנִיתִי
  english_pob_choice: I will destine
  chosen_spanish: os destinaré
  alternatives_spanish:
  - os nombraré
  - os contaré
  lexicon: HALOT
  rationale: מנה aquí se entiende en sentido de asignar/destinar para juicio; «destinaré» conserva la fuerza activa de decisión judicial y evita el calco pesado de «contaré». También deja perceptible el matiz de asignación soberana que el inglés POB resolvió con «destine».
- source_word: לַחֶרֶב
  english_pob_choice: for the sword
  chosen_spanish: a la espada
  alternatives_spanish:
  - para la espada
  - a espada
  lexicon: HALOT
  rationale: El hebreo expresa destino hacia la espada como instrumento de muerte. En español, «a la espada» suena más natural y conserva la dirección del juicio sin añadir una interpretación militar más amplia.
- source_word: לַטֶּבַח
  english_pob_choice: for the slaughter
  chosen_spanish: ante la matanza
  alternatives_spanish:
  - para la matanza
  - para el degüello
  lexicon: HALOT
  rationale: טבח nombra matanza o degüello. «Ante la matanza» mantiene la imagen de quedar expuestos a ella, en paralelo con «a la espada», y evita un giro demasiado redundante en español. La alternativa «para la matanza» también sería válida, pero menos idiomática en esta línea.
- source_word: תִּכְרָעוּ
  english_pob_choice: will bow down
  chosen_spanish: caeréis
  alternatives_spanish:
  - os arrodillaréis
  - os inclinaréis
  lexicon: HALOT
  rationale: כרע literalmente es doblar la rodilla, arrodillarse o inclinarse; en este contexto de juicio mortal puede describir el desplome ante la matanza. «Caeréis» comunica ese colapso implícito sin forzar una escena de reverencia. Se conserva la tensión entre el gesto corporal y el resultado del juicio.
- source_word: קָרָאתִי
  english_pob_choice: I called
  chosen_spanish: llamé
  alternatives_spanish:
  - os llamé
  - clamé
  lexicon: HALOT
  rationale: El verbo expresa convocatoria o llamada divina. «Llamé» es la forma más directa y reproduce el paralelismo con la respuesta humana que sigue.
- source_word: עֲנִיתֶם
  english_pob_choice: you did not answer
  chosen_spanish: no respondisteis
  alternatives_spanish:
  - no contestasteis
  - no me respondisteis
  lexicon: HALOT
  rationale: ענה aquí es respuesta a una llamada; «respondisteis» preserva ese vínculo sin reducirlo solo a oír. El objeto «me» puede inferirse, pero el hebreo lo omite, y el español puede mantener la misma sobriedad.
- source_word: שְׁמַעְתֶּם
  english_pob_choice: you did not listen
  chosen_spanish: no escuchasteis
  alternatives_spanish:
  - no oísteis
  - no obedecisteis
  lexicon: HALOT
  rationale: שמע puede significar oír/escuchar u obedecer. Como el inglés POB eligió «listen», «escuchasteis» conserva el plano auditivo y la carga de rechazo sin resolver la implicación ética por adelantado.
- source_word: הָרַע בְּעֵינַי
  english_pob_choice: what was evil in my eyes
  chosen_spanish: lo malo a mis ojos
  alternatives_spanish:
  - lo que era malo a mis ojos
  - lo que era malvado ante mis ojos
  lexicon: HALOT
  rationale: La expresión hebrea es un giro evaluativo convencional. «Lo malo a mis ojos» mantiene la idiomaticidad y la perspectiva divina del juicio, en línea con el inglés POB.
- source_word: חָפַצְתִּי
  english_pob_choice: I did not delight in
  chosen_spanish: yo no me complací
  alternatives_spanish:
  - yo no me deleité
  - yo no quise
  lexicon: HALOT
  rationale: חפץ puede expresar deleite, agrado o complacencia. En español, «me complací» conserva la dimensión afectiva y volitiva que el inglés POB resolvió con «delight in»; se evita «desear» para no estrechar indebidamente el sentido.
- source_word: בְּחַרְתֶּם
  english_pob_choice: chose
  chosen_spanish: escogisteis
  alternatives_spanish:
  - elegisteis
  - tomasteis
  lexicon: HALOT
  rationale: בחר se traduce de manera natural por «escoger/elegir». «Escogisteis» suena digna y bíblica en español moderno, y mantiene el paralelismo con la elección humana contraria a la voluntad divina.
theological_decisions:
- issue: Juicio activo de Dios sin suavizar el verbo de asignación
  english_pob_reading: I will destine you for the sword
  chosen_spanish_reading: os destinaré a la espada
  alternative_spanish_readings:
  - os nombraré a la espada
  - os contaré para la espada
  rationale: La frase debe conservar que Dios actúa judicialmente y de manera deliberada. «Destinaré» expresa esa asignación y evita tanto la suavización como un calco poco natural. También deja abierta la resonancia de designación soberana presente en el hebreo y reflejada en el audit trail inglés.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Relación entre 'oír' y 'obedecer' en שמע
  english_pob_reading: you did not listen
  chosen_spanish_reading: no escuchasteis
  alternative_spanish_readings:
  - no obedecisteis
  - no oísteis
  rationale: El hebreo permite la implicación de desobediencia, pero el texto menciona primero la falta de escucha. «Escuchasteis» conserva el reproche explícito sin resolver la acusación en una paráfrasis moral. La desobediencia queda inferida por el contexto del versículo.
  doctrine_reference: Translation philosophy §3
- issue: Lenguaje idiomático de 'lo malo a mis ojos'
  english_pob_reading: you did what was evil in my eyes
  chosen_spanish_reading: hicisteis lo malo a mis ojos
  alternative_spanish_readings:
  - hicisteis el mal ante mis ojos
  - hicisteis lo que era malo a mis ojos
  rationale: Se conserva la fórmula relacional y judicial de la expresión hebrea. «A mis ojos» preserva el punto de vista divino sin modernizarlo en exceso; «lo malo» evita sustituir la evaluación moral por una explicación interpretativa más larga.
  doctrine_reference: Translation philosophy §§1, 3
- issue: 'Final clause sobre חפץ: agrado, deleite o complacencia'
  english_pob_reading: chose what I did not delight in
  chosen_spanish_reading: escogisteis lo que yo no me complací
  alternative_spanish_readings:
  - escogisteis lo que yo no me deleité
  - escogisteis lo que yo no quise
  rationale: «Me complací» reproduce el campo semántico de agrado/delicia/placer que el inglés POB resolvió con «delight in», sin convertir la frase en una voluntad desnuda ni en una preferencia meramente emocional. Se mantiene así la desaprobación personal de Dios frente a la elección humana.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: Se siguió la última revisión inglesa que reemplazó 'But' por 'And' para reflejar con mayor precisión la conjunción hebrea וַ; por eso el español usa «Y» / «E» sin introducir contraste adversativo. También se mantuvo la secuencia formal de juicio, llamada, respuesta negativa, habla, no escucha, y evaluación moral final.
  spanish_consistency_notes:
  - Se usa «Y» al inicio y «E» ante «hicisteis» para conservar la coordinación en español sin perder naturalidad fonética.
  - Se mantiene «Yahvé» solo cuando aparezca el Tetragrámaton explícito; en este versículo no aparece.
  - Se prefirió «escuchasteis» sobre «oísteis» para mantener el paralelismo con «llamé» y «hablé», y la posibilidad de desobediencia implícita.
  - «A la espada» y «ante la matanza» conservan el paralelismo de instrumentos/destino de muerte sin añadir explicaciones interpretativas.
