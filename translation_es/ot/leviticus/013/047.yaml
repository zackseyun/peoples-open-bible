    reason: lexical_alternative
  revision_rationale: 'Se revisa para alinearse con la decisión auditada de la POB: mantener el equivalente tradicional ''lepra'' en el texto principal y explicar en nota su sentido más amplio. También se sustituye ''plaga'' por ''afección'' para que נגע suene natural y preciso en español cuando se habla de una prenda, sin reducir indebidamente el alcance del término. Se elimina la nota innecesaria sobre ''prenda''.'
