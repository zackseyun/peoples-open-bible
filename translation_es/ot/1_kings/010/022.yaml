base_translation:
  language: en
  yaml_path: translation/ot/1_kings/010/022.yaml
  text: For the king had a fleet of Tarshish ships at sea with Hiram’s fleet[a]. Once every three years the fleet of Tarshish ships would come, carrying gold and silver, ivory, apes[c][b], and peacocks.
  footnotes:
  - marker: a
    text: Or 'Tarshish ships'; the phrase may refer either to ships associated with Tarshish or more generally to large seagoing vessels.
    reason: lexical_alternative
  - marker: b
    text: The exact identification of the animal is uncertain; traditionally 'peacocks,' but some understand it as 'parrots.'
    reason: lexical_alternative
  - marker: c
    text: '''Apes'' may also be rendered more broadly as ''monkeys.'''
    reason: lexical_alternative
