review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del hebreo y la lógica del inglés POB: caso ocasional, permanencia de la nube desde la tarde hasta la mañana, levantamiento de la nube como señal de partida, y caso alternativo de día y de noche. Sin embargo, «era levantada» suena innecesariamente pasivo y poco natural en español para וְנַעֲלָה, donde una forma media como «se alzaba» preserva mejor el evento sin perder la nota lexical alternativa «subía».'
  spanish_quality_summary: El texto es claro, pero tiene cierto tono calcado en «era levantada en la mañana» y repetición algo rígida con «ellos se ponían en marcha». Una leve corrección mejora la naturalidad y dignidad del español sin apartarse del sentido fuente.
  glossary_alignment: 'No hay términos del glosario mayor en juego como Yahvé/Mesías. Las decisiones léxicas principales son adecuadas: «a veces», «estaba», «desde la tarde hasta la mañana», y «se ponían en marcha». La principal excepción es la preferencia por una formulación española más natural para עלה: «se alzaba», con nota preservando «subía».'
  issues:
  - severity: medium
    issue: «la nube era levantada» suena antinatural en español
    rationale: Aunque intenta reflejar el matiz eventivo de «was taken up», en español bíblico legible esta pasiva perifrástica resulta forzada y puede insinuar un agente explícito no presente en el hebreo. «Se alzaba» mantiene el movimiento/señal de partida y conserva mejor la fluidez.
  - severity: low
    issue: «en la mañana» es menos idiomático que «por la mañana» en este contexto
    rationale: Ambas opciones son comprensibles, pero «por la mañana» suena más natural en español general y sigue representando bien בַּבֹּקֶר.
  revised_spanish_text: Y a veces la nube estaba desde la tarde hasta la mañana; cuando la nube se alzaba por la mañana[a], ellos se ponían en marcha. O si era de día y de noche, cuando la nube se alzaba, ellos se ponían en marcha.
  revised_footnotes:
  - marker: a
    text: O, «cuando la nube subía». El verbo hebreo puede traducirse más literalmente de esta manera, pero «se alzaba» refleja mejor el levantamiento de la nube como señal para que Israel partiera en este contexto.
    reason: lexical_alternative
  revision_rationale: Se ajustó la expresión de עלה a una forma española más natural («se alzaba») sin perder la función señalizadora destacada por la POB, y se refinó «en la mañana» a «por la mañana» para mejorar la idiomaticidad. El resto del versículo puede mantenerse.
