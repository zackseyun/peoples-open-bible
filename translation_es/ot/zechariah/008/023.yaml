base_translation:
  language: en
  yaml_path: translation/ot/zechariah/008/023.yaml
  text: 'Thus says Yahweh of Armies: In those days ten men from all the languages of the nations will take hold—yes[a], they will take hold of the edge of the garment of a Jewish man, saying, ‘Let us go with you[c][b], for we have heard that God is with you.’'
