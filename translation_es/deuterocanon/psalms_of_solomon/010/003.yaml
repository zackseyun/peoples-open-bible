translation:
  language: es
  text: Porque él ha enderezado los caminos de los justos[a][c][b], y no los torcerá en la disciplina.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sendas» en lugar de «caminos».
    reason: lexical_alternative
  - marker: b
    text: O «por la disciplina» o «en corrección».
    reason: lexical_alternative
  - marker: c
    text: O «pervertirá» o «desviará».
    reason: lexical_alternative
lexical_decisions:
- source_word: ὤρθωσε
  english_pob_choice: has made straight
  chosen_spanish: ha enderezado
  alternatives_spanish:
  - ha hecho rectos
  - ha puesto en línea
  - ha allanado
  lexicon: LSJ
  rationale: ὤρθωσε expresa hacer recto o derecho algo ya figurado como camino. «Ha enderezado» conserva la imagen espacial y suena natural en español bíblico contemporáneo.
- source_word: ὁδοὺς
  english_pob_choice: ways
  chosen_spanish: caminos
  alternatives_spanish:
  - sendas
  - rutas
  - caminos
  lexicon: LSJ
  rationale: El griego mantiene la metáfora de tránsito moral. «Caminos» es la opción más transparente en español y permite conservar la imagen sin forzar un tecnicismo.
- source_word: δικαίων
  english_pob_choice: the righteous
  chosen_spanish: de los justos
  alternatives_spanish:
  - de los rectos
  - de los piadosos
  - de los justos
  lexicon: LSJ
  rationale: El genitivo plural funciona como sustantivo para personas. «Los justos» es el equivalente más natural y fiel en español, con fuerza moral y relacional.
- source_word: διαστρέψει
  english_pob_choice: will not pervert them
  chosen_spanish: no los pervertirá
  alternatives_spanish:
  - no los torcerá
  - no los desviará
  - no los deformará
  lexicon: LSJ
  rationale: El verbo σημαίνει torcer, distorsionar o pervertir. «Pervertirá» sigue de cerca la decisión inglesa y mantiene el contraste con «enderezado», sin suavizar la tensión léxica.
- source_word: ἐν παιδείᾳ
  english_pob_choice: in discipline
  chosen_spanish: en la disciplina
  alternatives_spanish:
  - por la disciplina
  - en corrección
  - en castigo
  lexicon: LSJ
  rationale: παιδεία puede referirse a disciplina, corrección o formación. «En la disciplina» conserva la preposición y la ambigüedad respetuosa del texto, sin reducirlo a castigo.
theological_decisions:
- issue: Relación entre la disciplina divina y los caminos de los justos
  english_pob_reading: God straightens the ways of the righteous and does not distort those ways even in the process of discipline.
  chosen_spanish_reading: Dios endereza los caminos de los justos y no los pervierte aun dentro de la disciplina.
  alternative_spanish_readings:
  - Dios no hace que los justos se desvíen mediante la disciplina.
  - Dios no actúa torcidamente al disciplinar.
  rationale: La metáfora de caminos en ὁδοὺς y el contraste con ὤρθωσε favorecen tomar el objeto implícito de διαστρέψει como los mismos caminos mencionados. Así se preserva la imagen interna del verso sin introducir una formulación doctrinal más abstracta que el griego.
  doctrine_reference: Disciplina divina; rectitud de los caminos de los justos
- issue: Alcance del objeto de 'no los pervertirá'
  english_pob_reading: The pronoun refers back to the ways/paths, not directly to the righteous people.
  chosen_spanish_reading: El pronombre se entiende referido a los caminos, no directamente a las personas.
  alternative_spanish_readings:
  - El pronombre puede entenderse como referido a los justos.
  - El verbo podría leerse como una acción sobre las personas.
  rationale: En español, «no los pervertirá» puede sonar más natural si el antecedente son los caminos. Esta lectura sigue la lógica espacial del verso y evita borrar la tensión entre imagen moral y metáfora de camino.
  doctrine_reference: Coherencia de la metáfora de camino
translation_notes:
  revision_awareness: The Spanish draft follows the latest English audit trail by preserving the straight/crooked contrast with a formal equivalent for διαστρέψει, while adapting the idiom naturally for Spanish. It also keeps the ambiguous force of παιδείᾳ without collapsing it into a narrower punitive sense.
  spanish_consistency_notes:
  - Se usa «justos» para δικαίων, en línea con el valor sustantivado del genitivo plural.
  - Se conserva la metáfora de caminos para mantener la simetría con «enderezado» y «pervertirá».
  - «En la disciplina» respeta la ambigüedad de παιδεία y no sustituye el término por una explicación interpretativa.
  - El orden de los marcadores en el texto se mantiene como [a][c][b] para reflejar el audit trail proporcionado.
