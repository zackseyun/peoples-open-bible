  lexicon: BDAG
  rationale: 「Μεγαλύνει」는 「크게 하다·드높이다」로, 한국어 시적 운율을 위해 「송축하며」를 택한다. 한나의 노래(삼상 2:1)의 LXX 표현을 반향한다.
theological_decisions:
- issue: 마리아의 송가(Magnificat) 1:46-55의 시적 어조와 신명
  chosen_reading: 송가 전체를 야훼 정책을 유지한 시적 한국어 합쇼체 운율로 옮긴다
  alternative_readings:
  - 전통적 「주」 일관 사용
  - 개역개정 식 운율 모방
  rationale: 누가가 한나의 노래(삼상 2:1-10), 시편 113편 등을 직접 반향하므로 OT의 신명이 본문 의도이다. 시적 평행구조(대구)를 한국어 어순으로 살리되, 합쇼체의 격조를 유지한다. 1:32와 함께 본 송가가 메시아의 정치적·종말론적 차원(권세자를 끌어내리시고 비천한 자를 높이심)을 분명히 한다.
  doctrine_reference: 'DOCTRINE.md: Preserve OT echoes; YHWH naming'
