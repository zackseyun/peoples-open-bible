translation:
  language: es
  text: 'Escucha[a], Israel: Yahvé nuestro Dios, Yahvé es uno.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Yahvé es nuestro Dios, Yahvé solo»; alternativamente: «Yahvé nuestro Dios es un solo Yahvé». El hebreo es compacto y permite más de una lectura sintácticamente plausible.'
    reason: alternative_reading
lexical_decisions:
- source_word: שְׁמַע
  english_pob_choice: Hear
  chosen_spanish: Escucha
  alternatives_spanish:
  - Oye
  - Oíd
  lexicon: HALOT
  rationale: El imperativo singular dirigido a Israel como pueblo colectivo pide un verbo de audición obediente. 'Escucha' comunica la llamada a oír y atender sin sonar arcaico; en español es natural y conserva la fuerza exhortativa de 'Hear'.
- source_word: יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: Israel
  alternatives_spanish:
  - —
  lexicon: HALOT
  rationale: Nombre propio del pueblo del pacto; se mantiene sin traducir.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino como transliteración del Tetragrámaton, conforme al criterio del POB. 'Yahvé' es la forma establecida en español para preservar el nombre personal de Dios en vez de sustituirlo por un título.
- source_word: אֱלֹהֵינוּ
  english_pob_choice: our God
  chosen_spanish: nuestro Dios
  alternatives_spanish:
  - nuestros dioses
  lexicon: HALOT
  rationale: Aunque la forma hebrea es morfológicamente plural con sufijo de primera persona plural, en este contexto funciona como título singular del Dios de Israel. 'Nuestro Dios' refleja ese uso y mantiene la confesión monoteísta del versículo.
- source_word: אֶחָד
  english_pob_choice: one
  chosen_spanish: uno
  alternatives_spanish:
  - solo
  - único
  lexicon: HALOT
  rationale: '''Uno'' es la equivalencia más transparente del valor básico del lexema. En la frase puede sugerir unidad, exclusividad o unicidad, pero el texto hebreo permite esa tensión; por eso se mantiene el término simple sin explicitar más en el cuerpo.'
theological_decisions:
- issue: Estructura sintáctica final de la Shemá
  english_pob_reading: the LORD our God, the LORD is one
  chosen_spanish_reading: Yahvé nuestro Dios, Yahvé es uno
  alternative_spanish_readings:
  - Yahvé es nuestro Dios, Yahvé solo
  - Yahvé nuestro Dios es un solo Yahvé
  rationale: El hebreo admite más de una constricción sintáctica por su estructura nominal sin verbo. La redacción principal preserva la afirmación monoteísta con mínima expansión y sin añadir 'solo' al texto principal. Las alternativas se dejan en nota para no borrar la tensión documentada.
  doctrine_reference: Translation philosophy §3; nota de decisiones sobre יְהוָה y אֶחָד
translation_notes:
  revision_awareness: El paquete de fuente y el audit trail inglés muestran acuerdo alto y sin revisiones aplicadas; por eso esta propuesta sigue la lectura principal ya establecida, conservando en nota las alternativas reconocidas.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' de forma consistente para el nombre divino, conforme al estándar del proyecto.
  - Se evita 'SEÑOR' como sustituto tipográfico en el texto principal.
  - '''Escucha'' conserva tanto el sentido auditivo como el exhortativo del imperativo hebreo.'
  - La puntuación con dos puntos tras 'Israel' refleja el encuadre vocativo y la cadencia solemne del verso.
