- from: Añade iniquidad a su iniquidad[a], y no permitas que entren en tu justicia[b].
  to: Añade iniquidad a su iniquidad,[a] y no permitas que entren en tu rectitud.[b]
  rationale: Se cambia «tu justicia» por «tu rectitud» para reflejar en el texto principal la decisión auditada de conservar la amplitud de «righteousness» sin reducirla a un sentido judicial; «tu justicia» queda como alternativa en nota. También se limpia la nota a para eliminar una falsa alternativa idéntica al texto principal.
