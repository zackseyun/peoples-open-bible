translation:
  language: es
  text: Y aconteció que, cuando murió Gedeón, los hijos de Israel volvieron a prostituirse tras los Baales[b], e hicieron de Baal-berit[a] su dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Baal-berit probablemente significa «Baal del pacto» o «Señor del pacto».
    reason: lexical_alternative
  - marker: b
    text: O «se prostituyeron tras los Baales»; el hebreo usa una imagen sexual para la infidelidad idolátrica.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי כַּאֲשֶׁר
  english_pob_choice: And it happened that, when
  chosen_spanish: Y aconteció que, cuando
  alternatives_spanish:
  - Y cuando
  - Y sucedió que, cuando
  lexicon: HALOT
  rationale: La fórmula narrativa hebrea se conserva con una construcción española natural. «Aconteció que» mantiene el tono de transición narrativa sin sonar mecánico; añadir «que» permite reflejar la clausula temporal introducida por כַּאֲשֶׁר.
- source_word: מֵת גִּדְעוֹן
  english_pob_choice: Gideon died
  chosen_spanish: murió Gedeón
  alternatives_spanish:
  - Gedeón murió
  - Gedeón había muerto
  lexicon: HALOT
  rationale: El perfecto hebreo expresa el hecho concluido dentro de la cláusula temporal. «Murió Gedeón» es la forma más natural en español y conserva el valor factual sin sobretraducción.
- source_word: וַיָּשׁוּבוּ
  english_pob_choice: turned back
  chosen_spanish: volvieron atrás
  alternatives_spanish:
  - volvieron
  - se apartaron de nuevo
  lexicon: HALOT
  rationale: Aquí שׁוּב indica recaída o retorno a una conducta previa de apostasía, no mero movimiento físico. «Volvieron atrás» conserva la idea de retroceso moral y se ajusta bien al español bíblico moderno.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Israel
  lexicon: HALOT
  rationale: Se mantiene la referencia masculina plural del hebreo y la formulación corporativa del pueblo del pacto. «Los hijos de Israel» es claro, reverente y fuente-consciente.
- source_word: וַיִּזְנוּ אַחֲרֵי
  english_pob_choice: prostituted themselves after
  chosen_spanish: se prostituyeron tras
  alternatives_spanish:
  - hicieron prostitución tras
  - fueron infieles tras
  lexicon: HALOT
  rationale: El verbo זנה lleva un fuerte trasfondo sexualizado de infidelidad de pacto. «Se prostituyeron tras» preserva esa imagen sin suavizarla, y «tras» refleja bien אַחֲרֵי en español.
- source_word: הַבְּעָלִים
  english_pob_choice: the Baals
  chosen_spanish: los Baales
  alternatives_spanish:
  - los Baales-idolos
  - los baales
  lexicon: HALOT
  rationale: El plural hebreo se refiere a las múltiples manifestaciones o santuarios de Baal. «Los Baales» conserva la forma plural y la referencia cultual documentada por la POB en inglés.
- source_word: וַיָּשִׂימוּ לָהֶם
  english_pob_choice: they made
  chosen_spanish: pusieron para sí
  alternatives_spanish:
  - se pusieron
  - establecieron para sí
  lexicon: HALOT
  rationale: El hebreo שׂים + לָהֶם expresa designación o establecimiento para uso propio. «Pusieron para sí» reproduce ese matiz mejor que un simple «hicieron» y deja abierta la idea de adopción cultual.
- source_word: בַּעַל בְּרִית
  english_pob_choice: Baal-berith
  chosen_spanish: Baal-berit
  alternatives_spanish:
  - Baal-berith
  - Baal del pacto
  lexicon: HALOT
  rationale: Se conserva el nombre cultual como forma propia. En español, «berit» suele transliterarse como «berit»; sin embargo, se mantiene la forma más cercana al uso común de la POB en inglés mediante hyphenated proper name, mientras el significado puede explicarse en nota.
- source_word: לֵאלֹהִים
  english_pob_choice: their god
  chosen_spanish: como su dios
  alternatives_spanish:
  - por dios
  - para dios
  lexicon: HALOT
  rationale: El lamed de designación marca a Baal-berit como deidad reconocida en función divina. «Como su dios» expresa la atribución cultual de manera natural en español y preserva el sentido de designación.
theological_decisions:
- issue: Preservación de la metáfora sexual de la idolatría
  english_pob_reading: prostituted themselves after the Baals
  chosen_spanish_reading: se prostituyeron tras los Baales
  alternative_spanish_readings:
  - fueron infieles a Dios siguiendo a los Baales
  - se apartaron hacia los Baales
  rationale: El hebreo usa זנה, lenguaje deliberadamente sexualizado para describir apostasía. Mantener «se prostituyeron» conserva la fuerza teológica del texto y evita una paráfrasis que atenúe la culpa de Israel.
  doctrine_reference: Translation philosophy §§3, 6
- issue: Designación de Baal-berit como deidad
  english_pob_reading: they made Baal-berith their god
  chosen_spanish_reading: pusieron para sí a Baal-berit como su dios
  alternative_spanish_readings:
  - lo establecieron como su dios
  - lo hicieron su dios
  rationale: 'La frase hebrea indica asignación cultual: no solo nombran un objeto, sino que lo instituyen como divinidad. «Como su dios» mantiene la lectura de designación y evita perder la fuerza religiosa del verbo.'
  doctrine_reference: Translation philosophy §§2, 5
- issue: Tratamiento del nombre cultual Baal-berit
  english_pob_reading: Baal-berith likely means 'Baal of the covenant' or 'Lord of the covenant.'
  chosen_spanish_reading: Baal-berit
  alternative_spanish_readings:
  - Baal-berith
  - Baal del pacto
  rationale: Se preserva el nombre propio en el texto principal y se deja el significado para nota si se requiere. Eso evita sustituir un nombre cultual con una traducción interpretativa en la línea principal.
  doctrine_reference: Translation philosophy §§2, 7
translation_notes:
  revision_awareness: 'Se corrigió la validación anterior: los marcadores de nota ahora aparecen exactamente en el texto español y no se incluyen notas sin anclaje. También se evitó crear un marcador adicional no usado en la traducción.'
  spanish_consistency_notes:
  - Se mantuvo el registro bíblico formal pero natural en español.
  - «Los hijos de Israel» preserva la forma masculina plural del hebreo sin perder claridad.
  - «Se prostituyeron tras» refleja el valor figurado de זנה y la preposición אַחֲרֵי.
  - Se translitera el nombre cultual sin traducirlo en la línea principal, en armonía con el tratamiento POB del nombre propio.
