translation:
  language: es
  text: David estaba entonces en la fortaleza[a], y la guarnición de los filisteos estaba entonces en Belén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo repite el adverbio temporal: literalmente, «David estaba entonces en la fortaleza, y la guarnición de los filisteos estaba entonces en Belén».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ / וּ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - e
  lexicon: conjunción coordinante
  rationale: La coordinación simple preserva la relación paratáctica del hebreo sin añadir matiz temporal o concesivo.
- source_word: אָז
  english_pob_choice: now ... then
  chosen_spanish: entonces ... entonces
  alternatives_spanish:
  - ahora ... entonces
  - en aquel tiempo ... en aquel tiempo
  lexicon: HALOT
  rationale: El hebreo repite el adverbio temporal. En español, 'entonces' en ambas cláusulas conserva esa repetición sin introducir un contraste innecesario ni forzar un 'ahora' narrativo menos natural aquí.
- source_word: מְצוּדָה
  english_pob_choice: stronghold
  chosen_spanish: fortaleza
  alternatives_spanish:
  - refugio fortificado
  - baluarte
  lexicon: HALOT
  rationale: '''Fortaleza'' comunica bien el sentido de lugar defensivo y es natural en español; mantiene el valor militar/topográfico de la palabra sin sobreespecificar la construcción.'
- source_word: מַצַּב
  english_pob_choice: garrison
  chosen_spanish: guarnición
  alternatives_spanish:
  - puesto militar
  - destacamento
  - guarnición militar
  lexicon: HALOT
  rationale: En el contexto de los filisteos y Belén, 'guarnición' expresa con precisión un cuerpo militar asentado en un lugar. Es la equivalencia más clara y estable en español.
- source_word: פְּלִשְׁתִּים
  english_pob_choice: Philistines
  chosen_spanish: filisteos
  alternatives_spanish:
  - los filisteos
  lexicon: HALOT
  rationale: Nombre étnico tradicional y transparente en español bíblico; se usa en minúscula por tratarse de un gentilicio.
- source_word: בֵּית לָחֶם
  english_pob_choice: Bethlehem
  chosen_spanish: Belén
  alternatives_spanish:
  - Bethlehem
  lexicon: HALOT
  rationale: En español bíblico, 'Belén' es la forma estándar y plenamente inteligible del topónimo.
theological_decisions:
- issue: Repetición del adverbio temporal אָז
  english_pob_reading: Now David was then in the stronghold, and the garrison of the Philistines was then at Bethlehem.
  chosen_spanish_reading: David estaba entonces en la fortaleza, y la guarnición de los filisteos estaba entonces en Belén.
  alternative_spanish_readings:
  - David estaba en aquel tiempo en la fortaleza, y la guarnición de los filisteos estaba en aquel tiempo en Belén.
  - David estaba entonces en la fortaleza, y la guarnición de los filisteos estaba en Belén.
  rationale: 'No hay una cuestión doctrinal, pero sí una tensión estilística: el hebreo repite explícitamente el adverbio temporal. Se conserva en español para mantener la observación narrativa y no diluir la forma del original.'
  doctrine_reference: N/A
translation_notes:
  revision_awareness: La revisión más reciente no propuso cambios; el pasaje quedó con acuerdo alto y solo observaciones menores. Se mantuvo la duplicación de אָז mediante «entonces» para reflejar el paralelismo temporal del hebreo, y se adoptaron equivalentes españoles transparentes y naturales para los términos militares y topónimos.
  spanish_consistency_notes:
  - Se conserva el estilo sobrio y directo propio de una traducción bíblica pública.
  - Se usa 'Belén' como forma española estándar del topónimo.
  - '''Fortaleza'' y ''guarnición'' mantienen el campo semántico militar del original sin ampliarlo.'
  - La nota a pie de página se ancla en 'fortaleza' para señalar la repetición hebrea del adverbio temporal.
