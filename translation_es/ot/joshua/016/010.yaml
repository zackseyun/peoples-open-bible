base_translation:
  language: en
  yaml_path: translation/ot/joshua/016/010.yaml
  text: But they did not drive out the Canaanites who lived in Gezer[c][b][a], and the Canaanites have lived in the midst of Ephraim to this day and have become forced laborers.
  footnotes:
  - marker: a
    text: Or 'did not dispossess' or 'did not expel.' The Hebrew verb can denote causing inhabitants to lose possession or be removed from the land.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the Canaanite' uses a singular form with collective force, referring to the Canaanite population.
    reason: lexical_alternative
  - marker: c
    text: Or 'subject to forced labor.' The phrase refers to compulsory labor service, not merely payment of tribute.
    reason: lexical_alternative
