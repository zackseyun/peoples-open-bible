translation:
  language: es
  text: Pertenecerá a Aarón y a sus hijos, y la comerán en un lugar santo, porque es santísima para él, de las ofrendas de alimento[a] de Yahvé, estatuto perpetuo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de las ofrendas hechas por fuego de Yahvé». El hebreo tradicionalmente se refiere a ofrendas presentadas por fuego.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיְתָה
  english_pob_choice: It shall belong
  chosen_spanish: Pertencerá
  alternatives_spanish:
  - Será
  - Vendrá a ser
  lexicon: HALOT
  rationale: El hebreo con לְ marca asignación o pertenencia legal. En español, «pertencerá» comunica mejor esa adjudicación que un simple «será», y mantiene el sentido normativo del contexto sacerdotal.
- source_word: לְאַהֲרֹן וּלְבָנָיו
  english_pob_choice: to Aaron and to his sons
  chosen_spanish: a Aarón y a sus hijos
  alternatives_spanish:
  - para Aarón y para sus hijos
  lexicon: HALOT
  rationale: Se conserva el valor de destino/pertenencia de ל, con «a» en español natural. «Hijos» mantiene la referencia masculina específica del linaje sacerdotal.
- source_word: וַאֲכָלֻהוּ
  english_pob_choice: and they shall eat it
  chosen_spanish: y la comerán
  alternatives_spanish:
  - y la deberán comer
  - y la han de comer
  lexicon: HALOT
  rationale: La forma verbal expresa mandato legal en futuro prescriptivo. «La comerán» mantiene ese valor sin añadir obligación más fuerte que la del hebreo.
- source_word: בְּמָקוֹם קָדֹשׁ
  english_pob_choice: in a holy place
  chosen_spanish: en un lugar santo
  alternatives_spanish:
  - en el lugar santo
  - en un sitio santo
  lexicon: HALOT
  rationale: El hebreo carece de artículo; por eso «un lugar santo» reproduce mejor la apertura indefinida del original que «el lugar santo».
- source_word: קֹדֶשׁ קָדָשִׁים
  english_pob_choice: most holy
  chosen_spanish: santísima
  alternatives_spanish:
  - santísimo
  - muy santa
  lexicon: HALOT
  rationale: El hebreo usa un superlativo idiomático. En español, «santísima» es natural y conserva la intensidad sin explicar de más. Se mantiene el valor de cosa consagrada, no una simple cualidad devocional.
- source_word: הוּא לֹו
  english_pob_choice: it is most holy to him
  chosen_spanish: es santísima para él
  alternatives_spanish:
  - es santísima para él mismo
  - es santísima a él
  lexicon: HALOT
  rationale: El hebreo preserva el singular לֹו, aunque el contexto menciona a Aarón y sus hijos. «Para él» conserva esa tensión textual y permite entender a Aarón como cabeza representativa de la línea sacerdotal.
- source_word: מֵאִשֵּׁי יְהוָה
  english_pob_choice: from the food offerings of Yahweh
  chosen_spanish: de las ofrendas encendidas de Yahvé
  alternatives_spanish:
  - de las ofrendas hechas por fuego de Yahvé
  - de las ofrendas quemadas de Yahvé
  lexicon: HALOT
  rationale: Se traduce el sustantivo tradicionalmente difícil אִשֶּׁה con una forma que preserve la idea de ofrenda por fuego. «Ofrendas encendidas» evita la perífrasis pesada y mantiene el vínculo con el fuego sacrificial. Se conserva «Yahvé» según la política del proyecto.
- source_word: חָק עוֹלָם
  english_pob_choice: a permanent statute
  chosen_spanish: estatuto perpetuo
  alternatives_spanish:
  - estatuto permanente
  - ordenanza perpetua
  lexicon: HALOT
  rationale: La expresión legal hebrea designa una disposición duradera. «Estatuto perpetuo» es una formulación bíblica clara en español y conserva el peso normativo del término.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: 'Se sigue la política del proyecto para el Tetragrama: transliteración del nombre divino en lugar de la sustitución por título.'
theological_decisions:
- issue: Referente singular de לוֹ en un contexto plural de destinatarios
  english_pob_reading: Rendered singularly as 'to him,' referring to Aaron as the representative head of the priestly line.
  chosen_spanish_reading: «Para él» en singular, entendido como Aarón representando a la línea sacerdotal.
  alternative_spanish_readings:
  - «Para ellos» alineado con Aarón y sus hijos
  - «Para la casa sacerdotal» como colectivo interpretativo
  rationale: Se conserva el singular del hebreo sin suavizar la tensión sintáctica. La referencia colectiva se deja que la sugiera el contexto, no una nivelación traductora.
  doctrine_reference: Preservar la tensión gramatical y representativa del texto fuente.
translation_notes:
  revision_awareness: El inglés POB ya había dejado sin cambios su lectura óptima-equiavalente, y no se reportan revisiones aplicadas; el español sigue esa misma línea, procurando mantener las decisiones léxicas y la tensión singular de לוֹ sin resolverla artificialmente.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera uniforme para el Tetragrama.
  - Se mantiene el registro legal-sacerdotal con «estatuto perpetuo» y no se reemplaza por una paráfrasis devocional.
  - «Santísima» preserva el superlativo hebreo sin introducir lenguaje eclesiástico técnico no presente en el texto.
  - La nota de pie marca la alternativa léxica de אִשֵּׁי sin duplicar el marcador en el cuerpo principal.
