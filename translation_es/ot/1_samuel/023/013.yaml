translation:
  language: es
  text: Entonces David se levantó con sus hombres[a], unos seiscientos, y salieron de Keila y anduvieron de un lugar a otro adonde podían ir. Y se le informó a Saúl que David había escapado de Keila[b], así que dejó de salir.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y anduvieron adonde podían andar» / «y fueron adonde podían ir». El hebreo enfatiza un desplazamiento continuo de un sitio a otro.'
    reason: lexical_alternative
  - marker: b
    text: Es decir, Saúl dejó de salir en persecución de David después de enterarse de que David había escapado de Keila.
    reason: cultural_note
lexical_decisions:
- source_word: וַיָּקָם
  english_pob_choice: Then David arose
  chosen_spanish: Entonces David se levantó
  alternatives_spanish:
  - Entonces David se alzó
  - Entonces David salió
  lexicon: HALOT
  rationale: El wayyiqtol de קום suele expresar que alguien se pone en movimiento; en español, 'se levantó' conserva el inicio narrativo sin forzar más que el hebreo.
- source_word: וַאֲנָשָׁיו
  english_pob_choice: with his men
  chosen_spanish: con sus hombres
  alternatives_spanish:
  - y sus hombres
  - con su gente
  lexicon: HALOT
  rationale: El sufijo pronominal indica pertenencia y compañía; 'hombres' mantiene el matiz militar del grupo de David, como en el inglés POB.
- source_word: כְּשֵׁשׁ מֵאוֹת אִישׁ
  english_pob_choice: about six hundred men
  chosen_spanish: unos seiscientos hombres
  alternatives_spanish:
  - aproximadamente seiscientos hombres
  - como seiscientos hombres
  lexicon: HALOT
  rationale: כְּ con número expresa aproximación; 'unos' es natural en español y preserva la imprecisión cuantitativa del hebreo.
- source_word: וַיֵּצְאוּ מִקְּעִלָה
  english_pob_choice: and they went out from Keilah
  chosen_spanish: y salieron de Keila
  alternatives_spanish:
  - y salieron de Keilá
  - y partieron de Keila
  lexicon: HALOT
  rationale: יצא aquí es un simple salir/dejar un lugar. 'Salieron de Keila' es más natural que repetir 'fueron afuera' y conserva el movimiento espacial.
- source_word: וַיִּתְהַלְּכ֖וּ בַּאֲשֶׁר יִתְהַלָּ֑כוּ
  english_pob_choice: and went wherever they could go
  chosen_spanish: y fueron adonde podían ir
  alternatives_spanish:
  - y anduvieron adonde podían andar
  - y fueron de un lugar a otro adonde podían ir
  lexicon: HALOT
  rationale: El hithpael de הלך expresa desplazamiento continuo; en español, 'fueron adonde podían ir' conserva la idea de moverse sin destino fijo sin exagerar con 'vagaron' o 'anduvieron' si no se desea añadir color interpretativo.
- source_word: וּלְשָׁאוּל הֻגַּד
  english_pob_choice: And it was told to Saul
  chosen_spanish: Y se le informó a Saúl
  alternatives_spanish:
  - Y se le comunicó a Saúl
  - Y le dijeron a Saúl
  lexicon: HALOT
  rationale: El hophal de נגד permite un pasivo impersonal. 'Se le informó' reproduce bien ese registro narrativo y evita convertir sin necesidad el pasivo en un sujeto explícito.
- source_word: כִּי נִמְלַט דָּוִד מִקְּעִילָה
  english_pob_choice: that David had escaped from Keilah
  chosen_spanish: que David había escapado de Keila
  alternatives_spanish:
  - que David se había escapado de Keila
  - que David había logrado huir de Keila
  lexicon: HALOT
  rationale: נמלט significa escapar/salir huyendo. 'Había escapado' coincide con el valor del verbo y con el contexto de presión y persecución.
- source_word: וַיֶּחְדַּל לָצֵאת
  english_pob_choice: so he stopped going out
  chosen_spanish: así que dejó de salir
  alternatives_spanish:
  - así que cesó de salir
  - así que dejó de ir
  lexicon: HALOT
  rationale: חדל + infinitivo indica cesar una acción. 'Dejó de salir' mantiene el paralelismo con el hebreo y deja abierto, como en el inglés POB, el sentido de salir en campaña o para perseguir.
theological_decisions:
- issue: El sentido de וַיֶּחְדַּל לָצֵאת en relación con Saúl
  english_pob_reading: '"He stopped going out" likely means Saul stopped going out in pursuit of David after learning David had escaped Keilah.'
  chosen_spanish_reading: '"Dejó de salir" conserva la ambigüedad del hebreo, pero en contexto se entiende que Saúl dejó de salir en persecución de David tras saber que éste había escapado de Keila.'
  alternative_spanish_readings:
  - Saúl dejó de perseguirlo
  - Saúl dejó de salir en campaña
  rationale: El texto no nombra explícitamente la persecución en la frase final; por eso conviene mantener la formulación abierta en el cuerpo y aclarar el sentido probable en nota, siguiendo la cautela del POB inglés.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'Esta versión sigue la revisión más reciente del POB inglés, que prefirió un verbo más directo para el segundo movimiento: no ''moved about'', sino ''went wherever they could go''. En español se refleja con ''fueron adonde podían ir'', manteniendo la repetición verbal y la movilidad continua del hebreo. También se conserva la estructura narrativa impersonal de ''se le informó a Saúl''.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto lo exija explícitamente; este versículo no contiene el tetragrámaton.
  - Se mantiene 'Keila' como forma castellana breve y reconocible del topónimo, siguiendo la práctica de transliteración del POB.
  - '''Hombres'' se emplea en sentido militar/colectivo, no como genérico abstracto.'
  - La frase final conserva la ambigüedad narrativa del hebreo y del inglés POB, sin explicitar en el texto principal más de lo que el verso dice.
