translation:
  language: es
  text: 'Porque tú, Yahvé de los ejércitos, Dios de Israel, has revelado[a] esto a tu siervo, diciendo[b]: «Te edificaré una casa». Por eso tu siervo ha hallado en su corazón[c] dirigirte esta oración.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «has descubierto el oído de tu siervo», un hebraísmo que significa haberle revelado algo.
    reason: lexical_alternative
  - marker: b
    text: 'O: «Edificaré una casa para ti». «Casa» también conserva aquí el posible trasfondo de linaje o dinastía.'
    reason: lexical_alternative
  - marker: c
    text: Literalmente, «ha hallado su corazón»; es decir, ha encontrado resolución o disposición interior para hacerlo.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה צְבָאוֹת
  english_pob_choice: Yahweh of hosts
  chosen_spanish: Yahvé de los ejércitos
  alternatives_spanish:
  - Yahvé de las huestes
  - Yahvé de los ejércitos celestiales
  lexicon: HALOT
  rationale: Se conserva el nombre divino como «Yahvé» según la pauta del proyecto, y צְבָאוֹת se vierte con el valor tradicional de «los ejércitos», que comunica la idea de fuerzas bajo el mando divino sin introducir una paráfrasis más explicativa que el hebreo no exige.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: God of Israel
  chosen_spanish: Dios de Israel
  alternatives_spanish:
  - Dios del Israel
  - el Dios de Israel
  lexicon: HALOT
  rationale: Construcción posesiva directa y natural en español, manteniendo la identificación pactal de Yahvé como Dios de Israel.
- source_word: גָּלִיתָה אֶת אֹזֶן עַבְדְּךָ
  english_pob_choice: have revealed this to your servant
  chosen_spanish: has revelado a tu siervo
  alternatives_spanish:
  - has descubierto el oído de tu siervo
  - has abierto el oído de tu siervo
  - has revelado esto a tu siervo
  lexicon: HALOT
  rationale: La imagen hebrea literal de «desnudar/descubrir el oído» se conserva en el trasfondo del sentido, pero el texto principal usa un español natural para la revelación divina. Se mantiene la fuerza de la acción sin cargar la línea con un calco opaco.
- source_word: עַבְדְּךָ
  english_pob_choice: your servant
  chosen_spanish: tu siervo
  alternatives_spanish:
  - tu esclavo
  - tu servidor
  lexicon: HALOT
  rationale: En esta oración regia y devocional, «siervo» comunica humildad y relación de servicio sin introducir la dureza semántica de «esclavo», que aquí no parece ser el foco del contexto.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - que
  - al decir
  lexicon: HALOT
  rationale: Se conserva el valor quotativo explícito del hebreo, vinculando la revelación divina con la frase citada.
- source_word: בַּיִת אֶבְנֶה לָּךְ
  english_pob_choice: I will build you a house
  chosen_spanish: Una casa te edificaré
  alternatives_spanish:
  - Te edificaré una casa
  - Edificaré una casa para ti
  lexicon: HALOT
  rationale: Se mantiene «casa» sin resolver el doble sentido a «templo» o «dinastía», porque el hebreo deja esa tensión activa en el contexto davídico. El orden invertido suena solemne y se ajusta al énfasis de la promesa citada.
- source_word: עַל כֵּן
  english_pob_choice: Therefore
  chosen_spanish: Por eso
  alternatives_spanish:
  - Por tanto
  - Así que
  lexicon: HALOT
  rationale: Conecta de forma clara y natural la revelación recibida con la respuesta orante de David.
- source_word: מָצָא ... אֶת לִבּוֹ
  english_pob_choice: has found it in his heart
  chosen_spanish: ha hallado en su corazón
  alternatives_spanish:
  - ha encontrado ánimo en su corazón
  - ha encontrado en su corazón
  lexicon: HALOT
  rationale: Se conserva la metáfora hebrea de «hallar el corazón» sin imponer una interpretación única como «ánimo» o «valentía». En español, «ha hallado en su corazón» mantiene el eco idiomático y la deliberación interior del texto.
- source_word: לְהִתְפַּלֵּל אֵלֶיךָ
  english_pob_choice: to pray ... to you
  chosen_spanish: para orar ante ti
  alternatives_spanish:
  - para orar a ti
  - para dirigirse a ti en oración
  lexicon: HALOT
  rationale: «Orar ante ti» suena más natural y reverente en español que una repetición directa con «a ti», y conserva la dirección personal de la oración hacia Dios.
- source_word: הַתְּפִלָּה הַזֹּאת
  english_pob_choice: this prayer
  chosen_spanish: esta oración
  alternatives_spanish:
  - esta plegaria
  - esta súplica
  lexicon: HALOT
  rationale: «Oración» es el término más amplio y neutral para traducir la forma general de תְּפִלָּה en este contexto, manteniendo la referencia específica a la súplica presente de David.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Rendered as Yahweh in the English audit trail, with the project note that the divine name should be signaled rather than masked as 'LORD'.
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahweh
  rationale: Se sigue el estándar del proyecto para hacer visible el nombre del pacto en español. «Yahvé» es la forma editorial establecida para la serie y evita la máscara litúrgica «SEÑOR» sin perder reverencia.
  doctrine_reference: Project terminology defaults; Translation philosophy §§1–3
- issue: Sentido de «casa» en la promesa citada
  english_pob_reading: Kept 'house' open to both physical house/temple and dynastic house.
  chosen_spanish_reading: «Casa» sin especificación
  alternative_spanish_readings:
  - templo
  - dinastía
  - casa real
  rationale: El hebreo deliberadamente conserva la ambigüedad teológica y narrativa de la promesa davídica. El español mantiene esa tensión en vez de resolverla prematuramente.
  doctrine_reference: 2 Samuel 7 context; Translation philosophy §3
- issue: Expresión idiomática de 'found his heart'
  english_pob_reading: 'Kept the idiom in a moderated form: ''has found it in his heart''.'
  chosen_spanish_reading: «ha hallado en su corazón»
  alternative_spanish_readings:
  - ha encontrado ánimo
  - se ha decidido
  - ha cobrado valor
  rationale: La elección preserva la metáfora interna del hebreo y deja espacio para la resonancia de resolución, valor o disposición interior sin fijarla en una sola glosa.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: La redacción española sigue el estado más reciente del audit trail inglés, especialmente la preferencia por una formulación idiomática moderada para מָצָא ... אֶת לִבּוֹ ('has found it in his heart'). También conserva la ambigüedad de 'house' que el POB inglés decidió no resolver, y mantiene visible el nombre divino Yahvé conforme al criterio del proyecto.
  spanish_consistency_notes:
  - Se emplea «Yahvé» de manera consistente para יְהוָה.
  - Se prefiere «siervo» frente a «esclavo» en esta fórmula de oración real.
  - «Casa» queda sin especificación para respetar el juego de sentido del contexto davídico.
  - La colocación de los corchetes de notas sigue el orden de las decisiones léxicas principales.
