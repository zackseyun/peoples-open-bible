translation:
  language: es
  text: Ahora cíñete los lomos como hombre[a]; yo te preguntaré[b], y tú me lo harás saber.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «prepárate como un guerrero». El hebreo dice literalmente: «cíñete los lomos como hombre», un modismo para disponerse con resolución.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «y me lo darás a conocer» o «y me responderás». El hebreo es más literalmente «hacerme saber».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱזָר
  english_pob_choice: gird up
  chosen_spanish: cíñete
  alternatives_spanish:
  - ciñe
  - ajusta
  - prepárate
  lexicon: HALOT
  rationale: El verbo hebreo expresa la acción concreta de ajustarse la ropa o el cinturón para estar listo. En español, «cíñete» conserva la imagen corporal y el sentido de preparación resoluta sin volverse mecánico.
- source_word: נָא
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - vamos
  - por favor
  - de inmediato
  lexicon: HALOT
  rationale: Aquí la partícula añade urgencia al desafío divino. «Ahora» comunica inmediatez en español de manera natural; «por favor» introduciría una cortesía ajena al tono del contexto.
- source_word: כְגֶבֶר
  english_pob_choice: like a man
  chosen_spanish: como varón
  alternatives_spanish:
  - como hombre
  - como guerrero
  - como un hombre valiente
  lexicon: HALOT
  rationale: Se conserva el masculino singular del hebreo y su fuerza idiomática. «Varón» suena más digno y algo más bíblico que «hombre», sin neutralizar el rasgo gramatical ni convertirlo en una categoría militar no explicitada por el texto.
- source_word: חֲלָצֶיךָ
  english_pob_choice: your loins
  chosen_spanish: los lomos
  alternatives_spanish:
  - la cintura
  - los riñones
  - las caderas
  lexicon: HALOT
  rationale: «Lomos» es el equivalente español tradicional que mejor preserva el modismo hebreo de “ceñir los lomos”. «Cintura» sería más natural, pero atenúa la imagen idiomática concreta.
- source_word: וְאֶשְׁאָלְךָ
  english_pob_choice: I will question you
  chosen_spanish: yo te preguntaré
  alternatives_spanish:
  - yo te interrogaré
  - te haré preguntas
  lexicon: HALOT
  rationale: El verbo שׁאל aquí significa «preguntar». En español, «preguntaré» mantiene la forma simple y la relación directa entre hablante y oyente; «interrogaré» sería más jurídico de lo necesario.
- source_word: וְהוֹדִיעֵנִי
  english_pob_choice: you shall make it known to me
  chosen_spanish: me lo harás saber
  alternatives_spanish:
  - me lo darás a conocer
  - me informarás
  - me lo harás conocer
  lexicon: HALOT
  rationale: El causativo de ידע significa «hacer saber / dar a conocer». «Me lo harás saber» conserva ese valor causal sin depender del calco «darás a conocer», y evita la lectura tradicional menos literal de «responderás».
theological_decisions:
- issue: Similitud idiomática y tono del desafío divino
  english_pob_reading: The Hebrew literally says 'gird up your loins like a man,' an idiom for preparing oneself resolutely.
  chosen_spanish_reading: «Cíñete los lomos como varón» mantiene el modismo y el tono de confrontación; la frase no debe suavizarse a una simple exhortación genérica.
  alternative_spanish_readings:
  - prepárate como un guerrero
  - ármate de valor
  rationale: La línea funciona como una convocatoria a estar listo para responder ante Dios. Mantener la imagen corporal hebrea deja visible la tensión retórica y evita sustituirla por una formulación más interpretativa.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Valor del causativo final de ידע
  english_pob_reading: Traditional English often has 'and answer me,' but the Hebrew more literally means 'cause me to know.'
  chosen_spanish_reading: «me lo harás saber» refleja el causativo hebreo sin imponer la equivalencia tradicional «me responderás».
  alternative_spanish_readings:
  - me responderás
  - me darás respuesta
  rationale: El texto no emplea el verbo usual de responder, sino uno causativo de «conocer». La versión española debe conservar esa tensión semántica para que el lector perciba la precisión del hebreo.
  doctrine_reference: DOCTRINE.md §Lexical transparency and auditability
translation_notes:
  revision_awareness: 'El borrador sigue el acuerdo alto del control cruzado y conserva las dos tensiones léxicas principales del versículo: el modismo corporal de preparación y el causativo final de ידע. Se evitó suavizar el reto con una paráfrasis excesiva y se mantuvo el masculino singular del hebreo con una opción natural en español.'
  spanish_consistency_notes:
  - Se mantiene el registro bíblico sobrio y contemporáneo, con vocabulario transparente.
  - «Lomos» preserva la imagen idiomática en continuidad con la política de equivalencia óptima.
  - «Me lo harás saber» conserva el matiz causativo sin copiar la sintaxis inglesa.
  - El tratamiento de «varón» mantiene la marcación masculina del hebreo sin añadir una connotación doctrinal ajena al contexto.
