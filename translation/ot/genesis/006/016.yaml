id: GEN.6.16
reference: Genesis 6:16
source:
  edition: WLC
  text: צֹ֣הַר תַּֽעֲשֶׂ֣ה לַ/תֵּבָ֗ה וְ/אֶל אַמָּה֙ תְּכַלֶ֣/נָּה מִ/לְ/מַ֔עְלָ/ה וּ/פֶ֥תַח הַ/תֵּבָ֖ה בְּ/צִדָּ֣/הּ תָּשִׂ֑ים תַּחְתִּיִּ֛ם שְׁנִיִּ֥ם וּ/שְׁלִשִׁ֖ים תַּֽעֲשֶֽׂ/הָ׀־׃
translation:
  text: You shall make a roof for the ark[a], and finish it to within a cubit from above. And you shall set the ark’s door in its side. You shall make it with lower, second[d][c][b], and third levels.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'window' or 'skylight' for the ark; the Hebrew term is rare and may refer to an opening for light rather than a full roof.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew of 'finish it to within a cubit from above' is difficult; it likely describes the ark’s top narrowing or being completed at a cubit near the top.
    reason: cultural_note
  - marker: c
    text: Or 'stories' instead of 'decks.'
    reason: lexical_alternative
  - marker: d
    text: Or 'and finish it to within a cubit from above'.
    reason: previous_rendering
lexical_decisions:
- source_word: צֹהַר
  chosen: roof
  alternatives:
  - window
  - skylight
  lexicon: HALOT
  rationale: The noun is rare and its precise referent is debated. In this construction with 'finish it to within a cubit from above,' a structural feature at the top of the ark is in view. 'Roof' best fits the larger architectural sense in context, while 'window' and 'skylight' remain plausible and are preserved in a footnote.
- source_word: תַּעֲשֶׂה לַתֵּבָה
  chosen: you shall make for the ark
  alternatives:
  - make on the ark
  lexicon: HALOT
  rationale: Qal of עשה with ל marks what Noah is to construct for the ark. English idiom smooths this to 'make ... for the ark.'
- source_word: וְאֶל אַמָּה תְּכַלֶנָּה מִלְמַעְלָה
  chosen: and finish it to within a cubit from above
  alternatives:
  - and bring it to an end at a cubit above
  - and finish it a cubit upward from the top
  lexicon: HALOT
  rationale: כלה in the Piel means 'complete/finish.' The phrase is syntactically difficult; it most naturally indicates completing the top structure so that it comes to a cubit at the top. 'To within a cubit from above' preserves the ambiguity without over-specifying the architecture.
- source_word: פֶּתַח
  chosen: door
  alternatives:
  - opening
  - entrance
  lexicon: HALOT
  rationale: In an ark-building context, 'door' is the most natural rendering for a functional entryway.
- source_word: בְּצִדָּהּ
  chosen: in its side
  alternatives:
  - on its side
  lexicon: HALOT
  rationale: The preposition ב with צד indicates location at the side of the ark. 'In its side' fits the idea of placing a door into the side wall.
- source_word: תַּחְתִּיִּם שְׁנִיִּם וּשְׁלִשִׁים
  chosen: lower, second, and third decks
  alternatives:
  - lower, second, and third stories
  - bottom, middle, and top levels
  lexicon: HALOT
  rationale: These ordinal/plural forms describe three levels of the ark. 'Decks' suits a large vessel better than 'stories,' though both are possible.
- source_word: תַּעֲשֶׂהָ
  chosen: you shall make it
  lexicon: HALOT
  rationale: 'The feminine suffix refers back to the ark. English requires an explicit object: ''make it.'''
