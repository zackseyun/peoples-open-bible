  glossary_alignment: No hay conflicto con la terminología base del proyecto. No aparecen Yahvé, Mesías/Cristo, Espíritu, etc. 'Ídolos' para גִּלּוּלֵי mantiene la decisión documentada, con nota explicativa adecuada. La distinción 'furor' / 'ira' preserva la rationale teológica auditada. 'Ningún hombre' sigue la decisión inglesa sobre אִישׁ, aunque en español suena algo más marcado; sigue siendo aceptable dentro de la filosofía indicada.
