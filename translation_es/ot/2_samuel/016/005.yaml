revisions:
- from: Cuando el rey David llegó a Bahurim[a], he aquí que salió de allí un hombre de la familia de la casa de Saúl, cuyo nombre era Simeí hijo de Gera; salía continuamente, maldiciendo mientras salía.
  to: Cuando el rey David llegó a Bahurim[a], he aquí que salió de allí un hombre del clan de la casa de Saúl, cuyo nombre era Simeí hijo de Gera; seguía saliendo, mientras maldecía.
  rationale: Se ajusta «familia» a «clan» para reflejar mejor מִשְׁפָּחָה según la documentación del POB. También se reemplaza la construcción redundante «maldiciendo mientras salía» por «seguía saliendo, mientras maldecía», que conserva la iteración de יֹצֵא יָצוֹא y la acción concomitante de וּמְקַלֵּל en un español más natural. La nota se simplifica levemente para mayor limpieza estilística sin perder la explicación lexical.
