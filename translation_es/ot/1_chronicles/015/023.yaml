lexical_decisions:
- source_word: בֶּרֶכְיָה
  english_pob_choice: Berechiah
  chosen_spanish: Berekías
  alternatives_spanish:
  - Berequías
  - Berecías
  lexicon: transliteración estándar de nombre propio
  rationale: Se conserva el nombre propio mediante transliteración al español. 'Berekías' reproduce mejor la forma hebrea y mantiene la audibilidad del nombre sin introducir traducción interpretativa.
- source_word: אֶלְקָנָה
  english_pob_choice: Elkanah
  chosen_spanish: Elcaná
  alternatives_spanish:
  - Elcana
  - Elcánah
  lexicon: transliteración estándar de nombre propio
  rationale: Se translitera el nombre propio con acentuación española natural. 'Elcaná' mantiene la forma reconocible y fluida en español.
- source_word: שֹׁעֲרִים
  english_pob_choice: gatekeepers
  chosen_spanish: guardianes
  alternatives_spanish:
  - porteros
  - guardas
  - guardianes de la puerta
  lexicon: HALOT
  rationale: El término designa funcionarios que custodian el acceso. 'Guardianes' comunica la función con naturalidad en español; 'porteros' puede sonar más doméstico o eclesiástico, y 'guardas' es más amplio. Se evita estrechar indebidamente la referencia solo a una puerta física.
- source_word: לָאָרוֹן
  english_pob_choice: for the ark
  chosen_spanish: del arca
  alternatives_spanish:
  - para el arca
  - junto al arca
  - del arca de Yahvé
  lexicon: HALOT
  rationale: El hebreo ל puede expresar relación o asignación. En español, 'del arca' funciona como complemento relacional natural y no añade una lectura más locativa de la necesaria. Se conserva la relación funcional sin forzar una preposición más interpretativa.
translation_notes:
  revision_awareness: La revisión anterior falló porque el marcador de nota [a] no estaba anclado en el texto. Esta versión coloca [a] inmediatamente después de 'guardianes' para que la nota textual sea válida y rastreable. No hay otros cambios de contenido.
  spanish_consistency_notes:
  - Se mantiene un registro sobrio y bíblico, apto para lectura pública.
  - Se evita 'SEÑOR' porque no aparece en el hebreo de este versículo.
  - '''Berekías'' y ''Elcaná'' siguen el patrón de transliteración españolizadora sin traducir los nombres propios.'
  - '''guardianes'' preserva la función de שֹׁעֲרִים sin sobreespecificar el ámbito más allá de lo que el contexto exige.'
