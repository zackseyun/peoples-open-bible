translation:
  language: es
  text: 'Así dice el Señor Dios, Yahvé: Por cuanto los filisteos actuaron con venganza y se vengaron con desprecio en el alma[a], para destruir con enemistad perpetua[b],'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘con escarnio en el alma’, ‘con desprecio desde el corazón’. La expresión hebrea combina desprecio con una disposición interior y total de la persona.
    reason: lexical_alternative
  - marker: b
    text: O ‘con enemistad antigua’ o ‘con hostilidad perpetua’. עוֹלָם puede denotar antigüedad prolongada o perpetuidad duradera según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: el Señor Yahvé
  alternatives_spanish:
  - el Señor Dios
  - el Señor Yahvéh
  lexicon: HALOT
  rationale: La combinación de אֲדֹנָי con el nombre divino יְהוָה exige distinguir el título de soberanía del nombre propio. En el español de este proyecto se prefiere Yahvé para יְהוָה; ‘Señor’ conserva אֲדֹנָי sin ocultar el nombre del pacto.
- source_word: יַעַן
  english_pob_choice: Because
  chosen_spanish: Por cuanto
  alternatives_spanish:
  - Porque
  - Ya que
  lexicon: HALOT
  rationale: Introduce con claridad la causa del juicio. ‘Por cuanto’ mantiene un registro digno y causal sin forzar una paráfrasis.
- source_word: עֲשׂוֹת
  english_pob_choice: acted
  chosen_spanish: actuaron
  alternatives_spanish:
  - hicieron
  - procedieron
  lexicon: HALOT
  rationale: Con בִּנְקָמָה forma un giro idiomático de conducta vengativa; ‘actuaron’ expresa la acción completa de manera natural en español.
- source_word: פְּלִשְׁתִּים
  english_pob_choice: the Philistines
  chosen_spanish: los filisteos
  alternatives_spanish:
  - los filisteos
  - Filistea
  lexicon: HALOT
  rationale: Nombre étnico estándar en español bíblico. Se mantiene el plural humano, no una gentilización abstracta.
- source_word: בִּנְקָמָה
  english_pob_choice: in vengeance
  chosen_spanish: con venganza
  alternatives_spanish:
  - en venganza
  - vengativamente
  lexicon: HALOT
  rationale: La preposición hebrea con el sustantivo expresa modo/instrumentalidad. ‘Con venganza’ conserva el sustantivo explícito y evita adverbializarlo en exceso.
- source_word: וַיִּנָּקְמוּ נָקָם
  english_pob_choice: took revenge
  chosen_spanish: se vengaron
  alternatives_spanish:
  - tomaron venganza
  - ejecutaron venganza
  lexicon: HALOT
  rationale: El binomio verbal-sustantivo intensifica la retaliación. ‘Se vengaron’ es idiomático y conserva el sentido recíproco/reflexivo del hebreo.
- source_word: בִּשְׁאָט
  english_pob_choice: with contempt in the soul
  chosen_spanish: con desprecio
  alternatives_spanish:
  - con escarnio
  - con desdén
  lexicon: HALOT
  rationale: שְׁאָט denota desprecio hostil o altivez despectiva. En español ‘desprecio’ comunica el valor central sin sobrecargar el verso; el matiz interior se conserva con ‘en el alma’.
- source_word: בְּנֶפֶשׁ
  english_pob_choice: of soul
  chosen_spanish: en el alma
  alternatives_spanish:
  - de alma
  - de corazón
  - interiormente
  lexicon: HALOT
  rationale: נֶפֶשׁ puede designar la vida interior, la persona o el ser entero. ‘En el alma’ mantiene la referencia antropológica e interior sin borrar la literalidad del término.
- source_word: לְמַשְׁחִית
  english_pob_choice: to destroy
  chosen_spanish: para destruir
  alternatives_spanish:
  - a destruir
  - con el fin de destruir
  lexicon: HALOT
  rationale: Expresa finalidad y conserva el valor verbal de la raíz sin convertirla en un sustantivo abstracto.
- source_word: אֵיבַת עוֹלָם
  english_pob_choice: with everlasting enmity
  chosen_spanish: con enemistad perpetua
  alternatives_spanish:
  - con enemistad antigua
  - con hostilidad perpetua
  - con odio perpetuo
  lexicon: HALOT
  rationale: אֵיבָה es enemistad/hostilidad; עוֹלָם puede significar duración continua o antigua persistencia. ‘Enemistad perpetua’ mantiene la fuerza de continuidad y evita cargar el verso con un término más emotivo que el hebreo.
theological_decisions:
- issue: Renderización del nombre divino en אֲדֹנָי יְהוִה
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Dios
  - Señor Yahvé
  rationale: El hebreo contiene el Tetragrámaton, no un simple sustantivo genérico. La política del proyecto pide Yahvé para יְהוָה; el título אֲדֹנָי se conserva como ‘Señor’ para reflejar soberanía y reverencia.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Alcance de עוֹלָם en אֵיבַת עוֹלָם
  english_pob_reading: everlasting enmity
  chosen_spanish_reading: enemistad perpetua
  alternative_spanish_readings:
  - enemistad antigua
  - hostilidad perpetua
  - enemistad eterna
  rationale: עוֹלָם puede denotar antigüedad duradera o perpetuidad. ‘Perpetua’ preserva la ambigüedad útil del hebreo sin forzar ‘eterna’, que en español puede sonar más teológica que contextual.
  doctrine_reference: 'DOCTRINE.md: Semantic range of עוֹלָם'
- issue: Valor antropológico de בְּנֶפֶשׁ
  english_pob_reading: in the soul
  chosen_spanish_reading: en el alma
  alternative_spanish_readings:
  - de corazón
  - interiormente
  - en su ser
  rationale: El texto combina desprecio externo con disposición interior. ‘Alma’ comunica la interioridad de manera comprensible en español bíblico y conserva la tensión entre actitud y persona completa.
  doctrine_reference: 'DOCTRINE.md: Anthropological terms — נֶפֶשׁ'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés POB, que ajustó la frase de בִּשְׁאָט בְּנֶפֶשׁ de ‘with utter contempt of soul’ a ‘with contempt in the soul’ para alinearla más de cerca con el hebreo. La presente redacción española refleja ese ajuste con ‘con desprecio en el alma’, manteniendo el registro formal y la estructura causal del verso.
  spanish_consistency_notes:
  - Se mantiene Yahvé para יְהוָה conforme a la terminología del proyecto.
  - Se usa ‘filisteos’ como etnónimo bíblico estándar en español.
  - Se conserva la duplicación semántica de venganza/revenge con ‘con venganza’ y ‘se vengaron’.
  - ‘Alma’ se usa para נֶפֶשׁ como término antropológico, no como equivalente doctrinal cerrado a ‘espíritu’.
  - 'La puntuación sigue el flujo oracular: fórmula introductoria, causa, y propósito final.'
