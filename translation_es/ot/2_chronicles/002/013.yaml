translation:
  language: es
  text: el hijo de una mujer de entre las hijas de Dan[a], y su padre era un hombre de Tiro, hábil para trabajar en oro y plata, bronce y hierro, piedra y madera, púrpura, azul, lino fino y carmesí[b], y para grabar toda clase de grabado y para idear toda clase de diseño que se le asigne, junto con tus hombres hábiles y los hombres hábiles de mi señor David, tu padre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión literal "las hijas de Dan" probablemente señala que su madre era de la tribu de Dan.
    reason: cultural_note
  - marker: b
    text: O "escarlata" para "carmesí".
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן אִשָּׁה
  english_pob_choice: the son of a woman
  chosen_spanish: el hijo de una mujer
  alternatives_spanish:
  - hijo de una mujer
  - el hijo de una mujer
  lexicon: HALOT
  rationale: Conserva la construcción genealógica de forma directa y natural en español, sin convertirla en una paráfrasis interpretativa.
- source_word: מִן בְּנוֹת דָּן
  english_pob_choice: from the daughters of Dan
  chosen_spanish: de entre las hijas de Dan
  alternatives_spanish:
  - de las hijas de Dan
  - de la tribu de Dan
  lexicon: HALOT
  rationale: Mantiene la referencia literal a 'las hijas de Dan' y hace legible en español la idea de procedencia materna, sin borrar la ambigüedad documentada.
- source_word: וְאָבִיו אִישׁ צֹרִי
  english_pob_choice: and his father was a man of Tyre
  chosen_spanish: y su padre era un hombre de Tiro
  alternatives_spanish:
  - y su padre era un tirio
  - y su padre era un hombre de Tiro
  lexicon: HALOT
  rationale: '''Hombre de Tiro'' comunica bien la identidad geográfica y evita una forma menos natural para el lector moderno.'
- source_word: יוֹדֵעַ לַעֲשׂוֹת
  english_pob_choice: skilled to work
  chosen_spanish: hábil para trabajar
  alternatives_spanish:
  - sabiendo hacer
  - hábil para hacer
  lexicon: HALOT
  rationale: En contexto artesanal, el participio expresa competencia práctica; 'hábil para trabajar' preserva esa fuerza sin sonar mecánico.
- source_word: בַּזָּהָב וּבַכֶּסֶף בַּנְּחֹשֶׁת בַּבַּרְזֶל
  english_pob_choice: in gold and silver, bronze and iron
  chosen_spanish: en oro y plata, bronce y hierro
  alternatives_spanish:
  - con oro y plata, bronce y hierro
  - en oro y plata, bronce e hierro
  lexicon: HALOT
  rationale: La preposición 'en' sigue el valor material de la lista y resulta idiomática en español para el trabajo artesanal.
- source_word: בָּאֲבָנִים וּבָעֵצִים
  english_pob_choice: stone and wood
  chosen_spanish: piedras y madera
  alternatives_spanish:
  - piedra y madera
  - piedras y madera
  lexicon: HALOT
  rationale: '''Piedras y madera'' conserva el inventario de materiales con naturalidad en español, reflejando el uso de plural y masa según el contexto.'
- source_word: בָּאַרְגָּמָן
  english_pob_choice: purple
  chosen_spanish: púrpura
  alternatives_spanish:
  - púrpura
  - morado
  lexicon: HALOT
  rationale: '''Púrpura'' es la designación tradicional y precisa para este material tintóreo.'
- source_word: בַּתְּכֵלֶת
  english_pob_choice: blue
  chosen_spanish: azul
  alternatives_spanish:
  - azul
  - violeta
  lexicon: HALOT
  rationale: '''Azul'' ofrece un equivalente claro para el tinte תְּכֵלֶת, aunque el tono exacto antiguo pueda solaparse con otros azules/violetas.'
- source_word: וּבַבּוּץ
  english_pob_choice: fine linen
  chosen_spanish: lino fino
  alternatives_spanish:
  - lino fino
  - lino
  lexicon: HALOT
  rationale: '''Lino fino'' comunica tanto el material como su calidad, siguiendo el valor del término hebreo.'
- source_word: וּבַכַּרְמִיל
  english_pob_choice: crimson
  chosen_spanish: carmesí
  alternatives_spanish:
  - carmesí
  - escarlata
  lexicon: HALOT
  rationale: '''Carmesí'' traduce bien el tinte rojo intenso; ''escarlata'' queda como alternativa válida dada la cercanía semántica.'
- source_word: וּלְפַתֵּחַ כָּל פִּתּוּחַ
  english_pob_choice: to engrave every kind of engraving
  chosen_spanish: para grabar toda clase de grabado
  alternatives_spanish:
  - para tallar toda clase de talla
  - para grabar todo grabado
  lexicon: HALOT
  rationale: Reproduce el juego verbal verbo-sustantivo del hebreo y mantiene el ámbito de la artesanía de precisión.
- source_word: וְלַחְשֹׁב כָּל מַחֲשָׁבֶת
  english_pob_choice: to devise every kind of design
  chosen_spanish: para idear toda clase de diseño
  alternatives_spanish:
  - para planear toda clase de diseño
  - para idear todo tipo de diseño
  lexicon: HALOT
  rationale: '''Idear'' transmite la capacidad creativa de concebir diseños en contexto artesanal mejor que un literal ''pensar''.'
- source_word: אֲשֶׁר יִנָּתֶן לוֹ
  english_pob_choice: that may be assigned to him
  chosen_spanish: que se le asignara
  alternatives_spanish:
  - que le sea asignado
  - que se le pudiera asignar
  lexicon: HALOT
  rationale: '''Se le asignara'' conserva el sentido pasivo de tareas encomendadas sin recargar la frase con perífrasis innecesarias.'
- source_word: עִם חֲכָמֶיךָ
  english_pob_choice: with your skilled men
  chosen_spanish: junto con tus hombres hábiles
  alternatives_spanish:
  - con tus hombres hábiles
  - junto con tus artesanos hábiles
  lexicon: HALOT
  rationale: '''Hombres hábiles'' mantiene el valor del plural masculino y el campo semántico de pericia artesanal sin sustituirlo por un término más específico de lo que exige el hebreo.'
- source_word: וְחַכְמֵי אֲדֹנִי דָּוִיד אָבִיךָ
  english_pob_choice: and the skilled men of my lord David your father
  chosen_spanish: y los hombres hábiles de mi señor David, tu padre
  alternatives_spanish:
  - y los artesanos hábiles de mi señor David, tu padre
  - y los hombres hábiles de mi señor David, tu padre
  lexicon: HALOT
  rationale: '''Mi señor'' conserva el honorífico humano de אֲדֹנִי; el añadido ''hábiles'' refleja el sentido de pericia de חֲכָמֵי en contexto de oficio.'
theological_decisions:
- issue: Referencia tribal de "las hijas de Dan"
  english_pob_reading: likely indicates that his mother was from the tribe of Dan
  chosen_spanish_reading: de entre las hijas de Dan, con sentido probable de ascendencia materna danita
  alternative_spanish_readings:
  - de las hijas de Dan
  - de la tribu de Dan
  rationale: La frase hebrea es literal y la inferencia genealógica debe mantenerse como probable, no como afirmación cerrada.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: preserve lexical transparency and documented ambiguity'
- issue: Honorífico humano en אֲדֹנִי
  english_pob_reading: my lord David your father
  chosen_spanish_reading: mi señor David, tu padre
  alternative_spanish_readings:
  - mi señor David tu padre
  - mi amo David, tu padre
  rationale: '''Mi señor'' es el equivalente cortesano natural y evita confusión con el uso divino de títulos de señorío.'
  doctrine_reference: DOCTRINE.md Contested terms table on human honorifics
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando ambas notas al texto español con marcadores presentes exactamente en 'Dan[a]' y 'asignara[b]'. No se añadieron notas sin anclaje.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como norma general del proyecto solo cuando el texto lo requiera; este versículo no contiene el tetragrámaton.
  - Se preservó la distinción entre pericia artesanal y simple conocimiento con 'hábil para trabajar'.
  - '''Mi señor'' se usa como honorífico humano, no como título divino.'
  - El listado de materiales se tradujo con vocabulario natural en español, manteniendo la secuencia del hebreo.
