review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del hebreo: הַמַּשְׂכִּלִים como grupo caracterizado por discernimiento, יַזְהִרוּ como brillo futuro, הָרָקִיעַ como ámbito celestial extendido, y מַצְדִּיקֵי הָרַבִּים con fuerza causativa preservada. Sin embargo, hay dos desajustes con el expediente auditado: (1) la nota [a] altera indebidamente el sentido al ofrecer «serán sabios», que cambia el sujeto participial por un predicado futuro; (2) la nota [d] no preserva adecuadamente la alternativa inglesa «turn the many to righteousness», y además su nota principal repite la lectura base en vez de ofrecer una alternativa real.'
  spanish_quality_summary: El español es mayormente claro, digno y publicable. «Resplandecerán», «fulgor» y «firmamento» funcionan bien en registro bíblico legible. «Para siempre y eternamente» es comprensible, aunque algo redundante; no exige corrección. La frase «los que hacen justos a los muchos» suena un poco rígida, pero es fiel al hebreo y a la revisión inglesa, por lo que puede mantenerse. Las principales mejoras necesarias están en las notas, no en el cuerpo del texto.
  glossary_alignment: No hay conflicto con los términos globales del proyecto. «Firmamento» es una excepción contextual razonable frente al inglés «expanse», siempre que se explique. «Justos/justicia» para צדק está bien. No aparecen términos sensibles como Yahvé, Mesías, esclavo, etc.
  issues:
  - severity: medium
    issue: La nota [a] ofrece «serán sabios».
    rationale: Eso no es una alternativa léxica válida para הַמַּשְׂכִּלִים en este contexto, porque convierte un participio sustantivado («los que tienen entendimiento / los sabios») en una predicación verbal futura distinta del texto fuente.
  - severity: medium
    issue: La nota [d] no reproduce bien las alternativas documentadas para מַצְדִּיקֵי הָרַבִּים.
    rationale: El expediente inglés conserva explícitamente «those who turn the many to righteousness» y «those who justify the many». La nota española debería reflejar alternativas reales como «los que vuelven a los muchos a la justicia» o «los que conducen a los muchos a la justicia», no repetir «hacen justos» como supuesta alternativa.
  - severity: low
    issue: La secuencia de notas [b] y [c] está invertida respecto del audit trail inglés.
    rationale: No es un error material, porque el español usa marcadores únicos y anclados correctamente, pero conviene que la nota sobre «firmamento» siga anclada a esa palabra y no genere confusión.
  revised_spanish_text: Y los que tienen entendimiento[a] resplandecerán como el fulgor[b] del firmamento[c], y los que hacen justos a los muchos[d], como las estrellas, para siempre y eternamente.
  revised_footnotes:
  - marker: a
    text: O «los sabios» o «los que tienen discernimiento».
    reason: lexical_alternative
  - marker: b
    text: O «resplandor» o «brillantez».
    reason: lexical_alternative
  - marker: c
    text: «Firmamento» traduce el ámbito celestial extendido; el inglés auditado usa «expanse», y la tradición bíblica española suele decir «firmamento».
    reason: cultural_note
  - marker: d
    text: O «los que vuelven a los muchos a la justicia»; el hebreo puede entenderse también más literalmente como «los que hacen justos a los muchos» o «los que justifican a los muchos».
    reason: alternative_reading
  revision_rationale: Se mantiene el texto principal porque es básicamente fiel y natural en español, pero se corrigen las notas para alinearlas con el hebreo y con el expediente POB auditado. En particular, se elimina la alternativa inválida «serán sabios» y se rehace la nota sobre מַצְדִּיקֵי הָרַבִּים para conservar mejor la gama semántica documentada.
