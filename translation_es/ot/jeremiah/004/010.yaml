  text: וָ/אֹמַ֞ר אֲהָ֣הּ אֲדֹנָ֣/י יְהוִ֗ה אָכֵן֩ הַשֵּׁ֨א הִשֵּׁ֜אתָ לָ/עָ֤ם הַ/זֶּה֙ וְ/לִ/ירוּשָׁלִַ֣ם לֵ/אמֹ֔ר שָׁל֖וֹם יִהְיֶ֣ה לָ/כֶ֑ם וְ/נָגְעָ֥ה חֶ֖רֶב עַד הַ/נָּֽפֶשׁ׀־׃
base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/004/010.yaml
  text: Then I said[a], “Ah, Lord Yahweh, surely you have utterly deceived this people and Jerusalem, saying[b], ‘You will have peace,’ while the sword has reached to the soul.”
  footnotes:
  - marker: a
    text: Or 'have utterly deceived' or 'have badly misled.' The Hebrew uses an infinitive absolute with the finite verb for emphasis.
    reason: lexical_alternative
  - marker: b
    text: Or 'to the life' or 'to the throat.' Hebrew nephesh here likely refers to life itself, expressing that the sword has reached to the point of death.
    reason: lexical_alternative
