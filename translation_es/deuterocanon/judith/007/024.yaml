review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el griego y el rastro POB en casi todo: «Que Dios juzgue» refleja correctamente el optativo volitivo; «entre ustedes y nosotros» preserva la fórmula de arbitraje; «una gran injusticia» mantiene la fuerza jurídico-moral de ἀδικίαν μεγάλην; y «con los hijos de Assur» respeta la literalidad del griego. Sin embargo, la nota al pie no preserva la alternativa significativa documentada en el inglés («con los asirios» / «with the Assyrians») y en cambio repite el mismo texto principal, por lo que necesita corrección.'
  spanish_quality_summary: El español es claro, natural y digno. La única reparación necesaria es la nota al pie, que actualmente es defectuosa porque ofrece como alternativa exactamente la misma frase del texto principal. El cuerpo del versículo no requiere cambio.
  glossary_alignment: 'Alineado con los términos del proyecto: «Dios» para θεός; no hay nombres divinos especiales en juego; «Assur» conserva la opción transliterada auditada; no hay conflictos con otras pautas terminológicas.'
  issues:
  - severity: medium
    issue: La nota al pie repite el texto principal en vez de ofrecer la alternativa léxica relevante.
    rationale: 'El inglés POB documenta la alternativa interpretativa «with the Assyrians» frente al literal «with the sons of Asshur». En español, la nota debe reflejar esa opción («con los asirios») o al menos explicar que «hijos de Assur» equivale a los asirios. Tal como está, «O: con los hijos de Assur» no aporta información y falla la función auditiva de la nota.'
  revised_spanish_text: Que Dios juzgue entre ustedes y nosotros[a], porque han hecho contra nosotros una gran injusticia al no hablar pacíficamente con los hijos de Assur.
  revised_footnotes:
  - marker: a
    text: 'O: «con los asirios». El griego dice literalmente «con los hijos de Assur».'
    reason: lexical_alternative
  revision_rationale: Se conserva intacto el texto principal porque es fiel y natural. Solo se corrige la nota al pie para reflejar la alternativa léxica real preservada por el POB inglés y evitar una nota redundante.
