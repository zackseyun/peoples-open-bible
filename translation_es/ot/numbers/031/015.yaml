translation:
  language: es
  text: 'Moisés les dijo[a]: «¿Han dejado con vida a toda persona de sexo femenino?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «¿Han mantenido con vida a toda persona de sexo femenino?»
