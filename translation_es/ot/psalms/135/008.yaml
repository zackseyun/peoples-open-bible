translation:
  language: es
  text: que hirió[a] a los primogénitos de Egipto, desde el hombre hasta la bestia[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'que golpeó a los primogénitos de Egipto'. 'Hirió' hace más explícito en español el sentido mortal que el contexto exige.
    reason: lexical_alternative
  - marker: b
    text: Expresión hebrea fija que significa desde los seres humanos hasta los animales.
    reason: cultural_note
lexical_decisions:
- source_word: שֶֽׁ/הִכָּה
  english_pob_choice: who struck down
  chosen_spanish: que hirió
  alternatives_spanish:
  - que golpeó
  - que derribó
  lexicon: HALOT
  rationale: El hebreo con el relativo introduce la acción continua de Yahvé. En español, 'herir' puede expresar la acción violenta y su resultado letal sin recargar con una paráfrasis más interpretativa; el contexto de la muerte de los primogénitos aporta la implicación de fatalidad.
- source_word: בְּכוֹרֵי
  english_pob_choice: the firstborn
  chosen_spanish: los primogénitos
  alternatives_spanish:
  - los primeros nacidos
  - los primogénitos varones
  lexicon: HALOT
  rationale: '''Primogénitos'' es el equivalente bíblico natural en español para el colectivo constructo de בכור. Mantiene la forma tradicional y el valor colectivo del sustantivo sin añadir ''varones'', que el hebreo no explicita aquí.'
- source_word: מִצְרָיִם
  english_pob_choice: of Egypt
  chosen_spanish: de Egipto
  alternatives_spanish:
  - de los egipcios
  lexicon: HALOT
  rationale: El genitivo del topónimo se rinde de forma directa con 'de Egipto', que es la forma más natural y fiel al hebreo y al uso bíblico en español.
- source_word: מֵ/אָדָם ... עַד ... בְּהֵמָה
  english_pob_choice: from man to beast
  chosen_spanish: desde el hombre hasta la bestia
  alternatives_spanish:
  - desde las personas hasta los animales
  - desde el ser humano hasta el animal
  lexicon: HALOT
  rationale: Se conserva la expresión fija de totalidad 'de... a...' con 'hombre'/'bestia', porque el hebreo contrasta a las personas con los animales mediante una fórmula estable. 'Bestia' mantiene el tono bíblico y la amplitud del término בְּהֵמָה.
theological_decisions:
- issue: Alcance de la plaga sobre Egipto
  english_pob_reading: from man to beast as a stock expression meaning from humans to animals
  chosen_spanish_reading: 'desde el hombre hasta la bestia como expresión de totalidad: desde los seres humanos hasta los animales'
  alternative_spanish_readings:
  - desde las personas hasta los animales
  - de los humanos a los animales
  rationale: La frase no debe leerse como una secuencia cronológica, sino como un merismo que abarca todo el ámbito afectado. La traducción conserva la fórmula bíblica y la nota aclara su valor totalizante.
  doctrine_reference: Éxodo 11:5; 12:12; Salmo 78:51
translation_notes:
  revision_awareness: El contexto fuente y el audit trail inglés coinciden sustancialmente; no se requieren revisiones textuales mayores. La principal decisión en español es mantener la fuerza verbal sin añadir explicaciones al cuerpo del versículo, dejando la precisión semántica en nota.
  spanish_consistency_notes:
  - Se mantiene 'Egipto' sin artículo, como topónimo bíblico normal en español.
  - '''Primogénitos'' conserva el colectivo del hebreo y evita una expansión innecesaria.'
  - Se usa 'bestia' para reflejar el registro bíblico y la fórmula 'del hombre a la bestia' sin domesticarla a 'animal' en el texto principal.
  - La puntuación sigue el patrón poético breve del salmo.
