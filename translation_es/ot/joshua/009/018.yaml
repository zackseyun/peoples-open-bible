review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien el sentido global del hebreo: Israel no atacó/hirió a los gabaonitas porque los líderes de la congregación les habían jurado por Yahvé, y luego toda la congregación murmuró contra esos líderes. También mantiene correctamente ''Yahvé'' para יהוה y ''congregación'' para עֵדָה. Sin embargo, hay dos problemas de fidelidad idiomática que afectan la precisión en español: ''habían jurado a ellos'' no es natural ni correcto; debe ser ''les habían jurado'' o mejor ''les habían hecho juramento''. Además, la nota de ''murmuró'' omite la alternativa inglesa ''all the assembly'', y la nota de ''a ellos'' debe ajustarse a opciones españolas idiomáticas.'
  spanish_quality_summary: 'La redacción es generalmente clara y digna, pero presenta calcos innecesarios del inglés/hebreo: ''habían jurado a ellos'' y en la nota ''atacaron a ellos'' / ''habían hecho juramento a ellos'' suenan poco naturales. ''No los hirieron'' es comprensible, aunque ''no los atacaron'' o ''no los golpearon'' serían más directos; no obstante, puede mantenerse si la nota aclara el rango semántico. El resto fluye bien y es eclesialmente legible.'
  glossary_alignment: 'Alineación buena con la terminología del proyecto: יהוה -> ''Yahvé'' correctamente; אֱלֹהֵי יִשְׂרָאֵל -> ''el Dios de Israel'' correctamente; עֵדָה -> ''congregación'' de forma consistente; נְשִׂיאִים -> ''líderes'' aceptable. No hay conflicto doctrinal. La única desviación relevante es idiomática en נִשְׁבְּעוּ לָהֶם, que en español debe expresarse con pronombre dativo (''les'').'
  issues:
  - severity: medium
    issue: 'Expresión no idiomática: ''habían jurado a ellos'''
    rationale: Aunque intenta reflejar לָהֶם, en español esa construcción es antinatural. Para preservar significado y buena legibilidad debe decir 'les habían jurado' o 'les habían hecho juramento'.
  - severity: medium
    issue: Notas al pie con español no natural
    rationale: 'Las alternativas ''atacaron a ellos'' y ''habían hecho juramento a ellos'' son calcos poco naturales. Las notas deben ofrecer alternativas españolas reales: ''los atacaron'', ''les habían jurado'', ''les habían hecho juramento''.'
  - severity: low
    issue: La nota [c] no refleja plenamente la alternativa inglesa de 'all the assembly'
    rationale: La nota actual solo ofrece 'toda la asamblea murmuró contra los líderes'. Está bien, pero conviene mantenerla como alternativa clara de עֵדָה sin problema adicional.
  revised_spanish_text: Pero los hijos de Israel no los hirieron[a], porque los líderes de la congregación les habían jurado[b] por Yahvé, el Dios de Israel. Y toda la congregación murmuró[c] contra los líderes.
  revised_footnotes:
