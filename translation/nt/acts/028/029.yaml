id: ACT.28.29
reference: Acts 28:29
source:
  edition: robinson-pierpont-2005-byzantine
  text: Καὶ ταῦτα αὐτοῦ εἰπόντος, ἀπῆλθον οἱ Ἰουδαῖοι, πολλὴν ἔχοντες ἐν ἑαυτοῖς συζήτησιν.
  language: Greek
translation:
  text: And when he had [a]said these things, the Jews departed, having a great dispute
    among themselves.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: This entire verse is absent from the earliest Greek manuscripts (including
      3rd-century Papyrus 74, 4th-century Sinaiticus, and 4th-century Vaticanus) and
      early Coptic translations. It is present in the Byzantine majority tradition,
      as well as early Latin and Syriac translations. It is likely a later scribal
      expansion added to round out the narrative of the Jewish leaders' departure.
    reason: textual_critical
lexical_decisions:
- source_word: συζήτησις
  chosen: dispute
  alternatives:
  - discussion
  - debate
  - argument
  lexicon: BDAG
  rationale: BDAG defines this as 'discussion, debate, argument.' Given the context
    of their disagreement over Paul's message, 'dispute' captures the intensity of
    their divided response.
- source_word: ἀπέρχομαι
  chosen: departed
  alternatives:
  - went away
  - left
  lexicon: BDAG
  rationale: A standard verb of motion; 'departed' fits the formal register of the
    narrative conclusion to the scene.
