translation:
  language: es
  text: Si he hallado gracia delante de ti, que tus misericordias reciban pronto mi espíritu ante ti, para que yo vaya a mis padres y no vea la destrucción de mi madre.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: ܐܢ ܐܫܟܚܬ ܛܝܒܘܬܐ ܩܕܡܝܟ
  english_pob_choice: If I have found grace in your sight
  chosen_spanish: Si he hallado gracia delante de ti
  alternatives_spanish:
  - Si he encontrado favor ante ti
  - Si he hallado favor delante de ti
  lexicon: grace/favor
  rationale: 'El siríaco expresa una fórmula condicional de aceptación: ''gracia'' es fiel al valor bíblico usual y mantiene la resonancia teológica; ''delante de ti'' reproduce el matiz relacional de ''before you / in your sight'' sin volverlo mecánico.'
- source_word: ܡܪܚܡܢܘܬܟ
  english_pob_choice: your mercies
  chosen_spanish: tus misericordias
  alternatives_spanish:
  - tu misericordia
  - tus compasiones
  lexicon: mercies/compassions
  rationale: El plural del original se conserva con 'misericordias', que en español bíblico suena natural y mantiene la intensidad acumulativa del siríaco mejor que un singular abstracto.
- source_word: ܢܣܒܘܢ ܪܘܚܝ
  english_pob_choice: take my spirit
  chosen_spanish: tomen... mi espíritu
  alternatives_spanish:
  - reciban... mi espíritu
  - tomen mi aliento
  lexicon: spirit
  rationale: '''Espíritu'' es la opción más directa para רוּחַ/ܪܘܚܐ en este contexto de muerte y partida; ''aliento'' sería posible, pero debilita la referencia personal del ruego.'
- source_word: ܠܘܬܟ
  english_pob_choice: to yourself
  chosen_spanish: para ti
  alternatives_spanish:
  - hacia ti
  - junto a ti
  lexicon: to yourself
  rationale: '''Para ti'' comunica el movimiento final del espíritu hacia Dios sin introducir una imagen demasiado idiomática que el original no exige.'
- source_word: ܐܙܠ ܠܘܬ ܐܒܗܝ
  english_pob_choice: that I may go to my fathers
  chosen_spanish: para que yo vaya a mis padres
  alternatives_spanish:
  - para que vaya con mis padres
  - para ir a mis padres
  lexicon: go to my fathers
  rationale: Se conserva la expresión semítica tradicional 'ir a mis padres', que en español resulta comprensible y refleja el lenguaje del linaje/antepasados sin reinterpretarlo como simple reunión familiar.
- source_word: ܘܠܐ ܐܚܙܐ ܚܪܒܬܐ ܕܐܡܝ
  english_pob_choice: and not see the destruction of my mother
  chosen_spanish: y no vea la destrucción de mi madre
  alternatives_spanish:
  - y no vea la ruina de mi madre
  - y no vea cómo mi madre es destruida
  lexicon: destruction
  rationale: '''Destrucción'' sigue de cerca el sustantivo del original y el inglés POB, evitando suavizarlo a ''ruina'' salvo por estilo. Mantiene el dolor concreto de la escena.'
theological_decisions:
- issue: Condicional de favor divino omitido en el borrador previo
  english_pob_reading: If I have found grace in your sight
  chosen_spanish_reading: Si he hallado gracia delante de ti
  alternative_spanish_readings:
  - Si he hallado favor delante de ti
  - Si he encontrado gracia a tus ojos
  rationale: La revisión auditada indicó que el inicio condicional estaba omitido; se restituye explícitamente porque estructura toda la súplica como petición condicionada por el favor divino.
  doctrine_reference: Petition shaped by divine favor; no doctrinal claim beyond the text.
- issue: Pluralidad de 'misericordias'
  english_pob_reading: your mercies
  chosen_spanish_reading: tus misericordias
  alternative_spanish_readings:
  - tu misericordia
  - tus compasiones
  rationale: Se preserva el plural porque el texto lo presenta así y porque la forma plural intensifica la súplica sin cambiar el sentido doctrinal.
  doctrine_reference: Divine compassion language in prayer.
translation_notes:
  revision_awareness: La versión inglesa auditada corrigió una omisión importante al restaurar la cláusula condicional inicial ('If I have found grace in your sight'). La presente versión española la incorpora y mantiene el resto de la súplica alineada con el texto siríaco y la lectura inglesa revisada.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' no aplica aquí porque el destinatario se expresa mediante pronombre de segunda persona.
  - Se conserva la construcción semítica 'ir a mis padres' por fidelidad y porque es inteligible en español bíblico.
  - '''Espíritu'' se usa en sentido de vida/persona interior que es tomada por Dios, no como simple ''aliento''.'
