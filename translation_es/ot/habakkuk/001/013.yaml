translation:
  language: es
  text: Tus ojos son demasiado puros para mirar el mal[a], y no puedes contemplar la maldad[b]. ¿Por qué, entonces, miras a los traicioneros y guardas silencio cuando el impío devora a uno más justo que él[c]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “ver el mal”; el hebreo es literalmente “demasiado puro de ojos para ver el mal”.
    reason: lexical_alternative
  - marker: b
    text: O “aflicción”, “opresión”, “daño” o “miseria” para עָמָל.
    reason: lexical_alternative
  - marker: c
    text: 'El hebreo dice “el impío devora a uno más justo que él”: es una afirmación comparativa, no necesariamente una declaración de justicia absoluta.'
    reason: lexical_alternative
lexical_decisions:
- source_word: טְהוֹר עֵינַיִם
  english_pob_choice: Your eyes are too pure
  chosen_spanish: Tus ojos son demasiado puros
  alternatives_spanish:
  - Eres de ojos más puros
  - Tus ojos son puros
  lexicon: HALOT
  rationale: El hebreo usa un giro idiomático literalmente equivalente a “puro de ojos”. En español, “Tus ojos son demasiado puros” conserva la metáfora y la fuerza comparativa que el contexto exige, sin volverla una explicación excesiva.
- source_word: מֵרְאוֹת רָע
  english_pob_choice: to look on evil
  chosen_spanish: para mirar el mal
  alternatives_spanish:
  - para ver el mal
  - desde ver el mal
  lexicon: HALOT
  rationale: La preposición con infinitivo expresa separación/incapacidad respecto de ver el mal. “Mirar el mal” es natural en español y mantiene la relación idiomática con el paralelismo del segundo hemistiquio.
- source_word: וְהַבִּיט אֶל עָמָל
  english_pob_choice: and you cannot gaze at wrongdoing
  chosen_spanish: y no puedes contemplar la opresión
  alternatives_spanish:
  - y no puedes mirar el daño
  - y no puedes contemplar el mal
  lexicon: HALOT
  rationale: עָמָל puede significar trabajo penoso, aflicción, opresión o maldad activa. En este contexto de queja por injusticia, “opresión” comunica bien el peso moral y social del término, mientras “contemplar” refleja נבט como mirar fijamente o con atención.
- source_word: לֹא תוּכָל
  english_pob_choice: you cannot
  chosen_spanish: no puedes
  alternatives_spanish:
  - no eres capaz
  - no puedes soportar
  lexicon: HALOT
  rationale: El verbo expresa capacidad. “No puedes” es directo y no añade una interpretación más fuerte de la que el hebreo exige, aunque el contexto sugiera incompatibilidad moral.
- source_word: לָמָּה תַבִּיט
  english_pob_choice: Why then do you look on
  chosen_spanish: ¿Por qué, entonces, miras
  alternatives_spanish:
  - ¿Por qué miras
  - ¿Por qué, pues, contemplas
  lexicon: HALOT
  rationale: La pregunta retórica conserva el contraste con la afirmación anterior. “Entonces” ayuda a reproducir la tensión argumentativa del verso sin introducir una interpretación ajena.
- source_word: בּוֹגְדִים
  english_pob_choice: the treacherous
  chosen_spanish: a los traicioneros
  alternatives_spanish:
  - a los que actúan traicioneramente
  - a los pérfidos
  lexicon: HALOT
  rationale: El participio describe a quienes obran con traición o infidelidad. “Traicioneros” es breve y fiel, y el complemento con “a” mantiene el objeto del mirar.
- source_word: תַּחֲרִישׁ
  english_pob_choice: keep silent
  chosen_spanish: guardas silencio
  alternatives_spanish:
  - callas
  - te quedas callado
  lexicon: HALOT
  rationale: El Hifil de חרש indica callar o no intervenir con palabra. “Guardas silencio” suena natural en español y preserva la percepción del profeta de una aparente inacción divina.
- source_word: בְּבַלַּע
  english_pob_choice: when ... swallows up
  chosen_spanish: cuando ... devora
  alternatives_spanish:
  - cuando ... traga
  - mientras ... devora
  lexicon: HALOT
  rationale: La imagen es voraz y depredadora. “Devora” comunica el valor figurado con claridad en español; el hebreo permite ver la acción como el marco circunstancial de la pregunta.
- source_word: רָשָׁע
  english_pob_choice: the wicked
  chosen_spanish: el impío
  alternatives_spanish:
  - el malvado
  - el perverso
  lexicon: HALOT
  rationale: El sustantivo/adjetivo sustantivado designa al malvado en contraste con el justo. “Impío” mantiene el registro bíblico y la oposición moral del verso.
- source_word: צַדִּיק מִמֶּנּוּ
  english_pob_choice: one more righteous than he
  chosen_spanish: a uno más justo que él
  alternatives_spanish:
  - a uno más recto que él
  - a alguien más justo que él
  lexicon: HALOT
  rationale: El מן comparativo exige una comparación relativa, no una afirmación de inocencia absoluta. “Más justo que él” conserva esa tensión y evita sobretraducirla.
theological_decisions:
- issue: La pureza divina y la visión del mal en el primer hemistiquio
  english_pob_reading: Render the prophet's claim as a rhetorical assertion about God's moral purity and incompatibility with evil, without turning it into a philosophical absolute that God cannot in any sense see evil.
  chosen_spanish_reading: 'La traducción conserva una afirmación retórica sobre la pureza moral de Dios: “demasiado puros para mirar el mal”, sin convertirla en una negación filosófica de que Dios pueda ver el mal.'
  alternative_spanish_readings:
  - Tus ojos son puros para no ver el mal
  - Tus ojos no pueden ver el mal
  rationale: El verso pertenece a una queja profética y usa lenguaje poético. En español conviene mantener la tensión retórica y no resolverla doctrinalmente dentro de la traducción. La línea siguiente muestra que la pregunta es precisamente por la aparente contradicción entre esa pureza y la mirada divina sobre los traicioneros.
  doctrine_reference: Preservar la tensión teológica en vez de armonizarla prematuramente.
translation_notes:
  revision_awareness: Se siguió de cerca el auditable inglés POB y su base hebrea, manteniendo el paralelismo, la pregunta retórica y la tensión teológica. No hubo cambios revisados posteriores; el estado de revisión más reciente indica que no eran necesarias modificaciones.
  spanish_consistency_notes:
  - Se usa “Dios” de forma implícita en la segunda persona, como en el hebreo y en el inglés POB, sin añadir un sujeto explícito.
  - Se prefirió “impío” para רָשָׁע por su tono bíblico y su contraste con “justo”.
  - Se mantuvo el contraste entre mirar/contener silencio y devorar, para preservar la fuerza poética del verso.
  - La puntuación con interrogación y comas busca reproducir la lógica retórica del hebreo sin sobrecargar el texto.
