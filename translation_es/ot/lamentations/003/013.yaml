    rationale: Aunque transmite causación, añade complejidad sintáctica y cambia la energía del verbo singular. Una formulación más directa como 'clavó' conserva mejor la violencia del contexto en español idiomático.
  revised_spanish_text: Clavó en mis riñones los hijos de su aljaba[a].
