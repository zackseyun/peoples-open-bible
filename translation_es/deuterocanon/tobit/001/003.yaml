base_translation:
  language: en
  yaml_path: translation/deuterocanon/tobit/001/003.yaml
  text: I[a], Tobit, walked in the ways of truth and righteousness all the days of my life[b], and I did many acts of mercy for my brothers and for my people who went with me into the land of the Assyrians, to Nineveh.
  footnotes:
  - marker: a
    text: Or 'I gave much alms.' The Greek expression can refer specifically to almsgiving, though here it may also include broader deeds of mercy.
    reason: lexical_alternative
  - marker: b
    text: '''My brothers'' likely refers to Tobit''s fellow Israelites or kinsmen more broadly, not only male siblings.'
    reason: lexical_alternative
