translation:
  language: es
  text: Toda rama en mí que no da fruto, la quita[a]; y toda rama que da fruto, la poda[b] para que dé más fruto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se la lleva»; algunos entienden aquí αἴρει como «la levanta».
    reason: alternative_reading
  - marker: b
    text: El verbo traducido «la poda» también puede significar «la limpia»; la expresión encaja con la imagen de la viña y anticipa el lenguaje de «limpios» en el versículo siguiente.
    reason: lexical_alternative
lexical_decisions:
- source_word: πᾶν κλῆμα
  english_pob_choice: Every branch
  chosen_spanish: Toda rama
  alternatives_spanish:
  - Cada rama
  lexicon: BDAG
  rationale: El distributivo singular πᾶν κλῆμα se vierte naturalmente con un singular colectivo en español. «Toda rama» conserva la idea de cada rama individual sin volverlo mecánico.
- source_word: ἐν ἐμοὶ
  english_pob_choice: in me
  chosen_spanish: en mí
  alternatives_spanish:
  - unida a mí
  - permaneciendo en mí
  lexicon: BDAG
  rationale: La preposición directa mantiene el lenguaje joánico de relación/unión sin expandirlo interpretativamente en el texto principal.
- source_word: μὴ φέρον καρπὸν
  english_pob_choice: that does not bear fruit
  chosen_spanish: que no da fruto
  alternatives_spanish:
  - que no produce fruto
  - sin dar fruto
  lexicon: BDAG
  rationale: El participio presente se vierte como relativa para un español natural, conservando la idea de acción continua.
- source_word: αἴρει
  english_pob_choice: removes
  chosen_spanish: la quita
  alternatives_spanish:
  - la remueve
  - la toma y la saca
  lexicon: BDAG
  rationale: «Quita» expresa bien la acción de sacar o apartar. En la metáfora de la viña preserva la tensión con la posibilidad alternativa de «levantar» sin imponerla en el texto principal.
- source_word: καρπός
  english_pob_choice: fruit
  chosen_spanish: fruto
  alternatives_spanish:
  - cosecha
  - producción
  lexicon: BDAG
  rationale: «Fruto» es el equivalente estándar en la imagen vitivinícola y en el uso joánico.
- source_word: καθαίρει
  english_pob_choice: prunes
  chosen_spanish: la poda
  alternatives_spanish:
  - la limpia
  - la purifica
  lexicon: BDAG
  rationale: En el contexto agrícola, «podar» comunica con claridad la acción sobre la vid. Se mantiene la conexión léxica con la idea de limpiar del verbo griego, pero sin oscurecer la imagen.
- source_word: ἵνα καρπὸν πλείονα φέρῃ
  english_pob_choice: so that it may bear more fruit
  chosen_spanish: para que dé más fruto
  alternatives_spanish:
  - para que produzca más fruto
  - a fin de que dé fruto abundante
  lexicon: BDAG
  rationale: «Para que» expresa el propósito de ἵνα; «dé más fruto» conserva el comparativo πλείονα en un español idiomático y fiel.
- source_word: αὐτό / αὐτὸ
  english_pob_choice: it
  chosen_spanish: la
  alternatives_spanish:
  - lo
  lexicon: BDAG
  rationale: El pronombre neutro se refiere a κλῆμα («rama»), que en español es femenino; por eso el clítico debe concordar con «rama».
- source_word: καὶ πᾶν τὸ καρπὸν φέρον
  english_pob_choice: and every branch that bears fruit
  chosen_spanish: y toda rama que da fruto
  alternatives_spanish:
  - y toda rama fructífera
  lexicon: BDAG
  rationale: En español es necesario suplir «rama» para que la estructura paralela quede clara y natural, como hace la POB en inglés.
theological_decisions:
- issue: Sentido de αἴρει en la primera cláusula
  english_pob_reading: he removes
  chosen_spanish_reading: la quita
  alternative_spanish_readings:
  - la toma
  - la levanta
  rationale: La lectura principal mantiene la oposición inmediata con la poda de la rama fructífera. La alternativa de «levantar» es real, pero no se adopta en el texto principal porque la metáfora de la viña aquí favorece la acción de quitar/retirar.
  doctrine_reference: Preservar la tensión interpretativa sin resolverla doctrinalmente
- issue: Valor de καθαίρει en la metáfora de la vid
  english_pob_reading: prunes
  chosen_spanish_reading: la poda
  alternative_spanish_readings:
  - la limpia
  - la purifica
  rationale: Se privilegia el sentido hortícola claro en el contexto. La resonancia con la limpieza del v. 3 puede anotarse, pero no debe eclipsar la imagen de la viticultura.
  doctrine_reference: Imagen agrícola y anticipación lexical a la limpieza del contexto inmediato
translation_notes:
  revision_awareness: La redacción española sigue la revisión más reciente del POB en inglés, que eliminó el pronombre redundante después de ‘prunes’ para mayor naturalidad. Por eso el español también evita un clítico extra y mantiene una sintaxis fluida y fiel al griego.
  spanish_consistency_notes:
  - Se usa ‘fruto’ de manera consistente para καρπός, conforme al uso joánico y agrícola.
  - Se conserva ‘en mí’ para ἐν ἐμοὶ, sin expandirlo a ‘permaneciendo en mí’ en el texto principal.
  - Se prefiere ‘la poda’/‘podar’ por claridad vitivinícola, con nota sobre la alternativa léxica de ‘limpiar’.
  - Los marcadores de nota [a] y [b] aparecen exactamente en el texto principal, junto a los términos correspondientes.
