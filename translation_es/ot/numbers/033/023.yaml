translation:
  language: es
  text: Salieron de Quehelatá y acamparon en el monte Shéfer[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «monte Sháfer». El nombre del lugar שָׁפֶר se ha transliterado de distintas maneras en versiones tradicionales.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּסְעוּ
  english_pob_choice: They set out
  chosen_spanish: Salieron
  alternatives_spanish:
  - Partieron
  - Se pusieron en marcha
  lexicon: HALOT
  rationale: En contextos de itinerario, נסע indica romper el campamento y avanzar a la siguiente etapa. «Salieron» comunica de forma natural ese movimiento inicial en español, sin añadir matices no presentes en el hebreo.
- source_word: מִקְּהֵלָתָה
  english_pob_choice: from Kehelathah
  chosen_spanish: de Quehelatá
  alternatives_spanish:
  - de Kehélata
  - de Kehelatá
  lexicon: nombre propio transliterado
  rationale: Es un topónimo; se conserva por transliteración en vez de traducirlo. «Quehelatá» refleja de manera cercana las consonantes y vocalización hebreas, manteniendo la identidad del lugar.
- source_word: וַיַּחֲנוּ
  english_pob_choice: and camped
  chosen_spanish: acamparon
  alternatives_spanish:
  - y acamparon
  - y plantaron el campamento
  lexicon: HALOT
  rationale: חנה en listas de itinerario significa establecer campamento. «Acamparon» es claro y moderno en español, y conserva la idea de asentarse para pasar la noche o el tramo del viaje.
- source_word: בְּהַר
  english_pob_choice: at Mount
  chosen_spanish: en el monte
  alternatives_spanish:
  - en el monte de
  - junto al monte
  lexicon: HALOT
  rationale: En este tipo de estación geográfica, בְּ + nombre propio se expresa naturalmente con «en». «Monte» conserva el valor topográfico de הַר y evita introducir una explicación adicional como «montaña» o «cordillera».
- source_word: שָׁפֶר
  english_pob_choice: Shepher
  chosen_spanish: Séfer
  alternatives_spanish:
  - Shéfer
  - Shaper
  lexicon: nombre propio transliterado
  rationale: Se translitera el topónimo procurando una forma legible para el español. La vocalización tradicional inglesa «Shepher» admite una variante cercana; «Séfer» mantiene una pronunciación sencilla en español sin borrar que se trata de un nombre propio.
translation_notes:
  revision_awareness: El pasaje no presenta revisiones textuales relevantes en el paquete auditado; la redacción sigue de cerca el hebreo de la lista de estaciones y la decisión inglesa de transliterar los topónimos.
  spanish_consistency_notes:
  - Se mantuvo un estilo sobrio y narrativo para la fórmula de itinerario.
  - Se evitó «encamparon» por resultar menos natural en español contemporáneo.
  - Los nombres propios se transliteran de forma consistente, preservando el carácter geográfico del texto.
