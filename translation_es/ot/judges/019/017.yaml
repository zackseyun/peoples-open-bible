revisions:
- from: 'Alzó los ojos y vio al viajero en la plaza abierta[a] de la ciudad, y el hombre anciano dijo: «¿Adónde vas[b], y de dónde vienes?»'
  to: 'Alzó los ojos y vio al viajero[a] en la plaza pública[b] de la ciudad, y el anciano dijo: «¿Adónde vas, y de dónde vienes?»'
  rationale: 'Se reemplaza «plaza abierta» por «plaza pública» para expresar de manera idiomática en español la idea de un espacio urbano amplio y público. Se cambia «el hombre anciano» por «el anciano» por mayor naturalidad y dignidad narrativa. Se rehacen las notas para alinearlas mejor con las alternativas léxicas preservadas en la auditoría inglesa: una para «viajero» y otra para «plaza pública». La nota sobre «¿Adónde?» se elimina por no ser necesaria en español.'
