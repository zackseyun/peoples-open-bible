review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el griego y el rastro de auditoría inglés en casi todo: preserva la prohibición inicial, el sentido forense de κατηγορήσω como «acusar», el contraste con otro acusador, y la esperanza puesta «en» Moisés. Sin embargo, la nota b altera el referente: el inglés explica que Moisés es aquel en quien ellos pusieron su confianza, mientras que la nota española dice «contra ellos», cambiando de segunda a tercera persona y añadiendo «se levantará», que no corresponde al matiz documentado.'
  spanish_quality_summary: El texto principal es claro, natural y digno en español eclesial contemporáneo. «No piensen», «delante del Padre» y «han puesto su esperanza» son lecturas idiomáticas y fieles. La única reparación necesaria es la nota b para alinearla mejor con el sentido y con el sujeto correcto. También conviene usar puntuación española con raya o aposición más natural en la nota.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparecen Yahvé, Mesías, Cristo, Espíritu, esclavo, etc. La decisión forense «acusar» está bien alineada con la racionalidad léxica documentada. «Moisés» y «Padre» también están correctamente preservados.
  issues:
  - severity: medium
    issue: La nota b cambia indebidamente la referencia de segunda persona a tercera persona
    rationale: El texto fuente y el POB inglés explican que Moisés acusa a «ustedes»/«you». La nota española dice «contra ellos», lo cual rompe la concordancia discursiva con las palabras de Jesús dirigidas a sus oyentes.
  - severity: low
    issue: La nota b añade un matiz más fuerte y algo interpretativo con «se levantará como acusador»
    rationale: La nota inglesa dice que Moisés «will stand as their accuser», pero en español «se levantará como acusador» puede sonar más dramático de lo necesario. Basta una formulación explicativa más directa y fiel al comentario auditado.
  revised_spanish_text: 'No piensen que yo los acusaré delante del Padre[a]; hay uno que los acusa: Moisés[b], en quien ustedes han puesto su esperanza.'
  revised_footnotes:
  - marker: a
    text: 'O: «No supongan que yo los acusaré delante del Padre».'
    reason: lexical_alternative
  - marker: b
    text: Es decir, Moisés, aquel en quien ustedes pusieron su confianza, especialmente como mediador y testigo de la ley, será su acusador.
    reason: cross_reference
  revision_rationale: Se conserva intacto el texto principal porque es fiel, claro y natural. Solo se corrige la nota b para que refleje con precisión la explicación del POB inglés, mantenga la segunda persona del discurso y evite una intensificación innecesaria.
