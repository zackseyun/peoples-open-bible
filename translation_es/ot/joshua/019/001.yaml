base_translation:
  language: en
  yaml_path: translation/ot/joshua/019/001.yaml
  text: The second lot came out for Simeon[a], for the tribe of the sons of Simeon according to their clans[b], and their inheritance was within the inheritance of the sons of Judah.
  footnotes:
  - marker: a
    text: Or 'The second lot fell to Simeon.' The Hebrew verb is literally 'came out,' used here for the result of casting lots.
    reason: lexical_alternative
  - marker: b
    text: '''Sons of Simeon'' and ''sons of Judah'' are Hebrew tribal designations; they refer to the descendants or members of those tribes.'
    reason: cultural_note
