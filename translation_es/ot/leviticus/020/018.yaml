base_translation:
  language: en
  yaml_path: translation/ot/leviticus/020/018.yaml
  text: If a man lies with a woman during her menstrual impurity and uncovers her nakedness—he has laid bare her flow[c][b][a], and she has uncovered the flow of her blood—both of them shall be cut off from among their people.
  footnotes:
  - marker: a
    text: Or, 'while she is menstruating.' The Hebrew term also carries the sense of ritual impurity associated with menstruation in Leviticus.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'he has laid bare her source, and she has uncovered the source of her blood.' 'Source' is a Hebrew euphemism for the bodily flow.
    reason: lexical_alternative
  - marker: c
    text: '''Shall be cut off'' is a standard legal formula in the Torah; the text does not specify here how that removal is carried out.'
    reason: alternative_reading
