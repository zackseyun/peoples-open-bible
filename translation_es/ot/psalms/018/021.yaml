translation:
  language: es
  text: Yahvé ha actuado conmigo[a] conforme a mi justicia; conforme a la limpieza de mis manos[b] me ha recompensado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «me ha recompensado» o «me ha tratado según mi justicia».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «la limpieza de mis manos», un modismo para conducta inocente o íntegra.'
    reason: cultural_note
lexical_decisions:
- source_word: יִגְמְלֵנִי
  english_pob_choice: has dealt with me
  chosen_spanish: me ha tratado
  alternatives_spanish:
  - me ha recompensado
  - me ha pagado
  - me ha correspondido
  lexicon: HALOT
  rationale: גמל puede expresar un trato o una retribución correspondiente a la conducta. «Me ha tratado» conserva esa amplitud semántica sin cerrar el sentido solo a recompensa, y encaja con el paralelismo del segundo hemistiquio.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino como transliteración del Tetragrámaton, de acuerdo con la pauta del proyecto, en lugar de sustituirlo por un título.
- source_word: כְּצִדְקִי
  english_pob_choice: according to my righteousness
  chosen_spanish: conforme a mi justicia
  alternatives_spanish:
  - según mi justicia
  - conforme a mi rectitud
  - según mi rectitud
  lexicon: HALOT
  rationale: צדק aquí se entiende como conducta recta o integridad en el contexto. «Justicia» es el equivalente español más transparente y conserva la afirmación primera persona sin atenuarla.
- source_word: כְּבֹר
  english_pob_choice: according to the cleanness
  chosen_spanish: conforme a la limpieza
  alternatives_spanish:
  - conforme a la pureza
  - conforme a la inocencia
  lexicon: HALOT
  rationale: בֹּר expresa limpieza o pureza. «Limpieza» mantiene la imagen concreta y permite conservar la referencia idiomática a las manos.
- source_word: יָדַי
  english_pob_choice: of my hands
  chosen_spanish: de mis manos
  alternatives_spanish:
  - en mis manos
  lexicon: HALOT
  rationale: Se retiene la imagen corporal literal porque la expresión hebrea es idiomática y comunica inocencia o conducta irreprochable mediante «manos».
- source_word: יָשִׁיב לִי
  english_pob_choice: he has repaid me
  chosen_spanish: me ha recompensado
  alternatives_spanish:
  - me ha repagado
  - me ha devuelto
  - me ha retribuido
  lexicon: HALOT
  rationale: El hiphil de שוב puede implicar hacer volver en el sentido de devolver o retribuir. «Me ha recompensado» balances with the first colon and preserves the idea de retribución correspondiente sin sonar artificial en español.
theological_decisions:
- issue: Posible lectura de «mi justicia» como autojustificación o perfección sin pecado
  english_pob_reading: 'Retain the first-person claim straightforwardly as covenantal/behavioral integrity in context: ''my righteousness.'''
  chosen_spanish_reading: 'Conservar la afirmación en primera persona como referencia a la integridad o rectitud conductual en el contexto del salmo: «mi justicia».'
  alternative_spanish_readings:
  - mi inocencia
  - mi causa justa
  - mi rectitud
  rationale: El hebreo usa de manera explícita el posesivo de primera persona con צדק, y la traducción no debe suavizarlo para evitar la tensión teológica. En el contexto del salmo se trata de integridad en la situación considerada, no de negar la realidad universal del pecado humano.
  doctrine_reference: Preservar la tensión teológica del texto sin resolverla artificialmente.
translation_notes:
  revision_awareness: El pasaje coincide estrechamente con el texto fuente y con el audit trail inglés; no se registran revisiones aplicadas en el paquete, y la versión española sigue la lectura de alta concordancia sin introducir ajustes interpretativos adicionales.
  spanish_consistency_notes:
  - Se mantiene Yahvé para el nombre divino conforme al estándar del proyecto.
  - Se usa «justicia» para צדק y no se sustituye por una formulación más explicativa para preservar la tensión del salmo.
  - «Limpieza de mis manos» se conserva como imagen idiomática, con nota aclaratoria.
  - Los marcadores de nota aparecen en el texto exactamente donde corresponde cada alternativa o explicación.
