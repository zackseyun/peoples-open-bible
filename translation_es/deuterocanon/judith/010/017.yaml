review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido básico del griego: selección de cien hombres de entre el grupo, escolta para Judit y su criada, y traslado a la tienda de Holofernes. Sin embargo, «la escoltaron a ella y a su sirvienta» es sintácticamente menos natural y algo redundante en español frente al objeto plural exigido por el griego («a ella y a su criada» / «a las dos»).'
  spanish_quality_summary: El texto es generalmente claro y fiel, pero conviene pulir la naturalidad. «Su sirvienta» puede sonar demasiado doméstico/coloquial en registro bíblico narrativo; «su criada» o «su sierva» encaja mejor aquí. También mejora el flujo reemplazar «la escoltaron a ella y a su sirvienta» por «las escoltaron a ella y a su criada» o mejor «las escoltaron» con explicitación suficiente en contexto.
  glossary_alignment: 'No hay términos teológicos de proyecto en juego. Las decisiones léxicas principales son adecuadas: «de entre ellos», «cien hombres», «escoltaron», «tienda». La mejoría principal es de español idiomático y precisión referencial del objeto plural.'
  issues:
  - severity: medium
    issue: Objeto singular con complemento adicional en «la escoltaron a ella y a su sirvienta»
    rationale: El griego coordina dos destinatarias de la escolta. En español, usar primero «la» y luego añadir «a ella y a su sirvienta» suena pesado y menos natural que un objeto plural directo/duplicado coherente.
  - severity: low
    issue: «Sirvienta» puede sonar demasiado coloquial o moderno-doméstico
    rationale: Aunque semánticamente posible para ἄβρα, en narrativa bíblica «criada» resulta más natural y digna sin perder el matiz de subordinación doméstica.
  revised_spanish_text: Y eligieron a cien hombres de entre ellos, y las escoltaron, a ella y a su criada, y las llevaron a la tienda de Holofernes.
  revision_rationale: Se ajusta el español para que el verbo de escolta concuerde naturalmente con las dos mujeres mencionadas en el griego y se sustituye «sirvienta» por «criada», que suena más adecuado al registro narrativo bíblico sin cambiar el sentido.
