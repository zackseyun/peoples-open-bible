review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del hebreo y sigue de cerca el audit trail inglés: tiempo señalado, referencia idiomática al año siguiente, anuncio de un hijo, tratamiento respetuoso a Eliseo y súplica de no levantar una esperanza falsa. Sin embargo, hay dos ajustes de fidelidad/estilo: «para este tiempo señalado, el año próximo» suena algo calcado y menos natural que una formulación temporal española más fluida; y «estarás abrazando» reproduce mecánicamente el progresivo inglés, pero en español bíblico-natural resulta mejor «tendrás en tus brazos» o «estarás abrazando» simplificado dentro de una sintaxis más idiomática. Además, la nota literal debe corresponder mejor al hebreo.'
  spanish_quality_summary: El español es claro y digno, pero algo rígido en la primera cláusula. «Para este tiempo señalado, el año próximo» y «estarás abrazando» suenan traducidos. Una redacción como «En este tiempo señalado, el año próximo, tendrás en tus brazos a un hijo» mantiene la imagen de חֹבֶקֶת y mejora la naturalidad. El resto, especialmente «No, mi señor, hombre de Dios; no engañes a tu sierva», es fuerte y legible.
  glossary_alignment: No hay conflicto con la terminología del proyecto. «Dios» y «hombre de Dios» están bien. «Mi señor» para אֲדֹנִי es apropiado. «Sierva» preserva el femenino de שִׁפְחָה mejor que una forma neutra. No intervienen Yahvé/Mesías u otros términos sensibles.
  issues:
  - severity: medium
    issue: La frase temporal inicial suena poco idiomática en español.
    rationale: «Para este tiempo señalado, el año próximo» es comprensible pero rígida. לַמּוֹעֵד הַזֶּה + כָּעֵת חַיָּה expresa el mismo tiempo señalado del año siguiente; en español conviene una formulación más natural sin perder el doble componente.
  - severity: medium
    issue: «Estarás abrazando a un hijo» suena mecánico en español.
    rationale: Aunque חֹבֶקֶת significa ‘abrazando/teniendo en brazos’, el futuro progresivo español aquí no es la opción más natural. «Tendrás en tus brazos a un hijo» conserva la imagen corporal y comunica mejor el anuncio de nacimiento.
  - severity: low
    issue: La nota literal puede formularse con mayor precisión y naturalidad.
    rationale: La glosa «para este tiempo de vida» no suena natural ni refleja tan claramente la alternativa preservada por la POB inglesa. Conviene «como en este tiempo de vida» o equivalente, explicando que se refiere a esta misma época el año próximo.
