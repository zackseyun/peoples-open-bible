  to: Ustedes han arado maldad; han segado injusticia; han comido el fruto de engaño[a], porque has confiado en tu camino[b], en la multitud de tus guerreros[c].
  rationale: Se mantiene plenamente el sentido del hebreo y del POB inglés, pero se repara la naturalidad española y la correcta colocación de notas. ‘Ustedes’ permite representar el plural inicial sin crear una falsa tercera persona, y los marcadores [a] y [c] se recolocan sobre los términos a los que realmente corresponden.
