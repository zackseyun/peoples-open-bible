    issue: La nota [a] está anclada en el lugar equivocado.
    rationale: La nota explica אֵיל גּוֹיִם ('un poderoso de las naciones'), pero en el borrador el marcador aparece junto a 'ciertamente', lo que crea confusión y no cumple bien la regla de anclar la nota al término pertinente.
  - severity: medium
    issue: '''Ciertamente actuará contra él'' añade una direccionalidad más interpretativa que el POB inglés.'
    rationale: עָשׂוֹ יַעֲשֶׂה לוֹ expresa énfasis verbal con sentido de tratar/hacer con él; 'actuará contra él' explicita hostilidad, plausible por contexto, pero menos fiel a la formulación más abierta del original y de la auditoría inglesa.
  revised_spanish_text: Lo di en manos de un poderoso[a] de las naciones; ciertamente lo tratará. Conforme a su maldad, lo eché fuera.
  revised_footnotes:
  - marker: a
    text: O «gobernante de las naciones» / «el poderoso de las naciones». La expresión hebrea puede designar a un gobernante poderoso entre las naciones.
    reason: lexical_alternative
