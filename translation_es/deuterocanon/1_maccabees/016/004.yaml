translation:
  language: es
  text: Y escogió de la región veinte mil hombres de guerra y jinetes, y marcharon contra Kendebaios, y acamparon[a] en Modeín.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «durmieron en Modeín»; en este contexto militar, el sentido es que acamparon allí por la noche.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπέλεξεν
  english_pob_choice: selected
  chosen_spanish: escogió
  alternatives_spanish:
  - seleccionó
  - eligió
  lexicon: LSJ
  rationale: El verbo expresa escoger a un grupo desde un conjunto mayor. «Escogió» conserva la acción deliberada y suena natural en español, sin perder el matiz de selección militar.
- source_word: χώρας
  english_pob_choice: the country
  chosen_spanish: de la región
  alternatives_spanish:
  - del país
  - de la tierra
  - del territorio
  lexicon: LSJ
  rationale: En este contexto militar, χώρας apunta al ámbito territorial desde el cual se reclutan los hombres. «De la región» comunica bien esa procedencia sin sonar restringido a un estado moderno ni excesivamente literal.
- source_word: εἴκοσι χιλιάδας ἀνδρῶν πολεμιστῶν
  english_pob_choice: twenty thousand fighting men
  chosen_spanish: veinte mil hombres de guerra
  alternatives_spanish:
  - veinte mil guerreros
  - veinte mil hombres combatientes
  lexicon: LSJ
  rationale: La combinación griega subraya varones combatientes. «Hombres de guerra» mantiene el registro militar y la referencia masculina, y evita una paráfrasis más interpretativa como «tropas».
- source_word: ἱππεῖς
  english_pob_choice: horsemen
  chosen_spanish: jinetes
  alternatives_spanish:
  - caballería
  - hombres a caballo
  lexicon: LSJ
  rationale: ἱππεῖς son literalmente hombres montados. «Jinetes» es natural en español y conserva mejor la imagen concreta que el colectivo abstracto «caballería».
- source_word: ἐπορεύθησαν ἐπὶ τὸν Κενδεβαῖον
  english_pob_choice: they marched against Kendebaios
  chosen_spanish: marcharon contra Kendebaios
  alternatives_spanish:
  - fueron contra Kendebaios
  - avanzaron contra Kendebaios
  lexicon: LSJ
  rationale: El griego describe avance hostil en contexto bélico. «Marcharon contra» reproduce ese sentido militar con claridad y sin añadir información.
- source_word: ἐκοιμήθησαν
  english_pob_choice: camped
  chosen_spanish: acamparon
  alternatives_spanish:
  - pasaron la noche
  - se alojaron
  lexicon: LSJ
  rationale: Aunque literalmente puede significar «durmieron», en una narrativa militar equivale a establecer campamento por la noche. «Acamparon» expresa el sentido contextual sin ocultar la base léxica.
- source_word: Μωδαείμ
  english_pob_choice: Modein
  chosen_spanish: Modeín
  alternatives_spanish:
  - Modein
  - Modaím
  lexicon: LSJ
  rationale: Se adopta la transliteración reconocible «Modeín», coherente con el topónimo tradicional y la pronunciación esperable en español.
translation_notes:
  revision_awareness: El texto español sigue el pasaje griego con alta concordancia y refleja la decisión ya auditada en inglés de traducir ἐκοιμήθησαν en sentido militar como «acamparon», manteniendo la alternativa literal en nota. No se detectaron revisiones posteriores que alteraran el contenido.
  spanish_consistency_notes:
  - Se mantiene el nombre propio Kendebaios para el antagonista, en transliteración consistente con el griego y el audit trail inglés.
  - «Modeín» se usa como forma española del topónimo, con nota que preserva la lectura literal alternativa del verbo final.
  - 'El orden sintáctico conserva la secuencia narrativa del griego: selección de tropas, marcha contra el enemigo, y pernocta/campamento.'
