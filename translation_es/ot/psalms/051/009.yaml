translation:
  language: es
  text: Purifícame con hisopo[a], y quedaré limpio; lávame, y seré más blanco que la nieve.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Límpiame con hisopo». El verbo hebreo tiene fuerza purgativa relacionada con la purificación ritual y evoca limpieza cultual.
    reason: lexical_alternative
lexical_decisions:
- source_word: תְּחַטְּאֵנִי
  english_pob_choice: Purify me
  chosen_spanish: Purifícame
  alternatives_spanish:
  - Límpiame
  - Purifícame de mi pecado
  lexicon: HALOT
  rationale: El verbo en piel aquí tiene fuerza purgativa y ritual, en paralelo con el hisopo. «Purifícame» conserva ese matiz de limpieza cultual y moral sin volverlo una paráfrasis genérica.
- source_word: בְאֵזוֹב
  english_pob_choice: with hyssop
  chosen_spanish: con hisopo
  alternatives_spanish:
  - usando hisopo
  - con el hisopo
  lexicon: HALOT
  rationale: «Hisopo» reproduce el objeto ritual del texto hebreo. La preposición «con» mantiene la relación instrumental directa y es natural en español.
- source_word: וְאֶטְהָר
  english_pob_choice: and I will be clean
  chosen_spanish: y quedaré limpio
  alternatives_spanish:
  - y seré limpio
  - y quedaré puro
  lexicon: HALOT
  rationale: טהר expresa quedar limpio/puro, especialmente en contexto ritual. «Quedaré limpio» preserva el resultado de la acción y suena natural en español poético.
- source_word: תְּכַבְּסֵנִי
  english_pob_choice: wash me
  chosen_spanish: lávame
  alternatives_spanish:
  - lávame bien
  - lava mi ropa
  lexicon: HALOT
  rationale: Aunque el verbo suele referirse al lavado de ropa, aquí se aplica al hablante en paralelo poético. «Lávame» conserva la metáfora sin introducir una imagen extraña.
- source_word: וּמִשֶּׁלֶג
  english_pob_choice: than snow
  chosen_spanish: que la nieve
  alternatives_spanish:
  - que la nieve blanca
  - más que la nieve
  lexicon: HALOT
  rationale: El hebreo expresa comparación intensificadora. En español, «más blanco que la nieve» comunica de forma idiomática el valor comparativo del original.
- source_word: אַלְבִּין
  english_pob_choice: I will be whiter
  chosen_spanish: seré más blanco
  alternatives_spanish:
  - quedaré más blanco
  - seré emblanquecido
  lexicon: HALOT
  rationale: El hifil de לבן comunica el resultado de volver blanco. «Seré más blanco» conserva el paralelismo con «la nieve» y la imagen de pureza resultante.
theological_decisions:
- issue: Imagen ritual de purificación aplicada al pecado moral
  english_pob_reading: Retain the cultic image explicitly with 'Purify me with hyssop' rather than flattening it to a generic request for forgiveness.
  chosen_spanish_reading: 'Mantener el hisopo y el lenguaje de purificación: «Purifícame con hisopo».'
  alternative_spanish_readings:
  - Límpiame con hisopo
  - Perdóname
  rationale: El verso alude a ritos de purificación para expresar la necesidad de limpieza del pecado. Conservar «hisopo» y «purifícame» mantiene la tensión entre lo ritual y lo moral sin sustituirla por una formulación doctrinal posterior.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: No se requirieron revisiones adicionales; la lectura refleja de manera estable la imagen ritual y poética del hebreo, en consonancia con el audit trail inglés.
  spanish_consistency_notes:
  - Se mantiene «hisopo» como término técnico-ritual, no se sustituye por un equivalente más genérico.
  - 'Se conserva el paralelismo poético: purificación / limpieza / lavado / blancura.'
  - «Más blanco que la nieve» expresa la comparación intensiva del hebreo sin forzar una glosa explicativa en el cuerpo del versículo.
