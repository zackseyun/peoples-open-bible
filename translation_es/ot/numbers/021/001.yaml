  text: וַ/יִּשְׁמַ֞ע הַ/כְּנַעֲנִ֤י מֶֽלֶךְ עֲרָד֙ יֹשֵׁ֣ב הַ/נֶּ֔גֶב כִּ֚י בָּ֣א יִשְׂרָאֵ֔ל דֶּ֖רֶךְ הָ/אֲתָרִ֑ים וַ/יִּלָּ֨חֶם֙ בְּ/יִשְׂרָאֵ֔ל וַ/יִּ֥שְׁבְּ מִמֶּ֖/נּוּ שֶֽׁבִי־׀׃
base_translation:
  language: en
  yaml_path: translation/ot/numbers/021/001.yaml
  text: When the Canaanite king of Arad[a], who lived in the Negev, heard that Israel was coming by the way of Atharim, he fought against Israel and took some of them captive.
  footnotes:
  - marker: a
    text: 'Hebrew: ''by the way of Atharim.'' The term ''Atharim'' is uncertain; some understand it as a place name, while others, influenced by ancient versions, take it to mean ''the spies'' or ''the scouts.'''
