- from: Así, todos los que cayeron de Benjamín aquel día fueron veinticinco mil hombres que blandían la espada; todos estos eran hombres de valor.
  to: Y todos los que cayeron de entre Benjamín aquel día fueron veinticinco mil hombres que sacaban la espada[a]; todos estos eran hombres de valor.
  rationale: 'Se ajusta la redacción para reflejar con más fidelidad el hebreo y el rastro de auditoría inglés: «de entre Benjamín» aclara מִבִּנְיָמִן; «que sacaban la espada» conserva mejor la imagen de שֹׁלֵף חֶרֶב que «blandían»; y se mantiene «hombres de valor» por coherencia con la revisión inglesa. También se preserva la nota léxica alternativa ya documentada en el POB inglés, anclada en la frase correspondiente.'
