review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el hebreo y el rastro auditado en inglés: conserva la fórmula legal doble (''hablarás ... dirás''), ''los hijos de Israel'', ''el diezmo'', ''Yahvé'' y la idea de ''un diezmo del diezmo''. Sin embargo, hay un problema menor pero real en las notas: la nota [b] dice solo ''Lit., “del diezmo”'', lo cual no refleja adecuadamente el hebreo completo מַעֲשֵׂר מִן הַמַּעֲשֵׂר ni el sentido auditado de ''a tithe of/from the tithe''. Además, el anclaje [c][b] sobre la misma frase puede simplificarse y aclararse mejor en español.'
  spanish_quality_summary: El español es claro, digno y ampliamente legible. 'Contribución de Yahvé' funciona, y 'ofreceréis de él' es natural en registro bíblico moderno. El uso de 'toméis/os/vuestra' no es neutral latinoamericano, pero sigue siendo eclesialmente comprensible; no lo considero un error en este versículo aislado. La mejora principal es depurar las notas para que sean exactas y no redundantes.
  glossary_alignment: 'Buena alineación con la terminología del proyecto: יְהוָה → ''Yahvé''; בְּנֵי יִשְׂרָאֵל → ''los hijos de Israel''; הַמַּעֲשֵׂר → ''el diezmo''; תְּרוּמַת יְהוָה → ''la contribución de Yahvé''. No hay conflicto teológico relevante; la revisión propuesta solo corrige la precisión de las notas sobre ''un diezmo del diezmo''.'
  issues:
  - severity: medium
    issue: La nota [b] está formulada de manera inexacta e incompleta.
    rationale: El hebreo dice מַעֲשֵׂר מִן הַמַּעֲשֵׂר, no simplemente 'del diezmo'. La nota actual podría confundir al lector sobre qué parte es literal y no expresa bien que se trata de una décima parte del diezmo recibido por los levitas.
  - severity: low
    issue: Las notas [b] y [c] resultan parcialmente redundantes.
    rationale: Una nota da una alternativa de lectura y la otra una explicación literal, pero la redacción actual no distingue con suficiente claridad sus funciones. Conviene mantener ambas solo si cada una aporta algo distinto y exacto.
  revised_spanish_text: 'Y a los levitas hablarás y les dirás: Cuando toméis de los hijos de Israel el diezmo que yo os he dado de ellos como vuestra herencia, entonces ofreceréis de él la contribución de Yahvé[a], un diezmo del diezmo[c][b].'
  revised_footnotes:
  - marker: a
    text: O “la contribución para Yahvé”; tradicionalmente, “la ofrenda elevada de Yahvé”.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, “un diezmo del diezmo”; es decir, una décima parte del diezmo recibido por los levitas.
    reason: lexical_alternative
  - marker: c
    text: O “un diezmo de ese diezmo”.
    reason: alternative_reading
  revision_rationale: El texto principal puede mantenerse, pero las notas deben corregirse para reflejar con precisión el hebreo y el audit trail inglés. La revisión sustituye una nota literal defectuosa por una explicación exacta de מַעֲשֵׂר מִן הַמַּעֲשֵׂר y conserva la alternativa española útil sin cambiar el sentido del versículo.
