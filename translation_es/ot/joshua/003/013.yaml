translation:
  language: es
  text: Y cuando las plantas de los pies de los sacerdotes que llevan el arca de Yahvé[a], el Señor de toda la tierra, se detengan en las aguas del Jordán, las aguas que bajan desde arriba[b] serán cortadas en el Jordán, y quedarán detenidas en un solo montón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el arca del Señor de toda la tierra». El hebreo puede leerse uniendo más estrechamente «Señor de toda la tierra» con «arca», aunque el texto principal lo toma como un título en aposición de Yahvé.'
    reason: alternative_reading
  - marker: b
    text: 'O: «las aguas que descienden desde arriba» o «las aguas que vienen de corriente arriba».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: And ...
  chosen_spanish: Y cuando ...
  alternatives_spanish:
  - Y sucederá que ...
  - Y acontecerá que ...
  lexicon: HALOT
  rationale: La fórmula introduce una situación futura. En español, 'Y cuando' comunica mejor la subordinación temporal de la frase sin forzar un calco hebreo innecesario.
- source_word: כְּנוֹחַ
  english_pob_choice: when ... come to rest
  chosen_spanish: se detengan
  alternatives_spanish:
  - descansen
  - se asienten
  lexicon: HALOT
  rationale: נוח expresa la idea de reposar o quedar quieto. 'Se detengan' preserva la idea de llegar a inmovilidad en el contexto del río y resulta natural en español.
- source_word: כַּפּוֹת רַגְלֵי
  english_pob_choice: the soles of the feet
  chosen_spanish: las plantas de los pies
  alternatives_spanish:
  - las suelas de los pies
  - las plantas
  lexicon: HALOT
  rationale: כַּף puede referirse a la palma o la planta. 'Plantas de los pies' es la equivalencia más clara y natural en español para el undersurface de los pies.
- source_word: הַכֹּהֲנִים נֹשְׂאֵי אֲרוֹן
  english_pob_choice: the priests carrying the ark
  chosen_spanish: los sacerdotes que llevan el arca
  alternatives_spanish:
  - los sacerdotes que cargan el arca
  - los sacerdotes portadores del arca
  lexicon: HALOT
  rationale: El participio describe a los sacerdotes como los que están llevando el arca. 'Que llevan' conserva el sentido activo y es más idiomático que una solución nominal pesada.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: Se mantiene el nombre divino en transliteración española según el principio del proyecto, evitando la sustitución por un título en mayúsculas.
- source_word: אֲדוֹן כָּל הָאָרֶץ
  english_pob_choice: the Lord of all the earth
  chosen_spanish: el Señor de toda la tierra
  alternatives_spanish:
  - el dueño de toda la tierra
  - el soberano de toda la tierra
  lexicon: HALOT
  rationale: אדון funciona aquí como título de soberanía divina. 'Señor' es la forma más natural y reverente en español para este uso titular.
- source_word: בְּמֵי הַיַּרְדֵּן
  english_pob_choice: in the waters of the Jordan
  chosen_spanish: en las aguas del Jordán
  alternatives_spanish:
  - dentro de las aguas del Jordán
  - en el agua del Jordán
  lexicon: HALOT
  rationale: La preposición con 'aguas' indica contacto o entrada en el cauce. 'En las aguas' conserva esa relación de manera directa y natural.
- source_word: מֵי הַיַּרְדֵּן
  english_pob_choice: the waters of the Jordan
  chosen_spanish: las aguas que bajan desde arriba[b]
  alternatives_spanish:
  - las aguas del Jordán
  - las aguas que descienden desde arriba
  lexicon: HALOT
  rationale: El hebreo repite 'aguas del Jordán' y luego 'las aguas que descienden desde arriba'. En español, se mantiene la repetición funcional y se explicita el movimiento descendente para reflejar el contraste de los dos grupos de aguas.
- source_word: יִכָּרֵת֔וּן
  english_pob_choice: will be cut off
  chosen_spanish: serán cortadas
  alternatives_spanish:
  - serán detenidas
  - serán apartadas
  lexicon: HALOT
  rationale: El niphal de כרת conserva la imagen de 'corte' o interrupción violenta. 'Serán cortadas' preserva esa fuerza y la pasiva del hebreo.
- source_word: הַמַּיִם הַיֹּרְדִים מִלְמָעְלָה
  english_pob_choice: the waters ... flowing down from above
  chosen_spanish: las aguas que bajan desde arriba
  alternatives_spanish:
  - las aguas que descienden desde arriba
  - las aguas que vienen de más arriba
  lexicon: HALOT
  rationale: El participio ירדים expresa descenso. 'Que bajan desde arriba' conserva el movimiento vertical sin introducir interpretaciones adicionales sobre el origen geográfico.
- source_word: וְיַעַמְדוּ נֵד אֶחָד
  english_pob_choice: and they will stand in one heap
  chosen_spanish: y se alzarán en un solo montón
  alternatives_spanish:
  - y quedarán en un solo montón
  - y formarán un solo montón
  lexicon: HALOT
  rationale: נֵד es un cúmulo o montón. 'Se alzarán' refleja la imagen dinámica del agua levantada como obstáculo y 'un solo montón' preserva la unidad indicada por אֶחָד.
theological_decisions:
- issue: Traducción del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: La convención del proyecto pide transliterar el Tetragrámaton en español. 'Yahvé' preserva el nombre propio de Dios sin ocultarlo bajo una sustitución funcional.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Relación sintáctica de 'el Señor de toda la tierra'
  english_pob_reading: 'Appositional title: ''the ark of Yahweh, the Lord of all the earth'''
  chosen_spanish_reading: 'Título en aposición: ''el arca de Yahvé, el Señor de toda la tierra'''
  alternative_spanish_readings:
  - '''el arca del Señor de toda la tierra'''
  rationale: 'La lectura en aposición conserva ambos elementos: el arca pertenece a Yahvé, quien es identificado como Señor de toda la tierra. Esta solución evita comprimir indebidamente la estructura hebrea.'
  doctrine_reference: Apositional divine-title reading in the English POB audit trail
translation_notes:
  revision_awareness: La versión española sigue la revisión más reciente del auditorio en inglés, que ajustó la segunda cláusula para evitar una repetición torpe de 'las aguas del Jordán' manteniendo a la vez el contraste entre las aguas del río y las que descienden desde arriba. También conserva la lectura en aposición de 'el Señor de toda la tierra' y la imagen de que las aguas serán 'cortadas'.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para el nombre divino, conforme a la terminología del proyecto.
  - Se conserva 'Señor de toda la tierra' como título divino, sin reemplazarlo por 'dueño' o 'soberano'.
  - '''Aguas'' se mantiene en plural, siguiendo el sentido colectivo del hebreo.'
  - '''Un solo montón'' preserva la imagen física de נֵד sin suavizarla a una mera detención del flujo.'
