lexical_decisions:
- source_word: ΚΑΙ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  - Ahora
  lexicon: LSJ
  rationale: La conjunción simple preserva la parataxis narrativa del griego sin introducir matiz temporal no explícito.
- source_word: ὁ βασιλεὺς
  english_pob_choice: King
  chosen_spanish: el rey
  alternatives_spanish:
  - rey
  lexicon: LSJ
  rationale: En español, el artículo definido con un nombre propio suele mantenerse como 'el rey Astiages' o ajustarse a 'el rey'; aquí se opta por 'el rey' para conservar la referencia definida del griego y la naturalidad sintáctica.
- source_word: Ἀστυάγης
  english_pob_choice: Astyages
  chosen_spanish: Astiages
  alternatives_spanish:
  - Astíages
  lexicon: onoma (nombre propio)
  rationale: Se translitera el nombre propio según la forma usual en español bíblico, con adaptación ortográfica mínima para lectura hispana.
- source_word: προσετέθη
  english_pob_choice: was gathered
  chosen_spanish: fue reunido
  alternatives_spanish:
  - fue añadido
  - fue juntado
  - murió
  lexicon: LSJ
  rationale: El pasivo de προστίθημι con 'a sus padres' funciona como idiomismo de muerte. 'Fue reunido' conserva la imagen idiomática en español sin reducirla a una glosa interpretativa como 'murió'.
- source_word: πρὸς τοὺς πατέρας αὐτοῦ
  english_pob_choice: to his fathers
  chosen_spanish: con sus padres
  alternatives_spanish:
  - a sus padres
  - con sus antepasados
  lexicon: LSJ
  rationale: Para español, 'con sus padres' comunica la asociación funeraria del hebraísmo/biblicismo subyacente y suena más natural que una calca rígida de 'a sus padres', manteniendo la tensión idiomática.
theological_decisions:
- issue: Idiomismo de muerte en προσετέθη πρὸς τοὺς πατέρας αὐτοῦ
  english_pob_reading: was gathered to his fathers
  chosen_spanish_reading: fue reunido con sus padres
  alternative_spanish_readings:
  - murió
  - fue añadido a sus padres
  - fue reunido con sus antepasados
  rationale: La frase no se aplana a 'murió' para preservar el giro bíblico tradicional y su resonancia intertextual. 'Fue reunido con sus padres' conserva la imagen de pertenencia/recogida asociada a la muerte sin resolver toda la tensión figurativa.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; readable modern Spanish without flattening significant source imagery.'
