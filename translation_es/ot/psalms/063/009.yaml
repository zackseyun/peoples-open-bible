translation:
  language: es
  text: Mi alma se aferra a ti[a][b]; tu mano derecha me sostiene.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «mi alma va tras de ti». El hebreo dice literalmente «después de ti», lo que puede expresar adhesión o persecución cercana.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «se apega a ti».'
    reason: lexical_alternative
lexical_decisions:
- source_word: דָּבְקָה
  english_pob_choice: clings
  chosen_spanish: se aferra
  alternatives_spanish:
  - se pega
  - se adhiere
  - se une firmemente
  lexicon: HALOT
  rationale: דבק expresa adherencia estrecha o apego firme. En español, «se aferra» comunica bien la intensidad relacional y la continuidad del estado sin volverlo demasiado técnico o arcaico.
- source_word: נַפְשִׁי
  english_pob_choice: my soul
  chosen_spanish: mi alma
  alternatives_spanish:
  - yo
  - mi vida
  - mi ser
  lexicon: HALOT
  rationale: נפשׁ puede significar alma, vida, persona o yo. Aquí «mi alma» conserva el registro poético y devocional del salmo y no aplana la expresión a un mero pronombre.
- source_word: אַחֲרֶיךָ
  english_pob_choice: after you
  chosen_spanish: a ti
  alternatives_spanish:
  - tras de ti
  - después de ti
  - detrás de ti
  lexicon: HALOT
  rationale: El hebreo dice literalmente «después/tras de ti», pero en español «se aferra a ti» comunica mejor la idea de adhesión que el uso adverbial de «después de ti». La imagen hebrea se conserva en la nota textual.
- source_word: תָּמְכָה
  english_pob_choice: upholds
  chosen_spanish: me sostiene
  alternatives_spanish:
  - me apoya
  - me sustenta
  - me mantiene
  lexicon: HALOT
  rationale: תמך significa sostener, apoyar, mantener. «Me sostiene» es natural en español y refleja la acción continua de la mano derecha divina.
- source_word: יְמִינֶךָ
  english_pob_choice: your right hand
  chosen_spanish: tu mano derecha
  alternatives_spanish:
  - tu diestra
  - tu mano diestra
  lexicon: HALOT
  rationale: Se preserva la imagen concreta de la mano derecha como símbolo de fuerza, protección y acción eficaz. «Tu mano derecha» es claro y fiel, mientras que «diestra» sería más tradicional pero menos neutro.
theological_decisions:
- issue: Imagen corporal de la acción divina
  english_pob_reading: your right hand
  chosen_spanish_reading: tu mano derecha
  alternative_spanish_readings:
  - tu poder
  - tu fuerza
  - tu diestra
  rationale: La traducción conserva la metáfora antropomórfica en vez de interpretarla de forma abstracta, siguiendo la primacía del texto מקור y dejando visible la imagen bíblica.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather than resolve it; original-language primacy over translation tradition.'
- issue: Permanencia del apego devocional de נַפְשִׁי
  english_pob_reading: my soul
  chosen_spanish_reading: mi alma
  alternative_spanish_readings:
  - yo
  - mi vida
  - mi ser
  rationale: «Mi alma» mantiene el matiz antropológico y espiritual del hebreo y encaja con el tono de oración del salmo. No se reduce a un simple «yo», para no perder el peso devocional.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather than flatten theological weight.'
translation_notes:
  revision_awareness: El inglés POB pasó de una formulación más literal pero incómoda («clings after you» / «follows hard after you») a «clings to you». La versión española sigue la decisión revisada de priorizar fluidez sin perder el valor léxico de דבק, y conserva en nota la fuerza espacial de אחרי.
  spanish_consistency_notes:
  - Se usó «Yahvé» como término estándar del proyecto cuando corresponda; aquí el versículo no contiene el tetragrámaton explícito.
  - Se prefirió un español moderno y digno, evitando calcos como «se aferra después de ti» porque resultarían poco naturales.
  - Se mantuvo la metáfora concreta de la «mano derecha» en vez de una abstracción como «poder», por fidelidad al hebreo.
