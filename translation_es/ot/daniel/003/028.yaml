translation:
  language: es
  text: 'Entonces Nabucodonosor respondió y dijo: «Bendito sea el Dios de Sadrac, Mesac y Abed-nego, que envió a su ángel[a] y libró a sus siervos, que confiaron en él, y dejaron de lado el mandato del rey[b], y entregaron sus cuerpos, para no servir ni adorar[c] a ningún dios sino a su propio Dios».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su mensajero». El término arameo puede significar «ángel» o «mensajero».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «cambiaron la palabra del rey», es decir, rechazaron o dejaron de lado su mandato.
    reason: lexical_alternative
  - marker: c
    text: O «postrarse ante».
    reason: lexical_alternative
lexical_decisions:
- source_word: עָנֵה ... וְאָמַר
  english_pob_choice: answered and said
  chosen_spanish: respondió y dijo
  alternatives_spanish:
  - contestó y dijo
  - respondió
  lexicon: HALOT
  rationale: La fórmula aramea es una introducción narrativa solemne. En español, «respondió y dijo» conserva el giro idiomático y el tono bíblico sin volverlo rígido.
- source_word: בְּרִיךְ
  english_pob_choice: Blessed be
  chosen_spanish: Bendito sea
  alternatives_spanish:
  - Bendito es
  - Alabado sea
  lexicon: HALOT
  rationale: Es una expresión benedictoria. «Bendito sea» transmite mejor la fuerza de doxología que una forma meramente descriptiva.
- source_word: אֱלָהֲהוֹן
  english_pob_choice: the God of ...
  chosen_spanish: el Dios de ...
  alternatives_spanish:
  - su Dios
  - el Dios suyo
  lexicon: HALOT
  rationale: El sufijo posesivo queda especificado por los nombres siguientes; por eso en español lo más claro y fiel es «el Dios de Sadrac, Mesac y Abed-nego».
- source_word: שְׁלַח מַלְאֲכֵהּ
  english_pob_choice: sent his angel
  chosen_spanish: envió a su ángel
  alternatives_spanish:
  - envió a su mensajero
  lexicon: HALOT
  rationale: El término puede significar «ángel» o «mensajero». En este contexto de liberación milagrosa, «ángel» es la opción más natural y coherente con la lectura auditada en inglés.
- source_word: וְשֵׁיזִב
  english_pob_choice: delivered
  chosen_spanish: libró
  alternatives_spanish:
  - libertó
  - rescató
  - salvó
  lexicon: HALOT
  rationale: El verbo expresa rescate de peligro. «Libró» funciona bien en español bíblico moderno y evita cargar el verbo con matices soteriológicos excesivos.
- source_word: לְעַבְדוהִי
  english_pob_choice: his servants
  chosen_spanish: a sus siervos
  alternatives_spanish:
  - a sus esclavos
  lexicon: HALOT
  rationale: Aquí el español requiere una forma natural y reverente. «Siervos» conserva el sentido de pertenencia y servicio a Dios sin oscurecer el contexto cortesano y devocional.
- source_word: הִתְרְחִצוּ עֲלֹוהִי
  english_pob_choice: who trusted in him
  chosen_spanish: que confiaron en él
  alternatives_spanish:
  - que se apoyaron en él
  - que pusieron su confianza en él
  lexicon: HALOT
  rationale: La forma reflexiva comunica confianza/apoyo. «Confiaron en él» es la solución más directa y natural en español.
- source_word: וּמִלַּת מַלְכָּא שַׁנִּיו
  english_pob_choice: set aside the king’s command
  chosen_spanish: desoyeron el mandato del rey
  alternatives_spanish:
  - dejaron de lado el mandato del rey
  - cambiaron la orden del rey
  - desatendieron la orden del rey
  lexicon: HALOT
  rationale: 'La expresión aramea literalmente habla de cambiar la palabra/mandato del rey. «Desoyeron el mandato del rey» preserva el efecto práctico en contexto: rechazaron obedecer la orden real.'
- source_word: וִיהַבוּ גשמי/הון
  english_pob_choice: gave up their bodies
  chosen_spanish: entregaron sus cuerpos
  alternatives_spanish:
  - cedieron sus cuerpos
  - sometieron sus cuerpos
  lexicon: HALOT
  rationale: La frase indica exponerse corporalmente al peligro y a la muerte antes que obedecer a la idolatría. «Entregaron sus cuerpos» mantiene la fuerza literal y la disposición voluntaria.
- source_word: לָא יִפְלְחוּן
  english_pob_choice: serve
  chosen_spanish: servir
  alternatives_spanish:
  - rendir servicio
  - ministrar
  lexicon: HALOT
  rationale: En este contexto de culto, «servir» es la equivalencia normal y fiel para la oposición a la idolatría.
- source_word: וְלָא יִסְגְּדוּן
  english_pob_choice: worship
  chosen_spanish: adorar
  alternatives_spanish:
  - postrarse ante
  - inclinarse ante
  lexicon: HALOT
  rationale: El término puede ser más literalmente «postrarse». En un contexto de culto idolátrico, «adorar» comunica con claridad el acto religioso.
- source_word: לָהֵן
  english_pob_choice: except
  chosen_spanish: sino
  alternatives_spanish:
  - excepto
  - salvo
  lexicon: HALOT
  rationale: En español, la construcción negativa idiomática queda más natural con «sino» cuando se introduce la excepción final.
- source_word: לֵאלָהֲהוֹן
  english_pob_choice: their own God
  chosen_spanish: su propio Dios
  alternatives_spanish:
  - su Dios
  - el Dios que ellos tienen
  lexicon: HALOT
  rationale: '«Su propio Dios» reproduce la fuerza contrastiva del arameo: ningún otro dios, sino el Dios que les pertenece y a quien pertenecen.'
theological_decisions:
- issue: Identidad de מַלְאֲכֵהּ
  english_pob_reading: his angel
  chosen_spanish_reading: su ángel
  alternative_spanish_readings:
  - su mensajero
  rationale: 'Se mantiene la restricción auditada en inglés: el término arameo permite ambas opciones, pero el contexto narrativo de liberación favorece «ángel». No se introduce una identificación cristológica que el verso no exige.'
  doctrine_reference: 'Translation philosophy: preservar la tensión teológica en vez de resolverla prematuramente.'
translation_notes:
  revision_awareness: 'La redacción sigue la versión inglesa revisada más reciente en dos puntos clave: «mandato del rey» para reflejar con mayor precisión el valor de מִלַּת מַלְכָּא, y una cláusula final más formal («para no servir ni adorar...»). El resto conserva los elementos del texto fuente y la auditoría inglesa, incluido el equilibrio entre sentido literal y naturalidad en español.'
  spanish_consistency_notes:
  - Se usa «Dios» para אֱלָהֲהוֹן, en concordancia con la terminología del proyecto.
  - Se usa «ángel» y no «mensajero» en el texto principal, pero se preserva la alternativa en la nota.
  - Se usa «siervos» por naturalidad bíblica en español, aunque el arameo permite una noción más fuerte de servidumbre.
  - «Entregaron sus cuerpos» mantiene el lenguaje corporal concreto del original.
  - No se emplea «SEÑOR» como máscara del nombre divino; aquí el hebreo/arameo tiene «Dios» y no el tetragrama.
