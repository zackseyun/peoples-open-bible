  text: הֶן אֵ֤לֶּה קְצ֬וֹת דרכ/ו וּ/מַה שֵּׁ֣מֶץ דָּ֭בָר נִשְׁמַע בּ֑/וֹ וְ/רַ֥עַם גבורת/ו מִ֣י יִתְבּוֹנָֽן־׀־־׃ס
base_translation:
