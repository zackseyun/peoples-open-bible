translation:
  language: es
  text: Yahvé ya no podía soportarlo[a] por la maldad de sus obras, por las abominaciones que cometieron. Por eso su tierra quedó en ruina, en desolación[b] y en maldición[c], sin habitantes, como hasta el día de hoy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «ya no podía soportar más» o «ya no podía seguir tolerándolo». El hebreo literalmente dice «ya no podía llevar/soportar», expresando que la paciencia de Yahvé llegó a su límite por la maldad de sus obras y las abominaciones que cometieron.'
    reason: lexical_alternative
  - marker: b
    text: «Desolación» también puede llevar el sentido de «objeto de horror» o «de asombro».
    reason: lexical_alternative
  - marker: c
    text: O «objeto de maldición», es decir, algo invocado como fórmula de maldición.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre propio del pacto según la convención del proyecto en español. 'Yahvé' evita el ocultamiento por un título y mantiene la referencia directa al Tetragrama.
- source_word: יוּכַל ... לָשֵׂאת
  english_pob_choice: could ... bear it
  chosen_spanish: ya no podía soportarlo
  alternatives_spanish:
  - ya no podía endurecerlo
  - ya no podía llevarlo
  lexicon: HALOT
  rationale: '''Soportarlo'' comunica en español la idea idiomática de no poder seguir tolerando/cargando con ello. ''Soportar'' preserva la fuerza de la forbearancia divina llegando a su límite, sin perder naturalidad.'
- source_word: עוֹד
  english_pob_choice: no longer
  chosen_spanish: ya no
  alternatives_spanish:
  - no más
  - todavía no
  lexicon: HALOT
  rationale: Con la negación, 'ya no' expresa el cese de una acción continuada, equivalente natural de 'no longer'.
- source_word: מִפְּנֵי
  english_pob_choice: because of
  chosen_spanish: por
  alternatives_spanish:
  - a causa de
  - debido a
  lexicon: HALOT
  rationale: En este contexto causal, 'por' es una opción clara y fiel para introducir la razón del rechazo divino.
- source_word: רֹעַ מַעַלְלֵיכֶם
  english_pob_choice: the evil of your deeds
  chosen_spanish: la maldad de sus obras
  alternatives_spanish:
  - la maldad de sus hechos
  - la perversidad de sus acciones
  lexicon: HALOT
  rationale: '''Maldad'' conserva el valor moral fuerte de רֹעַ; ''obras'' refleja מַעַלְלֵיכֶם y mantiene el registro bíblico, evitando suavizar la evaluación ética.'
- source_word: הַתּוֹעֵבוֹת
  english_pob_choice: the abominations
  chosen_spanish: las abominaciones
  alternatives_spanish:
  - las cosas abominables
  - las prácticas detestables
  lexicon: HALOT
  rationale: '''Abominaciones'' reproduce el término técnico y su peso cultual/moral. Se mantiene la dureza semántica que el pasaje requiere.'
- source_word: עֲשִׂיתֶם
  english_pob_choice: you committed
  chosen_spanish: cometieron
  alternatives_spanish:
  - hicieron
  - practicaron
  lexicon: HALOT
  rationale: Con 'abominaciones', 'cometieron' es el verbo español más natural para la ofensa moral, conservando el grado de gravedad.
- source_word: וַתְּהִי אַרְצְכֶם
  english_pob_choice: So your land became
  chosen_spanish: Por eso su tierra quedó
  alternatives_spanish:
  - y su tierra se volvió
  - así su tierra llegó a ser
  lexicon: HALOT
  rationale: La secuencia causal del waw consecutivo se expresa bien con 'Por eso'. 'Quedó' comunica el estado resultante y su fijación.
- source_word: לְחָרְבָּה
  english_pob_choice: a ruin
  chosen_spanish: en ruina
  alternatives_spanish:
  - en desolación
  - en escombros
  lexicon: HALOT
  rationale: '''En ruina'' es breve y fiel; preserva el valor de devastación física del sustantivo.'
- source_word: וּלְשַׁמָּה
  english_pob_choice: a desolation
  chosen_spanish: en desolación
  alternatives_spanish:
  - en horror
  - en espanto
  lexicon: HALOT
  rationale: '''Desolación'' mantiene el sentido primario y deja abierta la posible resonancia de horror/asombro sin imponerla como única opción en el texto principal.'
- source_word: וְלִקְלָלָה
  english_pob_choice: a curse
  chosen_spanish: en maldición
  alternatives_spanish:
  - en objeto de maldición
  - en cosa maldita
  lexicon: HALOT
  rationale: '''Maldición'' conserva la fuerza del resultado negativo y funciona de manera natural en español, aunque el hebreo puede abarcar el sentido de objeto invocado para maldecir.'
- source_word: מֵאֵין יוֹשֵׁב
  english_pob_choice: without inhabitant
  chosen_spanish: sin habitante
  alternatives_spanish:
  - sin moradores
  - sin que habitara nadie
  lexicon: HALOT
  rationale: La expresión breve refleja la ausencia total de población. 'Sin habitante' es directo y mantiene el tono solemne del versículo.
- source_word: כְּהַיּוֹם הַזֶּה
  english_pob_choice: as it is this day
  chosen_spanish: como sucede hasta hoy
  alternatives_spanish:
  - como en este día
  - como es hasta el día de hoy
  lexicon: HALOT
  rationale: '''Como sucede hasta hoy'' transmite la vigencia observable del hecho en el presente, equivalente funcional de la comparación temporal hebrea.'
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: Se sigue la política del proyecto para preservar el nombre del pacto y evitar el reemplazo por un título. 'Yahvé' es la forma establecida en el español de esta obra.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Fuerza de la frase verbal sobre la paciencia divina
  english_pob_reading: could no longer bear it
  chosen_spanish_reading: ya no podía soportarlo
  alternative_spanish_readings:
  - ya no podía tolerarlo
  - ya no podía endurecerlo
  rationale: La formulación mantiene la idea de que la tolerancia de Yahvé llegó a su límite sin diluir la tensión teológica del texto. 'Soportarlo' conserva el peso del verbo original y el sentido de agotamiento de la paciencia divina.
  doctrine_reference: Lexical-theological consistency for divine forbearance and judgment
- issue: Valor de תּוֹעֵבוֹת
  english_pob_reading: the abominations
  chosen_spanish_reading: las abominaciones
  alternative_spanish_readings:
  - las cosas detestables
  - las prácticas abominables
  rationale: Se conserva el término fuerte y tradicionalmente bíblico para mantener el juicio moral/cultual del pasaje. Evita suavizar el reproche profético.
  doctrine_reference: Semantic force of covenantal offense in prophetic literature
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el contexto auditado de la POB en inglés: la decisión establecida para יהוה como Yahweh, la lectura causal de מִפְּנֵי como ''because of'', y las notas alternativas sobre el verbo de ''bear/endure'' y sobre ''desolation/curse''. No se introdujeron cambios de sentido; la redacción española conserva la misma progresión causal y el mismo cierre temporal ''hasta hoy''.'
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' para el nombre divino, conforme al estándar del proyecto.
  - '''Abominaciones'' se conservó para reproducir la fuerza técnico-moral del hebreo.'
  - La secuencia causal se expresó con 'Por eso' para reflejar el waw-consecutivo sin rigidizar la sintaxis española.
  - '''Sin habitante'' mantiene la elipsis hebrea de despoblación total y su registro solemne.'
  - '''Como sucede hasta hoy'' preserva la referencia temporal final con naturalidad en español.'
