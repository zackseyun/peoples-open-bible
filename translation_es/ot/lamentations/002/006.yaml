  to: Él ha devastado su refugio[a] como un jardín; ha destruido su lugar señalado de reunión[b]. Yahvé ha hecho que se olviden en Sion las festividades señaladas[c] y el sábado, y en la indignación de su ira ha desechado al rey y al sacerdote.
