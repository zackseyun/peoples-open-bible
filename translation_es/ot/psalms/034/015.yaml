translation:
  language: es
  text: Apártate del mal y haz el bien; busca la paz[a] y persíguela.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «bienestar» o «plenitud» para «paz» (hebreo shalom), destacando que implica más que la ausencia de conflicto.
    reason: lexical_alternative
lexical_decisions:
- source_word: סוּר
  english_pob_choice: Turn away
  chosen_spanish: Apártate
  alternatives_spanish:
  - Aléjate
  - Tórnate aparte
  lexicon: HALOT
  rationale: El imperativo expresa apartarse activamente del mal; «apártate» transmite bien la reorientación moral y suena natural en español moderno, sin perder el matiz de separación.
- source_word: מֵרָע
  english_pob_choice: from evil
  chosen_spanish: del mal
  alternatives_spanish:
  - de lo malo
  - del mal moral
  lexicon: HALOT
  rationale: En este contexto sapiencial, רָע apunta a maldad moral más que a daño o desgracia. «Del mal» conserva la brevedad y el contraste con «haz el bien».
- source_word: וַעֲשֵׂה טוֹב
  english_pob_choice: and do good
  chosen_spanish: y haz el bien
  alternatives_spanish:
  - y haz lo bueno
  - y haz el bien que es correcto
  lexicon: HALOT
  rationale: La pareja exhortativa exige un contraste directo con el mal. «Haz el bien» es idiomático y fiel; «haz lo bueno» suena más abstracto y menos natural.
- source_word: בַּקֵּשׁ
  english_pob_choice: seek
  chosen_spanish: busca
  alternatives_spanish:
  - procura
  - busca con empeño
  lexicon: HALOT
  rationale: El piel aquí denota búsqueda diligente. «Busca» comunica la acción con claridad; el matiz de esfuerzo queda reforzado por el paralelo «síguela».
- source_word: שָׁלוֹם
  english_pob_choice: peace
  chosen_spanish: la paz
  alternatives_spanish:
  - la paz
  - el bienestar
  - la plenitud
  lexicon: HALOT
  rationale: «Paz» es la traducción primaria más natural y fiel en español. Aunque שָׁלוֹם puede incluir plenitud y bienestar, aquí el equivalente base es adecuado y transparente.
- source_word: וְרָדְפֵהוּ
  english_pob_choice: and pursue it
  chosen_spanish: y síguela
  alternatives_spanish:
  - y persíguela
  - y corre tras ella
  lexicon: HALOT
  rationale: El verbo רדף expresa perseguir activamente. En español, «síguela» mantiene el impulso sostenido sin sonar forzado; el objeto femenino concuerda con «la paz».
translation_notes:
  revision_awareness: El pasaje coincide plenamente con el paquete de fuente y con la traducción inglesa auditada; no se registraron revisiones aplicadas y el control cruzado informó alta concordancia.
  spanish_consistency_notes:
  - 'Se mantuvo el imperativo ético en tres miembros paralelos: apartarse del mal, hacer el bien y buscar/seguir la paz.'
  - Se evitó «SEÑOR» porque el hebreo aquí no contiene el nombre divino ni una cita explícita de κύριος.
  - «La paz» conserva el referente de שָׁלוֹם, con nota para su alcance semántico más amplio.
  - El pronombre enclítico «-la» retoma naturalmente «la paz» y preserva la referencia anafórica del hebreo.
