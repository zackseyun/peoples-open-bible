review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido del hebreo: Dios vio la aflicción de los padres en Egipto y oyó su clamor junto/al lado del mar. También preserva correctamente la nota léxica sobre יַם סוּף. Sin embargo, «escuchaste» introduce un matiz más volitivo/atento que el simple שָׁמַעְתָּ y que la decisión auditada inglesa «you heard»; en español bíblico-oracional «oíste» o «oir» preserva mejor la formulación fuente sin perder dignidad.'
  spanish_quality_summary: El texto es claro, natural y de registro bíblico legible. «Aflicción», «nuestros padres» y «clamor» están bien elegidos. La nota «mar de Juncos» es inteligible, aunque en un registro más ampliamente interconfesional «mar de Cañas» también sería posible; no hace falta cambiarla. La única mejora necesaria es reemplazar «escuchaste» por «oíste» para mayor fidelidad y economía estilística.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparece Yahvé, Mesías, Espíritu, etc. La elección «mar Rojo» en texto con nota «mar de Juncos» sigue la racionalidad documentada del POB inglés. «Nuestros padres» preserva correctamente el valor masculino explícito de אֲבֹתֵינוּ.
  issues:
  - severity: medium
    issue: «escuchaste» sobretraduce שָׁמַעְתָּ
    rationale: El hebreo y el POB inglés usan el verbo simple «oír/hear». «Escuchaste» puede sugerir una escucha más intencional que la forma fuente no explicita. «Oíste» mantiene mejor la correspondencia formal y el tono de oración bíblica.
  revised_spanish_text: Tú viste la aflicción de nuestros padres en Egipto[a], y oíste su clamor junto al mar Rojo.
  revised_footnotes:
  - marker: a
    text: 'Hebreo: «mar de Juncos». Tradicionalmente se vierte «mar Rojo».'
    reason: lexical_alternative
  revision_rationale: Se hace una reparación menor para alinear mejor el verbo con el hebreo שָׁמַעְתָּ y con la decisión auditada inglesa «you heard». El resto del texto y la nota pueden mantenerse.
