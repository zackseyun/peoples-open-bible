translation:
  language: es
  text: Ahora tomen para ustedes doce hombres[a], de las tribus de Israel, uno por cada tribu.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «un hombre, un hombre para la tribu», una expresión distributiva que significa un representante de cada tribu.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Y ahora
  lexicon: HALOT
  rationale: Marca la transición discursiva inmediata. En español, «Ahora» suena natural y conserva la progresión de la orden sin añadir énfasis innecesario.
- source_word: קְחוּ לָכֶם
  english_pob_choice: take for yourselves
  chosen_spanish: tomen para ustedes
  alternatives_spanish:
  - tomen
  - escojan para ustedes
  lexicon: HALOT
  rationale: El imperativo plural de לקח con לָכֶם expresa una acción hecha para beneficio o uso propio del grupo. «Tomen para ustedes» mantiene ese matiz reflexivo/dativo sin endurecerlo en una simple orden de tomar.
- source_word: שְׁנֵי עָשָׂר אִישׁ
  english_pob_choice: twelve men
  chosen_spanish: doce hombres
  alternatives_spanish:
  - doce varones
  - doce personas
  lexicon: HALOT
  rationale: אִישׁ aquí designa representantes varones de las tribus. «Hombres» conserva la referencia de género y la función representativa mejor que una forma neutra.
- source_word: מִשִּׁבְטֵי יִשְׂרָאֵל
  english_pob_choice: from the tribes of Israel
  chosen_spanish: de las tribus de Israel
  alternatives_spanish:
  - de entre las tribus de Israel
  - de Israel
  lexicon: HALOT
  rationale: La construcción indica procedencia/selección desde el conjunto tribal. «De las tribus de Israel» es la forma más clara y natural en español.
- source_word: אִישׁ אֶחָד אִישׁ אֶחָד לַשָּׁבֶט
  english_pob_choice: one man from each tribe
  chosen_spanish: uno por cada tribu
  alternatives_spanish:
  - un hombre por cada tribu
  - un hombre, un hombre para la tribu
  lexicon: HALOT
  rationale: La repetición distributiva hebrea enfatiza un representante por tribu. En español, «uno por cada tribu» comunica ese valor distributivo con naturalidad; se conserva el contenido representativo del hebreo sin forzar una repetición artificial.
translation_notes:
  revision_awareness: 'El pasaje coincide plenamente con el contexto auditado en inglés y no requiere cambios respecto del sentido base: la única decisión relevante es renderizar en español la expresión distributiva hebrea de forma natural sin perder su valor representativo.'
  spanish_consistency_notes:
  - Se mantiene «tribus de Israel» de manera uniforme para la construcción מִשִּׁבְטֵי יִשְׂרָאֵל.
  - Se evita «SEÑOR» u otra sustitución reverencial porque el versículo no contiene el nombre divino.
  - La nota [a] acompaña la frase distributiva para preservar la observación lexical documentada en el audit trail inglés.
