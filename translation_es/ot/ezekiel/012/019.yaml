  text: וְ/אָמַרְתָּ֣ אֶל עַ֣ם הָ/אָ֡רֶץ כֹּֽה אָמַר֩ אֲדֹנָ֨/י יְהוִ֜ה לְ/יוֹשְׁבֵ֤י יְרוּשָׁלִַ֨ם֙ אֶל אַדְמַ֣ת יִשְׂרָאֵ֔ל לַחְמָ/ם֙ בִּ/דְאָגָ֣ה יֹאכֵ֔לוּ וּ/מֵֽימֵי/הֶ֖ם בְּ/שִׁמָּמ֣וֹן יִשְׁתּ֑וּ לְמַ֜עַן תֵּשַׁ֤ם אַרְצָ/הּ֙ מִ/מְּלֹאָ֔/הּ מֵ/חֲמַ֖ס כָּֽל הַ/יֹּשְׁבִ֥ים בָּֽ/הּ־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/012/019.yaml
  text: 'And say to the people of the land[a], ‘Thus says the Lord GOD concerning the inhabitants of Jerusalem in the land of Israel: They will eat their bread with anxiety and drink their water with horror[b], so that her land may be made desolate of its fullness because of the violence of all who dwell in it.’'
  footnotes:
  - marker: a
    text: Or 'drink their water with horror' or 'in dismay'; the Hebrew term can denote appalled desolation as well as devastation.
    reason: lexical_alternative
  - marker: b
    text: Or 'that its land may be laid desolate, stripped of all that fills it.'
    reason: lexical_alternative
