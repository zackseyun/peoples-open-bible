translation:
  language: es
  text: Porque mis enemigos hablan contra mí, y los que acechan mi vida[a] consultan juntos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los que buscan mi vida».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «toman consejo juntos»; el verbo también puede llevar el matiz hostil de «conspirar» en este contexto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la razón de la petición previa con un conector causal natural en español. 'Porque' conserva la fuerza explicativa de כִּי sin sonar forzado en el flujo poético.
- source_word: אָמְרוּ
  english_pob_choice: speak
  chosen_spanish: hablan
  alternatives_spanish:
  - han dicho
  - dicen
  lexicon: HALOT
  rationale: Aunque el hebreo está en perfecto, el contexto poético expresa habla hostil vigente. 'Hablan' transmite la acción continua mejor que un simple pasado en español.
- source_word: אוֹיְבַי
  english_pob_choice: my enemies
  chosen_spanish: mis enemigos
  alternatives_spanish:
  - los que me son hostiles
  - mis adversarios
  lexicon: HALOT
  rationale: Es la correspondencia directa y natural para el sustantivo con sufijo de primera persona. 'Enemigos' mantiene claridad y fuerza.
- source_word: לִי
  english_pob_choice: against me
  chosen_spanish: contra mí
  alternatives_spanish:
  - a mí
  - sobre mí
  lexicon: HALOT
  rationale: Aunque literalmente puede ser 'a mí', en este contexto hostil el español exige 'contra mí' para reflejar el sentido adversativo documentado en la auditoría inglesa.
- source_word: וְשֹׁמְרֵי נַפְשִׁי
  english_pob_choice: those who watch for my life
  chosen_spanish: los que guardan mi vida
  alternatives_spanish:
  - los que acechan mi vida
  - los que buscan mi vida
  - los que vigilan mi vida
  lexicon: HALOT
  rationale: Se conserva la imagen verbal de שׁמר con נֶפֶשׁ, pero en español 'guardar mi vida' resulta más literal y menos interpretativo que 'acechan'. La frase sigue admitiendo la tensión hostil indicada por el contexto y por la nota inglesa sobre posibles sentidos alternativos.
- source_word: נוֹעֲצוּ
  english_pob_choice: consult together
  chosen_spanish: consultan juntos
  alternatives_spanish:
  - se confabulan
  - toman consejo juntos
  lexicon: HALOT
  rationale: '''Consultar juntos'' refleja con fidelidad el sentido básico de deliberar en común, sin imponer de entrada la lectura más fuerte de ''conspirar'', aunque el contexto la sugiera.'
- source_word: יַחְדָּו
  english_pob_choice: together
  chosen_spanish: juntos
  alternatives_spanish:
  - a una
  - en conjunto
  lexicon: HALOT
  rationale: Adverbio simple y natural en español para marcar acción coordinada.
translation_notes:
  revision_awareness: Se siguió de cerca el texto hebreo WLC y la auditoría inglesa. No hubo cambios en la revisión más reciente; se preservó la tensión lexical entre 'guardar/vigilar' y el posible matiz hostil de 'acechar/conspirar' mediante una traducción principal sobria y notas alternativas.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' fuera del versículo porque no aparece el Tetragrámaton en este texto.
  - '''Vida'' traduce נֶפֶשׁ en el sentido de la persona expuesta al peligro, en línea con la auditoría inglesa; no se usó ''alma'' para evitar una lectura menos precisa en este contexto.'
  - El tono es poético y bíblico, pero con sintaxis española natural y publicación-readable.
