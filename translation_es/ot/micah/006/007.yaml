base_translation:
  language: en
  yaml_path: translation/ot/micah/006/007.yaml
  text: Will Yahweh be pleased with thousands of rams[a], with ten thousands of streams of oil? Shall I give my firstborn for my transgression[c][b], the fruit of my body for the sin of my soul?
  footnotes:
  - marker: a
    text: Or 'with myriads of torrents/rivers of oil.' The Hebrew expression is hyperbolic, describing an immense abundance of oil.
    reason: lexical_alternative
  - marker: b
    text: Or 'the fruit of my womb.' Hebrew 'fruit of my body' is an idiom for one's offspring.
    reason: lexical_alternative
  - marker: c
    text: Or 'for the sin offering of my soul/life,' though 'sin' fits the parallel with 'my transgression' more naturally here.
    reason: alternative_reading
