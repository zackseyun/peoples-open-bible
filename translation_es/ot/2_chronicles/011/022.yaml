translation:
  language: es
  text: Y Rehoboam puso a Abías hijo de Maaca como jefe[a] entre sus hermanos, porque se proponía hacerlo rey.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse «sobre sus hermanos»; la preposición hebrea puede marcar primacía o posición en relación con ellos.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲמֵד
  english_pob_choice: appointed
  chosen_spanish: puso
  alternatives_spanish:
  - nombró
  - estableció
  - designó
  lexicon: HALOT
  rationale: El verbo hifil aquí expresa hacer que alguien ocupe una posición; en español, en este contexto narrativo, «puso» comunica la instalación en un cargo de manera natural y directa, sin sobrecargar el verso con tecnicismo administrativo.
- source_word: לָרֹאשׁ
  english_pob_choice: as chief
  chosen_spanish: como jefe
  alternatives_spanish:
  - como cabeza
  - al frente
  - como principal
  lexicon: HALOT
  rationale: רֹאשׁ conserva la idea de «cabeza» o primacía, pero en castellano moderno «jefe» transmite con claridad una posición de preeminencia dentro del grupo familiar.
- source_word: אֶת אֲבִיָּה בֶן מַעֲכָה
  english_pob_choice: Abijah son of Maacah
  chosen_spanish: Abías hijo de Maaca
  alternatives_spanish:
  - Abía hijo de Maaca
  - Abías, hijo de Maaca
  lexicon: Nombres propios
  rationale: Se mantiene la transliteración habitual en español bíblico para los nombres propios. «Hijo de» conserva la construcción filial hebrea de forma transparente.
- source_word: לְנָגִיד
  english_pob_choice: as chief
  chosen_spanish: como jefe
  alternatives_spanish:
  - como príncipe
  - como gobernante
  - como líder
  lexicon: HALOT
  rationale: נָגִיד puede referirse a un líder o gobernante designado. Dado que el texto ya aclara la relación «entre sus hermanos», «jefe» conserva la idea de autoridad o primacía sin introducir una connotación monárquica innecesaria.
- source_word: בְּאֶחָיו
  english_pob_choice: among his brothers
  chosen_spanish: entre sus hermanos
  alternatives_spanish:
  - sobre sus hermanos
  - en medio de sus hermanos
  lexicon: HALOT
  rationale: La preposición ב puede señalar ubicación relacional dentro de un grupo. «Entre sus hermanos» sigue de cerca esa relación y evita fijar de antemano si la idea es estrictamente jerárquica o de precedencia dentro del grupo.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Aquí introduce la razón de la acción de Roboam. «Porque» expresa con naturalidad la causalidad en español moderno.
- source_word: לְהַמְלִיכוֹ
  english_pob_choice: he intended to make him king
  chosen_spanish: se proponía hacerlo rey
  alternatives_spanish:
  - quería hacerlo rey
  - tenía la intención de hacerlo rey
  - pensaba hacerlo rey
  lexicon: HALOT
  rationale: El infinitivo constructo con ל expresa propósito o intención. «Se proponía» refleja bien esa intención deliberada y evita una formulación demasiado mecánica; «hacerlo rey» conserva la relación verbal básica del hebreo.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el último estado de la POB inglesa: se omite cualquier equivalente de un redundante «as ruler» que fue retirado en revisión, y se conserva la cláusula causal breve y directa. También se toma en cuenta la nota auditada sobre בְּאֶחָיו, manteniendo una solución española que permita tanto la idea de precedencia como la de pertenencia al grupo.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando corresponda; este versículo no lo requiere.
  - «Rehoboam» y «Abías/Maaca» se conservan como nombres propios bíblicos en forma hispana habitual.
  - Se prefirió un registro sobrio y narrativo, sin añadir términos eclesiásticos ajenos al hebreo.
