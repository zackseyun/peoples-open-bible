  to: Y le dieron a Judith la tienda de Holofernes, y todos los objetos de plata[a], y los lechos, y los utensilios, y todos sus enseres. Y ella los tomó y los puso sobre su mula, y aparejó sus carretas[b], y los amontonó sobre ellas.
