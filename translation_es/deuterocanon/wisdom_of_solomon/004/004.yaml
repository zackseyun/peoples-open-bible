translation:
  language: es
  text: Porque aun si brota por un tiempo en ramas[a], estando sin firmeza[b] será sacudido por el viento, y por la fuerza de los vientos será arrancado de raíz.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘retoña otra vez’ o ‘echa brotes por una temporada’; el griego conserva la imagen de crecimiento vegetal temporal.
    reason: lexical_alternative
  - marker: b
    text: El singular implícito continúa la metáfora vegetal del versículo anterior en lugar de nombrar explícitamente el referente.
    reason: cross_reference
lexical_decisions:
- source_word: κἂν
  english_pob_choice: even if
  chosen_spanish: aun si
  alternatives_spanish:
  - aunque
  - y aun si
  lexicon: LSJ
  rationale: Conserva el matiz concesivo-condicional de la contracción καὶ ἐάν y suena natural en español sin debilitar la relación hipotética.
- source_word: ἐν κλάδοις
  english_pob_choice: in branches
  chosen_spanish: en ramas
  alternatives_spanish:
  - entre ramas
  - en sus ramas
  lexicon: LSJ
  rationale: El griego mantiene la imagen vegetal sin explicitar posesivo; 'en ramas' reproduce la metáfora de crecimiento en la planta y evita añadir un referente no explicitado.
- source_word: πρὸς καιρόν
  english_pob_choice: for a time
  chosen_spanish: por un tiempo
  alternatives_spanish:
  - por una temporada
  - temporalmente
  lexicon: LSJ
  rationale: Expresa duración limitada de modo claro y sobrio, manteniendo el sentido transitorio del original.
- source_word: ἀναθάλῃ
  english_pob_choice: sprouts
  chosen_spanish: brota
  alternatives_spanish:
  - retoña
  - echa brotes
  lexicon: LSJ
  rationale: El verbo presenta crecimiento vegetal; 'brota' comunica esa imagen con naturalidad en español y preserva la idea de surgimiento de vida nueva.
- source_word: ἐπισφαλῶς
  english_pob_choice: insecurely
  chosen_spanish: inseguro
  alternatives_spanish:
  - precariamente
  - sin firmeza
  lexicon: LSJ
  rationale: El adverbio describe una postura o condición de inestabilidad; en español se vierte con un participio/gerundio adjetival que conserve la idea de falta de seguridad.
- source_word: βεβηκότα
  english_pob_choice: standing
  chosen_spanish: estando
  alternatives_spanish:
  - de pie
  - permaneciendo
  lexicon: LSJ
  rationale: El participio perfecto de βαίνω indica una condición establecida; 'estando' permite unirlo al adverbio anterior y expresar el estado del sujeto sin forzar la sintaxis.
- source_word: σαλευθήσεται
  english_pob_choice: will be shaken
  chosen_spanish: será sacudido
  alternatives_spanish:
  - será agitado
  - será movido
  lexicon: LSJ
  rationale: La pasiva futura comunica desplazamiento por fuerza externa; 'será sacudido' es idiomático y conserva la imagen física.
- source_word: ὑπὸ βίας ἀνέμων
  english_pob_choice: by the force of the winds
  chosen_spanish: por la fuerza de los vientos
  alternatives_spanish:
  - por vientos violentos
  - por la violencia de los vientos
  lexicon: LSJ
  rationale: βία denota fuerza/violencia; la construcción con 'fuerza de los vientos' preserva la intensificación y la agencia causal.
- source_word: ἐκριζωθήσεται
  english_pob_choice: will be uprooted
  chosen_spanish: será arrancado de raíz
  alternatives_spanish:
  - será desarraigado
  - será uprootado
  lexicon: LSJ
  rationale: La imagen literal es botánica; 'arrancado de raíz' comunica con claridad el sentido de desarraigo y mantiene la metáfora vegetal.
theological_decisions:
- issue: Referente singular implícito del sujeto vegetal
  english_pob_reading: The singular 'it' continues the plant metaphor from the previous verse rather than naming the referent explicitly.
  chosen_spanish_reading: Mantener un sujeto impersonal/neutral implícito en vez de nombrar explícitamente al referente.
  alternative_spanish_readings:
  - Porque aun si brota por un tiempo en sus ramas...
  - Porque aun si el hijo brota por un tiempo...
  rationale: El griego usa formas singulares y sigue la metáfora botánica sin introducir un sustantivo interpretativo. El español puede conservar esa apertura con una formulación no explícita, evitando resolver la imagen más allá de lo que el texto dice.
  doctrine_reference: Primacía del texto original y preservación de la tensión metafórica sin expansión interpretativa.
translation_notes:
  revision_awareness: 'La redacción sigue la capa revisada del inglés POB: evita añadir posesivo no explícito en ‘ramas’, y prefiere un verbo vegetal breve para ἀναθάλῃ, manteniendo además la metáfora singular sin especificar el referente.'
  spanish_consistency_notes:
  - Usé ‘Yahvé’ como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - ‘Brota’ conserva la imagen botánica que el audit trail inglés prefirió al más interpretativo ‘puts forth shoots’.
  - ‘Ser arrancado de raíz’ mantiene la metáfora de ἐκριζωθήσεται con español natural y transparente.
  - No se añadió posesivo en ‘ramas’ para respetar la ausencia del posesivo en el griego revisado.
