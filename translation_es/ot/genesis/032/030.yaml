translation:
  language: es
  text: 'Entonces Jacob preguntó[c]: «Por favor, dime tu nombre». Pero él dijo[a][b]: «¿Por qué es que preguntas por mi nombre?» Y lo bendijo allí.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O más naturalmente: «¿Por qué preguntas por mi nombre?»'
    reason: lexical_alternative
  - marker: b
    text: 'O: «¿Por qué es esto que...?»'
    reason: previous_rendering
  - marker: c
    text: 'O: «Entonces Jacob preguntó y dijo»'
    reason: previous_rendering
lexical_decisions:
- source_word: וַיִּשְׁאַל
  english_pob_choice: asked
  chosen_spanish: preguntó
  alternatives_spanish:
  - inquirió
  - le preguntó
  lexicon: HALOT
  rationale: שאל en este contexto significa 'preguntar'. 'Preguntó' es la forma natural y directa en español, y mantiene la simplicidad narrativa del hebreo sin añadir matices ajenos.
- source_word: הַגִּידָה נָּא
  english_pob_choice: Please tell me
  chosen_spanish: Por favor, dime
  alternatives_spanish:
  - Por favor, declárame
  - Dime, por favor
  lexicon: HALOT
  rationale: El imperativo causativo de נגד expresa 'decir / hacer saber / declarar'. Con נָא, el ruego es cortés; 'Por favor, dime' transmite bien tanto la petición como el tono respetuoso en español actual.
- source_word: שְׁמֶךָ
  english_pob_choice: your name
  chosen_spanish: tu nombre
  alternatives_spanish:
  - tu nombre propio
  lexicon: HALOT
  rationale: La expresión es literalmente 'tu nombre'. En este pasaje, 'nombre' conserva su valor normal y también sugiere identidad sin necesidad de ampliación explicativa en el texto principal.
- source_word: לָמָּה זֶּה
  english_pob_choice: Why is it that
  chosen_spanish: ¿Por qué es esto que
  alternatives_spanish:
  - ¿Por qué es que
  - ¿Por qué preguntas así
  lexicon: HALOT
  rationale: La secuencia hebrea tiene una fuerza enfática algo más plena que un simple 'por qué'. La redacción española conserva esa textura con una estructura interrogativa que suena algo marcada, mientras mantiene inteligibilidad.
- source_word: תִּשְׁאַל לִשְׁמִי
  english_pob_choice: you ask my name
  chosen_spanish: preguntas por mi nombre
  alternatives_spanish:
  - inquieres por mi nombre
  - preguntas mi nombre
  lexicon: HALOT
  rationale: El hebreo literalmente dice 'preguntas por mi nombre'. 'Preguntas por mi nombre' conserva el giro idiomático con naturalidad en español y refleja el foco de la respuesta.
- source_word: וַיְבָרֶךְ אֹתוֹ שָׁם
  english_pob_choice: And he blessed him there
  chosen_spanish: Y lo bendijo allí
  alternatives_spanish:
  - Y allí lo bendijo
  - Y lo bendijo en aquel lugar
  lexicon: HALOT
  rationale: ברך se traduce normalmente como 'bendecir'. 'Lo bendijo allí' mantiene la brevedad del hebreo y el énfasis narrativo en el lugar, sin identificar de más al sujeto implícito.
theological_decisions:
- issue: Identidad del interlocutor que responde y bendice
  english_pob_reading: Retain the Hebrew narrative ambiguity with the pronoun 'he' rather than specifying 'God,' 'the man,' or 'the angel.'
  chosen_spanish_reading: Conservar la ambigüedad narrativa con 'él' y el sujeto implícito, sin especificar 'Dios', 'el hombre' ni 'el ángel'.
  alternative_spanish_readings:
  - Pero el hombre dijo...
  - Pero Dios dijo...
  - Pero el ángel dijo...
  rationale: El hebreo no nombra explícitamente al hablante en este versículo. La traducción española preserva esa tensión interpretativa en lugar de resolverla prematuramente, en continuidad con la auditaría inglesa.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La versión inglesa revisada simplificó «asked and said» a «asked» por naturalidad, y suavizó «Why is this that» a «Why is it that». La propuesta española refleja esa misma línea de legibilidad sin perder la fuerza enfática del hebreo.
  spanish_consistency_notes:
  - He usado «Yahvé» no aplica aquí porque el versículo no contiene el nombre divino.
  - He mantenido «tu nombre / mi nombre» de forma literal y clara, evitando sustituciones litúrgicas.
  - He preservado el sujeto implícito de la última cláusula para no cerrar la ambigüedad del texto fuente.
