  source_alignment_summary: 'El borrador español sigue de cerca la secuencia e imágenes del hebreo: león del bosque, lobo de regiones áridas, leopardo vigilante, salida de las ciudades y juicio explicado por transgresiones y apostasías. Sin embargo, hay dos desajustes relevantes con el expediente POB: הִכָּם se debilitó a «los hiere» frente al sentido más fuerte de golpe mortal/judicial («strikes them down»), y la nota [a] está anclada en «hiere» aunque en realidad explica זְאֵב עֲרָבוֹת.'
