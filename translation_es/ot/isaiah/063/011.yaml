revisions:
- from: 'Entonces se acordó de los días antiguos[a], de Moisés y de su pueblo: “¿Dónde está el que los hizo subir del mar con los pastores de su rebaño? ¿Dónde está el que puso[b] en medio de él su Espíritu Santo?”'
  to: 'Entonces se acordó de los días antiguos, de Moisés y de su pueblo: «¿Dónde está el que los hizo subir del mar con los pastores[a] de su rebaño? ¿Dónde está el que puso su Espíritu Santo dentro de él[b]?».'
  rationale: Se ajusta בְּקִרְבּוֹ a «dentro de él» para conservar mejor el singular ambiguo del texto hebreo y la decisión principal documentada por la POB, dejando las alternativas colectivas en nota. También se añade la nota sobre «pastor/pastores» para reflejar el expediente inglés. Se elimina la nota no necesaria sobre «días antiguos» para no sobrecargar el texto con información no preservada como nota en la auditoría.
