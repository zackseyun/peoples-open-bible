translation:
  language: es
  text: Aquel día entonces David designó por primera vez[a] a Asaf y a sus hermanos para dar gracias a Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «designó al frente a Asaf y a sus hermanos para dar gracias a Yahvé», o «designó a Asaf y a sus hermanos como principales para dar gracias a Yahvé». La expresión hebrea es idiomática y puede destacar prioridad, liderazgo o institución inicial.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: On that day
  chosen_spanish: En aquel día
  alternatives_spanish:
  - En ese día
  - Aquel día
  lexicon: HALOT
  rationale: La expresión temporal con ב marca el momento narrativo; «en aquel día» conserva el valor deíctico y suena natural en español bíblico contemporáneo.
- source_word: אָז
  english_pob_choice: then
  chosen_spanish: entonces
  alternatives_spanish:
  - entonces mismo
  - luego
  lexicon: HALOT
  rationale: El adverbio discursivo mantiene la secuencia narrativa. «Entonces» reproduce bien el matiz de continuidad/avance sin sobreexplicar.
- source_word: נָתַן
  english_pob_choice: appointed
  chosen_spanish: puso
  alternatives_spanish:
  - nombró
  - designó
  - asignó
  lexicon: HALOT
  rationale: En este contexto administrativo con בָּרֹאשׁ y בְּיַד, el verbo literalmente «dar» funciona idiomáticamente como establecer o asignar una función. «Puso» permite conservar cierta elasticidad del hebreo y evita forzar un tecnicismo ajeno al giro idiomático.
- source_word: בָּרֹאשׁ
  english_pob_choice: first
  chosen_spanish: por primera vez
  alternatives_spanish:
  - primero
  - como primero
  - al principio
  lexicon: HALOT
  rationale: La frase es idiomática y puede señalar prioridad temporal o establecimiento inicial. «Por primera vez» explicita mejor el valor de institución inicial que «primero» en español, sin decidir de manera rígida entre las posibilidades documentadas.
- source_word: לְהֹדוֹת
  english_pob_choice: to give thanks
  chosen_spanish: para dar gracias
  alternatives_spanish:
  - para agradecer
  - para alabar
  - para confesar
  lexicon: HALOT
  rationale: El infinitivo hifil de ידה en este marco litúrgico expresa agradecer/ dar gracias a Dios; «para dar gracias» es claro y fiel al uso cultual.
- source_word: לַיהוָה
  english_pob_choice: to the LORD / Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - al SEÑOR
  - a YHWH
  lexicon: HALOT
  rationale: Siguiendo la convención del proyecto, el Tetragrámaton se vierte «Yahvé» en el texto principal. La preposición en español se ajusta a la construcción verbal («dar gracias a»).
- source_word: בְּיַד
  english_pob_choice: by the hand of
  chosen_spanish: puso ... a
  alternatives_spanish:
  - por medio de
  - por la mano de
  - mediante
  lexicon: HALOT
  rationale: El hebreo usa un idiomático «por mano de / mediante». En español, la función instrumental ya queda absorbida en la estructura «puso ... a», evitando una literalidad poco idiomática.
- source_word: אָסָף וְאֶחָיו
  english_pob_choice: Asaph and his brothers
  chosen_spanish: a Asaf y a sus hermanos
  alternatives_spanish:
  - a Asaf y a sus hermanos de tribu
  - a Asaf y a sus compañeros
  lexicon: HALOT
  rationale: «Hermanos» reproduce de forma directa אחים y mantiene la relación grupal sin añadir especificaciones no sustentadas por el hebreo.
theological_decisions:
- issue: Rendering of the divine name יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo contiene explícitamente el Nombre divino; por la política del proyecto se preserva como «Yahvé» en vez de ocultarlo tras un sustituto litúrgico. Esto mantiene visible la referencia al nombre pactual.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
- issue: Force of בָּרֹאשׁ in the clause
  english_pob_reading: first / at the head / for the first time
  chosen_spanish_reading: por primera vez
  alternative_spanish_readings:
  - primero
  - como cabeza
  - al frente
  rationale: El hebreo admite una tensión entre prioridad, liderazgo e institución inicial. La redacción española conserva esa ambigüedad con una solución que no la elimina y sigue siendo natural para lectura pública.
  doctrine_reference: 'DOCTRINE.md: Idiomatic Hebrew expressions — preserve documented ambiguity when warranted'
translation_notes:
  revision_awareness: La redacción sigue de cerca el audit trail en inglés, pero ajusta la sintaxis para un español publicable. Se mantiene la secuencia temporal («En aquel día, entonces»), el valor idiomático de נָתַן y la ambigüedad de בָּרֹאשׁ mediante una nota textual. Se conserva el Nombre divino como «Yahvé» conforme a la política del proyecto.
  spanish_consistency_notes:
  - Se usa «Yahvé» consistentemente para יהוה.
  - «Hermanos» conserva el paralelo con el inglés auditado y con אחים.
  - La cláusula final «para dar gracias» mantiene el sentido litúrgico de לְהֹדוֹת sin introducir «alabar» como lectura principal.
  - Se evita «SEÑOR» como máscara del Nombre divino, según la terminología del proyecto.
  - «Puso» se eligió para reflejar la función idiomática de נָתַן sin sobrerregularizarlo como «nombró» en el cuerpo principal.
