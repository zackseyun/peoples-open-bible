revisions:
- from: Los nefilim[a] estaban en la tierra en aquellos días—y también después—cuando los hijos de Dios[b] entraron a las hijas del hombre[c], y ellas les dieron hijos. Esos fueron los valientes de la antigüedad, hombres de renombre.
  to: Había nefilim[a] en la tierra en aquellos días —y también después—, cuando los hijos de Dios[b] se unieron a las hijas del hombre[c], y ellas les dieron hijos. Esos fueron los hombres poderosos de la antigüedad, hombres de renombre.
  rationale: Se ajusta el texto para expresar en español natural el idiomatismo sexual de יָבֹאוּ אֶל sin resolver la ambigüedad teológica ni añadir detalle interpretativo. También se mejora la fuerza léxica de הַגִּבֹּרִים con «hombres poderosos» y la naturalidad de la apertura con «Había ... en la tierra». Las notas existentes siguen siendo adecuadas y no requieren cambio de contenido ni de marcadores.
