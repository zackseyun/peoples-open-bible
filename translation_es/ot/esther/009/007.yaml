  lexicon: HALOT
  rationale: Nombre propio de origen persa; se translitera. Se prefiere una forma breve y legible en español, sin añadir valor semántico que el hebreo no proporciona.
- source_word: וְאֵת
  english_pob_choice: '[not separately translated; represented by simple coordination/punctuation in the list]'
