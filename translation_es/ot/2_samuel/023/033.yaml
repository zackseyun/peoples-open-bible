lexical_decisions:
- source_word: שַׁמָּה
  english_pob_choice: Shammah
  chosen_spanish: Shammah
  alternatives_spanish:
  - Samá
  lexicon: HALOT
  rationale: Es un nombre propio; se translitera para conservar la forma nominal del texto fuente. "Samá" sería una adaptación fonética posible en español, pero aquí la transliteración mantiene mejor la trazabilidad con el hebreo y con la tradición auditada en inglés.
- source_word: הֲרָרִי
  english_pob_choice: the Hararite
  chosen_spanish: el hararita
  alternatives_spanish:
  - el montañés
  - el hombre de Harar
  lexicon: HALOT
  rationale: Se trata de un gentilicio/adjetivo de pertenencia. En español, "hararita" reproduce la forma étnica con naturalidad en una lista de nombres. Se evita "montañés" porque pierde el valor identificatorio propio del roster.
- source_word: אֲחִיאָם
  english_pob_choice: Ahiam
  chosen_spanish: Ahiam
  alternatives_spanish:
  - Ajíam
  lexicon: HALOT
  rationale: Nombre propio transliterado. "Ahiam" conserva la correspondencia directa con el texto hebreo y con la auditoría en inglés.
- source_word: בֶּן
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - el hijo de
  lexicon: HALOT
  rationale: La construcción genealógica se expresa de forma idiomática en español con "hijo de". Es fiel y natural en un listado de linaje.
- source_word: שָׁרָר
  english_pob_choice: Sharar
  chosen_spanish: Sharar
  alternatives_spanish:
  - Sarar
  lexicon: HALOT
  rationale: Nombre propio transliterado para preservar la forma del original y la continuidad con el registro auditado.
- source_word: הָאֲרָרִי
  english_pob_choice: the Ararite
  chosen_spanish: el ararita
  alternatives_spanish:
  - el hararita
  lexicon: HALOT
  rationale: Se conserva la distinción del segundo gentilicio como la lectura preferida por la auditoría inglesa. En español se distingue de "hararita" para no aplanar la diferencia consonántica señalada en el hebreo.
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios necesarios; el presente borrador sigue la lectura aprobada y conserva la distinción entre הֲרָרִי y הָאֲרָרִי según el aviso auditado.
  spanish_consistency_notes:
  - Se mantiene el estilo de lista nominal breve y sobrio propio del pasaje.
  - Se conserva la transliteración de los nombres propios para máxima trazabilidad.
  - Se evita normalizar ambos gentilicios a una sola forma española para respetar la tensión textual documentada.
