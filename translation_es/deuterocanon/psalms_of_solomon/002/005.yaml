translation:
  language: es
  text: Eso[a] fue despreciado delante de Dios; eso fue deshonrado hasta el fin.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «fue tratado como nada delante de Dios».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξουδενώθη
  english_pob_choice: was despised
  chosen_spanish: fue despreciado
  alternatives_spanish:
  - fue tratado como nada
  - fue reducido a nada
  lexicon: LSJ
  rationale: El griego pasivo de ἐξουδενόω expresa ser considerado en nada o despreciado. «Fue despreciado» comunica naturalmente la vergüenza y el menosprecio sin ampliar indebidamente el sentido.
- source_word: ἐνώπιον τοῦ θεοῦ
  english_pob_choice: before God
  chosen_spanish: delante de Dios
  alternatives_spanish:
  - ante Dios
  - a la vista de Dios
  lexicon: LSJ
  rationale: La preposición marca la evaluación divina. «Delante de Dios» conserva la relación espacial/judicial de manera clara y natural en español.
- source_word: ἠτιμώθη
  english_pob_choice: was dishonored
  chosen_spanish: fue deshonrado
  alternatives_spanish:
  - fue deshonrado y avergonzado
  - fue deshonrado públicamente
  lexicon: LSJ
  rationale: El verbo destaca pérdida de honra y estatus. «Fue deshonrado» sigue de cerca el griego y mantiene el paralelismo con la primera cola.
- source_word: ἕως εἰς τέλος
  english_pob_choice: to the end
  chosen_spanish: hasta el fin
  alternatives_spanish:
  - completamente
  - hasta el extremo
  lexicon: LSJ
  rationale: La secuencia intensifica el grado o la extensión de la deshonra. «Hasta el fin» preserva la literalidad y el énfasis temporal/intensivo sin convertirlo en una paráfrasis interpretativa.
theological_decisions:
- issue: Sujeto implícito singular de los verbos pasivos
  english_pob_reading: It was despised before God; it was dishonored to the end.
  chosen_spanish_reading: Fue despreciado delante de Dios; fue deshonrado hasta el fin.
  alternative_spanish_readings:
  - Fue despreciado delante de Dios; fue deshonrado hasta el fin. (con sujeto tácito impersonal)
  - Fue despreciado delante de Dios; ello fue deshonrado hasta el fin.
  rationale: El audit trail en inglés corrigió un sujeto incorrecto («He») y volvió a «It» porque el referente es el objeto/santuario del contexto previo, no la persona del versículo 1. En español, se deja el sujeto implícito de manera impersonal y coherente con la pasiva, sin introducir un pronombre que fuerce un antecedente indebido.
  doctrine_reference: Contexto literario inmediato de Salmos de Salomón 2:2–5; revisión aplicada que identifica el referente como el santuario/altar o la gloria de Dios, no el pecador de 2:1.
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión aplicada que corrigió el sujeto de los verbos pasivos de «he» a «it» y la revisión posterior que prefirió «before God» y «dishonored to the end» como opciones más literales. La redacción española conserva ese cambio de referente y refleja la literalidad final sin perder naturalidad.
  spanish_consistency_notes:
  - Se evitó «Señor» como máscara para el nombre divino porque el texto griego usa θεοῦ y no κύριος.
  - «Despreciado» y «deshonrado» mantienen la carga de vergüenza social y judicial del griego.
  - No se añadió un sujeto explícito para no desviar el referente del objeto/santuario señalado por el aparato de revisión.
