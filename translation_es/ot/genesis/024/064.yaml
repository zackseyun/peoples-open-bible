review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo y el rastro de auditoría inglés: «alzó sus ojos», «vio a Isaac» y el sentido idiomático de וַתִּפֹּל מֵעַל הַגָּמָל como desmontar en vez de una caída accidental. La nota léxica también preserva la alternativa literal documentada.'
  spanish_quality_summary: La redacción es clara y digna, pero el anclaje de la nota está en «camello[a]», lo que puede hacer parecer que la nota trata del sustantivo y no de toda la acción verbal. Conviene mover la marca al verbo o al final de la cláusula. Además, en la nota suena más natural «desde encima del camello» que «de encima del camello».
  glossary_alignment: No hay términos teológicos de glosario mayor en juego. Los nombres propios y el registro general concuerdan con las pautas. «Isaac» y «Rebeca» son apropiados; «descendió del camello» mantiene el valor idiomático aprobado por la POB inglesa.
  issues:
  - severity: low
    issue: La marca de nota está anclada en «camello[a]» en vez de en la acción completa de desmontar.
    rationale: La nota explica la expresión verbal «cayó de sobre el camello» frente a «descendió», no el sustantivo «camello». Un anclaje mejor evita ambigüedad editorial.
  - severity: low
    issue: La nota usa «de encima del camello», formulación algo menos natural en español.
    rationale: «Desde encima del camello» o «de sobre el camello» suena más idiomático y claro en español contemporáneo.
  revised_spanish_text: Rebeca alzó sus ojos y vio a Isaac, y descendió[a] del camello.
