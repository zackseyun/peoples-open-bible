  yaml_path: translation/deuterocanon/2_maccabees/012/035.yaml
  text: But a certain Dositheus[a], one of Bacenor’s men, a mounted man and strong, had hold of Gorgias; and seizing his cloak, he was dragging him along forcefully, intending to take the accursed man alive, when one of the Thracian horsemen rushed upon him and struck off his shoulder, and Gorgias escaped to Marisa.
