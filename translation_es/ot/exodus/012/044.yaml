revisions:
- from: Pero todo esclavo[a] de un hombre, comprado con dinero, después de que lo hayas circuncidado, entonces podrá comer de ello[b].
  to: Pero todo esclavo[a] de un hombre, comprado con dinero, cuando lo hayas circuncidado, podrá comer de ella[b].
  rationale: 'Se hizo una reparación menor para mejorar la naturalidad del español sin apartarse del hebreo ni del audit trail inglés: se sustituyó «después de que..., entonces» por «cuando..., podrá», que sigue expresando la condición previa; y «de ello» por «de ella», con referencia contextual a la comida pascual/Pascua, más idiomática en español. También se pulió la nota alternativa.'
