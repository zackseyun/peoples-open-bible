translation:
  language: es
  text: Así que entré y miré, y he aquí, toda forma de reptil y de bestia detestable, y todos los ídolos[a] de la casa de Israel estaban grabados en la pared, por todas partes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo גִּלּוּלֵי (‘ídolos’) es un término fuertemente despectivo; alternativamente, ‘ídolos de estiércol’ o ‘ídolos inmundos’.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָ/אָבוֹא
  english_pob_choice: So I went in
  chosen_spanish: Así que entré
  alternatives_spanish:
  - Y entré
  - Entonces entré
  lexicon: HALOT
  rationale: La forma wayyiqtol avanza la narración. «Así que» conserva la progresión narrativa del inglés POB sin sonar mecánico; «entré» expresa naturalmente la entrada en el espacio mostrado a Ezequiel.
- source_word: וָֽ/אֶרְאֶה
  english_pob_choice: looked
  chosen_spanish: miré
  alternatives_spanish:
  - vi
  - miré y vi
  lexicon: HALOT
  rationale: Aquí ראה sigue a la entrada y describe la inspección visual. «Miré» evita la redundancia con «he aquí» y mantiene el acto de observar la escena.
- source_word: וְ/הִנֵּה
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - y he aquí
  - mira
  lexicon: HALOT
  rationale: La fórmula introduce la escena con viveza profética. «He aquí» preserva esa inmediatez con un registro digno y bíblico en español.
- source_word: כָל תַּבְנִית
  english_pob_choice: every form of
  chosen_spanish: toda clase de figura de
  alternatives_spanish:
  - toda forma de
  - toda imagen de
  - todo tipo de representación de
  lexicon: HALOT
  rationale: תַּבְנִית puede significar forma, semejanza o representación. En este contexto de relieves o imágenes en la pared, «figura de» transmite bien el carácter representacional sin decidir indebidamente entre estatua, dibujo o talla.
- source_word: רֶמֶשׂ
  english_pob_choice: creeping thing
  chosen_spanish: reptil
  alternatives_spanish:
  - animal que se arrastra
  - ser que se arrastra
  - criatura rastrera
  lexicon: HALOT
  rationale: Aunque el campo semántico incluye seres que se arrastran, en español «reptil» comunica de modo natural una categoría de criaturas bajas o rastreras en este catálogo visual. Se opta por un término claro y digno, sin perder la idea de lo impuro o animal.
- source_word: וּ/בְהֵמָה
  english_pob_choice: beast
  chosen_spanish: animal
  alternatives_spanish:
  - bestia
  - ganado
  lexicon: HALOT
  rationale: בְּהֵמָה puede referirse a animal o bestia. En español, «animal» es más amplio y natural en el emparejamiento con «reptil», mientras que «bestia» puede sonar más interpretativa o cargada.
- source_word: שֶׁקֶץ
  english_pob_choice: detestable
  chosen_spanish: detestable
  alternatives_spanish:
  - abominable
  - repugnante
  - inmundo
  lexicon: HALOT
  rationale: El adjetivo conserva el valor de repulsión ritual y moral. Se integra como modificador de «animal», reflejando la secuencia hebrea sin introducir una explicación ajena al texto.
- source_word: גִּלּוּלֵי
  english_pob_choice: idols
  chosen_spanish: ídolos
  alternatives_spanish:
  - ídolos de estiércol
  - ídolos inmundos
  - fetiches
  lexicon: HALOT
  rationale: El término es deliberadamente despectivo. «Ídolos» funciona como término principal en el texto, mientras la dureza peyorativa se preserva en la nota para no romper la fluidez del español publicado.
- source_word: בֵּית יִשְׂרָאֵל
  english_pob_choice: the house of Israel
  chosen_spanish: la casa de Israel
  alternatives_spanish:
  - Israel
  - la familia de Israel
  lexicon: HALOT
  rationale: Se conserva la designación profética tradicional, que en el español bíblico resulta clara y mantiene la forma del constructo hebreo.
- source_word: מְחֻקֶּה
  english_pob_choice: were engraved
  chosen_spanish: estaban grabados
  alternatives_spanish:
  - estaban esculpidos
  - fueron grabados
  - estaban inscritos
  lexicon: HALOT
  rationale: El participio pasivo indica imágenes grabadas o talladas. «Estaban grabados» es natural en español y corresponde bien a un relieve o inscripción en una pared.
- source_word: עַל הַ/קִּיר
  english_pob_choice: on the wall
  chosen_spanish: en la pared
  alternatives_spanish:
  - sobre la pared
  - en el muro
  lexicon: HALOT
  rationale: «En la pared» es la expresión más natural en español moderno para ubicar las figuras. «Muro» sería posible, pero aquí «pared» encaja mejor con el interior del recinto.
- source_word: סָבִיב סָבִיב
  english_pob_choice: all around
  chosen_spanish: todo alrededor
  alternatives_spanish:
  - en derredor
  - por todas partes
  - alrededor
  lexicon: HALOT
  rationale: La repetición hebrea intensifica la extensión total. «Todo alrededor» conserva esa plenitud de manera idiomática y transparente.
theological_decisions:
- issue: Término despectivo para los ídolos
  english_pob_reading: Render גִּלּוּלֵי as 'idols' in the main text while preserving the contemptuous nuance in a footnote.
  chosen_spanish_reading: «Ídolos» en el texto principal, con nota que explicita que el hebreo es un término fuertemente despectivo.
  alternative_spanish_readings:
  - ídolos de estiércol
  - ídolos inmundos
  - muñecos idolátricos
  rationale: El hebreo es intencionalmente insultante, pero un calco demasiado brusco en el texto principal sonaría artificial y podría distraer de la visión. La nota preserva la carga retórica sin sacrificar legibilidad.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented exception) and §6 (readable modern Spanish)
- issue: Carácter de las imágenes en la pared
  english_pob_reading: every form of creeping thing and detestable beast ... were engraved on the wall
  chosen_spanish_reading: toda clase de figura de reptil y de animal detestable ... estaban grabados en la pared
  alternative_spanish_readings:
  - toda imagen de reptil y animal detestable
  - toda forma de ser que se arrastra y de bestia inmunda
  rationale: El texto describe imágenes o relieves, no criaturas vivas. «Figura de» y «grabados» conservan la tensión entre representación y objeto material, evitando especificar más de lo que el hebreo exige.
  doctrine_reference: Translation philosophy §6 (readable modern Spanish) and §5 (consistency of key terms, or documented exception)
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del inglés POB, que ajustó la secuencia para reflejar con mayor precisión «every form of creeping thing and detestable beast». En español se conservó esa relación semántica mediante «reptil y ... animal detestable», manteniendo la enumeración completa y la lectura visionaria del pasaje.
  spanish_consistency_notes:
  - Se mantiene Yahvé para el Tetragrámaton en este pasaje no aplicable; no hay sustitución por SEÑOR.
  - Se eligió «ídolos» como término principal para גִּלּוּלֵי, con nota sobre su tono despectivo.
  - «Casa de Israel» conserva el giro profético del hebreo sin reducirlo a «Israel».
  - «He aquí» reproduce la fórmula de presentación visionaria de forma sobria y reconocible.
