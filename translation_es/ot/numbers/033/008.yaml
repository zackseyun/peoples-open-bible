base_translation:
  language: en
  yaml_path: translation/ot/numbers/033/008.yaml
  text: They set out from before Hahiroth and passed through the midst of the sea into the wilderness[b][a], and they went a three-day journey in the wilderness of Etham and camped at Marah.
  footnotes:
  - marker: a
    text: 'Hebrew: ''from before Hahiroth.'' Exodus more commonly names the site ''Pi-hahiroth''; Numbers 33:8 here lacks the element ''Pi-,'' so the shorter form is retained rather than harmonized.'
    reason: alternative_reading
  - marker: b
    text: Or 'they went three days' journey in the wilderness of Etham.'
    reason: lexical_alternative
