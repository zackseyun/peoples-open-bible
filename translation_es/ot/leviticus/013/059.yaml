translation:
  language: es
  text: Esta es la ley para un brote de enfermedad leprosa en una prenda de lana o en una prenda de lino, o en la urdimbre o en la trama[a], o en cualquier objeto de cuero, para declararlo limpio o declararlo impuro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los hilos transversales»; «trama» se refiere a los hilos que cruzan la urdimbre en el tejido.
    reason: lexical_alternative
lexical_decisions:
- source_word: תּוֹרַת
  english_pob_choice: the law for
  chosen_spanish: la ley para
  alternatives_spanish:
  - la instrucción para
  - la regulación para
  lexicon: HALOT
  rationale: En este contexto legal-sacerdotal, תּוֹרַת introduce la norma que rige el caso. «Ley» comunica con concisión esa función normativa; «para» conserva la relación constructa con lo que sigue.
- source_word: נֶגַע
  english_pob_choice: outbreak
  chosen_spanish: erupción
  alternatives_spanish:
  - aflicción
  - plaga
  - marca
  lexicon: HALOT
  rationale: El término señala una manifestación visible o brote del problema en el objeto afectado. «Erupción» funciona bien en español para una alteración visible de la superficie sin cargar con la idea de epidemia.
- source_word: צָרַעַת
  english_pob_choice: leprous disease
  chosen_spanish: lepra
  alternatives_spanish:
  - enfermedad leprosa
  - lepra ritual
  - enfermedad contaminante
  lexicon: HALOT
  rationale: Como el contexto aquí incluye prendas y objetos de cuero, la referencia no es a una condición clínica moderna sino a la categoría ritual del texto. «Lepra» mantiene la continuidad tradicional en español y es suficientemente amplia en este pasaje; en nota se preserva la tensión semántica implícita por el uso ritual del término.
- source_word: בֶּגֶד הַצֶּמֶר
  english_pob_choice: a wool garment
  chosen_spanish: una prenda de lana
  alternatives_spanish:
  - una vestidura de lana
  - una prenda lanera
  lexicon: HALOT
  rationale: La construcción describe una prenda hecha de lana. «Prenda de lana» suena natural en español y conserva el valor material del hebreo.
- source_word: הַפִּשְׁתִּים
  english_pob_choice: a linen garment
  chosen_spanish: una prenda de lino
  alternatives_spanish:
  - la prenda de lino
  - una vestidura de lino
  - una prenda de lino/flax
  lexicon: HALOT
  rationale: En paralelo con lana, el hebreo se refiere a una prenda hecha de lino. «Lino» es la equivalencia usual y clara en español.
- source_word: הַשְּׁתִי
  english_pob_choice: the warp
  chosen_spanish: la urdimbre
  alternatives_spanish:
  - el orillo
  - los hilos longitudinales
  lexicon: HALOT
  rationale: Es el término técnico textil para los hilos longitudinales del tejido. «Urdimbre» es el equivalente estándar y preciso en español.
- source_word: הָעֵרֶב
  english_pob_choice: the woof
  chosen_spanish: la trama
  alternatives_spanish:
  - la weft
  - los hilos transversales
  lexicon: HALOT
  rationale: Término técnico emparejado con la urdimbre. «Trama» es el correlato natural y claro en español; conserva la oposición técnica del tejido.
- source_word: כָּל כְּלִי עוֹר
  english_pob_choice: any leather article
  chosen_spanish: cualquier objeto de cuero
  alternatives_spanish:
  - cualquier artículo de cuero
  - cualquier utensilio de cuero
  - cualquier recipiente de cuero
  lexicon: HALOT
  rationale: כְּלִי es un término amplio para objeto, utensilio o artículo. «Objeto de cuero» mantiene amplitud y naturalidad en español sin estrechar el sentido.
- source_word: לְטַהֲרוֹ
  english_pob_choice: for pronouncing it clean
  chosen_spanish: para declararlo limpio
  alternatives_spanish:
  - para pronunciarlo limpio
  - para considerarlo limpio
  lexicon: HALOT
  rationale: En contexto sacerdotal, la forma verbal expresa una determinación ritual/jurídica de estado. «Declararlo limpio» comunica bien esa función en español.
- source_word: לְטַמְּאוֹ
  english_pob_choice: or pronouncing it unclean
  chosen_spanish: o declararlo impuro
  alternatives_spanish:
  - o pronunciarlo impuro
  - o considerarlo impuro
  lexicon: HALOT
  rationale: Se mantiene el paralelismo con «declararlo limpio». «Impuro» conserva el registro ritual bíblico y evita introducir una noción meramente moral o higiénica.
theological_decisions:
- issue: Alcance de צָרַעַת en prendas y objetos de cuero
  english_pob_reading: leprous disease
  chosen_spanish_reading: lepra
  alternative_spanish_readings:
  - enfermedad leprosa
  - lepra ritual
  - enfermedad contaminante
  rationale: El hebreo designa una categoría ritual más amplia que la lepra clínica moderna y se aplica también a objetos. En español, «lepra» mantiene la conexión bíblica tradicional sin añadir una especificación médica ajena al texto; el contexto de declararlo limpio o impuro conserva el marco de pureza ritual.
  doctrine_reference: Translation philosophy §1 (Original-language primacy over translation tradition)
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión posterior del texto inglés, que sustituyó una formulación más genérica por «leprous disease» para reflejar mejor צָרַעַת en un contexto de prendas y cuero. La versión española refleja esa decisión manteniendo el término bíblico tradicional «lepra» y el marco ritual de pureza/impureza.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto solo cuando aparece el tetragrámaton; este versículo no lo contiene.
  - 'Se usó terminología ritual consistente: «limpio/impuro» y no vocabulario moralizante.'
  - 'Se conservaron los dos tecnicismos textiles con equivalencia española estable: «urdimbre» y «trama».'
