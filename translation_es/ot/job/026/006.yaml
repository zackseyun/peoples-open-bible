translation:
  language: es
  text: Seol[a] yace desnudo delante de él, y Abadón[b] no tiene cubierta.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “Seol está al descubierto delante de él”.
    reason: lexical_alternative
  - marker: b
    text: Abadón también puede traducirse “Destrucción”.
    reason: lexical_alternative
lexical_decisions:
- source_word: עָרוֹם
  english_pob_choice: lies naked
  chosen_spanish: Desnudo está
  alternatives_spanish:
  - está desnudo
  - yace desnudo
  - está al descubierto
  lexicon: HALOT
  rationale: El adjetivo significa ‘desnudo, desnudo/bare’. En español, ‘Desnudo está’ mantiene la imagen poética de desnudez sin añadir más interpretación que ‘está al descubierto’. La inversión ayuda al paralelismo con la segunda cola.
- source_word: שְׁאוֹל
  english_pob_choice: Sheol
  chosen_spanish: Seol
  alternatives_spanish:
  - el sepulcro
  - el reino de los muertos
  lexicon: HALOT
  rationale: Se conserva el término técnico como ‘Seol’ para no aplanar el concepto a ‘sepulcro’ ni explicar de más ‘reino de los muertos’. Así se preserva la imagen y el rango conceptual del hebreo.
- source_word: נֶגְדּוֹ
  english_pob_choice: before him
  chosen_spanish: delante de él
  alternatives_spanish:
  - en su presencia
  - ante él
  lexicon: HALOT
  rationale: ‘Delante de él’ es una equivalencia natural y directa para נֶגֶד con sufijo de tercera persona. Mantiene el referente implícito a Dios sin explicitarlo en exceso.
- source_word: אֵין
  english_pob_choice: has no
  chosen_spanish: no tiene
  alternatives_spanish:
  - no hay
  - carece de
  lexicon: HALOT
  rationale: En español, con un sustantivo concreto como ‘cobertura’, ‘no tiene’ reproduce bien el valor privativo de אֵין con una sintaxis fluida y fiel.
- source_word: כְּסוּת
  english_pob_choice: covering
  chosen_spanish: cobertura
  alternatives_spanish:
  - cobertura
  - cobijo
  - cubierta
  lexicon: HALOT
  rationale: ‘Cobertura’ conserva la metáfora de ‘covering’ y funciona bien en paralelo con ‘desnudo’. ‘Cobijo’ o ‘cubierta’ introducirían matices menos directos para este contexto poético.
- source_word: אֲבַדּוֹן
  english_pob_choice: Abaddon
  chosen_spanish: Abadón
  alternatives_spanish:
  - Destrucción
  - el lugar de destrucción
  lexicon: HALOT
  rationale: Se translitera como ‘Abadón’ para preservar la fuerza poética y la resonancia intertextual, en vez de reducirlo a un abstracto como ‘Destrucción’. La forma española normaliza la grafía sin perder el nombre propio.
theological_decisions:
- issue: Referente del sufijo de 3 ms en נֶגְדּוֹ
  english_pob_reading: The suffix refers to God ('before him').
  chosen_spanish_reading: El sufijo se refleja como ‘de él’, con el referente entendido por el contexto como Dios.
  alternative_spanish_readings:
  - ante él
  - en su presencia
  rationale: La construcción española conserva la ambigüedad controlada del hebreo y permite que el contexto de Job determine el referente sin sobreexplicar. ‘Delante de él’ mantiene la relación espacial/relacional sugerida por נֶגֶד.
  doctrine_reference: Job 26:6; lectura contextual del discurso sobre la soberanía divina y las regiones ocultas.
translation_notes:
  revision_awareness: 'Se siguió de cerca el audit trail inglés: se preservó la personificación/imagen poética de Seol y Abadón, y se mantuvo la opción de traducción alternativa para cada término con posible tensión léxica. No hubo revisiones aplicadas en el pasaje fuente.'
  spanish_consistency_notes:
  - Se usa ‘Seol’ como transliteración técnica, coherente con el tratamiento del término en sabiduría bíblica.
  - ‘Abadón’ se reserva como nombre/forma poética, no como abstracción, para mantener el paralelismo con ‘Seol’.
  - La sintaxis ‘Desnudo está’ sigue el orden poético del hebreo y sugiere una lectura elevada sin sonar arcaizante.
  - ‘Cobertura’ se eligió por su transparencia semántica en español y su relación con ‘desnudo’.
