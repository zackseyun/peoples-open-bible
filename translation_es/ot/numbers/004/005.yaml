revisions:
- from: Cuando el campamento se ponga en marcha[a], Aarón y sus hijos vendrán y bajarán el velo del cortinaje, y cubrirán con él el arca del testimonio.
  to: Cuando el campamento se ponga en marcha, Aarón y sus hijos vendrán y quitarán el velo de la cortina, y cubrirán con él el arca del testimonio[a].
  rationale: Se corrige la nota al pie para que refleje la alternativa tradicional documentada por el POB inglés y se ancle al término realmente debatido, «arca del testimonio». Además, se suaviza la redacción española con «quitarán» y «velo de la cortina» para mayor naturalidad sin apartarse del hebreo.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:32:36Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo en la estructura principal: circunstancia temporal, sujeto compuesto, acción de quitar la cortina/velo, y cubrir el arca con ella. También preserva correctamente אֲרֹן הָעֵדֻת como «arca del testimonio». Sin embargo, la nota al pie no corresponde al audit trail inglés: el inglés pone como alternativa tradicional «the ark of the covenant», no una reformulación de «cuando el campamento se ponga en marcha».'
  spanish_quality_summary: 'El español es generalmente claro y digno, pero «velo del cortinaje» suena algo forzado y «bajarán» puede sonar menos natural que «quitarán» o «descolgarán» en este contexto cultual. La mayor deficiencia es la nota al pie, que introduce una alternativa equivocada y además ancla en una frase que no requiere nota según la evidencia inglesa. Conviene simplificar la expresión del velo para una lectura más natural en español e introducir la nota donde corresponde: «arca del testimonio[a]».'
  glossary_alignment: No hay conflicto con la terminología del proyecto en nombres divinos o títulos. Se alinea bien con la decisión clave de mantener «testimonio» en lugar de «pacto». La revisión propuesta conserva esa prioridad léxica y añade la nota tradicional correcta.
  issues:
  - severity: high
    issue: La nota al pie está anclada a la frase equivocada y transmite una alternativa equivocada.
    rationale: El audit trail inglés conserva una nota sobre «the ark of the testimony» con alternativa tradicional «the ark of the covenant». El borrador español pone una nota sobre «Cuando el campamento se ponga en marcha», lo cual no está sustentado por la evidencia fuente ni por el POB inglés.
  - severity: medium
    issue: «velo del cortinaje» resulta algo pesado y poco idiomático.
    rationale: Aunque intenta reflejar פָּרֹכֶת הַמָּסָךְ, en español suena redundante. «velo de la cortina» o simplemente «velo de la pantalla/cobertura» no son ideales; una solución más natural es «el velo que hace de cortina» no sería suficientemente literal. «Velo de la cortina» sigue siendo mejor que «velo del cortinaje» para legibilidad.
  - severity: low
    issue: «bajarán» puede sonar menos preciso que una opción de desmontaje como «quitarán».
    rationale: וְהוֹרִדוּ en contexto de desmontar el santuario permite «quitarán» de forma natural en español sin perder el matiz de retirar de su lugar. No es un error grave, pero la revisión mejora la fluidez.
  revised_spanish_text: Cuando el campamento se ponga en marcha, Aarón y sus hijos vendrán y quitarán el velo de la cortina, y cubrirán con él el arca del testimonio[a].
  revised_footnotes:
  - marker: a
    text: O, más tradicionalmente, «el arca del pacto». Sin embargo, el hebreo aquí dice «testimonio».
    reason: lexical_alternative
  revision_rationale: Se corrige la nota al pie para que refleje la alternativa tradicional documentada por el POB inglés y se ancle al término realmente debatido, «arca del testimonio». Además, se suaviza la redacción española con «quitarán» y «velo de la cortina» para mayor naturalidad sin apartarse del hebreo.
