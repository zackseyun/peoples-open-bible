revisions:
- from: No llevarás un informe falso[a]. No te unirás a un hombre malvado[b] para ser testigo de maldad.
  to: No difundirás un informe falso[a]. No te unirás a un hombre malvado[b] para ser un testigo malicioso.
  rationale: La revisión corrige dos puntos donde el español no transmitía con suficiente precisión el sentido fuente ni la trayectoria auditada del POB inglés. 'Difundirás' expresa mejor el modismo de propagar un reporte falso, mientras la nota preserva la literalidad de 'llevar/cargar'. 'Ser un testigo malicioso' recupera el valor judicial de עֵד חָמָס de manera más idiomática y fiel que 'testigo de maldad', y la nota conserva tanto el modismo de la mano como las alternativas léxicas documentadas.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:45:16Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura de dos prohibiciones y mantiene la referencia a un hombre malvado. Sin embargo, en dos puntos clave no preserva con suficiente fidelidad el sentido auditado: תִשָּׂא שֵׁמַע שָׁוְא se entiende idiomáticamente como difundir/circular un reporte falso, no simplemente ''llevar'' en español; y לִהְיוֹת עֵד חָמָס en contexto judicial queda mejor como ''ser un testigo malicioso'' o ''injusto'' que ''testigo de maldad'', que suena menos idiomático y más ambiguo respecto a la función testimonial.'
  spanish_quality_summary: El español es generalmente claro, pero 'No llevarás un informe falso' suena poco natural para el acto de propagar un reporte, y 'para ser testigo de maldad' no es una construcción española natural en registro bíblico-jurídico. 'Informe' es defendible, aunque 'reporte' o 'rumor' serían más cotidianos; aun así, con un mejor verbo principal el texto puede quedar bien. La nota b también debería recoger la alternativa de 'testigo malicioso/injusto', ya que el inglés POB la documenta.
  glossary_alignment: 'No hay conflicto con la terminología global del proyecto. La revisión necesaria es principalmente lexical y de naturalidad: conviene alinear mejor תִשָּׂא con ''difundir'' en el texto principal, manteniendo ''llevar/cargar'' en nota, y alinear עֵד חָמָס con ''testigo malicioso'', preservando en nota las alternativas literales y contextuales.'
  issues:
  - severity: medium
    issue: '''No llevarás un informe falso'' no comunica bien el modismo hebreo en español'
    rationale: Aunque נָשָׂא puede significar 'llevar', con שֵׁמַע el sentido es circular o difundir un reporte. En español, 'llevar un informe' sugiere transportarlo físicamente más que propagarlo verbalmente.
  - severity: medium
    issue: '''para ser testigo de maldad'' es poco idiomático y debilita el matiz judicial'
    rationale: עֵד חָמָס describe un testigo cuya declaración hace violencia a la justicia; el audit trail inglés revisó a 'malicious witness'. 'Testigo de maldad' puede entenderse como testigo acerca de maldad, no como testigo malicioso/injusto.
  - severity: low
    issue: La nota b omite la alternativa contextual para עֵד חָמָס
    rationale: El POB inglés documenta no solo el modismo 'poner la mano con', sino también la gama 'violent/malicious/unjust witness'. La nota española debería conservar esa información.
  revised_spanish_text: No difundirás un informe falso[a]. No te unirás a un hombre malvado[b] para ser un testigo malicioso.
  revised_footnotes:
  - marker: a
    text: 'O: «llevarás/cargarás un informe falso». El verbo hebreo significa literalmente «levantar» o «llevar», y aquí se usa para difundir o circular un informe.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «No pondrás tu mano con un hombre malvado para ser un testigo injusto». La expresión hebrea es literalmente «poner la mano con», un modismo de cooperación indebida; y «testigo violento» también puede entenderse como «testigo malicioso» o «testigo injusto» en este contexto legal.'
    reason: lexical_alternative
  revision_rationale: La revisión corrige dos puntos donde el español no transmitía con suficiente precisión el sentido fuente ni la trayectoria auditada del POB inglés. 'Difundirás' expresa mejor el modismo de propagar un reporte falso, mientras la nota preserva la literalidad de 'llevar/cargar'. 'Ser un testigo malicioso' recupera el valor judicial de עֵד חָמָס de manera más idiomática y fiel que 'testigo de maldad', y la nota conserva tanto el modismo de la mano como las alternativas léxicas documentadas.
