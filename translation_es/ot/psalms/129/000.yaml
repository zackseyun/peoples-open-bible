translation:
  language: es
  text: 'Cántico de ascenso: «Grandemente me han afligido desde mi juventud»—diga ahora Israel—[a]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Muchas veces me han afligido desde mi juventud». El hebreo רַבַּת puede expresar tanto frecuencia repetida como gran intensidad.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁיר הַמַּעֲלוֹת
  english_pob_choice: A Song of Ascents
  chosen_spanish: Cántico de las subidas
  alternatives_spanish:
  - Canción de las subidas
  - Cántico de ascenso
  lexicon: שִׁיר = canción/cántico; הַמַּעֲלוֹת = ascensos/escalones/subidas
  rationale: “Cántico” conserva el registro bíblico y litúrgico; “las subidas” sigue de cerca el hebreo y mantiene la imagen de peregrinación sin imponer una equivalencia interpretativa más técnica que el texto no exige.
- source_word: רַבַּת
  english_pob_choice: Greatly
  chosen_spanish: Grandemente
  alternatives_spanish:
  - Muchísimo
  - En gran manera
  - Muchas veces
  lexicon: רַבַּת = gran/de muchas veces, según contexto
  rationale: 'El inglés POB preservó la tensión lexical con una nota: puede expresar intensidad o frecuencia repetida. “Grandemente” comunica bien la intensidad en español, y la nota conserva la alternativa de repetición sin borrar la ambigüedad documentada.'
- source_word: צְרָרוּנִי
  english_pob_choice: they have afflicted me
  chosen_spanish: me han afligido
  alternatives_spanish:
  - me han oprimido
  - me han atormentado
  - me han hostigado
  lexicon: צָרַר / צְרָרוּ = oprimir, afligir, estrechar
  rationale: “Afligido” reproduce el efecto sufrido sin sobrerregularlo hacia una sola imagen física o social; es amplio y fiel al campo semántico de hostilidad repetida.
- source_word: מִנְּעוּרַי
  english_pob_choice: from my youth
  chosen_spanish: desde mi juventud
  alternatives_spanish:
  - desde mi niñez
  - desde que era joven
  lexicon: נְעוּרִים = juventud
  rationale: La forma española más directa y natural es “juventud”; mantiene el valor temporal del hebreo sin añadir matices que el texto no da.
- source_word: יֹאמַר נָא יִשְׂרָאֵל
  english_pob_choice: let Israel now say
  chosen_spanish: que ahora diga Israel
  alternatives_spanish:
  - diga ahora Israel
  - que Israel diga ahora
  - diga Israel, pues
  lexicon: אָמַר = decir; נָא = por favor/ahora/pues, según contexto
  rationale: La construcción imperativa-jussiva en español se expresa con claridad por “que ahora diga”. Se conserva el llamado congregacional sin volverlo una fórmula litúrgica más pesada que el hebreo.
theological_decisions:
- issue: Naturaleza del encabezado poético/ litúrgico
  english_pob_reading: A Song of Ascents
  chosen_spanish_reading: Cántico de las subidas
  alternative_spanish_readings:
  - Cántico de ascenso
  - Cántico de peregrinación
  rationale: No se fuerza una interpretación devocional posterior (“peregrinación”) donde el hebreo habla literalmente de “subidas”. La opción elegida conserva la imagen abierta y auditable del original.
  doctrine_reference: Poética bíblica / encabezados de salmos
- issue: Ambigüedad de רַבַּת entre intensidad y repetición
  english_pob_reading: Greatly ... Or 'Many times ...'
  chosen_spanish_reading: Grandemente ... [a]
  alternative_spanish_readings:
  - Muchas veces ...
  - En gran manera ...
  rationale: La traducción principal prioriza la intensidad porque encaja con el español natural y con la lectura principal del POB; la nota mantiene explícita la alternativa repetitiva documentada en el audit trail, sin eliminar la tensión semántica.
  doctrine_reference: Lectura semántica del hebreo poético
translation_notes:
  revision_awareness: 'El texto español incorpora la ampliación confirmada en la revisión inglesa: el encabezado del salmo, la declaración inicial completa y la cláusula exhortativa final dirigida a Israel. También preserva la nota léxica sobre רַבַּת, que en inglés fue mantenida como alternativa válida de frecuencia o intensidad.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el tetragrámaton ni un equivalente directo.
  - «Cántico» se usa de manera consistente para שִׁיר en encabezados poéticos.
  - La mayúscula en «Israel» sigue el uso propio de nombre étnico/nacional en español.
  - El guion largo marca la clausura exhortativa del versículo, siguiendo la estructura del inglés POB y la sintaxis del hebreo.
