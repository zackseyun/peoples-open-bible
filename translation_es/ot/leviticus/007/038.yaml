translation:
  language: es
  text: Esto es lo que Yahvé mandó a Moisés en el monte Sinaí, el día en que mandó a los hijos de Israel[a] presentar sus ofrendas a Yahvé en el desierto de Sinaí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, “los israelitas” o “el pueblo de Israel”. El hebreo dice literalmente “los hijos de Israel”.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino del texto hebreo, siguiendo la decisión auditada del POB de no sustituirlo por un título. En español, 'Yahvé' es la forma estable y reverente del transliterado.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  alternatives_spanish:
  - Moisés el profeta
  lexicon: HALOT
  rationale: Nombre propio estándar en español bíblico, sin necesidad de ajuste contextual adicional.
- source_word: בְּהַר סִינָי
  english_pob_choice: on Mount Sinai
  chosen_spanish: en el monte Sinaí
  alternatives_spanish:
  - sobre el monte Sinaí
  - en el monte del Sinaí
  lexicon: HALOT
  rationale: El hebreo usa una localización en el monte; en español, 'en el monte Sinaí' es natural y fiel. 'On' del inglés auditado corresponde mejor a 'en' que a 'sobre' en castellano bíblico actual.
- source_word: בְּיוֹם צַוֹּתוֹ
  english_pob_choice: on the day when he commanded
  chosen_spanish: el día en que mandó
  alternatives_spanish:
  - el día cuando mandó
  - cuando mandó
  lexicon: HALOT
  rationale: Se conserva la referencia temporal explícita con una cláusula natural en español. 'Mandó' mantiene la fuerza normativa de צוה mejor que una mera 'instrucción'.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Se mantiene la forma familiar y masculina del hebreo, como reflejó la POB en inglés. 'Hijos de Israel' es la equivalencia más directa y transparente en español.
- source_word: לְהַקְרִיב
  english_pob_choice: to present
  chosen_spanish: presentar
  alternatives_spanish:
  - ofrecer
  - traer para ofrecer
  lexicon: HALOT
  rationale: En contexto sacrificial, el hiphil de קרב expresa acercar/presentar una ofrenda. 'Presentar' evita la repetición de 'ofrendas' y conserva el matiz cultual sin sonar forzado.
- source_word: קָרְבְּנֵיהֶם
  english_pob_choice: their offerings
  chosen_spanish: sus ofrendas
  alternatives_spanish:
  - sus sacrificios
  - sus dones
  lexicon: HALOT
  rationale: '''Ofrendas'' cubre el campo semántico sacrificial amplio del término, como en la traducción inglesa auditada. Es más inclusivo que ''sacrificios'' en un resumen general como este.'
- source_word: בְּמִדְבַּר סִינָי
  english_pob_choice: in the wilderness of Sinai
  chosen_spanish: en el desierto de Sinaí
  alternatives_spanish:
  - en el desierto de Sinai
  - en la estepa de Sinaí
  lexicon: HALOT
  rationale: '''מִדְבָּר'' admite ''desierto'' o ''región desértica''; aquí ''desierto de Sinaí'' es claro y conciso en español. Se conserva el nombre geográfico como en el texto fuente.'
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: La decisión doctrinal del POB es preservar el Nombre divino, no sustituirlo por un título. En español, 'Yahvé' mantiene esa transparencia textual y la continuidad con la audit trail inglesa.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Forma de בְּנֵי יִשְׂרָאֵל
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - el pueblo de Israel
  rationale: Se conserva la forma masculina y filial del hebreo, en consonancia con el criterio de precisión de género documentado en la POB. Las alternativas neutrales son posibles, pero atenúan la forma recibida del texto.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 Gender-accurate over gender-neutral
translation_notes:
  revision_awareness: La revisión más reciente indica alta concordancia y sin cambios; se mantiene la lectura estable del texto fuente y del audit trail inglés, sin introducir emendaciones ni variantes textuales.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma consistente para יְהוָה, conforme al estándar del proyecto.
  - Se conserva 'hijos de Israel' para reflejar la forma masculina plural del hebreo.
  - '''Presentar sus ofrendas'' reproduce el matiz cultual de לְהַקְרִיב sin sobrecargar el español.'
  - '''Desierto de Sinaí'' sigue la localización final del verso de manera natural en español.'
