translation:
  language: es
  text: Baalah[a], Iyyim[b], y Ezem[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunas versiones leen «Balah» aquí, probablemente por influencia de listas paralelas de ciudades; el texto masorético dice «Baalah».
    reason: alternative_reading
  - marker: b
    text: Iyyim se trata aquí como nombre de lugar; puede estar relacionado con la palabra hebrea para «ruinas» o «montones», pero en este contexto se translitera como topónimo.
    reason: lexical_alternative
