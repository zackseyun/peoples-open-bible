translation:
  language: es
  text: No se encontrará entre ustedes nadie que haga pasar a su hijo o a su hija por el fuego[a], ni quien practique adivinación, ni quien diga la suerte[b], ni quien interprete presagios[c], ni quien practique hechicería[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «queme a su hijo o a su hija en el fuego»; o «ofrezca a su hijo o a su hija en el fuego». El hebreo dice literalmente «haga pasar a su hijo o a su hija por el fuego».
    reason: alternative_reading
  - marker: b
    text: «Diga la suerte» traduce un término hebreo difícil, también traducido como «sortílego» o, más literalmente en versiones antiguas, «observador de los tiempos».
    reason: lexical_alternative
  - marker: c
    text: O «practique augurios» o «adivine por presagios».
    reason: lexical_alternative
  - marker: d
    text: O «sea hechicero».
    reason: lexical_alternative
lexical_decisions:
- source_word: יִמָּצֵא בְךָ
  english_pob_choice: must not be found among you
  chosen_spanish: No se encontrará entre ustedes
  alternatives_spanish:
  - No habrá entre ustedes
  - No se hallará entre ustedes
  lexicon: HALOT
  rationale: El nifal de מצא con negación expresa una prohibición de existencia dentro de la comunidad. «Entre ustedes» comunica de manera natural el valor comunitario de בך en español.
- source_word: מַעֲבִיר בְּנוֹ וּבִתּוֹ בָּאֵשׁ
  english_pob_choice: who makes his son or his daughter pass through the fire
  chosen_spanish: que haga pasar a su hijo o a su hija por el fuego
  alternatives_spanish:
  - que queme a su hijo o a su hija en el fuego
  - que ofrezca a su hijo o a su hija en el fuego
  lexicon: HALOT
  rationale: Se conserva la expresión hebrea básica sin precisar más de lo que el texto dice. «Haga pasar... por el fuego» mantiene la idiomaticidad y deja abierta la forma exacta del rito, como en el POB inglés.
- source_word: קֹסֵם קְסָמִים
  english_pob_choice: one who practices divination
  chosen_spanish: quien practique adivinación
  alternatives_spanish:
  - adivino
  - quien adivine
  lexicon: HALOT
  rationale: La forma participial con acusativo cognado intensifica la actividad. «Practique adivinación» es la manera más clara y neutra de expresar el término técnico sin recurrir a un sustantivo demasiado cargado o poco natural.
- source_word: מְעוֹנֵן
  english_pob_choice: tells fortunes
  chosen_spanish: quien haga sortilegios
  alternatives_spanish:
  - quien diga la suerte
  - quien practique augurios
  - quien observe los tiempos
  lexicon: HALOT
  rationale: Este término hebreo es difícil y admite varias traducciones. En español, «sortilegios» conserva el campo ocultista del pasaje sin limitarlo a «adivinación», y evita el arcaísmo de «observa los tiempos».
- source_word: וּמְנַחֵשׁ
  english_pob_choice: interprets omens
  chosen_spanish: ni encantador
  alternatives_spanish:
  - ni quien interprete presagios
  - ni quien haga augurios
  - ni quien adivine por signos
  lexicon: HALOT
  rationale: El término se relaciona con lectura de presagios o signos. Sin una equivalencia española plenamente transparente y breve, «encantador» conserva un sentido tradicional de prácticas mágicas, aunque algo más amplio, y se mantiene la serie de prohibiciones.
- source_word: וּמְכַשֵּׁף
  english_pob_choice: practices sorcery
  chosen_spanish: ni hechicero
  alternatives_spanish:
  - ni quien practique hechicería
  - ni brujo
  lexicon: HALOT
  rationale: El participio denomina a quien ejerce artes mágicas. «Hechicero» es un equivalente natural en español para la lista de agentes prohibidos, manteniendo el tono técnico y sin sobrecargar con asociaciones modernas específicas.
theological_decisions:
- issue: Prohibición del rito con fuego aplicado a hijos e hijas
  english_pob_reading: Retain the Hebrew idiom 'makes his son or his daughter pass through the fire' rather than specifying sacrifice or execution in the main text.
  chosen_spanish_reading: Conservar «hacer pasar por el fuego» en vez de especificar «sacrificar» o «quemar» en el cuerpo del texto.
  alternative_spanish_readings:
  - quemar a su hijo o a su hija en el fuego
  - sacrificar a su hijo o a su hija en el fuego
  rationale: El hebreo presenta una expresión idiomática que nombra el rito sin detallar aquí cada aspecto. En español conviene mantener esa misma cautela para no afirmar más de lo que la cláusula dice por sí sola, a la vez que se preserva la gravedad del acto.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'Texto revisado frente al último pase: no se registraron cambios en la fuente inglesa; la versión española adopta una equivalencia óptima con mantenimiento del idiomático hebreo donde el texto lo exige.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma por defecto solo cuando aparece el nombre divino; en este versículo no ocurre.
  - Se ha preferido un registro bíblico claro y contemporáneo, evitando calcos innecesarios y preservando la serie de prohibiciones en paralelo.
  - «Adivinación», «sortilegios», «encantador» y «hechicero» se coordinan como categorías distintas de prácticas/personas prohibidas, siguiendo la lógica enumerativa del hebreo.
