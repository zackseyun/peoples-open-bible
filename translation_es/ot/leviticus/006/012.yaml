translation:
  language: es
  text: Yahvé habló a Moisés[a], diciendo,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «YHWH». Tradicionalmente se vierte «el SEÑOR» en muchas traducciones; alternativamente, «Yahvé».'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְדַבֵּר
  english_pob_choice: spoke
  chosen_spanish: habló
  alternatives_spanish:
  - dijo
  - habló
  lexicon: HALOT
  rationale: En español, ‘habló’ transmite bien la fórmula narrativa de introducción del habla divina sin sonar tan rígido como un calco. ‘Dijo’ también es posible, pero ‘habló’ conserva mejor la distinción del verbo de comunicación frente a la frase infinitiva siguiente.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino del tetragrama en la forma editorial estándar de este proyecto, ‘Yahvé’, en lugar de sustituirlo por un título. Esto mantiene visible el nombre del pacto y sigue la decisión doctrinal del POB inglés.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - para con
  - hacia
  lexicon: HALOT
  rationale: La preposición marca el destinatario indirecto del discurso. En español, ‘a’ es la equivalencia natural y más sobria.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  alternatives_spanish:
  - Moisés
  lexicon: HALOT
  rationale: Nombre propio estándar en español bíblico.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - para decir
  - y dijo
  lexicon: HALOT
  rationale: La construcción infinitiva funciona como fórmula de introducción del discurso. ‘Diciendo’ preserva la estructura convencional con naturalidad en español.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el tetragrama. La traducción conserva el nombre divino con una forma española reconocible y reverente, sin ocultarlo detrás de un título genérico. Esto corresponde a la decisión doctrinal del POB de preservar el nombre del pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH'
translation_notes:
  revision_awareness: El contexto auditado en inglés no presentó revisiones textuales ni cambios recientes; el pasaje permanece estable y con alta coincidencia entre fuente y auditoría.
  spanish_consistency_notes:
  - Se mantiene la convención del proyecto de usar «Yahvé» para el tetragrama.
  - 'La fórmula narrativa queda en un español bíblico actual y legible: «habló ... diciendo».'
  - No se añade puntuación o estructura que altere el carácter de la introducción al discurso.
