    text: 'Hebreo: ''sabia de corazón'', un modismo para la destreza práctica fundada en una sabiduría interior.'
    reason: lexical_alternative
  - marker: b
    text: O 'el azul, la púrpura, el carmesí y el lino fino'; el hebreo enumera los materiales después de 'lo que habían hilado'.
    reason: alternative_reading
  revision_rationale: Se corrigen los verbos al pretérito para reflejar mejor la secuencia narrativa hebrea y la decisión del POB en inglés; se elimina 'tela' para no sobreespecificar el primer elemento de una lista compacta de materiales; y se ajusta la nota b para alinear exactamente la alternativa preservada en la auditoría inglesa.
