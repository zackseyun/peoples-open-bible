revisions:
- from: Sácame de esta red que han ocultado para mí[a], porque tú eres mi baluarte.
  to: Sácame de esta red que me han escondido[a], porque tú eres mi baluarte.
  rationale: Se ajusta «han ocultado para mí» a «me han escondido» para conservar el verbo hebreo ‘esconder/ocultar’ con español natural en contexto de una red preparada contra el salmista. La nota se rehace para ofrecer una alternativa real y mantener la observación del POB inglés sobre la imagen de la red escondida frente a la formulación interpretativa «tendida».
