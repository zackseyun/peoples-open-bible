base_translation:
  language: en
  yaml_path: translation/ot/1_kings/018/040.yaml
  text: Then Elijah said to them[a], “Seize the prophets of Baal; let not one of them escape.” And they seized them[b], and Elijah brought them down to the Kishon Wadi and slaughtered them there.
  footnotes:
