    reason: lexical_alternative
  - marker: b
    text: 'Griego μηχανάς: dispositivos o máquinas de asedio usados para atacar un lugar fortificado.'
    reason: cultural_note
  revision_rationale: Se ajusta la concordancia de «llevaba» a «llevaban» para reflejar mejor el participio plural griego y la acción de los miembros de la multitud. Además, se ancla correctamente la nota [a] en «incontable», ya que en el borrador original existía una nota sin marcador visible en el texto.
