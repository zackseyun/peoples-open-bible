translation:
  language: es
  text: Pero los que estaban con Judas entablaron combate con los enemigos, con invocación[a] y oraciones[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'invocando a Dios y con oraciones'. El griego dice 'con invocación', sin expresar en esta cláusula el objeto de la invocación.
    reason: lexical_alternative
  - marker: b
    text: O 'votos', porque εὐχῶν también puede significar 'votos' según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ δὲ περὶ τὸν Ἰούδαν
  english_pob_choice: those around Judas
  chosen_spanish: los que estaban con Judas
  alternatives_spanish:
  - los que rodeaban a Judas
  - los de alrededor de Judas
  lexicon: LSJ
  rationale: La expresión περὶ + acusativo puede designar a los que acompañan o rodean a un líder. En español, 'los que estaban con Judas' conserva la relación de compañía/comunidad sin sonar forzado ni militariza de más la frase.
- source_word: μετὰ ἐπικλήσεως
  english_pob_choice: with invocation
  chosen_spanish: con invocación
  alternatives_spanish:
  - con invocación a Dios
  - con llamada sobre él
  lexicon: LSJ
  rationale: '''Invocación'' preserva el matiz religioso del término griego y refleja la decisión inglesa de no añadir un objeto explícito que el griego no nombra en esta cláusula. ''Con invocación a Dios'' aclara, pero va más allá del texto.'
- source_word: καὶ εὐχῶν
  english_pob_choice: and prayers
  chosen_spanish: y oraciones
  alternatives_spanish:
  - y plegarias
  - y votos
  lexicon: LSJ
  rationale: En este contexto bélico, εὐχή puede significar 'oración' o 'voto'. Dado el paralelismo con ἐπίκλησις y la función devocional inmediata del pasaje, 'oraciones' es la opción más natural en español; 'votos' queda como alternativa posible pero menos probable.
- source_word: συνῆψαν
  english_pob_choice: joined battle
  chosen_spanish: se trabaron en batalla
  alternatives_spanish:
  - entablaron combate
  - entraron en combate
  lexicon: LSJ
  rationale: En contexto militar, συνάπτω expresa enfrentarse o unirse en combate. 'Se trabaron en batalla' conserva la fuerza idiomática del enfrentamiento directo y evita una expresión demasiado genérica.
- source_word: τοῖς πολεμίοις
  english_pob_choice: with the enemies
  chosen_spanish: con los enemigos
  alternatives_spanish:
  - contra los enemigos
  - frente a los enemigos
  lexicon: LSJ
  rationale: El dativo tras συνῆψαν marca la parte con la que se combate. En español, 'con los enemigos' es la forma natural de 'se trabaron en batalla con...', manteniendo la relación gramatical que la versión inglesa también preserva.
theological_decisions:
- issue: La invocación no nombra explícitamente a Dios
  english_pob_reading: Retain explicit religious language as 'invocation' rather than reducing it to a generic appeal.
  chosen_spanish_reading: Mantener 'invocación' sin añadir explícitamente 'a Dios' en el texto principal.
  alternative_spanish_readings:
  - con invocación a Dios
  - con apelación
  rationale: El griego solo dice 'con invocación y oraciones', sin explicitar el objeto de la invocación. La traducción conserva esa tensión y no resuelve por cuenta propia lo que el texto deja implícito. La nota permite indicar la lectura posible sin imponerla.
  doctrine_reference: Translation philosophy §1, §3
- issue: εὐχῶν puede significar 'oraciones' o 'votos'
  english_pob_reading: '''Prayers'' could also be rendered ''vows,'' since the Greek word can bear either sense depending on context.'
  chosen_spanish_reading: Traducir εὐχῶν como 'oraciones', dejando abierta la posibilidad de 'votos' en nota.
  alternative_spanish_readings:
  - votos
  - súplicas
  rationale: El contexto de combate y la cercanía con 'invocación' favorecen el sentido de plegaria. Sin embargo, como el griego admite la acepción de 'voto', la nota conserva esa alternativa para no borrar la ambigüedad léxica.
  doctrine_reference: Translation philosophy §2
translation_notes:
  revision_awareness: 'El texto base inglés fue revisado sin cambios sustantivos en la última pasada; la decisión española sigue la misma lectura óptima-equivalente y mantiene las dos ambigüedades léxicas documentadas: ἐπίκλησις sin objeto explícito y εὐχαί como ''oraciones'' o ''votos''.'
  spanish_consistency_notes:
  - Se mantiene 'Judas' como nombre propio sin expansión interpretativa.
  - Se evita 'SEÑOR' o una paráfrasis teológica para no introducir un objeto no expresado por el griego.
  - '''Con los enemigos'' conserva la estructura relacional del dativo militar de συνῆψαν.'
  - La puntuación separa claramente el elemento devocional del militar, como en el griego y en la versión inglesa auditada.
