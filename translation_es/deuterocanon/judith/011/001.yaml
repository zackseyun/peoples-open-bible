- from: 'Y Holofernes le dijo a ella: «Ten ánimo, mujer; no temas en tu corazón[a], porque yo no he hecho daño a ningún hombre[b] que haya escogido[c] servir al rey Nabucodonosor, de toda la tierra»[d].'
