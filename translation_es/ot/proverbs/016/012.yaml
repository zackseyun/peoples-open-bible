review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador transmite correctamente la estructura y el sentido básico del hebreo: algo aborrecible para los reyes es hacer maldad, porque el trono se afianza por צדקה. Sin embargo, no sigue fielmente el rastro auditado del POB en dos puntos importantes: el inglés eligió ''wickedness'' para רֶשַׁע, no ''justice'' for צדקה as main reading but ''righteousness'' with ''justice'' preserved as alternativa. En español, ''hacer maldad'' es comprensible, pero la nota colocada en ''maldad'' en realidad comenta el predicado final, lo cual desancla mal la alternativa. También la sintaxis inicial suena algo forzada.'
  spanish_quality_summary: 'La frase actual es entendible pero poco natural: ''Abominación es para los reyes...'' resulta rígida. Una formulación más idiomática y digna en español es ''Es una abominación para los reyes hacer maldad...''. Además, la nota al pie debe anclarse en la expresión correspondiente del segundo hemistiquio, no en ''maldad''.'
  glossary_alignment: 'No hay términos del glosario mayor en juego como Yahvé/Mesías. Sí hay un punto de política léxica relevante: צדקה debía inclinarse a ''rectitud'' o ''justicia'' según contexto, pero el audit trail inglés documenta lectura principal ''righteousness'' y alternativa ''justice''. En español conviene reflejar eso con lectura principal ''rectitud'' y nota ''O: justicia'', especialmente para respetar la rationale documentada sin perder naturalidad. ''Maldad'' para רֶשַׁע es aceptable.'
  issues:
  - severity: medium
    issue: La sintaxis inicial es poco natural en español
    rationale: '''Abominación es para los reyes hacer maldad'' suena calcada. ''Es una abominación para los reyes hacer maldad'' conserva el peso proverbial y mejora la legibilidad.'
  - severity: high
    issue: La nota al pie está anclada en el lugar equivocado
    rationale: El marcador [a] aparece tras 'maldad', pero la nota ofrece una alternativa para 'se establece'/'por la justicia', no para רֶשַׁע. Esto rompe la disciplina requerida de anclar cada nota exactamente donde corresponde.
  - severity: medium
    issue: La decisión principal sobre צדקה no refleja bien el rastro auditado del POB
    rationale: El inglés POB eligió 'righteousness' como lectura principal y preservó 'justice' como alternativa. En español, usar 'justicia' como principal borra esa preferencia documentada. 'Rectitud' como principal con nota 'justicia' respeta mejor la decisión auditada y sigue siendo natural.
  revised_spanish_text: Es una abominación para los reyes hacer maldad, porque por la rectitud[a] se establece un trono.
  revised_footnotes:
  - marker: a
    text: 'O: «por la justicia se establece un trono».'
    reason: lexical_alternative
  revision_rationale: 'Se ajusta la sintaxis para que el español sea natural y digno, se reubica correctamente la nota al término pertinente del segundo hemistiquio, y se alinea la decisión principal sobre צדקה con el audit trail inglés: lectura principal equivalente a ''righteousness'' (''rectitud'') y alternativa ''justice'' (''justicia''). No hay incertidumbre doctrinal ni textual que requiera adjudicación adicional.'
