lexical_decisions:
- source_word: הוֹי
  english_pob_choice: Woe
  chosen_spanish: ¡Ay de...!
  alternatives_spanish:
  - ¡Ay!
  - ¡Ay de la...
  lexicon: HALOT
  rationale: En los oráculos proféticos de juicio, הוֹי introduce una exclamación de denuncia o lamento. En español, «¡Ay de...!» conserva ese tono profético y es más natural que un calco rígido de «Woe».
- source_word: מֹרְאָה
  english_pob_choice: rebellious
  chosen_spanish: rebelde
  alternatives_spanish:
  - rebelada
  - contumaz
  lexicon: HALOT
  rationale: La raíz מרה expresa rebeldía o resistencia a la corrección. «Rebelde» reproduce bien ese valor moral y el acusativo profético.
- source_word: וְנִגְאָלָה
  english_pob_choice: and defiled
  chosen_spanish: y contaminada
  alternatives_spanish:
  - y defileda
  - y polluida
  - y mancillada
  lexicon: HALOT
  rationale: El audit trail inglés refleja la lectura contextual de un estado de impureza moral/cúltica, con nota alternativa «polluted». En español, «contaminada» comunica esa impureza sin forzar una traducción técnica que oculte la tensión textual.
- source_word: הָעִיר
  english_pob_choice: city
  chosen_spanish: la ciudad
  alternatives_spanish:
  - la urbe
  lexicon: HALOT
  rationale: Equivalente directo y natural de עִיר en este contexto.
- source_word: הַיּוֹנָה
  english_pob_choice: the oppressing one
  chosen_spanish: la opresora
  alternatives_spanish:
  - la que oprime
  - la opresiva
  - la paloma
  lexicon: HALOT
  rationale: La POB inglesa sigue la lectura contextual tradicional de un rasgo opresivo, aunque documenta la posibilidad literal «the dove». En español, «la opresora» mantiene el paralelismo acusatorio y la fuerza predicativa.
translation_notes:
  revision_awareness: La versión inglesa más reciente no introdujo cambios; se mantiene la solución contextual alta en acuerdo. La traducción española preserva la tensión entre la lectura contextual de denuncia («opresora») y la alternativa literal posible («paloma») en nota.
  spanish_consistency_notes:
  - Se evita «SEÑOR» porque no aparece el tetragrámaton en este versículo.
  - «Contaminada» se usa en sentido moral/cúltico, no higiénico.
  - «Opresora» mantiene el predicativo singular femenino del hebreo.
  - Se conserva el registro profético de juicio con exclamación inicial.
  - Las notas usan marcadores únicos y aparecen ancladas en el texto.
