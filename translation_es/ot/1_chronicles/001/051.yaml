translation:
  language: es
  text: 'Hadad murió, y los jefes[a] de Edom fueron: Jefe Timna[b], Jefe Aliah[c], Jefe Jetheth.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Jefes» traduce אַלּוּף en su sentido de jefe de clan o tribu; no se usa «duques», que puede sonar anacrónico.
    reason: lexical_alternative
  - marker: b
    text: Timna también puede escribirse «Timnah» en otras tradiciones de transliteración.
    reason: lexical_alternative
  - marker: c
    text: En Génesis 36:40 aparece el nombre correspondiente como «Alvah»; aquí Crónicas lee «Aliah».
    reason: textual_variant
lexical_decisions:
- source_word: וַיָּמָת
  english_pob_choice: died
  chosen_spanish: murió
  alternatives_spanish:
  - y murió
  - entonces murió
  lexicon: HALOT
  rationale: La forma wayyiqtol narra un evento consecutivo; en español, el pretérito simple "murió" comunica de manera natural la secuencia narrativa sin añadir un calco innecesario.
- source_word: הֲדָד
  english_pob_choice: Hadad
  chosen_spanish: Hadad
  alternatives_spanish:
  - Adad
  lexicon: Transliteración del nombre propio
  rationale: Se conserva el nombre propio conforme al texto hebreo y al audit trail inglés.
- source_word: וַיִּהְיוּ
  english_pob_choice: were
  chosen_spanish: fueron
  alternatives_spanish:
  - había
  - llegaron a ser
  lexicon: HALOT
  rationale: Aquí introduce la lista de jefes edomitas; "fueron" reproduce la función copulativa/narrativa del hebreo y permite presentar la enumeración en español.
- source_word: אַלּוּפֵי
  english_pob_choice: chiefs of
  chosen_spanish: jefes
  alternatives_spanish:
  - caudillos
  - jefes de clan
  - líderes
  lexicon: HALOT
  rationale: En listas edomitas, אַלּוּף designa un jefe tribal o de clan. "Jefes" es claro y natural en español, y mantiene la fuerza social/política del término sin recurrir a "duques", que sería históricamente engañoso.
- source_word: אֱדוֹם
  english_pob_choice: Edom
  chosen_spanish: Edom
  alternatives_spanish:
  - Idumea
  lexicon: Nombre geográfico/étnico
  rationale: Se conserva la forma estándar del nombre propio.
- source_word: אַלּוּף
  english_pob_choice: Chief
  chosen_spanish: jefe
  alternatives_spanish:
  - caudillo
  - líder
  lexicon: HALOT
  rationale: Se repite el título delante de cada nombre para reflejar la estructura del hebreo y la lectura del POB inglés.
- source_word: תִּמְנָע
  english_pob_choice: Timna
  chosen_spanish: Timna
  alternatives_spanish:
  - Timná
  - Timnah
  lexicon: Transliteración del nombre propio
  rationale: La forma hebrea aquí favorece "Timna"; se evita imponer una forma tradicional ajena al contexto.
- source_word: עליה
  english_pob_choice: Aliah
  chosen_spanish: Aliah
  alternatives_spanish:
  - Alvah
  lexicon: Transliteración del nombre propio
  rationale: Se sigue la lectura de Crónicas reflejada en el texto base. La variante paralela en Génesis se preserva en nota.
- source_word: יְתֵת
  english_pob_choice: Jetheth
  chosen_spanish: Jetheth
  alternatives_spanish:
  - Jethath
  lexicon: Transliteración del nombre propio
  rationale: Se mantiene la transliteración del nombre propio con la grafía más cercana al valor consonántico del hebreo.
translation_notes:
  revision_awareness: El audit trail inglés no introdujo cambios revisados; se siguió la lectura estable con alta concordancia entre fuente hebrea y POB inglés. Se mantuvieron las variantes relevantes en nota, especialmente el paralelo Aliah/Alvah y la ambigüedad transliterativa de Timna.
  spanish_consistency_notes:
  - Se evitó la máscara «SEÑOR» porque el versículo no contiene el tetragrámaton ni una cita de κύριος.
  - Se conservó la repetición del título antes de cada nombre para reflejar la lista hebrea y la estructura del POB inglés.
  - Se prefirió «jefe/jefes» por claridad contemporánea, manteniendo el matiz de líder tribal o clan.
  - Los nombres propios se transliteraron de forma estable y se documentaron las variantes donde el propio audit trail las señala.
