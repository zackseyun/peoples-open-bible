translation:
  language: es
  text: 'La raíz de la sabiduría: ¿a quién le ha sido revelada? Y ¿quién ha conocido sus sutilezas?[a]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: «La fuente de la sabiduría es la palabra de Dios en las alturas, y sus caminos son mandamientos eternos». El testimonio hebreo aquí difiere de manera sustancial del griego.'
    reason: alternative_reading
lexical_decisions:
- source_word: שֹׁרֶשׁ
  english_pob_choice: root
  chosen_spanish: raíz
  alternatives_spanish:
  - origen
  - fundamento
  lexicon: HALOT
  rationale: «Raíz» conserva la metáfora concreta del hebreo y corresponde de manera natural al sustantivo שֹׁרֶשׁ. En español mantiene la idea de aquello de donde procede la sabiduría sin suavizarla en exceso.
- source_word: הַחָכְמָה
  english_pob_choice: wisdom
  chosen_spanish: sabiduría
  alternatives_spanish:
  - sabia comprensión
  - prudencia
  lexicon: HALOT
  rationale: «Sabiduría» es la equivalencia directa y tradicional para חכמה en literatura sapiencial, y funciona bien en español moderno sin perder el tono bíblico.
- source_word: לְמִי
  english_pob_choice: to whom
  chosen_spanish: ¿a quién le
  alternatives_spanish:
  - ¿para quién
  - ¿a quién
  lexicon: HALOT
  rationale: La interrogación con ל + מי se expresa con naturalidad en español como «¿a quién le ha sido revelada?», manteniendo el matiz receptivo del pasivo.
- source_word: נִגְלָה
  english_pob_choice: has it been revealed
  chosen_spanish: le ha sido revelada
  alternatives_spanish:
  - ha sido revelada
  - se le ha revelado
  lexicon: HALOT
  rationale: La pasiva refleja mejor el sentido de revelación recibida. Opté por «le ha sido revelada» para conservar el carácter pasivo y la pregunta retórica del hebreo.
- source_word: מַעֲרֻמֶּיהָ
  english_pob_choice: her subtleties
  chosen_spanish: sus sutilezas
  alternatives_spanish:
  - sus intrincaciones
  - sus astucias
  - sus secretos
  lexicon: HALOT
  rationale: «Sutilezas» comunica el campo semántico de lo sutil, complejo o penetrante sin cargar el término con una connotación negativa de engaño. Es una buena solución para el hebreo en este contexto sapiencial.
- source_word: מִי יָדַע
  english_pob_choice: who has known
  chosen_spanish: ¿quién ha conocido?
  alternatives_spanish:
  - ¿quién sabe?
  - ¿quién ha entendido?
  lexicon: HALOT
  rationale: «Conocido» sigue de cerca ידע y conserva el perfecto interrogativo del hebreo. «Entendido» sería más interpretativo; «sabe» perdería el matiz de experiencia o aprehensión ya alcanzada.
theological_decisions:
- issue: Gran discrepancia entre el hebreo conservado y el paralelo griego
  english_pob_reading: 'The main text follows the extant Hebrew: ''The root of wisdom—to whom has it been revealed? And who has known her subtleties?'' with a footnote preserving the Greek parallel.'
  chosen_spanish_reading: 'El texto principal sigue el hebreo conservado y la nota preserva el paralelo griego: «La fuente de la sabiduría es la palabra de Dios en las alturas; y sus caminos son mandamientos eternos».'
  alternative_spanish_readings:
  - «La fuente de la sabiduría es la palabra de Dios en las alturas; y sus caminos son mandamientos eternos»
  - «El manantial de la sabiduría es la palabra de Dios en lo alto; y sus sendas son mandatos eternos»
  rationale: Como el hebreo disponible es la base primaria del versículo en esta edición, debe gobernar el texto principal. Pero la línea griega es sustancialmente distinta, no una simple variante menor; por eso se preserva como nota alternativa en vez de armonizarla silenciosamente.
  doctrine_reference: Prioridad del testimonio original conservado; transparencia textual; no resolver artificialmente tensiones entre testigos.
translation_notes:
  revision_awareness: 'Este borrador sigue la revisión más reciente sin cambios sustantivos: se mantiene el hebreo como texto principal y se conserva el paralelo griego en nota por la discrepancia mayor entre testigos. No se requieren ajustes respecto del pase anterior.'
  spanish_consistency_notes:
  - Se mantiene «sabiduría» para חכמה en coherencia con la terminología sapiencial del proyecto.
  - Se conserva una interrogación pasiva natural en español para לְמִי נִגְלָה.
  - «Sutilezas» evita una traducción moralizante de מַעֲרֻמֶּיהָ y preserva el tono sapiencial.
  - La nota al pie usa una formulación griega claramente distinguible del texto principal para transparentar la discrepancia textual.
