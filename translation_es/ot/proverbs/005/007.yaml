translation:
  language: es
  text: Y ahora[a], hijos, escúchenme, y no se aparten de las palabras de mi boca.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hijos». El hebreo está en plural masculino, y la traducción conserva esa forma en fidelidad al texto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: And now
  chosen_spanish: Y ahora
  alternatives_spanish:
  - Ahora
  lexicon: HALOT
  rationale: La conjunción más el adverbio temporal marcan transición exhortativa. «Y ahora» conserva mejor el enlace discursivo y el giro de exhortación que un simple «Ahora».
- source_word: בָנִים
  english_pob_choice: sons
  chosen_spanish: hijos
  alternatives_spanish:
  - hijos míos
  - niños
  lexicon: HALOT
  rationale: El hebreo está en plural masculino y puede funcionar como apelativo sapiencial para discípulos. En español, «hijos» comunica ese tono filial con naturalidad; «hijos míos» añadiría un posesivo no presente, y «niños» no refleja bien el contexto sapiencial.
- source_word: שִׁמְעוּ לִי
  english_pob_choice: listen to me
  chosen_spanish: escúchenme
  alternatives_spanish:
  - óiganme
  - escuchen mi voz
  - atiéndanme
  lexicon: HALOT
  rationale: שמע con ל expresa atención a la voz del hablante y puede implicar obediencia, pero no la exige de modo explícito. «Escúchenme» es natural en español y mantiene la exhortación sin sobretraducirla como «obedézcanme».
- source_word: וְאַל
  english_pob_choice: and do not
  chosen_spanish: y no
  alternatives_spanish:
  - pero no
  lexicon: HALOT
  rationale: La conjunción negativa une la segunda amonestación a la primera. «Y no» reproduce la coordinación simple del hebreo.
- source_word: תָּסוּרוּ
  english_pob_choice: turn aside
  chosen_spanish: se aparten
  alternatives_spanish:
  - se desvíen
  - se desvíen del camino
  - se desvíen de
  lexicon: HALOT
  rationale: סור describe apartarse o desviarse de un camino o instrucción. «Se aparten» comunica bien esa idea en español y evita una formulación demasiado técnica o rígida.
- source_word: מֵאִמְרֵי פִי
  english_pob_choice: from the words of my mouth
  chosen_spanish: de las palabras de mi boca
  alternatives_spanish:
  - de mis palabras
  - de los dichos de mi boca
  lexicon: HALOT
  rationale: La imagen hebrea conserva el paralelismo entre palabra y boca. «Las palabras de mi boca» mantiene el idiomatismo y el tono solemne sin perder claridad en español.
theological_decisions:
- issue: Valor apelativo de בָנִים en un discurso sapiencial
  english_pob_reading: The translation preserves the masculine plural 'sons' and notes the alternative 'children.'
  chosen_spanish_reading: «Hijos» conserva el apelativo filial y masculino plural, sin neutralizarlo.
  alternative_spanish_readings:
  - «hijos míos»
  - «niños»
  - «hijas e hijos»
  rationale: El hebreo usa un plural masculino que en este contexto sapiencial puede dirigirse a discípulos como hijos. En español, «hijos» mantiene la relación apelativa sin introducir un poseedor ni borrar la forma masculina del original.
  doctrine_reference: Política de fidelidad de género gramatical del proyecto; sabiduría proverbial (cf. apelativos filiales en Proverbios).
translation_notes:
  revision_awareness: El pasaje coincide con el audit trail inglés en sentido, estructura exhortativa y decisiones léxicas principales. No se documentan revisiones posteriores que alteren la segmentación o el valor de las opciones clave.
  spanish_consistency_notes:
  - Se mantiene «Y ahora» para el arranque discursivo, paralelo al inglés auditado.
  - Se conserva la imagen corporal «palabras de mi boca» en lugar de simplificar a «mis palabras».
  - Se evita «obedézcanme» para no exceder el rango semántico documentado de שמע con ל.
