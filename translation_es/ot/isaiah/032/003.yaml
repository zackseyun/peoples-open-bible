- from: Entonces los ojos de los que ven no estarán [a] oscuros, y los oídos de los que oyen prestarán atención.
  to: Entonces los ojos de los que ven no estarán velados[a], y los oídos de los que oyen prestarán atención.
  rationale: Se reemplaza ‘oscuros’ por ‘velados’ para reflejar con más naturalidad en español la idea de ojos ya no impedidos u oscurecidos, en línea con la decisión inglesa revisada ‘will not be dim’. Se mantiene la nota alternativa con ‘cegados’ como opción más fuerte ya documentada, y se corrige la colocación del marcador de nota.
