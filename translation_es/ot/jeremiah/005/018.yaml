revisions:
- from: Y aun en aquellos días[a], dice Yahvé, no haré de vosotros un fin completo.
  to: Pero aun en aquellos días[a], declara Yahvé, no haré una destrucción completa de ustedes.
  rationale: La revisión conserva la fuerza concesiva de וְגַם, mantiene «Yahvé», mejora la fórmula profética con «declara», adopta español neutral con «ustedes», y reemplaza la construcción antinatural «haré de vosotros un fin completo» por «haré una destrucción completa de ustedes», que comunica con claridad el sentido del modismo hebreo mientras la nota preserva la literalidad y la tensión teológica del original.
