  yaml_path: translation/nt/colossians/002/007.yaml
  text: having been rooted and being built up in him, and being established in the faith just as you were taught, overflowing with thanksgiving.
translation:
  language: ko
  text: 그분 안에 뿌리 내려져 있고 세움을 받아 가며, 가르침 받은 그대로 그 믿음 안에 굳게 서서, 감사가 넘치도록 하십시오.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: ἐρριζωμένοι
  english_pob_choice: having been rooted
  chosen_korean: 뿌리 내려져 있고
  alternatives_korean:
  - 뿌리를 내리고
  - 뿌리 박혀 있고
  lexicon: BDAG
  rationale: 완료 분사. 완료된 행위의 지속적 결과를 「뿌리 내려져 있고」로 옮긴다.
- source_word: ἐποικοδομούμενοι
  english_pob_choice: being built up
  chosen_korean: 세움을 받아 가며
  alternatives_korean:
  - 세워져 가며
  - 건축되어 가며
  lexicon: BDAG
  rationale: 현재 분사로 지속적 건축을 가리킨다. 「세움을 받아 가며」는 진행적·수동적 어감을 함께 살린다.
- source_word: ἐν αὐτῷ
  english_pob_choice: in him
  chosen_korean: 그분 안에
  alternatives_korean:
  - 그분 안에서
  lexicon: BDAG
  rationale: 영역의 ἐν.
- source_word: βεβαιούμενοι τῇ πίστει
  english_pob_choice: being established in the faith
  chosen_korean: 그 믿음 안에 굳게 서서
  alternatives_korean:
  - 그 믿음에 견고히 서서
  - 신앙으로 견고히 세워져
  lexicon: BDAG
  rationale: 관사가 있는 τῇ πίστει는 「그 믿음」(전수된 기독교 신앙)을 가리킨다. 「굳게 서서」는 βεβαιόω의 「확고히 됨」을 자연스럽게 살린다.
- source_word: καθὼς ἐδιδάχθητε
  english_pob_choice: just as you were taught
  chosen_korean: 가르침 받은 그대로
  alternatives_korean:
  - 너희가 배운 그대로
  - 가르침대로
  lexicon: BDAG
  rationale: 부정과거 수동. 「가르침 받은 그대로」가 자연스럽다.
- source_word: περισσεύοντες ἐν εὐχαριστίᾳ
  english_pob_choice: overflowing with thanksgiving
  chosen_korean: 감사가 넘치도록 하십시오
  alternatives_korean:
  - 감사 안에서 풍성하게 하십시오
  - 감사로 가득하게 하십시오
  lexicon: BDAG
  rationale: 「넘치다」가 περισσεύω의 풍성함을 자연스럽게 표현한다. 합쇼체 명령으로 마무리한다.
