translation:
  language: es
  text: para subir y reedificar Jerusalén y el templo sobre el cual fue llamado su nombre[a]; y celebraron con música y alegría durante siete días[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Más idiomáticamente: “el templo que lleva su nombre”.'
    reason: lexical_alternative
  - marker: b
    text: El verbo raro también puede entenderse como “hicieron una celebración festiva” o “se regocijaron en celebración”.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀναβῆναι
  english_pob_choice: to go up
  chosen_spanish: subir
  alternatives_spanish:
  - ascender
  - ir up
  lexicon: LSJ
  rationale: En el contexto bíblico de Jerusalén, el verbo de movimiento conserva el sentido idiomático de “subir” hacia la ciudad. Es más natural que un calco y mantiene la imagen geográfica.
- source_word: οἰκοδομῆσαι
  english_pob_choice: rebuild
  chosen_spanish: reedificar
  alternatives_spanish:
  - reconstruir
  - edificar
  lexicon: LSJ
  rationale: El contexto habla de Jerusalén y del templo en restauración; “reedificar” comunica la idea de construir de nuevo sin perder el valor literal del verbo.
- source_word: ἱερὸν
  english_pob_choice: temple
  chosen_spanish: templo
  alternatives_spanish:
  - santuario
  - casa sagrada
  lexicon: LSJ
  rationale: Aquí ἱερόν se refiere al complejo del templo. “Templo” es la equivalencia natural en español y es fiel al contexto de restauración.
- source_word: οὗ ὠνομάσθη τὸ ὄνομα αὐτοῦ ἐπʼ αὐτῷ
  english_pob_choice: on which his name was called
  chosen_spanish: sobre el cual fue invocado su nombre
  alternatives_spanish:
  - que lleva su nombre
  - sobre el cual se llamó su nombre
  lexicon: LSJ
  rationale: La fórmula semítica subyacente expresa asociación de pertenencia y consagración. “Fue invocado su nombre” conserva el matiz bíblico mejor que una simple paráfrasis possessiva, y evita resolver la tensión teológica sobre presencia o posesión.
- source_word: ἐκωθωνίζοντο
  english_pob_choice: they celebrated
  chosen_spanish: celebraron
  alternatives_spanish:
  - hicieron fiesta
  - se regocijaron en celebración
  - se entregaron a la celebración
  lexicon: LSJ
  rationale: El verbo es raro y describe una celebración festiva. “Celebraron” comunica el sentido sin añadir connotaciones negativas o demasiado coloquiales.
- source_word: μετὰ μουσικῶν
  english_pob_choice: with music
  chosen_spanish: con música
  alternatives_spanish:
  - con músicos
  - con instrumentos musicales
  lexicon: LSJ
  rationale: La construcción puede referirse al acompañamiento musical en general. “Con música” es lo más natural y no fuerza una precisión no garantizada por el griego.
- source_word: χαρᾶς
  english_pob_choice: joy
  chosen_spanish: alegría
  alternatives_spanish:
  - gozo
  - regocijo
  lexicon: LSJ
  rationale: “Alegría” es una traducción directa, clara y natural para el contexto festivo.
- source_word: ἡμέρας ἑπτά
  english_pob_choice: for seven days
  chosen_spanish: durante siete días
  alternatives_spanish:
  - por siete días
  - siete días
  lexicon: LSJ
  rationale: En español, la duración se expresa con naturalidad mediante “durante siete días”, manteniendo el valor temporal del original.
theological_decisions:
- issue: Fórmula del nombre divino asociada al templo
  english_pob_reading: the temple on which his name was called
  chosen_spanish_reading: el templo sobre el cual fue invocado su nombre
  alternative_spanish_readings:
  - el templo que lleva su nombre
  - el templo donde fue invocado su nombre
  rationale: La expresión no debe suavizarse hasta perder la fórmula bíblica ni resolverse como mera propiedad nominal. La redacción elegida mantiene la asociación de pacto/consagración y deja abierta la tensión teológica del texto, conforme al principio de preservar la tensión sin resolverla.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'Se siguió el ajuste auditado de la revisión inglesa reciente: la fórmula pasó de un pasado más perifrástico a una forma más directa (“was called”), y en español se optó por una solución igualmente directa pero todavía fiel a la fórmula semítica. No se introdujeron ampliaciones interpretativas adicionales.'
  spanish_consistency_notes:
  - Se usó “Yahvé” solo cuando corresponde al nombre divino; en este versículo no aparece.
  - Se mantuvo “templo” por ser el referente contextual de ἱερόν.
  - Se evitó “Cristo”/“Mesías” porque no interviene en este pasaje.
  - La puntuación y el orden se ajustaron a la sintaxis natural del español sin alterar los vínculos semánticos del griego.
