id: ROM.15.16
reference: Romans 15:16
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: εἰς τὸ εἶναί με λειτουργὸν ⸂Χριστοῦ Ἰησοῦ⸃ εἰς τὰ ἔθνη, ἱερουργοῦντα τὸ εὐαγγέλιον τοῦ θεοῦ, ἵνα γένηται ἡ προσφορὰ τῶν ἐθνῶν εὐπρόσδεκτος, ἡγιασμένη ἐν πνεύματι ἁγίῳ.
base_translation:
  language: en
  yaml_path: translation/nt/romans/015/016.yaml
  text: to be a minister of Messiah Jesus to the Gentiles, serving as a priest in the gospel of God, so that the offering of the Gentiles may become acceptable, sanctified by the Holy Spirit.
translation:
  language: ko
  text: 곧 내가 이방인들을 위한 메시아 예수의 사역자[a]가 되어 하나님의 복음을 위해 제사장의 직무를 수행하게 하시려는 것입니다. 그리하여 이방인들이라는 제물이 성령으로 거룩하게 되어 받아들여지게 하려는 것입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 헬라어 λειτουργός는 공적·제사적 직무를 수행하는 자를 가리킨다. 13:6의 같은 어휘 참조.
    reason: lexical_alternative
lexical_decisions:
- source_word: λειτουργὸν Χριστοῦ Ἰησοῦ
  english_pob_choice: a minister of Messiah Jesus
  chosen_korean: 메시아 예수의 사역자
  alternatives_korean:
  - 메시아 예수의 공직자
  lexicon: BDAG
  rationale: 13:6의 λειτουργός와 어휘 일관. 제사적 함의가 이어지는 분사 ἱερουργοῦντα와 어울린다.
- source_word: ἱερουργοῦντα τὸ εὐαγγέλιον τοῦ θεοῦ
  english_pob_choice: serving as a priest in the gospel of God
  chosen_korean: 하나님의 복음을 위해 제사장의 직무를 수행하다
  alternatives_korean:
  - 하나님의 복음의 제사 직무를 행하다
  lexicon: BDAG
  rationale: ἱερουργέω는 「제사 직무를 수행하다」. 복음 사역을 제사적 비유로 표현.
- source_word: ἡ προσφορὰ τῶν ἐθνῶν
  english_pob_choice: the offering of the Gentiles
  chosen_korean: 이방인들이라는 제물
  alternatives_korean:
  - 이방인들의 제물
  - 이방인들이 드리는 제물
  lexicon: BDAG
  rationale: 동격 속격으로 「이방인들 자신이 곧 제물」 의미. 「~이라는 제물」이 자연스럽다.
- source_word: εὐπρόσδεκτος
  english_pob_choice: acceptable
  chosen_korean: 받아들여지다
  alternatives_korean:
  - 기쁘게 받아들여지다
  lexicon: BDAG
  rationale: 직역.
- source_word: ἡγιασμένη ἐν πνεύματι ἁγίῳ
  english_pob_choice: sanctified by the Holy Spirit
  chosen_korean: 성령으로 거룩하게 되어
  lexicon: BDAG
  rationale: 완료 수동 분사. 성령의 거룩하게 하심.
