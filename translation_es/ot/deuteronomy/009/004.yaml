translation:
  language: es
  text: 'No digas en tu corazón[a], cuando Yahvé tu Dios los expulse de delante de ti, diciendo: «Por causa de mi justicia[b] Yahvé me ha traído para poseer esta tierra», mientras que por la maldad de estas naciones Yahvé los está desposeyendo delante de ti.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «para ti mismo». El hebreo usa un modismo de interioridad; la traducción principal conserva la imagen de «corazón».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «Por mi justicia Yahvé me ha traído para heredar esta tierra». El hebreo puede expresarse de manera más formal con «por» y «heredar», pero el texto principal usa un español más claro sin perder el sentido.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל תֹּאמַר
  english_pob_choice: Do not say
  chosen_spanish: No digas
  alternatives_spanish:
  - No debes decir
  lexicon: HALOT
  rationale: אַל con el imperfecto expresa prohibición; en español, el imperativo negativo de 2.ª persona singular transmite con naturalidad la misma fuerza.
- source_word: בִּלְבָבְךָ
  english_pob_choice: in your heart
  chosen_spanish: en tu corazón
  alternatives_spanish:
  - para ti mismo
  - dentro de ti
  lexicon: HALOT
  rationale: Se conserva el modismo hebreo del pensamiento interior sin volverlo una paráfrasis psicológica.
- source_word: בַּהֲדֹף
  english_pob_choice: when ... drives ... out
  chosen_spanish: cuando ... los expulse de delante de ti
  alternatives_spanish:
  - cuando ... los eche de delante de ti
  - cuando ... los arrebate de delante de ti
  lexicon: HALOT
  rationale: El infinitivo con ב marca circunstancia temporal; en contexto de conquista, 'expulse de delante de ti' mantiene la imagen espacial y la idea de expulsión.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: Se preserva el nombre divino como nombre propio, no como sustituto con título, de acuerdo con la norma del proyecto.
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu Dios y Señor
  lexicon: HALOT
  rationale: Expresión pactual estándar; 'tu Dios' comunica la relación posesiva del texto sin añadir matices ajenos.
- source_word: מִלְּפָנֶיךָ
  english_pob_choice: from before you / before you
  chosen_spanish: de delante de ti
  alternatives_spanish:
  - de tu presencia
  - ante ti
  lexicon: HALOT
  rationale: El hebreo usa el giro espacial de 'delante/presencia'; 'de delante de ti' conserva el valor relacional y narrativo.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y diciendo
  lexicon: HALOT
  rationale: Introduce el contenido del discurso interior prohibido; en español, 'diciendo' funciona como marcador discursivo natural.
- source_word: בְּצִדְקָתִי
  english_pob_choice: Because of my righteousness
  chosen_spanish: Por causa de mi justicia
  alternatives_spanish:
  - Por mi justicia
  - A causa de mi justicia
  lexicon: HALOT
  rationale: צְדָקָה aquí denota mérito o rectitud reivindicada; 'justicia' preserva el término con fuerza moral/jurídica, y 'por causa de' expresa la causalidad del reclamo.
- source_word: הֱבִיאַנִי
  english_pob_choice: has brought me in
  chosen_spanish: me ha hecho entrar
  alternatives_spanish:
  - me ha traído
  - me ha introducido
  lexicon: HALOT
  rationale: El hifil de בוא expresa causar la entrada; 'me ha hecho entrar' reproduce con precisión la causalidad, aunque se pierda la metáfora de viaje.
- source_word: לָרֶשֶׁת
  english_pob_choice: to possess
  chosen_spanish: para poseer
  alternatives_spanish:
  - para tomar posesión de
  - para heredar
  lexicon: HALOT
  rationale: ירשׁ aquí tiene valor de ocupar/poseer la tierra. 'Poseer' mantiene la correspondencia breve y evita forzar 'heredar' donde el foco es la posesión territorial.
- source_word: הָאָרֶץ הַזֹּאת
  english_pob_choice: this land
  chosen_spanish: esta tierra
  alternatives_spanish:
  - esta tierra prometida
  - este país
  lexicon: HALOT
  rationale: En Deuteronomio, el sustantivo 'tierra' es el término geográfico-pactual normal; se conserva sin explicitar más de lo que el hebreo dice.
- source_word: וּבְרִשְׁעַת הַגּוֹיִם הָאֵלֶּה
  english_pob_choice: while because of the wickedness of these nations
  chosen_spanish: sino por la perversidad de estas naciones
  alternatives_spanish:
  - sino a causa de la perversidad de estas naciones
  - sino por la maldad de estas naciones
  lexicon: HALOT
  rationale: El waw contrasta la falsa atribución de mérito con la verdadera causa del juicio. 'Perversidad' traduce רִשְׁעָה con un matiz moral fuerte y castellano natural; el 'sino' recoge el contraste implícito.
- source_word: רִשְׁעָה
  english_pob_choice: wickedness
  chosen_spanish: perversidad
  alternatives_spanish:
  - maldad
  - impiedad
  lexicon: HALOT
  rationale: En este contexto judicial, el término no es solo 'maldad' genérica, sino corrupción moral culpable; 'perversidad' conserva esa fuerza.
- source_word: מוֹרִישָׁם
  english_pob_choice: is dispossessing them
  chosen_spanish: las está desposeyendo
  alternatives_spanish:
  - las está expulsando
  - las está quitando de la posesión
  lexicon: HALOT
  rationale: El hifil de ירשׁ significa hacer perder la posesión. 'Desposeyendo' mantiene la relación léxica con 'poseer' y expresa bien el acto de quitarles la tierra.
theological_decisions:
- issue: Nombre divino יהוה / YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - SEÑOR
  rationale: Se conserva el nombre propio del pacto en vez de sustituirlo por un título. 'Yahvé' es la forma estándar adoptada por este proyecto en español.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: La falsa interpretación meritista de la entrada en la tierra
  english_pob_reading: Because of my righteousness Yahweh has brought me in to possess this land
  chosen_spanish_reading: Por causa de mi justicia Yahvé me ha hecho entrar para poseer esta tierra
  alternative_spanish_readings:
  - Por mi justicia Yahvé me ha hecho entrar para poseer esta tierra
  - A causa de mi justicia Yahvé me ha traído para tomar posesión de esta tierra
  rationale: La traducción mantiene el rechazo a toda lectura de mérito humano como base del don de la tierra, sin suavizar 'justicia' en un término menos cargado.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3'
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto hebreo y el audit trail inglés. Se han ajustado las elecciones para español natural: ''me ha hecho entrar'' para el hifil de בוא, ''desposeyendo'' para el hifil de ירשׁ, y se ha mantenido la distinción entre la autojustificación errónea y la causa real del juicio divino. No se detectaron cambios revisados en la última pasada inglesa.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' de manera consistente para el Tetragrámaton.
  - Se conserva 'esta tierra' para la tierra de la promesa, en armonía con el registro de Deuteronomio.
  - '''Poseer/desposeer'' mantiene un paralelismo léxico útil para el lector español.'
  - '''Justicia'' se emplea con valor moral/jurídico, no como simple bondad abstracta.'
  - El tono es formal pero natural para lectura eclesial en español.
