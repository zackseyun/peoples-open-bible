review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el hebreo base: conserva la prohibición, la imagen concreta de זוֹרֶה como figura agrícola ligada al viento, y la segunda advertencia sobre seguir un curso asociado con שִׁבֹּלֶת entendido como fenómeno tempestuoso. Sin embargo, falta en las notas la importante variante griega que el English POB conservó explícitamente, y el anclaje de la nota actual está mal ubicado: la nota sobre שִׁבֹּלֶת aparece sobre «aventador» en vez de sobre «tormenta» o la frase final.'
  spanish_quality_summary: El español es generalmente claro y digno, pero «No seas como un aventador» añade «como», que debilita la equivalencia con «No seas un aventador». Además, «para todo viento» suena menos natural y menos preciso que «a todo viento» en este contexto proverbial. «Camines por el camino» es legible pero algo redundante; «andes por la senda» o «camines por la senda» fluye mejor. La principal reparación necesaria es de fidelidad formal y de notas.
  glossary_alignment: No hay términos teológicos del glosario principal en juego. La decisión léxica clave «זוֹרֶה -> aventador» es aceptable y preserva la metáfora agrícola. «שִׁבֹּלֶת -> tormenta» también concuerda con la razón documentada, siempre que la incertidumbre léxica quede anotada correctamente. Debe añadirse la nota con la lectura griega alternativa, como en el audit trail inglés.
  issues:
  - severity: medium
    issue: La nota sobre שִׁבֹּלֶת está anclada en «aventador[a]» en lugar de en «tormenta» o la frase correspondiente.
    rationale: La nota explica la incertidumbre de שִׁבֹּלֶת, no de זוֹרֶה. El anclaje actual induce a confusión textual.
  - severity: medium
    issue: Falta la nota sobre la lectura paralela griega divergente preservada por el English POB.
    rationale: El encargo pide preservar alternativas significativas cuando el POB inglés las conservó. Aquí la variante griega es relevante y debe aparecer en nota.
  - severity: low
    issue: «No seas como un aventador» introduce un matiz comparativo no presente en el hebreo ni en el POB inglés.
    rationale: El hebreo dice literalmente «no seas un aventador», no «no seas como». Aunque comprensible, conviene evitar el añadido.
  - severity: low
    issue: «para todo viento» es menos idiomático que «a todo viento» en español bíblico-natural.
    rationale: La preposición «a» refleja mejor la construcción breve y proverbial, y suena más natural.
