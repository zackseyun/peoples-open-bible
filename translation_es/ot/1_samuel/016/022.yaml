    text: 'O: «Por favor, que David permanezca delante de mí», con el sentido de continuar en el servicio de Saúl.'
    reason: lexical_alternative
  revision_rationale: Se ajusta la sintaxis española para lograr una formulación natural y digna sin perder la estructura del hebreo. «Envió a Isaí, diciendo» conserva mejor el original que «envió a decir a Isaí». «Que David esté delante de mí» comunica de manera clara el jussivo cortés con su matiz de presencia de servicio, y la nota mantiene la alternativa contextual «permanezca».
