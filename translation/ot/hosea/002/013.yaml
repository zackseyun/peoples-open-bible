id: HOS.2.13
reference: Hosea 2:13
source:
  edition: WLC
  text: וְ/הִשְׁבַּתִּי֙ כָּל מְשׂוֹשָׂ֔/הּ חַגָּ֖/הּ חָדְשָׁ֣/הּ וְ/שַׁבַּתָּ֑/הּ וְ/כֹ֖ל מוֹעֲדָֽ/הּ־׃
translation:
  text: And I will put an end to all her rejoicing—her feasts[a], her new moons, her Sabbaths[b], and all her appointed times.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I will cause all her mirth to cease.'
    reason: lexical_alternative
  - marker: b
    text: '''Appointed festivals'' translates a term that can also mean ''appointed times''; here it refers to set religious observances.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִשְׁבַּתִּי
  chosen: I will put an end to
  alternatives:
  - I will cause to cease
  - I will stop
  lexicon: HALOT
  rationale: 'Hiphil of שׁבת here is causative: Yahweh will cause Israel''s celebrations to cease. ''Put an end to'' is natural English that preserves the force better than the more wooden ''cause to cease.'''
- source_word: כָּל
  chosen: all
  alternatives:
  - every
  lexicon: HALOT
  rationale: Retains the comprehensive scope of the judgment.
- source_word: מְשׂוֹשָׂהּ
  chosen: her rejoicing
  alternatives:
  - her mirth
  - all her joy
  lexicon: HALOT
  rationale: The noun denotes joy/mirth/rejoicing. 'Her rejoicing' preserves the verbal sense and fits the following appositional list of festive occasions. 'Mirth' is too archaic for the stated style goals.
- source_word: חַגָּהּ
  chosen: her feasts
  alternatives:
  - her festival
  - her pilgrimage feast
  lexicon: HALOT
  rationale: חַג commonly refers to festival feasts, often pilgrimage feasts. The plural sense is conveyed in English by the representative plural 'feasts' within the list, even though the Hebrew form is singular with suffix used collectively.
- source_word: חָדְשָׁהּ
  chosen: her new moons
  alternatives:
  - her monthly festivals
  - her new moon observances
  lexicon: HALOT
  rationale: In cultic context חֹדֶשׁ refers to the new moon observance rather than merely 'month.' 'New moons' is the standard and accurate rendering.
- source_word: וְשַׁבַּתָּהּ
  chosen: her Sabbaths
  alternatives:
  - her sabbath days
  lexicon: HALOT
  rationale: Plural/collective cultic reference is best represented by 'Sabbaths.' Capitalization preserves the recognized holy-day sense in English.
- source_word: וְכָל מוֹעֲדָהּ
  chosen: and all her appointed festivals
  alternatives:
  - and all her appointed times
  - and all her appointed feasts
  lexicon: HALOT
  rationale: מוֹעֵד can mean appointed time or appointed feast/festival. In this immediate list of cultic observances, 'appointed festivals' best captures the religious-calendar sense without flattening it to mere chronology.
