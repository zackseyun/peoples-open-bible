translation:
  language: es
  text: 'Por tanto, diles[a]: «Así dice Yahvé de los ejércitos: Vuelvan a mí, declara Yahvé de los ejércitos, y yo volveré a ustedes, dice Yahvé de los ejércitos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Vuélvanse a mí ... y yo me volveré a ustedes». El hebreo usa el mismo verbo en ambas cláusulas, enfatizando la restauración recíproca.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאָמַרְתָּ
  english_pob_choice: Therefore say
  chosen_spanish: Por tanto, diles
  alternatives_spanish:
  - Y di
  - Entonces di
  lexicon: HALOT
  rationale: El prefijo conjuntivo enlaza este mandato con la afirmación anterior; «Por tanto» expresa bien esa conexión discursiva en español natural sin perder el matiz inferencial.
- source_word: אֲלֵהֶם
  english_pob_choice: to them
  chosen_spanish: diles
  alternatives_spanish:
  - a ellos
  - háblales
  lexicon: HALOT
  rationale: El complemento pronominal masculino plural se expresa de forma natural con el dativo enclítico «diles», que conserva la dirección del mandato sin añadir contenido.
- source_word: כֹּה אָמַר
  english_pob_choice: Thus says
  chosen_spanish: Así dice
  alternatives_spanish:
  - Así ha dicho
  - Esto dice
  lexicon: HALOT
  rationale: La fórmula profética funciona de manera solemne en español con «Así dice», que mantiene el registro oracular sin sonar artificial.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino como «Yahvé», conforme al criterio del proyecto para el Tetragrámaton y con lectura pública natural en español.
- source_word: צְבָאוֹת
  english_pob_choice: of hosts
  chosen_spanish: de los ejércitos
  alternatives_spanish:
  - de los ejércitos celestiales
  - de las huestes
  lexicon: HALOT
  rationale: «De los ejércitos» reproduce el título divino con un giro transparente en español; «huestes» es posible, pero menos común y más cargado de tradición.
- source_word: שׁוּבוּ אֵלַי
  english_pob_choice: Return to me
  chosen_spanish: Vuélvanse a mí
  alternatives_spanish:
  - Vuelvan a mí
  - Regresen a mí
  lexicon: HALOT
  rationale: Se preserva el valor de שׁוּב como volver/retornar con una forma imperativa natural en español; «vuélvanse» mantiene además la posibilidad de sentido reflexivo de conversión.
- source_word: נְאֻם
  english_pob_choice: declares
  chosen_spanish: declara
  alternatives_spanish:
  - dice
  - proclama
  lexicon: HALOT
  rationale: En fórmula profética, «declara» refleja bien la solemnidad de נְאֻם y conserva la distinción con el segundo verbo de habla del versículo.
- source_word: וְאָשׁוּב אֲלֵיכֶם
  english_pob_choice: and I will return to you
  chosen_spanish: y yo me volveré a ustedes
  alternatives_spanish:
  - y volveré a ustedes
  - y yo regresaré a ustedes
  lexicon: HALOT
  rationale: Se mantiene el eco verbal de שׁוּב con «volveré», preservando la reciprocidad pactal que el hebreo enfatiza entre la respuesta humana y la respuesta divina.
- source_word: אָמַר יְהוָה צְבָאוֹת
  english_pob_choice: says Yahweh of hosts
  chosen_spanish: dice Yahvé de los ejércitos
  alternatives_spanish:
  - declara Yahvé de los ejércitos
  - dice el Yahvé de los ejércitos
  lexicon: HALOT
  rationale: El cierre repite la fórmula de habla divina; «dice Yahvé de los ejércitos» mantiene la cadencia del hebreo y el título divino completo sin sustituciones.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: Se translitera el nombre del pacto de acuerdo con la convención del proyecto en español; así se evita la sustitución por un título y se preserva la referencia personal al Dios de Israel.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Reciprocidad de שׁוּב
  english_pob_reading: Return to me ... and I will return to you
  chosen_spanish_reading: Vuélvanse a mí ... y yo me volveré a ustedes
  alternative_spanish_readings:
  - Vuelvan a mí ... y yo volveré a ustedes
  - Vuélvete a mí ... y me volveré a ti
  rationale: El hebreo usa el mismo verbo en ambas cláusulas; «volverse» conserva la simetría verbal y la idea de restauración relacional/covenantal sin forzar una paráfrasis doctrinalmente más amplia.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #5 (consistency of key terms)'
translation_notes:
  revision_awareness: 'El texto sigue de cerca el consenso auditado del original hebreo y coincide con la revisión más reciente: no se requieren cambios adicionales; se ha ajustado la formulación al español para conservar el paralelismo verbal y la cadencia profética.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה, conforme al criterio del proyecto.
  - Se mantiene «de los ejércitos» para צְבָאוֹת en ambas apariciones, preservando el título completo.
  - Se conserva el mismo verbo («volver(se)») para el paralelismo entre la llamada humana y la respuesta divina.
  - El registro es reverente y público, sin calcos innecesarios del inglés, pero con fidelidad al hebreo.
