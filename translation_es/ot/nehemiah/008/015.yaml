review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura global del hebreo: la proclamación pública, su difusión por las ciudades y Jerusalén, la orden de salir a la zona montañosa y traer material vegetal para hacer sucot, y la cláusula final «como está escrito». Sin embargo, añade una nota [a] no respaldada por la auditoría inglesa ni necesaria por ambigüedad en español, y omite la nota importante sobre la identificación incierta de עֵץ שֶׁמֶן. Además, «árbol de aceite» suena poco idiomático en español; conviene mantener la literalidad con una nota aclaratoria o usar una forma más natural con nota.'
  spanish_quality_summary: La redacción es generalmente clara y digna. «Se proclamara» y «se hiciera correr la voz» funcionan bien en la subordinación tras «y que». «Territorio montañoso» es entendible, pero «región montañosa» o «zona montañosa» suena más natural. El principal problema de calidad es «árbol de aceite», que resulta extraño en español e invita a confusión; también las notas actuales no siguen bien la lógica del proyecto, porque la [a] comenta algo no problemático y la [b] explica una decisión española pero no preserva la alternativa léxica clave del audit trail inglés.
  glossary_alignment: 'No hay conflictos con la terminología doctrinal del proyecto. «Cabañas» es aceptable para סֻכּוֹת en este contexto. La decisión para עֵץ שֶׁמֶן debe alinearse mejor con la auditoría: el texto principal puede decir «árbol de aceite», pero necesita nota léxica sobre las alternativas «olivo silvestre» u «oleastro» y la incertidumbre botánica.'
  issues:
  - severity: medium
    issue: La nota [a] actual no preserva una alternativa textual o léxica significativa.
    rationale: El inglés marca [a] para la identificación incierta de עֵץ שֶׁמֶן, no para «Jerusalén». La nota española sobre Jerusalén es redundante y no responde a una ambigüedad real.
  - severity: medium
    issue: Falta una nota léxica sobre עֵץ שֶׁמֶן.
    rationale: La auditoría inglesa documenta explícitamente la incertidumbre de especie y preserva alternativas. Esa información debe mantenerse también en español.
  - severity: low
    issue: «Árbol de aceite» es poco idiomático en español.
    rationale: Aunque cercano a «oil tree», suena forzado. Puede mantenerse por cercanía léxica si va acompañado de una nota; alternativamente, «árbol oleífero» sería más natural, pero menos transparente respecto del audit trail.
  - severity: low
    issue: La nota [b] actual no refleja la nota inglesa sobre «leaves/branches».
    rationale: El inglés preserva que el hebreo dice literalmente «hojas de...», mientras usa «branches» por naturalidad. En español conviene conservar esa justificación si se usa «ramas».
