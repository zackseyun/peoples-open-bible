translation:
  language: es
  text: 'Yo dije: «Regaré mi jardín y empaparé mi bancal[a]». Y he aquí, mi canal se convirtió en río[b], y mi río se convirtió en mar.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cama de cultivo»; el griego πρασιά designa un bancal o lecho cultivado, no un cantero ornamental.
    reason: lexical_alternative
  - marker: b
    text: La imagen intensifica el flujo desde un conducto pequeño hasta un río y luego hasta un mar, para expresar un aumento extraordinario.
    reason: cultural_note
lexical_decisions:
- source_word: Ποτιῶ
  english_pob_choice: I will water
  chosen_spanish: regaré
  alternatives_spanish:
  - daré de beber a
  - irrigaré
  lexicon: LSJ
  rationale: En contexto hortícola, ποτίζω/ποτιῶ expresa dar agua a una plantación. «Regaré» es natural en español y conserva la imagen agrícola sin tecnicismo innecesario.
- source_word: κῆπον
  english_pob_choice: garden
  chosen_spanish: jardín
  alternatives_spanish:
  - huerto
  - huerta
  lexicon: LSJ
  rationale: κῆπος significa jardín o espacio cultivado. «Jardín» mantiene el paralelo amplio con πρασιά y funciona bien en español actual; «huerto» se reserva en esta línea para πρασιά, que concreta mejor el espacio de cultivo.
- source_word: μεθύσω
  english_pob_choice: I will drench
  chosen_spanish: empaparé
  alternatives_spanish:
  - regaré abundantemente
  - saturaré
  lexicon: LSJ
  rationale: Aquí el verbo intensifica la acción de regar hasta el exceso. «Empaparé» comunica la saturación vívida del griego mejor que un simple «regaré» repetido, y evita la asociación literal con embriagar.
- source_word: πρασιάν
  english_pob_choice: garden bed
  chosen_spanish: huerto
  alternatives_spanish:
  - bancal
  - parterre
  - cama de cultivo
  lexicon: LSJ
  rationale: πρασιά designa un bancal o lecho cultivado. En español, «huerto» ofrece una imagen agrícola clara y digna, menos ornamental que «parterre» y menos técnica que «cama de cultivo».
- source_word: ἰδοὺ
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - miren
  - vean
  lexicon: LSJ
  rationale: «He aquí» reproduce el giro enfático y solemne del griego, manteniendo el tono retórico de Sirácida.
- source_word: διῶρυξ
  english_pob_choice: channel
  chosen_spanish: canal
  alternatives_spanish:
  - zanja
  - acequia
  - cauce
  lexicon: LSJ
  rationale: διῶρυξ es un conducto de agua hecho por corte o excavación. «Canal» conserva la idea de un cauce artificial sin rebajarlo a «zanja» ni especializarlo demasiado como «acequia».
- source_word: ποταμόν
  english_pob_choice: river
  chosen_spanish: río
  alternatives_spanish:
  - corriente
  lexicon: LSJ
  rationale: El sentido básico es «río». «Río» conserva la progresión de aumento desde un canal pequeño hasta una corriente mayor.
- source_word: θάλασσαν
  english_pob_choice: sea
  chosen_spanish: mar
  alternatives_spanish:
  - océano
  lexicon: LSJ
  rationale: La correspondencia natural en español es «mar»; refleja bien la ampliación hiperbólica del agua sin forzar un referente geográfico específico.
theological_decisions:
- issue: Expansión metafórica de la provisión hasta una abundancia desbordante
  english_pob_reading: Preserve the agricultural-water metaphor straightforwardly without allegorical expansion in the main text.
  chosen_spanish_reading: Conservar la metáfora concreta de riego y desborde sin explicarla alegóricamente en el texto principal.
  alternative_spanish_readings:
  - Interpretar explícitamente la imagen como difusión de la sabiduría
  - Añadir una glosa doctrinal sobre la enseñanza que se derrama
  rationale: El versículo presenta una imagen concreta de aumento extraordinario, pero no la interpreta. La traducción debe respetar ese nivel sin importar una explicación doctrinal ajena al verso.
  doctrine_reference: POB philosophy §§1, 3, 6
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión que descartó «flowerbed» por demasiado ornamental y prefirió una expresión agrícola más general; por eso se optó por «huerto» para πρασιά. También se conservó la progresión retórica canal → río → mar, en consonancia con la lectura final aprobada del audit trail inglés.
  spanish_consistency_notes:
  - Se mantuvo el registro sobrio y bíblico con puntuación moderna.
  - Se evitó «SEÑOR» o cualquier sustitución teológica ajena al texto, ya que no aparece el nombre divino en este versículo.
  - «Mar» se eligió por naturalidad española y por reflejar la hipérbole del griego sin introducir precisión geográfica inexistente.
