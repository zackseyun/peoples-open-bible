translation:
  language: es
  text: Y enviaré fuego sobre Magog y sobre los que habitan con seguridad en las regiones costeras[a], y sabrán que yo soy Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las islas». El término hebreo puede referirse a islas o, en el uso profético, de manera más amplia a regiones costeras distantes.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשִׁלַּחְתִּי
  english_pob_choice: And I will send
  chosen_spanish: Y enviaré
  alternatives_spanish:
  - Y despacharé
  - Y soltaré
  lexicon: HALOT
  rationale: El verbo hiphil de שלח en discurso profético se expresa de manera natural en futuro; «enviaré» reproduce con claridad la acción divina y mantiene la relación directa con «fuego» como objeto.
- source_word: אֵשׁ
  english_pob_choice: fire
  chosen_spanish: fuego
  alternatives_spanish:
  - fuego
  - llama
  lexicon: HALOT
  rationale: «Fuego» es la equivalencia literal y más directa; conserva la imaginería de juicio profético sin introducir una abstracción como «juicio» en el texto principal.
- source_word: בְּמָגוֹג
  english_pob_choice: on Magog
  chosen_spanish: sobre Magog
  alternatives_spanish:
  - contra Magog
  - en Magog
  lexicon: HALOT
  rationale: Con un verbo de enviar fuego, la preposición puede expresarse en español como «sobre» para indicar el blanco del juicio de forma idiomática y fiel al sentido.
- source_word: וּבְיֹשְׁבֵי הָאִיִּים
  english_pob_choice: and on those who live securely in the coastlands
  chosen_spanish: y sobre los que habitan con seguridad en las regiones costeras
  alternatives_spanish:
  - y sobre los habitantes de las regiones costeras que viven con seguridad
  - y sobre los que habitan con seguridad en las islas
  lexicon: HALOT
  rationale: יַשְׁבֵי/יֹשְׁבֵי expresa literalmente «los que habitan»; en español conviene mantener esa construcción. «Regiones costeras» comunica el alcance amplio de הָאִיִּים en uso profético, sin restringirlo innecesariamente a islas literales.
- source_word: הָאִיִּים
  english_pob_choice: the coastlands
  chosen_spanish: las regiones costeras
  alternatives_spanish:
  - las islas
  - las costas
  lexicon: HALOT
  rationale: Aunque el término puede significar «islas», en el registro profético también abarca tierras marítimas lejanas. «Regiones costeras» evita estrechar el sentido y suena natural en español bíblico contemporáneo.
- source_word: לָבֶטַח
  english_pob_choice: securely
  chosen_spanish: con seguridad
  alternatives_spanish:
  - en seguridad
  - seguramente
  lexicon: HALOT
  rationale: El adverbio expresa un estado de seguridad. «Con seguridad» preserva la fuerza adverbial y en español se enlaza bien con el participio «habitan».
- source_word: וְיָדְע֖וּ
  english_pob_choice: and they will know
  chosen_spanish: y sabrán
  alternatives_spanish:
  - y conocerán
  - entonces sabrán
  lexicon: HALOT
  rationale: El futuro simple mantiene la secuencia del hebreo. «Sabrán» es una forma natural en español y conserva el valor de reconocimiento resultante del acto de juicio.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: El texto hebreo usa el Tetragrama; en español del proyecto se rinde como «Yahvé» para preservar el nombre divino personal y evitar la sustitución por un título.
theological_decisions:
- issue: Traducción del Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: La lectura auditada preserva el Nombre propio de Dios, no un título sustitutivo. En español, «Yahvé» es la forma proyectada por esta versión para el Tetragrama, manteniendo transparencia con la fuente hebrea.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Alcance de לָבֶטַח
  english_pob_reading: attached to the inhabitants of the coastlands ('those who live securely')
  chosen_spanish_reading: 'unido a los habitantes: «los que habitan con seguridad»'
  alternative_spanish_readings:
  - «en seguridad» aplicado de manera más libre a toda la cláusula
  - «seguramente»
  rationale: El adverbio califica naturalmente a los que habitan, no a Magog. La versión española mantiene esa relación sintáctica para reflejar mejor el hebreo y evitar una ambigüedad innecesaria.
  doctrine_reference: Sintaxis hebrea del participio + adverbio de estado
- issue: הָאִיִּים como término geográfico profético
  english_pob_reading: the coastlands
  chosen_spanish_reading: las regiones costeras
  alternative_spanish_readings:
  - las islas
  - las costas
  rationale: 'La elección preserva la amplitud semántica del término en profecía: no sólo islas, sino también tierras marítimas distantes. «Regiones costeras» es suficientemente amplio y entendible para lectores de español.'
  doctrine_reference: Uso profético de הָאִיִּים
translation_notes:
  revision_awareness: No se registraron revisiones aplicadas en el audit trail; el presente borrador sigue de cerca la decisión revisada como «sin cambios» y conserva la misma estructura sintáctica y semántica del registro inglés auditado.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como forma uniforme para el Tetragrama.
  - Se usó «regiones costeras» para sostener el valor geográfico amplio de הָאִיִּים sin cerrar el sentido a islas literales.
  - Se prefirió «con seguridad» para reproducir el estado de confianza de לָבֶטַח con naturalidad en español.
  - 'La puntuación y el orden de la cláusula siguen el flujo hebreo: juicio divino, localización, resultado de conocimiento.'
