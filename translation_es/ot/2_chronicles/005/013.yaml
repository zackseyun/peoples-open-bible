revisions:
- from: Y aconteció que, como los trompeteros y los cantores estaban unidos[a], para hacer oír una sola voz, para alabar y dar gracias a Yahvé, y alzaban la voz con trompetas, címbalos e instrumentos de canto, y al alabar a Yahvé, “Porque es bueno, porque para siempre es su misericordia”[b], la casa, la casa de Yahvé, se llenó de una nube.
  to: 'Y aconteció que, cuando los que tocaban las trompetas y los cantores eran como uno[a], para hacer oír un solo sonido, al alabar y dar gracias a Yahvé, y cuando alzaban la voz con trompetas, címbalos e instrumentos musicales, y alababan a Yahvé: «Porque él es bueno, porque su amor fiel[b] es para siempre», la casa, la casa de Yahvé, se llenó de una nube.'
  rationale: 'La revisión corrige tres puntos principales: (1) restaura mejor la imagen hebrea de unidad con «eran como uno» en vez de «estaban unidos»; (2) aclara el resultado auditivo con «un solo sonido»; y (3) alinea חֶסֶד con la decisión teológica documentada mediante «amor fiel» en el texto principal, dejando «misericordia» como alternativa en nota. Además, se suavizan algunos giros para un español más natural y litúrgicamente legible.'
