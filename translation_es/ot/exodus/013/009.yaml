translation:
  language: es
  text: Y será para ti como señal sobre tu mano y como memorial[a] entre tus ojos, para que la ley[b] de Yahvé esté en tu boca; porque con mano fuerte[c] Yahvé te sacó de Egipto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en tu frente»; «entre tus ojos» también puede entenderse idiomáticamente así, pero aquí se conserva la redacción literal del hebreo.
    reason: lexical_alternative
  - marker: b
    text: O «instrucción de Yahvé». תּוֹרָה puede significar «ley» o «instrucción», según el contexto.
    reason: lexical_alternative
  - marker: c
    text: Traducciones tradicionales suelen decir «con mano poderosa».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: And it shall be
  chosen_spanish: Y será
  alternatives_spanish:
  - Y estará
  - Y acontecerá
  lexicon: HALOT
  rationale: En este contexto instructivo y prospectivo, el hebreo funciona como una disposición futura. «Será» conserva el valor formal sin sonar artificial en español.
- source_word: לְאוֹת
  english_pob_choice: as a sign
  chosen_spanish: como señal
  alternatives_spanish:
  - como signo
  - como marca
  lexicon: HALOT
  rationale: אוֹת admite «señal», «signo» o «marca». «Señal» es natural en español y conserva el sentido amplio de distintivo o recordatorio simbólico.
- source_word: עַל יָדְךָ
  english_pob_choice: on your hand
  chosen_spanish: sobre tu mano
  alternatives_spanish:
  - en tu mano
  - sobre tu brazo
  lexicon: HALOT
  rationale: La imagen hebrea es literal. «Sobre tu mano» mantiene la concreción del texto y evita anticipar una interpretación ritual posterior.
- source_word: וּלְזִכָּרוֹן
  english_pob_choice: and as a memorial
  chosen_spanish: como memorial
  alternatives_spanish:
  - como recuerdo
  - como remembranza
  lexicon: HALOT
  rationale: זִכָּרוֹן tiene peso conmemorativo y pactal. «Memorial» conserva mejor ese tono que «recuerdo», que suena más cotidiano.
- source_word: בֵּין עֵינֶיךָ
  english_pob_choice: between your eyes
  chosen_spanish: entre tus ojos
  alternatives_spanish:
  - en tu frente
  - sobre tu frente
  lexicon: HALOT
  rationale: Se conserva la forma literal del hebreo. «Entre tus ojos» preserva la imagen de origen y deja abierta la cuestión interpretativa.
- source_word: לְמַעַן
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - con el propósito de que
  lexicon: HALOT
  rationale: Introduce finalidad. «Para que» es la equivalencia más natural y clara en español.
- source_word: תּוֹרַת יְהוָה
  english_pob_choice: the law of Yahweh
  chosen_spanish: la ley de Yahvé
  alternatives_spanish:
  - la instrucción de Yahvé
  - la Torah de Yahvé
  lexicon: HALOT
  rationale: תוֹרָה puede significar «ley» o «instrucción». En este marco covenantal, «ley» refleja bien la fuerza normativa del término, mientras «instrucción» queda como alternativa válida.
- source_word: בְּפִיךָ
  english_pob_choice: in your mouth
  chosen_spanish: en tu boca
  alternatives_spanish:
  - en tus labios
  lexicon: HALOT
  rationale: La expresión es literal. «En tu boca» mantiene la imagen de recitación y proclamación verbal sin explicarla en exceso.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Aquí introduce la razón de la orden. «Porque» expresa con claridad la relación causal en español.
- source_word: בְּיָד חֲזָקָה
  english_pob_choice: with a strong hand
  chosen_spanish: con mano fuerte
  alternatives_spanish:
  - con mano poderosa
  - con mano recia
  lexicon: HALOT
  rationale: La fórmula del Éxodo se puede verter literalmente. «Con mano fuerte» conserva la imagen hebrea de manera directa y reconocible.
- source_word: הוֹצִאֲךָ
  english_pob_choice: brought you out
  chosen_spanish: te sacó
  alternatives_spanish:
  - te hizo salir
  - te sacó fuera
  lexicon: HALOT
  rationale: El hifil de יצא significa causar salir o sacar. «Te sacó» es idiomático en español y reproduce bien el acto de liberación.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue la convención del proyecto: el nombre divino se traduce como «Yahvé» y no se sustituye por un título.'
- source_word: מִמִּצְרָיִם
  english_pob_choice: out of Egypt
  chosen_spanish: de Egipto
  alternatives_spanish:
  - desde Egipto
  - fuera de Egipto
  lexicon: HALOT
  rationale: Con «sacar» en español, «de Egipto» comunica la salida desde ese lugar con naturalidad y fidelidad.
theological_decisions:
- issue: Si «entre tus ojos» debe interpretarse como una referencia explícita a filacterias/tefilín
  english_pob_reading: 'Retain the literal imagery in the main text: ''a memorial between your eyes.'''
  chosen_spanish_reading: 'Mantener la imagen literal: «entre tus ojos».'
  alternative_spanish_readings:
  - «en tu frente»
  - «como referencia a las filacterias»
  rationale: El hebreo no nombra objetos rituales posteriores. Preservar la literalidad deja abierta la tensión entre imagen concreta e interpretación tradicional, sin imponer una explicación posterior al texto.
  doctrine_reference: Translation philosophy §3; §1
- issue: Cómo traducir תּוֹרָה en este pasaje
  english_pob_reading: Translate as 'law' rather than 'instruction' in the main text.
  chosen_spanish_reading: Traducir como «ley» en el texto principal.
  alternative_spanish_readings:
  - «instrucción»
  - «Torah»
  rationale: En este contexto de mandato memorial y pacto, «ley» comunica bien el carácter normativo del término. La alternativa «instrucción» sigue siendo semánticamente válida y se conserva implícitamente como posibilidad.
  doctrine_reference: Translation philosophy §5
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el pasaje base. La redacción española sigue de cerca el hebreo y el audit trail inglés, preservando la literalidad de las imágenes corporales y la ambigüedad interpretativa correspondiente.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה.
  - Se mantiene «ley» para תּוֹרָה en el texto principal, con nota alternativa sobre «instrucción».
  - Se conserva la imagen literal «entre tus ojos» sin explicitar filacterias en el texto principal.
  - «Con mano fuerte» respeta la fórmula del Éxodo y la coherencia terminológica del proyecto.
