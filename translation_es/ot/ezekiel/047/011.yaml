translation:
  language: es
  text: Pero sus pantanos y ciénagas[a] no serán sanados[b]; quedan para la sal[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Pantanos y ciénagas» traduce dos términos hebreos cercanos; ambos describen zonas húmedas o encharcadas, y en español conviene diferenciarlos con dos vocablos naturales.
    reason: lexical_alternative
  - marker: b
    text: El hebreo dice literalmente «no serán sanados», manteniendo la imagen del capítulo en que las aguas son “sanadas” o hechas sanas.
    reason: lexical_alternative
  - marker: c
    text: 'O: «son entregados para la sal».'
    reason: lexical_alternative
lexical_decisions:
- source_word: בצאתו
  english_pob_choice: its swamps
  chosen_spanish: sus pantanos
  alternatives_spanish:
  - sus ciénagas
  - sus marismas
  lexicon: HALOT
  rationale: El término topográfico se refiere a zonas bajas y encharcadas vinculadas al flujo del agua; «pantanos» conserva bien la idea de humedal y resulta natural en español.
- source_word: וגבאיו
  english_pob_choice: and marshes
  chosen_spanish: y ciénagas
  alternatives_spanish:
  - y marismas
  - y estanques
  lexicon: HALOT
  rationale: El segundo término también apunta a depresiones acuosas o lugares encharcados. «Ciénagas» mantiene el paralelismo con «pantanos» sin volver el texto artificial.
- source_word: ירפאו
  english_pob_choice: be healed
  chosen_spanish: serán sanados
  alternatives_spanish:
  - serán restaurados
  - serán curados
  lexicon: HALOT
  rationale: Se conserva la metáfora del verbo «sanar/ser sanados» para reflejar el hebreo niphal de רפא y el lenguaje del pasaje sobre aguas “curadas” o sanadas.
- source_word: למלח
  english_pob_choice: for salt
  chosen_spanish: a la sal
  alternatives_spanish:
  - para la sal
  - destinados a la sal
  lexicon: HALOT
  rationale: La preposición ל expresa destino o finalidad; en español, «a la sal» funciona como resultado pasivo dentro de la frase, y se complementa con «han sido destinados a la sal» para mayor claridad.
- source_word: נתנו
  english_pob_choice: they are left
  chosen_spanish: han sido destinados
  alternatives_spanish:
  - han sido dejados
  - quedan entregados
  lexicon: HALOT
  rationale: El pasivo del hebreo indica asignación o puesta aparte. «Han sido destinados» preserva esa idea de designación para la sal sin perder naturalidad en español.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el hebreo y el audit trail inglés: conserva la metáfora de sanidad para las aguas y el sentido de destino/consagración de las zonas salinas, sin suavizar la imagen original.'
  spanish_consistency_notes:
  - Se usó «Yahvé» en otros contextos del proyecto cuando corresponde; este versículo no contiene el nombre divino.
  - Se prefirió «sanados» frente a «restaurados» para mantener la imagen léxica del original.
  - «Pantanos» y «ciénagas» responden a dos términos hebreos distintos y no deben entenderse como mera repetición estilística.
