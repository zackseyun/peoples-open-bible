translation:
  language: es
  text: No hay oscuridad[a], ni sombra densa, donde puedan esconderse los que obran maldad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sombra de muerte»; el término hebreo también puede denotar oscuridad muy profunda o penumbra densa en contextos poéticos.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵין
  english_pob_choice: There is no
  chosen_spanish: No hay
  alternatives_spanish:
  - no existe
  - no hay ninguna
  lexicon: HALOT
  rationale: La negación existencial del hebreo se expresa de forma natural en español con «No hay», que comunica la misma ausencia sin sonar forzado.
- source_word: חֹשֶׁךְ
  english_pob_choice: darkness
  chosen_spanish: oscuridad
  alternatives_spanish:
  - tinieblas
  - oscuridad profunda
  lexicon: HALOT
  rationale: «Oscuridad» mantiene el sentido básico y es idiomático en español moderno; «tinieblas» sería más solemne, pero aquí no es necesario.
- source_word: צַלְמָוֶת
  english_pob_choice: deep shadow
  chosen_spanish: sombra profunda
  alternatives_spanish:
  - sombra de muerte
  - tinieblas densas
  - oscuridad profunda
  lexicon: HALOT
  rationale: La imagen poética apunta a una oscuridad muy intensa. «Sombra profunda» preserva la intensificación sin imponer «muerte» al término, siguiendo la decisión auditada del inglés.
- source_word: לְהִסָּתֶר
  english_pob_choice: may hide themselves
  chosen_spanish: puedan esconderse
  alternatives_spanish:
  - se escondan
  - puedan ocultarse
  - se oculten
  lexicon: HALOT
  rationale: El infinitivo constructo con ל expresa finalidad; en español funciona mejor como una relativa final («donde puedan esconderse») que como un infinitivo literal. «Esconderse» conserva el valor reflexivo.
- source_word: שָׁם
  english_pob_choice: where
  chosen_spanish: donde
  alternatives_spanish:
  - allí donde
  - allí
  lexicon: HALOT
  rationale: Aunque literalmente significa «allí», en español la construcción relativa «donde» reproduce mejor la relación de lugar con fluidez natural.
- source_word: פֹּעֲלֵי אָוֶן
  english_pob_choice: workers of wickedness
  chosen_spanish: los que hacen maldad
  alternatives_spanish:
  - obreros de maldad
  - hacedores de maldad
  - los que obran iniquidad
  lexicon: HALOT
  rationale: La expresión hebrea conserva una imagen verbal de acción; en español «los que hacen maldad» transmite esa idea de manera clara y ampliamente inteligible. Evita una formulación demasiado rígida como «obreros de maldad».
- source_word: אָוֶן
  english_pob_choice: wickedness
  chosen_spanish: maldad
  alternatives_spanish:
  - iniquidad
  - mal
  - perversidad
  lexicon: HALOT
  rationale: En este contexto moral, «maldad» comunica de forma directa la calidad ética negativa de quienes actúan así. «Iniquidad» sería posible, pero suena más tradicional y menos inmediato en español contemporáneo.
theological_decisions:
- issue: Valor poético de צַלְמָוֶת sin introducir innecesariamente la idea de muerte
  english_pob_reading: deep shadow
  chosen_spanish_reading: sombra profunda
  alternative_spanish_readings:
  - sombra de muerte
  - tinieblas densas
  rationale: El versículo trata de la imposibilidad de ocultarse, no de la muerte. Por eso se conserva la intensidad de la imagen con «sombra profunda» y se evita cargar el texto con una referencia a muerte que el contexto no exige.
  doctrine_reference: Translation philosophy §1, §3
- issue: Conservación del paralelismo poético entre oscuridad y ocultamiento
  english_pob_reading: There is no darkness, and no deep shadow, where workers of wickedness may hide themselves.
  chosen_spanish_reading: No hay oscuridad, ni sombra profunda, donde puedan esconderse los que hacen maldad.
  alternative_spanish_readings:
  - No hay tinieblas ni sombra profunda donde se escondan los que hacen maldad.
  - No hay oscuridad ni tinieblas densas donde puedan ocultarse los que obran iniquidad.
  rationale: Se mantiene el doble miembro negativo y el verbo de ocultarse, preservando el contraste poético entre la ausencia de cobertura y la exposición de los malhechores.
  doctrine_reference: Translation philosophy §2, §4
translation_notes:
  revision_awareness: El texto inglés auditado no presenta revisiones aplicadas y quedó confirmado como estable en la última pasada; la versión española sigue esa lectura sin introducir cambios textuales adicionales.
  spanish_consistency_notes:
  - Se usa «Yahvé» por defecto en el proyecto, pero este versículo no lo contiene.
  - Se conserva el paralelismo negativo con «No hay... ni...», alineado con la estructura hebrea.
  - «Esconderse» mantiene el matiz reflexivo del verbo hebreo; no se sustituye por una forma impersonal o meramente transitiva.
