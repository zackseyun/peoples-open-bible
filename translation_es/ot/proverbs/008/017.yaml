translation:
  language: es
  text: Yo amo a los que me aman[a], y los que me buscan con diligencia me encuentran.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los que me buscan temprano me encuentran». El verbo hebreo puede significar buscar temprano y, por extensión, buscar con diligencia o empeño.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲנִי
  english_pob_choice: I
  chosen_spanish: Yo
  alternatives_spanish:
  - Yo mismo
  - Yo, por mi parte
  lexicon: Pronombre personal de 1.ª persona singular
  rationale: Se conserva el énfasis del pronombre en posición inicial. En español, añadir «Yo» mantiene la fuerza enfática sin volver la frase artificiosa.
- source_word: אהבי/ה
  english_pob_choice: those who love me
  chosen_spanish: a los que me aman
  alternatives_spanish:
  - los que me aman
  - mis amantes
  - mis amigos
  lexicon: Participio con sufijo de 1cs de אָהֵב / amar
  rationale: El hebreo presenta un participio substantivado con sufijo; en español, una relativa con «los que me aman» expresa con naturalidad esa relación recíproca. Se evita «mis amantes» por connotación erótica ajena al contexto sapiencial, y «mis amigos» por suavizar demasiado el amor reciproco del verso.
- source_word: אֵהָב
  english_pob_choice: I love
  chosen_spanish: amo
  alternatives_spanish:
  - amaré
  - seguiré amando
  lexicon: Qal imperfecto 1cs de אָהֵב
  rationale: En un proverbio, el imperfecto hebreo tiene valor gnómico; por eso el presente «amo» comunica mejor la verdad general que un futuro en español.
- source_word: מְשַׁחֲרַי
  english_pob_choice: those who seek me diligently
  chosen_spanish: los que me buscan con diligencia
  alternatives_spanish:
  - los que me buscan temprano
  - los que me buscan con esmero
  - los que me buscan de mañana
  lexicon: Participio piel de שׁחר con sufijo de 1cs
  rationale: Se conserva el sentido intensivo de búsqueda. «Con diligencia» recoge el valor idiomático que el inglés auditado también prioriza, sin restringirlo solo a una referencia temporal de la mañana.
- source_word: יִמְצָאֻנְנִי
  english_pob_choice: find me
  chosen_spanish: me hallan
  alternatives_spanish:
  - me encontrarán
  - me hallarán
  lexicon: Qal imperfecto 3mp con sufijo de 1cs de מצא
  rationale: En estilo proverbial, el presente gnómico «me hallan» reproduce el valor general del hebreo y mantiene el paralelismo con «amo». «Hallan» también suena más natural en registro bíblico sobrio que un futuro simple.
theological_decisions:
- issue: Lenguaje recíproco entre Sabiduría y quienes la buscan
  english_pob_reading: Render the statement as a general reciprocal principle without importing later christological or soteriological categories.
  chosen_spanish_reading: Presentar el dicho como un principio general recíproco entre la Sabiduría personificada y quienes la aman y la buscan.
  alternative_spanish_readings:
  - Leerlo como una promesa de elección salvadora
  - Leerlo como referencia directa a Cristo en el texto principal
  rationale: En Proverbios 8 habla la Sabiduría personificada. El español debe conservar ese marco literario-teológico, sin cargar el verso con categorías doctrinales posteriores que el hebreo no formula explícitamente.
  doctrine_reference: Principio de mantener la tensión teológica del texto sin resolverla ni importarle categorías ajenas al pasaje.
translation_notes:
  revision_awareness: 'El borrador sigue el estado revisado más reciente sin cambios sustanciales: la lectura inglesa auditada mantiene un presente gnómico y una nota para el matiz de שׁחר, que se refleja en español con «con diligencia» y una alternativa de nota para «temprano».'
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se emplea «amo»/«aman» para reflejar el campo semántico de אהב sin endurecerlo ni erotizarlo.
  - «Hallar» se usa como equivalente bíblico natural de מצא en este contexto sapiencial.
  - La nota al pie se ancla en «diligencia» porque ahí está la decisión interpretativa principal del verbo שׁחר.
