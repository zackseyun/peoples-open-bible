  glossary_alignment: «Yahvé» cumple la política del proyecto para יְהוָה. «Empobrece» y «enriquece» concuerdan con las decisiones léxicas auditadas. La nota a sobre «despoja» preserva bien la alternativa de מוֹרִישׁ. La nota b debe anclarse al verbo final, no a «enriquece», porque en el audit trail inglés la alternativa «exalts / raises up» corresponde a מְרוֹמֵם.
