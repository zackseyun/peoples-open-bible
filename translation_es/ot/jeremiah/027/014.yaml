translation:
  language: es
  text: 'Y no escuchen las palabras de los profetas que les dicen[a]: «No servirán al rey de Babilonia», porque les profetizan una mentira.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No sirvan al rey de Babilonia». La forma hebrea puede leerse como una prohibición, pero en el contexto conviene entenderla como la falsa predicción de los profetas de que Judá no tendría que servir a Babilonia.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְ/אַל
  english_pob_choice: And do not
  chosen_spanish: Y no escuchen
  alternatives_spanish:
  - Pero no escuchen
  - No escuchen
  lexicon: HALOT
  rationale: וְ vincula la prohibición con el contexto anterior, y אַל con el imperfecto introduce una orden negativa. En español, 'Y no escuchen' conserva la continuidad discursiva sin forzar un contraste inexistente.
- source_word: תִּשְׁמְעוּ
  english_pob_choice: listen
  chosen_spanish: escuchen
  alternatives_spanish:
  - oigan
  - obedezcan
  lexicon: HALOT
  rationale: Con אֶל y 'las palabras de', el sentido es prestar oído con atención. 'Escuchen' es el equivalente natural y conserva mejor el matiz de atender a lo que se dice.
- source_word: אֶל דִּבְרֵי
  english_pob_choice: to the words of
  chosen_spanish: las palabras de
  alternatives_spanish:
  - el mensaje de
  - las declaraciones de
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente 'a las palabras de'. Mantener 'palabras' conserva la forma y el foco en las afirmaciones verbales de los profetas.
- source_word: הַנְּבִאִים
  english_pob_choice: the prophets
  chosen_spanish: los profetas
  alternatives_spanish:
  - esos profetas
  lexicon: HALOT
  rationale: El artículo define a un grupo conocido en el contexto. 'Los profetas' es directo y fiel.
- source_word: הָאֹמְרִים אֲלֵיכֶם לֵאמֹר
  english_pob_choice: who are saying to you
  chosen_spanish: que les dicen
  alternatives_spanish:
  - que están diciéndoles
  - que les dicen continuamente
  lexicon: HALOT
  rationale: El participio con infinitivo introduce el contenido repetido de su խոս? speech. En español, 'que les dicen' comunica naturalmente la acción de hablarles; el verbo introductorio se completa en la cita.
- source_word: לֹא תַעַבְדוּ
  english_pob_choice: You will not serve
  chosen_spanish: No servirán
  alternatives_spanish:
  - No servirán ustedes
  - No estarán sujetos
  lexicon: HALOT
  rationale: עבד con un rey humano expresa servir o estar sujeto. Dado el auditable dilema de lectura, 'No servirán' conserva la ambigüedad entre una prohibición y una falsa predicción, como el texto hebreo y la nota inglesa.
- source_word: אֶת מֶלֶךְ בָּבֶל
  english_pob_choice: the king of Babylon
  chosen_spanish: al rey de Babilonia
  alternatives_spanish:
  - al rey de Babel
  lexicon: HALOT
  rationale: La construcción con אֶת en español se expresa naturalmente con 'al'. 'Babilonia' es la forma estándar y clara en español bíblico contemporáneo.
- source_word: שֶׁקֶר
  english_pob_choice: a lie
  chosen_spanish: una mentira
  alternatives_spanish:
  - falsedad
  - engaño
  lexicon: HALOT
  rationale: El sustantivo singular funciona como contenido falso de la profecía. 'Una mentira' es idiomático y refleja bien la fuerza del hebreo sin suavizarla.
- source_word: הֵם נִבְּאִים לָכֶם
  english_pob_choice: they are prophesying a lie to you
  chosen_spanish: están profetizando una mentira para ustedes
  alternatives_spanish:
  - profetizan falsamente para ustedes
  - les profetizan una mentira
  lexicon: HALOT
  rationale: El nifal de נבא se traduce con 'profetizar'. El presente progresivo ('están profetizando') refleja bien la actividad en curso del participio, y 'para ustedes' conserva la dirección del discurso hacia el pueblo.
theological_decisions:
- issue: 'Naturaleza de la advertencia: mandato o falsa predicción'
  english_pob_reading: Render the statement as a false prediction ('You will not serve the king of Babylon') rather than as a prohibition.
  chosen_spanish_reading: 'Conservar en español una forma que pueda leerse como predicción falsa: «No servirán al rey de Babilonia».'
  alternative_spanish_readings:
  - «No sirvan al rey de Babilonia»
  - «No estarán sujetos al rey de Babilonia»
  rationale: El contexto muestra que Jeremías denuncia a profetas que niegan la dominación babilónica. El imperfecto citado puede leerse como prohibición o como predicción; la redacción española mantiene esa tensión sin resolverla de manera excesiva, en línea con la nota auditada en inglés.
  doctrine_reference: Translation philosophy §3 (preserve tension rather than resolve it)
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y la decisión auditada en inglés de conservar la ambigüedad de לֹא תַעַבְדוּ. No hay revisiones aplicadas en el expediente más reciente; el estado indica alta concordancia y sin cambios necesarios.
  spanish_consistency_notes:
  - Se usa «Babilonia» de manera uniforme para בבל, siguiendo el uso bíblico corriente en español y la claridad contextual.
  - Se conserva «profetas» y «profetizando» sin sustituir por términos eclesiales más interpretativos.
  - Se mantiene «una mentira» para שקר, evitando suavizar la falsedad profética.
  - El verbo principal en la cita se deja en forma futura negativa («No servirán») para preservar la tensión registrada en el aparato auditado.
