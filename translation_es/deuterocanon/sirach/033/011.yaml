translation:
  language: es
  text: En la ira del fuego[a], sea consumido el sobreviviente[b], y los que hacen mal a tu pueblo encuentren destrucción.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego ἐν ὀργῇ πυρὸς puede entenderse también como «en ira de fuego» o «en ardiente ira». La versión conserva la imagen literal y su fuerza.
    reason: lexical_alternative
  - marker: b
    text: El griego ὁ σωζόμενος también puede traducirse como «el que es salvado» o «el que se salva». En este contexto de juicio, «el sobreviviente» expresa de forma más natural a quien ha escapado solo para enfrentar destrucción.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν ὀργῇ πυρὸς
  english_pob_choice: In the wrath of fire
  chosen_spanish: En la ira del fuego
  alternatives_spanish:
  - En la furia del fuego
  - Con la ira de fuego
  lexicon: LSJ
  rationale: Conserva la imagen fuerte y algo inusual del genitivo, sin decidir de más si el fuego es el sujeto de la ira o el ámbito/instrumento del juicio.
- source_word: καταβρωθήτω
  english_pob_choice: let the one who is saved be consumed
  chosen_spanish: sea consumido
  alternatives_spanish:
  - sea devorado
  - sea comido por completo
  lexicon: LSJ
  rationale: La forma jussiva/pasiva pide un verbo de destrucción en subjuntivo; 'consumido' es natural en español y mantiene la imagen de ser destruido por fuego.
- source_word: ὁ σωζόμενος
  english_pob_choice: the one who is saved
  chosen_spanish: el que es salvado
  alternatives_spanish:
  - el que se salva
  - el sobreviviente
  lexicon: BDAG
  rationale: En este contexto de juicio, el participio puede sonar irónicamente a alguien que ha quedado con vida o ha sido salvado de una ruina previa. 'El que es salvado' sigue de cerca el valor verbal del participio sin imponer una reinterpretación más fuerte.
- source_word: οἱ ἀδικοῦντες
  english_pob_choice: those who wrong
  chosen_spanish: los que hacen mal a
  alternatives_spanish:
  - los que agravian a
  - los que cometen injusticia contra
  lexicon: BDAG
  rationale: En español, 'hacer mal a' reproduce bien la idea activa de dañar/injusticiar a alguien y funciona de manera natural con el objeto 'tu pueblo'.
- source_word: τὸν λαόν σου
  english_pob_choice: your people
  chosen_spanish: tu pueblo
  alternatives_spanish:
  - tu nación
  - tu gente
  lexicon: LSJ
  rationale: '''Pueblo'' conserva el sentido colectivo y bíblico del sustantivo griego sin diluirlo en un término más genérico.'
- source_word: εὕροισαν ἀπώλειαν
  english_pob_choice: let ... find destruction
  chosen_spanish: encuentren destrucción
  alternatives_spanish:
  - hallen ruina
  - reciban destrucción
  lexicon: BDAG
  rationale: '''Encontrar''/''hallar'' refleja bien el verbo de hallazgo y mantiene el tono imprecatorio; ''destrucción'' preserva la fuerza decisiva de ἀπώλεια mejor que ''ruina''.'
theological_decisions:
- issue: Mantenimiento de la lectura de juicio del texto griego suministrado, pese a la nota de desajuste textual
  english_pob_reading: Translate the supplied Greek text as a standalone line of judgment/prayer without harmonizing to other Sirach traditions.
  chosen_spanish_reading: Traducir el griego proporcionado como una línea independiente de juicio/súplica, sin armonizarla con otras tradiciones de Sirácida.
  alternative_spanish_readings:
  - Ajustar el verso a otra tradición textual o numeración de Sirácida.
  - Suavizar el tono imprecatorio para hacerlo más devocional.
  rationale: La fuente griega dada presenta una petición de juicio y está marcada como desajustada respecto de la alineación esperada. Para ser fieles al testimonio fuente, conviene mantener esa lectura sin importar texto ajeno.
  doctrine_reference: 'PHILOSOPHY.md: primacía del idioma original; honestidad ante la incertidumbre textual'
translation_notes:
  revision_awareness: La redacción española sigue la revisión más reciente del audit trail, que prefirió reflejar más directamente ὁ σωζόμενος como 'the one who is saved'. Se mantuvo además la estructura imperativa/jussiva y el tono imprecatorio del griego proporcionado.
  spanish_consistency_notes:
  - Se evitó 'Señor' o una sustitución reverencial para el nombre divino porque en este versículo no aparece el Tetragrámaton.
  - '''Destrucción'' se prefirió sobre ''ruina'' para mantener la intensidad de ἀπώλεια.'
  - El orden sintáctico español se ajustó ligeramente para sonar publicable sin perder el paralelismo de dos miembros del verso.
