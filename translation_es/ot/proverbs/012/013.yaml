translation:
  language: es
  text: En la transgresión de los labios hay un lazo para un hombre malo[a][b], pero el justo sale de la dificultad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Por la transgresión de los labios hay un lazo para un hombre malo». El hebreo es compacto, y la relación entre «transgresión de los labios» y «lazo» puede entenderse como esfera («en») o como medio/resultado («por»).'
    reason: alternative_reading
  - marker: b
    text: «Los labios» es un modismo hebreo para el habla o las palabras pronunciadas.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּפֶשַׁע
  english_pob_choice: In the transgression of
  chosen_spanish: En la transgresión de
  alternatives_spanish:
  - Por la transgresión de
  - Mediante la transgresión de
  lexicon: HALOT
  rationale: El hebreo con בְּ puede marcar esfera o medio. «En la transgresión de» conserva la concisión proverbial y mantiene abierta la relación sintáctica sin forzar una causalidad más precisa de la que el hebreo asegura.
- source_word: שְׂפָתַיִם
  english_pob_choice: the lips
  chosen_spanish: los labios
  alternatives_spanish:
  - los labios
  - habla
  - palabras dichas
  lexicon: HALOT
  rationale: Es una metáfora corporal literal en hebreo. «Los labios» preserva la imagen y el estilo sapiencial; «habla» explicaría la metáfora, pero perdería fuerza.
- source_word: מוֹקֵשׁ
  english_pob_choice: a snare
  chosen_spanish: una red
  alternatives_spanish:
  - un lazo
  - una trampa
  lexicon: HALOT
  rationale: El valor básico es una trampa o lazo de captura. «Red» funciona bien en español bíblico y comunica la idea de quedar atrapado; se prefiere aquí por fluidez natural, sin salir del campo semántico de captura. La nota deja abierta la opción más literal de «lazo/trampa».
- source_word: רָע
  english_pob_choice: the evil man
  chosen_spanish: el hombre malo
  alternatives_spanish:
  - el hombre malvado
  - el impío
  - el malvado
  lexicon: HALOT
  rationale: El sustantivo adjetival singular masculino designa a una persona mala o malvada. «El hombre malo» conserva la referencia personal singular y evita convertirlo en un plural abstracto. «Malvado» también sería posible, pero «malo» reproduce más directamente la desnudez del hebreo.
- source_word: וַיֵּצֵא
  english_pob_choice: comes out
  chosen_spanish: sale
  alternatives_spanish:
  - sale
  - escapa
  - sale fuera
  lexicon: HALOT
  rationale: El verbo significa salir/venir fuera. «Sale» es la forma natural y breve en español, conservando la imagen concreta sin interpretarla excesivamente como «escapa».
- source_word: מִצָּרָה
  english_pob_choice: of trouble
  chosen_spanish: de la angustia
  alternatives_spanish:
  - de la angustia
  - de la aflicción
  - del apuro
  lexicon: HALOT
  rationale: צָרָה puede ser «angustia», «aflicción», «adversidad» o «tribulación». «Angustia» transmite bien la presión o estrechez implícita y suena natural en un proverbio. Se mantiene el genérico «de» para reflejar el movimiento de salida.
- source_word: צַדִּיק
  english_pob_choice: the righteous
  chosen_spanish: el justo
  alternatives_spanish:
  - el justo
  - el recto
  - el hombre justo
  lexicon: HALOT
  rationale: Como sustantivo adjetival, se refiere a la persona justa. «El justo» es la forma más estable y bíblica en español, y contrasta limpiamente con «el hombre malo».
theological_decisions:
- issue: Relación sintáctica entre «transgresión de los labios» y «red/trampa»
  english_pob_reading: The Hebrew is compact, and the relation between 'transgression of the lips' and 'snare' may be taken either as location ('in') or means/result ('by').
  chosen_spanish_reading: La red está «en la transgresión de los labios», dejando abierta la relación exacta entre esfera y medio.
  alternative_spanish_readings:
  - Por la transgresión de los labios hay una red para el hombre malo
  - La transgresión de los labios es una red para el hombre malo
  rationale: El hebreo permite más de una relación entre la primera cola y la imagen de captura. La formulación española conserva esa ambigüedad productiva y evita cerrar indebidamente el sentido en una sola causalidad.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 3; §Poetic compactness and ambiguity
- issue: Tipo de sujeto representativo en sabiduría proverbial
  english_pob_reading: the evil man ... the righteous
  chosen_spanish_reading: el hombre malo ... el justo
  alternative_spanish_readings:
  - el malvado ... el justo
  - una persona mala ... la persona justa
  rationale: El hebreo usa sustantivos/adjetivos singulares masculinos como tipos representativos. Se conserva ese valor singular y proverbial en español, sin neutralizarlo indebidamente.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
- issue: Metáfora de los labios como habla
  english_pob_reading: '''The lips'' is a Hebrew idiom for speech or spoken words.'
  chosen_spanish_reading: «Los labios» se mantiene como giro hebreo para «habla» o «palabras»
  alternative_spanish_readings:
  - habla
  - palabras
  rationale: La traducción conserva la metáfora corporal porque es significativa en la poesía sapiencial. La nota explica el sentido idiomático para el lector sin desfigurar la imagen original.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 2
translation_notes:
  revision_awareness: El inglés POB pasó de «for the evil man» a «for an evil man» para ajustar naturalidad sin cambiar el sentido. En español se refleja con el artículo indefinido «un» en «un hombre malo», manteniendo el matiz representativo y la concisión proverbial. También se tuvo en cuenta la nota inglesa sobre la ambigüedad de בְּפֶשַׁע y el carácter idiomático de «the lips».
  spanish_consistency_notes:
  - Se mantuvo «el justo» como sustantivo adjetival estable en sabiduría bíblica.
  - Se conservó la imagen corporal «labios» y se explicita su valor idiomático en la nota.
  - Se optó por «angustia» para צָרָה por su amplitud semántica y naturalidad en proverbios.
  - No se introdujo «Cristo» ni terminología eclesiástica ajena al hebreo sapiencial.
