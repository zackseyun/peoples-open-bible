id: 3MA.5.34
reference: 3 Maccabees 5:34
source:
  edition: lxx-swete-1909
  text: ὁ καθ᾽ εἷς δὲ τῶν φίλων σκυθρωπῶς ὑπεκρέων, τοὺς συνθροισμένους ἀπέλυαν ἕκαστον ἐπὶ τὴν ἰδίαν ἀσχολίαν.
  language: Greek
  pages:
  - 744
  confidence: high
  validation: minor_mismatch
translation:
  text: But each of the friends[a], looking grim, dismissed those who had gathered[b], each one to his own occupation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek includes an unusual form (ὑπεκρέων), and the source transcription is flagged with a minor mismatch. The translation follows the contextual sense that the assembled people were being sent away individually.
    reason: textual_variant
  - marker: b
    text: Or 'to his own business' or 'to his own affairs.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ καθ᾽ εἷς
  chosen: each
  alternatives:
  - each one
  - one by one
  lexicon: LSJ
  rationale: The distributive expression indicates individuals taken separately. 'Each' is concise in English while preserving the sense of individual action.
- source_word: τῶν φίλων
  chosen: of the friends
  alternatives:
  - of his friends
  - of the companions
  - of the courtiers
  lexicon: LSJ
  rationale: φίλοι literally means 'friends.' In royal contexts it can denote court associates or officials, but the Greek itself uses the ordinary term. The more literal rendering is retained here to avoid importing a more specific institutional sense than the verse itself states.
- source_word: σκυθρωπῶς
  chosen: looking grim
  alternatives:
  - gloomily
  - sullenly
  - with a downcast expression
  lexicon: LSJ
  rationale: The adverb conveys a gloomy or stern facial demeanor. 'Looking grim' brings out the visible mood naturally in English and fits the participial flow of the sentence.
- source_word: ὑπεκρέων
  chosen: was dismissing
  alternatives:
  - withdrawing
  - slipping away while directing
  - sending away
  lexicon: LSJ
  rationale: The form is difficult and the source has a minor-mismatch validation flag. In context, with the following object 'those who had gathered' and the finite verb ἀπέλυαν, the sense is that these men were engaged in sending the assembled people away. 'Was dismissing' captures the contextual force without overcommitting to a more speculative nuance of the unusual form.
- source_word: τοὺς συνθροισμένους
  chosen: those who had gathered
  alternatives:
  - the assembled people
  - those assembled
  lexicon: LSJ
  rationale: The participle denotes people brought together or assembled. 'Those who had gathered' is idiomatic and preserves the reference to the assembled group.
- source_word: ἀπέλυαν
  chosen: was dismissing
  alternatives:
  - were releasing
  - were sending away
  - were letting go
  lexicon: LSJ
  rationale: ἀπολύω commonly means release, dismiss, or send away. In this context of dispersing a crowd back to ordinary activity, 'dismiss' best fits.
- source_word: ἕκαστον
  chosen: each one
  alternatives:
  - each
  - every one of them
  lexicon: LSJ
  rationale: The accusative singular distributive object emphasizes individual dispersal. 'Each one' preserves that emphasis.
- source_word: ἐπὶ τὴν ἰδίαν ἀσχολίαν
  chosen: to his own occupation
  alternatives:
  - to his own business
  - to his own work
  - to his own affairs
  lexicon: LSJ
  rationale: ἀσχολία refers to occupation, business, or activity. 'Occupation' is slightly formal but clear and matches the sense of returning each person to his normal business.
