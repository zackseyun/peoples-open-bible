translation:
  language: es
  text: Este libro de la ley no se apartará de tu boca, sino que meditarás[a] en él de día y de noche, para que cuides de hacer conforme a todo lo que está escrito en él. Porque entonces harás prosperar tu camino, y entonces actuarás con sabiduría.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «murmurarás» o «lo recitarás bajo tu aliento»; el verbo hebreo puede incluir repetición oral en voz baja, además de meditación.
    reason: lexical_alternative
lexical_decisions:
- source_word: יָמוּשׁ
  english_pob_choice: shall not depart
  chosen_spanish: no se apartará
  alternatives_spanish:
  - no se alejará
  - no se moverá
  lexicon: HALOT
  rationale: El verbo expresa apartarse o moverse lejos. En español, «no se apartará de tu boca» conserva la imagen concreta y suena natural; además, mantiene la idea de recitación continua o disponibilidad constante en los labios.
- source_word: סֵפֶר הַתּוֹרָה הַזֶּה
  english_pob_choice: this book of the law
  chosen_spanish: Este libro de la ley
  alternatives_spanish:
  - Este rollo de la instrucción
  - Este libro de la Torá
  lexicon: HALOT
  rationale: סֵפֶר puede ser libro, rollo o documento. Aquí «libro» es claro y fiel. תּוֹרָה en este contexto de pacto se refiere a la ley dada por Dios; «ley» comunica mejor esa función para el lector español que una transliteración o una paráfrasis más amplia.
- source_word: מִפִּיךָ
  english_pob_choice: from your mouth
  chosen_spanish: de tu boca
  alternatives_spanish:
  - de tu boca, saliendo de ella
  - de tus labios
  lexicon: HALOT
  rationale: «De tu boca» preserva la expresión concreta del hebreo y en español suena idiomático. Mantiene también la implicación de hablar, recitar o tenerlo siempre en la boca.
- source_word: וְהָגִיתָ
  english_pob_choice: you shall meditate
  chosen_spanish: meditarás
  alternatives_spanish:
  - murmurarás
  - lo recitarás bajo tu aliento
  lexicon: HALOT
  rationale: הגה puede incluir susurro, murmullo o meditación. En español, «meditarás» expresa bien la atención reflexiva, mientras que la dimensión oral queda sugerida por «de tu boca».
- source_word: יוֹמָם וָלַיְלָה
  english_pob_choice: day and night
  chosen_spanish: de día y de noche
  alternatives_spanish:
  - día y noche
  - continuamente
  lexicon: HALOT
  rationale: La expresión es un merismo de continuidad. «De día y de noche» conserva el paralelismo natural del español y la fuerza idiomática del hebreo.
- source_word: לְמַעַן תִּשְׁמֹר לַעֲשׂוֹת
  english_pob_choice: so that you may be careful to do
  chosen_spanish: para que cuides de hacer
  alternatives_spanish:
  - para que procures hacer
  - para que observes hacer
  lexicon: HALOT
  rationale: La construcción expresa propósito y cuidado obediente. «Cuides de hacer» comunica en español tanto la atención diligente como la obediencia práctica sin sonar forzado.
- source_word: כְּכָל הַכָּתוּב בּוֹ
  english_pob_choice: according to all that is written in it
  chosen_spanish: conforme a todo lo que está escrito en él
  alternatives_spanish:
  - según todo lo que está escrito en él
  - de acuerdo con todo lo escrito en él
  lexicon: HALOT
  rationale: La frase preserva la fuerza totalizadora de כְּכָל y el carácter normativo de lo escrito. «Conforme a» suena natural y transmite adecuación al estándar textual.
- source_word: תַּצְלִיחַ אֶת דְּרָכֶךָ
  english_pob_choice: you will make your way prosper
  chosen_spanish: harás prosperar tu camino
  alternatives_spanish:
  - harás que prospere tu camino
  - tu camino prosperará
  lexicon: HALOT
  rationale: 'El verbo en causativo tiene fuerza transitiva: no solo prospera el camino, sino que el sujeto lo hace prosperar. «Harás prosperar tu camino» conserva ese matiz mejor que una forma intransitiva.'
- source_word: תַּשְׂכִּיל
  english_pob_choice: you will act wisely
  chosen_spanish: actuarás con sabiduría
  alternatives_spanish:
  - procederás con prudencia
  - tendrás éxito
  lexicon: HALOT
  rationale: שכל en hifil puede implicar actuar con entendimiento y, a veces, éxito resultante. Como ya se expresó la prosperidad en la cláusula anterior, «actuarás con sabiduría» preserva la distinción semántica sin reducir ambas acciones a éxito/prosperidad.
theological_decisions:
- issue: Sentido de תּוֹרָה en contexto de pacto
  english_pob_reading: law
  chosen_spanish_reading: ley
  alternative_spanish_readings:
  - instrucción
  - Torá
  rationale: Aunque תּוֹרָה puede significar instrucción, aquí designa el corpus escrito que Joshua debe obedecer. «Ley» refleja mejor su función normativa y es transparente para lectores de español, sin introducir una tradición terminológica innecesaria.
  doctrine_reference: Principio de transparencia léxica del POB; fidelidad al uso del término en contexto legal/covenantal
- issue: 'Nuance de הָגָה: meditación y recitación oral'
  english_pob_reading: meditate on it
  chosen_spanish_reading: meditarás en él
  alternative_spanish_readings:
  - murmurarás en él
  - lo recitarás bajo tu aliento
  rationale: El hebreo combina la idea de murmurar/recitar en voz baja con la de meditar. La traducción principal usa «meditarás» por claridad natural, mientras que la cláusula «de tu boca» conserva la dimensión oral que el inglés POB también preserva en su nota.
  doctrine_reference: Translation philosophy §6; preservar el sentido fuente sin borrar la tensión oral/reflexiva
- issue: Relación entre prosperidad y sabiduría en las dos últimas cláusulas
  english_pob_reading: you will make your way prosper, and then you will act wisely
  chosen_spanish_reading: harás prosperar tu camino, y entonces actuarás con sabiduría
  alternative_spanish_readings:
  - harás prosperar tu camino, y entonces tendrás éxito
  - tu camino prosperará, y entonces actuarás con prudencia
  rationale: El hebreo distingue entre צלח (prosperar, hacer prosperar) y שכל (actuar con entendimiento/sabiduría). La versión española mantiene esa distinción para no fundir ambos verbos en una sola idea de éxito.
  doctrine_reference: Distinción semántica léxica en Hebreo bíblico; evitar aplanamiento conceptual
translation_notes:
  revision_awareness: 'Concordamos con el estado de revisión más reciente: sin cambios necesarios; la versión española sigue el mismo sentido auditado del texto inglés POB y no introduce revisiones textuales adicionales.'
  spanish_consistency_notes:
  - Se usa «ley» para תּוֹרָה, coherente con el valor normativo del contexto.
  - Se conserva la imagen de la boca y se añade nota para la alternativa oral de הָגָה.
  - «Harás prosperar» mantiene la fuerza causativa de תַּצְלִיחַ.
  - «Actuarás con sabiduría» diferencia claramente תַּשְׂכִּיל de la cláusula de prosperidad.
  - La puntuación y el registro buscan ser bíblicos pero idiomáticos en español latinoamericano.
