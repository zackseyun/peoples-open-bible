revisions:
- from: 'Sin embargo, la casa de Israel dice[a]: «El camino de Yahvé no es recto». ¿No son rectos mis caminos, casa de Israel? ¿No son rectos vuestros caminos?'
  to: 'Sin embargo, la casa de Israel dice[a]: «El camino de Yahvé no es justo». ¿No son justos mis caminos, casa de Israel? ¿No son más bien los caminos de ustedes los que no son justos?»'
  rationale: Se revisa para ajustarse a la decisión léxica documentada del POB sobre יִתָּכֵן («justo») y para corregir la última cláusula, donde el borrador había perdido la negación hebrea y alterado el sentido. También se adapta la segunda persona plural a un español más neutral con «los caminos de ustedes».
