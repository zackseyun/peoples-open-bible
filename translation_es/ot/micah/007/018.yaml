revisions:
- from: ¿Quién es un Dios[a] como tú, que perdona[b] la iniquidad y pasa por alto la transgresión para el remanente de su heredad? No retiene su enojo para siempre, porque se deleita en la misericordia.
  to: ¿Quién es un Dios[a] como tú, que lleva la iniquidad[b] y pasa por alto la transgresión para el remanente de su heredad? No retiene su enojo para siempre, porque se deleita en el amor fiel[c].
  rationale: 'Se revisa para alinear el español con la evidencia fuente y con las decisiones auditadas de la POB: se restaura en el texto principal la imagen hebrea de ‘llevar la iniquidad’, dejando la lectura interpretativa ‘perdonar’ en nota; y se reemplaza ‘misericordia’ por ‘amor fiel’ para reflejar mejor el valor pactual de חֶסֶד, añadiendo una nota con alternativas léxicas preservadas por la POB inglesa.'
  reviewer_model: gpt-5.4
