base_translation:
  language: en
  yaml_path: translation/ot/1_chronicles/022/014.yaml
  text: Now behold[a], in my affliction I have prepared for the house of Yahweh one hundred thousand talents of gold, and one million talents of silver; and for the bronze and the iron there is no weight, for it was in abundance. I have prepared timber and stones[c][b], and you may add to them.
  footnotes:
