translation:
  language: es
  text: Y en todo lugar donde habitan los hijos de los hombres[a], las bestias del campo y las aves de los cielos[c], él los ha entregado en tu mano y te ha puesto como gobernante sobre todos ellos[b]. Tú eres la cabeza de oro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «seres humanos» para «los hijos de los hombres».
    reason: lexical_alternative
  - marker: b
    text: El sujeto implícito de «ha entregado» y «ha puesto como gobernante» es Dios, como se indicó en el versículo anterior.
    reason: cross_reference
  - marker: c
    text: O «las aves del cielo».
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְכָל דִּי דארין
  english_pob_choice: And wherever ... dwell
  chosen_spanish: Y en todo lugar donde habitan
  alternatives_spanish:
  - Y dondequiera que habiten
  - Y en cualquier lugar donde habitan
  lexicon: HALOT
  rationale: La construcción aramea combina un valor locativo general con un participio de habitar; en español, «en todo lugar donde habitan» conserva la amplitud espacial y suena natural, sin perder el matiz de ubicuidad del original.
- source_word: בְּנֵי אֲנָשָׁא
  english_pob_choice: the children of men
  chosen_spanish: los hijos de los hombres
  alternatives_spanish:
  - los seres humanos
  - la humanidad
  lexicon: HALOT
  rationale: La imagen literal de «hijos de los hombres» preserva la expresión idiomática del arameo y mantiene el matiz representativo de la humanidad sin neutralizarla en la redacción principal.
- source_word: חֵיוַת בָּרָא
  english_pob_choice: the beasts of the field
  chosen_spanish: las bestias del campo
  alternatives_spanish:
  - los animales del campo
  - las bestias del campo abierto
  lexicon: HALOT
  rationale: «Bestias del campo» es la equivalencia más directa y reverente en español bíblico, y conserva la imagen concreta de animales del terreno abierto.
- source_word: וְעוֹף שְׁמַיָּא
  english_pob_choice: the birds of the heavens
  chosen_spanish: las aves de los cielos
  alternatives_spanish:
  - las aves del cielo
  - las aves del firmamento
  lexicon: HALOT
  rationale: «Aves de los cielos» refleja de manera literal el hebraísmo/arameísmo y preserva el plural poético del original, evitando a la vez una paráfrasis excesiva.
- source_word: יְהַב בִּידָךְ
  english_pob_choice: he has given them into your hand
  chosen_spanish: él te ha entregado todo eso en tu mano
  alternatives_spanish:
  - él te las ha dado en tu mano
  - él ha puesto todo eso en tu mano
  lexicon: HALOT
  rationale: «Entregado en tu mano» conserva el idiomatismo de dominio/autoridad del original. Se opta por «todo eso» para abarcar el conjunto de las criaturas mencionadas sin forzar un referente singular en español.
- source_word: וְהַשְׁלְטָךְ
  english_pob_choice: and made you ruler
  chosen_spanish: y te ha puesto como gobernante
  alternatives_spanish:
  - y te ha hecho gobernante
  - y te ha dado dominio
  lexicon: HALOT
  rationale: El causativo arameo expresa designación a la autoridad; «puesto como gobernante» comunica bien la instalación en un cargo sin perder la fuerza de nombramiento del verbo.
- source_word: בְּכָלְּהוֹן
  english_pob_choice: over all of them
  chosen_spanish: sobre todos ellos
  alternatives_spanish:
  - sobre ellos todos
  - sobre todo eso
  lexicon: HALOT
  rationale: El sufijo remite a los seres listados antes; «sobre todos ellos» es claro y natural en español, y conserva la idea de dominio extendido a la totalidad enumerada.
- source_word: אַנְתְּה הוּא
  english_pob_choice: You are
  chosen_spanish: Tú eres
  alternatives_spanish:
  - Tú mismo eres
  - Tú eres, en verdad
  lexicon: HALOT
  rationale: La secuencia pronominal es enfática; en español, «Tú eres» transmite con sobriedad la identificación directa sin añadir énfasis innecesario.
- source_word: רֵאשָׁה דִּי דַהֲבָא
  english_pob_choice: the head of gold
  chosen_spanish: la cabeza de oro
  alternatives_spanish:
  - esa cabeza de oro
  - la cabeza dorada
  lexicon: HALOT
  rationale: «La cabeza de oro» conserva la imagen de la estatua soñada y la identificación simbólica del rey con esa cabeza, sin convertirla en un adjetivo menos transparente.
theological_decisions:
- issue: Sujeto implícito de «ha entregado» y «ha puesto como gobernante»
  english_pob_reading: Render with the implicit subject as 'he' in context, referring to the Most High/God from the preceding verse, without inserting 'God' into the main text here.
  chosen_spanish_reading: Mantener «él» en el texto principal, dejando que el contexto inmediato identifique al sujeto como Dios.
  alternative_spanish_readings:
  - Dios te ha entregado... y te ha puesto como gobernante...
  rationale: El arameo omite el sujeto explícito en esta cláusula, pero el versículo anterior lo proporciona. En español, «él» conserva la continuidad del flujo textual y evita una inserción innecesaria en el cuerpo principal.
  doctrine_reference: Daniel 2:37; filosofía de traducción POB sobre continuidad contextual
- issue: Valor antropológico de בְּנֵי אֲנָשָׁא
  english_pob_reading: Use 'children of men' in the main text.
  chosen_spanish_reading: Usar «los hijos de los hombres» en la redacción principal.
  alternative_spanish_readings:
  - los seres humanos
  - la humanidad
  rationale: La expresión preserva el giro idiomático y el tono representativo del original sin diluirlo en una abstracción neutral. En español bíblico, también comunica adecuadamente la universalidad humana.
  doctrine_reference: Principio de precisión semántica y fidelidad a la imagen del original
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requieren cambios; este borrador mantiene esa estabilidad textual y conserva las decisiones auditadas sobre sujeto implícito, idiomatismo de dominio y equivalencia de imágenes.
  spanish_consistency_notes:
  - Se mantiene «Dios» como referente contextual implícito solo en la nota, no en el texto principal.
  - Se preserva la imagen aramea de «mano» para dominio/autoridad, con «en tu mano».
  - «Cielos» se usa en plural por fidelidad al hebraísmo/arameísmo y para conservar el tono bíblico elevado.
  - La puntuación separa la enumeración de criaturas y el enunciado de dominio para reflejar la estructura del original.
