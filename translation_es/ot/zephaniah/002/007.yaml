revisions:
- from: Y el territorio[a] será para el remanente de la casa de Judá; sobre él apacentarán. En las casas de Ascalón se acostarán por la tarde[b], porque Yahvé, su Dios, los atenderá y restaurará su fortuna.
  to: Y la franja costera será para el remanente de la casa de Judá; en ella pastarán. En las casas de Ascalón se acostarán por la tarde, porque Yahvé, su Dios, los atenderá y restaurará su bienestar[a].
  rationale: Se ajusta חֶבֶל a «franja costera» para reflejar mejor el contexto de Filistea; se mejora la naturalidad de la referencia locativa con «en ella pastarán»; y se reemplaza «restaurará su fortuna» por «restaurará su bienestar» para expresar de modo idiomático y colectivo el modismo וְשָׁב שְׁבוּתָם. También se corrige la nota para que preserve la alternativa significativa del modismo final, en línea con la auditoría inglesa.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:50:50Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: la franja/territorio pertenece al remanente de Judá, allí pastarán, en las casas de Ascalón se acostarán, y Yahvé intervendrá para restaurarlos. Sin embargo, dos decisiones no preservan del todo bien la fuerza del original y de la auditoría inglesa: (1) חֶבֶל en este contexto costero se acerca más a «franja costera»/«costa» que al más genérico «territorio»; (2) וְשָׁב שְׁבוּתָם no suena natural en español como «restaurará su fortuna», y además «fortuna» puede sonar individual o material, debilitando el modismo restaurador colectivo.'
  spanish_quality_summary: 'El español es claro y digno, pero «sobre él apacentarán» suena algo rígido y «restaurará su fortuna» poco idiomático y potencialmente ambiguo. Una leve revisión mejora naturalidad y fidelidad: «en ella pastarán» fluye mejor para la referencia territorial colectiva, y «restaurará su bienestar» expresa mejor la reversión de la condición del pueblo en español general. También conviene ajustar la nota b, que actualmente explica «por la tarde» cuando la nota inglesa preserva la alternativa del modismo final, no del horario.'
  glossary_alignment: 'Correcto en «Yahvé», «remanente», y el valor pastoral de los verbos. No hay conflicto doctrinal mayor. La principal desalineación es con la decisión auditada sobre וְשָׁב שְׁבוּתָם: en español conviene una formulación idiomática colectiva como «restaurará su bienestar» o «restaurará su condición», con nota alternativa «hará volver a sus cautivos».'
  issues:
  - severity: medium
    issue: «territorio» atenúa demasiado el matiz costero de חֶבֶל en este contexto
    rationale: Aunque el hebreo puede significar región o porción, el contexto inmediato de la costa filistea (vv. 5–6) favorece una referencia geográfica costera. «Franja costera» conserva mejor la localización sin perder naturalidad.
  - severity: medium
    issue: La nota [b] está anclada a «por la tarde», pero la nota auditada relevante corresponde al modismo final וְשָׁב שְׁבוּתָם
    rationale: Se debe preservar la alternativa significativa documentada por el POB inglés. El horario no requiere nota, mientras que el modismo de restauración sí.
  - severity: high
    issue: «restaurará su fortuna» no es suficientemente idiomático ni preciso en español
    rationale: En español bíblico general, «fortuna» puede sugerir riqueza o suerte individual. El hebreo expresa restauración de la condición del pueblo; «restaurará su bienestar» o «restaurará su condición» comunica mejor el sentido colectivo.
  - severity: low
    issue: «sobre él apacentarán» suena algo forzado en español moderno
    rationale: Aunque es defendible, «en ella pastarán» resulta más natural al hablar de una franja o costa y sigue respetando la referencia colectiva de עֲלֵיהֶם.
  revised_spanish_text: Y la franja costera será para el remanente de la casa de Judá; en ella pastarán. En las casas de Ascalón se acostarán por la tarde, porque Yahvé, su Dios, los atenderá y restaurará su bienestar[a].
  revised_footnotes:
  - marker: a
    text: O «hará volver a sus cautivos». El modismo hebreo suele referirse a la restauración de la condición de un pueblo, no solo al regreso literal de cautivos.
    reason: alternative_reading
  revision_rationale: Se ajusta חֶבֶל a «franja costera» para reflejar mejor el contexto de Filistea; se mejora la naturalidad de la referencia locativa con «en ella pastarán»; y se reemplaza «restaurará su fortuna» por «restaurará su bienestar» para expresar de modo idiomático y colectivo el modismo וְשָׁב שְׁבוּתָם. También se corrige la nota para que preserve la alternativa significativa del modismo final, en línea con la auditoría inglesa.
