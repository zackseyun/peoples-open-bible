- from: 'Pero Abisai hijo de Seruiá respondió y dijo[a]: «¿No debe morir Simei por esto, porque maldijo al ungido de Yahvé?»'
  to: 'Pero Abisai hijo de Seruiá respondió y dijo[a]: «¿No debe ser ejecutado Simei por esto, porque maldijo al ungido de Yahvé?»'
