translation:
  language: es
  text: Y levantaron para sí pilares y postes de Asherá[a] en toda colina alta y bajo todo árbol frondoso.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Asherim»; el término hebreo se refiere a objetos de culto asociados con Asherá.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּצִּבוּ
  english_pob_choice: They set up
  chosen_spanish: levantaron
  alternatives_spanish:
  - pusieron
  - erigieron
  - levantaron y colocaron
  lexicon: HALOT
  rationale: El verbo hebreo expresa la acción de alzar/colocar objetos cultuales. En español, «levantaron» comunica bien la instalación de estos objetos y suena natural en el contexto de idolatría; «erigieron» sería más formal, pero menos directo.
- source_word: לָהֶם
  english_pob_choice: for themselves
  chosen_spanish: para sí
  alternatives_spanish:
  - para ellos mismos
  - para ellos
  lexicon: HALOT
  rationale: La dativa refleja beneficio/uso propio. «Para sí» conserva el matiz reflexivo de manera breve y natural.
- source_word: מַצֵּב֖וֹת
  english_pob_choice: pillars
  chosen_spanish: pilares
  alternatives_spanish:
  - columnas
  - piedras erigidas
  - pilares sagrados
  lexicon: HALOT
  rationale: El término se refiere a pilares o estelas cultuales. «Pilares» mantiene la referencia material sin añadir demasiado, y encaja con el paralelismo del versículo.
- source_word: וַאֲשֵׁרִים
  english_pob_choice: Asherah poles
  chosen_spanish: postes de Asera
  alternatives_spanish:
  - asheras
  - poste(s) de Asherá
  - Asherim
  lexicon: HALOT
  rationale: El hebreo plural designa objetos cultuales asociados con Asera. «Postes de Asera» refleja la lectura de objeto de culto, conserva la relación con el nombre propio y evita confundirlo con la diosa misma.
- source_word: עַל כָּל גִּבְעָה גְבֹהָה
  english_pob_choice: on every high hill
  chosen_spanish: sobre toda colina alta
  alternatives_spanish:
  - en toda colina alta
  - sobre cada monte alto
  lexicon: HALOT
  rationale: «Colina alta» reproduce el idioma bíblico de los lugares altos de culto. «Sobre» mantiene la localización física y ritual del hebreo.
- source_word: וְתַחַת כָּל עֵץ רַעֲנָן
  english_pob_choice: and under every green tree
  chosen_spanish: debajo de todo árbol frondoso
  alternatives_spanish:
  - bajo todo árbol verde
  - debajo de todo árbol lozano
  - bajo cada árbol frondoso
  lexicon: HALOT
  rationale: רַעֲנָן describe un árbol fresco, frondoso o exuberante. «Frondoso» es una equivalencia idiomática clara en español y conserva la idea de vegetación densa asociada a culto ilícito.
theological_decisions:
- issue: Naturaleza de אֲשֵׁרִים como objeto cultual, no solo como referencia a la deidad
  english_pob_reading: Asherah poles
  chosen_spanish_reading: postes de Asera
  alternative_spanish_readings:
  - Asherim
  - imágenes de Asera
  - árboles sagrados
  rationale: 'La evidencia del hebreo plural apunta a objetos de culto asociados con Asera. En español, «postes de Asera» preserva la ambigüedad controlada del original: no reduce el término a un ídolo genérico, pero sí evita que se entienda solo como la diosa sin objeto material.'
  doctrine_reference: 'Translation philosophy: original-language primacy; documented lexical distinction between deity and cult object.'
translation_notes:
  revision_awareness: La versión inglesa auditada se mantuvo sin cambios en la última revisión; esta propuesta sigue ese mismo estado de alta concordancia y conserva la distinción léxica entre מַצֵּבוֹת y וַאֲשֵׁרִים.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el hebreo lo exige explícitamente; aquí no aparece.
  - Se evitó «SEÑOR» por tratarse de una cita narrativa sin el Tetragrámaton.
  - «Asera» se usa como nombre propio consistente con la tradición académica y con la necesidad de distinguir la deidad del objeto cultual.
  - El estilo mantiene un registro bíblico moderno, no arcaizante.
