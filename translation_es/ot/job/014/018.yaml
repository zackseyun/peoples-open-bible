translation:
  language: es
  text: Pero aun una montaña que cae se desgasta[a], y una roca es desplazada[b] de su lugar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'se marchita', preservando el sentido más común del verbo de desvanecerse o marchitarse; aquí se usa metafóricamente de una montaña.
    reason: lexical_alternative
  - marker: b
    text: O 'es movida' / 'es removida de su lugar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאוּלָם
  english_pob_choice: But even
  chosen_spanish: Pero aun
  alternatives_spanish:
  - Pero
  - Y aun
  - Sin embargo
  lexicon: HALOT
  rationale: La conjunción introduce contraste fuerte y énfasis; 'Pero aun' conserva ambos matices sin volver la línea demasiado pesada en español.
- source_word: הַר
  english_pob_choice: a mountain
  chosen_spanish: una montaña
  alternatives_spanish:
  - un monte
  - un cerro
  lexicon: HALOT
  rationale: '''Montaña'' es el equivalente natural y amplio para el sustantivo hebreo en un contexto poético.'
- source_word: נוֹפֵל
  english_pob_choice: falling
  chosen_spanish: que cae
  alternatives_spanish:
  - cayendo
  - que cae cuando
  lexicon: HALOT
  rationale: El participio funciona de manera descriptiva; 'que cae' mantiene la imagen viva y fluida en español.
- source_word: יִבּוֹל
  english_pob_choice: wears away
  chosen_spanish: se desgasta
  alternatives_spanish:
  - se marchita
  - se consume
  - se deshace
  lexicon: HALOT
  rationale: El verbo suele significar marchitarse o desfallecer, pero aquí se aplica metafóricamente a una montaña; 'se desgasta' conserva la idea de deterioro gradual sin imponer una imagen de vegetación demasiado específica.
- source_word: וְצוּר
  english_pob_choice: and a rock
  chosen_spanish: y una roca
  alternatives_spanish:
  - y un peñasco
  - y un risco
  lexicon: HALOT
  rationale: '''Roca'' es la traducción más natural y amplia, adecuada al paralelismo con ''montaña''.'
- source_word: יֶעְתַּק
  english_pob_choice: is moved
  chosen_spanish: es movida
  alternatives_spanish:
  - es desplazada
  - es removida
  - se mueve
  lexicon: HALOT
  rationale: El verbo expresa ser movido o desplazado; la pasiva conserva bien la fuerza del hebreo y el paralelismo poético.
- source_word: מִמְּקֹמוֹ
  english_pob_choice: from its place
  chosen_spanish: de su lugar
  alternatives_spanish:
  - de su sitio
  - de su posición
  lexicon: HALOT
  rationale: '''De su lugar'' es la forma más idiomática y transparente en español para la expresión literal del hebreo.'
translation_notes:
  revision_awareness: La redacción sigue de cerca el valor poético del hebreo y el ajuste revisado del inglés POB para יִבּוֹל ('wears away'); en español se optó por 'se desgasta' para preservar la misma idea de deterioro gradual aplicada metafóricamente a una montaña, sin introducir una lectura de 'marchitarse' que sonaría botánicamente restringida.
  spanish_consistency_notes:
  - 'Se mantuvo el paralelismo binario de la línea hebrea: montaña / roca.'
  - Se evitó 'SEÑOR' u otra sustitución teológica porque el versículo no contiene el nombre divino.
  - El registro es formal y poético, con léxico común pero digno.
