base_translation:
  language: en
  yaml_path: translation/deuterocanon/sirach/025/020.yaml
  text: Like a sandy ascent under the feet of an old man[c][b][a], so is a sharp-tongued wife to a gentle man.
  footnotes:
  - marker: a
    text: 'Hebrew חוּץ is difficult here; the Greek parallel reads ''sandy,'' which likely preserves the sense of the image: unstable footing for an elderly man.'
    reason: textual_variant
  - marker: b
    text: Or 'a talkative wife.' The Hebrew idiom literally says 'a wife of tongue,' and the Greek has 'a tongue-given woman.'
    reason: lexical_alternative
  - marker: c
    text: Or 'to a quiet man.' The Greek parallel uses a word that can mean 'quiet' or 'peaceable'; 'gentle' was chosen for natural English and to reflect the contrast in character.
    reason: lexical_alternative
