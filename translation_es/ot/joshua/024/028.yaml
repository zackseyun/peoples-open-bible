  glossary_alignment: No hay términos del glosario mayor en juego. ‘Josué’, ‘el pueblo’ y ‘heredad’ son adecuados. ‘Despidió’ es una buena equivalencia para וַיְשַׁלַּח en este contexto de disolver la reunión.
  issues:
