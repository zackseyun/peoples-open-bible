translation:
  language: es
  text: Señor[a], estoy avergonzado y deshonrado delante de tu rostro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse «en tu presencia» o «delante de ti». El griego dice literalmente «delante de tu rostro», preservando una expresión concreta de comparecer ante Dios.
    reason: lexical_alternative
lexical_decisions:
- source_word: Κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - ¡Señor!
  - Oh Señor
  lexicon: BDAG
  rationale: El vocativo κύριε expresa un llamado directo a Dios. En español, «Señor» conserva la dignidad y la dirección personal de la oración sin añadir un calco innecesario. Se evita «SEÑOR» como convención tipográfica de sustitución porque el griego aquí es vocativo explícito.
- source_word: ᾔσχυμμαι
  english_pob_choice: I am ashamed
  chosen_spanish: estoy avergonzado
  alternatives_spanish:
  - estoy avergonzado de vergüenza
  - me avergüenzo
  lexicon: LSJ
  rationale: El perfecto medio/pasivo comunica un estado presente derivado de la vergüenza. «Estoy avergonzado» expresa bien ese estado continuo en español moderno y mantiene la confesión personal del hablante.
- source_word: ἐντέτραμμαι
  english_pob_choice: disgraced
  chosen_spanish: humillado
  alternatives_spanish:
  - deshonrado
  - avergonzado
  - confundido
  lexicon: LSJ
  rationale: El verbo intensifica la vergüenza con la idea de quedar abatido o rebajado. «Humillado» preserva esa intensificación con un registro formal y claro; «deshonrado» pondría más peso en el honor social que en la postura penitencial inmediata.
- source_word: κατὰ πρόσωπόν σου
  english_pob_choice: before your face
  chosen_spanish: delante de tu rostro
  alternatives_spanish:
  - en tu presencia
  - delante de ti
  lexicon: LSJ
  rationale: La expresión es semítica y concreta. «Delante de tu rostro» conserva la imagen corporal del texto griego mejor que una equivalencia más lisa como «en tu presencia», sin perder inteligibilidad en español.
theological_decisions:
- issue: Forma de la dirección a Dios en Κύριε
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Oh Señor
  - Señor mío
  rationale: La oración se dirige directamente a Dios. «Señor» comunica reverencia y relación personal sin introducir una equivalencia litúrgica no presente en el griego. Se mantiene el tono de súplica penitencial del versículo.
  doctrine_reference: 'DOCTRINE.md: contested terms — κύριος → Lord / direct divine address'
- issue: Imagen de «before your face»
  english_pob_reading: before your face
  chosen_spanish_reading: delante de tu rostro
  alternative_spanish_readings:
  - en tu presencia
  - delante de ti
  rationale: El griego conserva una imagen concreta de comparecer ante Dios. «Delante de tu rostro» retiene esa tensión semítica y la dimensión relacional del arrepentimiento, en vez de suavizarla por completo con una formulación abstracta.
  doctrine_reference: 'DOCTRINE.md: preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: La versión inglesa de trabajo pasó de «humiliated» a «disgraced» para acercarse más a ἐντέτραμμαι. En español, «humillado» mantiene esa fuerza formal sin sonar forzado, y se conservó la imagen literal de κατὰ πρόσωπόν σου con «delante de tu rostro».
  spanish_consistency_notes:
  - Se usó «Señor» para κύριε como vocativo directo a Dios, coherente con el estilo POB y sin sustituirlo por una máscara tipográfica.
  - «Avergonzado» y «humillado» reproducen la doble carga de vergüenza/abatimiento del original sin borrar la intensificación del segundo verbo.
  - «Rostro» se eligió para reflejar πρόσωπον con mayor literalidad; la nota permite la alternativa más idiomática «presencia».
