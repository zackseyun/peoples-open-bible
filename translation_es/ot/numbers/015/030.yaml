translation:
  language: es
  text: Pero la persona que actúa con mano alzada[a], sea natural del país o residente extranjero, ultraja a Yahvé, y esa persona será cortada de en medio de su pueblo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'presuntuosamente' o 'desafiantemente'; literalmente, 'con mano alzada'.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַנֶּפֶשׁ
  english_pob_choice: the person
  chosen_spanish: la persona
  alternatives_spanish:
  - el alma
  - el individuo
  lexicon: HALOT
  rationale: En este marco jurídico, נֶפֶשׁ se refiere a la persona como sujeto legal, no a 'alma' en sentido meramente interior. 'La persona' suena natural en español y conserva el alcance jurídico.
- source_word: תַּעֲשֶׂה
  english_pob_choice: acts
  chosen_spanish: actúa
  alternatives_spanish:
  - hace
  - comete
  lexicon: HALOT
  rationale: El verbo hebreo es amplio ('hacer'). 'Actúa' permite mantener el matiz de conducta deliberada sin sobreespecificar el tipo de falta.
- source_word: בְּיָד רָמָה
  english_pob_choice: with a high hand
  chosen_spanish: con mano alzada
  alternatives_spanish:
  - presuntuosamente
  - desafiantemente
  - con la mano levantada
  lexicon: HALOT
  rationale: La expresión española conserva la imagen idiomática del hebreo. Se mantiene la tensión entre el giro literal y las lecturas interpretativas ('presuntuosamente', 'desafiantemente').
- source_word: הָאֶזְרָח
  english_pob_choice: native-born
  chosen_spanish: nativo
  alternatives_spanish:
  - nacido en la tierra
  - ciudadano
  lexicon: HALOT
  rationale: En contraste legal con גֵּר, 'nativo' comunica bien la pertenencia al pueblo sin alargar innecesariamente la frase.
- source_word: הַגֵּר
  english_pob_choice: a sojourner
  chosen_spanish: forastero
  alternatives_spanish:
  - residente extranjero
  - extranjero
  lexicon: HALOT
  rationale: '''Forastero'' mantiene la idea de alguien que no pertenece por nacimiento al pueblo, aunque vive dentro de su ámbito legal. Se evita ''extranjero'' por sonar más moderno y menos relacional en este contexto.'
- source_word: אֶת יְהוָה הוּא מְגַדֵּף
  english_pob_choice: is reviling Yahweh
  chosen_spanish: está ultrajando a Yahvé
  alternatives_spanish:
  - está injuriando a Yahvé
  - está insultando a Yahvé
  - está blasfemando contra Yahvé
  lexicon: HALOT
  rationale: גדף expresa desprecio o afrenta grave contra Dios. 'Ultrajando' conserva la gravedad y evita que 'blasfemar' estreche demasiado el matiz exclusivamente verbal.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto para el nombre divino, sin sustitución por un título ocultador.
- source_word: וְנִכְרְתָה
  english_pob_choice: shall be cut off
  chosen_spanish: será cortada
  alternatives_spanish:
  - será eliminada
  - será excluida
  lexicon: HALOT
  rationale: La fórmula legal כרת en nifal se mantiene con el modismo 'ser cortada' para no resolver prematuramente si el efecto es muerte, exclusión o juicio divino.
- source_word: מִקֶּרֶב עַמָּהּ
  english_pob_choice: from among his people
  chosen_spanish: de en medio de su pueblo
  alternatives_spanish:
  - de entre su pueblo
  - de entre sus gentes
  lexicon: HALOT
  rationale: La expresión preserva la idea de remoción del ámbito comunitario/covenantal. Se usa 'su pueblo' para seguir el paralelismo representativo del texto, aunque el sustantivo hebreo tenga sufijo femenino por concordancia con נֶפֶשׁ.
theological_decisions:
- issue: Alcance de 'con mano alzada' y del castigo de 'ser cortada'
  english_pob_reading: The verse describes open, defiant sin against the LORD and states the offender will be 'cut off' without specifying in translation whether this is human execution, excommunication, or direct divine judgment.
  chosen_spanish_reading: El versículo describe una acción abierta y desafiante contra Yahvé y declara que el culpable será 'cortado', sin precisar en la traducción si se trata de ejecución humana, expulsión comunitaria o juicio divino directo.
  alternative_spanish_readings:
  - presuntuosamente
  - desafiantemente
  - será eliminado
  rationale: Se conserva la carga del hebreo sin cerrar la ambigüedad legal-teológica del texto. 'Con mano alzada' mantiene el modismo; 'será cortada' reproduce la fórmula de juicio sin interpretarla de manera más estrecha.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: La base inglesa revisada cambió de 'blaspheming' a 'reviling' para el verbo גדף. Por eso se evitó 'blasfemar' como opción principal y se prefirió 'ultrajando', que mantiene la fuerza de afrenta abierta sin reducir el campo semántico a un tecnicismo eclesiástico. También se respetó la decisión auditada de no especificar el tipo exacto de 'cut off'.
  spanish_consistency_notes:
  - Se usa 'Yahvé' conforme al estándar del proyecto para יהוה.
  - Se evitó 'SEÑOR' como sustituto, para no ocultar el nombre divino.
  - '''Mano alzada'' conserva el modismo y queda explicado en nota.'
  - '''Forastero'' traduce el contraste legal con ''nativo'' sin cargarlo de connotaciones peyorativas.'
  - '''Ser cortada'' mantiene la fórmula jurídica en voz pasiva, coherente con el hebreo.'
