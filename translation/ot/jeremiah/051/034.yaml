id: JER.51.34
reference: Jeremiah 51:34
source:
  edition: WLC
  text: אכל/נו הממ/נו נְבוּכַדְרֶאצַּר֮ מֶ֣לֶךְ בָּבֶל֒ הציג/נו כְּלִ֣י רִ֔יק בלע/נו כַּ/תַּנִּ֔ין מִלָּ֥א כְרֵשׂ֖/וֹ מֵֽ/עֲדָנָ֑/י הדיח/נו׃
translation:
  text: Nebuchadnezzar king of Babylon has devoured me[a]; he has crushed me. He has set me down like an empty vessel; he has swallowed me like a sea monster; he has filled his belly with my delicacies[c][b]; he has cast me out.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like a dragon.' The Hebrew tannin can refer to a great serpent, dragon-like creature, or sea monster; here the swallowing imagery favors 'sea monster.'
    reason: lexical_alternative
  - marker: b
    text: Or 'with my choice things' or 'with my delights.'
    reason: lexical_alternative
  - marker: c
    text: 'The speaker is personified Zion/Jerusalem; although some Hebrew forms may suggest a plural object in the poetic line, the sense in context is commonly rendered as a singular personification: ''me.'''
    reason: cultural_note
lexical_decisions:
- source_word: אכלנו
  lemma: אכל
  chosen: has devoured me
  alternatives:
  - has eaten me
  - has consumed me
  lexicon: HALOT
  rationale: The verb אכל literally means 'eat/devour.' In this poetic accusation by Daughter Zion/Jerusalem, 'devoured me' preserves the violent metaphor better than the flatter 'eaten' or the more abstract 'consumed.' The 1cs/1cp issue in the surrounding poetry is commonly rendered with a singular personification ('me') for Zion/Jerusalem.
- source_word: הממנו
  lemma: המם
  chosen: has crushed me
  alternatives:
  - has confounded me
  - has shattered me
  - has made me a desolation
  lexicon: HALOT
  rationale: The verb המם can denote throwing into confusion or ruin. In parallel with 'devoured' and followed by imagery of being emptied and swallowed, 'has crushed me' best conveys destructive force in idiomatic English.
- source_word: הציגנו
  chosen: has set me down
  alternatives:
  - has placed me
  - has made me
  lexicon: HALOT
  rationale: The hiphil of יצג here introduces the result image 'like an empty vessel.' 'Has set me down' preserves the concrete metaphor of being put aside as useless, without overinterpreting.
- source_word: כלי ריק
  chosen: like an empty vessel
  alternatives:
  - like an empty jar
  - as an empty container
  lexicon: HALOT
  rationale: כְּלִי is a general term for vessel/container/object. 'Vessel' fits the poetic register and keeps the metaphor broad; 'empty' renders ריק straightforwardly.
- source_word: בלענו
  chosen: has swallowed me
  alternatives:
  - has engulfed me
  - has gulped me down
  lexicon: HALOT
  rationale: בלע commonly means 'swallow.' The direct, vivid image should be retained rather than paraphrased.
- source_word: כתנין
  chosen: like a sea monster
  alternatives:
  - like a dragon
  - like a serpent
  lexicon: HALOT
  rationale: תנין can denote a great reptile/monster of land or sea. In a swallowing image and in modern English, 'sea monster' communicates the monstrous devourer imagery without importing later fantasy associations of 'dragon.'
- source_word: מלא כרשו
  chosen: he has filled his belly
  alternatives:
  - he has filled his stomach
  - he has filled his maw
  lexicon: HALOT
  rationale: כָּרֵשׂ refers to the belly/inner stomach. 'Belly' is natural modern English and preserves the grotesque feeding metaphor.
- source_word: מעדני
  chosen: with my delicacies
  alternatives:
  - with my choice things
  - with my delights
  - with my dainties
  lexicon: HALOT
  rationale: מַעֲדַנִּים denotes delicacies/luxuries/pleasant things. 'My delicacies' best fits the image of a conqueror gorging himself on Zion's treasured goods.
- source_word: הדיחנו
  chosen: he has cast me out
  alternatives:
  - he has rinsed me away
  - he has driven me away
  - he has expelled me
  lexicon: HALOT
  rationale: 'The hiphil of דוח/נדח here likely continues the ingestion metaphor: after filling himself, he disgorges or casts out. ''Cast me out'' is idiomatic and preserves the violent rejection without forcing a highly specific physiological term into the main text.'
