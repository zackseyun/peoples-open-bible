translation:
  language: es
  text: Había nefilim[a] en la tierra en aquellos días —y también después—, cuando los hijos de Dios[b] se unieron a las hijas del hombre[c], y ellas les dieron hijos. Esos fueron los hombres poderosos de la antigüedad, hombres de renombre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O tradicionalmente, «los gigantes». El término hebreo «nefilim» es raro y su sentido preciso es incierto.
    reason: alternative_reading
  - marker: b
    text: «Los hijos de Dios» también puede entenderse como «seres divinos» o, en algunas interpretaciones, como gobernantes humanos o la línea piadosa de Set.
    reason: alternative_reading
  - marker: c
    text: '«Hombre» aquí tiene sentido colectivo: es decir, mujeres humanas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַנְּפִלִים
  english_pob_choice: the Nephilim
  chosen_spanish: los nefilim
  alternatives_spanish:
  - los gigantes
  - los caídos
  lexicon: HALOT
  rationale: Se translitera el término raro y discutido para no imponer una interpretación específica en el texto principal. «Gigantes» recoge una tradición antigua, pero puede sobredeterminar el sentido; «caídos» presupone una etimología que el contexto no garantiza.
- source_word: בָאָרֶץ
  english_pob_choice: on the earth
  chosen_spanish: en la tierra
  alternatives_spanish:
  - en el país
  - sobre la tierra
  lexicon: HALOT
  rationale: «Tierra» es natural en el contexto de la historia primeva y conserva el alcance amplio del hebreo. «País» sería posible, pero aquí estrecha demasiado el referente.
- source_word: בַּיָּמִים הָהֵם
  english_pob_choice: in those days
  chosen_spanish: en aquellos días
  alternatives_spanish:
  - en esos días
  - en tales días
  lexicon: HALOT
  rationale: Es un modismo temporal estándar; «aquellos días» suena natural y mantiene la distancia narrativa.
- source_word: וְגַם אַחֲרֵי כֵן
  english_pob_choice: and also afterward
  chosen_spanish: y también después
  alternatives_spanish:
  - y aun después de eso
  - y también más tarde
  lexicon: HALOT
  rationale: Conserva el valor aditivo de וְגַם y el sentido temporal de אַחֲרֵי כֵן en un español fluido.
- source_word: אֲשֶׁר יָבֹאוּ
  english_pob_choice: when ... came in
  chosen_spanish: cuando ... entraron
  alternatives_spanish:
  - cuando ... vinieron
  - al ... entrar
  lexicon: HALOT
  rationale: La cláusula introduce la circunstancia temporal; «cuando» reproduce bien esa relación. «Entraron» conserva el matiz idiomático del hebreo sin añadir más de lo que el texto dice.
- source_word: בְּנֵי הָאֱלֹהִים
  english_pob_choice: the sons of God
  chosen_spanish: los hijos de Dios
  alternatives_spanish:
  - los seres divinos
  - los hijos de los dioses
  lexicon: HALOT
  rationale: Se mantiene la expresión literal para preservar la ambigüedad interpretativa del hebreo. Traducirla como «seres divinos» o «hijos de los dioses» resolvería indebidamente una cuestión debatida.
- source_word: בְּנוֹת הָאָדָם
  english_pob_choice: the daughters of man
  chosen_spanish: las hijas del hombre
  alternatives_spanish:
  - las hijas de la humanidad
  - las hijas de los hombres
  lexicon: HALOT
  rationale: Se conserva el singular colectivo אָדָם con «el hombre», tal como el inglés POB usa «man» en sentido colectivo. «Humanidad» aclararía el sentido, pero suavizaría la forma del hebreo.
- source_word: וְיָלְדוּ לָהֶם
  english_pob_choice: they bore children to them
  chosen_spanish: y ellas les dieron hijos
  alternatives_spanish:
  - y les dieron a luz hijos
  - y tuvieron hijos de ellos
  lexicon: HALOT
  rationale: El hebreo expresa que dieron a luz para ellos; en español, «les dieron hijos» comunica el resultado de modo natural y fiel. Se evita una paráfrasis más amplia que borre la relación de objeto indirecto.
- source_word: הֵמָּה
  english_pob_choice: Those were
  chosen_spanish: Esos fueron
  alternatives_spanish:
  - Aquellos fueron
  - Ellos fueron
  lexicon: HALOT
  rationale: Es un pronombre de reanudación que identifica al grupo anterior; «Esos fueron» suena natural en español y conserva la referencia anafórica.
- source_word: הַגִּבֹּרִים
  english_pob_choice: the mighty men
  chosen_spanish: los valientes
  alternatives_spanish:
  - los poderosos
  - los guerreros
  - los héroes
  lexicon: HALOT
  rationale: «Valientes» transmite el rango semántico de גִּבּוֹר sin restringirlo sólo a lo militar. «Héroes» o «guerreros» serían más interpretativos; «poderosos» es más vago.
- source_word: מֵעוֹלָם
  english_pob_choice: of old
  chosen_spanish: de la antigüedad
  alternatives_spanish:
  - de antiguo
  - desde tiempos antiguos
  - desde la antigüedad
  lexicon: HALOT
  rationale: Expresa bien la idea de antigüedad en un registro elevado y claro. «De antiguo» es posible, pero menos natural en este giro.
- source_word: אַנְשֵׁי הַשֵּׁם
  english_pob_choice: men of renown
  chosen_spanish: hombres de renombre
  alternatives_spanish:
  - hombres famosos
  - hombres del nombre
  lexicon: HALOT
  rationale: Es una equivalencia idiomática que conserva el tono solemne del hebreo. «Del nombre» sería demasiado literal y oscuro; «famosos» suena más plano.
theological_decisions:
- issue: Identidad de «los hijos de Dios»
  english_pob_reading: Retain the literal phrase 'the sons of God' without interpretive expansion.
  chosen_spanish_reading: Mantener «los hijos de Dios» sin expansión interpretativa.
  alternative_spanish_readings:
  - los seres divinos
  - los ángeles
  - la línea piadosa de Set
  rationale: El hebreo es deliberadamente ambiguo en este contexto. La traducción debe preservar esa tensión teológica en vez de resolver una interpretación debatida dentro del texto principal.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
- issue: Sentido de הַנְּפִלִים
  english_pob_reading: Transliterate as 'Nephilim' in the main text.
  chosen_spanish_reading: Transliterar como «nefilim» en el texto principal.
  alternative_spanish_readings:
  - gigantes
  - caídos
  rationale: El término es raro y su sentido preciso no es seguro. La transliteración evita introducir una lectura doctrinal o legendaria que el hebreo no obliga a adoptar.
  doctrine_reference: Translation philosophy §1 y §3 (primacía del original; preservar ambigüedad real)
- issue: Valor colectivo de אָדָם en «hijas del hombre»
  english_pob_reading: Use 'man' with collective sense rather than a gender-neutral paraphrase.
  chosen_spanish_reading: Usar «el hombre» en sentido colectivo en «las hijas del hombre».
  alternative_spanish_readings:
  - las hijas de la humanidad
  - las hijas de los hombres
  rationale: Se conserva la forma cercana al hebreo y el valor colectivo del término sin convertirlo en una paráfrasis abstracta. Esto mantiene la precisión del texto y su simetría interna.
  doctrine_reference: Translation philosophy §4 (Gender-accurate over gender-neutral)
translation_notes:
  revision_awareness: Se revisó el borrador a la luz del audio-trayecto inglés y del acuerdo alto del revisor cruzado; no se detectaron cambios necesarios respecto de la formulación literal preservadora de ambigüedad, salvo ajustar el español para mayor naturalidad sin perder las tensiones léxicas y teológicas documentadas.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando corresponda; aquí no aparece el Tetragrámaton.
  - Se preserva la distinción entre transliteración («nefilim») y traducción semántica («hombres de renombre»).
  - «Los hijos de Dios» y «las hijas del hombre» conservan la ambigüedad interpretativa y la simetría del hebreo.
  - Las notas a pie siguen los marcadores del texto y no reutilizan letras.
