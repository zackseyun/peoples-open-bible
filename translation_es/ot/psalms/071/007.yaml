translation:
  language: es
  text: He llegado a ser como un portento para muchos[a]; pero tú eres mi refugio fuerte.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una maravilla», «una señal» o «un objeto de asombro».
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּמוֹפֵת
  english_pob_choice: like a portent
  chosen_spanish: como un portento
  alternatives_spanish:
  - como una maravilla
  - como una señal
  - como un objeto de asombro
  lexicon: HALOT
  rationale: מוֹפֵת puede abarcar señal, maravilla o portento. 'Portento' conserva en español la idea de algo extraordinario que provoca asombro y mantiene abierta la tensión del hebreo sin decidir si el matiz es favorable, ominoso o simplemente sorprendente.
- source_word: הָיִיתִי
  english_pob_choice: I have become
  chosen_spanish: he llegado a ser
  alternatives_spanish:
  - fui
  - llegué a ser
  lexicon: HALOT
  rationale: El qatal de היה puede expresar un estado resultante. 'He llegado a ser' comunica en español un resultado presente de una experiencia previa, de modo natural y fiel al valor aspectual del inglés auditado.
- source_word: לְרַבִּים
  english_pob_choice: to many
  chosen_spanish: para muchos
  alternatives_spanish:
  - a muchos
  - en opinión de muchos
  lexicon: HALOT
  rationale: El לְ con רַבִּים permite una relación amplia; 'para muchos' fluye bien en español y conserva la referencia a quienes el salmista se ha vuelto un portento.
- source_word: מַחֲסִי
  english_pob_choice: my refuge
  chosen_spanish: mi refugio
  alternatives_spanish:
  - mi abrigo
  - mi lugar de refugio
  lexicon: HALOT
  rationale: מַחֲסֶה nombra refugio o amparo. 'Mi refugio' es breve, natural y mantiene la imagen de protección.
- source_word: עֹז
  english_pob_choice: strong refuge
  chosen_spanish: fuerte
  alternatives_spanish:
  - de fortaleza
  - de poder
  - fuerte como refugio
  lexicon: HALOT
  rationale: עֹז significa fuerza o poder. Siguiendo la decisión inglesa de hacer idiomática la construcción, 'refugio fuerte' conserva la fuerza semántica sin volver la frase extraña en español.
theological_decisions:
- issue: Nuance of מוֹפֵת / grado de astonishment
  english_pob_reading: The psalmist is an extraordinary, striking case before others, without fixing whether the reaction is positive, ominous, or merely amazed.
  chosen_spanish_reading: El salmista se presenta como un caso extraordinario y llamativo para muchos, sin precisar si eso es señal de maravilla, advertencia o simple asombro.
  alternative_spanish_readings:
  - señal prodigiosa
  - maravilla para muchos
  - advertencia para muchos
  - objeto de asombro
  rationale: El hebreo permite más de un matiz. 'Portento' preserva esa amplitud en español y la nota mantiene las alternativas sin cerrar la ambigüedad que el texto deja abierta.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios y el control cruzado reporta alta concordancia; por eso se mantiene la solución semántica principal del audit trail inglés, adaptada a un español natural.
  spanish_consistency_notes:
  - Se conserva 'Yahvé' cuando el pasaje no lo requiere; aquí el verso no contiene el nombre divino explícito, por lo que no aplica.
  - Se eligió 'portento' para mantener la gama semántica de מוֹפֵת sin resolver el matiz.
  - '''Refugio fuerte'' reproduce la estructura idiomática del inglés auditado y evita una calca torpe de ''refugio de fuerza''.'
