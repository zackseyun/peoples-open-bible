translation:
  language: es
  text: El justo se alegrará[a] cuando vea la venganza; lavará sus pies en la sangre del impío[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «porque vea la venganza». La conjunción hebrea puede leerse de modo temporal («cuando») o causal («porque/ya que»).
    reason: alternative_reading
  - marker: b
    text: La imagen «lavará sus pies en la sangre del impío» es poética y expresa la plenitud del juicio, no una orden de violencia personal.
    reason: cultural_note
lexical_decisions:
- source_word: יִשְׂמַח
  english_pob_choice: will rejoice
  chosen_spanish: se alegrará
  alternatives_spanish:
  - se regocijará
  - se gozará
  lexicon: HALOT
  rationale: El verbo qal imperfecto expresa un sentido futuro en el contexto poético. «Se alegrará» comunica bien la reacción jubilosa en español moderno y mantiene un registro natural y digno.
- source_word: צַדִּיק
  english_pob_choice: the righteous
  chosen_spanish: el justo
  alternatives_spanish:
  - el hombre justo
  - los justos
  lexicon: HALOT
  rationale: El adjetivo sustantivado se vierte como singular masculino representativo. «El justo» conserva la forma singular y evita añadir «hombre» sin necesidad del texto.
- source_word: כִּי
  english_pob_choice: when
  chosen_spanish: cuando
  alternatives_spanish:
  - porque
  - pues
  lexicon: HALOT
  rationale: 'Aquí la conjunción tiene fuerza temporal-circunstancial en español: el justo se alegra al ver la venganza. «Cuando» reproduce mejor esa relación que una causalidad explícita en la línea principal.'
- source_word: חָזָה
  english_pob_choice: he sees
  chosen_spanish: vea
  alternatives_spanish:
  - ve
  - haya visto
  - contemple
  lexicon: HALOT
  rationale: En una cláusula futura/circunstancial española, el subjuntivo «vea» fluye de manera natural y mantiene el valor de evento observado en el paralelo poético.
- source_word: נָקָם
  english_pob_choice: vengeance
  chosen_spanish: la venganza
  alternatives_spanish:
  - la retribución
  - la vindicación
  lexicon: HALOT
  rationale: «Venganza» es la equivalencia más directa y conserva la dureza del sustantivo hebreo, sin suavizarlo hacia una noción más interpretativa como «vindicación».
- source_word: פְּעָמָיו
  english_pob_choice: his feet
  chosen_spanish: sus pies
  alternatives_spanish:
  - sus pasos
  - sus plantas
  lexicon: HALOT
  rationale: En el modismo «lavar en sangre», el plural con sufijo se vierte de forma concreta como «pies» para preservar la imagen corporal y poética.
- source_word: יִרְחַץ
  english_pob_choice: he will wash
  chosen_spanish: lavará
  alternatives_spanish:
  - se lavará
  - bañará
  lexicon: HALOT
  rationale: El qal imperfecto se expresa naturalmente con futuro en español. «Lavará» mantiene el movimiento verbal directo y la imagen enérgica del verso.
- source_word: בְּדַם
  english_pob_choice: in the blood
  chosen_spanish: en la sangre
  alternatives_spanish:
  - con la sangre
  lexicon: HALOT
  rationale: La preposición ב aquí es locativa dentro del giro poético. «En la sangre» reproduce la imagen con más fidelidad que una lectura instrumental suavizada.
- source_word: הָרָשָׁע
  english_pob_choice: the wicked
  chosen_spanish: del impío
  alternatives_spanish:
  - del malvado
  - del inicuo
  lexicon: HALOT
  rationale: «Impío» preserva el carácter ético-religioso del sustantivo hebreo y mantiene un registro bíblico claro en español. El genitivo «del impío» refleja correctamente la relación del original.
theological_decisions:
- issue: Si la imagen de la sangre debe atenuarse o explicitarse como juicio divino
  english_pob_reading: The verse is translated to reflect rejoicing at the sight of vengeance/judgment without adding language of personal revenge.
  chosen_spanish_reading: La traducción conserva la imagen intensa de juicio sin añadir explicaciones como «divina» o convertir el texto en venganza privada.
  alternative_spanish_readings:
  - El justo se alegrará porque Dios hace justicia; lavará sus pies en la sangre del impío.
  - El justo celebrará la vindicación al ver la sentencia contra el malvado.
  rationale: El hebreo presenta lenguaje imprecatorio y una imagen violenta. La versión española debe sostener esa tensión sin resolverla interpretativamente; por eso se mantiene la referencia directa a la venganza y a la sangre, tal como lo hace el POB inglés.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del POB inglés, que prefirió una construcción singular sustantivada («the righteous») en lugar de «the righteous man». En español se reflejó con «el justo», una forma natural y formalmente equivalente. También se mantuvo la intensidad de la imagen final sin suavizarla, en continuidad con el estado aprobado del texto inglés.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto fuente lo requiera; aquí no aparece el nombre divino.
  - Se mantuvo el registro bíblico con «justo», «venganza» e «impío», evitando sustituciones devocionales más interpretativas.
  - La puntuación conserva la pausa poética del hebreo con dos cláusulas separadas por punto y coma.
