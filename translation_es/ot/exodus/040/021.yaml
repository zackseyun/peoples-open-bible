translation:
  language: es
  text: Él llevó el arca al tabernáculo, puso el velo de separación[a] y cubrió el arca del testimonio[b], tal como Yahvé había mandado a Moisés.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el velo de la cortina» o «el velo del cortinaje». El hebreo combina términos para un velo o cortina y su función de separación o pantalla.
    reason: lexical_alternative
  - marker: b
    text: O «veló» o «cubrió con un velo» el arca del testimonio. El verbo hebreo destaca el ocultamiento o resguardo por medio del velo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֵא / הָאָרֹן
  english_pob_choice: He brought the ark
  chosen_spanish: llevó el arca
  alternatives_spanish:
  - trajo el arca
  - introdujo el arca
  lexicon: HALOT
  rationale: El verbo causativo de בוא expresa hacer entrar algo a un lugar. En español, «llevó» comunica de manera natural que Moisés hizo entrar el arca al tabernáculo, sin perder el movimiento hacia adentro.
- source_word: הַמִּשְׁכָּן
  english_pob_choice: the tabernacle
  chosen_spanish: el tabernáculo
  alternatives_spanish:
  - la morada
  - la tienda
  lexicon: HALOT
  rationale: En Éxodo, מִשְׁכָּן designa el santuario portátil. «Tabernáculo» es el equivalente tradicional y preciso en español bíblico.
- source_word: פָּרֹכֶת הַמָּסָךְ
  english_pob_choice: the veil of the screen
  chosen_spanish: el velo del cortinaje
  alternatives_spanish:
  - el velo de la cortina
  - la cortina de separación
  lexicon: HALOT
  rationale: La combinación une una tela interior de santuario con su función de separación o pantalla. «Velo del cortinaje» conserva ambos elementos sin forzar una sola palabra española que absorba los dos matices.
- source_word: וַיָּשֶׂם
  english_pob_choice: set up
  chosen_spanish: puso
  alternatives_spanish:
  - colocó
  - dispuso
  lexicon: HALOT
  rationale: El contexto de instalación del santuario pide un verbo simple de colocación. «Puso» es directo y fiel, aunque menos técnico que «dispuso».
- source_word: וַיָּסֶךְ
  english_pob_choice: screened
  chosen_spanish: cubrió
  alternatives_spanish:
  - veló
  - resguardó
  - cubrió con un velo
  lexicon: HALOT
  rationale: El verbo subraya la acción de cubrir o proteger por medio de la cortina. «Cubrió» comunica bien esa función en español, manteniendo la relación semántica con la idea de separación y ocultamiento.
- source_word: אֲרוֹן הָעֵדֻת
  english_pob_choice: the ark of the testimony
  chosen_spanish: el arca del testimonio
  alternatives_spanish:
  - el arca del pacto
  - el arca del testimonio
  lexicon: HALOT
  rationale: «Testimonio» preserva el término técnico הָעֵדֻת, sin sustituirlo por una paráfrasis teológica. Mantiene el vínculo con las tablas depositadas en el arca.
- source_word: כַּאֲשֶׁר צִוָּה יְהוָה אֶת מֹשֶׁה
  english_pob_choice: just as Yahweh had commanded Moses
  chosen_spanish: tal como Yahvé había mandado a Moisés
  alternatives_spanish:
  - como Yahvé había mandado a Moisés
  - justamente como Yahvé había mandado a Moisés
  lexicon: HALOT
  rationale: La fórmula de obediencia ritual se expresa bien con «tal como». «Mandado» refleja el mandato divino con un registro bíblico claro y natural en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino en su forma de transliteración estándar del proyecto. «Yahvé» evita la sustitución por un título y sigue la política terminológica del POB.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton directamente. Se mantiene el nombre divino en español como «Yahvé» para preservar la identidad personal del Dios del pacto y no ocultarlo tras un sustituto.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Relación entre פָּרֹכֶת הַמָּסָךְ y וַיָּסֶךְ
  english_pob_reading: the veil of the screen / screened
  chosen_spanish_reading: el velo del cortinaje / cubrió
  alternative_spanish_readings:
  - el velo de separación / veló
  - la cortina de la pantalla / protegió
  rationale: El hebreo juega entre el sustantivo de la cortina y el verbo de cubrir o proteger. «Cubrió» conserva la función de ocultar el arca sin borrar la tensión lexical entre objeto y acción.
  doctrine_reference: Exodo 40:21 lexical/thematic note
translation_notes:
  revision_awareness: 'La revisión inglesa más reciente sustituyó «curtain screen» por «veil of the screen» para reflejar más de cerca פָּרֹכֶת הַמָּסָךְ y mantener un registro formal, conservando «screened» para וַיָּסֶךְ. La redacción española sigue esa misma sensibilidad: mantiene el doble valor de la cortina/velo y preserva la acción de cubrir o ocultar el arca.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה, conforme al criterio del proyecto.
  - «Arca del testimonio» mantiene la designación técnica de Éxodo sin expandirla a «pacto» u otra paráfrasis.
  - 'La frase final conserva la fórmula de obediencia característica del Pentateuco: correspondencia exacta con el mandato divino.'
