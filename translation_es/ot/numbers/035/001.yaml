translation:
  language: es
  text: 'Yahvé habló a Moisés en las llanuras de Moab, junto al Jordán, a la altura de Jericó, diciendo:'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיְדַבֵּר
  english_pob_choice: spoke
  chosen_spanish: habló
  alternatives_spanish:
  - dijo
  lexicon: HALOT
  rationale: El perfecto consecutivo introduce un nuevo acto de habla; en español, «habló» conserva el valor narrativo formal de la fórmula hebrea sin sonar forzado. «Dijo» también sería posible, pero «habló» refleja mejor el verbo base דִּבֵּר y mantiene la cadencia del encabezado profético.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue la convención POB para el nombre divino: transliteración del Tetragrámaton. En español, «Yahvé» preserva el nombre personal del pacto sin sustituirlo por un título.'
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - para
  lexicon: HALOT
  rationale: La preposición direccional natural en español para marcar destinatario del habla es «a».
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  lexicon: HALOT
  rationale: Nombre propio bíblico estándar en español.
- source_word: בְּעַרְבֹת
  english_pob_choice: in the plains
  chosen_spanish: en las llanuras
  alternatives_spanish:
  - en las estepas
  - en las llanuras desérticas
  lexicon: HALOT
  rationale: עֲרָבוֹת designa una zona de llanuras/estepa. «Llanuras» es la expresión idiomática más natural en español y conserva el valor geográfico sin exceder el sentido del hebreo.
- source_word: מוֹאָב
  english_pob_choice: Moab
  chosen_spanish: Moab
  lexicon: HALOT
  rationale: Topónimo estándar.
- source_word: עַל
  english_pob_choice: by
  chosen_spanish: junto al
  alternatives_spanish:
  - al lado de
  - por
  lexicon: HALOT
  rationale: En esta ubicación geográfica, la preposición expresa proximidad, no relación causal ni posición encima. «Junto al» comunica de forma natural la cercanía al Jordán.
- source_word: יַרְדֵּן
  english_pob_choice: the Jordan
  chosen_spanish: Jordán
  alternatives_spanish:
  - río Jordán
  lexicon: HALOT
  rationale: Como nombre geográfico bien conocido, en español basta «Jordán»; el artículo no es necesario en esta construcción.
- source_word: יְרֵחוֹ
  english_pob_choice: Jericho
  chosen_spanish: Jericó
  lexicon: HALOT
  rationale: Topónimo estándar en español.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  lexicon: HALOT
  rationale: La fórmula infinitiva introduce el contenido de la palabra divina. «Diciendo» preserva la relación formal con lo que sigue sin convertirla en una paráfrasis más libre.
theological_decisions:
- issue: Nombre divino YHWH en español
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa יְהוָה directamente. La POB inglesa decide evitar la sustitución por un título; en español, «Yahvé» mantiene esa misma decisión teológica y textual.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: El texto hebreo, la traducción inglesa POB y la revisión más reciente están en alto acuerdo; no hay notas críticas ni variantes textuales que requieran marcación en el español. Se conservó la fórmula narrativa y el orden informativo esencial del hebreo, con ajustes idiomáticos mínimos para español natural.
  spanish_consistency_notes:
  - Se usa «Yahvé» en lugar de «SEÑOR» conforme al criterio POB para el Tetragrámaton.
  - Se prefirió «Moisés», «Moab», «Jordán» y «Jericó» como nombres propios estándar en español.
  - «En las llanuras de Moab» reproduce la expresión geográfica estable sin sobreexplicarla.
  - No se añadió puntuación interna innecesaria; la coma antes de «diciendo» conserva la fórmula de introducción del discurso.
