id: PHP.1.14
reference: Philippians 1:14
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: καὶ τοὺς πλείονας τῶν ἀδελφῶν ἐν κυρίῳ πεποιθότας τοῖς δεσμοῖς μου περισσοτέρως τολμᾶν ἀφόβως τὸν ⸀λόγον λαλεῖν.
base_translation:
  language: en
  yaml_path: translation/nt/philippians/001/014.yaml
  text: And most of the brothers, having become confident in the Lord because of my chains, dare all the more to speak the word fearlessly.
translation:
  language: ko
  text: 또한 형제들[a] 가운데 대다수가 내가 매인 일로 말미암아 주 안에서 확신을 얻어, 두려움 없이 말씀을 전하기를 더욱 담대히 하고 있습니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「형제자매들」. 헬라어는 남성 복수이지만 본문은 동료 신자 전체를 가리킬 가능성이 높다.
    reason: lexical_alternative
lexical_decisions:
- source_word: πλείονας
  english_pob_choice: most
  chosen_korean: 대다수
  alternatives_korean:
  - 대부분
  - 더 많은
  lexicon: BDAG
  rationale: 정관사와 부분 속격이 결합된 πλείονας는 단순 비교가 아닌 「대다수」를 가리킨다.
- source_word: ἀδελφῶν
  english_pob_choice: brothers
  chosen_korean: 형제들
  alternatives_korean:
  - 형제자매들
  - 동료 신자들
  lexicon: BDAG
  rationale: 본 프로젝트의 성별 정확성 원칙에 따라 남성 복수 형태를 보존하고, 포괄적 함의는 각주로 둔다.
- source_word: ἐν κυρίῳ
  english_pob_choice: in the Lord
  chosen_korean: 주 안에서
  alternatives_korean:
  - 주로 말미암아
  - 주를 통하여
  lexicon: BDAG
  rationale: 바울의 정형 표현 ἐν κυρίῳ를 「주 안에서」로 그대로 옮긴다. 분사 「확신을 얻어」의 영역·근거를 표현한다.
- source_word: πεποιθότας
  english_pob_choice: having become confident
  chosen_korean: 확신을 얻어
  alternatives_korean:
  - 확신하여
  - 신뢰하여
  lexicon: BDAG
  rationale: 완료 분사로 결과적 상태(굳어진 확신)를 표현한다. 「확신을 얻어」가 그 결과적 형성을 자연스럽게 담는다.
- source_word: τοῖς δεσμοῖς μου
  english_pob_choice: because of my chains
  chosen_korean: 내가 매인 일로 말미암아
  alternatives_korean:
  - 나의 결박으로 인하여
  - 내 사슬 때문에
  lexicon: BDAG
  rationale: 헬라어 여격이 원인을 표현한다. 「~로 말미암아」가 그 인과를 자연스럽게 담는다.
- source_word: περισσοτέρως
  english_pob_choice: all the more
  chosen_korean: 더욱
  alternatives_korean:
  - 한층 더
  - 더더욱
  lexicon: BDAG
  rationale: 비교급 부사 περισσοτέρως의 강한 증가를 「더욱」으로 간결하게 담는다.
- source_word: τολμᾶν
  english_pob_choice: dare
  chosen_korean: 담대히
  alternatives_korean:
  - 용기를 내어
  - 감히
  lexicon: BDAG
  rationale: τολμάω의 결의·담대함을 한국어 부사 「담대히」로 옮긴다. 「전하기를 더욱 담대히 하다」가 자연스러운 한국어 구문이다.
- source_word: ἀφόβως
  english_pob_choice: fearlessly
  chosen_korean: 두려움 없이
  alternatives_korean:
  - 무서움 없이
  - 거리낌 없이
  lexicon: BDAG
  rationale: ἀφόβως는 「두려움의 부재」를 명시적으로 가리킨다. 「두려움 없이」가 그 함의를 정확하게 담는다.
- source_word: τὸν λόγον
  english_pob_choice: the word
  chosen_korean: 말씀
  alternatives_korean:
  - 그 말씀
  - 메시지
  lexicon: BDAG
  rationale: λόγος는 한국 교회의 정착된 어법으로 「말씀」이 자연스럽다. 헬라어에 없는 「하나님의」를 더하지 않는다.
- source_word: λαλεῖν
  english_pob_choice: to speak
  chosen_korean: 전하기를
  alternatives_korean:
  - 말하기를
  - 선포하기를
  lexicon: BDAG
  rationale: 한국어 「말씀을 전하다」가 자연스러운 결합 표현이며, 단순 「말하다」보다 본문의 복음 선포 맥락을 자연스럽게 담는다.
theological_decisions:
- issue: ἀδελφοί의 범위
  chosen_reading: 형제들 (본문) — 형제자매들 (각주)
  alternative_readings:
  - 형제자매들
  - 동료 신자들
  rationale: 헬라어 남성 복수 형태를 보존하되, 본문의 포괄적 지시 가능성은 각주로 둔다. 본 프로젝트의 「성별 정확성 우선」 원칙을 따른다.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral'
