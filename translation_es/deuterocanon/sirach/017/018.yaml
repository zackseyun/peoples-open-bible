translation:
  language: es
  text: La limosna de un hombre es como un sello con él, y guardará la bondad de una persona como la pupila[b] del ojo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O bien: «Dios guardará la bondad de una persona como la pupila del ojo». El verbo griego no tiene sujeto explícito; el contexto más amplio puede sugerir a Dios, pero esta cláusula no lo expresa.'
    reason: alternative_reading
  - marker: b
    text: Literalmente, «la pupila del ojo»; compárese el modismo «como la niña del ojo».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐλεημοσύνη
  english_pob_choice: almsgiving
  chosen_spanish: limosna
  alternatives_spanish:
  - almsgiving
  - caridad
  - acto de misericordia
  lexicon: BDAG
  rationale: En español bíblico, «limosna» comunica de manera natural la dádiva concreta dada a los necesitados y mantiene el sentido de obra misericordiosa. «Caridad» puede sonar más abstracto o moderno, y «acto de misericordia» explica demasiado el término.
- source_word: ἀνδρός
  english_pob_choice: a man's
  chosen_spanish: de un hombre
  alternatives_spanish:
  - de un varón
  - de una persona
  lexicon: LSJ
  rationale: El griego usa el singular masculino. «De un hombre» conserva esa forma sin sobrecargar el matiz de género, y resulta claro en español.
- source_word: σφραγίς
  english_pob_choice: seal
  chosen_spanish: sello
  alternatives_spanish:
  - sello de autoridad
  - anillo de sello
  lexicon: LSJ
  rationale: «Sello» es la correspondencia más directa y deja intacta la imagen metafórica de algo valioso, identificador y bien guardado.
- source_word: μετ᾿ αὐτοῦ
  english_pob_choice: with him
  chosen_spanish: con él
  alternatives_spanish:
  - a su lado
  - a su cuidado
  lexicon: LSJ
  rationale: La preposición simple se refleja de modo natural con «con él», preservando la concisión del griego.
- source_word: χάριν
  english_pob_choice: kindness
  chosen_spanish: bondad
  alternatives_spanish:
  - favor
  - gracia
  - amabilidad
  lexicon: BDAG
  rationale: Aquí χάρις nombra una acción benéfica o disposición favorable entre personas. «Bondad» es idiomática en español y evita trasladar sin necesidad la carga teológica de «gracia».
- source_word: ἀνθρώπου
  english_pob_choice: a person's
  chosen_spanish: de una persona
  alternatives_spanish:
  - de un ser humano
  - de un hombre
  lexicon: LSJ
  rationale: A diferencia de ἀνδρός, aquí el término es más amplio. «De una persona» reproduce bien esa amplitud y el singular.
- source_word: κόρην
  english_pob_choice: the pupil of the eye
  chosen_spanish: la pupila del ojo
  alternatives_spanish:
  - la niña del ojo
  - el ojo mismo
  lexicon: LSJ
  rationale: «La pupila del ojo» expresa el sentido literal y transparente del término, manteniendo la imagen corporal de protección cuidadosa.
- source_word: συντηρήσει
  english_pob_choice: he will preserve
  chosen_spanish: preservará
  alternatives_spanish:
  - guardará
  - mantendrá segura
  lexicon: BDAG
  rationale: El futuro de tercera persona singular permite un español impersonal/genericizado. «Preservará» conserva el valor de guardar y proteger sin añadir sujeto explícito que el griego no da.
theological_decisions:
- issue: Sujeto implícito de συντηρήσει
  english_pob_reading: an implicit singular subject, best understood generically ('he will preserve')
  chosen_spanish_reading: sujeto implícito e indefinido en el futuro («preservará»), sin explicitar quién actúa
  alternative_spanish_readings:
  - «Dios preservará»
  - «él preservará»
  rationale: El griego no nombra sujeto. En español, una forma futura impersonal o genérica evita resolver la ambigüedad. Así se preserva la tensión documentada por la POB inglesa entre una lectura proverbial general y una posible lectura providencial.
  doctrine_reference: Preservar la ambigüedad gramatical y teológica cuando el texto fuente no explicita el sujeto.
translation_notes:
  revision_awareness: 'Se ha seguido el audit trail inglés sin depender mecánicamente de su redacción: ἐλεημοσύνη se ha verificado como dádiva concreta de misericordia, χάρις como favor/bondad humana y κόρην como imagen literal de la pupila. Se conservó la ambigüedad del sujeto en συντηρήσει, tal como indica la nota inglesa.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el tetragrámaton; no aplica aquí.
  - Se evita «gracia» para χάριν porque en este contexto la POB inglesa documenta un valor relacional humano, no una carga teológica técnica.
  - La primera cola mantiene el paralelismo nominal del griego; la segunda conserva el futuro singular sin añadir sujeto explícito.
