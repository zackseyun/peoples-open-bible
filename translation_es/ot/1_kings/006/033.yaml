translation:
  language: es
  text: Y así hizo para la entrada de la nave jambas de madera de olivo[a], cuadradas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O posiblemente, «de cuatro lados», «con marco cuadrado» o «cuadradas». La frase hebrea también puede representarse más literalmente como «a partir de una cuarta parte», pero es arquitectónicamente difícil y puede describir la forma del vano.
    reason: alternative_reading
lexical_decisions:
- source_word: וְכֵן
  english_pob_choice: And so
  chosen_spanish: Y así
  alternatives_spanish:
  - Y de igual modo
  - Y asimismo
  lexicon: HALOT
  rationale: Expresa continuidad y correspondencia con la descripción anterior sin sonar forzado en español.
- source_word: עָשָׂה
  english_pob_choice: he made
  chosen_spanish: hizo
  alternatives_spanish:
  - fabricó
  - construyó
  lexicon: HALOT
  rationale: En contexto arquitectónico, 'hizo' es directo y fiel; evita añadir matices no requeridos por el hebreo.
- source_word: לְפֶתַח
  english_pob_choice: for the entrance
  chosen_spanish: para la entrada
  alternatives_spanish:
  - para el acceso
  - para la puerta
  lexicon: HALOT
  rationale: '''Entrada'' conserva el valor arquitectónico general de פתח y suena natural en español.'
- source_word: הַהֵיכָל
  english_pob_choice: the nave
  chosen_spanish: el templo
  alternatives_spanish:
  - la nave
  - el salón principal
  lexicon: HALOT
  rationale: Aunque el inglés opta por 'nave' como equivalente arquitectónico, en español 'la nave' puede sonar técnico o ambiguo; 'el templo' comunica con claridad el referente del edificio sagrado en este contexto sin forzar una distinción que el verso no desarrolla explícitamente.
- source_word: מְזוּזוֹת
  english_pob_choice: doorposts
  chosen_spanish: jambas
  alternatives_spanish:
  - postes de la puerta
  - postes laterales
  lexicon: HALOT
  rationale: '''Jambas'' es el término arquitectónico preciso para los laterales verticales de una entrada; evita la repetición y mantiene la idea estructural de מְזוּזוֹת.'
- source_word: עֲצֵי שָׁמֶן
  english_pob_choice: olivewood
  chosen_spanish: de madera de olivo
  alternatives_spanish:
  - de olivo
  - de madera de aceituno
  lexicon: HALOT
  rationale: Conserva el sentido del sustantivo constructo como material, de forma natural en español, sin perder la referencia al olivo.
- source_word: מֵאֵת רְבִעִית
  english_pob_choice: four-sided
  chosen_spanish: cuadradas
  alternatives_spanish:
  - de cuatro lados
  - cuadradas o de cuatro lados
  lexicon: HALOT
  rationale: Sigue la revisión inglesa que entendió la frase como una indicación arquitectónica de forma; 'cuadradas' es la equivalencia breve más natural en español y preserva la posibilidad geométrica sin resolver definitivamente la dificultad del hebreo.
theological_decisions:
- issue: Referencia arquitectónica oscura en מֵאֵת רְבִעִית
  english_pob_reading: four-sided, with a footnote preserving 'from a fourth part' / 'four-sided framing' / 'square' as alternatives
  chosen_spanish_reading: cuadradas, con nota que mantiene la alternativa de 'de cuatro lados'
  alternative_spanish_readings:
  - de cuatro lados
  - con marco cuadrado
  - a partir de una cuarta parte
  rationale: El hebreo es difícil y puede aludir a la forma o al encuadre del vano. La elección principal sigue la revisión del POB en inglés y evita un literalismo opaco, mientras la nota conserva la tensión interpretativa.
  doctrine_reference: No aplica; cuestión léxico-architectónica, no doctrinal.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que sustituyó el difícil 'from a fourth part' por 'four-sided'. La propuesta española adopta esa decisión interpretativa como 'cuadradas', pero conserva en nota la incertidumbre del hebreo y la posibilidad de otras lecturas arquitectónicas.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto solo cuando aparece el Nombre divino; este verso no lo contiene.
  - Se evitó 'nave' por posible ambigüedad en español y por no ser indispensable para la comprensión del pasaje.
  - Se eligió un término arquitectónico español natural ('jambas') para preservar precisión sin mecanicismo.
