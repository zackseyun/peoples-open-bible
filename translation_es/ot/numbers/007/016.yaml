lexical_decisions:
- source_word: שְׂעִיר עִזִּים
  english_pob_choice: male goat
  chosen_spanish: macho cabrío
  alternatives_spanish:
  - cabrío
  - macho de las cabras
  - chivo
  lexicon: HALOT
  rationale: La construcción hebrea designa un macho de las cabras, es decir, un animal sacrificial masculino. En español, «macho cabrío» comunica bien esa especificidad y evita una formulación más genérica como «cabra» o más rara como «he-goat».
- source_word: אֶחָד
  english_pob_choice: one
  chosen_spanish: uno
  alternatives_spanish:
  - un
  - uno solo
  lexicon: HALOT
  rationale: El numeral se conserva para reflejar el inventario formal de la lista de ofrendas. En español, en esta posición nominal, la forma natural es implícita en el sintagma («un macho cabrío»); no es necesario repetir «uno» de modo enfático.
- source_word: לְחַטָּאת
  english_pob_choice: for a sin offering
  chosen_spanish: para ofrenda por el pecado
  alternatives_spanish:
  - como ofrenda por el pecado
  - para expiación
  - como sacrificio por el pecado
  lexicon: HALOT
  rationale: En el contexto sacrificial, חַטָּאת se refiere a la ofrenda por el pecado, no al pecado abstracto. «Para ofrenda por el pecado» reproduce bien la función del ל prefijado y suena natural en español bíblico contemporáneo.
theological_decisions:
- issue: Naturaleza sacrificial de חַטָּאת
  english_pob_reading: sin offering
  chosen_spanish_reading: ofrenda por el pecado
  alternative_spanish_readings:
  - sacrificio por el pecado
  - ofrenda expiatoria
  rationale: La expresión apunta a la categoría ritual de la ofrenda, no al pecado como entidad abstracta. «Ofrenda por el pecado» conserva la referencia cultual sin introducir una interpretación doctrinal adicional.
  doctrine_reference: Levítico 4; Levítico 7
- issue: Especificidad del animal
  english_pob_reading: male goat
  chosen_spanish_reading: macho cabrío
  alternative_spanish_readings:
  - macho de las cabras
  - chivo
  rationale: El hebreo señala un animal macho dentro del ganado caprino. «Macho cabrío» mantiene esa precisión zoológica y sacrificial.
  doctrine_reference: Números 7:16
translation_notes:
  revision_awareness: El texto fuente y la auditoría inglesa están en alto acuerdo y no presentan revisiones aplicadas; se mantiene la lectura simple y literal del inventario sacrificial.
  spanish_consistency_notes:
  - Se conserva el estilo de lista nominal propio de Números 7.
  - No se usa «SEÑOR» ni «Cristo» porque no aparecen en este verso.
  - «Ofrenda por el pecado» se emplea en sentido ritual, no como glosa doctrinal.
