- from: Pero los hijos de Manasés no pudieron despojar[a] estas ciudades, y el cananeo[b] se mostró resuelto a habitar en esta tierra.
  to: Pero los hijos de Manasés no pudieron desposeer[a] a los habitantes de estas ciudades, y el cananeo[b] estaba resuelto a habitar en esta tierra.
  rationale: Se ajusta לְהוֹרִישׁ a «desposeer a los habitantes de estas ciudades» para conservar el sentido de desposesión territorial sin la ambigüedad de «despojar estas ciudades». También se suaviza «se mostró resuelto» a «estaba resuelto», que suena más natural en español y sigue reflejando bien וַיּוֹאֶל como voluntad/resolución. Se mantiene el singular colectivo «el cananeo» con nota, en línea con la evidencia fuente y el audit trail inglés.
