  revised_footnotes:
  - marker: a
    text: O «su lugar santo» o «sus cosas santas». El griego usa un plural que puede referirse colectivamente al santuario o a las realidades sagradas vinculadas a él.
    reason: lexical_alternative
  - marker: b
    text: 'O «le dieron gran honra a su nación». El griego dice literalmente: «glorificaron a su nación con gran gloria».'
    reason: lexical_alternative
  revision_rationale: Se corrige «sus santidades» a «su santuario» para reflejar fielmente la resolución contextual documentada para τὰ ἅγια αὐτῶν y producir un español natural y eclesialmente legible. Se mantienen en nota las alternativas derivadas del plural griego. Se simplifican las notas a las variantes significativas preservadas por la auditoría inglesa.
