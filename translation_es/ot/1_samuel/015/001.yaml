translation:
  language: es
  text: 'Entonces Samuel dijo a Saúl: «Yahvé me envió para ungirte como rey sobre su pueblo, sobre Israel. Ahora, pues, escucha[a] las palabras de Yahvé».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit. «a la voz de las palabras de Yahvé». El hebreo es más literal que la redacción más fluida en español y conserva un llamado implícito no solo a oír, sino también a atender y obedecer.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Luego ... dijo
  lexicon: HALOT
  rationale: El waw consecutivo avanza la narración; «Entonces» reproduce bien la progresión narrativa en español sin forzar una repetición de «y».
- source_word: שְׁמוּאֵל
  english_pob_choice: Samuel
  chosen_spanish: Samuel
  lexicon: HALOT
  rationale: Nombre propio estándar en español.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - para
  lexicon: HALOT
  rationale: Preposición natural en el discurso directo; «a Saúl» es idiomático en español.
- source_word: שָׁאוּל
  english_pob_choice: Saul
  chosen_spanish: Saúl
  lexicon: HALOT
  rationale: Transliteración habitual del nombre propio en español bíblico.
- source_word: אֹתִי
  english_pob_choice: me
  chosen_spanish: me
  lexicon: HALOT
  rationale: El pronombre objeto directo se expresa de forma natural en español sin intentar reproducir el orden enfático hebreo.
- source_word: שָׁלַח
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - ha enviado
  - mandó
  lexicon: HALOT
  rationale: El perfecto hebreo en discurso directo funciona como envío/comisión ya realizada; «envió» es claro y fiel.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - el SEÑOR
  lexicon: HALOT
  rationale: Se mantiene el nombre divino personal en español como «Yahvé», de acuerdo con la política del proyecto y el valor directo del Tetragrámaton.
- source_word: לִמְשָׁחֳךָ
  english_pob_choice: to anoint you
  chosen_spanish: para ungirte
  alternatives_spanish:
  - para consagrarte
  - para echar aceite sobre ti
  lexicon: HALOT
  rationale: «Ungirte» conserva el verbo técnico de instalación real y su resonancia bíblica; el infinitivo final se expresa de modo natural con «para».
- source_word: לְמֶלֶךְ
  english_pob_choice: as king
  chosen_spanish: como rey
  alternatives_spanish:
  - por rey
  - para rey
  lexicon: HALOT
  rationale: La función/rol se expresa con «como rey», una forma natural que preserva el matiz de nombramiento al cargo.
- source_word: עַל עַמּוֹ
  english_pob_choice: over his people
  chosen_spanish: sobre su pueblo
  alternatives_spanish:
  - sobre su gente
  - para gobernar a su pueblo
  lexicon: HALOT
  rationale: «Sobre» conserva la relación de dominio/gobierno del hebreo; el sufijo posesivo se mantiene como «su» refiriéndose a Yahvé.
- source_word: עַל יִשְׂרָאֵל
  english_pob_choice: over Israel
  chosen_spanish: sobre Israel
  alternatives_spanish:
  - es decir, Israel
  lexicon: HALOT
  rationale: La repetición de עַל se conserva para reflejar el énfasis y la estructura del hebreo.
- source_word: וְעַתָּה
  english_pob_choice: So now
  chosen_spanish: Ahora, pues
  alternatives_spanish:
  - Y ahora
  - Así que ahora
  lexicon: HALOT
  rationale: «Ahora, pues» recoge la transición exhortativa y la fuerza inferencial del hebreo de manera natural en español.
- source_word: שְׁמַע
  english_pob_choice: listen
  chosen_spanish: escucha
  alternatives_spanish:
  - oye
  - atiende
  lexicon: HALOT
  rationale: Aquí el verbo tiene fuerza de atención obediente; «escucha» comunica bien la llamada a prestar oído con implicación de respuesta.
- source_word: לְקוֹל
  english_pob_choice: to the voice
  chosen_spanish: las palabras
  alternatives_spanish:
  - la voz
  - el clamor
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «a la voz de», la revisión inglesa ya optó por una expresión más natural y fiel al sentido; en español, «las palabras» evita la construcción extraña sin perder la apelación a oír el mensaje de Yahvé.
- source_word: דִּבְרֵי
  english_pob_choice: the words
  chosen_spanish: las palabras
  alternatives_spanish:
  - el mensaje
  - los dichos
  lexicon: HALOT
  rationale: «Palabras» refleja con cercanía el sustantivo hebreo y coincide con la lectura auditada del texto inglés revisado.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino personal en ambas ocurrencias del verso.
theological_decisions:
- issue: Cómo traducir el Tetragrámaton יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: El texto hebreo contiene el nombre propio divino, no un título sustituto. La forma «Yahvé» mantiene esa distinción y sigue la convención del proyecto en español.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Matiz de obediencia en שְׁמַע
  english_pob_reading: listen
  chosen_spanish_reading: escucha
  alternative_spanish_readings:
  - oye
  - obedece
  rationale: En este contexto, «escucha» conserva la llamada a prestar atención al mensaje sin imponer de entrada un imperativo más interpretativo como «obedece», aunque esa implicación permanece en el hebreo.
  doctrine_reference: HALOT / uso contextual de שׁמע
- issue: Relación entre לְקוֹל y דִּבְרֵי en la cláusula final
  english_pob_reading: the words of Yahweh
  chosen_spanish_reading: las palabras de Yahvé
  alternative_spanish_readings:
  - la voz de las palabras de Yahvé
  - la voz de Yahvé
  rationale: La combinación hebrea es más literal que la redacción inglesa revisada, pero la revisión auditada ya reconoció que «the voice of the words» era torpe. En español, «las palabras de Yahvé» comunica fielmente el contenido del mandato y evita una calca ininteligible.
  doctrine_reference: Revisión auditada 2026-04-23T10:10:37Z
translation_notes:
  revision_awareness: La redacción toma en cuenta la revisión más reciente del audit trail inglés, que corrigió una formulación demasiado literal y pesada en la cláusula final. Por eso la versión española evita una calca como «la voz de las palabras» y adopta una solución natural que sigue el sentido confirmado por la revisión.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה.
  - Se mantiene «Saúl» y «Samuel» con ortografía española estándar.
  - «Escucha» conserva la fuerza exhortativa del hebreo sin añadir una explicación interpretativa en el cuerpo del texto.
  - La nota al pie [a] está anclada exactamente en «Saúl[a]» para cumplir la disciplina de marcadores.
