translation:
  language: es
  text: El que lanza una piedra contra los pájaros los ahuyenta[a], y el que reprende[b] a un amigo romperá la amistad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «los espanta». El verbo griego puede expresar ahuyentar o hacer huir.'
    reason: lexical_alternative
  - marker: b
    text: 'También: «reprocha» o «insulta». El verbo griego puede abarcar reproche o afrenta.'
    reason: lexical_alternative
lexical_decisions:
- source_word: βάλλων
  english_pob_choice: One who throws
  chosen_spanish: El que lanza
  alternatives_spanish:
  - El que tira
  - Quien arroja
  lexicon: BDAG
  rationale: El participio presente funciona de modo proverbial y genérico. «El que lanza» conserva el valor gnómico y suena natural en español sin añadir interpretación.
- source_word: λίθον
  english_pob_choice: a stone
  chosen_spanish: una piedra
  alternatives_spanish:
  - piedra
  lexicon: BDAG
  rationale: Es un objeto singular concreto; «una piedra» reproduce con claridad la referencia literal.
- source_word: ἐπὶ πετεινὰ
  english_pob_choice: at birds
  chosen_spanish: contra los pájaros
  alternatives_spanish:
  - a los pájaros
  - hacia los pájaros
  - contra las aves
  lexicon: BDAG
  rationale: En el proverbio, el movimiento es hostil. «Contra» expresa mejor la intención de agresión que «a» o «hacia», y «pájaros» es el sentido idiomático más natural de πετεινά.
- source_word: ἀποσοβεῖ
  english_pob_choice: drives them away
  chosen_spanish: los ahuyenta
  alternatives_spanish:
  - los espanta
  - los aleja
  - los hace huir
  lexicon: LSJ
  rationale: El verbo significa causar huida o apartar. «Ahuyenta» es breve, preciso y conserva la fuerza proverbial del comparativo.
- source_word: ὀνειδίζων
  english_pob_choice: one who reproaches
  chosen_spanish: el que reprende
  alternatives_spanish:
  - el que reprocha
  - el que insulta
  - el que vitupera
  lexicon: BDAG
  rationale: El griego puede abarcar reproche, insulto o afrenta. «Reprende» mantiene el sentido social y moral sin cargarlo de una dureza mayor que la documentada.
- source_word: φίλον
  english_pob_choice: a friend
  chosen_spanish: a un amigo
  alternatives_spanish:
  - a su amigo
  - a un compañero
  lexicon: BDAG
  rationale: El sustantivo es singular e indefinido en la forma proverbial. «A un amigo» evita especificar posesión no explícita en el griego.
- source_word: διαλύσει
  english_pob_choice: will break up
  chosen_spanish: romperá
  alternatives_spanish:
  - deshará
  - separará
  - disolverá
  lexicon: BDAG
  rationale: El verbo expresa deshacer o desintegrar una relación. «Romperá» es idiomático en español y comunica el resultado sin exceso de abstracción.
- source_word: φιλίαν
  english_pob_choice: friendship
  chosen_spanish: la amistad
  alternatives_spanish:
  - la relación de amistad
  - el vínculo de amistad
  lexicon: BDAG
  rationale: El sustantivo denota amistad o relación amistosa; «la amistad» es la equivalencia directa y más transparente.
translation_notes:
  revision_awareness: No se aplicaron revisiones en el pasaje; la traducción sigue de cerca el griego de Sirácides 22:20 y el audit trail inglés, manteniendo el paralelismo proverbial y las alternativas léxicas documentadas.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo exige; aquí no aparece.
  - Se mantiene «amistad» como traducción directa de φιλίαν.
  - Se evita «siervo» porque no corresponde a δοῦλος en este versículo.
  - El orden español busca preservar el paralelismo binario del proverbio sin calco incómodo.
