review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del hebreo: imperativo de recordar, referencia a la orden de Moisés, nombre divino Yahvé, participio de dar descanso y futuro de dar la tierra. Sin embargo, hay dos desajustes importantes con la evidencia y la auditoría POB: (1) עֶבֶד יְהוָה aquí está documentado en el POB inglés como título honorífico contextual, por lo que ''el esclavo de Yahvé'' no preserva bien la decisión lexical/theológica auditada; y (2) la nota [a] sobre el singular hebreo no responde a una ambigüedad que deba conservarse en español y distrae del sentido principal.'
  spanish_quality_summary: El español es claro y legible, pero 'el esclavo de Yahvé' suena innecesariamente duro y poco idiomático para este título fijo de Moisés en registro bíblico; 'siervo' o 'servidor' es más natural, y 'siervo' encaja mejor con la tradición eclesial sin caer en arcaísmo grave. El resto fluye bien. Puede mejorarse también la puntuación suprimiendo la coma explicativa tras 'Yahvé' para una lectura más limpia.
  glossary_alignment: 'Se mantiene correctamente ''Yahvé'' para יהוה. ''su Dios'', ''descanso'' y ''esta tierra'' están bien alineados. La principal excepción necesaria al valor por defecto de עבד es contextual y ya está documentada en el English POB: en el título honorífico ''עבד יהוה'' aplicado a Moisés, debe preferirse ''siervo de Yahvé'' sobre ''esclavo de Yahvé''.'
  issues:
  - severity: high
    issue: '''el esclavo de Yahvé'' para עֶבֶד יְהוָה'
    rationale: 'Aunque el proyecto suele preferir ''esclavo'' para δοῦλος/עבד cuando la fuerza lexical lo requiere, aquí la auditoría inglesa documenta explícitamente una excepción contextual: es un título honorífico de Moisés (''the servant of Yahweh''). En español, ''esclavo de Yahvé'' resulta torpe, poco idiomático y altera el matiz del título.'
  - severity: medium
    issue: Nota [a] sobre 'Recuerden/Recuerda' no es necesaria
    rationale: El hebreo tiene imperativo singular, pero en español el plural dirigido a las tribus es una adaptación natural de concordancia discursiva, no una alternativa de traducción que el lector necesite como nota. Además, la nota inglesa conservada era sobre וְנָתַן ('has given/will give'), no sobre el número del imperativo.
  - severity: low
    issue: Coma en 'Yahvé, su Dios'
    rationale: No es incorrecta, pero sin coma ('Yahvé su Dios') la frase suena más unida y natural en español bíblico contemporáneo dentro de la cita.
  revised_spanish_text: 'Recuerden la palabra que Moisés, el siervo de Yahvé, les mandó, diciendo: «Yahvé su Dios les está dando descanso y les dará esta tierra».

    '
  revision_rationale: Se cambia 'el esclavo de Yahvé' por 'el siervo de Yahvé' para seguir la decisión lexical/theológica auditada del POB en este título honorífico y para lograr un español bíblico natural y fiel. Se elimina la nota innecesaria sobre el singular del imperativo, ya que no preserva una alternativa relevante del sentido fuente en español. Se alisa la puntuación de la cita.
