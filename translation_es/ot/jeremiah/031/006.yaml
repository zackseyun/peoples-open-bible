translation:
  language: es
  text: 'Porque habrá un día en que los centinelas[a] llamarán en la región montañosa de Efraín: «¡Levántense, y subamos a Sion, a Yahvé nuestro Dios!»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo נֹצְרִים: también puede entenderse «guardianes» o «guardias».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: La partícula introduce la relación causal o explicativa con lo anterior. «Porque» conserva bien ese enlace en español bíblico natural sin volverlo explicativo en exceso.
- source_word: יֶשׁ יֹום
  english_pob_choice: there will be a day
  chosen_spanish: habrá un día
  alternatives_spanish:
  - existirá un día
  - llegará un día
  lexicon: HALOT
  rationale: La construcción existencial apunta a un tiempo futuro esperado. «Habrá un día» es idiomático y mantiene el valor profético.
- source_word: קָרְאוּ
  english_pob_choice: will call out
  chosen_spanish: clamarán
  alternatives_spanish:
  - llamarán
  - proclamarán
  lexicon: HALOT
  rationale: El verbo en contexto expresa una convocatoria pública y audible. «Clamarán» conserva fuerza de voz alzada; «llamarán» sería posible pero menos intenso.
- source_word: נֹצְרִים
  english_pob_choice: watchmen
  chosen_spanish: centinelas
  alternatives_spanish:
  - guardas
  - atalayas
  lexicon: HALOT
  rationale: El participio designa a quienes vigilan o guardan. «Centinelas» reproduce bien la imagen de vigilancia activa y suena natural en español; «atalayas» puede sugerir el puesto más que la persona.
- source_word: בְּהַר אֶפְרָיִם
  english_pob_choice: on the hill country of Ephraim
  chosen_spanish: sobre la región montañosa de Efraín
  alternatives_spanish:
  - en la región montañosa de Efraín
  - en la serranía de Efraín
  lexicon: HALOT
  rationale: Se sigue el matiz espacial del hebreo con una expresión natural en español. «Región montañosa» conserva el valor colectivo de הַר como zona serrana, no como un monte único.
- source_word: קוּמוּ
  english_pob_choice: Rise up
  chosen_spanish: ¡Levántense!
  alternatives_spanish:
  - ¡Levantaos!
  - ¡Alzaos!
  lexicon: HALOT
  rationale: El imperativo plural convoca a ponerse en movimiento. «¡Levántense!» es claro y digno en español actual; mantiene el tono exhortativo.
- source_word: וְנַעֲלֶה
  english_pob_choice: and let us go up
  chosen_spanish: y subamos
  alternatives_spanish:
  - y vayamos subiendo
  - y ascenderemos
  lexicon: HALOT
  rationale: El cohortativo incluye al hablante en la invitación. «Subamos» reproduce bien esa exhortación compartida y conserva la imagen de ascenso a Sion.
- source_word: צִיּוֹן
  english_pob_choice: Zion
  chosen_spanish: Sion
  alternatives_spanish:
  - Zion
  lexicon: HALOT
  rationale: En español bíblico, «Sion» es la forma más asentada y legible. Se conserva el nombre propio sin añadir explicación innecesaria en el texto principal.
- source_word: אֶל יְהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - a Yahveh
  - al SEÑOR
  lexicon: HALOT
  rationale: 'Se aplica el criterio del proyecto para YHWH: «Yahvé». La preposición de movimiento se rinde naturalmente con «a».'
- source_word: אֱלֹהֵינוּ
  english_pob_choice: our God
  chosen_spanish: nuestro Dios
  alternatives_spanish:
  - nuestro Dios
  lexicon: HALOT
  rationale: La posesión covenantal es directa y no requiere amplificación. «Nuestro Dios» conserva el sentido comunitario del hebreo.
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. Conforme al criterio del proyecto, se evita la sustitución por «SEÑOR» y se preserva el nombre del pacto como «Yahvé» en el texto principal.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sense of נֹצְרִים in context
  english_pob_reading: watchmen
  chosen_spanish_reading: centinelas
  alternative_spanish_readings:
  - guardas
  - vigías
  rationale: El contexto describe una convocatoria pública desde Efraín. «Centinelas» preserva la imagen concreta de vigilancia y el tono de anuncio sin introducir interpretación adicional.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1, #3, #5'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés POB, que ajustó «in the hill country of Ephraim» a «on the hill country of Ephraim» por mayor naturalidad. Por eso se eligió «sobre la región montañosa de Efraín», manteniendo el matiz espacial sin calcar el inglés.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» conforme al criterio del proyecto para יְהוָה.
  - Se usó «Sion» como forma española estable del topónimo.
  - Se prefirió «centinelas» por su valor semántico cercano a «watchmen» y por ser idiomático en español.
  - La puntuación reproduce el discurso directo con comillas españolas y exclamación inicial en la exhortación.
