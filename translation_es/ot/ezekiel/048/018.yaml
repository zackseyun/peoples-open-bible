review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: el resto del terreno, alineado con la porción santa, mide diez mil al este y diez mil al oeste, y su producción sirve de alimento para los trabajadores de la ciudad. Sin embargo, hay dos desajustes importantes con la evidencia y la auditoría inglesa: la nota [a] está anclada en «extensión», aunque explica יָמָּה/«hacia el mar» = occidente, por lo que debe anclarse en «occidente»; y «ofrenda santa» no preserva tan bien como «contribución santa» el valor técnico de תְּרוּמַת הַקֹּדֶשׁ en este contexto territorial de porción apartada.'
  spanish_quality_summary: El español es claro y digno, pero «a lo largo de la extensión» suena algo impreciso frente a la idea de longitud/medida longitudinal. «A lo largo de la longitud» o «a lo largo» sería más transparente, y «contribución santa» conserva mejor la terminología técnica del pasaje. El resto del verso lee con naturalidad suficiente.
  glossary_alignment: No hay conflicto con los términos teológicos mayores del proyecto. Sí conviene alinear mejor תְּרוּמַת הַקֹּדֶשׁ con «contribución santa» en vez de «ofrenda santa», porque aquí no se trata primariamente de una ofrenda cultual presentada sino de una porción reservada/consagrada del territorio. Las notas deben además respetar el anclaje exacto en el texto español.
  issues:
  - severity: high
    issue: La nota [a] está colocada en «extensión», pero la nota explica יָמָּה = «hacia el mar»/occidente.
    rationale: El marcador debe aparecer exactamente en la palabra o frase relevante. Tal como está, induce a pensar que la nota comenta בָּאֹרֶךְ en vez de יָמָּה.
  - severity: medium
    issue: «Ofrenda santa» debilita el valor técnico de תְּרוּמַת הַקֹּדֶשׁ en esta sección de distribución territorial.
    rationale: En Ezequiel 45–48 תרומה designa la porción apartada/consagrada del terreno. «Contribución santa» o «porción santa» preserva mejor el matiz auditado por el POB inglés.
  - severity: low
    issue: «A lo largo de la extensión» es menos preciso que la idea de longitud del terreno.
    rationale: בָּאֹרֶךְ apunta a la dimensión longitudinal. «A lo largo de la longitud» suena algo técnico, pero es más fiel; «en la longitud» sería más literal aunque menos idiomático.
  revised_spanish_text: Y el resto, a lo largo de la longitud, en correspondencia con la contribución santa, será de diez mil al oriente y de diez mil al occidente[a]; estará en correspondencia con la contribución santa, y su producto será para alimento[b] de los trabajadores de la ciudad.
  revised_footnotes:
