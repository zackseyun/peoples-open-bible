translation:
  language: es
  text: ¡Oh Yahvé[a], nuestro Señor, cuán majestuoso[b] es tu nombre en toda la tierra!—Tú has puesto tu esplendor[c] por encima de los cielos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo YHWH; tradicionalmente se vierte «el SEÑOR», pero aquí se translitera como «Yahvé» para preservar el nombre del pacto.
    reason: alternative_reading
  - marker: b
    text: O «cuán excelente».
    reason: lexical_alternative
  - marker: c
    text: O «tu gloria».
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre propio del pacto, no un reemplazo por título. En español bíblico contemporáneo, «Yahvé» es la forma estable y readable del Tetragrama en este proyecto.
- source_word: אֲדֹנֵינוּ
  english_pob_choice: our Lord
  chosen_spanish: nuestro Señor
  alternatives_spanish:
  - nuestro dueño
  - nuestro amo
  lexicon: HALOT
  rationale: El sufijo de primera persona plural expresa posesión relacional y oración directa a Dios; «nuestro Señor» es la forma natural y reverente en español, mientras que «amo/dueño» son posibles pero menos idiomáticas aquí.
- source_word: מָה אַדִּיר
  english_pob_choice: how majestic
  chosen_spanish: cuán majestuoso
  alternatives_spanish:
  - cuán excelente
  - cuán magnífico
  lexicon: HALOT
  rationale: La exclamación interrogativa expresa admiración poética. «Majestuoso» preserva mejor la fuerza reverente y el matiz de grandeza que «excelente», que puede sonar más evaluativo que doxológico.
- source_word: שִׁמְךָ
  english_pob_choice: your name
  chosen_spanish: tu nombre
  alternatives_spanish:
  - tu fama
  - tu reputación
  lexicon: HALOT
  rationale: 'Se mantiene el idiomismo hebreo sin paráfrasis: el «nombre» representa la persona, revelación y renombre de Dios.'
- source_word: בְּכָל הָאָרֶץ
  english_pob_choice: in all the earth
  chosen_spanish: en toda la tierra
  alternatives_spanish:
  - por toda la tierra
  - en toda la región
  lexicon: HALOT
  rationale: «Tierra» conserva el alcance cósmico del paralelismo con «los cielos»; «región» estrecharía indebidamente el sentido.
- source_word: תְּנָה
  english_pob_choice: you have set
  chosen_spanish: has puesto
  alternatives_spanish:
  - has establecido
  - has colocado
  lexicon: HALOT
  rationale: El verbo נתן admite la idea de poner/colocar/establecer. «Has puesto» es natural en español y respeta la afirmación poética de una acción ya efectuada.
- source_word: הוֹדְךָ
  english_pob_choice: your splendor
  chosen_spanish: tu esplendor
  alternatives_spanish:
  - tu gloria
  - tu majestad
  lexicon: HALOT
  rationale: הוד denota esplendor, majestad o gloria. «Esplendor» conserva la imagen visual y evita repetir «gloria», manteniendo la equivalencia poética con la línea anterior.
- source_word: עַל הַשָּׁמַיִם
  english_pob_choice: above the heavens
  chosen_spanish: sobre los cielos
  alternatives_spanish:
  - por encima de los cielos
  - sobre los cielos mismos
  lexicon: HALOT
  rationale: La preposición עַל puede expresar ubicación elevada; «sobre los cielos» mantiene la imagen de exaltación. En español suena más natural que un calco rígido, sin perder la relación espacial y poética.
theological_decisions:
- issue: Rendición del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahveh
  rationale: Se preserva el nombre propio del pacto en vez de ocultarlo tras un título. Esto sigue la política del proyecto y mantiene la referencia auditable al Tetragrama en el texto español.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Matiz de אַדִּיר en la doxología
  english_pob_reading: how majestic
  chosen_spanish_reading: cuán majestuoso
  alternative_spanish_readings:
  - cuán excelente
  - cuán poderoso
  rationale: No se neutraliza el tono de admiración. «Majestuoso» expresa mejor la resonancia de grandeza reverente que «excelente», sin forzar un valor doctrinal distinto.
  doctrine_reference: HALOT / POB lexical note on מָה אַדִּיר
- issue: Valor de הוֹד en la línea paralela
  english_pob_reading: your splendor
  chosen_spanish_reading: tu esplendor
  alternative_spanish_readings:
  - tu gloria
  - tu magnificencia
  rationale: Se mantiene la tensión poética entre «majestuoso» y «esplendor» sin reducir ambos miembros a la misma palabra. «Esplendor» comunica brillo, dignidad y exaltación.
  doctrine_reference: HALOT / POB lexical note on הוֹד
translation_notes:
  revision_awareness: El audit trail inglés quedó en acuerdo alto y sin cambios en la última pasada. La versión española sigue esa lectura estable, conservando el nombre divino, el paralelismo poético y las alternativas léxicas documentadas sin introducir paráfrasis adicionales.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה, conforme al estándar del proyecto.
  - Se usa «Señor» para אֲדֹנֵינוּ en sentido de título reverente dirigido a Dios.
  - Se conserva el paralelismo poético con dos miembros principales y una cláusula final de elevación.
  - Las notas alternativas se anclan solo donde el texto español tiene ambigüedad o la POB inglesa documenta opción léxica.
