    issue: La nota [b] está invertida respecto del texto principal y del audit trail inglés.
    rationale: El texto principal usa «tu tienda», pero la nota dice «O «tienda»», lo cual no aporta alternativa real. Según el English POB, la alternativa es «tabernacle», mientras que «tent/tienda» es la opción principal.
  revised_spanish_text: Salmo de David[a]. Yahvé[b], ¿quién podrá morar en tu tienda? ¿Quién podrá habitar en tu santo monte?
  revised_footnotes:
  - marker: a
    text: O «por David» o «para David»; el encabezado hebreo «de David» puede indicar autoría, asociación o dedicación.
    reason: alternative_reading
  - marker: b
    text: O «tabernáculo»; el hebreo dice literalmente «tienda», con posible resonancia del santuario como lugar de la presencia de Dios.
    reason: lexical_alternative
  revision_rationale: 'Se mantiene el texto principal, que es fiel y natural, y solo se corrige la nota [b] para alinearla con la evidencia hebrea y con el audit trail inglés: «tienda» debe quedar como lectura principal y «tabernáculo» como alternativa.'
