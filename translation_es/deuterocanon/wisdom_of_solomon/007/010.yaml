translation:
  language: es
  text: La amé más que la salud y la belleza[a], y preferí tenerla más que la luz, porque el resplandor que procede de ella nunca duerme.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el brillo que procede de ella es insomne». El griego describe la luz que emana de ella como incesante.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑπὲρ
  english_pob_choice: more than
  chosen_spanish: más que
  alternatives_spanish:
  - por encima de
  - más allá de
  lexicon: BDAG
  rationale: El comparativo griego expresa preferencia o valoración superior; «más que» conserva esa comparación de manera natural en español.
- source_word: ὑγίειαν
  english_pob_choice: health
  chosen_spanish: salud
  alternatives_spanish:
  - bienestar
  - integridad
  lexicon: LSJ
  rationale: El sustantivo denota salud corporal o estado sano; «salud» es la equivalencia más directa y comprensible.
- source_word: εὐμορφίαν
  english_pob_choice: beauty
  chosen_spanish: belleza
  alternatives_spanish:
  - buena figura
  - hermosura
  - buen porte
  lexicon: LSJ
  rationale: El término apunta a una forma o atractivo físico agradable; «belleza» mantiene la elevación poética sin volverse áspero.
- source_word: ἠγάπησα
  english_pob_choice: I loved
  chosen_spanish: lo amé
  alternatives_spanish:
  - la amé
  - lo quise
  - la aprecié
  lexicon: BDAG
  rationale: El verbo expresa amor/valoración intensa; en español «amé» preserva la fuerza afectiva. Se usa «lo» por la sabiduría como antecedente conceptual implícito en español, aunque la personificación femenina se conserva en el siguiente pronombre.
- source_word: αὐτήν
  english_pob_choice: her
  chosen_spanish: la
  alternatives_spanish:
  - ella
  - la sabiduría
  lexicon: Greek grammar
  rationale: La gramática griega personifica a la sabiduría con femenino; en español se conserva con el pronombre femenino «la» para mantener la personificación sin recargar el verso.
- source_word: προειλόμην
  english_pob_choice: I chose
  chosen_spanish: preferí
  alternatives_spanish:
  - elegí
  - escogí
  - preferí de antemano
  lexicon: LSJ
  rationale: El verbo medio comunica una preferencia deliberada. «Preferí» expresa mejor la comparación explícita con la luz que un simple «elegí».
- source_word: ἀντὶ φωτὸς ἔχειν
  english_pob_choice: to have her rather than light
  chosen_spanish: tenerla más bien que la luz
  alternatives_spanish:
  - tenerla en vez de la luz
  - poseerla antes que la luz
  lexicon: LSJ
  rationale: «Más bien que» reproduce con naturalidad la oposición de ἀντί y mantiene el contraste poético con «la luz» sin sonar mecánico.
- source_word: ἀκοίμητον
  english_pob_choice: never sleeps
  chosen_spanish: nunca duerme
  alternatives_spanish:
  - es insomne
  - no se extingue
  - no duerme jamás
  lexicon: LSJ
  rationale: Literalmente «sleepless» o «sin dormir»; aplicado al resplandor, «nunca duerme» conserva la imagen viva del griego y del inglés POB.
- source_word: τὸ ἐκ ταύτης φέγγος
  english_pob_choice: the radiance that comes from her
  chosen_spanish: el resplandor que procede de ella
  alternatives_spanish:
  - la claridad que sale de ella
  - la luz que brota de ella
  lexicon: LSJ
  rationale: φέγγος designa brillo o resplandor; «resplandor» evita repetir «luz» y «que procede de ella» traduce de forma natural ἐκ ταύτης sin perder la procedencia.
theological_decisions:
- issue: Personificación femenina de la sabiduría
  english_pob_reading: Retain feminine pronouns ('her') for wisdom
  chosen_spanish_reading: Conservar el femenino en el referente implícito y en «la»/«de ella»
  alternative_spanish_readings:
  - neutralizar con «eso»
  - usar «la sabiduría» explícitamente en cada referencia
  rationale: El griego personifica a la sabiduría de manera consistente. En español conviene mantener esa personificación sin forzar una neutralización que borraría el recurso literario.
  doctrine_reference: 'DOCTRINE.md: Preserve source meaning; readable modern Spanish; document significant lexical decisions.'
translation_notes:
  revision_awareness: El texto español sigue la revisión más reciente del POB inglés, que afinó la comparación final a «rather than light» sin alterar el sentido. La elección española «más bien que la luz» conserva esa misma preferencia comparativa con registro natural y formal.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico moderno y digno, sin arcaísmos innecesarios.
  - «Resplandor» se eligió para evitar la repetición inmediata de «luz», coherente con la decisión inglesa de usar «radiance».
  - La nota conserva la alternativa lexical relevante porque el griego admite tanto la idea de brillo como la de insomnio aplicado al resplandor.
