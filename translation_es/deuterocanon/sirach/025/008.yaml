translation:
  language: es
  text: Dichoso el hombre que no ha tropezado con su lengua[a], y no ha servido a alguien más despreciable que él mismo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego dice, en cambio: «un hombre que se alegra en sus hijos, vive y ve la caída de sus enemigos». El testimonio hebreo aquí difiere sustancialmente del griego.'
    reason: alternative_reading
lexical_decisions:
- source_word: אַשְׁרֵי
  english_pob_choice: Happy is
  chosen_spanish: Dichoso
  alternatives_spanish:
  - Bienaventurado
  - Feliz
  lexicon: HALOT
  rationale: La fórmula hebrea expresa una condición envidiable o afortunada; «dichoso» suena natural en español bíblico actual sin cargarla innecesariamente con un matiz eclesiástico más fuerte que el contexto de sabiduría requiere.
- source_word: נִכְשַׁל
  english_pob_choice: has not stumbled
  chosen_spanish: no ha tropezado
  alternatives_spanish:
  - no ha pecado
  - no ha fallado
  lexicon: HALOT
  rationale: «Tropezar» conserva la metáfora física del hebreo y funciona bien con la referencia concreta a la lengua. «Pecado» o «fallado» interpretan más de lo que el verbo exige.
- source_word: בִּלְשׁוֹנוֹ
  english_pob_choice: with his tongue
  chosen_spanish: con su lengua
  alternatives_spanish:
  - en su hablar
  - con su palabra
  lexicon: HALOT
  rationale: La expresión mantiene el paralelismo corporal y moral del hebreo. «Con su lengua» es más literal y conserva la imagen de la parte del cuerpo como sede del tropiezo verbal.
- source_word: עֹבֵד
  english_pob_choice: has not served
  chosen_spanish: ha servido
  alternatives_spanish:
  - ha sido esclavo de
  - ha trabajado para
  lexicon: HALOT
  rationale: «Servir» reproduce la idea general de subordinación sin forzar el texto hacia una esclavitud literal que el contexto no exige explícitamente. En español, la construcción permite conservar la tensión social del dicho.
- source_word: נִקְלֶה
  english_pob_choice: more contemptible
  chosen_spanish: más despreciable
  alternatives_spanish:
  - más vil
  - más bajo
  lexicon: HALOT
  rationale: «Despreciable» comunica el valor social negativo del término y encaja con el registro sapiencial de honor y deshonra. Se evita «vileza» por sonar más abstracto y menos idiomático en español.
- source_word: מִמֶּנּוּ
  english_pob_choice: than himself
  chosen_spanish: que él mismo
  alternatives_spanish:
  - que él
  - que sí mismo
  lexicon: HALOT
  rationale: Después de «más despreciable», el comparativo en español se expresa naturalmente con «que él mismo». Conserva la comparación reflexiva del hebreo sin sonar torpe.
theological_decisions:
- issue: Prioridad del hebreo frente al paralelo griego en Sirácides 25:8
  english_pob_reading: The main text follows the extant Hebrew witness; the Greek is preserved as an alternative reading in the footnote because it diverges substantially.
  chosen_spanish_reading: El texto principal sigue el testimonio hebreo conservado; la lectura griega se preserva en la nota como variante alternativa porque difiere materialmente.
  alternative_spanish_readings:
  - Traducir directamente la lectura griega en el texto principal
  - Fusionar ambas lecturas en una sola paráfrasis
  rationale: La política de la obra da prioridad al hebreo cuando se conserva con suficiente claridad, pero exige hacer visible la divergencia con el griego. Por eso el cuerpo principal sigue el hebreo y la nota documenta la otra tradición sin borrarla.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives; preserve source uncertainty honestly'
translation_notes:
  revision_awareness: No se registran revisiones aplicadas; la última pasada editorial indicó que no hacía falta cambiar nada. La versión española mantiene esa decisión y conserva la divergencia hebreo-griego de manera explícita.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se conserva el tono sapiencial con «Dichoso» en lugar de una paráfrasis más libre.
  - Se evita introducir «esclavo» porque el hebreo aquí permite una subordinación social más general y el inglés auditado también eligió «served».
  - 'La nota al pie sigue la función documental del auditor: no armoniza las dos tradiciones, sino que expone la lectura griega como variante significativa.'
