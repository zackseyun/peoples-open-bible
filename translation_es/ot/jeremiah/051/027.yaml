revisions:
- from: Levanten una bandera en la tierra[a]; toquen el shofar entre las naciones. Consagren naciones contra ella; den aviso contra ella de los reinos de Ararat, Minni y Ashkenaz. Designen un mariscal contra ella[b][c]; traigan caballos como langostas erizadas[d].
  to: Levanten una bandera en el país[a]; toquen la trompeta entre las naciones. Consagren naciones contra ella[b]; convoquen contra ella a los reinos de Ararat, Minni y Ashkenaz. Designen un mariscal[c] contra ella; hagan avanzar caballos como langostas erizadas[d].
  rationale: 'Se ajusta el texto para reflejar mejor el hebreo y la auditoría inglesa: «en el país» capta mejor el contexto regional de בָּאָרֶץ; «trompeta» sigue la elección POB para שׁוֹפָר y mejora la legibilidad; «convoquen contra ella a los reinos...» corrige la principal desviación semántica y da un español natural; se reanclan las notas a las frases correctas. «Hagan avanzar caballos» expresa mejor la orden militar que «traigan caballos», sin perder naturalidad.'
  reviewer_model: gpt-5.4
