translation:
  language: es
  text: el que cubre los cielos con nubes, el que prepara lluvia para la tierra, el que hace brotar hierba en los montes[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “quien hace crecer hierba en los montes.”
    reason: lexical_alternative
lexical_decisions:
- source_word: מְכַסֶּה
  english_pob_choice: covers
  chosen_spanish: cubre
  alternatives_spanish:
  - vela
  - cubre con un manto
  lexicon: HALOT
  rationale: El participio expresa la acción de cubrir o tapar; "cubre" es la equivalencia más directa y natural en español, y conserva el carácter poético sin añadir imágenes no presentes en el hebreo.
- source_word: שָׁמַיִם
  english_pob_choice: the heavens
  chosen_spanish: los cielos
  alternatives_spanish:
  - los cielos
  - el cielo
  lexicon: HALOT
  rationale: El plural hebreo שָׁמַיִם puede referirse a los cielos/heavens. En español, "los cielos" mantiene mejor el registro elevado y la amplitud poética que "el cielo".
- source_word: עָבִים
  english_pob_choice: clouds
  chosen_spanish: nubes
  alternatives_spanish:
  - nubes densas
  - nubarrones
  lexicon: HALOT
  rationale: El término denota nubes, con posible matiz de espesor. "Nubes" comunica el sentido básico con claridad; el contexto no obliga a explicitar "densas".
- source_word: מֵּכִין
  english_pob_choice: prepares
  chosen_spanish: prepara
  alternatives_spanish:
  - dispone
  - alista
  - prepara para
  lexicon: HALOT
  rationale: El hifil de כון puede significar preparar, disponer o establecer. "Prepara" conserva la noción de provisión intencional y encaja de forma natural con "lluvia para la tierra".
- source_word: לָאָרֶץ
  english_pob_choice: for the earth
  chosen_spanish: para la tierra
  alternatives_spanish:
  - para la tierra
  - para el mundo
  lexicon: HALOT
  rationale: En este contexto de meteorología cósmica, "tierra" reproduce bien el alcance de אֶרֶץ. "El mundo" sería más interpretativo.
- source_word: מָטָר
  english_pob_choice: rain
  chosen_spanish: lluvia
  alternatives_spanish:
  - lluvia
  - aguacero
  lexicon: HALOT
  rationale: El sustantivo significa lluvia. "Lluvia" es la forma más simple y fiel en español; evita sobrecargar el verso con un matiz inexistente.
- source_word: מַּצְמִיחַ
  english_pob_choice: makes sprout
  chosen_spanish: hace brotar
  alternatives_spanish:
  - hace crecer
  - hace germinar
  - hace brotar hierba
  lexicon: HALOT
  rationale: 'El hifil de צמח es causativo: hacer brotar o crecer. "Hace brotar" preserva ese valor causativo y es idiomático en español poético. Se eligió además mantener el paralelismo con la imagen vegetal del verso.'
- source_word: הָרִים
  english_pob_choice: the mountains
  chosen_spanish: los montes
  alternatives_spanish:
  - los montes
  - las montañas
  lexicon: HALOT
  rationale: Aunque el sustantivo suele significar montes/montañas, "montes" suena más bíblico y poético en español, sin perder el referente geográfico.
- source_word: חָצִיר
  english_pob_choice: grass
  chosen_spanish: hierba
  alternatives_spanish:
  - hierba
  - pasto
  - césped
  lexicon: HALOT
  rationale: El sustantivo puede referirse a hierba o vegetación herbácea. "Hierba" mantiene la amplitud semántica y funciona bien en español poético; también deja abierta la alternativa de crecimiento vegetal sin reducirla a césped doméstico.
theological_decisions:
- issue: Secuencia de participios como acción continua/divina característica
  english_pob_reading: who covers ... who prepares ... who makes ...
  chosen_spanish_reading: el que cubre ... el que prepara ... el que hace ...
  alternative_spanish_readings:
  - el que cubre ... el que prepara ... el que hace brotar ...
  - que cubre ... que prepara ... que hace ...
  rationale: El hebreo presenta una cadena de participios que describe la acción habitual de Dios. En español, repetir "el que" conserva la relación poética y el sentido de acción característica sin convertir el versículo en una paráfrasis explicativa.
  doctrine_reference: Poética bíblica; traducción por equivalencia óptima manteniendo la agencia providencial de Dios.
translation_notes:
  revision_awareness: La revisión auditada muestra acuerdo alto y ningún cambio requerido en el texto base; por eso se mantiene la estructura participial y el paralelismo original sin modificaciones interpretativas.
  spanish_consistency_notes:
  - Se usa "los cielos" para שָׁמַיִם conforme al registro poético elevado.
  - Se mantiene "hierba" en lugar de "pasto" para no estrechar el alcance de חָצִיר.
  - La estructura con repetición de "el que" refleja el hebreo participial y preserva el tono litúrgico.
  - La nota [a] se ancla solo en "hierba" porque en español surge una alternativa léxica real sin alterar el sentido básico.
