  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido del hebreo y sigue de cerca la POB inglesa: הָיוּ como estado resultante («se han vuelto»), שָׂרֵי יְהוּדָה como «príncipes de Judá», la imagen concreta de כְּמַסִּיגֵי גְּבוּל, y el juicio divino «derramaré mi ira como agua». No hay problemas doctrinales ni de alineación mayor con el texto fuente.'
  spanish_quality_summary: 'El texto principal es claro y digno. Sin embargo, la nota al pie necesita reparación estilística y tipográfica en español: no debe empezar con comilla antes de «O:», y «quitan un lindero» no refleja tan bien como el inglés la idea de mover/desplazar. También conviene usar una formulación más natural que conserve la ambigüedad entre hito físico y línea divisoria.'
  glossary_alignment: No hay términos del glosario base en disputa aquí como Yahvé/Mesías/esclavo. «Príncipes», «ira» y «mojón» están alineados con las decisiones léxicas documentadas. «Mojón» es aceptable y preciso para el objeto concreto implicado en גְּבוּל en este contexto.
  issues:
  - severity: medium
    issue: La nota al pie tiene puntuación y formulación poco naturales en español.
    rationale: 'La redacción actual empieza con "''O: ..." y mezcla comillas de forma impropia. Además, «quitan un lindero» desplaza ligeramente la imagen de mover/desplazar un marcador o línea de límite preservada en la POB inglesa.'
  - severity: low
    issue: La alternativa de la nota puede expresar mejor la ambigüedad del hebreo.
    rationale: El inglés preserva tanto «boundary marker» como la alternativa «boundary line». En español conviene una nota como «desplazan un lindero» o «mueven una línea divisoria», que mantenga mejor el campo semántico sin sonar forzada.
  revised_spanish_text: Los príncipes de Judá se han vuelto como los que mueven un mojón[a]; sobre ellos derramaré mi ira como agua.
  revised_footnotes:
  - marker: a
    text: O «como los que desplazan un lindero». La imagen puede referirse literalmente a mover marcas de propiedad o figuradamente a violar límites fijados por Dios.
    reason: lexical_alternative
  revision_rationale: El texto principal puede mantenerse. Solo se corrige la nota al pie para que su español sea idiomático, tipográficamente limpio y más fiel a la alternativa léxica documentada en la auditoría inglesa.
