translation:
  language: es
  text: Y por medio de tramas, agitando a la multitud y formando facciones, impidieron que la construcción se completara durante todo el tiempo de la vida del rey Ciro[a]; y la construcción fue detenida durante dos años[b], hasta el reinado de Darío.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «durante toda la vida del rey Ciro». El griego dice literalmente «todo el tiempo de la vida del rey Ciro».'
    reason: lexical_alternative
  - marker: b
    text: 'La cláusula final también puede entenderse de forma más impersonal: «la construcción quedó detenida durante dos años, hasta el reinado de Darío».'
    reason: alternative_reading
lexical_decisions:
- source_word: βουλὰς
  english_pob_choice: plots
  chosen_spanish: planes
  alternatives_spanish:
  - tramas
  - maquinaciones
  - complots
  lexicon: LSJ
  rationale: El griego plural puede referirse a diseños u ორგანიზaciones hostiles; en español, «planes» conserva la idea de intención deliberada sin volver el texto demasiado enfático. «Tramas» o «complots» son posibles, pero suenan más interpretativos o más cargados que el contexto exige.
- source_word: δημαγωγοῦντες
  english_pob_choice: stirring up the crowds
  chosen_spanish: agitando a la multitud
  alternatives_spanish:
  - incitando al pueblo
  - movilizando a la gente
  - azuzando a la multitud
  lexicon: LSJ
  rationale: El participio describe una acción de agitación pública. «Agitando a la multitud» reproduce bien el sentido negativo sin depender de un tecnicismo como «demagogando». «Incitando» también es válido, pero aquí la imagen de agitación colectiva sigue de cerca la fuerza del término.
- source_word: συστάσεις ποιούμενοι
  english_pob_choice: forming factions
  chosen_spanish: formando facciones
  alternatives_spanish:
  - organizando bandos
  - haciendo alianzas
  - constituyendo grupos
  lexicon: LSJ
  rationale: La frase sugiere alineamientos organizados contra la obra. «Formando facciones» es la equivalencia más directa y natural en español para esa oposición coordinada.
- source_word: ἀπεκώλυσαν
  english_pob_choice: they hindered
  chosen_spanish: les impidieron
  alternatives_spanish:
  - los obstaculizaron
  - los estorbaron
  - les bloquearon
  lexicon: LSJ
  rationale: El verbo expresa impedimento activo. En español, «les impidieron» comunica bien la acción y su efecto sin exagerar hasta el punto de «bloquearon».
- source_word: τοῦ ἀποτελεσθῆναι
  english_pob_choice: from being completed
  chosen_spanish: que la construcción se completara
  alternatives_spanish:
  - que la construcción llegara a completarse
  - que la obra se terminara
  - que se acabara la construcción
  lexicon: LSJ
  rationale: El infinitivo pasivo apunta al resultado final de la obra. «Que la construcción se completara» mantiene el sentido resultativo y suena natural en español.
- source_word: οἰκοδομὴν
  english_pob_choice: the building
  chosen_spanish: la construcción
  alternatives_spanish:
  - la obra
  - el edificio
  - la edificación
  lexicon: LSJ
  rationale: En este contexto la palabra se refiere al proyecto de reconstrucción del templo. «La construcción» preserva el proceso/obra en curso mejor que «el edificio».
- source_word: πάντα τὸν χρόνον τῆς ζωῆς τοῦ βασιλέως Κύρου
  english_pob_choice: all the time of the life of King Cyrus
  chosen_spanish: durante todo el tiempo de la vida del rey Ciro
  alternatives_spanish:
  - durante toda la vida del rey Ciro
  - a lo largo de la vida del rey Ciro
  - durante todo el tiempo que vivió el rey Ciro
  lexicon: LSJ
  rationale: La frase griega es algo rígida; el español conserva la literalidad suficiente sin sonar enteramente extraño. «Durante todo el tiempo de la vida» refleja de cerca la construcción griega y preserva la amplitud temporal.
- source_word: εἰρχθησαν τῆς οἰκοδομῆς
  english_pob_choice: the building was halted for two years
  chosen_spanish: la construcción fue detenida
  alternatives_spanish:
  - la construcción quedó detenida
  - se suspendió la construcción
  - la obra fue paralizada
  lexicon: LSJ
  rationale: El pasivo señala que la obra quedó bajo restricción. «Fue detenida» reproduce bien el efecto sin introducir un agente explícito que el griego no nombra en esta cláusula.
- source_word: ἔτη δύο
  english_pob_choice: for two years
  chosen_spanish: durante dos años
  alternatives_spanish:
  - por dos años
  - dos años
  - a lo largo de dos años
  lexicon: LSJ
  rationale: En español, la duración con un pasivo suele expresarse mejor con «durante». Mantiene la temporalidad exacta del griego y la lectura narrativa fluida.
- source_word: ἕως τῆς Δαρείου βασιλείας
  english_pob_choice: until the reign of Darius
  chosen_spanish: hasta el reinado de Darío
  alternatives_spanish:
  - hasta el reinado de Dario
  - hasta que reinó Darío
  - hasta la realeza de Darío
  lexicon: LSJ
  rationale: «Reinado» es el equivalente natural de βασιλεία en este contexto histórico. «Darío» conserva la forma española estándar del nombre propio.
theological_decisions:
- issue: Relación entre la oposición y el cese de la obra
  english_pob_reading: Opponents hindered the building from being completed, and the building was halted for two years until Darius.
  chosen_spanish_reading: La oposición mediante planes, agitación y facciones impidió la culminación de la obra, y luego la construcción fue detenida durante dos años hasta el reinado de Darío.
  alternative_spanish_readings:
  - Los opositores detuvieron directamente la obra durante dos años.
  - La obra quedó impedida por dos años hasta el reinado de Darío.
  rationale: El griego presenta una secuencia de acciones hostiles y luego una cláusula pasiva que describe el estado de la obra. La redacción española mantiene esa relación sin convertir la pasiva en una acción distinta ni resolver innecesariamente la agencia implícita.
  doctrine_reference: Preservar la tensión narrativa y la voz pasiva del texto fuente; no doctrinal, pero sí hermenéuticamente relevante.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del POB en inglés, que ajustó la cláusula final para reflejar mejor el pasivo griego («the building was halted»). La versión española adopta una solución equivalente con voz pasiva («la construcción fue detenida») para evitar introducir un sujeto agente no explicitado y conservar la estructura narrativa del original.
  spanish_consistency_notes:
  - Se mantuvo «Darío» como forma española usual del nombre propio.
  - Se eligió «construcción» para οἰκοδομήν por coherencia con el proyecto edilicio en curso.
  - Se evitó «SEÑOR» u otras sustituciones no pertinentes, ya que el versículo no contiene el tetragrámaton ni κύριος con referencia divina.
  - Se conservó la durativa «durante todo el tiempo de la vida de…» para reflejar la literalidad reconocida por el audit trail, aunque suene algo marcada en español.
