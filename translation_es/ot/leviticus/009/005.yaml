translation:
  language: es
  text: Entonces llevaron lo que Moisés había mandado al frente[a] de la tienda de reunión, y toda la congregación se acercaron y estuvieron de pie delante de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Al frente de» traduce aquí el sentido espacial de אֶל פְּנֵי, es decir, hacia el frente de la tienda; no es todavía la fórmula cultual «delante de Yahvé», que aparece después en el mismo versículo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְחוּ
  english_pob_choice: they brought
  chosen_spanish: llevaron
  alternatives_spanish:
  - trajeron
  - tomaron
  lexicon: HALOT
  rationale: En este contexto el verbo no solo expresa 'tomar', sino mover algo hacia un lugar señalado. 'Llevaron' conserva el sentido direccional de la escena de manera natural en español, como el inglés POB 'they brought'.
- source_word: אֵת אֲשֶׁר צִוָּה מֹשֶׁה
  english_pob_choice: what Moses had commanded
  chosen_spanish: lo que Moisés había mandado
  alternatives_spanish:
  - lo que Moisés había ordenado
  - aquello que Moisés había mandado
  lexicon: HALOT
  rationale: La construcción apunta a los elementos o instrucciones previamente prescritos. 'Lo que Moisés había mandado' es natural en español y conserva el valor referencial sin volverlo demasiado abstracto.
- source_word: אֶל פְּנֵי
  english_pob_choice: to the front of
  chosen_spanish: a la parte delantera
  alternatives_spanish:
  - al frente de
  - ante
  lexicon: HALOT
  rationale: 'Aquí la expresión es espacial, no cultual: indica ubicación delante de la tienda. ''A la parte delantera'' refleja ese valor de frente/fachada y evita confundirlo con el uso teológico de ''delante de'' que aparece después con Yahvé.'
- source_word: אֹהֶל מוֹעֵד
  english_pob_choice: tent of meeting
  chosen_spanish: tienda de reunión
  alternatives_spanish:
  - tienda del encuentro
  - tabernáculo
  lexicon: HALOT
  rationale: '''Tienda de reunión'' es una equivalencia transparente y fiel al hebreo. ''Tabernáculo'' sería más tradicional, pero menos literal y más cargado eclesiásticamente.'
- source_word: וַיִּקְרְבוּ
  english_pob_choice: came near
  chosen_spanish: se acercó
  alternatives_spanish:
  - se aproximó
  - vino cerca
  lexicon: HALOT
  rationale: El verbo denota aproximación. 'Se acercó' es claro y natural en español, y mantiene el movimiento hacia el lugar sagrado.
- source_word: כָּל הָעֵדָה
  english_pob_choice: all the congregation
  chosen_spanish: toda la congregación
  alternatives_spanish:
  - toda la asamblea
  - todo el pueblo reunido
  lexicon: HALOT
  rationale: En contextos sacerdotales 'עֵדָה' suele referirse a la comunidad reunida de Israel. 'Congregación' conserva ese matiz colectivo y litúrgico.
- source_word: וַיַּעַמְדוּ
  english_pob_choice: stood
  chosen_spanish: se puso de pie
  alternatives_spanish:
  - estuvo de pie
  - permaneció de pie
  lexicon: HALOT
  rationale: El verbo פשוטamente significa 'estar de pie'. En español, 'se puso de pie' comunica con naturalidad la acción de colocarse en posición de espera o reverencia.
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - en presencia de Yahvé
  - ante Yahvé
  lexicon: HALOT
  rationale: El Tetragrámaton se traduce según el estándar del proyecto como 'Yahvé'. 'Delante de' mantiene el valor espacial y reverencial del hebreo, y evita la convención de ocultar el nombre divino.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  - Yahweh
  rationale: El texto hebreo usa directamente el Nombre divino. Siguiendo la terminología del proyecto, se conserva como 'Yahvé' en el texto español para no enmascarar el Tetragrámaton con un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Distinción entre localización espacial y presencia cultual
  english_pob_reading: to the front of / before Yahweh
  chosen_spanish_reading: a la parte delantera / delante de Yahvé
  alternative_spanish_readings:
  - ante la presencia de Yahvé
  - al frente de / ante Yahvé
  rationale: El hebreo distingue entre la ubicación 'hacia el frente de' la tienda y el estar 'delante de' Yahvé. Mantener esa diferencia en español evita borrar la tensión entre un punto espacial concreto y la dimensión reverencial del encuentro con Dios.
  doctrine_reference: 'DOCTRINE.md: source-sensitive spatial/theological distinctions'
translation_notes:
  revision_awareness: La revisión inglesa más reciente no introdujo cambios y el chequeo cruzado reportó alta concordancia; por eso no se requieren ajustes textuales adicionales en español más allá de la adaptación idiomática y la conservación de las distinciones léxicas relevantes.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para el Nombre divino, conforme al estándar del proyecto.
  - Se distingue 'tienda de reunión' de la expresión final 'delante de Yahvé' para no fusionar dos relaciones distintas del texto hebreo.
  - '''Congregación'' conserva el tono comunitario-cultual de עֵדָה.'
  - No se usa 'Señor' como sustituto del Nombre divino en el texto principal.
