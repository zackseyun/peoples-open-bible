review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la secuencia narrativa y las decisiones principales del hebreo: «se levantó», «fue a David», «en Dios», y conserva la imagen de «la mano». También respeta correctamente אֱלֹהִים como «Dios», no «Yahvé». Sin embargo, el tratamiento de חֹרְשָׁה es problemático: la evidencia y el rastro POB lo toman como topónimo «Horesh», mientras que «Horeja» no está justificado por la documentación y la nota además invierte literal/alternativa.'
  spanish_quality_summary: 'El español es generalmente claro y digno, pero hay dos puntos que conviene reparar: 1) «Horeja» suena inseguro e innecesariamente castellanizado frente al topónimo documentado «Horesh»; 2) la nota al pie actual es confusa, porque presenta «Horeja» como alternativa y «Horesh» como literal, cuando el texto principal debería llevar el topónimo respaldado por el expediente. El resto del verso es legible; «le fortaleció la mano en Dios» es algo marcado, pero aceptable por fidelidad, especialmente con una nota aclaratoria.'
  glossary_alignment: 'Alineación buena en términos clave: אֱלֹהִים -> «Dios» correctamente; no hay uso indebido de «Yahvé». Se preserva la metáfora hebrea de «mano», en línea con la filosofía POB. La única desalineación relevante es el topónimo חֹרְשָׁה, que debe mantenerse como «Horesh» según el expediente inglés y la morfología como nombre propio.'
  issues:
  - severity: medium
    issue: Topónimo חֹרְשָׁה vertido como «Horeja»
    rationale: La evidencia canónica y la decisión léxica inglesa respaldan «Horesh» como nombre propio. «Horeja» no está documentado en el expediente y debilita la fidelidad terminológica.
  - severity: medium
    issue: Nota al pie del topónimo está invertida y poco clara
    rationale: 'Dice «O “Horeja” como topónimo; literalmente, “Horesh”», pero el texto principal ya usa «Horeja». Si se conserva una nota, debe reflejar la alternativa documentada del POB: traducirlo como lugar boscoso/bosque, no presentar «Horesh» como si fuera solo una literalidad secundaria.'
  - severity: low
    issue: La construcción «le fortaleció la mano» es marcada en español
    rationale: No es incorrecta, porque preserva la imagen hebrea, pero conviene apoyarla con una nota aclaratoria como en el POB inglés para evitar opacidad innecesaria.
  revised_spanish_text: Entonces Jonatán, hijo de Saúl, se levantó y fue a David en Horesh[a], y le fortaleció la mano en Dios[b].
