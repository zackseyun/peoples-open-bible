review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura griega: ἔλεός como «misericordia», ἐπὶ πᾶσαν τὴν γῆν como alcance universal, vocativo a Dios, y χρηστότητι como cualidad benevolente. Sin embargo, «está sobre toda la tierra» suena menos natural en español para expresar extensión general, y «en bondad» es rígido frente al sentido relacional de χρηστότητι.'
  spanish_quality_summary: El español es comprensible, pero «está sobre toda la tierra» y especialmente «en bondad» suenan calcados. Una formulación más natural y digna en español eclesial amplio es «Tu misericordia está sobre toda la tierra, oh Yahvé, con bondad».
  glossary_alignment: «Yahvé» concuerda con la política del proyecto para el nombre divino. «Misericordia» concuerda bien con ἔλεος. Para χρηστότητι, «bondad» es aceptable léxicamente, pero la preposición debe ajustarse para sonar natural en español; «con bondad» preserva el valor instrumental/modal sin forzar un calco.
  issues:
  - severity: medium
    issue: La frase final «en bondad» suena poco natural en español.
    rationale: Aunque ἐν χρηστότητι puede traducirse literalmente con «en», en español esta combinación resulta rígida. «Con bondad» transmite mejor el matiz modal/relacional de χρηστότης sin alejarse del sentido fuente.
  - severity: low
    issue: «Está sobre toda la tierra» es correcto pero algo pesado.
    rationale: No es incorrecto, pero en una cláusula nominal poética el español tolera bien esta forma. No requiere cambio obligatorio por fidelidad, pero la revisión propuesta mantiene la estructura y mejora ligeramente la fluidez general al reparar sobre todo el cierre.
  revised_spanish_text: Tu misericordia está sobre toda la tierra, oh Yahvé, con bondad.
  revision_rationale: Se conserva la fidelidad léxica principal del borrador, pero se cambia «en bondad» por «con bondad» para un español más natural y digno que siga reflejando el sentido de χρηστότητι como cualidad benevolente con la que se manifiesta la misericordia.
