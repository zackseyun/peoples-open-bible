translation:
  language: es
  text: Solo se les aparecía un fuego[a] encendido por sí mismo, lleno de miedo; y, atemorizados por esa aparición invisible[b], consideraban peores las cosas que veían.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un fuego espontáneo» o «un fuego encendido por sí mismo».
    reason: lexical_alternative
  - marker: b
    text: Griego literalmente, «esa aparición no vista»; es una expresión deliberadamente paradójica.
    reason: lexical_alternative
lexical_decisions:
- source_word: διεφαίνετο
  english_pob_choice: appeared
  chosen_spanish: se les aparecía
  alternatives_spanish:
  - aparecía
  - se dejaba ver
  - se mostraba
  lexicon: LSJ
  rationale: El imperfecto griego expresa una presencia que iba haciéndose visible o apareciendo ante ellos. «Se les aparecía» conserva la idea de manifestación perceptible y el matiz narrativo del inglés POB sin endurecerlo.
- source_word: μόνον
  english_pob_choice: only
  chosen_spanish: Solo
  alternatives_spanish:
  - Solo
  - únicamente
  - meramente
  lexicon: LSJ
  rationale: 'El adverbio restrictivo va al frente para conservar el énfasis: lo único que veían era esta hoguera. «Solo» es natural en español y mantiene la fuerza exclusiva.'
- source_word: αὐτομάτη πυρά
  english_pob_choice: a self-kindled fire
  chosen_spanish: una hoguera encendida por sí misma
  alternatives_spanish:
  - un fuego espontáneo
  - un fuego encendido por sí mismo
  - una hoguera espontánea
  lexicon: LSJ
  rationale: αὐτομάτη indica algo que surge o actúa por sí mismo. «Encendida por sí misma» conserva el valor lexical y el carácter inquietante del fenómeno; «hoguera» hace más natural en español la imagen de un fuego visible y grande.
- source_word: φόβου πλήρης
  english_pob_choice: full of fear
  chosen_spanish: llena de miedo
  alternatives_spanish:
  - llena de terror
  - temible
  - plena de miedo
  lexicon: LSJ
  rationale: La expresión griega es literalmente «llena de miedo». «Llena de miedo» preserva esa literalidad y evita convertir el rasgo en una cualidad activa («temible») que la gramática no exige.
- source_word: ἐκδειματούμενοι
  english_pob_choice: being terrified
  chosen_spanish: atemorizados
  alternatives_spanish:
  - terrorizados
  - muy asustados
  - sobrecogidos
  lexicon: LSJ
  rationale: El participio expresa un estado de intenso pavor. «Atemorizados» mantiene la intensidad sin resultar demasiado coloquial; por la construcción española, funciona mejor en participio absoluto que «siendo aterrorizados».
- source_word: τῆς μὴ θεωρουμένης ἐκείνης ὄψεως
  english_pob_choice: that unseen appearance
  chosen_spanish: esa aparición invisible
  alternatives_spanish:
  - esa aparición no vista
  - esa visión invisible
  - ese espectáculo no visto
  lexicon: LSJ
  rationale: 'La expresión griega es deliberadamente paradójica: una «aparición» que no se veía. «Aparición invisible» conserva la tensión sin explicarla de más; «esa» reproduce el deíctico fuerte de ἐκείνης.'
- source_word: ἡγοῦντο
  english_pob_choice: they considered
  chosen_spanish: consideraban
  alternatives_spanish:
  - pensaban
  - juzgaban
  - estimaban
  lexicon: LSJ
  rationale: ἡγοῦντο implica evaluar o juzgar mentalmente. «Consideraban» es la opción más neutra y formal para el contraste que sigue.
- source_word: χείρω τὰ βλεπόμενα
  english_pob_choice: the things they saw to be worse
  chosen_spanish: peores las cosas que veían
  alternatives_spanish:
  - peores las cosas visibles
  - peores lo que veían
  - peores las cosas vistas
  lexicon: LSJ
  rationale: Se conserva el comparativo «peores» y el contraste entre lo invisible/paradójico y lo visible. «Las cosas que veían» es más natural en español que una calca de τὰ βλεπόμενα, pero mantiene el sentido de lo que estaba ante sus ojos.
theological_decisions:
- issue: Cómo conservar la paradoja de una «aparición» que no se ve
  english_pob_reading: Retain the paradox in the main text as 'that unseen appearance'
  chosen_spanish_reading: «esa aparición invisible»
  alternative_spanish_readings:
  - esa aparición no vista
  - esa visión invisible
  - ese espectáculo no visto
  rationale: El griego no resuelve la paradoja y el POB inglés tampoco la suaviza. Mantenerla en español respeta la extrañeza del texto y su efecto psicológico sobre los personajes.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3, 6
- issue: Cómo traducir αὐτομάτη en un contexto extraordinario
  english_pob_reading: self-kindled
  chosen_spanish_reading: encendida por sí misma
  alternative_spanish_readings:
  - espontánea
  - encendida espontáneamente
  - que se encendió por sí misma
  rationale: La opción elegida conserva el sentido de origen propio o auto-originado sin introducir una explicación naturalista ni perder el tono ominoso del pasaje.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
translation_notes:
  revision_awareness: 'Se tuvo en cuenta que la capa de traducción ya fue revisada y quedó sin cambios en la última pasada; aun así, el inglés auditado conserva dos decisiones lexicográficas importantes: αὐτομάτη como «self-kindled» y la paradoja de τῆς μὴ θεωρουμένης ἐκείνης ὄψεως. La versión española preserva ambas, ajustando solo la sintaxis para naturalidad en español.'
  spanish_consistency_notes:
  - Se usa «Dios/Yahvé» según corresponda en el proyecto, pero este versículo no contiene teónimos.
  - «Aparición» conserva el valor visual/paradójico de ὄψις; no se sustituyó por «visión» en el texto principal para evitar una lectura demasiado interiorizada.
  - «Hoguera» se emplea por naturalidad del español para un fuego visible y temible; no altera el contenido fuente de πυρά.
  - El comparativo χείρω se mantiene explícito como «peores» para conservar la evaluación de los personajes frente a lo visible.
