review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura y el sentido general del hebreo: Edom declara su intención de volver y reconstruir; Yahvé responde anulando ese intento y asignando a Edom un nombre/jucio duradero. Sin embargo, hay varios desajustes con el audit trail y con la fuerza del original: (1) רֻשַּׁשְׁנוּ se acerca mejor a «hemos sido destrozados/devastados» que a «somos aplastados»; (2) הֵמָּה יִבְנוּ fue decidido en el POB inglés con fuerza concesiva («They may build»), pero el español lo volvió predictivo («Ellos edificarán»), perdiendo el contraste retórico; (3) la nota d repite el texto principal y no preserva la alternativa inglesa relacional («con quien»).'
  spanish_quality_summary: El español es en general claro y digno, pero puede mejorarse para sonar más natural y más alineado con la decisión fuente. «Así dice» es correcto, aunque «esto dice» o «esto es lo que dice» sería más cercano al inglés auditado; no es necesario cambiarlo. «Los llamarán territorio de maldad» funciona, pero «serán llamados» suena más natural en español para la impersonal hebrea. La mayúscula en «Ejércitos» es aceptable dentro del título divino. La revisión propuesta mejora naturalidad y precisión sin ampliar el sentido.
  glossary_alignment: Se alinea bien con la terminología del proyecto en «Yahvé» y en la traducción de צְבָאוֹת como «de los Ejércitos». No hay problema doctrinal mayor. El punto principal es respetar la decisión documentada para הֵמָּה יִבְנוּ con valor concesivo-adversativo en español («Podrán edificar» / «Puede que edifiquen»), y conservar adecuadamente las alternativas en notas.
  issues:
  - severity: medium
    issue: «Somos aplastados» para רֻשַּׁשְׁנוּ
    rationale: El hebreo pasivo denota ruina o devastación nacional; «aplastados» es posible, pero suena menos idiomático y menos preciso aquí que «hemos sido devastados» o «hemos sido destrozados».
  - severity: high
    issue: «Ellos edificarán» pierde la fuerza concesiva adoptada por el POB
    rationale: El audit trail inglés justificó «They may build, but I will tear down» por el contexto. El español predictivo simple no preserva esa decisión ni el matiz de futileza frente a la respuesta divina.
  - severity: medium
    issue: La nota [d] no ofrece una alternativa real
    rationale: La nota d repite exactamente la redacción principal. Debe preservar la alternativa relacional reflejada en el audit trail, p. ej. «el pueblo con quien Yahvé está indignado para siempre».
  - severity: low
    issue: «los llamarán» es menos natural que una pasiva impersonal
    rationale: Aunque es aceptable, «serán llamados» refleja mejor la construcción impersonal hebrea y suena más natural en registro bíblico español.
  revised_spanish_text: 'Aunque Edom dice[a]: «Hemos sido devastados, pero volveremos y reconstruiremos las ruinas», así dice Yahvé de los Ejércitos[b]: «Podrán edificar, pero yo derribaré; y serán llamados territorio de maldad[c], el pueblo contra quien Yahvé está indignado para siempre[d]».'
