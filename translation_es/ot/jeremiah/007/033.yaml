lexical_decisions:
- source_word: וְהָיְתָה
  english_pob_choice: will become
  chosen_spanish: se convertirán
  alternatives_spanish:
  - serán
  - llegarán a ser
  lexicon: HALOT
  rationale: En este anuncio profético, el verbo expresa un resultado futuro; «se convertirán» comunica bien ese cambio de estado sin sonar rígido.
- source_word: נִבְלַת
  english_pob_choice: the corpses
  chosen_spanish: los cadáveres
  alternatives_spanish:
  - los cuerpos muertos
  - las carroñas
  lexicon: HALOT
  rationale: נְבֵלָה designa un cuerpo muerto. «Cadáveres» preserva la fuerza deshonrosa del juicio y funciona naturalmente en español para seres humanos.
- source_word: הָעָם הַזֶּה
  english_pob_choice: of this people
  chosen_spanish: de este pueblo
  alternatives_spanish:
  - de esta gente
  - de esta nación
  lexicon: HALOT
  rationale: עַם se refiere aquí al pueblo de Judá; «pueblo» es fiel, claro y evita cargar el término con matiz político innecesario.
- source_word: לְמַאֲכָל
  english_pob_choice: food
  chosen_spanish: comida
  alternatives_spanish:
  - alimento
  - para ser comido
  lexicon: HALOT
  rationale: El sustantivo expresa aquello que sirve de alimento; «comida» conserva la sencillez y la crudeza de la imagen profética.
- source_word: לְעוֹף הַשָּׁמַיִם
  english_pob_choice: for the birds of the heavens
  chosen_spanish: para las aves del cielo
  alternatives_spanish:
  - para las aves de los cielos
  - para las aves del firmamento
  lexicon: HALOT
  rationale: עוֹף es un colectivo para criaturas voladoras. «Aves» es natural en español, y «del cielo» refleja de forma comprensible el hebreo literal.
- source_word: וּלְבֶהֱמַת הָאָרֶץ
  english_pob_choice: and for the beasts of the earth
  chosen_spanish: y para las bestias de la tierra
  alternatives_spanish:
  - y para los animales de la tierra
  - y para las bestias del suelo
  lexicon: HALOT
  rationale: בְּהֵמָה aquí funciona colectivamente como animales terrestres o carroñeros. «Bestias de la tierra» mantiene el paralelismo solemne con «aves del cielo».
- source_word: וְאֵין מַחֲרִיד
  english_pob_choice: with no one to frighten them away
  chosen_spanish: y no habrá nadie que las espante
  alternatives_spanish:
  - y nadie las espantará
  - sin que nadie las ahuyente
  lexicon: HALOT
  rationale: El participio causativo de חרד implica hacer huir o espantar; en español, «espante» transmite bien la idea de ahuyentar a las aves y bestias sin sobreexplicitar más de lo necesario.
theological_decisions:
- issue: Sentido colectivo de נִבְלַת frente al singular formal
  english_pob_reading: The corpses of this people ...
  chosen_spanish_reading: Los cadáveres de este pueblo ...
  alternative_spanish_readings:
  - El cadáver de este pueblo ...
  - Los cuerpos muertos de este pueblo ...
  rationale: El hebreo usa un singular morfológico con sentido colectivo. En español, el plural hace explícita esa colectividad y sigue la revisión del POB inglés que también optó por «corpses».
  doctrine_reference: Jeremías 7:33; lectura colectiva del sustantivo hebreo
- issue: Objeto implícito en וְאֵין מַחֲרִיד
  english_pob_reading: with no one to frighten them away
  chosen_spanish_reading: y no habrá nadie que las espante
  alternative_spanish_readings:
  - y no habrá quien ahuyente a las aves y a las bestias
  - y nadie las ahuyentará
  rationale: El hebreo deja implícito el objeto de «espantar». El español puede decirlo con pronombre átono («las») sin añadir contenido ajeno; el referente sigue siendo las aves y las bestias alimentándose de los cadáveres.
  doctrine_reference: Jeremías 7:33; clausula final con objeto elíptico
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa reciente que pasó de «corpse» a «corpses» para reflejar mejor el valor colectivo; por eso el español usa el plural «cadáveres». También se preservó la clausula final con objeto implícito mediante un pronombre natural en español.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto solo cuando el texto lo exija; este versículo no contiene el nombre divino.
  - «Aves del cielo» y «bestias de la tierra» conservan el paralelismo poético del hebreo.
  - La nota al pie está anclada exactamente en el tramo «de la tierra[a]» para cumplir la correspondencia texto-nota.
