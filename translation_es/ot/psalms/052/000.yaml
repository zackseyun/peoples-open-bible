lexical_decisions:
- source_word: לַמְנַצֵּחַ
  english_pob_choice: For the choirmaster
  chosen_spanish: Para el director musical
  alternatives_spanish:
  - Al director musical
  - Para el maestro de coro
  lexicon: HALOT
  rationale: En las superscripciones de salmos, la expresión señala a quien dirige la ejecución musical. «Director musical» comunica esa función de manera natural en español y conserva la referencia litúrgica sin imponer una lectura más específica de lo que el hebreo exige.
- source_word: מַשְׂכִּיל
  english_pob_choice: A Maskil
  chosen_spanish: Maskil
  alternatives_spanish:
  - Un salmo instructivo
  - Una canción contemplativa
  lexicon: HALOT
  rationale: El término es incierto en este contexto y probablemente funciona como etiqueta genérica o musical/literaria. Se conserva transliterado para no resolver indebidamente su sentido y para mantener la transparencia del dato hebreo.
- source_word: לְדָוִד
  english_pob_choice: of David
  chosen_spanish: de David
  alternatives_spanish:
  - por David
  - para David
  - perteneciente a David
  lexicon: HALOT
  rationale: 'La preposición hebrea permite varias relaciones: autoría, dedicación o asociación. «De David» preserva esa ambigüedad de forma breve y natural en español, sin forzar la autoría.'
theological_decisions:
- issue: Ambigüedad de la superscripción respecto a autoría o asociación de David
  english_pob_reading: Rendered neutrally as 'of David'
  chosen_spanish_reading: Traducido neutramente como «de David»
  alternative_spanish_readings:
  - por David
  - para David
  - perteneciente a David
  rationale: La evidencia hebrea no obliga a una sola relación semántica. La redacción española mantiene la tensión documental en lugar de convertirla en una afirmación histórica más fuerte.
  doctrine_reference: Preservar la ambigüedad textual cuando el hebreo no determina la relación exacta.
translation_notes:
  revision_awareness: 'Se siguió la revisión que separa correctamente los marcadores de nota: [a] en «director», [b] en «Maskil» y [c] en «David».'
  spanish_consistency_notes:
