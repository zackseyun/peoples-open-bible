translation:
  language: es
  text: ¡Levántense, suban contra una nación tranquila[a], que habita confiada, declara Yahvé, que no tiene puertas ni cerrojo[b]; habitan solas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «complaciente» o «confiada en exceso» para el sentido de «tranquila».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «sin puertas y sin cerrojo/barra»; la idea es que están sin fortificación y se sienten seguras.
    reason: cultural_note
lexical_decisions:
- source_word: ק֣וּמוּ
  english_pob_choice: Rise up
  chosen_spanish: ¡Levántense!
  alternatives_spanish:
  - ¡Arrepiéntanse!
  - ¡Pónganse de pie!
  lexicon: HALOT
  rationale: El imperativo plural conserva el tono de llamado urgente y militar. «Levántense» es natural en español y mantiene la fuerza exhortativa sin introducir matices ajenos.
- source_word: עֲל֗וּ אֶל
  english_pob_choice: go up against
  chosen_spanish: suban contra
  alternatives_spanish:
  - vayan contra
  - avancen contra
  - suban contra
  lexicon: HALOT
  rationale: עלה con אֶל en un oráculo bélico expresa avance hostil. «Suban contra» conserva el hebraísmo de movimiento ascendente y la dirección adversativa.
- source_word: גּ֥וֹי
  english_pob_choice: nation
  chosen_spanish: nación
  alternatives_spanish:
  - pueblo
  - gente
  lexicon: HALOT
  rationale: «Nación» corresponde bien al referente político del oráculo y mantiene la amplitud del término hebreo en este contexto.
- source_word: שְׁלֵ֛יו
  english_pob_choice: at ease
  chosen_spanish: tranquila
  alternatives_spanish:
  - en calma
  - complaciente
  lexicon: HALOT
  rationale: El adjetivo denota quietud y seguridad; «tranquila» expresa esa condición de reposo confiado sin exagerar la carga peyorativa.
- source_word: יוֹשֵׁ֥ב לָ/בֶ֖טַח
  english_pob_choice: dwelling securely
  chosen_spanish: que habita confiada
  alternatives_spanish:
  - que vive segura
  - morando con seguridad
  lexicon: HALOT
  rationale: El participio con לָבֶטַח describe una residencia estable y segura. «Habita confiada» suena natural en español y conserva el sentido de seguridad asentada.
- source_word: נְאֻם יְהוָ֑ה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - dice Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: Se preserva la fórmula profética con el nombre divino «Yahvé», conforme al estándar del proyecto, y «declara» mantiene el peso oracular.
- source_word: לֹא דְלָתַ֧יִם וְ/לֹֽא בְרִ֛יחַ ל֖/וֹ
  english_pob_choice: that has no doors or bars
  chosen_spanish: que no tiene puertas ni cerrojo
  alternatives_spanish:
  - que no tiene puertas ni barras
  - sin puertas ni cerrojo
  lexicon: HALOT
  rationale: El hebreo habla literalmente de «no puertas y no cerrojo/barra». «Cerrojo» comunica la idea de fortificación de modo idiomático en español; «puertas ni cerrojo» conserva la negación coordinada.
- source_word: בָּדָ֥ד
  english_pob_choice: alone
  chosen_spanish: solitaria y aparte
  alternatives_spanish:
  - sola
  - en soledad
  lexicon: HALOT
  rationale: El adverbio/adjetivo expresa separación o aislamiento. «Solitaria y aparte» intenta reflejar tanto la soledad como el estar aparte de otros, sin perder claridad.
- source_word: יִשְׁכֹּֽנוּ
  english_pob_choice: they dwell
  chosen_spanish: habitan
  alternatives_spanish:
  - morarán
  - residen
  lexicon: HALOT
  rationale: El imperfecto plural de שכן mantiene el motivo de habitación/asentamiento. «Habitan» es sobrio y registra el estado continuo del pueblo.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrama directamente. Se conserva la forma del nombre divino según la política del proyecto, en vez de sustituirlo por un título en mayúsculas.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Descripción de seguridad y vulnerabilidad
  english_pob_reading: a nation at ease, dwelling securely, that has no doors or bars
  chosen_spanish_reading: una nación tranquila, que habita confiada, que no tiene puertas ni cerrojo
  alternative_spanish_readings:
  - una nación complaciente, que habita segura, sin puertas ni barras
  - una nación en calma, viviendo con seguridad, sin puertas ni cerrojo
  rationale: La frase combina tranquilidad interna con vulnerabilidad externa. Se conserva esa tensión sin suavizarla a una simple idea de paz; el verso describe seguridad percibida frente a una falta real de defensas.
  doctrine_reference: Jeremías 49:31 (oráculo de juicio contra una nación confiada)
translation_notes:
  revision_awareness: 'La revisión inglesa reciente eliminó la repetición innecesaria de «a nation» antes de la cláusula final para mayor fluidez. En español se siguió la misma economía sintáctica: la última cláusula queda como descripción del mismo sujeto («que no tiene puertas ni cerrojo»; «habitan solitaria y aparte») sin repetir «nación».'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» conforme al estándar del proyecto para יְהוָה.
  - Se prefirió «habita confiada» en lugar de «vive en seguridad» para conservar el tono participial del hebreo.
  - «Puertas ni cerrojo» refleja la negación doble del hebreo y evita una explicación demasiado interpretativa en el texto principal.
  - La clausula final se entiende como referencia al mismo pueblo ya descrito, por lo que no se repite «nación» en español.
