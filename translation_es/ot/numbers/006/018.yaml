translation:
  language: es
  text: Entonces el nazareo[a] se rasurará la cabeza de su consagración a la entrada de la tienda de reunión, y tomará el cabello de la cabeza de su consagración y lo pondrá sobre el fuego que está debajo del sacrificio de las ofrendas de paz[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Término técnico del voto de consagración; no se trata de un nazareno en sentido geográfico.
    reason: lexical_clarification
  - marker: b
    text: O 'ofrendas de comunión' o 'ofrendas de bienestar'.
    reason: lexical_alternative
lexical_decisions:
- source_word: נָּזִיר
  english_pob_choice: Nazirite
  chosen_spanish: nazareo
  alternatives_spanish:
  - nazareo consagrado
  - consagrado bajo voto nazareo
  lexicon: HALOT
  rationale: El término designa a la persona sometida al voto especial de Números 6. En español, 'nazareo' preserva el valor técnico del vocablo sin reemplazarlo por una explicación más larga que perdería la forma terminológica del texto.
- source_word: גִלַּח
  english_pob_choice: shall shave
  chosen_spanish: se rasurará
  alternatives_spanish:
  - se afeitará
  - rasurará
  lexicon: HALOT
  rationale: El verbo se refiere a quitar el cabello mediante rasurado. 'Se rasurará' suena natural en una instrucción ritual y conserva la acción concreta del hebreo.
- source_word: פֶּתַח אֹהֶל מוֹעֵד
  english_pob_choice: at the entrance of the tent of meeting
  chosen_spanish: a la entrada de la tienda de reunión
  alternatives_spanish:
  - en la entrada de la tienda de reunión
  - a la puerta de la tienda de reunión
  lexicon: HALOT
  rationale: '''Entrada'' reproduce פֶּתַח de modo transparente, y ''tienda de reunión'' mantiene el nombre cultual tradicional de אֹהֶל מוֹעֵד en español bíblico claro.'
- source_word: רֹאשׁ נִזְרוֹ
  english_pob_choice: the head of his consecration
  chosen_spanish: la cabeza de su consagración
  alternatives_spanish:
  - su cabeza consagrada
  - la cabeza de su nazareato
  lexicon: HALOT
  rationale: La construcción hebrea vincula la cabeza con el estado de consagración/separación del voto. 'Consagración' comunica bien ese valor cultual en español y conserva la relación explícita entre cabeza y estado dedicado.
- source_word: שְׂעַר רֹאשׁ נִזְרוֹ
  english_pob_choice: the hair of the head of his consecration
  chosen_spanish: el cabello de la cabeza de su consagración
  alternatives_spanish:
  - el cabello de su cabeza consagrada
  - el cabello de la cabeza de su nazareato
  lexicon: HALOT
  rationale: '''Cabello'' es natural en español moderno y mantiene el referente físico. Se conserva la estructura repetida del hebreo para no borrar el nexo ritual entre el cabello y la consagración.'
- source_word: נֵזֶר / נִזְרוֹ
  english_pob_choice: consecration
  chosen_spanish: consagración
  alternatives_spanish:
  - separación
  - nazareato
  - voto nazareo
  lexicon: HALOT
  rationale: Aquí el sustantivo señala el estado de dedicación ritual. 'Consagración' expresa mejor ese sentido que 'separación', y evita convertir el sustantivo en una paráfrasis interpretativa como 'voto nazareo'.
- source_word: הָאֵשׁ
  english_pob_choice: the fire
  chosen_spanish: el fuego
  alternatives_spanish:
  - la llama
  lexicon: HALOT
  rationale: 'El sentido básico es literal: fuego. ''El fuego'' mantiene la imagen sacrificial sin añadir matices no requeridos por el hebreo.'
- source_word: תַּחַת
  english_pob_choice: under
  chosen_spanish: debajo de
  alternatives_spanish:
  - bajo
  - bajo el
  lexicon: HALOT
  rationale: '''Debajo de'' expresa la relación espacial de manera clara en español y conserva la referencia física de que el fuego se encuentra en posición inferior respecto del sacrificio.'
- source_word: זֶבַח הַשְּׁלָמִים
  english_pob_choice: the sacrifice of peace offerings
  chosen_spanish: el sacrificio de las ofrendas de paz
  alternatives_spanish:
  - el sacrificio de las ofrendas de comunión
  - el sacrificio de las ofrendas de bienestar
  lexicon: HALOT
  rationale: Se mantiene la categoría sacrificial tradicional con un giro natural en español. 'Ofrendas de paz' preserva la etiqueta cultual establecida, aunque en notas se conservan alternativas válidas que reflejan el matiz de שְׁלָמִים.
theological_decisions:
- issue: Nombre técnico del voto nazareo
  english_pob_reading: Nazirite as a technical designation for the person under the vow
  chosen_spanish_reading: nazareo como designación técnica de la persona bajo el voto
  alternative_spanish_readings:
  - nazareo consagrado
  - consagrado bajo voto nazareo
  rationale: No se diluye el término en una descripción general. El texto regula un rito específico, y 'nazareo' permite mantener la identidad técnica sin perder el trasfondo de dedicación especial.
  doctrine_reference: Números 6; consistencia terminológica cultual
- issue: שְׁלָמִים and its sacrificial nuance
  english_pob_reading: peace offerings with lexical alternatives fellowship offerings / offerings of well-being
  chosen_spanish_reading: ofrendas de paz
  alternative_spanish_readings:
  - ofrendas de comunión
  - ofrendas de bienestar
  rationale: La elección conserva la categoría sacrificial recibida en español bíblico y evita estrechar el sentido a sola 'comunión'. Las alternativas se preservan porque el término hebreo tiene un campo semántico más amplio que incluye bienestar/ plenitud.
  doctrine_reference: Éxodo 20–Levítico 7; consistencia de términos sacrificiales
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del POB inglés, que ajustó la relación poseída en 'the hair of the head of his consecration' para corresponder más de cerca al hebreo. En español se reflejó esa precisión con 'el cabello de la cabeza de su consagración'.
  spanish_consistency_notes:
  - Se mantuvo 'tienda de reunión' para אֹהֶל מוֹעֵד, coherente con el registro cultual del proyecto.
  - Se evitó 'SEÑOR' porque este versículo no contiene el Tetragrámaton ni una cita directa del nombre divino.
  - Se preservó la estructura repetida 'de su consagración' para no borrar la relación ritual entre la cabeza, el cabello y el voto.
