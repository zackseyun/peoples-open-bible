    issue: Marcador de nota anclado a la frase equivocada
    rationale: La nota [a] trata de las alternativas de δικαιωθῆναι («ser justificado / ser vindicado / ser mostrado justo»), pero en el texto español está colocada tras «a su debido tiempo», que corresponde a εὐκαίρως. Esto desaline­a la evidencia léxica y puede confundir al lector.
  - severity: low
    issue: «No te dejes impedir de» es algo forzado en español
    rationale: Aunque es fiel al pasivo exhortativo de ἐμποδισθῇς, en español suena más natural «No dejes que nada te impida…» o «No te dejes impedir al…». Como la reparación necesaria es pequeña, conviene mejorar la idiomaticidad sin cambiar el sentido.
