revisions:
- from: Y esta cosa se convirtió en pecado[a], y el pueblo iba delante del uno hasta Dan.
  to: Y este asunto se convirtió en pecado, y el pueblo fue ante el uno[a] hasta Dan.
  rationale: 'La revisión conserva todas las decisiones fuente-clave del POB, pero mejora la fidelidad narrativa y la naturalidad del español: «este asunto» evita un calco tosco de דבר, «fue» refleja mejor el wayyiqtol hebreo, y «ante el uno[a]» mantiene la elipsis original con mejor legibilidad que «delante del uno». La nota se ajusta para sonar natural en español sin perder la explicación lexical documentada.'
