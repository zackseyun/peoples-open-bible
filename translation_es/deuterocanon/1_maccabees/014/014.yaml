translation:
  language: es
  text: Y fortaleció a todos los humildes[a] de su pueblo; buscó la ley[b], y quitó todo lo inicuo y malo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «todos los de baja condición de su pueblo». El griego puede referirse tanto a personas de condición humilde como a los humildes en disposición.
    reason: lexical_alternative
  - marker: b
    text: Aquí «la ley» probablemente se refiere a la ley ancestral judía, es decir, la Torá.
    reason: cultural_note
lexical_decisions:
- source_word: ἐστήρισεν
  english_pob_choice: strengthened
  chosen_spanish: fortaleció
  alternatives_spanish:
  - lo hizo firme
  - sostuvo
  - afianzó
  lexicon: LSJ
  rationale: ἐστήρισεν expresa hacer firme o fortalecer. «Fortaleció» conserva el sentido concreto y natural en español, sin perder la idea de dar firmeza.
- source_word: πάντας τοὺς ταπεινοὺς
  english_pob_choice: all the humble
  chosen_spanish: a todos los humildes
  alternatives_spanish:
  - a todos los bajos
  - a todos los humildes de condición
  - a todos los pobres
  lexicon: LSJ
  rationale: ταπεινός puede aludir tanto a humildad de disposición como a condición social baja. «Los humildes» mantiene esa amplitud y evita estrechar el sentido solo a lo económico o social.
- source_word: τοῦ λαοῦ αὐτοῦ
  english_pob_choice: of his people
  chosen_spanish: de su pueblo
  alternatives_spanish:
  - entre su pueblo
  - de la gente suya
  lexicon: LSJ
  rationale: La relación genitiva es posesiva y directa. «De su pueblo» es la forma más natural en español y preserva el vínculo con el gobernante implícito del contexto.
- source_word: τὸν νόμον
  english_pob_choice: the law
  chosen_spanish: la ley
  alternatives_spanish:
  - la Ley
  - la ley de Moisés
  - la Torá
  lexicon: LSJ
  rationale: νόμος aquí apunta probablemente a la ley ancestral judía. «La ley» es fiel y sobria; se evita capitalizar sin una marca explícita del griego, y se mantiene la referencia legal-covenantal para el lector.
- source_word: ἐξεζήτησεν
  english_pob_choice: sought out
  chosen_spanish: buscó
  alternatives_spanish:
  - buscó con diligencia
  - escudriñó
  - buscó y examinó
  lexicon: LSJ
  rationale: El compuesto intensifica el buscar. En español, «buscó» comunica la acción de manera clara; la intensidad queda en el contexto de compromiso deliberado con la ley. «Buscó la ley» también evita sobrecargar la frase.
- source_word: ἐξῆρεν
  english_pob_choice: removed
  chosen_spanish: quitó
  alternatives_spanish:
  - eliminó
  - removió
  - arrancó
  lexicon: LSJ
  rationale: El verbo significa quitar o retirar. «Quitó» es amplio y funciona bien con el objeto neutro subsiguiente, que resume prácticas o realidades sin ley y malas.
- source_word: πάντα ἄνομον καὶ πονηρόν
  english_pob_choice: every lawless and evil thing
  chosen_spanish: toda cosa sin ley y mala
  alternatives_spanish:
  - todo lo sin ley y malo
  - toda cosa ilegal y mala
  - todo lo inicuo y perverso
  lexicon: LSJ
  rationale: Los adjetivos neutros funcionan sustantivadamente. «Toda cosa sin ley y mala» conserva la conexión verbal con νόμος mediante «sin ley» y traduce πονηρόν con un adjetivo simple y comprensible. «Inicuo» o «perverso» sonarían más intensos de lo que exige el griego.
theological_decisions:
- issue: Cómo reflejar ταπεινοὺς sin resolver del todo si es humildad moral o condición social
  english_pob_reading: the humble / the lowly
  chosen_spanish_reading: los humildes
  alternative_spanish_readings:
  - los bajos
  - los pobres
  - los humildes de condición
  rationale: 'El griego admite una doble referencia: personas de carácter humilde y personas socialmente abatidas. «Los humildes» preserva esa tensión sin cerrar el sentido hacia una sola esfera.'
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
- issue: Cómo traducir τὸν νόμον en un contexto judío sin sobrecargar la capitalización
  english_pob_reading: the law
  chosen_spanish_reading: la ley
  alternative_spanish_readings:
  - la Ley
  - la Torá
  - la ley ancestral
  rationale: El contexto de 1 Macabeos apunta a la ley ancestral judía, pero el griego no exige una mayúscula teológica. «La ley» es claro, reverente y suficientemente preciso; la explicación va en la decisión lexical.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition; readable modern Spanish'
translation_notes:
  revision_awareness: 'Se siguió el último pase de revisión, que indicó sin cambios necesarios. La redacción española conserva el paralelismo del griego: fortalecer a los humildes, buscar la ley y quitar lo contrario a ella. Se mantuvo la tensión semántica de ταπεινοὺς y se evitó una paráfrasis más interpretativa en el verbo ἐξεζήτησεν.'
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto fuente lo requiere explícitamente; aquí no aparece el nombre divino.
  - Se eligió «la ley» en vez de «la Ley» para no imponer una lectura tipográfica que el griego no marca.
  - Se evitó «siervo» porque no corresponde a δοῦλος en este pasaje; no hay razón para introducir terminología servil.
  - «Sin ley» mantiene la relación léxica con «ley» y refleja bien ἄνομον.
