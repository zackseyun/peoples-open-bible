base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/009/007.yaml
  text: Their tongue is a slaughtering arrow[a]; it speaks deceit. With his mouth each man speaks peace to his neighbor[c][b], but within himself he sets his ambush.
  footnotes:
  - marker: a
    text: Or 'a deadly arrow' or 'a sharpened arrow.' The Hebrew participle from 'slaughter' emphasizes lethal intent, not merely sharpness.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'speaks peace to his neighbor'—that is, he speaks in a friendly or peaceable way while planning harm inwardly.
    reason: cultural_note
  - marker: c
    text: Or 'within him he sets an ambush' or 'inwardly he lays a snare.' The Hebrew leaves the target of the ambush implicit.
    reason: lexical_alternative
