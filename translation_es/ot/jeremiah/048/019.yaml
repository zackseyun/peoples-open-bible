translation:
  language: es
  text: 'Párate junto al camino y vigila[a], habitante de Aroer; pregunta al que huye y a la que escapa, y diles: «¿Qué ha sucedido?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo distingue el género en los participios dirigidos a los fugitivos: literalmente, «al que huye y a la que escapa».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶל דֶּרֶךְ
  english_pob_choice: by the road
  chosen_spanish: junto al camino
  alternatives_spanish:
  - al lado del camino
  - junto a la ruta
  lexicon: HALOT
  rationale: La preposición אֶל con דֶּרֶךְ en este mandato funciona de manera idiomática como ubicación junto a la vía de fuga. «Junto al camino» expresa bien la escena sin calcar una estructura extraña en español.
- source_word: עִמְדִי
  english_pob_choice: Stand
  chosen_spanish: Párate
  alternatives_spanish:
  - Ponte de pie
  - Mantente en pie
  lexicon: HALOT
  rationale: Imperativo femenino singular de עמד. En español, «Párate» comunica el mandato directo y natural, conservando la fuerza posicional del verbo.
- source_word: וְצַפִּי
  english_pob_choice: and watch
  chosen_spanish: y vigila
  alternatives_spanish:
  - y observa
  - y mantén vigilancia
  lexicon: HALOT
  rationale: צפה implica estar atento como centinela. «Vigila» mantiene el matiz de observación activa y encaja con el tono del encargo.
- source_word: יוֹשֶׁבֶת עֲרוֹעֵר
  english_pob_choice: inhabitant of Aroer
  chosen_spanish: habitante de Aroer
  alternatives_spanish:
  - mujer que habita en Aroer
  - la que habita en Aroer
  lexicon: HALOT
  rationale: El participio femenino singular personifica a Aroer o a su población. «Habitante de Aroer» preserva la dirección personal sin añadir más de lo que el hebreo dice.
- source_word: שַׁאֲלִי
  english_pob_choice: ask
  chosen_spanish: pregunta
  alternatives_spanish:
  - consulta
  - interroga
  lexicon: HALOT
  rationale: Imperativo femenino singular de שאל. «Pregunta» es la equivalencia directa y natural en español.
- source_word: נָס
  english_pob_choice: the man who flees
  chosen_spanish: al que huye
  alternatives_spanish:
  - al fugitivo
  - al que va huyendo
  lexicon: HALOT
  rationale: El participio masculino singular describe literalmente «el que huye». En español, «al que huye» evita añadir sustantivos no presentes y conserva la relación verbal.
- source_word: וְנִמְלָטָה
  english_pob_choice: and the woman who escapes
  chosen_spanish: y a la que escapa
  alternatives_spanish:
  - y a la escapada
  - y a la que ha escapado
  lexicon: HALOT
  rationale: El participio femenino singular mantiene el paralelismo de género con el hebreo. «A la que escapa» refleja la forma verbal sin cargarlo con un sustantivo añadido.
- source_word: אִמְרִי
  english_pob_choice: say
  chosen_spanish: di
  alternatives_spanish:
  - dile
  - declara
  lexicon: HALOT
  rationale: El imperativo de אמר introduce la pregunta citada. En español, «di» es breve y fiel, y permite mantener la estructura directa del discurso.
- source_word: מַה נִּהְיָתָה
  english_pob_choice: What has happened?
  chosen_spanish: ¿Qué ha sucedido?
  alternatives_spanish:
  - ¿Qué ha ocurrido?
  - ¿Qué ha pasado?
  lexicon: HALOT
  rationale: La pregunta indaga por un acontecimiento ya ocurrido. «¿Qué ha sucedido?» es formal, natural y conserva el sentido de evento/acometimiento del hebreo.
translation_notes:
  revision_awareness: Se corrigió la versión anterior para anclar la nota [a] directamente en el texto español y mantener la distinción de género del hebreo sin introducir sustantivos ajenos al original.
  spanish_consistency_notes:
  - Se mantuvo «Aroer» como nombre propio sin adaptación.
  - Se prefirió un imperativo directo y natural en español, acorde con la escena profética.
  - La nota [a] está anclada en el segmento donde aparece la distinción de género, conforme al audit trail inglés y al hebreo.
  - No se usó «SEÑOR» ni terminología doctrinal no presente en este versículo.
