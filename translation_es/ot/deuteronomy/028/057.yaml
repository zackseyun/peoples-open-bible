    issue: שִׁלְיָתָהּ fue traducido como 'su posparto'
    rationale: '''Posparto'' en español nombra el período posterior al parto, no la masa/tejido expulsado. El hebreo se refiere específicamente al afterbirth/placenta, por lo que la traducción actual altera el referente.'
  - severity: medium
