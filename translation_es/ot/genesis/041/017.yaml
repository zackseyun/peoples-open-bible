translation:
  language: es
  text: 'Entonces el faraón le dijo a José[a]: «En mi sueño, he aquí, yo estaba de pie en la orilla del Nilo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: ‘el río’. En el contexto egipcio de Génesis, este término suele referirse al Nilo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְדַבֵּר
  english_pob_choice: said
  chosen_spanish: le dijo
  alternatives_spanish:
  - habló
  - le habló
  lexicon: HALOT
  rationale: Aunque el verbo hebreo es literalmente ‘hablar’, en el discurso narrativo con complemento directo de destinatario, ‘le dijo’ es la equivalencia natural en español y conserva la función de la intervención sin rigidez.
- source_word: פַּרְעֹה
  english_pob_choice: Pharaoh
  chosen_spanish: el faraón
  alternatives_spanish:
  - Faraón
  lexicon: uso bíblico estándar
  rationale: En español bíblico, el título suele ir con artículo definido cuando funciona como referente narrativo conocido. Mantiene el valor titular del hebreo sin introducir un nombre propio inexistente.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - para
  - con
  lexicon: HALOT
  rationale: La preposición marca al destinatario del habla; en español, ‘a’ con el verbo decir expresa con naturalidad esa relación.
- source_word: יוֹסֵף
  english_pob_choice: Joseph
  chosen_spanish: José
  alternatives_spanish:
  - José
  lexicon: transliteración española tradicional
  rationale: El nombre propio se adapta a la forma española estándar y reconocible para la lectura eclesial.
- source_word: בַּחֲלֹמִי
  english_pob_choice: In my dream
  chosen_spanish: En mi sueño
  alternatives_spanish:
  - En el sueño que tuve
  - En mi visión nocturna
  lexicon: HALOT
  rationale: La forma con prefijo y sufijo indica ‘en mi sueño’; ‘sueño’ es la correspondencia directa y natural en español. No se añade ‘que tuve’ porque el hebreo no lo expresa.
- source_word: הִנְנִי
  english_pob_choice: behold, I was
  chosen_spanish: he aquí
  alternatives_spanish:
  - mira
  - he aquí, yo estaba
  lexicon: HALOT
  rationale: El presentativo hebreo aporta viveza y señalamiento. En español, ‘he aquí’ preserva ese valor sin forzar una perífrasis innecesaria; el sujeto implícito se recupera por el contexto.
- source_word: עֹמֵד
  english_pob_choice: standing
  chosen_spanish: de pie
  alternatives_spanish:
  - estando de pie
  - parado
  lexicon: HALOT
  rationale: El participio indica una postura en pie. ‘De pie’ comunica la imagen con naturalidad y dignidad en español bíblico moderno.
- source_word: עַל
  english_pob_choice: 'on'
  chosen_spanish: a la
  alternatives_spanish:
  - sobre la
  - en la
  lexicon: HALOT
  rationale: Con ‘orilla/bank’ en español, la construcción idiomática es ‘a la orilla’, que expresa la relación locativa sin calco rígido del hebreo.
- source_word: שְׂפַת
  english_pob_choice: bank
  chosen_spanish: orilla
  alternatives_spanish:
  - borde
  - ribera
  - banco
  lexicon: HALOT
  rationale: En contexto fluvial, la metáfora literal ‘labio/orilla’ se entiende mejor como ‘orilla’ en español. ‘Borde’ o ‘ribera’ son posibles, pero ‘orilla’ es más natural y precisa aquí.
- source_word: הַיְאֹר
  english_pob_choice: the Nile
  chosen_spanish: el Nilo
  alternatives_spanish:
  - el río
  - el gran río
  lexicon: HALOT
  rationale: En el contexto egipcio de Génesis, יְאֹר remite al Nilo. ‘El Nilo’ comunica de inmediato el referente específico que el hebreo presupone.
translation_notes:
  revision_awareness: 'Se mantiene la lectura y la puntuación del texto base: narración en pasado, discurso directo introducido por el faraón, y referencia específica al Nilo sin cambiar el sentido del hebreo. La decisión relevante es lexical: en español se opta por ‘el Nilo’ en el texto principal, mientras la nota preserva la alternativa literal ‘el río’ para transparentar el término hebreo.'
  spanish_consistency_notes:
  - Se usa ‘faraón’ en minúscula por tratarse de un título en discurso narrativo español, salvo usos estilísticos de mayúscula en series litúrgicas; aquí se mantiene forma común.
  - ‘He aquí’ conserva la función presentativa de הִנְנִי sin añadir interpretación.
  - ‘A la orilla’ reproduce la locución española natural para שְׂפַת + לocativo fluvial, evitando un calco como ‘sobre la margen’ que sonaría más técnico que bíblico.
