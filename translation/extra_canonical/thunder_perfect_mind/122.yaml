translation:
  text: 'And do not make me known in another place or in another time. Do not make
    me known. Do not make me known in another place or in another time.

    For I am the one who has come to be, and the one who will come to be.

    I am Forbearance, and the one who will come to be.

    I am Forbearance, and the one who will come to be.

    I am Forbearance[f][e][d][c][b], and the one who will come to be.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'ⲙⲡⲣⲣⲁⲧⲥⲟⲟⲩⲛ is a negative prohibitive with causative “make known,” hence
      “do not make me known.” Alternatives: “do not reveal/announce me.”'
    reason: lexical_alternative
  - marker: b
    text: ⲟⲩⲟⲉⲓϣ can be “crowd, multitude, assembly.” I chose “crowd” for concreteness.
    reason: lexical_alternative
  - marker: c
    text: ϣⲱⲡⲉ has a range “happen, become, come to be.” In self-revelation contexts,
      “come to be” carries ontological force.
    reason: lexical_alternative
  - marker: d
    text: ⲥⲩⲛⲅⲛⲱⲙⲏ ranges over “forbearance/pardon/lenience/consent/understanding.”
      “Forbearance” is a deliberate choice to preserve strangeness; “Pardon” or “Understanding”
      remain possible.
    reason: lexical_alternative
  - marker: e
    text: The consult English supplied for this segment does not correspond to these
      Coptic lines; mapping is low-confidence and likely offset.
    reason: alignment_note
  - marker: f
    text: Or 'And do not make me known to another place or to another crowd; do not
      make me known.'.
    reason: previous_rendering
lexical_decisions:
- source_word: ⲙⲡⲣⲣⲁⲧⲥⲟⲟⲩⲛ
  chosen: do not make known
  alternatives:
  - do not reveal
  - do not announce
  lexicon: Crum; causative of ⲥⲟⲟⲩⲛ “to know”
  rationale: Negative prohibitive ⲙⲡⲣ- with causative ⲣⲁⲧⲥⲟⲟⲩⲛ conveys “do not cause
    to be known/manifest.”
- source_word: ⲕⲉⲙⲁ
  chosen: another place
  alternatives:
  - other place
  - elsewhere
  lexicon: Crum
  rationale: Compound of ⲕⲉ “other” + ⲙⲁ “place.”
- source_word: ⲟⲩⲟⲉⲓϣ
  chosen: crowd
  alternatives:
  - multitude
  - assembly
  lexicon: Crum
  rationale: Common Sahidic for a large group; “crowd” keeps concrete social sense.
- source_word: ϣⲱⲡⲉ (ⲡⲉⲛⲧⲁϥϣⲱⲡⲉ / ⲡⲉⲧⲛⲁϣⲱⲡⲉ)
  chosen: has come to be / will come to be
  alternatives:
  - has happened / will happen
  - has become / will become
  lexicon: Crum
  rationale: ϣⲱⲡⲉ is “happen, come to be.” In Thunder’s ontological register, “come
    to be” preserves weight and ambiguity over mere eventivity.
- source_word: ⲥⲩⲛⲅⲛⲱⲙⲏ
  chosen: Forbearance
  alternatives:
  - Pardon
  - Lenience
  - Understanding
  - Consent
  lexicon: LSJ; Crum
  rationale: Syngnōmē ranges over pardon/lenity/allowance/consent. As a self-title,
    “Forbearance” captures lenity without collapsing to purely juridical (“pardon”)
    or purely cognitive (“understanding”), preserving strangeness.
parallelism_check: The prohibitive clause is kept compact with a light echo (“do not
  make me known”) to reflect the repeated ⲙⲡⲣⲣⲁⲧⲥⲟⲟⲩⲛ. The core parallelism is the
  triple “I am … and the one who will come to be,” mirroring the repeated ⲁⲛⲟⲕ ⲡⲉ
  ⲧⲉⲥⲩⲛⲅⲛⲱⲙⲏ ⲁⲩⲱ ⲡⲉⲧⲛⲁϣⲱⲡⲉ. The temporal dyad “has come to be / will come to be” preserves
  the balanced structure of ⲡⲉⲛⲧⲁϥϣⲱⲡⲉ … ⲡⲉⲧⲛⲁϣⲱⲡⲉ.
voice_check: First-person proclamatory voice is retained with repeated “I am …” titles.
  The injunction remains in the authoritative imperative. No smoothing of the stark
  self-ascription “I am Forbearance.”
alignment_risk_note: Alignment confidence is low and the consult English does not
