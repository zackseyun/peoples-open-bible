revisions:
- from: Y nos sacó de allí, para llevarnos y darnos la tierra que juró a nuestros padres.
  to: Y nos sacó de allí, para hacernos entrar y darnos la tierra que juró a nuestros padres[a].
  rationale: Se revisa «llevarnos» a «hacernos entrar» para reflejar con más precisión el hiphil de בוא en contexto de entrada a la tierra. Se añade la nota sobre «padres/antepasados» para mantener la alternativa léxica documentada en la auditoría inglesa sin neutralizar el texto principal. No se requieren cambios doctrinales ni adjudicación adicional.
