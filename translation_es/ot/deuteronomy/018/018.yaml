translation:
  language: es
  text: Levantaré para ellos un profeta como tú, de entre sus hermanos[a], y pondré mis palabras en su boca, y él les hablará todo lo que yo le mande.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "de entre sus parientes" o "de entre sus compañeros israelitas"; hebreo literalmente, "de entre sus hermanos".
    reason: lexical_alternative
lexical_decisions:
- source_word: נָבִיא
  english_pob_choice: a prophet
  chosen_spanish: un profeta
  alternatives_spanish:
  - un portavoz de Dios
  - un enviado profético
  lexicon: HALOT
  rationale: נָבִיא es el término habitual para un profeta; en español, 'profeta' comunica de manera directa y fiel la figura prometida. El artículo indefinido refleja bien el hebreo sin artículo.
- source_word: אָקִים
  english_pob_choice: I will raise up
  chosen_spanish: Levantaré
  alternatives_spanish:
  - Haré surgir
  - Estableceré
  - Pondré en pie
  lexicon: HALOT
  rationale: El hiphil de קום expresa hacer surgir o levantar. 'Levantaré' conserva la imagen verbal de origen divino y es natural en español bíblico contemporáneo.
- source_word: לָהֶם
  english_pob_choice: for them
  chosen_spanish: para ellos
  alternatives_spanish:
  - a favor de ellos
  - para su bien
  lexicon: HALOT
  rationale: La preposición ל aquí expresa provisión en beneficio del pueblo; 'para ellos' mantiene esa relación sin sobrecargar el sentido.
- source_word: מִקֶּרֶב אֲחֵיהֶם
  english_pob_choice: from among their brothers
  chosen_spanish: de entre sus hermanos
  alternatives_spanish:
  - de entre sus parientes
  - de entre sus compatriotas
  - de en medio de sus hermanos
  lexicon: HALOT
  rationale: Se conserva la expresión de parentesco del hebreo. 'De entre' reproduce bien מִקֶּרֶב y evita perder la idea de procedencia interna al pueblo.
- source_word: כָּמוֹךָ
  english_pob_choice: like you
  chosen_spanish: como tú
  alternatives_spanish:
  - igual que tú
  lexicon: HALOT
  rationale: La comparación con Moisés debe quedar simple y directa. 'Como tú' es la correspondencia más fiel y sobria.
- source_word: וְנָתַתִּי דְבָרַי בְּפִיו
  english_pob_choice: and I will put my words in his mouth
  chosen_spanish: y pondré mis palabras en su boca
  alternatives_spanish:
  - y colocaré mis palabras en su boca
  - y pondré mis palabras en la boca de él
  lexicon: HALOT
  rationale: La metáfora profética se conserva con el giro habitual en español. 'Pondré' refleja el acto divino de comunicación inspirada sin explicitar más de lo que el texto dice.
- source_word: וְדִבֶּר אֲלֵיהֶם
  english_pob_choice: and he will speak to them
  chosen_spanish: y él les hablará
  alternatives_spanish:
  - y hablará a ellos
  - y les dirá
  lexicon: HALOT
  rationale: '''Les hablará'' reproduce el sentido relacional de אֶל y mantiene un futuro claro en español.'
- source_word: אֵת כָּל אֲשֶׁר אֲצַוֶּנּוּ
  english_pob_choice: all that I command him
  chosen_spanish: todo lo que yo le mande
  alternatives_spanish:
  - todo cuanto yo le ordene
  - todo lo que yo le mandaré
  lexicon: HALOT
  rationale: La construcción hebrea abarca la totalidad del mandato divino. 'Le mande' comunica bien el futuro de propósito en español y evita una rigidez innecesaria.
theological_decisions:
- issue: Identidad del profeta prometido
  english_pob_reading: The main text retains the Hebrew wording as a prophet like Moses without making the referent explicit.
  chosen_spanish_reading: El texto principal conserva la promesa de un profeta como Moisés, sin identificar explícitamente a su cumplimiento.
  alternative_spanish_readings:
  - Una línea colectiva de profetas
  - Un profeta mesiánico escatológico
  rationale: La frase hebrea promete 'un profeta como tú' y no nombra de forma explícita al referente. La traducción española mantiene esa tensión, sin anticipar una identificación doctrinal en el cuerpo del verso.
  doctrine_reference: Affirmations; Translation philosophy §3
- issue: Sentido de אֲחֵיהֶם
  english_pob_reading: their brothers
  chosen_spanish_reading: sus hermanos
  alternative_spanish_readings:
  - sus parientes
  - sus compatriotas
  - sus fellow Israelites
  rationale: Se conserva el término de parentesco masculino del hebreo. En español puede sonar restringido, pero es el equivalente más directo; la ambigüedad se aclara en una nota sin neutralizar el término fuente.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: El pasaje presenta alto acuerdo con el audit trail inglés y no hubo revisiones aplicadas; la redacción española sigue la misma línea, conservando la tensión teológica sobre la identidad del profeta y la referencia literal de ‘hermanos’.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' fuera del versículo porque el hebreo aquí no contiene el nombre divino; el hablante se expresa en primera persona.
  - Se conserva el singular masculino de los referentes ('profeta', 'su boca', 'su hermano') de acuerdo con el hebreo y con el audit trail.
  - La frase verbal 'levantaré' reproduce el valor dinámico de אָקִים sin sustituirlo por una explicación interpretativa.
