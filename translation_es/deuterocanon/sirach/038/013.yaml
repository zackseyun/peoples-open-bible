review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador no sigue fielmente la decisión principal del POB ni el hebreo primario en un punto clave: בידו es singular (''en su mano/sus manos'' refiriéndose al médico), mientras que el texto español principal usa una formulación que suena plural/general (''en sus manos'') y luego la justifica con el griego. La nota textual además dice erróneamente ''su mano'' en singular, cuando el propio inglés auditado habla de ''his hands''. El resto del sentido general sí se conserva: hay ocasiones en que el médico tiene éxito y también suplica a Dios.'
  spanish_quality_summary: El español es legible, pero 'prosperidad' en contexto médico suena menos natural y menos preciso que 'éxito' o 'buen resultado'. La estructura 'también en sus manos hay prosperidad' resulta algo rígida. Una redacción más natural y fiel es 'hay un tiempo en que el éxito está en sus manos'. 'suplicará a Dios' funciona bien y mantiene el matiz de ruego.
  glossary_alignment: 'No hay conflicto con la terminología teológica principal; ''Dios'' es correcto. El problema está en la alineación léxica con la decisión auditada: debía mantenerse el singular del hebreo en el texto principal y reservar el plural griego para la nota. También conviene ajustar מצלחת a ''éxito'' en vez de ''prosperidad'' por claridad contextual.'
  issues:
  - severity: high
    issue: El texto principal adopta de hecho el plural/general ('en sus manos') en vez del singular del hebreo seguido por el POB.
    rationale: La auditoría inglesa establece explícitamente que el texto principal sigue el testimonio hebreo singular ('his hands'), mientras que el griego plural queda en nota. El español debe reflejar esa misma decisión textual.
  - severity: medium
    issue: La nota textual dice 'su mano' en vez de 'sus manos'.
    rationale: 'El inglés auditado dice ''his hands'', y en español el idiomatismo correspondiente es plural: ''sus manos''. La nota actual introduce una imprecisión adicional.'
  - severity: medium
    issue: '''Prosperidad'' no comunica bien el sentido médico-contextual de מצלחת / εὐοδία.'
    rationale: En este contexto se trata de éxito o buen resultado del médico, no de prosperidad material o general. 'Éxito' suena más natural y preciso en español eclesial moderno.
  - severity: low
    issue: La sintaxis 'también en sus manos hay prosperidad' es poco natural en español.
    rationale: Una formulación como 'el éxito está en sus manos' preserva el modismo con mayor fluidez y claridad.
  revised_spanish_text: Porque hay un tiempo en que el éxito está en sus manos[a], pues él también suplicará a Dios.
  revised_footnotes:
  - marker: a
    text: 'El griego dice: «hay un tiempo en que el éxito también está en sus manos». El testimonio hebreo lee singular («sus manos»), y por eso el texto principal sigue ese testimonio.'
    reason: textual_variant
  revision_rationale: 'Se corrige el texto principal para seguir la decisión textual auditada: el hebreo singular se conserva en el cuerpo del versículo, mientras el plural griego queda en nota. Se reemplaza ''prosperidad'' por ''éxito'' para reflejar mejor el contexto médico y la decisión léxica del POB. También se corrige la nota, que había formulado mal el singular hebreo como ''su mano'' en vez de ''sus manos''.'
