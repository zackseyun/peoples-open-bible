  - marker: b
    text: '''Peoples'' renders Greek dēmōn, which may refer to civic groups, districts, or populations; the exact nuance is not fully certain from this verse alone.'
    reason: lexical_alternative
  - marker: c
    text: '''Penalty'' could also be rendered ''punishment'' or ''loss''; the Greek term can cover both punitive and damaging senses.'
    reason: lexical_alternative
