  - severity: low
    issue: Ubicación/espaciado incorrecto del marcador de nota
    rationale: El formato requerido pide que el marcador aparezca pegado al término o frase relevante. 'que [a]tomaras' introduce un espacio innecesario y ancla peor la nota.
