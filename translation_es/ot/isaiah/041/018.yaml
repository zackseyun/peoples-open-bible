  text: אֶפְתַּ֤ח עַל שְׁפָיִים֙ נְהָר֔וֹת וּ/בְ/ת֥וֹךְ בְּקָע֖וֹת מַעְיָנ֑וֹת אָשִׂ֤ים מִדְבָּר֙ לַ/אֲגַם מַ֔יִם וְ/אֶ֥רֶץ צִיָּ֖ה לְ/מוֹצָ֥אֵי מָֽיִם־־׃
base_translation:
  language: en
  yaml_path: translation/ot/isaiah/041/018.yaml
