translation:
  language: es
  text: Y los hijos de Judá fueron Er[a], Onán, Sela, Fares y Zéraj. Y Er y Onán murieron en la tierra de Canaán. Y los hijos de Fares fueron Hezrón y Hamul.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo usa un verbo singular con el sujeto compuesto «Er y Onán», una construcción normal del hebreo; el sentido en español es plural: «Er y Onán murieron».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְנֵי
  english_pob_choice: And the sons of
  chosen_spanish: Y los hijos de
  alternatives_spanish:
  - Los hijos de
  - Y los descendientes de
  lexicon: HALOT
  rationale: En este contexto genealógico, בנים expresa filiación directa. «Hijos de» conserva mejor la estructura constructa y la relación de lista que «descendientes de», que sería más amplio.
- source_word: יְהוּדָה
  english_pob_choice: Judah
  chosen_spanish: Judá
  alternatives_spanish:
  - Judá
  lexicon: HALOT
  rationale: Nombre propio bíblico estándar en español. Se mantiene la transliteración tradicional del nombre personal.
- source_word: עֵר
  english_pob_choice: Er
  chosen_spanish: Er
  alternatives_spanish:
  - Er
  lexicon: HALOT
  rationale: Nombre propio transliterado de forma estándar; no requiere adaptación semántica.
- source_word: אוֹנָן
  english_pob_choice: Onan
  chosen_spanish: Onán
  alternatives_spanish:
  - Onán
  lexicon: HALOT
  rationale: Nombre propio transliterado con acento gráfico español para respetar la pronunciación natural en español.
- source_word: שֵׁלָה
  english_pob_choice: Shelah
  chosen_spanish: Sela
  alternatives_spanish:
  - Shelá
  lexicon: HALOT
  rationale: Se adopta la forma breve y usual en español bíblico para este nombre, sin añadir una vocalización no sustentada por el uso hispano recibido.
- source_word: פֶרֶץ
  english_pob_choice: Perez
  chosen_spanish: Pérez
  alternatives_spanish:
  - Peretz
  - Fares
  lexicon: HALOT
  rationale: Se usa la forma hispana común del nombre propio. «Peretz» es más cercano al hebreo, pero menos idiomático en español; «Fares» es tradicional, aunque menos directo con el hebreo consonántico.
- source_word: זָרַח
  english_pob_choice: Zerah
  chosen_spanish: Zéraj
  alternatives_spanish:
  - Zéraj
  - Zérah
  lexicon: HALOT
  rationale: Se translitera de manera cercana al hebreo, manteniendo la fricativa final representada por j en español. Esto conserva mejor el sonido que una forma tradicional menos transparente.
- source_word: וַיָּמָת
  english_pob_choice: died
  chosen_spanish: murieron
  alternatives_spanish:
  - murió
  lexicon: HALOT
  rationale: Aunque el verbo hebreo aparece en singular con sujeto compuesto, el sentido es plural en español y la concordancia normal exige plural. Se preserva así el valor semántico sin calco rígido.
- source_word: בְּאֶרֶץ כְּנַעַן
  english_pob_choice: in the land of Canaan
  chosen_spanish: en la tierra de Canaán
  alternatives_spanish:
  - en Canaán
  lexicon: HALOT
  rationale: Se conserva explícitamente «tierra», como en el hebreo, porque forma parte de la expresión geográfica y no debe omitirse por economía estilística.
- source_word: וַיִּהְיוּ
  english_pob_choice: were
  chosen_spanish: fueron
  alternatives_spanish:
  - eran
  - llegaron a ser
  lexicon: HALOT
  rationale: En una genealogía, היה introduce identidad/listado de descendientes; «fueron» funciona aquí como verbo copulativo natural en español y mantiene la relación enumerativa.
- source_word: בְנֵי פֶרֶץ
  english_pob_choice: the sons of Perez
  chosen_spanish: los hijos de Pérez
  alternatives_spanish:
  - los descendientes de Pérez
  - los hijos de Peretz
  lexicon: HALOT
  rationale: Se mantiene la formulación inmediata de filiación. «Descendientes» ampliaría el alcance más allá del parentesco directo que exige la lista genealógica.
- source_word: חֶצְרוֹן
  english_pob_choice: Hezron
  chosen_spanish: Jesrón
  alternatives_spanish:
  - Jetrón
  - Hezrón
  lexicon: HALOT
  rationale: Se adopta una transliteración española que refleje la aspiración/jota hebrea y la acentuación natural del nombre en español.
- source_word: חָמוּל
  english_pob_choice: Hamul
  chosen_spanish: Jamul
  alternatives_spanish:
  - Hamul
  lexicon: HALOT
  rationale: Se translitera con j para reflejar la pronunciación aproximada de la gutural hebrea en español. «Hamul» sería menos transparente fonéticamente para lectores hispanos.
theological_decisions:
- issue: El verbo singular hebreo con sujeto compuesto («murió») frente a la concordancia natural plural en español
  english_pob_reading: 'The English POB notes that Hebrew uses a singular verb with the compound subject ''Er and Onan,'' but renders the sense plurally: ''Er and Onan died.'''
  chosen_spanish_reading: «Er y Onán murieron»
  alternative_spanish_readings:
  - «Er y Onán murió»
  - «Murió Er y Onán»
  rationale: No hay razón doctrinal para forzar el singular en español; la observación gramatical se preserva en la nota. La traducción debe comunicar con claridad el sentido plural que ya reconoció el POB en inglés.
  doctrine_reference: Gramática hebrea; sin implicación doctrinal
translation_notes:
  revision_awareness: El texto inglés revisado cambió la apertura de una lista nominal a una construcción copulativa con «were» para reflejar con más naturalidad el hebreo sin verbo explícito. En español se siguió esa misma decisión con «fueron», manteniendo la estructura genealógica. También se conservó la nota gramatical sobre el verbo singular hebreo con sujeto compuesto, trasladándola al español como aclaración útil sin alterar el flujo del versículo.
  spanish_consistency_notes:
  - Se mantuvo «hijos de» en las dos apariciones de la construcción constructa para conservar la simetría genealógica.
  - 'Se usaron formas hispanas de nombres propios con acento gráfico cuando ayuda a la pronunciación natural: Onán, Pérez, Zéraj, Jesrón, Jamul.'
  - Se evitó «SEÑOR» o equivalentes por tratarse de nombres personales y de una simple genealogía sin mención del nombre divino.
  - 'La puntuación sigue la cadencia de tres oraciones del original: lista, muerte en Canaán, y descendencia de Pérez.'
