translation:
  language: es
  text: Las naciones oyeron de él[a]; fue atrapado en su foso[b], y lo trajeron con ganchos[c] a la tierra de Egipto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse como «oyeron acerca de él». El hebreo permite la idea de recibir informes sobre alguien más que oírlo directamente.
    reason: alternative_reading
  - marker: b
    text: O «trampa». La imagen es la de un hoyo o fosa de caza usado para capturar.
    reason: lexical_alternative
  - marker: c
    text: «Con ganchos» puede aludir a ganchos o aros de sujeción usados para animales capturados o cautivos.
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּשְׁמְעוּ אֵלָיו
  english_pob_choice: heard of him
  chosen_spanish: oyeron de él
  alternatives_spanish:
  - oyeron acerca de él
  - oyeron de él mismo
  lexicon: HALOT
  rationale: El hebreo admite el sentido idiomático de recibir noticia o informe sobre alguien, no solo de oírlo directamente. «Oyeron de él» conserva esa relación idiomática sin volverla interpretativa en exceso.
- source_word: גּוֹיִם
  english_pob_choice: the nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - naciones
  - los pueblos
  lexicon: HALOT
  rationale: En este contexto profético, «las naciones» comunica de forma natural los pueblos extranjeros implicados en la imagen.
- source_word: בְּשַׁחְתָּם
  english_pob_choice: in their pit
  chosen_spanish: en su pozo
  alternatives_spanish:
  - en su foso
  - en su trampa
  lexicon: HALOT
  rationale: «שַׁחַת» puede referirse a un hoyo o foso de captura. «Pozo» mantiene la imagen concreta del texto y permite que la función de captura se entienda por el contexto.
- source_word: נִתְפָּשׂ
  english_pob_choice: was caught
  chosen_spanish: fue atrapado
  alternatives_spanish:
  - fue capturado
  - fue apresado
  lexicon: HALOT
  rationale: La pasiva del nifal expresa que cayó en manos ajenas; «fue atrapado» encaja con la imaginería de caza y con el pozo anterior.
- source_word: וַיְבִאֻהוּ
  english_pob_choice: they brought him
  chosen_spanish: lo trajeron
  alternatives_spanish:
  - lo llevaron
  - lo condujeron
  lexicon: HALOT
  rationale: El hifil de בוא significa «traer». «Lo trajeron» reproduce la relación verbal sin añadir matices no explicitados.
- source_word: בַחַחִים
  english_pob_choice: with hooks
  chosen_spanish: con ganchos
  alternatives_spanish:
  - con garfios
  - con anillos
  lexicon: HALOT
  rationale: El término designa implementos de sujeción para animales o cautivos. «Ganchos» es una equivalencia clara y natural en español; «garfios» es más fuerte, pero menos general.
- source_word: אֶל אֶרֶץ מִצְרָיִם
  english_pob_choice: to the land of Egypt
  chosen_spanish: a la tierra de Egipto
  alternatives_spanish:
  - al país de Egipto
  - a Egipto
  lexicon: HALOT
  rationale: «Tierra de Egipto» conserva la fórmula geográfica del hebreo y su tono bíblico sin perder inteligibilidad.
translation_notes:
  revision_awareness: El borrador sigue de cerca la lectura revisada del POB en inglés que prefirió «heard of him» por encima de «heard about him», y mantiene la tensión léxica de «pit» y «hooks» con equivalentes españoles transparentes.
  spanish_consistency_notes:
  - Se usa «las naciones» para גּוֹיִם, consistente con el registro profético.
  - Se conserva la metáfora concreta del pozo/foso en vez de una abstracción como «trampa» en el texto principal.
  - «Tierra de Egipto» mantiene la fórmula territorial bíblica sin sustituirla por un simple topónimo.
