translation:
  language: es
  text: Y cubrirá la superficie de la tierra[a], de modo que no se podrá ver la tierra; y comerá el resto de lo que escapó, lo que les quedó del granizo[b], y comerá todo árbol que crece para ustedes del campo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, 'el ojo de la tierra', un modismo hebreo para la superficie visible de la tierra.
    reason: lexical_alternative
  - marker: b
    text: 'O: ''el remanente de lo que escapó, lo que les quedó del granizo''.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְכִסָּה
  english_pob_choice: And it will cover
  chosen_spanish: y cubrirá
  alternatives_spanish:
  - y cubrirá por completo
  - y cubrirá
  lexicon: HALOT
  rationale: כסה expresa cubrir o tapar. En español, 'cubrirá' comunica de manera natural el verbo hebreo sin perder el sentido prospectivo del anuncio.
- source_word: עֵין הָאָרֶץ
  english_pob_choice: the surface of the land
  chosen_spanish: la superficie de la tierra
  alternatives_spanish:
  - el ojo de la tierra
  - la faz de la tierra
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente 'el ojo de la tierra', pero es un modismo para la parte visible o externa. 'La superficie de la tierra' transmite el sentido idiomático con claridad en español.
- source_word: וְלֹא יוּכַל לִרְאֹת אֶת הָאָרֶץ
  english_pob_choice: so that one will not be able to see the land
  chosen_spanish: de modo que no se podrá ver la tierra
  alternatives_spanish:
  - y no se podrá ver la tierra
  - de modo que nadie podrá ver la tierra
  lexicon: HALOT
  rationale: El hebreo usa un giro impersonal. 'No se podrá ver' preserva ese valor impersonal y suena natural en español, sin imponer un sujeto inexistente.
- source_word: וְאָכַל
  english_pob_choice: and it will eat
  chosen_spanish: y comerá
  alternatives_spanish:
  - y consumirá
  - y devorará
  lexicon: HALOT
  rationale: אכל es el verbo común 'comer'. 'Comerá' mantiene la concreción del original mejor que una paráfrasis como 'consumirá'.
- source_word: יֶתֶר הַפְּלֵטָה
  english_pob_choice: the rest of what has escaped
  chosen_spanish: el resto de lo que haya escapado
  alternatives_spanish:
  - el remanente de lo que escapó
  - lo que queda de lo que escapó
  lexicon: HALOT
  rationale: La combinación hebrea une 'resto' con la idea de algo que escapó. 'El resto de lo que haya escapado' conserva esa doble capa sin convertirla en lenguaje teológico artificial.
- source_word: הַנִּשְׁאֶרֶת לָכֶם מִן הַבָּרָד
  english_pob_choice: which remains to you from the hail
  chosen_spanish: lo que quedó para ustedes después del granizo
  alternatives_spanish:
  - que les quedó del granizo
  - lo que permanece para ustedes del granizo
  lexicon: HALOT
  rationale: La forma participial indica algo que permanece para ellos a causa del granizo. 'Lo que quedó para ustedes después del granizo' comunica bien el resultado y evita una construcción demasiado literal.
- source_word: כָּל הָעֵץ
  english_pob_choice: every tree
  chosen_spanish: todo árbol
  alternatives_spanish:
  - cada árbol
  - todos los árboles
  lexicon: HALOT
  rationale: El distributivo hebreo puede expresarse en singular genérico en español. 'Todo árbol' suena más natural que una pluralización innecesaria.
- source_word: הַצֹּמֵחַ לָכֶם מִן הַשָּׂדֶה
  english_pob_choice: growing for you out of the field
  chosen_spanish: que crece para ustedes en el campo
  alternatives_spanish:
  - que brota para ustedes del campo
  - que crece para ustedes del campo
  lexicon: HALOT
  rationale: צמח denota crecer o brotar. 'Que crece' es directo y fiel; 'para ustedes' preserva el dativo de beneficio/posesión, y 'en el campo' da un equivalente natural de la procedencia agrícola del hebreo.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión auditada que corrigió una redacción inglesa previa demasiado torpe para יֶתֶר הַפְּלֵטָה הַנִּשְׁאֶרֶת; por eso el español sigue la lectura revisada de 'el resto de lo que haya escapado, lo que quedó para ustedes después del granizo'.
  spanish_consistency_notes:
  - Se conservó el sujeto singular colectivo implícito en 'cubrirá' y 'comerá', acorde con el hebreo.
  - Se evitó 'SEÑOR' porque no aparece en este versículo; tampoco hay necesidad de introducir terminología teológica adicional.
  - '''Tierra'' se usó de forma consistente para אָרֶץ, como en el paralelismo del verso.'
  - '''Granizo'' traduce בָּרָד en sentido literal y mantiene el referente concreto del juicio descrito.'
