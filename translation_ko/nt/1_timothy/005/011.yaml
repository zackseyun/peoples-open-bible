id: 1TI.5.11
reference: 1 Timothy 5:11
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: νεωτέρας δὲ χήρας παραιτοῦ· ὅταν γὰρ καταστρηνιάσωσιν τοῦ Χριστοῦ, γαμεῖν θέλουσιν,
base_translation:
  language: en
  yaml_path: translation/nt/1_timothy/005/011.yaml
  text: But refuse younger widows[a], for when they become sensual against the Messiah, they desire to marry[c][b],
  footnotes:
  - marker: a
    text: Or, more explicitly, 'when they become sensual' or 'when their passions draw them away.'
    reason: lexical_alternative
  - marker: b
    text: Greek 'against the Messiah'; the sense may be that their desires come into conflict with prior devotion or commitment to him. Traditional English often has 'against Christ.'
    reason: alternative_reading
  - marker: c
    text: Or 'grow wanton against the Messiah'.
    reason: previous_rendering
translation:
  language: ko
  text: 그러나 젊은 과부들은 거절하십시오. 그들은 메시아[b]를 거슬러 정욕에 사로잡힐 때면[a] 시집가기를 원하여,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 보다 명시적으로 「정욕에 사로잡힐 때」 「욕망에 끌려갈 때」.
    reason: lexical_alternative
  - marker: b
    text: 헬라어는 「메시아를 거슬러」. 그 의미는 그들의 욕망이 이전의 헌신·서원과 충돌하게 됨을 가리키는 것으로 보인다. 전통적 영어 번역은 흔히 「그리스도를 거슬러」.
    reason: alternative_reading
lexical_decisions:
- source_word: νεωτέρας χήρας παραιτοῦ
  english_pob_choice: refuse younger widows
  chosen_korean: 젊은 과부들은 거절하십시오
  alternatives_korean:
  - 젊은 과부들은 명부에 올리지 마십시오
  - 젊은 과부들은 사양하십시오
  lexicon: BDAG
  rationale: παραιτέομαι의 「거절·사양」. 9절의 등록 문맥에서 「거절」.
- source_word: καταστρηνιάσωσιν τοῦ Χριστοῦ
  english_pob_choice: become sensual against the Messiah
  chosen_korean: 메시아를 거슬러 정욕에 사로잡힐 때
  alternatives_korean:
  - 메시아에게 등을 돌리고 욕망에 휘둘릴 때
  - 그리스도를 거슬러 향락에 빠질 때
  lexicon: BDAG
  rationale: καταστρηνιάω는 강조 합성. κατά + 속격은 「~를 거슬러」의 어감. 「메시아를 거슬러 정욕에 사로잡힐 때」가 본문의 비판적 어조를 살린다.
- source_word: γαμεῖν θέλουσιν
  english_pob_choice: they desire to marry
  chosen_korean: 시집가기를 원하여
  alternatives_korean:
  - 결혼하기를 바라며
  lexicon: BDAG
  rationale: 본 문맥은 여자 과부이므로 「시집가다」가 자연스럽다.
