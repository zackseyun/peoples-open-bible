translation:
  language: es
  text: ¿No expulsaste tú, nuestro Dios, a los habitantes de esta tierra de delante de tu pueblo Israel, y la diste para siempre a la descendencia de Abraham, tu amigo[a]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «el que te amó».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲלֹא
  english_pob_choice: Did you not
  chosen_spanish: ¿No eres tú... quien... ?
  alternatives_spanish:
  - ¿Acaso no... ?
  - ¿No fuiste tú... ?
  lexicon: HALOT
  rationale: La pregunta hebrea es retórica y espera una respuesta afirmativa. En español, la construcción interrogativa con «¿No eres tú...?» conserva ese valor de apelación directa en oración sin sonar forzada. Mantiene también el énfasis en el sujeto divino.
- source_word: אֱלֹהֵינוּ
  english_pob_choice: our God
  chosen_spanish: nuestro Dios
  alternatives_spanish:
  - oh, nuestro Dios
  - Dios nuestro
  lexicon: HALOT
  rationale: Es vocativo en contexto de oración. «Nuestro Dios» reproduce el posesivo directo sin añadir una interjección que el hebreo no exige.
- source_word: הוֹרַשְׁתָּ
  english_pob_choice: drive out
  chosen_spanish: expulsó
  alternatives_spanish:
  - desposeyó
  - ahuyentó
  lexicon: HALOT
  rationale: El causativo de ירשׁ expresa hacer perder la posesión a los anteriores ocupantes, en contexto de conquista. «Expulsó» comunica bien la idea de sacar a los habitantes de la tierra en español actual, sin perder el sentido de desalojo forzoso.
- source_word: יֹשְׁבֵי הָאָרֶץ הַזֹּאת
  english_pob_choice: the inhabitants of this land
  chosen_spanish: los habitantes de esta tierra
  alternatives_spanish:
  - los que habitaban esta tierra
  - los moradores de esta tierra
  lexicon: HALOT
  rationale: La expresión nominal constructa se traduce de forma natural y exacta como «los habitantes de esta tierra». «Habitantes» conserva el valor colectivo y el referente territorial.
- source_word: מִלִּפְנֵי
  english_pob_choice: before
  chosen_spanish: de delante de
  alternatives_spanish:
  - de la presencia de
  - ante
  lexicon: HALOT
  rationale: En contexto de conquista, la locución implica remoción de la presencia o frente de alguien. «De delante de» reproduce bien el idiomatismo bíblico y mantiene la imagen espacial del texto fuente.
- source_word: עַמְּךָ יִשְׂרָאֵל
  english_pob_choice: your people Israel
  chosen_spanish: tu pueblo Israel
  alternatives_spanish:
  - Israel, tu pueblo
  - tu pueblo, Israel
  lexicon: HALOT
  rationale: Se conserva el orden natural en español con la aposición «Israel» después de «tu pueblo», preservando el designativo pactal.
- source_word: וַתִּתְּנָהּ
  english_pob_choice: and give it
  chosen_spanish: y la dio
  alternatives_spanish:
  - y la entregaste
  - y se la diste
  lexicon: HALOT
  rationale: El verbo expresa otorgar la tierra como don. En español, «la dio» mantiene la acción divina con sobriedad y evita añadir matices no requeridos por el hebreo. Se sobreentiende el sujeto por el contexto y la forma interrogativa previa.
- source_word: לְזֶרַע אַבְרָהָם
  english_pob_choice: to the offspring of Abraham
  chosen_spanish: a la descendencia de Abraham
  alternatives_spanish:
  - a la simiente de Abraham
  - a los descendientes de Abraham
  lexicon: HALOT
  rationale: זֶרַע es un colectivo singular. «Descendencia» conserva esa unidad colectiva mejor que el plural, y es más natural en español que «simiente».
- source_word: אֹהַבְךָ
  english_pob_choice: your friend
  chosen_spanish: tu amigo
  alternatives_spanish:
  - el que te amó
  - el que te ama
  lexicon: HALOT
  rationale: El participio de אהב tiene aquí valor relacional/covenantal; la tradición bíblica identifica a Abraham como el amigo de Dios. «Tu amigo» preserva esa lectura establecida en un español claro, sin borrar la base verbal del hebreo.
- source_word: לְעוֹלָם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - eternamente
  - por siempre
  lexicon: HALOT
  rationale: La fórmula temporal expresa duración indefinida y permanente en la promesa. «Para siempre» es la equivalencia española más natural y fiel al contexto de pacto.
theological_decisions:
- issue: Epíteto de Abraham en אֹהַבְךָ
  english_pob_reading: your friend
  chosen_spanish_reading: tu amigo
  alternative_spanish_readings:
  - el que te amó
  - el que te ama
  rationale: Se conserva la lectura relacional tradicional sin ocultar que el hebreo contiene un participio verbal de amar. La traducción principal evita perder la referencia intertextual de Abraham como amigo de Dios, mientras que la alternativa más literal queda señalada en el sistema de decisiones.
  doctrine_reference: Translation philosophy §3 (preservar tensión léxica/teológica genuina)
- issue: Nombre divino en oración directa
  english_pob_reading: our God
  chosen_spanish_reading: nuestro Dios
  alternative_spanish_readings:
  - oh, nuestro Dios
  - Dios nuestro
  rationale: En este versículo no hay necesidad de sustituir el nombre divino por un título en mayúsculas. La forma posesiva directa mantiene el tono de súplica y reconocimiento del pacto sin introducir un tratamiento litúrgico ajeno al hebreo.
  doctrine_reference: 'Terminología POB: consistencia con el texto fuente y con la oración directa'
translation_notes:
  revision_awareness: El borrador sigue de cerca el paquete fuente hebreo y el rastro auditado en inglés. Se preservó la pregunta retórica, el valor causativo de הוֹרַשְׁתָּ, el colectivo de זֶרַע y la tensión relacional/verbal de אֹהַבְךָ con una nota alternativa literal. No se detectaron revisiones inglesas posteriores que alteren el sentido base.
  spanish_consistency_notes:
  - Se usó «Dios» y no «SEÑOR», conforme al nombre divino en la fuente.
  - Se prefirió «descendencia» para זֶרַע por su valor colectivo singular y su naturalidad en español.
  - Se mantuvo «tu amigo» como lectura principal para Abraham, con nota alternativa literal.
  - La puntuación interrogativa española se ajustó al tono retórico del hebreo.
