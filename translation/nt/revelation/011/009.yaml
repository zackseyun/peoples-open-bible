theological_decisions:
- issue: Singular πτῶμα in the first clause versus plural πτώματα in the second clause
  chosen_reading: Preserve the singular in the first clause ('their dead body') and the plural in the second ('their bodies')
  alternative_readings:
  - Harmonize both clauses to plural in English for smoother style
  - Interpret the singular collectively and render more dynamically as 'their bodies' throughout
  rationale: The Greek text itself presents the variation, and the translation philosophy calls for preserving meaningful textual features rather than smoothing them away. Retaining the singular first clause may reflect the witnesses viewed corporately, while the plural second clause refers to them individually. The translation keeps this tension visible.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather than resolve it.
