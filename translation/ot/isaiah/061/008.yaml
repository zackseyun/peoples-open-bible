id: ISA.61.8
reference: Isaiah 61:8
source:
  edition: WLC
  text: כִּ֣י אֲנִ֤י יְהוָה֙ אֹהֵ֣ב מִשְׁפָּ֔ט שֹׂנֵ֥א גָזֵ֖ל בְּ/עוֹלָ֑ה וְ/נָתַתִּ֤י פְעֻלָּתָ/ם֙ בֶּ/אֱמֶ֔ת וּ/בְרִ֥ית עוֹלָ֖ם אֶכְר֥וֹת לָ/הֶֽם׃
translation:
  text: For I[a], Yahweh, love justice; I hate robbery with burnt offering. And I will give them their recompense in faithfulness[c][b], and I will cut an everlasting covenant with them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'robbery in a burnt offering,' 'robbery for a burnt offering,' or possibly 'robbery with wrongdoing.' The Hebrew phrase is difficult and may refer to stolen goods brought as offerings or to injustice mixed with worship.
    reason: alternative_reading
  - marker: b
    text: Or 'their reward' or 'their wage.'
    reason: lexical_alternative
  - marker: c
    text: 'Hebrew idiom: ''cut a covenant,'' that is, make a covenant.'
    reason: cultural_note
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving covenantal sense while matching established English Bible convention.
- source_word: מִשְׁפָּט
  chosen: justice
  alternatives:
  - judgment
  - what is right
  lexicon: HALOT
  rationale: In this context of ethical contrast with robbery, 'justice' best conveys the social-moral sense of mishpat rather than courtroom 'judgment' alone.
- source_word: גָזֵל
  chosen: robbery
  alternatives:
  - plunder
  - stolen goods
  lexicon: HALOT
  rationale: The noun denotes violent or wrongful seizure; 'robbery' is the most natural concise English equivalent here.
- source_word: בְּעוֹלָה
  chosen: with burnt offering
  alternatives:
  - in a burnt offering
  - for a burnt offering
  lexicon: HALOT
  rationale: The preposition ב here is difficult. 'With burnt offering' preserves the compact Hebrew and the likely sense that the robbery is associated with sacrificial worship, without over-interpreting the exact relation.
- source_word: פְעֻלָּתָם
  chosen: their recompense
  alternatives:
  - their wage
  - their reward
  - their work
  lexicon: HALOT
  rationale: Given the following promise 'in faithfulness' and covenant context, the sense is what God gives them as due recompense/reward, not their labor itself.
- source_word: בֶּאֱמֶת
  chosen: in faithfulness
  alternatives:
  - in truth
  - faithfully
  lexicon: HALOT
  rationale: The phrase modifies God's giving; 'in faithfulness' captures both reliability and truthfulness, fitting covenant language better than the flatter 'in truth.'
- source_word: בְרִית עוֹלָם
  chosen: an everlasting covenant
  alternatives:
  - an eternal covenant
  lexicon: HALOT
  rationale: Standard and natural rendering of the covenant formula; 'everlasting' fits biblical covenant diction in English.
- source_word: אֶכְרֹת
  chosen: I will cut
  alternatives:
  - I will make
  lexicon: HALOT
  rationale: Hebrew idiom is literally 'cut a covenant.' The main text preserves this idiom for transparency, while remaining understandable in context.
