translation:
  language: es
  text: Pero los hombres sin ley[a] volvieron, amenazando entre sí y acechando para darle muerte. Y cuando llegaron a la asamblea de la ciudad, no estaban ausentes[b], y se reunieron todos los hijos de Israel que estaban allí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los hombres sin ley». El griego dice literalmente «los sin ley», con valor moral y legal.'
    reason: lexical_alternative
  - marker: b
    text: La cláusula griega es difícil; el sentido probable es que estaban presentes en la asamblea de la ciudad, no que estuvieran ausentes de ella.
    reason: textual_variant
lexical_decisions:
- source_word: παράνομοι
  english_pob_choice: lawless
  chosen_spanish: sin ley
  alternatives_spanish:
  - malvados
  - ilegales
  lexicon: BDAG
  rationale: «Sin ley» conserva el valor legal-moral de παράνομοι mejor que un término más general como «malvados». Evita también sugerir solo una cualidad ética abstracta cuando el griego apunta a actuar contra la ley.
- source_word: ἀπέστρεψαν
  english_pob_choice: turned back
  chosen_spanish: se volvieron
  alternatives_spanish:
  - volvieron
  - regresaron
  lexicon: BDAG
  rationale: «Se volvieron» reproduce bien el movimiento narrativo sin añadir más dirección de la que el verbo exige. «Regresaron» sería posible, pero suena más interpretativo en este contexto.
- source_word: ἀπειλοῦντες ἐν ἑαυτοῖς
  english_pob_choice: threatening among themselves
  chosen_spanish: amenazando entre sí
  alternatives_spanish:
  - haciéndose amenazas entre sí
  - amenazando interiormente
  lexicon: BDAG
  rationale: La frase griega es algo irregular; «entre sí» preserva la idea de una amenaza mutua o conspirativa sin forzar una lectura psicológica que el texto no especifica.
- source_word: ἐνεδρεύοντες
  english_pob_choice: lying in wait
  chosen_spanish: acechando
  alternatives_spanish:
  - emboscados
  - poniéndose al acecho
  lexicon: BDAG
  rationale: «Acechando» mantiene la hostilidad oculta y la idea de una emboscada. En español es más natural que un calco como «yendo al acecho» y no pierde la fuerza concreta del participio.
- source_word: ἵνα θανατώσωσιν αὐτήν
  english_pob_choice: in order to put her to death
  chosen_spanish: para darle muerte
  alternatives_spanish:
  - para matarla
  - a fin de darle muerte
  lexicon: BDAG
  rationale: «Para darle muerte» conserva el tono más formal y judicial del griego y del contexto de Susana, sin suavizarlo con una paráfrasis. También mantiene el sentido intencional de ἵνα.
- source_word: συναγωγὴν τῆς πόλεως
  english_pob_choice: assembly of the city
  chosen_spanish: la asamblea de la ciudad
  alternatives_spanish:
  - la reunión de la ciudad
  - el consejo de la ciudad
  lexicon: BDAG
  rationale: «Asamblea» sigue la decisión inglesa y evita identificar anacrónicamente el término con una sinagoga edilicia. El genitivo «de la ciudad» conserva el carácter cívico del encuentro.
- source_word: οὐ παρῴκουν
  english_pob_choice: they were not absent
  chosen_spanish: no estaban ausentes
  alternatives_spanish:
  - no se habían apartado
  - no faltaron
  lexicon: LSJ
  rationale: La cláusula es difícil; «no estaban ausentes» sigue la lectura auditada del inglés y conserva la idea de presencia en la asamblea sin sobretraducir un texto semánticamente inestable.
- source_word: συνήδρευσαν
  english_pob_choice: gathered together
  chosen_spanish: se reunieron
  alternatives_spanish:
  - se congregaron
  - se sentaron juntos
  lexicon: LSJ
  rationale: «Se reunieron» expresa la acción colectiva en español natural y mantiene el sentido de concurrir en sesión. «Se congregaron» sería también posible, pero tiene un matiz más religioso que no está en el griego.
- source_word: οἱ υἱοὶ Ἰσραήλ
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Jacob
  lexicon: BDAG
  rationale: Se conserva la expresión masculina e idiomática del griego, siguiendo la decisión auditada de mantener el giro familiar explícito. «Los israelitas» suavizaría la forma fuente y neutralizaría su formulación.
theological_decisions:
- issue: Designación étnica masculina explícita
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - los hijos de Jacob
  rationale: El texto griego usa una expresión filial masculina concreta; se preserva en español para no perder el rasgo formal y la política de precisión de género del proyecto. La alternativa «los israelitas» sería idiomática, pero borra la formulación exacta del original.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: 'Se siguió la última revisión inglesa que afinó ἵνα θανατώσωσιν como «in order to put her to death» y οὐ παρῴκουν como «they were not absent». La redacción española refleja esa misma cautela: se optó por una solución formal, pero se marcó la dificultad textual en nota para no ocultar la ambigüedad del griego.'
  spanish_consistency_notes:
  - Se mantuvo «asamblea de la ciudad» para συναγωγή, evitando «sinagoga» por anacronismo en este contexto cívico.
  - Se prefirió «darle muerte» frente a «matarla» por el tono más judicial del pasaje, en línea con el audit trail inglés.
  - Se conservó la expresión «hijos de Israel» por coherencia con la política de precisión de género y con el griego explícito.
