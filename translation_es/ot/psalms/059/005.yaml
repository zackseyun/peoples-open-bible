revisions:
- from: Sin culpa[a], ellos corren y se ponen en posición; despierta para salir a mi encuentro y mira.
  to: Sin culpa[a], ellos corren y se ponen en su lugar; despierta para encontrarme y mira.
  rationale: Se ajusta «para salir a mi encuentro» a «para encontrarme» para evitar añadir un matiz no explícito en el hebreo, y se reemplaza «se ponen en posición» por «se ponen en su lugar» para una expresión más natural que aún preserve la idea de establecerse o tomar posición. Se mantiene la nota léxica alternativa porque sigue siendo pertinente para וְיִכּוֹנָנוּ.
