translation:
  language: es
  text: Y que sean avergonzados todos los que hacen[b] mal a tus esclavos[a], y que sean deshonrados en todo su dominio[c], y que su fuerza sea quebrantada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tus siervos». El griego dice «tus esclavos» (τοῖς δούλοις σου), subrayando la pertenencia a Dios.
    reason: alternative_reading
  - marker: b
    text: O «los que infligen mal a tus esclavos». El participio griego significa literalmente «los que muestran mal» hacia ellos.
    reason: lexical_alternative
  - marker: c
    text: La frase «en todo su dominio» también puede entenderse de modo más libre como «en todo su poder» o «a pesar de todo su dominio».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐντραπείησαν
  english_pob_choice: be put to shame
  chosen_spanish: sean avergonzados
  alternatives_spanish:
  - sean puestos en vergüenza
  - sean confundidos
  lexicon: LSJ
  rationale: El optativo aoristo pasivo está en contexto de súplica; en español, «sean avergonzados» conserva el valor de deseo/jussivo y la vergüenza pública mejor que una forma más interna como «se avergüencen».
- source_word: οἱ ἐνδεικνύμενοι
  english_pob_choice: those who show
  chosen_spanish: los que hacen
  alternatives_spanish:
  - los que muestran
  - los que manifiestan
  - los que infligen
  lexicon: LSJ
  rationale: El participio medio con κακά hacia los siervos de Dios expresa acción hostil. «Hacen mal» comunica el daño intencional sin forzar demasiado hacia «infligen», que interpretaría con más fuerza que el griego base.
- source_word: κακά
  english_pob_choice: evil
  chosen_spanish: mal
  alternatives_spanish:
  - maldad
  - males
  - cosas malas
  lexicon: LSJ
  rationale: El plural neutro puede abarcar males o acciones malas. «Mal» preserva la amplitud semántica y suena natural en español bíblico sin reducirlo solo a daño físico.
- source_word: τοῖς δούλοις σου
  english_pob_choice: your slaves
  chosen_spanish: tus esclavos
  alternatives_spanish:
  - tus siervos
  lexicon: LSJ
  rationale: Se conserva «esclavos» porque δοῦλος marca pertenencia vinculante a Dios y el proyecto POB privilegia esa fuerza léxica cuando es teológicamente relevante. En español, «siervos» suavizaría indebidamente el término.
- source_word: καταισχυνθείησαν
  english_pob_choice: be disgraced
  chosen_spanish: sean deshonrados
  alternatives_spanish:
  - sean avergonzados
  - queden humillados
  lexicon: LSJ
  rationale: Para mantener el paralelismo con «sean avergonzados» sin repetir exactamente la misma expresión, «sean deshonrados» refleja la vergüenza pública y el menosprecio externo.
- source_word: ἀπὸ πάσης τῆς δυναστείας
  english_pob_choice: from all their dominion
  chosen_spanish: por todo su dominio
  alternatives_spanish:
  - desde todo su dominio
  - en todo su poder
  - a causa de todo su dominio
  lexicon: LSJ
  rationale: La preposición ἀπό admite una relación de separación o esfera; en español, «por todo su dominio» transmite que su vergüenza queda abarcada por completo en relación con su poder, sin exagerar hacia «tiranía».
- source_word: ἰσχύς
  english_pob_choice: strength
  chosen_spanish: fuerza
  alternatives_spanish:
  - poder
  - fortaleza
  lexicon: LSJ
  rationale: «Fuerza» es el equivalente más directo y funciona bien con el pasivo final «sea quebrantada».
- source_word: συντριβείη
  english_pob_choice: be broken
  chosen_spanish: sea quebrantada
  alternatives_spanish:
  - sea rota
  - sea destrozada
  - sea aplastada
  lexicon: LSJ
  rationale: El optativo pasivo mantiene el tono de petición. «Sea quebrantada» conserva la imagen de ruptura decisiva y es idiomático en español bíblico.
theological_decisions:
- issue: Rendering of δοῦλοι in address to God
  english_pob_reading: your slaves
  chosen_spanish_reading: tus esclavos
  alternative_spanish_readings:
  - tus siervos
  rationale: La oración enfatiza la pertenencia total del pueblo a Dios bajo persecución. Dado el criterio doctrinal del proyecto para δοῦλος, «esclavos» mantiene la fuerza relacional y teológica que se perdería con «siervos».
  doctrine_reference: 'DOCTRINE.md: tabla de términos controvertidos para δοῦλος; Translation philosophy §1'
translation_notes:
  revision_awareness: El audit trail en inglés muestra una oscilación revisada entre «slaves» y «servants», con restauración final de «slaves» por coherencia doctrinal. La versión española sigue la lectura final auditada y conserva la tensión léxica sin suavizarla. También respeta la distinción entre los dos verbos de vergüenza (ἐντραπείησαν / καταισχυνθείησαν) y la ambigüedad de ἀπὸ πάσης τῆς δυναστείας.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando aparezca el Tetragrámaton; este versículo no lo contiene.
  - 'Se conserva el paralelismo de súplica con subjuntivo/jussivo en español: «sean...».'
  - Se evita sustituir «esclavos» por «siervos» para no borrar la fuerza léxica de δοῦλος.
  - «Dominio» se mantiene para δυναστεία, con nota de posibles matices de poder o autoridad.
