  rows:
  - verse: 1
    geez: ወኮነ፡ እምድኅረ፡ ሞተ፡ አብርሃም፡ ባረኮ፡ እግዚአብሔር፡ ለይስሐቅ፡ ወልዱ፡ ወተንሥአ፡ እምኬብሮን፡ ወሖረ፡ ወኀደረ፡ ኀበ፡ ዐዘቅተ፡ ራእይ፡ በዓመት፡ አሐዱ፡ ዘሣልስ፡ ሱባዔ፡ ዘዝ፡
  - verse: 2
    geez: እዮቤሌው፡ ሰብዓተ፡ ዓመተ። ወበዓመት፡ አሐዱ፡ ዘሱባዔ፡ ራብዕ፡ ጸንከ፡ ዐባር፡ ውስተ፡
  - verse: 3
    geez: ምድር፡ ዘእንበለ፡ ቀዳማዊ፡ ዐባር፡ ዘኮነ፡ በመዋዕለ፡ አብርሃም። ወአብሰለ፡ ያዕቆብ፡ ተብሰለ፡ ብርስን፡ ወመጽአ፡ ዔሳው፡ እምሐቅል፡ ርኁብ፡ ወይቤሎ፡ ለያዕቆብ፡ አኅሁ፡ ሀበኒ፡ እምዝ፡ ተብሰል፡ ዘሥርናይ፡ ወይቤ*ሎ፡ ያዕቆብ፡ አግብእ፡ ሊተ፡ ልህቃኒከ፡ ዘቅድመ፡ ልደት፡
  - verse: 4
    geez: ወአነ፡ እሁበከ፡ ኅብስተ፡ ወእምዝኒ፡ ተብሰለ፡ ብርስን። ወይቤ፡ ዔሳው፡ በልቡ፡ አነ፡ እመውት፡
  - verse: 5
    geez: ለምንት፡ ሊተ፡ ዝቀዳሙ፡ ትውልድ፡ ወይቤሎ፡ ለያዕቆብ፡ ወሀብኩከ። ወ*ይቤ፡ ያዕቆብ፡
  - verse: 6
    geez: መሐል፡ ሊተ፡ ዮም፡ ወመሐለ፡ ሎቱ። ወወሀቦ፡ ያዕቆብ፡ ለ*አኁሁ፡ ዔሳው፡ ኅብስተ፡ ወተብሰለ፡ ወበልዐ፡ እስከ፡ ይጸግብ፡ ወመጠ፡ ዔሳው፡ *ቀዳሙ፡ ትውልዶ፡ በእንተዝ፡ ተሰምየ፡ ስሙ፡ [ዔሳው፡] ኤዶም፡ በእንተ፡ ተብሰለ፡ ስርናይ፡ ዘ*ወሀቦ፡ ያዕቆብ፡ በ*ቅድመተ፡ ልደቱ።
  - verse: 7
    geez: ወአህቀ፡ ይዕቀብ፡ ወኀለወ*ሱ፡ ትእዛዘ፡ እምዐበየ። ወኮነ፡ ዐባር፡ ዲበ፡ ምድር፡ ወመጽአ፡
  - verse: 8
    geez: ይስሐቅ፡ ይረድ፡ ግብጸ፡ በካልእ፡ ዓመት፡ ዘዝ፡ ሱባዔ፡ ወሖረ፡ ኀበ፡ ንጉሠ፡ ፍልስጥኤም፡ ጌራርገ፡ ኀበ፡ አቤሜሌክ።
  - verse: 9
    geez: ወአስተርአዮ፡ እግዚአብሔር፡ ወይቤ*ሎ፡ ኢትረድ፡ ግብጸ፡ ንበር፡ ውስተ፡ ምድር፡ እንተ፡ አነ፡ እብለከ፡ ወ*ፍልስ፡ ውስተ፡ ይእቲ፡ ምድር፡ ወእሄሉ፡ ምስሌከ፡ ወእባርከከ። እስመ፡ ለከ፡
  - verse: 10
    geez: ወለዘርእከ፡ እሁብ፡ ዛተ፡ ምድረ፡ ኵላ፡ ወአቀውም፡ መሐላ*የ፡ ዘመሐልኩ፡ ለአብርሃም፡ አቡከ፡ ወአበዝኅ፡ ዘርአከ፡ ከመ፡ ከዋክብተ፡ ሰማይ፡ ወእሁብ፡ ለዘርእከ፡ ኵላ፡ ዛተ፡ ምድረ። ወይትባረኩ፡
  - verse: 11
    geez: በዘርእከ፡ ኵሎሙ፡ አሕዛበ፡ ምድር፡ ህየንተ፡ ዘ*ሰምዐ፡ አቡከ፡ *ቃለ፡ ዚአየ፡ ወዐቀበ፡ ዑቃቤየ፡ ወትእዛዛ*ትየ፡ ወሕገጊየ፡ ወሥርዐትየ፡ ወኪዳንየ፡ ወይእዜኒ፡ ስማዕ፡ ቃለየ፡ ወኀድር፡ ውስተ፡ ዛምድር። ወኀደረ፡ ጌራርገ፡ ሠለስተ፡ ሱባዔ፡ ዓመት። ወአዘዘ፡ አቤሜሌክ፡ በእንቲአሁ፡
  - verse: 12
    geez: '*ወበእንተ፡ ኵሉ፡ ዘዚአሁ፡ እንዘ፡ ይብል፡ ኵሉ፡ ሰብእ፡ ዘይሰክፎ፡ *ወለኵሉ፡ ዘዚአሁ፡'
  - verse: 13
    geez: ሞተ፡ ለ*ይሙት። ወአህቀ፡ ይስሐቅ፡ በፍልስጥኤም፡ ወኮነ፡ ሎቱ፡ ጥሪት፡ ብዙኅ፡
  - verse: 14
    geez: አልህም*ተ፡ ወአባግዐ፡ ወአግማለ፡ ወአእዱገ፡ ወ*ጥሪት፡ ብዙኅ። ወዘርአ፡ በምድረ፡
  - verse: 15
    geez: ፍልስጥኤም፡ ወ*አዐረገ፡ መእተ፡ ስዊተ፡ ወዐብየ፡ ይስሐቅ፡ ፈድፋደ፡ ወቀንኡ፡ ላዕሌሁ፡ ፍልስጥኤም፡። ወኵሎ፡ ዐዘቅ*ተ፡ ዘከረዩ፡ ደ*ቀ፡ አብርሃም፡ በሕይወተ፡ አብርሃም፡ ደፈንዎ፡
  - verse: 16
