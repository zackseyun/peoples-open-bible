lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: Then ... came
  chosen_spanish: Entonces ... vino
  alternatives_spanish:
  - Y aconteció
  - Y sucedió
  lexicon: HALOT
  rationale: La forma narratival introduce un nuevo evento en secuencia. En español, «Entonces ... vino» conserva esa función discursiva de manera natural y evita el giro arcaico «aconteció».
- source_word: דְּבַר
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - un mensaje
  - el mensaje
  lexicon: HALOT
  rationale: En la fórmula profética, «la palabra» mantiene el valor técnico de la expresión hebrea y su reconocimiento bíblico, sin convertirla en una paráfrasis más interpretativa.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: El texto fuente usa el Tetragrámaton. La norma del proyecto en español es «Yahvé», que preserva el nombre propio divino en lugar de sustituirlo por un título.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - para
  lexicon: HALOT
  rationale: La preposición marca al destinatario del mensaje divino; en español, «a» es la equivalencia natural en esta construcción.
- source_word: יְשַׁעְיָהוּ
  english_pob_choice: Isaiah
  chosen_spanish: Isaías
  lexicon: HALOT
  rationale: Nombre propio bíblico con equivalente tradicional en español.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  lexicon: HALOT
  rationale: El infinitivo de לומר introduce el contenido del discurso; «diciendo» preserva la apertura formal hacia la cita siguiente.
theological_decisions:
- issue: Nombre divino YHWH en la fórmula profética
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: La lectura base identifica explícitamente el Tetragrámaton y evita la sustitución por un título. En español, «Yahvé» sigue la política del proyecto y mantiene la transparencia del nombre del pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh / Spanish project default: Yahvé'
translation_notes:
  revision_awareness: La revisión más reciente del pasaje no introdujo cambios sustantivos; el inglés auditado mantiene la fórmula profética estándar y la decisión doctrinal de traducir el nombre divino por transliteración. El español sigue esa línea, ajustando la forma al término normativo del proyecto.
  spanish_consistency_notes:
  - 'Se conservó la estructura profética breve del hebreo: sujeto + verbo de movimiento + destinatario + participio de habla.'
  - Se evitó «el Señor» para no ocultar el nombre divino revelado en el texto base.
  - «Diciendo» se mantiene porque el hebreo usa לֵאמֹר como enlace de cita, no como contenido independiente.
