translation:
  language: es
  text: 'Y el mensajero vino y le informó así: «Han traído las cabezas de los hijos del rey». Y él dijo: «Pónganlas en dos montones[a] a la entrada de la puerta de la ciudad, hasta la mañana».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “en dos pilas”.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמַּלְאָךְ
  english_pob_choice: the messenger
  chosen_spanish: el mensajero
  alternatives_spanish:
  - el ángel
  - el mensajero/agente
  lexicon: HALOT
  rationale: En este contexto narrativo se trata de un portador humano de noticias, no de un ser celestial; 'mensajero' evita imponer 'ángel' sin base contextual.
- source_word: וַיַּגֶּד לוֹ לֵאמֹר
  english_pob_choice: told him, saying
  chosen_spanish: le informó, diciendo
  alternatives_spanish:
  - le dijo, diciendo
  - le reportó, diciendo
  lexicon: HALOT
  rationale: El hebreo conserva una fórmula de reporte con infinitivo de decir; 'le informó, diciendo' mantiene el carácter formal del relato sin sonar forzado en español.
- source_word: הֵבִיאוּ
  english_pob_choice: They have brought
  chosen_spanish: Han traído
  alternatives_spanish:
  - Trajeron
  - Han entregado
  lexicon: HALOT
  rationale: El perfecto en el discurso directo comunica una acción completada con efecto presente; el presente perfecto español expresa mejor que ya han llegado las cabezas.
- source_word: רָאשֵׁי
  english_pob_choice: the heads
  chosen_spanish: las cabezas
  alternatives_spanish:
  - los cabezas
  - las cabezas cortadas
  lexicon: HALOT
  rationale: El plural constructo se refiere a cabezas concretas ya mencionadas en el contexto; 'las cabezas' es fiel y natural, y evita suavizar la violencia del texto.
- source_word: בְנֵי הַמֶּלֶךְ
  english_pob_choice: the king’s sons
  chosen_spanish: de los hijos del rey
  alternatives_spanish:
  - de los hijos del rey
  - de los hijos reales
  lexicon: HALOT
  rationale: La cadena constructa se vierte de forma directa como 'los hijos del rey', conservando el vínculo posesivo y el referente masculino del contexto.
- source_word: שִׂימוּ אֹתָם
  english_pob_choice: Put them
  chosen_spanish: Pónganlas
  alternatives_spanish:
  - Pónganlos
  - Colóquenlas
  lexicon: HALOT
  rationale: El pronombre hebreo retoma 'las cabezas', por eso en español conviene concordar en femenino plural para preservar el referente inmediato.
- source_word: שְׁנֵי צִבֻּרִים
  english_pob_choice: in two heaps
  chosen_spanish: en dos montones
  alternatives_spanish:
  - en dos pilas
  - en dos montones/heap
  lexicon: HALOT
  rationale: צִבֻּרִים denota montones o pilas; 'montones' conserva el sentido concreto y corresponde a la nota alternativa del inglés POB ('piles/heaps').
- source_word: פֶּתַח הַשַּׁעַר
  english_pob_choice: at the entrance of the gate
  chosen_spanish: a la entrada de la puerta
  alternatives_spanish:
  - a la entrada de la puerta
  - junto a la entrada de la puerta
  - en el acceso de la puerta
  lexicon: HALOT
  rationale: La expresión nombra el acceso/umbral del portón; 'a la entrada de la puerta' es comprensible en español y mantiene la localización concreta.
- source_word: עַד הַבֹּקֶר
  english_pob_choice: until morning
  chosen_spanish: hasta la mañana
  alternatives_spanish:
  - hasta la mañana
  - hasta el amanecer
  lexicon: HALOT
  rationale: La frase temporal marca duración hasta el siguiente momento diurno; 'hasta la mañana' es idiomática y fiel.
translation_notes:
  revision_awareness: El inglés POB de base permanece sin cambios en su sentido global y no presenta revisiones aplicadas; la versión española sigue de cerca el audit trail, ajustando únicamente la concordancia pronominal y la naturalidad sintáctica del español.
  spanish_consistency_notes:
  - Se conserva el tono narrativo sobrio y directo del original.
  - Se evita 'ángel' para no introducir una lectura sobrenatural no apoyada por el contexto.
  - La referencia de 'las cabezas' se mantiene en femenino plural para concordar con el antecedente inmediato.
  - '''Montones'' se usa como equivalente neutral de heaps/piles, con nota alternativa preservada.'
