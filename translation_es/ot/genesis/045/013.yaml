translation:
  language: es
  text: Y cuéntenle a mi padre toda mi gloria en Egipto y todo lo que han visto[a]. Apresúrense y traigan aquí a mi padre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «toda mi honra en Egipto y todo lo que han visto». El hebreo כָּבוֹד puede referirse a honor, gloria o esplendor; aquí apunta al estatus exaltado de José en Egipto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִגַּדְתֶּם
  english_pob_choice: tell
  chosen_spanish: anuncien
  alternatives_spanish:
  - digan
  - cuenten
  - informen
  lexicon: HALOT
  rationale: El hiphil de נגד expresa hacer saber, comunicar o decir. «Anuncien» conserva la idea de comunicar de manera clara y pública, adecuada al encargo de José a sus hermanos, sin sonar tan coloquial como «digan» ni tan burocrático como «informen».
- source_word: לְאָבִי
  english_pob_choice: my father
  chosen_spanish: a mi padre
  alternatives_spanish:
  - para mi padre
  - a mi padre, mi padre
  lexicon: HALOT
  rationale: La preposición ל aquí introduce el destinatario del mensaje. En español, «a mi padre» expresa naturalmente el destinatario del anuncio.
- source_word: כָּל כְּבוֹדִי
  english_pob_choice: all my glory
  chosen_spanish: toda mi gloria
  alternatives_spanish:
  - todo mi honor
  - todo mi esplendor
  lexicon: HALOT
  rationale: כבוד puede abarcar honor, gloria o esplendor. Siguiendo la decisión inglesa más reciente de «glory», se conserva «gloria» por correspondencia léxica directa. En el contexto, apunta al rango exaltado de José en Egipto, no necesariamente a gloria en sentido estrictamente teológico.
- source_word: בְּמִצְרַיִם
  english_pob_choice: in Egypt
  chosen_spanish: en Egipto
  alternatives_spanish:
  - en la tierra de Egipto
  lexicon: HALOT
  rationale: Es una expresión locativa directa y se traduce de forma simple y transparente.
- source_word: וְאֵת כָּל אֲשֶׁר רְאִיתֶם
  english_pob_choice: all that you have seen
  chosen_spanish: todo lo que han visto
  alternatives_spanish:
  - todo cuanto han visto
  - todo lo que ustedes han visto
  lexicon: HALOT
  rationale: La cláusula se refiere a la experiencia concreta de los hermanos. «Todo lo que han visto» conserva el alcance total de la expresión hebrea y mantiene un español natural.
- source_word: וּמִהַרְתֶּם
  english_pob_choice: Hurry
  chosen_spanish: Apresúrense
  alternatives_spanish:
  - Date prisa
  - Dense prisa
  - Hagan pronto
  lexicon: HALOT
  rationale: El verbo comunica urgencia imperativa. «Apresúrense» preserva el tono de mandato y es apropiado en español bíblico contemporáneo.
- source_word: וְהוֹרַדְתֶּם
  english_pob_choice: bring ... down
  chosen_spanish: traigan ... aquí
  alternatives_spanish:
  - traigan ... abajo
  - hagan bajar ... aquí
  - lleven ... aquí
  lexicon: HALOT
  rationale: El hiphil de ירד incluye la idea de causar un descenso. En español, «traigan ... aquí» comunica de manera natural el traslado hacia el lugar de habla; se evita «abajo» porque en español resultaría torpe o ambiguo, aunque la dirección descendente queda implícita por el contexto de ir a Egipto.
- source_word: הֵנָּה
  english_pob_choice: here
  chosen_spanish: aquí
  alternatives_spanish:
  - acá
  - hasta aquí
  lexicon: HALOT
  rationale: El adverbio deíctico señala el destino hacia el hablante. «Aquí» es la opción más directa y publicable en español.
theological_decisions:
- issue: Sentido de כָּבוֹד aplicado a José
  english_pob_reading: Joseph's exalted status in Egypt, rendered as 'glory' with a lexical note that honor/glory/splendor are possible
  chosen_spanish_reading: «gloria» como referencia al estatus exaltado de José en Egipto
  alternative_spanish_readings:
  - honor
  - esplendor
  rationale: 'Se mantiene la tensión lexical documentada: כבוד puede referirse a honor, gloria o esplendor. En este contexto narrativo, el término alude a la posición elevada de José en Egipto. «Gloria» preserva la opción principal del audit trail inglés, mientras que la nota reconoce alternativas válidas.'
  doctrine_reference: Génesis 45:13; HALOT sobre כבוד
translation_notes:
  revision_awareness: La base inglesa pasó de «honor» a «glory» para כבוד y de «everything you have seen» a «all that you have seen». La versión española sigue la revisión más reciente con «gloria» y conserva una formulación natural para la segunda cláusula, manteniendo el paralelismo de objetos del hebreo.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el nombre divino; en este versículo no aplica.
  - 'Se prefiere un tono bíblico moderno y digno: «Apresúrense», «traigan», «aquí».'
  - Se mantiene la distinción entre el estatus de José y la gloria divina, dejando esa tensión señalada en la nota léxica.
