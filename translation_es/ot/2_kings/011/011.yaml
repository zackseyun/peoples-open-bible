translation:
  language: es
  text: Y los guardias se colocaron[a], cada uno con sus armas en la mano, desde el lado derecho de la casa hasta el lado izquierdo de la casa, junto al altar y junto a la casa[c][b], alrededor del rey.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘los corredores’, es decir, la guardia real.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: ‘desde el lado derecho de la casa hasta el lado izquierdo de la casa’; también puede entenderse, según la orientación del templo, como ‘desde el lado sur ... hasta el lado norte’.'
    reason: alternative_reading
  - marker: c
    text: Aquí ‘la casa’ se refiere al edificio o recinto del templo.
    reason: cultural_note
lexical_decisions:
- source_word: הָרָצִים
  english_pob_choice: the guards
  chosen_spanish: los guardias
  alternatives_spanish:
  - los corredores
  - los correos
  - la guardia real
  lexicon: HALOT
  rationale: En este contexto real y armado, רָצִים no se entiende de manera natural como ‘corredores’, sino como la guardia del rey o mensajeros armados. ‘Guardias’ comunica bien la función contextual sin perder la referencia al grupo.
- source_word: אִישׁ וְכֵלָיו בְּיָדוֹ
  english_pob_choice: each man with his weapons in his hand
  chosen_spanish: cada uno con sus armas en la mano
  alternatives_spanish:
  - cada hombre con sus armas en la mano
  - cada uno con su equipo en la mano
  lexicon: HALOT
  rationale: אִישׁ tiene fuerza distributiva aquí, por eso ‘cada uno’. כֵּלִים en este escenario militar se expresa mejor como ‘armas’ que como ‘utensilios’ o ‘equipo’, y ‘en la mano’ conserva la imagen de preparación inmediata.
- source_word: מִכֶּתֶף ... עַד כֶּתֶף
  english_pob_choice: from the right side ... to the left side
  chosen_spanish: desde el lado derecho ... hasta el lado izquierdo
  alternatives_spanish:
  - desde el hombro derecho ... hasta el hombro izquierdo
  - desde el costado derecho ... hasta el costado izquierdo
  lexicon: HALOT
  rationale: כֶּתֶף literalmente es ‘hombro’, pero en descripciones espaciales de edificios funciona idiomáticamente como ‘lado’ o ‘costado’. ‘Lado’ resulta claro y fiel al sentido contextual.
- source_word: הַבַּיִת
  english_pob_choice: the house
  chosen_spanish: la casa
  alternatives_spanish:
  - el templo
  - la casa del templo
  lexicon: HALOT
  rationale: El hebreo dice literalmente ‘la casa’. Aunque el referente es el recinto/edificio del templo, se mantiene el término concreto del original y se deja que el contexto lo identifique.
- source_word: הַיְמָנִית / הַשְּׂמָאלִית
  english_pob_choice: right ... left
  chosen_spanish: derecho ... izquierdo
  alternatives_spanish:
  - sur ... norte
  lexicon: HALOT
  rationale: Se conserva la orientación literal ‘derecho/izquierdo’. La posibilidad de lectura orientacional (sur/norte) existe en contexto del templo, pero no se impone en el texto principal.
- source_word: לַמִּזְבֵּחַ וְלַבָּיִת
  english_pob_choice: by the altar and by the house
  chosen_spanish: junto al altar y junto a la casa
  alternatives_spanish:
  - al lado del altar y al lado de la casa
  - cerca del altar y cerca de la casa
  lexicon: HALOT
  rationale: La preposición ל admite valor locativo o direccional en una escena compacta. ‘Junto a’ comunica presencia/ubicación sin forzar una dirección específica.
- source_word: עַל הַמֶּלֶךְ סָבִיב
  english_pob_choice: around the king
  chosen_spanish: alrededor del rey
  alternatives_spanish:
  - rodeando al rey
  - en torno al rey
  lexicon: HALOT
  rationale: ‘Alrededor del rey’ expresa bien el encierro protector y es natural en español contemporáneo, manteniendo la imagen de resguardo en todos sus lados.
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo masorético y coincide con la solución inglesa auditada sin necesidad de ajustes posteriores; no se incorporaron revisiones aplicadas.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ para el nombre divino cuando aparezca en el contexto inmediato; en este versículo no aparece.
  - Se evita ‘SEÑOR’ como sustituto editorial y se conserva el vocabulario espacial literal del hebreo.
  - ‘Casa’ se mantiene para הַבַּיִת por coherencia con el audit trail, con aclaración en nota.
  - ‘Guardias’ se eligió por función contextual, pero se preserva la alternativa lexical ‘corredores’ en nota para no borrar la tensión del hebreo original.
