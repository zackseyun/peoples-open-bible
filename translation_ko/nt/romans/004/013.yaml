  - 자손
  lexicon: BDAG
  rationale: 단수 「씨」가 집합적 의미로 쓰였음을 「후손」으로 자연스럽게 옮긴다.
- source_word: κληρονόμον
  english_pob_choice: heir
  chosen_korean: 상속자
  alternatives_korean:
  - 유업을 받을 자
  lexicon: BDAG
  rationale: 상속의 함의를 「상속자」로 간결히 옮긴다.
