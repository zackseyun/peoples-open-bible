revisions:
- from: Yo sanaré su apostasía; los amaré de buena voluntad[a], porque mi ira se ha apartado de ellos.
  to: Yo sanaré su apostasía; los amaré libremente, porque mi ira se ha apartado de él[a].
  rationale: Se corrige el pronombre final para reflejar el singular hebreo documentado en la evidencia fuente y en las decisiones léxicas/teológicas del POB, preservando la tensión de número con una nota aclaratoria. También se cambia «de buena voluntad» por «libremente» para representar mejor נְדָבָה como amor dado gratuitamente y sin coacción, en un español más natural y más cercano a la decisión inglesa auditada.
