  yaml_path: translation/deuterocanon/2_maccabees/003/035.yaml
  text: But Heliodorus[a], after offering a sacrifice to God and making very great vows to the one who had preserved his life, and after taking leave of Onias[c][b], returned to the king.
  footnotes:
