translation:
  text: For in each jubilee there will be a priesthood. And in the first jubilee,
    the one first anointed for the priesthood will be great, and he will speak to
    God as to a father; and his priesthood will be full with the Lord. [And in the
    days of his joy, he will arise for the salvation of the world.]
