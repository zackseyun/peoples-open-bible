review_pass:
  verdict: revise
  source_alignment_summary: El borrador capta bien la estructura retórica y la negación absoluta del hebreo, y preserva la tensión interpretativa sobre pureza/impureza. Sin embargo, "un ser limpio ... de uno impuro" introduce una personificación/animación innecesaria que no está en el hebreo, donde ambos adjetivos son sustantivados de modo más general. La alternativa inglesa auditada favorece una formulación amplia como "lo que es limpio" / "lo que es impuro".
  spanish_quality_summary: El español es claro, pero "un ser limpio" suena algo forzado y puede sugerir específicamente una persona o ser vivo, estrechando indebidamente el dicho proverbial. "Sacar" funciona, pero una formulación como "producir" o "sacar algo limpio de algo impuro" suena más natural y más fiel al alcance general. Las notas necesitan ajustarse al nuevo anclaje y a una alternativa más idiomática para לֹא אֶחָד.
  glossary_alignment: No hay términos del glosario mayor en juego. La revisión propuesta mantiene la neutralidad teológica y el contraste léxico entre טָהוֹר y טָמֵא sin sobredeterminar si se trata de impureza ritual, moral o existencial.
  issues:
  - severity: medium
    issue: '"un ser limpio" para טָהוֹר'
    rationale: El hebreo usa un adjetivo sustantivado general; "ser" añade un matiz ontológico/personal no exigido por la fuente y reduce el alcance proverbial.
  - severity: medium
    issue: '"de uno impuro" para מִטָּמֵא'
    rationale: '"Uno" empuja la lectura hacia un referente personal. El original permite una referencia más amplia: "de algo impuro" / "de lo impuro".'
  - severity: low
    issue: Nota "No uno"
    rationale: Como alternativa literal es posible, pero en español suena poco natural. "No hay ni uno" o "Ni uno solo" comunica mejor la fuerza de לֹא אֶחָד si se desea conservar la alternativa.
  revised_spanish_text: ¿Quién puede sacar algo limpio[a] de algo impuro? Nadie[b].
