translation:
  language: es
  text: Pero la casa de Israel se rebeló contra mí en el desierto. No anduvieron en mis estatutos, y rechazaron mis juicios[a], los cuales, si una persona los pone por obra, vivirá por ellos[b]. Profanaron gravemente mis sábados. Entonces dije que derramaría mi furor sobre ellos en el desierto[b], para ponerles fin.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo 'juicios'; el término también puede traducirse 'ordenanzas' o 'decretos'.
    reason: lexical_alternative
  - marker: b
    text: Esta formulación evoca Levítico 18:5.
    reason: cross_reference
lexical_decisions:
- source_word: וַיַּמְרוּ בִי
  english_pob_choice: rebelled against me
  chosen_spanish: se rebeló contra mí
  alternatives_spanish:
  - se mostró rebelde contra mí
  - me desobedeció
  lexicon: HALOT
  rationale: מרה con ב expresa rebelión dirigida contra alguien. En español, 'se rebeló contra mí' conserva bien el peso pactual y la oposición personal contra Yahvé.
- source_word: בֵית יִשְׂרָאֵל
  english_pob_choice: the house of Israel
  chosen_spanish: la casa de Israel
  alternatives_spanish:
  - Israel
  lexicon: HALOT
  rationale: Se conserva la designación corporativa profética 'casa de Israel' en lugar de simplificarla a 'Israel', porque el hebreo resalta al pueblo como unidad doméstica/covenantal.
- source_word: בַּמִּדְבָּר
  english_pob_choice: in the wilderness
  chosen_spanish: en el desierto
  alternatives_spanish:
  - en el desierto árido
  - en la estepa
  lexicon: HALOT
  rationale: '''Desierto'' es la forma natural y clara en español para מִדְבָּר. Se evita ''wilderness'' como calco y no hay indicio de que aquí deba forzarse un término más técnico.'
- source_word: בְּחֻקּוֹתַי לֹא הָלָכוּ
  english_pob_choice: They did not walk in my statutes
  chosen_spanish: No anduvieron en mis estatutos
  alternatives_spanish:
  - No caminaron en mis estatutos
  - No siguieron mis estatutos
  lexicon: HALOT
  rationale: El hebreo usa el modismo 'andar en'. 'No anduvieron en mis estatutos' preserva la imagen bíblica sin perder inteligibilidad en español; 'estatutos' mantiene חֻקּוֹת con su valor normativo.
- source_word: מִשְׁפָּטַי
  english_pob_choice: my judgments
  chosen_spanish: mis juicios
  alternatives_spanish:
  - mis ordenanzas
  - mis decretos
  lexicon: HALOT
  rationale: Aunque el inglés POB opta por 'judgments', en español 'juicios' reproduce mejor el campo judicial de מִשְׁפָּטִים sin sonar forzado. Se conserva la ambigüedad legal/covenantal del término.
- source_word: מָאָסוּ
  english_pob_choice: rejected
  chosen_spanish: rechazaron
  alternatives_spanish:
  - despreciaron
  - rechazaron con desdén
  lexicon: HALOT
  rationale: '''Rechazaron'' comunica la negativa de pacto de manera fiel y sobria. ''Despreciaron'' intensificaría más el matiz afectivo de lo que el contexto exige de forma obligatoria.'
- source_word: אֲשֶׁר יַעֲשֶׂה אֹתָם הָאָדָם וָחַי בָּהֶם
  english_pob_choice: which if a person does them, he will live by them
  chosen_spanish: en los cuales si un hombre los hace, vivirá por ellos
  alternatives_spanish:
  - en los cuales si una persona los hace, vivirá por ellos
  - los cuales, si alguien los hace, vivirá por ellos
  lexicon: HALOT
  rationale: Se mantiene el singular genérico del hebreo con 'un hombre', porque el texto usa הָאָדָם como representante. 'Vivirá por ellos' conserva el modismo bíblico de vida condicionada por la obediencia a los estatutos/juicios.
- source_word: הָאָדָם
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  - alguien
  lexicon: HALOT
  rationale: '''Un hombre'' preserva la forma singular masculina del hebreo y la fuerza representativa del proverbio legal-pactual. En la nota se aclara que funciona como singular genérico.'
- source_word: שַׁבְּתֹתַי
  english_pob_choice: my Sabbaths
  chosen_spanish: mis sábados
  alternatives_spanish:
  - mis días de reposo
  - mis días de sábado
  lexicon: HALOT
  rationale: '''Sábados'' sigue la elección de lenguaje bíblico para שַׁבְּתֹת, reflejando el plural hebreo y el carácter de señal pactal; ''días de reposo'' explicitaría más de lo que el hebreo dice.'
- source_word: חִלְּלוּ מְאֹד
  english_pob_choice: greatly profaned
  chosen_spanish: profanaron mucho
  alternatives_spanish:
  - profanaron grandemente
  - desecraron en gran manera
  lexicon: HALOT
  rationale: חִלֵּל expresa profanar/desecrar; 'profanaron mucho' transmite con naturalidad el intensificador מְאֹד en español contemporáneo.
- source_word: וָאֹמַר
  english_pob_choice: Then I said
  chosen_spanish: Entonces dije
  alternatives_spanish:
  - Y dije
  - Así que dije
  lexicon: HALOT
  rationale: '''Entonces dije'' reproduce la secuencia narrativa sin recargar el verso. El valor discursivo de waw queda bien expresado por ''entonces''.'
- source_word: לִשְׁפֹּךְ חֲמָתִי
  english_pob_choice: I would pour out my wrath
  chosen_spanish: Derramaré mi furor
  alternatives_spanish:
  - Derramaré mi ira
  - Vaciaré mi furor
  lexicon: HALOT
  rationale: El infinitivo con אמר expresa intención o resolución. 'Derramaré' conserva la metáfora bíblica de efusión; 'furor' da buen peso a חֲמָה, sin perder el matiz judicial de juicio divino.
- source_word: לְכַלּוֹתָם
  english_pob_choice: to put an end to them
  chosen_spanish: para acabarlos
  alternatives_spanish:
  - para destruirlos
  - para consumirlos
  lexicon: HALOT
  rationale: כלה puede significar acabar, consumir o destruir. 'Para acabarlos' es breve, natural y suficientemente fuerte para el sentido de juicio terminal, sin añadir especificaciones no obligadas.
theological_decisions:
- issue: Singular genérico en la cláusula de vida
  english_pob_reading: which if a person does them, he will live by them
  chosen_spanish_reading: en los cuales si un hombre los hace, vivirá por ellos
  alternative_spanish_readings:
  - en los cuales si una persona los hace, vivirá por ellos
  - en los cuales quien los haga, vivirá por ellos
  rationale: El hebreo usa הָאָדָם en singular representativo. Se conserva esa forma en el texto principal para no aplanar la estructura pactual; la nota puede aclarar que el singular es genérico.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4; tabla de términos controvertidos para אָדָם
- issue: Relación entre estatutos/juicios y vida
  english_pob_reading: which if a person does them, he will live by them
  chosen_spanish_reading: en los cuales si un hombre los hace, vivirá por ellos
  alternative_spanish_readings:
  - en los cuales si una persona los hace, vivirá por ellos
  - los cuales, si alguien los hace, vivirá por ellos
  rationale: 'Se preserva la tensión del lenguaje legal-pactual: la vida está ligada a la obediencia a los mandatos divinos. ''Vivirá por ellos'' mantiene la idiomática bíblica sin explicitar una teología posterior que el versículo no desarrolla.'
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: Lexema divino en el trasfondo profético
  english_pob_reading: the house of Israel rebelled against me in the wilderness
  chosen_spanish_reading: la casa de Israel se rebeló contra mí en el desierto
  alternative_spanish_readings:
  - la casa de Israel se rebeló contra mí en el desierto
  rationale: El texto hebreo usa habla divina directa; en español se mantiene 'contra mí' sin sustituir el nombre divino en la cita. No hay necesidad de introducir 'Yahvé' en la línea principal porque el verso está formulado en primera persona divina.
  doctrine_reference: DOCTRINE.md §Nombre divino y discurso directo
translation_notes:
  revision_awareness: 'El inglés POB pasó por una revisión menor: se mantuvo la estructura y el sentido generales, con un ajuste de ''a man'' a ''a person'' en inglés para naturalidad. La presente redacción española conserva deliberadamente el singular genérico del hebreo con ''un hombre'', explicándolo en nota para no perder la fuerza representativa del original.'
  spanish_consistency_notes:
  - Se mantiene 'casa de Israel' como designación corporativa estable.
  - Se usa 'estatutos' para חֻקּוֹת y 'juicios' para מִשְׁפָּטִים, distinguiendo ambos términos jurídicos.
  - '''Profanaron'' y ''furor'' conservan el campo semántico de juicio y santidad sin suavizarlo.'
  - '''Desierto'' se emplea de forma consistente para מִדְבָּר.'
  - 'Las notas aclaran las dos ambigüedades principales: ''juicios'' y el singular genérico ''un hombre''.'
