translation:
  language: es
  text: El Señor se ríe de él[a], porque ve que su día[b] se acerca.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se burla de él» o «se mofa de él»; el verbo hebreo significa literalmente «se ríe», aquí con un matiz despectivo en el contexto.
    reason: lexical_alternative
  - marker: b
    text: «Su día» se refiere al día señalado de caída o juicio del impío.
    reason: cultural_note
lexical_decisions:
- source_word: אֲדֹנָי
  english_pob_choice: The Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  - el Maestro
  lexicon: HALOT
  rationale: Aunque la forma escrita es אֲדֹנָי, el contexto poético apunta al Dios de Israel; en este proyecto el nombre divino se vierte como «Yahvé» en el texto principal, no como «SEÑOR». Esto preserva la referencia divina sin enmascararla y sigue la norma del proyecto para el nombre de YHWH cuando el contexto lo identifica.
- source_word: יִשְׂחַק
  english_pob_choice: laughs
  chosen_spanish: se ríe
  alternatives_spanish:
  - se burla
  - se mofa
  lexicon: HALOT
  rationale: El verbo básico es «reír/laugh». En este contexto la risa es despectiva o de juicio, pero en español «se ríe de él» mantiene el valor léxico central sin volverlo más interpretativo de lo que exige el hebreo. «Se burla» explicita demasiado la inferencia contextual.
- source_word: לוֹ
  english_pob_choice: at him
  chosen_spanish: de él
  alternatives_spanish:
  - sobre él
  - contra él
  lexicon: HALOT
  rationale: Con el verbo «reírse de», el complemento más natural en español es «de él», que conserva la relación sintáctica y el matiz de desdén implícito. «Contra él» sería más interpretativo.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: La primera כִּי introduce la razón; «porque» expresa bien la causalidad en español moderno y es plenamente compatible con el tono poético.
- source_word: רָאָה
  english_pob_choice: he sees
  chosen_spanish: ve
  alternatives_spanish:
  - ha visto
  - sabe
  lexicon: HALOT
  rationale: Aunque la forma verbal es perfecta, aquí tiene valor de percepción vigente. «Ve» conserva la inmediatez poética mejor que una perífrasis más pesada; «sabe» sería interpretativo.
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - cómo
  lexicon: HALOT
  rationale: La segunda כִּי introduce el contenido de lo que ve; «que» es la subordinación natural en español.
- source_word: יָבֹא
  english_pob_choice: is coming
  chosen_spanish: viene
  alternatives_spanish:
  - va a venir
  - vendrá
  lexicon: HALOT
  rationale: El imperfecto apunta a un acontecimiento inminente. «Viene» conserva la vividez del hebreo poético mejor que «vendrá», que suena más distante.
- source_word: יוֹמוֹ
  english_pob_choice: his day
  chosen_spanish: su día
  alternatives_spanish:
  - el día señalado para él
  - su tiempo
  lexicon: HALOT
  rationale: Literalmente es «su día». En el contexto se refiere al día de caída o juicio del impío, pero el texto principal mantiene la tersura poética y deja que el contexto determine la carga exacta.
theological_decisions:
- issue: Sentido de la risa divina en contexto judicial
  english_pob_reading: The verse depicts the Lord's derisive response to the wicked in light of impending judgment, without implying frivolity or cruelty.
  chosen_spanish_reading: El texto presenta una risa de desdén o juicio ante la inminente ruina del impío, sin sugerir frivolidad ni crueldad.
  alternative_spanish_readings:
  - Dios se burla de él
  - Dios simplemente se ríe
  rationale: 'El hebreo permite la risa literal con fuerza despectiva por el contexto. La formulación española principal conserva esa tensión: «se ríe» es léxicamente fiel, mientras que la nota aclara el sentido derisorio sin reemplazarlo en el cuerpo del texto.'
  doctrine_reference: Translation philosophy §3
- issue: Identidad del nombre divino en un versículo donde el texto consonántico/apuntado presenta אדני
  english_pob_reading: The Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  rationale: Dado que el proyecto español usa «Yahvé» para el nombre divino y no la convención de máscara «SEÑOR», se mantiene aquí la identificación con Dios de Israel. La decisión sigue la práctica terminológica del proyecto y no pretende borrar la particularidad del hebreo.
  doctrine_reference: Project-level Spanish terminology defaults
translation_notes:
  revision_awareness: 'Se revisó el contexto del hebreo y el audit trail inglés: no hubo cambios posteriores en la revisión más reciente, y el acuerdo de revisión fue alto. La redacción española conserva el verbo literal con una nota para el matiz de desprecio, y mantiene la tersura poética de «su día viene».'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» conforme al estándar español del proyecto para el nombre divino.
  - Se prefirió «se ríe de él» por naturalidad en español y fidelidad al núcleo léxico de שׂחק.
  - «Su día» conserva la brevedad poética del original; la nota explica su sentido judicial.
  - La puntuación y la subordinación siguen el orden lógico del hebreo sin volverlo rígidamente literal.
