translation:
  language: es
  text: Y alcanzó renombre hasta los confines de la tierra, y reunió a los que perecían.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὠνομάσθη
  english_pob_choice: was renowned
  chosen_spanish: fue renombrado
  alternatives_spanish:
  - fue conocido
  - alcanzó renombre
  - fue llamado
  lexicon: LSJ
  rationale: El pasivo aoristo de ὀνομάζω significa literalmente 'ser nombrado/llamado', pero en este contexto expresa difusión de fama o reputación. 'Fue renombrado' conserva la idea de nombre/reputación sin reducirla a una simple etiqueta ni sobreinterpretarla como 'famoso'.
- source_word: ἕως ἐσχάτου τῆς γῆς
  english_pob_choice: to the ends of the earth
  chosen_spanish: hasta los confines de la tierra
  alternatives_spanish:
  - hasta los extremos de la tierra
  - hasta el último rincón de la tierra
  - hasta el fin de la tierra
  lexicon: LSJ
  rationale: La expresión es un modismo de alcance máximo. 'Hasta los confines de la tierra' suena natural en español y preserva el valor expansivo del giro griego.
- source_word: συνήγαγεν
  english_pob_choice: gathered
  chosen_spanish: reunió
  alternatives_spanish:
  - juntó
  - congregó
  - recogió
  lexicon: LSJ
  rationale: El aoristo de συνάγω admite 'reunir' o 'juntar'. 'Reunió' es idiomático en español y mantiene la acción de juntar personas sin añadir matices eclesiásticos.
- source_word: ἀπολλυμένους
  english_pob_choice: those who were perishing
  chosen_spanish: los que perecían
  alternatives_spanish:
  - los que estaban pereciendo
  - los perdidos
  - los que eran destruidos
  lexicon: LSJ
  rationale: El participio presente medio/pasivo de ἀπόλλυμι indica un estado de ruina, pérdida o muerte inminente. 'Los que perecían' conserva esa idea de proceso y evita convertirlo en una categoría teológica como 'los perdidos'.
translation_notes:
  revision_awareness: La versión inglesa auditada osciló entre 'was named' y 'was renowned'; la revisión posterior prefirió 'was renowned' por ser más natural en contexto. En español se refleja esa decisión con 'fue renombrado', manteniendo la tensión del griego entre nombramiento literal y fama/reputación, sin recurrir a una paráfrasis más interpretativa.
  spanish_consistency_notes:
  - Se evitó 'SEÑOR' o terminología litúrgica no presente en el versículo.
  - Se mantuvo un registro bíblico sobrio y moderno, apto para lectura pública.
  - '''Perecían'' preserva el aspecto progresivo del participio griego mejor que un sustantivo como ''los perdidos''.'
