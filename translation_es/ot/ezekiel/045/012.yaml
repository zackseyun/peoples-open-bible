translation:
  language: es
  text: Y el siclo será de veinte geras[a]; veinte siclos, veinticinco siclos y quince siclos serán su mina[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo enumera la mina como «veinte siclos, veinticinco siclos y quince siclos», es decir, un total de sesenta siclos. Esto difiere de otras antiguas equivalencias de la mina y probablemente refleja un estándar específico en la legislación del templo de Ezequiel.
    reason: cultural_note
  - marker: b
    text: O «mane». El término hebreo designa una unidad mayor de peso o de dinero.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַשֶּׁקֶל
  english_pob_choice: the shekel
  chosen_spanish: el siclo
  alternatives_spanish:
  - el shekel
  - el siclo estándar
  lexicon: HALOT
  rationale: En español, «siclo» es la forma tradicional y clara para la unidad monetaria/pesos antigua; conserva el valor de unidad de medida sin introducir una equivalencia moderna.
- source_word: גֵּרָה
  english_pob_choice: gerahs
  chosen_spanish: geras
  alternatives_spanish:
  - gerahs
  lexicon: HALOT
  rationale: Se mantiene la transliteración del submúltiplo antiguo para preservar el sistema de medidas bíblico y la correspondencia auditada del inglés POB.
- source_word: עֶשְׂרִים
  english_pob_choice: twenty
  chosen_spanish: veinte
  alternatives_spanish:
  - '20'
  lexicon: HALOT
  rationale: Número cardinal directo y natural en español.
- source_word: שְׁקָלִים / שֶׁקֶל
  english_pob_choice: shekels
  chosen_spanish: siclos
  alternatives_spanish:
  - shekels
  lexicon: HALOT
  rationale: Se traduce consistentemente con el mismo término español para la unidad de peso/valor; el singular implícito en la serie se integra de forma idiomática en español.
- source_word: חֲמִשָּׁה וְעֶשְׂרִים
  english_pob_choice: twenty-five
  chosen_spanish: veinticinco
  alternatives_spanish:
  - cinco y veinte
  lexicon: HALOT
  rationale: Se usa el orden numérico natural del español moderno, como hizo el POB inglés con la forma moderna.
- source_word: עֲשָׂרָה וַחֲמִשָּׁה
  english_pob_choice: fifteen
  chosen_spanish: quince
  alternatives_spanish:
  - diez y cinco
  lexicon: HALOT
  rationale: Número cardinal moderno y claro; evita arcaísmo innecesario.
- source_word: הַמָּנֶה
  english_pob_choice: your mina
  chosen_spanish: vuestra mina
  alternatives_spanish:
  - la mina
  - vuestra maneh
  lexicon: HALOT
  rationale: «Mina» es el término convencional en español para la unidad mayor. Se conserva el posesivo de segunda persona plural porque לָכֶם marca la norma dada a los destinatarios, no una unidad genérica impersonal.
- source_word: יִהְיֶה לָכֶם
  english_pob_choice: shall be your
  chosen_spanish: será vuestra
  alternatives_spanish:
  - os corresponderá como
  - será para vosotros
  lexicon: HALOT
  rationale: La construcción expresa una norma establecida para ellos. «Será vuestra» mantiene la fuerza prescriptiva y el vínculo posesivo sin añadir glosa interpretativa.
theological_decisions:
- issue: Norma de pesos y medidas en legislación del templo
  english_pob_reading: The verse specifies an official standard for the shekel and mina, with the mina totaling sixty shekels.
  chosen_spanish_reading: 'El versículo presenta un patrón normativo de pesos: el siclo vale veinte geras y la mina queda definida por la serie de siclos indicada.'
  alternative_spanish_readings:
  - El siclo será de veinte geras y la mina equivaldrá a sesenta siclos.
  - El siclo y la mina se establecen como estándares oficiales.
  rationale: No hay contenido doctrinal disputado, pero sí una decisión interpretativa sobre el valor total de la mina. La redacción principal conserva el cálculo implícito sin imponer una paraphrase explicativa excesiva.
  doctrine_reference: Ezequiel 45:12; legislación del templo
- issue: Cálculo de la mina
  english_pob_reading: twenty shekels, twenty-five shekels, and fifteen shekels shall be your mina
  chosen_spanish_reading: veinte siclos, veinticinco siclos y quince siclos será vuestra mina
  alternative_spanish_readings:
  - la mina será de sesenta siclos
  - vuestra mina constará de sesenta siclos
  rationale: Se preserva la formulación concreta del hebreo y del POB inglés, dejando visible la tensión aritmética/documental que el POB nota en su pie de página, en vez de suavizarla.
  doctrine_reference: Ezequiel 45:12; nota textual/cultural
- issue: Uso de «mina» frente a «mane»
  english_pob_reading: Or 'maneh.' The Hebrew term refers to a larger unit of weight or money.
  chosen_spanish_reading: «mina» con posibilidad de «mane» como transliteración alternativa implícita en nota
  alternative_spanish_readings:
  - mane
  - maneh
  rationale: En español bíblico, «mina» es la forma más inteligible y asentada; sin embargo, la nota preserva la alternativa transliterada para reflejar el término hebreo y la tensión léxica documentada por el POB.
  doctrine_reference: Ezequiel 45:12
translation_notes:
  revision_awareness: El pasaje coincide ampliamente con el texto fuente y con el registro de auditoría inglés; no se registran revisiones aplicadas. Se conservó la observación del POB sobre la suma implícita de la mina y la alternativa léxica para la unidad mayor.
  spanish_consistency_notes:
  - Se usa «siclo» de manera consistente para שֶׁקֶל / שְׁקָלִים, siguiendo la terminología bíblica habitual en español y la unidad reconocible para lectores eclesiales.
  - Se translitera «geras» para preservar la subdivisión antigua sin modernizarla ni convertirla a una equivalencia aproximada.
  - Se mantiene «mina» como unidad mayor, con nota alternativa «mina»/«maneh» según la tradición léxica del hebreo.
  - Se conserva el orden numérico moderno en español («veinticinco», «quince») sin alterar el contenido del hebreo.
