theological_decisions:
- issue: Meaning of תוֹדָה in a confession setting
  chosen_reading: God-directed acknowledgment rendered as 'praise' in the main text, with confessional nuance preserved in a footnote
  alternative_readings:
  - thanks
  - confession
  rationale: The phrase 'give glory to the LORD ... and give him תוֹדָה' occurs in a context where Achan is being urged to confess truthfully before God. The Hebrew noun can cover thanksgiving/praise and, in some contexts, confession. To avoid importing a narrower doctrinal or juridical sense directly into the main text, the translation keeps the broader God-directed expression 'give him praise' and preserves the confessional alternative in a footnote.
  doctrine_reference: Translation philosophy §§3, 6
