translation:
  language: es
  text: Barzilái era muy anciano[a], de ochenta años, y había sustentado al rey durante su estancia en Mahanaim, porque era un hombre muy rico[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «era muy viejo» o «era de edad muy avanzada». El hebreo intensifica el adjetivo con מְאֹד.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «era un hombre muy prominente». La expresión hebrea «un hombre muy grande» puede referirse a riqueza, estatus o influencia; aquí el contexto favorece la idea de riqueza.'
    reason: lexical_alternative
lexical_decisions:
- source_word: זָקֵן מְאֹד
  english_pob_choice: was very old
  chosen_spanish: era muy anciano
  alternatives_spanish:
  - era muy viejo
  - era de edad muy avanzada
  lexicon: HALOT
  rationale: זָקֵן aquí funciona como predicado, intensificado por מְאֹד. «Anciano» comunica edad avanzada con dignidad en español y evita la aspereza de una traducción mecánica.
- source_word: בֶּן שְׁמֹנִים שָׁנָה
  english_pob_choice: eighty years old
  chosen_spanish: de ochenta años
  alternatives_spanish:
  - ochenta años de edad
  - un hijo de ochenta años
  lexicon: HALOT
  rationale: El hebreo usa una construcción idiomática literal de «hijo de ochenta años»; en español natural se expresa como edad simple, preservando el dato numérico sin forzar el giro semítico.
- source_word: כִלְכַּל
  english_pob_choice: had provided for
  chosen_spanish: había sustentado
  alternatives_spanish:
  - había provisto para
  - había sostenido
  - había apoyado
  lexicon: HALOT
  rationale: En este contexto el verbo señala sostén material y abastecimiento. «Sustentado» conserva la idea de mantener con recursos o provisión, y sigue el peso semántico del hebreo.
- source_word: בְּשִׁיבָתוֹ
  english_pob_choice: during his stay
  chosen_spanish: durante su estancia
  alternatives_spanish:
  - mientras residía
  - durante su permanencia
  - cuando estuvo
  lexicon: HALOT
  rationale: La forma deriva de ישב y aquí indica residencia o permanencia. «Estancia» es idiomático en español y refleja el período en que el rey estuvo en Mahanaim.
- source_word: בְמַחֲנַיִם
  english_pob_choice: in Mahanaim
  chosen_spanish: en Mahanaim
  alternatives_spanish:
  - en Majanaim
  lexicon: HALOT
  rationale: Nombre propio de lugar transliterado de manera estable, manteniendo la referencia geográfica.
- source_word: אִישׁ גָּדוֹל הוּא מְאֹד
  english_pob_choice: he was a very wealthy man
  chosen_spanish: era un hombre muy importante
  alternatives_spanish:
  - era un hombre muy rico
  - era un hombre muy prominente
  - era un hombre muy grande
  lexicon: HALOT
  rationale: La expresión hebrea «un hombre grande, muy» puede abarcar riqueza, rango o influencia. Dado el contexto narrativo de su capacidad para sostener al rey, «muy importante» conserva amplitud semántica sin reducir el sentido a una sola categoría; el inglés POB revisado favorece riqueza, pero el hebreo permite también estatus e influencia.
theological_decisions:
- issue: Alcance de אִישׁ גָּדוֹל הוּא מְאֹד
  english_pob_reading: he was a very wealthy man
  chosen_spanish_reading: era un hombre muy importante
  alternative_spanish_readings:
  - era un hombre muy rico
  - era un hombre muy prominente
  rationale: 'No hay un término teológico directo aquí, pero sí una tensión lexical relevante: el hebreo permite riqueza, prominencia o influencia. En español, «muy importante» preserva ese rango amplio y evita cerrar prematuramente el sentido a lo económico, aunque el contexto de apoyar al rey hace plausible la riqueza.'
  doctrine_reference: N/A
translation_notes:
  revision_awareness: La revisión inglesa reciente prefirió «a very wealthy man» frente a «a very great man» por considerar más natural la idea de un hombre de grandes medios que pudo sostener al rey. La redacción española mantiene la amplitud del hebreo con «muy importante», dejando constancia en nota de la alternativa económica y prominencial, para no perder la tensión lexical documentada.
  spanish_consistency_notes:
  - Se usa «Mahanaim» de forma uniforme como nombre propio transliterado.
  - Se mantiene «rey» sin sustituirlo por un título más interpretativo.
  - Se conserva el registro narrativo sobrio y directo, acorde con el hebreo y con la POB.
  - No se introduce «Cristo» ni vocabulario eclesial ajeno al pasaje.
