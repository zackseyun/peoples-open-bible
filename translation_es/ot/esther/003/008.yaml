base_translation:
  language: en
  yaml_path: translation/ot/esther/003/008.yaml
  text: Then Haman said to King Ahasuerus[a], “There is a certain people, scattered and separated among the peoples in all the provinces of your kingdom. Their laws are different from those of every other people, and they do not keep the king’s laws, so it is not in the king’s interest to let them remain.”
  footnotes:
  - marker: a
    text: Or 'to leave them alone' / 'to tolerate them.' The Hebrew verb can mean to let someone be or permit them to remain undisturbed.
    reason: lexical_alternative
