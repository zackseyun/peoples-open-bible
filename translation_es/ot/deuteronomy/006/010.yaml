revisions:
- from: Y sucederá que Yahvé tu Dios te llevará[a] a la tierra que juró a tus padres, a Abraham, a Isaac y a Jacob, para darte ciudades grandes y buenas que no edificaste.
  to: Y cuando Yahvé tu Dios te haga entrar en la tierra que juró a tus antepasados[a], a Abraham, a Isaac y a Jacob, para darte ciudades grandes y buenas que no construiste,
  rationale: Se ajusta la apertura a «Y cuando» para reflejar mejor וְהָיָה כִּי y el audit trail inglés. Se cambia «te llevará a» por «te haga entrar en» para conservar la fuerza causativa de יְבִיאֲךָ. Se usa «antepasados[a]» en el texto principal por claridad española, manteniendo en nota la forma hebrea «padres» y su especificación patriarcal. Se conserva la coma final porque el versículo continúa en la oración siguiente del contexto bíblico.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:34:10Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador transmite bien la estructura general del hebreo: Yahvé como sujeto, entrada en la tierra prometida, juramento a los patriarcas, y el don de ciudades no construidas por Israel. Sin embargo, dos elecciones reducen la fidelidad precisa al audit trail: «Y sucederá que» no refleja tan bien el valor natural de וְהָיָה כִּי como «Y cuando», y «te llevará a» debilita la fuerza de «bring you into / hacer entrar en» de יְבִיאֲךָ. Además, «a tus padres» en español suena fácilmente a progenitores inmediatos; dado que el propio contexto nombra a Abraham, Isaac y Jacob, conviene explicitar «antepasados» en el texto con nota que preserve el hebreo «padres».'
  spanish_quality_summary: El español es claro y digno, pero «Y sucederá que» suena más rígido y menos natural que «Y cuando». «Edificaste» es aceptable, aunque «construiste» suena más natural en español general; no obstante, no es necesario cambiarlo si se desea un registro bíblico ligeramente elevado. La mejora principal es hacer más idiomática la apertura y evitar la ambigüedad de «tus padres».
  glossary_alignment: Se respeta correctamente Yahvé para יְהוָה y «la tierra» para הָאָרֶץ. No hay conflictos con la terminología doctrinal principal. La excepción recomendada es usar «antepasados[a]» en el texto principal para claridad española, manteniendo en nota que el hebreo dice «padres», ya que en español «padres» suele entenderse como progenitores y no preserva bien la referencia patriarcal sin tropiezo.
  issues:
  - severity: medium
    issue: «Y sucederá que» para וְהָיָה כִּי
    rationale: La construcción hebrea aquí funciona de manera natural como introducción temporal/prospectiva. El audit trail inglés eligió «And when». En español, «Y cuando» reproduce mejor ese valor que «Y sucederá que», que suena más formulaico y menos directo.
  - severity: medium
    issue: «te llevará a» para יְבִיאֲךָ
    rationale: El hifil de בוא tiene fuerza causativa de entrada. «Te llevará a» comunica movimiento, pero no tan claramente «te hará entrar / te introducirá» en la tierra. «Te haga entrar en» o «te introduzca en» preserva mejor el sentido.
  - severity: medium
    issue: «a tus padres» puede malinterpretarse en español
    rationale: Aunque es formalmente literal, en español común se entiende como progenitores inmediatos. Dado que el versículo especifica Abraham, Isaac y Jacob, «antepasados» en el texto con nota aclaratoria preserva mejor el sentido y la legibilidad sin perder la decisión léxica documentada.
  revised_spanish_text: Y cuando Yahvé tu Dios te haga entrar en la tierra que juró a tus antepasados[a], a Abraham, a Isaac y a Jacob, para darte ciudades grandes y buenas que no construiste,
  revised_footnotes:
  - marker: a
    text: O «a tus padres». El hebreo dice «a tus padres», y el contexto nombra específicamente a Abraham, Isaac y Jacob.
    reason: lexical_alternative
  revision_rationale: Se ajusta la apertura a «Y cuando» para reflejar mejor וְהָיָה כִּי y el audit trail inglés. Se cambia «te llevará a» por «te haga entrar en» para conservar la fuerza causativa de יְבִיאֲךָ. Se usa «antepasados[a]» en el texto principal por claridad española, manteniendo en nota la forma hebrea «padres» y su especificación patriarcal. Se conserva la coma final porque el versículo continúa en la oración siguiente del contexto bíblico.
