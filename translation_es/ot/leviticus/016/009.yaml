translation:
  language: es
  text: Entonces Aarón presentará el macho cabrío[a] sobre el cual cayó la suerte para Yahvé, y lo hará ofrenda por el pecado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «sobre el cual salió la suerte para Yahvé».'
    reason: alternative_reading
lexical_decisions:
- source_word: וְהִקְרִיב
  english_pob_choice: shall present
  chosen_spanish: presentará
  alternatives_spanish:
  - ofrecerá
  - traerá cerca
  lexicon: HALOT
  rationale: En contexto ritual, הקריב expresa acercar o presentar la víctima para la acción cultual. «Presentará» conserva ese valor ceremonial sin anticipar de forma demasiado explícita la forma final del sacrificio.
- source_word: הַשָּׂעִיר
  english_pob_choice: the goat
  chosen_spanish: el macho cabrío
  alternatives_spanish:
  - el cabrío
  - la cabra
  lexicon: HALOT
  rationale: El hebreo se refiere a un macho cabrío. En español, «macho cabrío» evita ambigüedad de género y mantiene precisión zoológica y cultual.
- source_word: אֲשֶׁר עָלָה עָלָיו הַגּוֹרָל
  english_pob_choice: on which the lot ... fell
  chosen_spanish: sobre el cual cayó la suerte
  alternatives_spanish:
  - para el cual salió la suerte
  - sobre el que recayó la suerte
  lexicon: HALOT
  rationale: La imagen hebrea de la suerte que «sube» sobre el animal se expresa naturalmente en español como que «cayó la suerte». «Suertes» o «suerte» mantiene el sentido de asignación ritual.
- source_word: לַיהוָה
  english_pob_choice: for Yahweh
  chosen_spanish: para Yahvé
  alternatives_spanish:
  - para Yahweh
  - para el SEÑOR
  lexicon: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
  rationale: 'Se sigue el criterio editorial del proyecto para el nombre divino: «Yahvé». «Para» reproduce la preposición lamed de designación ritual, distinguiendo este macho cabrío del otro en la ceremonia.'
- source_word: וְעָשָׂהוּ חַטָּאת
  english_pob_choice: and make it a sin offering
  chosen_spanish: y lo hará expiación por el pecado
  alternatives_spanish:
  - y lo hará ofrenda por el pecado
  - y lo convertirá en ofrenda por el pecado
  lexicon: HALOT
  rationale: חטאת en legislación sacrificial puede designar la ofrenda por el pecado, pero el verbo עשה con sufijo permite una formulación verbal. «Lo hará expiación por el pecado» mantiene la función expiatoria sin forzar una equivalencia nominal pesada; aun así, la opción literal «ofrenda por el pecado» queda registrada como alternativa.
theological_decisions:
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragrama directamente; en la serie española se preserva el nombre divino como «Yahvé», en coherencia con la política del proyecto y sin recurrir al reemplazo reverencial «SEÑOR».
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Naturaleza de חַטָּאת en contexto sacrificial
  english_pob_reading: sin offering
  chosen_spanish_reading: expiación por el pecado
  alternative_spanish_readings:
  - ofrenda por el pecado
  - sacrificio por el pecado
  rationale: La forma verbal del hebreo permite enfatizar la función de expiación del macho cabrío más que una simple etiqueta nominal. «Expiación por el pecado» conserva la fuerza cultual y evita perder el matiz verbal del original.
  doctrine_reference: Levítico 16:9; HALOT חטאת
translation_notes:
  revision_awareness: El contexto inglés fue revisado sin cambios sustantivos en la última pasada; la concordancia general es alta y no se reportaron objeciones de revisión. La redacción española conserva ese equilibrio, ajustando solo la naturalidad idiomática y la terminología propia del proyecto.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estándar para יהוה.
  - Se prefiere «macho cabrío» para precisar el referente del hebreo שׂעיר.
  - «Suerte» reproduce el lenguaje ritual de asignación por sorteo.
  - La frase final preserva el valor expiatorio de חטאת sin abandonar su trasfondo sacrificial.
