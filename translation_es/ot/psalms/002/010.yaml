translation:
  language: es
  text: Ahora, pues[a], oh reyes, sean sabios; reciban corrección, oh jueces de la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'sean instruidos' o 'acepten corrección'. El verbo hebreo puede denotar recibir disciplina o admonición, no solo advertencia.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: So now
  chosen_spanish: Así que ahora
  alternatives_spanish:
  - Y ahora
  - Ahora, pues
  lexicon: HALOT
  rationale: La partícula conjuntiva con valor inferencial y temporal se vierte de manera natural como una transición conclusiva en español. 'Así que ahora' conserva el impulso de consecuencia que tiene 'So now' sin perder la referencia temporal.
- source_word: מְלָכִים
  english_pob_choice: O kings
  chosen_spanish: oh reyes
  alternatives_spanish:
  - reyes
  lexicon: HALOT
  rationale: El hebreo marca vocativo por el contexto poético; en español conviene señalarlo con 'oh' para reproducir la apelación directa y solemne sin añadir contenido nuevo.
- source_word: הַשְׂכִּילוּ
  english_pob_choice: be wise
  chosen_spanish: sean sabios
  alternatives_spanish:
  - actúen sabiamente
  - adquieran entendimiento
  lexicon: HALOT
  rationale: El hifil imperativo plural pide conducta prudente fundada en comprensión. 'Sean sabios' es idiomático y fiel al mandato exhortativo; mantiene el valor sapiencial que la versión inglesa resumió como 'be wise'.
- source_word: הִוָּסְרוּ
  english_pob_choice: be warned
  chosen_spanish: recíban corrección
  alternatives_spanish:
  - sean advertidos
  - reciban instrucción
  - acepten corrección
  lexicon: HALOT
  rationale: El nifal puede significar recibir disciplina, instrucción o corrección. En español, 'recíban corrección' preserva mejor esa amplitud que 'ser advertidos' y evita reducir el verbo a mera información; además refleja la tensión lexical señalada en la nota inglesa.
- source_word: שֹׁפְטֵי אָרֶץ
  english_pob_choice: O judges of the earth
  chosen_spanish: oh jueces de la tierra
  alternatives_spanish:
  - jueces de la tierra
  - jueces del mundo
  lexicon: HALOT
  rationale: '''Jueces'' conserva el término específico del hebreo frente a generalizaciones como ''gobernantes''. ''Tierra'' refleja el alcance cósmico/político del salmo y sigue la preferencia del auditable English POB por ''earth''.'
translation_notes:
  revision_awareness: El texto inglés muestra acuerdo alto y sin cambios recientes; la presente versión española sigue ese mismo sentido base y solo ajusta la formulación para que el vocativo y la fuerza exhortativa suenen naturales en español sin perder la amplitud semántica del verbo final.
  spanish_consistency_notes:
  - Se mantuvo 'oh' para marcar vocativo poético de manera consistente con el tono del salmo.
  - Se usó 'tierra' para אָרֶץ, en continuidad con la amplitud geográfica/política del contexto.
  - Se evitó 'SEÑOR' o equivalentes porque no aparece aquí el Tetragrámaton; el versículo trata de reyes y jueces, no del nombre divino.
  - '''Recíban corrección'' preserva la ambigüedad del hebreo entre advertencia, disciplina e instrucción.'
