translation:
  language: es
  text: 'Le hizo un gran aposento[a], donde antes solían poner la ofrenda de cereal, el incienso, los utensilios y el diezmo del grano, del mosto y del aceite: la porción mandada[b][c] para los levitas, los cantores y los porteros, y la contribución para los sacerdotes[d].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una gran sala» o «un gran almacén». El hebreo לִשְׁכָּה puede designar una estancia usada para depósito dentro del complejo del templo.
    reason: lexical_alternative
  - marker: b
    text: O «lo prescrito»; el hebreo usa una construcción singular colectiva para la porción asignada a levitas, cantores y porteros.
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: «el mandamiento de los levitas, de los cantores y de los porteros»; el sentido es la provisión fijada para ellos.'
    reason: source_note
  - marker: d
    text: O «la ofrenda elevada para los sacerdotes».
    reason: lexical_alternative
lexical_decisions:
- source_word: לִשְׁכָּה גְדוֹלָה
  english_pob_choice: a large chamber
  chosen_spanish: una gran cámara
  alternatives_spanish:
  - una gran sala
  - un gran almacén
  lexicon: HALOT
  rationale: לִשְׁכָּה designa una estancia o cámara, a menudo dentro del recinto del templo. «Cámara» conserva mejor ese valor arquitectónico y cultual que «sala», mientras que «almacén» enfatiza demasiado la función de depósito.
- source_word: וַיַּעַשׂ לוֹ
  english_pob_choice: He made for him
  chosen_spanish: Le hizo
  alternatives_spanish:
  - Le preparó
  - Le dispuso
  lexicon: HALOT
  rationale: El verbo עשה con ל + pronombre expresa aquí una acción concreta de hacer/preparar para alguien. «Le hizo» sigue de cerca la construcción sin sobreexplicarla.
- source_word: וְשָׁם הָיוּ לְפָנִים נֹתְנִים
  english_pob_choice: where formerly they had put
  chosen_spanish: donde antes solían poner
  alternatives_spanish:
  - donde anteriormente ponían
  - donde antes habían puesto
  lexicon: HALOT
  rationale: לְפָנִים significa «antes/antiguamente», y la forma verbal expresa una costumbre pasada. «Solían poner» conserva bien ese valor habitual sin forzar un perfecto puntual.
- source_word: הַמִּנְחָה
  english_pob_choice: the grain offering
  chosen_spanish: la ofrenda de cereal
  alternatives_spanish:
  - la ofrenda vegetal
  - la oblación
  lexicon: HALOT
  rationale: En contexto cultual, מִנְחָה se refiere a una ofrenda de cereal. «Ofrenda de cereal» es claro y evita la ambigüedad de «ofrenda» a secas; «oblación» sería más tradicional pero menos transparente.
- source_word: הַלְּבוֹנָה
  english_pob_choice: the frankincense
  chosen_spanish: el incienso
  alternatives_spanish:
  - el olíbano
  - el perfume de incienso
  lexicon: HALOT
  rationale: לְבוֹנָה denota específicamente el incienso aromático usado en el culto. En español, «incienso» comunica bien el referente; «olíbano» es más preciso etimológicamente pero menos inteligible para muchos lectores.
- source_word: הַכֵּלִים
  english_pob_choice: the vessels
  chosen_spanish: los utensilios
  alternatives_spanish:
  - los vasos
  - los artículos
  lexicon: HALOT
  rationale: כֵּלִים son implementos o enseres de servicio. «Utensilios» es lo más natural en español actual; «vasos» sería demasiado estrecho y «artículos» demasiado vago.
- source_word: מַעְשַׂר
  english_pob_choice: the tithe
  chosen_spanish: el diezmo
  alternatives_spanish:
  - la décima parte
  - el tributo
  lexicon: HALOT
  rationale: מַעְשַׂר es el término establecido para la décima parte entregada conforme a la ley. «Diezmo» es el equivalente idiomático más claro en español.
- source_word: הַדָּגָן הַתִּירוֹשׁ וְהַיִּצְהָר
  english_pob_choice: grain, new wine, and oil
  chosen_spanish: del grano, del mosto y del aceite
  alternatives_spanish:
  - del grano, del vino nuevo y del aceite
  - del cereal, del vino joven y del aceite
  lexicon: HALOT
  rationale: El trío hebreo es formular y cultual. «Grano» traduce דָגָן; «mosto» comunica bien תִירוֹשׁ como producto nuevo de la vid, sin imponer una maduración específica; «aceite» mantiene la sencillez del hebreo.
- source_word: מִצְוַת הַלְוִיִּם וְהַמְשֹׁרְרִים וְהַשֹּׁעֲרִים
  english_pob_choice: the portion commanded for the Levites, the singers, and the gatekeepers
  chosen_spanish: la porción mandada para los levitas, los cantores y los porteros
  alternatives_spanish:
  - lo prescrito para los levitas, los cantores y los porteros
  - la disposición mandada para los levitas, los cantores y los porteros
  lexicon: HALOT
  rationale: La construcción hebrea es elíptica y apunta a lo que estaba prescrito para estos grupos. «Porción mandada» conserva la singularidad colectiva indicada por la revisión inglesa y evita convertir «mandamiento» en algo más abstracto de lo que el contexto requiere.
- source_word: וְהַמְשֹׁרְרִים
  english_pob_choice: the singers
  chosen_spanish: los cantores
  alternatives_spanish:
  - los cantores litúrgicos
  - los músicos
  lexicon: HALOT
  rationale: מְשֹׁרְרִים son quienes cantan en el servicio del templo. «Cantores» es natural en español bíblico y suficientemente preciso; «músicos» sería más general y menos fiel al canto explícito.
- source_word: וְהַשֹּׁעֲרִים
  english_pob_choice: the gatekeepers
  chosen_spanish: los porteros
  alternatives_spanish:
  - los guardianes de la puerta
  - los guardias de acceso
  lexicon: HALOT
  rationale: שֹׁעֲרִים se refiere a los encargados de las puertas del santuario. «Porteros» es la forma breve y tradicionalmente comprensible en español, sin perder la función de vigilancia.
- source_word: וּתְרוּמַת הַכֹּהֲנִים
  english_pob_choice: the contribution for the priests
  chosen_spanish: la contribución para los sacerdotes
  alternatives_spanish:
  - la ofrenda elevada para los sacerdotes
  - la porción de los sacerdotes
  lexicon: HALOT
  rationale: תְרוּמָה es una contribución o porción apartada. «Contribución» evita el tecnicismo de «ofrenda elevada» y refleja bien el sentido de porción reservada para el sustento sacerdotal.
theological_decisions:
- issue: Naturaleza de la mención de la מִצְוָה asociada a levitas, cantores y porteros
  english_pob_reading: the portion commanded for the Levites, the singers, and the gatekeepers
  chosen_spanish_reading: la porción mandada para los levitas, los cantores y los porteros
  alternative_spanish_readings:
  - lo prescrito para los levitas, los cantores y los porteros
  - el mandamiento relativo a los levitas, los cantores y los porteros
  rationale: La frase no trata de un mandamiento abstracto, sino de la porción estipulada para estos servidores del templo. «Porción mandada» mantiene el carácter normativo y distributivo que la nota inglesa ya señalaba.
  doctrine_reference: Ordenanzas del culto y sustento levítico en la Torá; cf. Núm. 18; Neh. 10.
- issue: Sentido de תְרוּמַת הַכֹּהֲנִים
  english_pob_reading: the contribution for the priests
  chosen_spanish_reading: la contribución para los sacerdotes
  alternative_spanish_readings:
  - la ofrenda elevada para los sacerdotes
  - la porción de los sacerdotes
  rationale: El término señala una porción apartada para los sacerdotes, no necesariamente una ofrenda sacrificial específica. «Contribución» conserva esa amplitud y evita sobrecargar el texto con terminología ritual técnica.
  doctrine_reference: Sostenimiento sacerdotal y dedicación de porciones apartadas; cf. Lev. 7; Núm. 18.
translation_notes:
  revision_awareness: La versión inglesa revisada corrigió «portions» por «portion» para reflejar el singular hebreo colectivo en מִצְוַת. El español sigue esa decisión con «la porción mandada», manteniendo el valor distributivo único. También se preservó la opción lexical de traducir לִשְׁכָּה como espacio del templo más que como almacén genérico.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, aunque este versículo no contiene el nombre divino.
  - «Mesías/Cristo» no aplica aquí.
  - 'Se conservan formas cultuales transparentes: «ofrenda de cereal», «diezmo», «contribución», evitando equivalentes excesivamente eclesiásticos.'
  - Se emplean «cantores» y «porteros» como términos bíblicos claros y coherentes con el registro del templo.
