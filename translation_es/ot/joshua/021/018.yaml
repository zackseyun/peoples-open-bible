translation:
  language: es
  text: 'Anatot con sus tierras de pastoreo[a], y Almón con sus tierras de pastoreo: cuatro ciudades.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'terreno común' / 'terreno circundante' para 'tierras de pastoreo'. El término hebreo designa el terreno abierto que pertenece a una ciudad.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֲנָתוֹת
  english_pob_choice: Anathoth
  chosen_spanish: Anatot
  alternatives_spanish:
  - Anatót
  - Anathot
  lexicon: HALOT
  rationale: Nombre propio de lugar; se translitera al español de forma natural. Se evita traducirlo, porque el texto enumera ciudades concretas del reparto territorial.
- source_word: מִגְרָשֶׁהָ
  english_pob_choice: its pasturelands
  chosen_spanish: sus tierras de pastoreo
  alternatives_spanish:
  - su tierra común
  - sus tierras סביבantes
  - su pastizal
  lexicon: HALOT
  rationale: מִגְרָשׁ en listas de asignación territorial designa el terreno abierto perteneciente a la ciudad, a menudo usable para pastoreo. 'Tierras de pastoreo' conserva ese valor funcional en español y sigue la decisión del POB inglés de no optar por una calca opaca.
- source_word: עַלְמוֹן
  english_pob_choice: Almon
  chosen_spanish: Almón
  alternatives_spanish:
  - Almon
  lexicon: HALOT
  rationale: Nombre propio transliterado con acento gráfico para lectura natural en español, manteniendo la referencia geográfica.
- source_word: עָרִים אַרְבַּע
  english_pob_choice: four cities
  chosen_spanish: cuatro ciudades
  alternatives_spanish:
  - cuatro pueblos
  lexicon: HALOT
  rationale: La frase numeral resume los lugares listados. 'Ciudades' corresponde al uso territorial de עָרִים en este contexto y conserva la forma de síntesis del original.
- source_word: אֶת ... וְאֶת ... וְאֶת ... וְאֶת
  english_pob_choice: '[not separately represented in English beyond coordination and direct-object structure]'
  chosen_spanish: '[no se expresa aparte; queda reflejado en la coordinación]'
  alternatives_spanish:
  - repetir cada 'a' / 'a las'
  lexicon: Hebrew grammar
  rationale: El marcador hebreo de objeto directo no tiene equivalente directo en español. Su función queda absorbida por la coordinación simple con 'y', evitando un añadido artificial.
translation_notes:
  revision_awareness: La revisión más reciente indicó que no hacían falta cambios; el español mantiene la estructura resumida del hebreo y la misma solución léxica principal del POB inglés para מִגְרָשׁ.
  spanish_consistency_notes:
  - Se preserva la enumeración breve del versículo, sin añadir verbos inexistentes en el hebreo.
  - '''Tierras de pastoreo'' mantiene el matiz espacial y funcional de מִגְרָשׁ sin convertirlo en una interpretación demasiado técnica.'
  - Los nombres propios se transliteran al uso español, con acentuación solo donde ayuda a la pronunciación y no altera la identificación del lugar.
