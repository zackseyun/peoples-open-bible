translation:
  language: es
  text: ¿Hasta cuándo[a], perezoso, seguirás acostado? ¿Cuándo te levantarás de tu sueño?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «holgazán» o «indolente» para «perezoso».
    reason: lexical_alternative
lexical_decisions:
- source_word: עַד מָתַי
  english_pob_choice: How long
  chosen_spanish: ¿Hasta cuándo
  alternatives_spanish:
  - ¿Por cuánto tiempo
  - ¿Hasta cuándo será
  lexicon: HALOT
  rationale: La expresión hebrea es una pregunta idiomática de duración; en español, «¿Hasta cuándo?» conserva de forma natural el tono de reproche y la idea de prolongación indefinida que transmite el hebreo.
- source_word: עָצֵל
  english_pob_choice: sluggard
  chosen_spanish: perezoso
  alternatives_spanish:
  - holgazán
  - indolente
  - vaga
  lexicon: HALOT
  rationale: El término hebreo designa a una persona habitualmente ociosa en el registro sapiencial. «Perezoso» comunica bien la fuerza léxica en español general; «holgazán» sería una alternativa más marcada, pero menos neutral para lectura pública.
- source_word: תִּשְׁכָּב
  english_pob_choice: will you lie there
  chosen_spanish: vas a acostarte
  alternatives_spanish:
  - seguirás acostado
  - vas a quedarte acostado
  - te acostarás
  lexicon: HALOT
  rationale: En este contexto el verbo apunta a permanecer en la cama o seguir inactivo. «Vas a acostarte» reproduce el movimiento/estado de acostarse de forma natural; otras opciones enfatizan más la permanencia, pero esta mantiene fluidez sin añadir más de lo que el hebreo exige.
- source_word: תָּקוּם
  english_pob_choice: will you rise
  chosen_spanish: te levantarás
  alternatives_spanish:
  - vas a levantarte
  - te pondrás de pie
  - te alzarás
  lexicon: HALOT
  rationale: «Levantar(se)» es el equivalente idiomático normal en español para «arise/get up» y conserva la imagen directa de pasar del sueño a la actividad.
- source_word: מִשְּׁנָתֶךָ
  english_pob_choice: from your sleep
  chosen_spanish: de tu sueño
  alternatives_spanish:
  - de tu dormir
  - de tu sueño profundo
  - de tu sueño/descanso
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «de tu sueño», en español «sueño» puede sonar más natural y mantiene la referencia al estado de dormir. Se evita «slumber» o formulaciones más literarias porque el contexto es una reprensión sobria.
translation_notes:
  revision_awareness: 'El texto sigue de cerca la estructura interrogativa del hebreo y conserva el tono de reprensión sapiencial observado en la traducción inglesa POB. Se mantiene la correspondencia semántica principal: duración («Hasta cuándo»), apelativo de carácter («perezoso»), permanencia en la cama («vas a acostarte») y despertar («te levantarás de tu sueño»). No se introducen lecturas textuales alternativas ni cambios de sentido respecto al paquete fuente.'
  spanish_consistency_notes:
  - Se evita «SEÑOR» u otras sustituciones porque el versículo no contiene el nombre divino.
  - Se prefiere «perezoso» como término directo y comprensible; la nota conserva la alternativa más proverbial («holgazán»).
  - «Sueño» se usa para מִשְּׁנָתֶךָ en un sentido literal de dormir, no como sueño onírico.
  - La puntuación interrogativa doble reproduce el paralelismo de dos preguntas breves del hebreo.
