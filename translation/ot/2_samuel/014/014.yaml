theological_decisions:
- issue: Interpretation of וְלֹא יִשָּׂא אֱלֹהִים נֶפֶשׁ
  chosen_reading: God does not take away a life
  alternative_readings:
  - God does not show partiality to a person
  - God does not take away the soul
  rationale: The phrase is syntactically and semantically difficult. In this verse's flow, the contrast is between irreversible human death and God's merciful action toward the banished. Rendering the clause as 'God does not take away a life' best fits the immediate context and leads naturally into God's devising means of restoration. Because 'lift up the face/person' is the more common idiom for partiality, that alternative is less likely here, though worth preserving in a footnote.
  doctrine_reference: 'Translation philosophy §3: preserve theological tension rather than resolve it without documentation.'
