review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido del hebreo: Aarón porta los nombres de los hijos de Israel en el pectoral del juicio, sobre su corazón, al entrar en el Lugar Santo, delante de Yahvé continuamente. Se preservan correctamente «Yahvé», «hijos de Israel», «pectoral del juicio» y «Lugar Santo». La única desalineación significativa está en «para memorial», que en español suena incompleto o poco idiomático para לְזִכָּרוֹן; conviene «como memorial» o «para memorial delante de Yahvé» solo con apoyo contextual, pero aquí «como memorial» es más natural y fiel al valor funcional.'
  spanish_quality_summary: La redacción es clara y digna, pero «para memorial» resulta poco natural en español bíblico moderno y afecta la legibilidad. La puntuación con comas alrededor de «sobre su corazón» no es incorrecta, aunque una línea más fluida sin tantas pausas mejora la lectura. El resto del versículo suena bien en español eclesial general.
  glossary_alignment: 'Hay buena conformidad con la terminología del proyecto: יְהוָה -> «Yahvé» correctamente; בְּנֵי יִשְׂרָאֵל -> «hijos de Israel» preserva la forma genealógica; חֹשֶׁן הַמִּשְׁפָּט -> «pectoral del juicio» conserva el título cultual; הַקֹּדֶשׁ -> «Lugar Santo» es adecuado en contexto tabernacular. El único ajuste léxico recomendado es לְזִכָּרוֹן -> «como memorial», que además coincide con la nota ya presente.'
  issues:
  - severity: medium
    issue: «para memorial» es poco idiomático en español
    rationale: Aunque intenta seguir de cerca «for a memorial», en español moderno y eclesial general la construcción suena truncada. «Como memorial» expresa mejor la función cultual de לְזִכָּרוֹן sin pérdida semántica y ya está respaldada por la nota existente.
  revised_spanish_text: Aarón llevará los nombres de los hijos de Israel en el pectoral del juicio sobre su corazón, cuando entre en el Lugar Santo, como memorial[a] delante de Yahvé continuamente.
  revised_footnotes:
