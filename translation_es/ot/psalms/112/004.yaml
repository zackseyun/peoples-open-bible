translation:
  language: es
  text: Amanece luz en la oscuridad para los rectos[a]; él es benigno y compasivo y justo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Amanece luz en la oscuridad para los rectos, benigno y compasivo y justo», con los adjetivos finales posiblemente en eco del carácter de Yahvé en el Salmo 111:4.'
    reason: alternative_reading
lexical_decisions:
- source_word: זָרַח
  english_pob_choice: dawns
  chosen_spanish: brilla
  alternatives_spanish:
  - amanece
  - despunta
  - alumbra
  lexicon: HALOT
  rationale: El verbo זרח expresa el resplandecer o despuntar de la luz. En español, 'brilla' mantiene la imagen poética y el valor aspectual sin sonar forzado; 'amanece' podría sugerir solo el inicio del día, y 'despunta' es más marcado estilísticamente.
- source_word: בַּחֹשֶׁךְ
  english_pob_choice: in the darkness
  chosen_spanish: en la oscuridad
  alternatives_spanish:
  - en tinieblas
  - en la noche
  lexicon: HALOT
  rationale: La preposición con el sustantivo articulado permite una frase natural en español. 'Oscuridad' conserva el sentido literal y metafórico del hebreo, mientras que 'tinieblas' sería más solemne pero algo más cargado.
- source_word: אוֹר
  english_pob_choice: Light
  chosen_spanish: la luz
  alternatives_spanish:
  - luz
  - una luz
  lexicon: HALOT
  rationale: Aunque el hebreo no lleva artículo, en español 'la luz' funciona de modo natural como sujeto poético y conserva el valor genérico/qualitativo. Se evita 'una luz' para no reducir la fuerza del enunciado.
- source_word: לַיְשָׁרִים
  english_pob_choice: for the upright
  chosen_spanish: para los rectos
  alternatives_spanish:
  - para los justos
  - para los íntegros
  lexicon: HALOT
  rationale: יְשָׁרִים designa a personas rectas o íntegras. 'Rectos' preserva la distinción respecto de צַדִּיק, que se traduce con otra palabra, y evita fusionar ambos términos en un solo matiz.
- source_word: חַנּוּן
  english_pob_choice: gracious
  chosen_spanish: bondadoso
  alternatives_spanish:
  - gracioso
  - benigno
  lexicon: HALOT
  rationale: En este contexto, el adjetivo puede describir una actitud de favor y benevolencia. 'Bondadoso' es más natural para el lector hispanohablante, aunque reconoce la cercanía semántica con 'gracioso/gracioso en el sentido de lleno de gracia'.
- source_word: רַחוּם
  english_pob_choice: compassionate
  chosen_spanish: compasivo
  alternatives_spanish:
  - misericordioso
  - piadoso
  lexicon: HALOT
  rationale: רַחוּם enfatiza la compasión tierna. 'Compasivo' diferencia este término del anterior y conserva la serie de rasgos sin recurrir de inmediato a una fórmula litúrgica fija.
- source_word: צַדִּיק
  english_pob_choice: righteous
  chosen_spanish: justo
  alternatives_spanish:
  - recto
  - righteous
  lexicon: HALOT
  rationale: צַדִּיק puede ser 'justo' o 'recto' según el contexto. Aquí la triada de atributos se entiende mejor con 'justo', que mantiene la cualidad moral/legal sin repetir 'recto' del miembro anterior.
theological_decisions:
- issue: Referente de los tres adjetivos finales (חַנּוּן וְרַחוּם וְצַדִּיק)
  english_pob_reading: 'The English POB keeps the ambiguity open: the final adjectives may describe the singular righteous person, or they may echo the LORD''s character from Psalm 111:4; the footnote preserves both possibilities.'
  chosen_spanish_reading: Los adjetivos pueden leerse como rasgos del hombre recto del salmo, y también pueden oírse como eco de la caracterización de Yahvé en el salmo anterior.
  alternative_spanish_readings:
  - 'Describen solo al sujeto implícito: él es bondadoso, compasivo y justo.'
  - Describen la luz personificada.
  - Describen directamente a Yahvé.
  rationale: El hebreo presenta una tensión real entre el plural 'los rectos' y los adjetivos en singular, además del eco evidente de Salmo 111:4. En español conviene conservar esa ambigüedad mediante una nota, en vez de resolverla con demasiada decisión en el cuerpo del texto.
  doctrine_reference: Preservar tensión intertextual y sintáctica; cf. Salmo 111:4.
translation_notes:
  revision_awareness: La versión inglesa revisó 'has dawned' por 'dawns' para reflejar mejor el perfecto hebreo en un contexto poético. En español, 'brilla' mantiene ese valor presente/gnómico y evita una temporalidad demasiado cerrada.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como forma base cuando se menciona el nombre divino en la nota, conforme al criterio del proyecto.
  - Se evitó 'SEÑOR' como sustituto del nombre divino.
  - Se conservó la distinción entre יְשָׁרִים ('rectos') y צַדִּיק ('justo') para no aplanar el paralelismo.
  - La estructura principal conserva la ambigüedad del hebreo sin forzar un sujeto explícito en los adjetivos finales.
