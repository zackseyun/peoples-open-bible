    rationale: La nota dice «también puede entenderse como “terafines” en transliteración técnica», pero «terafines» ya es la forma usada en el texto principal. La alternativa documentada en el rastro inglés es una glosa explicativa como «dioses domésticos» o explicación de imágenes cultuales usadas para adivinación.
  - severity: low
    issue: Anclaje de nota a en «se ha detenido[a]» en lugar de la frase idiomática
    rationale: La nota a explica «la madre del camino», por lo que el marcador conviene colocarlo sobre esa expresión para mayor claridad editorial.
