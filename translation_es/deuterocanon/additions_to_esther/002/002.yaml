    rationale: La idea aspectual está presente, pero en español suena menos natural que «se apresuraba». El contexto ya comunica proceso en curso.
  - severity: low
    issue: Falta la tilde en «aún»
    rationale: Aquí tiene valor adverbial equivalente a «incluso/even in Susa», por lo que la acentuación ayuda a la claridad normativa.
