translation:
  language: es
  text: Ahora, el resto de los hechos[a] de Amasías, desde el primero hasta el último, ¿no están escritos [b]en el Libro de los reyes de Judá e Israel?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Más literalmente: «las palabras/hechos de Amasías, los primeros y los últimos». Se conserva «hechos» por el sentido historiográfico del contexto.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «sobre el Libro». En español, la formulación idiomática normal en esta fórmula documental es «en el Libro».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיֶתֶר
  english_pob_choice: Now the rest of
  chosen_spanish: Ahora, el resto de
  alternatives_spanish:
  - Y el resto de
  - Lo restante de
  lexicon: HALOT
  rationale: La fórmula introductoria señala el material restante sobre el rey. «Ahora» refleja con naturalidad el enlace narrativo de וְ; «el resto de» conserva el sentido de ‘lo que queda’ sin sobrecargar el español.
- source_word: דִּבְרֵי
  english_pob_choice: the acts of
  chosen_spanish: los hechos de
  alternatives_spanish:
  - las palabras de
  - los asuntos de
  lexicon: HALOT
  rationale: En este contexto de resumen real, דִּבְרֵי no se entiende literalmente como «palabras», sino como la totalidad de hechos/acontecimientos del reinado. «Hechos» es el equivalente español más claro y fiel al sentido historiográfico.
- source_word: אֲמַצְיָהוּ
  english_pob_choice: Amaziah
  chosen_spanish: Amasías
  alternatives_spanish:
  - Amazías
  - Amazías
  lexicon: N/A name transliteration convention
  rationale: Se usa la forma bíblica usual en español «Amasías», que es reconocible y readable para audiencia eclesial, manteniendo el nombre propio sin traducirlo.
- source_word: הָרִאשֹׁנִים וְהָאַחֲרוֹנִים
  english_pob_choice: from first to last
  chosen_spanish: desde el primero hasta el último
  alternatives_spanish:
  - los primeros y los últimos
  - de principio a fin
  lexicon: HALOT
  rationale: La pareja expresa totalidad temporal de la historia del rey. «Desde el primero hasta el último» reproduce bien el alcance completo y mantiene el paralelismo del hebreo.
- source_word: הֲלֹא הִנָּם
  english_pob_choice: are they not
  chosen_spanish: ¿no están
  alternatives_spanish:
  - ¿no son
  - ¿acaso no están
  lexicon: HALOT
  rationale: La pregunta retórica espera una respuesta afirmativa. En español, «¿no están» transmite de manera directa la fuerza de la construcción sin añadir elementos interpretativos.
- source_word: כְּתוּבִים
  english_pob_choice: written
  chosen_spanish: escritos
  alternatives_spanish:
  - registrados
  - inscritos
  lexicon: HALOT
  rationale: El participio pasivo se vierte con el adjetivo verbal «escritos», que conserva el valor documental y encaja naturalmente con la pregunta retórica.
- source_word: עַל סֵפֶר
  english_pob_choice: in the Book
  chosen_spanish: en el Libro
  alternatives_spanish:
  - sobre el libro
  - en el rollo
  lexicon: HALOT
  rationale: Aunque עַל es literalmente «sobre», la fórmula bibliográfica en español pide «en el Libro». Se mantiene el sustantivo mayúsculo como título de fuente citada.
- source_word: מַלְכֵי יְהוּדָה וְיִשְׂרָאֵל
  english_pob_choice: of the Kings of Judah and Israel
  chosen_spanish: de los reyes de Judá e Israel
  alternatives_spanish:
  - de los reyes de Judá y de Israel
  - de las crónicas de los reyes de Judá e Israel
  lexicon: HALOT
  rationale: Se conserva el orden hebreo y el carácter del título documental. «Reyes» va en minúscula en español dentro del título compuesto, salvo cuando la convención editorial prefiera capitalización total del nombre del libro citado.
translation_notes:
  revision_awareness: 'Se siguió de cerca el auditor de la versión inglesa: se mantuvo la fórmula de cierre historiográfico, la pregunta retórica y la referencia al documento fuente; la principal adaptación fue hacer natural en español el binomio דִּבְרֵי/כְּתוּבִים sin perder el matiz documental.'
  spanish_consistency_notes:
  - Se usa «Amasías» como forma española estándar del nombre.
  - «Libro» se capitaliza por tratarse de un título de fuente citada, siguiendo la convención del POB inglés.
  - No se introduce terminología eclesiástica ajena al hebreo; el verso conserva su tono archivístico e historiográfico.
