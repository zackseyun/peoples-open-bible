translation:
  language: es
  text: Y en el año ciento sesenta y cinco[a], Demetrio, hijo de Demetrio, vino de Creta a la tierra de sus padres.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Literalmente: «a la tierra de sus padres», un giro idiomático para su tierra ancestral.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν ἔτει πέμπτῳ καὶ ἑξηκοστῷ καὶ ἑκατοστῷ
  english_pob_choice: in the one hundred sixty-fifth year
  chosen_spanish: en el año ciento sesenta y cinco
  alternatives_spanish:
  - en el año ciento sesenta y quinto
  - en el año ciento sesenta y cinco
  lexicon: LSJ
  rationale: El griego usa numeración aditiva para fechar; en español bíblico natural, 'en el año ciento sesenta y cinco' comunica con claridad la cronología seléucida sin forzar una construcción ordinal menos idiomática.
- source_word: ἦλθεν
  english_pob_choice: came
  chosen_spanish: vino
  alternatives_spanish:
  - llegó
  - acudió
  lexicon: LSJ
  rationale: El verbo de movimiento se traduce con un perfecto narrativo sencillo. 'Vino' conserva el tono bíblico y la direccionalidad hacia el destino indicado por εἰς; 'llegó' es posible, pero ligeramente más interpretativo.
- source_word: Δημήτριος ὁ υἱὸς Δημητρίου
  english_pob_choice: Demetrius the son of Demetrius
  chosen_spanish: Demetrio, hijo de Demetrio
  alternatives_spanish:
  - Demetrio, el hijo de Demetrio
  - Demetrio hijo de Demetrio
  lexicon: LSJ
  rationale: Los nombres propios se transliteran de forma directa al español. La aposición con 'hijo de' reproduce la relación genealógica sin añadir elementos ajenos al griego.
- source_word: ἐκ Κρήτης
  english_pob_choice: from Crete
  chosen_spanish: de Creta
  alternatives_spanish:
  - desde Creta
  - procedente de Creta
  lexicon: LSJ
  rationale: '''De Creta'' es la equivalencia más natural y fiel para el origen geográfico marcado por ἐκ. ''Desde Creta'' suena más explícitamente direccional; ''procedente de'' sería más explicativo que el griego.'
- source_word: εἰς τὴν γῆν τῶν πατέρων αὐτοῦ
  english_pob_choice: into the land of his fathers
  chosen_spanish: a la tierra de sus padres
  alternatives_spanish:
  - a la tierra de sus antepasados
  - a su tierra ancestral
  lexicon: LSJ
  rationale: Conservo 'padres' para reflejar el plural del griego τῶν πατέρων y no neutralizarlo prematuramente como 'antepasados'. 'Tierra' mantiene el valor amplio de γῆ. 'A' expresa bien la entrada/movimiento del εἰς sin necesidad de un calco de 'into'.
translation_notes:
  revision_awareness: El texto griego y el control de la POB inglesa coinciden de manera alta; no se requieren enmiendas sustantivas. La única decisión marcada es mantener en español la imagen idiomática de 'la tierra de sus padres' sin convertirla en una paráfrasis como 'patria' o 'tierra ancestral' en el cuerpo principal.
  spanish_consistency_notes:
  - Se conserva 'Demetrio' como forma estable del nombre propio.
  - Se usa 'Creta' como topónimo habitual en español.
  - Se evita 'SEÑOR' u այլ terminología ajena, porque no hay vocabulario divino en el versículo.
  - La nota[a] preserva la ambigüedad/idioma del sintagma final sin sobreexplicar el texto principal.
