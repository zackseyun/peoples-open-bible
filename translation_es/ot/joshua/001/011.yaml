translation:
  language: es
  text: 'Pasen por en medio del campamento y manden al pueblo, diciendo: «Preparen provisiones para ustedes, porque dentro de tres días[a] van a cruzar este Jordán para entrar a poseer la tierra que Yahvé su Dios les da para poseerla».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en tres días más» / «al cabo de tres días». La expresión hebrea señala un breve plazo restante antes del cruce; «dentro de tres días» capta mejor aquí ese sentido.
    reason: lexical_alternative
lexical_decisions:
- source_word: עִבְרוּ
  english_pob_choice: Pass through
  chosen_spanish: Pasen por
  alternatives_spanish:
  - Pasen a través de
  - Atravesen
  lexicon: HALOT
  rationale: El imperativo plural comunica un movimiento a través de un espacio; «pasen por» conserva la acción sin sonar forzado en español y mantiene el valor direccional.
- source_word: בְּקֶרֶב הַמַּחֲנֶה
  english_pob_choice: the midst of the camp
  chosen_spanish: por en medio del campamento
  alternatives_spanish:
  - en medio del campamento
  - por el campamento
  - dentro del campamento
  lexicon: HALOT
  rationale: קֶרֶב señala el interior o centro; «por en medio» preserva la imagen espacial de moverse atravesando el campamento.
- source_word: וְצַוּוּ אֶת הָעָם
  english_pob_choice: and command the people
  chosen_spanish: y manden al pueblo
  alternatives_spanish:
  - y ordenen al pueblo
  - y den instrucciones al pueblo
  lexicon: HALOT
  rationale: צוה tiene fuerza de mandato. «Manden» es natural en español y mantiene la autoridad del encargo.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y digan
  lexicon: HALOT
  rationale: Marcador quotativo estándar; «diciendo» reproduce la introducción de la cita de forma transparente.
- source_word: הָכִינוּ לָכֶם צֵידָה
  english_pob_choice: Prepare provisions for yourselves
  chosen_spanish: Preparen provisiones para ustedes
  alternatives_spanish:
  - Preparen comida para ustedes
  - Preparen suministros para ustedes
  lexicon: HALOT
  rationale: צֵידָה refiere a provisiones para viaje o campaña, no solo comida. «Provisiones» conserva mejor ese matiz; el pronombre expresa el dativo reflexivo.
- source_word: כִּי בְּעוֹד שְׁלֹשֶׁת יָמִים
  english_pob_choice: because within three days
  chosen_spanish: porque dentro de tres días
  alternatives_spanish:
  - porque en tres días
  - porque al cabo de tres días
  - porque después de tres días
  lexicon: HALOT
  rationale: La expresión temporal indica un plazo breve antes del evento. «Dentro de tres días» es idiomático y mantiene la inminencia.
- source_word: אַתֶּם עֹבְרִים
  english_pob_choice: you are crossing
  chosen_spanish: ustedes cruzarán
  alternatives_spanish:
  - ustedes están cruzando
  - ustedes van a cruzar
  lexicon: HALOT
  rationale: El participio hebreo expresa una acción inminente segura. En español, el futuro comunica con naturalidad esa certeza próxima; el contexto ya fija la inmediatez.
- source_word: אֶת הַיַּרְדֵּן הַזֶּה
  english_pob_choice: this Jordan
  chosen_spanish: este Jordán
  alternatives_spanish:
  - este río Jordán
  - el Jordán
  lexicon: HALOT
  rationale: El demonstrativo debe conservarse; «este Jordán» refleja con concisión el hebreo sin añadir «río» innecesariamente.
- source_word: לָבוֹא לָרֶשֶׁת
  english_pob_choice: to go in to possess
  chosen_spanish: para entrar a poseer
  alternatives_spanish:
  - para entrar y poseer
  - para ir a poseer
  lexicon: HALOT
  rationale: Los infinitivos expresan propósito. «Entrar a poseer» mantiene la secuencia de entrada seguida de apropiación sin paraphrasear más de lo debido.
- source_word: הָאָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  - el territorio
  lexicon: HALOT
  rationale: En español, «tierra» es la forma más natural y reverente para este término de pacto; se evita el calco excesivamente técnico de «la tierra» cuando el contexto ya es claro.
- source_word: יְהוָה אֱלֹהֵיכֶם
  english_pob_choice: the LORD your God
  chosen_spanish: Yahvé su Dios
  alternatives_spanish:
  - Yahvé, su Dios
  - el Señor su Dios
  lexicon: HALOT
  rationale: Se mantiene Yahvé según la directriz del proyecto para el Tetragrámaton. «Su Dios» refleja el sufijo de segunda persona plural y conserva el tono de pacto.
- source_word: נֹתֵן לָכֶם
  english_pob_choice: is giving you
  chosen_spanish: les da
  alternatives_spanish:
  - les está dando
  - les está concediendo
  lexicon: HALOT
  rationale: El participio hebreo presenta la acción divina como vigente y segura. «Les da» comunica esa certeza de modo natural en español, aunque otras lecturas posibles podrían enfatizar el proceso.
- source_word: לְרִשְׁתָּהּ
  english_pob_choice: to possess it
  chosen_spanish: para poseerla
  alternatives_spanish:
  - para tomar posesión de ella
  - para heredarla
  lexicon: HALOT
  rationale: Se conserva la raíz verbal de ירשׁ con «poseerla» para mantener consistencia lexical con el versículo y no diluir la terminología de conquista/herencia.
theological_decisions:
- issue: Renderizado del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa explícitamente el Tetragrámaton, y la norma del proyecto pide «Yahvé» en el texto principal. Esto preserva el nombre de pacto sin sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Aspecto de אַתֶּם עֹבְרִים en contexto de inminencia
  english_pob_reading: you are crossing
  chosen_spanish_reading: ustedes cruzarán
  alternative_spanish_readings:
  - ustedes están cruzando
  - ustedes van a cruzar
  rationale: Aunque el inglés POB conserva un presente progresivo para el valor aspectual, en español el futuro expresa con naturalidad una acción muy próxima y segura; el contexto temporal («dentro de tres días») mantiene la inminencia.
  doctrine_reference: 'Gramática del español bíblico: aspecto verbal y futuridad inminente'
translation_notes:
  revision_awareness: Se atendió la observación de validación previa incorporando el marcador [a] directamente en el texto principal junto a «al pueblo». También se mantuvo el nombre divino como Yahvé conforme al estándar del proyecto y se preservó la correspondencia lexical entre ירשׁ y «poseer» en ambas apariciones.
  spanish_consistency_notes:
  - Se conserva «Yahvé» en lugar de una máscara litúrgica, en coherencia con la política terminológica del proyecto.
  - Se mantiene la repetición de «poseer» para ירשׁ en ambas ocurrencias, a fin de reflejar la cohesión léxica del hebreo.
  - «Jordán» se usa como nombre propio sin añadir «río», siguiendo el contexto y la economía del original.
