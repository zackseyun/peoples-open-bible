translation:
  language: es
  text: Hizo el Salón[a] de las Columnas de cincuenta codos de largo y treinta codos de ancho, con un pórtico delante de ellas, y columnas y un umbral[b] delante de ellas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «pórtico» para ambos casos de אוּלָם; el hebreo usa el mismo término dos veces, pero el segundo probablemente se refiere a un elemento frontal semejante a un pórtico unido al Salón de las Columnas.
    reason: lexical_alternative
  - marker: b
    text: El término hebreo traducido aquí como «umbral» (עָב) es incierto en este contexto arquitectónico; otras posibilidades incluyen «viga», «entramado» u otro elemento estructural cubierto.
    reason: lexical_alternative
lexical_decisions:
- source_word: אוּלָם
  english_pob_choice: Hall
  chosen_spanish: Salón
  alternatives_spanish:
  - pórtico
  - vestíbulo
  - porche
  lexicon: HALOT
  rationale: En este contexto arquitectónico, אוּלָם designa una estructura amplia y destacada. «Salón» comunica mejor la escala que «porche» y permite reservar «pórtico» para el elemento frontal posterior.
- source_word: הָעַמּוּדִים
  english_pob_choice: of Pillars
  chosen_spanish: de las Columnas
  alternatives_spanish:
  - de los pilares
  lexicon: HALOT
  rationale: «Columnas» es natural en español y conserva el sentido arquitectónico del genitivo. «Pilares» también sería posible, pero «columnas» fluye mejor en el nombre de la estructura.
- source_word: עָשָׂה
  english_pob_choice: made
  chosen_spanish: Hizo
  alternatives_spanish:
  - Construyó
  - Fabricó
  lexicon: HALOT
  rationale: El verbo עשה es el común «hacer». «Hizo» mantiene la literalidad básica sin forzar una lectura más interpretativa como «construyó».
- source_word: חֲמִשִּׁים אַמָּה אָרְכּוֹ
  english_pob_choice: fifty cubits long
  chosen_spanish: de cincuenta codos de largo
  alternatives_spanish:
  - con una longitud de cincuenta codos
  lexicon: HALOT
  rationale: La fórmula de medida se vierte de forma natural en español, preservando la cantidad exacta y el valor dimensional de אָרְךֹּו.
- source_word: וּשְׁלֹשִׁים אַמָּה רָחְבּוֹ
  english_pob_choice: thirty cubits wide
  chosen_spanish: y treinta codos de ancho
  alternatives_spanish:
  - con un ancho de treinta codos
  lexicon: HALOT
  rationale: Se mantiene el paralelismo con la primera medida y el valor espacial de רָחְבֹּו mediante «ancho».
- source_word: וְאוּלָם עַל־פְּנֵיהֶם
  english_pob_choice: with a porch in front of them
  chosen_spanish: con un pórtico delante de ellas
  alternatives_spanish:
  - con un vestíbulo delante de ellas
  - con un porche delante de ellas
  lexicon: HALOT
  rationale: El segundo אוּלָם parece referirse a un elemento frontal distinto y menor. «Pórtico» reproduce bien esa función espacial. Se usa «de ellas» porque el antecedente inmediato en español es plural femenino («columnas»/«salón» como estructura), aunque el hebreo remite a las columnas/elementos mencionados.
- source_word: וְעַמֻּדִים
  english_pob_choice: and pillars
  chosen_spanish: y columnas
  alternatives_spanish:
  - y pilares
  lexicon: HALOT
  rationale: Se conserva el sustantivo explícito sin suavizar la sintaxis hebrea. «Columnas» es el equivalente más natural en español para un contexto arquitectónico.
- source_word: וְעָב
  english_pob_choice: and a threshold
  chosen_spanish: y un umbral
  alternatives_spanish:
  - y una viga
  - y un dintel
  - y un elemento de cobertura
  lexicon: HALOT
  rationale: La POB inglesa revisó «canopy» a «threshold» para acercarse más a la incertidumbre léxica de עָב. «Umbral» conserva esa cautela y evita una especificación más interpretativa.
translation_notes:
  revision_awareness: La decisión inglesa más reciente reemplazó «canopy» por «threshold» para acercarse a עָב con mayor precisión. El borrador español sigue esa revisión y mantiene la ambigüedad léxica mediante «umbral», sin resolver indebidamente el objeto arquitectónico.
  spanish_consistency_notes:
  - Se mantiene la medida literal «codos» en lugar de convertir a unidades modernas.
  - Se conserva la distinción entre el gran «Salón» y el elemento frontal menor expresado por el segundo אוּלָם.
  - Se eligió «columnas» como término arquitectónico más natural en español para הָעַמּוּדִים.
  - La sintaxis intenta seguir la tersura del hebreo sin resultar artificial en español moderno.
