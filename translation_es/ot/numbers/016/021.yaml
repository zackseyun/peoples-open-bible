    issue: Calco poco natural en 'de en medio de'
    rationale: Aunque reproduce la imagen espacial de מִתּוֹךְ, en español bíblico actual suena forzado aquí. Una revisión menor mejora la naturalidad sin sacrificar fidelidad.
  - severity: low
    issue: Correspondencia de la nota alternativa con el texto principal
    rationale: Si 'de entre' pasa a ser la redacción principal, la nota debe ofrecer la alternativa inversa para preservar útilmente el rango léxico documentado.
