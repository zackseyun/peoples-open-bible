  yaml_path: translation/nt/acts/017/022.yaml
  text: So Paul[a], standing in the midst of the Areopagus, said, “Men of Athens, I see that in every way you are very religious.”
  footnotes:
  - marker: a
    text: Or, “too superstitious” or “more religious.” The Greek word can be taken either negatively or positively.
    reason: lexical_alternative
translation:
  language: ko
  text: 바울이 아레오바고 가운데 서서 말하였습니다. 「아테네 사람들이여, 내가 보니 여러분은 모든 면에서 매우 종교적입니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: δεισιδαιμονεστέρους
  english_pob_choice: very religious
  chosen_korean: 매우 종교적
  alternatives_korean:
  - 신앙심이 매우 깊은
  - 미신적
  lexicon: BDAG
  rationale: 'δεισιδαίμων는 양면적: 「경건한」과 「미신적」을 모두 가리킬 수 있다. 바울이 아테네 청중에 맞춘 외교적 도입부이므로 긍정·중립의 「매우 종교적」을 채택한다.'
theological_decisions:
- issue: δεισιδαίμων의 양면성과 아레오바고 연설 톤
  chosen_reading: 매우 종교적
  alternative_readings:
  - 미신이 많은
  - 신을 깊이 두려워하는
  rationale: 바울은 청중에게 비난적 진단으로 시작하지 않고 23절의 「알지 못하는 신에게」 비문으로 이어지는 다리를 놓는다. 따라서 중립·긍정적 음조 「매우 종교적」이 본문 흐름에 부합한다.
  doctrine_reference: BDAG δεισιδαίμων; rhetorical strategy of Areopagus address
