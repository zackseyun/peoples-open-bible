translation:
  language: es
  text: Y ahora doblo la rodilla de mi corazón[a], implorando la benevolencia que procede de ti[b];
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «inclino la rodilla de mi corazón». El griego conserva una metáfora vívida de arrodillarse interiormente.
    reason: lexical_alternative
  - marker: b
    text: O «tu benevolencia». La expresión griega incluye literalmente «de parte de ti», subrayando que esta benevolencia procede de Dios.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ νῦν
  english_pob_choice: And now
  chosen_spanish: Y ahora
  alternatives_spanish:
  - Y ahora mismo
  - Así que ahora
  lexicon: BDAG
  rationale: Conserva la transición temporal e inmediata de καὶ νῦν con una coordinación natural en español.
- source_word: κλίνω
  english_pob_choice: I bend
  chosen_spanish: doblo
  alternatives_spanish:
  - inclino
  - doblo la rodilla
  lexicon: BDAG
  rationale: En español, «doblar la rodilla» mantiene la imagen corporal concreta del verbo sin sonar rígido o antinatural; preserva la acción física de κλίνω aplicada a γόνυ.
- source_word: γόνυ καρδίας
  english_pob_choice: the knee of my heart
  chosen_spanish: la rodilla de mi corazón
  alternatives_spanish:
  - mi corazón en humillación
  - la rodilla de mi alma
  lexicon: BDAG
  rationale: Se conserva la metáfora sorprendente del griego, que une postura corporal e interioridad. «Rodilla» reproduce mejor γόνυ que una paráfrasis abstracta.
- source_word: δεόμενος
  english_pob_choice: imploring
  chosen_spanish: implorando
  alternatives_spanish:
  - suplicando
  - rogando
  lexicon: BDAG
  rationale: «Implorando» refleja la fuerza de la participación presente y el tono de súplica intensa sin bajar el registro a un coloquialismo excesivo.
- source_word: τῆς παρὰ σοῦ χρηστότητος
  english_pob_choice: the kindness from you
  chosen_spanish: la bondad que procede de ti
  alternatives_spanish:
  - tu bondad
  - la bondad de parte de ti
  - tu benevolencia
  lexicon: BDAG
  rationale: χρηστότης admite «bondad» o «bondad/benevolencia». Añadir «que procede de ti» mantiene en español el sentido de παρὰ σοῦ, es decir, que la bondad proviene de Dios, sin perder naturalidad.
theological_decisions:
- issue: Metáfora de la kneeling interior (γόνυ καρδίας)
  english_pob_reading: Retain the metaphor as 'the knee of my heart' rather than interpretively flattening it to 'my heart in humility.'
  chosen_spanish_reading: Conservar «la rodilla de mi corazón» en el texto principal.
  alternative_spanish_readings:
  - mi corazón humillado
  - mi interior en humildad
  - doblo mi corazón
  rationale: La imagen expresa la humildad y penitencia de manera vívida. Mantenerla evita perder la fuerza devocional y retórica del original.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: 'La redacción sigue el juicio de revisión del texto inglés: se conserva el tono formal de δεόμενος con «implorando» y se mantiene la referencia directa a la procedencia divina de τῆς παρὰ σοῦ χρηστότητος mediante «que procede de ti», en línea con la última revisión que simplificó la frase sin perder su sentido de origen.'
  spanish_consistency_notes:
  - Se usa «bondad» para χρηστότης, coherente con el valor de benevolencia/kindness documentado en el audit trail.
  - Se conserva la metáfora corporal e interior sin convertirla en paráfrasis explicativa en el texto principal.
  - La puntuación respeta el ritmo de una sola cláusula participial dependiente del verbo principal implícito de súplica.
