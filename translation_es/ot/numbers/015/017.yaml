lexical_decisions:
- source_word: וַיְדַבֵּר
  english_pob_choice: spoke
  chosen_spanish: habló
  alternatives_spanish:
  - dijo
  lexicon: HALOT
  rationale: El verbo narrativo hebreo introduce una nueva acción de habla divina. En español, «habló» conserva ese valor formal y natural en una fórmula de revelación; «dijo» sería posible, pero es más general y pierde un poco la marca de discurso introducido.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre propio divino en su forma recomendada para el español, sin sustituirlo por un título. «Yahvé» preserva el valor del Tetragrámaton como nombre del pacto, en línea con el criterio del texto fuente y la decisión inglesa de no ocultarlo.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  lexicon: HALOT
  rationale: La preposición marca el destinatario del habla. En español, «a» es la equivalente natural y precisa para introducir el complemento indirecto.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  lexicon: HALOT
  rationale: Nombre propio tradicional en español bíblico, inteligible y plenamente asentado.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - para decir
  lexicon: HALOT
  rationale: El infinitivo constructo funciona como fórmula introductoria del discurso siguiente. «Diciendo» conserva esa estructura sin añadir contenido extra; «para decir» sería más explicativo que textual.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: La lectura del original es el nombre personal de Dios, no un título. En español, «Yahvé» mantiene esa distinción y evita la sustitución reverencial tradicional.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: La revisión más reciente del texto fuente no introdujo cambios; el acuerdo de revisión y control cruzado fue alto, por lo que no se requieren ajustes textuales adicionales.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de manera consistente para יְהוָה.
  - Se conserva un tono bíblico sobrio y publicable, con sintaxis española natural.
  - El participio introductorio «diciendo» se usa como marcador de discurso, no como información nueva.
