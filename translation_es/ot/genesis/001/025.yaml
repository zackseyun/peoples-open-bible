    reason: lexical_alternative
  - marker: b
    text: El hebreo ‘según su clase / según sus clases’ se refiere a categorías de criaturas y no debe entenderse como una taxonomía científica moderna.
    reason: cultural_note
  - marker: c
    text: O ‘todo ser que se arrastra sobre la tierra’. El hebreo distingue ‘tierra’ antes en el versículo y ‘suelo’ aquí.
    reason: lexical_alternative
  revision_rationale: 'La revisión mantiene el sentido del hebreo y del POB inglés con mayor precisión: preserva ‘tierra ... suelo’, elimina ‘especie’ del texto principal para evitar una lectura taxonómica moderna, y retira la alternativa ‘creó’ porque no está respaldada por la decisión léxica auditada. El resultado sigue siendo natural y claro en español eclesial general.'
