translation:
  language: es
  text: Cuando llegó a Samaria, hirió de muerte a todos los que le quedaban a Ahab en Samaria, hasta destruirlos[a], conforme a la palabra de Yahvé que le había hablado a Elías.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «hasta destruirla», entendiendo el sufijo de manera colectiva, como referencia a la casa de Ahab más que a Ahab personalmente.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא
  english_pob_choice: When he came
  chosen_spanish: Cuando llegó
  alternatives_spanish:
  - Y vino
  - Entonces llegó
  lexicon: HALOT
  rationale: La forma consecutiva introduce avance narrativo; en español, «Cuando llegó» expresa con naturalidad la entrada temporal sin perder la secuencia del relato.
- source_word: שֹׁמְרוֹן
  english_pob_choice: Samaria
  chosen_spanish: Samaria
  alternatives_spanish:
  - Samaría
  lexicon: HALOT
  rationale: Nombre propio geográfico estándar; «Samaria» es la forma estable y ampliamente reconocible en español bíblico.
- source_word: וַיַּךְ
  english_pob_choice: he struck down
  chosen_spanish: hirió de muerte
  alternatives_spanish:
  - mató
  - derribó
  lexicon: HALOT
  rationale: Aquí נכה tiene fuerza letal. «Hirió de muerte» conserva el tono grave y evita una simplificación excesiva, a la vez que suena natural en español.
- source_word: כָּל הַנִּשְׁאָרִים
  english_pob_choice: all who remained
  chosen_spanish: a todos los que le quedaban
  alternatives_spanish:
  - a todos los supervivientes
  - a todo el resto
  lexicon: HALOT
  rationale: El participio describe a los que habían quedado. En español, «los que le quedaban» refleja bien la relación con Ahab y la idea de los restantes sin cargar de más peso técnico a «remanente».
- source_word: לְאַחְאָב
  english_pob_choice: of Ahab
  chosen_spanish: a Ahab
  alternatives_spanish:
  - de Ahab
  - pertenecientes a Ahab
  lexicon: HALOT
  rationale: 'El enlace relacional del lamed se expresa en español con un dativo posesivo natural: «le quedaban a Ahab». En contexto apunta a los que quedaban de su casa o partido.'
- source_word: בְּשֹׁמְרוֹן
  english_pob_choice: in Samaria
  chosen_spanish: en Samaria
  lexicon: HALOT
  rationale: La preposición locativa se mantiene de forma directa y clara.
- source_word: עַד הִשְׁמִידוֹ
  english_pob_choice: until he had destroyed them
  chosen_spanish: hasta destruirlos
  alternatives_spanish:
  - hasta que los destruyó
  - hasta haberlos destruido
  lexicon: HALOT
  rationale: 'שׁמד expresa destrucción/exterminio. El objeto singular morfológico del sufijo se entiende colectivamente por el antecedente plural; en español se resuelve naturalmente con plural: «destruirlos».'
- source_word: כִּדְבַר יְהוָה
  english_pob_choice: according to the word of Yahweh
  chosen_spanish: conforme a la palabra de Yahvé
  alternatives_spanish:
  - según la palabra de Yahvé
  - de acuerdo con la palabra de Yahvé
  lexicon: HALOT
  rationale: Se conserva la fórmula profética de cumplimiento. «Palabra» mantiene el valor de דבר, y «Yahvé» sigue el estándar del proyecto para el nombre divino.
- source_word: אֲשֶׁר דִּבֶּר אֶל אֵלִיָּהוּ
  english_pob_choice: that he had spoken to Elijah
  chosen_spanish: que había hablado a Elías
  alternatives_spanish:
  - que le había hablado a Elías
  - que habló a Elías
  lexicon: HALOT
  rationale: La cláusula relativa expresa una palabra ya pronunciada en el pasado; el pluscuamperfecto en español comunica bien esa anterioridad respecto del cumplimiento narrado.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. Conforme al estándar del proyecto en español, se traduce como «Yahvé» para preservar el nombre propio del pacto y evitar el reemplazo por un título enmascarado.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: El contexto inglés fue revisado desde una lectura más estrecha ('to Ahab' / 'destroyed him') a una lectura colectiva más natural ('of Ahab' / 'destroyed them'). La versión española adopta esa resolución colectiva y evita crear una aparente discordancia entre el plural («todos los que le quedaban») y el objeto del verbo («destruirlos»).
  spanish_consistency_notes:
  - Se mantiene «Yahvé» en lugar de un sustituto litúrgico para el nombre divino.
  - 'Se conserva el paralelismo narrativo con dos acciones consecutivas: llegada y golpe letal.'
  - La nota al pie aclara la posible ambigüedad del sufijo hebreo sin alterar el flujo del texto principal.
  - «Ahab» se conserva como forma del nombre ya establecida en el proyecto; no se castellaniza a «Acab» para mantener consistencia interna con el audit trail provisto.
