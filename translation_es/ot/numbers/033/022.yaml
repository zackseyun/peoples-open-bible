  glossary_alignment: No hay términos teológicos sensibles aquí. El tratamiento de nombres propios mediante transliteración concuerda con la práctica del proyecto. Se recomienda ajustar «Queelatá» a «Kehelatá» para alinearse mejor con el nombre fuente y con la decisión inglesa «Kehelathah».
