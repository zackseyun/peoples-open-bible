revisions:
- from: Entonces Salomón fue a Jerusalén desde el lugar alto que estaba en Gabaón, de delante[a] de la tienda de reunión[b], y reinó sobre Israel.
  to: Entonces Salomón vino[a] a Jerusalén desde el lugar alto que estaba en Gabaón[c], desde delante[b] de la tienda de reunión, y reinó sobre Israel.
  rationale: Se ajusta el verbo principal a 'vino' para seguir la preferencia del POB inglés sin perder la alternativa en nota; se mejora la naturalidad de 'de delante' a 'desde delante'; y se añade la nota faltante que preserva la explicación auditada sobre el lugar alto en Gabaón.
