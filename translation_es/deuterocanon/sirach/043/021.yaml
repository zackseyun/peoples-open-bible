review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo base y conserva la diferencia con el paralelo griego en notas. Sin embargo, varias elecciones en español no preservan con suficiente naturalidad o precisión el sentido auditado: ''produce'' es un calco impropio en español, ''hace arder'' sobreactualiza el verbo frente a ''scorches'', y ''pastizal de las plantas'' suena forzado. El núcleo semántico debe seguir siendo: la fuerza destructiva reseca/abrasa lo que producen los montes y el pasto o vegetación con llama.'
  spanish_quality_summary: 'El texto actual es comprensible, pero contiene giros poco idiomáticos para español bíblico moderno: ''el produce'', ''hace arder'', y ''el pastizal de las plantas''. Una redacción más natural y fiel sería ''Abrasa el fruto de los montes con sequía[a][b], y el pasto de las plantas con llama''. Esto mantiene la compacidad poética y mejora la legibilidad.'
  glossary_alignment: No hay términos teológicos mayores en juego. La revisión se centra en equivalencia léxica y estilo. Se respeta la decisión documentada de traducir בחרב como 'sequía' con nota alternativa 'sequedad', y se mantiene la nota sobre el paralelo griego.
  issues:
  - severity: high
    issue: Uso de 'produce' en español
    rationale: En español general y eclesial, 'produce' como sustantivo en este contexto es un anglicismo o calco poco natural. No refleja bien el registro buscado. 'Fruto' o 'producto' serían opciones; 'fruto' funciona poéticamente y cubre bien el rendimiento de la tierra.
  - severity: medium
    issue: '''Hace arder'' sobretraduce ישיק'
    rationale: El inglés auditado eligió 'scorches' para no afirmar combustión literal en el primer colon. 'Hace arder' empuja la imagen hacia fuego explícito. 'Abrasa' conserva mejor el sentido de abrasar/chamuscar por calor o sequedad.
  - severity: medium
    issue: '''Pastizal de las plantas'' es poco idiomático'
    rationale: Aunque intenta conservar נוה + צמחים, la combinación resulta extraña en español. 'Pasto de las plantas' o 'pastura de las plantas' representan mejor el paralelismo natural sin sonar técnica ni redundante.
  - severity: low
    issue: Marcación de notas invertida respecto al inglés
    rationale: El orden [a][b] en el texto debería corresponder al orden de las notas presentadas. Conviene mantener primero la nota del paralelo griego y luego la alternativa léxica, como ya está en el arreglo de notas.
  revised_spanish_text: Abrasa el fruto de los montes con sequía[a][b], y el pasto de las plantas con llama.
  revised_footnotes:
