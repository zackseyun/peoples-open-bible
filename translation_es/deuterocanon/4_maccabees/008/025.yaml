  glossary_alignment: 'No hay conflictos con la terminología principal del proyecto. «La ley» en minúscula está bien. La decisión sobre «voluntariamente» está alineada con ἑκουσίως. La única desalineación importante es metodológica: se bracketó «nos» en lugar del verbo faltante, contrariando la rationale inglesa que explícitamente suple un verbo editorial.'
