translation:
  language: es
  text: 'Y Josué envió hombres de Jericó a Hai[a], que está junto a Bet-avén, al oriente de Bet-el, y les dijo: «Suban y reconozcan la tierra». Y los hombres subieron y reconocieron Hai.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «que está junto a Bet-avén»; el hebreo dice literalmente «que está con Bet-avén», usando una preposición que puede expresar proximidad geográfica.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - despachó
  lexicon: HALOT
  rationale: El wayyiqtol de שלח expresa una acción narrativa simple; «envió» es el equivalente natural en español y conserva el acto de enviar sin sobrecargarlo.
- source_word: אֲנָשִׁים
  english_pob_choice: men
  chosen_spanish: hombres
  alternatives_spanish:
  - personas
  - gente
  lexicon: HALOT
  rationale: El hebreo usa el plural masculino explícito, por lo que «hombres» preserva la precisión de género y encaja con la misión de reconocimiento.
- source_word: מִירִיחוֹ
  english_pob_choice: from Jericho
  chosen_spanish: desde Jericó
  alternatives_spanish:
  - de Jericó
  lexicon: HALOT
  rationale: «Desde» comunica con naturalidad el punto de partida espacial indicado por la preposición hebrea.
- source_word: הָעַי
  english_pob_choice: Ai
  chosen_spanish: Hai
  alternatives_spanish:
  - Ai
  lexicon: HALOT
  rationale: Se conserva el topónimo con transliteración española usual «Hai», que es clara para lectores bíblicos en español.
- source_word: אֲשֶׁר עִם בֵּית אָוֶן
  english_pob_choice: which is near Beth-aven
  chosen_spanish: que está junto a Bet-avén
  alternatives_spanish:
  - que está cerca de Bet-avén
  - que está con Bet-avén
  lexicon: HALOT
  rationale: עִם en este contexto geográfico puede señalar proximidad; «junto a» preserva la relación locativa de forma natural sin borrar la literalidad subyacente.
- source_word: מִקֶּדֶם לְבֵית אֵל
  english_pob_choice: east of Bethel
  chosen_spanish: al oriente de Bet-el
  alternatives_spanish:
  - al este de Bet-el
  - al oriente de Betel
  lexicon: HALOT
  rationale: «Al oriente de» reproduce con fidelidad la orientación geográfica y mantiene un registro bíblico claro, sin recurrir a una formulación más técnica que el texto no exige.
- source_word: לֵאמֹר
  english_pob_choice: and said to them
  chosen_spanish: y les dijo
  alternatives_spanish:
  - diciéndoles
  lexicon: HALOT
  rationale: La fórmula de introducción del discurso se integra de manera idiomática en español con «y les dijo».
- source_word: עֲלוּ
  english_pob_choice: Go up
  chosen_spanish: Subid
  alternatives_spanish:
  - Suban
  - Sube
  lexicon: HALOT
  rationale: עלה conserva aquí el matiz direccional de desplazamiento hacia un lugar más alto; «Subid» reproduce ese valor de forma directa. Se mantiene la forma de mandato plural del hebreo.
- source_word: וְרַגְּלוּ
  english_pob_choice: spy out
  chosen_spanish: reconoced
  alternatives_spanish:
  - explorad
  - espionad
  lexicon: HALOT
  rationale: El piel de רגל aquí tiene sentido militar de reconocimiento. «Reconoced» transmite la idea de explorar con fines de información sin introducir un giro demasiado coloquial como «espiar».
- source_word: אֶת הָאָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  - el territorio
  lexicon: HALOT
  rationale: «La tierra» conserva el alcance amplio del hebreo אָרֶץ y es una equivalencia bíblica natural en español.
- source_word: וַיַּעֲלוּ
  english_pob_choice: went up
  chosen_spanish: subieron
  alternatives_spanish:
  - fueron
  - ascendieron
  lexicon: HALOT
  rationale: Se repite עלה con la misma direccionalidad del mandato; «subieron» mantiene la correspondencia léxica y el eco narrativo.
- source_word: וַיְרַגְּלוּ
  english_pob_choice: spied out
  chosen_spanish: reconocieron
  alternatives_spanish:
  - exploraron
  - espionaron
  lexicon: HALOT
  rationale: Para el perfecto narrativo de רגל, «reconocieron» preserva el sentido de reconocimiento militar en un español natural y sobrio, alineado con la función del verbo en el contexto.
theological_decisions:
- issue: Topónimo con artículo hebreo y designación geográfica de Hai/Bet-avén/Bet-el
  english_pob_reading: Ai, which is near Beth-aven, east of Bethel
  chosen_spanish_reading: Hai, que está junto a Bet-avén, al oriente de Bet-el
  alternative_spanish_readings:
  - Hai, que está cerca de Bet-avén, al este de Bet-el
  - Hai, que está con Bet-avén, al oriente de Bet-el
  rationale: 'No hay cuestión doctrinal directa, pero sí una decisión de fidelidad geográfica y estilística: se mantiene la relación espacial de עִם como proximidad sin convertirla en una traducción más interpretativa de lo que el hebreo permite.'
  doctrine_reference: N/A
translation_notes:
  revision_awareness: El texto inglés auditado permanece sin cambios en la revisión más reciente; no hay correcciones aplicadas ni observaciones textuales nuevas. La versión española sigue de cerca esa línea estable y conserva la decisión léxica central sobre עִם como proximidad geográfica.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino en todo el proyecto; este versículo no contiene el tetragrámaton.
  - «Hai» se usa como transliteración bíblica española estándar, coherente con el tratamiento de topónimos en el POB.
  - Se preserva el paralelismo verbal de «subir / subieron» para עלה y el campo semántico de reconocimiento militar para רגל.
  - La nota al pie marca una alternativa real del hebreo en la relación espacial entre Hai y Bet-avén, sin borrar el matiz de proximidad.
