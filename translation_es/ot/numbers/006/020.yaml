revisions:
- from: El sacerdote los mecerá como ofrenda mecida delante de Yahvé[a]. Es cosa sagrada para el sacerdote, además del pecho de la ofrenda mecida y de la pierna de la ofrenda alzada[b]. Después, el nazareo podrá beber vino.
  to: El sacerdote los mecerá como ofrenda mecida delante de Yahvé. Es cosa sagrada para el sacerdote, además del pecho de la ofrenda mecida y del muslo de la ofrenda de contribución[a]. Después, el nazareo podrá beber vino.
  rationale: Se elimina la nota [a] porque no ofrecía ninguna alternativa real. Se cambia 'pierna' por 'muslo' para reflejar mejor שׁוֹק, y 'ofrenda alzada' por 'ofrenda de contribución' para seguir la decisión lexical auditada del POB sobre תְּרוּמָה, manteniendo la opción tradicional en una sola nota útil y correctamente anclada.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:31:58Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el hebreo y la línea del English POB en la estructura general: el sacerdote realiza el rito de mecer, se afirma que la porción es sagrada para el sacerdote, se añaden las porciones ya asignadas, y luego el nazareo recupera el permiso de beber vino. Sin embargo, hay dos desajustes importantes con la evidencia y la auditoría: (1) la nota [a] no ofrece una alternativa real, porque repite esencialmente la misma frase del texto; (2) שׁוֹק se justificó en el POB inglés como ''thigh'', no ''leg/pierna'', y תְּרוּמָה en esta auditoría se resolvió como ''contribution offering'', con ''heave offering'' solo como alternativa. El español debería reflejar mejor esa decisión lexical.'
  spanish_quality_summary: 'El español es legible y digno, pero ''pierna de la ofrenda alzada'' suena menos preciso anatómica y cultualmente que ''muslo de la ofrenda de contribución''. Además, la nota [b] contradice la propia práctica del POB inglés al decir que ''se mantiene esa opción en el texto principal'' cuando en realidad el inglés principal no mantuvo el equivalente tradicional de heave offering. También conviene eliminar la nota [a] por inútil. El resto fluye bien: ''mecerá'', ''delante de Yahvé'', ''Es cosa sagrada para el sacerdote'' y ''podrá beber vino'' son naturales y fieles.'
  glossary_alignment: Se mantiene correctamente 'Yahvé' para יהוה y 'nazareo' para נָזִיר. La principal desviación terminológica está en תְּרוּמָה, donde la auditoría inglesa prefirió el valor de 'contribución' sobre el tradicional 'alzada/heave', y en שׁוֹק, donde conviene 'muslo' en lugar de 'pierna' para ajustarse al análisis lexical documentado.
  issues:
  - severity: medium
    issue: La nota [a] no aporta una alternativa genuina
    rationale: El texto principal ya dice 'delante de Yahvé', y la nota ofrece 'O, «delante de Yahvé»', lo cual no preserva ninguna variante ni aclara una ambigüedad nueva en español.
  - severity: high
    issue: '''pierna'' para שׁוֹק debilita la precisión lexical'
    rationale: La auditoría inglesa documenta explícitamente 'thigh' por la fuerza anatómica de שׁוֹק. En español bíblico claro, 'muslo' se alinea mejor que 'pierna'.
  - severity: high
    issue: '''ofrenda alzada'' en el texto principal no sigue la decisión lexical auditada para תְּרוּמָה'
    rationale: El English POB eligió 'contribution offering' como texto principal y dejó 'heave offering' como alternativa. El español debería reflejar esa misma priorización, p. ej. 'ofrenda de contribución', dejando 'ofrenda alzada' en nota alternativa.
  - severity: medium
    issue: La nota [b] explica al revés la elección principal
    rationale: Afirma que 'se mantiene esa opción en el texto principal', pero la línea auditada del POB no mantuvo el equivalente tradicional, sino uno más transparente; la nota debe corregirse para reflejarlo.
  revised_spanish_text: El sacerdote los mecerá como ofrenda mecida delante de Yahvé. Es cosa sagrada para el sacerdote, además del pecho de la ofrenda mecida y del muslo de la ofrenda de contribución[a]. Después, el nazareo podrá beber vino.
  revised_footnotes:
  - marker: a
    text: O, «el muslo de la ofrenda alzada». El hebreo תְּרוּמָה se ha traducido tradicionalmente como «ofrenda alzada»; aquí se prefiere «ofrenda de contribución» porque comunica con más claridad en español contemporáneo la idea de una porción apartada y presentada.
    reason: lexical_alternative
  revision_rationale: Se elimina la nota [a] porque no ofrecía ninguna alternativa real. Se cambia 'pierna' por 'muslo' para reflejar mejor שׁוֹק, y 'ofrenda alzada' por 'ofrenda de contribución' para seguir la decisión lexical auditada del POB sobre תְּרוּמָה, manteniendo la opción tradicional en una sola nota útil y correctamente anclada.
