revisions:
- from: Y el hombre salió de la ciudad, de Belén de Judá, para habitar dondequiera que encontrara[a]. Y llegó a la región montañosa de Efraín, hasta la casa de Micaías, para seguir su camino.
  to: Y el hombre fue de la ciudad, de Belén de Judá, para residir temporalmente dondequiera que encontrara lugar. Y llegó a la región montañosa de Efraín, hasta la casa de Micaía, para seguir su camino[a].
  rationale: Se corrige la omisión de 'lugar', se mueve la nota al sintagma que realmente traduce לַעֲשׂוֹת דַּרְכּוֹ, y se ajusta el nombre propio a 'Micaía'. También se cambia 'salió' por 'fue' para reflejar más directamente וַיֵּלֶךְ sin enfatizar indebidamente el punto de partida, y 'residir temporalmente' expresa mejor el matiz de לָגוּר que el más neutro 'habitar'.
