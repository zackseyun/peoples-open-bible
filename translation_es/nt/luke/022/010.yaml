translation:
  language: es
  text: 'Y les dijo: «Mira[a], cuando entren en la ciudad, un hombre que lleva un cántaro de agua[b] los encontrará. Síganlo a la casa a la que entra».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más formal: «He aquí».'
    reason: lexical_alternative
  - marker: b
    text: 'El griego κεράμιον puede referirse específicamente a una vasija de barro; de ahí la alternativa: «un cántaro de barro con agua» o «una vasija de barro con agua».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἰδοὺ
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira bien
  - Mira, pues
  - He aquí
  lexicon: BDAG
  rationale: ‘Ἰδοὺ’ funciona como llamado de atención. ‘Mira’ mantiene la fuerza deíctica en un español natural y digno; ‘He aquí’ sería más formal y algo más arcaizante.
- source_word: εἰσελθόντων ὑμῶν εἰς τὴν πόλιν
  english_pob_choice: when you enter the city
  chosen_spanish: cuando entren en la ciudad
  alternatives_spanish:
  - cuando ustedes entren en la ciudad
  - al entrar en la ciudad
  - después de que entren en la ciudad
  lexicon: BDAG
  rationale: El genitivo absoluto expresa tiempo. En español, una subordinada temporal con ‘cuando’ comunica bien la relación sin forzar una estructura demasiado literal.
- source_word: συναντήσει ὑμῖν
  english_pob_choice: will meet you
  chosen_spanish: los encontrará
  alternatives_spanish:
  - se encontrarán con él
  - les saldrá al encuentro
  - los encontrará a ustedes
  lexicon: BDAG
  rationale: Aunque el verbo puede sugerir ‘encontrar(se)’, el contexto narrativo de una señal concreta favorece ‘los encontrará’. Así se preserva el sentido de encuentro providencial sin añadir una formulación excesivamente interpretativa.
- source_word: ἄνθρωπος
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  lexicon: BDAG
  rationale: El sustantivo es masculino y refiere a un individuo concreto; ‘un hombre’ conserva esa precisión.
- source_word: κεράμιον ὕδατος
  english_pob_choice: a jar of water
  chosen_spanish: un cántaro de agua
  alternatives_spanish:
  - una vasija de agua
  - una jarra de agua
  - un cántaro de barro con agua
  lexicon: BDAG
  rationale: ‘κεράμιον’ puede apuntar a una vasija de barro/loza. ‘Cántaro’ es una opción natural en español que transmite el tipo de recipiente sin sobreespecificar el material en el texto principal. La nota conserva la alternativa más técnica.
- source_word: βαστάζων
  english_pob_choice: carrying
  chosen_spanish: que lleva
  alternatives_spanish:
  - que transporta
  - cargando
  lexicon: BDAG
  rationale: El participio describe la acción concomitante del hombre. ‘Que lleva’ es claro y fluido en español; mantiene la imagen sin una dureza excesiva.
- source_word: ἀκολουθήσατε αὐτῷ
  english_pob_choice: Follow him
  chosen_spanish: Síganlo
  alternatives_spanish:
  - Síganle
  - Vayan tras él
  lexicon: BDAG
  rationale: El imperativo aoristo se traduce de manera directa con un mandato claro en plural. ‘Síganlo’ es natural y preciso; ‘Síganle’ sería posible según el registro, pero aquí la forma con objeto directo evita ambigüedad.
- source_word: οἰκίαν
  english_pob_choice: house
  chosen_spanish: la casa
  alternatives_spanish:
  - el hogar
  - la morada
  lexicon: BDAG
  rationale: ‘οἰκία’ en este contexto designa la casa física. ‘La casa’ es la opción más directa y comprensible.
- source_word: εἰς ἣν εἰσπορεύεται
  english_pob_choice: that he enters
  chosen_spanish: adonde entra
  alternatives_spanish:
  - que él entra
  - en la que entra
  - a la que entra
  lexicon: BDAG
  rationale: La cláusula relativa identifica la casa concreta. ‘Adonde entra’ conserva el valor direccional de εἰς y suena natural en español; la redacción evita una repetición pesada de ‘casa que entra’.
theological_decisions:
- issue: La señal providencial del encuentro en la ciudad
  english_pob_reading: a man carrying a jar of water will meet you
  chosen_spanish_reading: un hombre que lleva un cántaro de agua los encontrará
  alternative_spanish_readings:
  - un hombre que lleva un cántaro de agua se encontrará con ustedes
  - un hombre con un cántaro de agua los recibirá
  rationale: El texto presenta una instrucción señalada por Jesús, no una interpretación teológica añadida. La redacción española conserva el carácter providencial de la señal sin explicar más de lo que el verso dice.
  doctrine_reference: Providencia divina en el relato del pasaje
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés muestran alto acuerdo y no registran cambios de revisión. La draft española sigue la misma lectura base, manteniendo la señal narrativa, el valor temporal del genitivo absoluto y la identificación concreta del hombre y la casa.
  spanish_consistency_notes:
  - Se usa ‘Mira’ para Ἰδοὺ, en línea con el estilo moderno y directo del proyecto.
  - Se mantiene ‘cántaro’ como solución principal para κεράμιον, reservando la precisión material para la nota.
  - ‘Síganlo’ conserva el imperativo plural y evita el registro arcaico.
  - ‘Adonde entra’ reproduce el sentido de dirección de εἰς ἣν εἰσπορεύεται sin literalidad pesada.
