base_translation:
  language: en
  yaml_path: translation/ot/isaiah/030/017.yaml
  text: A thousand will flee at the rebuke of one[a]; at the rebuke of five you will flee, until you are left like a signal pole on the top of a mountain[b], and like a banner on a hill.
  footnotes:
