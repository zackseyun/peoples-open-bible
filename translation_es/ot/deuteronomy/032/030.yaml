review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien la estructura retórica del hebreo, la desproporción militar (uno/mil; dos/diez mil), el valor titular de «Roca» para צוּרָם, y el nombre divino «Yahvé» conforme al proyecto. También conserva adecuadamente מְכָרָם como «los vendió» y הִסְגִּירָם como «los entregó». Sin embargo, la nota al pie no preserva fielmente la alternativa inglesa documentada para הִסְגִּירָם («had delivered them over»), porque repite esencialmente el texto principal en vez de ofrecer una alternativa léxica real.
  spanish_quality_summary: 'El español es claro y digno, pero hay un pequeño problema de naturalidad y puntuación en la apertura: «¡Cómo podría…» convierte la línea en exclamación mezclada con pregunta retórica; en español bíblico moderno suena mejor «¿Cómo podría…?». El resto fluye bien y no presenta calcos graves.'
  glossary_alignment: 'Buena alineación con la terminología del proyecto: יהוה → «Yahvé»; צוּר con mayúscula como título divino → «Roca»; no hay conflictos con otros términos doctrinales. La única corrección necesaria es en la nota léxica para reflejar mejor la alternativa de הִסְגִּירָם.'
  issues:
  - severity: medium
    issue: La nota al pie para «los entregó[a]» no ofrece una alternativa léxica distinta y fiel al expediente inglés.
    rationale: El audit trail inglés preserva como alternativa «had delivered them over». La nota española actual («los entregó a ellos… en manos de otro») no añade una opción diferente al texto principal, y por tanto no cumple bien la función de nota de alternativa léxica.
  - severity: low
    issue: Puntuación inicial mejorable en la pregunta retórica.
    rationale: «¡Cómo podría…» suena menos natural aquí que una interrogación directa. El hebreo plantea una pregunta retórica de asombro; en español se representa mejor con «¿Cómo podría…?».
  revised_spanish_text: ¿Cómo podría uno perseguir a mil, y dos poner en fuga a diez mil, si no fuera porque su Roca los vendió, y Yahvé los entregó[a]?
  revised_footnotes:
  - marker: a
    text: 'O: «los había entregado en manos de otros».'
    reason: lexical_alternative
  revision_rationale: Se ajusta la puntuación para expresar mejor la pregunta retórica en español y se reemplaza la nota por una alternativa léxica real y fiel al expediente, reflejando el sentido de «had delivered them over».
