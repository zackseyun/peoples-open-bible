translation:
  text: A rich man labors to gather wealth[a], and when he rests[b], he receives enjoyment.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew reads 'to receive delight/luxury'; the translation renders the idiom as 'he enjoys luxuries.' An alternative is 'and when he rests, he receives pleasure.'
    reason: lexical_alternative
  - marker: b
    text: The Greek parallel supplied here does not correspond to the Hebrew wording of this verse, so the translation follows the Hebrew witness as primary while noting source-level instability.
    reason: textual_variant
lexical_decisions:
- source_word: עמלי
  lemma: עמל
  chosen: labors
  alternatives:
  - toils
  - works hard
  lexicon: HALOT
  rationale: From the root עמל, denoting labor/toil. 'Labors' preserves the verbal force in readable English without overemphasizing misery, though 'toils' is possible.
- source_word: עשיר
  chosen: a rich man
  alternatives:
  - the rich man
  - a wealthy man
  lexicon: HALOT
  rationale: The Hebrew singular denotes an individual rich person. 'A rich man' keeps the gender-accurate singular in line with the source and the project's stated philosophy.
- source_word: לקבץ
  chosen: to gather
  alternatives:
  - to collect
  - to amass
  lexicon: HALOT
  rationale: The infinitive means to gather/collect. 'To gather' is the most direct rendering; the object 'wealth' supplies the sense of accumulation.
- source_word: הון
  chosen: wealth
  alternatives:
  - substance
  - riches
  - property
  lexicon: HALOT
  rationale: הון commonly denotes wealth or riches. 'Wealth' is natural modern English and fits the economic context.
- source_word: ינוח
  chosen: he rests
  alternatives:
  - he relaxes
  - he takes his ease
  lexicon: HALOT
  rationale: The verb נוח means to rest. 'He rests' is straightforward and leaves the result clause to express the enjoyment that follows.
- source_word: לקבל
  chosen: he enjoys
  alternatives:
  - to receive
  - to partake of
  lexicon: HALOT
  rationale: Literally 'to receive,' but in context with 'luxuries/pleasure' the idiomatic sense is receiving for enjoyment. 'He enjoys' best conveys the sense in natural English while remaining anchored to the Hebrew.
- source_word: תענוג
  chosen: luxuries
  alternatives:
  - pleasure
  - delight
  lexicon: HALOT
  rationale: The noun can mean delight or luxury. Because the context is a rich man's accumulated wealth and subsequent rest, 'luxuries' captures the concrete social sense better than the more abstract 'pleasure.'
