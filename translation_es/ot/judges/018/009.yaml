translation:
  language: es
  text: 'Y dijeron: «Levántense, y subamos contra ellos, porque hemos visto la tierra, y he aquí que es muy buena. Pero ustedes siguen callados[a]. No sean perezosos[b] para ir, para entrar y para tomar posesión de la tierra».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «están callados». El participio hebreo puede expresarse como una acción continua («siguen callados») o como un estado presente («están callados»).
    reason: lexical_alternative
  - marker: b
    text: O «no sean flojos» o «no se retrasen». El hebreo enfatiza la desgana o la lentitud para actuar.
    reason: lexical_alternative
lexical_decisions:
- source_word: ק֚וּמָה
  english_pob_choice: Arise
  chosen_spanish: Levántate
  alternatives_spanish:
  - Alzate
  - Ponte de pie
  lexicon: HALOT
  rationale: Es un imperativo urgente de movilización. En español, «levántate» conserva bien la fuerza exhortativa y el impulso inmediato del mandato sin sonar antinatural.
- source_word: וְנַעֲלֶה
  english_pob_choice: let us go up
  chosen_spanish: subamos
  alternatives_spanish:
  - subamos allá
  - ascendamos
  lexicon: HALOT
  rationale: El cohortativo expresa exhortación conjunta. «Subamos» reproduce ese valor de invitación/impulso y mantiene el movimiento ascendente del hebreo.
- source_word: עֲלֵיהֶם
  english_pob_choice: against them
  chosen_spanish: contra ellos
  alternatives_spanish:
  - sobre ellos
  - hacia ellos
  lexicon: HALOT
  rationale: En contexto militar, la preposición con pronombre marca movimiento hostil. «Contra ellos» es la equivalencia española más natural y fiel al valor contextual.
- source_word: הָאָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  - el territorio
  lexicon: HALOT
  rationale: Aquí אֶרֶץ se refiere a la región que han inspeccionado. «Tierra» conserva el término bíblico estándar en español y no introduce matices administrativos ajenos al hebreo.
- source_word: וְהִנֵּה
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - miren
  - y resulta que
  lexicon: HALOT
  rationale: «He aquí» reproduce el carácter deíctico y enfático del hebreo mejor que una paráfrasis moderna demasiado explicativa.
- source_word: טוֹבָה מְאֹד
  english_pob_choice: very good
  chosen_spanish: muy buena
  alternatives_spanish:
  - sumamente buena
  - excelente
  lexicon: HALOT
  rationale: La expresión evalúa la calidad de la tierra de forma directa. «Muy buena» es idiomática y conserva la intensificación sin sobretraducir.
- source_word: מַחְשִׁים
  english_pob_choice: you are keeping silent
  chosen_spanish: están callados
  alternatives_spanish:
  - están en silencio
  - se mantienen callados
  lexicon: HALOT
  rationale: El participio puede entenderse como acción en curso o estado presente. «Están callados» mantiene la lectura de estado que la POB inglesa dejó abierta en nota, sin perder la tensión con la exhortación siguiente.
- source_word: אַל תֵּעָצְל֔וּ
  english_pob_choice: do not be sluggish
  chosen_spanish: No sean perezosos
  alternatives_spanish:
  - No se vuelvan perezosos
  - No sean lentos
  lexicon: HALOT
  rationale: עצל expresa flojedad, desgana o negligencia. «Perezosos» es un equivalente claro y natural en español; conserva la reprensión de falta de energía, aunque en un registro menos marcado que «sluggish».
- source_word: לָ/לֶ֥כֶת לָ/בֹ֖א לָ/רֶ֥שֶׁת
  english_pob_choice: to go, to enter, to possess
  chosen_spanish: para ir, para entrar y para tomar posesión
  alternatives_spanish:
  - para ir, entrar y poseer
  - para partir, entrar y heredar
  lexicon: HALOT
  rationale: Se mantiene la serie de infinitivos para reflejar la progresión retórica del hebreo. «Tomar posesión» preserva el sentido de ocupar/adueñarse del territorio en contexto de conquista; «heredar» sería menos preciso aquí.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y toma como guía la POB inglesa revisada, especialmente en el imperativo urgente, el valor militar de «contra ellos», la evaluación «muy buena» y la triple serie de infinitivos. Se adopta la opción española más natural sin borrar las ambigüedades señaladas por el aparato inglés, especialmente en מַחְשִׁים y תֵּעָצְלוּ.
  spanish_consistency_notes:
  - Se usa «tierra» para אֶרֶץ conforme al uso bíblico habitual y al contexto regional.
  - Se preserva la secuencia verbal «ir / entrar / tomar posesión» para reflejar la acumulación retórica del hebreo.
  - La nota sobre מַחְשִׁים mantiene abierta la alternativa de estado/acción continua, como en la POB inglesa.
