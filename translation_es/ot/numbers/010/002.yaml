translation:
  language: es
  text: Haz para ti dos trompetas de plata; las harás de obra martillada[a], y te servirán para convocar a la congregación[b] y para la partida de los campamentos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de metal batido».
    reason: lexical_alternative
  - marker: b
    text: O «para llamar a la congregación».
    reason: lexical_alternative
lexical_decisions:
- source_word: עֲשֵׂה לְךָ
  english_pob_choice: Make for yourself
  chosen_spanish: Haz para ti
  alternatives_spanish:
  - Hazte
  - Haz
  lexicon: HALOT
  rationale: El imperativo con לְךָ expresa encargo/uso personal. «Haz para ti» conserva esa relación sin sonar forzado en español; «hazte» sugeriría una construcción menos precisa y «haz» perdería el matiz del destinatario.
- source_word: שְׁתֵּי חֲצֹצְרֹת כֶּסֶף
  english_pob_choice: two silver trumpets
  chosen_spanish: dos trompetas de plata
  alternatives_spanish:
  - dos trompetas plateadas
  - dos trompetas de metal plata
  lexicon: HALOT
  rationale: 'חֲצֹצְרֹת designa trompetas rectas, y «trompetas» es el equivalente natural y claro. כֶּסֶף es material: «de plata» refleja mejor el hebreo que un adjetivo más libre.'
- source_word: מִקְשָׁה
  english_pob_choice: of hammered work
  chosen_spanish: de obra martillada
  alternatives_spanish:
  - de trabajo martillado
  - de metal batido
  - de obra batida
  lexicon: HALOT
  rationale: מִקְשָׁה se refiere al trabajo de martillar o batir el metal. «Obra martillada» mantiene el sentido manufacturero del texto y suena natural en español bíblico contemporáneo.
- source_word: תַּעֲשֶׂה אֹתָם
  english_pob_choice: you shall make them
  chosen_spanish: las harás
  alternatives_spanish:
  - las harás tú
  - deberás hacerlas
  lexicon: HALOT
  rationale: El verbo posterior refuerza la instrucción. En español, «las harás» conserva el tono mandativo y la referencia al objeto ya mencionado, evitando repetición innecesaria.
- source_word: וְהָיוּ לְךָ
  english_pob_choice: and they shall be for you
  chosen_spanish: y te servirán
  alternatives_spanish:
  - y serán para ti
  - y te pertenecerán
  lexicon: HALOT
  rationale: El hebreo expresa función/uso más que mera posesión. «Te servirán» comunica naturalmente la finalidad de las trompetas, sin reducir el sentido a propiedad.
- source_word: לְמִקְרָא הָעֵדָה
  english_pob_choice: for summoning the congregation
  chosen_spanish: para convocar a la congregación
  alternatives_spanish:
  - para llamar a la congregación
  - para reunir a la congregación
  lexicon: HALOT
  rationale: מִקְרָא tiene aquí el valor de llamada o convocatoria. «Convocar» conserva el carácter formal del acto y se ajusta bien a הָעֵדָה como asamblea del pueblo.
- source_word: וּלְמַסַּע אֶת הַמַּחֲנוֹת
  english_pob_choice: and for setting out the camps
  chosen_spanish: y para dar la señal de partida de los campamentos
  alternatives_spanish:
  - y para la partida de los campamentos
  - y para que los campamentos partan
  lexicon: HALOT
  rationale: מַסַּע se relaciona con la salida/jornada del campamento. «Dar la señal de partida» explicita la función del toque de trompeta en un español natural, manteniendo la idea de salida ordenada.
translation_notes:
  revision_awareness: 'La redacción sigue el texto hebreo consonante/vocalizado del WLC y el patrón auditado de la POB inglesa: mantiene el paralelismo entre la fabricación de las trompetas y sus dos funciones, y conserva la alternativa lexical donde la POB inglesa la documenta. Se adoptó una formulación española más natural para el segundo miembro («dar la señal de partida») sin perder la relación con מַסַּע.'
  spanish_consistency_notes:
  - Se usó «Yahvé» como nombre divino solo cuando aparezca en el contexto; en este versículo no interviene.
  - Se eligió «trompetas» y no «cuernos», porque חֲצֹצְרֹת designa trompetas rectas, no שׁוֹפָר.
  - «Congregación» traduce הָעֵדָה en sentido de asamblea convocada, coherente con el uso POB.
  - La alternativa de la nota b conserva la tensión entre «partida» y el matiz más literal de «salir / ponerse en marcha».
