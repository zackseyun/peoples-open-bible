translation:
  language: es
  text: No me he apartado del mandato de sus labios; he atesorado las palabras de su boca más que mi porción asignada[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, siguiendo una interpretación tradicional de la difícil frase hebrea: «he atesorado las palabras de su boca más que mi comida necesaria».'
    reason: alternative_reading
lexical_decisions:
- source_word: מִצְוַת
  english_pob_choice: the command
  chosen_spanish: el mandato
  alternatives_spanish:
  - el mandamiento
  - la orden
  lexicon: HALOT
  rationale: El singular constructo mantiene una referencia específica y la relación con «sus labios». «Mandato» conserva fuerza normativa sin sonar demasiado eclesiástico como «mandamiento».
- source_word: שְׂפָתָיו
  english_pob_choice: his lips
  chosen_spanish: sus labios
  alternatives_spanish:
  - su habla
  - su boca
  lexicon: HALOT
  rationale: «Labios» sigue de cerca la imagen concreta del hebreo y preserva el paralelismo con «su boca» al final del versículo. El posesivo se entiende como referencia a Dios en el contexto.
- source_word: לֹא אָמִישׁ
  english_pob_choice: I have not turned aside
  chosen_spanish: No me he apartado
  alternatives_spanish:
  - No me he desviado
  - No he dejado de lado
  lexicon: HALOT
  rationale: El valor verbal expresa no apartarse o desviarse. «Me he apartado» suena natural en español y conserva el sentido de fidelidad obediente.
- source_word: מֵחֻקִּי
  english_pob_choice: more than my allotted portion
  chosen_spanish: más que mi porción asignada
  alternatives_spanish:
  - más que mi porción debida
  - más que mi ración
  lexicon: HALOT
  rationale: El hebreo es difícil y el audit trail inglés entiende un sentido comparativo con una porción asignada. «Porción asignada» mantiene la idea de lo que le corresponde a Job sin forzar la lectura hacia «alimento» en el texto principal.
- source_word: צָפַנְתִּי
  english_pob_choice: I have treasured
  chosen_spanish: he atesorado
  alternatives_spanish:
  - he guardado
  - he escondido
  - he almacenado
  lexicon: HALOT
  rationale: En contextos sapienciales, el verbo puede implicar guardar con aprecio. «Atesorado» comunica el valor concedido a las palabras y no solo el acto de ocultarlas.
- source_word: אִמְרֵי
  english_pob_choice: the words
  chosen_spanish: las palabras
  alternatives_spanish:
  - los dichos
  - las expresiones
  lexicon: HALOT
  rationale: «Palabras» es la equivalencia más natural y mantiene el paralelismo con «labios/boca».
- source_word: פִיו
  english_pob_choice: his mouth
  chosen_spanish: su boca
  alternatives_spanish:
  - su hablar
  - sus labios
  lexicon: HALOT
  rationale: La imagen concreta de «boca» corresponde al hebreo y completa el paralelismo con «sus labios». En español, «boca» es claro y poético.
theological_decisions:
- issue: Referente de los posesivos de tercera persona en «sus labios» y «su boca»
  english_pob_reading: They refer to God.
  chosen_spanish_reading: Se refieren a Dios.
  alternative_spanish_readings:
  - Podrían leerse como un hablante no especificado en un sentido más general
  rationale: En Job 23, Job habla de su fidelidad ante Dios y a las palabras de Dios. La referencia divina es la lectura más sólida en el contexto inmediato y se mantiene sin expandir más allá del hebreo.
  doctrine_reference: Job 23:10-12; fidelidad a la palabra divina
- issue: Sentido de מֵחֻקִּי
  english_pob_reading: 'comparative sense: ''more than my allotted portion'''
  chosen_spanish_reading: 'sentido comparativo: «más que mi porción asignada»'
  alternative_spanish_readings:
  - «de mi estatuto/decreto»
  - «más que mi comida necesaria» según una interpretación tradicional
  rationale: La forma consonántica es difícil y el audit trail inglés preserva un valor comparativo coherente con el versículo. La traducción principal conserva ese sentido; la lectura tradicional de «comida necesaria» se reserva para nota.
  doctrine_reference: Job 23:12; decisiones textuales y traductológicas sobre מֵחֻקִּי
translation_notes:
  revision_awareness: Se siguió el pasaje hebreo y el audit trail inglés con acuerdo alto; no se registraron revisiones posteriores que alteraran el sentido. La versión española conserva la tensión interpretativa de מֵחֻקִּי mediante una traducción principal coherente y una nota alternativa tradicional.
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma general cuando aparezca el nombre divino; aquí el texto usa pronombres referidos a Dios, por lo que no se introduce el nombre.
  - «Mandato» evita la elevación litúrgica automática de «mandamiento» sin perder el valor normativo.
  - «Atesorado» mantiene tanto la idea de guardar como la de valorar en un contexto sapiencial.
  - «Porción asignada» conserva la ambigüedad del hebreo sin imponer de entrada la lectura de alimento.
