translation:
  language: es
  text: Y reuniré a todas las naciones contra Jerusalén para la guerra; la ciudad será capturada, las casas saqueadas y las mujeres violadas[a]; la mitad de la ciudad saldrá al exilio[b], pero el resto del pueblo no será separado de la ciudad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, de manera más eufemística en algunas tradiciones de traducción, «las mujeres ultrajadas» o «las mujeres raviadas». El término hebreo es crudo y se refiere a agresión sexual.
    reason: lexical_alternative
  - marker: b
    text: O, «pero el resto del pueblo no será exterminado», si «separado» se entiende en el sentido más fuerte de destrucción y no de remoción.
    reason: alternative_reading
lexical_decisions:
- source_word: וְאָסַפְתִּי
  english_pob_choice: And I will gather
  chosen_spanish: Y reuniré
  alternatives_spanish:
  - Y juntaré
  - Y congregaré
  lexicon: HALOT
  rationale: El verbo hebreo expresa la acción activa del hablante divino de reunir o convocar; en español, «reuniré» comunica con naturalidad esa iniciativa soberana sin perder el sentido de juntar/convocar.
- source_word: כָּל הַגּוֹיִם
  english_pob_choice: all the nations
  chosen_spanish: a todas las naciones
  alternatives_spanish:
  - a todos los pueblos
  lexicon: HALOT
  rationale: En este contexto bélico e internacional, גּוֹיִם se refiere a naciones como entidades políticas; «naciones» preserva mejor ese valor que «pueblos».
- source_word: אֶל יְרוּשָׁלִַם לַמִּלְחָמָה
  english_pob_choice: against Jerusalem for battle
  chosen_spanish: contra Jerusalén para la guerra
  alternatives_spanish:
  - hacia Jerusalén para la guerra
  - contra Jerusalén para el combate
  lexicon: HALOT
  rationale: Aunque אֶל es literalmente «a/hacia», el contexto hostil exige el valor relacional «contra». לַמִּלְחָמָה se vierte de manera más amplia como «para la guerra», que suena natural en español y mantiene el matiz bélico.
- source_word: וְנִלְכְּדָה הָעִיר
  english_pob_choice: and the city will be captured
  chosen_spanish: la ciudad será capturada
  alternatives_spanish:
  - la ciudad será tomada
  lexicon: HALOT
  rationale: El nifal de לכד describe ser tomada en guerra; «capturada» es claro y conserva el sentido militar sin ambigüedad.
- source_word: וְנָשַׁסּוּ הַבָּתִּים
  english_pob_choice: and the houses plundered
  chosen_spanish: las casas saqueadas
  alternatives_spanish:
  - las casas despojadas
  - las casas pilladas
  lexicon: HALOT
  rationale: El verbo denota despojar/saquear en un contexto de conquista. «Saqueadas» transmite bien el acto violento de expolio en español actual.
- source_word: וְהַנָּשִׁים תשגלנה
  english_pob_choice: and the women raped
  chosen_spanish: y las mujeres violadas
  alternatives_spanish:
  - y las mujeres ultrajadas
  - y las mujeres raviadas
  lexicon: HALOT
  rationale: El hebreo es crudo y apunta a violencia sexual. En español, «violadas» expresa la fuerza léxica sin eufemismo. Se mantiene la gravedad del texto fuente.
- source_word: וְיָצָא חֲצִי הָעִיר בַּגּוֹלָה
  english_pob_choice: and half of the city will go out into exile
  chosen_spanish: la mitad de la ciudad saldrá al exilio
  alternatives_spanish:
  - la mitad de la ciudad irá al destierro
  - la mitad de la ciudad saldrá en cautiverio
  lexicon: HALOT
  rationale: בַּגּוֹלָה refiere al exilio/deportación. «Saldrá al exilio» conserva la imagen del movimiento fuera de la ciudad y el estado de deportación.
- source_word: וְיֶתֶר הָעָם
  english_pob_choice: but the rest of the people
  chosen_spanish: pero el resto del pueblo
  alternatives_spanish:
  - pero el remanente del pueblo
  - pero lo que quede del pueblo
  lexicon: HALOT
  rationale: יֶתֶר significa resto o lo que queda. «Resto del pueblo» es natural en español y evita cargar el término con un matiz técnico de «remanente» si no lo exige el contexto inmediato.
- source_word: לֹא יִכָּרֵת מִן הָעִיר
  english_pob_choice: will not be cut off from the city
  chosen_spanish: no será cortado de la ciudad
  alternatives_spanish:
  - no será eliminado de la ciudad
  - no será exterminado de la ciudad
  - no será apartado de la ciudad
  lexicon: HALOT
  rationale: כרת en nifal puede significar cortar, cortar fuera/desde, eliminar o destruir. La versión principal conserva la metáfora verbal «cortado» y deja abierta la tensión entre remoción y destrucción, como lo hace el texto fuente.
theological_decisions:
- issue: Renderización de la agresión sexual
  english_pob_reading: Explicitly translated תשגלנה as 'the women raped'
  chosen_spanish_reading: «las mujeres violadas»
  alternative_spanish_readings:
  - «las mujeres ultrajadas»
  - «las mujeres raviadas»
  rationale: La prioridad de la transparencia léxica exige no suavizar el término hebreo. «Violadas» comunica de forma directa la violencia sexual descrita por el texto y evita una eufemización que disminuiría la gravedad del pasaje.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Sentido de לֹא יִכָּרֵת מִן הָעִיר
  english_pob_reading: The remaining people are not cut off from the city
  chosen_spanish_reading: el resto del pueblo no será cortado de la ciudad
  alternative_spanish_readings:
  - el resto del pueblo no será exterminado
  - el resto del pueblo no será removido de la ciudad
  rationale: La expresión hebrea es ambigua entre ser quitado de la ciudad y ser destruido. La redacción principal mantiene la imagen formal de «cortado» sin resolver en exceso la ambigüedad; así se preserva la tensión lexical del original.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: El paquete de revisión indica acuerdo alto y no contiene cambios aplicados; esta versión sigue de cerca la última lectura aprobada del texto fuente y su audit trail en inglés, manteniendo la ambigüedad documentada sobre כרת.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo requiera explícitamente; en este versículo no aparece el Tetragrámaton.
  - «Naciones» se mantiene para גּוֹיִם por el contexto bélico internacional.
  - «Exilio» se conserva para בַּגּוֹלָה como término estándar y claro en español bíblico contemporáneo.
  - Se evita «señor»/«SEÑOR» y «Cristo» porque no aparecen en el versículo.
  - La metáfora «cortado» se conserva para no resolver prematuramente la ambigüedad de יִכָּרֵת.
