translation:
  language: es
  text: ¿Y por qué no perdonas mi transgresión[a] y quitas mi iniquidad? Pues ahora me acostaré en el polvo; me buscarás diligentemente[b], pero ya no estaré.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'perdonas mi transgresión y pasas por alto mi iniquidad'. Los verbos hebreos son literalmente 'levantar/cargar' y 'hacer pasar', modismos para perdonar y quitar la culpa.
    reason: lexical_alternative
  - marker: b
    text: O 'me buscarás de mañana'. El verbo hebreo puede llevar un matiz de búsqueda temprana, aunque aquí probablemente expresa una búsqueda diligente o intensa.
    reason: lexical_alternative
lexical_decisions:
- source_word: תִשָּׂא
  english_pob_choice: pardon
  chosen_spanish: perdonas
  alternatives_spanish:
  - absuelves
  - levantas
  lexicon: HALOT
  rationale: El hebreo נָשָׂא, con objeto de pecado, significa literalmente 'levantar/cargar', y por extensión idiomática 'perdonar' o 'quitar la culpa'. En español, 'perdonas' comunica de modo natural la acción de remisión, sin perder el trasfondo relacional y judicial del verbo.
- source_word: פִשְׁעִי
  english_pob_choice: my transgression
  chosen_spanish: mi transgresión
  alternatives_spanish:
  - mi rebelión
  - mi falta
  lexicon: HALOT
  rationale: פשע designa una transgresión, a menudo con matiz de rebelión o ruptura voluntaria. 'Transgresión' conserva el peso moral del término y distingue este primer vocablo del segundo término paralelo.
- source_word: וְתַעֲבִיר
  english_pob_choice: take away
  chosen_spanish: quitas
  alternatives_spanish:
  - remueves
  - haces pasar
  - pasas por alto
  lexicon: HALOT
  rationale: El hifil de עבר puede significar hacer pasar, remover o apartar. 'Quitas' expresa de forma idiomática la remoción de la culpa y evita el posible malentendido de 'pasar por alto' como mera omisión.
- source_word: עֲוֺנִי
  english_pob_choice: my iniquity
  chosen_spanish: mi iniquidad
  alternatives_spanish:
  - mi culpa
  - mi maldad
  lexicon: HALOT
  rationale: עון puede abarcar iniquidad, culpa o castigo por la culpa. Dado el paralelismo con פשע y el tono penitencial, 'iniquidad' preserva el peso moral-teológico del término mejor que un equivalente más restringido como 'culpa'.
- source_word: כִּי עַתָּה
  english_pob_choice: For now
  chosen_spanish: Porque ahora
  alternatives_spanish:
  - Pues ahora
  - Ya que ahora
  lexicon: HALOT
  rationale: 'La frase introduce la razón inmediata de la súplica: la cercanía de la muerte. ''Porque ahora'' refleja bien el valor causal-temporal de כִּי sin forzar la interpretación.'
- source_word: לֶעָפָר אֶשְׁכָּב
  english_pob_choice: I will lie down in the dust
  chosen_spanish: me acostaré en el polvo
  alternatives_spanish:
  - yaceré en el polvo
  - me tenderé en el polvo
  lexicon: HALOT
  rationale: עפר es 'polvo', imagen poética de mortalidad y sepultura. 'Me acostaré en el polvo' conserva el cuadro concreto y sugiere la proximidad de la muerte sin traducirlo de manera plana como 'moriré'.
- source_word: וְשִׁחֲרְתַּנִי
  english_pob_choice: you will seek me diligently
  chosen_spanish: me buscarás diligentemente
  alternatives_spanish:
  - me buscarás de mañana
  - me buscarás con empeño
  lexicon: HALOT
  rationale: El verbo שׁחר en piel puede implicar buscar con diligencia y, en ciertos contextos, con matiz de 'de mañana'. Aquí el sentido contextual favorece la búsqueda intensa; 'diligentemente' conserva esa fuerza sin fijar innecesariamente la referencia temporal.
- source_word: וְאֵינֶנִּי
  english_pob_choice: but I will be gone
  chosen_spanish: pero ya no existiré
  alternatives_spanish:
  - pero no estaré
  - pero habré desaparecido
  lexicon: HALOT
  rationale: La expresión hebrea literalmente significa 'y no estoy / no soy', un giro idiomático para ausencia o muerte. 'Ya no existiré' comunica el resultado de desaparición de modo natural en español, manteniendo la contundencia del hebreo.
theological_decisions:
- issue: Distinguir los dos términos de culpa en el paralelismo
  english_pob_reading: Use 'transgression' for פשע and 'iniquity' for עון
  chosen_spanish_reading: Usar 'transgresión' para פשע e 'iniquidad' para עון
  alternative_spanish_readings:
  - Usar 'pecado' para ambos
  - Usar 'falta' y 'culpa'
  rationale: El hebreo presenta dos términos relacionados pero no idénticos. Mantener la distinción respeta el paralelismo poético y evita aplanar el vocabulario moral del versículo.
  doctrine_reference: Translation philosophy §5 (Consistencia de términos clave, o excepción documentada)
- issue: Imagen de muerte en 'polvo'
  english_pob_reading: Retain the concrete image 'lie down in the dust' rather than interpretive 'die'
  chosen_spanish_reading: Retener la imagen concreta 'me acostaré en el polvo' en lugar de 'moriré'
  alternative_spanish_readings:
  - Porque ahora moriré
  - Porque ahora iré a la tumba
  rationale: El texto usa una imagen poética de mortalidad y sepultura. Conservarla preserva la fuerza literaria y la tensión teológica del pasaje sin sustituirla por una paráfrasis explicativa.
  doctrine_reference: 'Translation philosophy: equivalencia óptima; preservar el sentido llano del texto fuente'
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el consenso del audit trail es de alta concordancia y no requiere ajustes respecto del sentido de los verbos ni de la imagen del polvo.
  spanish_consistency_notes:
  - Se mantiene 'transgresión' y 'iniquidad' como pares distintos para conservar la doblet moral del hebreo.
  - Se traduce יהוה no aplicable aquí; no hay sustituciones confesionales.
  - Se usa 'polvo' y no 'tierra' para respetar la imagen mortuoria del original.
  - '''Ya no existiré'' reproduce el valor idiomático de וְאֵינֶנִּי como ausencia/muerte, no como simple negación abstracta.'
