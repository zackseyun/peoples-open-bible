- from: Yo soy de mi amado[a], y mi amado es mío, el que apacienta entre los lirios.
  to: Soy de mi amado, y mi amado es mío, que pasta[a] entre los lirios.
  rationale: Se hace una reparación menor para mejorar la naturalidad poética del español y acercar mejor el participio hebreo הָרֹעֶה a una imagen pastoral no transitiva. 'Soy de mi amado' mantiene la reciprocidad idiomáticamente; 'que pasta entre los lirios' refleja bien el valor del participio y deja constancia de alternativas válidas en la nota.
