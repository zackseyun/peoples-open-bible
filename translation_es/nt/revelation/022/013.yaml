translation:
  language: es
  text: Yo soy el Alfa y la Omega[a], el primero y el último, el principio y el fin.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el origen y la meta».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγὼ
  english_pob_choice: I
  chosen_spanish: Yo
  alternatives_spanish:
  - Yo mismo
  lexicon: BDAG
  rationale: El griego expresa el pronombre enfáticamente. En español conviene conservarlo con «Yo soy» para mantener la solemnidad y la fuerza de la autoidentificación sin añadir la intensificación más marcada de «yo mismo».
- source_word: τὸ Ἄλφα
  english_pob_choice: the Alpha
  chosen_spanish: el Alfa
  alternatives_spanish:
  - la A
  lexicon: BDAG
  rationale: Se preserva el título simbólico con el nombre de la primera letra griega, como designación fija en Apocalipsis. En español, «el Alfa» es más transparente y reconocible que sustituirlo por «la A».
- source_word: τὸ Ὦ
  english_pob_choice: the Omega
  chosen_spanish: la Omega
  alternatives_spanish:
  - el O
  lexicon: BDAG
  rationale: Se mantiene el título simbólico correspondiente a la última letra griega. Aunque el sustantivo es de forma femenina en griego por la letra subyacente, en español el uso establecido del título favorece «la Omega» para preservar la referencia literaria.
- source_word: ὁ πρῶτος
  english_pob_choice: the first
  chosen_spanish: el primero
  alternatives_spanish:
  - el primer
  lexicon: BDAG
  rationale: Se traduce de manera directa el adjetivo sustantivado. «El primero» conserva el paralelismo titulado y la cadencia de la serie.
- source_word: ὁ ἔσχατος
  english_pob_choice: the last
  chosen_spanish: el último
  alternatives_spanish:
  - el final
  lexicon: BDAG
  rationale: «El último» es el equivalente más natural y paralelo a «el primero». «El final» es posible, pero suena menos idiomático en esta secuencia titulada.
- source_word: ἡ ἀρχὴ
  english_pob_choice: the beginning
  chosen_spanish: el principio
  alternatives_spanish:
  - el origen
  lexicon: BDAG
  rationale: Se eligió «el principio» porque en español funciona bien como par natural de «el fin» y preserva la fórmula apocalíptica condensada. «El origen» capta una posible matiz causal, pero altera la simetría del conjunto.
- source_word: τὸ τέλος
  english_pob_choice: the end
  chosen_spanish: el fin
  alternatives_spanish:
  - la meta
  lexicon: BDAG
  rationale: «El fin» reproduce con naturalidad el paralelo con «el principio» y conserva la brevedad solemne del texto. «La meta» reflejaría un matiz de propósito, pero no es el equivalente principal aquí.
theological_decisions:
- issue: La auto-designación en serie expresa soberanía total y plenitud temporal sin explicitar una paráfrasis doctrinal
  english_pob_reading: I am the Alpha and the Omega, the first and the last, the beginning and the end.
  chosen_spanish_reading: Yo soy el Alfa y la Omega, el primero y el último, el principio y el fin.
  alternative_spanish_readings:
  - Yo soy el Alfa y la Omega, el primero y el final, el origen y la meta.
  rationale: Se conserva la triple serie de títulos con su simetría formal. La traducción evita expandir el sentido con lenguaje explicativo no presente en el griego, pero deja visible la afirmación de plenitud, primacía y consumación.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés presentan alta concordancia y no registran revisiones aplicadas; por eso la versión española mantiene la estructura retórica y la serie de títulos sin añadir glosas interpretativas en el cuerpo principal.
  spanish_consistency_notes:
  - Se conserva el registro solemne y apocalíptico con sintaxis breve y paralelística.
  - Se evita «Señor» o una paráfrasis devocional para no desdibujar la serie nominal del original.
  - «Alfa» y «Omega» se mantienen como títulos simbólicos, no como equivalentes alfabéticos literales.
  - La opción «fin» responde al paralelismo con «principio» y no pretende negar posibles matices de propósito; esos matices quedan recogidos en la nota.
