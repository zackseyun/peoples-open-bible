translation:
  language: es
  text: Pero, en tu tiranía, no solo nos obligas a quebrantar la ley, sino también a comer, para que todavía más te burles de nosotros con esta contaminación por la comida[a], tan odiosa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con este comer tan contaminante» o «con esta profanación por la comida». El término griego es raro y combina las ideas de comer y contaminación o profanación ritual/moral.
    reason: lexical_alternative
lexical_decisions:
- source_word: τυραννικὸν
  english_pob_choice: tyrannically
  chosen_spanish: en tu tiranía / en tu proceder tiránico
  alternatives_spanish:
  - tiránicamente
  - de manera tiránica
  lexicon: LSJ
  rationale: El adjetivo funciona con valor adverbial o predicativo para caracterizar la acción del gobernante. En español, 'en tu tiranía' expresa con naturalidad la acusación de opresión y conserva el matiz de conducta despótica; 'tiránicamente' también sería posible, pero la forma elegida suena más fluida en este contexto de reproche directo.
- source_word: ἀναγκάζεις
  english_pob_choice: you are ... compelling
  chosen_spanish: nos obligas
  alternatives_spanish:
  - nos compelens
  - nos fuerzas
  - nos constriñes
  lexicon: BDAG
  rationale: El verbo indica coerción. 'Obligas' es el equivalente natural y claro en español; mantiene la fuerza de imposición sin endurecer innecesariamente el registro.
- source_word: παρανομεῖν
  english_pob_choice: to break the law
  chosen_spanish: quebrantar la ley
  alternatives_spanish:
  - actuar contra la ley
  - transgredir la ley
  lexicon: LSJ
  rationale: El compuesto significa actuar contra la ley. En este contexto macabeo la referencia es a la ley judía, pero el griego no especifica explícitamente 'de Dios'; 'quebrantar la ley' conserva la formulación amplia y es idiomático en español.
- source_word: ἐσθίειν
  english_pob_choice: to eat
  chosen_spanish: a comer
  alternatives_spanish:
  - a consumir
  lexicon: BDAG
  rationale: Infinitivo simple; 'comer' es la traducción directa y más natural.
- source_word: ὅπως
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: BDAG
  rationale: Introduce finalidad. 'Para que' expresa con claridad la intención del tirano y su burla subsecuente.
- source_word: ἐχθίστῃ
  english_pob_choice: most hateful
  chosen_spanish: la más odiosa
  alternatives_spanish:
  - la más detestable
  - la más aborrecible
  lexicon: LSJ
  rationale: El superlativo de 'odiado/hostil' se rinde bien con 'la más odiosa', que conserva intensidad emocional y es natural en español.
- source_word: μιεροφαγίᾳ
  english_pob_choice: defilement by food
  chosen_spanish: defilección de la comida
  alternatives_spanish:
  - comida impura
  - contaminación por la comida
  - comer impuro
  lexicon: LSJ
  rationale: El compuesto es raro y une la idea de suciedad/contaminación con comer. 'Defilección de la comida' intenta preservar esa rareza léxica y el nexo entre alimento y contaminación ritual/moral. Se evita reducirlo a 'comer comida impura', porque el texto enfatiza el acto mismo y su efecto contaminante.
- source_word: ἔτι
  english_pob_choice: further
  chosen_spanish: todavía
  alternatives_spanish:
  - aún
  - además
  - más
  lexicon: BDAG
  rationale: Aquí intensifica la burla añadida. 'Todavía' comunica la insistencia de un insulto adicional.
- source_word: ἐγγελάσῃς
  english_pob_choice: you may ... mock us
  chosen_spanish: te burles de nosotros
  alternatives_spanish:
  - te rías de nosotros
  - nos escarnezcas
  - nos ridiculices
  lexicon: LSJ
  rationale: El verbo puede significar reírse de, burlarse de o escarnecer. 'Te burles de nosotros' es idiomático y conserva el sentido de mofa hostil.
theological_decisions:
- issue: Alcance de 'la ley' en παρανομεῖν dentro del contexto macabeo
  english_pob_reading: Refers to violating the Jewish law, expressed as 'break the law' without inserting 'God's' into the main text.
  chosen_spanish_reading: '''la ley'' se mantiene sin añadir ''de Dios'' en el cuerpo principal, aunque el contexto apunta a la ley judía/Torá.'
  alternative_spanish_readings:
  - quebrantar la ley de Dios
  - transgredir la ley ancestral
  rationale: El contexto histórico hace clara la referencia a la ley judía, pero el griego dice simplemente 'actuar contra la ley'. La traducción principal conserva esa sobriedad textual sin ampliar el contenido; la nota puede aclarar la implicación covenantal si hace falta.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Naturaleza de μιεροφαγίᾳ como contaminación ritual/moral
  english_pob_reading: The Greek term is rare and combines the ideas of eating and ritual/moral defilement.
  chosen_spanish_reading: Se entiende como contaminación o profanación asociada al acto de comer, no solo como la comida en sí.
  alternative_spanish_readings:
  - comida impura
  - contaminación alimentaria
  - acto de comer impuro
  rationale: La palabra griega es un compuesto raro y su fuerza está en la unión de 'comer' con 'contaminarse'. 'Defilección de la comida' mantiene esa tensión; una versión más lisa podría perder el efecto de rechazo ritual y moral que expresa el texto.
  doctrine_reference: Translation philosophy §§2, 4, 7
translation_notes:
  revision_awareness: Se siguió de cerca el estado más reciente del audit trail inglés, especialmente la revisión que prefirió un equivalente más directo para τυραννικὸν y un registro más formal para ἀναγκάζεις. En español, la solución intenta conservar esa formalidad sin caer en calco mecánico. También se mantuvo la tensión del compuesto μιεροφαγίᾳ, cuya rareza exige una decisión visible en nota.
  spanish_consistency_notes:
  - Se usa 'ley' sin adición interpretativa en el cuerpo principal, siguiendo la sobriedad del griego y del POB inglés.
  - Se evita 'Cristo/Mesías' porque no aparece en este versículo.
  - Se preserva el matiz de burla activa con 'te burles de nosotros', equivalente idiomático de ἐγγελάσῃς.
  - La puntuación y el orden español se ajustan a un estilo bíblico moderno, sin arcaísmos innecesarios.
