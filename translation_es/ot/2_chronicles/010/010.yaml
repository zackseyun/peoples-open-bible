base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/010/010.yaml
  text: The young men who had grown up with him spoke to him[a], saying, “Thus you shall say to the people who spoke to you, saying, ‘Your father made our yoke heavy, but you make it lighter for us.’ Thus you shall say to them[b], ‘My little finger is thicker than my father’s waist.’”
  footnotes:
  - marker: a
    text: Hebrew literally, 'My littleness is thicker than my father’s waist'; the expression is idiomatically understood as 'My little finger is thicker than my father’s waist.'
    reason: lexical_alternative
  - marker: b
    text: Or 'my father’s loins.'
    reason: lexical_alternative
