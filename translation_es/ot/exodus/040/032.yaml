translation:
  language: es
  text: Cuando entraron en la tienda de reunión, y cuando se acercaron al altar, se lavaron, tal como Yahvé había mandado a Moisés.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בְּבֹאָם
  english_pob_choice: When they entered
  chosen_spanish: Cuando entraban
  alternatives_spanish:
  - Cuando entraron
  - Al entrar
  lexicon: HALOT
  rationale: La construcción preposicional con infinitivo y sufijo expresa circunstancia temporal habitual; en español, el imperfecto con «cuando» comunica bien la acción repetida en contexto ritual sin forzar un tiempo puntual.
- source_word: אֹהֶל מוֹעֵד
  english_pob_choice: the tent of meeting
  chosen_spanish: el tabernáculo de reunión
  alternatives_spanish:
  - la tienda de reunión
  - el tabernáculo de encuentro
  lexicon: HALOT
  rationale: «Tabernáculo de reunión» es una equivalencia tradicional y comprensible en español bíblico para el santuario de cita; conserva el valor cultual del hebreo sin perder claridad. Se evita una traducción mecánica que sonaría extraña en español general.
- source_word: וּבְקָרְבָתָם
  english_pob_choice: and when they approached
  chosen_spanish: y cuando se acercaban
  alternatives_spanish:
  - y cuando se aproximaban
  - y al acercarse
  lexicon: HALOT
  rationale: El verbo קרב expresa acercamiento físico al altar. «Se acercaban» es natural y mantiene la repetición habitual marcada por el contexto.
- source_word: הַמִּזְבֵּחַ
  english_pob_choice: the altar
  chosen_spanish: el altar
  alternatives_spanish:
  - el ara
  lexicon: HALOT
  rationale: «El altar» es la forma clara y estándar en español; «ara» sería más técnica o litúrgica y menos transparente para lectores amplios.
- source_word: יִרְחָצוּ
  english_pob_choice: they washed
  chosen_spanish: se lavaban
  alternatives_spanish:
  - se lavaban las manos y los pies
  - se lavaban a sí mismos
  lexicon: HALOT
  rationale: El imperfecto expresa acción habitual; en español, el reflexivo «se lavaban» es idiomático y conserva la reciprocidad implícita del acto ritual sin añadir detalles no explicitados en el verso.
- source_word: כַּאֲשֶׁר
  english_pob_choice: just as
  chosen_spanish: tal como
  alternatives_spanish:
  - como
  - según
  lexicon: HALOT
  rationale: «Tal como» preserva la idea de conformidad exacta con un mandato previo, con un tono natural y algo más explícito que un simple «como».
- source_word: צִוָּה
  english_pob_choice: had commanded
  chosen_spanish: había mandado
  alternatives_spanish:
  - había ordenado
  - había commandado
  lexicon: HALOT
  rationale: «Mandar» transmite bien la autoridad del encargo divino y suena natural en español bíblico moderno. Se mantiene el pluscuamperfecto para reflejar la anterioridad del mandamiento respecto del acto descrito.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
  rationale: Se usa la forma española proyectada por el proyecto para el nombre divino, manteniendo el tetragrámaton como nombre propio y evitando la sustitución por un título.
- source_word: אֶת מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: a Moisés
  alternatives_spanish:
  - Moisés
  lexicon: HALOT
  rationale: Con צוה, la partícula אֶת introduce el objeto personal del mandato; en español, la preposición «a» conserva la función sintáctica y respeta la relación semántica del verbo.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El verso emplea el nombre propio del pacto y no un título. La política terminológica del proyecto pide conservarlo como nombre divino en español; «Yahvé» es la forma adoptada para la main text en esta lengua.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: La revisión inglesa más reciente sustituyó «Whenever» por «When» para una lectura más directa de los infinitivos constructos. La versión española sigue esa misma línea con «Cuando» + imperfecto, manteniendo el sentido habitual sin sobreinsistir en la iteración mediante adverbios adicionales.
  spanish_consistency_notes:
  - Se mantiene el registro bíblico moderno y digno, sin caer en arcaísmos fuertes.
  - «Tabernáculo de reunión» armoniza con el uso cultual tradicional en español y conserva la claridad del referente.
  - Se usa «Yahvé» de manera consistente para el Tetragrámaton, conforme a la política del proyecto.
  - No se amplía el objeto de «se lavaban»; el verso no especifica aquí manos, pies u otra parte del cuerpo.
