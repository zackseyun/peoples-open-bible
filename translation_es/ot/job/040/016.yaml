translation:
  language: es
  text: 'Mira ahora: su fuerza[a] está en sus lomos, y su vigor en los músculos de su vientre[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su vigor» para «su fuerza»; el paralelismo hebreo usa dos términos muy cercanos para la fuerza corporal.
    reason: lexical_alternative
  - marker: b
    text: O «tendones de su vientre» para «músculos de su vientre».
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה נָא
  english_pob_choice: Look now
  chosen_spanish: Mira ahora
  alternatives_spanish:
  - Mira
  - Mira, pues
  - Observa ahora
  lexicon: HALOT
  rationale: הִנֵּה es una partícula deíctica que llama la atención, y נָא añade urgencia o viveza. «Mira ahora» conserva esa inmediatez en un español natural y digno, sin recurrir a un arcaísmo innecesario.
- source_word: כֹחוֹ
  english_pob_choice: his strength
  chosen_spanish: su fuerza
  alternatives_spanish:
  - su poder
  - su vigor
  lexicon: HALOT
  rationale: כֹחַ suele expresar fuerza o vigor corporal. «Fuerza» corresponde bien al cuadro físico del verso; «poder» podría sonar más abstracto en español.
- source_word: בְמָתְנָיו
  english_pob_choice: in his loins
  chosen_spanish: en sus lomos
  alternatives_spanish:
  - en sus caderas
  - en su cintura
  lexicon: HALOT
  rationale: מָתְנַיִם designa la zona de los lomos o caderas. «Lomos» mantiene el paralelismo anatómico y el registro poético, además de ser una equivalencia tradicional y comprensible.
- source_word: וְאֹנוֹ
  english_pob_choice: and his power
  chosen_spanish: su vigor
  alternatives_spanish:
  - su poder
  - su fuerza
  lexicon: HALOT
  rationale: אֹן puede denotar fuerza, vigor o potencia. Aquí el paralelismo hebreo permite variar el término; «vigor» comunica bien la energía vital o corporal sin perder el campo semántico.
- source_word: בִּשְׁרִירֵי
  english_pob_choice: in the muscles of
  chosen_spanish: en los músculos de
  alternatives_spanish:
  - en los tendones de
  - en las partes firmes de
  lexicon: HALOT
  rationale: שְׁרִירִים puede referirse a músculos, tendones o partes firmes. «Músculos» es la opción más clara para el lector moderno y encaja con la descripción corporal del verso.
- source_word: בִטְנוֹ
  english_pob_choice: his belly
  chosen_spanish: su vientre
  alternatives_spanish:
  - su abdomen
  - su barriga
  lexicon: HALOT
  rationale: בֶּטֶן puede significar vientre, abdomen o barriga según el contexto. «Vientre» conserva el registro bíblico sin perder claridad anatómica en español.
translation_notes:
  revision_awareness: El texto español sigue de cerca el hebreo poético y coincide con la lectura auditada del POB en inglés. No se aplicaron revisiones posteriores al contenido recibido; se preserva el paralelismo de dos términos corporales cercanos en lugar de fusionarlos.
  spanish_consistency_notes:
  - Se prefirió «Mira ahora» para reproducir el valor deíctico e imperativo suave de הִנֵּה נָא.
  - Se mantuvo la distinción entre «fuerza» y «vigor» para reflejar el paralelismo hebreo entre כֹחַ y אֹן.
  - «Lomos» y «vientre» sostienen un registro bíblico claro y son anatómicamente adecuados en este contexto poético.
