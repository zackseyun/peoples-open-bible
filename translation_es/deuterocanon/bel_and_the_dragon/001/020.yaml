translation:
  language: es
  text: '¿De quién son estas huellas? Y el rey dijo: «Veo las huellas de hombres, mujeres y niños».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: τίνος
  english_pob_choice: Whose
  chosen_spanish: ¿De quién son…?
  alternatives_spanish:
  - ¿De quién pertenecen…?
  - ¿A quién pertenecen…?
  lexicon: BDAG
  rationale: El genitivo interrogativo pide una pregunta de posesión o pertenencia. En español, «¿De quién son…?» suena natural, directo y conserva la relación de pertenencia implícita en el griego.
- source_word: ἴχνη
  english_pob_choice: footprints
  chosen_spanish: huellas
  alternatives_spanish:
  - pisadas
  - huellas de pies
  - rastros
  lexicon: LSJ
  rationale: El término designa marcas dejadas por los pies. «Huellas» es natural en español y suficientemente específico en este contexto narrativo; «pisadas» sería también posible, pero menos idiomático aquí.
- source_word: ταῦτα
  english_pob_choice: these
  chosen_spanish: estas
  alternatives_spanish:
  - estas mismas
  - estas aquí
  lexicon: BDAG
  rationale: El demostrativo indica las marcas visibles delante de los hablantes. «Estas» mantiene la deixis sin añadir énfasis innecesario.
- source_word: ὁρῶ
  english_pob_choice: I see
  chosen_spanish: Veo
  alternatives_spanish:
  - Estoy viendo
  - Observo
  lexicon: BDAG
  rationale: Verbo de percepción en presente simple. «Veo» reproduce de forma literal y natural la afirmación del rey.
- source_word: ἀνδρῶν
  english_pob_choice: men
  chosen_spanish: hombres
  alternatives_spanish:
  - varones
  - males
  lexicon: BDAG
  rationale: El término se refiere específicamente a varones adultos. «Hombres» es la opción más natural en español y preserva el contraste con «mujeres».
- source_word: γυναικῶν
  english_pob_choice: women
  chosen_spanish: mujeres
  alternatives_spanish:
  - esposas
  lexicon: BDAG
  rationale: En esta enumeración de personas inferidas por las huellas, el sentido genérico «mujeres» es el adecuado; «esposas» introduciría una relación no presente en el texto.
- source_word: παιδίων
  english_pob_choice: children
  chosen_spanish: niños
  alternatives_spanish:
  - niños pequeños
  - pequeños
  lexicon: BDAG
  rationale: El diminutivo plural indica niños en general. «Niños» transmite la referencia sin sobreespecificar la edad.
translation_notes:
  revision_awareness: La versión en inglés del POB no requiere notas y la revisión más reciente indicó que no había cambios necesarios; por ello, la redacción española sigue de cerca el sentido directo del griego sin introducir variantes textuales ni matices doctrinales adicionales.
  spanish_consistency_notes:
  - Se mantuvo «huellas» como equivalente consistente de ἴχνη en un contexto concreto de rastros visibles.
  - Se evitó «SEÑOR» o terminología teológica ajena porque el verso no contiene nombres divinos ni títulos cristológicos.
  - La enumeración «hombres, mujeres y niños» conserva el paralelismo del original griego y del audit trail inglés.
