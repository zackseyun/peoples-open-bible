translation:
  language: es
  text: ¿Les parece poca cosa[a] que el Dios de Israel los haya separado de la congregación de Israel, para acercarlos a él, para servir en el servicio del tabernáculo de Yahvé, y para estar ante la congregación a fin de ministrarles?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿No les basta?». El modismo hebreo puede traducirse más literalmente con énfasis en que algo parece «poca cosa», o más dinámicamente con énfasis en suficiencia.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמְעַט
  english_pob_choice: Is it too small a thing
  chosen_spanish: ¿Es poco[a]
  alternatives_spanish:
  - ¿No es suficiente?
  - ¿Es acaso poca cosa?
  lexicon: HALOT
  rationale: El hebreo formula una pregunta retórica idiomática. En español, «¿Es poco?» conserva la fuerza de menosprecio implícito sin volverla demasiado interpretativa. La alternativa «¿No es suficiente?» es válida, pero cambia ligeramente el matiz hacia suficiencia más que pequeñez.
- source_word: הִבְדִּיל
  english_pob_choice: has separated
  chosen_spanish: haya separado
  alternatives_spanish:
  - haya puesto aparte
  - haya distinguido
  lexicon: HALOT
  rationale: «Separar» reproduce de modo directo la acción causativa del hebreo y mantiene el contraste con el resto de Israel. En español, el subjuntivo en la pregunta retórica encaja mejor que un perfecto indicativo literal.
- source_word: עֲדַת יִשְׂרָאֵל
  english_pob_choice: the congregation of Israel
  chosen_spanish: la congregación de Israel
  alternatives_spanish:
  - la comunidad de Israel
  - la asamblea de Israel
  lexicon: HALOT
  rationale: «Congregación» sigue el valor colectivo reunido del término y además armoniza con el contexto cultual. «Asamblea» o «comunidad» son posibles, pero aquí «congregación» refleja mejor el registro bíblico y la función formal del grupo.
- source_word: לְהַקְרִיב אֶתְכֶם אֵלָיו
  english_pob_choice: to bring you near to himself
  chosen_spanish: para acercarlos a él
  alternatives_spanish:
  - para presentarlos ante sí
  - para atraerlos a sí
  lexicon: HALOT
  rationale: El verbo puede tener sentido cultual de acercar/presentar. «Acercarlos a él» mantiene el movimiento relacional y sacrificial sin explicitar más de lo que el contexto exige. La forma «a él» evita una expansión innecesaria de sentido.
- source_word: לַעֲבֹד אֶת עֲבֹדַת מִשְׁכַּן יְהוָה
  english_pob_choice: to serve in the service of the tabernacle of Yahweh
  chosen_spanish: para servir en el servicio del tabernáculo de Yahvé
  alternatives_spanish:
  - para realizar el servicio del tabernáculo de Yahvé
  - para hacer el trabajo del tabernáculo de Yahvé
  lexicon: HALOT
  rationale: Conservo el cognado «servir en el servicio» para reproducir el énfasis hebreo עבד/עֲבֹדָה. «Tabernáculo» es el equivalente tradicional y preciso de מִשְׁכָּן en este contexto, y «Yahvé» preserva el nombre divino según el criterio del proyecto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: El proyecto español usa «Yahvé» como forma principal del tetragrámaton. Mantiene la transliteración del nombre divino en una forma natural para el español, en lugar de sustituirlo por un título genérico.
- source_word: וְלַעֲמֹד לִפְנֵי הָעֵדָה
  english_pob_choice: and to stand before the congregation
  chosen_spanish: y para estar delante de la congregación
  alternatives_spanish:
  - y para ponerse delante de la congregación
  - y para presentarse ante la congregación
  lexicon: HALOT
  rationale: «Estar delante» conserva la idea de posición y representación oficial. «Estar» suena más natural en español que «estar de pie» dentro de esta cadena paralela, aunque el gesto implícito sea el de comparecer ante un grupo.
- source_word: לְשָׁרְתָם
  english_pob_choice: to minister to them
  chosen_spanish: para ministrarles
  alternatives_spanish:
  - para servirles
  - para atenderlos
  lexicon: HALOT
  rationale: «Ministrar» conserva el matiz oficial y cultual de שׁרת mejor que el más general «servir». En español eclesial contemporáneo sigue siendo entendible y evita banalizar el término.
theological_decisions:
- issue: Uso del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  rationale: Se sigue el criterio del POB de no ocultar el nombre propio divino tras una sustitución. «Yahvé» es la forma establecida en el español del proyecto y preserva la referencia al nombre revelado de Dios a Israel.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Valor cultual de לְהַקְרִיב y לַעֲבֹד
  english_pob_reading: to bring you near to himself, to serve in the service
  chosen_spanish_reading: para acercarlos a él, para servir en el servicio
  alternative_spanish_readings:
  - para presentarlos ante sí, para realizar el servicio
  rationale: No se reduce el sentido a mera cercanía física; el contexto levítico y del santuario conserva una dimensión cultual. La redacción española mantiene esa tensión entre proximidad relacional y función litúrgica sin añadir conceptos doctrinales ajenos.
  doctrine_reference: Numbers 16:9 cultic role of the Levites
- issue: Matiz de הַמְעַט
  english_pob_reading: Is it too small a thing
  chosen_spanish_reading: ¿Es poco?
  alternative_spanish_readings:
  - ¿No es suficiente?
  - ¿Es poca cosa?
  rationale: La pregunta retórica debe sonar incisiva en español. «¿Es poco?» preserva la reprensión implícita de manera breve y natural, sin convertirla en un enunciado explicativo.
  doctrine_reference: Hebrew rhetorical idiom
translation_notes:
  revision_awareness: 'El contexto inglés ya había decidido: «Is it too small a thing», «has separated», «to bring you near to himself», «to serve in the service of the tabernacle of Yahweh», «to stand before the congregation», y «to minister to them». La revisión más reciente indicó acuerdo alto y ningún cambio necesario. La presente redacción traslada esas decisiones al español del proyecto, ajustando solo la sintaxis para que suene natural y manteniendo el nombre divino como «Yahvé» según la terminología española POB.'
  spanish_consistency_notes:
  - Se mantiene «congregación» para עֵדָה por coherencia con el registro culto y comunitario del pasaje.
  - Se conserva el cognado «servir en el servicio» para reflejar la repetición semántica del hebreo.
  - «Ministrarles» conserva el tono ministerial sin sustituirlo por un verbo más genérico.
  - El nombre divino se rinde como «Yahvé», conforme al estándar español del proyecto.
