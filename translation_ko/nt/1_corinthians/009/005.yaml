  text: μὴ οὐκ ἔχομεν ἐξουσίαν ἀδελφὴν γυναῖκα περιάγειν, ὡς καὶ οἱ λοιποὶ ἀπόστολοι καὶ οἱ ἀδελφοὶ τοῦ κυρίου καὶ Κηφᾶς;
base_translation:
  language: en
  yaml_path: translation/nt/1_corinthians/009/005.yaml
  text: Do we not have the right to take along a sister as a wife[a], as also the rest of the apostles and the brothers of the Lord and Cephas?
  footnotes:
  - marker: a
    text: Literally, 'a sister, a wife'—that is, a wife who is a fellow believer.
    reason: lexical_alternative
translation:
  language: ko
  text: 우리에게는 다른 사도들과 주의 형제들과 게바처럼 믿는 자매를 아내로 데리고 다닐 권리가 없습니까?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 직역하면 「자매인 아내」, 곧 같은 믿음의 자매이자 아내. 영어 POB는 본문에서 두 요소를 모두 살려 「자매를 아내로(sister as a wife)」로 옮겼고, 한국어 본문도 두 요소를 함께 표현하기 위해 「믿는 자매를 아내로」로 풀어 옮겼다.
    reason: lexical_alternative
