translation:
  language: es
  text: 'Y dijo: «Captúrenlos vivos». Y los capturaron vivos y los degollaron junto al pozo[a] de Bet-eced[b], cuarenta y dos hombres; no dejó con vida a ninguno de ellos[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en el pozo» o «hacia el pozo». La preposición hebrea puede entenderse de más de una manera espacial en este pasaje.
    reason: lexical_alternative
  - marker: b
    text: Bet-eced es un nombre de lugar; el hebreo puede sugerir un sentido subyacente como «casa de atadura/reunión», pero aquí funciona como topónimo.
    reason: cultural_note
  - marker: c
    text: 'Literalmente: «no dejó un hombre de ellos», expresión que subraya que no quedó sobreviviente.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּפְשׂוּם
  english_pob_choice: capture them
  chosen_spanish: captúrenlos
  alternatives_spanish:
  - apréhendanlos
  - sujétenlos
  lexicon: HALOT
  rationale: תפשׂ significa tomar, aprehender o capturar. «Capturar» conserva bien la orden de Jeú y suena natural en español contemporáneo.
- source_word: חַיִּים
  english_pob_choice: alive
  chosen_spanish: vivos
  alternatives_spanish:
  - con vida
  - vivos aún
  lexicon: HALOT
  rationale: 'Aquí funciona de modo adverbial: no debían matarlos en el acto. «Vivos» es la forma más directa y natural en español.'
- source_word: וַֽיִּשְׁחָטוּם
  english_pob_choice: slaughtered them
  chosen_spanish: los degollaron
  alternatives_spanish:
  - los mataron
  - los sacrificaron
  lexicon: HALOT
  rationale: שׁחט expresa una muerte violenta y específica, no solo «matar». «Degollar» conserva mejor la crudeza del verbo que una versión genérica.
- source_word: אֶל בּוֹר
  english_pob_choice: at the pit
  chosen_spanish: junto al pozo
  alternatives_spanish:
  - en el pozo
  - hacia el pozo
  lexicon: HALOT
  rationale: La preposición אֶל admite más de un matiz espacial. En este contexto de ejecución, «junto al pozo» comunica de forma natural la ubicación sin decidir de manera excesiva entre «en» o «hacia».
- source_word: בֵּית עֵקֶד
  english_pob_choice: Beth-eked
  chosen_spanish: Bet-edec
  alternatives_spanish:
  - Bet-eked
  - Casa de edec
  lexicon: HALOT
  rationale: Se trata de un topónimo, por lo que se translitera como nombre propio. «Bet-edec» mantiene el carácter de lugar y la forma breve y legible en español.
- source_word: אַרְבָּעִים וּשְׁנַיִם אִישׁ
  english_pob_choice: forty-two men
  chosen_spanish: cuarenta y dos hombres
  alternatives_spanish:
  - cuarenta y dos varones
  - cuarenta y dos personas
  lexicon: HALOT
  rationale: El hebreo usa אִישׁ, el término común para hombre varón adulto. «Hombres» conserva esa referencia y suena natural en castellano.
- source_word: וְלֹא הִשְׁאִיר אִישׁ מֵהֶם
  english_pob_choice: he did not leave a man of them
  chosen_spanish: no dejó con vida a ninguno de ellos
  alternatives_spanish:
  - no dejó a un hombre de ellos
  - no dejó ninguno de ellos con vida
  lexicon: HALOT
  rationale: El hebreo dice literalmente que no dejó «un hombre» de entre ellos, es decir, ninguno sobrevivió. «No dejó con vida a ninguno de ellos» expresa bien el resultado total sin sonar forzado en español.
theological_decisions:
- issue: Alcance de אֶל בּוֹר en la escena de ejecución
  english_pob_reading: at the pit, with a note that it could also mean by or into the pit
  chosen_spanish_reading: junto al pozo, con una nota que reconoce otras posibilidades espaciales
  alternative_spanish_readings:
  - en el pozo
  - hacia el pozo
  rationale: La frase hebrea admite más de una relación espacial. En español, «junto al pozo» evita fijar una opción que el hebreo no obliga a tomar y mantiene la ambigüedad documentada.
  doctrine_reference: No aplica; decisión de sintaxis y espacialidad textual.
- issue: Sentido totalizador de וְלֹא הִשְׁאִיר אִישׁ מֵהֶם
  english_pob_reading: he did not leave a man of them
  chosen_spanish_reading: no dejó con vida a ninguno de ellos
  alternative_spanish_readings:
  - no dejó a un hombre de ellos
  - no dejó ninguno de ellos con vida
  rationale: El hebreo enfatiza la destrucción completa mediante la forma singular «un hombre» y el negativo total. La traducción elegida comunica la totalidad de la matanza sin perder el sentido resultante.
  doctrine_reference: No aplica; la cuestión es semántica y estilística, no doctrinal.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del POB inglés, que suavizó «he left not a man» a «he did not leave a man» por naturalidad moderna. En español se optó por una formulación igualmente natural, pero que sigue preservando la idea de aniquilación total del hebreo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Se translitera el topónimo como «Bet-edec», sin traducirlo en el cuerpo principal, siguiendo el tratamiento de nombre propio del audit trail inglés.
  - Se prefirió un verbo fuerte («degollaron») para reflejar שׁחט y no diluir la violencia del original.
  - La clausula final se volvió natural en español, pero conserva el énfasis de totalidad presente en el hebreo.
