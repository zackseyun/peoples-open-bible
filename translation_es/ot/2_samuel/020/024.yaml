  glossary_alignment: No hay conflictos con terminología teológica del proyecto. En léxico administrativo, conviene alinear mejor הַמַּזְכִּיר con un término de registro oficial y evitar el calco de עַל. 'Trabajo forzado' para הַמַּס está bien y coincide con la decisión auditada en inglés.
