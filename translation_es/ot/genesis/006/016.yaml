translation:
  language: es
  text: Harás un techo[a] para el arca, y la terminarás a un codo desde arriba.[b] Pondrás la puerta del arca en su costado. La harás con nivel inferior, segundo y tercero.[c]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ventana» o «claraboya» para el arca; el término hebreo es raro y puede referirse a una abertura para la luz más que a un techo completo.
    reason: lexical_alternative
  - marker: b
    text: El hebreo de «la terminarás a un codo desde arriba» es difícil; probablemente describe que la parte superior del arca se estrechaba o se completaba hasta quedar a un codo en la parte de arriba.
    reason: cultural_note
  - marker: c
    text: O «pisos» o «cubiertas». El hebreo describe tres niveles del arca.
    reason: lexical_alternative
lexical_decisions:
- source_word: צֹהַר
  english_pob_choice: roof
  chosen_spanish: abertura
  alternatives_spanish:
  - ventana
  - claraboya
  - techo
  lexicon: HALOT
  rationale: El término hebreo es raro y admite más de una solución. En español, «abertura» preserva la ambigüedad entre una abertura de luz y una cubierta superior, sin decidir prematuramente por «techo»; la nota conserva las alternativas lexicales reconocidas por el audit trail inglés.
- source_word: תַּעֲשֶׂה לַתֵּבָה
  english_pob_choice: you shall make for the ark
  chosen_spanish: harás para el arca
  alternatives_spanish:
  - harás en el arca
  - harás sobre el arca
  lexicon: HALOT
  rationale: El verbo עשה con ל indica la acción constructiva en relación con el arca. «Harás para el arca» transmite de forma natural esa relación en español sin añadir un objeto distinto al de la fuente.
- source_word: וְאֶל אַמָּה תְּכַלֶנָּה מִלְמַעְלָה
  english_pob_choice: and finish it to within a cubit from above
  chosen_spanish: y la terminarás a un codo desde arriba
  alternatives_spanish:
  - y la terminarás hasta un codo desde arriba
  - y la terminarás a un codo en la parte superior
  - y la terminarás a un codo del borde superior
  lexicon: HALOT
  rationale: La sintaxis hebrea es difícil y conserva una tensión interpretativa sobre la forma superior de la estructura. «A un codo desde arriba» refleja de manera sobria el hebreo sin forzar una explicación arquitectónica más precisa que la evidencia no exige.
- source_word: פֶּתַח
  english_pob_choice: door
  chosen_spanish: puerta
  alternatives_spanish:
  - abertura
  - entrada
  lexicon: HALOT
  rationale: En contexto de construcción del arca, una entrada funcional es mejor expresada en español como «puerta». Mantiene la idea de acceso sin oscurecer el carácter práctico del detalle.
- source_word: בְּצִדָּהּ
  english_pob_choice: in its side
  chosen_spanish: en su costado
  alternatives_spanish:
  - a un lado de ella
  - en su lado
  lexicon: HALOT
  rationale: «En su costado» reproduce con naturalidad la localización lateral de la puerta y suena idiomático en español bíblico contemporáneo.
- source_word: תַּחְתִּיִּם שְׁנִיִּם וּשְׁלִשִׁים
  english_pob_choice: lower, second, and third levels
  chosen_spanish: niveles inferiores, segundos y terceros
  alternatives_spanish:
  - pisos inferiores, segundos y terceros
  - niveles bajos, medios y altos
  - cubiertas inferiores, segundas y terceras
  lexicon: HALOT
  rationale: El hebreo describe tres estratos/órdenes del arca. «Niveles» conserva neutralidad y evita introducir «cubiertas» o «pisos», que estrecharían el sentido. Los adjetivos ordinales respetan la secuencia del original.
- source_word: תַּעֲשֶׂהָ
  english_pob_choice: you shall make it
  chosen_spanish: la harás
  alternatives_spanish:
  - la construirás
  - la fabricarás
  lexicon: HALOT
  rationale: El sufijo femenino se refiere al arca. «La harás» es directo, fiel al verbo hebreo y consistente con la instrucción constructiva del verso.
translation_notes:
  revision_awareness: 'El audit trail inglés pasó por varias revisiones en el sintagma medio: primero se intentó una formulación más interpretativa («roof», «to within a cubit from above»), y luego se ajustó a una redacción más cercana al hebreo y más neutral («levels» en lugar de «decks»). La versión española sigue esa línea: conserva la ambigüedad del término inicial, evita sobreinterpretar la cláusula del codo y usa «niveles» para la triple disposición del arca.'
  spanish_consistency_notes:
  - Se mantiene «arca» para תֵּבָה, conforme al uso bíblico y al audit trail inglés.
  - No se introduce «Señor» ni vocabulario cultual ajeno al versículo.
  - «A un codo desde arriba» busca ser comprensible sin resolver de forma dogmática la forma exacta de la parte superior.
