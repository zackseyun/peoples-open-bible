translation:
  language: es
  text: Entonces Jeremías tomó otro rollo y se lo entregó a Baruc hijo de Nerías, el escriba; y él escribió en ese rollo, al dictado de Jeremías[a], todas las palabras del rollo que Joacim, rey de Judá, había quemado en el fuego; y además se les añadieron muchas palabras semejantes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «de la boca de Jeremías».
    reason: lexical_alternative
lexical_decisions:
- source_word: מְגִלָּה אַחֶרֶת
  english_pob_choice: another scroll
  chosen_spanish: un rollo nuevo
  alternatives_spanish:
  - otro rollo
  - un nuevo rollo
  lexicon: HALOT
  rationale: מְגִלָּה denota un escrito enrollado; en español, «rollo» conserva la imagen concreta del objeto. אַחֶרֶת pide una segunda pieza distinta; «nuevo» aquí expresa bien la idea de otro ejemplar, en un registro natural y bíblicamente claro.
- source_word: וַיִּתְּנָהּ אֶל בָּרוּךְ
  english_pob_choice: gave it to Baruch
  chosen_spanish: se lo entregó a Baruc
  alternatives_spanish:
  - se lo dio a Baruc
  - lo puso en manos de Baruc
  lexicon: HALOT
  rationale: נתן con אֶל significa sencillamente dar/entregar. «Se lo entregó» suena natural en español y preserva la transferencia concreta del rollo.
- source_word: הַסֹּפֵר
  english_pob_choice: the scribe
  chosen_spanish: el escriba
  alternatives_spanish:
  - el secretario
  lexicon: HALOT
  rationale: «Escriba» mantiene el oficio histórico y literario del término hebreo sin modernizarlo hacia una función burocrática más estrecha.
- source_word: וַיִּכְתֹּב עָלֶיהָ
  english_pob_choice: and he wrote on it
  chosen_spanish: y él escribió en él
  alternatives_spanish:
  - y escribió sobre él
  - y escribió allí
  lexicon: HALOT
  rationale: El antecedente inmediato es el rollo; en español, con soporte escrito, «escribió en él» comunica de forma natural la acción sobre el material.
- source_word: מִפִּי יִרְמְיָהוּ
  english_pob_choice: from the mouth of Jeremiah
  chosen_spanish: al dictado de Jeremías
  alternatives_spanish:
  - de la boca de Jeremías
  - según lo dicho por Jeremías
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente «de la boca de Jeremías», pero en español la función idiomática es la de dictado oral. La nota conserva la alternativa literal para no perder el color semítico.
- source_word: אֵת כָּל דִּבְרֵי הַסֵּפֶר
  english_pob_choice: all the words of the scroll
  chosen_spanish: todas las palabras del rollo
  alternatives_spanish:
  - todas las palabras del libro
  lexicon: HALOT
  rationale: Aunque סֵפֶר puede significar «libro», aquí el contexto inmediato es un documento físico que fue quemado y reescrito; por eso «rollo» es más fiel y coherente con מְגִלָּה.
- source_word: אֲשֶׁר שָׂרַף ... בָּאֵשׁ
  english_pob_choice: that ... had burned in the fire
  chosen_spanish: que Joacim, rey de Judá, había quemado en el fuego
  alternatives_spanish:
  - que Joacim, rey de Judá, quemó en el fuego
  - que Joacim, rey de Judá, había quemado
  lexicon: HALOT
  rationale: El hebreo presenta el acto de quemar con el complemento enfático «en el fuego». La forma compuesta en español refleja adecuadamente la anterioridad del hecho respecto de la copia nueva.
- source_word: וְעוֹד נוֹסַף עֲלֵיהֶם
  english_pob_choice: and many similar words were added to them besides
  chosen_spanish: y además se añadieron
  alternatives_spanish:
  - y fueron añadidas además
  - y se agregaron además
  lexicon: HALOT
  rationale: 'El nifal de יסף aquí es pasivo: algo fue añadido. «Se añadieron» expresa bien la pasiva refleja en español y conserva el valor de adición suplementaria de וְעוֹד.'
- source_word: דְּבָרִים רַבִּים כָּהֵמָּה
  english_pob_choice: many similar words
  chosen_spanish: muchas palabras semejantes a ellas
  alternatives_spanish:
  - muchas palabras similares
  - muchas palabras como aquellas
  lexicon: HALOT
  rationale: כָהֵמָּה significa «como ellas / semejantes a ellas». «Semejantes a ellas» mantiene la comparación sin volverla demasiado interpretativa; «muchas» conserva רַבִּים.
theological_decisions:
- issue: Cómo rendir el nombre divino ausente en este versículo pero relevante en la obra de Jeremías
  english_pob_reading: No direct divine-name rendering appears in this verse; the text is about the rewritten scroll.
  chosen_spanish_reading: No se introduce ninguna sustitución devocional; el versículo se mantiene estrictamente narrativo.
  alternative_spanish_readings:
  - No aplica una nota sobre Yahvé en el texto principal
  - Usar una forma reverencial añadida
  rationale: No hay יהוה en el versículo. Mantener el texto sin insertar equivalentes reverenciales evita añadir material no sustentado por el hebreo.
  doctrine_reference: Fidelidad textual y no adición al texto base
- issue: Relación entre «al dictado de Jeremías» y la expresión literal «de la boca de Jeremías»
  english_pob_reading: Literally, 'from the mouth of Jeremiah,' with the main text expressing dictation and a footnote preserving the literal form.
  chosen_spanish_reading: Se traduce con la equivalencia funcional «al dictado de Jeremías» y se conserva en nota la literalidad «de la boca de Jeremías».
  alternative_spanish_readings:
  - de la boca de Jeremías
  - según la boca de Jeremías
  rationale: La idiomaticidad española favorece «al dictado», pero la nota evita borrar la imagen hebrea de oralidad/autorización profética.
  doctrine_reference: Autoridad profética y transmisión oral-escrita
- issue: Valor de «muchas palabras semejantes a ellas» frente a una posible ampliación interpretativa
  english_pob_reading: many similar words were added to them besides.
  chosen_spanish_reading: muchas palabras semejantes a ellas fueron añadidas además.
  alternative_spanish_readings:
  - muchas palabras parecidas
  - muchas palabras como aquellas
  rationale: El cierre hebreo subraya que el nuevo rollo no es meramente una copia mecánica, sino una ampliación semejante. La traducción conserva esa tensión sin explicarla en exceso.
  doctrine_reference: Continuidad y expansión del testimonio profético
translation_notes:
  revision_awareness: El inglés POB mantuvo «another scroll», «gave it to Baruch», «the scribe», «from the mouth of Jeremiah» con nota, «all the words of the scroll», y revisó «many words like them» a «many similar words». La versión española sigue esas decisiones, conserva la nota sobre la frase idiomática de dictado y traduce כָהֵמָּה con una comparación natural pero no suavizada.
  spanish_consistency_notes:
  - Se usa «rollo» para מְגִלָּה y גם para סֵפֶר en este contexto concreto, para mantener coherencia con el objeto físico reescrito.
  - Se emplea «escriba» de manera constante para הַסֹּפֵר.
  - Se evita «Cristo», «SEÑOR» o vocabulario eclesiástico ajeno, porque el versículo no lo requiere.
  - Se conserva un tono bíblico moderno y sobrio, sin calco excesivo del hebreo.
