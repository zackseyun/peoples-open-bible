translation:
  language: es
  text: Yahvé alce su rostro hacia ti y te conceda paz[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: shalom también puede implicar bienestar, plenitud o integridad.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יִשָּׂא
  english_pob_choice: lift up
  chosen_spanish: alce
  alternatives_spanish:
  - levante
  - alce su rostro hacia ti de manera favorable
  lexicon: HALOT
  rationale: El hebreo נשׂא significa literalmente ‘levantar/elevar’. En la bendición, con ‘rostro’ como objeto, la imagen comunica atención favorable. ‘Alce’ preserva la metáfora con español natural y solemne.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: El Tetragrámaton debe conservarse como nombre propio divino. ‘Yahvé’ sigue el estándar del proyecto y evita la sustitución por un título.
- source_word: פָּנָיו
  english_pob_choice: his face
  chosen_spanish: su rostro
  alternatives_spanish:
  - su cara
  - su presencia
  - su semblante
  lexicon: HALOT
  rationale: פָּנִים es literalmente ‘rostro/cara’. ‘Rostro’ mantiene la concreción del hebreo y su fuerza antropomórfica sin sonar demasiado coloquial.
- source_word: אֵלֶיךָ
  english_pob_choice: toward you
  chosen_spanish: hacia ti
  alternatives_spanish:
  - sobre ti
  - para contigo
  - a ti
  lexicon: HALOT
  rationale: La preposición אל expresa dirección. ‘Hacia ti’ reproduce mejor el movimiento del gesto verbal que una formulación más interpretativa.
- source_word: וְיָשֵׂם
  english_pob_choice: and give
  chosen_spanish: y te conceda
  alternatives_spanish:
  - y te dé
  - y ponga para ti
  lexicon: HALOT
  rationale: שׂים significa ‘poner/colocar’, pero en esta fórmula bendicional el español natural requiere una expresión de donación. ‘Conceda’ comunica el acto benévolo sin perder el matiz de otorgamiento.
- source_word: שָׁלוֹם
  english_pob_choice: peace
  chosen_spanish: paz
  alternatives_spanish:
  - bienestar
  - plenitud
  - shalom
  lexicon: HALOT
  rationale: שָׁלוֹם abarca paz, bienestar y plenitud. ‘Paz’ es la equivalencia principal en una bendición litúrgica; el rango semántico amplio se preserva en la nota.
theological_decisions:
- issue: El gesto antropomórfico de ‘levantar el rostro’ de Dios
  english_pob_reading: Retain the face-language rather than replacing it with an abstract paraphrase such as 'show you favor.'
  chosen_spanish_reading: Conservar ‘alce su rostro hacia ti’ en vez de convertirlo en ‘te mire con favor’ o ‘te conceda su favor’.
  alternative_spanish_readings:
  - te mire con favor
  - te muestre su favor
  rationale: La bendición hebrea usa imagen corporal para expresar favor divino. Mantenerla preserva la textura literaria y la tensión teológica sin desfigurar el sentido.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: preserve original-language primacy; preserve theological tension rather than over-resolve'
- issue: El alcance semántico de שָׁלוֹם
  english_pob_reading: peace can also carry the sense of wholeness or well-being
  chosen_spanish_reading: Traducir como ‘paz’ y dejar constancia del valor ampliado de bienestar/plenitud.
  alternative_spanish_readings:
  - bienestar
  - plenitud
  - shalom
  rationale: En la fórmula de bendición, ‘paz’ es la forma española más reconocible y fiel; la amplitud semántica se anota para no reducir indebidamente el término.
  doctrine_reference: DOCTRINE.md contested terms — שָׁלוֹם shalom
- issue: El nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto contiene el nombre propio del pacto, no un título genérico. ‘Yahvé’ lo conserva y evita la sustitución devocional tradicional.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: Se mantuvo sin cambios respecto del último pase revisado; la redacción coincide con la decisión auditada de preservar el nombre divino, la imagen del rostro y el valor amplio de shalom.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ para el nombre divino, conforme al estándar del proyecto.
  - Se conserva la imaginería concreta del hebreo (‘rostro’) en vez de una paráfrasis abstracta.
  - Se prefiere ‘paz’ por naturalidad litúrgica en español, con nota sobre el rango semántico de shalom.
  - El tono es solemne y apto para lectura pública.
