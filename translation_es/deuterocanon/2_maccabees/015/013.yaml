translation:
  language: es
  text: Entonces, de esta manera apareció un hombre distinguido por las canas[a] y la gloria, y la eminencia que lo rodeaba[b] era de algún modo maravillosa y sumamente majestuosa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «un hombre sobresaliente en canas y gloria». El griego comprime la descripción en una frase participial.'
    reason: lexical_alternative
  - marker: b
    text: Lit. «la superioridad a su alrededor»; aquí se vierte como «la eminencia que lo rodeaba» para expresar la grandeza visible del pasaje.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἶθ᾽ οὕτως
  english_pob_choice: Then in this way
  chosen_spanish: Entonces, de esta manera
  alternatives_spanish:
  - Entonces así
  - Luego de este modo
  lexicon: LSJ
  rationale: Conserva tanto la secuencia temporal como el modo de la aparición; en español, 'de esta manera' comunica bien el matiz de forma sin sonar forzado.
- source_word: ἐπιφανῆναι
  english_pob_choice: there appeared
  chosen_spanish: apareció
  alternatives_spanish:
  - se manifestó
  - se hizo visible
  lexicon: LSJ
  rationale: En un contexto visionario, el aoristo infinitivo se vierte naturalmente como un evento de aparición; 'apareció' es idiomático y no añade identificación teológica que el griego no explicita aquí.
- source_word: ἄνδρα
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - un varón
  - una figura masculina
  lexicon: LSJ
  rationale: Correspondencia directa y natural del sustantivo griego en este contexto narrativo.
- source_word: πολιᾷ
  english_pob_choice: gray hair
  chosen_spanish: las canas
  alternatives_spanish:
  - el cabello canoso
  - las canas de vejez
  lexicon: LSJ
  rationale: El griego alude concretamente al cabello canoso como signo de edad y dignidad; 'las canas' conserva esa imagen de forma concisa y natural en español.
- source_word: δόξῃ
  english_pob_choice: glory
  chosen_spanish: la gloria
  alternatives_spanish:
  - el esplendor
  - el honor
  lexicon: LSJ
  rationale: '''Gloria'' mantiene el registro elevado y bíblico sin desplazar el sentido hacia un mero adorno estético.'
- source_word: διαφέροντα
  english_pob_choice: distinguished by
  chosen_spanish: distinguido por
  alternatives_spanish:
  - sobresaliente por
  - excelente en
  lexicon: LSJ
  rationale: Refleja la estructura participial y la idea de marcada superioridad o distinción respecto de lo que sigue.
- source_word: θαυμαστὴν
  english_pob_choice: marvelous
  chosen_spanish: maravillosa
  alternatives_spanish:
  - admirable
  - asombrosa
  lexicon: LSJ
  rationale: Mantiene el tono de admiración y maravilla sin caer en un arcaísmo innecesario.
- source_word: μεγαλοπρεπεστάτην
  english_pob_choice: most majestic
  chosen_spanish: sumamente majestuosa
  alternatives_spanish:
  - súper majestuosa
  - de majestad suma
  - muy magnífica
  lexicon: LSJ
  rationale: La forma superlativa se expresa con un adverbio intensificador y el adjetivo 'majestuosa', que suena natural y conserva la idea de grandeza excelsa.
- source_word: τὴν περὶ αὐτὸν ὑπεροχήν
  english_pob_choice: the eminence about him
  chosen_spanish: la eminencia que lo rodeaba
  alternatives_spanish:
  - la superioridad que lo rodeaba
  - la grandeza que lo rodeaba
  - la eminencia a su alrededor
  lexicon: LSJ
  rationale: '''ὑπεροχή'' apunta a superioridad/eminencia. En español, ''eminencia que lo rodeaba'' preserva el sentido de grandeza envolvente sin convertirlo en una simple abstracción.'
theological_decisions:
- issue: Identidad del personaje descrito
  english_pob_reading: Rendered the language phenomenologically as an appearance of a dignified man, without identifying him in the verse itself.
  chosen_spanish_reading: Se presenta fenomenológicamente como la aparición de un hombre de dignidad extraordinaria, sin identificarlo dentro del versículo.
  alternative_spanish_readings:
  - Interpretarlo explícitamente como una figura celestial o glorificada
  - Nombrarlo de manera inferencial a partir del contexto
  rationale: El griego describe la apariencia, la edad visible y la grandeza circundante, pero no nombra al personaje. La traducción conserva esa reserva y no introduce una identificación que el versículo no formula.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla anticipadamente.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente del audit trail inglés: se evitó una posesión innecesaria en la descripción de las canas, se buscó un equivalente más cercano para ὑπεροχή y se mantuvo un registro formal y fiel al texto sin sobreinterpretarlo.'
  spanish_consistency_notes:
  - Se usa 'gloria' para δόξῃ, en consonancia con el registro bíblico elevado del pasaje.
  - Se traduce ὑπεροχή con 'eminencia' para conservar la idea de superioridad envolvente sin cargar el verso con una explicación interpretativa.
  - La descripción permanece no identificada, respetando la restricción del original y del audit trail inglés.
  - El orden y la puntuación siguen un español publicable y solemne, sin calcos duros innecesarios.
