translation:
  language: es
  text: Las vasijas del alfarero son puestas a prueba por el horno[a], y así también el hombre por su razonamiento.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “por sus pensamientos” o “en su deliberación”; el paralelo griego dice “en su deliberación”.
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּלֵי יוֹצֵר
  english_pob_choice: A potter’s vessels
  chosen_spanish: Los vasos del alfarero
  alternatives_spanish:
  - Los recipientes del alfarero
  - Las vasijas del alfarero
  lexicon: HALOT
  rationale: כְּלֵי es el plural constructo de “vasos/recipientes”, y יוֹצֵר es “alfarero”. “Vasos” mantiene la imagen concreta de la alfarería y fluye de forma natural en español sin perder el contenido del hebreo ni del paralelo griego.
- source_word: לְבָעֵר כִּבְשָׁן / δοκιμάζει κάμινος
  english_pob_choice: are tested by the kiln
  chosen_spanish: son probados en el horno
  alternatives_spanish:
  - son examinados por el horno
  - el horno los prueba
  - son puestos a prueba en el horno
  lexicon: HALOT; LSJ
  rationale: El hebreo es comprimido y el griego paralelo dice explícitamente que el horno/kiln prueba. “Son probados en el horno” conserva la imagen de la cocción/fundición y expresa el sentido pasivo idiomáticamente en español.
- source_word: וְכָמֹהוּ
  english_pob_choice: and likewise
  chosen_spanish: y así también
  alternatives_spanish:
  - y del mismo modo
  - y igualmente
  - y como eso
  lexicon: HALOT
  rationale: La partícula introduce una comparación directa entre la primera y la segunda línea. “Y así también” es natural en español y conserva la función analógica del original.
- source_word: אִישׁ / ἀνθρώπου
  english_pob_choice: a man
  chosen_spanish: el hombre
  alternatives_spanish:
  - una persona
  - el ser humano
  lexicon: HALOT; LSJ
  rationale: El hebreo usa אִישׁ en singular masculino y el griego ἀνθρώπου puede funcionar de manera representativa. Se mantiene el masculino singular, como en el texto fuente, en vez de neutralizarlo.
- source_word: עַל חֶשְׁבּוֹנוֹ / ἐν διαλογισμῷ αὐτοῦ
  english_pob_choice: by his reasoning
  chosen_spanish: por su razonamiento
  alternatives_spanish:
  - por sus pensamientos
  - en su deliberación
  - por su reflexión
  lexicon: HALOT; LSJ
  rationale: חֶשְׁבּוֹן puede abarcar cálculo, pensamiento o razonamiento; el paralelo griego apunta a deliberación/pensamiento. “Razonamiento” comunica bien esa actividad mental en español y evita reducirlo a una mera “cuenta” numérica.
theological_decisions:
- issue: Prueba del carácter humano mediante el pensamiento/deliberación
  english_pob_reading: a man by his reasoning
  chosen_spanish_reading: el hombre por su razonamiento
  alternative_spanish_readings:
  - el hombre por sus pensamientos
  - el hombre en su deliberación
  rationale: El texto compara la prueba del metal/cerámica con la evaluación de la persona por su proceso interior de pensamiento. Se conserva esa tensión antropológica y sapiencial sin convertirla en una afirmación moral ajena al verso.
  doctrine_reference: DOCTRINE.md §Sapiential imagery; translation philosophy
translation_notes:
  revision_awareness: Se tomó en cuenta el estado de revisión más reciente (sin cambios necesarios) y el alto acuerdo entre hebreo y griego; por eso no se introdujeron correcciones textuales ni variantes adicionales.
  spanish_consistency_notes:
  - Se mantuvo el paralelismo breve y proverbial del hebreo/griego.
  - Se evitó “SEÑOR” u otra terminología teológica no pertinente al versículo.
  - “Horno” traduce de forma natural כִּבְשָׁן / κάμινος sin añadir matices doctrinales.
  - La nota de pie conserva la alternativa lexical documentada en el audit trail inglés.
