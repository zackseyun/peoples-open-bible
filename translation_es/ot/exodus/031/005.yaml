translation:
  language: es
  text: en el corte de piedra para engastarla[a], y en el tallado de madera, para hacer toda clase de trabajo[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en el trabajo de piedra para montarla» o «en el grabado de piedra para engastarla».
    reason: lexical_alternative
  - marker: b
    text: «Piedra» es un término general aquí; por el contexto, puede incluir piedras preciosas usadas en la obra del tabernáculo.
    reason: cultural_note
lexical_decisions:
- source_word: וּבַחֲרֹשֶׁת
  english_pob_choice: in the cutting / in the carving
  chosen_spanish: en el tallado
  alternatives_spanish:
  - en la artesanía
  - en el grabado
  - en el trabajo artístico
  lexicon: HALOT
  rationale: El sustantivo de חרשׁת denota trabajo hábil o labor de artesano. En español, «tallado» comunica de forma natural la labor concreta de trabajar un material, y permite repetir la construcción con piedra y madera sin sonar forzado. Aunque «artesanía» sería más general, aquí se pierde la concreción del oficio.
- source_word: אֶבֶן
  english_pob_choice: stone
  chosen_spanish: piedra
  alternatives_spanish:
  - piedras preciosas
  - gema
  lexicon: HALOT
  rationale: El término hebreo es el vocablo común para «piedra». El contexto del tabernáculo puede incluir piedras preciosas, pero el texto por sí mismo no lo especifica. Por eso se conserva el término general y se deja la posibilidad contextual abierta.
- source_word: לְמַלֹּאת
  english_pob_choice: for setting
  chosen_spanish: para engastarla
  alternatives_spanish:
  - para montarla
  - para incrustarla
  - para llenarla
  lexicon: HALOT
  rationale: En este contexto artesanal, el infinitivo expresa preparar la piedra para ser puesta en su lugar dentro de una montura o ajuste. «Engastarla» es una solución idiomática en español para piedras en trabajo de joyería o artesanía fina, y mantiene la idea de colocación técnica sin volverla demasiado literal.
- source_word: עֵץ
  english_pob_choice: wood
  chosen_spanish: madera
  alternatives_spanish:
  - madera trabajada
  - madera aserrada
  lexicon: HALOT
  rationale: El sustantivo designa el material común. «Madera» es la forma más natural y directa en español moderno para objetos elaborados, sin añadir precisiones no presentes en el hebreo.
- source_word: לַעֲשׂוֹת
  english_pob_choice: to do
  chosen_spanish: para hacer
  alternatives_spanish:
  - para hacer
  - para ejecutar
  - para producir
  lexicon: HALOT
  rationale: El verbo עשה es amplio. «Hacer» conserva esa amplitud mejor que alternativas más específicas como «producir» o «ejecutar», y funciona bien con la expresión totalizante siguiente.
- source_word: בְּכָל מְלָאכָה
  english_pob_choice: every kind of work
  chosen_spanish: toda clase de trabajo
  alternatives_spanish:
  - toda clase de obra
  - todo tipo de labor
  - toda clase de oficio
  lexicon: HALOT
  rationale: מְלָאכָה puede referirse a trabajo, labor u oficio hábil. «Toda clase de trabajo» conserva la amplitud del hebreo y encaja con el contexto de artesanía del tabernáculo sin sobreespecificar el tipo de labor.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el audit trail inglés POB: mantiene la doble referencia a la labor con piedra y madera, conserva la generalidad de אֶבֶן y מְלָאכָה, y reproduce la ambigüedad artesanal de לְמַלֹּאת con una solución española idiomática. Se evita una paráfrasis excesiva y se preserva la tensión léxica entre trabajo técnico general y labores específicas de tallado/engaste.'
  spanish_consistency_notes:
  - Se usa «piedra» y no «piedras preciosas» en el cuerpo del texto para no cerrar indebidamente el alcance del hebreo.
  - «Tallado» sirve para ambos materiales y evita forzar dos verbos distintos donde el hebreo repite la misma raíz nominal.
  - La nota[a] conserva alternativas importantes del inglés POB con formulación natural en español.
  - La nota[b] mantiene la observación contextual sobre el posible valor de «piedra» sin convertirla en interpretación obligatoria.
