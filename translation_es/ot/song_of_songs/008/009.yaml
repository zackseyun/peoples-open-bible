revisions:
- from: Si ella es muro[a], edificaremos sobre ella un torreón de plata; pero si ella es puerta[b], la cerraremos con una tabla de cedro.
  to: Si ella es muro[a], edificaremos sobre ella un torreón de plata; pero si ella es puerta[b], la cercaremos con una tabla de cedro.
  rationale: Se revisa únicamente el segundo verbo principal para alinear mejor el español con el hebreo נָצוּר y con la decisión auditada inglesa 'we will enclose'. 'La cercaremos con una tabla de cedro' conserva la imagen arquitectónica y protectora sin reducirla al acto ordinario de cerrar una puerta. Se mantienen las demás decisiones, que son fieles y legibles.
