translation:
  language: es
  text: Enseñar a un necio[a] es como pegar un tiesto, como despertar a uno de un sueño profundo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «El que enseña a un necio es como pegar un tiesto, como despertar a uno de un sueño profundo». El griego usa participios comparativos más que un «es como» explícito.'
    reason: lexical_alternative
lexical_decisions:
- source_word: συγκολλῶν
  english_pob_choice: gluing
  chosen_spanish: pegar
  alternatives_spanish:
  - engomar
  - unir
  - adherir
  lexicon: LSJ
  rationale: El participio expresa una acción concreta de unir con adhesivo; en español, "pegar" comunica mejor la imagen práctica y algo inútil del dicho que un verbo más abstracto como "unir".
- source_word: ὄστρακον
  english_pob_choice: a potsherd
  chosen_spanish: un tiesto
  alternatives_spanish:
  - un pedazo de cerámica
  - un fragmento de vasija
  - un casco de alfarería
  lexicon: LSJ
  rationale: El término griego designa un fragmento de barro cocido o cerámica rota. "Tiesto" es una opción breve y natural en español para una pieza rota de barro/cerámica; conserva la imagen proverbial de reparar algo quebradizo e inservible. Mantengo el singular, como en la revisión inglesa más cercana al griego.
- source_word: ὁ διδάσκων
  english_pob_choice: teaching
  chosen_spanish: Enseñar
  alternatives_spanish:
  - el que enseña
  - instruir
  - la enseñanza
  lexicon: LSJ
  rationale: El participio articular funciona de manera proverbial como una acción genérica. "Enseñar" mantiene el valor verbal y la concisión del dicho, sin forzar una construcción nominal pesada.
- source_word: μωρόν
  english_pob_choice: a fool
  chosen_spanish: un necio
  alternatives_spanish:
  - un tonto
  - un insensato
  - un estulto
  lexicon: LSJ
  rationale: En literatura sapiencial, μωρός apunta a necedad moral e intelectual. "Necio" es el equivalente español más fiel y de registro bíblico digno, más preciso que "tonto".
- source_word: ἐξεγείρων
  english_pob_choice: waking
  chosen_spanish: despertar
  alternatives_spanish:
  - espabilar
  - levantar
  - desvelar
  lexicon: LSJ
  rationale: El verbo significa despertar o sacar del sueño. "Despertar" es la correspondencia más directa y natural en español.
- source_word: καθεύδοντα
  english_pob_choice: one
  chosen_spanish: a uno
  alternatives_spanish:
  - a alguien
  - a un durmiente
  lexicon: LSJ
  rationale: El participio presenta a la persona que duerme como objeto del despertar. "A uno" conserva la genericidad proverbial y la economía del griego.
- source_word: ἐκ βαθέος ὕπνου
  english_pob_choice: from a deep sleep
  chosen_spanish: de un sueño profundo
  alternatives_spanish:
  - de un sueño muy profundo
  - de un profundo sueño
  - del sueño profundo
  lexicon: LSJ
  rationale: La frase expresa un sueño de gran profundidad; "sueño profundo" es una formulación natural y clara en español, equivalente al inglés auditado y fiel al sentido griego.
translation_notes:
  revision_awareness: 'El inglés auditado fue revisado para acercarse más al griego: se prefirió el singular ''a potsherd'' y se eliminó ''together'', que no está explícito. La versión española sigue esa misma tendencia de sobriedad y cercanía formal al original, manteniendo la comparación proverbial y el paralelismo de dos imágenes.'
  spanish_consistency_notes:
  - 'Se conserva el paralelismo doble del verso: una comparación con la inutilidad de pegar cerámica rota y otra con la dificultad de despertar a alguien en sueño profundo.'
  - Se evitó 'Cristo/Mesías' porque no hay léxico cristológico en el versículo.
  - '"Necio" se usa como término sapiencial estable, no como simple insulto coloquial.'
  - La nota mantiene la alternativa más formal, porque el griego presenta participios comparativos sin verbo explícito de comparación.
