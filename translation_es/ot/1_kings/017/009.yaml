  yaml_path: translation/ot/1_kings/017/009.yaml
  text: Get up[a], go to Zarephath, which belongs to Sidon, and stay there. Look[b], I have commanded a widow there to provide for you.
  footnotes:
  - marker: a
    text: Or 'which is in Sidon' or 'which is near Sidon.' The Hebrew more literally relates Zarephath to Sidon, likely indicating regional or political association.
    reason: lexical_alternative
  - marker: b
    text: Or 'I have appointed a widow there to sustain you.' The Hebrew says 'I have commanded,' which may describe God's sovereign direction even if the widow is not yet shown as consciously aware of it.
    reason: alternative_reading
