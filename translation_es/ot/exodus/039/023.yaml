translation:
  language: es
  text: La abertura del manto estaba en medio de él, como la abertura de una coraza[a], con un ribete alrededor de su abertura, para que no se rasgara.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La rara palabra hebrea תַּחְרָא puede referirse a una pieza de armadura, quizá una cota de malla, una coraza o un peto; por eso la comparación se mantiene abierta.
    reason: lexical_alternative
lexical_decisions:
- source_word: פִי
  english_pob_choice: opening
  chosen_spanish: abertura
  alternatives_spanish:
  - apertura
  - boca
  - hueco
  lexicon: HALOT
  rationale: En contexto de vestido, פִי no apunta a una 'boca' literal sino a la abertura del cuello o de la prenda. 'Abertura' es natural en español y conserva el sentido funcional del pasaje.
- source_word: הַמְּעִיל
  english_pob_choice: the robe
  chosen_spanish: el manto
  alternatives_spanish:
  - la túnica
  - la capa
  lexicon: HALOT
  rationale: מְעִיל designa una prenda exterior. 'Manto' comunica bien en español una vestidura exterior amplia sin perder el referente del texto sacerdotal.
- source_word: בְּתוֹכוֹ
  english_pob_choice: in the middle of it
  chosen_spanish: en medio de él
  alternatives_spanish:
  - en su interior
  - en medio de la prenda
  lexicon: HALOT
  rationale: La expresión señala que la abertura estaba centrada en la prenda. 'En medio de él' sigue de cerca la relación espacial del hebreo sin sonar demasiado literal.
- source_word: כְּפִי תַחְרָא
  english_pob_choice: like the opening of a coat of mail
  chosen_spanish: como la abertura de una coraza
  alternatives_spanish:
  - como la abertura de una armadura
  - como la abertura de un peto
  lexicon: HALOT
  rationale: תַחְרָא es un término raro y probablemente alude a una pieza de armadura. 'Coraza' mantiene la idea de protección reforzada y resulta comprensible en español; se preserva así la comparación sin precisar más de lo que el hebreo exige.
- source_word: שָׂפָה
  english_pob_choice: a binding
  chosen_spanish: un ribete
  alternatives_spanish:
  - un borde
  - un remate
  - un refuerzo
  lexicon: HALOT
  rationale: Aquí שָׂפָה funciona como el borde reforzado alrededor de la abertura. 'Ribete' expresa bien en español una terminación o refuerzo textil alrededor del cuello.
- source_word: לְפִיו סָבִיב
  english_pob_choice: around its opening
  chosen_spanish: alrededor de su abertura
  alternatives_spanish:
  - alrededor de su boca
  - en torno a su abertura
  lexicon: HALOT
  rationale: La frase especifica la disposición circular del ribete. 'Alrededor de su abertura' reproduce con claridad la relación espacial y evita una traducción demasiado literal de 'boca'.
- source_word: לֹא יִקָּרֵעַ
  english_pob_choice: so that it would not be torn
  chosen_spanish: para que no se rasgara
  alternatives_spanish:
  - para que no fuera rasgado
  - para que no se rompiera
  lexicon: HALOT
  rationale: 'El niphal expresa el resultado buscado: evitar que la prenda se desgarre. ''Se rasgara'' es idiomático en español y conserva la voz pasiva/reflexiva del hebreo.'
translation_notes:
  revision_awareness: 'Se siguió el sentido del hebreo y se armonizó con el audit trail inglés: la abertura central de la prenda, comparable a una pieza de armadura, con un borde reforzado para evitar que se desgarre. No hubo cambios de revisión relevantes en el contexto provisto.'
  spanish_consistency_notes:
  - Se prefirió 'abertura' y 'ribete' por su naturalidad en español y por mantener la función textil descrita.
  - '''Coraza'' se eligió como equivalente amplio de la imagen de armadura, sin cerrar indebidamente la identificación de תַחְרָא.'
  - Se evitó 'SEÑOR' u otra terminología teológica porque el verso no contiene un término divino.
