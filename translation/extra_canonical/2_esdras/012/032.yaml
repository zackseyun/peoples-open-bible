source:
  edition: Bensly 1895 (Texts and Studies III.2) + Bensly 1875 Missing Fragment, cleaned Latin
  text: hic est unctus, quem reservavit Altissimus in finem ad eos et impietates ipsorum. arguet illos de iniustitiis ipsorum et infulciet coram ipsis spretiones eorum.
  language: Latin
translation:
  text: This is the Anointed One[a], whom the Most High has reserved for the end against them and their impieties[b]. He will rebuke them for their injustices and will set their contempt before them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Latin 'unctus' is literally 'anointed.' In this vision the figure functions as the end-time deliverer who rebukes the eagle-kingdom and rescues the remnant, so the messianic force should be heard even where the main text keeps the literal title.
    reason: messianic_passage
    anchor_ref: '12:32'
  - marker: b
    text: Or '“And the lion that you saw rousing itself from the forest, roaring and speaking to the eagle and reproving it for its injustices and all its words, as you heard—'.
    reason: previous_rendering
