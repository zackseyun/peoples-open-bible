  revision_awareness: 'Coincide con la última revisión auditada: no se registran cambios pendientes en el contexto inglés; la versión española sigue de cerca la decisión de conservar la rareza de ὕδωρ παχύ y la elipsis de τὰ τῶν θυσιῶν.'
  spanish_consistency_notes:
