revisions:
- from: Y el esclavo puso su mano debajo del muslo de Abraham su señor y le juró acerca de este asunto[a].
  to: Y el siervo puso su mano debajo del muslo de Abraham su amo y le juró acerca de este asunto[a].
  rationale: Se ajusta עֶבֶד a 'siervo' para seguir la decisión contextual auditada de 'servant' y se cambia 'su señor' por 'su amo' para reflejar mejor אֲדוֹן en un marco humano-doméstico. Se conserva la literalidad de 'debajo del muslo' y la nota cultural ya bien enfocada.
