translation:
  language: es
  text: Y las atarás como señal sobre tu mano, y estarán como una cinta frontal[a] entre tus ojos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «filacterias», término tradicional para pequeños estuches usados en la práctica judía posterior; el hebreo es raro y designa más literalmente un adorno o banda para la frente.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּקְשַׁרְתָּם
  english_pob_choice: And you shall bind them
  chosen_spanish: Y las atarás
  alternatives_spanish:
  - Y las amarrarás
  - Y las sujetarás
  lexicon: HALOT
  rationale: El hebreo expresa la acción concreta de atar/ligar en una instrucción futura. «Atar» conserva mejor la fuerza verbal y suena natural en español; «amarrar» o «sujetar» son posibles, pero menos precisos o más coloquiales.
- source_word: לְאוֹת
  english_pob_choice: as a sign
  chosen_spanish: como señal
  alternatives_spanish:
  - como signo
  - como marca
  lexicon: HALOT
  rationale: «Señal» reproduce bien el valor simbólico de אוֹת y es la opción más clara y natural en español bíblico contemporáneo. «Signo» también es viable, pero «señal» comunica mejor el uso visible y representativo sin sobreinterpretar.
- source_word: עַל יָדֶךָ
  english_pob_choice: on your hand
  chosen_spanish: sobre tu mano
  alternatives_spanish:
  - en tu mano
  - sobre tu brazo
  lexicon: HALOT
  rationale: El hebreo dice literalmente «sobre tu mano». Se conserva esa imagen, aunque en español «sobre» puede sonar ligeramente más natural que «en» para un adorno o objeto colocado encima. «Brazo» sería interpretativo y no se adopta en el texto principal.
- source_word: וְהָיוּ
  english_pob_choice: and they shall be
  chosen_spanish: y serán
  alternatives_spanish:
  - y estarán
  - y sean
  lexicon: HALOT
  rationale: El imperfecto hebreo en secuencia instructiva se rinde de manera natural con futuro español. «Serán» mantiene la relación formal con la cláusula anterior y no fuerza una lectura meramente exhortativa o predictiva.
- source_word: לְטֹטָפֹת
  english_pob_choice: as frontlets
  chosen_spanish: como frontales
  alternatives_spanish:
  - como frontletes
  - como bandas para la frente
  - como filacterias
  lexicon: HALOT
  rationale: «Frontales» intenta reflejar el sentido tradicional de un adorno o pieza colocada en la frente sin importar todavía la práctica judía posterior. Se conserva así la tensión entre una designación concreta y el término raro del hebreo. «Filacterias» queda fuera del texto principal por ser más interpretativo y tradicional.
- source_word: בֵּין עֵינֶיךָ
  english_pob_choice: between your eyes
  chosen_spanish: entre tus ojos
  alternatives_spanish:
  - en medio de tus ojos
  - sobre tu frente
  lexicon: HALOT
  rationale: Se mantiene la expresión literal del hebreo. Esto preserva la imagen textual y deja abierta la cuestión de si el mandato apunta a una ubicación física exacta, a un símbolo o a ambos. «Sobre tu frente» sería interpretativo y se reserva para una nota.
theological_decisions:
- issue: Si la instrucción debe resolverse como práctica literal, símbolo de memoria constante o referencia a una práctica judía posterior
  english_pob_reading: Retain the concrete wording without resolving whether the command is literal, symbolic, or both
  chosen_spanish_reading: Mantener la redacción concreta sin decidir si el mandato es literal, simbólico o ambos
  alternative_spanish_readings:
  - Expresar el versículo como mera metáfora de recordación continua
  - Nombrar directamente la práctica posterior de las filacterias
  rationale: El hebreo usa imágenes corporales concretas. La traducción española conserva esa tensión en vez de resolverla. La nota permite la asociación tradicional sin imponerla al texto principal.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El texto sigue de cerca la lectura inglesa auditada y el hebreo masorético, sin cambios respecto del paso de revisión más reciente; se mantiene la tensión interpretativa sobre לְטֹטָפֹת y בֵּין עֵינֶיךָ.
  spanish_consistency_notes:
  - Se prefirió «Yahvé» solo cuando el hebreo subyacente lo exige; este versículo no lo contiene.
  - «Señal» se usa para אוֹת por claridad y consistencia con el valor simbólico del término.
  - Se mantuvo la literalidad de «entre tus ojos» para conservar la imagen hebrea y el posible doble alcance del mandato.
  - La nota al pie preserva la alternativa tradicional «filacterias» sin convertirla en lectura obligatoria del texto principal.
