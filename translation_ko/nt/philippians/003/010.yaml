id: PHP.3.10
reference: Philippians 3:10
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: τοῦ γνῶναι αὐτὸν καὶ τὴν δύναμιν τῆς ἀναστάσεως αὐτοῦ καὶ ⸀κοινωνίαν παθημάτων αὐτοῦ, ⸀συμμορφιζόμενος τῷ θανάτῳ αὐτοῦ,
base_translation:
  language: en
  yaml_path: translation/nt/philippians/003/010.yaml
  text: to know him[a], and the power of his resurrection, and the fellowship of his sufferings, being conformed to his death[b],
  footnotes:
  - marker: a
    text: Or "fellowship in his sufferings" or "participation in his sufferings."
    reason: lexical_alternative
  - marker: b
    text: Or "becoming conformed to his death."
    reason: lexical_alternative
translation:
  language: ko
  text: 곧 그분을 아는 것[a]과, 그분의 부활의 능력과, 그분의 고난에 동참함을 아는 것이며, 그분의 죽으심을 본받는 자가 되는 것입니다[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「그분의 고난에 참여함」 또는 「그분의 고난을 함께 나눔」. 헬라어 κοινωνία는 관념적 친교가 아니라 실제적 참여·동참을 함의한다.
    reason: lexical_alternative
  - marker: b
    text: 또는 「그분의 죽으심에 본받는 자로 변화되어 가는 것」. 현재 분사로서 진행되는 변화의 과정을 가리킨다.
    reason: lexical_alternative
lexical_decisions:
- source_word: γνῶναι
  english_pob_choice: to know
  chosen_korean: 아는 것
  alternatives_korean:
  - 알게 되는 것
  - 깨달아 아는 것
  lexicon: BDAG
  rationale: 아오리스트 부정사로 바울의 목표를 표현한다. 「아는 것」이 관계적·체험적 함의를 자연스럽게 보존한다.
- source_word: δύναμιν
  english_pob_choice: power
  chosen_korean: 능력
  alternatives_korean:
  - 권능
  - 위력
  lexicon: BDAG
  rationale: 부활에서 나타난 실효적 능력을 가리킨다. 「능력」이 표준이며 명료하다.
- source_word: ἀναστάσεως
  english_pob_choice: resurrection
  chosen_korean: 부활
  alternatives_korean:
  - 다시 살아남
  lexicon: BDAG
  rationale: 글로사리 정착어 「부활」. 신학적 사건을 가장 정확히 전달한다.
- source_word: κοινωνίαν
  english_pob_choice: the fellowship of
  chosen_korean: 동참함
  alternatives_korean:
  - 친교
  - 교제
  - 참여
  - 함께 나눔
  lexicon: BDAG
  rationale: 「친교」는 추상적이고 교회적 어감이 강하므로 본 문맥의 실제적 참여를 흐리게 한다. 「동참함」이 그리스도의 고난에 능동적으로 참여한다는 의미를 명확히 한다.
- source_word: παθημάτων
  english_pob_choice: sufferings
  chosen_korean: 고난
  alternatives_korean:
  - 환난
  - 수난
  lexicon: BDAG
  rationale: 「고난」이 πάθημα의 가장 직접적이고 인격적인 한국어 등가어이며, 메시아의 고난을 가리키는 바울의 어휘와 잘 맞는다.
- source_word: συμμορφιζόμενος
  english_pob_choice: being conformed
  chosen_korean: 본받는 자가 되는 것
  alternatives_korean:
  - 닮아 가는 자가 되는 것
  - 동일한 모습이 되는 것
  lexicon: BDAG
  rationale: 현재 분사로 진행적 본받음을 가리킨다. 「본받는 자가 되는 것」이 합쇼체 흐름과 현재형의 점진적 함의를 함께 살린다.
- source_word: τῷ θανάτῳ αὐτοῦ
  english_pob_choice: to his death
  chosen_korean: 그분의 죽으심
  alternatives_korean:
  - 그분의 죽음
  - 그분이 죽으심
  lexicon: BDAG
  rationale: 합쇼체와 신학적 무게를 함께 살리기 위해 존칭형 「죽으심」을 사용한다. 한국 성서 전통의 정착된 어법이다.
theological_decisions:
- issue: κοινωνία παθημάτων의 의미
  chosen_reading: 그리스도의 고난에 실제로 동참함
  alternative_readings:
  - 정서적 공감 차원의 친교
  - 추상적 동참
  rationale: 속격 구문과 넓은 바울 문맥은 메시아의 고난의 양식에 실제로 동참함을 가리킨다. 「동참함」이 그 능동적·참여적 함의를 흐리지 않고 보존한다.
  doctrine_reference: 'DOCTRINE.md § Translation philosophy #3 (preserve theological tension; render source as the scribe intended).'
