translation:
  language: es
  text: En el tiempo de Artajerjes, rey de los persas, Belemus y Mithradates y Tabelio y Rátimo y Beeltetmos y Samelio, el escriba, y los demás que estaban asociados con ellos, que vivían en Samaria y en los demás lugares, escribieron contra los habitantes de Judea y Jerusalén la carta que sigue[a].[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego literalmente: «la carta escrita abajo» o «la carta adjunta / a continuación».'
    reason: lexical_alternative
  - marker: b
    text: El griego es algo comprimido aquí; la traducción explicita el sentido aparente de una carta escrita con intención acusatoria o adversa.
    reason: alternative_reading
lexical_decisions:
- source_word: Ἐν δὲ τοῖς ἐπʼ Ἀρταξέρξου ... χρόνοις
  english_pob_choice: Now in the time of Artaxerxes ...
  chosen_spanish: Ahora, en los tiempos de Artajerjes
  alternatives_spanish:
  - Y en los días de Artajerjes
  - En el tiempo de Artajerjes
  lexicon: LSJ
  rationale: χρόνοις es literalmente 'tiempos'; 'en los tiempos de' mantiene el marco temporal sin forzar 'reinado'. 'Ahora' representa suavemente δέ como transición narrativa.
- source_word: τοῦ Περσῶν βασιλέως
  english_pob_choice: king of the Persians
  chosen_spanish: rey de los persas
  alternatives_spanish:
  - rey persa
  - rey de Persia
  lexicon: LSJ
  rationale: La construcción griega conserva la designación étnico-política 'de los persas'; 'rey de los persas' la refleja de manera directa y clara.
- source_word: κατέγραψεν
  english_pob_choice: wrote
  chosen_spanish: escribieron
  alternatives_spanish:
  - redactaron
  - asentaron por escrito
  - presentaron por escrito
  lexicon: LSJ
  rationale: En contexto, el verbo se entiende como escribir una carta dirigida contra alguien. El plural verbal español sigue la enumeración de los agentes mencionados en la cláusula.
- source_word: αὐτῶν κατὰ τῶν κατοικούντων ἐν τῇ Ἰουδαίᾳ καὶ Ἱερουσαλήμ
  english_pob_choice: against the inhabitants of Judea and Jerusalem
  chosen_spanish: contra los habitantes de Judea y Jerusalén
  alternatives_spanish:
  - contra los que habitaban en Judea y Jerusalén
  - en contra de los habitantes de Judea y Jerusalén
  lexicon: LSJ
  rationale: κατά con genitivo expresa oposición o acción adversa; 'contra' preserva esa fuerza. 'Habitantes' traduce de forma natural κατοικούντων sin perder el sentido de residencia.
- source_word: Βήλεμος καὶ Μιθραδάτης καὶ Ταβέλλιος καὶ Ῥάθυμος καὶ Βεέλτεθμος καὶ Σαμέλλιος
  english_pob_choice: Belemus and Mithradates and Tabelius and Rathymus and Beeltethmus and Samellius
  chosen_spanish: Belemus y Mithradates y Tabelio y Rátimo y Beeltetmos y Samelio
  alternatives_spanish:
  - Belemus y Mitrídates y Tabelio y Rátimo y Beeltetmos y Samelio
  lexicon: LSJ
  rationale: Los nombres propios se transliteran. Se ajustan grafías a una forma española legible, sin intentar traducirlos.
- source_word: ὁ γραμματεύς
  english_pob_choice: the scribe
  chosen_spanish: el escriba
  alternatives_spanish:
  - el secretario
  lexicon: LSJ
  rationale: γραμματεύς puede significar escriba o secretario; aquí 'escriba' sigue de cerca la forma griega y funciona bien en español bíblico contemporáneo.
- source_word: οἱ λοιποὶ οἱ τούτοις συντασσόμενοι
  english_pob_choice: the rest who were associated with them
  chosen_spanish: los demás que estaban asociados con ellos
  alternatives_spanish:
  - los demás que se unieron con ellos
  - los restantes alineados con ellos
  lexicon: LSJ
  rationale: συντασσόμενοι sugiere estar juntos/asociados; 'estaban asociados con ellos' conserva esa idea sin convertirla en una alianza militar más fuerte de lo que exige el texto.
- source_word: οἰκοῦντες δὲ ἐν Σαμαρείᾳ καὶ τοῖς ἄλλοις τόποις
  english_pob_choice: living in Samaria and the other places
  chosen_spanish: habitando en Samaria y en los demás lugares
  alternatives_spanish:
  - viviendo en Samaria y en los otros lugares
  - residiendo en Samaria y en otros lugares
  lexicon: LSJ
  rationale: οἰκοῦντες es 'habitar/vivir'; 'habitando' mantiene el participio y el flujo sintáctico del griego.
- source_word: τὴν ὑπογεγραμμένην ἐπιστολήν
  english_pob_choice: the following letter
  chosen_spanish: la carta que sigue
  alternatives_spanish:
  - la carta subyacente
  - la carta escrita abajo
  - la carta que está a continuación
  lexicon: LSJ
  rationale: ὑπογεγραμμένην significa 'escrita abajo/subyacente'; en español corriente, 'la carta que sigue' comunica la función discursiva con naturalidad. Se mantiene la referencia a una carta, no solo a un documento genérico.
theological_decisions:
- issue: El valor adversativo de κατέγραψεν / la acción contra los judeanos
  english_pob_reading: the translation brings out the apparent sense of a written accusation or complaint
  chosen_spanish_reading: escribieron la carta que sigue contra los habitantes de Judea y Jerusalén
  alternative_spanish_readings:
  - presentaron una acusación contra los habitantes de Judea y Jerusalén
  - redactaron una denuncia contra los habitantes de Judea y Jerusalén
  rationale: El griego es algo comprimido, pero el contexto exige una comunicación adversa. 'Escribieron ... contra' conserva el hecho de la carta y su orientación hostil sin añadir más contenido del que ofrece el texto.
  doctrine_reference: No doctrinal issue; discourse/genre decision.
- issue: El alcance de τὴν ὑπογεγραμμένην ἐπιστολήν
  english_pob_reading: the following letter
  chosen_spanish_reading: la carta que sigue
  alternative_spanish_readings:
  - la carta escrita abajo
  - la carta subrayada
  rationale: La expresión indica una carta adjunta o a continuación del texto. 'La carta que sigue' preserva el valor de 'subjoined' sin perder claridad en español.
  doctrine_reference: No doctrinal issue; textual/formatting decision.
translation_notes:
  revision_awareness: Se siguió el texto griego de Swete como ancla primaria, con la traducción inglesa POB como control de decisiones léxicas y de sentido. No hubo revisiones aplicadas en el expediente; se mantuvo la concordancia general con el juicio de alta concordancia y se ajustó solo la idiomaticidad del español.
  spanish_consistency_notes:
  - Se usa 'Artajerjes' para el nombre propio del rey, siguiendo la forma española estándar y sin alterar la identificación histórica.
  - Se mantuvo 'persas' en minúscula por tratarse del etnónimo común.
  - Se conservaron los nombres propios transliterados, con adaptación mínima a ortografía española legible.
  - '''Escriba'' se usa para γραμματεύς, en coherencia con el registro bíblico y el valor funcionario-escritural del término.'
  - '''Contra'' mantiene el matiz hostil de κατά con genitivo.'
