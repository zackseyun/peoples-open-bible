id: 1SA.28.1
reference: 1 Samuel 28:1
source:
  edition: WLC
  text: וַֽ/יְהִי֙ בַּ/יָּמִ֣ים הָ/הֵ֔ם וַ/יִּקְבְּצ֨וּ פְלִשְׁתִּ֤ים אֶת מַֽחֲנֵי/הֶם֙ לַ/צָּבָ֔א לְ/הִלָּחֵ֖ם בְּ/יִשְׂרָאֵ֑ל וַ/יֹּ֤אמֶר אָכִישׁ֙ אֶל דָּוִ֔ד יָדֹ֣עַ תֵּדַ֗ע כִּ֤י אִתִּ/י֙ תֵּצֵ֣א בַֽ/מַּחֲנֶ֔ה אַתָּ֖ה וַ/אֲנָשֶֽׁי/ךָ־־׃
translation:
  text: Now in those days the Philistines gathered their camps for war[a], to fight against Israel. And Achish said to David, “You surely know that you and your men must go out with me in the camp.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “with me in the camp.” The Hebrew word can mean either the encampment itself or, by extension, the military force.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי בַּיָּמִים הָהֵם
  chosen: Now in those days
  alternatives:
  - And it happened in those days
  - In those days
  lexicon: HALOT
  rationale: The Hebrew narrative formula introduces a new scene. 'Now in those days' preserves the transitional force while using natural modern English; 'And it happened' would be more formally literal but less idiomatic.
- source_word: וַיִּקְבְּצוּ
  chosen: gathered
  alternatives:
  - assembled
  - mustered
  lexicon: HALOT
  rationale: The verb means to gather or assemble. 'Gathered' is the broad, direct sense; 'mustered' is possible in military context but slightly more interpretive.
- source_word: מַחֲנֵיהֶם
  chosen: their camps
  alternatives:
  - their forces
  - their armies
  lexicon: HALOT
  rationale: מַחֲנֶה commonly means 'camp' or 'encampment.' The plural with possessive naturally yields 'their camps.' Although the military sense could be generalized as 'forces,' 'camps' stays closer to the Hebrew while still fitting the context.
- source_word: לַצָּבָא
  chosen: for war
  alternatives:
  - for battle
  - as an army
  lexicon: HALOT
  rationale: The phrase marks military purpose. 'For war' is concise and idiomatic in English. 'As an army' is possible but less natural here, and 'for battle' narrows the broader military preparation.
- source_word: לְהִלָּחֵם בְּיִשְׂרָאֵל
  chosen: to fight against Israel
  alternatives:
  - to wage war against Israel
  - to fight Israel
  lexicon: HALOT
  rationale: The infinitive plus preposition expresses hostile action directed toward Israel. 'To fight against Israel' makes the adversative sense explicit in natural English.
- source_word: יָדֹעַ תֵּדַע
  chosen: You surely know
  alternatives:
  - Know for certain
  - You certainly know
  lexicon: HALOT
  rationale: The infinitive absolute with finite verb intensifies the statement. 'You surely know' captures the emphatic force in idiomatic English.
- source_word: אִתִּי תֵּצֵא
  chosen: must go out with me
  alternatives:
  - will go out with me
  - shall go out with me
  lexicon: HALOT
  rationale: Literally 'you will go out with me,' but in context Achish is not merely predicting; he is asserting expectation or obligation. 'Must go out with me' brings out the pragmatic force without excessive paraphrase.
- source_word: בַּמַּחֲנֶה
  chosen: in the army
  alternatives:
  - in the camp
  - with the camp
  lexicon: HALOT
  rationale: Although the noun literally means 'camp,' here it refers to the military host in action. 'In the army' communicates the sense more clearly in English. The more literal 'in the camp' is preserved as a lexical alternative.
- source_word: וַאֲנָשֶׁיךָ
  chosen: you and your men
  alternatives:
  - and your men
  lexicon: HALOT
  rationale: The explicit pronoun אַתָּה followed by 'your men' is naturally represented in English as 'you and your men,' preserving the emphasis on David personally as well as his followers.
- source_word: אָכִישׁ
  chosen: Achish
  rationale: Personal names are transliterated by standard convention per project philosophy.
