    rationale: El POB inglés no conserva nota para וַיִּקַּח; incluso explica que 'took' es suficiente y evita añadir color interpretativo. Introducir 'arrebató' en español sobrecarga el verbo y rompe la disciplina de notas.
  - severity: medium
