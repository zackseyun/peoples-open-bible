translation:
  language: es
  text: 'Samuel dijo[a]: «¿Cómo puedo ir? Si Saúl se entera, me matará». Y Yahvé dijo: «Toma una novilla[b] contigo y di: “He venido a sacrificar a Yahvé”».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «¿Cómo he de ir?».
    reason: alternative_reading
  - marker: b
    text: O, «una vaca joven».
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵיךְ
  english_pob_choice: How can
  chosen_spanish: ¿Cómo puedo
  alternatives_spanish:
  - ¿Cómo he de
  - ¿Cómo podría
  lexicon: HALOT
  rationale: La pregunta expresa dificultad práctica y posibilidad, no solo modo. «¿Cómo puedo ir?» transmite de forma natural la objeción de Samuel sin debilitar la fuerza del hebreo.
- source_word: אֵלֵךְ
  english_pob_choice: I go
  chosen_spanish: ir
  alternatives_spanish:
  - salir
  - iré
  lexicon: HALOT
  rationale: El imperfecto hebreo en esta pregunta funciona de manera modal en contexto. En español, el infinitivo después de «puedo» es la opción más natural y fiel.
- source_word: וְשָׁמַע שָׁאוּל
  english_pob_choice: If Saul hears
  chosen_spanish: Si Saúl se entera
  alternatives_spanish:
  - Si Saúl oye
  - Y cuando Saúl oiga
  lexicon: HALOT
  rationale: El waw + perfecto expresa aquí una condición implícita. «Se entera» comunica bien la idea de enterarse de la acción de Samuel; «oye» es posible, pero menos preciso en el contexto.
- source_word: וַהֲרָגָנִי
  english_pob_choice: he will kill me
  chosen_spanish: me matará
  alternatives_spanish:
  - me mataría
  - me dará muerte
  lexicon: HALOT
  rationale: El verbo significa matar con violencia. «Me matará» reproduce de modo directo la consecuencia temida; evita una perífrasis más pesada.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino como nombre propio en español, de acuerdo con la política del proyecto, no como sustitución por un título.
- source_word: עֶגְלַת בָּקָר
  english_pob_choice: a heifer
  chosen_spanish: una novilla de vacada
  alternatives_spanish:
  - una vaca joven
  - una ternera
  lexicon: HALOT
  rationale: El sintagma nombra una hembra joven del ganado vacuno apta para sacrificio. «Novilla» es preciso; «de vacada» refleja el genitivo hebreo de manera clara en español. La alternativa «ternera» podría sonar más ambigua o menos específica para el contexto sacrificial.
- source_word: תִּקַּח בְּיָדֶךָ
  english_pob_choice: Take ... with you
  chosen_spanish: Toma ... en tu mano
  alternatives_spanish:
  - Lleva ... contigo
  - Ten ... en tu mano
  lexicon: HALOT
  rationale: El hebreo dice literalmente «en tu mano». Como aquí la acción concreta importa, se conserva la imagen; «en tu mano» mantiene la forma fuente mejor que una paráfrasis más idiomática.
- source_word: לִזְבֹּחַ לַיהוָה
  english_pob_choice: to sacrifice to Yahweh
  chosen_spanish: a sacrificar a Yahvé
  alternatives_spanish:
  - para sacrificar a Yahvé
  - a ofrecer sacrificio a Yahvé
  lexicon: HALOT
  rationale: El infinitivo expresa finalidad. «Sacrificar» conserva el verbo cultual directo del hebreo; no se sustituye por «ofrecer sacrificio» porque ese giro añade explicación que el texto no requiere.
- source_word: בָּאתִי
  english_pob_choice: I have come
  chosen_spanish: He venido
  alternatives_spanish:
  - Vine
  - estoy aquí
  lexicon: HALOT
  rationale: El perfecto en discurso directo comunica un resultado presente. «He venido» es la manera natural de anunciar la llegada y la intención en español.
theological_decisions:
- issue: Renderizado del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: Se mantiene el nombre personal de Dios como nombre propio, coherente con el testimonio hebreo y con la decisión editorial del proyecto. «Yahvé» es la forma española más estable y readable para este registro; no se sustituye por «Señor».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor del sintagma sacrificial final
  english_pob_reading: to sacrifice to Yahweh
  chosen_spanish_reading: a sacrificar a Yahvé
  alternative_spanish_readings:
  - para sacrificar a Yahvé
  - a ofrecer sacrificio a Yahvé
  rationale: La finalidad del viaje es explícitamente sacrificial. En español, «a sacrificar a Yahvé» conserva la forma breve del hebreo y el sentido ritual sin añadir un sustantivo que el texto no usa.
  doctrine_reference: 'DOCTRINE.md: Translation principles — preserve source form where possible in cultic directives'
translation_notes:
  revision_awareness: 'El contexto en inglés fue revisado y no requirió cambios sustanciales: la lectura condicional de «Si Saúl se entera» y la conservación del nombre divino como Yahvé/Yahweh se mantienen estables. La única variación importante para el español fue decidir entre una forma más literal («en tu mano») y una más idiomática; se optó por conservar la imagen hebrea porque aquí es transparente y relevante para la instrucción.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente con el estándar del proyecto para יְהוָה.
  - Se evita «Señor» como sustituto del nombre divino.
  - «Novilla» mantiene el valor sacrificial del hebreo mejor que opciones más genéricas.
  - La construcción «He venido a sacrificar» reproduce con naturalidad el perfecto resultativo del hebreo directo.
