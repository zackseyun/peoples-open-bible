revisions:
- from: La benevolencia del rey es hacia un esclavo que actúa con sabiduría[a], pero su ira es contra el que trae vergüenza[b].
  to: El favor del rey es para un siervo que actúa con sabiduría[a], pero su ira es contra el que trae vergüenza[b].
  rationale: Se reemplazó «benevolencia» por «favor» para seguir la decisión léxica principal del POB y mejorar la naturalidad. Se cambió «esclavo» por «siervo» porque en este proverbio el contexto es de servicio cortesano competente, en línea con la justificación documentada del inglés; «siervo» mantiene dignidad bíblica sin introducir una noción innecesariamente jurídica de esclavitud. Se ajustó la nota b para reflejar con más precisión la relación implícita del hebreo.
