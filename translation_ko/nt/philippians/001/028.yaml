id: PHP.1.28
reference: Philippians 1:28
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: καὶ μὴ πτυρόμενοι ἐν μηδενὶ ὑπὸ τῶν ἀντικειμένων (ἥτις ⸂ἐστὶν αὐτοῖς⸃ ἔνδειξις ἀπωλείας, ⸀ὑμῶν δὲ σωτηρίας, καὶ τοῦτο ἀπὸ θεοῦ,
base_translation:
  language: en
  yaml_path: translation/nt/philippians/001/028.yaml
  text: and not being frightened in anything by those who oppose you. This is a sign to them of destruction, but of your salvation—and this from God.
translation:
  language: ko
  text: 그리고 어떤 일에서도 여러분을 대적하는 자들 때문에 위협을 받지[a] 않기를 바랍니다. 이것은 그들에게는 멸망의 표징[b]이지만, 여러분에게는 구원의 표징입니다 — 그리고 이것은 하나님으로부터 옵니다[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「놀라지」 또는 「위축되지」. 헬라어 πτύρω는 갑작스러운 두려움이나 위협 앞에서의 위축을 가리킨다.
    reason: lexical_alternative
  - marker: b
    text: 또는 「증거」 또는 「표시」. 헬라어 ἔνδειξις는 무엇을 가리키는 증거적 표시를 의미한다.
    reason: lexical_alternative
  - marker: c
    text: 「이것이 하나님으로부터」라는 구절은 구체적으로 「구원」을 가리킬 수도, 앞의 전체 표징을 가리킬 수도 있다.
    reason: alternative_reading
lexical_decisions:
- source_word: πτυρόμενοι
  english_pob_choice: being frightened
  chosen_korean: 위협을 받지
  alternatives_korean:
  - 놀라지
  - 위축되지
  - 두려워하지
  lexicon: BDAG
  rationale: πτύρω는 갑작스러운 두려움·위협 앞에서의 위축을 가리킨다. 「위협을 받다」가 외부 압력의 수동적 함의와 두려움을 함께 담는다.
- source_word: ἐν μηδενί
  english_pob_choice: in anything
  chosen_korean: 어떤 일에서도
  alternatives_korean:
  - 아무 일에도
  - 어떤 점에서도
  lexicon: BDAG
  rationale: 「아무것도 ~이 아닌」의 전체 부정을 「어떤 ~에서도」로 자연스럽게 옮긴다.
- source_word: ἀντικειμένων
  english_pob_choice: those who oppose you
  chosen_korean: 여러분을 대적하는 자들
  alternatives_korean:
  - 대적자들
  - 적대자들
  lexicon: BDAG
  rationale: 분사를 명사화하기보다 「여러분을 대적하는 자들」로 관계적 함의를 살리는 영어 POB의 결정을 따른다.
- source_word: ἔνδειξις
  english_pob_choice: sign
  chosen_korean: 표징
  alternatives_korean:
  - 증거
  - 표시
  lexicon: BDAG
  rationale: ἔνδειξις는 증거적 표시를 가리킨다. 「표징」이 신학적 가리킴의 함의를 자연스럽게 담는다.
- source_word: ἀπωλείας
  english_pob_choice: destruction
  chosen_korean: 멸망
  alternatives_korean:
  - 파멸
  - 멸함
  lexicon: BDAG
  rationale: 「멸망」이 신학적 무게와 어울리는 한국어 정착 어휘이다.
- source_word: σωτηρίας
  english_pob_choice: salvation
  chosen_korean: 구원
  alternatives_korean:
  - 구출
  - 구함
  lexicon: BDAG
  rationale: 본 문맥에서는 종말론적 「구원」의 무게가 분명하다. 19절의 「구원」과 일관성을 유지한다.
- source_word: τοῦτο ἀπὸ θεοῦ
  english_pob_choice: and this from God
  chosen_korean: 이것은 하나님으로부터 옵니다
  alternatives_korean:
  - 이것이 하나님으로부터다
  - 이것은 하나님께로부터 온 것입니다
  lexicon: BDAG
  rationale: 영어 POB의 「this from God」(동사 없음)을 한국어로 옮기되 자연스러운 종결을 위해 「~ 옵니다」를 더한다. 본문이 「구원」만 가리키는지 전체를 가리키는지 모호성은 각주로 보존한다.
theological_decisions:
- issue: τοῦτο의 지시 대상
  chosen_reading: 본문은 의도적으로 광범위하게 둠 - 「이것은 하나님으로부터 옵니다」
  alternative_readings:
  - 「이것」은 구체적으로 여러분의 구원을 가리킴
  - 「이것」은 두려워하지 않음과 적대자의 반응이 만들어내는 표징 전체를 가리킴
  rationale: 헬라어는 여러 지시 대상을 허용하며, 본문이 열어둔 모호성을 해소하기보다 그대로 보존하는 교리적 원칙에 따른다.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
