revisions:
- from: 'Ahora bien, no se hallaba[a] herrero en toda la tierra de Israel, porque los filisteos decían: «No sea que los hebreos se hagan espadas o lanzas».'
  to: 'No se hallaba herrero en toda la tierra de Israel[a], porque los filisteos dijeron: «No sea que los hebreos fabriquen espadas o lanzas».'
  rationale: Se ajusta el verbo de habla a «dijeron» para reflejar mejor אמר con sujeto plural pospuesto, y se cambia «se hagan» por «fabriquen» para expresar con naturalidad y precisión la producción de armas. También se simplifica el inicio quitando «Ahora bien», que no es necesario, y se rehace la nota para alinearla con la alternativa documentada por el POB sobre el singular genérico hebreo.
