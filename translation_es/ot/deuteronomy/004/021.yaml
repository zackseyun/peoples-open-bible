    text: 'O, «por causa de ustedes». El hebreo dice literalmente: «por causa de sus palabras».'
    reason: lexical_alternative
  - marker: b
    text: El hebreo usa segunda persona singular en esta cláusula («tu Dios te da»), aunque el discurso en el contexto inmediato también se dirige al pueblo en plural.
    reason: source_note
  revision_rationale: Se revisa el texto principal para reflejar explícitamente דִּבְרֵיכֶם («sus palabras / lo que ustedes dijeron»), que es un matiz léxico presente en la fuente y en el expediente de auditoría. Además, se evita la mezcla abrupta de «ustedes» con «su Dios te da» usando singular coherente en la cláusula final, mientras la nota [b] explica el cambio de persona del hebreo. El resultado sigue siendo natural en español, fiel a la fuente y alineado con la terminología del proyecto.
