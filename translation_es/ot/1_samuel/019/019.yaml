lexical_decisions:
- source_word: וַיֻּגַּד
  english_pob_choice: it was reported
  chosen_spanish: se le informó
  alternatives_spanish:
  - se le dijo
  - fue informado
  lexicon: HALOT
  rationale: 'El hebreo presenta un pasivo narrativo de נגד: la noticia llega a Saúl sin nombrar al agente. «Se le informó» conserva esa pasividad y suena natural en español.'
- source_word: לְשָׁאוּל
  english_pob_choice: to Saul
  chosen_spanish: a Saúl
  alternatives_spanish:
  - para Saúl
  lexicon: HALOT
  rationale: Marca el destinatario del informe; en español, la preposición natural con informar en esta construcción es «a».
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - que
  lexicon: HALOT
  rationale: Mantiene de forma transparente la estructura de discurso citativo del hebreo, como en el audit trail inglés.
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - He aquí
  - Observa
  lexicon: HALOT
  rationale: La partícula deíctica llama la atención sobre el dato comunicado; «Mira» conserva la inmediatez sin arcaísmo.
- source_word: דָוִד
  english_pob_choice: David
  chosen_spanish: David
  alternatives_spanish:
  - —
  lexicon: HALOT
  rationale: Nombre propio estándar, sin variación.
- source_word: בְּנוָיֹת
  english_pob_choice: at Naioth
  chosen_spanish: en Naiot
  alternatives_spanish:
  - en Naiot de
  lexicon: HALOT
  rationale: Nombre propio del lugar; el ב locativo admite «en» con mayor naturalidad que «at» en español. Se conserva la transliteración auditada «Naioth» adaptada a ortografía española como «Naiot».
- source_word: בָּרָמָה
  english_pob_choice: in Ramah
  chosen_spanish: en Ramá
  alternatives_spanish:
  - en la Ramá
  lexicon: HALOT
  rationale: Topónimo con locativo ברור; «en Ramá» es la forma breve y natural. Se mantiene el nombre propio con acento gráfico español.
translation_notes:
  revision_awareness: El texto base inglés fue revisado y quedó sin cambios; la versión española sigue de cerca el hebreo y el audit trail inglés, preservando la partícula deíctica y la estructura citativa.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparece el nombre divino; aquí no ocurre.
  - Se prefirió la forma locativa simple «en» para ambos topónimos, manteniendo la relación espacial del hebreo.
  - Se evitó «SEÑOR» y también se evitó una paráfrasis explicativa, porque el verso es un informe breve y directo.
