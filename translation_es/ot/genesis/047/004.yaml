revisions:
- from: 'Y dijeron a Faraón[a]: «Hemos venido para habitar como extranjeros en la tierra, porque no hay pasto para los rebaños[b] que pertenecen a tus siervos, pues el hambre es pesada en la tierra de Canaán. Y ahora, te rogamos, permite que tus siervos habiten en la tierra de Gosén».'
  to: 'Y dijeron a Faraón[a]: «Hemos venido para habitar como extranjeros en la tierra, porque no hay pasto para los rebaños[b] que pertenecen a tus siervos, pues la hambruna es grave en la tierra de Canaán. Y ahora, te rogamos, permite que tus siervos habiten en la tierra de Gosén».'
  rationale: Se cambió «el hambre es pesada» por «la hambruna es grave» para expresar el valor idiomático de כָבֵד הָרָעָב en español natural y fiel. También se afinó la nota [a] para reflejar de manera más idiomática la alternativa léxica documentada en el POB inglés. Se conservaron las demás decisiones, que están bien alineadas con el hebreo y con el tono cortesano del pasaje.
