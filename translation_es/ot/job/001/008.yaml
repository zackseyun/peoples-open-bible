translation:
  language: es
  text: 'Yahvé le dijo al Acusador[b]: «¿Has puesto tu corazón en[a] mi siervo Job? Porque no hay nadie como él en la tierra: un hombre íntegro y recto, que teme a Dios y se aparta del mal».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Has considerado a mi siervo Job?». El hebreo dice literalmente: «¿Has puesto tu corazón en mi siervo Job?»'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «el Acusador» (o «el Satán»). Aquí el término tiene el sentido de un título o función, más que funcionar claramente como nombre propio.'
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino propio del tetragrámaton en lugar de sustituirlo por un título. «Yahvé» es la forma estándar del proyecto en español y sigue la decisión auditada del POB inglés.
- source_word: הַשָּׂטָן
  english_pob_choice: the Accuser
  chosen_spanish: el Acusador
  alternatives_spanish:
  - Satanás
  - el Satanás
  - el adversario
  lexicon: HALOT
  rationale: El artículo hebreo sugiere aquí un título o función, no necesariamente un nombre propio. «Acusador» mantiene el matiz forense y la referencia a un rol en la corte celestial, como en el inglés auditado.
- source_word: הֲשַׂמְתָּ לִבְּךָ עַל
  english_pob_choice: Have you set your heart on
  chosen_spanish: ¿Has puesto tu corazón sobre
  alternatives_spanish:
  - ¿Has considerado
  - ¿Has puesto tu mente en
  lexicon: HALOT
  rationale: Se conserva la imagen hebrea de dirigir el corazón hacia alguien. «Considerado» sería una alternativa válida y más tradicional, pero perdería parte de la metáfora original.
- source_word: עַבְדִּי
  english_pob_choice: my servant
  chosen_spanish: mi siervo
  alternatives_spanish:
  - mi esclavo
  - mi servidor
  lexicon: HALOT
  rationale: Aunque el término puede abarcar esclavo/siervo, aquí expresa pertenencia y servicio a Dios. En español «siervo» es el equivalente más fiel y natural en este contexto.
- source_word: כִּי אֵין כָּמֹהוּ בָּאָרֶץ
  english_pob_choice: For there is none like him on the earth
  chosen_spanish: Porque no hay nadie como él en la tierra
  alternatives_spanish:
  - porque no hay ninguno como él en el mundo
  - porque no hay nadie semejante a él en la tierra
  lexicon: HALOT
  rationale: «En la tierra» reproduce con claridad el alcance universal de בָּאָרֶץ sin sonar rígido. «Nadie» mantiene el sentido inclusivo del hebreo en español idiomático.
- source_word: אִישׁ
  english_pob_choice: man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  lexicon: HALOT
  rationale: El hebreo es masculino singular y se refiere a Job como varón. «Hombre» es preciso y concuerda con el paralelismo con los otros calificativos.
- source_word: תָּם
  english_pob_choice: blameless
  chosen_spanish: íntegro
  alternatives_spanish:
  - irreprensible
  - perfecto
  - completo
  lexicon: HALOT
  rationale: El término expresa integridad moral y totalidad de carácter, no perfección sin pecado. «Íntegro» comunica bien esa fuerza ética en español contemporáneo; se mantiene «blameless» del inglés en el trasfondo auditado.
- source_word: יָשָׁר
  english_pob_choice: upright
  chosen_spanish: recto
  alternatives_spanish:
  - justo
  - derecho
  lexicon: HALOT
  rationale: «Recto» reproduce la idea de rectitud moral y armoniza naturalmente con «íntegro». «Justo» sería posible, pero puede solaparse con otro campo semántico en español.
- source_word: יְרֵא אֱלֹהִים
  english_pob_choice: one who fears God
  chosen_spanish: que teme a Dios
  alternatives_spanish:
  - temeroso de Dios
  - reverente ante Dios
  lexicon: HALOT
  rationale: Se conserva el idioma bíblico de temor reverente. En español, la construcción relativa fluye bien y no debilita la carga teológica del hebreo.
- source_word: וְסָר מֵרָע
  english_pob_choice: and turns away from evil
  chosen_spanish: y se aparta del mal
  alternatives_spanish:
  - y evita el mal
  - y huye del mal
  lexicon: HALOT
  rationale: «Se aparta del mal» refleja el movimiento habitual o continuo del participio hebreo. «Evita» o «huye» serían más interpretativos o más intensos de lo que el texto requiere.
theological_decisions:
- issue: 'Cómo representar הַשָּׂטָן: nombre propio o título funcional'
  english_pob_reading: Rendered as 'the Accuser'
  chosen_spanish_reading: el Acusador
  alternative_spanish_readings:
  - Satanás
  - el Satanás
  - el adversario
  rationale: La presencia del artículo en hebreo favorece una lectura de rol/título. «El Acusador» preserva la función judicial en el marco narrativo y evita importar prematuramente el uso posterior de Satanás como nombre propio.
  doctrine_reference: Prioridad del texto fuente y lectura contextual; no forzar desarrollos doctrinales posteriores sobre el hebreo de Job 1:8.
- issue: 'El alcance de תָּם: ¿perfección absoluta o integridad moral?'
  english_pob_reading: blameless
  chosen_spanish_reading: íntegro, no perfecto sin pecado
  alternative_spanish_readings:
  - perfecto
  - irreprochable
  rationale: El contexto sapiencial y el paralelismo con «recto» muestran un perfil moral de integridad, no una afirmación de impecabilidad absoluta. «Íntegro» evita exagerar la afirmación del texto.
  doctrine_reference: No atribuir al texto una doctrina de impecabilidad que el hebreo no expresa.
translation_notes:
  revision_awareness: 'El texto sigue la última pasada revisada del expediente inglés, que indica que no se necesitaron cambios adicionales. La redacción española conserva las decisiones auditadas principales: nombre divino como Yahvé, הַשָּׂטָן como título funcional, la metáfora de «poner el corazón», y la pareja moral «íntegro y recto» sin sobrerinterpretar perfección absoluta.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה, coherente con el proyecto.
  - Se usa «Acusador» con artículo para הַשָּׂטָן, siguiendo la lectura funcional del inglés auditado.
  - «Siervo» se reserva para עבד en este contexto, evitando «esclavo» por razón contextual documentada.
  - «Íntegro y recto» preserva el paralelismo moral de תָּם וְיָשָׁר sin volverlo tecnicismo dogmático.
  - La construcción «se aparta del mal» refleja el hebreo participial de manera natural en español bíblico contemporáneo.
