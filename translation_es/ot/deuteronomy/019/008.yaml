translation:
  language: es
  text: Y si Yahvé tu Dios ensancha tu territorio, como juró a tus padres[a], y te da toda la tierra que prometió dar a tus padres,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a tus antepasados» en ambas ocurrencias de «a tus padres». El hebreo dice literalmente «a tus padres», refiriéndose a los patriarcas de Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  english_pob_choice: And if
  chosen_spanish: Y si
  alternatives_spanish:
  - Si
  lexicon: HALOT
  rationale: La conjunción y la partícula condicional introducen una continuación jurídica del mandato anterior; «Y si» conserva mejor esa continuidad que un simple «Si».
- source_word: יַרְחִיב
  english_pob_choice: enlarges
  chosen_spanish: ensancha
  alternatives_spanish:
  - amplía
  - extiende
  lexicon: HALOT
  rationale: El hifil de רחב expresa hacer más ancho o más amplio. «Ensancha» es natural en español y conserva la imagen espacial del texto hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: El Tetragrámaton se traduce con el nombre divino en español del proyecto, «Yahvé», para preservar el nombre propio del pacto y no sustituirlo por un título.
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  lexicon: HALOT
  rationale: La construcción posesiva es directa y en español se expresa con naturalidad como «tu Dios».
- source_word: גְּבֻלְךָ
  english_pob_choice: your territory
  chosen_spanish: tu territorio
  alternatives_spanish:
  - tu frontera
  - tu límite
  lexicon: HALOT
  rationale: גְּבוּל puede significar borde, frontera o territorio. Aquí el sentido es el de un ámbito nacional ampliado, por lo que «territorio» comunica mejor la idea que solo una línea fronteriza.
- source_word: כַּאֲשֶׁר נִשְׁבַּע
  english_pob_choice: as he swore
  chosen_spanish: como juró
  alternatives_spanish:
  - tal como juró
  - como había jurado
  lexicon: HALOT
  rationale: En español, «jurar» expresa bien el acto solemne del verbo hebreo en contexto de pacto. «Como juró» mantiene la referencia al juramento hecho a los patriarcas.
- source_word: לַאֲבֹתֶיךָ
  english_pob_choice: to your fathers
  chosen_spanish: a tus padres
  alternatives_spanish:
  - a tus antepasados
  lexicon: HALOT
  rationale: El hebreo dice literalmente «a tus padres», pero en español «padres» puede sonar a progenitores inmediatos. «Padres» aquí se entiende como los patriarcas, y se conserva por fidelidad al texto; la alternativa «antepasados» aclara el sentido sin cambiarlo demasiado.
- source_word: וְנָתַן לְךָ
  english_pob_choice: and gives you
  chosen_spanish: y te da
  alternatives_spanish:
  - y te dará
  - y te ha dado
  lexicon: HALOT
  rationale: La secuencia verbal en hebreo continúa la condición legal con orientación futura; en español, el presente «te da» funciona de modo natural dentro de la prótasis condicional.
- source_word: כָּל הָאָרֶץ
  english_pob_choice: all the land
  chosen_spanish: toda la tierra
  alternatives_spanish:
  - toda la tierra del país
  - toda la tierra
  lexicon: HALOT
  rationale: אָרֶץ se refiere aquí a la tierra prometida, no al planeta. «Toda la tierra» conserva la amplitud total del don prometido.
- source_word: אֲשֶׁר דִּבֶּר לָתֵת
  english_pob_choice: that he promised to give
  chosen_spanish: que prometió dar
  alternatives_spanish:
  - que habló de dar
  - que dijo que daría
  lexicon: HALOT
  rationale: Aunque דִּבֶּר es literalmente «habló», en contexto de pacto la idea es una promesa vinculante. «Prometió dar» comunica esa fuerza sin perder el vínculo con el habla divina.
- source_word: לַאֲבֹתֶיךָ
  english_pob_choice: to your fathers
  chosen_spanish: a tus padres
  alternatives_spanish:
  - a tus antepasados
  lexicon: HALOT
  rationale: Se mantiene la misma decisión para la repetición final, preservando la continuidad del lenguaje del pacto.
theological_decisions:
- issue: Rendering of the divine name יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: El texto hebreo usa directamente el nombre divino del pacto. Conforme al estándar del proyecto en español, se conserva como «Yahvé» en vez de sustituirlo por una fórmula como «el SEÑOR» o por un título genérico.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Meaning of the covenant phrase לַאֲבֹתֶיךָ
  english_pob_reading: to your fathers
  chosen_spanish_reading: a tus padres
  alternative_spanish_readings:
  - a tus antepasados
  rationale: La lectura principal preserva el término masculino y la referencia patriarcal del pacto. En español, puede sentirse más natural «antepasados», pero el texto mantiene «padres» por fidelidad al hebreo y a la decisión doctrinal del POB sobre términos de parentesco.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: 'Coincide con el último pase de revisión: no hubo cambios aplicados y el control cruzado reportó alto acuerdo (1.0). La redacción española sigue de cerca el texto hebreo y la decisión inglesa auditada, preservando la repetición de לַאֲבֹתֶיךָ con una nota de alternativa léxica.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como nombre divino en español, conforme al estándar del proyecto.
  - Se conserva la repetición de «a tus padres» para reflejar las dos ocurrencias del hebreo.
  - «Toda la tierra» se usa de forma coherente con el valor territorial de אָרֶץ en este contexto.
  - La construcción condicional «Y si…» corresponde al tono legal-continuativo del versículo.
