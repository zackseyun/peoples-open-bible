theological_decisions:
- issue: Status of Hagar in relation to Abram
  chosen_reading: Render לְאִשָּׁה as 'as a wife for him' while retaining שִׁפְחָתָהּ as 'her female slave.'
  alternative_readings:
  - '''as his concubine'''
  - '''to be his wife'''
  rationale: The Hebrew text explicitly uses אִשָּׁה ('wife/woman'), not a distinct term for concubine, while also identifying Hagar as Sarai's slave. The translation preserves both social realities without harmonizing or reducing one into the other.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language primacy over translation tradition.
