    text: 'Hebrew: ''each man to his tent,'' an idiom for dispersing to one’s dwelling place or tribal home.'
    reason: cultural_note
  - marker: b
    text: Or 'And Israel fled, each man to his tent.' The Hebrew conjunction can be read more simply as 'and'; 'but' is used in the main text to clarify the contrast in context.
    reason: lexical_alternative
