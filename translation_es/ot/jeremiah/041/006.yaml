    rationale: Es un error visible que afecta la legibilidad y la calidad editorial; debe corregirse a «continuada» o equivalente.
  - severity: low
    issue: La coma tras «Ismael» es poco natural en esta aposición restrictiva.
    rationale: En español fluye mejor «Entonces Ismael hijo de Natanías...» o, si se mantiene la aposición, sin aislar innecesariamente el nombre propio.
  - severity: low
    issue: La nota literal puede afinarse para reflejar mejor el hebreo repetitivo «yendo, yendo y llorando».
    rationale: El inglés auditado preserva explícitamente la duplicación como alternativa literal; el español debe mantener esa precisión en la nota.
