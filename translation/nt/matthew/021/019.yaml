theological_decisions:
- issue: Force of Jesus' pronouncement to the fig tree
  chosen_reading: 'Render as an imprecatory/jussive statement: ''May there no longer ever be fruit from you.'''
  alternative_readings:
  - Render more idiomatically as 'May no fruit ever come from you again'
  - Render as a predictive declaration rather than a wish
  rationale: γένηται is aorist middle subjunctive in a prohibitive/imprecatory construction with Μηκέτι, expressing a pronouncement of cessation. The translation preserves the solemn force without over-interpreting the mechanism. This verse does not require importing symbolic interpretation into the main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
