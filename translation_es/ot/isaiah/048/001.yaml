  verdict: revise
  source_alignment_summary: 'El borrador español sigue en gran medida la estructura y el sentido del hebreo: llamado profético a la casa de Jacob, designación por el nombre de Israel, procedencia «de las aguas de Judá», juramento por el nombre divino y denuncia de falta de verdad y justicia. Sin embargo, se aparta del rastro auditado del POB en un punto importante: וּבֵאלֹהֵי יִשְׂרָאֵל יַזְכִּירוּ se documentó en inglés como «invoke the God of Israel», no meramente «mention». En este contexto de juramento/culto, «invocan» preserva mejor la fuerza performativa del hiphil.'
  spanish_quality_summary: 'El español es generalmente claro y digno. No obstante, la nota [a] es innecesaria y engañosa: el anclaje está en «esto», pero la nota habla de «casa de Jacob». Además, conviene mantener la única nota lexical realmente justificada en «aguas de Judá». El resto del verso fluye bien en español neutral eclesial.'
  glossary_alignment: Alineación parcial. Se respeta correctamente יהוה -> «Yahvé». «Casa de Jacob», «verdad» y «justicia» son aceptables. El problema principal es que el borrador no sigue la decisión léxica auditada para יַזְכִּירוּ; debe ser «invocan» en vez de «mencionan» para conservar el sentido contextual reconocido por el POB.
  issues:
  - severity: high
    issue: «mencionan al Dios de Israel» debilita יַזְכִּירוּ
    rationale: El expediente inglés documenta que, en contexto de juramento y culto, el hiphil de זכר aquí significa «invocar», no simplemente «mencionar». «Mencionan» pierde la fuerza religiosa performativa del original.
  - severity: medium
    issue: La nota [a] no corresponde al lugar ni al contenido adecuados
    rationale: 'El texto ancla [a] en «esto», pero la nota dice «Hebreo: “casa de Jacob”». No refleja una alternativa significativa preservada por el POB y genera confusión editorial.'
  - severity: low
    issue: Exceso de notas respecto del audit trail
    rationale: El POB inglés solo conserva una nota para «waters of Judah». En español no hay necesidad clara de añadir otra nota; conviene simplificar para mantener disciplina editorial.
