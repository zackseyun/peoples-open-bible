revisions:
- from: Traigan consejo[a]; hagan una decisión. Pongan su sombra como la noche en medio del mediodía; oculten a los expulsados; no revelen al fugitivo[b][c].
  to: Traigan consejo[a]; tomen una decisión. Haz[b] tu sombra como la noche en medio del mediodía[c]; esconde a los desterrados; no reveles al fugitivo[d].
  rationale: Se corrigió el calco antinatural «hagan una decisión» por «tomen una decisión», se reflejó mejor el cambio del hebreo a mandatos femeninos singulares en la segunda mitad, se afinó נִדָּחִים como «desterrados», y se rehízo el aparato de notas para alinearlo con la evidencia y con un español más claro.
