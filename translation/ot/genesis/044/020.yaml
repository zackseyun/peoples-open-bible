  from: he alone is left to his mother
  to: he alone is left of his mother
  rationale: The Hebrew `lə-ʾimmô` uses a lamed of relation, meaning he is the one who remains 'with respect to his mother.' The draft's 'to his mother' is a literal rendering that can be ambiguous in English, potentially implying he was left in her care. The intended meaning, as the footnote clarifies, is that he is her only surviving son. Using 'of his mother' better captures this partitive sense in idiomatic English, clarifying that he is the only one of her children remaining.
