translation:
  language: es
  text: Mañana bajen contra ellos. Miren[a], vienen subiendo por la subida de Ziz, y los encontrarán al final del wadi, frente al yermo de Jeruel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «barranco» o «arroyo estacional» para «wadi» (hebreo נחל), un término para un valle o un cauce de agua estacional.
    reason: lexical_alternative
lexical_decisions:
- source_word: מָחָר
  english_pob_choice: Tomorrow
  chosen_spanish: Mañana
  alternatives_spanish:
  - Al día siguiente
  - Mañana por la mañana
  lexicon: HALOT
  rationale: El adverbio temporal marca el momento de la acción; «Mañana» es la forma más directa y natural en español sin añadir especificaciones no presentes en el hebreo.
- source_word: רְדוּ עֲלֵיהֶם
  english_pob_choice: go down against them
  chosen_spanish: bajen contra ellos
  alternatives_spanish:
  - desciendan contra ellos
  - vayan contra ellos
  lexicon: HALOT
  rationale: El imperativo plural de ירד en contexto militar expresa movimiento descendente con hostilidad. «Bajen contra ellos» conserva ese valor direccional y bélico de manera natural en español.
- source_word: הִנָּם
  english_pob_choice: Look,
  chosen_spanish: Miren
  alternatives_spanish:
  - Miren,
  - Vean
  lexicon: HALOT
  rationale: La partícula deíctica llama la atención sobre la información siguiente. «Miren» reproduce esa función discursiva con un registro moderno y sobrio.
- source_word: עֹלִים
  english_pob_choice: they are coming up
  chosen_spanish: vienen subiendo
  alternatives_spanish:
  - están subiendo
  - van subiendo
  - están ascendiendo
  lexicon: HALOT
  rationale: El participio presenta el movimiento en curso desde la perspectiva del hablante. «Vienen subiendo» comunica bien esa inmediatez y evita un calco demasiado rígido.
- source_word: בְּמַעֲלֵה
  english_pob_choice: by the ascent of
  chosen_spanish: por la subida de
  alternatives_spanish:
  - por el ascenso de
  - por el paso de
  lexicon: HALOT
  rationale: מַעֲלֶה designa una subida o acceso ascendente. «Por la subida de» mantiene la imagen topográfica y suena natural en español; «paso» sería más interpretativo.
- source_word: הַצִּיץ
  english_pob_choice: Ziz
  chosen_spanish: Ziz
  alternatives_spanish:
  - —
  lexicon: HALOT
  rationale: Es un nombre propio de lugar; se translitera según la política del proyecto.
- source_word: וּמְצָאתֶם אֹתָם
  english_pob_choice: and you will find them
  chosen_spanish: y los encontrarán
  alternatives_spanish:
  - y los hallarán
  - y los localizarán
  lexicon: HALOT
  rationale: El futuro/resultativo sigue a la orden y en contexto de reconocimiento militar. «Encontrarán» es el equivalente más directo y claro en español.
- source_word: בְּסוֹף הַנַּחַל
  english_pob_choice: at the end of the wadi
  chosen_spanish: al final del wadi
  alternatives_spanish:
  - al extremo del wadi
  - al final de la cañada
  lexicon: HALOT
  rationale: נחל puede referirse a un cauce estacional, valle o barranco; el inglés POB conserva «wadi» para no aplanar la geografía. En español se mantiene «wadi» para preservar ese valor técnico/topográfico con una glosa implícita por contexto.
- source_word: פְּנֵי
  english_pob_choice: before
  chosen_spanish: frente a
  alternatives_spanish:
  - ante
  - delante de
  lexicon: HALOT
  rationale: En esta expresión espacial, פני indica localización relativa. «Frente a» transmite bien la relación topográfica sin sonar forzado.
- source_word: מִדְבַּר
  english_pob_choice: the wilderness of
  chosen_spanish: el desierto de
  alternatives_spanish:
  - el desierto/wilderness de
  - el yermo de
  lexicon: HALOT
  rationale: Aunque «wilderness» suele rendirse como «desierto» o «desierto agreste» en español, aquí la referencia geográfica admite «desierto» con claridad para lectores bíblicos. Se preserva el contraste espacial sin introducir una perífrasis más pesada.
- source_word: יְרוּאֵל
  english_pob_choice: Jeruel
  chosen_spanish: Jeruel
  alternatives_spanish:
  - —
  lexicon: HALOT
  rationale: Nombre propio transliterado según la política del proyecto.
