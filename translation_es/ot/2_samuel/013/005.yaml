base_translation:
  language: en
  yaml_path: translation/ot/2_samuel/013/005.yaml
  text: Jehonadab said to him[a], “Lie down on your bed and pretend to be sick. When your father comes to see you, say to him, ‘Please let Tamar my sister come and prepare food for me, and let her prepare the meal in my sight[c][b], so that I may see it and eat from her hand.’”
  footnotes:
  - marker: a
    text: Or 'feign illness.' The Hebrew verb here refers to making oneself appear sick.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'bread,' often used more broadly for food.
    reason: lexical_alternative
  - marker: c
    text: The Hebrew term likely refers to food specially prepared for a sick person or convalescent.
    reason: cultural_note
