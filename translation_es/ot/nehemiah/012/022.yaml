translation:
  language: es
  text: En los días de Eliaquib, Joiadá, Johanán[c] y Jadúa, los levitas fueron registrados como cabezas de casas paternas[a], y los sacerdotes también[b], durante el reinado de Darío el persa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «cabezas de casas paternas», una designación de clan o de hogar ancestral.'
    reason: cultural_note
  - marker: b
    text: Es decir, también los sacerdotes fueron registrados; el hebreo es elíptico.
    reason: lexical_alternative
  - marker: c
    text: Algunas tradiciones leen «Jonatán» aquí, pero el hebreo tiene «Johanán».
    reason: alternative_reading
lexical_decisions:
- source_word: הַ/לְוִיִּם
  english_pob_choice: the Levites
  chosen_spanish: los levitas
  alternatives_spanish:
  - los levíticos
  - los hombres levitas
  lexicon: HALOT
  rationale: Designa al grupo tribal/funcional conocido en español bíblico como «levitas»; mantiene la referencia colectiva natural y fiel al hebreo.
- source_word: בִּ/ימֵי
  english_pob_choice: In the days of
  chosen_spanish: En los días de
  alternatives_spanish:
  - Durante los días de
  - En tiempos de
  lexicon: HALOT
  rationale: Conserva el giro temporal hebreo de manera clara y sobria en español.
- source_word: אֶלְיָשִׁיב יוֹיָדָע וְ/יוֹחָנָן וְ/יַדּ֔וּעַ
  english_pob_choice: Eliashib, Joiada, Johanan, and Jaddua
  chosen_spanish: Eliaquib, Joiadá, Johanán y Jadúa
  alternatives_spanish:
  - Eliashib, Joiada, Johanan y Jaddua
  - Eliasib, Joiada, Juanan y Jadúa
  lexicon: HALOT
  rationale: Se transliteran los nombres propios con formas españolas reconocibles y coherentes. «Johanán» refleja mejor el hebreo que la lectura tradicional «Jonathan», que la POB inglesa documenta como variante textual.
- source_word: כְּתוּבִ֖ים
  english_pob_choice: were recorded
  chosen_spanish: fueron registrados
  alternatives_spanish:
  - fueron escritos
  - fueron inscritos
  lexicon: HALOT
  rationale: El participio pasivo de כתב en contexto administrativo-genealógico pide una traducción de registro documental; «registrados» preserva ese matiz.
- source_word: רָאשֵׁ֣י אָב֑וֹת
  english_pob_choice: heads of fathers’ houses
  chosen_spanish: cabezas de casas paternas[a]
  alternatives_spanish:
  - jefes de casas paternas
  - cabezas de clanes familiares
  lexicon: HALOT
  rationale: La expresión es técnica y genealógico-administrativa. Se mantiene la estructura literal y se marca con nota que alude a una unidad clánica o de hogar ancestral, como en la POB inglesa.
- source_word: וְ/הַ/כֹּ֣הֲנִ֔ים
  english_pob_choice: and the priests also
  chosen_spanish: y los sacerdotes también[b]
  alternatives_spanish:
  - y también los sacerdotes
  - y los sacerdotes asimismo
  lexicon: HALOT
  rationale: La construcción hebrea es elíptica; en español conviene explicitar que los sacerdotes igualmente fueron incluidos en el registro. «También» refleja bien la adición.
- source_word: עַל מַלְכ֖וּת
  english_pob_choice: during the reign of
  chosen_spanish: durante el reinado de
  alternatives_spanish:
  - en el reinado de
  - bajo el reinado de
  lexicon: HALOT
  rationale: Equivale con naturalidad al valor cronológico de la preposición más «reino/reinado».
- source_word: דָּרְיָ֥וֶשׁ הַ/פָּֽרְסִֽי
  english_pob_choice: Darius the Persian
  chosen_spanish: Darío el persa[c]
  alternatives_spanish:
  - Darío el persa
  - Darío de Persia
  lexicon: HALOT
  rationale: Se conserva la designación étnica apposicional con el adjetivo «el persa», como en la decisión inglesa. El nombre se normaliza a la forma española Darío.
theological_decisions:
- issue: Lectura nominal frente a variante textual en el nombre de Johanan/Jonathan
  english_pob_reading: The Hebrew text has 'Johanan'; some English traditions read 'Jonathan.'
  chosen_spanish_reading: Se traduce «Johanán», siguiendo el hebreo recibido.
  alternative_spanish_readings:
  - Jonatán
  - Jonathan
  rationale: 'La POB inglesa documenta la variante, pero adopta la lectura hebrea. En español se conserva la misma decisión: el texto principal sigue el hebreo, sin ocultar la tensión textual.'
  doctrine_reference: Texto crítico / variante textual, no doctrinal.
- issue: Expresión administrativa-genealógica de estatus
  english_pob_reading: heads of fathers’ houses
  chosen_spanish_reading: cabezas de casas paternas
  alternative_spanish_readings:
  - jefes de casas paternas
  - cabezas de clanes
  rationale: No se reemplaza por un término eclesiástico o moderno; se conserva el valor histórico-social del hebreo para no borrar la estructura genealógica.
  doctrine_reference: Antropología bíblica / organización tribal y familiar.
translation_notes:
  revision_awareness: La redacción sigue la última revisión inglesa, que prefirió «and the priests also» frente a una paráfrasis más libre. En español se refleja con «y los sacerdotes también», manteniendo un paralelismo formal y la misma claridad documental.
  spanish_consistency_notes:
  - Se usa «Dios»/«Yahvé» según corresponda en todo el proyecto; este versículo no contiene el nombre divino.
  - Se prefieren transliteraciones españolas estables para nombres propios bíblicos, manteniendo la lectura hebrea documentada.
  - «Registrados» se conserva por su valor administrativo, coherente con el contexto genealógico del verso.
  - No se introduce terminología litúrgica posterior; se mantiene el marco histórico de listas y registros.
