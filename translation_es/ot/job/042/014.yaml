review_pass:
  verdict: revise
  source_alignment_summary: 'El hebreo simplemente enumera los nombres que Job dio a sus tres hijas: ''nombró a la primera Yemimah, a la segunda Qetsiah y a la tercera Qeren-happukh''. La traducción española propuesta altera de forma significativa el tercer nombre al traducirlo como sentido léxico en el texto principal (''Cuerno de antimonio'') en lugar de preservarlo como nombre propio transliterado, contrario a la evidencia fuente y al rastro auditado en inglés, que explícitamente mantiene el nombre en transliteración y reserva el sentido para nota.'
  spanish_quality_summary: El borrador es en general legible, pero 'Llamó a la primera...' suena algo menos natural que 'Nombró a la primera...'. Además, la nota al pie está anclada en 'Jemimá' aunque corresponde al tercer nombre; eso crea confusión. La revisión mejora naturalidad, coherencia onomástica y ubicación de la nota.
  glossary_alignment: 'No hay términos teológicos mayores en juego. La principal cuestión de glosario/proyecto es la política de nombres propios: los nombres personales deben transliterarse, no traducirse semánticamente en el texto principal salvo razón documentada. ''Keren-happuch'' debe mantenerse como nombre propio en español, con nota que preserve ''cuerno de antimonio'' / ''cuerno de pintura para ojos''.'
  issues:
  - severity: high
    issue: El tercer nombre propio fue traducido semánticamente en el texto principal como 'Cuerno de antimonio'.
    rationale: La evidencia hebrea presenta un nombre propio compuesto, y el audit trail inglés decidió transliterarlo como 'Keren-happuch', dejando su sentido léxico en nota. Traducirlo en el cuerpo rompe la política del proyecto sobre nombres propios y cambia el registro del verso.
  - severity: high
    issue: La nota al pie está colocada sobre 'Jemimá[a]' en lugar del tercer nombre.
    rationale: La nota explica el significado de קֶרֶן הַפּוּךְ, no de יְמִימָה. El anclaje actual induce a error y no sigue la disciplina de marcadores.
  - severity: medium
    issue: '''Llamó a la primera...'' es menos idiomático que ''Nombró a la primera...'' en español moderno para dar nombres.'
    rationale: Aunque no es incorrecto, 'nombró' expresa mejor la acción de asignar nombres y refleja con mayor naturalidad la equivalencia óptima del inglés 'He named'.
  - severity: low
    issue: Las formas onomásticas españolas requieren mayor consistencia de transliteración.
    rationale: Si se adopta adaptación española, conviene mantener todos los nombres como nombres propios. 'Jemimá' y 'Quezia' son aceptables como adaptaciones, pero el tercer elemento también debe presentarse como nombre propio transliterado, no como sintagma común.
  revised_spanish_text: Nombró a la primera Jemimá, a la segunda Quezia y a la tercera Keren-hapuc[a].
