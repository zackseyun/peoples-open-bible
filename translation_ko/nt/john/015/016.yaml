id: JHN.15.16
reference: 'John 15:16'
language:
  code: ko
  name: Korean
  variant: '표준어 / modern formal-polite (합쇼체)'
source:
  edition: SBLGNT
  text: οὐχ ὑμεῖς με ἐξελέξασθε, ἀλλ’ ἐγὼ ἐξελεξάμην ὑμᾶς, καὶ ἔθηκα ὑμᾶς ἵνα ὑμεῖς ὑπάγητε καὶ καρπὸν φέρητε καὶ ὁ καρπὸς ὑμῶν μένῃ, ἵνα ὅ τι ἂν αἰτήσητε τὸν πατέρα ἐν τῷ ὀνόματί μου δῷ ὑμῖν.
base_translation:
  language: en
  yaml_path: translation/nt/john/015/016.yaml
  text: You did not choose me[a], but I chose you and appointed you so that you should go and bear fruit, and that your fruit should remain, so that whatever you ask the Father in my name[c][b], he may give you.
  footnotes:
  - marker: a
    text: Or 'selected you'; the verb can also be rendered 'elected,' but 'chose' best fits the immediate context without importing later theological terminology into the main text.
    reason: lexical_alternative
  - marker: b
    text: Or 'abide.' John frequently uses this verb for continuing relationally or enduring over time; here 'remain' is used for readable modern English.
    reason: lexical_alternative
  - marker: c
    text: The Greek reads 'the Father,' not 'my Father.'
    reason: lexical_alternative
translation:
  language: ko
  text: 여러분이 나를 택한 것이 아니라, 내가 여러분을 택하였습니다. 그리고 여러분을 세워, 가서 열매를 맺게 하고, 여러분의 열매가 거하게 하였습니다. 그리하여 여러분이 내 이름으로 아버지께 무엇이든 구하면 아버지께서 여러분에게 주시게 하려는 것입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「뽑았다」. 동사는 「선택하다·선출하다」로 옮길 수 있으나, 후대 신학 용어를 본문에 들이지 않기 위해 「택하다」를 채택한다.
    reason: lexical_alternative
  - marker: b
    text: 또는 「머무르다」. μένω의 일관 번역.
    reason: lexical_alternative
  - marker: c
    text: 헬라어는 「내 아버지」가 아니라 「아버지」로 읽는다.
    reason: textual_clarification
lexical_decisions:
- source_word: ἐξελέξασθε / ἐξελεξάμην
  english_pob_choice: chose
  chosen_korean: 택하다
  alternatives_korean:
  - 뽑다
  - 선택하다
  lexicon: BDAG
  rationale: 중간태 ἐκλέγομαι의 「자기 자신을 위해 택하다」 의미를 살리되, 후대 신학 술어(「선출/예정」)를 피한다.
- source_word: ἔθηκα
  english_pob_choice: appointed
  chosen_korean: 세우다
  alternatives_korean:
  - 임명하다
  lexicon: BDAG
  rationale: τίθημι의 「임명·세움」 의미를 「세우다」로 자연스럽게 옮긴다.
- source_word: μένῃ
  english_pob_choice: remain
  chosen_korean: 거하다
  alternatives_korean: []
  lexicon: BDAG
  rationale: μένω 일관 번역.
