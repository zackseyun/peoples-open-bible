  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Naciones» para גּוֹיִם es correcto. No aparecen términos sensibles del glosario principal. La nota léxica debe ajustarse al español revisado para evitar repetir una formulación poco idiomática.
