- from: 'Entonces David dijo a todos sus esclavos[a] que estaban con él en Jerusalén: «Levantaos y huyamos, porque no habrá para nosotros escape[b] delante de Absalón. Daos prisa en partir, no sea que él se apresure, nos alcance y haga caer sobre nosotros el mal, y hiera la ciudad con filo de espada[c]».'
  to: 'Entonces David dijo a todos sus siervos que estaban con él en Jerusalén: «Levántense y huyamos, porque no habrá escape para nosotros de Absalón. Dense prisa en partir[a], no sea que él se apresure, nos alcance, traiga sobre nosotros la desgracia[b] y hiera la ciudad con el filo de la espada[c]».'
  rationale: Se corrigió 'esclavos' a 'siervos' para seguir la decisión contextual documentada del POB inglés. Se ajustó el registro a español neutral latinoamericano ('Levántense', 'Dense prisa'). Se mejoró la naturalidad y exactitud de 'de Absalón' y 'no habrá escape para nosotros'. Se reemplazó 'el mal' por 'la desgracia' para reflejar que רָעָה aquí significa calamidad. También se alinearon y ordenaron las notas conforme a las alternativas preservadas en la auditoría inglesa.
