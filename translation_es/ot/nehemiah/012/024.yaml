    text: Or “facing them” or “corresponding to them.” The phrase likely describes opposing or matching Levitical groups in worship.
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew: “watch corresponding to watch,” probably referring to matched service divisions or alternating liturgical stations.'
    reason: cultural_note
