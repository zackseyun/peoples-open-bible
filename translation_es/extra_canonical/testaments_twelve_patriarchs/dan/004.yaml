base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/dan/004.yaml
  text: '1[4:1]. For anger is blindness. It does not allow one to see the face of any man with truth.


    2. For first it is stirred up by a word; then by deeds it strengthens the one who is becoming angry; and by bitter losses it provokes him. It throws his purpose into confusion, and so it rouses his soul in great fury.


    3[4:4]. Therefore, when anyone speaks against you, do not be moved to anger; and if anyone praises you as holy, do not be exalted. Be changed neither to delight nor to disgust.


    4. For first it pleases the hearing, and so it sharpens the mind to perceive the provocation; and when he has become wrathful, he thinks that he is justly angry.


    5. But if you fall into any loss or ruin, children, do not be distressed. For this very spirit makes one desire to be angry over what is perishing, so that he may fall into anger through affliction.


    6. And if you suffer loss willingly or unwillingly, do not be grieved; for from grief anger also arises with falsehood.


    7. And anger with falsehood is a two-faced evil, and they join with one another in order to trouble the heart; and when the soul is continually troubled, the Lord departs from it[4:7][4:6], and Beliar rules over it.'
  footnotes:
  - marker: '4:1'
    text: The opening sentence is partially truncated in the supplied Greek excerpt; the translation reflects the sense implied by the surviving clause 'For anger is blindness.'
    reason: textual_variant
  - marker: '4:4'
    text: The Greek around 'to perceive the provocation' is textually difficult; possible alternatives include 'to perceive what has been stirred up' or 'to perceive the irritation.'
    reason: alternative_reading
  - marker: '4:6'
    text: '''With falsehood'' may mean that anger arises accompanied by deceit, or that grief gives rise to anger that is then reinforced by lies.'
    reason: alternative_reading
  - marker: '4:7'
    text: Beliar is a traditional name for the evil power/adversary in Jewish literature; some English traditions normalize the name as 'Belial.'
    reason: cultural_note
