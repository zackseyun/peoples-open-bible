translation:
  language: es
  text: Su espada[a] entrará en su propio corazón[b], y sus arcos serán quebrados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «sus espadas». El hebreo usa un singular con posesivo plural, una expresión colectiva común.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «en sus propios corazones». El hebreo usa «corazón» en singular con posesivo plural, una expresión colectiva común.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חַרְבָּם
  english_pob_choice: their sword
  chosen_spanish: su espada
  alternatives_spanish:
  - sus espadas
  lexicon: HALOT
  rationale: El hebreo usa un sustantivo singular con sufijo plural de tercera persona; en español conviene conservar el singular colectivo con posesivo plural implícito. 'Su espada' mantiene la imagen de arma que vuelve contra sus dueños, sin forzar un plural innecesario.
- source_word: תָּב֣וֹא
  english_pob_choice: will enter
  chosen_spanish: entrará
  alternatives_spanish:
  - vendrá
  - llegará
  lexicon: HALOT
  rationale: El verbo es un imperfecto femenino singular de בוא, concordando con 'espada'. En este contexto la idea es de penetración o irrupción, por eso 'entrará' comunica mejor que los valores más generales 'vendrá' o 'llegará'.
- source_word: בְלִבָּם
  english_pob_choice: their own heart
  chosen_spanish: en su propio corazón
  alternatives_spanish:
  - en su corazón
  - en el corazón de ellos
  lexicon: HALOT
  rationale: 'La construcción hebrea es literalmente ''en su corazón'', con sentido colectivo/reflexivo. En español, ''su propio corazón'' deja explícito el matiz reflexivo que en el contexto se entiende: la violencia vuelve sobre quienes la ejercen.'
- source_word: וְקַשְּׁתוֹתָם
  english_pob_choice: and their bows
  chosen_spanish: y sus arcos
  alternatives_spanish:
  - y sus arcos de guerra
  lexicon: HALOT
  rationale: El plural hebreo con sufijo se rinde directamente por 'sus arcos'. No hay razón para ampliar más allá del sustantivo básico.
- source_word: תִּשָּׁבַרְנָה
  english_pob_choice: will be broken
  chosen_spanish: serán quebrados
  alternatives_spanish:
  - serán rotos
  - serán hechos pedazos
  lexicon: HALOT
  rationale: 'El nifal expresa pasividad: ''serán quebrados'' conserva el valor verbal y la imagen de ruptura. ''Quebrados'' es un poco más literario y bíblico en español, pero sigue siendo claro y fiel.'
translation_notes:
  revision_awareness: El pasaje coincide estrechamente con el texto hebreo masorético y con la solución inglesa ya aprobada; no se detectan revisiones aplicadas que obliguen a introducir variantes textuales adicionales.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto solo cuando el texto la requiera; aquí el versículo no contiene el nombre divino.
  - Se evita 'SEÑOR' y también se evita una paráfrasis explicativa excesiva.
  - La puntuación sigue el paralelismo poético del hebreo con coma antes de la segunda cola.
