    text: 'Hebreo: «de los campamentos de Yahvé»; algunos entienden esto de manera más interpretativa como «de los atrios de Yahvé».'
    reason: alternative_reading
  revision_rationale: Se ajusta la frase final a la decisión auditada en inglés para esta unidad ('del campamento'), manteniendo en nota la forma hebrea plural y la alternativa interpretativa documentada. También se normaliza levemente la puntuación de las notas en español.
