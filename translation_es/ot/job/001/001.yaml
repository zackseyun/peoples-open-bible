translation:
  language: es
  text: Había un hombre en la tierra de Uz, cuyo nombre era Job; aquel hombre era íntegro y recto, temía a Dios y se apartaba[a] del mal.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «huía del mal» o «rechazaba el mal». El verbo hebreo puede denotar apartarse de, alejarse de o evitar el mal.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִישׁ
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  lexicon: HALOT
  rationale: El hebreo singular masculino designa a un individuo masculino concreto. «Hombre» es natural en español narrativo y conserva la referencia personal precisa.
- source_word: הָיָה
  english_pob_choice: There was
  chosen_spanish: Había
  alternatives_spanish:
  - Existía
  - Vivía
  lexicon: HALOT
  rationale: La forma introductoria hebrea funciona como construcción existencial narrativa. «Había» reproduce esa apertura sin añadir matices no presentes en el texto.
- source_word: בְאֶרֶץ עוּץ
  english_pob_choice: in the land of Uz
  chosen_spanish: en la tierra de Uz
  alternatives_spanish:
  - en el país de Uz
  lexicon: HALOT
  rationale: אֶרֶץ en este giro geográfico se rinde bien como «tierra». «Uz» se translitera como nombre propio de lugar, siguiendo la práctica auditada.
- source_word: אִיּוֹב שְׁמוֹ
  english_pob_choice: whose name was Job
  chosen_spanish: llamado Job
  alternatives_spanish:
  - de nombre Job
  - cuyo nombre era Job
  lexicon: HALOT
  rationale: La cláusula hebrea identifica al personaje de forma directa. «Llamado Job» es idiomático en español y preserva la función identificadora sin forzar una construcción posesiva.
- source_word: תָּם
  english_pob_choice: blameless
  chosen_spanish: íntegro
  alternatives_spanish:
  - sin culpa
  - intachable
  - irreprochable
  lexicon: HALOT
  rationale: El término en contexto sapiencial apunta a integridad moral, no a perfección sin pecado. «Íntegro» comunica esa completitud ética con buena naturalidad en español, y mantiene la tensión teológica que el inglés POB conserva con «blameless».
- source_word: יָשָׁר
  english_pob_choice: upright
  chosen_spanish: recto
  alternatives_spanish:
  - justo
  - derecho
  lexicon: HALOT
  rationale: Describe rectitud ética. «Recto» empareja bien con «íntegro» y conserva el sentido moral sin convertirlo en un término jurídico más estrecho de lo que exige el hebreo.
- source_word: וִירֵא אֱלֹהִים
  english_pob_choice: fearing God
  chosen_spanish: temeroso de Dios
  alternatives_spanish:
  - que temía a Dios
  - reverente ante Dios
  lexicon: HALOT
  rationale: El participio expresa reverencia piadosa, no terror. «Temeroso de Dios» es una fórmula española estable y fiel al valor devocional del hebreo; «Dios» mantiene el referente singular exigido por el contexto monoteísta.
- source_word: וְסָר מֵרָע
  english_pob_choice: turning away from evil
  chosen_spanish: apartado del mal
  alternatives_spanish:
  - apartándose del mal
  - que se apartaba del mal
  - rechazando el mal
  lexicon: HALOT
  rationale: El hebreo comunica evitación/alejamiento activo del mal. «Apartado del mal» resume esa orientación de conducta en un español natural, manteniendo el sentido sin añadir un matiz más interpretativo que el texto no requiera.
theological_decisions:
- issue: Valor moral de la descripción de Job
  english_pob_reading: Job is described as morally exemplary and possessing integrity, not as absolutely sinless.
  chosen_spanish_reading: Job es presentado como un hombre de integridad y rectitud moral, no como alguien absolutamente sin pecado.
  alternative_spanish_readings:
  - Job era moralmente perfecto
  - Job no tenía pecado alguno
  rationale: Los adjetivos hebreos תָּם y יָשָׁר alaban la integridad y la rectitud; no obligan a afirmar impecabilidad absoluta. «Íntegro» y «recto» preservan la alabanza fuerte sin borrar la tensión teológica que el texto deja abierta.
  doctrine_reference: Preservar la tensión textual; no imponer una doctrina de impecabilidad que el hebreo no exige.
- issue: Sentido de אֱלֹהִים
  english_pob_reading: God
  chosen_spanish_reading: Dios
  alternative_spanish_readings:
  - dioses
  rationale: Aunque la forma hebrea es morfológicamente plural, el giro fijo «temeroso de Dios» y el contexto de Job exigen referente singular. Traducir «Dios» evita una lectura politeísta ajena al pasaje.
  doctrine_reference: Monoteísmo bíblico y uso idiomático de אֱלֹהִים con referente singular.
translation_notes:
  revision_awareness: Se revisó el texto auditado en inglés y no se detectaron cambios posteriores relevantes; se mantuvo la lectura de Job 1:1 con las mismas decisiones principales sobre existencia narrativa, nombre propio, valor moral de תָּם/יָשָׁר, y el referente singular de אֱלֹהִים.
  spanish_consistency_notes:
  - Se mantuvo «Uz» como nombre propio de lugar transliterado.
  - Se prefirió «Dios» para אֱלֹהִים por el contexto y la lectura auditada.
  - Se evitó «SEÑOR» porque aquí no aparece el nombre divino יהוה en el versículo.
  - Se conservaron términos de valoración moral que no sobretraducen a perfección sin pecado.
  - La nota [a] se ancla en la frase «llamado Job» para señalar una alternativa de formulación sin alterar el texto principal.
