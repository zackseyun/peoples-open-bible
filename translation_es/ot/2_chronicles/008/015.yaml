  - severity: medium
    issue: «Tesoros» no refleja tan bien el valor contextual de אֹצָרוֹת
    rationale: El audit trail inglés prefirió ‘treasuries’ por el contexto administrativo del templo. En español, «tesorerías» o «depósitos» comunica mejor lugares/áreas administrativas que «tesoros», que suele entenderse como objetos valiosos.
