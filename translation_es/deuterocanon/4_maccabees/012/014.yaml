lexical_decisions:
- source_word: ἀλλ᾽
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Mas
  - Sin embargo
  lexicon: BDAG
  rationale: Introduce el contraste de manera natural en español, conservando la fuerza adversativa breve del griego.
- source_word: οἱ μὲν
  english_pob_choice: those
  chosen_spanish: los que
  alternatives_spanish:
  - aquellos que
  - quienes
  lexicon: BDAG
  rationale: La construcción relativa española fluye mejor que un simple demostrativo y mantiene el valor referencial del grupo contrastado.
- source_word: εὐγενῶς
  english_pob_choice: nobly
  chosen_spanish: noblemente
  alternatives_spanish:
  - honrosamente
  - con nobleza
  - valerosamente
  lexicon: BDAG
  rationale: Adverbio que expresa una muerte digna y honorable; 'noblemente' conserva el juicio moral sin añadir matices no presentes en el texto.
- source_word: ἀποθανόντες
  english_pob_choice: who died
  chosen_spanish: murieron
  alternatives_spanish:
  - habiendo muerto
  - los que han muerto
  lexicon: BDAG
  rationale: En español, el pretérito simple comunica con naturalidad el participio aoristo en una cláusula relativa.
- source_word: ἐπλήρωσαν
  english_pob_choice: fulfilled
  chosen_spanish: cumplieron
  alternatives_spanish:
  - llevaron a plenitud
  - completaron
  - llenaron
  lexicon: BDAG
  rationale: '''Cumplieron'' comunica la idea de llevar a término o realizar plenamente la devoción mencionada, sin sonar forzado en español.'
- source_word: τὴν ... εὐσέβειαν
  english_pob_choice: their piety
  chosen_spanish: su piedad
  alternatives_spanish:
  - su devoción
  - su reverencia
  - su religiosidad
  lexicon: BDAG
  rationale: La revisión inglesa optó por 'piety' como alternativa más natural para εὐσέβεια; en español, 'piedad' preserva mejor el valor religioso y ético del término que 'devoción', que puede sonar más subjetivo, o 'religiosidad', que puede sugerir apariencia externa.
- source_word: εἰς τὸν θεὸν
  english_pob_choice: toward God
  chosen_spanish: hacia Dios
  alternatives_spanish:
  - para con Dios
  - a Dios
  lexicon: BDAG
  rationale: '''Hacia Dios'' reproduce con claridad la orientación del complemento griego εἰς sin convertirlo en posesión ni en mera fórmula devocional.'
theological_decisions:
- issue: εὐσέβεια en contexto de martirio
  english_pob_reading: piety toward God
  chosen_spanish_reading: piedad hacia Dios
  alternative_spanish_readings:
  - devoción hacia Dios
  - reverencia hacia Dios
  - piedad para con Dios
  rationale: El contexto ensalza la fidelidad que alcanza su plenitud en una muerte noble. 'Piedad' conserva el peso moral y religioso de εὐσέβεια sin diluirlo en una noción demasiado subjetiva de espiritualidad.
  doctrine_reference: DOCTRINE.md §Translation philosophy 6; §Consistency of key terms, or documented exception
translation_notes:
  revision_awareness: La base inglesa pasó por una revisión que sustituyó 'godliness' por 'piety' para εὐσέβεια; la versión española sigue esa línea y evita un término demasiado general como 'devoción'.
  spanish_consistency_notes:
  - Se mantiene 'Dios' para θεός conforme al criterio del proyecto.
  - No se usa 'Cristo' ni terminología cristológica en este versículo.
  - '''Piedad'' se conserva de forma coherente como equivalente principal de εὐσέβεια en este registro breve y martirial.'
