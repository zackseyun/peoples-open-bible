  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Dios» está bien. No aparecen términos sensibles como Yahvé, Mesías, esclavo, etc. La decisión de mantener la fuerza de θεομαχεῖν está alineada con la justificación inglesa, aunque en español conviene expresarla con una forma más natural.
