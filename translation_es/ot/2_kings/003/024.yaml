review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la secuencia básica del hebreo: llegada al campamento, reacción de Israel, golpe contra Moab, huida y avance posterior mientras siguen hiriendo a Moab. También preserva adecuadamente la nota sobre בָהּ como referencia probable al territorio. Sin embargo, hay dos puntos mejorables: (1) «de delante de ellos» suena calcado e innecesariamente torpe en español; «ante ellos» conserva el sentido idiomático de מִפְּנֵיהֶם con mejor legibilidad. (2) La repetición de «ellos» en «y ellos huyeron de delante de ellos» es pesada y algo confusa en español, aunque no falsa.'
  spanish_quality_summary: 'El texto es comprensible y generalmente fiel, pero puede sonar más natural y digno en español bíblico contemporáneo. «Campamento» y «se levantó» funcionan bien. «Golpeó» es posible, aunque algo físico/coloquial; en este contexto militar «hirió» o «derrotó» serían opciones, pero «golpeó» aún es defendible por cercanía léxica al POB inglés. La mejora principal es idiomática: simplificar «huyeron de delante de ellos» a «huyeron ante ellos».'
  glossary_alignment: No hay términos teológicos sensibles en este versículo. El borrador mantiene «Moab» y no introduce sustituciones indebidas. La decisión de explicitar «la tierra[a]» en vez de «ella» es aceptable porque sigue la revisión inglesa y conserva la alternativa en nota.
  issues:
  - severity: medium
    issue: 'Expresión poco natural: «huyeron de delante de ellos»'
    rationale: Aunque refleja literalmente מִפְּנֵיהֶם, en español neutral suena rígido y repetitivo. «Huyeron ante ellos» o «huyeron delante de ellos» comunican mejor la desbandada sin perder sentido.
  - severity: low
    issue: Repetición ambigua de «ellos» en la misma cláusula
    rationale: «y ellos huyeron de delante de ellos» es entendible por contexto, pero estilísticamente pesado. Eliminar el primer pronombre explícito mejora claridad sin alterar el referente.
  revised_spanish_text: Cuando llegaron al campamento de Israel, Israel se levantó y golpeó a Moab, y huyeron ante ellos. Entonces entraron en la tierra[a], golpeando a Moab.
  revised_footnotes:
  - marker: a
    text: 'O: «entraron en ella»; o «avanzaron en Moab». El hebreo dice «entraron en ella», y el sufijo femenino probablemente se refiere a la tierra o al territorio más que al pueblo directamente.'
    reason: lexical_alternative
  revision_rationale: 'Se hizo una reparación menor de estilo y claridad para que el español sea más natural sin apartarse del hebreo ni del audit trail inglés: «huyeron ante ellos» expresa bien מִפְּנֵיהֶם y evita la doble repetición de «ellos». Se conservó «entraron en la tierra[a]» con su nota, en línea con la revisión inglesa y la ambigüedad documentada de בָהּ.'
