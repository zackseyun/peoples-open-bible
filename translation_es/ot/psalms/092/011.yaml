translation:
  language: es
  text: Pero tú has exaltado mi cuerno como el de un buey salvaje[a]; he sido ungido[b] con aceite fresco.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo re'em designa un bovino salvaje poderoso; tradicionalmente se traduce «buey salvaje». Versiones más antiguas a veces dicen «unicornio».
    reason: cultural_note
  - marker: b
    text: 'O, más literalmente: «he sido mojado/mezclado con aceite fresco». El verbo hebreo aquí es inusual y su matiz exacto está debatido.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתָּרֶם
  english_pob_choice: you have exalted
  chosen_spanish: has exaltado
  alternatives_spanish:
  - has levantado
  - has puesto en alto
  lexicon: HALOT
  rationale: El hebreo expresa elevación/exaltación de un cuerno como símbolo de fuerza y honor. «Has exaltado» conserva el valor metafórico y su tono poético sin despojarlo de la imagen original.
- source_word: כִּרְאֵים
  english_pob_choice: like that of a wild ox
  chosen_spanish: como el de un reem
  alternatives_spanish:
  - como el de un buey salvaje
  - como el de un toro salvaje
  lexicon: HALOT
  rationale: El término hebreo רְאֵם designa un bovino salvaje poderoso; la POB en inglés explica la referencia cultural. En español, «reem» preserva el referente del original y evita una equivalencia demasiado interpretativa; la comparación queda clara por el contexto y la nota.
- source_word: קַרְנִי
  english_pob_choice: my horn
  chosen_spanish: mi cuerno
  alternatives_spanish:
  - mi fuerza
  - mi poder
  lexicon: HALOT
  rationale: Se mantiene el símbolo concreto de «cuerno», que en poesía hebrea representa fuerza, dignidad o poder. Traducirlo por «fuerza» o «poder» aplanaría la imagen que el texto conserva.
- source_word: בַּלֹּתִי
  english_pob_choice: I have been anointed
  chosen_spanish: he sido ungido
  alternatives_spanish:
  - he sido mojado
  - he sido empapado
  - he sido mezclado
  lexicon: HALOT
  rationale: La raíz es inusual y el contexto con aceite favorece una lectura idiomática. «He sido ungido» comunica el sentido más natural en español y mantiene la resonancia ceremonial, mientras la nota conserva las alternativas más literales y debatidas.
- source_word: בְּשֶׁמֶן
  english_pob_choice: with oil
  chosen_spanish: con aceite
  alternatives_spanish:
  - con óleo
  lexicon: HALOT
  rationale: שֶׁמֶן se expresa de forma directa como «aceite». «Óleo» es posible, pero «aceite» es más claro y natural en español contemporáneo sin perder dignidad.
- source_word: רַעֲנָן
  english_pob_choice: fresh
  chosen_spanish: fresco
  alternatives_spanish:
  - verde
  - lozano
  - abundante
  lexicon: HALOT
  rationale: Con aceite, el adjetivo comunica frescura y vitalidad. «Fresco» reproduce bien la imagen y evita sobreinterpretar el matiz a «verde» o «lozano», que en español resultarían menos naturales con aceite.
theological_decisions:
- issue: Metáfora del cuerno como símbolo de fuerza y exaltación
  english_pob_reading: Retain 'horn' as a metaphor for strength/exaltation
  chosen_spanish_reading: Conservar «cuerno» como metáfora de fuerza exaltada
  alternative_spanish_readings:
  - mi fuerza
  - mi poder
  rationale: La metáfora es parte del tejido poético y teológico del salmo. Mantenerla ayuda a que el lector perciba la imagen de honor, vigor y elevación sin sustituirla por una explicación interpretativa.
  doctrine_reference: Translation philosophy §1, §6
- issue: Valor de בַּלֹּתִי junto al aceite
  english_pob_reading: Render as 'I have been anointed'
  chosen_spanish_reading: «He sido ungido» como lectura idiomática principal
  alternative_spanish_readings:
  - he sido mojado con aceite fresco
  - he sido empapado con aceite fresco
  - he sido mezclado con aceite fresco
  rationale: El hebreo es raro y discutido, pero el contexto de celebración y aceite favorece una lectura de honra/consecración. La alternativa más literal queda implícita en la nota para no borrar la tensión lexical.
  doctrine_reference: Translation philosophy §3, §5
translation_notes:
  revision_awareness: El texto base y la revisión más reciente coinciden sustancialmente; no se requerían cambios, y la redacción española sigue de cerca la lectura auditada del hebreo con las dos notas de tensión lexical/cultural preservadas.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma por defecto cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se conserva la metáfora de «cuerno» en lugar de sustituirla por «fuerza» o «poder».
  - «Ungido» se usa como solución idiomática principal, mientras la nota preserva las opciones literales debatidas.
  - Se evita «Cristo» porque no corresponde al léxico de este verso.
  - «Aceite fresco» se traduce como «aceite fresco», no «óleo», por naturalidad y claridad en español.
