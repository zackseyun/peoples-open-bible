    text: O «y ¿no sales?».
    reason: previous_rendering
  revision_rationale: La revisión corrige la apertura para reflejar mejor la pregunta retórica hebrea con énfasis en «tú», mejora la naturalidad del español, mantiene la repetición vocativa «oh Dios», y restituye la nota auditada sobre la alternativa de la segunda cláusula. Se preserva el lamento teológico directo sin suavizarlo.
