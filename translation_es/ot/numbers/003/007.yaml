translation:
  language: es
  text: Ellos cumplirán su responsabilidad[a] y la responsabilidad de toda la congregación[b] delante de la tienda de reunión, para hacer el servicio del tabernáculo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «guardarán su responsabilidad» / «observarán su deber»; el verbo y el sustantivo hebreos pueden subrayar tanto la custodia responsable como la observancia fiel.
    reason: lexical_alternative
  - marker: b
    text: Es decir, los levitas cumplen responsabilidades vinculadas con Aarón y con toda la congregación en relación con el santuario.
    reason: cultural_note
lexical_decisions:
- source_word: וְשָׁמְרוּ
  english_pob_choice: they shall keep
  chosen_spanish: guardarán
  alternatives_spanish:
  - observarán
  - mantendrán
  - cumplirán
  lexicon: HALOT
  rationale: En contexto levítico, שׁמר combina la idea de custodiar con la de cumplir una responsabilidad. "Guardarán" conserva ese valor de custodia fiel sin reducirlo a vigilancia física ni sonar demasiado abstracto.
- source_word: מִשְׁמַרְתּוֹ
  english_pob_choice: his charge
  chosen_spanish: su encargo
  alternatives_spanish:
  - su cargo
  - su deber
  - lo que le fue encomendado
  lexicon: HALOT
  rationale: '"Encargo" comunica bien la idea de una responsabilidad asignada y evita un calco rígido. Mantiene la relación con el verbo "guardar" y sugiere deber confiado a alguien.'
- source_word: מִשְׁמֶרֶת כָּל־הָעֵדָה
  english_pob_choice: the charge of the whole congregation
  chosen_spanish: el encargo de toda la congregación
  alternatives_spanish:
  - el deber de toda la congregación
  - la responsabilidad de toda la congregación
  - la obligación de toda la congregación
  lexicon: HALOT
  rationale: Se conserva el paralelismo con "su encargo" y la noción de responsabilidad comunitaria. "Congregación" refleja היטב el sentido cultual de עֵדָה en Números.
- source_word: הָעֵדָה
  english_pob_choice: the congregation
  chosen_spanish: la congregación
  alternatives_spanish:
  - la comunidad
  - la asamblea
  lexicon: HALOT
  rationale: '"Congregación" es natural en español bíblico y encaja con el marco cultual del pasaje sin perder inteligibilidad.'
- source_word: לִפְנֵי אֹהֶל מוֹעֵד
  english_pob_choice: before the tent of meeting
  chosen_spanish: delante de la tienda de reunión
  alternatives_spanish:
  - en frente de la tienda de reunión
  - ante la tienda de reunión
  lexicon: HALOT
  rationale: '"Delante de" expresa con claridad la ubicación cultual del hebreo. "Tienda de reunión" traduce de forma directa אֹהֶל מוֹעֵד y es comprensible en español contemporáneo.'
- source_word: לַעֲבֹד
  english_pob_choice: to do
  chosen_spanish: para hacer
  alternatives_spanish:
  - para servir
  - para cumplir
  lexicon: HALOT
  rationale: El infinitivo aquí introduce finalidad. "Hacer" sigue de cerca el valor verbal directo que el auditor inglés conservó con "to do" y evita sobreinterpretar con "servir" si se quiere mantener la relación con el sustantivo siguiente.
- source_word: עֲבֹדַת הַמִּשְׁכָּן
  english_pob_choice: the service of the tabernacle
  chosen_spanish: el servicio del tabernáculo
  alternatives_spanish:
  - la labor del tabernáculo
  - el trabajo del tabernáculo
  lexicon: HALOT
  rationale: '"Servicio" reproduce el término técnico cultual y mantiene la correspondencia con עֲבֹדָה. "Tabernáculo" es el equivalente tradicional y preciso de מִשְׁכָּן.'
theological_decisions:
- issue: Referente del sufijo posesivo en מִשְׁמַרְתּוֹ
  english_pob_reading: The suffix refers to Aaron, whose charge the Levites are to keep.
  chosen_spanish_reading: El sufijo se entiende como referencia a Aarón, cuyo encargo los levitas deben guardar.
  alternative_spanish_readings:
  - Puede entenderse de manera más general como el encargo del santuario
  - Puede leerse como una referencia colectiva al deber sacerdotal
  rationale: El contexto inmediato de Números 3 presenta la asignación de los levitas a Aarón y a sus hijos; por eso Aarón es el antecedente más natural. La traducción "su encargo" preserva esa referencia sin explicitarla en el texto principal.
  doctrine_reference: Números 3:5–9; 3:10
- issue: Valor cultual de "congregación" en la doble frase de מִשְׁמֶרֶת
  english_pob_reading: the charge of the whole congregation
  chosen_spanish_reading: el encargo de toda la congregación
  alternative_spanish_readings:
  - el deber de toda la congregación
  - la responsabilidad de toda la congregación
  rationale: Se mantiene la repetición de la noción de encargo/guardia, importante en el léxico sacerdotal de Números. "Congregación" conserva el sentido comunitario y cultual de עֵדָה.
  doctrine_reference: Números 1–4; Éxodo 12:3, 6
- issue: Expresión final de finalidad con עבד y עֲבֹדָה
  english_pob_reading: to do the service of the tabernacle
  chosen_spanish_reading: para hacer el servicio del tabernáculo
  alternative_spanish_readings:
  - para servir en el servicio del tabernáculo
  - para cumplir el servicio del tabernáculo
  rationale: Se conserva la relación verbal-nominal del hebreo (עבד / עֲבֹדָה) sin forzar un giro más interpretativo. "Hacer" sigue de cerca el audito inglés revisado, y "servicio" mantiene el término técnico.
  doctrine_reference: Números 3:7; Números 4:4–5
translation_notes:
  revision_awareness: Esta redacción sigue de cerca el texto hebreo y toma como guía el audit trail inglés revisado, que conserva el par semántico de custodia/encargo y la finalidad final con el verbo de acción. Se evitó traducir mecánicamente desde el inglés, pero se respetó su decisión de mantener 'do the service' como una formulación directa y formal.
  spanish_consistency_notes:
  - Se mantuvo "encargo" para reproducir la repetición de מִשְׁמֶרֶת en ambas cláusulas.
  - Se evitó "SEÑOR" porque el verso no contiene el nombre divino.
  - '"Tienda de reunión" se eligió como equivalente natural y estándar de אֹהֶל מוֹעֵד.'
  - Los dos marcadores de nota aparecen exactamente en el texto principal y no se reutilizan.
