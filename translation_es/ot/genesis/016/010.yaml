translation:
  language: es
  text: 'Entonces el ángel de Yahvé le dijo: «Ciertamente multiplicaré tu descendencia, de modo que no podrá ser contada por su multitud».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... le dijo
  alternatives_spanish:
  - Y ... le dijo
  - Entonces ... habló
  lexicon: HALOT
  rationale: La forma narrativa con waw consecutiva avanza la escena; «Entonces» expresa bien la secuencia sin sonar forzado en español. «Le dijo» conserva el discurso directo y el destinatario femenino del contexto.
- source_word: מַלְאַךְ יְהוָה
  english_pob_choice: the angel of Yahweh
  chosen_spanish: el ángel de Yahvé
  alternatives_spanish:
  - el mensajero de Yahvé
  - el ángel del SEÑOR
  lexicon: HALOT
  rationale: מַלְאַךְ puede ser «mensajero» o «ángel», pero en esta fórmula recurrente de Génesis el sentido tradicional y contextual es «ángel». Se mantiene «Yahvé» por el nombre divino explícito en el hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: 'Se traslada el nombre divino al equivalente español ya fijado para este proyecto: «Yahvé», preservando el nombre personal del pacto en lugar de sustituirlo por un título.'
- source_word: הַרְבָּה אַרְבֶּה
  english_pob_choice: I will surely multiply
  chosen_spanish: Ciertamente multiplicaré
  alternatives_spanish:
  - Multiplicaré grandemente
  - Sin duda multiplicaré
  lexicon: HALOT
  rationale: El infinitivo absoluto con verbo finito expresa intensificación. En español, «Ciertamente multiplicaré» comunica bien la fuerza enfática sin calco artificial; el matiz de abundancia queda reforzado por la cláusula siguiente.
- source_word: זַרְעֵךְ
  english_pob_choice: your offspring
  chosen_spanish: tu descendencia
  alternatives_spanish:
  - tu simiente
  - tu linaje
  lexicon: HALOT
  rationale: «Descendencia» conserva el sentido colectivo singular del hebreo זֶרַע y es clara en español bíblico contemporáneo. «Simiente» suena más arcaico y puede opacar la referencia colectiva.
- source_word: וְלֹא יִסָּפֵר
  english_pob_choice: so that it cannot be counted
  chosen_spanish: de modo que no podrá ser contada
  alternatives_spanish:
  - y no podrá ser contada
  - para que no se pueda contar
  lexicon: HALOT
  rationale: El nifal de ספר expresa la imposibilidad de ser contado. «De modo que» hace explícita la relación consecutiva implícita en el contexto, y «no podrá ser contada» conserva el pasivo impersonal adecuado para la descendencia colectiva.
- source_word: מֵרֹב
  english_pob_choice: because of its multitude
  chosen_spanish: por su multitud
  alternatives_spanish:
  - a causa de su multitud
  - por ser tan numerosa
  lexicon: HALOT
  rationale: La preposición מִן con רֹב aporta la razón o causa de la imposibilidad de contarla. «Por su multitud» es breve y natural; «multitud» preserva el sustantivo colectivo.
theological_decisions:
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El hebreo usa el Tetragrámaton de forma directa. Se mantiene la transliteración reverente «Yahvé» para no ocultar el nombre propio del Dios del pacto.
  doctrine_reference: 'DOCTRINE.md: יְהוָה YHWH → Yahweh / Yahvé'
- issue: Identidad de מַלְאַךְ יְהוָה
  english_pob_reading: the angel of Yahweh
  chosen_spanish_reading: el ángel de Yahvé
  alternative_spanish_readings:
  - el mensajero de Yahvé
  rationale: Se conserva la formulación tradicional del texto, sin resolver de antemano la tensión teológica sobre la identidad del mensajero; el nombre divino permanece explícito.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: La redacción sigue el ajuste revisado del inglés auditado, especialmente la intensificación del verbo («surely multiply») y la relación consecutiva entre la multiplicación y la imposibilidad de contar la descendencia. Se optó por una formulación española fluida que mantiene esas relaciones semánticas sin introducir elementos no sustentados por el hebreo.
  spanish_consistency_notes:
  - Se usa consistentemente «Yahvé» para יהוה.
  - «Descendencia» se emplea como colectivo singular, coherente con זֶרַע.
  - La cláusula final se mantiene en pasivo («no podrá ser contada») para respetar el valor de יִסָּפֵר.
  - No se añadió nota al texto porque no se requiere alternativa textual o lexical anclada en el versículo para esta línea.
