translation:
  language: es
  text: La obtención de tesoros con lengua mentirosa es un vapor que se desvanece[a][b], una trampa de los que buscan la muerte[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Con lengua mentirosa» conserva el sentido instrumental del hebreo; también puede entenderse «por lengua falsa».
    reason: lexical_alternative
  - marker: b
    text: '«Un vapor que se desvanece» refleja הֶבֶל נִדָּף: algo insustancial y rápidamente disipado, más que la sola idea abstracta de «vanidad».'
    reason: lexical_alternative
  - marker: c
    text: 'La frase final hebrea es difícil. También puede leerse: «es una trampa de muerte» o, en otra construcción, «los que obtienen tales bienes buscan la muerte».'
    reason: alternative_reading
lexical_decisions:
- source_word: פֹּעַל
  english_pob_choice: The getting of
  chosen_spanish: La obtención de
  alternatives_spanish:
  - La ganancia de
  - El hacer de
  lexicon: HALOT
  rationale: El sustantivo verbal hebreo apunta al acto/proceso de adquirir o producir. «La obtención de» conserva ese valor procesual en español sin sonar tan mecánico como una traducción nominal rígida.
- source_word: אֹצָרוֹת
  english_pob_choice: treasures
  chosen_spanish: tesoros
  alternatives_spanish:
  - riquezas
  - depósitos
  lexicon: HALOT
  rationale: En contexto sapiencial se refiere a bienes acumulados. «Tesoros» mantiene la imagen concreta y es natural en español.
- source_word: בִּלְשׁוֹן שָׁקֶר
  english_pob_choice: by a lying tongue
  chosen_spanish: con lengua mentirosa
  alternatives_spanish:
  - por una lengua falsa
  - con una lengua de engaño
  lexicon: HALOT
  rationale: La construcción hebrea literalmente tiene el valor de medio/instrumento. En español, «con lengua mentirosa» conserva el giro corporal y comunica el medio por el que se obtiene el tesoro. Se prefiere «con» aquí por fluidez; la alternativa con «por» queda implícita en el sentido instrumental.
- source_word: הֶבֶל
  english_pob_choice: a fleeting vapor
  chosen_spanish: un vapor que se desvanece
  alternatives_spanish:
  - vanidad
  - aliento
  - un vapor pasajero
  lexicon: HALOT
  rationale: הֶבֶל expresa fugacidad e insustancialidad. «Un vapor que se desvanece» comunica ambas ideas con claridad en español moderno, sin reducirlo a la abstracción de «vanidad».
- source_word: נִדָּף
  english_pob_choice: fleeting / driven away
  chosen_spanish: que se desvanece
  alternatives_spanish:
  - arrastrado
  - llevado por el viento
  - dispersado
  lexicon: HALOT
  rationale: El participio describe algo expulsado o disipado. «Que se desvanece» conserva la idea de desaparición rápida y evita un giro demasiado pesado.
- source_word: מְבַקְשֵׁי מָוֶת
  english_pob_choice: those who seek death
  chosen_spanish: los que buscan la muerte
  alternatives_spanish:
  - los que buscan morir
  - buscadores de muerte
  lexicon: HALOT
  rationale: La frase final es sintácticamente difícil. «Los que buscan la muerte» sigue de cerca el hebreo y mantiene la gravedad proverbial. La elección evita cerrar prematuramente el sentido interpretativo, que en el audit trail inglés también se reconoce como crux textual/lectural.
theological_decisions:
- issue: Sentido de la cláusula final מְבַקְשֵׁי מָוֶת
  english_pob_reading: The proverb portrays dishonest gain as belonging to or characterizing people who seek death; the phrase is difficult and alternatives such as 'it is a snare of death' remain possible.
  chosen_spanish_reading: La frase se mantiene como «los que buscan la muerte», dejando abierta la posibilidad de que describa a los obtenedores de esa riqueza o que caracterice el resultado mortal del acto.
  alternative_spanish_readings:
  - es una trampa de muerte
  - los que adquieren tales bienes buscan la muerte
  rationale: No se fuerza una solución interpretativa donde el hebreo es comprimido y difícil. La redacción española conserva la tensión del texto y permite leerla a la luz de la nota alternativa, como hace el registro inglés.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el audit trail inglés: el giro nominal se resolvió como «la obtención de», el valor de הֶבֶל/נִדָּף se preservó con una imagen de vapor disipado, y la cláusula final se mantuvo deliberadamente abierta por tratarse de un punto interpretativo reconocido en el propio expediente inglés.'
  spanish_consistency_notes:
  - Se usa «tesoros» para אֹצָרוֹת por ser la opción más natural y concreta en español sapiencial.
  - Se evita «vanidad» como traducción principal de הֶבֶל porque en español puede sonar demasiado abstracta o moralizante.
  - Se conserva la tensión interpretativa de la frase final sin imponer una lectura eclesiástica tradicional no documentada en el expediente.
