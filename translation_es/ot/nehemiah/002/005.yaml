base_translation:
  language: en
  yaml_path: translation/ot/nehemiah/002/005.yaml
  text: Then I said to the king[a], "If it pleases the king, and if your servant has found favor before you, that you would send me to Judah, to the city of my fathers' graves[c][b], so that I may rebuild it."
  footnotes:
  - marker: a
    text: Or 'If it pleases the king.' The Hebrew is a courtly idiom of royal approval.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'to the city of the graves of my fathers.'
    reason: lexical_alternative
  - marker: c
    text: The Hebrew verb is 'build'; 'rebuild' makes explicit the context that the city lies in ruins.
    reason: lexical_alternative
