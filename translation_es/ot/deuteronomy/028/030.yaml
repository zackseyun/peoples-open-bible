base_translation:
  language: en
  yaml_path: translation/ot/deuteronomy/028/030.yaml
  text: You will become engaged to a wife[a], but another man will lie with her; you will build a house, but you will not live in it; you will plant a vineyard[c][b], but you will not begin to use its fruit.
  footnotes:
  - marker: a
    text: Or, more formally, 'You will betroth a wife.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew verb for 'lie with her' is a blunt sexual term; some translations render it more strongly, such as 'violate her' or 'ravish her,' but the wording here avoids specifying force beyond what is explicit in this form.
    reason: lexical_alternative
  - marker: c
    text: Literally, 'you will not profane/common it,' an idiom for beginning to use a vineyard's fruit for ordinary consumption.
    reason: lexical_alternative
