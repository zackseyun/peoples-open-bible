review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el hebreo: refugiarse en la sombra contra el calor y habitar en los ámbitos protectores de la Sabiduría. También preserva correctamente la variante griega en nota. Sin embargo, la redacción principal introduce un matiz adicional con «queda a salvo», que desplaza el valor verbal de וְחוֹסֶה («se refugia / busca refugio») hacia el resultado de protección. Además, la nota al pie no reproduce plenamente la alternativa inglesa, porque omite el sujeto explícito del segundo miembro («él / el que») y suaviza el primer verbo alternativo.'
  spanish_quality_summary: El español es claro y digno, pero «queda a salvo del calor» suena más interpretativo que el original y rompe el paralelismo verbal con «habita». Una formulación más directa mejora la fidelidad y mantiene la fluidez. El resto del verso se lee bien; «habita en sus refugios» es natural y sapiencial.
  glossary_alignment: No hay conflictos con la terminología principal del proyecto. Las decisiones léxicas para «sombra», «calor» y «habita» están bien encaminadas. El único ajuste recomendado es mantener más de cerca el sentido de חסה con «se refugia» en vez de «queda a salvo».
  issues:
  - severity: medium
    issue: «queda a salvo del calor» añade un resultado no expresado directamente por וְחוֹסֶה
    rationale: El hebreo expresa la acción de refugiarse, no primariamente el estado resultante. Aunque el paralelo griego confirma la idea de protección, el texto principal debe conservar el verbo de refugio más de cerca.
  - severity: low
    issue: La nota alternativa podría reflejar con más precisión la redacción del paralelo griego
    rationale: La alternativa inglesa conserva la estructura verbal completa («será resguardado... y hospedará / morará...»). En español conviene expresar ambas acciones de modo más explícito y paralelo.
  revised_spanish_text: El que se refugia en su sombra del calor, y habita en sus refugios.[a]
  revised_footnotes:
  - marker: a
    text: 'O, siguiendo más de cerca el paralelo griego: «será resguardado por ella del calor abrasador, y se alojará en su gloria». El hebreo dice «en sus refugios», mientras que el griego tiene «en su gloria».'
    reason: alternative_reading
  revision_rationale: Se reemplaza «queda a salvo del calor» por «se refugia en su sombra del calor» para reflejar más literalmente חסה y conservar la imagen de buscar refugio, en vez de enfatizar el resultado. También se ajusta la nota para representar con más precisión el paralelo griego («será resguardado... se alojará...»).
