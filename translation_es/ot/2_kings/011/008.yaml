    rationale: No corresponde al español neutral latinoamericano/broadly church-readable pedido por el proyecto. «Permanezcan» o «Estén» conserva el mandato con registro digno y natural.
  - severity: medium
    issue: La nota [a] está anclada a «por todos lados» en vez de al término militar «filas»
    rationale: El rastro POB documenta la alternativa léxica para הַשְּׂדֵרוֹת («lines/rows», rangos de la guardia). En español, la nota relevante debe acompañar «filas» y no el cerco alrededor del rey.
  - severity: low
