translation:
  language: es
  text: 'Pero Jesús le dijo[a]: «¿Por qué me llamas bueno? Nadie es bueno, sino uno: Dios.»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «¿Qué me llamas bueno?»'
    reason: lexical_alternative
lexical_decisions:
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora
  lexicon: BDAG
  rationale: «Pero» marca bien la transición-respuesta en el diálogo, conservando el matiz de contraste leve del griego y la fluidez natural en español.
- source_word: εἶπεν αὐτῷ
  english_pob_choice: said to him
  chosen_spanish: le dijo
  alternatives_spanish:
  - le habló
  - le respondió
  lexicon: BDAG
  rationale: «Le dijo» reproduce de forma directa el verbo de habla con objeto indirecto. «Le respondió» añadiría una interpretación pragmática que el griego no exige.
- source_word: Τί με λέγεις ἀγαθόν
  english_pob_choice: Why do you call me good
  chosen_spanish: ¿Por qué me llamas bueno?
  alternatives_spanish:
  - ¿Qué me llamas bueno?
  - ¿Por qué dices que soy bueno?
  lexicon: BDAG
  rationale: El valor idiomático de τί en esta construcción se expresa con naturalidad en español como «¿Por qué...?»; así se conserva la fuerza retórica sin forzar un calco literal.
- source_word: ἀγαθόν / ἀγαθὸς
  english_pob_choice: good
  chosen_spanish: bueno
  alternatives_spanish:
  - bondadoso
  - moralmente bueno
  lexicon: BDAG
  rationale: «Bueno» mantiene la repetición léxica de ἀγαθόν / ἀγαθός y su fuerza retórica. «Moralmente bueno» explicitaría en exceso el sentido.
- source_word: οὐδεὶς
  english_pob_choice: No one
  chosen_spanish: Nadie
  alternatives_spanish:
  - Ninguno
  - No hay nadie
  lexicon: BDAG
  rationale: «Nadie» es la negación universal más natural y concisa en español, equivalente a «No one».
- source_word: εἰ μὴ εἷς
  english_pob_choice: except one
  chosen_spanish: sino uno
  alternatives_spanish:
  - excepto uno
  - salvo uno
  lexicon: BDAG
  rationale: «Sino uno» expresa de manera idiomática la construcción exceptiva y preserva el énfasis en la unicidad antes de identificar al sujeto.
- source_word: ὁ θεός
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: BDAG
  rationale: En español, el nombre divino se expresa naturalmente como «Dios»; añadir el artículo resultaría menos idiomático y no mejora la referencia.
theological_decisions:
- issue: Posible implicación cristológica de la afirmación de Jesús sobre la bondad
  english_pob_reading: Translate the saying straightforwardly without adding interpretive qualifiers that would suggest either a denial of Jesus' divinity or an explicit claim to it.
  chosen_spanish_reading: Traducir el dicho de manera directa, sin añadir calificativos interpretativos que hagan del versículo una negación de la divinidad de Jesús ni una afirmación explícita de ella.
  alternative_spanish_readings:
  - Una traducción que sugiera que Jesús niega ser divino
  - Una traducción que sugiera que Jesús afirma abiertamente su divinidad
  rationale: La formulación conserva la tensión del pasaje tal como aparece en el griego y evita resolverla por adelantado. Así se respeta el alcance del texto y la lectura ortodoxa sin sobreinterpretación.
  doctrine_reference: Affirmations; Translation philosophy §3
translation_notes:
  revision_awareness: 'Se corrigió el problema señalado en la validación anterior: el marcador de nota [a] ahora aparece explícitamente en el texto español y la nota correspondiente está anclada en ese mismo marcador. No se introdujeron otros cambios textuales.'
  spanish_consistency_notes:
  - Se mantuvo la repetición de la raíz semántica de ἀγαθός con «bueno» en ambos casos.
  - 'Se prefirió un español neutral y de lectura pública: «Pero Jesús le dijo:».'
  - 'La construcción «sino uno: Dios» conserva la exclusividad y el énfasis del griego sin añadir explicación doctrinal.'
  - No se usó «SEÑOR» ni «Cristo», ya que no corresponden a este versículo.
