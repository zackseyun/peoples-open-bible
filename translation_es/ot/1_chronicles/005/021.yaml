review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien la lista numérica de camellos, ovejas, asnos y personas, y conserva adecuadamente la nota sobre נֶפֶשׁ אָדָם. Sin embargo, מִקְנֵיהֶם en este contexto específico significa 'su ganado' o 'sus animales', no el más amplio 'sus bienes'. Además, la combinación 'Tomaron cautivos sus bienes' suena poco natural en español para animales; el hebreo introduce botín ganadero, no bienes en general.
  spanish_quality_summary: La redacción es generalmente clara, pero 'sus bienes' resulta demasiado amplia y menos idiomática que 'su ganado'. También 'Tomaron cautivos' aplicado a toda la serie funciona, pero 'capturaron su ganado' o 'capturaron de su ganado' es más natural en español para una lista de animales y personas. 'Asnos' es aceptable y digno en registro bíblico moderno.
  glossary_alignment: No hay conflictos con la terminología teológica del proyecto. Las decisiones para 'camellos', 'ovejas', 'asnos' y 'personas' son adecuadas. La principal desalineación léxica es מִקְנֵיהֶם, que debe reflejar 'ganado/livestock' en lugar de 'bienes'.
  issues:
  - severity: high
    issue: מִקְנֵיהֶם se tradujo como 'sus bienes'.
    rationale: En este versículo la lista posterior especifica animales, por lo que el sentido correcto es 'su ganado' o 'sus animales', no posesiones en general. 'Sus bienes' debilita la precisión léxica y no sigue la decisión auditada del POB inglés ('their livestock').
  - severity: medium
    issue: La frase 'Tomaron cautivos sus bienes' es poco natural en español.
    rationale: Aunque שׁבה puede abarcar botín y cautivos, en español 'tomar cautivos' se aplica de forma primaria a personas. Para animales, 'capturaron su ganado' o 'se apoderaron de su ganado' suena más idiomático y fiel al contexto.
  revised_spanish_text: 'Capturaron su ganado: 50.000 camellos, 250.000 ovejas, 2.000 asnos y 100.000 personas[a].'
  revised_footnotes:
  - marker: a
    text: Literalmente, 'alma/persona humana' (נֶפֶשׁ אָדָם), es decir, 100.000 personas tomadas cautivas.
    reason: lexical_alternative
  revision_rationale: Se reemplazó 'sus bienes' por 'su ganado' para reflejar con precisión מִקְנֵיהֶם en el contexto de una lista de animales. También se reformuló el verbo a 'Capturaron' para que la frase sea natural en español al abarcar tanto animales como personas. La nota se reancló correctamente en 'personas', que es donde corresponde la alternativa literal de נֶפֶשׁ אָדָם.
