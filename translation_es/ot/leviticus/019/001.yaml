lexical_decisions:
- source_word: וַיְדַבֵּר
  english_pob_choice: spoke
  chosen_spanish: habló
  alternatives_spanish:
  - dijo
  lexicon: HALOT
  rationale: El verbo hebreo introduce una fórmula narrativa de comunicación divina. En español, «habló» conserva el evento de habla de manera natural y solemne; «dijo» también es posible, pero aquí suena menos marcado para la fórmula introductoria.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre propio del pacto como transliteración hispana de יְהוָה. «Yahvé» sigue la decisión doctrinal de no sustituirlo por un título como «el SEÑOR».
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  lexicon: HALOT
  rationale: La preposición marca el destinatario directo del discurso. En español, «a» es la equivalencia natural y precisa para este contexto.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  alternatives_spanish:
  - Moshe
  lexicon: HALOT
  rationale: Nombre propio bíblico en su forma española estándar y ampliamente reconocible.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - para decir
  lexicon: HALOT
  rationale: La fórmula hebrea de introducción del discurso se refleja idiomáticamente con «diciendo». Mantiene el valor funcional de לֵאמֹר sin sobretraducirlo.
theological_decisions:
- issue: Tratamiento del nombre divino YHWH en el texto base
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: La traducción española sigue la decisión auditada del POB de preservar el nombre divino. «Yahvé» comunica el Tetragrámaton sin ocultarlo tras un sustituto litúrgico tradicional.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: El registro inglés más reciente no introdujo cambios y mantiene acuerdo alto; la presente propuesta traslada fielmente esa lectura al español, conservando la fórmula narrativa y el nombre divino sin diluirlo en un título.
  spanish_consistency_notes:
  - Se mantiene la puntuación de fórmula introductoria con coma final, en paralelo al patrón del inglés auditado.
  - «Yahvé» se usa de forma consistente con el estándar POB para יְהוָה; no se sustituye por «el SEÑOR».
  - La cláusula participial final se vierte con «diciendo» para conservar el enlace sintáctico hebreo sin añadir contenido interpretativo.
