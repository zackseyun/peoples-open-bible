translation:
  language: es
  text: Entonces Naamán vino con sus caballos y carros[a], y se paró a la entrada de la casa de Eliseo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «con su caballo y con su carro»; las formas singulares probablemente funcionan en sentido colectivo, por eso se traduce «caballos y carros».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא
  english_pob_choice: came
  chosen_spanish: vino
  alternatives_spanish:
  - llegó
  - vino hasta
  lexicon: HALOT
  rationale: El hebreo narra la llegada de Naamán en secuencia narrativa; en español, «vino» conserva ese movimiento simple y directo sin añadir matiz excesivo. «Llegó» también es posible, pero «vino» sigue más de cerca el impulso narrativo del verbo.
- source_word: נַעֲמָן
  english_pob_choice: Naaman
  chosen_spanish: Naamán
  alternatives_spanish:
  - Naamán
  lexicon: convención onomástica
  rationale: Se conserva el nombre propio en transliteración española usual, con acentuación para reflejar la pronunciación natural en español.
- source_word: בְּסוּסוֹ
  english_pob_choice: with his horses
  chosen_spanish: con sus caballos
  alternatives_spanish:
  - con su caballo
  - en su caballo
  lexicon: HALOT
  rationale: Aunque la forma hebrea es singular con sufijo, el contexto militar y el paralelismo con «carros» favorecen un sentido colectivo. En español, el plural «caballos» comunica mejor ese valor colectivo que un singular literal demasiado estrecho.
- source_word: וּבְרִכְבּוֹ
  english_pob_choice: and chariots
  chosen_spanish: y carros
  alternatives_spanish:
  - y su carro
  - y su carro de guerra
  lexicon: HALOT
  rationale: רֶכֶב puede referirse al carro o al conjunto de carros de guerra; aquí, en paralelo con los caballos, «carros» expresa bien el sentido colectivo sin sobreinterpretar con «caballería» ni restringirlo a un solo vehículo.
- source_word: וַיַּעֲמֹד
  english_pob_choice: stood
  chosen_spanish: se detuvo
  alternatives_spanish:
  - se puso de pie
  - se quedó
  lexicon: HALOT
  rationale: En este contexto, la acción es colocarse y permanecer ante la casa. «Se detuvo» conserva la escena sin perder naturalidad en español; «se puso de pie» enfatizaría el estado más que el movimiento narrativo.
- source_word: פֶּתַח הַבַּיִת
  english_pob_choice: at the entrance of ... house
  chosen_spanish: a la entrada de la casa
  alternatives_spanish:
  - en la entrada de la casa
  - en el umbral de la casa
  lexicon: HALOT
  rationale: פֶּתַח es «entrada, abertura». «A la entrada» es una expresión natural en español y refleja el lugar exterior de la escena; «umbral» sería más específico y menos amplio.
- source_word: לֶאֱלִישָׁע
  english_pob_choice: of Elisha
  chosen_spanish: de Eliseo
  alternatives_spanish:
  - a Eliseo
  lexicon: HALOT
  rationale: Aunque el hebreo usa ל, aquí la relación con «casa» señala pertenencia o asociación, no dirección. Por eso se traduce como «de Eliseo», que en español expresa de manera natural la casa a la que llegó Naamán.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el hebreo y la solución óptima del POB inglés: mantiene la llegada narrativa de Naamán, conserva el valor colectivo de los sustantivos de transporte y expresa la relación de לֶאֱלִישָׁע como pertenencia en español natural. No se detectan revisiones aplicadas en el registro inglés, y el pasaje muestra alta concordancia textual.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton ni un título divino.
  - Se usa «carros» en plural para reflejar el valor colectivo documentado en el audit trail inglés.
  - 'El nombre propio se adapta a la ortografía española común: «Naamán» y «Eliseo».'
