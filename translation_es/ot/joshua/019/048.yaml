translation:
  language: es
  text: 'Esta fue[a] la herencia[b] de la tribu de los hijos de Dan, según sus clanes: estas ciudades con sus aldeas.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede traducirse: ‘Esta es ...’; el demostrativo hebreo permite presente o pasado en este tipo de fórmula resumida.'
    reason: lexical_alternative
  - marker: b
    text: O ‘la porción asignada’. En este contexto, el término hebreo puede resaltar tanto la porción distribuida como su carácter de herencia.
    reason: lexical_alternative
lexical_decisions:
- source_word: זֹאת
  english_pob_choice: This was
  chosen_spanish: Esta fue
  alternatives_spanish:
  - Esta es
  lexicon: HALOT
  rationale: La fórmula demostrativa resume el reparto territorial ya descrito; en español, el pasado encaja bien con el cierre del inventario, aunque el presente sigue siendo una alternativa válida.
- source_word: נַחֲלַת
  english_pob_choice: the inheritance
  chosen_spanish: la herencia
  alternatives_spanish:
  - la heredad
  - la porción asignada
  - el allotamiento
  lexicon: HALOT
  rationale: En el contexto de la distribución de la tierra, ‘herencia’ conserva la idea de porción recibida como posesión heredada; ‘heredad’ es posible, pero menos natural en español moderno.
- source_word: מַטֵּה
  english_pob_choice: the tribe
  chosen_spanish: la tribu
  alternatives_spanish:
  - la vara
  - el bastón
  lexicon: HALOT
  rationale: Aquí el sentido tribal es inequívoco; no se conserva el objeto literal porque el contexto administrativo de repartición exige ‘tribu’.
- source_word: בְנֵי דָן
  english_pob_choice: of the sons of Dan
  chosen_spanish: de los hijos de Dan
  alternatives_spanish:
  - de los danitas
  - del pueblo de Dan
  lexicon: HALOT
  rationale: Se mantiene la estructura constructa hebrea de manera transparente; ‘danitas’ sería más idiomático, pero menos cercano al texto fuente.
- source_word: לְמִשְׁפְּחֹתָם
  english_pob_choice: according to their clans
  chosen_spanish: según sus clanes
  alternatives_spanish:
  - según sus familias
  - por sus familias
  lexicon: HALOT
  rationale: En listas tribales, מִשְׁפָּחוֹת designa subdivisiones de parentesco dentro de la tribu; ‘clanes’ comunica mejor esa fuerza que ‘familias’.
- source_word: הֶעָרִים הָאֵלֶּה
  english_pob_choice: these cities
  chosen_spanish: estas ciudades
  alternatives_spanish:
  - estos pueblos
  - estas urbes
  lexicon: HALOT
  rationale: ‘Ciudades’ sigue el uso convencional en registros territoriales para עָרִים, aun cuando algunas pudieron ser asentamientos menores.
- source_word: וְחַצְרֵיהֶן
  english_pob_choice: with their villages
  chosen_spanish: con sus aldeas
  alternatives_spanish:
  - y sus poblados
  - y sus asentamientos
  - y sus villorrios
  lexicon: HALOT
  rationale: חָצֵר en estas listas suele referirse a asentamientos dependientes o aldeas asociadas a la ciudad; ‘aldeas’ es la opción española más clara y natural.
theological_decisions:
- issue: 'Fórmula conclusiva de reparto territorial: valor de ‘herencia’ frente a ‘allotment’'
  english_pob_reading: This was the inheritance ...
  chosen_spanish_reading: Esta fue la herencia ...
  alternative_spanish_readings:
  - Esta es la herencia ...
  - Esta fue la porción asignada ...
  rationale: 'No hay una tensión doctrinal, pero sí una decisión léxica con matiz teológico-covenantal: ‘herencia’ preserva mejor la idea de tierra recibida como don de Yahvé dentro de la promesa a Israel. ‘Porción asignada’ explicita el acto administrativo, pero atenúa el eco de posesión heredada.'
  doctrine_reference: Josué 19; reparto de la tierra como cumplimiento de la promesa pactal
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés sin traducir mecánicamente: se mantuvo la estructura de fórmula resumida, se resolvió מַטֵּה como ‘tribu’ por su sentido contextual, y se conservó la tensión presente/pasado en nota, como hizo el POB inglés.'
  spanish_consistency_notes:
  - Se usó ‘hijos de Dan’ para reflejar literalmente בְנֵי דָן y no sustituirlo por ‘danitas’ en el texto principal.
  - ‘Clanes’ se eligió sobre ‘familias’ por coherencia con el uso tribal de מִשְׁפְּחֹת.
  - ‘Aldeas’ comunica la relación de dependencia de חַצְרֵיהֶן sin introducir un tecnicismo innecesario.
