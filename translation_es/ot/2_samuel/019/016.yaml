translation:
  language: es
  text: Entonces el rey volvió y llegó hasta el Jordán, y Judá[a] llegó a Gilgal para ir a recibir al rey, para hacer cruzar al rey el Jordán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los hombres de Judá». El hebreo usa «Judá» de manera colectiva para la tribu o su gente.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשָׁב
  english_pob_choice: returned
  chosen_spanish: volvió
  alternatives_spanish:
  - regresó
  - retornó
  lexicon: HALOT
  rationale: El qal wayyiqtol de שוב expresa retorno en secuencia narrativa. En español, «volvió» es natural y fiel, sin sonar arcaico ni demasiado técnico.
- source_word: וַיָּבֹא עַד הַיַּרְדֵּן
  english_pob_choice: came as far as the Jordan
  chosen_spanish: llegó hasta el Jordán
  alternatives_spanish:
  - llegó al Jordán
  - vino hasta el Jordán
  lexicon: HALOT
  rationale: עַד marca límite o alcance. «Llegó hasta el Jordán» conserva la idea de alcanzar el borde o punto máximo del recorrido sin afirmar todavía el cruce.
- source_word: וִיהוּדָה
  english_pob_choice: Judah
  chosen_spanish: Judá
  alternatives_spanish:
  - la gente de Judá
  - los hombres de Judá
  lexicon: HALOT
  rationale: Se conserva el nombre colectivo tal como está en el hebreo. Aunque puede referirse al pueblo o tribu, el texto hebreo dice simplemente «Judá», y esa forma mantiene la concisión y la ambigüedad colectiva documentada en el audit trail.
- source_word: בָּא
  english_pob_choice: came
  chosen_spanish: llegó
  alternatives_spanish:
  - había llegado
  - vino
  lexicon: HALOT
  rationale: El qatal aquí puede seguir la cadena narrativa sin exigir pluscuamperfecto. «Llegó» fluye naturalmente en español y evita sobreinterpretar una anterioridad explícita que el español no necesita marcar con fuerza.
- source_word: הַגִּלְגָּלָה
  english_pob_choice: to Gilgal
  chosen_spanish: a Gilgal
  alternatives_spanish:
  - hacia Gilgal
  - hasta Gilgal
  lexicon: HALOT
  rationale: La he direccional indica movimiento hacia el lugar. En español, «a Gilgal» expresa adecuadamente la dirección sin recargar la frase.
- source_word: לָלֶכֶת לִקְרַאת
  english_pob_choice: to go to meet
  chosen_spanish: para ir a recibir
  alternatives_spanish:
  - para salir al encuentro de
  - para ir al encuentro de
  lexicon: HALOT
  rationale: La combinación de infinitivos expresa finalidad. «Ir a recibir» transmite el encuentro previsto de manera natural en español, manteniendo la idea de salir al encuentro del rey.
- source_word: לְהַעֲבִיר אֶת־הַמֶּלֶךְ אֶת־הַיַּרְדֵּן
  english_pob_choice: to bring the king across the Jordan
  chosen_spanish: para hacer pasar al rey el Jordán
  alternatives_spanish:
  - para llevar al rey a cruzar el Jordán
  - para hacer cruzar al rey el Jordán
  lexicon: HALOT
  rationale: El hiphil de עבר implica causar el paso o cruce. «Hacer pasar» conserva la causatividad mejor que un simple «cruzar» y evita introducir un medio no presente en el texto. El objeto directo pospuesto, «el Jordán», sigue la estructura hebrea y mantiene el sentido de atravesarlo.
translation_notes:
  revision_awareness: El español sigue la revisión auditada del POB inglés que prefirió una secuencia narrativa simple («came») en lugar del pluscuamperfecto. También conserva la lectura colectiva de «Judah/Judá» con nota alternativa, y mantiene el alcance de עַד en «hasta el Jordán» sin forzar el sentido de cruce antes del final de la cláusula.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto base lo requiera explícitamente; este versículo no lo contiene.
  - Se conserva «Jordán» con artículo tácito, como nombre geográfico usual en español bíblico.
  - Se evita «SEÑOR» porque no aparece ningún tetragrámaton en este versículo.
  - «Hacer pasar» preserva la fuerza causativa del hebreo mejor que «trasladar» o «cruzar» sin complemento.
