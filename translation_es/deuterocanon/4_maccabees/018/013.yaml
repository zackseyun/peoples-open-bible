revisions:
- from: Y también glorificó a Daniel en el pozo[a] de los leones, a quien también llamó bienaventurado.
  to: Y también glorificó a Daniel en el pozo[a] de los leones, y también lo llamó bienaventurado.
  rationale: 'Se hizo una reparación mínima para mejorar la sintaxis y naturalidad del español: «a quien también llamó bienaventurado» se cambió por «y también lo llamó bienaventurado». Esto conserva mejor la fuerza del segundo καί y expresa de manera más idiomática el objeto de «llamó». Se mantuvo «glorificó», «pozo» y la nota léxica por fidelidad al griego y al rastro de auditoría inglés.'
