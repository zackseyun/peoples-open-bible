translation:
  language: es
  text: 'No confíen en palabras engañosas[a], diciendo: «El templo de Yahvé, el templo de Yahvé[b], el templo de Yahvé: estos son».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «en palabras mentirosas». El hebreo puede enfatizar tanto la falsedad de las palabras como su efecto engañoso.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «El templo de Yahvé, el templo de Yahvé, el templo de Yahvé: estos son». La repetición triple es retórica y expresa la confianza mal puesta en el templo mismo.'
    reason: cultural_note
lexical_decisions:
- source_word: אַל תִּבְטְחוּ
  english_pob_choice: Do not trust
  chosen_spanish: No confíen
  alternatives_spanish:
  - No pongan su confianza
  - No se apoyen
  lexicon: HALOT
  rationale: El hebreo con אַל + imperfecto expresa prohibición. תִּבְטְחוּ pide un verbo de confianza; 'confiar' es natural en español y conserva el mandato directo.
- source_word: לָכֶם
  english_pob_choice: (implicit in English)
  chosen_spanish: (implícito en el español)
  alternatives_spanish:
  - para ustedes
  - por ustedes mismos
  lexicon: HALOT
  rationale: El valor reflexivo/dativo no requiere expresión explícita en español aquí; añadirlo sonaría pesado y no aportaría claridad.
- source_word: אֶל דִּבְרֵי הַשֶּׁקֶר
  english_pob_choice: in deceptive words
  chosen_spanish: en palabras engañosas
  alternatives_spanish:
  - en palabras mentirosas
  - en palabras falsas
  lexicon: HALOT
  rationale: דִּבְרֵי הַשֶּׁקֶר puede expresar tanto falsedad como efecto de engaño. 'Palabras engañosas' mantiene ese matiz y suena natural en español.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - al decir
  - con estas palabras
  lexicon: HALOT
  rationale: La construcción infinitiva introduce el contenido de las palabras citadas; 'diciendo' es la forma más directa y fiel en español.
- source_word: הֵיכַל יְהוָה
  english_pob_choice: the temple of the LORD
  chosen_spanish: Templo de Yahvé
  alternatives_spanish:
  - el templo de Yahvé
  - el santuario de Yahvé
  lexicon: HALOT
  rationale: הֵיכָל designa el templo/santuario; en este contexto se refiere claramente al templo de Jerusalén. Se usa 'Yahvé' conforme al criterio del proyecto para יְהוָה.
- source_word: הֵמָּה
  english_pob_choice: are these
  chosen_spanish: estos son
  alternatives_spanish:
  - son estos
  - estos son ellos
  lexicon: HALOT
  rationale: El demostrativo final apunta a aquello que se está señalando en la consigna. 'Estos son' conserva la deixis y suena más natural al final de la cita en español.
theological_decisions:
- issue: Repetición triple de 'templo de Yahvé'
  english_pob_reading: The repeated phrase is kept verbatim to preserve rhetorical force and expose misplaced confidence in the sanctuary.
  chosen_spanish_reading: Se conserva la repetición triple de 'templo de Yahvé' para mantener la fuerza retórica y denunciar la falsa seguridad en el templo.
  alternative_spanish_readings:
  - '''El templo de Yahvé...'''
  - '''El templo del Señor...'''
  rationale: La repetición no es redundancia accidental; es un recurso profético de denuncia. Mantenerla evita suavizar el texto.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Uso del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El proyecto prescribe 'Yahvé' para יְהוָה. Se evita la sustitución por un título para conservar el nombre propio del pacto.
  doctrine_reference: 'Contested terms table: יְהוָה YHWH'
translation_notes:
  revision_awareness: Se siguió el último pase de revisión sin cambios sustanciales; la decisión principal fue ajustar el español a la terminología del proyecto ('Yahvé') y mantener la repetición retórica del hebreo.
  spanish_consistency_notes:
  - Se prefirió 'confiar' para בטח en un mandato negativo por ser natural y fiel.
  - '''Palabras engañosas'' conserva la ambigüedad entre falsedad y efecto de engaño.'
  - La cita se cerró con 'estos son' para reflejar el demostrativo hebreo sin sobreexplicar.
  - Se mantuvo el nombre divino 'Yahvé' de forma consistente con el estándar del proyecto.
