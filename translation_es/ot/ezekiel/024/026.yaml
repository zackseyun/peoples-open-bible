revisions:
- from: En aquel día vendrá a ti el fugitivo[a], para hacer oír tus oídos.
  to: En aquel día vendrá a ti el fugitivo, para que lo oigas con tus propios oídos[a].
  rationale: Se reemplaza el calco poco natural «para hacer oír tus oídos» por «para que lo oigas con tus propios oídos», que comunica claramente el modismo hebreo y conserva el énfasis en la audición directa. También se mueve el marcador de nota a la frase que realmente requiere explicación.
