translation:
  language: es
  text: Todas las entradas y los postes de las puertas tenían marcos cuadrados[a], y una ventana estaba frente a otra[b] tres veces.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede traducirse: «Todas las aberturas y los postes de las puertas tenían dinteles cuadrados»; el término hebreo arquitectónico puede referirse más específicamente al marco superior o al dintel.'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «ventana frente a ventana, tres veces»; es decir, ventanas correspondientes dispuestas en tres niveles o series.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַפְּתָחִים
  english_pob_choice: doorways
  chosen_spanish: las entradas
  alternatives_spanish:
  - los vanos
  - las aberturas
  - los accesos
  lexicon: HALOT
  rationale: פֶּתַח designa una abertura o acceso; en el contexto arquitectónico, «entradas» conserva el sentido estructural sin sugerir todavía la hoja de una puerta.
- source_word: הַמְּזוּז֖וֹת
  english_pob_choice: doorposts
  chosen_spanish: los postes de las puertas
  alternatives_spanish:
  - los jambas
  - los montantes
  - los postes
  lexicon: HALOT
  rationale: מְזוּזוֹת son los soportes laterales de una abertura. «Postes de las puertas» es claro en español y mantiene el valor arquitectónico; «jambas» sería más técnico, pero menos transparente para lectores generales.
- source_word: רְבֻעִ֣ים שָׁ֑קֶף
  english_pob_choice: square frames
  chosen_spanish: cuadrados de marco
  alternatives_spanish:
  - de marco cuadrado
  - cuadrados con marco
  - de marco cuadrangular
  lexicon: HALOT
  rationale: La combinación apunta a una forma cuadrada aplicada al marco o dintel. «Cuadrados de marco» intenta conservar la tensión lexical sin fijar demasiado el término a «dintel» o «marco» solamente.
- source_word: מֶחֱזָה
  english_pob_choice: window
  chosen_spanish: ventana
  alternatives_spanish:
  - abertura
  - vanos de ventana
  - ventanilla
  lexicon: HALOT
  rationale: En esta descripción edilicia, מֶחֱזָה se entiende mejor como «ventana»; es la opción española más natural y coincide con el paralelismo repetido de ventana frente a ventana.
- source_word: מ֧וּל מֶחֱזָ֛ה אֶל מֶחֱזָ֖ה
  english_pob_choice: window was opposite window
  chosen_spanish: una ventana estaba frente a otra
  alternatives_spanish:
  - una ventana estaba opuesta a otra
  - ventana frente a ventana
  - una ventana correspondía a otra
  lexicon: HALOT
  rationale: מוּל/אֶל expresa oposición o correspondencia. «Estaba frente a otra» comunica bien la alineación recíproca en español moderno sin perder la relación espacial.
- source_word: שָׁלֹשׁ פְּעָמִים
  english_pob_choice: three times
  chosen_spanish: tres veces
  alternatives_spanish:
  - en tres filas
  - en tres niveles
  - tres veces
  lexicon: HALOT
  rationale: La forma literal «tres veces» respeta el hebreo y el ajuste revisado del POB inglés; la inferencia de filas o niveles queda disponible solo como implicación arquitectónica, no como traducción principal.
translation_notes:
  revision_awareness: Seguí la revisión inglesa que volvió la última cláusula a una forma más literal («three times») y preservé esa literalidad con «tres veces» en lugar de explicitar «tres filas» o «tres niveles» en el texto principal. También mantuve el valor arquitectónico de los términos con una redacción española clara y no técnica en exceso.
  spanish_consistency_notes:
  - Conservo «Yahvé» como forma por defecto solo cuando aparezca el nombre divino; aquí no aplica.
  - Evito «SEÑOR» y términos eclesiásticos no requeridos por el hebreo.
  - Uso «ventana» para מֶחֱזָה en armonía con el paralelismo del verso y con el audit trail inglés.
  - La frase «cuadrados de marco» mantiene la ambigüedad arquitectónica documentada en el POB inglés entre marco, dintel o contorno superior.
