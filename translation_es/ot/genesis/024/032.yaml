translation:
  language: es
  text: Así que el hombre entró en la casa y descargó[a] los camellos, y dio paja y forraje a los camellos, y agua para lavar sus pies y los pies de los hombres que estaban con él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «los desató» o «los soltó». El hebreo dice literalmente «abrió los camellos», un modismo para quitarles el equipo o aliviarlos tras la llegada.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא
  english_pob_choice: came into
  chosen_spanish: entró en
  alternatives_spanish:
  - vino a
  - entró a
  lexicon: HALOT
  rationale: El verbo expresa movimiento hacia el interior de la casa; en español, 'entró en' comunica bien la dirección e interioridad sin perder naturalidad.
- source_word: הָאִישׁ
  english_pob_choice: the man
  chosen_spanish: el hombre
  alternatives_spanish:
  - el siervo
  - el sirviente
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'el hombre'. Se mantiene esa forma porque el texto no lo identifica aquí como 'siervo', y así se preserva la referencia del original.
- source_word: הַבַּיְתָה
  english_pob_choice: into the house
  chosen_spanish: en la casa
  alternatives_spanish:
  - a la casa
  - dentro de la casa
  lexicon: HALOT
  rationale: La terminación direccional hebrea indica movimiento hacia la casa; en español, 'entró en la casa' es una forma natural y precisa.
- source_word: וַיְפַתַּח הַגְּמַלִּים
  english_pob_choice: unloaded the camels
  chosen_spanish: desató los camellos
  alternatives_spanish:
  - los descargó
  - los desató y alivió
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'abrió/desató los camellos', un modismo para quitarles el equipo o liberarlos después del viaje. 'Desató' conserva mejor la imagen verbal que 'descargó', y el pie de nota explica la posibilidad idiomática.
- source_word: תֶּבֶן
  english_pob_choice: straw
  chosen_spanish: paja
  alternatives_spanish:
  - rastrojo
  - paja cortada
  lexicon: HALOT
  rationale: El término designa material vegetal usado como forraje o cama. 'Paja' es claro y natural en español.
- source_word: מִסְפּוֹא
  english_pob_choice: feed
  chosen_spanish: forraje
  alternatives_spanish:
  - alimento
  - pienso
  lexicon: HALOT
  rationale: El sustantivo se refiere al alimento para animales. 'Forraje' mantiene el sentido de comida para bestias de carga y suena más preciso que 'alimento'.
- source_word: וּמַיִם
  english_pob_choice: water
  chosen_spanish: agua
  alternatives_spanish:
  - agua
  lexicon: HALOT
  rationale: Coincide con el sentido básico y directo del hebreo.
- source_word: לִרְחֹץ רַגְלָיו
  english_pob_choice: to wash his feet
  chosen_spanish: para lavar sus pies
  alternatives_spanish:
  - para el lavado de sus pies
  - para que le lavaran los pies
  lexicon: HALOT
  rationale: El infinitivo expresa propósito. 'Para lavar sus pies' conserva la finalidad del agua ofrecida sin introducir un sujeto adicional.
- source_word: וְרַגְלֵי הָאֲנָשִׁים אֲשֶׁר אִתּוֹ
  english_pob_choice: and the feet of the men who were with him
  chosen_spanish: y los pies de los hombres que estaban con él
  alternatives_spanish:
  - y los pies de los hombres con él
  - y los pies de los hombres que iban con él
  lexicon: HALOT
  rationale: Se conserva el plural explícito 'los hombres' y la relación indicada por la cláusula relativa, en un español natural.
- source_word: וַיִּתֵּן
  english_pob_choice: he gave
  chosen_spanish: dio
  alternatives_spanish:
  - les dio
  - les proporcionó
  lexicon: HALOT
  rationale: El verbo activo singular se mantiene como acción dada en el texto. El español no nombra al sujeto, dejando la misma ambigüedad narrativa del hebreo sin añadir información.
theological_decisions:
- issue: Sujeto implícito de las acciones de hospitalidad
  english_pob_reading: The Hebrew presents active singular verbs; the revised English audit removed 'Laban' because the source text does not name him here.
  chosen_spanish_reading: Se mantiene la secuencia con sujeto implícito en 'desató' y 'dio', sin introducir un nombre propio.
  alternative_spanish_readings:
  - Laban desató los camellos y dio...
  - el hombre desató los camellos y dio...
  rationale: El hebreo no nombra al sujeto en este versículo. Para no sobrecargar el texto con una identificación no presente, se preserva la ambigüedad sintáctica y se deja que el contexto inmediato identifique al agente.
  doctrine_reference: fidelidad al texto fuente / integridad narrativa
translation_notes:
  revision_awareness: El registro inglés pasó por una corrección que primero asignó a Laban la acción de desatar y dar, pero la revisión más reciente retiró ese nombre porque el hebreo no lo menciona en este versículo. La presente propuesta sigue esa última revisión y conserva el sujeto implícito del original, con vocabulario español que mantiene el modismo hebreo en nota.
  spanish_consistency_notes:
  - Se usa 'paja' para תבן y 'forraje' para מִסְפּוֹא, distinguiendo material de cama/fodder de alimento para animales.
  - Se mantiene 'pies' de forma literal, conforme al hebreo y a la costumbre narrativa del pasaje.
  - No se introduce 'siervo' ni 'Laban' en el cuerpo del versículo para respetar el texto fuente y la revisión más reciente.
