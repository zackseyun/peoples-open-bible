translation:
  language: es
  text: Y cada uno se sentó bajo su propia vid y su propia higuera[a], y no había quien los atemorizara.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Esta formulación evoca un modismo bíblico de paz y seguridad; compárese 1 Reyes 4:25 y Miqueas 4:4.
    reason: cross_reference
lexical_decisions:
- source_word: ἐκάθισεν
  english_pob_choice: sat
  chosen_spanish: se sentaba
  alternatives_spanish:
  - se sentó
  - habitaba
  - se establecía
  lexicon: LSJ
  rationale: El griego describe una situación de reposo o asentamiento en seguridad. En español, «se sentaba» conserva la imagen concreta y puede expresar estado habitual o instalado, sin volver la frase artificialmente estática.
- source_word: ἕκαστος
  english_pob_choice: each
  chosen_spanish: cada uno
  alternatives_spanish:
  - cada persona
  - todos
  lexicon: LSJ
  rationale: «Cada uno» reproduce el valor distributivo de ἕκαστος sin añadir un matiz colectivo que no está en el griego.
- source_word: ὑπὸ
  english_pob_choice: under
  chosen_spanish: bajo
  alternatives_spanish:
  - debajo de
  lexicon: LSJ
  rationale: «Bajo» es la opción natural en español para el giro idiomático y mantiene la imagen de protección espacial.
- source_word: ἄμπελον
  english_pob_choice: vine
  chosen_spanish: vid
  alternatives_spanish:
  - viña
  - parra
  lexicon: LSJ
  rationale: En español bíblico, «vid» comunica mejor la imagen de una planta individual sobre la que uno se sienta o reposa. «Viña» tendería a sugerir un terreno o plantación, no la planta singular.
- source_word: συκῆν
  english_pob_choice: fig tree
  chosen_spanish: higuera
  alternatives_spanish:
  - árbol de higos
  lexicon: LSJ
  rationale: El sustantivo griego designa el árbol; «higuera» es la equivalencia directa, breve y natural en español.
- source_word: οὐκ ἦν ὁ ἐκφοβῶν
  english_pob_choice: there was no one to frighten
  chosen_spanish: no había quien los atemorizara
  alternatives_spanish:
  - no había quien los asustara
  - no existía el que los aterrara
  lexicon: LSJ
  rationale: «Atemorizar» conserva el valor causativo de ἐκφοβῶν («hacer temer»), con un tono digno y bíblico. Evita suavizar el sentido más que «asustar» y evita el registro más intenso de «aterrar».
- source_word: αὐτούς
  english_pob_choice: them
  chosen_spanish: los
  alternatives_spanish:
  - a ellos
  - les
  lexicon: LSJ
  rationale: El pronombre apunta a las personas mencionadas colectivamente; en español, el clítico de objeto directo plural «los» resulta idiomático y fluido.
theological_decisions:
- issue: Fórmula intertextual de paz y seguridad bajo la vid y la higuera
  english_pob_reading: Retain the literal agrarian imagery in the main text.
  chosen_spanish_reading: Mantener la imagen agraria literal en el texto principal.
  alternative_spanish_readings:
  - Parafrasear como una declaración general de paz y prosperidad
  - Explicitar el sentido como 'vivían en paz'
  rationale: La expresión es un eco bíblico reconocible; conservar la imagen de la vid y la higuera preserva la resonancia intertextual con los pasajes paralelos sin borrar su fuerza idiomática.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: El texto inglés auditado se mantuvo sin cambios en la última revisión, con acuerdo alto entre revisores; esta versión española sigue de cerca esa decisión de conservar la imagen literal y el valor idiomático del pasaje.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención general del proyecto, pero aquí no aparece el tetragrámaton ni κύριος con valor de nombre divino.
  - Se conserva el paralelismo «vid / higuera» para reflejar el idioma bíblico intertextual.
  - «Atemorizar» se eligió para no debilitar el sentido causativo del participio griego.
