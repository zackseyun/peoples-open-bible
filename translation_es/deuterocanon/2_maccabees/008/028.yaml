    text: También puede entenderse como 'a los maltratados' o 'a los afligidos'. El participio griego abarca de manera amplia a personas que habían sufrido dureza, abuso o daño.
    reason: lexical_alternative
  - marker: b
    text: '''Botín'' también puede traducirse ''despojos'' o ''presa''.'
    reason: lexical_alternative
  revision_rationale: Se ajustó la frase final para que el español suene natural y exprese con claridad que el reparto restante fue entre los combatientes y sus hijos. También se reubicó la nota [b] sobre 'botín' junto al término pertinente, ya que en el borrador estaba anclada incorrectamente a 'huérfanos'.
