revisions:
- from: 'Así que llegaron y llamaron a los guardas de la ciudad[a], y les contaron, diciendo: “Hemos llegado al campamento de Aram, y he aquí que no hay allí ningún hombre, ni voz humana[b]; solo los caballos atados, y los asnos atados, y las tiendas como estaban”.'
  to: 'Así que llegaron y llamaron a los guardianes de la puerta de la ciudad[a], y les informaron, diciendo: “Fuimos al campamento de Aram, y he aquí que no había allí nadie, ni sonido humano[b]; solo los caballos atados, y los asnos atados, y las tiendas como estaban”.'
  rationale: 'La revisión corrige la alineación con el hebreo y con la auditoría POB en tres frentes principales: (1) reemplaza «ningún hombre» por «nadie» para reflejar el sentido genérico de אִישׁ en contexto; (2) ajusta el tiempo verbal a pasado narrativo («no había») y hace más natural el reporte con «Fuimos»; (3) restituye el sentido más amplio de וְקוֹל אָדָם como «sonido humano», dejando «voz humana» como alternativa en nota. Además, precisa שֹׁעֵר como personal de la puerta de la ciudad.'
