    reason: alternative_reading
  - marker: c
    text: O «palacio»; «casa» puede referirse a la residencia real en este contexto.
    reason: lexical_alternative
  revision_rationale: 'La revisión hace reparaciones menores pero importantes: cambia «al jebuseo» por «a los jebuseos» para reflejar mejor el gentilicio colectivo; suaviza la puntuación para que el español sea legible sin resolver la sintaxis difícil del hebreo; y mantiene las notas y la dureza semántica del texto auditado.'
