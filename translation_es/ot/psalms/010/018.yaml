review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido general del hebreo: propósito judicial a favor del huérfano y del oprimido, y cláusula final negativa para que el hombre terrenal no siga infundiendo terror. Sin embargo, no preserva del todo la revisión inglesa auditada en el último sintagma, porque traduce מִן הָאָרֶץ como «de la tierra» en vez de algo más cercano a «desde/de la tierra» ligado a la revisión a «man from the earth».'
  spanish_quality_summary: El español es claro y digno, pero «no siga aterrorizando nunca más» suena algo pesado y redundante. Una formulación como «ya no vuelva a aterrorizar» o «ya no aterrorice más» es más natural y mantiene la fuerza aspectual. Además, la nota c actualmente repite la misma frase del texto como alternativa, en vez de conservar la alternativa significativa documentada por el inglés.
  glossary_alignment: No hay conflictos con la terminología troncal del proyecto. «Huérfano» es una excepción justificada y natural para יָתוֹם. «Oprimido» y «hacer justicia» están bien. El punto a corregir es la alineación con la decisión auditada sobre מִן הָאָרֶץ y la forma de la nota correspondiente.
  issues:
  - severity: medium
    issue: «de la tierra» no refleja bien la revisión auditada «man from the earth».
    rationale: Aunque el hebreo permite un valor adjetival, el rastro de auditoría inglés cambió explícitamente a «from the earth». En español conviene acercarse a esa decisión con «desde la tierra» o una formulación equivalente, no volver a «de la tierra».
  - severity: low
    issue: «no siga aterrorizando nunca más» es estilísticamente recargado.
    rationale: La combinación de perífrasis progresiva con «nunca más» suena menos natural en español bíblico moderno. Una forma más directa conserva mejor la legibilidad sin perder sentido.
  - severity: low
    issue: La nota c no presenta una verdadera alternativa léxica útil.
    rationale: La nota dice «O “el hombre de la tierra”», pero el texto ya usa casi la misma idea y la auditoría inglesa preserva la tensión entre «from the earth» y «of the earth». La nota debería aclarar esa alternativa de forma más precisa.
  revised_spanish_text: para hacer justicia al huérfano[a] y al oprimido[b], de modo que el hombre desde la tierra[c] ya no vuelva a aterrorizar.
  revised_footnotes:
  - marker: a
