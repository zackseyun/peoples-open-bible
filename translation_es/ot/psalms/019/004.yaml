lexical_decisions:
- source_word: אֵין
  english_pob_choice: There is no / there are no
  chosen_spanish: No hay
  alternatives_spanish:
  - No existe
  - No se encuentra
  lexicon: HALOT
  rationale: Expresa la negación existencial de modo natural en español y puede abarcar ambos miembros del paralelismo sin forzar singular o plural.
- source_word: אֹמֶר
  english_pob_choice: speech
  chosen_spanish: habla
  alternatives_spanish:
  - discurso
  - palabra
  lexicon: HALOT
  rationale: En este paralelismo poético, 'habla' comunica expresión verbal general sin reducir el término a una sola 'palabra' o 'dicho'.
- source_word: דְּבָרִים
  english_pob_choice: words
  chosen_spanish: palabras
  alternatives_spanish:
  - asuntos
  - dichos
  lexicon: HALOT
  rationale: '''Palabras'' mantiene el contraste con el primer colon y refleja bien el campo comunicativo del hebreo en este contexto.'
- source_word: בְּלִי
  english_pob_choice: not
  chosen_spanish: 'no'
  alternatives_spanish:
  - sin
  - donde no
  lexicon: HALOT
  rationale: Aquí introduce la cláusula negativa que califica la audición; en español, 'no se oye' expresa con claridad el valor negativo sin añadir explicaciones.
- source_word: נִשְׁמָע
  english_pob_choice: is heard
  chosen_spanish: se oye
  alternatives_spanish:
  - es oído
  - se escucha
  lexicon: HALOT
  rationale: '''Se oye'' es la forma más natural en español para el pasivo/medio de שמע en este contexto poético, preservando la idea de percepción auditiva.'
- source_word: קוֹלָם
  english_pob_choice: their voice
  chosen_spanish: su voz
  alternatives_spanish:
  - su sonido
  - su voz
  lexicon: HALOT
  rationale: '''Voz'' sigue la decisión inglesa y conserva la personificación de los cielos; ''su'' en español transmite el sufijo pronominal plural de forma idiomática.'
theological_decisions:
- issue: La tensión entre testimonio y silencio en el paralelismo poético
  english_pob_reading: 'The verse denies ordinary spoken language: ''There is no speech, and there are no words; their voice is not heard.'''
  chosen_spanish_reading: 'El versículo niega el habla ordinaria: ''No hay habla, ni hay palabras; no se oye su voz.'''
  alternative_spanish_readings:
  - '''No hay habla, ni hay palabras; su voz no se oye.'''
  - '''No hay discurso ni palabras; no se percibe su sonido.'''
  rationale: La traducción conserva la negación explícita de lenguaje humano ordinario y no resuelve la tensión poética del contexto mayor. 'Voz' mantiene la personificación, pero el sentido sigue siendo que no se trata de comunicación verbal habitual.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'Coincide con la última pasada de revisión: no se requieren cambios respecto al juicio de alta concordancia del audit trail en inglés.'
  spanish_consistency_notes:
  - Se mantiene una dicción moderna y reverente, sin introducir terminología eclesiástica ajena al hebreo.
  - '''No hay'' funciona para ambos miembros del paralelismo y evita una calca rígida.'
  - La nota de pie preserva la alternativa léxica documentada para קוֹל sin sobreexplicar el verso.
