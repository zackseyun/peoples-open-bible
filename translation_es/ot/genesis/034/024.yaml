    text: Hebrew literally, 'all who went out of the gate of his city,' an idiom for the townsmen/citizens who participated in public life.
    reason: cultural_note
  - marker: b
    text: Or 'heeded' Hamor and Shechem. The Hebrew can imply not only hearing but responding favorably to their proposal.
    reason: lexical_alternative
  - marker: c
    text: Or 'every male, all who went out of the gate of his city, was circumcised'.
    reason: previous_rendering
