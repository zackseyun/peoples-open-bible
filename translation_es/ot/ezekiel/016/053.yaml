  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido del hebreo y del POB inglés: mantiene el modismo de restauración con «restauraré ... fortunas», conserva «hijas» para בנותיה, y refleja בְּתוֹכָהְנָה con una expresión natural en español. Sin embargo, la distribución y el contenido de las notas no siguen fielmente el rastro de auditoría: falta la nota léxica sobre la alternativa «cautiverio/cautivos» para el modismo שׁוּב שְׁבִית, y la nota [b] del borrador introduce una explicación no documentada («otras ciudades/restauraciones») en lugar de aclarar el referente de «hijas» como hace el POB inglés.'
  spanish_quality_summary: 'El español es claro y digno, pero «en medio de ellas» suena algo más rígido que «entre ellas» en este contexto; ambas son válidas, aunque no exigen cambio. El problema principal de calidad es paratextual: la nota [a] dice «Sodoma y Samaria», aunque el anclaje está solo en la primera ocurrencia «sus hijas[a]»; conviene dejar la nota como explicación general de «hijas» en el versículo y usar la segunda nota para el modismo de «fortunas».'
  glossary_alignment: No hay conflicto con la terminología del proyecto. Los nombres propios («Sodoma», «Samaria») están bien. El uso de «fortunas» coincide con la decisión léxica auditada para שְׁבִית/שבות. No hay términos teológicos del glosario principal en disputa.
  issues:
  - severity: medium
    issue: La nota [a] no preserva la nota léxica del POB sobre el modismo hebreo de restauración.
    rationale: El POB inglés documenta explícitamente la alternativa «restore their captivity / bring back their captives» para שׁוּב שְׁבִית. Esa información debe conservarse en español como nota léxica, especialmente porque «fortunas» puede necesitar aclaración.
  - severity: medium
