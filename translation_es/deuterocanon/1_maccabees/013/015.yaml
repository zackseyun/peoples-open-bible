base_translation:
  language: en
  yaml_path: translation/deuterocanon/1_maccabees/013/015.yaml
  text: As for the silver that your brother Jonathan owed to the royal treasury because of the needs he had[b][a], we have held him liable for it.
  footnotes:
  - marker: a
    text: Or, 'because of the needs he had.' The Greek phrase can refer more broadly to needs, obligations, or official functions; the main text takes it in an administrative sense suited to the context of royal debt.
    reason: lexical_alternative
  - marker: b
    text: The Greek verb literally can mean 'hold fast' or 'constrain.' In this context it is understood as remitting or releasing the debt, since the speaker is granting Jonathan favor rather than imposing liability.
    reason: lexical_alternative
