translation:
  language: es
  text: Añade iniquidad a su iniquidad,[a] y no permitas que entren en tu rectitud.[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El sustantivo hebreo puede significar iniquidad, culpa o la consecuencia de la culpa.
    reason: lexical_alternative
  - marker: b
    text: 'O: «tu justicia». El hebreo puede sugerir la rectitud de Dios como su acción justa o vindicadora.'
    reason: alternative_reading
lexical_decisions:
- source_word: תְּנָה
  english_pob_choice: Add
  chosen_spanish: Añade
  alternatives_spanish:
  - Da
  - Pon
  - Agrega
  lexicon: HALOT
  rationale: El imperativo dirigido a Dios pide una acción que incremente o acumule lo ya presente. «Añade» conserva la fuerza breve del hebreo y el matiz de acumulación del contexto imprecatorio.
- source_word: עָוֺן
  english_pob_choice: iniquity
  chosen_spanish: iniquidad
  alternatives_spanish:
  - culpa
  - maldad
  - castigo por su culpa
  lexicon: HALOT
  rationale: El término puede abarcar iniquidad, culpa o consecuencia de culpa. Siguiendo la revisión inglesa más reciente, «iniquidad» mantiene la correspondencia léxica directa con עָוֺן sin resolver la ambigüedad hacia castigo o culpa solamente.
- source_word: עַל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - sobre
  - encima de
  lexicon: HALOT
  rationale: Aunque el hebreo usa una preposición de superposición, en español la construcción natural para expresar acumulación es «añadir X a Y». Mantiene la relación semántica sin forzar una calca.
- source_word: עֲוֺנָם
  english_pob_choice: their iniquity
  chosen_spanish: su iniquidad
  alternatives_spanish:
  - su culpa
  - su maldad
  lexicon: HALOT
  rationale: 'Se mantiene la misma base léxica que en la primera ocurrencia para conservar el paralelismo y el efecto de acumulación: la misma categoría de pecado sobre la misma categoría de pecado.'
- source_word: וְאַל
  english_pob_choice: and do not let
  chosen_spanish: y no permitas que
  alternatives_spanish:
  - y no dejes que
  - y que no
  lexicon: HALOT
  rationale: En español, «no permitas que» comunica con claridad la prohibición/jussivo dirigida a Dios, equivalente al valor volitivo del hebreo. Evita una orden seca que sonaría menos natural en oración.
- source_word: יָבֹאוּ
  english_pob_choice: come into
  chosen_spanish: entren en
  alternatives_spanish:
  - vengan a
  - entren a
  lexicon: HALOT
  rationale: El verbo de movimiento con la preposición siguiente se expresa de manera idiomática como «entrar en». Esto preserva la imagen de acceso a una esfera o ámbito, no solo el acto de aproximarse.
- source_word: בְּצִדְקָתֶךָ
  english_pob_choice: your righteousness
  chosen_spanish: tu justicia
  alternatives_spanish:
  - tu justicia vindicadora
  - tu rectitud
  - tu justicia salvadora
  lexicon: HALOT
  rationale: Aquí se opta por «justicia» porque el contexto permite oír la acción justa/vindicadora de Dios, y en español esa palabra comunica mejor la posibilidad de acceso o participación en ese ámbito. Se mantiene la tensión teológica sin definirla como favor, salvación o simple rectitud moral.
theological_decisions:
- issue: Sentido de בְּצִדְקָתֶךָ en un salmo imprecatorio
  english_pob_reading: Retain the broader term 'your righteousness' rather than narrowing it to acquittal, covenant favor, or saving justice alone.
  chosen_spanish_reading: «tu justicia» conserva la amplitud semántica de la acción justa de Dios, incluyendo su vindicación y su orden recto, sin cerrarla a una sola explicación.
  alternative_spanish_readings:
  - tu justicia vindicadora
  - tu justicia salvadora
  - tu rectitud
  rationale: El hebreo no obliga a decidir entre una justicia judicial, vindicadora o salvífica. En español, «justicia» es suficientemente amplio y comprensible; además, evita un giro demasiado interpretativo que resolvería la tensión que el texto deja abierta.
  doctrine_reference: Translation philosophy §3; principle of preserving lexical/theological tension in contested righteousness/justice terms
translation_notes:
  revision_awareness: La redacción sigue de cerca la revisión inglesa más reciente, que prefirió «iniquity» para ambas ocurrencias de עָוֺן, y conserva la nota sobre la posible lectura alternativa de la frase final. El español refleja esa misma decisión léxica y mantiene la tensión interpretativa de צִדְקָה/צדקתך.
  spanish_consistency_notes:
  - Se mantiene la misma traducción de עָוֺן en ambas apariciones para conservar el paralelismo.
  - Se evita «SEÑOR» y se traduce el poseedor divino de forma directa como «tu».
  - «Justicia» se usa de modo consistente con el marco POB para preservar la amplitud de צדקה sin reducirla a una sola acepción.
  - La puntuación y el orden siguen una cadencia poética natural en español, sin añadir contenido explicativo al cuerpo del versículo.
