- from: Y pondrá su mano sobre la cabeza de la ofrenda por el pecado[a] y la degollará para ofrenda por el pecado, en el lugar donde se degüella el holocausto.
  to: Y pondrá su mano sobre la cabeza de la ofrenda por el pecado[a] y la sacrificará como ofrenda por el pecado, en el lugar donde se sacrifica el holocausto.
