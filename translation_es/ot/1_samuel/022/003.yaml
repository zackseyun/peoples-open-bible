translation:
  language: es
  text: 'Entonces David se fue de allí a Mizpa[a] de Moab, y dijo al rey de Moab: «Por favor, deja que mi padre y mi madre vengan[b] a quedarse con ustedes hasta que yo sepa qué hará Dios por mí[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Mizpá de Moab»; es un nombre propio cuya vocalización varía en la tradición de traducción.
    reason: lexical_alternative
  - marker: b
    text: O «deja que mi padre y mi madre salgan hacia ustedes» o «salgan y se queden con ustedes»; el hebreo dice literalmente «salgan/vengan afuera», pero aquí el sentido es que queden bajo el cuidado del rey de Moab.
    reason: lexical_alternative
  - marker: c
    text: O «qué hará Dios conmigo» o «qué me hará Dios»; la construcción hebrea también puede entenderse de esas maneras.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלֶךְ
  english_pob_choice: went
  chosen_spanish: se fue
  alternatives_spanish:
  - partió
  - fue
  lexicon: HALOT
  rationale: El wayyiqtol de הלך expresa un movimiento narrativo sencillo. «Se fue» es natural en español y conserva la secuencia narrativa sin volverla rígida.
- source_word: מִשָּׁם
  english_pob_choice: from there
  chosen_spanish: de allí
  alternatives_spanish:
  - desde allí
  - de ese lugar
  lexicon: HALOT
  rationale: La referencia locativa es directa; «de allí» reproduce bien la relación espacial con un español claro y bíblico sin arcaizar.
- source_word: מִצְפֵּה מוֹאָב
  english_pob_choice: Mizpeh of Moab
  chosen_spanish: Mizpa de Moab
  alternatives_spanish:
  - Mizpe de Moab
  - Mizpá de Moab
  lexicon: HALOT
  rationale: Es un topónimo. Se conserva la transliteración habitual en español bíblico, con la vocalización más probable según el texto hebreo y la tradición de nombres propios.
- source_word: מֶלֶךְ מוֹאָב
  english_pob_choice: the king of Moab
  chosen_spanish: el rey de Moab
  lexicon: HALOT
  rationale: La construcción en genitivo se traduce de forma directa y transparente.
- source_word: יֵצֵא נָא
  english_pob_choice: Please let ... come out and stay
  chosen_spanish: deja que ... salgan
  alternatives_spanish:
  - deja que ... salgan y queden bajo tu cuidado
  - permite que ... salgan
  lexicon: HALOT
  rationale: El hebreo dice literalmente «salga[n], por favor». En contexto, David pide que sus padres salgan de donde están con él para quedar bajo la protección del rey. El español principal conserva el verbo de salida y evita una paráfrasis excesiva; la idea de permanencia se sobreentiende por el contexto y se puede explicitar en nota.
- source_word: אָבִי וְאִמִּי
  english_pob_choice: my father and my mother
  chosen_spanish: mi padre y mi madre
  alternatives_spanish:
  - mis padres
  lexicon: HALOT
  rationale: El hebreo nombra explícitamente a ambos progenitores. Se conserva esa forma en vez de resumirla a «mis padres».
- source_word: אִתְּכֶם
  english_pob_choice: with you
  chosen_spanish: con ustedes
  alternatives_spanish:
  - con vosotros
  - junto a ustedes
  lexicon: HALOT
  rationale: El pronombre es plural. En español neutral latinoamericano, «ustedes» comunica naturalmente ese plural sin marcar registro innecesario.
- source_word: עַד אֲשֶׁר אֵדַע
  english_pob_choice: until I know
  chosen_spanish: hasta que yo sepa
  alternatives_spanish:
  - hasta que sepa
  - hasta saber
  lexicon: HALOT
  rationale: La cláusula temporal expresa duración futura. «Hasta que yo sepa» reproduce bien el valor aspectual y es idiomático en español.
- source_word: מַה יַּעֲשֶׂה לִּי אֱלֹהִים
  english_pob_choice: what God will do for me
  chosen_spanish: qué hará Dios por mí
  alternatives_spanish:
  - qué hará Dios conmigo
  - qué me hará Dios
  lexicon: HALOT
  rationale: 'La preposición לִי permite varias opciones: «por mí», «para mí», «conmigo», «a mí». En este contexto David espera la acción providencial de Dios en su favor; «por mí» refleja bien ese matiz sin negar la apertura semántica del hebreo.'
theological_decisions:
- issue: Renderización de אֱלֹהִים en la confesión de David
  english_pob_reading: God
  chosen_spanish_reading: Dios
  alternative_spanish_readings:
  - dios
  - los dioses
  rationale: Aunque אֱלֹהִים es morfológicamente plural, aquí lleva verbo singular y se refiere al Dios de Israel. «Dios» mantiene la lectura teológica y narrativa del texto.
  doctrine_reference: Monoteísmo bíblico / uso singular de אֱלֹהִים con referencia al Dios de Israel
translation_notes:
  revision_awareness: La revisión inglesa más reciente restauró explícitamente «come out and» para reflejar יֵצֵא נָא con mayor plenitud. En español se mantuvo el verbo de salida («salgan») y se conservó la fluidez idiomática; la noción de permanencia bajo la protección del rey queda integrada por el contexto y explicada en nota.
  spanish_consistency_notes:
  - Se usó «Dios» para אֱלֹהִים, conforme al criterio POB y a la lectura singular del verbo hebreo.
  - Se evitó «SEÑOR» porque aquí no aparece יהוה en el texto fuente.
  - «Ustedes» se emplea para el plural de אִתְּכֶם en español latinoamericano neutral.
  - Se preservó el paralelo formal «mi padre y mi madre» en vez de resumirlo como «mis padres».
