translation:
  language: es
  text: Señor[a], Dios del cielo, mira su arrogancia y ten misericordia de la humillación de nuestro pueblo, y mira el rostro de los que han sido santificados para ti en este día.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los consagrados a ti» o «tus santos». El griego dice literalmente «los que han sido santificados para ti».
    reason: lexical_alternative
lexical_decisions:
- source_word: Κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Maestro
  lexicon: LSJ
  rationale: Es el vocativo dirigido a Dios; en español, «Señor» es el equivalente reverente y natural para mantener la forma de invocación divina. Se conserva la dignidad litúrgica sin recurrir a una paráfrasis.
- source_word: ὁ θεὸς τοῦ οὐρανοῦ
  english_pob_choice: God of heaven
  chosen_spanish: Dios del cielo
  alternatives_spanish:
  - Dios de los cielos
  lexicon: LSJ
  rationale: La construcción genitiva se refleja de manera directa y idiomática. «Del cielo» mantiene el título bíblico convencional y evita una pluralización innecesaria que el griego no exige aquí.
- source_word: κάτιδε
  english_pob_choice: look upon
  chosen_spanish: mira
  alternatives_spanish:
  - mira con atención
  - contempla
  - fija tu mirada en
  lexicon: LSJ
  rationale: El imperativo pide que Dios atienda o considere la situación; «mira» en español puede llevar esa fuerza de atención cuando va con objeto directo y en registro de oración. Se evita una rigidez innecesaria como «mira sobre».
- source_word: ὑπερηφανίας
  english_pob_choice: arrogance
  chosen_spanish: arrogancias
  alternatives_spanish:
  - orgullo
  - insolencias
  - arrogancia
  lexicon: LSJ
  rationale: El plural griego sugiere expresiones o actos de soberbia. Se preserva ese matiz con el plural español «arrogancias», que suena algo menos abstracto que el singular y conserva la fuerza moral del término.
- source_word: ἐλέησον
  english_pob_choice: have mercy on
  chosen_spanish: ten misericordia de
  alternatives_spanish:
  - ten piedad de
  - ten compasión de
  - misericórdate de
  lexicon: LSJ
  rationale: En lenguaje de oración, la fórmula española natural y fiel es «ten misericordia de». Expresa adecuadamente la súplica de ἐλεέω sin perder peso devocional.
- source_word: ταπείνωσιν
  english_pob_choice: humiliation
  chosen_spanish: humillación
  alternatives_spanish:
  - abatimiento
  - humilde condición
  - aflicción
  lexicon: LSJ
  rationale: El contexto es la degradación sufrida por el pueblo, no solo una condición baja. «Humillación» conserva el sentido de vergüenza/abatimiento social y el tono de lamento del original.
- source_word: γένος ἡμῶν
  english_pob_choice: our people
  chosen_spanish: nuestro pueblo
  alternatives_spanish:
  - nuestra raza
  - nuestra nación
  - nuestra familia
  lexicon: LSJ
  rationale: γένος designa el grupo étnico/kinship colectivo; en español «pueblo» comunica bien la referencia comunitaria de Israel sin las connotaciones modernas problemáticas de «raza».
- source_word: ἐπίβλεψον
  english_pob_choice: look upon
  chosen_spanish: mira
  alternatives_spanish:
  - atiende
  - contempla
  - vuelve tu mirada a
  lexicon: LSJ
  rationale: Se repite el patrón de ruego visual. «Mira» mantiene la paralelismo con la primera petición y funciona naturalmente en español bíblico sin sobreexplicar.
- source_word: τὸ πρόσωπον
  english_pob_choice: the face
  chosen_spanish: el rostro
  alternatives_spanish:
  - la faz
  - la presencia
  - el semblante
  lexicon: LSJ
  rationale: «Rostro» es la correspondencia más natural y digna en español moderno para πρόσωπον. Conserva la concreción del griego sin convertirlo en un abstracto como «presencia».
- source_word: τῶν ἡγιασμένων σοι
  english_pob_choice: those sanctified to you
  chosen_spanish: de los que han sido santificados para ti
  alternatives_spanish:
  - de los consagrados a ti
  - de tus santos
  - de los que te han sido consagrados
  lexicon: LSJ
  rationale: Se mantiene el valor participial pasivo de ἁγιάζω y la relación dirigida a Dios con «para ti». «Santificados» conserva la conexión verbal con santidad sin resolver la frase hacia una sola tradición interpretativa.
- source_word: ἐν τῇ ἡμέρᾳ ταύτῃ
  english_pob_choice: on this day
  chosen_spanish: en este día
  alternatives_spanish:
  - en este día mismo
  - hoy
  - para este día
  lexicon: LSJ
  rationale: La expresión temporal es directa y solemne. «En este día» conserva el deíctico y la cadencia litúrgica del griego mejor que un simple «hoy».
theological_decisions:
- issue: 'τῶν ἡγιασμένων σοι: estatuto de los sujetos'
  english_pob_reading: those sanctified to you
  chosen_spanish_reading: los que han sido santificados para ti
  alternative_spanish_readings:
  - los consagrados a ti
  - tus santos
  rationale: Se conserva la tensión entre santificación como acto de Dios y la posible lectura de consagración/ pertenencia. El español elegido mantiene el participio pasivo sin cerrar el sentido a una categoría eclesial o angélica no explícita en el texto.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; consistency of key terms, or documented exception.'
- issue: 'Invocación divina: Κύριε + Dios del cielo'
  english_pob_reading: Lord, God of heaven
  chosen_spanish_reading: Señor, Dios del cielo
  alternative_spanish_readings:
  - Señor, Dios de los cielos
  - Señor Dios del cielo
  rationale: La combinación conserva la dirección de la oración a Dios y el título celestial sin neutralizar el vocativo. Se evita sustituir por fórmulas que oculten el apelativo directo del original.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; consistency of key terms, or documented exception.'
translation_notes:
  revision_awareness: El pasaje fue revisado recientemente y quedó marcado como sin cambios necesarios. La presente redacción sigue la concordancia alta del control cruzado y conserva las decisiones léxicas clave del audit trail en español natural.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός y «Señor» para Κύριε, en consonancia con el tratamiento reverente del texto fuente.
  - Se preserva la repetición de los imperativos de visión («mira... mira») para reflejar el paralelismo del griego.
  - «Santificados» se usa de forma consistente con el valor pasivo de ἁγιάζω y no se reemplaza por un término eclesiástico más cerrado.
