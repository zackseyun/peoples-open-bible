translation:
  language: es
  text: Y estos son los dirigentes[a] según sus casas paternas y sus divisiones[b], los que subieron conmigo desde Babilonia en el reinado de Artajerjes el rey.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los jefes» o «los principales» según sus casas paternas. El griego προηγούμενοι puede sugerir los que están al frente, y el paralelo hebreo apoya el sentido de cabezas de clan.
    reason: lexical_alternative
  - marker: b
    text: El griego dice «sus divisiones», mientras que el paralelo hebreo tiene una expresión genealógica («su registro genealógico» o «su linaje»). La traducción sigue el griego como testigo primario de 1 Esdras.
    reason: alternative_reading
lexical_decisions:
- source_word: οὗτοι
  english_pob_choice: these are
  chosen_spanish: y estos son
  alternatives_spanish:
  - estos son
  - y estos
  lexicon: LSJ
  rationale: El griego introduce una identificación nominal; en español, «y estos son» suena natural y mantiene el valor deictico e introductorio del texto.
- source_word: οἱ προηγούμενοι
  english_pob_choice: the leaders
  chosen_spanish: los jefes
  alternatives_spanish:
  - los líderes
  - los principales
  - los que iban delante
  lexicon: LSJ
  rationale: El audit trail inglés pasó de «leading men» a «leaders» para un valor más neutral. En español, «jefes» conserva la idea de cabeza o autoridad de grupo, en consonancia con el paralelo hebreo de «cabezas» de las casas paternas, sin forzar una terminología eclesiástica ajena.
- source_word: κατὰ τὰς πατριὰς αὐτῶν
  english_pob_choice: according to their fathers’ houses
  chosen_spanish: según sus casas paternas
  alternatives_spanish:
  - conforme a sus casas de padres
  - según sus familias paternas
  - por sus casas paternas
  lexicon: LSJ
  rationale: πατριά indica agrupación familiar o clánica; «casas paternas» sigue de cerca el sentido genealógico que también confirma el paralelo hebreo.
- source_word: καὶ τὰς μεριδαρχίας
  english_pob_choice: and their divisions
  chosen_spanish: y sus divisiones
  alternatives_spanish:
  - y sus repartos
  - y sus grupos
  - y sus subdivisiones
  lexicon: LSJ
  rationale: La lectura griega primaria habla de subdivisiones u ordenamientos. «Divisiones» preserva esa relación estructural sin añadir una explicación no dada por el texto.
- source_word: οἱ ἀναβάντες
  english_pob_choice: who went up
  chosen_spanish: los que subieron
  alternatives_spanish:
  - los que fueron subiendo
  - los que ascendieron
  - los que fueron arriba
  lexicon: LSJ
  rationale: «Subieron» conserva el idioma bíblico tradicional para el movimiento hacia Jerusalén, y en español suena natural y fiel.
- source_word: μετʼ ἐμοῦ
  english_pob_choice: with me
  chosen_spanish: conmigo
  alternatives_spanish:
  - junto conmigo
  - conmigo mismo
  lexicon: LSJ
  rationale: Equivalencia directa y natural en español.
- source_word: ἐκ Βαβυλῶνος
  english_pob_choice: from Babylon
  chosen_spanish: desde Babilonia
  alternatives_spanish:
  - de Babilonia
  - fuera de Babilonia
  lexicon: LSJ
  rationale: «Desde Babilonia» expresa mejor el punto de partida del viaje que el simple «de Babilonia».
- source_word: ἐν τῇ βασιλείᾳ Ἀρταξέρξου τοῦ βασιλέως
  english_pob_choice: in the reign of Artaxerxes the king
  chosen_spanish: en el reinado de Artajerjes, el rey
  alternatives_spanish:
  - durante el reinado de Artajerjes, el rey
  - en el reino de Artajerjes, el rey
  lexicon: LSJ
  rationale: βασιλεία aquí funciona temporalmente; «reinado» evita la ambigüedad de «reino» y reproduce la lectura inglesa decidida por el POB.
theological_decisions:
- issue: Título real de Artajerjes y ausencia de carga doctrinal especial
  english_pob_reading: in the reign of Artaxerxes the king
  chosen_spanish_reading: en el reinado de Artajerjes, el rey
  alternative_spanish_readings:
  - durante el reinado de Artajerjes, el rey
  - en el reino de Artajerjes, el rey
  rationale: No hay aquí una cuestión teológica sustantiva; el punto es histórico-narrativo. La formulación española conserva el referente temporal y el título real sin añadir matices interpretativos.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada de «leading men» a «leaders» para mayor neutralidad; la redacción española toma ese ajuste como orientación y lo refleja con «jefes», evitando una paráfrasis más interpretativa que el griego no exige.
  spanish_consistency_notes:
  - Se mantiene «Artajerjes» como forma habitual en español bíblico.
  - Se usa «Babilonia» y «reinado» para respetar el marco histórico del texto.
  - No se incorporan notas al pie porque el griego y el paralelo hebreo aquí convergen suficientemente en el sentido general, y no hay una alternativa textual que deba preservarse para la edición española.
