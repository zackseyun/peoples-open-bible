translation:
  language: es
  text: Y llegó a un acuerdo con los de Bet-sur[a] y salió de la ciudad, porque no tenían allí provisiones para permanecer encerrados en ella, porque era un año sabático para la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «era un sábado para la tierra», es decir, el año sabático cuando la tierra descansaba.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐποίησεν μετὰ τῶν ἐκ Βεθσούρων
  english_pob_choice: he came to terms with those in Bethsura
  chosen_spanish: hizo un acuerdo con los de Bet-sur
  alternatives_spanish:
  - llegó a un acuerdo con los de Bet-sur
  - trató con los de Bet-sur
  lexicon: LSJ
  rationale: El griego en narrativa histórica puede expresar una negociación o arreglo; en español, «hizo un acuerdo» conserva ese valor sin volverlo demasiado libre. Se mantiene el topónimo en forma naturalizada «Bet-sur» para una lectura eclesial moderna.
- source_word: ἐξῆλθε ἐκ τῆς πόλεως
  english_pob_choice: went out from the city
  chosen_spanish: salió de la ciudad
  alternatives_spanish:
  - salió de la ciudad hacia afuera
  - se fue de la ciudad
  lexicon: LSJ
  rationale: La forma simple «salió de la ciudad» reproduce con naturalidad el movimiento del aoristo sin añadir una implicación interpretativa que el griego no exige.
- source_word: διατροφή
  english_pob_choice: provisions
  chosen_spanish: provisiones
  alternatives_spanish:
  - alimentos
  - suministros
  - sustento
  lexicon: LSJ
  rationale: En contexto de asedio, «provisiones» comunica bien la reserva necesaria para subsistir y evita reducir el término solo a comida.
- source_word: τοῦ συνκλεισθαι ἐν αὐτῇ
  english_pob_choice: to remain shut up in it
  chosen_spanish: para permanecer encerrados en ella
  alternatives_spanish:
  - para estar encerrados en ella
  - para seguir encerrados en ella
  lexicon: LSJ
  rationale: El infinitivo articular expresa la condición de quedar sitiados; «permanecer encerrados» mantiene el sentido pasivo de reclusión sin sonar arcaico. El antecedente de «ella» es la ciudad.
- source_word: σάββατον ἦν τῇ γῇ
  english_pob_choice: it was a sabbath year for the land
  chosen_spanish: era un año de reposo para la tierra
  alternatives_spanish:
  - era un sábado para la tierra
  - era un año sabático para la tierra
  lexicon: LSJ
  rationale: El español requiere aclarar el valor del hebraísmo para evitar confundirlo con el sábado semanal. «Año de reposo» preserva la idea agrícola del descanso de la tierra y sigue el matiz explicado en la auditoría inglesa.
theological_decisions:
- issue: Referencia de σάββατον ἦν τῇ γῇ
  english_pob_reading: sabbath year for the land
  chosen_spanish_reading: año de reposo para la tierra
  alternative_spanish_readings:
  - año sabático para la tierra
  - un sábado para la tierra
  rationale: El contexto histórico de 1 Macabeos 6:49 alude a la tierra en descanso sabático, con la consiguiente escasez de recursos. «Año de reposo» conserva la referencia agrícola e histórica sin oscurecer el sentido para lectores en español.
  doctrine_reference: 1 Macabeos 6:49; Ley del año sabático en la Torá (cf. Levítico 25).
translation_notes:
  revision_awareness: No se aplicaron revisiones en el pass más reciente; la redacción inglesa quedó sin cambios y el griego de Swete coincide con el expediente. La versión española sigue esa línea y explicita el hebraísmo final para evitar ambigüedad.
  spanish_consistency_notes:
  - Se usó «Bet-sur» como forma española breve y reconocible del topónimo.
  - Se mantuvo un registro sobrio y bíblico, evitando calcos innecesarios como «salió fuera».
  - «Provisiones» y «encerrados» conservan el marco de asedio sin añadir detalles que no están en el texto.
  - La nota al pie marca la tensión entre la literalidad de «sábado» y la aclaración contextual de «año de reposo».
