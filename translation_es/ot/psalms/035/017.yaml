    reason: lexical_alternative
  - marker: b
    text: O «mi vida preciosa». El hebreo sugiere algo único y de gran valor.
    reason: lexical_alternative
  revision_rationale: Se corrige la principal falla idiomática y exegética cambiando «mi única» por «mi única vida», que comunica claramente el sentido de יְחִידָתִי sin perder su fuerza. Se reubican y simplifican las notas para que sus marcadores correspondan a la frase explicada. Además, se mejora la naturalidad y claridad con «Restaura» y «leones jóvenes», manteniendo fidelidad al hebreo y al rastro de auditoría inglés.
