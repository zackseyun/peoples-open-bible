translation:
  text: And Eleazar the Avaran saw one of the beasts armored with royal breastplates[a], and it towered above all the beasts[b], and it appeared that the king was on it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek 'one of the beasts'; in context these beasts are war elephants.
    reason: cultural_note
  - marker: b
    text: Or 'it seemed that the king was on it.' The Greek expresses appearance rather than certainty.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐλεάζαρ ὁ Σαυαρὰν
  chosen: Eleazar the Avaran
  alternatives:
  - Eleazar son of Savaran
  - Eleazar the Savaran
  lexicon: Greek proper-name/transliteration practice
  rationale: The epithet is a transliterated proper designation rather than a translatable common noun in this context. In 1 Maccabees this figure is commonly known as Eleazar Avaran; using the standard transliterated form preserves the name-like function of the Greek.
- source_word: ἐν τῶν θηρίων
  chosen: one of the beasts
  alternatives:
  - among the beasts
  - one among the elephants
  lexicon: LSJ
  rationale: θηρίον literally means 'beast' or 'animal.' In this military context the animals are war elephants, but the Greek here says 'beasts.' To stay anchored to the wording while remaining natural, 'one of the beasts' is preferred; the broader context makes clear these are elephants.
- source_word: τεθωρακισμένον θώραξιν βασιλικοῖς
  chosen: covered with royal armor
  alternatives:
  - armored with royal breastplates
  - equipped with royal cuirasses
  lexicon: LSJ
  rationale: The participle from θωρακίζω and the cognate noun θώραξ create an armor expression. The dative/plural form in Swete is awkward in English if rendered too literally. 'Covered with royal armor' captures the sense without forcing an unnatural repetition like 'armored with royal breastplates.' 'Royal' reflects βασιλικοῖς, indicating armor associated with the king.
- source_word: ὑπεράγον
  chosen: towered above
  alternatives:
  - surpassed
  - was higher than
  - excelled
  lexicon: LSJ
  rationale: The participle indicates prominence over the other animals, likely in size or conspicuousness. 'Towered above' communicates visible superiority in a vivid but still text-grounded way.
- source_word: ὤφθη ὅτι ἐν αὐτῷ ἐστιν ὁ βασιλεύς
  chosen: he thought that the king was on it
  alternatives:
  - it appeared that the king was in it
  - it seemed that the king was on it
  lexicon: LSJ
  rationale: ὤφθη ὅτι expresses appearance or seeming, not certainty. Because the narrative later shows this inference was mistaken, the English should avoid stating as fact that the king was there. 'He thought' makes explicit the inferential force in idiomatic English. 'On it' is more natural than 'in it' for riding an elephant, though the Greek ἐν αὐτῷ is literally 'in it/on it' depending on idiom.
