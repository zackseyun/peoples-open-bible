translation:
  language: es
  text: El sabio habla poco para sí[a][b], pero el bien de los necios derrama sabiduría[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Lectura griega: «El don de un necio no te beneficiará, porque sus ojos son muchos en lugar de uno». El testimonio hebreo y el griego difieren de manera sustancial en este versículo; el texto principal sigue el hebreo conservado, y se preserva la variante griega porque afecta de forma importante la interpretación.'
    reason: textual_variant
  - marker: b
    text: 'También puede traducirse: «habla brevemente».'
    reason: lexical_alternative
  - marker: c
    text: 'La cláusula final puede ser irónica: los necios derraman palabras como si repartieran sabiduría.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חָכָם
  english_pob_choice: wise man
  chosen_spanish: el sabio
  alternatives_spanish:
  - un hombre sabio
  - una persona sabia
  - los sabios
  lexicon: HALOT
  rationale: El hebreo es un adjetivo sustantivado; en español, «el sabio» conserva el valor proverbial y puede funcionar de modo genérico sin forzar el marcado masculino de manera innecesaria en una sentencia breve.
- source_word: בִּמְעַט
  english_pob_choice: little
  chosen_spanish: poco
  alternatives_spanish:
  - brevemente
  - con pocas palabras
  - en poco
  lexicon: HALOT
  rationale: La idea del hebreo es hablar en poca medida, con sobriedad verbal. «Habla poco» es natural en español y mantiene la concisión del proverbio.
- source_word: דִבֶּר
  english_pob_choice: speaks
  chosen_spanish: habla
  alternatives_spanish:
  - ha hablado
  - dice
  - habla brevemente
  lexicon: HALOT
  rationale: El presente proverbial en español comunica bien la verdad general del dicho y evita una forma demasiado literal o pesada.
- source_word: נַפְשׁוֹ
  english_pob_choice: for himself
  chosen_spanish: por sí mismo
  alternatives_spanish:
  - para sí
  - para su alma
  - de sí mismo
  lexicon: HALOT
  rationale: Aquí נֶפֶשׁ funciona de manera reflexiva/idiomática, no como «alma» en sentido antropológico. «Por sí mismo» conserva la referencia a la propia persona y evita introducir una lectura no requerida.
- source_word: וְטוֹבַת
  english_pob_choice: the goodness
  chosen_spanish: la bondad
  alternatives_spanish:
  - el bien
  - la benevolencia
  - la bondad/beneficencia
  lexicon: HALOT
  rationale: Dado que el hebreo טוֹבָה puede abarcar bondad, bien o beneficio, y que la revisión inglesa prefirió «goodness» frente a «gift», «bondad» es la opción más directa y sobria en español.
- source_word: כְּסִילִים
  english_pob_choice: of fools
  chosen_spanish: de los necios
  alternatives_spanish:
  - de los tontos
  - de los insensatos
  - de los necios/estúpidos
  lexicon: HALOT
  rationale: «Necios» es la equivalencia tradicional y precisa para כְּסִילִים en registro bíblico, sin suavizar el juicio sapiencial del texto.
- source_word: יִשְׁפוֹךְ
  english_pob_choice: pours out
  chosen_spanish: derrama
  alternatives_spanish:
  - derrama abundantemente
  - vacía
  - derraman
  lexicon: HALOT
  rationale: El verbo hebreo es vívido y transmite desbordamiento. «Derrama» conserva la imagen sin sonar artificial en español.
- source_word: חָכְמָה
  english_pob_choice: wisdom
  chosen_spanish: sabiduría
  alternatives_spanish:
  - prudencia
  - buen juicio
  lexicon: HALOT
  rationale: El término corresponde de manera directa a «sabiduría». Se mantiene incluso si el cierre puede tener un matiz irónico, como sugiere el audit trail inglés.
- source_word: δόσις
  english_pob_choice: gift
  chosen_spanish: don
  alternatives_spanish:
  - regalo
  - ofrenda
  - dádiva
  lexicon: BDAG
  rationale: 'La tradición griega ofrece una lectura alternativa significativa: el don o regalo del necio. Aunque el texto principal sigue el hebreo, el español necesita registrar esta variante sin absorberla en el cuerpo principal.'
theological_decisions:
- issue: Tensión textual entre el hebreo conservado y la lectura griega paralela
  english_pob_reading: Main text follows the extant Hebrew witness; the Greek diverges substantially and is preserved in a footnote because it materially affects interpretation.
  chosen_spanish_reading: El texto principal sigue el testimonio hebreo conservado; la lectura griega queda registrada en nota porque cambia de manera importante la interpretación.
  alternative_spanish_readings:
  - Un necio hace un don que no te beneficiará
  - El regalo del necio no te aprovechará
  rationale: En Sirácida, la tradición textual presenta una divergencia real. Como el POB inglés sigue el hebreo en el cuerpo del texto, el español hace lo mismo, pero conserva la variante griega para no borrar la tensión documentada.
  doctrine_reference: Textual criticism / canonicity awareness in deuterocanonical literature
- issue: Posible ironía en la cláusula final
  english_pob_reading: 'The final clause may be ironic: fools pour out words as if dispensing wisdom.'
  chosen_spanish_reading: 'La cláusula final puede leerse con ironía: los necios derraman palabras como si impartieran sabiduría.'
  alternative_spanish_readings:
  - Los necios derraman sabiduría de manera genuina
  - Los necios hablan mucho creyéndose sabios
  rationale: La propia nota inglesa admite ironía; por eso el español mantiene una formulación que no cierra la interpretación y permite el contraste sapiencial.
  doctrine_reference: Sapiential rhetoric / literary irony
translation_notes:
  revision_awareness: La revisión más reciente sustituyó «gift» por «goodness» para reflejar mejor טוֹבַת; el español adopta esa decisión con «bondad» y mantiene el resto del verso cercano al hebreo, sin perder la variante griega documentada en la nota.
  spanish_consistency_notes:
  - Se evita «SEÑOR» y otras sustituciones no pertinentes, porque no hay aquí un tetragrámaton ni una cita divina.
  - «Necios» se conserva como término sapiencial estable para כְּסִילִים.
  - La nota griega no se incorpora al cuerpo principal para no desplazar la prioridad dada al hebreo conservado en el audit trail.
  - 'El orden de las notas sigue a los anclajes del texto: [a], [b], [c].'
