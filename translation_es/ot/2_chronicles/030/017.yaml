translation:
  language: es
  text: Porque muchos en la asamblea no se habían santificado[a], y los levitas estaban encargados de la inmolación[b] de los corderos de la Pascua para todos los que no estaban limpios[c], para consagrarlos a Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘no se habían consagrado’. El hebreo usa lenguaje de santificación, aunque la cuestión inmediata es la purificación ritual.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, ‘las Pascuas’; es decir, los animales sacrificiales de la Pascua.
    reason: lexical_alternative
  - marker: c
    text: O ‘para todos los que estaban impuros’.
    reason: lexical_alternative
lexical_decisions:
- source_word: רַבַּת בַּקָּהָל
  english_pob_choice: many in the assembly
  chosen_spanish: muchos en la asamblea
  alternatives_spanish:
  - una gran multitud en la asamblea
  - muchos de la congregación
  lexicon: HALOT
  rationale: רַבַּת con בַּקָּהָל expresa una gran cantidad dentro del grupo reunido. «Asamblea» comunica bien קָהָל en un contexto cultual, y «muchos» mantiene la naturalidad del español sin perder el sentido cuantitativo.
- source_word: הִתְקַדָּשׁוּ
  english_pob_choice: had not sanctified themselves
  chosen_spanish: no se habían santificado
  alternatives_spanish:
  - no se habían consagrado
  - no se habían purificado
  lexicon: HALOT
  rationale: El hitpael de קדשׁ conserva lenguaje de santificación/consecación para el culto. En español, «santificado» refleja mejor esa carga que reducirlo solo a purificación ritual, aunque el contexto implique impureza ritual.
- source_word: הַלְוִיִּם
  english_pob_choice: the Levites
  chosen_spanish: los levitas
  alternatives_spanish:
  - los levíes
  lexicon: HALOT
  rationale: Es el nombre tribal/cultual estándar y «levitas» es la forma natural y reconocible en español.
- source_word: עַל
  english_pob_choice: were over
  chosen_spanish: estaban encargados de
  alternatives_spanish:
  - estaban sobre
  - eran responsables de
  lexicon: HALOT
  rationale: Aquí עַל expresa supervisión o responsabilidad. «Estaban encargados de» comunica esa idea con naturalidad en español y evita una construcción demasiado literal como «estaban sobre».
- source_word: שְׁחִיטַת הַפְּסָחִים
  english_pob_choice: the slaughter of the Passover lambs
  chosen_spanish: la degollación de los corderos de la Pascua
  alternatives_spanish:
  - el sacrificio de los corderos de la Pascua
  - la matanza de los corderos pascuales
  lexicon: HALOT
  rationale: שְׁחִיטָה indica degüello/degollación ritual. Dado que פְּסָחִים refiere aquí a los animales pascuales, «corderos de la Pascua» aclara el referente sin domesticar el término litúrgico.
- source_word: לְכֹל לֹא טָהוֹר
  english_pob_choice: for everyone who was not clean
  chosen_spanish: para todos los que no estaban limpios
  alternatives_spanish:
  - para todos los que estaban impuros
  - para todos los que no eran ritualmente limpios
  lexicon: HALOT
  rationale: טָהוֹר aquí es limpieza ritual. «No estaban limpios» preserva la claridad moderna y la oposición cultual, sin forzar un tecnicismo innecesario.
- source_word: לְהַקְדִּישׁ לַיהוָה
  english_pob_choice: to consecrate them to Yahweh
  chosen_spanish: para consagrarlos a Yahvé
  alternatives_spanish:
  - para santificarlos a Yahvé
  - para hacerlos santos a Yahvé
  lexicon: HALOT
  rationale: El infinitivo de קדשׁ expresa el propósito cultual. «Consagrarlos» en español mantiene el matiz de dedicación sagrada y evita borrar la tensión entre santificación y pureza ritual. Se entiende el objeto implícito a partir del contexto inmediato de los sacrificios pascuales.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: Se conserva el nombre divino con la forma de transliteración usada por el proyecto, en lugar de sustituirlo por un título.
theological_decisions:
- issue: Lenguaje de קדשׁ en contexto pascual
  english_pob_reading: Use 'sanctified/consecrate' language rather than reducing both instances to mere ritual purification.
  chosen_spanish_reading: Mantener «santificado» y «consagrarlos» en vez de reducir todo a «purificar»
  alternative_spanish_readings:
  - usar solo «purificar» y «hacer santos»
  - usar «consagrar» en ambos casos
  rationale: El versículo trata de elegibilidad ritual, pero el hebreo conserva el campo semántico de קדשׁ. La traducción distingue entre santificación/consagración y limpieza ritual, sin ocultar que ambas realidades están relacionadas.
  doctrine_reference: Translation philosophy §§1, 5
- issue: Objeto implícito en «para consagrarlos a Yahvé»
  english_pob_reading: Understand the consecration as referring to the Passover lambs slaughtered on behalf of those who were unclean.
  chosen_spanish_reading: Entender que el objeto implícito son los corderos de la Pascua sacrificados por los levitas para los que estaban no limpios
  alternative_spanish_readings:
  - entender que se consagran directamente las personas
  - dejar el objeto sin explicitar
  rationale: La sintaxis hebrea no expresa el objeto, pero el contexto favorece los sacrificios pascuales. Añadir «los» en español sería demasiado interpretativo; por eso se deja implícito, aunque la frase queda orientada por el contexto.
  doctrine_reference: Translation philosophy §1
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB en la que se reemplazó la relación causal implícita por una coordinación más directa y se optó por un sustantivo más formal para el acto sacrificial. En español se reflejan esos ajustes con «y» y «degollación», manteniendo el tono cultual y la estructura del hebreo.
  spanish_consistency_notes:
  - Se usa «Yahvé» conforme al estándar del proyecto para יהוה.
  - Se preserva la distinción entre santificación/consagración y limpieza ritual.
  - Se evita sustituir el nombre divino por un título y se mantiene el registro bíblico formal.
  - Las notas a pie distinguen el sentido literal de los términos pascuales y la limpieza ritual sin sobreexplicar el texto principal.
