base_translation:
  language: en
  yaml_path: translation/deuterocanon/3_maccabees/006/004.yaml
  text: Father[a], you who destroyed Pharaoh, the former ruler of this Egypt, when he was lifted up in lawless boldness and boastful speech, increasing in presumptuous deeds, together with his proud army, drowning them in the sea, and who shone forth the light of mercy upon the people of Israel[c][b],
