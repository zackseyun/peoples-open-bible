base_translation:
  language: en
  yaml_path: translation/ot/amos/006/002.yaml
  text: Cross over to Calneh and see[a]; and from there go to Hamath the great; then go down to Gath of the Philistines[b]. Are they better than these kingdoms? Or is their territory greater than your territory?
  footnotes:
  - marker: a
    text: Or, 'Are you better than these kingdoms?' The Hebrew adjective 'better' has no explicit subject, so the comparison may be understood either of the named cities/kingdoms or of the people being addressed.
    reason: alternative_reading
  - marker: b
    text: Calneh is a place name; some identify it with a city in northern Syria or Mesopotamia, but the identification is uncertain.
    reason: cultural_note
