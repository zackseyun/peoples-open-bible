translation:
  language: es
  text: Mejor es habitar en un rincón del tejado que con una mujer rencillosa en una casa compartida[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «con una mujer contenciosa y una casa en común». La última frase es muy breve en hebreo y puede subrayar el hecho de compartir el mismo hogar más que la idea de una convivencia agradable.'
    reason: alternative_reading
lexical_decisions:
- source_word: טוֹב
  english_pob_choice: It is better
  chosen_spanish: Mejor es
  alternatives_spanish:
  - Es mejor
  - Mejor
  lexicon: HALOT
  rationale: En proverbios sapienciales, el adjetivo predicativo introduce una comparación evaluativa. «Mejor es» conserva el valor comparativo sin volverlo mecánico.
- source_word: שֶׁבֶת
  english_pob_choice: to live
  chosen_spanish: habitar
  alternatives_spanish:
  - vivir
  - morar
  - estar
  lexicon: HALOT
  rationale: Aunque literalmente puede significar «sentarse», aquí el contexto locativo pide el sentido de residir. «Habitar» suena natural y digno en español bíblico.
- source_word: עַל פִּנַּת גָּג
  english_pob_choice: on a corner of the roof
  chosen_spanish: en un rincón del tejado
  alternatives_spanish:
  - sobre una esquina del tejado
  - en una esquina del techo
  - sobre el rincón del techo
  lexicon: HALOT
  rationale: La imagen es la de un lugar estrecho y expuesto. «Rincón del tejado» transmite bien la concreción espacial; «tejado» mantiene el referente de cubierta plana propio del mundo bíblico.
- source_word: מֵאֵשֶׁת
  english_pob_choice: than with a ... wife
  chosen_spanish: que con una mujer
  alternatives_spanish:
  - que con una esposa
  - más que con una mujer
  lexicon: HALOT
  rationale: El prefijo comparativo se expresa naturalmente en español con «que con». Se mantiene «mujer» porque el hebreo dice literalmente «mujer/esposa», y el proverbio funciona con esa designación general.
- source_word: מִדְיָנִים
  english_pob_choice: quarrelsome
  chosen_spanish: rencillosa
  alternatives_spanish:
  - pendenciera
  - contenciosa
  - peleadora
  lexicon: HALOT
  rationale: El plural abstracto describe una disposición habitual a la disputa. «Rencillosa» comunica bien esa cualidad relacional sin sonar demasiado técnica; «contenciosa» es posible, pero menos natural en español actual.
- source_word: וּבֵית חָבֶר
  english_pob_choice: in a shared house
  chosen_spanish: en una casa compartida
  alternatives_spanish:
  - y en una casa en común
  - en una casa de convivencia
  - y en una casa compartida
  lexicon: HALOT
  rationale: La frase final es compacta y admite la idea de un hogar compartido o de convivencia forzada. «Casa compartida» conserva la tensión con el rincón del tejado y refleja la lectura auditada del POB inglés.
translation_notes:
  revision_awareness: Se siguió el estado de revisión más reciente, que marca el texto inglés como estable y sin cambios necesarios; no se incorporaron revisiones adicionales.
  spanish_consistency_notes:
  - Se mantuvo el paralelismo proverbial y la comparación implícita del hebreo con una estructura española fluida.
  - Se eligió «tejado» para conservar el marco cultural de la cubierta plana, sin sobreexplicar el escenario.
  - Se evitó traducir mecánicamente como «sentarse» porque en este contexto locativo el sentido es residencial.
  - «Casa compartida» refleja la ambigüedad auditada de וּבֵית חָבֶר y permite la nota alternativa preservada en inglés.
