translation:
  language: es
  text: Pero yo soy un gusano y no un hombre, oprobio de los hombres[a][b][c] y despreciado por el pueblo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «oprobio del hombre». El hebreo puede traducirse de manera más formal, pero aquí se refiere colectivamente a los seres humanos.
    reason: lexical_alternative
  - marker: b
    text: Hebreo adam; «hombre» o «humanidad» según el contexto.
    reason: alternative_reading
  - marker: c
    text: O «escarnio de la humanidad y despreciado por el pueblo». Esta fue una formulación previa más interpretativa de la frase.
    reason: previous_rendering
lexical_decisions:
- source_word: וְ/אָנֹכִי
  english_pob_choice: But I
  chosen_spanish: Pero yo
  alternatives_spanish:
  - Y yo
  - Mas yo
  lexicon: HALOT
  rationale: אָנֹכִי es un pronombre enfático de primera persona singular; el prefijo conjuntivo marca contraste fuerte con el contexto previo. «Pero yo» reproduce bien ese giro adversativo en español natural.
- source_word: תוֹלַעַת
  english_pob_choice: a worm
  chosen_spanish: un gusano
  alternatives_spanish:
  - un gusano
  - una lombriz
  - una larva
  lexicon: HALOT
  rationale: El término designa un gusano/grub usado metafóricamente para humillación extrema. «Gusano» es claro y natural en español, sin especificar indebidamente la especie.
- source_word: וְ/לֹא אִישׁ
  english_pob_choice: and not a man
  chosen_spanish: y no un hombre
  alternatives_spanish:
  - y no una persona
  - y no un ser humano
  lexicon: HALOT
  rationale: La negación es abrupta y preserva la contraposición con «gusano». «Hombre» conserva el singular de אִישׁ y la fuerza poética del contraste.
- source_word: חֶרְפַּת אָדָם
  english_pob_choice: a reproach of men
  chosen_spanish: el oprobio de la humanidad
  alternatives_spanish:
  - el oprobio del hombre
  - la afrenta de la gente
  - el escarnio de la humanidad
  lexicon: HALOT
  rationale: חֶרְפַּת es un sustantivo en constructo que expresa afrenta/reproche/vergüenza. «Oprobio» es un equivalente fuerte y bíblico; אָדָם aquí es colectivo, por eso «la humanidad» capta el sentido humano general mejor que un masculino singular.
- source_word: וּ/בְז֥וּי
  english_pob_choice: despised
  chosen_spanish: despreciado
  alternatives_spanish:
  - tenido en desprecio
  - desdeñado
  - aborrecido
  lexicon: HALOT
  rationale: El participio pasivo indica ser tratado con desprecio. «Despreciado» es breve, directo y mantiene el peso afectivo del hebreo.
- source_word: עָם
  english_pob_choice: the people
  chosen_spanish: por el pueblo
  alternatives_spanish:
  - por la gente
  - por el pueblo
  lexicon: HALOT
  rationale: עָם es colectivo; con el participio forma una segunda línea paralela que intensifica el desprecio público. «Por el pueblo» conserva la referencia comunitaria y la estructura natural en español.
theological_decisions:
- issue: Lenguaje colectivo de אָדָם en la primera hemistiquio
  english_pob_reading: man / mankind depending on context; here collective human sense
  chosen_spanish_reading: humanidad
  alternative_spanish_readings:
  - hombre
  - gente
  - ser humano
  rationale: El contexto no apunta a un varón individual, sino al colectivo humano. «Humanidad» preserva esa amplitud sin diluir la intensidad del reproche.
  doctrine_reference: Principios de fidelidad semántica y precisión de referentes humanos en traducción bíblica
- issue: Posible lectura cristológica del Salmo 22
  english_pob_reading: Translate the verse according to its Hebrew poetic sense of humiliation without importing explicit messianic wording into the text.
  chosen_spanish_reading: Mantener el habla del salmista sobre humillación, sin añadir lenguaje cristológico explícito.
  alternative_spanish_readings:
  - Introducir una formulación más mesiánica
  - Explicitar cumplimiento cristológico en el texto
  rationale: El versículo expresa humillación poética en la voz del salmista. La traducción debe dejar el desarrollo tipológico/canónico para notas o para el contexto bíblico, no incorporarlo al texto base.
  doctrine_reference: Salmo 22 en lectura canónica cristiana; filosofía de traducción §1 y §3
translation_notes:
  revision_awareness: La revisión más reciente del inglés POB volvió de una formulación más interpretativa («scorned by mankind») a una más literal («a reproach of men»). Esta versión española sigue esa decisión, conservando el paralelismo con un sustantivo de afrenta y un participio de desprecio, pero usando un español idiomático y publicable.
  spanish_consistency_notes:
  - Se mantuvo el contraste adversativo inicial con «Pero yo», equivalente al forcejo discursivo del hebreo y del inglés POB.
  - «Oprobio» se usó para חֶרְפַּת porque en español bíblico comunica bien afrenta/reproche sin perder gravedad.
  - Se evitó «SEÑOR» u otra terminología no pertinente, ya que el versículo no contiene el nombre divino.
  - 'Se conservó la asimetría de las dos cola poéticas: sustantivo de afrenta + participio de desprecio.'
