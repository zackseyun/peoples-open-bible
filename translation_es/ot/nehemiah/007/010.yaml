lexical_decisions:
- source_word: בְּנֵי
  english_pob_choice: The sons of
  chosen_spanish: Los hijos de
  alternatives_spanish:
  - Los descendientes de
  - Los hijos de
  lexicon: HALOT
  rationale: En este contexto de censo y lista genealógica, בְּנֵי funciona como designación de clan. En español, «hijos de» conserva la estructura formal del hebreo y suena natural; «descendientes de» sería más explicativo, pero menos pegado al texto.
- source_word: אָרַח
  english_pob_choice: Arah
  chosen_spanish: Arah
  alternatives_spanish:
  - Araj
  lexicon: HALOT
  rationale: Nombre propio/clánico; se translitera de forma estable. Se conserva «Arah» para alinearse con la tradición de nombres bíblicos en español y con la forma auditada en inglés.
- source_word: שֵׁשׁ מֵאוֹת חֲמִשִּׁים וּשְׁנָיִם
  english_pob_choice: six hundred fifty-two
  chosen_spanish: seiscientos cincuenta y dos
  alternatives_spanish:
  - seiscientos y cincuenta y dos
  lexicon: HALOT
  rationale: La secuencia numérica hebrea se expresa en español moderno con el valor cardinal completo. Se omite «y» entre cientos y decenas por fluidez y porque el original solo presenta la suma numeral.
