translation:
  text: Since our father has departed to the gods[a], and since we want those in the kingdom, being free from disturbance, to turn to the care of the Jews[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''has departed to the gods,'' a Hellenistic royal euphemism for death; some translations simplify this to ''has died.'''
    reason: lexical_alternative
  - marker: b
    text: The final clause is syntactically compressed in Greek and may also be understood more broadly as 'to give attention to Jewish affairs.'
    reason: alternative_reading
lexical_decisions:
- source_word: τοῦ πατρὸς ἡμῶν
  chosen: our father
  alternatives:
  - our ancestor
  - our late father
  lexicon: LSJ
  rationale: In royal correspondence this refers to the deceased predecessor (Seleucus IV). 'Our father' preserves the dynastic and courtly idiom without adding interpretation.
- source_word: εἰς θεοὺς μεταστάντος
  chosen: has departed to the gods
  alternatives:
  - has passed over to the gods
  - has died
  lexicon: LSJ
  rationale: μεθίστημι/μεταστάντος here is a euphemistic expression for death, and εἰς θεούς is part of the Hellenistic royal idiom. 'Departed to the gods' preserves the pagan court formula rather than flattening it to merely 'died'.
- source_word: βουλόμενοι
  chosen: we want
  alternatives:
  - wishing
  - desiring
  lexicon: BDAG
  rationale: A participle giving the rulers' stated intention. 'We want' is idiomatic modern English and fits the epistolary context.
- source_word: τοὺς ἐκ τῆς βασιλείας
  chosen: those in the kingdom
  alternatives:
  - those of the kingdom
  - our subjects throughout the kingdom
  lexicon: LSJ
  rationale: The phrase refers broadly to people belonging to the realm. 'Those in the kingdom' is concise and natural, while avoiding over-specification not explicit in the Greek.
- source_word: ἀπερισπάστως ὄντας
  chosen: being free from disturbance
  alternatives:
  - being untroubled
  - being undistracted
  - living without turmoil
  lexicon: LSJ
  rationale: ἀπερισπάστως conveys being untroubled or not pulled in different directions. In this political context 'free from disturbance' captures public stability better than the more inward 'undistracted'.
- source_word: γενέσθαι πρὸς τὴν τῶν Ἰουδαίων ἐπιμέλειαν
  chosen: to turn to the care of the Jews
  alternatives:
  - to attend to the affairs of the Jews
  - to concern themselves with the Jews
  - to give attention to the Jews
  lexicon: LSJ
  rationale: ἐπιμέλεια means care, attention, or administration. The construction is somewhat compressed; the sense is that the people of the kingdom may be in a settled condition with respect to Jewish affairs. 'Turn to the care of the Jews' stays close to the Greek while remaining intelligible, though the syntax is difficult.
