translation:
  language: es
  text: Porque de una prenda sale una polilla[a], y de una mujer sale la maldad de una mujer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «y de una mujer, la maldad de una mujer». El hebreo es breve y proverbial; el griego también dice «de una mujer, la maldad de una mujer».'
    reason: lexical_alternative
lexical_decisions:
- source_word: בגד / ἱματίων
  english_pob_choice: garment
  chosen_spanish: vestido
  alternatives_spanish:
  - ropa
  - prenda
  - vestidura
  lexicon: HALOT; LXX ἱμάτιον
  rationale: El término fuente designa una prenda de vestir de manera general. 'Vestido' es natural en español y conserva la imagen concreta sin ampliar a 'ropa' en sentido más abstracto.
- source_word: יצא / ἐκπορεύεται
  english_pob_choice: comes
  chosen_spanish: sale
  alternatives_spanish:
  - viene
  - sale de
  - surge
  lexicon: HALOT; BDAG ἐκπορεύομαι
  rationale: La idea proverbial es que algo 'sale' o 'proviene' de algo. 'Sale' es breve, idiomático y reproduce bien el movimiento de procedencia del hebreo y del griego.
- source_word: עש / σής
  english_pob_choice: moth
  chosen_spanish: polilla
  alternatives_spanish:
  - moth
  - gusano de ropa
  lexicon: HALOT; LXX σής
  rationale: '''Polilla'' es el equivalente natural en español para el insecto que daña las prendas. Mantiene la imagen proverbial de deterioro de la ropa.'
- source_word: אשה / γυναικός
  english_pob_choice: woman
  chosen_spanish: mujer
  alternatives_spanish:
  - esposa
  lexicon: HALOT; LXX γυνή
  rationale: El paralelo hebreo y griego usa el término general para 'mujer', no un vínculo conyugal específico. 'Mujer' conserva ese alcance amplio.
- source_word: רעת אשה / πονηρία γυναικός
  english_pob_choice: a woman's wickedness
  chosen_spanish: la maldad de una mujer
  alternatives_spanish:
  - la maldad femenina
  - el mal de una mujer
  - la perversidad de una mujer
  lexicon: HALOT; LSJ πονηρία
  rationale: La construcción es breve y proverbial; 'la maldad de una mujer' reproduce la relación posesiva/constructa sin suavizar el tono. 'Perversidad' sería posible, pero 'maldad' es más directa y transparente.
theological_decisions:
- issue: Tono proverbial fuerte y posible lectura misógina
  english_pob_reading: Retain the direct wording without softening or generalizing.
  chosen_spanish_reading: 'Mantener el enunciado directo: ''de una mujer sale la maldad de una mujer''.'
  alternative_spanish_readings:
  - de una mujer sale el mal
  - de una mujer sale la maldad femenina
  - de una mujer sale la perversidad
  rationale: El texto fuente presenta una sentencia proverbial dura. La versión española conserva esa aspereza sin convertirla en una generalización doctrinal más amplia ni atenuarla por razones de estilo.
  doctrine_reference: 'DOCTRINE.md: original-language primacy; preserve tension rather than resolve it; gender-accurate over gender-neutral'
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente, que duplicó 'comes' para reflejar el paralelismo. En español se mantiene ese paralelismo con 'sale' en ambos hemistiquios, sin forzar una glosa explicativa en el cuerpo del texto.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el nombre divino aparece explícitamente; aquí no aplica.
  - Se prefirió 'mujer' frente a 'esposa' por coherencia con el hebreo אשה y el griego γυνή.
  - La solución 'maldad de una mujer' conserva la tensión proverbial sin reinterpretarla como un juicio doctrinal general.
