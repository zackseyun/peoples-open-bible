translation:
  language: es
  text: 'Y cada uno volvió a Jerusalén y al resto de Judea[a], cada cual a su propia ciudad: los que habían venido con Zorobabel y Jesúa, Nehemías, Zareías, Resaías, Enenio, Mordecai, Beelsarus, Asfarasus, Boroelio, Roimo y Baana, sus líderes.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Varios nombres de esta lista difieren en su forma respecto del paralelo hebreo aproximado en Esdras/Nehemías. La traducción sigue el texto griego de 1 Esdras y no normaliza esos nombres a las formas hebreas.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐπέστρεψεν
  english_pob_choice: returned
  chosen_spanish: volvió
  alternatives_spanish:
  - regresó
  - retornó
  lexicon: LSJ
  rationale: ἐπέστρεψεν expresa el acto de volver a un lugar previo. «Volvió» es natural en español y conserva el sentido de retorno sin endurecer el ritmo de la oración.
- source_word: τὴν λοιπὴν Ἰουδαίαν
  english_pob_choice: the rest of Judea
  chosen_spanish: el resto de Judea
  alternatives_spanish:
  - la Judea restante
  - el resto de Judá
  lexicon: LSJ
  rationale: λοιπή indica lo que queda o permanece. «El resto de Judea» mantiene el contraste con Jerusalén y sigue de cerca la estructura del griego.
- source_word: ἕκαστος εἰς τὴν ἰδίαν πόλιν
  english_pob_choice: each to his own city
  chosen_spanish: cada cual a su propia ciudad
  alternatives_spanish:
  - cada uno a su propia ciudad
  - cada uno a su ciudad
  lexicon: LSJ
  rationale: ἕκαστος es distributivo; «cada cual» evita una repetición pesada y conserva el valor singular. «Su propia ciudad» refleja ἰδίαν πόλιν con claridad natural en español.
- source_word: οἱ ἐλθόντες
  english_pob_choice: the ones who had come
  chosen_spanish: los que habían venido
  alternatives_spanish:
  - los que vinieron
  - los venidos
  lexicon: LSJ
  rationale: El participio articular señala al grupo descrito. «Habían venido» expresa bien el valor anterior del participio en un contexto narrativo retrospectivo.
- source_word: μετὰ
  english_pob_choice: with
  chosen_spanish: con
  alternatives_spanish:
  - junto con
  lexicon: LSJ
  rationale: La preposición indica simple acompañamiento en la lista de retornados. «Con» es la opción más directa y transparente.
- source_word: Ζοροβαβὲλ καὶ Ἰησοῦ
  english_pob_choice: Zerubbabel and Jeshua
  chosen_spanish: Zorobabel y Jesúa
  alternatives_spanish:
  - Zorobabel y Josué
  - Zorobabel y Jesús
  lexicon: LSJ
  rationale: Se conservan transliteraciones de uso bíblico y se elige «Jesúa» para evitar la confusión con Jesús de Nazaret, siguiendo la práctica del inglés POB con Jeshua.
- source_word: τῶν προηγουμένων αὐτῶν
  english_pob_choice: their leaders
  chosen_spanish: sus dirigentes
  alternatives_spanish:
  - sus líderes
  - los que iban delante de ellos
  - sus jefes
  lexicon: LSJ
  rationale: προηγουμένων literalmente sugiere los que iban delante, es decir, quienes guiaban al grupo. «Dirigentes» comunica esa función sin perder el matiz de conducción.
- source_word: Ἰερουσαλήμ
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  alternatives_spanish:
  - Jerusalen
  lexicon: LSJ
  rationale: Forma estándar en español para el topónimo.
- source_word: proper-name list
  english_pob_choice: Nehemiah, Zareiah, Resaiah, Enenius, Mordecai, Beelsarus, Aspharasus, Boroelius, Roimus, and Baanah
  chosen_spanish: Nehemías, Zaraías, Resaías, Enenio, Mardoqueo, Beelsaro, Asfaraso, Boroelio, Roimo y Baana
  alternatives_spanish:
  - formas ajustadas a los paralelos hebreos aproximados de Esdras/Nehemías
  lexicon: LSJ
  rationale: Se sigue la secuencia y la forma griegas de 1 Esdras, sin normalizar los nombres a los paralelos hebreos aproximados. Esto preserva la huella textual propia del pasaje.
translation_notes:
  revision_awareness: Se revisó el pasaje contra el griego de Swete (1909) y el testimonio paralelo hebreo aproximado. No se requirieron cambios respecto del sentido base; se mantuvo la lista nominal griega sin normalización, y se conservó el valor distributivo de ἕκαστος y el matiz de acompañamiento de μετὰ.
  spanish_consistency_notes:
  - Se usa «Jesúa» para el líder postexílico, para evitar confusión con «Jesús».
  - Se prefirió «dirigentes» para τῶν προηγουμένων αὐτῶν por su naturalidad en español y su compatibilidad con el matiz de liderazgo.
  - Se mantuvo la lista de nombres según la forma griega del libro, aun cuando algunos difieran de los paralelos hebreos.
