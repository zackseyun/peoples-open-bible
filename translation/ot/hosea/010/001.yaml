theological_decisions:
- issue: Rendering of Israel's prosperity imagery in relation to idolatry
  chosen_reading: The verse depicts Israel as prosperous and fruitful, yet using that prosperity to increase idolatrous worship.
  alternative_readings:
  - The opening could be read negatively as 'an empty vine' rather than a luxuriant one.
  rationale: 'The immediate references to abundant fruit, improved land, multiplied altars, and enhanced pillars favor an ironic prosperity reading: blessing was redirected into false worship. This preserves the prophetic indictment without importing additional doctrinal claims.'
  doctrine_reference: Translation philosophy §1, §3
