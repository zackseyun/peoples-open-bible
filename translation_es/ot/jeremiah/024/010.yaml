review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura y el sentido general del hebreo: acción divina futura, dirección hostil «contra ellos», la tríada de juicio y la cláusula final sobre la tierra dada a ellos y a sus padres. También preserva correctamente «padres» frente a una opción más interpretativa como «antepasados». Sin embargo, hay dos puntos donde no sigue con suficiente precisión el expediente POB ni el valor contextual del hebreo: הָרָעָב en esta tríada profética se refiere a «hambruna»/«hambre generalizada» más que al estado subjetivo de «hambre», y «di a ellos» es gramaticalmente poco natural en español cuando el clítico «les» expresa mejor el dativo sin alterar el significado.'
  spanish_quality_summary: El texto es comprensible y digno, pero «el hambre» suena menos idiomático y menos específico que «la hambruna» en una fórmula de juicio profético. Además, «que di a ellos» resulta forzado en español bíblico moderno; «que les di a ellos y a sus padres» o, mejor aún para fluidez, «que les di a ellos y a sus padres» conserva el énfasis sin sonar calcado. El resto del versículo lee bien.
  glossary_alignment: 'No hay conflicto con los términos de proyecto principales. La decisión problemática es contextual: רָעָב debe alinearse mejor con el inglés POB «the famine» y con el sentido léxico de juicio colectivo, por lo que «la hambruna» encaja mejor que «el hambre». «La peste» con nota alternativa «la plaga» sí respeta la documentación lexical.'
  issues:
  - severity: medium
    issue: «el hambre» debilita el sentido de הָרָעָב en la tríada de juicio
    rationale: En Jeremías, חרב/רעב/דבר es una fórmula estable de juicio. Aquí רָעָב apunta a hambruna/famine, no meramente a la sensación de hambre. «La hambruna» o «el hambre generalizada» sería más fiel; «la hambruna» es la opción más natural y precisa.
  - severity: medium
    issue: «que di a ellos» es poco natural en español
    rationale: 'Aunque refleja el dativo hebreo, en español estándar y eclesial moderno el clítico «les» expresa mejor la relación indirecta: «que les di a ellos y a sus padres». Esto preserva el énfasis en «ellos» sin producir una construcción torpe.'
  revised_spanish_text: Y enviaré contra ellos la espada[a], la hambruna y la peste, hasta que sean consumidos de la tierra que les di a ellos y a sus padres.
  revised_footnotes:
  - marker: a
    text: O «la plaga». El hebreo puede denotar más ampliamente una enfermedad epidémica.
    reason: lexical_alternative
  revision_rationale: Se ajusta רָעָב a «la hambruna» para reflejar mejor la tríada profética de juicio y la elección del inglés POB «the famine». También se mejora la naturalidad del español con «les di a ellos y a sus padres», manteniendo la fuerza del dativo hebreo y la mención específica de «padres». No se requiere adjudicación adicional porque son correcciones claras de precisión léxica y estilo.
