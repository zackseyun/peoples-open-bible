translation:
  language: es
  text: Tal como Yahvé ha estado con mi señor el rey[a], así esté con Salomón y engrandezca su trono por encima del trono de mi señor el rey David.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «así esté Yahvé con Salomón». El jussivo hebreo deja implícito el sujeto, que se refiere a Yahvé en la cláusula anterior.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino del Tetragrama, siguiendo la decisión doctrinal del POB de no sustituirlo por un título. En español, 'Yahvé' es la transliteración estándar y clara para lectura eclesial.
- source_word: כַּאֲשֶׁר ... כֵּן
  english_pob_choice: Just as ... so
  chosen_spanish: Tal como ... así
  alternatives_spanish:
  - Así como ... así
  - Como ... así
  lexicon: HALOT
  rationale: La correlación comparativa se mantiene con una estructura natural en español que conserva el paralelismo formal entre la presencia pasada de Yahvé con David y el deseo para Salomón.
- source_word: הָיָה ... עִם
  english_pob_choice: has been with
  chosen_spanish: ha estado con
  alternatives_spanish:
  - estuvo con
  - ha acompañado a
  lexicon: HALOT
  rationale: El perfecto transmite una acción pasada con relevancia continua; 'ha estado con' preserva esa fuerza retrospectiva y la idea de acompañamiento divino.
- source_word: אֲדֹנִי הַמֶּלֶךְ
  english_pob_choice: my lord the king
  chosen_spanish: mi señor el rey
  alternatives_spanish:
  - mi señor, el rey
  - mi amo el rey
  lexicon: HALOT
  rationale: Es una fórmula cortesana de respeto. 'Mi señor el rey' conserva el honorífico posesivo y el título real sin forzar una paráfrasis.
- source_word: יהי
  english_pob_choice: may he be
  chosen_spanish: esté
  alternatives_spanish:
  - sea
  - que esté
  lexicon: HALOT
  rationale: El jussivo expresa deseo o bendición. En español, 'así esté con Salomón' mantiene la modalidad desiderativa y el sujeto implícito retomado del contexto.
- source_word: וִיגַדֵּל
  english_pob_choice: and make ... greater
  chosen_spanish: y haga ... más grande
  alternatives_spanish:
  - y engrandezca
  - y exalte
  - y haga mayor
  lexicon: HALOT
  rationale: La causativa de גדל se vierte de manera directa y clara. Con 'trono' como objeto, 'haga su trono más grande' preserva la idea comparativa sin perder la imagen concreta.
- source_word: כִּסְאוֹ
  english_pob_choice: his throne
  chosen_spanish: su trono
  alternatives_spanish:
  - su reinado
  - su trono real
  lexicon: HALOT
  rationale: Se mantiene la imagen concreta del trono, que el hebreo usa literalmente y que aquí participa de la comparación política y dinástica.
- source_word: מִכִּסֵּא
  english_pob_choice: greater than the throne of
  chosen_spanish: más grande que el trono de
  alternatives_spanish:
  - mayor que el trono de
  - por encima del trono de
  lexicon: HALOT
  rationale: El מן comparativo se expresa en español con 'más grande que'. Esto conserva la comparación explícita y evita una abstracción como 'mayor' si se quiere retener la imagen del trono.
- source_word: אֲדֹנִי הַמֶּלֶךְ דָּוִד
  english_pob_choice: my lord King David
  chosen_spanish: mi señor el rey David
  alternatives_spanish:
  - mi señor, el rey David
  - mi señor, rey David
  lexicon: HALOT
  rationale: Se conserva el tratamiento respetuoso hacia David y el orden natural del nombre propio con su título en español. No se añade puntuación explicativa que el hebreo no requiere.
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrama. Conforme a la doctrina del POB, se translitera el nombre divino en lugar de reemplazarlo por un título, preservando el valor pactal del nombre revelado.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Implicit subject in the jussive יהי
  english_pob_reading: may he be; the subject is implicit and refers back to the LORD
  chosen_spanish_reading: así esté con Salomón
  alternative_spanish_readings:
  - que esté con Salomón
  - así sea con Salomón
  rationale: El sujeto implícito se entiende por el contexto como Yahvé, no como Salomón. El español puede conservar esa implicación con el subjuntivo 'esté' sin introducir un sujeto explícito.
  doctrine_reference: 'Sintaxis del hebreo bíblico: jussivo con sujeto elíptico retomado del contexto inmediato'
translation_notes:
  revision_awareness: 'Coincide con el paso revisado más reciente: no se registraron cambios sustanciales en el texto fuente ni en la lectura auditada; la concordancia general es alta y el sentido permanece estable.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma consistente para יְהוָה, conforme al estándar del proyecto.
  - Se conserva 'mi señor el rey' como fórmula de respeto cortesano, sin sustituirla por 'siervo' o por una paráfrasis no atestiguada.
  - Se mantiene la imagen concreta de 'trono' y la comparación explícita 'más grande que', evitando abstracciones innecesarias.
