  text: וְ֠/הָ/אֲבָנִים תִּֽהְיֶ֜יןָ עַל שְׁמֹ֧ת בְּנֵֽי יִשְׂרָאֵ֛ל שְׁתֵּ֥ים עֶשְׂרֵ֖ה עַל שְׁמֹתָ֑/ם פִּתּוּחֵ֤י חוֹתָם֙ אִ֣ישׁ עַל שְׁמ֔/וֹ תִּֽהְיֶ֕יןָ לִ/שְׁנֵ֥י עָשָׂ֖ר שָֽׁבֶט־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/exodus/028/021.yaml
  text: And the stones shall be according to the names of the sons of Israel[a], twelve according to their names. They shall be like signet engravings, each according to his name[c][b], for the twelve tribes.
  footnotes:
  - marker: a
    text: Or 'bearing the names of the sons of Israel'; the Hebrew literally says 'the stones shall be upon/according to the names of the sons of Israel.'
    reason: lexical_alternative
  - marker: b
    text: Or 'with signet engravings' or 'engraved with the engraving of a seal.'
    reason: lexical_alternative
  - marker: c
    text: '''Sons of Israel'' is the Hebrew expression; some translations render it ''children of Israel'' or ''Israelites.'''
    reason: lexical_alternative
