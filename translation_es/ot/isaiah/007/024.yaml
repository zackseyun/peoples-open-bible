    rationale: 'Aunque el hebreo lleva artículo, en traducción instrumental española la forma indefinida suele sonar más natural: ''con flechas y con un arco''.'
  - severity: low
    issue: 'La nota b en español conserva una alternativa poco natural: ''será zarzas y espinos''.'
    rationale: Si se revisa el texto principal con una forma resultativa natural, la alternativa debe seguir siendo español idiomático; 'será zarzas y espinos' puede mantenerse como correspondencia más literal, pero conviene formularla mejor.
  revised_spanish_text: Con flechas y con un arco[a] vendrá allí, porque toda la tierra se convertirá en zarzas y espinos[b].
