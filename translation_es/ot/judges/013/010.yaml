revisions:
- from: 'Así que la mujer se apresuró y corrió, y se lo dijo a su marido[a], y le dijo: «Mira, el hombre que vino a mí aquel día se me ha aparecido».'
  to: 'Así que la mujer se apresuró, corrió y se lo dijo a su marido[a], y le dijo: «Mira, el hombre que vino a mí aquel día se me apareció».'
  rationale: Se ajusta «se me ha aparecido» a «se me apareció» para un español más idiomático y menos interpretativo, manteniendo el valor de נִרְאָה אֵלַי. También se simplifica la puntuación narrativa. La nota léxica se conserva con una redacción apenas afinada.
