translation:
  language: es
  text: Entonces al rey se le cambió el color[a], y sus pensamientos lo aterrorizaron; las articulaciones de sus caderas cedieron[b], y sus rodillas chocaban una contra otra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «su brillo cambió». El modismo arameo se refiere al cambio de su aspecto o complexión por el miedo.
    reason: lexical_alternative
  - marker: b
    text: O «las articulaciones de sus lomos se aflojaron». La expresión describe una debilidad física o un derrumbe causado por el terror.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱדַיִן
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - En ese momento
  lexicon: HALOT
  rationale: Marca secuencia temporal narrativa; «Entonces» es natural, formal y fiel al valor adverbial arameo.
- source_word: מַלְכָּא
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - rey
  lexicon: HALOT
  rationale: El sustantivo está en estado enfático determinado; «el rey» mantiene la referencia narrativa concreta a Belsasar.
- source_word: זִיוֹהִי שְׁנוֹהִי
  english_pob_choice: his color changed
  chosen_spanish: el color ... cambió
  alternatives_spanish:
  - su brillo cambió
  - su aspecto cambió
  - cambió de color
  lexicon: HALOT
  rationale: La expresión aramea es idiomática y describe el cambio visible del semblante o complexión por miedo. «El color ... cambió» conserva la imagen sin volverla opaca en español.
- source_word: רַעְיוֹנֹהִי
  english_pob_choice: his thoughts
  chosen_spanish: sus pensamientos
  alternatives_spanish:
  - su mente
  - sus reflexiones
  lexicon: HALOT
  rationale: El término designa pensamientos o impresiones mentales; «pensamientos» es la equivalencia más directa y transparente.
- source_word: יְבַהֲלוּנֵּהּ
  english_pob_choice: terrified him
  chosen_spanish: lo aterrorizaron
  alternatives_spanish:
  - lo alarmaron
  - lo perturbaban
  - lo atemorizaron
  lexicon: HALOT
  rationale: El verbo expresa alarma súbita e intensa; «lo aterrorizaron» reproduce bien la fuerza emocional del contexto.
- source_word: קִטְרֵי חַרְצֵהּ
  english_pob_choice: the joints of his hips
  chosen_spanish: las articulaciones de sus caderas
  alternatives_spanish:
  - las articulaciones de sus lomos
  - los nudos de sus lomos
  - sus caderas
  lexicon: HALOT
  rationale: La frase es idiomática y difícil. «Caderas» comunica en español la región corporal implicada, y «articulaciones» intenta preservar la imagen de un colapso físico sin introducir una glosa más interpretativa que «lomos».
- source_word: מִשְׁתָּרַיִן
  english_pob_choice: gave way
  chosen_spanish: cedieron
  alternatives_spanish:
  - se aflojaron
  - se desarticularon
  - se soltaron
  lexicon: HALOT
  rationale: El valor verbal apunta a soltarse o aflojarse; «cedieron» expresa bien la debilidad física repentina en un español natural.
- source_word: אַרְכֻבָּתֵהּ
  english_pob_choice: his knees
  chosen_spanish: sus rodillas
  alternatives_spanish:
  - sus rótulas
  lexicon: HALOT
  rationale: El término se refiere a las rodillas; «rodillas» es el equivalente estándar y claro.
- source_word: דָּא לְדָא
  english_pob_choice: against each other
  chosen_spanish: una contra otra
  alternatives_spanish:
  - entre sí
  - la una contra la otra
  lexicon: HALOT
  rationale: La expresión recíproca se traduce de modo idiomático en español. «Una contra otra» preserva el choque mutuo.
- source_word: נָקְשָׁן
  english_pob_choice: knocked
  chosen_spanish: se golpeaban
  alternatives_spanish:
  - chocaban
  - se repiqueteaban
  - golpeaban
  lexicon: HALOT
  rationale: Con las rodillas como sujeto, el verbo describe el sonido o impacto producido. «Se golpeaban» conserva la imagen física y evita una traducción demasiado libre.
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto arameo de Daniel 5:6 y el auditable POB inglés. No se aplicaron revisiones posteriores; el estado más reciente indica que no hubo cambios necesarios y la concordancia cruzada es alta.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo exige; este versículo no lo contiene.
  - Se mantiene el tono narrativo formal sin recurrir a frases eclesiásticas tradicionales que oscurezcan el idiomático arameo.
  - «Color» se conserva por la decisión léxica documentada del POB inglés; la nota aclara la alternativa más literal.
  - «Caderas» se eligió como solución comprensible en español para חַרְצֵהּ, evitando imponer «lomos» en el texto principal.
