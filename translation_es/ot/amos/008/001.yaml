translation:
  language: es
  text: 'Esto es lo que me mostró el Señor Yahvé: he aquí una canasta de fruta de verano[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una canasta de fruta madura». El hebreo dice «fruta de verano», una formulación que prepara el juego de sonidos con «fin» en el versículo siguiente.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּה
  english_pob_choice: This is what
  chosen_spanish: Así
  alternatives_spanish:
  - Esto es lo que
  - De este modo
  - Así fue como
  lexicon: HALOT
  rationale: La fórmula introductoria profética pide una equivalencia natural en español. «Así» conserva el valor demostrativo e introduce el informe visionario sin sonar forzado.
- source_word: הִרְאַנִי
  english_pob_choice: showed me
  chosen_spanish: me mostró
  alternatives_spanish:
  - me hizo ver
  - me dejó ver
  - me enseñó
  lexicon: HALOT
  rationale: El hifil de ראה expresa hacer ver; en un contexto de visión profética, «me mostró» es claro, idiomático y mantiene la iniciativa divina.
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: el Señor Yahvé
  alternatives_spanish:
  - el Señor Dios Yahvé
  - el Señor Yahweh
  - el Señor, Yahvé
  lexicon: HALOT
  rationale: Se conserva la distinción entre אֲדֹנָי y el nombre divino. La convención del proyecto exige «Yahvé» para יְהוָה, por lo que «el Señor Yahvé» evita el masking tradicional y mantiene el título compuesto.
- source_word: וְהִנֵּה
  english_pob_choice: behold
  chosen_spanish: y he aquí
  alternatives_spanish:
  - mira
  - y mira
  - y he aquí que
  lexicon: HALOT
  rationale: La partícula introduce una presentación repentina dentro de la visión. «Y he aquí» conserva el tono profético y la deíxis enfática.
- source_word: כְּלוּב
  english_pob_choice: basket
  chosen_spanish: canasta
  alternatives_spanish:
  - cesta
  - cesto
  - canasto
  lexicon: HALOT
  rationale: El contexto con קָיִץ favorece un recipiente para fruta. «Canasta» es natural en español y mantiene el sentido contextual sin imponer una forma demasiado específica.
- source_word: קָיִץ
  english_pob_choice: summer fruit
  chosen_spanish: fruta de verano
  alternatives_spanish:
  - fruta veraniega
  - fruta de la estación de verano
  - fruto de verano
  lexicon: HALOT
  rationale: Se conserva el vínculo léxico con «verano», necesario para el juego de palabras con קֵץ en el verso siguiente. «Fruta de verano» es transparente y cercano al hebreo.
theological_decisions:
- issue: Cómo renderizar יְהוָה en el título compuesto con אֲדֹנָי
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Dios
  - el Señor Yahweh
  rationale: El texto hebreo contiene explícitamente el nombre propio divino. Siguiendo la convención del proyecto, se traduce como «Yahvé» y no se oculta tras una mayúscula convencional. En español, la combinación con אֲדֹנָי queda naturalmente como «el Señor Yahvé».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor de la partícula visionaria וְהִנֵּה
  english_pob_reading: behold
  chosen_spanish_reading: y he aquí
  alternative_spanish_readings:
  - he aquí
  - mira
  - y mira
  rationale: No se trata de una mera transición narrativa, sino de una presentación súbita de algo visto. «Y he aquí» preserva esa fuerza revelatoria y el tono profético del hebreo.
  doctrine_reference: Uso literario-profético de fórmulas de visión en los profetas menores
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el audit trail inglés y no se introdujeron cambios sustantivos respecto de la decisión léxica central: visión profética + recipiente de fruta + referencia a «fruta de verano» para conservar la preparación del juego de palabras del verso siguiente. La principal adaptación fue la terminología del nombre divino según la política española del proyecto.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה en coherencia con el estándar del proyecto.
  - «Señor» se reserva para אֲדֹנָי dentro de la construcción compuesta.
  - «Y he aquí» conserva la función discursiva de introducción súbita de la visión.
  - «Fruta de verano» deja abierta la ambigüedad entre fruto estacional y fruta madura, que el hebreo permite y que el audit trail inglés documenta.
