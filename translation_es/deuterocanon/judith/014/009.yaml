translation:
  language: es
  text: Y cuando terminó de hablar[a], el pueblo gritó con fuerte voz y lanzó un clamor gozoso en su ciudad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «clamó»; el verbo griego puede significar un grito fuerte e incluso, en algunos contextos, un grito de guerra, pero aquí se trata del estallido celebratorio del pueblo.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὡς δὲ
  english_pob_choice: And when
  chosen_spanish: Y cuando
  alternatives_spanish:
  - Entonces, cuando
  - Ahora bien, cuando
  lexicon: LSJ
  rationale: La secuencia introduce el siguiente hecho con valor temporal. «Y cuando» conserva el avance narrativo sin sobrecargar el tono en español.
- source_word: ἐπαύσατο
  english_pob_choice: stopped
  chosen_spanish: dejó de
  alternatives_spanish:
  - cesó de
  - terminó de
  lexicon: LSJ
  rationale: El verbo expresa simplemente que la acción se detuvo. «Dejó de» es natural en español y evita la posible idea de culminación completa que podría sugerir «terminó de».
- source_word: λαλούσα
  english_pob_choice: speaking
  chosen_spanish: hablar
  alternatives_spanish:
  - hablando
  - diciendo estas cosas
  lexicon: LSJ
  rationale: El participio femenino modifica a la sujeto y señala la acción interrumpida. «Hablar» mantiene el sentido directo y digno del contexto.
- source_word: ἠλάλαξεν
  english_pob_choice: shouted
  chosen_spanish: gritó
  alternatives_spanish:
  - clamó
  - dio un grito
  lexicon: LSJ
  rationale: El verbo puede denotar un grito fuerte y, según el contexto, también un grito de guerra. Aquí el contexto es de celebración pública; «gritó» conserva la fuerza sonora sin introducir un matiz militar innecesario.
- source_word: ὁ λαὸς
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - la multitud
  lexicon: LSJ
  rationale: En español bíblico, «el pueblo» reproduce bien el colectivo comunitario de λαός y mantiene un registro sobrio.
- source_word: φωνῇ μεγάλῃ
  english_pob_choice: with a loud voice
  chosen_spanish: con voz fuerte
  alternatives_spanish:
  - en voz alta
  - con gran voz
  lexicon: LSJ
  rationale: La construcción dativa expresa modo. «Con voz fuerte» conserva la imagen concreta de la voz elevada y suena natural en español.
- source_word: ἔδωκεν φωνὴν
  english_pob_choice: raised a ... cry
  chosen_spanish: lanzó un clamor
  alternatives_spanish:
  - dio un grito
  - prorrumpió en un clamor
  lexicon: LSJ
  rationale: La expresión griega es idiomática para emitir un clamor. «Lanzó un clamor» comunica la irrupción vocal con fidelidad y sin literalidad rígida.
- source_word: εὐφρόσυνον
  english_pob_choice: joyful
  chosen_spanish: gozoso
  alternatives_spanish:
  - alegre
  - lleno de gozo
  lexicon: LSJ
  rationale: El adjetivo remite a alegría festiva. «Gozoso» conserva un matiz celebratorio acorde con el contexto y evita simplificarlo solo como felicidad general.
- source_word: ἐν τῇ πόλει αὐτῶν
  english_pob_choice: in their city
  chosen_spanish: en su ciudad
  alternatives_spanish:
  - dentro de su ciudad
  - en la ciudad de ellos
  lexicon: LSJ
  rationale: La frase sitúa el clamor en la ciudad propia del pueblo. «Su ciudad» preserva el posesivo αὐτῶν de forma fluida y clara.
theological_decisions:
- issue: 'Matiz de ἠλάλαξεν: grito celebratorio o grito de guerra'
  english_pob_reading: Here it is used for the people's celebratory outburst, not primarily a battle cry.
  chosen_spanish_reading: Se traduce como «gritó» en un contexto claramente celebratorio.
  alternative_spanish_readings:
  - clamó
  - dio un grito de guerra
  rationale: El contexto inmediato indica júbilo público; por eso se evita fijar un sentido militar que el griego permite pero no exige aquí.
  doctrine_reference: No doctrinal issue; lexical-contextual decision.
translation_notes:
  revision_awareness: El pasaje griego y el audit trail inglés muestran alta concordancia y no registran revisiones aplicadas. La redacción española mantiene esa lectura estable, conservando el valor temporal de ὡς δὲ, el cese de la acción verbal, el clamor colectivo y el matiz festivo del final.
  spanish_consistency_notes:
  - Se usa «Y cuando» para el enlace narrativo, siguiendo la función temporal del griego.
  - «El pueblo» mantiene el valor colectivo de λαός sin recurrir a un equivalente más coloquial.
  - Se conserva el posesivo en «su ciudad» para reflejar αὐτῶν.
  - «Gozoso» mantiene el tono celebratorio del adjetivo εὐφρόσυνον sin elevarlo a una paráfrasis más expansiva.
