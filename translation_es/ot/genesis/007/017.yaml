  text: וַֽ/יְהִ֧י הַ/מַּבּ֛וּל אַרְבָּעִ֥ים י֖וֹם עַל הָ/אָ֑רֶץ וַ/יִּרְבּ֣וּ הַ/מַּ֗יִם וַ/יִּשְׂאוּ֙ אֶת הַ/תֵּבָ֔ה וַ/תָּ֖רָם מֵ/עַ֥ל הָ/אָֽרֶץ־־׃
base_translation:
  language: en
  yaml_path: translation/ot/genesis/007/017.yaml
  text: And the flood was on the earth forty days[a], and the waters increased and lifted up the ark, so that it rose above the earth.
  footnotes:
  - marker: a
    text: Or 'And the flood was on the earth forty days.' The Hebrew idiom can be rendered more formally with 'was,' but 'continued' better conveys duration in English.
    reason: lexical_alternative
