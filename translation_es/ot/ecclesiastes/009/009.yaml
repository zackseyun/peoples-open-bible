translation:
  language: es
  text: Disfruta la vida con la esposa a quien amas todos los días de tu vida fugaz que él te ha dado debajo del sol —todos tus días fugaces—, porque esto es tu porción en la vida y en tu labor, en la que te afanas debajo del sol[a][b][c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “Ve la vida con la esposa a quien amas”. El hebreo “ver vida” puede significar experimentar o disfrutar la vida.'
    reason: lexical_alternative
  - marker: b
    text: Hebreo hebel, a menudo vertido “vanidad” o “vapor”; aquí comunica el carácter fugaz e insustancial de la vida.
    reason: lexical_alternative
  - marker: c
    text: El sujeto de “ha dado” está implícito en hebreo; el contexto más amplio sugiere a Dios, aunque no se lo nombra en esta cláusula.
    reason: alternative_reading
lexical_decisions:
- source_word: רְאֵה
  english_pob_choice: Enjoy
  chosen_spanish: Disfruta
  alternatives_spanish:
  - Ve
  - Mira
  - Experimenta
  lexicon: HALOT
  rationale: El verbo hebreo significa literalmente “ver”, pero en esta construcción sapiencial (“ver vida”) expresa la idea idiomática de experimentar o gozar la vida. “Disfruta” comunica bien esa fuerza en español natural sin borrar el matiz idiomático de la fuente.
- source_word: חַיִּים
  english_pob_choice: life
  chosen_spanish: la vida
  alternatives_spanish:
  - vidas
  - vivir
  lexicon: HALOT
  rationale: Aunque la forma es plural, funciona aquí como sustantivo singular abstracto. “La vida” transmite el uso hebreo de manera natural y fiel.
- source_word: עִם אִשָּׁה
  english_pob_choice: with the wife
  chosen_spanish: con la esposa
  alternatives_spanish:
  - con una esposa
  - con la mujer
  lexicon: HALOT
  rationale: El contexto apunta a la propia cónyuge, no a una mujer en general. “Esposa” preserva esa referencia relacional y evita una lectura genérica.
- source_word: אֲשֶׁר אָהַבְתָּ
  english_pob_choice: whom you love
  chosen_spanish: a quien amas
  alternatives_spanish:
  - a quien has amado
  - que amas
  lexicon: HALOT
  rationale: El perfecto hebreo puede expresarse en presente en este dicho exhortativo. “A quien amas” suena natural y mantiene el sentido relacional continuo.
- source_word: חַיֵּי הֶבְלֶךָ / יְמֵי הֶבְלֶךָ
  english_pob_choice: your fleeting life / your fleeting days
  chosen_spanish: tu vida fugaz / tus días fugaces
  alternatives_spanish:
  - tu vida vana / tus días vanos
  - tu vida de vapor / tus días de vapor
  - tu vida sin sentido / tus días sin sentido
  lexicon: HALOT
  rationale: הֶבֶל en Eclesiastés expresa transitoriedad, insustancialidad y fugacidad. “Fugaz” preserva el motivo de brevedad sin fijarlo demasiado en “vana” o “sin sentido”, que estrechan el alcance del término.
- source_word: אֲשֶׁר נָתַן לְךָ
  english_pob_choice: that he has given you
  chosen_spanish: que él te ha dado
  alternatives_spanish:
  - que Dios te ha dado
  - que te fue dado
  lexicon: HALOT
  rationale: El verbo tiene un sujeto implícito en hebreo. Mantener “él” conserva esa reserva textual y deja que el referente implícito permanezca implícito, tal como en el original.
- source_word: תַּחַת הַשֶּׁמֶשׁ
  english_pob_choice: under the sun
  chosen_spanish: debajo del sol
  alternatives_spanish:
  - bajo el sol
  - bajo el cielo
  lexicon: HALOT
  rationale: Es una expresión característica de Eclesiastés para la vida humana en el orden presente. “Debajo del sol” es claro y conserva el giro tradicional de la imagen.
- source_word: כִּי הוּא חֶלְקְךָ
  english_pob_choice: for that is your portion
  chosen_spanish: porque esa es tu porción
  alternatives_spanish:
  - porque ese es tu lote
  - porque esa es tu parte
  lexicon: HALOT
  rationale: חֵלֶק denota la parte asignada o porción otorgada. “Porción” mantiene la metáfora de una parte concedida en la vida.
- source_word: בַּחַיִּים
  english_pob_choice: in life
  chosen_spanish: en la vida
  alternatives_spanish:
  - en esta vida
  - en tu vida
  lexicon: HALOT
  rationale: La expresión es general; “en la vida” resulta breve y natural en español.
- source_word: וּבַעֲמָלְךָ
  english_pob_choice: and in your labor
  chosen_spanish: y en tu trabajo
  alternatives_spanish:
  - y en tu labor
  - y en tu afán
  lexicon: HALOT
  rationale: עָמָל puede denotar trabajo penoso o afanoso. “Trabajo” es una base comprensible en español; el matiz de esfuerzo queda reforzado por la cláusula siguiente.
- source_word: אֲשֶׁר אַתָּה עָמֵל
  english_pob_choice: at which you toil
  chosen_spanish: en el que te afanas
  alternatives_spanish:
  - en el que trabajas
  - por el que te esfuerzas
  - en que te fatigas
  lexicon: HALOT
  rationale: El participio enfatiza una actividad continua y esforzada. “Te afanas” recoge bien el tono de labor penosa sin resultar demasiado técnico.
theological_decisions:
- issue: Sujeto implícito de נָתַן
  english_pob_reading: Retain the implicit 'he' rather than supplying 'God' in the main text.
  chosen_spanish_reading: Mantener “él” en vez de explicitar “Dios” en el texto principal.
  alternative_spanish_readings:
  - “Dios te ha dado”
  - “te fue dado por Dios”
  rationale: El contexto amplio de Eclesiastés atribuye dones y circunstancias a Dios, pero este miembro no lo nombra expresamente. Conservar el pronombre indefinido/implícito respeta la reserva del hebreo y evita añadir una explicitación que el segmento no formula.
  doctrine_reference: Philosophia de traducción §1, §3
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto hebreo y el criterio auditado de la POB en inglés: conserva el valor idiomático de “ver vida”, mantiene la referencia implícita del dador y refleja הֶבֶל con un término español de fugacidad. No se adoptaron revisiones posteriores que alteraran estas decisiones.'
  spanish_consistency_notes:
  - Se usa “Yahvé” como norma general del proyecto cuando corresponda, pero este versículo no contiene el tetragrámaton.
  - Se prefirió “Mesías/Cristo” según contexto; aquí no aplica.
  - “Espíritu”, “gracia” y otros términos normativos del proyecto no aparecen en este versículo.
  - Se mantuvo un registro bíblico moderno y digno, evitando calcos innecesarios y sin desplazar la metáfora de porción/labor de Eclesiastés.
