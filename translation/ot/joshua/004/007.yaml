id: JOS.4.7
reference: Joshua 4:7
source:
  edition: WLC
  text: וַ/אֲמַרְתֶּ֣ם לָ/הֶ֗ם אֲשֶׁ֨ר נִכְרְת֜וּ מֵימֵ֤י הַ/יַּרְדֵּן֙ מִ/פְּנֵי֙ אֲר֣וֹן בְּרִית יְהוָ֔ה בְּ/עָבְר/וֹ֙ בַּ/יַּרְדֵּ֔ן נִכְרְת֖וּ מֵ֣י הַ/יַּרְדֵּ֑ן וְ֠/הָיוּ הָ/אֲבָנִ֨ים הָ/אֵ֧לֶּה לְ/זִכָּר֛וֹן לִ/בְנֵ֥י יִשְׂרָאֵ֖ל עַד עוֹלָֽם־־׃
translation:
  text: then you shall say to them[a], ‘The waters of the Jordan were cut off before the ark of the covenant of Yahweh. When it crossed over the Jordan, the waters of the Jordan were cut off.’ And these stones shall be a memorial to the sons of Israel forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for the children of Israel' or 'for the Israelites.' The Hebrew reads 'sons of Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נִכְרְתוּ
  chosen: were cut off
  alternatives:
  - were cut down
  - were cut off completely
  lexicon: HALOT
  rationale: The Niphal of כרת here describes the stopping/removal of the river's waters. 'Were cut off' is the most natural English equivalent and matches the repeated use in the verse.
- source_word: מֵימֵי / מֵי
  chosen: the waters of
  alternatives:
  - the water of
  lexicon: HALOT
  rationale: The plural construct with Jordan is idiomatically rendered 'the waters of the Jordan,' preserving the Hebrew expression and the sense of the river's flow.
- source_word: מִפְּנֵי
  chosen: before
  alternatives:
  - from before
  - in the presence of
  lexicon: HALOT
  rationale: In this context the phrase indicates what happened in front of or before the ark's presence. 'Before' is concise and natural while preserving the spatial sense.
- source_word: אֲרוֹן בְּרִית יְהוָה
  chosen: the ark of the covenant of the LORD
  alternatives:
  - the ark of the LORD's covenant
  lexicon: HALOT
  rationale: This preserves the full covenantal title and follows the doctrinal default of rendering יְהוָה as 'the LORD.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בְּעָבְרוֹ
  chosen: when it crossed through
  alternatives:
  - at its crossing
  - when he crossed
  lexicon: HALOT
  rationale: The infinitive construct with 3ms suffix refers back to the ark as grammatically masculine singular. English uses 'it' for the ark. 'Crossed through' captures movement through the Jordan rather than merely over it.
- source_word: וְהָיוּ
  chosen: so ... shall be
  alternatives:
  - and ... shall be
  - and ... became
  lexicon: HALOT
  rationale: The waw with perfect here carries result/future force in the instruction. 'So these stones shall be' communicates the consequential sense in idiomatic English.
- source_word: הָאֲבָנִים הָאֵלֶּה
  chosen: these stones
  alternatives:
  - these very stones
  lexicon: HALOT
  rationale: Straightforward demonstrative phrase; 'these stones' is sufficient and natural.
- source_word: לְזִכָּרוֹן
  chosen: a memorial
  alternatives:
  - for remembrance
  - as a reminder
  lexicon: HALOT
  rationale: '''Memorial'' best captures an enduring commemorative object rather than a mere mental reminder.'
- source_word: לִבְנֵי יִשְׂרָאֵל
  chosen: for the sons of Israel
  alternatives:
  - for the children of Israel
  - for the Israelites
  lexicon: HALOT
  rationale: Following the gender-accurate principle, בנים is rendered 'sons' rather than neutralized. 'Children of Israel' is traditional but less formally tied to the lexical form here.
- source_word: עַד עוֹלָם
  chosen: forever
  alternatives:
  - for all time
  - perpetually
  lexicon: HALOT
  rationale: This idiom denotes enduring duration. 'Forever' is the clearest modern English rendering.
