translation:
  language: es
  text: 'Él entrará en la Tierra Hermosa[a], y muchos[b] tropezarán; pero estos escaparán de su mano: Edom, Moab y los más prominentes[c] de los hijos de Amón.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘la tierra gloriosa’ o ‘la tierra agradable’.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: ‘muchos’; el referente implícito puede ser personas o tierras.'
    reason: lexical_alternative
  - marker: c
    text: 'O ‘el principal de los amonitas’. Hebreo: ‘los más prominentes de los hijos de Amón’.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבָא
  english_pob_choice: He will enter
  chosen_spanish: Él entrará
  alternatives_spanish:
  - Y él vendrá
  - Él entrará en
  lexicon: HALOT
  rationale: בוא puede significar ‘venir’ o ‘entrar’. Con el complemento ‘en la tierra’, ‘entrará’ expresa con naturalidad el movimiento hacia adentro y mantiene la fuerza del hebreo sin calcar una perífrasis innecesaria.
- source_word: בְּאֶרֶץ הַצְּבִי
  english_pob_choice: into the Beautiful Land
  chosen_spanish: en la Tierra Hermosa
  alternatives_spanish:
  - en la tierra gloriosa
  - en la tierra agradable
  lexicon: HALOT
  rationale: צְבִי puede referirse a belleza, esplendor o lo deseable. ‘Hermosa’ conserva la imagen y evita una interpretación excesiva; ‘Tierra’ mantiene el valor de אֶרֶץ como designación geográfica del contexto.
- source_word: וְרַבּוֹת
  english_pob_choice: many
  chosen_spanish: muchos
  alternatives_spanish:
  - muchas personas
  - muchas
  lexicon: HALOT
  rationale: El hebreo usa un plural sustantivado sin nombre explícito. En español, ‘muchos’ preserva esa amplitud y la ambigüedad del referente sin añadir ‘personas’ o ‘tierras’.
- source_word: יִכָּשֵׁלוּ
  english_pob_choice: will stumble
  chosen_spanish: tropezarán
  alternatives_spanish:
  - caerán
  - serán derribados
  lexicon: HALOT
  rationale: El niphal de כשל conserva la imagen de tropezar o tambalearse. ‘Tropezarán’ refleja mejor esa metáfora que ‘caerán’, que suena más interpretativo en español.
- source_word: וְאֵלֶּה יִמָּלְטוּ
  english_pob_choice: but these will escape
  chosen_spanish: pero estos escaparán
  alternatives_spanish:
  - y estos escaparán
  - pero estos serán librados
  lexicon: HALOT
  rationale: El contraste con la cláusula anterior pide ‘pero’. ימלטו significa escapar o ser librados; ‘escaparán’ encaja con el giro siguiente ‘de su mano’ y preserva la imagen concreta.
- source_word: מִיָּדוֹ
  english_pob_choice: from his hand
  chosen_spanish: de su mano
  alternatives_spanish:
  - de su poder
  - de su control
  lexicon: HALOT
  rationale: La expresión idiomática hebrea se mantiene literalmente. ‘Mano’ conserva la metáfora de dominio/poder sin convertirla en una explicación abstracta.
- source_word: אֱדוֹם וּמוֹאָב
  english_pob_choice: Edom, Moab
  chosen_spanish: Edom, Moab
  lexicon: HALOT
  rationale: Nombres propios estándar transliterados al español bíblico.
- source_word: וְרֵאשִׁית בְּנֵי עַמּוֹן
  english_pob_choice: and the foremost of the sons of Ammon
  chosen_spanish: y la parte principal de los hijos de Amón
  alternatives_spanish:
  - y el principal de los hijos de Amón
  - y la primicia de los hijos de Amón
  lexicon: HALOT
  rationale: רֵאשִׁית literalmente es ‘primicia’, ‘principio’ o ‘parte principal’. ‘Parte principal’ preserva la estructura y evita resolver prematuramente si se trata de un jefe, una porción destacada o una primicia. ‘Amón’ sigue la forma española común del nombre.
theological_decisions:
- issue: Sentido geográfico de ‘la Tierra Hermosa’
  english_pob_reading: A title for the land of Israel/Judah, left implicit in the translation
  chosen_spanish_reading: Una designación geográfica titulada, sin añadir ‘Israel’ en el texto principal
  alternative_spanish_readings:
  - la tierra gloriosa
  - la tierra agradable
  - la tierra de Israel
  rationale: El hebreo presenta una designación identificable por el contexto de Daniel. La traducción conserva el título sin explicarlo, para no suprimir la fuerza retórica ni imponer una glosa interpretativa.
  doctrine_reference: 'Principio POB: preservar la tensión textual y el valor designativo del original'
- issue: Referente implícito de וְרַבּוֹת
  english_pob_reading: Rendered generically as 'many' without specifying the implied noun
  chosen_spanish_reading: ‘muchos’ sin explicitar si son personas, territorios o grupos
  alternative_spanish_readings:
  - muchas personas
  - muchas tierras
  rationale: El hebreo deja abierto el referente. En español, ‘muchos’ mantiene esa indeterminación y evita resolver una ambigüedad que el texto no resuelve.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it'
- issue: Valor de רֵאשִׁית en la frase final
  english_pob_reading: '''the foremost of the sons of Ammon'''
  chosen_spanish_reading: ‘la parte principal de los hijos de Amón’
  alternative_spanish_readings:
  - el principal de los hijos de Amón
  - la primicia de los hijos de Amón
  rationale: La frase hebrea no obliga a una solución única entre ‘principal’, ‘primicia’ o ‘porción’. El español escogido conserva la amplitud semántica y evita convertir la expresión en un cargo político no explícito.
  doctrine_reference: POB lexical transparency and restraint
translation_notes:
  revision_awareness: El borrador sigue de cerca la revisión inglesa más reciente, que prefirió ‘stumble’ frente a ‘fall’ para יִכָּשֵׁלוּ. Por eso el español usa ‘tropezarán’, manteniendo la imagen física y el matiz de tropiezo sin intensificarlo a derribo. También conserva la decisión inglesa de no especificar el referente de וְרַבּוֹת y de sostener la frase final con una traducción literal pero inteligible de רֵאשִׁית בְּנֵי עַמּוֹן.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ solo cuando el texto lo requiera explícitamente; este versículo no contiene el nombre divino.
  - Se mantiene ‘Edom’, ‘Moab’ y ‘Amón’ como transliteraciones bíblicas estándar en español.
  - Se conserva la metáfora de ‘mano’ para מִיָּדוֹ en vez de sustituirla por una explicación abstracta.
  - La puntuación sigue el contraste hebreo con punto y coma y dos puntos para reflejar las cláusulas sucesivas.
