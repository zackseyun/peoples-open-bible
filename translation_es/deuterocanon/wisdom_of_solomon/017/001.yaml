lexical_decisions:
- source_word: Μεγάλαι
  english_pob_choice: great
  chosen_spanish: grandes
  alternatives_spanish:
  - magnos
  - grandes y poderosos
  lexicon: LSJ
  rationale: El adjetivo predicado expresa la magnitud de los juicios de Dios. «Grandes» es natural en español y conserva el valor general sin añadir matices no explícitos en el griego.
- source_word: κρίσεις
  english_pob_choice: judgments
  chosen_spanish: juicios
  alternatives_spanish:
  - juicios judiciales
  - sentencias
  lexicon: LSJ
  rationale: En este contexto bíblico, κρίσεις remite a actos o expresiones de juicio. «Juicios» mantiene el sentido teológico y judicial con buen uso en español.
- source_word: δυσδιήγητοι
  english_pob_choice: hard to describe
  chosen_spanish: difíciles de describir
  alternatives_spanish:
  - indescriptibles
  - difíciles de explicar
  - más allá de narrarse
  lexicon: LSJ
  rationale: El compuesto señala dificultad para contarlos o explicarlos plenamente. «Difíciles de describir» conserva esa dificultad sin volver absoluto el sentido como «indescriptibles».
- source_word: ἀπαίδευτοι
  english_pob_choice: undisciplined
  chosen_spanish: indisciplinadas
  alternatives_spanish:
  - no instruidas
  - sin formación
  - untaught
  lexicon: LSJ
  rationale: El término implica falta de formación, disciplina o instrucción. «Indisciplinadas» conserva la fuerza moral e intelectual del texto y evita reducirlo solo a falta de enseñanza formal.
- source_word: ψυχαὶ
  english_pob_choice: souls
  chosen_spanish: almas
  alternatives_spanish:
  - personas
  - vidas
  lexicon: LSJ
  rationale: El griego dice literalmente «almas». Mantener «almas» preserva la textura antropológica y la solemnidad del pasaje.
- source_word: ἐπλανήθησαν
  english_pob_choice: went astray
  chosen_spanish: se extraviaron
  alternatives_spanish:
  - se desviaron
  - fueron llevadas astray
  - anduvieron errantes
  lexicon: LSJ
  rationale: El pasivo puede sugerir quedar fuera del camino o caer en error. «Se extraviaron» es idiomático en español y conserva el resultado sin añadir un agente externo explícito.
- source_word: διὰ τοῦτο
  english_pob_choice: therefore
  chosen_spanish: por eso
  alternatives_spanish:
  - por tanto
  - por esta razón
  lexicon: LSJ
  rationale: Marca inferencia a partir de la oración anterior. «Por eso» suena natural y claro en español contemporáneo.
theological_decisions:
- issue: Conservar ψυχαὶ como «almas» en vez de una forma colectiva más idiomática
  english_pob_reading: souls
  chosen_spanish_reading: almas
  alternative_spanish_readings:
  - personas
  - gente
  rationale: El texto griego usa ψυχαὶ de manera explícita, y la lectura inglesa de POB preservó «souls». En español, «almas» es comprensible y mantiene la carga antropológica y moral del pasaje.
  doctrine_reference: DOCTRINE.md §Translation philosophy, puntos 1 y 5
- issue: Reproducir la fuerza de δυσδιήγητοι sin absolutizarla
  english_pob_reading: hard to describe
  chosen_spanish_reading: difíciles de describir
  alternative_spanish_readings:
  - indescriptibles
  - difíciles de explicar
  - más allá de narrarse
  rationale: La POB inglesa eligió una formulación que expresa dificultad real sin convertirla en una afirmación filosófica de inefabilidad absoluta. «Difíciles de describir» conserva ese equilibrio.
  doctrine_reference: DOCTRINE.md §Translation philosophy
