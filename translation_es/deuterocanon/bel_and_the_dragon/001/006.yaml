lexical_decisions:
- source_word: γῆν
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - el mundo
  - la tierra habitada
  lexicon: LSJ
  rationale: γῆν aquí se refiere al ámbito creado en sentido amplio; «la tierra» conserva la amplitud cósmica y es natural en español bíblico sin restringir indebidamente a un territorio.
- source_word: ἔχοντα
  english_pob_choice: having
  chosen_spanish: teniendo
  alternatives_spanish:
  - poseyendo
  - que tiene
  lexicon: LSJ
  rationale: El participio se refleja de forma directa para mantener la sintaxis del segmento griego incompleto.
- source_word: πάσης σαρκὸς
  english_pob_choice: all flesh
  chosen_spanish: toda carne
  alternatives_spanish:
  - toda la humanidad
  - todo ser viviente
  lexicon: LSJ
  rationale: Se preserva el giro bíblico «carne» para no borrar la carga idiomática y teológica del texto.
- source_word: κυρίαν
  english_pob_choice: dominion
  chosen_spanish: dominio
  alternatives_spanish:
  - señorío
  - autoridad
  - soberanía
  lexicon: LSJ
  rationale: «Dominio» reproduce bien la idea de poder rector sobre toda carne y suena natural en español bíblico.
- source_word: δοκεῖ
  english_pob_choice: seem
  chosen_spanish: te parece
  alternatives_spanish:
  - te parece bien
  - te parece que
  lexicon: LSJ
  rationale: La pregunta del rey usa una percepción/juicio aparente; «te parece» conserva ese matiz sin sobreinterpretar.
- source_word: ζῶν θεός
  english_pob_choice: a living god
  chosen_spanish: un dios vivo
  alternatives_spanish:
  - un dios que vive
  - el Dios vivo
  lexicon: LSJ
  rationale: Como el griego carece de artículo, no se impone «el Dios vivo»; «un dios vivo» respeta la voz del rey pagano y el contraste con un ídolo.
- source_word: ὁρᾷς
  english_pob_choice: do you not see
  chosen_spanish: ¿no ves
  alternatives_spanish:
  - ¿acaso no ves
  - ¿no percibes
  lexicon: LSJ
  rationale: El interrogativo directo preserva la fuerza retórica del original.
- source_word: ὅσα ἐσθίει
  english_pob_choice: how much he eats
  chosen_spanish: cuánto come
  alternatives_spanish:
  - lo mucho que come
  - lo que come
  lexicon: LSJ
  rationale: «Cuánto come» reproduce la fuerza cuantitativa y explicativa del griego, sin añadir contenido ausente.
theological_decisions:
