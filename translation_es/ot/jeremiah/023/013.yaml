translation:
  language: es
  text: 'Y entre los profetas de Samaria vi algo ofensivo[a]: profetizaron por Baal[b] y extraviaron a mi pueblo Israel.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'necedad' o 'algo abominable' para 'algo ofensivo'. El término hebreo expresa algo moral o religiosamente escandaloso, impropio o indignante.
    reason: lexical_alternative
  - marker: b
    text: O 'en Baal' o 'para Baal'. El sentido es que su actividad profética se realizaba bajo la autoridad de Baal o en su nombre.
    reason: alternative_reading
lexical_decisions:
- source_word: וּ/בִ/נְבִיאֵי
  english_pob_choice: And among the prophets of
  chosen_spanish: Y entre los profetas de
  alternatives_spanish:
  - Y en los profetas de
  - Entre los profetas de
  lexicon: HALOT
  rationale: El hebreo combina la conjunción con ב־; en español, la forma natural y fiel es 'entre los profetas de', que conserva la idea de ámbito o esfera en la que Jeremías hace su observación.
- source_word: שֹׁמְרוֹן
  english_pob_choice: Samaria
  chosen_spanish: Samaria
  alternatives_spanish:
  - Samaría
  lexicon: HALOT
  rationale: Se mantiene el topónimo bíblico estándar en español como 'Samaria', que es claro y reconocible para el lector.
- source_word: רָאִיתִי
  english_pob_choice: I saw
  chosen_spanish: vi
  alternatives_spanish:
  - he visto
  lexicon: HALOT
  rationale: El perfecto hebreo se vierte de manera natural con pretérito perfecto simple en español; 'vi' conserva el tono declarativo del profeta.
- source_word: תִפְלָה
  english_pob_choice: something offensive
  chosen_spanish: algo ofensivo
  alternatives_spanish:
  - una necedad
  - algo abominable
  - una cosa repugnante
  lexicon: HALOT
  rationale: El término hebreo denota algo moral o religiosamente impropio, ofensivo o indignante. 'Algo ofensivo' comunica esa carga sin estrecharla a pura torpeza intelectual.
- source_word: הִנַּבְּא֣וּ
  english_pob_choice: they prophesied
  chosen_spanish: profetizaron
  alternatives_spanish:
  - actuaron como profetas
  lexicon: HALOT
  rationale: La forma hitpael de נבא se traduce directamente con 'profetizaron', que es la manera más clara y fiel de expresar su actividad profética.
- source_word: בַ/בַּ֔עַל
  english_pob_choice: by Baal
  chosen_spanish: por Baal
  alternatives_spanish:
  - en Baal
  - para Baal
  - bajo Baal
  lexicon: HALOT
  rationale: 'La preposición ב aquí marca asociación o referencia instrumental. ''Por Baal'' permite conservar la ambigüedad del hebreo: su actividad profética se hacía bajo la autoridad o en nombre de Baal, sin fijarla de forma más precisa de lo que el texto exige.'
- source_word: וַ/יַּתְע֥וּ
  english_pob_choice: and led ... astray
  chosen_spanish: y extraviaron
  alternatives_spanish:
  - y hicieron errar
  - y desviaron
  lexicon: HALOT
  rationale: El hifil de תעה es causativo. 'Extraviaron' conserva la idea de inducir a desviarse, con un registro natural en español bíblico contemporáneo.
- source_word: עַמִּי
  english_pob_choice: my people
  chosen_spanish: a mi pueblo
  alternatives_spanish:
  - a mi gente
  lexicon: HALOT
  rationale: 'Se mantiene el posesivo divino del texto: ''mi pueblo''. En español conviene añadir la preposición por la construcción verbal de ''extraviaron a''.'
- source_word: יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: Israel
  alternatives_spanish:
  - el Israel
  lexicon: HALOT
  rationale: El segundo objeto funciona en aposición explicativa. 'Israel' se conserva como identificación del pueblo, sin añadir glosa innecesaria.
theological_decisions:
- issue: Relación de los profetas con Baal en הִנַּבְּאוּ בַבַּעַל
  english_pob_reading: they prophesied by Baal
  chosen_spanish_reading: profetizaron por Baal
  alternative_spanish_readings:
  - profetizaron en Baal
  - profetizaron para Baal
  rationale: 'La formulación española debe conservar la tensión interpretativa del hebreo: no se especifica de manera exhaustiva si el sentido es ''en nombre de'', ''bajo la autoridad de'' o ''para''. ''Por Baal'' mantiene esa amplitud y el tono polémico del pasaje.'
  doctrine_reference: Translation philosophy §1, §3
- issue: Valor moral-religioso de תִפְלָה
  english_pob_reading: something offensive
  chosen_spanish_reading: algo ofensivo
  alternative_spanish_readings:
  - una necedad
  - algo abominable
  rationale: El contexto es corrupción profética y cultual, no mera estupidez. 'Algo ofensivo' reproduce el juicio moral/religioso fuerte sin endurecerlo en una sola equivalencia demasiado estrecha.
  doctrine_reference: Translation philosophy §6
translation_notes:
  revision_awareness: La versión inglesa auditada permanece sin cambios en la última revisión; no se registraron correcciones posteriores. La propuesta española sigue esa lectura estable y mantiene las alternativas semánticas documentadas para תִפְלָה y בַּבַּעַל.
  spanish_consistency_notes:
  - Se usa 'Yahvé' como forma por defecto solo cuando el texto lo exige explícitamente; en este versículo el referente divino aparece como 'mi' y no requiere sustitución nominal.
  - Se mantiene 'profetizaron' para נבא y 'extraviaron' para תעה, preservando el paralelismo entre falsa profecía y desvío del pueblo.
  - '''Israel'' se deja sin artículo para respetar la aposición del hebreo.'
  - El registro busca ser bíblico y actual, evitando calcos como 'en los profetas de' que resultarían poco naturales en español.
