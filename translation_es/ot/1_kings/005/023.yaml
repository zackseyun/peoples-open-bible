base_translation:
  language: en
  yaml_path: translation/ot/1_kings/005/023.yaml
  text: My servants will bring them down from Lebanon to the sea[a], and I will make them into rafts on the sea to the place that you direct me, and I will break them apart there, and you will carry them away[b]. And you shall do what I desire by giving food for my household.
  footnotes:
  - marker: a
    text: Or 'log rafts' for 'rafts.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'bread for my house'; here 'bread' likely means food or provisions for Hiram's royal household.
    reason: lexical_alternative
