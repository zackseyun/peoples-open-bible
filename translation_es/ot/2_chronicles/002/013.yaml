  language: en
  yaml_path: translation/ot/2_chronicles/002/013.yaml
  text: the son of a woman from the daughters of Dan[a], and his father was a man of Tyre, skilled to work in gold and silver, bronze and iron, stone and wood, purple, blue, fine linen, and crimson, and to engrave every kind of engraving and to devise every kind of design that may be assigned to him[b], with your skilled men and the skilled men of my lord David your father.
