id: REV.14.13
reference: Revelation 14:13
source:
  edition: SBLGNT
  text: Καὶ ἤκουσα φωνῆς ἐκ τοῦ οὐρανοῦ λεγούσης· Γράψον· Μακάριοι οἱ νεκροὶ οἱ ἐν κυρίῳ ἀποθνῄσκοντες ἀπ’ ἄρτι. ⸂ναί, λέγει⸃ τὸ πνεῦμα, ἵνα ⸀ἀναπαήσονται ἐκ τῶν κόπων αὐτῶν, τὰ ⸀γὰρ ἔργα αὐτῶν ἀκολουθεῖ μετ’ αὐτῶν.
translation:
  text: 'And I heard a voice from heaven saying[a], “Write: Blessed are the dead who die in the Lord from now on.” “Yes,” says the Spirit, “so that they may rest from their labors[b], for their deeds follow with them.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'that they may rest.' The Greek clause can be understood with a purpose/result nuance.
    reason: alternative_reading
  - marker: b
    text: Or 'for their deeds follow them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: φωνῆς ἐκ τοῦ οὐρανοῦ λεγούσης
  chosen: a voice from heaven saying
  alternatives:
  - the voice of heaven saying
  - a voice out of heaven saying
  lexicon: BDAG
  rationale: φωνή is naturally 'voice'; ἐκ τοῦ οὐρανοῦ is best rendered 'from heaven' in idiomatic English. The participle λεγούσης is carried with 'saying' to preserve the ongoing speech introduction.
- source_word: Γράψον
  chosen: Write
  alternatives:
  - Write this
  lexicon: BDAG
  rationale: Aorist imperative singular; the simple command 'Write' is direct and sufficient without adding an object not present in Greek.
- source_word: Μακάριοι
  chosen: Blessed
  alternatives:
  - Happy
  - Fortunate
  lexicon: BDAG
  rationale: Standard beatitude language in biblical English; 'Blessed' preserves the solemn theological tone better than 'happy' or 'fortunate'.
- source_word: οἱ νεκροὶ
  chosen: the dead
  alternatives:
  - the dead ones
  lexicon: BDAG
  rationale: Substantival adjective; 'the dead' is the natural English equivalent.
- source_word: οἱ ἐν κυρίῳ ἀποθνῄσκοντες
  chosen: who die in the Lord
  alternatives:
  - who are dying in the Lord
  - those dying in the Lord
  lexicon: BDAG
  rationale: Present participle with article functions substantivally and characterizes those in view. English idiom prefers 'who die' rather than the more wooden 'who are dying.' κύριος is rendered 'Lord' per doctrine defaults.
- source_word: ἀπ’ ἄρτι
  chosen: from now on
  alternatives:
  - from this moment
  - henceforth
  lexicon: BDAG
  rationale: Idiomatic temporal expression indicating the point from which the blessing is being declared. 'From now on' is clear modern English.
- source_word: ναί, λέγει τὸ πνεῦμα
  chosen: Yes, says the Spirit
  alternatives:
  - Yes, the Spirit says
  lexicon: BDAG
  rationale: ναί is an emphatic affirmation, well rendered 'Yes.' Retaining 'the Spirit' preserves the explicit subject and solemnity of the heavenly confirmation.
- source_word: ἵνα ἀναπαήσονται
  chosen: so that they will rest
  alternatives:
  - that they may rest
  - in order that they will rest
  lexicon: BDAG
  rationale: ἵνα with future here expresses purpose/result. 'So that they will rest' preserves the forward-looking force of the future verb while remaining natural English.
- source_word: ἐκ τῶν κόπων αὐτῶν
  chosen: from their labors
  alternatives:
  - from their toils
  - from their troubles
  lexicon: BDAG
  rationale: κόπος commonly denotes labor, toil, or wearisome effort. 'Labors' fits the context of persevering faithfulness under suffering without narrowing it merely to emotional distress.
- source_word: τὰ γὰρ ἔργα αὐτῶν
  chosen: for their works
  alternatives:
  - for their deeds
  lexicon: BDAG
  rationale: ἔργα is broadly 'works' or 'deeds.' 'Works' preserves the lexical connection to moral/action language common in Revelation.
- source_word: ἀκολουθεῖ μετ’ αὐτῶν
  chosen: follow with them
  alternatives:
  - follow them
  - go with them
  lexicon: BDAG
  rationale: The singular verb with neuter plural subject is normal Greek syntax. Including μετά explicitly with 'with them' preserves the preposition rather than collapsing it into a simple object construction.
