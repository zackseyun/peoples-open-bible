translation:
  language: es
  text: 'Porque puse su terror en la tierra de los vivientes[a], y será tendido entre los incircuncisos, con los muertos a espada: Faraón y toda su multitud, declara el Señor, Yahvé.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, siguiendo algunos testigos antiguos: «mi terror en la tierra de los vivientes». El texto hebreo aquí dice «su terror».'
    reason: textual_variant
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la explicación o fundamento del juicio anterior. «Porque» preserva la relación causal/explanatoria de manera natural en español.
- source_word: נָתַתִּי
  english_pob_choice: I put
  chosen_spanish: puse
  alternatives_spanish:
  - coloqué
  - puse allí
  lexicon: HALOT
  rationale: נתן puede significar ‘poner/colocar’. Aquí, con «terror» y el complemento locativo, «puse» reproduce bien el sentido de causar o situar ese terror.
- source_word: חתית/ו
  english_pob_choice: his terror
  chosen_spanish: su terror
  alternatives_spanish:
  - su temor
  - su espanto
  lexicon: HALOT
  rationale: El sufijo 3ms apunta a Faraón. «Terror» conserva la fuerza del sustantivo hebreo y el efecto intimidante que él ejercía entre los vivientes.
- source_word: בְּאֶרֶץ חַיִּים
  english_pob_choice: in the land of the living
  chosen_spanish: en la tierra de los vivientes
  alternatives_spanish:
  - en la tierra de los que viven
  - en el país de los vivos
  lexicon: HALOT
  rationale: Es una expresión hebrea estable para el ámbito de los vivos frente a la muerte. «Tierra de los vivientes» mantiene el giro bíblico y su contraste semántico.
- source_word: וְהֻשְׁכַּב
  english_pob_choice: and he will be laid
  chosen_spanish: y será puesto
  alternatives_spanish:
  - y será tendido
  - y será acostado
  lexicon: HALOT
  rationale: 'El hofal de שׁכב es pasivo: alguien es ‘puesto/tendido’. «Será puesto» conserva la pasividad sin sonar forzado en español.'
- source_word: בְּתוֹךְ עֲרֵלִים
  english_pob_choice: among the uncircumcised
  chosen_spanish: entre los incircuncisos
  alternatives_spanish:
  - en medio de los incircuncisos
  - entre los no circuncidados
  lexicon: HALOT
  rationale: El plural hebreo es literalmente ‘incircuncisos’. «Entre los incircuncisos» conserva el valor covenantal y de vergüenza del término en Ezequiel.
- source_word: אֶת חַלְלֵי חֶרֶב
  english_pob_choice: with those slain by the sword
  chosen_spanish: junto con los muertos a espada
  alternatives_spanish:
  - con los heridos de espada
  - con los caídos a espada
  lexicon: HALOT
  rationale: La construcción marca asociación con los caídos por espada. «Muertos a espada» es natural en español y mantiene la imagen de juicio violento.
- source_word: פַּרְעֹה
  english_pob_choice: Pharaoh
  chosen_spanish: Faraón
  alternatives_spanish:
  - el Faraón
  lexicon: HALOT
  rationale: Nombre/título real estándar en español bíblico. Aquí funciona como designación directa del rey de Egipto.
- source_word: וְכָל הֲמוֹנוֹ
  english_pob_choice: and all his multitude
  chosen_spanish: y toda su multitud
  alternatives_spanish:
  - y toda su muchedumbre
  - y todo su séquito
  lexicon: HALOT
  rationale: הָמוֹן denota multitud, masa o tropa numerosa. «Multitud» refleja bien el alcance colectivo sin cargar innecesariamente el matiz militar.
- source_word: נְאֻם אֲדֹנָי יְהוִה
  english_pob_choice: declares the Lord GOD
  chosen_spanish: declara el Señor Yahvé
  alternatives_spanish:
  - declara el Señor Dios
  - oráculo del Señor Yahvé
  lexicon: HALOT
  rationale: La fórmula profética נְאֻם se rinde con «declara». YHWH se traduce aquí como «Yahvé» según la terminología del proyecto, y אֲדֹנָי se expresa como «Señor».
theological_decisions:
- issue: Traducción del Tetragrámaton en la fórmula final
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Dios
  - el Señor YHWH
  rationale: El texto hebreo termina con אֲדֹנָי יְהוִה. Siguiendo la norma del proyecto, se preserva el nombre divino como «Yahvé», sin ocultarlo detrás de una convención de máscara. «Señor» traduce אֲדֹנָי.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Ambigüedad textual en חֲתִיתוֹ
  english_pob_reading: his terror
  chosen_spanish_reading: su terror
  alternative_spanish_readings:
  - mi terror
  rationale: El consonántico hebreo con sufijo 3ms favorece «su terror», referido a Faraón. Se mantiene la lectura base del texto recibido, sin borrar la variante antigua que lee «mi terror».
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition; preserve alternatives in footnotes where ambiguity is significant'
translation_notes:
  revision_awareness: 'La revisión más reciente no introdujo cambios: el último pase marcó el texto como sin modificaciones necesarias, y el resumen de verificación indicó alta concordancia (1.0).'
  spanish_consistency_notes:
  - Se conservó la distinción entre «Señor» para אֲדֹנָי y «Yahvé» para יְהוִה, conforme al estándar del proyecto.
  - «Incircuncisos» se mantuvo como término cargado de sentido pactual y no se suavizó a una expresión más genérica.
  - «Multitud» se eligió por fidelidad al sustantivo הָמוֹן y por claridad en registro bíblico moderno.
  - La nota textual se ancla en «terror» para reflejar la variante antigua sin alterar la lectura principal del texto.
