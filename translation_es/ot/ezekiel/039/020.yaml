translation:
  language: es
  text: Y ustedes se saciarán en mi mesa con caballo y carro[a], hombre poderoso y todo hombre de guerra[b], declara el Señor Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: "caballo y carro"; las formas singulares probablemente funcionan en sentido colectivo para fuerzas y equipo militares.'
    reason: lexical_alternative
  - marker: b
    text: 'O: "héroe" o "guerrero" para גִּבּוֹר.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּשְׂבַעְתֶּם
  english_pob_choice: you will be filled
  chosen_spanish: se saciarán
  alternatives_spanish:
  - quedarán satisfechos
  - comerán hasta quedar llenos
  lexicon: HALOT
  rationale: El verbo שׂבע aquí expresa quedar satisfecho por la comida; en español, 'saciarse' conserva la idea de llenura resultante de un banquete y suena natural en este contexto de mesa sacrificial.
- source_word: עַל שֻׁלְחָנִי
  english_pob_choice: at my table
  chosen_spanish: en mi mesa
  alternatives_spanish:
  - sobre mi mesa
  - a mi mesa
  lexicon: HALOT
  rationale: Aunque el hebreo usa 'sobre/en', la colocación española más natural para el sentido de banquete y comunión es 'en mi mesa', sin perder la imagen de participación en el banquete.
- source_word: סוּס וָרֶכֶב
  english_pob_choice: horse and chariot
  chosen_spanish: caballo y carro
  alternatives_spanish:
  - caballos y carros
  - caballo y carro de guerra
  lexicon: HALOT
  rationale: Mantengo los singulares como en el hebreo, porque funcionan de modo colectivo para fuerzas militares y equipo. 'Carro' es la forma española más directa y clara para רֶכֶב en este contexto.
- source_word: גִּבּוֹר
  english_pob_choice: mighty man
  chosen_spanish: valiente
  alternatives_spanish:
  - hombre poderoso
  - guerrero
  - mighty man
  lexicon: HALOT
  rationale: El término puede significar 'hombre poderoso', 'héroe' o 'guerrero'. Opto por 'valiente' para evitar repetir 'guerrero' enseguida y para conservar una distinción léxica frente a 'todo hombre de guerra', aunque la amplitud semántica sigue abierta.
- source_word: וְכָל אִישׁ מִלְחָמָה
  english_pob_choice: and every man of war
  chosen_spanish: y todo hombre de guerra
  alternatives_spanish:
  - y todo guerrero
  - y todos los hombres de guerra
  lexicon: HALOT
  rationale: '''Hombre de guerra'' sigue de cerca la construcción hebrea y conserva el valor militar del sustantivo. Mantengo el singular colectivo ''todo hombre'' porque el texto es una enumeración de combatientes.'
- source_word: נְאֻם
  english_pob_choice: declares
  chosen_spanish: declara
  alternatives_spanish:
  - dice
  - oráculo de
  lexicon: HALOT
  rationale: En la fórmula profética, 'declara' reproduce bien el tono solemne e idiomático del hebreo sin volverla arcaica en exceso.
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: el Señor Yahvé
  alternatives_spanish:
  - el Señor DIOS
  - el Señor Yahweh
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
  rationale: Sigo la norma del proyecto para renderizar el nombre divino como 'Yahvé' en el texto principal. 'Señor' traduce אֲדֹנָי, mientras que 'Yahvé' preserva el Tetragrámaton sin máscara convencional.
theological_decisions:
- issue: Tratamiento del nombre divino en la fórmula אֲדֹנָי יְהוִה
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor DIOS
  - el Señor Yahweh
  rationale: 'La POB inglesa mantiene la fórmula reverencial ''the Lord GOD'', pero el marco del proyecto exige ''Yahvé'' para יְהוָה. En español, ''el Señor Yahvé'' conserva ambos elementos: el título אדוני y el nombre propio del pacto.'
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: La base inglesa revisada eliminó una segunda preposición equivalente a 'with' para respetar mejor la lista hebrea. En español, la enumeración se resuelve de manera natural con una sola preposición implícita en el sintagma 'con caballo y carro[a], valiente y todo hombre de guerra[b]'.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' para el Tetragrámaton según la terminología del proyecto.
  - Se evitó 'Cristo' o vocabulario cristológico, no pertinente en este versículo.
  - '''Señor'' se usó para אֲדֹנָי, no como sustituto del nombre divino.'
  - La coordinación nominal preserva la serie militar del hebreo sin pluralizar interpretivamente los sustantivos singulares.
