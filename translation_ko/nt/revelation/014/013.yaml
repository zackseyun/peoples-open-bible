  text: '그리고 나는 하늘에서 나는 음성을 들었습니다. 「기록하라. 「이제부터 주 안에서 죽는 자들은 복이 있다.」」 「그렇다.」 영이 말씀하십니다. 「그들이 자기들의 수고를 그치고 쉬리니, 그들의 행한 일이 그들을 따라가기 때문이다.」'
