    text: «Juicios» traduce aquí משפטים; también puede entenderse como «ordenanzas» o «decisiones legales». El término se refiere a decisiones jurídicas o normas prescritas.
    reason: lexical_alternative
  revision_rationale: Se ajusta el español al registro neutral latinoamericano, se mejora la naturalidad de la expresión idiomática de בְּאָזְנֵיכֶם, y se alinea mejor משפטים con la decisión léxica auditada del POB mediante «juicios», conservando la distinción con «estatutos». También se añade la nota para «Escucha» en paralelo con la alternativa preservada en el inglés.
