revisions:
- from: No te harás imagen[a] ni ninguna semejanza[b] de lo que está en los cielos arriba, ni en la tierra debajo[c], ni en las aguas debajo de la tierra.
  to: No te harás imagen tallada[a] ni ninguna semejanza[b] de lo que está en los cielos arriba, ni en la tierra abajo[c], ni en las aguas debajo de la tierra.
  rationale: Se ajusta פֶסֶל a la decisión léxica principal documentada por el POB («imagen tallada») en vez de dejar la especificidad solo en nota. También se suaviza una construcción poco natural en español («en la tierra debajo») a «en la tierra abajo», manteniendo el paralelismo cosmológico del hebreo y de la nota cultural. Se pule la nota léxica para evitar redundancia.
