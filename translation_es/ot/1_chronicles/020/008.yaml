revisions:
- from: Estos nacieron para Rapa en Gat[a], y cayeron por mano de David y por mano de sus siervos.
  to: Estos nacieron de Rapha en Gat[a], y cayeron por mano de David y por mano de sus siervos.
  rationale: Se corrige «para Rapa» a «de Rapha» para expresar de manera natural y fiel la relación genealógica/lineal implicada en el hebreo, sin perder la ambigüedad del referente. También se alinea la forma del nombre con la decisión auditada en inglés. La nota al pie conserva la alternativa más cercana al expediente («a Rapha») y la explicación sobre posible vínculo con los refaítas.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:54:36Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del hebreo: demostrativo plural, nacimiento/descendencia, localización en Gat, caída en combate, y el modismo de agencia «por mano de». Sin embargo, «para Rapa» no representa bien en español la relación genealógica expresada por לְהָרָפָא; suena antinatural y puede sugerir finalidad en vez de linaje. Además, «Rapa» no es la forma más fiel al nombre auditado «Rapha», y conviene conservar esa forma para mantener la conexión con la decisión léxica inglesa y la ambigüedad del referente.'
  spanish_quality_summary: El texto es mayormente claro y digno, pero «nacieron para Rapa» resulta poco idiomático en español bíblico y moderno. «Nacieron de Rapha» comunica mejor la relación de descendencia sin sobreinterpretar. El resto —«Estos», «en Gat», «cayeron por mano de David», «sus siervos»— es legible y adecuado.
  glossary_alignment: 'No hay conflicto con la terminología principal del proyecto. «Siervos» concuerda con la preferencia por preservar la fuerza léxica de עבד. La principal desalineación está en לְהָרָפָא: conviene mantener «Rapha» como nombre/linaje ambiguo, no «Rapa», y evitar «para».'
  issues:
  - severity: high
    issue: «para Rapa» traduce de forma poco fiel y poco natural לְהָרָפָא
    rationale: En español, «para» suele indicar finalidad o destinatario, no descendencia/linaje. Aquí el hebreo, aunque literalmente usa ל, en contexto genealógico se entiende mejor como origen o pertenencia de linaje. «de Rapha» preserva mejor el sentido sin resolver la ambigüedad.
  - severity: medium
    issue: La forma «Rapa» rompe la continuidad con la decisión auditada «Rapha»
    rationale: El expediente inglés decidió «Rapha» como forma principal. Cambiar a «Rapa» introduce una adaptación no justificada y puede debilitar la conexión con el debate léxico sobre הָרָפָא.
  - severity: low
    issue: La nota al pie repite «para Rapa» como alternativa, pero esa no debería ser la formulación preferida ni alternativa principal en español
    rationale: Si el texto principal se corrige a «de Rapha», la nota debe reflejar la alternativa auditada «a Rapha» y la posible relación con los refaítas, no reforzar una construcción española deficiente.
  revised_spanish_text: Estos nacieron de Rapha en Gat[a], y cayeron por mano de David y por mano de sus siervos.
  revised_footnotes:
  - marker: a
    text: O «a Rapha»; posiblemente se refiere a descendientes de los refaítas, es decir, un linaje de gigantes en Gat.
    reason: alternative_reading
  revision_rationale: Se corrige «para Rapa» a «de Rapha» para expresar de manera natural y fiel la relación genealógica/lineal implicada en el hebreo, sin perder la ambigüedad del referente. También se alinea la forma del nombre con la decisión auditada en inglés. La nota al pie conserva la alternativa más cercana al expediente («a Rapha») y la explicación sobre posible vínculo con los refaítas.
