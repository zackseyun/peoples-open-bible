revisions:
- from: La misericordia de un hombre es para su prójimo[a], pero la misericordia de Yahvé es para toda carne[b]; reprende, disciplina, enseña y vuelve a su rebaño como un pastor.
  to: La misericordia de un hombre es para su prójimo, pero la misericordia de Yahvé es para toda carne[a]; reprende, disciplina, enseña y hace volver[b] a su rebaño como un pastor.
