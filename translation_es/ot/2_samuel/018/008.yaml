translation:
  language: es
  text: La batalla se extendió allí sobre la faz de toda la región[a], y el bosque devoró a más gente aquel día que la espada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «La batalla fue dispersada sobre la faz de toda la región». El participio hebreo puede resaltar la dispersión del combate por la región.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נפצית
  english_pob_choice: spread
  chosen_spanish: se extendió
  alternatives_spanish:
  - se dispersó
  - se esparció
  lexicon: HALOT
  rationale: El participio nifal de פוץ comunica dispersión o extensión amplia. En español, «se extendió» conserva la idea de propagación territorial con naturalidad narrativa y sin perder el matiz de difusión bélica.
- source_word: עַל פְּנֵי כָל הָאָרֶץ
  english_pob_choice: over the face of all the land
  chosen_spanish: sobre la faz de toda la tierra
  alternatives_spanish:
  - por toda la tierra
  - sobre toda la tierra
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y conserva una imagen espacial marcada. «Sobre la faz de toda la tierra» mantiene esa imagen. Aquí «tierra» reproduce bien el ámbito del conflicto; «faz» preserva la literalidad semítica sin volver la frase oscura.
- source_word: וַיֶּרֶב
  english_pob_choice: devoured more
  chosen_spanish: devoró más
  alternatives_spanish:
  - consumió más
  - causó más muertes
  lexicon: HALOT
  rationale: El verbo רב con el infinitivo הבא לֶאֱכֹל y la comparación siguiente expresa que el bosque produjo más muerte que la espada. «Devoró más» conserva el paralelismo verbal con la segunda cláusula y el carácter figurado del hebreo.
- source_word: הַיַּעַר
  english_pob_choice: the forest
  chosen_spanish: el bosque
  alternatives_spanish:
  - el bosque frondoso
  - la selva
  lexicon: HALOT
  rationale: יַעַר denota un área boscosa. En español bíblico contemporáneo, «bosque» es claro y fiel; «selva» sugeriría un ambiente distinto.
- source_word: לֶאֱכֹל
  english_pob_choice: devoured
  chosen_spanish: devoró
  alternatives_spanish:
  - consumió
  - se tragó
  lexicon: HALOT
  rationale: El infinitivo de «comer» funciona aquí metafóricamente para causar muerte. Repetir «devoró» en ambas cláusulas preserva el paralelismo y la personificación del texto hebreo.
- source_word: בָּעָם
  english_pob_choice: of the people
  chosen_spanish: gente
  alternatives_spanish:
  - del pueblo
  - de los hombres
  lexicon: HALOT
  rationale: En este contexto de pérdidas humanas, «gente» comunica el sentido partitivo de forma natural en español. «Del pueblo» podría sonar más étnico o político que el hebreo aquí.
- source_word: מֵאֲשֶׁר אָכְלָה הַחֶרֶב
  english_pob_choice: than the sword devoured
  chosen_spanish: que la que devoró la espada
  alternatives_spanish:
  - que la espada devoró
  - que las que mató la espada
  lexicon: HALOT
  rationale: La comparación explícita exige mantener el verbo repetido. Añadir «la que» da en español una referencia natural al sustantivo implícito («gente») y conserva el contraste cuantitativo del hebreo.
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: that day
  chosen_spanish: aquel día
  alternatives_spanish:
  - ese día
  - en aquel día
  lexicon: HALOT
  rationale: «Aquel día» es una equivalencia natural y solemne para la referencia temporal narrativa.
theological_decisions:
- issue: El verso usa personificación bélica del bosque y de la espada para hablar de muertes humanas.
  english_pob_reading: The forest devoured more of the people that day than the sword devoured.
  chosen_spanish_reading: El bosque devoró más gente aquel día que la que devoró la espada.
  alternative_spanish_readings:
  - El bosque causó más muertes aquel día que la espada.
  - El bosque mató a más gente aquel día que la espada.
  rationale: Se mantiene la imagen fuerte del hebreo y del POB en inglés. Traducir solo como «causó más muertes» aclararía el sentido, pero debilitaría la metáfora deliberada del texto.
  doctrine_reference: Poética narrativa y personificación en el relato histórico
- issue: La frase עַל פְּנֵי כָל הָאָרֶץ puede sonar como 'toda la tierra' en sentido absoluto, pero el contexto es local/regional.
  english_pob_reading: over the face of all the land
  chosen_spanish_reading: sobre la faz de toda la tierra
  alternative_spanish_readings:
  - sobre la faz de toda la tierra [entendida como la región]
  - por toda la región
  rationale: Se conserva la formulación amplia del hebreo y del POB. La narración militar permite «tierra» como ámbito del conflicto sin necesidad de restringirlo en el texto principal; la nota lexical aclara la extensión idiomática.
  doctrine_reference: Geografía narrativa del Antiguo Testamento
translation_notes:
  revision_awareness: La redacción sigue el último estado del auditable en inglés, que ajustó «the whole land» a «all the land» para corresponder más de cerca con כָל הָאָרֶץ sin cambiar el sentido. La versión española conserva esa amplitud con «toda la tierra» y mantiene la metáfora verbal repetida de «devorar» para reflejar el paralelismo hebreo.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Se mantiene «bosque» para יער y «devorar» para el verbo metafórico a fin de conservar el paralelismo.
  - «Tierra» traduce aquí el ámbito territorial de batalla, no una afirmación cosmológica universal.
  - El registro es narrativo y sobrio, con sintaxis natural para lectura pública en español.
