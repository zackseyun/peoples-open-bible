translation:
  language: es
  text: El que oprime al pobre insulta a su Hacedor[a], pero el que muestra favor al necesitado lo honra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «pero el que honra al pobre es generoso con el necesitado». El hebreo permite que el pronombre de «lo honra» se refiera ya sea al pobre o a su Hacedor; el texto principal lo toma como referido a Dios por el paralelismo.'
    reason: alternative_reading
lexical_decisions:
- source_word: עֹשֵׁק
  english_pob_choice: Whoever oppresses
  chosen_spanish: El que oprime
  alternatives_spanish:
  - Quien oprime
  - El que explota
  lexicon: HALOT
  rationale: El participio funciona de manera proverbial y sustantiva; «el que» mantiene la forma sentenciosa en español. «Oprime» conserva la fuerza de presión injusta sin volver la frase más técnica de lo necesario.
- source_word: דָּל
  english_pob_choice: the poor
  chosen_spanish: al pobre
  alternatives_spanish:
  - al débil
  - al humilde
  lexicon: HALOT
  rationale: En este contexto sapiencial, «pobre» es la opción más clara y natural en español, y mantiene la referencia a la vulnerabilidad social.
- source_word: חֵרֵף
  english_pob_choice: insults
  chosen_spanish: insulta
  alternatives_spanish:
  - reprocha
  - ultraja
  - afrenta
  lexicon: HALOT
  rationale: «Insulta» comunica el acto de desprecio o afrenta con naturalidad moderna, sin perder el tono de menosprecio del verbo hebreo.
- source_word: עֹשֵׂהוּ
  english_pob_choice: his Maker
  chosen_spanish: su Hacedor
  alternatives_spanish:
  - su Creador
  - el que lo hizo
  lexicon: HALOT
  rationale: «Hacedor» conserva el sentido de quien hace o crea, y mantiene bien el matiz sapiencial de la relación criatura-Creador.
- source_word: חֹנֵן
  english_pob_choice: is gracious to
  chosen_spanish: es generoso con
  alternatives_spanish:
  - es compasivo con
  - muestra gracia a
  - tiene misericordia de
  lexicon: HALOT
  rationale: Aquí la idea es de favor activo hacia el necesitado. «Es generoso con» expresa bien la acción benévola en un español natural; se conserva en la nota la relación semántica con gracia/favor.
- source_word: אֶבְיוֹן
  english_pob_choice: the needy
  chosen_spanish: el necesitado
  alternatives_spanish:
  - el pobre
  - el indigente
  lexicon: HALOT
  rationale: «Necesitado» refleja el matiz de carencia o dependencia propia de אֶבְיוֹן y distingue este término de דָּל en la primera mitad del verso.
theological_decisions:
- issue: Referente del pronombre en וּמְכַבְּדוֹ
  english_pob_reading: The pronoun refers to God ('his Maker'), so honoring God is shown by being gracious to the needy.
  chosen_spanish_reading: El pronombre se entiende como referido a Dios, de modo que hacer el bien al necesitado es una forma de honrar a su Hacedor.
  alternative_spanish_readings:
  - El pronombre se refiere al pobre, de modo que quien honra al pobre es generoso con el necesitado.
  rationale: La paralelismo antitético favorece que el contraste avance de insultar al pobre y, por extensión, a su Hacedor, a honrar a ese mismo Hacedor mediante la bondad hacia el necesitado. Mantener esta lectura preserva la tensión documentada y el enlace teológico con la dignidad del pobre delante de Dios.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it without documentation)
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente del POB inglés, que reordenó la segunda cola para reflejar con mayor precisión el hebreo: primero la cualidad de ser generoso con el necesitado, y luego el acto de honrar a Dios implícito en esa conducta. La versión española conserva esa relación sintáctica y la ambigüedad documentada del pronombre.'
  spanish_consistency_notes:
  - Se mantuvo «Hacedor» para עֹשֵׂהוּ, en línea con el valor sapiencial de creador/hacedor y sin reemplazarlo por terminología eclesiástica más interpretativa.
  - Se prefirió «necesitado» para אֶבְיוֹן, para distinguirlo de «pobre» en דָּל y conservar el matiz léxico.
  - Se usó «generoso con» para חֹנֵן como equivalencia idiomática de la idea de favor/gracia activa, no como sustituto doctrinal de «gracia».
