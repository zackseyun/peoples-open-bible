review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido básico del hebreo: promesa futura divina, envío previo, expulsión de tres pueblos y cierre espacial «de delante de ti». También preserva correctamente la nota sobre la posible lectura figurada de הַצִּרְעָה. Sin embargo, hay dos ajustes de fidelidad/idiomaticidad: en español bíblico general «el avispón» representa mejor ‘hornet’ que «la avispa», y el pronombre explícito «ella» suena innecesariamente forzado en español aunque el hebreo marque femenino en el verbo.'
  spanish_quality_summary: El texto es claro y legible, pero «la avispa» puede sonar más genérico que el sentido de ‘hornet’, y «y ella expulsará» resulta algo rígido. Una redacción más natural y precisa es «Y enviaré el avispón delante de ti[a], y expulsará al heveo, al cananeo y al hitita de delante de ti».
  glossary_alignment: No hay conflicto con la terminología troncal del proyecto (no aparecen Yahvé, Mesías, etc.). La principal cuestión léxica es הַצִּרְעָה, donde conviene alinear mejor con el inglés POB ‘hornet’ mediante «avispón». Los etnónimos «heveo», «cananeo» y «hitita» son aceptables; «de delante de ti» conserva bien מִלְּפָנֶיךָ.
  issues:
  - severity: medium
    issue: «la avispa» debilita el valor léxico de הַצִּרְעָה frente a ‘hornet’
    rationale: El inglés auditado eligió explícitamente ‘the hornet’ como sentido literal principal. En español, «avispa» es más amplio/genérico, mientras que «avispón» corresponde mejor al insecto específico evocado por ‘hornet’, sin imponer una interpretación figurada.
  - severity: low
    issue: El pronombre «ella» suena calco del hebreo
    rationale: Aunque el verbo hebreo es femenino singular y concuerda con הַצִּרְעָה, en español el sujeto ya está claro y «ella expulsará» añade una rigidez innecesaria. «Y expulsará» preserva el sentido con mejor fluidez.
  revised_spanish_text: Y enviaré el avispón delante de ti[a], y expulsará al heveo, al cananeo y al hitita de delante de ti.
  revised_footnotes:
  - marker: a
    text: O posiblemente una imagen figurada de pánico, o algún otro medio de presión divina enviado delante de Israel; el hebreo normalmente significa «avispón».
    reason: lexical_alternative
  revision_rationale: Se ajusta הַצִּרְעָה de «avispa» a «avispón» para reflejar mejor la decisión léxica documentada (‘hornet’) y se elimina «ella» por naturalidad del español, sin perder la relación sintáctica del hebreo. La nota se actualiza para mantener coherencia con el término principal revisado.
