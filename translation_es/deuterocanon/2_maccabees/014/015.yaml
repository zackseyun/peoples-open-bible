    issue: τῶν ἐθνῶν se tradujo en el texto principal como «las naciones»
    rationale: Aunque léxicamente posible, el expediente POB documenta que en este contexto judío-militar el contraste es con pueblos no judíos; «los gentiles» preserva mejor ese matiz pactual en español.
  - severity: low
