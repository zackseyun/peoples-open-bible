translation:
  language: es
  text: Porque aunque te laves con natrón[a] y uses mucha lejía[b], tu culpa[c] queda manchada delante de mí, declara el Señor Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Natrón» nombra un agente limpiador mineral antiguo; puede entenderse también como «lejía» o «álcali».
    reason: lexical_alternative
  - marker: b
    text: «Lejía» traduce aquí la sustancia de lavado antigua indicada por בֹּרִית; no implica jabón moderno.
    reason: lexical_alternative
  - marker: c
    text: 'También: «tu iniquidad» o «tu pecado».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי אִם
  english_pob_choice: For though
  chosen_spanish: Porque aunque
  alternatives_spanish:
  - Aunque
  - Si bien
  lexicon: HALOT
  rationale: 'La construcción introduce una concesión: aun si se realiza la acción de lavar, el resultado afirmado después permanece. «Porque aunque» conserva el enlace discursivo y la fuerza concesiva sin sonar forzado en español.'
- source_word: תְּכַבְּסִי
  english_pob_choice: you wash
  chosen_spanish: te laves
  alternatives_spanish:
  - laves
  - te limpies
  lexicon: HALOT
  rationale: El verbo alude al lavado físico usado metafóricamente para limpieza moral. «Te laves» mantiene la imagen concreta y funciona de forma natural en español.
- source_word: בַּנֶּתֶר
  english_pob_choice: with natron
  chosen_spanish: con natron
  alternatives_spanish:
  - con lejía
  - con álcali
  lexicon: HALOT
  rationale: «Natron» es la equivalencia más precisa para el agente limpiador mineral indicado por el hebreo. Se conserva como término técnico, y la alternativa más general queda reflejada en la nota.
- source_word: וְתַרְבִּי לָךְ
  english_pob_choice: and use much
  chosen_spanish: y uses mucho
  alternatives_spanish:
  - y añadas mucho para ti
  - y multipliques mucho para ti
  lexicon: HALOT
  rationale: El hebreo expresa abundancia en el uso de una sustancia limpiadora. «Uses mucho» transmite el sentido idiomático con naturalidad en español y evita una reproducción rígida de la estructura hebrea.
- source_word: בֹּרִית
  english_pob_choice: lye
  chosen_spanish: lejía
  alternatives_spanish:
  - álcali
  - lejía de lavar
  lexicon: HALOT
  rationale: La sustancia de limpieza antigua se aproxima mejor en español con «lejía» que con «jabón», porque el término remite a un agente cáustico/limpiador y no a jabón moderno. Se preserva la precisión lexical que el inglés revisado buscó con «lye».
- source_word: נִכְתָּם
  english_pob_choice: is stained
  chosen_spanish: queda manchada
  alternatives_spanish:
  - está manchada
  - permanece marcada
  lexicon: HALOT
  rationale: El pasivo comunica una mancha persistente e inborrable. «Queda manchada» conserva la idea de estado resultante y la imagen de contaminación moral visible ante Dios.
- source_word: עֲוֺנֵךְ
  english_pob_choice: your guilt
  chosen_spanish: tu culpa
  alternatives_spanish:
  - tu iniquidad
  - tu pecado
  lexicon: HALOT
  rationale: Aquí el sustantivo designa tanto la falta como la culpabilidad derivada. «Culpa» comunica bien la carga moral y judicial en español, aunque «iniquidad» sigue siendo una alternativa válida si se desea más cercanía formal al término hebreo.
- source_word: לְפָנַי
  english_pob_choice: before me
  chosen_spanish: delante de mí
  alternatives_spanish:
  - en mi presencia
  - ante mí
  lexicon: HALOT
  rationale: La expresión marca la evaluación directa de Dios. «Delante de mí» es idiomática, clara y suficientemente solemne en español.
- source_word: נְאֻם אֲדֹנָי יְהוִה
  english_pob_choice: declares the Lord YHWH
  chosen_spanish: declara el Señor Yahvé
  alternatives_spanish:
  - declara el Señor Yahvé Dios
  - oráculo del Señor Yahvé
  lexicon: HALOT
  rationale: Se sigue la convención del proyecto para יְהוָה como «Yahvé», y אֲדֹנָי se expresa con «Señor». «Declara» reproduce la fórmula profética נְאֻם con sobriedad y claridad en español.
theological_decisions:
- issue: Representación del nombre divino יהוה en la fórmula profética con אֲדֹנָי
  english_pob_reading: the Lord YHWH
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Yahvé Dios
  - Yahvé
  rationale: La tradición del proyecto exige traducir el Tetragrámaton como «Yahvé» y no ocultarlo tras una mayúscula de sustitución. Al ir precedido por אֲדֹנָי, se mantiene «Señor» para el título y «Yahvé» para el nombre propio, preservando ambos elementos.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
translation_notes:
  revision_awareness: 'El audit trail inglés revisó la sustancia de בֹּרִית desde «soap» a «lye» por mayor precisión, mantuvo «natron» para נֶתֶר y volvió a representar el cierre divino como «the Lord YHWH». La versión española refleja esas decisiones: conserva «natron», usa «lejía» para בֹּרִית y traduce la fórmula final como «el Señor Yahvé», de acuerdo con la norma del proyecto para el nombre divino.'
  spanish_consistency_notes:
  - Se mantuvo el registro solemne y profético, sin suavizar la metáfora de lavado moral.
  - No se usó «SEÑOR» como máscara tipográfica; se explicitó «Yahvé» según la norma del proyecto.
  - «Culpa» se eligió por su naturalidad en español, pero la nota conserva la alternativa más literal «iniquidad».
  - «Delante de mí» conserva la perspectiva divina de evaluación y presencia, equivalente a לְפָנַי.
