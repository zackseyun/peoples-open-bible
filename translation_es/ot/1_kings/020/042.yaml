  revision_rationale: Se ajusta חֶרְמִי para preservar mejor el sufijo de primera persona singular y la fuerza de juicio divino sin volver opaco el español. Se elimina la nota [b] por innecesaria, y se corrige el anclaje de la nota [a] conforme a la convención del proyecto.
