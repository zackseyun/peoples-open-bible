translation:
  language: es
  text: Entonces ella puso la comida sabrosa y el pan que había hecho en la mano[a] de Jacob, su hijo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «en la mano de Jacob, su hijo», una expresión idiomática que indica que se lo entregó directamente.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּתֵּן
  english_pob_choice: Then she put
  chosen_spanish: Entonces ella puso
  alternatives_spanish:
  - Entonces ella dio
  - Y ella colocó
  lexicon: HALOT
  rationale: El verbo נתן, en esta construcción narrativa, puede expresarse naturalmente en español como «puso» o «dio». «Puso» conserva la acción concreta de colocar los alimentos y sigue bien el avance narrativo del waw consecutivo.
- source_word: הַמַּטְעַמִּים
  english_pob_choice: the tasty food
  chosen_spanish: la comida sabrosa
  alternatives_spanish:
  - los manjares
  - las delicias
  - la comida sazonada
  lexicon: HALOT
  rationale: El término apunta a alimentos preparados con gusto especial. «Comida sabrosa» mantiene el valor sensorial sin cargar el texto con un registro excesivamente arcaico como «manjares» o «delicias».
- source_word: הַלֶּחֶם
  english_pob_choice: the bread
  chosen_spanish: el pan
  alternatives_spanish:
  - el alimento
  - la torta
  - el pan cocido
  lexicon: HALOT
  rationale: לֶחֶם se traduce de manera directa y normal en español como «pan».
- source_word: אֲשֶׁר עָשָׂתָה
  english_pob_choice: that she had made
  chosen_spanish: que había hecho
  alternatives_spanish:
  - que había preparado
  - que hizo
  lexicon: HALOT
  rationale: «Había hecho» refleja con fidelidad el verbo עשה y conserva el matiz de acción previa respecto al momento de entregar la comida.
- source_word: בְּיַד
  english_pob_choice: into the hand of
  chosen_spanish: en la mano de
  alternatives_spanish:
  - en la mano
  - a la mano de
  - en manos de
  lexicon: HALOT
  rationale: La imagen hebrea es idiomática y concreta. «En la mano de» preserva el cuerpo del original; en español puede sonar a entrega directa sin requerir una paráfrasis más abstracta.
- source_word: יַעֲקֹב בְּנָהּ
  english_pob_choice: Jacob her son
  chosen_spanish: Jacob, su hijo
  alternatives_spanish:
  - Jacob, su hijo
  - su hijo Jacob
  lexicon: HALOT
  rationale: Se mantiene la identificación relacional del hebreo con una puntuación natural en español. El orden con coma suena más fluido y claro que calcar mecánicamente la secuencia hebrea.
translation_notes:
  revision_awareness: El texto inglés POB optó por «into the hand of» para conservar el hebraísmo idiomático. En español, «en la mano de» mantiene esa imagen sin sonar forzado; no se amplía ni se espiritualiza el sentido.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» u otras sustituciones no pertinentes, pues el versículo no contiene el nombre divino.
  - «Pan» se mantuvo como traducción directa de לֶחֶם; no se optó por «alimento» para no diluir la referencia concreta.
  - La nota al pie preserva la observación auditada de que la frase hebrea es un modismo de entrega directa.
