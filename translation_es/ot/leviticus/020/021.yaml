  text: וְ/אִ֗ישׁ אֲשֶׁ֥ר יִקַּ֛ח אֶת אֵ֥שֶׁת אָחִ֖י/ו נִדָּ֣ה הִ֑וא עֶרְוַ֥ת אָחִ֛י/ו גִּלָּ֖ה עֲרִירִ֥ים יִהְיֽוּ־׃
base_translation:
  language: en
  yaml_path: translation/ot/leviticus/020/021.yaml
  text: And if a man takes his brother’s wife[a], it is uncleanness; he has uncovered his brother’s nakedness[b]. They shall be childless.
  footnotes:
  - marker: a
    text: Or 'it is uncleanness' / 'it is a defilement.' The Hebrew term can denote impurity in a ritual-moral sense.
    reason: lexical_alternative
  - marker: b
    text: Or 'They shall die childless.' The Hebrew more literally says 'They shall be childless,' without specifying how this judgment is carried out.
    reason: alternative_reading
