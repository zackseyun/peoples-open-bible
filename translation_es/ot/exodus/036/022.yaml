revisions:
- from: Dos espigas de unión para cada tabla[a], enlazadas una con otra[b]; así hizo todas las tablas del tabernáculo.
  to: Dos espigas para cada tabla[a], unidas una a otra[b]; así hizo todas las tablas del tabernáculo.
  rationale: La revisión reduce la sobreexplicación léxica y mejora la naturalidad española sin perder el sentido técnico del contexto. 'Espigas' basta para el referente de יָדֹת, mientras la nota conserva la metáfora literal 'manos'. 'Unidas' refleja mejor מְשֻׁלָּבֹת en contexto de ensamblaje que 'enlazadas'. También se ajustan las notas para que armonicen con la redacción principal y con el razonamiento del English POB.
