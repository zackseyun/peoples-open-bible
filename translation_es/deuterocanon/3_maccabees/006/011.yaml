    rationale: En español, con verbos como «bendecir» en sentido de jactarse o celebrar, «por la destrucción» o «ante la destrucción» suena más natural que «sobre la destrucción», sin perder el valor de ἐπί con dativo como ocasión/base.
  - severity: low
