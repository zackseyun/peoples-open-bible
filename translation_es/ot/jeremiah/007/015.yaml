translation:
  language: es
  text: Y los arrojaré[a] de delante de mí, como arrojé a todos vuestros hermanos[c][b], a toda la descendencia de Efraín.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de delante de mí» o «de mi presencia». Literalmente, «de sobre mi rostro».
    reason: lexical_alternative
  - marker: b
    text: «Hermanos» aquí se refiere a los compatriotas israelitas de Judá, especialmente a los del reino del norte.
    reason: cultural_note
  - marker: c
    text: Efraín aquí representa al reino del norte de Israel.
    reason: cross_reference
lexical_decisions:
- source_word: וְהִשְׁלַכְתִּי
  english_pob_choice: And I will cast
  chosen_spanish: Y yo los arrojaré
  alternatives_spanish:
  - Y yo los echaré
  - Y yo los expulsaré
  lexicon: HALOT
  rationale: El hebreo en piel/hiphil de שׁלך expresa una acción fuerte de expulsión o rechazo. «Arrojar» conserva la imagen verbal y el tono judicial sin sonar tan interpretativo como «expulsar».
- source_word: אֶתְכֶם
  english_pob_choice: you
  chosen_spanish: los
  alternatives_spanish:
  - a ustedes
  - a vosotros
  lexicon: Pronombre de objeto directo 2mp
  rationale: El pronombre directo plural masculino se vierte naturalmente en español como «los», con referencia implícita a los destinatarios del oráculo.
- source_word: מֵעַל פָּנַי
  english_pob_choice: from before me
  chosen_spanish: de delante de mí
  alternatives_spanish:
  - de mi presencia
  - de ante mi rostro
  lexicon: HALOT
  rationale: La imagen literal es «de sobre mi rostro». En español, «de delante de mí» mantiene el valor espacial y relacional del hebreo sin endurecer la frase. «De mi presencia» también sería posible, pero resulta algo más interpretativo.
- source_word: כַּאֲשֶׁר
  english_pob_choice: just as
  chosen_spanish: como
  alternatives_spanish:
  - así como
  - tal como
  lexicon: Conector comparativo
  rationale: La comparación entre el juicio presente y el juicio anterior queda clara con «como», que es natural y suficiente en español bíblico contemporáneo.
- source_word: הִשְׁלַכְתִּי
  english_pob_choice: I cast out
  chosen_spanish: arrojé
  alternatives_spanish:
  - eché
  - expulsé
  lexicon: HALOT
  rationale: Se conserva el mismo verbo básico que en la primera cláusula para reflejar la repetición enfática del hebreo. «Arrojé» mantiene el paralelismo con «arrojaré» y la fuerza de la expulsión.
- source_word: כָּל אֲחֵיכֶם
  english_pob_choice: all your brothers
  chosen_spanish: todos sus hermanos
  alternatives_spanish:
  - todos sus parientes
  - todos sus compatriotas
  lexicon: HALOT
  rationale: «Hermanos» conserva la metáfora de parentesco del hebreo y el paralelismo con la lectura inglesa auditada. Aunque alude a los israelitas del norte, el término no se neutraliza en el texto principal.
- source_word: אֵת כָּל זֶרַע אֶפְרָיִם
  english_pob_choice: all the offspring of Ephraim
  chosen_spanish: toda la descendencia de Efraín
  alternatives_spanish:
  - toda la semilla de Efraín
  - todos los descendientes de Efraín
  lexicon: HALOT
  rationale: «Zera‘» puede ser «semilla» o «descendencia»; en español, «descendencia» comunica mejor el sentido colectivo y genealógico. Se conserva «Efraín» como nombre propio, conforme a la fuente, sin explicar la metonimia dentro del texto principal.
theological_decisions:
- issue: La idiomática hebrea מֵעַל פָּנַי en un contexto de juicio
  english_pob_reading: from before me
  chosen_spanish_reading: de delante de mí
  alternative_spanish_readings:
  - de mi presencia
  - de ante mi rostro
  rationale: La frase expresa rechazo y expulsión del ámbito relacional de Yahvé. «De delante de mí» mantiene la proximidad al hebreo y el sentido judicial sin convertirlo en una paráfrasis excesiva ni en una formulación litúrgica más cargada.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: El valor de אֲחֵיכֶם como término de parentesco para los israelitas del norte
  english_pob_reading: brothers
  chosen_spanish_reading: hermanos
  alternative_spanish_readings:
  - compatriotas
  - parientes
  rationale: Se conserva el lenguaje de parentesco del original para no diluir la retórica profética. En el contexto histórico, el término apunta a los demás israelitas, especialmente del reino del norte.
  doctrine_reference: Translation philosophy §4
- issue: Efraín como nombre propio con sentido corporativo
  english_pob_reading: Ephraim here stands for the northern kingdom of Israel.
  chosen_spanish_reading: Efraín retenido como nombre propio
  alternative_spanish_readings:
  - el reino del norte
  - Israel
  rationale: Se mantiene el nombre propio en el texto principal para seguir la primacía del hebreo. La referencia corporativa queda implícita y puede aclararse en nota, sin borrar la tensión metonímica del pasaje.
  doctrine_reference: Translation philosophy §1, §2, §5
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail inglés, que ajustó la cláusula idiomática de «out of my sight» a «from before me» para mayor correspondencia léxica. En español se reflejó esa decisión con «de delante de mí», evitando una paráfrasis más libre.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como terminología preferente del proyecto solo cuando el texto lo requiera; en este versículo no aparece el nombre divino explícito.
  - Se conservó el paralelismo verbal con «arrojaré / arrojé» para reproducir la repetición enfática del hebreo.
  - «Hermanos» y «Efraín» se dejan en el texto principal, con aclaración en notas para no perder la fuerza retórica y la referencia histórica.
