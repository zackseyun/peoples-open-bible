revisions:
- from: Los guiaba con una nube de día[a], y toda la noche con la luz de fuego.
  to: Los guio con una nube de día[a], y toda la noche con la luz del fuego.
  rationale: Se ajusta el verbo principal a pretérito simple para reflejar mejor la secuencia narrativa hebrea, y se reemplaza «la luz de fuego» por «la luz del fuego» para una expresión española natural que sigue preservando la distinción léxica entre «luz» y «fuego». La nota se actualiza con una alternativa idiomática y fiel.
