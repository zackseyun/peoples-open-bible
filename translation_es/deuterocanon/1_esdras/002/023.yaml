revisions:
- from: y la gente estaba perpetrando rebeliones y guerras en ella[a], y reyes fuertes y severos estaban en Jerusalén, gobernando y cobrando tributo de Celesiria y Fenicia.
  to: y sus habitantes llevaban a cabo rebeliones y guerras en ella[a], y había en Jerusalén reyes fuertes y severos, que gobernaban y exigían tributo a Celesiria y Fenicia.
  rationale: 'Se hicieron ajustes menores para mejorar precisión semántica y naturalidad del español sin apartarse del griego ni de las decisiones del POB inglés: «sus habitantes» por «la gente», «llevaban a cabo» por «perpetrando», «había en Jerusalén» por «estaban en Jerusalén», y «exigían tributo a» por «cobrando tributo de».'
  reviewer_model: gpt-5.4
