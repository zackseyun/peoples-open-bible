translation:
  text: 'And his sons did as he had commanded them, and they carried his body and
    buried him in Hebron with his fathers.


    And when he had finished his words, he said, “I command you, my children, carry
    my bones up out of Egypt, and bury me in Hebron near my fathers.”

    And Benjamin died at one hundred and twenty-five years, in a good old age; and
    they placed him in a coffin.'
