translation:
  language: es
  text: 'Y el pueblo se oprimirá mutuamente[a]: hombre contra hombre, y cada uno contra su prójimo; el joven se mostrará arrogante hacia el anciano[b], y el despreciado hacia el honrado.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «unos a otros». El hebreo repite expresiones distributivas para subrayar la hostilidad mutua generalizada: «hombre contra hombre, y cada uno contra su prójimo».'
    reason: lexical_alternative
  - marker: b
    text: «Anciano» también puede entenderse como «viejo» o «de edad avanzada»; el término hebreo puede abarcar tanto la edad como la senioridad social.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנִגַּשׂ
  english_pob_choice: will oppress
  chosen_spanish: se oprimirá
  alternatives_spanish:
  - se apretará contra
  - hostigará
  - ejercerá opresión sobre
  lexicon: HALOT
  rationale: El nifal en este contexto expresa presión hostil o trato opresivo, no mera aproximación física. «Se oprimirá» conserva el valor de violencia social y permite la reciprocidad del pasaje.
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - la población
  lexicon: HALOT
  rationale: Es un colectivo singular natural en español y adecuado para una sociedad entera bajo juicio.
- source_word: אִישׁ בְּאִישׁ וְאִישׁ בְּרֵעֵהוּ
  english_pob_choice: one another—man against man, and each against his neighbor
  chosen_spanish: unos a otros —hombre contra hombre, y cada uno contra su prójimo
  alternatives_spanish:
  - uno contra otro, y cada uno contra su vecino
  - hombre contra hombre, y cada uno contra su compañero
  lexicon: HALOT
  rationale: El hebreo repite expresiones distributivas para enfatizar hostilidad mutua. En español, «unos a otros» conserva la reciprocidad, y «hombre contra hombre» mantiene la fuerza representativa y el paralelismo del original.
- source_word: יִרְהֲבוּ
  english_pob_choice: will act arrogantly toward
  chosen_spanish: se mostrará arrogante
  alternatives_spanish:
  - actuará con insolencia
  - se comportará con arrogancia
  - se alzará con presunción
  lexicon: HALOT
  rationale: El verbo indica conducta orgullosa o insolente; «se mostrará arrogante» comunica bien esa actitud social sin volverlo demasiado interpretativo.
- source_word: הַנַּעַר
  english_pob_choice: the youth
  chosen_spanish: el joven
  alternatives_spanish:
  - el muchacho
  - el joven hombre
  lexicon: HALOT
  rationale: Aquí el contraste es social y generacional frente a «el anciano», por lo que «el joven» funciona con naturalidad en español.
- source_word: בַּזָּקֵן
  english_pob_choice: toward the elder
  chosen_spanish: hacia el anciano
  alternatives_spanish:
  - contra el viejo
  - hacia el viejo
  - contra el anciano
  lexicon: HALOT
  rationale: זָקֵן puede denotar edad y también senioridad social. «Anciano» mantiene ambas dimensiones con dignidad y claridad.
- source_word: הַנִּקְלֶה
  english_pob_choice: the despised
  chosen_spanish: el despreciado
  alternatives_spanish:
  - el vil
  - el de poca estima
  - el insignificante
  lexicon: HALOT
  rationale: La raíz comunica ser tenido en poca estima; «el despreciado» conserva el contraste social con «el honrado».
- source_word: בַּנִּכְבָּד
  english_pob_choice: the honored
  chosen_spanish: el honrado
  alternatives_spanish:
  - el respetado
  - el honorable
  lexicon: HALOT
  rationale: El término apunta a alguien considerado de peso o prestigio; «el honrado» expresa bien ese estatus en español y encaja con el paralelismo del verso.
theological_decisions:
- issue: Hostilidad social generalizada como forma de juicio
  english_pob_reading: The verse describes widespread mutual hostility and social collapse.
  chosen_spanish_reading: El verso describe una hostilidad mutua generalizada y un colapso del orden social.
  alternative_spanish_readings:
  - El verso habla solo de conflictos individuales.
  - El verso se limita a una falta de respeto entre generaciones.
  rationale: La estructura hebrea distributiva y el léxico de opresión y arrogancia obligan a conservar el alcance amplio del pasaje, no reducirlo a casos aislados.
  doctrine_reference: Isaías 3:5; cf. Isaías 3:4, 3:12
- issue: Relación entre reciprocidad y conflicto
  english_pob_reading: The Hebrew repeats distributive expressions to emphasize widespread mutual hostility.
  chosen_spanish_reading: Se conserva la repetición distributiva con «unos a otros» y «hombre contra hombre».
  alternative_spanish_readings:
  - 'Reformar todo como una sola expresión: «todos contra todos».'
  - Eliminar la duplicación para sonar más idiomático.
  rationale: La duplicación es parte del énfasis original y no debe suavizarse; mantenerla respeta la tensión lexical y retórica del hebreo.
  doctrine_reference: Principio de paralelismo hebreo; Isaías 3:5
translation_notes:
  revision_awareness: 'La revisión inglesa más reciente corrigió la primera mitad para recuperar la fuerza de conflicto de בְּאִישׁ y el paralelismo distributivo. Esta versión española sigue esa lectura revisada: no suaviza la relación en una mera cercanía, sino que la expresa como oposición mutua, manteniendo además la distinción entre «anciano» y «honrado» en el cierre.'
  spanish_consistency_notes:
  - Se preserva el tratamiento representativo de אִישׁ con «hombre» en la frase paralela, conforme a la decisión inglesa.
  - «Yahvé» no aparece en este versículo; no se requiere decisión terminológica sobre el Nombre divino.
  - Se mantiene un registro bíblico moderno y digno, evitando arcaísmos innecesarios.
