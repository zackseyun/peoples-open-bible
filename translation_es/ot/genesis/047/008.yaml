review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja fielmente el hebreo y la auditoría inglesa: mantiene el flujo narrativo simple, el destinatario, y el hebraísmo formal sobre la edad. También preserva correctamente la alternativa idiomática en nota. La única mejora necesaria es estilística en español: para una pregunta sobre la edad, «¿Cuántos son los días…?» suena menos natural que «¿Cuántos son los días de los años de tu vida?» con el verbo puede mantenerse, pero en registro bíblico y legibilidad amplia suena mejor «¿Cuántos son los días de los años de tu vida?»; sin embargo, el problema real está en la nota idiomática, donde «¿Qué edad tienes?» es menos natural que «¿Cuántos años tienes?» en este contexto formal y más cercana al sentido cuantitativo del original.'
  spanish_quality_summary: 'El texto es mayormente claro y digno, pero requiere un pequeño ajuste de legibilidad y naturalidad: en español bíblico moderno es preferible «Y Faraón le preguntó a Jacob[a][b]: …» o mantener «le dijo»; no obstante, como el hebreo es simplemente «dijo», conviene conservar «le dijo». La reparación más útil es cambiar la nota alternativa a «¿Cuántos años tienes?», que suena más natural y conserva mejor la cuantificación. El resto del versículo es correcto y legible.'
  glossary_alignment: No hay términos del glosario mayor comprometidos aquí. «Faraón» y «Jacob» están bien. No aparecen Yahvé, Mesías/Cristo u otros términos sensibles. La conservación del hebraísmo en el texto principal concuerda con la filosofía POB.
  issues:
  - severity: low
    issue: La nota alternativa «¿Qué edad tienes?» puede mejorarse.
    rationale: Aunque es comprensible, «¿Cuántos años tienes?» suena más natural en español general, conserva mejor el matiz cuantitativo de כַּמָּה y corresponde mejor al tipo de equivalencia idiomática que documenta la auditoría inglesa.
  revised_spanish_text: 'Y Faraón le dijo a Jacob[a][b]: «¿Cuántos son los días de los años de tu vida?»'
  revised_footnotes:
  - marker: a
    text: 'Hebreo: «¿Cuántos son los días de los años de tu vida?»; es una pregunta formal sobre la edad de Jacob expresada con un hebraísmo.'
    reason: cultural_note
  - marker: b
    text: 'O, más idiomáticamente: «¿Cuántos años tienes?»'
    reason: lexical_alternative
  revision_rationale: Se mantiene intacto el texto principal porque reproduce bien el hebraísmo formal del original y la decisión auditada en inglés. Solo se ajusta la nota alternativa para que el español idiomático sea más natural y conserve mejor el matiz cuantitativo de la pregunta.
