revisions:
- from: Y estarán sobre Aarón y sobre sus hijos cuando entren en la tienda de reunión[a], o cuando se acerquen al altar para ministrar en el lugar santo, para que no lleven culpa y mueran[b]. Será estatuto perpetuo para él y para su descendencia después de él.
  to: Y estarán puestos sobre Aarón y sobre sus hijos cuando entren en la tienda de reunión, o cuando se acerquen al altar para ministrar en el lugar santo, para que no lleven culpa y mueran[a]. Será estatuto perpetuo para él y para su descendencia después de él.[b]
  rationale: Se elimina la nota innecesaria sobre ‘tienda de reunión’, se reubican las alternativas para reflejar el aparato auditado del POB en los dos lugares pertinentes (culpa y estatuto perpetuo), y se mejora ligeramente la naturalidad de la referencia a las vestiduras con ‘estarán puestos sobre’.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:24:40Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido del hebreo y del POB en casi toda la cláusula: temporalidad de entrada/acercamiento, servicio cultual, consecuencia de culpa y muerte, y cierre legal durativo. Sin embargo, la nota [a] está mal alineada con el rastro inglés: el POB inglés pone la alternativa en ‘tent of meeting’ como traducción principal, mientras la nota inglesa dice ‘Or “incur guilt”’, que corresponde a la cláusula de culpa, no a la tienda. En español, la nota [a] actual (‘O “tienda del encuentro”’) no refleja esa racionalidad auditada y además crea una nota innecesaria. También conviene preferir ‘lleven culpa’ sobre ‘llevar culpa’ en la nota explicativa para concordar con el texto revisado.'
  spanish_quality_summary: El español es claro, digno y ampliamente legible. ‘Tienda de reunión’, ‘ministrar’, ‘lugar santo’ y ‘estatuto perpetuo’ son adecuados al registro bíblico. La sintaxis general es natural. El principal problema es de aparato de notas, no de fluidez. También puede mejorarse ligeramente la naturalidad de ‘estarán sobre Aarón’ a ‘estarán puestos sobre Aarón’, que hace explícita la referencia a las vestiduras sin apartarse del hebreo.
  glossary_alignment: 'No hay conflicto con la terminología base del proyecto. No aparecen Yahvé, Mesías/Cristo, Espíritu, etc. Las elecciones cultuales concuerdan bien con el POB: ‘ministrar’, ‘lugar santo’, ‘estatuto perpetuo’, ‘descendencia’. La expresión ‘lleven culpa’ preserva el modismo legal-cultual mejor que una paráfrasis; la alternativa ‘incurran/contraigan culpa’ puede mantenerse en nota.'
  issues:
  - severity: medium
    issue: La nota [a] no corresponde al aparato auditado del POB inglés.
    rationale: El inglés ancla [a] en ‘tent of meeting’, pero su contenido dice ‘Or “incur guilt”; Hebrew “bear guilt” is a legal-cultic idiom’, lo cual claramente pertenece a la cláusula de culpa. La nota española [a] sobre ‘tienda del encuentro’ no preserva la racionalidad documentada y debe eliminarse para evitar confusión.
  - severity: low
    issue: ‘Estarán sobre Aarón’ suena algo rígido en español.
    rationale: Aunque es formalmente fiel a עַל, en español bíblico natural resulta más claro ‘estarán puestos sobre Aarón’, haciendo explícito que se trata de prendas vestidas sin alterar el sentido.
  - severity: low
    issue: La nota [b] puede afinarse para concordar exactamente con el texto revisado.
    rationale: Si el texto principal usa ‘lleven culpa’, la nota explicativa debe reflejar esa forma verbal para mayor cohesión interna.
  revised_spanish_text: Y estarán puestos sobre Aarón y sobre sus hijos cuando entren en la tienda de reunión, o cuando se acerquen al altar para ministrar en el lugar santo, para que no lleven culpa y mueran[a]. Será estatuto perpetuo para él y para su descendencia después de él.[b]
  revised_footnotes:
  - marker: a
    text: O ‘incurran en culpa’; el hebreo ‘lleven culpa’ es un modismo legal-cultual.
    reason: lexical_alternative
  - marker: b
    text: O ‘estatuto permanente’.
    reason: lexical_alternative
  revision_rationale: Se elimina la nota innecesaria sobre ‘tienda de reunión’, se reubican las alternativas para reflejar el aparato auditado del POB en los dos lugares pertinentes (culpa y estatuto perpetuo), y se mejora ligeramente la naturalidad de la referencia a las vestiduras con ‘estarán puestos sobre’.
