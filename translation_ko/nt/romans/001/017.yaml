id: ROM.1.17
reference: Romans 1:17
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: δικαιοσύνη γὰρ θεοῦ ἐν αὐτῷ ἀποκαλύπτεται ἐκ πίστεως εἰς πίστιν, καθὼς γέγραπται· Ὁ δὲ δίκαιος ἐκ πίστεως ζήσεται.
base_translation:
  language: en
  yaml_path: translation/nt/romans/001/017.yaml
  text: 'For in it the righteousness of God is revealed from faith to faith[d][c][b][a], just as it is written: “The righteous one shall live by faith.”'
  footnotes:
  - marker: a
    text: Or “the justice of God.”
    reason: lexical_alternative
  - marker: b
    text: The Greek ἐκ πίστεως εἰς πίστιν is a notorious crux; “from faith to faith” preserves both prepositions and the rhetorical repetition without collapsing the ambiguity. More interpretive options include “from faith for faith,” “by faith from first to last,” or “through faith, for faith.”
    reason: alternative_reading
  - marker: c
    text: Or “the one who is righteous by faith shall live.”
    reason: alternative_reading
  - marker: d
    text: Or 'But the righteous one shall live by faith.'.
    reason: previous_rendering
translation:
  language: ko
  text: 이는 복음 안에서 하나님의 의가 믿음으로부터 믿음에 이르도록[a] 계시되기 때문입니다. 기록된 바와 같이, 「의로운 자는 믿음으로 살리라」 하였습니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 헬라어 ἐκ πίστεως εἰς πίστιν은 본문의 유명한 난문으로, 두 전치사와 수사적 반복을 보존하기 위해 「믿음으로부터 믿음에 이르도록」으로 옮겼다. 해석적 대안으로 「믿음으로 말미암아 믿음을 위하여」, 「처음부터 끝까지 믿음으로」 등이 있다.
    reason: alternative_reading
lexical_decisions:
- source_word: δικαιοσύνη θεοῦ
  english_pob_choice: righteousness of God
  chosen_korean: 하나님의 의
  alternatives_korean:
  - 하나님의 정의
  - 하나님에게서 나는 의
  lexicon: BDAG
  rationale: 바울의 핵심 신학 용어 δικαιοσύνη θεοῦ를 「하나님의 의」로 옮긴다. 속격의 모호성(주격적/근원적)은 한국어 「의」로 보존된다.
- source_word: ἐκ πίστεως εἰς πίστιν
  english_pob_choice: from faith to faith
  chosen_korean: 믿음으로부터 믿음에 이르도록
  alternatives_korean:
  - 믿음에서 믿음으로
  - 처음부터 끝까지 믿음으로
  lexicon: BDAG
  rationale: 두 전치사의 반복적 운율과 모호성을 직역으로 보존하고, 해석적 옵션은 각주에 둔다.
theological_decisions:
- issue: 1:17 「하나님의 의」와 믿음의 관계
  chosen_reading: 하나님의 의가 믿음으로부터 믿음에 이르도록 계시되기 때문
  alternative_readings:
  - 하나님에게서 나는 의가 믿음으로 말미암아 믿음을 위하여 나타남
  rationale: 바울의 명제절을 직역 구조로 보존하여 「하나님의 의」(주격적 속격으로 읽힐 가능성 포함)와 믿음 양 끝의 신학적 무게를 둘 다 살린다. 해석적 풀이(「믿음으로 시작되어 믿음으로 완성되는」)는 본문에 없는 의미를 가두므로 각주에 둔다.
  doctrine_reference: DOCTRINE.md §1 + §5 — preserve plain meaning, document ambiguity
