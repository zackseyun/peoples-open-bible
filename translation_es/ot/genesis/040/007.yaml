translation:
  language: es
  text: 'Entonces les preguntó a los funcionarios[a] de Faraón que estaban con él en custodia en la casa de su señor: «¿Por qué tienen hoy el rostro abatido?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «eunucos de Faraón»; el término hebreo puede referirse tanto a eunucos literales como, más ampliamente, a funcionarios de la corte.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁאַל
  english_pob_choice: So he asked
  chosen_spanish: Entonces preguntó
  alternatives_spanish:
  - Y preguntó
  - Preguntó entonces
  lexicon: HALOT
  rationale: El wayyiqtol avanza la narración; «Entonces preguntó» conserva la secuencia narrativa de manera natural en español sin añadir contenido.
- source_word: סְרִיסֵי פַרְעֹה
  english_pob_choice: Pharaoh’s officials
  chosen_spanish: los funcionarios de Faraón
  alternatives_spanish:
  - los eunucos de Faraón
  - los oficiales de la corte de Faraón
  lexicon: HALOT
  rationale: סָרִיס puede referirse a eunucos literales o a funcionarios cortesanos. En el texto principal se opta por «funcionarios» para no fijar indebidamente la especificidad física cuando el contexto resalta su cargo; la alternativa más concreta queda como opción semántica.
- source_word: אֲשֶׁר אִתּוֹ
  english_pob_choice: who were with him
  chosen_spanish: que estaban con él
  alternatives_spanish:
  - que estaban con José
  - que estaban con él, junto a él
  lexicon: HALOT
  rationale: El pronombre se refiere a José por el contexto. «Con él» preserva la referencia pronominal hebrea sin sobreespecificar en el cuerpo principal.
- source_word: בְמִשְׁמַר
  english_pob_choice: in custody
  chosen_spanish: en custodia
  alternatives_spanish:
  - en confinamiento
  - presos
  lexicon: HALOT
  rationale: El sustantivo indica una situación o lugar de custodia/confinamiento. «En custodia» reproduce bien la idea jurídica y carcelaria del hebreo.
- source_word: בֵּית אֲדֹנָיו
  english_pob_choice: in his master’s house
  chosen_spanish: en la casa de su señor
  alternatives_spanish:
  - en la casa de su amo
  - en la casa de su dueño
  lexicon: HALOT
  rationale: אָדוֹן puede traducirse como «señor» o «amo» según el contexto. Aquí se refiere al amo de José; «señor» mantiene la relación de autoridad sin sonar excesivamente servil en español contemporáneo.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  lexicon: HALOT
  rationale: El infinitivo de cita se vierte de forma directa con «diciendo», preservando la estructura hebrea de introducción del discurso.
- source_word: מַדּוּעַ
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿A causa de qué
  - ¿Con qué motivo
  lexicon: HALOT
  rationale: La pregunta directa se expresa de modo idiomático en español con «¿Por qué?».
- source_word: פְּנֵיכֶם רָעִים
  english_pob_choice: your faces downcast
  chosen_spanish: tienen el rostro abatido
  alternatives_spanish:
  - tienen el rostro triste
  - tienen el rostro decaído
  - les luce mal el rostro
  lexicon: HALOT
  rationale: Literalmente es «vuestro rostro está malo», una expresión idiomática para apariencia triste o preocupada. «Rostro abatido» conserva la imagen facial y el matiz emocional sin sonar rígido.
- source_word: הַיּוֹם
  english_pob_choice: today
  chosen_spanish: hoy
  alternatives_spanish:
  - este día
  lexicon: HALOT
  rationale: Equivalente temporal idiomático en español.
translation_notes:
  revision_awareness: El inglés auditado pasó por una revisión menor en la locución de la casa del amo, pero volvió a la formulación más literal «in his master’s house». La versión española sigue de cerca esa decisión, manteniendo «en la casa de su señor» como reflejo natural de la construcción hebrea.
  spanish_consistency_notes:
  - Se usa «Faraón» con mayúscula como nombre propio tradicional en español bíblico.
  - Se mantiene «señor» para אָדוֹן en este contexto, coherente con una relación de amo/autoridad y con el registro bíblico español.
  - «En custodia» traduce el estado/lugar de vigilancia sin añadir la idea de prisión formal que el hebreo no explicita aquí.
  - Se conserva la imagen de «rostro abatido» para no perder el hebraísmo idiomático de פְּנֵיכֶם רָעִים.
