    rationale: La elección inglesa 'proved false' busca un sentido más amplio que solo 'mintió'. En español, 'resultó falso en todo lo que dijo' comunica mejor que sus palabras se mostraron falsas sin reducir el verbo a mera manera de hablar.
  revised_spanish_text: Y resultó falso en todo lo que dijo[a], y se apartó de Jonatán, y no recompensó los favores que le había mostrado, y lo oprimió severamente.
