translation:
  language: es
  text: Si, pues, algunos hombres perniciosos[a] han escapado de su tierra a nosotros, entréguenlos a Simón, el sumo sacerdote, para que los castigue conforme a la ley de ellos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse como 'hombres pestilentes', 'alborotadores' o, más literalmente, 'hombres pestilentes'. El griego λοιμοί es un término duro para personas peligrosas o perniciosas.
    reason: lexical_alternative
  - marker: b
    text: O 'para que haga justicia contra ellos' o 'para que tome venganza de ellos'. El griego puede implicar castigo o vindicación; el contexto legal favorece aquí el sentido judicial.
    reason: alternative_reading
lexical_decisions:
- source_word: λοιμοὶ
  english_pob_choice: pestilent men
  chosen_spanish: hombres perniciosos
  alternatives_spanish:
  - hombres pestilentes
  - alborotadores
  - personas dañinas
  - criminales
  lexicon: LSJ
  rationale: λοιμοί es un término fuerte de desprecio que alude a personas dañinas o funestas; en español, 'hombres perniciosos' conserva el juicio hostil sin sonar artificial. 'Pestilentes' sería más literal pero menos natural en español actual.
- source_word: διαπεφεύγασιν
  english_pob_choice: have escaped
  chosen_spanish: han escapado
  alternatives_spanish:
  - han huido
  - se han fugado
  - han logrado escapar
  lexicon: LSJ
  rationale: El perfecto expresa una huida ya realizada con resultado vigente; 'han escapado' comunica bien ese valor en un contexto de extradición.
- source_word: χώρας
  english_pob_choice: land
  chosen_spanish: tierra
  alternatives_spanish:
  - país
  - territorio
  - región
  lexicon: LSJ
  rationale: χώρα puede significar tierra, país o territorio. 'Tierra' es amplio, natural y suficientemente neutral para el contexto político-geográfico.
- source_word: παράδοτε
  english_pob_choice: hand ... over
  chosen_spanish: entréguenlos
  alternatives_spanish:
  - háganlos llegar
  - súrtanlos
  - entréguenlos en custodia
  lexicon: LSJ
  rationale: El imperativo pide transferir a los fugitivos a la custodia de Simón. 'Entréguenlos' es idiomático y conserva el valor directivo.
- source_word: ἀρχιερεῖ
  english_pob_choice: high priest
  chosen_spanish: sumo sacerdote
  alternatives_spanish:
  - sumo pontífice
  - sacerdote principal
  lexicon: LSJ
  rationale: ἀρχιερεύς es el título técnico del jefe del sacerdocio judío. 'Sumo sacerdote' es la forma establecida y fiel en español.
- source_word: ἐκδικήσει
  english_pob_choice: may punish
  chosen_spanish: los castigue
  alternatives_spanish:
  - haga justicia contra ellos
  - ejerza justicia sobre ellos
  - los venga
  lexicon: LSJ
  rationale: En este marco legal, ἐκδικέω puede tener fuerza de castigo o de exigencia de justicia. 'Los castigue' preserva la dimensión punitiva sin convertirla en venganza privada.
- source_word: κατὰ τὸν νόμον αὐτῶν
  english_pob_choice: according to their law
  chosen_spanish: conforme a su ley
  alternatives_spanish:
  - según su ley
  - de acuerdo con su ley
  - conforme a la ley de ellos
  lexicon: LSJ
  rationale: La preposición κατά con acusativo marca norma o conformidad. 'Conforme a su ley' mantiene el sentido jurídico y respeta el plural implícito del audit trail inglés ('their law').
theological_decisions:
- issue: Alcance de ἐκδικήσει en un contexto jurídico-político
  english_pob_reading: judicial punishment/exaction of justice rather than personal vengeance
  chosen_spanish_reading: castigo judicial más que venganza privada
  alternative_spanish_readings:
  - venganza
  - hacer justicia
  - tomar represalias
  rationale: La frase siguiente, 'conforme a su ley', orienta la acción hacia un procedimiento legal. 'Los castigue' evita suavizar el acto, pero tampoco lo presenta como resentimiento personal.
  doctrine_reference: Preservar la tensión jurídica del texto; no resolverla por armonización devocional.
translation_notes:
  revision_awareness: Se tuvo en cuenta el paquete griego, la traducción inglesa de auditoría y sus notas lexicográficas/teológicas. Se conservó la fuerza hostil de λοιμοί, el valor de perfecto de διαπεφεύγασιν, y la ambigüedad jurídica de ἐκδικήσει sin convertirla en venganza privada.
  spanish_consistency_notes:
  - Se usó 'sumo sacerdote' como equivalente fijo de ἀρχιερεύς.
  - Se evitó 'SEÑOR' u otros reemplazos litúrgicos porque el texto no contiene el nombre divino.
  - Se mantuvo un registro jurídico claro con 'conforme a su ley' para reflejar κατὰ τὸν νόμον αὐτῶν.
  - Las notas al pie están ancladas explícitamente en el texto con [a] y [b].
