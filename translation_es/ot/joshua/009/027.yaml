- from: Así que Josué los hizo leñadores y cargadores de agua[a] en aquel día, para la congregación y para el altar de Yahvé, hasta el día de hoy, en el lugar que él escogería.
  to: Entonces Josué los hizo leñadores y sacadores de agua[a] en aquel día, para la congregación y para el altar de Yahvé, hasta el día de hoy, en el lugar que él escogería.
  rationale: Se reemplaza «Así que» por «Entonces» para una secuencia narrativa más neutra y fiel al hebreo, y se cambia «cargadores de agua» por «sacadores de agua» para reflejar mejor el sentido léxico de שאב. Se conserva la alternativa menos literal en nota. El resto del versículo está bien alineado con la fuente y la terminología del proyecto.
