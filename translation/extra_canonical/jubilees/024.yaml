translation:
  text: '1[a]. And it came to pass after Abraham died that the LORD blessed Isaac his son. And he rose up from Hebron and went and dwelt at the Well of the Vision in the first year of the third week of this jubilee, seven years.

    2. And in the first year of the fourth week a famine came upon the land, besides the former famine that had been in the days of Abraham.

    3. And Jacob cooked lentil stew, and Esau came from the field hungry. And he said to Jacob his brother, "Give me some of this red stew of lentils." And Jacob said to him, "Sell to me your birthright, the firstborn share."

    4. "And I will give you bread and also some of this lentil stew." And Esau said in his heart, "I am about to die;

    5. of what use to me is this firstborn birthright?" And he said to Jacob, "I give it to you." And Jacob said,

    6. "Swear to me today." And he swore to him. And Jacob gave to Esau his brother bread and stew[b], and he ate until he was satisfied. And Esau despised his birthright. Therefore his name was called Edom, because of the red lentil stew that Jacob gave him in exchange for his birthright.

    7. And Jacob became greater, and Esau was brought low from the command of his father. And there was famine upon the land, and

    8. Isaac set out to go down to Egypt in the second year of the sixth week. And he went to Gerar, to Abimelech king of the Philistines.

    9. And the LORD appeared to him and said to him, "Do not go down to Egypt. Dwell in the land that I tell you, and stay in this land, and I will be with you and bless you. For to you

    10. and to your seed I will give all this land, and I will establish my oath that I swore to Abraham your father. And I will multiply your seed like the stars of heaven, and I will give to your seed all this land. And all the nations of the earth will bless themselves

    11. by your seed, because your father obeyed my voice and kept my charge and my commandments and my statutes and my covenant. And now, listen to my voice and dwell in this land." And he dwelt in Gerar three weeks of years. And Abimelech gave command concerning him

    12. and concerning all that was his, saying, "Every man who touches him or anything that is his,

    13. let him surely die." And Isaac prospered among the Philistines, and he had much property,

    14. cattle and sheep and camels and donkeys and much wealth. And he sowed in the land

    15. of the Philistines and brought in a hundredfold. And Isaac became very great, and the Philistines envied him. And all the wells that the servants of Abraham had dug during Abraham''s lifetime the Philistines stopped up

    16. after Abraham died, and filled them with earth. And Abimelech said to Isaac, "Go away from us, for you have become much mightier than we." And Isaac departed from there in the first year of the seventh week and camped in the valley of Gerar. And they dug again the wells of water that the servants of Abraham his father had dug, and that the Philistines had stopped up after Abraham his father died; and they called their names by the names that Abraham his father had called them. And Isaac''s servants dug a well in the wadi and found living water. And the shepherds of Gerar quarreled with Isaac''s shepherds, saying, "The water is ours." And Isaac called the name of that well Contention, because they contended with us. And they dug another well, and they quarreled over that one also, and he called its name Hostility. And he moved on from there and dug another well, and they did not quarrel over it, and he called its name Broad Place. And Isaac said, "Now the LORD has made room for us, and we have become fruitful in the land." And he went up from there to the Well of the Oath in the first year of the first week in the forty-fourth jubilee. And the LORD appeared to him that night, on the new moon of the first month, and said to him, "I am the God of Abraham your father. Do not fear, for I am with you, and I will bless you and greatly multiply your seed like the sand of the earth, for the sake of Abraham my servant." And he built there an altar that Abraham his father had first built, and he called on the name of the LORD, and he offered sacrifice to the God of Abraham his father. And they dug a well and found living water. And Isaac''s servants dug another well and did not find water, and they came and told Isaac that they had not found water. And Isaac said, "On this day I have sworn to the Philistines, and this thing has happened to us." And he called the name of that place Well of the Oath, because there he swore to Abimelech and to Ahuzzath his companion and to Phicol the captain of his army. And Isaac knew on that day that he had sworn under compulsion, to make peace with them. And on that day Isaac cursed the Philistines and said, "Cursed be the Philistines with wrath and indignation among all the nations. May the LORD give them over for reproach and for cursing and for wrath and for indignation into the hand of sinful nations, into the hand of the Kittim. And those who escape from the sword of the enemy and from the Kittim, let a righteous people root them out from under heaven, because they will be enemies and haters of my children in their generations upon the earth. And there will not be left to them any survivor or anyone who escapes in the day of wrathful judgment. For all the seed of the Philistines is destined for destruction and uprooting and removal from the earth, and there will no longer remain for these Caphtorim a name or seed upon the earth. For even if he goes up to heaven, from there he will be brought down; and if he makes his nest in the earth, from there he will be torn away; and if he hides among the nations, from there he will be rooted out; and if he goes down into Sheol, there also his judgment will increase, and there will be no peace for him there. And if he goes into captivity, by the hand of those who seek his life on the highways they will kill him, and there will be left for him neither name nor seed in all the earth, for he will go into eternal curse." And thus it is written and ordained concerning him on the heavenly tablets, to do to him on the day of judgment[c][d][e][f], so that he should be rooted out from the earth.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The place-name is rendered literally from the Ge'ez as 'Well of the Vision.' It likely corresponds to the site known from Genesis, but the translation avoids importing the fuller traditional form into the main text.
    reason: cross_reference
    anchor_ref: '24:1'
  - marker: b
    text: The legal list in the divine speech is textually dense and partially overlapping. The English keeps the sequence distinct rather than collapsing it into a single term like 'laws.'
    reason: segmentation_note
    anchor_ref: '24:11'
  - marker: f
    text: This verse is exceptionally long in the source and appears to combine material parallel to Genesis 26 with Jubilees' own expansions, including chronological notices, covenant language, and an extended curse oracle.
    reason: segmentation_note
    anchor_ref: 24:16a
  - marker: e
    text: The well-names are translated by sense ('Contention,' 'Hostility,' 'Broad Place') rather than transliterated, so the explanatory wordplay remains visible in English.
    reason: lexical_alternative
    anchor_ref: 24:16b
  - marker: d
    text: '''Kittim'' is a traditional ancient ethnonym in Second Temple literature; its exact historical referent can shift by context.'
    reason: cultural_note
    anchor_ref: 24:16c
  - marker: c
    text: '''Heavenly tablets'' is a key Jubilees motif for decrees recorded in heaven; the phrase is preserved explicitly here.'
    reason: cross_reference
    anchor_ref: 24:16d
lexical_decisions:
- source_word: ዐዘቅተ ራእይ
  chosen: Well of the Vision
  alternatives:
  - Beer-lahai-roi
  - well of appearance
  rationale: Rendered transparently from the Ge'ez components rather than harmonizing directly to the Genesis place-name, while preserving recognizability through capitalization.
- source_word: ሱባዔ
  chosen: week of years
  alternatives:
  - week
  - heptad
  rationale: In Jubilees chronology this denotes a seven-year unit, not an ordinary week; the English translation preserves calendrical specificity.
- source_word: ኢዮቤሌው
  chosen: jubilee
  alternatives:
  - jubile
  rationale: Standard English form for Jubilees' chronological unit; essential to preserve the book's temporal framework.
- source_word: ተብሰለ ብርስን / ስርናይ
  chosen: lentil stew / red stew
  alternatives:
  - pottage
  - pulse stew
  rationale: Uses readable modern English while preserving the red/lentil association that explains the name Edom.
- source_word: ልህቃኒከ ዘቅድመ ልደት
  chosen: your birthright, the firstborn share
  alternatives:
  - your right of the firstborn
  - your primogeniture
  rationale: Expands slightly for clarity because the Ge'ez expression explicitly points to the right belonging to prior birth.
- source_word: አህቀ
  chosen: became greater / prospered
  alternatives:
  - grew strong
  - increased
  rationale: 'Context-sensitive rendering: of Jacob/Isaac it denotes increase or advancement, not merely physical strength.'
