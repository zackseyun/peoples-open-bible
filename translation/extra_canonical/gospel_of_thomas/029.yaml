translation:
  text: Jesus said[1], "If the flesh came into being because of the spirit, it is
    a wonder; but if the spirit came into being because of the body, it is a wonder
    of wonders[b][a][3][2]. Yet I myself marvel at how this great wealth has made
    its home in this poverty."
  philosophy: optimal-equivalence
  footnotes:
  - marker: '1'
    text: ϣⲡⲏⲣⲉ may mean “child” in other contexts (Crum), but here the idiom ⲟⲩϣⲡⲏⲣⲉ
      ⲛϣⲡⲏⲣⲉ is a superlative, hence “a wonder of wonders.”
    reason: lexical_alternative
  - marker: '2'
    text: Dilley prints ϫⲉⲡⲱ[ⲥ] with the final ⲥ restored; the normalized form is
      ⲡⲱⲥ (“how”).
    reason: lacuna_or_restoration
  - marker: '3'
    text: POxy 1 preserves “…this poverty,” aligning with ⲡⲉⲓⲙⲛⲧϩⲏⲕⲉ here.
    reason: cross_reference
  - marker: a
    text: Or 'if the spirit came into being because of the body'.
    reason: previous_rendering
  - marker: b
    text: Or 'Yet I—I marvel'.
    reason: previous_rendering
lexical_decisions:
- source_word: ϣⲱⲡⲉ
  chosen: come into being
  alternatives:
  - happen
  - be born
  - come to be
  lexicon: Crum; Lambdin, Introduction to Sahidic Coptic §50
  rationale: In Thomas’s metaphysical contexts, ϣⲱⲡⲉ regularly expresses origination/appearance
    rather than physical birth; “come into being” preserves that nuance and Thomas’s
    terseness.
- source_word: ⲉⲧⲃⲉ
  chosen: because of
  alternatives:
  - on account of
  - for the sake of
  lexicon: Crum s.v. ⲉⲧⲃⲉ; Layton, Coptic Grammar §98
  rationale: Causal preposition; “because of” is straightforward and keeps parallelism
    in the two clauses.
- source_word: ⲥⲁⲣⲝ (ⲡⲥⲁⲣⲝ)
  chosen: flesh
  alternatives:
  - body
  lexicon: Crum s.v. loanwords; Layton §49
  rationale: Deliberate contrast appears between ⲥⲁⲣⲝ and ⲥⲱⲙⲁ; rendering both as
    “body” would collapse the contrast. “Flesh” for ⲥⲁⲣⲝ, “body” for ⲥⲱⲙⲁ preserves
    Thomas’s diction.
- source_word: ⲡⲛⲉⲩⲙⲁ
  chosen: spirit
  alternatives: []
  lexicon: Crum; Layton §49
  rationale: Standard rendering fits the philosophical antithesis in the saying.
- source_word: ⲟⲩϣⲡⲏⲣⲉ / ⲛϣⲡⲏⲣⲉ
  chosen: a wonder / a wonder of wonders
  alternatives:
  - a marvel / a marvel of marvels
  - a child / a child of children
  lexicon: Crum s.v. ϣⲡⲏⲣⲉ; Layton §33
  rationale: ϣⲡⲏⲣⲉ can mean “child,” but the idiom “ⲟⲩϣⲡⲏⲣⲉ ⲛϣⲡⲏⲣⲉ” is a Semitic-like
    superlative meaning “wonder of wonders.” Context is evaluative, not genealogical.
- source_word: ⲁⲗⲗⲁ
  chosen: Yet
  alternatives:
  - But
  - However
  lexicon: Loan from Greek ἀλλά; Layton §44
  rationale: Marks strong contrast; “Yet” preserves rhetorical turn before the first-person
    statement.
- source_word: ⲁⲛⲟⲕ ⲁⲛⲟⲕ
  chosen: I—I
  alternatives:
  - I myself
  - I, even I
  lexicon: Layton §66; Lambdin §151
  rationale: Duplication is emphatic; retained as “I—I” to preserve Thomas’s striking
    emphasis.
- source_word: ⲣϣⲡⲏⲣⲉ
  chosen: marvel
  alternatives:
  - am amazed
  - am astonished
  lexicon: Crum s.v. ϣⲡⲏⲣⲉ (vb.), derived from the noun
  rationale: Verb cognate of ϣⲡⲏⲣⲉ; “marvel” keeps lexical echo with the earlier “wonder(s).”
- source_word: ⲡⲱⲥ
  chosen: how
  alternatives:
  - in what way
  lexicon: Crum s.v. ⲡⲱⲥ; Layton §119
  rationale: Introduces an indirect question after ϫⲉ; simple and idiomatic.
- source_word: ⲡⲉⲓⲛⲟϭ ⲛⲙⲛⲧⲣⲙⲙⲁⲟ
  chosen: this great wealth
  alternatives:
  - this greatness of wealth
  - this greatness, [namely] wealth
  lexicon: Crum s.v. ⲛⲟϭ; ⲙⲛⲧⲣⲙⲙⲁⲟ
  rationale: Head noun is “greatness” modified by a genitive of quality “of wealth”;
    English “this great wealth” conveys the same sense more naturally while preserving
    the demonstrative force.
- source_word: ⲁⲛⲧⲟⲥⲟⲩⲱϩ
  chosen: has made its home
  alternatives:
  - has taken up residence
  - has dwelt
  - has settled
  lexicon: Crum s.v. ⲥⲟⲩⲱϩ "to dwell, lodge"; Layton §202 (first perfect forms)
  rationale: Compound perfect form; “made its home” captures telic nuance of establishing
    dwelling.
- source_word: ⲡⲉⲓⲙⲛⲧϩⲏⲕⲉ
  chosen: this poverty
  alternatives:
  - this destitution
  lexicon: Crum s.v. ⲙⲛⲧϩⲏⲕⲉ
  rationale: Standard rendering; aligns with the paradox of “wealth” dwelling in “poverty.”
textual_note: 'Dialect/orthography: The saying is Sahidic with Lycopolitan features.
  The linking vowel ⲁ after ⲉⲣⲉ appears (e.g., ⲉϣϫⲉ ⲉⲣⲉⲁⲡⲥⲁⲣⲝ), a normal phenomenon
  in this register. Emphatic duplication ⲁⲛⲟⲕ ⲁⲛⲟⲕ is retained. The compound perfect
  ⲁⲛⲧⲟⲥⲟⲩⲱϩ reflects first perfect morphology with an incorporated subject marker.
  Lacuna/restoration: Dilley’s printed text shows ϫⲉⲡⲱ[ⲥ] with the final sigma restored;
  the normalized lemmatization reads ⲡⲱⲥ. No other restorations occur in this saying.
  Idiom: ⲟⲩϣⲡⲏⲣⲉ ⲛϣⲡⲏⲣⲉ is an idiomatic superlative “a wonder of wonders,” not a reference
  to children.'
