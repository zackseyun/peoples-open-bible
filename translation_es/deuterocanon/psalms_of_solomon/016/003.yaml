    text: 'O: «cuando mi alma estaba siendo apartada de Yahvé, el Dios de Israel»'
    reason: lexical_alternative
  - marker: b
    text: 'O: «de no haber venido Yahvé en mi auxilio por su misericordia»'
    reason: lexical_alternative
  - marker: c
    text: La frase «para siempre» puede referirse a «su misericordia» o al acto de rescate en conjunto.
    reason: alternative_reading
  revision_rationale: Se corrige la terminología divina para ajustarla al estándar del proyecto español («Yahvé»). Se mejora la naturalidad y la fuerza contrafactual de εἰ μὴ con «de no haberme socorrido». Se mantiene la ambigüedad de «para siempre» y el sentido pasivo angustioso de «estaba siendo arrancada». También se ajustan las notas para que suenen naturales en español y coincidan con el texto revisado.
