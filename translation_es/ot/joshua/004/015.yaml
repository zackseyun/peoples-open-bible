lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And ... said
  chosen_spanish: dijo
  alternatives_spanish:
  - entonces dijo
  - y dijo
  lexicon: HALOT
  rationale: El waw consecutivo + אמר avanza la narración. En español, 'dijo' comunica de forma natural el inicio del discurso; el valor de enlace narrativo queda implícito en el contexto y en la puntuación, sin forzar un calco mecánico.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se mantiene el nombre propio divino del Tetragrama, según la convención del proyecto para el español. 'Yahvé' preserva el nombre personal en lugar de sustituirlo por un título; 'Jehová' y 'el SEÑOR' se evitan por razones de política terminológica y transparencia textual.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  - para
  lexicon: HALOT
  rationale: La preposición introduce el complemento indirecto del habla. En español, 'a' es la equivalencia directa y más natural con el verbo de decir.
- source_word: יְהוֹשֻׁעַ
  english_pob_choice: Joshua
  chosen_spanish: Josué
  alternatives_spanish:
  - Josués
  lexicon: HALOT
  rationale: Se usa la forma española asentada del nombre propio bíblico. 'Josué' es la adaptación estándar y plenamente reconocible para el lector hispanohablante.
- source_word: לֵאמֹר
  english_pob_choice: ','
  chosen_spanish: '[a]'
  alternatives_spanish:
  - saying
  - diciendo
  lexicon: HALOT
  rationale: El infinitivo לֵאמֹר introduce el discurso directo que continúa en el versículo siguiente. En español, el recurso más fiel y legible es marcarlo con puntuación y nota, en vez de añadir un gerundio o infinitivo que sonaría redundante.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: La lectura del texto fuente es el Tetragrama. El español conserva esa decisión con 'Yahvé', manteniendo el nombre del pacto y evitando una sustitución por un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: 'La revisión más reciente del pasaje indica que no se requirieron cambios, y el cotejo final reporta alto acuerdo. Por eso, el borrador español sigue de cerca la solución ya validada: nombre divino explícito, verbo narrativo simple y nota breve sobre לֵאמֹר como introducción del habla siguiente.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma española estándar para el Tetragrama en este proyecto.
  - Se conserva 'Josué' como nombre propio bíblico convencional en español.
  - La puntuación reproduce la función de לֵאמֹר sin añadir contenido inexistente en el versículo.
  - El registro es sobrio y bíblico, pero con sintaxis natural en español moderno.
