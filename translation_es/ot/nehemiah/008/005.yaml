translation:
  language: es
  text: Esdras abrió el libro[a] a la vista de todo el pueblo, porque estaba por encima de todo el pueblo; y cuando lo abrió, todo el pueblo se puso en pie.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'el rollo'. El hebreo סֵפֶר puede referirse a un documento escrito en forma de rollo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּפְתַּח
  english_pob_choice: opened
  chosen_spanish: abrió
  alternatives_spanish:
  - desplegó
  - desenrolló
  lexicon: HALOT
  rationale: פתח significa 'abrir'. En español, 'abrió' reproduce de manera directa y natural la acción indicada por el hebreo. 'Desenrolló' es posible por la forma física de un rollo, pero sería una precisión interpretativa que el texto hebreo no exige de modo explícito.
- source_word: הַסֵּפֶר
  english_pob_choice: the book
  chosen_spanish: el libro
  alternatives_spanish:
  - el rollo
  - el documento escrito
  lexicon: HALOT
  rationale: סֵפֶר puede referirse a un escrito, libro o rollo. Siguiendo la decisión auditada del inglés, 'libro' es amplio y natural en español; la forma material de rollo queda como alternativa implícita y se señala en nota.
- source_word: לְעֵינֵי
  english_pob_choice: in the sight of
  chosen_spanish: a la vista de
  alternatives_spanish:
  - ante
  - en presencia de
  - en pleno view de
  lexicon: HALOT
  rationale: La expresión tiene un sentido visual y público. 'A la vista de' conserva bien el matiz de que la acción ocurrió de manera visible para todos, con español idiomático y sin perder el valor semántico de 'los ojos de'.
- source_word: כָל הָעָם
  english_pob_choice: all the people
  chosen_spanish: todo el pueblo
  alternatives_spanish:
  - todo el pueblo reunido
  - toda la asamblea
  lexicon: HALOT
  rationale: En este contexto, עָם se refiere al conjunto reunido de la comunidad. 'Pueblo' es natural en español bíblico y comunica el carácter colectivo sin sustituir indebidamente el término por 'asamblea', que sería más interpretativo.
- source_word: כִּי מֵעַל כָּל הָעָם הָיָה
  english_pob_choice: for he was above all the people
  chosen_spanish: porque estaba por encima de todo el pueblo
  alternatives_spanish:
  - porque estaba más alto que todo el pueblo
  - porque se hallaba elevado sobre todo el pueblo
  lexicon: HALOT
  rationale: מֵעַל indica elevación física en este contexto. 'Por encima de' comunica la altura relativa y explica por qué todos podían verlo, sin convertir la expresión en una afirmación de superioridad social.
- source_word: וּכְפִתְחוֹ
  english_pob_choice: and when he opened it
  chosen_spanish: y, cuando lo abrió
  alternatives_spanish:
  - y al abrirlo
  - y mientras lo abría
  lexicon: HALOT
  rationale: 'El כ prefijado tiene valor temporal: ''cuando/al''. ''Cuando lo abrió'' es la opción más natural en español y mantiene el valor temporal. ''Lo'' retoma el objeto mencionado sin añadir contenido ajeno.'
- source_word: עָמְדוּ
  english_pob_choice: stood
  chosen_spanish: se puso de pie
  alternatives_spanish:
  - se levantó
  - permaneció de pie
  lexicon: HALOT
  rationale: El verbo עמד significa 'estar de pie' o 'ponerse de pie' según el contexto. En español, 'se puso de pie' expresa de forma natural el acto colectivo de levantarse al abrirse el libro, sin alejarse del sentido básico de 'stood'.
translation_notes:
  revision_awareness: La revisión inglesa más reciente no introdujo cambios y el pasaje quedó con acuerdo alto entre controles de revisión. La presente versión española sigue ese estado estable, manteniendo el sentido literal y la ambigüedad útil de סֵפֶר con una nota léxica.
  spanish_consistency_notes:
  - Se mantiene 'pueblo' para כָל הָעָם en consonancia con el uso bíblico colectivo del contexto.
  - Se evita 'SEÑOR' o sustituciones teológicas porque no aparece el Tetragrámaton en este versículo.
  - '''Abrió'' y ''cuando lo abrió'' conservan la repetición verbal del hebreo sin sobretraducirla.'
  - '''Se puso de pie'' refleja el gesto colectivo de manera idiomática en español y preserva el sentido de עמד.'
