translation:
  language: es
  text: Y obligaron a Israel a esconderse[a], en cuanto refugio tenían.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en lugares ocultos, en todo refugio que tenían». El griego es compacto y admite una versión más formal; el texto principal expresa el sentido de manera natural en español.'
