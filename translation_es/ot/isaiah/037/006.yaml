translation:
  language: es
  text: 'Y les dijo Isaías: «Así dirán a su señor: “Así dice Yahvé: No temas por las palabras que has oído, con las cuales los servidores[a] del rey de Asiria me han blasfemado[b]”».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo puede referirse a jóvenes de corte, servidores o retenedores. Aquí «servidores» destaca su función subordinada en la corte del rey de Asiria.
    reason: lexical_alternative
  - marker: b
    text: 'O: «me han ultrajado», «me han injuriado» o «me han desafiado». El verbo hebreo puede implicar habla abusiva o despreciativa contra Dios.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And ... said
  chosen_spanish: Y dijo
  alternatives_spanish:
  - Entonces dijo
  lexicon: HALOT
  rationale: La forma wayyiqtol avanza la narración; en español, «Y dijo» conserva la secuencia narrativa sin añadir una relación temporal más fuerte de la que exige el hebreo.
- source_word: אֲלֵיהֶם
  english_pob_choice: to them
  chosen_spanish: a ellos
  alternatives_spanish:
  - les
  lexicon: HALOT
  rationale: Mantiene explícito el destinatario de la palabra de Isaías, como en el hebreo y en la traducción inglesa auditada.
- source_word: יְשַׁעְיָהוּ
  english_pob_choice: Isaiah
  chosen_spanish: Isaías
  alternatives_spanish:
  - Yeshayahu
  lexicon: HALOT
  rationale: Nombre propio en su forma usual en español bíblico, sin transliteración innecesaria.
- source_word: כֹּה תֹאמְרוּן
  english_pob_choice: Thus you shall say
  chosen_spanish: Así dirán
  alternatives_spanish:
  - Así diréis
  - Esto dirán
  lexicon: HALOT
  rationale: La fórmula profética/mensajera pide una orden indirecta que suene natural en español; «Así dirán» preserva la solemnidad y la función de recado.
- source_word: אֶל אֲדֹנֵיכֶם
  english_pob_choice: to your master
  chosen_spanish: a su señor
  alternatives_spanish:
  - a su amo
  - a su señorío
  lexicon: HALOT
  rationale: Aquí el referente es un superior humano (Ezequías), no un título divino. «Señor» refleja la relación de autoridad; «amo» sería más áspero y menos natural en este contexto cortesano.
- source_word: כֹּה אָמַר יְהוָה
  english_pob_choice: Thus says Yahweh
  chosen_spanish: Así dice Yahvé
  alternatives_spanish:
  - Así ha dicho Yahvé
  - Así dice el Señor
  lexicon: HALOT
  rationale: 'Se conserva la fórmula profética estándar y el nombre divino según el criterio POB para יהוה: «Yahvé», no una máscara como «el Señor».'
- source_word: אַל תִּירָא
  english_pob_choice: Do not be afraid
  chosen_spanish: No temas
  alternatives_spanish:
  - No tengas miedo
  - No tengas temor
  lexicon: HALOT
  rationale: Imperativo prohibitivo directo y natural en español, manteniendo el tono pastoral y urgente del mandato divino.
- source_word: מִפְּנֵי
  english_pob_choice: because of
  chosen_spanish: por
  alternatives_spanish:
  - a causa de
  - debido a
  lexicon: HALOT
  rationale: En este contexto causal, «por» es la solución más concisa y idiomática en español, equivalente al valor causal que el inglés auditado explicitó con «because of».
- source_word: הַדְּבָרִים
  english_pob_choice: the words
  chosen_spanish: las palabras
  alternatives_spanish:
  - las cosas
  - los dichos
  lexicon: HALOT
  rationale: La referencia es al discurso ofensivo oído por Ezequías; «palabras» reproduce con precisión el sustantivo hebreo.
- source_word: אֲשֶׁר שָׁמַעְתָּ
  english_pob_choice: that you have heard
  chosen_spanish: que has oído
  alternatives_spanish:
  - que oíste
  lexicon: HALOT
  rationale: El perfecto español mantiene la relevancia presente de lo escuchado, sin forzar una lectura aspectual ajena al idioma.
- source_word: אֲשֶׁר גִּדְּפוּ
  english_pob_choice: have blasphemed me
  chosen_spanish: me han blasfemado
  alternatives_spanish:
  - me han ultrajado
  - me han injuriado
  - me han desafiado
  lexicon: HALOT
  rationale: Se conserva la gravedad teológica del verbo cuando el objeto es Dios mismo. En español, «blasfemar» mantiene la fuerza religiosa; las alternativas reflejan el rango semántico de abuso, insulto y desafío.
- source_word: נַעֲרֵי
  english_pob_choice: the servants
  chosen_spanish: los siervos
  alternatives_spanish:
  - los servidores
  - los jóvenes
  lexicon: HALOT
  rationale: El hebreo puede designar jóvenes, servidores o retenedores de corte. Dado el contexto y la elección inglesa revisada, «siervos» conserva subordinación y fuerza relacional sin introducir una nota meramente etaria.
- source_word: מֶלֶךְ אַשּׁוּר
  english_pob_choice: the king of Assyria
  chosen_spanish: del rey de Asiria
  alternatives_spanish:
  - del rey asirio
  lexicon: HALOT
  rationale: Construcción genitiva natural en español para identificar a qué rey pertenecen los siervos.
- source_word: אוֹתִי
  english_pob_choice: me
  chosen_spanish: me
  alternatives_spanish:
  - a mí
  lexicon: HALOT
  rationale: El objeto de la afrenta es Yahvé mismo; «me» mantiene la primera persona divina de forma directa y clara.
theological_decisions:
- issue: Rendición del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: La política de español del proyecto requiere «Yahvé» para el Tetragrámaton. Esto conserva el nombre pactal de Dios y evita la convención de máscara litúrgica.
  doctrine_reference: 'Contested terms: YHWH → Yahweh (adaptado al español del proyecto como Yahvé)'
- issue: Fuerza de גִּדְּפוּ frente a Dios
  english_pob_reading: have blasphemed me
  chosen_spanish_reading: me han blasfemado
  alternative_spanish_readings:
  - me han injuriado
  - me han ultrajado
  - me han desafiado
  rationale: «Blasfemar» expresa mejor que el insulto no es solo contra un rey humano sino contra Yahvé mismo. Se preserva la tensión semántica del hebreo, que puede incluir abuso, desprecio y desafío, sin reducirla a un simple agravio civil.
  doctrine_reference: 'Translation philosophy #3: preserve theological tension where ambiguity remains'
- issue: Valor de אֲדֹנֵיכֶם en el contexto
  english_pob_reading: your master
  chosen_spanish_reading: su señor
  alternative_spanish_readings:
  - su amo
  - su señorito
  rationale: Aunque el inglés auditado usa «master», en español «señor» comunica autoridad humana sin cargar el texto con una opacidad innecesaria. Se evita además confundirlo con el tratamiento divino asociado a «Señor».
  doctrine_reference: Context-sensitive rendering of human authority titles
translation_notes:
  revision_awareness: La traducción sigue la revisión más reciente del expediente inglés, que sustituyó «attendants» por «servants» para נַעֲרֵי. También conserva la decisión revisada de traducir יְהוָה por Yahvé y la nota léxica sobre גִּדְּפוּ, manteniendo la tensión semántica y teológica del original.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estándar para יהוה, conforme a la terminología del proyecto.
  - Se usa «siervos» para נַעֲרֵי en consonancia con la revisión inglesa y con el contexto cortesano.
  - «Señor» se reserva aquí para el superior humano; no debe leerse como sustituto del nombre divino.
  - La puntuación con comillas angulares sigue el uso editorial en español bíblico contemporáneo.
