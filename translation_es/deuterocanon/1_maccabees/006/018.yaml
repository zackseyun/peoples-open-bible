translation:
  language: es
  text: Le puso por nombre Eupátor. Y los de la ciudadela iban cercando a Israel alrededor de los lugares santos[a], procurando daño continuamente y sirviendo de apoyo a las naciones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «alrededor del santuario»; el griego dice literalmente «las cosas/lugares santos», probablemente aludiendo al área del templo.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκάλεσεν τὸ ὄνομα αὐτοῦ
  english_pob_choice: He named him
  chosen_spanish: Lo llamó
  alternatives_spanish:
  - Le puso por nombre
  - Lo nombró
  lexicon: LSJ
  rationale: La fórmula griega es un giro idiomático para asignar un nombre; en español, «lo llamó» conserva esa función sin sonar forzado. Se evita una paráfrasis más libre y se mantiene el sujeto implícito en el contexto.
- source_word: Εὐπάτωρ
  english_pob_choice: Eupator
  chosen_spanish: Eupátor
  alternatives_spanish:
  - Eupator
  lexicon: Transliteración propia del nombre griego
  rationale: El nombre se translitera, no se traduce. Se añade tilde en español para marcar la acentuación natural de la forma adaptada.
- source_word: οἱ ἐκ τῆς ἄκρας
  english_pob_choice: those from the citadel
  chosen_spanish: los de la acrópolis
  alternatives_spanish:
  - los de la ciudadela
  - los de la fortaleza
  lexicon: LSJ
  rationale: ἄκρα en 1 Macabeos designa la fortaleza/citadel de Jerusalén. En español, «acrópolis» puede funcionar como equivalente histórico-cultural de una fortaleza elevada; se mantiene el matiz de grupo asociado al recinto. Aun así, se reconoce que «ciudadela» sería la alternativa más transparente si se prefiriera un término menos helenizante.
- source_word: συγκλείοντες
  english_pob_choice: hemming ... in
  chosen_spanish: iban cercando
  alternatives_spanish:
  - iban encerrando
  - iban estrechando el cerco
  lexicon: LSJ
  rationale: El participio expresa acción continua de cercar/encerrar desde todos lados. «Iban cercando» comunica bien la progresión y se ajusta al marco narrativo español sin perder la fuerza del original.
- source_word: τὸν Ἰσραὴλ
  english_pob_choice: Israel
  chosen_spanish: Israel
  alternatives_spanish:
  - los israelitas
  lexicon: Consistencia bíblica
  rationale: Se conserva el nombre colectivo singular del griego. «Israel» mantiene el sujeto histórico-nacional sin pluralizarlo indebidamente.
- source_word: κύκλῳ τῶν ἁγίων
  english_pob_choice: around the sanctuary
  chosen_spanish: alrededor de los lugares santos
  alternatives_spanish:
  - alrededor del santuario
  - alrededor de los recintos santos
  - alrededor de las cosas santas
  lexicon: LSJ
  rationale: El griego puede referirse literalmente a «las cosas/lugares santos», con probable alusión al área del santuario. Se elige una forma que preserve la ambigüedad del original y no cierre demasiado la referencia, tal como hizo el audit trail inglés al poner una nota alternativa.
- source_word: ζητοῦντες κακὰ
  english_pob_choice: seeking evil
  chosen_spanish: buscando mal
  alternatives_spanish:
  - buscando hacer daño
  - tramando mal
  lexicon: LSJ
  rationale: La expresión griega denota intención hostil; «buscando mal» mantiene la cercanía semántica y la brevedad del original. En español, el sustantivo «mal» puede abarcar daño, maldad o perjuicio según el contexto.
- source_word: διʼ ὅλου
  english_pob_choice: continually
  chosen_spanish: continuamente
  alternatives_spanish:
  - sin cesar
  - todo el tiempo
  lexicon: LSJ
  rationale: La locución indica persistencia. «Continuamente» reproduce el valor durativo con registro natural en español.
- source_word: στήριγμα τοῖς ἔθνεσιν
  english_pob_choice: a support to the nations
  chosen_spanish: un apoyo para las naciones
  alternatives_spanish:
  - un sostén para las naciones
  - un apoyo para los gentiles
  - un baluarte para las naciones
  lexicon: LSJ
  rationale: στήριγμα significa apoyo/sostén. Se traduce con «apoyo» para mantener la relación directa con la base griega y evitar cargar el verso con una interpretación más militar de la necesaria. «Naciones» conserva la amplitud etnopolítica de ἔθνη en este contexto.
theological_decisions:
- issue: Sentido de ἔθνη / τοῖς ἔθνεσιν
  english_pob_reading: nations
  chosen_spanish_reading: las naciones
  alternative_spanish_readings:
  - los gentiles
  rationale: En este pasaje el término funciona como designación de poderes y pueblos extranjeros, no como contraste paulino técnico. «Las naciones» respeta esa amplitud y encaja con el tono histórico-político del libro.
  doctrine_reference: 'DOCTRINE.md: consistency of key terms, documented exception where context demands variance'
- issue: Alcance de κύκλῳ τῶν ἁγίων
  english_pob_reading: around the sanctuary
  chosen_spanish_reading: alrededor de los lugares santos
  alternative_spanish_readings:
  - alrededor del santuario
  - alrededor de las cosas santas
  rationale: La forma griega permite una referencia al área sagrada del templo sin exigir una sola equivalencia cerrada. La versión española conserva esa tensión y evita resolver prematuramente el referente.
  doctrine_reference: 'DOCTRINE.md: preserve documented lexical/theological tension when the source permits more than one legitimate rendering'
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés sin depender mecánicamente de él: se releyó el griego para decidir entre una equivalencia más histórica («acrópolis», «lugares santos») y una más explícita («ciudadela», «santuario»). No se introdujeron cambios textuales respecto del sentido base; solo se ajustó la formulación española para legibilidad y fidelidad.'
  spanish_consistency_notes:
  - Se mantiene el nombre colectivo «Israel» como en el griego y en el audit trail inglés.
  - «Naciones» se conserva para ἔθνη por la decisión documentada del inglés, evitando importar automáticamente «gentiles».
  - La nota sobre «lugares santos» preserva la ambigüedad lexical del original sin borrar la probable referencia al santuario.
  - Se evita el término litúrgico «Señor» porque no aparece aquí; no hay nombres divinos en el verso.
