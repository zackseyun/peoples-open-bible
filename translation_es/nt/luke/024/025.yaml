translation:
  language: es
  text: 'Y él les dijo: «¡Oh insensatos[a] y tardos de corazón[b] para creer todo lo que han hablado[c] los profetas!»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sin entendimiento».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «tardos de corazón», un modismo para ser lentos en el ser interior para confiar y recibir lo que Dios ha dicho.
    reason: cultural_note
  - marker: c
    text: O «han dicho».
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ αὐτὸς εἶπεν πρὸς αὐτούς
  english_pob_choice: And he said to them
  chosen_spanish: Y él les dijo
  alternatives_spanish:
  - Y les dijo
  - Entonces les dijo
  lexicon: SBLGNT; BDAG
  rationale: Mantiene la secuencia narrativa de καί y el sujeto enfático αὐτός con un pronombre explícito natural en español. 'Les dijo' refleja la dirección personal del discurso sin añadir elementos no presentes en el griego.
- source_word: Ὦ
  english_pob_choice: O
  chosen_spanish: ¡Oh
  alternatives_spanish:
  - O
  lexicon: BDAG
  rationale: Conserva el vocativo solemne de reprensión. En español, '¡Oh' resulta más natural y mantiene el tono exclamativo del original.
- source_word: ἀνόητοι
  english_pob_choice: foolish ones
  chosen_spanish: insensatos
  alternatives_spanish:
  - necios
  - sin entendimiento
  lexicon: BDAG
  rationale: '''Insensatos'' comunica falta de entendimiento y juicio, sin cargar innecesariamente la frase con una connotación moral que el contexto no exige por sí sola. Evita un calco como ''foolish ones'' y funciona bien como vocativo plural.'
- source_word: βραδεῖς τῇ καρδίᾳ
  english_pob_choice: slow of heart
  chosen_spanish: tardos de corazón
  alternatives_spanish:
  - lentos de corazón
  - tardos en el corazón
  - lentos para creer
  lexicon: BDAG
  rationale: '''Tardos de corazón'' conserva la imagen idiomática de καρδία como el centro interior de disposición y confianza, no solo de razonamiento. ''Lentos para creer'' explicita el sentido pero pierde la fuerza figurada que el audit trail busca preservar.'
- source_word: τοῦ πιστεύειν
  english_pob_choice: to believe
  chosen_spanish: para creer
  alternatives_spanish:
  - en creer
  - para confiar
  lexicon: BDAG
  rationale: La construcción española 'tardos de corazón para creer' reproduce con naturalidad la relación de finalidad/referencia del infinitivo articular y mantiene el vínculo entre comprensión y confianza.
- source_word: ἐπὶ πᾶσιν οἷς
  english_pob_choice: all that
  chosen_spanish: todo lo que
  alternatives_spanish:
  - todo cuanto
  - todas las cosas que
  lexicon: BDAG
  rationale: '''Todo lo que'' expresa el alcance comprehensivo de la acusación y suena idiomático en español. Evita sobrecargar la frase con una preposición literal que en español resultaría oscura.'
- source_word: ἐλάλησαν
  english_pob_choice: have spoken
  chosen_spanish: han dicho
  alternatives_spanish:
  - han hablado
  - hablaron
  - dijeron
  lexicon: BDAG
  rationale: '''Han dicho'' es una opción natural en español para el discurso profético transmitido en forma resumida. Aunque ''hablado'' conserva mejor la idea de proclamación, ''han dicho'' encaja con ''todo lo que'' y no fuerza una dicción artificial.'
- source_word: οἱ προφῆται
  english_pob_choice: the prophets
  chosen_spanish: los profetas
  alternatives_spanish:
  - los profetas de Dios
  lexicon: BDAG
  rationale: Mantiene la referencia estándar a los profetas bíblicos sin añadir glosa interpretativa. El contexto ya delimita su autoridad y función.
theological_decisions:
- issue: Alcance de la reprensión de Jesús
  english_pob_reading: The rebuke addresses deficient understanding and trust in the prophetic witness, not a denial of the prophets' authority.
  chosen_spanish_reading: La reprensión señala falta de entendimiento y de confianza en el testimonio profético, no una desautorización de los profetas.
  alternative_spanish_readings:
  - La reprensión es solo intelectual
  - La reprensión es principalmente moral
  rationale: '''Insensatos'' y ''tardos de corazón para creer'' conservan la tensión entre comprensión y confianza que el griego presenta. La traducción evita reducir el dicho a mera torpeza intelectual o a condena moral abstracta.'
  doctrine_reference: Translation philosophy §3, §6
translation_notes:
  revision_awareness: 'Coincide con el último pase de revisión: no se introdujeron cambios sustantivos respecto del sentido griego ni de las decisiones auditadas en inglés.'
  spanish_consistency_notes:
  - Se mantiene 'corazón' como centro interior, en continuidad con la antropología implícita del texto fuente.
  - Se evita 'Señor' o cualquier sustitución no presente; el versículo no contiene el nombre divino ni Χριστός.
  - La reprensión se conserva fuerte pero no más dura que el griego; no se añade explicitez doctrinal ajena al enunciado.
