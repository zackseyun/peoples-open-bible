translation:
  language: es
  text: Porque he aquí, el día viene, ardiendo como un horno[a]; y todos los arrogantes y todos los que hacen maldad serán como rastrojo. El día que viene los abrasará, dice Yahvé de los Ejércitos[b], y no les dejará ni raíz ni rama.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ardiendo como un horno de fundición».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «YHWH de los ejércitos»; se traduce «Yahvé de los Ejércitos» para conservar explícito el nombre divino y expresar el título con claridad en español moderno.'
    reason: source_note
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Pues que
  lexicon: HALOT
  rationale: Introduce la relación causal o explicativa con el contexto anterior; «Porque» conserva bien esa fuerza en español natural y solemne.
- source_word: הִנֵּה
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - mira
  - ve
  lexicon: HALOT
  rationale: Es una fórmula bíblica deíctica y enfática en español que mantiene la solemnidad profética mejor que una forma coloquial.
- source_word: הַיּוֹם
  english_pob_choice: the day
  chosen_spanish: el día
  alternatives_spanish:
  - aquel día
  - ese día
  lexicon: HALOT
  rationale: La expresión definida apunta al día escatológico/judicial ya conocido por el contexto; «el día» es directo y fiel.
- source_word: בָּא
  english_pob_choice: is coming
  chosen_spanish: viene
  alternatives_spanish:
  - está llegando
  - está por venir
  lexicon: HALOT
  rationale: El valor verbal expresa inminencia; en español «viene» suena natural y conserva la idea de aproximación.
- source_word: בֹּעֵר כַּתַּנּוּר
  english_pob_choice: burning like an oven
  chosen_spanish: ardiendo como un horno
  alternatives_spanish:
  - quemándose como un horno
  - ardiendo como un horno de fundición
  lexicon: HALOT
  rationale: «Horno» corresponde al sentido básico de תַּנּוּר; «ardiendo» preserva la imagen de fuego activa sin sobreinterpretar el resultado.
- source_word: זֵדִים
  english_pob_choice: the arrogant
  chosen_spanish: los arrogantes
  alternatives_spanish:
  - los soberbios
  - los presuntuosos
  lexicon: HALOT
  rationale: Captura el matiz de insolencia y altivez moral en un registro claro para el lector moderno.
- source_word: עֹשֵׂה רִשְׁעָה
  english_pob_choice: evildoer
  chosen_spanish: los que hacen maldad
  alternatives_spanish:
  - el que practica maldad
  - los que practican maldad
  lexicon: HALOT
  rationale: La construcción participial tiene fuerza distributiva; en español pluralizada fluye mejor y conserva el sentido de quienes practican lo malo.
- source_word: קַשׁ
  english_pob_choice: stubble
  chosen_spanish: paja
  alternatives_spanish:
  - rastrojo
  - rastrojo seco
  - caña seca
  lexicon: HALOT
  rationale: Aunque «rastrojo» o «rastrojo seco» podrían ser más técnicos, «paja» comunica de forma natural la materia seca y fácilmente inflamable en esta imagen judicial.
- source_word: וְלִהַט אֹתָם
  english_pob_choice: will set them ablaze
  chosen_spanish: los abrasará
  alternatives_spanish:
  - los prenderá fuego
  - los quemará
  lexicon: HALOT
  rationale: «Abrasará» conserva la intensidad del fuego y el valor causativo del verbo sin reducir la imagen a un simple «quemar».
- source_word: יְהוָה צְבָאוֹת
  english_pob_choice: the LORD of Armies
  chosen_spanish: Yahvé de los Ejércitos
  alternatives_spanish:
  - Yahvé de las huestes
  - Yahvé de los ejércitos
  lexicon: HALOT
  rationale: Se conserva el nombre divino como «Yahvé» y צְבָאוֹת se vierte con el término bíblico familiar «Ejércitos», que mantiene bien la fuerza titular y es ampliamente inteligible.
- source_word: אֲשֶׁר לֹא יַעֲזֹב לָהֶם
  english_pob_choice: so that it will leave them
  chosen_spanish: y no les dejará
  alternatives_spanish:
  - de modo que no les dejará
  - sin dejarles
  lexicon: HALOT
  rationale: La relación consecutiva se expresa de forma natural con «y», manteniendo que el sujeto implícito es «el día» y que el resultado es la falta total de remanente.
- source_word: שֹׁרֶשׁ וְעָנָף
  english_pob_choice: neither root nor branch
  chosen_spanish: ni raíz ni rama
  alternatives_spanish:
  - ni raíz ni renuevo
  - ni raíz ni brote
  lexicon: HALOT
  rationale: Es un merismo de destrucción total; «ni raíz ni rama» reproduce de manera transparente la imagen de eliminación completa.
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton. En español, la línea editorial pide «Yahvé» como forma principal para preservar el nombre del pacto sin ocultarlo tras una convención de sustitución.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Maintaining the staged fire imagery instead of flattening it into a summary
  english_pob_reading: Preserve the imagery with 'set them ablaze' and then 'leave them neither root nor branch.'
  chosen_spanish_reading: Preservar la secuencia de ignición y devastación total con «los abrasará» y luego «ni raíz ni rama».
  alternative_spanish_readings:
  - los quemará por completo
  - los consumirá
  rationale: 'El hebreo desarrolla dos momentos: encender y dejar sin remanente. La traducción conserva esa tensión imagética y evita condensarla en una sola afirmación interpretativa.'
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3, #6'
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior: ahora cada marcador de nota aparece explícitamente en el texto español. También se mantuvo la imagen en dos etapas (encendido y devastación total) y se preservó el nombre divino según la política del proyecto.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה.
  - Se mantiene el merismo «ni raíz ni rama» para reflejar la destrucción completa.
  - «Los arrogantes» y «los que hacen maldad» preservan el paralelismo hebreo sin suavizar el juicio.
  - «Ejércitos» conserva la transparencia del título צְבָאוֹת en español bíblico comprensible.
