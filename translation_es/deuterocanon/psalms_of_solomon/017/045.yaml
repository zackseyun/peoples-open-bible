translation:
  language: es
  text: Pastoreando el rebaño de Yahvé[a] en fidelidad y justicia[b], no permitirá que ninguno de ellos se debilite en su pastura[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «del Señor». Se adopta «de Yahvé» conforme a la convención del proyecto para referencias divinas de este tipo en el texto principal.
    reason: lexical_alternative
  - marker: b
    text: O «rectitud». El griego δικαιοσύνῃ puede traducirse también así, pero «justicia» expresa bien el matiz de conducta recta y gobierno justo en este contexto.
    reason: lexical_alternative
  - marker: c
    text: O «en su pastizal» o «en su lugar de pastoreo». El griego νομῇ mantiene la imagen pastoral del ámbito donde el rebaño pasta.
    reason: lexical_alternative
lexical_decisions:
- source_word: ποιμαίνων
  english_pob_choice: Shepherding
  chosen_spanish: Pastoreando
  alternatives_spanish:
  - Pastoreando como pastor
  - Apacentando
  lexicon: LSJ
  rationale: El participio griego expresa la imagen de gobierno pastoral; en español, «pastoreando» conserva la metáfora y mantiene el valor de acción continua sin volverla explicativa de más.
- source_word: τὸ ποίμνιον
  english_pob_choice: flock
  chosen_spanish: el rebaño
  alternatives_spanish:
  - el rebaño de ovejas
  - el pequeño rebaño
  lexicon: LSJ
  rationale: «Rebaño» es el equivalente natural de un grupo de animales bajo cuidado pastoral; aquí preserva mejor la imagen que una formulación más abstracta.
- source_word: Κυρίου
  english_pob_choice: the Lord’s
  chosen_spanish: de Yahvé
  alternatives_spanish:
  - del Señor
  lexicon: LSJ
  rationale: Siguiendo la convención del proyecto, el genitivo divino se rinde como «Yahvé» en el texto principal. «Del Señor» quedaría más genérico y ocultaría el nombre divino implícito en el griego.
- source_word: πίστει
  english_pob_choice: faithfulness
  chosen_spanish: fidelidad
  alternatives_spanish:
  - fe
  - confianza
  lexicon: LSJ
  rationale: En este contexto de gobierno pastoral real, la cualidad del gobernante es la constancia leal; «fidelidad» expresa mejor la lectura de «faithfulness» que la simple «fe».
- source_word: δικαιοσύνῃ
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  - justicia recta
  lexicon: LSJ
  rationale: Aquí «justicia» recoge bien la dimensión ética y de gobierno justo. Se conserva la alternativa «rectitud» como posible matiz, pero no es necesaria en el texto principal.
- source_word: ἀφήσει
  english_pob_choice: will not allow
  chosen_spanish: no permitirá
  alternatives_spanish:
  - no dejará
  - no permitirá que
  lexicon: LSJ
  rationale: El verbo expresa prevención; «no permitirá» reproduce ese sentido mejor que una mera idea de abandono. La construcción con subjuntivo en español resulta natural.
- source_word: ἀσθενῆσαι
  english_pob_choice: to grow weak
  chosen_spanish: que ninguno de ellos se debilite
  alternatives_spanish:
  - que ninguno de ellos llegue a debilitarse
  - que ninguno de ellos se vuelva débil
  lexicon: LSJ
  rationale: El infinitivo aoristo apunta a entrar en un estado de debilidad. «Se debilite» conserva bien ese movimiento y suena natural en español.
- source_word: ἐν αὐτοῖς
  english_pob_choice: among them
  chosen_spanish: de ellos
  alternatives_spanish:
  - entre ellos
  - en medio de ellos
  lexicon: LSJ
  rationale: Con el cuantificador negativo «ninguno», el español pide una formulación distributiva. «De ellos» integra de forma fluida la referencia plural sin perder el sentido de pertenencia al grupo.
- source_word: ἐν τῇ νομῇ αὐτῶν
  english_pob_choice: in their pasture
  chosen_spanish: en su pasto
  alternatives_spanish:
  - en su pastura
  - en su pradera
  lexicon: LSJ
  rationale: «Pasto» es breve y comprensible en español bíblico contemporáneo, y conserva la imagen de alimentación/pastoreo. «Pastura» o «pradera» serían posibles, pero menos directas.
theological_decisions:
- issue: Nombre divino implícito en Κυρίου
  english_pob_reading: the Lord’s
  chosen_spanish_reading: de Yahvé
  alternative_spanish_readings:
  - del Señor
  rationale: La política terminológica del proyecto pide traducir יהוה/YHWH como «Yahvé». Aunque el griego usa κύριος, aquí funciona como referencia al nombre divino en un contexto de posesión/alianza, por lo que se mantiene la transparencia con «Yahvé».
  doctrine_reference: Terminología del nombre divino en el POB
- issue: πίστει como cualidad del gobernante
  english_pob_reading: faithfulness
  chosen_spanish_reading: fidelidad
  alternative_spanish_readings:
  - fe
  rationale: La frase describe la manera en que pastorea el gobernante; por eso se entiende como lealtad confiable en acción, no como la respuesta creyente del rebaño. «Fidelidad» preserva esa tensión semántica.
  doctrine_reference: Lectura contextual de πίστις/πίστει
- issue: δικαιοσύνῃ como cualidad de gobierno
  english_pob_reading: righteousness
  chosen_spanish_reading: justicia
  alternative_spanish_readings:
  - rectitud
  rationale: En un contexto regio-pastoral, δικαιοσύνη abarca justicia de gobierno y conducta recta. «Justicia» mantiene ese campo semántico amplio sin moralizarlo demasiado.
  doctrine_reference: δικαιοσύνη en marco judicial-covenantal
translation_notes:
  revision_awareness: La versión inglesa auditada pasó por una corrección sintáctica que ajustó el participio inicial a una forma más cercana al griego. En español, se reflejó directamente el participio con una construcción verbal continua («Pastoreando») y se mantuvo la coordinación implícita del segundo miembro («no permitirá»), sin forzar una paráfrasis explicativa.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino conforme a la terminología base del proyecto.
  - Se traduce πίστει como «fidelidad» por el valor contextual de lealtad del gobernante, reservando «fe» como alternativa anotada.
  - Se traduce δικαιοσύνῃ como «justicia», con nota de alternativa «rectitud» por transparencia lexical.
  - 'La imaginería pastoral se conserva de forma continua: pastoreando / rebaño / pasto.'
