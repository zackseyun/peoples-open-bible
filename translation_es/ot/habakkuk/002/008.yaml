revisions:
- from: Porque tú has despojado[a] a muchas naciones, todo el resto de los pueblos te despojará[b] —por la sangre de los hombres[c] y la violencia hecha a la tierra, a la ciudad y a todos los que habitan en ella.
  to: Porque tú has despojado a muchas naciones, todos los pueblos restantes te despojarán[a], por sangre humana[b] y por la violencia hecha a la tierra, a la ciudad y a todos los que habitan en ella.
  rationale: Se ajusta 'la sangre de los hombres' a 'sangre humana' para reflejar mejor el hebreo genérico y la revisión auditada del POB inglés. También se cambia el sujeto a plural ('todos los pueblos restantes ... te despojarán') para una concordancia más natural y clara en español, manteniendo la distinción entre 'naciones' y 'pueblos' y la reversión léxica de שלל.
  reviewer_model: gpt-5.4
