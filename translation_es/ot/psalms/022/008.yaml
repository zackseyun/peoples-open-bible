translation:
  language: es
  text: Todos los que me ven se burlan de mí[a]; abren el labio; menean la cabeza[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sacan el labio». El hebreo expresa un gesto despectivo con el labio.
    reason: lexical_alternative
  - marker: b
    text: O «sacuden la cabeza». Es un gesto de burla que también aparece en los relatos de la pasión en los Evangelios.
    reason: cross_reference
lexical_decisions:
- source_word: כָּל
  english_pob_choice: All
  chosen_spanish: Todos
  alternatives_spanish:
  - Todos los que
  - Cada uno de los que
  lexicon: HALOT
  rationale: El cuantificador total se expresa con naturalidad en español como 'Todos'. Mantiene el alcance inclusivo del hebreo sin sobrecargar la frase.
- source_word: רֹאַי
  english_pob_choice: who see me
  chosen_spanish: los que me ven
  alternatives_spanish:
  - quienes me ven
  - los que me miran
  lexicon: HALOT
  rationale: 'El participio con sufijo de 1ª persona funciona como sustantivo: ''los que me ven''. ''Mirar'' es posible, pero ''ver'' refleja mejor el verbo hebreo básico ראה y sigue de cerca la relación sintáctica.'
- source_word: יַלְעִגוּ לִי
  english_pob_choice: mock me
  chosen_spanish: se burlan de mí
  alternatives_spanish:
  - me escarnecen
  - me ridiculizan
  lexicon: HALOT
  rationale: לעג comunica burla despectiva dirigida al hablante. 'Se burlan de mí' es claro, natural y conserva el matiz de desprecio mejor que un calco más rígido.
- source_word: יַפְטִירוּ בְשָׂפָה
  english_pob_choice: they open wide the lip
  chosen_spanish: abren mucho la boca
  alternatives_spanish:
  - abren el labio
  - sacan el labio
  - abren en grande el labio
  lexicon: HALOT
  rationale: El hebreo describe un gesto corporal de desprecio asociado con el labio; en español, 'abren mucho la boca' comunica el gesto visible de forma comprensible y natural sin perder la nota de escarnio. Se evita traducir mecánicamente 'labio' cuando en español la imagen resultaría oscura.
- source_word: יָנִיעוּ רֹאשׁ
  english_pob_choice: they shake the head
  chosen_spanish: menean la cabeza
  alternatives_spanish:
  - sacuden la cabeza
  - agitan la cabeza
  lexicon: HALOT
  rationale: El gesto de escarnio se expresa de manera idiomática en español con 'menear la cabeza'. Mantiene la fuerza gestual y la naturalidad del receptor hispanohablante.
theological_decisions:
- issue: Relación con la interpretación mesiánica posterior
  english_pob_reading: Translate the verse first in its psalmic context as the speech of the suffering psalmist, without importing explicit christological wording.
  chosen_spanish_reading: Traducir primero el verso en su contexto del salmo, como la voz del salmista afligido, sin introducir formulaciones cristológicas explícitas.
  alternative_spanish_readings:
  - Añadir una nota devocional cristológica en el texto principal
  - Reformular el verso con lenguaje mesiánico explícito
  rationale: La traducción debe reflejar el sentido hebreo del salmo antes de su recepción posterior. La posible eco en los Evangelios puede señalarse aparte, pero no debe incrustarse en la línea principal.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: La versión en inglés fue revisada desde una formulación más interpretativa ('sneer with the lip') a una más literal ('open wide the lip'). Por eso el español evita una paráfrasis demasiado libre y conserva un gesto corporal explícito, aunque lo exprese de modo natural como 'abren mucho la boca'.
  spanish_consistency_notes:
  - Se mantiene 'menean la cabeza' para conservar un modismo bíblico comprensible en español.
  - Se usa 'Dios' y 'Yahvé' conforme a las normas del proyecto, pero este verso no los contiene.
  - No se introduce 'Cristo' ni 'Mesías' en el texto principal, en coherencia con la fuente hebrea y la lectura auditada del inglés.
