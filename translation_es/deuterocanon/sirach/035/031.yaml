  source_alignment_summary: 'El borrador refleja bien la estructura del griego: ἐν πᾶσι τοῖς ἔργοις σου = «En todas tus obras», γίνου = «sé», y la prohibición μὴ δῷς ... ἐν τῇ δόξῃ σου se conserva adecuadamente. La principal debilidad está en μῶμον: «defecto» no transmite tan bien en español la metáfora ética de «mancha/descrédito/reproche» que el griego y la auditoría inglesa preservan con «blemish».'
  spanish_quality_summary: «Sé preeminente» es comprensible y formal, aunque algo rígido; aun así, puede conservarse por fidelidad a la decisión inglesa revisada. En cambio, «no des un defecto a tu honor» suena poco natural en español. «No causes una mancha a tu honor» mejora la metáfora, pero la construcción más idiomática y fiel es «no pongas una mancha en tu honor», que además refleja mejor el ἐν de la frase final.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. La decisión de traducir δόξα como «honor» está bien justificada en contexto sapiencial. Conviene ajustar la nota para mantener la alternativa de «reputación/buen nombre» sin dejar la cláusula principal en un español forzado.
  issues:
  - severity: medium
    issue: «un defecto» para μῶμον debilita la metáfora de mancha o reproche
    rationale: μῶμον en este contexto moral-social apunta a una mancha, tacha o reproche sobre el honor. «Defecto» suena más abstracto y menos idiomático con «honor».
  - severity: medium
    issue: «no des un defecto a tu honor» es una construcción poco natural en español
    rationale: Aunque «no des» calca el griego y el inglés, en español con «honor» el resultado suena extraño. «No pongas una mancha en tu honor» conserva mejor la imagen y la sintaxis semántica.
  - severity: low
    issue: La nota al pie omite «buen nombre» presente en la justificación inglesa
    rationale: La auditoría inglesa explica que δόξα aquí probablemente significa honor o buen nombre. Incluir «buen nombre» en la nota española preserva mejor esa racionalidad documentada.
