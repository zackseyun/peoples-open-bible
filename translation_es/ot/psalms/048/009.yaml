translation:
  language: es
  text: 'Tal como hemos oído, así hemos visto en la ciudad de Yahvé de los ejércitos, en la ciudad de nuestro Dios: Dios la[a] establecerá para siempre. Selah'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Dios la establecerá para siempre». El sufijo femenino hebreo se refiere a la ciudad, que es gramaticalmente femenina y está personificada poéticamente.
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּאֲשֶׁר
  english_pob_choice: Just as
  chosen_spanish: Tal como
  alternatives_spanish:
  - Así como
  - Del mismo modo que
  lexicon: HALOT
  rationale: La comparación entre lo oído y lo visto pide una correlación natural en español; «Tal como» conserva la fuerza comparativa sin endurecer el ritmo poético.
- source_word: שָׁמַעְנוּ
  english_pob_choice: we have heard
  chosen_spanish: hemos oído
  alternatives_spanish:
  - hemos escuchado
  - oímos
  lexicon: HALOT
  rationale: El perfecto español mantiene la experiencia recibida hasta el presente, en paralelo con «hemos visto».
- source_word: כֵּן
  english_pob_choice: so
  chosen_spanish: así
  alternatives_spanish:
  - de igual modo
  - de la misma manera
  lexicon: HALOT
  rationale: «Así» corresponde bien al paralelo correlativo con la primera mitad del versículo.
- source_word: רָאִינוּ
  english_pob_choice: we have seen
  chosen_spanish: hemos visto
  alternatives_spanish:
  - vimos
  lexicon: HALOT
  rationale: Se preserva el perfecto para mantener la correspondencia experiencial con «hemos oído».
- source_word: בְּעִיר
  english_pob_choice: in the city of
  chosen_spanish: en la ciudad de
  alternatives_spanish:
  - dentro de la ciudad de
  lexicon: HALOT
  rationale: La preposición locativa y el sustantivo «ciudad» se traducen de forma directa y natural.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue la norma del proyecto para el Tetragrámaton: «Yahvé» preserva el nombre propio divino, en lugar de sustituirlo por un título.'
- source_word: צְבָאוֹת
  english_pob_choice: hosts
  chosen_spanish: de los ejércitos
  alternatives_spanish:
  - de los ejércitos celestiales
  - de las huestes
  lexicon: HALOT
  rationale: En español, «de los ejércitos» comunica de modo claro y reverente el sentido de título divino, sin depender del arcaísmo de «huestes».
- source_word: אֱלֹהֵינוּ
  english_pob_choice: our God
  chosen_spanish: nuestro Dios
  alternatives_spanish:
  - nuestro Dios
  lexicon: HALOT
  rationale: La forma constructa con sufijo de 1cp se expresa de manera directa como pertenencia relacional/covenantal.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: HALOT
  rationale: El hebreo repite el sustantivo como sujeto; en español se conserva con «Dios» para no diluir la repetición poética.
- source_word: יְכוֹנְנֶהָ
  english_pob_choice: will establish her
  chosen_spanish: la establecerá
  alternatives_spanish:
  - la afirmará
  - la fijará
  lexicon: HALOT
  rationale: El verbo כון expresa establecer/hacer firme. En español, el objeto femenino «la» preserva el referente a la ciudad, manteniendo la personificación sin forzar un pronombre femenino pospuesto al sustantivo.
- source_word: עַד עוֹלָם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por siempre
  - eternamente
  lexicon: HALOT
  rationale: Es una equivalencia idiomática natural que comunica duración perpetua en español moderno y bíblicamente digno.
- source_word: סֶלָה
  english_pob_choice: Selah
  chosen_spanish: Selah
  alternatives_spanish:
  - Selá
  lexicon: HALOT
  rationale: Se conserva la transliteración por tratarse de un término técnico de función incierta y tradicionalmente no traducido.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. Se mantiene la decisión confesional y auditada del proyecto de expresar el nombre propio divino con una transliteración reconocible en español.
  doctrine_reference: 'DOCTRINE.md: contested terms — YHWH → Yahvé'
- issue: Referente del sufijo femenino en יְכוֹנְנֶהָ
  english_pob_reading: God will establish her forever
  chosen_spanish_reading: Dios la establecerá para siempre
  alternative_spanish_readings:
  - Dios la establecerá para siempre
  - Dios la afirmará para siempre
  rationale: El sufijo femenino singular remite a «ciudad», sustantivo femenino. En español se conserva «la» para reflejar la personificación poética y la referencia gramatical del hebreo.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #5 (consistency/documented exception)'
translation_notes:
  revision_awareness: 'Conforme al audit trail en inglés, no se requieren revisiones adicionales: la lectura, el paralelismo y el referente femenino de «la» se mantienen de forma consistente en español.'
  spanish_consistency_notes:
  - Se conserva «Selah» sin traducir por la misma razón de transparencia textual que en el POB inglés.
  - «Yahvé» se usa de forma consistente con la convención del proyecto para יְהוָה.
  - La repetición de «ciudad» y «Dios» preserva el paralelismo hebreo sin añadir explicaciones interpretativas al texto principal.
  - La opción «la establecerá» mantiene la personificación femenina del término «ciudad» y evita neutralizar el referente.
