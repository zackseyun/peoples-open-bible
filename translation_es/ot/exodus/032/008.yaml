review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la secuencia y el sentido del hebreo: apartarse del camino mandado, hacerse un ídolo de becerro, postrarse, sacrificar y pronunciar la aclamación idolátrica. También conserva correctamente el plural de «Estos son tus dioses, Israel». Sin embargo, hay pequeños problemas de fidelidad y presentación: el texto principal contiene un marcador de nota mal colocado dentro del artículo («un[a]»), la nota no corresponde al punto de variación preservado por la POB inglesa, y «y dijeron» rompe la consistencia aspectual con los perfectos previos sin necesidad.'
  spanish_quality_summary: El español es generalmente claro y digno, pero requiere una reparación menor para naturalidad y pulcritud editorial. «Se han hecho para sí una imagen fundida de un becerro» funciona, aunque «para sí mismos» suena un poco más idiomático. La nota actual es redundante con el texto principal y no añade la alternativa importante documentada en inglés. También conviene mantener la serie verbal con «han dicho» para una lectura más fluida.
  glossary_alignment: 'No hay conflictos con la terminología de proyecto. No aparece Yahvé en este versículo. Se preserva bien «dioses» para אֱלֹהֶיךָ en plural, «camino» para הַדֶּרֶךְ, y «se han postrado» para וַיִּשְׁתַּחֲווּ conforme a la decisión lexical/theological inglesa. La principal corrección de glosario es trasladar la nota al lugar correcto y reflejar la alternativa singular documentada: «Este es tu dios, Israel».'
  issues:
  - severity: high
    issue: 'Marcador de nota mal incrustado en el texto principal: «un[a] imagen»'
    rationale: Según las reglas del proyecto, el marcador debe anclarse a una palabra o frase completa relevante, no insertarse dentro de una palabra. La forma actual produce un error editorial visible.
  - severity: medium
    issue: La nota al pie actual no preserva la alternativa principal documentada por la POB inglesa
    rationale: La auditoría inglesa conserva en nota la lectura singular de la aclamación («This is your god, Israel»). La nota española actual trata una supuesta alternativa de «imagen fundida de un becerro», pero esa ya es la redacción principal y no resuelve la tensión textual importante.
  - severity: low
    issue: «Y dijeron» desentona con la cadena de perfectos compuestos anterior
    rationale: No es una infidelidad grave, pero «y han dicho» mantiene mejor la secuencia narrativa elegida en español y la coherencia estilística con «se han apartado / se han hecho / se han postrado / han ofrecido».
  revised_spanish_text: 'Se han apartado rápidamente del camino que yo les mandé. Se han hecho para sí mismos una imagen fundida de un becerro, y se han postrado ante él y le han ofrecido sacrificios, y han dicho: «Estos son tus dioses, Israel[a], que te hicieron subir de la tierra de Egipto».'
  revised_footnotes:
