    text: 'Hebreo: «busqué apoyo»; el paralelo griego dice de forma más explícita: «mirando en busca de ayuda de los hombres, y no la había». La traducción sigue el hebreo, mientras que el griego confirma el sentido de ayuda humana buscada.'
    reason: alternative_reading
