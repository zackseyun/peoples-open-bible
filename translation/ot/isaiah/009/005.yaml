theological_decisions:
- issue: Rendering the royal throne names in a way that preserves their full force
  chosen_reading: 'Treat the sequence as exalted throne titles of the child: ''Wonderful Counselor, Mighty God, Father of Eternity, Prince of Peace.'''
  alternative_readings:
  - Take some elements as referring to God rather than the child, e.g. 'Wonderful Counselor is the Mighty God, the Everlasting Father, who calls his name Prince of Peace'
  - Render אֵל גִּבּוֹר in a weakened non-divine sense such as 'divine hero'
  rationale: The syntax most naturally reads the sequence as names/titles bestowed on the child in the naming formula. In keeping with orthodox Christological bounds, the translation should not flatten titles with strong divine force merely to avoid theological implications; nor should it import a more complex paraphrase not demanded by the Hebrew.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3, 6
- issue: Temporal rendering of the verbal sequence in prophetic context
  chosen_reading: Use English present-perfect/resultative forms ('has been born,' 'has been given,' 'has come to rest,' 'is called')
  alternative_readings:
  - Use simple past throughout
  - Use future-oriented renderings such as 'will be born' or 'shall be called'
  rationale: The Hebrew forms in prophetic proclamation can be rendered in several ways in English. Present-perfect/resultative English preserves the prophetic certainty and completed-force feel without overcommitting to a strictly past historical reference in the main text. Traditional future renderings are preserved in footnotes where useful.
  doctrine_reference: Translation philosophy §3
