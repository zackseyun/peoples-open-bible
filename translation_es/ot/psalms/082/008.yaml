translation:
  language: es
  text: ¡Levántate[a], oh, Dios; juzga la tierra, porque tú heredarás[b] todas las naciones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, «Levántate».

      '
