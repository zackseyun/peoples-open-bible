  - severity: medium
    issue: «la penosa tarea» para τὴν κακοπάθειαν
    rationale: κακοπάθεια apunta a la dureza o penalidad soportada al emprender el trabajo, no identifica directamente esa dureza con «la tarea». Conviene distinguir la dureza asumida del compendio que se elabora.
  - severity: low
