translation:
  language: es
  text: Habéis arrasado sus fronteras[a], y habéis asestado un gran golpe[b] a la tierra, y habéis tomado control[c] de muchos lugares en mi reino.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «habéis devastado su territorio»; el griego puede referirse a dejar desolada una región.
    reason: lexical_alternative
  - marker: b
    text: O «habéis causado gran daño a la tierra»; el término griego puede significar golpe, herida o plaga, según el contexto.
    reason: lexical_alternative
  - marker: c
    text: O «habéis gobernado sobre muchos lugares en mi reino»; el verbo griego denota ejercer dominio o señorío.
    reason: lexical_alternative
lexical_decisions:
- source_word: τὰ ὅρια
  english_pob_choice: their borders
  chosen_spanish: sus fronteras
  alternatives_spanish:
  - su territorio
  - sus límites
  lexicon: LSJ
  rationale: ὅρια puede designar fronteras, límites o el territorio delimitado. «Fronteras» conserva la imagen geográfica y política del texto y suena natural en español.
- source_word: ἠρημώσατε
  english_pob_choice: have laid waste
  chosen_spanish: habéis arrasado
  alternatives_spanish:
  - habéis devastado
  - habéis dejado desolado
  lexicon: LSJ
  rationale: El verbo expresa dejar una región en ruina o desolación. «Habéis arrasado» comunica bien la fuerza destructiva sin sonar demasiado técnico.
- source_word: πληγὴν μεγάλην
  english_pob_choice: a great blow
  chosen_spanish: un gran golpe
  alternatives_spanish:
  - un gran daño
  - una gran herida
  - una gran plaga
  lexicon: LSJ
  rationale: πληγή puede significar golpe, herida, daño o plaga según el contexto. Aquí, en una queja militar y territorial, «golpe» conserva la imagen de impacto y evita sugerir enfermedad.
- source_word: ἐπὶ τῆς γῆς
  english_pob_choice: on the land
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - sobre el país
  - en la tierra
  lexicon: LSJ
  rationale: γῆ aquí apunta a la tierra como territorio afectado. «Sobre la tierra» refleja la preposición y mantiene el alcance geográfico del texto.
- source_word: ἐκυριεύσατε
  english_pob_choice: have gained control of
  chosen_spanish: os habéis hecho dueños
  alternatives_spanish:
  - habéis tomado control
  - habéis dominado
  - habéis ejercido señorío
  lexicon: LSJ
  rationale: El verbo indica ejercer dominio o adquirir control. «Os habéis hecho dueños» transmite posesión efectiva y dominio, aunque mantiene una tonalidad más idiomática que la traducción literal.
- source_word: τόπων πολλῶν
  english_pob_choice: many places
  chosen_spanish: de muchos lugares
  alternatives_spanish:
  - de muchas regiones
  - de muchos sitios
  lexicon: LSJ
  rationale: τόποι es un término amplio para lugares o localidades. «Lugares» es la correspondencia más directa y no fuerza una especificación administrativa.
- source_word: ἐν τῇ βασιλείᾳ μου
  english_pob_choice: in my kingdom
  chosen_spanish: en mi reino
  alternatives_spanish:
  - dentro de mi reino
  - en mi dominio real
  lexicon: LSJ
  rationale: βασιλεία designa el reino o dominio real. «Reino» es la opción más clara y fiel en español.
translation_notes:
  revision_awareness: Alineado con el pasaje griego de 1 Maccabees 15:29 y con el audit trail inglés POB de equivalencia óptima; no se registran revisiones posteriores que alteren el sentido básico.
  spanish_consistency_notes:
  - 'Se mantiene un registro consistente de dominio territorial: «fronteras», «tierra», «reino», «lugares».'
  - Se evita introducir vocabulario eclesiástico o doctrinal no presente en el texto fuente.
  - Las notas al pie preservan las alternativas semánticas relevantes del griego para πλῆγή y ἐκυριεύσατε.
