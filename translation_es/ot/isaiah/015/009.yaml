translation:
  language: es
  text: 'Porque las aguas de Dimón están llenas de sangre[a], porque pondré más[b] sobre Dimón: un león[c] sobre los fugitivos de Moab y sobre el remanente de la tierra de Moab.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Dimón puede reflejar un juego de palabras con ‘sangre’ (dam). Algunos relacionan el nombre del lugar con Dibón.
    reason: lexical_alternative
  - marker: b
    text: 'O: ‘pondré cosas adicionales sobre Dimón’. El hebreo deja implícitas las calamidades añadidas.'
    reason: alternative_reading
  - marker: c
    text: El ‘león’ puede ser un león literal o una imagen figurada de juicio adicional.
    reason: alternative_reading
lexical_decisions:
- source_word: מֵי דִימוֹן
  english_pob_choice: the waters of Dimon
  chosen_spanish: las aguas de Dimón
  alternatives_spanish:
  - las aguas de Dibón
  lexicon: HALOT
  rationale: מֵי es el constructo plural de ‘agua(s)’, que en español se expresa naturalmente como ‘las aguas de’. Se conserva Dimón en el texto principal, como en el hebreo consonántico y en la versión inglesa POB, porque la forma permite el juego de palabras con דָּם (‘sangre’).
- source_word: מָלְאוּ דָם
  english_pob_choice: are full of blood
  chosen_spanish: están llenas de sangre
  alternatives_spanish:
  - están llenas de sangre derramada
  - están repletas de sangre
  lexicon: HALOT
  rationale: מלא con objeto directo expresa plenitud o estar lleno. ‘Están llenas de sangre’ mantiene la imagen vívida sin forzar una construcción más pesada en español.
- source_word: אָשִׁית
  english_pob_choice: I will bring
  chosen_spanish: pondré
  alternatives_spanish:
  - pondré sobre
  - traeré
  - colocaré
  lexicon: HALOT
  rationale: שׂים literalmente es ‘poner/colocar’, y con עַל en contexto de juicio puede entenderse como imponer sobre. ‘Pondré’ preserva la idea de imponer calamidad sin introducir una interpretación más específica que el hebreo no da explícitamente.
- source_word: נוֹסָפוֹת
  english_pob_choice: more
  chosen_spanish: más
  alternatives_spanish:
  - todavía más
  - adicionales
  lexicon: HALOT
  rationale: La forma plural femenina funciona de modo sustantivado/adjetival con valor de ‘cosas adicionales’ o simplemente ‘más’. ‘Más’ reproduce la concisión del hebreo y evita añadir un sustantivo no expresado.
- source_word: לִפְלֵיטַת מוֹאָב
  english_pob_choice: upon the fugitives of Moab
  chosen_spanish: sobre los fugitivos de Moab
  alternatives_spanish:
  - sobre los escapados de Moab
  - sobre el remanente de Moab
  lexicon: HALOT
  rationale: פְלֵיטָה se refiere a quienes escapan o sobreviven. En un oráculo de invasión, ‘fugitivos’ comunica bien la escena y mantiene la fuerza concreta del término.
- source_word: אַרְיֵה
  english_pob_choice: a lion
  chosen_spanish: un león
  alternatives_spanish:
  - león
  lexicon: HALOT
  rationale: 'El sustantivo singular se traduce de forma directa. Se conserva la ambigüedad profética: puede ser un león literal o una imagen de otra calamidad, pero el texto español no la resuelve.'
- source_word: וְלִשְׁאֵרִית אֲדָמָה
  english_pob_choice: and upon the remnant of the land
  chosen_spanish: y sobre el remanente de la tierra
  alternatives_spanish:
  - y sobre los que quedan en la tierra
  - y sobre el resto de la tierra
  lexicon: HALOT
  rationale: שְׁאֵרִית es ‘remanente/resto’ y אֲדָמָה aquí tiene sentido territorial, por lo que ‘tierra’ funciona mejor que ‘suelo’. Se mantiene el paralelo con el hemistiquio anterior.
- source_word: כִּי ... כִּי
  english_pob_choice: For ... for
  chosen_spanish: Porque ... porque
  alternatives_spanish:
  - Pues ... pues
  - Ya que ... ya que
  lexicon: HALOT
  rationale: La repetición de כִּי introduce explicación y énfasis. ‘Porque ... porque’ conserva la cadencia profética y el enlace causal del hebreo y de la POB inglesa.
theological_decisions:
- issue: Naturaleza del ‘león’ en el oráculo de juicio
  english_pob_reading: Retain the concrete image 'a lion' without interpreting it in the main text.
  chosen_spanish_reading: Mantener ‘un león’ sin explicarlo en el texto principal.
  alternative_spanish_readings:
  - un león literal enviado como juicio
  - una figura de otra calamidad o de un poder invasor
  rationale: El hebreo presenta la imagen sin identificar su referente. Para respetar la tensión profética y la lectura auditada de la POB, la traducción conserva la concreción del símbolo sin resolverlo interpretativamente.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La versión inglesa auditada revisó ‘still more’ a ‘more’ para ajustar נוספות a una forma más natural; el español sigue esa decisión con ‘más’. También se preservó la ambigüedad del ‘león’ y el nombre Dimón en el texto principal, con notas para el juego de palabras y la posible lectura alternativa.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ en este proyecto cuando el texto lo requiere; aquí no aparece el nombre divino.
  - Se prefiere ‘león’ sin glosa interpretativa para respetar la ambigüedad del hebreo.
  - Se mantiene ‘Dimón’ en el texto principal y se ofrece ‘Dibón’ solo como alternativa textual.
  - ‘Remanente de la tierra’ conserva el paralelismo con ‘fugitivos de Moab’ y el sentido territorial de אֲדָמָה.
