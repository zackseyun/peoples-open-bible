translation:
  language: es
  text: 'La mujer fue a Saúl, y al ver que estaba muy aterrorizado, le dijo: «He aquí, tu sierva[a] ha obedecido tu voz, y he puesto mi vida en mi mano[b] y he escuchado las palabras que me dijiste».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «tu sierva». El término puede reflejar una mujer sirviente o esclavizada; aquí conserva el matiz de deferencia en la forma de dirigirse a Saúl.'
    reason: lexical_alternative
  - marker: b
    text: 'Expresión hebrea idiomática: «he puesto mi vida en mi mano», es decir, «he arriesgado mi vida».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתָּבֹא הָאִשָּׁה אֶל שָׁאוּל
  english_pob_choice: The woman came to Saul
  chosen_spanish: La mujer fue a Saúl
  alternatives_spanish:
  - La mujer vino a Saúl
  - Entonces la mujer fue a Saúl
  lexicon: HALOT
  rationale: El hebreo usa una forma narrativa que avanza la acción; en español, «fue a Saúl» comunica bien el movimiento hacia él sin sonar forzado. Mantiene el sujeto definido sin introducir una identificación interpretativa adicional.
- source_word: וַתֵּרֶא כִּי נִבְהַל מְאֹד
  english_pob_choice: when she saw that he was very terrified
  chosen_spanish: al ver que estaba muy aterrorizado
  alternatives_spanish:
  - cuando vio que estaba muy asustado
  - al ver que estaba muy perturbado
  lexicon: HALOT
  rationale: נבהל indica alarma intensa, sobresalto o terror. «Muy aterrorizado» conserva la intensidad del adverbio מְאֹד y el estado emocional de Saúl, con un registro natural en español.
- source_word: הִנֵּה
  english_pob_choice: Behold
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira, pues
  - He aquí
  lexicon: HALOT
  rationale: Es un marcador discursivo de atención. «Mira» es claro en español moderno y conserva la fuerza apelativa sin depender de un giro arcaico.
- source_word: שִׁפְחָתְךָ
  english_pob_choice: your servant
  chosen_spanish: tu sierva
  alternatives_spanish:
  - tu esclava
  - tu criada
  lexicon: HALOT
  rationale: שִׁפְחָה denota específicamente una mujer en condición de servidumbre; «sierva» preserva la deferencia y la referencia femenina. «Esclava» sería más literal en fuerza léxica, pero aquí «sierva» mantiene mejor la inteligibilidad y el tono reverente del diálogo.
- source_word: שָׁמְעָה שִׁפְחָתְךָ בְּקוֹלֶךָ
  english_pob_choice: your servant has obeyed your voice
  chosen_spanish: ha obedecido tu voz
  alternatives_spanish:
  - ha escuchado tu voz
  - ha atendido a tu voz
  lexicon: HALOT
  rationale: La expresión hebrea שׁמע בְּקוֹל suele significar «obedecer/atender», no solo oír. «Ha obedecido tu voz» preserva esa fuerza idiomática y refleja la decisión del POB en inglés.
- source_word: וָאָשִׂים נַפְשִׁי בְּכַפִּי
  english_pob_choice: I have put my life in my hand
  chosen_spanish: he puesto mi vida en mi mano
  alternatives_spanish:
  - he arriesgado mi vida
  - he tomado mi vida en mi mano
  lexicon: HALOT
  rationale: Se conserva el modismo hebreo de manera transparente. La imagen corporal «en mi mano» deja visible la metáfora original; en nota puede entenderse como riesgo de la vida.
- source_word: וָאֶשְׁמַע אֶת דְּבָרֶיךָ
  english_pob_choice: and listened to your words
  chosen_spanish: y he escuchado las palabras
  alternatives_spanish:
  - y he oído tus palabras
  - y he atendido a tus palabras
  lexicon: HALOT
  rationale: Aquí שׁמע con objeto directo puede significar escuchar. «He escuchado las palabras» mantiene el paralelo con el verbo anterior y conserva la respuesta receptiva de la mujer.
- source_word: אֲשֶׁר דִּבַּרְתָּ אֵלָי
  english_pob_choice: that you spoke to me
  chosen_spanish: que me dijiste
  alternatives_spanish:
  - que hablaste conmigo
  - que me hablaste
  lexicon: HALOT
  rationale: El relativo es sencillo y directo. «Me dijiste» es natural en español y comunica el contenido del discurso sin elevar artificialmente el registro.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el hebreo de WLC y toma en cuenta el audit trail inglés: se conserva el sujeto definido, el movimiento narrativo, la intensidad de נבהל, la función apelativa de הִנֵּה y el valor idiomático de שׁמע בְּקוֹל y de «poner la vida en la mano». Se adopta un registro algo más formal que «mira»/«he aquí» donde ayuda a la publicación readable, sin perder transparencia lexical.'
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma general en el proyecto, pero este versículo no contiene el nombre divino.
  - «Sierva» se eligió por la relación de habla y deferencia; no se usó «esclava» en el texto principal para mantener fluidez, pero la nota preserva la alternativa semántica.
  - «Obedecido tu voz» conserva el idioma hebreo de שׁמע בְּקוֹל; no se redujo a «escuchado» en el texto principal.
  - Se mantuvo «he puesto mi vida en mi mano» como imagen hebrea transparente, con glosa explicativa en nota.
