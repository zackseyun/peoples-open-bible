translation:
  language: es
  text: Entonces hizo subir contra ellos al rey de los caldeos[a], que mató con la espada a sus jóvenes varones en la casa de su santuario, y no tuvo compasión[b] de joven ni de virgen[c], de anciano ni de muy anciano. Entregó todo en su mano.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el rey de los babilonios»; el hebreo dice «caldeos».
    reason: lexical_alternative
  - marker: b
    text: O «no perdonó». El hebreo también puede expresar la idea de no mostrar piedad o no abstenerse.
    reason: lexical_alternative
  - marker: c
    text: El hebreo dice «virgen», con el sentido específico de una joven no casada.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַל עֲלֵיהֶם
  english_pob_choice: he brought up against them
  chosen_spanish: hizo subir contra ellos
  alternatives_spanish:
  - trajo contra ellos
  - hizo venir contra ellos
  lexicon: HALOT
  rationale: El verbo en forma causativa expresa que alguien fue hecho avanzar o subir en sentido militar contra otro. «Hizo subir contra ellos» conserva la causalidad del hebreo sin perder naturalidad en español.
- source_word: מֶלֶךְ כשדיים
  english_pob_choice: the king of the Chaldeans
  chosen_spanish: el rey de los caldeos
  alternatives_spanish:
  - el rey de Babilonia
  - el rey de los babilonios
  lexicon: HALOT
  rationale: כַּשְׂדִּים significa literalmente «caldeos». Se mantiene el término del original, como hace el texto inglés, y se deja la alternativa histórica en trasfondo sin sustituir el etnónimo bíblico.
- source_word: וַיַּהֲרֹג
  english_pob_choice: who killed
  chosen_spanish: que mató
  alternatives_spanish:
  - y mató
  - que قتلó
  lexicon: HALOT
  rationale: El verbo indica matar o dar muerte. La cláusula relativa en español enlaza de forma natural con «el rey de los caldeos» y conserva el flujo narrativo.
- source_word: בַּחוּרֵיהֶם
  english_pob_choice: their young men
  chosen_spanish: a sus jóvenes
  alternatives_spanish:
  - a sus jóvenes varones
  - a sus muchachos
  lexicon: HALOT
  rationale: בָּחוּר denota a un varón joven en plenitud. «Jóvenes» es claro en español y suficientemente fiel al campo semántico, sin introducir una edad demasiado precisa.
- source_word: בַּחֶרֶב
  english_pob_choice: with the sword
  chosen_spanish: con la espada
  alternatives_spanish:
  - por la espada
  - a espada
  lexicon: HALOT
  rationale: La preposición instrumental se vierte de manera directa con «con la espada», una formulación natural y transparente en español.
- source_word: בְּבֵית מִקְדָּשָׁם
  english_pob_choice: in the house of their sanctuary
  chosen_spanish: en la casa de su santuario
  alternatives_spanish:
  - en su santuario
  - en el templo de ellos
  lexicon: HALOT
  rationale: Se preserva la imagen literal del hebreo («casa de su santuario») para mantener la solemnidad y la nota de profanación del lugar.
- source_word: וְלֹא חָמַל
  english_pob_choice: had no compassion
  chosen_spanish: no tuvo compasión
  alternatives_spanish:
  - no perdonó
  - no se apiadó
  lexicon: HALOT
  rationale: חָמַל expresa la idea de compadecerse hasta el punto de perdonar o abstenerse. «No tuvo compasión» reproduce bien esa carga afectiva y moral.
- source_word: בָּחוּר וּבְתוּלָה
  english_pob_choice: young man or virgin
  chosen_spanish: de joven ni de virgen
  alternatives_spanish:
  - de joven ni de doncella
  - de muchacho ni de virgen
  lexicon: HALOT
  rationale: 'Se conserva la distinción de sexo y condición: בְּתוּלָה es específicamente «virgen», no solo «joven mujer». En español, «de joven ni de virgen» sigue de cerca la enumeración hebrea.'
- source_word: זָקֵן וְיָשֵׁשׁ
  english_pob_choice: old man or aged man
  chosen_spanish: de anciano ni de viejo
  alternatives_spanish:
  - de anciano ni de muy anciano
  - de viejo ni de anciano
  lexicon: HALOT
  rationale: El hebreo acumula dos términos de vejez. Se conservan ambos con palabras distintas en español para reflejar la intensificación retórica, aunque haya solapamiento semántico.
- source_word: הַכֹּל נָתַן בְּיָדוֹ
  english_pob_choice: He gave all into his hand
  chosen_spanish: Entregó todo en su mano
  alternatives_spanish:
  - Lo entregó todo en su mano
  - Entregó todo en su poder
  lexicon: HALOT
  rationale: La expresión idiomática de entregar algo «en la mano» de alguien se mantiene para conservar el sentido de dominio o poder. «Todo» refleja mejor el hebreo absoluto que una frase explicativa añadida.
theological_decisions:
- issue: Sujeto implícito de las acciones de juicio
  english_pob_reading: 'The subject is God, continuing the prior context: God brought the Chaldean king against Judah and gave the people into his hand.'
  chosen_spanish_reading: 'El sujeto queda implícito en el contexto: Dios hizo subir al rey de los caldeos contra ellos y entregó todo en su mano.'
  alternative_spanish_readings:
  - Así hizo subir contra ellos al rey de los caldeos...
  - Entonces él hizo subir contra ellos al rey de los caldeos...
  rationale: El hebreo usa verbos en tercera persona masculina singular, con el sujeto recuperado del contexto inmediato. En español se evita introducir un sujeto distinto al del contexto y se conserva la continuidad teológica del juicio divino.
  doctrine_reference: Translation philosophy §§1, 3
- issue: Traducción de 'sanctuary' como lugar sagrado profanado
  english_pob_reading: in the house of their sanctuary
  chosen_spanish_reading: en la casa de su santuario
  alternative_spanish_readings:
  - en su templo
  - en la casa del santuario
  rationale: «Casa de su santuario» mantiene la forma hebrea y subraya el carácter sacrílego del ataque. «Templo» sería idiomático, pero suaviza la literalidad de la expresión fuente.
  doctrine_reference: Translation philosophy §2
translation_notes:
  revision_awareness: El audit trail inglés fue revisado para acercar el cierre a «He gave all into his hand» y evitar un añadido innecesario tras «all». La versión española sigue esa última lectura, con «Entregó todo en su mano», sin explicitar un complemento que el hebreo no presenta.
  spanish_consistency_notes:
  - Se mantiene «caldeos» para כשדים, coherente con la decisión inglesa documentada.
  - Se conserva la imagen idiomática «en su mano» para בְיָדוֹ, evitando reemplazarla por una explicación interpretativa.
  - Se distingue «joven»/«virgen» y «anciano»/«viejo» para reproducir la enumeración enfática del hebreo.
  - No se usa «SEÑOR» ni se introduce terminología eclesiástica ajena al texto hebreo.
