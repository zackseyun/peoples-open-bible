translation:
  language: es
  text: 'Habla a los hijos de Israel y diles: Cuando un hombre haga un voto especial, según tu valoración[a] de personas, a Yahvé[b],'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cuando alguien haga un voto extraordinario, conforme a tu valoración de personas, para Yahvé». La frase hebrea que incluye «tu valoración» es difícil; el sentido parece ser un voto relacionado con personas a las que se les asigna un valor establecido en los versículos siguientes.'
    reason: alternative_reading
  - marker: b
    text: Hebreo «hijos de Israel», expresión pactal estándar para el pueblo de Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: דַּבֵּר
  english_pob_choice: Speak
  chosen_spanish: Habla
  alternatives_spanish:
  - Di
  - Dirige la palabra
  lexicon: HALOT
  rationale: Imperativo de comunicación formal en una fórmula de comisión. «Habla» conserva el registro directo y solemne mejor que una opción más coloquial como «Di».
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Se conserva la expresión filial literal del hebreo para reflejar la textura del original y el lenguaje pactal corporativo.
- source_word: אִישׁ
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  - cualquiera
  lexicon: HALOT
  rationale: El hebreo usa singular masculino; en contexto legal representa a la persona del caso. Se mantiene la forma masculina por fidelidad léxica y por la elección de POB de no neutralizar innecesariamente.
- source_word: יַפְלִא
  english_pob_choice: makes a special vow
  chosen_spanish: haga un voto especial
  alternatives_spanish:
  - haga un voto extraordinario
  - formule un voto singular
  lexicon: HALOT
  rationale: El verbo intensivo aquí expresa algo singular o excepcional en la acción de votar. «Voto especial» transmite el matiz sin forzar una paráfrasis.
- source_word: נֶדֶר
  english_pob_choice: vow
  chosen_spanish: voto
  alternatives_spanish:
  - promesa votiva
  - juramento
  lexicon: HALOT
  rationale: En español bíblico contemporáneo, «voto» comunica bien el compromiso religioso/legal del término hebreo. «Juramento» desplazaría el sentido hacia otro campo semántico.
- source_word: בְּעֶרְכְּךָ
  english_pob_choice: according to your valuation
  chosen_spanish: conforme a tu valuación
  alternatives_spanish:
  - según tu valuación
  - de acuerdo con tu valuación
  - según tu tasación
  lexicon: HALOT
  rationale: La frase es sintácticamente difícil y mantiene el sufijo de 2ms. «Tu valuación» reproduce el posesivo y el campo semántico de הערך; «valuación» conserva el término técnico, mientras que «tasación» suena más administrativa y menos cercana al contexto ritual.
- source_word: נְפָשֹׁת
  english_pob_choice: persons
  chosen_spanish: personas
  alternatives_spanish:
  - vidas
  - almas
  lexicon: HALOT
  rationale: En este contexto jurídico se refiere a seres humanos evaluados por voto, no a «almas». «Personas» evita una lectura espiritualizante impropia del pasaje.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: para Yahvé
  alternatives_spanish:
  - a Yahvé
  - para el Señor
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto para el Tetragrámaton: «Yahvé». La preposición «para» expresa mejor la dedicación votiva que un simple «a» en español.'
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el Señor
  rationale: El texto hebreo contiene explícitamente el Tetragrámaton. Se usa «Yahvé» según el estándar del proyecto, preservando el nombre del pacto en lugar de ocultarlo tras una convención litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Carácter legal-singular de אִישׁ
  english_pob_reading: a man
  chosen_spanish_reading: un hombre
  alternative_spanish_readings:
  - una persona
  - cualquiera
  rationale: En el marco legal de Levítico, el singular masculino funciona como formulación representativa. Se mantiene en español sin convertirlo en genérico neutro.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: La versión española sigue la revisión más reciente del POB inglés, que prefirió «according to your valuation» para reflejar más de cerca בְּעֶרְכְּךָ y conservar el sufijo de segunda persona singular. También conserva el nombre divino como Yahvé, en línea con la política del proyecto para יְהוָה.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma principal para el Tetragrámaton, consistente con el estándar español del proyecto.
  - Se conserva la expresión literal «hijos de Israel» por textura bíblica y concordancia con el audit trail inglés.
  - «Voto especial» y «valuación» intentan respetar el campo ritual-jurídico sin suavizar la dificultad sintáctica del hebreo.
  - «Personas» evita la ambigüedad de «almas» en un contexto de valoración legal.
