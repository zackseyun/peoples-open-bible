revisions:
- from: Esto será la culpa de Egipto[a], y la culpa de todas las naciones que no suban para celebrar la Fiesta de las Cabañas[b].
  to: Esto será el castigo de Egipto[a], y el castigo de todas las naciones que no suban para celebrar la Fiesta de las Cabañas[b].
  rationale: Se reemplaza «culpa» por «castigo» para reflejar fielmente el sentido contextual de חַטַּאת como penalidad judicial, en conformidad con la evidencia fuente y la decisión auditada del POB inglés. Se conserva «Fiesta de las Cabañas» como título traducido, claro y natural en español. También se corrige la nota léxica para que explique con precisión la alternativa y elimine errores de redacción.
