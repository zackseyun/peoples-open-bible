translation:
  language: es
  text: 'Y cuando Dios me hizo vagar desde la casa de mi padre[a], le dije: «Esta es la bondad[b] que debes mostrarme: en todo lugar adonde lleguemos, di de mí: “Él es mi hermano”».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «me hizo andar errante» / «me hizo extraviar». El verbo hebreo es causativo y puede denotar hacer vagar o extraviar; aquí el sentido es salida y movimiento inestable, no necesariamente error moral.
    reason: lexical_alternative
  - marker: b
    text: «Bondad» traduce aquí hebreo hesed, que también puede llevar la idea de lealtad amorosa o fidelidad bondadosa según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִתְעוּ
  english_pob_choice: caused me to wander
  chosen_spanish: me hizo errar
  alternatives_spanish:
  - me hizo vagar
  - me hizo andar errante
  - me hizo desviarme
  lexicon: HALOT
  rationale: El hiphil de תעה expresa causar a alguien a extraviarse o andar errante. «Me hizo errar» conserva la fuerza causativa y permite reflejar la tensión del hebreo sin añadir una carga moral que el contexto no exige. «Vagar» o «andar errante» serían válidos, pero «errar» suena más breve y natural en español bíblico actual.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - dioses
  lexicon: HALOT
  rationale: Aunque la forma es morfológicamente plural, el contexto y el verbo singular en la frase apuntan al Dios de Abraham. En español, «Dios» preserva con claridad ese referente singular.
- source_word: מִבֵּית אָבִי
  english_pob_choice: from my father’s house
  chosen_spanish: de la casa de mi padre
  alternatives_spanish:
  - de la casa paterna
  - de la casa de mi padre y mi familia
  - del hogar de mi padre
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y remite al ámbito familiar y social de origen. «Casa de mi padre» es la forma más directa y reconocible en español, y reproduce bien el valor del modismo.
- source_word: חַסְדֵּךְ
  english_pob_choice: the kindness you shall show me
  chosen_spanish: la bondad que debes mostrarme
  alternatives_spanish:
  - tu bondad
  - tu lealtad amorosa
  - tu amor fiel
  lexicon: HALOT
  rationale: חסד puede abarcar bondad, lealtad y amor fiel. En este pedido interpersonal, la traducción principal como «bondad» es natural en español; se mantiene la obligación implícita del verbo con «debes mostrarme». Aunque «lealtad amorosa» o «amor fiel» podrían reflejar el trasfondo del término, aquí suenan menos inmediatos en el contexto narrativo.
- source_word: תַּעֲשִׂי עִמָּדִי
  english_pob_choice: you shall show me
  chosen_spanish: debes mostrarme
  alternatives_spanish:
  - harás conmigo
  - harás para mí
  - me harás
  lexicon: HALOT
  rationale: La construcción hebrea literalmente dice «harás conmigo», pero en español la combinación natural con «bondad» es «mostrarme». La elección conserva el sentido pedido/esperado y evita una literalidad dura o poco idiomática.
- source_word: אֶל כָּל הַמָּקוֹם אֲשֶׁר נָבֹא שָׁמָּה
  english_pob_choice: at every place to which we come
  chosen_spanish: en todo lugar adonde lleguemos
  alternatives_spanish:
  - en cada lugar al que lleguemos
  - a todo lugar a donde vayamos
  - en cada sitio donde entremos
  lexicon: HALOT
  rationale: La frase es distributiva y apunta a cada lugar al que arriben. «En todo lugar adonde lleguemos» conserva la repetición de lugares y el sentido de llegada, sin sonar forzado.
- source_word: אִמְרִי לִי
  english_pob_choice: say of me
  chosen_spanish: di de mí
  alternatives_spanish:
  - di acerca de mí
  - di sobre mí
  - di de mí mismo
  lexicon: HALOT
  rationale: El hebreo expresa la manera de hablar acerca de Abraham ante otros. «Di de mí» es una solución idiomática en español que reproduce ese valor sin extender el sentido.
- source_word: אָחִי הוּא
  english_pob_choice: He is my brother
  chosen_spanish: Él es mi hermano
  alternatives_spanish:
  - es mi hermano
  - él es mi hermano
  - es mi pariente
  lexicon: HALOT
  rationale: Se mantiene «hermano» porque el relato depende precisamente de esa afirmación. «Pariente» debilitaría la tensión narrativa y no corresponde al alcance directo del texto.
theological_decisions:
- issue: Agencia divina en el verbo causativo
  english_pob_reading: God caused Abraham to wander from his father's house
  chosen_spanish_reading: Dios me hizo errar lejos de la casa de mi padre
  alternative_spanish_readings:
  - Dios me permitió errar lejos de la casa de mi padre
  - Dios me hizo andar errante lejos de la casa de mi padre
  rationale: El hebreo presenta a Dios como sujeto del verbo causativo. La traducción conserva esa agencia sin suavizarla, y sin convertirla en una afirmación de mal moral. Se mantiene así la tensión teológica del texto en vez de resolverla.
  doctrine_reference: 'Translation philosophy §3: preserve theological tension rather than resolve it'
- issue: Valor de חֶסֶד / חַסְדֵּךְ en una petición personal
  english_pob_reading: ‘Kindness’ translates Hebrew hesed, which can also carry the sense of loyal love or faithful kindness depending on context.
  chosen_spanish_reading: «Bondad» traduce aquí חֶסֶד, con posible trasfondo de lealtad amorosa o amor fiel.
  alternative_spanish_readings:
  - «Lealtad amorosa»
  - «amor fiel»
  - «bondad leal»
  rationale: En este contexto directo entre dos personas, «bondad» es la opción más natural y clara para la lectura pública. Sin embargo, se conserva en la nota la amplitud semántica de חסד para no borrar el trasfondo de fidelidad relacional que el término puede implicar.
  doctrine_reference: HALOT; translation philosophy §3
translation_notes:
  revision_awareness: La redacción española sigue la revisión más reciente del POB inglés al preferir un registro formal y claro en la cláusula distributiva («en todo lugar adonde lleguemos») y al mantener la petición como un mandato formulado en segunda persona («debes mostrarme») que refleja con nitidez la fuerza del hebreo. Se decidió, no obstante, usar «me hizo errar» como equivalente español compacto del causativo, sin perder la lectura revisada que evita la noción de error moral.
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלֹהִים conforme al uso del proyecto cuando el contexto es singular.
  - Se conserva «casa de mi padre» como modismo estable para מִבֵּית אָבִי.
  - «Hermano» se conserva sin atenuación para preservar la tensión narrativa.
  - La nota de חֶסֶד usa «bondad» como equivalente principal, manteniendo abierta la amplitud semántica del término.
