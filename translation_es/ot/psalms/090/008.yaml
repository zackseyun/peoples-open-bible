review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja correctamente el sentido básico del hebreo: Dios ha puesto las iniquidades del pueblo delante de sí y sus pecados ocultos quedan expuestos por la luz de su rostro. Conserva bien el paralelismo y la explicitación contextual de עֲלֻמֵנוּ como pecados ocultos. Sin embargo, la correspondencia con las notas del rastro POB está invertida respecto de los anclajes ingleses: la nota sobre «en la luz de tu rostro» debe anclarse en esa frase, mientras que la alternativa «pecados secretos» debe anclarse en «pecados ocultos».'
  spanish_quality_summary: El español es claro, digno y natural. «Has puesto nuestras iniquidades delante de ti» y «nuestros pecados ocultos» suenan bien. La única reparación necesaria es ordenar correctamente los marcadores de notas para que cada nota corresponda a la expresión pertinente. También conviene pulir levemente la redacción de las notas para un español más natural.
  glossary_alignment: No hay conflicto con la terminología del proyecto. «Iniquidades» preserva bien עֲוֺנֹתֵינוּ; «rostro» mantiene la imagen concreta de פָּנֶיךָ; la explicitación «pecados» para עֲלֻמֵנוּ concuerda con la decisión teológica documentada. No intervienen términos sensibles del glosario mayor como Yahvé, Mesías o esclavo.
  issues:
  - severity: medium
    issue: Los marcadores de notas están asignados a las frases equivocadas.
    rationale: En el rastro inglés, la nota sobre la alternativa «our secret sins» corresponde a «our hidden sins», mientras que la nota sobre «in the light of your face» corresponde a esa frase. En español, [a] aparece en «pecados ocultos» y [b] en «a la luz de tu rostro», pero los contenidos de las notas están invertidos.
  - severity: low
    issue: La redacción de las notas puede sonar ligeramente calcada.
    rationale: '«El hebreo refiere a lo que está oculto o encubierto» y «Literalmente: “en la luz de tu rostro”» son comprensibles, pero «se refiere» y una formulación más fluida mejoran la naturalidad sin cambiar el contenido.'
  revised_spanish_text: Has puesto nuestras iniquidades delante de ti, nuestros pecados ocultos[a] a la luz de tu rostro[b].
  revised_footnotes:
  - marker: a
    text: 'O: «nuestros pecados secretos». El término hebreo se refiere a lo que está oculto o encubierto.'
    reason: lexical_alternative
  - marker: b
