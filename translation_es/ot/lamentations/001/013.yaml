translation:
  language: es
  text: Desde lo alto envió fuego en mis huesos, y prevaleció[a] contra ellos; tendió una red para mis pies; me hizo volver atrás; me dejó desolada[b], desfallecida todo el día.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «y los subyugó»; el hebreo puede transmitir la idea de dominar, subyugar o vencer.
    reason: lexical_alternative
  - marker: b
    text: O «enferma todo el día» o «languidecida todo el día».
    reason: lexical_alternative
lexical_decisions:
- source_word: מִמָּרוֹם
  english_pob_choice: From on high
  chosen_spanish: Desde lo alto
  alternatives_spanish:
  - Desde arriba
  - Desde el alto
  lexicon: HALOT
  rationale: מָרוֹם señala altura o lugar elevado. «Desde lo alto» conserva la imagen poética sin forzar «cielo», que sería más específico de lo que exige el hebreo aquí.
- source_word: שָׁלַח אֵשׁ
  english_pob_choice: he sent fire
  chosen_spanish: envió fuego
  alternatives_spanish:
  - mandó fuego
  - arrojó fuego
  lexicon: HALOT
  rationale: El verbo más el objeto expresan una acción directa y vívida. «Envió fuego» mantiene la agencia y el paralelismo poético con el texto hebreo.
- source_word: בְּעַצְמֹתַי
  english_pob_choice: into my bones
  chosen_spanish: a mis huesos
  alternatives_spanish:
  - en mis huesos
  - dentro de mis huesos
  lexicon: HALOT
  rationale: El hebreo puede expresar penetración o localización interna. En español, «a mis huesos» comunica el impacto invasivo del fuego con naturalidad; «en mis huesos» también sería posible, pero menos idiomático en este giro.
- source_word: וַיִּרְדֶּנָּה
  english_pob_choice: and it prevailed against them
  chosen_spanish: y prevaleció contra ellos
  alternatives_spanish:
  - y los subyugó
  - y los dominó
  - y los venció
  lexicon: HALOT
  rationale: El verbo רדה puede implicar gobernar, subyugar o prevalecer. La lectura inglesa revisada eligió «prevailed against them»; en español, «prevaleció contra ellos» conserva esa fuerza sin reducir el campo semántico a una sola idea. Mantiene la tensión entre dominar y vencer.
- source_word: פָּרַשׂ רֶשֶׁת לְרַגְלַי
  english_pob_choice: he spread a net for my feet
  chosen_spanish: tendió una red para mis pies
  alternatives_spanish:
  - puso una red para mis pies
  - extendió una red para mis pasos
  lexicon: HALOT
  rationale: La imagen de trampa se conserva de forma literal y clara. «Mis pies» reproduce el hebreo y mantiene el cuerpo como parte del símbolo de captura.
- source_word: הֱשִׁיבַנִי אָחוֹר
  english_pob_choice: he turned me back
  chosen_spanish: me hizo volver atrás
  alternatives_spanish:
  - me devolvió atrás
  - me obligó a retroceder
  lexicon: HALOT
  rationale: El hiphil de שוב indica causar retorno o retroceso. «Me hizo volver atrás» es natural en español y preserva la idea de ser forzada a retroceder.
- source_word: נְתָנַנִי שֹׁמֵמָה
  english_pob_choice: he made me desolate
  chosen_spanish: me dejó desolada
  alternatives_spanish:
  - me hizo desolada
  - me abandonó desolada
  - me dejó devastada
  lexicon: HALOT
  rationale: שֹׁמֵמָה denota desolación/devastación. «Me dejó desolada» refleja el estado resultante con fluidez; «devastada» sería posible, pero en este contexto «desolada» mantiene mejor la carga de ruina del lamento.
- source_word: כָּל הַיּוֹם דָּוָה
  english_pob_choice: faint all day long
  chosen_spanish: desfallecida todo el día
  alternatives_spanish:
  - enferma todo el día
  - languideciendo todo el día
  - debilitada todo el día
  lexicon: HALOT
  rationale: דָּוָה puede expresar enfermedad, debilidad o languidez. «Desfallecida» comunica el desgaste físico constante de manera idiomática y solemne, preservando la intensidad del padecimiento.
theological_decisions:
- issue: Sujeto implícito de las acciones de juicio
  english_pob_reading: Render the subject as 'he' throughout without explicitly identifying him in the verse.
  chosen_spanish_reading: Mantener un sujeto implícito en tercera persona, sin nombrarlo en el versículo, mediante verbos que conservan la referencia contextual.
  alternative_spanish_readings:
  - introducir «el Señor»
  - introducir «Yahvé»
  rationale: El hebreo usa verbos en tercera masculina singular y el contexto más amplio identifica al agente del juicio. En este versículo no aparece el nombre divino; por eso el español conserva la referencia tácita sin añadir un sujeto explícito que el texto no dice aquí.
  doctrine_reference: Translation philosophy §1, §3
- issue: Cómo reflejar la fuerza del verbo רדה sin perder la ambigüedad contextual
  english_pob_reading: it prevailed against them
  chosen_spanish_reading: prevaleció contra ellos
  alternative_spanish_readings:
  - los subyugó
  - los dominó
  - los venció
  rationale: El inglés POB revisado decidió «prevailed against them» por precisión semántica. En español, «prevaleció contra ellos» conserva la posibilidad de dominio, subyugación o victoria sin cerrar prematuramente la tensión del verbo.
  doctrine_reference: 'Lexical note: רדה; translation philosophy §2'
- issue: Estado final expresado por שֹׁמֵמָה y דָּוָה
  english_pob_reading: he made me desolate, faint all day long
  chosen_spanish_reading: me dejó desolada, desfallecida todo el día
  alternative_spanish_readings:
  - me dejó devastada, enferma todo el día
  - me dejó desolada, languideciendo todo el día
  rationale: 'El versículo combina ruina/desolación con desgaste corporal continuo. La formulación elegida mantiene ambos polos: devastación del estado y agotamiento prolongado.'
  doctrine_reference: Poetic lament genre; lexicon HALOT
translation_notes:
  revision_awareness: La revisión inglesa más reciente sustituyó «it overcame them» por «it prevailed against them» para precisar רדה. La versión española sigue esa decisión con «prevaleció contra ellos», manteniendo el tono formal y la apertura semántica del verbo. También se conservó la equivalencia poética de los demás miembros sin añadir explicaciones al cuerpo del texto.
  spanish_consistency_notes:
  - Se usa «Yahvé» en el texto principal solo cuando el hebreo lo exige explícitamente; aquí no aparece, por lo que se mantiene la referencia implícita.
  - «Huesos» traduce el hebreo de modo concreto y poético; no se suaviza a «ser interior» o «ser» porque el contexto demanda la imagen corporal.
  - Se mantiene «desolada» para שֹׁמֵמָה por coherencia con el campo semántico de ruina y abandono, típico de las Lamentaciones.
  - «Desfallecida» se eligió por fluidez y solemnidad; la nota conserva «enferma» y «languidecida» como alternativas válidas.
