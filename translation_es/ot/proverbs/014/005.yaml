translation:
  language: es
  text: Un testigo fiel no miente, pero un testigo falso exhala mentiras[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «pronuncia falsedades» por «exhala mentiras». El verbo hebreo presenta el falso testimonio como algo exhalado o derramado.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עֵד
  english_pob_choice: witness
  chosen_spanish: testigo
  alternatives_spanish:
  - testigo presencial
  - testigo que da testimonio
  lexicon: HALOT
  rationale: עֵד designa a quien da testimonio. En español, 'testigo' es el término legal y moral más natural y conserva la fuerza proverbial del verso.
- source_word: אֱמוּנִים
  english_pob_choice: faithful
  chosen_spanish: fiel
  alternatives_spanish:
  - fidedigno
  - confiable
  - fiel y confiable
  lexicon: HALOT
  rationale: El plural intensivo/abstracto modifica 'testigo' con la idea de confiabilidad o fidelidad. 'Fiel' es breve, natural y mantiene el matiz ético.
- source_word: לֹא יְכַזֵּב
  english_pob_choice: does not lie
  chosen_spanish: no miente
  alternatives_spanish:
  - no dice falsedad
  - no engaña
  - no resulta falso
  lexicon: HALOT
  rationale: En este contexto forense, כזב refiere a hablar falsamente. 'No miente' es la forma más clara y directa en español.
- source_word: וְיָפִיחַ
  english_pob_choice: but ... breathes out
  chosen_spanish: pero ... exhala
  alternatives_spanish:
  - pero ... sopla
  - pero ... suelta
  - pero ... vomita
  lexicon: HALOT
  rationale: La conjunción es adversativa por el contraste poético entre los dos hemistiquios. El verbo conserva la imagen física de expulsar el habla; 'exhala' mantiene esa metáfora sin sonar forzado.
- source_word: כְּזָבִים
  english_pob_choice: lies
  chosen_spanish: mentiras
  alternatives_spanish:
  - falsedades
  - engaños
  lexicon: HALOT
  rationale: El plural hebreo apunta a declaraciones falsas repetidas. 'Mentiras' comunica bien el plural y encaja con 'exhala'.
- source_word: עֵד שָׁקֶר
  english_pob_choice: a false witness
  chosen_spanish: un testigo falso
  alternatives_spanish:
  - un testigo mentiroso
  - un testigo falso en su testimonio
  lexicon: HALOT
  rationale: La construcción es una fórmula proverbial para alguien cuyo testimonio no es veraz. 'Testigo falso' es idiomático en español y mantiene el carácter legal del enunciado.
translation_notes:
  revision_awareness: 'El texto hebreo y la auditoría inglesa muestran un paralelismo antitético estable: un testigo fiel no habla falsedad; un testigo falso expulsa/produce mentiras. La versión española conserva el contraste y la metáfora verbal sin suavizarla.'
  spanish_consistency_notes:
  - Se usa 'testigo' para עֵד en ambos cola, por coherencia legal y proverbial.
  - Se mantiene 'fiel/falso' como pares antitéticos directos.
  - '''Exhala mentiras'' preserva la imagen hebrea de speech-as-breath, alineada con la nota inglesa ''breathes out lies''.'
  - No se introduce 'señor' ni otros equivalentes no presentes; el verso no contiene referencias divinas explícitas.
