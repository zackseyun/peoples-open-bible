base_translation:
  language: en
  yaml_path: translation/ot/leviticus/010/003.yaml
  text: 'Then Moses said to Aaron[a], “This is what Yahweh spoke, saying: ‘Among those who come near me I will be sanctified[b], and before all the people I will be glorified.’” And Aaron was silent.'
  footnotes:
  - marker: a
    text: Or, “By those who come near me I will be treated as holy.” The Hebrew can express either God's holiness being manifested or his being regarded as holy by those who approach him.
    reason: alternative_reading
  - marker: b
    text: Or, “I will be honored.”
    reason: lexical_alternative
