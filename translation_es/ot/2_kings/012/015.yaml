translation:
  language: es
  text: porque se lo daban a los que hacían la obra, y con ello reparaban la casa de Yahvé[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: ''la casa de Yahvé''; es decir, el templo de Yahvé.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la explicación causal del versículo anterior. En español, 'porque' expresa con naturalidad esa relación explicativa sin añadir énfasis indebido.
- source_word: לְעֹשֵׂי הַמְּלָאכָה
  english_pob_choice: to those doing the work
  chosen_spanish: a los que hacían la obra
  alternatives_spanish:
  - a los obreros
  - a los que realizaban la obra
  lexicon: HALOT
  rationale: Conserva el participio agentivo del hebreo y evita una especificación de género no obligada por el texto. 'La obra' refleja היטב el sustantivo hebreo en un español bíblico claro.
- source_word: יִתְּנֻהוּ
  english_pob_choice: they gave it
  chosen_spanish: se les daba
  alternatives_spanish:
  - lo daban
  - se lo daban
  lexicon: HALOT
  rationale: El verbo en contexto describe una acción habitual o repetida en pasado. La pasiva refleja impersonal en español comunica bien esa práctica administrativa sin forzar el sujeto explícito.
- source_word: וְחִזְּקוּ
  english_pob_choice: they repaired
  chosen_spanish: reparaban
  alternatives_spanish:
  - fortalecían
  - restauraban
  lexicon: HALOT
  rationale: Aunque el verbo base significa 'fortalecer', en contexto de construcción alude a dejar firme o restaurar una estructura. 'Reparaban' transmite el sentido idiomático señalado por el auditor inglés.
- source_word: בּוֹ
  english_pob_choice: with it
  chosen_spanish: con ello
  alternatives_spanish:
  - con eso
  - con ese dinero
  lexicon: HALOT
  rationale: El pronombre retoma el dinero mencionado en el contexto inmediato. 'Con ello' mantiene la referencia sin explicitar 'dinero' en el texto principal.
- source_word: בֵּית יְהוָה
  english_pob_choice: the house of Yahweh
  chosen_spanish: la casa de Yahvé
  alternatives_spanish:
  - el templo de Yahvé
  - la casa del SEÑOR
  lexicon: HALOT
  rationale: Se conserva la metáfora hebrea 'casa' y el nombre divino YHWH según la norma del proyecto, que prefiere 'Yahvé' en el texto principal. 'Templo' sería una glosa contextual válida, pero menos cercana al giro hebreo.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton. Siguiendo la norma del proyecto, se traduce de forma transparente como 'Yahvé' y no con un título sustitutivo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: Se siguió el pasaje fuente hebreo y el rastro auditado en inglés. No hubo revisiones aplicadas en la última pasada; por eso la redacción mantiene la equivalencia óptima del borrador inglés, ajustada a la norma española del proyecto para YHWH y al valor idiomático de וְחִזְּקוּ en contexto de obra edilicia.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' para יְהוָה conforme a la terminología española del proyecto.
  - '''Casa'' se conservó en el texto principal por fidelidad al hebreo; la nota aclara el equivalente contextual ''templo''.'
  - '''Con ello'' evita añadir una especificación innecesaria y mantiene la referencia al dinero del contexto previo.'
  - El tono es bíblico y publicable sin arcaísmos innecesarios.
