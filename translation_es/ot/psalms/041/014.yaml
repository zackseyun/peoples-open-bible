translation:
  language: es
  text: Bendito sea Yahvé[a], el Dios de Israel, desde la eternidad hasta la eternidad. Amén y amén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «de eternidad en eternidad». La expresión hebrea denota duración sin límites.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּרוּךְ
  english_pob_choice: Blessed be
  chosen_spanish: ¡Bendito sea
  alternatives_spanish:
  - Sea bendito
  - Alabado sea
  lexicon: HALOT
  rationale: En esta doxología, la forma participial funciona como una fórmula litúrgica de bendición. En español, «Bendito sea» conserva ese valor reverente y jussivo sin sonar forzado.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: El texto hebreo usa directamente el Tetragrámaton. El estándar del proyecto en español es «Yahvé», que preserva el nombre divino revelado a Israel en vez de sustituirlo por un título.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - Dios de Israel
  lexicon: HALOT
  rationale: La construcción genitiva es directa. «El Dios de Israel» es la forma natural y fiel en español para este membrete de alabanza.
- source_word: מֵהָעוֹלָם וְעַד הָעוֹלָם
  english_pob_choice: from everlasting to everlasting
  chosen_spanish: desde la eternidad y hasta la eternidad
  alternatives_spanish:
  - de eternidad en eternidad
  - desde siempre y para siempre
  - de siglo en siglo
  lexicon: HALOT
  rationale: En este contexto doxológico, עוֹלָם expresa duración ilimitada. «Desde la eternidad y hasta la eternidad» conserva el sentido total de tiempo sin reducirlo al mero «siempre».
- source_word: אָמֵן וְאָמֵן
  english_pob_choice: Amen and Amen
  chosen_spanish: Amén y amén
  alternatives_spanish:
  - Amén, sí, amén
  - Verdaderamente, amén
  lexicon: HALOT
  rationale: La repetición enfática debe mantenerse. La transliteración «Amén» preserva la fórmula litúrgica de asentimiento congregacional.
theological_decisions:
- issue: Traducción del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  - Jehová
  rationale: La lectura auditada del inglés identifica el Tetragrámaton como nombre propio divino, no como título. En español, «Yahvé» conserva esa decisión teológica y terminológica del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Fórmula de amplitud temporal en la doxología
  english_pob_reading: from everlasting to everlasting
  chosen_spanish_reading: desde la eternidad y hasta la eternidad
  alternative_spanish_readings:
  - para siempre y para siempre
  - de edad en edad
  rationale: La frase hebrea no describe solo continuidad, sino duración sin límites. La opción elegida mantiene la tensión semántica de un tiempo ilimitado sin domesticarla a una expresión más plana.
  doctrine_reference: 'HALOT: עוֹלָם en fórmula doxológica'
translation_notes:
  revision_awareness: 'Coincide con el audit trail inglés: se mantiene la fórmula doxológica, el nombre divino se vierte como Yahvé, y la repetición final de «Amén y amén» se conserva sin simplificación. No se registran revisiones posteriores que alteren la lectura.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה, conforme al criterio del proyecto.
  - Se conserva la cadencia litúrgica con «Amén y amén» sin añadir glosas al cuerpo del versículo.
  - La nota textual refleja la alternativa léxica auditada en inglés sin desplazar el texto principal.
