translation:
  language: es
  text: no come en los montes[a], no alza sus ojos hacia los ídolos[b] de la casa de Israel, no contamina a la esposa de su prójimo, ni se acerca[c] a una mujer durante su impureza menstrual.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «come en los santuarios de los montes»; la expresión alude a comidas sacrificiales en lugares altos.'
    reason: alternative_reading
  - marker: b
    text: El hebreo usa un término fuertemente despectivo para los falsos dioses.
    reason: lexical_alternative
  - marker: c
    text: «Se acerca» es un eufemismo hebreo para relaciones sexuales.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶל־הֶהָרִים ... אָכָל
  english_pob_choice: eat on the mountains
  chosen_spanish: come en los montes
  alternatives_spanish:
  - come en los montes altos
  - come en los santuarios de los montes
  lexicon: HALOT
  rationale: Conservo la imagen hebrea de comer 'en los montes' en vez de explicitar en el texto principal el sentido cultual, para mantener la primacía del original y la tensión interpretativa documentada por la POB inglesa. 'Montes' suena natural en español y preserva el eco profético.
- source_word: וְעֵינָיו לֹא נָשָׂא
  english_pob_choice: does not lift up his eyes
  chosen_spanish: no alza sus ojos
  alternatives_spanish:
  - no mira hacia
  - no pone sus ojos en
  lexicon: HALOT
  rationale: La locución hebrea se mantiene casi de forma equivalente en español, porque conserva el matiz de atención, deseo o reverencia que el contexto activa. 'Alza sus ojos' es una fórmula inteligible y suficientemente literal.
- source_word: גִּלּוּלֵי
  english_pob_choice: idols
  chosen_spanish: los ídolos
  alternatives_spanish:
  - los ídolos despreciables
  - los ídolos inmundos
  lexicon: HALOT
  rationale: Aunque el hebreo usa un término despectivo, en español 'ídolos' comunica con claridad la referencia y permite señalar la carga peyorativa en nota sin sobretraducirla en el cuerpo del texto.
- source_word: בֵּית יִשְׂרָאֵל
  english_pob_choice: the house of Israel
  chosen_spanish: la casa de Israel
  alternatives_spanish:
  - Israel
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Mantengo la expresión profética 'la casa de Israel' para conservar el diccionario conceptual del hebreo y el tono del pasaje. 'Casa' refleja el constructo original mejor que una simplificación a 'Israel'.
- source_word: אֵשֶׁת רֵעֵהוּ
  english_pob_choice: his neighbor’s wife
  chosen_spanish: la esposa de su prójimo
  alternatives_spanish:
  - la esposa de su vecino
  - la mujer de su prójimo
  lexicon: HALOT
  rationale: '''Prójimo'' comunica el valor relacional de רֵעַ sin reducirlo solo a ''vecino''. Es una forma bíblica comprensible en español y adecuada para la ética del pasaje.'
- source_word: לֹא טִמֵּא
  english_pob_choice: does not defile
  chosen_spanish: no deshonra
  alternatives_spanish:
  - no contamina
  - no mancilla
  lexicon: HALOT
  rationale: Aquí opto por 'deshonra' para hacer explícita en español la dimensión sexual/moral de la expresión, que en hebreo usa טמא con fuerza de profanación o contaminación moral. Como el objeto es la esposa del prójimo, 'deshonra' comunica bien el sentido sin perder del todo la gravedad del término.
- source_word: אִשָּׁה נִדָּה
  english_pob_choice: a woman during her menstrual impurity
  chosen_spanish: mujer durante su impureza menstrual
  alternatives_spanish:
  - mujer en su menstruación
  - mujer en su estado de impureza menstrual
  lexicon: HALOT
  rationale: Conservo la categoría ritual con 'impureza menstrual' para no diluir el lenguaje de pureza del hebreo. La formulación es clara en español y mantiene la tensión entre lo ritual y lo moral que la POB inglesa preserva.
- source_word: לֹא יִקְרָב
  english_pob_choice: does not approach
  chosen_spanish: ni se acerca
  alternatives_spanish:
  - ni se aproxima
  - ni llega a
  lexicon: HALOT
  rationale: '''Se acerca'' reproduce con naturalidad el eufemismo hebreo para relaciones sexuales sin explicitarlo en el texto principal. La omisión de un objeto tras ''ni se acerca'' queda compensada por el contexto inmediato y por la nota.'
theological_decisions:
- issue: Cómo tratar la imagen cultual de 'comer en los montes'
  english_pob_reading: Keep the literal phrase 'eat on the mountains' in the main text
  chosen_spanish_reading: Mantener 'come en los montes' en el texto principal
  alternative_spanish_readings:
  - come en los santuarios de los montes
  - participa en comidas sacrificiales en los lugares altos
  rationale: La POB inglesa conserva la imagen literal y aclara el trasfondo cultual con nota. En español hago lo mismo para no resolver la ambigüedad en la traducción principal y para respetar la primacía del hebreo.
  doctrine_reference: 'Translation philosophy: optimal equivalence; original-language primacy.'
- issue: Cómo traducir el lenguaje de pureza y sexualidad
  english_pob_reading: Retain 'defile' and 'menstrual impurity'
  chosen_spanish_reading: Retener 'deshonra' y 'impureza menstrual'
  alternative_spanish_readings:
  - no contamina ... menstruación
  - no mancilla ... estado de impureza
  rationale: La combinación hebrea integra categorías morales y rituales. 'Deshonra' da la fuerza moral/sexual del verbo en este contexto, mientras 'impureza menstrual' conserva el lenguaje ritual. Así no se elimina la tensión teológica del pasaje.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La traducción sigue de cerca la revisión más reciente sin cambios sustanciales; se mantiene la solución auditada por la POB inglesa para las expresiones idiomáticas y el lenguaje de pureza, sin introducir paráfrasis nuevas.
  spanish_consistency_notes:
  - Se mantiene 'la casa de Israel' en coherencia con la terminología profética del proyecto.
  - Se conserva 'ímpureza menstrual' como término de pureza ritual, evitando atenuarlo a 'periodo' o 'regla'.
  - Se usa 'prójimo' para רֵעַ por coherencia con el registro bíblico y la relación ética del pasaje.
  - La nota sobre 'ídolos' conserva la fuerza despectiva sin recargar el texto principal.
