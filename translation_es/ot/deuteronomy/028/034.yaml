translation:
  language: es
  text: Y quedarás enloquecido[a] por lo que tus ojos verán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «Y quedarás loco por la vista de tus ojos, lo que verás».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיִיתָ
  english_pob_choice: And you will be
  chosen_spanish: Y quedarás
  alternatives_spanish:
  - Y serás
  - Y llegarás a estar
  lexicon: WLC/HALOT
  rationale: El hebreo expresa un estado futuro/resultante en una secuencia de maldición. En español, «quedarás» comunica bien el estado en que terminará el destinatario sin sonar forzado, y mantiene el valor resultativo del verbo.
- source_word: מְשֻׁגָּע
  english_pob_choice: driven mad
  chosen_spanish: enloquecido
  alternatives_spanish:
  - loco
  - demente
  - desquiciado
  lexicon: HALOT
  rationale: El término denota ser vuelto loco o estar mentalmente trastornado. «Enloquecido» conserva el matiz de resultado/causación que la POB inglesa expresó con «driven mad», y evita un tono excesivamente coloquial.
- source_word: מִמַּרְאֵה
  english_pob_choice: by the sight
  chosen_spanish: por lo que verán
  alternatives_spanish:
  - por la visión
  - a causa de lo que verás
  lexicon: HALOT
  rationale: La preposición מִן aquí expresa causa. En español, «por» comunica de forma natural la causa del estado, y «lo que verán» integra el contenido de la visión sin una calca pesada de «la vista».
- source_word: עֵינֶיךָ
  english_pob_choice: your eyes
  chosen_spanish: tus ojos
  alternatives_spanish:
  - tus ojos mismos
  - la vista de tus ojos
  lexicon: HALOT
  rationale: Se mantiene la imagen corporal concreta del hebreo. «Tus ojos» es la forma natural en español para preservar la fuerza sensorial del texto.
- source_word: אֲשֶׁר תִּרְאֶה
  english_pob_choice: your eyes see
  chosen_spanish: verán tus ojos
  alternatives_spanish:
  - que verás
  - que tus ojos verán
  lexicon: HALOT
  rationale: La relativa intensifica la repetición del campo semántico de ver. En español, «verán tus ojos» reproduce esa redundancia enfática de manera fluida y fiel al original.
translation_notes:
  revision_awareness: El inglés POB interpreta מְשֻׁגָּע como «driven mad» y conserva la reiteración visual con «your eyes see». La versión española sigue esa lectura dinámica, manteniendo la causalidad de מִן y la repetición de ver, sin introducir cambios textuales ni doctrinales.
  spanish_consistency_notes:
  - Se prefirió «enloquecido» sobre «loco» para conservar el matiz resultativo y evitar una lectura meramente adjetival.
  - Se usó «tus ojos» en lugar de una perífrasis abstracta para mantener la concreción sensorial del hebreo.
  - La nota al pie recoge la alternativa más formal, equivalente a la nota inglesa, para preservar la tensión léxica entre un giro más natural y uno más literal.
