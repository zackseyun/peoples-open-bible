base_translation:
  language: en
  yaml_path: translation/ot/2_kings/020/003.yaml
  text: “Please[a], O Yahweh, remember, I pray, how I have walked before you in faithfulness and with a whole heart[b], and have done what is good in your eyes.” And Hezekiah wept bitterly.
  footnotes:
