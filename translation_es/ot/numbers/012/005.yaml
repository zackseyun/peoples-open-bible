base_translation:
  language: en
  yaml_path: translation/ot/numbers/012/005.yaml
  text: Then Yahweh came down in a pillar of cloud and stood at the entrance of the tent[a], and he called Aaron and Miriam[b], and both of them came forward.
  footnotes:
  - marker: a
    text: Or 'the two of them went out' / 'both of them came out.' The Hebrew verb is literally 'went out,' but here it likely means they stepped forward in response to the LORD's call.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the tent'; context refers to the tent of meeting.
    reason: cross_reference
