translation:
  language: es
  text: Ahora, pues, te confirmo todas las remisiones[b] que los reyes antes de mí te concedieron, y cualesquiera otras remisiones te concedieron[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego transmitido termina con un verbo singular tras el sujeto plural «los reyes antes de mí». La traducción española adopta la concordancia natural en plural, mientras esta nota conserva la observación textual.
    reason: textual_variant
  - marker: b
    text: «Remisiones» se refiere aquí a concesiones o reducciones fiscales reales, no necesariamente a una exención total de todas las obligaciones.
    reason: cultural_note
lexical_decisions:
- source_word: νῦν οὖν
  english_pob_choice: Now therefore
  chosen_spanish: Ahora, pues
  alternatives_spanish:
  - Por tanto, ahora
  - Así que ahora
  lexicon: LSJ
  rationale: Conserva el valor inferencial y transicional de la doble partícula con una fórmula natural en español administrativo.
- source_word: ἵστημί
  english_pob_choice: I confirm
  chosen_spanish: te confirmo
  alternatives_spanish:
  - te establezco
  - lo ratifico para ti
  lexicon: LSJ
  rationale: En este contexto real y jurídico, el verbo expresa poner en vigor o ratificar una concesión; «confirmo» comunica esa validez legal con naturalidad.
- source_word: σοι
  english_pob_choice: for you
  chosen_spanish: te
  alternatives_spanish:
  - para ti
  - a ti
  lexicon: LSJ
  rationale: El dativo de beneficio se expresa de forma más natural en español con pronombre clítico en esta construcción.
- source_word: πάντα τὰ ἀφαιρέματα
  english_pob_choice: all the remissions
  chosen_spanish: todas las remisiones
  alternatives_spanish:
  - todas las exenciones
  - todas las rebajas fiscales
  lexicon: LSJ
  rationale: «Remisiones» conserva el sentido amplio de concesiones o reducciones de cargas sin restringir indebidamente el alcance a una sola clase de obligación.
- source_word: ἃ ἀφῆκάν σοι
  english_pob_choice: that ... granted you
  chosen_spanish: que los reyes antes de mí te concedieron
  alternatives_spanish:
  - que los reyes anteriores te remitieron
  - que los reyes antes de mí te dispensaron
  lexicon: LSJ
  rationale: «Concedieron» refleja bien el valor de ἀφίημι en un marco fiscal-administrativo, y evita una repetición poco natural de «remisiones» en español.
- source_word: οἱ πρὸ ἐμοῦ βασιλεῖς
  english_pob_choice: the kings before me
  chosen_spanish: los reyes antes de mí
  alternatives_spanish:
  - los reyes anteriores a mí
  - los reyes previos a mí
  lexicon: LSJ
  rationale: Es una correspondencia directa y clara del sintagma temporal en un contexto de sucesión real.
- source_word: καὶ ὅσα ἄλλα ἀφαιρέματα
  english_pob_choice: and whatever other remissions
  chosen_spanish: y cuantas otras remisiones
  alternatives_spanish:
  - y cualesquiera otras remisiones
  - y todo otro tipo de remisiones
  lexicon: LSJ
  rationale: «Cuantas otras» mantiene el alcance abierto del griego ὅσα ἄλλα sin sobreespecificar la clase de concesiones.
- source_word: ἀφῆκέν σοι
  english_pob_choice: they granted you
  chosen_spanish: te concedieron
  alternatives_spanish:
  - te remitieron
  - te dieron
  lexicon: LSJ
  rationale: Aunque el griego transmitido presenta un verbo singular tras un sujeto plural, el español requiere concordancia natural; el sentido sigue siendo el de una concesión previa.
theological_decisions:
- issue: Naturaleza de ἀφαιρέματα en un decreto real
  english_pob_reading: Royal fiscal concessions or reductions in dues, not necessarily complete exemption from all obligations.
  chosen_spanish_reading: Remisiones fiscales o reducciones de cargas, no necesariamente exención total de toda obligación.
  alternative_spanish_readings:
  - exenciones completas
  - condonaciones totales
  rationale: La palabra española «remisiones» puede sonar general; por eso se preserva en el texto y se aclara en la nota que no implica necesariamente liberación total, sino una reducción o condonación de cargas.
  doctrine_reference: Nota cultural-histórica; no doctrinal
- issue: Forma singular del verbo final en el texto griego
  english_pob_reading: The transmitted wording may preserve a singular verb after a plural subject; some readers may expect 'they granted you.'
  chosen_spanish_reading: Se conserva en la traducción el sentido plural natural («te concedieron»), mientras la nota señala la peculiaridad del griego transmitido.
  alternative_spanish_readings:
  - te concedió
  - te concedieron
  rationale: El español exige una solución fluida; la nota mantiene la tensión textual del testimonio griego sin imponer una lectura artificial en la línea principal.
  doctrine_reference: Cuestión textual
translation_notes:
  revision_awareness: El texto griego de Swete presenta un sujeto plural («los reyes antes de mí») con un verbo final singular («concedió»/ἀφῆκέν). El audit trail inglés corrigió provisionalmente a plural por concordancia; la presente versión española mantiene una concordancia natural en la línea principal y conserva la observación textual en nota. También se preserva el sentido administrativo de ἀφαιρέματα sin estrecharlo a una sola clase de tributo.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto lo requiera; aquí no aparece el nombre divino.
  - «Remisiones» se mantiene como término técnico-administrativo coherente con el POB inglés.
  - «Conceder» se prefirió sobre «remitir» para evitar repetición y porque en español comunica mejor la validez de una concesión real sin perder el sentido fiscal.
