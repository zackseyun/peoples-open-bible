    issue: 'Registro pronominal no neutral: «Vosotros trastornáis todo»'
    rationale: El proyecto pide español neutral latinoamericano / ampliamente legible. «Vosotros/trastornáis» introduce un registro marcadamente peninsular y menos apto como texto principal.
  - severity: medium
    issue: La nota [a] no refleja bien la alternativa más literal documentada
    rationale: El POB inglés registra como alternativa literal algo como «Your turning of things upside down!», además de «Your perversity!». La nota española actual repite casi la traducción principal y no preserva la opción nominal/literal.
  - severity: low
    issue: «No entiende» atenúa el matiz de «has no understanding»
    rationale: Aunque no es incorrecto, «no tiene entendimiento» reproduce mejor la acusación del hebreo/POB y su peso sapiencial.
