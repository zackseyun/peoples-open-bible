translation:
  language: es
  text: 'Entonces Moisés y Aarón fueron ante el faraón y le dijeron: «Así dice Yahvé, el Dios de los hebreos: ¿Hasta cuándo te negarás a humillarte[a] delante de mí? Deja ir a mi pueblo[b], para que me sirvan[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a someterte». El verbo hebreo puede indicar humillarse o someterse ante Dios.
    reason: lexical_alternative
  - marker: b
    text: O «Suelta a mi pueblo». El verbo hebreo también puede expresarse como liberar o dejar libre, pero «deja ir» reproduce bien la fórmula del Éxodo.
    reason: lexical_alternative
  - marker: c
    text: O «me adoren». El verbo hebreo incluye servicio cultual; «servir» conserva esa amplitud sin estrechar el sentido.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא
  english_pob_choice: went in
  chosen_spanish: fueron ante
  alternatives_spanish:
  - entraron ante
  - se presentaron ante
  lexicon: HALOT
  rationale: En español, la idea de acercarse a la presencia del faraón se expresa naturalmente con una fórmula de audiencia. «Fueron ante» conserva el matiz de acceso cortesano sin sonar forzado.
- source_word: וַיֹּאמְרוּ אֵלָיו
  english_pob_choice: said to him
  chosen_spanish: le dijeron
  alternatives_spanish:
  - le hablaron
  - dijeron
  lexicon: HALOT
  rationale: La construcción de habla directa se transmite de forma normal con «le dijeron», que mantiene el destinatario explícito y el registro narrativo.
- source_word: כֹּה אָמַר
  english_pob_choice: Thus says
  chosen_spanish: Así dice
  alternatives_spanish:
  - Así ha dicho
  - Esto dice
  lexicon: HALOT
  rationale: La fórmula profética se expresa mejor en presente en español. «Así dice» conserva la fuerza inmediata del mensajero divino.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se sigue la decisión terminológica del POB de no ocultar el nombre divino. En español, «Yahvé» es la forma publicada y legible que corresponde al mismo transliterado reverencial del Tetragrámaton.
- source_word: אֱלֹהֵי הָעִבְרִים
  english_pob_choice: the God of the Hebrews
  chosen_spanish: el Dios de los hebreos
  alternatives_spanish:
  - el Dios de los hebreos
  lexicon: HALOT
  rationale: Es la identificación étnico-covenantal estándar y clara en español; «los hebreos» conserva el referente histórico del texto.
- source_word: עַד מָתַי
  english_pob_choice: How long
  chosen_spanish: ¿Hasta cuándo
  alternatives_spanish:
  - ¿Por cuánto tiempo?
  - ¿Hasta cuándo será?
  lexicon: HALOT
  rationale: La fórmula idiomática se reproduce con la pregunta española natural «¿Hasta cuándo», que conserva el tono de reproche y límite temporal.
- source_word: מֵאַנְתָּ
  english_pob_choice: will you refuse
  chosen_spanish: te negarás
  alternatives_spanish:
  - rehusarás
  - te resistirás a
  lexicon: HALOT
  rationale: El verbo expresa negativa persistente ante la demanda divina. «Te negarás» comunica la resistencia obstinada de forma idiomática en español sin perder el valor de rechazo.
- source_word: לֵעָנֹת
  english_pob_choice: to humble yourself
  chosen_spanish: a humillarte
  alternatives_spanish:
  - a someterte
  - a abajarte
  lexicon: HALOT
  rationale: La forma refleja la postura de abatirse delante de Dios. «Humillarte» reproduce bien la dimensión reflexiva de la acción y evita un sentido excesivamente técnico.
- source_word: מִפָּנַי
  english_pob_choice: before me
  chosen_spanish: delante de mí
  alternatives_spanish:
  - en mi presencia
  - ante mí
  lexicon: HALOT
  rationale: «Delante de mí» mantiene el valor espacial-relacional de la expresión hebrea y su tono confrontativo.
- source_word: שַׁלַּח
  english_pob_choice: Let ... go
  chosen_spanish: Deja ir
  alternatives_spanish:
  - Suelta
  - Libera
  lexicon: HALOT
  rationale: 'La demanda del Éxodo se vuelve en español con una orden directa y establecida: «Deja ir». Preserva el carácter imperativo sin recurrir a una paráfrasis más amplia.'
- source_word: עַמִּי
  english_pob_choice: my people
  chosen_spanish: mi pueblo
  alternatives_spanish:
  - mi gente
  lexicon: HALOT
  rationale: «Mi pueblo» expresa mejor la relación de pertenencia y pacto que el texto subraya.
- source_word: וְיַעַבְדֻנִי
  english_pob_choice: so that they may serve me
  chosen_spanish: para que me sirva
  alternatives_spanish:
  - para que me sirvan
  - para que me adoren
  lexicon: HALOT
  rationale: Se conserva el sentido amplio de servicio cultual con «sirva», manteniendo la ambigüedad lexical del hebreo entre servicio y adoración sin cerrarla prematuramente a «adoren».
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: La traducción española debe reflejar el nombre propio divino, no sustituirlo por un título. «Yahvé» comunica la misma decisión teológica y textual que el POB inglés.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sentido de וְיַעַבְדֻנִי
  english_pob_reading: so that they may serve me
  chosen_spanish_reading: para que me sirva
  alternative_spanish_readings:
  - para que me adoren
  - para que me rindan culto
  rationale: El hebreo עבד abarca servicio y servicio cultual. «Servir» preserva el alcance más amplio y evita reducir el mandamiento a una sola noción litúrgica.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
translation_notes:
  revision_awareness: 'Coincide con la última pasada de revisión: no se requirieron cambios sustantivos respecto del texto base. Se mantuvo la decisión auditada de conservar el nombre divino como transliteración y de traducir עבד con un verbo amplio de servicio.'
  spanish_consistency_notes:
  - Se mantiene la terminología POB para el Tetragrámaton como «Yahvé» en español.
  - Se conserva la fórmula del Éxodo con «Deja ir a mi pueblo» para alinearla con el patrón narrativo del libro.
  - El tratamiento de עבד se dejó en «servir» para no estrechar el campo semántico a adoración exclusivamente.
  - El registro es neutral y bíblico, evitando arcaísmos innecesarios pero respetando la solemnidad del texto.
