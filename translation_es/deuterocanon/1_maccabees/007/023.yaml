translation:
  language: es
  text: Y Judas vio toda la maldad que Alcimo y los que estaban con él habían hecho entre los hijos de Israel[a], aun más que las naciones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «incluso más que las naciones». La frase griega expresa que la maldad de Alcimo y sus aliados superó la de los pueblos circundantes.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἴδεν
  english_pob_choice: saw
  chosen_spanish: vio
  alternatives_spanish:
  - observó
  - percibió
  lexicon: LSJ
  rationale: El aoristo narrativo de ὁράω se vierte naturalmente con «vio». En español mantiene la acción de percepción y descubrimiento sin añadir matiz interpretativo excesivo.
- source_word: ἅπαν τὴν κακίαν
  english_pob_choice: all the evil
  chosen_spanish: toda la maldad
  alternatives_spanish:
  - todo el mal
  - toda la perversidad
  lexicon: LSJ
  rationale: «Maldad» conserva el valor moral de κακία y «toda» refleja ἅπαν. «Evil» en español sería posible, pero «maldad» es más natural y bíblicamente claro.
- source_word: ἐποίησεν
  english_pob_choice: had done
  chosen_spanish: habían hecho
  alternatives_spanish:
  - hicieron
  - habían cometido
  lexicon: LSJ
  rationale: El pluscuamperfecto español expresa bien que esas acciones ya estaban consumadas cuando Judas las vio, siguiendo el flujo narrativo del inglés POB.
- source_word: οἱ μετ’ αὐτοῦ
  english_pob_choice: those with him
  chosen_spanish: los que estaban con él
  alternatives_spanish:
  - sus compañeros
  - los que iban con él
  lexicon: LSJ
  rationale: La frase española mantiene el sentido idiomático del grupo asociado a Alcimo. «Los que estaban con él» es transparente y no sobreinterpreta la relación.
- source_word: ἐν υἱοῖς Ἰσραήλ
  english_pob_choice: among the sons of Israel
  chosen_spanish: entre los hijos de Israel
  alternatives_spanish:
  - entre los hijos de Israel
  - entre los israelitas
  lexicon: LSJ
  rationale: «Entre» preserva el valor locativo/situacional de ἐν con personas. «Hijos de Israel» conserva la expresión filial del griego y su resonancia pactual.
- source_word: ὑπὲρ τὰ ἔθνη
  english_pob_choice: beyond even the nations
  chosen_spanish: más allá aun de las naciones
  alternatives_spanish:
  - más que las naciones
  - más allá de los gentiles
  lexicon: LSJ
  rationale: ὑπέρ expresa excedencia o superior grado. «Más allá aun de las naciones» conserva el golpe retórico del contraste; «aun» refuerza el sentido comparativo de exceder incluso a las naciones.
theological_decisions:
- issue: ἅπαν τὴν κακίαν como evaluación moral total
  english_pob_reading: all the evil
  chosen_spanish_reading: toda la maldad
  alternative_spanish_readings:
  - todo el mal
  - toda la perversidad
  rationale: La formulación mantiene la censura moral plena sin diluir el juicio del texto. «Maldad» es una equivalencia estable para κακία en este contexto narrativo y polémico.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1
- issue: υἱοῖς Ἰσραήλ como expresión filial concreta
  english_pob_reading: among the sons of Israel
  chosen_spanish_reading: entre los hijos de Israel
  alternative_spanish_readings:
  - entre el pueblo de Israel
  - entre los israelitas
  rationale: Se conserva la forma explícitamente filial del griego, evitando una generalización que borre la tensión entre la fórmula heredada y una paráfrasis más abstracta.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: τὰ ἔθνη en contraste con Israel
  english_pob_reading: the nations
  chosen_spanish_reading: las naciones
  alternative_spanish_readings:
  - los gentiles
  rationale: En este contexto judío deuterocanónico, «las naciones» es una versión directa y transparente. Mantiene el contraste con Israel sin introducir terminología más eclesiástica o tradicional de manera innecesaria.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1
translation_notes:
  revision_awareness: El texto griego y el rastro auditado en inglés coinciden de forma alta; no se requirieron revisiones sustantivas. La versión española sigue de cerca las decisiones léxicas del POB, ajustando solo la naturalidad del español sin perder la fuerza comparativa de ὑπὲρ τὰ ἔθνη.
  spanish_consistency_notes:
  - Se preserva «hijos de Israel» por fidelidad formal al griego y coherencia con la filosofía de traducción del proyecto.
  - Se usa «las naciones» en lugar de «los gentiles» como opción principal, dejando la equivalencia alternativa en nota.
  - El orden sintáctico español sigue la narrativa del original sin calco excesivo, pero mantiene la relación entre la visión de Judas y la acción previa de Alcimo.
