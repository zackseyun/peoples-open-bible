translation:
  language: es
  text: Anduvo en el camino de la casa de Ahab y hizo lo que era malo ante Yahvé, como la casa de Ahab, porque era yerno[a] de la casa de Ahab.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, “relacionado por matrimonio con la casa de Ahab”. El término hebreo puede denotar una relación matrimonial más amplia, aunque “yerno” es aquí la opción más específica.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלֶךְ
  english_pob_choice: He walked
  chosen_spanish: Anduvo
  alternatives_spanish:
  - Fue
  - Caminó
  - Siguió
  lexicon: HALOT
  rationale: הלך expresa movimiento, pero en la construcción 'andar/caminar en el camino de' comunica mejor la conducta o manera de vivir. 'Anduvo' conserva la imagen de conducta sin sonar forzado en español.
- source_word: בְּדֶרֶךְ
  english_pob_choice: in the way of
  chosen_spanish: en el camino de
  alternatives_spanish:
  - en la senda de
  - según la manera de
  - siguiendo el camino de
  lexicon: HALOT
  rationale: דֶּרֶךְ aquí es un modismo de conducta. 'En el camino de' mantiene la metáfora bíblica y es natural en español.
- source_word: בֵּית אַחְאָב
  english_pob_choice: the house of Ahab
  chosen_spanish: la casa de Ahab
  alternatives_spanish:
  - la familia de Ahab
  - la dinastía de Ahab
  lexicon: HALOT
  rationale: בַּיִת con nombre אישי denota casa/familia real o dinastía. 'Casa de Ahab' preserva el idiomatismo bíblico y el posible alcance dinástico.
- source_word: וַיַּעַשׂ הָרַע
  english_pob_choice: did what was evil
  chosen_spanish: hizo lo malo
  alternatives_spanish:
  - hizo el mal
  - obró perversamente
  - hizo lo que era malo
  lexicon: HALOT
  rationale: La fórmula evaluativa de Reyes se expresa de forma compacta en español como 'hizo lo malo'. Mantiene el juicio moral sin añadir matices no presentes en el hebreo.
- source_word: בְּעֵינֵי יְהוָה
  english_pob_choice: in the sight of Yahweh
  chosen_spanish: ante Yahvé
  alternatives_spanish:
  - a los ojos de Yahvé
  - en la presencia de Yahvé
  - en la vista de Yahvé
  lexicon: HALOT
  rationale: El hebreo literalmente dice 'en los ojos de'. 'Ante Yahvé' comunica la evaluación divina de manera breve y solemne en español, sin ocultar el nombre divino por convención litúrgica.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se sigue el default del proyecto para el Nombre divino. 'Yahvé' preserva la identidad del Tetragrámaton sin sustitución por un título.
- source_word: כְּבֵית אַחְאָב
  english_pob_choice: like the house of Ahab
  chosen_spanish: como la casa de Ahab
  alternatives_spanish:
  - igual que la casa de Ahab
  - a la manera de la casa de Ahab
  lexicon: HALOT
  rationale: El prefijo comparativo כְּ pide una equivalencia o similitud. 'Como la casa de Ahab' reproduce la comparación de manera directa y clara.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  - porque es que
  lexicon: HALOT
  rationale: Aquí introduce la razón del juicio anterior. 'Porque' funciona naturalmente en español y expresa la causalidad del hebreo.
- source_word: חֲתַן
  english_pob_choice: a son-in-law
  chosen_spanish: yerno
  alternatives_spanish:
  - pariente por matrimonio
  - consuegro
  - cuñado
  lexicon: HALOT
  rationale: Aunque el término hebreo puede abarcar relación por matrimonio, el contexto histórico concreto apunta al vínculo de yerno. En español, 'yerno' es la opción más precisa y natural.
- source_word: הוּא
  english_pob_choice: he was
  chosen_spanish: era
  alternatives_spanish:
  - fue
  - él era
  lexicon: HALOT
  rationale: El pronombre copulativo se integra de forma fluida en español con 'era'. Mantiene el valor explicativo del cierre causal sin recargar la frase.
theological_decisions:
- issue: Renderización del Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton. Siguiendo la norma del proyecto, se preserva el Nombre propio con 'Yahvé' en lugar de sustituirlo por un título, manteniendo la referencia covenantal.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor semántico de חֲתַן
  english_pob_reading: a son-in-law / related by marriage
  chosen_spanish_reading: yerno
  alternative_spanish_readings:
  - pariente por matrimonio
  - relacionado por matrimonio
  rationale: La nota inglesa reconoce una amplitud semántica, pero aquí el contexto del relato favorece una relación masculina específica dentro de la familia de Ahab. 'Yerno' conserva esa precisión sin negar la posible amplitud del término.
  doctrine_reference: 'DOCTRINE.md: Lexical restraint — preserve documented ambiguity only where context warrants it'
translation_notes:
  revision_awareness: El audit trail inglés no muestra cambios en la última pasada y el veredicto de revisión es de alta concordancia; por eso no se introducen ajustes textuales más allá de la adaptación española necesaria y la resolución contextual de חֲתַן como 'yerno'.
  spanish_consistency_notes:
  - Se mantiene 'Ahab' como nombre propio, conforme al texto fuente y al uso bíblico habitual en español.
  - Se usa 'Yahvé' para el Tetragrámaton, coherente con el estándar del proyecto.
  - La formulación 'hizo lo malo ante Yahvé' preserva el juicio moral sin suavizarlo a una mera descripción conductual.
  - '''Casa de Ahab'' conserva el valor dinástico y familiar del hebreo בֵּית.'
  - La puntuación y el orden siguen un español bíblico moderno, con sintaxis clara y lectura pública.
