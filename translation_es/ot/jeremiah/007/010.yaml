review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido general del hebreo: secuencia acusatoria vívida en presente, «esta casa», la ironía de «somos librados», y «todas estas abominaciones». Sin embargo, hay un desajuste importante de número gramatical: el hebreo usa 2mp/1cp («ustedes vienen… ustedes dicen… somos librados… para hacer»), mientras el español alterna singular («vienes… te pones… dices… hagas») con plural implícito en «somos». Eso distorsiona la referencia del sujeto colectivo del reproche.'
  spanish_quality_summary: El español es claro y legible, pero la mezcla singular/plural suena inconsistente y menos natural en un discurso profético dirigido a un grupo. «Que lleva mi nombre» es idiomático, aunque «sobre la cual es invocado mi nombre» o «que es llamada por mi nombre» sería más cercano; no obstante, no exige corrección. «Somos librados» es entendible pero algo poco idiomático; «Hemos sido librados» sería más natural, aunque el proyecto prioriza cercanía a «We are delivered!». La reparación necesaria es principalmente de concordancia.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Casa» preserva correctamente בַּיִת frente a «templo» como nota alternativa. «Abominaciones» refleja bien תּוֹעֵבוֹת. La ausencia de «Yahvé» no es problema porque el nombre divino no aparece en este versículo. La elección «librados» concuerda con la rationale inglesa de evitar sobrecargar con «salvados».
  issues:
  - severity: high
    issue: Inconsistencia de número gramatical en los verbos dirigidos al oyente
    rationale: 'El hebreo tiene segunda persona plural a lo largo de la acusación (וּבָאתֶם, וַעֲמַדְתֶּם, וַאֲמַרְתֶּם), pero el borrador usa singular: «vienes», «te pones», «dices», «hagas». Esto altera el referente colectivo del discurso y debe corregirse a plural.'
  - severity: low
    issue: «Somos librados» es menos idiomático en español actual
    rationale: Aunque es defendible por cercanía formal con la decisión inglesa «We are delivered!», en español suena algo rígido. Aun así, no es un error de fidelidad; puede mantenerse si se prioriza la línea lexical del proyecto.
  revised_spanish_text: 'Entonces vienen y se ponen delante de mí en esta casa[a], que lleva mi nombre, y dicen[b]: «¡Somos librados!»; para que hagan todas estas abominaciones.'
  revised_footnotes:
  - marker: a
    text: 'O, «este templo». Hebreo: «esta casa».'
    reason: lexical_alternative
  - marker: b
    text: O, «¡Somos salvados!» o «¡Estamos a salvo!»
    reason: lexical_alternative
  revision_rationale: Se corrigieron los verbos de singular a plural para reflejar con fidelidad la segunda persona plural del hebreo y la acusación dirigida al grupo. Se mantuvieron «casa», «lleva mi nombre», «somos librados» y «abominaciones» porque preservan adecuadamente las decisiones léxicas y teológicas documentadas en la auditoría inglesa.
