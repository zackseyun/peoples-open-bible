revisions:
- from: Estas eran las ciudades designadas[a] para todos los hijos de Israel y para el forastero[b] que habitaba entre ellos, para que pudiera huir allí todo el que hiriera a una persona sin intención, y no muriera a manos del vengador de sangre hasta presentarse delante de la congregación[c].
  to: Estas eran las ciudades designadas[a] para todos los hijos de Israel[b] y para el residente extranjero[c] que habitaba entre ellos, para que pudiera huir allí todo el que matara a una persona sin intención, y no muriera a manos del vengador de sangre hasta presentarse delante de la congregación[d].
  rationale: 'La revisión hace dos correcciones principales para ajustarse mejor al hebreo y a la auditoría inglesa: cambia «forastero» por «residente extranjero» para preservar la categoría legal de גֵּר, y cambia «hiriera a una persona» por «matara a una persona» para reflejar con claridad el sentido legal del contexto de ciudades de refugio. También añade la nota idiomática para «hijos de Israel» que el English POB documentó.'
