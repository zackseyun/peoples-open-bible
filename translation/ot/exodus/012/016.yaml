id: EXO.12.16
reference: Exodus 12:16
source:
  edition: WLC
  text: וּ/בַ/יּ֤וֹם הָ/רִאשׁוֹן֙ מִקְרָא קֹ֔דֶשׁ וּ/בַ/יּוֹם֙ הַ/שְּׁבִיעִ֔י מִקְרָא קֹ֖דֶשׁ יִהְיֶ֣ה לָ/כֶ֑ם כָּל מְלָאכָה֙ לֹא יֵעָשֶׂ֣ה בָ/הֶ֔ם אַ֚ךְ אֲשֶׁ֣ר יֵאָכֵ֣ל לְ/כָל נֶ֔פֶשׁ ה֥וּא לְ/בַדּ֖/וֹ יֵעָשֶׂ֥ה לָ/כֶֽם־־־־־׃
translation:
  text: On the first day there shall be a holy assembly for you[a], and on the seventh day a holy assembly. No work shall be done on them[c][b], except what every person must eat—that alone may be prepared for you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a sacred assembly' or traditionally 'a holy convocation.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'for every nephesh,' that is, for every person; not specifically 'soul' in the modern English sense.
    reason: lexical_alternative
  - marker: c
    text: Literally 'it alone shall be done for you'; the sense is that only food preparation necessary for eating is permitted on those days.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִקְרָא קֹדֶשׁ
  chosen: holy assembly
  alternatives:
  - sacred assembly
  - holy convocation
  lexicon: HALOT
  rationale: The phrase denotes a summoned sacred gathering. 'Holy assembly' is clear modern English and preserves both the convocational and consecrated sense without archaic church language. 'Holy convocation' is more traditional but less accessible.
- source_word: יִהְיֶה לָכֶם
  chosen: there shall be ... for you
  alternatives:
  - shall be to you
  - you shall have
  lexicon: HALOT
  rationale: This preserves the existential force of היה with the dative while producing natural English. 'For you' keeps the covenantal/addressee nuance better than simply 'you shall have.'
- source_word: כָּל מְלָאכָה
  chosen: No kind of work
  alternatives:
  - no work at all
  - no occupational work
  - no labor
  lexicon: HALOT
  rationale: מְלָאכָה commonly refers to work/labor broadly in cultic and sabbath contexts. 'No kind of work' reflects כָּל and avoids over-specifying the category while sounding natural in English.
- source_word: לֹא יֵעָשֶׂה בָהֶם
  chosen: shall be done on them
  alternatives:
  - shall not be done in them
  - shall not be done during those days
  lexicon: HALOT
  rationale: The passive Niphal is preserved. The preposition with plural suffix refers to the days just mentioned; 'on them' is a fairly literal rendering, with temporal sense clear from context.
- source_word: אַךְ
  chosen: except
  alternatives:
  - only
  - however
  lexicon: HALOT
  rationale: Here אַךְ introduces an exception to the prohibition. 'Except' communicates that function more directly than the more wooden 'only'.
- source_word: אֲשֶׁר יֵאָכֵל לְכָל נֶפֶשׁ
  chosen: what every person must eat
  alternatives:
  - what is eaten by every person
  - what everyone will eat
  - food for every person
  lexicon: HALOT
  rationale: נֶפֶשׁ here means a person/life, not 'soul' in a dualistic sense. The clause refers to food needed for consumption. 'Every person' is the clearest idiomatic rendering; 'must eat' brings out the practical necessity implied in the festival-law context.
- source_word: נֶפֶשׁ
  chosen: person
  alternatives:
  - soul
  - life
  lexicon: HALOT
  rationale: In this legal context נֶפֶשׁ refers to an individual person. Rendering it 'soul' would mislead modern readers into hearing a metaphysical distinction absent from the Hebrew.
- source_word: הוּא לְבַדּוֹ
  chosen: that alone
  alternatives:
  - it alone
  - that only
  lexicon: HALOT
  rationale: The pronoun plus לבד emphasizes exclusivity. 'That alone' is concise and idiomatic, clearly marking the sole exception.
- source_word: יֵעָשֶׂה לָכֶם
  chosen: may be prepared by you
  alternatives:
  - shall be done for you
  - may be done for you
  lexicon: HALOT
  rationale: Although the verb is simply 'be done/made,' in context it refers specifically to food preparation. Rendering it 'prepared' makes the implied object explicit in natural English without adding content beyond the legal exception already stated.
