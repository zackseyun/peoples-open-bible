translation:
  language: es
  text: Por causa del invierno[a], el perezoso no ara; en la cosecha busca[b], y no hay nada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «En invierno». La preposición hebrea puede entenderse de modo temporal («en invierno») o causal («por causa del invierno»).'
    reason: lexical_alternative
  - marker: b
    text: 'O: «pregunta en la cosecha». El verbo hebreo puede significar «preguntar» o, por implicación aquí, «buscar» o «pedir» alimento o producción cuando llega la cosecha.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מֵחֹרֶף
  english_pob_choice: Because of winter
  chosen_spanish: Por causa del invierno
  alternatives_spanish:
  - En invierno
  - Desde el invierno
  - A causa del invierno
  lexicon: HALOT
  rationale: La preposición מִן con חֹרֶף puede expresar causa o motivo, no solo ubicación temporal. En español, «por causa del invierno» mantiene ese matiz causal sin sonar forzado, y conserva la idea de que el invierno funciona como pretexto o impedimento para arar.
- source_word: עָצֵל
  english_pob_choice: the lazy man
  chosen_spanish: el perezoso
  alternatives_spanish:
  - el hombre perezoso
  - el holgazán
  - el indolente
  lexicon: HALOT
  rationale: Es el término sapiencial para la persona habitualmente perezosa. «El perezoso» es natural en español, conserva el singular representativo y evita añadir un sustantivo innecesario.
- source_word: לֹא יַחֲרֹשׁ
  english_pob_choice: does not plow
  chosen_spanish: no ara
  alternatives_spanish:
  - no labra
  - no cultiva
  - no va a arar
  lexicon: HALOT
  rationale: חרשׁ aquí se refiere al arado agrícola. «No ara» es breve, proverbial y preciso. «Labra» sería posible, pero puede sonar más amplio; «cultiva» diluye la especificidad del verbo.
- source_word: ישאל
  english_pob_choice: he seeks
  chosen_spanish: busca
  alternatives_spanish:
  - pregunta
  - pide
  - busca cosecha
  lexicon: HALOT
  rationale: Aunque שׁאל normalmente puede significar «preguntar», en este contexto la omisión del objeto y el paralelo con «no hay nada» favorecen la idea de buscar o reclamar lo que necesita en la cosecha. «Busca» conserva esa apertura y suena natural en español.
- source_word: בַּקָּצִיר
  english_pob_choice: at harvest
  chosen_spanish: a la cosecha
  alternatives_spanish:
  - en la cosecha
  - en tiempo de cosecha
  - durante la cosecha
  lexicon: HALOT
  rationale: La expresión marca el momento en que aparece la consecuencia. «A la cosecha» reproduce bien el valor temporal de la escena proverbial y resulta idiomático en español.
- source_word: וָאָיִן
  english_pob_choice: and there is nothing
  chosen_spanish: y no hay nada
  alternatives_spanish:
  - y no hay nada en absoluto
  - y no tiene nada
  - y no hay
  lexicon: HALOT
  rationale: אָיִן expresa negación existencial. «No hay nada» preserva la concisión hebrea y deja implícito el objeto, como en el original.
translation_notes:
  revision_awareness: 'Revisado a la luz del texto hebreo WLC y del rastro auditado en inglés: se mantuvo la ambigüedad temporal/causal de מֵחֹרֶף y la de ישאל entre «preguntar» y «buscar», optando por soluciones españolas que son fieles, idiomáticas y proverbiales.'
  spanish_consistency_notes:
  - Se prefirió «Yahvé» solo cuando corresponda a יהוה; este verso no lo contiene.
  - Se usó «perezoso» como equivalente natural del término sapiencial עָצֵל, sin forzar «holgazán» o «sluggard».
  - «No ara» conserva el sentido agrícola específico de חרשׁ en lugar de un término más general como «cultiva».
  - La puntuación reproduce el paralelismo breve del proverbio y deja la segunda cláusula tan concisa como el hebreo.
