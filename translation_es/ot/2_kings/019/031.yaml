translation:
  language: es
  text: Porque de Jerusalén saldrá un remanente, y del monte Sion, sobrevivientes. El celo de Yahvé hará esto.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Aquí כִּי introduce la base o garantía de la promesa anterior; en español, «Porque» expresa bien esa relación causal/explicativa sin endurecer el tono.
- source_word: מִירוּשָׁלִַם
  english_pob_choice: from Jerusalem
  chosen_spanish: de Jerusalén
  alternatives_spanish:
  - desde Jerusalén
  lexicon: HALOT
  rationale: La preposición מִן marca origen. En español, «de Jerusalén» reproduce naturalmente ese valor de procedencia.
- source_word: תֵּצֵא
  english_pob_choice: will go out
  chosen_spanish: saldrá
  alternatives_spanish:
  - saldrá hacia afuera
  - irá a salir
  lexicon: HALOT
  rationale: El qal imperfecto 3fs de יצא conserva la idea de movimiento desde un lugar. «Saldrá» es la forma natural y fiel en español.
- source_word: שְׁאֵרִית
  english_pob_choice: a remnant
  chosen_spanish: un remanente
  alternatives_spanish:
  - un resto
  - los sobrevivientes restantes
  lexicon: HALOT
  rationale: «Remanente» preserva el peso profético y teológico del término mejor que una paráfrasis más general como «resto».
- source_word: וּפְלֵיטָה
  english_pob_choice: and survivors
  chosen_spanish: sobrevivientes
  alternatives_spanish:
  - y los que escaparon
  - y fugitivos
  lexicon: HALOT
  rationale: El sustantivo apunta a quienes han escapado o quedado con vida. En español, «sobrevivientes» comunica bien la paralela idea del grupo preservado.
- source_word: מֵהַר צִיּוֹן
  english_pob_choice: from Mount Zion
  chosen_spanish: del monte Sion
  alternatives_spanish:
  - desde el monte Sion
  lexicon: HALOT
  rationale: La expresión es un paralelismo de origen con «de Jerusalén». «Monte Sion» es la forma bíblica clara en español; «del» integra la preposición מִן de modo natural.
- source_word: קִנְאַת
  english_pob_choice: The zeal of
  chosen_spanish: El celo de
  alternatives_spanish:
  - La pasión de
  - Los celos de
  lexicon: HALOT
  rationale: קִנְאָה puede significar celo o celos. Aquí, por el contexto de liberación y cumplimiento del propósito divino, «celo» conserva la fuerza positiva del término en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Siguiendo el criterio del proyecto para יהוה, se traduce el Nombre divino como «Yahvé», preservando su valor propio en lugar de sustituirlo por un título.
- source_word: תַּעֲשֶׂה זֹּאת
  english_pob_choice: will do this
  chosen_spanish: hará esto
  alternatives_spanish:
  - acometerá esto
  - realizará esto
  lexicon: HALOT
  rationale: עשה con el demostrativo זאת expresa producir o llevar a cabo el resultado anunciado. «Hará esto» es breve, fiel y no añade matices interpretativos innecesarios.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton directamente. Conforme a la norma del proyecto, se conserva el Nombre divino en español como «Yahvé», evitando la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md — Contested terms: יהוה / YHWH'
- issue: Nuance of קִנְאַת יְהוָה
  english_pob_reading: The zeal of Yahweh
  chosen_spanish_reading: El celo de Yahvé
  alternative_spanish_readings:
  - Los celos de Yahvé
  - La pasión de Yahvé
  rationale: La expresión puede llevar la tensión semántica entre «celo» y «celos». En este contexto de salvación y cumplimiento, «celo» es la opción más natural y teológicamente positiva en español, sin borrar la fuerza intensiva del término.
  doctrine_reference: HALOT; contextual covenantal usage of קנאה
- issue: Parallelism and source/origin structure
  english_pob_reading: from Jerusalem ... from Mount Zion
  chosen_spanish_reading: de Jerusalén ... del monte Sion
  alternative_spanish_readings:
  - desde Jerusalén ... desde el monte Sion
  rationale: El hebreo marca dos expresiones paralelas de procedencia. En español, «de» mantiene la estructura compacta y el paralelismo poético sin sobreexplicar.
  doctrine_reference: Hebrew poetic parallelism
translation_notes:
  revision_awareness: 'La redacción inglesa auditada fue ajustada en revisión para reflejar con más precisión el paralelismo hebreo: primero Jerusalén, luego el monte Sion. La versión española sigue ese orden y conserva la secuencia de procedencia y el cierre causal-teológico del versículo.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para יהוה de manera consistente con el criterio del proyecto.
  - Se conserva «Sion» como forma bíblica estándar en español y «monte» para mantener la imagen geográfica del original.
  - «Remanente» y «sobrevivientes» mantienen el paralelismo semántico sin fusionar los dos sustantivos en una sola idea.
  - El verso conserva un tono poético y profético breve, sin añadir explicaciones que no estén en el hebreo.
