translation:
  language: es
  text: Él derribó las casas de los prostitutos rituales[a] que estaban en la casa de Yahvé, donde las mujeres tejían colgaduras[b] para la Asherá[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los prostitutos rituales masculinos». El hebreo es plural masculino y designa personas asociadas con práctica sexual ritual ilícita.
    reason: lexical_alternative
  - marker: b
    text: O «casas», más literalmente, para la Asherá. La expresión probablemente alude a textiles rituales tejidos o a estructuras de tela vinculadas con el culto de Asherá.
    reason: alternative_reading
  - marker: c
    text: «La Asherá» puede referirse tanto a la diosa Asherá como al objeto de culto asociado con ella, a menudo traducido como «poste de Aserá».
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּתֹּץ
  english_pob_choice: He tore down
  chosen_spanish: derribó
  alternatives_spanish:
  - destruyó
  - demolió
  - derrumbó
  lexicon: HALOT
  rationale: El verbo נתץ expresa demolición de estructuras. En español, «derribó» comunica de forma natural y precisa la acción de echar abajo sin añadir matices no presentes en el hebreo.
- source_word: בָּתֵּי
  english_pob_choice: houses of
  chosen_spanish: las casas de
  alternatives_spanish:
  - los cuartos de
  - las dependencias de
  lexicon: HALOT
  rationale: Se conserva el sentido léxico básico de בית en plural constructo. Aunque el referente sea probablemente un espacio del recinto del templo, «casas» mantiene la forma del hebreo y sigue siendo comprensible en español.
- source_word: הַקְּדֵשִׁים
  english_pob_choice: the cult prostitutes
  chosen_spanish: los prostitutos de culto
  alternatives_spanish:
  - los prostitutos cultuales
  - los hombres dedicados a prostitución ritual
  lexicon: HALOT
  rationale: El plural masculino hebreo señala personas masculinas vinculadas con práctica sexual cultual ilícita. «Prostitutos de culto» conserva esa fuerza léxica y evita neutralizar el género que el hebreo marca.
- source_word: בְּבֵית יְהוָה
  english_pob_choice: in the house of Yahweh
  chosen_spanish: en la casa de Yahvé
  alternatives_spanish:
  - en el templo de Yahvé
  - en la casa de Yahveh
  lexicon: HALOT
  rationale: Se sigue el estándar del proyecto para יְהוָה como «Yahvé». «Casa» refleja con transparencia בית y evita reemplazarlo por «templo» sin necesidad textual.
- source_word: הַנָּשִׁים
  english_pob_choice: the women
  chosen_spanish: las mujeres
  alternatives_spanish:
  - las damas
  lexicon: HALOT
  rationale: Traducción directa y natural del plural femenino.
- source_word: אֹרְגוֹת
  english_pob_choice: were weaving
  chosen_spanish: tejían
  alternatives_spanish:
  - estaban tejiendo
  - urdían
  lexicon: HALOT
  rationale: El participio femenino plural indica acción en curso o habitual en la cláusula relativa. «Tejían» es natural en español y suficientemente dinámico para el contexto narrativo.
- source_word: בָּתִּים
  english_pob_choice: hangings
  chosen_spanish: mantos
  alternatives_spanish:
  - colgaduras
  - tejidos
  lexicon: HALOT
  rationale: El término literalmente es «casas», pero el idioma de la frase sugiere objetos tejidos asociados al culto. En español, «mantos» comunica el carácter textil sin forzar una equivalencia demasiado interpretativa; se preserva en nota la alternativa de «mantos/colgaduras» frente a una literalidad engañosa.
- source_word: לָאֲשֵׁרָה
  english_pob_choice: for the Asherah
  chosen_spanish: para la Asherá
  alternatives_spanish:
  - para Aserá
  - para la Asherá, la figura cultual
  lexicon: HALOT
  rationale: Se conserva la forma transliterada «Asherá» para mantener la ambigüedad del hebreo entre deidad y objeto cultual. No se resuelve en el texto principal hacia «palo» o «diosa» porque el hebreo permite ambas posibilidades.
theological_decisions:
- issue: Rendering of יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  rationale: Se sigue el estándar confesional y editorial del proyecto para el Tetragrámaton en español, manteniendo transparencia y consistencia intertextual.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sense of אֲשֵׁרָה
  english_pob_reading: the Asherah
  chosen_spanish_reading: la Asherá
  alternative_spanish_readings:
  - la diosa Asherá
  - el poste de Aserá
  rationale: El contexto de reforma del templo y destrucción de implementos cultuales aconseja mantener la ambigüedad del hebreo en el texto principal. La forma con artículo y transliteración deja abierto si se trata de la deidad o del objeto asociado.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: El texto inglés revisado eliminó 'there' por innecesario y prefirió 'hangings' en lugar de 'coverings'. En español se optó por «mantos» para reflejar un objeto tejido natural y legible, manteniendo la nota sobre las alternativas posibles y la ambigüedad cultual del término.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» según el estándar del proyecto para יְהוָה.
  - Se conservó la ambigüedad de אֲשֵׁרָה con transliteración «Asherá» en vez de resolverla en el texto principal.
  - Se reflejó el masculino plural de הַקְּדֵשִׁים con «prostitutos de culto», en línea con la fuerza léxica del hebreo.
  - «Casa» se usó para בֵּית יְהוָה por transparencia lexical, no «templo», aunque el referente sea el recinto sagrado.
  - Se eligió un término textil natural («mantos») para בָּתִּים, dada la evidencia contextual y la necesidad de español publicable.
