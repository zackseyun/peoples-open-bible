translation:
  language: es
  text: El vigía de Efraín está con mi Dios[a]; el profeta es una trampa de cazador en todos sus caminos, y hay hostilidad[b] en la casa de su Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Efraín es un vigía con mi Dios; el profeta es una trampa de cazador en todos sus caminos». La sintaxis hebrea es difícil, y algunos entienden la primera cláusula de forma más positiva antes de que el versículo pase a la acusación.'
    reason: alternative_reading
  - marker: b
    text: 'Hebreo: «hostilidad», con el sentido de odio o enemistad.'
    reason: lexical_alternative
lexical_decisions:
- source_word: צֹפֶה
  english_pob_choice: watchman
  chosen_spanish: centinela
  alternatives_spanish:
  - vigía
  - atalaya
  lexicon: HALOT
  rationale: El participio describe a quien vigila; en español, 'centinela' comunica de forma natural la imagen de vigilancia sin perder el valor funcional del hebreo. 'Atalaya' sería más tradicional, pero menos transparente en el registro moderno.
- source_word: אֶפְרַיִם
  english_pob_choice: Ephraim
  chosen_spanish: Efraín
  alternatives_spanish:
  - Efráim
  lexicon: HALOT
  rationale: Nombre propio bíblico estándar en español. Se conserva la forma reconocible 'Efraín' para el lector hispanohablante.
- source_word: עִם אֱלֹהָי
  english_pob_choice: with my God
  chosen_spanish: con mi Dios
  alternatives_spanish:
  - con Dios
  - junto a mi Dios
  lexicon: HALOT
  rationale: '''Con'' reproduce bien el עִם relacional. Se mantiene el posesivo de primera persona (''mi Dios'') para conservar el contraste pronominal del hebreo y del POB inglés.'
- source_word: נָבִיא
  english_pob_choice: the prophet
  chosen_spanish: el profeta
  alternatives_spanish:
  - un profeta
  lexicon: HALOT
  rationale: Se usa el definido porque el verso funciona como una identificación/denuncia del personaje profético en el contexto inmediato, no como una referencia genérica.
- source_word: פַּח יָקוֹשׁ
  english_pob_choice: a fowler’s snare
  chosen_spanish: una red de cazador
  alternatives_spanish:
  - una trampa de cazador
  - una liga de cazador
  lexicon: HALOT
  rationale: La combinación hebrea evoca una trampa para capturar; 'red de cazador' es idiomática en español y conserva la imagen de captura. 'Fowler' no tiene un equivalente natural único, así que se prioriza inteligibilidad sin borrar la metáfora de trampa.
- source_word: עַל כָּל דְּרָכָיו
  english_pob_choice: on all his ways
  chosen_spanish: sobre todos sus caminos
  alternatives_spanish:
  - en todos sus caminos
  - a lo largo de todos sus caminos
  lexicon: HALOT
  rationale: '''Sobre'' reproduce con bastante literalidad la relación espacial de עַל, y ''caminos'' conserva el sentido figurado de conducta/recorrido de vida.'
- source_word: מַשְׂטֵמָה
  english_pob_choice: hostility
  chosen_spanish: hostilidad
  alternatives_spanish:
  - enemistad
  - odio
  lexicon: HALOT
  rationale: '''Hostilidad'' conserva el campo semántico de oposición y animadversión sin reducirlo solo a emoción interna. Es la correspondencia más directa y natural en español.'
- source_word: בְּבֵית אֱלֹהָיו
  english_pob_choice: in the house of his God
  chosen_spanish: en la casa de su Dios
  alternatives_spanish:
  - en la casa de su dios
  - en la casa de Dios
  lexicon: HALOT
  rationale: Se mantiene 'casa' por fidelidad al hebreo y al marcado lenguaje de culto. 'Su Dios' conserva el sufijo de tercera persona y la tensión del texto, sin suavizarla a una formulación neutral.
theological_decisions:
- issue: Contraste pronominal entre 'mi Dios' y 'su Dios'
  english_pob_reading: 'Retain the pronominal contrast: ''with my God'' ... ''in the house of his God.'''
  chosen_spanish_reading: 'Mantener el contraste: ''con mi Dios'' ... ''en la casa de su Dios''.'
  alternative_spanish_readings:
  - con Dios ... en la casa de Dios
  - con mi Dios ... en la casa de Dios
  rationale: El hebreo preserva un cambio notable de pronombres. La traducción española debe dejar visible esa tensión en vez de armonizarla, porque forma parte del argumento y del tono de reproche del verso.
  doctrine_reference: Translation philosophy §§1, 3
- issue: Valor sintáctico de 'el profeta'
  english_pob_reading: Negative reference to the prophet associated with Ephraim in context
  chosen_spanish_reading: Referencia negativa al profeta asociado con Efraín en el contexto
  alternative_spanish_readings:
  - 'lectura positiva: Efraín es un centinela con mi Dios; el profeta...'
  - lectura de autoidentificación del profeta verdadero
  rationale: El contexto inmediato es acusatorio, por lo que la cláusula se entiende como parte de la denuncia. Aun así, la sintaxis hebrea es difícil; por eso conviene dejar abierta la posibilidad de una lectura alternativa sin convertirla en el texto principal.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: El texto sigue de cerca el paquete fuente hebreo y coincide con el criterio auditado del POB inglés. Se conserva la dificultad sintáctica de la primera cláusula mediante nota alternativa, y se mantiene el contraste pronominal 'mi Dios' / 'su Dios' sin suavización interpretativa.
  spanish_consistency_notes:
  - Se usa 'Dios' para אֱלֹהִים y 'mi Dios / su Dios' para mantener los sufijos pronominales del hebreo.
  - '''Hostilidad'' se mantiene como término abstracto que puede abarcar ''odio'' y ''enemistad'', como en el POB inglés.'
  - No se introduce 'SEÑOR' ni 'Cristo'; el versículo no requiere terminología de sustitución litúrgica.
  - '''Centinela'' se eligió por claridad contemporánea, pero la nota preserva la alternativa interpretativa de ''watchman'' que podría leerse más positivamente.'
