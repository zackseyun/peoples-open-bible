  language: en
  yaml_path: translation/deuterocanon/wisdom_of_solomon/014/029.yaml
  text: For because they trusted in lifeless idols[b][a], after swearing wickedly they do not expect to be harmed.
  footnotes:
  - marker: a
    text: Or 'vain idols' or 'worthless idols.' The Greek adjective stresses the idols' emptiness or unreality.
    reason: lexical_alternative
  - marker: b
    text: Or 'they do not expect to be wronged' or 'they do not expect punishment.' The Greek can refer generally to suffering harm; in context it likely implies no feared retribution for wicked oath-taking.
