translation:
  language: es
  text: Yahvé me ha dado la recompensa[a] de mis labios; por eso la adquirí como una buena posesión[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La lectura griega dice: «El Señor me dio una lengua como recompensa, y con ella lo alabaré».'
    reason: alternative_reading
  - marker: b
    text: «La» se refiere a Sabiduría en el contexto circundante.
    reason: cross_reference
lexical_decisions:
- source_word: יְהֹוָה / Κύριος
  english_pob_choice: the LORD / Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  - SEÑOR
  lexicon: HALOT; LXX κύριος
  rationale: El nombre divino se vierte según el estándar del proyecto como «Yahvé», manteniendo el referente hebreo. Aunque el griego tiene Κύριος, aquí la línea principal sigue el hebreo conservado; por eso no se oculta el nombre con «SEÑOR».
- source_word: שְׂכַר / μισθός
  english_pob_choice: reward
  chosen_spanish: recompensa
  alternatives_spanish:
  - salario
  - paga
  - galardón
  lexicon: HALOT; BDAG
  rationale: «Recompensa» comunica bien el sentido positivo y evita la connotación demasiado comercial de «salario/paga». Mantiene la idea de algo concedido por Yahvé como retorno o premio.
- source_word: שִׂפְתוֹתָי
  english_pob_choice: my lips
  chosen_spanish: mis labios
  alternatives_spanish:
  - mi habla
  - mi palabra
  - mi alabanza
  lexicon: HALOT
  rationale: Se conserva la imagen corporal concreta del hebreo. Aunque el contexto sugiere el habla o la alabanza, la forma literal «mis labios» preserva mejor la metáfora y el paralelismo con el verso siguiente implícito en la unidad poética.
- source_word: בַּעֲבוּר כֵּן
  english_pob_choice: therefore
  chosen_spanish: por eso
  alternatives_spanish:
  - por tanto
  - así que
  - por consiguiente
  lexicon: HALOT
  rationale: «Por eso» expresa de modo natural la relación causal/resultativa del hebreo sin endurecer el registro.
- source_word: קְנִיתִיהָ
  english_pob_choice: I acquired her
  chosen_spanish: la adquirí
  alternatives_spanish:
  - la gané
  - la obtuve
  - la compré
  lexicon: HALOT
  rationale: «Adquirí» preserva la amplitud semántica del verbo y permite mantener la referencia femenina al objeto del contexto, identificada como Sabiduría en la tradición del pasaje. «Compré» sería demasiado específico y mercantil.
- source_word: קִנְיָן טוֹב
  english_pob_choice: a good possession
  chosen_spanish: como buena posesión
  alternatives_spanish:
  - como una posesión valiosa
  - como un buen bien
  - como una buena adquisición
  lexicon: HALOT
  rationale: La expresión conserva el juego léxico con קנה / קנין. «Buena posesión» mantiene la conexión semántica con «adquirí» y suena natural en español; «posesión valiosa» explicaría más de lo que el texto dice.
theological_decisions:
- issue: Divergencia hebreo/griego en la línea final
  english_pob_reading: The Hebrew line says Yahweh gave a reward and the speaker acquired Wisdom as a good possession; the Greek reads that the Lord gave a tongue as reward, and with it the speaker will praise him.
  chosen_spanish_reading: La línea principal sigue el hebreo conservado; la mención de la sabiduría poseída se entiende como objeto femenino del verbo «adquirí».
  alternative_spanish_readings:
  - 'Seguir el griego: «El Señor me dio una lengua como recompensa, y con ella lo alabaré».'
  - Combinar ambas líneas en una paráfrasis conciliadora.
  rationale: Según la filosofía del proyecto para Sirácides, el hebreo existente es la base primaria. El griego se conserva como alternativa textual real porque presenta una lectura sustancialmente distinta y no debe ser absorbida silenciosamente en el texto principal.
  doctrine_reference: 'PHILOSOPHY.md: Sirach is translated from the extant Hebrew where available; Greek variants are retained as alternatives when materially different.'
- issue: Identificación del referente femenino de «la adquirí»
  english_pob_reading: Her refers to Wisdom in the surrounding context.
  chosen_spanish_reading: «La» se deja como referencia a Sabiduría en el contexto circundante.
  alternative_spanish_readings:
  - Nombrar explícitamente «la Sabiduría».
  - Dejar el antecedente implícito sin nota.
  rationale: El femenino pronominal del hebreo y del POB inglés apunta a Sabiduría; explicitarlo en la nota evita ambigüedad sin alterar el texto poético.
  doctrine_reference: Contexto sapiencial de Sirácides 51; referencia temática a Sabiduría.
translation_notes:
  revision_awareness: Se revisó el expediente inglés y el paralelo griego de Swete. No hay cambios de revisión aplicados en la fuente inglesa; la redacción española sigue la línea hebrea principal con la variante griega preservada en nota.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para el nombre divino, en coherencia con el estándar del proyecto.
  - Se conservó el paralelismo léxico «adquirí / posesión» para reflejar el juego verbal del hebreo.
  - La nota a reproduce la alternativa griega sin desplazar la lectura hebrea principal.
  - El pronombre femenino «la» se conserva porque el referente subyacente es Sabiduría, conforme al contexto del pasaje.
