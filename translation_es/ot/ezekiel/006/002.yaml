translation:
  language: es
  text: Hijo del hombre[a], pon tu rostro hacia los montes de Israel y profetízales.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Hijo de hombre». Se conserva el vocativo profético tradicional y la forma idiomática del hebreo.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן אָדָם
  english_pob_choice: Son of man
  chosen_spanish: Hijo de hombre
  alternatives_spanish:
  - Humano
  - Mortal
  lexicon: HALOT
  rationale: Conservo el giro profético fijo de dirección a Ezequiel. «Hijo de hombre» mantiene el idiomatismo y la fuerza vocativa del hebreo mejor que suavizarlo a «humano» o «mortal».
- source_word: שִׂים
  english_pob_choice: set
  chosen_spanish: pon
  alternatives_spanish:
  - coloca
  - fija
  lexicon: HALOT
  rationale: El imperativo con «rostro» pide en español un verbo natural de colocación o orientación. «Pon» comunica bien la orden sin perder la concreción del hebreo.
- source_word: פָּנֶיךָ
  english_pob_choice: your face
  chosen_spanish: tu rostro
  alternatives_spanish:
  - tu cara
  - tu semblante
  - tu atención
  lexicon: HALOT
  rationale: Conservo la imagen corporal del hebreo. «Rostro» es más digno y bíblico en español que «cara», y evita desdibujar el idiomático «poner el rostro».
- source_word: אֶל
  english_pob_choice: toward
  chosen_spanish: hacia
  alternatives_spanish:
  - contra
  - a
  lexicon: HALOT
  rationale: La relación espacial-direccional del hebreo se expresa con naturalidad en español mediante «hacia». No traslado aquí el matiz adversativo porque el hebreo lo deja para el conjunto del mandato profético.
- source_word: הָרֵי יִשְׂרָאֵל
  english_pob_choice: the mountains of Israel
  chosen_spanish: los montes de Israel
  alternatives_spanish:
  - las montañas de Israel
  - la región montañosa de Israel
  lexicon: HALOT
  rationale: Mantengo la imagen concreta del constructo hebreo. «Montes» suena más bíblico y menos técnico que «región montañosa», sin borrar el referente geográfico.
- source_word: וְהִנָּבֵא
  english_pob_choice: and prophesy
  chosen_spanish: y profetiza
  alternatives_spanish:
  - y profetiza contra ellos
  - y habla proféticamente
  lexicon: HALOT
  rationale: «Profetiza» es la forma directa e idiomática del imperativo en español, conservando el registro profético del hebreo.
- source_word: אֲלֵיהֶם
  english_pob_choice: to them
  chosen_spanish: para ellos
  alternatives_spanish:
  - a ellos
  - contra ellos
  - sobre ellos
  lexicon: HALOT
  rationale: 'Sigo la revisión más reciente del POB inglés: el hebreo dice «a/para ellos», no «contra ellos». En español, «para ellos» mantiene la dirección del mandato sin añadir adversatividad que el texto no explicita.'
theological_decisions:
- issue: Dirección del oráculo en אֲלֵיהֶם
  english_pob_reading: to them
  chosen_spanish_reading: para ellos
  alternative_spanish_readings:
  - a ellos
  - contra ellos
  rationale: El hebreo admite una lectura direccional neutra. Aunque el contexto de juicio puede sugerir oposición, la fuente inmediata solo exige que el profeta se dirija a los montes; por eso evito intensificar a «contra ellos».
  doctrine_reference: POB audit trail on Ezekiel 6:2; revision pass dated 2026-04-23T10:35:23Z
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión auditada que corrigió la relación de אֲלֵיהֶם de «contra ellos» a «to them». La redacción española evita introducir un matiz adversativo no presente en el hebreo y traduce el mandato de forma direccional y natural.
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico claro y sobrio, apto para lectura pública.
  - «Montes» y «rostro» preservan la imaginería concreta del texto hebreo.
  - No se introdujo «SEÑOR» ni otras sustituciones teológicas no presentes en este versículo.
