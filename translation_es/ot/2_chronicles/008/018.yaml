base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/008/018.yaml
  text: And Huram sent him[a], by the hand of his servants, ships and servants who knew the sea. They went with Solomon’s servants to Ophir, took from there four hundred and fifty talents of gold[c][b], and brought them to King Solomon.
  footnotes:
  - marker: a
    text: Hebrew 'by the hand of his servants,' an idiom meaning 'through his servants.'
    reason: cultural_note
  - marker: b
    text: Or 'servants experienced at sea' or simply 'sailors.' The Hebrew reads literally 'servants knowing the sea.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew has 'brought them'; English could also render 'brought it,' referring collectively to the gold.
    reason: lexical_alternative
