base_translation:
  language: en
  yaml_path: translation/ot/judges/020/023.yaml
  text: Then the sons of Israel went up and wept before Yahweh until evening[a], and they inquired of Yahweh, saying, “Shall we continue to draw near for battle against the sons of Benjamin, my brother?” And Yahweh said, “Go up against him.”
  footnotes:
  - marker: a
    text: Or, “Shall I again approach for battle against the sons of Benjamin, my brother?” The Hebrew can express either continuing or repeating the attack, and עִם may be understood adversatively in this battle context.
