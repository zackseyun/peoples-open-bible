translation:
  language: es
  text: Y los pescadores se lamentarán[a], y todos los que echan un anzuelo en el Nilo harán duelo[b]; los que extienden una red sobre las aguas se consumirán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el río»; en este contexto egipcio, el término hebreo suele referirse específicamente al Nilo.
    reason: lexical_alternative
  - marker: b
    text: O «languidecerán».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאָנוּ
  english_pob_choice: will lament
  chosen_spanish: se lamentarán
  alternatives_spanish:
  - llorarán
  - se quejarán
  - gimirán
  lexicon: HALOT
  rationale: El verbo expresa duelo o lamentación; en español, «se lamentarán» conserva el tono de lamentación profética y funciona naturalmente con sujeto plural.
- source_word: הַדַּיָּגִים
  english_pob_choice: the fishermen
  chosen_spanish: los pescadores
  alternatives_spanish:
  - los pescadores de peces
  - los hombres de pesca
  lexicon: HALOT
  rationale: Designa a quienes se dedican a pescar; «pescadores» es la forma idiomática y clara en español.
- source_word: וְאָבְלוּ
  english_pob_choice: will mourn
  chosen_spanish: se entristecerán
  alternatives_spanish:
  - harán duelo
  - se lamentarán
  - se dolerán
  lexicon: HALOT
  rationale: El verbo אבל normalmente expresa duelo; aquí se mantiene la idea de aflicción/mourning. «Se entristecerán» conserva el matiz de pena en español sin repetir exactamente la primera cláusula.
- source_word: כָּל מַשְׁלִיכֵי
  english_pob_choice: all who cast
  chosen_spanish: todos los que echan
  alternatives_spanish:
  - todos los que arrojan
  - todos los que lanzan
  lexicon: HALOT
  rationale: La construcción participial describe a un grupo por su actividad; «todos los que echan» es natural y mantiene el sentido continuo/ocupacional.
- source_word: בַיְאֹר
  english_pob_choice: into the Nile
  chosen_spanish: en el Nilo
  alternatives_spanish:
  - en el río
  - en el canal
  lexicon: HALOT
  rationale: En el contexto egipcio de Isaías 19, יְאֹר se refiere específicamente al Nilo; se nombra directamente para claridad en español.
- source_word: חַכָּה
  english_pob_choice: a hook
  chosen_spanish: un anzuelo
  alternatives_spanish:
  - un gancho
  - una caña con anzuelo
  lexicon: HALOT
  rationale: El sustantivo denota un anzuelo o gancho de pescar; «anzuelo» es el equivalente más preciso y natural en español.
- source_word: וּפֹרְשֵׂי
  english_pob_choice: those who spread
  chosen_spanish: los que extienden
  alternatives_spanish:
  - los que tienden
  - los que despliegan
  lexicon: HALOT
  rationale: El participio describe a quienes despliegan la red; «los que extienden» preserva la acción de forma simple y fiel.
- source_word: מִכְמֹרֶת
  english_pob_choice: a net
  chosen_spanish: una red
  alternatives_spanish:
  - una red de pescar
  - una redada
  lexicon: HALOT
  rationale: El término se refiere a una red de captura; «red» basta en contexto y evita sobreespecificar sin necesidad.
- source_word: עַל פְּנֵי מַיִם
  english_pob_choice: over the waters
  chosen_spanish: sobre las aguas
  alternatives_spanish:
  - sobre la superficie de las aguas
  - encima de las aguas
  lexicon: HALOT
  rationale: La expresión idiomática literal es «sobre la faz de las aguas»; en español «sobre las aguas» conserva la imagen sin resultar rígido.
- source_word: אֻמְלָלוּ
  english_pob_choice: will waste away
  chosen_spanish: languidecerán
  alternatives_spanish:
  - se marchitarán
  - se consumirán
  - se debilitarán
  lexicon: HALOT
  rationale: El verbo comunica debilitamiento, desfallecimiento o languidez; «languidecerán» reproduce bien esa pérdida de vigor y mantiene el registro poético.
translation_notes:
  revision_awareness: Se siguió de cerca el texto hebreo (WLC) y el audit trail en inglés. No se introdujeron cambios de sentido respecto de la lectura aprobada; solo se ajustó la expresión al español natural. Se mantuvo la referencia específica al Nilo por el contexto egipcio, y se preservó la variación verbal entre «se lamentarán» y «se entristecerán» / «languidecerán» para reflejar el paralelismo del hebreo.
  spanish_consistency_notes:
  - Se usa «Nilo» para יְאֹר, conforme al contexto egipcio y al audit trail inglés.
  - Se emplea «anzuelo» para חַכָּה por precisión léxica.
  - Se conserva el paralelismo poético con dos verbos de aflicción y un cierre de debilitamiento.
  - No se usa «SEÑOR» porque este versículo no contiene el tetragrámaton ni una cita directa de κύριος.
