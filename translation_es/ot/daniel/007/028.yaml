translation:
  language: es
  text: Aquí termina el asunto[a]. En cuanto a mí, Daniel, mis pensamientos me aterraron mucho, y mi apariencia cambió por causa de ello[b]; pero guardé el asunto en mi corazón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el fin del asunto» o «la conclusión del asunto».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «mi semblante cambió» o «mi resplandor cambió».'
    reason: lexical_alternative
lexical_decisions:
- source_word: עַד כָּה
  english_pob_choice: This is
  chosen_spanish: Hasta aquí es
  alternatives_spanish:
  - Hasta aquí
  - Hasta este punto es
  lexicon: HALOT
  rationale: La expresión aramea funciona como marcador discursivo de cierre. En español, "Hasta aquí es" comunica de forma natural que el relato llega a su conclusión sin forzar una estructura calca.
- source_word: סוֹפָא דִי מִלְּתָא
  english_pob_choice: the end of the matter
  chosen_spanish: el fin de la palabra
  alternatives_spanish:
  - el fin del asunto
  - la conclusión de la palabra
  lexicon: HALOT
  rationale: מִלְּתָא puede significar "palabra", "asunto" o "cosa". Se eligió "palabra" para conservar la posibilidad semántica del arameo y mantener la tensión entre 'palabra' y 'asunto' que el texto admite. "Fin" retiene la idea de conclusión final.
- source_word: אֲנָה דָנִיֵּאל
  english_pob_choice: As for me, Daniel
  chosen_spanish: En cuanto a mí, Daniel
  alternatives_spanish:
  - Yo, Daniel
  - Por mi parte, Daniel
  lexicon: HALOT
  rationale: El pronombre independiente más el nombre propio tienen valor enfático. "En cuanto a mí, Daniel" preserva esa focalización en un español natural y sobrio.
- source_word: שַׂגִּיא
  english_pob_choice: greatly
  chosen_spanish: mucho
  alternatives_spanish:
  - grandemente
  - en gran manera
  lexicon: HALOT
  rationale: Aquí modifica el efecto sobre Daniel. "Mucho" conserva intensidad sin sonar arcaico; la fuerza total queda reforzada por "me aterraron".
- source_word: רַעְיוֹנַי
  english_pob_choice: my thoughts
  chosen_spanish: mis pensamientos
  alternatives_spanish:
  - mis reflexiones
  - mis pensamientos angustiados
  lexicon: HALOT
  rationale: El sustantivo se refiere a pensamientos o reflexiones mentales. "Pensamientos" es la opción directa y fiel, sin añadir matices que el hebreo/arameo no exige.
- source_word: יְבַהֲלֻנַּנִי
  english_pob_choice: terrified me
  chosen_spanish: me aterraron
  alternatives_spanish:
  - me alarmaron
  - me turbaron
  lexicon: HALOT
  rationale: El verbo expresa perturbar o alarmar con fuerza, y en el contexto visionario puede llegar a la idea de terror. "Me aterraron" transmite bien la intensidad del original y del audit trail inglés.
- source_word: וְזִיוַי
  english_pob_choice: my appearance
  chosen_spanish: mi apariencia
  alternatives_spanish:
  - mi semblante
  - mi resplandor
  - mi rostro
  lexicon: HALOT
  rationale: זִיו puede abarcar brillo, apariencia o semblante. Dado el contexto de cambio visible, "apariencia" es amplio y natural; no se reduce innecesariamente a rostro ni se espiritualiza como resplandor.
- source_word: יִשְׁתַּנּוֹן עֲלַי
  english_pob_choice: changed because of it
  chosen_spanish: cambió
  alternatives_spanish:
  - cambió por causa de ello
  - se alteró por ello
  - cambió sobre mí
  lexicon: HALOT
  rationale: El arameo expresa que la apariencia cambió 'sobre mí' o 'en mí' a consecuencia de lo visto. En español se integra con el complemento causal posterior para evitar repetición y mantener la relación de causa.
- source_word: וּמִלְּתָא
  english_pob_choice: but I kept the matter
  chosen_spanish: la palabra
  alternatives_spanish:
  - el asunto
  - la cosa
  lexicon: HALOT
  rationale: Se mantiene la misma opción léxica que en la primera cláusula para reflejar la cohesión del arameo, donde מִלְּתָא vuelve a referirse al contenido revelado.
- source_word: בְּלִבִּי
  english_pob_choice: in my heart
  chosen_spanish: en mi corazón
  alternatives_spanish:
  - en mi interior
  - en mi mente
  lexicon: HALOT
  rationale: Se conserva 'corazón' como lenguaje bíblico de la vida interior, conforme a la antropología del texto y a la decisión auditada en inglés.
- source_word: נִטְרֵת
  english_pob_choice: I kept
  chosen_spanish: guardé
  alternatives_spanish:
  - conservé
  - retení
  lexicon: HALOT
  rationale: El verbo significa guardar, preservar o custodiar. "Guardé" es breve, natural y suficientemente fuerte para indicar que Daniel conservó el contenido interiormente.
theological_decisions:
- issue: Antropología bíblica de 'corazón'
  english_pob_reading: Retain 'heart' in the main text
  chosen_spanish_reading: Retener 'corazón' en el texto principal
  alternative_spanish_readings:
  - mente
  - interior
  rationale: El versículo usa lenguaje bíblico del ser interior. Traducirlo como 'corazón' preserva la antropología del texto y evita reducir la frase a mera cognición.
  doctrine_reference: Translation philosophy §6; mantener el sentido fuente con claridad contemporánea
- issue: Valor de מִלְּתָא entre 'palabra' y 'asunto'
  english_pob_reading: the end of the matter
  chosen_spanish_reading: el fin de la palabra
  alternative_spanish_readings:
  - el fin del asunto
  - la conclusión del asunto
  rationale: El arameo admite una gama semántica amplia. 'Palabra' conserva la posibilidad de referirse al contenido revelado y deja visible la ambigüedad, sin cerrar indebidamente la tensión léxica.
  doctrine_reference: HALOT; principio de equivalencia óptima con transparencia léxica
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto hebreo/arameo y el audit trail inglés, manteniendo las decisiones ya estabilizadas en la revisión más reciente (sin cambios sustantivos). Se conservan las dos ambigüedades señaladas en la tradición POB: la cláusula de cierre (''mīl''tā'') y el cambio visible de Daniel (''ziv'').'
  spanish_consistency_notes:
  - Se mantiene la misma traducción de מִלְּתָא como 'palabra' en ambas apariciones para preservar cohesión léxica.
  - '''Corazón'' se conserva como sede del interior humano, en línea con la decisión teológica auditada.'
  - El tono es sobrio y publicable, con español natural sin caer en calco mecánico del arameo.
