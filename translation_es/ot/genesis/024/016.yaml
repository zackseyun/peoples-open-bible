revisions:
- from: La joven era muy hermosa de apariencia[a], virgen; ningún hombre la había conocido. Ella descendió a la fuente, llenó su cántaro[b] y subió.
  to: La joven era muy hermosa de aspecto, virgen; ningún hombre la había conocido[a]. Ella descendió a la fuente[b], llenó su cántaro y subió.
  rationale: Se ajusta «de apariencia» a «de aspecto» para una expresión más idiomática en español, se añade una nota al hebraísmo «la había conocido» para preservar el eufemismo original sin perder claridad, y se reubica la nota lexicalmente útil al término «fuente».
