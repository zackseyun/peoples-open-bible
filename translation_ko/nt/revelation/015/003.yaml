base_translation:
  language: en
  yaml_path: translation/nt/revelation/015/003.yaml
  text: 'And they sing the song of Moses[a], the slave of God, and the song of the Lamb, saying: “Great and marvelous are your works, Lord God, the Almighty; righteous and true are your ways, O King of the ages.”'
  footnotes:
  - marker: a
    text: Some manuscripts read 'O King of the nations' instead of 'O King of the ages.'
    reason: textual_variant
translation:
  language: ko
  text: '그들은 하나님의 종 모세의 노래와 어린 양의 노래를 부르며 말하였습니다. 「주 하나님, 전능하신 분이시여, 당신의 행하신 일들이 크고 놀랍습니다. 만세의 왕이시여[a], 당신의 길은 의롭고 참되십니다.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '사본에 따라 「민족들의 왕(τῶν ἐθνῶν)」으로 읽기도 한다. SBLGNT는 τῶν αἰώνων(만세의)을 따른다.'
    reason: textual_variant
