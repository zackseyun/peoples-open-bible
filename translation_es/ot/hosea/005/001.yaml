base_translation:
  language: en
  yaml_path: translation/ot/hosea/005/001.yaml
  text: Hear this[a], O priests; pay attention, house of Israel; and give ear, house of the king. For the judgment is for you[b], because you have been a trap at Mizpah and a net spread out upon Tabor.
  footnotes:
  - marker: a
    text: Or 'For the judgment is against you.' The Hebrew phrase is compact and may mean either that judgment pertains to them or is directed against them.
    reason: alternative_reading
  - marker: b
    text: Mizpah and Tabor are place names, likely evoking well-known sites in Israel associated here with entrapment imagery.
    reason: cultural_note
