translation:
  language: es
  text: Cuando ellos estaban junto a la gran piedra que está en Gibeón, Amasa vino delante de ellos[a]. Joab llevaba puesta su prenda, y sobre ella había un cinturón con una espada sujeta a su cintura en su vaina; y al salir[b], cayó.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Amasa vino a su encuentro». El hebreo literalmente dice «vino delante de ellos».'
    reason: lexical_alternative
  - marker: b
    text: Lo más probable es que el sujeto de «cayó» sea la espada, indicado por el verbo femenino en hebreo.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵם עִם הָאֶבֶן הַגְּדוֹלָה
  english_pob_choice: When they were by the great stone
  chosen_spanish: Cuando ellos estaban junto a la gran piedra
  alternatives_spanish:
  - cuando estaban cerca de la gran piedra
  - cuando estaban con la gran piedra
  lexicon: HALOT
  rationale: עִם con valor locativo puede indicar proximidad o ubicación junto a algo. «Junto a» conserva el sentido espacial natural en español sin volverlo mecánico.
- source_word: אֲשֶׁר בְּגִבְעוֹן
  english_pob_choice: that is in Gibeon
  chosen_spanish: que está en Gibeón
  alternatives_spanish:
  - que estaba en Gibeón
  - que es en Gibeón
  lexicon: HALOT
  rationale: La relativa identifica la ubicación de la piedra. «Que está» es una forma natural y fiel para una localización narrativa.
- source_word: וַעֲמָשָׂא בָּא לִפְנֵיהֶם
  english_pob_choice: Amasa came before them
  chosen_spanish: Amasa vino delante de ellos
  alternatives_spanish:
  - Amasa vino a su encuentro
  - Amasa vino frente a ellos
  lexicon: HALOT
  rationale: לִפְנֵי literalmente es «delante de / en presencia de». «Vino delante de ellos» preserva la ambigüedad útil del hebreo, como en el audit trail inglés.
- source_word: וְיוֹאָב חָגוּר מִדּוֹ לְבֻשׁוּ
  english_pob_choice: Now Joab was clothed in his garment
  chosen_spanish: Y Joab estaba ceñido con su vestido
  alternatives_spanish:
  - Y Joab estaba vestido con su ropa
  - Y Joab estaba ceñido con su vestidura
  lexicon: HALOT
  rationale: חָגוּר expresa estar ceñido/girded; «ceñido» conserva esa imagen. מִדּוֹ לְבֻשׁוּ se refiere a una prenda distinguida; «vestido» es amplio y evita introducir «militar» sin base explícita.
- source_word: וְעָלָיו חֲגוֹר
  english_pob_choice: and over it was a belt
  chosen_spanish: y sobre él había un cinturón
  alternatives_spanish:
  - y sobre él había un cinto
  - y sobre él iba un cinturón
  lexicon: HALOT
  rationale: חֲגוֹר es un cinturón/cinto de sujeción. «Cinturón» es claro en español moderno; se mantiene la relación de capas entre la prenda y el arma.
- source_word: חֶרֶב מְצֻמֶּדֶת
  english_pob_choice: with a sword fastened
  chosen_spanish: con una espada sujeta
  alternatives_spanish:
  - con una espada atada
  - con una espada asegurada
  lexicon: HALOT
  rationale: מְצֻמֶּדֶת indica algo pegado o fijado firmemente. «Sujeta» comunica bien esa fijación y suena natural en la descripción del arma.
- source_word: עַל מָתְנָיו
  english_pob_choice: to his waist
  chosen_spanish: a su cintura
  alternatives_spanish:
  - a sus lomos
  - a su cadera
  lexicon: HALOT
  rationale: מָתְנַיִם puede referirse a la zona de la cintura/lomos. «Cintura» es la equivalencia más clara para lectores actuales, sin perder el sentido corporal.
- source_word: בְּתַעְרָהּ
  english_pob_choice: in its sheath
  chosen_spanish: en su vaina
  alternatives_spanish:
  - en su funda
  - en su vaina de espada
  lexicon: HALOT
  rationale: Para una espada, «vaina» es el término técnico natural en español y refleja bien la relación del arma con su cubierta.
- source_word: וְהוּא יָצָא
  english_pob_choice: as he went out
  chosen_spanish: y al salir
  alternatives_spanish:
  - y cuando salió
  - y mientras salía
  lexicon: HALOT
  rationale: El hebreo introduce la circunstancia del movimiento. «Al salir» mantiene la simultaneidad y fluidez narrativa que el inglés POB resolvió con «as he went out».
- source_word: וַתִּפֹּל
  english_pob_choice: it fell
  chosen_spanish: cayó
  alternatives_spanish:
  - y cayó
  - se cayó
  lexicon: HALOT
  rationale: El verbo femenino alude probablemente a la espada. En español, dejar el sujeto implícito evita sobreinterpretar y conserva la referencia contextual.
theological_decisions:
- issue: Referencia a Yahvé o lenguaje divino
  english_pob_reading: No explicit divine-name language in this verse
  chosen_spanish_reading: No aparece lenguaje del nombre divino en este versículo
  alternative_spanish_readings:
  - —
  rationale: El versículo es puramente narrativo y no requiere decisión sobre יהוה / κύριος.
  doctrine_reference: No aplica
- issue: Identificación del referente femenino de «cayó»
  english_pob_reading: The subject of 'it fell' is most likely the sword, implied by the feminine verb in Hebrew.
  chosen_spanish_reading: Se entiende que cayó la espada, aunque el español no necesita explicitarlo en el texto principal
  alternative_spanish_readings:
  - cayó la espada
  - y la espada cayó
  rationale: El hebreo femenino apunta probablemente a la espada; sin embargo, en español el pronombre implícito evita añadir un sujeto no expresado en el texto base. La nota puede aclararlo si se desea.
  doctrine_reference: No aplica
translation_notes:
  revision_awareness: La redacción sigue de cerca la última revisión inglesa, que corrigió «military garment» por «garment/clothed in his garment» por ser más fiel al hebreo. Por eso se evita introducir «militar» en español y se conserva la descripción simple de la vestidura y el cinturón con la espada. También se mantiene la ambigüedad narrativa de לִפְנֵיהֶם y del sujeto implícito de «cayó», siguiendo el audit trail de la POB.
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma por defecto en la serie, pero este versículo no lo contiene.
  - Se mantiene «Mesías/Cristo» fuera de lugar porque no aparece en el texto.
  - «Espada» y «vaina» conservan el registro narrativo y no chocan con la terminología POB.
  - «Cintura» se usa como equivalente funcional de «lomos» en una descripción corporal concreta.
  - La nota al pie marca solo la alternativa lexical de לִפְנֵיהֶם, que es la única variante documentada en el audit trail inglés.
