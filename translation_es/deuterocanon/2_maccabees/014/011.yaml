revisions:
- from: Cuando este hombre hubo dicho tales cosas[a], los demás de los Amigos, estando pronto mal dispuestos hacia Judas[b], incitaron aún más a Demetrio.
  to: Cuando este hombre dijo tales cosas, los demás Amigos[a], pronto mal dispuestos hacia Judas[b], incitaron aún más a Demetrio.
  rationale: La revisión mantiene el sentido del griego y la línea auditada en inglés, pero corrige expresiones poco naturales en español. Se simplifica la cláusula temporal, se reemplaza «los demás de los Amigos» por «los demás Amigos», y se elimina «estando pronto», que no funciona idiomáticamente. Además, la nota cultural se reancla correctamente en «Amigos» para reflejar el probable título cortesano documentado por la POB.
