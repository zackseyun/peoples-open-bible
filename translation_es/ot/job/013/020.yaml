review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura y el sentido general del hebreo: una petición restrictiva seguida de una consecuencia. Conserva correctamente «dos cosas», «entonces» y la imagen de «tu rostro», con nota alternativa válida para «presencia». Sin embargo, «no hagas conmigo dos cosas» suena poco natural en español y no refleja tan claramente la fuerza contextual de עשה עם como petición de que Dios no le haga esas dos acciones a Job.'
  spanish_quality_summary: El español es claro y digno en general, pero «Solo no hagas conmigo dos cosas» resulta algo forzado e incluso ambiguo, porque en español «hacer con alguien» no suele introducir bien acciones perjudiciales específicas. «No me hagas dos cosas» es más natural, más directo y mejor alineado con el uso contextual documentado en el POB inglés. También conviene tildar «Sólo» no es obligatorio en la ortografía actual; «Solo» es aceptable.
  glossary_alignment: No hay conflictos con la terminología proyectual principal. La elección «rostro» preserva bien מִפָּנֶיךָ, y la nota «de tu presencia» mantiene la alternativa interpretativa. No hay términos teológicos sensibles aquí.
  issues:
  - severity: medium
    issue: «No hagas conmigo dos cosas» es poco idiomático en español.
    rationale: Aunque עשה עם puede significar «tratar con/hacer con», en este contexto Job pide que Dios no le haga dos acciones concretas. En español bíblico natural, «no me hagas dos cosas» comunica mejor el sentido sin perder fidelidad.
  - severity: low
    issue: La colocación de «Solo» al inicio puede sonar algo rígida.
    rationale: No es incorrecta, pero «Solo no me hagas dos cosas» fluye mejor una vez corregida la construcción verbal. No requiere más cambio.
  revised_spanish_text: 'Solo no me hagas dos cosas[a]; entonces no me esconderé de tu rostro:'
  revised_footnotes:
