translation:
  language: es
  text: Pero cuando el asunto se dio a conocer[a], y se informó al rey de los persas que en el lugar donde los sacerdotes que habían sido llevados habían escondido el fuego, apareció agua, de la cual[c] también los que estaban con Nehemías[b] purificaron los sacrificios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «quedó manifiesto» o «se hizo evidente». El griego indica que el hecho salió a la luz.'
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «los que estaban alrededor de Nehemías»; es decir, Nehemías y los que estaban con él.
    reason: lexical_alternative
  - marker: c
    text: El griego dice «de la cual»; también puede entenderse idiomáticamente como «con la cual» o «por medio de la cual».
    reason: lexical_alternative
lexical_decisions:
- source_word: φανερὸν ἐγενήθη
  english_pob_choice: became known
  chosen_spanish: llegó a ser conocido
  alternatives_spanish:
  - se hizo manifiesto
  - quedó en claro
  lexicon: LSJ
  rationale: La construcción griega expresa que el hecho salió a la luz. «Llegó a ser conocido» conserva el matiz resultativo sin sonar artificial en español.
- source_word: τὸ πρᾶγμα
  english_pob_choice: the matter
  chosen_spanish: el asunto
  alternatives_spanish:
  - el hecho
  - la cuestión
  lexicon: LSJ
  rationale: Es un término amplio para el acontecimiento narrado. «El asunto» es natural y mantiene el registro narrativo.
- source_word: διηγήθη
  english_pob_choice: it was reported
  chosen_spanish: se informó
  alternatives_spanish:
  - se relató
  - se contó
  lexicon: LSJ
  rationale: El pasivo indica que la noticia fue comunicada al rey. «Se informó» preserva la transmisión formal mejor que un verbo más narrativo.
- source_word: τῷ βασιλεῖ τῶν Περσῶν
  english_pob_choice: to the king of the Persians
  chosen_spanish: al rey de los persas
  alternatives_spanish:
  - al rey persa
  lexicon: LSJ
  rationale: La forma con genitivo se vierte de modo transparente como «al rey de los persas», manteniendo la relación de pertenencia sin convertirla en adjetivo fijo.
- source_word: τὸ πῦρ ἔκρυψαν
  english_pob_choice: had hidden the fire
  chosen_spanish: habían escondido el fuego
  alternatives_spanish:
  - habían ocultado el fuego
  - ocultaron el fuego
  lexicon: LSJ
  rationale: «Esconder» es un equivalente claro y directo para ἔκρυψαν en este contexto. El pluscuamperfecto expresa que la acción precede al hallazgo del agua.
- source_word: οἱ μεταχθέντες ἱερεῖς
  english_pob_choice: the priests who had been taken away
  chosen_spanish: los sacerdotes que habían sido llevados
  alternatives_spanish:
  - los sacerdotes que habían sido apartados
  - los sacerdotes deportados
  lexicon: LSJ
  rationale: «Llevados» conserva la idea básica de traslado/retirada del lugar sin añadir más de lo que el participio dice. Se evita precisar «desterrados» o «deportados» porque la evidencia griega no obliga a ello.
- source_word: τὸ ὕδωρ ἐφάνη
  english_pob_choice: water appeared
  chosen_spanish: apareció agua
  alternatives_spanish:
  - apareció el agua
  - se vio agua
  lexicon: LSJ
  rationale: La frase griega dice simplemente que el agua apareció. En español, «apareció agua» suena natural y fiel.
- source_word: ἀφʼ οὗ
  english_pob_choice: from which
  chosen_spanish: a partir de la cual
  alternatives_spanish:
  - de la cual
  - por la cual
  lexicon: LSJ
  rationale: El giro puede entenderse como fuente o instrumento. «A partir de la cual» deja abierta esa relación causal/originaria sin forzarla demasiado, mientras mantiene la referencia al agua.
- source_word: οἱ περὶ τὸν Νεεμίαν
  english_pob_choice: those with Nehemiah
  chosen_spanish: los que estaban con Nehemías
  alternatives_spanish:
  - los de alrededor de Nehemías
  - Nehemías y sus compañeros
  lexicon: LSJ
  rationale: El griego designa al grupo asociado con Nehemías. «Los que estaban con Nehemías» expresa ese sentido de compañía de forma natural en español.
- source_word: ἥγνισαν
  english_pob_choice: purified
  chosen_spanish: purificaron
  alternatives_spanish:
  - consagraron
  - hicieron puras
  lexicon: LSJ
  rationale: El verbo tiene fuerza cultual/ritual. «Purificaron» conserva esa ambigüedad reverente sin sobreexplicar el rito.
- source_word: τὰς θυσίας
  english_pob_choice: the sacrifices
  chosen_spanish: los sacrificios
  alternatives_spanish:
  - las ofrendas sacrificiales
  - las ofrendas
  lexicon: LSJ
  rationale: Es la correspondencia más directa y cultual para θυσίας en este pasaje.
theological_decisions:
- issue: Sentido ritual de ἥγνισαν τὰς θυσίας
  english_pob_reading: purified the sacrifices
  chosen_spanish_reading: purificaron los sacrificios
  alternative_spanish_readings:
  - consagraron los sacrificios
  - purificaron las ofrendas sacrificiales
  rationale: El contexto es litúrgico y no exige decidir entre una purificación material de las víctimas/ofrendas o una purificación del acto sacrificial en sentido amplio. «Purificaron los sacrificios» preserva esa amplitud cultual.
  doctrine_reference: Translation philosophy §3, §6
- issue: Valor de ἀφʼ οὗ en la relación con el agua
  english_pob_reading: from which
  chosen_spanish_reading: a partir de la cual
  alternative_spanish_readings:
  - de la cual
  - con la cual
  rationale: La frase puede señalar procedencia o medio. La opción elegida mantiene la tensión sin clausurarla en una sola lectura interpretativa.
  doctrine_reference: Translation philosophy §2, §4
translation_notes:
  revision_awareness: La versión inglesa más reciente ajustó οἱ περὶ τὸν Νεεμίαν de «those around Nehemiah» a «those with Nehemiah» por naturalidad. En español se siguió ese mismo desplazamiento semántico hacia una expresión de compañía («los que estaban con Nehemías») sin perder la transparencia del griego. También se mantuvo la ambigüedad de ἀφʼ οὗ mediante una formulación no cerrada («a partir de la cual»).
  spanish_consistency_notes:
  - Se usa «Dios/Yahvé» y «Mesías/Cristo» según los valores del texto, pero este versículo no los contiene.
  - Se conserva «sacerdotes» para ἱερεῖς y «sacrificios» para θυσίας, en registro cultual directo.
  - Se optó por «los persas» en lugar de un adjetivo fijo («persa») para reflejar la construcción genitiva del griego.
  - No se añadió puntuación interpretativa que resolviera de antemano la relación entre el agua y la purificación ritual.
