  to: Ama el temor de Yahvé[a], y alegra tu corazón en ello[b]; y no temas.
  rationale: Se hace una reparación pequeña para reflejar mejor la incertidumbre idiomática del hebreo y acercarse más a la nota léxica auditada, sin abandonar un español natural y eclesialmente legible. «En ello» evita fijar innecesariamente el referente por género español, y la nota b conserva mejor la explicación documentada de la expresión difícil.
