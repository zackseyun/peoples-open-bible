translation:
  language: es
  text: Yahvé Dios hizo vestiduras de piel para el hombre y para su esposa[a][b], y los vistió.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'para Adán'. El hebreo אָדָם puede funcionar como el nombre personal 'Adán' o como el sustantivo común 'hombre', según el contexto.
    reason: alternative_reading
  - marker: b
    text: O 'vestiduras de piel'.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino del Tetragrámaton en forma transliterada, conforme a la práctica POB. 'Yahvé' mantiene la referencia personal de la revelación y evita la sustitución por un título.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: HALOT
  rationale: En aposición con Yahvé, corresponde 'Dios' sin añadir un artículo innecesario en español, manteniendo el sentido del binomio narrativo.
- source_word: לְאָדָם
  english_pob_choice: for the man
  chosen_spanish: para el hombre
  alternatives_spanish:
  - para Adán
  - para la humanidad
  lexicon: HALOT
  rationale: Aquí אָדָם funciona como sustantivo común en contraste con 'su esposa'. 'El hombre' preserva la ambigüedad literaria sin fijar prematuramente el nombre propio.
- source_word: וּלְאִשְׁתּוֹ
  english_pob_choice: and for his wife
  chosen_spanish: y para su esposa
  alternatives_spanish:
  - y para la mujer
  - y para su mujer
  lexicon: HALOT
  rationale: En este contexto marital, 'esposa' expresa con naturalidad la relación implícita del sufijo posesivo. 'Mujer' sería posible, pero menos preciso en español actual.
- source_word: כָּתְנוֹת
  english_pob_choice: garments
  chosen_spanish: vestiduras
  alternatives_spanish:
  - túnicas
  - vestidos
  lexicon: HALOT
  rationale: כֻּתֹּנֶת se refiere a una prenda corporal. 'Vestiduras' es digno, natural y suficientemente amplio; evita especificar más de lo que el hebreo exige.
- source_word: עוֹר
  english_pob_choice: skin
  chosen_spanish: piel
  alternatives_spanish:
  - cuero
  - cuero curtido
  - hides
  lexicon: HALOT
  rationale: '''Piel'' sigue de cerca el valor básico de עוֹר. ''Cuero'' introduciría una elaboración material no explicitada por el hebreo.'
- source_word: וַיַּעַשׂ
  english_pob_choice: made
  chosen_spanish: hizo
  alternatives_spanish:
  - fabricó
  - preparó
  lexicon: HALOT
  rationale: '''Hizo'' reproduce el verbo común עשה con sencillez y sin añadir un matiz de manufactura más específico del que ofrece el texto.'
- source_word: וַיַּלְבִּשֵׁם
  english_pob_choice: and clothed them
  chosen_spanish: y los vistió
  alternatives_spanish:
  - y los cubrió con ropa
  - y los puso vestiduras
  lexicon: HALOT
  rationale: El hifil de לבש significa causar que alguien vista una prenda. 'Los vistió' es la forma más natural y fiel en español, conservando el acto de ponerles las vestiduras.
theological_decisions:
- issue: Ambigüedad de אָדָם entre nombre propio y sustantivo común
  english_pob_reading: 'common noun: ''the man'''
  chosen_spanish_reading: 'sustantivo común: ''el hombre'''
  alternative_spanish_readings:
  - 'nombre propio: ''Adán'''
  rationale: La escena contrasta al varón con 'su esposa', y el hebreo permite conservar la lectura común sin cerrar la ambigüedad narrativa. Esto sigue la decisión POB de no endurecer el nombre propio antes de que el contexto lo requiera.
  doctrine_reference: 'DOCTRINE.md: אָדָם por defecto ''hombre / humanidad (según contexto)'', con prioridad al valor contexto-específico.'
translation_notes:
  revision_awareness: No se registraron revisiones aplicadas en el paquete inglés; la traducción española sigue la misma resolución auditada, conservando la ambigüedad de אָדָם y la alternativa léxica para כָּתְנוֹת/עוֹר.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יְהוָה conforme al estándar POB en español.
  - Se usa 'Dios' para אֱלֹהִים en aposición, sin añadir fórmulas litúrgicas ajenas al hebreo.
  - La expresión 'lo vistió' conserva el singular implícito del sujeto divino y el objeto plural humano de forma idiomática en español.
  - '''Esposa'' se eligió por claridad relacional; no se sustituyó por ''mujer'' para evitar una lectura menos precisa en español contemporáneo.'
