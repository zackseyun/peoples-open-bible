base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/033/027.yaml
  text: 'Thus you shall say to them[a], ‘Thus says the Lord GOD: As I live, surely those who are in the ruins will fall by the sword, and whoever is on the face of the field I have given to the wild animals to be devoured[c][b], and those who are in the strongholds and in the caves will die by pestilence.’'
  footnotes:
  - marker: a
    text: Hebrew 'waste places' or 'desolate places'; rendered 'ruins' for clear modern English in context.
    reason: lexical_alternative
  - marker: b
    text: Or 'I have given him for food to the wild animals.' The Hebrew uses a singular suffix, likely with distributive force.
    reason: lexical_alternative
  - marker: c
    text: Or 'plague.'
    reason: lexical_alternative
