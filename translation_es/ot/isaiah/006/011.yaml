translation:
  language: es
  text: 'Entonces dije[a]: «¿Hasta cuándo, Señor?». Y él dijo: «Hasta que las ciudades queden asoladas, sin habitante, y las casas sin gente, y la tierra sea devastada, una desolación».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Cuánto tiempo, Señor?»'
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֹמַר
  english_pob_choice: Then I said
  chosen_spanish: Entonces dije
  alternatives_spanish:
  - Y dije
  lexicon: HALOT
  rationale: La waw consecutiva avanza la narración; «Entonces dije» conserva la secuencia y suena natural en español sin perder el valor simple del verbo.
- source_word: עַד מָתַי
  english_pob_choice: Until when
  chosen_spanish: ¿Hasta cuándo?
  alternatives_spanish:
  - ¿Cuánto tiempo?
  - ¿Hasta cuándo, Señor?
  lexicon: HALOT
  rationale: La pregunta hebrea es literalmente temporal («hasta cuándo»). En español, la forma idiomática y fiel es «¿Hasta cuándo?», que mantiene el enlace con la respuesta introducida por עַד אֲשֶׁר.
- source_word: אֲדֹנָי
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - mi Señor
  lexicon: HALOT
  rationale: Es el título divino dirigido a Yahvé. «Señor» es el equivalente reverente y natural en español; no hace falta explicitar «mi» porque el título ya funciona lexicalmente como vocativo.
- source_word: עַד אֲשֶׁר אִם
  english_pob_choice: Until
  chosen_spanish: Hasta que
  alternatives_spanish:
  - Hasta el punto de que
  - Hasta el momento en que
  lexicon: HALOT
  rationale: La construcción introduce el límite de la sentencia. «Hasta que» expresa bien el valor limitativo sin forzar una traducción demasiado literal de las partículas.
- source_word: שָׁאוּ
  english_pob_choice: lie waste
  chosen_spanish: yacieran en ruinas
  alternatives_spanish:
  - estuvieran devastadas
  - estuvieran desoladas
  lexicon: HALOT
  rationale: El verbo expresa devastación/arruinamiento. «Yacieran en ruinas» comunica el estado resultante con fuerza visual y respeta el tono profético.
- source_word: עָרִים
  english_pob_choice: cities
  chosen_spanish: las ciudades
  alternatives_spanish:
  - las urbes
  lexicon: HALOT
  rationale: Plural directo de «ciudad». «Las ciudades» es el equivalente claro y natural.
- source_word: מֵאֵין יוֹשֵׁב
  english_pob_choice: without inhabitant
  chosen_spanish: sin habitante
  alternatives_spanish:
  - sin nadie que habite
  - sin moradores
  lexicon: HALOT
  rationale: La frase hebrea indica ausencia de ocupantes. «Sin habitante» es breve, cercano al original y mantiene el paralelismo con la línea siguiente.
- source_word: וּבָתִּים מֵאֵין אָדָם
  english_pob_choice: and houses without people
  chosen_spanish: y las casas sin gente
  alternatives_spanish:
  - y las casas sin nadie
  - y las casas sin persona
  lexicon: HALOT
  rationale: אָדָם aquí es genérico; el audit trail inglés revisó esta línea hacia un equivalente inclusivo. «Sin gente» expresa bien la ausencia humana en español y evita una posible lectura masculina restringida.
- source_word: וְהָאֲדָמָה
  english_pob_choice: and the land
  chosen_spanish: y la tierra
  alternatives_spanish:
  - y el país
  - y el suelo
  lexicon: HALOT
  rationale: En este contexto de juicio nacional, אֲדָמָה se refiere al territorio/terreno en conjunto. «La tierra» es la forma más amplia y natural en español.
- source_word: תִּשָּׁאֶה
  english_pob_choice: is laid waste
  chosen_spanish: quede
  alternatives_spanish:
  - sea arrasada
  - sea devastada
  lexicon: HALOT
  rationale: El niphal expresa llegar a un estado de desolación. En español, dentro de la subordinada de finalidad/tiempo introducida por «hasta que», «quede» comunica el resultado sin sobrecargar el verso con otro verbo fuerte que repita la misma raíz.
- source_word: שְׁמָמָה
  english_pob_choice: a desolation
  chosen_spanish: una desolación
  alternatives_spanish:
  - desolada
  - en desolación
  lexicon: HALOT
  rationale: El sustantivo final intensifica la devastación. «Una desolación» conserva el golpe nominal del hebreo y la acumulación retórica del texto.
theological_decisions:
- issue: Vocativo divino אֲדֹנָי
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - mi Señor
  rationale: En Isaías, el hablante se dirige al Dios de Israel. Traducirlo como «Señor» preserva el valor reverente del título sin introducir una posesión explícita que el español no requiere en este registro.
  doctrine_reference: DOCTRINE.md §Translation philosophy; tratamiento de títulos divinos
- issue: אָדָם en sentido genérico
  english_pob_reading: people
  chosen_spanish_reading: gente
  alternative_spanish_readings:
  - personas
  - hombres
  rationale: El hebreo usa אָדָם de manera genérica para seres humanos. Dado que la revisión inglesa prefirió una formulación inclusiva en esta línea, «gente» evita restringir el sentido a varones y mantiene la desolación total del paralelismo.
  doctrine_reference: 'DOCTRINE.md §Translation philosophy 4; Contested terms: אָדָם'
- issue: Cadena de desolación profética
  english_pob_reading: cities lie waste ... houses without people ... land is laid waste, a desolation
  chosen_spanish_reading: las ciudades yacieran en ruinas ... las casas sin gente ... la tierra quede una desolación
  alternative_spanish_readings:
  - las ciudades queden arrasadas ...
  - la tierra sea desolada, una desolación
  rationale: La progresión hebrea acumula imágenes de juicio. La versión española conserva esa escalada, con un verbo más pictórico para las ciudades y un cierre nominal para la tierra, sin diluir la repetición temática de devastación.
  doctrine_reference: ISA.6.11 source packet; Hebrew poetic parallelism
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente del inglés POB: se prefirió una solución que refleje el ajuste hacia «lie waste»/«laid waste» con lenguaje español natural; también se siguió la decisión revisada de expresar אָדָם de forma inclusiva en esta línea. La puntuación y el encadenamiento oracional buscan conservar el paralelismo profético del hebreo.'
  spanish_consistency_notes:
  - Se mantiene «Señor» para אֲדֹנָי, conforme al tratamiento reverente habitual de títulos divinos en español.
  - Se traduce מֵאֵין יוֹשֵׁב con una frase breve y paralela a «sin gente», evitando explicaciones intrusivas dentro del verso.
  - «Una desolación» conserva la intensificación nominal del hebreo y evita suavizar el cierre del oráculo.
  - Los verbos de devastación se distribuyen para no repetir mecánicamente la misma raíz en español, pero sin perder la acumulación semántica del original.
