  text: וְ/כִֽי יִנָּצ֣וּ אֲנָשִׁ֗ים וְ/נָ֨גְפ֜וּ אִשָּׁ֤ה הָרָה֙ וְ/יָצְא֣וּ יְלָדֶ֔י/הָ וְ/לֹ֥א יִהְיֶ֖ה אָס֑וֹן עָנ֣וֹשׁ יֵעָנֵ֗שׁ כַּֽ/אֲשֶׁ֨ר יָשִׁ֤ית עָלָי/ו֙ בַּ֣עַל הָֽ/אִשָּׁ֔ה וְ/נָתַ֖ן בִּ/פְלִלִֽים־׃
base_translation:
  language: en
  yaml_path: translation/ot/exodus/021/022.yaml
  text: When men struggle together and strike a pregnant woman so that her children come out[a], but there is no harm, he shall surely be fined as the woman's husband imposes on him[c][b], and he shall pay according to the judges.
  footnotes:
  - marker: a
    text: Literally, 'her children come out.' This may refer to a premature birth; some translations render it 'so that she gives birth prematurely,' while others interpret it as miscarriage.
    reason: lexical_alternative
  - marker: b
    text: Or 'harm.' The Hebrew does not specify in this verse alone whether the serious injury concerns the mother, the child, or either one.
    reason: alternative_reading
  - marker: c
    text: Or 'by judicial decision' / 'before the court.'
    reason: lexical_alternative
