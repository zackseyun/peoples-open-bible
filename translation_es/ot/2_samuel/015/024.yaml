    text: Or 'They placed the ark of God.' The Hebrew verb may denote setting it down or positioning it there.
    reason: lexical_alternative
  - marker: c
    text: Or 'Abiathar came up.' The Hebrew literally says 'went up,' and the precise narrative nuance is uncertain.
    reason: alternative_reading
