  language: en
  yaml_path: translation/deuterocanon/tobit/004/019.yaml
  text: And at all times bless the Lord God[a], and ask from him that your ways may be made straight and that all your paths and plans may prosper. For no nation has counsel, but the Lord himself gives all good things, and whomever he wills he humbles, just as he pleases. And now, child, remember my commandments[b], and do not let them be blotted out from your heart.
  footnotes:
  - marker: a
    text: Or 'all your paths and counsels may succeed.' The Greek βουλαί can mean 'plans,' 'purposes,' or 'counsels.'
    reason: lexical_alternative
  - marker: b
    text: The clause 'no nation has counsel' is abrupt in Greek and may mean that no people possesses ultimate counsel in itself, in contrast to the Lord, who gives good things and humbles whomever he wills.
    reason: alternative_reading
