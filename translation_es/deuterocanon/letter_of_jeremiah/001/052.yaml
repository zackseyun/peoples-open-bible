translation:
  language: es
  text: Porque ciertamente no levantarán un rey para un país[a], ni de ningún modo darán lluvia a los hombres[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'para una tierra' o 'para una región'. El griego χώρας puede significar tierra, país o región.
    reason: lexical_alternative
  - marker: b
    text: '''A los hombres'' conserva la forma masculina del griego, con sentido genérico para los seres humanos en general.'
    reason: lexical_alternative
lexical_decisions:
- source_word: βασιλέα
  english_pob_choice: a king
  chosen_spanish: un rey
  alternatives_spanish:
  - rey
  lexicon: LSJ
  rationale: El acusativo singular es objeto de ἀναστήσωσιν; en español, el artículo indefinido expresa bien el valor no específico del griego anartro y conserva la naturalidad.
- source_word: χώρας
  english_pob_choice: for a country
  chosen_spanish: para una tierra
  alternatives_spanish:
  - para un país
  - para una región
  lexicon: LSJ
  rationale: χώρα puede significar tierra, país o región. 'Tierra' mantiene mejor el rango semántico amplio y evita modernizar excesivamente a 'país'.
- source_word: οὐ μὴ ἀναστήσωσιν
  english_pob_choice: will certainly not raise up
  chosen_spanish: ciertamente no levantarán
  alternatives_spanish:
  - no levantarán en absoluto
  - de ningún modo alzarán
  lexicon: BDAG
  rationale: La combinación οὐ μή con subjuntivo aoristo expresa negación enfática de futuro. 'Ciertamente no' preserva la fuerza absoluta, y 'levantarán' comunica en español el sentido de establecer o hacer surgir a un rey.
- source_word: ὑετόν
  english_pob_choice: rain
  chosen_spanish: lluvia
  alternatives_spanish:
  - un aguacero
  - precipitación
  lexicon: LSJ
  rationale: Es el equivalente directo y natural en español, sin añadir matiz innecesario.
- source_word: ἀνθρώποις
  english_pob_choice: to people
  chosen_spanish: a los hombres
  alternatives_spanish:
  - a las personas
  - a los seres humanos
  lexicon: BDAG
  rationale: Se conserva la forma masculina plural del griego con valor representativo/genericizante. En español bíblico, 'los hombres' mantiene esa correspondencia formal.
- source_word: οὐ μὴ δῶσιν
  english_pob_choice: will certainly give
  chosen_spanish: ciertamente darán
  alternatives_spanish:
  - de ningún modo darán
  - nunca darán
  lexicon: BDAG
  rationale: La fuerza de οὐ μή se refleja con 'ciertamente' en la negación global de la cláusula; el verbo simple en futuro suena natural en español coordinado con la primera negación.
- source_word: γάρ
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: '''Porque'' reproduce bien el valor explicativo y causal de γάρ en una frase española fluida.'
theological_decisions:
- issue: Negación enfática de la capacidad de los ídolos para actuar como dadores de soberanía y lluvia
  english_pob_reading: They certainly will not raise up a king for a country, nor will they certainly give rain to people.
  chosen_spanish_reading: Ciertamente no levantarán un rey para una tierra, ni ciertamente darán lluvia a los hombres.
  alternative_spanish_readings:
  - No podrán levantar un rey para una tierra ni dar lluvia a la gente.
  - De ningún modo establecerán un rey para una región ni darán lluvia a las personas.
  rationale: 'La lectura preserva la impotencia total atribuida a los ídolos: no pueden instituir soberanía ni otorgar fertilidad/lluvia. Mantener la doble negación enfática ayuda a reflejar la contundencia del griego.'
  doctrine_reference: Deuteronomio 32:39; Jeremías 10:5
translation_notes:
  revision_awareness: 'Tomé como base el texto griego de Swete LXX 1909 y contrasté el criterio de la POB inglesa: se mantuvo la negación enfática οὐ μή, se respetó el valor amplio de χώρας y se conservó el masculino genérico de ἀνθρώποις, aunque en español se eligió una redacción más natural y publicable.'
  spanish_consistency_notes:
  - Uso 'Yahvé' para el nombre divino cuando aparezca en el contexto inmediato; este versículo no lo contiene.
  - '''Tierra'' se eligió como equivalente semánticamente amplio para χώρας, evitando ''país'' por su posible modernización.'
  - 'La cláusula coordinada mantiene paralelismo: ''ciertamente no... ni ciertamente...'' para reflejar la doble negación enfática del griego.'
