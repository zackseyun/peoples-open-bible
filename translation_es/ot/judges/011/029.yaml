  revised_footnotes:
  - marker: a
    text: 'O: «cruzó hacia los amonitas». El verbo hebreo puede denotar pasar por, cruzar o avanzar, según el contexto.'
    reason: lexical_alternative
  revision_rationale: Se conserva todo el contenido del borrador, pero se corrige la última cláusula a «siguió hacia los amonitas» para un español más natural y para reflejar mejor el sentido direccional de עָבַר en este contexto. También se normaliza la redacción de la nota al pie.
