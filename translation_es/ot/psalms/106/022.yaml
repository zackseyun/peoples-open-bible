lexical_decisions:
- source_word: נִפְלָאוֹת
  english_pob_choice: wondrous things
  chosen_spanish: maravillas
  alternatives_spanish:
  - cosas maravillosas
  - prodigios
  lexicon: HALOT
  rationale: El sustantivo plural de פלא expresa actos o hechos extraordinarios. En español, «maravillas» comunica bien esa cualidad poética sin añadir matiz técnico excesivo.
- source_word: בְּאֶרֶץ
  english_pob_choice: in the land of
  chosen_spanish: en la tierra de
  alternatives_spanish:
  - en el país de
  - en la tierra
  lexicon: HALOT
  rationale: La construcción locativa con אֶרֶץ se vierte de forma natural como «en la tierra de», preservando el paralelismo poético y el valor territorial.
- source_word: חָם
  english_pob_choice: Ham
  chosen_spanish: Cam
  alternatives_spanish:
  - Egipto
  lexicon: HALOT
  rationale: Se conserva el nombre propio transliterado, como en el texto hebreo. Aunque el referente contextual es Egipto, el poema nombra a Cam; por eso no se sustituye por la interpretación.
- source_word: נ֝וֹרָאוֹת
  english_pob_choice: awesome things
  chosen_spanish: cosas asombrosas
  alternatives_spanish:
  - cosas temibles
  - cosas terribles
  lexicon: HALOT
  rationale: La raíz comunica hechos que provocan temor reverente. «Asombrosas» mantiene la fuerza de admiración y sobrecogimiento sin sugerir maldad moral.
- source_word: עַל
  english_pob_choice: by
  chosen_spanish: junto a
  alternatives_spanish:
  - por
  - al lado de
  lexicon: HALOT
  rationale: Con un referente geográfico, עַל puede indicar ubicación cercana. «Junto a» suena natural en español y conserva la relación espacial del hebreo.
- source_word: יַם סוּף
  english_pob_choice: the Red Sea
  chosen_spanish: mar Rojo
  alternatives_spanish:
  - mar de Juncos
  lexicon: HALOT
  rationale: Se mantiene la forma tradicional española equivalente al referente bíblico establecido, y se conserva en nota la posibilidad literal «mar de Juncos».
translation_notes:
  revision_awareness: 'El pasaje coincide plenamente con el audit trail inglés: se preserva el nombre poético «Cam», la traducción tradicional «mar Rojo» y la alternativa lexical del topónimo hebreo en nota, sin introducir cambios textuales ni interpretativos adicionales.'
  spanish_consistency_notes:
  - Se evita «SEÑOR» u otras sustituciones no presentes en el verso.
  - «Cam» se mantiene como nombre poético y no se glosa en el texto principal.
  - La puntuación conserva el paralelismo breve del hebreo con una coma medial.
  - La nota lexical usa una única marca [a] y no se reutiliza en otro lugar.
