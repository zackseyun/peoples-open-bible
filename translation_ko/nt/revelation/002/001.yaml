  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Τῷ ἀγγέλῳ ⸀τῆς ἐν Ἐφέσῳ ἐκκλησίας γράψον· Τάδε λέγει ὁ κρατῶν τοὺς ἑπτὰ ἀστέρας ἐν τῇ δεξιᾷ αὐτοῦ, ὁ περιπατῶν ἐν μέσῳ τῶν ἑπτὰ λυχνιῶν τῶν χρυσῶν·
base_translation:
  language: en
  yaml_path: translation/nt/revelation/002/001.yaml
  text: 'To the angel of the church in Ephesus write: These things says the one who holds the seven stars in his right hand[a], who walks among the seven golden lampstands:'
  footnotes:
  - marker: a
    text: Or 'messenger' of the church in Ephesus.
    reason: alternative_reading
translation:
  language: ko
  text: '에베소에 있는 회중의 천사에게 써라. 「오른손에 일곱 별을 붙드시고, 일곱 금 등잔대 사이를 거니시는 분께서 이같이 말씀하신다.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Τάδε λέγει
  english_pob_choice: These things says
  chosen_korean: 이같이 말씀하신다
  alternatives_korean:
  - 이렇게 말씀하시는 분
  lexicon: BDAG
  rationale: 'Τάδε λέγει는 LXX 예언서의 「여호와께서 이같이 말씀하시되」 정형의 직접 반향이다. 일곱 회중 편지에서 일관되게 「이같이 말씀하신다」로 옮긴다.'
theological_decisions:
- issue: 일곱 회중 편지의 형식적 도입(Τάδε λέγει + 칭호 + Οἶδα)을 일관되게 보존
  chosen_reading: '「~께서 이같이 말씀하신다. 내가 ~을 안다」 정형'
  alternative_readings:
  - 전령식 정형을 풀어 옮김
  rationale: '각 편지는 LXX 예언서의 전령 정형(「여호와께서 이같이 말씀하시되」)을 반향하며, 그분의 정체를 알리는 칭호 + 회중에 대한 인식(Οἶδα)을 정형으로 잇는다. 이 구조적 일관성을 한국어로도 7편지 전체에 보존한다.'
  doctrine_reference: 'DOCTRINE.md: 본문 형식 보존'
