id: 2TI.4.5
reference: 2 Timothy 4:5
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: σὺ δὲ νῆφε ἐν πᾶσιν, κακοπάθησον, ἔργον ποίησον εὐαγγελιστοῦ, τὴν διακονίαν σου πληροφόρησον.
base_translation:
  language: en
  yaml_path: translation/nt/2_timothy/004/005.yaml
  text: But as for you, keep a clear head in all things, endure hardship, do the work of an evangelist, fully carry out your ministry.
translation:
  language: ko
  text: 그러나 그대는 어떤 일에서든 정신을 차리고 있으십시오.[a] 고난을 견뎌 내고, 복음 전도자의 일을 하며, 그대의 사역을 끝까지 다하십시오.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 헬라어 νῆφε는 본래 「술 깬 상태로 있음」을 뜻하며, 신약에서는 늘 비유적으로 정신적 명료함과 자기 다스림, 압박 속에서의 침착함을 가리킨다.
    reason: lexical_alternative
lexical_decisions:
- source_word: νῆφε ἐν πᾶσιν
  english_pob_choice: keep a clear head in all things
  chosen_korean: 어떤 일에서든 정신을 차리고 있으십시오
  alternatives_korean:
  - 모든 일에 깨어 있으십시오
  - 모든 일에 정신을 똑바로 차리십시오
  lexicon: BDAG
  rationale: νήφω의 「술 깬·명료한 정신」을 한국어 「정신을 차리고 있다」로 자연스럽게 옮긴다. 2:26의 「깨어나 정신을 차리다」(ἀνανήφω)와 어휘적 연결을 살린다.
- source_word: κακοπάθησον
  english_pob_choice: endure hardship
  chosen_korean: 고난을 견뎌 내고
  alternatives_korean:
  - 고난을 받으십시오
  - 고생을 감수하십시오
  lexicon: BDAG
  rationale: 2:9의 κακοπαθῶ(고난을 받고 있습니다)와 어휘 통일. 부정과거 명령형의 결단성을 「견뎌 내라」로 살린다.
- source_word: ἔργον ποίησον εὐαγγελιστοῦ
  english_pob_choice: do the work of an evangelist
  chosen_korean: 복음 전도자의 일을 하며
  alternatives_korean:
  - 전도인의 일을 행하고
  - 복음을 전하는 자의 일을 하고
  lexicon: BDAG
  rationale: εὐαγγελιστής는 「복음을 전하는 자」. 한국 성서 전통의 「전도자」가 자연스럽다.
- source_word: τὴν διακονίαν σου πληροφόρησον
  english_pob_choice: fully carry out your ministry
  chosen_korean: 그대의 사역을 끝까지 다하십시오
  alternatives_korean:
  - 그대의 직무를 완수하십시오
  - 그대의 봉사를 충만히 이루십시오
  lexicon: BDAG
  rationale: πληροφορέω는 「충만히 채움·완성에 이르게 함」. 「끝까지 다하다」가 본문의 임박한 죽음의 그림자 아래에서 사역의 완성을 부탁하는 무게를 자연스럽게 담는다.
