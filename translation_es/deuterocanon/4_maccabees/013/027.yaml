base_translation:
  language: en
  yaml_path: translation/deuterocanon/4_maccabees/013/027.yaml
  text: But likewise[a], although nature and custom and the traits of virtue were drawing together for them the bonds of brotherhood, those who were left behind endured, because of piety, as they watched their brothers, who were being pitied[b], being tortured to death.
  footnotes:
  - marker: a
    text: Or 'the bonds of brotherhood' for 'the affections of brotherhood.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'those remaining endured because of piety, seeing their brothers being tortured until death and being pitied.' The Greek packs several participles into a compressed sentence.
    reason: lexical_alternative
