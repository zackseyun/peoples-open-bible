translation:
  language: es
  text: Él también anduvo[a] según sus consejos, y fue con Jehoram, hijo de Acab, rey de Israel, a la guerra contra Hazael, rey de Aram, en Ramot de Galaad[b][c]; y los arameos hirieron a Joram.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de acuerdo con sus consejos». El hebreo usa un modismo («andar en/por el consejo de alguien») para decir que su conducta estuvo guiada por ese consejo.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «Aram»; tradicionalmente «Siria». Del mismo modo, «arameos» corresponde al gentilicio que otras versiones suelen traducir «sirios».'
    reason: alternative_reading
  - marker: c
    text: 'El hebreo usa formas relacionadas del mismo nombre: «Jehoram» antes en el verso y «Joram» al final.'
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּם
  english_pob_choice: also
  chosen_spanish: También
  alternatives_spanish:
  - además
  - incluso
  lexicon: HALOT
  rationale: Introduce continuidad y énfasis respecto del contexto anterior; «también» conserva esa función sin sonar forzado en español.
- source_word: בַּעֲצָתָם
  english_pob_choice: by their counsel
  chosen_spanish: según su consejo
  alternatives_spanish:
  - por su consejo
  - de acuerdo con su consejo
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y señala conducta guiada por la सलाह/advice de otros. «Según su consejo» conserva la relación normativa e instrumental de forma natural en español.
- source_word: הָלַךְ
  english_pob_choice: walked
  chosen_spanish: anduvo
  alternatives_spanish:
  - caminó
  - se condujo
  lexicon: HALOT
  rationale: Con «consejo» el verbo es un modismo de conducta. «Anduvo» conserva la metáfora bíblica de caminar sin perder claridad; evita reducirlo solo a movimiento físico.
- source_word: וַיֵּלֶךְ אֶת
  english_pob_choice: he went with
  chosen_spanish: fue con
  alternatives_spanish:
  - acompañó a
  - fue junto con
  lexicon: HALOT
  rationale: La construcción indica acompañamiento a Joram. «Fue con» es breve, fiel e idiomático en español.
- source_word: יְהוֹרָם ... יוֹרָם
  english_pob_choice: Jehoram ... Joram
  chosen_spanish: Joram ... Joram
  alternatives_spanish:
  - Jehoram ... Joram
  - Jehoram ... Jehoram
  lexicon: HALOT
  rationale: En español, «Jehoram» y «Joram» son formas relacionadas del mismo nombre. Para evitar una distinción artificial en una sola línea narrativa y mantener fluidez, se usa la forma breve «Joram» en ambos lugares, aunque se preserva la nota sobre la variación hebrea.
- source_word: לַמִּלְחָמָה
  english_pob_choice: to war
  chosen_spanish: a la guerra
  alternatives_spanish:
  - para la guerra
  - a combatir
  lexicon: HALOT
  rationale: El sustantivo indica propósito. «A la guerra» es natural después de «fue con» y mantiene el sentido militar del hebreo.
- source_word: עַל
  english_pob_choice: against
  chosen_spanish: contra
  alternatives_spanish:
  - en contra de
  - frente a
  lexicon: HALOT
  rationale: En contexto militar, la preposición marca hostilidad dirigida. «Contra» es el equivalente directo y claro.
- source_word: אֲרָם
  english_pob_choice: Aram
  chosen_spanish: Aram
  alternatives_spanish:
  - Siria
  lexicon: HALOT
  rationale: Se conserva el nombre histórico y étnico del texto hebreo en vez de la convención tradicional «Siria», siguiendo la prioridad del original.
- source_word: בְּרָמוֹת גִּלְעָד
  english_pob_choice: at Ramoth-gilead
  chosen_spanish: en Ramot-galaad
  alternatives_spanish:
  - en Ramot de Galaad
  - en Ramot-galaad
  lexicon: HALOT
  rationale: El topónimo se adapta al español bíblico con forma compacta y legible. «En» expresa ubicación de la batalla con naturalidad.
- source_word: וַיַּכּוּ
  english_pob_choice: wounded
  chosen_spanish: hirieron
  alternatives_spanish:
  - golpearon
  - lastimaron
  lexicon: HALOT
  rationale: El hebreo indica que recibió un golpe/ataque efectivo; en el contexto inmediato, «hirieron» mantiene la acción y deja abierta la precisión de la lesión sin adelantarse demasiado.
- source_word: הָרַמִּים
  english_pob_choice: the Arameans
  chosen_spanish: los arameos
  alternatives_spanish:
  - los sirios
  lexicon: HALOT
  rationale: Se traduce el gentilicio de Aram como «arameos» para conservar la relación con el nombre propio «Aram» y evitar la convención posterior «sirios».
theological_decisions:
- issue: Nombre nacional אֲרָם y su gentilicio
  english_pob_reading: Aram / Arameans
  chosen_spanish_reading: Aram / arameos
  alternative_spanish_readings:
  - Siria / sirios
  rationale: No es una cuestión doctrinal, pero sí de fidelidad histórica y léxica. Se mantiene el término del hebreo y se evita la etiqueta tradicional posterior que puede desdibujar la designación original.
  doctrine_reference: Translation philosophy §1
translation_notes:
  revision_awareness: 'El texto sigue de cerca el audit trail inglés y el hebreo: conserva el modismo de «andar según su consejo», mantiene Aram/arameos en lugar de Siria/sirios, y da cuenta de la variación nominal hebrea Jehoram/Joram sin crear una distinción innecesaria en la línea principal.'
  spanish_consistency_notes:
  - Se usó «Aram» y «arameos» de manera consistente con la política del proyecto.
  - Se evitó «SEÑOR» porque el versículo no contiene el nombre divino.
  - Se prefirió una sintaxis sobria y bíblica, pero natural para español moderno.
  - La nota sobre el nombre propio explica la uniformación de «Joram» en la traducción principal, preservando la tensión textual en la nota.
