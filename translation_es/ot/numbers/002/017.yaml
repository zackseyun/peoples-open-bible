translation:
  language: es
  text: Entonces partirá la tienda de reunión, con el campamento de los levitas en medio de los campamentos. Tal como acampan, así partirán, cada uno en su lugar[a], según sus estandartes[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'en su puesto' para 'en su lugar'; el hebreo usa un modismo con 'mano/lado' que alude a la ubicación asignada en el orden de marcha.
    reason: lexical_alternative
  - marker: b
    text: O 'según sus enseñas' para 'según sus estandartes'; el término señala las divisiones tribales marcadas por sus insignias.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָסַע
  english_pob_choice: Then ... shall set out
  chosen_spanish: Entonces partirá
  alternatives_spanish:
  - Y partirá
  - Entonces se pondrá en marcha
  lexicon: HALOT
  rationale: נָסַע en contexto de campamento significa levantarse y avanzar; 'partirá' conserva esa idea con un español natural. 'Entonces' refleja la secuencia dentro del orden de marcha.
- source_word: אֹהֶל מוֹעֵד
  english_pob_choice: the tent of meeting
  chosen_spanish: la tienda de reunión
  alternatives_spanish:
  - la tienda del encuentro
  - el tabernáculo de reunión
  lexicon: HALOT
  rationale: '''Tienda de reunión'' mantiene el sentido concreto de אֹהֶל y la función cultual de מוֹעֵד sin introducir terminología posterior como ''tabernáculo'' si no es necesaria.'
- source_word: מַחֲנֵה הַלְוִיִּם
  english_pob_choice: the camp of the Levites
  chosen_spanish: el campamento de los levitas
  alternatives_spanish:
  - el campamento levítico
  - la hueste de los levitas
  lexicon: HALOT
  rationale: La cadena constructa se vierte de manera directa y transparente. 'Levitas' conserva la designación tribal; 'campamento' es el equivalente más natural de מַחֲנֶה.
- source_word: בְּת֣וֹךְ הַֽמַּחֲנֹ֑ת
  english_pob_choice: in the midst of the camps
  chosen_spanish: en medio de los campamentos
  alternatives_spanish:
  - en medio del campamento
  - entre los campamentos
  lexicon: HALOT
  rationale: בְּתוֹךְ indica posición central; 'en medio de' preserva esa imagen espacial y el plural 'campamentos' refleja el conjunto de las tribus alrededor.
- source_word: כַּאֲשֶׁר יַחֲנוּ כֵּן יִסָּעוּ
  english_pob_choice: Just as they camp, so they shall set out
  chosen_spanish: Tal como acampan, así partirán
  alternatives_spanish:
  - Así como acampan, así partirán
  - Como acampan, así partirán
  lexicon: HALOT
  rationale: La cláusula expresa correspondencia entre la disposición al acampar y la disposición al partir. 'Tal como... así...' conserva el paralelismo hebreo sin sonar forzado en español.
- source_word: אִישׁ
  english_pob_choice: each
  chosen_spanish: cada uno
  alternatives_spanish:
  - cada hombre
  - uno por uno
  lexicon: HALOT
  rationale: Aunque אִישׁ es singular, aquí funciona distributivamente. 'Cada uno' reproduce la fuerza distributiva sin imponer una marcación de género innecesaria en español.
- source_word: עַל יָדֹו
  english_pob_choice: in his place
  chosen_spanish: en su lugar
  alternatives_spanish:
  - en su puesto
  - según su posición
  lexicon: HALOT
  rationale: El hebreo idiomático alude a la ubicación asignada en el orden de marcha; 'en su lugar' comunica esa función de manera clara y fiel, sin volver opaca la metáfora de mano/lado.
- source_word: לְדִגְלֵיהֶם
  english_pob_choice: by their banners
  chosen_spanish: según sus estandartes
  alternatives_spanish:
  - por sus estandartes
  - con sus banderas
  lexicon: HALOT
  rationale: דֶּגֶל designa un estandarte tribal que organiza las divisiones del campamento. 'Según sus estandartes' explicita el criterio de orden y respeta el valor organizador del término; 'estandartes' evita la posible ambigüedad de 'banderas' en español contemporáneo.
theological_decisions:
- issue: Nombre divino implícito en el orden del campamento
  english_pob_reading: No explicit divine-name issue is raised in this verse; the verse describes the divinely ordered marching arrangement of the Levite camp and the tent of meeting.
  chosen_spanish_reading: No se introduce ninguna forma de reemplazo para el nombre divino, porque el versículo no contiene יהוה de manera explícita; se mantiene la descripción del orden ritual del campamento.
  alternative_spanish_readings:
  - Usar 'SEÑOR' por convención editorial
  - Mencionar 'Yahvé' de forma interpretativa
  rationale: El texto hebreo de este versículo no incluye el Tetragrámaton. Por tanto, no hay base para insertar 'Yahvé' ni para enmascarar un nombre ausente con 'SEÑOR'. La traducción debe limitarse al orden campamental descrito.
  doctrine_reference: Números 2:17; fidelidad textual al MT
translation_notes:
  revision_awareness: 'Se tomó como base el acuerdo alto del expediente inglés y no se detectaron revisiones aplicadas en el texto fuente. La redacción española sigue el mismo sentido auditado: secuencia (''Entonces''), movimiento campamental (''partirá''), centralidad espacial (''en medio''), paralelismo (''Tal como... así...'') y orden distributivo (''cada uno'').'
  spanish_consistency_notes:
  - Se mantiene 'tienda de reunión' de forma consistente para אֹהֶל מוֹעֵד.
  - Se usa 'levitas' y 'campamento' como equivalentes estables de la cadena constructa.
  - '''Estandartes'' preserva el valor organizador militar/tribal de דֶּגֶל.'
  - La traducción evita 'SEÑOR' porque no hay יהוה explícito en el versículo.
  - '''Cada uno'' conserva el distributivo de אִישׁ sin sobrecargar con masculino genérico innecesario.'
