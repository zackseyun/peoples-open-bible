revisions:
- from: Y tu pacto con la muerte será anulado[a], y tu acuerdo con el Seol[b] no permanecerá; cuando pase el azote arrollador, seréis para él un lugar para ser hollado.
  to: Y tu pacto con la muerte será anulado, y tu acuerdo con el Seol[b] no permanecerá; cuando pase el azote arrollador[a], serás para él un lugar para ser hollado.
  rationale: Se corrige el error principal de anclaje de la nota [a], ubicándola sobre «azote arrollador», que es la expresión a la que realmente corresponde según el expediente inglés. También se uniforma la segunda persona a singular para evitar la mezcla «tu/seréis», dejando intactas las decisiones léxicas sustanciales del borrador. Se conserva «el Seol» y la imagen de «lugar para ser hollado» por su fidelidad razonable al hebreo.
