theological_decisions:
- issue: Identity of 'David my servant'
  chosen_reading: Retain 'David' in the main text without interpretive expansion.
  alternative_readings:
  - the restored historical David
  - a Davidic ruler
  - the Messiah as Davidic king
  rationale: The Hebrew text says 'David,' and the translation should not resolve whether this is literal, typological, or messianic by adding interpretation into the text. The theological tension is preserved by translating the name straightforwardly.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Rendering of אֲבוֹתֵיכֶם
  chosen_reading: your fathers
  alternative_readings:
  - your ancestors
  rationale: The source is grammatically masculine plural and representative. Per the gender-accurate policy, the translation keeps 'fathers' rather than neutralizing to 'ancestors,' while the broader referent can be clarified in a footnote.
  doctrine_reference: Gender-accurate over gender-neutral.
- issue: Rendering of נָשִׂיא
  chosen_reading: prince
  alternative_readings:
  - leader
  - ruler
  rationale: Using 'prince' avoids importing the stronger royal title 'king' where the Hebrew does not use it, which is important in Ezekiel's political and theological vocabulary.
