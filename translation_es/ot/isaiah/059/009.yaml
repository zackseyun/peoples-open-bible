translation:
  language: es
  text: Por eso la justicia está lejos de nosotros[a], y la rectitud no nos alcanza; esperamos la luz, pero he aquí tinieblas; por resplandor[c][b], pero andamos en espesa oscuridad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «juicio está lejos de nosotros».
    reason: lexical_alternative
  - marker: b
    text: O «la rectitud no nos alcanza».
    reason: lexical_alternative
  - marker: c
    text: O «por radiancia, pero andamos en espesa oscuridad».
    reason: lexical_alternative
lexical_decisions:
- source_word: מִשְׁפָּט
  english_pob_choice: justice
  chosen_spanish: justicia
  alternatives_spanish:
  - juicio
  - sentencia
  lexicon: HALOT
  rationale: En este contexto profético, el término señala el orden justo y la recta administración ausentes del pueblo. «Justicia» preserva bien el valor social y legal que el POB inglés quiso destacar frente a «juicio».
- source_word: רָחַק
  english_pob_choice: is far from
  chosen_spanish: está lejos de
  alternatives_spanish:
  - se ha alejado de
  - es distante de
  lexicon: HALOT
  rationale: El perfecto hebreo describe un estado presente resultante; en español, «está lejos de» comunica de manera natural esa condición vigente.
- source_word: צְדָקָה
  english_pob_choice: righteousness
  chosen_spanish: rectitud
  alternatives_spanish:
  - justicia
  - moral rectitud
  lexicon: HALOT
  rationale: El POB distingue este término de מִשְׁפָּט. En español, «rectitud» conserva la fuerza ética y relacional sin colapsarlo con «justicia». «Justicia» aquí sería demasiado repetitivo respecto del primer término.
- source_word: תַשִּׂיגֵנוּ
  english_pob_choice: does not reach us
  chosen_spanish: no nos alcanza
  alternatives_spanish:
  - no nos alcanza a alcanzar
  - no nos llega
  lexicon: HALOT
  rationale: El verbo expresa que aquello esperado no llega a alcanzarnos. «No nos alcanza» es idiomático y mantiene la imagen de algo que no llega hasta el pueblo.
- source_word: נְקַוֶּה
  english_pob_choice: we hope for
  chosen_spanish: esperamos
  alternatives_spanish:
  - aguardamos
  - tenemos esperanza en
  lexicon: HALOT
  rationale: El verbo implica esperar con expectativa. En español, «esperamos» funciona bien aquí y deja abierta la mezcla de espera y esperanza presente en el hebreo.
- source_word: אוֹר
  english_pob_choice: light
  chosen_spanish: la luz
  alternatives_spanish:
  - luz
  - claridad
  lexicon: HALOT
  rationale: Se conserva el sustantivo literal y su carga metafórica de salvación y bienestar.
- source_word: וְהִנֵּה
  english_pob_choice: but behold
  chosen_spanish: y he aquí
  alternatives_spanish:
  - pero he aquí
  - y mira
  lexicon: HALOT
  rationale: «Y he aquí» reproduce con registro digno la fuerza de contraste y de sorpresa del marcador discursivo hebreo, de acuerdo con el uso formal del POB revisado.
- source_word: חֹשֶׁךְ
  english_pob_choice: darkness
  chosen_spanish: tinieblas
  alternatives_spanish:
  - oscuridad
  - oscuridades
  lexicon: HALOT
  rationale: «Tinieblas» es un equivalente bíblico claro y natural en español para el contraste con «luz». Conserva la densidad figurada del término.
- source_word: נְגֹהוֹת
  english_pob_choice: brightness
  chosen_spanish: resplandores
  alternatives_spanish:
  - claridades
  - brillo
  lexicon: HALOT
  rationale: El plural intensifica la idea de luz brillante. «Resplandores» mantiene el matiz plural y la imagen de luminosidad intensa mejor que un singular abstracto.
- source_word: בָּאֲפֵל֥וֹת
  english_pob_choice: deep gloom
  chosen_spanish: en densas oscuridades
  alternatives_spanish:
  - en profunda penumbra
  - en tenebrosidades
  lexicon: HALOT
  rationale: El hebreo indica oscuridad espesa, no simple ausencia de luz. «Densas oscuridades» conserva ese peso; el plural refleja la forma hebrea y la acumulación retórica.
- source_word: נְהַלֵּךְ
  english_pob_choice: we walk
  chosen_spanish: andamos
  alternatives_spanish:
  - caminamos
  - vamos
  lexicon: HALOT
  rationale: El verbo describe el curso de vida. «Andamos» suena natural en español y mantiene la idea de conducta o condición continua.
theological_decisions:
- issue: Distinción entre מִשְׁפָּט y צְדָקָה
  english_pob_reading: Render as 'justice' and 'righteousness' respectively
  chosen_spanish_reading: «justicia» y «rectitud» respectivamente
  alternative_spanish_readings:
  - «juicio» y «justicia»
  - «justicia» para ambos términos
  rationale: 'La poesía hebrea contrapone dos términos relacionados pero no idénticos. Mantenerlos distintos evita borrar la tensión semántica: una ausencia de justicia pública/orden justo y una ausencia de rectitud ética.'
  doctrine_reference: 'DOCTRINE.md Translation philosophy #5; preservación de paralelismo léxico'
- issue: Valor de וְהִנֵּה en la segunda mitad del versículo
  english_pob_reading: but behold, darkness
  chosen_spanish_reading: «y he aquí tinieblas»
  alternative_spanish_readings:
  - «pero he aquí tinieblas»
  - «y he aquí, oscuridad»
  rationale: El marcador introduce una sorpresa amarga entre expectativa y realidad. «Y he aquí» conserva el tono solemne y evita suavizar la contraposición.
  doctrine_reference: DOCTRINE.md register and discourse-marker guidance
translation_notes:
  revision_awareness: He seguido el pasaje revisado del POB inglés, especialmente la preferencia por una forma más natural de תַשִּׂיגֵנוּ («no nos alcanza») y el registro formal de וְהִנֵּה («y he aquí»). También he preservado la distinción explícita entre מִשְׁפָּט y צְדָקָה, evitando colapsar ambos términos en una sola palabra española.
  spanish_consistency_notes:
  - Uso «Yahvé» solo cuando el texto lo requiera; este versículo no contiene el Tetragrámaton.
  - He preferido «rectitud» para צְדָקָה a fin de no repetir «justicia» y mantener el paralelismo.
  - He conservado un registro bíblico sobrio con expresiones como «y he aquí» y «tinieblas», compatibles con lectura eclesial amplia.
