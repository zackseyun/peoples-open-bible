translation:
  language: es
  text: Cuando dijeron estas cosas[a], el tirano se irritó no solo como si fueran desobedientes, sino que también se airó como si fueran ingratos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La frase griega usa plurales masculinos sin sustantivo explícito. En español se sobreentiende el grupo de los hermanos por el contexto; por eso la traducción no añade «hombres» ni otro sustantivo.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ταῦτα
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - esto
  - tales cosas
  lexicon: LSJ
  rationale: El demostrativo neutro plural remite a las palabras anteriores de los hermanos; «estas cosas» conserva bien la referencia discursiva y el plural implícito del griego.
- source_word: εἰπόντων
  english_pob_choice: when they said
  chosen_spanish: cuando dijeron
  alternatives_spanish:
  - después de que dijeron
  - al decir
  lexicon: LSJ
  rationale: El participio aoristo en genitivo absoluto expresa un marco temporal; «cuando dijeron» comunica esa relación de modo natural en español sin añadir más de lo que el texto indica.
- source_word: ὁ τύραννος
  english_pob_choice: the tyrant
  chosen_spanish: el tirano
  alternatives_spanish:
  - el rey
  - el gobernante
  lexicon: LSJ
  rationale: τύραννος tiene aquí valor claramente evaluativo y denota un gobernante opresivo; «tirano» conserva esa fuerza y evita suavizar el juicio del autor.
- source_word: οὐ μόνον ... ἀλλʼ
  english_pob_choice: not only ... but also
  chosen_spanish: no solo ... sino que también
  alternatives_spanish:
  - no solamente ... sino también
  - no solo ... pero también
  lexicon: LSJ
  rationale: La correlación griega se expresa de manera idiomática en español con «no solo ... sino que también», manteniendo el paralelismo y el énfasis.
- source_word: ὡς κατὰ ἀπειθούντων
  english_pob_choice: as against men who were disobedient
  chosen_spanish: como contra los desobedientes
  alternatives_spanish:
  - como contra los que desobedecían
  - como contra los rebeldes
  lexicon: LSJ
  rationale: El ὡς presenta la valoración o percepción del tirano, y κατὰ con genitivo señala hostilidad «contra». «Desobedientes» preserva el sentido de ἀπειθούντων sin introducir una explicación más amplia que el griego no requiere.
- source_word: ἐχαλέπαινεν
  english_pob_choice: was enraged
  chosen_spanish: se enojó
  alternatives_spanish:
  - se irritó
  - se enfureció
  lexicon: LSJ
  rationale: El imperfecto expresa un enfado que se estaba desarrollando. En español, «se enojó» da una base natural y digna; no se extrema a «enfureció» para no exceder innecesariamente el registro, aunque el contexto sí es fuerte.
- source_word: ὡς καὶ κατὰ ἀχαρίστων
  english_pob_choice: as against the ungrateful
  chosen_spanish: como contra los ingratos
  alternatives_spanish:
  - como contra los desagradecidos
  - como contra los que no agradecían
  lexicon: LSJ
  rationale: ἀχάριστος significa «ingrato» o «desagradecido»; «ingratos» es la forma más natural y breve en español, y conserva el juicio moral del original.
- source_word: ὠργίσθη
  english_pob_choice: was also angered
  chosen_spanish: se airó
  alternatives_spanish:
  - se indignó
  - se enfureció también
  lexicon: LSJ
  rationale: Para diferenciarlo de ἐχαλέπαινεν, se usa otro verbo español de ira. «Se airó» mantiene el matiz verbal de un segundo acceso de ira sin repetir exactamente «se enojó».
translation_notes:
  revision_awareness: La versión inglesa auditada fue ajustada para acercar más los dos verbos griegos de ira y para hacer más natural la referencia implícita de los plurales masculinos. La redacción española refleja esa distinción con dos verbos distintos («se enojó» / «se airó») y conserva la ambigüedad referencial del griego sin explicitarla en exceso.
  spanish_consistency_notes:
  - Se mantuvo «tirano» para τύραννος por su valor evaluativo explícito.
  - Se evitó «SEÑOR» u otra convención de ocultamiento, ya que el versículo no contiene el nombre divino.
  - «Desobedientes» e «ingratos» conservan el juicio moral del original sin amplificación interpretativa.
  - La nota [a] se coloca en «estas cosas» para reflejar la alternativa textual/lexical sobre el referente implícito.
