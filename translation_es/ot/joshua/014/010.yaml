  yaml_path: translation/ot/joshua/014/010.yaml
  text: And now[a], behold, Yahweh has kept me alive, just as he said, these forty-five years since Yahweh spoke this word to Moses while Israel walked in the wilderness. And now, behold[c][b], today I am eighty-five years old.
