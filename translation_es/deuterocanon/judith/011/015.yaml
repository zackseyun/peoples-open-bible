translation:
  language: es
  text: Y sucederá que[a], cuando él se lo anuncie y actúen, serán entregados a ti para destrucción aquel día.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «tan pronto como él se lo anuncie y lo hagan». La construcción griega ὡς ἂν con subjuntivos puede expresar una condición futura indefinida; ποιήσωσιν también puede traducirse más literalmente como «hagan».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔσται
  english_pob_choice: it will be
  chosen_spanish: Y sucederá que
  alternatives_spanish:
  - Y será que
  - Y acontecerá que
  lexicon: BDAG
  rationale: El griego introduce una circunstancia futura. En español, «sucederá que» conserva ese valor prospectivo de forma natural y digna, sin volver la frase mecánica.
- source_word: ὡς ἂν
  english_pob_choice: when
  chosen_spanish: cuando
  alternatives_spanish:
  - tan pronto como
  - en cuanto
  - cada vez que
  lexicon: BDAG
  rationale: La construcción con subjuntivos expresa una contingencia futura indefinida. «Cuando» mantiene la relación temporal-condicional del contexto y es el equivalente más transparente en español.
- source_word: ἀναγγείλῃ
  english_pob_choice: he reports it
  chosen_spanish: él se lo anuncie
  alternatives_spanish:
  - él lo informe
  - él se lo reporte
  - él se lo diga
  lexicon: BDAG
  rationale: El verbo puede significar informar, anunciar o comunicar. «Anuncie» conserva el matiz de comunicar formalmente; el clítico «se lo» refleja el complemento indirecto y el objeto implícito del relato.
- source_word: ποιήσωσιν
  english_pob_choice: they act
  chosen_spanish: ellos actúen
  alternatives_spanish:
  - ellos lo hagan
  - ellos lo ejecuten
  - ellos lo cumplan
  lexicon: BDAG
  rationale: El verbo ποιέω aquí queda sin objeto explícito. «Actúen» preserva esa amplitud sin añadir un objeto no expresado, a la vez que resulta natural en español.
- source_word: δοθήσονταί
  english_pob_choice: they will be given over
  chosen_spanish: serán entregados
  alternatives_spanish:
  - serán puestos en manos de
  - serán abandonados
  lexicon: BDAG
  rationale: El pasivo futuro comunica una entrega a la disposición de otro en un contexto hostil. «Serán entregados» mantiene ese pasivo y su fuerza adversativa, sin suavizarla con un verbo más neutral.
- source_word: σοι
  english_pob_choice: to you
  chosen_spanish: a ti
  alternatives_spanish:
  - para ti
  - en tus manos
  lexicon: BDAG
  rationale: El dativo se vierte directamente como destinatario. «A ti» es fiel y evita añadir la imagen de «en tus manos», que el griego no expresa de forma literal.
- source_word: εἰς ὄλεθρον
  english_pob_choice: for destruction
  chosen_spanish: para destrucción
  alternatives_spanish:
  - para ruina
  - hacia la ruina
  lexicon: BDAG
  rationale: ὄλεθρος designa destrucción o ruina. «Para destrucción» conserva el valor final/resultativo del griego y corresponde al sentido hostil del pasaje.
- source_word: ἐν τῇ ἡμέρᾳ ἐκείνῃ
  english_pob_choice: on that day
  chosen_spanish: en aquel día
  alternatives_spanish:
  - ese día
  - en ese día
  lexicon: BDAG
  rationale: La expresión temporal fija se puede verter de manera directa. «Aquel día» conserva la referencia demostrativa enfática y funciona bien en español bíblico contemporáneo.
translation_notes:
  revision_awareness: La versión española sigue de cerca el texto griego de Swete y el criterio óptimo-equivalente del audit trail inglés. Se preserva la estructura futura-condicional de ὡς ἂν, el valor pasivo de δοθήσονταί y la ambigüedad controlada de ποιήσωσιν, sin introducir imágenes ajenas al original.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando aparezca el nombre divino; aquí no ocurre.
  - Se usa «entregados» para reflejar el pasivo adversativo de δοθήσονταί, en lugar de una formulación más interpretativa como «darán muerte» o «serán vencidos».
  - «Anuncie» y no «informe» o «diga» conserva un registro narrativo un poco más formal, coherente con el tono del libro.
  - La nota textual alternativa se ancla en el valor de ὡς ἂν y en la posible traducción más literal de ποιήσωσιν.
