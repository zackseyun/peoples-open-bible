  timestamp: '2026-05-07T22:13:27Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien la secuencia básica del hebreo: los edomitas como sujeto gentilicio, una incursión adicional, ataque contra Judá y toma de cautivos. Sin embargo, «hirieron a Judá» suena demasiado literal desde נכה y menos natural en contexto militar; el inglés auditado justificó «attacked», y en español «atacaron a Judá» preserva mejor el sentido bélico sin exagerar a derrota total. También conviene suavizar la combinación verbal inicial para que «también habían venido» no suene truncada.'
  spanish_quality_summary: El texto es mayormente claro, pero «Los edomitas también habían venido, hirieron a Judá...» mezcla pluscuamperfecto con pretérito de manera algo áspera y «hirieron a Judá» resulta poco idiomático para un ataque militar a una nación. «Los edomitas también habían venido, atacaron a Judá y se llevaron cautivos» mejora la naturalidad sin alejarse del hebreo. Las notas son útiles, aunque la nota a sobreexplica algo que no necesita nota en este versículo.
  glossary_alignment: 'No hay conflictos con la terminología troncal del proyecto. «Edomitas», «Judá» y «cautivos» están bien alineados. El ajuste principal es léxico-contextual para נכה: preferir «atacaron» sobre «hirieron» en español eclesial moderno y fiel al razonamiento auditado en inglés.'
  issues:
  - severity: medium
    issue: «hirieron a Judá» no refleja de la manera más fiel y natural el valor militar de וַיַּכּוּ
    rationale: Aunque נכה literalmente puede ser «herir/golpear», en este contexto bélico contra una entidad colectiva la opción natural y auditada es «atacaron». «Hirieron a Judá» suena extraña en español y puede sugerir daño físico personificado más que incursión militar.
  - severity: low
    issue: La secuencia temporal «también habían venido, hirieron» suena estilísticamente irregular
    rationale: No es incorrecta, pero la yuxtaposición de pluscuamperfecto y pretérito sin apoyo contextual puede sentirse brusca. Mantener el pluscuamperfecto por alineación con el audit trail es aceptable, pero conviene mejorar el resto de la cláusula para que fluya mejor.
  - severity: low
    issue: La nota [a] es innecesaria
    rationale: «Edomitas» no introduce una ambigüedad nueva ni preserva una alternativa significativa que requiera nota en español. El proyecto pide notas para alternativas relevantes, no para justificar cada gentilicio estándar.
  revised_spanish_text: Los edomitas también habían venido, atacaron a Judá y se llevaron cautivos[a].
  revised_footnotes:
  - marker: a
    text: 'También es posible: «vinieron y atacaron a Judá y tomaron cautivos». El hebreo usa el verbo militar común «golpear/herir» y una expresión cognada para tomar cautivos.'
    reason: lexical_alternative
