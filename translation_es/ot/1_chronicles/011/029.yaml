lexical_decisions:
- source_word: סִבְּכַי
  english_pob_choice: Sibbecai
  chosen_spanish: Sibbecai
  alternatives_spanish:
  - Sibbecai
  - Sibbechai
  lexicon: Nombre propio transliterado
  rationale: Es un nombre personal; en español conviene conservar la transliteración para no perder la identificación del personaje.
- source_word: הַחֻשָׁתִי
  english_pob_choice: the Hushathite
  chosen_spanish: el husatita
  alternatives_spanish:
  - el hushatita
  - el de Hushá
  - el hushita
  lexicon: Gentilicio/clan derivado de חוּשָׁה/חוּשָׁת
  rationale: El inglés POB preserva el valor gentilicio. En español, "husatita" mantiene esa relación de forma bastante transparente sin forzar una frase explicativa.
- source_word: עִילַי
  english_pob_choice: Ilai
  chosen_spanish: Ilai
  alternatives_spanish:
  - Irai
  - Ilai
  lexicon: Nombre propio transliterado
  rationale: El hebreo de Crónicas favorece "Ilai"; se conserva el nombre propio y se evita armonizarlo con el paralelo de 2 Samuel 23:26.
- source_word: הָאֲחוֹחִי
  english_pob_choice: the Ahohite
  chosen_spanish: el ahojita
  alternatives_spanish:
  - el ahojita
  - el de Ahoá
  - el ahohita
  lexicon: Gentilicio/clan derivado de אֲחוֹחַ
  rationale: Se conserva la designación de clan/gentilicio. "Ahojita" sigue de cerca la forma hebrea y mantiene la relación con el nombre de clan, aunque resulte menos tradicional que otras soluciones.
translation_notes:
  revision_awareness: El texto hebreo y el testimonio de auditoría en inglés están en alto acuerdo; el único punto relevante es la variante de nombre propio en el segundo personaje. Se mantiene «Ilai» conforme al hebreo de Crónicas, con nota sobre la lectura alternativa «Irai».
  spanish_consistency_notes:
  - Se preserva la secuencia nominal breve del hebreo, sin añadir verbo ni artículo donde el original no los requiere.
  - Se mantiene la distinción entre nombres propios y gentilicios/clanes.
  - La nota textual explica la variante «Irai» sin alterar la base hebrea de Crónicas.
