revisions:
- from: Den gracias a Yahvé[a], porque él es bueno[b], porque para siempre es su amor fiel.
  to: Den gracias a Yahvé[a], porque él es bueno, porque su amor fiel[b] permanece para siempre.
  rationale: Se mantiene la estructura y el sentido del hebreo, pero se mejora la naturalidad y fidelidad de la cláusula final usando «permanece para siempre», que expresa mejor la permanencia implícita en לְעוֹלָם חַסְדּוֹ. Se elimina la nota innecesaria sobre «bueno» y se añade una nota léxica pertinente en «amor fiel» para reflejar la documentación inglesa sobre חֶסֶד.
