revisions:
- from: Si un hombre se acuesta con la esposa de su padre[a], ha descubierto la desnudez de su padre; ambos[b] serán sin falta muertos[c]; su sangre cae sobre ellos.
  to: Si un hombre se acuesta con la esposa de su padre[a], ha descubierto la desnudez de su padre; ambos ciertamente serán condenados a muerte; su sangre está sobre ellos[b].
  rationale: Se corrige el español para reflejar con más fidelidad y naturalidad dos fórmulas jurídicas hebreas. «Ciertamente serán condenados a muerte» transmite mejor la fuerza de מוֹת יוּמְתוּ que «serán sin falta muertos», y «su sangre está sobre ellos» preserva el modismo legal de responsabilidad sin la imagen impropia de «cae sobre ellos». También se eliminó la nota innecesaria en «ambos» y se reorganizaron las notas para alinearlas con los puntos realmente interpretativos del texto y del audit trail inglés.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:27:57Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido básico del hebreo y preserva correctamente el modismo clave «descubrir la desnudez de su padre» y la referencia literal a «la esposa de su padre». Sin embargo, desplaza dos fórmulas jurídicas importantes: מוֹת יוּמְתוּ está mal resuelto en español con «serán sin falta muertos», que suena antinatural y menos fiel que una pasiva jurídica normal; y דְּמֵיהֶם בָּם no debe convertirse en «su sangre cae sobre ellos», porque el hebreo expresa una fórmula estable de responsabilidad legal, no una acción de caer.'
  spanish_quality_summary: 'El español es en general claro, pero tiene dos giros poco naturales o impropios del registro bíblico-jurídico: «serán sin falta muertos» y «su sangre cae sobre ellos». Además, las notas están mal distribuidas: la nota inglesa b corresponde a la fórmula de ejecución enfática y a la expresión legal final, pero en español se añadió una nota separada a «ambos» sin necesidad y se movió la explicación principal a otra nota. Conviene simplificar y anclar las notas donde realmente surgen las dificultades.'
  glossary_alignment: 'No hay conflicto con la terminología global principal. Se mantiene «hombre», «esposa de su padre» y el idiomático «descubrir la desnudez». La principal cuestión es fraseológica-jurídica, no de glosario: para מוֹת יוּמְתוּ debe usarse una formulación española estable como «ciertamente serán condenados a muerte» o «sin duda morirán / serán ejecutados» según el grado de literalidad; y para דְּמֵיהֶם בָּם debe mantenerse «su sangre está sobre ellos» o equivalente cercano, no «cae sobre ellos».'
  issues:
  - severity: high
    issue: «serán sin falta muertos» es una formulación española deficiente para מוֹת יוּמְתוּ
    rationale: La construcción hebrea intensifica la pena de muerte en registro legal. En español bíblico legible, «serán condenados a muerte sin falta», «ciertamente serán muertos» o «sin duda serán condenados a muerte» funcionan mejor. La redacción actual suena forzada y poco idiomática.
  - severity: high
    issue: «su sangre cae sobre ellos» no refleja bien la fórmula legal דְּמֵיהֶם בָּם
    rationale: 'El hebreo no describe un movimiento de la sangre, sino una fórmula de imputación legal: la responsabilidad por su muerte recae en ellos. «Su sangre está sobre ellos» preserva mejor el modismo y la nota puede explicar el sentido.'
  - severity: medium
    issue: La nota [b] sobre «ambos» no corresponde a una ambigüedad significativa del texto
    rationale: שְׁנֵיהֶם sí enfatiza que la pena alcanza a los dos, pero esto ya queda claro con «ambos». La nota explicativa más necesaria es sobre la fórmula final «su sangre está sobre ellos».
  - severity: low
    issue: La nota [c] debe anclarse a la frase final, no usarse para compensar una traducción menos fiel
    rationale: Si el texto principal vuelve a una forma más literal («su sangre está sobre ellos»), la nota puede explicar limpiamente el sentido jurídico, en línea con el audit trail inglés.
