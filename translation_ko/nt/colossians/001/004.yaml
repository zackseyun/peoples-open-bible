id: COL.1.4
reference: Colossians 1:4
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ἀκούσαντες τὴν πίστιν ὑμῶν ἐν Χριστῷ Ἰησοῦ καὶ τὴν ἀγάπην ⸂ἣν ἔχετε⸃ εἰς πάντας τοὺς ἁγίους
base_translation:
  language: en
  yaml_path: translation/nt/colossians/001/004.yaml
  text: having heard of your faith in Messiah Jesus and the love that you have for all the saints,
translation:
  language: ko
  text: 우리는 메시아 예수 안에 있는 여러분의 믿음[a]과, 모든 성도를 향한 여러분의 사랑을 들었습니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「신실함」, 「신뢰」. 헬라어 πίστις는 문맥에 따라 「믿음·신실함·신뢰」의 의미를 함께 담는다.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀκούσαντες
  english_pob_choice: having heard of
  chosen_korean: 들었습니다
  alternatives_korean:
  - 듣고
  - 들은 까닭에
  lexicon: BDAG
  rationale: 부정과거 분사로 앞 절의 감사 행위의 근거를 제시한다. 한국어에서는 합쇼체 종결문 「들었습니다」로 자연스럽게 풀고, 다음 절에서 이유 연결을 이어간다.
- source_word: πίστιν
  english_pob_choice: faith
  chosen_korean: 믿음
  alternatives_korean:
  - 신실함
  - 신뢰
  lexicon: BDAG
  rationale: 본 번역의 기본값에 따라 πίστις를 「믿음」으로 옮기되, 「신실함·신뢰」의 가능성은 각주로 보존한다.
- source_word: ἐν Χριστῷ Ἰησοῦ
  english_pob_choice: in Messiah Jesus
  chosen_korean: 메시아 예수 안에 있는
  alternatives_korean:
  - 메시아 예수께 대한
  - 메시아 예수를 향한
  lexicon: BDAG
  rationale: 처소격 ἐν의 「~안에」 표현을 유지하여 바울의 연합 신학을 보존한다.
- source_word: ἀγάπην
  english_pob_choice: love
  chosen_korean: 사랑
  alternatives_korean: []
  lexicon: BDAG
  rationale: ἀγάπη의 표준 한국어 등가어.
- source_word: ἣν ἔχετε
  english_pob_choice: that you have
  chosen_korean: 여러분의 (사랑)
  alternatives_korean:
  - 여러분이 가진
  - 여러분이 품은
  lexicon: BDAG
  rationale: 「여러분이 가진 사랑」은 직역에 가깝지만, 한국어 어순에서 자연스럽게 「여러분의 사랑」으로 압축할 수 있다. 본문은 간결성을 위해 「여러분의 사랑」으로 옮긴다.
- source_word: εἰς πάντας τοὺς ἁγίους
  english_pob_choice: for all the saints
  chosen_korean: 모든 성도를 향한
  alternatives_korean:
  - 모든 성도에 대한
  - 모든 성도를 위한
  lexicon: BDAG
  rationale: εἰς + 대격은 방향성을 가지므로 「~을 향한」으로 옮긴다. 사랑의 대상을 분명히 한다.
