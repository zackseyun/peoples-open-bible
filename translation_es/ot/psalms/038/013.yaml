translation:
  language: es
  text: Los que buscan mi vida tienden trampas[a], y los que buscan mi daño[b] hablan ruina[c]; todo el día murmuran[d] engaño.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "tendieron trampas". El verbo hebreo lleva la imagen de poner un lazo o trampa para atrapar.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, "buscan mi alma"; aquí es un modismo que significa "buscan mi vida".
    reason: lexical_alternative
  - marker: c
    text: O "hablan destrucción" o "dicen cosas destructivas".
    reason: lexical_alternative
  - marker: d
    text: El verbo también puede significar "murmurar" o "meditar"; aquí se refiere a un habla engañosa y continua.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְנַקְשׁוּ
  english_pob_choice: set traps
  chosen_spanish: tienden trampas
  alternatives_spanish:
  - ponen trampas
  - lanzan trampas
  - arman trampas
  lexicon: HALOT
  rationale: El verbo expresa la imagen de atrapar o poner una trampa. En español, 'tienden trampas' conserva la metáfora de acecho y resulta natural sin suavizar la hostilidad.
- source_word: מְבַקְשֵׁי נַפְשִׁי
  english_pob_choice: those who seek my life
  chosen_spanish: los que buscan mi vida
  alternatives_spanish:
  - los que buscan mi alma
  - los que me buscan
  lexicon: HALOT
  rationale: En contextos hostiles, נֶפֶשׁ con 'buscar' significa la vida misma, no solo el interior o el alma. 'Mi vida' comunica mejor el peligro mortal que 'mi alma' en español.
- source_word: וְדֹרְשֵׁי רָעָתִי
  english_pob_choice: those who seek my harm
  chosen_spanish: los que buscan mi mal
  alternatives_spanish:
  - los que buscan mi daño
  - los que buscan mi ruina
  - los que procuran mal contra mí
  lexicon: HALOT
  rationale: רָעָה aquí apunta a daño, perjuicio o ruina personal. 'Mi mal' es breve, idiomático y mantiene el carácter personal de la persecución.
- source_word: דִּבְּרוּ הַוּוֹת
  english_pob_choice: speak destruction
  chosen_spanish: hablan ruina
  alternatives_spanish:
  - hablan destrucción
  - dicen calamidad
  - pronuncian ruina
  lexicon: HALOT
  rationale: הַוּוֹת puede expresar ruina, desastre o cosas destructivas. 'Hablan ruina' conserva el contenido dañino de sus palabras sin forzar una interpretación demasiado abstracta.
- source_word: וּמִרְמֹות
  english_pob_choice: deceit
  chosen_spanish: engaño
  alternatives_spanish:
  - decepción
  - fraude
  - treta
  lexicon: HALOT
  rationale: מִרְמוֹת refiere a engaños o dolo. 'Engaño' funciona bien como sustantivo colectivo en español y mantiene la idea de speech manipulative y falsedad.
- source_word: כָּל הַיּוֹם
  english_pob_choice: all day long
  chosen_spanish: todo el día
  alternatives_spanish:
  - todo el tiempo
  - a todas horas
  - durante todo el día
  lexicon: HALOT
  rationale: Es la equivalencia idiomática natural en español y preserva la persistencia continua de la acción.
- source_word: יֶהְגּוּ
  english_pob_choice: mutter
  chosen_spanish: murmuran
  alternatives_spanish:
  - meditan
  - murmuran para sí
  - murmuran continuamente
  lexicon: HALOT
  rationale: הגה puede significar murmurar, meditar o musitar. En este contexto hostil, 'murmuran' retiene el carácter bajo, constante y sospechoso del habla, sin convertirlo en 'planean' ni eliminar la ambigüedad del verbo.
theological_decisions:
- issue: Sentido de נֶפֶשׁ en un contexto de persecución
  english_pob_reading: those who seek my life
  chosen_spanish_reading: los que buscan mi vida
  alternative_spanish_readings:
  - los que buscan mi alma
  - los que buscan mi ser
  rationale: Se mantiene el valor idiomático de peligro mortal que el POB inglés documenta. Traducirlo como 'alma' en español podría desviar el sentido hacia una antropología distinta y debilitar la amenaza concreta del texto.
  doctrine_reference: Salmos 38:13; uso idiomático de נֶפֶשׁ en contextos de persecución
- issue: Alcance de הַוּוֹת y מִרְמוֹת como lenguaje de maldad verbal
  english_pob_reading: speak destruction ... mutter deceit
  chosen_spanish_reading: hablan ruina ... murmuran engaño
  alternative_spanish_readings:
  - hablan destrucción ... murmuran falsedad
  - dicen ruina ... meditan engaño
  rationale: Se preserva la tensión entre palabra destructiva y murmullo continuo. 'Ruina' y 'engaño' mantienen el carácter moral y relacional del mal sin convertir el verso en una simple afirmación de estrategia o conspiración.
  doctrine_reference: Salmos 38:13; paralelismo poético hebreo
translation_notes:
  revision_awareness: 'Coincido con la última revisión inglesa y su estatus de alta concordancia: no se identificaron cambios necesarios. La traducción española sigue esa lectura estable, manteniendo las decisiones léxicas clave del audit trail: metáfora de trampa, נֶפֶשׁ como vida, הַוּוֹת como ruina/destrucción, מִרְמוֹת como engaño y יֶהְגּוּ como murmurar continuo.'
  spanish_consistency_notes:
  - Se conserva un registro bíblico claro y actual, evitando arcaísmos innecesarios.
  - '''Mi vida'' se usa de manera consistente para נֶפֶשׁ en contexto hostil.'
  - '''Ruina'' y ''engaño'' mantienen el paralelismo con el hebreo sin sobreinterpretar el verso.'
  - Los marcadores de nota siguen el orden a-d y aparecen exactamente donde corresponden en el texto.
