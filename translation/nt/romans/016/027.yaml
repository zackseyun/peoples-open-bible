id: ROM.16.27
reference: Romans 16:27
source:
  edition: robinson-pierpont-2005-byzantine
  text: μόνῳ σοφῷ θεῷ, διὰ Ἰησοῦ Χριστοῦ, ᾧ ἡ δόξα εἰς τοὺς αἰῶνας. Ἀμήν.
  language: Greek
translation:
  text: to the only wise God, through Jesus Messiah, to whom be the glory forever.
    Amen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: This verse concludes the closing doxology (Romans 16:25–27). As noted at
      Romans 16:25, the placement and inclusion of this doxology vary significantly
      across early manuscripts, though it is preserved here in the Byzantine majority
      tradition.
    reason: textual_critical
lexical_decisions:
- source_word: μόνος
  chosen: only
  alternatives:
  - alone
  - sole
  lexicon: BDAG
  rationale: Functions attributively with 'wise God' (μόνῳ σοφῷ θεῷ), emphasizing
    God's exclusive possession of ultimate wisdom.
- source_word: αἰών
  chosen: forever
  alternatives:
  - the ages
  - eternity
  lexicon: BDAG
  rationale: The phrase 'εἰς τοὺς αἰῶνας' (literally 'into the ages') is the standard
    Greek idiom for 'forever' or 'for all eternity'.
- source_word: ὅς
  chosen: to whom
  alternatives:
  - to him
  lexicon: BDAG
  rationale: A dative relative pronoun (ᾧ). While it creates a slight grammatical
    ambiguity regarding whether the antecedent is God or Jesus Christ, 'to whom' preserves
    the Greek syntax accurately.
