    reason: lexical_alternative
lexical_decisions:
- source_word: σῶμα
  english_pob_choice: body
  chosen_spanish: cuerpo
  alternatives_spanish:
  - cadáver
  lexicon: BDAG
  rationale: ‘σῶμα’ es el término ordinario para ‘body’; en español, ‘cuerpo’ conserva esa concreción sin añadir el matiz interpretativo de ‘cadáver’, aunque el contexto funerario lo presupone.
- source_word: διαφερόμενον
  english_pob_choice: being carried along
  chosen_spanish: siendo llevado
  alternatives_spanish:
  - siendo arrastrado
  - llevado
  - siendo transportado
  lexicon: BDAG
  rationale: El participio pasivo presenta el cuerpo como movido por fuerzas externas. ‘Siendo llevado’ reproduce bien la pasividad y suena natural en español; ‘arrastrado’ sería más fuerte de lo que exige el griego.
- source_word: ἐπὶ κυμάτων
  english_pob_choice: on the waves
  chosen_spanish: sobre las olas
  alternatives_spanish:
  - en las olas
  - por las olas
  lexicon: LSJ
  rationale: La imagen se refiere al cuerpo sobre la superficie del mar; ‘sobre las olas’ es idiomático y mantiene la localización visual del original.
- source_word: ἐν ὕβρει πολλῇ
  english_pob_choice: with great indignity
  chosen_spanish: con gran indignidad
  alternatives_spanish:
  - con gran abuso
  - con gran ultraje
  - en gran vergüenza
  lexicon: BDAG
  rationale: ὕβρις puede implicar trato violento, abusivo o humillante. ‘Gran indignidad’ conserva el sentido de deshonra y trato degradante que eligió la POB inglesa sin forzar un término más técnico o más moderno de lo necesario.
- source_word: οὐκ ἦν ὁ θάπτων
  english_pob_choice: there was no one to bury him
  chosen_spanish: no había quien lo enterrara
  alternatives_spanish:
  - no había nadie para enterrarlo
  - no había quien lo sepultara
  lexicon: LSJ
  rationale: La construcción expresa ausencia de persona disponible para realizar el entierro. ‘No había quien lo enterrara’ es fluido, fiel y preserva el pathos del entierro negado.
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del audit trail inglés, que ajustó διαφερόμενον desde ‘swept along’ a ‘being carried along’ para reflejar más directamente el participio pasivo. Por eso se eligió una solución española igualmente pasiva y sobria (‘siendo llevado’).
  spanish_consistency_notes:
  - Se mantuvo el tono sobrio y funerario del original, evitando intensificar innecesariamente la violencia.
  - ‘Cuerpo’ conserva la fuerza concreta de σῶμα sin introducir ‘cadáver’, que sería más interpretativo.
  - ‘Enterrar’ se prefirió a ‘sepultar’ por claridad moderna; ambas opciones son posibles, pero ‘enterrar’ resulta más inmediato en español general.
