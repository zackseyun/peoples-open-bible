translation:
  language: es
  text: En la oscuridad irrumpen en las casas[a]; de día se encierran[b]; no conocen la luz[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cavan a través de las casas»; el verbo hebreo puede entenderse más literalmente como «horadar» o «cavar a través de», probablemente aludiendo a abrirse paso por una pared.
    reason: lexical_alternative
  - marker: b
    text: O «se sellan durante el día». El hebreo también puede enfatizar que se encierran o se ocultan durante las horas de luz.
    reason: lexical_alternative
  - marker: c
    text: «La luz» puede referirse literalmente a la luz del día y, a la vez, sugerir un matiz moral en el contexto de quienes evitan lo que queda expuesto.
    reason: lexical_alternative
lexical_decisions:
- source_word: חָתַר
  english_pob_choice: breaks into
  chosen_spanish: se meten en
  alternatives_spanish:
  - irrumpe en
  - abren paso en
  - horadan
  lexicon: HALOT
  rationale: El verbo hebreo puede referirse a cavar o abrir paso atravesando una pared en contexto de robo. En español, «se meten en» comunica con naturalidad la intrusión furtiva; la nota conserva la posibilidad más literal de abrir paso/horadar.
- source_word: בַּחֹשֶׁךְ
  english_pob_choice: in the dark
  chosen_spanish: en la oscuridad
  alternatives_spanish:
  - en tinieblas
  - en la noche
  lexicon: HALOT
  rationale: La preposición indica esfera o circunstancia de la acción. «En la oscuridad» es natural en español y mantiene la imagen de ocultamiento.
- source_word: בָּתִּים
  english_pob_choice: houses
  chosen_spanish: las casas
  alternatives_spanish:
  - las viviendas
  - los hogares
  lexicon: HALOT
  rationale: El sustantivo designa moradas o viviendas. «Casas» es el término más directo y conserva el escenario de allanamiento.
- source_word: יוֹמָם
  english_pob_choice: by day
  chosen_spanish: de día
  alternatives_spanish:
  - durante el día
  - en pleno día
  lexicon: HALOT
  rationale: El adverbio contrasta con el marco nocturno anterior. «De día» es breve, poético y natural en español.
- source_word: חִתְּמוּ לָמוֹ
  english_pob_choice: they shut themselves in
  chosen_spanish: se encierran en ellas
  alternatives_spanish:
  - se sellan en ellas
  - se clausuran en ellas
  - se tapan dentro
  lexicon: HALOT
  rationale: El verbo implica cerrar o sellar; con לָמוֹ el sentido es reflexivo o para su propio resguardo. En español, «se encierran en ellas» expresa bien la idea de ocultarse durante el día sin perder la fuerza del acto de cerrarse.
- source_word: לֹא יָדְעוּ אוֹר
  english_pob_choice: they do not know the light
  chosen_spanish: no conocen la luz
  alternatives_spanish:
  - no están familiarizados con la luz
  - no quieren saber de la luz
  lexicon: HALOT
  rationale: Se conserva el giro idiomático de «conocer» con el sentido de familiaridad o afinidad. «La luz» mantiene tanto el contraste literal como la posible resonancia moral sin explicitarla.
theological_decisions:
- issue: Posible fuerza moral-simbólica de «la luz»
  english_pob_reading: Retain the literal phrase 'the light' without explicating symbolism in the main text.
  chosen_spanish_reading: Mantener «la luz» sin convertirla en una explicación explícita de daylight o de rectitud.
  alternative_spanish_readings:
  - la luz del día
  - lo recto
  - el bien
  rationale: El contexto inmediato habla de crimen nocturno y ocultamiento diurno, por lo que el sentido literal es primario. A la vez, en la literatura sapiencial «luz» puede sugerir una dimensión moral. La traducción preserva esa tensión en vez de resolverla.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: 'El borrador inglés pasó de «he breaks» a «they break» para concordar con los verbos y pronombres plurales del verso. La redacción española sigue ese plural: «se meten», «se encierran», «no conocen».'
  spanish_consistency_notes:
  - Se usó «la luz» y no «la luz del día» en el texto principal para conservar la ambigüedad literal/moral documentada.
  - Se prefirió un giro verbal natural en español («se meten en») en lugar de un calco técnico, pero la nota conserva la alternativa más literal.
  - Se mantuvo el plural impersonal del verso con verbos en plural/reflexivos, evitando un singular no respaldado por el hebreo.
