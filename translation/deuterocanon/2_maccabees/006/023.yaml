id: 2MA.6.23
reference: 2 Maccabees 6:23
source:
  edition: lxx-swete-1909
  text: ὁ δὲ λογισμὸν ἀστεῖον ἀναλαβὼν καὶ ἄξιον τῆς ἡλικίας καὶ τῆς τοῦ γήρους ὑπεροχῆς καὶ τῆς ἐπικτήτου καὶ ἐπιφανοῦς πολιτείας καὶ τῆς ἐκ παιδὸς καλλίστης ἀναστροφῆς, μᾶλλον δὲ τῆς ἁγίας καὶ θεοκτίστου νομοθεσίας ἀκολού- θως ἀπεφήνατο, ταχέως λέγων προπέμπειν εἰς τὸν ᾅδην.
  language: Greek
  pages:
  - 702
  confidence: high
  validation: agree
translation:
  text: But he[a], adopting a noble resolve worthy of his age and of the dignity of old age, and of the distinction of his acquired and honored way of life, and of the finest conduct from childhood—rather, in keeping with the holy and God-given law—declared himself plainly, saying that they should send him quickly to Hades.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''send him quickly to the realm of the dead.'' Greek: ''to Hades.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: λογισμὸν ἀστεῖον
  chosen: a noble resolve
  alternatives:
  - a fitting judgment
  - an urbane/refined thought
  - a wise decision
  lexicon: LSJ
  rationale: λόγισμος here is a considered decision or resolve, not merely a thought. ἀστεῖος can denote refined, noble, or fitting; in this moral context 'noble' captures the commendable quality of Eleazar's decision without sounding overly technical.
- source_word: ἀναλαβὼν
  chosen: adopting
  alternatives:
  - taking up
  - having assumed
  lexicon: BDAG
  rationale: The participle introduces Eleazar's taking up or embracing this resolve. 'Adopting' is idiomatic English and preserves the deliberative sense.
- source_word: ἄξιον τῆς ἡλικίας
  chosen: worthy of his age
  alternatives:
  - befitting his years
  lexicon: LSJ
  rationale: ἡλικία refers to age or stage of life. 'Worthy of his age' keeps the formal evaluative force of ἄξιον.
- source_word: τοῦ γήρους ὑπεροχῆς
  chosen: the dignity of old age
  alternatives:
  - the excellence of old age
  - the eminence of old age
  lexicon: LSJ
  rationale: ὑπεροχή denotes superiority, distinction, or eminence. In context, 'dignity' communicates the honorable status associated with advanced age in readable English.
- source_word: ἐπικτήτου καὶ ἐπιφανοῦς πολιτείας
  chosen: his acquired and honored way of life
  alternatives:
  - his hard-won and illustrious citizenship
  - his attained and distinguished manner of life
  lexicon: LSJ
  rationale: πολιτεία can mean commonwealth/citizenship or way of life/conduct. Here, in a chain describing Eleazar's personal standing and character, 'way of life' fits best. ἐπίκτητος suggests something acquired or attained; ἐπιφανής suggests notable, distinguished, or honored.
- source_word: ἐκ παιδὸς καλλίστης ἀναστροφῆς
  chosen: the finest conduct from childhood
  alternatives:
  - his excellent upbringing from childhood
  - his noblest manner of life from youth
  lexicon: BDAG
  rationale: ἀναστροφή often denotes conduct or way of life. Because the phrase continues the description of Eleazar's character, 'conduct from childhood' is preferable to the narrower 'upbringing,' though the latter nuance is nearby.
- source_word: μᾶλλον δὲ
  chosen: rather
  alternatives:
  - indeed rather
  - or rather
  lexicon: LSJ
  rationale: The phrase heightens and corrects the preceding grounds, pointing to the supreme reason in the law. 'Rather' preserves that rhetorical turn.
- source_word: τῆς ἁγίας καὶ θεοκτίστου νομοθεσίας
  chosen: the holy and God-given law
  alternatives:
  - the holy and divinely established legislation
  - the holy and God-founded lawgiving
  lexicon: LSJ
  rationale: νομοθεσία is lawgiving or legislation, but in context refers concretely to the Mosaic law. θεόκτιστος literally suggests established by God; 'God-given law' is natural English that preserves divine origin without awkwardness.
- source_word: ἀκολούθως
  chosen: in keeping with
  alternatives:
  - accordingly
  - consistently with
  lexicon: LSJ
  rationale: The adverb expresses conformity to the law. 'In keeping with' is idiomatic and clear.
- source_word: ἀπεφήνατο
  chosen: declared himself plainly
  alternatives:
  - gave his decision plainly
  - pronounced openly
  lexicon: LSJ
  rationale: The middle verb here conveys a clear declaration of his own position. 'Declared himself plainly' reflects both the decisiveness and the personal stance.
- source_word: προπέμπειν εἰς τὸν ᾅδην
  chosen: send him quickly to Hades
  alternatives:
  - dispatch him at once to the grave
  - send him off quickly to the realm of the dead
  lexicon: LSJ
  rationale: ᾅδης is Hades, the realm of the dead, not specifically Gehenna/hell. Retaining 'Hades' preserves the Greek concept and avoids importing later doctrinal associations. προπέμπειν here has the force of sending off or dispatching.
