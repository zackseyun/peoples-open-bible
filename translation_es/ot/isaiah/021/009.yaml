translation:
  language: es
  text: 'Y mira[a], aquí viene un carro, un hombre con una pareja de jinetes[b]. Y respondió y dijo: «¡Ha caído, ha caído Babilonia, y todas las imágenes esculpidas de sus dioses las ha hecho pedazos al suelo[c][d]!».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «he aquí». La expresión hebrea introduce una escena vívida y deíctica.
    reason: lexical_alternative
  - marker: b
    text: O «un par de jinetes»; la frase hebrea es comprimida y puede describir la fuerza que se acerca de una manera más idiomática de lo que el español puede reproducir plenamente.
    reason: lexical_alternative
  - marker: c
    text: O «al suelo». La frase hebrea indica derribo completo.
    reason: lexical_alternative
  - marker: d
    text: El hebreo dice literalmente «ha quebrado»; el sujeto queda implícito.
    reason: theological_note
lexical_decisions:
- source_word: וְהִנֵּה
  english_pob_choice: And look
  chosen_spanish: Y mira
  alternatives_spanish:
  - Y he aquí
  - Mira
  lexicon: HALOT
  rationale: La partícula es deíctica y anuncia con viveza lo que aparece a la vista. «Y mira» conserva ese impulso discursivo con naturalidad en español actual; «he aquí» sería más arcaico.
- source_word: זֶה בָא
  english_pob_choice: here comes
  chosen_spanish: aquí viene
  alternatives_spanish:
  - viene aquí
  - este viene
  lexicon: HALOT
  rationale: La construcción apunta a una llegada inmediata y señalada por el vigía. «Aquí viene» reproduce bien la inmediatez sin forzar una traducción demasiado literal.
- source_word: רֶכֶב אִישׁ
  english_pob_choice: a chariot, a man
  chosen_spanish: un carro, un hombre
  alternatives_spanish:
  - un carro de hombres
  - un carro con un hombre
  lexicon: HALOT
  rationale: El hebreo es comprimido y no resuelve del todo la relación sintáctica. Se mantiene la brevedad con «un carro, un hombre» para no interpretar en exceso; el contexto militar queda implícito por la continuación.
- source_word: צֶמֶד פָּרָשִׁים
  english_pob_choice: a pair of horsemen
  chosen_spanish: una pareja de jinetes
  alternatives_spanish:
  - dos jinetes
  - un yugo de jinetes
  lexicon: HALOT
  rationale: צֶמֶד significa una pareja o yugo. «Pareja de jinetes» conserva la idea de dos montados unidos como conjunto y es más natural en español que una traducción demasiado mecánica.
- source_word: וַיַּעַן וַיֹּאמֶר
  english_pob_choice: And he answered and said
  chosen_spanish: Y él respondió y dijo
  alternatives_spanish:
  - Y respondió diciendo
  - Y contestó y dijo
  lexicon: HALOT
  rationale: Se conserva la fórmula hebrea de introducción del discurso. Aunque pueda sonar redundante, refleja mejor el registro y ritmo del texto fuente.
- source_word: נָפְלָה נָפְלָה
  english_pob_choice: Fallen, fallen
  chosen_spanish: ¡Caída, caída
  alternatives_spanish:
  - ¡Ha caído, ha caído
  - ¡Cayó, cayó
  lexicon: HALOT
  rationale: La repetición perfecta expresa énfasis profético. En español, la exclamación nominal «Caída, caída» preserva la concisión y el golpe retórico sin añadir más sujeto del que el hebreo da aquí.
- source_word: בָּבֶל
  english_pob_choice: Babylon
  chosen_spanish: Babilonia
  alternatives_spanish:
  - Babel
  lexicon: HALOT
  rationale: «Babilonia» es la forma española estándar del topónimo y corresponde al nombre histórico/literario del texto.
- source_word: פְּסִילֵי אֱלֹהֶיהָ
  english_pob_choice: the carved images of her gods
  chosen_spanish: las imágenes esculpidas de sus dioses
  alternatives_spanish:
  - los ídolos de sus dioses
  - las imágenes talladas de sus dioses
  lexicon: HALOT
  rationale: פְּסִילִים son imágenes talladas/esculpidas. Se evita «ídolos» como primera opción para no perder la concreción material del sustantivo hebreo; «esculpidas» transmite bien la manufactura.
- source_word: שִׁבַּר
  english_pob_choice: he has shattered
  chosen_spanish: él las ha hecho pedazos
  alternatives_spanish:
  - él las ha quebrado
  - él las ha destrozado
  lexicon: HALOT
  rationale: El verbo expresa destrucción violenta. «Ha hecho pedazos» comunica con fuerza el resultado de ruptura y resulta idiomático en español, manteniendo la agencia singular implícita del hebreo.
- source_word: לָאָרֶץ
  english_pob_choice: to the ground
  chosen_spanish: hasta el suelo
  alternatives_spanish:
  - a tierra
  - al suelo
  lexicon: HALOT
  rationale: La dirección indica caída completa y humillación. «Hasta el suelo» conserva la imagen de abatimiento total con buena fluidez en español.
theological_decisions:
- issue: Agente del derribo final
  english_pob_reading: Render the Hebrew singular verb straightforwardly as 'he has shattered,' leaving the subject implicit.
  chosen_spanish_reading: 'Mantener el verbo singular con sujeto implícito: «él las ha hecho pedazos».'
  alternative_spanish_readings:
  - «las han hecho pedazos»
  - «han sido hechas pedazos»
  rationale: El hebreo usa un verbo singular masculino sin sujeto explícito. El español puede conservar esa tensión con un sujeto implícito («él») sin identificarlo de manera interpretativa, respetando la ambigüedad del original y la decisión auditada del POB inglés.
  doctrine_reference: Preservar la tensión teológica y sintáctica sin resolverla interpretivamente.
translation_notes:
  revision_awareness: He seguido la última revisión auditada del inglés POB que corrigió la frase comprimida de רֶכֶב אִישׁ para evitar «de hombres» y mantener una estructura más cercana al hebreo. También he preservado la decisión de dejar implícito el sujeto del verbo final, sin resolverlo de forma doctrinal.
  spanish_consistency_notes:
  - He usado «Yahvé» solo cuando el texto lo requiere explícitamente; este versículo no contiene el nombre divino.
  - He mantenido «dioses» en plural porque el hebreo usa אֱלֹהֶיהָ con referencia posesiva plural.
  - He preferido «imágenes esculpidas» sobre «ídolos» en el texto principal para respetar la concreción material de פְּסִילִים.
  - La puntuación con exclamación y comillas intenta reflejar la proclamación profética del original.
