revisions:
- from: '¿Hasta cuándo se lamentará[a] la tierra, y se secará la hierba de todo campo? A causa de la maldad de los que habitan en ella, las bestias y las aves son arrebatadas, porque dicen: «No verá nuestro fin»[b].'
