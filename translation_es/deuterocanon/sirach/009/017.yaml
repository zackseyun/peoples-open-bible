translation:
  language: es
  text: Aléjate de un hombre que tiene poder para matar, y no temas los terrores de la muerte.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El testigo griego lee una sentencia sustancialmente distinta: «Que hombres justos sean tus compañeros de mesa, y que en el temor del Señor esté tu jactancia». El texto principal sigue el hebreo conservado de este versículo.'
    reason: textual_variant
lexical_decisions:
- source_word: רְחַק
  english_pob_choice: Keep far from
  chosen_spanish: Mantente lejos de
  alternatives_spanish:
  - Aléjate de
  - Mantente apartado de
  lexicon: HALOT
  rationale: La forma imperativa expresa una distancia deliberada y sostenida. «Mantente lejos de» conserva el mandato con un español natural y claro.
- source_word: מֵאִישׁ
  english_pob_choice: from a man
  chosen_spanish: de un hombre
  alternatives_spanish:
  - de una persona
  - de alguien
  lexicon: HALOT
  rationale: El sustantivo hebreo es אישי, masculino singular. «Hombre» conserva ese rasgo sin neutralizarlo indebidamente.
- source_word: שַׁלִּיט
  english_pob_choice: who has power
  chosen_spanish: que tiene poder
  alternatives_spanish:
  - que está en autoridad
  - poderoso
  - que puede
  lexicon: HALOT
  rationale: El término apunta a alguien con capacidad o dominio efectivo. «Que tiene poder» refleja la función del término sin forzar un título oficial específico.
- source_word: לַהֲרוֹג
  english_pob_choice: to kill
  chosen_spanish: para matar
  alternatives_spanish:
  - para dar muerte
  - para poner a muerte
  lexicon: HALOT
  rationale: El infinitivo denota matar de manera directa. «Para matar» es la forma más natural y cercana al hebreo.
- source_word: וְאַל תִּפְחַד
  english_pob_choice: and do not fear
  chosen_spanish: y no temas
  alternatives_spanish:
  - y no tengas miedo
  - y no te asustes
  lexicon: HALOT
  rationale: La prohibición se expresa bien en español con la forma «no temas», equivalente directo del imperativo negativo.
- source_word: פַּחֲדֵי מַוֶת
  english_pob_choice: the terrors of death
  chosen_spanish: los terrores de la muerte
  alternatives_spanish:
  - los temores de la muerte
  - el pavor de la muerte
  lexicon: HALOT
  rationale: El plural constructo hebreo sugiere intensidades o terrores vinculados con la muerte. «Los terrores de la muerte» conserva la fuerza del giro y su carácter plural.
theological_decisions:
- issue: Divergencia importante entre el hebreo y el testimonio griego
  english_pob_reading: The main text follows the extant Hebrew, while a footnote preserves the substantially different Greek saying about righteous table companions and boasting in the fear of the Lord.
  chosen_spanish_reading: El texto principal sigue el hebreo conservado; una nota registra la sentencia griega distinta sobre compañeros de mesa justos y la jactancia en el temor del Señor.
  alternative_spanish_readings:
  - Traducir el dicho griego como texto principal
  - Intentar armonizar hebreo y griego en una sola redacción
  rationale: La política del proyecto da primacía al hebreo cuando está conservado. Aquí la diferencia con el griego no es menor, sino una sentencia sustancialmente distinta; por eso se traduce el hebreo como base y se preserva la variante griega en nota para transparencia.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives; preserve source uncertainty honestly'
translation_notes:
  revision_awareness: 'Se siguió el dictamen ya revisado del expediente inglés: no fue necesario cambiar la base hebrea ni suavizar la divergencia con el griego; la nota mantiene la transparencia textual exigida.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo requiera explícitamente; aquí el hebreo conservado no contiene el nombre divino en el cuerpo principal.
  - «Hombre» conserva el valor masculino singular del hebreo.
  - «Muerte» y «terrores» mantienen la intensidad del constructo hebreo sin reinterpretarlo como mero miedo psicológico.
