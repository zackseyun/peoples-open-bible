translation:
  language: es
  text: 'Por tanto, así dice Yahvé: He aquí, estoy poniendo[a] tropiezos ante este pueblo, y tropezarán con ellos[b]—los padres y los hijos juntos; el vecino y su amigo perecerán.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “estoy colocando obstáculos delante de este pueblo”.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: “los padres y los hijos juntos; vecino y su amigo”. La frase subraya que el juicio alcanzará a todos los niveles de la vida familiar y social.'
    reason: cultural_note
lexical_decisions:
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  lexicon: HALOT
  rationale: Conserva el valor inferencial de conclusión a partir del juicio previo, con un conector natural y solemne en español.
- source_word: כֹּה אָמַר יְהוָה
  english_pob_choice: thus says Yahweh
  chosen_spanish: así dice Yahvé
  alternatives_spanish:
  - esto dice Yahvé
  - así dice el Yahvé
  lexicon: HALOT
  rationale: Mantiene la fórmula profética tradicional sin sustituir el nombre divino por un título. 'Yahvé' sigue el criterio POB para יְהוָה.
- source_word: הִנְנִי
  english_pob_choice: Behold
  chosen_spanish: He aquí
  alternatives_spanish:
  - Miren
  - Vean
  lexicon: HALOT
  rationale: Reproduce el matiz deíctico y solemne del original, adecuado al discurso de juicio.
- source_word: נֹתֵן
  english_pob_choice: I am setting
  chosen_spanish: estoy poniendo
  alternatives_spanish:
  - estoy colocando
  - estoy estableciendo
  lexicon: HALOT
  rationale: Evoca la acción de poner obstáculos delante de alguien; en español suena natural y conserva la imagen concreta.
- source_word: אֶל הָעָם הַזֶּה
  english_pob_choice: before this people
  chosen_spanish: ante este pueblo
  alternatives_spanish:
  - delante de este pueblo
  - en el camino de este pueblo
  lexicon: HALOT
  rationale: '''Ante'' comunica la ubicación de los tropiezos sin forzar una lectura adversativa que el hebreo no expresa de manera explícita aquí.'
- source_word: מִכְשֹׁלִים
  english_pob_choice: stumbling blocks
  chosen_spanish: tropiezos
  alternatives_spanish:
  - piedras de tropiezo
  - obstáculos
  lexicon: HALOT
  rationale: Se conserva la idea de algo que provoca caída; 'tropiezos' es más idiomático en español que una calca literal, sin perder la metáfora.
- source_word: וְכָשְׁלוּ בָם
  english_pob_choice: and they will stumble over them
  chosen_spanish: y tropezarán en ellos
  alternatives_spanish:
  - y caerán en ellos
  - y se tropezarán con ellos
  lexicon: HALOT
  rationale: Mantiene el paralelismo verbal con 'tropiezos' y evita una traducción demasiado rígida. 'En ellos' refleja el objeto de la caída.
- source_word: אָבוֹת וּבָנִים יַחְדָּו
  english_pob_choice: fathers and sons together
  chosen_spanish: padres y hijos juntos
  alternatives_spanish:
  - padres e hijos juntos
  - padres e hijos a la vez
  lexicon: HALOT
  rationale: En español, 'padres' puede abarcar el sentido representativo de la línea paterna y resulta natural; se preserva la idea de totalidad familiar y generacional.
- source_word: שָׁכֵן וְרֵעוֹ
  english_pob_choice: neighbor and his friend
  chosen_spanish: el vecino y su amigo
  alternatives_spanish:
  - vecino y su compañero
  - prójimo y su amigo
  lexicon: HALOT
  rationale: '''Vecino'' traduce bien שָׁכֵן en su sentido social de alguien cercano; ''su amigo'' conserva la relación personal de רֵעַ sin introducir un matiz eclesiástico de ''prójimo''.'
- source_word: יֹאבֵדוּ
  english_pob_choice: will perish
  chosen_spanish: perecerán
  alternatives_spanish:
  - serán destruidos
  - se perderán
  lexicon: HALOT
  rationale: Expresa con fuerza el resultado del juicio sin especificar más de lo que el hebreo exige.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton, y el estándar del proyecto pide 'Yahvé' como representación del nombre propio, no una sustitución por título.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: Se tuvo en cuenta el audit trail en inglés, incluyendo la decisión ya asentada de traducir יְהוָה como Yahweh/Yahvé y la nota sobre la posible alternativa lexical de 'obstacles'. No se introdujeron cambios de alcance doctrinal o textual respecto del pasaje fuente; la redacción española busca una equivalencia óptima y publicable, manteniendo la metáfora de tropiezo y el paralelismo social del verso.
  spanish_consistency_notes:
  - Se usó 'Yahvé' según la terminología base del proyecto para יְהוָה.
  - Se prefirió 'tropiezos/tropezarán' para preservar la repetición semántica del hebreo.
  - '''Vecino y su amigo'' mantiene la doble designación social del hebreo sin normalizarla a un solo término.'
  - No se añadió puntuación interpretativa más allá del guion para reflejar la pausa fuerte del original.
