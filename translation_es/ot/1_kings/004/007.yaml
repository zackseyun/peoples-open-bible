translation:
  language: es
  text: Y Salomón tenía doce delegados[a] sobre todo Israel, y ellos proveían al rey y a su casa; cada uno tenía que proveer durante un mes del año.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'funcionarios', 'oficiales' o 'gobernadores' para 'delegados'. El término hebreo se refiere en sentido amplio a administradores designados.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלִשְׁלֹמֹה
  english_pob_choice: And Solomon had
  chosen_spanish: Y Salomón tenía
  alternatives_spanish:
  - Y para Salomón había
  - Y Salomón contaba con
  lexicon: HALOT
  rationale: El ל posesivo/dativo se expresa naturalmente en español con 'tenía' en este contexto administrativo. Se conserva la conexión narrativa con 'Y'.
- source_word: שְׁנֵים עָשָׂר
  english_pob_choice: twelve
  chosen_spanish: doce
  alternatives_spanish:
  - doce en total
  lexicon: HALOT
  rationale: Número cardinal directo y sin ambigüedad.
- source_word: נִצָּבִים
  english_pob_choice: deputies
  chosen_spanish: gobernadores
  alternatives_spanish:
  - funcionarios
  - oficiales
  - delegados
  lexicon: HALOT
  rationale: El término hebreo designa administradores designados o puestos sobre una jurisdicción. Como el inglés POB preserva la amplitud lexical con nota de alternativas, 'gobernadores' refleja la función de autoridad administrativa sin reducirlo a un cargo moderno específico. La nota conserva las alternativas posibles.
- source_word: עַל כָּל יִשְׂרָאֵל
  english_pob_choice: over all Israel
  chosen_spanish: sobre todo Israel
  alternatives_spanish:
  - en todo Israel
  - a cargo de todo Israel
  lexicon: HALOT
  rationale: עַל con este sustantivo administrativo indica autoridad o responsabilidad sobre el conjunto nacional. 'Sobre todo Israel' es idiomático y fiel.
- source_word: וְכִלְכְּלוּ
  english_pob_choice: they provided for
  chosen_spanish: y ellos proveían
  alternatives_spanish:
  - y sostenían
  - y abastecían
  - y mantenían
  lexicon: HALOT
  rationale: El verbo כלכל en este contexto significa suministrar lo necesario para el mantenimiento de la corte. 'Proveían' comunica bien la provisión material sin cargarlo con un matiz demasiado técnico.
- source_word: אֶת הַמֶּלֶךְ וְאֶת בֵּיתוֹ
  english_pob_choice: the king and his household
  chosen_spanish: al rey y a su casa
  alternatives_spanish:
  - al rey y a su familia
  - al rey y a su palacio
  lexicon: HALOT
  rationale: '''Casa'' reproduce בית como la casa real/entorno doméstico-administrativo, no solo el edificio. En español, ''su casa'' mantiene la imagen y la amplitud del término.'
- source_word: חֹדֶשׁ בַּשָּׁנָה
  english_pob_choice: for one month in the year
  chosen_spanish: uno por mes en el año
  alternatives_spanish:
  - un mes en el año
  - mes por mes durante el año
  lexicon: HALOT
  rationale: La expresión distributiva exige claridad en español. 'Uno por mes en el año' comunica la rotación anual de responsabilidad.
- source_word: יִהְיֶה עַל אחד
  english_pob_choice: each one had to provide
  chosen_spanish: debía proveer
  alternatives_spanish:
  - le tocaba proveer
  - era responsable de proveer
  lexicon: HALOT
  rationale: El hebreo expresa que la obligación recaía sobre cada uno por turno. 'Debía proveer' traduce la fuerza obligativa implícita de manera natural.
- source_word: לְכַלְכֵּל
  english_pob_choice: to provide
  chosen_spanish: proveer
  alternatives_spanish:
  - abastecer
  - sustentar
  - mantener
  lexicon: HALOT
  rationale: Se mantiene la misma raíz verbal en ambas apariciones con una traducción consistente y adecuada al contexto de abastecimiento cortesano.
translation_notes:
  revision_awareness: El texto fuente y la auditoría inglesa están en alto acuerdo, sin revisiones aplicadas; se ha conservado el sentido administrativo y distributivo del versículo sin añadir matices no sustentados.
  spanish_consistency_notes:
  - Se usó 'Yahvé' como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - '''Casa'' se emplea en el sentido administrativo de בית, equivalente a ''household'' en la auditoría inglesa.'
  - Se preservó la distribución anual del encargo con una formulación española natural, sin perder el valor de rotación mensual.
