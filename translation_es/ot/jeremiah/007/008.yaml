translation:
  language: es
  text: Miren[a], ustedes están confiando en palabras engañosas, sin provecho[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También podría entenderse como «Vean».
    reason: lexical_alternative
  - marker: b
    text: O «sin beneficio»; también, «para ningún provecho».
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: Miren
  alternatives_spanish:
  - Vean
  - Observen
  - Miren aquí
  lexicon: HALOT
  rationale: La partícula introduce una llamada enfática de atención. «Miren» conserva el valor deíctico y suena natural en español moderno, sin la arcaicidad de «He aquí».
- source_word: בֹּטְחִים
  english_pob_choice: are trusting
  chosen_spanish: están confiando
  alternatives_spanish:
  - confían
  - están confiando en
  - se están apoyando
  lexicon: HALOT
  rationale: El participio expresa acción en curso o estado habitual. «Están confiando» refleja mejor ese aspecto que un presente simple, y mantiene un registro claro y digno.
- source_word: לָכֶם
  english_pob_choice: you are trusting
  chosen_spanish: ustedes
  alternatives_spanish:
  - para ustedes
  - por ustedes
  lexicon: HALOT
  rationale: El pronombre dativo queda naturalmente absorbido por el sujeto explícito en español. No hay suficiente fuerza reflexiva para forzar una glosa como «para ustedes» en el texto principal.
- source_word: עַל
  english_pob_choice: in
  chosen_spanish: en
  alternatives_spanish:
  - sobre
  - apoyados en
  lexicon: HALOT
  rationale: Con בּטח, el español idiomático pide «confiar en». «En» preserva la relación de dependencia sin un calco torpe.
- source_word: דִּבְרֵי הַשָּׁקֶר
  english_pob_choice: deceptive words
  chosen_spanish: palabras engañosas
  alternatives_spanish:
  - palabras mentirosas
  - palabras falsas
  lexicon: HALOT
  rationale: La expresión denota palabras caracterizadas por falsedad. «Engañosas» reproduce bien la fuerza de lo que induce a error y suena natural en español contemporáneo.
- source_word: לְבִלְתִּי הוֹעִיל
  english_pob_choice: to no benefit
  chosen_spanish: para nada
  alternatives_spanish:
  - sin provecho
  - para ningún provecho
  - sin beneficio
  lexicon: HALOT
  rationale: La construcción expresa falta de utilidad. «Para nada» comunica el resultado negativo con naturalidad en español; evita hacer de «palabras» el sujeto de «beneficiar» y conserva la idea de inutilidad.
translation_notes:
  revision_awareness: 'La redacción sigue el acuerdo alto del expediente inglés y adopta la revisión más reciente en el cierre: no convierte el final en una cláusula relativa sobre las palabras, sino que expresa directamente la falta de beneficio («to no benefit» -> «para nada»).'
  spanish_consistency_notes:
  - Se mantiene «ustedes» para el plural de segunda persona, en registro neutral latinoamericano.
  - «Confiando en» conserva el valor de dependencia del verbo בּטח.
  - No se usó «SEÑOR» ni terminología cultual ajena al versículo.
  - El cierre breve evita sobreinterpretar el infinitivo hebreo y mantiene la inutilidad como rasgo del dicho.
