translation:
  language: es
  text: Después de abrir la puerta secreta en el techo[a], arrojaron piedras y derribaron[b] al jefe, y, después de hacerlos pedazos, lanzaron las cabezas[c] a los que estaban afuera.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El término griego es raro y difícil. Probablemente se refiere a una zona superior o del techo; por eso la traducción usa «techo» como opción sobria, sin pretender más certeza de la que el texto ofrece.
    reason: lexical_alternative
  - marker: b
    text: El verbo griego es inusualmente fuerte, con la idea de golpear o destrozar violentamente, casi como con un rayo. «Derribaron» expresa el resultado principal sin exagerar el español.
    reason: lexical_alternative
  - marker: c
    text: El griego dice «las cabezas» en plural. Se conserva el plural aunque la formulación sea extraña en el contexto.
    reason: textual_variant
lexical_decisions:
- source_word: ἀνοίξαντες
  english_pob_choice: After opening
  chosen_spanish: Después de abrir
  alternatives_spanish:
  - abriendo
  - habiendo abierto
  lexicon: BDAG
  rationale: El participio aoristo antecede a las acciones principales; en español, «Después de abrir» expresa bien la secuencia sin perder la relación temporal.
- source_word: κρυπτὴν θύραν
  english_pob_choice: the secret door
  chosen_spanish: la puerta secreta
  alternatives_spanish:
  - la puerta oculta
  - la puerta escondida
  lexicon: LSJ
  rationale: κρυπτήν indica algo oculto o escondido. «Puerta secreta» es natural en español y conserva el matiz de acceso oculto.
- source_word: τοῦ φατινώματος
  english_pob_choice: of the roof chamber
  chosen_spanish: del techo
  alternatives_spanish:
  - del cielo raso
  - del espacio del techo
  - de la estancia superior
  lexicon: LSJ
  rationale: La palabra es rara y el contexto sugiere una abertura en la zona superior. Dado el ajuste revisionado del POB inglés hacia «ceiling», «techo» es la opción más sobria y defendible en español, aunque sigue siendo un término aproximado.
- source_word: βάλλοντες πέτρους
  english_pob_choice: they threw stones
  chosen_spanish: arrojaron piedras
  alternatives_spanish:
  - tiraron piedras
  - lanzaron piedras
  lexicon: BDAG
  rationale: La frase participial indica el medio del ataque. «Arrojaron piedras» es idiomático y directo en español.
- source_word: συνεκεραύνωσαν
  english_pob_choice: struck down
  chosen_spanish: derribaron
  alternatives_spanish:
  - destruyeron
  - golpearon con fuerza
  - abatieron
  lexicon: LSJ
  rationale: El verbo es enérgico y sugiere un golpe violento, casi como un rayo. «Derribaron» comunica el resultado con naturalidad; el matiz más fuerte queda implícito sin exagerar.
- source_word: τὸν ἡγεμόνα
  english_pob_choice: the leader
  chosen_spanish: al jefe
  alternatives_spanish:
  - al líder
  - al gobernador
  - al comandante
  lexicon: BDAG
  rationale: ἡγεμών puede ser dirigente, gobernador o comandante. «Jefe» mantiene la amplitud semántica sin especificar un cargo que el griego no fija con claridad.
- source_word: μέλη ποιήσαντες
  english_pob_choice: after cutting them into pieces
  chosen_spanish: después de hacerlos pedazos
  alternatives_spanish:
  - después de descuartizarlos
  - después de cortarlos en pedazos
  lexicon: LSJ
  rationale: La expresión griega es idiomática para desmembramiento. «Hacerlos pedazos» conserva la violencia del pasaje y suena natural en español; el plural se mantiene conforme al texto griego y al POB inglés revisado.
- source_word: τὰς κεφαλάς
  english_pob_choice: the heads
  chosen_spanish: las cabezas
  alternatives_spanish:
  - las cabezas cortadas
  - las cabezas separadas
  lexicon: BDAG
  rationale: El griego está en plural, y la traducción lo conserva aunque la escena resulte extraña. No se suaviza la irregularidad narrativa.
- source_word: τοῖς ἔξω
  english_pob_choice: to those outside
  chosen_spanish: a los de afuera
  alternatives_spanish:
  - a los que estaban fuera
  - a los de fuera
  lexicon: BDAG
  rationale: El artículo con dativo apunta a personas fuera, no solo a un lugar. «A los de afuera» es natural y conserva esa referencia personal.
theological_decisions:
- issue: Preservación de la rareza textual y de la irregularidad narrativa
  english_pob_reading: The plural heads are retained even though the wording is awkward in context, and the translation does not smooth the oddity away.
  chosen_spanish_reading: Se conserva «las cabezas» en plural, aunque la escena resulte irregular.
  alternative_spanish_readings:
  - su cabeza
  - las cabezas cortadas
  rationale: No hay base para corregir el plural del griego. Mantenerlo permite que el lector perciba la posible irregularidad textual o narrativa que también señala el audit trail inglés.
  doctrine_reference: Principio de transparencia textual y fidelidad al testimonio fuente
translation_notes:
  revision_awareness: He seguido el ajuste del POB inglés que revisó la referencia espacial de «roof chamber» a «ceiling» y que mantuvo el plural de «the heads». En español, eso llevó a preferir «techo» para τοῦ φατινώματος y a conservar el plural «las cabezas» sin armonizar la irregularidad narrativa.
  spanish_consistency_notes:
  - Se evita «SEÑOR» o terminología litúrgica no pertinente; el pasaje no contiene vocabulario divino.
  - «Jefe» se usa para ἡγεμόνα como equivalente amplio y no técnico, en línea con la incertidumbre del contexto.
  - Se conserva un español moderno y digno, sin arcaísmos innecesarios.
  - La puntuación busca reflejar la secuencia participial del griego sin forzar una sintaxis rígida.
