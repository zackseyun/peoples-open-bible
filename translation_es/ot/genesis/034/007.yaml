  rationale: Se revisa la cláusula final para reflejar mejor la fuerza normativa impersonal de וְכֵן לֹא יֵעָשֶׂה, evitando la ambigüedad de «no se hace así». También se añade la nota sobre «en Israel» para alinearse con la documentación auditada del POB. La puntuación se suaviza para una lectura más natural en español.
