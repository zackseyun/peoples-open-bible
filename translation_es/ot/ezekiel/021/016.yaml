  text: וַ/יִּתֵּ֥ן אֹתָ֛/הּ לְ/מָרְטָ֖ה לִ/תְפֹּ֣שׂ בַּ/כָּ֑ף הִֽיא הוּחַ֤דָּה חֶ֨רֶב֙ וְ/הִ֣יא מֹרָ֔טָּה לָ/תֵ֥ת אוֹתָ֖/הּ בְּ/יַד הוֹרֵֽג־־׃
base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/021/016.yaml
  text: It is given to be polished[a], to be grasped in the hand. It is sharpened—the sword—and it is polished[c][b], to put it into the hand of a slayer.
  footnotes:
