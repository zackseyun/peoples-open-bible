translation:
  language: es
  text: 'Y dijo Aquis a sus siervos: «Miren, ustedes ven a un hombre que actúa como loco[a]. ¿Por qué lo traen ante mí?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse como “un hombre que está loco” o “un hombre que finge estar loco”. El participio hebreo puede describir locura real o conducta presentada como locura.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And ... said
  chosen_spanish: Y dijo
  alternatives_spanish:
  - Entonces dijo
  - Entonces habló
  lexicon: HALOT
  rationale: La waw narrativa se reproduce con una conjunción simple en español para conservar el flujo del relato sin forzar una relación discursiva más fuerte de la que exige el hebreo.
- source_word: אָכִישׁ
  english_pob_choice: Achish
  chosen_spanish: Aquis
  alternatives_spanish:
  - Achís
  lexicon: Transliteración bíblica estándar en español
  rationale: Se conserva el nombre propio con una forma española reconocible y natural; 'Aquis' evita una transliteración cruda del inglés y mantiene la identificación del personaje.
- source_word: עֲבָדָיו
  english_pob_choice: his servants
  chosen_spanish: sus siervos
  alternatives_spanish:
  - sus servidores
  - sus oficiales
  lexicon: HALOT
  rationale: En el contexto cortesano, עֲבָדָיו puede referirse a quienes están al servicio del rey. 'Siervos' conserva la relación de servicio y la amplitud del término sin imponer 'oficiales'.
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: Miren
  alternatives_spanish:
  - Miren aquí
  - Vean
  lexicon: HALOT
  rationale: El deíctico exige captar atención; 'Miren' suena natural en español y conserva el tono exhortativo del hebreo.
- source_word: תִרְאוּ
  english_pob_choice: you see
  chosen_spanish: ustedes ven
  alternatives_spanish:
  - ya ven
  - pueden ver
  lexicon: HALOT
  rationale: El hebreo usa segunda persona plural; 'ustedes ven' lo expresa de manera directa y mantiene la observación presente a la que apunta הִנֵּה.
- source_word: אִישׁ
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - un varón
  - una persona
  lexicon: HALOT
  rationale: '''Un hombre'' conserva el sustantivo concreto del hebreo sin generalizar a ''persona''.'
- source_word: מִשְׁתַּגֵּעַ
  english_pob_choice: acting like a madman
  chosen_spanish: que actúa como loco
  alternatives_spanish:
  - que se comporta como demente
  - que parece loco
  - loco
  lexicon: HALOT
  rationale: El participio hitpael describe conducta presentada como locura o conducta insensata en curso; 'que actúa como loco' mantiene ese matiz verbal y evita reducirlo a un adjetivo fijo.
- source_word: לָמָּה
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿Para qué?
  lexicon: HALOT
  rationale: Interrogativo causal directo, sin necesidad de ampliación.
- source_word: תָּבִיאוּ
  english_pob_choice: do you bring
  chosen_spanish: lo traen
  alternatives_spanish:
  - lo llevan
  - ustedes lo traen
  lexicon: HALOT
  rationale: El imperfecto en discurso directo se vuelve natural en español con presente; 'lo traen' refleja la acción en curso o habitual de traerlo ante Aquis, manteniendo la lectura revisada del audit trail.
- source_word: אֹתוֹ אֵלַי
  english_pob_choice: him to me
  chosen_spanish: lo traen a mí
  alternatives_spanish:
  - lo traen hasta mí
  - me lo traen
  lexicon: HALOT
  rationale: El objeto directo y el complemento direccional se unen de forma idiomática en español; 'a mí' conserva la orientación del hebreo sin añadir énfasis ajeno.
translation_notes:
  revision_awareness: La redacción sigue el texto hebreo WLC y se alinea con la revisión del POB en inglés, especialmente en el valor aspectual de תָּבִיאוּ, que se vierte en presente de discurso directo en español para mantener naturalidad y fidelidad. Se conserva la ambigüedad lexical de מִשְׁתַּגֵּעַ mediante una nota, sin resolverla a una sola lectura.
  spanish_consistency_notes:
  - Se mantiene 'siervos' para עֲבָדָיו, coherente con el contexto cortesano y con la terminología POB que evita suavizar el término.
  - Se usa 'Aquis' como forma española del nombre propio, en vez de dejar la transliteración inglesa.
  - No se introduce 'SEÑOR' ni terminología teológica adicional, porque el versículo no contiene el nombre divino ni una referencia cristológica.
  - La puntuación reproduce un discurso directo fluido y publicable en español, con la pregunta retórica claramente delimitada.
