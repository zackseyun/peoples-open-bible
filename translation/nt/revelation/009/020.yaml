id: REV.9.20
reference: Revelation 9:20
source:
  edition: SBLGNT
  text: Καὶ οἱ λοιποὶ τῶν ἀνθρώπων, οἳ οὐκ ἀπεκτάνθησαν ἐν ταῖς πληγαῖς ταύταις, ⸀οὐδὲ μετενόησαν ἐκ τῶν ἔργων τῶν χειρῶν αὐτῶν, ἵνα μὴ ⸀προσκυνήσουσιν τὰ δαιμόνια καὶ τὰ εἴδωλα τὰ χρυσᾶ καὶ τὰ ἀργυρᾶ καὶ τὰ χαλκᾶ καὶ τὰ λίθινα καὶ τὰ ξύλινα, ἃ οὔτε βλέπειν ⸀δύνανται οὔτε ἀκούειν οὔτε περιπατεῖν,
translation:
  text: And the rest of humanity[a], who were not killed by these plagues, did not even repent of the works of their hands, so as not to worship demons and the idols of gold and silver and bronze and stone and wood[c][b], which can neither see nor hear nor walk.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the rest of mankind.' The Greek term is generic for human beings.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'repent from the works of their hands,' an idiom referring especially here to what they had made and worshiped.
    reason: lexical_alternative
  - marker: c
    text: Or, 'so that they would not worship.' The Greek clause can express purpose or intended result.
    reason: alternative_reading
lexical_decisions:
- source_word: οἱ λοιποὶ τῶν ἀνθρώπων
  chosen: the rest of humanity
  alternatives:
  - the rest of mankind
  - the rest of the people
  lexicon: BDAG
  rationale: λοιποί means 'the rest' or 'the remainder.' ἀνθρώπων is a generic human term here, not specifically male; 'humanity' preserves the collective sense in natural English while remaining gender-accurate per project philosophy.
- source_word: ἀπεκτάνθησαν
  chosen: were not killed
  alternatives:
  - were not slain
  lexicon: BDAG
  rationale: Aorist passive of ἀποκτείνω, straightforwardly 'were killed.' 'Slain' is possible but more archaic/literary; 'killed' is clearer modern English.
- source_word: πληγαῖς
  chosen: plagues
  alternatives:
  - blows
  - afflictions
  lexicon: BDAG
  rationale: In Revelation, πληγή commonly refers to divinely sent plagues/judgments. 'Plagues' fits both lexical sense and apocalyptic context.
- source_word: οὐδὲ μετενόησαν
  chosen: did not even repent
  alternatives:
  - nor did they repent
  - and they did not repent
  lexicon: BDAG
  rationale: οὐδέ adds emphatic continuation after the prior clause; 'did not even repent' captures the force that despite surviving the plagues, they still failed to repent.
- source_word: ἐκ τῶν ἔργων τῶν χειρῶν αὐτῶν
  chosen: of the works of their hands
  alternatives:
  - from the works of their hands
  - of what their hands had made
  lexicon: BDAG
  rationale: The idiom refers to what they have made/done, especially idols in context. 'Repent of' is idiomatic English, while preserving the concrete phrase 'works of their hands' maintains the biblical imagery and prepares for the mention of idols.
- source_word: ἵνα μὴ προσκυνήσουσιν
  chosen: so as not to worship
  alternatives:
  - so that they would not worship
  - with the result that they would not worship
  lexicon: BDAG
  rationale: 'The construction expresses intended result/purpose of repentance: repentance would mean ceasing idol worship. English idiom is best captured by ''so as not to worship,'' avoiding a wooden future sense while preserving the clause''s logic.'
- source_word: τὰ δαιμόνια
  chosen: demons
  alternatives:
  - evil spirits
  lexicon: BDAG
  rationale: δαιμόνια in the NT refers to hostile spiritual beings; 'demons' is the standard and clearest rendering.
- source_word: τὰ εἴδωλα
  chosen: the idols
  alternatives:
  - images
  lexicon: BDAG
  rationale: εἴδωλα here clearly denotes cultic idols rather than neutral images. 'Idols' preserves the religious polemic.
- source_word: τὰ χρυσᾶ καὶ τὰ ἀργυρᾶ καὶ τὰ χαλκᾶ καὶ τὰ λίθινα καὶ τὰ ξύλινα
  chosen: of gold and silver and bronze and stone and wood
  alternatives:
  - golden and silver and bronze and stone and wooden idols
  - made of gold and silver and bronze and stone and wood
  lexicon: BDAG
  rationale: These adjectives describe the material composition of the idols. Rendering them as a material list after 'idols' is natural English and preserves the cumulative force.
- source_word: ἃ οὔτε βλέπειν δύνανται οὔτε ἀκούειν οὔτε περιπατεῖν
  chosen: which can neither see nor hear nor walk
  alternatives:
  - which are able neither to see nor to hear nor to walk
  lexicon: BDAG
  rationale: The relative clause mocks the impotence of idols. 'Can neither see nor hear nor walk' is idiomatic and preserves the triad. περιπατεῖν is literally 'to walk,' not merely 'to move.'
