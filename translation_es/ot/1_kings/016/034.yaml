  rationale: La revisión mantiene el sentido establecido por el hebreo y el POB inglés, pero mejora la naturalidad del español contemporáneo («reconstruyó») y la precisión del lenguaje urbano («erigió sus puertas»). También afina la nota b para expresar con mayor claridad la referencia a los dos hijos mencionados.
