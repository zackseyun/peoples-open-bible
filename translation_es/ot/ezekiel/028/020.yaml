lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: came
  chosen_spanish: vino
  alternatives_spanish:
  - llegó
  - fue
  lexicon: HALOT
  rationale: En la fórmula profética ויהי דבר־יהוה אלי, el español natural y fiel es 'vino a mí', que conserva la idea de llegada/dirigirse al profeta sin volver la frase torpemente literal.
- source_word: דְבַר
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - el mensaje
  - el asunto
  lexicon: HALOT
  rationale: '''Palabra'' mantiene la fórmula profética establecida y el peso teológico del término, mientras que ''mensaje'' sería más interpretativo.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: Se conserva el nombre divino del Tetragrámaton como 'Yahvé', conforme al criterio del proyecto; no se sustituye por una mayúscula reverencial como 'SEÑOR'.
- source_word: אֵלַי
  english_pob_choice: to me
  chosen_spanish: a mí
  alternatives_spanish:
  - para mí
  lexicon: HALOT
  rationale: La preposición indica al destinatario de la palabra profética. 'A mí' es la equivalencia natural en español.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - con estas palabras
  - 'así:'
  lexicon: HALOT
  rationale: '''Diciendo'' conserva la función introductoria del discurso directo que sigue, de forma clara y estándar en español.'
theological_decisions:
- issue: Tratamiento del nombre divino יהוה en la fórmula profética
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahveh
  rationale: El texto hebreo contiene directamente el Tetragrámaton. La forma española 'Yahvé' preserva el nombre propio divino en lugar de ocultarlo tras un título, manteniendo la decisión doctrinal del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: El texto inglés auditado no requiere cambios revisionales; la traducción española sigue la misma lectura base con ajuste idiomático natural ('vino a mí') y preserva la decisión auditada sobre el nombre divino.
  spanish_consistency_notes:
  - Se mantiene la fórmula profética breve y solemne.
  - '''Yahvé'' se usa de forma consistente con el estándar del proyecto para יהוה.'
  - '''Palabra'' se conserva por su valor técnico-profético, no se amplía a ''mensaje''.'
