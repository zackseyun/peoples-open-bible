revisions:
- from: 'Aún te dirán al oído[a] los hijos de tu desolación[b]: «El lugar es demasiado estrecho para mí; hazme espacio para que pueda habitar».'
  to: 'Aún dirán a tus oídos[a] los hijos de tu duelo[b]: «El lugar es demasiado estrecho para mí; hazme espacio para que pueda habitar».'
  rationale: Se corrige el núcleo semántico de שִׁכֻּלָיִךְ sustituyendo «desolación» por «duelo», que en este contexto conserva mejor la idea de bereavimiento por pérdida de hijos. También se mejora el modismo auditivo con «a tus oídos», más fiel que «al oído», y se reescriben las notas en español natural y preciso. El resto del verso se mantiene porque es fiel y bien formulado.
  reviewer_model: gpt-5.4
