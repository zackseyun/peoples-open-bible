base_translation:
  language: en
  yaml_path: translation/ot/proverbs/015/014.yaml
  text: The heart of the discerning seeks knowledge[a], but the face of fools feeds on folly.
  footnotes:
  - marker: a
    text: 'Hebrew: ''but the face of fools feeds on folly.'' The Masoretic Text reads ''face(s) of fools''; many translations render the sense as ''mouth of fools'' to fit the parallel image of feeding.'
    reason: alternative_reading
