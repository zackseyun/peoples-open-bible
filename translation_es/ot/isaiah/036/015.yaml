    text: 'Hebreo: «librando librará»; construcción enfática que significa «nos librará ciertamente».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «en mano del rey de Asiria»; la imagen hebrea también puede conservarse como «en manos de» o explicarse como «en poder de».'
    reason: lexical_alternative
  revision_rationale: Se corrigen los anclajes de las notas para que correspondan al hebreo y al audit trail inglés, se ajusta la segunda persona plural a un español más neutral («los», «dejen»), y se mejora la naturalidad del texto principal con «en poder», dejando la imagen hebrea «mano» en nota.
