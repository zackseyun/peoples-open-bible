translation:
  language: es
  text: 'Toquen el cuerno en Guibeá, la trompeta en Ramá; levanten el grito de guerra en Bet-avén[a]: «¡Detrás de ti[b], Benjamín!»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Bet-avén probablemente funciona como un nombre polémico para Betel, con eco de «casa de maldad» o «casa de vanidad».
    reason: cultural_note
  - marker: b
    text: 'O: «Den la alarma en Bet-avén: El enemigo está detrás de ti, Benjamín».'
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּקְעוּ
  english_pob_choice: Blow
  chosen_spanish: Toquen
  alternatives_spanish:
  - Soplen
  - Hagan sonar
  lexicon: HALOT
  rationale: Es el imperativo plural de תקע aplicado a un instrumento de alarma. En español, «tocar» es la colocación más natural y fiel para un cuerno o trompeta, sin perder el valor de señal militar.
- source_word: שׁוֹפָר
  english_pob_choice: horn
  chosen_spanish: el cuerno
  alternatives_spanish:
  - el shofar
  - el cuerno de carnero
  - la trompeta
  lexicon: HALOT
  rationale: Distingue este instrumento de חֲצֹצְרָה en la línea siguiente. «Cuerno» conserva la referencia instrumental sin introducir una paráfrasis excesiva.
- source_word: בַּגִּבְעָה
  english_pob_choice: in Gibeah
  chosen_spanish: en Guibeá
  alternatives_spanish:
  - en Gibeá
  - en la colina
  lexicon: HALOT
  rationale: Nombre propio transliterado al español. Se mantiene el topónimo como en el texto fuente y se adapta la grafía a una forma reconocible en español bíblico.
- source_word: חֲצֹצְרָה
  english_pob_choice: the trumpet
  chosen_spanish: la trompeta
  alternatives_spanish:
  - una trompeta
  - el cuerno
  lexicon: HALOT
  rationale: Designa un instrumento distinto de שׁוֹפָר. «Trompeta» conserva la diferencia lexical con «cuerno» y funciona bien en paralelo en español.
- source_word: בָּרָמָה
  english_pob_choice: in Ramah
  chosen_spanish: en Ramá
  alternatives_spanish:
  - en Ramah
  - en la altura
  lexicon: HALOT
  rationale: Topónimo con artículo/preposición implícitos. Se translitera como nombre propio y se mantiene el paralelismo con Guibeá.
- source_word: הָרִיעוּ
  english_pob_choice: raise the battle cry
  chosen_spanish: eleven el grito de guerra
  alternatives_spanish:
  - den un grito
  - toquen la alarma
  - clamen
  lexicon: HALOT
  rationale: El verbo transmite una alarma ruidosa en contexto militar. «Eleven el grito de guerra» conserva la urgencia y el matiz bélico mejor que un simple «griten».
- source_word: בֵּית אָוֶן
  english_pob_choice: Beth-aven
  chosen_spanish: Bet-avén
  alternatives_spanish:
  - Beth-avén
  - casa de iniquidad
  - Betel
  lexicon: HALOT
  rationale: Se translitera el nombre tal como nombre propio, preservando la ambigüedad polemizante del profeta. La forma española con «v» sigue la adaptación habitual de la vocal hebrea אָוֶן.
- source_word: אַחֲרֶיךָ
  english_pob_choice: Behind you
  chosen_spanish: Detrás de ti
  alternatives_spanish:
  - A tus espaldas
  - Atrás de ti
  lexicon: HALOT
  rationale: Expresa con naturalidad la advertencia abrupta y de alarma. Es la opción más idiomática en español para el aviso de peligro inminente.
- source_word: בִּנְיָמִין
  english_pob_choice: Benjamin
  chosen_spanish: Benjamín
  alternatives_spanish:
  - Benjamin
  lexicon: HALOT
  rationale: Nombre propio bíblico en forma española estándar, ampliamente reconocible y fiel al original.
theological_decisions:
- issue: Valor polemizante de בֵּית אָוֶן
  english_pob_reading: Keep the place name as 'Beth-aven' in the main text and preserve the likely meaning/allusion in a footnote.
  chosen_spanish_reading: Mantener «Bet-avén» en el texto principal y explicar en nota su posible función como nombre polémico para Betel.
  alternative_spanish_readings:
  - Traducirlo como «casa de iniquidad»
  - Sustituirlo por «Betel»
  rationale: El hebreo presenta un nombre propio; por fidelidad al texto se conserva. A la vez, Oseas probablemente juega con la sonoridad y el sentido para denunciar a Betel, así que esa tensión se preserva en la nota sin resolverla por paráfrasis.
  doctrine_reference: 'Translation philosophy: Translate titles; transliterate names; Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La redacción sigue de cerca el hebreo y el audit trail en inglés, sin cambios de sentido respecto de la revisión más reciente; se conserva la tensión interpretativa de Bet-avén y la advertencia militar abrupta.
  spanish_consistency_notes:
  - Se mantiene la distinción entre «cuerno» y «trompeta» para reflejar שׁוֹפָר y חֲצֹצְרָה.
  - 'Los topónimos se transliteran consistentemente en forma española: Guibeá, Ramá, Bet-avén.'
  - «Grito de guerra» conserva el matiz de alarma militar de הָרִיעוּ.
  - La nota textual ofrece la alternativa interpretativa preservada por el POB en inglés sin sustituir el texto principal.
