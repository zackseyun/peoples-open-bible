revisions:
- from: Samuel había muerto[a], y todo Israel había hecho duelo por él y lo había sepultado en Ramá, en su propia ciudad. Y Saúl había quitado de la tierra a los médiums y a los espiritistas.
  to: Samuel había muerto[a], y todo Israel había guardado duelo por él y lo había sepultado en Ramá, en su propia ciudad. Y Saúl había expulsado de la tierra a los médiums y a los espiritistas.
  rationale: Se conserva la fidelidad al hebreo y a las decisiones auditadas, pero se mejora la naturalidad del español con «había guardado duelo» y, sobre todo, con «había expulsado de la tierra», que transmite mejor la idea de remover/suprimir a esos practicantes del territorio.
  reviewer_model: gpt-5.4
