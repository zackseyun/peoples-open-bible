translation:
  language: es
  text: llevando tu espada afilada —tu mandato sin fingimiento— y, de pie, llenó todas las cosas de muerte; y mientras tocaba el cielo[a], había pisado la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «alcanzaba el cielo». El griego presenta una imagen cósmica: tocar el cielo mientras está sobre la tierra, subrayando el alcance universal del juicio.'
    reason: alternative_reading
lexical_decisions:
- source_word: ξίφος ὀξὺ
  english_pob_choice: your sharp sword
  chosen_spanish: tu espada aguda
  alternatives_spanish:
  - una espada aguda
  lexicon: LSJ
  rationale: ξίφος es «espada»; ὀξύ aporta la idea de agudeza. Mantengo el posesivo con «tu», siguiendo el nexo con σου en el miembro siguiente y la imagen de arma perteneciente a Dios.
- source_word: ἀνυπόκριτον
  english_pob_choice: unfeigned
  chosen_spanish: sin fingimiento
  alternatives_spanish:
  - sincero
  - sin hipocresía
  - sin pretensión
  lexicon: LSJ
  rationale: ἀνυπόκριτος expresa lo genuino, sin hipocresía ni apariencia. «Sin fingimiento» conserva bien el contraste con lo simulado y suena natural en español bíblico contemporáneo.
- source_word: ἐπιταγήν
  english_pob_choice: command
  chosen_spanish: mandato
  alternatives_spanish:
  - orden
  - decreto
  - comando
  lexicon: LSJ
  rationale: ἐπιταγή es una orden con autoridad. «Mandato» conserva ese peso formal y encaja mejor en español que un simple «orden».
- source_word: φέρων
  english_pob_choice: bearing
  chosen_spanish: llevando
  alternatives_spanish:
  - portando
  - cargando
  lexicon: LSJ
  rationale: El participio expresa acción simultánea; «llevando» comunica la imagen de portar la espada de manera directa y fluida en español.
- source_word: στὰς
  english_pob_choice: standing
  chosen_spanish: estando en pie
  alternatives_spanish:
  - de pie
  - puesto en pie
  - tomando posición
  lexicon: LSJ
  rationale: El aoristo participial de ἵστημι conserva la idea de ponerse o quedar en posición. «Estando en pie» mantiene la simultaneidad y la solemnidad del cuadro.
- source_word: ἐπλήρωσεν τὰ πάντα θανάτου
  english_pob_choice: he filled all things with death
  chosen_spanish: llenó todas las cosas de muerte
  alternatives_spanish:
  - llenó todo de muerte
  - llenó el universo de muerte
  lexicon: LSJ
  rationale: τὰ πάντα tiene alcance total; «todas las cosas» reproduce ese alcance sin especificar más de lo que dice el griego. «De muerte» sigue de cerca la construcción original.
- source_word: οὐρανοῦ μὲν ἥπτετο
  english_pob_choice: while he touched heaven
  chosen_spanish: mientras tocaba el cielo
  alternatives_spanish:
  - mientras alcanzaba el cielo
  - mientras rozaba el cielo
  - mientras tocaba el cielo
  lexicon: LSJ
  rationale: ἅπτομαι puede ser tocar o alcanzar. «Tocaba el cielo» preserva la imagen cósmica y la continuidad verbal del participio, sin añadir explicación.
- source_word: βέβηκει δʼ ἐπὶ γῆς
  english_pob_choice: he had stepped upon the earth
  chosen_spanish: había puesto el pie sobre la tierra
  alternatives_spanish:
  - había pisado la tierra
  - estaba firme sobre la tierra
  - había stepped upon the earth
  lexicon: LSJ
  rationale: βέβηκε/βέβηκει comunica haber pisado o quedado con firme apoyo. «Había puesto el pie sobre la tierra» mantiene el contraste cielo-tierra y la imagen de postura establecida.
theological_decisions:
- issue: Figura agente en la escena del juicio devastador
  english_pob_reading: The verse depicts God's destructive word/command as a warrior-like agent bearing out divine judgment, without specifying a separate ontological being beyond the text.
  chosen_spanish_reading: El versículo presenta el mandato divino como una figura guerrera que ejecuta juicio, sin identificarla explícitamente como un ser distinto aparte del propio texto.
  alternative_spanish_readings:
  - un ángel destructor
  - el Verbo divino personificado
  rationale: La escena usa personificación e imaginería bélica, pero el griego no obliga a una identificación doctrinal posterior. Conviene preservar esa tensión y no resolverla de antemano.
  doctrine_reference: Preservar la tensión teológica sin añadir una identificación no explícita.
translation_notes:
  revision_awareness: Se siguió el texto griego del LXX (Swete 1909) y el rastro auditado en inglés; no se introdujeron cambios respecto del criterio óptimo documentado, y se mantuvo la tensión entre imagen cósmica y acción judicial sin resolverla doctrinalmente.
  spanish_consistency_notes:
  - Se usó «Yahvé» como terminología por defecto solo cuando corresponde al Tetragrámaton; aquí no aparece en el texto griego de este versículo, por lo que no se insertó.
  - «Mandato» se prefirió por su fuerza formal; no se sustituyó por el más eclesial «decreto» sin necesidad textual.
  - «Tierra» y «cielo» se mantuvieron en registro bíblico estándar y coherente con la imaginería cósmica del pasaje.
