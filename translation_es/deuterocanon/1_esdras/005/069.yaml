translation:
  language: es
  text: Pero las naciones de la tierra[a], juntándose con los que estaban en Judea y asediándolos, obstaculizaban la construcción.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión griega también puede entenderse como 'los pueblos de la tierra'. El participio traducido 'juntándose con' es difícil y también puede sugerir que se les pegaban encima o que se establecían entre ellos; en contexto, la idea es de involucramiento hostil, aclarado por 'asediándolos'.
    reason: lexical_alternative
lexical_decisions:
- source_word: τὰ ... ἔθνη τῆς γῆς
  english_pob_choice: the nations of the land
  chosen_spanish: las naciones de la tierra
  alternatives_spanish:
  - los pueblos de la tierra
  - los gentiles de la tierra
  lexicon: LSJ
  rationale: ἔθνη puede significar naciones, pueblos o gentiles. En este contexto postexílico, el español natural y fiel es “las naciones de la tierra”, que conserva el matiz étnico-político sin introducir un lenguaje confesional posterior como “gentiles”.
- source_word: ἐπικοιμώμενα
  english_pob_choice: joining themselves to
  chosen_spanish: juntándose con
  alternatives_spanish:
  - adhiriéndose a
  - uniéndose a
  - apretándose contra
  lexicon: LSJ
  rationale: El participio es poco usual y de sentido difícil. En contexto, no describe una unión amistosa sino una cercanía hostil que se aclara por el siguiente participio. “Juntándose con” preserva la idea relacional sin forzar un calco extraño en español.
- source_word: τοῖς ἐν τῇ Ἰουδαίᾳ
  english_pob_choice: those in Judea
  chosen_spanish: los de Judea
  alternatives_spanish:
  - los que estaban en Judea
  - el pueblo de Judea
  lexicon: LSJ
  rationale: La frase es sustantiva y amplia. “Los de Judea” es conciso, natural y suficientemente inclusivo, sin añadir un sujeto más específico que el griego no da.
- source_word: πολιορκοῦντες
  english_pob_choice: besieging them
  chosen_spanish: cercándolos
  alternatives_spanish:
  - asediándolos
  - sitiándolos
  - bloqueándolos
  lexicon: LSJ
  rationale: πολιορκέω significa literalmente sitiar/besiegar. En español, “cercándolos” comunica la presión hostil de forma idiomática y mantiene la imagen militar sin sonar excesivamente técnica; la alternativa “asediándolos” también sería válida, pero “cercándolos” fluye mejor en esta construcción.
- source_word: εἶργον
  english_pob_choice: hindered
  chosen_spanish: obstaculizaron
  alternatives_spanish:
  - impidieron
  - estorbaron
  - retuvieron
  lexicon: LSJ
  rationale: El imperfecto expresa una acción continua de oposición. “Obstaculizaron” refleja esa interferencia sostenida y suena más natural en español actual que “impidieron”, que puede sugerir una detención absoluta.
- source_word: τοῦ οἰκοδομεῖν
  english_pob_choice: the building
  chosen_spanish: la construcción
  alternatives_spanish:
  - el edificar
  - la edificación
  - la obra de construir
  lexicon: LSJ
  rationale: El infinitivo no explicita objeto en el griego. A diferencia de la versión inglesa anterior, aquí conviene mantener la indefinición con “la construcción”, sin añadir “casa” o “templo”. Así se respeta el texto base y el ajuste revision-aware del audit trail.
theological_decisions:
- issue: Objeto implícito de “construir”
  english_pob_reading: the building
  chosen_spanish_reading: la construcción
  alternative_spanish_readings:
  - la construcción del templo
  - la obra de edificar
  rationale: El griego dice simplemente “construir”, sin objeto explícito. Aunque el contexto mayor trata de la reconstrucción del templo, el texto de esta cláusula no lo nombra. Por eso se evita especificar “templo” en la línea principal y se conserva la apertura del original.
  doctrine_reference: Principio de primacía del texto fuente y contención contextual; coherente con la revisión inglesa más reciente.
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada para retirar el objeto explícito “of the house”, porque οἰκοδομεῖν es simplemente “to build”. Esta versión española sigue esa revisión y evita añadir “templo” o “casa” en el texto principal. Mantiene, además, la fuerza hostil de los participios con una sintaxis fluida y sobria.
  spanish_consistency_notes:
  - Se conserva “Judea” como topónimo bíblico estándar en español.
  - Se prefiere “las naciones de la tierra” para ἔθνη τῆς γῆς, en línea con el valor étnico-político del contexto.
  - No se introduce “templo” ni “casa” en el texto principal porque el objeto no está explícito en el griego de este versículo.
  - El tono es sobrio y bíblico, pero no arcaizante.
