translation:
  language: es
  text: Así que muestra[a] bondad a tu siervo, porque has traído a tu siervo al pacto de Yahvé contigo.[b] Pero si hay culpa en mí, mátame tú mismo; ¿por qué me llevarías a tu padre?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «muestra lealtad de pacto a tu siervo». El hebreo חֶסֶד puede incluir bondad leal y fidelidad pactual.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «has traído a tu siervo contigo al pacto de Yahvé».'
    reason: alternative_reading
lexical_decisions:
- source_word: וְעָשִׂיתָ חֶסֶד
  english_pob_choice: show kindness
  chosen_spanish: muestra bondad
  alternatives_spanish:
  - muestra lealtad del pacto
  - haz misericordia
  - haz bondad
  lexicon: HALOT
  rationale: חֶסֶד puede abarcar bondad, lealtad y amor de pacto. En español, «muestra bondad» conserva la naturalidad de la súplica directa y deja que el trasfondo de pacto se aclare en la cláusula siguiente.
- source_word: עַל עַבְדֶּךָ
  english_pob_choice: to your servant
  chosen_spanish: a tu siervo
  alternatives_spanish:
  - para tu siervo
  - hacia tu siervo
  lexicon: HALOT
  rationale: El hebreo usa la preposición עַל con el verbo hacer חסד para expresar trato benévolo hacia alguien. En español, «a tu siervo» transmite bien la dirección del acto sin sonar rígido.
- source_word: עַבְדֶּךָ
  english_pob_choice: your servant
  chosen_spanish: tu siervo
  alternatives_spanish:
  - tu esclavo
  - tu servidor
  lexicon: HALOT
  rationale: Aquí la autoidentificación es una fórmula deferente de cortesía entre David y Jonatán. «Siervo» conserva la humildad formal del hebreo sin imponer una connotación de esclavitud física que el contexto no exige.
- source_word: בִּבְרִית יְהוָה
  english_pob_choice: into the covenant of Yahweh
  chosen_spanish: dentro del pacto de Yahvé
  alternatives_spanish:
  - en el pacto de Yahvé
  - bajo el pacto de Yahvé
  - dentro del pacto de Yahvé
  lexicon: HALOT
  rationale: La frase apunta a la incorporación o colocación dentro de una relación pactual solemne ante Yahvé. «Dentro del pacto de Yahvé» sigue de cerca el valor direccional de la construcción y mantiene el nombre divino conforme al criterio del proyecto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El texto hebreo tiene el Tetragrámaton. En este proyecto se translitera como «Yahvé» para preservar el nombre propio del Dios de Israel, no sustituirlo por un título.
- source_word: הֵבֵאתָ אֶת עַבְדְּךָ עִמָּךְ
  english_pob_choice: you have brought your servant into the covenant of Yahweh with yourself
  chosen_spanish: has traído a tu siervo dentro del pacto de Yahvé contigo
  alternatives_spanish:
  - has traído a tu siervo contigo al pacto de Yahvé
  - has traído a tu siervo contigo dentro del pacto de Yahvé
  lexicon: HALOT
  rationale: 'El Hifil de בוא significa «traer». La construcción con עִמָּךְ indica compañía: Jonathan ha incluido a David consigo en la relación de pacto. «Contigo» preserva esa idea relacional de manera clara en español.'
- source_word: וְאִם יֶשׁ בִּי עָוֹן
  english_pob_choice: But if there is guilt in me
  chosen_spanish: Pero si hay culpa en mí
  alternatives_spanish:
  - pero si hay iniquidad en mí
  - pero si soy culpable
  lexicon: HALOT
  rationale: עָוֹן puede referirse a culpa, iniquidad o responsabilidad por culpa. En este contexto de apelación judicial, «culpa» expresa con naturalidad la posibilidad de que David sea realmente culpable.
- source_word: הֲמִיתֵנִי אַתָּה
  english_pob_choice: put me to death yourself
  chosen_spanish: mátame tú mismo
  alternatives_spanish:
  - dame muerte tú mismo
  - hazme morir tú mismo
  lexicon: HALOT
  rationale: El verbo intensivo con el pronombre enfático señala que Jonatán mismo debe ejecutar la sentencia si hay culpa. «Mátame tú mismo» conserva la fuerza directa y el énfasis de אַתָּה.
- source_word: וְעַד אָבִיךָ לָמָּה זֶּה תְבִיאֵנִי
  english_pob_choice: why should you bring me to your father?
  chosen_spanish: ¿por qué me llevarías a tu padre?
  alternatives_spanish:
  - ¿por qué me traerías a tu padre?
  - ¿para qué me llevarías a tu padre?
  lexicon: HALOT
  rationale: 'La pregunta es retórica: si hay culpa, Jonatán debe actuar él mismo y no entregarlo a Saúl. En español, «llevarías» recoge bien el movimiento hacia el padre y mantiene el tono hipotético-retórico del hebreo.'
theological_decisions:
- issue: Uso del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se sigue la decisión doctrinal del proyecto de transliterar el Tetragrámaton en lugar de sustituirlo por un título. Esto conserva el carácter personal y pactual del nombre en la cláusula del pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de חֶסֶד en una súplica interpersonal con trasfondo de pacto
  english_pob_reading: show kindness / show covenant loyalty
  chosen_spanish_reading: muestra bondad
  alternative_spanish_readings:
  - muestra lealtad del pacto
  - muestra amor leal
  - haz misericordia
  rationale: El inglés POB preserva la tensión entre bondad y lealtad de pacto. En español, «bondad» funciona de forma natural en la súplica y no borra el trasfondo pactual, que queda explicitado por «pacto de Yahvé».
  doctrine_reference: HALOT; English POB lexical note on חֶסֶד
translation_notes:
  revision_awareness: El paquete de auditoría indica alta concordancia y ningún cambio aplicado en la última pasada; por eso se mantiene la lectura principal de חֶסֶד como «bondad» con nota alternativa para la dimensión pactual, y se conserva el nombre divino como Yahvé según la política doctrinal vigente.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה.
  - Se mantiene «siervo» como autoidentificación reverencial, coherente con el registro del pasaje.
  - «Pacto» traduce ברית sin sustituirlo por fórmulas eclesiásticas no sustentadas por el texto.
  - La pregunta final conserva el matiz retórico del hebreo sin añadir explicación interpretativa al cuerpo del versículo.
