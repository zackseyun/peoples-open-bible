translation:
  language: es
  text: 'Entonces los levitas —Jeshúa, Kadmiel, Bani, Hasabnías, Serebías, Hodías, Sebanías y Petaquías— dijeron: «Levántense; bendigan a Yahvé, su Dios, desde la eternidad hasta la eternidad. Bendito sea[a] tu nombre glorioso[b], que es exaltado sobre toda bendición y alabanza».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y que bendigan tu glorioso nombre». El verbo hebreo está en tercera persona plural con sentido volitivo; la redacción principal sigue la revisión que lo entiende como una bendición litúrgica sin sujeto explícito.'
    reason: alternative_reading
  - marker: b
    text: Literalmente, «el nombre de tu gloria».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמְרוּ
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijeron
  alternatives_spanish:
  - Y dijeron
  - Luego dijeron
  lexicon: HALOT
  rationale: La waw consecutiva avanza la acción narrativa; «Entonces» conserva esa progresión de forma natural en español sin perder el valor secuencial.
- source_word: הַלְוִיִּם
  english_pob_choice: the Levites
  chosen_spanish: los levitas
  alternatives_spanish:
  - los levitas (con artículo más enfático)
  - los levíticos
  lexicon: HALOT
  rationale: Es el designativo cultual/tribal habitual; «levitas» es el equivalente claro y digno en español bíblico contemporáneo.
- source_word: קוּמוּ
  english_pob_choice: Stand up
  chosen_spanish: Levántense
  alternatives_spanish:
  - Pónganse de pie
  - Levantaos
  lexicon: HALOT
  rationale: El imperativo plural convoca a la asamblea; «Levántense» comunica bien la acción litúrgica y es idiomático en español actual.
- source_word: בָּרֲכוּ
  english_pob_choice: bless
  chosen_spanish: bendigan
  alternatives_spanish:
  - alaben
  - bendecid
  lexicon: HALOT
  rationale: Se conserva el valor lexical de ברך como «bendecir», en vez de sustituirlo por «alabar», para mantener la correspondencia con la familia de palabras del versículo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Tetragrámaton: «Yahvé» preserva el nombre divino revelado y evita la sustitución por un título genérico.'
- source_word: אֱלֹהֵיכֶם
  english_pob_choice: your God
  chosen_spanish: su Dios
  alternatives_spanish:
  - su Dios
  lexicon: HALOT
  rationale: 'El sufijo de 2mp se vierte como «su Dios» por el trato directo a la asamblea en español; el contexto público hace más natural esta concordancia que un calco como «vuestro». '
- source_word: מִן הָעוֹלָם עַד הָעוֹלָם
  english_pob_choice: from everlasting to everlasting
  chosen_spanish: desde la eternidad hasta la eternidad
  alternatives_spanish:
  - desde siempre y para siempre
  - de eternidad a eternidad
  lexicon: HALOT
  rationale: La fórmula idiomática expresa duración sin límite; «desde la eternidad hasta la eternidad» conserva el paralelismo elevado y transparente.
- source_word: וִיבָרְכוּ
  english_pob_choice: Blessed be
  chosen_spanish: Bendito sea
  alternatives_spanish:
  - Sea bendito
  - Que sea bendecido
  lexicon: HALOT
  rationale: La revisión inglesa optó por una jussiva sin sujeto explícito; en español, «Bendito sea» expresa bien el valor desiderativo/optativo sin introducir un sujeto ajeno al hebreo.
- source_word: שֵׁם כְּבוֹדֶךָ
  english_pob_choice: your glorious name
  chosen_spanish: tu nombre glorioso
  alternatives_spanish:
  - el nombre de tu gloria
  - tu nombre de gloria
  lexicon: HALOT
  rationale: Se preserva la relación constructa y el matiz de nombre caracterizado por gloria, con una expresión natural en español.
- source_word: וּמְרוֹמַם
  english_pob_choice: which is exalted
  chosen_spanish: que es exaltado
  alternatives_spanish:
  - y exaltado
  - siendo exaltado
  lexicon: HALOT
  rationale: El participio funciona de modo predicativo; «que es exaltado» respeta el valor descriptivo y fluye bien en español.
- source_word: עַל כָּל בְּרָכָה וּתְהִלָּה
  english_pob_choice: above all blessing and praise
  chosen_spanish: sobre toda bendición y alabanza
  alternatives_spanish:
  - por encima de toda bendición y alabanza
  - más allá de toda bendición y alabanza
  lexicon: HALOT
  rationale: «Sobre» conserva la imagen espacial del hebreo y mantiene el paralelismo de la dupla sustantiva sin añadir matices no presentes en el texto.
theological_decisions:
- issue: Representación del nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto contiene el Tetragrámaton directamente. Siguiendo la política del proyecto en español, se usa «Yahvé» para preservar el nombre propio divino y su fuerza teológica de pacto.
  doctrine_reference: 'DOCTRINE.md Contested terms: יהוה YHWH'
- issue: Valor jussivo de וִיבָרְכוּ en la cláusula final
  english_pob_reading: Blessed be
  chosen_spanish_reading: Bendito sea
  alternative_spanish_readings:
  - Sea bendito
  - Que sea bendecido
  - Y bendigan
  rationale: La revisión auditada en inglés corrigió la lectura hacia una forma sin sujeto explícito. En español, una pasiva/optativa como «Bendito sea» evita añadir un sujeto implícito y refleja mejor la bendición litúrgica del clausulado.
  doctrine_reference: Nehemías 9:5, cláusula final; revisión auditada 2026-04-23
translation_notes:
  revision_awareness: 'Se incorporó la revisión más reciente del audit trail: la cláusula final se rinde como «Bendito sea» para reflejar mejor el jussivo hebreo y evitar introducir un sujeto no explicitado. También se respetó la decisión de traducir el Tetragrámaton con un nombre divino propio en español.'
  spanish_consistency_notes:
  - Se mantiene la lista de nombres propios transliterada de modo coherente y sin adaptar a formas eclesiásticas tradicionales innecesarias.
  - Se conserva la pareja léxica bendición/alabanza para reflejar el paralelo final del hebreo.
  - «Yahvé» se usa de manera consistente con el estándar del proyecto para יְהוָה.
  - La puntuación con rayas reproduce el inciso de la lista de levitas y ayuda a la lectura pública del versículo.
