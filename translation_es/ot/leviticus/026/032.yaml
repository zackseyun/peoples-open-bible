translation:
  language: es
  text: Y yo mismo asolaré la tierra, y vuestros enemigos que habitan en ella quedarán atónitos[a] ante ella.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se asombrarán ante ella» o «se horrorizarán ante ella». El verbo hebreo puede expresar estupor u horror ante la devastación.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַהֲשִׁמֹּתִי
  english_pob_choice: will lay ... waste
  chosen_spanish: asolaré
  alternatives_spanish:
  - devastaré
  - dejaré desolada
  lexicon: HALOT
  rationale: El causativo de שׁמם expresa hacer desolado o arrasar. «Asolaré» comunica bien la fuerza causativa en español bíblico actual, con dignidad y claridad.
- source_word: אֲנִי
  english_pob_choice: I myself
  chosen_spanish: yo mismo
  alternatives_spanish:
  - yo
  - yo en persona
  lexicon: HALOT
  rationale: El pronombre independiente añade énfasis. «Yo mismo» conserva ese énfasis personal sin sonar forzado.
- source_word: הָאָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  - la tierra prometida
  lexicon: HALOT
  rationale: En este contexto de pacto y juicio, el hebreo apunta al territorio de la alianza. «La tierra» es natural en español y mantiene esa referencia sin universalizarla como «el mundo».
- source_word: וְשָׁמְמוּ
  english_pob_choice: will be appalled
  chosen_spanish: quedarán atónitos
  alternatives_spanish:
  - se horrorizarán
  - quedarán horrorizados
  - se asombrarán
  lexicon: HALOT
  rationale: El mismo lexema puede expresar estupor ante la devastación. Como el sujeto son los enemigos que habitan allí, la lectura adecuada es su reacción; «quedarán atónitos» conserva esa tensión de asombro impactado.
- source_word: עָלֶיהָ
  english_pob_choice: at it
  chosen_spanish: ante ella
  alternatives_spanish:
  - por ella
  - sobre ella
  lexicon: HALOT
  rationale: Con el valor de reacción frente a algo devastado, «ante ella» suena natural en español y refleja el objeto de su asombro sin añadir causalidad.
- source_word: אֹיְבֵיכֶם
  english_pob_choice: your enemies
  chosen_spanish: tus enemigos
  alternatives_spanish:
  - vuestros enemigos
  - sus enemigos
  lexicon: HALOT
  rationale: La segunda persona plural del hebreo se vierte en español con «tus» solo si el registro local del proyecto usa voseo singular; sin ese apoyo, la forma más neutral en una frase de énfasis directo es «sus enemigos». Sin embargo, para consistencia litúrgica y lectura directa del texto bíblico, se mantiene «tus» como plural reverencial/lectoral en esta ficha.
- source_word: הַיֹּשְׁבִים בָּהּ
  english_pob_choice: who dwell in it
  chosen_spanish: que habitan en ella
  alternatives_spanish:
  - que viven en ella
  - que moran en ella
  lexicon: HALOT
  rationale: El participio de ישׁב expresa residir o habitar. «Habitan en ella» es solemne y fiel al marco de juicio del pasaje.
theological_decisions:
- issue: Referente de הָאָרֶץ en contexto de pacto
  english_pob_reading: the land (the land of Israel/Canaan in context)
  chosen_spanish_reading: la tierra (la tierra del pacto en contexto)
  alternative_spanish_readings:
  - la tierra de Israel
  - el país
  - la tierra prometida
  rationale: El contexto levítico trata del territorio del pacto, no de la tierra en sentido cósmico. «La tierra» preserva la ambigüedad controlada del hebreo y evita sobreespecificar sin necesidad.
  doctrine_reference: Translation philosophy §1, §5
- issue: Valor semántico de וְשָׁמְמוּ
  english_pob_reading: will be appalled
  chosen_spanish_reading: quedarán atónitos
  alternative_spanish_readings:
  - serán desolados
  - se horrorizarán
  rationale: No se debe borrar la tensión entre desolación y reacción de estupor. Aquí el sujeto son los enemigos, por lo que la lectura de respuesta emotiva es la más ajustada; «quedarán atónitos» preserva esa ambivalencia sin convertirlos en el objeto de la desolación.
  doctrine_reference: Translation philosophy §2, §4
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB inglés, que sustituyó una relación de finalidad («so that») por una coordinación simple («and») para reflejar con más precisión la conjunción hebrea. En español se preserva esa coordinación con «y», sin introducir propósito o consecuencia explicitos que no estén en el texto fuente.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» porque el versículo no contiene el tetragrámaton.
  - Se mantuvo un registro bíblico moderno y claro, evitando arcaísmos innecesarios.
  - La elección de «la tierra» conserva el referente territorial del pacto, coherente con la exégesis del contexto levítico.
