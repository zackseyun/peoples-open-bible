translation:
  language: es
  text: Porque Dios habla de una manera[a], y en dos, aunque uno no la percibe.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Porque Dios habla una vez, y dos, aunque uno no la nota». Los numerales hebreos pueden entenderse adverbialmente («una vez... dos veces») o de modo idiomático («de una manera... y en dos»).'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce una explicación causal o justificativa en el discurso de Eliú. «Porque» conserva bien esa fuerza en español natural.
- source_word: בְאַחַת
  english_pob_choice: in one way
  chosen_spanish: de una manera
  alternatives_spanish:
  - una vez
  - en una cosa
  - de un modo
  lexicon: HALOT
  rationale: La construcción con el numeral es idiomática. En español, «de una manera» comunica mejor la idea de modo o forma de hablar, sin reducirla a conteo temporal.
- source_word: יְדַבֶּר
  english_pob_choice: speaks
  chosen_spanish: habla
  alternatives_spanish:
  - dice
  - se dirige
  lexicon: HALOT
  rationale: El verbo expresa habla comunicativa en sentido general y gnómico. «Habla» es natural y conserva el valor habitual del imperfecto.
- source_word: אֵל
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - Dios Todopoderoso
  - el Dios fuerte
  lexicon: HALOT
  rationale: El título divino común se traduce directamente como «Dios», sin añadir matices no presentes en el hebreo inmediato.
- source_word: וּבִשְׁתַּיִם
  english_pob_choice: and in two
  chosen_spanish: y en dos
  alternatives_spanish:
  - y dos veces
  - y en dos maneras
  lexicon: HALOT
  rationale: Se conserva el paralelismo numérico del hebreo. «Y en dos» mantiene la brevedad poética y deja abierta la interpretación idiomática.
- source_word: לֹא יְשׁוּרֶנָּה
  english_pob_choice: though one does not perceive it
  chosen_spanish: aunque uno no lo percibe
  alternatives_spanish:
  - pero uno no lo nota
  - aunque uno no lo ve
  - sin que uno lo perciba
  lexicon: HALOT
  rationale: El verbo tiene el sentido de mirar, advertir o percibir. «Percibe» expresa adecuadamente la falta de reconocimiento de la comunicación divina, y «uno» conserva el sujeto genérico implícito.
theological_decisions:
- issue: Valor idiomático de los numerales
  english_pob_reading: God speaks in one way, and in two, though one does not perceive it.
  chosen_spanish_reading: Dios habla de una manera, y en dos, aunque uno no lo percibe.
  alternative_spanish_readings:
  - Dios habla una vez, y dos, aunque uno no lo percibe.
  - Dios habla de una forma, y de otra, aunque uno no lo percibe.
  rationale: La evidencia auditada permite entender los numerales adverbialmente o como un paralelismo idiomático. Se preserva la ambigüedad sin fijarla como mera sucesión temporal.
  doctrine_reference: Job 33:14; traducción con preservación de paralelismo poético e ինտencionalidad general del texto
- issue: Sujeto humano genérico en la cláusula final
  english_pob_reading: one does not perceive it
  chosen_spanish_reading: aunque uno no lo percibe
  alternative_spanish_readings:
  - aunque él no lo percibe
  - aunque el ser humano no lo percibe
  rationale: El hebreo presenta un sujeto implícito de tercera persona masculina singular. «Uno» mantiene el valor genérico y evita especificar género o individuo concreto más allá de lo que el texto exige.
  doctrine_reference: Translation philosophy §4 (gender-accurate over gender-neutral)
translation_notes:
  revision_awareness: Se siguió el audit trail en inglés y no se detectaron cambios sustantivos respecto de la última pasada; la revisión más reciente indicó que no había cambios necesarios.
  spanish_consistency_notes:
  - Se usa «Dios» para אֵל, conforme al valor contextual del título divino.
  - Se mantiene la imagen numérica del hebreo sin convertirla en una paráfrasis explicativa.
  - «Percibe» conserva el matiz cognitivo-perceptivo de יְשׁוּרֶנָּה mejor que «ve» o «nota», aunque la nota recoge esa alternativa.
  - La puntuación reproduce una cadencia poética compatible con el paralelismo del original.
