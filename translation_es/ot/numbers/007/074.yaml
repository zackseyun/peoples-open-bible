lexical_decisions:
- source_word: כַּף
  english_pob_choice: dish
  chosen_spanish: fuente
  alternatives_spanish:
  - plato
  - tazón
  - vasija
  lexicon: HALOT
  rationale: En este contexto de ofrenda tabernacular, כַּף designa un recipiente pequeño para presentar el don, no una mano ni una cuchara. «Fuente» comunica bien una pieza de vajilla/ofrenda sin sugerir un utensilio para comer; «vasija» sería más general, pero menos natural aquí.
- source_word: אַחַת
  english_pob_choice: one
  chosen_spanish: una
  alternatives_spanish:
  - uno
  lexicon: HALOT
  rationale: Concuerda con el sustantivo femenino implícito en español y conserva el valor cardinal simple del hebreo.
- source_word: עֲשָׂרָה
  english_pob_choice: ten
  chosen_spanish: diez
  alternatives_spanish:
  - diez de
  lexicon: HALOT
  rationale: Mantiene el número cardinal de la fórmula de peso; en español la medida queda naturalmente expresada como «diez siclos».
- source_word: זָהָב
  english_pob_choice: gold
  chosen_spanish: de oro
  alternatives_spanish:
  - de oro puro
  - oro
  lexicon: HALOT
  rationale: El hebreo funciona de modo atributivo, indicando material. «De oro» es la forma más natural y fiel en español para un objeto hecho de oro.
- source_word: עֲשָׂרָה זָהָב
  english_pob_choice: of ten shekels
  chosen_spanish: de diez siclos
  alternatives_spanish:
  - que pesa diez siclos
  - de peso de diez siclos
  lexicon: HALOT
  rationale: Sigo el sentido contextual de la fórmula repetida en este pasaje, donde la unidad de peso se sobreentiende. En español, «siclos» debe explicitarse para no perder la referencia metrológica; no añado información ajena al contexto, sino la unidad ya presupuesta por la serie.
- source_word: מְלֵאָה
  english_pob_choice: full of
  chosen_spanish: llena de
  alternatives_spanish:
  - repleta de
  - colmada de
  lexicon: HALOT
  rationale: Participio predicativo con valor descriptivo del contenido del recipiente. «Llena de» es la equivalencia más directa y natural.
- source_word: קְטֹרֶת
  english_pob_choice: incense
  chosen_spanish: incienso
  alternatives_spanish:
  - perfume aromático
  - aroma
  lexicon: HALOT
  rationale: Es el término habitual para la sustancia aromática de culto; «incienso» preserva la referencia ritual sin paráfrasis.
translation_notes:
  revision_awareness: Coincide con el patrón repetido de la lista de ofrendas en Números 7 y con la decisión inglesa de suplir la unidad de peso por claridad contextual; no se requiere revisión adicional.
  spanish_consistency_notes:
  - Se mantiene un registro sobrio y litúrgico, pero con español moderno.
  - Se preserva la unidad de peso «siclos» por coherencia con el contexto cultual y metrológico.
  - No se traduce el nombre divino ni aparecen términos cristológicos en este versículo.
