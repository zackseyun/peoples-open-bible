translation:
  language: es
  text: 'Y Simón llamó a sus dos hijos mayores[a], Judas y Juan, y les dijo: “Mis hermanos y yo, y la casa de mi padre, hemos combatido las guerras de Israel desde la juventud hasta este día, y ha prosperado en nuestras manos librar a Israel muchas veces.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más dinámica: “hemos tenido éxito en librar a Israel muchas veces”. El griego dice literalmente: “ha prosperado en nuestras manos librar a Israel muchas veces”.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τοὺς δύο υἱοὺς αὐτοῦ τοὺς πρεσβυτέρους
  english_pob_choice: his two elder sons
  chosen_spanish: sus dos hijos mayores
  alternatives_spanish:
  - sus dos hijos mayores en edad
  - sus dos hijos mayores de edad
  - sus dos hijos primogénitos
  lexicon: LSJ
  rationale: πρεσβυτέρους compara edad dentro de los dos hijos; 'mayores' es natural en español y evita sobrecargar con 'primogénitos', que sugeriría necesariamente prioridad de nacimiento frente a otros hijos.
- source_word: ἐπολεμήσαμεν
  english_pob_choice: have fought
  chosen_spanish: hemos peleado
  alternatives_spanish:
  - hemos luchado
  - hemos hecho guerra
  - peleamos
  lexicon: LSJ
  rationale: El aoristo con alcance hasta el presente se vierte mejor con perfecto en español. 'Peleado' mantiene el registro militar sin sonar tan abstracto como 'hecho guerra'.
- source_word: τοὺς πολέμους Ἰσραήλ
  english_pob_choice: the wars of Israel
  chosen_spanish: las guerras de Israel
  alternatives_spanish:
  - las guerras de Israel
  - las batallas de Israel
  - las guerras por Israel
  lexicon: LSJ
  rationale: '''Guerras de Israel'' conserva la relación genitiva sin decidir de más si son guerras de Israel, por Israel o pertenecientes a su historia nacional.'
- source_word: ἀπὸ νεότητος ἕως τῆς σήμερον ἡμέρας
  english_pob_choice: from youth until this day
  chosen_spanish: desde la juventud hasta este día
  alternatives_spanish:
  - desde nuestra juventud hasta hoy
  - desde la juventud hasta el día de hoy
  lexicon: LSJ
  rationale: '''Desde la juventud'' reproduce el valor idiomático de duración desde la etapa temprana de la vida; ''hasta este día'' conserva la referencia directa al presente del hablante.'
- source_word: εὐώδωθη
  english_pob_choice: it has prospered
  chosen_spanish: ha prosperado
  alternatives_spanish:
  - ha tenido éxito
  - nos ha ido bien
  - ha resultado bien
  lexicon: LSJ
  rationale: El verbo expresa prosperar/salir bien. 'Ha prosperado' conserva la imagen de éxito favorable sin reducirla a mera eficacia humana.
- source_word: ἐν ταῖς χερσὶν ἡμῶν
  english_pob_choice: in our hands
  chosen_spanish: en nuestras manos
  alternatives_spanish:
  - por nuestras manos
  - mediante nuestras manos
  lexicon: LSJ
  rationale: La expresión mantiene el giro bíblico de instrumento o esfera de acción. 'En nuestras manos' preserva la textura del griego y sigue siendo inteligible en español.
- source_word: ῥύσασθαι
  english_pob_choice: to deliver
  chosen_spanish: librar
  alternatives_spanish:
  - rescatar
  - salvar
  - liberar
  lexicon: LSJ
  rationale: '''Librar'' encaja bien en contexto bélico y evita imponer connotaciones soteriológicas más amplias propias de ''salvar''.'
- source_word: πλεονάκις
  english_pob_choice: many times
  chosen_spanish: muchas veces
  alternatives_spanish:
  - frecuentemente
  - repetidas veces
  - muchas ocasiones
  lexicon: LSJ
  rationale: '''Muchas veces'' refleja la repetición enfática del adverbio de manera natural y directa en español.'
theological_decisions:
- issue: Agencia en la liberación de Israel
  english_pob_reading: The text attributes successful deliverance to the speaker's family as the human agents, expressed with a prosperity/success idiom rather than an explicit divine subject.
  chosen_spanish_reading: El texto atribuye el éxito de librar a Israel a la familia del hablante como agentes humanos, mediante un giro de prosperidad, sin nombrar explícitamente a Dios como sujeto.
  alternative_spanish_readings:
  - ha sido próspero el librar a Israel en nuestras manos
  - hemos tenido éxito en librar a Israel muchas veces
  rationale: El griego no menciona explícitamente a Dios aquí; la traducción conserva la atribución humana y la imagen de prosperidad sin resolver la tensión providencial implícita.
  doctrine_reference: Preservar la tensión teológica en lugar de explicarla de más.
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del POB inglés, que prefirió 'elder' por registro más formal. En español se refleja con 'mayores', que conserva la relación comparativa de edad sin introducir una formulación más marcada de sucesión hereditaria. No se requiere otra modificación de contenido.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto cuando aparezca el nombre divino; en este verso no aparece.
  - '''Judas'' y ''Juan'' siguen la forma española usual de los nombres propios del periodo.'
  - Se conserva el paralelismo sintáctico de la proclamación en estilo directo para mantener el tono solemne del original.
  - La nota al pie se ancla en 'mayores' para reflejar la alternativa dinámica preservada por el POB inglés.
