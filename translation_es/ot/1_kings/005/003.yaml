  glossary_alignment: 'No hay conflictos con la terminología doctrinal principal del proyecto. Las decisiones léxicas sobre fauna deben alinearse mejor con el rastro inglés: mantener «ovejas» con nota para צֹאן, y conservar la incertidumbre zoológica con notas separadas para יַחְמוּר y בַרְבֻּרִים. «Aves cebadas» es aceptable para «fattened fowl».'
