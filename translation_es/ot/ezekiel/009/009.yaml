translation:
  language: es
  text: 'Entonces me dijo: “La iniquidad de la casa de Israel y de Judá es grandísima; la tierra está llena de derramamiento de sangre, y la ciudad está llena de perversión[a]. Porque dijeron: ‘Yahvé ha abandonado la tierra, y Yahvé no ve’”.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “llena de distorsión de la justicia”. El hebreo apunta a torcimiento o perversión de lo recto, probablemente incluyendo injusticia judicial.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עֲוֺן
  english_pob_choice: iniquity
  chosen_spanish: iniquidad
  alternatives_spanish:
  - culpa
  - maldad
  - pecado
  lexicon: HALOT
  rationale: El sustantivo expresa culpa/maldad moral acumulada. “Iniquidad” conserva bien ese peso ético y funciona con naturalidad en español bíblico contemporáneo.
- source_word: בֵּית יִשְׂרָאֵל וִיהוּדָה
  english_pob_choice: the house of Israel and Judah
  chosen_spanish: la casa de Israel y de Judá
  alternatives_spanish:
  - Israel y Judá
  - la casa de Israel y Judá
  lexicon: HALOT
  rationale: Mantiene la fórmula corporativa “la casa de” y la coordinación de ambos pueblos como en el hebreo.
- source_word: גָּדוֹל בִּמְאֹד מְאֹד
  english_pob_choice: exceedingly great
  chosen_spanish: grandísima
  alternatives_spanish:
  - muy, muy grande
  - sumamente grande
  - grandemente grande
  lexicon: HALOT
  rationale: El doble intensificador pide una superlación natural en español. “Grandísima” transmite la fuerza sin sonar repetitivo o artificial.
- source_word: דָּמִים
  english_pob_choice: bloodshed
  chosen_spanish: sangre
  alternatives_spanish:
  - derramamiento de sangre
  - sangre derramada
  - homicidio
  lexicon: HALOT
  rationale: Aquí el término plural apunta a violencia sangrienta o sangre culpable. En español, “llena de sangre” preserva la imagen directa y permite la carga idiomática por el contexto.
- source_word: מֻטֶּה
  english_pob_choice: perversion
  chosen_spanish: perversión
  alternatives_spanish:
  - injusticia
  - torcedura
  - distorsión de la justicia
  lexicon: HALOT
  rationale: Sigue la revisión del POB inglés hacia “perversion”, reflejando la idea de desviación/torcimiento. “Perversión” mantiene la ambigüedad productiva entre corrupción moral y deformación de lo recto.
- source_word: עָזַב
  english_pob_choice: has forsaken
  chosen_spanish: ha abandonado
  alternatives_spanish:
  - ha desamparado
  - ha dejado
  - ha forsaken
  lexicon: HALOT
  rationale: El valor es el de desamparo/cese de protección en un marco pactual. “Ha abandonado” comunica bien ese sentido sin sobrecargar el tono.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue la convención del proyecto para el Nombre divino: “Yahvé”, preservando el Tetragrámaton en lugar de sustituirlo por un título.'
- source_word: רֹאֶה
  english_pob_choice: does not see
  chosen_spanish: no ve
  alternatives_spanish:
  - no está viendo
  - no observa
  - no mira
  lexicon: HALOT
  rationale: La forma participial expresa percepción/atención divina negada por los hablantes. “No ve” es breve, fiel y natural en español.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: La política del proyecto pide transliterar el Nombre divino en español. “Yahvé” conserva la referencia personal del Tetragrámaton y evita la sustitución litúrgica por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh/Yahvé'
- issue: Sense of מֻטֶּה in the civic clause
  english_pob_reading: full of perversion
  chosen_spanish_reading: llena de perversión
  alternative_spanish_readings:
  - llena de injusticia
  - llena de corrupción
  - llena de distorsión de la justicia
  rationale: El contexto apunta a desviación moral y posible corrupción judicial. “Perversión” conserva el torcimiento del término hebreo sin fijarlo solo en el ámbito legal.
  doctrine_reference: Ezequiel 9:9 context, lexical note on crookedness/perversion
translation_notes:
  revision_awareness: La redacción sigue el audit trail inglés, incorporando la revisión que favorece “perversión” para מֻטֶּה. Se mantuvo la fuerza del doble énfasis de מְאֹד מְאֹד con una superlación natural en español, y se respetó la distinción entre el Nombre divino y un título.
  spanish_consistency_notes:
  - Se usó “Yahvé” de manera consistente para יְהוָה.
  - Se evitó “SEÑOR” para no ocultar el Nombre divino.
  - La fórmula inicial mantiene el sujeto implícito del hebreo sin añadir información ajena.
  - “Perversión” se eligió para conservar la ambigüedad moral/judicial del término hebreo.
  - La puntuación reproduce la división del discurso directo de forma legible en español.
