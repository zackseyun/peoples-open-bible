translation:
  language: es
  text: Tus fronteras están en el corazón de los mares[a]; tus constructores perfeccionaron tu belleza[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «en medio de los mares».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «completaron tu belleza».'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּלֵב
  english_pob_choice: in the heart of
  chosen_spanish: en el corazón de
  alternatives_spanish:
  - en medio de
  - en el centro de
  lexicon: HALOT
  rationale: לֵב en una expresión espacial conserva la imagen concreta de ‘corazón’ para designar el interior o centro. ‘En el corazón de’ reproduce esa metáfora de manera natural en español y mantiene la fuerza poética del hebreo.
- source_word: יַמִּים
  english_pob_choice: the seas
  chosen_spanish: los mares
  alternatives_spanish:
  - el mar
  - las aguas
  lexicon: HALOT
  rationale: El plural hebreo יַמִּים se conserva mejor con ‘los mares’, que respeta la forma plural y la imaginería marítima del texto.
- source_word: גְּבוּלַיִךְ
  english_pob_choice: your borders
  chosen_spanish: tus límites
  alternatives_spanish:
  - tus fronteras
  - tu territorio
  - tus costas
  lexicon: HALOT
  rationale: גְּבוּל puede significar borde, límite o territorio. ‘Tus límites’ es una opción directa y idiomática en español, y permite conservar la imagen de delimitación sin introducir una lectura más interpretativa como ‘costas’.
- source_word: בֹּנַיִךְ
  english_pob_choice: your builders
  chosen_spanish: tus constructores
  alternatives_spanish:
  - tus edificadores
  - los que te construyeron
  - tus marineros constructores
  lexicon: HALOT
  rationale: El participio de בנה nombra a quienes construyen. ‘Constructores’ conserva el valor básico sin forzar una especificación como ‘astilleros’ o ‘navales’ que el hebreo no exige directamente.
- source_word: כָּלְלוּ
  english_pob_choice: perfected
  chosen_spanish: perfeccionaron
  alternatives_spanish:
  - completaron
  - acabaron
  - llevaron a su plenitud
  lexicon: HALOT
  rationale: ‘Perfeccionaron’ refleja bien la idea de llevar algo a su forma acabada o plena, siguiendo la decisión inglesa de no reducirlo a un simple ‘terminaron’.
- source_word: יָפְיֵךְ
  english_pob_choice: your beauty
  chosen_spanish: tu belleza
  alternatives_spanish:
  - tu hermosura
  - tu esplendor
  - tu hermosura
  lexicon: HALOT
  rationale: יֹפִי/יָפִי se traduce de manera directa por ‘belleza’. ‘Tu belleza’ conserva la personificación poética y la correspondencia semántica más transparente.
translation_notes:
  revision_awareness: El texto español sigue de cerca el informe inglés vigente, conservando la metáfora espacial de בְּלֵב y la ambigüedad lexical de כָּלְלוּ con una nota alternativa. No se introdujeron cambios de sentido respecto del audit trail; solo se naturalizó el orden y el léxico al español.
  spanish_consistency_notes:
  - Se mantuvo el plural ‘los mares’ para respetar יַמִּים.
  - ‘Tus límites’ traduce גְּבוּלַיִךְ sin añadir ‘costas’, que sería más interpretativo.
  - Se conservó la imagen de ‘corazón’ como centro/interior, en paralelo con la decisión inglesa.
  - La nota de כָּלְלוּ preserva la alternativa ‘completaron’ como variante válida en español.
