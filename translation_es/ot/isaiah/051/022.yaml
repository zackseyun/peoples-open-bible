base_translation:
  language: en
  yaml_path: translation/ot/isaiah/051/022.yaml
  text: 'Thus says your Lord[a], Yahweh, and your God, who pleads the cause of his people: Behold, I have taken from your hand the cup of staggering, the bowl of the cup of my wrath[b]; you shall never again drink it.'
  footnotes:
  - marker: a
    text: Or 'the cup of reeling' or 'the cup of trembling.' The Hebrew term refers to the stupefying effect of judgment.
    reason: lexical_alternative
  - marker: b
    text: Or 'the bowl/goblet of the cup of my wrath.' The Hebrew piles up vessel imagery for emphasis.
    reason: lexical_alternative
