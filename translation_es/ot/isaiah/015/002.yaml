base_translation:
  language: en
  yaml_path: translation/ot/isaiah/015/002.yaml
  text: He has gone up to the temple[a], and Dibon to the high places, to weep. Over Nebo and over Medeba Moab wails; on every head is baldness[b], every beard is cut off.
  footnotes:
  - marker: a
    text: Or 'He has gone up to the house, and Dibon to the high places, for weeping.' The Hebrew 'the house' may be understood more literally, but in this context likely refers to a cultic shrine or temple.
    reason: lexical_alternative
  - marker: b
    text: '''Baldness'' and the cutting off of the beard are signs of mourning.'
    reason: cultural_note
