    reason: textual_variant
  - marker: c
    text: 'Hebrew: ''These are your gods''; traditionally often rendered ''This is your god,'' likely influenced by the single calf image.'
    reason: alternative_reading
  - marker: d
    text: Or 'formed it with a graving tool, and made it into a cast calf'.
    reason: previous_rendering
