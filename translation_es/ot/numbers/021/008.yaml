base_translation:
  language: en
  yaml_path: translation/ot/numbers/021/008.yaml
  text: Then Yahweh said to Moses[a], “Make for yourself a fiery serpent and set it on a pole, and it shall be that everyone who is bitten, when he looks at it[b], shall live.”
  footnotes:
