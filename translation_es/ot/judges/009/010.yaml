translation:
  language: es
  text: 'Entonces los árboles le dijeron a la higuera: «Ven tú, reina sobre nosotros».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיֹּאמְרוּ
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijeron
  alternatives_spanish:
  - Y ... dijeron
  - Luego ... dijeron
  lexicon: HALOT
  rationale: La forma waw-consecutiva marca avance narrativo; «entonces» conserva bien esa secuencia en español sin volverla mecánica. «Dijeron» expresa el sentido básico de אמר.
- source_word: הָעֵצִים
  english_pob_choice: the trees
  chosen_spanish: los árboles
  alternatives_spanish:
  - los árboles del bosque
  - la arboleda
  lexicon: HALOT
  rationale: עֵצִים aquí designa árboles, y el contexto de la fábula exige mantener ese sentido literal y transparente.
- source_word: לַתְּאֵנָה
  english_pob_choice: to the fig tree
  chosen_spanish: a la higuera
  alternatives_spanish:
  - a la higuera de higos
  - a la higuera
  lexicon: HALOT
  rationale: תְּאֵנָה nombra la higuera, no solo el fruto, y en español «higuera» es la forma natural y precisa.
- source_word: לְכִי
  english_pob_choice: You come
  chosen_spanish: Ven tú
  alternatives_spanish:
  - Ven
  - Anda, ven
  lexicon: HALOT
  rationale: El imperativo femenino singular de הלך se refleja con «ven»; añado «tú» para conservar el énfasis explícito del hebreo, como en la lectura inglesa que preserva el pronombre.
- source_word: אַתְּ
  english_pob_choice: You
  chosen_spanish: tú
  alternatives_spanish:
  - vos
  - usted
  lexicon: HALOT
  rationale: El pronombre independiente subraya la dirección personal de la invitación. «Tú» mantiene esa explicitud con naturalidad en español.
- source_word: מָלְכִי
  english_pob_choice: reign
  chosen_spanish: reina
  alternatives_spanish:
  - reina sobre
  - gobierna
  lexicon: HALOT
  rationale: El imperativo femenino singular de מלך se vierte con «reina», que conserva la fuerza verbal y resulta idiomático en español. «Gobierna» es posible, pero menos cercano al matiz de reinar.
- source_word: עָלֵינוּ
  english_pob_choice: over us
  chosen_spanish: sobre nosotros
  alternatives_spanish:
  - sobre nosotros
  - por encima de nosotros
  lexicon: HALOT
  rationale: Con מלך, על expresa dominio o gobierno sobre un sujeto; «sobre nosotros» es la equivalencia más directa y clara en español.
translation_notes:
  revision_awareness: El texto inglés POB y el control cruzado muestran acuerdo alto y sin revisiones aplicadas; por eso la versión española sigue de cerca la estructura del hebreo y mantiene el tono de la fábula sin introducir interpretaciones adicionales.
  spanish_consistency_notes:
  - Se conserva la metáfora vegetal de la fábula con términos literales y naturales en español.
  - Se mantiene el tratamiento enfático del hebreo («tú») para reflejar la doble invitación imperativa.
  - No se introduce terminología eclesiástica ni lecturas doctrinales ajenas al versículo.
