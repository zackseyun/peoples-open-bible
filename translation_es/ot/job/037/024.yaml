revisions:
- from: Por tanto, los hombres le temerán[a]; no considera a ningún sabio de corazón.
  to: Por tanto, la gente le temerá[a]; él no considera a los sabios de corazón.
  rationale: Se hace un ajuste menor para mejorar la naturalidad del español y reflejar mejor el plural hebreo en «sabios de corazón», sin cambiar el sentido ni la decisión teológica del POB. Se añade «él» para claridad sintáctica en español y se armoniza la nota con el texto revisado.
