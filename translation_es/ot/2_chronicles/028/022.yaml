revisions:
- from: En el tiempo de su angustia[a], él siguió agravando su infidelidad contra Yahvé—él, el rey Acaz.
  to: 'En el tiempo de su angustia[a], siguió actuando infielmente contra Yahvé: él, el rey Acaz.'
  rationale: Se reemplaza «agravando su infidelidad» por «actuando infielmente» para reflejar más directamente לִמְעוֹל y dejar que וַיּוֹסֶף exprese la continuidad/intensificación. También se ajusta la puntuación final para una aposición enfática más natural en español, preservando el énfasis de הוּא הַמֶּלֶךְ אָחָז.
