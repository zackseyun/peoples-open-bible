id: HOS.9.10
reference: Hosea 9:10
source:
  edition: WLC
  text: כַּ/עֲנָבִ֣ים בַּ/מִּדְבָּ֗ר מָצָ֨אתִי֙ יִשְׂרָאֵ֔ל כְּ/בִכּוּרָ֤ה בִ/תְאֵנָה֙ בְּ/רֵ֣אשִׁיתָ֔/הּ רָאִ֖יתִי אֲבֽוֹתֵי/כֶ֑ם הֵ֜מָּה בָּ֣אוּ בַֽעַל פְּע֗וֹר וַ/יִּנָּֽזְרוּ֙ לַ/בֹּ֔שֶׁת וַ/יִּהְי֥וּ שִׁקּוּצִ֖ים כְּ/אָהֳבָֽ/ם־׃
translation:
  text: Like grapes in the wilderness I found Israel[a]; like the first-ripe fruit on the fig tree in its first season I saw your fathers. They came to Baal-peor and consecrated themselves to shame[d][c][b], and they became detestable like the thing they loved.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the beginning of its season.' The image is of the earliest, especially prized fig.
    reason: lexical_alternative
  - marker: b
    text: '''Shame'' likely refers contemptuously to the idol associated with Baal-peor.'
    reason: alternative_reading
  - marker: c
    text: 'Or ''your ancestors.'' Hebrew: ''your fathers.'''
    reason: lexical_alternative
  - marker: d
    text: Compare Numbers 25:1–5, where Israel joined itself to Baal-peor.
    reason: cross_reference
lexical_decisions:
- source_word: כַּעֲנָבִים בַּמִּדְבָּר
  chosen: Like grapes in the wilderness
  alternatives:
  - Like grapes in the desert
  lexicon: HALOT
  rationale: כְּ marks comparison ('like'). מִדְבָּר can be 'wilderness' or 'desert'; 'wilderness' is slightly broader and idiomatic in prophetic literature, preserving the sense of an unexpected, delightful find in an unfruitful place.
- source_word: מָצָאתִי
  chosen: I found
  alternatives:
  - I discovered
  lexicon: HALOT
  rationale: Straightforward qal perfect 1cs of מצא. 'Found' is the natural English equivalent and keeps the vividness of the metaphor.
- source_word: יִשְׂרָאֵל
  chosen: Israel
  rationale: Proper name, transliterated per translation philosophy.
- source_word: כְּבִכּוּרָה בִתְאֵנָה
  chosen: like the first-ripe fruit on the fig tree
  alternatives:
  - like the early fig on the fig tree
  - like the first fruit of the fig tree
  lexicon: HALOT
  rationale: בִּכּוּרָה denotes first-ripe/early fruit, especially prized. 'First-ripe fruit' communicates both sequence and desirability better than the more technical 'firstfruit' here.
- source_word: בְּרֵאשִׁיתָהּ
  chosen: in its first season
  alternatives:
  - at its beginning
  - at the start of its season
  lexicon: HALOT
  rationale: Literally 'in its beginning,' referring to the fig tree's earliest stage/season of fruiting. 'In its first season' makes the agricultural image clear in natural English.
- source_word: רָאִיתִי אֲבוֹתֵיכֶם
  chosen: I saw your fathers
  alternatives:
  - I regarded your fathers
  - I looked on your fathers
  lexicon: HALOT
  rationale: ראיתי parallels מצאתי in the preceding colon. 'Your fathers' preserves the masculine plural and ancestral reference; it refers to the ancestors of the addressed people.
- source_word: הֵמָּה בָּאוּ בַעַל פְּעוֹר
  chosen: But they came to Baal-peor
  alternatives:
  - They went to Baal-peor
  lexicon: HALOT
  rationale: The pronoun adds emphasis/contrast after the positive opening recollection. 'But they' brings out the adversative force in context, though no separate Hebrew conjunction appears. Baal-peor is a proper cultic name and is transliterated.
- source_word: וַיִּנָּזְרוּ לַבֹּשֶׁת
  chosen: and consecrated themselves to shame
  alternatives:
  - and separated themselves to shame
  - and dedicated themselves to the shameful thing
  lexicon: HALOT
  rationale: 'The Niphal of נזר carries the idea of dedicating/separating oneself, often with consecratory overtones. לַבֹּשֶׁת literally ''to the shame'' likely functions as a contemptuous substitute for the idol/deity. ''Consecrated themselves to shame'' preserves the irony: they devoted themselves religiously to what is shameful.'
- source_word: לַבֹּשֶׁת
  chosen: to shame
  alternatives:
  - to the shameful thing
  - to Shame
  lexicon: HALOT
  rationale: The noun בֹּשֶׁת means 'shame.' In prophetic polemic it can stand metonymically for an idol. Lowercase 'shame' keeps the Hebrew's taunting ambiguity without over-interpreting it as a proper title.
- source_word: וַיִּהְיוּ שִׁקּוּצִים
  chosen: and they became detestable
  alternatives:
  - and they became abominations
  - and they became disgusting things
  lexicon: HALOT
  rationale: שִׁקּוּצִים often denotes abominable/idolatrous things. Here, because the subject is the people, an adjectival predicate in English ('detestable') reads more naturally while preserving the moral-religious revulsion.
- source_word: כְּאָהֳבָם
  chosen: like the thing they loved
  alternatives:
  - according to their love
  - like their beloved idol
  - as they loved
  lexicon: HALOT
  rationale: The phrase is compressed and somewhat ambiguous. In context it most naturally means they became like the object of their love/devotion, i.e., the idol. 'Like the thing they loved' preserves the comparison and leaves the object implicit as in Hebrew.
