revisions:
- from: El corazón de un rey está en la mano de Yahvé; él lo inclina[a] a donde quiere[b].
  to: Como canales de agua[a] es el corazón de un rey en la mano de Yahvé; él lo desvía hacia donde quiere[b].
  rationale: La revisión restaura la imagen fuente explícita de פַּלְגֵי מַיִם, preserva el modismo 'en la mano de Yahvé', mantiene la generalidad proverbial de 'un rey' y usa un verbo más acorde con la metáfora de canales de agua. También conserva las alternativas léxicas documentadas en notas breves y claras para lectores de español.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:47:44Z'
review_pass:
  verdict: revise
  source_alignment_summary: El borrador conserva bien לֶב מֶלֶךְ, בְּיַד יְהוָה, יַחְפֹּץ e יַטֶּנּוּ, y usa correctamente 'Yahvé'. Sin embargo, omite por completo la imagen comparativa inicial פַּלְגֵי מַיִם ('canales/cauces de agua'), que es parte esencial del sentido y del argumento metafórico del proverbio. El hebreo no solo afirma control divino sobre el corazón del rey; lo compara explícitamente con canales de agua que Yahvé puede desviar.
  spanish_quality_summary: 'El español es claro y natural, pero la omisión de la comparación debilita tanto la viveza poética como la lógica de ''lo inclina''. La forma revisada puede sonar plenamente natural en español manteniendo la metáfora: ''Como canales de agua es el corazón de un rey en la mano de Yahvé; él lo desvía...'''
  glossary_alignment: Buena alineación con la terminología del proyecto en 'Yahvé' y el manejo de la soberanía divina. Conviene ajustar el verbo principal a una opción más alineada con la imagen hidráulica; 'desvía' o 'dirige' encajan mejor con פַּלְגֵי מַיִם que 'inclina', aunque 'inclina' no es imposible. También debe restaurarse explícitamente la imagen de 'canales/cauces de agua' según la decisión léxica inglesa documentada.
  issues:
  - severity: high
    issue: Falta la comparación 'פַּלְגֵי מַיִם' en el texto principal.
    rationale: La metáfora de los canales de agua está en el hebreo y en la auditoría inglesa. No puede quedar solo implícita; su omisión altera el sentido literario y reduce la fuerza de la imagen de dirección divina.
  - severity: medium
    issue: La decisión léxica española para פַּלְגֵי מַיִם no corresponde al texto producido.
    rationale: El registro léxico dice que la imagen se mantiene implícita, pero el proyecto exige preservar las decisiones significativas del original y no sustituir una comparación explícita por una formulación resumida.
  - severity: low
    issue: '''Inclina'' es aceptable, pero ''desvía'' o ''dirige'' refleja mejor la metáfora hidráulica.'
    rationale: Con canales de agua, el verbo de נָטָה sugiere encauzar o desviar el flujo. 'Inclina' funciona, pero es menos vívido en español en este contexto.
  revised_spanish_text: Como canales de agua[a] es el corazón de un rey en la mano de Yahvé; él lo desvía hacia donde quiere[b].
  revised_footnotes:
