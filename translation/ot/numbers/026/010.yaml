theological_decisions:
- issue: Reference of the final plural verb and predicate ('they became a sign')
  chosen_reading: The judged rebels/the event of their judgment became a warning sign.
  alternative_readings:
  - The 250 men specifically became a sign
  - The whole episode, including Korah and the congregation, served as a sign
  rationale: The Hebrew plural permits some ambiguity in antecedent. The translation keeps the plural 'they' rather than resolving the reference too narrowly, while 'warning sign' reflects the memorial/judgment function in context.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Relation of Korah to the swallowing/judgment in this verse
  chosen_reading: Retain the verse's wording 'them and Korah' without harmonizing to other passages.
  alternative_readings:
  - Render more interpretively to separate Korah from those swallowed
  rationale: The translation follows the immediate Hebrew syntax and does not import a harmonization from elsewhere. This is a textual/narrative issue rather than a doctrinal one, so the wording remains transparent to the source.
  doctrine_reference: Original-language primacy over translation tradition.
