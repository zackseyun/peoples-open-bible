translation:
  language: es
  text: 'Ha venido la calamidad[a] sobre ti, oh habitante del país. Ha llegado el tiempo; el día está cerca: pánico[b], y no gritos de júbilo en los montes.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «La vuelta ha venido sobre ti» o «Tu destino ha venido». El término hebreo es raro y difícil.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «tumulto, y no eco en los montes». La cláusula final es difícil; muchos la entienden como un contraste entre el pánico y el clamor gozoso que normalmente se oye en los montes, quizá en la vendimia.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַצְּפִירָה
  english_pob_choice: doom
  chosen_spanish: calamidad
  alternatives_spanish:
  - ruina
  - desgracia
  - destino
  - vuelta
  lexicon: HALOT
  rationale: El término hebreo es raro y difícil. En este contexto de juicio, la idea principal es que algo decisivo y funesto ha llegado. 'Calamidad' comunica bien ese valor en español sin cerrar indebidamente la ambigüedad léxica; alternativas como 'vuelta' o 'destino' conservan más literalidad, pero son menos claras en este anuncio profético.
- source_word: יוֹשֵׁב הָאָרֶץ
  english_pob_choice: inhabitant of the land
  chosen_spanish: habitante de la tierra
  alternatives_spanish:
  - morador de la tierra
  - habitante del país
  lexicon: HALOT
  rationale: La construcción funciona como vocativo. 'Habitante de la tierra' sigue de cerca el sentido básico y mantiene la dirección del llamado; 'del país' sería más estrecho y menos natural en este pasaje, mientras que 'morador' suena más arcaico.
- source_word: הָעֵת
  english_pob_choice: the time
  chosen_spanish: el tiempo
  alternatives_spanish:
  - el momento
  - el tiempo señalado
  lexicon: HALOT
  rationale: Se mantiene una expresión directa y sobria. El hebreo anuncia una llegada temporal sin exigir en sí mismo 'tiempo señalado'; por eso 'el tiempo' preserva la fuerza del anuncio sin añadir precisión interpretativa no obligada.
- source_word: קָרוֹב הַיּוֹם
  english_pob_choice: the day is near
  chosen_spanish: el día está cerca
  alternatives_spanish:
  - cerca está el día
  - se acerca el día
  lexicon: HALOT
  rationale: La formulación española reproduce la idea de inminencia de manera natural y fiel. 'Está cerca' mantiene el énfasis del hebreo sin sonar forzado.
- source_word: מְהוּמָה
  english_pob_choice: panic
  chosen_spanish: pánico
  alternatives_spanish:
  - tumulto
  - confusión
  - alarma
  - desorden
  lexicon: HALOT
  rationale: En un contexto de juicio, el término apunta al terror y al desorden que sobrecogen a la gente. 'Pánico' transmite esa fuerza experiencial en español, como en la decisión inglesa de POB.
- source_word: הֵד הָרִים
  english_pob_choice: joyful shouting on the mountains
  chosen_spanish: alboroto en los montes
  alternatives_spanish:
  - gritos de júbilo en los montes
  - eco en los montes
  - clamor en los montes
  lexicon: HALOT
  rationale: El hebreo final es difícil. La POB inglesa entiende un contraste con el tipo de grito gozoso que normalmente se oiría en los montes; en español, 'alboroto' conserva el contraste con 'pánico' y evita especificar más de lo que el hebreo exige. Se prefieren 'montes' para seguir el plural hebreo y la imagen geográfica tradicional.
translation_notes:
  revision_awareness: Se ha seguido de cerca la revisión inglesa más reciente, que no requirió cambios, y se ha conservado su lectura de un término inicial raro y de una clausula final difícil. La versión española mantiene esa misma estructura interpretativa y sus alternativas señaladas en nota.
  spanish_consistency_notes:
  - Se usó 'Yahvé' no porque aparezca aquí, sino porque es la convención general del proyecto cuando el texto lo requiera.
  - Se evitó 'Señor' como sustituto no presente en el hebreo de este versículo.
  - Se mantuvo el tono profético sobrio y de juicio, sin intensificar el texto más allá de la evidencia fuente.
  - '''Montes'' traduce de forma directa el plural hebreo y conserva la imagen del contraste acústico.'
