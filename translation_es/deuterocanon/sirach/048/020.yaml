translation:
  language: es
  text: Entonces invocaron a Dios Altísimo[a], y extendieron sus manos hacia él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El paralelo griego continúa: «y el Santo desde el cielo pronto los oyó, y los libró por mano de Isaías».'
    reason: alternative_reading
lexical_decisions:
- source_word: ויקראו / ἐπεκαλέσαντο
  english_pob_choice: they called
  chosen_spanish: invocaron
  alternatives_spanish:
  - clamaron
  - llamaron
  lexicon: HALOT; LXX ἐπικαλέομαι
  rationale: En este contexto la llamada es una apelación en oración a Dios; «invocaron» comunica mejor ese valor cultual que un simple «llamaron». Mantiene la fuerza del llamado a Dios sin volverlo demasiado interpretativo.
- source_word: אל / τὸν κύριον
  english_pob_choice: to God
  chosen_spanish: a Dios
  alternatives_spanish:
  - al Señor
  - al Dios
  lexicon: HALOT; LXX κύριος
  rationale: El hebreo usa אל con el sentido de dirigirse a Dios, y el paralelo griego dice κύριον. En español, «a Dios» es claro y fiel al referente divino; se evita «Señor» como máscara porque el trasfondo aquí es el nombre/título divino, no un sustituto litúrgico.
- source_word: עליון
  english_pob_choice: Most High
  chosen_spanish: Altísimo
  alternatives_spanish:
  - el Altísimo
  - Exaltado
  lexicon: HALOT
  rationale: ʿElyon es un título divino. Como va en aposición con «Dios», «Dios Altísimo» conserva la compactación del hebreo mejor que ampliar a «Dios, el Altísimo».
- source_word: ויפרשו
  english_pob_choice: spread out
  chosen_spanish: extendieron
  alternatives_spanish:
  - desplegaron
  - alzaron
  lexicon: HALOT
  rationale: El gesto de oración consiste en abrir o extender las manos hacia Dios. «Extendieron» es natural en español y conserva el movimiento del verbo sin añadir una imagen más específica de la que el texto exige.
- source_word: כפים
  english_pob_choice: their hands
  chosen_spanish: sus manos
  alternatives_spanish:
  - sus palmas
  lexicon: HALOT
  rationale: Aunque el hebreo puede aludir más concretamente a las palmas, en español «manos» comunica bien el gesto de oración y evita una precisión innecesaria.
- source_word: אליו
  english_pob_choice: to him
  chosen_spanish: hacia él
  alternatives_spanish:
  - a él
  - ante él
  lexicon: HALOT
  rationale: El hebreo marca dirección hacia Dios; «hacia él» preserva esa orientación gestual de las manos extendidas. En español suena más natural que repetir simplemente «a él» después de «extendieron».
theological_decisions:
- issue: Uso del testimonio hebreo frente a la continuación griega más amplia
  english_pob_reading: The Greek parallel continues, 'and the Holy One from heaven quickly heard them, and delivered them by the hand of Isaiah.'
  chosen_spanish_reading: Se traduce solo la cláusula hebrea conservada como texto principal, y la continuación griega se reserva para nota.
  alternative_spanish_readings:
  - Entonces invocaron a Dios Altísimo, y extendieron hacia él sus manos; y el Santo desde el cielo los oyó pronto, y los libró por mano de Isaías.
  - Entonces clamaron a Dios Altísimo, y extendieron hacia él sus manos.
  rationale: El hebreo disponible es el testimonio primario para este versículo y debe gobernar la línea principal. La continuación griega aporta material real de control textual, pero no está en la cláusula hebrea dada; por eso se conserva como nota y no se incorpora silenciosamente al texto base.
  doctrine_reference: 'PHILOSOPHY.md: traducir desde el hebreo donde sobreviva Sirácides; usar el paralelo griego como control, sin desplazar el testimonio principal.'
translation_notes:
  revision_awareness: Coincide con la revisión más reciente indicada como sin cambios; el borrador mantiene la decisión de no importar la expansión griega al texto principal y usa el hebreo como base.
  spanish_consistency_notes:
  - Se mantiene «Dios» para אל y «Altísimo» para עליון, en línea con la práctica POB.
  - Se evita «SEÑOR» como sustituto automático, porque aquí el referente es el título divino expresado directamente en el hebreo y reflejado por κύριος en el griego.
  - Se conserva el gesto físico de oración con un verbo simple y transparente («extendieron sus manos»), sin añadir matices devocionales no presentes en el texto.
