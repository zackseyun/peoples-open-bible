translation:
  language: es
  text: En todo tiempo tus vestidos sean blancos[b][a], y no falte el aceite sobre tu cabeza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «En todo tiempo, sean blancos tus vestidos».'
    reason: lexical_alternative
  - marker: b
    text: La imagen de vestidos blancos y aceite sobre la cabeza evoca fiesta, alegría y bienestar, más que luto.
    reason: cultural_note
lexical_decisions:
- source_word: בְּכָל עֵת
  english_pob_choice: always
  chosen_spanish: en todo tiempo
  alternatives_spanish:
  - siempre
  - en cada tiempo
  lexicon: HALOT
  rationale: La expresión hebrea significa literalmente 'en todo tiempo / en cada tiempo'. 'En todo tiempo' conserva el alcance continuo del hebreo y suena natural en español bíblico contemporáneo. 'Siempre' sería posible, pero aquí la fórmula más cercana mantiene mejor la cadencia proverbial.
- source_word: יִהְיוּ
  english_pob_choice: let ... be
  chosen_spanish: sean
  alternatives_spanish:
  - que sean
  - estén
  lexicon: HALOT
  rationale: El imperfecto hebreo aquí tiene fuerza exhortativa/jusiva. En español, el subjuntivo exhortativo 'sean' expresa bien ese valor sin añadir elementos ajenos. 'Estén' desplazaría el foco hacia estado más que identidad/apariencia.
- source_word: בְגָדֶיךָ
  english_pob_choice: your garments
  chosen_spanish: tus vestidos
  alternatives_spanish:
  - tus ropas
  - tus prendas
  lexicon: HALOT
  rationale: '''Vestidos'' mantiene el sustantivo concreto y elevado del hebreo, con registro digno y bíblico. ''Ropas'' sería correcto pero más genérico; ''prendas'' suena menos natural en este contexto poético.'
- source_word: לְבָנִים
  english_pob_choice: white
  chosen_spanish: blancos
  alternatives_spanish:
  - de blanco
  - blancas
  lexicon: HALOT
  rationale: El adjetivo hebreo indica blancura. En español, 'blancos' concuerda con 'vestidos' y preserva la imagen sin sobreinterpretarla.
- source_word: וְשֶׁמֶן
  english_pob_choice: oil
  chosen_spanish: aceite
  alternatives_spanish:
  - óleo
  - aceite de oliva
  lexicon: HALOT
  rationale: Aunque el hebreo dice de forma general 'aceite', en español 'aceite' es la equivalencia natural y transparente. 'Óleo' puede sonar más litúrgico o técnico; 'aceite de oliva' explicitaría algo que el texto no dice.
- source_word: עַל רֹאשְׁךָ
  english_pob_choice: on your head
  chosen_spanish: sobre tu cabeza
  alternatives_spanish:
  - en tu cabeza
  - encima de tu cabeza
  lexicon: HALOT
  rationale: '''Sobre tu cabeza'' reproduce la preposición hebrea con naturalidad en español y mantiene la imagen ritual/social del texto.'
- source_word: אַל יֶחְסָר
  english_pob_choice: do not let ... be lacking
  chosen_spanish: no falte
  alternatives_spanish:
  - no carezca
  - no le falte
  lexicon: HALOT
  rationale: La construcción prohibitiva/jusiva se vuelve bien en español con 'no falte'. Esta forma conserva la idea de ausencia o carencia y su tono exhortativo. 'No le falte' introduciría un dativo que no está explícito en el hebreo.
theological_decisions:
- issue: Sentido imagético de vestiduras blancas y aceite en la cabeza
  english_pob_reading: The imagery of white garments and oil on the head evokes festivity, joy, and well-being rather than mourning.
  chosen_spanish_reading: La imagen de vestidos blancos y aceite sobre la cabeza sugiere fiesta, alegría y bienestar, no luto.
  alternative_spanish_readings:
  - La imagen puede aludir a celebración y prosperidad.
  - Vestiduras blancas y aceite en la cabeza evocan gozo más que duelo.
  rationale: Se conserva la lectura simbólica documentada en el POB inglés, útil para entender por qué el proverbio exhorta a un modo de vida festivo y no funerario. La formulación en español evita imponer una alegoría más fuerte de la que el texto respalda.
  doctrine_reference: Sabiduría bíblica; contexto cultural del Antiguo Cercano Oriente
translation_notes:
  revision_awareness: 'El borrador sigue de cerca la evaluación de alta concordancia del texto inglés POB: no se requieren ajustes de revisión. Se mantiene el valor exhortativo del hebreo, el léxico concreto de ''vestidos'' y ''aceite'', y la nota cultural sobre la imaginería festiva.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto cuando aparezca el nombre divino, aunque este versículo no lo contiene.
  - Se evita 'Cristo' y vocabulario doctrinal ajeno al verso.
  - '''Aceite'' se usa de modo general, sin especificar oliva ni unción, porque el hebreo no lo hace.'
  - La puntuación y el orden siguen un registro bíblico moderno y claro, sin arcaísmos innecesarios.
