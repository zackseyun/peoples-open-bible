translation:
  language: es
  text: ¡Ojalá mataras al impío, oh Dios! ¡Apártense de mí, hombres de sangre[a]!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «hombres de sangre», un modismo para hombres violentos u homicidas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  english_pob_choice: If only
  chosen_spanish: ¡Ojalá que…!
  alternatives_spanish:
  - Si
  - Oh, si
  lexicon: HALOT
  rationale: En este contexto optativo, אִם expresa un deseo, no una condición. «Ojalá que» transmite en español la fuerza desiderativa de manera natural y solemne, equivalente a «If only» en la auditoría inglesa.
- source_word: תִּקְטֹל
  english_pob_choice: you would kill
  chosen_spanish: mataras
  alternatives_spanish:
  - mataras tú
  - sacrificaras
  lexicon: HALOT
  rationale: El imperfecto qal de 2ms con valor optativo se vierte mejor con un pretérito de subjuntivo en español dentro de una exclamación de deseo. «Mataras» conserva la acción directa sin suavizarla.
- source_word: אֱלֹוהַּ
  english_pob_choice: O God
  chosen_spanish: oh Dios
  alternatives_spanish:
  - Dios
  - ¡Dios!
  lexicon: HALOT
  rationale: Es un vocativo directo. «Oh Dios» mantiene el tono de invocación y el registro poético sin sobrecargar la frase.
- source_word: רָשָׁע
  english_pob_choice: the wicked
  chosen_spanish: el impío
  alternatives_spanish:
  - el malvado
  - el culpable
  lexicon: HALOT
  rationale: Aunque la forma es singular, funciona de modo genérico/colectivo. «Impío» preserva la carga moral y religiosa del término mejor que una expresión más neutra.
- source_word: וְאַנְשֵׁי דָמִים
  english_pob_choice: and you men of blood
  chosen_spanish: y los hombres de sangre
  alternatives_spanish:
  - y los hombres sanguinarios
  - y los hombres violentos
  - y los asesinos
  lexicon: HALOT
  rationale: Se conserva el hebraísmo «hombres de sangre» porque la POB inglesa mantuvo la imagen literal y añadió una nota explicativa. En español suena idiomático-poético y deja visible la metáfora de violencia/sangre.
- source_word: סוּרוּ
  english_pob_choice: depart
  chosen_spanish: se apartaran
  alternatives_spanish:
  - se fueran
  - se alejaran
  - se retiraran
  lexicon: HALOT
  rationale: El imperativo plural de סור indica alejarse/retirarse. En español, al integrarlo en la construcción optativa, «se apartaran» comunica el alejamiento pedido con naturalidad y sin perder la dirección del mandato.
- source_word: מֶנִּי
  english_pob_choice: from me
  chosen_spanish: de mí
  alternatives_spanish:
  - lejos de mí
  - de mi lado
  lexicon: HALOT
  rationale: La preposición con sufijo de 1cs se expresa de manera directa con «de mí». Es suficientemente clara porque el verbo ya indica movimiento de separación.
theological_decisions:
- issue: Mantener el tono imprecatorio sin suavizarlo
  english_pob_reading: Retain the psalmist's imprecatory wish as a direct appeal to God for the removal of the wicked
  chosen_spanish_reading: Conservar el deseo dirigido a Dios de que elimine al impío, y la orden de que los hombres violentos se alejen del salmista.
  alternative_spanish_readings:
  - Convertirlo en una simple predicción de juicio divino
  - Atenuarlo con «trata con» o «haz frente a»
  rationale: El hebreo expresa un deseo real y enérgico. La traducción debe mantener esa tensión teológica en lugar de diluirla por sensibilidad moderna. «Mataras» y «se apartaran» conservan la fuerza del texto.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: Se mantiene el sentido desiderativo del hebreo אִם y la imagen literal de «hombres de sangre», en línea con la auditoría inglesa de la POB. No se detectaron cambios posteriores en la revisión más reciente.
  spanish_consistency_notes:
  - Se usó «Oh Dios» como vocativo directo para reflejar la apelación explícita del hebreo.
  - Se preservó el plural «los hombres de sangre» para no borrar el giro idiomático del original.
  - Se eligió subjuntivo en español («mataras», «se apartaran») para reproducir la modalidad optativa del verso.
