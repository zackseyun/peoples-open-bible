translation:
  language: es
  text: 'Porque no hay adivinación en Jacob[a], ni sortilegio en Israel; a su debido tiempo se dirá a Jacob y a Israel: «¡Lo que Dios ha hecho![b]»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «contra Jacob»; el hebreo puede entenderse de más de una manera, aunque el contexto favorece una lectura de oposición.
    reason: alternative_reading
  - marker: b
    text: 'Traducción tradicional: «¡Lo que Dios ha obrado!»'
    reason: lexical_alternative
lexical_decisions:
- source_word: נַחַשׁ
  english_pob_choice: divination
  chosen_spanish: adivinación
  alternatives_spanish:
  - augurio
  - adivinación ritual
  lexicon: HALOT
  rationale: En este contexto nominal, el término apunta a prácticas adivinatorias prohibidas. «Adivinación» es el equivalente español más claro y sobrio; evita trivializar el sentido ocultista y mantiene la cercanía semántica con el paralelo siguiente.
- source_word: קֶסֶם
  english_pob_choice: sorcery
  chosen_spanish: sortilegio
  alternatives_spanish:
  - adivinación
  - hechicería
  lexicon: HALOT
  rationale: El hebreo designa una práctica mágica/divinatoria. «Sortilegio» conserva un registro culto y distintivo en español, similar a la diferenciación que el inglés POB buscó entre 'divination' y 'sorcery'.
- source_word: בְּיַעֲקֹב / בְּיִשְׂרָאֵל
  english_pob_choice: in Jacob / in Israel
  chosen_spanish: en Jacob / en Israel
  alternatives_spanish:
  - contra Jacob / contra Israel
  - para Jacob / para Israel
  lexicon: HALOT
  rationale: La preposición ב se mantiene aquí de forma más literal como «en», siguiendo la revisión auditada del inglés POB. En español, esto conserva la ambigüedad de si la referencia es interna o locativa, sin importar una lectura interpretativa no explicitada por el hebreo.
- source_word: כָּעֵת
  english_pob_choice: at the proper time
  chosen_spanish: a su debido tiempo
  alternatives_spanish:
  - en ese momento
  - en el tiempo apropiado
  lexicon: HALOT
  rationale: La expresión temporal apunta a un momento oportuno o fijado. «A su debido tiempo» es idiomático en español y transmite la noción de ocasión apropiada sin endurecerla en un mero 'ahora'.
- source_word: יֵאָמֵר
  english_pob_choice: it will be said
  chosen_spanish: se dirá
  alternatives_spanish:
  - será dicho
  - dirán
  lexicon: HALOT
  rationale: El nifal impersonal se expresa naturalmente en español con una pasiva refleja. «Se dirá» conserva el carácter profético e impersonal del hebreo.
- source_word: לְיַעֲקֹב וּלְיִשְׂרָאֵל
  english_pob_choice: to Jacob and to Israel
  chosen_spanish: a Jacob y a Israel
  alternatives_spanish:
  - de Jacob y de Israel
  - sobre Jacob y sobre Israel
  lexicon: HALOT
  rationale: La construcción con ל se refleja con «a» para mantener el dativo del enunciado, tal como la revisión final del inglés POB. En español, esto sugiere el destinatario de la proclamación.
- source_word: מַה פָּעַל אֵל
  english_pob_choice: What God has done!
  chosen_spanish: ¡Qué ha hecho Dios!
  alternatives_spanish:
  - ¡Qué ha obrado Dios!
  - ¿Qué ha hecho Dios?
  lexicon: HALOT
  rationale: Se conserva el carácter exclamativo proclamatorio que el inglés POB adoptó. «Ha hecho» es claro y directo; «ha obrado» sería posible, pero menos neutro para lectores modernos.
- source_word: אֵל
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - Dios Poderoso
  - el Poderoso
  lexicon: HALOT
  rationale: Aquí אֵל funciona como el título divino común «Dios». No hay necesidad en este contexto de expandirlo a «el Poderoso».
theological_decisions:
- issue: Si la frase niega prácticas ocultistas dentro de Israel o su eficacia frente a Israel
  english_pob_reading: The verse declares that divination and sorcery have no power against Jacob/Israel.
  chosen_spanish_reading: El verso afirma que no hay adivinación ni sortilegio en Jacob/Israel, manteniendo la formulación local del hebreo sin explicitar «contra».
  alternative_spanish_readings:
  - No hay adivinación contra Jacob ni sortilegio contra Israel.
  - No puede haber adivinación que afecte a Jacob/Israel.
  rationale: La revisión auditada del inglés POB optó por acercarse más a la preposición hebrea con «in». En español, conservar «en» respeta esa decisión revisada y evita sobreinterpretar la relación como oposición explícita, aunque el contexto de la profecía sí sugiere la invulnerabilidad de Israel frente a la adivinación.
  doctrine_reference: Numbers 23:23; oracle context in Balaam narrative
- issue: Si מַה פָּעַל אֵל debe leerse como exclamación o interrogación
  english_pob_reading: 'Exclamatory: ''What God has done!'''
  chosen_spanish_reading: 'Exclamatorio: «¡Qué ha hecho Dios!»'
  alternative_spanish_readings:
  - ¿Qué ha hecho Dios?
  - ¡Qué ha obrado Dios!
  rationale: El cierre del verso funciona como proclamación de la acción divina, no como pregunta. La exclamación en español preserva mejor la fuerza retórica del oráculo.
  doctrine_reference: Numbers 23:23; prophetic proclamation
translation_notes:
  revision_awareness: La redacción sigue la revisión final del inglés POB que prefirió «in Jacob / in Israel» y «to Jacob and to Israel» en lugar de las formulaciones interpretativas más explícitas de una fase anterior. La traducción española conserva esa cautela y refleja el tono proclamatorio del cierre.
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֵל según la convención del proyecto.
  - Se usa «adivinación» para נַחַשׁ y «sortilegio» para קֶסֶם, preservando la distinción lexical del paralelismo.
  - Se conserva «Yahvé» como norma del proyecto cuando aparezca el nombre divino; aquí no aparece.
  - Se usa puntuación española con coma antes de la cláusula final y comillas de cierre para la exclamación.
