translation:
  language: es
  text: Que se apresuren y levanten un lamento por nosotros, para que nuestros ojos derramen lágrimas y de nuestros párpados fluya agua[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo dice literalmente «agua», en paralelo poético con «lágrimas». Se conserva la imagen original en el texto principal.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּתְמַהֵרְנָה
  english_pob_choice: Let them hurry
  chosen_spanish: Que se apresuren
  alternatives_spanish:
  - Que se den prisa
  - Que se apresuren rápidamente
  lexicon: HALOT
  rationale: El valor volitivo/jussivo del verbo en contexto exhorta a una acción inmediata; «que se apresuren» conserva la urgencia con español natural y digno.
- source_word: וְתִשֶּׂנָה עָלֵינוּ נֶהִי
  english_pob_choice: and raise a lament over us
  chosen_spanish: y levanten un lamento sobre nosotros
  alternatives_spanish:
  - y alcen un llanto sobre nosotros
  - y entonen un dirge sobre nosotros
  lexicon: HALOT
  rationale: נשא con נהי expresa la idea idiomática de ‘levantar/alzar’ un lamento; «levanten un lamento» mantiene la imagen y evita una paráfrasis más libre.
- source_word: נֶהִי
  english_pob_choice: a lament
  chosen_spanish: un lamento
  alternatives_spanish:
  - un llanto
  - una endecha
  lexicon: HALOT
  rationale: «Lamento» comunica bien el sustantivo de lamentación o duelo y funciona en registro bíblico contemporáneo sin volverse arcaizante.
- source_word: וְתֵרַדְנָה עֵינֵינוּ דִמְעָה
  english_pob_choice: so that our eyes may run down with tears
  chosen_spanish: para que nuestros ojos derramen lágrimas
  alternatives_spanish:
  - para que nuestros ojos desciendan en lágrimas
  - para que lágrimas corran de nuestros ojos
  lexicon: HALOT
  rationale: El hebreo usa la imagen de ‘descender’ aplicada a los ojos y la lágrima; en español, «derramen lágrimas» transmite el fluir con naturalidad y conserva la metáfora sin forzar la sintaxis.
- source_word: דִמְעָה
  english_pob_choice: tears
  chosen_spanish: lágrimas
  alternatives_spanish:
  - llanto
  - una lágrima
  lexicon: HALOT
  rationale: Aunque el hebreo está en singular, aquí funciona colectivamente. En español, el plural es más idiomático y mantiene el paralelismo poético.
- source_word: וְעַפְעַפֵּי/נוּ יִזְּלוּ מָיִם
  english_pob_choice: and our eyelids flow with water
  chosen_spanish: y nuestros párpados destilen aguas
  alternatives_spanish:
  - y nuestros párpados fluyan con agua
  - y de nuestros párpados corra agua
  lexicon: HALOT
  rationale: «Destilen» reproduce bien la imagen de un líquido que gotea o fluye lentamente; «párpados» expresa el hebreo עפעפיים de forma clara. Se conserva «aguas» para reflejar la palabra fuente y su paralelismo poético con «lágrimas».
- source_word: מָיִם
  english_pob_choice: water
  chosen_spanish: aguas
  alternatives_spanish:
  - agua
  - lágrimas
  lexicon: HALOT
  rationale: El texto hebreo dice literalmente «agua(s)»; en español, el plural «aguas» preserva mejor el eco poético y el paralelismo con el miembro anterior, sin ocultar la imagen original.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto hebreo y el cierre auditado en inglés: mantiene el paralelismo entre «lágrimas» y «aguas», y conserva la fuerza volitiva de los verbos en forma exhortativa española.'
  spanish_consistency_notes:
  - Se prefirió «Yahvé» solo cuando corresponda; este versículo no lo contiene.
  - Se mantuvo un registro bíblico claro pero moderno, evitando calcos excesivamente duros.
  - Se conservó la imaginería poética del hebreo sin sustituir «aguas» por una glosa interpretativa en el texto principal.
