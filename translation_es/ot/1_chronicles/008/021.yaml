lexical_decisions:
- source_word: עֲדָיָה
  english_pob_choice: Adaiah
  chosen_spanish: Adaías
  alternatives_spanish:
  - Adaya
  lexicon: nombre propio
  rationale: Es un nombre propio y debe transliterarse, no traducirse. «Adaías» conserva la forma bíblica habitual en español y refleja adecuadamente el hebreo עֲדָיָה.
- source_word: בְרָאיָה
  english_pob_choice: Beraiah
  chosen_spanish: Beraías
  alternatives_spanish:
  - Berías
  lexicon: nombre propio
  rationale: Es un nombre propio. El hebreo con alef interno apoya una forma más plena; en español, «Beraías» preserva mejor esa huella que una simplificación a «Berías».
- source_word: שִׁמְרָת
  english_pob_choice: Shimrath
  chosen_spanish: Shimrat
  alternatives_spanish:
  - Shimrath
  lexicon: nombre propio
  rationale: Es un nombre propio. En español, la transliteración puede omitir la -h final inglesa sin perder la referencia al hebreo שִׁמְרָת; «Shimrat» es más natural como forma española de transliteración.
- source_word: בְּנֵי
  english_pob_choice: the sons of
  chosen_spanish: los hijos de
  alternatives_spanish:
  - los hijos de
  - los hijos
  lexicon: HALOT
  rationale: Es una construcción genealógica plural de «hijo». En español, «los hijos de» comunica de forma natural y fiel la relación de pertenencia o descendencia.
- source_word: שִׁמְעִי
  english_pob_choice: Shimei
  chosen_spanish: Simeí
  alternatives_spanish:
  - Shimei
  lexicon: nombre propio
  rationale: Es un nombre propio. «Simeí» es la forma habitual en español bíblico y representa bien el hebreo שִׁמְעִי.
translation_notes:
  revision_awareness: El control cruzado en inglés muestra alta concordancia y ningún cambio necesario; por eso la versión española sigue de cerca el orden genealógico del hebreo y conserva la lista nominal sin expansión interpretativa.
  spanish_consistency_notes:
  - Mantengo los nombres propios como transliteraciones bíblicas, no como traducciones.
  - 'Conservo la estructura genealógica breve del hebreo: tres nombres + relación filial.'
  - Uso «hijos de» como equivalente natural y transparente de בְּנֵי en contexto de linaje.
