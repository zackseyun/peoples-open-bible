base_translation:
  language: en
  yaml_path: translation/ot/hosea/002/011.yaml
  text: Therefore I will return and take back my grain in its time[a], and my new wine in its season; and I will take away my wool and my flax[b], which were to cover her nakedness.
  footnotes:
  - marker: a
    text: Or 'snatch away' for 'take away' (וְהִצַּלְתִּי), emphasizing sudden removal.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'her nakedness'; the term can also carry the sense of shame through exposure.
    reason: lexical_alternative
