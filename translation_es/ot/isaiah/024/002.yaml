translation:
  language: es
  text: 'Y acontecerá: como con el pueblo, así con el sacerdote; como con el esclavo, así con su amo; como con la esclava, así con su ama; como con el comprador, así con el vendedor; como con el prestamista, así con el prestatario; como con el acreedor, así con el que le debe[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo, literalmente: «como el acreedor, así como el que lleva deuda hacia él».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: And it shall be
  chosen_spanish: Y acontecerá
  alternatives_spanish:
  - Y será
  - Y sucederá
  - Y será así
  lexicon: HALOT
  rationale: La fórmula profética introduce el estado resultante con valor futuro/existencial. «Acontecerá» conserva el registro bíblico sin depender de un giro demasiado arcaico.
- source_word: כָעָם
  english_pob_choice: as with the people
  chosen_spanish: como con el pueblo
  alternatives_spanish:
  - como el pueblo
  - igual que el pueblo
  lexicon: HALOT
  rationale: El comparativo con כ pide un equivalente natural en español. «El pueblo» conserva el valor colectivo y la estructura paralela del verso.
- source_word: כַּכֹּהֵן
  english_pob_choice: so with the priest
  chosen_spanish: así con el sacerdote
  alternatives_spanish:
  - como con el sacerdote
  lexicon: HALOT
  rationale: «Sacerdote» es el sentido directo de כֹּהֵן. Se mantiene la correspondencia balanceada entre los pares sociales.
- source_word: כַּעֶבֶד
  english_pob_choice: as with the slave
  chosen_spanish: como con el esclavo
  alternatives_spanish:
  - como con el siervo
  lexicon: HALOT
  rationale: Se conserva la fuerza social de עֶבֶד en este catálogo de estatus, siguiendo la decisión inglesa de no suavizar a «siervo».
- source_word: כַּאדֹנָיו
  english_pob_choice: so with his master
  chosen_spanish: así con su señor
  alternatives_spanish:
  - así con su amo
  - así con su dueño
  lexicon: HALOT
  rationale: Aquí el poseedor humano del esclavo es el referente inmediato. «Señor» expresa la relación de superioridad social; no se usa para el nombre divino porque el contexto lo excluye.
- source_word: כַּשִּׁפְחָה
  english_pob_choice: as with the female slave
  chosen_spanish: como con la esclava
  alternatives_spanish:
  - como con la sirvienta
  - como con la criada
  lexicon: HALOT
  rationale: שִׁפְחָה nombra específicamente una esclava femenina. «Esclava» preserva la simetría con «esclavo» y evita suavizar el estatus.
- source_word: כַּגְּבִרְתָּהּ
  english_pob_choice: so with her mistress
  chosen_spanish: así con su señora
  alternatives_spanish:
  - así con su dueña
  - así con su patrona
  lexicon: HALOT
  rationale: גְּבִרְתָּהּ es la superior femenina del hogar. «Señora» es la contraparte natural de «esclava» en español y mantiene el paralelismo social.
- source_word: כַּקּוֹנֶה
  english_pob_choice: as with the buyer
  chosen_spanish: como con el comprador
  alternatives_spanish:
  - como con el adquirente
  lexicon: HALOT
  rationale: El participio substantivado se traduce de forma directa e idiomática como «comprador».
- source_word: כַּמּוֹכֵר
  english_pob_choice: so with the seller
  chosen_spanish: así con el vendedor
  alternatives_spanish:
  - así con el mercader
  lexicon: HALOT
  rationale: «Vendedor» conserva el paralelismo comprador/vendedor y refleja bien el valor del participio sustantivado.
- source_word: כַּמַּלְוֶה
  english_pob_choice: as with the lender
  chosen_spanish: como con el prestamista
  alternatives_spanish:
  - como con el que presta
  lexicon: HALOT
  rationale: El participio causativo de לוה designa al que presta. «Prestamista» es el equivalente natural en español y evita una construcción perifrástica.
- source_word: כַּלֹּוֶה
  english_pob_choice: so with the borrower
  chosen_spanish: así con el deudor
  alternatives_spanish:
  - así con el que toma prestado
  - así con el prestatario
  lexicon: HALOT
  rationale: En este contexto la pareja final se mueve entre el que recibe deuda y el que la soporta. «Deudor» sigue el sentido de la lectura inglesa y encaja con la cláusula final del verso.
- source_word: כַּנֹּשֶׁה
  english_pob_choice: as with the creditor
  chosen_spanish: como con el acreedor
  alternatives_spanish:
  - como con el prestamista
  - como con el que exige pago
  lexicon: HALOT
  rationale: נֹשֶׁה es el acreedor, la parte a quien se debe. «Acreedor» es el término jurídico más claro en español.
- source_word: כַּאֲשֶׁר נֹשֶׁא בוֹ
  english_pob_choice: as with the one indebted to him
  chosen_spanish: como con el que le debe
  alternatives_spanish:
  - como con el que está endeudado con él
  - como con su deudor
  lexicon: HALOT
  rationale: La frase relativa describe literalmente al que lleva/porta deuda hacia él. «El que le debe» conserva la relación directa sin perder naturalidad; se evita borrar la tensión semántica entre deuda y obligación con una paráfrasis más libre.
translation_notes:
  revision_awareness: Se siguió el control de revisión más reciente, que marca el texto como sin cambios y con alta concordancia respecto del informe auditado inglés. No se registraron revisiones aplicadas al contenido base; la presente propuesta mantiene esa estabilidad y solo resuelve la equivalencia española de los términos sociales y económicos del catálogo.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto solo cuando aparece el nombre divino; este versículo no lo contiene, por lo que no aplica.
  - Se preservó el valor social fuerte de עֶבֶד/שִׁפְחָה con «esclavo/esclava», en continuidad con la decisión inglesa.
  - Se eligieron términos jurídico-económicos comunes en español («acreedor», «deudor», «prestamista», «comprador», «vendedor») para reflejar el paralelismo del hebreo sin sobreexplicar.
  - No se usó «Cristo/Mesías» ni vocabulario teológico adicional, porque el verso es un catálogo social descriptivo.
