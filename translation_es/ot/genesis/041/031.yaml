translation:
  language: es
  text: Y no se conocerá la abundancia[a] en la tierra a causa de ese hambre posterior[b], porque será muy grave.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «no será conocida»; el verbo hebreo puede expresar ser conocido, reconocido o notado.
    reason: lexical_alternative
  - marker: b
    text: O «el hambre que vendrá después»; el hebreo preserva la referencia demostrativa y la secuencia temporal.
    reason: alternative_reading
lexical_decisions:
- source_word: יִוָּדַע
  english_pob_choice: will not be known
  chosen_spanish: no se conocerá
  alternatives_spanish:
  - no será conocido
  - no se reconocerá
  - no se notará
  lexicon: HALOT
  rationale: El nifal de ידע aquí comunica que la abundancia dejará de ser percibida o tenida en cuenta. «No se conocerá» conserva la idea pasiva y naturalidad en español, sin reducir el matiz a mera memorización.
- source_word: הַשָּׂבָע
  english_pob_choice: the abundance
  chosen_spanish: la abundancia
  alternatives_spanish:
  - la abundancia
  - la plenitud
  - la abundancia de provisiones
  lexicon: HALOT
  rationale: En este contexto agrícola-económico, «abundancia» expresa bien el tiempo de provisión abundante. Es más natural que una traducción más literal como «plenitud».
- source_word: בָּאָרֶץ
  english_pob_choice: in the land
  chosen_spanish: en la tierra
  alternatives_spanish:
  - en el país
  - en la región
  - en la tierra
  lexicon: HALOT
  rationale: «Tierra» conserva el sentido regional del hebreo en Génesis 41, sin absolutizarlo como «mundo». En español bíblico sigue siendo transparente y fiel.
- source_word: מִפְּנֵי
  english_pob_choice: because of
  chosen_spanish: a causa de
  alternatives_spanish:
  - por
  - debido a
  - a causa de
  lexicon: HALOT
  rationale: La relación causal es clara en el hebreo. «A causa de» es idiomático y mantiene el valor explicativo del hebreo sin sonar forzado.
- source_word: הָרָעָב הַהוּא אַחֲרֵי כֵן
  english_pob_choice: that famine afterward
  chosen_spanish: ese hambre después
  alternatives_spanish:
  - ese hambre posterior
  - el hambre que vendrá después
  - ese hambre después
  lexicon: HALOT
  rationale: La frase hebrea coloca la referencia demostrativa y luego la secuencia temporal. «Ese hambre después» conserva esa cercanía formal; aunque suena algo marcada, refleja el orden del original mejor que una paráfrasis más libre.
- source_word: כִּי כָבֵד הוּא מְאֹד
  english_pob_choice: for it will be very severe
  chosen_spanish: porque será muy grave
  alternatives_spanish:
  - porque será muy severo
  - porque será muy pesado
  - porque será gravísimo
  lexicon: HALOT
  rationale: כבד literalmente es «pesado», pero aplicado al hambre significa severo, intenso o grave. «Muy grave» transmite esa fuerza en español moderno sin perder la intensidad del hebreo.
translation_notes:
  revision_awareness: 'El audit trail inglés pasó de una formulación más interpretativa («recognized») a una más literal («known») y revisó la frase temporal para reflejar mejor el hebreo. La versión española sigue esa orientación: conserva el valor pasivo de ידע, mantiene el demostrativo de הַהוּא y respeta la secuencia אַחֲרֵי כֵן sin introducir una explicación más libre.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma proyectual cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se usa «tierra» para בָּאָרֶץ en sentido regional, consistente con Génesis 41.
  - Se evita «Cristo/Mesías» porque no corresponde al versículo.
  - La construcción «no se conocerá» conserva el matiz impersonal/pasivo del nifal hebreo.
  - «Hambre» se conserva por fidelidad al sustantivo hebreo רָעָב; «grave» traduce la fuerza idiomática de כָבֵד.
