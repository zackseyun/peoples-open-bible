  to: para que se haga una búsqueda en el libro de registros de tus padres[a], y encuentres en el libro de registros y sepas que esta ciudad es una ciudad rebelde, perjudicial para reyes y provincias, y que se ha hecho sedición dentro de ella desde días antiguos[b]; por esta razón esta ciudad fue devastada.
