lexical_decisions:
- source_word: וַיְדַבֵּר
  english_pob_choice: Then ... spoke
  chosen_spanish: Entonces ... habló
  alternatives_spanish:
  - Y ... habló
  - Entonces ... dijo
  lexicon: HALOT
  rationale: El verbo דבר marca el avance narrativo de la fórmula introductoria; en español, «entonces» conserva la secuencia y «habló» mantiene el matiz de acto de habla más natural que un simple «dijo».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino del texto hebreo. En el proyecto, יהוה se vierte como «Yahvé», no como sustituto titular.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - para
  - hacia
  lexicon: HALOT
  rationale: La preposición introduce el destinatario del habla; en español, «a» es la equivalencia natural para el complemento indirecto.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  alternatives_spanish:
  - Moisés
  lexicon: HALOT
  rationale: Nombre propio bíblico según la convención española estándar.
- source_word: לֵּאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - para decir
  lexicon: HALOT
  rationale: La fórmula hebrea introduce el discurso directo; «diciendo» conserva la construcción sin añadir contenido no explicitado.
theological_decisions:
- issue: Representación del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El hebreo usa el Tetragrámaton directamente. Siguiendo la decisión auditada del POB inglés, la traducción española preserva el nombre propio con «Yahvé», evitando una sustitución titulativa.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requirieron cambios; la concordancia con el audit trail inglés es alta y estable. No hay variantes textuales en este versículo, solo una decisión constante sobre el nombre divino y la fórmula introductoria de discurso.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico claro y publicable, con puntuación española estándar.
  - «Yahvé» se usa de forma consistente para יהוה en lugar de la sustitución tradicional.
  - La coma antes de «diciendo» refleja la fórmula de introducción de discurso y coincide con el flujo del hebreo y del inglés auditado.
