translation:
  language: es
  text: Y los sacerdotes estaban en sus puestos, y los levitas con los instrumentos de canto para Yahvé[a], que el rey David había hecho para dar gracias a Yahvé, porque su amor fiel es para siempre[b], cuando David ofrecía alabanza por medio de ellos[c]; y los sacerdotes tocaban trompetas frente a ellos, mientras todo Israel estaba de pie.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse como 'con los instrumentos musicales de Yahvé'. La frase hebrea también puede referirse a instrumentos dedicados a Yahvé o usados para el canto a Yahvé.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo idiomático: ''porque para siempre es su amor fiel''; en español se expresa de forma natural como ''porque su amor fiel es para siempre''.'
    reason: lexical_alternative
  - marker: c
    text: La construcción hebrea es comprimida y puede entenderse como que la alabanza de David se realizaba por mediación de los levitas.
    reason: alternative_reading
lexical_decisions:
- source_word: מִשְׁמְרוֹתָם
  english_pob_choice: their posts
  chosen_spanish: sus puestos
  alternatives_spanish:
  - sus turnos
  - sus funciones
  - sus estaciones
  lexicon: HALOT
  rationale: El término señala posiciones o asignaciones de servicio en el templo. 'Sus puestos' conserva la idea de ubicación y servicio ordenado sin volverlo demasiado abstracto.
- source_word: בִּכְלֵי שִׁיר יְהוָה
  english_pob_choice: with the instruments of song to Yahweh
  chosen_spanish: con los instrumentos de canto para Yahvé
  alternatives_spanish:
  - con los instrumentos musicales de Yahvé
  - con los instrumentos del canto de Yahvé
  - con los instrumentos de la canción para Yahvé
  lexicon: HALOT
  rationale: כְּלֵי שִׁיר puede referirse a instrumentos musicales vinculados al canto litúrgico. 'De canto' mantiene la relación con שִׁיר y evita diluir el sentido cultual.
- source_word: לְהוֹדוֹת לַיהוָה
  english_pob_choice: to give thanks to Yahweh
  chosen_spanish: para dar gracias a Yahvé
  alternatives_spanish:
  - para alabar a Yahvé
  - para confesar gracias a Yahvé
  - para agradecer a Yahvé
  lexicon: HALOT
  rationale: El verbo en hifil suele significar dar gracias o alabar. Aquí, por la fórmula que sigue, 'dar gracias' es la opción más precisa y natural en español.
- source_word: כִּי לְעוֹלָם חַסְדּוֹ
  english_pob_choice: for his steadfast love endures forever
  chosen_spanish: porque para siempre es su amor fiel
  alternatives_spanish:
  - porque su misericordia es para siempre
  - porque para siempre es su amor constante
  - porque su amor leal dura para siempre
  lexicon: HALOT
  rationale: חֶסֶד abarca lealtad de pacto, bondad y misericordia. 'Amor fiel' preserva esa fuerza relacional y de fidelidad, sin reducirlo a 'misericordia'.
- source_word: בְּהַלֵּל דָּוִיד בְּיָדָם
  english_pob_choice: when David offered praise by their hand
  chosen_spanish: cuando David ofrecía alabanza por medio de ellos
  alternatives_spanish:
  - cuando David alababa por su mano
  - cuando David ofrecía alabanza por su mediación
  - cuando David alababa por medio de sus manos
  lexicon: HALOT
  rationale: La construcción es comprimida y expresa agencia/instrumentalidad. 'Por medio de ellos' mantiene la idea de que la alabanza davídica se realizaba a través de los levitas, sin forzar el hebreo.
- source_word: מחצצרים
  english_pob_choice: were blowing trumpets
  chosen_spanish: tocaban trompetas
  alternatives_spanish:
  - hacían sonar trompetas
  - sonaban las trompetas
  - estaban tocando trompetas
  lexicon: HALOT
  rationale: El verbo designa el acto de hacer sonar trompetas. 'Tocaban trompetas' es claro y idiomático en español.
- source_word: נֶגְדָּם
  english_pob_choice: opposite them
  chosen_spanish: frente a ellos
  alternatives_spanish:
  - enfrente de ellos
  - ante ellos
  - opuestos a ellos
  lexicon: HALOT
  rationale: La preposición indica una posición enfrente o delante. 'Frente a ellos' comunica bien la relación espacial y ceremonial.
- source_word: עֹמְדִים
  english_pob_choice: were standing
  chosen_spanish: estaban de pie
  alternatives_spanish:
  - estaban parados
  - permanecían de pie
  - estaban erguidos
  lexicon: HALOT
  rationale: El participio describe una escena continua. 'Estaban de pie' suena natural y mantiene el aspecto durativo.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  - Jehová
  rationale: La base hebrea usa explícitamente el Tetragrama. Siguiendo el criterio del proyecto, se traslada como 'Yahvé' en el texto principal, manteniendo visible el nombre del pacto en vez de ocultarlo tras un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Rendering of חֶסֶד
  english_pob_reading: steadfast love
  chosen_spanish_reading: amor fiel
  alternative_spanish_readings:
  - misericordia
  - amor constante
  - bondad fiel
  rationale: '''חֶסֶד'' no es solo afecto ni solo misericordia; incluye lealtad y fidelidad de pacto. ''Amor fiel'' conserva esa tensión mejor que una sola palabra más estrecha.'
  doctrine_reference: HALOT; covenantal usage in the Hebrew Bible
- issue: Temple service and agency in בְּיָדָם
  english_pob_reading: by their hand
  chosen_spanish_reading: por medio de ellos
  alternative_spanish_readings:
  - por su mano
  - a través de ellos
  - mediante ellos
  rationale: La frase hebrea es idiomática y admite agencia instrumental. 'Por medio de ellos' comunica la mediación de los levitas sin sobrecargar una imagen literal en español.
  doctrine_reference: Syntactic/semantic analysis of the Hebrew clause
translation_notes:
  revision_awareness: La redacción sigue el acuerdo alto del texto fuente y adopta la revisión más reciente al evitar comillas y puntuación que separen indebidamente la cláusula de agradecimiento. También refleja la decisión revisada de hacer más natural la referencia a los instrumentos como ligados al canto y dirigidos a Yahvé.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יְהוָה de forma consistente con la política del proyecto.
  - '''amor fiel'' se usa para חֶסֶד para conservar la carga de fidelidad pactal.'
  - '''dar gracias'' se reserva para לְהוֹדוֹת, mientras ''alabanza'' se usa para בְּהַלֵּל según el contexto.'
  - '''tocar trompetas'' se eligió para מחצצרים por claridad natural en español.'
  - No se introdujeron mayúsculas litúrgicas innecesarias fuera de 'Yahvé'.
