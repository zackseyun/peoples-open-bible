review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español conserva bien la estructura narrativa y la mayoría de las decisiones léxicas del griego: vigilancia de un día adecuado, entrada de Susana con dos criadas, deseo de bañarse en el jardín por el calor. Sin embargo, dos elecciones no siguen la revisión auditada ni su mejor sentido en español: ποτε se vertió como «una vez» en lugar de «un día/en cierta ocasión», y καθὼς ἐχθὲς καὶ τρίτης ἡμέρας quedó en una formulación demasiado calcada y poco natural («como el día anterior y el tercer día antes»), cuando la auditoría inglesa ya fijó el sentido contextual «como en los días anteriores».'
  spanish_quality_summary: 'El texto es generalmente claro y digno, pero contiene dos giros que suenan forzados en español bíblico legible: «ella entró una vez» sugiere frecuencia más que ocasión narrativa, y «como el día anterior y el tercer día antes» es torpe. Una leve normalización mejora mucho la legibilidad sin perder auditabilidad. El resto («Y sucedió», «vigilaban un día oportuno», «con solo dos jóvenes criadas», «deseó bañarse en el jardín», «porque hacía calor») funciona bien.'
  glossary_alignment: No hay conflictos con la terminología doctrinal del proyecto. «Jardín» para παραδείσῳ está bien y evita «paraíso». «Jóvenes criadas» es aceptable para κορασίων en contexto doméstico. La principal corrección es de fidelidad contextual y naturalidad, no de glosario teológico.
  issues:
  - severity: medium
    issue: ποτε traducido como «una vez»
    rationale: En español «una vez» suele leerse como adverbio de frecuencia/tiempo indefinido y aquí suena menos natural que el valor narrativo de ocasión concreta. La revisión inglesa ya adoptó «one day», por lo que «un día» o «en cierta ocasión» refleja mejor el sentido.
  - severity: medium
    issue: καθὼς ἐχθὲς καὶ τρίτης ἡμέρας traducido de forma demasiado literal y poco idiomática
    rationale: «Como el día anterior y el tercer día antes» resulta duro y confuso en español. Dado que la auditoría inglesa explica que el sentido es «as on the previous days», el texto principal debe decir «como en los días anteriores», dejando la literalidad en nota, como ya hace el pie de página.
  revised_spanish_text: Y sucedió[a] que, mientras ellos vigilaban un día oportuno, ella entró un día, como en los días anteriores, con solo dos jóvenes criadas, y deseó bañarse en el jardín, porque hacía calor.
  revised_footnotes:
  - marker: a
    text: O, de manera más literal, «como ayer y el tercer día antes». La frase griega compara esta visita con las anteriores y probablemente significa «como en los días anteriores».
    reason: lexical_alternative
  revision_rationale: 'Se ajusta el texto principal a la mejor comprensión contextual ya documentada en la auditoría inglesa y a un español más natural: «un día» por ποτε y «como en los días anteriores» por el giro temporal idiomático. La literalidad más extraña del griego se conserva de forma auditiva en la nota. No se requieren cambios doctrinales ni adjudicación adicional.'
