revisions:
- from: Mi corazón palpita[a]; me ha dejado[b] la fuerza[c], y la luz de mis ojos —incluso ellos— no está conmigo.
  to: Mi corazón palpita; mi fuerza me ha dejado, y la luz[a] de mis ojos tampoco está conmigo.
  rationale: Se corrige el anclaje de la nota para que explique la expresión correcta, se elimina aparato no sustentado por la auditoría inglesa, y se suaviza la sintaxis española sin perder el sentido del hebreo. «Mi fuerza me ha dejado» conserva bien עֲזָבַנִי כֹחִי, y «la luz de mis ojos tampoco está conmigo» mantiene la imagen poética y la apertura semántica, a la vez que suena natural en español.
