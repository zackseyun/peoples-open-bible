translation:
  language: es
  text: ¿Hasta cuándo me atormentarán y me aplastarán con palabras?[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Hasta cuándo afligirán mi alma y me aplastarán con palabras?»'
