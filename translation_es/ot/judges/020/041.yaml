translation:
  language: es
  text: Entonces los hombres de Israel se volvieron[a], y los hombres de Benjamín se aterrorizaron, porque vieron que la calamidad les había sobrevenido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo usa formas singulares (‘hombre de Israel’, ‘hombre de Benjamín’, ‘vio’, ‘sobre él’) con sentido colectivo para ambos ejércitos; por eso la traducción las vierte en plural para mayor naturalidad.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אִישׁ יִשְׂרָאֵל
  english_pob_choice: Then the men of Israel
  chosen_spanish: Entonces los hombres de Israel
  alternatives_spanish:
  - Y el hombre de Israel
  - Entonces el hombre de Israel
  lexicon: HALOT
  rationale: אִישׁ está en singular, pero funciona colectivamente en este contexto militar. En español, el plural ‘los hombres de Israel’ expresa con naturalidad ese valor colectivo, como en la POB inglesa.
- source_word: הָפַךְ
  english_pob_choice: turned
  chosen_spanish: se volvieron
  alternatives_spanish:
  - se giraron
  - retrocedieron
  - se volvieron atrás
  lexicon: HALOT
  rationale: El verbo describe un cambio de dirección o maniobra en combate. ‘Se volvieron’ comunica ese giro táctico sin añadir más interpretación que la necesaria.
- source_word: וַ/יִּבָּהֵל
  english_pob_choice: were terrified
  chosen_spanish: fueron aterrados
  alternatives_spanish:
  - fueron aterrados de miedo
  - quedaron aterrados
  - se aterrorizaron
  lexicon: HALOT
  rationale: בהל expresa alarma repentina o pánico. Aunque ‘se aterrorizaron’ sería idiomático, ‘fueron aterrados’ conserva mejor la voz pasiva que sugiere el hebreo y mantiene el paralelismo del enunciado.
- source_word: אִישׁ בִּנְיָמִן
  english_pob_choice: the men of Benjamin
  chosen_spanish: los hombres de Benjamín
  alternatives_spanish:
  - el hombre de Benjamín
  - los guerreros de Benjamín
  lexicon: HALOT
  rationale: Como con Israel, la forma singular funciona colectivamente para el bando benjaminita. ‘Los hombres de Benjamín’ es claro, natural y fiel al uso colectivo.
- source_word: כִּי רָאָה
  english_pob_choice: because they saw
  chosen_spanish: porque vieron
  alternatives_spanish:
  - porque vio
  - pues vieron
  lexicon: HALOT
  rationale: El verbo aparece en singular, pero el referente es colectivo. En español, el plural evita una traducción mecánica y refleja el sentido grupal del contexto bélico.
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - cómo
  - como
  lexicon: HALOT
  rationale: La segunda כי introduce el contenido de lo visto; ‘que’ es la equivalencia natural en español para esa cláusula completiva.
- source_word: נָגְעָה עָלָיו
  english_pob_choice: had come upon them
  chosen_spanish: había venido sobre ellos
  alternatives_spanish:
  - había alcanzado a ellos
  - había caído sobre ellos
  - les había sobrevenido
  lexicon: HALOT
  rationale: נגע על comunica que una desgracia ha alcanzado o sobrevenido a alguien. ‘Había venido sobre ellos’ sigue de cerca la imagen del hebreo y mantiene el valor de amenaza inminente consumada.
- source_word: הָרָעָה
  english_pob_choice: disaster
  chosen_spanish: la calamidad
  alternatives_spanish:
  - el desastre
  - el mal
  - la desgracia
  lexicon: HALOT
  rationale: Aquí רָעָה no es ‘mal’ moral, sino una desgracia bélica. ‘Calamidad’ reproduce bien el sentido de ruina o desastre que recae sobre Benjamin.
theological_decisions:
- issue: Valor colectivo de singulares hebreos en un relato de guerra
  english_pob_reading: Hebrew singular expressions ('man of Israel,' 'man of Benjamin,' 'he saw,' 'upon him') are used collectively here for the opposing forces; the English renders them as plurals for natural sense.
  chosen_spanish_reading: Los singulars hebreos se entienden colectivamente y se vierten con plurales naturales en español.
  alternative_spanish_readings:
  - 'Mantener singular: ‘el hombre de Israel... el hombre de Benjamín... vio... sobre él’'
  - Hacer el colectivo solo en una nota, sin marcar el texto
  rationale: La función colectiva está claramente respaldada por el contexto militar y por la lectura inglesa auditada. El español exige plural para evitar una literalidad engañosa y para respetar la fuerza narrativa del pasaje.
  doctrine_reference: N/A
- issue: Uso de un término de calamidad en lugar de mal moral
  english_pob_reading: disaster
  chosen_spanish_reading: calamidad
  alternative_spanish_readings:
  - mal
  - desastre
  - desgracia
  rationale: El hebreo רָעָה aquí designa una desgracia histórica o militar, no maldad ética. ‘Calamidad’ conserva esa tensión semántica y evita una confusión doctrinal o moral.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada de ‘had overtaken them’ a ‘had come upon them’ para acercarse más al hebreo נגע על sin perder naturalidad. La versión española sigue esa misma dirección con ‘había venido sobre ellos’, manteniendo la imagen de una desgracia que recae sobre el grupo.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - ‘Benjamín’ se conserva como nombre propio bíblico estándar en español.
  - ‘Calamidad’ se usa aquí por el valor contextual de רָעָה; no se traduce como ‘mal’ para evitar una lectura moralizante.
