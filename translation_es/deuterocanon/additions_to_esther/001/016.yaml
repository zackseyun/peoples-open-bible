    rationale: El texto dice «en la corte[a]» y la nota ofrece «O «en la corte»», lo cual no aporta alternativa ni aclaración útil. Debe reflejar la alternativa documentada «en palacio» o «en la corte real/ámbito palaciego», manteniendo la explicación locativa.
