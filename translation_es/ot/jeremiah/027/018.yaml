    text: O «intercedan ante». El verbo hebreo puede significar rogar, suplicar o interceder.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «vengan a Babilonia»; en español se expresa con naturalidad como «vayan a Babilonia» desde la perspectiva del hablante.'
    reason: lexical_alternative
  - marker: c
    text: O «el palacio del rey de Judá» para «la casa del rey de Judá».
    reason: lexical_alternative
  revision_rationale: 'La traducción base es fiel, pero requiere una reparación menor obligatoria: eliminar el marcador huérfano [s] y restaurar la nota auditada sobre el hebreo literal «venir a Babilonia». También se reordena la puntuación para mayor naturalidad en español y para que cada marcador corresponda exactamente a una nota válida.'
