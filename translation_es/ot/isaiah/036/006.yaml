review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien el sentido general: la confianza en Egipto como apoyo inútil y dañino, la cláusula hipotética con «un hombre», y la aplicación comparativa a Faraón. Sin embargo, la frase «esa caña rota por báculo» no refleja fielmente el constructo מִשְׁעֶנֶת הַקָּנֶה y suena semánticamente incorrecta en español; debe expresar «báculo/bastón de caña» o equivalente. También conviene ajustar la puntuación para que la relativa condicional fluya mejor.'
  spanish_quality_summary: El español es generalmente claro y digno, pero «caña rota por báculo» resulta poco natural y confuso, como si el báculo rompiera la caña. «Le entrará en la mano y la perforará» es entendible, aunque una redacción con «se le meterá en la mano» sería más idiomática; no obstante, «le entrará» puede mantenerse. El resto del versículo es legible y adecuado para registro bíblico moderno.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Faraón», «Egipto» y «confían» están bien. La nota sobre «un hombre» preserva correctamente la decisión auditada del inglés. El principal problema es léxico-sintáctico en la imagen de la caña/báculo, no terminológico-teológico.
  issues:
  - severity: high
    issue: «esa caña rota por báculo» traduce de forma inadecuada la relación entre מִשְׁעֶנֶת y הַקָּנֶה
    rationale: El hebreo presenta «el bastón/soporte de esta caña quebrada», no una caña rota por un báculo. La preposición «por» introduce una relación causal/instrumental ajena al texto y distorsiona la metáfora.
  - severity: medium
    issue: La formulación de la imagen necesita mayor naturalidad española
    rationale: Una expresión como «ese báculo de caña rota» o «ese bastón de caña rota» comunica mejor el apoyo defectuoso sin calco extraño ni paráfrasis excesiva.
  - severity: low
    issue: La puntuación puede reflejar mejor la cláusula relativa-condicional
    rationale: Separar con coma antes de «que, si un hombre...» ayuda a reproducir la estructura del hebreo y del POB inglés con mayor claridad.
  revised_spanish_text: Mira[a], estás confiando en Egipto, ese báculo de caña rota, que, si un hombre se apoya en él, le entrará en la mano y la perforará. Así es el faraón, rey de Egipto, para todos los que confían en él.
  revised_footnotes:
  - marker: a
    text: 'Hebreo: «un hombre»; se conserva aquí el singular masculino como figura representativa.'
    reason: lexical_alternative
  revision_rationale: 'Se corrige la imagen central para reflejar con fidelidad y buen español el constructo hebreo: no «caña rota por báculo», sino «báculo de caña rota». Se conserva la nota sobre «un hombre», el valor comparativo de «Así es», y la formulación general del daño físico, que ya era suficientemente fiel.'
