review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español capta bien el sentido general: las intervenciones celestiales, la defensa del judaísmo, la concesión de que eran pocos, y el resultado militar. Sin embargo, hay varios desajustes menores con la fuente y con la auditoría inglesa: «de los cielos» debería ser singular («del cielo») para reflejar ἐξ οὐρανοῦ; «a favor de los que» cambia la relación dativa más allá de lo necesario, mejor «a los que»; y «actuaron con valentía» debilita el contexto militar explícito de ἀνδραγαθήσασιν, que en este pasaje conviene expresar como «combatieron» o «lucharon».'
  spanish_quality_summary: El español es legible y digno, pero «a favor de los que con noble empeño actuaron con valentía» suena algo pesado y explicativo. Una formulación más natural y fiel sería «a los que combatieron noblemente por el judaísmo». También conviene armonizar la nota cultural sobre «judaísmo», que está presente en la auditoría inglesa pero falta en las notas españolas.
  glossary_alignment: 'La terminología principal está bien alineada: «judaísmo» preserva Ἰουδαϊσμός de forma adecuada, y «hordas bárbaras» mantiene la fuerza polémica de τὰ βάρβαρα πλήθη. Para ἐπιφανείας, «manifestaciones» es defendible, pero dado que la POB inglesa eligió «appearances», en español «apariciones» es más cercano y transparente, dejando «manifestaciones» como alternativa en nota. No hay conflictos con terminología teológica del proyecto.'
  issues:
  - severity: medium
    issue: «que vinieron de los cielos»
    rationale: El griego tiene ἐξ οὐρανοῦ, singular, «del cielo». El plural «de los cielos» añade un matiz no exigido por la fuente.
  - severity: medium
    issue: «a favor de los que»
    rationale: La construcción española introduce un sentido benefactivo más interpretativo. El dativo τοῖς ... ἀνδραγαθήσασιν se refleja mejor con «a los que» o una reestructuración equivalente.
  - severity: medium
    issue: «actuaron con valentía»
    rationale: Aunque semánticamente cercano, pierde el matiz militar que el contexto y la decisión inglesa («fought nobly») consideran importante. «Combatieron noblemente» o «lucharon noblemente» es más fiel y natural.
  - severity: low
    issue: Falta la nota cultural correspondiente a «judaísmo»
    rationale: La auditoría inglesa conserva una nota explicando que «Judaism» aquí se refiere a la religión y modo de vida judíos defendidos frente a presión extranjera. Conviene preservarla en español.
  - severity: low
    issue: «manifestaciones» como texto principal
    rationale: Es aceptable, pero «apariciones» refleja más de cerca la elección inglesa principal «appearances» y resulta claro en español eclesial sin recurrir al tecnicismo «epifanías».
  revised_spanish_text: y las apariciones[a] que vinieron del cielo a los que combatieron noblemente por el judaísmo[b], de modo que, aunque eran pocos, saquearon toda la tierra y pusieron en fuga a las hordas bárbaras[c],
  revised_footnotes:
