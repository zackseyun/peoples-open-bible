review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido legal del hebreo: ciudades designadas, extensión a los hijos de Israel y al ger residente, huida allí, muerte no intencional, protección frente al vengador de sangre, y comparecencia ante la congregación. Sin embargo, dos decisiones debilitan la fidelidad precisa: «forastero» no preserva tan bien como «residente extranjero/forastero residente» la categoría legal de גֵּר, y «hiriera a una persona» puede sugerir solo lesión, mientras que מַכֵּה נֶפֶשׁ en este contexto de ciudades de refugio apunta al que da muerte a una persona, aunque sea involuntariamente.'
  spanish_quality_summary: El español es claro y digno, con buena fluidez. No obstante, «hiriera a una persona» suena menos natural y menos exacto en el contexto judicial que «matara a una persona» o «diera muerte a una persona». Además, «forastero» a secas puede sonar demasiado amplio o transitorio en español actual; «residente extranjero» expresa mejor la función legal sin perder legibilidad.
  glossary_alignment: 'No hay términos del glosario principal comprometidos como Yahvé/Mesías/etc. La cuestión relevante es גֵּר: la auditoría inglesa prefirió «sojourner» por su categoría pactal-legal; en español, «forastero» no refleja suficientemente esa residencia estable. «Residente extranjero» o «extranjero residente» se alinea mejor con la racionalidad documentada. «Congregación» y «vengador de sangre» están bien alineados.'
  issues:
  - severity: medium
    issue: «forastero» para גֵּר queda corto para la categoría legal
    rationale: גֵּר no es simplemente alguien de fuera, sino un no israelita residente dentro del orden comunitario. «Forastero» puede sugerir transeúnte o ajeno sin residencia estable. «Residente extranjero» o «extranjero residente» preserva mejor la categoría que el English POB quiso mantener.
  - severity: medium
    issue: «hiriera a una persona» subtraduce כָּל מַכֵּה נֶפֶשׁ en el contexto
    rationale: En las ciudades de refugio se trata del causante de una muerte involuntaria, no meramente de alguien que hiere. Aunque el hebreo usa la imagen de golpear, el sentido legal aquí es homicidio no intencional. «Matara a una persona sin intención» o «diera muerte a una persona sin intención» es más fiel y claro.
  - severity: low
    issue: Falta en español la alternativa idiomática correspondiente a «hijos de Israel» preservada en la auditoría inglesa
    rationale: El texto principal puede mantener «hijos de Israel», pero conviene reflejar en nota la alternativa idiomática «israelitas», ya que el English POB la documentó expresamente.
