translation:
  language: es
  text: Para que tus amados[a] sean rescatados, salva con tu mano derecha y respóndeme.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "sean librados" para "sean rescatados".
    reason: lexical_alternative
lexical_decisions:
- source_word: לְמַעַן
  english_pob_choice: So that
  chosen_spanish: Para que
  alternatives_spanish:
  - a fin de que
  - con el fin de que
  lexicon: HALOT
  rationale: Introduce con naturalidad la relación de propósito/resulto sin volver mecánica la sintaxis del hebreo.
- source_word: יֵחָלְצ֣וּן
  english_pob_choice: may be rescued
  chosen_spanish: sean rescatados
  alternatives_spanish:
  - sean librados
  - sean liberados
  lexicon: HALOT
  rationale: El nifal de חלץ aquí expresa ser sacados de peligro; 'rescatados' mantiene la fuerza de liberación en un contexto de súplica.
- source_word: יְדִידֶ֑י/ךָ
  english_pob_choice: your beloved ones
  chosen_spanish: tus amados
  alternatives_spanish:
  - tus amados tuyos
  - los que te son amados
  - tus amados por ti
  lexicon: HALOT
  rationale: '''Amados'' conserva el matiz afectivo-covenantal del sustantivo hebreo y suena más natural que una construcción más pesada en español.'
- source_word: הוֹשִׁ֖יעָ/ה
  english_pob_choice: save
  chosen_spanish: salva
  alternatives_spanish:
  - sálvanos
  - libra
  lexicon: HALOT
  rationale: El imperativo de ישׁע se expresa de forma directa con 'salva', que es claro y fiel al lenguaje de oración del texto.
- source_word: יְמִֽינְ/ךָ֣
  english_pob_choice: with your right hand
  chosen_spanish: con tu diestra
  alternatives_spanish:
  - con tu mano derecha
  - por tu diestra
  lexicon: HALOT
  rationale: '''Diestra'' conserva la imagen bíblica de poder y acción eficaz de Dios; ''con'' refleja el valor instrumental de la expresión.'
- source_word: וַעֲנֵֽנִי
  english_pob_choice: and answer me
  chosen_spanish: y respóndeme
  alternatives_spanish:
  - y contéstame
  - y escúchame y respóndeme
  lexicon: HALOT
  rationale: 'El imperativo singular con sufijo de primera persona debe mantenerse como singular: el hablante pasa de los beneficiarios plurales a su propia súplica personal.'
theological_decisions:
- issue: Cambio deliberado de plural a singular en la súplica final
  english_pob_reading: Retain 'your beloved ones' ... 'answer me'
  chosen_spanish_reading: Conservar 'tus amados' ... 'respóndeme'
  alternative_spanish_readings:
  - 'armonizar a plural: ''respóndenos'''
  - 'suavizar a impersonal: ''y responde'''
  rationale: El hebreo conserva una tensión intencional entre el bien común ('tus amados') y la petición individual ('me'). La traducción no debe resolver esa tensión ni pluralizar indebidamente la súplica final.
  doctrine_reference: Preservar la tensión textual en lugar de armonizarla.
translation_notes:
  revision_awareness: 'Coincide con el audit trail inglés: se preserva el propósito, la liberación/rescate, el afecto de ''amados'', la imagen de la diestra y el cambio intencional de plural a singular al final.'
  spanish_consistency_notes:
  - Se evitó 'SEÑOR' porque no aparece aquí el Tetragrámaton ni una convención de máscara divina.
  - '''Diestra'' se usa por su valor bíblico y por ser comprensible en español actual.'
  - La nota textual mantiene la alternativa léxica documentada sin añadir interpretaciones no atestiguadas.
