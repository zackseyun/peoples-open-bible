translation:
  language: es
  text: De ti ha salido uno que trama el mal contra Yahvé[a], un consejero de vileza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «un consejero de Belial», si בְּלִיָּעַל se toma como un término de tipo nombre propio y no como «vileza».'
    reason: alternative_reading
lexical_decisions:
- source_word: מִמֵּךְ
  english_pob_choice: From you
  chosen_spanish: De ti
  alternatives_spanish:
  - Desde ti
  - De ti [femenino singular]
  lexicon: HALOT
  rationale: El prefijo מִן con sufijo de 2.ª persona singular femenina expresa origen o procedencia. En español, «De ti» comunica esa procedencia con naturalidad. No hace falta marcar en el cuerpo principal la forma femenina; el contexto ya puede referirse a una ciudad o entidad personificada.
- source_word: יָצָא
  english_pob_choice: has come
  chosen_spanish: ha salido
  alternatives_spanish:
  - salió
  - ha salido de
  lexicon: HALOT
  rationale: El qatal expresa acción completa. «Ha salido» conserva ese valor perfecto y refleja bien la idea de emergencia desde un lugar. «Salió» también es posible, pero el perfecto encaja mejor con el marco en español.
- source_word: חֹשֵׁב
  english_pob_choice: who plots
  chosen_spanish: que trama
  alternatives_spanish:
  - que planea
  - que idea
  lexicon: HALOT
  rationale: El participio tiene sentido de idear o urdir con intención hostil. «Trama» es una equivalencia natural y fuerte en español para este contexto de maldad contra Yahvé.
- source_word: עַל יְהוָה
  english_pob_choice: against Yahweh
  chosen_spanish: contra Yahvé
  alternatives_spanish:
  - contra Yahweh
  - acerca de Yahvé
  lexicon: HALOT
  rationale: Aquí עַל tiene fuerza adversativa; por eso «contra» es la mejor equivalencia. Se mantiene «Yahvé» como forma española para יהוה, conforme a las pautas del proyecto.
- source_word: רָעָה
  english_pob_choice: evil
  chosen_spanish: el mal
  alternatives_spanish:
  - maldad
  - lo malo
  - daño
  lexicon: HALOT
  rationale: En este contexto el término describe intención malévola, no mero daño accidental. «El mal» expresa de manera breve y fiel la cualidad de lo que se traza.
- source_word: יֹעֵץ
  english_pob_choice: a counselor
  chosen_spanish: un consejero
  alternatives_spanish:
  - un asesor
  - uno que aconseja
  lexicon: HALOT
  rationale: El participio funciona de manera apposicional. «Consejero» conserva la fuerza nominal y es natural en español.
- source_word: בְּלִיָּעַל
  english_pob_choice: of worthlessness
  chosen_spanish: de inutilidad
  alternatives_spanish:
  - de Belial
  - de maldad
  - de vileza
  lexicon: HALOT
  rationale: Se preserva el valor común del sustantivo como cualidad negativa, sin convertirlo en nombre propio en el texto principal. «Inutilidad» intenta reflejar la idea de carencia de valor/valía que la tradición léxica asocia con el término, aunque no agota sus matices.
theological_decisions:
- issue: Sentido de בְּלִיָּעַל como nombre propio o sustantivo común
  english_pob_reading: common noun sense ('worthlessness') rather than proper name ('Belial')
  chosen_spanish_reading: 'sentido común: «de inutilidad»'
  alternative_spanish_readings:
  - «de Belial»
  - «de maldad»
  rationale: 'Se mantiene la tensión documentada: el hebreo puede leerse como cualidad despectiva y también como término tradicionalizado. En el texto principal se evita imponer una lectura demonológica o nominal que el contexto inmediato no exige; la alternativa tradicional queda disponible en nota.'
  doctrine_reference: Primacía del idioma original y preservación de la ambigüedad lexical documentada.
translation_notes:
  revision_awareness: 'El borrador sigue el estado más reciente sin cambios sustanciales: mantiene la lectura semántica de origen/procedencia, el perfecto verbal, la fuerza adversativa de עַל y la decisión documentada sobre בְּלִיָּעַל como sustantivo común, preservando en nota la lectura alternativa tradicional.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יהוה, según la terminología del proyecto.
  - Se evita «SEÑOR» como sustitución de máscara en el texto principal.
  - «Trama» y «consejero» conservan el tono hostil y nominal del hebreo sin sobrerreformular.
  - La nota al pie solo introduce la alternativa textual/lexical documentada y no añade interpretaciones ajenas al expediente.
