revisions:
- from: Convocad contra Babilonia[a] a muchos, a todos los que tensan el arco; acampen contra ella alrededor; no haya escape. Repagadle según su obra; conforme a todo lo que ella ha hecho, hacedle. Porque ha actuado con arrogancia contra Yahvé, contra el Santo de Israel.
  to: Convoquen contra Babilonia[a] a muchos, a todos los que tensan el arco; acampen alrededor de ella, por todos lados; no haya escape. Páguenle según su obra; conforme a todo lo que ella ha hecho, háganle. Porque ha actuado con arrogancia contra Yahvé, contra el Santo de Israel.
  rationale: Se revisa para mantener el mismo sentido del hebreo y del POB inglés, pero con español neutro latinoamericano consistente y gramaticalmente correcto. Se unifican los imperativos en registro de ustedes ('Convoquen... acampen... páguenle... háganle'), se reemplaza la construcción poco natural 'acampen contra ella alrededor' por 'acampen alrededor de ella, por todos lados', y se corrige 'Repagadle' a 'Páguenle'. Se conserva 'Yahvé', 'el Santo de Israel' y la decisión principal 'no haya escape', manteniendo una nota léxica alineada con el expediente inglés.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:34:42Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del hebreo: convocatoria contra Babilonia, cerco total, ausencia de escape, retribución proporcional y motivo teológico por su arrogancia contra Yahvé. Sin embargo, hay varios desajustes de forma y naturalidad que afectan la fidelidad práctica: mezcla de voseo peninsular (''Convocad'', ''hacedle'') con una forma de tercera persona (''acampen''), uso no natural de ''Repagadle'', y el texto principal conserva ''Yahvé'' correctamente en la cláusula final pero el resto necesita regularización gramatical para reflejar mejor los imperativos plurales del hebreo en español eclesial neutro.'
  spanish_quality_summary: 'La legibilidad actual es irregular. ''Acampen contra ella alrededor'' suena forzado; ''Repagadle'' es incorrecto o muy poco idiomático para 3.ª singular femenina; y la mezcla de registros (''convocad'' / ''acampen'') rompe la consistencia. Conviene usar un español neutro y digno con imperativos de ustedes: ''Convoquen... acampen... páguenle... háganle''. También es mejor ''alrededor de ella, por todos lados'' o equivalente para סָבִיב.'
  glossary_alignment: Alinea bien con el glosario en 'Yahvé' para יְהוָה y 'el Santo de Israel' para קְדוֹשׁ יִשְׂרָאֵל. La decisión 'no haya escape' concuerda con la nota léxica sobre פְּלֵטָה. No hay problema teológico mayor; los cambios son principalmente de español y de exactitud morfosintáctica.
  issues:
  - severity: medium
    issue: Mezcla inconsistente de tratamientos verbales
    rationale: El hebreo tiene una serie de imperativos plurales. El borrador alterna 'Convocad' y 'hacedle' (vosotros) con 'acampen' (ustedes/subjuntivo), lo que reduce la calidad y coherencia del español objetivo neutral latinoamericano.
  - severity: high
    issue: '''Repagadle'' no es forma adecuada aquí'
    rationale: Para לָהּ ('a ella'), la forma natural y correcta en español neutro es 'páguenle' / 'retribúyanle' / 'repáguenle'. 'Repagadle' mezcla leísmo/registro peninsular y resulta poco natural o erróneo.
  - severity: medium
    issue: '''Acampen contra ella alrededor'' es poco idiomático'
    rationale: Aunque intenta seguir חֲנוּ עָלֶיהָ סָבִיב, en español suena trabado. 'Acampen alrededor de ella, por todos lados' o 'acémpenla alrededor' no; la primera opción preserva mejor el cerco total de forma natural.
  - severity: low
    issue: Nota al pie con formulación mejorable
    rationale: La nota empieza con comilla innecesaria y 'escapatoria' puede sonar algo abstracto; 'escape' / 'sobreviviente' / 'remanente que escape' comunica mejor la alternativa léxica documentada.
  revised_spanish_text: Convoquen contra Babilonia[a] a muchos, a todos los que tensan el arco; acampen alrededor de ella, por todos lados; no haya escape. Páguenle según su obra; conforme a todo lo que ella ha hecho, háganle. Porque ha actuado con arrogancia contra Yahvé, contra el Santo de Israel.
  revised_footnotes:
  - marker: a
    text: 'O: «no haya sobreviviente» / «no haya un remanente que escape». El hebreo פְּלֵטָה puede denotar el escape o a quienes escapan.'
    reason: lexical_alternative
  revision_rationale: Se revisa para mantener el mismo sentido del hebreo y del POB inglés, pero con español neutro latinoamericano consistente y gramaticalmente correcto. Se unifican los imperativos en registro de ustedes ('Convoquen... acampen... páguenle... háganle'), se reemplaza la construcción poco natural 'acampen contra ella alrededor' por 'acampen alrededor de ella, por todos lados', y se corrige 'Repagadle' a 'Páguenle'. Se conserva 'Yahvé', 'el Santo de Israel' y la decisión principal 'no haya escape', manteniendo una nota léxica alineada con el expediente inglés.
