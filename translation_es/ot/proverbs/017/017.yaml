translation:
  language: es
  text: Un amigo ama en todo tiempo, y un hermano nace para la adversidad[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y un hermano nace para un tiempo de angustia».'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּ/כָל עֵת
  english_pob_choice: at all times
  chosen_spanish: en todo tiempo
  alternatives_spanish:
  - siempre
  - en todo momento
  lexicon: HALOT
  rationale: La combinación de בְּ + כָּל + עֵת expresa alcance temporal total. «En todo tiempo» conserva ese valor universal en un español natural y proverbial; «siempre» sería más breve, pero pierde algo de la estructura semántica del hebreo.
- source_word: אֹהֵב
  english_pob_choice: loves
  chosen_spanish: ama
  alternatives_spanish:
  - ama con amor
  - muestra amor
  - es amante
  lexicon: HALOT
  rationale: El participio qal funciona de manera durativa o habitual. «Ama» comunica una acción característica y general sin sonar forzado; «muestra amor» explicita demasiado y «es amante» sería poco natural aquí.
- source_word: הָ/רֵעַ
  english_pob_choice: a friend
  chosen_spanish: un amigo
  alternatives_spanish:
  - el amigo
  - un compañero
  - un prójimo
  lexicon: HALOT
  rationale: Aunque el hebreo tiene artículo, en proverbios suele tener valor genérico. «Un amigo» expresa correctamente la clase de persona y evita una referencia definida que el contexto no exige. «Prójimo» introduciría un matiz más ético/religioso que el hebreo no requiere necesariamente.
- source_word: וְ/אָח
  english_pob_choice: and a brother
  chosen_spanish: y un hermano
  alternatives_spanish:
  - y un pariente
  - y un hermano de sangre
  lexicon: HALOT
  rationale: «Hermano» preserva el término fuente y el paralelismo. Aunque puede funcionar de modo ampliado en sabiduría, no hay base suficiente para sustituirlo por una paráfrasis relacional.
- source_word: לְ֝/צָרָה
  english_pob_choice: for adversity
  chosen_spanish: para la adversidad
  alternatives_spanish:
  - para el tiempo de angustia
  - para el sufrimiento
  - para la desgracia
  lexicon: HALOT
  rationale: צָרָה puede ser angustia, dificultad o adversidad. «Adversidad» mantiene el registro proverbial y la amplitud del término, sin reducirlo a una sola clase de aflicción.
- source_word: יִוָּלֵד
  english_pob_choice: is born
  chosen_spanish: nace
  alternatives_spanish:
  - es nacido
  - llega a nacer
  - está destinado a nacer
  lexicon: HALOT
  rationale: El nifal de ילד se traduce de manera más natural con «nace». En castellano, «nace para la adversidad» conserva la imagen y el sentido de finalidad implícita sin alejarse del verbo fuente.
translation_notes:
  revision_awareness: El contexto auditado en inglés no presenta revisiones ni cambios pendientes; el texto inglés mantiene una equivalencia óptima estable con una sola nota alternativa para la frase final.
  spanish_consistency_notes:
  - Se mantuvo el paralelismo hebreo con dos miembros breves y simétricos.
  - Se evitó «SEÑOR» o terminología no presente en el verso.
  - La nota reproduce la alternativa semántica reconocida por el POB inglés para צָרָה.
  - El artículo hebreo en הָרֵעַ se trató como genérico en español, acorde con el uso proverbial.
