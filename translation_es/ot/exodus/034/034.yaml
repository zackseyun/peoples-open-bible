translation:
  language: es
  text: Pero siempre que Moisés entraba delante de Yahvé para hablar con él, quitaba el velo hasta salir; luego salía y hablaba a los hijos de Israel[a] lo que se le había mandado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a los israelitas» / «al pueblo de Israel». El hebreo dice literalmente «a los hijos de Israel».
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בְ/בֹא
  english_pob_choice: But whenever ... went in
  chosen_spanish: Pero siempre que ... entraba
  alternatives_spanish:
  - Y cuando ... entraba
  - Siempre que ... entraba
  lexicon: HALOT
  rationale: La construcción con infinitivo y prefijo expresa una circunstancia repetida o habitual. En español, «siempre que» comunica mejor ese valor iterativo que un simple pasado puntual. Se conserva además la leve oposición con la frase anterior mediante «Pero».
- source_word: לִ/פְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - en presencia de Yahvé
  - ante Yahvé
  lexicon: HALOT
  rationale: לִפְנֵי expresa literalmente estar «delante de / en la presencia de». Dado el criterio del proyecto, יְהוָה se vierte «Yahvé» en el texto principal, no con una máscara litúrgica. «Delante de Yahvé» mantiene la transparencia y la solemnidad.
- source_word: לְ/דַבֵּ֣ר אִתּ֔/וֹ
  english_pob_choice: to speak with him
  chosen_spanish: para hablar con él
  alternatives_spanish:
  - para hablarle
  - para conversar con él
  lexicon: HALOT
  rationale: El infinitivo marca finalidad. Con אִתּוֹ, el sentido es relacional y conversacional; en español, «hablar con él» resulta natural y fiel. «Hablarle» podría sonar más direccional que recíproco.
- source_word: יָסִ֥יר
  english_pob_choice: he would remove
  chosen_spanish: quitaba
  alternatives_spanish:
  - retiraba
  - quitaba
  lexicon: HALOT
  rationale: El imperfecto describe una acción habitual en pasado. «Quitaba» suena natural en español y conserva el valor repetitivo. «Retiraba» también sería posible, pero «quitaba el velo» es más idiomático.
- source_word: הַ/מַּסְוֶ֖ה
  english_pob_choice: the veil
  chosen_spanish: el velo
  alternatives_spanish:
  - el cubrimiento
  - el velo
  lexicon: HALOT
  rationale: מַסְוֶה designa el cubrimiento facial que Moisés llevaba. «Velo» es el equivalente establecido y preciso en este contexto.
- source_word: עַד צֵאת֑/וֹ
  english_pob_choice: until he came out
  chosen_spanish: hasta salir
  alternatives_spanish:
  - hasta que salía
  - hasta que saliera
  lexicon: HALOT
  rationale: La expresión marca duración hasta la salida de Moisés. En español, el infinitivo «hasta salir» es conciso y natural, sin añadir matices no presentes en el hebreo.
- source_word: וְ/יָצָ֗א
  english_pob_choice: then he would come out
  chosen_spanish: luego salía
  alternatives_spanish:
  - entonces salía
  - y salía
  lexicon: HALOT
  rationale: El verbo continúa la secuencia habitual. «Luego salía» mantiene el flujo narrativo y el aspecto repetido sin sobrecargar el español con perífrasis.
- source_word: וְ/דִבֶּר֙
  english_pob_choice: and speak
  chosen_spanish: y hablaba
  alternatives_spanish:
  - y hablaba
  - y hablaba entonces
  lexicon: HALOT
  rationale: El waw más el verbo continúan la serie de acciones habituales. «Hablaba» conserva el imperfecto iterativo implícito en el contexto.
- source_word: אֶל בְּנֵ֣י יִשְׂרָאֵ֔ל
  english_pob_choice: to the sons of Israel
  chosen_spanish: a los hijos de Israel
  alternatives_spanish:
  - a los hijos de Israel
  - a los israelitas
  - al pueblo de Israel
  lexicon: HALOT
  rationale: El hebreo dice explícitamente «hijos de Israel». Se mantiene la forma masculina y genealógica del original, como en la línea de auditoría inglesa, en vez de neutralizarla a «pueblo».
- source_word: אֵ֖ת אֲשֶׁ֥ר יְצֻוֶּֽה
  english_pob_choice: what he had been commanded
  chosen_spanish: lo que se le había mandado
  alternatives_spanish:
  - lo que se le había ordenado
  - lo que había recibido como mandato
  lexicon: HALOT
  rationale: El pasivo indica el contenido de la comisión recibida por Moisés. «Se le había mandado» refleja bien la pasiva sin introducir un sujeto explícito no presente en el hebreo.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton directamente. Conforme a la directriz del proyecto, se conserva el nombre del pacto como «Yahvé» en el texto principal, evitando la sustitución por una máscara litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Expresión de בְּנֵי יִשְׂרָאֵל
  english_pob_reading: sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - el pueblo de Israel
  rationale: La forma hebrea es masculinizada y genealógica. Se preserva esa concreción en español, siguiendo la decisión auditada de no neutralizar sin necesidad el término.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios necesarios y que el pasaje mantiene alto acuerdo con la auditoría inglesa; por eso la redacción española sigue de cerca la solución óptima ya validada, con ajustes mínimos para naturalidad del español.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme al criterio del proyecto para יְהוָה.
  - Se conserva la referencia masculina «hijos de Israel» sin neutralización.
  - La serie verbal usa imperfectos y gerundio implícito en español para reflejar la habitualidad del hebreo sin volverla rígida.
