translation:
  language: es
  text: Y el límite será desde el mar hasta Hazar-enón[a], en el límite de Damasco; y al norte, hacia el norte, será el límite de Hamat[b]. Este será el lado norte.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: ''desde el mar''. En contexto, se trata del mar Mediterráneo, pero aquí el texto no repite ''mar Grande''.'
    reason: cross_reference
  - marker: b
    text: 'Hazar-enón: también se ha rendido tradicionalmente como ''Hazar-enán''.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: shall be
  chosen_spanish: será
  alternatives_spanish:
  - estará
  - vendrá a ser
  lexicon: HALOT
  rationale: En este contexto topográfico y legal, el hebreo introduce la delimitación con fuerza prospectiva; en español, 'será' reproduce bien ese valor sin volverlo narrativo.
- source_word: גְבוּל
  english_pob_choice: border
  chosen_spanish: límite
  alternatives_spanish:
  - frontera
  - borde
  lexicon: HALOT
  rationale: '''Límite'' suena natural para una demarcación territorial y conserva el sentido geográfico del término sin sugerir una frontera política moderna más fuerte de lo que permite el texto.'
- source_word: מִן הַיָּם
  english_pob_choice: from the sea
  chosen_spanish: desde el mar
  alternatives_spanish:
  - desde el mar Grande
  - desde el Mediterráneo
  lexicon: HALOT
  rationale: El hebreo dice simplemente 'el mar'; en español, 'mar' respeta esa sobriedad. No se explicita 'Mediterráneo' en el texto principal porque el hebreo tampoco lo repite aquí.
- source_word: חֲצַר עֵינוֹן
  english_pob_choice: Hazar-enon
  chosen_spanish: Hazar-enón
  alternatives_spanish:
  - Hazar-enan
  lexicon: HALOT
  rationale: Se translitera el nombre propio. 'Hazar-enón' sigue mejor la vocalización hebrea del pasaje; se conserva la posibilidad tradicional en nota.
- source_word: גְּבוּל דַּמֶּשֶׂק
  english_pob_choice: at the border of Damascus
  chosen_spanish: en el límite de Damasco
  alternatives_spanish:
  - al borde de Damasco
  - en la frontera de Damasco
  lexicon: HALOT
  rationale: La construcción hebrea relaciona el punto mencionado con Damasco; 'en el límite de Damasco' expresa esa relación de ubicación de forma idiomática en español.
- source_word: וְצָפוֹן צָפוֹנָה
  english_pob_choice: on the north, northward
  chosen_spanish: al norte, hacia el norte
  alternatives_spanish:
  - en el norte, hacia el norte
  - al norte, al norte
  lexicon: HALOT
  rationale: 'La duplicación hebrea intensifica la dirección norte. En español se conserva con dos miembros: ''al norte, hacia el norte'', evitando suavizar la repetición que forma parte del énfasis del original.'
- source_word: וּגְבוּל חֲמָת
  english_pob_choice: the border of Hamath
  chosen_spanish: el límite de Hamat
  alternatives_spanish:
  - la frontera de Hamat
  - el borde de Hamat
  lexicon: HALOT
  rationale: Se mantiene el nombre propio y el sustantivo territorial en concordancia con el resto del versículo. 'Hamat' sigue la transliteración habitual en español bíblico.
- source_word: וְאֵת פְּאַת צָפוֹן
  english_pob_choice: this shall be the north side
  chosen_spanish: Esta será la parte del norte
  alternatives_spanish:
  - Esta será la cara norte
  - Esta será el lado norte
  lexicon: HALOT
  rationale: El hebreo resume la descripción con una expresión de 'lado/parte del norte'. 'Parte del norte' es natural en español y mantiene el valor resumitivo sin forzar una metáfora extraña.
theological_decisions:
- issue: Toponymic precision and repeated directional emphasis
  english_pob_reading: The verse describes the north boundary with repeated directional language and a resumptive conclusion.
  chosen_spanish_reading: El versículo conserva la repetición direccional 'al norte, hacia el norte' y cierra con una síntesis sobre la parte del norte.
  alternative_spanish_readings:
  - '... y al norte, al norte, está el límite de Hamat.'
  - '... y al norte, norte hacia el norte, está el límite de Hamat.'
  rationale: 'No hay una decisión doctrinal controvertida, pero sí una tensión estilística: el hebreo repite la dirección para enfatizarla. La traducción la preserva para no suavizar el diseño topográfico del texto.'
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'La redacción sigue de cerca la revisión final del POB en inglés, que ajustó el verbo a una cópula prospectiva (''shall be''), preservó la duplicación direccional (''on the north, northward'') y clarificó la clausula final resumitiva sobre el lado norte. La versión española imita esas decisiones: ''será'', ''al norte, hacia el norte'' y ''Esta será la parte del norte''.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' para el tetragrámaton cuando aparezca; en este versículo no aparece.
  - Se mantiene la transliteración de los nombres propios Hazar-enón y Hamat de forma coherente con el registro bíblico en español.
  - '''Límite'' se usa de manera consistente para גְבוּל a lo largo del versículo.'
  - La repetición direccional se conserva deliberadamente para reflejar el hebreo y la revisión inglesa auditada.
