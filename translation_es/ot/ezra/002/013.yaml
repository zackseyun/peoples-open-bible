lexical_decisions:
- source_word: בְּנֵי
  english_pob_choice: the sons of
  chosen_spanish: los hijos de
  alternatives_spanish:
  - los descendientes de
  - los hijos de familia de
  lexicon: HALOT
  rationale: En listas genealógicas o de repatriados, el hebreo constructo בְּנֵי suele señalar pertenencia a un linaje o clan. En español, «los hijos de» conserva la forma directa y transparente del original, y suena natural en este contexto. «Descendientes de» es posible, pero atenúa la estructura formal del hebreo.
- source_word: אֲדֹנִיקָם
  english_pob_choice: Adonikam
  chosen_spanish: Adonicam
  alternatives_spanish:
  - Adonikam
  lexicon: Nombre propio
  rationale: Se translitera el nombre propio. En español, «Adonicam» refleja de manera directa la forma hebrea y mantiene la uniformidad onomástica sin traducirlo.
- source_word: שֵׁשׁ מֵאוֹת שִׁשִּׁים וְשִׁשָּׁה
  english_pob_choice: six hundred sixty-six
  chosen_spanish: seiscientos sesenta y seis
  alternatives_spanish:
  - seiscientos y sesenta y seis
  lexicon: HALOT
  rationale: La secuencia hebrea expresa el número 666 de forma literal. En español moderno bíblico, «seiscientos sesenta y seis» es la forma más natural y fiel; añadir «y» sería solo una variación estilística, no de sentido.
translation_notes:
  revision_awareness: El pasaje del texto hebreo y el audit trail en inglés están en alto acuerdo; no se detectan variantes textuales ni revisiones aplicadas que requieran nota. La decisión principal fue mantener la estructura genealógica y la transliteración del nombre propio, con el número escrito en palabras por registro bíblico.
  spanish_consistency_notes:
  - Se mantiene la terminología genealógica simple («hijos de») por ser la opción más directa y consistente con listas de retorno en el AT.
  - Los nombres propios se transliteran sin adaptación interpretativa adicional.
  - Los números se escriben con palabras en estilo bíblico, no en cifras, para preservar el registro literario del pasaje.
