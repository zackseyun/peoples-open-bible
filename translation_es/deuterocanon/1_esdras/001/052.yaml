review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia y el sentido básico del griego: quemaron la casa del Señor, derribaron los muros de Jerusalén y quemaron sus torres. Sin embargo, omite de forma explícita el complemento instrumental/fórmula enfática del segundo ἐνεπύρισαν ἐν πυρί. Aunque en español puede sonar redundante, la fuente sí repite la idea de fuego en la segunda cláusula y el inglés auditado la conserva con ‘with fire’.'
  spanish_quality_summary: El español es claro y natural, pero la repetición ‘prendieron fuego a… y prendieron fuego a…’ suena algo pesada. Además, el pie b está anclado en ‘torres’ aunque explica ‘la casa del Señor’, por lo que el marcador está mal ubicado. Una revisión mínima mejora fidelidad y coherencia de notas sin afectar legibilidad.
  glossary_alignment: La elección ‘Señor’ para κυρίου sigue el rastro auditado del inglés y es aceptable aquí aunque el proyecto general prefiera ‘Yahvé’ para el nombre divino hebreo; dado que la fuente primaria es griega con κύριος, no hace falta adjudicación adicional. ‘Casa del Señor’ preserva οἶκος correctamente. ‘Derribaron’ para κατέλυσαν y ‘torres’ para πύργους están bien. Conviene representar mejor ἐν πυρί con ‘con fuego’.
  issues:
  - severity: medium
    issue: No se expresa claramente ἐν πυρί en la segunda acción de quemar.
    rationale: La fuente griega dice literalmente que quemaron sus torres ‘con fuego’. El borrador absorbe esa idea en ‘prendieron fuego a’, pero pierde la repetición/formulación explícita que el inglés auditado sí conservó.
  - severity: medium
    issue: El marcador de la nota [b] está colocado en ‘sus torres’ en vez de en ‘la casa del Señor’.
    rationale: La nota b explica la expresión ‘La casa del Señor’, no las torres. Los marcadores deben anclarse en la frase relevante.
  - severity: low
    issue: La repetición de ‘prendieron fuego a’ en ambas cláusulas suena algo menos natural en español litúrgico.
    rationale: Una leve variación como ‘quemaron’ en la segunda ocurrencia mantiene fidelidad y mejora el flujo, mientras permite además añadir ‘con fuego’ para reflejar ἐν πυρί.
  revised_spanish_text: Y prendieron fuego a la casa del Señor[a][b], y derribaron los muros de Jerusalén, y quemaron sus torres con fuego.
  revised_footnotes:
  - marker: a
    text: O «incendiaron la casa del Señor»; el verbo griego aparece dos veces con el mismo campo semántico de quemar o prender fuego.
    reason: lexical_alternative
  - marker: b
    text: «La casa del Señor» se refiere al templo de Jerusalén.
    reason: cross_reference
  revision_rationale: Se hizo una reparación menor para reflejar más explícitamente ἐν πυρί con «con fuego», mejorar la naturalidad del español al variar el segundo verbo a «quemaron», y reubicar correctamente la nota [b] en «la casa del Señor», que es la frase que la nota explica.
