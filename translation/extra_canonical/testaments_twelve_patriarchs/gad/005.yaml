theological_decisions:
- issue: Rendering μετανοέω / μετάνοια in vv. 6-8
  chosen_reading: v. 6 'changed my mind'; v. 7 'repentance'
  alternative_readings:
  - '''repented'' in both places'
  - '''changed my thinking'' / ''change of mind'' throughout'
  rationale: The verb in v. 6 is tightly linked to Gad's revised stance toward Joseph, a cognitive reversal; the noun in v. 7 broadens into a moral-theological principle, so 'repentance' better carries the religious force.
  doctrine_reference: 'DOCTRINE.md: μετανοέω → change of mind in cognitive contexts; repent in specific-sin contexts'
- issue: Bracketed phrase in v. 7
  chosen_reading: 'Translated in brackets: ''[removes ignorance and]'''
  alternative_readings:
  - omit as secondary expansion
  - translate without brackets as fully integral text
  rationale: The source presents the phrase in brackets, signaling textual uncertainty. It is translated honestly but marked to preserve transparency rather than silently omitting or fully assimilating it.
- issue: Meaning of divine reception in v. 8
  chosen_reading: 'Subject understood as God: ''through repentance he knows how to receive those who turn back'''
  alternative_readings:
  - subject as the repentant person learning to receive returners
  - impersonal reading
  rationale: The nearest and most coherent subject in context is God, continuing the theological statement about repentance and divine acceptance of returners.
- issue: Temporal phrase χρόνους δέκα in v. 11
  chosen_reading: '''for ten months'''
  alternative_readings:
  - '''for ten years'''
  - '''for ten periods/times'''
  rationale: The bodily illness context favors a finite period of affliction rather than a decade; 'months' is the most plausible idiomatic temporal value here, though not beyond dispute.
