translation:
  language: es
  text: Aun nuestros reyes, nuestros oficiales, nuestros sacerdotes y nuestros padres[a] no guardaron tu ley, y no escucharon tus mandamientos y tus testimonios, con los cuales los amonestaste[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «nuestros antepasados». El hebreo dice literalmente «nuestros padres».
    reason: lexical_alternative
  - marker: b
    text: O «los advertiste»; también puede traducirse «con los cuales diste testimonio contra ellos», conservando el matiz solemne y pactual del hebreo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֶת מְלָכֵינוּ
  english_pob_choice: Even our kings
  chosen_spanish: Aun nuestros reyes
  alternatives_spanish:
  - Y nuestros reyes
  - Incluso nuestros reyes
  lexicon: HALOT
  rationale: La partícula aditiva/emfática se conserva con «Aun», que suena natural en español y refleja la inclusión enfática de esta clase social en la confesión.
- source_word: שָׂרֵינוּ
  english_pob_choice: our officials
  chosen_spanish: nuestros oficiales
  alternatives_spanish:
  - nuestros príncipes
  - nuestros gobernantes
  - nuestros líderes
  lexicon: HALOT
  rationale: En este contexto cívico, «oficiales» comunica mejor la función administrativa de שָׂרִים que el más arcaico «príncipes».
- source_word: כֹּהֲנֵינוּ
  english_pob_choice: our priests
  chosen_spanish: nuestros sacerdotes
  alternatives_spanish:
  - nuestros sacerdotes
  lexicon: HALOT
  rationale: «Sacerdotes» es el equivalente español estándar de כֹּהֲנִים y conserva el registro bíblico apropiado.
- source_word: וַאֲבֹתֵינוּ
  english_pob_choice: our fathers
  chosen_spanish: nuestros padres
  alternatives_spanish:
  - nuestros antepasados
  - nuestros padres (como forma idiomática para generaciones previas)
  lexicon: HALOT
  rationale: Se mantiene el valor literal de אָבוֹת como «padres», evitando neutralizar de entrada la frase idiomática; en español bíblico, «nuestros padres» puede referir naturalmente a las generaciones anteriores.
- source_word: לֹא עָשׂוּ תּוֹרָתֶךָ
  english_pob_choice: did not keep your law
  chosen_spanish: no guardaron tu ley
  alternatives_spanish:
  - no hicieron tu ley
  - no obedecieron tu ley
  - no guardaron tu instrucción
  lexicon: HALOT
  rationale: עָשׂוּ con תּוֹרָה aquí expresa observancia obediente, no mera ejecución; «guardar» preserva ese sentido covenantal. «Ley» sigue la decisión de la POB inglesa en este marco de pacto.
- source_word: הִקְשִׁיבוּ
  english_pob_choice: did not listen to
  chosen_spanish: no escucharon
  alternatives_spanish:
  - no hicieron caso de
  - no prestaron atención a
  - no oyeron
  lexicon: HALOT
  rationale: «Escuchar» funciona como equivalente directo y formal de הִקְשִׁיבוּ en español, y reproduce la revisión del audit trail hacia una forma más directa que «prestar atención».
- source_word: מִצְוֺתֶיךָ
  english_pob_choice: your commandments
  chosen_spanish: tus mandamientos
  alternatives_spanish:
  - tus mandatos
  - tus órdenes
  lexicon: HALOT
  rationale: «Mandamientos» conserva el término covenantal formal y distingue este conjunto del más amplio «ley».
- source_word: וּלְעֵדְוֺתֶיךָ
  english_pob_choice: your testimonies
  chosen_spanish: tus testimonios
  alternatives_spanish:
  - tus testimonios solemnes
  - tus advertencias
  lexicon: HALOT
  rationale: «Testimonios» mantiene la correspondencia más directa con עֵדוֹת y evita borrar el matiz de testimonio pactal.
- source_word: אֲשֶׁר הַעִידֹתָ בָּהֶם
  english_pob_choice: with which you warned them
  chosen_spanish: con los cuales los amonestaste
  alternatives_spanish:
  - con los cuales los advertiste
  - por medio de los cuales los amonestaste
  - con los que les diste testimonio
  lexicon: HALOT
  rationale: El Hiphil de עוּד aquí tiene fuerza de advertencia solemne; «amonestar» preserva mejor el matiz de advertencia judicial/pactual que un simple «advertir», sin perder claridad en español.
theological_decisions:
- issue: תּוֹרָה en confesión pactual nacional
  english_pob_reading: your law
  chosen_spanish_reading: tu ley
  alternative_spanish_readings:
  - tu instrucción
  rationale: En este contexto de confesión histórica y pactual, תּוֹרָה apunta a la normativa divina dada al pueblo. «Ley» conserva la carga jurídica/pactual que la POB inglesa quiso resaltar.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: אָבוֹת como referencia a generaciones anteriores de Israel
  english_pob_reading: our fathers
  chosen_spanish_reading: nuestros padres
  alternative_spanish_readings:
  - nuestros antepasados
  rationale: Se conserva el masculino plural del hebreo y su idiomatismo bíblico, sin sustituirlo por una neutralización interpretativa.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: עֵדוֹת y הַעִידֹתָ como vínculo léxico de testimonio/admonición
  english_pob_reading: your testimonies ... with which you warned them
  chosen_spanish_reading: tus testimonios ... con los cuales los amonestaste
  alternative_spanish_readings:
  - tus testimonios ... con los cuales los advertiste
  - tus testimonios ... con los cuales les diste testimonio
  rationale: La traducción conserva el enlace conceptual entre «testimonios» y el verbo de advertencia solemne, evitando disolver la tensión entre testimonio y amonestación.
  doctrine_reference: Nehemías 9:34; cf. el uso pactal de עֵדוֹת en la Torá
translation_notes:
  revision_awareness: 'El texto inglés auditado pasó de «pay attention to» a «listen to» para הִקְשִׁיבוּ. La versión española sigue esa revisión con «no escucharon», manteniendo la progresión negativa: no guardaron la ley, no escucharon los mandamientos y los testimonios, y no atendieron la amonestación divina.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» no aplicable aquí porque el versículo usa sufijos de segunda persona («tu»), no el nombre divino explícito.
  - «Ley», «mandamientos» y «testimonios» se distinguen consistentemente para reflejar tres términos hebreos diferentes.
  - «Nuestros padres» conserva el lenguaje bíblico tradicional sin perder claridad en español contemporáneo.
  - El tono es confesional y formal, evitando paréntesis explicativos dentro del texto principal.
