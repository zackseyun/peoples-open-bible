    issue: «director» es demasiado genérico para לַמְנַצֵּחַ en un encabezado de salmo.
    rationale: La decisión inglesa documenta «choirmaster» precisamente para preservar mejor la función litúrgica/musical. En español, «maestro de coro» reproduce mejor esa especificidad que «director», que podría referirse a un líder no musical.
  - severity: low
    issue: La nota [a] explica «dedicación como dirección», pero no deja ver con suficiente claridad la alternativa más natural en español para el oficio musical.
    rationale: Si el texto principal se corrige a «maestro de coro», la nota debe mantener la alternativa «Al maestro de coro» para reflejar el valor posible de la preposición sin diluir el referente musical.
  revised_spanish_text: Para el maestro de coro[a]. De los hijos de Coré[b]. Salmo.
