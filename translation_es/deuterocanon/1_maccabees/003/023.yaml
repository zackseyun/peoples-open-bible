  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la secuencia del griego: cese del discurso, ataque repentino, y derrota de Serón con su fuerza. Sin embargo, la nota [a] está anclada al segmento equivocado: en el inglés auditado la alternativa corresponde al verbo de ataque, no a «terminó de hablar». Además, «quedaron quebrantados» suena menos natural y menos marcial que el valor de συνετρίβη (''fueron aplastados'' / ''fueron destrozados'').'
  spanish_quality_summary: 'El español es claro y mayormente natural, pero conviene ajustar dos puntos: 1) reubicar las notas para que reflejen correctamente las alternativas léxicas documentadas; 2) sustituir «quedaron quebrantados», que en español bíblico actual puede sonar abstracto o moral, por una expresión más concreta y militar.'
  glossary_alignment: No hay términos del glosario principal especialmente controvertidos en este versículo. «Serón» y «campamento» son adecuados. «Cargó contra ellos» y «de repente» encajan bien con el análisis léxico. El principal problema es de correspondencia entre notas y anclajes, no de terminología del proyecto.
  issues:
  - severity: high
    issue: Las notas al pie no corresponden a los mismos elementos léxicos que en el expediente inglés.
    rationale: La nota [a] en inglés documenta alternativas para el verbo de ataque (ἐνήλατο), pero en el borrador español está anclada a «terminó de hablar». La nota [b] inglesa documenta alternativas para «his camp», pero en español se usa para el verbo de ataque. Esto desordena la trazabilidad auditada.
  - severity: medium
    issue: «Quedaron quebrantados» no representa con la misma fuerza ni naturalidad el pasivo militar de συνετρίβη.
    rationale: Aunque literalmente posible, en español contemporáneo «quebrantados» suele sonar más figurado o espiritual. El contexto militar pide una formulación más concreta como «fueron aplastados» o «fueron destrozados».
  revised_spanish_text: Y cuando terminó de hablar, cargó de repente contra ellos[a], y Serón y su campamento[b] fueron aplastados delante de él.
  revised_footnotes:
  - marker: a
    text: O «se lanzó sobre ellos» / «arremetió contra ellos»; el verbo griego implica un ataque repentino y violento.
    reason: lexical_alternative
  - marker: b
    text: «Su campamento» también puede entenderse en sentido más amplio como «su ejército» o «su fuerza».
    reason: lexical_alternative
  revision_rationale: 'Se corrigen los anclajes de las notas para que coincidan con el expediente auditado inglés: la alternativa del verbo de ataque va con «cargó... contra ellos», y la alternativa de παρεμβολή va con «su campamento». También se reemplaza «quedaron quebrantados» por «fueron aplastados», que transmite mejor la fuerza de συνετρίβη en un contexto bélico y suena más natural en español actual.'
