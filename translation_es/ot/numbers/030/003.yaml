    changes_summary: Revised 'bind himself by a pledge' to 'bind himself with a binding obligation' to more closely reflect לֶאְסֹר אִסָּר ('to bind a binding obligation') rather than introducing 'pledge,' which is less precise here. Kept the rest unchanged as accurate and natural.
translation:
  language: es
  text: Si un hombre hace un voto a Yahvé, o jura un juramento para atarse con una obligación vinculante[a], no quebrantará su palabra[b]; hará conforme a todo lo que haya salido de su boca.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''para atarse por una obligación''. El hebreo dice literalmente ''para atar una obligación vinculante sobre sí mismo''.'
    reason: lexical_alternative
  - marker: b
    text: 'Lit.: ''no profanará su palabra''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִישׁ
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  - alguien
  lexicon: HALOT
  rationale: El hebreo usa el sustantivo masculino singular en una formulación legal. Mantengo 'un hombre' por fidelidad al género gramatical del texto y al tono casuístico del pasaje.
- source_word: כִּי
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - cuando
  lexicon: HALOT
  rationale: Aquí introduce una cláusula condicional típica de norma legal; 'Si' reproduce mejor la función jurídica que 'cuando'.
- source_word: יִדֹּר נֶדֶר
  english_pob_choice: makes a vow
  chosen_spanish: hace un voto
  alternatives_spanish:
  - vota un voto
  - formula un voto
  lexicon: HALOT
  rationale: La construcción hebrea es un cognado enfático. En español, 'hacer un voto' comunica de forma natural y fiel el acto de comprometerse solemnemente.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - a Yahveh
  - al SEÑOR
  lexicon: HALOT
  rationale: Sigo la convención del proyecto para יהוה con 'Yahvé', preservando el nombre propio del pacto en lugar de una sustitución titulada.
- source_word: הִשָּׁבַע שְׁבֻעָה
  english_pob_choice: swears an oath
  chosen_spanish: jura un juramento
  alternatives_spanish:
  - hace un juramento
  - presta juramento
  lexicon: HALOT
  rationale: La duplicación verbo-sustantivo del hebreo se conserva en español con un giro igualmente enfático. 'Jura un juramento' suena formal pero permanece muy cercano a la forma original.
- source_word: לֶאְסֹר אִסָּר
  english_pob_choice: to bind himself with a binding obligation
  chosen_spanish: para atarse con una obligación vinculante
  alternatives_spanish:
  - para atarse con un vínculo obligatorio
  - para imponerse una obligación vinculante
  lexicon: HALOT
  rationale: El hebreo expresa literalmente 'atar una atadura'. Mantengo la idea de auto-atarse y traduzco אִסָּר con una expresión que conserve el carácter concreto y legal de la obligación, sin suavizarla a un mero compromiso interior.
- source_word: עַל נַפְשׁוֹ
  english_pob_choice: himself
  chosen_spanish: se
  alternatives_spanish:
  - sobre sí mismo
  - en su propia persona
  lexicon: HALOT
  rationale: 'En este modismo jurídico, el sentido es reflexivo: la obligación recae sobre la propia persona. ''Se atarse'' sería español incorrecto; por eso lo integro con el verbo reflexivo ''atarse''.'
- source_word: לֹא יַחֵל דְּבָרוֹ
  english_pob_choice: he shall not break his word
  chosen_spanish: no quebrantará su palabra
  alternatives_spanish:
  - no profanará su palabra
  - no violará su palabra
  lexicon: HALOT
  rationale: יַחֵל proviene del campo de 'profanar, tratar como común/irreverente'. En español, 'quebrantar su palabra' transmite bien la idea normativa sin perder del todo la fuerza de la infracción; 'profanará' se conserva como alternativa para la tensión léxica.
- source_word: כְּכָל הַיֹּצֵא מִפִּיו
  english_pob_choice: according to all that has gone out from his mouth
  chosen_spanish: conforme a todo lo que salga de su boca
  alternatives_spanish:
  - según todo lo que haya salido de su boca
  - de acuerdo con todo lo que pronuncie
  lexicon: HALOT
  rationale: Mantengo la imagen concreta de lo que 'sale de la boca', que en español puede expresarse de modo natural con 'salga de su boca'. La forma conserva el tono solemne del hebreo sin volverse rígida.
- source_word: יַעֲשֶׂה
  english_pob_choice: he shall do
  chosen_spanish: hará
  alternatives_spanish:
  - deberá hacer
  - cumplirá
  lexicon: HALOT
  rationale: En el estilo legal casuístico, el futuro simple en español puede expresar obligación normativa. 'Hará' mantiene la sobriedad y la fuerza del hebreo.
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton. Conforme a la terminología del proyecto, lo vierto como 'Yahvé' para preservar el nombre del pacto y evitar la ocultación mediante un título sustitutivo.
  doctrine_reference: 'DOCTRINE.md Contested terms: יהוה YHWH'
- issue: Fuerza normativa del acto verbal solemne
  english_pob_reading: he shall not break his word; he shall do according to all that has gone out from his mouth
  chosen_spanish_reading: no quebrantará su palabra; hará conforme a todo lo que salga de su boca
  alternative_spanish_readings:
  - no profanará su palabra; hará conforme a todo lo que haya salido de su boca
  - no violará su palabra; cumplirá todo lo que salga de su boca
  rationale: El POB inglés preserva la tensión entre el sentido literal de 'profanar' y la equivalencia idiomática 'break'. En español, 'quebrantar' mantiene la idea de violación legal/moral sin borrar por completo la resonancia de la profanación.
  doctrine_reference: HALOT חלל en contexto jurídico
translation_notes:
  revision_awareness: 'El borrador sigue la revisión más reciente del POB inglés, que afinó לֶאְסֹר אִסָּר hacia la idea de ''binding obligation'' en vez de ''pledge''. Por eso el español evita ''promesa'' o ''compromiso'' y conserva una formulación más pesada y jurídica: ''una obligación vinculante''. También mantiene el paralelismo del hebreo: voto/juramento, auto-atarse, no quebrantar la palabra, y hacer todo lo que sale de la boca.'
  spanish_consistency_notes:
  - He usado 'Yahvé' según el estándar del proyecto para יהוה.
  - He preferido 'palabra' para דָּבָר en este contexto jurídico, siguiendo el valor de 'word' del audit trail inglés.
  - He conservado el matiz de auto-obligación con 'atarse' y 'obligación vinculante', evitando un suavizado hacia 'promesa' que perdería la densidad legal del hebreo.
  - La puntuación reproduce la cadencia legal de una cláusula condicional seguida de resultados obligatorios.
