revisions:
- from: 'Entonces sacaron al hijo del rey[a], pusieron sobre él la corona y el testimonio, lo proclamaron rey y lo ungieron; y Joyadá y sus hijos dijeron: «¡Viva el rey!»'
  to: 'Entonces sacaron al hijo del rey, pusieron sobre él la corona y el testimonio[a], lo hicieron rey y lo ungieron; y Joyadá y sus hijos dijeron: «¡Viva el rey!»'
  rationale: Se corrige «lo proclamaron rey» a «lo hicieron rey» para reflejar mejor el hiphil de מלך y la decisión documentada del POB, manteniendo distinta esta acción de la colocación de la corona. También se mueve la nota [a] a «el testimonio», que es el término realmente explicado por la nota.
