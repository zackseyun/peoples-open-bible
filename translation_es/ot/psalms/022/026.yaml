translation:
  language: es
  text: De ti viene mi alabanza en la gran asamblea[a]; pagaré mis votos delante de los que le temen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «los que le temen»; algunas traducciones suavizan el pronombre a «los que te temen» para mantener la coherencia con la dirección anterior en segunda persona.'
    reason: alternative_reading
lexical_decisions:
- source_word: מֵאִתְּךָ
  english_pob_choice: From you comes
  chosen_spanish: De ti viene
  alternatives_spanish:
  - De ti proviene
  - De ti procede
  - De ti viene como origen
  lexicon: HALOT
  rationale: La preposición con sufijo de 2ms expresa procedencia/origen. En español, «De ti viene» conserva la idea de que la alabanza procede de Yahvé sin añadir más de lo que el hebreo requiere. «Viene» reproduce bien la direccionalidad y evita una construcción demasiado literal o extraña.
- source_word: תְהִלָּתִי
  english_pob_choice: my praise
  chosen_spanish: mi alabanza
  alternatives_spanish:
  - mi alabanza de gratitud
  - mi canto de alabanza
  - mi elogio
  lexicon: HALOT
  rationale: El sustantivo denota alabanza, elogio o acción de alabar. «Alabanza» es natural y fiel en español bíblico contemporáneo. Se evita «canto» o una frase más interpretativa porque el hebreo no especifica la forma musical.
- source_word: בְּקָהָל רָב
  english_pob_choice: in the great assembly
  chosen_spanish: en la gran asamblea
  alternatives_spanish:
  - en la gran congregación
  - entre la gran asamblea
  - en un gran asamblea
  lexicon: HALOT
  rationale: קָהָל se refiere a una asamblea reunida; «asamblea» es claro y digno en español. «Gran» refleja רָב como tamaño/importancia del grupo, sin perder el sentido colectivo del término.
- source_word: נְדָרַי
  english_pob_choice: my vows
  chosen_spanish: mis votos
  alternatives_spanish:
  - mis votos hechos a Dios
  - mis promesas
  - mis votos al Señor
  lexicon: HALOT
  rationale: En español religioso, «votos» comunica bien la idea de promesas solemnes hechas a Dios y mantiene el paralelismo con «pagaré». Se prefiere «votos» sobre «promesas» porque expresa mejor el valor cultual del término hebreo.
- source_word: אֲשַׁלֵּם
  english_pob_choice: I will pay
  chosen_spanish: pagaré
  alternatives_spanish:
  - cumpliré
  - haré efectivos
  - saldaré
  lexicon: HALOT
  rationale: El verbo en piel puede significar pagar, retribuir o cumplir. Con «votos» como objeto, «pagaré» es la correspondencia más directa y mantiene el uso bíblico tradicional, sin perder claridad.
- source_word: נֶגֶד
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - ante
  - en presencia de
  - frente a
  lexicon: HALOT
  rationale: La preposición indica presencia visible o pública. «Delante de» suena natural en español y conserva la imagen de realizar los votos públicamente ante quienes están presentes.
- source_word: יְרֵאָיו
  english_pob_choice: those who fear him
  chosen_spanish: los que le temen
  alternatives_spanish:
  - los que le reverencian
  - los que temen a él
  - sus temerosos
  lexicon: HALOT
  rationale: El participio con sufijo de 3ms significa quienes temen/reverencian a Dios. «Los que le temen» conserva el registro bíblico y la fuerza reverencial del hebreo. El clítico «le» mantiene el referente implícito a Yahvé en el contexto.
theological_decisions:
- issue: 'Cambio de persona en יְרֵאָיו: del «tú» directo al sufijo de tercera persona'
  english_pob_reading: 'Retain the Masoretic shift: ''From you ... those who fear him'''
  chosen_spanish_reading: 'Conservar el cambio: «De ti ... los que le temen»'
  alternative_spanish_readings:
  - «De ti ... los que te temen»
  - armonizar toda la línea en segunda persona
  rationale: El hebreo pasa de la dirección explícita a Yahvé («de ti») a una referencia en tercera persona («a los que le temen»). La traducción española conserva ese cambio, porque suavizarlo eliminaría una tensión real del texto. En contexto, el referente sigue siendo Yahvé; el clítico «le» permite respetar la forma del hebreo sin confundir al lector.
  doctrine_reference: Salmos 22:26; principio de transparencia textual de POB
translation_notes:
  revision_awareness: 'El pasaje coincide con el audit trail inglés: se mantiene la procedencia de la alabanza, el matiz público de la asamblea y el cambio masorético de persona en el último hemistiquio. No se requirieron revisiones respecto del texto base auditado.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma estándar del nombre divino en POB español, aunque en este verso no aparece explícitamente en el texto español por economía poética.
  - «Alabanza» conserva el sentido amplio de תְהִלָּה sin introducir matices sacrificiales no explícitos.
  - «Votos» se mantiene como término cultual coherente con el hebreo y con el registro bíblico en español.
