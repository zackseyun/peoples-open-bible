    rationale: La nota inglesa explica el valor de 'brothers' frente a alternativas como 'kindred/siblings'; en español conviene justificar 'hermanos' como conservación del emparejamiento retórico y del referente del original, sin extenderse a una lectura amplia no marcada por el texto.
