    changes_summary: Added 'against them' to account for עֲלֵיהֶם and preserve the full sense of the clause; retained the overall wording and formal register.
translation:
  language: es
  text: Ahora sé que Yahvé es más grande que todos los dioses[a], porque en el asunto en que actuaron con arrogancia contra ellos, él estuvo por encima de ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «porque en la misma cosa en que actuaron con orgullo contra ellos». El hebreo de la última cláusula es difícil y puede referirse de manera específica al trato arrogante de los egipcios hacia Israel.'
    reason: alternative_reading
lexical_decisions:
- source_word: עַתָּה
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Ahora mismo
  - En este momento
  lexicon: HALOT
  rationale: Marca el giro discursivo inmediato de la confesión de Jetró. «Ahora» es natural en español y conserva el valor temporal y conclusivo del adverbio.
- source_word: יָדַעְתִּי
  english_pob_choice: I know
  chosen_spanish: sé
  alternatives_spanish:
  - he llegado a saber
  - he conocido
  lexicon: HALOT
  rationale: El perfecto expresa un estado de conocimiento ya adquirido a raíz de los hechos recientes. «Sé» comunica bien esa conclusión presente sin sonar artificial.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: 'Se sigue la norma del proyecto para el Tetragrámaton: preservar el nombre divino como nombre propio y no sustituirlo por un título. «Yahvé» es la forma española estable del nombre revelado.'
- source_word: גָדוֹל ... מִכָּל
  english_pob_choice: greater than all the gods
  chosen_spanish: es más grande que todos los dioses
  alternatives_spanish:
  - es mayor que todos los dioses
  - está por encima de todos los dioses
  lexicon: HALOT
  rationale: La comparación con מִן exige un comparativo en español. «Más grande que» conserva la fuerza evaluativa del hebreo y mantiene el contraste explícito con «todos los dioses».
- source_word: הָאֱלֹהִים
  english_pob_choice: the gods
  chosen_spanish: los dioses
  alternatives_spanish:
  - los seres divinos
  - las deidades
  lexicon: HALOT
  rationale: En este contexto, el plural contrasta con Yahvé frente a las divinidades de las naciones. «Dioses» reproduce la referencia plural sin diluirla en una paráfrasis explicativa.
- source_word: בַדָּבָר
  english_pob_choice: in the matter
  chosen_spanish: en el asunto
  alternatives_spanish:
  - en la cosa
  - en el hecho
  lexicon: HALOT
  rationale: דָּבָר aquí apunta al caso o asunto concreto de la opresión y la liberación. «Asunto» es idiomático en español y conserva la indefinición del hebreo.
- source_word: אֲשֶׁר
  english_pob_choice: in which
  chosen_spanish: en que
  alternatives_spanish:
  - en el cual
  - donde
  lexicon: HALOT
  rationale: Introduce la cláusula relativa unida al sustantivo anterior. «En que» mantiene la relación sintáctica sin forzar una formulación demasiado pesada.
- source_word: זָדוּ
  english_pob_choice: acted arrogantly
  chosen_spanish: actuaron con arrogancia
  alternatives_spanish:
  - obraron con orgullo
  - se mostraron insolentes
  - actuaron presumptuosamente
  lexicon: HALOT
  rationale: El verbo expresa soberbia/presunción ofensiva. «Actuaron con arrogancia» conserva la carga moral del término y suena natural en español bíblico contemporáneo.
- source_word: עֲלֵיהֶם
  english_pob_choice: against them / above them
  chosen_spanish: contra ellos
  alternatives_spanish:
  - sobre ellos
  - por encima de ellos
  lexicon: HALOT
  rationale: El antecedente de «ellos» es deliberadamente difícil. En la cláusula relativa, «contra ellos» preserva la relación de hostilidad indicada por la preposición y deja abierta la identificación contextual de los oprimidos/oprimidores; la segunda cola del verso ya expresa la superioridad de Yahvé con «por encima de ellos».
- source_word: עֲלֵיהֶם
  english_pob_choice: he was above them
  chosen_spanish: él estuvo por encima de ellos
  alternatives_spanish:
  - él fue superior a ellos
  - él se alzó sobre ellos
  lexicon: HALOT
  rationale: La imagen final comunica supremacía divina. «Estuvo por encima de ellos» conserva el sentido de superioridad sin resolver en exceso la sintaxis hebrea difícil.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto usa directamente el Tetragrámaton. La política del proyecto exige transliterarlo como nombre propio, no sustituirlo por un título. «Yahvé» es la forma española habitual y auditable.
  doctrine_reference: 'DOCTRINE.md: contested terms — יְהוָה / YHWH'
- issue: Interpretación de la cláusula final difícil
  english_pob_reading: because in the matter in which they acted arrogantly against them, he was above them
  chosen_spanish_reading: porque en el asunto en que actuaron con arrogancia contra ellos, él estuvo por encima de ellos
  alternative_spanish_readings:
  - porque en la misma cosa en que se mostraron orgullosos contra ellos, él estuvo por encima de ellos
  - porque en el hecho en que obraron presumptuosamente contra ellos, él fue superior a ellos
  rationale: La hebra final es sintácticamente compacta y admite más de una relación entre los pronombres. La traducción conserva la opresión arrogante y la respuesta de superioridad de Yahvé sin cerrar indebidamente las opciones interpretativas del hebreo.
  doctrine_reference: No doctrinal issue; lexical/syntactic ambiguity in Hebrew
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés POB, que añadió explícitamente «against them» para reflejar עֲלֵיהֶם. La versión española incorpora esa precisión con «contra ellos» y mantiene la idea de superioridad divina con «por encima de ellos», evitando resolver en exceso el sujeto y el referente exacto de los pronombres en la cláusula final.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» conforme al estándar del proyecto para יְהוָה.
  - Se prefirió «dioses» para הָאֱלֹהִים por el contraste plural del contexto.
  - «Actuaron con arrogancia» conserva el tono moral del verbo זָדוּ sin volverlo demasiado libre.
  - La nota al pie recoge la alternativa interpretativa del hebreo difícil sin duplicar la base textual.
