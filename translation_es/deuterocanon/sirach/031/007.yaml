review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue correctamente el hebreo principal: תקלה como imagen de tropiezo/ruina, אויל como «necio», פותה como persona crédula, יוקש como quedar atrapado, y בו como referencia anafórica. También preserva adecuadamente en nota la fuerte divergencia del paralelo griego. Sin embargo, el texto español introdujo una marca artificial «simple[ton]» que no corresponde a español natural ni a una nota real del inglés POB.'
  spanish_quality_summary: 'La redacción es generalmente clara y digna, pero «simple[ton]» es inaceptable en el texto bíblico español: mezcla inglés y español, rompe la legibilidad y no aporta una nota correspondiente. Además, «todo simple» suena poco idiomático. Conviene reemplazarlo por una opción sapiencial natural como «ingenuo».'
  glossary_alignment: 'No hay conflictos con la terminología teológica de proyecto. Las decisiones léxicas principales están bien encaminadas: «necio» para אויל y una expresión de trampa para יוקש. La excepción necesaria es abandonar la pseudoforma «simple[ton]» en favor de un español natural que conserve la idea de credulidad fácil.'
  issues:
  - severity: high
    issue: Uso de «simple[ton]» en el texto principal
    rationale: No es español válido ni una convención permitida del proyecto. Introduce una interpolación editorial visible en vez de una traducción legible y fiel.
  - severity: medium
    issue: «todo simple» suena poco natural en español bíblico actual
    rationale: Aunque intenta conservar la idea de credulidad, en español general «simple» puede significar solo ‘sencillo’ o funcionar como insulto impreciso. «Ingenuo» comunica mejor la susceptibilidad al engaño de פותה.
  - severity: low
    issue: La nota al pie está bien, pero el marcador [a] en «necio[a]» podría anclarse también al verso completo
    rationale: No es un error; el contenido de la nota trata la línea alternativa completa. Se puede mantener el anclaje actual por economía editorial.
  revised_spanish_text: Porque es un tropiezo para un necio[a], y todo ingenuo queda atrapado por él.
  revised_footnotes:
  - marker: a
    text: 'Paralelo griego: «Porque los sueños extraviaron a muchos, y los que esperaban en ellos cayeron». El hebreo y el griego difieren sustancialmente aquí.'
    reason: alternative_reading
  revision_rationale: 'Se conserva la estructura y el sentido del hebreo, así como la nota sobre la divergencia textual griega, pero se corrige el principal problema de calidad: «simple[ton]» se sustituye por «ingenuo», que expresa naturalmente la credulidad de פותה en español amplio y legible.'
