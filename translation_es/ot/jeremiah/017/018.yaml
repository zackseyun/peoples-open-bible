  yaml_path: translation/ot/jeremiah/017/018.yaml
  text: Let my pursuers be put to shame[a], but let me not be put to shame; let them be dismayed, but let me not be dismayed. Bring upon them a day of disaster[c][b], and shatter them with double destruction.
