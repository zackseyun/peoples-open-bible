translation:
  language: es
  text: Hijo mío[a], guarda el tiempo oportuno y cuídate del mal[b], y no te avergüences por tu propia alma[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo transmitido en esta línea es difícil; el paralelo griego lee simplemente “guarda el tiempo / el momento oportuno”. Se sigue ese sentido claro.
    reason: textual_variant
  - marker: b
    text: O “aléjate del mal”. El hebreo de esta expresión es menos transparente; el griego apoya la idea de mantenerse en guardia frente al mal.
    reason: lexical_alternative
  - marker: c
    text: O “por ti mismo” o “por tu vida”. Hebreo נֶפֶשׁ y griego ψυχή pueden significar “alma”, “vida” o “yo mismo” según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנִי
  english_pob_choice: My son
  chosen_spanish: Hijo mío
  alternatives_spanish:
  - Hijo
  - Muchacho mío
  lexicon: HALOT
  rationale: Se conserva el vocativo sapiencial masculino singular y su tono de instrucción directa. 'Hijo mío' sigue de cerca la forma hebrea y es natural en español bíblico contemporáneo.
- source_word: עֵת הָמוֹן
  english_pob_choice: the proper time
  chosen_spanish: el tiempo oportuno
  alternatives_spanish:
  - el tiempo adecuado
  - la ocasión oportuna
  - el tiempo
  lexicon: HALOT
  rationale: El hebreo transmitido es difícil, y el paralelo griego apunta a καιρός, es decir, un tiempo conveniente u oportuno. 'Tiempo oportuno' comunica ese valor sin resolver de forma excesiva la tensión textual.
- source_word: שְׁמֹר
  english_pob_choice: keep
  chosen_spanish: guarda
  alternatives_spanish:
  - observa
  - mantén
  - preserva
  lexicon: HALOT
  rationale: El imperativo hebreo admite 'guardar/observar'. 'Guarda' funciona bien con 'el tiempo oportuno' y preserva la fuerza exhortativa.
- source_word: וּפְחַד מִרָע
  english_pob_choice: beware of evil
  chosen_spanish: cuídate del mal
  alternatives_spanish:
  - guárdate del mal
  - evita el mal
  - mantente lejos del mal
  lexicon: HALOT
  rationale: El hebreo es oscuro en la vocalización, pero el griego φύλαξαι ἀπὸ πονηροῦ respalda una advertencia de resguardarse del mal. 'Cuídate del mal' expresa esa cautela en español natural.
- source_word: נַפְשְׁךָ
  english_pob_choice: your own soul
  chosen_spanish: tu propia alma
  alternatives_spanish:
  - ti mismo
  - tu vida
  - tu ser
  lexicon: HALOT
  rationale: נפש puede significar alma, vida o yo mismo. Se conserva 'alma' para mantener el peso antropológico y moral que el POB inglés dejó abierto, sin cerrar la ambigüedad por completo.
- source_word: אַל תֵּבוֹשׁ
  english_pob_choice: do not be ashamed
  chosen_spanish: no te avergüences
  alternatives_spanish:
  - no quedes avergonzado
  - no te sientas avergonzado
  - no seas avergonzado
  lexicon: HALOT
  rationale: La forma negativa es directa; 'no te avergüences' es la equivalencia más natural y fiel, y concuerda con el griego μὴ αἰσχυνθῇς.
theological_decisions:
- issue: Ambigüedad de נֶפֶשׁ / ψυχή
  english_pob_reading: for your own soul
  chosen_spanish_reading: por tu propia alma
  alternative_spanish_readings:
  - por ti mismo
  - por tu vida
  rationale: Se mantiene la ambigüedad antropológica del término sin neutralizarla. 'Alma' preserva el peso interior y moral del mandato, mientras que las alternativas siguen siendo viables según el contexto.
  doctrine_reference: 'DOCTRINE.md: preservar la tensión teológica/antropológica en lugar de resolverla prematuramente.'
- issue: Lectura difícil de הָמוֹן frente al paralelo griego
  english_pob_reading: keep the proper time
  chosen_spanish_reading: guarda el tiempo oportuno
  alternative_spanish_readings:
  - observa el tiempo
  - guarda el momento adecuado
  rationale: No se intenta traducir mecánicamente el hebreo oscuro; se sigue el sentido más claro apoyado por el griego, manteniendo la nota de incertidumbre textual en la documentación.
  doctrine_reference: 'DOCTRINE.md: usar el testimonio paralelo para clarificar, sin borrar la dificultad del hebreo transmitido.'
translation_notes:
  revision_awareness: El borrador sigue la decisión revisada del POB inglés de preferir un sentido claro y natural para ‘beware of evil’ y ‘for your own soul’, pero en español se opta por ‘cuídate del mal’ y ‘por tu propia alma’ para conservar el matiz exhortativo e interior del hebreo/griego, sin perder legibilidad.
  spanish_consistency_notes:
  - Se mantiene 'Hijo mío' para el vocativo sapiencial.
  - '''Yahvé'' no aparece en este versículo, por lo que no se aplica la convención del nombre divino.'
  - '''alma'' se usa de forma consistente para ψυχή/נפש cuando el contexto apunta al interior de la persona, con nota de alternativas.'
  - La puntuación sigue el estilo español moderno con coma antes de la segunda cláusula exhortativa.
