theological_decisions:
- issue: 양자됨이 이미 받은 것이자 동시에 고대되는 것
  chosen_reading: 본문 그대로 — 이미 받은 「양자됨의 영」(8:15) + 아직 기다리는 「양자됨」(8:23, 몸의 구속)
  alternative_readings:
