translation:
  language: es
  text: Entonces Jefté huyó de sus hermanos y habitó en la tierra de Tob, y hombres despreciables[a] se reunieron alrededor de Jefté y salieron con él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hombres vacíos»; el hebreo usa un modismo que señala hombres de baja condición o mala reputación, no simplemente hombres sin bienes.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּבְרַח
  english_pob_choice: fled
  chosen_spanish: huyó
  alternatives_spanish:
  - escapó
  - fue huyendo
  lexicon: HALOT
  rationale: ברח expresa huida ante presión u hostilidad. «Huyó» comunica bien la salida forzada en español narrativo y evita un calco rígido.
- source_word: מִפְּנֵי אֶחָיו
  english_pob_choice: from his brothers
  chosen_spanish: de sus hermanos
  alternatives_spanish:
  - de delante de sus hermanos
  - de la presencia de sus hermanos
  lexicon: HALOT
  rationale: El hebreo literalmente dice «de delante/de la presencia de». En este contexto la idea es separación causada por la hostilidad de los hermanos; «de sus hermanos» conserva el sentido natural en español.
- source_word: וַיֵּשֶׁב
  english_pob_choice: lived
  chosen_spanish: habitó
  alternatives_spanish:
  - vivió
  - se estableció
  lexicon: HALOT
  rationale: ישב puede significar residir o habitar. «Habitó» es suficientemente natural en español bíblico y preserva el matiz de residencia sin forzar permanencia absoluta.
- source_word: בְּאֶרֶץ טוֹב
  english_pob_choice: in the land of Tob
  chosen_spanish: en la tierra de Tob
  alternatives_spanish:
  - en el territorio de Tob
  lexicon: HALOT
  rationale: אֶרֶץ se rinde de manera directa como «tierra». Se mantiene el nombre propio transliterado «Tob» como en la tradición de lugares bíblicos.
- source_word: וַיִּתְלַקְּטוּ
  english_pob_choice: gathered
  chosen_spanish: se reunieron
  alternatives_spanish:
  - se juntaron
  - se congregaron
  lexicon: HALOT
  rationale: El hitpael indica que se fueron juntando por iniciativa propia. «Se reunieron» conserva ese sentido sin añadir estructura militar no explícita.
- source_word: אֶל יִפְתָּח
  english_pob_choice: to Jephthah
  chosen_spanish: alrededor de Jefté
  alternatives_spanish:
  - a Jefté
  - junto a Jefté
  lexicon: HALOT
  rationale: Aunque אֶל es básicamente «a/hacia», la revisión inglesa reconoció que el movimiento hacia Jefté resulta más idiomático como «around Jephthah». En español, «alrededor de Jefté» expresa bien la idea de acercamiento y asociación, sin afirmar más de lo que dice el texto.
- source_word: אֲנָשִׁים רֵיקִים
  english_pob_choice: worthless men
  chosen_spanish: hombres inútiles
  alternatives_spanish:
  - hombres vacíos
  - hombres de poco valor
  - hombres sin carácter
  lexicon: HALOT
  rationale: רֵיקִים literalmente es «vacíos», pero en este modismo describe hombres de baja condición o mala reputación. «Hombres inútiles» intenta reflejar la fuerza depreciativa del idiomático sin precisar un delito que el hebreo no explicita.
- source_word: וַיֵּצְאוּ עִמּוֹ
  english_pob_choice: went out with him
  chosen_spanish: salían con él
  alternatives_spanish:
  - iban con él
  - salieron con él
  lexicon: HALOT
  rationale: יצא significa «salir/ir fuera». El contexto sugiere acompañamiento en sus salidas, pero no especifica la actividad. «Salían con él» conserva esa apertura y el aspecto narrativo.
translation_notes:
  revision_awareness: La revisión inglesa reciente movió «gathered to Jephthah» a «gathered around Jephthah» para un inglés más natural. En español se reflejó esa misma naturalidad con «se reunieron alrededor de Jefté», manteniendo la apertura del hebreo y sin introducir la idea de bandas armadas o incursiones.
  spanish_consistency_notes:
  - Se usó «Jefté» para el nombre propio, en continuidad con la transliteración bíblica habitual en español.
  - Se prefirió «tierra» para אֶרֶץ, coherente con el tratamiento de topónimos en esta clase de pasajes.
  - No se tradujo el modismo רֵיקִים de forma literal como «vacíos» en el texto principal porque en español sonaría menos natural; esa alternativa quedó preservada en la nota.
  - Se evitó añadir un verbo de guerra o saqueo para וַיֵּצְאוּ עִמּוֹ, porque el hebreo solo dice que salían con él.
