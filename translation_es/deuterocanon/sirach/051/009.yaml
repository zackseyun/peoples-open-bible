translation:
  language: es
  text: Y alcé mi voz desde la tierra[a], y desde las puertas del Sheol[b] clamé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: «desde la tierra/land». El hebreo dice «desde la tierra», mientras que el paralelo griego refleja «sobre la tierra», lo que indica una divergencia menor entre los testigos.'
    reason: textual_variant
  - marker: b
    text: «Sheol» es el término hebreo para el ámbito de los muertos; alternativamente, «el sepulcro» o «el inframundo».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאָרִים / ἀνύψωσα
  english_pob_choice: I raised
  chosen_spanish: alcé
  alternatives_spanish:
  - levanté
  - elevé
  lexicon: HALOT; LXX ἀνυψόω
  rationale: El verbo expresa levantar/elevar en primera persona. «Alcé» mantiene la imagen concreta y funciona bien con «mi voz» en español, sin volverla más interpretativa que el hebreo o el griego.
- source_word: קוֹלִי
  english_pob_choice: my voice
  chosen_spanish: mi voz
  alternatives_spanish:
  - mi clamor
  - mi sonido
  lexicon: HALOT
  rationale: קוֹל es literalmente «voz» o «sonido». Con el verbo de alzar, «mi voz» conserva el paralelismo poético y evita anticipar el matiz de súplica que aparece en el segundo hemistiquio.
- source_word: מֵאֶרֶץ / ἐπὶ γῆν
  english_pob_choice: from the earth / upon the earth
  chosen_spanish: desde la tierra
  alternatives_spanish:
  - desde la tierra/land
  - sobre la tierra
  lexicon: HALOT; LXX γῆ
  rationale: La tradición hebrea dice «desde la tierra» y el paralelo griego presenta «sobre la tierra», una divergencia menor de testigos. «Desde la tierra» permite reflejar la base hebrea y, al mismo tiempo, evita cargar la frase con una interpretación doctrinal.
- source_word: שְׁאוֹל
  english_pob_choice: Sheol
  chosen_spanish: Sheol
  alternatives_spanish:
  - el sepulcro
  - el inframundo
  lexicon: HALOT
  rationale: Se conserva el término técnico hebreo para no reducirlo a «sepulcro» ni sustituirlo por un equivalente posterior más doctrinal. En español, mantener «Sheol» preserva la tensión semántica del texto.
- source_word: שִׁוַּעְתִּי / ἐδεήθην
  english_pob_choice: I cried out
  chosen_spanish: clamé
  alternatives_spanish:
  - grité
  - imploré
  lexicon: HALOT; LXX δέομαι
  rationale: El hebreo denota clamor y el griego añade una nota de súplica. «Clamé» recoge ambos valores de forma natural en español, sin introducir el objeto explícito «ayuda», que no está en el hebreo.
theological_decisions:
- issue: Tratamiento de Sheol
  english_pob_reading: Sheol as the Hebrew term for the realm of the dead; alternatives 'the grave' / 'the underworld'
  chosen_spanish_reading: Sheol como término hebreo del ámbito de los muertos
  alternative_spanish_readings:
  - el sepulcro
  - el inframundo
  rationale: La traducción conserva el término hebreo para respetar el color poético y no resolver indebidamente la idea bíblica del estado de los muertos. Esto sigue la pauta de mantener la tensión lexical y teológica en vez de homogenizarla.
  doctrine_reference: 'DOCTRINE.md: preservar la tensión teológica cuando el texto no la resuelve explícitamente'
- issue: Divergencia menor entre el hebreo y el griego en la primera cola
  english_pob_reading: '''from the earth'' with footnote noting Greek ''upon the earth'''
  chosen_spanish_reading: «desde la tierra» con nota textual
  alternative_spanish_readings:
  - «sobre la tierra»
  - «desde la tierra/land»
  rationale: El hebreo es la base principal del pasaje, pero el griego conserva una diferencia real en la preposición. La nota permite auditar la variante sin ocultarla ni fusionar artificialmente ambos testigos.
  doctrine_reference: 'DOCTRINE.md: documentar variantes textuales relevantes y no borrar divergencias entre testigos'
translation_notes:
  revision_awareness: La redacción sigue el testimonio hebreo principal de Sirach 51:9 y toma en cuenta el paralelo griego de Swete, que difiere levemente en la primera cola y refuerza el matiz de súplica del verbo final. Se evita una paráfrasis más explícita como «clamé por ayuda» para no añadir un objeto ausente en el hebreo, en línea con la revisión inglesa más reciente.
  spanish_consistency_notes:
  - Se prefiere «tierra» para מֵאֶרֶץ, manteniendo la amplitud semántica de «earth/land».
  - Se conserva «Sheol» en transliteración, coherente con el tratamiento POB del término técnico.
  - «Clamé» mantiene el tono poético y la súplica sin sobreespecificar el contenido del grito.
  - La puntuación y la sintaxis buscan un registro bíblico moderno, claro y publicable en español neutro.
