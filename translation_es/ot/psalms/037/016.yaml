translation:
  language: es
  text: Mejor es[a] lo poco del justo que la abundancia de muchos impíos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Es mejor un poco para el justo que la abundancia de los impíos». El hebreo es elíptico; el sentido posesivo está implícito.'
    reason: lexical_alternative
lexical_decisions:
- source_word: טוֹב
  english_pob_choice: Better is
  chosen_spanish: Mejor es
  alternatives_spanish:
  - Es mejor
  - Bueno es
  lexicon: HALOT
  rationale: En esta construcción comparativa proverbial, טוֹב funciona idiomáticamente como comparación de superioridad. «Mejor es» conserva el tono sentencioso y el orden natural del español sin perder la fuerza comparativa.
- source_word: מְעַט
  english_pob_choice: a little
  chosen_spanish: poco
  alternatives_spanish:
  - un poco
  - una pequeña cantidad
  lexicon: HALOT
  rationale: El sustantivo expresa una cantidad pequeña. «Poco» es natural en español y mantiene el contraste con «abundancia».
- source_word: לַצַּדִּיק
  english_pob_choice: that belongs to the righteous
  chosen_spanish: para el justo
  alternatives_spanish:
  - del justo
  - que pertenece al justo
  - del hombre justo
  lexicon: HALOT
  rationale: El l puede expresar posesión en esta comparación elíptica, pero en español lo más fluido y fiel es expresar la relación con «para el justo». Mantiene la referencia personal sin forzar una perífrasis posesiva pesada.
- source_word: מֵהֲמוֹן
  english_pob_choice: than the abundance of
  chosen_spanish: que la abundancia de
  alternatives_spanish:
  - que la riqueza de
  - que la multitud de
  - que el montón de
  lexicon: HALOT
  rationale: הָמוֹן puede denotar abundancia, multitud o gran masa. Aquí el contraste con מְעַט favorece «abundancia» como término más amplio y menos reductivo que «riqueza».
- source_word: רְשָׁעִים
  english_pob_choice: wicked people
  chosen_spanish: impíos
  alternatives_spanish:
  - los impíos
  - personas impías
  - malvados
  lexicon: HALOT
  rationale: El adjetivo funciona sustantivamente en plural. «Impíos» reproduce bien el valor colectivo y es un término bíblico claro en español.
- source_word: רַבִּים
  english_pob_choice: many
  chosen_spanish: muchos
  alternatives_spanish:
  - numerosos
  - grandes
  lexicon: HALOT
  rationale: El adjetivo plural modifica naturalmente a «impíos». «Muchos impíos» conserva la sintaxis hebrea y evita convertir la abundancia en adverbio.
translation_notes:
  revision_awareness: El borrador sigue la última revisión inglesa que prefirió «abundance» sobre «wealth» para no restringir el hebreo a riquezas monetarias. En español, «abundancia» conserva esa amplitud semántica y evita el estrechamiento a «riqueza» o «bienes».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino en todo el proyecto, pero este versículo no lo contiene.
  - «Justo» se usa como equivalente sustantivo de צַדִּיק, en coherencia con la terminología bíblica española del proyecto.
  - «Impíos» traduce el plural sustantivado רְשָׁעִים sin suavizar su carga moral.
  - La puntuación sigue el patrón proverbial comparativo del hebreo y del inglés auditado.
