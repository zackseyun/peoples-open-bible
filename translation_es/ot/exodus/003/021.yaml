translation:
  language: es
  text: Y daré a este pueblo favor[a] a los ojos de los egipcios; y cuando vayan[b], no irán con las manos vacías.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “a la vista de los egipcios”.'
    reason: lexical_alternative
  - marker: b
    text: 'O: “no saldrán vacíos”. El hebreo usa un modismo de partida que implica irse sin bienes ni provisiones.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָתַתִּי
  english_pob_choice: And I will give
  chosen_spanish: Y daré
  alternatives_spanish:
  - Y concederé
  - Y pondré
  lexicon: HALOT
  rationale: נתן suele significar “dar”. En español, “daré” conserva la sencillez y el valor verbal directo del hebreo, sin cargar el texto con una formulación más interpretativa.
- source_word: חֵן
  english_pob_choice: favor
  chosen_spanish: favor
  alternatives_spanish:
  - gracia
  - aceptación
  lexicon: HALOT
  rationale: חֵן aquí expresa buena voluntad o aceptación favorable de parte de los egipcios. “Favor” comunica mejor ese sentido social que “gracia”, que en español suele oírse más teológicamente cargado.
- source_word: הָעָם הַזֶּה
  english_pob_choice: this people
  chosen_spanish: este pueblo
  alternatives_spanish:
  - este pueblo de Israel
  - esta nación
  lexicon: HALOT
  rationale: El hebreo usa עָם en singular con demostrativo. “Este pueblo” preserva bien la forma colectiva y evita introducir una explicitación no presente en el texto.
- source_word: בְּעֵינֵי מִצְרָיִם
  english_pob_choice: in the sight of the Egyptians
  chosen_spanish: a los ojos de los egipcios
  alternatives_spanish:
  - en la vista de los egipcios
  - ante los egipcios
  lexicon: HALOT
  rationale: La expresión literal “en los ojos de” en español suena menos natural; “a los ojos de” conserva el mismo modismo de valoración o percepción. Sigue de cerca el hebreo sin perder idiomaticidad.
- source_word: וְהָיָה כִּי
  english_pob_choice: and when
  chosen_spanish: y cuando
  alternatives_spanish:
  - y sucederá que cuando
  - y será que cuando
  lexicon: HALOT
  rationale: La fórmula hebrea introduce una circunstancia futura. “Y cuando” transmite el valor discursivo de manera fluida en español, como en la decisión inglesa auditada.
- source_word: תֵלֵכוּן / תֵלְכוּ
  english_pob_choice: you go / you will not go
  chosen_spanish: salgan / saldrán
  alternatives_spanish:
  - partan / no partirán
  - vayan / no irán
  lexicon: HALOT
  rationale: Aunque הלך puede traducirse “ir”, el contexto habla de la salida de Egipto. “Salir” hace explícita esa referencia contextual sin abandonar el sentido básico del movimiento/departida.
- source_word: רֵיקָם
  english_pob_choice: empty-handed
  chosen_spanish: con las manos vacías
  alternatives_spanish:
  - vacíos
  - sin nada
  lexicon: HALOT
  rationale: רֵיקָם significa “vacío, sin nada, sin llevar nada”. “Con las manos vacías” es un equivalente español idiomático que comunica la misma idea de partir sin bienes o provisiones.
translation_notes:
  revision_awareness: La redacción sigue de cerca la lectura inglesa auditada y el hebreo, manteniendo la ambigüedad idiomática de בְּעֵינֵי y la fuerza de רֵיקָם sin sobrerrepresentarla. No se registraron revisiones aplicadas en el control previo, así que esta versión refleja el estado estable del versículo.
  spanish_consistency_notes:
  - Se mantuvo “Yahvé” como convención general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se prefirió “favor” frente a “gracia” para no introducir una connotación teológica ajena al contexto inmediato.
  - “Con las manos vacías” preserva el idiomatismo de la partida sin añadir contenido doctrinal.
