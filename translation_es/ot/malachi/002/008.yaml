translation:
  language: es
  text: Pero ustedes se han apartado del camino; han hecho tropezar a muchos en la ley[a]; han corrompido la alianza de Leví, dice Yahvé de los ejércitos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «instrucción»; el hebreo torá puede significar «ley» o «instrucción».
    reason: lexical_alternative
lexical_decisions:
- source_word: סַרְתֶּם
  english_pob_choice: have turned aside
  chosen_spanish: se han apartado
  alternatives_spanish:
  - se han desviado
  - han abandonado
  lexicon: HALOT
  rationale: סור expresa apartarse o desviarse de un camino. «Se han apartado» conserva la imagen de desviación y suena natural en español bíblico moderno.
- source_word: הַדֶּרֶךְ
  english_pob_choice: the way
  chosen_spanish: el camino
  alternatives_spanish:
  - la senda
  - el camino
  lexicon: HALOT
  rationale: «Camino» comunica bien la metáfora ética sin sonar forzado en español; mantiene la relación con el verbo de apartarse.
- source_word: הִכְשַׁלְתֶּם
  english_pob_choice: have caused many to stumble
  chosen_spanish: han hecho tropezar a muchos
  alternatives_spanish:
  - han causado que muchos tropiecen
  - han hecho caer a muchos
  lexicon: HALOT
  rationale: El hifil es causativo. «Hacer tropezar» reproduce de forma natural la idea de causar caída moral o espiritual.
- source_word: רַבִּים
  english_pob_choice: many
  chosen_spanish: a muchos
  alternatives_spanish:
  - a muchos
  - a multitudes
  lexicon: HALOT
  rationale: «Muchos» es fiel y directo; el acusativo con preposición en español se resuelve naturalmente con «a muchos».
- source_word: בַּתּוֹרָה
  english_pob_choice: in the law
  chosen_spanish: en la ley[a]
  alternatives_spanish:
  - en la ley
  - en la instrucción
  - por la ley
  lexicon: HALOT
  rationale: Se mantiene «ley» para conservar el sentido normativo/covenantal que el POB inglés prioriza aquí, pero se añade nota porque תּוֹרָה también puede significar «instrucción». La preposición ב se refleja mejor con «en» que con «por».
- source_word: שִׁחַתֶּם
  english_pob_choice: have corrupted
  chosen_spanish: han corrompido
  alternatives_spanish:
  - han arruinado
  - han pervertido
  - han dañado
  lexicon: HALOT
  rationale: El piel de שׁחת puede significar corromper o arruinar. «Han corrompido» conserva la gravedad moral y el paralelismo con el resto del verso.
- source_word: בְּרִית
  english_pob_choice: covenant
  chosen_spanish: pacto
  alternatives_spanish:
  - covenio
  - alianza
  - pacto
  lexicon: HALOT
  rationale: En español bíblico contemporáneo «pacto» es claro y fiel. «Covenant» se traduce por su equivalente natural, manteniendo el tono jurídico-relacional.
- source_word: הַלֵּוִי
  english_pob_choice: of Levi
  chosen_spanish: de Leví
  alternatives_spanish:
  - levítico
  - de Leví
  lexicon: HALOT
  rationale: 'El genitivo se conserva de forma directa: «de Leví». Evita sobreinterpretar la relación exacta y respeta la ambigüedad del hebreo.'
- source_word: יְהוָה צְבָאוֹת
  english_pob_choice: Yahweh of hosts
  chosen_spanish: Yahvé de los ejércitos
  alternatives_spanish:
  - Yahvé de los ejércitos
  - Yahvé de las huestes
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto para יְהוָה como «Yahvé». Para צְבָאוֹת, «de los ejércitos» es la forma más reconocible y fiel en español; conserva el título divino sin suavizarlo.
theological_decisions:
- issue: Rendering of תּוֹרָה in priestly context
  english_pob_reading: in the law, with footnote noting possible 'by instruction'
  chosen_spanish_reading: en la ley, con nota sobre la posible lectura 'instrucción'
  alternative_spanish_readings:
  - en la instrucción
  - por la instrucción
  - en la ley
  rationale: El contexto sacerdotal favorece el sentido normativo/covenantal de תּוֹרָה, pero el término sigue teniendo un rango semántico más amplio. La nota preserva esa tensión sin borrar la preferencia contextual.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, §5
- issue: Divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - Jehová
  - el SEÑOR
  rationale: 'Se aplica la norma del proyecto para el Tetragrama: «Yahvé». Esto preserva el nombre del pacto y evita la sustitución por una convención de ocultamiento.'
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del POB inglés, que ajustó la preposición de 'by the law' a 'in the law' para reflejar más de cerca el hebreo. La redacción española usa «en la ley» para conservar esa relación preposicional y mantiene la nota lexical sobre torá.
  spanish_consistency_notes:
  - Se usó «Yahvé» de forma consistente para el Tetragrama.
  - Se evitó «Cristo» porque no aparece en el texto fuente.
  - Se eligió «pacto» para ברית, conforme al uso bíblico-teológico común en español.
  - La nota [a] se ancla solo en «ley» y no introduce una segunda ambigüedad innecesaria.
