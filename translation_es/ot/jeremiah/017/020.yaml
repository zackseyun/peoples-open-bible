translation:
  language: es
  text: 'Y les dirás: «Oigan la palabra de Yahvé[a], ustedes, reyes de Judá, y todo Judá, y todos los habitantes de Jerusalén que entran por estas puertas».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «YHWH»; tradicionalmente se traduce «el SEÑOR».'
    reason: alternative_reading
lexical_decisions:
- source_word: וְאָמַרְתָּ
  english_pob_choice: And say
  chosen_spanish: Y dirás
  alternatives_spanish:
  - Y dirásles
  - Y entonces dirás
  lexicon: HALOT
  rationale: La forma profética de instrucción se expresa naturalmente en español con futuro exhortativo; se conserva la secuencia y el mandato implícito sin volverlo más pesado de lo necesario.
- source_word: אֲלֵיהֶם
  english_pob_choice: to them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  - a ellos/ellas
  lexicon: HALOT
  rationale: El complemento dativo está integrado en el verbo en español mediante el pronombre átono, que es más natural y mantiene el destinatario explícito.
- source_word: שִׁמְעוּ
  english_pob_choice: Hear
  chosen_spanish: Oigan
  alternatives_spanish:
  - Escuchen
  - Oíd
  lexicon: HALOT
  rationale: Imperativo plural dirigido a un grupo. «Oigan» conserva el valor de llamada profética y suena natural en español moderno formal.
- source_word: דְבַר יְהוָה
  english_pob_choice: the word of Yahweh
  chosen_spanish: la palabra de Yahvé
  alternatives_spanish:
  - el mensaje de Yahvé
  - la palabra del SEÑOR
  lexicon: HALOT
  rationale: «Palabra» preserva la fórmula profética y su peso teológico; «Yahvé» sigue el criterio del proyecto para el Tetragrámaton, en lugar de sustituirlo por un título.
- source_word: מַלְכֵי יְהוּדָה
  english_pob_choice: you kings of Judah
  chosen_spanish: ustedes, reyes de Judá
  alternatives_spanish:
  - reyes de Judá
  - ustedes, los reyes de Judá
  lexicon: HALOT
  rationale: El hebreo está en vocativo. En español, la coma y «ustedes» marcan de modo claro la segunda persona plural sin necesidad de un «oh» poco natural.
- source_word: וְכָל יְהוּדָה
  english_pob_choice: and all Judah
  chosen_spanish: y todo Judá
  alternatives_spanish:
  - y toda Judá
  - y todo el pueblo de Judá
  lexicon: HALOT
  rationale: Se conserva la concisión del hebreo. «Judá» funciona metonímicamente como el pueblo o la entidad colectiva, sin añadir explicaciones no requeridas por el texto.
- source_word: וְכֹל יֹשְׁבֵי יְרוּשָׁלִָם
  english_pob_choice: and all the inhabitants of Jerusalem
  chosen_spanish: y todos los habitantes de Jerusalén
  alternatives_spanish:
  - y todos los que habitan en Jerusalén
  - y todos los residentes de Jerusalén
  lexicon: HALOT
  rationale: «Habitantes» refleja con claridad el participio sustantivado y mantiene un registro bíblico natural en español.
- source_word: הַבָּאִים
  english_pob_choice: who enter
  chosen_spanish: que entran
  alternatives_spanish:
  - entrando
  - que pasan
  lexicon: HALOT
  rationale: El participio se integra como oración relativa en español, precisando quiénes son los habitantes mencionados.
- source_word: בַּשְּׁעָרִים הָאֵלֶּה
  english_pob_choice: through these gates
  chosen_spanish: por estas puertas
  alternatives_spanish:
  - por estas puertas de la ciudad
  - a través de estas puertas
  lexicon: HALOT
  rationale: «Por» expresa bien el tránsito a través de un acceso. «Puertas» es la equivalencia natural de שְׁעָרִים en contexto urbano; se evita «portones» por no ser necesario ni más fiel aquí.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: 'Se sigue el criterio del proyecto: el Tetragrámaton se translitera como «Yahvé» para preservar el nombre personal del pacto y no ocultarlo bajo un sustituto litúrgico.'
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: La revisión inglesa reciente solo afinó el vocativo («you kings of Judah») sin cambiar el sentido. La versión española adopta un vocativo natural y explícito con «ustedes, reyes de Judá», manteniendo la directividad y el resto del contenido conforme al texto hebreo y al audit trail.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה, conforme al estándar del proyecto.
  - «Judá» se conserva como nombre colectivo metonímico, sin añadir «pueblo» en el texto principal.
  - «Puertas» traduce שְׁעָרִים de manera natural en contexto urbano.
  - El vocativo plural queda marcado por la coma y por «ustedes» para claridad en español.
