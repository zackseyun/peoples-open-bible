review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la sintaxis hebrea básica: «Seis días» para שֵׁשֶׁת יָמִים, fuerza directiva en «trabajarás» para תַּעֲבֹד, y coordinación adecuada en «y harás» para וְעָשִׂיתָ. También conserva la nota alternativa temporal. Sin embargo, «tu obra» no representa de la manera más fiel y clara מְלַאכְתֶּךָ en este contexto sabático, donde el sentido es trabajo/tarea/labor, no «obra» en un sentido más elevado o ambiguo.'
  spanish_quality_summary: El texto es fluido y legible, pero «toda tu obra» suena menos natural y más potencialmente equívoco en español bíblico contemporáneo que «todo tu trabajo». La revisión mejora claridad, naturalidad y congruencia con el campo semántico del mandamiento sabático. La nota al pie también conviene normalizar quitando comillas innecesarias alrededor de toda la nota.
  glossary_alignment: No hay términos del glosario mayor directamente implicados. La principal cuestión léxica es מְלָאכָה, que en este pasaje debe alinearse con «trabajo» más que con «obra» para preservar el sentido ocupacional y el vínculo con el descanso sabático. «Trabajarás» sigue bien la decisión inglesa «you shall labor» sin exigir el menos natural «laborarás».
  issues:
  - severity: medium
    issue: «tu obra» para מְלַאכְתֶּךָ
    rationale: Aunque «obra» puede ser semánticamente amplio, en Éxodo 20:9 el referente es el trabajo/tarea que se realiza en contraste con el descanso sabático. «Obra» en español puede sonar literario, artesanal o teológico, y no comunica tan directamente la actividad laboral ordinaria.
  - severity: low
    issue: Formulación de la nota al pie
    rationale: 'La nota «''O: «Durante seis días trabajarás».''» contiene puntuación y comillas recargadas. Conviene simplificarla a una formulación editorial limpia y consistente.'
  - severity: low
    issue: Alternativa española inválida en decisiones léxicas
    rationale: Aparece «hacerás» como alternativa para וְעָשִׂיתָ, forma inexistente en español. No afecta el texto principal, pero muestra necesidad de corrección editorial en la justificación.
  revised_spanish_text: Seis días trabajarás[a] y harás todo tu trabajo.
  revised_footnotes:
  - marker: a
    text: 'O: «Durante seis días trabajarás».'
    reason: lexical_alternative
