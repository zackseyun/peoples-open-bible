review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el paralelismo del griego: mandato de recordar, contraste entre escasez y abundancia, y el segundo par pobreza/necesidad frente a riqueza. Sin embargo, καιρὸν λιμοῦ se entiende mejor como «tiempo de hambruna» o «tiempo de hambre intensa/famine» que simplemente «hambre», conforme al propio rastro léxico inglés que distingue famine de mere hunger.'
  spanish_quality_summary: El español es claro y digno, pero «tiempo de hambre» suena algo más débil y menos específico de lo que exige λιμός. «Tiempo de hambruna» mejora la precisión sin perder naturalidad. El resto del versículo es fluido y bien equilibrado. La nota al pie también debe ajustarse para conservar la alternativa documentada del inglés entre «hambruna» y «abundancia/plenitud».
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. La decisión principal es léxica: preferir «hambruna» sobre «hambre» para λιμός, manteniendo «abundancia», «pobreza», «necesidad» y «riqueza».'
  issues:
  - severity: medium
    issue: «hambre» debilita el sentido de λιμός
    rationale: El griego λιμός normalmente denota hambre por escasez/famine, no solo la sensación general de hambre. El inglés POB lo fijó como «famine», con alternativa «season of hunger». En español, «hambruna» preserva mejor la fuerza léxica principal.
  - severity: low
    issue: La nota al pie actual repite el mismo giro del texto sin ofrecer una alternativa real
    rationale: 'La nota dice «O: el tiempo de hambre ... el tiempo de abundancia», que coincide sustancialmente con el texto base. Conviene reflejar la alternativa documentada: «temporada de hambre ... temporada de abundancia» o explicar la oposición entre tiempos señalados de escasez y plenitud.'
  revised_spanish_text: Recuerda el tiempo de hambruna en el tiempo de abundancia[a], y la pobreza y la necesidad en los días de riqueza.
  revised_footnotes:
  - marker: a
    text: 'O: «temporada de hambre ... temporada de abundancia». El griego contrasta tiempos señalados de escasez y plenitud.'
    reason: lexical_alternative
