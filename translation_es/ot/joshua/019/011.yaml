  glossary_alignment: No hay términos teológicos sensibles en este versículo. La revisión propuesta respeta la política de transliterar topónimos y de conservar matices léxicos importantes del hebreo. Se alinea mejor con la decisión inglesa para נחל al usar «wadi» en vez de «valle».
