  rationale: 'Se conservó la traducción principal porque es fiel y natural. Solo se corrigió el aparato de nota: se movió el marcador a la frase final que realmente comenta y se reemplazó la alternativa defectuosa por una paráfrasis idiomática española que corresponde al sentido del inglés auditado («to your heart’s desire») sin alterar la literalidad señalada en la nota.'
