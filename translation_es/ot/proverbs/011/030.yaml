translation:
  language: es
  text: El fruto del justo es un árbol de vida[a], y el que gana almas es sabio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O bien: «el que toma personas/vidas es sabio». El hebreo usa literalmente «toma» con «almas», un modismo que puede significar ganar personas o influir sobre ellas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: פְּרִי
  english_pob_choice: fruit
  chosen_spanish: fruto
  alternatives_spanish:
  - producto
  - resultado
  lexicon: HALOT
  rationale: '"Fruto" conserva la metáfora agrícola y la resonancia sapiencial del hebreo, de modo natural en español. "Producto" o "resultado" serían demasiado explicativos y debilitarían la imagen.'
- source_word: צַדִּיק
  english_pob_choice: the righteous
  chosen_spanish: el justo
  alternatives_spanish:
  - el righteous
  - una persona justa
  - los justos
  lexicon: HALOT
  rationale: El adjetivo funciona sustantivado. En español, "el justo" mantiene la fuerza genérica y representativa del hebreo sin convertirlo en una paráfrasis plural ni en una frase más larga.
- source_word: עֵץ חַיִּים
  english_pob_choice: a tree of life
  chosen_spanish: árbol de vida
  alternatives_spanish:
  - árbol de vida
  - árbol vivificante
  - el árbol de vida
  lexicon: HALOT
  rationale: '"Árbol de vida" preserva la expresión sapiencial fija y su eco intertextual. Se omite el artículo porque el hebreo no lo exige de manera inequívoca y el español fluye mejor como expresión proverbial.'
- source_word: וְ/לֹקֵחַ
  english_pob_choice: he who wins
  chosen_spanish: el que gana
  alternatives_spanish:
  - el que toma
  - el que captura
  - el que conquista
  lexicon: HALOT
  rationale: La forma verbal literalmente es "tomar", pero en esta construcción con "almas" el sentido idiomático apunta a ganar/influir sobre personas. "Gana" conserva el valor activo sin imponer un lenguaje demasiado técnico o agresivo.
- source_word: נְפָשׂוֹת
  english_pob_choice: souls
  chosen_spanish: almas
  alternatives_spanish:
  - vidas
  - personas
  - gentes
  lexicon: HALOT
  rationale: '"Almas" mantiene la correspondencia tradicional y la carga metafórica del hebreo. Aunque el sentido incluye personas o vidas, en español la palabra sigue siendo comprensible y conserva la tensión semántica documentada por el texto fuente.'
- source_word: חָכָם
  english_pob_choice: is wise
  chosen_spanish: es sabio
  alternatives_spanish:
  - es prudente
  - es un sabio
  - actúa con sabiduría
  lexicon: HALOT
  rationale: '"Es sabio" reproduce con naturalidad el predicado hebreo. "Prudente" o explicaciones ampliadas suavizarían la valoración sapiencial y alterarían el paralelismo breve del proverbio.'
theological_decisions:
- issue: Sentido de "gana almas" en contexto sapiencial
  english_pob_reading: Idiomatic expression for gaining or influencing people, not an explicit statement about evangelistic conversion.
  chosen_spanish_reading: Se conserva "gana almas" como expresión idiomática de influir y atraer personas con sabiduría, no como una afirmación técnica sobre conversión evangelística.
  alternative_spanish_readings:
  - el que toma vidas
  - el que salva almas
  - el que conquista personas
  rationale: El hebreo no obliga a leer el dicho como terminología cristiana posterior. La traducción mantiene la formulación tradicional suficientemente cercana al original, y la elección de "gana" ayuda a evitar una lectura demasiado literal o violenta.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el estado de alta concordancia sugiere que no hacen falta ajustes sustanciales. Se ha mantenido la tensión idiomática de לֹקֵחַ נְפָשׂוֹת sin forzar una lectura evangelística posterior.
  spanish_consistency_notes:
  - Se ha conservado la imagen paralela entre "fruto" y "árbol de vida" para respetar la forma sapiencial del proverbio.
  - '"Almas" se mantiene por coherencia con la tradición de traducción y con el alcance semántico amplio de נֶפֶשׁ, sin aclararlo en el texto principal.'
  - La puntuación y el orden siguen el paralelismo hebreo de dos colonos breves.
