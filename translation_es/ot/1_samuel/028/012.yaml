translation:
  language: es
  text: 'Cuando la mujer vio a Samuel[a], gritó a gran voz, y la mujer dijo a Saúl: «¿Por qué me has engañado? ¡Tú eres Saúl!»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «lo que parecía ser Samuel». El hebreo simplemente dice «Samuel», sin explicar la naturaleza de la aparición.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַתֵּרֶא
  english_pob_choice: saw
  chosen_spanish: vio
  alternatives_spanish:
  - miró
  - percibió
  lexicon: HALOT
  rationale: El verbo ראה en esta forma narrativa se traduce de manera natural por «vio». «Percibió» interpretaría de más, y «miró» debilita la acción de ver que presenta el hebreo.
- source_word: הָאִשָּׁה
  english_pob_choice: the woman
  chosen_spanish: la mujer
  alternatives_spanish:
  - la médium
  - la adivina
  lexicon: HALOT
  rationale: El hebreo dice simplemente «la mujer». Aunque el contexto la identifica por su función, aquí se conserva el sustantivo común y no un título explicativo.
- source_word: אֶת שְׁמוּאֵל
  english_pob_choice: Samuel
  chosen_spanish: a Samuel
  alternatives_spanish:
  - Samuel
  - al parecer, Samuel
  lexicon: HALOT
  rationale: El texto hebreo presenta directamente a Samuel como lo visto por la mujer. En español se mantiene esa referencia directa, con la preposición de objeto directo exigida por la gramática.
- source_word: וַתִּזְעַק
  english_pob_choice: cried out
  chosen_spanish: gritó
  alternatives_spanish:
  - clamó
  - exclamó
  lexicon: HALOT
  rationale: זעק expresa un grito fuerte. «Gritó» comunica bien la intensidad en español moderno sin exagerar ni suavizar el impacto.
- source_word: בְּקוֹל גָּדוֹל
  english_pob_choice: with a loud voice
  chosen_spanish: con gran voz
  alternatives_spanish:
  - con voz fuerte
  - en voz muy alta
  lexicon: HALOT
  rationale: «Con gran voz» sigue de cerca la construcción hebrea y preserva el énfasis solemne del original. «En voz muy alta» sería más idiomático, pero menos cercano al patrón fuente.
- source_word: וַתֹּאמֶר ... לֵאמֹר
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - habló
  - dijo, diciendo
  lexicon: HALOT
  rationale: En español no hace falta reproducir el infinitivo de «decir»; «dijo» comunica con claridad la introducción del discurso sin redundancia.
- source_word: לָמָּה
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿A qué?
  - ¿Con qué motivo?
  lexicon: HALOT
  rationale: Interrogativo estándar y natural para לָמָּה. Mantiene el valor causal/pragmático de la pregunta.
- source_word: רִמִּיתָנִי
  english_pob_choice: have you deceived me
  chosen_spanish: me has engañado
  alternatives_spanish:
  - me has traicionado
  - me has trampeado
  lexicon: HALOT
  rationale: El piʿel de רמה expresa engaño o fraude. «Engañado» es la equivalencia más amplia y clara en español, conservando la fuerza de la acusación sin cargar el sentido hacia «traicionado».
- source_word: וְאַתָּה שָׁאוּל
  english_pob_choice: You are Saul!
  chosen_spanish: ¡Tú eres Saúl!
  alternatives_spanish:
  - y tú eres Saúl
  - ¡Tú mismo eres Saúl!
  lexicon: HALOT
  rationale: El pronombre es enfático. En español se refleja mejor con la ordenación enfática y el signo de exclamación. Se omite «y» porque resultaría poco natural como arranque de la revelación.
theological_decisions:
- issue: Identidad de Samuel visto por la mujer
  english_pob_reading: Retain the text's direct wording 'Samuel' without interpretive qualification
  chosen_spanish_reading: Conservar «Samuel» sin calificarlo en el texto principal
  alternative_spanish_readings:
  - la aparición de Samuel
  - lo que parecía ser Samuel
  - el espíritu de Samuel
  rationale: El hebreo afirma que la mujer vio a Samuel, sin explicar la naturaleza de la aparición. El español mantiene esa formulación directa para no resolver una tensión interpretativa que el versículo mismo deja abierta.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica en lugar de resolverla fuera del texto.'
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios necesarios; por tanto, este borrador sigue la lectura auditada estable del inglés POB y conserva la tensión interpretativa documentada respecto de Samuel.
  spanish_consistency_notes:
  - Se mantiene «Samuel» sin añadir glosas al texto principal.
  - Se usa «la mujer» en lugar de un título funcional para respetar la forma hebrea.
  - «Con gran voz» conserva el tono elevado del hebreo y evita un registro demasiado coloquial.
  - Se evita «SEÑOR» y otras sustituciones irrelevantes, ya que el versículo no contiene el nombre divino.
