translation:
  language: es
  text: 'Entonces Moisés y los sacerdotes levitas[a] hablaron a todo Israel, diciendo: «Guarda silencio[b] y escucha, Israel: hoy has llegado a ser un pueblo para Yahvé tu Dios[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los sacerdotes, los levitas». La expresión hebrea puede entenderse como un grupo sacerdotal identificado como levítico.
    reason: lexical_alternative
  - marker: b
    text: O «Mantente atento y escucha». El imperativo hebreo puede enfatizar tanto el silencio como la atención concentrada.
    reason: lexical_alternative
  - marker: c
    text: O «hoy has llegado a ser un pueblo perteneciente a Yahvé tu Dios». La construcción hebrea puede enfatizar la pertenencia o consagración a Yahvé.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְדַבֵּר
  english_pob_choice: Then ... spoke
  chosen_spanish: Entonces ... hablaron
  alternatives_spanish:
  - Y ... habló
  - Luego ... dijeron
  lexicon: HALOT
  rationale: El waw consecutivo avanza la narración; en español, «Entonces» conserva ese movimiento temporal sin sonar arcaico. «Hablaron» reproduce el acto de decir de forma natural en plural, conforme al sujeto compuesto.
- source_word: הַכֹּהֲנִים הַלְוִיִּם
  english_pob_choice: the Levitical priests
  chosen_spanish: los sacerdotes levitas
  alternatives_spanish:
  - los sacerdotes, los levitas
  - los sacerdotes que eran levitas
  lexicon: HALOT
  rationale: La expresión hebrea identifica a un grupo sacerdotal caracterizado como levítico. «Sacerdotes levitas» mantiene la cercanía de los dos sustantivos y su valor identificador sin sonar forzado en español.
- source_word: כָּל יִשְׂרָאֵל
  english_pob_choice: all Israel
  chosen_spanish: todo Israel
  alternatives_spanish:
  - la totalidad de Israel
  - todo el Israel
  lexicon: HALOT
  rationale: «Todo Israel» es la forma natural en español para el colectivo nacional sin perder el sentido inclusivo del original.
- source_word: הַסְכֵּת
  english_pob_choice: Be silent
  chosen_spanish: Calla
  alternatives_spanish:
  - Guarda silencio
  - Estate atento
  lexicon: HALOT
  rationale: El imperativo puede implicar silencio o atención concentrada. El texto inglés preservó la fuerza concreta de silencio; en español, «Calla» conserva esa fuerza directa y breve, y la nota permite la alternativa de atención.
- source_word: וּשְׁמַע
  english_pob_choice: and listen
  chosen_spanish: y escucha
  alternatives_spanish:
  - y oye
  lexicon: HALOT
  rationale: «Escucha» comunica mejor en español moderno la obediencia atenta exigida por שמע que el más literal «oye».
- source_word: הַיּוֹם הַזֶּה
  english_pob_choice: today
  chosen_spanish: hoy
  alternatives_spanish:
  - en este día
  - este día
  lexicon: HALOT
  rationale: «Hoy» es el equivalente natural y directo de la expresión deíctica hebrea en español contemporáneo.
- source_word: נִהְיֵיתָ לְעָם
  english_pob_choice: you have become a people
  chosen_spanish: has llegado a ser un pueblo
  alternatives_spanish:
  - te has convertido en un pueblo
  - has venido a ser un pueblo
  lexicon: HALOT
  rationale: El hebreo presenta a Israel como sujeto corporativo en segunda persona singular. «Has llegado a ser» mantiene el valor de estado adquirido sin añadir matices que el texto no exige. «Un pueblo» preserva לְעָם sin convertirlo en una nación política ni en «el pueblo» definido.
- source_word: לַיהוָה
  english_pob_choice: for Yahweh
  chosen_spanish: para Yahvé
  alternatives_spanish:
  - de Yahvé
  - perteneciente a Yahvé
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto para יהוה: «Yahvé». La preposición ל en este contexto expresa relación de pertenencia o consagración; «para» es breve y natural, y la nota deja abierta la posibilidad de «perteneciente a».'
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu Dios personal
  - tu Dios
  lexicon: HALOT
  rationale: La forma con sufijo singular se conserva con «tu», que respeta el discurso corporativo en segunda persona singular dirigido a Israel.
theological_decisions:
- issue: Tratamiento del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton de manera directa; el proyecto español debe reflejar el nombre divino sin máscara litúrgica. «Yahvé» sigue el estándar editorial indicado y mantiene la transparencia textual.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה YHWH → Yahvé'
- issue: Sujeto corporativo en segunda persona singular
  english_pob_reading: you have become a people
  chosen_spanish_reading: has llegado a ser un pueblo
  alternative_spanish_readings:
  - habéis llegado a ser un pueblo
  - Israel ha llegado a ser un pueblo
  rationale: El hebreo dirige la frase a Israel con formas singulares. Mantener «has» conserva el tratamiento corporativo y evita nivelar el discurso a plural o a tercera persona.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #4 and #5'
- issue: Valor de לַיהוָה
  english_pob_reading: for Yahweh
  chosen_spanish_reading: para Yahvé
  alternative_spanish_readings:
  - de Yahvé
  - perteneciente a Yahvé
  rationale: La preposición hebrea puede señalar pertenencia covenantal. «Para Yahvé» es suficientemente natural en español y no borra la relación de dedicación; la alternativa semántica queda preservada en la nota.
  doctrine_reference: DOCTRINE.md lexical handling of relational ל
translation_notes:
  revision_awareness: Coincide con la última pasada revisada sin cambios sustanciales; se mantiene el sentido del audit trail inglés y la lectura de la pronunciación del nombre divino como Yahvé en español.
  spanish_consistency_notes:
  - Se conserva el nombre divino como «Yahvé», conforme al estándar del proyecto.
  - 'Se mantiene el tratamiento corporativo en segunda persona singular: «has llegado».'
  - «Sacerdotes levitas» traduce la apposición hebrea con una fórmula española natural y auditable.
  - «Calla y escucha» reproduce la tensión entre silencio y atención sin diluirla.
