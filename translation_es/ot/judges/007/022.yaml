translation:
  language: es
  text: Cuando se tocaron las trescientas trompetas[a], Yahvé puso la espada de cada hombre contra su compañero y contra todo el campamento[b], y el campamento huyó hasta Bet-sitá, hacia Zererá, hasta el borde de Abel-mehola[d][c], junto a Tabat.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se tocaron los trescientos cuernos de carnero». El hebreo שׁוֹפָרוֹת se refiere a trompetas de cuerno, a menudo hechas de cuerno de carnero.
    reason: lexical_alternative
  - marker: b
    text: O «por todo el campamento». El hebreo puede destacar tanto que cada hombre volvió su espada contra los otros como que el pánico se extendió por todo el campamento.
    reason: alternative_reading
  - marker: c
    text: Bet-sitá, Zererá, Abel-mehola y Tabat son nombres de lugar en la ruta del ejército en fuga.
    reason: cultural_note
  - marker: d
    text: O «la orilla» o «el límite» de Abel-mehola.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַֽ/יִּתְקְעוּ ... הַ/שּׁוֹפָרוֹת
  english_pob_choice: the three hundred trumpets were blown
  chosen_spanish: se tocaron los trescientos cuernos de carnero
  alternatives_spanish:
  - sonaron los trescientos cuernos de carnero
  - se tocaron los trescientos trompetas
  - se tocaron los trescientos shofares
  lexicon: HALOT
  rationale: שׁוֹפָר puede designar un cuerno-trumpeta, a menudo de carnero. En español, «cuernos de carnero» comunica mejor ese matiz que «trompetas», y conserva la imagen del instrumento sin mecanizar el texto. La pasiva refleja mantiene el foco en el hecho narrado, como en el audit trail inglés.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El Tetragrámaton se vierte como «Yahvé» según el estándar del proyecto. Esto preserva el nombre propio divino en lugar de sustituirlo por un título, siguiendo el criterio auditado del POB inglés.
- source_word: וַיָּשֶׂם ... אֵת חֶרֶב אִישׁ בְּרֵעֵהוּ
  english_pob_choice: set every man's sword against his companion
  chosen_spanish: puso la espada de cada hombre contra su compañero
  alternatives_spanish:
  - volvió la espada de cada hombre contra su compañero
  - hizo que la espada de cada hombre se volviera contra su compañero
  lexicon: HALOT
  rationale: El hebreo usa la imagen de «poner» la espada contra el compañero. «Puso la espada de cada hombre contra su compañero» conserva esa metáfora y a la vez suena natural en español.
- source_word: וּ/בְ/כָל הַֽ/מַּחֲנֶה
  english_pob_choice: and against the whole camp
  chosen_spanish: y contra todo el campamento
  alternatives_spanish:
  - y en todo el campamento
  - y por todo el campamento
  lexicon: HALOT
  rationale: El hebreo puede enfatizar tanto la hostilidad contra el conjunto como la propagación del pánico. «Contra todo el campamento» conserva la fuerza adversativa de la preposición en contexto, como en la lectura principal del inglés.
- source_word: וַ/יָּ֨נָס הַֽ/מַּחֲנֶ֜ה
  english_pob_choice: and the camp fled
  chosen_spanish: y el campamento huyó
  alternatives_spanish:
  - y el ejército huyó
  - y la hueste huyó
  lexicon: HALOT
  rationale: מַחֲנֶה puede significar campamento o ejército. «Campamento» mantiene el término hebreo y encaja con la escena narrada, sin perder el sentido colectivo del grupo que huye.
- source_word: עַד בֵּית הַשִּׁטָּה
  english_pob_choice: as far as Beth-shittah
  chosen_spanish: hasta Bet-sitá
  alternatives_spanish:
  - hasta Bet-shittá
  lexicon: HALOT
  rationale: Es un topónimo, por lo que se translitera. «Bet-sitá» adapta la forma al español y conserva la identificación geográfica.
- source_word: צְרֵרָתָה
  english_pob_choice: toward Zererah
  chosen_spanish: hacia Zererá
  alternatives_spanish:
  - a Zererá
  - hacia Zererah
  lexicon: HALOT
  rationale: El final direccional sugiere movimiento hacia el lugar. «Hacia Zererá» expresa mejor esa orientación que un simple «a».
- source_word: עַד שְׂפַת אָבֵל מְחוֹלָה
  english_pob_choice: as far as the edge of Abel-meholah
  chosen_spanish: hasta el borde de Abel-mehola
  alternatives_spanish:
  - hasta la orilla de Abel-mehola
  - hasta el límite de Abel-mehola
  lexicon: HALOT
  rationale: שָׂפָה literalmente es «borde/labio/orilla». «Borde» es suficientemente amplio y no fuerza una referencia a ribera o agua que el texto no explicita.
- source_word: עַל טַבָּת
  english_pob_choice: by Tabbath
  chosen_spanish: junto a Tabat
  alternatives_spanish:
  - cerca de Tabat
  - por Tabat
  lexicon: HALOT
  rationale: La preposición aquí apunta a proximidad o referencia geográfica. «Junto a» es natural en español y mantiene la ambigüedad útil del hebreo.
- source_word: אִישׁ
  english_pob_choice: every man's
  chosen_spanish: cada hombre
  alternatives_spanish:
  - cada uno
  - cada guerrero
  lexicon: HALOT
  rationale: El distributivo hebreo exige resaltar a cada individuo. «Cada hombre» preserva el valor representativo masculino singular sin introducir una paráfrasis más amplia.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se sigue la decisión doctrinal del POB de no enmascarar el nombre divino. «Yahvé» es la forma habitual del proyecto en español y mantiene la relación con el Tetragrámaton del hebreo.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: Se revisó el paquete fuente, la traducción inglesa POB y sus notas. No hubo revisiones aplicadas en el último pase; la versión inglesa quedó con alta concordancia, por lo que la redacción española sigue de cerca las decisiones auditadas, especialmente en el nombre divino, el valor distributivo de אִישׁ, y la ambigüedad de la frase final geográfica.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה en coherencia con la terminología del proyecto.
  - Se usa «campamento» para מַחֲנֶה, conservando el término hebreo y el sentido colectivo.
  - 'Se transliteran los topónimos de modo españolizado pero reconocible: Bet-sitá, Zererá, Abel-mehola y Tabat.'
  - Se conserva la imagen de la espada puesta «contra» el compañero, sin suavizarla a una formulación menos directa.
  - Las notas al pie distinguen entre alternativa lexical e incertidumbre geográfica, sin mezclar ambos niveles.
