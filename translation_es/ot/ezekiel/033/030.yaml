    rationale: La evidencia auditada conserva una nota sobre «that comes out from Yahweh / comes from Yahweh», no sobre «saying». La nota debe acompañar la frase «que sale/procede de Yahvé» o eliminarse; la actual desvía la atención del punto semántico real.
  - severity: low
