translation:
  language: es
  text: Y ahora[a], ¿por qué habríamos de morir? Porque este gran fuego nos consumirá. Si seguimos oyendo la voz de Yahvé nuestro Dios por más tiempo, moriremos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «YHWH»; el proyecto español lo vierte como «Yahvé» para mantener el nombre divino explícito. Alternativa: «Yahweh».'
    reason: alternative_reading
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: And now
  chosen_spanish: Y ahora
  alternatives_spanish:
  - Ahora
  - Y entonces
  lexicon: HALOT
  rationale: El hebreo funciona como marcador discursivo que enlaza con lo anterior y presenta la conclusión inmediata. En español, «Y ahora» conserva ese valor conectivo y temporal con naturalidad.
- source_word: לָמָּה
  english_pob_choice: why
  chosen_spanish: por qué
  alternatives_spanish:
  - para qué
  - cuál es la razón de que
  lexicon: HALOT
  rationale: Interrogativo directo de causa o motivo; «por qué» es la equivalencia más natural y fiel en español.
- source_word: נָמוּת
  english_pob_choice: should we die
  chosen_spanish: habríamos de morir
  alternatives_spanish:
  - moriremos
  - debemos morir
  lexicon: HALOT
  rationale: La forma imperfecta en una pregunta retórica expresa el desenlace temido o considerado. «Habríamos de morir» mantiene mejor ese matiz deliberativo que un futuro simple.
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la razón de la pregunta anterior. «Porque» reproduce con claridad la fuerza explicativa causal del hebreo en español.
- source_word: תֹאכְלֵנוּ
  english_pob_choice: will consume us
  chosen_spanish: nos consumirá
  alternatives_spanish:
  - nos devorará
  - nos comerá
  lexicon: HALOT
  rationale: Con fuego como sujeto, «consumirá» conserva la imagen de destrucción sin sonar coloquial ni forzado. El orden español requiere anteponer el complemento directo clítico.
- source_word: הָאֵשׁ הַגְּדֹלָה הַזֹּאת
  english_pob_choice: this great fire
  chosen_spanish: este gran fuego
  alternatives_spanish:
  - este gran incendio
  - esta gran llama
  lexicon: HALOT
  rationale: Se conserva la secuencia de demostrativo, adjetivo y sustantivo en un español natural. «Fuego» es la equivalencia directa y mantiene la imagen del texto.
- source_word: אִם יֹסְפִים אֲנַחְנוּ
  english_pob_choice: If we continue
  chosen_spanish: Si seguimos
  alternatives_spanish:
  - Si continuamos
  - Si volvemos a
  lexicon: HALOT
  rationale: El verbo יסף con infinitivo suele expresar continuidad o repetición. «Si seguimos» transmite ese valor idiomático con fluidez en español.
- source_word: לִשְׁמֹעַ
  english_pob_choice: to hear
  chosen_spanish: oyendo
  alternatives_spanish:
  - escuchando
  - para oír
  lexicon: HALOT
  rationale: En este contexto, el infinitivo complementario se expresa de manera más natural en español con un gerundio después de «seguir». «Oír» respeta mejor el sentido básico de שׁמע aquí que «escuchar».
- source_word: קוֹל
  english_pob_choice: the voice
  chosen_spanish: la voz
  alternatives_spanish:
  - el sonido
  lexicon: HALOT
  rationale: En relación con la palabra divina, «voz» es la opción específica y adecuada; «sonido» sería demasiado general.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: El texto hebreo usa el Tetragrammaton directamente. En la pauta española del proyecto, se vierte como «Yahvé» para preservar el nombre divino sin sustituirlo por un título.
- source_word: אֱלֹהֵינוּ
  english_pob_choice: our God
  chosen_spanish: nuestro Dios
  alternatives_spanish:
  - nuestro Dios y Señor
  lexicon: HALOT
  rationale: Construcción posesiva sencilla y covenantal; «nuestro Dios» mantiene la relación de pertenencia y alianza del hebreo.
- source_word: עוֹד
  english_pob_choice: any longer
  chosen_spanish: todavía
  alternatives_spanish:
  - aún
  - más
  lexicon: HALOT
  rationale: Aquí expresa prolongación futura dentro de la condición temida. «Todavía» conserva bien esa idea en español dentro de la oración condicional.
- source_word: וָמָתְנוּ
  english_pob_choice: we will die
  chosen_spanish: moriremos
  alternatives_spanish:
  - entonces moriremos
  - y moriremos
  lexicon: HALOT
  rationale: La forma consecutiva/resultativa comunica el desenlace esperado. En español, el futuro simple expresa naturalmente esa consecuencia.
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: El versículo nombra directamente el Tetragrama. En la práctica española del proyecto, se preserva el nombre propio divino como «Yahvé» para no ocultarlo tras una sustitución titular y para mantener la transparencia del texto fuente.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: El contexto auditado en inglés no muestra cambios aplicados en la última revisión y presenta alto acuerdo entre revisores, por lo que esta versión española sigue de cerca las decisiones léxicas y teológicas ya estabilizadas, adaptándolas a la convención española del proyecto (especialmente el nombre divino y la sintaxis natural de la condicional retórica).
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como equivalente español del Tetragrama, conforme a la directriz del proyecto para el texto principal.
  - Se eligió un registro formal y claro, evitando calcos innecesarios como «deberíamos morir» si debilitaban el matiz retórico del hebreo.
  - «Oír» se conservó en lugar de «escuchar» para respetar el valor básico de שׁמע en este contexto de recepción de la voz divina.
  - La estructura general conserva el paralelismo causal y la conclusión temida del hebreo sin añadir explicación interpretativa.
