translation:
  language: es
  text: Y le dio sus mandamientos[a], y le concedió autoridad en estatuto y en juicio, para enseñar a Jacob sus testimonios y alumbrar a Israel con su ley.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo conservado de este versículo es más breve: «Le dio sus mandamientos, y le concedió autoridad en estatuto y en juicio». Las cláusulas «para enseñar a Jacob sus testimonios» y «alumbrar a Israel con su ley» están apoyadas por el testigo griego y se incluyen aquí porque la línea hebrea parece abreviada.'
    reason: textual_variant
lexical_decisions:
- source_word: ויתן לו מצותיו / ἔδωκεν αὐτῷ ἐν ἐντολαῖς αὐτοῦ
  english_pob_choice: And he gave him his commandments
  chosen_spanish: Y le dio sus mandamientos
  alternatives_spanish:
  - Y le entregó sus mandamientos
  - Y le confió sus mandamientos
  lexicon: HALOT; BDAG
  rationale: ‘Mandamientos’ conserva el peso legal y pactal del hebreo מצותיו y del griego ἐντολαῖς. ‘Dar’ sigue de cerca ויתן / ἔδωκεν, mientras que ‘confiar’ o ‘entregar’ introducirían matices no exigidos por el texto.
- source_word: וימשילהו / ἐξουσίαν
  english_pob_choice: and granted him authority
  chosen_spanish: y le concedió autoridad
  alternatives_spanish:
  - y le dio dominio
  - y le hizo gobernante
  lexicon: HALOT; BDAG
  rationale: ‘Autoridad’ expresa bien la idea de jurisdicción delegada sin convertir la comisión sacerdotal en realeza. ‘Concedió’ refleja la concesión de autoridad mejor que una formulación más dura como ‘dio dominio’.
- source_word: בחוק ומשפט / ἐν διαθήκαις κριμάτων
  english_pob_choice: in statute and judgment
  chosen_spanish: en estatuto y juicio
  alternatives_spanish:
  - en ley y justicia
  - en decreto y juicio
  lexicon: HALOT; BDAG
  rationale: ‘Estatuto y juicio’ mantiene la textura jurídico-covenantal del hebreo y la correspondencia con la pareja griega de lenguaje legal. ‘Ley y justicia’ sería más explicativo, pero diluiría la forma más marcada del original.
- source_word: διδάξαι τὸν Ἰακὼβ τὰ μαρτύρια
  english_pob_choice: to teach Jacob his testimonies
  chosen_spanish: para enseñar a Jacob sus testimonios
  alternatives_spanish:
  - para instruir a Jacob en sus testimonios
  - para enseñar a Jacob los testimonios
  lexicon: BDAG
  rationale: ‘Testimonios’ es la opción tradicional y técnicamente adecuada para μαρτύρια en contexto pactal. Mantengo ‘sus’ para reflejar la referencia a los testimonios de Dios en el contexto inmediato.
- source_word: καὶ ἐν νόμῳ αὐτοῦ φωτῖσαι Ἰσραήλ
  english_pob_choice: and to enlighten Israel with his law
  chosen_spanish: y alumbrar a Israel con su ley
  alternatives_spanish:
  - y dar luz a Israel con su ley
  - y iluminar a Israel con su ley
  lexicon: BDAG
  rationale: ‘Alumbrar’ conserva la metáfora de φωτῖσαι con naturalidad en español bíblico contemporáneo y evita un tecnicismo innecesario. ‘Con su ley’ expresa el instrumento del alumbramiento como en el inglés auditado.
theological_decisions:
- issue: Incluir las cláusulas griegas de propósito que amplían el hebreo conservado
  english_pob_reading: The extant Cairo Geniza Hebrew for this verse is shorter; the clauses about teaching Jacob and enlightening Israel are included because the Greek witness supports them.
  chosen_spanish_reading: Se incluyen las cláusulas de propósito griegas sobre enseñar a Jacob y alumbrar a Israel, con aviso de variante textual.
  alternative_spanish_readings:
  - 'Traducir solo el hebreo conservado: ‘Y le dio sus mandamientos, y le concedió autoridad en estatuto y juicio.’'
  rationale: El hebreo conservado es más breve, pero el testimonio griego ofrece una continuación coherente y claramente relacionada con la función sacerdotal de Aarón. Para transparencia textual, la expansión se marca con nota.
  doctrine_reference: 'PHILOSOPHY.md: para Sirácides, traducir desde el hebreo donde se conserva y desde el griego donde el hebreo aparece abreviado o incompleto.'
translation_notes:
  revision_awareness: El texto español refleja la revisión que añadió la conjunción inicial «Y» para corresponder al hebreo ויתן; también conserva la expansión apoyada por el griego y la señala explícitamente en la nota textual.
  spanish_consistency_notes:
  - Se usa «mandamientos» para מצותיו/ἐντολαῖς, en coherencia con el valor legal-covenantal documentado.
  - «Autoridad» se mantiene para ἐξουσίαν / וימשילהו, evitando «dominio» para no sugerir realeza.
  - «Estatuto y juicio» preserva la pareja jurídica del original y coincide con el audit trail en inglés.
  - «Testimonios» traduce μαρτύρια de manera técnica y consistente con el contexto legal/covenantal.
  - «Alumbrar» conserva la imagen de φωτῖσαι sin imponer una explicación doctrinal adicional.
