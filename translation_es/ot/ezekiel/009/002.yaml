revisions:
- from: Y he aquí[a], seis hombres venían desde la dirección de la puerta superior, que mira al norte; cada uno con su arma de destrucción en la mano; y un hombre entre ellos vestido de lino, con un estuche de escriba[b] a su cintura. Y vinieron y se detuvieron junto al altar de bronce.
  to: Y he aquí, seis hombres venían desde la dirección de la puerta superior, que mira al norte, cada uno con su arma para quebrar[a] en la mano; y un hombre entre ellos, vestido de lino, con un estuche de escriba[b] a su cintura. Y vinieron y se pararon junto al altar de bronce.
  rationale: Se ajusta el texto para reflejar mejor el matiz léxico de מַפָּץ ('arma para quebrar') y la acción de וַיַּעַמְדוּ ('se pararon junto a'). También se reordena el sistema de notas para conservar la alternativa léxica principal documentada en el English POB para el arma, mientras se mantiene la nota tradicional sobre el estuche/tintero del escriba.
  reviewer_model: gpt-5.4
