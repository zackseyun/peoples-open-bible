lexical_decisions:
- source_word: מוֹנֶה
  english_pob_choice: counts
  chosen_spanish: cuenta
  alternatives_spanish:
  - numera
  - lleva la cuenta de
  lexicon: HALOT
  rationale: El participio de מנה expresa contar o numerar. «Cuenta» es natural en español y conserva la acción de enumerar con precisión.
- source_word: מִסְפָּר
  english_pob_choice: the number of
  chosen_spanish: el número de
  alternatives_spanish:
  - la cuenta de
  - un número de
  lexicon: HALOT
  rationale: מִסְפָּר significa «número, cuenta». Con מנה forma la idea de contar el número de algo; «el número de» preserva ese énfasis en la enumeración exacta.
- source_word: לַכּוֹכָבִים
  english_pob_choice: the stars
  chosen_spanish: las estrellas
  alternatives_spanish:
  - para las estrellas
  lexicon: HALOT
  rationale: La ל prefijada funciona idiomáticamente con מִסְפָּר en esta construcción. En español, el sentido se expresa de modo natural con «las estrellas» sin reproducir de manera rígida la preposición.
- source_word: לְכֻלָּם
  english_pob_choice: all of them
  chosen_spanish: a todas ellas
  alternatives_spanish:
  - a todas
  - todas
  lexicon: HALOT
  rationale: La frase significa «a todos ellos / a todas ellas». Como antecedente es femenino plural en español, «a todas ellas» conserva el valor distributivo e individualizante.
- source_word: שֵׁמוֹת
  english_pob_choice: by name
  chosen_spanish: por su nombre
  alternatives_spanish:
  - por nombre
  - con nombre
  lexicon: HALOT
  rationale: Literalmente significa «nombres», pero con קרא la expresión idiomática es nombrar o llamar por nombre. «Por su nombre» comunica la idea personal e individual sin sonar forzado.
- source_word: יִקְרָא
  english_pob_choice: he calls
  chosen_spanish: las llama
  alternatives_spanish:
  - las nombra
  - las llama por nombre
  lexicon: HALOT
  rationale: קרא puede significar llamar o nombrar. Aquí, junto con «por su nombre», «las llama» expresa con naturalidad que Dios distingue y nombra a cada estrella.
theological_decisions:
- issue: Sujeto divino implícito
  english_pob_reading: Use 'He' as the subject, referring back to God in the surrounding context.
  chosen_spanish_reading: Él
  alternative_spanish_readings:
  - Dios
  - Yahvé
  rationale: El hebreo no expresa explícitamente el sujeto, pero el verbo continúa el referente divino del contexto. «Él» conserva esa continuidad sin añadir un nombre que el versículo no repite.
  doctrine_reference: Contexto poético de alabanza a Yahvé en el salterio
translation_notes:
  revision_awareness: El texto inglés auditado muestra una equivalencia óptima estable sin notas; la versión española sigue el mismo análisis léxico y mantiene la referencia divina implícita del contexto.
  spanish_consistency_notes:
  - Se preserva el sujeto implícito con pronombre personal para evitar introducir capitalización interpretativa.
  - Se evita una traducción mecánica de la ל hebrea en la primera cola; en español, el giro idiomático exige «el número de las estrellas».
  - «Las llama por su nombre» mantiene la fuerza personal de קרא sin oscurecer el paralelismo con «cuenta el número».
