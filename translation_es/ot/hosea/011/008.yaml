review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español preserva bien la estructura interrogativa, el paralelismo con Efraín/Israel y la alusión a Admá/Zeboim. También mantiene correctamente el lenguaje antropopático del corazón de Dios y sus compasiones. Sin embargo, hay varios desajustes con la evidencia fuente y con el rastro auditado del POB: el marcador [a] está anclado en el lugar equivocado; "ponerte como Zeboim" no refleja el verbo hebreo correspondiente ni el patrón del inglés auditado; y la nota [c] usa "pidades", que no es español natural. Además, "se encienden" para נִכְמְרוּ intensifica hacia fuego más que hacia conmoción cálida/agitación compasiva.'
  spanish_quality_summary: El español es mayormente claro y digno, pero necesita reparación menor para legibilidad y precisión. "Pidades" es inaceptable en español estándar; "ponerte como Zeboim" suena menos natural y menos alineado con el hebreo/POB que "hacerte"; y la ubicación de la nota de Admá y Zeboim debe ir en los topónimos, no en "dejarte". "Mi corazón se revuelve dentro de mí" es aceptable, aunque "se trastorna" o "se vuelve" podrían ser alternativas; no hace falta cambiarlo obligatoriamente.
  glossary_alignment: No hay conflictos con la terminología troncal del proyecto (no aparecen Yahvé, Mesías, etc.). Los nombres propios Efraín, Israel y Admá están bien; para צְבֹאִים conviene usar "Zeboim" o "Zeboyim" de forma consistente, y conservar la alusión en nota. "Compasiones" preserva bien el plural hebreo.
  issues:
  - severity: high
    issue: El marcador [a] está colocado en "dejarte" en vez de anclarse en Admá/Zeboim.
    rationale: La nota [a] explica los topónimos y su relación con Sodoma y Gomorra. Debe aparecer junto a los nombres de ciudades, no junto al verbo inicial.
  - severity: medium
    issue: '"¿Cómo podría ponerte como Zeboim?" no refleja bien אֲשִׂימְךָ ni el paralelismo del verso.'
    rationale: El hebreo usa un segundo verbo de 'hacer/poner' con comparación; en español, repetir "hacerte" da mejor naturalidad y reproduce la lógica paralela con "hacerte como Admá".
  - severity: high
    issue: La nota [c] contiene "pidades", forma no natural/incorrecta en español actual.
    rationale: La alternativa debe expresarse con español legible, por ejemplo "toda mi piedad se enciende" o mejor "mi compasión se calienta" / "todas mis compasiones se conmueven".
  - severity: medium
    issue: '"Se encienden" para נִכְמְרוּ puede sonar demasiado ígneo frente al matiz de conmoción cálida/entrañable.'
    rationale: Aunque es defendible, el audit trail prioriza 'are stirred' con alternativas de calor afectivo. En español "se conmueven" comunica mejor la emoción sin sobrecargar la metáfora; las alternativas de nota pueden conservar "se calientan" o "se encienden".
