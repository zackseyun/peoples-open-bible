translation:
  language: es
  text: Les di mis estatutos[a], y les di a conocer mis juicios, que, si un hombre los hace, vivirá por medio de ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una persona» o «la humanidad»; el hebreo usa una forma singular representativa.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֶתֵּן
  english_pob_choice: I gave
  chosen_spanish: Yo les di
  alternatives_spanish:
  - Yo les concedí
  - Yo les entregué
  lexicon: HALOT
  rationale: נתן en este contexto expresa dar/proveer de manera directa. «Yo les di» mantiene la sencillez y el registro pactual del texto.
- source_word: חֻקּוֹתַי
  english_pob_choice: my statutes
  chosen_spanish: mis estatutos
  alternatives_spanish:
  - mis decretos
  - mis preceptos estatuidos
  lexicon: HALOT
  rationale: «Estatutos» preserva el valor legal-pactual de חֻקּוֹת y combina naturalmente con מִשְׁפָּטִים en español.
- source_word: מִשְׁפָּטַי
  english_pob_choice: my judgments
  chosen_spanish: mis juicios
  alternatives_spanish:
  - mis ordenanzas
  - mis reglas
  lexicon: HALOT
  rationale: מִשְׁפָּטִים tiene peso forense y jurídico; «juicios» conserva ese matiz mejor que opciones más generales como «reglas».
- source_word: הוֹדַעְתִּי אוֹתָם
  english_pob_choice: I made ... known to them
  chosen_spanish: les di a conocer
  alternatives_spanish:
  - se los di a conocer
  - les hice saber
  lexicon: HALOT
  rationale: La forma causativa de ידע comunica hacer saber. «Les di a conocer» transmite con naturalidad la intención informativa sin convertirlo en una glosa interpretativa de «enseñé».
- source_word: אֲשֶׁר יַעֲשֶׂה אוֹתָם
  english_pob_choice: which, if a man does them
  chosen_spanish: los cuales, si un hombre los hace
  alternatives_spanish:
  - que, si alguien los hace
  - que, si una persona los practica
  lexicon: HALOT
  rationale: La relativa hebrea enlaza los estatutos/juicios con la condición. «Los cuales» mantiene el referente plural y la fuerza condicional sin sobreparafrasear.
- source_word: הָאָדָם
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  - la humanidad
  - el ser humano
  lexicon: HALOT
  rationale: La forma singular representativa del hebreo queda bien reflejada con «un hombre». Se conserva así el valor proverbial y legal del enunciado, sin perder la opción inclusiva en alternativos.
- source_word: וָחַי בָּהֶם
  english_pob_choice: he will live by them
  chosen_spanish: vivirá por ellos
  alternatives_spanish:
  - vivirá en ellos
  - tendrá vida por medio de ellos
  lexicon: HALOT
  rationale: El giro idiomático hebreo de vida en relación con la obediencia se expresa de forma natural con «vivirá por ellos». Mantiene la dependencia instrumental/relacional sin endurecerlo en una traducción literal poco natural.
theological_decisions:
- issue: Alcance de la fórmula de vida por obediencia
  english_pob_reading: Preserves the covenantal life formula without specifying whether the emphasis is individual, corporate, temporal, or eschatological.
  chosen_spanish_reading: Preserva la fórmula de vida pactual por obediencia sin precisar si el énfasis es individual, corporativo, temporal o escatológico.
  alternative_spanish_readings:
  - vivirá eternamente si obedece la ley
  - tendrá prosperidad nacional bajo el pacto
  rationale: El versículo afirma la relación entre hacer los estatutos/juicios y vivir por ellos, pero no explicita todo su alcance teológico. La traducción conserva esa tensión en vez de resolverla.
  doctrine_reference: Preservar la tensión teológica sin resolverla.
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente al mantener la cláusula relativa simple («los cuales») y el verbo relacional «vivirá por ellos», evitando ampliaciones explicativas no presentes en el hebreo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estándar cuando aparezca el nombre divino, aunque este versículo no lo contiene.
  - «Estatutos» y «juicios» conservan el par legal del hebreo y evitan nivelar ambos términos como simples «mandamientos».
  - La nota de pie marca la ambigüedad representativa de הָאָדָם sin borrar el singular del texto base.
  - «Por ellos» reproduce el valor instrumental/relacional de בָּהֶם sin imponer una interpretación doctrinal más estrecha.
