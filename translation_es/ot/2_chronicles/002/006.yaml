translation:
  language: es
  text: Ahora envíame un hombre hábil para trabajar en oro, plata, bronce, hierro, púrpura, carmesí[a] y azul, y que sepa grabar grabados[b], para estar con los hombres hábiles que están conmigo en Judá y en Jerusalén[c], a quienes mi padre David preparó.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'escarlata' para 'carmesí'.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo literalmente: ''grabar grabados'', una expresión cognada para trabajo grabado especializado.'
    reason: lexical_alternative
  - marker: c
    text: O 'a quienes mi padre David nombró' o 'dejó listos'; el verbo hebreo puede abarcar preparación o designación según el contexto.
    reason: alternative_reading
lexical_decisions:
- source_word: שְׁלַח
  english_pob_choice: send
  chosen_spanish: envíame
  alternatives_spanish:
  - manda
  - remíteme
  lexicon: HALOT
  rationale: El imperativo pedido a Hiram conserva el valor de solicitud directa; en español, 'envíame' comunica con naturalidad el sentido de 'send me' sin añadir un matiz más formal que el hebreo.
- source_word: אִישׁ חָכָם
  english_pob_choice: a skilled man
  chosen_spanish: un hombre hábil
  alternatives_spanish:
  - un hombre sabio
  - un experto
  lexicon: HALOT
  rationale: En contexto de oficios y artesanía, חכם describe competencia técnica; 'hábil' mantiene esa fuerza y evita reducirlo a sabiduría abstracta.
- source_word: לַעֲשׂוֹת
  english_pob_choice: to work
  chosen_spanish: para trabajar
  alternatives_spanish:
  - para hacer
  - para obrar
  lexicon: HALOT
  rationale: El infinitivo introduce labor artesanal en diversos materiales; 'trabajar' es idiomático en español y expresa la actividad del artesano sin sobreespecificarla.
- source_word: בַּזָּהָב וּבַכֶּסֶף וּבַנְּחֹשֶׁת וּבַבַּרְזֶל
  english_pob_choice: in gold, silver, bronze, iron
  chosen_spanish: en oro, plata, bronce, hierro
  alternatives_spanish:
  - con oro, plata, bronce, hierro
  lexicon: HALOT
  rationale: La preposición marca el material en que se trabaja. 'En' reproduce bien esa relación de oficio. Se prefiere 'bronce' para נְחֹשֶׁת en este contexto histórico/material.
- source_word: בָאַרְגְּוָן
  english_pob_choice: purple
  chosen_spanish: púrpura
  alternatives_spanish:
  - morado
  - púrpura teñida
  lexicon: HALOT
  rationale: El término designa material o color costoso; 'púrpura' es la equivalencia más estable y respetuosa del valor del original.
- source_word: וְכַרְמִיל
  english_pob_choice: crimson
  chosen_spanish: carmesí
  alternatives_spanish:
  - escarlata
  - crimson
  lexicon: HALOT
  rationale: '''Carmesí'' expresa bien el tono rojo intenso y conserva una terminología elevada y comprensible en español bíblico moderno.'
- source_word: וּתְכֵלֶת
  english_pob_choice: blue
  chosen_spanish: azul
  alternatives_spanish:
  - azul violáceo
  - violeta-azul
  lexicon: HALOT
  rationale: El hebreo nombra un material teñido azul; dado que el texto no añade una palabra explícita para hilo o lana, se conserva simplemente el color/material 'azul'.
- source_word: וְיֹדֵעַ לְפַתֵּחַ פִּתּוּחִים
  english_pob_choice: who knows how to engrave engravings
  chosen_spanish: y que sepa grabar grabados
  alternatives_spanish:
  - y que sepa hacer grabados
  - y que sea experto en grabado
  lexicon: HALOT
  rationale: La construcción cognada hebrea enfatiza el trabajo tallado o grabado. 'Grabar grabados' preserva esa relación léxica, aunque suene repetitiva, porque refleja con fidelidad la forma del original.
- source_word: עִם הַחֲכָמִים
  english_pob_choice: to be with the skilled men
  chosen_spanish: para estar con los hombres hábiles
  alternatives_spanish:
  - junto a los artesanos hábiles
  - con los sabios
  lexicon: HALOT
  rationale: El contexto es colaboración artesanal. 'Hombres hábiles' mantiene el vínculo léxico con חכם y conserva el plural masculino del grupo de trabajo.
- source_word: אֲשֶׁר עִמִּי
  english_pob_choice: who are with me
  chosen_spanish: que están conmigo
  alternatives_spanish:
  - que están a mi lado
  - que me acompañan
  lexicon: HALOT
  rationale: La relación es locativa y asociativa; 'conmigo' es la forma natural en español y no añade jerarquía que el hebreo no explicita.
- source_word: אֲשֶׁר הֵכִין דָּוִיד אָבִי
  english_pob_choice: whom my father David prepared
  chosen_spanish: a quienes mi padre David preparó
  alternatives_spanish:
  - a quienes mi padre David dispuso
  - a quienes mi padre David dejó listos
  lexicon: HALOT
  rationale: הֵכִין puede significar preparar o dejar listo, y el contexto permite esa amplitud. 'Preparó' preserva el sentido general sin sobreinterpretar como nombramiento formal.
theological_decisions:
- issue: 'הֵכִין דָּוִיד אָבִי: preparación o nombramiento de los artesanos'
  english_pob_reading: whom my father David prepared
  chosen_spanish_reading: a quienes mi padre David preparó
  alternative_spanish_readings:
  - a quienes mi padre David nombró
  - a quienes mi padre David dispuso
  rationale: No se fuerza una lectura institucional específica. La traducción conserva la ambigüedad de preparación/puesta a punto que el inglés POB documenta y que el hebreo permite.
  doctrine_reference: None
translation_notes:
  revision_awareness: La revisión inglesa eliminó 'yarn' después de 'blue' porque el hebreo no dice explícitamente 'hilo'. La versión española sigue esa corrección y mantiene solo 'azul' sin añadir un sustantivo no atestiguado.
  spanish_consistency_notes:
  - Se mantiene 'hábil/hábiles' para reflejar de forma consistente חכם en singular y plural.
  - '''Oro, plata, bronce, hierro'' sigue el listado de materiales sin insertar preposiciones adicionales que alteren el flujo.'
  - Se usa 'púrpura', 'carmesí' y 'azul' como términos de color/material acordes con el contexto de artesanía del templo.
  - Las notas al pie están ancladas exactamente en '[a]' y '[b]' dentro del texto para cumplir la validación.
