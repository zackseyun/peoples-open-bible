translation:
  language: es
  text: ¡Bendito eres tú, el que mira los abismos[a], sentado sobre los querubines[b], y alabado y altamente exaltado por los siglos!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «las profundidades»; la expresión evoca el abismo cósmico.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «entronizado sobre los querubines». El griego, más literalmente, dice «sentado sobre los querubines».'
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐλογημένος
  english_pob_choice: Blessed are you
  chosen_spanish: ¡Bendito eres tú!
  alternatives_spanish:
  - Bendecido eres tú
  - Bendito seas tú
  lexicon: BDAG / uso doxológico
  rationale: 'En una alabanza directa a Dios, el español natural y reverente es la segunda persona: «Bendito eres tú». Conserva el valor de bendición litúrgica sin volverlo una fórmula impersonal.'
- source_word: ὁ ἐπιβλέπων
  english_pob_choice: who look upon
  chosen_spanish: el que mira
  alternatives_spanish:
  - el que contempla
  - el que observa
  lexicon: BDAG
  rationale: 'El participio sustantivado se vierte con artículo y relativo implícito: «el que mira». «Mira» mantiene la percepción visual directa de ἐπιβλέπω sin añadir la idea de cuidado providencial.'
- source_word: ἀβύσσους
  english_pob_choice: the depths
  chosen_spanish: los abismos
  alternatives_spanish:
  - las profundidades
  - el abismo
  lexicon: LEH
  rationale: Dado que el plural griego apunta a realidades abismales o cósmicas, «los abismos» conserva mejor el plural y la fuerza imagística. «Las profundidades» sería más suave pero menos específico.
- source_word: καθήμενος
  english_pob_choice: seated
  chosen_spanish: sentado
  alternatives_spanish:
  - entronizado
  - estando sentado
  lexicon: BDAG
  rationale: La forma participial se expresa de modo literal y natural con «sentado». «Entronizado» introduce una inferencia interpretativa que el griego no dice explícitamente.
- source_word: ἐπὶ χερουβεὶν
  english_pob_choice: upon the cherubim
  chosen_spanish: sobre los querubines
  alternatives_spanish:
  - encima de los querubines
  - sobre los querubines
  lexicon: LEH
  rationale: «Sobre» reproduce bien ἐπί en este contexto y es idiomático en español bíblico. Se evita «encima de» por sonar más físico y menos litúrgico.
- source_word: αἰνετὸς
  english_pob_choice: praised
  chosen_spanish: alabado
  alternatives_spanish:
  - digno de alabanza
  - praiseworthy
  lexicon: LEH
  rationale: La revisión inglesa prefirió un predicado más directo; «alabado» conserva esa concisión. En español, además, encaja bien con la cadena de predicados sin introducir una perífrasis innecesaria.
- source_word: ὑπερυψούμενος
  english_pob_choice: highly exalted
  chosen_spanish: altamente exaltado
  alternatives_spanish:
  - sumamente exaltado
  - exaltado sobre todo
  lexicon: LEH
  rationale: «Altamente exaltado» transmite el intensivo del compuesto y mantiene el tono doxológico. No se reduce a «exaltado» para no perder la intensificación.
- source_word: εἰς τοὺς αἰῶνας
  english_pob_choice: forever
  chosen_spanish: por los siglos
  alternatives_spanish:
  - para siempre
  - por los siglos de los siglos
  lexicon: BDAG
  rationale: «Por los siglos» refleja el plural y el giro temporal de modo más literal que «para siempre». En español litúrgico es plenamente comprensible y conserva la resonancia bíblica del original.
theological_decisions:
- issue: La imagen del trono sobre los querubines
  english_pob_reading: seated upon the cherubim
  chosen_spanish_reading: sentado sobre los querubines
  alternative_spanish_readings:
  - entronizado sobre los querubines
  - sentado encima de los querubines
  rationale: Se conserva la imagen bíblica sin añadir el término «trono», que no aparece en el griego de este verso. La forma «sentado sobre» mantiene el vínculo con la frase griega y deja intacta la imaginería real-divina.
  doctrine_reference: Translation philosophy §§1, 5
- issue: Valor de αἰνετὸς en la doxología
  english_pob_reading: praised
  chosen_spanish_reading: alabado
  alternative_spanish_readings:
  - digno de alabanza
  - loado
  rationale: La cadena de predicados en griego favorece un adjetivo predicativo breve. «Alabado» comunica que Dios recibe alabanza de modo directo, sin transformar el predicado en una frase explicativa.
  doctrine_reference: Translation philosophy §6
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada para acercar αἰνετός a un predicado más directo («praised») y mantener la secuencia de predicados sin copula explícita. La propuesta española sigue esa dirección con «alabado», preservando además el paralelismo doxológico y la literalidad moderada del participio sustantivado.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» por defecto cuando el hebreo explícito lo exige, pero aquí el texto griego dirige la alabanza a Dios sin introducir el nombre divino; por eso no se inserta un equivalente nominal.
  - Se conserva «querubines» como plural tradicional y transparente en español bíblico.
  - Se evita «SEÑOR» porque no hay un κύριος en este verso y el texto es una doxología directa.
  - La secuencia «alabado y altamente exaltado» reproduce la acumulación de predicados griegos sin expandirla innecesariamente.
