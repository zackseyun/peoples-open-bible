translation:
  text: Who will declare a work of righteousness[c][b][a], and who will wait for it? For the covenant is far off.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew has a difficult text here, roughly, 'What is a deed of righteousness—who will tell it? And the hope of what...?'; the Greek parallel reads more clearly, 'Who will declare works of righteousness, and who will wait/endure? For the covenant is far off.'
    reason: textual_variant
  - marker: b
    text: Or 'works of righteousness' or 'work of justice.'
    reason: lexical_alternative
  - marker: c
    text: 'Greek: ''the covenant''; Hebrew appears to read ''statute'' or ''decree'' in the final phrase.'
    reason: alternative_reading
lexical_decisions:
- source_word: מָה מַעֲשֶׂה צֶדֶק / ἔργα δικαιοσύνης
  chosen: a work of righteousness
  alternatives:
  - works of righteousness
  - a righteous deed
  - a work of justice
  lexicon: HALOT; BDAG
  rationale: The Hebrew as transmitted is difficult ('what [is] a deed of righteousness? who will tell it?'), while the Greek gives a clearer sense, 'works of righteousness who will declare?' Because the Hebrew witness is marked minor_mismatch and the Greek parallel is to be used as actual input, the translation follows the shared core idea of a righteous deed/work being spoken of or proclaimed. Singular 'a work' gives idiomatic English for the indefinite sense, while 'righteousness' is preferred over 'justice' in line with the project's default for δικαιοσύνη unless context strongly favors social-judicial nuance.
- source_word: מִי יַגִּידֶנּוּ / τίς ἀναγγελεῖ
  chosen: Who will declare
  alternatives:
  - Who will tell of it
  - Who will proclaim
  - Who can recount it
  lexicon: HALOT; BDAG
  rationale: Both Hebrew נגד/הגיד and Greek ἀναγγέλλω support the sense of declaring or reporting. 'Declare' preserves the elevated but still readable register and fits the rhetorical question.
- source_word: וְתִקְוַת מָּה כִי אָצוּק חוֹק / ἢ τίς ὑπομενεῖ
  chosen: and who will wait for it
  alternatives:
  - and who will endure
  - and who will persevere
  - and who will hope for it
  lexicon: HALOT; BDAG
  rationale: The Hebrew clause is highly uncertain and appears corrupt in this form, but it contains תקוה ('hope') and a difficult continuation. The Greek parallel has the clearer reading 'or who will endure/wait?' To preserve the probable semantic overlap between hoping and patient endurance, 'wait for it' is chosen. This keeps the rhetorical parallelism and avoids overstating certainty where the Hebrew is unstable.
- source_word: חוֹק / ἡ διαθήκη
  chosen: the covenant
  alternatives:
  - the statute
  - the decree
  - the ordinance
  lexicon: HALOT; BDAG
  rationale: The Hebrew ends with חוק ('statute/decree'), but the Greek reads διαθήκη ('covenant'). Given the evident mismatch and the obscurity of the Hebrew line, the Greek likely preserves the more intelligible sense for the verse as a whole. 'Covenant' is therefore adopted in the main text, with the Hebrew alternative preserved in a footnote.
- source_word: מָּה / μακράν
  chosen: far off
  alternatives:
  - distant
  - long delayed
  - remote
  lexicon: HALOT; BDAG
  rationale: The Greek explicitly reads μακράν, 'far off.' The Hebrew wording does not clearly yield this, which suggests textual disturbance. 'Far off' is the most direct rendering and explains the preceding question about waiting/enduring.
