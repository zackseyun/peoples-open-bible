translation:
  language: es
  text: Dales cobardía[a], y derrite el atrevimiento de su fuerza, y que sean sacudidos ante su destrucción[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «temor». δειλία puede abarcar miedo o pusilanimidad, pero aquí el sentido más fuerte es «cobardía».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «que sean sacudidos por su destrucción». La frase final también puede entenderse más generalmente como ruina o destrucción, no solo como un «quebrantamiento» o «aplastamiento» más concreto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: δὸς
  english_pob_choice: Give
  chosen_spanish: Dales
  alternatives_spanish:
  - Da
  - Concédeles
  - Entrégales
  lexicon: LSJ
  rationale: El imperativo de δίδωμι se expresa de forma directa con «da»; aquí «dales» conserva la fuerza de la súplica y el destinatario explícito del ruego en español natural.
- source_word: δειλίαν
  english_pob_choice: cowardice
  chosen_spanish: cobardía
  alternatives_spanish:
  - temor
  - timidez
  lexicon: LSJ
  rationale: δειλία no es simple miedo, sino cobardía o pusilanimidad. «Cobardía» reproduce mejor el matiz moral y militar del contexto que «temor» o «timidez».
- source_word: τῆξον
  english_pob_choice: melt
  chosen_spanish: derrite
  alternatives_spanish:
  - disuelve
  - debilita
  - consúmelo
  lexicon: LSJ
  rationale: τῆξον conserva una imagen corporal de derretimiento o desvanecimiento. «Derrite» mantiene esa metáfora viva en español sin volverla abstracta.
- source_word: θράσος
  english_pob_choice: boldness
  chosen_spanish: audacia
  alternatives_spanish:
  - atrevimiento
  - insolencia
  - valentía
  lexicon: LSJ
  rationale: En este contexto θράσος es la confianza agresiva del enemigo. «Audacia» preserva ese tono y evita sonar demasiado elogioso, como podría ocurrir con «valentía».
- source_word: ἰσχύος
  english_pob_choice: strength
  chosen_spanish: fuerza
  alternatives_spanish:
  - poder
  - fortaleza
  - músculo
  lexicon: LSJ
  rationale: ἰσχύς designa fuerza o vigor. «Fuerza» da una construcción natural en español con «la audacia de su fuerza» y conserva la relación genitiva.
- source_word: σαλευθήτωσαν
  english_pob_choice: let them be shaken
  chosen_spanish: que sean sacudidos
  alternatives_spanish:
  - que titubeen
  - que sean trastornados
  - que se tambaleen
  lexicon: LSJ
  rationale: El pasivo imperativo comunica ser sacudidos, agitados o puestos inestables. «Que sean sacudidos» sigue de cerca la imagen original y sugiere desestabilización real.
- source_word: συντριβῇ
  english_pob_choice: destruction
  chosen_spanish: destrucción
  alternatives_spanish:
  - quebrantamiento
  - ruina
  - crushing / aplastamiento
  lexicon: LSJ
  rationale: συντριβή puede significar quebrantamiento, ruina o destrucción. «Destrucción» coincide con la revisión inglesa más reciente y es más natural en español formal, aunque conserva la idea de quebranto violento.
- source_word: αὐτῶν
  english_pob_choice: their own
  chosen_spanish: su
  alternatives_spanish:
  - de ellos
  - propia
  lexicon: LSJ
  rationale: El pronombre final es reflexivo en sentido contextual. En español, «su destrucción» mantiene la referencia sin forzar una repetición pesada; el sentido se entiende como la destrucción que les sobreviene a ellos.
theological_decisions:
- issue: Lenguaje imprecatorio contra enemigos
  english_pob_reading: Retain the direct petitions for the enemies' cowardice, collapse, and shaking without softening them.
  chosen_spanish_reading: Conservar las peticiones directas para que reciban cobardía, se derrita su audacia y sean sacudidos por su destrucción, sin suavizar el tono.
  alternative_spanish_readings:
  - Suavizar a lenguaje general de derrota
  - Parafrasear como mera desestabilización
  rationale: El griego presenta una súplica intensa dirigida a Dios contra fuerzas hostiles. La versión española conserva ese peso retórico y teológico, evitando atenuarlo por sensibilidad moderna.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión inglesa más reciente, que prefirió «destruction» en la frase final en lugar de «crushing», por considerar que τῇ συντριβῇ αὐτῶν admite una traducción más natural y general. La versión española sigue esa decisión con «destrucción», manteniendo la imaginería de ruina sin perder fluidez.
  spanish_consistency_notes:
  - Se mantuvo «audacia» para θράσος porque en español comunica mejor la mezcla de atrevimiento y agresividad que el contexto requiere.
  - Se evitó «SEÑOR» o cualquier sustituto reverencial, porque en este versículo no aparece el tetragrámaton ni una cita directa de κύριος.
  - Se prefirió un imperativo breve al inicio («Dales») para reflejar el tono de oración súplica del griego.
  - La nota al pie se ancla solo en «cobardía» porque ese es el término con mayor tensión lexical en español.
