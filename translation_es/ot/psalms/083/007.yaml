translation:
  language: es
  text: las tiendas de Edom y los ismaelitas[a], Moab y los hagritas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los hagaritas».
    reason: lexical_alternative
lexical_decisions:
- source_word: אָהֳלֵי
  english_pob_choice: the tents of
  chosen_spanish: las tiendas de
  alternatives_spanish:
  - los tabernáculos de
  - las moradas de
  lexicon: HALOT
  rationale: El hebreo es un constructo plural de אֹהֶל, literalmente ‘tiendas de’. En español, ‘tiendas de’ conserva la imagen concreta y el tono poético mejor que una generalización como ‘pueblos’ o ‘habitantes’.
- source_word: אֱדוֹם
  english_pob_choice: Edom
  chosen_spanish: Edom
  alternatives_spanish:
  - los edomitas
  lexicon: HALOT
  rationale: Es nombre propio de nación/territorio. Mantener ‘Edom’ preserva el paralelismo nominal del listado hebreo.
- source_word: יִשְׁמְעֵאלִים
  english_pob_choice: the Ishmaelites
  chosen_spanish: los ismaelitas
  alternatives_spanish:
  - los hijos de Ismael
  - los ismaelíes
  lexicon: HALOT
  rationale: Es un gentilicio plural derivado de Ismael. ‘Ismaelitas’ es la forma española natural y conserva el valor etnónimo del término hebreo.
- source_word: מוֹאָב
  english_pob_choice: Moab
  chosen_spanish: Moab
  alternatives_spanish:
  - los moabitas
  lexicon: HALOT
  rationale: El hebreo presenta el nombre propio simple; por eso se conserva ‘Moab’ en vez de expandirlo a la forma gentilicia.
- source_word: הַגְרִים
  english_pob_choice: the Hagrites
  chosen_spanish: los hagritas
  alternatives_spanish:
  - los hagríes
  - los hagaritas
  lexicon: HALOT
  rationale: El grupo puede verterse como ‘hagritas’ o ‘hagaritas’. Se mantiene la forma breve y reconocible en español, con nota para la alternativa tradicional donde sea útil.
translation_notes:
  revision_awareness: El inglés POB mantuvo la imagen concreta de ‘the tents of’ y añadió una nota lexical para el etnónimo final; el español sigue esa decisión, preservando el listado paralelo sin suavizar los nombres propios.
  spanish_consistency_notes:
  - Se mantiene ‘Edom’ y ‘Moab’ como nombres propios, en paralelo con la sintaxis hebrea.
  - Se usa ‘los ismaelitas’ para el gentilicio plural, coherente con el inglés POB.
  - ‘Tiendas’ conserva la metáfora de campamento/nómadas que está en el constructo hebreo.
