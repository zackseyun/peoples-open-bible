  text: καὶ τὴν αὐλὴν τὴν ἔξωθεν τοῦ ναοῦ ἔκβαλε ⸀ἔξωθεν, καὶ μὴ αὐτὴν μετρήσῃς, ὅτι ἐδόθη τοῖς ἔθνεσιν, καὶ τὴν πόλιν τὴν ἁγίαν πατήσουσιν μῆνας ⸀τεσσεράκοντα δύο.
base_translation:
  language: en
  yaml_path: translation/nt/revelation/011/002.yaml
  text: 'But leave out the court outside the temple[a], and do not measure it, because it has been given to the nations[b], and they will trample the holy city for forty-two months.'
  footnotes:
  - marker: a
    text: Or 'the court outside the sanctuary.' The Greek ναός can refer more specifically to the sanctuary rather than the entire temple complex.
    reason: lexical_alternative
  - marker: b
    text: Or 'it was given to the Gentiles.' The Greek ἔθνεσιν can mean 'nations' or 'Gentiles,' depending on context.
    reason: alternative_reading
translation:
  language: ko
  text: '그러나 성전 바깥 뜰은 제외하고 측량하지 말라. 이는 그것이 이방인들[a]에게 주어졌기 때문이다. 그들이 거룩한 성을 마흔두 달 동안 짓밟을 것이다.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '또는 「열방에」. 헬라어 ἔθνεσιν은 문맥에 따라 「열방」 혹은 「이방인」 모두를 가리킬 수 있다.'
    reason: alternative_reading
lexical_decisions:
- source_word: τὴν πόλιν τὴν ἁγίαν
  english_pob_choice: the holy city
  chosen_korean: 거룩한 성
  alternatives_korean:
