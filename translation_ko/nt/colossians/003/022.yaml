id: COL.3.22
reference: Colossians 3:22
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: οἱ δοῦλοι, ὑπακούετε κατὰ πάντα τοῖς κατὰ σάρκα κυρίοις, μὴ ἐν ⸀ὀφθαλμοδουλίαις, ὡς ἀνθρωπάρεσκοι, ἀλλ’ ἐν ἁπλότητι καρδίας, φοβούμενοι τὸν ⸀κύριον.
base_translation:
  language: en
  yaml_path: translation/nt/colossians/003/022.yaml
  text: Slaves, obey in everything those who are your masters according to the flesh, not with eye-service, as people-pleasers, but with sincerity of heart, fearing the Lord.
translation:
  language: ko
  text: 노예들[a]이여, 육신을 따른[b] 여러분의 주인들에게 모든 일에 순종하되, 사람들에게 잘 보이려는 자들처럼 눈가림으로 하지 말고[c], 마음의 진실함으로 주를 두려워하며 하십시오.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 헬라어 δοῦλος. 「주인」과의 사회적·법적 대조에서 매임의 의미가 두드러지므로, DOCTRINE.md에 따라 「노예」로 옮긴다.
    reason: lexical_alternative
  - marker: b
    text: 또는 「세상의 (주인들)」. 헬라어 「육신을 따른」은 인간적·이생적 권위의 범위를 가리킨다.
    reason: lexical_alternative
  - marker: c
    text: 「눈가림」은 사람이 보고 있을 때에만 일하는 것을 가리킨다.
    reason: cultural_note
lexical_decisions:
- source_word: οἱ δοῦλοι
  english_pob_choice: Slaves
  chosen_korean: 노예들
  alternatives_korean:
  - 종들
  - 매인 자들
  lexicon: BDAG
  rationale: 본 가정 윤리 문맥의 「노예-주인」 대조에서 매임의 어감이 핵심. DOCTRINE.md와 영어 POB의 「Slaves」 결정을 따라 「노예들」로 옮긴다.
- source_word: ὑπακούετε κατὰ πάντα
  english_pob_choice: obey in everything
  chosen_korean: 모든 일에 순종하되
  alternatives_korean:
  - 모든 것에 순종하며
  lexicon: BDAG
  rationale: 「순종하되」로 이어지는 흐름.
- source_word: τοῖς κατὰ σάρκα κυρίοις
  english_pob_choice: those who are your masters according to the flesh
  chosen_korean: 육신을 따른 여러분의 주인들
  alternatives_korean:
  - 세상의 주인들
  - 육신상의 주인들
  lexicon: BDAG
  rationale: κατὰ σάρκα를 「육신을 따른」으로 직역하여 「주」(다음의 κύριος)와의 대조 보존.
- source_word: σάρκα
  english_pob_choice: flesh
  chosen_korean: 육신
  alternatives_korean:
  - 육체
  - 세상
  lexicon: BDAG
  rationale: 인간적·이생적 영역의 함의가 「육신」으로 자연스럽다.
- source_word: κυρίοις
  english_pob_choice: masters
  chosen_korean: 주인들
  alternatives_korean:
  - 상전들
  lexicon: BDAG
  rationale: 인간 노예 소유주는 「주인」(뒤의 「주」와 구분).
- source_word: μὴ ἐν ὀφθαλμοδουλίαις, ὡς ἀνθρωπάρεσκοι
  english_pob_choice: not with eye-service, as people-pleasers
  chosen_korean: 사람들에게 잘 보이려는 자들처럼 눈가림으로 하지 말고
  alternatives_korean:
  - 사람을 기쁘게 하는 자들처럼 눈요기로 섬기지 말고
  lexicon: BDAG
  rationale: ὀφθαλμοδουλία(눈가림)와 ἀνθρωπάρεσκοι(사람 기쁨꾼)를 한국어 자연 구조로 결합.
- source_word: ἐν ἁπλότητι καρδίας
  english_pob_choice: with sincerity of heart
  chosen_korean: 마음의 진실함으로
  alternatives_korean:
  - 마음의 순전함으로
  - 진실한 마음으로
  lexicon: BDAG
  rationale: ἁπλότης의 「단순·진실」을 「진실함」으로 옮긴다.
- source_word: φοβούμενοι τὸν κύριον
  english_pob_choice: fearing the Lord
  chosen_korean: 주를 두려워하며
  alternatives_korean:
  - 주님을 경외하며
  lexicon: BDAG
  rationale: 「주를 두려워함」은 한국 교회의 정립된 표현(경외의 함의 포함).
theological_decisions:
- issue: δοῦλος → 「노예」
  chosen_reading: 노예
  alternative_readings:
  - 종
  rationale: 본 절은 가정 윤리 문맥에서 「노예-주인」 대조이며, 매임의 어감이 핵심이다. 1세기 노예제를 「종/일꾼/고용인」으로 옮기면 역사적·윤리적 긴장이 가려진다. DOCTRINE.md와 영어 POB는 「Slaves」를 채택한다.
  doctrine_reference: 'DOCTRINE.md: Contested terms for δοῦλος; original-language primacy'
