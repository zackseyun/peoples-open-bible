translation:
  language: es
  text: Así fortalecieron el reino de Judá y fortalecieron a Roboam, hijo de Salomón, por tres años[a], porque por tres años anduvieron en el camino de David y de Salomón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'fortalecieron a Roboam'. El hebreo repite el verbo del inicio del versículo con un matiz muy cercano; en español se conserva la repetición con 'fortalecieron' por claridad y consistencia, aunque también puede leerse como una intensificación aplicada directamente a Roboam.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְחַזְּקוּ
  english_pob_choice: they strengthened
  chosen_spanish: fortalecieron
  alternatives_spanish:
  - dieron fortaleza
  - reforzaron
  - robustecieron
  lexicon: HALOT
  rationale: El verbo חזק en piel expresa hacer fuerte o fortalecer. En español, 'fortalecieron' conserva bien el valor causativo y resulta natural y bíblico sin sonar arcaico.
- source_word: מַלְכ֣וּת יְהוּדָ֔ה
  english_pob_choice: the kingdom of Judah
  chosen_spanish: el reino de Judá
  alternatives_spanish:
  - la realeza de Judá
  - el reino judío
  lexicon: HALOT
  rationale: מַלְכוּת aquí nombra la entidad política. 'Reino de Judá' es la forma más directa y clara en español.
- source_word: וַיְאַמְּצ֛וּ
  english_pob_choice: strengthened
  chosen_spanish: fortalecieron
  alternatives_spanish:
  - apoyaron
  - animaron
  - dieron ánimo a
  lexicon: HALOT
  rationale: אָמַץ en piel también pertenece al campo de 'hacer fuerte'. Dado que el inglés POB repite el campo semántico, el español puede repetir 'fortalecieron' sin perder fidelidad; la repetición en hebreo se conserva como efecto retórico.
- source_word: רְחַבְעָ֥ם בֶּן שְׁלֹמֹ֖ה
  english_pob_choice: Rehoboam son of Solomon
  chosen_spanish: Roboam, hijo de Salomón
  alternatives_spanish:
  - Roboam, el hijo de Salomón
  lexicon: HALOT
  rationale: Los nombres propios se transliteran de la forma habitual en español bíblico. 'Hijo de' reproduce directamente la relación filial del hebreo.
- source_word: לְשָׁנִ֣ים שָׁל֑וֹשׁ
  english_pob_choice: for three years
  chosen_spanish: por tres años
  alternatives_spanish:
  - durante tres años
  - por un período de tres años
  lexicon: HALOT
  rationale: La preposición ל con duración puede expresarse naturalmente en español con 'por'. Mantiene el valor temporal sin añadir matices no presentes en el texto.
- source_word: כִּ֣י
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  - puesto que
  lexicon: HALOT
  rationale: Introduce la causa de la acción anterior. 'Porque' es la forma más directa y transparente en español actual.
- source_word: הָלְכ֗וּ בְּדֶ֧רֶךְ דָּוִ֛יד וּשְׁלֹמֹ֖ה
  english_pob_choice: they walked in the way of David and Solomon
  chosen_spanish: anduvieron en el camino de David y de Salomón
  alternatives_spanish:
  - caminaron en el camino de David y de Salomón
  - siguieron el camino de David y de Salomón
  lexicon: HALOT
  rationale: הלך en esta construcción idiomática expresa conducta o modo de vida. 'Anduvieron en el camino' conserva la metáfora bíblica sin explicarla en exceso; 'de' antes de cada nombre hace más natural la coordinación en español.
- source_word: לְשָׁנִ֥ים שָׁלֽוֹשׁ
  english_pob_choice: for three years
  chosen_spanish: por tres años
  alternatives_spanish:
  - durante tres años
  lexicon: HALOT
  rationale: Se repite la misma duración al final del versículo. Mantener la repetición refleja la estructura hebrea y el énfasis causal del texto.
theological_decisions:
- issue: Evaluación de la conducta de Judá y Roboam durante tres años
  english_pob_reading: Retain the idiom without expanding it to imply lifelong or comprehensive righteousness.
  chosen_spanish_reading: Conservar el idioma figurado sin ampliarlo a una valoración total de la vida de David, Salomón o Roboam.
  alternative_spanish_readings:
  - porque siguieron fielmente a Yahvé como David y Salomón
  - porque caminaron en la obediencia verdadera
  rationale: El versículo sólo afirma que por tres años anduvieron en el camino de David y de Salomón. No añade una evaluación global de su piedad ni desarrolla el sentido del 'camino'. Por eso conviene mantener la expresión literal y no interpretarla más allá del alcance textual.
  doctrine_reference: Principios de la traducción POB sobre fidelidad al alcance semántico del pasaje y preservación de la metáfora bíblica
translation_notes:
  revision_awareness: La revisión inglesa más reciente prefirió 'strengthened Rehoboam' en lugar de una fórmula perifrástica como 'made ... strong'. En español, 'fortalecieron' ya cubre de forma natural y consistente ambos verbos hebreos, así que no fue necesario distinguirlos con una perífrasis. Se mantuvo la repetición semántica del hebreo y la nota alternativa preserva la posibilidad de leer el segundo verbo de modo más directo sobre Roboam.
  spanish_consistency_notes:
  - Se usa 'Yahvé' según la terminología POB, pero este versículo no contiene el nombre divino y no requiere mención explícita.
  - Se conserva 'Roboam' como transliteración estándar en español bíblico.
  - Se mantiene la repetición de 'por tres años' para reflejar el paralelismo hebreo.
  - '''Camino'' se traduce de forma literal como metáfora ética, sin convertirla en una paráfrasis doctrinal.'
