base_translation:
  language: en
  yaml_path: translation/ot/exodus/019/009.yaml
  text: And Yahweh said to Moses[a], “Behold, I am coming to you in a thick cloud, so that the people may hear when I speak with you, and may also believe in you forever.” Then Moses told Yahweh the words of the people.
  footnotes:
