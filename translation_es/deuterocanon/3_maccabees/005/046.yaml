translation:
  language: es
  text: Alrededor del amanecer[a], cuando la ciudad ya estaba llena de innumerables multitudes en el hipódromo, él entró en el patio real y instó al rey acerca del asunto en cuestión.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hacia el amanecer»; el griego περὶ τὴν ἕω indica una hora aproximada cercana al alba.
    reason: lexical_alternative
lexical_decisions:
- source_word: περὶ τὴν ἕω
  english_pob_choice: Around dawn
  chosen_spanish: Alrededor del amanecer
  alternatives_spanish:
  - Hacia el amanecer
  - Casi al amanecer
  lexicon: LSJ
  rationale: La expresión es temporal y aproxima el momento del día. «Alrededor del amanecer» conserva el valor aproximativo de περὶ y suena natural en español moderno.
- source_word: πλήθεσιν ἀναριθμήτοις
  english_pob_choice: with innumerable crowds
  chosen_spanish: con innumerables multitudes
  alternatives_spanish:
  - con muchedumbres incontables
  - con masas innumerables
  lexicon: LSJ
  rationale: πλήθεσιν apunta a grandes grupos de personas y ἀναριθμήτοις intensifica la idea de que no se pueden contar. «Innumerables multitudes» mantiene ese énfasis hiperbólico sin perder claridad.
- source_word: κατὰ τοῦ ἱπποδρόμου καταμεστωμένης
  english_pob_choice: filled ... at the hippodrome
  chosen_spanish: junto al hipódromo
  alternatives_spanish:
  - en el área del hipódromo
  - alrededor del hipódromo
  lexicon: LSJ
  rationale: La construcción indica que la ciudad estaba abarrotada en relación con el hipódromo; en español, «junto al hipódromo» comunica la localización de manera natural y evita una calca rígida.
- source_word: εἰσελθὼν εἰς τὴν αὐλήν
  english_pob_choice: he entered the court
  chosen_spanish: entró en el patio real
  alternatives_spanish:
  - entró en la corte
  - entró en el patio
  lexicon: LSJ
  rationale: αὐλή puede significar patio, patio real o corte/cortile palaciego. Como el contexto es el acceso al rey, «patio real» conserva la referencia espacial y la posible resonancia palaciega.
- source_word: ἐπὶ τὸ προκείμενον
  english_pob_choice: concerning the matter at hand
  chosen_spanish: en cuanto al asunto que tenía delante
  alternatives_spanish:
  - respecto al asunto presente
  - sobre lo que estaba ante él
  lexicon: LSJ
  rationale: La frase idiomática alude a lo que está puesto delante como asunto del momento. «En cuanto al asunto que tenía delante» refleja esa imagen sin perder la fuerza idiomática.
- source_word: ὤτρυνε
  english_pob_choice: urged ... on
  chosen_spanish: urgió al rey
  alternatives_spanish:
  - apremió al rey
  - instó al rey
  lexicon: LSJ
  rationale: ὀτρύνω puede significar animar, apremiar o instar. «Urgió al rey» preserva la presión hacia la acción sin cargar el texto con una interpretación más específica que la del griego.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto griego y el cierre revisado del POB inglés: se conserva el valor aproximativo de περὶ τὴν ἕω, se refleja la idea de multitudes innumerables, y se evita sobrerrepresentar κατὰ τοῦ ἱπποδρόμου con una imagen demasiado expansiva. También se mantiene la ambigüedad de αὐλή con una opción palaciega plausible en español.'
  spanish_consistency_notes:
  - Se usó «Yahvé» como término por defecto solo cuando el texto lo requiera; aquí no aparece.
  - Se evitó «Cristo/Mesías» porque el pasaje no contiene ese léxico.
  - Se prefirió «urgió» para conservar el matiz de presión/impulso de ὤτρυνε sin volverlo más fuerte que el griego.
  - «Patio real» busca equilibrar la ambigüedad de αὐλή entre patio y recinto palaciego, en línea con la nota de alternativa lexical del POB inglés.
