  text: Τότε Ἡρῴδης ἰδὼν ὅτι ἐνεπαίχθη ὑπὸ τῶν μάγων ἐθυμώθη λίαν, καὶ ἀποστείλας ἀνεῖλεν πάντας τοὺς παῖδας τοὺς ἐν Βηθλέεμ καὶ ἐν πᾶσι τοῖς ὁρίοις αὐτῆς ἀπὸ διετοῦς καὶ κατωτέρω, κατὰ τὸν χρόνον ὃν ἠκρίβωσεν παρὰ τῶν μάγων.
base_translation:
  language: en
  yaml_path: translation/nt/matthew/002/016.yaml
  text: Then Herod[a], seeing that he had been tricked by the magi, became very angry, and sending men, he killed all the boys in Bethlehem and in all its surrounding districts, from two years old and under[b], according to the time that he had determined from the magi.
  footnotes:
  - marker: a
    text: Or, more literally, 'had been mocked' by the magi.
    reason: lexical_alternative
  - marker: b
    text: Traditionally, 'wise men.' The Greek term is magi, referring to eastern sage-astrologers.
    reason: cultural_note
translation:
  language: ko
  text: 그때 헤롯이 박사들에게 속은 것을 알고 크게 분노하여, 사람을 보내 베들레헴과 그 모든 인근 지역에서 두 살부터 그 아래의 사내아이들을 다 죽였습니다. 박사들에게서 알아낸 그 시간에 따른 것이었습니다.
  philosophy: optimal-equivalence
