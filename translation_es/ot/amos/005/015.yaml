revisions:
- from: Odiad el mal[a], y amad el bien, y estableced la justicia en la puerta; quizá Yahvé, el Dios de los ejércitos[c][b], tendrá compasión del remanente de José.
  to: Odien el mal[a] y amen el bien; establezcan la justicia en la puerta. Quizá Yahvé, Dios de las huestes[c][b], sea propicio al remanente de José.
  rationale: Se ajusta el español al registro neutral y eclesial amplio, evitando imperativos peninsulares arcaizantes. Se corrige יֶחֱנַן con 'sea propicio' para conservar mejor la idea de gracia/favor divino sin convertirla en mera compasión. Se afina אֱלֹהֵי צְבָאוֹת como 'Dios de las huestes' para reflejar mejor el alcance de 'hosts'. También se corrige la nota alternativa para que realmente ofrezca la variante documentada.
  reviewer_model: gpt-5.4
