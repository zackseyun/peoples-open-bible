translation:
  language: es
  text: Un pobre y un opresor[a] se encuentran; Yahvé ilumina[b] los ojos de ambos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un hombre de opresiones»; la expresión hebrea puede referirse a una persona explotadora u opresiva, y también se ha entendido como «un hombre engañoso» o «un usurero».
    reason: lexical_alternative
  - marker: b
    text: La expresión «ilumina los ojos» puede significar dar vista, dar vida o sostener e iluminar.
    reason: lexical_alternative
lexical_decisions:
- source_word: רָשׁ
  english_pob_choice: poor man
  chosen_spanish: un pobre
  alternatives_spanish:
  - un hombre pobre
  - el pobre
  lexicon: HALOT
  rationale: רָשׁ designa a una persona pobre o necesitada. En español, «un pobre» conserva la brevedad proverbial y el paralelismo con el segundo miembro sin sobrecargar el verso.
- source_word: אִישׁ תְּכָכִים
  english_pob_choice: an oppressor
  chosen_spanish: un opresor
  alternatives_spanish:
  - un hombre de opresiones
  - un hombre engañoso
  - un usurero
  lexicon: HALOT
  rationale: La expresión es difícil, pero el audit trail inglés la entiende en sentido de trato explotador u opresivo. «Opresor» comunica ese valor en español de forma natural, sin perder la tensión semántica de la frase hebrea.
- source_word: נִפְגָּשׁוּ
  english_pob_choice: meet together
  chosen_spanish: se encuentran juntos
  alternatives_spanish:
  - se encuentran
  - se topan
  - se hallan
  lexicon: HALOT
  rationale: El nifal de פגשׁ indica encontrarse o tropezarse. «Se encuentran juntos» mantiene el matiz concreto del encuentro y refleja la idea de compartir una misma condición, como en la lectura inglesa.
- source_word: מֵאִיר
  english_pob_choice: gives light
  chosen_spanish: ilumina
  alternatives_spanish:
  - da luz
  - alumbra
  - da vista
  lexicon: HALOT
  rationale: El participio hifil de אור significa causar luz. En español, «ilumina» conserva la metáfora y permite dejar abierta la tensión registrada en el inglés entre vista, vida y sostén/enlightenment.
- source_word: עֵינֵי שְׁנֵיהֶם
  english_pob_choice: the eyes of both of them
  chosen_spanish: los ojos de ambos
  alternatives_spanish:
  - los ojos de los dos
  - ambos ojos
  - los ojos de los dos
  lexicon: HALOT
  rationale: La construcción de estado constructo se vierte de manera directa. «Los ojos de ambos» es natural en español y conserva el énfasis en la igualdad de los dos sujetos.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  lexicon: HALOT
  rationale: Se mantiene la transliteración del nombre divino según la práctica del proyecto, evitando la sustitución por un título y preservando el nombre personal revelado en el hebreo.
theological_decisions:
- issue: 'Sentido del segundo hemistiquio: ¿vista, vida o iluminación providencial/espiritual?'
  english_pob_reading: The LORD is the one who gives life/light/sight equally to both the poor and the oppressor.
  chosen_spanish_reading: Yahvé ilumina los ojos de ambos, dejando abierta la posibilidad de vista, vida o sostén iluminador.
  alternative_spanish_readings:
  - Yahvé da vista a los ojos de ambos.
  - Yahvé da vida y luz a ambos.
  - Yahvé los ilumina a los dos.
  rationale: El hebreo dice explícitamente que Yahvé «da luz a los ojos» de ambos. Como en la nota inglesa, la imagen puede referirse a visión, vida o vivificación/iluminación providencial. La redacción española conserva la imagen sin resolverla demasiado.
  doctrine_reference: 'Translation philosophy §3: preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el audit trail inglés sin depender mecánicamente de él: conserva la rareza semántica de אִישׁ תְּכָכִים con una solución idiomática en español, mantiene la ambigüedad de מֵאִיר עֵינֵי, y refleja la decisión del proyecto de traducir el Tetragrámaton como Yahvé. No se registran revisiones previas en el paquete fuente.'
  spanish_consistency_notes:
  - Se usa «Yahvé» en lugar de «SEÑOR» conforme al estándar del proyecto.
  - Se evita «Cristo» y otras terminologías no presentes en el verso.
  - «Opresor» y no «siervo»/«hombre» conserva la fuerza del campo semántico sugerido por el audit trail.
  - La puntuación y el orden de miembros siguen la estructura proverbial hebrea con cadencia natural en español.
