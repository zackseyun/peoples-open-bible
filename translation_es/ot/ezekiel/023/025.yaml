translation:
  language: es
  text: Pondré mis celos contra ti[a], y te tratarán con furor. Te quitarán la nariz y las orejas, y tu resto caerá a espada. Tomarán tus hijos y tus hijas, y tu remanente[b] será consumido por fuego.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'mi celo'. El hebreo puede expresar tanto 'celos' como 'celo'; aquí se prefiere 'mis celos' para conservar la fuerza relacional y pactual del juicio en este contexto.
    reason: lexical_alternative
  - marker: b
    text: O 'lo que queda de ti' o 'tu final'. Aquí el hebreo probablemente se refiere a los que o lo que quedan tras la devastación.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָתַתִּי
  english_pob_choice: I will set
  chosen_spanish: Pondré
  alternatives_spanish:
  - Pondré en
  - Colocaré
  lexicon: HALOT
  rationale: נתן tiene el sentido básico de 'dar/poner/colocar'. En esta construcción judicial con קִנְאָה y בְּ, un verbo breve y directo como 'poner' comunica bien la dirección hostil del acto sin forzar una estructura demasiado literal.
- source_word: קִנְאָתִי
  english_pob_choice: my jealousy
  chosen_spanish: mi celo
  alternatives_spanish:
  - mi celosía
  - mi celo ardiente
  lexicon: HALOT
  rationale: קִנְאָה puede ser 'celos' o 'celo'. Aquí la POB inglesa eligió 'jealousy' para conservar la tensión pactual y relacional del juicio; en español, 'celo' evita la posible connotación psicológica de 'celos' y mantiene esa fuerza pactual. No se resuelve la tensión entre celo y celos, sino que se la deja abierta.
- source_word: בָּךְ
  english_pob_choice: against you
  chosen_spanish: contra ti
  alternatives_spanish:
  - sobre ti
  - en ti
  lexicon: HALOT
  rationale: El valor adversativo del complemento se expresa naturalmente en español con 'contra ti', más claro que una versión más literal pero menos idiomática.
- source_word: וְעָשׂוּ אוֹתָךְ בְּחֵמָה
  english_pob_choice: they will deal with you in wrath
  chosen_spanish: te tratarán con furor
  alternatives_spanish:
  - te actuarán con ira
  - te harán con ira
  lexicon: HALOT
  rationale: עָשָׂה con objeto y בְּחֵמָה funciona de modo idiomático para una acción hostil. 'Tratarán con furor' reproduce el sentido de actuar contra alguien con violencia emocional y judicial sin sobreexplicar.
- source_word: חֵמָה
  english_pob_choice: wrath
  chosen_spanish: furor
  alternatives_spanish:
  - ira
  - ira ardiente
  lexicon: HALOT
  rationale: En este contexto profético de castigo, 'furor' conserva la intensidad del juicio. 'Ira' también sería posible, pero 'furor' refleja mejor el carácter violento de la acción humana descrita.
- source_word: וְאָזְנַיִךְ יָסִירוּ
  english_pob_choice: They will remove your nose and your ears
  chosen_spanish: Te quitarán la nariz y las orejas
  alternatives_spanish:
  - Te arrancarán la nariz y las orejas
  - Te removerán la nariz y las orejas
  lexicon: HALOT
  rationale: סוּר en Hifil significa 'quitar/remover'. 'Quitarán' preserva la base lexical sin especificar el método. Se evita 'arrancar' en el texto principal porque añade una precisión que el verbo hebreo no exige, aunque la mutilación pueda estar implícita por el contexto.
- source_word: וְאַחֲרִיתֵךְ
  english_pob_choice: your survivors / your remnant
  chosen_spanish: tu resto
  alternatives_spanish:
  - tu remanente
  - lo que quede de ti
  - tu posteridad
  lexicon: HALOT
  rationale: אַחֲרִית puede significar 'fin', 'futuro' o 'lo que queda'. Aquí, como en la lectura inglesa auditada, el contexto sugiere lo que sobrevive tras la devastación. 'Resto' mantiene esa ambigüedad entre resto humano y lo que queda de la ciudad/pueblo.
- source_word: בַּחֶרֶב תִּפּוֹל
  english_pob_choice: will fall by the sword
  chosen_spanish: caerá a espada
  alternatives_spanish:
  - caerá por la espada
  - morirá a espada
  lexicon: HALOT
  rationale: La expresión idiomática española 'a espada' transmite la muerte violenta en guerra o ejecución y conserva la concisión del hebreo.
- source_word: הֵמָּה
  english_pob_choice: They
  chosen_spanish: Tomarán
  alternatives_spanish:
  - Ellos tomarán
  - Esos tomarán
  lexicon: HALOT
  rationale: El pronombre independiente marca énfasis en hebreo, pero en español puede integrarse en la conjugación verbal. No se pierde la referencia a los agentes hostiles porque el contexto ya los identifica claramente.
- source_word: יִקָּחוּ
  english_pob_choice: will take
  chosen_spanish: Tomarán
  alternatives_spanish:
  - Se llevarán
  - Prenderán
  lexicon: HALOT
  rationale: לקח significa ampliamente 'tomar'. En el contexto de conquista y deportación, 'tomarán' es suficientemente amplio y no especifica más de lo que el hebreo afirma.
- source_word: תֵּאָכֵל בָּאֵשׁ
  english_pob_choice: will be consumed by fire
  chosen_spanish: será consumido por fuego
  alternatives_spanish:
  - será consumido por el fuego
  - será devorado por el fuego
  - será quemado
  lexicon: HALOT
  rationale: 'El nifal de אכל expresa pasividad: ''ser comido/consumido''. ''Consumido por fuego'' conserva esa imagen destructiva. Se evita añadir el artículo para seguir de cerca el hebreo, como en la revisión inglesa.'
theological_decisions:
- issue: קִנְאָה como lenguaje de juicio pactual
  english_pob_reading: my jealousy
  chosen_spanish_reading: mi celo
  alternative_spanish_readings:
  - mis celos
  - mi celo ardiente
  rationale: El texto presenta el juicio como respuesta a una infidelidad en marco pactual/matrimonial. 'Celo' conserva la carga relacional y divina sin traducirla de forma psicológica como 'celos', que en español puede sonar demasiado interpersonal o negativo. Se preserva así la tensión teológica entre amor celoso y castigo.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica en vez de resolverla'
- issue: Posible mutilación implícita en 'remove your nose and your ears'
  english_pob_reading: They will remove your nose and your ears
  chosen_spanish_reading: Te quitarán la nariz y las orejas
  alternative_spanish_readings:
  - Te arrancarán la nariz y las orejas
  rationale: 'La POB inglesa mantiene ''remove'' en el texto principal y deja ''cut off'' como alternativa, porque el verbo hebreo no especifica el método. En español se conserva esa misma cautela: el texto principal no determina el mecanismo, aunque el contexto deja ver violencia extrema.'
  doctrine_reference: 'Translation philosophy §2: no añadir precisión no exigida por el texto'
translation_notes:
  revision_awareness: Se siguió la revisión inglesa más reciente al mantener 'consumido por fuego' sin artículo, equivalente de 'consumed by fire'. También se respetó la alternativa textual/lexical sobre la mutilación implícita y sobre אַחֲרִית como 'resto' o 'remanente'.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' solo cuando el texto fuente lo exige; aquí no aparece el tetragrámaton.
  - Se prefirió 'celo' para קִנְאָה y 'furor' para חֵמָה para conservar intensidad profética sin latinizar en exceso.
  - Se evitó 'SEÑOR' y 'Cristo' por no corresponder al pasaje.
  - Se conservó una sintaxis breve, judicial y violenta, cercana al hebreo, sin calcar de forma antinatural.
