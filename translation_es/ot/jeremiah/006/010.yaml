translation:
  language: es
  text: ¿A quién hablaré y daré aviso[a], para que oigan? Mira, su oído está incircunciso[b], y no pueden escuchar. Mira, la palabra de Yahvé ha llegado a ser un oprobio para ellos; no se deleitan en ella.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «testificaré» o «daré testimonio» por «daré aviso».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «su oído está incircunciso», metáfora de insensibilidad espiritual o de resistencia a prestar atención.'
    reason: cultural_note
lexical_decisions:
- source_word: אֲדַבְּרָה
  english_pob_choice: shall I speak
  chosen_spanish: hablaré
  alternatives_spanish:
  - debo hablar
  - hablaré acaso
  lexicon: HALOT
  rationale: La forma cohortativa en primera persona en una pregunta retórica expresa deliberación. En español, «¿A quién hablaré?» conserva naturalidad y el tono de decisión pendiente sin sobreexplicar.
- source_word: וְאָעִידָה
  english_pob_choice: and give warning
  chosen_spanish: y daré aviso
  alternatives_spanish:
  - y testificaré
  - y daré testimonio
  lexicon: HALOT
  rationale: El hifil de עוד en contexto profético implica advertir solemnemente. «Daré aviso» transmite la fuerza práctica de advertencia; «testificaré» queda como alternativa lexical posible, pero menos directa en español.
- source_word: וְיִשְׁמָעוּ
  english_pob_choice: that they may hear
  chosen_spanish: para que oigan
  alternatives_spanish:
  - y escuchen
  - para que escuchen
  lexicon: HALOT
  rationale: La relación final expresa propósito o resultado buscado. «Para que oigan» mantiene el vínculo con la advertencia anterior y suena fluido en español.
- source_word: עֲרֵלָה אָזְנָם
  english_pob_choice: their ear is uncircumcised
  chosen_spanish: su oído está incircunciso
  alternatives_spanish:
  - sus oídos están incircuncisos
  - su oreja está incircuncisa
  lexicon: HALOT
  rationale: Se preserva la metáfora covenantal de forma explícita, como en el POB inglés. «Oído» en singular sigue de cerca el hebreo y funciona de modo colectivo en español; «incircunciso» mantiene el choque idiomático que el texto exige.
- source_word: לְהַקְשִׁיב
  english_pob_choice: to listen
  chosen_spanish: escuchar
  alternatives_spanish:
  - prestar atención
  - oír con atención
  lexicon: HALOT
  rationale: «Escuchar» es la correspondencia más natural y clara para el paralelo con «oigan». Se evita «prestar atención» porque desplaza el foco hacia atención mental más que recepción auditiva.
- source_word: דְבַר יְהוָה
  english_pob_choice: the word of Yahweh
  chosen_spanish: la palabra de Yahvé
  alternatives_spanish:
  - la palabra del Señor
  lexicon: HALOT
  rationale: 'Se mantiene el nombre divino conforme al estándar POB en español: Yahvé. «La palabra» conserva el registro profético y la fórmula establecida.'
- source_word: הָיָה לָהֶם לְחֶרְפָּה
  english_pob_choice: has become a reproach to them
  chosen_spanish: ha venido a ser para ellos un oprobio
  alternatives_spanish:
  - les ha resultado un reproche
  - se ha vuelto para ellos una vergüenza
  lexicon: HALOT
  rationale: «Ha venido a ser» refleja el valor resultativo del hebreo. «Oprobio» conserva el tono bíblico de desprecio público o vergüenza cargada de rechazo; es más preciso que simplificarlo a «vergüenza».
- source_word: לֹא יַחְפְּצוּ בֽוֹ
  english_pob_choice: they take no delight in it
  chosen_spanish: no se deleitan en ella
  alternatives_spanish:
  - no la desean
  - no tienen gusto en ella
  lexicon: HALOT
  rationale: חפץ expresa deleite o deseo. «No se deleitan en ella» recoge el matiz afectivo del rechazo; el pronombre femenino concuerda con «la palabra».
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el Señor
  rationale: El POB inglés actualizado usa «Yahweh» para el Tetragrámaton; en español, la forma establecida por el proyecto es «Yahvé». Se evita la sustitución por «el Señor» para no ocultar el nombre del pacto presente en el hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Metáfora de «oído incircunciso»
  english_pob_reading: Retain the metaphor explicitly as 'their ear is uncircumcised'
  chosen_spanish_reading: su oído está incircunciso
  alternative_spanish_readings:
  - tienen el oído cerrado
  - son espiritualmente sordos
  rationale: Se preserva la imagen corporal y covenantal del hebreo, como hace el POB inglés. La frase no se desactiva en paráfrasis explicativa dentro del texto principal; la tensión metafórica queda visible para el lector.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 3, 6
- issue: Relación entre escuchar y obedecer en el contexto profético
  english_pob_reading: that they may hear
  chosen_spanish_reading: para que oigan
  alternative_spanish_readings:
  - para que escuchen y hagan caso
  - para que presten oído
  rationale: El hebreo apunta primero a la recepción auditiva en respuesta al aviso profético. «Oigan» mantiene esa base semántica sin añadir obediencia explícita que el verso no verbaliza.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 6
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del POB inglés, que ajustó la relación final a «that they may hear» para una formulación más directa. En español se reflejó con «para que oigan», manteniendo el tono deliberativo y el paralelismo del versículo. No se introdujeron cambios doctrinales respecto al tratamiento del nombre divino ni de la metáfora del oído incircunciso.
  spanish_consistency_notes:
  - Se usó «Yahvé» de manera consistente con el estándar del proyecto para יְהוָה.
  - Se mantuvo «oído» en singular para seguir de cerca el hebreo y conservar la imagen colectiva sin forzar pluralización.
  - «Oprobio» preserva el registro bíblico y evita banalizar la carga de rechazo del texto.
  - El pronombre «ella» en la última cláusula concuerda con «la palabra» y evita ambigüedad referencial.
