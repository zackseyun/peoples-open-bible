translation:
  language: es
  text: Sus atalayas son ciegos, todos ellos; no saben nada. Todos ellos son perros mudos, incapaces de ladrar, soñadores,[a] echados, amantes de dormitar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘murmuradores’ para הֹזִים; el hebreo es raro y difícil en este contexto. El texto principal sigue el sentido sugerido por la imaginería de sueño y pereza que lo rodea.
    reason: lexical_alternative
lexical_decisions:
- source_word: צפו
  english_pob_choice: His watchmen
  chosen_spanish: Sus vigilantes
  alternatives_spanish:
  - Sus atalayas
  - Sus centinelas
  - Sus guardas
  lexicon: HALOT
  rationale: El hebreo apunta a quienes están puestos para velar; el contexto de censura profética favorece un sustantivo funcional. 'Vigilantes' comunica bien la función de vigilancia y mantiene el tono natural en español. El posesivo 'sus' refleja el sentido contextual del sufijo que el POB inglés también asumió.
- source_word: עִוְרִים
  english_pob_choice: blind
  chosen_spanish: ciegos
  alternatives_spanish:
  - cegados
  - sin vista
  lexicon: HALOT
  rationale: Se conserva la imagen concreta de ceguera literal, usada metafóricamente para falta de discernimiento. 'Ciegos' es el equivalente más directo y transparente.
- source_word: לֹא יָדָעוּ
  english_pob_choice: they know nothing
  chosen_spanish: no saben nada
  alternatives_spanish:
  - no conocen nada
  - no entienden nada
  - no saben
  lexicon: HALOT
  rationale: ידע con negación expresa ausencia total de conocimiento o discernimiento. 'No saben nada' reproduce con naturalidad la fuerza idiomática del inglés POB sin suavizarla.
- source_word: כְּלָבִים אִלְּמִים
  english_pob_choice: mute dogs
  chosen_spanish: perros mudos
  alternatives_spanish:
  - perros silenciosos
  - perros callados
  - perros sin voz
  lexicon: HALOT
  rationale: '''Perros mudos'' conserva el insulto profético y la imagen zoológica con la misma dureza que el inglés POB. ''Mudos'' evita el posible sentido moderno de ''tontos'' que tendría ''dumb'' en inglés, y en español mantiene el valor de incapaces de hablar o ladrar.'
- source_word: לֹא יוּכְל֖וּ לִנְבֹּחַ
  english_pob_choice: unable to bark
  chosen_spanish: incapaces de ladrar
  alternatives_spanish:
  - no pueden ladrar
  - sin poder ladrar
  lexicon: HALOT
  rationale: La incapacidad se expresa de forma natural y concisa. 'Ladrar' conserva la metáfora canina y el tono acusatorio del pasaje.
- source_word: הֹזִים
  english_pob_choice: dreamers
  chosen_spanish: soñadores
  alternatives_spanish:
  - soñando
  - quienes sueñan
  - delirantes
  - murmuradores
  lexicon: HALOT
  rationale: El participio hebreo se usa sustantivadamente; por eso 'soñadores' sigue la revisión inglesa que prefirió una forma nominal. En español también resulta más paralelo con los demás rasgos descriptivos. Se mantiene la tensión léxica del término raro sin decidirlo como una paráfrasis excesiva.
- source_word: שֹׁכְבִים
  english_pob_choice: lying down
  chosen_spanish: echados
  alternatives_spanish:
  - acostados
  - tendidos
  - echados a dormir
  lexicon: HALOT
  rationale: '''Echados'' conserva el participio y la progresión de inmovilidad/laxitud del contexto. En español suena más natural que una repetición literal de ''acostados'' junto con ''dormitar''.'
- source_word: אֹהֲבֵי לָנוּם
  english_pob_choice: loving to slumber
  chosen_spanish: amantes de dormitar
  alternatives_spanish:
  - amantes de dormir
  - dados a dormitar
  - que aman dormitar
  lexicon: HALOT
  rationale: לָנוּם denota dormir o dormir a ratos, con matiz de somnolencia; 'dormitar' captura bien ese matiz y conserva el tono poético-profético. 'Amantes de' refleja la construcción nominal hebrea y el paralelo con la lista de descriptores.
theological_decisions:
- issue: Sufijo posesivo en צפו
  english_pob_reading: His watchmen
  chosen_spanish_reading: Sus vigilantes
  alternative_spanish_readings:
  - Los vigilantes
  - Vigilantes
  rationale: El hebreo aquí se entiende con referencia posesiva contextual, como en el POB inglés. En español conviene explicitar ese referente con 'sus' para evitar perder el vínculo con la entidad criticada por el profeta. No se sustituye por una referencia más específica porque el verso no la explicita.
  doctrine_reference: Isaías 56:10; lectura contextual del posesivo en el texto profético
- issue: Naturaleza del retrato de los líderes como ciegos y mudos
  english_pob_reading: blind ... mute dogs, unable to bark
  chosen_spanish_reading: ciegos ... perros mudos, incapaces de ladrar
  alternative_spanish_readings:
  - cegados ... perros silenciosos, incapaces de ladrar
  - ciegos ... perros callados
  rationale: Se mantiene la metáfora dura y el juicio profético sin suavizarlo. El texto denuncia incapacidad moral y espiritual, pero el español conserva la literalidad de la imagen para no borrar su filo retórico.
  doctrine_reference: Denuncia profética; cf. Isaías 56:10
- issue: Sentido de הֹזִים
  english_pob_reading: dreamers
  chosen_spanish_reading: soñadores
  alternative_spanish_readings:
  - murmuradores
  - delirantes
  - visionarios
  rationale: El POB inglés, tras revisar la nota de ambigüedad, optó por una forma nominal ligada a la imaginería del sueño junto con 'lying down' y 'loving to slumber'. En español 'soñadores' mantiene esa decisión y la subordinación al cuadro de indolencia; no se convierte en una interpretación doctrinal adicional.
  doctrine_reference: Isaías 56:10; nota léxica sobre הֹזִים
translation_notes:
  revision_awareness: La revisión inglesa reciente cambió 'dreaming' por 'dreamers' para reflejar mejor el participio hebreo usado sustantivamente y para mantener el paralelismo descriptivo. La versión española sigue esa decisión con 'soñadores', en lugar de una forma verbal, y conserva la nota alternativa dada la rareza léxica de הֹזִים.
  spanish_consistency_notes:
  - Se usó 'Yahvé' como norma del proyecto solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - '''Vigilantes'' se eligió por naturalidad y función; no se forzó ''atalayas'' porque el contexto no exige una vigilancia militar específica.'
  - '''Perros mudos'' mantiene la fuerza insultante del POB inglés y evita el falso amigo moderno de ''dumb''.'
  - 'Se preservó el paralelismo de participios con sustantivos/adjetivos en español: ciegos, mudos, soñadores, echados, amantes de dormitar.'
