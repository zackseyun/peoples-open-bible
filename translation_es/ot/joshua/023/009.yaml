revisions:
- from: Porque Yahvé ha expulsado de delante de ustedes a naciones grandes y poderosas[a]; y en cuanto a ustedes[b], nadie ha podido mantenerse en pie delante de ustedes hasta el día de hoy.
  to: Porque Yahvé ha expulsado de delante de ustedes a naciones grandes y poderosas[a]; y en cuanto a ustedes, ni un hombre[b] se ha mantenido firme delante de ustedes hasta el día de hoy.
  rationale: Se revisa la segunda cláusula para acercarla más al hebreo y al audit trail del POB inglés, preservando el giro idiomático en el texto principal y dejando su explicación en la nota. «Ni un hombre se ha mantenido firme delante de ustedes» suena natural en español, conserva el singular representativo אִישׁ y evita la sobreinterpretación de «ha podido». También se corrige la nota b para que cite de manera más fiel la forma hebrea antes de explicarla.
  reviewer_model: gpt-5.4
