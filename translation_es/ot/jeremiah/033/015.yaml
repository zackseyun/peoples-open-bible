translation:
  language: es
  text: En aquellos días y en aquel tiempo yo haré brotar para David un Renuevo[a][b] justo, y él ejecutará justicia y rectitud en la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un Renuevo de justicia»; también es posible «un Renuevo recto».
    reason: lexical_alternative
  - marker: b
    text: «Renuevo» probablemente alude al gobernante davídico prometido en Jeremías 23:5.
    reason: cross_reference
lexical_decisions:
- source_word: בַּיָּמִים הָהֵם
  english_pob_choice: In those days
  chosen_spanish: En aquellos días
  alternatives_spanish:
  - En esos días
  lexicon: HALOT
  rationale: La fórmula temporal hebrea se expresa de manera natural en español con «en aquellos días», conservando el valor demostrativo y la referencia a un tiempo señalado.
- source_word: וּבָעֵת הַהִיא
  english_pob_choice: and at that time
  chosen_spanish: y en aquel tiempo
  alternatives_spanish:
  - y en ese tiempo
  - y entonces
  lexicon: HALOT
  rationale: Mantiene el paralelismo temporal sin fusionarlo con la primera expresión; «en aquel tiempo» es una fórmula idiomática y solemne en español bíblico actual.
- source_word: אַצְמִיחַ
  english_pob_choice: I will cause ... to sprout
  chosen_spanish: yo haré brotar
  alternatives_spanish:
  - yo haré crecer
  - yo levantaré
  lexicon: HALOT
  rationale: El hifil de צמח es causativo y conserva la imagen vegetal. «Haré brotar» comunica la acción causativa con buena naturalidad en español.
- source_word: לְדָוִד
  english_pob_choice: for David
  chosen_spanish: para David
  alternatives_spanish:
  - a David
  - en favor de David
  lexicon: HALOT
  rationale: «Para David» reproduce la relación beneficiaria/promisoria del ל sin expandir innecesariamente a «casa de David».
- source_word: צֶמַח
  english_pob_choice: Branch
  chosen_spanish: Renuevo
  alternatives_spanish:
  - Retoño
  - Brote
  lexicon: HALOT
  rationale: «Renuevo» conserva el campo semántico vegetal y, en español bíblico, puede funcionar como designación personal/titular sin perder inteligibilidad. Se evita «rama», que en español puede sonar menos precisa para el hebreo y más alejada de la imagen de brote nuevo.
- source_word: צְדָקָה
  english_pob_choice: righteous
  chosen_spanish: de justicia
  alternatives_spanish:
  - justo
  - de rectitud
  - de rectitud moral
  lexicon: HALOT
  rationale: La construcción hebrea admite un matiz atributivo o genitivo. En español, «Renuevo de justicia» preserva la tensión entre cualidad moral y procedencia/caracterización sin forzar un adjetivo poco natural.
- source_word: וְעָשָׂה
  english_pob_choice: and he will execute
  chosen_spanish: y él ejecutará
  alternatives_spanish:
  - y él hará
  - y él practicará
  lexicon: HALOT
  rationale: Se conserva el futuro profético con una equivalencia formal y solemne. «Ejecutará» responde bien al registro jurídico-político del contexto y al paralelismo con los términos siguientes.
- source_word: מִשְׁפָּט
  english_pob_choice: justice
  chosen_spanish: justicia
  alternatives_spanish:
  - juicio
  - derecho
  lexicon: HALOT
  rationale: En este marco de gobierno regio, «justicia» comunica mejor la idea de administración correcta que «juicio», que en español podría sonar más restringido o ambiguo.
- source_word: וּצְדָקָה
  english_pob_choice: righteousness
  chosen_spanish: rectitud
  alternatives_spanish:
  - justicia
  - justeza
  lexicon: HALOT
  rationale: Se evita repetir «justicia» para diferenciar los dos términos hebreos del paralelismo. «Rectitud» conserva el peso ético y relacional de צְדָקָה sin diluir el binomio.
- source_word: בָּאָרֶץ
  english_pob_choice: in the land
  chosen_spanish: en la tierra
  alternatives_spanish:
  - en el país
  - en la tierra prometida
  lexicon: HALOT
  rationale: «La tierra» puede abarcar el valor territorial-covenantal del hebreo sin restringirse a un concepto meramente geográfico ni expandirse a «el país», que sería más estrecho en este contexto.
theological_decisions:
- issue: Carácter mesiánico de צֶמַח
  english_pob_reading: Treat צֶמַח as a messianic royal title and capitalize it as 'Branch.'
  chosen_spanish_reading: Tratar צֶמַח como designación real mesiánica y traducirlo como «Renuevo» con mayúscula inicial.
  alternative_spanish_readings:
  - Traducirlo como «retoño» en minúscula
  - Traducirlo como «rama» en minúscula
  rationale: Jeremías 33:15 retoma el motivo davídico ya presente en Jeremías 23:5. La mayúscula inicial en español ayuda a señalar el posible valor titular sin añadir contenido ajeno al texto, mientras que «Renuevo» conserva la metáfora vegetal.
  doctrine_reference: Afines al paralelismo profético y a la promesa davídica; filosofía de traducción óptima
- issue: Tensión entre צְדָקָה como cualidad y como complemento nominal
  english_pob_reading: '''a righteous Branch'' / ''a Branch of righteousness''; also possible ''a just Branch.'''
  chosen_spanish_reading: «Renuevo de justicia», preservando la ambigüedad entre cualidad moral y complemento descriptivo.
  alternative_spanish_readings:
  - «Renuevo justo»
  - «Renuevo de rectitud»
  rationale: El hebreo permite una lectura atributiva o genitiva. El español puede conservar esa amplitud mejor con una construcción nominal que con un adjetivo que cierre demasiado el sentido.
  doctrine_reference: Lexical ambiguity preservation; just/rightness language in prophetic texts
- issue: Paralelismo משפט/צדקה
  english_pob_reading: justice and righteousness
  chosen_spanish_reading: «justicia y rectitud»
  alternative_spanish_readings:
  - «juicio y justicia»
  - «justicia y justicia»
  rationale: La combinación conserva el binomio clásico sin neutralizar las diferencias léxicas hebreas. «Rectitud» permite distinguir צְדָקָה de מִשְׁפָּט y mantiene un registro digno y bíblico.
  doctrine_reference: Prophetic kingship and covenant justice
translation_notes:
  revision_awareness: La redacción sigue de cerca la revisión final del POB en inglés, que prefirió «execute justice and righteousness» por un registro más formal. En español se reflejó ese ajuste con «ejecutará justicia y rectitud», manteniendo el paralelismo, la imagen de brotar y el matiz mesiánico del «Renuevo».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estándar del proyecto solo cuando aparece el nombre divino; aquí no aparece.
  - Se usó mayúscula en «Renuevo» para señalar posible función titular, coherente con la capitalización inglesa de 'Branch'.
  - Se evitó «Cristo» porque el texto hebreo presenta un motivo davídico/titular, no el nombre propio griego/latino.
  - «Rectitud» se eligió para conservar la distinción con «justicia» y no aplastar el paralelismo hebreo.
