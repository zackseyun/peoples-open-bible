translation:
  language: es
  text: Israel lo hirió al filo de la espada, y tomó posesión de su tierra, desde el Arnón hasta el Jaboc, hasta los hijos de Amón[a], porque el límite de los hijos de Amón era fuerte.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, de manera más idiomática, «hasta los amonitas» ... «porque el límite de los amonitas era fuerte».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּכֵּהוּ
  english_pob_choice: struck him
  chosen_spanish: lo hirió
  alternatives_spanish:
  - lo golpeó
  - lo derrotó
  - lo mató
  lexicon: HALOT
  rationale: El hebreo נכה expresa la acción de herir/golpear. «Lo hirió» conserva esa fuerza verbal sin especificar más de lo que el texto dice. «Lo derrotó» o «lo mató» van más allá del valor léxico inmediato; «lo golpeó» es posible, pero en este contexto militar «hirió» suena más natural y adecuado.
- source_word: לְפִי חָרֶב
  english_pob_choice: with the edge of the sword
  chosen_spanish: con la punta de la espada
  alternatives_spanish:
  - con el filo de la espada
  - con la espada
  - por la espada
  lexicon: HALOT
  rationale: La expresión hebrea literalmente alude a la «boca» o borde del arma. En español, «con la punta de la espada» comunica la imagen de un golpe dirigido con el extremo cortante sin sonar tan forzado como una traducción literal. «Con el filo de la espada» también es viable, pero aquí la forma elegida mantiene mejor la transparencia del giro hebreo y la fluidez en español.
- source_word: וַיִּירַשׁ
  english_pob_choice: took possession of
  chosen_spanish: tomó posesión de
  alternatives_spanish:
  - poseyó
  - heredó
  - despojó
  lexicon: HALOT
  rationale: El verbo ירש en este contexto territorial expresa la adquisición de una tierra. «Tomó posesión de» refleja bien esa acción de dominio sobre el territorio sin introducir la idea de herencia, que sería engañosa aquí. «Poseyó» resulta menos natural en español bíblico; «despojó» añade una implicación no explícita.
- source_word: אַרְצוֹ
  english_pob_choice: his land
  chosen_spanish: su tierra
  alternatives_spanish:
  - su territorio
  - su país
  lexicon: HALOT
  rationale: «Tierra» es la equivalencia más directa de אֶרֶץ en este marco geográfico. «Territorio» es más técnico e interpretativo; «país» suena demasiado moderno y político.
- source_word: מֵאַרְנֹן עַד יַבֹּק
  english_pob_choice: from the Arnon as far as the Jabbok
  chosen_spanish: desde el Arnón hasta el Jaboc
  alternatives_spanish:
  - del Arnón al Jaboc
  - desde Arnón hasta Jaboc
  lexicon: HALOT
  rationale: El par preposicional marca extensión territorial. «Desde ... hasta ...» reproduce bien el alcance del hebreo y es natural en español. Se mantienen los nombres propios con transliteración usual para el lector bíblico.
- source_word: עַד בְּנֵי עַמּוֹן
  english_pob_choice: as far as the sons of Ammon
  chosen_spanish: hasta los hijos de Amón
  alternatives_spanish:
  - hasta los amonitas
  - hasta el pueblo de Amón
  lexicon: HALOT
  rationale: Se conserva la expresión kinship-ethnic del hebreo. En español, «hijos de Amón» es comprensible y transparente. «Amonitas» es una alternativa más idiomática, pero menos literal; «pueblo de Amón» suaviza el vínculo con el original.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  - for
  lexicon: HALOT
  rationale: Aquí introduce la explicación de por qué el avance llegó solo hasta ese punto. «Porque» expresa con claridad la relación causal en español moderno; «pues» o «ya que» también funcionarían, pero son menos directos.
- source_word: עַז
  english_pob_choice: strong
  chosen_spanish: fuerte
  alternatives_spanish:
  - firme
  - poderoso
  - fortificado
  lexicon: HALOT
  rationale: «Fuerte» es la opción más natural para עַז en referencia a un límite fronterizo. Conserva la idea de resistencia o firmeza sin precisar excesivamente si es fortificado o solo robusto.
- source_word: גְּבוּל
  english_pob_choice: border
  chosen_spanish: límite
  alternatives_spanish:
  - frontera
  - borde
  - confín
  lexicon: HALOT
  rationale: En español, «límite» resulta muy natural para una demarcación territorial. «Frontera» es posible, pero puede sugerir una noción más moderna; «borde» y «confín» suenan menos precisos en este contexto.
- source_word: בְּנֵי עַמּוֹן
  english_pob_choice: the sons of Ammon
  chosen_spanish: los hijos de Amón
  alternatives_spanish:
  - los amonitas
  - el pueblo de Amón
  lexicon: HALOT
  rationale: La repetición del sintagma mantiene la estructura hebrea. Se conserva «hijos de Amón» por transparencia y por la preferencia del proyecto por rendir literalmente el término de parentesco-ethnos cuando sigue siendo claro.
theological_decisions:
- issue: Renderización de בְּנֵי עַמּוֹן como expresión étnica masculina
  english_pob_reading: the sons of Ammon
  chosen_spanish_reading: los hijos de Amón
  alternative_spanish_readings:
  - los amonitas
  - el pueblo de Amón
  rationale: No es una cuestión doctrinal central, pero sí de política traductológica. La forma hebrea usa un término de parentesco masculino con valor étnico. Se preserva en la línea principal por transparencia, mientras que la alternativa idiomática queda implícita en el trabajo lexical para lectores que prefieran una expresión colectiva.
  doctrine_reference: Translation philosophy §4 (Gender-accurate over gender-neutral)
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y coincide con la evaluación inglesa de alta concordancia; no se detectaron revisiones aplicadas en el expediente fuente. La principal decisión de estilo fue escoger una equivalencia española natural para לְפִי חָרֶב sin perder la imagen bélica del original.
  spanish_consistency_notes:
  - Se mantiene Yahvé para el Tetragrámaton como norma del proyecto, aunque este versículo no lo contiene.
  - Se usa «hijos de Amón» de forma consistente para preservar la transparencia del sintagma hebreo y la estructura repetida del versículo.
  - «Tierra» y «límite» se usan en sentido territorial, evitando modernizaciones como «país» o «frontera» cuando no añaden precisión.
