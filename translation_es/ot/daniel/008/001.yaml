  text: בִּ/שְׁנַ֣ת שָׁל֔וֹשׁ לְ/מַלְכ֖וּת בֵּלְאשַׁצַּ֣ר הַ/מֶּ֑לֶךְ חָז֞וֹן נִרְאָ֤ה אֵלַ/י֙ אֲנִ֣י דָנִיֵּ֔אל אַחֲרֵ֛י הַ/נִּרְאָ֥ה אֵלַ֖/י בַּ/תְּחִלָּֽה׃
base_translation:
  language: en
  yaml_path: translation/ot/daniel/008/001.yaml
  text: In the third year of the reign of Belshazzar the king[a], a vision appeared to me—I, Daniel—after the one that had appeared to me at the first.
  footnotes:
  - marker: a
    text: Or, more explicitly, 'after the vision that had appeared to me at the first.' The Hebrew refers back to an earlier appearing and likely alludes to Daniel's previous vision.
    reason: lexical_alternative
