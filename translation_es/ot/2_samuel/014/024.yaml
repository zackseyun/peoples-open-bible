translation:
  language: es
  text: 'Pero el rey dijo[a]: «Que se vaya a su casa, y no vea mi rostro». Entonces Absalón se fue a su casa y no vio el rostro del rey.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: ‘ver mi rostro’ / ‘el rostro del rey’, un modismo para estar en la presencia de alguien o recibir audiencia.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יִסֹּב / וַיִּסֹּב (סבב)
  english_pob_choice: turn aside / turned aside
  chosen_spanish: vuelva / volvió
  alternatives_spanish:
  - se aparte / se apartó
  - regrese / regresó
  - se desvíe / se desvió
  lexicon: HALOT
  rationale: En este contexto con אֶל בֵּיתוֹ, la idea no es meramente ‘ir’, sino dirigirse de vuelta hacia su propia casa y apartarse de la presencia del rey. En español, ‘volver’ comunica con naturalidad ese desplazamiento repetido sin perder el matiz de alejamiento implícito en el hebreo.
- source_word: בֵּיתוֹ
  english_pob_choice: his own house
  chosen_spanish: su casa
  alternatives_spanish:
  - su propia casa
  - su hogar
  lexicon: HALOT
  rationale: ‘Casa’ mantiene el sentido básico de בַּיִת. El posesivo ya está claro por el contexto y por el pronombre en español, por lo que no es necesario forzar ‘propia’ en el texto principal.
- source_word: וּפָנַי ... לֹא יִרְאֶה
  english_pob_choice: and let him not see my face
  chosen_spanish: y no vea mi rostro
  alternatives_spanish:
  - y no vea mi cara
  - y no venga a mi presencia
  lexicon: HALOT
  rationale: Se conserva literalmente la imagen de ‘rostro’, como en el hebreo, porque funciona como idiomatismo de acceso o audiencia. ‘Rostro’ suena más solemne y mantiene mejor la repetición interna del verso que una paráfrasis con ‘presencia’.
- source_word: וּפְנֵי הַמֶּלֶךְ לֹא רָאָה
  english_pob_choice: and did not see the king’s face
  chosen_spanish: no vio el rostro del rey
  alternatives_spanish:
  - no vio la cara del rey
  - no se le concedió audiencia con el rey
  lexicon: HALOT
  rationale: La repetición del mismo idiomatismo se conserva para reflejar el paralelismo hebreo y la negativa de acceso. ‘Rostro del rey’ reproduce con fidelidad la forma concreta de la expresión original.
- source_word: הַמֶּלֶךְ
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - el monarca
  lexicon: HALOT
  rationale: ‘Rey’ es la equivalencia natural y estándar de מֶלֶךְ en español bíblico contemporáneo.
- source_word: אַבְשָׁלוֹם
  english_pob_choice: Absalom
  chosen_spanish: Absalón
  alternatives_spanish:
  - Absalom
  lexicon: standard transliteration
  rationale: Se usa la forma usual en español bíblico, ‘Absalón’, que es reconocible y lecturable en español sin perder la identidad del nombre propio.
- source_word: וַיֹּאמֶר
  english_pob_choice: But the king said
  chosen_spanish: Pero el rey dijo
  alternatives_spanish:
  - Y el rey dijo
  - Entonces el rey dijo
  lexicon: HALOT
  rationale: ‘Pero’ capta bien el giro narrativo frente al contexto inmediato, donde la acción previa no conduce a una recepción favorable. En español fluye naturalmente y refleja el matiz adversativo que el audit trail inglés destacó.
theological_decisions:
- issue: Idiom of seeing the king’s face as access/presence
  english_pob_reading: Preserve the idiom literally in the main text
  chosen_spanish_reading: Conservar literalmente ‘ver mi rostro / el rostro del rey’
  alternative_spanish_readings:
  - no entrar en mi presencia
  - no ser admitido ante el rey
  rationale: No hay una cuestión doctrinal en disputa, pero sí una tensión de traducción entre literalidad y sentido. Mantener el idiomático ‘rostro’ preserva la textura hebrea y deja visible la idea de acceso restringido sin reemplazarla por una explicación interpretativa.
  doctrine_reference: Translation philosophy §1, §3, §6
translation_notes:
  revision_awareness: El texto inglés de referencia no fue modificado en la última revisión; el pasaje quedó en alto acuerdo y sin cambios. La versión española sigue esa decisión, conservando la repetición del idiomatismo y el contraste narrativo sin añadir explicación intratextual.
  spanish_consistency_notes:
  - Se mantiene ‘rostro’ de manera consistente para פָּנִים en ambas ocurrencias, en armonía con la decisión léxica del inglés POB.
  - Se usa ‘rey’ para מֶלֶךְ y la forma española usual ‘Absalón’ para el nombre propio.
  - El tono es bíblico contemporáneo, sobrio y publicable, sin calcos innecesarios ni paráfrasis explicativas en el cuerpo del versículo.
