id: ACT.6.1
reference: Acts 6:1
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Ἐν δὲ ταῖς ἡμέραις ταύταις πληθυνόντων τῶν μαθητῶν ἐγένετο γογγυσμὸς τῶν Ἑλληνιστῶν πρὸς τοὺς Ἑβραίους ὅτι παρεθεωροῦντο ἐν τῇ διακονίᾳ τῇ καθημερινῇ αἱ χῆραι αὐτῶν.
base_translation:
  language: en
  yaml_path: translation/nt/acts/006/001.yaml
  text: Now in those days[a], as the disciples were increasing in number, a complaint arose from the Hellenists against the Hebrews[b], because their widows were being overlooked in the daily distribution.
  footnotes:
  - marker: a
    text: That is, likely Greek-speaking Jews, in contrast to the 'Hebrews,' likely Aramaic- or Hebrew-speaking Jews.
    reason: cultural_note
  - marker: b
    text: Or 'were being neglected' in the daily service/ministry.
    reason: lexical_alternative
translation:
  language: ko
  text: 그 무렵에 제자들이 늘어나고 있었는데, 헬라어를 쓰는 유대인들이[a] 히브리어를 쓰는 유대인들에게 불만을 나타냈습니다. 자기들의 과부들이 매일의 분배에서 소홀히 여겨졌기 때문입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 「헬라어를 쓰는 유대인들」(Ἑλληνισταί)은 헬라어를 모어로 사용하는 디아스포라 유대인들이고, 「히브리어를 쓰는 유대인들」(Ἑβραῖοι)은 아람어/히브리어를 사용한 유대인들로 추정된다.
    reason: cultural_note
