translation:
  language: es
  text: 'Mientras estaban cerca de la casa de Micaía, reconocieron la voz del joven levita. Entonces se desviaron hacia allí y le dijeron: «¿Quién te trajo hasta aquí? ¿Qué haces en este lugar[a]? ¿Y qué tienes aquí[b]?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Qué haces aquí?». El hebreo dice literalmente: «¿Qué haces en esto?»'
    reason: lexical_alternative
  - marker: b
    text: 'O: «¿Cuál es tu negocio aquí?» para «¿Y qué tienes aquí?»'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵמָּה עִם בֵּית מִיכָה
  english_pob_choice: While they were near Micah’s house
  chosen_spanish: Mientras estaban cerca de la casa de Micaía
  alternatives_spanish:
  - Cuando estaban en la casa de Micaía
  - Mientras estaban junto a la casa de Micaía
  lexicon: HALOT
  rationale: עִם puede expresar proximidad, no solo compañía. En español, «cerca de» comunica con naturalidad la relación locativa que el contexto narrativo exige sin forzar una idea de permanencia dentro de la casa.
- source_word: הִכִּירוּ
  english_pob_choice: recognized
  chosen_spanish: reconocieron
  alternatives_spanish:
  - identificaron
  - advirtieron
  lexicon: HALOT
  rationale: El verbo aquí indica reconocer o identificar. «Reconocieron» mantiene ese valor y funciona bien con el objeto «la voz».
- source_word: אֶת קוֹל הַנַּעַר הַלֵּוִי
  english_pob_choice: the voice of the young Levite
  chosen_spanish: la voz del joven levita
  alternatives_spanish:
  - la voz del levita joven
  - el sonido del joven levita
  lexicon: HALOT
  rationale: 'קוֹל se traduce naturalmente como «voz» en este contexto. נַעַר se vierte como «joven» porque aquí la referencia es al hombre joven, y הַלֵּוִי funciona como aposición: «levita».'
- source_word: וַיָּסוּרוּ שָׁם
  english_pob_choice: So they turned aside there
  chosen_spanish: Entonces se desviaron hacia allí
  alternatives_spanish:
  - Entonces apartaron el camino hacia allí
  - Entonces se apartaron allí
  lexicon: HALOT
  rationale: סור expresa apartarse o desviarse del camino. «Se desviaron hacia allí» conserva el movimiento y evita una rigidez innecesaria en español.
- source_word: מִי הֱבִיאֲךָ הֲלֹם
  english_pob_choice: Who brought you here?
  chosen_spanish: ¿Quién te trajo hasta aquí?
  alternatives_spanish:
  - ¿Quién te hizo venir aquí?
  - ¿Quién te trajo a este lugar?
  lexicon: HALOT
  rationale: El hebreo es una pregunta directa por la causa del traslado. «Te trajo hasta aquí» es idiomático y conserva el sentido de הֲלֹם como «aquí/hasta aquí».
- source_word: וּמָה אַתָּה עֹשֶׂה בָּזֶה
  english_pob_choice: What are you doing in this place?
  chosen_spanish: ¿Qué haces en este lugar?
  alternatives_spanish:
  - ¿Qué estás haciendo en esto?
  - ¿Qué haces con esto?
  lexicon: HALOT
  rationale: בָּזֶה es elíptico y literalmente puede sonar como «en esto» o «con esto». En español, «en este lugar» expresa con claridad la pregunta situacional que el contexto demanda, sin perder la tensión del original.
- source_word: וּמַה לְּךָ פֹה
  english_pob_choice: And what do you have here?
  chosen_spanish: ¿Y qué tienes aquí?
  alternatives_spanish:
  - ¿Y qué es tu negocio aquí?
  - ¿Y qué tienes aquí para ti?
  lexicon: HALOT
  rationale: La expresión idiomática pregunta qué interés, posesión o asunto tiene él allí. «¿Qué tienes aquí?» preserva la formulación concreta; el sentido más amplio queda como posibilidad interpretativa sin imponerse en el cuerpo principal.
translation_notes:
  revision_awareness: El borrador sigue el texto hebreo masorético con alta concordancia con el audit trail inglés; se mantuvieron las decisiones centrales de proximidad, reconocimiento de la voz, desviarse del camino y la pregunta idiomática final, sin cambios de revisión necesarios.
  spanish_consistency_notes:
  - Se usa «Micaía» de forma consistente para el nombre propio.
  - Se mantiene «levita» como gentilicio/función religiosa, no como título eclesiástico posterior.
  - Las preguntas finales conservan el paralelismo y la progresión del hebreo.
  - Se evita «SEÑOR» u otros reemplazos que no pertenecen a este versículo.
