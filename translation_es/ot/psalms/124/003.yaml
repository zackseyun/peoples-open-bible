  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la secuencia contrafactual del hebreo: «entonces», «nos habrían tragado vivos» y «contra nosotros» reflejan adecuadamente אֲזַי, בלעונו y בנו. También mantiene la nota sobre la alternativa de pasado simple. Sin embargo, «cuando su ira se encendió» cambia innecesariamente la imagen verbal de חרה (‘arder’) y la lleva a un pretérito puntual menos natural dentro de la construcción contrafactual-temporal.'
  spanish_quality_summary: El español es claro y digno, pero «cuando su ira se encendió contra nosotros» suena algo rígido y aspectualmente menos natural que «cuando su ira ardía» o «cuando su ira se encendía». Además, la nota b reproduce literalmente «ardió su nariz», formulación poco natural en español; conviene mantener la literalidad explicativa pero con mejor redacción.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Ira» es una opción válida para אַף en este contexto. No se activan términos especiales como Yahvé/Mesías/etc.
  issues:
  - severity: medium
    issue: Aspecto verbal de «se encendió»
    rationale: El hebreo בַּחֲרוֹת אַפָּם בָּנוּ expresa la circunstancia temporal ‘cuando/siendo que su ira ardía contra nosotros’. En español, el pretérito «se encendió» puede sugerir un evento puntual completado, menos ajustado al trasfondo de la cláusula contrafactual.
  - severity: low
    issue: Nota b demasiado calcada en «ardió su nariz»
    rationale: La nota debe conservar la literalidad del hebraísmo, pero en español se entiende mejor como «cuando se encendió/ardió su nariz contra nosotros», aclarando que es un modismo hebreo para la ira.
