translation:
  language: es
  text: 'Y pondrás en él engastes de piedras[a], cuatro hileras de piedras: la primera hilera será un rubí, un topacio y una esmeralda.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La identificación precisa de estas gemas es incierta. ‘Rubí’ también puede corresponder a ‘cornalina’; ‘topacio’ también puede corresponder a ‘crisólito’ o ‘peridoto’; ‘esmeralda’ también puede corresponder a ‘berilo’.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמִלֵּאתָ
  english_pob_choice: And you shall set
  chosen_spanish: Y pondrás
  alternatives_spanish:
  - y llenarás
  - y colocarás
  lexicon: HALOT
  rationale: El hebreo literalmente dice ‘llenarás’, pero en el contexto artesanal de engastar gemas en el pectoral, ‘poner/ponerás’ comunica mejor la acción de insertar las piedras sin perder la imagen de completar el adorno.
- source_word: בּוֹ
  english_pob_choice: in it
  chosen_spanish: en él
  alternatives_spanish:
  - sobre él
  - dentro de él
  lexicon: HALOT
  rationale: La preposición con sufijo indica que las piedras van dentro del objeto al que se refiere el contexto; ‘en él’ es natural y fiel al sentido de montaje.
- source_word: מִלֻּאַת אֶבֶן
  english_pob_choice: settings of stones
  chosen_spanish: engastes de piedra
  alternatives_spanish:
  - asientos de piedra
  - montajes de piedras
  - engastes de piedras
  lexicon: HALOT
  rationale: La expresión designa una disposición técnica de gemas montadas. ‘Engastes’ conserva el sentido artesanal mejor que una traducción literal y evita un calco poco natural.
- source_word: אַרְבָּעָה טוּרִים
  english_pob_choice: four rows
  chosen_spanish: cuatro hileras
  alternatives_spanish:
  - cuatro filas
  - cuatro órdenes
  lexicon: HALOT
  rationale: טוּר se refiere a una disposición lineal de piedras. ‘Hileras’ es claro en español y mantiene la idea de orden sucesivo.
- source_word: אֶבֶן
  english_pob_choice: of stones
  chosen_spanish: de piedras
  alternatives_spanish:
  - de piedra
  lexicon: HALOT
  rationale: Aunque la forma es singular, el contexto es colectivo. En español, el plural expresa mejor que se trata de varias gemas preciosas.
- source_word: טוּר ... הָאֶחָד
  english_pob_choice: the first row
  chosen_spanish: la primera hilera
  alternatives_spanish:
  - la hilera primera
  - la hilera una
  lexicon: HALOT
  rationale: La expresión identifica la fila inicial entre cuatro; ‘la primera hilera’ es idiomática y precisa.
- source_word: אֹדֶם
  english_pob_choice: ruby
  chosen_spanish: cornalina
  alternatives_spanish:
  - rubí
  - piedra roja
  lexicon: HALOT
  rationale: La identificación mineral de אֹדֶם es incierta. En español, ‘cornalina’ es una alternativa histórica y plausible que preserva el carácter de gema rojiza sin fijar indebidamente una equivalencia segura.
- source_word: פִּטְדָה
  english_pob_choice: topaz
  chosen_spanish: topacio
  alternatives_spanish:
  - crisólito
  - peridoto
  lexicon: HALOT
  rationale: ‘Topacio’ sigue la tradición de traducción y es inteligible en español. La identificación exacta del mineral sigue siendo incierta, por lo que se conserva la alternativa en nota.
- source_word: וּבָרֶקֶת
  english_pob_choice: and an emerald
  chosen_spanish: y una esmeralda
  alternatives_spanish:
  - y un berilo
  - y una piedra brillante
  lexicon: HALOT
  rationale: ‘Esmeralda’ es la equivalencia convencional y clara en español; aun así, el término hebreo tiene cierta incertidumbre mineral, que se conserva en la nota textual.
translation_notes:
  revision_awareness: La revisión reciente no introdujo cambios; este borrador sigue el acuerdo alto con el auditable inglés POB y conserva la misma resolución léxica para el léxico de gemas y la imagen técnica de engaste.
  spanish_consistency_notes:
  - Se mantuvo ‘Yahvé’ solo cuando el texto fuente lo exige; en este versículo no aparece, por lo que no se usa.
  - Se prefirió ‘piedras’/‘gemas’ en sentido colectivo conforme al contexto de joyería ritual, evitando el singular literal que sonaría extraño en español.
  - Se preservó la incertidumbre mineral mediante una nota, en paralelo con la política POB en inglés.
