base_translation:
  language: en
  yaml_path: translation/ot/genesis/004/021.yaml
  text: And the name of his brother was Jubal[c][b][a]; he was the father of all who play the lyre and the pipe.
  footnotes:
  - marker: a
    text: Or 'handle the lyre and the pipe.' The Hebrew verb is literally 'grasp' or 'take hold of,' but in context it refers to playing musical instruments.
    reason: lexical_alternative
  - marker: b
    text: '''Pipe'' may also be rendered ''flute'' or ''reed pipe''; the precise ancient instrument denoted by Hebrew עוּגָב is uncertain.'
    reason: lexical_alternative
  - marker: c
    text: '''Father of'' here likely means progenitor, pioneer, or founder of those who play these instruments, not necessarily immediate biological father of every such musician.'
    reason: cultural_note
