review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura básica del hebreo: mandato/instrucción de regocijarse ante Yahvé, enumeración inclusiva del hogar, inclusión del levita local y la razón causal de que no tiene porción ni herencia. Sin embargo, hay dos desajustes relevantes: 1) el verbo está en tercera persona plural (''se alegrarán'') cuando el hebreo es segunda persona plural (''ustedes se alegrarán'' / ''se alegren''); 2) la nota al pie [a] está anclada a ''sus hijas'' pero explica ''dentro de sus puertas'', por lo que el marcador está en el lugar equivocado.'
  spanish_quality_summary: El español es claro y digno, pero puede mejorarse para fidelidad y naturalidad. 'Y se alegrarán' no concuerda con el sujeto explícito 'ustedes...' en estilo bíblico moderno; 'Y se alegrarán ustedes...' o mejor 'Y se regocijarán...' / 'Y se alegrarán delante de Yahvé...' con sujeto explícito funciona. Además, la nota debe ir en 'dentro de sus puertas[a]'. El resto de la redacción es legible y apropiada.
  glossary_alignment: Se usa correctamente 'Yahvé' para יהוה. 'Levita', 'parte', 'herencia' y la preservación del modismo 'dentro de sus puertas' están bien alineados. 'Siervos y siervas' es aceptable dado el rastro auditado inglés revisado hacia 'male servants/female servants', aunque conviene reconocer que el hebreo denota dependencia servil más fuerte. No requiere cambio obligatorio aquí.
  issues:
  - severity: high
    issue: Persona verbal incorrecta en 'se alegrarán'
    rationale: וּשְׂמַחְתֶּם es segunda persona plural; el borrador usa tercera persona plural. Esto altera la referencia gramatical directa al auditorio.
  - severity: medium
    issue: Marcador de nota al pie mal ubicado
    rationale: La nota [a] explica אֲשֶׁר בְּשַׁעֲרֵיכֶם ('que está dentro de sus puertas'), pero el marcador aparece tras 'sus hijas', creando una asociación errónea.
  revised_spanish_text: 'Y se alegrarán ustedes delante de Yahvé, su Dios: ustedes, sus hijos y sus hijas, sus siervos y sus siervas, y el levita que está dentro de sus puertas[a], porque no tiene parte ni herencia con ustedes.'
  revised_footnotes:
  - marker: a
    text: 'O: «que está en sus ciudades»; literalmente: «que está dentro de sus puertas».'
    reason: lexical_alternative
  revision_rationale: Se corrige la persona verbal para reflejar la segunda persona plural del hebreo y se mueve el marcador de la nota al sintagma que realmente comenta. Se conservan 'Yahvé', 'siervos y siervas', y el modismo 'dentro de sus puertas' por fidelidad al proyecto y al rastro auditado.
