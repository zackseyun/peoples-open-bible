id: GEN.2.11
reference: Genesis 2:11
source:
  edition: WLC
  text: שֵׁ֥ם הָֽ/אֶחָ֖ד פִּישׁ֑וֹן ה֣וּא הַ/סֹּבֵ֗ב אֵ֚ת כָּל אֶ֣רֶץ הַֽ/חֲוִילָ֔ה אֲשֶׁר שָׁ֖ם הַ/זָּהָֽב־־׃
translation:
  text: The name of the first is Pishon; it is the one that goes around all the land of Havilah[a], where there is gold.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the one that encircles all the land of Havilah.' The Hebrew participle can be rendered 'surrounds/encircles'; 'flows around' makes the river imagery explicit in English.
    reason: lexical_alternative
lexical_decisions:
- source_word: שֵׁם
  chosen: name
  alternatives:
  - designation
  lexicon: HALOT
  rationale: The common sense 'name' fits the formula introducing one of the rivers. 'Designation' is possible in some contexts but is too abstract here.
- source_word: הָאֶחָד
  chosen: the first
  alternatives:
  - the one
  lexicon: HALOT
  rationale: In the sequence of four rivers, the idiom 'the one' functions ordinally. English 'the first' communicates the referential sense more naturally.
- source_word: פִּישׁוֹן
  chosen: Pishon
  rationale: Proper name of a river; per translation philosophy, names are transliterated rather than translated.
- source_word: הוּא
  chosen: it is
  alternatives:
  - he is
  lexicon: HALOT
  rationale: The pronoun refers back to the river Pishon, so English requires the non-personal pronoun 'it.'
- source_word: הַסֹּבֵב
  chosen: flows around
  alternatives:
  - winds around
  - encircles
  - surrounds
  lexicon: HALOT
  rationale: From סבב, 'to go around/surround.' With a river as subject, 'flows around' is the most idiomatic English expression while preserving the geographic sense. 'Encircles' is possible but slightly more static.
- source_word: אֵת כָּל אֶרֶץ
  chosen: all the land
  alternatives:
  - the whole land
  - the entire region
  lexicon: HALOT
  rationale: אֶרֶץ can mean 'land' or 'region'; here it refers to a named territory rather than the whole earth. 'All the land' preserves כָּל and remains natural.
- source_word: הַחֲוִילָה
  chosen: Havilah
  rationale: Proper place name; transliterated by standard convention.
- source_word: אֲשֶׁר שָׁם
  chosen: where there is
  alternatives:
  - where
  - in which there is
  lexicon: HALOT
  rationale: This relative clause points to the land just mentioned and introduces a feature of it. 'Where there is' is clear modern English and reflects the locative שָׁם.
- source_word: הַזָּהָב
  chosen: gold
  alternatives:
  - the gold
  lexicon: HALOT
  rationale: 'Although the Hebrew has the article, English idiom normally omits it in existential statements of material presence: ''where there is gold,'' not ''where there is the gold.'''
