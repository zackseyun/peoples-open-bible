translation:
  language: es
  text: Su amo se levantó por la mañana, abrió las puertas de la casa y salió para seguir su camino. Y he aquí, la mujer, su concubina, estaba caída[a] a la entrada de la casa, con las manos sobre el umbral.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «había caído a la entrada de la casa».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנֶיהָ
  english_pob_choice: her master
  chosen_spanish: su amo
  alternatives_spanish:
  - su señor
  - su dueño
  lexicon: HALOT
  rationale: אֲדוֹן con sufijo femenino singular expresa una relación de autoridad o posesión. En español, «amo» conserva esa asimetría social mejor que «señor», que puede sonar demasiado cortés o ambiguo, y evita importar la relación conyugal de «esposo».
- source_word: בַּבֹּקֶר
  english_pob_choice: in the morning
  chosen_spanish: por la mañana
  alternatives_spanish:
  - en la mañana
  - al amanecer
  lexicon: HALOT
  rationale: Es una expresión temporal directa y natural en español. «Por la mañana» mantiene el valor adverbial sin añadir matices no presentes en el hebreo.
- source_word: דַּלְתוֹת הַבַּיִת
  english_pob_choice: the doors of the house
  chosen_spanish: las puertas de la casa
  alternatives_spanish:
  - la puerta de la casa
  - las hojas de la puerta de la casa
  lexicon: HALOT
  rationale: El hebreo está en plural, por lo que conviene preservar «puertas» y no singularizar. «Casa» conserva la referencia concreta del escenario.
- source_word: וַיֵּצֵא לָלֶכֶת לְדַרְכּוֹ
  english_pob_choice: went out to go on his way
  chosen_spanish: salió para seguir su camino
  alternatives_spanish:
  - salió para irse
  - salió para continuar su viaje
  lexicon: HALOT
  rationale: La construcción expresa propósito. «Seguir su camino» reproduce bien el giro idiomático hebreo y suena natural en español, sin convertirlo en una paráfrasis más amplia como «continuar su viaje».
- source_word: וְהִנֵּה
  english_pob_choice: and behold
  chosen_spanish: Y he aquí
  alternatives_spanish:
  - y he aquí que
  - y mira
  lexicon: HALOT
  rationale: «He aquí» conserva el marcador discursivo de sorpresa y atención súbita. Aunque es una fórmula tradicional, en este contexto resulta precisa y plenamente comprensible.
- source_word: הָאִשָּׁה פִילַגְשׁוֹ
  english_pob_choice: the woman, his concubine
  chosen_spanish: la mujer, su concubina
  alternatives_spanish:
  - la mujer, su secundaria esposa
  - la mujer, su concubina
  lexicon: HALOT
  rationale: Se mantiene la aposición y el término técnico «concubina» para פִילֶגֶשׁ. «Mujer» conserva la referencia narrativa sin forzar «esposa».
- source_word: נֹפֶלֶת
  english_pob_choice: was lying
  chosen_spanish: estaba caída
  alternatives_spanish:
  - yacía caída
  - estaba tendida
  - había caído
  lexicon: HALOT
  rationale: El participio describe el estado visible de la mujer. «Estaba caída» mantiene el sentido resultativo sin perder la fuerza de «fallada/caída», que la POB dejó como alternativa literal en inglés.
- source_word: פֶּתַח הַבַּיִת
  english_pob_choice: at the entrance of the house
  chosen_spanish: a la entrada de la casa
  alternatives_spanish:
  - en la entrada de la casa
  - en el umbral de la casa
  lexicon: HALOT
  rationale: «Entrada» traduce bien פֶּתַח como apertura o acceso. En español, «a la entrada» refleja la localización de forma idiomática y clara.
- source_word: וְיָדֶיהָ עַל הַסַּף
  english_pob_choice: with her hands on the threshold
  chosen_spanish: con las manos sobre el umbral
  alternatives_spanish:
  - y sus manos sobre el umbral
  - con sus manos en el umbral
  lexicon: HALOT
  rationale: «Umbral» es el equivalente directo de סַף. «Con las manos sobre el umbral» conserva la imagen corporal concreta y la estructura adverbial del hebreo.
translation_notes:
  revision_awareness: La POB inglesa mantiene la pluralidad de «doors» y conserva el marcador discursivo «and behold»; también deja una alternativa literal en nota para el sintagma de salida («was fallen at the entrance of the house»). Esta versión española preserva el plural, el valor de sorpresa de וְהִנֵּה y la imagen de estado resultante con «estaba caída», sin reducirla a una paráfrasis menos precisa.
  spanish_consistency_notes:
  - Se usa «amo» para אֲדֹן en una relación social asimétrica, en línea con la decisión inglesa de «master».
  - Se conserva el plural «puertas» para דַּלְתוֹת.
  - «Concubina» se mantiene como término técnico estable para פִילֶגֶשׁ.
  - «Umbral» traduce סַף de forma consistente con el léxico concreto del pasaje.
  - El marcador de sorpresa «Y he aquí» refleja adecuadamente וְהִנֵּה sin diluir la escena.
