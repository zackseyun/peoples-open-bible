translation:
  language: es
  text: 'En aquel día: «Una viña deleitosa»[a]—¡cántenle![b]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «viña de deleite»; el hebreo puede traducirse de manera más literal así, aunque «viña deleitosa» resulta más natural en español.
    reason: lexical_alternative
  - marker: b
    text: O «canten sobre ella», «canten acerca de ella» o «respondan cantando sobre ella»; el verbo hebreo puede implicar una respuesta cantada, y el pronombre femenino se refiere a la viña.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: In that day
  chosen_spanish: En aquel día
  alternatives_spanish:
  - Ese día
  - En ese día
  lexicon: HALOT
  rationale: La fórmula profética temporal se conserva con un español natural y solemne. «Aquel» mantiene mejor la distancia retórica y el tono escatológico que una simple traducción temporal plana.
- source_word: כֶּרֶם
  english_pob_choice: vineyard
  chosen_spanish: viña
  alternatives_spanish:
  - viñedo
  lexicon: HALOT
  rationale: En español bíblico y moderno, «viña» es la equivalencia más directa y fluida para el campo semántico de כֶּרֶם. «Viñedo» puede sonar más técnico o agronómico; «viña» conserva mejor la imagen poética.
- source_word: חֶמֶד
  english_pob_choice: pleasant
  chosen_spanish: agradable
  alternatives_spanish:
  - deliciosa
  - deleitosa
  - placentera
  - de deleite
  lexicon: HALOT
  rationale: El término expresa valor deseable, deleite o agrado. «Agradable» ofrece en español una evaluación positiva natural sin forzar un giro más abstracto. Se preserva la tensión entre literalidad y fluidez poética, sin convertir la frase en paráfrasis excesiva.
- source_word: עַנּוּ
  english_pob_choice: sing
  chosen_spanish: canten
  alternatives_spanish:
  - canten responsivamente
  - respondan cantando
  - respondan
  lexicon: HALOT
  rationale: El verbo puede llevar el matiz de respuesta en canto o proclamación responsiva. En español, el imperativo plural «canten» transmite con claridad la acción musical exigida por el contexto poético, mientras mantiene abierta la posibilidad de eco responsivo sin explicitarla de más.
- source_word: לָהּ
  english_pob_choice: of it
  chosen_spanish: sobre ella
  alternatives_spanish:
  - a ella
  - de ella
  - por ella
  lexicon: HALOT
  rationale: El sufijo femenino singular remite a la viña. «Sobre ella» funciona de modo natural con el verbo «canten» en español y puede abarcar el matiz de cantar acerca de ella. Se evita masculinizar o neutralizar indebidamente el referente femenino.
translation_notes:
  revision_awareness: El texto sigue de cerca el paquete fuente hebreo y el rastro auditado en inglés, sin cambios de revisión aplicados en la pasada más reciente; se mantiene la equivalencia óptima del versículo con atención a la ambigüedad del verbo y del sufijo pronominal.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo exige explícitamente; aquí no aparece el tetragrámaton.
  - Se mantiene «viña» como término bíblico natural para כֶּרֶם en lugar de «viñedo», por registro poético y eclesial.
  - Se conserva la referencia femenina en el pronombre («ella») para reflejar el hebreo לָהּ.
  - La puntuación con dos puntos y guion largo refleja bien la estructura oracular y la cita breve del poema.
