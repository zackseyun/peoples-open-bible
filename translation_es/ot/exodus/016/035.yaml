review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido básico del hebreo: duración de cuarenta años, doble cláusula con repetición de «comieron el maná», contraste con una tierra habitable/asentada, y llegada al borde de Canaán. Las decisiones principales siguen de cerca el audit trail inglés. No obstante, hay pequeños problemas de redacción y de fidelidad editorial en las notas: una glosa alternativa inglesa quedó invertida en la nota c, y hay errores de español en las notas y en la justificación léxica.'
  spanish_quality_summary: 'El texto principal es claro, natural y digno en español eclesial amplio. «Los hijos de Israel», «el maná», «cuarenta años» y «tierra habitada» funcionan bien. «Al borde de la tierra de Canaán» es comprensible, aunque la nota alternativa debe corregirse para reflejar con precisión la relación entre «borde» y «límite». Las notas necesitan reparación por gramática y estilo: «un designación» debe ser «una designación» o mejor «una designación del pacto» / «una designación pactual»; también conviene usar «habitada de manera estable» o «de habitación estable» con mejor español.'
  glossary_alignment: No hay conflictos con la terminología troncal del proyecto. No aparece Yahvé, Mesías/Cristo, Espíritu, etc. «Los hijos de Israel» preserva la decisión del POB sobre בְּנֵי יִשְׂרָאֵל. «Maná» y «Canaán» están bien. La nota debe hablar de designación pactual/covenantal con español correcto.
  issues:
  - severity: medium
    issue: La nota c invierte la alternativa léxica respecto del texto principal.
    rationale: El texto principal usa «borde», mientras la nota dice «O ‘el límite…’». Pero en el audit trail inglés, el texto principal corresponde a ‘border’ y la alternativa preservada es ‘edge’. En español, si el texto principal queda como «borde», la nota debería ofrecer «el límite» solo si se justifica claramente; más fiel al patrón auditado es usar «límite» en el texto principal y dejar «borde» como alternativa.
  - severity: medium
    issue: Errores de español en la nota a y en material explicativo.
    rationale: «un designación covenantal estándar» es incorrecto. Debe ser «una designación pactual/covenantal estándar» o formulación equivalente natural en español. También en la justificación aparece «del designación», que es incorrecto.
  - severity: low
    issue: La nota b suena algo forzada en español.
    rationale: «apta para habitación humana estable» comunica la idea, pero puede mejorarse a «apta para habitación humana permanente» o «para asentamiento humano estable» para mayor naturalidad sin alterar el sentido.
  revised_spanish_text: Y los hijos de Israel comieron el maná cuarenta años[a], hasta que llegaron a una tierra habitada[b]; comieron el maná hasta que llegaron al límite[c] de la tierra de Canaán.
  revised_footnotes:
  - marker: a
    text: O «los israelitas» / «los hijos de Israel». El hebreo dice literalmente «los hijos de Israel», una designación pactual estándar del pueblo de Israel.
    reason: lexical_alternative
  - marker: b
    text: O «una tierra asentada». La frase contrasta el desierto con una tierra apta para asentamiento humano estable.
    reason: lexical_alternative
  - marker: c
    text: O «el borde de la tierra de Canaán».
    reason: lexical_alternative
  revision_rationale: Se conserva el contenido del borrador, pero se corrige la nota c para alinearla mejor con el audit trail inglés y con una oposición más natural entre texto principal y alternativa. También se corrigen errores gramaticales y de estilo en las notas para que el español sea idiomático y preciso.
