lexical_decisions:
- source_word: לִפְתַחְיָה
  english_pob_choice: for Pethahiah
  chosen_spanish: para Petaquías
  alternatives_spanish:
  - a Petaquías
  - correspondiente a Petaquías
  - asignado a Petaquías
  lexicon: HALOT
  rationale: El prefijo ל en esta lista de divisiones sacerdotales expresa asignación o pertenencia en el orden del sorteo. En español, 'para' comunica de forma natural esa asignación. Se translitera el nombre como Petaquías para reflejar la forma hebrea del texto, siguiendo la línea del POB de no armonizarlo con otra tradición onomástica.
- source_word: תִּשְׁעָה עָשָׂר
  english_pob_choice: the nineteenth
  chosen_spanish: el decimonoveno
  alternatives_spanish:
  - el diecinueve
  - la decimonovena división
  - el noveno y décimo
  lexicon: HALOT
  rationale: La expresión cardinal funciona aquí como ordinal en una secuencia de turnos o divisiones. 'El decimonoveno' es la forma más natural y concisa en español para ese valor ordinal implícito.
- source_word: לִיחֶזְקֵאל
  english_pob_choice: for Jehezkel
  chosen_spanish: para Jehezquel
  alternatives_spanish:
  - a Jehezquel
  - para Ezekiel
  - correspondiente a Jehezquel
  lexicon: HALOT
  rationale: La vocalización hebrea de esta forma onomástica se refleja mejor con 'Jehezquel' que con la forma más familiar 'Ezequiel'. Se conserva la distinción del listado del Crónista, tal como hace el POB inglés con 'Jehezkel'.
- source_word: הָעֶשְׂרִים
  english_pob_choice: the twentieth
  chosen_spanish: el vigésimo
  alternatives_spanish:
  - el veinte
  - la vigésima división
  - el número veinte
  lexicon: HALOT
  rationale: El sustantivo con artículo funciona como ordinal dentro de la serie. 'El vigésimo' mantiene el formato de lista y corresponde al valor implícito del contexto.
translation_notes:
  revision_awareness: 'La comparación con el texto hebreo y el audit trail en inglés muestra acuerdo alto: no se requieren ajustes textuales ni decisiones doctrinales adicionales. Se ha mantenido la estructura enumerativa breve del original y la distinción onomástica de la segunda entrada.'
  spanish_consistency_notes:
  - Se usa 'para' para el ל de asignación en una lista de turnos sacerdotales, en coherencia con la función distributiva del pasaje.
  - Se conserva la transliteración de nombres propios para reflejar la forma hebrea específica del registro, evitando armonizarlos con formas bíblicas más conocidas cuando ello borraría una distinción textual.
  - El ordinal español se expresa con adjetivo ordinal ('decimonoveno', 'vigésimo') para reproducir la serie implícita del hebreo.
