translation:
  language: es
  text: Oprimamos al pobre justo[a]; no tengamos compasión de la viuda, ni respetemos las canas de un anciano cargado de años[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O también: «el justo pobre». El griego πένητα δίκαιον puede entenderse con ambos términos estrechamente unidos al mismo individuo.'
    reason: lexical_alternative
