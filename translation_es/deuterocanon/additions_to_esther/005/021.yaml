review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien el sentido general del griego: Dios ejerce soberanía universal, revierte la amenaza, y convierte ‘esto’ en gozo para ellos en lugar de la destrucción del pueblo elegido. Sin embargo, ‘ha hecho de esto una alegría para ellos’ suena menos natural en español que una formulación equivalente más idiomática, y ‘linaje’ puede estrechar demasiado γένος hacia descendencia/genealogía cuando el contexto comunitario permite mejor ‘pueblo’, alternativa ya documentada en la nota inglesa.'
  spanish_quality_summary: El texto es claro y digno, pero requiere un pequeño ajuste de naturalidad y precisión semántica. ‘Ha hecho esto motivo de alegría para ellos’ fluye mejor en español bíblico moderno que ‘ha hecho de esto una alegría para ellos’. Además, ‘pueblo escogido’ resulta más legible y eclesialmente claro que ‘linaje escogido’, evitando un matiz genealógico innecesario.
  glossary_alignment: 'No hay conflicto con los términos base del proyecto. ‘Dios’ es correcto para θεός. No aparece Yahvé, Mesías/Cristo, etc. La decisión de evitar ‘raza’ es adecuada en español actual. Se conserva la alternativa relevante en nota, pero conviene invertirla: texto principal con ‘pueblo escogido’ y nota con ‘linaje escogido’.'
  issues:
  - severity: medium
    issue: ‘ha hecho de esto una alegría para ellos’ es poco idiomático
    rationale: Aunque comprensible, calca de cerca la estructura inglesa y resulta menos natural que ‘ha hecho esto motivo de alegría para ellos’ o ‘ha convertido esto en alegría para ellos’, ambas fieles a ἐποίησεν αὐτοῖς εὐφροσύνην.
  - severity: medium
    issue: ‘linaje escogido’ puede sonar demasiado genealógico para γένος en este contexto
    rationale: γένος aquí señala identidad corporativa del pueblo judío amenazado. ‘Linaje’ no es imposible, pero en español común puede enfocarse más en descendencia familiar que en pueblo/nación. Dado que la alternativa ‘pueblo escogido’ ya está documentada, conviene usarla en el texto principal por claridad y naturalidad.
  revised_spanish_text: Porque Dios, que gobierna sobre todo, ha hecho esto motivo de alegría para ellos, en lugar de la destrucción del pueblo escogido[a].
  revised_footnotes:
  - marker: a
    text: O ‘del linaje escogido’ para ‘del pueblo escogido’ (τοῦ ἐκλεκτοῦ γένους).
    reason: lexical_alternative
  revision_rationale: Se revisa para mejorar la naturalidad del español y reflejar mejor el sentido corporativo de γένος en contexto. ‘Ha hecho esto motivo de alegría para ellos’ expresa con claridad el valor de ἐποίησεν… εὐφροσύνην, y ‘pueblo escogido’ comunica mejor la referencia comunitaria que ‘linaje escogido’, dejando esta última como alternativa léxica documentada.
