    text: Or 'all the people of the place.' The Hebrew more literally says 'all the men of the place,' and the translation keeps the masculine form because it likely refers to the male townsmen invited to the wedding celebration.
    reason: lexical_alternative
  - marker: b
    text: '''Feast'' translates a Hebrew term often used for a celebratory banquet and can imply drinking as part of the occasion.'
    reason: cultural_note
