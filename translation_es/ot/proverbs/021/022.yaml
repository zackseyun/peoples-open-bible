translation:
  language: es
  text: Un sabio sube contra la ciudad de los hombres poderosos y derriba la fortaleza[a] en la que confían.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''Fortaleza'' sigue la lectura contextual defendida por el POB en inglés. El hebreo también permite un sentido más abstracto como ''fuerza'' o ''poder'', pero el contexto militar favorece una imagen concreta de defensa.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עִיר
  english_pob_choice: city
  chosen_spanish: ciudad
  alternatives_spanish:
  - poblado
  - urbe
  lexicon: HALOT
  rationale: '''Ciudad'' es el equivalente natural y más claro en español para el asentamiento urbano del hebreo, especialmente en un contexto militar y proverbial.'
- source_word: גִּבֹּרִים
  english_pob_choice: mighty men
  chosen_spanish: hombres poderosos
  alternatives_spanish:
  - guerreros
  - hombres valientes
  - héroes
  lexicon: HALOT
  rationale: '''Hombres poderosos'' conserva el matiz de fuerza y capacidad del término hebreo sin forzar un sentido exclusivamente militar; el contexto ya sugiere oposición defensiva.'
- source_word: עָלָה
  english_pob_choice: goes up against
  chosen_spanish: sube contra
  alternatives_spanish:
  - va contra
  - asciende contra
  - ataca
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'sube'. 'Sube contra' conserva la imagen idiomática y comunica el movimiento hostil sin convertirlo de forma excesiva en una glosa interpretativa.
- source_word: חָכָם
  english_pob_choice: a wise man
  chosen_spanish: un sabio
  alternatives_spanish:
  - un hombre sabio
  - el sabio
  - una persona sabia
  lexicon: HALOT
  rationale: '''Un sabio'' refleja el uso sustantivado del adjetivo hebreo y mantiene la forma proverbial breve y directa.'
- source_word: וַיֹּרֶד
  english_pob_choice: and brings down
  chosen_spanish: y derriba
  alternatives_spanish:
  - y hace caer
  - y abat(e)
  - y abaja
  lexicon: HALOT
  rationale: '''Derriba'' expresa bien la idea de hacer descender o abatir una defensa; en español resulta más natural que una traducción más literal de ''hacer bajar''.'
- source_word: עֹז
  english_pob_choice: the stronghold
  chosen_spanish: la fortaleza
  alternatives_spanish:
  - la fuerza
  - el baluarte
  - la defensa
  lexicon: HALOT
  rationale: Aunque el sustantivo suele significar 'fuerza' o 'poder', la lectura del contexto favorece una referencia concreta a una estructura defensiva; 'fortaleza' comunica esa fuerza material sin perder la conexión semántica con poder/resguardo.
- source_word: מִבְטֶחָה
  english_pob_choice: in which they trust
  chosen_spanish: en la que confían
  alternatives_spanish:
  - en la que ponen su confianza
  - su confianza
  - su seguridad
  lexicon: HALOT
  rationale: '''En la que confían'' hace explícita la relación de confianza que el hebreo expresa con el sufijo femenino y evita una paráfrasis más amplia que diluiría el cierre proverbial.'
translation_notes:
  revision_awareness: 'Coincide con la última revisión: no se registran cambios necesarios; la formulación española sigue la decisión contextual ya aprobada en el audit trail inglés.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto cuando aparezca el nombre divino; en este versículo no aparece.
  - '''Sabio'' conserva el valor sustantivado singular del hebreo.'
  - La elección de 'fortaleza' traduce la opción contextual del audit trail inglés ('stronghold') y queda aclarada en la nota.
  - Se preserva la imagen de ascenso hostil con 'sube contra' en lugar de normalizarla a 'ataca'.
