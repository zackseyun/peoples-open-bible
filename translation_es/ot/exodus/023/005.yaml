translation:
  language: es
  text: Si ves el asno de uno que te odia echado bajo su carga, y quisieras abstenerte de ayudarle[b], debes ayudarlo sin falta junto con él[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con él» puede entenderse «con ello», es decir, ayudar al asno con su carga. El pronombre hebreo puede referirse tanto al dueño como al animal.
    reason: alternative_reading
  - marker: b
    text: El verbo hebreo aquí suele significar «dejar» o «abandonar», pero en este contexto lleva el sentido de «ayudar, asistir».
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Cuando
  lexicon: HALOT
  rationale: En un contexto jurídico-casuístico, la condición está bien expresada por «Si», que preserva el valor condicional sin sonar rígido en español.
- source_word: תִרְאֶה
  english_pob_choice: you see
  chosen_spanish: ves
  alternatives_spanish:
  - encuentras
  - notas
  lexicon: HALOT
  rationale: «Ves» reproduce de manera directa el verbo de percepción visual del hebreo, sin añadir la idea de encuentro accidental.
- source_word: חֲמוֹר
  english_pob_choice: donkey
  chosen_spanish: asno
  alternatives_spanish:
  - burro
  - mulo
  lexicon: HALOT
  rationale: «Asno» es un equivalente natural y digno en español bíblico moderno; evita la posible carga coloquial de «burro» y mantiene el animal de carga del texto.
- source_word: שֹׂנַאֲךָ
  english_pob_choice: one who hates you
  chosen_spanish: uno que te odia
  alternatives_spanish:
  - tu enemigo
  - el que te odia
  lexicon: HALOT
  rationale: La forma participial expresa literalmente a «uno que te odia»; esta opción conserva la fuerza personal del hebreo sin ampliar innecesariamente a la categoría más general de «enemigo».
- source_word: רֹבֵץ
  english_pob_choice: lying down
  chosen_spanish: caído
  alternatives_spanish:
  - echado
  - tendido
  lexicon: HALOT
  rationale: En este contexto el animal está abatido bajo la carga; «caído» comunica bien la situación sin perder la imagen de estar derribado o sin fuerzas. «Tendido» también sería posible, pero puede sonar menos urgente.
- source_word: תַּחַת מַשָּׂאוֹ
  english_pob_choice: under its load
  chosen_spanish: bajo su carga
  alternatives_spanish:
  - debajo de su carga
  - bajo su fardo
  lexicon: HALOT
  rationale: «Bajo su carga» es la expresión más natural y fiel en español para indicar la carga que lleva el animal. Conserva la relación espacial y material del hebreo.
- source_word: וְחָדַלְתָּ מֵעֲזֹב ל֑וֹ
  english_pob_choice: and would refrain from helping him
  chosen_spanish: y te abstienes de ayudarle
  alternatives_spanish:
  - y te niegas a ayudarle
  - y dejas de ayudarle
  lexicon: HALOT
  rationale: El verbo hebreo puede significar «dejar, desistir, abstenerse», y aquí la idea es contenerse de prestar ayuda. «Te abstienes de ayudarle» conserva esa tensión semántica sin borrar el matiz de omisión voluntaria.
- source_word: עָזֹב תַּעֲזֹב
  english_pob_choice: you must surely help
  chosen_spanish: ciertamente deberás ayudar
  alternatives_spanish:
  - sin duda ayudarás
  - deberás ayudar sin falta
  lexicon: HALOT
  rationale: La construcción de infinitivo absoluto + imperfecto intensifica la obligación. Como el hebreo usa עזב con sentido de asistencia en este contexto, «deberás ayudar» comunica la obligación con claridad en español; «ciertamente» refleja la intensificación.
- source_word: עִמּוֹ
  english_pob_choice: with him
  chosen_spanish: con él
  alternatives_spanish:
  - con ella
  - con ello
  lexicon: HALOT
  rationale: Se conserva el referente personal del dueño/adversario como opción principal, coherente con la lectura ética y social del pasaje. La alternativa referida al animal queda preservada en nota.
theological_decisions:
- issue: Referente del pronombre final עִמּוֹ
  english_pob_reading: with him (the owner who hates you)
  chosen_spanish_reading: con él (el dueño que te odia)
  alternative_spanish_readings:
  - con ello (el asno)
  - con el asno
  rationale: Aunque el sufijo masculino singular puede referirse gramaticalmente al dueño o al asno, el enfoque inmediato del mandato ético favorece entender que se ayuda a la persona en relación con su animal. «Con él» conserva esa dimensión interpersonal y deja abierta la ambigüedad documentada.
  doctrine_reference: Principio de la POB de preservar ambigüedades interpretativas reales cuando no se pueden resolver sólo por gramática
- issue: Valor de עָזֹב תַּעֲזֹב
  english_pob_reading: you must surely help
  chosen_spanish_reading: ciertamente deberás ayudar
  alternative_spanish_readings:
  - deberás ayudar sin falta
  - sin duda ayudarás
  rationale: El hebreo presenta un infinitivo absoluto que intensifica la acción. En este contexto, el sentido no es «dejar/forsake» sino ayudar/auxiliar; la traducción española conserva tanto la obligación como la intensificación, siguiendo la decisión lexical del POB en inglés.
  doctrine_reference: Semántica verbal hebrea y principio de equivalencia óptima en mandatos intensificados
- issue: Tono legal y ético del mandato
  english_pob_reading: casuistic legal command with moral force
  chosen_spanish_reading: mandato jurídico con fuerza moral
  alternative_spanish_readings:
  - instrucción legal
  - precepto ético
  rationale: 'El verso funciona como norma concreta en una ley de caso, pero no sólo describe procedimiento: también modela una ética de ayuda al adversario. La formulación española intenta mantener ambos aspectos sin moralizar en exceso.'
  doctrine_reference: Ética de la ley del pacto en Éxodo 23
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión final del inglés POB, que eliminó el pronombre redundante antes de «would refrain» sin alterar el sentido. La versión española refleja esa fluidez con una coordinación natural: «y te abstienes de ayudarle».'
  spanish_consistency_notes:
  - Se eligió «Yahvé» en otros contextos del proyecto cuando aparece el nombre divino; este versículo no lo contiene.
  - Se prefirió «asno» por claridad y tono bíblico moderno, sin calco mecánico.
  - Se mantuvo la ambigüedad documentada del último pronombre mediante nota, evitando resolverla de manera excesiva en el texto principal.
  - «Ayudar» se usa para capturar el valor contextual de עזב, conforme al audit trail en inglés.
