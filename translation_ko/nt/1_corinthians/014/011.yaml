id: 1CO.14.11
reference: 1 Corinthians 14:11
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ἐὰν οὖν μὴ εἰδῶ τὴν δύναμιν τῆς φωνῆς, ἔσομαι τῷ λαλοῦντι βάρβαρος καὶ ὁ λαλῶν ἐν ἐμοὶ βάρβαρος.
base_translation:
  language: en
  yaml_path: translation/nt/1_corinthians/014/011.yaml
  text: Therefore[a], if I do not know the meaning of the voice, I will be a foreigner to the one speaking[b], and the one speaking will be a foreigner to me.
  footnotes:
  - marker: a
    text: Or 'the force of the voice'; that is, the significance or sense conveyed by the sound.
    reason: lexical_alternative
  - marker: b
    text: Greek 'barbarian,' here meaning someone foreign in speech or unintelligible, not necessarily uncivilized.
    reason: lexical_alternative
translation:
  language: ko
  text: 그러므로 내가 그 소리의 뜻을 모른다면, 나는 말하는 사람에게 이방인이 되고, 말하는 사람도 내게 이방인이 됩니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 헬라어 βάρβαρος는 「말을 알아들을 수 없는 외지인」을 가리키며, 야만이라는 부정 함의보다는 「이방인」(외국 사람)의 의미가 본문에 가깝다.
    reason: lexical_alternative
lexical_decisions:
- source_word: βάρβαρος
  english_pob_choice: foreigner
  chosen_korean: 이방인
  alternatives_korean:
  - 외국인
  - 야만인
  lexicon: BDAG
  rationale: 본문은 언어 소통 불가의 「외지인」을 가리킨다. 「야만인」은 한국어에서 도덕적 폄하의 함의가 강해 피한다.
