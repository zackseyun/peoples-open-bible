- from: Por favor[a], recibe instrucción de su boca, y guarda sus palabras en tu corazón.
  to: Recibe instrucción[a] de su boca, y guarda sus palabras en tu corazón.
  rationale: Se elimina «Por favor» porque, aunque intenta representar נָא, introduce un tono demasiado coloquial para el registro buscado. El imperativo español por sí solo preserva bien la exhortación, mientras que el resto del versículo ya refleja fielmente el hebreo y las decisiones léxicas documentadas.
