translation:
  language: es
  text: cuando se extinga, el cuerpo se convertirá en cenizas, y el espíritu[a] se dispersará como aire tenue[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el aliento» o «el hálito de vida» para «el espíritu». El griego πνεῦμα puede llevar aquí ambos sentidos.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «como aire suelto/liviano»; la frase comunica algo insustancial y rápidamente dispersado.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὗ σβεσθέντος
  english_pob_choice: when it is extinguished
  chosen_spanish: cuando se extinga
  alternatives_spanish:
  - cuando se apague
  - cuando sea extinguido
  lexicon: LSJ
  rationale: El participio genitivo absoluto de σβέννυμι conserva la imagen de algo que se apaga o se extingue. «Extinguirse» mantiene la metáfora sin precisar más de lo que el griego dice en este versículo.
- source_word: τέφρα ἀποβήσεται
  english_pob_choice: will become ashes
  chosen_spanish: se convertirá en cenizas
  alternatives_spanish:
  - se volverá ceniza
  - acabará en cenizas
  lexicon: LSJ
  rationale: ἀποβαίνω aquí expresa el resultado de llegar a ser algo. «Se convertirá en cenizas» refleja bien ese cambio de estado y suena natural en español.
- source_word: τὸ σῶμα
  english_pob_choice: the body
  chosen_spanish: el cuerpo
  alternatives_spanish:
  - el cuerpo físico
  - el cadáver
  lexicon: LSJ
  rationale: El artículo singular apunta a «el cuerpo» de forma directa. «Cadáver» sería demasiado interpretativo y «cuerpo físico» añade una glosa no presente en el texto.
- source_word: τὸ πνεῦμα
  english_pob_choice: the spirit
  chosen_spanish: el espíritu
  alternatives_spanish:
  - el aliento
  - el hálito de vida
  lexicon: LSJ
  rationale: πνεῦμα puede significar espíritu, aliento o hálito de vida. Aquí, en contraste con «el cuerpo» y seguido por la imagen del aire, «el espíritu» preserva la tensión antropológica del pasaje sin resolverla doctrinalmente.
- source_word: διαχυθήσεται
  english_pob_choice: will be dispersed
  chosen_spanish: se dispersará
  alternatives_spanish:
  - será derramado
  - se esparcirá
  lexicon: LSJ
  rationale: El futuro pasivo de διαχέω comunica difusión o dispersión. «Se dispersará» conserva la idea de desintegración en el aire con español idiomático.
- source_word: ὡς χαῦνος ἀήρ
  english_pob_choice: like thin air
  chosen_spanish: como aire tenue
  alternatives_spanish:
  - como aire insubstancial
  - como aire ligero
  lexicon: LSJ
  rationale: χαῦνος expresa ligereza, holgura o insustancialidad. «Aire tenue» transmite de manera breve la cualidad de algo débil e impalpable, sin perder el matiz de dispersión.
theological_decisions:
- issue: Sentido antropológico de πνεῦμα en un contexto de muerte
  english_pob_reading: the spirit; the verse preserves a body/spirit contrast while allowing the breath/life-breath nuance in a note
  chosen_spanish_reading: el espíritu; el versículo conserva el contraste cuerpo/espíritu y permite anotar la posible acepción de aliento o hálito de vida
  alternative_spanish_readings:
  - el aliento
  - el hálito de vida
  rationale: La traducción principal mantiene el paralelismo del griego y no impone una conclusión doctrinal sobre la inmortalidad del alma. La nota puede recordar que πνεῦμα también puede entenderse como aliento o hálito de vida.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla
- issue: Imagen final de διάχυσις y χαῦνος ἀήρ
  english_pob_reading: like thin air; something insubstantial and quickly dispersed
  chosen_spanish_reading: como aire tenue; algo insustancial y fácilmente dispersable
  alternative_spanish_readings:
  - como aire insubstancial
  - como aire ligero
  rationale: La imagen comunica desaparición y falta de consistencia. «Aire tenue» deja audible la metáfora de algo muy poco denso, sin convertirla en una explicación interpretativa.
  doctrine_reference: Mantener la fuerza imagética del texto
translation_notes:
  revision_awareness: Se tuvo en cuenta la última revisión del inglés POB, especialmente el ajuste de «will turn to ashes» a «will become ashes», y se reflejó en español con «se convertirá en cenizas» para mantener cercanía léxica con ἀποβήσεται y un español natural. También se respetó la elección auditada de πνεῦμα como «spirit»/«the spirit», dejando abierta la nota sobre «aliento» o «hálito de vida».
  spanish_consistency_notes:
  - Se usa «espíritu» para πνεῦμα en el texto principal, conforme al criterio POB de mantener el contraste cuerpo/espíritu cuando el contexto antropológico lo requiere.
  - Se traduce YHWH como «Yahvé» por norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se evita «señor»/«Señor» porque no corresponde al presente texto.
  - «Cenizas» en plural sigue el uso español natural y no altera el resultado semántico del griego.
  - «Aire tenue» busca equilibrar fidelidad e inteligibilidad, sin borrar la nota de insustancialidad presente en χαῦνος ἀήρ.
