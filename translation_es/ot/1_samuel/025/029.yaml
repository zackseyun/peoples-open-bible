translation:
  language: es
  text: Aunque un hombre se haya levantado para perseguirte y buscar tu vida[a], la vida de mi señor quedará atada en el atado de los vivos con Yahvé tu Dios, y las vidas de tus enemigos él las lanzará desde el hueco de la honda[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «buscar tu alma». El hebreo נֶפֶשׁ aquí se refiere a la vida amenazada de una persona.
    reason: lexical_alternative
  - marker: b
    text: O «las arrojará lejos». El verbo hebreo evoca de manera deliberada la acción de la honda y contrasta con la imagen de quedar atado para resguardo entre los vivos.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקָם אָדָם
  english_pob_choice: Though a man has risen
  chosen_spanish: Aunque un hombre se haya levantado
  alternatives_spanish:
  - Si un hombre se levanta
  - Aun cuando un hombre se haya levantado
  lexicon: HALOT
  rationale: El waw + qatal funciona aquí con valor concesivo en el discurso de Abigail, no como simple secuencia narrativa. אָדָם es singular y concreto; en español, «un hombre» mantiene el referente personal y la fuerza del contraste.
- source_word: לִרְדָפְךָ
  english_pob_choice: to pursue you
  chosen_spanish: para perseguirte
  alternatives_spanish:
  - para ir tras de ti
  - para darte caza
  lexicon: HALOT
  rationale: רָדַף en contexto hostil expresa persecución. «Perseguirte» es natural en español y conserva la amenaza directa contra David.
- source_word: וּלְבַקֵּשׁ אֶת נַפְשֶׁךָ
  english_pob_choice: and to seek your life
  chosen_spanish: y buscar tu vida
  alternatives_spanish:
  - y buscar tu alma
  - y procurar tu vida
  lexicon: HALOT
  rationale: נֶפֶשׁ aquí denota vida/persona amenazada de muerte. «Buscar tu vida» es idiomático en español y preserva el sentido letal sin espiritualizar «alma».
- source_word: נֶפֶשׁ אֲדֹנִי
  english_pob_choice: the life of my lord
  chosen_spanish: la vida de mi señor
  alternatives_spanish:
  - el alma de mi señor
  - la vida de mi amo
  lexicon: HALOT
  rationale: Se conserva el sentido de vida/persona con el tratamiento respetuoso «mi señor», que refleja el discurso de Abigail a David sin introducir fórmula eclesiástica.
- source_word: צְרוּרָה בִּצְרוֹר הַחַיִּים
  english_pob_choice: shall be bound in the bundle of the living
  chosen_spanish: quedará atada en el haz de los vivos
  alternatives_spanish:
  - quedará envuelta en el haz de la vida
  - será atada en el paquete de los vivos
  lexicon: HALOT
  rationale: Se conserva la imagen concreta de estar atado/seguro para preservación. «Haz» funciona bien en español para el conjunto atado, y «los vivos» refleja el plural del hebreo הַחַיִּים.
- source_word: אֵת יְהוָה אֱלֹהֶיךָ
  english_pob_choice: with Yahweh your God
  chosen_spanish: con Yahvé tu Dios
  alternatives_spanish:
  - junto a Yahvé tu Dios
  - en la presencia de Yahvé tu Dios
  lexicon: HALOT
  rationale: El preposición אֵת expresa asociación/compañía; «con» conserva la idea de resguardo junto a Dios. Se mantiene «Yahvé» por la convención del proyecto para יְהוָה.
- source_word: וְאֵת נֶפֶשׁ אֹיְבֶיךָ
  english_pob_choice: and the lives of your enemies
  chosen_spanish: y las vidas de tus enemigos
  alternatives_spanish:
  - y la vida de tus enemigos
  - y las almas de tus enemigos
  lexicon: HALOT
  rationale: 'El singular נֶפֶשׁ con sujeto plural se expresa naturalmente en español con plural: «las vidas de tus enemigos», manteniendo la contraposición con la preservación de David.'
- source_word: יְקַלְּעֶנָּה
  english_pob_choice: he shall sling out
  chosen_spanish: él las arrojará
  alternatives_spanish:
  - él las lanzará con honda
  - él las despedazará
  lexicon: HALOT
  rationale: El verbo קלע alude específicamente a la acción de la honda, pero en español «arrojará» evita una formulación extraña y sigue el movimiento violento. La nota explica la imagen del honda y su deliberado contraste con el haz de los vivos.
- source_word: בְּתוֹךְ כַּף הַקָּלַע
  english_pob_choice: from the hollow of the sling
  chosen_spanish: desde el hueco de la honda
  alternatives_spanish:
  - desde la cavidad de la honda
  - desde la bolsa de la honda
  lexicon: HALOT
  rationale: כַּף literalmente es «palma/hueco». «Hueco de la honda» comunica la parte cóncava que sostiene la piedra y conserva la imagen visual sin tecnicismo innecesario.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  lexicon: HALOT
  rationale: Se mantiene la transliteración del nombre divino conforme a la convención del proyecto, en vez de sustituirla por un título.
theological_decisions:
- issue: Contraste metafórico entre preservación y destrucción
  english_pob_reading: Preserve the concrete imagery of being bound in a bundle versus being slung away, without over-interpreting it as a developed doctrine of the afterlife.
  chosen_spanish_reading: Conservar la imagen concreta de estar atado en un haz para resguardo frente a ser arrojado por la honda, sin convertirla en una doctrina explícita del más allá.
  alternative_spanish_readings:
  - Interpretar el haz de los vivos como una afirmación directa de vida eterna
  - Aplanar las dos imágenes en una simple protección y derrota
  rationale: La frase hebrea usa metáforas vívidas de preservación y expulsión violenta. La traducción mantiene ese contraste sin añadir contenido doctrinal que el texto no explicita.
  doctrine_reference: Translation philosophy items 1 and 3
- issue: Tratamiento de אָדָם
  english_pob_reading: man
  chosen_spanish_reading: hombre
  alternative_spanish_readings:
  - persona
  - alguien
  rationale: El hebreo es singular masculino y el contexto apunta a un adversario concreto. «Hombre» preserva esa especificidad sin neutralizar el género gramatical del original.
  doctrine_reference: Translation philosophy item 4
- issue: Referencia del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - el Señor
  rationale: Se sigue la convención del proyecto para transliterar el Tetragrámaton, manteniendo el nombre personal de Dios en lugar de reemplazarlo por un título.
  doctrine_reference: Project-level Spanish terminology defaults
translation_notes:
  revision_awareness: La redacción sigue de cerca el paquete fuente hebreo y el rastro auditado en inglés. Se conserva el valor concesivo de la apertura, la metáfora del haz de los vivos, la preposición de asociación con Yahvé tu Dios y la imagen final de la honda. Se incorporó la actualización auditada que entiende el objeto final en plural («las vidas de tus enemigos») por concordancia y sentido colectivo.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה.
  - «Vida» se emplea para נֶפֶשׁ cuando el contexto es existencia amenazada o preservada; no se usa «alma» en el texto principal.
  - Se mantiene un tono respetuoso y bíblico con «mi señor» sin recurrir a lenguaje eclesiástico fijo.
  - La imagen de la honda se conserva en la nota para no perder la fuerza verbal de קלע.
  - El plural «las vidas de tus enemigos» refleja el hebreo colectivo y la revisión auditada en inglés.
