revisions:
- from: Y no introduzcas una abominación en tu casa[a], para que no llegues a ser herem como ella. Ciertamente la detestarás y ciertamente la aborrecerás, porque es herem.
  to: Y no introduzcas una abominación en tu casa, no sea que llegues a ser dedicado a destrucción[a] como ella. Ciertamente la detestarás y ciertamente la aborrecerás, porque es dedicada a destrucción.
  rationale: Se reemplaza la transliteración 'herem' por 'dedicado a destrucción' para seguir la decisión léxica y teológica del POB en inglés y mantener claridad en español. Se mueve la nota al lugar donde aparece חֵרֶם. También se ajusta la advertencia a 'no sea que' para reflejar mejor el valor precautorio de la cláusula.
