  text: 'ܟܬܒܐ ܕܓܠܝܢܐ ܕܒܪܘܟ ܒܪ ܢܪܝܐ ܕܐܬܦܫܩ ܡܢ ܝܘܢܝܐ ܠܣܘܪܝܝܐ.

    1 ܗܘܐ ܒܫܢܬ ܥܣܪܝܢ ܘܚܡܫ ܕܝܘܟܢܝܐ ܡܠܟܐ ܕܝܗܘܕܐ܆ ܗܘܐ ܦܬܓܡܗ ܕܡܪܝܐ ܥܠ ܒܪܘܟ ܒܪ ܢܪܝܐ ܘܐܡܪ ܠܗ܆

    2 ܚܙܝܬ ܟܠ ܡܕܡ ܕܥܒܕ ܠܝ ܥܡܐ ܗܢܐ܆ ܒܝ̈ܫܬܐ ܕܥܒܕܘ ܬܪ̈ܬܝܢ ܫܪ̈ܒܢ ܕܐܫܬܚܪܝ ܝܬܝܪ ܡܢ ܥܣܪ ܫܪ̈ܒܢ ܕܐܫܬܒܝܘ܆

    3 ܫܪ̈ܒܬܐ ܓܝܪ ܩܕ̈ܡܝܬܐ ܡܢ ܡܠܟܝ̈ܗܘܢ ܐܬܐܠܨܘ ܕܢܚܛܘܢ܆ ܬܪ̈ܬܝܢ ܕܝܢ ܫܪ̈ܒܢ ܗܠܝܢ ܐܢܝܢ ܕܚܨܘ ܘܐܠܨܘ ܠܡܠܟܝ̈ܗܘܢ ܕܢܚܛܘܢ.

    4 ܡܛܠ ܗܢܐ ܗܐ ܡܝܬܐ ܐܢܐ ܒܝܫܬܐ ܥܠ ܡܕܝܢܬܐ ܗܕܐ ܘܥܠ ܥܡܘܪ̈ܝܗ܆ ܘܬܬܬܪܝܡ ܡܢ ܩܕܡܝ ܥܕ ܙܒܢܐ܆ ܘܡܒܕܪ ܐܢܐ ܠܗ ܠܥܡܐ ܗܢܐ ܒܝܢܬ ܥܡܡ̈ܐ ܕܠܥܡܡ̈ܐ ܢܘܬܪ.

    5 ܘܡܬܪܕܐ ܥܡܝ ܘܢܐܬܐ ܙܒܢܐ ܘܢܒܥܘܢ ܡܘܨܠܚܘܬܗܘܢ ܕܙܒܢܝ̈ܗܘܢ܀'
