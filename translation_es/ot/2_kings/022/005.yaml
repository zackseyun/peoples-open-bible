    rationale: La evidencia inglesa explica que «repair the damage» es literalmente «strengthen the breach/damage». La nota española actual solo glosa «daño» como «brecha/daño», pero conviene señalar la expresión completa para preservar el razonamiento lexical.
  revised_spanish_text: y que lo ponga[a] en manos de los obreros que están encargados en la casa de Yahvé, y que se lo den a los obreros que están en la casa de Yahvé para reparar el daño[b] de la casa.
  revised_footnotes:
  - marker: a
    text: O «y que lo dé». El verbo hebreo es «dar», pero el modismo significa poner algo bajo la custodia de alguien.
