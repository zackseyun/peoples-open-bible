translation:
  language: es
  text: Él envió redención a su pueblo; ha mandado su alianza para siempre[b]. Santo y temible es su nombre[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «digno de temor reverente» o «asombroso». El hebreo destaca tanto el temor reverente como la admiración sobrecogida.
    reason: lexical_alternative
  - marker: b
    text: O «ha ordenado su alianza».
    reason: previous_rendering
lexical_decisions:
- source_word: פְּדוּת
  english_pob_choice: redemption
  chosen_spanish: redención
  alternatives_spanish:
  - rescate
  - liberación
  lexicon: HALOT
  rationale: En este salmo, el sustantivo expresa liberación efectiva provista por Dios. «Redención» conserva el peso teológico del término y es natural en español bíblico contemporáneo.
- source_word: שָׁלַח
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - despachó
  lexicon: HALOT
  rationale: El verbo básico es «enviar». «Envió» reproduce de forma directa la imagen concreta de Dios iniciando la liberación.
- source_word: לְעַמּוֹ
  english_pob_choice: to his people
  chosen_spanish: a su pueblo
  alternatives_spanish:
  - para su pueblo
  lexicon: HALOT
  rationale: La preposición con este sustantivo admite dirección o destinatario. En español, «a su pueblo» expresa con claridad el destinatario de la acción divina.
- source_word: צִוָּה
  english_pob_choice: has commanded
  chosen_spanish: ha mandado
  alternatives_spanish:
  - ha ordenado
  - ha decretado
  lexicon: HALOT
  rationale: El verbo significa dar una orden, establecer por mandato o disponer autoritativamente. «Ha mandado» preserva el valor léxico directo sin volverlo excesivamente interpretativo.
- source_word: לְעוֹלָם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - eternamente
  - perpetuamente
  lexicon: HALOT
  rationale: En este contexto de alabanza, «para siempre» es la equivalencia natural en español para duración ilimitada.
- source_word: בְּרִיתוֹ
  english_pob_choice: his covenant
  chosen_spanish: su pacto
  alternatives_spanish:
  - su alianza
  - su convenio
  lexicon: HALOT
  rationale: «Pacto» comunica el valor bíblico de בְּרִית en español de modo claro y ampliamente comprensible, sin cargarlo con un registro confesional más técnico que el hebreo por sí mismo.
- source_word: קָדוֹשׁ
  english_pob_choice: holy
  chosen_spanish: Santo
  alternatives_spanish:
  - Sagrado
  - Consagrado
  lexicon: HALOT
  rationale: Aplicado al nombre de Dios, «santo» es la traducción estable y adecuada, preservando la cualidad de separación y pureza divina.
- source_word: וְנוֹרָא
  english_pob_choice: awesome
  chosen_spanish: temible
  alternatives_spanish:
  - asombroso
  - digno de reverencia
  - awe-inspiring
  lexicon: HALOT
  rationale: El hebreo subraya tanto temor reverente como majestad imponente. «Temible» mantiene con más fuerza esa tensión que «asombroso», que en español puede sonar debilitado.
- source_word: שְׁמוֹ
  english_pob_choice: his name
  chosen_spanish: su nombre
  lexicon: HALOT
  rationale: Se conserva «nombre» de manera literal, como en la poesía bíblica, donde alude al carácter y reputación revelados de Dios.
theological_decisions:
- issue: Fuerza de צִוָּה con בְּרִיתוֹ
  english_pob_reading: he has commanded his covenant forever
  chosen_spanish_reading: ha mandado su pacto para siempre
  alternative_spanish_readings:
  - ha ordenado su pacto para siempre
  - ha decretado su pacto para siempre
  rationale: Se mantiene la fuerza verbal de «mandar» en lugar de suavizarla con una formulación más interpretativa. Así se conserva la tensión de un pacto sostenido por un acto soberano de Dios.
  doctrine_reference: Translation philosophy §1, §5
- issue: Valor de וְנוֹרָא aplicado al nombre de Dios
  english_pob_reading: awesome
  chosen_spanish_reading: temible
  alternative_spanish_readings:
  - digno de reverencia
  - asombroso
  - inspirador de temor reverente
  rationale: El verso atribuye al nombre de Dios una santidad que suscita reverente temor. «Temible» protege mejor ese matiz que una opción más suave, aunque en español puede requerir catequesis de lectura para no entenderse como mera amenaza.
  doctrine_reference: Translation philosophy §3, §6
translation_notes:
  revision_awareness: El contexto inglés pasó por una revisión menor en 2026-04-23 para volver de «ordained» a «commanded» en צִוָּה, por mayor cercanía léxica al hebreo. La presente versión española refleja esa decisión conservando el valor directo de mandato en «ha mandado».
  spanish_consistency_notes:
  - Se usa «Yahvé» no porque aparezca en este versículo, sino como convención general del proyecto cuando el tetragrámaton está presente; aquí el texto habla de Dios con pronombre.
  - Se eligió «pacto» para בְּרִית por claridad bíblica y consistencia terminológica, manteniendo el registro del proyecto.
  - «Temible» se conserva deliberadamente para no diluir el componente de temor reverente presente en וְנוֹרָא.
  - La construcción poética mantiene paralelismo y puntuación breve para reflejar el hebreo sin volver el español rígido.
