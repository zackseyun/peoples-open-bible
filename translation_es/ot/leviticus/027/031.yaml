lexical_decisions:
- source_word: וְ/אִם
  english_pob_choice: But if
  chosen_spanish: Pero si
  alternatives_spanish:
  - Y si
  - Si
  lexicon: HALOT
  rationale: La partícula condicional en contexto legal introduce un caso alternativo dentro de una secuencia normativa. «Pero si» conserva la continuidad y el matiz transicional del hebreo sin sonar forzado en español.
- source_word: גָּאֹל יִגְאַל
  english_pob_choice: redeems
  chosen_spanish: redime
  alternatives_spanish:
  - quiere redimir
  - redime realmente
  - rescata
  lexicon: HALOT
  rationale: La construcción infinitivo absoluto + imperfecto intensifica la acción. En español no se refleja de manera natural con un adverbio; «redime» conserva el valor verbal sin añadir una interpretación voluntarista que el hebreo no exige.
- source_word: אִישׁ
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  - alguien
  lexicon: HALOT
  rationale: El hebreo usa masculino singular en estilo jurídico y con valor genérico. Se mantiene «un hombre» para respetar la forma del texto fuente y la precisión gramatical.
- source_word: מִמַּעַשְׂרוֹ
  english_pob_choice: any of his tithe
  chosen_spanish: alguna parte de su diezmo
  alternatives_spanish:
  - de su diezmo
  - algo de su diezmo
  lexicon: HALOT
  rationale: El מִן partitivo indica rescate de una porción del diezmo. «Alguna parte de su diezmo» hace explícita esa idea de porción sin sobrecargar la frase; «de su diezmo» sería más literal pero menos claro en español.
- source_word: חֲמִשִׁיתוֹ
  english_pob_choice: a fifth
  chosen_spanish: un quinto
  alternatives_spanish:
  - una quinta parte
  - un quinto de más
  lexicon: HALOT
  rationale: El sustantivo significa una quinta parte. «Un quinto» es la forma más natural y fiel en español legal y contable.
- source_word: יֹסֵף עָלָיו
  english_pob_choice: he shall add a fifth to it
  chosen_spanish: añadirá a ello un quinto
  alternatives_spanish:
  - le añadirá un quinto
  - añadirá sobre ello un quinto
  lexicon: HALOT
  rationale: El hebreo expresa adición sobre la cantidad principal. «Añadirá a ello un quinto» mantiene el orden y la relación de adición sin introducir una frase idiomática que ocultaría la estructura legal del original.
theological_decisions:
- issue: Carácter legal y restitutivo del mandamiento
  english_pob_reading: A person redeeming part of the tithe must add a fifth to it.
  chosen_spanish_reading: Quien redime parte del diezmo debe añadir un quinto adicional.
  alternative_spanish_readings:
  - Quien rescata parte del diezmo debe añadir un quinto.
  - Si un hombre redime parte de su diezmo, añadirá a ello un quinto.
  rationale: El versículo establece una norma de restitución, no una reflexión devocional. La redacción española conserva el carácter jurídico y la exigencia cuantitativa del texto.
  doctrine_reference: Levítico 27:31; principio de restitución legal en la Torá
translation_notes:
  revision_awareness: Se siguió el estado revisado más reciente del audit trail inglés, que eliminó el adverbio «indeed» por resultar innecesario y poco natural. La versión española evita también cualquier intensificación adverbial adicional y conserva solo la fuerza verbal del hebreo.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto cuando aparezca el Tetragrámaton; este versículo no lo contiene.
  - Se prefirió «diezmo» para מַעֲשֵׂר por ser el término jurídico-bíblico estándar en español.
  - «Un hombre» conserva el masculino genérico legal del hebreo sin cambiarlo por una neutralización no requerida por la fuente.
