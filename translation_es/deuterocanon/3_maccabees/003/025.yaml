    text: The phrase 'with abuse and plundering' conveys both humiliating mistreatment (ὕβρις) and stripping/spoliation (σκυλμοί).
    reason: lexical_alternative
  - marker: c
    text: '''Pit'' may be literal or may function as a vivid image for a place of destruction and disgrace.'
    reason: lexical_alternative
