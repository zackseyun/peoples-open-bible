lexical_decisions:
- source_word: εὐφραινόμεθα
  english_pob_choice: we rejoice
  chosen_spanish: nos alegramos
  alternatives_spanish:
  - nos gozamos
  - rejoicijamos
  - nos deleitamos
  lexicon: BDAG
  rationale: El verbo griego expresa alegrarse o regocijarse. En español, «nos alegramos» comunica con naturalidad el sentido de gozo presente sin endurecerlo en una calca.
- source_word: δὲ
  english_pob_choice: but
  chosen_spanish: pero
  alternatives_spanish:
  - y
  - ahora
  lexicon: BDAG
  rationale: La partícula introduce una leve transición o contraste. «Pero» reproduce bien ese matiz breve y mantiene la cadencia del miembro anterior.
- source_word: ἐπὶ
  english_pob_choice: in
  chosen_spanish: en
  alternatives_spanish:
  - por
  - sobre
  - a causa de
  lexicon: BDAG
  rationale: Con dativo, ἐπὶ marca aquí la base o motivo del gozo. En español, «alegrarnos en» conserva la cercanía sintáctica con «su gloria» y evita sobreexplicar la relación.
- source_word: τῇ δόξῃ
  english_pob_choice: glory
  chosen_spanish: gloria
  alternatives_spanish:
  - honor
  - renombre
  - reputación
  lexicon: BDAG
  rationale: δόξα puede referirse a gloria, honor o reputación. Dado el contexto, «gloria» conserva la conexión léxica y el tono elevado; las alternativas semánticas quedan documentadas para la ambigüedad contextual.
- source_word: ὑμῶν
  english_pob_choice: your
  chosen_spanish: su
  alternatives_spanish:
  - de ustedes
  - vuestro
  lexicon: BDAG
  rationale: El posesivo griego es de segunda persona plural. En español, «su» resulta natural y abarca el referente colectivo sin introducir una forma regional marcada.
translation_notes:
  revision_awareness: Se revisó el tramo breve del griego y el audit trail inglés. No hubo revisiones aplicadas en el pass más reciente; la versión española sigue la lectura óptima-equivalente del POB inglés, pero evita depender mecánicamente de la sintaxis inglesa.
  spanish_consistency_notes:
  - Se mantiene «gloria» como traducción principal de δόξα, con nota que preserva las alternativas semánticas documentadas.
  - Se usa un español bíblico moderno y natural, sin sustituir el matiz de regocijo por una formulación demasiado interpretativa.
  - La partícula inicial «Pero» refleja la transición leve de δέ en una cláusula muy breve.
