translation:
  language: es
  text: Entonces Moisés y Aarón fueron y reunieron a todos los ancianos de los hijos de Israel[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «los israelitas» o, tradicionalmente, «los hijos de Jacob/Israel».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלֶךְ
  english_pob_choice: went
  chosen_spanish: fueron
  alternatives_spanish:
  - se fueron
  - marcharon
  - fueron juntos
  lexicon: HALOT
  rationale: El verbo de movimiento en wayyiqtol avanza la narración con un sentido simple de desplazamiento. En español, con sujeto coordinado («Moisés y Aarón»), «fueron» suena natural y fiel sin añadir matices innecesarios.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  alternatives_spanish:
  - Mosés
  lexicon: Nombre propio estándar
  rationale: Transliteración española habitual y reconocible del nombre propio.
- source_word: אַהֲרֹן
  english_pob_choice: Aaron
  chosen_spanish: Aarón
  alternatives_spanish:
  - Aaron
  lexicon: Nombre propio estándar
  rationale: Forma española estándar del nombre propio bíblico.
- source_word: וַיַּאַסְפוּ
  english_pob_choice: gathered
  chosen_spanish: reunieron
  alternatives_spanish:
  - juntaron
  - convocaron
  - asamblearon
  lexicon: HALOT
  rationale: El verbo אסף aquí significa reunir personas. «Reunieron» expresa con naturalidad la acción de convocar/agrupar personas en español, manteniendo el sentido colectivo del contexto.
- source_word: כָּל
  english_pob_choice: all
  chosen_spanish: todos
  alternatives_spanish:
  - todo el grupo de
  - la totalidad de
  lexicon: HALOT
  rationale: «Todos» reproduce de forma directa la idea de totalidad del hebreo.
- source_word: זִקְנֵי
  english_pob_choice: elders
  chosen_spanish: ancianos
  alternatives_spanish:
  - líderes
  - jefes
  lexicon: HALOT
  rationale: En este contexto, זקנים no designa solo edad avanzada sino a los dirigentes reconocidos de la comunidad. «Ancianos» conserva la forma lexical tradicional y la función social del término.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos varones de Israel
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Se conserva la expresión filial explícita del hebreo. «Hijos de Israel» mantiene la forma del original y su resonancia de linaje/covenio, sin sustituirla por un etnónimo más general.
theological_decisions:
- issue: Rendición de בני ישראל
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - los hijos varones de Israel
  - el pueblo de Israel
  rationale: No hay controversia doctrinal directa, pero la frase expresa identidad de pacto y descendencia. Se prefiere conservar la estructura hebrea antes que aplanarla a un etnónimo general.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: El control de revisión indica que el texto inglés ya fue evaluado sin cambios necesarios y con acuerdo alto; esta versión española sigue ese mismo trazado, conservando la sintaxis narrativa simple y la equivalencia léxica principal sin introducir expansión interpretativa.
  spanish_consistency_notes:
  - Se mantiene «Moisés» y «Aarón» como formas españolas estándar.
  - Se usa «reunieron» para אסף, evitando un calco innecesario.
  - «Ancianos» conserva el valor técnico-social de זקנים.
  - «Hijos de Israel» preserva la expresión hebrea explícita, con nota alternativa para «israelitas».
