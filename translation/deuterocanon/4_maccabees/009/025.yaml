theological_decisions:
- issue: Rendering of τὴν ψυχήν in a death idiom
  chosen_reading: life
  alternative_readings:
  - soul
  rationale: In this context ψυχή is part of an idiomatic expression for dying, not necessarily a technical statement about the separable soul. Rendering it as 'life' preserves the event described while avoiding importing a more specific doctrinal anthropology than the phrase itself demands.
  doctrine_reference: Preserve theological tension rather than resolve it; readable modern English, not archaic or academic.
