review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador transmite bien la estructura básica del hebreo: el Mar sobre doce bueyes, tres orientados en cada dirección cardinal, con el Mar encima de ellos y las partes traseras hacia el interior. Sin embargo, hay dos desajustes con la evidencia y la auditoría inglesa: la nota [a] está anclada en ''norte'' cuando corresponde a ''oeste'', y la nota [b] no preserva la alternativa auditada sobre אֲחֹרֵיהֶם/בָּיְתָה sino que introduce una nota distinta sobre ''por encima''. Además, ''mirando'' es comprensible pero ''orientados hacia'' o ''vueltos hacia'' refleja mejor la función de פֹנִים en una descripción arquitectónica.'
  spanish_quality_summary: El español es claro y legible, pero puede mejorarse para sonar más natural y preciso en un contexto descriptivo-técnico. 'Estaba sobre doce bueyes' funciona. 'Mirando al...' personifica un poco las figuras; 'vueltos hacia' suena más idiomático aquí. 'Estaba sobre ellos, por encima' resulta algo redundante y menos fluido que 'estaba sobre ellos arriba' o, mejor, mantener simplemente 'estaba sobre ellos arriba' como reflejo cercano del hebreo. 'Quedaban hacia adentro' es aceptable, aunque 'estaban hacia el interior' o 'hacia adentro' también sirve.
  glossary_alignment: No hay conflicto con terminología teológica del proyecto. 'el Mar' con mayúscula está bien preservado como nombre técnico. 'bueyes' corresponde bien a בָּקָר. No aparece el nombre divino ni otros términos sensibles del glosario. La principal corrección es de notas y de una elección estilística para פֹנִים.
  issues:
  - severity: high
    issue: La nota [a] está anclada en 'norte' en vez de en 'oeste'.
    rationale: La nota explica יָמָּה = 'hacia el mar' > 'oeste', por lo que debe marcar la palabra 'oeste' en el texto español, no 'norte'.
  - severity: high
    issue: La nota [b] no corresponde a la nota auditada en inglés.
    rationale: El POB inglés conserva como alternativa 'hindquarters / toward the inside' para אֲחֹרֵיהֶם בָּיְתָה. La nota española actual comenta 'por encima', creando una nota nueva innecesaria y omitiendo la alternativa significativa preservada por la auditoría.
  - severity: medium
    issue: '''mirando al...'' no es la mejor opción para פֹנִים en esta descripción.'
    rationale: Aunque comprensible, 'mirando' suena algo antropomórfico. En contexto arquitectónico, 'vueltos hacia' expresa mejor la orientación de las figuras.
  - severity: low
    issue: '''sobre ellos, por encima'' suena redundante.'
    rationale: La secuencia refleja el hebreo, pero en español puede pulirse levemente sin perder cercanía al original.
  revised_spanish_text: 'Estaba sobre doce bueyes: tres vueltos hacia el norte, tres vueltos hacia el oeste[a], tres vueltos hacia el sur y tres vueltos hacia el este; y el Mar estaba sobre ellos arriba, y todas sus partes traseras estaban hacia adentro[b].'
  revised_footnotes:
  - marker: a
    text: 'Hebreo literalmente: "hacia el mar", una manera bíblica estándar de indicar el oeste.'
    reason: lexical_alternative
  - marker: b
    text: 'O: "todas sus ancas estaban hacia el interior".'
    reason: lexical_alternative
  revision_rationale: 'Se corrigen las notas para que coincidan con la evidencia y la auditoría inglesa: [a] se mueve a ''oeste'', y [b] ahora preserva la alternativa significativa para ''sus partes traseras ... hacia adentro''. También se ajusta ''mirando'' a ''vueltos hacia'' para reflejar mejor la orientación de פֹנִים en una descripción de figuras, y se simplifica levemente la redacción para mejorar la naturalidad del español sin apartarse del hebreo.'
