translation:
  language: es
  text: 'Por esta razón, una grave crisis los rodeó: aquellos cuyas costumbres[a] envidiaban y a quienes querían imitar se convirtieron en sus enemigos y castigadores[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Costumbres» también puede entenderse como «modo de vida».
    reason: lexical_alternative
  - marker: b
    text: O «a causa de ellos» al inicio del versículo; el giro griego puede señalar específicamente a las personas recién mencionadas como causa del sufrimiento que sigue.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὧν καὶ χάριν
  english_pob_choice: For this reason
  chosen_spanish: Por esta razón
  alternatives_spanish:
  - a causa de ellos
  - por cuya causa
  lexicon: LSJ
  rationale: La expresión idiomática con χάριν y genitivo puede expresar causa o motivo. En contexto introduce la consecuencia provocada por las personas mencionadas antes; «Por esta razón» conserva la fuerza causal en un español natural y claro.
- source_word: περιεῖχεν
  english_pob_choice: surrounded
  chosen_spanish: los rodeó
  alternatives_spanish:
  - los cercó
  - los envolvió
  lexicon: LSJ
  rationale: El verbo expresa rodear o enclavar. Con περίστασις, la imagen es de aflicción que cercaba a los sujetos; «los rodeó» mantiene la metáfora sin sonar forzado en español.
- source_word: χαλεπὴ περίστασις
  english_pob_choice: a harsh crisis
  chosen_spanish: una dura angustia
  alternatives_spanish:
  - una grave situación
  - una penosa estrechez
  lexicon: LSJ
  rationale: περίστασις aquí designa una situación apremiante o de presión, y χαλεπὴ la intensifica. «Dura angustia» comunica bien la severidad y el peso de la calamidad en español bíblico contemporáneo.
- source_word: ἐζήλουν
  english_pob_choice: envied
  chosen_spanish: envidiaban
  alternatives_spanish:
  - codiciaban
  - anhelaban
  lexicon: LSJ
  rationale: ζηλόω puede abarcar celo, emulación o envidia. Por el contexto de imitación de costumbres ajenas y la valoración negativa del pasaje, «envidiaban» preserva el matiz moral desfavorable.
- source_word: τὰς ἀγωγὰς
  english_pob_choice: ways
  chosen_spanish: las maneras
  alternatives_spanish:
  - las costumbres
  - el modo de vida
  lexicon: LSJ
  rationale: ἀγωγή puede referirse a conducta, formación o modo de vida. En este contexto helenizante apunta a prácticas y estilo de vida; «maneras» es amplio, legible y suficientemente cercano sin imponer una precisión más estrecha de la que el griego exige.
- source_word: καθʼ ἃ ἤθελον ἐξομοιοῦσθαι
  english_pob_choice: whom they wanted to imitate
  chosen_spanish: a quienes querían imitar
  alternatives_spanish:
  - con cuyas maneras querían conformarse
  - a quienes deseaban hacerse semejantes
  lexicon: LSJ
  rationale: ἐξομοιοῦσθαι significa hacerse semejante o conformarse. Dado que el relativo apunta a personas, la formulación idiomática «a quienes querían imitar» transmite el sentido sin perder la relación con el antecedente.
- source_word: πολεμίους
  english_pob_choice: enemies
  chosen_spanish: enemigos
  alternatives_spanish:
  - adversarios
  - hostiles
  lexicon: LSJ
  rationale: Es la traducción directa y precisa del término para oponentes hostiles.
- source_word: τιμωρητὰς
  english_pob_choice: punishers
  chosen_spanish: castigadores
  alternatives_spanish:
  - vengadores
  - ejecutores del castigo
  lexicon: LSJ
  rationale: τιμωρητής designa a quien impone castigo o retribución. «Castigadores» conserva la idea de retribución sin sobrecargar el texto con un matiz específicamente judicial o vengativo que el contexto no exige de forma exclusiva.
- source_word: ἔσχον
  english_pob_choice: became
  chosen_spanish: se convirtieron en
  alternatives_spanish:
  - resultaron ser
  - llegaron a ser
  lexicon: LSJ
  rationale: 'Aunque literalmente significa «tuvieron», en español el sentido es relacional y resultativo: estas personas terminaron siendo enemigos y castigadores. «Se convirtieron en» comunica esa resultante de manera natural.'
theological_decisions:
- issue: La carga moral de la imitación de costumbres extranjeras y la retribución resultante
  english_pob_reading: 'The verse is rendered as a statement of ironic retribution: the very people whose ways they envied became their enemies and punishers.'
  chosen_spanish_reading: 'El versículo se vierte como una afirmación de retribución irónica: precisamente aquellos cuyas maneras envidiaban llegaron a ser sus enemigos y castigadores.'
  alternative_spanish_readings:
  - Una descripción más neutra de que luego fueron opuestos por quienes admiraban
  - Una formulación menos marcada moralmente
  rationale: El griego, especialmente ἐζήλουν y τιμωρητάς, mantiene una valoración negativa y un efecto retributivo en el marco del capítulo. La redacción española conserva esa tensión moral sin añadir comentario doctrinal externo ni suavizar el juicio implícito.
  doctrine_reference: Principio de primacía del original y de preservar la tensión moral del texto sin resolverla artificialmente.
translation_notes:
  revision_awareness: No se observan cambios relevantes en la última revisión; se mantiene la lectura de alta concordancia con el griego y con el registro POB inglés. La propuesta española sigue el mismo trazado semántico y conserva la ambigüedad causal del inicio junto con el matiz conductual de ἀγωγάς.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general, aunque este versículo no lo contiene.
  - Se evita «SEÑOR» por convención de ocultamiento; no aplica aquí.
  - «Castigadores» se usa para τιμωρητάς en coherencia con la fuerza retributiva del pasaje.
  - «Maneras» se deja con nota porque puede equivaler a «costumbres» o «modo de vida» en este contexto helenizante.
