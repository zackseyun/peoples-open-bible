base_translation:
  language: en
  yaml_path: translation/ot/isaiah/026/018.yaml
  text: We were pregnant[a], we writhed in labor; as it were, we gave birth to wind. We accomplished no deliverance in the earth[c][b], and the inhabitants of the world were not born.
  footnotes:
  - marker: a
    text: Or, 'we conceived.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'we gave birth to breath' or 'we gave birth to spirit'; the Hebrew word can mean 'wind,' 'breath,' or 'spirit.'
    reason: lexical_alternative
  - marker: c
    text: Or, 'the inhabitants of the world have not come to birth' / 'have not been born.' The verb usually means 'fall,' but some understand it here in keeping with the childbirth imagery.
    reason: alternative_reading
