id: LJE.1.34
reference: Letter of Jeremiah 1:34
source:
  edition: lxx-swete-1909
  text: ὡσαύτως οὔτε πλοῦτον οὔτε χαλκὸν οὐ μὴ δύνωνται δοῦναι· ἐάν τις αὐτοῖς εὐχὴν εὐξάμενος μὴ ἀποδῷ, οὐ μὴ ἐπιζητήσωσιν.
  language: Greek
  pages:
  - 402
  - 403
  - 404
  - 405
  - 406
  - 407
  confidence: high
  validation: agree
translation:
  text: Likewise[a], they are certainly not able to give either wealth or bronze; if someone makes a vow to them and does not pay it back[b], they will certainly not seek it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'copper,' possibly implying money or valuables made from bronze.
    reason: lexical_alternative
  - marker: b
    text: Or 'they will certainly not demand it.' The Greek literally says 'seek it.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὡσαύτως
  chosen: Likewise
  alternatives:
  - In the same way
  - Similarly
  lexicon: BDAG
  rationale: Introduces another parallel example in the argument against idols; 'Likewise' is concise and natural.
- source_word: πλοῦτον
  chosen: wealth
  alternatives:
  - riches
  - money
  lexicon: BDAG
  rationale: πλοῦτος commonly denotes wealth or riches broadly. 'Wealth' fits the abstract object of what idols cannot give.
- source_word: χαλκὸν
  chosen: bronze
  alternatives:
  - copper
  - money
  lexicon: BDAG
  rationale: The literal sense is 'bronze/copper.' In context it may imply money or valuable metal, but the Greek names the metal itself, so 'bronze' preserves the source wording most transparently.
- source_word: οὐ μὴ δύνωνται δοῦναι
  chosen: they are certainly not able to give
  alternatives:
  - they cannot possibly give
  - they are by no means able to give
  lexicon: BDAG
  rationale: οὐ μή with the subjunctive gives strong negation. 'Certainly not able' preserves the emphatic denial without sounding archaic.
- source_word: ἐάν τις αὐτοῖς εὐχὴν εὐξάμενος
  chosen: if someone makes a vow to them
  alternatives:
  - if anyone vows a vow to them
  - if someone prays a vow to them
  lexicon: BDAG
  rationale: The cognate construction εὐχὴν εὐξάμενος is idiomatically 'make a vow.' Retaining 'vow' rather than 'prayer' best matches the following requirement to fulfill it.
- source_word: μὴ ἀποδῷ
  chosen: does not pay it back
  alternatives:
  - does not fulfill it
  - does not render it
  lexicon: BDAG
  rationale: ἀποδίδωμι with a vow means to pay or fulfill what was vowed. 'Pay it back' keeps the concrete force while remaining understandable.
- source_word: οὐ μὴ ἐπιζητήσωσιν
  chosen: they will certainly not seek it
  alternatives:
  - they will not demand it
  - they will certainly not ask for it
  lexicon: BDAG
  rationale: ἐπιζητέω means seek, look for, or demand. In this context the sense is that idols do not call worshipers to account. 'Seek it' stays close to the Greek, while the accountability nuance remains clear from context.
