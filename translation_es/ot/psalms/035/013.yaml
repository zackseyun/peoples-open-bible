translation:
  language: es
  text: Pero yo, cuando ellos estaban enfermos, mi vestidura era de saco[b]; me humillé con ayuno[c], y mi oración volvió a mi pecho[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, “mi oración volvió sin respuesta”, o “mi oración volvió para beneficiarme”. La expresión hebrea es idiomática y puede indicar que su intercesión no cambió la hostilidad de ellos, o que el beneficio de su oración volvió a él.
    reason: alternative_reading
  - marker: b
    text: El saco era una vestidura áspera de duelo, que expresaba dolor, angustia o arrepentimiento.
    reason: cultural_note
  - marker: c
    text: Literalmente, “afligí mi alma con ayuno”, un modismo hebreo para expresar humillación propia por medio del ayuno.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּחֲלוֹתָם
  english_pob_choice: when they were sick
  chosen_spanish: cuando ellos estaban enfermos
  alternatives_spanish:
  - en su enfermedad
  - cuando estaban mal
  lexicon: HALOT
  rationale: 'La forma con ב + infinitivo indica tiempo: “cuando estaban enfermos”. “Eran enfermos” no suena natural en español, así que “estaban enfermos” comunica el estado sin perder el valor temporal.'
- source_word: לְבוּשִׁי שָׂק
  english_pob_choice: my clothing was sackcloth
  chosen_spanish: mi ropa era saco
  alternatives_spanish:
  - mi vestidura era saco
  - yo me vestí de saco
  lexicon: HALOT
  rationale: 'El hebreo es una cláusula nominal: literalmente “mi vestidura [era] saco”. “Mi ropa era saco” conserva esa estructura y el valor de duelo del término שָׂק sin convertirlo en una acción distinta.'
- source_word: עִנֵּיתִי
  english_pob_choice: I humbled myself
  chosen_spanish: me humillé
  alternatives_spanish:
  - me afligí
  - me sometí
  lexicon: HALOT
  rationale: En este contexto de ayuno y duelo, ענה en piel expresa auto-humillación. “Me humillé” transmite el sentido idiomático con claridad en español; “me afligí” queda como alternativa más cercana al valor léxico, pero menos natural aquí.
- source_word: בַצּוֹם נַפְשִׁי
  english_pob_choice: with fasting
  chosen_spanish: con ayuno
  alternatives_spanish:
  - mediante el ayuno
  - ayunando
  lexicon: HALOT
  rationale: El hebreo dice literalmente “con ayuno mi alma”, una fórmula idiomática de negación propia. Como el español no requiere expresar “mi alma” aquí, “con ayuno” preserva el medio sin volver opaca la frase.
- source_word: וּתְפִלָּתִי
  english_pob_choice: and my prayer
  chosen_spanish: y mi oración
  alternatives_spanish:
  - y mi plegaria
  lexicon: HALOT
  rationale: תְפִלָּה se traduce de manera estándar como “oración” en español bíblico contemporáneo. “Plegaria” es posible, pero “oración” mantiene mayor cercanía y claridad.
- source_word: עַל חֵיקִי
  english_pob_choice: to my own bosom
  chosen_spanish: a mi pecho
  alternatives_spanish:
  - a mi seno
  - en mi regazo
  lexicon: HALOT
  rationale: חֵיק abarca pecho, seno o regazo. “Pecho” comunica el espacio íntimo y personal del retorno de la oración sin sonar arcaico; “mi seno” es más literal, pero menos natural para lectores actuales.
- source_word: תָשׁוּב
  english_pob_choice: returned
  chosen_spanish: volvió
  alternatives_spanish:
  - regresó
  - retornó
  lexicon: HALOT
  rationale: שוב significa volver/regresar. “Volvió” es la opción más natural en español y mantiene el movimiento de retorno. Se evita resolver la ambigüedad del hebreo sobre si la oración volvió sin efecto o volvió para beneficio del hablante.
theological_decisions:
- issue: Ambigüedad de “mi oración volvió a mi pecho”
  english_pob_reading: The main text preserves the Hebrew image without resolving whether the prayer was unanswered, withdrawn, or brought benefit back to the psalmist.
  chosen_spanish_reading: El texto principal conserva la imagen hebrea sin decidir si la oración quedó sin respuesta, si fue retirada, o si su beneficio volvió al salmista.
  alternative_spanish_readings:
  - mi oración volvió sin respuesta
  - mi oración volvió para beneficiarme
  - mi oración regresó a mí
  rationale: El hebreo permite varias lecturas idiomáticas. Mantener la metáfora en el texto principal preserva la tensión documentada por el POB inglés y evita imponer una interpretación no obligatoria.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y conserva la ambigüedad idiomática señalada en el audit trail inglés. No se registran revisiones previas en este pasaje; por tanto, el texto refleja el estado más reciente sin cambios.
  spanish_consistency_notes:
  - Se mantiene “Yahvé” solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se conserva la distinción entre cláusula nominal y verbal en “mi ropa era saco”, para no suavizar el hebreo.
  - La combinación “me humillé con ayuno” está alineada con el valor idiomático de auto-abatimiento, no con mera abstinencia física.
  - “Mi pecho”/“mi oración volvió a mi pecho” conserva la imagen interior sin imponer una resolución interpretativa.
