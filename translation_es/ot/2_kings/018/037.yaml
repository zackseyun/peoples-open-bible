translation:
  language: es
  text: Entonces Eliacim hijo de Hilcías, que estaba a cargo de la casa, y Sebna el escriba, y Joah hijo de Asaf, el registrador, vinieron a Ezequías con sus vestidos rasgados y le contaron las palabras de Rabsaces[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Rabsaces es un título oficial asirio, posiblemente el de un alto oficial, como un copero principal o vocero.
    reason: cultural_note
lexical_decisions:
- source_word: וַיָּבֹא
  english_pob_choice: Then ... came
  chosen_spanish: Entonces ... fueron
  alternatives_spanish:
  - Y ... vinieron
  - Entonces ... vinieron
  lexicon: HALOT
  rationale: El hebreo abre la escena con una forma verbal narrativa y un sujeto compuesto. En español, con el grupo completo explicitado, el plural natural es «fueron/vinieron». «Entonces» conserva la marca narrativa del waw sin forzar un calco.
- source_word: אֲשֶׁר עַל הַבַּיִת
  english_pob_choice: who was over the household
  chosen_spanish: que estaba sobre la casa
  alternatives_spanish:
  - que estaba sobre el palacio
  - que estaba a cargo de la casa
  lexicon: HALOT
  rationale: La expresión es un título oficial de administración real. «Sobre la casa» preserva la estructura hebrea y la función cortesana; «a cargo de la casa» aclara ligeramente, pero suaviza la forma del original.
- source_word: הַסֹּפֵר
  english_pob_choice: the scribe
  chosen_spanish: el escriba
  alternatives_spanish:
  - el secretario
  lexicon: HALOT
  rationale: «Escriba» reproduce bien el título oficial y coincide con el valor administrativo del término en el contexto de corte.
- source_word: הַמַּזְכִּיר
  english_pob_choice: the recorder
  chosen_spanish: el registrador
  alternatives_spanish:
  - el recorder
  - el cronista
  lexicon: HALOT
  rationale: El cargo cortesano designa a un oficial de registro o memorial. «Registrador» es el equivalente español más claro y mantiene el sentido administrativo sin convertirlo en «cronista», que sugiere otra función.
- source_word: קְרוּעֵי בְגָדִים
  english_pob_choice: with their clothes torn
  chosen_spanish: con sus vestidos rasgados
  alternatives_spanish:
  - con sus ropas rasgadas
  - con los vestidos rasgados
  lexicon: HALOT
  rationale: La imagen concreta de duelo se conserva con «vestidos rasgados». «Vestidos» comunica bien el nivel de registro bíblico; «rasgados» evita modernizar en exceso la escena.
- source_word: דִּבְרֵי
  english_pob_choice: the words of
  chosen_spanish: las palabras de
  alternatives_spanish:
  - el mensaje de
  - lo que había dicho
  lexicon: HALOT
  rationale: «Las palabras de» sigue de cerca el genitivo hebreo y mantiene el carácter formal de la comunicación reportada. «Mensaje» interpretaría más libremente el contenido.
- source_word: רַב שָׁקֵה
  english_pob_choice: the Rabshakeh
  chosen_spanish: Rabsaces
  alternatives_spanish:
  - Rabsaqué
  - el Rabsaces
  lexicon: HALOT
  rationale: Se conserva el título oficial asirio en una forma tradicional ya asentada en español bíblico. No se reduce a «copero principal» porque el hebreo/uso narrativo funciona aquí como designación titulativa, no como explicación del oficio.
theological_decisions:
- issue: Tratamiento del título asirio רַב שָׁקֵה
  english_pob_reading: Rabshakeh is an Assyrian official title, possibly referring to a high-ranking officer such as a chief cupbearer or spokesman.
  chosen_spanish_reading: Se mantiene «Rabsaces» como título transliterado tradicional, sin convertirlo en una traducción funcional en el texto principal.
  alternative_spanish_readings:
  - copero principal
  - vocero principal
  - alto oficial asirio
  rationale: La fuente lo trata como título y no como nombre personal. En español, «Rabsaces» conserva esa ambigüedad histórica y evita cerrar indebidamente el alcance del cargo. Las opciones funcionales pueden aclarar en nota, pero no reemplazar el título en el texto base.
  doctrine_reference: Principio de fidelidad léxica y preservación de títulos históricos en traducción bíblica
translation_notes:
  revision_awareness: El pasaje no presenta variantes textuales o revisiones sustantivas en el paquete auditado; la redacción española sigue de cerca la lectura hebrea con la misma decisión onomástica/titulativa reflejada en el inglés POB.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero este versículo no contiene el Tetragrámaton.
  - Se evitó «señor» para רַב שָׁקֵה porque en este contexto funciona como título oficial, no como tratamiento común.
  - «Escriba» y «registrador» preservan la distinción entre cargos cortesanos distintos.
  - La puntuación reproduce una sola oración narrativa coherente con el hebreo.
  - La nota al pie se ancla en el título «Rabsaces» para conservar la referencia cultural del cargo.
