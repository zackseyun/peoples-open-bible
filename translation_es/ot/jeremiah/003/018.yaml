  text: בַּ/יָּמִ֣ים הָ/הֵ֔מָּה יֵלְכ֥וּ בֵית יְהוּדָ֖ה עַל בֵּ֣ית יִשְׂרָאֵ֑ל וְ/יָבֹ֤אוּ יַחְדָּו֙ מֵ/אֶ֣רֶץ צָפ֔וֹן עַל הָ/אָ֕רֶץ אֲשֶׁ֥ר הִנְחַ֖לְתִּי אֶת אֲבוֹתֵי/כֶֽם־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/003/018.yaml
  text: In those days the house of Judah will go with the house of Israel[b][a], and they will come together from the land of the north to the land that I gave as an inheritance to your fathers.
  footnotes:
  - marker: a
    text: Or 'the house of Judah will go to the house of Israel.' The Hebrew preposition can be rendered more literally, but here likely expresses Judah joining Israel in restored unity.
    reason: alternative_reading
  - marker: b
    text: Or 'your ancestors.' The Hebrew reads 'your fathers.'
    reason: lexical_alternative
