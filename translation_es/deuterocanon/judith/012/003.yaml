    issue: 'Expresión poco natural: «te obtendremos provisiones»'
    rationale: Aunque transmite la idea básica, en español «obtener a alguien algo» en futuro con dativo suena torpe. Para ἐξοίσομεν σοι, «conseguiremos para ti» o «te conseguiremos» expresa mejor el sentido funcional y mantiene la fidelidad.
  - severity: low
    issue: Falta la nota léxica sobre δύναμιν
    rationale: El POB inglés preserva en nota que δύναμιν tiene aquí un sentido contextual inusual de sustento/provisiones. Incluirla ayuda a justificar una decisión potencialmente sorprendente para lectores y revisores.
  - severity: low
    issue: «Semejantes a ellas» es algo rígido
    rationale: No es incorrecto, pero «como esas» o «como ellas» suena más natural en español sin perder la referencia comparativa de ὁμοίαν αὐτοῖς.
