review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido básico del hebreo: secuencia narrativa, vocativo profético, destino «la casa de Israel» y mandato de comunicar las palabras de Dios. Sin embargo, no representa de la manera más natural en español la construcción final «speak my words to them», y la nota al pie actual no preserva correctamente la alternativa documentada en inglés para בֶּן אָדָם.'
  spanish_quality_summary: «Entonces me dijo» y «a la casa de Israel» son naturales y fieles. «Hijo de hombre» es aceptable y defendible en este proyecto, pero la nota está mal formulada porque repite la lectura principal en vez de dar las alternativas pertinentes. Además, «habla mis palabras a ellos» suena forzado en español; «háblales mis palabras» o «diles mis palabras» sería más idiomático, y la primera preserva mejor el verbo דבר.
  glossary_alignment: No hay conflicto con los términos globales principales. «Hijo de hombre» concuerda con la decisión documentada para בֶּן אָדָם en Ezequiel. No aparece el nombre divino en este versículo. La revisión propuesta mantiene «casa de Israel» y evita una paráfrasis innecesaria de «mis palabras».
  issues:
  - severity: medium
    issue: La nota al pie [a] no refleja la alternativa léxica documentada.
    rationale: El texto principal ya dice «Hijo de hombre», pero la nota dice «O «hijo de hombre»», lo cual no aporta alternativa real. Según el rastro inglés, las alternativas relevantes son «mortal» o «ser humano»/«humano».
  - severity: medium
    issue: «habla mis palabras a ellos» es poco idiomático en español.
    rationale: Aunque es comprensible, suena calcado. El hebreo conserva דבר + דברי + אליהם; en español «háblales mis palabras» mantiene mejor el acto de hablar y el complemento indirecto natural.
  revised_spanish_text: 'Entonces me dijo[a]: «Hijo de hombre, ve a la casa de Israel y háblales mis palabras».

    '
  revised_footnotes:
  - marker: a
    text: O «mortal» o «ser humano». El hebreo usa aquí un giro idiomático que es la forma recurrente de dirigirse a Ezequiel.
    reason: lexical_alternative
  revision_rationale: Se corrige la nota para que preserve las alternativas reales documentadas para בֶּן אָדָם, y se mejora la naturalidad del español en la cláusula final sin perder la fuerza léxica de «mis palabras» ni el verbo «hablar».
