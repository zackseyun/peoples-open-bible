translation:
  language: es
  text: ¿Ha oído algún pueblo la voz de Dios hablando de en medio del fuego, como tú la has oído, y ha quedado con vida[a]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «y vivió» o «y sobrevivió». El hebreo dice literalmente «y vivió»; en contexto resalta que permaneció con vida después de oír a Dios hablar desde el fuego.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲ/שָׁמַע
  english_pob_choice: Has ... heard
  chosen_spanish: ¿Ha oído...
  alternatives_spanish:
  - ¿Oyó...?
  - ¿Ha escuchado...?
  lexicon: HALOT
  rationale: 'La forma interrogativa retórica con perfecto se expresa naturalmente en español con presente perfecto: «¿Ha oído...?»; mantiene el valor experiencial y la pregunta retórica del hebreo.'
- source_word: עָם
  english_pob_choice: people
  chosen_spanish: pueblo
  alternatives_spanish:
  - gente
  - nación
  lexicon: HALOT
  rationale: «Pueblo» conserva el colectivo singular del hebreo y encaja mejor que «gente» o «nación» en una comparación histórica y pactal.
- source_word: קוֹל
  english_pob_choice: voice
  chosen_spanish: voz
  alternatives_spanish:
  - sonido
  lexicon: HALOT
  rationale: Con un verbo de habla («que habla»), «voz» es la correspondencia más natural y personal; «sonido» sería más impersonal.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - dioses
  - un dios
  lexicon: HALOT
  rationale: 'Aunque la forma es morfológicamente plural, el contexto y el participio singular exigen singular en español: «Dios».'
- source_word: מְדַבֵּר
  english_pob_choice: speaking
  chosen_spanish: que habla
  alternatives_spanish:
  - hablando
  - que está hablando
  lexicon: HALOT
  rationale: 'El participio atributivo se vierte de manera natural como cláusula relativa: «que habla», preservando la acción en curso sin recargar el estilo.'
- source_word: מִ/תּוֹךְ הָ/אֵשׁ
  english_pob_choice: from the midst of the fire
  chosen_spanish: de en medio del fuego
  alternatives_spanish:
  - desde dentro del fuego
  - de dentro del fuego
  lexicon: HALOT
  rationale: «De en medio del fuego» reproduce la imagen espacial intensa del hebreo con una fórmula española idiomática y bíblicamente inteligible.
- source_word: כַּ/אֲשֶׁר
  english_pob_choice: as
  chosen_spanish: como
  alternatives_spanish:
  - tal como
  - así como
  lexicon: HALOT
  rationale: «Como» introduce la comparación de forma simple y clara en español; conserva la relación entre la experiencia de Israel y la posibilidad planteada retóricamente.
- source_word: שָׁמַעְתָּ אַתָּה
  english_pob_choice: you have heard
  chosen_spanish: tú la has oído
  alternatives_spanish:
  - tú la oíste
  - la has oído
  lexicon: HALOT
  rationale: Se explicita el pronombre enfático «tú» y se usa «la» para retomar de forma idiomática «la voz»; el presente perfecto sigue la fuerza experiencial del hebreo y del inglés POB.
- source_word: וַ/יֶּחִי
  english_pob_choice: and lived
  chosen_spanish: y vivió
  alternatives_spanish:
  - y sobrevivió
  - y permaneció con vida
  lexicon: HALOT
  rationale: El verbo hebreo significa simplemente «vivir». «Y vivió» preserva esa sobriedad y deja intacta la tensión contextual sin explicitarla de más.
theological_decisions:
- issue: La posible implicación de que oír la voz divina normalmente conlleva muerte, aunque el texto solo diga «vivió»
  english_pob_reading: and lived
  chosen_spanish_reading: y vivió
  alternative_spanish_readings:
  - y sobrevivió
  - y aun así vivió
  rationale: Se mantiene la coordinación desnuda del hebreo. No se añade «aun así» ni «sobrevivió», para no intensificar la implicación teológica más allá del enunciado.
  doctrine_reference: Translation philosophy §3
- issue: El uso de «Dios» frente a una lectura plural posible de אֱלֹהִים
  english_pob_reading: God
  chosen_spanish_reading: Dios
  alternative_spanish_readings:
  - dioses
  - un dios
  rationale: El contexto de Deuteronomio 4:33 habla del encuentro de Israel con Yahvé; el participio singular confirma que el referente es singular. Se evita una lectura plural que el pasaje no sostiene.
  doctrine_reference: Affirmations; Translation philosophy §1
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el expediente; el estado más reciente indica que el texto quedó sin cambios y con acuerdo alto entre revisores.
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלֹהִים en sentido singular, coherente con la decisión POB en inglés.
  - Se usa «vivió» para וַיֶּחִי, evitando «sobrevivió» en el texto principal para no añadir interpretación explícita.
  - La fórmula «de en medio del fuego» sigue el patrón ya documentado en el audit trail inglés y es preferible a una paráfrasis más libre.
