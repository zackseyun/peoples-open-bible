translation:
  language: es
  text: No teman al rey de Babilonia, ante quien ustedes temen.[a] No lo teman, declara Yahvé, porque yo estoy con ustedes para salvarlos y para librarlos de su mano.[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ante quien ustedes están temiendo». El hebreo usa una forma participial que puede sugerir un temor continuo.'
    reason: alternative_reading
  - marker: b
    text: 'Hebreo: «Yahvé».'
    reason: alternative_reading
lexical_decisions:
- source_word: תִּירְאוּ / יְרֵאִים
  english_pob_choice: fear / are fearing
  chosen_spanish: temas / temen
  alternatives_spanish:
  - tengas miedo / tienen miedo
  - temas / estás temiendo
  lexicon: HALOT
  rationale: El hebreo repite la raíz ירא en una orden negativa y en una forma participial. En español, «temer» conserva esa repetición con naturalidad. Usar «temen» en la cláusula relativa mantiene la idea de un temor presente o continuo sin volver la frase artificial.
- source_word: מִפְּנֵי ... מִפָּנָיו
  english_pob_choice: the king of Babylon, before whom you are afraid
  chosen_spanish: el rey de Babilonia, ante quien ustedes temen
  alternatives_spanish:
  - el rey de Babilonia, a quien ustedes temen
  - el rey de Babilonia, de quien ustedes tienen miedo
  lexicon: HALOT
  rationale: La expresión hebrea con מִן + פָּנִים después de ירא expresa temor «ante» o «delante de» alguien. «Ante quien» preserva mejor esa imagen relacional que «a quien» y evita perder el matiz espacial del hebreo.
- source_word: מֶלֶךְ בָּבֶל
  english_pob_choice: the king of Babylon
  chosen_spanish: el rey de Babilonia
  alternatives_spanish:
  - el rey de Babilón
  - el monarca de Babilonia
  lexicon: HALOT
  rationale: Es la equivalencia natural y fiel del constructo hebreo. «Babilonia» resulta más claro y bíblicamente estable en español que una forma más literal o menos usual.
- source_word: מִמֶּנּוּ
  english_pob_choice: him
  chosen_spanish: a él
  alternatives_spanish:
  - de él
  - de su presencia
  lexicon: HALOT
  rationale: Después de ירא, el hebreo usa una construcción idiomática que no requiere reproducir «de» en español. «No temas a él» mantiene el referente directo y suena natural.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares the LORD
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - dice Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: La fórmula profética נְאֻם se traduce con una forma enunciativa solemne. Se conserva «Yahvé» según la terminología del proyecto para יְהוָה, en lugar de sustituirlo por una convención de ocultamiento.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: El nombre divino se presenta como «Yahvé» de acuerdo con la política terminológica del proyecto y para mantener visible el Tetragrámaton en español.
- source_word: כִּי אִתְּכֶם אָנִי
  english_pob_choice: for I am with you
  chosen_spanish: porque yo estoy con ustedes
  alternatives_spanish:
  - pues yo estoy con ustedes
  - porque estoy con ustedes
  lexicon: HALOT
  rationale: La cláusula explica la razón de la exhortación. «Yo estoy con ustedes» expresa con claridad la promesa divina, y el pronombre explícito refuerza el énfasis del hebreo.
- source_word: לְהוֹשִׁיעַ
  english_pob_choice: to save you
  chosen_spanish: para salvarlos
  alternatives_spanish:
  - para rescatarlos
  - para darles salvación
  lexicon: HALOT
  rationale: «Salvar» es la equivalencia más directa y bíblicamente adecuada para הוֹשִׁיעַ. Se usa «los» como objeto directo plural en español y se evita una paráfrasis excesiva.
- source_word: וּלְהַצִּיל
  english_pob_choice: and to deliver you
  chosen_spanish: y para librarlos
  alternatives_spanish:
  - y para rescatarlos
  - y para sacarlos
  lexicon: HALOT
  rationale: Se distingue de «salvar» mediante «librar», que en español conserva la idea de sacar de peligro o de poder ajeno. Así se preserva la diferencia verbal del hebreo entre ישׁע y נצל.
- source_word: מִיָּדוֹ
  english_pob_choice: from his hand
  chosen_spanish: de su mano
  alternatives_spanish:
  - de su poder
  - de su alcance
  lexicon: HALOT
  rationale: «Mano» reproduce el hebraísmо de poder o control y es plenamente inteligible en español bíblico. Mantener la imagen evita diluir el lenguaje figurado del original.
theological_decisions:
- issue: Nombre divino יְהוָה en la fórmula profética
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo contiene directamente el Tetragrámaton. En coherencia con la política del proyecto, se conserva el nombre propio divino como «Yahvé» para no ocultar la referencia del original.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה / YHWH → Yahvé'
- issue: Matiz de temor continuo en la cláusula relativa
  english_pob_reading: before whom you are afraid
  chosen_spanish_reading: ante quien ustedes temen
  alternative_spanish_readings:
  - ante quien ustedes tienen miedo
  - a quien ustedes temen
  rationale: El participio hebreo destaca un temor en curso. En español, «temen» dentro de la relativa mantiene ese valor sin introducir una perífrasis demasiado pesada. La preposición «ante» conserva el sabor de מִפְּנֵי / מִפָּנָיו.
  doctrine_reference: 'DOCTRINE.md: lexical fidelity and aspect-sensitive rendering'
- issue: Distinción entre salvar y librar
  english_pob_reading: to save you and to deliver you
  chosen_spanish_reading: para salvarlos y para librarlos
  alternative_spanish_readings:
  - para salvarlos y rescatarlos
  - para rescatarlos y librarlos
  rationale: El hebreo emplea dos verbos distintos. Mantener dos verbos distintos en español evita colapsar la doble promesa en un solo matiz y preserva la fuerza acumulativa de la garantía divina.
  doctrine_reference: 'DOCTRINE.md: preserve lexical distinctions where source repeats or contrasts terms'
translation_notes:
  revision_awareness: La redacción española sigue de cerca el texto hebreo y la solución revisada del POB inglés, que evita una traducción excesivamente comprimida de la frase relativa de temor y distingue entre «salvar» y «librar». Se tomó además la decisión terminológica del proyecto de rendir יְהוָה como «Yahvé», manteniendo visible el nombre divino en español.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma regular para יְהוָה.
  - Se usa «temer» para ירא, evitando alternar innecesariamente con «tener miedo» salvo necesidad contextual.
  - Se conserva la distinción verbal entre «salvar» y «librar» para reflejar ישׁע / נצל.
  - Se emplea «mano» para מִיָּדֹו como metáfora de poder o dominio.
  - El plural «ustedes/los» hace explícito el destinatario colectivo del hebreo.
