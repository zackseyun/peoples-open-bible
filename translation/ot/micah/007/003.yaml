id: MIC.7.3
reference: Micah 7:3
source:
  edition: WLC
  text: עַל הָ/רַ֤ע כַּפַּ֨יִם֙ לְ/הֵיטִ֔יב הַ/שַּׂ֣ר שֹׁאֵ֔ל וְ/הַ/שֹּׁפֵ֖ט בַּ/שִׁלּ֑וּם וְ/הַ/גָּד֗וֹל דֹּבֵ֨ר הַוַּ֥ת נַפְשׁ֛/וֹ ה֖וּא וַֽ/יְעַבְּתֽוּ/הָ־׃
translation:
  text: 'Their hands are on evil[a], to do it well: the prince asks, and the judge is for a bribe, and the great man speaks the desire of his soul[c][b]; thus they weave it together.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Both hands are on evil, to do it well,' emphasizing wholehearted skill in wrongdoing.
    reason: lexical_alternative
  - marker: b
    text: 'The Hebrew is terse: ''the judge in/for payment.'' This may mean ''the judge asks for a bribe'' or ''the judge judges for a bribe.'''
    reason: lexical_alternative
  - marker: c
    text: Or 'they twist it together.' The image is of coordinated corruption, as if plaiting or intertwining a scheme.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל הָרַע כַּפַּיִם
  chosen: Their hands are on evil
  alternatives:
  - Both hands are on evil
  - Concerning evil, their hands are ready
  lexicon: HALOT
  rationale: The idiom is difficult. עַל with 'hands' and 'evil' conveys active engagement in wrongdoing. I rendered it idiomatically but still close to the Hebrew. 'Both hands' is possible from the dual כַּפַּיִם and is reflected in some translations, but the sense is adequately conveyed by 'their hands' in English.
- source_word: לְהֵיטִיב
  chosen: to do it well
  alternatives:
  - diligently
  - skillfully
  lexicon: HALOT
  rationale: Hiphil infinitive of יטב literally means 'to make good/do well.' In context it describes proficiency or eagerness in evil, so 'to do it well' preserves the irony without over-paraphrasing.
- source_word: הַשַּׂר שֹׁאֵל
  chosen: the prince asks
  alternatives:
  - the official demands
  - the ruler asks
  lexicon: HALOT
  rationale: שַׂר is a leader/official/prince. 'Prince' is a standard concise rendering and fits the parallelism with judge and great man. שֹׁאֵל is simply 'asks,' though in context the asking is corruptive.
- source_word: וְהַשֹּׁפֵט בַּשִּׁלּוּם
  chosen: the judge is for a bribe
  alternatives:
  - the judge asks for payment
  - the judge judges for a bribe
  lexicon: HALOT
  rationale: בַּשִּׁלּוּם denotes payment/bribe. The Hebrew is elliptical; the judge's action is understood in relation to bribery. 'Is for a bribe' preserves the terseness and corruption without adding too much that is not explicit. A fuller alternative is preserved in a footnote.
- source_word: וְהַגָּדוֹל
  chosen: the great man
  alternatives:
  - the prominent man
  - the powerful man
  lexicon: HALOT
  rationale: The adjective functions substantivally for a socially important person. 'Great man' is literal and idiomatic enough in context.
- source_word: דֹּבֵר הַוַּת נַפְשׁוֹ
  chosen: speaks the craving of his soul
  alternatives:
  - utters the evil desire of his soul
  - declares his greedy desire
  lexicon: HALOT
  rationale: הַוָּה can denote desire, ruin, mischief, or destructive craving depending on context. Here it is the self-serving desire of the powerful man. 'Craving' captures inward appetite without importing a more specific vice than the text states.
- source_word: וַיְעַבְּתוּהָ
  chosen: thus they weave it together
  alternatives:
  - and they twist it together
  - and they make it crooked
  lexicon: HALOT
  rationale: From עבת, 'to twist/plait/interweave.' The suffix likely refers to the corrupt scheme or evil matter as a whole. 'Weave it together' conveys coordinated corruption among the parties; 'twist it together' is possible but less natural in English main text.
