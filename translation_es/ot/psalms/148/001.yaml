    reason: source_note
lexical_decisions:
- source_word: הַ֥לְלוּ
  english_pob_choice: Praise
  chosen_spanish: Alabad
  alternatives_spanish:
  - Dad alabanza
  - Alaben
  lexicon: HALOT
  rationale: El imperativo plural de הלל exige una exhortación directa. «Alabad» conserva el tono litúrgico y exhortativo del hebreo, con un registro natural en español bíblico sin perder fuerza.
- source_word: יָ֨הּ
  english_pob_choice: Yah
  chosen_spanish: Yah
  alternatives_spanish:
  - Yahvé
  - el SEÑOR
  lexicon: HALOT
  rationale: Se mantiene la forma breve poética del nombre divino, distinta de יְהוָה. «Yah» preserva la exclamación litúrgica del hebreo y la diferencia lexical dentro del versículo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Yahweh
  lexicon: HALOT
  rationale: La norma proyectiva de español pide «Yahvé» para יהוה. Aquí se conserva el nombre de pacto en forma transparente, distinguiéndolo de la forma breve יָהּ.
- source_word: מִן הַ/שָּׁמַ֑יִם
  english_pob_choice: from the heavens
  chosen_spanish: desde los cielos
  alternatives_spanish:
  - desde los cielos
  - de los cielos
  - desde el cielo
  lexicon: HALOT
  rationale: El plural hebreo sugiere «los cielos». «Desde» reproduce la preposición מִן con fluidez en español, y «cielos» mantiene el plural sin forzar una singularización.
- source_word: הַֽ֝לְל֗וּ/הוּ
  english_pob_choice: praise him
  chosen_spanish: alabadlo
  alternatives_spanish:
  - alabad a él
  - alabad a Yahvé
  lexicon: HALOT
  rationale: El sufijo pronominal de tercera persona masculina singular queda bien reflejado en «alabadlo». Así se conserva la cohesión pronominal del hebreo sin repetir innecesariamente el nombre divino.
- source_word: בַּ/מְּרוֹמִֽים
  english_pob_choice: in the heights
  chosen_spanish: en las alturas
  alternatives_spanish:
  - en las alturas
  - en lo alto
  - en las regiones altas
  lexicon: HALOT
  rationale: «מְרוֹמִים» designa alturas elevadas. «En las alturas» es la equivalencia española más natural y fiel al campo semántico de elevación espacial.
theological_decisions:
- issue: Tratamiento conjunto de יָהּ y יְהוָה en el mismo versículo
  english_pob_reading: Render יָהּ as 'Yah' and יְהוָה as 'Yahweh'
  chosen_spanish_reading: Renderizar יָהּ como «Yah» y יְהוָה como «Yahvé»
  alternative_spanish_readings:
  - Renderizar ambos como «el SEÑOR»
  - Usar transliteraciones homogéneas para ambos
  rationale: La distinción entre la forma breve y el nombre de pacto está marcada en el hebreo y no debe borrarse. En español, «Yah» y «Yahvé» preservan esa tensión lexical y el valor litúrgico del hallelu-yah.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה YHWH → Yahvé'
- issue: Valor de la alabanza como exhortación litúrgica directa
  english_pob_reading: Praise ... praise him
  chosen_spanish_reading: «Alabad ... alabadlo» como exhortación directa
  alternative_spanish_readings:
  - «Exaltad ... exaltadlo»
  - «Alaben ... alábenlo»
  rationale: El paralelismo del salmo pide imperativos fuertes y breves. «Alabad»/«alabadlo» reproduce con claridad la llamada coral del original sin añadir interpretación doctrinal.
  doctrine_reference: Salmos 148:1; paralelismo hebreo imperativo
translation_notes:
  revision_awareness: La revisión inglesa más reciente cambió 'the LORD' por 'Yahweh' para reflejar con mayor consistencia el nombre divino. En español se adopta la política del proyecto para יהוה como «Yahvé», manteniendo a la vez la distinción entre el apelativo breve יָהּ y el nombre completo, y se conserva la estructura imperativa y cósmica del verso.
  spanish_consistency_notes:
  - Se mantiene el plural «cielos» para reflejar מִן הַשָּׁמַיִם.
  - «Alabadlo» preserva el sufijo pronominal de 3ª persona singular del hebreo.
  - 'No se usa «SEÑOR» como máscara del nombre divino; se sigue la terminología española del proyecto: «Yahvé».'
