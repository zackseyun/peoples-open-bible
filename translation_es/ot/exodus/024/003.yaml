revisions:
- from: 'Entonces Moisés vino y contó al pueblo todas las palabras de Yahvé y todas las ordenanzas[a], y todo el pueblo respondió a una sola voz y dijo: «Todas las palabras que Yahvé ha hablado, las haremos».'
  to: 'Entonces Moisés llegó y contó al pueblo todas las palabras de Yahvé y todas las ordenanzas[a], y todo el pueblo respondió con una sola voz y dijo: «Todas las palabras que Yahvé ha hablado, haremos».'
  rationale: 'Se ajusta el español para mayor naturalidad y fidelidad formal: «llegó» mejora la narración, «con una sola voz» es más idiomático, y «haremos» evita el añadido innecesario de «las», preservando mejor el valor de נַעֲשֶׂה. Se conserva «ordenanzas» con nota léxica, en línea con la auditoría inglesa.'
