    issue: '''príncipe'' para ἄρχων'
    rationale: Aunque puede aparecer en registros bíblicos antiguos, en español actual 'príncipe' suele referirse a un título dinástico, no a un gobernante general. El inglés auditado escogió 'ruler' precisamente por su sentido amplio de autoridad pública.
  - severity: medium
    issue: '''caudillo'' para ἡγούμενος'
    rationale: '''Caudillo'' añade connotaciones ideológicas e históricas marcadas en español y no es la opción más neutral ni más natural para una Biblia de lectura amplia. ''Guía'', ''jefe'' o ''líder'' distinguen mejor este término de ἄρχων sin sobrecargarlo.'
  - severity: low
    issue: La nota al pie sobre ἡγούμενος queda desajustada si se corrige el término principal
    rationale: Si se sustituye 'caudillo', la nota debe actualizarse para reflejar la alternativa real preservada en español.
