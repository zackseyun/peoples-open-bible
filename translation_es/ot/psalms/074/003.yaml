translation:
  language: es
  text: Levanta tus pasos hacia las ruinas perpetuas[a]; el enemigo ha devastado todo en el santuario.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Levanta tus pies hacia las desolaciones perpetuas»; el hebreo conserva la imagen vívida de Dios avanzando hacia el santuario arruinado.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָרִימָה
  english_pob_choice: Lift up
  chosen_spanish: Levanta
  alternatives_spanish:
  - Alza
  - Levanta en alto
  lexicon: HALOT
  rationale: El imperativo dirigido a Dios conserva la imagen concreta de ponerse en movimiento. En español, «Levanta» comunica la acción sin volverla una paráfrasis interpretativa como «ven».
- source_word: פְעָמֶיךָ
  english_pob_choice: your steps
  chosen_spanish: tus pasos
  alternatives_spanish:
  - tus pies
  - tus pisadas
  lexicon: HALOT
  rationale: פָּעַם puede referirse a paso o huella de movimiento. «Tus pasos» es natural en español y mantiene la imagen antropomórfica de Dios avanzando.
- source_word: לְמַשֻּׁאוֹת
  english_pob_choice: to the ... ruins
  chosen_spanish: hasta las ruinas
  alternatives_spanish:
  - a las desolaciones
  - a las devastaciones
  lexicon: HALOT
  rationale: El sustantivo describe lugares o estados de destrucción. «Ruinas» es la forma más clara y natural en español, y «hasta» refleja bien la dirección del movimiento.
- source_word: נֶצַח
  english_pob_choice: perpetual
  chosen_spanish: perpetuas
  alternatives_spanish:
  - eternas
  - duraderas
  lexicon: HALOT
  rationale: Aquí el término califica unas ruinas o desolaciones que permanecen. «Perpetuas» conserva la idea de duración continua sin imponer una lectura teológica adicional.
- source_word: כָּל
  english_pob_choice: everything
  chosen_spanish: todo
  alternatives_spanish:
  - todo lo que
  - todas las cosas
  lexicon: HALOT
  rationale: 'El valor distributivo es global: la destrucción abarca la totalidad del recinto. «Todo» es conciso y plenamente comprensible en español.'
- source_word: הֵרַע
  english_pob_choice: has devastated
  chosen_spanish: ha devastado
  alternatives_spanish:
  - ha arruinado
  - ha hecho daño
  lexicon: HALOT
  rationale: El hifil de רעע expresa daño grave o ruina. «Ha devastado» recoge mejor la intensidad del contexto cultual y de destrucción.
- source_word: אוֹיֵב
  english_pob_choice: the enemy
  chosen_spanish: el enemigo
  alternatives_spanish:
  - un enemigo
  - el adversario
  lexicon: HALOT
  rationale: El singular funciona de modo representativo/colectivo. «El enemigo» sigue de cerca la lectura inglesa y mantiene la referencia concreta al agresor.
- source_word: בַּקֹּדֶשׁ
  english_pob_choice: in the sanctuary
  chosen_spanish: en el santuario
  alternatives_spanish:
  - en el lugar santo
  - en lo sagrado
  lexicon: HALOT
  rationale: קֹדֶשׁ aquí apunta al recinto sagrado del templo. «Santuario» es el equivalente culto y claro en español para ese espacio.
theological_decisions:
- issue: Imagen antropomórfica de Dios moviéndose
  english_pob_reading: Retained the concrete imagery 'Lift up your steps' rather than resolving it into an interpretive paraphrase such as 'Come quickly.'
  chosen_spanish_reading: Se conservó la imagen concreta «Levanta tus pasos» en vez de convertirla en una paráfrasis interpretativa como «ven pronto».
  alternative_spanish_readings:
  - Ven pronto
  - Avanza hacia
  rationale: El hebreo usa lenguaje vívido y poético. Mantener la imagen respeta la fuerza literaria del lamento sin añadir información sobre la velocidad o la manera del movimiento.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Alcance total de la devastación
  english_pob_reading: '''has devastated everything in the sanctuary'''
  chosen_spanish_reading: «ha devastado todo en el santuario»
  alternative_spanish_readings:
  - «ha arruinado todo en el santuario»
  - «ha hecho daño a todo en el santuario»
  rationale: La frase deja ver una destrucción completa y cultual. «Devastado» mantiene la intensidad y el carácter total del daño sin suavizarlo.
  doctrine_reference: Translation philosophy §2, §5
translation_notes:
  revision_awareness: El inglés revisado cambió 'toward' por 'to' para hacer más directa la preposición. La redacción española adopta «hasta» para expresar con naturalidad la dirección hacia las ruinas y conservar el matiz de llegada sin sobreinterpretar el movimiento.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» solo cuando corresponde al Tetragrámaton; este versículo no lo contiene.
  - Se prefirió «santuario» para el ámbito sagrado, en continuidad con el audit trail inglés.
  - «Devastado» conserva la fuerza de hifil רעע y evita suavizar el daño.
  - La nota a pie de página preserva la alternativa «tus pies» porque el hebreo admite esa imagen corporal más literal.
