theological_decisions:
- issue: Elliptical middle clause without explicit verb
  chosen_reading: Treat the clause as a poetic ellipsis expressing praise/rejoicing toward the King of heaven
  alternative_readings:
  - 'Treat it as a verbless nominal clause: ''and my soul is for the King of heaven'''
  - Supply a different praise verb such as 'blesses' or 'glories in'
  rationale: The source text appears compressed and poetic. Because the verse is a hymn of praise, an English verb of rejoicing best represents the sense without claiming more certainty than the Greek warrants. This is a translational decision driven by syntax and context, not by doctrinal harmonization.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; document genuine ambiguity'
