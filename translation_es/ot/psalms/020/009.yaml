translation:
  language: es
  text: Ellos se inclinaron y cayeron, pero nosotros nos hemos levantado y nos mantenemos erguidos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'estamos establecidos', 'nos hemos fortalecido' o 'estamos firmes' para el verbo final.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵמָּה
  english_pob_choice: They
  chosen_spanish: Ellos
  alternatives_spanish:
  - Aquellos
  - Esos
  lexicon: HALOT
  rationale: El pronombre independiente de 3.ª persona plural sirve para el contraste enfático con 'nosotros'. 'Ellos' mantiene la oposición sin añadir elementos ajenos al hebreo.
- source_word: כָּרְעוּ
  english_pob_choice: have bowed down
  chosen_spanish: se inclinaron
  alternatives_spanish:
  - se arrodillaron
  - se encorvaron
  lexicon: HALOT
  rationale: El verbo expresa doblarse o bajar el cuerpo; en español, 'se inclinaron' conserva la imagen corporal y funciona bien en paralelo con 'cayeron'.
- source_word: וְנָפָלוּ
  english_pob_choice: and fallen
  chosen_spanish: y cayeron
  alternatives_spanish:
  - y se desplomaron
  - y fueron derribados
  lexicon: HALOT
  rationale: '''Cayeron'' es la equivalencia más directa y poética para mantener el paralelismo con el verbo anterior.'
- source_word: וַאֲנַחְנוּ
  english_pob_choice: but we
  chosen_spanish: pero nosotros
  alternatives_spanish:
  - y nosotros
  - mientras nosotros
  lexicon: HALOT
  rationale: Aunque la conjunción es literalmente 'y', el contraste discursivo con 'ellos' es fuerte; 'pero' expresa mejor esa oposición en español natural.
- source_word: קַּמְנוּ
  english_pob_choice: have risen
  chosen_spanish: nos hemos levantado
  alternatives_spanish:
  - hemos resucitado
  - nos hemos puesto de pie
  lexicon: HALOT
  rationale: El verbo קום significa levantarse/arise. 'Nos hemos levantado' mantiene el contraste con 'cayeron' y suena natural en español bíblico.
- source_word: וַנִּתְעוֹדָד
  english_pob_choice: stand upright
  chosen_spanish: estamos firmes
  alternatives_spanish:
  - nos hemos fortalecido
  - permanecemos erguidos
  - estamos establecidos
  lexicon: HALOT
  rationale: El verbo reflexivo es raro y puede implicar fortalecerse, mantenerse en pie o quedar firme. 'Estamos firmes' preserva la idea de estabilidad recuperada sin perder naturalidad.
translation_notes:
  revision_awareness: La redacción sigue de cerca el hebreo poético y el audit trail inglés, conservando el contraste ellos/nosotros y la secuencia corporal caída/levantamiento/estabilidad. No se detectaron revisiones pendientes en el contexto más reciente.
  spanish_consistency_notes:
  - Se usó 'Yahvé' no pertinente en este versículo; no hay léxico divino explícito.
  - Se mantuvo el paralelismo poético con verbos breves y concretos.
  - La nota de pie marca la ambigüedad del verbo final, como en el texto inglés auditado.
