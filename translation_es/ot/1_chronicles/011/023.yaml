  to: Y él hirió al egipcio[a], un hombre de cinco codos[b] de estatura. En la mano del egipcio había una lanza como el rodillo de un telar, y descendió hacia él con un bastón[c], le arrebató la lanza de la mano del egipcio y lo mató con su propia lanza.
