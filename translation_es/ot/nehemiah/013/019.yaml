    reason: lexical_alternative
  - marker: b
    text: O «a algunos de mis siervos» o «a algunos de mis asistentes»; el hebreo puede referirse a miembros del séquito personal de Nehemías.
    reason: lexical_alternative
  - marker: c
    text: «Carga» puede referirse de modo específico a bienes transportados para el comercio, pues el contexto circundante trata del tráfico en sábado.
    reason: lexical_alternative
