translation:
  language: es
  text: y a todos los que estaban en Samaria y en sus ciudades, y al otro lado del Jordán hasta Jerusalén, y Batane, y Chelous, y Cades, y el río de Egipto[a], y Tafnas[b], y Ramesés, y toda la tierra de Gosén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el wadi de Egipto» o «el torrente de Egipto». El texto griego aquí dice «río de Egipto» (ποταμός), pero este nombre fronterizo se traduce de varias maneras en la tradición bíblica.
    reason: lexical_alternative
  - marker: b
    text: El griego dice «Tafnas»; en otras tradiciones bíblicas este lugar aparece como «Tahpanhes».
    reason: lexical_alternative
lexical_decisions:
- source_word: πάντας τοὺς ἐν Σαμαρείᾳ
  english_pob_choice: all those in Samaria
  chosen_spanish: a todos los que estaban en Samaria
  alternatives_spanish:
  - a todos los de Samaria
  - a todos los que vivían en Samaria
  lexicon: LSJ
  rationale: El griego es elíptico dentro de una lista geográfica; en español conviene explicitar la idea de personas sin añadir más contenido del que exige el texto. «Los que estaban» conserva el valor distributivo de πάντας y suena natural.
- source_word: ταῖς πόλεσιν αὐτῆς
  english_pob_choice: its cities
  chosen_spanish: sus ciudades
  alternatives_spanish:
  - las ciudades de ella
  - las ciudades que le pertenecen
  lexicon: LSJ
  rationale: αὐτῆς remite a Samaria como región/lugar; «sus ciudades» es la forma más natural en español y evita una personificación innecesaria.
- source_word: πέραν τοῦ Ἰορδάνου
  english_pob_choice: beyond the Jordan
  chosen_spanish: al otro lado del Jordán
  alternatives_spanish:
  - más allá del Jordán
  - al otro lado del río Jordán
  lexicon: LSJ
  rationale: La expresión marca ubicación geográfica relativa. «Al otro lado del Jordán» preserva el sentido espacial con buena fluidez en español.
- source_word: ἕως Ἰερουσαλήμ
  english_pob_choice: as far as Jerusalem
  chosen_spanish: hasta Jerusalén
  alternatives_spanish:
  - hasta llegar a Jerusalén
  - así como Jerusalén como límite
  lexicon: LSJ
  rationale: ἕως indica extensión o límite; «hasta» comunica de manera directa ese alcance geográfico.
- source_word: Βαττανὴ
  english_pob_choice: Batane
  chosen_spanish: Batane
  alternatives_spanish:
  - Batané
  - Bashán
  lexicon: LSJ
  rationale: Es un nombre propio geográfico en forma griega; se translitera con conservación del sonido aproximado. «Bashán» sería una identificación interpretativa no explicitada por el griego aquí.
- source_word: Χελούς
  english_pob_choice: Chelous
  chosen_spanish: Chelous
  alternatives_spanish:
  - Chelus
  - Helus
  lexicon: LSJ
  rationale: Se conserva la transliteración directa del topónimo griego por tratarse de una identificación incierta.
- source_word: Κάδης
  english_pob_choice: Kadesh
  chosen_spanish: Cades
  alternatives_spanish:
  - Kadesh
  lexicon: LSJ
  rationale: «Cades» es la forma española tradicional y reconocible del topónimo bíblico, fiel al referente sin forzar una transliteración más técnica.
- source_word: τοῦ ποταμοῦ Αἰγύπτου
  english_pob_choice: the river of Egypt
  chosen_spanish: el río de Egipto
  alternatives_spanish:
  - el wadi de Egipto
  - el torrente de Egipto
  lexicon: LSJ
  rationale: El griego emplea explícitamente ποταμός, «río»; por eso se mantiene «río de Egipto» en el texto principal. Las alternativas reflejan una tradición bíblica más amplia, pero no sustituyen el dato del griego de este versículo.
- source_word: Τάφνας
  english_pob_choice: Taphnas
  chosen_spanish: Tafnas
  alternatives_spanish:
  - Tafnes
  - Tahpanhes
  lexicon: LSJ
  rationale: Se translitera la forma griega en español como nombre propio. «Tahpanhes» es una equivalencia más familiar en otras tradiciones, pero no es la forma que refleja directamente el griego aquí.
- source_word: Ραμεσσὴ
  english_pob_choice: Rameses
  chosen_spanish: Ramesés
  alternatives_spanish:
  - Ramsés
  - Raamsés
  lexicon: LSJ
  rationale: Se conserva el topónimo en forma española reconocible, con acentuación natural en español.
- source_word: πᾶσαν γῆν Γέσεμ
  english_pob_choice: all the land of Goshen
  chosen_spanish: toda la tierra de Gosén
  alternatives_spanish:
  - toda la tierra de Gesem
  - todo el país de Gosén
  lexicon: LSJ
  rationale: El referente es el lugar bíblico conocido en español como Gosén; se usa esa forma para claridad. «Tierra» conserva el valor territorial de γῆ.
translation_notes:
  revision_awareness: 'El texto griego de Judith 1:9 coincide plenamente con el paquete fuente y con la revisión inglesa auditada: no se requieren ajustes textuales ni doctrinales. Se ha mantenido la enumeración geográfica en el orden del original, preservando el nombre propio griego cuando el referente es incierto y usando la forma española tradicional solo cuando clarifica sin traicionar el testimonio griego.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el Tetragrámaton ni un equivalente directo.
  - Se usa «Gosén» como forma española asentada para Γέσεμ, coherente con la práctica bíblica en español.
  - Se conserva la lista geográfica con mayúsculas en nombres propios y minúsculas en descriptores comunes.
  - Se evita sustituir nombres propios por equivalentes interpretativos cuando el griego ofrece transliteración directa.
