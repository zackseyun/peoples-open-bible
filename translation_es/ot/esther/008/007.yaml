translation:
  language: es
  text: 'Entonces el rey Asuero dijo a la reina Ester y a Mardoqueo el judío: «Miren, he dado la casa de Amán a Ester, y a él lo colgaron en la horca[a] porque extendió su mano contra los judíos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «sobre el árbol». Aquí alude a la estructura de ejecución usada para Amán; por eso se traduce «horca» para comunicar el sentido contextual.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Así ... dijo
  lexicon: HALOT
  rationale: La forma narrativa con waw consecutiva avanza la acción; en español, «Entonces ... dijo» conserva la secuencia y suena natural en prosa bíblica contemporánea.
- source_word: הַמֶּלֶךְ אֲחַשְׁוֵרֹשׁ
  english_pob_choice: King Ahasuerus
  chosen_spanish: el rey Asuero
  alternatives_spanish:
  - el rey Ahasuero
  - Asuero, el rey
  lexicon: HALOT
  rationale: Se mantiene el título antes del nombre propio, como exige el español natural. «Asuero» reproduce el nombre tradicional/transliterado sin sustituirlo por un equivalente interpretativo.
- source_word: לְאֶסְתֵּר הַמַּלְכָּה
  english_pob_choice: to Queen Esther
  chosen_spanish: a la reina Ester
  alternatives_spanish:
  - a Ester la reina
  - a Ester, la reina
  lexicon: HALOT
  rationale: «La reina Ester» conserva el título real con fluidez idiomática; «a la reina Ester» es la opción más clara y cercana al hebreo sin perder naturalidad.
- source_word: וּלְמָרְדֳּכַי הַיְּהוּדִי
  english_pob_choice: and to Mordecai the Jew
  chosen_spanish: y a Mardoqueo el judío
  alternatives_spanish:
  - y a Mardoqueo, el judío
  - y a Mardoqueo el judeano
  lexicon: HALOT
  rationale: Se conserva el designativo étnico «el judío», que en Ester es el rasgo contextual normal y corresponde al audit trail inglés. «Judeano» es posible, pero aquí sería menos natural y menos transparente para el lector general.
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Miren
  - Vean
  - He aquí
  lexicon: HALOT
  rationale: «Mira» preserva la fuerza deíctica e imperativa del hebreo con un registro actual. «He aquí» sería más tradicional, pero menos natural en español moderno.
- source_word: בֵית הָמָן
  english_pob_choice: Haman’s house
  chosen_spanish: la casa de Amán
  alternatives_spanish:
  - la casa de Haman
  - la casa/propiedad de Amán
  lexicon: HALOT
  rationale: El constructo expresa literalmente «casa de Amán». En español, «la casa de Amán» es la forma más transparente y evita ampliar indebidamente a «estancia» o «propiedad» sin base explícita suficiente.
- source_word: נָתַתִּי
  english_pob_choice: I have given
  chosen_spanish: he dado
  alternatives_spanish:
  - dí
  - entregué
  lexicon: HALOT
  rationale: 'El perfecto hebreo se vierte como perfecto resultativo en español: «he dado». Mantiene el valor de acción completada con efecto vigente.'
- source_word: וְאֹתוֹ תָּלוּ
  english_pob_choice: and they have hanged him
  chosen_spanish: y a él lo colgaron
  alternatives_spanish:
  - y lo colgaron
  - y fue colgado
  lexicon: HALOT
  rationale: El hebreo usa una forma activa en tercera plural sin sujeto explícito; en español, «lo colgaron» conserva la agencia indefinida mejor que una pasiva impersonal. No se fuerza «ellos» en el texto, pero la construcción queda suficientemente natural.
- source_word: עַל הָעֵץ
  english_pob_choice: on the gallows
  chosen_spanish: en la horca[b]
  alternatives_spanish:
  - sobre el árbol
  - en el madero
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «en/sobre el árbol», el contexto de Ester refiere el dispositivo de ejecución. «Horca» comunica el sentido contextual en español, y se documenta la alternativa literal en nota.
- source_word: עַל אֲשֶׁר שָׁלַח יָדוֹ
  english_pob_choice: because he stretched out his hand against
  chosen_spanish: porque extendió su mano contra
  alternatives_spanish:
  - por cuanto alzó su mano contra
  - porque alargó su mano contra
  lexicon: HALOT
  rationale: Se conserva la imagen idiomática hebrea de agresión/hostilidad con una formulación clara en español. «Contra» expresa el valor adversativo del hebreo y evita suavizar la metáfora.
- source_word: בַּיְּהוּדִים
  english_pob_choice: against the Jews
  chosen_spanish: contra los judíos
  alternatives_spanish:
  - contra los judeanos
  - sobre los judíos
  lexicon: HALOT
  rationale: El complemento preposicional marca dirección hostil; en español, «contra» reproduce con precisión la relación semántica. «Los judíos» conserva el uso contextual establecido por la POB inglesa.
theological_decisions:
- issue: Término étnico y social aplicado a Mardoqueo
  english_pob_reading: Mordecai the Jew
  chosen_spanish_reading: Mardoqueo el judío
  alternative_spanish_readings:
  - Mardoqueo el judeano
  rationale: No hay una tensión doctrinal aquí, pero sí una decisión identitaria importante. Se mantiene «judío» porque es la designación contextual del texto y la opción auditada por la POB inglesa; «judeano» sería más técnico, pero menos idiomático y no aporta una ganancia teológica en este versículo.
  doctrine_reference: Identidad del pueblo judío en el contexto narrativo de Ester
translation_notes:
  revision_awareness: 'El texto base inglés no presentó revisiones aplicadas; el último pase de revisión indicó «unchanged: true» y acuerdo alto (1.0). Esta propuesta sigue ese estado estable, conservando el valor contextual de «gallows/horca» con nota explicativa y manteniendo las decisiones léxicas auditadas.'
  spanish_consistency_notes:
  - Se usa «Asuero» de forma consistente como transliteración española del nombre propio.
  - Se mantiene «Amán» y «Mardoqueo» según uso bíblico español tradicional y transparencia nominal.
  - Se conserva «judío(s)» para el etnónimo en concordancia con el audit trail inglés y el contexto narrativo.
  - La imagen verbal «extendió su mano contra» preserva la metáfora hebrea sin reinterpretarla.
  - La nota sobre «horca» evita perder la tensión entre el hebreo literal («árbol») y el referente contextual del instrumento de ejecución.
