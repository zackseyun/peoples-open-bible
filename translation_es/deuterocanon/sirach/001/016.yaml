translation:
  language: es
  text: El comienzo de la sabiduría es el temor de Yahvé[a], y produce paz abundante, vida y sanación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Testimonio griego: «Llenó toda su casa de cosas deseables, y los almacenes con sus frutos». Este versículo difiere sustancialmente de la línea hebrea conservada.'
    reason: textual_variant
lexical_decisions:
- source_word: רֵאשִׁית
  english_pob_choice: beginning
  chosen_spanish: el comienzo
  alternatives_spanish:
  - el principio
  - la primera parte
  lexicon: HALOT
  rationale: En español, «comienzo» transmite naturalmente la idea de inicio y funciona bien en una sentencia sapiencial. «Principio» también sería posible, pero puede sonar más abstracto o doctrinal; «comienzo» conserva mejor la sencillez del hebreo.
- source_word: חָכְמָה
  english_pob_choice: wisdom
  chosen_spanish: sabiduría
  alternatives_spanish:
  - sapiencia
  - habilidad
  lexicon: HALOT
  rationale: «Sabiduría» es el equivalente estándar y más claro en literatura sapiencial. Las otras opciones o bien son más raras en español actual o estrechan indebidamente el sentido.
- source_word: יִרְאַת
  english_pob_choice: fear of
  chosen_spanish: el temor de
  alternatives_spanish:
  - la reverencia por
  - el respeto por
  lexicon: HALOT
  rationale: El POB inglés preserva la fuerza de «fear», no la suaviza a «reverence». En español, «temor de Yahvé» reproduce esa tensión con naturalidad bíblica y evita rebajar el peso del término.
- source_word: יְהֹוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Yahweh
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se sigue el criterio doctrinal del proyecto para el Nombre divino. «Yahvé» es la forma española establecida en esta traducción, en lugar de la convención litúrgica de ocultarlo bajo «SEÑOR».
- source_word: וּמַרְבָּה
  english_pob_choice: an abundance of / it brings abundant
  chosen_spanish: produce abundante
  alternatives_spanish:
  - trae abundante
  - da abundante
  - una abundancia de
  lexicon: HALOT
  rationale: La revisión inglesa añadió un verbo explícito («it brings») para completar la cláusula. En español, «produce» comunica bien el valor resultativo del hebreo sin convertir la frase en una paráfrasis larga.
- source_word: שָׁלוֹם
  english_pob_choice: peace
  chosen_spanish: paz
  alternatives_spanish:
  - bienestar
  - armonía
  lexicon: HALOT
  rationale: «Paz» es la traducción directa y conserva el alcance bíblico del término. «Bienestar» explicita parte del sentido, pero sería más interpretativo.
- source_word: חַיִּים
  english_pob_choice: life
  chosen_spanish: vida
  alternatives_spanish:
  - vidas
  - existencia
  lexicon: HALOT
  rationale: Aunque el hebreo es morfológicamente plural, en español la forma natural y fiel es el singular abstracto «vida».
- source_word: וּמַרְפֵּא
  english_pob_choice: healing
  chosen_spanish: sanidad
  alternatives_spanish:
  - sanación
  - curación
  - remedio
  lexicon: HALOT
  rationale: «Sanidad» mantiene un tono bíblico y denota el resultado restaurador del término. «Sanación» o «curación» también podrían servir, pero «sanidad» encaja mejor en una tríada sapiencial y eclesial sin perder claridad.
theological_decisions:
- issue: Nombre divino y convención de traducción
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Yahweh
  rationale: El texto hebreo tiene el Tetragramatón, y el proyecto pide no ocultarlo con una convención sustitutiva. «Yahvé» mantiene visible el Nombre divino y sigue el criterio confesional y textual del POB.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Relación entre el hebreo conservado y el testimonio griego muy distinto
  english_pob_reading: Translate the extant Hebrew main text while noting the Greek witness preserves a substantially different line.
  chosen_spanish_reading: Traducir el hebreo conservado en el cuerpo principal y señalar en nota que el testimonio griego ofrece una redacción sustancialmente distinta.
  alternative_spanish_readings:
  - Seguir el griego en el texto principal
  - fusionar ambos testigos en una sola redacción
  rationale: El expediente indica una discrepancia importante entre el hebreo y el griego. Para respetar la prioridad del hebreo donde existe, el texto principal sigue el hebreo; la variante griega se preserva en nota sin armonizarla artificialmente.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives; preserve source uncertainty honestly'
translation_notes:
  revision_awareness: El inglés POB revisó la cláusula final para hacerla predicativa y natural («it brings abundant peace and life and healing»). La versión española sigue esa intención con «produce abundante paz, vida y sanidad», evitando una reproducción rígida del hebreo que sonaría incompleta en español.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme al estándar del proyecto para el Nombre divino.
  - Se usa «temor» y no «reverencia» para conservar la fuerza lexical del hebreo y la decisión inglesa.
  - La tríada final se traduce de forma natural en español sin perder la acumulación de términos.
  - La nota de variante griega queda vinculada al versículo mediante el marcador [a], preservando la tensión textual sin mezclar testigos en el cuerpo principal.
