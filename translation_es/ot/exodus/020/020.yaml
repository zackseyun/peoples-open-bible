base_translation:
  language: en
  yaml_path: translation/ot/exodus/020/020.yaml
  text: And Moses said to the people[a], “Do not fear, for God has come to test you, and so that the fear of him may be before you[c][b], so that you may not sin.”
  footnotes:
  - marker: a
    text: Or 'Do not be afraid.' The Hebrew uses the same fear-root later in the verse ('the fear of him'), creating a deliberate contrast between panic and proper fear of God.
    reason: lexical_alternative
  - marker: b
    text: Or 'reverence for him.' The Hebrew noun can denote fear in the sense of reverent awe as well as dread.
    reason: lexical_alternative
  - marker: c
    text: Literally 'upon your faces,' an idiom for something kept before a person or continually present to awareness.
    reason: cultural_note
