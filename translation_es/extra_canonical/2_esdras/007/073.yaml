    changes_summary: Restored the omitted first clause from the Latin, rendering fraudauerunt as 'have defrauded' and eam quam acceperunt as 'her whom they received.' Retained the existing second sentence with only full-verse completion.
translation:
  language: es
  text: Han defraudado a la que recibieron. ¿Y qué tendrán que decir en el juicio, o cómo responderán en los últimos tiempos?
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: fraudauerunt
  english_pob_choice: They have defrauded
  chosen_spanish: Han defraudado
  alternatives_spanish:
  - Han engañado
  - Han despojado
  lexicon: fraudare
  rationale: El latín expresa una acción de fraude o privación injusta; «han defraudado» conserva ese valor con fuerza legal y moral, y corresponde bien al tono judicial del pasaje.
- source_word: eam quam acceperunt
  english_pob_choice: her whom they received
  chosen_spanish: a la que recibieron
  alternatives_spanish:
  - a la que aceptaron
  - a la cual recibieron
  lexicon: eam... acceperunt
  rationale: El latín usa un pronombre femenino directo seguido de un relativo; en español, «a la que recibieron» mantiene la referencia femenina y la relación verbal sin sobrecargar la frase.
- source_word: quid habebunt dicere
  english_pob_choice: what will they have to say
  chosen_spanish: ¿qué dirán?
  alternatives_spanish:
  - ¿qué tendrán que decir?
  - ¿qué podrán decir?
  lexicon: quid + habere dicere
  rationale: La construcción latina equivale a una pregunta por la defensa disponible; «¿qué dirán?» es idiomático en español y preserva la confrontación judicial sin añadir matices ajenos.
- source_word: in iudicio
  english_pob_choice: in the judgment
  chosen_spanish: en el juicio
  alternatives_spanish:
  - en el juicio final
  - en el tribunal
  lexicon: iudicium
  rationale: «Juicio» conserva el campo semántico forense y también permite la lectura escatológica del contexto; evitar «tribunal» deja abierta la referencia judicial-escatológica del original.
- source_word: uel quo-
  english_pob_choice: or how will they answer
  chosen_spanish: o cómo responderán
  alternatives_spanish:
  - o cómo contestarán
  - o de qué modo responderán
  lexicon: vel + quomodo respondere
  rationale: Aunque el texto latino transmitido está cortado, la continuidad del verso exige una pregunta alternativa de respuesta; «responderán» es fiel y natural en español.
theological_decisions:
- issue: Naturaleza de la escena de juicio
  english_pob_reading: in the judgment ... in the last times
  chosen_spanish_reading: en el juicio ... en los últimos tiempos
  alternative_spanish_readings:
  - en el juicio final ... al final de los tiempos
  - en el juicio ... en el tiempo postrero
  rationale: El latín contrapone juicio y últimos tiempos como marcos escatológicos; «últimos tiempos» conserva el plural y evita fijar innecesariamente una fórmula dogmática más específica que el texto no exige.
  doctrine_reference: escatología bíblica; juicio divino
- issue: Referente femenino de 'eam'
  english_pob_reading: her whom they received
  chosen_spanish_reading: a la que recibieron
  alternative_spanish_readings:
  - a ella que recibieron
  - a la mujer que recibieron
  rationale: El femenino debe mantenerse porque el latín lo exige; el español «la que» preserva el referente sin introducir una identificación más concreta de la que ofrece la fuente.
  doctrine_reference: fidelidad al referente gramatical del texto
translation_notes:
  revision_awareness: La versión inglesa auditada restauró el primer miembro del verso («They have defrauded her whom they received») y mantuvo la segunda pregunta. La redacción española sigue esa restauración, traduce el valor pleno de fraudauerunt y conserva la estructura interrogativa doble del latín transmitido.
  spanish_consistency_notes:
  - Se mantiene «juicio» para iudicium, en línea con un registro forense-escatológico.
  - Se evita «Mesías/ Cristo» y otros términos no presentes en este verso.
  - La pregunta final conserva paralelismo con la inglesa revisada y no introduce glosa explicativa en el cuerpo del texto.
  - El pronombre femenino se mantiene explícito para reflejar el latín eam.
