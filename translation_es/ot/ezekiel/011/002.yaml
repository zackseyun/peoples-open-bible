translation:
  language: es
  text: 'Y me dijo: «Hijo de hombre, estos son los hombres que maquinan iniquidad[a] y dan mal consejo en esta ciudad».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «que planean iniquidad» o «que piensan mal».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר אֵלַי
  english_pob_choice: And he said to me
  chosen_spanish: Y me dijo
  alternatives_spanish:
  - Entonces me dijo
  - Y dijo a mí
  lexicon: HALOT
  rationale: La forma narrativa con וַיֹּאמֶר se refleja de manera natural en español con «Y me dijo», preservando la secuencia del relato sin forzar un calco sintáctico.
- source_word: בֶּן אָדָם
  english_pob_choice: Son of man
  chosen_spanish: Hijo de hombre
  alternatives_spanish:
  - Hijo de un hombre
  - Ser humano
  lexicon: HALOT
  rationale: Se mantiene el vocativo tradicional y cercano al hebreo. En español, «Hijo de hombre» conserva la forma idiomática y la resonancia literaria del título profético en Ezequiel.
- source_word: הָאֲנָשִׁים
  english_pob_choice: the men
  chosen_spanish: los hombres
  alternatives_spanish:
  - las personas
  - la gente
  lexicon: HALOT
  rationale: אֲנָשִׁים es masculino plural y se refiere a personas masculinas concretas en contexto. «Los hombres» mantiene el valor gramatical y discursivo del original.
- source_word: הַחֹשְׁבִים אָוֶן
  english_pob_choice: who devise iniquity
  chosen_spanish: que maquinan iniquidad
  alternatives_spanish:
  - que planean iniquidad
  - que piensan maldad
  - que traman mal
  lexicon: HALOT
  rationale: חֹשְׁבִים con אָוֶן no es mero pensar, sino idear o tramar con intención. «Maquinan iniquidad» transmite deliberación culpable y conserva el peso moral de אָוֶן que la revisión inglesa fijó como «iniquity».
- source_word: וְהַיֹּעֲצִים עֲצַת רָע
  english_pob_choice: and give evil counsel
  chosen_spanish: y dan consejo malo
  alternatives_spanish:
  - y dan mal consejo
  - y aconsejan mal
  - y dan consejo perverso
  lexicon: HALOT
  rationale: La construcción con participio + sustantivo cognado sugiere acción de aconsejar. En español, «dan consejo malo» reproduce el sentido de consejo negativo sin cargarlo con un término eclesiástico ajeno; «malo» conserva la fuerza de רָע de forma clara y sobria.
- source_word: בָּעִיר הַזֹּאת
  english_pob_choice: in this city
  chosen_spanish: en esta ciudad
  alternatives_spanish:
  - dentro de esta ciudad
  lexicon: HALOT
  rationale: La frase locativa es directa; «en esta ciudad» es la equivalencia natural y fiel en español.
theological_decisions:
- issue: Cómo rendir בֶּן אָדָם como vocativo profético
  english_pob_reading: Son of man
  chosen_spanish_reading: Hijo de hombre
  alternative_spanish_readings:
  - Mortal
  - Ser humano
  rationale: Se conserva el título formulaico de Ezequiel, en lugar de neutralizarlo o explicarlo. Esto mantiene la continuidad literaria del libro y evita perder la función vocativa y profética del hebreo.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral; אָדָם default ''man / humankind (context)'''
- issue: Sentido moral de אָוֶן y רָע en la acusación
  english_pob_reading: devise iniquity / give evil counsel
  chosen_spanish_reading: maquinan iniquidad / dan consejo malo
  alternative_spanish_readings:
  - planean maldad / dan mal consejo
  - traman mal / aconsejan perversamente
  rationale: La combinación apunta a intención deliberada y a consejo dañino. «Iniquidad» y «consejo malo» conservan el registro formal y la gravedad moral sin exagerar ni suavizar el juicio.
  doctrine_reference: 'DOCTRINE.md: preserve lexical and moral force of source terms'
translation_notes:
  revision_awareness: Se siguió la revisión inglesa más reciente, que prefirió «iniquity» para אָוֶן y conservó el resto del verso. La versión española refleja esa decisión con «iniquidad» y mantiene el paralelo de la segunda cola como «dan consejo malo», evitando una paráfrasis más libre.
  spanish_consistency_notes:
  - Se mantiene «Hijo de hombre» como vocativo fijo para Ezequiel, coherente con el tratamiento del hebreo בן־אדם.
  - Se usa «iniquidad» para אָוֶן conforme al audit trail inglés revisado.
  - «Consejo malo» conserva la sencillez del paralelo hebreo y evita reemplazarlo por una fórmula más doctrinal o eclesiástica.
  - No se introduce mayúscula devocional innecesaria, ya que aquí no aparece el Tetragrámaton ni una referencia directa a Yahvé en el texto base.
