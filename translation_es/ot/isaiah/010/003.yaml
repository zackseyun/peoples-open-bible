translation:
  language: es
  text: ¿Qué harán ustedes en el día del castigo[a] y de la devastación que vendrá de lejos? ¿A quién acudirán en busca de ayuda, y dónde dejarán su riqueza[b]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'visitación' o 'retribución'. El hebreo puede referirse a una intervención judicial, es decir, a un castigo o ajuste de cuentas.
    reason: lexical_alternative
  - marker: b
    text: O 'su gloria' o 'su honor'. El hebreo puede referirse tanto a honor/gloria como, en este contexto, a bienes valiosos o riqueza.
    reason: lexical_alternative
lexical_decisions:
- source_word: פְּקֻדָּה
  english_pob_choice: punishment
  chosen_spanish: visitación
  alternatives_spanish:
  - castigo
  - retribución
  - punición
  lexicon: HALOT
  rationale: En este contexto profético de juicio, פקֻדָּה puede expresar una visitación judicial o punitiva. En español, 'visitación' conserva el matiz bíblico de intervención divina sin reducir el término de inmediato a una sola interpretación; por eso se complementa en la nota con la lectura de juicio implícita en el contexto.
- source_word: שׁוֹאָה
  english_pob_choice: devastation
  chosen_spanish: devastación
  alternatives_spanish:
  - destrucción
  - ruina
  - catástrofe
  lexicon: HALOT
  rationale: El sustantivo denota ruina destructiva o catástrofe. 'Devastación' comunica bien la fuerza del término en español moderno y mantiene el peso del paralelismo con el día de la visitación.
- source_word: מִמֶּרְחָק
  english_pob_choice: from far away
  chosen_spanish: de lejos
  alternatives_spanish:
  - desde lejos
  - de una tierra distante
  - de muy lejos
  lexicon: HALOT
  rationale: La frase indica procedencia a distancia. 'De lejos' es natural en español y preserva la idea espacial del ataque o juicio que viene desde una distancia remota.
- source_word: תָּבֹוא
  english_pob_choice: comes
  chosen_spanish: vendrá
  alternatives_spanish:
  - viene
  - llegará
  lexicon: HALOT
  rationale: Aunque la forma hebrea es imperfecta, en español el futuro mantiene mejor el tono prospectivo del oráculo. 'Vendrá' suena natural y conserva la idea de un evento que se aproxima.
- source_word: תָּנוּסוּ
  english_pob_choice: will you flee
  chosen_spanish: huirán
  alternatives_spanish:
  - escaparán
  - se refugiarán
  - correrán
  lexicon: HALOT
  rationale: El verbo significa huir o buscar escape. 'Huirán' mantiene la carga de urgencia y el contexto de juicio; el sujeto interrogativo en segunda persona plural ya queda claro por 'ustedes'.
- source_word: לְעֶזְרָה
  english_pob_choice: for help
  chosen_spanish: para buscar ayuda
  alternatives_spanish:
  - para ayuda
  - en busca de ayuda
  - para socorro
  lexicon: HALOT
  rationale: El sustantivo significa ayuda o auxilio. 'Para buscar ayuda' suena idiomático en español y explicita la intención del movimiento sin añadir contenido ajeno al texto.
- source_word: אָנָה
  english_pob_choice: where
  chosen_spanish: dónde
  alternatives_spanish:
  - adónde
  - a dónde
  lexicon: HALOT
  rationale: '''אָנָה'' es un interrogativo de lugar. ''Dónde'' es claro y natural en español; el sentido direccional se compensa por el verbo ''dejarán'' y el contexto de búsqueda de refugio.'
- source_word: תַעַזְבוּ
  english_pob_choice: will you leave
  chosen_spanish: dejarán
  alternatives_spanish:
  - abandonarán
  - soltarán
  - depositarán
  lexicon: HALOT
  rationale: El verbo básico es dejar/abandonar. 'Dejarán' conserva la amplitud del término, necesaria porque el objeto final puede entenderse tanto como bienes materiales como honor/gloria.
- source_word: כְּבוֹדְכֶם
  english_pob_choice: your wealth
  chosen_spanish: su gloria
  alternatives_spanish:
  - su honor
  - su riqueza
  - sus bienes
  lexicon: HALOT
  rationale: כָּבוֹד puede significar 'gloria' u 'honor', y en algunos contextos también lo valioso o la riqueza. El texto hebreo permite la tensión entre lo abstracto y lo concreto; por eso se conserva 'gloria' en el cuerpo y se explica la posible lectura de bienes/riqueza en la nota.
theological_decisions:
- issue: Valor de פְּקֻדָּה en un oráculo de juicio
  english_pob_reading: day of punishment
  chosen_spanish_reading: día de la visitación
  alternative_spanish_readings:
  - día del castigo
  - día de la retribución
  - día del juicio
  rationale: La POB inglesa opta por 'punishment' para transparentar el sentido judicial. En español, 'visitación' retiene la relación con el vocabulario bíblico y deja visible la ambigüedad entre intervención divina y castigo, sin borrar la carga de juicio que el contexto exige.
  doctrine_reference: Translation philosophy §5 (consistencia de términos clave, o excepción documentada)
- issue: Sentido de כְּבוֹדְכֶם en el cierre retórico
  english_pob_reading: your wealth
  chosen_spanish_reading: su gloria
  alternative_spanish_readings:
  - su honor
  - su riqueza
  - sus bienes
  rationale: La POB inglesa documenta la tensión lexical entre gloria/honor y riqueza/posesiones. En español se mantiene 'gloria' en el texto para preservar el enlace con el hebreo, y la nota aclara que el contexto puede apuntar a bienes valiosos o riqueza. Así no se elimina la ambigüedad sino que se hace auditable.
  doctrine_reference: Translation philosophy §5 (consistencia de términos clave, o excepción documentada)
translation_notes:
  revision_awareness: El pasaje presenta alta concordancia con la revisión inglesa más reciente; no se introdujeron cambios sustantivos respecto del análisis auditado. Se preservó la tensión lexical principal en פְּקֻדָּה y כְּבוֹדְכֶם mediante una redacción española que mantiene el sentido bíblico y la ambigüedad documentada.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' en la explicación de la nota para el sentido de visitación judicial, conforme al término divino estándar del proyecto.
  - Se usó un registro bíblico claro pero no arcaizante, evitando calcos innecesarios.
  - La pregunta final conserva el paralelismo retórico del hebreo con dos interrogantes consecutivos.
