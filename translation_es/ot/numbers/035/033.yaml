review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido general del hebreo: la tierra queda moralmente contaminada por el derramamiento de sangre, y esa culpa no se expía sino con la sangre del homicida. Conserva adecuadamente הָאָרֶץ como ''la tierra'', שֻׁפַּךְ como ''fue derramada'', y כִּי אִם como ''excepto''. Sin embargo, la primera cláusula traduce אֲשֶׁר אַתֶּם בָּהּ (''en la que ustedes están'') como ''en la que habitas'', lo que cambia persona y número, y además introduce ''habitar'' donde el hebreo sólo dice ''estar en''.'
  spanish_quality_summary: El español es claro y digno, pero 'No contaminarás' con singular tuteante no concuerda con el hebreo plural ni con el resto del contexto legal. Además, 'en la que habitas' suena menos fiel que 'en la que ustedes están' o 'donde ustedes están'. El resto del versículo es natural y bíblicamente legible. 'Expiación' funciona bien en registro culto; la nota b preserva la alternativa útil.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'Contaminar' para חנף es defendible y bien explicado. 'La tierra' para הָאָרֶץ está alineado con el razonamiento del POB. 'Expiación' mantiene el matiz cultual de כפר. Conviene ajustar sólo la concordancia gramatical y la fidelidad de 'están' frente a 'habitas'.
  issues:
  - severity: high
    issue: Cambio indebido de persona y número en la primera cláusula
    rationale: 'El hebreo tiene formas de segunda persona plural (''ustedes''): תַחֲנִיפוּ ... אַתֶּם. El borrador usa singular (''No contaminarás ... habitas''), lo cual altera la referencia gramatical del mandato.'
  - severity: medium
    issue: '''Habitas'' sobretraduce אֲשֶׁר אַתֶּם בָּהּ'
    rationale: La expresión hebrea significa literalmente 'en la que ustedes están'. 'Habitar' no es imposible por contexto, pero añade una idea más específica que la fuente no exige. La nota inglesa también conserva 'in which you are'.
  revised_spanish_text: No contaminen[a] la tierra en la que ustedes están, porque la sangre contamina la tierra, y no se hará expiación[b] por la tierra a causa de la sangre que fue derramada en ella, excepto por la sangre del que la derramó.
  revised_footnotes:
  - marker: a
    text: O 'profanen la tierra'. El verbo hebreo comunica la idea de volver moral o sacralmente impura la tierra.
    reason: lexical_alternative
  - marker: b
    text: O 'no podrá hacerse expiación por la tierra respecto de la sangre derramada en ella'.
    reason: lexical_alternative
  revision_rationale: Se corrigió la segunda persona singular a plural para reflejar el hebreo y se reemplazó 'habitas' por 'ustedes están', que reproduce con mayor fidelidad אֲשֶׁר אַתֶּם בָּהּ sin añadir el matiz de 'habitar'. Se mantuvieron 'contaminar' y 'expiación' porque representan bien las decisiones léxicas y teológicas del expediente inglés y suenan naturales en español bíblico contemporáneo.
