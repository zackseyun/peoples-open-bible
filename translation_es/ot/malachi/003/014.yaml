base_translation:
  language: en
  yaml_path: translation/ot/malachi/003/014.yaml
  text: You have said[a], ‘It is vain to serve God[d][c][b]. And what profit is it that we have kept his charge and that we have walked in mourning before Yahweh of hosts?’
