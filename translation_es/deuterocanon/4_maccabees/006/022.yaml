revisions:
- from: En respuesta a esto[a], ustedes, oh hijos de Abraham, mueren noblemente por causa de la piedad.
  to: En respuesta a esto, ustedes, oh hijos de Abraham, mueran noblemente por causa de la devoción a Dios[a].
  rationale: Se ajusta τελευτᾶτε a «mueran» para reflejar mejor la exhortación directa del griego en español natural, y se cambia «piedad» en el texto principal a «devoción a Dios» para alinearse con la decisión léxico-teológica auditada en inglés, dejando «piedad» como alternativa en nota.
