translation:
  language: es
  text: 'Mientras este todavía hablaba, vino otro y dijo: «Tus hijos y tus hijas estaban comiendo y bebiendo vino en la casa de su hermano primogénito[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «estaban festinando y bebiendo vino». El hebreo dice literalmente «comiendo y bebiendo vino».'
    reason: lexical_alternative
lexical_decisions:
- source_word: עַד זֶה מְדַבֵּר
  english_pob_choice: While this one was still speaking
  chosen_spanish: Mientras este aún hablaba
  alternatives_spanish:
  - Mientras todavía hablaba
  - Cuando este aún hablaba
  lexicon: HALOT
  rationale: Conservo la idea de interrupción en curso introducida por el participio hebreo, con una formulación natural en español. «Este» mantiene el valor deíctico del hebreo sin introducir información no presente en el texto.
- source_word: וְזֶה בָּא
  english_pob_choice: another came
  chosen_spanish: vino otro
  alternatives_spanish:
  - y vino otro
  - vino otro más
  - llegó otro
  lexicon: HALOT
  rationale: El hebreo contrasta la llegada sucesiva de otro mensajero. «Vino otro» reproduce bien el cambio de hablante sin sobrecargar la frase. «Llegó otro» sería posible, pero «vino» encaja mejor con el flujo narrativo.
- source_word: וַיֹּאמַר
  english_pob_choice: and said
  chosen_spanish: y dijo
  alternatives_spanish:
  - y dijo él
  - y respondió
  lexicon: HALOT
  rationale: La forma wayyiqtol funciona como introducción narrativa estándar al discurso directo. En español, «y dijo» es la formulación más natural y fiel.
- source_word: בָּנֶיךָ וּבְנוֹתֶיךָ
  english_pob_choice: Your sons and your daughters
  chosen_spanish: Tus hijos y tus hijas
  alternatives_spanish:
  - Tus hijos e hijas
  - Tus varones y tus mujeres
  lexicon: HALOT
  rationale: El hebreo nombra explícitamente a hijos e hijas; por eso conservo la distinción de género en español. «Tus hijos e hijas» también sería posible, pero «Tus hijos y tus hijas» suena más claro y solemne.
- source_word: אֹכְלִים וְשֹׁתִים יַיִן
  english_pob_choice: were eating and drinking wine
  chosen_spanish: estaban comiendo y bebiendo vino
  alternatives_spanish:
  - comían y bebían vino
  - estaban festinando y bebiendo vino
  lexicon: HALOT
  rationale: Los participios expresan acción en curso en el momento del reporte. El imperfecto progresivo en español comunica bien esa simultaneidad. No uso «festinando» en el texto principal porque sería más interpretativo que el hebreo literal, aunque la idea de banquete queda sugerida por el contexto.
- source_word: בְּבֵית אֲחִיהֶם הַבְּכוֹר
  english_pob_choice: in the house of their firstborn brother
  chosen_spanish: en la casa de su hermano primogénito
  alternatives_spanish:
  - en la casa de su hermano mayor
  - en la casa de su hermano, el primogénito
  lexicon: HALOT
  rationale: «Primogénito» conserva con precisión הַבְּכוֹר y evita sustituir la referencia por una paráfrasis de edad. Mantengo «su hermano» para reflejar la relación fraterna del hebreo, aunque en español el posesivo puede sonar más fluido que el literal «de ellos».
theological_decisions:
- issue: Sentido de הַבְּכוֹר aplicado al hermano
  english_pob_reading: firstborn brother
  chosen_spanish_reading: hermano primogénito
  alternative_spanish_readings:
  - hermano mayor
  - primer nacido
  rationale: El contexto habla del hermano entre los hijos de Job, y el hebreo usa un término de primogenitura, no solo de edad relativa. «Hermano primogénito» preserva la tensión lexical sin reducirla a una simple nota de antigüedad.
  doctrine_reference: Lexical precision on primogeniture; no doctrinal issue
- issue: Descripción de la actividad de comer y beber
  english_pob_reading: were eating and drinking wine
  chosen_spanish_reading: estaban comiendo y bebiendo vino
  alternative_spanish_readings:
  - estaban festinando y bebiendo vino
  - comían y bebían vino
  rationale: El hebreo es literal en su secuencia «comer y beber vino». Aunque el contexto sugiere banquete, no conviene elevar esa inferencia a la traducción principal. La formulación elegida mantiene el dato explícito y deja la posible matización para una nota si se desea.
  doctrine_reference: Lexical fidelity; narrative context
translation_notes:
  revision_awareness: La revisión inglesa más reciente ajustó «oldest brother» a «firstborn brother» para acercarse más a הַבְּכוֹר; la versión española sigue ese ajuste con «hermano primogénito». También se respetó la alta concordancia del control cruzado, sin introducir reinterpretaciones adicionales.
  spanish_consistency_notes:
  - Se mantiene «primogénito» para הַבְּכוֹר, en línea con la preferencia terminológica de precisión genealógica.
  - Se conservan formas explícitas de género («hijos y hijas») porque el hebreo las enumera por separado.
  - La progresividad verbal («estaban comiendo y bebiendo») refleja el aspecto de los participios hebreos y la simultaneidad narrativa.
  - No se introdujo vocabulario eclesiástico tradicional ajeno al texto; la redacción permanece cercana al hebreo y al flujo narrativo del original.
