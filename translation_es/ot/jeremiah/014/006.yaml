translation:
  language: es
  text: Los asnos salvajes[a] están de pie en las alturas peladas; jadean en busca de aire[b], como chacales[c]. Sus ojos se apagan, porque no hay hierba.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «asnos silvestres».
    reason: lexical_alternative
  - marker: b
    text: O «gaspan por aliento» o, más literalmente, «aspiran viento».
    reason: lexical_alternative
  - marker: c
    text: Traducciones antiguas a veces dicen «como dragones», pero en este contexto hebreo probablemente se refiere a un animal carroñero del desierto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/פְרָאִים
  english_pob_choice: and the wild donkeys
  chosen_spanish: Los asnos salvajes
  alternatives_spanish:
  - los asnos silvestres
  - los burros salvajes
  lexicon: HALOT
  rationale: פְרָאִים nombra asnos/onagros salvajes, no animales domésticos. En español, «asnos salvajes» conserva la referencia zoológica y el tono bíblico sin perder claridad. Se evita «burros» por registro más coloquial.
- source_word: עָמְדוּ
  english_pob_choice: stand
  chosen_spanish: se detienen
  alternatives_spanish:
  - están de pie
  - estaban detenidos
  lexicon: HALOT
  rationale: El hebreo perfecto describe una escena vivida de manera descriptiva. En español, el presente dinámico «se detienen» comunica mejor la imagen continua del verso que un pasado rígido.
- source_word: עַל שְׁפָיִם
  english_pob_choice: on the bare heights
  chosen_spanish: en las alturas peladas
  alternatives_spanish:
  - en las alturas desnudas
  - en los cerros pelados
  - en las alturas barridas
  lexicon: HALOT
  rationale: שְׁפָיִם alude a alturas expuestas, desnudas y sin vegetación. «Alturas peladas» refleja la desnudez del terreno y evita la carga cultual que en español podría asociarse a «lugares altos».
- source_word: שָׁאֲפוּ רוּחַ
  english_pob_choice: they pant for air
  chosen_spanish: jadéan por aire
  alternatives_spanish:
  - gaspan por aire
  - aspiran viento
  - respiran con dificultad
  lexicon: HALOT
  rationale: La expresión hebrea literalmente implica «aspirar/dibujar viento». En contexto de sequía y agotamiento animal, «jadéan por aire» expresa con naturalidad el esfuerzo respiratorio, preservando la imagen física sin suavizarla.
- source_word: כַּ/תַּנִּים
  english_pob_choice: like jackals
  chosen_spanish: como chacales
  alternatives_spanish:
  - como zorros del desierto
  - como dragones
  lexicon: HALOT
  rationale: En este contexto desértico, תַּנִּים se refiere probablemente a chacales, un animal carroñero del desierto. «Chacales» conserva el valor imagético preferido por la POB inglesa y evita lecturas arcaicas como «dragones».
- source_word: כָּלוּ עֵינֵיהֶם
  english_pob_choice: their eyes fail
  chosen_spanish: Sus ojos se apagan
  alternatives_spanish:
  - Sus ojos fallan
  - Sus ojos se nublan
  - Sus ojos se consumen
  lexicon: HALOT
  rationale: כָּלוּ con «ojos» expresa agotamiento, debilitamiento o extinción de la vista. «Se apagan» es una forma natural en español que mantiene la idea de pérdida de vigor visual sin añadir interpretaciones ajenas.
- source_word: כִּי אֵין עֵשֶׂב
  english_pob_choice: because there is no grass
  chosen_spanish: porque no hay hierba
  alternatives_spanish:
  - porque no hay pasto
  - porque no hay vegetación
  - porque no hay forraje
  lexicon: HALOT
  rationale: עֵשֶׂב denota hierba/pasto disponible para el ganado o los animales de pastoreo. «Hierba» es la opción más directa y bíblicamente comprensible en español; «pasto» sería una alternativa válida pero algo más regional.
theological_decisions:
- issue: Imagen profética de desolación y juicio mediante animales del desierto
  english_pob_reading: A vivid natural image of drought-stricken wild donkeys and jackals, with no overt doctrinal term needing smoothing.
  chosen_spanish_reading: 'Se mantiene la escena de desolación extrema sin atenuarla: asnos salvajes en alturas peladas, jadeando, con los ojos apagándose por falta de hierba.'
  alternative_spanish_readings:
  - una imagen más general de animales salvajes
  - una formulación suavizada de la sequía
  rationale: No hay una cuestión doctrinal explícita, pero sí una carga profética fuerte. La traducción conserva la crudeza del cuadro para no diluir el juicio sobre la tierra, que es parte del sentido literario y teológico del verso.
  doctrine_reference: Contexto profético de juicio y desolación en Jeremías 14
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto hebreo y coincide sustancialmente con la auditoría inglesa POB: «wild donkeys», «bare heights», «pant for air», «jackals», «their eyes fail», «because there is no grass». No se detectaron revisiones aplicadas posteriores que requirieran ajuste, y se preserva la misma decisión interpretativa de contexto desértico.'
  spanish_consistency_notes:
  - Se usa «Yahvé» por convención general del proyecto, pero este versículo no contiene el nombre divino.
  - Se mantiene un registro bíblico moderno y claro, evitando calcos rígidos.
  - «Asnos salvajes» y «chacales» conservan el valor zoológico del hebreo en vez de reemplazarlo por términos litúrgicos o genéricos.
  - «Hierba» se usa como equivalente natural de עֵשֶׂב en contexto de pastoreo y sequía.
