base_translation:
  language: en
  yaml_path: translation/deuterocanon/1_maccabees/011/022.yaml
  text: And when he heard it[a], he was angry. But as soon as he heard, he immediately broke camp and came to Ptolemais, and he wrote to Jonathan not to continue the siege, but to meet him in Ptolemais as quickly as possible[b], to confer with him.
  footnotes:
