revisions:
- from: Las bestias salvajes del desierto son alimento para el león[a][b]; así los pobres son el pasto de los ricos.
  to: Las bestias salvajes del desierto son alimento para el león[a][b]; así los pobres son pastura para los ricos.
  rationale: 'Se hace una reparación pequeña pero importante: «pastura para los ricos» refleja mejor מַרְעִית que «el pasto de los ricos», al conservar la metáfora de aquello de lo que se alimentan sin producir una imagen española torpe o demasiado literalista. Se mantienen intactas las notas porque ya preservan bien la alternativa griega y la posibilidad léxica de «asnos salvajes».'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:05:23Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue correctamente el hebreo como texto principal: la estructura comparativa, la imagen depredadora y el contraste social entre ricos y pobres están bien preservados. También conserva adecuadamente la nota con la lectura griega alternativa y la nota léxica sobre פרא. Sin embargo, «el pasto de los ricos» no refleja con suficiente fidelidad ni naturalidad el valor metafórico de מַרְעִית en español, porque «pasto» suele referirse a hierba/comida de animales más que al ámbito de alimentación o apacentamiento, y puede sonar impropio aplicado a personas.'
  spanish_quality_summary: El español es claro y mayormente natural. «Las bestias salvajes del desierto son alimento para el león» funciona bien, aunque «animales salvajes» sería algo más idiomático; no es un problema serio. La principal dificultad de legibilidad y precisión está en «los pobres son el pasto de los ricos», que suena menos natural y puede sugerir que los pobres mismos son hierba. «Los pobres son pastura para los ricos» conserva mejor la metáfora alimentaria/apacentadora y suena más digna en registro bíblico moderno.
  glossary_alignment: No hay conflictos con la terminología doctrinal del proyecto. La decisión de seguir el hebreo y relegar el griego a nota está bien aplicada. Las decisiones léxicas principales son consistentes, salvo la necesidad de ajustar מַרְעִית de «pasto de» a una formulación española más fiel y legible.
  issues:
  - severity: medium
    issue: «el pasto de los ricos» es una elección poco natural para מַרְעִית
    rationale: Aunque intenta conservar la imagen de ‘pasture’, en español «pasto» suele denotar la hierba misma. Aquí conviene una forma que mantenga la metáfora de lo que sirve de alimento/apacentamiento para otro, como «pastura para», evitando una imagen torpe o equívoca.
  - severity: low
    issue: La combinación «bestias salvajes» es ligeramente más pesada que «animales salvajes»
    rationale: No es incorrecta y preserva bien el sentido; sin embargo, «animales salvajes» es más natural en español contemporáneo. Se puede mantener el texto casi intacto si solo se corrige el punto principal.
  revised_spanish_text: Las bestias salvajes del desierto son alimento para el león[a][b]; así los pobres son pastura para los ricos.
  revised_footnotes:
  - marker: a
    text: 'Griego: «¿Qué paz tiene la hiena con el perro? ¿Y qué paz tiene el rico con el pobre?» El paralelo griego conserva otro proverbio con el mismo punto social: la hostilidad entre ricos y pobres.'
    reason: alternative_reading
  - marker: b
    text: O posiblemente «los asnos salvajes del desierto», si el término hebreo se entiende de manera más estrecha y no como animales salvajes en general.
    reason: lexical_alternative
  revision_rationale: 'Se hace una reparación pequeña pero importante: «pastura para los ricos» refleja mejor מַרְעִית que «el pasto de los ricos», al conservar la metáfora de aquello de lo que se alimentan sin producir una imagen española torpe o demasiado literalista. Se mantienen intactas las notas porque ya preservan bien la alternativa griega y la posibilidad léxica de «asnos salvajes».'
