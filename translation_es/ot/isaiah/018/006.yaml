  - severity: low
    issue: La nota a explica la alternativa, pero su redacción puede ajustarse mejor al texto principal revisado.
    rationale: Si se añade «todos» al texto, la nota debe presentar «juntos» como alternativa más directa al hebreo, no como explicación secundaria desligada del anclaje principal.
