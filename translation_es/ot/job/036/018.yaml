- from: Porque la ira[a] —cuidado, no sea que te seduzca hacia el escarnio, y no dejes que un gran rescate[b][c] te desvíe.
  to: Porque la ira—cuidado, no sea que te incite al escarnio[a]—, y no dejes que un gran rescate[b][c] te desvíe.
  rationale: Se corrige el anclaje de la nota léxica para que corresponda al término difícil בְסָפֶק, no a ‘ira’. También se mejora la naturalidad de la construcción verbal con ‘te incite al escarnio’, que refleja mejor el sentido de advertencia del hebreo y la decisión inglesa ‘entice you into scoffing’, manteniendo el resto del contenido y las tensiones léxicas documentadas.
