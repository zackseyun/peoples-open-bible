translation:
  language: es
  text: Porque si trataste con tanto cuidado y paciencia[a] a los enemigos de tus hijos e hijas, aun a los que merecían la muerte, dándoles tiempo y oportunidad por medio de los cuales pudieran ser liberados de la maldad,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con tanta atención y súplica»; el griego usa términos que literalmente significan atención/cuidado y petición/súplica.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐχθρούς
  english_pob_choice: enemies
  chosen_spanish: enemigos
  alternatives_spanish:
  - adversarios
  - enemistados
  lexicon: LSJ
  rationale: El sentido básico de ἐχθροὺς es el de enemigos u oponentes hostiles. «Enemigos» es la equivalencia natural y transparente en español.
- source_word: παίδων σου
  english_pob_choice: your children
  chosen_spanish: tus hijos
  alternatives_spanish:
  - tus hijos e hijas
  - tus niños
  - tus siervos
  lexicon: LSJ
  rationale: παῖς puede significar hijo, niño o siervo según el contexto. Aquí, siguiendo la lectura auditada de la POB inglesa, «tus hijos» conserva el sentido familiar/covenantal sin restringir innecesariamente el género.
- source_word: ὀφειλομένους θανάτῳ
  english_pob_choice: deserving death
  chosen_spanish: los que merecían la muerte
  alternatives_spanish:
  - deudores de muerte
  - sujetos a la muerte
  - merecedores de muerte
  lexicon: LSJ
  rationale: La expresión griega indica obligación o responsabilidad con respecto a la muerte en sentido judicial. «Los que merecían la muerte» comunica esa fuerza de forma idiomática en español.
- source_word: ἐτίμησας
  english_pob_choice: treated
  chosen_spanish: trataste
  alternatives_spanish:
  - honraste
  - estimaste
  - trataste con honor
  lexicon: LSJ
  rationale: Aunque τιμάω suele significar honrar, el contexto muestra un trato medido y considerado hacia los malvados. «Trataste» sigue la revisión inglesa final y evita sobrecargar el verbo con una connotación positiva que el contexto atenúa.
- source_word: μετὰ τοσαύτης προσοχῆς καὶ δεήσεως
  english_pob_choice: with such great care and patience
  chosen_spanish: con tanto cuidado y paciencia
  alternatives_spanish:
  - con tanta atención y súplica
  - con tanta consideración y ruego
  - con tanta atención y paciencia
  lexicon: LSJ
  rationale: προσοχή apunta a atención/cuidado; δεήσις, literalmente súplica o petición, en este contexto expresa una reserva benevolente y paciente frente al castigo. «Paciencia» recoge la decisión auditada de la POB inglesa y evita una literalidad que sonaría extraña en español.
- source_word: δοὺς χρόνους καὶ τόπον
  english_pob_choice: giving them time and opportunity
  chosen_spanish: dándoles tiempo y oportunidad
  alternatives_spanish:
  - dándoles tiempos y lugar
  - concediéndoles tiempo y espacio
  - dándoles tiempo y lugar
  lexicon: LSJ
  rationale: χρόνους es naturalmente «tiempos» o «tiempo», y τόπον puede funcionar idiomáticamente como «oportunidad» o «espacio/ocasión». «Tiempo y oportunidad» es la equivalencia más clara y fiel al efecto del griego.
- source_word: διʼ ὧν
  english_pob_choice: by which
  chosen_spanish: por medio de los cuales
  alternatives_spanish:
  - por los cuales
  - mediante los cuales
  - a través de los cuales
  lexicon: LSJ
  rationale: La relación instrumental entre el tiempo/oportunidad concedidos y la posible liberación se expresa con naturalidad en español mediante «por medio de los cuales».
- source_word: ἀπαλλαγῶσι
  english_pob_choice: they might be freed
  chosen_spanish: pudieran ser liberados
  alternatives_spanish:
  - pudieran ser libertados
  - pudieran quedar libres
  - pudieran ser rescatados
  lexicon: LSJ
  rationale: El verbo pasivo sugiere liberación o desprendimiento de un estado malo. «Ser liberados» preserva el pasivo y suena natural en español.
- source_word: τῆς κακίας
  english_pob_choice: from wickedness
  chosen_spanish: de la maldad
  alternatives_spanish:
  - de la maldad moral
  - del mal
  - de la perversidad
  lexicon: LSJ
  rationale: κακία aquí denota maldad moral. «Maldad» comunica bien el campo semántico en español sin endurecerlo innecesariamente.
theological_decisions:
- issue: Valor de δέησις en una descripción del trato divino hacia los impíos
  english_pob_reading: The English POB renders the phrase contextually as 'with such great care and patience,' preserving the merciful restraint rather than a literal 'supplication.'
  chosen_spanish_reading: «con tanto cuidado y paciencia»
  alternative_spanish_readings:
  - «con tanta atención y súplica»
  - «con tanta consideración y ruego»
  rationale: Una traducción estrictamente literal de δέησις como «súplica» sugeriría de manera extraña que Dios suplicaba a los condenados. El contexto exige resaltar la paciencia y la moderación del juicio. La redacción española sigue esa decisión auditada, sin borrar la base léxica subyacente.
  doctrine_reference: Traducción por equivalencia óptima; mantener el sentido contextual sin perder la tensión léxica del original.
translation_notes:
  revision_awareness: La redacción sigue la revisión final auditada de la POB inglesa, que cambió 'honored' por 'treated' y 'forbearance' por 'patience'. En español se reflejan esos ajustes con «trataste» y «paciencia», manteniendo la base griega de τιμάω y el matiz contextual de δεήσις. También se conserva la relación instrumental de χρόνους καὶ τόπον con una formulación natural en español.
  spanish_consistency_notes:
  - Se mantiene «Dios» implícito en la segunda persona sin introducir nombres divinos inexistentes en el versículo.
  - Se conserva el paralelismo entre «cuidado y paciencia» para reflejar la duplicidad del griego.
  - «Maldad» se usa de manera consistente para κακία en este contexto moral.
  - El cierre queda abierto con coma final, conforme al encadenamiento sintáctico del versículo griego.
