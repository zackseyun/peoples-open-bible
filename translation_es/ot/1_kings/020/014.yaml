translation:
  language: es
  text: 'Y Ahab dijo[a]: «¿Por quién?» Y él dijo: «Así dice Yahvé: Por los jóvenes de los funcionarios provinciales». Entonces dijo: «¿Quién comenzará la batalla?» Y él dijo: «Tú».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Por los asistentes/servidores de los funcionarios provinciales». El hebreo para «jóvenes» también puede referirse a auxiliares o ayudantes al servicio de funcionarios.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּמִי
  english_pob_choice: By whom?
  chosen_spanish: ¿Por quién?
  alternatives_spanish:
  - ¿Por medio de quién?
  - ¿Mediante quién?
  lexicon: HALOT
  rationale: La preposición ב con מִי pide la persona por la cual se hará algo; en español, «¿Por quién?» conserva la pregunta por el agente/instrumento de manera natural y breve.
- source_word: כֹּה אָמַר יְהוָה
  english_pob_choice: Thus says Yahweh
  chosen_spanish: Así dice Yahvé
  alternatives_spanish:
  - Así ha dicho Yahvé
  - Esto dice Yahvé
  lexicon: HALOT
  rationale: Se conserva la fórmula profética solemne con «Así dice». Se usa «Yahvé» según la convención textual del proyecto para יְהוָה.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: El texto hebreo nombra directamente al Dios de Israel; en español se adopta «Yahvé» como forma estándar del proyecto, manteniendo el nombre propio divino y evitando la sustitución por un título.
- source_word: בְּנַעֲרֵי
  english_pob_choice: By the young men
  chosen_spanish: Por los jóvenes
  alternatives_spanish:
  - Por los siervos
  - Por los servidores
  - Por los asistentes
  lexicon: HALOT
  rationale: נַעַר puede referirse a joven, sirviente o asistente. En el texto principal se preserva la imagen léxica «jóvenes», como hizo el POB inglés; el matiz funcional queda implícito en el contexto de los oficiales.
- source_word: שָׂרֵי הַמְּדִינוֹת
  english_pob_choice: of the provincial officials
  chosen_spanish: de los oficiales de las provincias
  alternatives_spanish:
  - de los príncipes de las provincias
  - de los gobernantes provinciales
  - de los comandantes de las provincias
  lexicon: HALOT
  rationale: שָׂרִים aquí designa funcionarios o jefes, y מְדִינוֹת son provincias/distritos administrativos. «Oficiales de las provincias» comunica bien el cargo y la esfera administrativa sin introducir un rango militar no asegurado por el hebreo.
- source_word: מִי יֶאְסֹר הַמִּלְחָמָה
  english_pob_choice: Who will begin the battle?
  chosen_spanish: ¿Quién comenzará la batalla?
  alternatives_spanish:
  - ¿Quién iniciará la batalla?
  - ¿Quién dará comienzo a la batalla?
  lexicon: HALOT
  rationale: Aunque אָסַר en sentido básico es «atar», en este giro con «la batalla» expresa iniciar/encabezar el combate. «Comenzará» preserva el valor idiomático sin volver literal la metáfora de modo confuso en español.
- source_word: אָתָּה
  english_pob_choice: You
  chosen_spanish: Tú
  alternatives_spanish:
  - Eres tú
  lexicon: HALOT
  rationale: El pronombre hebreo es enfático; «Tú» conserva la respuesta directa y la fuerza de la réplica breve.
theological_decisions:
- issue: Nombre divino יְהוָה en la fórmula profética
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: Se mantiene el nombre personal divino en lugar de sustituirlo por una designación genérica. Esto preserva la referencia covenantal del texto y sigue la convención del POB en español.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior asegurando que el marcador de nota [a] aparezca exactamente en el texto español en el lugar correspondiente.
  spanish_consistency_notes:
  - Se preserva el nombre divino como «Yahvé» de forma consistente con la política del proyecto.
  - Se mantiene un registro sobrio y bíblico, evitando calcos innecesarios pero sin suavizar la fuerza del original.
  - La pregunta final y la respuesta breve se conservan en estilo directo para reflejar la secuencia del hebreo.
