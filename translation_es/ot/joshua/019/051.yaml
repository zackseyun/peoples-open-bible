  to: Estas son las heredades que Eleazar el sacerdote, Josué hijo de Nun y los jefes de las casas paternas de las tribus de los hijos de Israel[a] repartieron por sorteo en Silo, delante de Yahvé, a la entrada de la tienda de reunión. Así terminaron de dividir la tierra.
