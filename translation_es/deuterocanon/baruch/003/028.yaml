translation:
  language: es
  text: Y perecieron por falta de entendimiento[a]; perecieron a causa de su propia falta de juicio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «perecieron por carecer de prudencia; perecieron a causa de su propia falta de consejo»
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπώλοντο
  english_pob_choice: they perished
  chosen_spanish: perecieron
  alternatives_spanish:
  - fueron destruidos
  - murieron
  lexicon: BDAG
  rationale: ἀπόλλυμι aquí expresa ruina o perdición. «Perecieron» conserva el tono solemne del original y no especifica más de lo que el griego dice.
- source_word: παρὰ τὸ μὴ ἔχειν φρόνησιν
  english_pob_choice: for lack of understanding
  chosen_spanish: por falta de entendimiento
  alternatives_spanish:
  - por no tener prudencia
  - por carecer de juicio
  lexicon: BDAG
  rationale: La construcción causal se rinde naturalmente con «por falta de». «Entendimiento» transmite el campo semántico de φρόνησις como comprensión práctica o prudencia, sin volverlo demasiado técnico.
- source_word: φρόνησιν
  english_pob_choice: understanding
  chosen_spanish: entendimiento
  alternatives_spanish:
  - prudencia
  - sensatez
  - sabiduría
  lexicon: BDAG
  rationale: «Entendimiento» funciona bien en español para una capacidad de discernimiento práctico y moral. Mantiene amplitud semántica y evita estrechar el término a solo «sabiduría».
- source_word: διὰ τὴν ἀβουλίαν αὐτῶν
  english_pob_choice: because of their own lack of counsel
  chosen_spanish: a causa de su propia falta de consejo
  alternatives_spanish:
  - a causa de su necedad
  - por su falta de juicio
  - por su insensatez
  lexicon: LSJ
  rationale: ἀβουλία significa literalmente falta de consejo o deliberación. «Falta de consejo» conserva esa relación con el discernimiento previo a la acción; «su propia» refleja bien el posesivo αὐτῶν y la responsabilidad personal.
theological_decisions:
- issue: Causa de la perdición
  english_pob_reading: The verse attributes their perishing to a deficiency of understanding and deliberation, without importing a broader doctrinal explanation.
  chosen_spanish_reading: El versículo atribuye su perdición a la carencia de entendimiento y de consejo, sin ampliar el motivo con una explicación doctrinal más allá del texto.
  alternative_spanish_readings:
  - Podría interpretarse de manera más libre como una denuncia de su necedad.
  - Podría hacerse más explícita la idea de juicio moral con «falta de juicio».
  rationale: El griego usa lenguaje de sabiduría y deliberación (φρόνησις, ἀβουλία). La traducción conserva ese registro y la repetición enfática de «perecieron», evitando añadir un diagnóstico teológico no formulado en el versículo.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del inglés POB, que suaviza la primera cláusula a una forma más natural («for lack of understanding») y conserva la repetición de «they perished» junto con «lack of counsel» para ἀβουλία.
  spanish_consistency_notes:
  - Se mantuvo «perecieron» en ambas cláusulas para reflejar la repetición enfática del griego.
  - «Entendimiento» se usó para φρόνησις de manera coherente con un registro bíblico claro y moderno.
  - «Falta de consejo» preserva el matiz deliberativo de ἀβουλία y evita reducirlo a una sola palabra como «necedad», salvo en la nota alternativa.
  - La nota al pie ofrece una opción semántica cercana sin reemplazar el texto principal.
