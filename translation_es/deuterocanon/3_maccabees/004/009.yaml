base_translation:
  language: en
  yaml_path: translation/deuterocanon/3_maccabees/004/009.yaml
  text: 'And they were brought down[a], being driven like beasts by the compulsion of iron bonds: some with their necks fastened to the yokes of the ships, and others with their feet secured in unbreakable fetters[c][b],'
  footnotes:
  - marker: a
    text: Or 'being led'; the Greek participle can be rendered more neutrally, but the context favors the stronger sense 'driven.'
    reason: lexical_alternative
  - marker: b
    text: The phrase 'the yokes of the ships' may refer to ship timbers or bars to which prisoners were fastened; the Greek retains the imagery of an animal yoke.
    reason: cultural_note
  - marker: c
    text: '''Fastened'' could also be rendered ''nailed'' if the verb is taken in its strongest sense, but the immediate context does not require that narrower meaning.'
    reason: lexical_alternative
