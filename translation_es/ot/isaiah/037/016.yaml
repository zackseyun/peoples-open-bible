translation:
  language: es
  text: Yahvé de los ejércitos[a], Dios de Israel, entronizado sobre los querubines, tú solo eres Dios sobre todos los reinos de la tierra. Tú hiciste los cielos y la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “que habita entre los querubines” o “entronizado sobre los querubines”.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino del pacto en forma transliterada, según el criterio del POB en español. Se evita el ocultamiento mediante mayúsculas reverenciales y se mantiene la transparencia respecto del Tetragrámaton.
- source_word: צְבָאוֹת
  english_pob_choice: of hosts
  chosen_spanish: de los ejércitos
  alternatives_spanish:
  - de los ejércitos celestiales
  - de las huestes
  lexicon: HALOT
  rationale: En español, 'ejércitos' comunica bien el valor amplio de 'hosts' sin forzar una lectura demasiado técnica o litúrgica. 'Huestes' es más tradicional, pero menos claro para lectores contemporáneos.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: God of Israel
  chosen_spanish: Dios de Israel
  alternatives_spanish:
  - el Dios de Israel
  lexicon: HALOT
  rationale: Se traduce de manera directa el constructo; 'Dios de Israel' conserva el sentido relacional y el valor singular exigido por el contexto.
- source_word: יֹשֵׁב הַכְּרֻבִים
  english_pob_choice: enthroned above the cherubim
  chosen_spanish: entronizado sobre los querubines
  alternatives_spanish:
  - que habita entre los querubines
  - sentado sobre los querubines
  lexicon: HALOT
  rationale: El participio con esta expresión cultual apunta a entronización/presencia real. 'Entro nizado sobre' preserva la imagen regia sin resolverla en una sola paráfrasis espacial; la alternativa 'entre' queda como posibilidad interpretativa no fijada en el texto principal.
- source_word: אַתָּה הוּא הָאֱלֹהִים
  english_pob_choice: you alone are God
  chosen_spanish: tú solo eres Dios
  alternatives_spanish:
  - tú eres el único Dios
  - tú eres Dios solo
  lexicon: HALOT
  rationale: La forma enfática hebrea y el contexto inmediato expresan exclusividad divina. 'Tú solo eres Dios' preserva la confesión monoteísta sin añadir una explicación filosófica ajena al verso.
- source_word: לְבַדְּךָ
  english_pob_choice: alone
  chosen_spanish: solo
  alternatives_spanish:
  - solamente
  - por ti mismo
  lexicon: HALOT
  rationale: '''Solo'' es la forma natural y fiel en español para la exclusividad del pronombre enfático.'
- source_word: לְכֹל מַמְלְכוֹת הָאָרֶץ
  english_pob_choice: over all the kingdoms of the earth
  chosen_spanish: sobre todos los reinos de la tierra
  alternatives_spanish:
  - para todos los reinos de la tierra
  - entre todos los reinos de la tierra
  lexicon: HALOT
  rationale: El ל relacional expresa soberanía respecto de los reinos; 'sobre' hace explícito ese dominio en un español natural y acorde con el sentido del contexto.
- source_word: עָשִׂיתָ
  english_pob_choice: made
  chosen_spanish: hiciste
  alternatives_spanish:
  - creaste
  - has hecho
  lexicon: HALOT
  rationale: Se conserva el verbo común 'hacer' en pretérito, que corresponde al hebreo עשה y evita sustituirlo por un término más técnico como 'crear'.
- source_word: הַשָּׁמַיִם וְאֶת הָאָרֶץ
  english_pob_choice: the heavens and the earth
  chosen_spanish: los cielos y la tierra
  alternatives_spanish:
  - el cielo y la tierra
  lexicon: HALOT
  rationale: Se mantiene la fórmula creadora con el plural 'cielos', tal como el hebreo, en una expresión plenamente comprensible en español.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El versículo usa el Tetragrámaton directamente. En la línea del POB en español, 'Yahvé' preserva el nombre del pacto con transparencia y evita la convención de enmascararlo como 'SEÑOR'.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Alcance de la exclusividad en אַתָּה הוּא הָאֱלֹהִים לְבַדְּךָ
  english_pob_reading: you alone are God
  chosen_spanish_reading: tú solo eres Dios
  alternative_spanish_readings:
  - tú eres el único Dios
  - tú eres Dios solo
  rationale: La forma hebrea afirma exclusividad sin elaborar una tesis metafísica. La versión española conserva esa tensión y evita sobreexplicar el monoteísmo del pasaje.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: El inglés auditado mantiene 'enthroned above the cherubim' con nota alternativa; la versión española sigue esa decisión, conservando la ambigüedad cultual sin imponer una sola imagen espacial. No se reportan revisiones aplicadas en el paquete fuente, y el control de revisión indica acuerdo alto sin cambios necesarios.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para יְהוָה, conforme al estándar del proyecto.
  - Se mantiene 'Dios' para אֱלֹהִים y 'querubines' para כְּרוּבִים.
  - La fórmula creadora se conserva como 'los cielos y la tierra', no 'el cielo', para reflejar el hebreo plural.
  - 'El orden de la cláusula principal sigue la progresión retórica del hebreo: invocación, afirmación de unicidad, soberanía universal y acto creador.'
