translation:
  language: es
  text: 'Entonces Lea dijo: «¡Feliz soy yo! Porque las mujeres[a] me llamarán feliz». Y llamó a su hijo Asher[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las hijas», ya que el hebreo dice literalmente «daughters», pero aquí puede funcionar idiomáticamente para mujeres en general.
    reason: lexical_alternative
  - marker: b
    text: El nombre Asher suena como las palabras hebreas que Lea usa para decir «feliz» y «llamar feliz».
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּאָשְׁרִי
  english_pob_choice: Happy am I
  chosen_spanish: ¡Feliz soy yo!
  alternatives_spanish:
  - ¡Dichosa soy yo!
  - ¡Afortunada soy yo!
  - En mi dicha
  lexicon: HALOT
  rationale: El sustantivo אָשֶׁר expresa felicidad, dicha o buena fortuna. En este contexto de exclamación, «Feliz soy yo» mantiene el valor emotivo y la primera persona del sufijo posesivo, sin sonar artificial en español. «Dichosa» también sería posible, pero «feliz» preserva mejor el juego inmediato con el nombre Asher en español moderno.
- source_word: אִשְּׁרוּנִי
  english_pob_choice: will call me happy
  chosen_spanish: me llamarán feliz
  alternatives_spanish:
  - me dirán feliz
  - me declararán feliz
  - me tendrán por feliz
  lexicon: HALOT
  rationale: El verbo en piel comunica la idea de declarar o llamar feliz/blessed a alguien. «Me llamarán feliz» conserva la repetición léxica con בְּאָשְׁרִי y reproduce con naturalidad la relación de palabra entre la declaración de Lea y el nombre del niño. «Dichosa» o «bendita» son posibles, pero alteran más el eco verbal del nombre.
- source_word: בָּנוֹת
  english_pob_choice: women
  chosen_spanish: las mujeres
  alternatives_spanish:
  - las hijas
  - las muchachas
  - las niñas
  lexicon: HALOT
  rationale: El hebreo dice literalmente «daughters», pero aquí funciona idiomáticamente para mujeres en general. El texto inglés auditable optó por «women»; en español, «las mujeres» comunica ese sentido social amplio con mayor naturalidad que «las hijas», que sería más literal pero menos claro en este contexto.
- source_word: וַתִּקְרָא אֶת־שְׁמוֹ אָשֵׁר
  english_pob_choice: So she called his name Asher
  chosen_spanish: Y llamó a su hijo Asher
  alternatives_spanish:
  - Y llamó su nombre Asher
  - Así llamó su nombre Asher
  - Y puso por nombre Asher
  lexicon: HALOT
  rationale: La fórmula hebrea de nombramiento se conserva en una forma española transparente. «Llamó a su hijo Asher» sigue el movimiento narrativo del nombre dado al niño; «puso por nombre» sería también posible, pero «llamó» mantiene mejor el paralelismo con el verbo precedente y con la observación auditada del juego de palabras. Se explicita «su hijo» para hacer fluida la referencia pronominal del hebreo y del inglés auditado.
- source_word: אָשֵׁר
  english_pob_choice: Asher
  chosen_spanish: Asher
  alternatives_spanish:
  - Aser
  - Feliz
  - Dichoso
  lexicon: HALOT
  rationale: Los nombres propios se transliteran. Aunque en español bíblico tradicional aparece a veces «Aser», aquí se conserva «Asher» para mantener la transparencia al hebreo y la relación auditada con el juego de palabras derivado de אָשֶׁר.
translation_notes:
  revision_awareness: El inglés POB revisó «daughters» por «women» para reflejar mejor el sentido idiomático de בנות. La versión española sigue esa revisión con «las mujeres» y conserva el juego de palabras del nombre Asher mediante una nota lexical. No se detectan otras revisiones relevantes que afecten la redacción española.
  spanish_consistency_notes:
  - Se mantiene «Lea» para el nombre de la matriarca, siguiendo la forma castellana habitual y la transparencia de lectura.
  - Se usa «Asher» en lugar de «Aser» por consistencia con la transliteración transparente al hebreo en este proyecto.
  - Se conserva el registro narrativo sobrio y directo propio de Génesis, evitando ampliaciones interpretativas.
  - La exclamación «¡Feliz soy yo!» refleja el hebreo de forma idiomática y preserva el paralelismo con «me llamarán feliz».
