translation:
  language: es
  text: Estos estaban allí de antemano[a], dondequiera que estuviera la bestia; y adondequiera que iba, iban con ella y no se apartaban de ella.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el animal»; en este contexto, el referente es un elefante.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὗτοι
  english_pob_choice: These
  chosen_spanish: Estos
  alternatives_spanish:
  - Estas personas
  - Ellos
  lexicon: LSJ
  rationale: El demostrativo se refiere a los hombres mencionados en el contexto inmediato. «Estos» conserva la deixis sin añadir un sustantivo que no está en el griego.
- source_word: πρὸ καιροῦ
  english_pob_choice: beforehand
  chosen_spanish: de antemano
  alternatives_spanish:
  - antes del tiempo
  - antes de tiempo
  lexicon: LSJ
  rationale: La locución expresa anticipación o colocación previa. «De antemano» es natural en español y preserva la idea de previa disposición.
- source_word: οὗ ἂν ᾖ
  english_pob_choice: wherever ... might be
  chosen_spanish: dondequiera que estuviera
  alternatives_spanish:
  - adondequiera que estuviese
  - dondequiera que fuera
  lexicon: LSJ
  rationale: La cláusula relativa indefinida con ἄν pide un valor abierto y repetido. «Dondequiera que estuviera» comunica bien ese alcance sin forzar el modo.
- source_word: τὸ θηρίον
  english_pob_choice: the beast
  chosen_spanish: la bestia
  alternatives_spanish:
  - el animal
  - el elefante
  lexicon: LSJ
  rationale: El griego dice literalmente «la bestia/animal». En este contexto se trata de un elefante, pero «la bestia» mantiene la forma del texto fuente; la nota explica el referente.
- source_word: ἐπορεύετο
  english_pob_choice: went
  chosen_spanish: iba
  alternatives_spanish:
  - marchaba
  - proseguía
  lexicon: LSJ
  rationale: Verbo común de movimiento; «iba» es la equivalencia más natural y no añade matiz militar que el griego no exige.
- source_word: ἅμα
  english_pob_choice: with it
  chosen_spanish: con ella
  alternatives_spanish:
  - juntamente con ella
  - al mismo tiempo
  lexicon: LSJ
  rationale: El adverbio indica acompañamiento y simultaneidad. En español, «iban con ella» transmite coordinación de movimiento de forma idiomática.
- source_word: οὐκ ἀφίσταντο ἐπʼ αὐτοῦ
  english_pob_choice: did not leave it
  chosen_spanish: no se apartaban de ella
  alternatives_spanish:
  - no se retiraban de ella
  - no se separaban de ella
  lexicon: LSJ
  rationale: La expresión indica permanencia cerca del animal y no retirarse de su lado. «No se apartaban de ella» conserva esa cercanía de manera fluida en español.
translation_notes:
  revision_awareness: La versión española sigue la última revisión inglesa, que prefirió «beforehand» por ser más natural y mantener el valor de πρὸ καιροῦ. Aquí se reflejó esa misma preferencia con «de antemano», sin suavizar la referencia literal a τὸ θηρίον.
  spanish_consistency_notes:
  - Se mantiene «bestia» en el texto principal para conservar la forma del original; la nota aclara el referente contextual.
  - «De antemano» reproduce la idea de prioridad temporal sin introducir una paráfrasis excesiva.
  - El pronombre implícito en «iban con ella» y «no se apartaban de ella» es coherente con el antecedente femenino «bestia».
