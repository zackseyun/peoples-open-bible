translation:
  language: es
  text: Porque les profetizan falsamente en mi nombre; no los envié, declara Yahvé.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la razón de la advertencia anterior. En español, «porque» conserva bien el valor causal sin sonar forzado.
- source_word: בְּשֶׁקֶר
  english_pob_choice: falsely
  chosen_spanish: falsamente
  alternatives_spanish:
  - en mentira
  - engañosa­mente
  lexicon: HALOT
  rationale: La expresión hebrea significa literalmente «en mentira / en falsedad». El adverbio «falsamente» expresa de manera natural que su profecía está caracterizada por falsedad.
- source_word: נִבְּאִים
  english_pob_choice: are prophesying
  chosen_spanish: profetizan
  alternatives_spanish:
  - están profetizando
  - están hablando como profetas
  lexicon: HALOT
  rationale: El participio describe una acción o actividad en curso. En español, el presente simple «profetizan» comunica bien el carácter habitual o actual sin sonar excesivamente pesado.
- source_word: לָכֶם
  english_pob_choice: to you
  chosen_spanish: a ustedes
  alternatives_spanish:
  - para ustedes
  - a vosotros
  lexicon: HALOT
  rationale: El dativo apunta a los destinatarios del mensaje. «A ustedes» es natural en español neutro y mantiene la referencia directa.
- source_word: בִּשְׁמִי
  english_pob_choice: in my name
  chosen_spanish: en mi nombre
  alternatives_spanish:
  - bajo mi nombre
  - invocando mi nombre
  lexicon: HALOT
  rationale: Es el modismo estándar para hablar o actuar con pretendida autorización divina. «En mi nombre» preserva tanto el giro idiomático como su peso teológico.
- source_word: לֹא שְׁלַחְתִּים
  english_pob_choice: I did not send them
  chosen_spanish: no los he enviado
  alternatives_spanish:
  - no los envié
  - no los mandé
  lexicon: HALOT
  rationale: La negación divina de autorización se expresa con claridad en español con el pretérito perfecto. Mantiene la fuerza de la declaración sin añadir matices ajenos.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: Se conserva el nombre divino con la transliteración adoptada por el proyecto en español, en lugar de sustituirlo por un título.
theological_decisions:
- issue: Autorización divina frente a falsedad profética
  english_pob_reading: The prophets speak falsely while claiming YHWH's authority, and YHWH explicitly denies having sent them.
  chosen_spanish_reading: Los profetas hablan falsamente mientras reclaman la autoridad de Yahvé, y Yahvé niega explícitamente haberlos enviado.
  alternative_spanish_readings:
  - Profetizan mentira en mi nombre; no fui yo quien los envió.
  - Profetizan falsedad en mi nombre; yo no los envié.
  rationale: La traducción conserva la tensión entre la pretensión de hablar «en mi nombre» y la negación divina de envío. No se suaviza la acusación ni se armoniza artificialmente el contraste.
  doctrine_reference: Translation philosophy §3
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  rationale: El texto hebreo usa directamente el Tetragrámaton. La forma «Yahvé» sigue la decisión terminológica del proyecto en español y evita la sustitución por «SEÑOR».
  doctrine_reference: 'Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: 'La versión española sigue el ajuste revisado en el audit trail: el adverbio de falsedad va unido al verbo de profetizar («profetizan falsamente»), reproduciendo de manera más natural el orden hebreo sin desplazar el objeto indirecto. También integra la decisión revisada de nombrar a יְהוָה como «Yahvé».'
  spanish_consistency_notes:
  - Se mantiene el nombre divino «Yahvé» de forma consistente con el estándar del proyecto.
  - Se evita «SEÑOR» como sustituto del Tetragrámaton.
  - Se conserva el contraste entre la falsedad de la profecía y la negación explícita de envío divino.
  - El español es neutro y publicable, sin calco innecesario del inglés.
