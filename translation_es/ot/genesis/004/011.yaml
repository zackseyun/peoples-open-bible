revisions:
- from: Y ahora eres maldito[a] lejos de la tierra, la cual abrió su boca para recibir la sangre de tu hermano de tu mano.
  to: Y ahora eres maldito[a] de la tierra, que abrió su boca para recibir la sangre de tu hermano de tu mano.
  rationale: Se cambia «lejos de la tierra» por «de la tierra» para preservar mejor la ambigüedad de מִן, en línea con el texto inglés auditado y la decisión teológica de no resolver el sentido hacia mera separación. También se ajusta la cláusula relativa a «que abrió su boca» por mayor naturalidad en español. La nota mantiene la alternativa de alejamiento documentada en el audit trail.
