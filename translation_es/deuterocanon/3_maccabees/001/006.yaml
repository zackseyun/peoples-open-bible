- from: Pero, después de dominar la conspiración[a], decidió visitar las ciudades vecinas y exhortarlas[b].
  to: Pero, después de dominar la trama[a], decidió visitar las ciudades vecinas y animarlas[b].
  rationale: Se ajusta ἐπιβουλή a «trama» para evitar la intensificación de «conspiración», que el propio expediente inglés considera más fuerte que el griego. Se cambia «exhortarlas» por «animarlas» para alinearse con la elección principal documentada para παρακαλέσαι, manteniendo las otras posibilidades en nota. El resto del texto queda esencialmente fiel y natural.
