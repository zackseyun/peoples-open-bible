translation:
  language: es
  text: de Aram[a], y de Moab, y de los amonitas[b], y de los filisteos, y de Amalec, y del botín de Hadadézer, hijo de Rehob[c], rey de Zobá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo אֲרָם; tradicionalmente se traduce 'Siria'.
    reason: lexical_alternative
  - marker: b
    text: Hebreo literalmente 'los hijos de Amón'.
    reason: lexical_alternative
  - marker: c
    text: En algunos pasajes el nombre aparece escrito 'Hadarézer'.
    reason: textual_variant
lexical_decisions:
- source_word: מֵאֲרָם
  english_pob_choice: from Aram
  chosen_spanish: desde Aram
  alternatives_spanish:
  - desde Siria
  lexicon: HALOT
  rationale: Aram es el nombre propio hebreo del territorio/pueblo arameo. En español conviene conservar el nombre fuente, como hizo el POB en inglés, en vez de reemplazarlo por la designación geopolítica posterior 'Siria'.
- source_word: וּמִמּוֹאָב
  english_pob_choice: and from Moab
  chosen_spanish: y desde Moab
  alternatives_spanish:
  - y de Moab
  lexicon: HALOT
  rationale: Moab es un nombre propio geográfico y étnico; 'desde' conserva bien la idea de procedencia marcada por el hebreo con מִן, sin añadir interpretación.
- source_word: וּמִבְּנֵי עַמּוֹן
  english_pob_choice: and from the Ammonites
  chosen_spanish: y desde los amonitas
  alternatives_spanish:
  - y desde los hijos de Amón
  - y desde el pueblo de Amón
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'de los hijos de Amón'. En español, 'amonitas' comunica de modo natural el referente étnico y preserva la referencia colectiva que el POB expresó en inglés con 'Ammonites'.
- source_word: וּמִפְּלִשְׁתִּים
  english_pob_choice: and from the Philistines
  chosen_spanish: y desde los filisteos
  alternatives_spanish:
  - y de los filisteos
  lexicon: HALOT
  rationale: Filisteos es la forma española establecida para el etnónimo. Se conserva el sentido de procedencia de la construcción hebrea sin forzar una paráfrasis.
- source_word: וּמֵעֲמָלֵק
  english_pob_choice: and from Amalek
  chosen_spanish: y desde Amalec
  alternatives_spanish:
  - y desde los amalecitas
  lexicon: HALOT
  rationale: El hebreo usa el nombre propio Amaleq, no una forma gentilicia explícita. 'Amalec' mantiene más de cerca la forma fuente; 'amalecitas' es posible pero añade una etnización que el texto no expresa de manera tan directa.
- source_word: וּמִשְּׁלַל
  english_pob_choice: and from the spoil
  chosen_spanish: y del botín
  alternatives_spanish:
  - y del despojo
  - y del saqueo
  lexicon: HALOT
  rationale: שָׁלָל se refiere a lo capturado en guerra. 'Botín' es el equivalente español más natural y preciso en este contexto militar.
- source_word: הֲדַדְעֶזֶר
  english_pob_choice: Hadadezer
  chosen_spanish: Hadadézer
  alternatives_spanish:
  - Hadadezer
  - Hadarézer
  lexicon: HALOT
  rationale: Se translitera el nombre propio con acento español para facilitar la lectura, manteniendo la forma base 'Hadadezer' del texto hebreo y del POB inglés. No se adopta la variante 'Hadarézer' porque no es la forma base de este versículo.
- source_word: בֶּן רְחֹב
  english_pob_choice: son of Rehob
  chosen_spanish: hijo de Rehob
  alternatives_spanish:
  - hijo de Rejob
  lexicon: HALOT
  rationale: La construcción filial se traduce de forma transparente y formal. 'Rehob' conserva la transliteración habitual del nombre propio, como en el POB inglés.
- source_word: מֶלֶךְ צוֹבָה
  english_pob_choice: king of Zobah
  chosen_spanish: rey de Zobá
  alternatives_spanish:
  - rey de Sobá
  lexicon: HALOT
  rationale: Se conserva el título real y el nombre propio del reino. 'Zobá' refleja una transliteración española clara y fluida; el acento ayuda a la pronunciación sin alterar el nombre.
translation_notes:
  revision_awareness: 'Se siguió el acuerdo de alta concordancia del control cruzado y no se introdujeron revisiones sustantivas respecto del sentido base: se conservaron los nombres propios, la procedencia marcial de מִן y la referencia al botín. La única adaptación visible es el ajuste ortográfico español (acentos y artículos) para publicación en español.'
  spanish_consistency_notes:
  - Se mantuvo 'Aram' y no 'Siria' para seguir el nombre fuente, en línea con el criterio POB.
  - Se prefirió 'botín' para שָׁלָל por ser el sustantivo militar natural en español.
  - Se usó 'amonitas' como etnónimo idiomático equivalente a 'Ammonites' en inglés.
  - Se conservó 'Amalec' para reflejar el nombre propio hebreo y no ampliar el gentilicio.
  - Las notas al pie conservan las alternativas documentadas sin introducir lecturas nuevas.
