translation:
  language: es
  text: Su resplandor fue como la luz; rayos[a] procedían de su mano, y allí estaba oculto su poder.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «cuernos de su mano». Aquí «cuernos» se entiende metafóricamente como rayos o haces de luz.
    reason: lexical_alternative
lexical_decisions:
- source_word: נֹגַהּ
  english_pob_choice: brightness
  chosen_spanish: resplandor
  alternatives_spanish:
  - brillo
  - luminosidad
  - claridad
  lexicon: HALOT
  rationale: נֹגַהּ designa brillo o radiancia. «Resplandor» conserva el campo semántico de luz visible y funciona naturalmente en español poético, sin intensificar más de lo que el hebreo exige.
- source_word: כָּאוֹר
  english_pob_choice: like the light
  chosen_spanish: como la luz
  alternatives_spanish:
  - como la luz del sol
  - como la luz
  - como el resplandor
  lexicon: HALOT
  rationale: El prefijo כ marca comparación. «Como la luz» reproduce la comparación de modo directo y claro, manteniendo la sencillez del paralelo poético.
- source_word: תִּהְיֶה
  english_pob_choice: was
  chosen_spanish: fue
  alternatives_spanish:
  - será
  - era
  lexicon: HALOT
  rationale: Aunque la forma verbal es imperfecta, en esta visión poética se describe la manifestación como una escena contemplada. «Fue» refleja bien ese valor descriptivo en español sin forzar el futuro.
- source_word: קַרְנַיִם
  english_pob_choice: rays
  chosen_spanish: rayos
  alternatives_spanish:
  - cuernos
  - haces
  - rayos de luz
  lexicon: HALOT
  rationale: El término literal es «cuernos», pero en este contexto la imagen es de proyecciones luminosas. «Rayos» comunica la metáfora de forma transparente; la opción literal se conserva en nota por su valor léxico e histórico.
- source_word: מִיָּדוֹ
  english_pob_choice: from his hand
  chosen_spanish: de su mano
  alternatives_spanish:
  - desde su mano
  - de la mano de él
  lexicon: HALOT
  rationale: יָד significa «mano» y la preposición indica origen. «De su mano» expresa esa procedencia en español de manera natural y fiel.
- source_word: לוֹ
  english_pob_choice: his
  chosen_spanish: su
  alternatives_spanish:
  - para él
  - a él
  lexicon: HALOT
  rationale: El referente pronominal vuelve sobre la figura divina. En español, «su poder» mantiene la referencia posesiva sin introducir una relación dativa que aquí sería menos natural.
- source_word: וְשָׁם
  english_pob_choice: and there
  chosen_spanish: y allí
  alternatives_spanish:
  - allí
  - y allí mismo
  lexicon: HALOT
  rationale: La conjunción más el adverbio marcan continuidad espacial. «Y allí» preserva el movimiento poético de la escena sin añadir explicaciones.
- source_word: חֶבְיוֹן
  english_pob_choice: was hidden
  chosen_spanish: estaba escondido
  alternatives_spanish:
  - estaba oculto
  - se escondía
  - estaba ocultamiento
  lexicon: HALOT
  rationale: El sustantivo expresa ocultamiento o escondite. Dado el estilo español, una construcción verbal como «estaba escondido» transmite el sentido con naturalidad y mantiene la idea de ocultación.
- source_word: עֻזּוֹ
  english_pob_choice: his power
  chosen_spanish: su poder
  alternatives_spanish:
  - su fuerza
  - su poderío
  - su fortaleza
  lexicon: HALOT
  rationale: עֹז denota fuerza, vigor o poder. «Poder» encaja bien en el contexto teofánico y conserva la solemnidad del pasaje.
theological_decisions:
- issue: Imagen antropomórfica de la teofanía
  english_pob_reading: Retain 'from his hand' as the source of the rays without demythologizing the image.
  chosen_spanish_reading: Mantener «de su mano» y no suavizar la imagen hacia una formulación abstracta.
  alternative_spanish_readings:
  - desde él
  - de su lado
  - procedentes de él
  rationale: El hebreo usa imaginería corporal en una visión poética. Conservar «mano» respeta el texto fuente y evita resolver la tensión imagética que el original deja intacta.
  doctrine_reference: Principio de primacía del original y de preservación de la tensión teológica e imagética del texto.
translation_notes:
  revision_awareness: 'La redacción sigue el ajuste más reciente del audit trail inglés: se evita un verbo interpretativo adicional y se mantiene la relación simple entre los rayos y la mano, con una nota para preservar la alternativa literal de «cuernos».'
  spanish_consistency_notes:
  - Se conserva «mano» para el hebreo יָד, en coherencia con la política de no despojar la teofanía de su imaginería corporal.
  - Se usa «poder» para עֹז, manteniendo un registro sobrio y teofánico.
  - Se prefirió «resplandor» sobre «brillo» por su sonoridad y adecuación poética en español, sin alejarse del campo semántico.
  - La nota sobre «cuernos» evita perder la tensión lexical documentada en el texto fuente.
