  text: בֶּן אָדָ֕ם הִנְ/נִ֨י לֹקֵ֧חַ מִמְּ/ךָ֛ אֶת מַחְמַ֥ד עֵינֶ֖י/ךָ בְּ/מַגֵּפָ֑ה וְ/לֹ֤א תִסְפֹּד֙ וְ/לֹ֣א תִבְכֶּ֔ה וְ/ל֥וֹא תָב֖וֹא דִּמְעָתֶֽ/ךָ־־׃
base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/024/016.yaml
  text: Son of man[a], behold, I am taking from you the delight of your eyes with a blow, yet you shall not mourn or weep[c][b], nor shall your tears come.
  footnotes:
  - marker: a
    text: Or 'the desire of your eyes.' The phrase refers to what is most precious to Ezekiel; in context, it is his wife.
    reason: lexical_alternative
  - marker: b
    text: Or 'by a plague' or 'with a stroke.' The Hebrew term can denote a striking blow or plague-like affliction.
    reason: lexical_alternative
  - marker: c
    text: Literally, 'your tear shall not come.'
    reason: lexical_alternative
