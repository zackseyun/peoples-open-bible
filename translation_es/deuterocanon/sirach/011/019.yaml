translation:
  language: es
  text: La necedad y las tinieblas están reservadas para los transgresores[a], y los malhechores tienen el mal consigo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: «Al decir él: “He encontrado descanso, y ahora comeré de mis bienes”, no sabe cuánto tiempo pasará, y dejará esas cosas a otros y morirá». El testimonio hebreo aquí difiere notablemente de la tradición griega.'
    reason: alternative_reading
lexical_decisions:
- source_word: שִׂכְלוּת
  english_pob_choice: folly
  chosen_spanish: necedad
  alternatives_spanish:
  - insensatez
  - fatuidad
  lexicon: HALOT
  rationale: El hebreo designa una condición o conducta necia, no simple falta de inteligencia. «Necedad» conserva el tono sapiencial y moral sin sonar más fuerte de lo que exige el texto.
- source_word: וְחֹשֶׁךְ
  english_pob_choice: and darkness
  chosen_spanish: y la oscuridad
  alternatives_spanish:
  - y las tinieblas
  - y la sombra
  lexicon: HALOT
  rationale: La imagen básica es de oscuridad literal o figurada. «Oscuridad» mantiene la imagen y funciona con naturalidad en español moderno.
- source_word: לְפוֹשְׁעִים
  english_pob_choice: for transgressors
  chosen_spanish: para los transgresores
  alternatives_spanish:
  - para los rebeldes
  - para los pecadores
  lexicon: HALOT
  rationale: «Transgresores» preserva la idea de violación deliberada de un límite o ley. Es más preciso que «pecadores», que amplía demasiado el campo semántico.
- source_word: נוֹצְרָה
  english_pob_choice: are reserved
  chosen_spanish: están reservadas
  alternatives_spanish:
  - están guardadas
  - están almacenadas
  lexicon: HALOT
  rationale: El pasivo transmite algo preservado para un destino futuro. «Están reservadas» es la opción más natural y fiel en español para un juicio preparado de antemano.
- source_word: וּמְרֵעִים
  english_pob_choice: evildoers
  chosen_spanish: los malhechores
  alternatives_spanish:
  - los que hacen el mal
  - los malvados
  lexicon: HALOT
  rationale: El participio apunta a personas que practican el mal. «Malhechores» conserva el valor personal y activo del hebreo, y suena más conciso que una perífrasis.
- source_word: רָעָה
  english_pob_choice: evil
  chosen_spanish: el mal
  alternatives_spanish:
  - la calamidad
  - la desgracia
  lexicon: HALOT
  rationale: El sustantivo puede abarcar mal moral o daño/ruina. «El mal» deja abierta esa tensión, como en el hebreo y en la tradición sapiential.
- source_word: עִמָּם
  english_pob_choice: with them
  chosen_spanish: con ellos
  alternatives_spanish:
  - entre ellos
  - junto a ellos
  lexicon: HALOT
  rationale: La preposición expresa compañía o cercanía. «Con ellos» reproduce la compacta relación del hebreo sin sobrerinterpretarla.
theological_decisions:
- issue: Divergencia fuerte entre el hebreo conservado y el paralelo griego de Sirácides 11:19
  english_pob_reading: The English POB follows the Hebrew as primary and preserves the Greek alternative in a footnote.
  chosen_spanish_reading: El texto principal sigue el hebreo conservado; el paralelo griego se preserva en nota como lectura alternativa.
  alternative_spanish_readings:
  - 'Traducir directamente el griego: «Cuando dice: “He encontrado descanso, y ahora comeré de mis bienes...”.»'
  - Combinar ambos testigos en una paráfrasis reconciliada.
  rationale: La política del proyecto da prioridad al testimonio hebreo cuando está disponible. Aquí el griego presenta una frase completamente distinta; por fidelidad auditable, el texto principal debe reflejar el hebreo y no fusionarlo con el griego.
  doctrine_reference: 'PHILOSOPHY.md: traducir del hebreo donde subsiste; preservar honestamente la incertidumbre textual.'
translation_notes:
  revision_awareness: Tomé como base el hebreo conservado en el expediente, porque el contexto auditado indica que es el testimonio principal para esta sección, aunque el griego de Swete ofrece una formulación muy distinta. La revisión inglesa más reciente favoreció una versión breve y formal de מְרֵעִים; en español la mantuve como «los malhechores», equivalente conciso y transparente.
  spanish_consistency_notes:
  - Conservé el estilo sapiencial breve y paralelo del hebreo.
  - Evité armonizar el texto principal con el griego para no borrar la divergencia textual documentada.
  - Usé «malhechores» por su registro formal y por su fidelidad al valor agentivo del participio hebreo.
