    text: O «el año de liberación»; probablemente alude a un año de restauración de tipo jubilar, aunque el hebreo aquí dice literalmente «libertad» y no usa el término habitual para «jubileo».
    reason: lexical_alternative
  revision_rationale: Se revisa «esclavos» a «siervos» para ajustarse a la decisión contextual documentada en la POB inglesa sobre עבד en este versículo. Se cambia «regalo» por «don» para elevar el registro y adecuarlo al contexto jurídico de heredad. Se conserva la nota sobre «año de la libertad» y la estructura final cercana al hebreo, que sigue siendo entendible en español.
